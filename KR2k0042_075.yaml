body:
  text: 江南通志卷七十六食貨志徭役周小司徒之職均土地以稽其人民而周知其數上地家七人可任也者家三人中地家六人可任也者二家五人下地家五人可任也者家二人凡起徒役毋過家一人以其餘為羨唯田與追胥竭作周禮鄉大夫以嵗時登其夫家之衆寡辨其可任者其舎者國中貴者賢者能者服公事者老者疾者皆舎以嵗時入其書周禮載師凡民無職事者出夫家之徵周禮閭師凡無職者出夫布周禮均人掌均人民牛馬車輦之力政凡均力政以嵗上下豐年公旬用三日中年公旬用二日無年公旬用一日凶札則無力政周禮章氏曰三代役法莫詳於周周禮伍兩軍師之法此兵役也師田追胥之法此徒役也府史胥徒之有備此胥役也比閭族黨之相保此鄉役也有司徒焉則因地之美惡以均役有族師焉則校民之衆寡以起役有鄉大夫焉則辨民之老少以從役有均人焉則論嵗之豐凶以行復役之法文獻通考漢初因秦法月為更卒已復為一嵗屯戍一嵗力徵三丁倍於古三才考略髙祖四年初為算賦民年十五而算出口賦至五十六嵗而除二十而傳給徭役亦五十六而除三才考略武帝天漢間顧役有七科一吏有罪二亡命三贅壻四賈人五故有市籍六父母有市籍七大父母有市籍於時力役之繁不減秦時三才考略昭帝中顧役有三品一卒更二踐更三過更至平帝時始定賦從田役從丁之制三才考略唐太宗初立租庸調法凡男子年十八以上給田百畆其八十畆為口分播種禾黍嵗輸粟二石謂之租其二十畝為世業課種桑麻嵗輸綾絹二丈綿三兩非桑土輸布二丈五寸麻三觔謂之調用民之力嵗定役二旬閏加二日不役則收絹三尺謂之庸三才考略肅宗時更為夏秋兩稅法畢省諸租庸調雜徭名目三才考略代宗廣德二年勅天下戸口委刺史縣令據見在實戸量貧富等第科差不得依舊籍帳文獻通考宣宗大中九年詔以州縣差役不均自今每縣據人貧富及役輕重作科差簿送刺史檢署訖鍊於令㕔每有役事委令據簿科差文獻通考宋初以衙前主官物以里正戸長鄉書手督課賦稅以耆長弓手壮丁逐捕盜賊以承符人力手力散從官給使令三才考略熙寧間行保甲罷耆戸長壮丁三才考略元祐間復耆戸長壮丁仍行保甲法三才考略紹興間役法有三曰顧役曰助役曰免役寛剰三才考略乾道間行義役令民量家厚薄隨户役多寡輸金買田遇當役者以田給之按宋之役法獨衙前為最重蓋衙前主典庫蔵官物有折耗責令賠償往往用是破家熈寧中州郡有衙前越千里輸内庫金七錢而司吏又留難至踰年不得歸神宗㢘得大傷之議變法於是王安石議以為漢世宰相之子然且戍邉今宜隨人戸田産多寡之數以差次出錢顧貧民以充役名免役錢其市籍商販單丁女戸及品官僧道之流舊無役而出錢者名助役錢其足用顧直之外寛増一二分以為水旱賑恤備者名免役寛剰錢其始行也官有錢以顧役民輸錢而得息一時稱為良法其後州縣多增科率免役之錢日多則民病又官所顧募之人皆無賴市姦不畏刑罪則官亦病於是司馬光又議顧役五害不若復差役而於役中之繁重如衙前等項則量其費而官取雜色錢少助之役可平也詔從其議然差法久廢版籍漫滅輕重無準田多者或以倖免貧者奔走不息又苦吏科率漸廣乾道中金華松陽民汪灌等首倡義度其縣中衙前里正之役長短相覆一嵗費三十萬乃自實其貲為三等令縣中各實其貲定著役之差次於籍衆割田若干畝為公田以其粟佐當役者役先後視籍田多寡差等異日戸有升降則衆議而進退之名曰義役行之三十年俗大歡洽郡守呂芾上其事號其鄉曰循禮里曰信義自是所在皆仿行之三才考略元初州設坊正鄉設里正都設主首專辦稅事後改為季役其次有貼役雜役以糧多者為役首其次為貼役其雜役則弓手祗候禁子㪷子曳刺鋪兵船夫防夫馬夫鹽車織染匠雜造匠三才考略泰定間行助役法三才考略附松江府教授余卓助役田記略江浙所轄四道田土之廣錢糧之夥賦役之重莫過於浙西然歸附之後科征文冊散失殆盡催納稅糧止憑鄉司草冊以致弊倖不一延祐五年議行助役之法浙西亷訪使言今州縣差徭上戸萬畝不過差充里正下户田不滿百未免定為主首至賣田畝鬻妻子而後止如今之計令有田百畝之上者出田助役為便至治二年令各縣正官親詣鄉保就與各處耆宿人等斟酌彼中輕重物力多寡該出助役田糧數目坐落條段主户花名開申每嵗儲蓄推舉信義之家以充里長掌管牧租助役輪流相沿交割不許有司干預攢造印冊三本一解省一存府一責付里正仍嚴行設法闗防華亭上海二縣照勘到二縣人戸助田一千四百六頃三十一畝八分九釐該米六萬三千五百四十四石二斗六升五合推舉里正邵正三秀等二百四十三名掌管收租助役既已造冊闗防合令於本處置立石碣明白鐫記條段四至字號備細數目以防移換埋沒之弊云王艮上海縣坊正助役義田記略上海之地阻江而濱海至元間易鎮為縣市舶司在焉故商賈駢集民物繁庶服役者猶未病其後舶移東浙㕓氓日減而坊正之役始為病矣於是邑之耆老相與謁鄉望萬戸費公而議焉公謀於衆相率有力者驗其力之上下而差等之各輸幣買田若千畝嵗收租若干石以為助役田而公所輸尤夥田在縣之廿五保其議約則本保里正嵗掌其租入以給坊正之費坊正嵗集衆議公選有幹局者二人以董之上不失公家之務而下可以緩民力斯亦捄弊之權也既成乃謀勒石以告於後期於永久而無斁云明洪武初定役法驗田出夫田一頃出丁夫一人不足一頃者以别田足之名曰均工夫三才考略尋編賦役黄冊以一百一十户為里里分十甲曰里甲以上中下戸為三等五嵗均役十嵗一更造一嵗中諸色雜目應役者編第均之銀力從所便曰均徭他雜役曰雜泛凡祗應禁子弓兵悉簽市民毋役糧户按銀力二差俱有定數銀差者以差編銀不復顧役也力差者派與銀數自當顧役悉聽其便非於所編之外縦民過取也三才考略簽㸃糧長以賦稅闗國重計選殷實戸充糧長督其鄉租稅多者萬石少者數千石部輸入京間召見問疾苦稱㫖者輒拜官三才考略永樂間編簽馬頭按暫借南方百姓買馬當差過二年仍著土民買馬更替回来三才考略正統間巡撫侍郎周忱設法馬頭解戸於秋糧義役米内取辦起解三才考略景泰間給事中白瑩言各處将京官之家編作水馬驛站等役請照洪武中例凡京官本戸雜派差役一概優免從之三才考略天順間巡撫都御史崔恭倣前巡撫侍郎周忱遺法編定均徭按周忱法将鄉都通縣排年里長編成定次一應差役每石出銀一兩輪當一年歇息二年酌量輕重多寡朋合造冊在官猶如車輪而胥吏無那移之弊百姓便之後知府汪滸編作上中下九則之法胥吏得上下其手至是崔恭以長邑老人之請照忱舊制均徭按均徭之法一按冊籍丁糧一覈人戸上下稽冊籍則富商大賈免役而土著困覈人戸則官吏里胥輕重其手而小民益困二者交病然專論丁糧庶㡬古人租庸調之意時議以舊編力差銀差之數當丁糧之數難易輕重酌其中役以應差里甲除當復者論丁糧多少編次先後曰鼠尾冊按而徵之市民商賈家殷足而無田産者聽自占以佐銀差役以稍平成化間從刑部主事袁潔議令沿河州縣雜辦正徭出十之二按潔議自通州抵儀徵沿河人民編定夫甲拽送官船晝夜不息請令沿河州縣雜辦正徭但出十分之二餘派不當夫役之處𢎞治間應天巡撫朱瑄奏減内府供給南京科道等官公差諸役各衙門坐派及運送人夫等項詔從之巡撫都御史魏紳奏准以馬價編入秋糧項下徵解各驛買補馬匹著為令正德間御史黄正色奏免夫役八事從之一均甲役二處鋪戸三革鋪長四均鋪舎五省夘酉六革夫役七均雜役八禁豪横嘉靖間知府王儀靖立法編簽糧解照田多寡為輕重凡大小差役總計其均徭數目一條鞭徴充費雇辦役累悉除隆慶間蘇州知府蔡國熈詳定南北運櫃收倉兌等役並五年一編與十排里役各别挨輪每遇編期核造虎頭鼠尾冊簽㸃以田多寡定差輕重御史錢嶫奏免通州派養種馬從之附錢嶫疏畧查得洪武年間取勘地土派養馬匹揚州府所屬州縣養馬處所每兒馬一匹額編田二百畝騍馬一匹額編田三百畝免納稅糧為養馬之費通州海門勘係三面瀕江一面邉海中復係運鹽河通十場不宜養馬故無派俵馬亦無免征田糧永樂年間六安州災傷赴告時撫按以江北例視之遂令通州每兒馬一匹簽一十丁騍馬一匹簽十五丁暫替領養聽候解俵臣生長其地實目見地鹻水鹹草木不服雖稱種馬並不産駒瘦損倒死十嘗八九一經買補之期動至傾家賣子買自他鄉不數月間瘦死賠買又復如前及至起解赴京備用馬匹百無一選每年部司文移不過行令征價前往北方産馬去處收買解俵費用不貲艱苦萬状是通州民獨受養馬之害朝廷未嘗獲通州一馬之用也又查得徐邳豐沛等州縣亦派有地養馬亦因地方災傷告申巡撫奏蒙除豁准将種馬變賣與備用折色銀兩遞年征解民賴以蘇昔年本州判官喬琪史立模等具奏各蒙命下部司未見議處亦以六安州申奏替養已久難以復歸又恐他處比例耳但照通州差役繁難江海潮為患數倍於前而馬不額設與江南相同他處自難比例伏覩嘉靖六年二月十三日詔書内開應天府所屬論丁養馬近因備解駒小每年止解備用馬價今通州地方與應天府接壤且更南下鹹濕過之伏乞矜念窮隱一視同仁或照海門縣先年奏准事例一體除豁或照徐豐等處事例每年通征折色銀兩交納如不得已其備用馬匹仍照舊将應養馬匹人戸赴北方産馬去處收買解俵本色不缺其折色銀兩亦照舊解納不缺止将種馬免養略倣徐豐等處事例種馬倒失者免其追補見在者變價解部則國家未嘗少一馬欠一錢而海濱困窮脫不時賠買之苦受無窮蘇息之恩矣巡撫都御史海瑞将均徭均費等銀不分銀力二差俱以一條鞭徵銀在官聽候支解按一條鞭法十甲丁糧總於一里各里丁糧總於一州縣州縣總於府府總於布政司通計一省丁糧均派一省徭役於是均徭里甲與兩稅為一凡一縣丁糧畢輸於官官為簽募以充一嵗之役小民得無擾而事亦易集然糧長里長之名罷而其實存諸役仍至復簽農民法行十餘年規制頓紊不能盡遵行也隆慶三年巡撫都御史海瑞革報府城附郭總甲於十排年挨日輪充萬歴間巡撫胡執禮更定徭里貼役革除里夫附松江林景暘上巡撫胡執禮書竊惟江南賦役甲於海内而敝郡蕞爾僻壤列為雄望頻年以来供億繁苦既無不盡之力不竭之財矣閣下嘉惠地方欲更定徭里貼役盡革力差里夫使第輸銀於官而無所與誠百世良法然因謂民即多出財以紓力庸何傷愚則以為未可夫均徭特衙前一役其餘收頭催辦解運尚多也里甲以供祭祀賓客官府之需而民間不時徵索自若也貼役以贍北運而夫船耗辦及解户之費又數倍也今計三者之征約六萬兩已當他省上縣之賦矣在官之額一成難變恐今日加編既定異時即閣下身在其位灼知其害而有不能議減者是財之出於民一定而不易者也而又不能保其不増若夫奸胥猾吏視有司之所不便下片紙之令在官者復轉而在民易易耳是力之不出於民非一定而不易者也而况将不止於一變至於時勢之舒慘國用之緩急又非意料所能盡也閣下計目前之多循良而不虞異日之無不肖習於聖朝之休養而不念時㑹之有更張愚竊以為遇矣且夫雇便於差自古誌之而昔人猶以為年年出費户戸徵錢此雖熈豐士大夫一時僻論而閣下今日不可不念及於此也毫釐之所益者視若甚輕而敲撲之所増者無限一年之敲撲其原皆起於毫釐嵗嵗之敲撲其根又起於一日更法之始得不慎乎閣下誠欲利民當省在官之用而不當増在民之供當深思其費之所由寡而不當徒講其費之所從出狂瞽之言惟閣下勿罪而採擇之則德意終遂而闔郡受無疆之賜矣巡撫都御史徐民式題准均役紳衿限田優免餘俱一體當差役分上中下三則以田多寡為差附徐民式疏略按呉中之役除一切里排小役艱辛萬状者無論如櫃收倉收南北兩運有終嵗拮据始得竣事者有水宿風飡皸皴道路貲空産竭流落他鄉甚而血杖淋漓公庭疲曳查盤逼迫獄底羈監三年五年尚未得息肩者蓋因隆慶年間呉中大户創立官甲自辦自比自收自兌未幾巧詐百出弊竇紛然有倚官甲為避差之窟而詭寄者有通錢神於猾胥之手而花分者有寄荘而圖優免者有故官而仍濫免者相沿積習牢不可破而長民之吏莫能究詰夫總計一縣之田止有此數此増則彼減官户之田日増民户之田日減故縣中一遇編差上户不足㸃及中戸中户不足㸃及朋戸於是豪門子弟倚勢人僕方且坐擁良田耳不聞役而彼甕牖貧民反出死力以代大户之勞費此情理之難通也該職等嚴行道府縣清查自科甲以至一命謹遵照㑹典厚加優免似無不協其餘限外田畝及有詭寄花分寄荘故官概不容隱匿無論官民盡數照田編役以甦積困通州凌東都奏准竈民田地照糧一體當差附凌東都疏略通州僻處海濱與金沙西亭等六場地壤相接界限分明一切竈蕩供煎鹽課例不起差如另買民田則與民間一體當差嘉靖十八年風潮淹入鹽場巡鹽題准嘉靖二十年以前所買民糧共一千四十石俱作租田免其差徭派民替當二十年以後買者不為例此民間初刼也萬歴九年以嘉靖二十年後竈買民田轉賣竈者共五百二十石亦作租田免其差徭派民替當此民間中刼也至十一二年竈戸又欲将竈戸中下糧一千六百石盡行蠲免此民間一大刼也本州奉例丈田除竈蕩軍屯不丈量外概州實該田一萬三千頃内竈户實該田三千九百餘頃此據各竈自報之數也本州奉例均糧除竈蕩軍屯不起科外每科糧一石一斗四升内竈户該糧四千五百餘石此據竈冊實征之數也本州清查軍竈民籍坍江之遺糧與無田之浮糧共該四千餘石均通洒入槩州見田之内内竈户坍糧八百餘石浮糧并賣出者七百餘石此照鄰縣諸場之事例也豈豪竈将見買實田抵補坍江之數承認虚糧規避差徭夫竈混民田為租田是欲享無差之田差不在竈則在民矣竈捺虚糧為實在是欲掌無糧之田糧不在甲則在乙矣州民屢經赴告而竈户恃富倚强上通下徹捺案不行是以不得不奔赴闕庭上瀆宸聽伏乞下部議覆勅行改正不惟一方生靈得少甦醒而歴年祖宗之版籍亦不致混亂矣都諫張貞觀請定徐州里甲夫差部議従之附張貞觀疏略自民間苦里甲而後有條鞭之法是條鞭之行所以甦里甲之困也然固有已征鞭銀而復役里甲者亦有限年頭役名色依然照舊簽派私貼無算者業已征其銀而復役其身是民昔之所苦者一而今之所苦者二也臣謂既已改行鞭法即當悉去見年其間有重差如提鎖甲首走遞馬匹之私幫等數俱應派之合境不應幫之里甲臣嘗為令又備知擾民之最大者無過均丈與審鞭均丈一次其費可抵半嵗之糧審鞭一次其費可抵半嵗之差蓋假升合而肆索求指報丁而恣漁獵里書積態萬不能免故也審派之期俱應以五年為則以此年而審即以此年而派将原派之數揭示民間照此的數登入繇票人給一張以便照數算納庶上省一分之擾則下省一分之費小民皆知徭糧之數影那飛詭之弊可絶矣國朝順治十四年江蘇巡撫都御史張中元禁革首名糧長并縣歇倉歇蠧役康熈元年江蘇巡撫都御史韓世琦飭行均田均役嚴革經催附户科柯聳疏略竊惟任土作賦因田起差此古今不易之常法但人户消長不同田畝盈縮亦異所以定十年編審之法則役隨田轉冊因時定富者無兔脫之弊貧者無蚉負之憂勞逸適均輸将恐後法至善也臣五年里居每見官役之侵漁差徭之繁重不一而足其源總由於簽㸃之不公積弊之未剔今前冊已滿目下編審届期此小民身家利害之闗亦胥役張牙吮血之㑹也若不徹底更張痛除宿弊何以拯民困而垂永久乎以臣聞見所及約略五端謹一一陳之一里甲田畝之額數宜均也查一縣田額若干應審里長若干每里十甲每甲該田若干田多者獨充一名田少者串充一名其最零星者附於甲尾名曰花户此定例也所以各項差役俱係里長挨甲充當故力不勞而事易辦獨蘇松兩府名為簽報殷實竟不稽查田畝有田已賣盡而仍執里役者有田連阡陌而全不應差者不特十年之中偏枯殊甚至年年小審那移脫換叢弊多端田歸不役之家役累無田之戸以致貧民竭骨難支逃徙隔屬務期嚴勅撫臣通行兩府及今大造之時必期田盡落甲役必照田務将本區之田均役本區十甲倘本區田多則派入下區按田起役不得憑空簽報以滋賣富差貧之弊庶㡬均役而民便矣一花分子戸之積弊宜清也夫里甲十年一定田多者簽里長田少者為花戸固矣浙省各屬有富民串通本里冊書每於編審之年揑立鬼户分洒田數則田數既已無多重役便易脫漏及至臨審缺額反将貧民瘠産亦復串立應充是田多者以花分而得缷擔田少者反以愚實而應重役今後各縣審役悉照上屆榜冊其一應推收必驗實有絶賣兌契方許分戸如並無戸丁詭立花户者查出其田入官冊國朝書與本人依律治罪一詭寄之陋規宜懲也寡部優免則例原照品級之大小派免丁糧之多覆止免本身丁徭将優免丁糧悉應停免則紳衿庶民久已一體當差矣但查前冊定自順治八年時從科臣劉顯續之疏止准免其雜辦不得濫免正賦致累小民所以進士舉貢生員猶有各立的名或書職銜名曰官户儒户凡雜項差徭量行豁免至於正額糧賦各自照規完納但因雜差繁苦未免有親族人等冒借户名希圖倖免以致紳衿名下之田半皆影冒且有鄉紳物故已乆生員學冊無名并寺觀香火上司書承亦皆各立戸名公然討免各差今番造冊務将紳衿的名之田另造一冊達部存案倘仍借戸入冊将田入官加等治罪一冒籍之立戸宜禁也紳衿即有本色止免本身丁徭况係隔屬豈宜冒免即或鄰近各邑間有置買地畝亦當編入民里一體應差乃江浙陋習竟有隔省鄰縣並無寸土偶有親識往来便爾揑立冊名冒籍之客户日多本地之充役更苦今編審之時凡有隔屬仕宦另立户名希圖免差者本縣據實申報應嚴行處分一冊書之買充宜革也江浙各縣每於經制吏書之外每里各有冊書一名或號里書或稱扇書專司書算似不可少然此輩乗大造之時各出頂首銀若干買定里區移甲換乙諸弊皆出其手更有衙門積棍名曰歇家買充數里每年包納錢糧額外私派俱屬歇家掌握甚至收愚民之額課而臨比不完包富役之差徭勅行而散派各户盤踞難革積蠧萬端請止許本里公撫臣将歇家嚴檄革除至各縣冊書報誠實無過精於書算者專管推收書算等事是革蠧除奸之本也户部題覆通行六年總督郎廷佐飭禁武進縣迎春鄉科派雜差婁縣知縣李復興行均田均役法諸邑皆倣行之附沈荃均役成書序略婁邑自均役以後流亡復歸荒蕪日墾鄰邑外省相繼取法父老猶慮善政難久取李侯均役法刋為成書冀垂永遠沈子浙闈竣事父老以書見示而俾為叙沈子曰善政之行上下皆知其便無煩贅詞矣所慮世俗昧於均役之義而議其無役且以為師心而不法於古請為正告之夫三代之役軍旅土功而已夫子所謂使民以時王制所謂嵗不過三日皆此役也井田廢而兵民分兵久無預於民若夫築城浚川則計田出費以供其事如近日呉淞之役豈非至均者哉若議里役不設則古之鄉長里正本非役也周之比長里宰皆下士閭胥酇長皆中士旅師鄙師皆上士黨正縣正皆下大夫州長則中大夫此命官也豈役也哉漢去古未遠故亭長鄉嗇夫聽獄訟收賦稅皆有禄秩張敞朱邑朱博薛宣之流由此至卿相隋人欲以鄉正理五百家獄訟李德林謂鄉官治民恐徇私不便唐時此意未冺故栁宗元言有里胥而後有縣大夫有縣大夫而後有諸侯有諸侯而後有方伯連帥是里胥與連帥貴賤雖殊而皆為天子任理民之責者也未聞有比較鞭笞破家亡身者也唐末大亂朱温王建楊行宻王潮孫儒朱宣朱瑾齊克讓之流以大盜建節所用守令皆其麾下健兒視民如仇而用之日新由是鄉里之職大為民困此亂世厲政豈古所謂役哉五代因循至宋未改或差役或雇役或義役皆能困民然弊則改之初無定轍元時賦最輕故役亦輕而民多富明室賦重縣令催科難徧故分編里甲使之催賦俗名為經催是役之設為催賦設也賦辦則役舉矣今均田之法家自催賦無不辦之賦即是無不舉之役豈必辦賦之法嵗破數百家嵗斃數百命而後謂之役哉向之有役有不役故見其役今也無人非役故不見其役若遂議其無役此正如切和羮而别索鹽梅多見其不知味也若謂今之法非古夫救弊奚拘於古乎且又無古可依如以周漢唐為古則改役為官分郡縣之權無追呼之苦民固願之而勢不可得也以宋為古則雇役歟差役歟義役歟宋已不能自定而今奚法也以舊役法為古則嵗破數百家嵗斃數百命仁人君子奚忍言之若謂以田從人為非則向者以人從田圃蠧圖書為政而官與民交受其害今之以田從人業户自為政而官與民交受其利將従其官民交利者乎抑必従其交害者乎若慮自此以後田畝散亂難稽此易事耳各圖有魚鱗細號册令冩一本送縣兼令業户田多者各冩一本向因每圖止有一冊秘不示人故飛洒那移大為業户之患今使每圖數本則人人皆知細數而弊端永絶何患田畝難稽哉惟荒地未有定屬然察荒使者方詳加稽核靡濫靡遺若入告而得邀寛恤大幸不然而均之闔郡亦不及百分之一耳或慮小人憾不得逞隂謀梗壞然去嵗憸壬以利誘縣令俾言變法法不可變而令以墨抵罪專欲難成違衆不祥人亦知之不敢妄動矣况今部院大臣監司守令皆仁明愛民帡幪於上賢父老恪守成法於下行且徧此法於呉越間雖百世可也至吾郡従来役法之積弊與李侯均役之良法詳家賁園所撰碑記及余均編要略舊序中兹不復贅七年清河縣知縣請除里長立甲長以辦一甲差糧附邑人胡應華碑記淮之清河昔日議廢之小縣也治當極衝民疲奔命土濱黄淮日見衝蝕故桑田為滄海者什之七户口耗去者什之九其有不去以見户包逃亡以一甲包一里以一人包一甲公私上下轉相負累因而俱逃究其所由則里長之故也强有力者先去貧弱者後逃田地抛荒白茅無屋黄淮之濱化為鼉宅蛟宮人烟屋廬但於湖市蜃氣中髣髴見之而欲以地丁糧鞭應付差徭問之水濱者求之里長胥徒托為責成實則利其無證擠之去耳去而欲敲無髓欲剜無肉征比無人官民賠累故歴年清民有相率而告廢之議也頃周公世連来令清河知積疲之由痛哭陳情於上臺推原所以負累里長在於逃鞭水糧之田因革去里長止用排年名為甲長分辦差糧輪用一甲長在縣應官每月週而復始民以為便十三年布政使司慕天顔請立均田均役定制附慕天顔疏略臣惟則壤定賦各有應輸之科征而計畝當差始無偏枯之病累江南州縣每里為一圖每圖有十甲此歴来額定之賦役也乃民間貧富不等所有田地多寡不齊若田多至數十頃而占籍止一圖或窮民僅有田幾畝而亦當差於一甲是豪戸避役缷累小民而隱占之弊生矣又或貧民苦累不堪将本名田地寄籍於豪强戸下以免差徭而詭寄之弊生矣又或蠧胥奸里覘知小民不諳户役之事包當里遞替納錢糧代應比較而包攬之弊生矣種種弊端皆因賦役不能均平之故夫均田均役之法通計該州縣田地總額與里甲之數将田地均分每圖若干頃編為定制辦糧當差田地既均則賦役自平此法自科臣柯聳條議婁縣故令李復興行之最為得宜松民至今稱便蘇松等屬倣照均編但民間田地賣買不常每遇編審之期必應推收過割恐有積蠧乗機眩惑有司變亂成法則貽害無窮嗣後推收編審請照均田均役聽民自相品搭充足里甲之數不許多田少役則隱占詭寄包攬諸弊可以永清十八年總督阿席熈請禁革儀真縣雜差二十三年總督于成龍禁革里排附碑記略里役之設原屬明季陋規設立里長編為十甲而一甲之中立排年一人輪年充當催辦似乎任輕役小而奸豪恃頑抗納每累墊賠於是經承有費差役有費科派雜項有費以及站櫃修倉解餉兌漕種種有費大半入官胥之橐而小民傾家敗産甚且流離死徙矣更有劣衿蠧棍包攬代充議貼銀一二百兩不等此輩竟爾中飽且包納錢糧多勒耗費不肖官吏倚為腹心指一派十通同分肥故鄉愚視里役為畏途而衿蠧以里役為生涯也夫充當里長之累不過一里一人猶係一家哭而經蠧包當魚肉花戸則係一路哭矣年深嵗久長此安窮前已通行禁革并頒限串之法令花戸自封投櫃完即給串歸農如有抗欠始行摘比一應錢糧并漕鳯米豆悉令官征官解永禁里排催交領解之弊但此法利於民而不利於貪墨之官吏利於急公之良民而不利於包攬之棍蠧再行嚴示刻石立碑永永禁止此後如有仍踵陋習者本官即行嚴參胥役立拏處死二十八年江蘇巡撫都御史湯斌檄免義租項下撫院書役公費儀徵縣知縣馬雲升詳定合府照糧派差二十九年桃源縣知縣姜友之請倣照清河縣例嵗助夫役部議報可五十七年儀徵縣知縣陸師清核單夫積弊附清單記略儀邑地介江淮斥鹵沮洳土地瘠而生齒繁其民皆舎本而逐末且衢通數省水陸舟車差徭絡繹額設夫馬疲於奔命官不能應遂取辦於民視其貨物多寡行戸肥瘠給單認差輸錢應役名曰單夫牙餉例不著於正供縣官解府主其出納以雇募應差即周禮市㕓之征宋時王安石所行雇役錢是也至康熈甲寅年經費不支以此項充正餉而徭役無辦仍以單六里四應差既征其賦又役其力加以蠧胥包攬催頭指公科斂單民始大困矣康熈丁酉師下車咨訪疾苦即禁革迎接長夫復不惜百日之勞逐單釐剔按户查差瘠者減之肥者増之逃亡故絶者除之毋攙奪毋朋充每户印發牌帖懸於其門應輸單夫牙餉書之於牌行以類聚單以類分其銀令民自封投櫃凡單頭小催從前借名侵蝕者槩行禁革又皇木皇竹寡婦進京牽輓等差預借庫銀應付輸餉時令民每差附投錢一文於櫃有不足則官自補苴又舊例隔嵗一濬運河單民苦之查漕艘過儀嵗額一千六百餘載鹽艘循環往来嵗額數千餘載乃集紳商公議挑費商輸其六單里民各輸其二去其大甚單民之苦庶少甦矣夫事茍利於民當亦後之君子所樂於舉行者也今将以徵去因單民之請謹書而勒之石康熈戊戌三月日記雍正元年總督查弼納嚴禁混簽丁差附江浦縣碑記略雍正元年江淮興武二衛領運千總董撫遠等詳請将黄快三則間竄等丁一併編查簽運時督院查黄快三則閒竄等丁與屯丁雖皆明季各衛食糧操軍然快丁者當時分撥領駕黄快差船故名快丁因不識水性每丁貼銀三錢雇人代駕至聖朝定鼎革除各丁糧米仍征快丁銀兩閒丁者乃明李衛所世襲後裔因無差使於順治十三年間分為上五錢中三錢下二錢三則納銀故名三則閒丁竄丁者乃從前革運歸農旗軍亦納竄丁銀兩至於領運之屯丁不惟不納銀兩且有贍運屯田即江興二衛屯丁無田贍運者支領駕運錢糧則多於外衛向来有領運掛欠及死亡事故先儘本户屯丁内殷實簽頂如無殷實堪簽方准於别戸簽頂總在屯丁戸内並無簽及黄快三則閒竄之例蓋屯丁之内豈少殷實祗縁經簽運弁賣富差貧因及黄快等丁欲為添出生涯至運丁之視領運為畏途者以接頂疲丁船隻或代賠遺下漕欠及透支錢糧或代賠造漕船其累已多又有經支旗丁為幫之霸将合幫丁船應支錢糧總歸一人支領銷算其下領運諸人知每船支給之數者猶不致盡為侵扣若新簽領運之丁不知名下應領若干任其侵扣随意付給以致漕運之費不敷變産賠墊即間有略知其數者經支旗丁又揑造浮費開銷二三年間殷實之丁亦成貧丁矣此簽選之實弊也縁此批發江糧蘇糧兩道查議作何立法於屯田戸内秉公簽選剔除賣富差貧更名復運之弊再運丁支給錢糧時應令衛升逐船具領到道該道按名親給本丁自領勒石嚴革經支漕蠧以免侵扣其革運疲丁遺欠應賠之項照例著落原丁追賠不得混勒新丁承認仍刋給新丁應領一切錢糧易知單票則殷實之丁亦不視領運為畏途多方規避矣至該弁等不思剔弊反将納賦黄快等丁一併編查簽運壟斷之謀深可痛恨并合嚴加申飭兩道奉此轉行到縣合行勒石永禁九年總督尹繼善禁革江寧里圖貼差附尹繼善牓文為釐定里圖派貼永蘇民累事照得上元江寧二縣地當省㑹每圖按甲輪當糧户派幫陋費整萬盈千名為大貼小貼由耒已久皆係猾里奸胥互相勾結恣肆侵漁從前雖屢經禁革皆未能正本清源條分縷析至今公私交混上下因循本署部院恨積弊之未除憫小民之受累悉心確核徹底清釐其必需實費酌量存留一切濫費全行裁革即不得已之公事亦皆設法承應不許復取之里民亦不許復取之縣書以免因端藉口院司道府㕔各衙門書役舊有縣役餽送陋規亦一概全革以防舊弊復萌此番立定章程務期實力遵守爾糧長吏胥須知法在必行行期必力切勿陽奉隂違自投法網爾無知百姓切勿受人愚弄自損脂膏所有應存應革條款開列於後曉諭城鄉仍刋木牓豎立縣前倉前垂之永久毋違食應存項下一該縣户書經管冊籍文案紙張飯等項在所必需應准每圖貼銀四兩計六十五圖共貼銀二百六十兩其餘全行裁減一本圖管冊每年查造額征銀米細冊紙張飯食等項在所必需應准每圖貼銀二兩計六十五圖共貼銀一百三十兩其餘全行裁減燈一縣令為親民之官據報衣箱馬踏看堂扛擡籠火把支更等項每日約需夫十名每名雇值三分應准每圖貼銀一兩六錢六分零計六十五圖共貼銀一百八両以上三款每縣共存輪年大貼銀四百九十八兩應革項下一全革漕糧南米貼費上元縣銀二千九百餘兩江寧縣銀三千九百餘兩米一千二百餘石查漕糧南米聽花戸各自赴縣完納其應交之費已經定有章程極為省減不許混入大貼里長重價包交一全革上元縣代交南豆之弊查南豆原係正供應聽花戸赴縣自納不許混入大貼包交一裁革江寧縣冊書浮費銀九百一十兩寧一全革里歇貼費上元縣銀二千二百餘兩江縣銀一千六百餘兩查花戸完糧隨處住宿聽其自便何用里歇盤踞勾引作奸滋弊宜行嚴禁違者立拏處死一全革上元縣每年春冬備席㑹糧銀七百餘兩查係糜費應行節省兩一全革催差盤纒貼費上元縣銀七百八十餘江寧縣銀一千三百兩查在官人役承應辦公分所當為即頑戸抗糧致被差拘亦係一人之事何得欽累及通圖候一全革承值院司道府㕔各衙門及差經臨伺執事夫役上元縣銀六百三十二両江寧縣銀一千四百五十二兩查在省各衙門執事應令各衙門人役自值需用水火打掃等夫應牌接動養㢘自備過覔清書應設法辦理其拜詔等項應動校尉力士支剰工食臨時雇用巡城秋審欽差各大人到省及祭祀行香迎禧迎春等項應動府屬走遞夫皂工食臨時雇用扛擡行李卷箱等項應令遞運所水旱承當至科場三年一舉應動公銀辦理均不許派之里圖取之縣書以省苦累以上共革上元縣銀九千一百七十餘兩江寧縣銀一萬六百七十餘兩米一千二百餘石此後或将已革之款揑辭再取或於革款之外藉名另派嚴拏治罪斷不姑寛慎之凜之江南通志卷七十六
