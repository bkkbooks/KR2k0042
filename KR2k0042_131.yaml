body:
  text: 江南通志卷一百三十二選舉志舉人八康熙二年癸卯科共七十八人馬晉錫六安人金作鼎全椒人胡士著江寧人吳本立常州人張哲華亭人諸定逺崑山人張瑾江都人汪虬繁昌人秦𢎞常州人劉楷南陵人曹有光績溪人張英安慶人顧奕榮長洲人侯麟勳無錫人邢開雍當塗人丁熙無錫人韓戈揚州人程文彝松江人龍光望江人劉鑣鎮江人吳一蜚長洲人賈良璧高郵人鄭橋生邳州人歸允肅常熟人喬萊寶應人秦巨倫常州人魏康孫繁昌人鄒嶧山陽人阮士鵾江寧人謝文運溧水人陶虞揚全椒人張其翰無錫人張琴泰州人楊務興化人任光世舒城人荆衍穀丹陽人朱陶江都人田龔商安東人王廷謀涇縣人殷鼎髙郵人胡開生涇縣人周爰訪吳江人淩印華五河人于棟如金壇人倪長犀贛榆人沈攀吳江人劉謙吉淮安人史繼鰌江都人張琦潁州人顧梅太倉人顧嗣旦蘇州人盛彰靖江人鮑允隆常州人王頊齡華亭人宗範如臯人賈其音高郵人李欽式金壇人吳山金壇人顧書常熟人王家相徽州人白彥良武進人管父才崇明人丁人傑通州人王履同無為州人劉始恢山陽人裴天錫江隂人汪士裕江都人任文煒溧水人陳菁江寧人陸坤長洲人陳哲廣德人汪懋麟江都人周邦鼎吳縣人梁于淇南陵人劉長發揚州人張楷江都人章世德池州人王賔揚州人北榜陳鼎元通州人朱虹吳江人陳啓貞儀徴人何朝宗通州人黃礽緒崇明人曹禾江隂人張世綬松江人張光第江隂人李銘溧水人吳元龍松江人楊珂武進人汪德新歙縣人劉賔廷長洲人李元圃海門人趙廷圭常熟人越闓本姓江江都人康熙五年丙午科共六十三人儲方慶宜興人顧芳菁吳縣人吳苑歙縣人程式琦揚州人董誾吳江人儲善慶常州人徐煥龍宜興人儲振宜興人王曰會溧陽人魏麟徵溧陽人任昌溧陽人唐勳潁州人王家棟金壇人荆元鑨丹陽人項亮臣歙縣人孫炅太倉人高文思潛山人龍雲澍當塗人陶敬江寧府人趙統溧水人賈延懿太倉人彭士右儀徵人黃其代江寧府人林翹太平人謝玉成祁門人史逸孫鎮江人張玉履泰興人髙爾公武進人施翊寧國人李鳴鳯南陵人項龍章徽州人徐石芝通州人汪浩然歙縣人王掞太倉人詹宇寧國人梁浩之揚州人錢瀛登丹徒人顧智丹徒人羅秉倫江寧人周如璋丹徒人盧肇坊淮安人繆錦宣吳縣人張星鎮江人徐羽儀淮安人于漢翔金壇人金維寧上海人陳二酉長洲人夏聲六安人支憲蘇州人梁湘之揚州人張循陔揚州人王兆熊淮安人陸在新長洲人田鋐泰州人余恭休寧人許承家江都人趙國權江隂人戎正中句容人吳標崇明人梅鋗宣城人楊言書常州人莊搢武進人湯原振常州人北榜李錦江都人丁瑮長洲人張問達江都人葉燮吳江人程濬儀徵人許維楫武進人馬鳴鑾崑山人顧貞觀無錫人沈支炳武進人蔣伊常熟人施則曾無錫人吳守棨武進人王渼常熟人章耿光江隂人張玉裁丹徒人程邦傅歙縣人史逸嗣金壇人朱鴛鷺泰興人王錫眉金壇人康熙八年己酉科共七十三人牛奎渚揚州人張我抱揚州人許孫荃合肥人江之泗桐城人黃立太倉人錢三錫太倉人張寅寶應人任振世舒城人李天印崑山人畢天庚蕪湖人陳琮高郵人過于飛長洲人江允汭通州人朱世奕靖江人周世祥吳縣人趙申喬常州人陸虬吳縣人貢上元人姚宗仁繁昌人江同淇安慶人張新杼山陽人鍾于序溧陽人戴京生泰興人黃迪先歙縣人孟安世安慶人葉炳江寧人王元臣青蒲人朱廷鋐江隂人徐鳯喈金壇人徐紹孫泰州人邵亮工徽州人儲善閎宜興人汪陶休寧人程孟歙縣人陳天錫蘇州人王原祁太倉人吳瞻長洲人張惇寧國人葉蔭生揚州人宋鳯蘇州人許繼梃武進人顔象淳丹陽人張嵩齡吳縣人仇瑞麟宜興人何金蘭丹徒人沈復崑丹徒人荆洪楊丹徒人佴璿揚州人李廷弼貴池人王愷丹徒人吳履聲江寧人張祚如臯人金相玉高郵人薛渭英江隂人錢世熹五河人王度髙郵人郭昂寶應人陳昂霄吳縣人孟亮揆蘇州人季象雷揚州人劉大匡懷寧人吳文鎔常州人陳瑄髙郵人吳琇溧陽人曹于京鎮江人王孫驂泰州人徐天署常州人卞士𢎞丹徒人何琴雅宜興人李育英全椒人蔣彪儀徵人林鍾無錫人劉彥曉潁州人北榜惲啓巽武進人吳廷燮徐州人劉芳世江都人王錚金壇人鮑鼎銓無錫人宮夢仁泰州人朱雲吳縣人吳應協宜興人顧昌祚上海人顧需枚崑山人吳兆龍宜興人張集青浦人李葉興化人改名柟徐秉義崑山人徐人鳯武進人陸士炳常熟人於同麟潁州人周之貞武進人錢瓆常熟人顧汧長洲人施文熛常熟人康熙十一年壬子科共六十三人陸輿宜興人成康保寶應人王之瑚丹徒人程瑞蘇州人王康寶應人夏乾御崑山人顧焯嘉定人王一經泰州人張守上海人包咸吳江人芮超當塗人吳元臣常州人王司龍江都人顧洪善崑山人吳世杰揚州人周昉吳江人楊緑宣城人梁士建懷寧人項亦鑾吳縣人孫朝慶宜興人尚印調山陽人彭定求長洲人吳師洛如臯人韓竹天長人吳世基無為州人華勤無錫人王緝基青浦人張發祖丹陽人范協婁縣人史秉直江寧人崔學古寧國人錢二白常州人張啓印上海人陸象明太倉人本姓周程遠靖江人吳蘭歙縣人王吉武太倉人顧峵常州人陳悅旦高淳人魏夀期太平人金大成蘇州人梅子魁合肥人周烈廣德人施邦彥崇明人陳維城巢縣人盛樹亷江隂人陳啓文興化人徐世濓崑山人吳之騄儀徵人徐陟合肥人歐陽旭鎮江人王鳯孫溧陽人張睿淮安人黃學勤南陵人何綏來青浦人王廷棟儀徵人郳金書無錫人吳玭宜興人尤何吳縣人馬翀無錫人王允持無錫人夏迪忱廣德人丁宗閔當塗人北榜韓菼長洲人茅薦馨宣城人翁叔元常熟