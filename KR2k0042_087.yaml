石成化十年知州陳廷璉建明倫堂正德初副使栁尚義增置齋房號舍嘉靖十年制增啓聖祠建敬一亭貯六針碑各縣如之十三年知州魏頌重修後河決學基成沼隆慶間知州章世貞白於總河翁大立以永福倉址改建其後知州劉順之副使馮敏功畢其工漸復圮壞萬歷四十四年副使袁應泰移建左衛舊址天啓初河決水繞學宫外崇禎間文廟災兵道何騰蛟遷建於東察院國朝順治七年兵道胡廷佐倡修知州余志明學正談學凖訓導蔡尚廉踵成之康熙二十一年淮徐道劉元勳知州臧興祖遷建於府治之東州紳士張膽董成之四十一年知州佟國弼重修五十六年知州薑焯增修廟學規制始備雍正十一年州升為府以州學為府儒學崇聖祠名宦祠鄉賢祠各州縣學同銅山縣儒學與府共學以府訓導理銅山學事蕭縣儒學在縣治西南隅宋舊址在西北隅紹聖間徙置城東後為河水衝齧元至正間縣尹耶律廷瑞卜建於河西元末燬明洪武初主簿劉瑜重建正統十三年知縣栁新改造文廟正德十六年巡按御史寧欽移建於華嚴寺東嶽觀之地萬歷五年河決廟毁知縣伍維翰遷建於縣治之東四十六年知縣蕭學儼復遷於縣治之西南即今地國朝順治五年知縣祖永勳修而新之康熙四十九年知縣徐大生重修碭山縣儒學舊在縣治西北唐貞觀四年建宋元祐間邑人王惠捐資遷東北隅元大德十一年縣尹楊泰移建於漢高祖廟故址明永樂四年知縣郝玘重建正統五年知縣杜釗增修嘉靖四十一年河決學圮隆慶間知縣戴偉王廷卿相繼修建萬歷間知縣尚誠以其地汙下又易西華池北三十六年知縣熊應祥改遷今址國朝順治十四年知縣曽為履捐修康熙二十一年邑人陳鼎新重修六十一年知縣王晉重修豐縣儒學舊在縣治東金末燬元至正間縣尹郭瑄重建尋又燬於兵明洪武六年知縣曽本重建宣德後知縣闕膺張升鄺頤相繼修葺旋因水圮正德十五年知縣裴爵復建嘉靖五年又沒於水二十一年知縣李崇信創建於新縣治之東三十一年知縣徐􅕴復建於舊縣治之西北三十九年知縣胡義心又改建縣治東南國朝順治二年知縣顔玿教諭陳彝訓導江能容大修制度畢備康熙三十五年知縣李振教諭黃師晟重修拓東西基各數武雍正五年知縣魏學謐重修沛縣儒學舊在河東泗亭坊宋靖康中燬金大定間徙建河西元至正間復燬明洪武初知縣黃忠信重建永樂間知縣常瓘李舉賢增葺嘉靖八年河決學圮知縣王治易龍泉寺址改建四十四年再圮於水隆慶三年知縣白經改建明倫堂兩廡徙啓聖祠於廟東萬歷二年知縣劉順之捐修二十四年立作聖成材二坊國朝康熙二十九年邑人募輸重建各祠邳州儒學在州治東南創自宋興隆間元末燬明初判官裴珏重建成化間判官曹卿改建𢎞治間知州李文聰修葺嘉靖後知州高巖王德廣馬京踵修之國朝順治十年學正蔣曜孫大經復加修建康熙七年學圮十八年管河同知蘇嵋知州李纘宗與學正胡圭訓導許來惠改建於南隄之東先營廟殿二十年落成二十四年大水學正孟安世訓導許來惠隄障獲全二十六年知州孫居湜倡捐修造宿遷縣儒學舊在縣治東南元至正二十八年縣尹張彬創址元貞初縣尹蕭世榮成之元末兵燬明洪武二年縣丞方鐸重建永樂正統間歷有修葺成化五年提學御史謝選撤新之嘉靖末圮知縣陳嘉道重修萬歷五年復為河水衝齧知縣喻文偉改建於縣治之左睢寧縣儒學在縣治東南元至元初知縣王榮祖始建元末燬於兵明洪武六年知縣葉見泰教諭林德乾重建宣德末知縣衛鏞景泰初知縣張佇正德間知縣黃守濂劉景沂各增修嘉靖後知縣喬鎮徐密相繼修葺明季水圮國朝順治四年知縣殷嶽建正殿兩廡明倫堂八年知縣魏翰建櫺星門戟門康熙元年知縣馮缺麒建啓聖祠興賢育才二坊學制大備四年知縣石玫建青雲亭二十五年知縣謝乃實修三十七年知縣章之瑶教諭李嶫瑞重修太倉州太倉州儒學在州治西南明正統間巡撫侍郎周忱即水軍都萬户府第始建衛學𢎞治十年置州知州李端即衛學改州學築道山嘉靖九年知州陳璜建尊經閣十年制增啓聖祠建敬一亭貯六針碑各縣如之萬歷間知州丁永祚陳騰鳳相繼修葺國朝順治十七年知州吕時興重建尊經閣康熙二十三年學正李煜修正殿三十九年知州茹之增修兩廡及戟門五十年訓導曹培源重修雍正四年太倉州分設鎮洋縣以學正專理太倉州學事崇聖祠名宦祠鄉賢祠各縣學同鎮洋縣儒學與太倉州共學以太倉州訓導理鎮洋學事崇明縣儒學在縣治濠外東南隅宋嘉熙間嘗立書堂元始建州學至正間改遷明洪武初改為縣學正統成化間制度漸備嘉靖二十九年築平沙土城乃卜遷學三十年兵備道熊桴改遷於東街營建如初萬歷六年知縣何懋官又改遷於東南小教場十六年築長沙磚城知縣李大經又遷學於縣治東南天啓二年知縣唐世涵始遷今地國朝順治十五年知縣陳慎修葺康熙三年總鎮張大治知縣龔榜增修雍正五年知縣張文英重建文昌閣嘉定縣儒學在縣治南宋嘉定十二年知縣高衍孫建元元貞二年升州學明洪武二年復為縣學天順四年知縣龍晉大修殿廡築土山於學南名曰應奎成化間知縣洪冕白思明吳哲劉翔相繼修治嘉靖十六年知縣李資坤增修萬歷十八年知縣熊密夷土山之十七濬為潭名曰匯龍國朝順治十二年知縣劉𢎞德教諭王彬修建祠閣堂廨康熙六年知縣金敏修聖殿重建兩廡二十二年知縣聞在上增修雍正四年嘉定縣分置寶山縣以教諭專理嘉定學事寶山縣儒學與嘉定共學以嘉定訓導理寶山學事海州海州儒學在州治西唐貞觀四年創建元皇慶二年知州魏榮重建元末燬明洪武二年知州陳德輔重建𢎞治初知州趙廷圭大修後知州趙儒重修嘉靖十年制增啓聖祠建敬一亭貯六針碑各縣如之三十一年知州鍾嶽改建歲久漸圮國朝康熙十四年學正武威逺重修聖殿十八年訓導倪田玉重修櫺星門二十一年學正吳植重修兩廡崇聖祠名宦祠鄉賢祠各縣學同贛榆縣儒學舊在縣治東元燬於兵明洪武四年縣丞莫從敬遷於縣治東南正統三年知縣郭文中重修成化十四年知縣王舉重修嘉靖二十五年揚州推官符允中海州知州鍾嶽捐資修葺萬歷間知縣樊兆程徐應元相繼增修明季燬於兵國朝順治八年知縣穆爾謨教諭劉思問重建十三年邑人董宗鼎重建門廡康熙七年圮訓導章憲捐募修建十一年知縣俞廷瑞訓導章憲捐募復修兩廡沐陽縣儒學在縣治南洪武三年知縣馮益創建正德間燬知縣易瓚重作廟廡橋門庖庫堂齋號舍皆備嘉靖四年知縣蔣賜遷於縣治東萬歷三十三年教諭蕭鳴盛復遷城南故址國朝順治十年知縣王國泰增設奎星樓康熙三年知縣梁文煥增修七年學圮十二年知縣張竒抱重加修理附胡簡敬重修儒學記吾沐密爾東省泗水嶧山之間循車轍馬迹而覽其盛者往返祗旬日耳去聖人之居若此之近瞻其宫闕之巍峩禮樂之隆備車服俎豆之矞煌宜有所觀感而興起是以吾沐學制雖經遷改仍復故基考前者之經營其規橅結構亦差堪與鄒魯相望也自康熙七年地震學宫惟聖殿僅存其他堂廡羣祠以及數仞之牆皆蕩為飛塵碎礫致殿階之下雜園蔬而溷芻牧無復有籓籬之隔多士朔望揖父母師長之側不過露立須臾循故事而散春秋奉祀亦無所謂麗牲之石省濯之房寥寥籩爵數器以一簣出納之及行鄉飲酒禮主賓僎介草率拱揖於覆茆架木之下如此者已多歷年所三韓張侯以癸丑春蒞任首謁先師廟乃慨然集師儒多士謀之謂是一邑首善地奈何聽其荒落至此願捐俸以為之先都人士其多方贊成之於是鳩工庀材經營伊始即為久逺之謀亦似有神馬思車周回於泗水嶧山之間審其差等而著為心畫者既成功爰集鄉之博士弟子進而告之曰侯之為此豈特為崇廟貌侑神饗哉深望肄業有地以聖人所求乎已者求之多士爾侯且月給薪廪豐酒膳擬闈中題以校士躬為品題即士子之工制業取科名又未嘗不於侯是賴侯作人之功其可忘諸侯三韓人名竒抱號藏錦由貢士初任沐陽縣知縣通州通州儒學在州治東宋太平興國五年知州曽環始建於城東一里許乾興元年知州王隨遷學於東門內大觀間燬於兵紹興間判官方雲翼復建於舊址淳熙間又燬咸淳中知州馮弼重建元至正間將軍張𢎞綱建大成殿明洪武三年知州熊春增修正統九年郡人僉事陳敏千户陳瑄重修成化𢎞治間歷加修葺嘉靖十年制增啓聖祠建敬一亭貯六針碑各縣如之三十二年巡鹽御史黃國用命知州遊天庭重建尊經閣國朝順治二年知州唐虞泰重修康熙二年知州畢際有重修泮宫坊九年知州王廷機增修雍正二年知州白映棠重修五年知州李世喬捐修明倫堂舊有海門縣明嘉靖二十四年知縣江執創建儒學於縣治東今為海湖所齧城圮裁縣歸通州改為海門鄉學省崇聖祠名宦祠鄉賢祠各縣學同泰興縣儒學在縣治東宋紹興間建元季燬於兵明洪武二年知縣李秉直重建後漸增修正德間知縣鄭浙鼎新之嘉靖後知縣朱箎許希孟朱南雍高桂陳繼疇相繼修葺拓泮池增櫺星門石柱二曰江漢秋陽鑿大池曰鯤化池甃以石崇禎間導河入泮前鯤化池國朝康熙十二年邑人御史李振宜捐修二十五年教諭荆子邁濬池曰紺寒池築臺山上曰光霽臺如臯縣儒學舊在縣治東北南唐保大十年建宋紹興初遷於縣治西南元末兵燬明洪武三年知縣謝得珉創建嘉靖十九年知縣黎堯勳移建縣治東南萬歷後圮於風潮知縣鄭人逵修造始築宫牆易土以磚後知縣陳煥張星李廷材熊奮渭李衷純相繼修葺國朝順治十四年知縣崔鳳賓重修康熙十年知縣趙𢎞化重修貢生蘇世威董其役雍正十年知縣彭履仁教諭丁𢎞逺訓導慶翽重修江南通志卷八十八
