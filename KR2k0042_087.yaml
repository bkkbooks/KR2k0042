body:
  text: 江南通志卷八十八學校志學宫二松江府松江府儒學即舊華亭縣學址在南門內宋元豐七年知縣陳謐始議興學邑人衛公佐公望獻縣之東南地建之紹興中學舍始備元至元十四年縣升為府縣學因為府學至正間燬於兵同知顧逖重修明洪武間知府林慶創射圃於學後宣德間知府黃子威作兩廡屬於講堂主事李賢祐建觀德堂於射圃正統五年推官楊政建尊經閣提學御史彭朂立四齋𢎞治中毁於颶風知府劉璟重修正德間復壞知府陳威喻時先後修治殿堂廡閣四齋以及祠圃門廨坊橋之屬皆如舊焉嘉靖十年制增啓聖祠建敬一亭貯六針碑各縣如之萬歷間知府詹思虞崇禎間知府方嶽貢增修國朝順治十一年知府李正華重修明倫堂十六年教授周建鼎重修先師廟康熙二年知府郭廷弼重修戟門二十二年知府魯超重建啓聖祠雍正十年知府吳節民修葺正殿崇聖祠名宦祠鄉賢祠各縣學同華亭縣儒學始建於宋元祐中在今府學後玉帶河之陽端平間遷於河南及元改華亭府學復建縣學於舊址後燬於兵明洪武三年知縣馮榮奉詔立學始以邑人徐進義孰地構之在今府治西南後知縣周朗祝子憲相繼增飾永樂間壞於風雨知縣高宫重修正統成化間知縣李希容戴冕先後修葺嘉靖後知縣聶豹賈待問項應祥徐尚勳鄭友元歷年增修國朝順治十二年教諭王道光修文廟明倫堂門廡康熙十九年知府魯超捐俸重修郡紳施維翰助資三百兩教諭路序項亮臣董其事雍正四年縣分置奉賢縣以教諭專理華亭縣學事十年知府王喬林復修正殿明倫堂奉賢縣儒學與華亭共學以華亭訓導理奉賢學事婁縣儒學國朝順治十三年害華亭西界為婁縣因設學官而學宫未建也明年提學張能鱗議建學宫使訓導馮瑄擇基址未就至今與華亭共學雍正四年婁縣分置金山縣以教諭專理婁縣學事金山縣儒學以金山衛學為之明正統四年工部侍郎周忱奏立衛學於衛東北隅御史劉福嚴泉劉魁孟俊相繼增修𢎞治十一年指揮翁熊重建大成殿兩廡戟門飾聖賢像十七年都指揮王憲製祭器萬厯二十一年知府栁希點教授翁興賢重建國朝順治十五年巡撫張中元同巡按李森先學道張能鱗大修府學訓導黃中亨董其役金山衛學無官舊屬府學管理金山立縣遂改衛學為金山縣學仍以府學訓導理學事上海縣儒學在縣治東南即上海鎮學也宋咸淳中監鎮董楷作古修堂為諸生講學之所元至元中鎮升為縣即為縣學明洪武中同知王文貞修復學宫正統間御史彭朂蕭啓鄭顒相繼修葺萬厯間知縣敖選顔洪範吕濬先後增修規制大備國朝順治十八年知縣凃贄教諭曹忱重修康熙十年知縣朱光輝濬修宫墻泮水八十餘丈十九年知縣任辰旦重修啓聖祠及大成殿二十二年知縣史彩重鋪殿前月臺丹墀并儀門兩廡五十六年邑紳吳銓修正殿兩廡明倫堂雍正四年分置南匯縣以教諭專理上海學事南匯縣儒學在東門內雍正五年知縣欽璉建門墻堂殿書齋講堂畢備立溯洙瞻杏二坊而記之附欽璉碑記雲間之列縣者四縣各有學名公碩彥之由學而升者代不乏人才華經聖天子濟為海內所推地之賦役繁重視他郡倍蓰分縣御極之初念其為八而學亦隨之是南匯縣學之所由創也按南匯向為千户所在上海之東南隅有城屹如置將領以守之兵民雜處罕黨孰術序之美及升而為縣百度維新典常具備督學者羅其士而試之一歲之間補博士弟子員者若而人分儒官以任其事祭菜鼓篋之典鄉飲大社之文當以次舉行而黌宫闕如禮儀莫洽曷以蒸髦秀而樹之風聲璉奉簡命宰是縣不敢以興賢育才委為異人任經營籌度購民地若干畝於縣之東南境擇其址之爽塏者培大之建五楹旁列兩廡前設大門門以外為泮池施成殿橋於上橋之前則櫺星門樹焉繚以崇垣百堵皆作即其後為崇聖之宫講堂齋舍計日告成丹臒炳煥階戺砥平宫墻之旁翦其荆榛易之以桃李松檜嘉樹有蔭壁沼漣漪互相掩映山川秀靈之氣於是乎萃工既竣邑多士之繫籍於學者請璉志其事以垂不朽璉惟敬敷五教之命昉自虞廷論秀書升之法載在周禮君國子民教學為先歷漢唐宋元明以來莫或廢至聖昭代而文教倍隆自積六十年之久文思光被雲漢為祖仁皇帝涵熙樂育皇上嗣章暨位臨雍講藝圜橋門而觀聽者幾萬人文物登寶聲名之盛丕冒乎海隅日出之鄉遐陬僻壤里巷之儒罔不崇師考業以自淑矧為邑宰有宣化承朝廷以流之責而忍委巨典於草莽乎夫而外名必𨽻於經義取士操觚角藝之流國學生鄉校而後循序以登春秋之榜巍科顯仕胥從是出是學固多士致身之所自始也繼自今願多士益自淬厲朝夕奮勉經明行修挾其素所蓄積者以彚征雲路對䇿大廷彬彬乎文章道德之盛接踵代興前輝後耀足為邑之光華俾追念於創學者之有微勞而與其榮施則璉之所致望於多士者豈淺哉學官以上海學訓導理南匯學事青浦縣儒學在縣治南始於明萬厯元年知縣石繼芳用顧氏義孰立學光祿寺署丞顧正心捐資千金助之規制略備二十四年久雨學宫壞知縣卓鈿修葺國朝順治六年知縣王嶙重修康熙二十年訓導陳堂謀捐俸增修四十一年署縣事許鈺重修雍正三年教諭蘇鍾嵋重修四年縣分置福泉縣以教諭專理青浦學事福泉縣儒學與青浦共學以青浦訓導理福泉學事常州府常州府儒學在府治西隅南唐刺史李栖筠始建學宋太平興國初郡守石雄徙建郡治西南景祐三年詔許即廟立學賜田嘉祐間郡守陳襄增廣之崇寧初郡守朱彥建狀元坊於學南紹興間郡守俞俟闢四館以居學者淳熙中郡守林祖洽建御書樓藏高宗賜六經墨本德祐時燬於兵元至元間重建附張伯淳記皇帝踐祚之初制詔天下郡學完葺如法養士無田者官給凡皆尊孔子之道德至渥也然則學宫崇飾宜不在諸名山大川常祀之下常州故有學創於唐刺史李栖筠逮宋陳襄為守移置郡治西南地踞重河之會占金斗之勝毁於乙亥歲惟禮殿講堂巍然如魯靈光斯文有相如是夫二十年間葺未易完且廟與學混非所以肅觀瞻昭禮敬此固有志於道者所為歉然而未能遂也總管安豐吕侯師聖戾止當詔下之歲十二月祗若德意獨能視為先務以其狀白於廉訪副史王侯侯意同議合既得請於是審曲面勢計工度材修大成殿龕帳鼎新塑十哲像繪從祀逮階序一改舊觀廟與學始各得所既又剪榛蕪增建四齋室先賢有祠聽事有堂儲糧有廩闢兩廡而𢎞之凡創屋為間者四十有三即其故而完葺者不與焉如鑄祭器置書籍惟事事備先是學有田二十有六頃𨽻宜興之從善鄉歲入米二千石有竒久為僧舍豪家所奪求直有司十年不能決至是事徹中朝尋報可侯之有功於學大矣而猶以為未也一日語教授天台吳君宗彥曰殿有儀門冠帶所集摧腐將壓盍更諸必崇必敞乃稽古式市大木作門五間簷牙森聳輪奐翬飛學舍於是大備是役也經營於侯下車之始落成於元貞二年十月公餘督勵必躬凡費則撙學廩以給工樂趨事農不知役郡文學不有其勞歸之太守太守不自有而歸工部使者猗歟盛哉會伯淳謁告歸里文掾敘修建本末願紀其實於戲井田廢而阡陌封建廢而郡縣肉刑廢而鞭笞銅冶廢而楮劵猶可因時而行所必不可廢者學校也學校而可廢則倫紀於何明修齊治平之道於何而寄哉國家之所崇尚賢侯之所欽承而加之意者豈特為襟佩遊談之地哉矧毗陵為吳季子采邑禮讓遺化在人心者未泯也伯淳不量荒陋書以遺之明洪武初以師生附武進學肄業五年知府孫用始建大成殿戟門兩廡及明倫堂兩序并志道據德依仁遊藝四齋旁設射圃宣德間知府莫愚即射圃作觀德堂成化五年知府卓天錫復建明倫堂增置尊經閣於堂北嘉靖間制增啓聖祠建敬一亭貯六針碑各縣如之萬厯後知府劉廣生教諭汪會海先後增修改建天下文明坊國朝康熙元年教授郭士璟復加修葺二十四年知府祖進朝重修崇聖祠名宦祠鄉賢祠各縣學同武進縣儒學在縣治東南宋咸淳初知府家鉉翁即法濟圮寺改創宋末燬元附於郡學大歷間重建明洪武五年知縣董尚拓舊基建禮殿講堂改築櫺星門南向成化間知縣熊翀建東西樓尊經閣嘉靖後知縣馬汝璋茹宗舜晏文輝羅華衮相繼修理國朝順治十四年邑人楊廷鑑等重修康熙八年教諭王琰重修二十三年知府祖進朝重修殿廡二十九年教諭崔學古捐資續修雍正四年武進分置陽湖縣以教諭專理武進學事陽湖縣儒學與武進共學以武進訓導理陽湖學事無錫縣儒學在縣治南西水關內宋嘉祐間知縣張詵創建元初教諭虞薦發重建明洪武十八年知縣袁大興修建堂齋成化間同知謝廷桂盡撤舊學而新之國朝康熙九年知縣吳興祚重塑聖像二十四年知府祖進朝重建大成殿三十三年知府于琨修正殿兩廡戟門雍正四年無錫分置金匱縣以教諭専理無錫學事附明徐有貞無錫學先賢祠記古者學宫之有事則釋奠於其國之先師今學校之祀先賢蓋由斯義以起禮也然而其祀事有興舉與否則繫乎其人錫山儒學之祠創自宋季中祀龜山先生文靖楊公中立而以玉泉先生宗丞喻公子才遂初先生文簡尤公延之小山先生肅簡李公元德實齋先生文忠蔣公良貴配歷元至國初而中廢至是同知郡事河中謝君時芳乃復興之使來請記其事夫文運之所在即天運之所在初二程之學乎周子也宋運方盛於北吾道亦從而北及楊氏之學乎程子也宋運將徂於南吾道亦從而南此其所關係也大矣豈偶然哉自龜山傳之豫章羅氏豫章傳之延平李氏延平傳之考亭朱子考亭因是而集大成則斯道之有傳於今也實自龜山始揆其始雖天下之學祠焉可也獨錫山哉然中立寓錫山十有八年之久是猶錫山之人也矧錫山之人之學道也亦自中立始喻氏來自南昌尤氏來自閩粵而並家錫山延之學乎子才子才學乎中立所謂見而知之者李與蔣固皆錫山人也生喻尤之後而學則肩焉所謂聞而知之者其傳雖弗如考亭之盛而其人與學之正蓋無異焉若乃中立力斥安石熙豐更張之邪説子才力贊鼎浚炎興恢復之正論延之力陳道學之為是以釋孝宗之疑元德力辨汝愚之為忠以祛寧宗之蔽良貴力抑彌逺之惡而揚德秀了翁之善以啓理宗之明是皆有功於其國有功於吾道當時雖不能盡用其言然天下後世之公論不可沒也繇是而並祠于學又豈過哉金匱縣儒學與無錫共學以無錫訓導理金匱學事江隂縣儒學在縣治西南即宋江隂軍學熙豐以前僅以廟祀先聖學者肄業其中崇寧間大闢黌宇紹興五年知軍王棠更新之乾通紹定中知軍徐蕆顔耆仲相繼修葺元末燬於兵明初江隂侯吳良即舊址立學知縣吳志逺重修宣德間侍郎周忱重建大成殿及兩廡戟門後知縣周斌黃傳劉綋嶽凌霄相繼修葺國朝順治間提學石申張能鱗修之康熙十三年知縣何爾彬龔之怡教諭宗章埈重修二十六年知縣陸次雲重修附明陳芝英江隂學鄉賢説鄉有賢則祀之非賢不祀也江邑祀鄉賢者前有延陵季子後有李忠毅繆文貞兩公而其賢也著矣而其祀也確矣故謂江邑之崇祀無訛無濫或觀於此而得之也先是宋蔣待制靜明孫司業作俱在祀典𢎞治中知縣黃傅考論黜焉蔣以徽宗朝進瑞烏頌故孫以答性難説微偏故論者謂以兩先生之賢而一眚之不容如此則蘋蘩藴藻之馨香洵非無德而能幾此也今世無黃侯耳有黃侯其存焉者寡矣此歐陽郡公别有先賢祠之創而以為牛驥同槽祀之適以黷之也宜興縣儒學在縣治西南舊在縣治東南宋景德四年建皇祐初徙南興門外紹興五年增修附朱熹記紹興五年十二月宜興縣新修學成明年知縣事承議郎括蒼高君商老以書來請記而其學之師生迪功郎孫庭詢貢士邵機等數十人又疏其事以來告曰吾邑之學久廢不治自今明府之來即有意焉而縣貧不能遽給以其費乃稍葺其所甚敝亟補其所甚闕且籍間田五千畝以豐其廩斥長橋僦金七十餘萬以附益之為置師弟子員課試如法而又日往遊焉躬為講説開之以道德性命之旨博之以詩書禮樂之文使其知士之所以學蓋有卓然科舉文字之外者於是縣人學子知所向慕至於里居士大夫之賢者亦攜子弟來聽席下無不更相告語相勉勵而自恨其聞之之晚也退而相與出捐金齎以佐其役合公私之力得錢幾七百萬而學內外煥然一新堂塗門廡靡不嚴備象設禮樂皆應圖法蓋高君之於是學非獨其經理興築之緒為可書而其所以教者則非今世之為吏者所能及邑之人才風俗實有賴焉幸夫子悉書以告來者於無窮則諸生之望也子頃得識高君於會稽而知其賢今乃聞其政教之施於今者又有成效如此固已樂為之書矣而其邑之父兄子弟能率高君之教而有所興起皆知從事於古人為巳之學而不汲汲乎誇多鬬靡之習以追時好以取世資則又子所深歎而尤樂取以告人者也乃為悉記其語使後之君子有考焉抑高君之於此邑嘗新其社稷之位而并兆風雲雷雨師於其側以嚴祀事穿故瀆疏積水以防旱潦作社倉儲羡粟以備凶荒其所以事神治民之類能行其所學而皆出於至誠懇惻之意是以言出而人信從之蓋不止於講説之間然後以言教也嗚呼賢矣哉元至正間燬於兵明洪武初知縣謝德清移置今地正統間知縣鄒旦買民地以擴之成化間知縣沈振重修嘉靖初知縣何棟建尊經閣後知縣丁謹方逢時相繼增修萬厯十六年知縣陳遴瑋復建堂舍國朝順治十七年教諭丁允齡募修康熙十五年教諭顧智募修二十年知縣李先榮重修雍正四年宜興分置荆溪縣以教諭專理宜興學事荆溪縣儒學與宜興共學以宜興訓導専理荆溪學事靖江縣儒學在縣治西南明成化八年知縣張汝華建正德嘉靖間知縣周竒健殷雲霄易幹增修知縣趙應旟引泮池作九曲勢與南市河通泮南作崇墉高三丈廣倍之崇禎初知縣唐堯俞移崇墉於市河之南十年知縣陳函輝重修文廟國朝康熙七年知縣鄭重增修鎮江府鎮江府儒學在府治東南宋太平興國八年知府栁開創建於朱方門內寶元初范仲淹守郡乃拓而新之元祐宣和間知府林希毛友相繼修葺紹興九年燬於火知府程邁復營治劉子羽繼之大為興復元至正間修葺明初改建於定波門內景泰中知府張巖以學地卑隘復改建於縣治之東同知俞端竟其役建明倫堂及四齋於山之西廟廡堂齋橋門號舍厨庫射圃悉備大順元年知府林鶚建尊經閣泮池石梁成化間知府熊祐重建學門𢎞治中知府鄭傑作會講樓嘉靖十年制增啓聖祠建敬一亭貯六針碑各縣如之四十二年知府秦淦於學之正南因岡增土名曰對山隆慶萬厯間知府胡維新鍾庚陽吳撝謙王應麟先後修理天啓五年文廟燬巡按御史陸某捐資重建附吳寬重修府學記鎮江府之有學自宋歷元在府治之南國朝景泰間知府張侯以其地勢卑隘始東遷之至今五十年矣而頽壞已甚未有能修之者今兹鄭侯傑自大理寺丞來好文重士始謀以修學事移於巡撫都御史四明朱公公曰吾奉天子命以養民財固所當惜然以學校概視是不知務者即報使舉行侯又得承仕郎曹貴委之董其事貴勤敏而公財不妄費功成規制宏美觀者稱歎於是教授董宗道等具修學始末來請文刻石蓋學之設古制也自三代以至今日上下數千年其間未有能廢之者以聖賢之道不可廢而道明於此也然所以明於此者非明於學校之地明於遊學校之人則其人之寄亦重矣哉孟子曰君子不下帶而道存焉故廟而祀之洋洋乎如在其上如在其左右者非夫人也聖賢也聖賢者道之所在也誦其言求其道用於鄉使習俗丕變於一時用於世使德業大行於百世然後稱乎遊於此者此固朝廷崇儒之美意而有司之所奉行而不敢廢者也彼科第云者特假之以致吾身之階耳果足以為士子望哉故因記學之成而及之周洪謨禮器樂器記聖朝兩京國子監及天下郡縣皆廟祀孔子其肖像冕十二旒衣十二章祭器十籩十豆樂舞六佾今命籩豆增為十二六佾增為八佾始用天子禮樂以其制通行天下歷代以來尊崇孔子未有盛於今日者也然諸郡禮器則全而樂器則或未備惟鎮江府學禮樂器俱完禮器千餘皆範銅為之乃元至正十二年總管李中教授黃鏞所鑄豆二百七十二其蓋數亦如之爵一百三十九奠盤如爵之數簠一百二十其蓋一百一十六簋一百十九其蓋一百十五犧尊六象尊六常尊三龍杓三搢花之瓶大小八爇香之爐大小十六盥洗盆三毛血盤二諸器既完惟籩皆失舊常以豆之蓋代之今知府熊侯祐乃鑄銅為籩二百二十其蓋亦如其數竊惟古者祭器以竹以木以陶但竹木者易剝陶者易損故代之銅而圖其堅久也子往歲為南監祭酒始謁廟釋菜而見磁爵之缺者甚多不勝悚懼遂遣人赴饒州製補之夫以太學奉帝命以行禮者其器尚如此况諸郡縣乎用銅雖非古制而李中輩所鑄歷三百餘年之久皆無少窳其視捖陶之剝損者則美惡判矣樂器亦當時所制銅鐘二十一石磬十六琴十瑟四以及笙管柷敔之類靡不畢備熊侯與其僚同知伍侯琇商榷以為前人所製固美恐其久而或忘乃寓書來求豫筆諸石以防疏虞且約典守者必嚴出納教授訓導但一秩滿者雖素不司管鑰必白於郡會諸師生審驗之而後去於戲誦遺經以出身者感聖恩如天地且愧不能報稱於區區祭器儻不能守又何顔入禮殿乎雖然此禮樂之器耳而行斯禮必本之敬奏斯樂必本之和故孔子嘗曰禮云禮云玉帛云乎哉樂云樂云鐘鼓云乎哉異時承祀之頃肅肅雍雍儀節不爽音律克諧仰瞻聖賢之靈如在其上如在其左右則必來格而歆享矣抑禮樂本之心體之身者豈但感乎神而已雖達之以道家國天下而無不理焉則凡為治者其可不務禮樂之本而推之用乎國朝順治初明倫堂圮知府塗廓捐資買楊一清御書樓改建康熙十一年知府高得貴重修二十七年知府王燕重修雍正七年知府毛德琦重修崇聖祠名宦祠鄉賢祠各縣學同丹徒縣儒學舊在縣治西宋崇寧以後圮附於郡學紹興中知縣趙學老復建元延祐六年教授朱天珍重建明洪武初以淮海書院併入正統間燬巡撫周忱重建天順中知府姚堂鑿泮池設門廡立儒林坊成化中巡撫牟奉建尊經閣𢎞治末知府王存忠拓廟基建德配天地道貫古今二坊嘉靖初提學御史蕭鳴鳳以廟學湫隘遷於夀邱山南麓國朝順治十三年知縣張晉倡修康熙八年教諭王天璧談志相繼修葺二十一年知府高龍光於學後纍石築墻以護龍脈雍正七年知府毛德琦重修丹陽縣儒學在縣治東宋慶厯間建建炎中燬紹興時知縣吳芑重建乾道六年知縣陳玠撤而新之寶祐初知縣胡夢高又新之元因之明洪武中知縣鄭士源許子英董復昌潘綏相繼修葺後知縣周志義包達陳誼先後增修𢎞治間知縣高謙移櫺星門於泮池之南嘉靖六年知縣張鳳翀鑿渠導湖水繞學宫南纍土為案山隆慶三年同知馬豸又開城西水竇引湖水繞之國朝順治十七年知縣賀應旌重建尊經閣康熙十二年教諭蔣士偉重修兩廡五十二年邑人潘鐸葛任義殷聖莊共捐資修正殿重建啓聖祠兩廡櫺星門金壇縣儒學在縣治東宋紹興初知縣李枀重建元至元元年知縣于淵增修至正間燬於兵明洪武初知縣蔡原臣重建建文四年知縣孫時撤兩廡戟門而新之正統八年知縣劉訓撤明倫堂為東齋因重建明倫堂成化嘉靖間知縣劉觀張賓董相縣丞鄧繼曽相繼增修鑿泮池為三石梁萬厯十一年知縣許𢎞綱重修三十二年知縣邵應貞乂闢地新之國朝順治十一年知縣趙介重修知縣宋􅉅踵成之康熙九年知縣康萬寧教諭許允成增葺雍正四年邑紳士募修教諭盧翀董其事溧陽縣儒學在縣治東南宋淳化間知縣夏侯戩建於縣西門外皇祐四年查宗閔徙於今地建炎末撤屋為營紹興以後相繼修葺而齋廡堂殿始備元升為州學創尊經閣後毁於兵明初知州林慶復創建焉永樂十一年重修天順中燬明倫堂獨存成化中知縣員賢漸次修復十五年知縣陳福改明倫堂制度嘉靖間湯虺馬一龍增修國朝康熙五年知縣徐一經重葺文廟淮安府淮安府儒學在府治南門內宋景祐二年轉運使魏廉建建炎間燬於兵嗣後屢建屢徙淳熙十年知府王詗始仍故基重建嘉定八年知府應純之大新學制元凡四加修治明洪武九年知府潘傑重修正統七年知府楊理增修天順成化間知府邱陵楊昶先後增拓學地𢎞治六年知府徐鏞建尊經閣官師廨舍俱備十七年巡撫張縉建興賢育秀二坊嘉靖十年制增啓聖祠建敬一亭貯六針碑各縣如之萬厯後知府陳文燭宋祖舜相繼修治國朝順治九年漕撫沈文奎重修康熙十八年總河靳輔捐俸修理二十四年淮揚道高成美捐俸增修雍正六年知府申程章修大成殿十年教授黃施鍔修明倫堂崇聖祠名宦祠鄉賢祠各縣學同山陽縣儒學舊建於滿浦坊尉司地元至元間遷於舊酒庫橋南至正時燬於兵明洪武初知縣羅傳道改建於察院西景泰初塑四配十哲像成化五年巡撫滕昭知府楊昶復拓地建廟學制與府略同𢎞治後知縣樂頀周好山黃日敬田孔陽相繼修葺天啓四年知府宋祖舜知縣孫肇興重修國朝康熙二十四年總漕徐旭齡知府高美修理櫺星門雍正六年教諭王熙載復修九年分置阜寧縣教諭訓導未分阜寧縣儒學即廟灣鎮舊學以鹽城訓導理學事鹽城縣儒學在縣治南宋紹興間知縣黃萬頃建自宋至元凡三燬於兵明洪武初知縣陳天瑞重建永樂景泰成化間相繼修治正德初知縣王明徹重修嘉靖間知縣薑潤程葉露新先後修葺萬厯九年知縣楊瑞雲增修國朝康熙十年教諭張星軺募修三十三年知縣武臯修聖殿兩廡四十八年知縣馬化蛟修文昌樓儀門五十三年知縣盛𢎞邃修明倫堂雍正二年知縣于本宏修文昌樓敬一亭七年知縣孫蔭孫修明倫堂清河縣儒學宋德祐初建於舊縣之西大清河口景定元年河決縣遷治甘羅城學隨之元末燬明洪武初知縣孔克勳改建於縣治東南小清河口正統五年署縣事知州李信圭天順時知縣盧寧修成化後提學陳選張縉以次修造知縣劉慧作泮池而橋之正德中提學張璿建櫺星門講堂號舍嘉靖間知縣吳宗吉加葺隆慶間知縣張惟誠重修天啓元年河決學宫遂圮三年教諭高崇榖遷於舊基西北數十步以逺河患漸次增造國朝順治六年教諭閻補宸加修康熙十二年訓導朱彝復修十七年知縣王登龍重建啓聖祠及兩廡十八年增建尊經閣二十七年知縣管巨培甬道以達儀門三十年大修五十九年署縣事王三謙重修尊經閣六十年知縣郎燦重修明倫堂雍正九年署縣事戴昕重修正殿桃源縣儒學在縣治南元縣尹劉整建後燬於兵明洪武初知縣汪仁重建正統景泰間知縣張端趙紀增修𢎞治後知縣崔獻李廷鵬黃時康王敬賓曹夔相繼修葺萬厯間知縣華存禮龔奭重修國朝順治十四年知縣鄭牧民重修康熙七年圮十九年知縣萬謙教諭史逸嗣訓導劉蕃募資修建四十九年知縣田養民重修大成殿明倫堂兩廡雍正七年知縣眭