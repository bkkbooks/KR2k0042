body:
  text: 江南通志卷一百九十一藝文志史部正史地志編年雜史傳史評職制周齊語一卷世傳春秋外傳左丘明作非也大抵皆其國史左氏收取為春秋傳根抵耳今按齊語多見管子中必管仲所作吳語一卷吳亡後吳人述其事作者名逸越絶書外傳記卷末有隠語云以去為姓得衣乃成厥名有米覆之以庚為袁康二字書為袁康作也康臨淮人字文術或曰字文伯其書有經子貢作有内傳吳平作其外傳與記乃三國吳書五十五卷吳雲陽韋昭吳書薛綜竹邑人晉吳越春秋削煩楊方漢書鈔三十卷句容葛洪後漢紀六十五卷薛瑩綜子吳書三十卷陽羨周處吳録三十卷吳人張勃晉紀四卷吳郡陸機晉紀十卷譙曹嘉之南北朝漢書註一百二卷宋吳郡陸澄晉書一百十卷齊京口臧榮緒通史四百八十卷梁武帝漢書註一百十五卷梁元帝後漢書一百卷晉史草三十卷齊書六十卷俱梁南蘭陵蕭子顯齊典十卷梁湘東世子蕭方等晉書一百十卷梁蘭陵蕭子雲梁史十卷梁姑孰周興嗣陳書四十二卷陳吳人陸瓊梁書陳書三卷俱陳華亭顧野王梁典三十卷陳鬵人何之元梁典二十卷後周沛劉璠唐漢書古今集二十卷蘇州顧允武漢書辨惑三十卷江都李善史通内外四十九篇彭城劉知㡬史例三卷劉餗知㡬子南唐十三代史略貴池頁鴻夏鵬宋東漢通史五十卷丹陽翟汝文羣史編八十卷蘇州王綯五代記七十七卷吳郡孫冲兩漢刋誤補遺十卷崑山吳仁傑十九史目二卷無錫杜鎬五代會史江隂耿秉南唐書五十卷宜興馬令按此書舊入霸史今從李燾以繼後唐為三唐十七史䝉求十七卷江都王令重修南北史一百七十卷祁門方岳左氏兩漢南北史綴節寧國陳天麟元西漢會要平江徐天麟宋三朝摘要平江秦玉宋史略十六卷周才自浦城遷吳十七史纂婺源胡一桂通鑑總論婺源潘榮明宋史詳節諸史撮要俱江寧沈越兩漢紀長洲黄姬水二十一史纂長洲孫忠南北史摭言長洲錢榖遼金史纂九卷吳縣楊循吉二十一史選駁吳江孫履恒宋史增定新編常熟許重熙厯代序略補遺常熟錢世揚紀事本末顧文亨二十一史意抄華亭包節十七史獵俎華亭徐孚逺太史史例一百卷史記彚十卷俱上海張之象續文獻通攷二百九十八卷青浦王圻史記通表二卷青浦徐三重元史舉要武進陳濟厯朝史纂左編一百四十二卷右編四十卷稗編一百二十卷俱武進唐順之十七史摘竒休寧金瑶兩漢禁臠唐書管豹俱婺源張聘夫諸史彚編一百二十卷太倉金燫宋史纂通州成文友季漢書歙縣謝陞增廣二十一史約編俱宜興陳維岱相道編十卷荆溪任䝺二十一史約金壇史逸裘正記一百二十卷江都費宻文獻通攷鈔三十卷江都史以甲班馬筆記桐城方亨咸厯代年表厯代世系攷俱桐城姚士堅右正史宋通鑑筆義華亭葉汝舟通鑑要覽六十卷通州崔敦詩資治通鑑綱目五十九卷朱子編年六朝事蹟婺源張敦頤編年通紀婺源王炎資治通鑑事類十卷國史要綱二十卷俱廣徳沈虚中元宋鑑提綱無錫陸以道通鑑綱目集覽望江王㓜學厯代編年婺源胡一桂明通鑑記事前編江寜沈越通鑑大全解六合孫近仁通鑑綱目集覽精約長洲戴冠世統紀年六卷吳江徐師曾通鑑贊斷四十五卷通鑑節略俱常熟丁奉資治通鑑補二百七十卷嚴衍厯代通略常熟許重熙紀元要覽崑山方鵬正綱目通鑑崑山歸子顧綱目易覽綱目節評俱華亭王鑄史綱纂要華亭吳稷歴代甲子二卷青浦徐三重宋元資治通鑑一百五十七卷甲子會紀五卷俱武進薛應旂通鑑集覽正誤武進陳濟宋元綱目八十卷武進陸簡元史提綱武進葉䕫稽古編大政記綱目八卷資治上編大政記綱目四十卷資治下編大政記綱目三十二卷俱丹陽姜寳綱目訂正大河衞楊伯柯綱目發微三十卷揚州王峰厯代紀元二卷儀徴髙日廣厯年甲子圖太倉金􅖌紀元備攷通州陳世祥史鑑會編歙縣唐皋通鑑博論二卷漢唐祕史二卷俱休寜朱權史鑑㨗衡婺源江懋竒通鑑綱目攷異祁門汪克寛三唐編年貴池吳非宋史編年斷略吳孟堅續通鑑綱目廣義十七卷青陽張時泰綱目提要石埭桂標史綱彚説建徳江杏綱目前紀繁昌謝九成史綱抄合肥王寖大通鑑纂要懐逺方燦資治通鑑輔義定逺黄淮甲子圖廣徳姚啟宗國朝綱目分註拾遺溧陽芮城厯代帝王世紀儀徵徐濓綱鑑會通泰州陳志襄厯代年表桐城姚士堅綱目管測歙縣程𢎞志通鑑纂婺源潘文楚讀史紀年表寜國汪越右編年漢楚漢春秋徐州陸賈新國語五十四篇彭城劉向分國語列士傳二卷列女傳十五卷列女傳頌一卷俱劉向三國海内士品一卷魏文帝獻帝春秋吳廣陵袁暐洞紀四卷自伏羲至漢建安吳韋昭吳先賢傳四卷吳陸凱晉良吏傳十卷隠逸傳十卷俱句容葛洪聖賢髙士傳三卷譙人嵇康竹林七賢記二卷譙人戴達曹氏家傳一本譙曹毗南北朝江左名士傳一卷徐州先賢傳贊九卷俱宋臨川王劉義慶任子春秋宋杜崧孝子傳三卷宋京口徐廣雜傳十九卷齊吳郡陸澄續洞紀一卷齊京口臧榮緒孝子傳三十卷帝譜十三卷境内十八州譜六百九十卷俱梁武帝按十八州譜唐志作七百十二卷係王僧儒所撰孝徳傳三十卷忠臣傳三十卷顯忠録二十卷同姓名録一卷懐舊志九卷全徳志一卷丹陽尹傳十卷俱梁元帝東宫新記二十卷梁蕭子雲齊梁拾遺漢書文府俱梁蕭琛普通北伐記五卷梁蕭子顯三十國春秋三十一卷梁湘東世子蕭方等西京雜記梁吳均托名葛洪棲鳯春秋五卷梁京口臧嚴髙隠傳梁阮孝緒梁皇帝起居注皇徳紀武帝實録三卷俱梁姑熟周興嗣徐州人地録二十卷後魏彭城劉芳隋鑾駕北巡記三卷蔣州諸葛頴唐武徳貞觀國史四十二卷太宗實録俱平江顧允武吳郡陸氏宗系譜一卷陸景獻陸氏英賢記三卷吳郡陸師儒小名録一卷蘇州陸龜䝉建中實録凌煙閣功臣傳秦府十八學士傳宰輔録七十卷俱羲興蔣文義興蔣氏大宗碑一卷蔣冽蕭梁史譜二十卷江都蕭穎士狄梁公家傳三卷江都李邕廣陵烈士傳華鬲太上皇帝實録髙宗復修實録俱彭城劉知㡬國朝舊記三卷彭城劉餗列女傳秋浦胡楚賔五代南唐烈祖開基志十卷王顔䢴溝要略十卷吳録二十卷俱廣陵徐鉉記楊吳事古今國典一百二十卷厯代年譜一卷俱廣陵徐鍇宋江東十鑑上元周煇南唐近事録一卷江表志三卷俱鄭文寳本朝人物志平江孫緯進讀事實五卷蘇州王綯神宗聖訓十卷長洲林虙范忠宣言行録三卷不著名蓋其家子弟所録范太史遺事其子范冲記陶淵明杜子美年譜各一卷崑山吳仁傑靖康傳信録張忠文節義録一卷建炎進退志建炎時政記近世厚徳録一卷奉迎録俱無錫李綱廣州十賢贊一卷蔣魏公古今逸史二十卷俱宜興蔣之竒按之竒所輯逸史凡數百卷兵火散佚其曾孫芾摭拾成此書江淮異人録二卷鎮江吳淑古今忠孝集三十卷鎮江陳龍輔韓子年譜一卷丹陽洪興祖政和大理入貢録一卷維揚周邦唐元和朋黨録維揚馬永錫囘天録一卷秦湛記吕好問事英宗實録三十卷髙郵孫覺太宗實録新安錢若水唐史撮要歙劉伯諶前後漢紀歙舒雅名臣言行録朱子前漢六帖六十卷宣城陳天麟宗澤行實十卷宣城吳柔勝江南録貴池湯悦昭明事實二卷貴池葉楠翠微南征録貴池華岳戚里元龜石埭王磁北史記事十二卷無為王遘黙記七朝國史穎州王銍元餘史傳江隂梁益先覺年譜宋季雜傳俱歙方囘忠孝集歙汪逢辰厯代通略四卷休寜陳櫟節孝録休寧黄一清厯代帝王傳授圖説休寧倪士毅厯代人臣正邪龜録二百卷婺源戴焴梅宛陵年譜一卷宣城張師愚明國史獻徵録一百二十卷遜國忠節録八卷俱上元焦竑國寳新編上元顧璘續宋論上元蔣誼征黎始末一卷上元姚履素金陵人物志江寜陳鎬嘉隆見聞録十二卷江寧沈越明文獻録一百卷史流十品一百卷俱江寧司馬泰明殷遺録應天張烈明世法録九十二卷壬午書二卷俱長洲陳仁錫召見紀事一卷長洲申時行江南經略長洲鄭若曾江海殱渠記一卷九朝野記一卷俱長洲祝允明吳中名賢記一卷長洲王賔庚巳編長洲陸粲姑蘇名賢小記長洲文震孟姑蘇名賢續記定陵註略先撥志始六卷俱長洲文秉吳郡獻徵錄長洲朱存理逸民傳二卷長洲皇浦濓續髙士傳十卷長洲皇甫涍貧士傳二卷長洲黄姬水中州名賢文表長洲劉昌繼潛録吳郡張田宋系統圖二卷吳縣王行遜國史及宋遺民續録古吳文獻録俱吳縣許元溥吳中往哲記吳縣楊循吉明獻實四十卷吳中先賢傳十卷俱吳縣袁裘震澤紀聞二卷吳縣王鏊壬午功臣爵賞録一卷别録一卷俱吳縣都穆宋元遺事二卷吳江陳理禦倭武略二卷吳江周大章舊京遺事二卷吳江史元同里先哲記吳江吳驥明代臣略十二卷常熟瞿汝説朝局分合紀事常熟顧大章軍興善後録常熟孫朝肅明右史略三十卷常熟先賢事略十卷俱常熟馮復京三吳文獻志常熟趙用賢常熟文獻備攷厯代名言摘懿俱常熟王夢鼎節義林前後集讀史景忠録四卷俱常熟桑瑾常熟文獻志常熟管一徳玉峰文獻録林下紀聞俱崑山顧潛西臺紀聞崑山周倫正徳南巡録崑山周震崑山人物志八卷崑山方鵬崑山人物志十一卷崑山張大復明代紀録明史稗俱華亭俞汝為明史類記華亭張以誠萬厯事實纂要三百卷華亭董其昌明史宬補輯名臣琬琰録一百十卷俱華亭楊豫孫幽貞録一卷華亭董傳䇿雲間紀事野史倭亂遺事俱華亭鍾薇吳淞甲乙倭變志二卷華亭張鼐逸民史二十二卷華亭陳繼儒周文襄公年譜華亭顧清北還録一卷南巡録一卷俱上海陸深峰泖先賢志上海張所敬陸文裕年譜上海陸楫班管録上海戴士鼇近代人物志先哲金石録名臣琬琰録俱上海董宜陽明事林廣記青浦張誼稗史彚編二百二十二卷青浦王圻明憲章録四十六卷明人物攷七卷隠逸傳二卷髙士傳四卷俱武進薛應旂明琬琰録武進徐紘毘陵人品記武進毛憲孝苑武進陳組綬忠義録景賢録俱武進葉䕫靖難忠節録無錫周繼昌國朝故實二百卷日録見聞中書直閣記一卷俱無錫周子義撫湖政要安楚録俱無錫秦金補毘陵人品記無錫吳亮東林諸賢言行録無錫鄒期貞忠鏡録無錫馬世竒桑梓録十卷無錫顧憲成九居士傳無錫顧冶邵文莊年譜天完録俱無錫髙攀龍髙忠憲年譜無錫髙世寧使三輔録一作三輔紀略無錫施夢龍國史舉領二十卷宜興陸萬里樞督相左機緣一卷戎車日記一卷俱宜興許徳士忠貞合璧宜興許有榖忠節録宜興吳儼守湖輯要治苕八法俱宜興路進埭溪文獻録金淵孝友録溧陽人物記俱溧陽史學神光兩朝淮郡實録山陽楊于臣淮安文獻志山陽潘塤維揚人物續志鹽城張榘廣陵耆舊傳江都陸弼名賢記事一卷江都曹守真江都人物編江都葛澗革除録泰州儲洵吳中人物志十二卷儀徴張昶維揚人物志儀徴黄瓚續髙士傳徐州李紹芳苻秦書十五卷太倉王士騏嘉靖以來首輔録八卷名卿紀績六卷史料前後集一百卷國朝紀要十卷天言彚録十卷明琬琰録俱太倉王世貞召見紀事一卷太倉王錫爵東吳名賢記八卷太倉周復俊節孝録一太倉秦約一武進黄俊全陜政要録嘉定浦鋐澄江政略嘉定徐時勉世廟識餘録十二卷嘉定徐學謨疁城救時急務録嘉定侯峒曾丙丁雜志嘉定侯岐曾平倭䇿一卷通州張鳴鶴通州名宦鄉賢攷通州顧磐孝貞録泰興張金明經濟録歙縣黄訓定西録歙縣唐澤歴代諸臣傳贊歙縣余棐宋紀受終攷新安文獻志一百卷宋遺民録十五卷俱休