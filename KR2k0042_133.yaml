  text: 江南通志卷一百三十四選舉志舉人十雍正元年癸卯恩科共一百二十九人王晉原泰州人劉登五江寧人萬大本武進人曹宇涵金壇人費夢魁江寧府人孫天佑當塗人張鵬翀嘉定人程之銘江寧人方騫歙縣人薛周常州人陳祖范昭文人潘思矩武進人黃飛龍常熟人蕭昌泰興人姚紉吳江人徐鐸淮安人陳夢文江都人曹守垣金壇人胡與高黟縣人汪作楫婺源人錢人麟武進人王繩曽無錫人王一槐宣城人李東櫰句容人曹家擁金壇人徐觀魯常熟人胡金蘭松江人李音儀徵人孫戴髙郵人方于珣南陵人葉舒榮歙縣人史貽儉溧陽人翁伊通州人徐鳯彩丹陽人萬橚宜興人于隆光江都人蔡謹上元人金正秋休寧人錢志遙江都人唐進賢含山人王紹正貴池人蔣之蘭揚州人蕭徹懷寧人周熺無錫人顧月化揚州人蕭學書寧國人彭昌言懷寧人徐名臣銅陵人蔡綺蘇州人張景祁長洲人邵蘭一宜興人劉敻江寧人勞世沅安慶人袁銑崇明人汪中鵬崑山人程錦歙縣人郭沅江都人徐自新贛榆人胡以熊如臯人陳纘泰州人王庭諍全椒人任啓運荆溪人楊紹曽武進人林嘉客髙郵人徐宗元江寧人成敬恕寶應人王天煥婺源人葉嘉桂歙縣人鮑源江浦人陳士醇吳江人史應兆江都人王丕烈青浦人過炳蚪無錫人李彛兹揚州人李譽含山人吉士松江人朱季衛宜興人沈濤江隂人倪爾琰淮安人顧惟舟豐縣人姚培仁華亭人朱玨江都人吳承武進人吳翺青陽人張於朝寶應人汪波江寧人髙􅟭合肥人蘇國矩合肥人王筠含山人馬振民沭陽人徐彥超吳縣人姜日章丹陽人狄豸祥溧陽人張大鈞宜興人陸翥宜興人唐琯青浦人馮恕丹徒人吳明試貴池人崔遜迥通州人莊松承常州人金澤茂全椒人吳善㑹涇縣人顧名興化人陸嵩太倉人黃蘭谷休寧人王鴻睿山陽人鄭材和州人徐戊常熟人王朝選上元人張基崶和州人潘偉徽州人沈楹上元人湯顯忠江隂人倪學詩當塗人陸宏緒蘇州人史貽簡溧陽人王兆佐黟縣人鄒都寶應人儲元升常州人于鵬上海人解樽興化人侯嗣達無錫人丁思顯髙郵人宋玉琮吳縣人顧超崇明人徐文靖當塗人薛錫社吳縣人薛紱安東人王殿顯金壇人北榜黃簡武進人戴瀚上元人華恆泰無錫人史大鯤宜興人史曽期宜興人徐崑武進人于辰金壇人徐軒上元人繆集泰州人張泰基太倉人張國綱常熟人曹廷襄當塗人沈淑常熟人朱鎮青浦人陸慶元無錫人張亦塽吳縣人本姓方胡香山如臯人曽善繹常熟人張尹耀吳江人周頤元宜興人董霈贛榆人莊樹嘉武進人潘果無錫人劉中樞金壇人顧廷桓長洲人喬汧寶應人王文充儀徵人曽敦復常熟人王峻常熟人蔡應龍金壇人林令旭婁縣人陳仕任吳江人徐常柱武進人羅人傑儀徵人盧豪然宜興人陳符江寧人邵錦潮大興籍長洲人雍正二年補行癸卯正科共九十九人吳紱常州人張特進江都人金愷蘇州人程恂休寧人胡啓淳寧國人錢本誠太倉人徐元肅上元人趙國藺含山人許祖耀宜興人陸岡齡太倉人謝有輝長洲人金士震常州人莊臨常州人孫朝甲宣城人馮頎金壇人楊方達武進人唐濓長洲人程班松江人吳鏊常熟人吳超宜興人湯諧武進人卞枚儀徵人史流馨鎮江人陶正靖常熟人張䕫儀徵人過秉鈞無錫人王孝緝蘇州人葉居仁涇縣人黃兆熊溧陽人湯亨咸宜興人顧昌華亭人周大璋安慶人鄒嶽淮安人周霈吳縣人林儒宗儀徵人王化久如臯人孫中髙郵人江育玘丹徒人顧預嘉定人章台涇縣人陳嶽華亭人孫濩孫髙郵人陳志洛徽州人秦宫璧武進人方愈儀徵人杜枝金山衛人吳雲垗上元人張釗吳縣人張紹家滁州人沈雅髙郵人李仙植儀徵人汪雲棟寶應人彭楠溧陽人王雲鶴天長人賈霖無錫人鄭瑜婺源人黃斐然溧陽人潘渭熊溧陽人何本思儀徵人何如樞丹徒人潘景燾儀徵人金銘太倉人胡楠含山人張若潭安慶人徐桂聯蘇州人王遇歙縣人洪之霨歙縣人孫承祖全椒人秦勇均無錫人楊居丙江浦人鄧世杰蕪湖人毛既豐上元人范芝宜興人葉承青浦人顧維鑄無錫人劉謙江都人林廷標當塗人許集吳縣人繆琬泰州人薛龍濟江隂人胡承琰涇縣人張陳典嘉定人馮元欽長洲人宫建極懷逺人丁𢎞逺潛山人曹輯五常州人金士仁歙縣人劉方藹宣城人吳𢎞文婁縣人梅裕長宣城人周龍章上元人葛為衮和州人王瀛仙上元人胡慰髙上元人吳濤青陽人潘世芳如臯人韓孝潔長洲人劉應淮潁州人楊自怡常州人北榜朱良裘上海人劉寶應人李錫秦金山衛人姚焜桐城人錢基無錫人周欽宜興人徐聖崑山人王英常熟人葉滋松江人孫元珍吳江人黃宫武進人楊長泰武進人喬汲寶應人沈元陽長洲人本姓謝陳綱宿遷人李廷友婁縣人徐世瀚崑山人金應元上海人仲鼎龍泰州人趙錫孝常熟人方正玢桐城人柏謙崇明人葉一泓吳縣人姚湘桐城人于大猷金壇人張紹懿華亭人趙永孝常熟人史瑗溧陽人韓光曾長洲人王廣成金壇人彭鳯溧陽人顧維鈁無錫人馮元鏞吳縣人蔣學淳武進人邵錦旗大興籍長洲人雍正四年丙午科共一百四人黃淮銅陵人陳晉揚州人吳端培宜興人瞿媚兹武進人顧駿宜興人趙浚吳江人錢尚善常熟人陳福太倉人朱士鈺全椒人淩士錫太倉人葉筠歙縣人樊紹仕丹徒人宋辰溧陽人湯新俞太平人汪宸扆儀徵人王洛安慶人孫煒文上元人張廷櫆常州人曽聞勇廬州人陸熿開常熟人王命申常熟人唐冠賢含山人葉誠婁縣人胡汝華歙縣人汪衡無為州人葉𢎞遇吳江人徐塤長洲人屈軼懷逺人蔡德晉無錫人劉敬祖南陵人李榮裕廬江人周溥太平人胡承詵涇縣人蔡曰珩上海人周天式蘇州人李幹齡建德人梁觀我揚州人程之銓江寧人奚𢎞成常