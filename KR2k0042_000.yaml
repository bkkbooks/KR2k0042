body:
  text: 欽定四庫全書史部十一江南通志目録地理類三都會郡縣之屬首卷世祖章皇帝詔諭卷一聖祖仁皇帝詔諭卷二之一聖祖仁皇帝御製卷二之二世宗憲皇帝詔諭卷三之一卷三之二皇上詔諭卷四之一輿地志圖説第一卷至第三卷建置沿革總表第四卷建置沿革表第五卷至第八卷星野第九卷疆域第十卷山川第十一卷至第十八卷風俗第十九卷城池第二十卷至第二十一卷公署第二十二卷至第二十四卷關津第二十五卷至第二十八卷古都邑第二十九卷古迹第三十卷至第三十六卷壇廟第三十七卷至第四十二卷寺觀第四十三卷至第四十八卷河渠志黃河第四十九卷至第五十三卷淮第五十四卷至第五十五卷江第五十六卷海第五十七卷運河第五十八卷至第六十卷水利第六十一卷至第六十二卷水利治績第六十三卷至第六十六卷食貨志田賦第六十七卷至第七十三卷户口第七十四卷至第七十五卷徭役第七十六卷漕運第七十七卷至第七十八卷關稅第七十九卷蘆課第八十卷鹽法第八十一卷錢法第八十二卷蠲賑第八十三卷至第八十四卷積貯第八十五卷物産第八十六卷學校志學宫第八十七卷至第八十九卷書院第九十卷試院第九十一卷武備志兵制第九十二卷至第九十四卷江防第九十五卷海防第九十六卷驛傳第九十七卷至第九十八卷職官志文職第九十九卷至第一百十卷武職第一百十一卷名宦第一百十二卷至第一百十八卷選舉志進士第一百十九卷至第一百二十四卷舉人第一百二十五卷至第一百三十四卷薦辟第一百三十五卷至第一百三十七卷人物志名賢第一百三十八卷宦績第一百三十九卷至第一百五十卷武功第一百五十一卷至第一百五十二卷忠節第一百五十三卷至第一百五十六卷考義第一百五十七卷至第一百六十二卷儒林第一百六十三卷至第一百六十四卷文苑第一百六十五卷至第一百六十七卷隱逸第一百六十八卷至第一百六十九卷藝術第一百七十卷至第一百七十一卷流寓第一百七十二卷至第一百七十三卷方外第一百七十四卷至第一百七十五卷賢淑第一百七十六卷義烈第一百七十七卷至第一百八十一卷完節第一百八十二卷至第一百八十七卷貞孝第一百八十八卷至第一百八十九卷藝文志經部第一百九十卷史部第一百九十一卷子部第一百九十二卷集部第一百九十三卷至第一百九十四卷雜類志紀聞第一百九十五卷至第一百九十六卷禨祥第一百九十七卷托史紀事第一百九十八卷至第一百九十九卷辨訛第二百卷臣等謹案江南通志二百卷國朝兵部尚書兩江總督趙宏恩等監修先是康熙二十二年總督于成龍與江蘇巡撫余國柱安徽巡撫徐國相等奉部檄創修通志凡七十六卷雍正七年署兩江總督尹繼善等承詔重修乃於九年之冬開局江寧以原任中允黃之雋等司其事因舊志討論潤色刋除蹖駁補苴罅漏凡閲五載至乾隆元年書成督臣宏恩及江蘇撫臣顧琮安徽撫臣趙國麟等具表上之卷首恭録上諭及御製詩文以尊謨典次輿地次河渠次食貨次學校次武備次職官次選舉次人物次藝文次雜類發凡起例較舊志頗有體裁惟纂輯不出一手微有抵牾黃之雋􅝓堂集中嘗稱是書刻本與原稿多有舛互如灊山在六安州之霍山而仍謂即元時所置之潛山縣黃積程元時俱東晉時新安守而誤入西晉其他遺漏重復者甚多皆之雋離局以後為他人所竄改者也司馬光修資治通鑑以史記以下屬劉攽三國以下屬劉恕唐以下屬范祖禹始終不易其知此意歟乾隆四十四年十一月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀欽定四庫全書江南通志原序臣以庸鈍備員楚北今年春恭荷恩綸調撫吳會星言束裝順流趨事抵姑蘇方匝月復蒙皇恩授臣兩江總督臣正慮才不勝任會所司以江南通志一書具詳進呈御覽臣於簿書繁冗之會分隂校閲拜手而頌曰皇哉煥哉我聖天子同文之治誠曠古而一覯者也臣生逢唐虞三代之時獲事堯舜湯文之主竊覩威德文章車書玉帛之盛去嵗準禮部咨奉旨催修湖廣通志隨檄督所司刻期告成臣揚言於簡端因剞劂未竣先以抄寫本帙咨部今祗命來吳更見江南勝槩臣何幸也臣固陋不文曩昔辦事中祕出入郎署仰窺經筵巨典聖學天行兹於吳楚之間益藉志乘全書廣見博聞私心彌切踴躍惟是江南為財賦重地其江山之挺秀河海之扼要人物之英多典章制度之紛繁郡邑稱名之沿革以及幽光濳德風俗土産傳聞異詞記載各别搜羅考核較之他省實為最難斯編薈萃周詳類序嚴慎以備一統之採擇以揚扢聖代化成之萬一不尤為黼黻太平之盛事也哉至董厲討論者則臣成龍臣國柱臣國相之力也臣涓埃未效樂觀厥成謹稽首為序以獻時康熙二十三年嵗在甲子夏六月榖旦總督江南江西等處地方軍務兼理糧餉操江兵部右侍郎兼都察院右副都御史臣王新命謹序江南通志原序我皇上御極二十有二年癸亥禮部奉旨檄催天下各省通志限三月成書臣成龍承乏兩江總督應董其事江西去臣駐劄江寧千有餘里乃檄署江西巡撫布政使臣張所志草創送臣審定送部其江南省通志則臣成龍與江蘇撫臣余國柱安徽撫臣徐國相徵屬府州縣新舊各志及先儒先賢著述論建之有關地方應備採拾者開局江寧延聘在籍儒臣及文人宿學通達治體諳悉典故者編纂稽考甲乙次第而臣成龍臣國柱臣國相且相與親為討論焉并董厲在局諸臣就明繼晷敏皇將事計六閲月而書成共七十六卷而臣成龍以職掌所及當有以序其簡端竊見九州之土宜貢賦載于禹貢中古文尚簡質不事詳贍其後周官職方氏所掌與禹貢所載體制不同而秦漢所收列國圖籍時久世逺莫可較訂嗣後或有所述出自一隅一事不足傳信即陳沂楊慎所撰山東四川通志亦稱善本又皆私自屬草體例未純皇上乃渙大號申巽命先取各省之志以成一統之志正欲於衆中求其詳於繁中舉其要夫修志之役必始於縣縣志成乃上之府府薈集之為府志府志成上之督撫督撫薈集之為通志通志歸之禮部然後輯為一統志于是無所不該山川貢賦土産人物之類無所不偹上下數千載使之瞭如目前然則通志之舉其事不綦重而為之不綦難歟且江南之視各省纂集雖均而難易懸絶何也各省通志原有成書而江南絶無所本事屬創始未易周匝雖窮搜博採豈無絓漏其難一也孫吳六代以逮明初其經國大猷代各異制披尋史乘浩如煙海旁考别紀乂多舛誤稽辨雖勞詎協至當其難二也江左人物甲於四方偉人駿烈尚多遺佚至於節孝隱逸悉存姓氏既恐淆雜欲裁訛濫慮沒幽濳其難三也所見異辭所聞異辭紀載嵗月逺於春秋虞初雜志任情好惡志家之體無容疑誤並存裁量之能豈盡銖黍不爽其難四也大江左右僑立州郡分𨽻不常命名變易考往已多無徵凖今何由參核其難五也而臣等又以迂踈不學之才兼以簿書塵冗之苦短綆汲深曷能勝任唯是祗承詔旨與同事諸臣共詳其慎纂集成書或止足以備一統之採輯而未敢自信為良史也顧臣成龍自䇿名入仕仰見聖治右文皇上單詞隻字皆足與詩書典誥爭光逮及備官畿輔聞見益親近又與江蘇撫臣國柱共事撫臣國柱久在禁庭身依紫極常語臣成龍皇上以天縱之姿好學稽古講筵詰難燕聞辨問多發先儒之未發宵旰之暇考核異同披覽得失未嘗旦夕釋卷頻命詞臣有所纂著皆足昭垂千載山至於髙則拳石出雲水歸於深而淵泉不竭臣等幸託唐虞之盛世依附臯益之末光使朴僿鄙陋之所纂輯得備崇文內庫之目以垂不朽臣等實有榮幸焉是為序時康熙二十三年三月望日總督江南江西等處地方軍務兼理糧餉操江兵部尚書兼都察院右副都御史臣于成龍謹序江南通志原序我皇上以英睿天縱之姿契精一危微之旨而稽古好學盛治右文木天禁近既夙備馬班燕許之才復舉博學宏詞之科拔其尤者並居祕府俾與侍從諸臣纂修會典明史諸書以成一代之鴻文典册且於二十有二年詔取各省通志尅期進呈以備通志之採輯此誠古來採風問俗之遺徽而國家政孚化洽之實效也臣輔竊惟國之有史所以紀事而昭信自馬遷創為紀傳表志之例分列成書號稱良史後代因之而輿圖地志於是備載天下之山川星野貢賦人物典章制度之類遂為紀乘所必需今聖天子特渙綸音亟命搜輯宣付史館蓋有以也江南為各省之首區疆域開廣形勢蟠踞負山海而控楚豫襟長江而帶大河其聲名文物財賦物産皆甲天下以數千里內數千年間之建置沿革山川風土事物人文之屬咸欲於志乎是備纎悉勿遺此其事誠重而為之也誠難幸督臣于成龍撫臣余國柱徐國相暨藩臬諸臣董率其事聘諸儒臣文士編纂考校不數月而志以成臣輔名列監修例得揚言以附簡末但臣以不敏待罪河干頻年以來拮據奔走躬親畚鍤奉職不遑當兹盛典未獲操觚從事惟是臣職司河務今觀於志即以水利言之江南境內如黃淮二河則自髙寶以迄蕭碭如大江則自東流以至靖江延袤數千里間按圖而索其中形勢之曲折郡邑之牙交地名之詳審與夫沿海之墩汛瀕湖之港瀆莫不條分縷晰瞭若指螺志之於水也其詳如此則其他之所載稱是可知此雖督撫藩臬諸臣董率之功與儒臣文士編摩之力然而非我皇上殷殷圖治宵旰靡寧致使薄海內外車書渾一崇文敷德留意千秋則又安能立成大一統之規模蔚然備美以垂不朽之盛事哉臣輔既獲身與共球之際會且幸名依臯益之末光謹沐浴拜手而為之序時康熙二十三年七月朔日總督河道提督軍務兵部尚書兼都察院右副都御史臣靳輔謹序江南通志原序古者諸侯之國有史以紀時事墨子所謂百國春秋是也然皆紀言紀動而已自史遷創為紀傳表志之法歷代因之而括地志之類即遷史志例别為專本於是人物山川典章制度纎悉靡遺焉皇上御極二十有二年臣國柱準禮部咨奉旨催修江南通省志臣與督臣于成龍安徽撫臣徐國相及時趨事務求詳確志成臣成龍既記其嵗月乃纂修諸姓名書之簡端矣臣國柱有共事編摩之役安得不一言以表昭代崇文之盛竊見國家鼎建兩京之外分省一十有四而江南最為重地通志一書視各省纂述為難蓋國之大計以財用為根本而江南田賦之供當天下十之三漕糈當天下十之五又益以江淮之鹽莢關河之征𣙜是以一省當九州之半未已也神京東北運道數千里一線長河淮泗交下黃流澎湃遷決泛濫亦時間有而聖朝聲教逺被扶桑槃木江南所統安東以南三河以北浩瀚汪涵黏天浴日帆檣出沒不可紀極上下兩江旅舟商舶絡繹奔湊菁華所萃風氣鬱發文章政績抱瑾懷瑜之士蜚聲騰實肩隨踵接仕宦科名皆為諸省之冠且鍾阜石頭六朝遺迹建置沿革紀乘淆訛而臣等操數寸之管勾稽薈綴部次爬梳欲其絓漏無譏有當良史足稱我皇上乙夜之披覽不其難乎臣國柱自備官郎署改授掖垣洊歷卿二旋副中臺奏對彤扉趨蹡丹陛親見我皇上以天縱英姿勤學好問圖書典籍不離左右聽覽餘間考訂翻繹未嘗旦夕少輟蓋以睿智詰謀之聖性遙契危微精一之聖心推行之為政治而昭垂之為文章以上接堯舜禹湯文武道統冇非臣下所能蠡測管窺者故於郡國方輿亦所留意因命修一統志先之以各省通志是將以考山川厄塞歷朝興廢之所由焉紀士風民俗之貞淫焉稽秸􅖽絲枲徭征之繁重墳壤之腴瘠閭閻貧富民生之疾苦焉臣等所為黽皇詳慎宵旦不遑以底成書兾無負此盛事也往明初修一統志出自宋濂諸人皆一代名儒然紀山川則詳於名勝而略於形勢敘建置則但存名號而不及廢興詞賦之資有餘而問於大指未備其後陳沂楊慎陳善郭子章之流號稱博綜究皆私家紀述非奉詔纂修故體未純偹至若江南前代所傳如南部煙花吳地廣記金陵琑事之類益復細碎無當紀乘臣等仰奉綸音博收肆採詳核約存雖才識寡陋聞見淺隘然而紀載辨考不敢稍忽刪繁搴要類聚部居為圖表以著星野輿地之形為分志以見天文禮樂車服之度為備考以悉職官選舉田賦匠作之詳為列傳以録名臣巨儒忠孝節義之大為藝文以載古今著述體尚之全為雜著以補聞見流傳之失統計共若干卷數千里之內數千年之間舉凡隆替盛衰險易得失貞淫休戚諸大故一開卷而瞭若指掌鑑古可以知今觀風因而設教具在是矣惟是江南省志從無定本今則合各郡志之繁雜成於三月之定限擇焉不精語焉不詳所謂腹儉者難為華質固者難為通此又臣國柱與督臣成龍守此戰戰也謹薰沐拜手稽首而附陳志事之始末有如此云是為序時康熙二十三年正月望日總理糧儲提督軍務巡撫江寧等處地方都察院右副都御史臣余國柱謹序江南通志原序粵稽禹迹之在天下也南紀居三條之一而聖人所以經理南條者曰九江孔殷曰震澤底定蓋由海門達吳會皆其殫力注措之地江有上下治同一源意當日功參造化教被方隅文物度數之整齊土田兵農之區畫必有一正俱正一定俱定者故吳頭楚尾吳根越角悉𨽻揚州則壤既同其所率由無不同也然則應瑗所云千里不同風者豈三代以前之論乎興朝德邁九皇治超隆古而經理南條仍按禹迹之舊於海門震澤設兩撫臣以鎮之臣國相備員上遊毖飭嚴疆已經七載初至則猶楚氛震鄰時嚴斥堠鳳泗瘠壤多不逢年既而皇威遐播四境寧謐吠犬無驚恩恤屢霑磽確之區均歌含哺臣於是登皖峰望三吳不禁欣然曰美哉鬱蔥佳氣東南之化域而財賦之樞機也陳詩納賈以觀民風此其時矣歲癸亥適逢皇上俞禮部之請催取各直省通志臣同督臣成龍撫臣國柱廣延宿學揚𣙜紀乘刪繁補闕裒舊益新閲六月而江南通志告成竊念臣所轄者七郡三州也宜乎見聞親切莫先於是顧金陵處吳會之中臣昔職掌承宣於錢榖出入外凡吳地造化之所鍾靈方隅之所扼要暨土田兵農之位置文物度數之敷施蓋居省會時已習知其大同矧復叨鎮撫咨詢閲歷不啻加詳今從兩臣後殫力編摩鋪陳典制目張綱舉有脊有倫信乎海門震澤江分上下治同一原也抑臣嘗考禹會諸侯於塗山執玉帛者萬國山經海志皆益稷諸人載筆以成迄西漢盛時天子登灊山封為南嶽紀功頌德作盛唐樅陽之歌二者在皖濠間皆臣部內事也臣乏通經作頌之才而與萬國共球之會則亦已榮踰益稷其於漢臣歌盛唐者何有哉是編進呈得蒙御覽固東南之幸而尤私賀微臣之克逢盛典也爰沐浴拜手而為之序時康熙二十三年三月望日巡撫安徽寧池太廬鳳滁和廣等處地方提督軍務嶽部尚書兼都察院右副都御史加十三級臣徐國相謹序江南通志原序粵稽周官小史掌邦國之志外史掌四方之志用以周知天下山川風土職貢官師謡俗之宜此志所由昉也逮其後郡國有圖經風土有記方輿有考良為知古知今識大識小之藉大都出於學士之記載草野之傳述雖淹洽舊聞弗足鋪揚巨典洪惟我皇上治定功成登三咸五而尤體國經野為兢兢爰敕纂修會典彚為一代章程并修一統志以徴四方文獻各省通志同時並輯而江南雄長諸省地亘江淮扼荆楚而接中州環瀛海而引閩越洵寰宇之要區國家之外府聲名文物之淵藪其托拾固不可不詳考核尤不可不謹先是總督臣于成龍巡撫臣余國柱徐國相廣稽慎核業已編輯成書臣柱斗於甲子仲春謬承寵命弭節上江涖事之初適當剞劂告竣合繕疏恭呈臣敬捧閲側見疆域之分合而知綢繆之圖貴豫也户口之多寡而知休養之計宜先也風化之或淳或漓而知張弛調劑之弗可緩也賦役之為盈為絀而知催科撫字之當加意也至于求故實而悉制作之由稽懿徽而深仰止之慕一編之中罔弗備焉臣往者司臬皖城稍習知其山川風土職貢官師謡俗之概未遑搜遺舉墜比於小史外史勒為一編以彰聖世典章之極盛茲幸通志成日猶獲厠名其間因曉然古今沿革之故禮樂教化之原國計民生之大竊兾因時補救移易風俗以毋負皇上簡畀至意臣將奉斯志為繩尺而莫或遑息矣敢稽首揚言於簡端是為序時康熙甲子孟夏吉旦巡撫安徽寧池太廬鳳滁和廣等處地方提督軍務都察院右副都御史臣薛柱斗謹序江南通志序直省之有通志與古列國之有史同而輿地廣大則倍之古者列國或百里或數十里各自為境今車書一統一省連跨數十國之舊封而江南尤屬東南大省舊志修於康熙二十二年刻期告竣頗多缺略今將綜府州縣志及歷年卷册所載詳稽核考訂故增新合為通志役亦重且繁也雍正七年欽奉世宗憲皇帝諭旨彚萃成編上之職方備一統志之採擇蓋其述之往者採自史傳增諸後者據事直書為他年史氏之徴信故凡子史百家之書購求必備州郡志乘印册檄取必詳𨽻上江者安徽藩司主之𨽻下江者江蘇藩司主之督撫大吏延聘纂修鑒定董成殆六年於兹矣臣於雍正十年督漕蘇松十有三年移臬安徽適當修志之時上下兩江咸得協理其事與觀厥成見二百卷之中恭紀誥諭宸章如讀帝典大訓敬述河渠方略如覩地平天成若賜復蠲租豁減浮糧以及漕運積貯諸大政紀載詳備而人文之盛節烈之竒户丁之繁物産之豐雖江南山川靈秀風上清淑異於他省而實可想見我朝重熙纍洽之休漸涵樂育之久以馴至於斯也今者伏遇我皇上龍飛御宇澤遍遐陬蠲免江南積年逋賦以千萬計他自關稅鹽課浮羡暨一隅一邑田賦雜稅稍有不便於民者咸豫豁除特開恩科廣增解額分闈校士加意作人皇仁洊至有加無已若陽春布澤率土同滋而雨露之濡潤南國者為倍渥焉此又臣親覲其光而樂揚其烈者也鴻猷廣被成憲光昭垂之簡䇿猗歟休哉矧聖聖相傳殷勤南顧其加意於此一方者固大書特書不一書而足也軫念乎風俗之浮靡則詔諭頻頒時切返淳歸朴之警也洞悉乎郡縣之繁劇則升析周詳具見體國經野之宜也河防之整理則泛漲無虞而徐泗淮揚俱享平成之慶也海塘之修築則洚洞安瀾而蘇松常鎮各蒙清晏之休也溝渠之疏濬則蓄泄咸資而千里膏腴旱潦有備武備之規畫則塵氛永靖而大江南北雞犬無驚也而碩輔名卿景從雲集忠孝節烈德化風行以及才士名流咏歌贈答鼓吹休明無不以江南為最要皆沐浴於仁漸義摩之久而振興為有自也則此志之信今傳後者皆臣備官斯土以來所目擊心識而知紀載之不可不詳也寧僅星野輿圖之博考土冝物産之鋪陳禨祥瑞應之臚列而謂志之為用在是哉時乾隆元年嵗次丙辰仲冬月榖旦江南江安等處糧道布政使司參議臣王之錡謹撰江南通志序粵昔周官職方氏掌天下圖籍而辨其邦國都鄙與其財用榖畜之數以周知天下之利害蓋志之意肇於此逮班固作漢書著地里溝洫等志而志之名始立故後世有一統志列省有通志下而郡縣亦各有志聖祖仁皇帝御宇之二十二年武功底定海內乂安於是乎有修一統志之舉詔天下各修通志蓋將登諸天府用昭一王之巨典也上下兩江為吳楚名區幅員廣大實甲天下霸業皇圖沿革不一而我世宗憲皇帝睿慮周詳因革盡善江省之州升而為府者二為直𨽻者五縣之析而為二者十有七諸如墾荒田免浮糧指難悉數即鹽莢郵傳亦皆弊絶風清兹復恭逢我皇上紹承大統繼述前徽念江省為東南財賦重地寬恤之典優於他省當此仁風翔洽萬善偹臻之會通志一書脫不及時修輯吾恐久而不免於挂漏矣雍正七年詔在廷儒臣續修一統志直省督撫各修通志誠以通志為一統志之權輿而不容率略也今上下兩江督撫諸大臣悉經術通儒而司藩臬者又多文學之彥雖纂輯有人而討論修飾公餘不廢爰彚三朝之典故成此不刋之瑶編綱舉目張部分類别彬彬郁郁質有其文殆將與周官漢志並垂天壤臣之來江省也晚未獲與於斯役適逢告成之期得載一言於簡末因不揣固陋而為之序時乾隆元年嵗次丙辰孟夏榖旦整飭江南通省驛傳鹽法兼巡江寧道按察使司副使加二級紀録二次臣孔傳煥謹撰江南通志序乾隆元年丙辰夏四月臣斯盛蒙恩任安徽布政使司事時江南通志將次成書臣因得與編校之役搜遺補闕督趣集事又逾半載而告成凡二百卷其間輿圖田賦職官民物古今因革沿潤之宜略已大備煥然維新矣臣伏惟江南幅員廣逺安徽與江蘇分閫而治其地北薄虹靈南抵黟歙西界皖口控扼千有餘里財賦差半江蘇而江山厄塞形勢險固實為過之自春秋吳楚之世爭鍾離居巢州來為今鳳陽壽州廬州巢縣之地降及三國六朝孫氏之濡須祖逖之譙城韋睿之合肥世稱南北重鎮而元明之季潁亳英霍界連楚豫長江左右獨為隩區蓋山川隔閡疆界糾紛居東南轇轕之會而鈐轄阻深不盡如江蘇所隸廣谷大川平疇曠野彌望千里也地險民聚而富之教之又一道也我世祖章皇帝掃平區夏式用九圍聖祖仁皇帝六十一年深仁厚澤淪肌浹髓世宗憲皇帝益加整飭析縣置郡慎固封守黎庶乂安我皇上統三聖而纘承之即位之初厪懷民瘼豁免蕪湖縣江夫河篷租稅蠲除泗州安河兩岸升科淤地錢糧斯民鼓舞相慶久矣夫醇氣漸濡太和翔洽本深而末茂質勝而文生確犖者耕桑遊聞者勤動雄傑者髙明深鷙者沉潛諦觀志中所載凡職官之嚴密疆里之周詳賦役户口之輕重多寡墩防戍守之聨絡環衛皪乎若星羅而棋布秩然如絲櫛而髮理有動靜相調之勢無勞逸不均之慮有詰姦禁暴之實無糜餉冗兵之煩蓋本國家治益求治安益求安籌疆域如戶庭運神州於掌上而臣幸得備藩斯地因通省全志之成列兩江地勢之殊詳本朝規畫之盡善逺邁前古以昭列聖神謨逺略用固億萬年不拔之基匪直列掌故備史氏之見聞而已時乾隆元年歲次丙辰冬十月榖旦江南安徽等處承宣布政使司布政使臣晏斯盛謹撰江南通志序國有史直省郡縣皆有志由來尚矣臣會一自移守維揚恭逢世宗憲皇帝命儒臣修一統志詔省會各修通志上之而臺省大臣檄徵郡縣志以供採輯臣率郡之紳士編纂成書報充省局於今五載復覩通志之成臣疊膺簡命歷運使視鹺政治所胥隸江南例得揚言於簡欽惟我國家自世祖章皇帝定鼎中原四方和會列聖相承重熙纍洽幅員孔長尤以江左人文淵藪財賦要區恩綸疊沛聖訓頻頒富之教之淪肌浹髓編纂諸臣開函恭紀煌煌御製燦若球圖允惟典要次分十志例仿班書綱舉目張有條不紊自輿地河渠即及食貨八政所先義不容後而臣職司鹽政為食貨之一伏念兩淮鹽策自昔甲於天下國用以饒民生攸賴立綱積引法久易弛我朝監於前代去其煩苛權其利病軫恤深仁度越千古維皇建極載沛殊恩鹽法澄清商情豫順臣敬奉施行犁然志册誠歡誠忭竊有榮焉以至吏積民依文教武衛因時制宜具徵文獻臣歷官兹土嘗所與聞循覽是書上徴史乘下肅官常蓋聖天子之聲靈赫濯實式慿之非供掌故云爾也時乾隆二年歲次丁巳春正月榖旦都察院僉都御史管理兩淮鹽政加七級紀録四次臣尹會一謹撰江南通志序皇上御極之元年大業日新百度具舉而江南通志於時告成臣叨從藩臬之後例得贅言於簡末竊惟江南襟帶江海連跨揚徐自昔為國為郡開赤縣建行臺代更沿革故論形勝則舊作陪京論富饒則賦半天下聲名文物出他省上逺甚臣承乏斯土聿有十年分藩常鎮視𣙜維揚濱海而東大河之北間因公周歷江左右之情勢約略知之繼署江蘇藩篆蒙恩督理糧儲册籍戶口之繁府庫倉儲之裕遂得暸然在目壬子秋闈以監試備員今兹躬逢恩科復充提調備見士類之振興文風之丕茂愈信人材炳蔚於斯為盛夫山川壯麗形勢之雄也財賦繁興地利之廣也人文蔚起運會之所鍾也而培養調燮轉移變化以增其盛而美其偹則非仰賴神聖之經綸弗能為功也我世祖章皇帝以仁厚開基滋培元氣聖祖仁皇帝休養生息六十餘年省方所歷六幸江蘇所以保乂南邦者固已民登衽席士慶遭逢而世宗憲皇帝子惠元元財賦重地彌切勤求遞減逋賦豁免浮糧且升舉孝秀自鄉會及童子試額無不特沛殊恩兹伏遇我皇上文武聖神之資仁義中正之學紹承聖祖世宗之所已行所欲行者而誥戒誕布之海內莫不欣欣仰化而江南臣庶霑被尤隆厚澤深仁良法善教大書特書其足為志乘光者何可勝數臣於兹志之成竊為江南之士民幸而更以見四海同風中外寧謐直省通志之成類復如斯由是彚為一統志以垂之不朽誠千百年來未覩之盛典也已是用不揣謭陋識之末簡時乾隆元年嵗次丙辰仲秋榖旦江南安徽等處提刑按察使司按察使加四級紀録五次臣劉柏謹撰江南通志序粵稽周禮大司徒掌建邦之土地之圖以知九州之地域廣輪之數職方氏掌天下之圖以掌天下之地邦國之志小史掌之四方之志外史掌之班固漢書作十志次八曰地理志之所由來舊矣我國家誕膺天命統一區宇東漸西被暨乎朔南聲教所敷逺逾海表幅員之廣伊古所未冇江南夙號名都北連齊豫南接楚越航海則通楫甌閩汛江則泝流章貢襟帶河淮振納澤藪實為東南要區提封數千里財賦甲於天下其間山川之包絡郡邑之羅布城郭之經緯户口之繁人文之盛以及物産民風之各因其地建置沿革之數易其規職方所掌輿圖所紀畿輔而外他省固莫與埒也聖祖仁皇帝六十餘年涵濡漸漬翠華屢幸渥澤頻加世宗憲皇帝軫念河防不惜百萬帑金以為萬世永賴廣修水利特減浮糧造士育才振興學校其加惠於江南者備至我皇上紹纘不基孝隆繼述蠲逋免稅江南之被澤尤深復念人文繁盛分江取士加增解額讀書士子莫不鼓舞振興仰承盛典臣於雍政七年冬奉命視學江蘇重荷皇上天恩再留兹任八年之間輶軒所至每延接諸生奉揚綸音宣布德化俾爭自濯磨敦行力學以共奮於文明之世而閭閻黎庶蒸蒸然被祖宗之休養沐聖主之生成民物滋豐風俗淳厚熙恬和樂以安享太平之福者既飫聞而習見之况臣又隸籍皖桐世承恩澤覩勳華之繼治慶桑梓之蒙庥兹當江南通志告成督撫諸臣既慎擇纂修復詳加裁定臚為十志犂然備舉臣以生長之邦又為奉使之地濫叨採風之仕適值是書之成臣於此尤竊有厚幸焉謹拜手稽首而序於簡端時乾隆元年嵗次丙辰仲冬月榖旦禮部左侍郎提督江蘇等處學政臣張廷璐謹撰江南通志序世宗憲皇帝御極之七年敕下督撫諸臣各修省志上之史館以備採擇江南總督臣繼善巡撫臣國棟臣元章欽遵於九年冬十月徵集在籍儒臣之博洽工文通達治體者開局于江寧搜討排纂草創未定督臣廷珍臣其倬撫臣世臣臣國璽臣本繼之臣𢎞恩與撫臣紘臣琮臣國麟復繼之考訂增損惟慎惟詳迄今始克成書繕表恭進蓋自經始以來六易寒暑矣直省各志皆已次第進呈而江南獨居其後江南為東南大省掌故事實浩如煙海纂集綜核未敢猝成臣嘗舉其槩而論之輿地則五省犬牙相錯經六代僑置紛更千餘年沿革分合綦繁我國家升析郡縣規制尤為盡善必此疆彼域廣袤詳明然後山水關津城池都邑區别隸轄各有攸歸而宫室壇壝梵剎仙宫往迹新觀暸如螺指此其形勝之宜祥者也河渠則大海環其東河淮繞其北長河具區縈涵境內而運河蜿蜒自南而北為四省漕艘要津上關國政下利民生此其原委之宜詳者也食貨則田賦當天下六之一關稅當天下十之七鹽課當天下五之三生聚之繁物産之富甲於海內而積貯蠲恤諸大政制既詳于歷代恩尤渥於天朝使采托有未當奚以資於治理哉至于陶淑以禮樂捍衛以兵戎設官分職以臨蒞之分營列汛以鎮撫之既育之于庠序爰拔之以選舉周秦而後經制始繁六朝以來更張為甚由唐宗而元明武功文德夏造商因至昭代而規模宏逺條理細密政使慎重出之猶懼弗備矧夫泰伯之至德言子之文學季札之節概流風餘韻興起百世風會日開山川鍾育而江左人物遂為天下先雖前後殊揆隱見異轍然立德立言立功以厚人倫禆治化厲風俗其致一也若匹夫販婦弱女黃童其貞孝節烈亦皆錚錚佼佼可以亷頑而立懦稽之往牒采之近今遺濫兼譏是非易舛尤不可不詳且慎也舊志創于康熙癸亥刻期告竣遂多闕漏聖祖仁皇帝六十餘年中厚德深仁如天如地所以軫恤江南民力者至優極渥世宗憲皇帝整飭綱紀通變宜民惟富惟教江南尤荷格外殊恩是皆舊志所未及載而今當裒而益之期觀美備垂於無窮者也至我皇上即位以來惠顧東南恩施稠疊諸凡振興禮教廣攬英才減賦蠲租拯災恤患均邀曠典非他省所可潔比志書之成雖後而沐浴德化歌咏太平詳之紀載者獨先光昭簡册照耀方隅不尤隆哉臣何人斯幸董斯役折衷商榷不憚再三文已屬而復刪稿將成而更易分門别類按部就班參稽考正期無訛盩然後繕校成帙付之剞劂夫作志之難與史略同彼或疸而或彰此去誣而徵實彚訂之詳稱述之當鮮學與識莫能擅長也乃若立言有體落筆成章則又非才莫與兹志之成敢云三長之有歸庶幾言質而事核其於盛朝政教之詳明制度之美備風俗之醇厚賢才之衆多堂哉皇哉彪炳宇宙軼後而超前者罔不披卷洞然而宣猷布化奔走後先思因乎土俗民情而善厥敷施勉樹功績者亦皆可一覽而得其概也時乾隆元年嵗次丙辰冬十月榖旦兵部尚書兼都察院右都御史總督江南江西等處地方軍務兼理糧餉操江加二級紀録十次臣趙𢎞恩謹撰江南通志序志之所載皆為治之資也凡封域山川徭賦人才吏治食貨兵衛之屬罔不臚列以備稽考故省之需志甚重江南為古揚州地土沃人殷財賦甲海內英才蔚起文章政事之盛彬彬郁郁復為天下先南連浙閩北接兗豫西溯江漢上遊而東訖于海幅員之廣形勢之要亦中原鮮與儷舟車商賈之輳集魚鹽米榖之充實錦文織綺瑶琨篠簜之繁富幾為宇內稱首皆非志無以備載之則江南之有志較他省為尤重雍正七年世宗憲皇帝詔天下重修通志録上史館今乾隆元年江南通志告成適臣自松江提督蒙恩擢用漕運總督例得偕督撫諸臣揚言於簡端伏思我朝德洋恩普窮髮之地無不沾濡而江南士民之被澤尤為至深且渥恭惟聖祖仁皇帝巡視江淮指授方略導流建閘易昏墊為安瀾復全省錢糧湛恩汪濊普被無窮世宗憲皇帝豁免蘇松浮糧數十萬兩以紓民力開濬河道興水利以益農功特發帑金百萬築髙堰浚三渠為淮揚保障利及萬世暨我皇上繼統承乾恩免雍正十二年以前民欠丁漕銀米至數千萬兩輕減蘇松各府耗羡豁除歷來相沿雜賦及田畝應出公捐銀錢增廣上下江解額數十名振興文教懷保黎民為亘古所罕有是江南之飲和食德實有淪肌洽髓非他省所得同日而語者矣今當通志詮次成編則文武臣工之官斯土者當敬體列聖眷注南省之殷仰承皇上恩施南省之博非徒於志供流覽已也必將因所載為治之具以求盡乎致治之功城池何以修浚足資捍禦水利何以疏通足備旱潦兵防何以簡閲搜討使戎行悉成徑旅田賦何以輕徭役闢蕪萊使享阜足而樂輸將學校為人文萃集之地何以鼓舞振作崇實行而黜浮華風俗為人心世道所關何以警遊惰去澆漓一歸於蕩平正直忠臣孝子悌弟節婦均兩間正氣所鍾何以闡幽光發潛德扶人紀而植綱常他如天文之分野地利之險夷橋梁驛路之經由倉庫官廨之建置設官分職鄉舉里選之沿革凡志之所有者無不融貫于胸中即以載之方册者見之設施庶足仰副列祖神宗教養涵育之深仁黼黻聖治而鼓吹休明豈不於志有重賴乎哉臣職司七省漕運駐節淮安於江南最為切近因得𢋫重熙纍洽之盛寓循名責實之思與大小諸臣交相砥礪云爾時乾隆元年嵗次丙辰仲冬榖旦總督淮揚等處地方提督漕運海防軍務兼理糧餉兵部右侍郎兼都察院右副都御史世襲騎都尉加一雲騎尉臣補熙謹撰江南通志序周禮小史掌邦國之志外史掌四方之志職方氏掌天下之圖邍師掌四方之地名辨其邱陵墳衍原隰之名蓋王者以天下為一家中國為一人必使薄海之大按圖考籍瞭如指掌而周知其故斯有以辨土性而物土之宜因俗尚以施八政七教而不易其俗且山川厄塞險阻周防詳悉委折設險守國之道亦得所依據以為固唐宋以來圖經郡志實本此意所係綦重矣哉而抑有進焉者古今賢哲前史不能偹載邑乘家牒故老相傳若襄陽耆舊傳零陵先賢傳亦足以補國史之闕遺而興起斯人敦行砥節之思是其權尤與史官埒我國家重熙纍洽聖聖相繼德洋恩溥遍於寰區幅員之廣超軼前古雍正七年詔各省督撫修通志江南實九州之上腴神臯奧區甲於天下是時封疆大史咸敬謹不怠以奉聖天子之德意開置館舍禮聘耆碩厚其廪餼嚴其課程薈萃史集暨諸志乘廣搜博採剔抉幽隱踰數年而成書上叶星躔下稽歷代建置形勢風俗戶口田賦山川關隘水利津梁郵傳祠宇陵墓以逮名宦人物列女仙釋之魁竒特出物産之利用厚生碑版載籍藝文炳著靡弗考核精審紀述詳明覼縷貫丳以備乙夜之覽乾隆元年書成將獻諸朝臣江典學是邦獲附名簡末以揄揚盛美蓋於星躔建置見憲天稽古之道焉於形勢風俗見化俗宜民之方焉於戶口田賦見休養生息之隆焉於山川關隘水利津梁郵傳見體國經野之規焉于祠宇陵墓見崇德尚功之意焉于名宦人物列女仙釋見微顯闡幽之旨焉於物産見對時育物之功焉於藝文見黼黻休明之盛焉周官所載具見是書爰敢拜手稽首而為之序時乾隆元年嵗次丙辰冬十月榖旦提督安徽等處學政左春坊左贊善兼翰林院檢討加一級臣鄭江謹撰江南通志序國家久道化成車書一統聲教訖于四海篤祐基于萬年世宗憲皇帝詔直省修通志以昭道一風同甚盛典也昔大禹奠髙山大川爰作禹貢畫天下為九州其間山水田賦貢篚以次遞及而江南一省統轄揚徐獨居九州之二土宇遼濶財賦殷繁控江海之要區萃人文之淵藪則修志於江省所關尤巨臣斌織造江蘇旬宣吳會典𣙜視鹺忝司水土歷任江南故通志之修自遍纂以迄開雕皆幸得與聞其概欽惟我朝底定中原聖聖相承重熙纍洽治嫓唐虞念江南重地富之教之培育尤深恩綸寶訓賁若球圖我皇上善繼善述大澤頻頒修志諸臣纂輯天章開函恭紀仿古尚書先典于謨允符體要次臚十志例凖史裁而臣斌所嘗蒞官恭承德化若賦役則六府孔修閭閻藏富若關梁則庶士交正物産豐盈若鹽法則底慎財賦國用滋殖若水利則河淮既道川澮攸同凡此或師前事或相今宜詳列志中非供掌故已也至若皈章之日啓沿革之惟時揆文奮武之加隆育材官人之盡制惟兹大省尤厪宸衷罔不分門别類綱舉目張而禹貢所載揚徐二州山水田賦貢篚皆可考而知焉臣斌職任宣防欣逢清晏思曩時之官守歷在目前覩文憲之章明彌勤夙夜故於志之成也敬書諸簡以當揚言時乾隆二年歲次丁巳春正月榖旦總督江南河道提督軍務兵部右侍郎兼都察院右副都御史加一級紀録一次臣髙斌謹撰江南通志序粵稽江南之地於禹貢職方為揚州之域而半入於徐其在古也厥土塗泥厥田下下自漢以後財賦漸廣幾為九州之上腴矣其土俗民風在周以前號曰勾吳迄春秋之世始通上國見於經傳者猶譏其朴陋而自孫吳開業至於東晉江表益號名勝人文蔚起歷六朝唐宋元明以逮本朝賢才輩出事業文章甲於海內又自大河南徙會淮泗以入海元明定鼎燕京楚越漕艘皆由江淮以入於河故江南為襟帶河海聨綰南北之要地而其山川土田城郭戶口物産民風載在方輿者視諸省恆倍之雍正三年世宗憲皇帝以一統志歷久未成慎簡重臣敦率就功七年詔各省重修通志録上史館乾隆元年臣由總督漕運蒙皇上恩命署理江蘇巡撫印務會江南通志告成例宜揚言簡端竊意江南志書開局金陵招延名俊鳩工庀材皆督臣為之董其成而臣自承乏畿輔始領營田繼管河道皆在北地泊總漕政駐節淮隂始得循河而南按視工築差别堅瑕時則登髙望逺相度地勢及署江蘇撫篆乃按臨吳會得悉其版籍之繁庶文物之華縟風氣之韶美以至徴調漕挽鹽策關𣙜市集估舶無一不極天下之盛實為東南之名都巨藪楚越甌閩皆無以尚之間嘗槩覽江南之全境大河在北區分形勢大海在東吐納潮汐而大江之委控引上下具區之浸資藉蓄泄號為澤國詎不信然我聖視仁皇帝深仁煦嫗六十餘年屢次南巡指授治河方略江海防汛之宜採風拔茹登之藝苑所以惠兹南國者恩至渥也逮世宗憲皇帝勤求民隱軫恤有加平成之功洵足參贊天地而又減歷代之浮糧賑連年之飢饉修治川梁廣開水利增博士弟子員廣鄉試解額蓋江南之被澤獨深云我皇上龍飛御宇百度維新悉蠲直省逋賦而江南為尤多察孝秀舉鴻博加科廣額又以兩江人文特盛自元年恩科為始分榜取士上江居其四下江居其六他凡所以休養生息鼓舞作興之者靡所不至臣謬膺巡撫之職適當繁劇之邦敢不仰體聖心兢兢以養欲給求移風易俗為務因序通志而備宣之俾南國士民知幸生重熙纍洽之世敬承教澤士勤正學農服先疇商賈百工各安其蒙務黜浮華以滋根本砥忠孝而奮功名親民之吏拊循訓飭布昭德化惇大成裕蒸蒸日隆使閲志書者咸謂江南重地不獨山川瑰麗城郭崇閎衣冠俊偉田賦物産為天下最而禮教風俗節義文章之盛亦實足當各省之辨冕也豈不休哉至於纂修是書妙選僚佐旁搜博證由經始以迄竣事則督臣之序具詳焉無庸復贅也時乾隆元年嵗次丙辰冬十月榖旦巡撫江寧蘇松等處地方都察院右副都御史兵部侍郎加二級臣顧琮謹撰江南通志序今上龍飛之元年丙辰江南通志書成凡二百卷距開局時為雍正之辛亥首尾凡六年矣而臣恕承乏江安糧運實與終始其事庸敢稽手以紀其成曰志書之設非徒以矜淹博備見聞而已將以考生民之利病究政事之得失國家因事更張隨時變通之道於是乎在不可不察也我國家定鼎燕京歲漕東南四百萬石以實天庾而江南實居其半臣自備員以來間歲一押運過臨熟悉其利弊知漕運之制斟酌盡善未有如今日者也何則眀初例用民運與軍對船交兌末年僉解白糧至京大戶每至破産前人蓋嘗言之國朝於行月糧外定為五米五銀之制俾民交兌與官官自雇船起運一切赴通交納及遇淺過溜盤剝牽挽之費悉運丁支辦而民自交納後晏然無復事事法至便恩至厚顧欲恤民必先恤丁倘運丁困苦不支漕法遲滯廢壞於此而更求變通則民運有不可知者矣每見州縣官以恤民為事動致刻削運丁而武辨亦疾視吾民官辨各分左右袒而軍與民遂成隔膜之勢不知民運之苦運丁當之則所以恤運丁者義當與民等視故欲戢其咆哮之勢須先資其衣食之謀欲禁騷擾之害須先軫其道途之苦我世宗憲皇帝洞察幽隱無微不燭所以優恤運丁者恩意備至於舊例擕帶土宜六十石之外加增至一百石而江淮興武二衛豁免應追鑽夫底料銀十萬八千有竒以後仍給付又令起運白糧殷實丁掣運五年更替務使稍有贏餘踴躍從事舳艫安行市肆不驚鞏神倉於不匱垂樂利於可久蓋恤丁即所以恤民而臣奉職於兹六年之久得免曠廢遲滯之咎實稟成謨以幸免於罪戾敬因志書之成而詳述本朝漕制之善超軼前代有如此云時乾隆元年歲次丙辰仲夏月榖旦江南江安等處糧道按察使司副使臣王恕謹撰江南通志序皇上以聖神文武纘承大統臨御之初聲教誕敷湛恩汪濊六服內外罔不漸被暨訖尤念江南為財賦重地加意拊循蠲免積逋減除耗羡罷落地之稅寬徵輸之期射陽湖濵墾復之田涸溢靡常概與除額開濬運河繕完隄岸纎悉出度支正供無纍商民所以惠緩南服者德至優且渥也而江南重修通志一書於時適成江南在唐虞時為揚州之域其分野則上應乎牛女星紀其疆域則旁接乎齊魯楚越中州豫章其地襟江帶河土風清嘉山水衍秀蓋自泰伯以禮教開基言遊以文學播化嗣後人文之盛甲於天下匪獨金錫竹箭擅名東南而已顧嘗考之禹貢厥田下下厥賦下上上錯而後世財賦大半仰給一隅韓昌黎有言賦出天下而江南居十九蓋自唐代已然宋元勝國因事倍增論者每有積重難返之歎而不知發政施仁困極獲蘇固有待於興朝神聖之繼起也謹按前志作於康熙癸丑距今六十餘載其中山川形勢疆宇厄塞非必有殊舊觀獨念此六十餘載中恭遇聖祖仁皇帝厚澤深仁有加無已以河工未就自甲子至戊子屢勤南巡之駕指示方略永慶安瀾省方所至膏澤隨之蠲租發賑江左殆無虛歲世宗憲皇帝繼志述事允執厥中免蘇松四十五萬之浮糧除前明二百餘年之弊政黃童白叟擊壤歌衢時降德音訪求民隱山陬海澨之遙不啻家至而人見之凡此皆前志所未逮而載筆者所當大書特書者也他如郡縣之增改以十計秩祀之修舉以百計版籍登矣而賦惟其舊山澤廣矣而利與民同選舉徴辟立賢無方內外戌防星羅碁置築瀕海土石二塘浚入海婁淞諸水特命卿寺發帑興建費甚巨而利則溥神化變通之道因時措置之宜蓋不可以數計矣不有紀載將何以導揚盛美而昭示來兹則此通志一書豈徒備南省之掌故實乃徴文考獻以仰佐方輿一統之參稽者也臣承乏江藩甫及一載前此開局編摩未獲預聞末議特以工成剞劂循例得揚言于末簡有榮施焉夫藩司一職固會計之所從出也司會計則言會計蓋未嘗不深幸兹土之民獲生此輕徭薄賦之時為三代而後所不可多得也今試觀志中所載戶口蕃息賦役均平人民康阜樂業疆隅封守申畫鞏固有非唐宋以下所得而及者斯豈一朝一夕之故哉遭逢盛世聖天子重熙纍洽建極於上開府重臣宣德達情敷政於外穆明交贊時和年豐故雖謭陋如臣亦得恪遵成憲竭蹶駑鈍以圖報稱恩遇於萬一又詎非吏兹土者之厚幸歟繼自今上諸册府播諸通邑大都蒞仕者以宦績為必可師力學者以賢逹為必可法兵農錢榖之事皆有所據以為章程則是書誠考鏡得失之林也奚必讀九邱八索始稱瓌寶乎時乾隆元年嵗次丙辰秋八月榖旦江南江蘇等處承宣布政使司布政使臣張渠謹撰江南通志序國家重熙纍洽德育仁涵休養生息百年之久海內乂安民人樂業彬彬乎禮讓相先道德一而風俗同也雍正七年世宗憲皇帝敕諭直省重修通志上之史館將以彚纂成編大一統之宏謨昭承平之盛事迄今六閲寒燠為我皇上御極之元年而江南通志于是乎告成蓋志書之作所以彰往察來鏡制度之得失人材之盛衰風俗之汚隆運會之升降固非徒侈稱疆域之廣戶口之繁已也江南東環滄海西茹長江北倚河淮南俯震澤其名山奧區竒峰秀巘往往而是靈異所鍾碩德殊材出而黼黻王猷羽翼至道垂三不朽於天壤間者不可勝數即下而販夫匹婦弱女幼童咸稟秀于湖山而孝弟節烈之槩其動也天是其甲于天下者豈僅財賦繁豐物産滋植而充庭之貢纍纍若若升玉階而入金門哉若夫建學明倫設官取士之制城郭宫室置郵營汛之規與夫江河淮海之防賦役倉儲之法鑄山煮海充天庾而實神倉之模畫監於成憲因地制宜變通趨時者一一仰煩睿慮上稟廟謨煌煌乎一代之章程邁先而軼後而纍朝以來德隆恩溥至優且渥又惟江南霑被為獨多且數也蓋此邦遭逢之幸為諸省所不得而潔衡者有由來也聖祖仁皇帝省方問俗六幸江南鑾旗所指山川草木頓改六代之舊觀膏雨所濡土俗民情咸沐一時之雅化而且天文炳耀星紀增輝宸翰淋漓斗牛煥采猗歟盛哉誠曠代之休風也世宗升府州析縣邑則體國經野之制隆築海塘濬水道則畎畝灌溉之利滋豁免四府浮糧遞貸通省額賦恩施不倦蠲賑時行斯又大江南北白叟黃童歡呼祝頌於無既者矣茲恭逢我聖天子學本醇儒治隆古帝移風易俗則軫念吳會之奢靡修河濬渠則槩免里閭之科派自歷年逋賦蘇松耗羡漕項蘆課學租落地稅等及河難淤地之征江夫河篷之費長江魚租場竈折價錢糧悉蠲悉除無少靳惜又因江南人才衆多文風鼎盛特命上下兩江分闈鄉試廣增解額加意作人誥諭頻頒恩波疊沛是際今運會方隆亦惟此方人士倍厪淵衷之眷顧也抑何幸哉抑何幸哉臣叨任監司觀風所至熙熙皥皥既欣逢我朝德化之成伏讀志書秩秩班班乂快覩一方紀載之盛既部分而類居亦詳稽而博考於以備史氏之採擇增輿地之竒涵垂之萬祀久而不刋殆非太平寰宇元豐九域諸書可得而嫓美者已用敢敬述見聞以當拜揚之萬一云爾時乾隆元年嵗次丙辰孟秋月榖旦江南分巡鳳廬潁道按察使司副使臣范璨謹撰江南通志序江南纂修通志告竣計二百卷視舊志七十七卷幾再倍焉其為志分括十門若輿地食貨學校武備職官選舉人物藝文此與舊志同者也若十門之前恭紀詔諭於卷首添河渠志於次二并雜類志於末以足十門之數此與舊志未同者也而兩志之卷帙繁簡詳略相去懸殊先是署兩江總督臣繼善臣廷珍總督臣其倬臣𢎞恩署江蘇巡撫臣國棟臣世臣臣國璽臣琮安徽巡撫臣元章臣本臣紘經始綜理卜延纂修疊加審慎臣國麟欽承簡命調撫上江從諸臣後兼董厥成獲覩全志乃知非舊志之略而此志之詳也亦非此志之失繁而舊志之能簡也我國家膺天祐命聖聖繼承仁育義正事事上超前古若夫屢蠲疊賑江南霑被尤厚蓋自修志後五十餘年聖祖臨御之久恩澤及人之深世宗纘緒之隆敬勤為民之大不惜數百萬金錢以固河海之隄防預截數百萬漕米以裕州縣之積貯嵗減四十五萬浮糧以紓蘇松之民力學宫書院時沛特恩孝友鴻博之士得以升積學勵行之才有所養以致風俗歸淳厚雲物呈嘉祥江南士庶之歌頌咸謂放勳重華之再見也兹蓋伏遇我皇上聰明天亶睿孝性成四海之大兆民之衆誦皇謨而知聖學之貫徹于唐虞洙泗接恩詔而知聖誥之兼美於文武成康正人心厚風俗蠲逋宥罪使民荷安全吏無罣誤財賦重地視他省有加焉凡兹重熙纍洽之徴應實心實政之措施固屈宋班揚鋪張揚厲所不能盡咏歌紀載所不取遺而况山川土田人文之美江南獨擅可勿縷述以備一統志之採擇哉其為繁而不能簡詳而不容略固其宜矣惟是直省奉命纂修以來臣國麟在八閩時舉行而未觀成今來江南適值將竣之會並預鑒裁之末竊自欣幸爰用表其所以視舊志繁而詳者為之序時乾隆元年嵗次丙辰冬十月榖旦巡撫安徽等處地方提督軍務都察院右副都御史紀録十八次臣趙國麟謹撰江南通志序夫志即史也自班孟堅易龍門八書為十志後之人謂修史之難無過於志而臣以為修志難修江南志尤難修江南五十餘年未修之志則難之乂難何則謹溯前志創自康熙五十有二年由癸亥以迄於今列聖心傳若合符節無日不以理財用人寬若愛民為急務故建中立極涵育薰陶子惠元元有加無已雖六合內外無一非被澤之地被澤之人而大江南北地廣人稠生聚幾百年供賦甲天下其或旱潦之不時利弊有未盡在九重注念尤切民依故數十年來江南之霑恩戴德視他省獨多而臣江南人知之更悉今試就大槩者論之增祀典以崇先聖建書院而教人才兩江數千里豆籩廩餼無一不周則學校之難志也干旌下及夫衡茅鴻博遍羅之朝野開科廣額光照南天則選舉科第之難志也修河堰謹海防嵗為民計不惜金錢而江南無水患則河渠水利之難志也浮糧之供額皆蠲十載之積逋全豁阜財明詔無嵗不頒而江南無困民則田賦稅課之難志地他如良臣之骨梗循吏之端方孝友聞人義行節烈蹌蹌濟濟正正堂堂何莫非朝之風化攸關教育所致茍非折簡者有倫有則不蔓不支何從協十六郡之輿論而示大公托六十年之掌故而昭法守哉臣故曰修之者難也爾乃勳華繼序委任臯夔遴聘博物諸君子分例校讐掇拾近聞參稽興故務以史才抒史筆事事有徴言言可信是以大綱具舉節目全張覺城郭封疆依然如舊而山川風土靡不改觀有不斂手欽服默識神怡以頌大章大典之無遺憾者哉是志告竣臣欣覩成書恭逢盛事仰巍巍之聖德親皥皥之淳風砥名勵行固足以取鏡于文獻而以江南人讀江南志桑梓之地父母之鄉日習夫所見所聞更不勝綣戀徘徊而恭敬捧持之莫釋也已爰頓首拜言附諸簡末並以見向所為難者正不難也時乾隆元年嵗次丙辰孟冬月榖旦江南蘇松常鎮太督理糧儲兼巡視漕河副使道臣姚孔鈵謹撰江南通志凡例一志與史相表裏兹志倣史例列十志一輿地二河渠三食貨四學校五武備六職官七選舉八人物九藝文十雜志每志中依門分類以便省覽而十志之前各撮其大指為小序云一江南舊志上諭御製詩文並列藝文撰次非體今編年系月恭紀首卷其詳見本事中者紀恩遇重興建也一天文分野舊説糾紛率多異同今約敘數言於圖説之首而地之形勝亦及焉一沿革一遵皇輿表近年升府州分縣亦詳系之故山川疆域城池之屬較舊加備山川則先府後縣以方向道里次第之疆域則四隅八至以山水市鎮標識之一宫室官署祠廟寺觀等類麗於地者皆入輿地志中惟文廟學宫書院試院盛治攸關則别為學校志一古迹非僅供博覽實為論世考地之資古都邑外如廢郡縣舊治所在即名存實亡者皆係焉至先民里居别墅遺迹流風餘韻亦並有禆于搜訪故詳著之一江南古稱澤國河淮大江由之入海運河自南而北蜿蜒其中各次第之較舊志加詳一東南水利蘇松常鎮四府脈絡流通而太湖為之吐納故合敘之他府州則分紀之一江南財賦重地國家治平之久休養生息戶口日增給復蠲租超邁前代爰于田賦户口徭役蠲賑紀載惟詳而漕運鹽法錢法諸大政與夫稅課之佐邦計物産之為民利者槩附入焉一舊志兵制祗列官名古今守禦之要槩未之及今逺稽史册近據會典及全省見行規制犁然粲列若江防海防則各按南北險要備序次之而驛傳船政附焉一舊志職官載自督撫以下至郡守而止今州守縣令皆登焉無論賢否槩存姓名其名宦則古今之著有治績而崇祀之以風勵後人者也即列職官志中一選舉祗列姓名邑里其有稱者已入人物志一舊志前代鄉舉多闕略今本南國賢書及各郡縣志臚列綦詳一舊志凡例謂宦績武功忠節儒林應分標名目其説良是今于人物志中分十二類名賢居首具人少矣故以世次至于名臣碩德部别區分而編長一藝亦悉論著之不遺一人物本之舊志各郡縣志及印册其志乘所未載印册所未詳者姑闕之以俟增補一郡邑名號歷代不同不得概以今之地名繫古人也若實係本省而失載或迥非本省而誤入或各郡各邑彼此錯互者今皆詳考前史以正之一列女為人物志之一舊例統載節婦今倣劉向列女傳例分為五類一藝文志例起班固漢書備載書名卷帙及著作姓氏歷代史書及三通藝文經籍考略率循此體後來志書博采詩文既非體例亦不精詳今遵史例分經史子集四體彚之若有關地方利弊及考訂古今興廢者則附入各門至題咏之作槩闕而不録一九志外有無所附麗可資考證者則為雜類志括之名言軼行為紀聞地方經歷大事為托史紀事五行變異為禨祥各門紀載之傳聞互異者為辨訛字位過密無法顯示臣趙𢎞恩謹題為欽奉上諭纂修省志成稿謹奉表上進者臣等誠惶誠恐稽首頓首上言伏以帝德覃敷頌同風於八表皇圖式廓慶寧宇于萬年煥日月之照臨普光華而暉增星紀協河海之清晏大恩膏而澤洽江邦維兹經野之良規用善容民之大道是資圖志永著藩垣敬輯成編仰祈睿鑒竊惟斗牛分野旁連婁火之躔淮海惟揚北帶豫徐之域敷篠簜而包橘柚稽則壤於夏書川三江而浸五湖考職方於周禮經文攸敘為九州第五州而九州第一州史册所書曰江南東西道曰淮南東西道水泉通利有流壓鄭白之渠田賦上腴再熟美琅邪之稻粵若句吳開國秉至德以垂風緬維洙泗傳人悟聖功為有本良相之先憂後樂崛興於胥臺甫里之間大儒之誠意正心實生於龍尾梅源之麓蓋江山清淑鍾孕物華教澤淵源紹衣文獻惟是唐虞五服尚逺於侯甸綏要厥後晉宋六朝或流于風雲月露皈章土宇巽隅之景氣彌芳疊見珍符泰運之方輿獨盛欽惟我皇上道貫三才恩周六合建厥中而咸遵道路若華戴勝之區梯航修貢統無外而一稟車書烏弋黃支之國版籍稱臣矧居江國之首藩尤渥天心之仁愛示以儉示以禮念此民風一民寒一民飢引為己責重蠲疊貸愈軫束作之勤劬十雨五風尚念西成之豐歉障紫瀾而回濁浪隄防倍厪宸衷決渠雨而舉􅓩雲疏濬無煩民力垂竿牽網江上下共沐恩波煮海煎鹺淮南北羣霑化雨惠風吹絳帳軺車駟馬慶三鱣暖日麗寒氈西序東膠歌五緎但期賢良孝秀同升玉陛之前何煩桐磬瑶琨爭列金門之內開恩科以廣攬建試院以分闈千人俊而萬人英咸歸羅網吳之頭而楚之尾均荷甄陶凡此懿典鴻謨曷既休光美實在愷悌旁流之內霑浩蕩以靡涯際純熙纍洽之餘蔚文明而有象兹當通志告成之日欣值龍飛御宇之初彤管蒼毫莫罄欽明之雅化金題玉躞都涵雨露之新恩聿自辛亥之冬載始編摩之役嵗月屢易剞劂方新文異三都類左思之遲鈍才踈七步謝子建之從容核實副名恐遺譏于闕濫發凡起例爰預定其規程禮聘英才羣相排纂臣等互加讎檢參酌見聞於是恭録天章炳昭國憲然後地理與人倫殽列文章與政事相宣􅕍括十門縷分各類權輿經傳或委或原涉獵史家職詳職要敢云考托咸當謹已次第成書劉道規先賢之傳祗及徐州范致能辨證之篇獨言吳郡思挂一而漏萬寧辭鉛槧之勞快稽古而驗今倍感遭逢之幸伏願益調玉燭常固金甌配資生資始之元寒暖剛柔旁孚交鬯徴時雨時㿩之序寄象鞮譯蹈德詠仁山出器車河出馬圖豈但地泉流醴東南一尉西北一候長將天柱為標有截神州合八埏而永奠無疆景祚與兩大而長新臣等無任瞻天仰聖激切屏營之至謹奉表隨進以聞江南通志纂修職名總裁臣尹繼吾兵部尚書署理江南江西總督印務臣魏廷珍臣髙其倬臣趙𢎞恩署理江蘇巡撫印務刑部右侍郎紀録二次臣王國棟署理江蘇巡撫印務通政使司右通政加二級紀録二次臣喬世臣署理江蘇巡撫印務今升都察院左副都御史加一級臣孫國璽臣顧琮臣程元章匠徐本臣王紘臣趙團麟協栽臣性桂臣補熙臣嵇曾筠臣白鍾山臣髙斌南河副總河都察院右僉都御史加二級紀録二次臣劉永澄提督江蘇等處學政禮部左侍郎加一級臣張廷璐臣王蘭生臣姚三辰臣鄭江臣尹會一提調江南江蘇等處承宣布政使司布政使臣劉藩長江南江蘇等處承宣布政使司布政使臣張渠署江南安徽等處承宣布政使司布政使臣陳𢎞謀江南安徽等處承宣布政使司布政使臣馮景夏江南安徽等處承宣布政使司布政使臣李蘭江南安徽等處承宣布政使司布政使臣晏斯盛監理江南江蘇等處提刑按察使司按察使臣刁承祖江南江蘇等處提刑按察使司按察使臣徐士林江南江蘇等處提刑按察使司按察使郭朝鼎江南安徽等處提刑按察使司按察使臣孫詔江南安徽等處提刑按察使司按察使臣劉吳龍江南安徽等處提刑按察使司按察使臣劉柏協理江南糧道按察使司副使臣王恕江安糧道布政使司參議臣王之錡蘇松糧道按察使司副使臣甘汝來蘇松糧道按察使司副使臣姚孔鈵整飭通省驛鹽兼巡江寧道按察使司副使臣包括整飭通省驛鹽兼巡江寧道按察使司副使臣孔傳煥蘇松兵偹道按察使司副使臣王澄慧蘇松兵備道布政使司參議臣崔琳常鎮道按察使司副使臣翁藻太通兵備道按察使司副使臣張鳴鈞太通兵備道布政使司參議臣禮山河庫道按察使司副使臣張師載安徽道按察使司副使臣梁需杞廬鳳道按察使司僉事臣何宗韓廬鳯道按察使司副使臣李如蘭廬鳯潁道按察使司副使臣范璨淮揚道按察使司僉事臣夏建德淮揚道按察使司僉事臣未定元淮徐道按察使司副使臣吕維炳署分巡兩淮鹽務道按察使司僉事臣曽𢎞緒署分巡兩淮鹽務道按察使司僉事臣髙士鑰兩淮鹽務道按察使司副使臣徐大枚兩淮都轉鹽運使司鹽運使臣范廷謀兩淮都轉鹽運使司鹽運使臣李根雲采輯江寧府知府臣張崿年蘇州府知府臣白嶸松江府知府臣江德馨常州府知府臣徐宗奭鎮江府知府臣黃鶴鳴淮安府知府臣楊應瑶揚州府知府臣髙士鑰徐州府知府臣曽𢎞緒安慶府知府臣郭朝端徽州府知府臣楊雲服寧國府同知署知府事臣祝宣池州府知府臣李暲太平府知府臣熊同仁廬州府知府臣髙越署鳳陽府試用知府臣魏化麟潁州府知府臣孫光祀太倉州知州臣江之煒海州知州臣鄭謙通州知州臣張桐滁州知州臣楊大勳署和州知州臣汪文廣德州知州臣李國相六安州知州臣髙淑曽署泗州知州臣周璠纂修原任左春坊左中允日講官起居注兼翰林院編修加一級臣黃之雋原任左春坊左贊善兼翰林院檢討臣汪應銓翰林院編修加一級臣邵泰原任福建興化府知府臣沈起元松江府華亭縣儒學教諭臣周大璋徽州府儒學教諭臣儲郁文辛丑科進士臣顧棟髙原任河南商城縣知縣臣黎髙昻安慶府懷寧縣儒學教諭臣謝有輝揀選知縣丙午科舉人臣徐孝常揀選知縣己酉科舉人臣張尹揀選知縣己酉科舉人臣章士鳳分修原任河南新安縣知縣臣王元蘅池州府儒學教授臣陳以剛癸卯科會試中式舉人臣陳祖范宣城縣儒學教諭臣周偉甲午科舉人臣孫曔庚子科舉人臣華希門癸卯科舉人臣程之銘癸卯科舉人臣任啓運興化縣儒學教諭臣姚焜丙午科舉人臣戴炳蘇州府吳縣嵗貢生臣王栻通州嵗貢生臣李堂蘇州府吳江縣監生臣陳景雲常州府金匱縣監生臣秦