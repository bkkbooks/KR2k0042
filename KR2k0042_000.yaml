輕徭薄賦可漸進於升平將來制度考文冀徐興於禮樂朕念峻命之不易悼斯民之孔艱深切痌瘝宜矜詿誤特宏大賚嘉與維新順治十二年上諭禮部朕惟帝王敷治文教是先臣子致君經術為本自明末擾亂日尋干戈學問之道闕焉未講今天下漸定朕將興文教崇經術以開太平爾部即傳諭直省學臣訓督士子凡理學道德經濟典故諸書務要研求淹貫博古通今明體則為真儒達用則為良吏果有此等實學朕必不次簡拔重加任用又念先賢之訓仕優則學仍傳諭內外大小各官政事之暇亦須留心學問俾德業日修識見益廣佐朕右文之治特諭欽頒賦役全書序順治十四年朕惟古帝王臨御天下必以國計民生為首務故禹貢則壤定賦周官體國經野法至備也當明之初取民有制休養生息至萬厯年間海內殷富家給人足及乎天啓崇禎之世因兵增餉加派繁興貪吏緣以為姦民不堪命國祚隨之良足深鑒朕荷上天付託之重為生民主一夫不獲亦疚朕懷凡服御膳羞深自約損然而祖宗百神軍旅燕饗犒錫之繁以及百官庶役餼廩之給罔不取之民間誠恐有司額外加派豪蠧侵漁中飽民生先困國計何資兹特命戶部右侍郎王宏祚將各直省每年額定徴收起存總撒實數編撰成帙計稽往牘參酌時宜凡有參差遺漏悉行駁正錢糧則例俱照萬厯年間其天啓崇禎時加增盡行蠲免地丁則開原額若干除荒若干原額以萬厯刋書為凖除荒以覆奉御旨為憑地丁清核次開實徴又次開起存起運者部寺倉口種種分晰存留者欵項細數事事條明至若九釐銀舊書未載者今已增入宗祿銀昔為存留者今為起運漕白二糧確依舊額運丁行月必令均平肨襖盔甲昔解本色今俱改折南糧本折昔留南用今抵軍需官員經費定有新規會議裁冗改歸正項本色絹布顔料銀硃銅錫茶蠟等項已改折者照督撫題價值開列解本色者照刋書價值造入每年督撫確察時值題明填入易知單內照數辦解更有昔未解而今宜增者有昔太冗而今宜裁者俱細加清核條貫井然後有續增地畝錢糧督撫按彚題造册報部以憑稽核綱舉目張勒成一編名曰賦役全書頒布天下庶使小民遵兹令式便於輸將官吏奉此章程罔敢苛斂為一代之良法垂萬世之成規雖然此其大略也若夫催科之中寓以撫字廣招徠之法杜欺隱之姦則守令之責也正已率屬承流宣化核出納之數慎那移之防則布政司之責也舉廉懲貪興利除害課殿最於荒墾昭激揚於完欠恪遵成法以無負朕足國裕民之意則督撫之責有特重焉其敬承之毋忽江南通志卷首一欽定四庫全書江南通志卷首二之一聖祖仁皇帝詔諭順治十八年奉天承運皇帝詔曰惟我國家受天眷命祖功宗德肇造丕基我皇考大行皇帝盛德至仁英資大度纘承厯數統一寰區恩澤洽於多方政教臻於上理方期邦國永底雍熙不幸奄棄臣民遽升龍馭顧兹大寶屬以藐躬朕煢煢在疚本不忍聞而諸王貝勒大臣文武官員人等僉謂神器既已攸歸天位不宜久曠堅請再三朕是以俯徇輿志勉抑哀衷於是月初九日祗告天地宗廟社稷即皇帝位仰惟上天眷祐之篤祖宗付託之隆涼德沖齡膺兹重寄敬圖覲光揚烈用紹無疆之休其以明年為康熙元年與天下更始式衍舊恩聿宏新化所有合行事宜開列於後康熙十七年正月二十三日諭吏部自古一代之興必有博學鴻儒振起文運闡發經史潤色詞章以備顧問著作之選朕萬幾時暇遊心文翰思得博洽之士用資典學我朝定鼎以來崇儒重道培養人材四海之廣豈無竒材碩彥學問淵通文藻瑰麗可以追蹤前哲者凡有學行兼優文詞卓越之人不論己未出仕著在京三品以上及科道官員在外督撫布按各舉所知朕將親試録用其餘內外各官果有真知灼見在內開送吏部在外開報於該督撫代為題薦務令虛公延訪期得真才以副朕求賢右文之意爾部即通行傳諭遵行特諭康熙二十三年十月二十五日諭大學士明珠王熙明太祖一代開創令主功德並隆朕巡省方域將及江寧鍾山之麓陵寢斯在朕優遇前代况於其君實賢可祀之如禮內閣禮部太常寺會議具奏康熙二十三年十一月初二日諭大學士明珠總督王新命明太祖陵寢歷經年世幸本朝加意護守鬱然無恙朕躬詣奠祭典數優崇今車駕將旋圖善其後爾等可傳諭守陵太監及陵户朝夕敬愼巡視罔輟灑掃維勤毋令附近民人旗丁恣行蹂踐其在陵守視人等特加賞賚以示恩恤彰勸厲焉特諭康熙二十三年十一月初三日諭江南江西總督江蘇巡撫明太祖天資英武敷政仁明芟刈羣雄混一區宇肇造基業功德並隆其陵寢在鍾山之麓係江寧所屬地方向已有旨令有司各官春秋致祭嚴禁樵採并設有守陵人户朝夕巡視但為日已久不無廢弛今朕省方江寧親詣拜奠見牆垣傾圮林木凋殘皆係無知民人不遵約束恣肆作踐往來行走殊違法紀嗣後爾等督令地方各官不時巡察務俾守陵人役用心防護勿致附近旗丁居民仍前踐踏所有春秋二祭亦必虔潔舉行以副朕崇重古帝王陵寢至意特諭康熙二十三年十一月初四日諭吏部尚書伊桑阿恭紀河渠志康熙二十三年十一月初四日諭江南大小諸臣朕向聞江南財賦之地今觀市鎮通衢似覺充盈其鄉村之饒人情之朴不及北方皆因粉飾奢華所致爾等身為大小有司當潔已愛民奉公守法激濁揚清體恤民隱以副朕望老安少懷之至意康熙二十四年二月初四日諭按察使于成龍恭紀河渠志康熙二十四年十一月初四日諭户部朕惟自古帝王統一寰區懋先德化必子惠黎元勤求民瘼俾幹止寧成家給人足而後世躋雍熙治登上理朕御極以來宵旰圖治未敢即安念切民依思培邦本雖編氓漸得遂生而閭閻正資惠養欲使羣生樂利比户豐盈惟頻行減賦蠲租庶萬姓得沾實惠前此用兵以來河南湖北兩省民人轉輸供億勞費繁多特沛仁恩以昭軫恤所有康熙二十五年應徴地丁各項錢糧著與蠲免一半其康熙二十四年未完地丁錢糧亦著盡與豁除又直𨽻獻縣河間縣河間衛江南宿遷縣興化縣邳州高郵州鹽城縣山東郯城縣魚臺縣地方今年重罹水災小民艱苦亦應加恩軫恤所有康熙二十四年下半年二十五年上半年地丁各項錢糧俱與豁免爾部速行該地方官通行曉諭務使人人均被恩膏以副朕愛育蒼生至意如有不肖有司官役借端朦混及私行重征者該督撫指名題參從重治罪如該督撫徇隱不行紏舉或經參奏或被告發定行一併從重治罪爾部即遵諭行特諭康熙二十五年閏四月二十二日諭大學士勒德洪明珠王熙吳正治宋德宜學士麻爾圖牛鈕禪布蔡必漢噶思泰朕聞鳳陽徐州等處地方亢旱人民困苦學士麻爾圖率户部賢能司官一人馳驛速往詳明據實踏看果民食維艱窘於生計速發鳳陽倉銀米一面賑濟一面奏聞其賑給事宜麻爾圖會同户部議以聞康熙二十五年七月初四日諭工部右侍郎孫在豐恭紀河渠志康熙二十六年十一月二十六日諭户部朕惟自古帝王統御萬方乂安九有單心懷保節愛攸先期於物力充裕爰以振業黎元俾膏澤旁流咸蒙美利朕自御極以來軫恤民依力圖休養惟理財為裕國之大經蠲貸為愛民之實政歷年敦崇節儉嚴核浮冒蓋欲為布德行惠之資頻年以來各省錢糧雖已次第蠲免但江蘇所屬各郡縣為財賦重地額徵錢糧甲於他省且纍嵗輸將供億效力維勤兹用大沛恩膏除漕項錢糧外所有康熙二十七年應徵地丁各項錢糧俱著蠲免二十六年未完錢糧亦悉與豁除又陜西省錢糧前雖已行蠲免但念該省人民用兵之際轉輸餽餉效力可念再宜加恩以宏樂利其康熙二十七年應徵地丁各項錢糧及二十六年未完錢糧亦著俱與蠲免爾部速行該地方官通行曉諭務使小民均霑實惠以副朕愛育蒼生至意如有不肖官吏借端朦混及私行重徵者該督撫指名題參從重治罪如該督撫徇隱不行紏舉或經參奏或被告發定行一併從重治罪爾部即遵諭行特諭康熙二十八年正月初二日諭吏户兵工四部朕統蒞寰宇二十八年於兹早作夜思勤求治理務恤黎庶永圖乂安如黃運兩河運道民生攸係朕日切心勞比年工役雖漸有緒而應修應塞議論紛紜曩嵗巡幸曾允淮揚士民所請疏濬下河前已興工尚稽底績屢經廷議請朕親行閲視今特諏吉南巡躬歷河道兼欲觀覽民情周知吏治所至沿途供億皆令在京所司儲偫一切不取之民間即有日用應需該衙門於所在地方照市估平買不許錙銖抑勒小民猶恐地方官吏不能悉體朕懷借名苛派供應今特頒諭嚴飭如有悖旨借端私征者察實即以軍法從事地方文武大小官員不許與扈從官員指稱交戚輒通餽遺違者餽送收受人員並以軍法從事其扈從大小官員及隨往傔役如有橫行生事擾民者一并從重治罪朕兹巡省原以軫恤編氓咨諏風俗凡經過地方百姓各安生業務令廛無廢市隴不輟耕毋得倉皇驚避輒滋煩擾其軍民人等懷姦挾詐希逞私憤擅於駐蹕處所瀆行告訐者一概嚴禁儻有妄控除所告事不與準理外仍嚴加治罪爾部即傳諭扈從大小官員人等並行令各該督撫於府州縣城市村莊窮鄉僻壤遍懸告示備行曉諭務令通知以副朕惠愛元元至意特諭康熙二十八年二月諭總督傅臘塔王騭巡撫洪之傑金鋐朕因省察黎庶疾苦兼閲河工巡幸江南便道至浙觀問風俗簡約儀衛鹵簿不設扈從者僅三百餘人頃經維揚民間結綵歡迎盈衢溢巷雖出其恭敬愛戴之誠恐致稍損物力甚為惜之朕視宇內編氓皆吾赤子惟使比户豐饒即不張結綵幔朕心亦所嘉悅前途經歷諸郡邑宜體朕意悉為停止又見百姓老幼男婦奔走雜還膽望恐後未免喧譁擁塞念此行原以為民不嚴警蹕但人衆無所區别高崖水次或有傾跌之虞一夫不獲其所足軫朕懷此後止於夾道跪迎勿得紊亂追趨致有諸患著即詳加曉諭使知朕愛民切實咸為遵行特諭康熙二十八年二月十一日諭扈從部院諸臣朕稽古省方咨求治理閲視河道期底平成凡有利於民生必令霑夫實惠兹行次浙省禹陵在望念大禹功德隆盛萬世永賴應行親詣以展企慕之忱其致祭典禮所司即察例舉行政治所先在崇文教江南浙江為人文萃集之地入學額數應酌量加增永昭宏奬著該督撫詳議奏請江寧鎮江杭州駐防滿洲漢軍兵丁鎮守要地久歷嵗時深用軫念應作何恩賚以彰優恤著該部議奏自南巡以來所經過地方官員除八法處分及列欵紏劾外凡因公詿誤降級留任者俱準與開復降級調用者著帶所降之級留任其經過地方見在監禁人犯除十惡及詔欵所不赦等罪並官員犯贓不宥外其餘自康熙二十八年二月十一日以前死罪及軍流徒罪以下已結未結俱著寬釋以示朕赦罪宥過之意備辦船隻地方各官效力勤勞著該督撫會同奉差官員確查具題各加一級縴夫供役勞苦亦著該督撫察明人數量給恩賞朕厪念民依特蠲租賦總期實德潤澤蒼生近見民間有建立碑亭稱頌德意者雖出羣黎感戴之誠但恐各郡皆然未免致損民力誠使閭閻殷阜則裨益良多碑亭何與焉嗣後亦宜停止江浙錢糧既經蠲豁猶慮有不肖有司借端詞訟朘削民生著該督撫嚴行禁飭至各處𣙜關原有則例朕舟行所至咨訪過關商民每不難於輸納額稅而以稽留關次不能速過為苦𣙜關官員理宜遵奉屢頒諭旨恤商惠民豈可反貽商民之纍自今應力除積弊凡商民抵關交納正稅即與放行毋得稽留苛勒以致苦纍違者定行從重處分朕早夜孜孜惟冀官吏軍民士農商賈無一人不獲其所故於民生吏治圖維區畫務極周詳爾等可即傳諭俾一體奉行稱朕意焉特諭康熙二十八年三月二十一日諭內閣朕巡行南省往視河道江南淮安諸地方自民人船夫皆稱譽前河道總督靳輔思念之不忘且見靳輔濬治河道上河隄岸修築堅固其於河務既克有濟實心任事勞績昭然曩革職太過其以原官致仕例復其原品康熙二十八年七月二十二日諭户部朕前巡幸江南凡所經歷於編氓疾苦必詳加體察如傷念切每沛恩膏朕過邳州親見彼處田地多為水淹沒耕耘既無所施賦稅如何取辦其現在被淹田畝應納地丁及漕項錢糧俱行蠲免歷年逋欠亦盡與豁除該督撫即行出示遍曉窮鄉仍不時亷察儻有不肖官員仍行私徵者題參從重治罪以副朕愛惜民生至意爾部即遵諭行特諭康熙三十年十二月初四日諭户部朕撫馭區宇三十年以來早夜圖維惟以愛育蒼生俾咸臻安阜為念比嵗各省額徵錢糧業已次第蠲豁其嵗運漕米向來未經議免朕時切軫懷所有京通各倉米榖撙節支給數載於兹今觀歷年儲積之粟恰足供用應將起運漕糧逐省蠲免以紓民力除河南省明嵗漕糧已頒諭免徵外湖廣江西浙江江蘇安徽山東應輸漕米著自康熙三十一年始以次各蠲免一年至江寧京口杭州荆州大兵駐防地方亦應豫行積貯著將康熙三十一年起運三十年漕米各截留十萬石存貯倉厫令該地方官敬愼守視以備需用爾部即遵諭行特諭康熙三十二年九月十六日諭內閣江浙二省今年夏旱雖不成災秋收量必有限若漕糧照常徵收起運恐民食將至匱乏朕為此常切軫念除浙江漕糧已經改於今年蠲免外其江南漕糧今年或三分免一或免一半俟至該省應蠲年分將今年所免米石照數補徵起運於漕糧既無缺少官民大有裨益著滿漢大學士等會同户部堂官倉場侍郎等作速確議具奏康熙三十三年閏五月初十日諭內閣保護中河堤岸之子堤恭紀河渠志康熙三十六年正月二十二日諭大學士伊桑阿等揚州淮安徐州等處被災錢糧該總督巡撫奏請蠲免疏至即與全蠲康熙三十六年六月十五日諭提督江南學政學士張榕端提督浙江學政侍講張希良自古帝王治天下率以興賢育才為首務稽察前制各省學政皆用詞臣董率之任至重也近來士習未變文事未彰良由督學各官不能仰體朕意兹特命爾前往江南浙江等處提督各府州縣學政爾尚端軌儀崇經術勤勸課嚴坊刻振維新之典革積衰之弊毋炫華而遺實毋避怨以市恩俾士有真材國收實用南土人文所萃尤宜加意作新多方鼓舞以稱朝廷培植人材至意所屬司道府州縣及提調等官凡關係學政者聽爾據實考核及禮部題準申飭事宜俱當著實舉行向有傳諭嚴禁考試情弊爾當恪奉遵依至於本處督撫各有攸司不得互相干預如遇公事交接暨文移往來俱照平行其布按都三司接見禮儀往來文書有干係學政者俱照巡撫衙門例行爾受兹委任務嚴絶情面一秉虛公振拔孤寒澄汰汙賤教士有程取文有法俾士風丕變時惟爾功如或蹈常襲故違命曠職亦惟爾罰爾其愼之故敕康熙三十六年十月十五日諭內閣下河地方恭紀河渠志康熙三十七年十一月二十五日諭户部淮安揚州鳳陽等處比年水患頻仍浸漫隄岸田多淹沒耕穫無從百姓艱於粒食經朕時加軫恤屢賑屢蠲被災地方賴以安堵但念久歉之餘恐致資生匱乏朕厪憫殷切未嘗稍釋於懷前此雖頻敷庥澤至再至三用裨羣黎生計猶恐開春東作農事艱難若不大沛恩施安能令小民各得其所著將海州山陽安東鹽城高郵泰州江都興化寶應夀州泗州亳州鳳陽臨淮懷逺五河虹縣蒙城盱眙靈璧等州縣并被災各衛所康熙三十八年一切地丁銀米等項及漕糧盡行蠲免務使民間均霑實惠以副朕體恤元元生息愛養至意爾部即遵諭行特諭康熙三十八年正月二十一日諭吏户兵工四部朕撫馭寰區乂安中外孜孜圖治宵旰勤民期於天下咸遂生成物無不得其所今邉烽永靖四方無事獨是黃淮為患衝決時聞下河地方田廬漂沒朕軫念民艱曩曽屢遣大臣往令督理不惜數百萬帑金務期早綏黎庶乃歷年已久迄無成功今水勢仍復橫溢浸漫城閭沉沒隴畝以致民多失業董其役者未有上䇿可以宜民時厪朕懷未嘗少釋在內諸臣咸請朕親臨指示以為一勞永逸之圖方今春時雨水減少正宜講求疏濬以遂安瀾爰諏吉南巡親加勘閲更以吳地乃東南奧壤襟帶江湖勵俗省耕兼行臨視凡一切往返供億已皆俾辦於京師即途次日用所須亦令各衙門照本地時值採買總於民間一無所纍仍恐沿途官吏藉名科派致纍閭閻故特頒諭嚴行申飭如有悖旨假託派索者察實即以軍法從事該地方大小文武官員不許與扈從官員藉稱親舊擅相餽遺違者與受人員並以軍法從事其扈從大小官員隨行傔從人等如有橫行生事者一併從重治罪凡經過地方百姓各安生業皆如常時務令廛無廢市隴不輟耕毋得惶遽引避其軍民人等懷挾私怨受人指使擅於駐蹕處所輒行告訐者一概嚴禁不準仍照衝突儀仗例嚴加治罪爾部即傳諭扈從大小官員人等併行各該督撫於各府州縣城市鄉村遍張告示備行曉諭務令億兆通知以副朕體恤惠愛至意特諭康熙三十八年三月初七日諭户部朕君臨天下期於黎民樂業各獲其所凡興利除害之事靡不舉行蠲免賑濟之恩靡不下逮比年以來因淮揚所屬地方疊罹水患業已嵗蠲額賦賑恤頻施又動支數百萬帑金責令在河諸臣於應挑應築之處酌量修理務使泛濫之水匯歸入海被淹之廬舍田畝盡皆涸出用底幹寧乃錢糧竟爾虛費卒不能使積淹有歸田廬未涸民生未遂朕聞之惻然軫懷值兹四方無事之時欲將一切修舉事宜詳閲指示用是躬親臨幸沿途審視黃河水勢咨訪地方父老比至歸仁堤高家堰量度地形高下應挑應築一一明示河臣惟是被淹地方米價騰涌生計維艱朕目擊民依深用厪念著將漕糧截留十萬石於高郵寶應興化泰州鹽城山陽江都受災七州縣各留一萬石悉較時價減值發糶餘米三萬石著於邳州留八千石宿遷桃源清河安東四縣各留五千五百石亦較時價減糶此各州縣發糶之米著就近交與漕運總督河道總督邳州著遣司官一員前往監視再截留米十萬石於揚州淮安各收貯五萬石這應留漕糧不論何處米石著就近截留爾部即遵諭行康熙三十八年三月初七日諭總督于成龍恭紀河渠志康熙三十八年三月十三日諭户部東南為財賦重地朕時加軫念頻嵗以來雖在邉塞用兵之際未嘗不早夜殷殷眷懷寬恤兹以中外升平特事巡省並閲河工比至江南親察民間饒瘠之狀見淮南北地方疉罹水患深用惻然已經屢蠲屢賑仍命截留漕糧減價平糶其餘各州縣固市肆安輯耕鑿恬熙而額賦浩繁民生拮據歷年逋負積算日增合計江蘇巡撫安徽巡撫所屬舊欠帶徵錢糧幾及百萬念小民方供新稅復急舊逋物力維艱勢難兼辦里井既多催科之擾官吏復滋參罰之煩應沛特恩概行蠲豁除康熙三十三年恩詔內已經赦免外其三十四五六年奏銷未完民欠一應地丁錢糧米豆麥雜稅爾部行文該督撫察明俱著免徵務飭有司悉心奉行俾使窮簷蔀屋均霑實惠如有已徵在官詭稱民欠希圖侵蝕肥己者一經發覺定從重治罪朕身處宫禁與巡歷方隅無非孳孳民事但使閭閻豐足則國家裨益良多以此不惜蠲除頻敷德澤凡厥官吏軍民宜咸知朕意爾部即遵諭行特諭康熙三十八年三月二十二日諭户部朕因淮揚地方數被水患躬臨巡省目擊田廬淹沒之苦深加軫恤既截留漕糧以濟民生仍蠲除積欠以紓民困其昨嵗淮揚兩屬被災錢糧曾經該督撫具題部議照例減免三分今念百姓糊口維艱安能辦賦應破常格用沛特恩淮安府屬海州山陽安東鹽城揚州府屬高郵泰州江都興化寶應九州縣並淮安大河二衛康熙三十七年未完地丁漕項等銀一十九萬有竒米麥十一萬石有竒著全與蠲免爾部行文該督撫即飭各州縣張示曉諭務體朕憫惻羣黎之至意俾窮鄉僻壤均霑實惠如有不肖官吏私徵侵蝕者察出定治重罪特諭康熙三十八年四月初二日諭户禮二部朕子育黎元勤求治理日孜孜以施德澤厚民生為急務而江浙二省尤東南要地朕時切軫念比嵗以來蠲豁田賦賑濟凶荒有請必行無災不恤雖漕項錢糧向未蠲免者亦曾特旨蠲免愛養之道備極周詳庶幾民生日益康阜用是乘輿時邁於視河事竣巡歷江浙咨訪民間情形見淮揚一路既困潦災而他所過州縣察其耕穫之盈虛市廛之贏絀視十年以前實為不及此皆由地方有司奉行不善不能使實惠及民所以小民雖懷愛戴之誠而朝廷恩澤卒未下究朕目擊厪懷亟思拯恤截留漕糧寬免積欠另有諭旨惟各鹽差關差向因軍需繁費於正額外令在差官員以所私得贏餘交納充用今思各官孰肯自捐私槖勢必仍行苛取商瘠民困均坐此弊著將加增銀兩一概停罷以紓商民之纍其兩淮鹽課康熙三十六年曾加增四十萬兩今恐商人辦課維艱有漸致匱乏者著減去二十萬兩此外有應行應革事宜朕還都以後仍加商確次第舉行該督撫藩臬皆地方大吏亦著悉心體訪凡有可為民興利除害者作速勘實陳奏嚴革雜派禁止刁訟然後胥吏不能作姦良民得以安業儻官吏有悖旨妄行者許商民首告該督撫察出即行參奏朕視民如傷惟恐一夫不獲其所兹值海宇升平兵革不事正當與民休息之時故特渙沛德音減徵寬稅以為閭閻留有餘之力萬一嗣後别有急需或不得已而稍議加增想在小民亦能共諒朕懷輸將之恐後也至於江南浙江人文稱盛入學名數前已酌定增額今著於府學大學中學小學各增五名舉行一次以示奬勵人才至意爾部即遵諭行特諭康熙三十八年四月十六日諭户部朕巡幸江南遍察地方疾苦深知民間生計艱難故將通省積欠錢糧盡行蠲免所過州縣有被災甚重者俱經拯濟務俾得所兹聞鳳陽府屬去嵗潦災甚重是用破格加恩以示優恤康熙三十七年該府屬夀州泗州亳州鳳陽臨淮懷逺五河虹縣蒙城盱眙靈璧十一州縣並泗州一衛未完地丁漕項等銀米著一概免徵爾部行文該督撫即飭該地方有司張示曉諭令窮鄉僻壤咸悉朝廷曲軫災黎之至意如有不肖官吏悖旨私徵使百姓不霑實惠者察出定治重罪爾部即遵諭行特諭康熙三十八年十一月初五日諭户部朕思小民生計惟農畝是賴必年榖收成斯衣食無缺淮揚所屬海州等州縣衛接年河流浸漫田廬編氓艱於粒食朕心深切軫念已將康熙三十八年錢糧俱行蠲免今春南巡目覩民間疾苦恐致失所復將康熙三十七年未完錢糧盡與豁除諭令所司將沿河堤岸堅固修築乃修防未竣夏秋又致沖決田廬盡沒水中特命該撫往駐被災地方動支積貯米榖並將漕糧截留親行賑給今念清口河流未通民田仍遭淹沒耕穫無從百姓饘粥尚且艱難來年租賦安能輸辦著將這被災海州山陽安東鹽城大河衛高郵泰州江都興化寶應等州縣衛康熙三十九年地丁銀米等項及漕糧漕項銀兩盡行蠲免爾部速令該督撫通行曉諭務俾均霑實惠以副朕拯恤災黎至意如有不肖官役朦混侵冒仍行私徵者該督撫嚴察指參從重治罪爾部即遵諭行特諭康熙三十九年三月初二日諭户部淮揚等處百姓頻年罹於水災未寧幹止朕心時切軫念比嵗以來多方優恤蠲免賑給靡不舉行去年春朕親履河干目擊小民田廬皆被淹沒災黎艱於粒食益為憫惻於懷爰命地方官按户賑濟又將截留漕糧發賑平糶俾得贍養上下兩隄岸前雖屢發帑金修築迄無禆益去年二月面諭河工諸臣速行修治至今尚無成效復遴選廷臣同往經理無非軫懷民瘼欲令黃運兩河隄岸速成斯民早安生業耳念水患一日不除則百姓一日不得耕種用是深以為慮著將今年漕糧截留二十萬石存貯淮揚地方備用爾部即遵諭行特諭康熙四十二年二月初七日諭河道總督張鵬翮恭紀河渠志康熙四十二年三月初二日諭河道總督張鵬翮王公堤康熙四十二年三月初三日諭河道總督張鵬翮高堰工程康熙四十二年三月初三日諭河道總督張鵬翮王家營康熙四十二年三月初四日諭河道總督張鵬翮清口西壩以上恭紀河渠志康熙四十二年三月十八日萬夀恩詔朕為天下生民主宵旰勤勞勵精圖治凡國家之休戚閭閻之樂利晷刻之間無不注意於此天下之大兆民之衆朕誰欺欺天乎至今四十餘載親歷飢饉者不知其幾南北用兵者不知其幾人心向背者不知其幾天變地震者不知其幾自責涼德不能撫育履氷臨淵兢業惟守仰賴上天眷佑祖宗厚德幸生創業未久之際方免墜失今海宇升平年嵗稍和生民俱已樂業邇來諸王大小臣工士庶因朕五旬輿情肫切屢請加上尊號朕堅意固辭不允所請蓋朕不以名譽稱揚為尚惟以海內富庶為心是以屢蠲賦役頻省刑罰總欲使老安少懷風俗淳厚漸幾於康乂隆平之治近因淮黃告成乃東南要務再授方略望有善後朕不辭勞瘁親往閲視見畿輔山左江浙等省耆老人民俱中心愛戴雖童稚亦咸歡欣瞻仰是知民心皆一用是益深軫念視切如傷所以星夜回鑾兹特大沛宏恩普施遐邇庶幾民生咸登夀域和協遍滿寰區所有應行事例開列於後於戲安民則惠益宏逮下之恩御衆以寬聿溥好生之德布告天下咸使聞知康熙四十二年十月初八日諭工部覽河臣奏一道恭紀河渠志康熙四十五年十月二十五日上諭户部朕子育黎元日求所以休養利濟之道念惟賜租減賦實有裨益於民生直隸各省錢糧次第全蠲一年者業經數舉獨是歷年逋負積纍加增舊稅新徵勢難兼辦縱使少寬民力分年帶輸而督令續完仍多拮據朕眷懷及此深切軫恤是用蠲逋己責大沛恩膏俾閭閻獲免追呼官吏亦不罹參罰直隸山東積欠錢糧今年俱已蠲免其山西陜西甘肅江蘇安徽浙江江西湖北湖南福建廣東各省自康熙四十三年以前未完地丁銀二百一十二萬二千七百兩有竒糧十萬五千七百石有竒著按數通行豁免或舊欠已完在官而現年錢糧未完足者亦準扣抵諭旨到日各該撫立行所屬張示遍諭有不肖有司以完作欠朦混銷算及開除不清者該督撫即時題參嚴加治罪爾部即遵諭行特諭康熙四十六年十月初七日諭户部江南地方頻年雨㿩時若百榖順成閭井黎氓咸得遂生樂業但民間夙鮮蓋藏禦荒無術一遇嵗歉即有匱乏之憂朕屢次南巡素所洞悉今年自夏入秋雨澤愆期該督撫先後奏至因念小民久未被災驟罹荒旱所關甚巨隨命九卿等速同詳議應行事宜業經敕令停徵并發倉榖賑濟顧倉儲數少未足遍給惟各州縣截留漕米可以實惠及民目下時已屆冬總漕桑格無事著會同總督邵穆布巡撫于準親歷各州縣被災地方備加察勘將今年所徵漕糧每州縣或留八九萬石或留十萬石酌量足支賑給之數分别多寡存留支散及今漕米尚未開兌截現收之糧以濟待哺之衆實於民生大有裨益此朕殷殷懷保赤子軫念如傷之至意爾部即移文該督撫等實心奉行仍開具賑濟實數奏聞特諭康熙四十六年十一月初二日諭户部江浙地方賦役殷繁倍於他省朕屢經巡歷時切軫懷比年以來業已節次敷恩頻行蠲貸頃因兩省偶被旱災隨命按數減徵豁免漕欠並分截本年漕糧令該督撫親往散賑猶念民間素鮮儲蓄生計不充非更加格外滋培則荒歉之餘未能驟臻康阜兹特再施膏澤用𢎞休養康熙四十七年江南浙江通省人丁共額徵銀六十九萬七千七百餘兩著悉與蠲免其今年被災安徽巡撫屬七州縣三衛江寧巡撫屬二十五州縣三衛應徵地畝銀共二百九十七萬五千二百餘兩糧三十九萬二千餘石浙江二十州縣一所應徵地畝銀九十六萬一千五百餘兩糧九萬六千餘石四十七年亦俱著免徵所有舊欠帶徵銀米並暫停追取俟開徵時一併輸納務使小民一嵗之內絶迹公庭安處隴畝俾得優遊作息經理農桑庶幾閭閻氣象可以日加豐豫諭旨到日該督撫體朕孳孳惠愛黎元至意各飭有司實心奉行仍張示通曉令咸知悉儻蠲除不實致有侵冒察出定治重罪爾部即遵諭行特諭康熙四十六年十一月二十三日諭江浙在京官員大學士張玉書尚書王鴻緒等朕在宫中無刻不以民間疾苦為念恐遇旱潦必思豫防至巡幸各省於風俗民情無不咨訪即物性土宜皆親加詳考每至一方必取一方之土以驗試其燥濕今嵗南巡江浙見天氣久晴所經河渠港蕩之水比舊較淺即慮夏間或有亢㿩之患是時麥田雖甚豐稔然南方二麥用為麯糵者多不似北方専資麵食南方惟賴稻米北方則兼種黍稷粱粟有攜北方黍稷及蔬菜之類至南方種植者多不收穫此水土異宜不可強也且江浙地勢卑下不雨則蒸濕人不能堪有雨則涼人皆爽豁雖地稱水鄉而水溢易泄勞嵗之為患尚淺旱嵗則為患甚劇北方經月不雨亦尚無礙南方夏秋間經旬缺雨則田皆坼裂禾苗漸稿矣喜雨亭記云十日不雨則無禾蓋謂此也江浙農功全資灌溉今河渠港蕩比舊俱淺者皆由素無瀦蓄所致雨澤偶愆濵河低田猶可戽水濟用高仰之田力無所施往往三農坐困朕兹為民生再三籌畫經久之計無如興水利建閘座蓄水灌田之為善也江南省之蘇松常鎮及浙江省之杭嘉湖諸郡所屬州縣或近太湖或通潮汐所有河渠水口宜酌建閘座平時閉閘蓄水遇旱則啓閘放水其支河港蕩淤淺者並宜疏濬引水四達仍酌量建閘多蓄一二尺水即可灌高一二尺之田多蓄四五尺水即可灌高四五尺之田準此行之可俾高下田畝永逺無旱潦矣爾等其以朕意曉諭諸臣詳議以聞康熙四十六年十一月二十九日諭工部朕宵旰勤民視如赤子無一時一事不思為閭閻圖經久之計江南浙江生齒殷繁地不加增而仰食者日衆其風土隂晴燥濕及種植所宜迥與西北有異朕屢經巡省察之甚悉大抵民恃田畝為生田資灌溉為急雖東南名稱水鄉而水溢易泄旱熯難支夏秋之間經旬不雨則土坼而苗傷矣濱河低田猶可戽水濟用高仰之地力無所施往往三農坐困朕兹為民生再三籌畫非修治水利建立閘座使蓄水以灌輸田疇無以為農事緩急之備江南省蘇州松江常州鎮江浙江省杭州嘉興湖州各府屬州縣或近太湖或通潮汐宜於所有河渠水口度地建閘隨時啓閉水有餘則宣泄之水不足則瀦蓄以備用其有支河港蕩淤淺者宜並加疏濬使引水四達仍行建閘多蓄一二尺之水即田高一二尺者資以灌溉矣多蓄四五尺之水即田高四五尺者資以灌溉矣行之永久可俾高下田畝無憂旱潦此於運道無涉而於民生實大有裨益今漕運總督與江浙督撫方料理截漕散賑爾部速移文該督撫等令將各州縣河渠應建閘蓄水之處並應建若干座通行確察明晰具奏爾部即遵諭行特諭康熙四十七年五月初八日諭工部朕南巡閲河時見洪澤湖風浪危險隄岸陡立商民船隻觸石損壞傷人甚多朕心時切軫念因特令河臣沿湖隄創設救生木樁自設樁以來數年內並未損船傷人於商民大有裨益此樁應時加增修愈多愈善嗣後著江寧蘇州杭州三處織造每嵗於節省銀內各捐五百兩解送總河衙門以備救生樁之用該督逐嵗修理存案不必入奏銷如不實行修理於别項支用者從重治罪康熙四十七年十月十六日諭户部朕屢次南巡見閭閻殷阜之象逺不逮於舊時故於民生風俗無不一一咨訪雖不時蠲免額賦停徵積逋僅可支吾卒嵗絶無餘蓄且今承平既久生齒日蕃食漸不充用多不給亦理勢之所必致朕每念及此未嘗不為惻然去年江南浙江二省俱被旱荒多方軫恤始蘇民困逮今嵗復報潦傷旋經照例蠲賑並下詔書留漕資濟但嵗再不登生計益匱欲令辦賦力必難供朕於國家一切經費纍年撙節帑藏充裕以此渙敷膏澤藏富於民俾得盡力農桑衣食滋殖百姓既足國用何憂康熙四十八年除漕糧外江南通省地丁銀四百七十五萬四百兩有竒浙江通省地丁銀二百五十七萬七千兩有竒著全行蠲免所有舊欠帶徵銀米仍暫停追取此朕因江浙二省為東南重地特於格外施仁用宏休養之至意該督撫各飭有司張示遍諭務令窮鄉蔀屋咸共知悉儻或别借事端侵冒徵派事發定從重治罪爾部即遵諭行特諭康熙四十八年十月二十五日諭户部今嵗入夏以後朕因南方二麥不登北地亦被微潦宵旰軫慮甚切焦勞繼而畿輔稔收三吳秋熟兼以四方奏報咸獲有年朕心始為稍慰夫水旱災傷事所時有而小民皆如赤子一以疾苦見告即不忍恝置於懷今念江南淮安府揚州府徐州三屬地卑積水被災獨重秋禾未播種者甚多雖本年錢糧業經全免又曽遣官分賑而失業之民宜加格外之恩以宏愛養康熙四十九年淮揚徐三屬邳州等十九州縣三衛額徵地丁銀五十九萬三千八百兩有竒著通行蠲免又河南省歸德府屬商邱等六縣山東省兖州府屬濟寧等四州縣或被夏災或被秋災雖已各依分數例免額賦並宜更施膏澤用厚民生康熙四十九年商邱等縣應徵地丁銀二十萬二千四百兩有竒濟寧等州縣應徵地丁銀一十四萬六千六百兩有竒俱著通行蠲免其應蠲免州縣有舊欠未完錢糧亦著停徵一年諭旨到日各該督撫嚴飭有司體朕殷殷軫恤災氓至意張示遍諭悉心奉行務俾窮鄉僻壤均霑實惠如有不肖官吏借端私徵者即行察參爾部即遵諭行特諭康熙五十一年上諭户部朕宵旰孜孜勤求民瘼永為惠下實政無如除賦蠲租除每嵗直省報聞偶有水旱災傷照輕重分數豁免正供仍加賑恤外將天下地丁錢糧自五十年為始三年之內全免一周使率土黎庶普被恩膏除將直隸奉天浙江福建廣東廣西四川雲南貴州及山西河南陜西甘肅湖北湖南各直省康熙五十年五十一年地丁錢糧一概蠲免歷年舊欠錢糧一併免徵外所有江寧安徽山東江西各撫屬除漕項外五十二年應徵地畝銀共八百八十二萬九千六百四十四兩有竒人丁銀共一百三萬五千三百二十五兩有竒俱著察明全免其歷年舊欠銀二百四十八萬三千八百二十八兩有竒亦並著免徵計三年之內總免過天下地畝人丁新徵舊欠共銀三千二百六萬四千六百九十七兩有竒各該督撫務須實心奉行體朕軫念民生至意如有侵欺隱匿使惠不及民借端科派者督撫嚴行察參督撫失察事發之日亦嚴加究治諭旨到日立即遍示城郭鄉村咸使知悉爾部即遵諭行特諭康熙五十一年上諭朕自沖齡即好讀書亦好寫字一切經史靡不遍閲成誦在昔賢哲所著之書間或字句與中正之理稍有未符或稍有瑕疵者後儒即加指摘以為理宜更正惟宋之朱子注明經史闡發載籍之理凡所撰釋之文字皆明確有據而得中正之理今五百餘年其一句一字莫有論其可更正者觀此則孔孟之後朱子可謂有益於斯文厥功偉矣朕既深知之而不言其誰言之於朱子宜何如表章崇奉爾等與九卿會同具議以聞康熙五十二年上諭海宇承平日久户口日繁地畝並未加廣宜施寬大之恩共享恬熙之樂嗣後直𨽻各省地方官遇編審之期察出增益人丁止將實數另造清册奏聞其徵收錢糧但據康熙五十年丁册定為常額續生人丁永不加賦仍不許有司於造册之時藉端需索用副朕休養生息之意康熙五十六年上諭户部朕撫馭寰宇五十餘年夜寐夙興為小民勤求生遂凡率土逺近皆期共享樂利聿成家給人足之休未嘗一日不厪諸懷也數十年以來各省正賦屢經全免歷年積欠亦已蠲徵偶有雨澤愆期或發倉廩散給或截漕糧賑救不惜數萬萬金錢米榖頻沛恩施誠念窮簷之艱慮其至於顛連失所耳近者民力雖已稍紓然念分年帶徵銀兩若不格外優寬則小民一嵗所獲分納二年之賦以其贏餘養贍室家斷難充足朕每懷及此軫惻良深宜更加殊恩通行豁免今將直隸安徽江蘇浙江江西湖廣西安甘肅等八處帶徵地丁屯衛銀二百三十九萬八千三百八十兩有竒概免徵收其漕項雖例不準免亦著破格施恩將安徽江蘇所屬帶徵漕項銀四十九萬五千一百九十餘兩米麥豆一十四萬六千六百一十餘石內蠲免各半爾部即行文該督撫嚴飭所屬實心奉行遍加曉諭俾民間無徵催之纍均沾實惠用稱朕撫恤羣黎至意儻有不肖有司借端朦混私行徵收者該督撫嚴察參處如該督撫失察一併從重處分爾部即遵諭行特諭江南通志卷首二之一欽定四庫全書江南通志卷首二之二聖祖仁皇帝御製南巡筆記康熙甲子春日有以時值上元請行封禪及巡狩燔柴諸典禮者夫朕涼德菲躬臨御海宇邇年以來水旱兵戈民亦勞止雖邀天庇佑四海蕩平萬姓樂業實未有豐功偉烈足以昭示來兹何敢效法前人銘功紀德至於巡狩古天子所以周省侯國使諸侯肆覲明堂考其政績今天下之權統一於內督撫之賢不肖朕皆得而知之又無事於巡狩之名也惟是近畿郡邑屢經巡幸補助時施而東南黎氏風俗尚未周知乃於秋九月陳請兩宫暫違定省二十八日出京師經河間過德州閲濟南城觀趵突泉題曰激湍百姓遮拜馬首口户繁盛比屋可封昔稱臨淄之間肩相摩轂相擊者今尚有遺風焉十一日至泰山石徑崚嶒緩步登陟四十里御障崖瀑水懸流五大夫枯松猶在巖畔或亦後人繼植者入南天門捫秦時無字碑至孔子小天下處真可收羅宇宙暢豁襟懷題普照乾坤雲峰諸字宿泰山巔月色清朗賦詩遣興來日登日觀峰看扶桑日出下山祀於嶽廟嶽為五方之長發生萬物故躬祀之為蒼生祈福十三日雨雪駐蒙隂縣侍臣云眀日小雪喜其應候詰朝雪霽望蒙山峰頂半入雲霧或隱或見其上石衣土人攀縋取之名蒙山頂上茶嘗考四川雅州有蒙山五峰極高峻上産甘露茶世所傳者或雅州之蒙山也渡沂水取魚既多且鮮因遣使馳進兩宫以志思戀之懷葓花鋪青淮之界居人輻輳十八日發宿遷縣閲黃河北堤岸一百八十里頻年水患工役浩繁民俗罷敝不若山左之庶饒渡河舟行過清江浦淮安府商賈往來舟楫如織寶應縣高郵州邵伯鎮皆以湖水泛濫未復故道居人草屋臨流牀竈半在水中朕甚憫焉登岸步行十餘里親察水勢召集耆老秀才細訪其故皆云自海口壅塞水無所歸二十年來田畝已成巨浸賦詩紀事思所以拯濟之草三日抵維揚市肆繁華園亭相望遊平山堂天寧寺百姓持香夾道意甚誠敬平山堂乃宋臣歐陽修所建修以文學侍從之臣出知揚州為政之暇優遊談宴傳為佳話故朕詩有文章太守心偏憶之句草四日將由儀真幸江寧府忽遇順風可以速達京口遂乘沙船順流而下波恬浪靜瞬息七十里沙船江中戰艦也自嶽州長沙用兵以來多得其力今河海清晏當時戰具僅供渡江之用然安不忘危朕於此時未嘗不念艱難用武之際次早登金山孤巒隱岫屹峙大江中飛閣流丹金碧照灼更有一峰離立曰善才石郭璞墓在其西上有妙高臺留雲亭朝陽洞下有中泠水稱天下第一泉朕率扈從諸臣一一探眺縱目千里題江天一覽四字并賦二詩竹林禪院在鎮江府城南五里曲徑逶迤茂林修竹高者四五丈大者圍尺青葉碧枝隂森崖谷實北地之所未有晚而登舟揚帆丹陽縣常州府無錫縣俱未及泊一晝夜行三百六十餘里達姑蘇舟人云從無如此之速者草七日由楓橋入閶門登城閲視士民觀瞻莫不抃舞有獻賦頌者是日駐蹕城中念職事人役􅉝勤逺來遍賞白金聽其各帶方物以示體恤草八日回鑾過虎邱山不甚高亭榭欄檻布滿其上千人石高下可容千人傳為生公講經處故旁有點頭石劒池在夾崖中殊可觀平逺堂俯瞰虎邱之背田疇林木望若錯錦蘇民仍列酒坊茶肆各安生業管絃競奏覺有升平景象然徒事紛奢罔知務本未若東北風俗之朴實耳夜坐舟中與侍臣高士竒探論古今興廢之迹或讀尚書左傳及先秦兩漢文數篇或談周易或賦一詩每至漏下三十刻不倦日以為常蓋詩書意味深長不似耳目之好易於煩厭也舟過無錫縣遊錫山觀惠泉石甃八角池水色渟泓味較玉泉逺不相及不知前人何以稱之為第二泉二十九日由丹陽縣陸行初一日過句容縣蜿蜒石堤數十里抵江寧府雨花臺在城南登之則江山城郭歷歷可見報恩寺規制宏壯寶塔九級金碧琉璃盡鏤梵相結構之巧殆竭人工非前代內帑所修不能至此城中闤闠充實煙火萬家景物太平昔稱六朝佳麗今亦不減大都也明日祭明洪武陵見其頽廢敕地方官禁護之過明故宫僅存遺址不禁慨然作過金陵論并賦一詩登觀星臺望後湖題曠觀二字又明日再遣使進兩宫方物閲鎮將射於教場頒賜扈從諸臣幣帛督撫御衣初四日發江寧府泊燕子磯峭壁臨江亦有勝致初十日閲高家堰堤工望洪澤湖汪洋千頃復由河南岸行一百八十里過桃源縣十一日渡河至宿遷次日駐蹕葓花鋪自郯城沂州取道東兗渡沂濟祊汶泗諸水泗水出陪尾山下泉林寺側石穴吐水衆泉俱導古樹成林有石碑刻子在川上處然闕里志載孔子觀川亭在尼山宣聖廟側未知孰是十六日長至節天氣晴暖無朔風祁寒扈從諸人莫不欣喜十七日過少昊陵顔子林駐蹕曲阜縣南十八日黎明祀於闕里齋心穆穆若有所見禮畢坐詩禮堂命孔氏子孫講周易大學遍觀車服禮器及漢唐碑版檜樹在大成門內古幹蒼然苔蘚潤澤真靈迹也敬想至聖道冠百王前代留金銀器具皆人力可辦獨以仗前曲柄龍蓋留廟中并書萬世師表四字過闕里詩古檜賦出北門釃酒孔子墓下伯魚墓在孔子墓東十餘步子思墓在其前西有子貢廬墓之所左有宋真宗駐蹕亭林中竒樹蔥鬱未可計數行三十里駐蹕兗州府杜甫所謂浮雲連海岱平野入青徐是也念周公制禮作樂道接文武頃過曲阜未得躬謁廟庭特製祭文遣親藩代祀之遂由汶上東阿高唐至德州亟欲定省兩宫兼程而歸是行也往返數旬所歷山東江南諸郡縣日以周咨民隱體察吏治為首務行道之頃復得覽其山川憑弔古迹至於地方利弊則將有以斟酌損益焉率筆記之示朕之不徒事遊豫也恭侍皇太后駕臨金山記朕臨馭以來緬維祖宗付託之重孜孜圖治宵旰不遑兹幸中外清平無事則裕民肅吏以登上理端在斯時顧朕身居九重慮周蔀屋閭閻疾苦容或壅於上聞又淮黃濬築務繁非親行相度亦無由底績於是載舉南巡之典以咨求民瘼然上念皇太后春秋亦高矣誠恐違離日久定省有缺於心歉然用是敦請同行謹擇於今年二月之吉朕率諸子捧鑾輿登仙鷁發自潞河一路問安視膳無間宫闈朕心少慊惟皇太后天性仁慈軫念民隱尤切每見田家作苦則指謂諸子曰稼穡艱難如此汝輩生長深宫可勿念乎諸子悉受教惟謹即朕日祗聆懿訓所至布德施惠惟恐一夫不獲聖慈每聞之必為色喜顧謂諸子曰汝父皇愛民如是太平可永保矣老身為加一飯蓋盛德之下逮如此河工既閲畢朕將南由吳會歷武林取道建業以歸乃復奉慈駕南臨於四月之望自瓜步渡江江中有峰聳峙曰金山亦名勝也山椒庭院清幽齋堂閟邃爰掖慈幃於斯駐蹕焉而是日天氣晴和江光如鏡帆檣上下煙樹氤氲皇太后隨意矚眺天懷舒暢朕率諸子進蔬茗獻筍芋即山櫻沼芡並荷親嘗曰田間味何可棄也蓋皇太后秉躬謙抑雖瞿曇蘭若亦施恩禮又聖澤所加首先煢獨諸凡村嫗田婦罔不擕持童稚環繞翟車仰瞻宫扇一時懿綸溫慰賞賚駢蕃而臣僚命婦之嫻於禮者亦皆環珮霞帔伏迎道左親炙鑾輿逺近傳為盛事山陬海婦孺旄倪稱兕觥而祝慈夀者且數千里趾相接也猗與休哉朕觀從古隂教如省繅觀穫載在禮經即前代宣宗亦嘗親奉母幃巡覽畿甸賦詩紀事侈為美談朕兹幸際升平太和豫順合億兆之歡心以隆尊養亦庶幾以孝治光海宇之意而皇太后之徽音懿行可臚彤管為萬世母儀法者尤亘古罕覯也朕謹熏沐拜紀勒諸貞珉以垂奕祀云金山江天寺碑大江之中有山岌峩嶻嶪湧波濤而傑出者無如金山山之上高閣飛棟軒然四列凡夫日月之蔽虧風煙之噴薄帆檣樓堞鳬魚之出沒隱見於其中者舉可俯而有也夫岷山之源其始濫觴及乎建瓴而下近縈巴蜀逺跨荆揚數千里而歸墟於大壑滔滔南紀昔人目之天塹當六代時偏安建業江之左右遂為重鎮是山以卷石屹乎中流引淮泗苞吳會可不謂天下之雄觀形勢之極勝者哉今四海一家書同軌合纎塵不揚斥堠無警舟車則萬國霧會筐篚則九域星馳是山也信足以為登臨之美蓋異夫昔之憑藉江山以為險者矣朕南巡過此停憩山寺撫長江之安流見水天之相接曠焉興懷書江天一覽四字留之寺中爰命葺而新之不以勞吾民事竣請額其瑰壯巨麗當益足以增江山之竒矣因憶舊觀浩渺澄泓空濶無際猶可心會遂名之曰江天寺云過金陵論金陵禹貢揚州之域秦立郡縣為秣陵兩漢因之孫權時稱建業東晉及宋齊梁陳地號佳麗隋唐之間六朝舊迹漸致湮沒南唐李氏始更築城名金陵府明有天下建都於此窺明太祖之意以為宅中圖大控制四方千百世無有替也嵗在甲子冬十一月朕省方南來駐蹕江寧將登鍾山酹酒於明太祖之陵道出故宫荆榛滿目昔者鳯闕之巍峩今則頺垣斷壁矣昔者玉河之灣環今則荒溝廢岸矣路旁老民跽而進曰若為建極殿若為乾清宫階磌陛級猶得想見其華構焉夫明太祖以布衣起淮泗之間經營大業應天順人奄有區夏頃過其城市閭閻巷陌未改舊觀而宫闕無一存者覩此興懷能不有吳宫花草晉代衣冠之歎耶昔人論形勢之地首推燕秦金陵次之然金陵雖有長江之險為天塹而地脈單弱無所憑倚六朝偏安弗克自振固厯數之不齊或亦地勢使然也明自文皇靖難之後嘗以燕京為行在宣德末年遂徙而都之其時金陵臺殿苑囿之觀聲名文物之盛南北並峙逺勝六朝逮承平既久忽於治安萬厯以後政事漸弛宦寺朋黨交相構陷門户日分而士氣澆漓賦斂日繁而民心渙散闖賊以烏合之衆唾手燕京宗社不守馬阮以囂偽之徒託名恢復僅快私仇使有明艱難創造之基業未三百年而為邱墟良可悲夫孟子曰天時不如地利地利不如人和有國家者知天心之可畏地利之不足恃兢兢業業取前代廢興之迹日加警惕焉則庶幾矣南巡詩一晚經淮隂淮水籠煙夜色橫棲鴉不定樹頭鳴紅燈十里帆檣滿風送前舟奏樂聲平山堂宛轉平岡路向西山堂遺構白雲低簾前冬暖花仍發簷外風高鳥亂啼仙仗何嘗驚野夢鳴鑣偶爾過幽棲文章太守心偏憶歐陽修自題平山堂詞有文章太守之句墨灑龍香壁上題天寧寺小艇沿流畫槳輕鹿園鐘磬有餘清門前一帶邗溝水脈脈常含萬古情由儀真乘巨艦至京口長江萬里開鴻濛高檣巨楫乘艨艟儀真京口路百里挂帆瞬息凌長風汀蘆洲樹看歷歷波恬浪闊光瀜瀜湍流直下入滄海逺源上與岷峩通山川斷續合雲霧日月照耀浮虛空舟行迅速疾飛駛恍聞擊鼓馮夷宫柂樓高據極觀眺竒縱豁達舒心胸年來江漢罷桴鼓河海清宴絶戰攻舳艫間擊沙岸側水師捲甲懸長弓羽葆南巡渡揚子居安更念艱難功金山并序金山在大江中南眺潤州北臨瓜步登陟其上縱目千里泱泱乎大觀也朕率扈從諸臣厯覽諸勝江山之竒未有逾於此者一覽江天勝東南勢盡收帆檣來極浦臺榭起中流路出丹崖上煙同碧漢浮登臨豁心目浩蕩俯滄洲試中泠泉緩酌中泠水曾傳第一泉如能作霖雨霑灑遍山川妙高臺臺高絶衆鳥臨眺暢清襟渺渺沙洲樹青青逺岸岑波濤巖下接洞壑檻邉深江水明如鏡彌徵天地心鐵甕城萬里晴江擁舳艫城高鐵甕接康衢遺銘欲探華陽迹舊宅難尋海嶽圖半面煙嵐雄北固一方形勢控東吳龍舟漫道巡行盛多恐深居政未敷竹林禪院在潤州城南竹徑數里一徑入深竹數里來上方叢生巖磴密枝拂雲煙長華旗出林際芝蓋停三陽颯颯吹霜風碧葉紛翶翔山齋頗幽寂萬籟含虛光觸物感豫懷歌彼淇澳章夜過丹陽錦纜徐牽夜未停遙天煙靄淡疏星居人兩岸明燈火早是輕帆過驛亭錫山朝遊惠山寺間飲惠山泉潄石流仍潔分池溜自圓松間幽徑闢巖下小亭懸聊共羣工濯天真本浩然吳閶鳴鑾獨上高城望巷陌遙通水寺斜土俗惟知鬭歌舞閭閻不解種桑麻鳥啼茂苑千年樹霜冷吳宫十月花聲教四方猶未訖願將淳朴變繁華虎邱小阜回岡落照紅長廊曲榭構西東獨憐劍石潺湲水霸業銷沉在此中句容道上漸入茅山境來當農暇時但看初日上未覺朔風吹碧斂寒塘水紅垂野樹枝江南經幾郡民俗欲周知雨花臺何地飛花雨晴空無片雲江山恣遐矚草樹出清芬城郭參差見樓臺逺近分人家百萬户煙火盡氤氲幸報恩寺鳳剎高懸上界燈珠缸璧帶一層層平臨下見諸天小晴日江山萬里澄駐蹕金陵以方物寄獻兩宫深宫違定省經月戀晨昏率土方為養蒼生共戴尊題書千里重託物寸心存遣使旌門外踟蹰望九閽金陵舊紫禁城懷古秣陵舊是圖王地此日鸞旗列隊過一代規模成往迹六朝興廢逐流波宫牆斷缺迷青瑣野水灣環剩玉河治理艱勤重殷鑒斜陽衰草繫情多示江南大小諸吏東南財賦地江左人文藪時巡歷此疆民事日探剖風俗貴淳厖紛奢詎能久澄清屬大吏表率羣僚首郡縣布慈和愷悌歌父母民者國之本生計在畎畝六府既孔修三事安可後教民默轉移各須盡官守户使敦詩書人知崇孝友庶幾逺邇氓皥皥登仁夀誥誡申豫懷斯言愼不負燕子磯夜泊巍峩一片江頭石千載人傳燕子磯疑有黿鼉藏窟宅時聞鐘磬出山扉牙檣緩住寒煙淨羽衛周連夜火圍沙岸聲聲動行漏蘆花深處雁驚飛高郵湖見居民田廬多在水中因詢其故惻然念之淮揚罹水災流波常浩浩龍艦偶經過一望類洲島田畝盡沉淪舍廬半傾倒煢煢赤子民棲棲卧深潦對之心惕然無策施襁褓夾岸羅黔黎跽陳進耆老咨諏不厭頻利弊細探討飢寒或有由良慚奉蒼皓古人念一夫何况覩枯稿凜凛夜不寐憂勤惄如搗亟圖濬治功拯濟須及早會當復故業咸令樂懷保南巡詩序朕念切民依咨詢幽隱於二十八年春再舉南巡爰自畿甸東臨齊魯沿泝江淮達於吳越曩者甲子之嵗輿衛所經瞻顧閭閻觀省謡俗憫懷澤國軫恤羣黎未嘗一日忘於朕心已嘗形諸篇詠載前集中今兹重歷郡邑見民物漸殷生業就理逺勝曩時中心慰悅又不禁吟咏及之途中停警撤蹕欲以洞悉輿情數千里間百姓歡躍載路星攢雲集瞻依愛戴發於至誠朕自惟化理何以克洽民情益用是欿然也乃於巡歷所至沛膏澤飭官方戒民俗修典禮經武備覽河防施諸事矣又發諸言或御帳殿或撫船窗吟咏所及性情在焉古人云詩言志凡朕篇章所寓時以民生風化惓惓為念即間於眺覽之際抒寫景物指顧山河要其寄託則自有在也因裒而集之為南巡詩一卷云南巡詩二再過淮南并序嚮者巡省江左道出淮南軫念窮簷憫懷澤國今見居民景象較前稍豐良慰朕懷前來歷兹境斯民似未遂今日再經過風土覺有異紈褐既充體廬舍各完置擁道歡趨迎扶老與擕稚咸云獲休息近免徭役纍水患日就平田疇可耕植一飲與一食莫不歌帝賜素念切民依時為勞寤寐大造本無私湛恩欲廣被聞言聊自寬庶慰省方意淮城曉霜聞雁天際晨光水月連帶霜歸雁向前川盂城曉發寒仍在談笑春風雜紫煙蠲江南逋賦并序江南屢年逋賦二百二十餘萬逐嵗帶征聞吏民頗以為纍朕志存約已宏浣衣菲食之風事期裕民師挹彼注兹之義特頒詔令悉與蠲除國家財賦東南重已責蠲租志念殷膏澤何妨頻見渥普天願與樂耕耘過維揚并序南巡以來減撤儀衛所歷都邑垂髫戴白聽其趨蹌馬首有以管籥迎者輒禁止之頃過維揚商民比屋連艘充盈可喜但結綵張燈闐溢巷陌雖𨝍溝為東南孔道歡迎亦兆庶至情猶恐前途相效敕地方長吏諭以省費惜財并賦此詩重過𨝍溝地春風細草生帆檣連賈舶笙吹滿江城物力須教惜民情亦見誠繁華當淑景氣象喜充盈金山江天寺獨愛江天寺停橈上碧峰波瀾聲浩浩樓閣勢重重日暖浮雙樹風微送午鐘遙看南北岸春色淡舂容焦山焦山何岝崿遙與金山峙草木盡蒙茸幽偏隔城市放舟下中流攀蘿上涯涘隱士不可招鶴銘洵足紀棲鶻驚人飛暮雲千萬里駐蹕金山煙霧空濛水國昏夜移鳳舸泊山門然犀欲照黿鼉窟臥聽濤聲自吐吞雨過錫山輕雲冉冉霧彎環細雨絲絲羃逺山畫舫青簾開曉坐平波漫衍白鷗間虎邱望山後試劍空存石生公尚有臺愛看山後景錯落野田開鄧尉山鄧尉知名久看梅及早春豈因耽勝賞本是重時巡野靄朝來散山容雨後新繽紛開萬樹相對愜佳辰鄧尉小軒望太湖山軒間坐倚前楹萬頃澄湖夕照明夜久天心初月上笙簧謖謖奏松聲登靈巖霏微靈雨散春煙按轡逍遙陟翠巔香水通流明若箭琴臺列石勢如拳諸峰盡在青蘿外萬井全依綵仗前聞是吳宫花草地空餘鐘磬梵王筵晚過吳江垂虹蜿蜒跨長波畫戟牙檣薄暮過燈火千家明似晝好風好雨祝時和入平望并序平望為浙江界長吏以畫舫五百來迎恐勞民力卻之不御錦纜無勞列綵艭輕橈自愛倚船窗勤民不憚周行逺早又觀風向浙江將遊華山以欲雨未往欲向青山澗壑行春雲又變曉隂輕勾陳不遣驚禪定恐礙林間碧草生雨中幸錫山園林淡冶青山色幽探傍曉來煙籠巖下竹雨洗石邉苔斷續聽啼鳥飄搖惜落梅胸襟原浩蕩隨意坐亭臺惠泉寒雲覆樹昔年經甲子觀惠泉在十月再品山泉到此亭春水一犂農事足喜看膏雨遍郊坰無錫小民以羔羊惠酒爭獻御舟笑而遣之自昔君門隔九閽如何草野得攀援多因愛此元元切忘分公然學負暄句容雨望山行逐高低四望多松樹雨裏萬人家遙看隔雲霧巡幸江寧南省封疆惟此區江流環繞壯規模華旗芝蓋重臨幸二水三山半畫圖吏事莫先田野治民情但願閭閻孚不知比嵗恩波洽止聽黃童白叟呼賜江寧文武將士宴於教埸瑞雲捧日曉初晴麗景天開羽仗明扈蹕赳桓多絳灌分行俊譽盡璁珩三漿滿浥沾須遍五載南巡澤再傾自甲子南巡今已五載文穆武恬慙化理萬方無事宴升平再過明故宫樓臺金粉已沉銷不獨詩人説六朝月落宫垣春寂寂經過惟歎草蕭蕭江寧駐蹕并序江寧士民羣詣行在爭獻米榖兼羅果蔬涕泣請留屢諭不止俯徇億兆之願勉遲信宿之行心勤民隱獨咨諏不為江山作勝遊白下回鑾期已近黔黎擁道欲何求多憐野老堆盤獻勉就輿情兩日留二十八年宵旰意豈圖逺邇慕懷柔後湖渺渺長湖水春來發緑波飛鳴下鳬雁朝暮集漁蓑登報恩寺浮圖湧地千尋起摩霄九級懸琉璃垂法相翡翠結香煙締造人功巧流傳世代遷曠然彌逺望萬象拱諸天上巳日再登金山晴和逄上已况在大江濱正是回鑾日揮毫記此辰長江夜月萬頃淪漣映平沙一望收天光起水色雲影共波流隔岸姑蘇逺臨軒夜月浮民情咸自得何必泛龍舟曉發維揚順風揚帆午餘已過秦郵傍曉發蕪城風帆疾如駛晚照半平湖舟行百餘里自宿遷解纜一日夜達山東境千里南程幾日回輕舟直下泝瀠洄天風更假帆檣便一夕山東境上來南巡詩序朕三度南巡咸因視河親為籌畫遂至江浙察吏安民所歷之地隨其時宜廣沛膏澤拯疾苦焉兹行兼奉皇太后鑾輿而南既可無闕定省之儀且欲見先帝開基富有四海而朕守成教育率土清寧撫慚付託以博慈顔之懌悅然往返遄迅絶無滯留百司章奏三日一送行在即與剖決舟行多暇仍覽書史日操觚翰偶寄吟篇莫非記採風俗時存懷保競業之意後之人讀朕前後南巡諸詩知朕心之有在云爾南巡詩三入江南行盡兗東程乍入江南路水潦切痌瘝深心察其故經邳徐界上泗水通淮澤坡陀認馬陵經過懷十載户口幾新增雨雲氣未肯開綿密清明雨繫纜古河湄為念夫徒苦閲河淮黃疏濬費經營跋涉三來不憚行幾處隄防親指畫佇期耕稼樂功成渡揚子江曉霧風初豁揚帆縱綵舟危峰真屹立漩水急洄流碧轉沿江栁沙平逺嶼洲十年巡再至騁目睇神邱金山寺月夜江山春物已雍和萬里晴光月倍多重倚高樓觀海闊浩然心境更如何巡歷江南示意財賦稱兹地時巡復此經春膏宜豆麥煙景遍林亭靡麗風應換敦厖訓屢形施恩頻已責聊爾翠華停虎邱隨風畫楫到山塘水市隂籠草木香石不點頭誰説法惟存澗響雜笙簧示江南浙江守土諸臣宇宙方清寧吏治尚端亷農使樂耕鑿民使適里閻大寮總其要小吏毋苛纎紀綱不可弛隨時酌寬嚴為上能自愛羣屬必畏鉗訟惟善得情操守時警砭勿恃才妄作勿以媚自忺務令比户豐膏澤逺近霑朱轓與彤騶萬姓所具瞻臧否道有碑防口難可箝不見廣厦材聳幹從幽潛不見沖霄鶴飲啄本靜恬告誠示勉朂保護兹庶黔花山警蹕來初地青山鳥道深風生松澗合雲暗石苔侵靜晝飛間蝶餘香噪晚禽空留支遁迹物外託宸襟支硎山龍池東北古支硎石室寒泉句可聽支遁詩云石室可蔽身寒泉濯溫手想得雨餘懸瀑布飛流界破數峰青回鑾復過惠山是誰妙筆點巒容藴藉迎人四五峰堪挹山泉烹雀蕊併添新黛入甌濃舟行野望惠風萬頃下芳畦逺水拖煙曉狀迷河上草新才覆地林間花墮半沾泥翩翾弱燕穿船入宛轉芳鶯隔樹啼若問撫闌端坐意默思豐裕洽羣黎駐蹕江寧偶述雲覆輕隂雨淨塵南巡又隔十經春山河舊數陪京重士庶今看沐化淳古巷烏衣人已換芳洲白鷺迹成陳元元億萬咸安樂教養休和屬大鈞修報恩寺塔初畢登之塔勢搖晨旭憑陵上九霄琉璃莊淨域金碧起香寮地俯三山近江環匹練遙隔窗雲霧起户户瑞煙飄過明太祖陵有感拔起英雄草昧間煌煌大業豈能刪玉魚金碗雖如故煙霧低迷獨愴顔月夜登燕子磯石勢疑飛動江濤足下看天空來皎月風定斂奔湍緑樹燈光亂蒼崖夏夜寒經過覩形勝往往駐鳴鑾江行風帆來往亂江流樓櫓縱橫拍浪浮只在艄工持柁穩曾將為政喻操舟金山雨望煙樹重重兩岸間流雲著水水漫漫江煙江樹無窮盡不讓蓬瀛島上山山中晚霽返照開澄景餘霞作綺流夜深明月出隔岸見蘆洲中泠泉靜飲中泠水清寒味日新頓令超象外爽豁有天真望焦山念己巳曾登其上大江日夜波汪洋金山焦山兩相望金山樓閣蕩丹碧焦山竹樹多鬱蒼境深流廣人罕至往年曾一登其岡頃者放舟仍北渡壯哉滉漾雲低昻青巖翠壁幽且蒨圖經名著傳焦光何時瘞鶴在山足遺銘剝蝕存華陽山下有瘞鶴銘為華陽真逸撰止存六十餘字葭洲白鳥忽飛出江花冥冥江草芳是日雨餘氣清淑夏首晴晝欣舒長倚艦四顧暢襟抱好風豁達來天閶念淮揚居民特留漕糧二十萬以濟之回鑾之日復諄諭所司使布實惠廣厦豈不樂何事駕飛艫意惟悉民隱遑問歷道途淮揚皆巨郡地本號饒腴居人百萬家土狹濱衆湖禾麥茍不登老幼日待餔恩意宜渥沛拯濟留天儲實惠布州邑逺邇均有無諄諭嚴再三毋徒飽吏胥茅屋有起色比户充黍稌願兹瘠壤農皥皥躋唐虞泛洪澤湖偶詠積水空明浸太虛輕舠間泛進徐徐菰蘆絶岸柴門小終嵗生涯業捕魚渡河北歸三吳問俗罷旋蹕渡洪流微日籠華蓋輕飈送御舟水能安泛濫堤遣護田疇自此民休息紓豫南顧憂宿遷行過江南水與山栁舒花放鳥緡蠻明朝重至邳州路鳳闕龍樓計日還賜總河靳輔防河紓旰食六御出深宫緩轡求民隱臨流歎俗窮何年樂稼穡此日是疏通已著勤勞意安瀾早奏功高旻寺碑記茱萸灣者乃維揚俗稱寶塔灣也居三岔河之中南眺金焦諸峰北枕蜀岡之麓足為淮南勝地凡上江由儀真下江由瓜步至此皆會歸運河而北上也朕比嵗以來躬臨河干咨詢經畫者屢矣每抵一處未嘗不懷保編氓施惠工商故兩淮鹽課永減額徵停輸贏羡又聞往來迎送費用私派者甚巨特頒嚴旨盡為禁止從此商民得以安席漸皆獲所則朕之巡幸者少有益乎朕三十八年奉皇太后鑾輿偕行晨昏侍養視河既畢勉從輿請濟江而南周覽吳會民生風俗見茱萸灣塔嵗久寖圮朕欲頒內帑略加修葺為皇太后祝釐而衆商以被澤優渥不待期會踴躍赴功庀材協力唯恐或後不日告竣舊剎式廓鼎新莊嚴宏敞兼以翬飛傑閣憑高四眺臨大江通南北因書額賜之曰高旻寺勒文於石垂示久逺惟是雨㿩應時河海清宴舉一世共臻於仁夀之域斯四十餘年宵旰勤民之念所厚期也即此塔工藏事具見羣情愛戴之誼出於至誠是亦有不可泯者爰為書之以志始末云康熙四十三年秋九月重陽日書操舟説器之利用而致逺者陸行莫如車水行莫如舟舟之為用也逸於車而險或過之若享其逸而不入於險則恃乎操舟者之有其道也當夫水石擊撞波濤怒飛回帆如騖驟合若離此非其巧之為乎至於浮滄溟駕虞淵歷艨艟如衽席泛浩瀚以洄沿此非其習之然乎若或凌萬頃之中流驚颶風之四集檣楫攲傾徒侶失色巧者不及施習者不及試斯時也惴惴然有胥溺之憂自非備之以至豫而持之以至愼殆鮮克濟事焉蓋其所為巧與習者藝也而其所為豫且愼者道也易曰濡有衣袽終日戒詩曰紼纚維之言其豫也言其愼也朕南巡江淮間見操舟者茍備之豫而持之愼矣雖大舟罔弗如其意之所欲為焉苟備之不豫而持之不愼舟雖小亦不能勝任而愈快也夫舟一器操舟一藝耳猶必有道持之以不至於敗况居天下之大器者哉揚子有言乘國者其如乘航乎航安則民安矣此物此志也河臣針自古水患惟河為大治之有方民乃無害禹疏而九平成攸賴降及漢唐決復未艾漸徙而南宋元滋溢今河昔河議不可一昔止河防今兼漕法既弭其患復資其力矧此一方耕鑿失職澤國波臣恫瘝已極肩兹巨任曷容怠佚毋俾金隄潰於蟻穴毋使田廬淪為蛟窟毋徒糜國帑而勢難終日毋虛勞畚築而功鮮核實務圖先事盡利導策莫悔後時飾補苴術勿即私而背公勿辭勞而就逸惟潔清以自持兼集思而廣益則患無不除績可光册示我河臣敬哉以朂漕臣針國家定鼎會極幽冀嵗漕東南積偫惟備舳艫銜尾數百萬計轉輸有程貴以時至專設重臣式董厥事我徒我旅亦云孔勩尚其寬恤厚彼糗粻尚其撫綏摩彼疴癢毋借空名耗閭左藏毋踵陋習損經制常爾克持亷則吏罔弗臧吏克守法則軍罔弗康軍既樂康競挽以將孰困而逋孰盜其糧官茍剝之用飽己囊下復效之鼠雀曷防濡滯河干如稻集蝗總計而論蝕我太倉國儲民食毋乃兩傷爾膺斯任莫忝王章提鎮針武臣之職建威銷萌星羅棊布以壯干城韜鈐宜裕紀律宜明拊循宜至訓練宜精計安黎庶爰設五兵易言畜衆詩詠求寧閭閻參伍勿擾吾氓山無伏莽海絶長鯨民恬耕鑿惟爾之能饋餉時給毋致呼庚爾能亷潔衆以飽騰投醪飲河古史所稱惠逮卒伍忠愛乃生如捍頭目如衛父兄羣心從違視爾攸行文武輯睦毋相抗衡軍民調劑務持其平朕親簡閲黜陟有程下逮偏裨選授匪輕才勇必録窳隋必懲矧爾大帥節鉞是膺宜體朕意勉竭股肱江南通志卷首二之二欽定四庫全書江南通志卷首三之一世宗憲皇帝詔諭康熙六十一年十一月奉天承運皇帝詔曰惟我國家受天綏祜太祖太宗肇造區夏世祖章皇帝統一疆隅我皇考大行皇帝臨御六十一年德茂功高文經武緯海宇寧謐歷數悠長不謂謝棄臣民遽升龍馭親授神器屬於藐躬朕皇考大行皇帝德妃之子昔皇二子弱齡建立深為聖慈鍾愛寢處時依恩勤倍篤不幸中年神志昏憒病類風狂皇考念宗社重任付託為艱不得已再行廢斥待至十有餘年沉疾如故痊可無期是以皇考升遐之日詔朕纘承大統朕之昆弟子姪甚多惟思一體相關敦睦罔替共享升平之福永圖磐石之安孔子曰三年無改於父之道我皇考臨御以來良法美政萬世昭垂朕當永遵成憲不敢少有更張何止三年無改至於皇考知人善任至明至當內外諸大臣朕方亟資翊贊以期終始保全務宜竭盡公忠恪守亷節俾朕得以加恩故舊克成孝思倘或不守官針自干國紀既負皇考簡拔委任之恩又負朕篤愛大臣之誼部院屬吏直省有司亦宜實心任事潔已奉公不得推諉上官自曠厥職天下百姓受皇考恩澤日久蠲賑頻施勸懲備至間有愚氓甘犯律令皇考每遇讞決必加詳審爰書纍牘披閲靡遺少有可生之路立施法外之仁凡我百姓各宜孝親敬長畏罪懷刑以副朕仰法皇考如天好生之意兹因諸王貝勒大臣文武官員人等僉謂天位不可久虛宗社允宜早主再三陳請朕勉徇輿情暫抑悲痛於是月二十日祗告天地宗廟社稷即皇帝位以明年為雍正元年仰惟先志之宜承深望皇圖之永固遹昭新化期衍舊恩於戲追慕前徽繼述無忘於夙夜廣推聖澤恩膏願被於寰區凡爾親賢文武其共矢藎誠各輸心膂用紹無疆之業永垂有道之庥布告天下咸使聞知雍正元年三月二十五日江蘇巡撫奏請寬免蘆課等項銀兩奉上諭江蘇等屬民欠地丁等項銀一百三十一萬餘兩內蘆課等項銀九萬八百兩零雖非恩詔內應行豁免之項但此事歷年最久倘行催徵窮民必致受纍著一併豁免雍正元年七月二十八日户部以蠲免項內蘇太屬下衛所舊欠屯折等項錢糧請旨奉上諭未完屯折銀二萬四百九十餘兩內存留俸工銀一千二百九十餘兩雖不應豁免但此事歷年已久該撫既稱實係拖欠在軍著一併豁免雍正元年八月十二日諭兩江總督查弼納江南提督高其位署江蘇巡撫何天培浙江巡撫李馥太湖三萬六千頃連跨數郡地勢既廣支流復多為盜賊出沒之所平時既易藏姦巡捕又難著力故蘇常盜案多於他省良善被擾官吏處分皆因太湖為之巢穴也爾等均有統轄之責可公同確議遴選賢員清查嚴緝俾匪類就擒餘黨解散日後作何稽察防範之法不使宵小復萌地方長享寧靜之福以副朕禁盜安民之意雍正元年九月十六日户部將江蘇所屬蘇太等衛舊欠項下不應蠲免銀兩請旨奉上諭此民屯地丁等銀三百五萬九千餘兩內地租等項銀六千八百七十餘兩雖不應豁免但此事歷年已久實欠在民著一併豁免雍正元年十月二十六日諭户部朕自御極以來宵衣旰食無日不以民依為念督撫以下守令以上凡有地方之責者均宜公忠體國仰副朕心今年夏月朕以北省二麥歉收差員到南省於秋成後採買米石以備賑貸平糶朕意切於為民正欲酌盈劑虛以羡補不足也又恐有不便於民之處於差員臨行之時再三申諭地方米多方可採買不必定要買足今聞各省地方官因欽差買米禁止商販不許出境大負朕痌瘝一體之意甚屬不合况浙江及江南蘇松等府地窄人稠即豐收之年亦皆仰食於湖廣江西等處今秋成歉收若商販不通必致米價騰貴該部速即行文各省總督巡撫凡有米商出境任便放行使湖廣江西安慶等處米船直到蘇州蘇州米船直到浙江毋得阻撓庶幾有無流通民皆足食以副朕愛養元元之意雍正二年四月初九日諭江南總督查弼納漕運總督張大有署理江蘇巡撫何天培朕惟漕運所經河道固以通國廩之挽輸亦以便商民之利涉旗丁與商民自應一視同仁無容偏護而偏纍也去年因秋冬雨少河流淤淺而旗丁人等不顧漕運維艱任意攬載客貨致船重難行聞今春丹陽常州等處地方及沿途遇淺槩拏商船起剝且借名需索貪暴公行得賄者雖空船亦行釋放不遂其欲者勒令當差有將貨物行李拋棄河干紛紛露積或為風雨所損傷或為盜賊所窺伺該管漕運文武官辨漫無約束毫不經心小民營販資生何以堪此擾害爾等係地方大吏皆當實心體恤稽察周詳奉諭之後或再有起剝之事當各嚴飭所屬官辨申明約束不得仍蹈前轍並出示遍諭軍民人等使知朕一體軫恤之至意至張大有身任總漕糧艘往來乃其專責尤宜整肅綱紀釐姦去弊嚴明馭下毋使玩法犯科乃往往固執己見袒護下屬任其沿河盜賣漕糧兼倚勢藐法貽纍地方甚屬不合今除已往不深究外嗣後若仍不加意約束屬員有心縱容及失於覺察再經朕訪聞定行嚴加議處其欽承毋忽雍正二年六月初七日户部奏江寧安徽福建陜西四省未完民欠與恩詔年久應免之條相符者候旨豁免奉上諭此事部議自康熙十八年至四十五年止舊欠銀米等項豁免著將五十年以前舊欠銀米等項俱察明豁免議奏雍正二年八月二十四日諭户部前因江浙督撫等摺奏七月十八十九等日驟雨大風海潮泛溢衝決堤岸沿海州縣近海村莊居民田廬多被漂沒朕即密諭速行具本奏聞賑恤但思被災小民望賑孔迫若待奏請方行賑恤致時日耽延災民不能即沾實惠朕心深為憫惻著該督撫委遣大員踏勘被災小民即動倉庫錢糧速行賑濟務使災黎不致失所其應免錢糧田畝即詳細察明請蠲凡海潮未至之村莊不得混行濫冒至於緊要堤岸衝決之處務須速行修築無使鹹水流入田畝朕念切痌瘝務令早沾實惠該地方官各宜實心奉行加意撫綏俾凋瘵得蘇生全速遂以副朕勤恤民隱至意爾部即行文各該督撫遵奉速行雍正二年九月二十一日諭江南浙江總督巡撫等今嵗七月中颶風海潮泛溢江南浙江沿海州縣衛所堤岸多被衝塌居民田廬漂沒朕軫念深切已降諭旨令江浙地方官亟行賑濟撫綏毋使災黎失所今被衝海塘若不及時修築恐鹹水灌入內河有礙耕種爾督撫等著即查明各處損壞塘工料估價值動正項錢糧作速興工至沿海失業居民度日艱難藉此傭役俾日得工價以資糊口是拯救窮民之法即寓其中矣將此再行飭諭務期實心遵旨速行以副朕憂恤元元至意倘有不肖地方官扣尅工銀及怠緩不力者該督撫嚴查即行題參從重治罪雍正二年九月二十一日河道總督齊蘇勒副總督嵇曾筠各奏報黃淮秋泛情形奉上諭據奏黃淮二水經過秋汛工程平穩知道了齊蘇勒自補授總河以來實心效力與嵇曾筠各率屬員將各處堤工搶修保固雖河水泛漲堤工俱各無虞甚屬可嘉齊蘇勒著給與世襲拜他喇布勒哈番嵇曾筠著加三級齊蘇勒會同嵇曾筠將河工實在效力行走勤勞顯著之員察明造册送部議敘雍正二年九月二十二日諭湖廣總督楊宗仁江西巡撫裴􅏍度河南巡撫田文鏡山東巡撫陳世倌安徽巡撫李成龍今嵗各省秋成大有惟浙江江南沿海地方七月十八九等日海潮泛溢近海田禾不無損壞朕軫念災黎惟恐失所業經嚴飭各省督撫發倉賑濟多方撫恤但蘇松杭嘉等府人稠地狹向來出米無多雖豐年亦仰給於湖廣江西及就近鄰省今沿海被災恐將來米價騰貴小民艱食湖廣江西地居上流河南山東二省接壤江南今嵗俱各豐收安徽寧太等府屬亦俱收成豐稔著動湖廣司庫銀買米十萬石江西司庫銀買米六萬石運交浙江巡撫平糶動河南司庫銀買米四萬石山東司庫銀買米六萬石安慶司庫銀買米五萬石運交蘇州巡撫平糶俱著速即辦理選委亷幹賢員陸續運送平糶銀兩仍移還補庫其米應於何地交卸湖廣江西督撫即咨會浙江巡撫河南山東安徽巡撫即咨會蘇州巡撫酌議速行務於蘇松杭嘉四府民人有益毋得怠緩遲誤雍正二年十月初四日禮部議覆條奏江海等神應加封字號遣官致祭奉上諭致祭禮儀宜極加虔敬其應封字號著敬愼選擬仍行文直𨽻山東江南浙江福建廣東督撫每省各查一江海大神廟將修理之處具奏雍正二年十月二十日兩淮巡鹽御史奏報海潮衝決奉上諭據奏七月內海潮衝決范隄沿海二十九場溺死竈丁男婦四萬九千餘名口鹽地草蕩盡被漂沒朕心憫惻如同執熱著即動鹽課銀三萬兩委員分路賑恤務使得所不必該御史捐補其未完折價錢糧四萬餘兩悉行蠲免毋得仍稱帶徵名色致纍現在窮丁該部遵旨速行至淮商運行鹽斤恐竈丁一時未能煎辦應作何接濟民食該部作速確議具奏雍正二年十月二十五日諭江浙兩省督撫提鎮江浙兩省沿海地方於七月十八十九兩日皆被潮水漂沒居民廬舍雖經頒旨加意賑恤然朕憫惻之念至今尚未能釋惟有朝夕警惕以答天意但海為衆水所歸無不容納今乃狂潮泛溢水不循軌或者海洋潛藏匪類亦未可定稽諸前事往往有之沿海各省督撫提鎮務須實心愛養小民整理營伍俾閭閻各安其業汛防有備無虞毋令海洋别生事端庶不負朕委任之意雍正二年十二月初四日諭吏部尚書朱軾浙江沿海塘工最為緊要署巡撫石文焯前奏必須通用石塊修築後又奏稱不必用石全無定見誠恐貽悮塘工朕已諭令法海佟吉圖作速詳議具奏矣但恐法海等初任不諳地方情形爾曽為浙江巡撫必知海塘緣由著馳驛前往浙江將作何修築之處會同法海佟吉圖詳查定議交與法海等修築爾即回京朕思海塘關係民生必須一勞永逸務要工程堅固不可吝惜錢糧江南海塘亦為緊要爾浙江事竣即至蘇州會同何天培鄂爾泰將查勘蘇松塘工如何修築之處亦定議具奏雍正三年三月十九日管理户部事務怡親王奏請酌減蘇松浮糧奉上諭覽管理户部事務怡親王所奏具見勤求民隱為國推恩之意正應户部辦理之事蘇松之浮糧當日部臣從未陳奏常厪皇考聖懷屢頒諭旨本欲施恩裁減乃彼時大臣以舊額相沿已久國課所關綦重恐損上益下非理財之道數以不應裁減固執覆奏凡國家大事因革損益必君臣計議畫一始可舉行若皇考違衆獨斷既非詢謀僉同之義且恐一時減免倘後來國用不足又開議論之端是以從衆議而中止然聖慈軫念蘇松誕敷渥澤屢蠲舊欠以紓民力其數較他處為多是亦與裁減正額無異也今怡親王等悉心籌畫斟酌奏請甚為可嘉朕仰體皇考愛民寬賦之盛心準將蘇州府正額銀蠲免三十萬兩松江府正額銀蠲免十五萬兩論語曰百姓足君孰與不足周易曰損上益下民悅無疆朕但願百姓之足時存益下之懷用是特沛恩膏著為定例俾黎民輕其賦稅官吏易於催科可飭令該地方知之雍正三年五月十六日奉上諭朕軫念民生蠲租賜復不過行吾心之所安使斯民共沾實惠並無一毫市恩之念欲以崇尚虛名也前蠲免江南蘇松兩府浮糧彼處士民感激朕恩為朕祈福聞有誦經立碑蓋造龍亭聚會演戲者雖或出於愛戴之誠然實非矢報君親之理朕所望於天下者祗欲各安職業端本務實以生以養庶幾家給人足共享升平仰報我皇考之付託耳以云祈報莫大於此至於誦經禮懴諸事皆為粉飾虛文即謂頌禱致虔亦於朕躬毫無所益且聚衆演戲蓋造碑亭非徒糜費金錢兼恐有不肖官吏及里胥人等借名私派乾沒肥已貽纍小民俱未可定此等陋俗聖祖仁皇帝久已洞悉屢曽降諭旨禁止及朕臨御以來曉諭天下人民務本重農力行節儉而聚衆演戲諸事更屬奢靡浪費蘇松士民習於華侈今又為此虛文以祈朕福甚非朕意朕實惡之著該督撫嚴行禁飭其碑亭建造之處槩行停止仍遍諭士民各歸本業以副朕懷嗣後仍有此等浮華之舉朕必嚴懲以法雍正三年五月十七日諭户部去嵗江浙海潮衝溢沿海場竈淹沒之處甚多兩淮鹽政所屬地方經噶爾泰奏聞朕即發帑賑恤并將雍正元年二年竈户未完折價銀四萬餘兩悉行蠲免其兩浙鹽政所屬地方該巡鹽並未將被災之處題報今謝賜履摺奏去秋海濤飄決情形兩浙與兩淮無異朕一視同仁務使率土均霑膏澤著將華亭婁縣上海海寧餘姚蕭山慈溪等縣雍正元年二年未完場課銀兩悉行蠲免該鹽政通行曉諭俾各場丁户人人得霑實惠將巳未完場課數目確查報部倘有不肖有司將已完作欠或借端朦混私行重徵者即指名題參若通同隱匿後經察出將該鹽政一併從重治罪該地方督撫仍嚴加稽察毋使吏胥中飽以副朕勤恤窮丁普濟同仁之至意爾部即遵諭行雍正四年正月十二日奉上諭據兩淮巡鹽御史噶爾泰奏稱衆商感戴保育生全賑恤蠲免之恩今鹽豐課裕商業已隆情願公捐銀二十四萬兩備交運庫又伊自己名下有應得銀八萬兩亦願報部撥解等語從前兩淮鹽課虧欠甚多自噶爾泰辦理以來歷年商欠正項贏餘俱一一完納恤商裕課鹽政肅清甚屬可嘉朕前曽降諭旨令江南督撫酌議積穀以為備用今衆商公捐及噶爾泰奏請解部之項共計三十二萬兩著將二萬兩賞給噶爾泰其三十萬兩可即為江南買貯米榖蓋造倉厫之用所蓋倉厫賜名鹽義倉即著噶爾泰交與商人經理如此則於地方積貯甚為有益而衆商急公之項亦得實濟著議政大臣大學士九卿詳議具奏噶爾泰著該部從優議敘其急公衆商行令噶爾泰分别造册報部亦著議敘以示鼓勵雍正四年二月二十九日諭江蘇巡撫朕每見蘇松漕米虧空案內一經承名下侵蝕至二三千石訪問其故知糧重倉多之處州縣官不能兼顧聞點派收書經管收納所收民糧除丁兌外原有斛靣餘米存留在倉遂有糧户將應上米石私相折銀收書將餘米劃算逮收折既多倉內餘米不足以補而所收米價又已隨手花費以致虧空漕項此不可不嚴立條禁也嗣後收書有侵蝕漕米者該州縣詳參後審究確實按其米數即照監守自盜律治罪為當并將簽派收書之員題參議處其侵蝕米石查明私折之糧户著於各糧户名下追補庶可懲滑吏而警愚民爾可議奏至各州縣所收倉糧丁兑之外倘有贏餘令該州縣報明存貯公所為修理常平倉厫之用再有餘剩歸入常平倉以佐賑濟該撫嚴飭蘇松二府各州縣實心奉行倘有借餘米名色加收斛面遺纍小民者定行從重治罪決不少貸特諭雍正四年十二月初十日奉上諭今嵗江南地方秋雨稍多其江安所屬被水之州縣已令該督撫轉飭有司確查賑恤務使小民得所但聞入冬以後時有隂雨積水未消春麥未能及時耕種恐交春米價漸昻而青黃不接之時更須預為籌及况蘇松户口繁多民間食米多取給於外販尤當早為留意查江安糧道有存貯還漕一項約計二萬八千餘石安慶廬州鳳陽淮安四府各有分貯留漕之項共計九萬餘石此米原為地方備用而設但恐年月已久未必實貯在倉應差京官一員前往確查並會同江南督撫作何分别留運平糶之法以濟民食但江南地廣人稠恐需米之處此數未必敷用必設法多貯方覺寬裕其應作何採買送運備用之處著九卿速議具奏雍正四年十二月二十一日諭户部江南地方今嵗秋冬雨水稍多低窪之處未免減收目前米價雖平恐明嵗青黃不接之時價值不免昻貴朕心軫念預為籌畫已特遣專官將從前截留之米一一清查會同該督撫商酌以濟地方之用又令該督撫動用正項錢糧委員於鄰省採買米榖以備積貯平糶之需朕思蘇松常鎮四府地廣人稠需米甚多而四府所屬漕兑共一百四十餘萬石居七省漕糧三分之一今州縣既有被水之區恐小民輸納匪易著將成災五分以上之地畝應出漕米緩徵一半約計將及二十萬石俾閭閻既寬正額之輸將而地方又有多餘之米粟則編户窮黎當不慮其乏食矣其緩徵一半漕米著於雍正五年秋收後帶徵完納其不成災之地畝仍照額徵之數準其紅白兼收著將此速諭該督撫遵行雍正五年正月二十八日奉上諭地方水利恭紀河渠志雍正五年二月初六日諭兵部水師甚屬緊要現今天津設立水師滿洲官兵操練學習其江寧駐防滿洲官兵亦應照天津水師之例設立水師令其操練鎮江水師現有船隻將此船內酌量撥給江寧將軍令其學習操練至如何操練應撥給船隻若干或船隻不敷作何添造之處爾部一併定議具奏雍正五年六月初二日江蘇巡撫陳時夏奏報婁江水利工程告竣士民請建萬壽碑亭奉上諭朕以實心舉行實政全不好尚虛文如士民感恩建碑之事屢降諭旨嚴行禁止今因江南婁江水利工程告竣士民具呈謝恩內有願鐫萬壽碑之語而巡撫陳時夏代為具題貼黃內並未將建碑字樣敘入明係欲從民請故本章內有意含糊甚屬不合可速止之雍正五年九月十二日奉上諭朕因直𨽻湖廣州縣數處近江臨河平時易於被水者今嵗又經潦溢故降特旨將錢糧全行蠲免此乃軫念水鄉之民施恩格外而他處聞知遂生冀幸之意如固原地方六月偶遇氷雹而鍾保遂張大其事捏詞具奏續據路振揚摺奏前來始知暫時驟雨帶有氷雹夏苗並未傷損秋禾發生茂盛今覽鍾保本章亦自稱勘不成災似此虛假衆所共見朕因人情如此是以聞江南浙江近水之地亦有數處被水未曽加以格外之恩然軫念窮民朕懷殷切著江南總督范時繹動用庫銀二萬兩於上下兩江應用之處散賑著浙江巡撫李衛動用庫銀一萬兩於應用之處散賑務選賢員辦理令窮民均沾實惠儻有餘剩銀兩著該督撫奏聞雍正五年九月十六日雲貴總督鄂爾泰條奏江南三江水利事宜奉上諭覽鄂爾泰所奏江南水道事宜甚屬周詳但摺內有越職陳奏字樣凡內外大臣越職辦事固為不可至若有關於國計民生者雖非已身職任之事既有見聞即當據實入告方合公忠體國之義此乃盡職非越職也如孔育珣經過鳳陽地方即以水利情形奏聞朕甚嘉之鄂爾泰所奏著發與范時繹陳時夏齊蘇勒陳世倌鄂禮就近詳加相度悉心妥議具奏雍正五年十一月初十日奉上諭自古治水之法惟在順其自然之勢而利導之蓋水之為害者大抵由於故道湮塞使水不得徑直暢流以致泛溢而為患但恐徑直之路湮塞年久或民間既已蓋造室廬開墾田畝或且安葬墳墓人情各顧其私不知逺大之計今見欲於此地開濬河道則因循規避百計阻撓而司其事者未免惑於浮議遂致遷就紆回别開溝洫茍且從事而不能成一勞永逸之舉此治水之通弊也昨嶽鍾琪奏稱陜西現在興修漢渠以濟民田亦以開濬之處不無礙於墳墓故爾遲回朕諭之曰果係民間墳墓所在當給與買地之價令其遷葬民自樂從嶽鍾琪云若果給與遷葬之費則公私均便小民無不樂從者朕已諭嶽鍾琪在陜遵行目今江南地方現在興修水利著該撫與欽差官員亦照此辦理若水勢必由之路有礙墳墓即於興修水利錢糧內動支銀兩給與本人令其改葬俾小民既有營葬之資而河工亦收利導之益則水患可除水利可興地方永逺蒙福矣雍正五年十二月十八日奉上諭吳淞石塘當日勘估之時於海潮紆緩之處酌量修築土塘蓋因工程浩大諸臣勘估為節省錢糧起見故如此定議但東南財賦之區灌溉田畝保聚室廬全賴海塘捍衛朕思海勢衝激風濤旋轉難定土塘經歷年久未免可虞不若一例盡修石塘為百姓萬年之利似為一勞永逸朕詢問齊蘇勒亦云甚當著陳時夏陳世倌鄂禮等將現在土塘改築石塘之處確行勘估詳悉定議具奏不得惜費省工茍且塞責務須堅固永垂久逺以副朕經理海疆愛養民命之至意雍正五年十二月二十日兩江總督范時繹奏報估計修濬太倉州河道工料銀兩奉上諭據范時繹奏稱太倉州鎮洋縣士民僉稱境內劉河巨工已蒙發帑開濬而七浦一河原係民田沾獲其利今情願照依舊例業户給食佃户出力不敢再費帑金等語朕思君民原屬一體民間之生計即國計也倘遇國用不敷之時勢不得不資藉於民力今國家財用充足朕為地方籌畫萬年之利不惜多費帑金興修巨工養育萬姓若仍用民力以辦公事非朕本心也况小民效力工程或致荒其本業而又不免官吏之督催煩擾朕心實為不忍昨蘇州一二有力之紳士懇請捐資以助地方之公事與此不同朕是以降旨準行著將范時繹所奏士民捐助之處停止仍動用公帑辦理並將朕旨遍行曉諭該州縣士民伊等當體朕愛養元元之心於工程告成之後加意照看嵗嵗疏濬防護俾地方永受其益則勝於目前之趨事赴功多矣雍正五年十二月二十八日奉上諭朕因蘇松等處地方水利功程關係民生最為緊要特遣官員會同巡撫等悉心經理務期修築開濬以惠蒸黎凡工用所需悉發庫帑絲毫不以煩勞民力諭旨頒布至再至三昨范時繹奏稱太倉鎮洋士民僉云劉河巨工已費國帑其七浦一河工程民間情願出力以助修濬不敢再動帑金等語朕又復降旨嚴行禁止此中外所共知者頃聞長洲元和等縣有按照田畝科派銀兩之事朕思工費悉用帑金原以杜科派田畝之弊昨太倉等處士民懇請出力助工朕且嚴行禁止豈容不肖官吏按畝派費纍及小民或者夫役等得受官價之外有田之業主幫貼飯食而不知者遂誤認以為按畝派費亦未可定或者衙門之蠧役本地之攬頭借幫貼飯食之名派雜費以飽私囊亦未可定著范時繹陳時夏等通行曉諭令良善之民勿為姦猾所欺並時時訪察稽查除田主幫貼飯食外倘有胥吏攬頭等巧借名色科派分文者立即提拏重治其罪並將辦理工程之官員指名題參從重議處倘官吏人等本無派費纍民之處而本地居民或以工程礙伊室廬田土不願興修故揑造浮言以惑衆聽或姦民欲行包攬不遂其私故傳播此語以阻撓公事則情罪甚屬可惡著范時繹陳時夏等確實查拏從重治罪雍正六年二月十一日奉上諭兩淮商人感戴朕恩急公念切數年以來將正項及帶銷銀兩俱照數全完又捐銀數十萬兩辦理地方公事甚屬可嘉今因揚州修濬水利工程又請公捐銀三十萬兩以佐公費朕聞之心甚不忍此衆商效力之處或係伊等力量寬舒實心踴躍合力捐輸以報國恩而襄公事或係地方大臣官員等授意商人而有此舉著詢問衆商令其務將真情據實呈明該督再行具奏請旨江南通志卷首三之一欽定四庫全書江南通志卷首三之二世宗憲皇帝詔諭雍正六年二月十九日江蘇巡撫恭報松江府華亭縣地方甘露呈祥奉上諭據奏松江地方天降甘露該省臣民皆以為朕之功德感召所致合詞頌祝等語夫甘露之瑞載在禮經自古以來咸稱嘉慶今蒙上天恩賜若不以為瑞非所以敬承天貺也但此番未見於宫庭上苑而見於松江想因江南地方官員有惠政及民或本地民人風俗良善有上感天心之處是以錫兹瑞應昭示羣黎朕深為該地方稱慶若官民等歸美於朕朕不敢居也但願該地方官民紳士受天恩賜倍勵虔恭官斯土者益厚其教養之道居是邦者愈篤其忠孝之忱吏治清明民風醇厚則上蒼眷佑錫福方來此則朕之深望也勉之勉之雍正六年五月初九日上諭高斌將滸墅關現行徵收則例據實陳奏請刋立木榜令衆商共曉遵依所奏甚屬可嘉部議令直省各關將各處現行徵收則例徹底清查據實奏聞刋榜曉示著各省兼理關務之該督撫並各關監督實力奉行毋得陽奉隂違虛應故事倘經接任之員察出定行交部從重議處雍正六年六月初六日河道總督奏報陳家渡壩工奉上諭據奏吳淞江陳家渡河渠有土埂三道未曾挑清致有停沙挂淤之患今建壩施工正在用力刮刷之際而江水海潮並長沙不能停將原有土埂檻限悉皆徹底刷淨毫無阻滯於河工大有禆益知道了齊蘇勒自任總河以來實心供職即如吳淞江工程雖交與齊蘇勒一同料理而實則范時繹陳時夏地方專辦之事乃范時繹陳時夏視之漠然而齊蘇勒一聞陳家渡壩工衝塌即親身前往踏勘悉心經理仰賴神佑水勢湧長以助人工將河道泥沙徹底刷淨水無阻滯工可告成此即封疆大臣實心為國為民感召天和之明驗凡為大臣者當共知之齊蘇勒著交部從優議敘其在事官員著議敘具奏雍正六年七月初二日奉上諭戢盜乃安民之首務稂莠不剪則嘉禾不生姦宄不除則良善不安此一定之理朕時以此訓飭各省督撫有司諄諄往復而能實力奉行著有成效者甚少如江南蘇松等地方盜案多於他處而陳時夏等又復柔懦怠忽並未將積惡渠魁緝拏懲治范時繹居官亷謹然戢盜之才亦覺不足且管轄三省精神亦難周到是以下江地方盜風不能止息小民受其擾纍朕深為厪念浙省盜案向來亦多自李衛蒞任以來留心整理匪類知所畏懼昨據李衛奏摺內稱錢塘縣知縣秦炌杭協副將李燦拏獲積盜張寶生等十餘人審訊時供出歷年來圖財害命之案不可勝數似此凶惡害民之徒該督李衛能使文武屬員協力緝捕不致漏網人心共快又派委文武官辨分地巡查將盜賊拐逃假銀扒手賭博等犯嚴拏懲治以警刁頑而安善類李衛實不愧封疆大臣之任甚屬可嘉著將江蘇所屬七府五州除錢糧刑名外其一切盜案俱交與李衛管理文武各官受其節制有能盡心緝捕及疏防貽誤者聽其舉劾遇有緝捕訪拏盜賊等事各營兵辨聽其調遣江南督撫等官亦仍照舊辦理不得因李衛管理稽查盜案而生推諉之念至緝獲積賊之秦炌等著交部議敘雍正六年八月十七日奉上諭蝗蝻最為田禾之害然迅加撲滅猶可以人力勝之昔我聖祖仁皇帝訓飭地方各官諄諄以捕蝗為急務其不力者加以處分無非養民防患之至意乃州縣有司往往玩忽從事不肯實心奉行而小民性耽安逸憚於捕滅之勞且愚昧無知又恐捕撲多人以致踐傷禾黍瞻顧遲回不肯盡力不知蝻子初生就地撲滅易於驅除一或稍懈聽其生翅飛揚則人力難施且至蔓延他境為害不可言矣前江南總督范時繹摺奏邳州地方有蝗蝻萌生朕即諭令竭力撲滅旋經該督奏聞該地方官已經撲盡比即批諭范時繹云撲盡之説朕實未信須令有司實力奉行無俾遺種莫被屬員蒙蔽近聞彼處蝗蟲該地方官並未用力撲滅與朕前旨相符矣地方官如此怠玩從事而督撫尸位付之不聞是何理也著范時繹查明題參並將該督撫交部嚴加議處以警怠玩嗣後各省地方如有蝗蝻為害之處必根究其起於何地其不將蝻子即時撲滅之地方官著革職拏問若蝗蟲所到之地而該地方官玩忽從事不盡力撲滅者亦著革職拏問并將該督撫嚴加議處雍正六年十月初四日奉上諭向來江浙收兑漕糧俱用本地粳米擇其乾圓潔淨者方準交納遇收成稍薄之年該督撫每以紅白兼收為請朕皆允行夫米糧乾潔皆可久貯原不在色之紅白且江浙二省户口繁多而每年應納漕糧將及四百萬石若必拘定本地粳米恐致米價昻貴民間難於輸將朕軫念閭閻凡有禆益民生之計皆為周詳籌畫嗣後江浙徵收漕米但擇乾圓潔淨不必較論米色準令紅白兼收籼粳並納著為定例雍正六年十一月三十日奉上諭蘇州巡撫所屬七府五州自康熙五十一年起至雍正四年未完地丁錢糧積至八百一十三萬八千餘兩其中蘇松常三府太倉一州積欠最多自一百四十餘萬兩至一百八十餘萬兩不等朕念切民瘼凡閭閻疾苦周知洞悉此未完錢糧或有産去糧存而不能完納者或有人産已盡而無可催追者又或有從前遇歉收之嵗而地方官匿荒未報小民無力輸將致成拖欠者纍積十餘年之久其數至千百萬兩但其中有或本係該地方官虧空而希圖卸脫揑作民欠者或糧户已經交納而姦胥蠧役侵蝕入已仍作民欠者是此項未完大約官虧空者十之一二吏侵蝕者十之三四其實係民欠不過四五而已在貧窶之民固不能為無米之炊而官吏因緣作弊蠧國害民情罪可惡豈容令其脫然幸免若非徹底清釐即欲加惠於百姓其道無由是以從前令張楷將江蘇民欠清查分晰張楷並不清查奏稱俱係民欠請分年帶徵朕雖姑允其請意甚未愜鄂爾泰於蘇州布政使任內實力稽查將有頭緒時以雲南巡撫職任綦重將鄂爾泰補授而清查之案又未竟其事後陳時夏到任之後一味怠忽疲玩毫無整理釐剔之心將從前分年帶徵之恩旨並不分限催追以一年應完之數捆徵於一月之內以致小民艱於輸納地方官又奉行不善日事敲撲嚴比七府五州之黎庶不得霑被恩澤朕心深為軫念乃陳時夏又奏稱蘇松積欠難於清結從前既蒙聖恩蠲免浮糧今請以舊欠之糧均派於新糧户內分年徵收以抵補積欠夫蘇松浮糧朕仰承皇考聖心每嵗額免四十五萬兩煌煌明旨布告億兆豈有既蠲正額而復借此抵補積欠之理朕以誠信待天下臣民寧肯為巧詐之術乎且舊欠自有本人即非本人亦自另有著落若舍此不追而均派新糧是刁民因積欠而得利良民因先輸而倍徵從此人人效尤誰復輸供正賦况以舊欠派入新糧舊欠未必全完而新糧又致欠缺此種狂悖之論不過因朕留伊在蘇州清理未完一時不能脫身而豪紳積蠧欲逞其抗糧之黠智為此邪説足以聳聽陳時夏亦藉此法或可草率完結為脫身卸責之私計耳陳時夏居心行事如此實深負朕恩今尹繼善現在清查但尹繼善初任封疆且兹事煩重非一人之心力所能辦理著將蘇松等七府太倉等五州歷年帶徵地丁錢糧一槩暫停徵比俟朕派員前往與該地方官協理清查將各州縣官侵若干吏蝕若干實在民欠若干一一釐剔清楚朕當再降諭旨户部即遵諭行文令該督撫遍行出示曉諭其派員分查之處著户部詳悉定議具奏雍正七年正月二十八日奉上諭平治道路王政所先是以周禮有野廬合方之職自四畿達之天下掌其修治俾車馬所至咸蕩平坦易行李輻輳津梁通達無雨水阻滯之纍邇年以來廣寧門外已修石道其至通州運糧之路亦修整高潔往來行人頗為便利今直隸至江南大道車輪馬迹踐壓嵗久致通衢竟成溝塹兩傍之土高出如岸一遇雨水之時衆流匯歸積潦難退行旅每苦泥濘或至守候時日朕心深為軫念但此通行大道已久成窪下勢難培築增髙而大道之傍高阜甚多平治亦殊不易若於大道相近之處另開一道工力似屬易施其間或有地形斷續之處應修建橋梁或有溝塍淤積之處應疏濬水道或所開之徑有借用民間田地者應補給價值並除錢糧或繞行之路有逺隔村莊旅舍者應引歸故道使有頓宿是非熟於相度地勢歷練道徑之人不能詳察妥當特派工部侍郎法保副都統韓光基原任護軍統領哈爾紀善二等侍衛特庫四員於今年夏秋之交自京師起程由良鄉至宿遷大道一路踏勘將如何另開新道之處詳悉議定估計工費繪圖呈覽伊等起身之前朕再降諭旨雍正七年四月十七日奉上諭從前清查江蘇等屬舊欠錢糧已經降旨將康熙五十一年至雍正四年未完地丁銀八百一十餘萬兩暫行停徵今思漕項等銀民間一例編徵不分欵項若不槩行停比則錢糧難以清釐著將康熙五十一年至雍正四年漕項屯折等欵未完銀二百八十一萬餘兩一體停徵王璣彭維新等可令各員於清查之時即分别條欵各歸各項俾數十年積欠其間官侵吏蝕俱得徹底清釐雍正七年五月十三日奉上諭向來有司官補授之時回避本省蓋因地方密邇恐其中有嫌疑牽制等弊也朕思江南之上江下江湖廣之湖北湖南陜西之西安甘肅雖同在一省中而幅員遼闊相距甚逺定制各設巡撫司道以統轄之其情形原與隔省無異則官員選補不過有同省之名而並無嫌疑牽制之處必須回避况既係同省則於彼處人情土俗較他省之人更為熟悉未必不於地方有所禆益嗣後凡江蘇安徽湖北湖南陜西甘肅諸處府州縣以下官員得本省之缺不在本籍巡撫統轄之內者不必令其回避其相隔在五百里之內者仍照隔省回避之例一體遵行雍正七年十月二十三日奉上諭朕夙夜孜孜以吏治民風為念惟蘇松所屬糧賦浩繁民欠纍積官吏借此侵漁姦徒肆其包攬若不徹底清查則吏治難以整肅民風無由淳厚是以特命大臣總理清查之事又遴選大員專司分查之任再揀選州縣分派協理令其將官侵吏蝕民欠三項明晰清釐不得絲毫朦混又屢次降旨將蘇松等七府太倉等五州歷年帶徵地丁漕項錢糧一概暫停徵比俟各州縣官侵吏蝕及實在民欠一一釐剔清楚之後再降諭旨并令該督撫遍行出示曉諭是朕於清查一案已申示再四可謂明白詳備矣乃承命之員奉行不善其始以為官侵無幾遂將紳襟所欠帶徵之項指為官侵以致姦胥蠧吏借端挾詐如松江候選州同朱榮椿者積欠錢糧九百餘兩而為蠧書訛詐亦至九百餘兩此其明驗也又聞不肖州縣有以里圖匱書侵蝕之項將來難於歸著議令官户富户分派攤賠者又有將帶徵錢糧加一火耗以補官虧者其説雖未足盡信然人言籍籍總理其事者寧未聞之耶此皆由於承命之員不能深體朕心而以徵比為清查之誤也設朕欲藉此為催徵錢糧之道從前又何以降旨停徵乎其有自願完納仍令地方官收受者緣浙江總督李衛來京陛見時奏稱江南舊欠錢糧自奉諭停徵之後凡有願完者州縣官恐涉先侵後吐之嫌槩不收受於民情頗有未便等語朕以民間凡有隱匿錢糧尚準其自首豈有願完舊欠而不準其輸納之理是以諭令户部行文該總理清查大員知之乃不意奉行者遂借此為由將停徵之項槩行催徵名曰勸輸而挨圖挨甲差役追呼甚於嚴比近見各員所奏有稱已完一百餘萬者有稱旬餘之內州縣完三萬餘兩者而溫而遜奏云此畨清查首在勸其完納不徒在於造册又聞朱鴻緒告人云鎮江一府舊欠二年內必令其全完是各員俱以完納錢糧為重而以清查官侵吏蝕民欠置之度外矣與朕簡命諸臣之旨不大相徑庭乎著將未完積欠槩行停徵其中或有官吏侵蝕今自首完納贖罪者聽其交庫外其餘民欠即有情願交納者亦不準收受該總理之員務令分查協理各員恪遵前旨將官侵吏蝕民欠分别清釐無得絲毫朦混倘仍有私行徵納及將民欠內之官户富户掩蓋官吏侵蝕者該督撫及總理大臣即行指參從重治罪倘該督撫等隱徇不舉或失於覺察經朕訪聞定將該督撫等一併交部嚴加議處又聞分查之員令各欠户自行首報夫前旨之準令自首者乃侵蝕錢糧之官吏此等侵蝕之人本有應得之罪朕不忍其盡罹國典是以令其據實自首則從寬免其治罪至於歷年積欠前已分年帶徵今又一槩停徵伊等又有何罪而令其自首乎總之各員卑鄙小見不知朕澄清吏治惠養小民之心而唯以錢糧為重朝廷之德意不能宣究於下司其事者寧無愧乎諭到著該督撫布政使即刋刻頒發所屬凡逺鄉僻壤悉行張挂使官吏紳襟軍民人等咸知朕意雍正八年正月十二日奉旨爾等議政處原議乍浦地方駐劄滿洲兵一千六百名此內挑選杭州餘丁八百名江寧餘丁四百名京城餘丁四百名令其披甲前往駐劄朕近詢問將軍鄂密達據稱江寧餘丁披甲者可得八百名等語今京城不必揀發四百名即於江寧餘丁內著鄂密達酌量挑選八百名令其披甲前往乍浦駐劄乍浦地方創設駐劄兵丁則補放管轄官員事殊緊要補放之員務將年富力強黽勉任事者揀選補授交與將軍鄂密達著於江寧應補人員內揀補現任官員內應行調補者揀選調補如江寧應補之員不能足數於杭州應補人員內揀選補授現任官員內揀選調補之處著將軍鄂密達與將軍阿里滾互商派委此兩處補授員缺著各該將軍題補倘兩處不能足數著將數目開明報部該部請旨具奏再由京城揀選人員補授發往此駐防之官兵移居起程著交與江南總督范時繹浙江總督李衛公同商議料理起身欽此雍正八年八月初九日內閣抄出奉上諭向來蠲免錢糧額徵漕米不在所蠲之內朕思京通各倉米粟年來悉心經理已有餘積又有直隸營田所産稻米可以採買貯倉是京通倉儲有日增之勢今年山東地方被水稍重而直隸江南河南三省亦間有被水之州縣夫地方既已歉收則漕粟輸將未免竭蹶著將山東被水州縣之漕糧全行蠲免直隸江南河南被水州縣之漕糧按成災之分數蠲免其山東未被水州縣應完之漕糧不必運送京師即留於東省以充兵餉如此則各該地方皆有多餘之米糧於民生大有禆益著直隸河南山東江南督撫遵照諭旨分别速行辦理務令妥協俾閭閻均霑實惠以副朕格外加恩之至意特諭雍正九年七月二十二日內閣抄出奉上諭今年五六月間直隸山東河南等處雨澤愆期朕即慮及上年被水低窪之地魚子存留今夏烈日蒸晒恐變為蝗蝻為禾苗之患特令大學士等寄信與直隸山東督撫等嚴飭屬員留心體察預為防遏兹見沈廷正奏報山東濟寧州之南鄉新店等處有蝻子萌動在濵河荒草地方大抵是魚子變化而生已飭令文武員辨上緊撲滅等語又據張元懷奏稱光州所屬竹園內有青蟲蠶食竹葉未傷田禾其形似蝗今已捕除等語從來蝗蝻始生之時以人力制之尚易而小民耽逸偷安憚于用力又恐踐踏禾稼瞻顧逡巡及至飛揚之後逺近蔓延而勢已不可遏矣是在實心任事之官員督率鄉民力為捕治不得姑順輿情釀成大患著直隸山東河南江南等處督撫通行所屬實力奉行倘視為具文茍且塞責將來飛揚之時朕必察其發生之處將該地方官從重治罪必不寬貸直隸山東河南三省欽差大臣科道等一同留心訪察毋忽特諭雍正九年八月奉旨從前降旨內外各省官民有實被我弟怡賢親王之德澤誠心感激者準其建立祠宇以展其追慕之悃忱今遠近各省紳士軍民合祠懇請雖賢王美善于懿好之公異口同聲不謀而合朕思天下至大其傳聞王之令名而不親被王之恩惠者若一體建祠展祀則與朕之諭旨不符即王平日謙抑為懷亦不歆享也除畿輔之地王之功德理應爼豆千秋已降旨俞允建祠外奉天為祖宗發祥之所仰蒙福佑篤生賢王為國家宣猷佐政則俯順官民籲請建立祠宇情理為宜至于兩淮鹽務積弊多年自王總理户部以來清一切之正供省多方之浮費弊端永杜苛纍全除衆商咸沐恩膏萬竈皆成樂土再者江南户口殷繁水利最關緊要王念切民生留心已久因伊屬下之李淑德曽任松江同知諳悉水道王訪聞明晰將一切興修事宜奏聞于朕朕本欲俟直隸工程就緒之後令王前往江南為萬民興久逺之利王亦身任不辭後以國政贊襄不能速往旋據陳時夏之奏王奏請速行可以不必待臣親往朕因命李淑德前去會同督撫大臣等相度經營因勢利導今東南數千里河流疏通有灌溉之益而無泛溢之虞者實王創始之力也王之功德其顯著于江南者如此準于揚州地方建立祠宇一座以慰輿情浙江總督李衛前為户部司官時朕不知其姓名王在朕前極力保薦謂其才品兼優可當大任御極以來王為國薦賢之處甚多而如李衛之深信力保者內外不過數人朕因此將李衛屢加擢用至浙江總督李衛公忠敏達方正亷明易俗移風興利除弊浙人之深受李衛教養之益者皆王薦舉之功也準從浙人之請於杭州聖恩寺之側建立祠宇以申其感戴之誠其餘各省陳請建祠者俱不必行至大學士九卿議稱祠宇規模若於部文未到之先已經建造者無庸更改等語此言甚屬差悮各省督撫大臣豈有不俟諭旨而遽然舉行之理假若有之則其人之愚昧輕率可知更不應準行圖並發欽此雍正十年二月初三日上諭前朕降旨令漕標及兩河標兵各添設一千名以實營伍隨經廷議行令總漕總河照馬四步六之例召募充補兹者浙江總督李衛來京陛見奏稱南方畜養馬匹甚難此時購買亦甚不易若仍照馬二步八戰守各半之例可以少畜馬匹而於營制亦合等語李衛所奏甚是可即傳諭總漕總河及河東總河俱照此辦理欽此雍正十年二月十三日內閣奉上諭河標新募兵丁必須勤加訓練河道總督稽曾筠所辦河工事務甚繁難以專心督理訓練之事著協理河務西柱協同總河督率操演務令兵丁技勇􅈺熟以實營伍欽此雍正十一年正月十四日上諭各省學校之外地方大吏每有設立書院聚集生徒講文肄業者朕臨御以來時時以教育人材為念但稔聞書院之設實有裨益者少而浮慕虛名者多是以未曾敕令各省通行蓋欲徐徐有待而後頒降諭旨也近見各省大吏漸知崇尚實政不事沽名邀譽之為而讀書應舉之人亦頗能屏去浮囂奔競之習則建立書院擇一省文行兼優之士讀書其中使之朝夕講誦整躬勵行有所成就俾逺近士子觀感奮發亦興賢育才之一道也督撫駐劄之所為省會之地著該督撫商酌舉行各賜帑金一千兩將來士子羣聚讀書須預為籌畫資其膏火以垂永久其不足者在於存公銀內支用封疆大臣等兼有化導士子之職各宜殫心奉行黜浮崇實以儲國家菁莪棫朴之選如此則書院之設有禆益於士習文風而無流弊乃朕之所厚望也特諭雍正十一年五月上諭上年江蘇等處被水之州縣朕已降旨多方賑濟今春又復添賑四十日以加惠貧民兹當徵收錢糧之時其被災稍重之處遙念小民輸課未免艱難著該督撫秉公確查將應行緩徵之州縣奏聞緩徵待至秋成再令完納以紓民力以廣國恩特諭雍正十一年七月上諭上年江南松江地方潮水泛溢為災聞附近各鹽場內惟南匯縣之下砂各場奉賢縣之青村場被災稍重竈丁未免艱窘朕心深為軫念查下砂頭場二三場及青村場有本年額課銀兩又有歷年舊欠銀兩若令此時照例徵收竈丁難於輸納著將本年額課緩至十月秋收後開徵其歷年舊欠之項分作三年帶徵以紓竈力可即傳諭程元章知之欽此雍正十一年七月十一日內閣抄出奉上諭聞上年秋月江南沿海地方海潮泛溢蘇松常州近水之人遭值水患其本地紳襟士庶中有雇覔舟船救濟者有捐輸銀米煮賑者今年夏間人有時症紳襟人等又復捐施方藥資助米糧似此拯災扶困之心不愧古人任恤之誼風俗淳厚甚屬可嘉著該督撫宣旨褒奬仍遵前諭將捐助多者具題議敘少者給與匾額登記檔册免其差徭並造册報部特諭雍正十一年七月十六日內閣抄出奉上諭上冬今春之間北地雨雪稀少朕即恐夏月有蝗蝻之患曾切降諭旨通行直隸山東江南等省督撫大吏飭令所屬官辨先事預防不得茍且塞責續於五月間聞江南淮揚所屬之山陽寶應等處有蝻子萌動之機朕又特降諭旨責令上緊捕治毋得稽緩嗣據魏廷珍奏報撲滅殆盡朕又復嚴切批諭之昨高其倬奏稱山東江南接壤之州縣蝗蝻尚未淨盡而州縣有司以地界兩省未免互相推諉朕又批諭高其倬曰若有司怠玩蝗患不除咎歸于汝朕之為民先事防維者亦殫竭心力矣今據王士俊奏稱從前曹縣魚臺兩縣蝻子生發臣已動支存公銀伍百兩多雇人夫撲滅淨盡近日濟寧官辨報稱該地方有蝻子生發之機亦已撲滅無遺惟是鄰近之江南豐沛碭山等縣尚有未盡倘或飛越入境即隨到隨除等語朕覽各督撫先後所奏是蝗蝻萌動之處山東江南二省州縣皆有之祗因彼此壤地相接不肖官吏遂謂可以卸過于鄰封而巧為推諉捕治不力情事顯然著傳旨速行曉諭倘餘孽未淨將來災及田禾定將兩省地方官均加嚴處其督撫等一併從重察議不稍寬貸特諭雍正十一年十一月初四日內閣奉上諭據魏廷珍奏稱江安蘇松糧道呈報本年漕米米色不純所屬之米俱屬如此無從更易等語朕思漕米正供必須乾圓潔淨方可起運抵通收貯經久今江安蘇松等屬本年漕米米色不純若濫行徵收則起運抵通必致黴變若勒令民間更換而民間所收又俱屬如此未免苦纍可寄信與魏廷珍著會同高其倬徐本確查各屬如果米色不能純潔即將未徵漕米一面照部價改折一面奏聞似于江南民食甚有裨益欽此雍正十一年十二月初九日奉上諭本年江南應徵漕米朕已降旨密飭該督撫等以半本半折徵收為接濟民食之用惟是漕糧既一半改折則漕船亦應一半停運定例漕船減歇之年該運丁給與一半月糧以為養贍今於上年業已緩截本年又復減歇其行裝等項俱經預備於將次出運之時旋復停運則所領一半月糧或不敷用未免艱苦著將本年應支月糧等項悉行賞給此賞給銀米乃朕格外特恩嗣後不以為例欽此雍正十二年十月十一日內閣奉上諭今年六月間江蘇地方雨水稍多州縣低窪之地有被水淹浸收成歉薄者朕心軫念且恐將來米價漸昻不可不預為籌畫著將乙卯年江南起運漕糧截留二十萬石於被水成災之州縣各就近留一萬石或五六千石於被水不成災之州縣量留三四千石俟開春市價增長之時將此平糶以便民用其成災田地應徵新舊條銀若仍行徵輸小民不無竭蹶著緩至來年麥熟開徵再本年應納南漕等米亦緩至明秋折納所有被災地方無力乏食之窮民據該督等奏稱已動公項酌賞但冬春之際此等民人覔食艱難應動支倉榖分别賑濟毋令失所著該督撫悉心辦理並督率有司實力奉行務令均霑恩澤欽此江南通志卷首三之二欽定四庫全書江南通志卷首四之一皇上詔諭雍正十三年九月初三日奉天承運皇帝詔曰惟我國家受天眷命太祖太宗創垂基緒世祖統一萬邦皇祖聖祖仁皇帝享祚久長重熙纍洽我皇考大行皇帝紹承大統御宇十有三年夙夜憂勞勤求致治用康乂我億兆臣民盛德豐功炳耀寰宇恩膏洋溢漸被八紘薄海時雍中外蒙福方期永綏隆祚仰荷鴻禧何意奄棄臣黎遽升龍馭以宗廟社稷之重屬于藐躬朕自沖齡即蒙皇祖撫育宫中深恩鍾愛眷睞逾常皇考顧復恩勤聖慈篤摰瞻依朝夕祗受誨言牖迪有加宸𠂻默眷朕自惟涼德懼弗克勝顧念神器不可久虛勉抑哀𠂻欽遵成命于九月初三日祭告天地宗廟即皇帝位以明年為乾隆元年仰惟上天篤祐之隆皇考詒謀之重撫躬乾惕祗紹前徽丕布新恩聿昭錫類所有合行事宜條列于左雍正十三年八月二十五日領侍衛內大臣公訥親傳旨凡外省督撫提鎮以及學政司道等官所有奏摺蒙奉皇考硃批者俱著恭繳雖批朕安二字者亦不可隱匿如隱匿者照隱匿制詔例治罪欽此雍正十三年九月二十三日總理事務王大臣奉上諭各省民欠錢糧十年以上者已于恩詔內概豫蠲免其餘未完民欠尚係應徵者朕思纘緒方初惟當繼述我皇考惠養黎元之至意俾服疇力穡之人均沐恩膏積逋全釋若未蠲之項尚事徵收民間無不煩擾兹特再行降旨於恩詔外將雍正十二年以前各省錢糧實欠在民者一併寬免從前江南積欠錢糧內曾有官侵吏蝕二項乃從民欠中分出者比時差往大臣官員辦理原不妥協亦著照民欠例寬免此朕仰體皇考誠求保赤之仁深願吾民厚生正德之意各省軍民人等身受國恩至渥自應感動天良屏除陋習明守法奉公之大義循則壤成賦之常經共為良民免追呼之擾纍倘疲玩性成不知悛改則是吾民中最為愚頑之人既無畏威之念亦鮮懷德之心國法具在朕亦不能為之寬貸也爾等即交部遵行雍正十三年九月二十六日內閣抄出奉上諭從來帝王撫育區夏之道惟在教養兩端蓋天生民而立之君原以代天地左右斯民廣其懷保人君一身實億兆羣生所託命也書稱正德利用厚生惟和又云惟土物愛厥心臧蓋恆産恆心相為維繫倉廩實而知禮義理所固然則夫教民之道必先之以養民惟期順天因地養欲給求俾黎民飽食暖衣太平有象民心自順民生優裕民質自馴返朴還淳之俗可致庠序孝弟之教可興禮義亷恥之行可敦也我朝列聖敬天勤民垂統萬世皇祖聖祖仁皇帝六十餘年久道化成重熙纍洽所以惠養元元禮陶樂淑者至周至備惟是國家承平日久生齒日繁在京八旗及各省人民滋生蕃衍而地不加廣此民用所以難充民産所以難制也我皇考宵旰孜孜勤求治理惟恐一夫不獲其所重農貴粟之教屢頒撫循蠲賑之惠頻下南北之營田水利無不興修內外之開墾種植無不綜理凡此實政實心一以誠敬貫徹始終十三年有如一日皆朕所親承目覩拳拳服膺者也朕生長深宫瞻依皇考慈顔惟知承歡膝下懋學書齋即如日用衣食之需悉由恩賜豐贍饒裕不煩問所從來此固皇考昊天罔極之恩難以明言而為君之難亦惟身履其地者然後知聖人之言為至當也今朕纘承大統身為人主衣租食稅則自今伊始一絲一粟皆四海小民所經營供御者矣朕思飲饌被服皆出自海內脂膏宫室器用皆取自閭閻拮據尚安忍少有糜費侈用之心以傷民力而耗民財乎又安忍已垂裳而聽天下之民有寒不得衣已玉食而聽天下之民有飢不得食者乎禹思天下有溺者由已溺之稷思天下有飢者由已飢之自古聖君賢臣自任之重者皆動於至誠迫於至理有萬不容已者也朕日夜兢兢時厪本固邦寧之至慮以皇考之實心為心以皇考之實政為政凡供膳品味之類無所加增衣服器用之屬無所濫費宫室苑囿之區無所改營爰賴中外諸臣共體朕心以成朕志于民生日用所由阜成民生樂利所由豐豫之處在在求其實濟事事謀其久逺勿以虛文而澤不下逮勿以小利而計不圖全勿作無益以害有益勿朘民生以厚已生果能恆産有資將見恆心自啓我皇考聖訓所謂三代之治必可復堯舜之道必可行者庶能繼述萬一此朕中心乾惕之誠並非因即位之初為此邀譽近名之語以博天下臣民之感頌朕心務收實效豈肯徒托空言但天下至大兆民至衆非朕一人所能獨理內而閣部八旗大臣外而督撫藩臬有司均受國家深恩有惠養斯民之責者當共思黽勉崇儉戒奢視國事如家事以民身為已身痌瘝一體休戚相關各殫誠心期登斯民于袵席則賞功酬庸之典朕必從優舉行若茍且因循視同膜外律以溺職更復何辭勉之勉之特諭雍正十三年十月初四日奉上諭朕前降旨三年之內不準各省督撫進獻土産若有進獻皇考之物已在途次者準其進呈昨江南總督趙𢎞恩貢獻食物器具乃八月中旬齎發在龍馭上賓之先朕不忍遣回謹留為几筵陳設之用恐他省不知情由特行曉諭嗣後凡有進朕之物即齎送到京奏事官員亦不準接受轉奏俟三年之後朕再降旨朕仰承聖祖皇考福蔭凡屬御器用之屬何一不備取之宫中而有餘正不待四方之入貢也在諸臣各懷尊君親上之心固欲藉物産以伸其誠敬然此貢獻之物豈能自備於家而不取資於民力乎是朕多收一次貢獻即諸臣多費一次經營諸臣多費一次經營即百姓多費一次供應朕實不忍以無益方物重煩吾民也諸臣果有愛戴之誠心惟當體朕子惠元元之意凡一絲一粟皆思為人民留其有餘使之家給人足則勝於朕之身受矣特諭雍正十三年十月初五日奉上諭父母之恩昊天罔極而喪禮以三年為斷者所以節仁人孝子之哀而使有所極也三年之喪猶不能終則百行皆無其本矣魯公禽父衰絰而即戎孔子以為有為為之也古者諸侯之大夫士雖有既葬而服國事之禮然古之仕者不出其鄉殯殮皆親窀穸既營雖使絰而即事義尚可安也今之仕宦近者猶數百千里含殮不知宅兆未卜而晏然於官所情能自已乎往者道府以上要缺間有督撫保題在任守制而特旨從之者其後遂習為故常并及州縣微員其中有平日督撫所親信而欲留者有竟自願留者有多方營求以得之者而不得者且用為恥夫事親孝故忠可移於君使其人本仁孝而強奪其情則儳然不能終日必至愴恍昏迷廢弛公事若以為安則忍戾貪冒之人也國家安所用之而所治士民亦安能服其政教乎自後必其地其任其事其時決不可少是人而無能相代者乃準保題以憑核奪餘俱停止永著為例特諭雍正十三年十月初七日奉上諭據果親王密奏江南等省漕項蘆課及學租雜稅等項亦係雍正十二年以前之民欠似可照例豁免特行請旨等語朕思此等欠項實係應免者果親王分晰詳明據實陳奏甚屬可嘉著全行豁免並令嗣後遇有恩詔俱將各項入於豁免之內永著為令果親王秉性忠直辦理部務悉本公心是以蒙皇考深知優奬推誠信任而王亦不屑以寬慈邀譽是以外間或有嚴厲之疑皆不知王之居心者又或有司員奉行不善之處亦未可定實與王無預今觀密奏蠲免漕蘆等項舊欠一摺則王存心寬厚辦事公明即此可見著將原奏及朕此旨宣示九卿等共知之欽此雍正十三年十月初九日奉上諭洪範庶徵凡雨㿩之愆和關人事之得失所以著感應之理使修人事然水旱之災雖堯湯不能免惟有勤恤民隱竭力補救可以化災沴而成太和總在積至誠以昭假不可萌一念之欺罔也督撫身任封疆重寄奏報收成分數乃關係地方民命必確無欺始得議行蠲賑以蘇民困朕平日留心此事見各省陳報收成分數或有只據一方豐收數目為定雨水過多之處以高阜所收為凖亢旱時有之年以低下所穫為準並不分析某處豐收某處歉穫其意祗圖粉飾以邀感召和氣之名而不知即此一念欺罔已為獲罪於民獲罪於君獲罪於天矣夫至誠格天乃聖人體信達順參贊化育之事爾等督撫即使辦理妥協亦不過仰承皇考聖訓遵循罔越豈得因年嵗之豐阜貪天之功為已功乎若嵗豐可引為巳功則必嵗歉懼為已罪捏報豐收不恤民艱使飢凍流亡之慘不得上聞蠲免賑恤之恩不得下逮職思其故誰為厲階清夜捫心何以自問且朕體皇考敬天勤民之意膺君國子民之任豈肯姑貸此等督撫以為民害耶嗣後務各警醒所奏報各地方收穫分數不得絲毫假飾以干重戾特諭雍正十三年十月初十日奉上諭江南江西湖廣等省正供錢糧欵內有蘆課一項凡蘆洲俱係沿江沙灘坍漲靡定是以定例五年一丈量令地方官勘踏新舊坍漲沙地據實報聞而不肖官吏往往借此納賄行私已坍之地不得豁除正賦新漲之區反可脫漏升科此種積弊甚為民害嗣後屆期丈量著該督撫于通省道員內選亷能夙著者率同該州縣官履畝清查凡有盈縮俱按現在實數升除毋使漏課亦毋使賠糧其不肖官吏或尚有借端需索等弊即行指名參處不得姑容徇庇自干咎戾特諭雍正十三年十月十六日總理事務王大臣奉上諭朕聞各省地方于關稅雜稅外更有落地稅之名凡耰鋤箕帚薪炭魚蝦蔬果之屬其值無幾必查明上稅方許交易且販自東市既已納課貨於西市又復重徴至于鄉村僻逺之地有司耳目所不及或差胥役徵收或令牙行總繳其交官者甚微不過飽姦民滑吏之私槖而細民已重受其擾矣著通行內外各省凡市集落地稅其在府州縣城內人煙湊集貿易衆多且官員易於稽查者照舊徵收但不許額外苛索亦不許重復徵收若在鄉鎮村落則全行禁革不許貪官汚吏假借名色巧取一文著該督撫將如何裁革禁約之處詳造細册報部查核倘奉旨之後仍有不實心奉行暗藏弊竇者朕必將有司從重治罪該督撫并加嚴譴此旨可令各省刋刻頒布務令逺鄉僻壤之民共知之欽此雍正十三年十月十九日奉上諭朕閲督撫參奏屬員及題請改教本章每有書生不能勝任及書氣未除等語夫讀書所以致用凡修已治人之道事君居官之理備載于書故傅説之告其君曰學於古訓乃有獲又曰念終始典於學成王訓其臣曰學古入官議事以制政乃不迷又曰不學面墻蒞事唯煩人不知書則偏陂以宅𠂻操切以處事生心害政有不可救藥者若州縣官果足以當書生二字則以易直子諒之心行寬和惠愛之政任一邑則一邑受其福蒞一郡則一郡蒙其休朕唯恐人不足當書生之稱而安得以書生相戒乎若以書生為戒朕自幼讀書宫中講誦二十年未嘗少輟實一書生也王大臣為朕所倚任朝夕左右者亦皆書生也若指屬員之迂謬疏庸有為書生以相詬病則未知此正伊不知書所致而書豈任其咎哉至于書氣二字尤可寶貴果能讀書沉浸醖釀而有書氣更集義以充之便是浩然之氣人無書氣即為粗俗氣市井氣而不可列于士大夫之林矣是書氣正宜從容涵養以善培之安可勸之使除而反以未除者為病乎且朕聞外間斥人之短每云伊欲做好人朱子云學者通病在思作貴人而不思作好人人果欲做好人行好事則甚有益于民生有益于國事造福無窮若以好人為戒不幾相率而拂人之性乎凡此皆係識見粗鄙不知治體不明大義之言朕今姑發其蔽而教戒之當各翻然思悔特諭雍正十三年十月二十日奉上諭朕聞利不十不變法害不十不易制蓋以政有恆則易守法數變則姦生而况州縣隸屬之有常文武職業之有定者乎往者直省一二州縣理宜改𨽻及員辨宜增設者皇考曾允督撫之請敕部議行而督撫中遂有借此以見其整飭地方留心吏治而絶無關於利害之實者不知改隸一邑則獄訟錢榖緣絶簿書百弊叢生急難綜察增設一官則文移期會事緒益紛供給送迎閭閻滋擾且封域驟改姦宄或致潛藏官吏日增責任轉無專屬自後必州縣離府遼逺實宜改隸市鎮繁雜之地定須添官彈壓者方準具題酌量其餘不許瀆奏至於守土之官必久於其職而後政教可行故周室郅隆居官者以為姓氏兩漢之盛為吏者長子孫是以上下相親利病周知而民安其政教也近見道府州縣員缺督撫多題請更調有二三嵗而更或一嵗而更者如此則雖有循良不能從容展布民何由被其休澤諸督撫身為大臣當實心體國凡無關利害之事不宜陳奏况此類皆無利而有害者乎特諭雍正十三年十月二十日總理事務王大臣奉上諭比年殷富之家有願出已財以賑恤鄉里者即周官五黨相賙通財救荒之遺意是以皇考恩賜議敘以鼓勵風俗而又恐因是或滋弊端於本年五月間山西巡撫石麟奏稱太原府紳襟士民捐銀貯公以備周恤一摺特降諭旨以為好善樂施者大都由地方之水旱飢饉捐資賑助即平常無事時或置義倉義田及養老育嬰等事必出於本人之誠心而又能親身料理始可以惠鄉閭而收實效石麟於地方現無應辦之事而乃奏紳襟士民捐銀以備公用直是另開捐納之條而胥吏土豪乘此得以侵蝕與所降原旨不合曽經嚴加申飭并令向後不得無故捐銀交官是皇考於奬誘善良之中而預防其流弊至深且悉也朕觀各直省捐助一事或督撫欲博化民善俗之譽授意屬員或有司欲邀勸輸宣力之名多方迎合竟至抑勒誅求計家資之豐約定捐輸之多寡甚且假公苛斂中飽侵漁名曰利民而適以病民誠有如皇考諭旨中所慮及者嗣後各州縣如遇荒歉及修城築隄公事果有殷實良民實情樂輸者許親赴布政司具呈詳請題奏地方官不得自行申報其他如倡立義田義倉義學義塜許其呈本州縣詳報上司立案仍聽本人身自經管胥吏土豪不得干涉希圖漁利該督撫體公核實大者題請小者量行旌奬倘有官吏勒派該督撫失察并有徇庇者均照例分别處分至於道不拾遺蓋以孔子至聖德盛神化所治僅蕞爾之魯故偶一有之成康之際周召輔治百度修明刑措四十餘年不聞有此則非人情所常有之事而政治之美不徒恃此孑孑之小義可知矣近見諸督撫以此陳奏者漸多若不加禁遏恐滋姦民邀賞有司干譽之弊諸督撫果能實心體國子育蒸藜休養導化使衣食滋殖仁讓相先太平之象自有藴蒸而不可掩者亦不在道不拾遺之一節也嗣後即果有此該州縣量行奬賞不得申詳該督撫亦不得以此陳奏特諭雍正十三年十一月初七日奉上諭四民之中惟農夫作苦自食其力最為無愧飭庀八材以利民用非百工莫備士則學大人之學故祿其賢者能者至于商賈阜通貨賄亦未嘗無益于人而古昔聖王尚慮逐末者多令不得衣絲乘車推擇為吏以重抑之今僧之中有號為應付者各分房頭世守田宅飲酒食肉並無顧忌甚者且畜妻子道士之火居者亦然夫一夫不耕或受之飢一女不織或受之寒多一僧道則少一農民乃若輩不惟不耕而食且食必精良不惟不織而衣且衣必細美室廬器用玩好百物爭取華靡計上農夫三人肉袒深耕尚不足以給僧道一人不亦悖乎朕于二氏之學皆洞悉其源流今降此旨並非博不尚佛老之名也蓋見今之學佛人豈獨如佛祖者無有即如近代高僧實能外形骸清靜超悟者亦稀今之道士豈獨如老莊者無有即如前世山澤之癯實能凝神氣怡養壽命者亦稀然茍能遵守戒律焚修于山林寂寞之區布衣粗食獨善其身猶于民無害也今則不事作業甘食美衣十百為羣農工商賈終嵗竭蹶以奉之而蕩檢踰間于其師之説亦毫不能守是不獨在國家為遊民即繩以佛老之教亦為敗類而可聽其耗民財溷民俗乎著直省督撫飭各州縣按籍稽查除名山古剎收接十方叢林及雖在城市而願受度牒遵守戒律閉户清修者不問外其餘房頭應付僧火居道士皆集衆面問願還俗者聽之願守寺院者亦聽之但身領度牒不得招受生徒所有資産如何量給還俗及守寺院者為衣食計其餘歸公留為地方養濟窮民之用并道士亦給度牒之法該部詳悉妥議具奏特諭雍正十三年十一月初十日奉上諭朕聞吉凶異道不得相干故娶在三年之外而聘在三年之內者春秋猶以為非禮記稱大功之末可以冠子可以嫁子父小功之末可以娶婦已雖小功既卒哭可以冠娶妻三年之喪創深痛巨茍有人心者必宜于此焉變矣乃愚民不知禮教始于皂隸編氓之家有慮服喪後不得嫁娶乘父母疾篤及殯殮未終而成婚者其後商賈中家多有之士大夫亦間為之而八旗效之朕實憫焉自今伊始自齒朝之士下逮門內有生監者三年之喪終喪不得嫁娶違者奪爵褫服其極貧皂隸編氓父母臥疾呻吟牀褥必賴子婦以躬薪水治饔飱者聽其迎娶盥饋俟疾愈喪畢而後成婚古者禮不下庶人其斯之謂歟曾子問親迎女在途而壻之父母死女改服布深衣縞總以趨喪亦此義也其商賈中家不必以士大夫之禮繩之然人性皆善朕知其必有觀感興起而不忍自同于氓隸者矣特諭雍正十三年十一月十一日奉上諭朕聞江南太平府蕪湖縣有雜派江夫河篷錢糧嵗徵銀二千三百零四兩歷年已久房屋傾圮而額稅仍存小民輸納艱難頗為地方之纍朕即位以來勤求民隱已降旨禁革雜稅此即雜派中之先宜豁免者著該督撫遵旨將此項錢糧二千三百零四兩即行寬免永著為例並出示通行曉諭毋許書吏地棍等侵蝕中飽特諭雍正十三年十一月十八日內閣奉上諭朕即位之初加恩海內民人已降旨將雍正十二年以前各省民欠錢糧悉行蠲免俾閭閻無催科之擾因查兩淮鹽場竈户應徵折價錢糧亦有未完之項當與民人一體加恩者著該部即速傳諭總督趙宏恩鹽政高斌將雍正十二年以前舊欠若干一一查明照地丁錢糧例奏聞蠲免俾竈户均霑實惠毋使胥吏滋弊中飽欽此雍正十三年十一月二十八日內閣抄出總理事務王大臣奉上諭向來州縣徵收錢糧因銀色有傾銷之耗折解送有路途之盤費故於正項之外徵收耗羡原無定額其亷潔者尚知自愛不肖者任意徵求而督撫以至道府等員於中收受節禮陋規互相容隱弊難究詰嗣經巡撫諾敏田文鏡倡為提解歸公之法各該督撫就本省情形酌定分數徵收以為各官養亷及地方公事之用除所定分數外絲毫不許濫徵蓋以耗羡原屬額外之項與其聽地方官私行徵取不如明定分數使有節制不敢違越也然在未提解以前尚為私項既提解以後或恐不肖官員視同正課又得於耗羡之外巧取殃民從前皇考洞見流弊屢降諭旨欲俟將來虧空全清府庫充裕之日漸減漸革聖心厪念未或忘之朕紹承大統念切民依孜孜軫恤日與王大臣等悉心籌畫期使吾民於正項之外絲毫無擾而一時勢有未能尚須從容計議惟是提解耗羡之法行之已十有餘年恐日久弊生姦吏夤緣朘削耗外加耗重困閭閻不可不為深慮著各該督撫嚴飭有司咸體朕意知耗羡一項可減而決不可增可於額內從寬而斷不可於額外多索倘於所定分數之外或又借估色或又借添戥為名多取絲毫者該督撫即行題參重治其罪倘督撫徇隱不舉或經科道糾參定將該督撫等一併嚴加議處再各省耗羡分數率在加一上下然江南賦重之區如蘇松常鎮四府額賦較之他省幾及數倍雍正六年以前每兩加耗僅止五分雍正六年以後增至加一且有司又復巧取苛索民何以堪其令江南督撫詳加酌定量減分數徵收不得仍前重耗困民倘敢陽奉隂違朕必於該督撫是問特諭雍正十三年十一月二十九日內閣抄出奉上諭朕聞之元后作民父母朕實代天以子民督撫大臣又代朕以子民均有父母斯民之任者也為治之道莫切於愛民其餘一切察吏理財明刑禁暴特教養中之餘事其本總歸於愛民而已天以愛民之職畀朕天下之民皆以朕為必能愛民而民或失所民其何望朕以愛民之事分寄督撫大臣亦以督撫大臣為必能愛民而民或失所朕更何望督撫大臣之不能體朕心以宣德意即朕之不能答天心以恤民依也爾督撫能知愛民之為稱職始不負朕委任之心他若錢糧不敢侵欺請托不敢假借弊竇不容毫髮羡餘不隱分釐此不過一端一事之才能以矯飾夫外貌又安足以副封疆重寄哉夫朕一人之心思不能周知天下之利弊故有賴於督撫督撫一人之耳目不能遍悉地方之情形故有資於良有司是又在有司之各愛其民而仍藉督撫之倡率鼓勵之耳設督撫之於有司舉劾不當棄取失宜其害不在於有司仍在於百姓彼有司中之實心惠民不規小效所謂安靜之吏悃愊無華日計不足月計有餘者督撫將毋以為迂拙而罷之至於以苛為察以刻為明以輕為德以重為威此則拂人性逆人情者督撫將毋以為幹濟而舉之如此則吾民失其所依怙朕何賴焉蓋治天下者在於治天下之人心必使民氣和暢民情豫順快然知有里井之可安恬然知有室家之可樂斯為無象之太平閭閻實被其澤此為直省中息事寧人安全休養道在乎優遊馴致而非可取必於旦夕間也朕每於諸王大臣及督撫大吏經理庶績必寬之嵗時無事乎督責之嚴程期之迫誠以欲速則不達久道乃化成也况郡縣長吏其才力逺不逮於諸大臣欲以責效數月期年間此中萬無速化之理亦惟有迎合意旨塗飾觀聽冀以博才能之名登報最之牘而民不堪命矣夫移風易俗者郅隆之上理也然必漸民以仁摩民以義使民日遷善而不自知倘為督撫者一有移風易俗之見存之於心宣之於口朕知其不但不能移易乎風俗而風俗且受其弊何者彼不知因民之道而日事驅民之術勢必更張成法煩擾地方為吾民之苦他如獻祥瑞報羡餘匿水旱奏開墾改土歸流更隸州縣所云揆之人事則悅耳論之隂陽則傷化其不以此也歟即據河南一省論之田文鏡匿報災荒於前王士俊浮報墾田於後小民其何以堪各省督撫大吏其尚自省其有不務實心實政而邀近功小利者必滌慮洗心董率屬僚興其天良以為民勸務底惇大成裕之治特諭雍正十三年十二月初八日奉上諭向來漕項銀兩不在蠲免之例朕前已降旨特行豁免以紓民力今查各省尚有帶徵漕米原應如期輸納但民間已完現年漕米又完先年留米民力未免艱難著該部傳諭辦漕各省督撫等將雍正十二年以前未完帶徵緩徵本色折米銀逐一查明奏聞豁免欽此雍正十三年十二月十三日內閣奉上諭朕前聞淮分司所屬廟灣新興臨興白駒劉莊伍祜等六場今歲秋收歉薄恐竈户煎丁有貧苦乏食者已曾於高斌奏事摺內諭令加意賑恤毋令失所今思冬春寒冷之際及明嵗青黃不接之時貧竈糊口維艱不可不預為籌畫著該鹽政高斌會同總督趙𢎞恩將乏食竈户煎丁遵照民賑之例一體加恩務令均霑實惠不許胥役地棍等侵蝕中飽欽此雍正十三年十二月十七日奉上諭河防堤岸閘壩等項一切工程凡有關運道民生者定例俱動正項錢糧應用乃各省竟有于田畝捐派者豈皆出自小民之願大都上司因節省錢糧起見授意屬員為粉飾之計相沿日久官吏藉端為苛索民間所費必至數倍不特苦纍民生亦于國計無補朕聞山東省挑挖運河每年有派幫民夫工食銀五萬三千四百餘兩江南松江海塘嵗修有每畝捐錢五文京口挑挖運河每年于蘇松常鎮太等府州照額徵漕糧正耗米協解銀三千八百餘兩蘇松常鎮太通六府州應修河渠閘壩令長洲等三十三州縣按畝派錢五文三二文不等以供大修并令每畝又酌量捐錢以為嵗修四州嵗修堤堰令每畝派銀一二釐不等直隸運河挑淺于天津等州縣每畝幫銀一釐以上各欵總于田畝正賦之外派令捐輸合計捐數共十餘萬兩而官吏之借端苛派必有不止於此者正帑之所省有限官吏之中飽無窮著該部行文四省督撫即將該省捐輸各項于乾隆元年為始一概革除仍嚴飭所屬官吏無得私行徵派以為民困其挑挖運河等項工程須用銀兩著該督撫核實奏明于公項內酌量動用報部核銷欽此雍正十三年十二月二十一日奉上諭朕臨御以來加惠元元將雍正十二年以前各省民欠錢糧悉行寬免誠以民為邦本治天下之道莫先于愛民愛民之道以減賦蠲租為首務也惟是輸納錢糧多由業户則蠲免之典大概業户邀恩者居多彼無業貧民終嵗勤動按産輸糧未被國家之恩澤尚非公溥之義若欲照所蠲之數履畝除租繩以官法則勢有不能徒滋紛擾然業户受朕惠者十茍捐其五分惠佃户亦未為不可近聞江南已有嚮義樂輸之業户情願捐免佃户之租者閭閻興仁讓之風朕實嘉悅其令所在有司善為勸諭各業户酌量寬減彼佃户之租不必限定分數使耕作窮民有餘糧以瞻妻子若有素封業戶能善體此意加惠佃戶者則酌量奬賞之其不願者聽之亦不得勉強從事此非捐修公項可比有司當善體朕意虛心開道以興仁讓而均惠澤若彼刁頑佃户藉此觀望遷延則仍治以抗租之罪朕視天下業户佃户皆吾赤子恩欲其均也業户沾朕之恩佃户又得拜業户之惠則君民一心彼此體恤以人和感召天和行見風雨以時屢豐可慶矣特諭乾隆元年正月初二日奉上諭為治之道在于休養生民而民之所以休養在乎去其纍民者使其心寬然自得以各謀其生各安其業而後富足可期此在親民之吏隨事體察惟恐毫末有纍于民而已朕思我皇考世宗憲皇帝誠求保赤有孚惠心蠲免額徵寬減浮糧偶有水旱災祲即行賑恤如救焚拯溺仁心仁政千載莫並而民生猶不得寬裕者大率田督撫大臣不能承宣德意而有司中刻核居心昏庸寡識者或以苛察為才能或受蒙蔽而不覺以致纍民之事往往而有也即如催徵錢糧而差票之纍數倍于正額拘訊獄訟而株連之纍數倍于本犯抽分關稅而落地守口給票照票貧民之受纍數倍于富商巨賈至查拿賭博黃銅以及私宰私鹽之類胥役營兵因緣為姦佐二雜職橫肆貪酷一案而化為數案一人而波及數人如此等者不可枚舉似此擾纍吾民無怪乎民多不得自安其生業而朝廷之德施終不能盡致閭閻於康阜也嗣後各直省督撫所以董率屬員者務以休養吾民為本而一切擾纍之事速宜屏除庶民生可遂而民氣以紓然督撫中之不善會朕旨者又恐因此而謂諸事可以不辦將轉成廢弛之習不知寬大之與廢弛判然不同不顧民生專務紛更以矜幹濟者外似振作而實則廢弛也勤恤民隱安靜悃愊以培元氣者乃非廢弛而真能振作也其尚各體朕意欽此乾隆元年正月二十日奉上諭私鹽之禁所以除蠧課害民之弊大夥私梟每為盜賊逋藪務宜嚴加緝究然恐其展轉株連故律載私鹽事發止理人鹽並獲其餘獲人不獲鹽獲鹽不獲人者概勿追坐至于失業窮黎肩挑背負易米度日不上四十斤者本不在查禁之內蓋國家于裕商足課之中而即以寓除姦愛民之道德意如是其周也乃近見地方官辦理私鹽案件每不問人鹽曾否並獲亦不問販鹽斤數多寡一經捕役汛兵指拏輒根追嚴究以致挾怨誣攀畏刑逼認干纍多人至于官捕業已繁多而商人又添私雇之鹽捕水路又添巡鹽之船隻州縣毗連之界四路密布此種無賴之徒藐法生事何所不為凡遇姦商夾帶大梟私販公然受賄縱放而窮民擔負無幾輒行拘執或鄉民市買食鹽一二十斤者並以售私拏獲有司即具文通詳照擬杖徒又因此互相攀染牽連貽害此弊直省皆然而江浙尤甚朕深為憫惻著直省督撫嚴飭各府州縣文武官辨督率差捕實拏姦商大梟勿令疏縱其有愚民販私四十斤以上被獲者照例速結不得拖纍平人至貧窮老少男婦挑負四十斤以下者概不許禁捕所有商人私雇鹽捕及巡鹽船隻幫捕汛兵俱嚴查停止毋得滋擾地方俾良善窮民得以安堵欽此乾隆元年正月二十一日奉上諭西北兩路用兵以來一應軍需皆取給于公帑不肯絲毫纍民而費用繁多不得不資藉捐納以補國用之不足此中外所共知者當日皇考聖意原欲俟軍務告竣即行停止今大兵漸撤軍需簡省著將京師及各省現開捐納事例一概停止夫議捐納者未嘗不出于士子之口而留生童捐監一欵是士子首以捐資為進身之始矣其應停應留之處著漢九卿及翰詹科道會同確議具奏欽此乾隆元年二月初十日奉上諭聞江南佐雜等官向來未議養亷該省事務繁多差遣絡繹倍於他省微員俸少力薄未免衣食艱難查江蘇有不充餉之鹽規銀兩安徽司庫有存公耗羡銀兩著總督趙宏恩巡撫顧琮趙國麟公同查核仿照江西湖廣之例酌定數目每年賞給以為養亷示朕體恤微員之至意欽此乾隆元年三月初八日內閣抄出奉上諭朕聞姦宄不鋤不可以安善良風俗不正不可以興教化閭閻之大惡有四一曰盜賊三代聖王所不待教而誅者也二曰賭博干犯功令貽害父兄以視周官之罷民未麗於法而繫諸嘉石收之圜土者罪有甚矣三曰打架即周公所謂亂民孟子所謂賊民也四曰娼妓則自周以前人類中未嘗有此此四惡者劫人之財戕人之命傷人之肢體破人之家敗人之德為善良之害者莫大於此是以我皇考愛民之深憂民之切嚴申糾禁戒飭守土之官法在必行日夜捕緝積嵗月之久然後道路少響馬及老瓜賊而商旅以寧賭博及造賭具者漸以改業而家室以安聚黨打架者斂迹而城市鄉鎮鮮聞鬭囂娼妓逺藏不敢淹留於客店此皇考十有三年政教精神所貫注而海內臣民顯見其功效實享其樂利者也朕自嗣位以來蠲免租賦豁除賠纍裁革積弊增廣赦條無非惠保良民使得從容休息衣食滋殖而無識諸臣誤謂朕一切寬容不事稽察以致大小官吏日就縱弛民間訛言諸禁已開風聞直省四惡皆微露其端倪即如天津一帶私鹽橫行無忌恐其他類此者相繼而起是守土之官敢悖世宗憲皇帝之明旨墮十有三年之成功而戕賊善良傷敗風俗也自後州縣官有政令廢弛使四惡復行于境內者該督撫不時訪察即行嚴參督撫司道郡守有不能董率州縣殫心捕治者或被內外臣工核實列奏或朕訪聞得知必以溺職治罪與通包苴受賄賂等決不輕貸爾諸臣慎毋泄泄沓沓自取殃咎戒之戒之特諭乾隆元年三月十三日奉上諭聞江南長江一帶向有貢獻鰣魚之例至康熙年間停止因而地方改為折價向網户徵收解充地方公用乃歷年既久或網户改業或移徙他方展轉牽連又加胥吏借端苛索遂致沿江捕魚之人代受追呼之纍朕思當年聖祖仁皇帝停止貢鮮乃愛惜民力之至意何用此些須折價煩擾小民著該督撫查明豁免永著為例欽此乾隆元年三月二十九日奉上諭朕查江南泗州地方前經河臣齊蘇勒升報新淤地畝九千八百餘頃嗣蒙皇考察知辦理之員勘報不實諭令督臣尹繼善再加確勘隨開恩豁免八千六百餘頃止存淤地一千二百七十四頃入額升科今朕聞得泗州地方濱河臨湖地勢極低凡虹縣桃源之水皆歸入泗州安河入洪澤湖而此等淤地即在安河兩岸每年水勢漲發淹涸靡常收成無定小民不免賠糧之苦深可憫惻著照淮安府阜寧等縣之例將泗州安河兩岸重糧水淹之淤地一千二百七十四頃九十七畝額徵錢糧一千二百二十二兩三錢麥一百一十石八斗自雍正十三年為始盡豫豁免以示朕減賦恤民之至意欽此乾隆元年三月奉上諭士子倚恃青襟抗欠國課定例褫革追比原以懲戒不率使知禮法至革後如能清完者準豫開復所以廣自新之路也今直省所有雍正十二年以前舊欠錢糧俱已豁免此等革生內容有所欠錢糧亦已陸續完納祗緣尾欠未清未曾循例開復而所欠又奉豁免之恩詔遂令所革衣頂永無開復之期情殊可憫著各省督撫轉飭各州縣查明前經欠糧革退之舉貢生監等實係抗欠不完褫革之後並未完納者仍不準其開復若所欠錢糧曾於革後陸續完納祗有未清之尾欠而適逢赦免之恩詔將褫革之案準其開復俾得改過自新並將姓名登記檔册倘此次邀恩之後將來再有抗欠之事著該督撫嚴參治罪欽此乾隆元年五月初九日奉上諭三代以前不言水利溝澮之制時蓄泄備旱潦尚書周禮所載為田功計者其利甚溥開渠引水溉田育榖始於戰國蓋因阡陌既開溝澮尋尺已失其舊也歷代言水利者得失參半總以相土宜順水勢近不擾民逺可利人為主今江南所屬蘇松常鎮四府太倉一州現在興修支河仿河工海塘之例督撫分委降革廢員及本籍候選考職人等效力承修朕思渠港墟壩附近溉田原宜開浚以備旱潦但開浚之法須河身深廣蓄泄得宜其挑取塗泥逺移他處或培窊下之地或築堤岸之上方為久計若雇夫挑土堆貯河旁雨霖水潦旋即入河不久淤塞務名無實徒滋煩擾至古堤舊渠倘遇旱潦不為田害便宜仍舊紛更改築甚無謂也今蘇松等處內地支河原不比河工海塘之險古堤舊渠如元和致和等塘民利往來田資灌溉至今受益吳本澤國三江震澤支流四溢如邱與權單諤郯亶趙霖夏原吉周忱等所論水利考據精核得失瞭然今效力承修人員相度形勢諳練自遜前人倘有夾塘蓄水石梁泄河止宜加修不必改築若有必應開浚建築之處督撫留心細勘并飭州縣協辦工程一應調遣臂指易使至長洲等州縣按畝派錢以供大修朕已降旨停止倘有官吏藉端中飽即絲毫派纍經朕訪聞必加嚴處嗣後督撫以至州縣建言為民興利或利小而害大或利在目前而害伏於後或有利無害而其事易創難成皆宜詳審熟籌慎之於始以體朕惠養元元之至意特諭欽此乾隆元年五月十四日奉上諭朕聞河南永城縣地方於本年四月內黃水忽發從江南碭邑之毛城鋪閘口洶湧南下將申公堤祝家水口衝坍並東首古堤亦衝二缺潘家道口等集一帶平地水深三五尺不等雖未損傷人口而二麥被淹房屋亦有傾圮者朕已切諭豫省巡撫等將被水民人加意賑恤母令失所外查潘家道口一帶地方年來屢遭水患自應亟為疏通為乂安百姓之計但此水下流多在江南蕭宿靈虹睢寧五河等州縣今若止議挑濬上源而無疏通下流之䇿則水無歸宿之區仍於河渠無所裨益著河南巡撫富德會同江南總督總河各委賢員會勘明確公同妥議速行辦理務令水害永除閭閻安堵以副朕為民防患之至意欽此乾隆元年五月十九日奉上諭治河之道在因其勢而利導之司河務者必將全河形勢熟悉胸中隄防疏濬在在得宜始可以行所無事而致安瀾之慶也黃河自河南武陟至江南安東入海長隄綿亘二千餘里舊設總河一員駐劄淮安清江浦雍正七年復添設河東總河誠慮鞭長不及故俾南北分隸各有責成惟是河流日久變遷舊險既去新險復生其間防濬之宜有病在上流而應於下流治之者有病在下流而應於上流治之者必須通局合算同心辦理庶無顧此失彼之憂若河臣於南北形勢未能洞悉遇有開河築隄等事或至各懷意見彼此參商則上遊下遊必有受弊之處所關匪細徐州府當南北之衝為兩河關鍵最為緊要現設南河副總河應著移駐徐州以專督率如兩河有應會商事宜就近可與南北河臣公同踏勘應開濬者即行開濬應堵築者即行堵築毋得推諉亦毋得掣肘於河務似有裨益著江南總河河東總河會同確議具奏特諭欽此乾隆元年五月上諭厚生之道在於務本而節用節用之道在於崇實而去華朕聞晉豫民俗多從儉朴而户有蓋藏惟江蘇兩浙之地俗尚侈靡往往家無斗儲而被服必期華鮮飲食靡甘淡泊兼之井里之間茶坊酒肆星列碁置少年無知遊蕩失業彼處地狹民稠方以衣食難充為慮何堪習俗如此民生安得不愈艱難朕軫念黎元期其富庶已將厯年各項積欠盡數蠲除小民乘此手足寬然之時正當各勤職業尚朴去奢以防匱乏豈可習於侈靡轉相倣效日甚一日積為風俗之憂也地方大吏及守令有臨民之責者皆當遍行化導宣朕德音縉紳之家宜躬行節儉以率先之布帛可安不必文綺也粗糲可食不必珍羞也物力可惜毋滋浪費終身宜計毋快目前以儉素相先以撙節相尚必能漸返淳朴改去積習庶幾唐魏之風焉又聞吳下風俗篤信師巫病不求醫惟勤禱賽中産以下每致破家病者未必獲痊生者已至坐困愚民習而不悔尤屬可憫地方官亦當曲加訓誨告以淫祀無福嚴禁師巫勿令蠱惑亦保民之一端也凡此皆不用嚴峻迫切立法繁苛反致擾民惟誠心訓諭漸以嵗月自應遷善而不自知朕保民念切不憚諄切言之官吏士民其皆敬聽毋忽特諭乾隆元年六月奉上諭書院之制所以導進人才廣學校所不及我世宗憲皇帝命設之省會發帑金以資膏火恩意至渥也古者鄉學之秀始升於國然其時諸侯之國皆有學今府州縣學並建而無遞升之法國子監雖設於京師而道里遙逺四方之士不能胥會則書院即古侯國之學也居講席者固宜老成宿望而從遊之士亦必立品勤學爭自濯磨俾相觀而善庶人才成就足備朝廷任使不負教育之意若僅攻舉業已為儒者末務况藉為聲氣之資遊揚之具內無益于身心外無補于民物即降而求文章成名足希古之立言者亦不多得寧養士之初指耶該部即行文各省督撫學政凡書院之長必選經明行修足為多士模範者以禮聘請負笈生徒必擇鄉里秀異沉潛學問者肄業其中恃才放誕佻達不羈之士不得濫入書院中酌倣朱子白鹿洞規條立之儀節以檢束其身心倣分年讀書法豫之程課使貫通乎經史有不率教者則擯斥勿留學臣三年任滿咨訪考檢如果教術可觀人才興起各加奬勵六年之後著有成效奏請酌量議敘諸生中才器尤異者準令薦舉一二以示鼓舞特諭乾隆元年六月奉上諭朕夙夜孜孜任賢圖治惟期內外大小臣工共砥亷隅以襄郅理今列兹庶位者讀書科目之人不少正宜宣力國家以副朕望乃人品不齊拜官除職之際竟有不念官守之當如何而盡政事之當如何而舉輒咨問于缺地之豐嗇計較于養亷之多寡者士大夫聞之恬不為怪良可慨嘆抑或身任繁要而致羡于優間或位列清華而垂涎于豐膴豈先資拜獻者之所宜出此哉董子曰正其誼不謀其利明其道不計其功士人稽古入官當以逺大自期安可謀食懷居甘自菲薄且朝廷設官各有分司惟當各盡職守主錢穀者必謹出納之數理刑名者必諳律例之條大僚有恭儉惟德之思一命有存心愛物之志豈可萌出位願外之妄想自曠當官之職業哉為諸臣者務宜痛自警省精白乃心靖共爾位不負讀書二字嚴義利之辨立亷恥之防庶幾風俗古而人心端斯吏治清而民生厚朕實有深望焉特諭乾隆元年六月奉上諭史書詳志河渠經術兼明水利誠以國計民生所關也果使水道疏通脈絡流注陂澤非沮洳之藪隄防有蓄泄之方旱潦有備而田廬無虞其有裨于閭閻誠非淺鮮我皇考軫念黎元興行水利凡直省泉源河湖莫不濬導俾民得以灌溉轉瘠為腴至于蘇松之太湖吳淞白茒劉河歸海要道並淮揚之槐子烏塔河泰州如臯運河串埸車路海溝等河尤不惜帑金專員督理將各河古道或為豪強侵占者諭令嚴查清出始得一一開通建閘築堤按時啓閉使近水田畝均沾膏澤貨船鹽艘遄行無阻利賴甚溥但自開浚以來已閲數年墟岸不無坍頽沙泥不無淤積朕思與其嵗久濬築事難費倍不若逐年疏葺事易費省著江南總督暨河道總督令管理水利河務各官及濱河州縣各於所屬境內相視河流淺阻每嵗農隙募夫挑挖定為章程逐年舉行必令功施可久惠澤民生勿得視為具文玩悮工作及陽奉隂違絲毫擾纍特諭乾隆元年六月二十八日奉上諭上下兩江及江右鄉村五六月間連值隂雨山水驟漲有水淹處所據各該撫奏報朕已批諭速行賑恤安插今據總督趙宏恩將各被水情形具摺彚奏朕又批令督率屬員盡心賑恤務使災黎得沾實惠朕思江南江西被水鄉村雖係連隂驟漲止屬近山近水之區然被災之家俯仰無資甚可憐憫所當加意撫綏毋令少有失所其水勢旋即消退之地固可補種雜糧而低窪積水之田不能補插秧苗者更宜確加查勘酌免本年額賦至房舍量加修葺籽粒應否給助之處俱著悉心料理以副朕愛養元元之意欽此乾隆元年七月初十日奉上諭兩淮鹽務內有從前江漢口岸匣費收受人員數目及甲乙兩綱上下兩江各官收受規禮銀兩厯年既久人多物故據督臣趙宏恩等題請免議比經户部議令造册送部核奪朕思此項陋規餽送皆在昔年未定養亷之前今事隔多年授受之人多升遷事故不但銀兩難追即造册亦無確據不足憑信徒滋地方之紛擾著加恩悉行寬免並免其造册送部該部可即行文兩淮鹽政衙門知之欽此乾隆元年八月十一日奉上諭各省學政有衡文育才之責關係綦重從前各賞養亷資其用度俾得堅持操守砥礪廉隅衡鑒公明共襄國家作人之巨典天下人文繁盛應試衆多者莫如江南而江南學政養廉江蘇二千兩安徽一千五百兩較他省為少以此養贍家口延致幕客未免不敷所當加恩體恤者著從今秋為始上下兩江學政養廉各賞銀四千兩使伊等用度從容益得盡心於職業以副朕任官課士之至意欽此乾隆元年八月十三日奉上諭任土作貢按則徵科賦稅之重輕惟視地畝之肥瘠朕聞江南崑山新陽二縣有沿江濱湖地畝雖不類於報荒坍沒而蘆葦蓁蕪不堪樹藝或地處低窪十載九荒乃原編科則時分晰未清竟有以下産而供上賦者以致小民輸納維艱終歸逋欠曾經前任撫臣委員察勘未曾上聞著巡撫顧琮確查詳核將如何釐正科則裁減浮糧以紓民困副朕愛養黎元之至意悉心妥議具奏欽此乾隆元年八月奉上諭朕聞揚州府儀徵縣江口至江都甘泉二縣所轄三岔河一道共計六十餘里為通江達淮要津向例三年大挑一次撈淺一次共需銀一萬六百是皆商三民七分派捐輸經管里甲不無苛索需擾而承修各官又復層層侵扣以致撈淺挑濬有名無實無益於工程有纍於百姓嗣後著將商民派捐之項永行停止亦不必拘定三年之限如遇應濬之年著該鹽政委員確估實力挑濬所需工費即於運庫一半充公項下動支毋得虛冒侵肥草率塞責欽此乾隆元年十月奉上諭今嵗江南夏秋之間天雨連綿淮揚一帶各州縣低窪田畝有被水淹漫者朕恐窮民失所已諭令督撫等加意賑恤俾獲安居今思此等百姓若於冬春之交再令傭工以資力作更為有濟查宿遷桃源清河安東以及高郵寶應等州縣均有應行挑濬之河道其安東舊鹽河約估需銀二萬二千餘兩宿桃清高寶等工約估需銀十二萬餘兩著於今冬明春次第興工即令雇募民夫及時挑濬則於緊要河道既得深通而寓賑於工窮黎更得藉以養贍於地方民生大有裨益欽此乾隆元年十月二十三日奉上諭朕查兩淮鹽法從前浮費繁多商力日困欽奉皇考諭旨徹底清查革除浮費核定應留之項以備地方公用乃原任鹽臣噶爾泰於酌定存公之外又以商人具呈餽送鹽政銀八萬兩名曰公務餽送運司銀四萬兩名曰薪水奏請歸公蒙皇考批諭此係噶爾泰等應得之項若有需用之處聽其自行支用伊若不受仍即退還衆商不必歸公欽此噶爾泰又奏稱衆商力量寬裕此項實出情願又奉皇考諭旨俟有地方公事將此應用是皇考聖意不肯令其歸公諭旨甚為明切後據噶爾泰經手辦理雖每年按綱具奏而其實商人未能照數完繳丙午丁未兩綱未完銀十二萬三千餘兩商人具呈分作六年帶徵經部議準行在案至己酉庚戌未完銀兩曽經鹽臣題請寬免部議未允朕即位以來仰體皇考愛養商民之心屢加優恤務使商力寬餘以受國家恩澤此項公務薪水銀兩既在額課之外著永行停止以惠商民至從前已庚兩綱未完公務薪水之項厯年既久著悉行豁免該督撫鹽政可即宣朕諭旨俾衆商等共知之欽此江南通志卷首四之一
