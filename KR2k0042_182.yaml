  text: 江南通志卷一百八十三人物志列女完節二松常鎮三府松江府明任仕中妻俞氏名淑安上海人有女嫁俞邦用母女俱係早寡同居守志洪武中旌王彥章妻楊氏章子端妻倪氏俱華亭人正統初阮文亮妻金氏華亭人山宗海妻胡氏上海人旌俱天順間蔡倫妻唐氏倫子式妻侯氏俱上海人成化三年旌張璿妻胡氏璿弟璣妻瞿氏璣弟珩妻楊氏俱華亭人成化五年旌其門為三節孔瑜妻郁氏上海人沈璠妻李氏上海人茅瓊妻陸氏上海人旌俱𢎞治間王恵妻張氏華亭人黄鑾妻楊氏華亭人旌俱正徳間盛栻妻姚氏華亭人顧雲龍妻姚氏華亭人張㫤妻任氏華亭人富欽妻龔氏華亭人黄裳妻王氏金山衛人沈露妻蔡氏上海人旌俱嘉靖中吳穡妻朱氏華亭人陳鳴韶妻尹氏華亭人吳聘甫妻李氏華亭人宋堯俞妻張氏華亭人韓宗義妻聶氏華亭人張問仁妻金氏上海人葛鈿妻金氏上海人陳徳瑜妻姚氏青浦人徐伸妻范氏青浦人旌俱萬歴年徐有慶妻沈氏嘉興人適華亭徐有慶有慶亡氏偕妾某守節撫妾子本高後本高疏請兩母竝旌莫是卿妻李氏華亭人徐正禮妻陸氏華亭人顧可大妻劉氏上海人以上天啟年旌何三徳妻唐氏上海人夫亡撫孤長子萬化舉進士疏其母節以聞天啓年旌次子萬仭亦蚤世婦李氏同姑守節至懷宗時詔建雙節坊張永鑑妻王氏華亭人沈文炤妻宋氏華亭人楊玉山妾張氏楊納氏於應天以婦妬未攜歸華亭後楊以貧病喪明氏聞之遽歸松拜正室罄奩資嫁其二女為其二子納室留侍湯藥楊死守志以没陸􅛺妻徐氏青浦人年二十而寡避倭亂攜夫骸骨以行俟倭退歸𦵏終身守節張天恩妻周氏華亭人年十九夫亡未殮值倭亂族衆奔竄獨氏守尸不去撤屋板以殮紡織營𦵏年九十六卒章有容妻朱氏華亭人徐琰妻王氏華亭人徐文孫妻王氏華亭人旌俱崇禎時陸明揚妾潘氏上海人國朝喬軫妻馬氏上海人楊日就妻陶氏上海人俱順治年旌表毛公純妻張氏上海人周士𤦺妻張氏上海人顧汝信妻胡氏上海人馮飛五妻蔡氏上海人王錫綸妻魏氏華亭人生員陳偉妻金氏華亭人唐江妻王氏華亭人與妾同守節監生宋雍妻顧氏華亭人范景韓妻翁氏婁縣人張陳偀妻王氏婁縣人李顯妻徐氏婁縣人生員郁肇虞妻鄭氏婁縣人守節事姑割股療疾王豫瀍妻徐氏婁縣人張鍙妻田氏婁縣人貢生程志文妾蔡氏婁縣人董璠妻陳氏婁縣人陳藻開妻曹氏青浦人孫日㨗妻黄氏青浦人金世裕妻莊氏青浦人以上皆康熙年旌表高徳豐妻鄒氏華亭人生員張寧妻郁氏婁縣人何月輪妻胡氏婁縣人周之鑑妻滕氏上海人以上雍正二年旌表生員顧受昌妻朱氏華亭人顧亡守節事舅姑盡孝生員王正心妻孫氏華亭人夫没撫孤成立守節終身生員馮拱妻周氏婁縣人鍾鑑修妻黄氏婁縣人朱言如妻吳氏婁縣人生員陳葵妻王氏青浦人生員孫鍵妻徐氏青浦人監生諸宏詵繼妻方氏青浦人生員諸原仁妻葛氏青浦人以上雍正三年旌表生員曹聶𢎞妻朱氏上海人喬來泰妻朱氏上海人監生莫光緒妻王氏婁縣人徐貞九妻張氏婁縣人張世竒妻陳氏婁縣人生員顧俞心妻朱氏婁縣人顧元正妻趙氏婁縣人生員葉衡侯妻翁氏婁縣人許燕鎮妻張氏婁縣人許青鎮妻朱氏婁縣人生員莊思安妻郁氏青浦人生員方大謨妻張氏青浦人蔡維均妻邵氏青浦人生員楊學榮妻夏氏青浦人生員孫起龍妻吳氏青浦人高維岳妻楊氏青浦人賈期生妻徐氏青浦人陸承晏妻王氏青浦人沈巖伯妻王氏福泉人包良有妻朱氏南匯人邵珩妻翁氏南匯人以上雍正四年旌表生員宋景雲妻孫氏華亭人夫故翁老氏勤女紅易甘㫖以孝養守節終身生員汪思遜繼妻戴氏華亭人夫亡守節生員汪汝兆妻沈氏上海人潘調鼎妻李氏上海人謝起升妻朱氏婁縣人貢生姜爾玨妾沈氏婁縣人楊燦若妻蔡氏婁縣人杜鎬孫妻朱氏婁縣人生員謝天修妻潘氏婁縣人李緝謐妻蔣氏青浦人宋之琮妻吳氏青浦人虞掌綸妻徐氏青浦人陳靜源妻胡氏金山縣人施欽之妻孫氏南匯人沈應賓妻趙氏南匯人以上雍正五年旌表生員汪世爵妻程氏華亭人夫没守節五十餘年生員汪邇妻項氏華亭人夫沒孝事舅姑矢志守節貢生趙珩妻楊氏華亭人夫亡教子有成苦志守節薛光越妻陸氏華亭人夫死守節生員單乗見妻陳氏苦節撫遺腹子成立莊懿如妻王氏華亭人張天麟妻沙氏婁縣人何銘功妻黄氏婁縣人翁天浩妾張氏婁縣人生員張有曜妻黄氏婁縣人唐良史妻馬氏婁縣人顧飛鳴妻徐氏婁縣人監生姚𢎞炯妻馮氏婁縣人朱仲淵妻湯氏婁縣人錢明黼妻倪氏青浦人張德心妻戴氏福泉人張德軫妻高氏福泉人陳念昇妻沈氏福泉人以上雍正六年旌表曹書臣妻姚氏上海人二十而寡奉事舅姑孝聲逺播撫孤雲翼入泮淩君禄妻陳氏上海人王鴻生妻吳氏上海人陸廷柱妻汪氏上海人張世顯妻鄒氏婁縣人蔣元章妻葉氏奉賢人蔣丕績繼妻沈氏奉賢人徐爾徳妻朱氏青浦人徐茂初妻陳氏青浦人張堯民妻田氏民子臻麓妻吳氏俱金山縣人以上雍正七年旌表孫繩浦妻龔氏上海人于敬初妻蔡氏上海人監生于捷繼妻張氏上海人胡叙九妻姚氏上海人生員唐孫岧妻馮氏華亭人康又煌妻黄氏婁縣人許仁妻馬氏婁縣人生員邢曹瑜妻陶氏婁縣人監生朱文炳妻鄭氏婁縣人陶柯亭妻張氏婁縣人顧原九妻任氏婁縣人生員朱世衡妻楊氏婁縣人楊蕚士妻李氏蕚子𢋫和妻朱氏俱婁縣人談天禄妻王氏青浦人以上雍正八年旌表陸瀛華妻陳氏二妾吳氏馮氏俱上海人姚介錫妻張氏上海人生員方紹昌妻張氏昌子監生尚志妻許氏俱華亭人貢生汪世錫妾孫氏華亭人生員王其義妻姚氏婁縣人汪思