body:
  text: 江南通志卷一百三職官志文職五明太祖建都金陵江南之地實居輦轂時則設官之重與漢左馮翊右扶風等及成祖遷都北京遂以應天為南京以鳳陽為中都中都則置留守南京則設部科寺院諸職不與他省同𨽻承宣布政使司也自永樂十九年遣尚書蹇義等二十六人巡行天下安撫軍民巡撫之名始肇于此至宣德間擢熊槩周忱出撫應天蘇松巡撫之職遂為專官而猶以鎮守為名景泰四年以鎮守侍郎與巡按御史不相統屬文移窒礙乃定為巡撫都御史云其兼軍務者加提督有總兵之地則加贊理所轄地多事重者則加總督其以尚書侍郎任總督軍務者皆兼都御史以行永為定制初成袓始命平江伯陳瑄治漕河內地以贍北京景泰二年特命都御史王竤與總兵參將時有漕運總兵及漕運參將之職同理其事謂之漕運總督尋令淮揚廬鳳四府徐和滁三州屬竤巡撫兼督常盈倉治于淮安成化八年分設巡撫總漕各一員明年復舊正德十三年尋又分設十六年復舊嘉靖三十六年以倭冦日逼乃併漕務于河院特設巡撫防海移駐泰州四十年倭患平漕撫復合仍駐淮安如故撫國朝改鳳為總漕部院蓋始於此又宣德五年設總督糧儲兼巡撫應天等處都御史一員嘉靖中以海警加提督軍務治蘇州糧國朝江蘇巡撫兼轄總理儲提督軍務蓋始於此又崇禎十年設巡撫安廬地方贊理軍務都御史一員割南直𨽻安廬池太四府廣德州一州及河南之光固湖廣之蘄黃江西之德湖等州縣轄焉十六年又增設安太池廬巡撫先是有提督操江都御史一員成化九年奏准専督巡江後令兼督操江官軍與漕運糧儲兩都御史並行江國朝總督帶操江銜而上巡撫専轄安徽一帶蓋始於此此江南開府之大略也其巡按之職始於洪武十年遣監察御史巡察州縣每一年任滿則更代又有巡按廬鳳七屬御史駐泗州提學御史正統元年選御史才行兼備者提督學校巡鹽御史正統三年令兩浙運司每歲敕御史一員巡視催督鹽課清軍刷卷御史始於𢎞治十一年巡江御史南京巡江自龍江關上至九江屯田御史巡倉御史以上三御史各有印信在京對道御史關領差人給付事完復命進繳此巡方奉使之大略也道員之設遷徙不常有巡道有守道有兵道洪武初各布政使司所屬設試僉事紏檢官吏已而罷之改為按察分司統天下凡四十一道此為分巡之始永樂間常令方面官巡視民瘼後遂定右參政右參議分守各屬府縣此分守之始兵道之設昉自洪熙間以武臣疏於文墨遣參政副使等往各總兵處整理文書商榷機密初未嘗自領軍務𢎞治中慮武職不修增副僉一員敕之自此兵備之員隨處分設有蘇松道駐太倉州常鎮道駐江隂縣淮揚海防道嘉靖三十二年以倭冦添設駐泰州淮海道天啓二年設池安道崇禎初年設十年六月設立餉部駐池安道衙門改池安道為池太道駐蕪湖縣徽寧道明初設按察僉事分司於黟婺嘉靖三十四年設兵備道轄安徽寧池太廣六屬治廣德四十一年罷隆慶六年巡撫張佳印題請復設改為徽寧道駐旌德後治池州萬歷三十六年議治寧國廣德各半載四十二年徽寧分設兩兵備一為徽安道駐池州一為寧太道駐廣德崇禎四年復徽安為徽寧道五年移治旌德轄徽寧廣德㯋壽道𢎞治四年設初駐壽州十年移駐潁州廬州府亦轄於此安廬道崇禎七年設鳳泗道崇禎十六年設淮徐道正德六年設原統淮揚徐及鳳陽之宿州靈璧及徐州左衛邳宿淮安大河髙郵儀徴山東之沂州等衛通泰鹽城興化海州東海山東之莒州等所嘉靖間設淮揚海防道揚屬州縣衛所歸𨽻海防餘統如故天啓二年設淮海道駐淮安府本道統轄如舊至州縣考成則海州山陽等八州縣屬之淮海云及漕儲道海運道等員其以部郎分司境內者在淮則有管倉戶部監青江浦常盈倉淮關户部管理鈔關清江工部督治漕船漕運理刑四員在揚則有儀徴工部綜理瓜儀閘壩漕艘商舶之事髙郵工部二員髙郵工部舊在徐州蕭縣正德元年始移駐髙郵謂之南河分司在鳳則有鳳倉戶部一員鳳陽護陵官軍糧餉皆取給於廣儲各倉先是鳳陽府通判一員専主斂散成化七年更立分司監督之隆慶二年始給關防印信在徐則有徐倉戶部永樂初始設専督廣運糧儲一歲一代後兼理廣永倉事并管鈔稅三年一代又後鈔歸吕梁工部本司止監管稅務吕梁洪工部徐州洪工部正統後定差工部都水司主事嘉靖二十年兼理徐州境山二閘萬歷六年裁歸併吕梁工部分司夏鎮工部四員成化二十一年設沽頭工部分司嘉靖四十四年河決沽頭始移駐夏鎮此各道監司及郎署制使之大略也外都轉鹽運使司明初嘗設於兩淮後置之於兩浙巡鹽御史専駐揚州又山陽縣設管堤大使太倉州設黃浦市舶提舉此雖微員亦載諸㑹典者以其官非他省所有也至於郡縣之職自洪武三年定都南省改集慶路總管為應天府府尹又設治中通判推官等以佐之自餘諸郡由知府而下亦有同知判推諸職其首領官有經歷知事照磨檢校知州則有同知判官吏目知縣則有縣丞主簿典史其州之編户不及三十里有屬縣者裁減同知無屬縣者并裁減判官縣之編戶不及二十里裁減丞簿其教職則府設教授州設學正縣設教諭各一員訓導員缺無定數以州縣之大小為差其留都諸官若侍郎僉都之屬皆有右無左蓋左在北也有宗人府六部嘉靖二十六年革南京糧儲都御史以南戶部侍郎督理糧儲六科內戶科給事中一員管後湖黃册五寺內太僕寺駐於滁州都察院內右僉都御史提督操江兼管巡江或副都或僉都不並設通政司詹事府國子監翰林院尚寶司欽天監太醫院錦衣衛五城兵馬司中都留守諸官留守署在鳳陽府洪武十四年初制非勳戚不為留守後多以才略充之故銜多稱署守少實授者以倣中朝規制非獨江南一省之官故其詳不復贅列焉統部郭景祥總制張經楊宜胡宗憲劉畿以上總督軍門永樂蹇義宣德熊槩正統周忱景泰李敏鄒來學陳泰天順李秉崔恭劉孜成化宋傑邢宥滕昭畢亨牟俸王恕彭韶李嗣王克復𢎞治似鍾何鑑朱瑄彭禮朱璉魏紳艾璞羅鑒正德張鳳王縝張津李克嗣嘉靖吳廷舉陳鳳梧方良永歐陽重周季鳳陳祥毛思義陳軾侯位陳克宅歐陽鐸夏邦謨喻茂堅丁汝䕫歐陽必進周延張烜孫世佑彭黯方仕屠大山楊宜陳洙趙欣周珫曹邦輔張景賢方濂陳錠翁大立周如斗謝登之林潤海瑞朱大器陳道基張佳印宋儀望胡執禮孫光佑郭思極王元敬佘立周繼李淶崇禎鄭瑄以上巡撫應天都御史宣德曹𢎞正統何文淵王竤景泰王文徐有正陳泰成化滕昭髙明陳濂張鵬李裕李綱張瓚徐英劉璋馬文升李敏邱鼐𢎞治秦鋐李昂張瑋李蕙白昂徐鏞張敷華正德洪鐘王瓊李瀚邵寶屈直陶琰張縉叢蘭臧鳳許庭光嘉靖俞諫胡錠李鉞髙友璣鄭毅唐龍毛思義陳祥劉節馬欽周金王杲張景華周用王瑋喻茂堅歐陽必進韓士英胡松龔輝魏有本何鰲應檟路顒連礦吳鵬鄭曉陳儒蔡克廉王誥傅頤章煥何遷胡植李遂唐順之洪朝選萬士和萬厯潘季馴李志喻時毛愷王廷馬森張瀚方廉趙孔昭陳炌王宗沐張翀吳桂芳汪一麟凌雲翼傅希摯李世達王廷瞻楊俊民楊一魁舒應龍陳于陛周寀李戴褚鈇李三才王紀李養正天啓吕兆熊蘇茂相陳薦劉東星劉士中崇禎李待問郭尚友朱大典史可法路振飛以上總督漕運兼巡撫都御史朱瑄史可法徐世䕃鄭二陽張亮黃配元以上安廬巡撫嘉靖盛汝謙王道直以上操江都御史洪武許圭永樂顧佐閻𢋫張志童寅李曰良方林艾廣劉棻宣德陳俊何文淵張琦陳懋正統楊春張文昌李杲羅琦馬昂李確江玉林周全劉甄黃英齊讓王允徐郁江球朱瑄景泰陳叔紹陳璥汪琰李巘天順李㢲劉泰許誾李林吳玘樊英白侃司福成化胡涇陳維裕柳彰張斆馮貫董俊費臻似鍾李敬胡漢何淳翟瑄黃傑邱山何珖孫辨奚銘戈瑄胡諒𢎞治許鋭朱鉉凃疇吳裕歐陽復史瑛程文方榮連盛邢義邱天祐劉淮陳世良公勉仁正德黎鳳姜佐劉溥洗光鄺約張晉施儒吳鉞張仲賢陳軾嘉靖胡潔王完陳實鄭光琬楊鏊李儼葉奇劉謙亨傅炯虞守愚宋茂熙詹寬游居敬邢第劉良卿喬佑江濬陳與音唐臣劉存德周亮張洽孫文錫閭東趙鏜張雲路莫如士董鯤黃中黃蕎劉以節申佐王汝正宋纁隆慶王宗舜馮善劉世曾郭莊向程萬厯朱文科鮑希賢唐鍊鄭國仕耿名世董光裕陳薦蔡夢說劉維張治興龔一清柴祥李廷彥王象䝉喬璧星林道楠姚三讓黃紀賢王明綦才龔文選李炳牛應元劉曰梧何熊祥曹楷宋燾王國楨荆養喬徐應登駱駸曾李嵩田生金天啓易應昌林一柱郭增光張文熙賈育祥楊春茂何廷樞崇禎田惟嘉溫國奇龔一程遲大成李右讜劉令譽張煊陳起龍徐之垣鄭崑正賀登選以上巡按監察御史正德朱鑑寧欽劉欒郭希愈張惟恕嘉靖郭廷冕賈大亨成子學李逢時馬斯臧陳志蔡應暘舒鰲隆慶邵陛崔廷試李時成陳用賓李棟萬厯李天麟劉應龍髙舉曹楷牛應元蔣春芳周盤唐世濟李應薦天啓史􅒇饒京劉興秀崇禎梁雲構王鼎鎮以上巡按廬鳳淮揚滁徐和監察御史宣德彭朂孫鼎天順葉鸞成化陳選戴珊婁謙𢎞治王鑑之方志正德陳琳黃如金張鰲山張璿林有孚嘉靖蕭鳴鳳陳伯諒盧煥劉隅章衮邱養浩張相聞人詮馮天馭楊宜胡植黃洪毗趙鏜周如斗吳遵周斯盛耿定向萬厯房寰熊廷弼楊希旦王以寧駱駸曾泰昌毛一鷺天啓孫之益周邦基陳保泰崇禎李懋芳甘學闊倪元珙亓煒張鳳翮金蘭宗敦一朱國昌以上督學御史嘉靖許宗魯徐卿伯以上刷卷御史劉錫清軍御史楊鉁蔚元康以上巡鹽御史張士佩屯田御史髙甲巡倉御史王道行萬歷尹申崇禎荆本徹以上蘇松兵備道萬歷彭國光梁祖齡蔡獻臣臧爾勸陳瑛泰昌曾惟唯楊𢎞備周頌崇禎吳時亮吳麟瑞徐世䕃曾化龍商周祁林銘鼎李時周調鼎馬鳴霆以上常鎮兵備道嘉靖張景賢馬慎劉景韶張師載姜廷順隆慶劉佑傅希聲陳耀文程學博萬歷陳文煥龔大器舒大猷胥遇周夢暘薛夢雷張允濟曲遷喬王之猷陳璧楊洵張鳴鶚楊檟熊尚文鄭國俊馬從龍天啓郭士望周汝璣王化行來復崇禎王象晉柴紹勳鄭二陽袁繼咸王心純黃家瑞王纘爵以上淮揚兵備道王公弼史可法湯開逺張亮杜繩甲馮叔吉張九德以上安廬兵備道洪武張允成鄧瓊嘉靖鄭光溥朱舜明徐光啓楊兆丁應璧馮叔吉劉志業程拱震周標牛惟炳袁國臣侯應薇張天德陳王庭柳希㸃饒景曜蘇進王龍德林汝詔劉㑹金勵張九德王三才張孝楊作楫陳英傅淑訓孫轂彭克濟盧洪圭張士第顧元鏡程世昌劉開文侯安國余鯤翔崇禎張文輝唐良懿馬鳴霆以上徽寧池太兵備道𢎞治閻璽正德王純席書李天衢孫磐曾大顯李鉞郭震嘉靖袁經伍希周周允中史道張絅李宗樞陳洙孔天印林雲同蘇志臯顧翀許天倫程時思朱舜民許嶽徐惟賢黃元恭胡湧王學謨張嘉應段錦隆慶劉得寬馮豸隨府陳治典萬歷聶廷璧朱東光唐鍊潘頤龍賈如式李𢎞道楊芝王之猷李驥千詹在泮楊繼光李維楨劉如寵歐陽東鳳臧爾勸朱錦董元學梁有年趙彥陸夢祖賈之鳳饒景暐天啓魏士前吕封齊焦源溥劉應召崇禎胡沾恩吕道昌申為憲謝肇元袁楷李一鰲張如蕙以上潁州兵備道成化汪舜民張憲毛科馮顯柳尚義羅循陳和余祜蔡需正德李珏吳嘉聰趙春秦鉞吳昂查應非嘉靖何鰲宋圭張臬屠大山王挺楊宜郭廷冕王畿談棨李天寵劉天授于德昌翁時器盧鑑錢嶧余朝卿徐節陳奎隆慶劉經緯馮敏功舒應龍陳文煥萬歷林紹游季勳張純唐鍊陳瑛莫與齊陳文燧周夢陽畢自嚴徐成位郭光復曹時聘劉大文卜汝良馮盛明李文芳袁應泰楊洵髙捷嶽駿聲施天德趙謙楊廷槐天啓王振祚唐煥劉泓崇禎徐標姜兆張張若獬何騰蛟范鳴珂鄭之俊以上淮徐兵備道隆慶潘允端萬歷宋豫卿楊一魁陳文燭游季勳蕭遍馮敏功劉東星陳瑛徐用儉陳文燧吳同春張惟成沈修衛成方白希繡王任重李開藻董漢儒陳簡梅守相趙應選施爾志翟師雍天啓嶽駿聲熊膏朱國盛崇禎周鼎以上漕儲道天啓宋統殷曹守勳胡爾慥劉若金張燦垣以上淮海道崇禎孫榖王公弼虞洪圭張士第顧心鏡史可法程時昌劉開文以上池太道萬歷宋繼登天啓錢士晉王元雅張翼明陳陛莊起元辛思齊以上海運葉宜蔣瑄陳逵華察方逢時丁希孔沈奎麻溶張養正仇夢台以上清江浦管倉户部分司王鴻儒吳仕典張鉞吳國相徐可久戴冕史啓元荆之琦王良佐劉大川以上淮關板閘戶部分司魚侃姜麟顧棠姚邦才張鳳翼薛近兗樊良樞張國紳以上漕運理刑刑部分司謝彥誠歐陽熙張鼐姚文灝吕希周許應逵沈孝徴朱啓元龔震英楊所修以上督理漕船工部分司鄧珏王淮劉秉常朱應昌項喬凌雲翼許孚逺彭汝成王洙龔養性張東暘郭子章宋存德以上儀徴工部分司方全董模談倫李承勳魏公濟陳萬言林繼臯梁汝璧陳大章葉夢熊袁志髙祝萬齡李三竒孫時偉以上監督鳳陽倉戶部分司郭安李淑玉閻恕康紹宗華金王維垣陳捷李燧趙訥姜士昌周大模葉煒張曉宋統殷盛黃以上徐州倉戶部分司王矩楊璉王豫朱衮羅循彭登瀛萬文卿以上徐州洪工部分司徐儀王溥過璘張文錦蔣應奎陳洪範唐錬陳邦彥傅淑訓王命禹余宗以上吕梁洪工部分司陳宣侯寧曾鑑錢錫汝詹思謙黃元㑹吳昌期宫繼蘭以上夏鎮工部分司謝表蔣益吳日新顧雲鳳李之藻朱國盛林廷輝以上髙郵工部分司江南通志卷一百三
