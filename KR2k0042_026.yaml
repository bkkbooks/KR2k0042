  text: 江南通志卷二十七輿地志闗津三橋梁鎮市附安徽寧池太廬六府安慶府集賢闗在懷寧縣北十八里集賢嶺上連山迤邐至此險狹防禦憑焉北硤闗桐城縣北四十里以北硤山而名有巡司即古南硤戍宋之北硤鎮也龍井闗潛山縣東四十里地名西堡懸崖瀑布最竒勝駕霧闗在潛山縣西駕霧山下大闗潛山縣西四十里地名籠口又西十里有小闗地名茅嶺石門渡懷寧縣石門湖中新河口渡城東五里宜城渡康濟門外大江之滸江南北所由通也山口渡去皖口水落渡里許夏秋水溢小舸泝浪至郡十五里右懷寧練潭渡桐城縣南六十里烏金渡縣東一百一十里梅渚渡縣東九十里右桐城青山渡潛山縣南三十里地名車輞坂袁家渡縣西六十里西河渡縣西一里古角渡縣東五里右潛山花橋渡太湖縣北門外為驛使往來孔道銀杏渡縣南十里通望江潦水灘渡縣北十五里通英江右太湖竹墩渡宿松縣南四十里通洿池鎮地阻長河春冬流細一葦可航夏秋水泛成湖約廣七里洿池渡縣南六十里鎮前白荆青草諸湖相接夏秋抵新溝約三十餘里赤岡渡去縣三十二里長港渡縣東六十五里右宿松武昌渡望江縣東北三十里鴉灘渡縣北四十里黄家渡縣東二里葛家渡縣東北二里右望江大新橋懷寧縣治西石門漳港兩湖之水由此達江野螺橋縣治東自皖達京師之孔道同安橋縣治西有前後二橋清塘水由此入江石門橋縣西十五里石門湖中寒塘泊橋縣西淥水鄉雙城寺橋縣西北大豐鄉白石橋縣西麻塘湖水出此髙河埠橋縣西北欽化鄉官豸橋在皖口為郡西孔道右懷寧縣桐溪橋桐城縣東門外數十步為京省通津國朝康熈中重修更名曰子來橋七星橋縣西一里靈泉寺前下梨橋縣北三十里黄公橋縣東三十里孔城橋縣東三十里楊樹灣橋縣東五十里萬安橋縣東南八十里黄華橋縣東南一百里渡仙橋在浮山鳳凰橋縣南一百里石牌界義津橋縣南七十里太平橋縣南三十里同心橋去縣百二十里右桐城縣裴家溝橋潛山縣南五里皖公橋縣西四里迴龍橋縣天柱寺前漢武帝登封迴輦處珠琳河橋縣東十五里亂墩山下許家河橋縣南十五里旌駕橋縣西北十五里試心橋縣西北皖山絶頂破月橋縣東十里文峰橋縣南河文峰塔下右潛山縣松陽橋太湖縣南五里臯橋縣南十里載陽橋縣西三里有馬路口渡在縣西一里南通望江西通宿松黄梅明萬厯間水道改從東北乃遷渡於載陽造舟為浮橋後毁重修黄絲橋縣北七里倉前橋縣東三十里梨林橋縣北二十五里駐馬橋縣北三十里鮓陂橋縣東四十里右太湖縣通濟橋宿松縣東北黎協橋縣東一里惠春橋縣東三里雙荆橋縣東五里通遠橋縣東三十里楓香堤中秋時夾水蕩漾多菰菱鳬雁之屬道通太湖望江懷寧豆溪橋縣東三十五里上馬橋縣東十五里支水赴河時有山漲捎衣橋縣東南七十里烏泥橋縣南十五里大橋縣西一里跨大河長數百步闊數丈鎮波橋縣西四里相傳其下有蛟以鐵牌鎮之故名藕塘橋縣北一里萬花橋縣北十五里為往來衝要右宿松縣化龍橋望江縣南門外明萬厯四年建長一十九丈髙廣俱二丈有竒崇禎十六年建闗其上左兵再至屢攻不下躍鯉橋縣南一里以近卧氷橋得名蘆薪橋縣北三十里駱駝橋縣西北三十里石橋在縣北六十里接懷寧縣界其水多源懷寧太湖邊境皆下武昌沈冲橋縣東北二十五里右望江縣皖口鎮懷寜縣西十五里皖水入江之口亦名山口舊為懐寜縣治三國吳嘉禾六年使諸葛恪屯于廬江皖口陳永定三年遣將徐度將兵城南皖口皆其地長風鎮縣東五十里即古長風沙也明初置巡司今移郡治宜城鎮樅陽門外自新遷郡城東南治遂為宜城鎮石牌市縣西百里通潛太宿望四邑有上下二集商旅輻輳即古石牌口也宋開寶七年樊若水請用浮梁濟采石先試舟于石牌口即此右懷寜縣樅陽鎮桐城縣東南一百二十里商民萃聚置馬踏石巡司於此孔城鎮縣東三十里練潭鎮縣南六十里接懷寧縣界以近練潭而名雙溪鎮縣東百四十里周潭鎮縣東百六十里右桐城縣天堂砦潛山縣西北百里天堂山下有巡司野人原縣西北十五里宋景炎二年邑人劉源屯兵於此右潛山縣白沙鎮太湖縣西北一百二十里有巡司小池鎮縣北四十里舊置巡司裁改置小池驛於此馬路口鎮縣西郭外商賈輻輳之地又西一里曰小馬路鎮右太湖縣涇江口鎮宿松縣南百二十里邑中諸水合流於此有巡司歸林灘鎮縣西南一百二十里江水兩分一派道其前沿流出涇江合大江舊有巡司今裁小孤山鎮縣東南一百四十里大江在前商賈舟楫所聚有巡司便民倉鎮縣東南七十里俯臨長河東通望江縣吉水鎮商旅絡繹邑南北糧倉貯此洿池市縣東五十里今改為鎮或曰即宋龍溪鎮以在龍湖旁故名右宿松縣楊灣鎮望江縣西南三十里舊有巡司今移駐華陽鎮急水鎮縣南三里商賈所聚亦名吉水鎮雷港鎮縣東三十里古雷水從此出明置巡檢驛丞今皆裁華陽鎮縣東南十五里有巡司香草鎮縣西三十里舊設河泊所於此尋裁右望江縣徽州府新安第一闗在歙縣南五里紫陽橋上馬嶺闗婺源縣北兩山對峙如㦸當休婺之界宋初猶置戍守後裁佛嶺闗婺源縣東十五里叢山闗績溪縣北三十里地名永安鎮翬嶺闗績溪縣西十五里地名太平鎮梅嶺闗績溪縣東南三十里五嶺闗祁門縣南百里為浮梁入縣之道漁梁渡歙縣城南岑山渡縣南十五里梅口渡縣南十三里烟村渡縣南三十里術口渡縣街口司前右歙縣率口渡休寧縣南三十里長干傍渡在縣十六都霞阜渡在縣二十四都臨溪渡在縣二十六都上溪口渡縣西五十里右休寧鵠溪渡婺源縣五都溪北通迴嶺達於郡古箭渡在縣五都前溪渡