body:
  text: 江南通志卷一百七十五人物志方外二安徽寧池太廬鳳潁八府滁和廣六泗五州安慶府周匡續字子孝嘗乘雲入關師事老子棲隱潛山至今有遺迹秦華子期九江人隱潛山從甪里先生受仙隱靈寶方返老還少日行五百里能舉千斤一嵗十易皮如蟬蛻後升仙去漢樂長子齊人少好道遇仙授方告曰蛇服為龍人服為童年一百八十色如少女修煉潛山號潛山真君遺迹猶存唐明皇有贊南北朝梁白鶴道人武帝時方士愛舒州潛山竒絶時浮屠寶志亦愛之武帝命二人各以物識其地得者居之道人以鶴止處為記寶志以卓錫處為記已而鶴先去忽聞空中錫飛聲遂卓於山麓而鶴止他處各因所識築室焉隋二祖初名神光初祖與改名為慧可求法於達摩受衣鉢為二祖其後付法於璨為三祖嘗來司空山建剎其上至今有傳衣石葫蘆石祕記靈迹存焉三祖名璨得法於神光遂隱舒州皖公山十餘載無知者至隋開皇間有沙彌道信謁曰願和尚慈悲乞與解脫法門璨曰誰縛汝曰無人縛曰既無人縛何更求解脫道信言下大悟後亦傳衣鉢為四祖唐呂嵓號洞賔嘗在桐城呂亭驛遇一孝婦取水事姑至此息肩指示之曰此間自有甘泉不須逺取遂拔劍劃之泉湧出至今方池數武大旱不竭名洞賔泉又嘗遊浮山雪浪巖題云褰裳懶步尋真宿好景一時觀不足月在碧空風在松何必洞天三十六何仙姑初桐城投子山大同禪師每溺有鹿來飲久之鹿産肉毬裂開乃一女師育至十二嵗牧童戲以山花插其髻師乃令下山囑曰遇柴則止遇何則歸至柴巷口何道人家遂棲之以何為姓慎守師戒修持覺悟師使趙州召之女方淅即持笟籬往先至見師坐左趙州至坐右三人一時化解今投子山有趙州橋柴巷口有仙姑井閭邱方逺宿松人修貞匡廬唐昭宗屢召不起賜號妙有大師景福中居餘姚天滌洞錢鏐奏請賜號元洞先生天福中尸解後有見於天都山者幽大師出入跨虎坐化真身在值雪山大同懷寧劉氏子謁翠微頓悟結茅投子山住三十餘載中和間巢冦起有狂徒持刃問師曰住此何為師乃隨宜説法渠魁拜伏乾化四年示寂賜諡慈濟大師宋逺録公住浮山華嚴寺歐陽修造其室與客圍棋師旁觀之歐遽收局請因棋説法師即撾鼓升座衝口而成歐謂僚友曰初以禪語為虛誕今見此老機緣亦是悟明心地年七十餘歸寂義青懷寧李氏子七嵗出家習百法論長入洛聽華嚴義若貫珠至浮山三年逺録公時出洞下宗旨示之悉皆妙契李斯立居東山靈仙觀善丹爐年八十常從蘇軾黃庭堅遊能詩如嵓溜連雲凍溪梅帶雪香等句人多傳之觀至今名仙人洞全舉得法汾陽遍歷諸方後示衆云釋迦不出世達摩不西來佛法遍天下談宗口不開傳燈録載舒州法華院今在宿松治東五十里守端衡陽葛氏子幼事翰墨依茶陵郁披剃參楊岐言下大悟尋遊懷寧結茅唐山之西守令慕道請師主潛山太平寺及宿松法華寺法席嘗作蜂子透窗偈云為愛尋光紙上鑽不能透處幾多年忽然撞著來時路始覺從前被眼瞞法眼遍參名宿最後依白雲端師一見即問南泉摩尼珠話端叱之師大悟獻投機偈曰山前一片間田地乂手叮嚀問祖翁幾度買來還自賣為憐松竹引清風端時印可師主司空山四面山海會寺潛山太平寺諸法席有語録行世佛鑑舒州汪氏子久事演禪師付衣法道大播清逺初謁演禪師師赴海會寺請命師典謁寒夜孤坐撥爐見火一豆許輾然自喜曰深深撥有些子平生事只如此閲傳燈語録至破竈墮因緣大悟自是隱居四面山大中菴次開法龍門道望尤振崔之道舒人為真源宫道士嘗見二仙人對奕與一棋子令吞自此言休咎輒應後尸解元宗善姓鍾元末指揮使從余闕守安慶及城陷披緇潛之永隆山題句云目擊神州已陸沈心隨野鶴與孤雲茫茫宦海羞容膝隱隱禪林可托身坐假蒲團忘世慮卧投方丈掩忠精埋名拋棄人間事懶問山河屬大明後得道為永隆開山祖明朱橘望江人母夢吞星有娠十五月嘗憂焉遇道人持物如橘謂其母曰食此子生矣問名氏示以扇其上有麴君子三字旋不見即誕因名橘讀書聰慧尤精於易數後臨池顧影有悟遂薄名利修道忽遇道人持橘歌曰橘橘橘無人識惟有姓朱人方知是端的橘聞便隨至郊外問其人非麴君子乎不答泣請乃授以符訣令往皖山築室修煉橘拜謝去修於皖公山後至惠州之博羅立化明雪桐城楊氏子年二十剃髮九華山參雲門湛然澄澄問之無對住七日有省忽一日聞鐘聲豁然大悟乃入皖山住靜三載澄以衣鉢傳之無心潛嶽永水菴僧年七十好笑如兒童狀逢人募薪一束積至百擔自理之如陶穴然一日寄語辭山下人曰無心以某日去人怪之及期乃入柴穴中木魚聲不絶後自取火手自茶毗火光撲面將木魚擲外口稱去了須臾而化其骨不僵至今塔在小岑肖像如生三貞姑宣德時人長姊嫁數年而孀遂結茅大凹山中棲心禪寂二妹慕姊貞義相從清修後皆得證道因於其地建三聖菴菴旁有石穴圓如鏡三姑藏骸處也丁丑遭流冦婦女悉竄菴中冦至山下見緋衣三婦往來林莽間追至菴門見緋衣三姑像冦投刀相拜戒勿犯婦女得免至今春秋祀之國朝性源結剎於大龍山之巔終日趺坐忽烈風雷電雨傾如注菴後數蛟騰起水深三尺沙彌皆驚怖莫措源入定自如蛟從屋角委折而下若不敢犯者人咸異之元白姓鄧武岡州人謁顓愚為首座復往參憨山博山天童諸老皆深器之順治丁亥至桐城入慧山清泉寺兵燹之後煥成叢林法席大振後退居舒之華蓋山徽州府漢方儲字聖公歙人講孟氏易精圖讖善天文舉賢良為洛陽令永元中郊祭問以隂晴勸帝毋往是日晴詔責其欺儲曰咎時且至願乘輿亟還比駕還雨雹大作後傳其仙去廟祀之晉羅文佑南昌人父塘與許遜學道晉太康中佑奉母湛之歙採藥黃山結廬長春里丹成乘白狼去人祠之稱呈坎天尊唐許宣平歙人隱城陽山絶粒不食顔如四十許人行及奔馬或題其詩於洛陽傳舍云隱居三十載築室南山巔靜夜玩明月間朝隱碧泉樵夫歌隴上谷鳥戲嵓前樂矣不知老都忘甲子年李白見之曰仙人詩也乃遊新安訪之不遇題詩其菴宣平歸見之是冬野火燒菴不復知所在慧明字元照歙人幼愚陋長乃神異民間疾疫醫卜不起明與交臂即獲痊禱雨輒驗能使眇者視跛者履人稱為聖僧珠溪謙歙人得法於雲居道膺載傳燈録瀾大德歙人興唐寺僧性孤髙杜荀鶴贈以詩清素祁門人揚州刺史陶雅祈雨汪王廟夢汪王曰師為水晶宫菩薩五龍行雨不由天降陶請之師曰吾已遣雨揚州三晝夜矣果然五代聶師道字宗微歙人少修道得服松脂法登績溪百丈山採芝明月中聞天樂往南嶽訪蔡真人遇一丈夫自稱謝修道與彭蔡偕隱已三百餘年授以素書一卷嵗餘還山號問政先生蟬蛻而逝後人見之衡陽云從孫紹元世勤修煉後有四鶴集屋光自空下如火而紹元化去何令通休寧人賜號紫霞南唐國師精堪輿以言牛頭山不利謫休寧一坐四十年大悟宋天禧正席趺坐火從心出自燒而化李玉琳婺源人遇真人授以玉皇經教真文雷雨壞民居玉琳鐵誥所鎮獨無恙子孫皆世其術胡得勝婺源人生而神異嘗曰某處覆舟某處失火皆驗後有禱必應遺劍猶存宋鄭仙姑歙人居烏聊山東嶽廟前數十年不出門或有見之里外者蘇轍令績溪訪之問其年八十矣猶處女也歸志其問答之語門有甘泉今名仙姑井元胡月潭婺源人事月蟾得天心五雷之祕飛步璿璣之書治雷禱雨先知死期又黟有胡月澗術亦如潭而殱邪治疫不用符咒忽夢登九天與徒言訖而逝明朝宗忍天童密雲悟法嗣住歙石耳山與都人酬唱機緣甚多載在語録邋遢仙休寧人溽暑衣裘曝日中沍寒時裸體跣足而蹈氷雪不事浣濯近之無纎穢氣人稱邋遢仙年百餘嵗坐化於齊雲山慧融黟人隱石門洞時數日不食人夜經山中戴月而行訝朔晦何以得月尋之光從洞出叩其工夫蓋月觀云寧國府晉竇子明名伯玉銍鄉人釣於旋溪得白魚腹中書教以服食之法遂入黃山採五石脂服之三年龍來迎去止陵陽山弟子安死葬石山下有黃鶴來棲塜樹呼子安云唐人詩白龍已謝陵陽去黃鶴還來喚子安唐仲濬靈源寺僧有文名李白贈之以詩清越敬亭僧工文張喬有贈詩希運初住髙安黃檗山曹溪六祖嫡孫大中三年裴休知宣州迎居開元寺受法創廣教寺於敬亭南麓麻衣禪師中和間煉藥翠微峯下嘗衣麻衣有得其麻縷者輒能療病通公吳人結廬敬亭山北苦修敏悟叢林所推嚴綬署宣州幕師事之宋可勳有禪行作菴城山寺側曰卧雲太平興國召對問曰卧雲深處不朝天因何至此勳曰天曉不干鐘鼓事月明豈為夜人行因賜還山宗杲少為惠雲寺苾芻宣和間參圓悟聞薰風自南來殿閣生微涼語豁然悟主徑山法席緇流雲聚稱臨濟重興孝宗聞其名召對稱旨賜號大慧禪師元賀士迪宣城人元妙觀道士善祈禱禦災成宗召入京給車服從幸兩都賜號真人張松谷隱芙蓉峯下嘗採藥療人病嵗旱禱輒雨大德庚子索筆書偈而逝汪天驥涇人元妙觀道士能詩有暮春絶句云為愛雲根緑錦苔柴門花落晝慵開竹窗讀罷南華卷蝶夢蘧蘧枕上來明法通字從石兩開堂於廣教注逍遙遊兼精於詩如圭景德寺僧通大小乘止靜黃檗茒菴大慧寧信寺僧掩關七年使寺衆以針刺體液出皆乳未幾往蛾眉至黃池勝果寺説偈而逝口中火出自焚獨頂骨不壞金碧峯有道行善天文棲敬亭石巖太祖幸其地趺坐不起露刃臨之曰汝知有殺人將軍乎答曰汝知有不懼死和尚乎異而謝之問以向導決勝皆如其言尹蓬頭寓宣陽觀嘗從道士索守犬作食道士囑徒烹之徒竊食其兩耳尹食訖讓曰犬非全者因吐出宛然惟缺兩耳嵗餘辭去國朝沈鼎彥字禹鉉南陵承天觀道士工詩善書尤精修煉著黃庭直解了然住千頃山振修黃檗道場能馴鹿狎虎冬夏一衲康熙戊午卒年一百二十六嵗今肉身不化池州府唐義安開元中居石埭杉山鎮國禪院有道行纍詔不起玄宗為割縣之三鄉租稅以贍衆僧金地藏新羅國王子姓金氏名喬覺削髮為沙門至德初渡海行腳至九華棲東巖石室土人服其苦行築寺迎居之建中初刺史張巖奏請賜額化城道場日盛貞元十年召衆告别俄山鳴石隕趺坐而逝越三年啓龕入塔顔狀如生塔建寺右嘗發光如火故謂之神光嶺後羃以殿四方頂禮不絶普願姓王氏新鄭人初六祖授南嶽讓讓授馬祖而願則馬祖門下三大士之一貞元中憩錫秋浦之南泉不下山三十餘年宗風大振太和八年示寂初偕願來秋浦者又有寶雲亦馬祖法嗣居魯祖山趙知微九華山道士結廬鳳凰嶺前諷誦道書鍊志幽寂乾寧中屢詔不出賜碧雲星冠青霞羽衣以寵異之五代西峯聖者楊吳時人陽狂不羈好吹笛能役鬼神蛟龍嘗寓池州乾明寺及去留笛後人寶之共相傳玩宋義懷本永嘉陳氏子天聖中嗣法雪竇七坐道場化行海內晚年示寂於池之杉山張先生舊志皆不詳其名政和間結廬齊山日惟默坐人過問之直視不答在山三十年顔色轉少後尸解太平府漢丁令威遼東人學道當塗靈墟山後化鶴歸遼南北朝宋杯渡師西竺僧所至乘木杯渡水人因以稱之初以架裟裹錫杖擲空隨所往卜勝地至繁昌隱靜山止焉宋元嘉初卒螺浮尊者與杯渡同至姑孰卓錫山中泉自湧出今龍泉山福源寺中井是也汲以竹則清以綆則濁時又有方公禪師居青山日抱甕下汲供飲忽有虎跑擲院旁甘泉驟湧宋趙自然繁昌人青華觀道士夜夢人噉以柏枝及覺神氣清爽遂絶煙火食又夢前人教以篆書寤悉能記寫以示人皆不識嘗作原道歌言修煉之要太宗召至闕親問之懇求還山卒及葬棺重不可舉發之止存劍履石風不知何許人紹興間寓當塗光孝寺披髮垢面佯狂叵測人皆以石風呼之信口作詞初不可曉後悉驗婁僧失其名紹興中居當塗永寧菴一日留偈趺逝有風在松梢月在天之句廬州府三國魏左慈字元放廬江人居天柱山能使鬼神坐致行廚變化萬端曹操召見閉一室斷穀食期年出之顔色如故欲殺之卒不可得唐慧滿貞觀間結菴合肥大蜀山嘗誦法華經有白衣來聽法自稱東海龍王少子也是時苦旱師令降雨答曰盜布天澤當殛死師曰汝舍此身以救民我誦此經以度汝言畢不見須臾膏澤滂沱越三日有龍死山陽師收葬之民為立祠遇水旱祈必驗三刀禪師唐末居廬江顯寧院黃巢之亂賊執而斫之三刀無血故名崔自然巢縣人少學道得服松脂法隱城南洞中冬雪常於溪中澡浴入山虎豹皆馴伏一日告逝後有人見之豫章道上其石牀藥臼見存元妙果饒之樂平人嘗遊四明天童浮梁諸山歸息於巢豫建一塔是夜有光如匹練自天際散於五峯之頂彌三夕乃止明吳崇信無為道士嘗遊長沙傳毛真人雷法能驅役鬼神祈禱甚驗國朝星郎龍溪林氏子也舉天啓丁卯鄉試仕屯田郎出守肇慶棄官剃髮遍歷名山後至廬江住冶父山祖庭寺江畔有古朴一株枯而復榮者數矣師至樹復茂康熙癸丑樹忽萎師曰樹倒老僧行矣沐浴更衣而逝鳳陽府隋方唐虎窟寺僧持律甚嚴每行有虎隨之郡守因以名寺今定逺縣禪窟寺是也唐藍采和唐末居濠衣襴衫緑袴黑木腰帶一足靴一足跣夏服絮冬卧雪出氣如蒸自號藍采和嘗歌踏踏歌時曳長繩拖錢以行錢散不收至今濠州有撒錢街道樹卜夀州三峯山結茅而居言笑詭異常化佛羅漢形學徒睹之莫能測寶歷元年九十嵗無疾而終道雄真如寺僧冬夏惟一破衲蓬頭跣足每施藥濟人即獲竒效不受謝廣修橋路人多便之又旁通韻學反切精致年七十八趺坐而化宋志言夀州人許姓落髮東京景德寺貌竒古能前知仁宗嗣未立默遣內侍詢之乃書十三郎字上不解後英宗以濮王第十三子入繼明木牌王自言王姓能治療手持木牌人因以稱之嘗在懷逺冬月宿元真寺赤地門外雪深尺餘其卧處如燎火有問病者命持酒來一飲而盡吐其半飲病人即愈後不知所之國朝海華號藏林宿州淝水人嘗參古德於花山戒律精嚴人推為當代慧逺後住古林菴一時陳旻昭周蓮池黃石公諸名流悉向往焉潁州府漢周義山字季道汝隂人丞相勃之後也父祕陳留刺史義山年十六常於平旦日出時東向服氣嗽咽百數父問之對曰愛此朝日之暉是以服之後遇中嶽仙人蘇子元授以長生之道白日升舉隋張路斯潁上百社人隋初明經登第為宣城令夫人關州石氏生九子罷令歸每夕出還則體常冷且濕石氏異而詢之曰吾龍也蓼人鄭祥逺亦龍也騎白牛據吾池吾屢與戰未勝明日取決可令吾子挾弓矢射之繫鬛以青綃者鄭也絳綃者吾也子遂射中青綃鄭怒東北去投合肥西山死由是張與九子俱復為龍事見歐陽修集古録目跋後蘇軾迎祀潁之西湖有昭靈張龍公祠記宋丁少微亳州人為道士持齋戒奉科儀尤為精至嘗隱華山潼谷密邇陳搏所居與摶齊名志尚清潔善服氣多餌藥年百餘嵗太平興國三年召赴闕以金丹巨勝南芝元芝為獻還山七年冬卒明張古山潁州人生而端重父母欲為娶妻不從入迎祥觀為道士久之召為武當山提點能言未形事後入山採藥不知所終相傳張三丰遊潁古山師事之遂得其術今迎祥觀有混元衣體製特異或云三丰所留也滁州唐覺禪師西洛人受業藥山院得法于汾州嘗住滁州琅琊山開化寺有五百梵僧寓席下休夏同日而來同日而去宋王中勤來安人淳熙中為道正戒行峻潔遇異人授祕法每嵗旱及疾疫有禱立應明德清字澄印全椒人族姓蔡氏年十二入南京報恩寺事無極法師內江趙貞吉摩其頂曰兒他日人天師也後駐錫曹溪宗風大振海內稱憨山大師天啓三年示寂和州唐商棲霞歷陽人大歷中棲白石山彭仙洞善吐納之術絶粒三十餘年惠褒結茅含山縣北山麓時人重其道行因名其山曰褒禪宋淳化中禱雨有應賜號護法大師宋紹隆歷陽人得法於圓悟悟目之為瞌睡虎由和州開聖寺至平江虎邱説法大闡臨濟宗旨法嗣最盛白玉蟾福州人本姓葛名長庚遇異人傳祕術世以為仙嘉定末詔徴赴闕奏對稱旨嘗憩含山白石洞愛其泉石清幽特再過之有重遊詩見集中元圓寂號懶牛和尚至正中寓和州既説偈已即沿麓至磯舉步大江如履平地徐至中流乃跏趺而坐浮水上久之方沒後半月出沙洲上衣履不脫趺坐儼然如生衆人聚觀乃輿歸茶毗焉廉訪幹克莊有記廣德州宋契嵩多智慧能徹禪家宗旨崇寧中賜名曰明教嵩禪師并賜寺額曰明教禪寺明太祖題橫山詩有曰上有禪師悟透關元王當陽初遇異人能幻化之術後遊武當山歸於郡南平頂山建升平道院修煉其中撰精語後端坐而化明孔師居白鶴觀道士嘗遇異人授以祕籙能呼吸風雲驅役鬼神禁蛟召鶴斬魅禳星年八十尸解仙去六安州宋明本錢塘人皇慶壬子自天目山遊至六安齊頭山居水晶菴所著有中峯語録青山白雲吟山居十詠為世所稱明金印英山人世宗病癰陶仲文薦印治之印書符傅患處中官見有白蛇擁上躬遂愈授博士賜名中剛賜坊曰盡職供事後承命治江西疫升太常寺卿賜一品服泗州唐僧伽本西域人唐龍朔中南遊江淮欲於泗州建寺賀元濟請捨所居為之僧伽曰此舊佛寺也掘地得古碑乃齊香積寺銘并獲金像一軀伽曰普照王佛也視石刻果然景龍二年中宗遣使召見賜號國師賜寺名普光王寺四年三月坐化於長安大薦福寺夀八十有三宋大中祥符六年加號普照明覺大師江南通志卷一百七十五欽定四庫全書
