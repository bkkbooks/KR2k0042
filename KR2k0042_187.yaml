body:
  text: 江南通志卷一百八十八人物志列女貞孝一江蘇松常鎮淮揚徐八府太海通三州江寧府宋夏氏女髙淳人年十二割肝愈母旌其里曰昭孝元袁氏女溧水人年十五母病癱火延其里鄰婦呼之出女泣曰我何忍舍母去乎抱母共焚死明汪某妻王氏上元人以孝著洪武年旌張二女江浦人以孝著洪武年旌劉玉佩妻陳氏江寧人嘗割股救父母及姑旌表趙知府俊女江寧人刲肉療母旌李氏女上元人以孝旌陳本鐶女上元人長齊養親矢志不嫁匝月兩刲股愈母奉旌徐氏妙錦中山武寧王女居應天長姊適燕王後正位中宫為仁孝文皇后次姊代王妃妹安王妃妙錦矢不適人親王求婚皆拒絶之仁孝崩文王聞妙錦美且賢欲聘為后內使女官往諭㫖妙錦稱病不出女官直抵卧榻妙錦擁被呻吟女官叩頭請不得已徐起自指曰吾面陋無婦容不足備六宫選女官羅跪審視姿態瑩麗真天人也歸復命妙錦即削髮為尼洪熙改元乃返初服宣德初仁廟張太后慕其行義徴至京入朝口稱徐達第三女肅拜進止端凝不失跬步宫娥私相語曰此辭皇后不為者也隨遣內使護歸正統中卒袝葬鍾山先塋庠生劉芳逺妻王氏髙淳人嚙指血煮藥療姑疾薛氏女江寧人受徐聘未嫁夫亡守節張氏女句容人許字王姓夫亡守貞凌氏女髙淳人許字王某未歸夫夭有欲謀以為妾者不從自縊救蘇守節凌氏女江浦人許配張仲仲殤刺目自縊救解守節夫家周貞女高淳人許字彭應驥應驥殤女至夫家守節侯貞女上元人不嫁撫弟姪成立張卿女江寧人父無子不嫁施氏女應天人許字黃氏子㑹壻病甚舅姑急欲娶婦女遂歸黃然未成婦也數日壻死女欲身殉恐舅家奪其志乃歸父母家後父坐事下獄氏刺繡易米以供槖饘有貴人慕其行持千金求聘曰歸我我能出爾父女曰救父誠所願如辱身何却之父病且革詣官請代繫出父就醫父死女朝夕上食悲號成疾垂死猶呼父者三國朝蔣氏女江寧人許字徐沂夫亡守貞趙氏女江浦人許字劉某未嫁夫亡女歸劉守節以上康熙年旌表嚴氏女江浦人許字胡茂儀守貞夫家雍正三年旌表蕭氏女上元人許字唐允隆夫亡守貞撫嗣孝事舅姑楊氏女上元人許字陳子琯夫亡詣陳家守貞事姑以上雍正四年旌表顧氏女江寧人許字諸生汪東山夫亡守節雍正七年旌表吳渤臣女髙淳人許字魏大綬年十六聞夫病殁拜辭父母過門成服不復歸寧事翁姑盡婦道立嗣承祧現存守貞已五十五年普氏女上元人許字汪錦夫亡歸汪守貞以上雍正十一年旌表曹氏女金陵人許字黃某黃他去不返女獨處一樓非定省不下守貞以終劉氏女金陵人許字于廷燮燮亡守貞終身仇氏女上元人許字項邁邁溺死女赴夫家守貞事翁姑撫嗣子毛氏女江寧人許字謝某謝以事逺遁父母欲另議婚女以死拒藿羮不飽後年逾七十徐孚躬妻張氏江寧人父病刲股以進得愈歸徐後事姑盡孝姑老病哺乳為養又代兄立嗣為姪撫孤葉氏女上元人許字蕭采采卒京邸女年十八歸蕭食貧飬姑沒葬祭中禮守貞以老李氏女江寧人許字葉衢夫亡守貞蘇州府晉王氏五女吳縣西洞庭山人事父至孝俱不適人父殁各以衣負土成塜日夕繞墓悲號死時人哀之名五女墳宋張建第五女吳郡人三歲喪母一日曬母舊物女見之伏床流涕家人怪其不起抱持延醫診曰腸斷矣吐血而亡鄭絳妻錢氏吳郡人幼秀悟姑疾不解衣者半年絳貧赴官陕右不能具裝資其姊自亰師持贈金幣錢謝之曰身受姊賜固可何以全吾夫之亷乎元趙夢炎女吳縣人夢炎病氏禱于天刲股以進父尋愈總管董章製孝女歌書綵障表于其門明唐冕妻王氏吳郡人姑病癰夜盜入室氏倉猝擁姑匿簷後時天大寒雨氏以身蔽姑凍死不舍永樂年旌沈氏女長洲人許字張應奎未嫁守貞天順年旌徐氏女長洲人許字袁應龍未嫁守貞萬歷年旌凌氏女吳江人許字徐應化未嫁守貞天啓年旌王氏女吳郡人許字顧同吉未嫁守貞曽斷指和藥療姑病崇禎時旌徐宣妻卓氏字永潔長洲人宣早卒卓年二十一遺孤二越二年二孤並歿操守益堅嘗割股療母病母殁執喪盡禮吳天祥妻趙氏長洲人養姑至孝家貧每于三炊貯米一握積以易肉有兩兒姑酷愛食必呼之趙於食頃驅之出姑問則紿以他語人嘗見兩兒風雨蹲檐間問胡不歸兒云母奉婆婆羮恐分肉食我耳周瑄妻黃寧崑山人瑄早卒矢志不二姑病痿十餘年百方求療弗愈寧肖大士像晨夕百拜凡五年遂得步履如常邑令羅永年遺米三百斛資其養胡氏女崑山人許字楊皓皓客死女聞泣曰命矣夫求者踵接守貞終身周氏女崑山人許字王道正年十五夫殤女矢志守貞年逾三十舅迎歸哭夫墓甚哀執婦道甚謹至老而卒李氏女崑山人許字張晉蕃張夭女誓不改字後女病劇張母率所應嗣子來視女斂容曰幸識吾姑撫嗣者頂嗚咽數四絶粒死何關金吳郡人許字陳惠惠夭何年十六奔喪送葬誓不二志以母在復返舅姑殁往持喪禮葬畢返如初母亡乃歸陳氏萬歷間建貞義坊歲賚粟帛金桂椒女長洲人幼事母以孝聞許字張樹未婚守貞顧氏雙貞女崑山人顧咸建女名紘許字葉世稱未婚稱夭紘誓不改適及咸建死節紘去為女緇咸建弟咸受女少受朱氏子聘朱氏子死亂兵中女年十二謝膏沐礪志守貞與其姊稱雙璧焉楊德蘭崑山人許字戴忠忠病迎楊以歸弗克成婦而忠亡楊時年十六截髮自誓依孀姑以居姑病疫德蘭扶掖卧起染疾而卒徐氏女吳江人許字沈廷訓子早亡女方七齡父母議更字女即自刺幸不死割股療母父亡一號而絶時有周氏女初生時家人夢徐氏再世及長事祖母孝值歲饑以白米奉親自食糠粃勞苦成療死崇禎中與徐氏同旌周汝蕙妻孟氏崑山人年十七歸周時汝蕙