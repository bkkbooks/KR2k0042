body:
  text: 江南通志卷一百九職官志文職十一安徽寧池太五府國朝分轄安慶府知府一員同知一員通判一員經厯一員照磨一員知事順治十六年裁儒學教授一員訓導一員倉大使一員順治十二年裁三十一年裁獄事歸併照磨司獄一員康熙同安驛驛丞一員順治十六年裁驛務歸併經厯知府楊起鳳江寧人順治二年任桑開第玉田人順治三年任王廷賓錦州人順治五年任李士楨昌邑人貢生順治六年任張茁嘉善人進士順治十四年任楊桂英甘肅人貢生順治十五年任趙世槇開原人貢生順治十七年任姚琅浙江人貢生康熙九年任劉國靖奉天人康熙十四年任劉橒山西人廕生康熙十七年任周疆仁和人嵗貢康熙二十五年任劉五瓏吉州人副榜康熙二十九年任傅天祥鑲黃旗人廕生康熙三十四年任張慎奉天人監生康熙三十五年任何鼎靖州人舉人康熙三十九年任張芝眉景州人廩生康熙五十年任張楷正藍旗人舉人康熙五十二年任章曾邠㑹稽人監生雍正元年任徐士林文登人進士雍正五年任范燦秀水籍吳江人進士雍正十一年任郭朝端鑲紅旗人監生雍正十二年任懷寧縣知縣一員縣丞一員主簿一員順治四年裁典史一員儒學教諭一員復設訓導一員長楓夾鎮巡檢一員練潭驛驛丞一員康熙十五年添設知縣謝郁青陽人順治二年任賈壯襄城人進士順治四年任張聖運㑹稽人舉人順治十年任劉士模翼城人貢生順治十一年任周霖太原人進士順治十二年任馬剛睢州人進士順治十六年任段鼎臣奉天人廕生康熙八年任崔宦奉天人貢生康熙十四年任崔維衡奉天人監生康熙二十年任張君弼襄陵人舉人康熙二十四年任王聯桂黃縣人舉人康熙二十六年任劉效曾潛江人嵗貢康熙二十九年任王清圖正黃旗人康熙三十七年任張懋誠遂寧人舉人康熙四十二年任梁國英武陵人舉人康熙五十四年任張廷琮永清人監生康熙五十七年任三格正黃旗人進士雍正元年任嚴昌盛奉新人進士雍正三年任詹宜倫贑縣人舉人雍正五年任李元祥長陽人貢生雍正八年任李國柱蘭陽人舉人雍正十二年署任陶士偰寧鄉人進士雍正十三年署任李元祥雍正十三年回任桐城縣知縣一員縣丞一員主簿順治二年裁典史一員儒學教諭一員復設訓導一員六百丈巡檢一員呂亭驛驛丞一員陶冲驛驛丞一員知縣髙陽文安人舉人順治二年任袁秉華豐城人貢生順治三年任王家賓瀋陽人貢生順治三年任龔景運永城人進士順治五年任張拱極香山人貢生順治八年任石朗三原人舉人葉桂祖浙江人貢生塢汝楫江夏人進士順治十一年任胡必選孝感人進士順治十五年任李文雄魚臺人廕生康熙十四年任王凝命陽信人舉人康熙二十年任髙攀桂錢塘人舉人李允秀長垣人進士錢啓鏊紹興人例監白璿清澗人貢生祖秉圭奉天人貢生康熙五十二年任廖士賢封川人舉人康熙五十八年任翁甫生錢塘人貢生雍正元年任倪大成餘姚人監生雍正四年任李肯堂江夏人舉人雍正九年任汪振甲錢塘人進士雍正十三年署任潛山縣知縣一員縣丞一員主簿順治四年裁典史一員儒學復設教諭一員訓導一員天堂寨巡檢一員青口驛驛丞一員雍正三年裁八年復設知縣胡繩祖大冶人舉人順治二年任周盛時奉天人順治五年任鄭遹元密雲人進士順治七年任何中行郟縣人恩貢順治十五年任常大忠山西人進士順治十六年任周克友公安人貢生康熙二年任王敬先蒲城人貢生康熙十七年任劉芳輝奉天人監生康熙十八年任郭廷彩奉天人監生康熙二十三年任項文柳浙江人貢監呂騰龍奉天人監生康熙三十二年任張塏直𨽻人例監康熙三十三年任張步瀛河南人進士康熙三十七年任段舒太康人進士康熙四十四年任胡瑄大興人軍功康熙六十年任魏其藻直𨽻人舉人雍正九年任任鐸四川人舉人雍正十年任王康蘇州人進士雍正十一年任朱之溥海鹽人舉人雍正十二年署任徐欽錢塘人監生雍正十三年任太湖縣知縣一員縣丞一員雍正三年裁主簿一員順治四年裁典史一員儒學復設教諭一員訓導一員後部司巡檢一員白沙司巡檢一員原設小池驛驛丞一員雍正三年裁知縣饒崇秩撫州人舉人順治二年任朱時熙德平人貢生順治三年任李世洽東鹿人進士順治八年任王廷舉奉天人貢生鄭應錫蒲圻人舉人羅綺福清人舉人王崇曾直𨽻人進士方人龍奉天人舉人康熙十八年任章時化㑹稽人例監康熙十九年任王庭漢川人例監髙登瀛鑲紅旗人廕生段標麟雲南人舉人詹養貞汲縣人嵗貢康熙四十年任胡暐富平人嵗貢康熙五十四年任朱穎蕃卬州人舉人康熙六十年任胡國楷浙江人進士雍正四年任黃萃南雲南人舉人雍正五年任李佳士寶應人生員雍正七年任李賁德化人進士雍正九年任李𢎞儒順天人舉人雍正十二年任宿松縣知縣一員縣丞一員主簿一員順治三年裁典史一員儒學復設教諭一員訓導一員小姑山巡檢一員涇江口巡檢一員楓香驛驛丞一員歸林灘巡檢一員雍正四年裁知縣孟瑄濟寧人舉人順治二年任盧肇冶烏程人拔貢孫繼文奉天人貢生于有麟清苑人舉人王民皥臨川人貢生順治十五年任朱維髙閬中人舉人胡永昌奉天人朱卷莆田人舉人唐宗聖廣西人舉人王玠邢臺人舉人曾鰲江西人舉人李主恭大興人監生李泰清苑人吏員康熙五十六年任丁勺曾日照人進士雍正元年任魯曾山東人進士雍正四年任劉華定州人監生雍正五年任劉泰蘭州人監生雍正七年任管景廉武進人監生雍正十年任望江縣知縣一員丞簿並裁典史一員儒學復設教諭一員訓導一員華陽司巡檢一員原設楊灣口巡檢雍