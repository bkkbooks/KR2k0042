body:
  text: 江南通志卷一百七十四人物志方外一江蘇松常鎮淮揚徐八府太海二州江寧府漢茅盈元帝時隠句曲山學道遇至人授以仙術盈弟衷為西河太守固為執金吾各棄官來就兄皆得道世稱三茅君山為茅山三國康僧㑹西域康居國人赤烏四年至建康時中國未有像教㑹始誅茅設像即秦淮西南建初塔寺藏所謂舍利江左之有僧刹自㑹始葛仙翁句容人姓諸葛名元嘗從吳主至溧州遇大風百官舟俱沈翁獨立水上衣履不濕晉許邁句容人少恬静不慕仕進學升遐之術於鮑靚常服氣一氣千餘息登巖茹芝渺爾自得獨與王羲之友善羲之述其靈異之迹甚多後更名元莫測所終吉友西域沙門晉元帝永昌中至東土常行頭陀行卒於梅岡詔于塚邊立寺號髙座道人竺法汰止瓦官寺講放光般若經帝臨幸公卿畢至南北朝宋求那跋摩中印度人元嘉中居金陵祗園寺文帝嘗問曰朕嘗願持齋不殺生命對曰帝王所修與凡庶不同出一嘉言則士庶咸悦布一善政則神人以和刑不夭命役不勞力則暘雨時若百穀滋繁以此持齋齋亦大矣以此不殺利亦多矣安在輟半日之餐全一禽之命然後為𢎞濟耶帝撫几稱善梁寶誌金陵東陽民朱氏婦上已日聞兒啼鷹巢中舉以為子七嵗依鍾山僧儉出家專修禪院梁武帝嘗詔張僧繇寫其像誌以指剺面門分披出十二相或慈或威僧繇竟不能寫葬鍾山獨龍岡初祖達摩南天竺國香至王第三子梁普通七年至南海武帝遣賫詔迎至金陵後折蘆渡江止嵩山少林寺陳天台智者華容陳氏子謁慧思禪師悟法華三昧陳宣帝大建七年抵建康詔居光宅寺後憩廬山桓闓執役陶𢎞景十年不懈有白鶴集庭乘鶴沖舉唐張果老六合園叟也後擕妻至王屋天壇山仙去法融延陵韋氏子入牛頭山幽棲寺石室修道入頓宗為牛頭第一世祖慧忠牛頭宗第六世終身一衲一鐺嘗有供僧穀二廩虎為之守移居莊嚴寺學衆雲集南唐女冠耿先生玉貌鳥爪常著碧霞帔因宋齊邱進嘗見宫婢持糞埽謂元宗曰此物勿棄置鐺中烹鍊良久成白金冬天令宫人握雪成錠投火中亦成白金指痕猶在又能煼麥粒成珠以縑囊貯白龍腦懸之滴液香味逾于大食國所進龍腦油遂得幸於元帝有娠將産之夕雷雨震電及霽娠已失矣乆之宫中忽失其所在或云猶見之江淮間明周顛仙冷謙張三丰三人髙帝時先後至金陵其事蹟屢有靈異世俗所喜道不具書焦姑家中和橋南有仙術永樂初封妙惠仙姑道成雲州人𢎞洞宗於靈巖洪武中命住天界寺宗泐臨海周氏子元末隠徑山洪武元年應召主天界寺碧峯乾州石氏子聞法要於如海真公游憩峨嵋趺坐樹下溪水暴溢七日水退趺坐如故髙帝召至京師設普濟㑹永慈蜀余氏子至牛首領衆三載傳東明和尚衣法洪恩字雪浪金陵黄氏子出家長干寺以無師智得大辯才盡掃訓詁單題本文拈示言外之㫖南北法席之盛近代未有大􅋈龍舒沙氏子崇禎時於天界寺髙提祖印廣度羣品古心溧水人從素菴于金陵棲霞寺得法時三懐師重修報恩塔頂不能上夢神云待波離尊者至次早師至三拜而頂即上本咸蜀人重興金陵東山翼善寺緇素皈心蘇州府周赤鬚子酆人秦穆公時主魚吏每言灾異悉驗後往吳中不知所之抱樸子云以其鬚髮皆赤故名漢魏伯陽吳人好學不仕入山煉丹相傳以為得仙作參同契五行相類等書蔡經吳人家胥門王方平既得道欲東入栝蒼過吳憩經家以其骨相當仙授以要言經得尸解去至今蔡仙鄉有丹竈晉支遁字道林居吳支硎南峯院好鶴又好名馬今放鶴澗馬跡石皆遁遺跡竺道生嘗遊長安從什公受業後居虎邱人無識者乃聚石為徒坐而説法石皆㸃頭今虎邱有㸃頭石南北朝宋陸修静字元徳吳人學仙棲廬山白雲寺與陶潛慧逺結白蓮社嘗握手過虎溪大笑而别世傳三笑圖宋文帝召見之不得元徽中偃月而化梁蜆子和尚京兆人天監中住洞庭山沿江採掇螺蜆以充腹静禪師往勘之捉其衣曰如何是西來意答曰神前酒臺盤静曰不虚與我同根生􅤇􅤇尊者天監中往虎邱泉隨湧出名􅤇􅤇泉唐周隠遙字息元西洞庭道士自言角里孫學煉形術死戒弟子䕶其屍凡死而復生者三至八十餘猶似少壯貞觀中召至問道對曰所習皆匹夫事功不及物非萬乘所宜問也放歸文暢吳人與韓愈栁宗元善愈為作送行序明覺顯號雪竇居莫釐演法有龍出井而聴時集千僧有天衣願汲水供衆示寂後白蓮湧出今有天衣禪院龍潛井皆其遺跡宋遇賢東禪寺僧姓林氏嗜酒人呼為林酒仙能前知言人禍福悉騐郡有虎賢騎出城害遂息明祝允明書其所詠詩刻石寺中今尚存文瑩吳僧多聞博識著湘山野録惠詮吳詩僧語清絶嘗書西湖寺壁云落日寒蟬鳴獨歸林下寺柴扉應未掩片月隨行履惟聞犬吠聲又入青蘿去蘇軾愛而和之道元住永安禪院祥符中嘗進纂傳燈録三十卷詔學士楊億等刪定刻板宣布申元道師事徐神翁得修煉術將出遊師示曰逢虞則止無雪則開渡江至虞山即築菴居之山苦無水一日大雪菴前覆簣不積浚之得泉因名雪井元了通栖智林寺嗜酒一日通州狼山寺火衆見烈焰中有僧噀酒滅之自稱了通和尚其火燼皆帶酒氣明日衆渡江詣謝了通力辭無之未幾沐浴而逝宗衍字道原吳人至正初住石湖楞伽寺善為詩一時名士多與遊所著碧山堂集危素序而傳之明時蔚號萬峯年十一誦法華有省後得法於千岩洪武間詔徴使至示寂已七日席應真常熟人奉母至孝學老氏善易兼通兵法僧道衍師之盡得其傳萬金字西白吳郡人姚氏子依寶積院宗衍為弟子後住瑞光寺洪武初起住持大天界寺召入禁廷奏對稱㫖兩建法㑹於鍾山命總持齋事大駕臨幸六年冬示寂宋濓謂寂照之子孫各主名山大暢宗㫖萬金亦其一也良琦字完璞吳郡人自幼讀書性操温雅學禪白雲山中後住天平山之龍門楊維貞云良琦既究禪理兼通儒學能詩特其餘技耳胡道安吳江人性狂戇人呼胡風子為元妙觀道士遇異人授五雷法洪武末吳中旱延之禱雨登壇怒罵隂雲四合雷雨大作道衍字斯道長洲人相城姚氏子出家妙智菴從髙啓輩為詩在北郭十子之列所著有逃虚子集洪武間以髙僧召命侍燕邸靖難時贊助袐密太宗即位授資善大夫太子少師復姚姓賜名廣孝輔太子南京命蓄髮再三終不肯賜兩宫人亦不近永樂六年朝北京居慶夀寺病篤車駕臨視明日端坐而逝僧夏八十四追封榮國公謚恭靖張皮雀長洲人師胡道安盡得其術禱雨驅祟立應常束雙髽手持皮雀日引羣兒為戲故名福懋字大林竹堂寺僧少有戒行畫學倪瓉書宗智永嘗遊文徴明之門聲名籍甚詩有𢎞秀集風致法藏號三峯嗣法天童初住鄧尉繼主開元度僧百餘受戒萬衆得法者十二弟子具徳繼起最著通門字牧雲嗣法天童後住破山能詩文善書有懶齋集明河字汰如通州人耽詞翰窮内外典後住中峯二十餘年手不停披口不撤講所著有楞伽解真可字達觀又號紫柏尊者吳江沈氏子薙髮虎丘寺後入都賜紫伽黎妖書事起逮下詔獄曰世事如此乆住何為索浴説偈堅坐而逝國朝𢎞儲字繼起通州李氏子也受法於三峯稱為臨濟荷擔真子徧歴諸刹順治辛丑始居靈巖吳偉業輩多皈依門下徐枋謂其與聖賢道合注念君親自來善知識中無有也正志姓熊名開元湖廣嘉魚人前明進士官給事中以建言廷杖鼎革後披薙隠匡廬南嶽間自號蘖菴後遇𢎞儲從至靈巖受印記居華山有蘖菴語録十二卷時有趙庾吳江人前明進士官知縣明亡後披薙為僧參𢎞儲為其髙座道源字石林婁江許氏子住虞山嘗注李商隠詩朱鶴齡作箋多採其説施道淵字亮生吳縣人年十七禮龍虎山學五雷法後築室吳山修煉復住持穹窿凡興建名勝一百七十餘所塑像八千二百有竒復修蘇之元妙觀臺殿樓閣傑立雄峙所費鉅萬分文無私蓄康熙丙辰入都設醮大著靈異還山卒大涵字㕍黄吳江潘氏子九嵗為僧長參靈巖𢎞儲從遊南嶽歸愛台歙山水之勝遂卓錫焉在黄山躬耕聞嶺半伐木聲忽有悟口占一絶語透宗㫖自是作詩有名後主海寧安國寺席復出遊羅浮歸至肇慶示微疾説偈而逝松江府唐王可交華亭人業耕釣三月三日掉舟入江忽見中流有綵舫載道士呼可交上舫與二栗食之甘如飴命黄衣送上岸覔所乘舟不見乃在天台瀑布寺前問寺僧今何時答言九月九日矣自是絶榖往四明山德誠嘗乘小舟往來松江朱涇人以船子和尚呼之夾山善㑹禪師至華亭參船子大契宗㫖辭行回顧再四誠竪橈曰汝將謂别有處耶覆船入水而逝宋徳聰姓仰氏太平興國中結廬佘山之東峯二虎為衛名大青小青有禪者造之見掛佛經梁間問嘗讀否答曰如人看家書既知之矣何再讀為天禧元年趺坐而逝閲月貌如生慧辯字訥翁華亭傅氏子生有異父母令入普照寺出家得法於天竺明智乆之遂領寺事熙寧中蘇軾作杭倅與辯為方外交及示寂作詩哭之惟正字煥然華亭黄氏子五嵗見佛書能識其字長入杭之北山跨黄犢出入内翰葉清臣牧金陵迎往優禮之作偈辭去皇祐元年四月佛誕日忽語衆曰夫動以對静吾一動六十有四年今静矣語既而瞑智儼居上海静安寺見漁人捕鰕買一斗噉之及索錢儼徐云還汝鰕隨吐活鰕盈斗人皆駭異號鰕子和尚將示寂斂蒲草為萬餘繩懸諸廊廡曰吾將大作縁事繼即坐脱人競施以錢懸繩皆滿遂以建佛閣明顛姓薛氏猖狂若顛衣不蔽體或遺之衣則轉施人大雪中亦然不學能詩倭奴見之羅拜云曽在海中失風得此僧幸免於死可觀字宜翁華亭戚氏子祝髮邑之寶雲寺紹興間主當湖徳藏徑山大慧來訪對語終日嘆曰教海老龍也元浄真字如菴華亭沈氏子童齓授以法華歴耳成誦出家受具博究諸乘參訪尊宿盡得宗㫖因嗣法席已遷華亭超果寺至順辛未舉為上天竺座主賜號佛心𢎞辯明彭宏大號素雲生元時得棲神鍊氣之㫖洪武中至細林山結茒居之一日沐浴更衣趺坐問左右何時曰正中遂翛然而逝太祖來召知已羽化啓其竁視之正身不倚長爪遶身徳然號惟菴華亭張氏子生具異相七嵗誦法華經於杭之天龍寺參洪石屋洪屬以緣在吳松為書松隠二字遂歸郡南結菴以居題曰松隠洪武初以髙行僧薦尋還松隠有船居詩學士宋濓為序紹宗字一原上海陳氏子戒行精嚴緇素嚮化洪武中應召奏對稱㫖賜金縷僧伽黎等服自右講經遷右善世朱蒲包上海沈氏僕十八為寶山募兵遇異人授藥一丸服之遂不覺寒暑飢渇身衣破衲冒以蒲包人呼蒲包仙行必挾四竿夜宿植竹四隅而卧其中市人釀酒敗挾竹攪甕輒變為甘生平不談禍福或無意吐一語必竒中張癡六華亭人行六以不修繩檢人呼為癡六日遊行市中夜或僵卧橋上雖大雨不濡霜晨雪夕氣蒸蒸起也黄面碧眼齒平如礪常蓬首不盥櫛與人言多不可解然卒有竒驗常州府南北朝王八百隠横山修道嵗乆白日飛昇人為立登仙觀後改為沖虚南唐徐鍇有碑記其事唐毛萇不知何許人游宜興張公洞自洞底東至太湖中洞庭山得石穴而出萇言在洞中東行聞頂上有風波聲及舟人語今山上有毛公洞湛然姓戚氏宜興人初往越州晚歸天台山傳天台教天寶大歴間累詔徴不起一日説法隠几而化吳越時追謚圓通尊者宋歸真大中間棄官學道隠横山茹芝絶粒三十年朝夕諷誦蛇兔馴伏劉混康少遇異人授以呪術治疾輒驗宣和中賜號静一先生棲真于宜興華陽道院建炎二年于邑西門外插蘆于地枯蘆成葦遂創建㑹真菴元永寧號一源俗姓朱初棲毘陵焦子山精修禪定後復至淮西印正于無用禪師忽有省悟至治癸亥至宜興龍池山建禹門禪院居焉有白虎馴伏于前故又名伏虎巖明正傳號幻有溧陽呂氏子得法笑巖禪師棲五臺山静修十三年後住宜興龍池説法為臨濟正傳宗風大振圓悟號密雲宜興蔣氏子侍正傳于龍池付受衣拂後凡六坐道塲于金粟天童最乆大闡宗㫖緇素欽仰崇禎中詔賜紫衣修南京報恩寺命為住持以老疾辭任𥅆年宜興人溧陽太清觀道士崇禎甲申之變𥅆年備法衣加衰詣縣治舉哀禮成遍别所知言分當死設三日醮入玉華山端坐而逝國朝覺譽號天隠宜興閔氏子也年二十四薙染與圓悟同師正傳因閲楞嚴頓成觸悟先開堂磬山禪院後住武康報恩寺宗風之振亞于圓悟順治中示寂有塑像在磬山通琇字玉林江隂楊氏子年十九薙染乆侍覺譽嗣其法席凡六坐道塲七㑹説法順治中嘗再召至禁廷禮遇優渥賜號大覺普濟能仁國師鎮江府晉沈建丹陽人學却老法嘗遊行寄奴侍驢羊於主人各與藥一粒語主人曰不須飲食也去後主人飲食之皆不受三年還又各與藥飲食如故後不知所在唐羅㬋丹陽人生無雙目而能鑒物於太和中鑄鐘咸通中建塔雖屢經兵火不燬人多異之裴頭陀相國裴休子也生而胎素頴異不羣休作文送其出家行頭陀行來潤之金山北巖有蟒頭陀入洞禪觀蟒遂去後莫知所之魏隆字道真居京口之仁静觀修正一法卒葬馬跡山踰數月人有遇之者啓其棺一鶴飛入雲中獨冠劍存焉殷七七擅異術周寶鎮浙西時鶴林寺有杜鵑花寶謂七七曰鶴林之花天下竒絶嘗聞能開頃刻花可副重九宴㑹乎七七曰諾及九日果爛漫如春遊賞既罷花忽不見惟良丹徒人劉禹錫送惟良上人詩序有曰唐繼天徳有外臣一行刋歴考元書成化去繼是丹徒惟良生而能之以乾坤之䇿當十期之數凝神運指數起於復之初九音生於黄鐘之宫積微本與元化合李端盧綸俱有送惟良南歸詩見潤州類集宋張紹英丹陽人自為道士不入城府仁宗思接方外之論屢召俱稱疾不起賜號明真先生勅所居菴為天聖觀一日沐浴更衣扃戸而化湯志道丹陽人讀書負竒氣髽髻跣足坐大茅頂三十年淳祐五年秋大旱召赴闕禱雨賜號靈寶先生臨化説偈有云笑入寥天一乃一笑辭世翟志頴字叔同丹陽人年十三入華陽洞之西便門遇道士指石壁題名謂曰汝姓名在宗師之列因顧石壁失其人後果傳印劍號觀妙先生智覺本丹陽人少誦法華初為縣衙校多折官錢買放生命罪當死引赴西曹顔色不變乃貸命為剃髮受具持頭陀行號永明夀禪師集諸經論為書一百卷名宗鏡錄曇穎住金山號達觀嘉祐四年除夕命侍者持書别刁景純學士曰明旦當行不及相見景純復書將及岸穎欣然命撾鼓升座叙出世本末長謝衆僧上方丈跏趺而化了元饒之浮梁人號佛印住金山與蘇軾善嘗贈軾衲裙軾酬以玉帶李伯時為元寫照元曰必作笑狀一日聴客語有㑹心軒渠一笑而化克勤嗣五祖演號佛果初與演語演皆不應因忿然去演曰待爾熱病時方思我克勤至金山有寒疾困極追繹演言復歸五祖尋於言下有省建炎初住金山賜號圓悟大師時堂上僧一十八人皆大徹因名大徹堂云元優曇丹陽蔣氏子住丹陽妙果寺至大初詔罷蓮宗優曇著蓮宗寶鑑十卷上書仁宗乞復其教允之仍命為教主賜號虎溪尊者掲傒斯銘其塔明常欽字惟心金壇王氏子生不食肉頴異過人為僧住儀徴天寧寺洪武初住甘露聴法者千餘人一日忽斂經衲諸物遺其徒書偈而逝慧旵字東明丹陽王氏子永樂間入錢塘古道山住持為開山第一祖淮安府宋孫賣魚不知其名賣魚楚州市極暑中遇一道士語曰汝魚餒矣能飲我可使魚活遂飲以斗酒因與談論自是言人禍福輒應宣和中召至京師賜號塵隠處士復還楚靖康初忽於亳州太清宫號咷大哭人莫之喻有記其時日者乃汴京陷之日也後不知所在婁守堅漣水人修佛行人以道者目之生有異相掌中有一目中指七節為承天寺僧佯狂不事誦習能逆知禍福召入禁中仁宗初生晝夜號哭不止僧摩其頂曰莫叫莫叫何似當初莫笑啼遂止郡有白龍潭于澳河僧恐乆而蕩溺居民以錫挑之曰逢柴而止龍去東南四十里至柴溝潭而居焉水丘秀才本州人自郡庠歸遇一異人忽有所悟張商英招致之而莫知其夜所宿處密伺之見於紫極宫倚壁酣睡一日徧辭里巷卒於儀徴後有州兵見於蜀始知其尸解云揚州府漢朱璜廣陵人遇睢山道士阮邱曰卿除腹中三尸可授真人之業與藥七合授黄庭經隨邱入浮陽山後八十年復見白髮轉黑至武帝末猶存南北朝梁王冶泰州人隠天目修靈寶法煉丹存神歴宋齊梁百餘年白日飛昇唐王逺知揚州人少事陶𢎞景傳其術為道士陳後主召見辨論超詣隋煬帝執弟子禮見之唐武徳中見秦王曰方為太平天子願自愛貞觀九年詔潤州即茅山為觀俾居之卒年一百二十六嵗子紹業李珏廣陵人販米為業每斗求利二文資父母養有糴者輒授以升斗自量丞相李玨節制淮南夢入洞府見石壁金書姓名有李玨字心竊喜傍有二仙童云此非君乃江都部民耳卒年百有餘嵗劉白雲江都人好濟人遇道士樂子長與書兩卷能役致風雨變化萬物乘馬走水上如履平地乾符中猶賣藥長安市宋顔筆仙髙郵人建炎初鬻筆遇仙凡得其筆者剖視管中必有詩紀其破毁嵗月及人姓名禍福皆驗年九十二積葦自焚人見其乘火雲飛昇去徐守信泰州人白日上昇有丹井遺蹟在徐州蕭縣宋寧宗封虚静沖和先生戒禪師住揚州石塔與蘇軾有問答機縁明文銘正徳間祝髮泰州東寺每入定能言未來事年六十六預告湼槃日至期吐三昧火焚化行修泰州人陳姓壯年出家操苦行見人與物輒拜一日入寺謂住僧曰我某日當寂至期坐龕中擊魚念佛須臾輕烟一縷起鼻端兩耳火出自爇徐州府周琴髙居香城泗水中善鼓琴行彭涓之術浮游梁碭間二百餘年後入碭水娶龍子乘赤鯉出入漢張陵字輔漢豐人七嵗通道徳經舉賢良方正不就入蜀得九鼎丹經通變化驅除之術受上真秘籙桓帝永夀元年與妻雍氏白日昇舉晉彭宗彭城人嘗從師採藥忽墮深谷蹈羣蛇曾無懼色師乃授丹經五千文宗寶而修之洞暢幽漠能三晝夜為一息或一年不動人以為死及起顔色愈鮮好王元甫學道於赤城霍山服青精石飯得吞日精丹景之法内見五臟穆帝永和年白日昇舉為中嶽真人宋曹國舅紹聖四年蟬蜕於縣東南五十里玉虚觀更名騰雲寺元洞真子涿州人姓邱年壯學道游鄒嶧山師丹陽真人道侶號為洞真子來游碭山遇趙志堅建聚仙宫為本宫提㸃延祐乙卯人見其西去弟子志堅闢戸視之羽化矣明劉淵然蕭人遇異人授以祕書呼召風雲劾治鬼物太祖建西山道院居之昭帝賜以御書號曰長春真人後趺坐而化朝廷遣官致祭翰林胡儼為作傳李旺沛人少過城隍廟見衲子坐神像下與旺語合遂得異術嘗遊金陵過逆旅求宿主人不納旺即趺坐門外㑹夜大雪主人以為不耐寒死矣早啓門視之旺所坐處三尺内無片雪始異而留之旺竟謝去後死翌日有人見之豐縣某處殆尸解云太倉州宋如茂號柏巖住嘉定南翔寺徳祐中示寂前三日貽書邑令朱象祖與訣如期坐逝作偈云鉄船到岸苦海波息快哉時兮風清月白歐法師嘉定人紹興中有雲遊道士授以符訣自此醮祀伏壇屢著神應莫起炎字月鼎苕溪人生宋寶慶間精五雷法酒醉輒佯狂詬詈呼役雷霆至元中宋濓為碑文楊維貞為立傳乆居嘉定正統間猶在後莫知所終元柏子庭能詩浪迹雲遊乞食嘉定村落語雜諧調一日偶觸某官騶從縛至知為子庭命賦所張盖應聲云百骨攢來一線收葫蘆金頂盖諸侯一朝撑出馬前去真個有天無日頭某官笑而釋之太倉丐者延祐初道服操瓢往來水軍寨及張涇馬頭飲醉輒呼牛來又於寨門上連書火字人皆詈而抶之是冬海賊牛大眼劫太倉水軍寨張涇馬頭俱火灾始知丐者非常人明覺曇住崇明慈濟寺言未來事竒驗或卧榻中有見其行於市者人皆稱覺菩薩坐化月餘面色如生國朝吕毖字貞九嘉定人也築樓居妙髙峰得辟穀法已遊終南樓居為僧所占歸不與校别構方丈於小桃源兼修隠形煉虚之道康熙甲辰先期築石穴至期捻訣坐化海州漢王逺字方平東海人舉孝亷歴官中散大夫後棄官入山修道桓帝時連徴不出令郡國逼載至京閉口不語題四百餘字於門皆方來事削去復見還鄉居太守陳耽家四十餘年一日忽語曰吾期運當去為具棺衾斂之一日忽失其尸衣冠不動若蟬蜕云晉鮑靚字太元東海人學兼内外明天文河洛書為南海太守嘗煮白石以食見仙人隂君授以道訣年百餘嵗宋莎衣道人朐山人姓何避亂渡江舉進士不中紹興末至平江身衣白襴乆之衣益敝緝以莎臨池見影豁然大悟言休咎竒中有瘵者求醫命持一草去旬日愈求而不得者不起逺近異之孝宗連召不至賜號通神先生進公不知何代人築菴朐山麓夜則行於市抵暮則隨五犬陟山巔而返囊置果餅沿路飼之因嵗旱語人曰我能致雨人戲請之果獲大雨而犬不復見山巔有潭當時謂犬即潭之五龍云江南通志卷一百七十四欽定四庫全書
