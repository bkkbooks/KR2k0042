body:
  text: 江南通志卷六十三河渠志水利治績一江蘇二府江寧府前詳各府州水利此詳治績故重列府州分見焉三國吳赤烏中使校尉陳勳發兵三萬鑿句容中道至雲陽西城號破岡瀆築青山湖立盤石為疏閉之節南北朝宋明帝時使沈瑀築赤山塘陳髙祖時修復破岡瀆唐麟德中令楊延嘉因梁故堤修復赤山塘大厯十三年令王聽修復赤山塘周百里立二斗門以節旱潦明成化中知溧水縣熊達疏百丈溝為灌溉之利𢎞治初知溧水縣楊榮開濬百丈溝八百丈中存九壩民賴其利正德三年知髙淳縣李岫築三壩因名李壩嘉靖三十年知江浦縣侯國治築孤塘堤隆慶三年知髙淳縣築鄧壩自石家嘴至花溪長二十餘里萬厯七年髙淳縣居民戴瑞築均豐壩十六年髙淳縣築橫埂以捍湖水二十五年知髙淳縣丁日近重濬天生橋河道二十九年知句容縣茅一桂咨訪水利議得髙鄉以地之凸凹為水之盈涸相地置閘謹啓閉時蓄泄灌溉之利不勞餘力低鄉自秦淮河以西麻培橋以東相距數里若濬為一河自可直達仍東西置閘防其壅涸從中經紀其陂池鱗次其塍隴不失前代築堤建二斗門之意上諸臺不報四十三年南京工部尚書丁賔題准開濬秦淮河道顧起元曰江寧自秦淮通舟外惟運瀆與青溪古城濠可容舴艋然青溪自淮清橋入至四象橋而阻運瀆自斗門橋入西至鐵窗櫺東亦至四象橋而阻以河身原狹又居民侵占者多易湮塞也頃工部開濬青溪運瀆其意甚善然僅城中利搬運耳若郊外諸湖湮塞既多秦淮源逺而受水復衆溯秦淮之發源一自黃堰壩而東上抵句容之南門一自方山東南上抵溧水其諸水相灌注一支繞方山東面上抵彭城山一支自張山上溯金陵鎮過馬家橋抵橫山一支西抵後乾橋一支西抵陳墟橋一支自上方門外小河東厯髙橋門抵滄波門郭內一支自澗子橋南上至天界寺此皆可以行舟而為田地侵蝕遂多狹窄且易淤墊伏秋水漲處處梗咽蓋溧水溧陽句曲諸水惟一秦淮為之尾閭夏秋江潮盛大上壅下泛無支流分泄所以近年江寧時苦水而各鄉尤甚正坐此耳若當事者肯議挑濬或令傍河有田者計其畝數幫出工值委兩縣官分程督濬功成之後不但支流分派水無泛濫之憂而往來搬運舟航所至省財力無限關係國計民食者非輕此亟宜講求者東南利便書云建康古城向北秦淮既逺其漕運必資舟楫而濠塹必須水灌注故孫權時引秦淮名運瀆以入倉城今斗門橋以北一帶河至鐵窗櫺者是開潮漕以通江水今北門橋至珍珠河一帶是又開瀆以引後湖此其大略也自楊溥夾淮立城今自通濟門起西至石城門皆是其城之東塹皆通淮水今通濟門外至南門一帶是其西南邊江以為險然春積雨淮水泛溢城中皆被其害及盛冬水涸河流乾淺在今日正與宋無異宋隆興二年張孝祥知府事奏秦淮流經府治正河自鎮淮今南門橋新橋入江其分派為青溪今洞神宮後一段經四象橋一帶是自天津橋今內橋出柵塞門今鐵窗櫺入江宋時水西旱西二門外未有土也石城下即臨江柵寨門近地屬有力者因築斷青溪水口創為花圃每久雨水暴至則正河不能急泄水勢於是泛濫城內居民被害今古潮溝青溪運瀆河身皆為居民日久侵占湮塞不通故水患正與此類於今欲復通寨門使青溪徑直入江則城內永無水患及汪徹繼孝祥知府詔徹指定以聞徹言開西園古河道通柵寨門尤便從之戚氏志云秦淮水源甚逺小川流入者甚衆又古來貯水湖衍後世築為墟田甚多每夏雨暴至江潮復湧水即泛濫皆經流城內一河入江自源及委所過不計幾橋凡過一橋皆為水石所堰束扼及居民築土侵狹河道故水失其常橫流弗順是以必資柵寨門河及長干橋下河今南門外大橋分泄其勢其關國賦民食者非輕通便舟楫特是小事自前如孝祥所言止謂城內被水然多不過數曰即退其害亦輕觀鄉村墟田始見其害蓋上元江寧溧水多墟田每遇水至則舉村合社日夜併力守墟狼狽淤泥中如遇大冦幸而雨不連降風不湧浪可以茍全其或壞決則水注墟中平陸良田頃刻變為江湖哭聲滿野拏舟結筏走避他處國賦民食兩皆失之是皆水不安流之故耳國朝雍正十一年江浦縣浚朱家山河道并建閘二座蘇州府夏禹貢三江既入震澤底定史記禹抑洪水於吳通渠三江五湖周元王元年越大夫范蠡開漕湖亦名蠡湖赧王五十二年楚春申君黃歇城故吳墟其城內北瀆四縱五橫南北朝梁大通二年詔遣使交州刺史王奕漕大瀆唐貞元八年蘇州刺史于頔繕完隄防疏鑿畎澮列樹以表道決水以溉田元和二年觀察使韓臯刺史李素開常熟塘自齊門北抵常熟長九十里因名元和塘後訛稱雲和附劉允文記略吳之藪曰具區郡之大惟蘇州商為貨居農實邦本錫貢多品厥田下下土宜在民地利乎水常熟塘按圖經云南北之路自城而遙百有餘里旁引湖水下通江潮支連派分近委遐輸左右惟强家大族疇接壤制動涉千頃年登萬箱豈伊沿泝之功實出灌溉之利故名常熟歲無眚焉貞元年來大旱填淤薦為塗泥而淪胥怨咨殖物痡矣郡守隴西李素聞於本道廉使吏部尚書韓公秉文請事疏鑿於是參井邑之役則乃經費工力而長洲三之一焉縣宰李暵復善供命計工量日候隙庀徒為利涉之宜蔽反壤之害詢蓄泄之勢增逺近之防人不告勞事為永逸先期而望表繩直不日而終朝子來塘開地中工畢泉出山澤作氣江湖發源積為長流實自新浙舟楫鱗集農商景從春秋有施水旱斯備都人士以允文在公之宇備詳其事請刻於石五年蘇州刺史王仲舒隄淞江為路時吳江境南北西俱水鄉抵郡無陸路故隄路以達之太和中疏常熟縣鹽鐵塘天祐元年吳越王命都水庸田司督撩淺夫疏導諸河宋至道二年知蘇州陳省華議築崑山塘天禧二年江淮發運副使張綸督知蘇州孫冕疏五湖及諸港浦導太湖水入海復嵗租六十萬斛乾興元年詔蘇湖秀三州疏導壅淤命發運使發鄰郡兵助工天聖元年蘇州水壞太湖外塘又海旁支渠湮塞八月詔轉運使徐奭江淮發運使趙賀董其事自市涇以北赤門以南築石隄九十里起橋十有八濬積潦自吳江東赴海復良田數千頃景祐二年范仲淹守鄉郡親至江滸督濬白茆福山黃泗許奚三丈浦而茜涇下張七鴉次之利及數州復奏言江南墟田蓄泄有備錢氏偏安民間米石錢五十文今米石不下一貫其故可揆臣請每秋降敕轉運使俾轄下吏民各陳農業利病選官討論擇其簡易者畀轉運司著為令初除州縣吏輒頒一冊屬之此養民之本富國之術也慶厯二年蘇州通判李禹卿隄太湖至和二年崑山主簿丘與權等作崑山塘為橋梁五十二名至和塘附丘與權記略吳城東闉距崑山縣七十里俗謂之崑山塘北納陽城湖南吐松江由隄防不立故風波馳突廢民田以瀦魚鱉其民病賦日從逋徙姦人緣之通鹽賈自利劫行旅吏莫能禁自唐至今三百餘年欲有營作而弗克也有宋皇祐中發運使許公建言蘇田膏腴常苦水患乞置官司以畎泄之請令舒州通判殿中丞王安石先相示焉朝廷從之王君至訊其鄉人盡得其利害度長繩短順其故道施之圖繪疏入請議如許公朝廷未之行也至和初今太守呂公下車問民疾苦蓋有意於疏導矣明年與權為崑山主簿始陳五利一曰便舟楫二曰闢田疇三曰復租賦四曰止盜賊五曰禁姦商令錢君復言之太守喜其謀之協從得請於監司粵十月甲午治役先設外防以遏上流立橫埭以限之乃自下流浚而決焉畚鍤所至皆於平陸旬有九日而成深五尺廣六十尺用民力一十五萬六千工費民財若干貫米四千六百八十石為橋梁五十二蒔榆栁五萬七千八百其二河植菱蒲芙渠稱是計其入以為修完料民之餘治小虞自嚴村至於鰻鯏瀼治新洋江自朱􅅹至於清港治山塘自山南至於東浚渚涇六十四浦四十四塘六於是陽城諸河若瀼皆導而及江田無汙瀦民不病涉是役也自城東走二十里曰任浦崑山治其東長洲治其西以俗名非便更曰至和識年號也熙寧三年崑山人郟亶上言吳中水利六失六得具書與圖及治田利害七事有㫖令亶與兩浙運使及本路提舉司相度開治附郟亶上水利書略天下之利莫大於水田水田之美無過於蘇州然蘇州五縣雖號水田其實崑山之東接於海之岡隴其地東髙而西下常熟之北接於江之漲沙其地北髙而南下是二處皆謂之髙田而崑山岡身之西抵於常州之境常熟之南抵於湖秀之境其地低下皆謂之水田髙田常苦旱水田常苦潦但水田多而髙田少水田近於城郭人所見而稅復重髙田逺於城郭人所不見而稅復輕此議者所以但知治水而不知治旱也今先取所謂髙田者設堰瀦水以灌溉之浚其經界溝洫使水周流以浸潤之立岡門以防其壅然後取凡所謂水田者一切罷去其某家涇濱之類循古遺跡或五里七里而為一縱浦又七里或十里而為一橫塘因塘浦之土以為隄岸使塘浦闊深而隄岸髙厚雖大水不能入於民田然後擇江之曲者決之則塘浦之水自髙於江而江之水亦髙於海不須決泄水自湍流吳淞江南北岸水田約一百二十餘里南岸大浦二十七條北岸大浦二十八條淞江北橫塘二條以上塘浦五十七條並當松江之上流皆是闊其塘浦髙其隄岸以固田也久不修治遂至隳壞議者不知此塘浦原有大岸固田乃謂古人浚此大浦只欲泄水此不知治田之本也今當浚治其浦修成隄岸以禦水災不須逺治他處塘浦求決積水而田自成矣又治田利害七事略一論古人治低田髙田之法二論後世廢低田髙田之法三論自來議者只知決水不知治田四論今來以治田為先決水為後五論乞循古人遺跡治田六論若先往兩浙相度則議論難合七論先詣司農寺陳白則利害易明大槩以為環湖地低故常多水沿海地髙故常多旱蓋古人治水之跡縱則有浦橫則有塘又門堰涇􅅹布列其間總二百六十有餘今欲略循古人遺法七里為一縱浦十里為一橫塘又因出土以為隄度用二千萬工水治髙田旱治下澤要以三年而蘇之田畢治矣郟僑再上水利書略浙西昔有營田司自唐至錢氏時有隄防堰閘之制旁分其支脈之流不使溢聚以為畎畝之患是以錢氏百年間嵗多豐稔惟長興中一遭水耳暨納土後至今其患始劇蓋由端拱中轉運使喬維嶽不究隄岸堰閘之制與溝洫畎澮之利惟務便於轉漕舟楫一切毁之初則故道猶存尚可尋繹今則去古既久莫知其利營田之局又以為閒冗而罷廢隄防之法疏決之理無以考據乾興天禧間朝廷專遣使者興修水利逺方之人不識三吳地勢髙下與夫水源來厯及前營田之利皆失舊聞受命而來恥於空還不過採愚農道路之言以目前之見為長久之䇿指常熟崑山枕流之地為可導諸港而決之江開福山茜涇等十餘浦殊不知古人建立隄堰所以防太湖泛溢淹沒腹內良田今若就東北諸港決水入江是導湖水經由腹內之田瀰漫盈溢然後入海所以浩渺之勢常逆行而瀦於蘇之長洲常熟崑山常之宜興武進湖之烏程歸安秀之華亭嘉禾民田悉已被害然後方及北江東海之港浦又以水勢方出於港溝復為潮水抑回皆聚於太湖四郡之境積水瀰漫常不可治此足以驗開東北諸浦為謬論矣昔禹治水於吳通三江以泄一湖之水今二江已絶惟吳淞一江存焉疏泄之道既隘於昔又為權豪侵占種植菰蒲蘆葦又於吳江之南築石塘以障太湖東流之勢又於江中多置罾籪致吳江不能吞來源之浩瀚日淤月澱下流淺狹一旦積兩諸山之水併溢太湖蘇湖常秀之間陂淹浦港悉皆瀰漫四郡之民惴然有為魚之患雖有中髙不易之地種已成實頃刻蕩盡嘗按吳淞江故道深廣可敵十浦向之積潦尚或壅滯議者但以開數十浦為策而不知臨江濱海地勢髙仰徒為無益臣今究治水之利必先於江寧治九陽江銀林江等五堰體勢故跡決於西江潤州治丹陽練湖相視大綱尋究函管水道決於北海常州治宜興滆湖沙子淹及江隂港浦入北海以望亭堰分屬蘇州絶常州輕廢之患如此則西北之水不入太湖為害矣又於蘇州闢吳江之南石塘多置橋梁以決太湖會於青龍華亭而入海仍開濬吳淞江其他江湖風濤為害之處並築石塘及淤彭堰與諸湖漾等處尋究昔日涇港自南經北以漸築為岸隄所在陂淹築為水堰秀州治華亭海鹽港浦仍體究柘湖澱山湖等處凡有民田髙壤障遏水勢不可疏決者並與開通達諸港浦杭州遷長河堰以宣歙杭睦等山源決於浙江如此則東南之水不入太湖為害矣此所謂旁分其支脈之流不為腹內畎畝之患者此也往年治水之說大約有二一則導青龍江開三十浦一則使植利户浚涇濱作墟岸是二者各得其一偏今治水若止於導江開浦則必無近效若止浚涇作垾則難以禦暴流要當合二者之說相為首尾乃盡其善但施行先後自有次第耳為今之䇿莫若先究上源水勢而築吳淞江兩岸塘堤不惟水不北入於蘇而南亦不入於秀兩州之田乃可墾治今之言治水者不知根源始謂欲去水患須開吳淞江殊不知開吳淞江而不築兩岸隄塘則所導上源之水輻輳而來適為兩州之患蓋江水溢入南北溝浦而不能徑趨於海故也倘效漢唐以來隄塘之法修築吳淞江岸則去水之患已十九矣六年檢正中書刑房工事沈括言浙西江浦當浚從之乃命括相度浙西水利元祐六年詔導蘇州諸河元符三年詔蘇湖秀三州開治浦港溝瀆修壘隄岸置斗門水堰崇寧元年置提舉淮浙澳閘司於蘇州濬楊林河福山塘政和元年詔蘇湖秀三州治水圍田工費三年知常熟縣李光濬山塘小山港宣和四年十二月知崑山縣吳昉濬至和塘紹興二十四年大理丞周環開常熟福山港白茆塘二十八年兩浙轉運副使趙子潚知平江府蔣燦計料開江明年正月興工從常熟東柵至雉浦入丁涇開福山塘自丁涇至尚墅橋北注大江分殺水勢二月工畢知平江府陳正同禁圍裹湖田附趙子潚治水利方略浙西諸州平江最為低下而湖常等州水皆歸於太湖自太湖以導於淞江自淞江以注於海是太湖者數州之水所瀦而淞江又太湖之所泄也然以數州瀦水巨浸而獨泄於一淞江宜其勢有所不逮是以昔人於常熟之北開二十四浦疏而導之揚子江又於崑山之東開一十二浦分而納諸海兩邑大浦凡三十有六而民間私下涇港又不可勝數皆所以決壅滯而防泛溢也後因潮汐往來泥沙積淤舊置開江之卒尋亦廢去此太湖所以湮塞而民田有漂沒之憂也天禧天聖間運使張綸於常熟崑山各開諸浦以導積水景祐間郡守范仲淹親至海浦開浚五河以疏導諸邑之水使東南入於淞江東北入於揚子江與海今相視合開緊切去處常熟縣梅李塘白茆塘崔浦福山浦黃泗浦崑山縣新洋江小虞浦顧浦郭澤塘總計役夫三百三十七萬四千六百工錢三十三萬七十四百貫米一十萬一千五百石有竒崑山四浦工力不多止用本縣食利户開浚常熟五浦工力浩瀚係與吳長等縣利害相及欲於三縣雇人充當緣平江積水今經兩月未退已妨種麥若不於農隙之際支給錢米雇夫開治恐來嵗春雨積水愈甚虧失常賦不便望指揮施行隆興二年八月詔江浙勢家圍田湮塞流水諸州守臣按視以聞其平江府委陳彌作相度彌作乃上言宜先治者十浦并合開圍田一十三處詔令守臣沈度依狀開決附陳彌作水利議略常熟之浦二十有四皆北入於江崑山之浦十有二皆東入於海蓋以太湖居其上流昔人患淞江之不能勝受而使衆水徑得其歸者也諸澤之興始於天禧成於景祐逮政和間稍已湮廢嘗命趙霖浚之僅能復常熟崑山二三浦而罷竊考周官有稻人掌稼下地之法所以瀦水則今之塘湖是也所以瀉水則今之渚浦是也今諸邑之間曰湖曰瀼以纍百數而沿江濱海小川故道往往淤滯不特所謂三十六浦而已瀦之過多而瀉之過少重以今年淫雨泛濫橫溢非常年比識者皆知開浦之利不但今日特以工費甚廣不敢輕易倡議今若併舉大役切慮歉嵗民無餘力官無羡儲反至勞攘輒擇其宜先治者凡十浦而其緩急又半之興工之日仍乞以緩急為先後乾道元年沈度陳彌作又言疏濬崑山常熟縣白茆等十浦通徹入海詔從之知平江府沈介依次開濬五年增置撩湖軍兵淳熙元年知府韓彥古與許浦駐劄戚世明開濬許浦二年兩浙轉運副使姜詵奏開常熟縣黃泗浦崔浦許浦白茆浦濬通波塘置張涇堰閘水軍都統馮湛知平江府陳峴濬治諸涇塘浦六年發運使魏峻疏至和塘東自夾潮塘西至戴墟浦亘四十餘里又立柵三十二以為禁防官出錢二萬三千二百緡米二百一十石有竒嘉定元年知常熟葉凱濬水洋子涇十年知府趙彥橚疏錦帆涇以達運河兼備農田旱潦淳祐三年知常熟縣張從龍開支塘長四千尋廣一丈深倍之用夫六千工寶祐四年知常熟縣王文雍濬城河開福山塘咸淳元年命知平江府沈度開決許浦自梅李塘雉浦口東開至白蕩橋白茆浦自黃沙港開至支塘橋崔浦自丁涇塘開至浦口黃泗浦自十家港開至奚浦口茜涇浦自界涇開至鴨頭塘下張浦自東海㳌開至千步涇七鴉浦自梅浦開至李漕涇川沙浦自梅㳌開至六鶴浦楊林浦自楊林橋開至陶家港掘浦自海口開至五聖港元至元二十四年宣慰朱清諭上户開浚婁江三十年詔平江松江等路府修治湖泖河港大德二年立都水監庸田使司於平江路專一修築田圍疏河道至治三年詔開吳淞江澱山湖及諸河渠天厯二年吳江知州孫伯恭大修石塘至正七年吳江州達嚕噶齊諾海大修石塘壘石厚砌髙一丈廣四丈四尺長一千八十丈為環洞一百三十有六立石亭於南浦亭之南表之曰至正石塘建丁亥菴為居守置常稔田嗣修葺二十年平江路通判郜肅大修崑山州田圍三十四年張士誠遣呂珍督濬芝塘山涇口塹其為港長亘九十里明洪武七年常熟縣開奚浦九年開至和塘堰壩二十八年鑿太平河永樂元年蘇松水患命工部尚書夏原吉偕通政趙居任大理寺少卿袁復給事中姚善鑿吳淞江浦疏崑山下界浦掣吳淞江水北達婁江又挑嘉定西顧浦南引吳淞江水北貫吳塘亦由婁江入海又濬常熟白茆塘福山塘耿涇導昆承陽城諸湖水入揚子江濬上海范家濱接黃浦引湖泖水入海附夏原吉治水奏浙西諸郡蘇松最居下流太湖綿亘數百里受納杭湖宣歙溪澗之水散注澱山等湖以入三泖頃為浦港湮塞漲溢為害拯治之法要在浚滌吳淞諸浦導其壅滯以入海按吳淞江袤二百餘里廣一百五十餘丈西接太湖東通海前代常疏之然當潮汐之衝旋疏旋塞自吳江長橋抵下界浦一百二十餘里水流雖通實多窄淺從浦抵上海南倉浦口一百三十餘里潮汐淤壅已成平陸灔沙浮泥難以施工臣等相視嘉定之劉家港常熟之白茆港皆係大川水流遲急宜浚吳淞南北兩岸安亭等浦引太湖諸水入劉家白茆二港直注江海又松江大黃浦乃通吳淞要道今下流壅遏難疏旁有范家濱至南倉浦口可徑達海宜浚令深闊上接大黃浦以達湖泖之水此即禹貢三江入海之跡每嵗水涸時修築圍岸以禦暴流則事功可成於民為便二年户部尚書夏原吉導婁江濬千墩浦至和塘四年濬常熟福山塘三十六里十三年崑山縣重濬太平河宣德七年蘇州知府况鍾言治水詔周忱與鍾治之九年常熟縣知縣郭南濬鹽鐵塘正統二年郭南濬七浦塘七年吳中大水秋七月颶風巡撫周忱奏請量留官糧府一二十萬石縣五六萬石賑濟并增修低墟岸塍濬金山衛獨樹營劉家港白茆塘沿海各河十年常熟縣濬七浦塘景泰五年夏大水淹浸田禾經久不退侍郎李敏知府汪滸議當開浚白茆等塘以泄之滸躬往常熟相視時久不疏濬壅成隄堰近民耄倪皆泣臥其上以求免言一開浚則堰下之田亦就浸矣滸不許挑濬青墩浦橫瀝塘共五六里以通白茆塘鑿開三堰納三四里引水通鮎魚口其海淤塞漫生叢葦仍挑去約千餘畝於是水得歸海天順三年巡撫崔恭檄蘇州知府姚堂松江通判洪景德等濬吳淞江蘇州自夏界口過白鶴江至卞家渡莊家涇松江自大盈浦東至吳淞江巡司自新涇至蒲匯塘入江又自曹家溝平地鑿至新場又自華涇塘六磊塘鶯脰湖烏泥涇入浦又濬湖州塘附錢溥松江水利記書云三江既入震澤底定然水至吾松則又分二道而入海蓋西北窪下則自太湖入澱山湖吳淞江入海東北髙仰則受杭湖之水達黃浦以入海髙下既殊旱淫交病然旱為東北受病其患小水則西北列郡無所歸泄其患大吳淞江自勝國末湮塞逮今逾百年興言修浚非無其人然或沮於浮議或怵於巨費回銷嵗月卒莫能舉稍遇淫雨即成一壑國賦虧而民艱食矣天順二年都憲崔公奉勑巡撫東南首詢水患以淞為尤甚乃舉府判洪侯景德暨二縣尹楊昕李紋治之侯等相視以為江之故道雖浚必合莫若從新地鑿之方易為而功不壞起自大盈浦東至吳淞江巡司計二萬二千丈又自新涇西南至蒲匯入江計四千丈闊皆一十四丈深皆二丈而低鄉之潦可泄東北則自曹家河平地鑿及新場計三萬餘丈深闊皆與江同又新華涇塘六磊塘鶯脰湖烏泥涇入浦而髙鄉之旱亦免大小連絡無不通貫噫亦勤矣哉用工總三萬五千餘沿江耆老相與鼓舞而言曰兹江之湮為吾民病久矣曩時字人者雖廉得利害而訖無成功寧知物有通否必待其人耶是役也程工而授計口而食民雖勞而不怨則國本垂永之計孰愈於此哉溥松人也且職史事故請書之成化五年吳縣知縣樊瑾准本地民呈請起民夫重濬九曲港共三千八百五十餘丈八年吳縣知縣雍泰奉檄築西華石塘雍見採香涇廢堰旁糧田數千頃遇旱禾槁泰領民尋源得於穹窿山隴阪間蓋由山腰法雨泉流出者上為一堰下阪分二道一道東由白馬嶺南流踰趙墓折而西一道西下山漊環趙墓復迄而東二流相合近採香涇瀦聚成潭仍躬相地宜甃築二道石堰堰各置一閘隨水旱啓閉復市山石由馬跡山西南而東築隄千丈未百日告成湖田藉以種穫十年巡撫畢亨與蘇州知府邱霽開吳淞江自夏界口至西莊家港崑山嘉定二縣分濬十一年築常熟縣趙段墟田圍附黃體勤趙段築墟記略蘇天下大郡常熟又蘇之大縣也地處下游古號澤國趙段一墟又其最下隄創宋元間久而盡圮無復存者湖田悉為巨浸嵗屢不秋逋租者日以就困民空其居以徙有司艱於理成化乙未春民告於縣縣上其狀於巡撫都憲畢公亨巡按御史戴公縉僉為民憂乃調度所征之材以倡其邑而謀於治水僉憲吳公㻞曰受朝廷特命之嚴寄吳越民事之重綱紀振肅繫焉尚可隳怠乎授其機宜於郡判何君唐何君曰專農桑以牧民民瘼未瘳豈善牧者哉遂責成於縣尹蘭君玉君屬父老以諭意衆皆感悟於是財獲於官力借於民抑聚斂也伐石於山運土於陸因地利也量田授役獲利者倍出其工鄰壤者半焉均徭役也較人力多寡以為尋尺驗土築虛實以稽勤惰課章程也隄之袤延亘數里丈一千有竒用木為橛橛之內編以竹甃石為址而髙與土等上廣八尺而下加三之一固基本也隄之形勢逶迤若環帶然其外則種以萑葦茭蘆殺水勢也又懼其塞之難漬之易預為設備垂永久也木以萬計竹倍差於木石以舟計及二千艘錢穀之需纍巨萬有奇工役則五萬三千有奇用雖夥而民不見擾也始工於是嵗二月二十六日乙巳告成於三月二十九日丙子功之成何其速哉於是沮洳之鄉變為禾稼流徙之民相續而還嵗己登而賦無愆期澤之及何其溥耶夫治水必治於下流趙段之水既治則衆流不勞而治治之施又何其知所先務耶宜民樂之不已而形諸歌歌曰隄之未築田混於湖居者以徙賦者以逋隄之既築湖潤於田徙者以還逋者有年噫嘻長隄屹乎天作伊誰之功臺憲民牧田稼芃芃湖水溶溶百千萬祀澤流無窮𢎞治元年帶理水利僉事伍性濬吳淞江中段四十餘里二年蘇州府通判張旻疏鹽鐵塘是年修婁江隄七年徐貫濬吳江縣長橋諸茭蘆之地導太湖水散入澱山陽城昆承等湖開吳淞江並大石趙屯等浦泄澱山湖水由吳淞江以達於海開白茆港並白魚洪鮎魚口等處泄昆承湖水由白茆港以注於江開七浦鹽鐵等塘泄陽城湖水由七丫港以達於海開常州之百瀆泄荆溪之水自西北入於太湖又設導河夫於沿江附徐貫治水奏竊惟東南地勢低下水患自古有之永樂初元水復漲溢太宗文皇帝命户部尚書夏原吉大加疏治方得止息逮今九十餘年各處港浦仍復湮塞為患滋甚仰惟皇上軫念地方命臣等會同修浚蓋將拯墊溺之民於衽席之上化魚鱉之區為稻梁之域臣等敢不罄竭駑鈍以圖仰副聖意用是夙夜不遑寧處相度施工竊見嘉湖常鎮水之上流蘇松水之下流上流不浚無以開其源下流不浚無以導其歸於是督同委官民人等將蘇州府吳江長橋一帶茭蘆之地疏浚深闊導引太湖之水散入澱山陽城昆承等湖又開吳淞江并大石趙屯等浦泄澱山湖水由吳淞江以達於海開白茆港并白魚洪鮎魚口等處泄昆承湖水以注於江又開七浦鹽鐵等塘泄陽城湖水以達於海下流疏通不復壅塞開湖州之婁涇泄天目諸山之水自西南入於太湖開常州之百瀆泄荆溪之水自西北入於太湖又開各斗門以泄運河之水由江隂以入江上流疏通不復湮滯自𢎞治七年十一月十七日興工八年二月十五日工畢幸今天氣晴和人無疫癘凡百衆庶爭先效勞即今水患消弭人無墊溺之憂田有豐稔之望列郡士民莫不慶忭是非臣等之能事皆國家盛德大福廣被東南之所致也今將修築過港瀆畫圖貼說謹具奏聞九年工部主事姚文灝築沙湖隄廣三丈袤三百六十丈是年濬白茆塘福山塘十年姚文灝濬至和塘委蘇州府通判崑山知縣募工開濬東自新洋江口起西至九里橋凡長四千九百六十五丈用人夫九萬六千五百工計工授直用錢一百三十五萬濬七鴉浦籍崑山常熟兩縣近浦之户二萬二千三百人疏自尤涇東至木樨灣凡五千五百九十丈半月成功計工銀五千二百七十兩開白茆海口附楊循吉記略𢎞治四年五年七年本府連遭大水民以匱告工科左給事中葉紳請濬河水入海要道乃以工部左侍郎徐貫與巡撫副都御史何鑑同薰厥功以其年十月有事於白茆是港也在常熟東南輸昆承湖陽城湖而注之海往時水由是行其闊六十丈長亘九十里通潮往來􅻸泄湖泖張士誠設爬沙之夫嵗加疏濬以為常永樂中尚書夏原吉治水時相度地勢於湖水交會之衝慮水獨從七浦入海因作斜堰障之分其流注於白茆欲俾地方各沾其利天順中潮沙日漲港漸狹小其後又有引之獨出七浦而決壞斜堰者於是水遂改道更無流波衝洗潮泥而漲沙日甚一日隱然成隄矣乃以五萬九千人專事其役東起海口西抵支塘凡長六千五百五十五丈相傳開治港面闊五十六丈深一丈七尺而以土積岸之兩旁又崇明出巨艦相聯內向爬去壅沙棄於海中俟其活動仍決壩放水衝之一時因白茆而濬者其上為鮎魚口傳導湖水來脈有新開河龍潭洪白魚洪落星港四支濬之總計六千四百丈凡用萬七千六百人而尤涇長九里鹽鐵塘長十八里皆通白茆凡用萬四千九百人其他不因白茆而别治者七浦與吳江水口而已七浦長四十里徑通海時有湮塞凡用萬七千人吳江水口在長橋外橋長二里有七十二洞其外匯為大沼廣千畝太湖之咽喉也久為蘆荻所礙已成淤澱凡用萬六千人三閲月皆以成告蓋以鮎魚口為白茆上流斜堰為七浦上流而長橋為諸水上流其在蘇州一府施工如此議者猶以為當時大役莫如白茆所恨輟事太急未獲成效已而岸果頽圮復為潮沙凝積塞而不通於是常熟縣知縣楊子器以為港身迂曲水不能泄致使橫沙攔接海口施工為難又看得湖漕上接芝塘其長不過三十里徑自入海况又河形現存雖則淺狹水亦通流因請於水利郎中傅潮乞濬之議方行子器被召入而郎中臧鱗來管水事首理故牘鋭意修舉乃檄通判陳暐署縣事同知何宗理視狀皆言本漕視白茆誠為徑直但緣兩旁各居民廬墓必須拆卸方可即工然理實應開而工程浩大計當用夫三萬鱗因其利便以奏詔行巡撫都御史彭禮巡按御史馮允中會勘應否定奪於時知府林世逺以十六年四月親詣本處相勘得前項港漕俱自芝塘分流但港曲漕直以此微有逺近然漕形闊不過三丈深不過數尺設以此擬開闊十丈兩畔田地各占三丈五尺濬深八尺所起之土占壓田地尤難預計况有民廬墳冢在上關係事重不如仍開白茆為便惟海口壅沙則有馬草洪五里許濬此可為曲避之計及將本港迤西一帶至白魚洪等處但遇乾淺俱各挑深水行勢達壅塞自除十一年提督水利工部郎中傅潮濬常熟許浦梅李二塘從知縣楊子器議委縣丞趙祥董役三閲月訖工濬至和塘並立崑山等縣斗門十二年傅潮重督長洲縣興築沙湖隄附吳寬記略郡城東二十里曰沙湖凡太倉崑山嘉定崇明之人之所必經者其廣袤各數十里橫絶道上其北多腴田其中多舟楫旁有盜藪以行劫為業客舟為風波所阻集於岸下多不能免昔人欲築隄以捍水者久矣皆謂土石所施無所附麗其功難成遂置之𢎞治丙辰工部主事姚君文灝奉勑來督水利始白於巡撫右副都御史朱公瑄謂隄可築公往視之亦曰可築且曰是宜用卷掃法蓋吾治河決時所已試者也謀既協姚君乃專任其事先是公從工部侍郎徐公貫濬常熟江口獲葦利之占於民者充公用及是遂賴其濟一時夫卒盡力財用畢具功埀成而君移疾去矣今郎中傅君潮來代周行田野水利大興他日行至沙湖歎曰是隄之功其可已乎至是巡撫左副都御史彭公禮復勸相之而隄競以完告其闊為丈三長為丈三百六十隱然如城堅壯可久安流成渠人皆稱便蓋耕者無浸淫之苦則安於田畝行者無覆溺之憂則樂於道路賈者無掠奪之恐則保其貨利是役也前守為史侯簡今為曹侯鳳皆經畫其事者若通判陳暐知縣劉珂酈璠主簿喻秉則勞績並著皆可書者於是傅君使來請文刻石豫郡人也喜水患之能去且知君才操與姚君並美無忝於上命也遂為之記正德十六年巡撫李充嗣分督工部郎中林文沛發民夫起常熟縣東倉至雙廟濬白茆故道一萬三千八百二十丈又親至支塘詢士民開出水口議論不一充嗣與蘇州知府徐讚擬循故河疏治常熟縣主簿余浪獨主鑿新河不敢發言適巡按御史馬録來㑹議浪於道中陳白録具告充嗣相度形勢以簿議為是意遂決鑿新河三千五百五十丈又濬尚湖昆承陽城等湖支河一十九道凡四閲月功成農田得稔時林文沛身親督率暴露風日不言勞憊役夫不敢茍且塞責嘉靖元年工部郎中顔如環檄蘇州知府徐讚松江知府孔輔開濬吳淞江自下界口起至龍王廟舊江口止又濬趙屯大盈道褐等浦使上流下委遞相容泄附王鏊吳郡治水碑記今天下財賦多仰東南東南財賦多出吳郡而吳郡於東南地最下最多水患南方夏秋間最苦多雨蘇湖渺然輒成巨浸故官多逋負民多流殍於是廷臣爭言水利而以吳淞江白茆港為首請設官專治時巡撫應天西蜀李公充嗣方著若績詔委之進工部尚書得便宜從事復以工部都水郎中林君文沛顏君如環佐之公博訪羣採相度源委謂東南諸水咸匯太湖由三江入海而東江久失故道不可以復尋獨婁江尚在吳淞江雖在而多涸其别出一支從常熟白茆港入海最大且駛而海沙淤塞久成平陸民且廬墓其上自成化以來每議開之輒畏其難而止夫太湖吞納衆流猶人之腹白茆吳淞則尾閭也陽城昆承澱泖諸湖猶脈絡也尾閭不泄腹且漲為病四肢百脈悉病矣公乃駐節湖上且行且度度地量功賦役仞淺深計逺邇力取諸近財取諸逺廬舍有次樵爨有所分授以責成時犒以行賞天時晴和法令明一衆心競勸率未明興作入夜未已河上燈攢如星鍤畚如雨歡呼之聲數里不絶不數月工告成初白苑自北達於江河形結屈不可復通乃改就東南挑平陸直注諸海自雙廟至東倉通一萬七千三百九十二丈其深一丈五尺闊三十三丈白茆上流又開尚湖昆承陽城湖各隘為塘為洪為港為涇為漊者凡十有九吳淞江上流頗通利自夏駕浦至舊江口不復容舟因其舊形廣之深之凡六千三百三十六丈其深一丈二尺闊十八丈白茆港口海潮日至沙泥易淤則為石閘一陽城湖水至斜堰分流七浦塘則可少殺白茆之流又為堰一淞勢弱不能蕩激易淀且淤又為石閘一蓋疏宜興湖州諸淤水歸太湖無礙則常之宜興武進湖之烏程歸安松之華亭可無水患濬吳淞白茆之淤太湖之水入江海無礙則蘇之長洲常熟崑山可無水患而吳凇白苑之役最大功費尤多始事於正德十六年十月嘉靖元年四月訖工凡為工四十一萬二千五十三銀為兩若千米為石若干費亦大矣保而勿壞則在後之人焉十七年知常熟縣馮汝弼建各港石閘三丈浦連涇渚河向無閘者皆置隆慶元年巡鹽御史蔚元康濬常熟太倉嘉定三州縣境七浦楊林鹽鐵吳塘顧浦青魚涇二年知常熟縣張博建白茆港石閘五年巡按御史劉白睿檄蘇州府通判吳宗吉常熟縣知縣連三元董濬奚浦長四千四百一十丈廣五丈深六丈用夫八萬八千九百五十人官給銀二千二百三十三兩俱支贖鍰萬厯五年巡視下江御史林應訓行委水利按察使馮叔吉檄蘇州府同知王事聖知縣王一言勘濬自龎山湖口至長橋達吳家港六年林應訓行委水利按察使徐節檄同知王事聖常熟縣知縣留震臣勘濬自歸家墳小石橋起至橫塘止長四十五里面闊十二丈底闊八丈深一丈二尺八年常熟縣重濬三丈浦三十二年常熟縣知縣耿橘濬福山塘三十三年吳江縣知縣劉時俊築石塘附周道登吳江縣新築石塘碑記萬厯三十有三􅑤五月朔邑侯劉公新築石塘成塘修九萬九千八百一十四尺為橋十有三為竇三十有七南連檇李北接茂苑並葺舊者為里八十有三其石約二而成丈博一尺有八寸九分其博閷一以為厚四壘其厚以為塘之崇倍其崇以為基和之用灰支之用木每尺而支者三以石之厚為木之圍三倍其圍以為修水遞深而遞加率一木而為五支薪其木末以當庸直計木五萬九千八百八十六三分之加一以為石之數二分其十加一以為石之工佐者居三之一灰三千有四百石鐵灰索綯直二百五十餘凡費二萬七千金有奇役始於癸卯正月十七日主其議而捐俸以倡者曹中丞也邑二尹西蜀李宗程則督視邑人王郡倅忠則劻勷沈方伯季文則協議沈寺丞璟沈僉憲瓚沈孝廉令名與不佞登則出納父老屠大化等十人則宣力凡再閲嵗而效其成於公億兆歡呼得未曾有薦紳先生構亭鶯湖屬不佞記其事夫以塘之積圮嵗嵗修而圮日甚空為縣官費何益公新以巨石為邑永利是大有造於我也且不煩官不强民百計拮据杯酒諷勸而事忽大集我享其利美哉公績可以頌矣三十七年常熟縣知縣楊漣築元和塘濬沙浦馬涇袁張濱三十九年崑山縣知縣祝耀祖築至和塘四十年長洲縣知縣胡士容濬練祈塘馬路塘談家濱四十一年胡士容濬走馬塘四十二年胡士容築至和塘附文震孟長洲縣興築婁江石隄記蘇固澤國也江淮之水由京口厯毗陵皆從蘇以注海震澤匯宣歙霅苕之巨浸宣吐於長崑二縣間有婁江實所由道至和塘最當其衝蕩云自宋轉運使喬維嶽決隄為涇水患滋起以迄於今當事者咸鰓鰓慮焉而苦於任事之難至插棘樹版以殺水勢亦幾無謀矣廣濟胡侯士容自嘉定令移劇長洲日延父老問所疾苦而知婁江之塘不可緩也曰是且病涉病溺病飛挽病農農兹土者至纍嵗不登半菽誰司民牧責可緩諸既又相度土宜而知非石隄無以障水勢曰是金涇陽城諸湖蕩之所震撼也是太湖沙湖之所騰躍而漰湃也是新洋吳淞諸江之所逆駕也是兩龍涇朱涇蕭涇吳涇陸涇諸要害之所泛而旁齧也茍不為永賴謀僅飾目前又豈司牧者之實意歟於是量工經始里計者四十有五丈計者六千七百橋計者二十有六其巨者一十有八金錢計者萬五千有竒顧邑民苦貧府庫竭莫可調發侯又不能如正統中周夏兩尚書奉璽書從事水利復田租徵發屬邑僅摉導河官帑之羡金不滿千悉捐嵗俸與贖鍰所入集好義之衆期月而成自長至崑長隄如帶屹然如山於是行者歌於道鼓抴者歌于河農歌于野侯益盡捐祿俸買田三頃其半以屬耆老為永隄計焉四十三年崑山縣知縣陳祖苞濬至和塘小虞浦橫塘崇禎八年巡撫都御史張國維同巡按御史王一鶚檄吳江縣知縣章日炌勘核石塘全坍應修一千五十五丈半坍二千八十六丈平望西諸家鋪水缺應築內外塘七百六十丈並修長橋三江橋翁涇橋紳士商民樂助竣工九年張國維疏導吳江縣長橋谼先是縣民虞燧具奏敕部行撫按查核覆題奉旨允行檄下疏濬橋以至九里石塘通行開鑿十年張國維同巡按御史路振飛重修至和塘兵備馮元揚與知府陳洪謐推官署縣事劉鳴謙各捐助有差屬里民馬負圖營辦董成僅四閲月異工十六年崑山縣知縣楊永言開濬夏界河特舉貢生朱集璜董其任集璜分河為四則自龍王廟壩口至郭澤塘為一則自郭澤塘至兵墟為一則自兵墟至葛港為一則自葛港至赤涇口為一則以淤塞淺深為致功難易共開河身四千九百八十二丈調夫分區之主客主區六十畝出一夫客區一百十畝出一夫用夫十二萬一千九百七十四貼役主區每畝錢三十文客區一十六文計得錢每工給八十文又官給錢六十文每工受錢百有四十工始於是年十一月畢於次年四月國朝順治九年工科給事中胡之駿請濬吳淞以泄陳澱之水濬劉河以泄巴陽之水奉旨准行十一年恩諭東南財賦重地素稱沃壤連年水旱為災民生重困皆因失修水利致誤農功該督撫責成地方官悉心講求疏通水利以時蓄泄水旱無虞民安樂利康熙十年巡撫馬祐奏請開濬吳淞江白茆河恩准留蘇松常三府漕折銀九萬兩浙省杭嘉湖三府漕折銀五萬兩充疏濬河工經費督同布政司慕天顔檄蘇州府水利同知于階及太倉吳江崑山嘉定各州縣官開劉家河淤道二十九里建閘三座開吳淞江東至新涇口四千三百五十二丈自新涇口迤西至赤雁浦黃渡七千五百丈修復舊址閘壩附馬祐請浚劉河吳淞江疏臣看得蘇屬劉河松屬吳淞江乃走泄太湖之咽喉也修則六府同其利塞則六府同其害厯代以來凡遇淤滯俱遣大臣駐劄吳中專修水利動支正項錢糧撥充疏濬經費臣稽考成書明嘉隆年間吳淞道淤湖水四溢淹沒田廬民生困苦時有巡撫海瑞條奏疏治因役大費繁請留漕米二十萬石又動江浙六府無礙官銀俱充工費令各處被災飢民上工就食修復水利兼行賑濟水災寧息事功告成刋載典章班班可考迄今已及百年潮泥日積故道全淤凡官斯土者憚於工程浩大財費無資視為末務因循不舉去嵗夏月霪雨連旬湖水泛溢禾苗盡淹民居胥溺積水三月不消農工廢業人户流亡總因劉河吳淞入海之口淤塞湧聚無從走泄故也臣念疏國課民生關係重大悉心講求博采輿論並以浚二河為今日第一急務檄藩司委官丈勘劉河淤道二十九里長五千二百二十丈計用人夫三十九萬八十四百十二工連閘二座每座工費千金以備水旱蓄泄約共需銀四萬兩吳淞江東至新涇口皆成平陸應浚四千三百五十一丈自新涇口迤至赤雁口黃渡應浚七千五百餘丈修復舊址壩閘約共需十萬兩臣再四思維當此水災之後村落飢民逃荒乞食臣與屬官勉力捐俸煮粥不過茍延旦夕萬難僉派民夫舉此大工若欲徒責地方各官設處捐助亦終成畫餅勢不得不皇上俯請用正項以濟目前急務仰懇將康熙九年蘇松常念江浙六郡為國家財賦重地三府漕折銀九萬兩浙省杭嘉湖三府漕折銀五萬兩留充疏濬河工經費俾各處災荒饑民就近上工趨食是修復水利中兼行救饑之事誠一舉兩利倘䝉皇上軫恤災傷動支正項地方幸甚民生幸甚又報浚完工疏臣查劉河自鹽鐵口起至航船港以達海口該五千一百八十丈河面闊十一文底濶六丈六尺深一丈積土四萬四千九百餘方勘原舊河身有尚存一線及淺窪處扣除不用挑工土方外實該挑土三萬三千九百四十方每方用夫十四工雇募民夫四十七萬五千一百六十九工築大壩副壩一十條支港水口築小壩一十四條於康熙十年二月二十六日起工至十一年五六月內陸續完工吳淞江自黃浦東口起至新涇口施家港止計該一萬四百九十一丈挑河面闊一十五丈底闊七丈五尺深一丈五尺積土一十七萬七千餘方內有原舊江形及低窪之處扣除不用挑工土方外實挑土一十三萬一千四百三十九方每方用夫一十四工雇募民夫一百八十四萬一百五十七工內築大小壩一十六條又支港水口築小壩十一條於康熙十年十二月初八日起工至十一年四月二十六日完工又查劉河原議建閘三座約費工料銀三千兩臣又同司道各官覆勘情形若於一處分造三閘恐閘單薄不能堅久故於天妃宮地方總造大閘一座分别三洞泄水雖工費稍加實可一勞永逸吳淞江於黃浦口建大閘一座臣又思兩江閘座與內閘地不同恐閘門被潮往來衝擊未能堅久故各於旁四角修築以圖永逺查劉河閘座已於康熙十一年三月內完工吳淞閘座已於康熙十二年正月內完工劉河各項工料共實用銀三萬一千六百八十二兩八錢七分零吳淞江各項工料共實用銀一十一萬一千一百七十九兩一錢二分零此係臣經駁減核實應銷之數復取各官印草結在案今據該司造冊呈詳前來除册分送户工二部查核外相應題報聽部核銷二十年巡撫慕天顔奏請濬常熟縣白茆港武進孟河奉旨准行開白茆自支塘至海口四十三里濬河七千八百五十六丈廣十丈深一丈五尺用民夫九十九萬四千工建閘一座費公帑四萬兩附慕天顔疏河救荒議竊惟三吳治水之功厯稽往績惟使太湖之水導入江海而潮汐亦可上通以時蓄泄則旱潦無虞自三江湮塞震澤泛濫以田為壑而蘇松常湖杭嘉六郡受患日深上年水患瀰漫四野數百里間不苐禾盡無收抑且室廬漂沒流離疾苦不忍繪圖仰荷憲臺軫念民生首飭議浚劉河以通水利憲檄諄諄謂吳淞江出海之處已成平陸修復工繁未可輕議惟有專力劉河為今日第一急著此憲臺為吳浙百萬生民造無疆之福也本司遵行蘇松二府詳加確勘兹據蘇府詳議估計工程請動正賦開工等因又據松江府上海縣詳開吳淞江故道酌請江浙六郡正帑協濟大工各繪圖形申覆憲臺在案本司載考舊志披閲新圖按湖水之奔趨而東也一自澱山泖湖從華亭之南折而東北入海者為黃浦一自吳江長橋厯長洲崑山青浦嘉定界至上海合黃浦以入海者為吳淞江一自吳縣鮎魚口北入運河經郡城婁門注流上下雉瀆抵崑山至和塘東合新洋江由太倉歸劉家港入海者為婁江即今劉河也逮吳淞入海之處沙壅菱叢昔夏忠靖公引黃渡以西之水北入劉河是今日劉河之一線為淞婁二江之尾閭合蘇松諸郡之民命攸關者矣浚之烏可一日緩哉但在蘇則望劉河之深廣而崑太嘉為尤切在松則必圖吳淞之成渠而上青諸邑為尤近兩府所議各就其切己者而言未可為全局之通論也本司規畫再三採訪輿論目前救時之策在急疏劉河將來逺大之謀吳淞亦在所必浚蓋吳淞實太湖泄水之中條其故道較劉河更闊其地勢較劉河更直江浙六郡同其利議協於浙可冀旦夕成功焉但今民窮財盡更際凶災兩工決難並舉劉河處其易吳淞處其難莫若緩吳淞而先事劉河之為便本司細詢紳民父老劉河之功固自不小而吳淞亦有不得不次第並浚者當日導淞水併入劉河者有崑山之夏駕嘉定之顧浦以及鹽鐵新洋諸港浦淞與婁相通今則諸港浦盡塞淞自為淞婁自為婁則劉河雖開止泄震澤半面之流而匯納於泖澱以奔湧淞江者仍未得宣通也若再開蒲匯新涇重浚虬江顧浦費力於支河小港何如併力於吳淞乎况從來以工役救荒使貧民食力以糊口如范文正公守郡時吳中大饑發粟募民諸工畢舉以是公私仰給民不遷流昔人於凶嵗之後無不共循此意蓋小民至困苦中工力必賤且飢寒迫身民多思盜河工興而樂趨畚鍤盜賊亦可潛消荒政之施莫此為大然必須咨商浙省督撫早為區畫將全局會疏題明共計兩河工費先開劉河至冬間水涸之時旋興吳淞大工本司管窺如是今所急惟在錢糧災荒之後杼軸既空不得不請銷正賦但朝廷方在蠲災詘餉之時又何敢言動帑惟念興水利而後有農功有農功而後裕國計若惜一時之費不作久逺之圖將來海口淀沙日淤一日必至水災洊告蠲賑迭施今合兩工所需約計十四萬金較之一嵗所蠲未及其半而田工無患國賦常充可埀千百年之大利一勞永逸功在斯時考海忠介開吳淞之疏留漕十萬石佐以協濟稻穀贓罰等不兩月而功成倣其遺謨敢請憲臺俯賜㑹題於蘇松常康熙九年折漕銀內留四萬兩以應劉河夫工康熙十年折漕銀內再留五萬兩浙省錢糧協濟五萬兩以應吳淞夫工仍比歸仁堤事例兩省續開援納捐助請於河工告成之後補此漕折正項錢糧方行停止即於是月一面擇吉施工謹先就劉河工程縷析條議并三江全圖繪呈憲覽吳淞工費亦可照例核確此皆憲臺為萬年國脈百世民生起見用敢敷陳伏乞採擇又請浚孟河白茆河疏江南賦稅甲於天下蘇松常鎮課額尤冠於江南凡國用所出盡藉農田倘水旱失宜必致災祲疊告此廣渠資溉之功所以斷不可緩也今夏霪雨連綿河流四溢田地在在沉淹廬舍更多漂沒臣疢心疾首力督司道府州縣等官多方設法宣泄分頭挽救而附近劉淞之太倉嘉定吳江婁上等州縣俱藉兩江出瀉旋溢旋消雖告被水幸不重团華亭並未告災崑青災亦無幾長洲無錫去兩江稍逺東南之水不能驟消西北諸流奔江無路田禾淹沒甚多宜興首當髙溧諸山下流亦賴震澤轉泄雖東南一面稍沾劉淞導引之益然較長崑等處更逺西北全無出水之路故受災倍於他邑若夫常熟武進江隂金壇等縣既與劉淞絶隔惟藉大江匯歸其如本地出水要口在在淹塞遂致積雨成壑臣從權救濟將江常二邑沿江一帶通潮小港馬路築埂之處暫行疏導出口隨於洪水泛濫無歸等事案內題報在案此不過救急一時稍平水勢旋即堵塞非久逺之圖也臣前疏請浚白茆港孟瀆河福山港三丈浦黃四港申港包港安港西港七丫等處蓋既鑒上年之竒旱預料今夏之大潦從長籌畫實非泛言雖部議未邀即允然關切地方民事豈容緩圖臣再四籌畫先擇其工易而費簡者若七丫一帶業已勸民濬滌淤沙通崇明之運道福山港三丈浦道縣各官詳據里民自願分段疏通再如黃四申包安西等港另行酌量緩急多方設法次第興舉外惟是常熟之白茆港係蘇常諸水東北出江第一要河自明季失修湮塞成陸旱則潮汐不通潦則宣泄無路若此港一通不惟常熟水旱無虞即崑山長洲太倉無錫江隂無不共沾其利又武進之孟瀆河係常鎮諸水歸江要道凡髙溧西北諸水競趨東南則流注於宜興金壇更轉瀉於丹陽武進惟藉孟河一口出江今亦年久失修河身壅積武進以西丹陽以東宜興金壇以北諸水歸江阻道於是水旱並災人力難施矣此兩河者蓄泄之利等於劉淞淤塞之形亦不亞於劉淞今劉淞疏通蘇松常資其益者甚巨白茆孟河淤塞蘇常鎮被其害者亦復不小此臣身在地方目擊親切日夜籌晝而不敢忽者也是以分委道員細加察勘兹據副使劉鼎參議祖澤深勘估議詳前來查白茆自常熟支塘起迤東以至海口淤道四十三里共長七千八百五十六丈應浚深闊不等總計人夫九十九萬四千工並議修大閘一座與夫築壩戽水等項共需費五萬六千兩孟河自武進奔牛鎮之萬緣橋起至孟河城北出江淤道四十八里共長八千五百三十三丈應浚深淺不等總計人夫八十四萬工並議建大閘一座與築壩戽水幫岸等項共需費四萬八千兩二河共需費十萬四千兩據各該道請照劉淞事例先動正帑濟工不惟水利克修見在望賑飢民得以赴工趁食不設賑而民已全活數善備焉四十八年總督邵穆布巡撫于準奏准開白茆福山二港修白茆舊閘建福山新閘福山開土一萬二千一百五十方白茆開土二萬八千八百方共發帑銀三萬四千九百九十七兩零雍正五年二月初二日奉上諭地方水利關係民生最為緊要如江南戶口繁庶宜更加修濬時其蓄泄以防旱潦向來屢有條奏之人但未經本省督撫奏請朕意亦久欲興修以資農務因海塘工程正在營治且水利事關重大必得實心辦事之人方有裨益即如目今畿輔水利賴有忠誠任事之怡親王始可興此大工不然則亦未敢輕易舉行也我皇考念切民依周知稼穡因康熙四十六年巡省江浙所至必細驗水土燥濕髙下之宜詳考五穀種植之性躬親講求將附近太湖及通江潮之處條分縷晰特頒諭旨令江浙督撫於蘇松常鎮杭嘉湖地方疏濬河港以資灌溉修建閘座以便啓閉皆動用公帑錢糧不使絲毫出於民力恩至渥也乃當時督撫諸臣不能實心仰體惟以虛文奉行糜費帑金二十餘萬大都飽於官吏之侵漁而無實效深可痛恨朕即位以來事事仰繼皇考之貽謨永圖民生之逺計本欲俟直𨽻水利興修之後令怡親王前往江浙地方相度情形商酌興修之舉今巡撫陳時夏特行奏請且稱費用不過十餘萬兩即可成功據陳時夏陳奏應是地方不可遲緩之事副都統李淑德昔任江南松江府同知諳悉水利事宜曾經條奏頗為明晰原任山東巡撫陳世倌年力精壯現在閒居著李淑德陳世倌㑹同陳時夏總河齊蘇勒總督孔育珣悉心踏勘詳加酌議倘齊蘇勒河工緊要不能親身前往即行文知㑹商酌定議具奏凡建立閘座疏濬河流務期盡除淤塞以杜泛溢之虞廣蓄水泉以收膏澤之益其一應工費俱動用庫帑支給一切工程交與李淑德陳世倌監督辦理並諭吏部將現任部屬及候選部屬府州縣人員內有具呈願往效力者挑選十餘人帶往江南不必另出資財惟令辦理事務交李淑德陳世倌二人酌量委用特諭本年四月二十六日欽奉上諭齊蘇勒范時繹陳時夏李淑德陳世倌朕軫念民依以蘇松地勢稍下特遣大臣㑹同督撫開濬水道為久逺之計太湖之水歸海劉河白茆二河為要必徑直深廣令水暢出方能一勞永逸圖志新載二河形勢數十里一徑直趨出海無少曲折因年嵗久逺海口為潮湮塞悉成平陸太倉常熟之紳襟土豪霸占耕種然報科者十無二三私獲重利於己今既開濬疏通務必盡去新漲地畝以復故道方是聞背公懷私害衆利已之徒有不願者串買地棍報具公呈或請别開支河或請另開新道其言紛紛不一陳世倌乃但知潔己而不奉公之人李淑德亦旗下武員識見淺鄙倘以似是之言或惑於聽聞或希圖微利或稍徇情而迂回遷避使積水不能暢出數年後仍漸致壅塞則汝等罪不可逭矣該督撫欽差等當竭力秉公詳勘務為一勞永逸之策倘紳襟惡棍生事阻撓爾等指名題參嚴懲數人則不公不法之刁風自息矣爾等若少將就欺隱茍且塞責了事異日代人領過之時莫怨未明白曉諭也欽此本年原任山東巡撫陳世倌請先挑吳淞白茆孟瀆德勝九曲河俟完工之日各河以次開濬六年户部議覆郎中鄂禮條奏近海諸河並設立犁船混江龍以疏積沙十二年總督趙𢎞恩題請普修江南渠港趙𢎞恩疏皇仁題為江南渠港亟宜普修以全水利以廣事竊照江南水利屢蒙聖諭普加修濬仰見無已如淮揚諸河及通州閘壩現今聖主軫念民依有加興修完備蘇松常鎮之婁江吳淞江白茆徐六涇福山塘東河長橋北河萬頃港互流港孟瀆德勝新河九曲河紫藤塢劉河七浦河等處通江達海大河及海口各閘亦俱蒙皇上命發帑金興修完竣又䝉將松江等府沿海石塘土塘通行建築商農樂利萬世䝉庥惟民田以內一切支港小渠萬派千尋皆承流於大河通聯於潮水旱則引潮以灌田苗潦則歸河以消積水關係並重其利亦漙祇因港渠既多地更深僻工程碎雜費用零星故厯聽民間自為修浚難以一一動帑興修無如小民勤惰不一書役需索冒侵年久竟成道旁築舍潮沙漸積淤塞日甚臣經臨蘇松常鎮一帶留心察勘在在皆然除華亭縣龍泉等九河吳縣穹窿山麓堰閘池塘已經撫臣髙其倬飭行浚築其餘應修小河港渠甚多必須即為逐細疏挖一律深通庶港渠湖河內外暢達旱潦兼資同收巨效博採輿情無不樂於興舉查江省厯來私派貼費陋規每縣盈千纍萬悉飽蠧棍欲壑以蘇松常鎮四府一年而計即共有數十萬金今清釐酌革民力已得寬舒所有此等港渠以及墟壩涵洞似應即從今冬為始勸民循照舊例按田派工業户給食佃户出力逐一興修所開土方運送逺處不得堆積兩岸仍淤河道以無益之陋費為水利之正用明白開導勸督之下百姓諒必踴躍趨事此番大修之後將來嵗修易於為力至此項工程查有水利效力部員程夢瑛謹慎勤勞實心辦事可以總理相度臣亦加意督察其分任更須多員方能細為查勘逐加勸諭隨勘隨修周流督率以期實濟現任州縣各有刑名錢糧諸務各府同知通判州縣佐雜并試用等官亦各有本任事件及别項緊要工程差委且少熟諳河務者更恐濫差書役需索耰纍再四思維惟有倣照河工投效及前署督臣尹繼善辦理海塘將情願效力之人題請赴工之例查明實需工員數目有生長沿河及曽任沿河因公罣誤之員或向隨工員在河料理熟諳河務及熟習風土人員具呈情願效力者考驗確實留工差委如能勤慎任事工竣題明酌量録用倘有怠玩即行參處又蘇松沿河塘路坍塌行旅艱難民田亦少保障或勸民力并修或動公項支應亦須漸次經理行據蘇州布政司白鍾山查案議覆僉同并稱蘇松等屬內有寶山華亭奉賢婁縣金山南匯上海等數縣向例業户按田每畝捐錢五文以為嵗修塘工水利等用各該縣此番大修港渠工程即可於此捐錢項下動用又太倉鎮洋等州縣向例亦有每畝捐錢三文二文不等此次大修并應聽其量為加減凑用募夫挑浚均不必拘業户給食佃户出力之例此外各州縣如有願倣此式按畝捐錢者亦應聽民酌量派定錢文交縣彚給工員募修庶百姓不必人人赴工往返多費而工程又得速竣不致掣肘延誤亦為因地制宜之善舉總以民間物力仍歸民生實用至部員程夢瑛可以總理其事仍令蘇松常鎮二道各於所屬就近協辦稽查工費考察勤惰更為有益沿河塘路俟港渠修浚次第料理等情臣覆核無異除應用工員俟選定具題另造履厯送部題外理合一併具疏題請臣謹㑹江南通志卷六十三
