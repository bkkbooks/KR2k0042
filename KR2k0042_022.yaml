body:
  text: 江南通志卷二十三輿地志公署二鎮淮揚徐四府太海通三州鎮江府鎮海将軍署在府城中左翼副都統署右翼副都統署以上二署俱在府城分守常鎮道署在府治舊寶鈔庫知府署在城内東北明洪武初郡守楊遵即宋元舊址建同知署在府治東通判署在府治西經歴署在府治東知事署照磨署俱在府治西廣盈庫在府堂西架閣庫在府堂東獄在府治譙樓旁炭渚驛丞署在城西五十里京口驛丞署在府城儒學教授署訓導署俱在學宫内中營兼左營副将署在府城内中軍守備署在府城東門外右營遊擊署在府城中軍守備署在府城西門外協標右營中軍守備署城守營叅将署中軍守備署鎮江衞守備署以上罒署俱在府城搜鹽㕔在江口康熙九年建雍正六年浙江總督李衞重修附修建搜鹽㕔碑記田國家惟正之供賦而外則鹽筴所入為最鉅兩浙都轉運當長蘆河東兩淮閩廣之一每嵗銷數百萬引行鹽之地東南瀕大海西際豫章之廣信江南之廣德其北則以京口大江為闗鎻彊界攸分廵查是亟盖必私禁嚴而後正引可以流通裕課恤商本計誠莫重乎此也余總督越中兼攝廵撫節制江南捕務又奉命綰廵鹽使者之篆仰惟方之至意立綱陳紀各有敷施聖天子愛養百姓澄叙官而鹺政所闗首謹私販固已申飭汛防凡山陬水澨實心搜察㒺有漏遺獨深念京口與儀揚僅隔一衣帶水舟船徃来絡繹不絶梟徒貪利冒網夾帶淮鹽潛售於鎮江一郡三縣之間根深蒂固莫可窮詰致使嘉松引鹽每多壅滯不有整頓何以革奸用是具疏題請盤查之責屬在大吏文職則江常鎮道及鎮江海防同知武職則京口将軍鎮標副将及鎮江城守叅將按日分曹更番廵剔又添設廵兵若而人廵船若干隻樓櫓器械必備必堅衆商急公捐増工食兵役用命晝夜稽查自教令風行奸徒亦歛迹不敢渉江生覬覦以故年來嘉松掣鹽較徃時増倍是盤查之有功於鹽政為甚大也先是順治十六年鹽使者題明京口查鹽令海防同知並城守副將在於沿江牐口親身廵綽然或因循茍且徒樹空名於江上耳卽康熙九年所建搜鹽一㕔亦因地無専官事鮮責成近且日就傾圮矣夫搜鹽㕔者所以奉明㫖昭功令金符在上尤貴尊嚴官司坐履其間必有堂皇方肅觀聴且兵役趨走江堤坍塌亦非所宜而或風雨朝昏庇止無地夫何以専守望而勤檢覈余乃發帑金頒㕔式擇京口世商之能事者曰汪徳培俾董其事就其祖父之所創建者而更新之又添建五楹於其後三楹於其旁河岸加以石工沿岸又建小㕔三楹官役上下均安憇息至於柵垣鞏固階級寛平髙牙大旗飜颺白波紅日間與盡棟朱甍相掩映洵足稱江表壮觀矣是役也鳩工於雍正戊申之秋仲閲六月而告成民力不疲商力不擾所以為盤查計者固可歴乆而不敝矣抑余聞之為政之道務在㧞本塞源彼夫積梟巨啣尾販私漕艘官船連檣夾帶是皆骫法之尤搜查在所必及若孤舟行旅所携日用之鹽數本無多不闗鹺例是用分别查禁縱漏苛擾各因輕重而科治焉其庻幾無厲於吾民禆稍禆聖朝鹽莢之計於萬一乎是宜紀歲時志興建以告後之司鹺政者其工緡纎縷別勒碑隂丹徒縣知縣署在府治東南小市街北縣丞署在縣治東主簿署在縣治西典史署在縣治東南庫在縣二堂旁獄在縣儀門東高資鎮廵檢署在城西五十里丹徒鎮廵檢署在鎮東港口安港廵檢署在城東九十里大軍倉在治安坊預備倉在緑水橋西北義儲倉在儒林坊明知縣龎時雍建鎮西倉在西城外上河邊今兌漕處常平倉在西門内白馬坊雍正九年知縣繆逺領帑建育嬰堂在梳兒巷國朝雍正九年知府毛德琦捐建附張九徴初剙育嬰社序京江育嬰之社舉於癸丑夏君爾範首事余與同人襄之彷廣陵呉門兩郡例也每一嬰月給乳母銀三錢同社有認一嬰者有倍認三倍認者有數人共認一嬰者丙辰爾範赴道山而余董事兩載戊午則郡中紳士與新安同志分月輪執定會所於月華山之萬歲樓徵貲騐乳察弊釐奸各有耑司頗稱嚴宻規模既定逺近樂觀不意午末之秋旱相仍人無宿飽遺嬰在道日積月増捐貲所入不足半給葢廣陵所恃鹽闗兩使者及行商大賈呉門則撫軍藩司為政我郡皆無之獨數十寒士呼號将伯奔馳托鉢耳相顧唏嘘莫知為計適道臺石公自楚來臨下車問俗聞之欣然親􅊩㑹所首捐俸為侣而郡守暨兩少府縣尹諸公莫不踴躍分俸共成盛舉羣嬰之生已絶而復續是天心仁愛畀以福星而當事諸公情深保赤古稱召父杜母何以異此不佞敢再邦手敬告同里樂善者夫怵惕惻隐行道所同赤子顛連乍見思救况衆擎易舉寸壤成山省一親朋遊戯之酒資减一兒女帽領之裝飾即可廣種福田普度多命所費薄而所獲厚事理至明奚待智者而後懽喜從事乎但尤有進者善必積而後成德必乆而後大勿始勤而終怠勿偶應而旋忘施三分以至於三錢三兩總曰發心化一人以至於十人百人總名同善樂施遂成仁里善政可革兵刑從此旱澇不作時和年豐且将於此舉見其大端也儒學教諭署在明倫堂西南訓導署在殿廡西南丹陽縣知縣署在縣市西北縣丞署在縣治東主簿署在縣治西典史署在縣治内庫獄俱在縣治内呂城鎮廵檢署在本鎮東包港鎮廵檢署在縣東七十里雲陽驛丞署在南門外便民倉在北門内新橋明廵撫周忱委知縣陳誼縣丞葛良鼎建常平倉在縣署東雍正八年知縣寗承謨領帑建育嬰堂在妙覺寺西康熙四十六年邑人公建儒學教諭署在明倫堂東訓導署在尊經閣旁金壇縣知縣署在城西北隅宋建順治二年知縣胡延年重修縣丞署在縣治東主簿署在便民倉西南典史署在縣􅈦西内庫在縣署堂右獄在縣署儀門西偏湖溪廵檢署在上疁村便民倉在縣署北明知縣劉訓建知縣周楫改建於陽武門外水次知縣趙圭移入城東北隅今仍舊常平倉在縣治雍正八年建普濟堂在東門思慕村邑人莊良玉等建儒學教諭署在明倫堂後正學堂右訓導署二所一在學路東一在日新齋東溧陽縣知縣署在城西北始自唐天復間歴宋明修建不一國朝康熙四年増修縣丞署在庫樓右典史署在縣堂東偏架閣庫儀仗庫俱在縣堂兩旁庫樓在縣署堂右獄在縣儀門西偏水次倉在縣東南義積倉在署南存留倉在西北養濟院在縣治東儒學教諭署在魁星堂右訓導署在養正麗澤二齋後溧陽營都司僉書署在縣城内淮安府總督漕院署在府城内附明吕兆熊題名記明興之創議河運也自唐順之始也其卒開今運河即元㑹通河自濟寧逹之通州南即宋沙河疏䢴溝通江淮逹之濟寕也自尚書宋公禮平江伯陳公瑄始也其遂開府淮揚總兹漕務用支運罷海運也亦自陳公瑄始也其以總憲文臣代之用總漕兼鎮撫也則自王公竑始也其兼提督軍務也則自胡公植始也維宗社之咽喉軍民之命脉實於是焉樞紐故底績俶落除拜氏名畧見國史然多佚而不屬正德四年邵文荘公寳來莅兹土懼其乆而遂湮也始鳩王公竑而下至文莊公凡二十四人爵里鐫之石而自為文以記之併及漕事大都焉自文莊迄今百十餘年所迨熊又六十二人中多入為名公卿熊不敏竊嘗嚮往之然舊石已不勝載自王公紀而後闕焉未書所以更礱貞珉續文莊之舉使後有考焉然余因是而有慨於天下之事難於識難於任也轉漕之利無踰水浮禹貢紀州從來尚矣秦漢及唐歴歴可鏡砥柱三門其覆溺之険鑿輓之勞人徒之費至一舟百日乃能上何啻百倍今之海運間或用車用䭾厥難益鉅當時有斗錢運斗米之苦然不能為他䇿者其都闗之勢然也宋以四河通運地處平曠歲入至七百餘萬石憂不在食漕渠之效亦較可覩矣元之都燕固即今日之京師也雖江南轉漕遼逺然無三門砥柱為之隔絶夷考其當日運道初則渉江入淮逆黄河至中灤站陸輓至淇入御河逹京師不便也又開濟州泗河繇大清入海旋以海口沙壅復從東河陸輓至臨清入御河不便也又開膠萊河道通海勞費乆之訖無成效後始専用海運矣然風濤不測盗賊出沒剽刼覆亡相因而至而京師常苦倉儲不繼何其置今濟寧河道之至易且利者不講而日為海與陸之紛紛也則伯顔張瑄之識所為不逮宋公禮陳公瑄也豈天特留之以成今日一代豐亨豫泰之盛哉恭襄業開此萬世之利矣其儲設安山南旺馬塲昭陽諸湖名為水櫃以時瀦洩東控泰山諸泉南引邵伯高郵寳應諸湖北㑹汶衞白羊陽城洸浮滹沱桑乾諸河以廓委輸雖廞淤時有供億頻繁不無民實旁止岸乃善崩之患天下事無全利循已事軌則導流培岸功易易耳然恭襄當兹世非有文皇之廟㫁毅然為之主持而黄牛纔揮白簡狎至非常之原黎民懼焉安保無一二道路蜚語而遂創百代之未有開萬世之水利耶故余因是役而重有慨於天下事之難於識難於任也其在今日又且無暇論漕之外矣軍饟外廹財力内屈則漕不易為也北二三千里則病旱南二三千里則病水足民足國固自不能左畫方右畫圓則漕而撫又不易為也淮揚綰轂南北最天下要地鎻鑰十萬之衆豈曰虚擁無事則引漕有事則應援今天下非無事也馬窮則逸鄒滕其㣲見者也一旦内訌外侮淮揚其首受之矣則漕而提督軍務尢不易為也此皆余今日事總非識與任不可而余非其人也余滋懼矣何暇言天下事石既成次其説而書之以自警且以俟後之君子總督河院署在山陽清江浦河庫道署在清江浦淮揚道署在山陽縣淮安鈔闗署在板牐地方離城五十里知府署在城中即元舊總管府明洪武元年建附明潘塤重建府堂記斯郡治遷於國初斯堂創於洪武庚戌而大啓於成化戊子燬於正徳庚午凡五閲歲四易守廼克有作盖經始於乙亥春正月吉而以其夏四月落成之於戯斯堂其亦有闗係哉今之守視古諸侯今之郡視古千乘之國則夫堂有臨下之道焉有王化之宣焉有民命之係焉其興與廢殆於人事相流通有不可歸之適然之數者昔鄭國火禆竈請禳子産曰天道逺人道邇非所及也子産當國鄭不復火今火既易守乃發意者天将布新乃除其舊耶是不可以不作矣時大守餘姚華公璉懼烖如焚式用貶損掃地布度茂以莅事既擢去安福劉公祥代之吉水羅公循又代之加以師旅因以饑饉龜卜方殷鳩僝未暇是盖有所待而然歟歲癸酉秋南民部尚書郎魏人薛公􅢫繼守兹土治人如已治官如家兵既少戢歲亦頗有乃諗於衆衆曰斯我公所以臨我治我大庇我者亟成之豈所以厲我耶公曰諾於是庀徒度材三議五請上下既協乃即厥功不日而堂成矣為間者五為楹者三為架者倍其楹之數軒其前以展雄飛扄其後以備燕寝巍然高以示其立也廓然大以示其容也窈然深以示其養而峻然潔以示其守也中之虚示吾公而明外之直示吾簡而易上之宻者心之結下之固者徳之基也丹堊髹漆所以示文廉堦桭闔所以示禮披􅉉露棟一望而知其中之美所以示心也既復經歴司之舊又撤照磨所而新之翼乎其左右者所以示有尊也美哉堂乎君子攸躋刑賞平而民命立矣教養備而王化行矣其無愧於臨下之道哉故不可以不紀山清裏河同知署在府治西海防山安南㟁同知署在山陽縣童家營海防山安同知署在安東縣桃源河務同知署在桃源縣治山清裏河同知署在山陽縣清江浦海贛同知署在山陽縣清江浦山盱通判署在山陽縣周家橋軍捕通判署在府治西安清中河通判署高堰通判署俱在山陽縣清江浦經歴署在府治東照磨署在府治西檢校署在府治西南漕運庫阜積庫俱在府儀門内甬道東龍亭庫在儀門外東架閣庫在