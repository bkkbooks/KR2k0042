body:
  text: 江南通志卷一百二職官志文職四宋南渡統部吳從龍王拱以上建康都統制范成大金陵帥吕頤浩江東安撫制置使趙葵江東西宣撫使沈晦葉煥以上浙西安撫使楊克遜浙西轉運使劉光世浙西安撫大使葉適范文虎以上沿江制置使馬擴李寶以上沿海制置使劉錡江淮浙西制置使孟庾張浚張巖以上潤州都督王德王勝成閔張子蓋畢再遇李奕武彭輅王孝忠以上鎮江都統制趙善湘劉錡李顯忠趙葵以上江淮制置使權邦彥江淮制置發運使何淡江淮制置大使張浚邱崈以上江淮宣撫使葉義問楊存中以上江淮都督陳敏江淮都統制盧知原吳中庸盧儔以上江淮發運使張問湯鵬舉孫航孫敏以上淮南轉運使楊存中淮北宣撫使孟忠厚淮東宣撫使趙葵淮東制置使吳潛淮東總領趙立漣水軍鎮撫使張威揚州觀察使王㬇通泰制置使程叔達孟猷以上江東轉運使姚希得江東安撫使史彌鞏謝枋得以上江東提刑劉寶張說以上安慶軍節度使張德興舒州安撫使張浚延璽胡舜陟史嵩之杜杲吳淵馬光祖王野吕文福夏貴以上淮西安撫使楊存中淮西制置使趙磻老郭振以上淮西帥李顯忠解元以上保信軍節度使李光壽春滁濠宣撫使宋南渡分轄黃潛善吕頤浩連南夫湯東野胡舜陟杜充陳邦光趙䝉張縝李光趙鼎歐陽懋沈晦吕祉葉宗諤張澄章誼孟居厚張守朝謙之鄭鎡俞俟王晌楊願王循友宋貺張燾王綸陳俊卿陳之茂張孝祥吕擢汪徹王佐李植方滋史正志唐琭洪遵梁克家葉衡胡元質劉珙范成大錢良臣章森余端禮鄭僑張枃留正葛邲謝深甫趙彥逾錢象祖吳琚李材楊輔徐誼黃度劉矩李大東李玨俞嶸蔡幼學邱壽邁趙善湘李壽朋吳潛陳韡曾從龍别之傑杜杲董槐趙以夫吳淵王楚邱嶽馬光祖趙與􅊸姚希得吳革黃萬石趙溍以上建康府知府事趙岍孫覿湯東野李昞胡松年李彌大席益李擢向伯厚宋伯友孫佑趙子晝李光張守章誼梁汝嘉仇悆向子諲林安宅歐陽懋趙霈張宗元周葵王鄭滋俞俟王晌周三畏徐琛李朝正湯鵬舉王㑹孟厚蔣璨陳正同朱翌洪遵沈介陳之茂張孝祥陳漢虞允文沈度姚憲徐嚞汪應辰魏把向汮邱崈方滋馬希言韓彥古莫漳陳峴單䕫司馬伋王佐韓彥質耿秉謝師稷何萬王希吕趙彥操袁說友沈揆王尚之雷潨王溉鄭若容劉誠之趙不艱張抑張巖李大性張澤沈作賔林采李大異趙希懌陳芾沈皥趙彥橚綦奎趙汝述王元春章良朋林介李壽朋朱在吳淵鄒應博楊曄趙立夫張嗣古王遂吳潛史宅之趙與􅊸陳塏魏峻徐鹿卿吕淵鄭霖余晦余天任趙與訔趙汝歷馬揚祖洪燾程元鳳王爚朱熠包恢陳均李鏞陳夢斗饒應龍黃萬石趙順孫黃鏞常懋倪普潛說友戴覺民陳謙亨文天祥張世傑以上知平江府何充周把俞俟虞澐王縉陳正同莫伯虛鄭作肅徐天民葉顒莫濟湯鵬舉朝子健沈德逺錢建葉衡章冲張孝賁林祖楊萬里吳瑊陳庸曾三復陳謙黃灝湯璹李嘉言廖正一張貴謨王聞禮趙善防李玨趙善湘胡衛趙崇謨王定史彌悆趙必願趙戒悈鄭必萬程有俊謝逹何守信董槐䧒采宋慈李迪王圭陳均孫子秀汪立信陳塤家鉉翁史能之王宗洙趙汝鑒姚訔以上知常州軍州事王棠徐蕆樓鍔施邁戴溪趙彥適李誠之顔耆仲史雋之以上知江隂軍趙子嵩錢伯言陳邦光胡唐老胡世將李謨沈與求劉寧止曾開劉岑程邁郭仲劉子羽鮑琚汪藻蔣璨鄭滋榮凝曾惇黃穆厚張匯王循友張修蔣及祖林大聲董蘋揚揆鄭作肅趙公稱方滋朱夏卿李植吕擢陳天麟蔡洸宋貺黃鈞張津沈夏吕正己司馬伋曾逮潘緯錢良臣耿秉蓋經張杓張子顔葉翥趙彥逾馬大同陳居仁楊大法萬鍾趙善俊張叔椿李沐黃內張孝伯沈作賔辛棄疾李大巽宇文紹節錢廷玉趙師睪俞烈傅伯成宇文紹彭史彌堅邱壽雋葛洪李大東程覃豐有俊喬行簡嶽珂趙善湘倪思楊紹雲馮多福趙范韓大倫何處久吳淵桂如琥劉卿月丁曄邱嶽何壽元許堪徐瑑王野胡穎趙汝捍李迪徐晦徐㮚陳夢斗印應飛趙與訔焦煥趙日起麋弇章炯郭濬陳摹陳均趙汝梅趙與可孟之縉汪立信曹元發趙溍家鉉翁洪起畏以上知鎮江軍府事李天性趙立郭倪應純之趙仲以上知楚州魏勝賈涉以上知海州余介余太以上知淮安軍趙立李先耿世安毛興陳巖以上知漣水軍史欽知清河軍吕頤浩吕源黃願韓世忠李安俞向張縝郭仲威史康民湯東野宋孝光宋伯友劉洪道李易葉煥蔣璨俞俟陳古老劉光逺劉綱陳兖許中榮薿樓璹向子固沈調宋棐劉岑鄧根魏安行許世安王躍劉澤賈仲和周淙向汮王佐莫濛朝公武吕正己胡堅常陳棟王之奇吕企中郭棣徐子寅薛居實鄭良嗣張杓髙䕫趙不流趙子濛熊飛鄭興裔錢之望趙師睪趙不迹陳茂英張巖畢再遇郭倪趙師石崔與之應純之邱壽雋洪汲鄭損嶽珂王應洪趙笵林拱楊紹雲翟朝宗江湛史巖之趙葵李曾伯邱嶽趙與􅊸杜庶李庭芝朱渙以上知揚州陳文弼陳垓許堪張榮孫虎臣以上知泰州軍汪綱葉秀發王霆以上知髙郵軍張時修喬行簡以上知通州洪興祖方信孺吳機潘友文上官渙酉李道傳豐有俊袁申儒苗再成蔡伸以上知真州軍李觀民李綱張棟王渙之孫鼎臣周必大王藺以上知舒州徐的向士璧李士達黃幹以上知安慶府周方文李觀周必正以上知安慶軍夏成張茇郭東孫佑趙祥之王禔曾統唐承昈余榮唐輝吳偉明曾開汪藻朱芾朱異張甸黃積厚何鑄章僅趙子游施巨李沆胡彥國李稙潘莘洪適沈濬薛良朋吕廣問徐龜年錢豫季南壽郟升卿朱柔嘉史俁趙師䕫趙不悔沈崇一陳居仁陳良祐曹耜吕大麟石起宗謝源明許昌期徐誼趙彥恂耿延年張伯垓趙善悉王源陳昭嗣任清叟謝琳林琰韓瑗蔡戩陳貴誼李浹王公邁沈有開趙彥衛孟植趙希逺王鉛趙師逌葉箋趙師端詹阜民馮多福孔元忠宋濟趙彥適倪祖常袁甫盧子章趙希齊汪立中范鍾謝采伯劉炳喬似孫鄭崇史賔之饒虎臣戚士遜韓補趙與弼王撝謝堂魏克愚謝塈趙與澤鄭雄飛方略賈明道周坦魏洪林洽錢應孫曹良朋王應麟宇文十朋張洪趙必槐王積翁以上知歙州吕好問葉三省傅其傳李光耿延禧劉玨張果李䖍勵張植沈晦崔之度趙不羣朱勝非鄭望之汪伯彥程瑀李若虛郤漸秦梓梁汝嘉秦棣楊願王晌李椿王鑄黃積厚樓照魏良臣朱翌凌景夏任古許尹陳之淵王佐周操以上知宣州何俌江徹錢端禮姜詵周淙趙愷傅日得曾建蔡洸鄭伯熊丁時發陳騤楊嶰傅洪詹騤趙師垂沈揆蔣繼周木待問林大中陳賈齊慶胄汪義端沈祖宋之端張伯垓劉參傑趙善堅沈作賔陳證李澄朱欽則王補之葉箋俞應符趙善宣張忠恕李道傳趙希逺吳綱洪伋趙伸夫陳卓樓鑰沈燮孫夢觀潘槱齊碩汪繹袁君儒王與權李性傳吳泳杜範顔頤中王遂王鑰劉震孫孟之縉趙汝梅湯漢吳潛文天祥趙與可顔紹卿以上知寧國府滕祐劉子羽吕頤浩陳規袁植汪叔詹葉煥徐偉達王􅊅王進魏良臣張劭黃子游李彥卿王明曾三復施師㸃王信汪義端楊師中韓立道魯察胡兆趙彥博鄭汝諧趙粹中陳良祐梁君崇袁說友蔡必勝雷孝友顔棫史彌逺梁舜弼李思史定之王謙王柟李駿李壽朋錢敬直徐誼趙尚之趙善臨吕大器趙笵馬天驥王伯大焦煥炎王立信阮思聰王起宗以上知池州莫砥傅嵩卿郭偉方承張錞許端夫陸友諒李倫清陳敏識徐天民秦梓王禔朱亮工歐陽興世鄭松年范同徐渥韓膺胄洪楫李流王珦章夏朱彪周葵陳正同王傅湯鵬舉張運虞允文林珦王洰朱夏卿吳芾周璪洪遵胡元質蘇嶠楊倓李椿劉孝韙木待問陳騤張子顔余端禮洪邁趙汝愚尤袤孫懋范成大葉翥蔣維周李巘梁總倪思范處義孫逢吉陳景參張濤趙公豫湯碩林采曾㬇富琯林祖洽王補之曾炎王居安宇文紹彭趙希懌徐邦憲滕强恕吳柔勝陳貴謙王元春蓋鑄綦奎楊紹雲葉棠王綬鍾震吳潛李壽朋别之傑何元壽吳淵丁仁嶽珂徐鹿卿王遂孟㸃鄧泳邱嶽陳塏章琰文朝浦馬光祖胡大昌吕好問髙衡孫陸德輿潘凱陸景思鄭羽趙溍朱祀孫江萬里陳綺孟之溍以上知太平州李會胡舜陟陳規趙不羣劉甲仇悆魏良臣趙康直龔濤趙善俊宇文紹節李爽王希吕趙善湘薛叔似姚典杜杲吕好問全子才龔基先杜庶夏貴朱煥以上知廬州趙汝談趙淮丁仁楊次翁以上知無為軍曹明知六安軍孫逸王霆王阮杜杲李庭芝以上知濠州盛陶知順昌府許遵傅永以上知宿州王瓚知安豐軍王復王逵李虛己楊繪以上知徐州向子俊樂亮臣魏安行辛棄疾石宗昭洪槻許巽林趙葵張同之金之才以上知滁州趙霖周虎張瑱黃幹王堅以上知和州洪興祖胡國彥趙希仁林棐熊彥照薛極趙彥誠黃震王汝翼邢恕謝方叔常懋以上知廣德軍金職官之在江南境者宿亳潁壽徐海等州完顔元宜浙西道兵馬都統制完顔哈里髙綽和爾蕭仲宣烏延富埒赫大邦基大磐烏庫哩禮烏延溫綽歡伊喇托卜嘉髙彪沃哷哈達以上咸寧軍節度使圖克坦烏登完顔承立圖克坦伊都穆延烏登完顔薩布以上徐州行省完顔烏蘭伊喇長壽以上徐州元帥趙廷玉亳州節度使額哩音壽州刺史納哈塔降福宿州行院簽樞密事元自太宗始立十路宣課司有元帥行省之號世祖即位命劉秉忠許衡酌今古之宜以定官制按經世大典序録曰凡外之郡縣與朝廷逺者則鎮之以行中書省其郡縣又逺於省或有邊徼之事者則置宣慰司以逹之鹽鐵之類又别置官有軍旅之事分布於外者則置萬户府有大征則置行樞密院無則廢之刺舉之任則有行御史臺領監察御史肅政亷訪司以治之蓋元官制之大略如此其路府州郡以䝉古人為之長皆稱逹嚕噶齊俗亦謂之監州以漢人為守副之皆稱總管扶溝縣志曰元稱逹嚕噶齊猶言荷包上壓口襟子蓋取總轄之義總管之下有同知多以回回人充之說見陸隴其靈壽縣志自同知以下有經歷提控案牘録事典史之職凡上路逹嚕噶齊總管府尹正三品下路從三品上州逹嚕噶齊州尹從四品中州正五品下州逹嚕噶齊知州從五品散府逹嚕噶齊及知府正四品其縣亦分上中下三等每縣各有逹嚕噶齊掌縣之印而以知縣為縣尹掌判署事上縣置丞中下縣但設簿尉無丞凡路府及上州皆置儒學教授一員其行樞密院之在江南者掌調度軍馬之事後又於揚州立行院又立沿江行院他若防禦主防盜賊尚沿宋制宣慰主傳詔命則倣唐官又鎮南王府建於揚州府有王傅府尉司馬長史各二人統部董士選楊衍飾曹復亨納琳福壽以上江南行臺御史鄧文原亷恂傅巖起姚鐩盧摯陳儼李果張玠杜元中張毅王士熙多通吳鐸魏中立周伯琦褚布哈巴延布哈德濟納延史文炳以上江東亷訪使髙睿江東提刑按察使趙孟俯黃溍以上江浙儒學提舉董摶霄太倉水軍都萬户府趙知章兩浙轉運使守松江布哷齊招討使守江隂李世修江隂軍安撫使塔喇海托里特穆爾揚珠吉達以上鎮守鎮江萬户府賈均淮安亷訪使張漢英鎮守淮安萬户府楊惟中江淮宣撫使董文用趙璉以上江淮行省參政髙睿淮東亷訪使史弼淮東宣慰使張學羅鎮守安東萬户府李天祿以元帥守通州張𢎞綱招討使鎮通州昂吉爾淮西安撫使姚天福淮西按察使陳思謙李公平以上淮西亷訪使諤勒哲布哈淮西宣慰使劉秉德淮西總管陳宗義淮西都統制余闕淮西路都元帥張君佐安慶路安撫使張柔張洪範以上鎮潁州萬戶府石榮徐州節度使劉淵徐邳屯田總管分轄李仲信阿爾斯蘭布哈札拉爾伯嘉努宋廷秀亷希哲都濟爾陳元凱侯圭嶽天貞王瑛劉智咱子良任居敬必實衮實保諾海以上建康路總管兼府尹約爾蘇郭都爾伯特諤勒哲圖張塔海特穆爾以上集慶路總管王䝉江寧尹王邦傑王虎臣趙全王好禮朱霽伊喇呼圖克特穆爾蕭畹戎益李戡董章安祐李多爾濟祝秀巖申伊埒特穆爾札呼岱劉印必巴實曹晉師圖烈圖趙鳳儀郭鵬翼朝顯杜真拜昂錢光弼張䝉古岱多通和則平烏克遜良臣吳秉彛蕭義髙履貢師泰以上平江路總管劉宣王光祖布薩翰文張之翰秦居中鼐濟周維惠石從願賈汝丹吉嚕爾申杲姚文輔汪從善杜祐明安岱爾李額森布哈申秉禮燕琳楊巴延台賈桓王至和王克敏王中崔思誠王雍王立中以上知松江府吕師聖李衎史塤曹晉伊喇迪丁奕祖賈禧以上常州路總管李思恭江隂路總管石祖忠孫民獻安震亨劉䝉古岱以上鎮江總管兼府尹瓜爾佳歡托和楊孝友伯嘉努廉達實哈雅史燦齊詢王謙石哈喇布哈段廷圭文巴雅爾台李汝楫毛莊牛額森郭圭托音諤都默色以上鎮江總管兼管內勸農使阿思忠淮安守梁曾淮安路總管花世輔知揚州張照張彥安以上揚州路總管趙德彰李齊以上知髙郵府韓建知安慶劉儀趙謙趙與橮康天錫許楫沈嚴髙祥侍其君佐甘德勝劉克昌本巴楞郝思義都濟爾祁文顯蕭循正李賢翼孟淳張楫朱霽王惟一廉忱胡元瑪蘇庫烏呼納呼遜鄭侍翼以上徽州路總管博囉布哈達喇蘇薛超吾陳思濟馬昂王珙王興祖茅蘎以上池州路總管劉通平安努董章鄂諾張保魯托爾珠暢師文賈煥胡國安髙子明靳義賈度以上太平路總管邸浹昂阿圖塔爾海都實特穆爾鄭鈺七十三寶杭州布哈以上廬州路總管谷杲安豐路總管王庭玉臨淮總管侯康濟趙克明以上徐州尹李杲哥郭侃以上徐州路總管章齊巴圖鄭佑烏滿孫虎蕭郁以上滁州路總管偰文質方回秦良史正明蘇政王叔明以上廣德路總管江南通志卷一百二
