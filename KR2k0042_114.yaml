body:
  text: 江南通志卷一百十五職官志名宦四淮揚徐三府太海通三州淮安府漢汲黯字長孺濮陽人後元中東海太守治尚清靜擇丞吏分任之責大指不細苛多病臥閣內不出郡中大治漢書本傳尹翁歸字子兄平陽人宣帝時拜東海太守過辭廷尉于定國于欲有所托與語終日不敢及曰此不可干以私及治郡以明察稱漢書本傳于公東海郯人為縣獄史郡決曹決獄平羅文法者于公所決皆不恨屬嵗旱雪孝婦之寃境內大雨漢書于定國傳鄭𢎞字巨君山隂人守淮隂嵗旱隨車致雨有白鹿夾轂而行𢎞怪問主簿黃國國賀曰三公車轓作鹿明府必為宰相謝承書黃浮桓帝時東海相時中官兄子令下邳强奪故汝南守女歸舍殺之浮執其家屬按法棄市後漢紀徐璆海西人獻帝時以汝南太守轉東海相所在化行後漢書本傳晉祖逖字士稚范陽人建興初帝以逖為奮威將軍豫州刺史給千人不給鎧仗使自招募逖屯淮隂起冶鑄兵器得二千餘人而後進晉書本傳南北朝宋蕭僧珍元嘉末守山陽㑹魏人為寇僧珍蓄陂水令滿待至決灌之魏不敢攻南史隋高勵字敬德渤海人楚州刺史民安其政城北有伍子胥廟祈禱者至破産勵告諭所部自此遂止隋書本傳唐宋璟常貶楚州刺史為政清毅簡肅不可干以私唐書本傳李聽字正思洮州人為楚州刺史時憲宗方討李師道聽振勵軍士掩賊遂取海州攻朐山降之懷仁漣水望風納欵唐書李晟傳五代何敬洙廣陵人南唐楚州團練使嘗親出里巷察人疾苦有訴事者剖析無不厭服南唐書本傳張彥卿楚州防禦使周世宗親禦旗鼓攻楚州自城以外皆已下發州民濬老鸛河遣齊雲戰艦數百自淮入江勢如震霆烈熖彥卿獨不為動城陷彥卿猶列陳城內誓死奮擊日暮轉至州廨長短兵皆盡彥卿取繩床搏戰及都監鄭昭業千餘人皆死之無一人生降者南唐書本傳宋王宗望字磻叟江淮發運使楚州沿淮至漣水風濤險惡宗望開支渠引水入運河李宣知楚州決斷明敏時稱照天燭南畿志應純之嘉定八年知楚州崇重儒術廣城堞深濠池寇不能害南畿志元謝處信字子忠至正間知安東州事修學課農通水利辨寃抑刋訓辭以戒吏民南畿志褚布哈字君實石樓人至正十一年以淮東亷訪副使守淮安城陷布哈踞西門力鬬中傷見執子伴哥冒刃護之亦見殺布哈守淮安五年殆數十百戰精忠大節人比之張巡云元史忠義傳幹羅思延祐中知桃源縣捐俸廣學宫撥膏腴田以贍貧寠桃源縣志盛昭字克明歸德人淮南行省照磨張士誠據高郵遣昭往諭士誠不聽拘之舟中逼使出拒官軍昭罵不絶口賊先剜其背肉而後磔之元史忠義傳明范中吳元年守淮安先是郡為僞漢所據政苦苛急中勤於撫綏寬厚不擾公署祠宇皆所經畫南畿志姚斌洪武中知淮安府勤謹亷靜一郡稱治淮安府志潘傑夀州人洪武間知淮安府剛正明豁吏民敬服淮安府志陳天瑞合肥人吳元年知鹽城創縣治建學宫南畿志孔克勳江西人洪武元年知清河縣修廢舉墜勇於任事而才足以副之南畿志束贄宣城人洪武二年知安東縣開置公署分設街巷遷鄉民以實之南畿志黃玨安嶽人洪武二年知鹽城縣革弊除奸亷介有為南畿志俞順辰南昌人洪武中知鹽城縣興學崇儒勸民力農鹽城縣志蘭輔平度人洪武中以御史出知鹽城勞心撫字鹽城縣志汪仁洪武初知桃源縣教民力田孝弟縣治祠廟壇壝皆所創建南畿志喻有立江西人洪武十五年知清河縣勤政愛民興學禮士清河縣志李信圭泰和人洪熙元年知清河縣公正亷能士民敬服秩滿詣闕乞留擢知州仍攝縣事南畿志彭逺南昌人宣德中知淮安府嵗饑流民四至逺構舍勸輸日給二餉全活者巨萬民乏耕牛為立法貸給農務以興南畿志邱陵蘭陽人正統中知淮安府崇祀興學鑿水渠以便稼穡淮安府志楊昶仁和人天順間守淮安募粟賑荒流民皆賴全活課最詔晉秩參政仍視郡事淮安府志鄭同閩縣人天順間知安東縣以憂去民為立一清坊以表之南畿志涂升豐城人成化中知鹽城縣寬平樂易甚得民心鹽城縣志李尚達莆田人成化中知桃源課農賑飢民立像祀之桃源縣志張翔成化中鹽城教諭講明冠婚喪祭禮士習一變鹽城縣志徐鏞興國州人𢎞治中知淮安府嵗大祲芻粟幾絶亟修糴賑之法郡學圮重恢擴之淮安府志才寬遷安人𢎞治中知淮安操履清峻有盜殺人無主名適蛛墮几上鷹下於庭寬曰是其有名姓符同者耶獲朱英按之伏辜人以為神廣輿記郭郛肥鄉人𢎞治間以治最自英山調清河亷潔明斷清河縣志郭韶霍州人𢎞治中知安東縣亷以持身嚴以馭吏安東縣志黃成章𢎞治間知安東縣請改漕折安東縣志羅循吉水人正德中守鎮江禦賊有功賜朱衣一襲調守淮安餘寇尚熾用計綏之招徠撫輯民以大安鎮江府志劉經正德間知鹽城亷正有為以非罪免後起甘肅僉事鹽城縣志歐陽周密縣人正德間知安東縣持身清慎嵗饑賑恤有方安東縣志路迎嘉靖中知淮安府奸民縱恣迎下車捕治境內肅然户部督逋租急大吏亟欲按劾或諷當往謝迎曰民困極矣吾有去耳何謝為淮安府志王鳳靈莆田人嘉靖中知淮安造士勸農清商稅濬市河㑹中官押貢道淮誣以闕供逮詔獄囊無寸儲士大夫醵金佽之百姓呼號填路詔使為之感動淮安府志俞縉鄱陽人嘉靖中清河教諭嵗旱䖍禱即雨見民困乏每捐資賑給清河縣志邵元哲貴陽人萬厯二年知淮安府城東澗河通射陽湖入海為輸灌咽喉請疏之增築城西長堤防黃河下流之決建閘壩以通漕艘士民立像祀之淮安府志劉大文博平人萬厯中知淮安府奸民妄奏江淮遺稅中使挾詔令至大文力持不可皇木困民為計道里議津貼定夫價禁科擾民立遺愛祠廣輿記高捷淄川人萬厯間知淮安府東省饑流民麕至捷勸民出粟大建粥厰全活無算收贖子女表彰節義建社倉設官渡創浮橋起書院民為立祠西門外淮安府志宋統殷即墨人萬厯末知淮安河淮交漲城內外危迫統殷市薪塞決不遺餘力流賊逼淮守禦之具咄嗟立辦尋擢兵備副使賊望麾幟遁去淮安府志王用豫字宜蘇黃岡人崇禎時淮安推官屢白枉獄淮海有妖稱石觀音白日變現作禍福數郡謁香如狂將煽亂用豫單騎以往舉笏鞭石背蹴其像碎之颶作湖溢鹽城海州贛榆諸境居民漂沒上官檄往拯之晨夕拮据全活無算淮安府志揚州府漢馬稜字伯威茂陵人章和初為廣陵太守時穀貴民饑奏罷鹽官以利百姓賑貧羸薄賦稅興復陂湖溉田二萬餘頃後漢書本傳張綱字文紀犍為人漢安中廣陵太守時張嬰等久寇揚徐勢張甚綱單車詣嬰壘諭以逆順禍福賊感悟面縛歸降後漢書張皓傳荀曇字元智潁隂人漢末廣陵太守正身疾惡志除宦官其黨在郡者纎罪必治用是禁錮終身後漢書荀淑傳趙苞字威豪東武城人舉孝亷為廣陵令視事三年政教清明郡表其狀遷遼西太守後漢書獨行傳張超東平人初平元年廣陵太守時董卓擅政郡功曹說超曰王室將危賊臣虎視宜起義兵以誅國賊超然其計與兄邈及劉岱起兵討卓後為袁紹所害後漢記陳登字元龍下邳人建安中廣陵太守明審賞罰威信宣布海賊萬餘户束手歸命未及期年功化以就後遷東城守民拔郡隨登老幼襁負追之三國先賢行狀南北朝宋賀弼字仲輔山隂人競陵王誕記室初誕圖逆弼固諫誕拔刃向之及兵屢敗或勸弼出降弼曰公舉兵事不可從然荷厚恩義無違背惟當以死明心耳乃飲藥自殺南史裴昭明聞喜人建武初廣陵太守歷郡皆有勤績齊書本傳梁祖皓易州人大同中為江都令後拜廣陵太守侯景陷臺城皓起兵糾合勇士耿光等馳檄逺近討景景大懼率侯子鑒等攻之城陷見執為景車裂死南史霍雋太清中為廣陵令侯景叛從邵陵王綸發兵討之綸敗雋為賊所獲送廣陵城下逼令云王已被擒雋大呼曰王小失利全軍還京口城中但堅守援兵尋至矣景脅以刃雋辭色不變景義而釋之南史隋馮慈明字無佚長樂人大業中攝江都郡丞奉使至東都為李密所執密延坐謂欲問罪江都卿謂何如答曰慈明直道事人有死而已不義之言非所敢對密不悅冀其後改厚加禮焉慈明潛使人奉表江都及致書東都留守論賊形勢事泄密義而釋之出營門為翟讓所害隋書誠節傳唐李襲譽字茂實安康人為揚州都督府長史俗喜商賈不事農業襲譽引雷陂水築句城塘溉田八百頃民歸本業所得廪祿盡散宗戚以餘資寫書罷揚州書遂數車載唐書李襲志傳姚崇字元之陜州人睿宗時為揚州長史政條簡肅人為紀德於碑唐書本傳第五琦字禹圭長安人至德初謁肅宗于彭原言江淮賦藪若假臣一職請悉東南粟飛餉函洛帝悅拜御史勾當江淮租庸使始變鹽法國用以饒唐書本傳五代朱昻字舉之潭州人周世宗南征韓令坤統兵揚州昻謁陳方略令坤令攝永正令有政績東都事略向拱字星民河內人周顯德二年揚州初平南唐出師潛謀收復擢拱淮南節度使時師久駐維揚都將驕恣有劫人妻女者拱至戮不奉命者數人軍中肅然周師圍夀春久不下拱請徙揚師併力攻夀春乃封庫付揚州使者遣將分部巡城秋毫不犯軍民感悅宋史本傳荆罕儒信都人周顯德中泰州初下拜刺史兼海陵鹽城兩監屯田使世宗臨幸以為團練使有金帶鞍馬之賜軍吏耆艾詣闕請留恭帝詔褒之宋史本傳宋李處耘上黨人太祖命知揚州時境內雕殘處耘勤於撫綏奏減城中屋稅民皆悅服宋史本傳胡宿字武平晉陵人為揚子尉縣大水漂沒居民令不能救宿曰拯溺吾職也即率公私船活數千人歐陽修贈太子太傅胡公墓志范仲淹字希文蘇州人嘗為興化令時海堰久廢鹹水入田害稼乃請築堤通泰海三州蜿蜒數百里以衛農田宋史本傳胡令儀陳留人天聖中淮南轉運使范仲淹請築捍海堰㑹大雨雪役夫有陷濘死者歡言堰不可成朝命令儀按可否令儀熟知潮患力主仲淹議堰卒成民至今賴之南畿志韓琦字稚圭相州人以資政殿學士知揚州琦所至設條教葺帑廪治武庫勸農興學人人樂其愷悌東都事略劉敞字原父新喻人元祐元年知揚州府雷塘舊為民田其後官取瀦水民皆失業敞據舊券遂悉還之天長縣鞫王甲殺人既具獄敞以委户曹不能有所平反乃親按問之雪其寃相傳以為神明宋史本傳蘇軾字子瞻眉州人元祐六年以翰林學士知揚州舊發運司主東南漕聽操舟者私載物貨闕吏不得留難故所載率皆速達近嵗一切禁之舟人困敝多盜所載以濟饑寒公私交病軾請復舊從之宋史本傳張次山通州人初調泰興簿督開河部夫整肅工多先辦見知於司馬光擢知泰州泰興縣志劉䝉政和六年通判揚州江淮水患流民轉聚於揚䝉曲加賙恤得以存活事聞特遷一秩旌之揚州府志蔡伸字伸道莆田人宣和間通判真州火燔民舍多露處雪中伸闢寺宇官廨分處之且發常平廪粟以賑守者不可伸曰此國家所以備非常也如得咎請獨當之揚州府志翁彥約政和初知高郵軍商旅貿易茶鹽多詭挾抵罪彥約至凡有告訐片言立決嵗大旱步禱疲甚既雨得疾曰民蘇而吾疾死不恨矣乞休未報而卒高郵州志呂好問字舜徒夀州人崇寧初治黨籍好問以元祐子弟坐廢官揚州議曹蔡卞為帥欲扳附善類待之特異好問以禮自持卞不得親及卞秉政諷之曰子少親我即階顯列矣好問笑而不答宋史本傳呂頤浩字元直樂陵人建炎初知揚州劇賊張遇聚衆焚掠頤浩單騎造壘諭以逆順悉釋甲降宋史本傳馬尚泰興令修築城隍民不知役擢通判泰州巨冦王琳合兵圍城尚晝夜巡禦時率死士出戰殺獲甚衆賊終不能犯進知泰州招徠軍民墾闢鹽場境內以饒南畿志張郯字彥知烏江人知儀真㑹詔兩淮郡守各上用錢劵利害郯力言兩淮凋瘵無土産可貿易所賴錢幣而已若用券商賈且不行帝采其言請城真州身自督役四旬告竣儀徴縣志洪興祖丹陽人紹興中知真州始至以瘡痍之後請復租一年明年再請俱從之宋史儒林傳莫濛字子濛歸安人乾道二年知揚州城圮命濛增築分授諸將各刻姓名甃堞間懸賞激勸閲月告成宋史本傳吳機字子發天台人嘉定中以運判兼知真州創閲武亭設抵當庫鑿橫河浚重濠導塘水置堰閘穿地為網匝濠三隅分兵五等畫城捍禦初載運悉用客艘機捐官錢置舟數百自是民旅不擾揚州府志方信孺字孚君興化軍人知真州即北山匱水築石堤二十里人莫知其所為北兵薄儀真守將決匱退敵城乃獲全宋史本傳賈涉字濟川天台人嘉定中寶應擇令堂差涉至邑請城之役興以憂去北軍犯光州起涉竟前役宋史本傳潘友文字文叔東陽人嘉定初知真州時兵燹後民無屋廬饑饉相望乃築翼城架屋居之開賑局施藥餌全活數萬户揚州府志林伯成長樂人開禧中知真州築城五百餘丈鑿濠深廣之翼城之築自伯成始揚州府志李道傳字貫之井研人嘉定間知真州甓圯城築兩石壩以護並江居民益浚二濠又隄陳公塘有警則決之以為阻人心始固宋史本傳豐有俊字宅之四明人嘉定間知真州嵗大旱計口賑給置贍軍莊創防城庫增治陶冶為守禦計民德之為立生祠揚州府志袁申儒知真州上便宜十二事作翼城開茆家山塘築堤置閘匯諸山水環城以防敵是春敵騎果至疑不敢前揚州府志徐景興化令楚民胡德等冦掠景諭以逆順賊怒欲加害景曰死王事足矣但願無殺百姓耳賊義而釋之興化縣志葉秀發金華人紹定中知高郵軍時湖水高堤防不固秀發建石埭以疏水勢瀦泄有恆後馬光祖思其功構祠樊良堤祀之南畿志陳垓知泰州鑿東西北外濠并浚南濠遷貢院新學宫創建亭館數十所泰州志上官渙酉字元之邵武人寶慶初以運判權真州事請改築翼城以衛城南之民立常平倉修車馬備器械守戰之需皆具揚州府志趙范字武仲蒲圻人嘉定十七年知揚州大修軍政創馬軍三千招游手之强壯及牢城重役人充之别籍民為半年兵春夏在田秋冬教閲宋史趙葵傳趙葵字南仲紹定三年為淮東提調刑獄李全攻揚州葵親出搏戰與全隔濠相語切責之全無以對每戰輒捷宋史本傳王鑑字仲明紹定三年李全犯揚州鑑從趙葵往救賊識鑑旗幟曰淮東硬軍也明年趙范約日出戰鑑擐甲待旦躍馬疾趨斃全於新塘捷聞授團練使南畿志許堪知泰州建堡浚濠四角為月河冦至濠深不敢向泰州志杜庶字康侯邵武人淳祐中權知真州州素缺備庶大修守禦積排杉木殆十萬株後又知真州兼淮東提㸃刑獄逾年移淮西兼廬州安撫副使人歡迎如見慈父治績甚多宋史本傳楊文仲字時發彭山人寶祐初通判揚州牙契舊額嵗為錢四萬緡纍增至十六萬開告訐以求羡文仲持不可卒如舊額時議舉行沙田力爭乃得寢宋史本傳胡拱辰知興化城陷不屈死興化縣志李庭芝字祥甫應山人開慶初知揚州州新遭火廬舍燬以鹽為利而亭户多亡去庭芝悉貸逋假錢為屋屋成又免其假錢一嵗官民居皆具鑿河四十里入金沙餘慶場以省軍運釋亭户負鹽百餘萬平山堂瞰揚城元兵樓其上以射城中乃築大郛包城募流民以實之詔命為武鋭軍又大修學為詩書俎豆習射禮郡有水旱發廪不足以私財賑之民德之如父母德祐初元人持榜招之庭芝焚書斬其使後應端宗召東入海元兵追及於泰州死之宋史本傳苖再成德祐初知真州文天祥為元所執與客杜滸等亡入真州再成出迎喜且泣欲說李庭芝以淮東軍攻灣頭揚子橋夏貴以淮西軍趨建康而已以舟師搗鎮江天祥稱善事不果元阿珠來攻城陷不屈死南畿志孫虎臣德祐初守泰州元人來攻援兵不至城陷死之泰州志元詹士龍宋都統詹鈞子世祖見而嘆曰此忠臣子也除興化縣時捍海堰頽壞鹹鹵浸入高郵郡諸郡農桑湮沒民饑死流亡者半士龍竭力修築數月堰成南畿志張震字威亨清苑人泰定元年知真州州介江淮百貨叢委率為駔儈所困震誅其尤者又新廟學鑄祭器繕陂塘鞫寃獄士民感畏焉揚州府志胡長孺字汲仲永康人其學九經諸史下逮百氏名墨縱橫旁行敷落律令程章無不包羅而揆序之至元二十五年拜集賢修撰與宰相議不合改教授揚州元史儒學傳李齊字公平廣平人至正中知高郵府張士誠呼齊使跪齊曰吾膝如鐵豈為賊屈士誠怒碎其膝而咼之論者謂大科三魁若台哈布哈沒海上李黼隕九江洎齊之死皆不負所學云元史忠義傳明張遇林廬州人洪武元年知泰州創置官署興學勸農修復橋梁坊巷士民懷之廣輿記鄧剛揚州衛指揮使靖難兵至御史王賔命剛贊畫戎務尋被執不屈死南畿志王思旻黃岡人正統間以同知署泰州事嵗大祲適巡按至思旻迎於河干叩泣求題未許思旻曰百姓旦暮且死忍獨生耶抱籍躍入湍流巡按驚救為具題如請又造廣運望江二橋置預備倉八十間德政益勵泰州志王漢贛州人景泰四年知儀真縣嵗旱禱雨不應乃詣城隍神告曰令之不德責與神等遂以身與神像同鎖以示罰俄而大雨如注民獲有秋儀徴縣志陸愈字抑之平湖人成化中知江都縣嵗荒計口給賑饑民有鬻子女者捐俸贖之鑿花園港以備蓄泄增築邵伯湖堤嵗辦餘錢皆用儲粟民勒石紀之江都縣志劉廷瓚成化中令興化堰堤久廢旱潦無所恃廷瓚為規畫修築民號曰劉公堤興化縣志彭福字綏之安福人成化十九年知泰州巡河使者令泰州月發濬夫三十名代寶應役福堅却之州北舊為監運鹽司廨址當事欲隳民居復之力爭得寢嵗徴給兵豆草民苦輸倉滋纍福以折價請報可詔各郡縣遵行泰州志趙有初沙河人𢎞治五年授揚州府管糧同知有聲尋遷知府大吏檄徴完任內逋課方可其行有初行部至興化見積逋最多鞭笞號苦因垂涕曰吾何愛一知府置汝曹於死耶遂棄官歸全活甚衆邑人立像視之揚州府志徐淮字必東武城人𢎞治中知儀真縣至則汰奢靡辨貴賤令行禁止以忤中官被誣謫官南畿志王恩餘姚人𢎞治中授揚州知府嵗饑請移商鹽留兑運以助不給又取貯馬價糴米驗口分給自劾擅移之罪活民無算南畿志陳憲西平人正德七年知江都流賊猖獗憲隨事區畫守禦備具官兵頓城下者數萬供億旁午而閭井晏然江都縣志成樂字以和石首人正德十年知泰州政尚寬惠操持清謹卒於官無以為斂士民哭之甚哀泰州志蔣瑤字粹鄉歸安人正德十三年知揚州武宗南巡將駐蹕維揚寮屬欲徵已免之糧以供儲偫瑶叱曰民胡可欺若有罪請自當之比車駕至權璫幸帥百計需求瑤一無所應璫矯上命欲刷民間女瑤密令三日內畢嫁娶璫恨甚繫瑶於舟不得食者三日後遷去夫婦覔輕舸載原攜二衣橐以行揚州府志謝在南陽人正德十六年知高郵讞獄執法不避權貴以公帑羡餘置田八百畝補官俸士廪之缺高郵州志劉恩字以忠高陽人嘉靖元年知寶應邑大饑疫死者相籍恩力請發帑糴榖分委義民於各坊村設糜賑濟寶應縣志易瓚嘉靖初知揚州府嵗連饑瓚請於朝詔悉蠲免稅糧賑以太倉銀米全活者十九萬餘人貸種三萬七千餘户揚州府志周寵字君錫臨海人嘉靖五年知儀真甫下車祛里胥宿弊清鹽商包索地租代補嵗辦之賦審丁夫立九則一切以宜民為本儀徴縣志聞人銓字邦正餘姚人嘉靖五年知寶應縣嵗大旱運河水涸漕運御史檄令蓄水通漕禁勿啓閘銓命啓之曰民命得蘇獲譴何憾是嵗旱不為災邑有湖患欲開越河以避其險未果行後銓為御史力持前議竟得請邑人祠之寶應縣志簡籍巴縣人嘉靖中泰州訓導州學田久被占匿籍力請當事清還仍增義田五百四十畝泰州志王臣字公佐南昌人嘉靖六年知泰州浚關河寬徭役行保甲連坐之法撤淫祠毁其銅像以鑄文廟樽鉶增修樂器選樂舞生供祀廟廷創尊經閣立宋范仲淹胡瑗祠以化導斯民為己任泰州志晏鋭四川人嘉靖中高郵衛經歷倭難起鋭所統皆新募卒猝與倭遇衆大奔寇乘之鋭陷陳死揚州府志侯秩字季常長垣人嘉靖十一年知揚州勤儉率下多方儲粟至二十萬石倉庾不能容他郡民與揚民爭田殺揚民且誣以罪㑹問時其有司偏護之秩據法忤其意遂妄誣秩罪㑹巡撫御史白其事得解揚州府志傅珮仁和人嘉靖中知興化縣賦重役煩加以軍竈錯處民大困珮力請上官均平賦役又減站役民兵嵗省私財以千計興化縣志吳桂芳字子實新建人嘉靖三十一年知揚州時倭寇江北為募練鄉勇備禦之䇿復議築海門泰興如臯瓜洲四城城成民得保聚揚州府志石茂華字崇質益都人嘉靖三十四年知揚州時倭冦作羽書旁午茂華從容應之不動聲色築外城捍環河商民至今呼為石城揚州府志朱公節山隂人嘉靖中知泰州繕城郭浚河濠倭寇不復窺伺胥吏以常例進峻却之泰州志朱裒嘉靖三十五年授揚州同知倭寇犯境裒同高郵衛經歷晏鋭禦之俱戰死即其地立祠賜額雙忠揚州府志談默字仁卿仁化人萬厯中知泰州先是河水齧田無以辦漕默請上官出倉中陳穀并貸鹺金以糴榖漕事獲竣又煮糜以活饑民城頺令饑民供畚鍤役不至轉徙姜堰盜起默購誅渠魁州境寧謐泰州志韓介臨淄人萬厯中知寶應縣時湖水暴溢南城角堤將決介出立堤上集千人培以剛土堤得全寶應縣志耿隨龍滑縣人萬厯十四年知寶應縣值大水嵗祲隨龍曰不大更張民不濟於是革坊長厫皂里夫暨耆民官農由是民盡歸農不復到縣嵗省金以萬計在任五年無弊不革所積俸金盡以給兩鄉開河之用寶應縣志歐陽東鳳字千仞潛江人萬厯十九年知興化縣時水漲堤決屢請蠲賑不應即自草疏上之以越奏罰俸然卒蠲積逋改浮糧折色如所請廣輿記崔國裕長安人萬厯四十二年知泰州催科不施鞭撲輸者恐後招徠流移至四千餘户泰州志劉鐸泰和人天啓中知揚州府魏璫肆虐鐸憤甚往往形之歌咏邏者刺得鐸所書扇以為謗訕朝政逮繫論死璫敗特賜贈廕揚州府志王徵字良甫涇縣人為揚州推官值三王之國從者如林征求百出徵挺身白之王得以無擾及魏忠賢搆黃山獄連巨室數百人黠者乘機搆煽下徴按問徵據法力爭全宥甚衆時建魏璫祠成徴與淮揚道來復獨不往拜人稱為關西二徑廣輿記趙龍字浴菴番禺人崇禎初知興化縣時盜賊蜂起高郵鹽城往來道絶龍率鄉兵往捕獲渠魁三十七人悉斃杖下餘黨立散水患頻仍民殣相望請緩徴不得即自拜疏上之被劾落職興化縣志姜埰字士農萊陽人崇禎五年知儀徴邑故掣鹽地御史委令掣驗諸商或以羡例進輒斥去國事日棘軍需旁午埰獨加意撫字人比之陽城元結云儀徴縣志李含乙字青藜四川人崇禎九年知高郵州風度雅飭剖決如流有掾以五百金私餽痛懲之嵗大旱疫倡諸紳士煮糜設賑全活數萬高郵州志湯來賀南豐人崇禎十四年授揚州推官發奸摘伏有神明之譽又宅心仁厚嘗親至獄中慮囚輕罪及株連者槩為省釋揚州府志任民育山東人崇禎末知揚州府城陷冠服坐堂上兵欲擁之出城不從遂遇害揚州府志國朝王宇春奉天人順治五年知揚州府為政虛已和衷咨詢民間疾苦勾稽㑹計皆手自考定不假掾吏每戎旅經過輒親至郊外設供帳犒勞約東出境無敢譁者舊通志趙汲字潤宇錦州人順治八年知泰州下車即首擒劇盜游三游四等一境肅然疏濬河淤修學宫設藥厰代貧户完漕缺訟獄衰息州被水災田禾盡沒力請奏䝉蠲恤其子良相知揚州府舊通志牟文龍字紀伯錦州人順治九年為儀徴令機警有幹才催科政善民無逋賦為邑學請增士額得如大縣多士德之征戍往來多索牽挽夫役文龍應付有方民賴不憊陳洪諫德州人康熙七年知興化縣時河水為灾力請具題蠲賦流民迫于饑寒走險剽掠洪諫練鄉勇嚴保甲守禦有方又厚加撫循招徠復業盜賊衰息民賴以安置義冢設育嬰堂皆自捐俸不費民間錢張可立奉天人康熙十六年為興化令開濬市河設立藥局息訟省刑水旱灾傷必奔籲上臺得所請而後已邑志散軼為聘名人排纂後遷秩去邑人垂泣送之熊開楚字文友石首人康熙二十四年知江都縣徴輸立易知由單以杜胥吏侵蝕包攬之弊邑繞大江蘆洲坍漲不常開楚履洲清大賦均訟息嵗祲力請賑恤為貧民贖還所鬻子女署高郵及儀徴篆皆著政績調直𨽻新安縣卒於官後部議行追江都逋賦奉豫豁免徐州府漢張禹字伯達襄國人元和三年為下邳相蒲陽坡久堙禹開水門灌溉遂成良田鄰郡歸者千餘户功曹吏戴閏故太尉掾權傾郡內有小譴禹令自致徐獄正其法長吏以下莫不震悚後漢書本傳韓稜字伯師舞陽人章帝時為下邳令多異政邑獨不雹徴拜尚書邳人廟祀之南畿志牟融字子優安邱人為豐令視事三年縣無獄訟為州郡最後漢書本傳費泛字仲虞吳興人為蕭令先教後罰風化大行沛有蝗不入蕭境朝廷嘉之後漢記魏朗字少英上虞人桓帝時彭城令時中官子弟多行不法朗與更相章奏幸臣忿之後漢書黨錮傳陳登字元龍下邳人為徐州典農校尉巡土田之宜盡鑿溉之利粳稻豐積三國先賢行狀三國王祥字休徴琅琊臨沂人為魏徐州刺史呂䖍别駕委以州事時寇盜充斥祥頻討破之時人歌曰海沂之康實賴王祥邦國不空别駕之功晉書本傳南北朝魏劉渴侯不知何許人禀性剛烈太和中為徐州後軍適寇至力戰不敵遂被獲瞋目大罵為賊所殺贈立忠將軍平州刺史魏書節義傳隋劉高彭城人大業時為蕭令時長吏多贓汚高清節愈勵風教大洽獄無繫囚為吏民所稱南畿志唐韋恆陽武人開元初為碭山令臨政寬惠吏民愛之天子東巡州縣供帳皆鞭朴趣辦恆不立威而事集唐書韋思謙傳許孟容字公範長安人辟武寧張建封府李納以兵拒境建封遣使諭止三往不聽孟容往敷陳順逆納即悔謝罷兵唐書本傳韓愈字退之鄧州南陽人為張建封推官操行堅正鯁言無所忌唐書本傳李藩字叔翰趙州人張建封辟為判官建封病篤豪州刺史杜兼隂圖代之疾驅至徐藩泣謂曰府帥疾危公宜謹守土何棄州而來不速歸當行舉劾兼錯愕去唐書本傳宋曹彬雍熙中鎮徐州性仁愛有犯法者逾年然後杖之人問其故彬曰吾聞此人新娶婦若遽杖之彼舅姑必以婦為不祥吾故緩其事而卒亦不赦也宋史本傳孔道輔字原魯宣聖四十五代孫景祐初知徐州道輔不避權勢以剛直聞於時宋史本傳梁適字仲賢東平人知淮陽軍奏減京東預買紬百三十萬論景祐赦書不當録朱梁後仁宗記其名宋史本傳程珦慶厯初知沛縣會久雨平地出水晚種不入珦謂俟可種而耕則時已過矣募富民捐菽數千石以貸農使布之水中水未涸而甲已露是年遂不艱食朱子文集王洙字原叔宋城人皇祐初知徐州時京東饑值賦薪揵塞商胡河輸半已足洙命更其餘為榖粟誘願輸者以餔流民因募壯健為兵得千餘人盜賊衰息部使上最第一宋史本傳蘇軾熙寧末知徐州河決曹村水漲城下富民爭出避軾曰富民出衆皆動搖驅令復入隨呼營卒築東南長堤起戲馬臺屬於城會天晝夜雨城不浸者三版軾遂廬城上令官吏分堵以守城卒獲全宋史本傳曾肇元祐七年以刑部侍郎出知徐州仁厚謙和而執法頗嚴雖親故有犯未嘗少貸在州多善政公餘著書不輟南畿志米芾字元章吳人由禮部員外郎出知淮陽軍用文雅為治尚禮教袪淫祀秩滿歸橐蕭然遇風舟危作詩矢諸神風頓止宋史本傳田晝字承君陽翟人徽宗時知淮陽軍嵗大疫日挾醫問病者救之後卒民祀為土神宋史本傳王復以龍圖閣待制知徐州建炎三年金兵圍徐復與子倚嬰城固守外援不至城陷嫚罵死闔門百口皆遇害其帳下趙立為掩其尸奏請立廟時教授鄭褒巡檢楊彭年同死之南畿志元揚珠吉達徹爾世祖時為徐州達嚕噶齊崇尚經術周知民隱鋤强扶弱吏民畏而愛之徐州志耶律廷瑞至元中為蕭縣尹改建學宫士風一振蕭縣志趙野字子開濟南人大德初為沛縣尹勸農興學政平訟理南畿志苖澤大德六年知睢寧縣有幹濟才嵗饑建言宜蠲賦賑給河水衝決置大舟以濟民涉南畿志楊泰大德十一年為碭山縣尹加意庠序勸課農桑政教兼舉碭山縣志郭瑄字廷玉至正五年為豐縣尹沈毅有為凡有大興作皆不動聲色人爭趨之豐縣志諤勒哲圖字仲玉至正中監蕭縣政簡賦平吏畏民愛行部所至一飯必酬其直蕭縣志明文景宗合肥人洪武初知徐州招徠勸課民皆安業善因事成功多所創建南畿志楊節中樊城人洪武戊寅以薦舉知徐州以厚風俗為務會郡大疫遣醫四出療治躬自督視貧者并捐俸給之南畿志曾本雩都人洪武五年為豐令亷潔寬平吏民懷服豐縣志陳葵慈溪人洪武中知邳州興學校勸農桑有遺愛百姓懷之南畿志郝玘永樂元年知碭山勸督耕桑鼓勵庠序明敏亷慎政化大行以憂去服闋謁選蕭人請為令政績復著碭山縣志梁孟嶽貴溪人永樂初知宿遷歷二考賦均訟平婚姻死喪皆有贍給南畿志寧直滕縣人宣德初知宿遷縣蒞事公平政教兼舉南畿志宋誠字彥實蘄州人景泰中知徐州器宇才能迥出人表吏民畏服南畿志周廣榮吉水人成化中知邳州文章政事俱優邳州志何皥公安人成化六年知睢寧縣蝗不入境瑞麥叢生睢寧縣志曹卿成化間以御史謫判邳州興利除害治績甚著邳州志張夢輔澄州人成化中知碭山剛果有為盜賊屏跡南畿志李惟聰杞縣人𢎞治中知邳州為政平易讞獄詳慎邳州志雷爵朝邑人𢎞治中知邳州令善民安邳州志張瓛福山人𢎞治中知宿遷縣百廢具興宿遷縣志樊準南昌人正德中知徐州先是中貴督廣運倉儲左右恣肆莫敢誰何準至一繩以法會進鮮橫索驛遞準亷其所挾私物狀裁抑之被誣逮繫老幼號泣追送事白調任徐州志張淮字本豫義勇前衛人正德中知徐州會上南幸鄉民惶懼僉思竄匿淮與判官董相慰安之悉心經畫秋毫不以擾民時服其才徐州志馬裕臨朐人正德三年知蕭縣嵗饑發廪以賑仍日煮豆粥三百釡食之又撫流移墾荒萊補助不給邑人依若慈母焉蕭縣志胡守約字希會合州人知沛縣中官史宣進貢經沛陵轢郡縣守約與宣訐奏被誣繫獄比鞫對持論侃侃得釋歸沛縣志周尚化太和人正德四年知邳州强寇壓境修築土城竭力守禦邳州志高巖瀘州人正德中知邳州不避權勢臨民莊而禮士優邳州志王治字純甫永平人知沛縣沛故無城治為創築又撤龍泉寺徙建學宫沛縣志劉陽字一舒安福人嘉靖中知碭山縣俗多盜陽捕其魁撲殺之奸民震懾邑苦河患乃齊沐七日率父老請禱河忽自疏者二十七里碭山縣志李文憲字從周北直人嘉靖中授沛縣丞有賊百餘人突夜入城劫掠憲率民兵往捕賊挺身當先矢盡遇害沛縣志任惟賢黃陂人知豐縣築新堤崇節孝抑奸貪雪幽滯緩征薄斂與民休息豐縣志劉順之馬平人隆慶六年知徐州徐頻年被水築張村站堤塞房村決口乂創築周圍護城堤遍歷郊原問民間疾苦請賑恤之嵗旱禱雨輒應火延城樓望拜即滅居四年百度具飭徐州志吳文光高安人萬厯元年知豐縣裁冗役修縷堤墾荒田作士氣貧民有逋賦者請以地變直措資市為學田豐縣志王廷卿荆門人為碭山令多方撫字賢聲流聞當路薦章凡七上萬厯初入覲上簡循吏得二十五人廷卿與焉碭山縣志申其學日照人萬厯十年知睢寧縣建城築堤不擾民亦不糜公帑舉行保甲鄉約皆有實效睢寧縣志傅惟翼富順人萬厯四十五年知徐州為政簡要凡可因者因之不可者務與衆參酌而後去賦平役省循良為一時之冠徐州志張鏡心字湛虛磁州人天啓四年知蕭縣里長苦丁糧繁費過多鏡心自為解兌不以纍民邑內有故河久湮疏通之得增民田千頃蕭縣志國朝周祚永西安人順治十一年知宿遷縣招流移墾荒瘠徴賦令民自封納匱盡除耗羡米麥二稅收用制斛革行户供應之擾胥𨽻非奉憲檄不濫差遣四境晏然王相呂泰州舉人授睢寧教諭順治九年膠寇陷城抗義不屈遂被害奉㫖贈國子監博士李之實夀州嵗貢授睢寧訓導順治九年膠寇陷城抗義不屈與教諭王相呂同被害奉㫖贈國子監博士江鴈卿江西人康熙八年知徐州政尚寬和不事刑撲州舊有版荒地四千七百餘頃丁糧未除力請上官題免卒於官囊無一錢州民為之營殮以上舊通志李允貞德州人順治二年知豐縣時經制未定賦役孔亟允貞秩然有條應以暇豫民得不擾會碭山令缺頑民煽亂奉檄兼攝碭事時首惡已就擒鎮將欲窮治寇黨允貞亷其無辜具文陳請願以身家保之事得寢因撫綏招徠逃亡者皆復業明年代者至百姓攀轅泣送之閻玿太原人順治三年知豐縣每周咨邑中利病輒與興除禁兑糧解頭及收糧大户民尤便之時山東逋寇未殄玿解槖增修土城不以費民孫枝蕃三原人康熙十二年知徐州時黃河泛溢居民洶懼乃出私錢募人夫取石築堤護城城賴以全州苦協濟夫役一徵發率數百千人枝蕃力請免之滇閩變作官兵道徐竭力供億不擾民間以勞卒官佟國弼奉天人康熙三十九年知徐州嵗饑力請蠲賑嘗發常平倉麥二千石假貸饑民明年又饑民不能盡償國弼代為償之河北田舊無隄數遭水患乃出私錢築子堰數十里嵗得有秋徐俗貧人産子多不舉捐資立育嬰堂募乳嫗哺養存活頗衆卒於官奔哭者不絶太倉州宋高衍孫嘉定初置縣衍孫首知縣事創建治廨城隍坊陌壇壝學校靡不周飭太倉州志元伊埒哈雅䝉古人任崇明達嚕噶齊嵗旱齊宿寶慶觀禱雨妻死弗顧謂家人曰女等殮之吾為民禱雨未獲不可歸也言既雨大注崇明縣志孟集至正間知崇明州州有三沙東沙視兩沙為最貧不宜五榖米常貴集置常平倉於州治之南以時糶糴價乃平崇明縣志巴哩雅至正間崇明州達嚕噶齊州址為潮吞齧相地遷之崇明縣志任立太原人授嘉定知州釋寃獄四十九人嵗祲全活饑民六千餘户嘉定縣志明劉秩字伯序豐城人吳元年知崇明州渡海誓曰茍犯民秋毫者有如此水既至興利除害奏減酒稅鹽課與塗田未成而有賦者章四上嵗省三萬石有竒南畿志王瑛建安人洪武中知崇明時徙建城郭創縣治定坊巷構公宇相度經畫瑛之功居多從子鋭正統中亦令崇明審驗人户定其徭役貢賦之法庠士素乏科第選敏者與講經傳竄改程業自是登庸相望時天旱蝻生為文祭八蠟之神即雨三日葉盛撰刻石文練達新淦人建文間知嘉定縣視事甫三月靖難師渡江從父子寧被誅達知不免一夕載妻子赴海死嘉定縣志連俊邠州人宣德中知崇明縣嵗旱正賦缺供俊請以麥豆代解報可民以為便明年復大饑乃請借常熟官糧萬石賑給海中田坍糧存者悉言於大吏奏蠲之南畿志祖述字尚賢宣德中以福建參政左遷知嘉定邑田數嚙於海賦無所出上疏蠲之又嵗造船以供漕運及溉田之河久淤塞悉疏上聞自是船罷造而河亦浚南畿志龍晉吉水人天順元年由御史出知嘉定縣有獄訟纍年不決者晉至立辨決之吳淞江鹽鐵塘久淤塞晉督丁夫開浚獲一石刻於江岸其文曰得一龍江水通人為歎異嘉定縣志吳哲成化間知嘉定誠心質行常以六事針之座右嘉定縣志李端字表正棗陽人𢎞治十年立太倉州端以御史知州事時當草創兩衛辨爭長軍伍侮鄉民端平以法皆斂手服太倉州志王應鵬正德間知嘉定縣被召赴京僚佐餽贐一介不取行至淮有持金二鎰布百匹以獻者驚問之曰感恩切骨敢以為獻應鵬笑曰有是哉乃受布一匹仍製衣以賞篙工其清介如此嘉定縣志倪宗正餘姚人正德中由翰林出知太倉州嵗大水賑活甚衆復條陳地方利弊六事於朝凡興水利均田稅數十年皆用其策太倉州志李資坤字伯生昆陽州人嘉靖中知嘉定清節絶倫尤篤於風義建忠孝貞烈二祠立社學十有六皆有田有廛為圖永久嘉定縣志熊桴字元乘武昌人嘉靖間知太倉州倭薄城桴晝夜守禦倭退苦旱請上官疏免一嵗稅糧孑遺全活太倉州志陳如松字向南同安人知太倉州負高才有强力事無劇易立解嘗試童子千餘一日夜榜發有遺斥者求署如松問姓名隨誦其疵句大驚而退太倉州志馬麟字子振嘉靖間知嘉定縣嚴重寡言笑邑有桀黠為伍衆患苦之一日密召其魁令自相摘發先後盡置之法嘗濬練祁塘自治城至外岡鎮止舍於外七日而畢工嘉定縣志張守直字時舉遵化人嘉靖中知嘉定故事賦入例有收頭一充是役無不破家守直罷不復用諸如庫子里長為民所不便者悉罷之嘉定縣志萬思謙字益甫南昌人嘉靖中知嘉定倭寇薄東城乘風焚倉舍城幾陷思謙叩頭籲天風反火滅賊酋中矢石死乃解去邑城土堞難守請易以甓明年城成賊果大至恃以無恐嘉定縣志唐一岑嘉靖間知崇明縣時縣治新徙平洋沙一岑築城未畢倭寇猝至死之崇明縣志韓浚字邃之淄川人萬厯間知嘉定催科舊以十日為期浚易之以月茍輸將如約則終嵗不至縣庭有鄉民入市橫被毆劫不識其主名浚訊知形狀曰此必某某捕之不刑而服嘉定縣志張世臣新野人萬厯二十九年知崇明縣築海堤七十餘里捍田萬餘頃崇明縣志王廷舉萬厯中嘉定教諭與諸生砥礪名節邑令知其賢數咨以政人謂與侯昵欲有所干望其顔色輒慚沮而退嘉定縣志劉士斗字瞻夫南海人崇禎時知太倉州官衙不取一物值生子市吳紬四尺人以為竒太倉州志錢肅樂字希聲鄞縣人知太倉州不畏强禦常以孝友勸導州民有母訟子扶其子令跪母前因諭其母以爾子罪不至死且子死將誰依皆感動泣謝去有兄弟訟者曰汝小忿奈何傷天性盍退思之越數日兄弟果來謝太倉州志李玉森字木公高要人崇禎時為嘉定丞甫至謁直指其僚俱叩頭襲不典之稱玉森獨長跪呼大人直指怒玉森極論大人之名美而未易踐不典之稱乃輿臺小人所宜直指改容禮之嘉定縣志文祖堯字心傳雲南人崇禎時為太倉學正繕文廟整祭器諄諄訓諸生以聖賢之道已而棄官寓荒寺尋歸卒於道諸生即寓室為祠曰思賢廬太倉州志國朝閔有義孝感人順治二年嘉定典史盜入城焚劫縣庫巡撫王國寶疑有變欲遣兵屠戮有義叩頭力爭乃止白登明字林九蓋州人太倉州知州甫蒞任立四禁一衙蠧一地棍一賭博一奸淫犯者置重法境內肅然訪究地方利弊纎悉皆知之故摘發無不中鄰境有寃抑者輒訴上官願下州為理其為政以誅强暴全善類為務州田高仰需蓄泄自劉河湮塞嵗苦旱潦乃先濬朱涇後及劉河凡六十里不兩月告竣州及崑嘉二邑咸賴其利舊通志潘師質字敏慎宜春人知嘉定縣官舍蕭然日食粗糲時邑蠧導衛辨為奸索額外加漕耗若干師質置不應會民毆擊其為首者致殞憲府檄詰其事師質自投秦淮河死而以書繫臂極言衛辨加耗之害百姓聞者無不感泣舊通志陳慎字懷藎文安人順治十年授崇明知縣會海潮溢傷禾稼慎力請於撫臣具題邀免本年正供一萬八千有竒復設法賑恤民賴全活者甚衆十六年海寇犯江寧崇邑孤懸海外慎練鄉勇措兵餉以死守之築文成壩使兩沙聲勢聨絡民恃以無恐積勞成疾卒以守禦功察司僉事陸隴其字稼書平湖人康熙庚戌進士授嘉定知縣縣俗婚喪諸禮多以侈靡相倣效隴其下令禁飭示以品制而率之勤儉為政務鋤强梗抑胥吏然不甚拘於法輒以至情悱惻相感動大賈某結長吏橫行里中僕占賣薪者妻論如律某大恐諭之曰人無不可自新若自新未晚某感泣一變前所為市鎮少年數十為朋以拳勇毆擊為事亷其尤者責而械於門出入臨視誡諭警切視其情色果悔而釋之其黨悉散役𨽻向以千數後乃稍稍易業自去踰年訟者絶少催科立甘限法應輸者自限輸若干届期及半即得宥以故絶不用杖而輸者爭至性淡泊一介不取食米俱自平湖載來署中隙地種蔬自給婢嫗治織絍每公事出父老爭看清官上官嫌其儒生迂緩劾去之民罷市三日乞留不得去之日送者數萬人填塞道路所著困勉録三魚堂集等書闡發義理有功後學崇祀名宦雍正二年奉㫖升入文廟從祀西廡海州南北朝齊桓崇祖字敬逺下邳人泰始二年崇祖自魏將部曲奔朐山宋以為戍主魏人襲之城中大懼皆下船欲去崇祖曰賊非有宿謀者可急去二里外大呼而來云艾塘義人已破賊請戍軍速往逐之舟中人果喜爭上岸崇祖引入據城堅守遣羸弱入島人持兩炬登山鼓譟魏軍乃退齊書本傳隋張孝徴東海令嘗築西海堰捍潮民免水患南畿志元曖東海令於境內築兩堰西南接蒼梧山東北至巨平山外捍海潮內貯山水民獲灌溉之利南畿志唐杜令昭海州刺史值海漲築永安隄以防民患南畿志宋石延年字曼卿通判海州廉能有為吏民悅服南畿志孫洙字巨源廣陵人神宗時知海州免役法行常平使者欲加斂緡錢洙力爭之旱蝗為害禱朐山得雨蝗赴海死宋史本傳劉彝字執中福州人知朐山恤孤寡作陂池教種藝平賦抑奸邑人紀其事目曰治範宋史本傳張叔夜字稽仲徽宗時知海州宋江趨海濵劫巨舟十餘載鹵獲叔夜設伏近城而出輕兵距海誘之戰先匿壯士海旁伺兵合舉火焚其舟賊聞之皆無鬬志伏兵乘之擒其副賊江乃降宋史本傳侯畐字道子樂清人寶佑五年通判海州兼河南府計議官李松夀據山東突出漣泗間畐鏖城下死之闔門遇害太學生三十二人言於朝即海州賜廟諡曰節毅宋史忠義傳元沂川至元二年知沭陽縣創建縣治修學宫招徠流亡教之樹畜南畿志明郎廷圭湖廣人洪武初知贛榆縣百度皆所創建南畿志馬希賢浙江人洪武八年知沭陽專務德化不尚刑威興利除弊知無不為南畿志陶昺南城人成化五年知海州有守有為衆務具舉海州志陸逺秀水人成化間知海州途遇怪風遣吏跡之風所止處有人死樹下亷得謀殺者置之法又中途犢鳴馬前驅之不去隨犢至坡下有盜牛者殺其母一訊而服人以為神海州志劉魁高唐人成化間知贛榆公平亷潔去後民思之南畿志王舉鄒縣人成化中知贛榆亷明擢御史贛榆縣志林廷玉𢎞治中由工科謫判海州清明果斷學宫及祠廟壇壝次第修治南畿志盛鵬襄城人先知贛榆調沭陽均徭薄稅興學恤民沭陽縣志王相汝寧人正德初知沭陽流賊犯境築壘濬濠民賴以安沭陽縣志易瓚肅寧人正德中知沭陽流寇初平治尚寬厚省刑薄斂逃民悉歸沭陽縣志陳治典宋平人嘉靖末知贛榆招撫流移與民休息胥吏作奸生事痛懲抑之贛榆縣志劉士燝遼東人崇禎十五年以江都教諭署沭陽縣事尋實授得士民心十六年城破死之沭陽縣志國朝穆爾謨山海人順治四年知贛榆縣精明嚴毅聽斷如流羽寇猖獗爾謨親率鄉兵勦捕民賴以安遷內部主事舊通志李士麟定襄人順治六年授海州同知居官慈恕臨事果毅海寇薄城士麟登陴守禦間督鄉勇出竒兵擊之已而賊大至城潰被執不屈死之通州宋曾易占祥符間知如臯縣嵗大饑請於州得越海轉粟全活數萬人明年稍稔州課民賦如常易占力請緩至嵗盡又立孔子廟諷縣人興於學王安石太常博士曾公墓志王隨字子正河南人乾興間以祕書少監出知通州州瀕海人不知學隨徙孔子廟起學舍州人喜始遣子弟就學宋史本傳吳遵路字安道丹陽人明道二年知通州時天下旱蝗遵路乘未饑時募閭右出錢遣人航海糴米以備平糶又結蓬茆百間出俸設糜以處流移諸郡多轉死惟通獨完後為淮南轉運副使於真泰高郵軍廣常平儲蓄備賑置斗門十九以蓄泄水利凡所規畫後皆便之宋史本傳任建中寶元間通判通州築隄二十里以捍江潮田無嚙沒民咸稱為任公隄南畿志沈起字興宗鄞人至和中知海門縣瀕海地卑間嵗潮至冒民田舍起為築隄百里引江水灌溉其中田益闢民相率以歸至立祠以報宋史本傳胡安國字康侯崇安人以右文殿修撰知通州會敵薄都城安國子寅為郎在城中或憂之安國曰主上被重圍臣子方恨效死無路敢愛子乎南畿志李大有東陽人通州通判農月苦旱大有鑿狼山麓引江水入河溉之嵗以大稔通州志元張𢎞綱字憲臣益都人定逺大將軍招討使鎮江隂盜起安吉𢎞綱率兵往捕未踰旬擒之元史本傳明熊春洪武初知通州自州治學校以至旗亭郵舍一皆春所創建吏弊民奸釐剔殆盡南畿志蕭盛陽武人成化間判通州修學宫濬河渠造橋梁築隄岸百二十里民享其利南畿志蔡暹成化間知泰興縣築江堰一萬六千餘丈賑借饑糧一萬三千餘石南畿志鄭重字本𢎞慈溪人成化二十年知通州修石閘唐家壩水洞十五所重濬金沙河及西亭河數十里葺明倫堂及齊舍三十餘間通州志劉文寵玉田人𢎞治四年知如臯縣縣養馬止百匹永樂間六安州以災暫寄養馬千三百餘匹沿習不改大為民厲值朝使清理馬政文寵力請如原額如臯縣志羅賢蓬溪人𢎞治中知泰興敝衣垢履有寺僧與民爭田不得因獻於貴戚賢曰貧民恆業詎可奪以媚豪貴哉執法愈堅泰興縣志黃璉山西人正德七年泰興主簿流賊經縣劫掠璉率民兵與戰生擒賊黨李南乘勝追奔被創死泰興縣志裴紹宗字伯修渭南人正德十三年令海門裁抑浮費奏蠲坍糧後官給事中以諫死南畿志張承恩字君賜易州人正德間知通州不避彊禦有獻沙漲田於戚畹者承恩曰若彼得地吾民失業逃矣出榜諭之其人懾而止通州志黎堯勳四川人嘉靖中知如臯縣豪室悍竈兼并為患堯勳特請均田辨肥磽以定稅分上中下三則迄今便之如臯縣志稽鑘德清人嘉靖中知如臯縣甫至罷私奉金二千有竒釋坐盜誣者十八人與戍將約毋犯民俄卒殺漁者鑘執而詰之卒伏辜如臯縣志包柳芳嘉興人隆慶三年以督學左遷通州運判初至海潮大作溺死人畜無算柳芳行勘以舊隄主省費各竈户多在堤外今當迂十五六里費雖多然有益於民堤成民為立祠呼其堤曰包公堤通州志李衷純字元白秀水人萬厯末知如臯縣瀕海徙嚙不時或有浮漲成洲豪家輒據為業洲民爭之不得則以其田獻於勳辨每秋穫戈船旗鼓勢猖甚𠂻純單車諭解之有大盜數百倚洲恣劫衷純捕馘其渠餘醜盡散造戰艦募兵巡邏江上以寧如臯縣志國朝陳棐光州人順治二年知泰興縣邑中伏莽與援將相抗棐守禦策應盡協機宜寇盜屏息丈田畝均賦役平獄訟繕學宫以最擢御史舊通志陳秉彝字大倫奉天人順治五年知如臯縣留心利弊興革得宜九年淫雨江水泛民多流亡秉彜倡募設賑三月全活甚衆邑人許吏部直明季殉難秉彜擢諫垣為特疏請恤舊通志江南通志卷一百十五
