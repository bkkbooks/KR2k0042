body:
  text: 江南通志卷六十六河渠志水利治績四上江八府和廣泗三州安慶府明嘉靖元年安慶知府胡纘宗開潛山縣吳塘石渠附汪偉潛山新開吳塘石渠記潛山縣有故堰曰吳塘蓋因潛水堤匯而渠之以溉田凡三千七百餘頃土疏善崩渠壅水行弗利則怒而齧其堤堤嵗苦決有旱熯憂安慶府胡侯治郡之三年間行部至潛山縣令許儼白吳塘之役侯相其地宜曰不一勞者不永逸乃改築於上流鑿山麓之石為渠凡二百餘尺廣十有六尺深加廣四之一水入石渠順其性安流徐行以達于土溝以灌于田嵗乃大熟矣於是民歌之曰郡有賢守鑿石渠石堅渠深水平趨工不再興田常濡私足粒食官無逋昔為吴塘今姓胡千秋萬年名與俱令來請記曰俾後之人有考也予考圖志吳塘始于漢末廬江守朱元光及讀劉馥傳建安間劉馥為揚州刺史嘗興七門吳塘諸堤以利稻田至今潛人但知元光而不言馥豈馥于七門之功鉅故遂掩吳塘耶夫七門實始于羮頡侯信馥因舊而修復之耳史不錄信功而舒人並祀之惟謹是史或有遺而功徳結于人心者不磨也侯因吳塘而剏為石渠又有烏石堰者修築堅厚倍于舊功不在諸賢後矣民豈忘之哉國朝順治九年宿松知縣孫繼文督修蓮花荆橋羅隠諸塘十八年潛山令常大忠遷吳塘堰附金闇潛山吳塘堰碑記吳塘陂起于漢末朱廬江而修于建安劉刺史偉哉前人之功高不朽也及讀陂碑石金壩玉渠溉田三千七百餘頃所載郡伯胡可泉邑侯于䢴陽修築之事甚悉然皆因勢利導修殘補缺不至勞師動衆創起非常也前明之季水齧堤頽沙高水壅所謂玉渠金壩者不可復認而告旱告澇嵗無餘日己亥春我常侯之令潛也靡利不興靡廢不起越二年親厯經營相地宜酌水勢乃進居民而導之曰不一勞者不永逸非僅依傍前人拘倣成案因陋就簡之可塞責者于是過吳塘五里而築新堤起新牐遷其堰于兩河衝口自捐俸倡率外計户口起工照丈冊引費無科派供億之煩有畚鍤版築之便無偏枯騷動之擾有鼛鼔靈臺之歡權輿于辛丑冬而告成于壬寅夏旱澇有備蓄洩有防石田變為沃壤泛濫歸于安瀾事半功倍費省利周不止可泉之甃石成堤䢴陽之因山起牐補苴修葺從事已耳康熙十年增築宿松縣蓮花荆橋諸塘十一年望江縣知縣劉天維修築西圩附龍燮修築西圩記邑東北有西圩者居民數千家衣冠世族多萃于此以田論之計三萬七千餘畝地勢卑下潛太之山洪注焉京皖之江漲匯焉民居國賦惟堤是賴先年立十二甲照畝編冊照冊分堤内有上下二坂三湖蓄水惟下坂水歸之壑遇澇為災明天啓間邑令方懋徳親臨圩堤目擊形勢始開牐洩水下坂乃䝉利焉至順治四年一潰孝廉檀志嶽生員吳之份等白道憲石公郡守桑公邑令趙汝璽檄教諭江秉一築之迄今二十餘年累潰累修亦旋修旋潰豈功實難成抑所以經理者未盡善耶壬子春劉侯甫下車問民疾苦留念圩堤或有謂工可緩者侯曰不然今淮揚之被水患者數年矣余何敢坐視爰進圩中諸父老商確形勢委官修築之凡所以經營相度者悉秉侯之心計不啻目營指畫焉畚鍤雲集不日竣工堅固什倍于疇昔由是水不能灾農獲有秋而正供無缺額矣夫一圩耳向以累年修之而不足今以一日葺之而有餘利澤之興豈不以人哉誠使良法美意踵而行之吾且為歌潟鹵生稻粱矣桐城知縣胡必選修城北河堤附胡必選桐城修河紀事桐於皖望邑也城北有河發源于龍眠諸山由是而東而南匯大湖達長江其支流所引為西南疆畝水利苐春夏之交衆流合聚激濺若雷數年來直衝北郭下駸駸乎有内齧城址之患矣必選自丙午冬承乏兹土登城省視即以水害為慮爰具文請諸各鄉先達並謀之耆老倣昔人疏浚之法日募工若干深浚河行故道束之使不得他出鱗修水牮復為雉堞作干城無如河勢甚盛奔放潰決其為城之患猶夫昔也乃更捐餐措費禱神興工命鄉耆等董厥事甃之以石實之以磔鎮之以鐵橜之以松依城為隄而深固其防不使陽侯之虐得肆其憑陵幸賴司寇姚太常程刺史彭樞部陳暨諸先生急公捐助左提右挈民咸欣欣樂赴而遂臻厥成是役也始于壬子夏報竣於秋其隄長七十有八丈深一丈有三尺横亘稱之徽州府宋紹定四年建徽州府石梁附錢時記紫陽之麓絶流為梁瀦為淵其來尚矣中罹蕩圮障以石邦人士輙不利障以木輙利時不能隂陽家言嘗厯星源過祁山皆西流入番江餘諸邑東入浙問之三老各三百六十灘石林立勢斗下尤險絶者立檣以識踰三十尺是新安地最高環城三面可揭渉勢然也辟之於人不為淺澁為澄涵氣象則自衍裕梁之利也固宜然立柵磽磧之上而聚石其中霖潦暴豪何能鍾固嵗一葺或間嵗大葺科役民位覃害不細况木之障水猶絺障風迸漏穿洩草草而已嘉定十七年秋著作郎官袁公甫解郡符且東歸慨念利興而害不除非便必大錮石為不朽計乃於是籍緡錢五萬千聞於上紹定二年將指庾臺始克議兹役推官趙希愬董之得閩工甚精鑿山料材彚别三品直而方者曰眉石層疊繩整嚴邊幅也狹而長首方而末削若釘若斧者曰算石斜透中通互穿鏁也其磊塊不可尺度者曰囊石補漏罅實要腹大抵魁傑輪囷有力勢梯轉而下将海而來機運而登皆極巧便眉算迭用左右蓬卷凡十有八層而後周内固外圓不鬭於水斗門東瀉不怒其流闊三丈高半之横亘可二十倍越四年九月竣事明天順八年休寧縣人汪世寧築兗山堨附吳寛休寧縣兗山二堨記休寧為縣多山山中之田其勢因山以髙而雨水不多得也幸而兩崖之間有渠可以溉田然源上而流下不啻若高屋之建瓴其勢特瀉而去也乃有障之之法而堨以築堨即堰也縣人之語然耳此法既善而其利且多及夫春夏之月上源溢下流湍悍所謂堨者或薄與狹且衝激以壊則屢有築之之勞而人亦困蓋縣之東南曰兗山有水自遂安白霽嶺而來厯百餘里入浙河而去至此流甚下水甚急而其渠甚堨之築始難為功前此成而復壊者不知其幾矣里人汪志徳世寧讀書好義而多才識嘗以改築堨事言於縣縣令信之委為堨長乃率其衆籍於官計田畝出財力二堨先後從事起於天順壬午之秋畢於甲申之冬其渠長及四里補缺塞漏不遺餘力於是水道既修天時無患田率有秋里人徳之世寧因其弟新昌令世行至京師請記其事以示後人俾勿壊萬厯中休寧縣知縣魯㸃築陽山魯公堤附邵杰記按周禮司險掌山林川澤之阻達道路設溝涂樹之林以為阻衛夫非以其關國家利患哉寧惟天下邑亦宜然我休山居土瘠平原沃野屈指可窮則民實利之西郊去治五里許山曰陽山云下多古墓厥田平曠蕭梁以來故有寺即以山名寺松蘿障其北黟江帶其南故曰鳳凰山而東宋邑治在焉頃嵗江流右遷從石人落石南下故道漸為桑田山口有橋曰蕃桂以滙衆流山灣有亭曰紫陽以記田賦四方來遊白嶽必經於斯且為池陽豫章孔道嘉靖間邑成城埏埴者利一時便宜陶兹道側後遂為所據山川形勝欿然失色見者莫不四顧而嗟世逺相沿膏壤幾盡以故潦水泛濫道路傾頽輿不得方軌馬不得並轡行人重足而步指為畏途凡四方躡屩擔簦乗軒策杖而來者趦趄道隅履﨑嶇而過邑侯魯公下車令民修築東補西崩未戒厥害城西兩太學汪生以先世封樹在懼其浸漬靡所底止於是帥子弟上書言為害狀越月侯視事西郊目之所擊果符上書狀太息久之令下陶者逺徙两太學喻侯徳意疏請修築自蕃桂橋迄紫陽亭丈五百有竒鳩工采石隘者廣險者坦踰二年而堤成平若砥長若虹蜿若游龍堤畔崇壇為亭以憩行者東西相距屹然中立明年種桃植栁夾岸皆春綠樹扶疎清風披拂遂成我休負郭勝槩㣲獨耕不失畔而若輿若箠若跣若徒若負擔若捆載若乞靈而登封繹繹乎熙熙乎如登春臺而遊康莊矣行者色喜而呼曰魯公堤魯公堤識侯之再造也侯治績最著今入為司農即兩太學與予結姻家好屬予紀顚末勒之石以志不忘予惟是役也五美具焉以蘇地脈以障水患以復田疇以利行人以增形勝司險氏所必稽而實民牧所宜有事也質之古昔若楚則孫叔敖之起芍陂漢則召信臣之約南陽唐則李襲之築雷陂宋則范希文之堤同泰要之皆是役也魯侯不狃於茍安不難於積蠧一旦毅然與民更新即謂古名臣舉事誰曰不然嗟夫天下事大都始乎一綫卒乎滔天始乎徐徐卒乎陵替而不復振隳於隨而成於斷獨一堤然乎哉侯保障吾休隨處安堵兹上奉内召桑土綢繆素所樹耳奚俟不佞溢美為乃蔽芾穠隂吾民永賴斯堤也洵侯之甘棠也夫侯名㸃字子與别號樂同為楚南漳人同予登進士兩太學仲名應時李名應邦以尚義世其家法得備書見堤所由成與所由名云三十五年歙縣知縣張濤築張公堤國朝康熙二十七年徽州知府朱廷梅修漁梁壩附朱廷梅修漁梁壩記徽城東倚山西南北三面距新安江以置郡治江合歙黟休寧祁門績溪五邑之水大滙於歙浦以入於浙為灘三百六十地極斗峻水無停流宋嘉定間郡守未長文閔衝激之為患立柵以遏下流後守袁甫繼之更議疊石為壩未及興役而去留緡錢萬五千聞於朝俾繼者成之元明又復圮壞𢎞治間郡守張正出帑錢即故址重砌以石凡九層蓄水二三里錢塘倪公岳記之未三年復圯郡守彭澤乃去壩囊中砂礫實以方石下流更為梯級用殺水勢楊公循吉記之至明末益圯自後守兹土者不敢議修復非怠事也工大費繁民不堪任予不佞承乏兹郡皇皇憂之慮民氣之不静民俗之未醇吳太史告予曰漁梁不修徽俗將日敝為厯言往事多有明徵予甫下車即申請撫憲并致書紳士之家廣陵者紳士誼篤維桑慨任工費予喜出望外於是循江而觀逡巡周覽擇日祭告以戊辰正月八日開工得吳子崧汪子士鋐吳子瞻泰倣嚴郡之石梁規制縱横各半中為鰲背而坦其脊更擇石於城之北鄉色青而理堅斧鑿不易施補罅實腹咸以之舊石屏不用左右蓬卷凡青石二十餘層闊三丈高半之横亘二十倍内固外密上為三水門於是瀉者瀦奔趨者止郡以西渟瀠浩瀚儼乎巨浸而功以告成郡紳士請予誌之予謂是役也為六邑資灌溉而且學校以光民生用遂余得藉是以上報聖天子眷顧之隆與好義諸公共成其美襄事諸子樂觀其成即以為不朽盛事也可寧國府唐上元中觀察使薛邕築薛公堰引水溉田大厯三年觀察使陳少游置徳政陂元和四年重興大農陂附韋瓘大農陂記畧宣郡支邑十城而南陵處劇今地官侍郎盧公觀察宣部重難邑長乃以寧國令順陽范君假南陵印焉先時縣有廢陂曰大農積嵗不理荒梗幽扈邱隰遁形非郷黨之壽耋不可擬識范君乃召郷老正尹而計之具畚挶列綆鍤披材輦壤周察勢便於是伐莽闢蕪培高徹卑潛軼化工三旬而畢驅長江波六十里活活下來闢荒埂數萬畝汪汪虚明疊石構嶺三百步横殺衝波擘發二港支分脈散雖使驚濤懐山亦不能軼峻防而侵厚址豈非仁深於千物乎其或火雲爇天順勢導流則貫畦浮塍嵗溉頃斯功也可以灼當世而芳千古矣咸通五年修築永豐陂咸通中重修大農陂及肖陂五代南唐築大農陂置石堰開荒埂數百畝宋淳熙十四年重脩肖陂十五年南陵令郭蕘重修大農陂永豐陂附謝諤重修大農陂永豐陂記南陵有二陂曰大農曰永豐邑之田資以灌溉焉邑侯郭君蕘初至郡考圖志見邑人徐内翰元功舊有永豐陂叙而大農陂則韋司農所撰記甚明乃知大農重興於元和永豐重修於咸和本朝熙寧中嘗捐常平鈔米三萬五千餘貫石復修葺之自後稍就堙廢田日告病郭君乃白於常平提舉謝公深甫竟如所請移文支撥緡斛委主簿徐挺之同力計視竊按二陂之源由涇水合山溪衆流為江出蕪湖中厯邑界江闊地平横絶其流開港以遏導江水股分支引散入溝塍間所為陂因是江也大農在上流源流七十餘里溉田五萬餘畝永豐在下流源流六十餘里溉田三萬餘畝凡縣賦兩陂所屬三分之一乃鳩工於丁未之冬訖事於戊申之夏噫君子之仕以利民也吾觀親民於百里者可以日有利民之實然利於當時其利小為久逺之計視當時為何如耶所冀後之君子增其所損補其所不及非特成人之美亦以垂利澤於無窮也明隆慶中涇縣令開承流壩溉田二千畝萬厯九年南陵縣令沈堯中築北關堰十一年南陵縣令沈堯中築萬年堰十三年南陵縣令沈堯中築西溪堰四十七年修築宣城諸圩附湯賓尹修築宣城諸圩記畧宣山城也而池歙桐汭之水四集其鄉東壩居其委流復代三吳瀦水其下贍窮瘠而上應天子正供獨諸圩是賴金寶一圩計畝可十三萬其餘牽連相輔以成圩可百十夫圩與水争地者也從國初至今人民漸稠墾藝漸博圩之數日多則居水之處日減居水處日減則其激而行也日悍萬厯四十七年直指麻城田公生金巡視及宣省耕省斂問民疾苦郷三老以圩事對公慨然曰某天子巡方使者一方失養其責在某已下教宣城曰若為天子牧民官小民失養在若於是宣城縣令賴侯良佐親詣水鄉周行按視盡得其頽潰衝決之數自遮浪保安寳成以迄諸圩凡一十七所估工修葺合之凡一千七百餘金以上直指公公立發贖金首事撫臺胡公應台寧太道蘇公進郡縣各捐助有差仍不足者民間得計畛佐成之公又為畫一之禁民領費官督事舉輂無緩擿埴無遫崇廣支擘勾股合宜暨於事竣水防循理塍埓得職其年潦而不害天啓元年築張公壩國朝康熙五十九年加築東溪石堰池州府宋周湛築新河宋史仁宗末周湛為江淮制置發運使謂大江厯舒州長風沙其地最險者石牌灣役三十萬工鑿河十里以避之人以為利神宗初鼂仲參以通判舒州攝州事以羅刹石之險請鑿秋口浦樅陽渠以避之報可明成化二十一年石埭縣知縣蕭環築南洪口陂附張輝蕭侯陂記縣治之北曰故院環城附郭田以萬計賦以百計舊有陂故圮成化乙巳蕭侯來莅邑乃會羣屬而謀曰吾將即農隙借民力於故院陂之下築堰鑿溝引水以灌田可乎衆皆舉手加額乃上其事於巡撫可其言於是捐俸貲貸倉廩然後以十夫為甲十甲為總以董之計其田之多寡水之逺近出金以償之寅符協同爰命工於治南洪口築陂一處鑿溝一匝深三尺達三里許兼舊溝而濬之不數月而功成民仰其利作歌以頌侯又甃石匾為蕭侯陂請記於干予惟侯自下車政皆仁愛以民所欲在水利尤惓惓焉若巫園若烏隴凡十餘地皆無陂侯令民築之使有備無患今復修此溝堰以利民食足而賦足其利澤不亦逺乎正徳十一年知府何紹正作新河堤知府何紹正築何公堤在城西新河口長四十丈高三丈以障江水隆慶中知縣姚孟賢濬新河萬厯中理刑秦懋義築翠微堤又兵備副使馮叔吉築千栁堤貴池縣知縣王啓棠修千栁堤知府趙安治查村堰淤淺者浚之曲防者撤之灌田一千三百餘畝國朝順治中知府梁應元修翠微千栁二堤後知府顔敏重修太平府南北朝齊竟陵王子良表上遣五官殷濔等巡履丹陽等縣得堪墾之田合計荒熟有八千五百五十四頃治塘遏水用夫十一萬八千餘一春就功便可成立㑹遷官事寢宋紹興二十三年大水諸圩盡決遣鍾世明相視修築當塗縣知縣張津築長圩一百八十里包諸小圩又為民築者四百七十二所隆興二年户部侍郎葉衡奉詔核實太平州圩岸黄池鎮福定圩周四十餘里延壽等五十四圩周一百五十餘里并濱岸植榆栁下詔褒美乾道九年詔修圩岸當塗奉詔修築四百七十二所元至治元年當塗令陳昌浚市河附徐抗翁浚市河記有城邑則必有河渠流汙瀦清通舟楫溉田疇濟常用備不虞河渠之利大矣矧太平處江湖之間欲左控右引以致江湖之利河渠其可久廢而弗治哉府治西舊有市河南起姑溪北抵襄城延袤千有九丈按圖經剏於宋初而遺其年自慶元以後不復濬治堙塞成平壤居民侵之其間僅如一帯之隠軫者人指之曰此市河之址也壅底弗宣水土鹵墊民病湫隘延祐七年永嘉陳君昌來司都獄因攝當塗事建明浚河府下其議咸曰太平地形便市河舊有之然堙塞八十年營田不能浚都水不能治今欲復還其舊不已難乎陳君曰不然惟患誠之不立至誠可以貫金石矧復舊耶主之尤力府從其議就倚辦焉於是程土物議逺邇規財費商工力捐帑以倡衆皆樂於效命凡募夫五千餘經始於至治元年八月明年閏五月卒事波流上下潮汐與海通淪漣清泚槐栁隂翳於兩旁紫鱗文貝風帆雨檣憧憧來往如人之新沐而眉目增明秀也餘波溉田數百頃民獲其利昔之誦子産者轉而誦君矣至正四年照磨石處遁命曹吏朱榮甫修復壊圩三百六十餘所明永樂八年詔修圩岸以備風濤萬厯三十六年知縣朱汝鰲修築官圩隄岸畫段分工高三尺闊倍之作中心埂自青山屬黄池為官圩西岸至今賴焉廬州府明正綂元年知州王仕錫築黄金城牐嘉靖二年劉欽順增築洋萍舊隄又開溝以通梘溝八稜溝萬厯三年舒城令姚時隣修水利自七門嶺至十丈陂並增築附盛汝謙舒城縣重修水利記舒為江淮要道廬郡塞邑也西去層峯崒起巑巒秀拔綺綰繡錯為郡保障而水利源頭出自西山峻嶺之下勢若建瓴奔騰涌潰羮頡侯分封是邑走西南見小濱大溪下有石洞如門者七乃分為三堰别為九陂瀦為十塘而壋而溝而冲灌田二千餘頃至三國時水泛濫如故得魏劉刺史公馥更加修築明時水復為患得豐城劉公顯增加疏導迄今百餘年矣河勢漸下有陂塘為道路者有壋堰為沙隄者有民間侵占致妨水道者有洶湧湍激而淪没故址者有壅塞横漲漂流民舍十餘里者萬歴乙亥姚侯來涖兹土喟然歎曰食者民之天也水者食之源也水利廢興有司實任其責乃條陳申府及院及部莫不允其議而速其行侯於是同治農主簿趙應卿舍郊野厯險阻遍故老田叟而諏之直窮水之故道由七門嶺以至十丈等陂則為修理由栁楊鹿角以至黄泥等壋則為疏通由舍慈而路沛等處洋萍坡而六冲等壋則為還官他若行水過溝如新壋類難枚舉者又皆悉為躬閲而挑築但見高者平淺者深侵者復泛濫者消除淤填者濬瀹水由地中行而嵗見有秋矣四年舒城令姚時隣重築洋萍陂九年知無為州查志文築神塘隄鳳陽府周定王時楚令尹孫叔敖作芍陂溉田萬頃按芍陂在壽州安豐城南亦曰安豐塘以水逕芍渟積而為湖故謂之芍陂又謂之期思陂與楊泉陂大業陂並楚相孫叔敖所作其水西自六安龍穴山東自濠州横石東南自龍池山胥注於陂陂原設五門後更開三十六門今又作減水牐四座水漲則開門以疏之水消則閉門以蓄之三百餘里支流分注溉田萬餘頃唐顯慶中修治牌湖隄乾封中修千人塘以溉田廣徳二年元載置永樂渠以溉高原田宋熙寧九年劉瑾言宿州虹縣萬安湖小河壽州安豐縣芍陂等可興置欲令轉運司選官覆按從之明永樂間户部尚書鄺埜督夫二萬濬芍陂國朝順治十二年壽州知州李大升重修安豐塘附李大升重修安豐塘記安豐塘者楚令尹孫叔敖所作之芍陂也塘周數百里受洙渒沘三水之支流而下蓄洩以時可灌田萬頃自明季以來新倉之口決引水之河淤民不獲其利者已三十餘年余自癸巳夏來守壽郡詢諸利弊紳衿士庶皆言此塘乃壽土第一利余欲舉行而未之逮焉至乙未春乃得親歴其處相視廢壊之所量工程捐俸入選夫千餘先疏河道之壅塞者一百四十餘丈濬水通流方築新倉棗子門二決口髙厚約十數丈有餘長俱不下百尺許又為之理其門牐補其塘岸不月餘大畧粗具余始具文報於兵憲沈公公喜甚亦捐俸飭修意在利求萬全績垂可久必不為目前茍且計也余隨與州佐議再加巡葺㑹值大雨水勢突至功難驟竟然塘水已盈環塘之民皆負耒而耕秧田遍野是嵗夏苦旱惟安豐一帯全獲有收至八月中仍即其功之未完者更為整頓疏近塘之河土高者十里有餘其減水大牐中心兩溝胥一一濬治保其久而弗替不能不有望於後之君子雍正五年八月兩廣總督孔毓珣摺奏江南鳳陽府屬之宿州靈璧縣應疏濬溝洫奉㫖著江南總督范時繹確查被水之民加恩賑恤並將應行疏濬之水道相度修治使積水暢流不為民害布政司噶爾泰遵動庫銀二萬兩親赴靈璧縣之固鎮起由溧澗鋪至宿州之任橋八里座大店驛至宿州北關符離橋止逐一查勘據土人云一路兩旁之水俱由澮河五河淮河經洪澤湖出清口入黄河歸海當經丈明檄委鳳陽道何宗韓鳳陽府知府刁承祖委官分督用銀八千五百七十三兩零疏浚溝洫俱極深通潁州府五代周顯徳初王溥鎮潁州州境舊有通商渠距淮三百里嵗久堙塞溥疏導之遂通舟楫郡無水患和州唐開元中烏江丞韋丑開韋游溝貞元十六年游重彦修韋游溝宋紹興十二年和州守臣請於千秋澗置斗門以防麻澧湖水瀉入大江遇嵗旱灌溉田疇實為民利從之明洪武二年和州守李相重修銅城牐附宋濂重建銅城牐記和州之西南九十里其鄉曰銅城濱大江江水暴溢民不得田昔人常築土為長堰以捍其衝鑿石作牐門貫以木橽視嵗之旱澇而闔闢之田得以常稔環二百里皆為沃壌比年兵興銅城為往來争戰之塲牐毁堰崩向之沃土皆化為荒穢之區四明李相由京兆出守是州一以慈祥愷悌之政撫摩其瘡痍且以為民之生也恒以食為命無田是無民也銅城之牐安可不急圖之乎遂走白於江淮行中書省省臣是其議乃進父老於庭親勞立為條教先築郭公壩以絶水源次鑿百福山以煆灰石然後大集衆工而役之畚鍤如雲絡岸蔽川不待督程各趨厥事動止無節齊之以鼔刻日而成遥望之猶堅城隠隠矗起於雲際也以尺計之牐髙二十有二廣一十有八長二百有竒牐之兩端疊石為臺以禦迅湍其補築東西堰凡七百有竒其高視牐有加址之廣視高則六倍之别建屋二楹龍王廟一區廟以從民祈禱之欲屋以居守者使司其啓閉經始於洪武元年十一月庚申訖功於明年正月己巳計工八萬九千八百九十皆出於有田之家匹石之費亦視田多寡而均賦之州民相與謀予文刻諸石用昭守之功於無窮使自今以往守兹土者讀斯文而增修其事則斯牐可久而弗壊未必非一助也正綂初知和州朱沅修銅城牐正徳十二年知州黄標修銅城牐國朝康熙二年和州知州楊繼芳築永盛土旺兩圩廣徳州明嘉靖四十五年建平縣令趙佑卿修築山陽等圩附史際重築山陽等圩碑記廣徳之地勢西北下而建平為受水之衝水由南湖西入山陽口兩山當湖之下流為門户隘不可洩則衝激澒洞而為害不有以障之建平得耕而食耶建平之田為圩七十二嘉靖庚申大水壊者十三故往往他郡稱大有年而建無全稔其山陽潘城楊學三圩則為田幾五千畝而圩之壊至十餘里民不得佃東華趙侯之治建也政平而人信稍稍以圩之廢聞前此非莫聞聞而莫有主其事者盖難其始復虞其終故人重自愛惜而蔑能出身當之也侯之始事齋祓而誓於衆曰所不為建終事者有如圩時應天節推頤菴以均徭至侯建白焉節推與之按視其所民從而請且泣者數百於是議以其事上於州上於臺院悉俞其請工取諸民之有田者食取諸邑之義倉先是義倉之米數萬當道因無年議賑恤但賑恤止於一時築圩垂諸百世當道是其議聴令便宜侯因不避風雨經始於丙寅年之春成於是年之夏不數月而三圩之田有疆翼翼有禾彧彧其他圩亦井然一新嵗乃大熟蓋嘗論之人惟私有所顧恤則雖習常安故而朝夕之間恒惴惴焉昔喻子才以軍吏出宣州見城西有敗室入視之廣儲倉也一老卒巢棲而守之牛豕之跡交道其下歎曰吏非不知食之宜理重自凂也使今之當吏者皆如是國胡以賴當侯之倡此也汙萊之塲茫乎不知其涯畔計工焉將煩民計食焉義倉之米不易動稍以向之所云利害者交乎其心其不至葸然而自替者蓋寡乃侯之精誠足以通於神明而其智與才又足以就之百年之廢興於一朝仁人之心志士之事也萬厯二十七年建平縣令朱之楫築浮湖塘國朝康熙十一年建平知縣髙自逺修築東門堤泗州明萬厯初總河侍郎潘季馴重修周家橋牐牐與高良澗古溝等後縁泗水大發議開周橋洩之耆老具狀極言不利南河郎中黄曰謹具辨開橋一疏事遂寢諺云東去不妨開海口西來切莫放周橋寶應治水或問畧或問寳應之水治將何先曰欲開牐洞先濬支河欲濬支河先開海口其勢固然也蓋周橋入淮通濟納黄源源而來者不得不分洩東鄉為運道計則上河之水由諸牐洞而下注者涓滴瀦之支河遡其出口不過東洩牛灣北注葫蘆港已耳而上口鯨吸不止奈何不患腹脹之病乎故牐洞之外非支河不洩支河之水非海口無歸誠多開海口分頭走逸則漲水消民田出矣或問周家橋有無貽害高寳曰周橋與髙堰固一帶耳總在泗之東南節年淮水暴漲從堰溢出輙漫諸湖而去秋尤甚時西風連作鼓浪決堤高寳興鹽之田茫然巨浸此漫溢之水害已若斯假令大開周橋縱洩淮水何異開門而揖盜救焚而益薪耶四年巡按邵陛修易泗州城外土堤以石又建石牐二道以時啓洩民徳之名曰邵公堤國朝康熙二十三年五河知縣鄭鼐修南湖壩附韓竹新修五河南湖壩記凡水之利瀦之則内可以溉疏之則外可以洩獨五河一邑河壖居十八瀦則二分未必得溉而没則去十之八是瀦不可也邑為五河之口上水滔滔而至詎可疏而去之疏又不可也鄭君來撫兹土相漴河入淮之口有南湖者其上流雖有玉莊湖暨小河赤龍澗一帶之水然嵗旱則皆可耕之田也南湖之尾為蔣家壩即入淮之口作隄以障淮者嵗大潦内外水皆至則田成巨浸若内水不至湖可全耕穫也即不大至而半穫焉得利且不鮮侯曰是則可為也已溝故有土隄然數圮且不能時啓閉侯曰是非石牐不可上其事於撫臺薛公薛公軫念民隠捐金作首倡侯亦捐百金僚佐以下助有差遂酌其地之高下田之多寡亦均其所輸費之壩者償之壩民悉争輸固其所也至於役民之力亦視乎地而又恐勤惰之不齊擘分丈尺俾各有定責而無所諉趨事者由是盡力再厯寒暑隄以告成既成時值六月霖雨不輟淮大漲内水亦暴至衆曰水勢若此無可為矣侯獨曰内水為患下田誠不可療顧外水尚髙三四尺許隄圮則下田之迤而上者為沙灣且將盡没可數百頃獨奈何高者不益之髙長者不衍之長哉爰又培土數尺衍長一十有四五里時隄愈高且長而水愈漲且嚙然卒以人力勝而淮水數漫而數却也方侯之率衆增築也猛風捲浪暴雨連天隂霾夜黒掣電爍光内外數十里洪濤中懸一線危隄寄身於蛟龍出没之所諸人無不惶惑恐懼廢然思返侯顧神志倍旺心思倍密氣力倍壯此非愛民之誠兼以定力曷克臻此此隄一成内無水而下田利即内有水而高田亦利後來賢侯但一増卑培薄利不將萬斯年乎江南通志卷六十六
