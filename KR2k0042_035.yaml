body:
  text: 江南通志卷三十六輿地志古蹟七頴州一府滁和廣六泗五州潁州府任城在府治北三里陳將任忠伐齊於潁水北岸築城以圍汝隂故名俗呼蠻樓寨平輿故城在府治南一百里北枕谷河土城尚完俗呼為遠城按平輿在今河南汝陽縣界此蓋梁魏時僑置諸郡縣遺址清丘城在府治東五十六里潁河北岸隋置縣永安故城在府治西南一百四十里汝水北岸唐武德四年置東城西城俱在府治西北七十里五樟林兩城相去三十里相傳唐置府兵築城屯守於此唐屯城在府治西南一百七十里龍項灣東相傳唐仁瞻築愼縣城在潁上縣西北四十里江口鎮左傳云吳人伐愼白公敗之即此漢置愼縣劉宋改置於淮南合肥此城遂廢潁上故城在今潁上縣南即古鄭城也水經注云潁水東南流經蜩蟟郭東俗謂之鄭城舊唐志云潁上縣隋置治古鄭城武隂城在潁上縣東南正陽鎮俗謂之張飛城與劉關二城相對荆亭城寰宇記云荆亭城在潁上縣西南六十里劉宋汝隂太守楊文萇破魏兵於荆亭即此水經注云潤水經荆亭北而入於淮甘城在潁上縣西北通典云故甘城梁置下蔡郡有關吳魏以來關防津濟之所段家城在潁上縣西北六十里段靈君築又有洪城在縣東三十里蓼城在霍丘縣東三十里虞夏之際以封臯陶春秋時蓼國地唐武德四年於霍丘置蓼州紂王城在霍丘縣南二十里箕子城在霍丘縣開順鎮陽泉故城在霍丘縣西五十五里漢置縣寰宇記云梁普通七年於古城內立縣大通三年改為臨水縣即古陽泉地梅城故城在亳州西南四十里古梅伯國隋開皇間分小黃置梅城今為梅城集武平城在亳州西南漢縣下邑故城在亳州東北五十里後魏僑置藥城故城在亳州東南唐武德三年於魯邱堡置文州並藥城縣新陽故城在太和縣西北六十里秦置縣陳勝傳曰吕臣起新陽是也應劭曰在新水之陽也舊志有信陽城即故新陽之訛樂昌城在太和縣東近細陽漢高后八年封張敖前姬子壽為樂昌侯後漢張釜傳云食細陽之池陽鄉即此細陽故城在太和縣東茨河西岸漢置縣光武封岑彭子遵為侯邑新郪故城在太和縣北七十里古郪邱地漢置新郪縣章帝建初四年徙封殷後於此曰宋公國俗訛為宋王城扶陽故城元和志云在故城父縣東北三十二里漢衛賢封邑按漢表扶陽國在蕭縣此城名偶同耳非故國也高鄉郭在太和縣南七里寰宇記云魏高貴鄉公所築潁陽故城在太和縣東北三里隋志云汝隂郡有潁陽縣萬壽故城在太和縣東北四十里本漢細陽縣隋唐汝隂縣之地也宋開寶六年分汝隂北五鄉以百尺鎮置萬壽縣今為元墻集瑕城在䝉城縣東北水經注云渦水經瑕城南即楚瑕邑漆園城在䝉城縣東北三里相傳莊周為吏於此按莊子漆園為歸德之䝉然宋王安石題䝉清燕堂云民有莊周後世風姑存以備考山桑城在䝉城縣北漢置縣後漢封王常為侯國水經注云北淝水東南流經山桑邑南俗謂之北平城昔文欽封山桑侯疑食邑於此又東經山桑縣故城南俗謂之都亭城蓋山桑有二城也舊䝉城在今䝉城縣北東晉僑置寰宇記云有南北二䝉城並在縣北八十里相去四十步皆後魏太和十年築檀公城在䝉城縣三十七里即山桑縣城宋檀道濟為征北將軍居此因名路史謂為北䝉是也財丘廢郡在府治西南一百十里梁武置今府治西南有小土城二東西相去二三里俗謂之東才城西才城鮦陽縣治在府治西二百一十里輿地志云沈子國西有鮦陽郡漢光武封隂慶為鮦陽侯在此雩婁縣治在霍丘縣西南八十里春秋云楚人侵吳及雩婁即此漢為縣屬廬江郡胡城廢縣在府治西北二里即春秋胡子國梁置縣原鹿廢縣在府治南富阪之西春秋云宋楚盟於鹿上即此杜預注云鹿上今原鹿縣是也水經注云谷上經原鹿縣故城北富波廢縣在府治南谷水北漢置以多陂塘溉稻故曰富波亦曰富陂蓋波陂古字通用也水經注云谷水經富陂縣故城北俗謂之成閭亭松茲廢縣在霍丘縣東十五里漢初置松茲侯國在今宿松縣界晉初改置於此寰宇記云一名祝茲即古鳩兹誤鳩茲在蕪湖也義城廢縣在霍丘縣北四十里宋高祖立亦名三固縣後廢縣立戍譙縣舊治今亳州治春秋時陳之焦邑秦置譙縣魏黃初二年改建五都譙其一也城父縣舊治在亳州東南七十里春秋時陳邑左傳云僖二十一年楚伐陳遂取焦夷昭九年楚遷許於夷實城父蓋城父即夷地也漢置城父縣劉宋改置浚儀魏收志云浚儀縣有城父城是也今名城父村苦縣舊治在亳州城東後漢地理志云苦春秋時曰相索隱曰地理志誤也苦縣本屬陳春秋時楚滅陳故苦亦屬楚括地志云在亳州谷陽縣界思善廢縣在亳州南八十里城父城南漢章和二年分城父縣置長垣廢縣在亳州東東晉初析譙縣地僑置沈丘故地在府治西北一百二十里古寢丘地也孫叔敖子辭肥饒而請寢丘即此文地在潁上縣北二十五里俗傳孔子適楚接輿歌鳳處潁尾在潁上縣東左傳云楚子狩於州來次於潁尾是也管谷在潁上縣北二十五里管仲家此摘星樓在霍丘縣東三十里紂王城南魏武帝宅在亳州東建安十五年令曰欲於譙東五十里築精舍秋夏讀書冬春射獵以自娛元和志云魏文帝祠在譙縣東五里即太祖故宅元張柔宅在亳州城內西街之北流星園在亳州東天靜宫南相傳有星突流於園老子因而誕生史記云老子楚苦厲鄉曲仁里人也括地志云苦縣在亳州谷陽縣界有老子宅及廟廟有九井尚存在今亳州真源縣地陳摶店在䝉城縣南五十里有陳仙公館繁陽亭在府治境內左傳云襄公四年楚師繁陽杜預注云鮦陽南有繁陽亭沈亭在府治西一百二十里秦高士沈郢建葵亭在府城宋呂公著為潁倅作亭後圃題曰葵亭及為守時休倅圃有葵亭集清潁亭在府治西晏殊守潁時建亭城隂俯瞰潁水雙柳亭在府治北渚初晏殊守頴建閣曰清漣嘗手植雙柳於閣前後去潁民不能忘更曰去思至歐陽修為守時雙柳成隂遂重建亭更名雙柳竹間亭在府治宋蘇軾守潁時作相讓臺在府治東二里楚莊王所築避暑之所釣魚臺在府治東七十里潁水北岸漢末袁宏游釣處賀勝臺在府治西北十里潁水南岸宋州守陳規迎劉錡犒軍於此故名張龍公釣臺在霍邱縣西北三十里章華臺在亳州東南乾溪側即楚王所起也元和志云臺在城父縣南九里按章華臺在荆州詳見辨訛東西二臺在亳州東一里許曹操觀稼臺也八角臺在亳州東南三里舊傳曹操所築大饗軍士於此又䝉城縣城東有操演武臺子牙釣臺在䝉城縣西南三十里呂望集莊子臺舊址在䝉城縣城北隅因沒於水改築於東門外㑹老堂在府城西湖書院之傍宋歐陽修與趙槩同在政府熙寧中相繼告歸一日槩來汝隂年幾八十矣遊宴踰月而返因名其堂曰會老六一堂在府城內歐陽修致政歸潁時所構聚星堂在府城舊州治內歐陽修守潁州一時從遊者皆名流故以聚星名堂大饗堂在亳州城內魏文帝南征軍次譙大饗六軍及譙父老百姓立大饗碑曹植文梁鵠鍾繇書篆時稱三絶清燕堂即䝉城縣治後堂宋王安石有清燕堂詩青楊館在府治西一百四十五里相傳漢光武嘗討王尋駐兵於此焦館在府治西南隅水池上宋呂公著守郡時建以館焦千之因名畢卓池在府治西鮦陽城內龍池在潁上縣西南四十里淮潤鄉舊傳張公九子蛻骨化龍處與霍邱接壤東陳村在府治東四十里宋嘉定十五年霍邱人王鑑敗敵於此關州村在潁上縣張龍公夫人石氏家此包家寨在府治西六十五里又姜寨在府治西一百八十里俗呼為强寨牛口埠在霍邱縣城東唐太宗追竇建德處蘭亭序黃庭經石刻在頴上縣向於舊學基內掘井得二石刻久藏縣庫明末碎毁今潁州人劉氏重鐫九仙臼在霍邱縣九仙山上俗傳淮南王與八公搗藥於此谷陽在亳州西四十里譙令谷在亳州北三十里魏武帝至譙令軍士築之有譙今碑下城父聚在䝉城縣西北渦水之陽後漢志云山桑縣有下城父聚以近故城父縣故名垂惠聚在䝉城縣西北後漢志云山桑縣有垂惠聚世謂之禮城桑林在亳州湯陵西二里成湯禱雨之所升天檜在亳州西相傳老子乘白鹿緣此樹升天滁州荻港故城在州西北魏收志云新昌郡領赤湖荻港薄陽三縣輿地紀勝云荻港在清流縣西北二十里即魏故縣州志謂赤湖在州西十里薄陽壩在州南二十里即故赤湖薄陽二縣故址建陽故城在州東四十里漢置縣蔣家城在州東南五十三里又龔家城在州南四十里又塘惟城在州南三十里三城皆傍湖澤相傳南唐築瓦梁堰以禦北師水勢橫溢居民築此城以捍水云南譙故城在全椒縣北晉太元中僑置南譙郡寰宇記云梁大同二年割北徐州之新昌南豫州之南譙豫州之北譙凡三郡立為南譙州居桑根之西今滁州西八十里全椒縣界南譙故城是也輿地紀勝云南譙城在縣北二界尹村北譙城在縣西北二十里新高村皆齊梁時故址也又縣有臨滁里或曰故郡治豐樂城在全椒縣西七十里艾塘東村傍豐樂阜陵城在全椒縣東十五里漢置縣屬九江郡襄城在全椒縣東臨襄水入袁村或以為姚襄所築高塘故城在來安縣東北白塔鎮西魏收志云譙州領高塘郡隋志云清流縣開皇初廢樂巨高塘二縣入蓋高塘即故郡也又有古城集在縣北八十里疑即樂巨趙王城在來安縣東二十五里城北有澗澗北有趙侯古冢又有丁城在縣東北白塔鎮東南四面平遠城地高數丈廢置不可考清流舊縣即今州治江左流寓立頓丘縣於此隋改置清流縣以縣東清流水為名酇城廢縣在全椒縣西南酇湖濵本漢沛郡屬縣嘉平廢縣在全椒縣西南十五里蕭齊置屬南譙郡寶林門在全椒縣寶林橋吳赤烏二年立懷嵩樓在州治後統軍池上即贊皇樓唐李德裕刺滁州時建御書閣在州琅邪山前宋乾德二年建太平興國中賜額藏四朝御書醉翁亭在州南七里歐陽修建有記刻石蘇軾書州志云明太僕卿趙釴創為樓萬歷中太僕卿沈思孝改為解酲閣附宋歐陽修醉翁亭記環滁皆山也其西南諸峯林壑尤美望之蔚然而深秀者琅邪也山行六七里漸聞水聲潺潺而瀉出於兩峯之間者釀泉也峯回路轉有亭翼然臨於泉上者醉翁亭也作亭者誰山之僧曰智仙也名之者誰太守自謂也太守與客來飲於此飲少輒醉而年乂最高故自號曰醉翁也醉翁之意不在酒在乎山水之間也山水之樂得之心而寓之酒也若夫日出而林霏聞雲歸而巖穴暝晦明變化者山間之朝暮也野芳發而幽香佳木秀而繁隂風霜高潔水落而石出者山間之四時也朝而往暮而歸四時之景不同而樂亦無窮也至於負者歌於塗行者休於樹前者呼後者應傴僂提携往來而不絶者滁人遊也臨溪而漁溪深而魚肥釀泉為酒泉香而酒洌山肴野蓛雜然而前陳者太守宴也宴酣之樂非絲非竹射者中奕者勝觥籌交錯起坐而喧譁者衆賔歡也蒼顔白髮頽乎其中者太守醉也已而夕陽在山人影散亂太守歸而賔客從也樹林隂翳鳴聲上下遊人去而禽鳥樂也然而禽鳥知山林之樂而不知人之樂人知從太守遊而樂而不知太守之樂其樂也醉能同其樂醒能述以文者太守也太守謂誰廬陵歐陽修也漸入佳境亭在州醉翁亭北舊名同醉宋宣和中郡守唐恪建嘉泰中郡守林㟽易今名豐樂亭在州城西南琅邪山宋歐陽修建自為記蘇軾書刻石又有醒心亭在豐樂亭東亦修建曾鞏為記又有班春亭附歐陽修豐樂亭記修既治滁之明年夏始飲滁水而甘問諸滁人得於州南百步之近其上豐山聳然而特立下則幽谷窈然而深藏中有凊泉滃然而仰出俯仰左右顧而樂之於是疏泉鑿石闢地以為亭而與滁人往遊其間滁於五代干戈之際用武之地也昔太祖皇帝嘗以周師破李景兵十五萬於清流山下生擒其將皇甫暉姚鳳於滁東門之外遂以平滁修嘗考其山川按其圖記升高以望清流之關欲求暉鳳就擒之所而故老皆無在者蓋天下之平久矣自唐失其政海內分裂豪傑並起而爭所在為敵國者何可勝數及宋受天命聖人出而四海一嚮之憑恃險阻剗削消磨百年之間漠然徒見山高而水凊欲問其事而遺老盡矣今滁介於江淮之間舟車商賈四方賔客之所不至民生不見外事而安於畎畝衣食以樂生送死而孰知上之功德休養生息涵煦百年之深也修之來此樂其地僻而事簡又愛其俗之安間既得斯泉於山谷之間乃日與滁人仰而望山俯而聽泉掇幽芳而䕃喬木風霜冰雪刻露清秀四時之景無不可愛又幸其民樂其歲物之豐成而喜與豫遊也因為本其山川道其風俗之美使民知所以安此豐年之樂者幸生無事之時也夫宣上恩德以與民共樂刺史之事也遂書以名其亭焉茶仙亭在州琅邪山宋紹聖中琅邪寺僧為州守曾鞏建取唐杜牧誰知病太守猶得作茶仙之句又有無心清風翠微三亭俱在琅邪山上日觀亭望月亭俱在琅邪山上明宋濂遊琅邪山記山中之亭幾二十所而二亭尤盛落鴈亭在全椒縣西舊名落鴈塔悟經臺在州琅邪山即張方平寫二生經處琴臺在州琅邪溪旁唐刺史李幼卿建希真堂州志謂不知其處宋曾肇十詠詩序云滁城多草木希真堂列植尤甚三隱室在全椒縣桑根山下曰南隱曰中隱曰北隱東園在州城東隅宋梅執禮序云滁陽舊無郡圃醉翁豐樂諸亭皆在關外獨李紳所創東園南直琅邪北通西澗適介守二宅固一佳處又有北園宋淳化中孟元哲建王禹稱北樓感事詩序云郡有北樓通判史公署張家園在州西三十里一名天子園俗傳周世宗嘗至此因名清流關在州西二十五里山勢峭峻宋歐陽修豐樂亭記太祖以周師破李景兵十五萬生擒其將皇甫暉姚鳳於此隂陵在全椒縣南二十里即楚迷溝項羽失道處仙槎里在來安縣城東二十里此地最高人望之若仙槎然南唐築瓦梁堰時名此安期洞在全椒縣椒陵山中相傳有安期生遺跡飲馬池在州豐山絶頂漢高祖廟側舊傳高祖曾飲馬於此金甲池在州皇甫山下俗傳皇甫暉嘗屯兵洗甲於此統軍池亦曰孟家池在州治後宋淳化中孟元哲以龍武統軍知軍事鑿池北園放生池在全椒縣南三百步漢將灌嬰追項羽處王母池在來安縣東門外深闊丈餘中甃以磚傍有石刻謊糧墩在全椒縣西南五十里舊傳伍員伐楚糧匱以米覆土為墩若山積然琅邪山寨在州西南十里琅邪山中宋建炎三年郡守向子伋因山築壘聚鄉民拒巨寇李成焦山寨在全椒縣城外宋焦光贊結寨於此八角井在全椒縣門南數十步有石刻宋元祐四年十月初吉全椒令元時忱命開義井於縣門外以資民用今亦號元公井神山石井在全椒縣城內元至正時鑿深七丈又傳為柴王井琉璃井在來安縣治後泉極甘雖旱不涸以瓦礫投之聲若笙簧久之乃止朱子題名碑在州梅瑞堂後壁菱溪石在州城東五里本名荇溪避楊行密諱改作菱宋歐陽修菱溪石記菱溪之石六移去者五其一最大難徙乃以三牛曳置幽谷附唐李濆荇溪新亭記上臨御明年濆自洛陽令之太守詔牧滁民之三月得古溪郡之東北十里按地圖志在黃道山之右昔始皇途經是山因以名焉其下西永陽嶺迸溪於荇溪此溪是也不濬川導廣泉演漾潭島影溢江漢甬中流袤平壇四浪滉朗雙派委輸襟帶一川斜界千畝無茭苗蘋萍之雜其渺練如也有廢亭占勝之地其狀依然也照晴而空水相鮮澄遠而霽山瀉色趨向奇狀不可窮竟訪郡之長老考亭之廢興皆曰三十甲子二周星而不知其所由來矣驗圖籍亦昧其始興之歲也秋七月前河中監察汝南公况前武寧軍殿中隴西公拱州遷客司馬𢎞農公紹復咸以勝槩為宴之須乃卜於亭是咨是謀遂占創今僉曰惟日不越月他工具洎六旬有六日新亭就楹不茀茀昭其儉也甍不仡仡示無僭也內不重門曠其景也外不崇墉達其望也繇是四時之氣成象不絶春木秀容夏雲奇峯秋天爽空冬日暖濃觸類有景與溪無窮雖羊公峴溪曷足以加其勝矣於戲物之廢興時也茍非其時聖人微言矧其䝉者乎時㑹昌二年正月八日建秦皇試劔石在全椒縣西北百里舊高城村相傳始皇東巡經此山因以名石和州遏虎城在州西晉王導築以遏石虎又有却月城在州南天門山頂劉宋時王元謨所築亞父城在州境唐劉禹錫記云城高而堅亞父所營雍丘故城在州南本漢陳留郡屬縣也以流寓立今裕溪河泊所有雍家城或以為即雍丘之訛石跋城在州東北三十里即石跋河南畿志云宋周虎所築舊傳張果老騎驢過此石跡宛然因名又有落驢橋在州小西門外亦云果老所經龍亢故城在含山縣南四十里漢龍亢縣在今鳳陽府宿州界江左流寓立此屬歷陽郡晉王城在含山縣北晉使姚萇築城於此以禦苻堅今清溪東有土城數十丈當即晉王城其外十餘里有姚萇村亦曰姚萇城烏江故縣在州東北四十里秦烏江亭也漢東城縣地晉置烏江縣今為烏江鎮歷陽故縣在州治秦九江郡地項羽封范增為侯邑漢置歷陽縣榖孰廢縣在州西北漢梁國屬縣鎮淮樓在州治前東阜高臺層構於製最古明太祖駐蹕和陽曾與諸將飲酒賦詩其上清風樓在州治西南城隈峨嵋墩下明一統志云宋元祐間名連雲觀水心亭在三老堂前唐張籍寄和州劉使君云送客時過沙口堰看花多上水心亭犀照亭在州東南十里當利河口北岸晉溫嶠聞水底有音樂之聲然犀照之因以名亭項亭在州城東四十里烏江鎮東南即亭長􅋈船處丹臺在州大西門外世傳老子煉丹之所惠政堂在州治宋孝宗居青宫時大書惠政堂三字賜守臣胡昉許由宅在州西二十里相傳許由所居袁天綱宅在州南二十里地名南羲張籍宅在州通淮門內舊光孝寺又縣西五里曰桃花塢又故烏江縣東一里有書堂相傳皆籍讀書處勤將軍宅在州西北雞籠山李白勤將軍歌序云歷陽壯士勤將軍名思齊神力出於百夫則天太后召見奇之授遊擊將軍賜錦袍玉帶朝野榮之拜橫南將軍大臣慕義結十友即燕公張說館陶公郭元振為首彭祖石室在含山縣南八十里長真觀相傳彭祖於此白日飛升履跡猶存下有洞深莫測陋室在州治後唐和州刺史劉禹錫遺址劉自為銘東關在含山縣南七十里濡須塢之北岸昭關在含山縣北十里小峴山之西伍員自楚奔吳過此漁丘渡在州治吳越春秋云伍員過昭關至江漁父乘舟渡之遂至吳今百福寺之東南舊名漁丘渡運米徑在含山縣南八十里舊名斗米徑杜伏威將李子建穿渠入歷陽湖通運令部下人帶斗米就役功即成洗耳池在州城三十五里祁門坫旁有池傳是巢父洗耳處八卦池在州界河鋪西北壽寧宫內葛仙翁遺跡也沸井在州小西門外土街頭關公廟內晉元帝渡江命郭璞筮之曰西南郡縣以陽名者井當沸其中興之應未幾歷陽井沸者三故曰沸井西街井在州城科甲真才坊下相傳一童子嘗從井中出咸異之扣其從來曰我本華陽洞中人此井乃其後徑也自是遂不復見飛錫泉在含山縣南六十里太湖寺昔無用禪師當山腋鑿孔導泉日取不竭不取不溢師有真身塔在焉馬跑泉在含山縣十五里昭關外伍員奔吳過此有馬跑遺跡卓刃泉在含山縣西七十五里東關嶺舊傳漢壽亭侯卓刀飲馬於此廣德州鄣縣舊城在州治東北漢高帝時建諸葛城在建平縣西十里其中僅容千人旁有驢城馬城相去一里其間有井數十蓋昔人屯駐之地浮城在建平縣西十里廣數畝其上有木莫能名斧之則血出地本窪下每夏潦水漲諸墟盡沒此獨巋然若浮因名廣德舊縣在州治西南漢故鄣地孫吳析置三峯樓在州治前宋李光登三峯樓有詩鼓角樓在州治前宋錢公輔建曾鞏記攀蘿亭在橫山宋學士梅詢建范公亭在州舊司理㕔東南宋范仲淹為司理時建北有雙井亦范所鑿名范公井亦名義井後人思之又有亭曰景范在州治西春省亭在州治西五里小芝山上明州守朱麟建以勸農釣魚臺在州治北二十五里唐張志和垂釣處臺下水深莫測藤蔓繞磯松篁夾岸臺基尚存鳳凰臺在州治北門外州守鍾振築鳳皇墩結臺其上因名集仙臺在橫山頂宋梅詢建俗名禮斗臺清容堂在州治西宋錢公輔築堂以居查深訓州人子弟劉文靖宅在州北三十里今為唐興寺衆春園在州治西北玉溪之上宋紹興間參軍趙子濬建溪後有池清可鑒物築臺池上曰濯纓又有玉溪堂聚景樓圓嶠方壺翠溪三亭前人皆刻石記之明正德中州守喬岱復於溪上建濯纓橋暗橋在建平縣東北六十里護形山之麓舊傳伍員奔吳避於山中追者至此雲氣護之員及橋而天暗遂名鍾村在州境宋建炎三年嶽飛自宜興駐師鍾村軍中乏糧將士不敢擾民人至今稱之扎塞墟在州治西北五里宋嶽飛屯兵於此神仙塘在建平縣南六十里淨覺寺前相傳許真君曾浴此岸有楓樹遇年歉則枝枯年豐則茂豐歉半則六七月始葉桐川舊驛在州西二十里白馬墩在州北三十里舊傳劉文靖於此浴馬寨墩在建平縣北十里春秋時伍員伐楚還吳立寨於此舊有寨門遺跡鳴鼓墩在建平縣西南二十五里舊傳鄉民築亭墩上每東作時登亭鳴鼓踊躍田功石鼓墩在建平縣東北六十里石崚嶒狀如魚鱗人行有聲如鼓因名金井在州治兆符門外里許明太祖汲此水以給軍士因名丹井在州治南十里丹山之上相傳徐真人煉丹於此八角井在高封周舊宅舊傳井有藏金鄉民常欲取之水輒沸湧隱隱聞笙歌之聲又有九曲池亦在宅內皆封周所鑿郭母古井在建平縣西南三十里俗傳仙人以藥投井水變為醴者即此金牛跡在建平縣東北十五里相傳昔有神人驅金牛至此為人所見人牛俱沒石上牛跡尚存祠山三寶在州西五里一白玉磬篆書宣和舊物也一火珠名軒轅鏡一趙孟俯手疏六安州六縣故城在今州北臯陶之後封此秦為六縣屬九江郡漢元年項羽立英布為九江王都六括地志云六縣故城在安豐縣南一百三十二里而寰宇記又謂六城在舒城縣東南六十里蓋訛或僑置非故縣也馬頭城在盛唐縣北今州有馬頭集即其處白沙城在州北十三里寰宇記云六安二古城一曰六合一曰白沙莫知所始上有臯陶廟所謂六合城者六安之訛也又有東古城在州東南三十里西古城在州西十五里裴家灘又有新城在州東北十五里今為新城寺廣王城在州南百里高岑突起尚存石跡今為寺霍州治在州南五十里霍山縣界梁置邊城故郡在州西沈約宋志有邊城左郡領史水邊城等縣大明八年省為縣魏收志云霍州有邊城郡治麻步山今州西南九十里有麻埠鎮即麻步山也嶽安故郡即故霍山縣也在今霍山縣北五十里梁置古英國在英山縣東北界蓋近英山而名史記云封臯陶之後於蓼六或作英六索隱曰英後改號曰蓼也博鄉舊縣在州南漢竟寧元年封六安繆王子交為博鄉侯國於此開化舊縣在州西四十里霍山縣北宋元嘉時立六安故縣即州治本唐盛唐地間元間改霍山縣曰盛唐移治騶虞城即其地也宋開寶初改為六安淠水廢縣即故新蔡縣也在霍山縣東北梁僑置新蔡縣隋改為淠水縣以淠水而名弩臺在州西南四十里相傳漢武帝試弩於臺下仙人臺在英山縣吳山之坎世傳有仙飛升於此灊臺在霍山縣威遠門外五里古城西突兀中流石狀如臺有觀瀾亭下臨大河石壁上鐫小赤壁三字釣魚臺在霍山縣西三十里石生水濵若臺然傳為左慈釣魚處梳粧臺在霍山縣南五十里東流河即仙女臺世傳宋南遷有尼飛升在此螺螄店塔在霍山縣西北五十里高九丈宋元祐年建魯班門樓在霍山縣南四十里焦家莊在州西二十里宋狀元焦煥故居又有萬卷堂在霍山上舊傳煥讀書處江立信讀書處在州龍穴山廣福寺英布故宅在英山尖道士冲在霍山縣西九十里道士徐隱元修真於此石門關在英山縣東九十里柳林關在英山縣北四十里英山寨即今英山縣治宋羅田縣地淳祐間立鷹山寨咸淳初更名英山因立為縣尋廢德祐二年復置第十泉在州龍穴山頂水味香甘張又新品為天下第十泉玉虹泉在英山縣西北三十里太平橋石壁鎸此三字並有石刻題咏落淚洪在霍山縣西四十里有孝子舁櫬至此泣盡繼之以血龍爪石在州城西巨石臨水上鎸龍爪二字㸃畫遒徑大如斗諺云龍爪見狀元出老子鶴跡在英山縣羊角山頂石上指爪宛然唐高祖時老子降此凌霄樹在霍山上相傳為漢武帝手植復覽山臼在霍山縣東二十里復覽山頂宋末戍邊設泗州徐城有二一在州東北八十里周時徐子國尚書費誓云淮夷徐戎並興史記云穆王時徐有偃王即此漢置徐縣寰宇記云大徐城一名薄薄城又名故故城即古徐國也一在州西五十里隋開皇初置徐城縣屬下邳郡治大徐城今有徐城廟高平郡城在州北一百十里漢為高平侯國陳太建六年吳明徹建高平郡於此亦名吳城今為吳城鎮亦名城兒頭集高冢城在州西北寰宇記云魏義興郡城也在徐城縣西北七十里梁以為興安郡領高冢城淮陽城在舊徐城東北一百五十里晉義熙中置郡角城在州東南晉義熙中置城臨泗水朱沛故城在州西去故徐城六十里其地有朱沛水故名梁武帝置巉石城在州西北一百三十里梁天監時築瀝橋城在州西北寰宇記云在徐城縣西南二十五里梁天監二年築置戍南臨瀝水橋故名古屯城在州西寰宇記云在徐城縣西南八十五里陳太建五年吳明徹於此置堰斷淮水以灌濠州緣此築城拖城在州北三十里又半城在州北九十里北朝時置李千城在州西北寰宇記云在徐城縣西北三十里後魏李千于此築城置戍因名南重岡城在州西北寰宇記云在舊徐城縣西北九十里通濟渠南一里隋大業八年移置重岡縣于此緣重岡山為名臨淮故城今州治本徐城縣地唐武氏長安四年割徐城南界兩鄉于沙孰村置臨淮縣南臨淮水西枕汴河淮平故城在州西二十里宋紹興二十一年析臨淮縣地置淮平縣盱眙故城在今盱眙縣東北盱山之麓淮水之濵阮勝之南兗州記云盱眙本春秋吳善道地也秦置盱眙縣許愼曰張目為盱舉目為眙城居山上可以眺遠故名霸王城在盱眙縣東北三十里又有漢王城小兒城相傳皆項王立義帝時屯兵處富陵故城在盱眙縣東北六十里漢置睢陵城在盱眙縣西五十里漢置睢陵縣在今睢寧縣界劉宋泰始中沒于魏因僑置於此淮陵城在盱眙縣西八十五里漢縣今為淮陵鄉又縣西北六十五里有三城今為湖又淮陵之西有焦城梁天監時王燮保焦城即此公路城在盱眙縣西北寰宇記云在故招信縣西北六十里北帶淮水漢建安中袁術所築考城故城在盱眙縣南晉義熙中改盱眙縣置考城直瀆陽城三縣屬盱眙郡魯縣故城魏收志云淮隂郡有魯縣北齊廢寰宇記云廢魯城在盱眙縣南三十里九山城在盱眙縣西北胡三省通鑑注云九山店之東則陷岡湖南則馬城淮流至此謂之九山灣土人呼為獅子渡北兵渡淮之津要其東鳳凰洲在淮水中約長十里奔精城在盱眙縣西南寰宇記云在故招信縣南六十里相傳是蠻精王所築龜山城在盱眙縣東北三十里宋文帝築以拒魏隋置濟隂縣即此銅城在天長縣西北四十五里相傳吳王濞築城於此鑄錢東陽城在天長縣西北七十五里北至東陽山秦縣陳嬰為東陽令史即此尋置東陽郡俗謂之屈城石梁故城在天長縣西三十里東晉所置為戍守處俗名古城遺址猶存又有土城在縣東北三十里一名新城蓋齊時涇州治此橫山故城在天長縣東南三十里梁置縣又有義城在縣南二十五里或曰梁時即於此置縣五河故城在今五河縣澮河南岸金岡山北宋端平二年於五河口築城屯田咸淳七年始置安淮軍及五河縣以有澮潼沱崇淮五河合流而名又宋安淮軍城在縣北二里沱河北岸俗謂之故軍城遺址猶存虹縣故城在五河縣西漢置舊說入今虹縣誤詳見辨訛大屯城在五河縣南七里俗名大城坪又小屯城在縣西南六里俗名小城坪皆宋末屯軍地邊軍城在五河縣東宋末夏貴所築今為儒學曹公城在五河縣南二十里明曹國公李貞遊兵淮西時所築韓信壇在州東七里信屯兵處也隋離宮在州北青陽鎮西十里煬帝所建俗名花園都梁宮在盱眙縣南十六里都梁山上隋大業元年建置離宮四十餘所此其一也宮之西有流杯殿釣魚臺四望殿其側有曲河以安龍舟大舸翠屏堂在盱眙縣玻璃門外起秀亭前宋陸游記云方國家承平時邊郡游觀有雅歌之堂萬柳之亭而翠屏之盛又非雅歌萬柳之所可及也先春亭在州城上東北隅宋時建玻璃泉亭在盱眙縣治東第一山下有亭覆焉為十景之一牛搏虎碑亭在天長縣西郊外嶽廟今亭圮碑移於廟掛劒臺在州北寰宇記云在大徐城北臨朱沛水相傳為延陵季子掛劔處或入于邳州或入于徐州皆誤也詳見辨訛八仙臺在盱眙縣東三里上有八仙坐石坐處有石棋枰為十景之一望夫臺在天長縣西南三里相傳有女子望夫不歸立化為石分金店在州西三十里相傳管鮑分金處下阿村在天長縣東北下阿溪上接高郵州界即晉時三阿唐光宅初徐敬業拒李孝逸于下阿即此寰宇記云唐開元三十九年於下阿村置千秋縣蓋本屬高郵時乃割屬也朱壽昌故里在天長縣東南四十里秦蘭鎮麋畯在天長縣界博物記云東陽縣多麋食草根其處成泥名曰麋畯居人隨此畯種稻不耕而穫樂樂堆在天長縣北十里舊傳煬帝南幸宴樂於此俗呼雁落墩音之訛也水晶營在盱眙縣東南十里外連亘數十里相傳隋煬帝設此鮑家寨在天長縣南五十里又顏家寨在縣西四十里二寨傳是宋高宗南渡所築李制使栅在五河縣東二里橫跨河口宋咸淳五年兩淮制置使李庭芝所立石基尚存浮山堰在盱眙縣城外梁天監中築堰遏淮水以灌壽陽南起浮山北抵巉石極丁夫之力百計而成宋秦觀有梁堰賦紅羅幛在盱眙縣西七十里明太祖生時取水浴之忽有紅羅一幅浮來即取以為襁褓後人因名其水聖水在盱眙縣六十里相傳漢高祖禱山得水飲軍士於此因名聖母井在盱眙縣東北三十里龜山寺丫溝在天長縣城東舊傳韓世忠於此破敵第一山碑在盱眙縣堂東壁宋米芾書古鐵橋在五河縣東南二里淮河中流水涸時見兩傍有鐵柱江南通志卷三十六
