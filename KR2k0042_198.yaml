body:
  text: 江南通志卷一百九十九雜類志托史紀事二唐平江淮先是隋煬帝大業九年八月癸卯吳人朱燮晉陵管崇擁衆十萬餘寇江左九月己卯東海人彭孝才舉兵為盜衆數萬十月朱燮管崇共迎劉元進為天子毗陵東陽㑹稽建安多應之遣將軍吐萬緒魚俱羅討之十二月徴緒還遣江都丞王世充討元進頻戰皆捷元進燮敗死十一年秋七月己亥淮南人張起緒起兵為盜衆至三萬冬十月壬申東海賊帥李子通擁衆渡淮自號楚王建元明政寇江都十二年二月癸亥東海賊盧公暹率衆萬餘保於蒼山九月東海人杜伏威揚州沈覓敵作亂衆至數萬右禦衛將軍陳稜擊破之十三年春齊郡賊杜伏威率衆渡淮攻陷厯陽郡三月廬江人張子路舉兵反右禦衛將軍陳稜討平之又賊帥李通德聚衆數十萬寇廬江左屯衛將軍張鎮州擊走之恭帝義寧元年即大業十三年十二月賊帥張善安陷廬江郡二年三月吳興郡守沈法興據丹陽稱江南道總管唐髙祖武德二年九月辛未李子通僭號沈法興稱梁王丁丑杜伏威降三年李子通襲法興於吳郡法興走死按此條見通鑑唐書不載四年十一月庚寅李子通降丙申復叛伏誅六年正月庚寅徐圓朗陷泗州二月丙寅行軍總管李世績敗徐圓朗執之八月壬子淮南道行臺左僕射輔公祏反乙丑趙郡王孝恭討之七年三月戊戌趙郡王孝恭敗輔公祏執之敬業起兵中宗嗣聖元年太后以帝為廬陵王遷於房州二月后改元光宅九月柳州司馬英國公李敬業舉兵於揚州移檄四方以匡復為名十月癸未楚州司馬李崇福以山陽安宜鹽城三縣歸于敬業甲申太后以左玊鈐衛大將軍梁郡公孝逸為揚州道行軍大總管左金吾衛大將軍李知十為副率兵三十萬以拒李敬業壬辰李敬業克潤州丁酉曲赦揚楚二州復敬業姓徐氏十一月庚申右監門衛將軍蘇孝祥及徐敬業戰于阿溪死之乙丑徐敬業將王那相殺敬業降平劉展肅宗上元元年十一月甲午揚州長史劉展反陷潤州丙申陷升州壬子李峘淮南節度使鄧景山及劉展戰於淮上敗績二年正月乙卯劉展伏誅討平盧軍德宗建中二年八月辛卯平盧軍節度使李正己卒其子納反自稱留後十月戊申李納將李洧以徐州降十一月辛酉納冦徐州宣武軍節度使劉洽敗之于七里溝甲申李納將王涉以海州降三年正月癸未李納陷海密二州貞元八年五月癸酉李納卒其子師古自稱留後平鎮海軍憲宗元和二年十月鎮海軍節度使李錡反殺留後王淡乙丑命淮南節度使王鍔為諸道行營兵馬招討使以討之癸酉鎮海軍兵馬使張子良執錡己卯免潤州稅十一月甲申李錡伏誅平淮蔡憲宗元和九年彰義軍節度使吳少陽抄掠夀州閏八月少陽卒其子元濟自稱知軍事九月丁亥以山南東道節度使嚴綬忠武軍都知兵馬使李光顏夀州團練使李文通等討之十年二月嚴綬及吳元濟戰于磁丘敗績三月庚子忠武軍節度使李光顏及吳元濟戰於臨潁敗之四月又敗之於南頓五月又敗之于時曲十一月敗之于小溵河丁丑李文通敗之于固始十一年四月光顏等敗之于凌雲柵七月韓𢎞敗之於郾城十二年四月唐鄧隋節度使李訴敗之于嵖岈山又敗之於張柴七月以裴度為淮西宣慰處置使十月訴用所得賊將李祐等自文城因天大雪疾馳百二十里夜半破其門擒元濟檻送京師元濟伏誅平康全泰宣宗大中十二年八月宣歙將康全泰逐其觀察使鄭薰命淮南節度使崔鉉兼宣歙池觀察處置使以討之十月康全泰伏誅平龎勛懿宗咸通九年七月武寧軍節度糧料判官龎勛反于桂州十月庚午陷宿州丁丑陷徐州觀察使崔彥曽死之按通鑑作十年四月事十一月陷濠州刺史盧望回死之右金吾衛大將軍康承訓為徐泗行營兵馬都招討使神武大將軍王晏權為北靣招討使羽林將軍戴可師為南靣招討使十二月龎勛陷和滁二州滁州刺史髙錫望死之壬申戴可師及龎勛戰于都梁山死之是月前天雄軍節度使馬舉為南靣招討使泰寧軍節度使曹翔為北靣招討使十年四月康承訓及龎勛戰于栁子敗之九月癸酉龎勛伏誅十月戊戌免徐宿濠泗四州三嵗稅役平王仙芝黃巢僖宗乾符三年十二月王仙芝陷申光廬夀通舒六州五年二月王仙芝伏誅六年黃巢陷宣歙池三州廣明元年正月淮南將張潾及黃巢戰于大雲倉敗之七月黃巢陷滁和二州中和四年五月辛未河東節度使李克用及巢戰于宛句敗之七月壬午黃巢伏誅唐末羣盜廣陵被兵附見楊吳僖宗中和元年八月感化軍將時溥逐其節度使支詳自稱留後是嵗霍丘鎮使王緒陷夀光二州三年六月陳州刺史趙犨被秦宗權所圍求救于全忠全忠敗賊于鹿邑遂入亳州據之十月全椒賊許勍陷滁州四年六月朱全忠為宗權所攻天平節度使朱瑄遣其從父瑾救之敗宗權于合鄉九月以全忠兼淮南節度使感化節度使時治徐州以其行軍司馬李璠為淮南留後至泗州時溥以兵襲之徐汴始搆怨初朱珍與李唐賓二人素不相能全忠遣珍攻徐州拔滕沛文德元年十月事六月攻蕭縣據之與時溥相拒珍殺唐賓十月全忠至蕭縣執珍斬之進攻時溥㑹大雨引還連年攻時溥徐泗濠三州民不得耕獲復得水灾人死者什六七溥困甚請和于全忠光啓二年正月辛巳鎮海軍將張郁陷常州是年十月武寧軍將張雄陷蘇州三年三月癸巳鎮海軍將劉浩逐其節度使周寶四月甲辰六合鎮遏使徐約陷蘇州逐其刺史張雄六月壬戌亳州將謝殷逐其刺史宋衮昭宗龍紀元年正月壬子宣武軍將郭璠殺奉國軍留後申叢自稱留後大順元年四月丙辰宿州將李筠逐其刺史張紹光二年正月甘露鎮使陳可言陷常州宣武節度使朱全忠掠淮南朱溫碭山人亡入黃巢賊中至僖宗中和二年降唐賜名全忠三年三月命為宣武節度使錢鏐陷蘇州十一月朱全忠取濠泗濮州遂擊徐州景福元年二月朱全忠遣其子友裕圍彭城旋以龎師古代之二年四月全忠自將如徐州師古拔彭城時溥舉族登燕子樓自焚死楊吳紀略僖宗中和三年楊行密初名行愍字化源廬州合肥人也世為農家長大有力能手舉百斤日行三百里以為盜見獲刺史鄭棨竒其狀貌釋之後應募為兵充廬州牙將戌滿還都將忌之復使出戍遂殺都將據廬州自稱八營都知兵馬使髙駢以為廬州刺史朝廷因而命之光啓二年十二月髙駢命改名行密三年三月髙駢遣都知兵馬使畢師鐸將兵屯髙郵備秦宗權師鐸自以黃巢降將又與駢所親信吕用之有隙疑懼不自安遂起兵謀誅用之掩至廣陵又乞師于宣州觀察使秦彥彥將秦稠將兵三千助師鐸攻城克之用之亡走駢署師鐸節度副使仍承制加左僕射明日師鐸遣使趣秦彥過江幽駢于道院並其親黨十餘人秦彥以宣歙三萬餘人入廣陵自稱權知淮南節度事初吕用之詐為髙駢牒署楊行密為行軍司馬遣兵入援行密至天長今泗州天長縣用之及張神劍以衆歸之行密至廣陵彥閉城自守六月出戰彥兵敗士卒死者什七八城中食盡八月秦彥遣畢師鐸鄭漢章擊行密為行密俘斬殆盡九月秦彥殺髙駢并其子弟甥姪十月楊行密圍廣陵克之自稱淮南留後十一月秦宗權遣其弟宗衡渡淮與行密爭揚州以孫儒為副抵廣陵與秦彥畢師鐸合兵孫儒殺秦宗衡襲髙郵張神劍逃歸揚州儒屠髙郵行密殺神劍而坑其衆文德元年二月以楊行密為留後四月孫儒陷揚州自稱節度使楊行密奔歸廬州八月楊行密說和州孫端上元張雄使自采石濟江行密自銅官今池州府銅陵縣濟江㑹之遂圍宣州昭宗龍紀元年六月指揮使周進思據城逐其使趙鍠鍠奔廣陵追擒之城中執進思以降行密入宣州詔以行密兼宣歙觀察使二月行密取潤州孫儒攻廬州淮南指揮使蔡儔以州降之十一月田頵取常州擒制置使杜稜以兵三萬戌常州十二月孫儒逐頵取常州以劉建鋒守之建鋒又取潤州時屬吳越錢氏大順元年正月淮南將馬敬言襲據潤州李友將攻常州安仁義劉威田頵敗劉建鋒于武進三月賜宣歙軍號寧國以楊行密為節度使八月孫儒攻潤州李友拔蘇州時屬吳越九月孫儒拔常州十二月拔蘇州殺李友安仁義棄潤州走儒遣將守之二年正月孫儒盡舉淮蔡兵濟江轉戰而南行密城戌皆望風奔潰儒將李從立掩至宣州東溪今句溪府城東行密將臺濛屯溪西以計使引去儒前軍至溧水今江寧府溧水縣行密將李神福襲敗之五月神福攻滁和皆下之七月朱全忠遣使與行密約共攻孫儒儒於是悉焚揚州廬舍盡驅丁壯及婦女渡江殺老弱以充食行密將張訓李德潛入揚州滅餘火得榖數十萬斛以賑饑民十二月孫儒攻宣州杭州刺史錢鏐復遣兵據蘇州儒屢破淮南兵行密求救於鏐鏐以兵糧助之景福元年二月行密復取常潤二州四月屢破儒兵張訓斷其糧道儒食盡士卒大疫六月行密縱兵擊之儒軍大敗安仁義破儒五十餘寨田頵擒儒于陳斬之傳首京師行密歸揚州表頵守宣州安仁義守潤州八月以楊行密為淮南節度使淮南被兵六年士民轉徙幾盡行密招撫流散輕徭薄斂非公宴未嘗舉樂未及數年公私庶富十一月行密遣李神福將兵討廬州刺史蔡儔二年七月行密克廬州斬蔡儔舒州刺史倪章初與儔連兵儔敗章棄城走行密以李神福為舒州刺史舒州今安慶府八月楊行密遣田頵攻歙州歙州人願以陶雅為刺史雅與行密同起事號三十六英雄之一時諸將為刺史多貪暴獨池州陶雅寬厚得民從之歙人遂降九月升州刺史馮𢎞鐸叛附于楊行密乾寧元年十一月朱全忠遣使至泗州陵慢刺史張諫諫舉州降行密二年三月楊行密取濠州今鳳陽府四月楊行密取夀州及漣水在淮安府安東縣西北三里三年五月楊行密取蘇州又遣將朱延夀進攻蘄州賈公鐸以蘄州降行密遂全有淮南之地四年四月朱全忠遣兵掠泗州九月朱全忠大舉擊楊行密遣龎師古壁清口在淮安府城西將趣揚州葛從周壁安豐在夀州西將趣壽州全忠自將屯宿州十月楊行密將朱瑾壅淮上流以五千騎潛渡擊龎師古淮水大至汴軍駭亂行密督大軍夾攻汴軍大敗斬師古全忠奔還天復二年三月帝遣金吾將軍李儼宣諭淮南封楊行密吳王御札令討朱全忠六月行密發兵討朱全忠攻宿州不克而還升州刺史馮𢎞鐸襲宣州田頵擊降之署𢎞鐸節度副使以李神福為升州刺史田頵有反謀其部下康儒與不合行密署儒廬州刺史頵遂與潤州團練使安仁義同舉兵反族誅儒行密使神福等討頵王茂章討仁義九月頵將王檀汪建為神福所敗頵自將水軍逆戰行密發步兵斷其歸路又遣漣水制置使臺濛將兵應檀建十一月臺濛與頵遇于廣德頵大敗墜馬斬之遂克宣州天祐二年正月安仁義勇决得士心王茂章攻之踰年不克至是城破斬之十一月行密卒宣諭使李儼承制以行密長子渥為淮南節度使三年宣州觀察使王茂章奔杭州四年梁開平元年楊渥驕侈將佐皆不自安左右指揮使張皓徐溫謀作亂殺其親信十餘人謂之兵諫於是軍政悉歸二人四月梁王朱全忠稱皇帝改元渥與蜀王建移檄諸道興復唐室五年梁開平二年五月張皓徐溫弒渥徐溫斬皓七月李儼承制以楊隆演渥弟為節度使遣兵攻吳越圍蘇州六年梁開平三年二月徐溫自領升州刺史以其假子知誥為升州防遏兼樓船副使往治之四月吳越破淮南兵於蘇州七年梁開平四年二月岐王承制加隆演嗣吳王八年梁乾化二年三月吳徐溫遣兵攻破宣州殺其觀察使李遇以徐知誥為升州刺史七月吳以徐溫領鎮海節度使十年梁乾化四年十二月梁遣兵侵吳廬夀徐溫帥諸將拒之戰于霍丘今潁州府霍丘縣梁兵大敗梁之渡淮而南也表其可涉之津霍丘守將朱景徙置深淵及梁兵敗望表而涉溺死大半十二年梁貞明元年八月吳封徐溫齊國公出鎮潤州留子知訓居廣陵輔政十四年梁貞明三年吳徐溫徙治升州徙知誥潤州防禦使十五年梁貞明四年吳副都統朱瑾殺徐知訓亦自殺知誥在潤州聞難即日濟江撫定軍府七月吳以徐知誥為淮南節度行軍副使輔政十六年梁貞明五年四月吳王楊隆演建國改元吳越擊吳戰于狼山吳敗績七月吳越攻吳常州戰于無錫吳越兵敗八月吳與吳越連和歸無錫之俘吳越亦遣使請和自是吳國休兵息民三十餘州民樂業者三十餘年吳武義二年梁貞明六年五月吳王隆演卒弟溥嗣後唐明宗李嗣源天成二年吳主溥乾貞元年吳金陵城成十月吳徐溫卒十一月以知誥都督諸軍事後唐清泰二年吳天祚二年九月吳王溥稱帝改元十月吳加徐知誥尚父太師大丞相元帥封齊王偹殊禮晉天福二年南唐升元元年春正月徐知誥始建齊國金陵十月吳主遜位於齊吳自唐昭宗景福元年壬子鎮淮南梁主真貞明五年己卯建國後唐明宗天成二年丁亥稱帝至時天福二年丁酉亡凡建國十九年稱帝十一年統前淮南共計四十六年南唐晉髙祖天福二年升吳天祚三年南唐烈祖元元年冬十月齊王知誥即帝位於金陵國號唐周世宗顯德二年南唐保大十三年冬十一月周遣李榖督諸軍伐唐初汴水自唐末潰决自甬橋在鳳陽府臨淮縣東南悉為汙澤周主謀擊唐先命發民夫因故堤疏道之東至泗上唐主以劉彥貞將兵二萬趨夀州皇甫暉姚鳳將三萬屯定逺今鳳陽府定逺縣周顯德二年年唐保大十四正月周主下詔親征淮南命侍衛指揮使李重進將兵先赴正陽在鳳陽府潁川時李榖與南唐將劉彥貞相持正陽李重進度淮逆戰於正陽東大破之殺彥貞斬首萬餘級皇甫暉姚鳳退保清流關在滁州周主在夀州命諸軍圍之是時宋太祖為殿前都虞侯大敗唐兵於渦口在鳯陽府懷逺縣東北遂倍道襲清流關暉等陳山下方與前鋒戰宋太祖引兵山後涉水直抵城下暉整衆而出宋太祖手劍擊暉中腦生擒之并擒姚鳳遂克滁州夏四月唐將軍陸孟俊攻揚州韓令坤棄揚州走周主命韓令坤襲揚州令坤以數騎馳入城城中不覺唐副留守馮延魯逃三月周取唐光舒蘄州光在河南汝寧府舒即江南安慶府蘄今湖廣黃州府蘄州四月宋太祖引兵屯六合景達將兵二萬自瓜步濟江唐出兵趣六合宋太祖奮擊大破之餘衆走渡江爭舟溺死者甚衆于是唐之精卒盡矣五月以渦口為鎮淮軍周主北歸周顯德四年年唐保大十五二月周主發大梁命王環將水軍自閔河沿潁入淮閔河名琵琶溝亦曰蔡河即汴水分流自大梁城東經蔡口入潁潁水源出河南府嵩山東至歸德府鹿邑縣俱與蔡河合流至正陽入于淮周主軍于趙步自夀州北二十五里花靨鎮沿淮東下一百餘里有趙步灘三月諸軍擊唐紫金山寨在夀州東北即八公山大破之殺獲萬餘人禽許文真邉鎬楊守忠唐兵溺死及降者殆四萬人獲船艦糧仗十數萬景達陳覺皆奔還金陵已而唐壽州節度使劉仁贍病甚監軍使周廷構舁之出降明日仁贍卒以清淮軍為忠正軍以旌仁贍徙治下蔡赦州境死罪以下除政令不便民者四月周分江南降卒為六軍三十指揮號懷德軍十一月周主拔濠州又拔其水寨及羊馬城大破唐兵于洞口胡注云鳳陽府東九十里浮山洞口鼓行而東所至皆下十二月唐兵退保清口淮安府清縣有清口周主自將親軍自淮北宋太祖將步騎自淮南諸將以水軍自中流共追唐兵至楚州今淮安府西北大破之獲戰艦三百餘艘戰士七千餘人唐濠州團練使郭廷謂舉城降周主使將濠州兵攻天長遣指揮使武守琦將騎數百趣揚州至髙郵唐人悉焚揚州官府民居驅其人南渡江周主聞泰州無偹遣兵襲取之周顯德五年唐交泰元年正月周師克唐海州周主欲引戰艦自淮入江阻北神堰在淮安府城北不得渡鑿鸛水在淮安府城西名老鸛河以通其道巨艦數百艘皆逹于江又拔唐靜海軍淮安府通州周兵攻楚州踰四旬唐防禦使張彥卿固守不下周主自督諸將攻克之彥卿矢刃皆盡猶舉繩牀以鬭而死所部千餘人無一降者二月周主發楚州三月至泰州辛卯如迎鑾鎮今儀徴縣至江口擊唐軍大破之時淮南惟廬舒蘄黃未下唐主遣劉承遇表獻四州嵗輸貢物數十萬于是江北悉平得州四十縣六十是月浚汴口道河逹流于淮於是江淮舟楫始相通宋太祖建隆二年二月唐遷都于豫章八月唐主璟殂子煜嗣立於建康開寶四年乃上表乞貶國曰江南宋許之七年宋遣使諭江南主入朝江南主稱疾辭九月命曹彬潘美曹翰將兵十萬伐之十月彬等自江陵發戰艦東下水陸並進閏月克池州敗唐兵於銅陵今池州府銅陵縣遂次采石初池州人樊若水釣魚采石江上數夜乘小舟載絲繩維南岸疾棹抵北岸以度江之廣狹因詣闕上書言江南可取狀請造浮梁以濟師帝然之遣內侍石全振造黃黑龍船數千艘又載竹絙自荆渚而下既克池州即用為知州若水請試舟於石牌口遂移置采石不差尺寸大軍渡江若履平地江南主以鄭彥華督水軍杜直督步軍各萬人逆戰皆敗八年正月田欽祚克溧水江南兵水陸十萬陳于城下時舟楫未具潘美涉水徑渡大軍隨之江南兵大敗馬軍都虞侯漢瓊率所部取巨艦實以葭葦乘風縱火拔其城南水寨又拔關城守陴者爭遁溺死二月曹彬以大軍進次于秦淮江南統軍使李雄父子八人皆沒于陳十月曹彬遣都虞侯劉遇破江南軍于皖口時唐朱令贇入援衆號五十萬順流而下將焚采石浮橋㑹北風甚火反及之衆大潰遂擒令贇自是絶無外援十一月唐主再奉表緩師不報甲申曹彬夜敗江南軍于城下乙未遂克升州江南平凡得州十七軍三縣一百八十南唐自晉髙祖天福二年丁酉至宋太祖開寶八年乙亥凡三主計三十九年吳越唐僖宗乾符二年淅江狼山在揚州府通州濱海鎮遏使王郢等劫庫兵作亂攻陷蘇常隨泛江入海四年閏月鎮海節度使裴璩招降郢黨散其徒六七千人輸器械二十餘萬舟航粟帛稱是光啓三年五月鎮海軍亂逐其節度使周寶奔常州推薛朗留後錢鏐遣都將杜稜阮結成及等討薛朗六月敗之陽羡十月拔常州錢鏐具部將禮迎周寶歸杭州十二月鏐以杜稜為常州制置使命阮結攻閏州禽薛朗斬之以阮結為潤州制置使昭宗龍紀元年三月錢鏐從弟銶拔蘇州景福元年五月以錢鏐為蘇杭觀察使二年董昌僭號命鏐討之三年昌求救于淮南楊行密行密遣兵攻蘇州以救之虜刺史成及四年七月錢鏐使顧全武拔松江無錫常熟華亭光化元年九月顧全武攻蘇州淮南刺史臺濛棄城走獨秦裴守崑山不下食盡城壞乃降二年五月進錢鏐爵為越王天祐元年四月更封為吳王梁太祖開平元年年晉岐吳稱天祐四四月梁以錢鏐為吳越王梁開平三年六晉岐吳稱天祐年四月淮南將周本圍蘇州不克夜遁梁乾化三年十晉岐吳稱天祐年五月拔廣陵今江南廣德州梁末帝貞明五年吳晉岐吳稱天祐十六年楊武義元年三月梁詔吳越王鏐討吳語在吳志周顯德三年年南唐保大十四吳越入貢周乃詔諭吳越出兵擊唐吳越王俶遣吳程督兵趣常州為唐所敗引還宋太祖開寶八年四月吳越王俶帥兵五萬攻常州進兵拔其關城攻江隂宜興皆下之遂取常州太宗太平興國三年吳越王俶籍境內州軍以獻宋封俶為淮海國王吳越自唐昭宗光化元年戊午始鎮杭州後梁龍德三年癸未始建國至宋太宗太平興國三年戊寅納土前後五傳共計八十一年建國五十六年宋平揚州淮南節度使李重進周太祖之甥也帝即位加重進中書令賜之鐵劵重進不自安拘宋使陳思誨治城繕兵求援于唐唐主以聞遣石守信等討之尋親征太祖建隆元年十一月至廣陵城將陷重進盡室自焚揚州平南渡髙宗徽宗第九子名構封康王靖康元年金兵圍京師以張邦昌為計議使奉康王往質金軍求和金人以為非親王遣還十一月復詔王雲副王使斡里雅布軍王至磁州守臣宗澤諫止之帝即命為兵馬大元帥開府相州二年二月康王帥師次濟州有衆八萬四月金人以二帝北去元祐太后降詔命即帝位五月朔受命即位于濟州建炎元年七月詔郭仲荀奉元祐太后如揚州六宫及衛士家屬皆從迎奉太廟神主赴行在十月帝如揚州二年春正月帝在揚州五月下詔擇日還京既而不果冬十一月辛巳朔朝享祖宗神主于夀寧寺三年春正月帝在揚州丙午金人陷徐州二月庚戌朔皇子六宫如杭州金人至楚州辛亥陷天長壬子內侍報金兵至帝被甲馳至瓜洲渡江至鎮江府是日金兵過楊子橋遊騎至瓜洲翌日發鎮江次吕城鎮金兵入真州甲寅次常州丙辰次平江府丁巳金人犯泰州戊午次吳江縣己未次秀州士戌駐蹕杭州即州治為行宫癸亥命有司具舟常潤迎濟衣冠軍民家屬戊辰金人焚揚州而去吕頤浩復揚州夏四月丁卯帝發杭州五月戊寅朔帝次常州辛巳次鎮江乙酉至江寧府改名建康六月庚申皇太后至建康乙亥詔諭中外以迫近防秋請太后率宗室迎奉神主如江表帝與輔臣宿將偹禦敵兵應接中原官吏士民家屬南遷者有司毋禁秋七月辛卯改杭州為臨安府八月己未太后發建康閏月丁酉至洪州壬寅帝發建康甲辰次鎮江九月丙午朔諜報金人治舟師將由海道窺浙遣韓世忠控守圖山福山辛亥帝次平江府冬十月癸未帝至臨安留七日遂如越州壬辰至越州戊戌金人陷夀春十一月乙巳犯廬州守臣李㑹以城降戊申烏珠犯和州守臣李儔以城降己酉陷無為軍庚申陷真州壬戌金人陷溧水縣癸亥陷太平州丁卯金人又陷六安軍辛未烏珠渡江入建康癸酉帝如明州十二月辛已金人攻常州守臣周杞擊走之陷廣德軍壬午定議航海四年正月帝御舟碇海中二月丙申金遊騎至平江戊戌入平江縱兵焚掠三月壬子入常州丁巳至鎮江府韓世忠屯焦山寺邀擊之四月韓世忠駐軍揚子江要金人歸路屢敗之烏珠引軍走建康丙申韓世忠及烏珠再戰江中金人乘風縱火世忠敗績烏珠渡江屯六合縣五月壬子金人焚建康淮南宣撫司統制嶽飛邀擊於靜安鎮敗之甲寅金人陷定逺縣是月烏珠自六合引兵趨陜西七月庚申以嶽飛為通泰州鎮撫使九月金人陷楚州辛酉犯揚州統制靳賽逆戰于港河敗之十一月丙午嶽飛棄泰州渡江丁未金人犯泰州飛退保江隂軍沙上乙卯金人陷泰州丁巳通州守臣吕伸棄城去紹興元年春正月己酉金人犯揚州秋七月達蘭自宿遷北歸三年四月壬辰徙都督府于鎮江四年正月庚午詔諸路將帥毋以兩國通使輒弛邉偹淮南州郡津渡尤慎譏察五年二月丁丑帝發平江七月甲午韓世忠復鎮淮軍擒僞齊守王拱冬十月乙丑僞齊兵寇漣水軍遣統制呼延通等逆擊敗之六年二月乙卯韓世忠引兵攻宿遷縣統制呼延通與金兵戰敗之擒其將貝勒雅哈丙辰韓世忠圍淮陽軍辛酉烏珠救淮陽韓世忠引兵歸楚州三月金齊兵冦漣水軍韓世忠擊敗之七月劉光世復夀春八月甲辰詔諭將士將親征九月丙寅朔帝發臨安癸酉帝次平江癸未權奉安神主于平江能仁寺冬十月劉麟寇淮西張浚遣楊沂中張宗顔等分兵禦之戊戌沂中至濠州遣統制王德酈瓊及賊將崔皋賈澤王遇戰皆敗之賊兵夀春芍陂寨守臣孫暉拒戰又敗之甲辰劉猊犯定逺縣沂中進戰大敗之於藕塘猊挺身遁追至南夀春而還癸丑張浚楊沂中引兵攻夀春不克而還十二月韓世忠攻淮陽軍及金人戰敗之辛丑城南夀春府七年春正月癸亥朔帝在平江下詔移蹕建康庚辰築采石宣化二城二月己未帝發平江三月癸亥朔次丹陽韓世忠入見命世忠扈從嶽飛次之甲子次鎮江辛未帝至建康夏四月築太廟于建康以臨安太廟為聖祖殿戊戌修濬建康城池秋七月詔即建康權正社稷之位壬子統制呼延通王權等襲擊金人於淮陽軍敗之閏月韓世忠引兵渡淮逆擊金人於劉冷莊敗之是月張俊棄盱眙引兵還建康十二月庚午命韓世忠留屯楚州屏蔽江淮八年春正月戊子朔帝在建康二月帝發建康如臨安九年春三月丙申王倫受地于金得東西南三京夀春宿亳曹單州及陜西京西之地四月壬申移壽春闕淮北舊城九月己亥郭仲荀率東京兵五千至鎮江十年閏月韓世忠遣統制王勝王權攻海州克之執其守王山庚子張俊棄亳州引軍還夀春八月丁亥楊沂中自宿州夜襲栁子鎮軍潰遂自夀春渡淮歸金人屠宿州九月壬寅朔諭韓世忠罷兵時秦檜専主和議諸大帥皆還鎮十一年春金人犯夀春守臣孫暉統制雷仲合兵拒之丁巳夀春陷暉仲棄城去丙寅烏珠陷廬州二月癸酉張俊遣王德渡江屯和州金人退屯昭關乙亥金人復來爭和州張俊敗之丙子王德等敗金人于含山縣東己卯統制關師古等橫擊敗金人于巢縣復之癸未王德田師中等擊破金人復含山縣奪昭關劉錡自東關擊敗金人於青溪甲申金人復犯昭關王德等又敗之李顯忠遣統領崔皋擊敗金人于舒城縣丁亥楊沂中等大敗金人於柘臯己丑烏珠率兵逆戰于店步沂中等又敗之乘勝逐北遂復廬州三月壬寅韓世忠引兵趨夀春金人圍濠州甲辰張俊楊沂中劉錡議班師丁未金人陷濠州執守臣王進夷其城壬子金人渡淮北歸冬十月丙寅朔金人陷泗州遂陷楚州是月金人陷濠州是月與金國和議成立盟書約以淮水中流畫疆嵗奉銀二十五萬兩絹二十五萬匹休兵息民各守境土平江淮羣盜建炎元年秋七月命都統制王淵劉光世韓世忠張俊分討江淮羣盜九月賊趙萬陷常州冬十月王淵誅之十一月軍賊張遇陷池州遇本真定軍校聚衆為盜自淮西渡江守臣滕祐棄城遁賊丁進圍夀春守臣康允之拒却之十二月辛巳丁進詣宗澤降二年春正月王淵招降張遇以所部萬人𨽻韓世忠軍八月河北京東捉殺使李成叛犯宿州詔劉光世討之九月丁進復叛寇淮西劉正彥擊降之三年盜邵青掠泗州青本五丈河舟人為盜劫楚泗間夏四月盜薛慶據髙郵有衆數萬張浚入其壘諭以朝廷恩意慶遂降浚留撫其衆秋七月山東盜郭仲威掠淮陽軍仲威本李成黨翟興引兵與戰敗之冬十月仲威詣平江守周望降望以仲威為將李成掠淮北陷泗州殺知州耿堅據其城詔撫諭之命知泗州成復陷滁州守臣向子伋及諸官屬皆被殺四年三月己巳盜戚方陷廣德軍五月用范宗尹言以羣盜為諸軍鎮撫使趙立楚泗州漣水軍劉位滁濠州趙霖和州無為軍李成舒蘄州李彥先海州淮陽軍薛慶髙郵天長軍俾立顯功許以世襲六月甲申嶽飛破戚方於廣德丙戌戚方詣張俊軍降冬十月江東賊張琪犯建康府紹興元年五月劉光世使王德襲揚州擒郭仲威送行在斬之時仲威謀據淮南通劉豫辛亥水軍統制邵青叛圍太平州劉光世招降之六月邵青復叛犯江隂之福山遣李進彥耿進率舟師㑹劉光世討之冬十月邵青聚其黨于崇明沙將犯江隂劉光世令王德討之青用火牛衝陳德命合軍持滿萬矢齊發牛返奔賊衆殱焉縳青送行在餘黨悉平劉豫南犯豫景州人建炎四年金立為齊帝紹興元年六月劉豫置招受司於宿州誘宋逋逃三年夏四月水軍統制徐文以所部海舟六十艘官軍四千餘自明州浮海抵鹽城降於豫豫以文知萊州帥其衆冦通泰州四年劉豫乞師於金因嶽飛復襄鄧而懼也金以兵五萬應豫使烏珠將前軍豫遣子麟姪猊分道南侵騎兵自泗攻徐步兵自楚攻承州冬十月丙子詔韓世忠屯揚州戊子世忠使統制解元守承州親提騎兵至大儀勒五陳設伏二十餘所以待之金别將托卜嘉擁鐵騎至伏兵四起擒托卜嘉等二百餘人而所遣董攸亦擊敗金人于天長之鴉口橋己丑金人攻承州解元一日十三戰相拒未决世忠往援復大戰俘獲甚多追至淮金人驚潰相蹈藉溺死者甚衆帝决策親征發臨安十二月壬辰金齊合兵圍廬州守臣仇悆嬰城固守嶽飛遣牛皋徐慶援之金軍潰皋追之三十里殺獲甚多㑹雨雪餽道不繼又聞金主晟病烏珠逹蘭夜引還劉麟劉猊亦棄輜重遁六年春正月韓世忠引軍渡淮傍符離而北呼延通擒金將雅哈貝勒乘勝進圍淮陽烏珠與劉猊皆引兵至復還楚州淮陽民從而歸者萬計冬十月劉豫分三道入寇麟率中路兵由夀春犯合肥猊率東路出渦口犯定逺孔彥舟率西路兵犯六安張俊劉光世議退保張浚上言淮南之屯正所以屏蔽大江諸將渡江則無淮南而長江之險與賊共矣乃諭諸將有一人渡江即斬以狥劉猊軍至淮東為韓世忠所阻乃引趨定逺張俊拒劉麟于濠夀之間猊謀寇建康兵至藕塘復為沂中所敗張宗顔自泗來乘背擊之張俊復與戰于李家灣賊衆大敗猊遁去麟聞猊敗亦拔寨去官軍至南夀春而還金人聞豫敗始有廢豫之意海陵南侵紹興三十一年五月闕淮漢地六月金主亮遷都于汴以逼我秋七月金大括馬於諸路八月辛丑朔忠義人魏勝復海州九月戊戌詔以金人背盟降敕榜諭中原軍民是月金主命李通造浮梁淮上大舉入寇衆號百萬冬十月庚子朔詔將親征金人圍魏勝於海州李寶以舟師至東海與勝同擊金人於西橋敗之乃解圍去辛丑金人自渦口渡淮癸卯金人陷蔣州李顯忠遣孔福與戰于大人洲敗之乙巳金人復犯海州魏勝李寶擊却之劉錡引兵次淮陽金人將自清河口入淮錡列兵于運河岸以扼之戊申王權聞金兵大至自廬州遁屯昭關庚戌知廬州龔濤棄城走壬子劉錡遣王剛擊敗金人於清河口金人復來戰剛失利癸丑金人圍廬州又陷海州李寶力戰敗之解圍去劉錡引兵渡淮及金人戰死者十七八金主亮以大軍至廬州城北之五里築土城以居戚方遣張寶復蔣州乙卯劉錡自淮陽引兵歸揚州丙辰金主亮入廬州王權自昭關遁金人追至尉子橋姚興戰死權退保和州丁巳帝定議親征金人犯真州遂犯揚州庚申王權自和州遁歸屯於東采石辛酉金人陷和州壬戌劉錡退軍瓜洲鎮揚州陷乙丑金人趨瓜洲劉錡拒之于皂角林大敗之斬其統軍髙景山丙寅劉錡還鎮江府十一月己巳朔金人犯瓜洲鎮劉泛戰敗走金人鐵騎奄至江上乙亥金主亮臨江期翌日南渡丙子虞允文督建康諸軍以舟師拒亮東采石戰勝却之崔定復巢縣丁丑允文以舟師擊金人于楊林河口又敗之亮焚舟而去庚辰亮引軍趨淮東癸未虞允文自采石如鎮江偹敵甲申亮至揚州乙未陷泰州是日金人弒亮于揚州龜山寺戊戌金遣人詣鎮江軍中議和十二月庚子楊存中及虞允文渡江至瓜洲察金人兵是月知金主亮已死遂趨燕京三十二年春正月戊辰朔帝在鎮江己巳金人犯夀春忠義將劉泰戰死金人引去庚午帝發鎮江壬申至建康府二月癸卯帝發建康乙卯至臨安府夏四月庚寅王剛破金人于海州旋復來圍張子蓋及魏勝敗之圍解六月罷三招討司以金人議和故也隆興和議紹興三十二年帝新即位張浚請先城泗州十一月金以宋欲正敵國體命將分屯要害隆興元年五月丁酉李顯忠復靈璧縣庚子復虹縣金知泗州富察特默降甲辰李顯忠等敗金人於宿州丙午復宿州戮金兵數千人辛亥金人自睢陽引兵至宿州李顯忠擊却之壬子顯忠與金人戰于宿州軍大敗甲寅李顯忠邵宏淵二將不睦軍大潰于符離乙卯下詔親征六月張浚自盱眙還揚州秋八月戊寅金赫舍哩志寧屢以書求海泗唐鄧四州地及嵗幣遣官往返不允至是命海泗州徹戍二年金使至盱眙以國書違式弗受欲得商秦地及俘獲人且邀嵗幣三十萬把未得進辛巳金人分道渡淮劉寶棄楚州遁十一月乙酉知楚州魏勝與金人戰死之州遂陷濠州亦陷王彥棄昭關遁滁州亦陷丙申遣國信大通事王抃如金帥府正皇帝號為叔姪之國易嵗貢為嵗幣减十萬割商秦地歸被俘人惟叛亡者不與甲辰金人犯六合縣步軍司統制崔皋擊却之閏十一月詔廷臣舉楚廬滁濠四州守臣乾道六年閏月戊子遣范成大等使金求陵寢地且請更定受書禮是月成大至自金許以遷奉及歸欽廟梓宫而不易受書禮北伐更盟寧宗嘉泰四年春正月韓托胄以金國多難定議伐金開禧二年夏四月丁丑鎮江都統制陳孝慶復泗州五月辛巳朔陳孝慶復虹縣癸巳以伐金告于天地宗廟社稷是月攻宿州敗績六月攻夀州敗績冬十月金兵分九道南下丙子呼沙呼自清河口渡淮圍楚州十一月戊子犯廬州戊戌圍和州甲辰犯真州是月濠州為金所破十二月甲寅攻六合縣戊辰布薩揆自淮南退師留一年據濠州嘉定元年春正月壬午金人牒求韓托胄首三月辛卯詔梟托胄首於兩淮夏六月辛未歸濠州宋復金讐寧宗嘉定四年六月遣使賀金主生辰時金有䝉古之難不暇延使者冬十月甲辰金謹邉偹七年秋七月庚寅以真德秀奏罷金國嵗幣十年夏四月金人南犯壬戌徐州以捷聞金人遁十二年閏三月辛卯金人圍安豐軍江淮制置使李珏遣將救之十三年八月甲申復海州以徐晞稷知州事盱眙將石圭叛入漣水軍十四年三月扈再興擊金人于天長敗之四月戌辰金人渡淮而北李全遣兵追擊又大敗之理宗紹定四年冬十月金將以盱眙軍來降赦盱眙改為招信軍端平元年正月金亡平細巾嘉定十二年閏三月興元軍士張福莫簡作亂七月丙申安丙誅張福莫簡自殺細巾賊悉平平李全嘉定十一年春正月壬午洋帥李全率衆來歸詔以全為京東路總管寶慶元年二月李全焚楚州許國走死三年八月李全自青州復入淮安殺張琳紹定三年三月李全兵數萬冦鹽城十二月李全冦泰州復冦揚州趙范趙葵㑹師擊敗之四年春正月李全伏誅于揚州之新塘䝉古南侵理宗端平元年六月趙范趙葵因金之亡欲乘時撫定中原收復三京參議丘嶽言方興之敵新盟而退開釁致兵必自此始不聽三年四月以襄陽失陷洛陽兵敗下詔自責冬十月丙午元遊騎趨合肥十一月元兵攻真州知州丘嶽設伏西城殺其驍將焚其廬帳越二日引去嘉熙二年秋九月䝉古軍察罕帥兵號八十萬圍廬州杜杲極力守禦又練舟師扼淮河䝉古軍不能進引師北歸淳祐元年秋七月䝉古軍渡淮入揚滁和州冬十月甲寅陷通州三年夏六月以吕文德為淮西招撫使先是以文德總兩淮軍馬值䝉古軍圍夀春文德解其圍遂有是命未幾又敗䝉古軍于五河復其城五年秋七月䝉古軍掠淮西至揚州而去十一年秋七月䝉古軍分道寇淮蜀寶祐五年秋八月李全子璮攻海州漣水等處十一月陷之景定三年二月庚戌李璮子彥簡以漣海三城來歸改漣水為安東州八月李璮為䝉古軍所獲支解以徇度宗咸淳元年八月甲午元阿珠帥大軍至廬州及安慶諸路統制范勝等歿于陳元取江南世祖至元二年宋咸淳元年秋七月癸未元巴延分大軍為兩道自與阿珠由襄陽博囉歡由東道取揚州十二年宋德祐元年春正月戊戌宋池州都統張林請降于元權州事趙卯發自經死元兵入安慶宋范文虎降通判夏椅自殺二月壬戌宋知鎮江府洪起畏知寧國趙與可知和州王喜以城降元戊辰宋知江隂軍鄭䇕棄城遁知無為軍劉權知太平州孟之縉皆以城降三月癸酉宋都統徐旺榮迎元兵入建康府甲戌元兵至無錫宋知縣阮應得出戰一軍皆沒應得赴水死丁丑宋知滁州王應龍以城降元壬午宋知常州趙與鑒聞元兵至遁州人錢訔等以城降甲申元兵至西海州宋安撫丁順降乙酉知東海施居文乞降於西海州知平江府潛說友以城降丙戌知廣德軍令狐槩以城降己丑滁人執王應龍歸于揚州殺之知安東州孫嗣武以城降丙申宋閻順復取廣德軍四月元兵入廣州知縣王汝翼死之丁巳總制霍祖勝攻溧陽復取之知金壇縣李成大與元戰死之壬戌元兵攻真州宋知州苗再成宗子趙孟錦率兵大戰于老鴉嘴敗績阿珠乘勝趨揚州庚午阿珠兵至揚子橋宋揚州都撥發官雷大震戰死五月癸酉元兵至寧國縣宋知縣趙與䅯出戰死丁丑劉師勇攻常州復取之丙申宋帝詔張世傑張彥阮克已仇子真分道出兵秋七月辛未張世傑諸軍戰焦山下敗績八月乙巳宋吳繼明復平江縣庚戌劉師勇攻吕城破之甲子宋以文天祥兼知平江府十月以張世傑兼知江隂軍壬戌元巴延渡江分兵為三道阿喇哈鄂囉齊帥右軍出廣德之四安鎮董文炳帥左軍出江並海取道江隂趨澱浦華亭以范文虎為前鋒巴延自將中軍趨常州以吕文煥為前鋒水陸並進期㑹臨安元史係十一月乙亥巴延分軍為三趣臨安阿喇哈率步騎自建康四安廣德以出獨松嶺董文炳率舟師循海趨許浦澉浦以至浙江巴延安塔哈由中道節度諸軍期並㑹于臨安是月甲子宋尹玉戰五牧死之李世修以江隂降十一月元兵破興化知縣胡拱辰自殺戊寅元將阿喇哈破廣德軍及四安鎮甲申元巴延圍常州招降不聽攻二日破之屠其城知州姚訔通判陳照都統王安節皆死之劉師勇潰圍奔平江丁未元兵入平江府十三年宋德祐二年春二月丁酉朔宋帝詔諭郡縣使降元明太祖龍興太祖先世沛人徙家句容大父再徙家泗州太祖年十七遭疫父母相繼沒乃入皇覺寺逾月僧乏食西至合肥厯汝潁諸州時定逺人郭子興據濠州往歸之子興以所撫女妻焉即馬后也軍中呼為朱公子至正十二年閏三月甲戌朔起兵於濠十三年春朱公子歸鄉里募兵得七百人十四年秋七月率徐達湯和等二十四人南略定逺執驢牌寨帥降其兵三千人又招降秦把頭等八百人破繆大亨義兵于橫澗山軍聲大振遂克滁陽收全椒大栁諸寨子興帥所部歸滁陽稱滁陽王冬十月元兵攻滁敗之十五年春正月據和陽三月滁陽王子興卒劉福通等立韓林兒為主號小明王檄興子為元帥朱公子副之公子不受夏五月至巢湖收廖永安水寨兵破曼濟哈雅於黃墩六月朔渡江拔采石改太平路為太平府八月分命徐達等取溧水溧陽句容蕪湖皆下之進攻集慶與元將陳額森福夀戰秦淮上失利額森為鄉兵所殺其子兆先屯方山曼濟哈雅結寨采石為犄角十六年春正月常遇春破曼濟哈雅兵三月朔攻集慶路庚寅克之丙申進攻鎮江丁酉克之分兵下金壇丹陽諸縣改鎮江府為江淮府旋復舊名六月乙卯命鄧愈等進攻廣德路克之以愈鎮守秋七月己卯諸將奉朱公子為吳國公定江南元至正十六年九月張士誠攻鎮江陷宜興士誠泰州白駒場亭民為鹽場綱司牙儈與弟士德士信俱以販鹽緣為奸利性輕財好施頗得衆心于至正十三年五月起兵陷髙郵復陷泰州十六年二月陷平江遂掠松江湖州常州諸郡皆據之徐達攻毗陵設伏擒其弟士德十一月士誠圍徐達於牛塘常遇春等來援內外夾擊大破之擒其將張德十七年三月戊午克常州夏四月徐達常遇春攻寧國降之五月俞通海等略太湖降士誠將王貴紐津己卯克泰興六月克江隂七月徐達等下常熟襲江隂馬䭾沙克之鄧愈胡大海下績溪休寧庚辰克徽州改為興安府九月青軍元帥張明鑑據揚州繆大亨攻下之改揚州路為淮海府敗元兵于徽州城下進克婺源冬十月常遇春等克池州斬天完將洪元帥復敗天完平章陳友諒兵十八年春二月李文忠等進取青陽石埭太平旌德諸縣皆下之夏四月陳友諒冦池州太平劉友仁趙忠死之俞通海尋復池州趙德勝略石埭擒友諒將錢清六月張士誠寇常州湯和戰敗之復寇常熟廖永安大敗之於福山港冬十月甲戌克宜興十九年春三月陳友諒遣將冦寧國太平縣胡惟庸等擊敗之復冦青陽石埭等縣張德勝戰走之夏四月徐達等擊破友諒柵江營賊棄舟走癸酉復池州五月克無為秋八月徐達克潛山二十年夏四月徐達常遇春拔友諒之水寨敗其援師九華山下閏五月友諒陷太平守將花雲死之友諒引兵東下吳公擊之潰走追擊至慈湖焚其舟追至采石復大敗之遂復太平七月克安慶二十四年夏四月俞通海等略劉家港敗士誠兵于通州擒其院判朱瓊秋七月丁丑克廬州路安豐部將以舒城降二十五年閏十月克泰州擒士誠將嚴再興等徇興化降其將李清二十六年三月徐逹等克髙郵進攻通州大破之夏四月徐達常遇春攻淮安士誠將梅思祖出降并獻所部四州戊午克興化淮地悉平庚申克濠州遂入濠省陵墓宴父老五月徐達韓政克安豐八月辛亥命徐達常遇春伐張士誠十一月辛卯圍吳江降之癸卯達等兵圍平江城俞通海分兵取太倉州崑山崇明嘉定望風皆降松江路守將王立中聞之亦降二十七年夏四月破平江城擒士誠送建康士誠自縊死諸將還師取通州丁亥胡廷美取無錫太祖定鼎金陵元至正十五年六月克太平路耆儒陶安進說金陵帝王之都龍蟠虎踞可據形勢以臨四方吳公大悅十六年三月克金陵改集慶路為應天府八月拓建康城延亘周圍凡九十六里作新宫于鍾山之陽遂定都焉二十四年春正月羣臣奉吳公為吳王建百官司屬二十七年稱吳元年二年戊申春正月乙亥即帝位于南郊定有天下之號曰大明建元洪武建南北郊大社稷五月庚寅帝至汴梁八月詔以金陵汴梁為南北京燕王靖難建文四年五月燕兵至泗州守將周景初舉城降遂濟淮攻下盱眙以兵趨揚州守將王禮降即命禮諭降髙郵通泰諸城進攻儀真破之六月兵至浦子口都督僉事陳瑄等降乙卯渡江鎮江降建文帝分命諸王守城復命諸王往燕割地議和燕王不許齊泰奔廣德州黃子澄奔蘇州癸亥燕兵至朝陽門屯金川門谷王橞李景隆開門降徐國公徐輝祖迎戰敗績朝廷文武俱迎建文帝左右唯數人遂盡閉諸后妃宫內縱火焚之帝遂遜國去己巳燕王即皇帝位平倭冦嘉靖三十二年夏四月倭犯蘇松郡屠上海之南匯川沙圍嘉定太倉所過殘掠指揮盧鏜掩擊斬其帥蕭顯秋七月太平同知陳璋敗倭於獨山冬十月倭掠蘇松各州縣移舟泊寶山總兵湯克寬擊敗之于高家嘴倭寇興化指揮張棟擊殱之三十三年三月倭掠通州如臯海門諸州縣焚掠鹽場四月倭破崇明城知縣唐一岑死之進掠蘇州轉至松江總兵俞大猷擊敗之于吳淞所八月倭自嘉興還屯採淘港柘林諸處進薄嘉定參將李逢時敗之於新涇橋倭退據羅店官軍追斬之詔以工部侍郎趙文華禱祀東海兼督察沿海軍務三十四年夏四月倭犯江北淮揚諸處分掠常熟江隂諸鎮兵偹任環等攻破其巢倭奔江隂川沙窪出海去五月張經破倭於王江涇詔以巡按御史胡宗憲為僉都御史代李天寵巡撫勦賊倭分衆兩道一由蘇州齊門而北掠滸墅關長洲五都地一由胥門木瀆而南轉掠吳縣橫鎮蔓延常熟江隂無錫等縣川沙窪倭犯閘港周浦流劫崑山石浦六月倭冦蘇常諸縣知縣王秩錢錞居鄉參政錢泮等戰死任環邀擊敗之於太湖復擊于馬跡山獲倭投火爇之幾盡八月倭突入歙縣至南陵趨太平犯江寧鎮操江兵扼之遂趨秼陵關流劫溧水溧陽趨宜興無錫至滸墅關巡撫曹邦輔㑹兵進勦倭奔太湖追及楊家橋盡殱其衆副使任環復勦倭于新場及上海之五里橋太倉之毛家葛隆諸處倭走三十五年正月倭流劫至圌山山北等港無為州同知齊恩迎戰敗之恩子尚文等二十一人追倭至安港伏發皆死賊乘勝至金山殺千戶沈宗玉于江中八月海寇徐海伏誅三十六年冬十一月海寇汪直伏誅三十八年四月江北倭趨通州進據白浦鎮副使劉景韶逰擊丘升三戰三捷倭逸入潘家莊復盡鋭攻之乃勦絶廟灣倭合衆攻淮安參將曹克新禦戰于姚家宕大敗之倭遁入民莊官兵縱火焚之無一人脫者五月江北兵攻倭於廟灣破之追奔至瑕子港倭開洋去六月倭屯崇明三川沙總兵盧鏜攻破之秋七月三川沙倭犯海門參將丘升敗之於鄧家莊復追至鍋團倭遁八月官兵圍倭於劉家橋白駒沙諸處縱火冲擊破其巢又追敗之於七竈莊花墩盡殄之四十三年二月戚繼光大破倭于仙逰俞大猷復大破之於潮州倭患始息福藩之立福王名由松神宗孫福王常洵子洛陽陷王避亂南下次淮安值甲申三月之變南中府部等官㑹議監國史可法吕大器欲奉潞王鳳督馬士英與操江誠意伯劉孔昭總兵劉澤清髙傑黃得功劉良佐迎王于江上大清順治元年甲申五月福王稱號于南京以內守偹府為行宫召史可法髙𢎞圖馬士英入閣辨事姜曰廣王鐸俱為大學士以總兵黃得功髙傑劉澤清劉良佐分鎮淮上史可法開府揚州督其軍二年五月大清兵渡江王奔蕪湖十五日大兵迫至蕪湖王被執三年五月賜死國朝平定江南順治二年三月乙巳王師下徐州明總兵鎮徐將軍李成棟南奔遂下潁州夏四月下亳州至淮安總兵東平伯劉澤清逃丁丑下揚州明督帥史可法死之五月己丑駐兵瓜洲庚寅大兵蔽江而下明三鎮兵各東遁丙申豫親王至南京總督京營戎政尚書趙之龍以下文武百官皆降豫王駐劄天壇中戊戍百官朝豫王于行營光祿寺卿葛徵竒給事王端伯部郎劉光弼吳嘉允中書龔廷祥死之乙巳劉良佐以明福王至南京靖南侯黃得功死之六月徇常州蘇州下之閏六月八日下常熟圍崑山徐開禧開城迎降圍嘉定秋七月破之鄉紳侯峒曽黃淳耀死之八月初三日下松江沈猶龍夏允彛死之二十日破金山衛指揮侯懷玉父子死之下清浦圍江隂厯閏六月至八月二十一日破之典史陳明遇在籍中書戚勳等死之十一月十三日破崇明凡九閲月而江南平江南通志卷一百九十九欽定四庫全書
