  text: 江南通志卷十輿地志疆域形勢附古揚徐二州之界南北距淮豫州則北距大河今江南境內自淮以南為揚州而北入徐西北入豫不但跨淮屬泗并踰河以北此雖由古今川瀆同異而幅員之所包絡者廣矣形勢則潮汐之池號為天沼貫以三瀆是綱是紀霍蜀大障屏蔽坤位地險備焉至於畫郊圻扞牧圉在國曰固在野曰險凡有司存宜加詳審者也江南通省合上下兩江布政使司統轄府州縣衛之地廣輪數千里其為疆域所分自省會金陵郡治東暨海州五百五十里西至河南省固始縣界八百五十里南抵江西省浮梁縣界八百五十里北接山東省嶧縣界九百五十里遙拱帝京二千四百里形勢總計江南之境鍾茅八公天柱九華黃塗潛霍山之作鎮而著名者不勝數黃河江淮運河三江泗汝潁睢滁淝川之經行而涵浸者不勝數藪則震澤巢湖洮湖關則東關清流二峴名都雄鎮襟帶江淮淮之北潁亳徐邳訖於海州贛榆淮之南廬夀滁和訖於揚通江之南北列上遊者安池太平諸郡縣號沃野者鎮常蘇松諸府州而漕河蜿蜒直上飛挽逸於前代蓋江蘇安慶俱屬省會而江寧尤重矣江寧府由府治上至帝京道里見前省會東至鎮江府丹陽縣界一百六十里西至和州界一百八十里南至寧國府宣城縣界二百四十里北至泗州天長縣界一百四十里東西廣三百四十里南北袤三百八十里舊轄縣八雍正八年移溧陽一縣𨽻鎮江府今轄縣七附郭為上元為江寧去府東九十里為句容東南八十五里為溧水南二百四十里為高淳西四十里為江浦西北一百三十里為六合上元縣東六十里至龍潭句容縣界西三里至漢西門江寧縣界南半里至內橋江寧縣界北五十里至觀音門外江中六合縣界江寧縣東三里至通濟門內大街上元縣界西十五里至北河口江中江浦縣界南七十五里至銅井鎮界牌太平府當塗縣界北二里至笪橋上元縣界句容縣東五十里至白兔鎮鎮江府丹陽縣界西二十里至土橋鎮上元縣界南五十里至望湖岡溧水縣界北七十五里至炭渚鎮江府丹徒縣界溧水縣東四十五里至分界山鎮江府溧陽縣界西四十五里至明覺寺太平府當塗縣界南七十里至尋真鋪高淳縣界北四十五里至烏剎橋江寧縣界高淳縣東七十里至鄧埠鎮鎮江府溧陽縣界西三十里至水碧橋寧國府宣城縣界南四十里至花山宣城縣界北三十里至塘溝河中流太平府當塗縣界江浦縣東三十五里至浦口東馬頭江中上元縣界西六十里至陳家淺滁州全椒縣界南三十五里至西江口江中江寧縣界北五十里至三汊河滁州來安縣界六合縣東三十里至禇家堡揚州府儀徵縣界西五十五里至四號墩滁州來安縣界南七十里至浦子口江浦縣界北五十里至瓜簍鋪泗州天長縣界形勢鍾山龍蟠石頭虎踞漢諸葛亮語長江千里險過湯池南唐書外連江淮內控湖海繫年録東南形勢莫重建康宋張浚語有三吳為東門有荆蜀為西户有七閩二廣為南府見宋胡安定文集蘇州府由府治上至帝京二千七百二十里東至太倉州界一百六里西至常州府宜興縣界一百里南至浙江嘉興縣界九十四里北至通州界一百五十里東西廣二百六里南北袤二百四十四里舊轄一州七縣今析太倉州為直𨽻以嘉定崇明二縣屬之舊縣五新分縣四轄九縣附郭縣三為吳為長洲為元和去府東七十里為崑山為新陽東南四十里為吳江為震澤北一百五里為常熟為昭文吳縣東一里城內卧龍街元和縣界西一百里至太湖常州府宜興縣界南三十三里至太湖吳江縣界北二里至教場長洲縣界長洲縣東一里城內新造橋元和縣界西三十里至賀九嶺吳縣界南二里至內城濠吳縣界北五十里至吳塔常熟縣界元和縣東四十五里至真義新陽縣界西一里至城內王府基長洲縣界南二里城內新造橋長洲縣界北五里至壩基橋長洲縣界崑山縣東三十三里至金雞河績縩橋太倉州界西三十三里至西亭子界浦河中元和縣界南七十里至井亭港河中松江府青浦縣界北同城至北門城濠新陽縣界新陽縣東三十六里至界牌太倉州界西二十一里至吳涇村元和縣界南一十里至大澞村崑山縣界北二十里至三千灣昭文縣界常熟縣東半里至城內迎恩橋堍下昭文縣界西七十里至感化鄉常州府江陰縣界南四十里至歸政鄉吳塔村長洲縣界北四十里至福山港通州界昭文縣東八十里至白茆海口太倉州界西半里至城內炳靈公廟常熟縣界南四十里至南斜塘新陽縣界北四十里至耿涇江口常熟縣界吳江縣東八十里至金澤鎮松江府青浦縣界西一里至西門城外河中震澤縣界南五十四里至楊橋浙江嘉興縣界北七里至七里橋元和縣界震澤縣東三里至運河官塘吳江縣界西一百里至南潯鎮浙江烏程縣界南五十里至平望鎮鶯脰湖中吳江縣界北一里至北門外釣橋吳江縣界形勢藪曰具區浸曰五湖周禮職方氏三江雄潤五湖腴表晉周處風土記川澤沃衍有海陸之饒隋地理志松江太湖水國之勝吳江主簿廳壁記旁連湖海外控江淮宋徐嚞誥詞松江府由府治上至帝京二千九百五十里東至大海一百里南至大海七十二里西北至蘇州府崑山縣界八十里東北至太倉州嘉定縣界一百八里東西廣一百八十里南北袤一百八十里舊縣四新分縣四轄八縣附郭縣二為華亭為婁縣東南九十里為奉賢南七十里為金山東北九十里為上海東一百二十里為南滙西北五十里為青浦五十里為福泉華亭縣東一十八里至語兒涇上海縣界西一里至府城西門口婁縣界南七十二里至金山衛城金山縣界北五里至五里塘婁縣界婁縣東至府城華亭縣界西一十八里至泖湖口青浦縣界南一十二里至西浦江華亭縣界北一十八里至塘