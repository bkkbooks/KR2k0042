body:
  text: 江南通志卷一百七十二人物志流寓一江蘇松常鎮淮揚徐八府太通二州江寧府三國諸葛瑾字子瑜琅琊人避亂江東孫權用為司馬遣使蜀通好與其弟亮俱公㑹相見退無私面或言瑾别遣親人與備相聞權曰子瑜之不負孤猶孤之不負子瑜也子恪最知名張悌字巨先襄陽人孫休時為丞相晉伐吳悌督沈瑩諸葛靚逆之牛渚軍敗靚牽悌去悌垂涕謂靚曰仲思今日是吾死日也我兒時為卿家丞相所拔常恐不得死所負名賢知顧今以身殉社稷復何遁耶悌宅在板橋浦死葬其地是儀字子羽北海營陵人避亂江東吳主徴典機密使輔太子又領魯王傅規諫盡忠生平不治産業家無儲畜權對之歎息即増俸賜益田宅儀累辭讓以恩為戚事國數十年未嘗有過權歎曰使人盡如儀安用科法為晉王導字茂𢎞琅琊臨沂人覽之孫也隨元帝鎮建康勸録用吳士顧榮賀循輩以收人心晉室既建導相之草剏經營百務具舉時稱江左管夷吾焉王敦之叛導以骨肉包荒蘇峻舉兵導以宿望獲免歴事元明成三朝王承字安期司徒渾之從子太原人仕為東海太守尋去官至建鄴為鎮東府從事中郎渡江名臣王導衛玠周顗庾亮之徒皆出其下子孫蟬聨與琅琊諸王並盛謝安字安石謝氏自陽夏徙江左安為鯤從子尚從弟少有髙名累辟不就年四十餘始赴召仕簡文孝武之朝桓温志慮叵測苻堅重兵壓境安能内輯外攘銷禍變於從容淡定之中相業與王導齊名而風韻過之游賞東山輒隨聲妓固其所以自托也周顒字彦倫其先汝南人也居鍾山下清貧寡欲王儉問山中何所食顒曰赤米白鹽緑葵紫蓼後應詔出仕累官國子博士著四聲切韻范甯字武子南陽人篤學通覽嫉時俗虚浮相扇著論言王弼何晏之罪孝武時為豫章守大設庠序取郡四姓子弟皆充學生課讀五經免官家於丹陽猶勤經學終年不輟著榖梁集解顔含字𢎞都琅琊莘人渡江後居建康含少有操行以孝聞善事兄嫂由是著名歴官西平縣侯拜侍中除吳郡太守郭璞過含嘗欲為之筮含曰自有性命無勞筮龜桓温求婚於含以其盛滿不許或問江左羣士優劣答曰周伯仁之正鄧伯道之清卞望之之節餘則吾不知也其雅重實行抑絶浮偽如此南北朝宋雷次宗字仲倫豫章人少慕栖逸文帝徴至建康為築室鍾山西嵓下名招隠館使為太子諸王講喪服禮經齊明僧紹字休烈平原人先隠長廣郡嶗山後渡江住攝山白雲庵偶過定林寺齊髙帝欲就寺見之即遁去梁庾沙彌鄢陵人居金陵父坐事誅五嵗製采衣輒不肯服母問其故曰家門禍酷用是何為及長終身布衣蔬食嫡母劉氏亡哀號動隣里葬在新林自生旅松百許株梁武帝召見嘉之補歙令復丁生母憂喪還都濟浙江中流遇風船將覆沙彌抱柩號哭俄而風静咸以為孝感所致陳馬樞字要理扶風郿人梁邵陵王引為學士侯景之亂隠於茅山陳文帝徴之不應樞行義素著所居處盜賊不入依托者常百餘家五代韓熙載字叔言北海人才氣逸發多藝能善談笑為風流之冠為南唐祕書郎知制誥詞命典雅與徐鉉齊名時號韓徐契丹入汴晉帝北遷熙載勸元宗經營天下不能從周太祖有天下有議北伐者熙載以為不可嘗使周歸論周之將相曰趙㸃檢顧視非常殆難測也後咸服其識卒謚文靖葬梅岡謝安墓側宋王安石字介甫臨川人罷相居金陵自號半山居士後捨宅為寺居白下門卒葬鍾山鄭俠字介父福清人治平初隨父官江寧監税讀書清涼寺胡銓字邦衡廬陵人南渡初上封事力詆和議遭貶斥志操愈烈官至資政殿學士卜居建康阮思聰字仲謀固始人累官吉州團練使來居建康曽請賈似道以重兵守鹿門山由海道搗青齊則襄圍自解不聴有知人鑒薦李玨於朝識張世傑於初歸時後著忠節元張頿字達善導江人蜀亡僑寓江寧學於金華王柏之門至元中行臺中丞延至江寧學宫逺近翕然師尊之著有經説及文集人稱導江先生張雨字伯雨錢塘人為句曲道士有詩名句曲外史集明童軒字士昻鄱陽人𨽻南京欽天監籍景泰辛未進士授南吏科給事時貢翠毛魚魫諸物以萬計上疏諫止蜀冦起命軒往撫遍歴賊巢宣布恩徳賊悉解散官至南禮部尚書周瑄字徳孚陽曲人由鄉貢累官至刑部尚書以洗寃澤物為己任戒諸司事非㑹勘者不得出五日以是獄無滯囚致仕後家金陵卒謚莊懿子經亦仕至尚書唐時字宜之烏城人仕楚府長史棄官歸築室烏龍潭上資禀髙潔飄舉世味之外嘗作蓮花世界書以寄懐張國臣字允忠遼衛官籍崇禎戊辰進士知長垣盜息訟稀擢兵部郎監軍山東罷官後僦居白下子登明中書舍人國朝黄國琦字石公新昌人明崇禎丁丑進士仕至兵科給事奉母南歸家金陵雖為寓公於地方利弊知無不言故當道咸禮重焉黄文煥字坤五福清人由山陽令入翰林歸寓金陵著杜詩掣碧史記莊子注周亮工字櫟園先世自金陵徙居撫州之櫟下其大父復自櫟下徙江寧又徙大梁江寧其游止處也亮工明季進士敭歴中外二十年能文章尤好士士咸向往之王𢎞祚字玉銘雲南人官至兵部尚書致仕歸道過金陵愛栖霞天闕之勝遂家焉卒葬茅山張自烈字爾公袁州人僑居白門著四書五經辨及古今文辨王澤𢎞字涓來黄岡人順治乙未進士入翰林官至禮部尚書其任總憲請移湖口關復置九江奏免江西水脚銀沮官民流徙烏喇致仕後僑居江寧相羊山水有香山洛社之致杜濬字于皇黄岡人明諸生僑居白下以詩名自景陵鍾氏譚氏矯王李規摹漢魏之習流而入於淺薄獨濬不染楚風著變雅堂集時有莆田余懐字淡心子賔碩字鴻客居金陵皆以詞翰知名熊賜履字敬修孝感人順治戊戌進士累官兵部尚書文淵閣大學士著道統學統等集立體致用朝野交孚致仕後卜居清涼山側寒素自持與儒生等卒謚文端陶窳字甄夫巴陵人父泓没于滇之教化長官司地窳攜幼弟徒步六千里歸楚經營塋域復隻身奉母扶父柩歸工詩文又精書畫能篆刻晚居金陵蘇州府周澹臺滅明字子羽武城人孔子弟子少孔子三十九嵗狀貌甚惡欲事孔子以為材薄既已受業退而修行行不由徑非公事不見卿大夫南游至江從弟子三百人設取予去就名施乎諸侯史記索隠注吳國東南有澹臺湖是其遺跡范蠡字少伯事越王勾踐滅吳成霸功遂泛舟遊五湖莫知其所終今吳之蠡口越來溪等處皆其遺跡漢梁鴻字伯鸞扶風人少孤貧尚節介過京作五噫歌肅宗聞而非之求鴻不得乃變姓名挈妻子適吳依大家皋伯通居廡下為人賃舂妻孟光每具食不敢仰視舉案齊眉伯通察而異之乃舍之於家鴻閉門著書十餘篇迨卒伯通為葬於要離冢傍曰要離烈士伯鸞清髙可相隣近妻子歸扶風蔡邕字伯喈陳留人仕左中郎五原太守王智密告邕謗訕朝廷邕乃亡命江海逺跡吳會吳有燒桐以爨者邕聞火烈聲知良材因請而為琴果有美音而其尾猶焦故時人名曰焦尾琴南北朝梁顧越吳郡鹽官人仕梁為博士侯景亂避難東歸栖武邱山入陳為黄門侍郎唐皮日休字襲美襄陽人咸通中進士崔璞守蘇辟為軍事判官居吳會與陸龜蒙倡酬詩甚夥奉守命禱晴於洞庭探洞庭諸勝有太湖詩一卷又借書於徐修矩偃息於任晦林池自云遊二君宅無浹旬之間焉楊收字藏之世居馮翊父為濠州録事參軍客死姑蘇收七嵗而孤母親授經十三通大義善屬文吳人號神童及壯博學强記及他藝無不通擢進士杜悰表署淮南推官累官至同中書門下平章事宋蘇舜欽字子美開封人歴官大理評事以范仲淹薦為右集賢校理監進奏院在朝數論事為王拱辰所搆去官居吳門得吳越錢氏池館置水石作滄浪亭益務讀書為歌詩以寫憤懣善行草書每酒酣落筆争為人所傳寶後為湖州長史卒李中行字無晦湖州人徙居吳江髙尚不仕以詩酒自娱治園亭於松江之濵晚好醉眠蘇軾諸人皆有詩題詠尹焞字彦明洛陽人師事程頤應舉發䇿有議誅元祐黨人焞不答遂棄去紹興中歴官禮部侍郎請奉外祠寓平江虎邱西菴今讀書堂尚在方惟深字子通泉州人寓居於吳負詩名王安石重之謂元白皮陸有未及處安石柄政略無迎合意杜門陋巷孝友耿介與朱長文同為一時所宗鄭凖字器先開封人寓崑山歴知袁州輕財好義買田贍族有范仲淹風劉過字改之廬陵人宋南渡後以詩俠名湖海間詞氣横放英特無前陳亮陸游辛棄疾皆折節與交嘗抗疏光宗請過宫屢與時宰陳恢復方畧力請用兵謂中原可一戰而取詞極剴切故人潘文友宰崑山延致之過雅志欲航海因抵崑卒葬馬鞍山周南字南仲岳州平江人游學吳中與孔元忠滕宬皆從葉適游紹熙元年對䇿言甚切直大要謂小人之倡為異説以䝉蔽陛下者一曰道學二曰朋黨三曰皇極夫箕子謂有猷有為有守乃有才有道有操執之人也今所指為道學朋黨者正斯人耳奈何反棄之而謂之建皇極哉考官得其文驚歎光宗疑之格置乙科官終祕書省正字魏了翁字華父蒲江人慶元中進士韓侂胄謀開邊了翁力言其不可䇿出衆大驚紹定中累遷至同簽書樞密督視京湖軍馬併領江淮開府江州御書鶴山書院四字賜之已而以浙東安撫使就醫平江仍賜第焉髙定子字瞻叔蒲江人嘉泰中進士累官参知政事賜第平江仰家橋日以著述自娱為文法度謹嚴髙出時輩學者稱著齋先生鄭思肖字所南其先連江人父震以道學名景定間葬於長洲元兵南下思肖叩閽上疏忤當路不報宋亡寄居吳中念念不忘君形於詩文嵗時伏臘輒野哭南向拜精墨蘭更祚後為蘭不畫土根素不娶得錢則周人田亦捨之僧刹惟餘數畝為衣食資謂佃丁曰我死則汝主嘗著大無工十空經一卷寓大宋二字也造語竒澁自題其後云臣思肖嘔三斗血方能書此當有巨眼能識之又著心史一編函以鐵匣鎔錫汁封錮沈井中明季有淘井者得之傳於世元鄭元祐字明徳遂昌人生而右臂脱骱動必以左號尚左生年十五能詩賦為文有古作者風父卒來寓於吳省臺交薦不就素不喜著書嘗曰經則經也史則緯也義禮淵藪在焉學者能盡得古人之意者鮮况敢私有論述乎陳徴字明善江西人嘗從吳澄遊其學務明理不求榮進寓居吳中讀書鼓琴虞集掲傒斯咸推重之陳桱寧波人僑居長洲著通鑑續編鄭東字季明平陽人元末避地常熟肆力古文多不留稿僅存百篇與弟采所作三十篇名聨璧集宋濓序之明王禕字子充義烏人洪武間官翰林待制奉使雲南死節未仕時寓居吳淞甚乆集中有吳江客中冬至及吳江别運上人詩張羽字來儀潯陽人元季寓吳中與髙啟楊載徐賁稱吳中四傑洪武初徴為太常丞兼翰林院同掌文淵閣事時大著作多以推羽坐事謫嶺南半道召還自沈死徐賁字幼文其先蜀人由毘陵徙居蘇之齊門工詩善寫山水張士誠辟為屬與張羽俱避去之吳興洪武中用薦起家歴官河南布政因大軍出洮岷道經河南缺犒勞下獄死陳基字敬初臨海人至正時經筵檢討為人草諫章陳並后之失幾得罪引避入吳教授自給南州用兵起江浙行省郎中參張士信軍事士誠稱王基獨諫止士誠欲殺之不果吳平召入預修元史書成歸卒於常熟詩文髙邁有夷白齋集吳福字好徳鄞縣人禮科給事中預修永樂大典五經四書性理大全歴陞福建布政愛吳中山水之秀遂占蘇籍卒葬烏龍山子憲性至孝母喪過哀事庶母孝嘗以居室讓諸弟郡人杜瓊贈以詩有今日重逢薛侍中之句國朝姜埰字如農萊陽人也前明為禮科給事中疏論周延儒廷杖謫戍宣州衛㑹國變未赴寓吳城西二十年顔其室曰敬亭山房不忘戍所也易簀時誡其子必舁葬宣城其子奉遺命往葬焉姜垓字如須前明為行人兄埰以言事繫獄垓上章請代不許國變後隨兄寓吳先埰卒子孫遂家於吳李實字如石遂寧人明季癸未進士官長洲知縣有聲績明亡僦居錦帆涇側著書以老子仙根字子静順治辛丑殿試第二人累官戸部侍郎文采書翰照映一時喻昌字嘉言江西人前明貢士順治初僑居常熟少遇異人授内養法終身不卧倦則依蒲團小憩精於醫著醫門法律吳彦芳字友聖長樂人順治壬辰進士任中牟知縣丁繼母憂不能歸故里寓山隂既而遷於蘇服既闋無意仕宦徜徉山水以觴詠自娱閩撫范承謨將迎之以歸未幾范殉耿逆之難彦芳遂終于吳朱彝尊字錫鬯秀水人博極羣書文筆妙天下以布衣舉博學宏詞授檢討罷歸往來吳中最乆嘗寓慧慶寺選明詩綜百卷松江府宋吳惟信字仲孚湖州人記問該博以詩名有菊潭稿寓華亭白鶴村邵桂子字徳芳淳安人咸淳進士又舉博學宏詞授處州教授國亡不仕娶華亭曹氏女因家於小蒸文名甚盛所著有脞談脞槀元林景曦字徳陽平陽人仕宋官從政郎國亡遯跡寓雲間甚乆有訪二陸故居諸作趙孟頫字子昻湖州人歴官翰林學士承㫖書法獨步一代嘗留止上海鶴沙鎮凡近鎮寺院碑記鐘銘皆其真蹟前赤壁石刻向在永寧寺明季郡守方岳貢移置府之和衷堂柯九思字敬仲仙居人以䕃補華亭尉後為奎章閣鑒書博士罷官因寓松江善畫竹石嘗自謂寫幹用篆法枝用草法葉用八分法楊乘字文載濵州人至正中除浙江行省員外郎免官後寓居松江後張士誠欲授以偽官遂自縊死楊維貞字亷夫會稽人泰定丁卯進士歴提舉江西儒學未赴兵興後攜家寓華亭築元圃蓬臺于松江之上東南才俊之士造門無虚日其詩號鐵崖體卒葬于山麓張昱字光弼廬陵人仕為江浙行省員外郎行樞密院判已而棄官號一笑居士往來松江張士誠辟之不就洪武初召見以老乞歸太祖曰可閒矣遂更號可閒老人錢惟善字思復錢塘人元鄉貢進士試羅刹江賦著名寓居華亭與陸居仁楊維貞為詩友洪武初卒葬干山明陶宗儀字九成黄巖人少舉進士一不中即棄去務古學無所不窺遭亂寓松江躬親稼穯耕作之暇休於樹隂有所得摘葉書之貯盎累十數綴輯成編曰輟耕録又有説郛書史會要行世洪武末為教官賜鈔秦裕伯字景容大名人仕元遭世亂棄官避地上海張士誠招之不納明太祖檄起之固辭諭以手書曰海濵民好鬬而子居之恐有後悔乃强起甚見寵待錢鼒字得鉉吳興人從楊維貞讀書松江一室如破舟力學不怠以古文辭名洪武癸丑徴授國子學録楊仁夀字漁隠天台人明初寓居松江之陶宅能詩文精草書得鮮于樞筆法時冀北李暲字叔如無錫華文瑾字雲林與邑人姚汝嘉字愚黙稱陶宅四隠云麴祥字景福永平人永樂初侍父百戸亮任金山衛祥年十四海冦入犯被掠後受日本官職宣徳中隨使入貢上疏陳情乞賜歸侍時方柔逺不欲遽留之但許暫往省親及至金山父亮已卒惟母尚在抱持慟哭悲動隣里既還日本其國主哀之仍遣入貢復申前請詔許襲職歸侍事母以孝聞宋旭字初暘崇徳人以畫名萬歴初居雲間與陸樹聲莫如忠周思兼結社賦詩年八十無疾而逝國朝趙炎字雙白漳浦人也居松江工詩選詩藏若干卷嘗為僧開堂説法後還初服常州府漢蔣黙字秀芳杜陵人兖州刺史詡孫父横從光武征赤眉有功封侯坐譖死九子皆南徙七寓廣陵二棲陽羡後帝悟其誣就其居封之黙居滆湖東封雲陽亭侯弟澄居西封􅖘亭侯晉郭璞字景純聞喜人博學好古精隂陽歴數避地東南居暨陽歴官著作郎唐陸羽字鴻漸竟陵人天寶中隠火門山上元初更隠苕溪自稱桑苧翁性嗜茶著經三篇品天下水惠泉為第二惠泉自此得名薛戎字元夫河中人客毘陵陽羡山年四十餘不仕江西觀察使李衡辟署幕府三迎乃肯應故宰相齊映代衡奏留之府罷復歸陽羨累遷浙東觀察使竇羣字丹列京兆人父叔向以詩名羣兄弟皆擢進士獨羣以處士客毘陵蘇州刺史韋夏卿薦之朝後擢左拾遺歴御史中丞杜牧字牧之咸寧人歴官中書舍人剛直有竒節不為齷齪小謹敢論列大事指陳利病尤切至殖産陽羨因卜居焉元張雨題水榭詩序云水榭在義興東郭李戡字定臣渤海王奉慈七世孫舉進士就禮部試吏唱名乃入戡恥之返江東隠陽羨里陽羨民有鬭争不決不之官而詣戡以辨太和中平盧帥王彦威表為巡官後還洛陽卒宋蘇軾字子瞻眉山人元豐七年自黄州貶所量移汝州上書自言有田在宜興乞居其地詔從所請未乆召用晚年謫海南北歸後復居宜興卒賀鑄字方回開封人好學藏書萬卷工文詞尤長於樂府元祐中倅太平州以仕不得志退居吳下寓毘陵宜興著荆溪集陽羡歌卒葬宜邑篠嶺楊時字中立將樂人時在東郡所交皆天下士先達陳瓘鄒浩皆以師禮事之暨渡江東南學者推為程氏正宗居諫省僅九十日凡所論列皆切於世道而其大者則闢王氏經學排靖康和議政和初令蕭山秩滿奉祠客居毘陵講學城東書堂從遊者雲集洪适字景伯鄱陽人母沈氏毘陵人父皓使金被留适與二弟遵邁依舅氏讀書後俱中博學宏詞科适官至宰相遵樞密使邁翰林學士周必大字子充吉水人嘗寓宜興淳熙間歴官左丞相封益國公紹定初邑令趙與悊建先賢祠合鄉寓賢祀之必大與焉吕祖泰字泰然婺州人夷簡五世孫寓居宜興性疏達尚氣誼嘉泰元年上書乞斬韓侂胄流欽州侂胄誅授迪功郎監南嶽廟元陳祖仁字子山汴人少時侍父安國令武進因家焉至正中累官參知政事順帝北竄或勸祖仁南還不從城陷被殺國朝李顒字中孚盩厔人也潛修不仕逺近皆重其學行稱二曲先生浙西駱鍾麟為西安府同知執弟子禮事之康熙八年鍾麟遷常州知府建延陵書院延顒主席率郡之士大夫會講其中廖大受字君可福建人寫照精絶識者謂曾鯨之後當推第一海内莫比乆客宜興卒於旅次鎮江府漢史崇字伯勤杜陵人建武中官青冀二州刺史以功封溧陽侯天下既平詔公侯皆就封因家焉卒謚壯侯孫茅累官雍州牧裔孫嵩仕吳為蒼梧守許劭字子將平輿人有髙名與兄靖共覈論鄉黨人物每月輒更其品題故汝南俗有月旦評或勸劭仕對曰方今王室將亂吾欲避地淮海以全老幼乃南到廣陵徐州刺史陶謙禮之甚厚劭謂其徒曰陶恭祖外慕聲名内非真正不如去之遂復投揚州刺史劉繇於曲阿其後謙果捕諸寓士晉祖逖字士雅范陽人避亂居京口慷慨有節尚與劉琨共卧聞雞鳴蹴琨曰此非惡聲也因共起舞元帝時拜奮威將軍豫州刺史徐邈東莞人永嘉之亂渡江家京口博學多聞謝安薦補中書舍人撰正五經音訓學者宗之在西省每被顧問多所匡益遭父喪哀毁卒弟廣字野民學尤精博官祠部郎撰集國史子豁為西陽太守為盧循所害何無忌東海郯人居京口同劉裕起兵斬桓修侍衛安帝以興復功封安城郡開國公遷鎮南將軍舟師拒盧循敗績死之謚忠肅檀憑之字慶子髙平人居京口累官寧逺將軍義旗之建與劉毅俱以私艱墨衰從事至羅落橋戰敗被害贈曲阿縣公南北朝宋劉穆之字道和東莞莒人居京口宋武帝克京城署主簿從平建業諸大處分皆倉猝立辦累遷尚書僕射帝北伐留穆之内總朝政外供軍旅決斷如流五官並用不相參涉能一日作百函書向靖字奉仁河内山陽人寓居京口討盧循著績封安南縣男宋髙祖受命加散騎常侍卒立身儉約不營屋宇無田園商貨之業時人稱之檀道濟髙平人世居京口從武帝平京城武帝北伐為前鋒所至望風降附進位司空鎮尋陽以威名甚盛為彭城王義康所害劉勰字彦和東莞莒人寓居京口博通經論撰文心雕龍五十篇沈約重之辟記室累官步兵校尉孟懐玉平昌安邱人世居京口宋武帝伐孫恩以為建武司馬預義旗從平京口定建鄴以功封鄱陽縣五等侯何承天東海郯人居京口宋祠部郎與傅亮共撰朝儀歴著作佐郎御史中丞嘗刪定禮論三百卷改定元嘉歴帝每有疑義必先訪之鮑照字明逺東海郯人文詞俊逸尤善樂府累官中書舍人後終臨海王參軍梁徐勉字修仁東海郯人居京口入梁遷尚書吏部郎參掌大選嘗與門人夜集客有求詹事五官勉正色曰今夕止可談風月不宜及公事徐陵東海郯人居京口歴官御史中丞奏彈勢要朝廷肅然其文新麗時號宫體王僧孺字僧孺東海郯人居京口傭書以養母仕齊終安成王諮議參軍聚書萬餘卷為文麗逸多用新事時重其富博唐權臯字士繇畧陽人徙潤州丹徒舉進士第安禄山表為薊尉署幕府度安禄山將叛使獻俘京師佯死脱去潛奉母南奔天下聞其名争請為屬永王璘舉兵又詭姓名以免顔真卿李季卿皆表薦不就卒謚貞孝子徳輿權徳輿字載之徳宗時召為左補闕疏斥裴延齡奸元和初拜同中書門下平章事徳輿善辯論開陳古今本末以覺悟人主為輔相寛和不為察察名文章雅正贍縟動止無外飾而自然可慕為縉紳羽儀云卒謚文張祜字承吉南陽人愛曲阿地古淡遂家焉作宫體小詩辭曲豔發後稍變建安風格宋石延年字曼卿宋城人寓居丹陽慷慨喜談兵不遇而隠於酒與歐陽修善三喪未葬范純仁舉麥舟助之張慤字誠伯樂夀人家金壇建炎改元為戸部尚書同知樞密院事請募三河丁壯聫以什伍為巡社法在朝諤諤有大臣節卒謚忠穆陳汝奭字公武晉江人徙居丹徒登進士知海州嵗饑不俟報發廩賑為監司所奏奭請以身坐毋及僚屬朝廷嘉之置不問母殁遂不復仕沈括字存中杭人徙居丹徒官至内翰其學無所不通皆有論著子孫家於京口元偰列箎畏吾人居溧陽中至順庚午進士為潮陽令罷歸過南昌值紅巾亂協守東門城陷闔門盡節王昌字榮之益都人為鎮江路總管府提控因注籍焉歴官餘杭縣尹經理田土前官増賦十之二昌力言於行省復其舊民立石頌徳莊麟字文昭江東人元末移居京口書畫詩文與郭天錫齊名明秦從龍字元之洛陽人仕元㑹兵亂避居鎮江太祖克集慶謂徐達曰鎮江有秦元之者才器老成吾欲見之達訪得之帝喜甚朝夕同處每以筆書漆簡甚密稱為先生後告還鎮江病卒帝親臨哭之湯允績字公讓東甌王和之孫居丹徒尚書周忱巡撫南畿薦其才累官都指揮僉事充參將守延綏冦入往禦之被害允績才性敏㨗為詩豪邁竒崛所著有五雲漫稿東谷遺稿國朝王源大興人也博學多著述負經世畧人稱北方學者晚寓居金壇子兆符康熙辛丑進士淮安府唐李珏字待價趙郡人客居淮隂舉進士開成中歴官同平章事武宗時坐貶宣宗立遷河陽節度使罷横賦宿逋百餘萬請立太子維天下心卒謚貞穆宋趙槩字叔平虞城人始為進士時漣水守鄧某館之於官舍未乆謝去後槩守漣水將至或榜其所館曰豹隠堂賦者三十餘人累官參知政事以徳量稱陳瓘字瑩中劍州人徽宗時為諫官劾蔡京謫居合浦著尊堯集言者以為詆誣益加貶竄最後楚州居住馬存字子才鄱陽人寓居楚州慕節孝先生徐積道徳從之游卒業於其門明黄諫蘭州人寓山陽正統間以尚寶卿兼侍讀出使安南詰迂路定禮儀辨坐席辭餽贐諭請正朔安南奉命成化初左遷廣州通判卒葬山陽揚州府唐竇常字中行京兆人大歴及第進士客廣陵多所論著杜佑鎮淮南署為參謀歴朗䕫江撫四州刺史國子祭酒致仕卒弟牟羣庠鞏皆工詞章時號五竇著聨珠集辛讜蘭州人太原尹雲京孫居揚州慨然常有匡時意龎勛反攻杜慆於泗州讜趨貫賊柵以入與妻子訣同慆生死乞兵淮南復詣浙西時傳泗州已陷疑讜為賊計囚之李嶧稱其忠可信乃許救讜引兵決戰斬賊六百級泗圍凡十月至是乃解卒完一州以功授亳州刺史終嶺南節度使南唐嚴續字興宗馮翊人祖實為江淮轉運判官徙家廣陵續性恭謹仕南唐歴官門下侍郎宋齊邱專國公卿多附之惟續持正不為屈宋張方平字安道其先宋人徙揚州舉賢良方正首乞合樞密之職於中書以通謀議帝然之以侍講學士知滑州徙益州或扇言儂智髙在南詔將入冦調兵築城民大驚擾方平出鎮言南詔去蜀二千餘里安能為冦當以静鎮之妄言者斬蜀遂安神宗時力諫用兵卒謚文定陳次升字當時仙游人僑居真州舉進士為御史謫監税徽宗立召為侍御史極論惇卞曾布蔡京之惡羣奸側目崇寧初落職除名徙建昌編管循州終於真州宋應龍儒生通兵為諮議官寓泰州元兵至泰州官吏迎降應龍與其妻自縊於圃中元沙卜珠介字仲清中統間為江東宣慰使去官家真州嘗延張頿吳澄為諸子師講論有得疾篤麾妻妾環侍者出曰男子不死於婦人之手遂卒吳澄字幼清崇仁人寓居真州薦有道歴官至翰林學士所著有五經纂言卒謚文正郝經字伯常陵川人為翰林學士世祖即位使宋定和議時賈似道方以却敵為功館經真州經上書極陳戰和利害請入見及歸國皆不報驛吏棘垣鑰戸欲以動經經不屈後伯顔南伐問執行人之罪以禮送經歸李茂大名人徙家揚州父先卒母嘗病目失明茂禱於泰安山三年復明每夕祝天乞損已年益母夀母没居喪哀慟聞者傷之大徳九年揚州火災燒千餘家火及茂廬皆風返而滅事聞旌之明羅汝芳字惟徳江右人客居海陵窮理樂道教人以體騐方寸學者稱近溪先生陪祀王艮祠鄒元標字南臯豫章人立朝以直諌著僑寓儀徴之五壩與邑舉人林之翰立講壇於信國公祠闡説治心養性之學髙宗本字茂卿雄縣人仕至河南副使歸寓江都自號江淮逸叟究習郡邑掌故著維揚新志鄒應龍字雲卿蘭州人父賈揚州遂家焉為御史劾相嚴嵩及其子世蕃欺罔不法事嵩父子以是謫誅擢通政司參議仕至雲南巡撫何城字叔防榆林人父炫賈揚因家江都嘉靖壬辰進士由庶吉士改刑部主事知武昌府楚世子英燿與所幸甘玉海謀為叛城飛書白巡按乘其未發先擒玉海杖殺之散其䕶衛楚中晏然世子伏法陞冀南道罷歸倭冦作亂議築外城時多迂之未幾倭犯揚州城外蕩然煨燼城中安堵城之力也髙邦佐字以道襄陵人居江都萬歴乙未進士天啟初官參政分守廣寧值熊廷弼王化貞搆隙邦佐知事必敗乞歸方報允而化貞棄廣寧走衆謂邦佐可入關邦佐叱曰吾一日未去則一日封疆臣也將安之䇿騎謁廷弼請授兵赴難不納乃令從者歸報母解印綬自經僕髙永亦自經於側事聞贈太僕寺卿謚忠節朱世賢字用賓先居臨清州累官至少卿剛直不事權貴致仕移家廣陵捐千金築新城復出千金建義倉孫玨以畫名費經虞字仲若新繁人崇禎己卯舉於鄉授昆明知縣罷官歸蜀遇亂流寓江都以不得養親為恨忌辰哭泣終日至七十猶然門人私謚孝貞先生所著有毛詩廣義四書字義古今方書周易參同契國朝梁以樟字公狄清苑人明崇禎己卯舉鄉試第一庚辰成進士與兄以柟寓居寶應纘言著書以老有忍冬軒集趙開心字洞門長沙人寄籍江都三為御史清直見稱仕至工部尚書張恂字穉恭涇陽人先世以業鹺家江都崇禎癸未成進士天才雋邁肆力於詩古文詞兼工畫筆孫枝蔚字豹人三原人幼為諸生遭流冦與其鄉少年奮戈逐賊落深塹得不死乃走江都從賈人游三致千金皆散去既而閉尸攻詩古文辭名噪海内康熙己未以博學鴻辭徴授中書舍人著溉堂前後續集費密字此度經虞子文行肖其父所輯有𢎞道書正紀聖門舊章及自著詩古文辭若干卷子錫璜字滋衡能世其家學著有雅倫貫道堂文集掣鯨詩集魏禧字凝叔寧都人性孤介賣文自給人士重其文行争延致之寓真州卒妻某氏聞訃不食死黄逵字儀逋山隂人棄諸生遊晉所主者資之南歸客泰州負才嗜酒落魄依查士標以居查死遊上海病卒其詩凌厲悲壯有其鄉徐渭風徐州府漢張良字子房韓人五世相韓秦滅韓求客報仇得力士為鐵椎擊秦始皇於博浪沙中始皇怒大索天下乃逃匿下邳遇圮上老人授書佐沛公定天下封留侯閔貢字仲叔太原人建武中應司徒侯霸之辟尋投劾去客居安邑家貧不能得肉日買猪肝一片安邑令聞之勅吏常給焉仲叔歎曰閔仲叔豈以口腹累安邑耶遂去客沛李燮字徳公太尉固幼子梁冀害固並收其二子固女文姬知父將及難以燮托門生王成成乃將燮東下入徐州界變姓名為酒家傭成賣卜於市隂相往來燮從受學酒家異之以女妻燮燮專精經學十餘年梁冀誅求固後嗣遂還鄉里姊弟相見悲感旁人徴拜議郎遷河南尹江革字次翁臨淄人負母逃難轉客下邳踝跣行傭以供其母便身之物莫不畢給建武中與母歸鄉里人稱之曰江巨孝申屠蟠字子龍外黄人初范滂等臧否人物非訐朝政太學生争慕其風屠蟠獨歎曰戰國之世處士横議卒有坑焚之禍今之謂矣迺絶跡梁碭之間因樹為屋自同傭人滂等果罹黨禍蟠確然免於疑論年七十四終於家范丹外黄人桓帝時為萊蕪長朝議欲以為侍御史因遁去布衣草履賣卜梁碭間丁蘭河内人少喪母乃刻木為像祀之居豐縣東十二里後人名其鎮曰丁蘭鎮里曰丁蘭里三國張範字公儀河内修武人性恬静樂道不就徴命董卓作亂與弟承避地彭城範子陵及承子戩為山東賊所得範直詣賊請二子賊以陵還範範願以陵易戩賊義而并還之後為議郎參丞相軍事太祖征伐常令範與世子居守謂文帝舉動必諮焉宋孔恩宣聖五十代孫南渡徙居蕭元羅曽魯橋人登進士授儲司院山長教授孔顔孟三氏子孫元末避兵宿遷因家焉國朝沙傑字仲渠真定人從其父遊豐國初羣盜竊發縣令閻知傑魁竒延與共守禦所殱除者頗多一日䇿蹇自徐還或識之怨家噪黨圍之傑挺身力戰被害其子弟家於豐能讀書太倉州宋林英發永嘉人贅居嘉定知建昌縣戡定洞冦擢知夀昌軍趙與􅊸嘗師事之卒葬蘇州穹窿山元吳野人名轍字中行台州人元末遯跡泖濵懸壺陳溪之上顔其室曰野人居倪雲林為之繪圖張天永字長年淮南人元季奉母避地嘉定時人稱其孝比之江革明文質字學古温州人徙太倉有學行工詩古文嘗與楊亷夫玩梅花燈賦詩有歸來踏遍横斜影吹落東風不見痕之句人傳誦之孔𢎞幹字克勤孔子六十一世孫也後唐時四十二世孫名檜由闕里徙温州至五十一世孫名垕宋紹興間以武功大夫統制江隂軍十傳至幹天順中娶于太倉遂家焉幹醇謹誠樸端方不茍太倉有孔氏始此通州宋任伯雨字徳翁眉山人為右正言莅官半嵗所上一百八疏大臣畏其多言伯雨抗論愈力且將劾曽布布覺之徙為度支員外郎尋知虢州崇寧黨事作削籍編管通州江南通志卷一百七十二欽定四庫全書
