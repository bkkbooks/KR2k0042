里藍山下相傳晉時漁者見星隕潭中故名巖潭在涇縣南十里受石埭旌太諸水合賞藤二溪翠壁澄淵山水清妙衆尋潭在寧國縣西三十里潭際石阜壁立下有龍湫深不可測夾岸桃花十數里俗稱桃源染浦在南陵縣東北四十里一名白家湖廣千餘畝中多芙蓉菱芡之屬吳赤烏元年建浮城梵剎于中風景為勝南香澗在涇縣東五十里源出黃沙嶺西會羅溪水厯茶溪會周公坑後村諸水合于烏溪池州府齊山在府南三里有峯十餘其髙齊等故名或因唐刺史齊映有善政名之按唐書映未刺池其弟照池州刺史訛照為映理或然也舊志云山分三面巖洞三十有二嶺塢泉石亭臺不可勝舉為名勝之區附明劉岐齊山記近名山而遊者陟之賦一之觴之止矣葺一居設勝又止矣有于齊而剖其疑者乎有于齊而補其闕者乎李太白秋浦歌秋浦千重嶺水車嶺最竒或以水車當陽春似矣郭功甫之詩又曰萬丈水車嶺夫陽春未可云萬丈也然牧之南亭詩曰二嶺桃花紅錦黦則不獨一陽春嶺矣以太白久于秋浦遊江祖遊白笴遊桃波遊大樓遊蝦湖道必出齊山齊山湖前曰平天坂太白歌已及之未有咫尺翠微而不知眺詠者水車之為陽春似足信耳楊廷秀詩曰謫仙狂飲顛吟寺小杜倡情醉上樓齊山之經太白豈非確據哉或以蘇子瞻遊清溪而不遊齊山為惑按清溪詞曰望翠微兮古招提非齊山寺而何或以沈睿達謫池州卜居齊山曰雲巢今不知古屋所在以形勝揣之其近書院乎蓋延慶寺在前舍書院無平衍地矣孔義甫齊山寺詩曰飛甍仍在最髙巔則山椒之有屠蘇可知矣今延慶之址漸入原隰難云最髙也又曰太子池塘煙漫漫池郡自昭明而外别無太子故實今齊山之池塘何有乎齊山湖之前有平天湖朱子九日登天湖用杜牧齊山登髙分韻人固以為平天但于登字非宜然其句全用杜語又朱子别賦水調歌頭亦然安得謂非齊山乎張敬夫登齊時山曰憶行西湖岸亦復多嶔崟頗恨人力勝刻畫見侵誰知醜石面乃亦變孔壬何如榛莽間屹立長森森天然抱幽獨妙質逢賞音此直似齊山勝西湖矣南軒之意感嘆臨安痛心朝士借西湖以寓其刺譏然雕繪多而天然少亦武林之實録乎謂齊山為幽獨亦指其僻處江澨而言埒視西湖欣賞不謬讀詩而不以意逆可乎人言齊山之草不宜芻牧故本朝于池州不設衛所果爾則齊山翠微寨馬軍寨何以稱焉此皆齊志之疑也貴池立州治始于刺史李芃芃刻齊志于有待岩岩不可考而殘文之傳者無能表章其失一李方元刺池搜剔齊山之勝池人知有齊映杜牧而不知方元其失二紫微刺池齊山客也張承吉張喬齊山主人也和登髙韻者不勝數和南亭僧舍韻者未之前聞忘其主人其失三嶽忠武駐節廬山往來嶽鄂數蒞池州又刻石蒼玉之間而齊山不為特祠其失四政和中張先生修長生術結廬齊山尸解去而志不載其丹房其失五張國安詩曰水石嵌空二百巖今名于志者巖僅十有一其失六蘇元鼎詩曰巖根堆雁塔當日若有浮圖又曰碑珉黃閣相齊映若有詞章今並未從辨證其失七楊廷秀詩曰樓臺玉殿雲中見紺宇之盛髣佛可徴今臺榭俱蕪其失八陳鴻斷碣林繹之題名卦蓍二刻邈不可得見其失九池口陳應台敬宗黃瀾伯觀讀書翠微未留唱和其失十山有泉有井不共疏濬之其失十一此皆齊志之闕也岐生長于兹年踰六十時時策杖齊山莫敢決其疑亦莫能縫其缺記以質焉太朴山在府南二十里俗名太婆山宋周必大謂不典更今名其山內聫六峯外托九華萬羅山在府南二十里舊志云與江祖石隔溪相對上有羅人石李白秋浦歌謂邏人橫鳥道江祖出魚梁是也六峯山在府南二十里府志云六峯競秀望之如列屏然大樓山在府南四十里李白秋浦歌行上東大樓者指此三十六山在府南七十里府志云雲峯六六上插晴空鳥道而上曰麻塘嶺七井山在府南八十里與石埭分界上列七峯湧泉七穴其麓盤回數十里遙接九華盧子庫山在府南九十里一名伏龍巖世傳有龍化人于巖前未全而止又有龍池雩禱常應相近有魁山白面山在府西南名勝志云雲崖拱北若傅粉下有白面渡匯于秋浦南泉山在府西南七十里有泉唐貞元中創寺于山陽太和元年賜額南泉承恩寺郎山在府西南七十里下有玉鏡潭水經注云貴池水出縣南郎山是也相近有姥山一作舞山有宋陶亮寨址又宋沈攸之大破賊于赭圻賊奔姥山即此烏石山在府西南七十里與姥山相對唐廣德初宣饒賊方清陳莊據此刺史李芃討平之秀山在府西南八十里疊嶂如屏貴池在其下梁昭明太子冕服陵在焉宋陸遊入蜀記云秀山梁昭明墓拱木森然也相近曰雙溪山秀峯山石門山在府城南九十里其上有青尖唐髙霽隱居之地春臺巖髙霽所築桃花塢本李白與髙同遊處也存石刻大小十六字石橋山在府西九十里西峯山之東兩峯相對一石跨之若梁梁下奔泉泐石從穿山洞而出魚載山在府西南百五十里山有懸泉從石壁斷崖三級而下注于潭中上有巨石倚附飛流如鯉魚狀黃山在府西南百八十里上有三十六垣與歙之黃山三十六峯相峙其最髙者古牛岡可望匡廬靈山在府西南二百里黃山之支也其巔有田百畝有泉灌之不竭孝姥山在府東北二十里瀕江有孝姥廟碧山在府東十里瀕湖蒼崖翠巘倒影沉碧稍南曰石壁山以形如削壁也渚湖山在府東南四十里絶頂有田淵泉旁出澄泓如練蒹葭魚鷺若渚湖然故田無旱憂五山在府東南六十里孤峯獨出其下散為五支聫絡相屬巍巍然實為羣山之長青山在青陽縣北五里縣以此得名靈鶴山在青陽縣西南十里世傳白鶴真人隱此山之南舊有戛玉翠瀑二亭山半有逍遙臺九華山在青陽縣西南十里一統志云髙數千丈延袤百八十里舊名九子山唐李白陋其名無所據以山有九峯如蓮花易今名南唐齊丘致政後隱此號九峯先生其巖洞峯壑凡九十有九泉石諸勝不可縷悉為江南名山之最劉禹錫嘗謂太華之外無竒女几荆山之外無秀及登九華而後悔其失言聖祖仁皇帝南巡時遣使至山賫御書九華聖境四大字懸化城寺寺東巗有飛來石最竒古其北連冠幘山層峯巍峩如冠幘狀附唐李白九華山聫句序青陽縣南有九子山山髙數千丈上有九峯如蓮花按圖史名無所依據太史公南遊略而不書事不經故老之口復闕名賢之記雖靈仙往復而賦咏罕聞豫乃削其舊號加以九華之目時訪道江漢憩于夏侯回之堂循簷岸幘坐眺松雲因與二三子聫句傳之將來明王守仁九華山賦循長江而南下指青陽而幽討啓鴻濛之神秀發九華之天巧非效靈于坤軸孰構竒于大造遷史闕而弗録豈足迹之所未到白詩鄙夫九子實兹名之所肇余將窮祕密之崔嵬極遐搜而厯考涉五溪而徑入宿無相之窈窕訪王生于邃谷淘金沙之清潦凌風雨乎半霄登望江而逺眺步千仞之蒼壁俯龍池于深窅弔謫仙之遺迹躋化城之縹眇飲鉢盂之朝露見蓮花之孤標扣雲門而望天柱列仙舞于晴昊忽雙峯之闢門真人駕陽雲而獨蹻翠蓋平臨乎石照綺霞掩映乎天姥二神升于翠微九子鄰于積稻炎歊起于玉甑爛石碑之文藻回澄秋于枕月建少微之星旐覆瓶承滴翠之餘瀝展旗立雲外之旌纛下安禪而步逍遙覽雙泉于松杪踰西洪而憩黃石懸萬丈之灝灝瀨流觴而縈紆遺石船于澗道呼白鶴于雲峯釣嘉魚于龍沼倚臺碧之峗屼謝塵寰之紛擾攀齊雲之巉峭鑑琉璃之浩渺沿東陽而西歷餐九節之蒲草樵人導余以冥探排碧雲之瑶島羣巒翳其轇轕失隂陽之昏曉垂七布之沈沈靈龜隱而復跳履髙僧而屧招賢開白日之杲杲試朝茗于春陽汲垂雲之淵湫凌繡壁而據石屋何文殊螺結之蟠糾梯星辰而北盻墜遺光于拾寶緇裳迓于黃匏休圓寂之幽悄烏呼春于叢篁和雲韶之鷕鷕喚起促余之晨興落星河于簷橑護山嚘其驚飛怪遊人之太早攬卉木之如濯被晨暉而爭姣靜鑱聲之剝啄幽人劚參蕨于冥杳碧雞噦于青而林鷴翻雲而失皓隱搗藥于樛蘿挾提壺餅焦翔繞鳳凰承盂冠以相遺飲沆􅒭之仙醥羞所實以嬉翺集梧枝之嫋嫋嵐欲雨而霏霏鳴濕濕于蘴葆躐三逰而轉青峭拂天香于茫渺席泓潭以濯纓浮桃瀉而揚縞綜澌澌而絡蔭飲猿猱之捷狡睨斧柯而升大還望會仙于雲表憫子京之故宅欵知微之碧桃倐金光之閃映睫異景于穹坳㺯靈珠于赤水舞千尺之潛蛟并花塘而峻極散香林之回颷撫浮屠之突兀泛五叉之翠濤襲珍芳于絶巘裊金步之搖搖莎羅躑躅芬敷而燦耀開金幢玉女之妖嬌搴龍鬚于靈寶墮鉢囊之飄颻仙掌于嶔嵌散清馨之迢迢披白雲而踸崇壽見參錯之僧寮日既夕而山暝挂星辰于㝫嶅宿南臺之明月虎夜嘯而熊嘷鹿麋羣遊于左右若將侣幽人之岑寥逈髙寒其無寐聞氷壑之洞簫溪女厲晴瀧而曝术雜精苓之春苗邀豫觴以玉液飲玉粒之瓊瑶溘辭余而逺去颯霞裙之飄飄復中峯而悵望或仙蹤之可招乃下見陽陵之蜿蝘忽有感于子明之宿要逝余將遺世而獨立採石芝于層霄雖長處于窮僻乃永離乎豗囂彼蒼黎之緝緝固吾生之同胞茍顛連之能濟吾豈靳于一毛矧狂氛之越獗王師局而奔勞吾寧不欲請長纓于闕下快吾生之鬱陶顧力微而任重懼覆敗于或遭又出位以圖逺將無誚于鷦鷯嗟有生之迫隘等滅沒于風泡亦富貴其奚為猶榮蕣之一朝曠百世而興感蔽雄傑于蓬蒿吾誠不能同草木而腐朽又何避乎羣喙之呶呶已矣乎吾其鞭風霆而騎日月被九霞之翠袍摶鵬翼于溟渤釣三山之巨鼇道崑崙而息駕聽王母之雲璈呼浮丘于子晉招句曲之三茅長遨遊于碧落共太虛而逍遙亂曰蓬壺之藐藐兮列仙之所逃兮九華之矯矯兮吾將于此巢兮匪塵心之足攪兮念鞠育之劬勞兮茍初心之可紹兮願永矢弗撓兮魚龍山在青陽縣南七十里深谷中有大小魚龍洞水分七流互相貫通多竒勝接石埭界龍池山在青陽縣東南七里有石池不竭相傳龍居之下巖有二竇出泉日三度曰潮泉可溉田宋令曹機築方塘構亭于上其嶺有石橋飛泉懸瀑最為竒勝讀山在青陽縣東二十里有洞如垂鐸石皆青黛色宋范仲淹讀書于此故名或以為即古長山誤又東二十五里曰石龍山又東十五里曰峯山大有山皆與九華競秀木瓜山在青陽縣東三十里唐刺史杜牧禱雨處有祭木瓜山神文五松山在銅陵縣輿地紀勝云舊有松一本五枝蒼鱗老幹青翠參天因名李白在此題咏甚多前有鐵船山銅官山在銅陵縣寰宇記云昔産銅有泉源不竭可浸鐵烹銅唐置銅官場宋置利國監嵗久銅乏場監俱廢麓有惠泉流為惠溪從樊港入江稍西有銅官渚唐書僖宗文德元年楊行密襲宣州進兵銅官渚即此葉山在銅陵縣東郡國志云形如卓筆上有蓮花峯靈竇諸勝葉法善修煉于此故名山陽有阿泉從懸瀑而下至葉廟伏流地中亦一竒境也葉山之東有獅子峯百丈峯馬鞍峯而獅峯最竒特有噴珠泉其平脊有宋所建清涼寺侍郎羅京故宅在焉石耳山在銅陵縣南舊志云兩峯並峙一石髙丈許有巨人迹名真人峯天門山在銅陵縣西南四十里髙聳雲表有天門泉續文獻通考云泉流永城埭至荻港入江山下有晉天福中所建寺宋嘉祐中賜額梵天又西南有五峯山自天門山逶迤而起五峯峻削如指泉亦澄徹附唐李白天門山銘梁山博望關扄楚濱夾據洪流實為吳津兩山錯落如鯨張鱗惟海有若惟川有神牛渚怪物目為車輪光射島嶼氣凌星辰卷沙揚濤溺馬殺人國泰呈瑞時訛返珍開則九江納錫閉則五嶽飛塵天險之地無德匪親鵲頭山在銅陵縣北十里與大江之西岸鵲尾渚相對江中則鵲洲也即春秋時鵲岸六朝置鵲頭戍今俗呼十里長山有城洑鎮唐書云懿宗咸通六年置鵲頭鎮即此杏山在銅陵縣東三十里舊志云晉葛洪種杏燒丹處山素産土硃土人以為丹礦也麓有花堰泉相近有石光山夜常有光城山在銅陵縣東郡邑志俱云四圍石壁峭立惟南一徑可通如城門山頂平坦可數百畝中有一井遇隂晦則雲氣湧出鳳凰山在銅陵縣東五十餘里世傳有鳳凰集其上石窟有泉珠璣錯落名鳳飲泉宋太宗時賜道士趙自然金山在銅陵縣東南三十里有金牛洞南有鬭牛洞舊傳上有鬬牛遺迹陵陽山在石埭縣北五里山有三峯其東峰屬太平縣中峯山半有丹臺竇子明得仙處旁有丹竈丹井山麓有黃鶴池白鶴墩黃鶴林皆子明遺迹晉郭璞詩陵陽宜丹砂指此金城山在石埭縣西二里宋開福寺在焉山列寺旁宛若城郭又西三里曰萬春山圓墩小埠纍纍如走珠松木蓊鬱雨臺山在石埭縣西十五里山七十二折望之如蓮泛水舊名蓮花峯頂平如掌五代時西峯禪師卓錫于此建海獅菴一泉隨錫而湧名龍井亦名西峯井泉今禱雨輒應魚龍山在石埭縣西三十里山最峻聳有二洞大者洞口一池水紺碧色口內竒石各異狀土人云中有緑魚白鳥嵗一見之也其小者相去半里許北接青陽界七井山在石埭縣西七十里其山與貴池接延袤數十里中有七井炎暑亦涼上有望夫尖竹木蓊翳多産藥材城子山在石埭縣西九十里環繞如城前有紫潭慈雲山在石埭縣西百三十里有慈雲洞深可三四里石乳凝結有石磬石板擊之錚然有聲雙塘山亦名桑塘在石埭縣西百五十里有泉瀹茗數日不變杉山在石埭縣西百六十里有待月螺髻等峯最髙者曰鐘樓尖有蓬萊第一洞洞口低狹漸入寬廣容數百人櫟山縣志作厯山寰宇記云石埭縣西百六十里有櫟山髙五里與祁門太平接壤其山石壁峭削下有龍池可百畝池右一石髙丈許直裂為二中擎一丸又一石鏡縱橫二丈光明可鑑人物皆竒迹也其並峙者曰洞山具泉石之勝蘆山在石棣縣南十五里東連鳳凰山南接穰嶺巖深林密隱者多結廬于此其西曰駝山狀如負重蓋山在石埭縣南三十里屹立河濱望之如蓋隋地理志云涇有蓋山有舒姑泉相傳舒氏女坐泉處仙去按石埭自涇縣析置五溪山在石埭縣南百二十里上有五溪合流而下白象山在建德縣治北縣之主山也以形似名旁有蛻龍洞博陽山在建德縣東十里有滴水巖及鯉魚石蚌珠石佛石五龍山在建德縣東三十里五峯森立山半有石井名化龍池深不可測玉峯山在建德縣南半里絶頂有石光瑩如玉宋嚴華摹漢武帝石刻壽字勒于山半名壽字崖三面山在建德縣南四十里有石笋白如人面者三故名梅山在建德縣西南十里巖壑頗勝歷山在東流縣東三十里南望匡廬西瞰江渚最為雄傑上有池二一久雨不盈一久旱不涸下有仙姑井觀者呼仙女則花湧出延壽山在東流縣東六十里懸崖壁立有泉噴流又東十里曰列疊山香山在東流縣南四十里疊鄣層巒有石巖泉洞之勝相近曰隱山一峯峭絶水車嶺在府西南六十里峭壁臨淵奔流衝激若桔橰聲唐李白詩所謂秋浦千重嶺水車嶺最竒是也鹿運嶺在府城東三十里相傳髙僧盧公面壁於此鹿為運水故名一名淹鹿嶺清泉嶺在青陽縣西十里道旁一泉出石罅初名鮑泉繼名趙泉宋真德秀過此為易名清泉作銘系之附宋真德秀清泉銘芙蓉嵯峨與天相摩氣與天通秀緑浮河地靈脈潤如江之沱乃吐斯泉于山之阿行道渴飲孰曰弗過淨洗五濁澡雪百疴涓涓無窮廣濟實多餘潤所被芃芃黍禾上善利物其達盈科名揭而清萬古不磨鳳凰嶺在石埭縣西南百二十里嶺下有三溪合流處有巨石橫亘如埭中一石四方平廣尤覺傑然下有石竇最深縣所由名也普門嶺在建德縣西南十五里宋朱子至此書普門嶺三大字刻于石西峯巖在府南九十里石臺上有巨人迹南為西峯洞頂有龍池從石壁瀉水伏流地中至劉村口小澗仰噴而出紫巖在府西南三十里有泉曰紫泉宋周必大録云池陽三十里至紫巖産紙處即此水簾巖在建德縣東七里俗名夫子巖梅堯臣有水簾巖詩石礲磯在銅陵縣北五里瀕大江有三石門水涸可出入容數十人亦名五霞洞祝家磯在東流縣北五里橫江激湍舟行甚險昔有祝姓者施纜于此以濟往來故名黃石磯在東流縣東北五十里濱大江旁有黃石港多黃土巨石相綿亘古仙洞在府南六十里古仙峰下舊志云世傳此洞為神仙窟宅中有石棊局鉦鼓在焉白雲洞在青陽縣東二十里洞多怪石秉炬入遊竟日莫測其底龍池洞在建德縣東四十五里良禾嶺下石室髙敞有池三懸瀑如匹練下注迎春洞在建德縣東南七里髙深如屋傍有兩石穴可秉燭入名藏春洞大江在府北五里上自雁汊東流縣界下自大通鎮抵荻港入繁昌縣界計一百八十里李陽河在府西六十里源引大江以江流之消長為盈縮一名李王河府志云自河口出江有石槎丫橫突為攔江羅剎二磯南唐周湛鑿支流以避其險謂之新河後磯勢頗安而支流漸侵齧民田正德中作堤鄣之羅剎磯在大江中其上有叢篠喬木明黃觀殉節于此池口河在府西五里即貴池水也唐以此名州古稱貴口亦稱口宋時始稱池口沈仲玉至貴口不敢進齊書云沈仲玉自口欲斷江李安民進軍破之胡三省通鑑注云即今之池州貴池口也其源五一出石埭一出古源一出洘溪一出石嶺一出東源匯于秋浦由杜塢入池口以達于江清溪河在府東北九域志云池州貴池縣有清溪鎮其水源有二一源出西南之洘溪與棠溪峽川之水交于白洋匯于江祖潭是為上清溪一源出縣南太朴山注于白沙河蝦湖東塘湖合三水下流是為下清溪東北五里入江梅根河在府東四十五里源亦有二一出九華由五溪折流于五埠溝一出太朴山瀉于馬牙橋繞龍潭與五埠溝之水交于雙河以入于江吳置冶於此謂之梅根冶宋有鑄錢監故又謂之錢溪按宋書鄧琬傳陳慶至錢溪不敢越于梅根立寨按此似錢溪梅根雖一地而略相隔也大通河在府東北六十里其源七自青陽者四自銅陵者三俱會于車橋河至大通鎮入江五溪河在青陽縣西二十里源出九華山一曰溧溪二曰澗溪三曰雙溪四曰曹溪五曰瀾溪會于六泉口經五溪橋至梅根河入江臨城河在青陽縣南自分流嶺經峽山而西會于大通河博山河在青陽縣南七十里其源四會于陵陽鎮由琉璃嶺下入于石埭之舒溪管埠河在青陽縣東北二十五里其源九會于石堰經木竹潭與東河諸水合流于大通河銅陵河在銅陵縣西北七里其源三會于橫塘閘入市後湖達于江荻港河在銅陵縣北八十里源出朱村會各鄉之水至北下社入江饒河在建德縣南九十里一名龍口河其源三匯於昭潭合於饒河迤入饒州之獨山湖西達彭口入于江香口河在東流縣南六十里源二一出彭澤山林港一出陳蒼原交于三汊繞查池為香口河入江又縣南一里有江口河黃湓湖在府西北九十里湖口通江多魚舊設河泊所大清湖在東流縣東北四十餘里澄徹如鑑流至黃湓入江蓉溪在青陽縣南五里其源六會于臨城河舒溪在石埭縣續文獻通考謂之旋溪本陵陽子明垂釣處後以舒氏三女仙去故名舒溪溪源一出太平縣之弦歌鄉一出縣之舒泉鄉經城南合佘溪嶽溪諸水下涇縣至蕪湖入江溪中有轆轤石在城南五十步許其水激石旋轉有聲即有賢士出璉溪在石埭縣西南八十里其源二一出大宇坑一出石門坑合鴻陵溪管溪經石埭達貴池之池口貢溪在石埭縣西南九十里經杉山之麓西流入貴池之秋浦曹溪在石埭縣西南百二十里源出鳳凰嶺西流為五溪之一茹蘭溪在建德縣東南城下其源出迎春朝霞兩洞西流入堯城溪春夏水溢可通舟楫玉鏡潭在府西南七十里江祖潭下數里許上下雲潭從九華山翠蓋峯發源飛流激石而下上潭有三汲亭下潭有雪浪亭俱廢中流一石名釣臺其旁瓔珞亭如流蘇也雪潭在石埭縣西五里石壁山下長廣數畝而深不可測俗傳源通大江陵陽潭在石埭縣迎寶門外泉源淵深澄碧可挹相傳竇子明放白龍于此秋浦在府西南七十里舊唐書云隋置秋浦縣因水為名舊志云長八十餘里濶三十里按今地有石城至池口皆是四時景物宛若瀟湘洞庭浮桃澗在青陽縣碧桃巖下懸水西南趙知微植桃千株鄉人因以致富上下華池在青陽縣九華山與雲峯山兩山合而成流上華池即龍池下華池下注逆上激水最竒亦産異茗龍池在九華山絶頂其上為五龍灣每一灣為一池注下為千尺泉龍所宅也旱禱輒應復注下為弄珠潭出伏龍橋流為五溪之一嘉魚池在九華山雲峯龍逰澗下池中有石臺乃竇子明李化文垂釣處其水深三四尺峻壁四合上有二水湊為垂瀑中多異魚老龍池在石埭縣大宇坑左右夾以峭壁人迹罕至禱雨時架木而上秉燭從石竇入四五里許以綆繫抵池取水水得即雲雨隨之東坑泉在府西百里毛嶺北發源僅濫觴流出漸大東注玉鏡潭隨地作堰一十五所真珠泉在青陽縣東三十里泉出纍纍如珠潄玉灘在青陽縣雙石巖東潄石琮琤有戞玉聲宋陳巖有水石相逢驟作聲鏗然律吕自天成之句白笴陂在府西南二十五里唐處士鞏疇棲隱處江南通志卷十六
