body:
  text: 江南通志卷十六輿池志山川六寧池二府寧國府陵陽山在府城內岡巒回折府志云勢若蜿蜒為一郡之鎮北自敬亭陂陀而南第一峯府治據之二峯在府治西南别為鼇峯三峯在東北為府治屏蔽宋郭祥正詩陵陽三峯壓千里百尺危樓勢相倚危樓即屏蔽也相傳府治晉桓彝時郭璞所建林仁肇更創城制襟山帶水于形勢為勝區矣上有樓即謝朓北樓李白所稱江城如畫者敬亭山在府北十里府志云古名昭亭東臨宛句二水南俯城闉煙市風帆極目如畫山南有廣教寺舊為黃蘗禪師道場唐丞相裴休所建今雙幢院後金雞井是其遺迹人南麓有井二俱裴休所鑿舊經云裴相井在石盎院水白味甘特異他井其虎窺泉九曲池諸舊迹皆廢其東北有盤龍山麒麟山東有甑山峽石山皆敬亭之支阜也行廊山在府西名勝志云兩峯對峙環抱若廊廡然上有盤石巨人迹府志相傳梁杯渡禪師過此中有白雲池法雲寺下臨大明湖其西北牛頭山又西北為方山響山在府南二里宛溪之上俯瞰響山潭府志云唐刺史路應跨潭為梁建兩亭于東西崖權德輿為記雙羊山在府南三里有雙石羊梅聖俞詩風雪雙羊路梅花溪上村即此稍西為柏山玉山在府南十里其上多古木蒼藤有惠昭寺宋尚書梅詢讀書處李含章亦嘗隱此元張明有詩云春風跨馬銀鞍穩夜月騎牛鐵笛間蓋詠二事也嶧山在府南三十里盤旋隱秀上有項王廟甚靈異舊志相傳羽起兵時經此又東十里為勞山有大小二勞大勞有洞可容數十人曷山在府南三十里按唐書文德元年楊行密攻宣州客袁襲勸其速趨曷山堅壁以需又天復二年行密遣兵擊宣州刺史田頵破之曷山即此嘉靖志作蜀山誤巖臺山在府南五十里舊志云由橫山趨北形勢巉峭上有平臺下有石洞乳泉郡守羅汝芳有臺端松抱石巖底塔棲雲之句其北為花田山華陽山在府東南八十里名勝志云其山連跨宣涇寧旌諸邑其西絶頂曰髙峯敻出雲表山僧依巖構屋覆以鐵瓦人多雜猿猱以居其南為密壠嶺又盤嶺稍西為金牌嶺二嶺之間僅通一線為涇旌間道郡南一厄塞也山之支壠為大小墨山為洞山橫山在華陽山北十里綿亘巃嵸其北為璧田山孔川山東為魯山又東為新田山稽亭山在府東南六十里祥符經云宣城稽亭山古仙人嘗居此行人恱其幽曠每稽駐焉故名有仙人巖三天洞可容百餘人洞有三竅通明流水自內出可灌田旁有風穴又有暗洞皆深窅竒絶莫可名狀柏梘山在府東南七十里府志云山之陽即文脊山也峯攢千仞溪回百折與華陽連屬昔山僧以柏皮為梘引水入厨因名其最勝者為飛橋構險凌空跨岫為梁名曰引虹其北為梅村山西為歙溪山歙溪山之東連岡迤邐沿河而走遙屬于水東諸山其西北曰查樹嶺自寧國至涇道此水東山在府東南七十里大河東南有市有渡與水西山分峙折山在府東南山勢旋折故名相傳奚氏女浣紗於此仙去麻姑山在府東三十里名勝志云相傳麻姑修煉之所有仙壇丹竈劒池石棋枰釣魚臺天遊亭諸迹其東有靈馬山西有碧泉山雲山在府東北七十里下有金牛洞詳見古迹祁門陳履祥講學于此山頂有藏書洞其北曰蔣山下瞰固城湖是為髙淳南境工山在南陵縣西三十里髙數千丈盤踞七十里縣治之鎮山也宋孝子李經廬墓于山麓其西峰下有龍湫北有石岡迤邐而東為石潮山水龍山黃連山同山朗陵山在工山南晉何琦嘗隱此辟穀煉丹山南有丹井射的山在南陵縣西寰宇記云山有玉在石壁內取之者遇風雨而止人望之如射侯因名水龍山在南陵縣西南六十里有泉出山巔之石巖噴五尺許濤湧而下田賴以溉即漳水之源也吕山在南陵縣南六十里有石室其南為石竇有泉湧出淮水發源于此格裏山在縣南七十五里從兩小徑入曰大格口小格口兩山夾行十五里不斷中有腴田深澗人煙相接籍山在南陵縣城中東北隅由工山蜿蜒百折至此陂陀聨絡為邑之鎮神龍山在南陵縣東二十三里山從分界山來逶迤陂陀卓起一峯如遊龍昂首狀故名上有睢陽廟水西山在涇縣西五里下臨賞溪循溪而入最幽勝舊建寶勝崇慶白雲三寺浮屠對峙樓閣參差碧水浮煙咫尺萬狀唐宣宗曽棲此有朝廷若問江南事報道風光在水西之句風光宣宗小字也晉葛洪劉遺民唐李白杜牧皆嘗遊憩焉相接者有白雲山下有白雲潭大寧山在涇縣西三十里唐猷州城在其下今大寧寺其地也上有伏虎石藍山涇縣西六十里太白詩云藍岑聳天壁突兀如鯨額是也相近有郭山望江山望江之西有石豅洪頭山五城山在涇縣西七十里五峯環列如城郭然大城山在涇縣西七十五里與青陽縣接界下有潮泉相傳郭璞所鑿以應江潮嵗旱禱之潮應則雨否則旱又五里有碧山唐李白棲此寶峯山在涇縣西八十里府志云石巖髙數十尋有人物鳥獸之狀若雕繪者山背有竇窅然出竇而升則平逺空曠其下有瀑布飛流千尺鏗訇趾下其對峙者曰銅峯山石碧山在涇縣西北石壁四合如屋太白詩石碧望松寮宛然在碧霄魚礲山在涇縣西北七十五里府志云山下有泉曰湧泉或云潛通江海嘗有魚隨泉而上者仙洞山在涇縣西北八十里俗名和尚山山頂有二洞甚深洞口僅三尺餘罄折可入內有煉丹臺藥丸嘗滿見者隨取隨盈樵夫深入時聞絲竹奕棊聲幕山在涇縣北五里舊志云隋左難當與輔公祏拒戰于此軍幕四周因名故壘尚存北為桑坑山東為漢山桐山琴髙山在涇縣東北二十里名勝志云山半有隱雨巖又有洞傳為晉處士琴髙隱此而名其隔溪對峙者有巖豅洞山中有復洞不柱而屋巷闥幽竒旵山在涇縣東北三十里其頂有池冬夏不竭旁有朝陽洞遙峯嶺金壺山在涇縣東二十五里石壁峭拔五十丈有平臺北衝山在涇縣東三十里兩山相並環以清溪相近有巧坑山多怪石幕溪出此又東十里曰慈坑山坑口有觀音洞烏溪出此眉山在涇縣東六十里下有眉臺眉池相近為貂蟬山百湖山在涇縣東六十五里與徽之箬嶺相接形如舞袖溪流繞之百折而出黃幕山在涇縣東南十里髙百餘丈與縣治對旁挾兩山左曰屏黃山亦名桂嶺其形似樓臺右曰寨山形似屏皆山之分脈以為縣基硃砂山在涇縣東南五十里名勝志云巉巖險峻俯瞰長流有石赤如日故一名丹山相傳石艷發則有災異先是絶壁不通宋尚書郭燮鑿道跨一橋以濟黃㟋山在涇縣東南六十里髙五百丈羣巒列嶂狀若蓮花為縣治之祖丹溪之水出焉旁有嶺曰百花尖又有筆尖山其南曰湧溪山産茶承流山在涇縣南四十里九峯羅列與縣治相拱揖峯巒聳秀甲于一邑宋許國公吳潛讀書于此又有許竇二真人遺迹黃象山在涇縣南九十里碎石五色返照有光舊有寶光菴昔人詩云猿抱子歸青嶂外鳥銜花落碧巖前駐蹕山在寧國縣南一里府志云明太祖嘗駐蹕于此故名又南四里曰雞山一名鳳山峯巒秀拔為邑之鎮陽濠山在寧國縣南三十里最髙為邑南嶂絶頂有龍湫噴湧而出遙望如練相近有琴山又南二十里有屏山了髻山在寧國縣南八十五里舊志云南唐時嘗作烽燧樓其上外有仙燕洞舊時鄉民避兵之所千頃山在寧國縣南百三十里府志云與浙江昌化縣接界上有池其大千頃其流南入昌化北注寧國籠叢山在寧國縣西南百五十里其南屬績溪界峻壁崇關為宣歙厄塞官兵常駐此防戍焉又縣西八十里有塵嶺山亦稱險厄與籠叢相埒唐汪華嘗駐兵有藏馬洞卓戈泉獨山在寧國縣西五里為縣脈來龍東散入平野為縣治石鼓山在寧國縣西九域志云上有石鼓天雨則鳴紫山在寧國縣西百里縣志云髙數百仞周二百里中有龍池龍井石塔石鼓諸勝石鏡山在寧國縣西百一十里有龍巖瀑布又有石鏡能照人文脊山在寧國縣西北三十里府志云髙數千丈周三百餘里西接涇旌諸山北為宣城之柏梘峯巒攢秀巖洞盤旋郡雄鎮也寰宇記云一名曷山山門山在文脊東南峭壁劃然中開儼若城闉府志云晉瞿硎先生隱此中有六洞曰紫雲曰夕陽曰朝陽曰明心曰碧雲曰漣漪洞前有瞿硎樹為先生手植一本三花即桓溫命伏滔作贊處國朝施閏章山門遊記寧郡匝萬山其磊砢而谽谺者往往竅為洞穴而其環山皆洞交屬旁通者莫如山門巖石環亘中豁如甕城髙廣數丈其西為文脊峯中多平野山為郛廓其前後髙下以洞名者曰朝陽曰紫雲曰漣漪曰枇杷曰龍潭相距不一里許朝陽者南向爽塏户牖三面蓋瞿硎先生披鹿裘坐石室處東百餘步從怪石中側墜下者紫雲也窅深而明時出雲氣自西北穿澗谷深黑可三百步聞流泉僧炬而導客南出于山之凥所謂漣漪者也左陟山椒右陷而中虛崖罅有枇杷樹洞以是名其稍逺者為龍潭大旱不涸龍窟其中嘉靖間土人堨水灌田雷奮龍見日為晝瞑其水東北徑漣漪合流匯于港口其餘如竇如井多深隘不可入春夏水漲灌輸萬竅衆山怒號若考鐘鼓始入門曰靈巖寺有古木數十圍人稱瞿硎樹其新闢而菴者在腹曰鑿鐵在背曰竹影皆隨山架宇倚石為壁曲榭層樓人蹈空際而所謂鑿鐵者又一小石門中有獅子峯倚天昂首環顧崇巖萬怪竦疊余少而聞之將老而遊春日既佳歡興殫洽樂其洞穴之幽而多軒豁通朗給人遊目類有道而能容者時無瞿硎先生石室閴然然其人遁迹韜光不與人接而桓溫造訪物色使伏滔作贊溫故自可哉千百世下求斯人之車塵馬迹又可得哉鴉山在寧國縣西北三十里接廣德界寰宇記云山産茶味與蘄州所産同梅聖俞所謂茶味鴉山佳者也冷度山在寧國縣東九十里山有五峯東曰桂山西曰金字南曰青紅北曰周壁東北曰黃封連綿蜿蜒經數百里東山在寧國縣東南五十里山南溪洞逼隘至此獨豁然開朗下有渡曰石口即東溪所經也關口山在寧國縣東南六十里又名獅象山兩峰錯峙若門其中徑隘溪深巖坪泉田多油漆紙皮之利坪盡山髙有懸崖隱洞飛瀑龍湫天目山在寧國縣東南百五十里山本浙西巨鎮邑中諸山皆其支脈實有藩屏之勢棲真山在旌德縣西五里神仙傳云昔竇子明為陵陽令三年避劉聰亂棄官尋山採藥結廬於此後仙去正山在旌德縣西三十里峭峻特出諺云正山峩峩接星斗分列岡巒九十九上有仙人臺響石亭玉井東有郭公巖巖傍刻珍珠泉三字南唐將方道項洪鋭嘗屯兵于此相近者有柵山其南有大幕小幕二山石柱山在旌德縣西六十里雙石挺立髙數丈有巨石承之上有豹子尖梁程靈洗討侯景立幟于此築歃血臺又嘗抽矢射山石摧一角因名其石曰射的山天井山在旌德縣西北三十里山有兩竇飛泉出焉俗呼牛鼻水下有龍潭石壁山在旌德縣北二十五里兩崖對峙一水中流最稱厄塞舊路躡懸崖上行旅恐栗胡安定周竹陂嘗作歌紀其艱險明嘉靖間通判李默緣溪鑿石成徑始為通塗龍首山在旌德縣北四十里西北有龍潭徽水經其下與涇邑接境鳬山在旌德縣東名勝志云相傳竇子明既仙去其二女亦化為青鳬上升故名其陽有玉壺山山阿有龍潭梓山在旌德縣東南二里近俯城闉逺凌岫壑為一邑雄覽旁有竒石石上有桃樹不花而實蛟山在旌德縣西南五十里山形蟉虬若騰蛟然後有洞徑險難入其中平曠可居又西十里有九峯山黃山在太平縣南三十里當徽寧二郡界髙數千仞盤亘三百里圖經稱為軒轅棲真之所上有古木靈藥流泉香美能已百病按舊志云山有三十六峯屬太平者八曰翠微曰天都曰望仙曰九龍曰聖泉曰疊嶂曰仙人曰芙蓉餘詳徽州府陵陽山在太平縣西六十里西屬石埭北界涇邑一名三台山有竇