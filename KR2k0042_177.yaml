body:
  text: 江南通志卷一百七十八人物志列女義烈二海鎮淮揚徐四府太通三州鎮江府宋韓世忠妻梁氏京口妓也嘗五更入帥府候朔時世忠尚為卒梁見而心異之宻告其母資以金帛約為夫婦後世忠為名將封兩國夫人嘗親執桴鼓助督戰黄天蕩之役金師鑿河遯梁奏世忠失機縱敵乞加罪責舉朝為之動色竇氏女丹徒人父母俱亡許嫁者其家舊僕也成婚日始識其人乃婉言拒之三日投井死郡守為立石釡鼎山元吳克妻戈氏至正丙申明兵取鎮江城破投井死史氏溧陽人紅巾之亂舉家被害自刎未絶抱子入水死明萬敬妻史氏金壇人嫁未逾年夫亡氏絶粒三日𦵏畢自經詔旌董氏金壇人議婚張某又有怙勢求娶者董不從自刎死嘉靖中旌姜士進妻蔣氏丹陽人㓜頴悟喜讀書其父母以李易安朱淑真比之蔣曰易安更嫁淑真不慊其夫雖能文大節虧矣士進病亡蔣索死者再家人防之宻不獲遂一日於繐帳前掘坑埋大甕貯水笑曰吾將種白蓮花于此以自怡悦耳家人信之防稍懈已濡首甕中死矣事聞榜其門曰文章貞節仲憼妻趙氏丹徒人年十九夫亡家貧父母欲嫁之自剔其目以示不可奪事舅姑以孝聞萬歴年旌傅氏女金壇人許字潘二郎潘溺死家貧無依父母更許他姓女自縊崇禎時旌髙才妻荆氏金壇人嫁未逾年才卒荆求死不得既而遺腹舉子遂一意撫孤宗戚憐其少强之更適不從有馮甲挾厚貲請婚强者愈力荆託以内室更衣取刀截髪令婢懸之閭左衆駭而退鄧藩錫妾張氏金壇人藩錫知兖州府崇禎十五年城陷死之氏携子入井死張綖妻錢氏查爾瑩妻戴氏俱丹徒人以明末避亂遇兵刦掠不辱而死胡覲龍妻陳氏丹徒人少寡隣里多勸改適氏一日告翁姑曰翁姑無恙新婦在反重為翁姑憂不如從夫地下也翁姑亦不為意夜竟拒户自縊死溧陽餓婦失其姓氏夫挈妻授經于句容值歳荒徒散夫出不返氏閉户忍饑有慕其姿與食者拒之卒餓死蔣氏女溧陽人許字史傳心夫病請歸侍疾夫卒自經唐有望妻張氏溧陽人歸唐三月而夫卒欲身殉未果會有衊以蜚語者遂引刀自刎妯娌奪刀即乘間縊死尸泣者三日于天篤妻王氏金壇人夫亡將𦵏觸棺死與夫同穴邵方婢方任俠有名巡撫捕殺之并逮其子儀薄暮捕者閉儀于内室扄鑰而守之時儀三歳婢抱之泣方女夫沈應奎私念此子死邵氏無後從所善司李飲罷夜分縋城出抵邵家乘門者假寐踰墻入婢正歎息安得沈郎來忽見之驚喜頓首曰邵氏之祀在子矣此子生而婢子死無害也應奎竟匿儀去凌晨謁司李捕者失儀繫婢榜掠幾死終無一言怨者又言於守曰必應奎匿之而所善司李在坐曰寃哉應奎夜飲于余晨又來謁也事遂寢婢卒撫其子成立國朝龔行妻謝氏興化人避水患從夫攜女居丹徒南闗口𨽻人田五家相望窺瞷謝氏母女數挑之氏嚴拒一日行出田乘醉逼犯不得乃與其黨設謀持偽劵索負行訴之官官弗辨竟笞行令償謝自念非捐身寃不白無以脱夫厄與女哭竟夜牽臂投河死行沿河大號雙屍湧水中立田論如律康熙十八年旌表朱氏女丹徒人許字丹陽陳樹槐槐歿既𦵏女服原聘衣縊死雍正元年旌表姜廷貴妻趙氏丹徒人救子存姑奮身禦冦舍生死義守正不汚雍正十二年旌表陳太初妻夏氏丹徒人太初病劇無子語妻可善擇所歸氏盡鬻所有𦵏夫畢即縊死王士𢎞妻尹氏丹徒人殉夫死卞宸俞妻顔氏丹徒人進士士𢎞母順治十六年海冦陷鎮江肆焚掠氏投井死于珣妻賀氏子婦荆氏俱金壇人孫廣妻張氏史氏俱金壇人虞聲先妻王氏金壇人王世春妻趙氏側室尤氏俱丹徒人顧世賞妻吳氏子婦李氏俱丹徒人張祖恒妻夏氏丹陽人以上俱遇冦亂不辱投水死荆潹妻于氏丹陽人國初遇兵謂夫曰速殺妾夫不忍怒曰欲留為亂兵汚耶遂自殺余有徳妻趙氏家貧事姑孝康熙丙辰有營丁某出征逺歸值有徳外出突入逼之婦奔出取刀刎死馮氏女金壇人聞父敦厚及母王氏死江隂即絶食自縊死馬世位妻周氏溧陽人少寡無嗣父母欲奪其志氏垂足閾外闗門捩折其脛痛絶方蘇平生非十指所出者不食年至九十四王氏三女金壇人二為王潺金女一為王逸女居長蕩湖濵明末湖濵奸民白晝行刦三女奉親命避匿隔洲叢葦中賊覘知操筏至及接三女手置筏上三女背相倚手互持牢甚至湍急處忽併身曲踊連頓其足筏覆與賊俱溺明日賊屍浮水上惟三女屍不出月餘賊衆散兩家就其處求之屍方出猶堅相持父母哭而披其手始開𦵏湖壖塜生樹枝必三椏有連理者袁玉修妻徐氏金壇人夫病革為兩棺夫亡自刎髪繞頸創不深救之甦殯𦵏畢自刎内寢戴氏女丹陽人許適蔣景貧苦授徒二十八歳尚未能娶病歿女聞不食六日用紅絲纒體㣲呼心痛數聲而絶淮安府南唐劉仁贍妻薛氏清河人周世宗攻夀春急仁贍死守子崇諫將謀自全仁贍命腰斬之監軍使求救于薛氏氏曰㓜子固所不忍若貸死劉氏遂為不忠之門促斬之既而仁贍病卒薛氏亦不食死宋陸秀夫妻鹽城人與秀夫至厓山北軍大至兩軍死戰夫人攜子赴海死北辰坊烈婦郡人夫為小商至北辰病死貧無以殮同行富商為殮𦵏恃有恩廹之婦取嬰兒縛懐中赴淮死徐積有文記其事復作詩哀之李氏淮隂大義鄉富商妻同商者見而悦之道殺其夫厚殮以歸紿云溺死且盡歸其財除䘮求婚許之既生子乃以實告氏奔告有司卒正其獄即縛其子投諸淮已亦赴水死明申進妻徐氏山陽人年十九歸進甫三月夫挽漕没於京同行歸者還其夫衣氏衣其衣投河死推官馬騤立祠于府東葉氏名善祥淮安衛人許字張衢未嫁夫亡父母促改嫁自縊死孔春妻謝氏山陽人年二十夫亡撫遺腹子金績絍養姑鹽賈杜言强娶之投淮死金白母寃抵言法推官曹于汴立祠祀之顔遂妻胡氏鹽城人夫亡無子舅姑貧潛以許人聘禮至婦自縊死蕭儒妻蔣氏郡人夫亡撫二女自耕以食夫兄利其田廹嫁不從遂誣以姦攝理無證氏舉刀斷左腕夫兄伏罪劉存仁妻王氏鹽城人夫亡自縊事聞旌表那揖妻張氏郡人年十八夫亡身殉顧綱妻周氏清河人夫亡身殉蘇儒妻許氏清河人夫亡上塜取夫及已衣同紙錢焚之因自縊死莊尚妻胡氏桃源人夫亡自縊張禧妻王氏山陽人夫亡絶粒死王露妻郭氏鹽城人夫亡自縊死景泰中旌夏啟元妻孟氏郡人早寡繼母逼改適剺面毁容乃止魏聖言妻許氏郡人夫亡自縊俱天啟年旌朱得春妻孫氏安東人夫貧無食欲鬻之謂氏曰合則俱死分則兩全氏不從强之再四氏曰我姑屈身以活汝但我去汝即他往遂别嫁至其家即自刎死殷尚義妻李氏郡人有容色夫貧窘宻許與鄰人通氏知之紿夫出繫兒女於牀自溺死劉國用妻胡氏鹽城人年二十夫亡自縊事聞旌表陳性善妻胡氏桃源人夫亡守節懐宗末流賊至被執欲汚之氏大罵不屈死馬海妻許氏安東人縣𨽻梁進催糧至海家海他出進入室逼姦氏大呼進逸去氏恚自縊國朝髙華宗妻張氏郡人成婚三日夫亡自縊死程元相妻俞氏安東人夫亡自縊沈氏女鹽城人父病刲股進羮許字薛國琳未嫁夫亡聞訃自縊唐氏女鹽城人拒逼姦自縊死以上康熙年旌表劉氏女鹽城人拒逼姦自縊死雍正三年旌表劉闇士妻許氏鹽城人夫亡撫孤孤又殤乃保真而殞命趙氏女許字孫兆鳳未婚夫亡從一殞命以上雍正十二年旌表王氏女許字趙樹儀夫亡身殉張樹名妻蔣氏鹽城人夫亡自縊死成昌代妻髙氏鹽城人夫亡七終設祭縊死柩旁張敦良妻王氏安東人夫亡絶粒死王啟貞妻周氏山陽人刲股愈翁疾夫亡服滿祭夫墓歸仍衣䘮服自縊汪起鵠妻徐氏郡人夫病勸之改適先自刎死陳朝卿妻葛氏桃源人夫亡自縊王椅臣妻胡氏郡人夫病囑其改適先自縊死吕震男妻朱氏郡人年二十一夫亡姑欲嫁之自縊死楊子厚妻鄭氏郡人夫亡自刎死曹芝節妻髙氏山陽人夫亡自縊監生薛衷妻楊氏鹽城人夫病暴絶氏自縊夫復甦氏已殞命生員成肇孫妻王氏鹽城人夫亡自縊趙氏女鹽城人許字薛薫薰亡聞訃自縊王氏女鹽城人許字陳繼中繼中亡聞訃自縊蔣氏女鹽城人許字趙廷對夫亡自縊張允曙妻王氏鹽城人夫亡百日自縊死鄭氏女安東人許字梁世偉偉死繼母令他適女自縊蔣筠孫妻尤氏孫榮國妻裴氏俱桃源人夫亡自縊張氏女安東人許字朱克豫聞夫亡自縊揚州府周浣紗女馮氏白沙人楚伍員亡奔吳遇女子浣紗囑之曰後有追者勿言女赴水死以絶口後員滅楚還乃即其地留鷄祀之因名其山曰鷄留立廟山側三國孫竒妻范姬竒亡父慎以姬少寡無子迎之不肯歸迎者以父命逼之姬遂操刀割耳及鼻父乃止南北朝齊獄吏妻顔氏揚州人姿色絶人齊太守聞而奪之遂自刎死今相傳有顔小娘子塜唐樊彦琛妻魏氏揚州人彦琛沒後值徐敬業起兵聞魏氏知音召令鼓筝氏曰夫亡不死奚忍操絃引刀自斷其指卒欲强妻之固拒不從曰速死吾志也遂見害五代周廸妻某氏廸本洪州商人居揚城光孝中楊行宻圍揚州城中食盡殺人而食氏謂廸曰君有老母不可不歸妾請鬻以備行資遂詣屠肆得金一錠授廸號泣而别廸至門以金賄守者詰之廸以實對詣屠肆騐之見妻首在案上衆惋歎競以帛遺廸収其餘骸歸宋露筋女失其姓偶與嫂行役廹暮道旁有耕夫舍嫂止之女堅不就宿於野外為蚊蚋所嘬而死曉視其筋露焉人哀之為立廟河側張氏女髙郵人賊入城知女姿艷叩其家索之女方匿複宇間賊將害其父母不得已乃出拜賊賊喜即呼其父母為丈人媪而以女行女忻然從之過橋投水死徐賡妻蔡人興化人賡為寧鄉主簿病故氏服毒死秦觀為作烈婦傳馬元貞妻榮氏建炎二年賊冦真州氏與姑為所獲殺其姑脅氏氏曰我雖婦人不求茍免罵賊死毛惜惜髙郵妓也端平二年榮全據城以叛制置使招之全偽降欲殺使使者與其黨王安等宴飲惜惜侍立供奉抗言曰初謂太尉降為太尉更生賀今閉門不納使者乃叛逆耳妾雖㣲賤不能為叛賊行酒全怒曳惜惜臠之罵至死不絶事平聞於朝封英烈夫人立廟祀焉李氏謝枋得之妻徳祐末枋得兵敗奔建寧元人購捕其家氏攜子女匿貴溪山元下令曰茍不獲李氏屠而墟氏出就縛送揚州獄時有總兵欲娶之李撫子泣曰若軰生還善事吾姑吾不得終養矣解裙帶縊死女亦死二子得放還元盛彛綱妻張氏泰州人至正間冦至犯之不從罵賊死韋寅妻王氏元末亂民掠寅家寅被創仆地氏赴井死姑與女婢從之陸復廣妻唐氏興化人遇賊欲汚之不從投水死宋某妻費氏元末從宦江隂值苖軍亂欲犯之氏大罵被殺欒鳳妻王氏髙郵人鳳知諸暨州氏從焉方國珍襲城入刺鳳氏以身蔽俱被害明殷氏女周氏女俱江都人建文末燕兵掠二女欲汚之並赴水死副使趙鶴言於朝並趙淮妾立三烈廟祀之張印妻李氏髙郵人嘉靖丁巳倭冦至欲汚之大罵被殺潘烈女小字芝兒江都人懐宗時髙傑兵肆掠揚境芝兒不受汚赴水死李鐵匠妻田氏儀徴人髙傑兵掠江上執婦犯之婦以死拒强之上馬至城南小橋馬不能渡婦紿兵攜手行臨中流急湍婦力曳兵赴水與偕溺汪承祖妻樊氏江都人孀居十餘年值兵至以線宻縫其裳赴眢井死陳王宁妻游氏江都人城陷夜舉火譁噪或勸乘夜可出城游謂女不夜行况孀婦乎偕㓜女投井死時城陷不辱死者無算詳載府縣志學生胡生婦江都人佚氏姓胡生好博狎妓遇婦多不以禮身沒舅姑憐其少欲嫁之氏投水死王珍妻馬氏興化人珍病危顧謂父曰婦少幸嫁之氏泣曰我二人死未卜先後君何慮之深也夜半潛縊