body:
  text: 江南通志卷一百五十九人物志孝義三揚徐二府太海通三州揚州府晉盛彥字翁子廣陵人母王氏因疾失明每食必躬自哺之母病久婢使數見箠撻婢忿恨伺彥出取蠐螬炙飼之母食以為美然疑其異藏其餘示彥彥見抱母慟哭幾絶母目忽開瞻視如故仕吳至中書侍郎晉初舉大中正髙悝廣陵人少孤值嵗飢悝蔬食不厭每致甘肥於母撫幼弟友愛寓居江州刺史華軼辟為西曹書佐及軼敗悝匿其妻子會赦乃出元帝以為參軍位至丹陽尹封建昌伯子嵩南北朝宋劉宗武廣陵人魏太武南伐至安宜宗武母為亂軍所害宗武蔬食終身人號所居村為孝義鄉南唐吳元嗣江都人子孫夀皆百嵗一門前後義聚不分守臣聞於朝賜義門置義順二臺旌之宋許叔微真州人篤志經史尤邃於醫建炎初太疫叔微親行里巷為之診療所活甚衆夢神人曰上帝以汝隂功錫汝以官因留語云藥市收功陳樓間阻堂上呼盧喝六作五後第六人登第升第五人在陳祖言樓材之間吳志興儀徵人世篤孝義其家七世三百年不分異積善好施髙宗封為迪功郎子汝明嘗刲股療母疾靈芝生堂側開禧中金兵入境他室廬皆焚蕩汝明室獨存嘉定中旌其門蔣伍寶應人嘉定間母孫氏兩目俱盲伍自剜左目和粥以進母目忽明縣上其事詔表所居曰昭孝坊稽聳髙郵人布衣尚義文丞相天祥見逐於真州聳迎事於家資送航海達行在時有工部侍郎栁嶽進降表道經其莊聳憤嶽賣國殺之沈正海陵人父使酒毆人死正途遇父見父恐懾狀述其故正遽往佯毆其尸巡者捕正獄具死元卜勝髙郵人母病為嘗糞又割股作糜以進母尋愈泰定間旌表陳起字起宗為真州獄吏夏月囚多疫起旦暮勞問給醫藥召獄卒諭善視出私財日具湯餌粥食其後纍世貴顯張緝字士明其先膠州人父宦維揚因家江都至正間緝與兄紳弟經俱領山東鄉舉緝授泰州幕棄職養親髙郵賊兵犯境母方病賊持刀突入舉家驚散緝獨以身翼蔽其母背負數創母得以全劉信甫揚州人郡富商曹氏僕曹瀕死以孤託之孤漸長其叔利孤財妄訴家産未析盡為姪據郡守劉察其詐直之叔之子憤訟不勝自鴆其父而誣弟殺適達嚕噶齊穆穆哩者與守不相能競欲置孤法并以中守引致百餘人皆抑使誣質以成其獄信甫先匿孤他處身出就讞榜掠無完膚終不承孤得脫於難既而叩蹕稱寃達嚕噶齊以罪去守復官明孫質髙郵人元末避兵廣陵值張鑑兵亂質度不能俱免謂其妻曰不幸至此若使親殞於兵終天之恨奚極遂棄妻奉其父母避之蘇州事親以夀終明洪武五年還髙郵吳汝寧泰州人洪武初伯兄汝陽譴戍烏撒衛越六年歸里心憚逺行臨發愀然汝寧慷慨願代兄役行至黃陵廟遇風覆舟死焉韓福緣儀徵人永樂時以孝旌張起海陵人父遭兵亂與母相失起號咷博求三十年得母於濟隂成廷圭贈詩比之朱夀昌費廙髙郵人母湯氏病劇廙割股和糜以進母啖而愈其從弟庸亦割股以愈父病人稱雙孝王鳳字朝陽寶應人喪母年已七十哀毁骨立廬於墓張佛住髙郵人割肝愈母被旌王沂儀徵人伯父為人所誣謫戍開平天順改元沂重趼上疏訟寃得釋史得儀徵人兄能為指揮坐法當死得念兄乏嗣請於官願以身代兄竟出獄生子得喜曰不負吾心矣會赦並得釋王輅江都人年十四割股療父病後母老疾亦如之獲痊徐恩江都人家貧業農兄弟數人析㸑恩獨依膝下父患瘍日夜吮其患處後為盜傷恩奮勇手刃一人盜披靡去母病月餘盛暑恩伏牀下蚊嘬無完膚每晨焚香籲天遇丐者與藥一粒大如粟母服遂愈人疑遇仙時稱徐孝子王玉泰州人八世同㸑𢎞治中旌魏全興化人母畏雷全每他出見天欲雨則顛蹶遄歸夜見有電光雖宿市廛必鐍門而還抱母卧終身不怠孫著寶應人父鸞嗜飲著嘗置錢酒家密供父飲父病割股雜豚肉中父食之尋愈宫永建字克昌泰州人倭入犯民盡竄永建孑身守父柩比閭遭焚劫永建家獨免嘗貸門人顧某錢顧已殁持金還之家人不復記憶辭永建曰若不受當掘置隧左矣後以進士世其家吳一瀾字觀瀾以鹽策客儀徵萬厯二十三年大飢邑令募富户輸濟多不應瀾適自楚市米歸急白令曰今有米千石糶之可得倍息年飢居竒誠不忍願以半供賑令曰不繼奈何一瀾曰儀距楚千餘里乘風上下月可達也但得母錢廣糴以子米利貧亦易耳富者感動共集得官民錢若干瀾周回糴糶存濟無算陸典髙郵人父龍以義代人任罪謫佃遼東典時尚幼弱冠後發憤出塞求親而訃適至躡屩往奔欲扶櫬歸里而法不得入關走京師泣陳於當道薊督檄護之歸卞玹字汝用江都人世務農業治家有法五世同居事聞旌表孫諌髙郵人割股療父疾創久不愈有人詣其門出紫色藥傅患處一二日即無恙巡撫李三才賫金以資養令有司嵗以粟帛存問李長敷字維凝興化人天啓辛酉舉人弟長祺早卒遺孤清長敷撫之如己子與清同舉於鄉性狷介工詩詞王維慶字裕昆髙郵人性至孝妻陳氏能順承維慶之志割股以愈姑疾後維慶父病慶曰吾聞割股非孝然吾婦行之獲濟傷體愈親猶賢於己亦割股愈之奉旨旌奬閻汝梅字和陽江都人崇禎辛未進士授陽榖知縣擢刑部主事為孝亷時知府劉鐸以觸魏閹被逮人莫敢省汝梅獨贈金送其行張福江都人黃國相之僕明末被兵國相死福頸創甚止氣喉未斷脅下亦被數刃從積尸中以手捧頭匍匐奉主媪匿僻處越數日勢定創稍愈復行遍歷諸營訪覓幼主得之金陵牧場伺夜負歸黃氏母子復聚福終老其家繆嶔字珍所泰州人泰州舊例代鳳陽輸米徴催與邑漕並急百姓苦之崇禎十一年嶔以布衣伏闕上疏會邑人徐耀為都御史力言於户部得全豁免而髙寶興江諸邑之代輸者亦次第蠲除王師文興化人慷慨好周急里女為姦人誘賣父母不能贖為贖而嫁之嘗持金五百寄逆旅主人同時他客亦寄千金比去主人誤以客槖授之既行發槖復持還則客方欲訟主人於官師文至乃解崇禎末嵗大飢令踵門告曰能活吾民者必君也師文即捐榖麥數千斛錢數千緡賑之凡邑中義舉必首倡焉江九萬字元里儀徴人與妻黃氏相繼割股療親疾國朝陳嘉謨字我師興化縣學生順治初父𢎞道為怨家誣以私鹽逮繫府獄且屬獄卒絶其槖饘內外隔絶嘉謨丐貸進金於羣小乞一見不許知羣小計必殺之大哭而歸告於城隍之神作血書置袖中出廟門去是夜守舍蒼頭候嘉謨不還忽聞叩門聲若嗚嗚泣者開視無人心怪之翌日有白運使得一函於鈔關口啓視乃嘉謨訟寃血書運使大驚而蒼頭適赴運使訴其事與血書合乃令求嘉謨尸越七日出自鈔關河中氣勃勃如生觀者萬人莫不泣下遂出𢎞道於獄治誣告者罪金玊節字元亮江都學生明末兩親柩未葬瘞室中有亂卒疑瘞金將剖其棺玊節以身翼蔽長子竒選年九嵗奪卒刀泣代父死卒免玊節掠竒選去適遇僧人呵云小孝子不可殺卒乃投之地得還玊節生平有養寡姊撫孤甥全難婦還遺金諸義舉可嘉竒選字幼常能世其家學與弟彥選友愛不分㸑玊節著四書解小學闡證竒選亦著孝經闡證性理纂言禮記分類等書吳愛儀徴人父客死雲南愛年十四欲往覓父柩時兵戈塞路人咸阻之忽一日痛哭别其姊曰姊善視弟吾不返父柩不歸矣途中三為兵掠﨑嶇萬狀卒至雲南載父柩歸程孝子揚州人母殁露處墓旁不忍去土人憐之為構廬舍事聞旌表葉君實江都人性伉直好施與嘗出數千金修捍海堤四十餘里俞士瑄字宣玊江都嵗貢生至性過人事父母自生養至喪葬皆盡禮盡情康熙四十三年旌表髙成琦字軼韓江都諸生父以罪流三原母抱病不起成琦每嵗徒步三千里省父歸又負米養母一日父潛歸復還流所成琦侍行途中無貰驢費負父以行足裂流血歸未久父殁成琦晝夜哀號抱父木主投義濟橋下死汪源澍江都人性至孝父年六十餘病弗治澍禱吕公祠手疏請代父跪階下哭不起歸視父疾不瘳明日再詣祠哭凡七日不食夜坐父牀側假寐夢道人長髯揮麈語曰汝父生矣驚覺父已呼粥明晨即起步見者喜愕不知其故澍終不言澍隨以疾死死之夕曰吾父生吾長笑入地矣張中逵字九達江都嵗貢生幼孤母好潔躬為滌拭牏器生二子後即不復入室冬夜卧母足母或遣之愀然曰母氣衰非兒不暖母病篤嘗糞以希其愈子庸德戊午副榜亦以孝友稱哭父病目哭母目加昏再哭弟遂失明許明賢揚州人性至孝侍親意少不豫立寢門外纍夕不就枕長子承宗善承親意友愛兩弟承宣承家凡發粟施絮設藥局置義冢倡育嬰社義事靡所不為程願學字奐若儀徵諸生祖死於法父徙寧古塔願學以幼免成童後思親恆日夜泣不交一人屏除酒肉食未嘗飽冬月不衣綿纊蓋終身以喪禮自處臨終戒其子勿與妻合葬以不知其父骸骨所在也里中稱之曰苦行先生劉啓元髙郵人以孝行旌表李灃字方同興化廪生素性孝友父病扶持左右手劑藥餌雖盛夏鼎鐺爐火常在側閲七八年不懈居父憂斷酒肉終喪喪母亦然徐文瑄字廷璧興化貢生早喪父母嵗時祭祀終身作孺子泣會大水移葬親柩於髙原躬自負土勞憊嘔血而死方立禮字武城江都人八嵗母亡繼母汪待之虐立禮受杖惟謹父卒汪益逞立禮益孝謹且推愛繼母所出之兩弟後母與弟相繼殁立禮殯葬之從厚雍正六年旌表耿兆紳字賢書江都諸生性倜儻好施置義田以贍宗族設義渡以濟往來又多募瘞枯骨嵗凶每出粟賑飢好學工詩古文所著有藜光集李朱露字天膏興化庠生父漢病衣不解帶不入私室父殁廬墓三年事繼母孝年七十餘病革猶泣持繼母手以不能終事為憾程銓江都人樂善好施順治壬辰大水被災民千百為羣有挾借倡亂之勢銓以利害曉勸商家巨室斂資散給諭歸復業揚賴以安子濬康熙丙辰進士知大名府以寬和治趙宗普林中馨李之瑀閻士彥蕭日璜皆江都人邱雯髙郵人俱割股療親疾郭光字子瞻江都嵗貢生父梁以醫濟人光性孝友親殁五十餘年每思慕輒出涕兄子遭亂相失傾囊贖歸愛養如己子師友之無後者春秋為位祀之房育麒寶應人事繼母以孝聞鄰人與爭屋基即拆屋讓之賊入室戒家人毋以火照給米鈔令潛逸縣令亷其行義命乘己輿舁行街市以旌異之王絃興化諸生與弟纊俱割股廬墓耿兆組字玊書江都縣學生有貨殖才承先業以節儉致贏餘嘗輸米代貧家償逋糧捐田助獄囚食置義渡船於鈔關運河建普濟堂於瓜洲地施槥瘞胔哺飢絮凍事無算徐熺字映如興化貢生廷試畢以親老不謁選歸父病籲天願減已算以益父夀父卒廬墓三年及母殁晨夕悲號忽忽若母在每飯必覔母一日拊棺長號曰百日內兒當從母於地下矣已而果殁史以遇字際亨江都人順治戊子舉人負幹略究心時務江都里役積欠責成里長以遇言於有司改為輸納民便之子奭丁酉舉人著淮揚治水圖説淮水決周橋鳳泗民委卸弗塞奭獨身任其事除六安學正未赴卒戴思訥字理研江都人康熙丙戌進士授編修少失恃侍父夢齡自就學至服官未嘗離膝下父官奉天府尹卒思訥悲傷直欲死而見父於地下扶櫬歸營葬畢復時欲自屏家人防之密忽買舟南下謝諸弔者行至平望於中夜自縊舟中康熙五十六年督撫準縣詳建専祠徐州府漢劉平初名曠字公子彭城人嘗為災丘長政教大行更始時天下大亂平弟仲為賊所殺平棄己子抱仲女與母匿澤中朝出求食逢餓賊將烹之平叩頭求歸食母畢還就烹賊哀而遣之平還既食母還詣賊衆以為烈士不忍食於是得全建武初為彭城郡吏郡守孫萌為賊執平冒刃蔽萌身被十創賊曰義士也遂解去後舉孝亷歷丞長顯宗時以鍾離意薦徵授議郎遷侍中宗正劉均沛國人建初時為左馮翊會清河孝王母宋貴人死不以罪朝野憐之竇后復捕繫其父均同山陽張峻奔走解釋義聲著聞劉愷字伯豫彭城人杼秋侯般長子以爵讓弟憲遁去有司請絶愷國肅宗美其義特優假之侍中賈逵言有司不原樂善之心而繩以法非所以長克讓之風乃徵愷為侍中官至司徒太尉薑肱字伯淮沛人與二弟仲海季江友愛天至常共卧起嘗與季江夜遇盜欲殺之兄弟爭死賊遂兩釋焉後與徐稚等俱徴不至桓帝使畫工圖其形狀肱以被掩面競不得見後又徵為太守遂遁海濵三國劉陽沛人初以漢室漸衰知曹操有雄才終為漢纍欲除之而事不會年三十卒及操貴求其嗣子甚急賴東海王朗匿之又為開解久乃釋南北朝宋孫棘彭城人宋孝武五年發三五丁棘弟薩違期當死棘詣郡自列己為家督當坐薩又辭列自引棘妻許又寄語棘不可委罪小郎且大家以小郎屬君家道未立君已有二兒復何恨太守張岱表上孝武詔特原罪賜帛二十匹齊劉悛字士操彭城人仕齊為刺史父勔戰死悛時有疾扶服求得父尸頂後傷缺悛拔髮補之持喪墓側冬月不衣絮以父死朱雀航終身不由其路明帝崩衛送山陵路經朱雀航感痛至曲阿而卒梁劉覽字孝智彭城人丁所生母憂廬於墓再期不嘗鹽酪食麥粥冬著單布衣家人慮不勝喪中夜竊置炭牀下覽因暖得寐及知之慟嘔血梁武帝聞其有至性數省視之劉苞字孝嘗彭城人四嵗而孤至六七嵗伯父悛繪並顯貴苞見之輒泣其母怒之苞曰早孤不識父聞諸父多與父類故心中悲耳因歔欷母亦悲慟奉其母常為扇席溫枕劉曇淨字元光彭城人祖元直父慧鏡元直為淮南太守得罪慧鏡詣朝乞哀愷惻以孝聞曇淨篤行有父風為安成王左常侍父卒奔喪不食飲者纍日絶而又蘇每哭輒嘔血詔舉孝行用為海寧令讓之兄乃除安西行參軍事母尤淳至身營飱粥不以委人母亡天甚寒身衣單布廬於瘞所晝夜哭臨不絶聲哀感行路未期而卒垣曇深下邳人以行義稱為臨城縣罷歸得錢十萬以買宅奉兄退無私蓄歷羽林監王儉深重其學行隋劉士雋彭城人丁母喪絶而復蘇勺飲不入口者七日負土成墳結廬墓側虎狼馴擾為之取食文帝表其門唐劉審禮彭城人德威子少喪母為祖母所養隋末大亂審禮負祖母渡江轉側避地祖母病必煮藥嘗而進葬父徒跣血流事繼母尤謹再從皆同居合二百口內外無間言後殉吐蕃之難贈工部尚書諡曰僖子易從劉易從父審禮為左衛大將軍儀鳳三年討吐蕃戰敗見執子弟皆詣闕待罪請入賊以贖有詔審禮殉忠以沒非有罪宜各還職特詔易從往省之既至而父殁易從晝夜哭不止吐蕃哀而還其尸官彭城長史永昌中為酷吏周興誣構將刑百姓爭解衣投地曰為長史祈福當時號孝義劉家皇甫恆尹務榮俱彭城人咸數世同居事親居喪著至行天子聞其孝弟旌表其門甄佚徐州人明經教授鄉里稱善人家貧乞貸以葬父母作室墓傍陳后山名之曰思亭而為之記朱全昱碭人全忠兄全忠將受禪全昱曰朱三爾碭山一百姓遭逢天子用汝為四鎮節度使於汝何負而滅唐家三百年社稷吾將見汝赤族矣遂辭歸居碭山故里宋彭程徐州人四世同居詔旌表李柞豐人親喪廬墓凡二十七年金劉全彭城人天興間率鄉人避兵沫溝北兵至盡俘其老幼全父亦在俘中遣信招全全縛其人送徐州因竊父以歸徐帥益都嘉其忠承制以為招信校尉元劉福蕭人孝養有聞居喪苫塊飦粥悉與禮合韋信碭山人每朝夕供親膳必俯伏四拜而後退人問之答曰父母恩終身難報跪拜何勞有司以聞至元間詔旌其門史彥斌下邳人有孝行至正中河溢墳墓多壞彥斌刻識其母棺而後葬明年墓為水所漂失母棺所在乃縛草為人浮水中仰天呼曰願天矜憐假此芻靈指示所在隨草人所之竟得柩改葬杜佑邳州人河南行省署為三義水馬站提領父病於家佑忽心驚舉體沾汗棄職歸父病始三日遂禱神求代嘗糞以驗疾父卒廬墓盡哀有馴兔之瑞胡居仁張允中俱徐州人以居喪廬墓旌匡國政睢寧人為歸德判官母病刲肝以進又病剔腦和藥病即愈母沒廬墓三年有鹿馴遊其旁郡邑上其事表其里曰貞孝吳希曾睢寧人葬父之日大雨希曾跪柩前炷艾燃腕火熾而雨止既葬廬墓被旌郭通徐州人少以孝稱父柩在殯鄰火延及通舍通仰天訴曰柩不能移寧與柩俱焚死伏柩痛哭火須臾息明李英邳州人母劉病甚英嘗糞視藥而愈母亡廬墓三年洪武中旌表張義邳州人洪武初為大冢以瘞境內骸骨暴露者朱環字璇玊徐州人由國子生授靖寧州知州有孝行母殁廬墓上聞旌表權謹字仲常徐州人十嵗喪父哀毁過成人兄度為夀陽丞坐事謫戍謹罄資給其行妹寡則撫其孤成立永樂時薦為光祿署丞仁宗時母終躬負土封樹廬墓三年有泉湧免馴之異事聞召拜文華殿學士以風勵天下尋改通政司參議子倫字民衷永樂丁酉舉於鄉學行修明養親二十年不仕倫子宇亦盡孝倫年九十病卧宇侍湯藥寢不解帶既卒廬墓哀泣母卒亦如之詔旌其門張端字端夫徐州人親喪廬墓以孝行薦授真定太守范寅字敬時徐州人仕河間府同知居喪廬墓王僧兒徐州人母病篤僧兒剖腹取肝入糜食母病尋愈洪武中旌表閻馬兒徐州人洪武中以匠執役京師聞父病篤弗得歸省剖腹取肝焚香籲天祈父病瘳事聞復其役旌其門岑義邳州人事父母朝夕問安必拜跪母盲朝夕餂之目復明父母卒廬墓三年甘露降墓木半月詔旌之王豫字德立徐州人居二親喪哀毁骨立葬遇雷雨號泣籲天雨尋止廬墓三年羣鵲馴集奏旌其門周湘字東之徐州人精易理後學多師之性至孝恱親極滋味母亡侍父寢食十有一年不入私室邵良卿碭山庠生父早卒事母甚謹母病嘗糞以驗劇差及卒廬墓三年王克明沛人景泰初任湖廣沅陵縣巡檢時秦襄毅公紘以御史降為其邑丞秦時意有所不可克明為規教之秦後漕運巡撫每過沛必親祭其墓甄鑑周防李卓王原蔣榮張麟馬士雲黃成龔成黃智卓旺周成俱沛人正統五年各出麥千石賑濟飢民奉敕立坊旌異其家沈彥禮趙翥周彥民俱邳州人正統中嵗大祲各納粟千石以賑飢民奉敕旌奬蘇德邳州人母張寡居患癱疾歷二十年德及妻奉事惟謹不離左右母卒哀毁廬墓三年劉瑛邳州人與妻張氏俱有孝行父母殁前後廬墓六年張文友徐州衛軍金皓國子生張暕郡庠生吳友直路車皆州人五人並以孝行上聞成化中旌表蔡清沛人成化中以孝旌羅鵾字雲漢宿遷人成化丙戌進士授御史以祖及父母迎養道逺乞改南道後為江西僉事一夕夢祖病即遣使持衾具歸祖果屬纊遂用之人稱其孝感葉斌邳州人成化中大疫死者枕藉斌捐地為義阡瘞之南傑蕭人𢎞治時以孝旌唐鸞蕭人親喪廬墓𢎞治年旌表丁友邳州人𢎞治中以孝旌髙大茂邳州人少時母石氏病盲大茂問其故母言産汝時為風所傷大茂日以舌舐之竟得復明母病刲股以進疾遂愈馬尚用徐州人幼孤奉母至孝母沒廬墓朝夕泣奠正德中流賊掠境猶守墓不去鄉鄰強之乃歸楊輔徐州人廬墓被旌周正徐州人家酷貧目不知書以力養親親殁賣身以葬新安義商捐資贖之正必竟役而後去郡守張植為墓碑旌其行張鵬宿遷人祖母與父母沒各廬墓終喪子璣亦有孝行張賔賔弟崙宿遷人自元時始祖張榮至賔同居十四世男女二百餘人衣食必均嫁娶祭祀宴飲喪葬定為約束事聞旌表義門姚通宿遷人父母沒俱廬墓終喪事繼母盡孝孫清睢寧庠生幼孤事母孝正德中母卒時流賊入境清守母柩不去賊義之不入其門鄰里亦賴以不擾有司上其事立石表之岑仲暉髙興葉旺髙宗泰鞏得海俱邳州人正德中以輸粟賑飢旌表有尚義坊孫應奎蕭人力農奉母母病思食甜瓜時四月未實應奎奔號忽從野蔓獲之母食病愈劉礦蕭人甫十嵗父疾對天泣禱人咸異之及長母病礦夜祈北斗願以身代大風卒起燭終不滅母亦尋愈後由太學生任徽府審理蔣仕蕭人父母沒皆廬墓三年不歸冇慶雲見山隅人共指為孝感後膺貢三任教職砥礪清修每曰吾求無沗所生而已嶽鍾靈蕭人父亡念母老不敢逺出廬於堂外設主朝夕哀奠三年不入私室任逮蕭人父殁廬墓日致奠而泣聞者傷之御史毛復親造其廬服闋以選貢授樂亭丞郭全龔謙趙安皆沛人親沒廬墓楊冕沛庠生母沒廬墓三年哀痛勿輟嘉靖中旌表趙清沛貢生父孜年十七嘗割股療親父死母卓貞居四十年教清以篤直剛方清純孝母亡廬墓墓瀕河大水且至清死守弗移俄而水溢弗汩廬傍有隙倉卒不暇塞夜有鼠銜草塞之稿瓜復榮秀聞者歎異陳應詔陳應貞薑上桂侯穎俱沛縣庠生值白蓮寇亂義不茍免力鬬而死上桂父子俱死穎妻女先縊鄉黨尤憐之楊東萊沛人年十四刲股療母疾督學御史令補邑庠生月給米贍其母石璞張奉李三陽梅映春張楫皆沛人親亡廬墓江漢許九官皆沛人割股療親周潭字德隱豐邑諸生父母喪皆廬墓三年張倫碭人以嵗貢生任項城教諭僚友有夫婦偕卒無子遺二女逺弗克歸倫治棺營葬復捐資嫁其二女張思敬徐州人事孀母備極孝養母沒廬墓三年友愛諸兄推誠讓産又嘗施義塜修月河橋凶年掩骼捐槥皆不憚勞費孫榮字世華豐人性孝友家人化之同㸑者五世己丑嵗遇大飢與邑人李楨各出粟千五十石以賑詔旌為義民同時邑人李鑄張祥胡祥孔僅翟成王舜舉李保周興甫侯宗録秦儀各輸小麥千五十石賑飢同被詔旌奬陳邦瑞豐人嘗置義田三百畝贍給宗族差賦皆自辦孫操字雅持豐諸生父燦當嵗飢家有麥三百石盡散給宗族遂貧乏操慷慷好施有父風明季盜起戮力守陴以身殉又有張劍字乂華亦豐學生同殉張縝邳州人萬厯中以孝旌朝世興宿遷人萬厯四年修城助銀千兩事聞賜七品服王知止睢寧人性慷慨剛正兄早世撫孤姪若己出孤又夭事嫂如兄有夫貧欲鬻妻者遂捐粟麥助使完聚里人頌之周宗輔睢寧人其先代歷七世未析居宗輔性友愛掌家務後益置田廬戒子孫世守家法鄉人服其義王基貞字亨甫蕭人精騎射崇禎丙子城被圍基貞同兄弟分守南隅敵踰城上輒刃之次日風霾作城潰西北猶率衆巷戰衆寡不敵遇害任如龍字霖蒼蕭人剛介自守丙子城陷將刃其父母如龍奮身捍衛呼曰寧殺我無害我八旬父母兵士竟害如龍舍其父母督學倪以其事聞賜坊旌表併祀鄉賢時諸生與難者五十一人郝惟聰字翼明蕭人流寇破蕭城負母匿於學東廡賊搜獲之乞以身代母賊憐其孝舍之去遇他賊又被執挾至清水河度不能脫投水死焉張鳳世沛人居夏鎮膂力過人流賊之亂結寨護其居民賊至與鬬所擊殺頗多終以無援為賊所殺張垣崇徐州人明季武舉居鄉謹厚好施嘗出家財賑飢置義田贍族保舉授歸德府通判明亡以身殉孫枝芮字季長豐人事母孝當壬午城陷四兄皆遇害守母不去及被縛大慟曰殺我誰養吾母賊憐而釋之既得脫盡撫諸兄遺孤國朝李從任徐州諸生讓産長兄以教授自給復為兄婚其二子其弟夫婦死於盜覓尸合葬成禮撫其女嫁之明末羣盜劫入神廟中僧識之語盜姓名呼為義士得釋瀕行見所掠婦女十百聚他室好語盜曰此皆良家女吾罄家資可得三百金向汝贖之可乎盜曰可歸挾金去如言盡散遣之有江右友人家熸於火不能自存從任迎其眷屬至徐經紀其生業子藻孫宗靖並有至行程一順徐州人性尚義好施豫嵗飢捐資設粥偕妻孟氏親視炊㸑監司府州咸表其門徐文魁徐州人以任恤著稱值郡飢疫捐資施粥藥棉衣存活萬計其死亡者施棺埋骨善事尤多巡撫題請旌表郭如徐州人父母死於流寇如年八嵗依姻戚以長刻木主朝夕奉事言及父母輒悲號遇嵗時流涕終日至九十不改年近百嵗終朱鑲蕭諸生家貧博學事父母以孝聞明末遭寇亂冒死救親避難彭城夜讀書晝樵汲以供薪水父母病專治醫遂精其道每煎藥必親嘗焚香露禱親疾遂愈順治十五年旌表楊枝榮徐州人幼失父即哀毁如成人母欲殉父死枝榮泣涕防護家酷貧減衣食以養母母終哀毁骨立典鬻以葬順治十七年旌表同翹睢寧人順治十年膠寇陷城衆各驚避翹祖母邱氏年八十餘翹與妻張氏扶掖而行賊突至將殺邱翹夫婦環抱以身捍刃賊怒殺邱并及翹張氏亦投井死張賁徐州庠生事孀母孝聞於鄉順治十七年旌表李三禮徐州人七嵗親不豫叩天稽首至愈乃止長以例授廣東經歷不赴親強之行謬以他故返父病呼天求代既不起廬墓側淚漬土皆濕竟死於墓所張瞻徐州人武舉官至都督同知會推總兵樂善好施捐金倡建學宫造荆山口長橋數里以便行旅張之麟徐州人武舉官至威寧鎮總兵徐東鄉數罹河患麟出麥數千石濬溝泄水又疏房亭河倡築花山口河堤汙田遂成沃壤徐邳之人植碑銘德谷應麟徐州人年十一喪父家貧學剃髮養後母四十餘年不懈婦死母年八十仍躬執㸑母殁無以殮鬻身鄰家鄰家感歎折券與歸因廬於墓側日培土三肩雖甚雨雪不輟數年墳髙大若陵有司上其事與旌典又李本延孝與應麟相類韓永廕徐州人立義孰於暑蘭山村延師教其子弟嵗於冬春之交煮粥濟飢人三月製棺貯古廟中聽喪者自取割田十五畝為義冢築橋城西南路以便行人上官旌曰善人章得簡字簡臣蕭人早失恃事繼母以孝聞遇族黨不能婚嫁殯葬咸資助之在都門鄉人資斧告匱即解槖以贈以嵗貢任宿遷教諭修學數百金悉出己囊又蠲資設粥賑飢躬往監視蒞任五載卒於官祀名宦周士珠字味元沛人育德子為諸生性髙潔不履市井遇鄉子弟必極恭謹與言皆孝弟忠信鄰里雀鼠嘗造廬求平士珠輒為解婚喪不能舉者質典周恤晚年寄情詩詞有南村漫詠王嘉重沛監生家不甚富而行力任恤壬寅春山東飢人流寓境內者凡數百家無以自存與兄嘉訓出粟計口賑之未幾粟盡來者益衆至萬餘人乃鬻其田宅買粟以給計日費四百餘金未幾金又盡而流者尚不能歸其弟嘉猷復傾家繼之比飢人去兄弟遂大窘乏卒無悔也史應甲豐諸生樂善好施每具藥餌棺木粥糜衣被以濟貧窮無告者有姊貧寡不能自給應甲迎養於家婚其子女有從兄弟分産未均應甲出地助而和之太倉州宋王子昭嘉定人篤學好禮嘉定間始創學宫首捐己田以贍學者士嘉其義李重發崇明人性至孝母死廬墓注孝經行世元陳真孫崇明人延祐六年謁選京師舟次東昌聞新店河溢溺三四百家真孫傾囊買舟救援仍市米作糜以食之全活二千餘人秦玊字德卿太倉人少孤母顧力織紝給朝夕玊刻志苦學博通諸經與兄終身不異財母病纍旬不解帶及卒泣血茹淡者終其喪俄鄰失火母殯在堂玊慿棺號慟火遽滅陳寶生字彥亷太倉人父溺海死母莊撫育成名與黃公望善以父溺終身不至海上公望嵗一詣必至海觀濤邀寶生往則泣曰陽侯吾父讐恨不能如精衛填木石何忍對之公望因作仇海賦紀其事明陸安太倉人洪武初父德甫以所館客事連坐當棄市安求代父刑伏闕哀請許之臨刑從容就刃觀者泣下同時陳元吉亦代父受刑薛鉉字彥文崇明人鯁直好義永樂二年水嚙墟岸民不能築鉉傾廪濟之人皆賴焉俞敬太倉人常刳肝愈母疾永樂間詔旌其門沈輔字良弼嘉定人性至孝常他出忽心悸曰得無二親不安乎遽馳歸則母已癰潰不治矣哭踊絶粒者三日父病末疾輔與妻翟氏朝夕稽顙籲天願減已算以益父夀久之額成窪父殁廬墓終身𢎞治七年旌門雙孝沈珵字君玊嘉定人母病目珵以舌舐之三年復明父有膂疾傴僂不能起立珵日夜扶侍聞有李神針者能起錮疾邀致之李欲為灼艾珵先以身試痛甚恐父不勝固請勿灸是夜父夢神語曰感孝子意為汝針之針下驚汗而愈𢎞治九年旌門瞿通甫太倉人兄弟五世同居知州李端奏旌其門施美玊字邦珍崇明人以歲貢為膠州判官親喪廬墓惟展孝經不尚浮屠法有二友以財構隙密為代償兩不使知又貧民有鬻男還逋者令贖男歸不責其直素慕靖節自號半陶王瑄太倉人母卒結廬墓側風雨不移晝有故出夕還必跪墓前曰瑄來矣慈烏時集其廬人以為孝感所致王在復太倉人嘉靖甲寅倭亂掖父逃途次相失在復既免復返尋父見父被執即趨叩乞命倭持刀殺父在復以身蔽之父子首並墮手猶抱不可解徐一元嘉定人交河縣主簿與嚴文靖訥善時江南被倭歲復大祲計惟免漕可以濟之乃代訥草一疏焚香祝天會奏上竟得俞旨東南之民賴再生焉孫應聘以進士仕至太僕少卿亦以篤厚世其家傅遜字元凱嘉定歲貢以節義自負善論古今成敗師事崑山歸有光倭寇崑山請縋城出詣軍府告急得兵以解圍人皆壯其義所著有春秋左傳屬事本末沈志仁字景範太倉人父尚友為松潘總兵播酋亂坐逗留逮獄論斬志仁跣足隨行號泣長安街遇冠蓋輒叩頭訴會秋盡且論報志仁詣廷尉乞上父寃狀廷尉辭乃叩閽自拜疏時帝尚恭已上書多不報志仁疏上二日忽有旨釋尚友志仁奉之以歸沈兆字祥卿嘉定人母病割股嘗糞及亡哀痛不能起在南雍時甥龔錫爵方五歲遭家變僕李嵩負至兆所兆撫之如子及成立乃出其十五年餘租與親友所贈一箱并付之李嵩嘉定龔錫爵乳媪之夫也錫爵僅五歲而父為家奴所賊有欲殺兒分其産者嵩夜負以逃走雪中五日依兒外家沈氏朝夕護之後錫爵成進士官至方伯而嵩短衣力作如窮時嵩死無子錫爵命子孫世世祀之王世芳字尚義太倉人嘗訪舊小直沽時慈溪費廷槐病滯旅舍世芳一見異之移至寓中調護甚謹明年同舟南下病又發便溺狼籍世芳躬為滌除行次吕城費卒世芳稱貸營棺衾斂之且遣人告其父父至舉其柩弗前遲明世芳絮酒來哭柩即舉旁觀莫不歎息丘集字子成嘉定人家貧讀書長於三禮之學當倭亂與寡姊共埋金於地集為倭獲被脅出已所埋與之姊物無恙兄子坐逋賦當戍集罄資竭力營救得免嚴銑嘉定人父為堂邑令因𣙜賦勘田秉公不徇情為里豪所中以非法死銑尚少自刻其胸作必報父仇四字纍歲訟寃於官不得伸遂自經殷都為作孝子傳錢春沂字仲與嘉定人為諸生時父被寃繫沂慷慨陳情出父於死獄中後以舉人任德化令匱吏以羡餘進沂曰此百姓膏血也却不受尋乞歸優遊詩酒者二十年乃卒殷子義字集卿嘉定人其學根極理要授經里中垂四十年以遺産讓其異母弟而修脯所入復分給之為淮安訓導貧不能治裝門人各奉金為贐三年罷歸病亟猶計所受封識以屬其家俟來弔則還之其嚴於取豫如此徐任字惟用太倉人嘗割股療母疾得愈侯萬鍾嘉定舉人父病篤萬鍾籲天求代時六月上旬忽有橘自空而墜鮮潤如新父食之病遂愈人皆異焉陸相字思誠崇明人父以事致獄相冒死白寃代笞幾斃母疽發割肉補患處立愈與弟臣共㸑七十餘載有義門之風李繩之字受伯嘉定人父殁廬墓三年先是父給諌先芳已入鄉賢祠後見從祀日濫嘆曰吾父豈與若輩伍抱主而出平生剛直方嚴義形於色東林諸正人皆推之蘇時麟字泰醇嘉定人嘗以千金之産悉讓二季有故人盜其室中物後復至子弟弗禮之切誡曰彼為貧故何得傷親誼也明季徭役甚重不令其子赴公門曰秀才一入公門則氣卑而顔厚矣張錫眉嘉定人明季鄉薦嘗却旅館奔婦歲凶瘞道殣千人故人葉生無子為葬其兩世國變自經妾何抱女沈水死張鳳儀字恆拙嘉定人父母繼喪朝夕哭遂致失明夢神療之立愈有鄰人逺遊寄金二十兩後遇凶歲鳳儀飢且死囑其妻曰吾若先汝死當埋金土中以俟其歸勿動分毫也父殁後事兄如父年踰六十每事稟命兄亡慟哭一月而卒國朝吕雲竒字石英太倉州人鼎革時偕父匿叢棘中避兵父已被執雲竒即躍出抱持其兵乞免皆被殺死猶兩手抱父項不釋斂時妻龔氏截指置棺中以自矢事定知州白登明旌其閭江德璜字獻之太倉人母目瞽日以舌舐冀其復明母病痢中裙厠牏躬自浣滌乙酉七月德璜避亂遇兵其子抱父求免遂同被害時稱兩孝子侯汸字記原岐曾子也九嵗聞祖父論紅丸事輒曰楊漣既與方從哲同被召當進丸時何不面爭顧從衆出乎聞者皆異之嘉定折漕已久明季有暫輸五萬石之令汸以諸生詣闕上疏得免會洞曾以不屈死有司名捕其子瀞汸慮世父無後乃遍書瀞姓名於衣襟投水代之以救得不死封昞字韜若嘉定人幼喪母業醫竭力以供甘旨父忘其貧順治十七年旌表倪珩嘉定人年十四母目失明舌舐半載而愈順治二年父為亂兵所執珩乞釋不允延頸求代兵感其孝遂得俱釋雍正元年旌表周士晉字康侯嘉定人母久病傾家療之資盡未愈醫言惟得人乳可再生士晉謀諸婦李氏即棄其九月兒以乳乳姑三月而母霍然起越十二年有僧為殷氏子推命怪其年月與周氏兒同詰之則得諸道傍者也由是兩家通往來未幾殷氏家落令之歸宗父子復合徐枋為作全孝傳沈印璵字仲玊崇明人順治間崇為海寇張名振所困助餉五千兩事聞旌額王揆字端士太倉人時敏子性至孝事父不離左右成進士後即歸侍養終身劉家河為崑太嘉三邑水利所關淤久成陸揆上書藩撫疏浚建閘民皆賴之所著有芝廛集郁聖揆字紹虞太倉人父患目舌舐而愈母殁廬墓三年巡撫湯斌奏旌其閭曰純孝性成錢陛字臣扆太倉人嘗置義田三百畝以贍宗族又為廣孝阡以待親族之貧不能葬者康熙十八九年邑大飢陛傾資煮粥賑之民賴以全黃安邦字先諴崇明人康熙三十五年潮災設厰賑粥并建丁家橋三江口橋以便行人雍正元年奉旨準授八品冠帶黃信中鎮洋人六歲時晨昏定省儼若成人里中稱小黃孝子父病溺閉危甚信中焚香禱天夜若聞人語曰吮之則利矣信中即吮之果通吮半載而愈父殁廬墓三年雍正八年建坊旌表唐亮采嘉定人雍正十一年旌表海州元王士寧贛榆人事父盡孝貧不自給而甘旨不缺至順間旌表其門明劉煥贛榆人與弟炯皆孝謹父母卒兄弟俱廬墓三年友愛甚篤縣令表其門名所居曰孝義莊葛貞沭陽人輸資助官賑濟正統時旌支儉沭陽人父母殁廬墓終喪成化中旌表徐謐海州人官府軍右衛經歷父母殁廬墓終喪有白鹿之瑞𢎞治中旌表吳玒沭陽人少孤母病嘗糞疾愈母卒廬墓終喪沈麒沭陽人正德中流賊犯淮郡麒守母病不去郡守被執麒趨入賊壘諭以禍福賊義而歸之劉守良字君遂贛榆人正德辛巳進士歷工部郎性峭直孝友為諸生時母病思鮮菌不可得守良叩天悲號竟夕據木樁倦而假寐既覺有菌生於木為羹以進母病遂愈管名贛榆人平生不入城市事親至孝父母沒廬墓六年負土成墳手植松樹萬餘株劉梓贛榆人父母亡廬墓四載歲飢剖木皮自給不離墓舍人咸稱其孝閻大祥字應和贛榆人嘉靖乙酉舉人端方嚴毅為諸生試金陵同舍生死大祥傾囊以斂歸櫬於其家通判嘉興以亷惠著通州宋嚴希孟如臯人母病瘧希孟割股肉和糜以進遂瘳居憂三年未嘗與人言笑史聲如臯人元祐進士家貧母先卒躬樵採以養父及受官迎養中途父殁扶柩還葬結廬墓左負土培壟遇弔者不交言惟搏顙告哀而已丁天錫如臯人父早卒事母至謹一日盜入脅其母索財無所得欲殺母天鍚以身衛曰寧殺我寇亦慚母子俱得免顧欣泰興人母病不茹葷者十載早起率妻子詣母室問所欲五十年如一日母老目不能睹物欣日夜籲天母目復明元蔡夢祥泰興人事母至孝四世同居明天啓旌其門明王鳳通州人割股啖母疾遂愈劉勳通州人祖疾勳割股為粥療之踰歲祖卒勳每哭絶而復蘇居喪三年不茹葷不入寢室張字元素泰興人幼從父城宦京師長歸娶至揚夢父病驚悸不食亟返舟至則父已卒扶櫬還途遇盜見其哀毁骨立不忍犯而去母棺在殯鄰家失火伏棺痛哭願與俱焚火遽息歲飢傾槖以賑鄰人穴墻盜榖覺之令滿負而去竟不言其人事聞旌表姚山如臯人父病革山十二歲割股白承宗字厚之通州人八歲喪母哀號不食父病瞽三十年嘗以舌舐其目父八十時承宗置酒上夀親目忽開親殁廬墓許蓁泰興人家貧年十六母黃氏病且殆兄將鬻蓁治棺殮母不忍蓁告天割右乳下肉以進母遂愈薑岱字南村如臯人慷直能任事嘉靖二十九年以興化糧重如臯糧輕欲攤均之岱與好義者十人取臯土與興化土各負一囊走控巡方御史請稱量之曰土瘠則輕土肥則重相土輕重定賦多寡法創自太祖奈何一旦易之况今日興化糧重可加如臯設他邑賦重獨不可加興化乎事乃中寢夏暘字國輝通州石工目不知書而志行純篤每日旰必設酒醪引諸孫戲親側親或拂意即與妻朱氏跪謝候改容乃退母卒父年老獨處晹不逺出夜不入私室寢輒抱父足冬月則溫其溺器於懷如是十餘年年九十四卒虔奉二親神主事必啓而後行遇疾風暴雨便行視墓所攀樹泫然當父在日暘之子嘗以小忿為其弟毆至斃暘惡傷父志但含涕不言御史劉存德按部聞暘名召見歎嗟自以宦遊違養久執暘手對之流涕命製衣一襲親衣之其卒也督學御史黃𢎞毗下州為立祠表焉殷國冪通州人桂陽判尚聲之子以父命往武昌途中聞桂陽兵變急返則城陷而父已遇害國冪治喪事已將歸覲母告慰於父之靈痛哭而殞州人憐而葬之表曰殷孝子墓國朝冒襄字辟疆如臯縣人為諸生有聲父起宗官荆樊時流寇充斥襄往省覲奉母以歸不入內寢或問之襄曰父在殘疆而子安枕席乎泣血上書政府得調寶慶襄友愛諸弟一日忽有人入户將剚刃於襄襄子丹書以身蔽被重創聞於官辭連其弟襄痛哭直弟無是事太守因並寬刺者鬻産賑飢日行道殣中染病死三日復蘇著朴巢水繪集以隱逸薦以博學宏辭薦皆不就李我彭通州人乙酉四月郡城破負病母逃至氷側兵及之母驚殞彭伏水草中俟兵過負母尸走數里掩埋畢再拜一慟而絶范育如臯人偕諸昆季置田七百餘畝以歲入給族之貧困者康熙戊申年倡買田十七頃為育嬰永逺之費施棺前後共千餘徐𢎞成字自西通州貢生友愛前母兄撫孤姪如己子母亡慟絶十有三日亦殁雍正七年旌表陳維坤字一寧通州人母病篤坤破指血書表禱東嶽廟求以身代踰年自城買藥至家仰天語曰帝準召我母可延夀矣言畢而死母病果愈聘周氏未娶欲歸陳守喪未果已而聞有行媒遂自縊李黃字友芝通州庠生昆弟五人其幼庶出父命析産為五簿黃減其一父疑其屏庶弟也怒之黃跪請曰兒頗能自給願以均分諸弟父大悅後弟姪家俱落黃為經紀其婚嫁里中義事倡而行之孫莊通州人許石陛如臯人俱割股療親朱國靖新安人家於泰興厚朴好施順治辛卯壬辰歲再飢皆出資賑濟每歲暮資寒士以膏火又捐金甃橋梁埋胔骼新梵宇為善孳孳不倦江南通志卷一百五十九欽定四庫全書
