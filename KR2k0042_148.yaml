body:
  text: 江南通志卷一百四十九人物志宦績十一太廬鳳三府太平府唐陶大舉當塗人官宣州刺史以破徐敬業功封丹陽侯轉懷州有德政鄉人立石頌之宋郭維字仲逸當塗人大中祥符八年舉進士調泰州司理參軍治獄有能名歷知南豐新都部使者交薦除雅州案貴戚王䝉正侵占民田事執法無貸移知常州民健於訟維鈎索善訟者十餘人流之宿姦畏避擢淮南提刑所部墨吏望風解去遷度支郎中卒弟經舉進士知永泰縣時司馬光知諫院有謹以立身敏以從政之薦羅彥輔字經世當塗人嘉祐四年進士調南城尉移江都令用薦除著作佐郎知湖口縣僚吏有告彥輔私受酒息於郡者守劉述即以付吏或疑事小宜置之述曰羅湖口廉吏也不窮究其實終身被誣矣果得其誣反坐之歷知池州池居沮洳城善頽彥輔固石為隄永絶水患移睦州卒鄉人欽其清德以姑溪水比之石禹勤字力臣蕪湖人舉進士令靖安伐妖木祛淫祀郡守薦其能除通判辰州時章惇經畫南北人皆言南江蠻易勦禹勤獨請招徠北江皆相率聽命遷知建州轉運使奏禹勤鹽課捕盜為一路最移撫州卒黃庭堅表其墓李柳字與幾當塗人宣和進士監察御史忤秦檜出知信州平貴溪妖賊檜抑其功鐫職歸州民畫像祀之尋以郊恩復官知睦州卒元李叙字彥倫當塗人以薦授江寧教諭調建康書院山長節省浮費及去有羡粟千石書冊授代無私焉遷平江學政學嵗租萬石上官委敘主出納尤以清謹聞子習翼明陶安字主敬當塗人領元至正四年鄉薦為明道書院山長太祖渡江至太平安迎謁因說曰四海鼎沸豪傑蜂起皆志在子女玉帛未有撥亂救民者明公神武不殺應天順人天下不足定也帝善之遂參幕府從克建康命知黃州寬賦省役移知饒州平閩寇錫金帛洪武初置翰林院首召安為學士制度禮文多所考定又命為議律官律成拜江西行省參政卒於官追封姑孰郡公陶本字培之當塗人安族弟少師事安以博洽聞郡辟校官不就學經明行修帝御闕樓試以治平䇿本援筆數千言皆切當稱㫖擢工部主事才敏守潔克舉其職喻仲衡字平甫當塗人洪武中以賢良薦授台州知府值旱荒農乏穀種仲衡散官廩分給期以秋償民感其德如約輸納無敢後者為一時循良最時大拓都城役未竣令諸臣連磚助工以清慎免者數人仲衡與焉詹俊字用章當塗人洪武四年徵授磁州同知時兵革初定民未復業俊勞來安輯之勸耕桑興學校舉賢能祛奸弊州以大治遷汝寧通判劉允字子允當塗人洪武辛亥進士授懷慶通判以伉直謫瑞安縣丞多善政擢北平按察司副使允有吏幹尤侃侃善議論每召對多稱㫖梁觀字大用當塗人洪武中貢入太學擢吏科給事中遷四川按察司僉事調廣東分巡潮州廉介剛果決獄如神卒於官潮人祀之韓山書院屢示靈異有禱輒應杜智字仲才蕪湖人洪武中以太學生授隨州守有治聲坐逋稅當謫戌廷臣疏其廉特擢北平守永樂間纍官南副都御史又同邑湯貞洪武中由太學生令曲江以清介聞永樂初改令寧海皆有政績胡湜字景濂蕪湖人洪武中由太學生授吏科給事中亷直敢言永樂初歷廣東僉事值中璫監市舶多不法湜密奏逮治璫懼自殺後皆斂戢無敢驕恣嚴升字仲升繁昌人建文庚辰進士由青神令纍遷江西僉事以亷幹著歷副都御史振肅風紀進禮部尚書未任卒又同邑周原由進士歷磁州同知亦有廉明之頌汪俊民繁昌人建文庚辰進士授御史永樂初出按廣東撫黎人之叛遷刑科給事中有聲諫垣李衡字秉鈞當塗人永樂甲申進士遷庶吉士改户部員外郎以亷慎為尚書夏原吉所倚任遷湖廣參政撫綏有方蠻獠帖服以原吉薦擢兵部侍郎衡品粹才優長於治劇所著有淡軒集彭禮字時序當塗人永樂甲申進士選庶吉士改户部員外郎吏才敏練鋭於任事在部十餘年每堂官缺帝輒命禮攝之財賦出納悉有條貫郭智字懋明蕪湖人永樂辛丑進士宣德中官御史聲望甚偉輔臣楊士奇等交薦之以僉都御史整飭寧夏邉務軍肅民安進督兩廣威德益著謝孚字以誠當塗人永樂丙戌進士授御史歷福建陜西副使所蒞有聲中貴奉使過陜官吏多望塵伏謁孚獨長揖不屈後致仕歸子騫舉進士以御史出按兩浙鹽課置勢家子弟私販者於法終山東參政徐觀字大賔當塗人永樂乙未會試副榜歷刑科給事中糾劾無所避正統初轉雲南按察司僉事雪理寃獄舉廉斥貪以預平麓川功進副使又相度險要築堡濬池墾荒興屯邉患永息吳琛字輿璧繁昌人景泰辛未進士授御史犒軍甘鎮巡按四川皆著風采天順初以劾石亨驕恣謫外尋復職纍擢僉都御史歷撫甘肅粵楚進督兩廣聲績尤盛琛頻蒞重鎮歿無餘資人服其守黃讓字用遜蕪湖人景泰甲戌進士官御史抗疏請釋直臣鍾同章綸於獄又論大內營繕不息財力耗竭諸事謫營山典史歷中府都事與幸臣錦衣門達忤為所陷譴戌廣西達敗復官楊璧字應奎當塗人景泰甲戌進士擢户科給事中侃直有氣節天順改元以建言謫外適有天變特詔復官後守平凉鑿延安河溉田七千餘頃同邑鍾城璧同榜進士歷督福建江西學政凡所甄拔悉成令器戴旭字敬熙蕪湖人天順中由太學生任武岡州同知境內猺獞雜處兼有藩邸軍衛素號難治旭以亷敏著能聲移署靖州歷許州卒藉同官賻始克成殮李蕙字德馨當塗人成化己丑進士授刑科給事中歷江西參政南贑盜起蕙廣設方略擒其渠魁餘黨悉平南昌大水入城蕙恐官廩有失預給軍士月糧令竭力運負廩米立空人服其機敏纍擢右都御史總督糧儲頻有建白漕規振肅夏祚字天錫當塗人成化戊戌進士擢兵科給事中疏劾大臣之侵科臣權者歷江西布政丁艱解任襆被就道同官遣役賫羡金追送祚撻役返金服闋補閩藩時巡方以墨聞面數之旋乞致仕閉門靜守并日而食歿後遺一金帶乃銅為之汪宗器字鼎夫繁昌人成化甲辰進士授行人擢御史條奏多剴切出按楚粵薦賢斥貪大著風裁遷南大理寺丞進少卿善決疑獄以劉瑾撓法乞終養歸兄宗理舉進士官御史亦著直聲李贊字惟誠蕪湖人成化甲辰進士授吏部主事轉員外以才守為冢宰王恕所任改兵部郎復為尚書馬文升所薦纍官浙江布政以事忤劉瑾勒令致仕李貢字惟正贊之弟與兄同舉進士授户部主事歷刑部郎讞獄明慎纍擢右都御史巡撫遼東總兵毛倫怙劉瑾勢恣橫貢以法裁抑之忤瑾罷歸瑾誅起撫順天增修通州城費巨而民不擾又築古北口邉垣以扼寇衝遷兵部侍郎胡爟字仲光蕪湖人𢎞治癸丑進士選庶吉士改户部主事嘗應詔陳言劾中官李廣楊鵬及戚畹方士傳奏冗員之害詞意剴切直聲振一時會廣死故爟得無罪九嵗即能詩長益博涉經史文筆雄偉有蒲塘集祝鑾字鳴和當塗人正德戊辰進士授禮部主事歷郎中同翰林舒芬等諫止南巡廷杖奪俸終福建參政喻智字子貞當塗人正德甲戌進士由部曹歷副都御史巡撫南贑即王守仁舊治地介閩廣大盜餘孽踞箐穴結蠻獠時出為患智開誠布信受撫者以萬計乞歸後有柄臣僕過邑橫肆智執而杖之其嚴毅如此端廷赦字世恩當塗人宏之孫正德庚辰進士令髙安以最擢御史劾武定侯郭勛驕橫巡茶馬按兩浙風采益著纍官南右都御史掌院事因近鄉里嘗有欲干謁之者復憚其剛正而止楊東字啓明當塗人嘉靖癸未進士授行人擢御史初巡視廄牧及清查龍驤三衛盡釐侵冒宿弊巡鹽河東清豪占鹺池逋課悉完繼按雲南多雪疑獄滇中頌如神又土官爭襲仇殺巡撫議發兵進𠞰東傳檄諭之止罪首惡事遂定倪嵩字中卿當塗人嘉靖己丑進士授太常博士釐奉常典禮輯總覽一書擢御史出按貴州裁正土官之挾微功求進秩者先是黔省鄉試附滇路險且逺嵩疏其事因特設黔闈試士士多便之遷大理寺丞又釐律令輯問刑條例一書遷户部侍郎以忤輔臣嚴嵩出為南右都御史尋乞休族孫一驥嵗貢生學行深粹士林推重徐貢元字孔賜繁昌人嘉靖辛丑進士自刑部郎出為德安守多異政纍遷南户部侍郎總督糧儲歷官十三任清白無疵時海內有四君子之號貢元其一也所著有省身日記周易字時伯蕪湖人嘉靖癸丑進士授兵部武選主事汰軍職冒濫二十餘人改御史救言官論邉務詞皆抗直督北畿學政輔臣以私書至易不閲而焚之歷參議致仕孫濟逺字合溪當塗人嘉靖乙丑進士授饒州推官讞決如神擢御史出按黔蜀治尚威嚴不避勢要梅淳字凝初當塗人隆慶辛未進士授縉雲令以政最入為御史巡按浙廣多所糾彈因忤輔臣出守嶽州遷濟寧道河決韓莊渠淳疏築有功擢雲南布政清理宿弊羡金悉歸公帑時開珠池商人例獻樣珠峻却之著有一鶴文集陳一簡字上敬繁昌人萬厯癸未進士授户部主事歷郎中擢昌平僉事橫嶺有九陵奸辨妄議開採一簡力爭以橫嶺內近陵寢外薄敵營此役一興恐傷陵脉啓邉釁事乃止又正內璫在昌平非法殺人罪遷副使卒吳一驥字純所蕪湖人萬厯甲午舉人授耒陽令邑産錫苦供億特白撫按罷之遷湖州同知湖多盜皆倚勢家為窟穴一驥窮治伏法盜遂絶迹歷户部郎又同縣俞審由舉人知澧州澧多水患審堤捍禦名文梁堤州人永賴崔淐字震水蕪湖人萬厯辛丑進士授行人遷銓曹兩掌選政謝絶請屬人多服其清介楊成喬字惟嶽當塗人萬厯辛丑進士授新興令敏於聽斷又知民素困郵傳之擾特取公帑給驛費擢户部主事轉職方郎籌畫邉務悉中機宜尋告歸卒子芝瑞懷宗時由舉人令慶元據險設守擊敗賊兵遷武定知州葛綱字振寰蕪湖人萬厯壬子舉人天啓末官國子監丞時魏忠賢竊柄黨附者倡議立祠并配享太學綱白祭酒力沮之忠賢敗綱遷刑部主事曹履吉字根遂當塗人萬厯丙辰進士授户部主事督新泰海運二倉釐剔積弊盡取羡米儲為公用厯郎中出督河南學政兼綰諸篆河堤潰決捍築有功內擢光祿卿張時暘字乂若建陽衛人萬厯丙辰進士授嵊縣令以捕治豪猾著能聲調臨海鄰縣兵譁往諭立解擢禮部主事厯山東武德道僉事武德為齊魯之交水陸輻輳地衝且瘠時暘拊以寬大境內輯寧沈希韶字鳯來蕪湖人天啓壬戌進士授新昌令有能聲入為御史出按上江先是沿江繁征蕪湖為甚希韶巡視悉革其弊里人建坊頌德後例轉僉事未赴卒國朝楊世學字爾合芝瑞子舉順治丁亥進士由評事擢御史有請嚴採買杜騷擾諸疏部覆允行又請濬淮河下流海口引水入海河患自息時論韙之出為武昌分守道招撫山賊鄭鴻等十三寨歷衡永參政所蒞皆以清操聞方錫字禹符繁昌人順治戊子副榜令清流亷潔自砥纎芥無染遷沂州守未赴卒邑署所存惟敝衣一笥圖書數卷徐鼐臣字調明當塗人順治己丑進士授酃縣令地介豫閩素為盜藪鼐臣始至披荆棘招流亡户口稍增方籌兵料餉為𠞰賊計遽以勞瘁卒官邑人悲之韋一鶴字羽仙蕪湖人順治壬辰進士授麗水令邑多崇岡伏莽一鶴戢盜拊民四境安堵政績大著汪可準字懸標蕪湖人父廷幹以篤行稱鄉里可準舉順治壬辰進士授永州推官蒞事明鋭案無寃滯入為中書舍人卒韋嗣賢蕪湖人順治乙未進士授撫州推官剖決精敏內擢吏部稽勳主事厯考功郎中清介有守居鄉尤以仁厚得時譽丁宗閔字再騫當塗人康熙己未進士授祿豐令邑遭滇逆之變地荒民散宗閔買牛種招流移民皆樂業又創義學課士自是科第相繼攝祿勸州事單騎諭降土酋之抗令者以卓異徵值憂歸卒廬州府漢周榮字平孫舒人舉明經辟司徒袁安府凡安舉奏竇景與竇憲爭立北單于事皆榮具草竇氏客徐齮深惡之脅榮曰子為袁公腹心之謀排竇氏竇刺客滿城中謹備之榮曰江淮孤生䝉恩待備宰士縱為竇所害誠所甘心及竇敗榮由此顯名自郾令擢為尚書令歷官潁川山陽太守皆見稱紀以老病乞身卒於家詔特賜錢二十萬周景字仲饗舒人任河內太守好賢愛士其拔才薦善常恐不及徵入為將作大匠纍遷司空時宦官任人及子弟充塞列位景初視事與太尉楊秉秦諸奸猾自將軍牧守以下免者五十餘人遂連及中常侍侯覽貝瑗皆坐黜朝廷莫不稱之建寧元年薨追封安陽鄉侯子崇嗣至甘陵相中子忠纍遷大司農後代皇甫嵩為太尉録尚書事忠子暉為洛陽令三國吳周瑜字公瑾廬江舒人父異為洛陽令景從子瑜長壯有姿貌孫堅徙家於舒堅子䇿與瑜相友善瑜推道南大宅以舍䇿升堂拜母後將兵從䇿屢立戰功為中護軍鎮巴丘權統衆瑜與張昭共掌衆事權討江夏瑜為前部大督曹操入荆州瑜率程普等逆操於赤壁縱火燒擊大敗操軍拜偏將軍領南郡太守詣京見權謀進取蜀還江陵卒於巴丘權素服舉哀感動左右子循尚公主拜騎都尉有瑜風早卒循弟印拜興業都尉隋樊子蓋字華宗廬江人仕齊封富陽縣侯隋髙祖受禪以功改封上蔡縣伯煬帝時歷官武威太守以善政聞大業九年車駕幸遼東命子蓋為東都留守楊𤣥感叛逆盡鋭攻城子蓋設備禦屢摧破之帝曰昔髙祖留蕭何於關西光武委寇恂以河內公其人也進位光祿大夫封建安侯卒諡景㑹葬者萬餘人武威民吏聞之莫不嗟痛立碑頌德陳稜字長威廬江襄安人大業中拜虎賁郎將擊琉球大破之虜男女數千而歸煬帝幸江都命統宿衛兵擊賊淮上往往克捷遷右禦衛將軍唐羅珦廬州人為本州刺史捐俸給藥濟貧修學勸士三年政化大洽有芝草白雀之瑞遷京兆尹封襄陽縣男子讓官至江西觀察使宋馬亮字叔明合肥人舉進士通判常州吏民有因緣亡失官錢逮者數百人亮與期悉縱去不逾月盡輸所負糾察福建路刑獄活寃者數十人知饒州誅豪民白氏真宗即位以侍御史上書言軍賞宜速給赦書蠲除逋負宜敕有司毋更趣責帝善其言為四川轉運副使賊王均既平而主將邀功誅殺不己亮言於帝悉宥之時諸鹽井久涸負課逮繫者州數百人亮盡釋之而奏廢其井又除屬部舊逋官物二百餘萬還知潭州移升廣䖍洪杭諸州入為御史中丞請禁士民父祖未葬毋得析居後以太子少保致仕卒諡忠肅馬仲甫字子山亮子舉進士知登封縣鑿轘轅道險厄為坦途為發運使鑿洪澤渠六十里以避長淮之險知瀛州築甘谷堡以通北抵南谷之路鍾離瑾字公瑜合肥人舉進士知德化縣將嫁女市婢得前令女遂與己女同嫁判益州建言州郡既上雨後雖凶旱多隱之以成前奏請令監司劾其不實者歷江淮制置發運使置閘召伯埭旁人以為利纍遷龍圖閣待制權知開封府卒茹孝標舒城人天聖中進士少負氣節好學不倦吏治有聲仕至都官員外郎出知江州楊察字隱甫合肥人景祐元年進士歷江南東路轉運使在部專以舉官為務曰此按察職也茍掎拾羡餘則俗吏之能何必我哉以右諫議大夫擢御史中丞御史何剡論事不實中書問狀察言御史故事許風聞今以疑似被詰問非所以廣言路也卒贈禮部尚書諡宣懿雙漸廬江人慶厯中進士博學能文為職方郎中出知同州為政和易吏民見思有古循吏風賈易字明叔無為人中進士甲科為常州司法參軍自以儒者不􅈺法令議獄惟合於人情曰人情所在法亦在焉郡中稱平歷官侍御史以剛直名上書言天下大勢可畏者五頗激切易程頤門人與蘇軾不合嘗論劾之張徴字新仲舒城人建炎三年為御史中丞劾黃潛善汪伯彥大罪二十條罷知江州尋又謫祕書少監分司西京王藺字謙仲廬江人乾道進士歷樞密院編修官輪對奏五事孝宗大加奬擢除監察御史陳時政闕失皆嘉納之光宗即位由禮部尚書遷知樞密院事除目或自中出未愜人心者輒留之納諸御座時議建皇后家廟力爭不可應詔疏列八事不報終以不合去束元嚞合肥人通城簿毀淫祠正風俗嘗攝縣令以政最聞後知秦州賑饑有法全活甚衆元朝顯巢縣人泰定時為平江路總管以廉自律杜請謁禮文學之士勞來阡陌絶奸吏詘大姓一時稱焉明薛祥字彥祥廬州人領衆來附太祖從渡江海州民亂株連甚衆祥會鞫多所開釋治淮八年民相勸莫為惡咸寫真祀之授工部尚書時李善長奏鳯陽宫殿人匠魘鎮將盡殺之祥面折之曰太師一言壞人命乃分别無罪活數千人左遷北平布政使治行稱第一後坐事杖死天下哀之陳瑄字彥純合肥人洪武時纍功授都督僉事永樂初封平江伯領海運嵗漕米百萬石至北京後既開會通河罷海運仍命瑄督漕瑄鑿清江浦築堤置閘漕舟便之又改民運為兑糧自瑄始卒諡恭襄廟食清江浦蔚綬合肥人洪武中由國子生歷官山西布政司參議永樂間召拜禮部侍郎宣德初晉本部尚書綬秉心淳實履行端方卒諡文肅申泰無為人洪武間以薦起家知延平府入覲會諸守有以贓敗者傳㫖令軍校遍搜各省知府至延平止得米三升鈔二貫考天下清亷第二荷褒賜致仕歸惟攜老蒼頭一人步入閭里龍源合肥人少警敏力學永樂初預修大典授工科給事中親喪家居見民牧不良即聞於朝其人賂當道誣之遂罷歸方正合肥人永樂初徵修大典入太學授工部主事時建北都督工規畫有條由屯田郎擢江西參政平峒賊遷福建布政丁毅字士𢎞無為人永樂乙未進士選庶吉士性剛直時近臣有紀綱者勢傾中外衆莫敢忤毅獨正言與之抗綱服其直竟不能厄史昭合肥人永樂初積功至都指揮僉事充總兵官鎮凉州討平土軍老的罕移鎮西寧請立學校如中土宣德中以征西將軍鎮寧夏凡十二年邉備大固進右都督鄭泰字景暘舒城人永樂進士任給事中讜言動衆進都給事中超補刑部侍郎璽書褒異天順復辟遷吏部卒賜祭葬朱昻字廷舉無為人貢生任應天府通判升工部郎周文襄忱薦領江南糧儲歷升福建參政嘗掌臬司事三日間出濫繫二百餘人居鄉如未嘗有勢位者地方利害嘗陰白有司人或造謝則杜門不見李春字景陽無為人正統進士兵科給事中有直聲轉福建參議汀盜起春親抵巢穴諭降進江西左參政撫諸洞反側歷兩藩俱著聲績沈譓合肥人景泰進士歷部郎知東昌府政尚嚴明常祿外不名一錢折獄明允銓注天下廉能官第一鄭時字宗良舒城人景泰進士任御史以戅直降內鄉知縣薦為延平守擢撫陜西成化末有挾左道得幸者時上疏論之陳利國保民五事忤㫖降謫復起為左副都御史轉兵部侍郎晉司寇為人端厚簡慤鄉評重之王敬字惟曕廬江人景泰間貢監任大理評事甫視事即力白三原王恕之寃衆論多之升本寺副子恆字克昌幼習詹孟舉大書年十二英宗召至御前作天下太平四字擢中書舍人官終户部郎鮑德字秉仁舒城人景泰丙子鄉薦知衡山調華容治邑九年興學勸農懲奸理寃治稱湖湘第一仕至饒州同知吳凱合肥人由進士擢兵科左給事中封駁敷奏動存大體承㫖核邉儲罷武辨不職者四百餘員仕至廣東少參郭鋐合肥人襲彭城衛指揮使成化初進指揮同知𢎞治中擢總漕運沈毅有智略凡軍民利病必陳於朝嘗濬通州河置壩令淺船搬運嵗省白金數萬管漕十三年後佐後府卒薛逺字繼逺無為人由進士任户部郎中使交南還進侍郎轉工部治河河南調兵食討兩廣叛獠事平進尚書致仕復起南兵部尚書與中官汪直忤遂歸逺敏而好學於禮樂兵刑天官律厯無不究悉尤熟國家典故在户部改定事例每嵗中外競陳利害一切報罷官省民安從宦四十年家無長物嘗曰少吾事親恆不足今安忍有餘葉鸞字應和舒城人景泰進士任貴州參議黔中雜苗難治鸞廉靜忠誠按部所至蠻人赴訴者多持金馬求直盡却之一斷以法有宣慰刲人腸藩臬諸司莫能糾鸞遣馳諭即謝罪又宣慰有奪嫡者僉允其請鸞獨不肯署名親老授副使終養秦民悅字邦約舒城人天順進士授行人進工部員外郎裁抑中貴私尅之弊出知廣平府括流移荒地三千五百頃聽民耕種斂租備賑擢江西參政纍升户兵二部尚書卒諡莊簡張淳合肥人成化進士令瀏陽糧長侵賦巨萬淳以至誠勸諭並感泣輸完擢御史按貴州用計擒賊渠餘黨五十九寨悉就撫轉吉安知府多善政民為立祠纍遷至副都御史蔚春合肥人𢎞治進士任兵科給事中陳時政八事邉務七事咸見施行參議福建參政廣西以鯁介為忌者中傷乞歸曹琥字瑞卿巢縣人𢎞治進士授南工部主事轉户部御史周廣發太監錢寧事下獄琥論救亦被杖謫判尋甸改黃州遷廣信同知節寧藩貢獻抑守璫橫索請革嵗貢芽茶奏最進鞏昌知府未赴卒生平砥礪名節歷官中外家無積儲萬振孫字性儒合肥人嘉靖進士服官剛正自部郎知襄陽府舉核屬令贓過雖賄監司為解弗釋也升副楚臬礦使縱橫振孫捕其爪牙立斃之以忤㫖削籍起廣東參政未就卒劉崙字山甫無為人嘉靖進士擢御史巡視陜西請查復金牌舊制修舉茶馬八事回按順天疏陳畿輔饑荒疾苦巡撫湖廣㑹景王之國德安崙營辦有方公私不擾楚人頌之宛嘉祥字白湖廬江人嘉靖癸卯舉人判廣信遷知思南府招降強寇萬餘朝廷嘉其績令久任思南撫戢餘衆四境帖服竇子稱合肥人萬歷壬辰進士授大理評事抗疏請建儲守泉州課最督學湖廣大計注廉明第一纍遷福建布政使朱萬春字寰同無為人萬厯進士知上饒遏璫豎開採之擾省長差拖纍之患擢御史劾本兵糾總河論首輔請東宫出閣講學按四川奏留帑金充採辦免加派賑荒災轉江右道平鄱湖劇賊內升厯左通政許如蘭字湘畹合肥人萬厯丙辰進士知光州遷工部郎出知紹興舉卓異備兵密雲轉蒲州道密人請留未赴旋命撫薊再撫廣西折悍藩平普莫二賊進副都御史趙一韓字如勃巢縣人萬厯進士司李九江時中璫收稅恣為攫取一韓痛繩以法遷南工部視𣙜蕪關廉聲比前官葉茂才纍晉貴州副使魏璫時能植節自振朱來逺字文甫廬江人萬厯丁丑進士初令秀水除雜差以蘇民禁私販以惠商勸課省刑時稱善治仕至太常少卿引疾歸楊四知字畏生無為人崇禎戊辰進士知漢陽擢御史陳江北被寇之慘兵將玩寇之弊又上銓政京營漕運及被寇地方求改折色等疏巡視兩關勞瘁卒官國朝王綱字燕友合肥縣人順治壬辰科進士授刑部郎改兵部督逋逃案山積綱為振滯獄釋株連冬月流徙出關者給湯粥衣絮選授巡倉御史終通政左右參議李天馥字湘北合肥人順治戊戌科進士授檢討厯工刑兵吏四部尚書以老成凊慎拜大學士在相位五年宰物應機一以虛公處之嘗以變法不如守法欲救弊未必無弊奉行故事惟謹不敢失尺寸有古大臣風許明章舒城人順治戊戌科進士授陵水知縣輸賦積弊羡耗幾侔正額賦多逋明章盡除耗羡令民出穀米牛羊雞豚之屬官為平價鬻之以其值補從前缺額數月而足遷德州同知沈汝蘭字仲畹巢縣人順治辛卯嵗貢司訓泰州海寇薄城協力守禦白諸生之被誣陷者七人張肯穀字式似巢縣人嵗貢任涇陽縣丞遷知神木署泰州事巴三綱之亂賊衆潛布城中猝發執穀去誘降穀不屈計紿守者得脫奔叩幕府白狀陳進𠞰䇿躬為嚮導一鼓而三綱授首超遷鳳翔知府轉濟南皆著治績湯愛鼎字旺衡巢縣人廩貢訓導靈璧遷知滿城除耗羡清疆理抑强梁治最擢瓊州守參劾屬吏貪酷者不少貸張國城字宗子舒城人康熙甲辰科進士知髙明縣時多盜國城團練鄉勇禦𠞰兼施請緩征輸折兵米免夫役以安集被難之民上官皆從之陳略字石友舒城人父魁甲前明壬午寇亂時保護鄉里收葬骸胔以行義聞略舉己未武科進士守備蘄州衛清釐軍民徭役使兩不相擾建鳳麓書院置田養士以卓異遷興化游擊朱前詔無為舉人令長沙均賦稅免差徭勸課農桑軫恤孤苦升知麻哈州百姓如失父母宋元徵字式虞廬江人康熙戊辰科進士知夏津縣廉明蝗不為害運河淤漕滯元徵默禱河神即躬挽大纜前行水立湧千艘如駛歷官刑部郎中屢決疑獄祀名宦胡永亨合肥人父守恆以壬午城陷罵賊死永亨募勇士夜入賊營收父骸而葬之家居孝友尚義好施康熙庚戌成進士典試江西公慎自矢號稱得人尋遷民部郎奉命鞫粵東獄仁恕得情分巡肇髙廉羅道飲氷茹蘖多所釐剔息事寧人幾於無訟人比之包待制云鳳陽府漢召信臣字翁卿夀春人以明經甲科為郎出補穀陽長舉髙第遷上蔡長其治視民如子所居見稱述超為零陵太守復徵為諫大夫遷南陽太守信臣勤力有方略好為民興利務在富之躬耕農桑開通溝瀆以廣灌溉杜紛爭禁奢靡吏民親愛號之曰召父遷河南太守治行第一數增秩賜金竟寧中徵為少府列於九卿陳萬年字幼公相人為郡吏察舉至縣令遷廣陵太守以髙第入為右扶風遷太僕性廉平內行修飭以丙吉薦代于定國為御史大夫陳咸字子康萬年子以父任為郎有異材抗直數言事遷為左曹元帝擢為御史中丞總領州郡奏事課第諸刺史內執法殿中公卿以下皆敬憚之為石顯奏廢成帝初補長史遷冀州刺史歷二郡守所至立威豪強讋服徴入為少府薛廣德字長卿相人以魯詩教授楚國龔勝舍師事焉以蕭望之薦遷諫議大夫代貢禹為長信少府遷御史大夫為人溫雅有藴藉及為三公直言諫諍始拜旬日元帝幸甘泉因留射獵廣德上書諌即日還宫復諫御樓船願自刎以血汚車輪上卒從橋後賜安車駟馬東歸徐防字謁卿銍人永平中舉孝亷除為郎體貌矜嚴占對可觀顯宗異之特補尚書郎職典樞機周密畏慎出為魏郡太守遷大司農勤曉政事所在有績拜司空防以五經久逺聖意難明宜為章句以悟後學上疏言博士及甲乙䇿試宜從其家章句開五十難以試之解釋多者為上第引文明者為髙說詔書下公卿皆從防言拜司徒遷太尉録尚書事封龍鄉侯免就國防卒子衡當嗣讓其弟崇數嵗乃出就爵云陳寵字昭公洨人少為州郡吏辟司徒鮑昱府掾勤心物務昱髙其能轉為辭曹掌天下獄訟其所平決無不厭服衆心撰辭訟比七卷公府奉以為法肅宗初為尚書時吏政尚嚴寵上疏謂宜改前世苛俗務寬厚遂讞五十餘事著為令是後人俗和平屢有嘉瑞歷二郡三卿所在著績纍官司空陳忠字伯始寵子永初中為廷尉正以才能有聲稱擢拜尚書居三公曹雖世典刑法用心寬厚奏上決事比二十三條以省請讞之敝又奏除蠶室等刑安帝親政忠以宜徵聘賢才宣助風化數薦隱逸及直道之士又因災異詔開言路忠慮言事者多激切或至不能容乃上疏豫通帝意後數言時政語多切直中官外戚及近幸咸憚之官至尚書桓典字公雅沛郡龍亢人榮之𤣥孫焉之孫𫝊其家業以尚書教授舉孝廉為郎辟司徒袁隗府拜侍御史是時宦官秉權典執正無所回避常乘驄馬京師畏憚為之語曰行行且止避驄馬御史及黃巾賊起滎陽典奉使督軍破賊獻帝即位三公奏典謀誅閹宦忠義炳著拜御史中丞賜爵關內侯劉馥字元潁沛國相人漢末曹操表為揚州刺史單馬造合肥空城建立州治數年恩化大行流民歸者以萬數於是興學校廣屯田治芍陂及茹陂七門吳塘諸堨以溉田又髙城壘積木石為戰守備後吳攻合肥城恃以全三國魏倉慈字孝仁淮南人太祖開屯田於淮南以慈為綏集都尉黃初末為長安令清約有方吏民畏而愛之遷燉煌太守抑挫權右撫恤貧羸嵗決刑不滿十人民翕然稱其德惠數年卒於官吏民圖形祀之劉曄字子陽淮南成德人許邵稱其有佐世之才太祖辟司空倉曹掾行軍長史兼領軍每有疑事輒以函問至一夜數十至後卒於太中大夫東亭侯諡曰景劉靖相人馥子仕魏從黃門侍郎為廬江太守轉河內遷尚書賜爵關內侯出為河南尹為政初雖如碎密久而百姓便之有馥遺風為大司農衛尉進封廣陸亭侯上疏陳儒訓之本後遷鎮北將軍都督河北諸軍事開拓邉守屯據險要修渠灌田邉民利之薨進封建成鄉侯諡曰景胡質字文德楚國夀春人仕魏初為頓丘令後徙吏部郎為東莞太守平反獄情在郡九年吏民便安遷荆州刺史加振威將軍解樊城之圍遷征東將軍假節都督青徐諸軍事廣農積穀有兼年之儲又通渠諸郡利舟楫嚴設備以待敵海邉無事性沈實內察不以其節檢物所在見思薨家無餘財追封陽陵亭侯諡曰貞吳薛綜字敬文沛郡竹邑人仕吳為五官中郎除合浦交趾太守建昌侯慮為大將軍以綜為長史外掌衆事內授書籍慮卒入為尚書僕射時權欲親征公孫淵綜上疏諫止之徙選曹尚書太子少傅以名儒居師傅之位仍兼選舉甚為優重凡所著詩賦難論數萬言名曰私載又定五宗圖述二京解皆傳於世魯肅字子敬臨淮東城人家富於財好施與以賑貧結士為務周瑜為居巢長求資糧於肅肅家有兩囷米各三千斛肅指一囷與之遂相親結瑜薦肅於孫權與語大悅因說權鼎足江東以觀天下之釁曹操既入荆州圖東下諸將皆勸權迎操肅獨勸權召周瑜任之與劉備併力破操於赤壁後以奮武校尉代瑜鎮江陵尋拜漢昌太守偏將軍從權破皖城轉橫江將軍子淑永安中為昭武將軍都亭侯武昌督遷夏口督所在嚴整有才幹卒子睦襲爵領兵馬蔣欽字公奕九江夀春人從孫䇿東渡拜别部司馬討平盜賊歷官討越中郎將從權征合肥力戰有功遷蕩寇將軍領濡須督後召還都拜津右護軍典領詞訟權嘗入其堂內母踈帳縹被妻妾布裙權嘉其在貴守約敕御府以錦繡易之初屯宣城蕪湖令徐盛收欽屯吏表斬之權不許盛由是自嫌常畏欽害己而欽每稱其善盛既服德論者美焉子一封宣城侯與魏戰臨陳卒無子弟休領兵晉武陔字元夏沛國竹邑人父周與二弟韶茂並總角知名仕魏纍官太僕卿封薛縣侯晉泰始初拜尚書遷左僕射開府儀同三司陔以宿齒舊臣名位隆重自以無佐命之功又在魏己為大臣不得己而居位深懷遜讓終始全潔當世以為美談卒諡曰定子輔嗣韶歷吏部郎太子右衛率散騎常侍茂以德素稱名亞於陔官侍中尚書為荀愷所陷遂見害天下傷焉侍中傅祗上表申之後追贈光祿勳袁甫字公胄淮南人好學與華談齊名以詞辨稱嘗詣中領軍何勗自言能為劇縣除松滋令轉淮南國大農劉𢎞字和季沛國相人靖子有幹略政事之才纍官鎮南將軍都督荆州諸軍事屢平反側勸課農桑寬刑省賦每有興廢手書守相丁寧欵密人皆感悅爭赴之咸曰得劉公一紙書賢於十部從事及卒士女嗟痛若喪所親後南夏亂父老追思𢎞雖甘棠之詠召伯無以過也贈新城郡公諡曰元子蟠追遵父志斬郭勱於濁水為順陽內史江漢之間翕然歸心胡威字伯武夀春人質子早厲志尚為徐州刺史勤於政術風化大行入朝武帝謂威曰卿孰與父清對曰臣父清恐人知臣清恐人不知臣不及逺也歷官前將軍青州刺史以功封平春侯卒贈鎮東將軍諡曰烈子奕嗣奕字次孫仕至平東將軍威弟羆字季象亦有幹用仕至益州刺史安東將軍劉惔字真長沛國相人祖宏字終嘏宏兄粹字純嘏宏弟潢字沖嘏並有名中朝時人語曰洛中雅雅有三嘏父耽晉陵太守亦知名惔少清逺有標寄王導深器之論者比之荀粲纍遷丹陽尹為政清整每奇桓溫才而知其有不臣之迹及溫為荆州惔言於帝曰溫不可使居形勝地其位號常宜抑之帝不納年三十六卒孫綽為之誄云居官無官官之迹處事無事事之心時人以為名言桓宣譙國銍人祖詡義王太守父弼冠軍長史宣初為元帝丞相舍人時張平樊雅各據一城帝以宣為參軍使就平雅平雅即遣使隨宣受節度王含請宣為參軍使率衆救祖逖逖留宣討諸未服皆破之陶侃使宣鎮襄陽宣招懷初附勸課農桑簡刑罰略威儀十餘年間石季龍再遣騎攻之宣能得衆心每以寡弱距守論者以為次於祖逖庾翼為荆州欲傾國北討更以宣為都督三州四郡軍事以功封竟陵縣男卒贈鎮南將軍子戎官至新野太守桓伊字叔夏宣族子父景有當世才仕至侍中丹陽尹長社侯伊有武幹纍遷大司馬參軍時苻堅強盛邉鄙多虞授伊淮南歷陽太守與謝𤣥共破賊别將王鑒張蚝進都督豫州諸軍事及苻堅南寇伊與謝𤣥謝琰俱破堅於肥水以功封永修縣侯在州十年綏撫荒雜甚得物情桓沖卒遷都督江州荆州十郡豫州四郡軍事伊到鎮以寬恤為務百姓賴焉卒官贈右將軍加散騎常侍諡曰烈子肅之嗣卒子陵嗣伊弟不才亦有將略討孫恩至冠軍將軍桓沖字幼子彞季子淹識有武幹從溫征伐有功官寧朔將軍義成新野二郡太守又從溫破姚襄及虜周成賜爵豐城公遷振威將軍江州刺史後代溫居任盡忠王室謝安以時望輔政沖懼逼乃解揚州自求外出以徐州刺史鎮京口尋都督江荆梁益寧交廣七州軍事荆州刺史沖率前將軍劉波等伐苻堅拔堅筑陽攻武當走堅兗州刺史張崇尋領江州使石䖍伐堅襄陽太守閻震擒之以功封次子謙宜陽侯又降堅魏興上庸新城三郡卒贈太尉諡宣穆南北朝宋鄭黑夀陽人仕宋為豫州刺史殷琰叛黑起兵淮上捍之遷司州刺史趙倫之字幼成下邳僮人宋武帝起兵以軍功封閬中縣五等侯武帝北伐倫之遣順陽太守傅𢎞之扶風太守沈田子出嶢栁大破姚𢎞於藍田後以佐命功更封霄城縣侯安北將軍少帝即位徵拜護軍尋遷光祿大夫卒子伯符嗣梁裴邃字淵明祖夀孫由河東徙居夀陽刺史裴叔業以夀陽降魏隨衆北徙天監初邃自拔還梁求邉境自效以為輔國將軍廬江太守屢破魏軍以功封夷陵縣子遷廣陵太守及梁秦二州刺史開創屯田倉廩盈實省息邉運民吏獲安與魏夀陽守將拒戰卒於軍諡曰烈邃深沈有思略為政寬明能得士心居身方正將吏憚之及其卒也淮肥間莫不流涕子之禮字子義纍官都督北徐仁睢三州諸軍事信武將軍卒諡曰壯後周裴政字德表邃孫家夀陽幼明敏博聞强記達於從政仕梁封夷陵侯周師圍荆州政間道赴難周人獲之蕭察命至城下使謂元帝曰王僧辨己自為帝王琳不復能來政詭許之既而告城中曰援兵大至吾當以碎身報國江陵平周文帝聞其忠授員外散騎侍郎命與盧辨依周禮建六卿撰次朝儀多遵古法尋授刑部用法寬平後出為襄州總管令行禁止稱為神明卒官年八十九隋樊叔略陳留人仕周纍遷驃騎大將軍從武帝伐齊每戰身先士卒以功封清鄉縣公拜汴州刺史隋文帝受禪進爵安定郡公在州數年甚有稱譽遷相州刺史政為當時第一百姓為之語曰智無窮清鄉公上下正樊安定徵拜司農卿凡種植叔略别為條制皆出人意表卒贈亳州刺史諡曰襄唐裴懷古夀春人為監察御史姚嶲道蠻反命懷古懷輯之申明誅賞歸者日千人遂定南方使突厥默啜欲官懷古不屈將殺之懷古亡歸遷祠部員外郎歷官幽州都督所至吏民懷愛韓琬稱其馭士信臨財廉為國名將云宋髙覿字會之宿州蘄人進士起家歷遷户部判官京西轉運使徙益州彭州廣碃麗水二峽地出金宦者挾富人請置場募人夫採取之覿曰聚衆山谷間與夷獠雜處非逺方所宜奏罷之纍官給事中子秉常為梓州路轉運使閻日新宿州臨渙人少為本州牙職補三司使役吏景德初命管勾邠寧環州駐泊兵馬時部署張凝屢入邉界焚族帳日新皆提兵應援大中祥符初改文思使日新起胥吏好云為以進取多所建白纍官昭州團練使歷知單州吕夷簡字坦夫先世萊州人祖龜祥知夀州子孫遂家焉夷簡進士及第纍遷尚書祠部員外郎時京師大建宫觀工役至有死者夷簡奏緩其役真宗謂其有為國愛民之心仁宗即位以給事中參知政事尋拜同中書門下平章事章懿太后薨夷簡請發哀成服備儀仗葬之徙許國公感風眩仁宗降手詔云古謂髭可療疾今剪以賜卿既薨帝泣曰安得憂國忘身如夷簡者贈太師諡文靖夷簡當國柄最久其於天下事屈伸舒卷動有操術後配食仁宗廟為世名相吕公綽字仲祐夷簡子蔭補將作監丞遷尚書員外郎為史館修撰判太常寺考定禘祫時祭之禮為郊祀總儀上之改樞密直學士知秦州古渭州諸羌來獻地公綽卻之不受進翰林侍讀學士卒贈左諌議大夫吕公弼字寶臣夷簡子賜進士出身積遷直史館河北轉運使自寶元慶厯以後宿師備邉既撤警而將屯如故民疲餽餉公弼始通御河漕粟實塞下冶鐵以助經費舒冗賦及民逋數百萬夷簡歿仁宗識公弼名於殿柱至是益材具為人謂宰相曰公弼甚似具父知成都府寬而有斷軍府肅然代蔡襄為三司使神宗立王安石嫌其不附己公弼立上章避位卒諡惠穆吕公孺字稚卿賜進士出身占對詳敏仁宗以為可用為開封府推官民鬻薪為盜所奪逐之被傷尹包拯命笞盜公孺曰盜而傷主法不止笞執不從拯善其守及使三司而公孺為判官事皆咨決之元豐初知永興軍洛口兵千人以久役思歸奮斧鍤排關不得入公孺索首亂者黥之餘悉慰遣後纍官户部尚書卒吕希哲字原明公著長子少從焦千之孫復石介胡瑗學復從程皓程頤張載游聞見由是益廣以蔭入官王安石將置其子雱於講官以希哲有賢名欲先用之希哲辭曰辱公相知久萬一從仕將不免異同則疇昔相與之意盡矣安石乃止范祖禹言於哲宗曰希哲經術操行宜備勸講其父嘗稱為不欺暗室詔以為崇政殿說書勸導人主以修身為本修身以正心誠意為本遭崇寧黨禍奪職罷為宫祠羇寓淮泗間十餘年卒希哲樂易簡儉有至行晚年名益重逺近皆師尊之吕希純字子進公著次子登第為太常博士元祐祀明堂將用皇祐故事希純言宜循元豐間式以英宗配上帝悉罷從祀羣神得嚴父之義從之又請定納后昏禮拜中書舍人同修國史入崇寧黨籍纍貶官苗時中字子居其先徙居宿州以廕主寧陵簿有善政熙寧中為梓州轉運副使韓存寶討蠻軍行時中以糧道逺創為摺運法食以不乏加寶文閣待制終户部侍郎魏杞字南夫夀春人紹興十二年登進士第纍遷宗正少卿湯思退建和議命杞為通問使損嵗弊五萬歸以使不辱命一嵗至相位卒諡文節吕好問字舜徒希哲子以廕補官崇寧初治黨事坐廢蔡卞得政諷之曰少親我即階顯列好問笑不答靖康元年歷擢御史中丞徽宗將內禪詔解黨禁除新法蔡京黨戚莫肯行好問抗疏言利害欽宗鄉納又疏蔡京過惡乞投海外請削王安石王爵前後數十上帝雖當食輒使畢其說髙宗南渡好問諭張邦昌奉傳國璽遣使勸進髙宗勞之曰宗廟獲全卿之力也以恩封東萊郡侯子本中揆中弸中用中忱中孫祖謙祖儉王希吕字仲行宿州人渡江後自北歸南登進士科除䂖正言時張說以攀援戚屬擢用希吕上章劾之見斥直聲聞逺邇淮右擇帥令知廬州兼安撫使修葺城守安集流散兵民賴之改知紹興府百廢具興尤敦禮文學端方之士天性剛徑遇利害無回護意居官廉潔至無屋可廬上聞之賜錢造第董槐字庭植濠州定逺人少喜言兵自方諸葛亮周瑜既而從學於輔廣廣歎其善學登進士為廣德軍録事參軍雪富人李桷獄嘉熙中知江州兼都督府參軍流民渡江而來者數萬發粟賑之至者如歸淳祐二年遷左司郎兼知江州主管江西安撫司興利除害惟恐不盡徙廣西運判兼提㸃刑獄至雍州上守禦七䇿南方悉定纍封許國公一日值天大雨烈風雷電槐衣冠起坐麾婦人出為諸生講兑謙二卦遂薨贈太子少師諡文清元張郁靈璧人登至元進士歷官三十餘年不茍取於民至參知政事而接人以謙私居必冠帶明李善長字百室定逺人太祖起兵善長被儒服道謁上與語取天下大計意合留幕贊軍機積資至左相國章程賞罰悉善長處分凡師行必善長留守轉調軍餉無乏太祖即位凡制度皆善長所定以其功大比漢蕭何封韓國公後坐胡惟庸事死徐達字天德濠人少負大志太祖為郭子興部帥仗劍往從一見語合時時以王霸之略進上知為國器委使必效征討所至成功與常遇春皆軍鋒冠而達尤不嗜殺平張士誠吳人安堵如故入元都市不易肆出佩大將軍印歸朝上符印單車垂櫜還邸舍延儒生講議恂恂恭謹以功名終封魏國公卒追封中山王諡武寧鄧愈虹縣人從太祖定金陵有功每戰必先登陷陳取州郡即令鎮守歷廣德宣徽嚴饒撫南昌襄陽所至撫以恩信後從大將軍北定中原封衛國公卒追封寧河王諡武順繆大亨定逺人初糾義兵為元攻濠不克歸附歷官同僉樞密院事總制揚州鎮江有治略為政寬簡軍民皆悅之及卒上遣祭其墓曰繆將軍平生端直諸將中未嘗有過郁新字敦本臨淮人洪武中由人材除户部度支主事進郎中超遷户部侍郎上問天下戶口漕運地理險易應對無少誤進尚書永樂初卒新理邦賦十三年長於綜核密而不繁帝悼之賜祭葬張德林鳯陽人明初以元帥守揚州時兵火之餘城中居民僅十餘家德林招集流亡户口日繁威肅惠懷軍民輯睦唐鐸字振之虹縣人太祖初起兵即侍左右歷官兵部尚書上謂其謹厚有德特以為詹事食尚書俸後參征南軍相度形勢增設衛所皆從之鐸居官廉靜不妄取豫為上所重單安仁字德夫濠人元末歸太祖為元帥守鎮江移常州歷工部尚書精敏多智諸所營造大小中程改兵部尚書致仕奏請疏濬儀徵縣南壩以便輸挽疏轉運河以防淤淺移瓜洲倉厫置洋子橋西免大江風潮之患家居二十年卒年八十五郭景祥濠人博涉書史性直諒遇事敢言太祖甚親信之為右司郎中授和州總制治城隍樓櫓廣屯田練士卒和遂為重鎮仕終浙江行省參政王濂字習古定逺人李善長婦兄元時為吏令長皆賔禮之聞太祖克集慶來歸除執法官讞獄平允歷浙江按察僉事治行著聞卒上深痛曰濂有王佐才今死朕失一臂毛騏字國祥定逺人太祖自濠趨定逺與騏籌兵事悉當意擢行省郎中文書機密皆協贊之病卒上親製祭文子驤歷官都督僉事楊冀安靈璧人洪武初官工部侍郎奉使雲南著有異績尹綬字廷章定逺人洪武丙子鄉薦任御史舉刺無所顧忌永樂初使海外歸歷數萬里山川島嶼悉繪圖以獻張貫靈璧人洪武中監生歷任至北平參議永樂中改北平為順天府貫首為府尹為政嚴明不阿權勢卒於官馬世熊臨淮人纍官至營田使卒於官太祖親為文祭之趙畿字邦翰宿州人鄉舉卒業成均仕金華司李發奸如神陳璇字汝衡定逺人永樂辛丑進士除御史巡按浙江廣西所至肅然歷浙江按察使益廉介自持貪墨斂跡李默字思道定逺人洪武丙子鄉貢永樂中上書言事朝廷奇其才擢漢王府長史王有異志默苦諫王怒禁錮之事敗默尚繫獄特釋還鄉里年富字大有懷逺人正統間由鄉薦歷仕陜西參政奏罷織駝毼定賦額汰冗卒盡革宿弊聲震關中遷河南布政時流民十數萬聚南陽陳州間剽掠為盜富至皆撫定之景泰初擢副都御史巡撫大同一意拊循奏劾無所避天順間晉户部尚書上謂掌國計須用執法人非富不可由是部事大治成化初為吏部尚書王翺所劾發憤卒上震悼諡恭定戴昻字時舉宿州人正統戊辰進士為御史以言事謫相口驛丞遷知濰縣在任九載守法奉公民不忍欺張僖靈璧人景泰甲戌進士授御史歷知杭州府嵗饑賑濟活六萬餘户終湖廣參政未行卒杭人祠祀之湯鼐字用之夀州人成化乙未進士由行人擢御史孝宗即位首劾大學士萬安罔上悮國又劾少傅劉吉奸貪時言路大開鼐意氣尤鋭大臣多畏其抨擊而吉尤不能堪嗾御史論之戌肅州至謝遷柄政始釋歸王昶靈璧人成化丙戌進士知樂安縣有淫祠數十令毀之適有火患民懼不敢毀昶乃自往碎其妖神火患亦息嵗凶以便宜發粟賑濟擢御史劾李孜省終太僕少卿劉福字宗慶臨淮人成化甲午鄉薦任兗州府管泉同知𢎞治間河決張秋福奉檄塞河以死勤事祠祀安平鎮顧佐字良弼臨淮人成化己丑進士歷官左都御史勘罷總兵官李杲太監任良等以户部侍郎理陜西軍食善區畫儲蓄餘三年正德初劉瑾逐户部尚書韓文上以佐代忤瑾乞歸卒贈太子太保周鉞字仲威宿州人𢎞治己未進士知永興縣報最劉瑾招之見曰吾力能授爾御史鉞不往遂改進賢教諭尋復公安知縣稱疾不起李心學字師顔臨淮人嘉靖丁未進士歷官湖廣兵備副使𠞰平猺賊及容山景洞巨寇擢布政使余翺字大振定逺人第進士歷監察御史嘉靖三年議大禮翺首率諸御史疏爭忤㫖豫杖戍邉皇子生始赦還梁子琦字汝珍夀州人嘉靖乙丑進士授諸暨縣尹愛士恤民興廢舉墜終通政司參議劉繼文靈璧人嘉靖壬戌進士歷官給諫章奏激切大著直聲出為浙江參政與海瑞齊名巡撫廣西總制兩廣殱海寇有功擢户部左侍郎楊應聘字行可懷逺人萬厯癸未進士官光祿卿總督西陲邉政大治夏之鳳字子鳴夀州人萬厯戊子鄉薦歷官户部郎中時有內豎白玉犯法潛避深宫鳳入奏敕玉出聽審上嘉其正直書名於屏戈尚友字善卿臨淮人萬厯壬子鄉薦知饒平縣地産毒草能殺人民多借以興訟尚友令犯科者移草投海井中以贖罪後海寇至取水飲死者過半率遁去歷官昌平兵備副使周汝昌字文明懷逺人官户部主事性剛正以不肯建生祠忤魏璫戌肅州髙越鳳陽縣人舉於鄉署福山教諭值流賊猖獗縣令棄城遁越率士卒誓死禦城遂以功超拜御史國朝丁珩字朗山宿州人歷官户部郎中遷漢興道正巳率屬一郡肅然嵗饑借倉穀數千石賑之全活甚多及卒士民號泣若喪所親劉允謙夀州人順治丁亥進士知沈邱縣居官方正擢山東巡按彰善疸惡六府澄清田家修字獻之鳳陽人順治間知廣東從化縣時邑多流亡盜賊並起乃諭降十餘寨勸令開墾復為良民編户清役省刑簡訟衆皆樂業擢西城兵馬指揮沈時鳳陽人隨征入粵授永安令為人耿介方正剔蠧釐奸吏民懾服順治四年秋流賊攻城親冒矢石築子城造雲車以禦衝突閲三月援兵至圍解擢知潮州府歷糧儲驛傳道所至民懷其德楊模聖懷逺人順治間第進士歷官廉州知府時土辨縱橫模聖單騎招降劇寇安輯遺民去任士民有泣送者江南通志卷一百四十九欽定四庫全書
