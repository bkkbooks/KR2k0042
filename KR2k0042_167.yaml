body:
  text: 江南通志卷一百六十八人物志隱逸一江蘇松常鎮淮揚徐八府太通二州江寧府晉葛洪字稚川句容人性寡欲好異書尤耽神仙導養之法屢避功賞授官皆不就以句漏産丹砂求為其令至廣州刺史鄧嶽留之止羅浮山著書名抱朴子南北朝梁陶𢎞景字通明秣陵人神儀明秀讀書萬卷永平中上表辭祿止句曲山自號華陽隱居築三層樓𢎞景處上弟子居中賔客至其下梁武帝早與之游即位後恩禮逾篤諡為貞白先生阮孝緒字士宗陳留人出繼從伯印之居建鄴祖母遺財百萬不納悉歸其姑性至孝于鍾山聽講母王氏忽有疾兄弟欲召之母曰孝緒至性冥通必當自到果心驚而反天監二年徵不至南平王偉以書要之不赴曰非志驕富貴但性畏廟堂若使麏䴥可驂何以異夫驥騄鄱陽王妃孝緒姊也王嘗命駕就之鑿垣而逃著高隱傳唐余延夀開元中處士以詩名韋牟上元人號遺名子隱居鍾山飄然有物外之趣顔真卿書其室曰三教㑹宗堂陳融六合人幼有至性言若不出諸口游止皆有常處好學不仕卒諡貞晦先生元王德升句容人讀書有儒者氣象至正間纍辟不起朱南強句容人多學善屬文隱居不仕德化鄉里所著有黦醭稿同時侯蕃丁復皆有高名明居仁句容人洪武初以儒碩徵入朝與對奕賜以內醖辭職不就歸隱於家人稱瞻菉先生王顯江寧人號溪漁子雄才尚俠後忽悔所為買書數千卷閉門誦讀不問世事方孝孺稱為竒士賀確字存誠居金陵少事博士業一不利即棄去肆力經史百家天文地理醫卜之書論古今事如倒囊出物聞者聳聽曽薦修宋遼金三史辭不就龍瑄字克溫才名籍甚與丘濬陳獻章為布衣交自號半閒居士顧璘作半閒居士傳史忠字廷直性任俠不羈薄權貴有不合輒引去遇所善則留連忘懷自號癡翁作卧癡樓於冶城之麓意到便行不告家人以所往沈石田贊其像曰玩世滑稽風顛月癡灑筆淋漓水走山飛金琮字元玉自號赤松山農遐嘯清視人莫能窺書法精工文徵明裝潢成帙題曰積玉孫自修字無修江寧人天啓甲子舉人授陽江令遷二大同感時亂忽盡遣愛妾棄家祝髮縛茅於人迹罕至處擔柴負重以自給其子間關往省敕斷家事以學道讀書誨勉而已李克愛字虛雲天性沈篤卜居長千里與李義人張興公論學稱南郊三老孫石字介臣上元人宿學有聲嵗貢不仕抱道靜居足不踰户論者謂之真隱周維藩字覺菴上元人讀書不仕著史鑑闡微易學宗㫖等書晚年精于內典張怡字瑶星為諸生父可大以總兵官盡節登萊䕃怡錦衣千户甲申流寇陷京師逼怡降怡不屈械置復壁中乘間逸歸築室攝山白雲峰以終老國朝謝璣字在之上元人明季嵗飢區畫育嬰賑粥諸事都憲張瑋以璣有濟世才薦於朝堅辭不就隱居龍溪王應憲字德卿上元人少負竒氣文行聞於鄉隱居著述有河漕水利鹽鐵諸考夀登大耋程京萼字韡老上元人能詩文尤工書法頗自矜重然故交待以舉火者應之無吝色蘇州府周披裘公吳人延陵季子見路有遺金呼薪者取之薪者瞋目曰何子居之高視之下儀貌之壯言語之野也五月披裘而薪豈取金者哉季子謝之請問姓字曰子皮相之士也何足語姓名竟去漢甪里先生姓周名術泰伯之後漢高帝時與東園公綺里季夏黃公俱出定太子號四皓今太湖洞庭山有甪里村龍邱萇王莽時隱居於吳更始立任延為東部都尉折節下士主簿鍾離意請萇為門下祭酒延曰龍邱先生躬德履義都尉灑掃其門猶懼辱之何言召因修書致藥吏使相望於道積一嵗萇乃詣府署議曹祭酒晉張翰字季鷹吳人性任達時號江東步兵齊王坰辟為東曹掾因秋風起思吳中菰菜蓴羮鱸魚膾遂命駕歸棲隱不出俄坰敗人謂見幾性至孝遭母憂哀毁過禮唐陶峴晉徵士淵明後開元中居崑山文學可以經濟自謂疏脫不謀宦達製三舟一以自載一置賔客一貯飲饌有女樂一部奏清商曲逢佳山水必窮其勝經過郡邑靡不招延獨不肯詣王公貴人山水浪迹三十餘年吳越之士號為水仙陸龜蒙字魯望吳人元方七世孫居甫里多所論撰得書熟讀讎比勤勤丹黃不去手有田數十畝屋二十楹田苦下雨潦則與江通故嘗苦饑身親畚鍤所居前後植杞菊與皮日休輩往來時乘小舟齎書一束筆牀茶竈自隨時謂江湖散人纍召不出光化中韋莊表贈右補闕徐修矩吳人持身介潔守遺書萬卷草屋十餘楶優游自適皮日休嘗就借書讀之時有涇縣尉任晦亦同縣人高放寡合退處里中顧辟疆園有深林曲沼皮日休陸龜蒙嘗過從焉皮陸竝有二游詩宋吳江漁翁不知何許人嘗櫂舟往來波上嘯傲自得扣舷而歌閩中潘裕自京回道吳江遇而異之與語知其高尚因勸之仕翁曰出處由人吾不能追園綺之高竊慕老子曲全之義裕嗟歎問所處曰吾姓名尚畏人知况居室邪鼓枻而去侍其沔字國紀吳人博通經傳五舉禮部退為鄉先生與人交殊淡泊遇急難奮義以往不避艱險治平三年卒門人私諡曰夷晦先生閭邱孝終字公顯長洲人嘗知黃州未幾掛冠歸與崇大年輩以耆德稱蘇軾謫黃時與孝終友善過吳嘗飲酒賦詩其家有云蘇州有二邱不到虎邱即謁閭邱胡稷言字正思吳人少學文於宋祁受經於胡瑗以特奏補官山陰丞不能究其所施遂乞致仕即臨頓里陸龜蒙故址築圃鑿池追陶靖節之遺風作五栁堂終隱以老子嶧姿禀淳慤恬於榮利步趨言動皆有尺度人目為隱君子詩文簡古嶧子百能紹興進士知江山縣有惠愛以年至請錙銖軒冕有祖父風楊懿儒字彛甫長洲人少孤力學言行相顧任真自信不知世間有傾巧事崇寧間為南昌簿一嵗忽載妻子歸吳高隱不入州縣與方惟深稱吳中二老鍾璇字振逺常熟人於書無所不窺嘗游台州巖谷間遇異人持列禦寇書揖而與坐磐石指一泓定水曰此水滔滔乃皇極大中之道語久别去自是有悟築室梅里二十年不出户范成大薦於朝不報有續白孔六帖顧禧字景繁吳人隱居光福山中閉户誦讀所著書甚富注蘇軾詩尤詳紹興間郡以遺逸薦不出章康字季思吳人嘗問學於朱子默有所契隱居吳城西安貧樂道足迹未嘗越州境而四方之人無不知有章季思者盛明逺吳江人咸淳六年鄉薦為廣州録事判官宋亡隱居不仕元世祖聞其名召判惠州自以世受宋恩辭不就詔書迫責乃變姓名從老氏以終同邑孫鋭字穎叔咸淳七年舉於鄉宋亡遂不復出隱居平望之桑槃村林泉頗勝賦詩寓意又沈姓字自得吳人宋上舍生江南內附乃構山房著道士服隱迹終身皆宋之遺民也元黃公望字子久號大癡道人本常熟陸氏少喪父母依永嘉黃氏遂因其姓補浙西憲掾以忤權豪棄去黃冠野服往來三吳博洽羣書於技能無不通曉尤精山水師董源巨然後稍變其法自成一家所著山水訣世多宗之袁易字通甫長洲人為石洞書院山長歸隱吳淞之濵趙孟俯最重之作卧雪圖以贈所著有靜春堂稿張介福字子祺自懷慶徙吳中少受學於許衡二親早終遂無仕進意張士誠入吳介福恐亂兵發先塋往廬焉士誠聞其名欲招致之不可饋之力辭病且死謂其友曰吾志慕古人未能萬一惟無汚於時庶幾哉遂卒湯公雨字均澤性淳篤有學行工詩至正末由江隂徙居於虎邱之山塘隱居不仕以吟咏自娛詩載四朝詩中明謝常字彥銘吳江人洪武時舉秀才召見試丹鳳朝陽賦稱㫖帝欲官之以母年百有六嵗辭歸終養隱居震澤東溪陳汝秩字惟寅吳縣人少失怗安貧樂道力學工詩書得二王筆意高亢不茍交與唯授徒自給洪武初以人才徵辭養母歸卒韓奕字公望吳縣人少目眚筮得蒙卦知眵難療遂以蒙齊扁室絶意仕進博學尤工於詩洪武中與王賔皆隱於醫賔為郡守姚善所禮乃因賔造訪之奕於布簾內答云不在一日伺賔入室亦掩入之則走楞伽山善隨至又泛小舟入太湖善歎曰韓先生所謂名可聞身不可得而見也錢芹字繼忠吳縣人勵志操以竒節著吳中郡守姚善欲見之芹曰我民也無所置身乃請㑹於學宫就質經義芹曰此經生業耳豈無今日之急務乎善拜問出袖中一簡授之而去啓視之皆戰守方略也後善死於靖難芹亦與焉范能字仲能崑山人少從毗陵謝應芳游稱入室弟子精醫喜吟尤工書法永樂初被徵賦詩上郡守願養母全其天年守憐而許之日以著述為事同里孫俊字叔英能高弟也工詩不慕聲利有南溪草堂集葉盛為之序邢量字用理長洲人隱居葑門以卜自給陋室三間讀書不輟尤工詩吳寬極重之郡守或請其詩量曰古有采詩無獻詩吾豈以為羔鴈哉因削其稿後有吳人袁景休字孟逸善為歌詩芒鞋竹笠遍游吳越山水歸而受一㕓於吳市以賣卜終老詩多不屬草林若撫口授其遺詩存二百餘首邢參字麗文長洲人終日杜門誦讀一室立士行講授里中以醇和稱貧無以朝夕泊如也徐貞卿諸君皆與游嘗遇大雪訪之則屋三角滲雪參坐一角不滲雪處怡然讀書苦吟自若沈周字啓南長洲人祖孟淵父恆吉皆高隱周學於陳五經之子孟賢得前輩經學指授嘗以賢良薦筮得遁之九五遂耕讀於相城里所居曰有竹莊畫法董源書法黃庭堅詩出入於杜甫白居易之間興至對客揮灑煙雲滿紙畫成自題其上頃刻數百言風流文翰照映一時百年來東南之盛莫有過之者史鑑字明古吳江人博洽好學執古信禮尤熟於史論千載事厯厯如見網羅舊聞筆之成編有洪邁之博詩力追魏晉家居水竹幽茂客至陳三代秦漢器物及唐宋以來書畫相與鑒賞好著古衣冠曳履揮麈望之者以為列仙之癯也少受知於徐有貞與吳寬沈周為友及歿寬表其墓陸治字叔平吳縣人善繪事倣宋人而時出己意築室支硎山下藝名花數百種翛然自怡詩律秀潤王綸字理之崑山人以儒臣薦預修武宗實録善詩工畫為沈周入室弟子尤工篆𨽻楷法得歐陽詢筆意朱鷺字白民吳縣人家貧授徒養親牀頭恆貯數十文曰買笑錢善畫竹寸楮尺素人爭寶之每談及靖難諸君子輒泣下網羅遺事作建文書法居節字士貞吳縣人少從文徵明游詩律書畫徵明之門未之或先也家故𨽻織局織監孫隆聞其名召見不肯往拘繫破家僦居半塘落落寡合每過晨未舉火吟嘯自若也詩名牧豕集為藝林所稱嶽岱字東伯長洲人闢草堂於陽山白龍塢花木翳然修竹萬竿自稱秦餘山人性狷介不妄與人交能詩善畫嘗輯其一時友朋之詩倣篋中中州集之例序而傳之曰今雨瑶華顧元慶字大有長洲人家近滸墅所居曰顧家青山藏書萬卷擇其善本刻之自經史以至叢說多所纂述年七十餘猶吟誦不輟嶽岱曰陶潛田家之言浩然江湖之句時代雖殊㫖趣相符時稱為大石山人趙宦光字凡夫吳縣人讀書稽古精於篆書與婦陸卿子隱於寒山足不入城市當事慕其名多造門求見者宦光亦不下山報謁子均字靈均傳其父六書之法日與賔客搜金石論篆籀問竒字訪逸典為藝林所稱周詩字以言崑山人喜讀書倜儻重然諾兼精醫作內經解游京師詩文播公卿間少試方藥輒效欲以尚醫官之拂衣去游武林匿影僧寺適督學孔天印閲嶽王題壁得詩作大驚命駕往謁與定交武林人爭延致之不懌辭歸隱不復出包捷字警幾吳江人崇禎壬午舉人流賊陷京師削髮入穹窿山足迹不入城市國朝楊補字無補長洲人少貧工詩畫為人孝謹重然諾隱居鄧尉山以操行高潔稱徐枋字昭法長洲人明季舉人自少擩染家學湛深經術痛父汧殉甲申之難隱居靈岩山之上沙五十餘年雖窮餓餽遺不受間作書畫以自給巡撫湯斌知其賢屏騎從兩詣山中訪之不得見年七十三卒戴笠字耘野吳江諸生入秀峰山為僧旋返初服隱居朱家港教授生徒土屋三間炊煙時絶編纂不輟笠同縣諸生徐白字介白隱靈岩山之上沙種蔬藝果捃拾自給詩畫蕭疏無俗韻故舊至掃葉煮泉三十年不出史兆斗字辰伯長洲人少棄諸生好古力學博通前明典故下至故家遺老流風軼事無不備熟尤喜蓄異書所購率皆祕本或手自繕録積至數千百卷齊居校讎輒為疏注其旁年八十餘卒汪琬為之傳金俊明字孝章吳縣人棄諸生混迹詩人詞客間工書善畫墨梅論者擬之鄭思肖之蘭云子侃字亦陶亦工書畫能詩杜門鈔書校讎精審宋元人名集祕本插架甚富文點字與也長洲人震孟孫幼能詩叔乘殉甲申之難家盡破依墓田以居肆力詩古文詞間寫山水人物巡撫湯斌嘗屏車騎訪之問及饘粥計對曰菜羮疏食足以安人性情堅人操行少或有餘將移所守斌稱善從弟掞字賔日和州教授嘉之曽孫清修古行閉門不輕與世接哦詩染翰自娛以老顧苓字云美長洲人少篤學尤潛心篆𨽻凡碑版及鼎彛刀尺欵識魚蟲科斗之書皆能誦之臨摹秦漢銅章玉印見者以為不減吾衍云褚篆字蒼書長洲諸生邃於經學能作擘窠書己卯聖祖南巡召見吳中耆碩於行在篆書行草各一幅蒙嘉奬賜海鶴風姿四大字時年九十三矣王武字勤中吳縣人鏊六世孫工詩尤長於畫先世所遺及購獲宋元名蹟心摹手追悉能冥㑹高潔藴藉嘉遁邱園汪琬為之傳以為吳中老成典型其風尚標格與前明杜瓊沈周陸治相伯仲云司馬葕字磐莊長洲人受易於休寧程智傳極數辨物之學年九十餘卒有語録若干卷俞瑒字犀月長洲人通經史上下千百年徵引考據原原本本如燭照數計顧嗣立選元詩注韓愈溫庭筠集商榷為多陳逢午字方中常熟人篤行好學不茍言笑及語道義輒極論終日不倦教子讀書以立行為重曰當知文藝外大有事在所著詩文甚富兼工楷𨽻松江府宋王奎華亭人風韻高邁慕神仙遐舉之道自號蟾谷真士嘉定寶慶間再徵不起謝國光字觀夫華亭人宋亡不仕元治書侍御史程巨夫奉詔使江南搜訪遺賢以國光薦杜門稱疾堅辭不赴棲隱終身衛富益華亭人宋亡設壇祭文陸死事諸人詞極悲愴隱居教授不應有司之薦後攜子避地霅上卒年九十六元曹知白字又元華亭人大德中薦授崑山教諭不就嘗游京師諸公欲奏辟之謝曰吾豈齪齪求官者邪即日南歸隱居讀易足不踰户人稱貞素先生畫亦列能品楊謙字竹西華亭人讀書尚志不樂仕進多高人勝士之交嘗築小樓登眺海中大小金山題曰不礙雲山樓楊維貞貝瓊俱為歌咏陸厚華亭人宅東有圃自號東園散人博洽經史元季避亂浙中兵息返故廬日放浪峰泖間善按摩法療人疾有詩號古漁唱孫稷字長慶華亭人言行謹飭嘗舉為文學官兵興遂不仕築室橫雲山之支隴名曰小山招隱讀書賣藥以終老儲泳字文卿華亭人與弟游隱居周浦竝以詩名唐時字中甫華亭人幼遭親喪哀毁盡禮及長以先世受宋恩誓不出仕至正末張士誠陷郡杜門自守以夀終陸居仁字宅之青浦人泰定中舉於鄉工詩古文隱居教授自號雲松野衲與楊維貞錢惟善稱三高士楊德懋華亭人明左氏春秋尤究心太極圖諸書買田澱山西躬耕不仕洪武初詔徵天下賢才有司薦聞德懋既遜言辭召竝自眇左目以示廢疾不可用優游湖上卒里人稱為自廢公明錢全袞字慶餘華亭人通涉經史元季張氏據吳全袞隱居盤龍岡不為其用洪武中卒所著有續松江府志諸書焦伯誠華亭人潔身修行事母孝通五經鄉㑹試聘典衡文皆辭疾不赴教授於鄉門人多顯者黃鑑字明夫華亭人博學而貧三十未娶進士李萱慕其賢以女妻之鑑悉却奩具夫婦織紝自給晚年結茆于山曰八峯小隱所著有山樵傳說門人錢福為立傳張初字大初華亭人少游文徵明門長於詩兼工書畫晚居沙岡墓廬四十年不入城市家日益貧意泊如也同邑陸尚書樹聲以雲間伯夷目之人皆稱貞白先生王嗣響字霆叔華亭人以淹邃為時所稱性耿介侍郎唐文獻通政許樂善皆少與同學及貴顯後過從輒不見有所贈亦不受取古人窮堅老壯二語自號兩益居士俞寰字允寧華亭人喜讀書工詞賦醫卜篆刻無所不能而不求人知居青村終嵗不一入城府李世邁字懷古華亭人少慕高隱明末棄經生業構室高槐古梅中竹爐泉茗興至鼓琴一再行聞雨滴芭蕉聲則喜而不寐授徒自給硯田有贏則以助葬贍嫠國朝張若羲字昊東華亭人明季進士仕泉州推官擢主事歸而棲隱郊墅四十年自號味閒漫樵郡守直指欲薦舉隱逸堅辭不就閉户著書以終子豫章探花及第翮進士俱有文譽王光承字玠右華亭人嵗貢生博學工詩文才名籍甚淡於榮利明季屢辭徵辟不就後偕弟烈字名世隱居上海之新場鎮躬耕養父足迹不入城市者三十餘年無子依壻楊幨以沒所著鎌山堂集外孫日徵收輯之莫秉清字子先華亭人明布政如忠曽孫蚤嵗為諸生有聲明季避兵浦東遂隱焉性耿介不妄交人造廬者亦罕得見博覽載籍所著詩文甚多吳騏字日千華亭人明季為諸生有盛名與王光承兄弟結深契明亡以後屛迹荒山光承稱騏堅苦自守三旬九食五月披裘侮之不怒周之不受為得其實云著有頷顑集沈浩然華亭人明兩廣總督猶龍子府學生有雋才閉户讀書不樂仕進雖饔飱不繼處之晏如工八法為時所重稱雪峰處士蕭中素名詩以字行華亭人隱於匠高致絶俗詩最有名曰釋柯集諸嗣郢字乾一青浦人順治辛丑進士居細林山自號九峰主人遍搜諸勝作九峰志康熙九年十九年郡大祲設粥厰以拯飢者常州府漢陸璯字仲芳毗陵人明京氏易尚書尤精風角星算辟主簿謝病去隱㑹稽山南北朝梁蕭視素惠開子性靜退仕梁纍官中書侍郎求為諸暨令到縣十餘日挂冠縣門而去獨居屛事非親戚不得至其籬門武帝嘗賜錢八萬一朝散之親友唐魏璞字不琢毗陵人才高志放隱居三十年與皮日休陸龜蒙善每秋風時乘舸載酒相往來當世高之宋王克嶷宜興人隱居不仕王安石高其節贈之詩有先生醉卧松花裏春去人間總不知之句張􅘏字子厚常州人登進士養親不仕窮經著書四十年元豐元祐間廷臣厯薦不起卒賜諡正素先生孔元䖍至聖五十二世孫建炎時五世祖若罕與子端志俱高抗不仕元䖍淳祐間避居沙上號馬洲書院教授生徒包天麟字仁甫江陰人咸淳間舉博學宏詞科不就嘗注詩書易春秋傳義元旌其門贈浙江儒學提舉元蔣捷字勝欲宜興人德祐中進士元初晦迹不仕大德中憲使臧夢解陸垕俱薦其才不就博學工詞學者稱竹山先生許恕字如心江陰人家北郭號北郭先生部使者薦授澄江書院山長不就兼工醫術有北郭集李時可元末居馬䭾沙楊維貞客其家供饌華美歌舞極一時之盛明祖下江南助軍餉萬石後以巨筏浮海去不知所終明倪瓚字元鎮無錫人工詩善書畫所居有閣曰清閟藏書數千卷古鼎法書名琴竒畫陳列左右高木修篁縈繞其外四方名士日踵其門自號雲林居士家故雄於資至正初悉散給親故兵興後扁舟箬笠往來震澤三泖間張士誠兄弟屢欲致之不可得及吳平黃冠野服以終年七十四焦先生不知其名家江陰之虞門里太祖故人洪武初詔有司徵求甚急恐為有司纍乃持雞酒馳甬道入見太祖班坐對飲如微時賜以金玉角三帶取角者陰於户後挂之去人比之嚴光華晞顔字以愚無錫人元末不仕洪武初辟為本府訓導不就以老病辭隱居東湖李大椿字茂卿無錫人博學工文隱居梁鴻溪洪武初詔為御史力辭附使者上太平十二䇿杏林叟不知其名或云姓董隱居暨陽山遇異人授以針術能立起人危疾謝以資不受但令人種杏一株久而成林高啓為作杏林叟傳張機字子樞郡人託漁自隱多行隂德高啓有澄江懶漁記華宗韡字公愷無錫人博綜經史元季兵興奉親往來蘇松間事平還錫修身教家集古人嘉言懿行為一書曰慮得集洪武中屢徵不起王文晏字文靜宜興人元季兵亂隱居不仕以吟咏自娛舍旁皆植梅自號梅西詩詞清麗書畫師宋克王蒙皆造其妙洪武中以賢良徵辭疾不就吳綸字大本宜興人風神散朗操履修潔非公事未嘗一入城府創别墅二於溪山間南曰樵隱西曰漁樂以陶潛自擬因自號心逺居士秦旭字景暘無錫人詩格類陸游晚集諸高隱觴詠慧山之麓名曰碧山吟社凡十人年皆七十八十衣冠甚偉望若神仙好事者繪圖傳之尤文字務朴無錫人居東郭回溪里學以宋儒為宗領鄉薦即隱居不出孝宗遣行人齎書徵之以母老力辭胡濙周忱交薦之終不就又邑人許世卿有孝行亦以孝亷隱居不仕守令不得覩其面有中解編諸集薛章憲字堯卿江陰諸生工詩古文吳人都穆擬之商彝周鼎性喜佳山水意到輒輕數千里赴焉居賔坐中斂肱默坐貌古神清謝遴字彚先宜興人父三錫家貧力學以朴誠率後進遴崇禎癸酉鄉舉內行修飭鄉評稱為真孝亷中年杜門與沛縣閻爾梅長洲徐枋竝持高節雅好施與知交匱乏多待以舉火著述甚富尤邃于易詩徐𢎞祖字霞客江陰人性好竒遍遊天下名山水遊屐所紀不加點綴曲盡勝趣嘗上華山心動馳歸母正屬疾服闋入閩出徼外欲窮探河源歸竟不食卒許肇箎字塤友宜興人弱冠知名博學工文章意氣豪逸明季棄諸生放浪吳越間為詩自娛蔣偉字韋人宜興人工詩嗜酒乞詩者必載酒詣之酒盡詩立成各滿其意其不以時請者輒漫罵之聲若巨雷身長七尺學使者竒其貌令作蟋蟀賦立成閲之稱善曰子誠材然令後世惜之者必子也後棄諸生自溷於酒詩亦日益竒晚有故人子入滇送之江上吟咏連日歸而卒國朝吳璇字叔度宜興人幼立品行恥儕流俗為諸生時巡按御史以端方薦後舉崇禎癸未進士差理江北餉驅游兵立保甲銀不入庫解不越宿史可法特薦之入國朝足迹不入城市閣部交薦不就同里吳永祺字文剛為人孝友能周恤宗黨立品與璇相似孫夢簡宜興諸生篤孝友隱居教授生徒以紫陽山學為式邑令欲識其靣謝不可雅慕倪瓚為人卒時命以瓚畫幅殉陳貞慧字定生于廷子少在復社有名阮大鉞以逆案久錮謀復用貞慧與池州吳應箕無錫顧杲等草檄攻之後大鉞起南都侍郎乃以他事屬鎮撫司逮治尋得脫屏居故里坐卧一小樓不入城市十二年而卒李介立江陰人明季詣闕獻䇿不報遂遍厯天下山川而歸老居僧舍貧困不支邑令聞名訪之匿不見終身不婚卒友人陳其忠葬之惲格一名夀平字正叔武進人生而敏慧八嵗咏蓮花驚其長老尤工繪畫花卉蟲鳥意態飛動而題語書法兼工故世稱南田三絶為人孝友敦篤不謁當事有古君子風晚與同里五君子聮吟稱六逸五人者高士胡香昊字芋莊經師陳鍊字道氣諸生楊宗發字起文董大倫字敷五唐惲宸字仲元也朱應鼎字凝和靖江人為人端重方嚴教授鄉里從游者多以文行著聞鎮江府漢焦先字孝然本河東人隱居京口之譙山世傳焦山以先得名然無可徵南北朝宋關康之字伯愈河東揚人居京口屢辭徵辟顔延之等十人入山候之見其散髮席松葉枕石而卧了不相盼延之等咨嗟而退為毛詩義疑滯多所釋尤善左氏春秋又造禮論十卷齊高帝絶賞愛之齊臧榮緒幼孤貧灌園自給純篤好學括東西晉為紀録志傳百一十卷隱居京口不受朝命與關康之號京口二隱梁諸葛璩字幼玫琅邪陽都人世居京口幼事關康之博涉經史復師臧榮緒榮緒著晉書稱璩有發擲之功方之壺遂建武初徐州行事江祀薦璩為議曹從事不就馬樞字要理博洽羣書尤善周易老子邵陵王綸為南徐州刺史引為學士曰吾聞貴爵祿者以巢由為桎梏愛山林者以伊吕為管庫束名實則芻芥柱下之言玩清虛則糠粃席上之說稽之篤論亦各從其好也乃隱於茅山親故竝居京口秋冬之際時往游焉宋邵餗丹陽人范仲淹王淇相繼守潤以餗守道邱園素有節行屢薦之不就賜號沖素處士陳輔丹陽人少負俊才不事科舉自號南郭子與王安石交善安石用事絶不與通孤介寡合古之獨行者也蘇照字元晦丹徒人隱居藏修自號東山樵隱趙磻老以遺逸薦於朝時相以隱逸之人宜遂其高書滄浪二字遺之李迥字叔友丹徒人高尚不仕士林宗之董弅白太守虞奕曰治下有隱君子盍訪之虞曰願之久矣乃攜具偕董詣迥迥野服見之明日以詩謝不至其門周方叔字矩道高郵人隱居潤之五州山讀書自娛或終日不食鄰僧乞米送之一日農卿龔集常州孫吳㑹同造其廬無以為具乃以藜羮食客二公欣然盡歡而去孟逢大丹徒人弟逢原竝以道德名世講業者百餘人王龍澤陸秀夫皆其弟子人稱大小孟先生皆不仕陳膺字登父居京口剛毅寡合入元隱居教授自號薌林子明丁熙拱字伯輝丹徒人朴茂有古風太祖駐蹕北固山召見多擢用者熙拱獨以老疾辭茅溱字平仲丹徒人幼好學不求聞達閉户著書有韻譜本義行世與塢佐卿輩倡和稱詩以布衣老於家王塈金壇人讓産庶弟屛居一室潛心理學中丞周孔教薦之朝辭不起芮城字巖尹溧陽諸生少負異才志在立行明末謝弟子員學耕山中故人有顯者訪之避不見貽書候問亦不發曰吾山澤之癯一與貴人接便喪所守時人目為真隱所著有易象傳解四詩正言禮記通識綱目分注拾遺與白盤山湯泰亨相析疑問義泰亨亦隱士嵗遇君親子卯日則屏食堅卧不起年八十五自知逝期别親友手題墓志沐浴而逝王鏳字叔聞金壇人樵諸孫嵗貢生以詩名明末晦迹酒人牢愁悲憤不求人知人亦無知者後之選家或稱為王遺民王元錝字暗然鏳從弟明末棄舉子業以醫濟人貧者亦與上藥不取償終身野服有隱操淮安府宋龔開字聖豫淮陰人宋亡不仕家貧甚客至無几席子浚每俯伏榻上就背按紙作唐馬圗人輒以多金購之嘗為文天祥陸秀夫作傳甚稱於時明田潤字德潤安東人隱居教授雖結廬陋巷而門多長者車轍以琴詩自娛人皆高之國朝宋曹字邠臣鹽城人長於論事工詩兼善書法栖隱射陽之濵自號耕海潛夫初詔舉山林隱逸郡縣敦趣上道曹辭疾不就徴後大臣復舉應博學鴻儒選曹堅謝益力人高其行稱射陵先生子恭貽康熙庚午舉北闈授鄢陵令揚州府秦邵平廣陵人嘗封東陵侯秦末種瓜長安城東瓜有五色世稱東陵瓜晉韓績字興齊廣陵人好文學潛退為操東土竝宗敬焉司徒王導辟為掾㑹稽內史孔愈上疏薦之皆不就宋徐湘興化人有隱德不樂仕進王伯起字興公泰州人父綸為太常博士伯起當以恩得官讓其弟父令舉進士曰士不自重而與千百人旅進坐軒廡下規合有司殊可恥也閉門深處踰三十年仁宗英宗皆賜粟帛不強以仕征集真州人事母孝居鄉恭謹與人未嘗校短長好蓄書能詩有子五人長復次賁相繼登進士第王安石表其墓稱為淮南善士元高明興化人榖曽祖懷德抱道晦迹不仕子椿元季避地姑蘇却張士誠之聘士誠敗汚僞命者悉為俘囚椿獨超然明高稷字世良興化人賦性清介兄榖秩台鼎稷布衣蔬食晏如也錢溥題其宅曰明時巢許王醇字先民揚州人早慧讀書如夙識弱冠工辭賦陸弼李維貞交相引重意不屑也善騎射擊劔曽一試京師演武場將士皆愕眙醇笑而退父母命之室以羸病辭遍游吳越佳山水參內典終於廣陵之慈雲菴朱瓘字楚琦寶應人通尚書周禮為詩體韻遒逸性嗜琴畜雙鶴人稱琴鶴先生景泰中詔舉賢良都御史王竑薦之竟遁去吳禮字中節寶應人事母以孝稱應貢入太學母老不忍離人以何蕃擬之母歿遂不復仕隱居蓼花莊有蓼莊吟吳敏道字曰南寶應人有異才篤內行隱居湖上鄉人稱舫齊先生王錫命字蒼敕儀徵貢生遭亂隱居寶應之蘆村刻勵堅苦督子力耕與北平劉文照梁以樟中洲崔干城長水吳鉏相友善國朝雷士俊字伯籲其先世涇陽人居江都艾陵湖幼為諸生後棄去専力於經史百家熟悉古今治亂所著有艾陵集貧老負氣以歿史以甲字子仁江都人幼補諸生長乃絶意場屋耕讀自怡所輯有文獻通考抄學圃隨筆勾股籌算捷法傷寒正宗廣吳淑事類賦子照能述父業著方輿槩十五卷宗元豫字子發江都人父歿貧不能葬疏食不除服者十餘年性亷介不與流俗欵曲惟肆力經史著史論數十篇别有識小録紀草一史中瑣事徐州府晉劉伶字伯倫沛人性放達與阮籍嵇康善時乘鹿車攜酒使人荷鍤隨之曰死便埋我土木形骸傲然一世著酒德頌南北朝劉遺民彭城人為柴桑令遁跡廬山時陶淵明周續之亦在廬山謂之潯陽三隱劉慧斐字宣文彭城人少博學能文起家梁安成王法曹參軍嘗游匡山遇處士張孝秀甚歡因居東林寺構園名離垢明釋典工篆𨽻手寫佛經二千卷逺近欽慕簡文臨江州遺以几杖明秦英字子美豐人通經術洪武間屢薦賢良方正辭疾不赴徐明徐州人足不履城市逍遙閒逺屢空晏如夀一百七嵗劉應元徐州人淡泊無外慕負郭有隙地種柿樹千章築土室以居縣令聞而召之不出國朝閻朴豐縣人性儉素甘淡泊好讀書日坐卧小園中雖家無儋石而心有餘閒夀一百二嵗太倉州元朱文德今太倉界人任太尉府長史丁父艱遂不仕扁其西齊曰可閒隱居自樂明劉顒字昻夫崇明人洪武初以賢良方正薦尋乞歸隱居不出構小樓棲其上教導鄉里後學多所引進張名由字公路嘉定人博涉經史喜談兵厯燕趙齊魏之郊遇古人營陳戰壘輒指陳勝敗時當神廟天下尚無事人皆迂之名由獨慷慷自喜居安亭有田數頃盡棄去為貧人逮後徭役繁重有田者率逃死名由蕭然環堵中讀書放歌人始服其先見年九十一終沈璵字孟溫太倉人授經里中長於辨說後即其受徒處建學宫著有稽古録崑圃文集沈𢎞正字公路嘉定諸生負才不偶遂絶意仕進喜聚書所藏纍萬卷雖病必手一編曰以療吾疾也天啓初命舉岩穴之才大臣疏薦謝弗起有園十畝備水石竹林之勝詞人酒客常滿座焉盛萬紀字無紀嘉定人好讀書立名節甲申聞變遂棄儒服躬耕東郊茅屋三楹植梅其前署曰友梅時人比之劉遺民國朝顧其康字錫之崇明人明末棄去諸生時督學以賢良薦徵授浙江松陽學博不赴隱居讀書教子瀛秀成進士陸坦字履常嘉定人崇禎庚午舉人明末嘗著鄉兵議條畫甚悉㑹逢甲申之變與父嘉穎偕隱賣卜金閶以窮死趙世鼎字以調嘉定嵗貢明末知世將亂同高士許大達陳拱辰放飲墟墓間日出而出日入而入時稱北里三逸侯涵本名泓字研德嘉定人岐曽子少與三兄二弟稱江左六龍涵尤以經濟自任及退隱吳市惟研精詩文究心性命之學論者皆稱其筆力老蒼近代罕匹通州國朝吳世式如臯人明諸生隱居白蒲鎮之竹莊性孤傲不與人通善為樂府歌行臨歿命焚其稿友人掇拾數十章名曰竹莊殘書江南通志卷一百六十八欽定四庫全書
