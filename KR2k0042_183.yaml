  text: 江南通志卷一百八十四人物志列女完節三淮揚徐三府太海通三州淮安府明蔡景召妻王氏山陽人早寡值元末兵亂險阻備嘗而氏守節愈堅蔡仲銘妻夏氏山陽人夫亡守節耶律氏五節婦山陽人耶律養正娶韓氏名惟秀甫六月而養正卒於官其弟敏亦亡韓與敏妻賈氏相守賈尋歿其二子肅寛尚㓜韓撫如己子肅娶楊氏逾嵗而歿楊年方十九寛娶丁氏洪武時官户部侍郎卒丁年二十生一子立與楊氏同守節立娶金氏亦早卒金年二十四守節竟與楊丁俱以壽終淮人稱五節婦許成五妻黄氏鹽城人年十九夫亡事老姑撫㓜子以節孝稱李徳妻陳氏徳淮安衞軍北征陣亡氏撫遺腹子守節終身以上洪武年旌顧文魁妻穆氏淮安衞人夫亡撫孤甘貧苦守謹事翁姑事聞旌表周勝妻朱氏山陽人勝充校尉挈氏往歿於役氏年少其軍伍中有誘奪其志者以死自誓守節三十餘年永樂中旌王彦孚妻杜氏山陽人從夫戍雲南夫亡誓死自守卒以夫櫬歸梁貴妻邵氏山陽人隨夫戍金齒夫亡年二十五擕孤裹夫骨歸守節終身李彦真妻陳氏山陽人張思仁妻王氏山陽人韓寧妻孫氏山陽人趙仲名妻黄氏山陽人蘇􅘉瞻妻彭氏安東人蕭友諒妻劉氏安東人俱宣徳年旌趙義妻張氏山陽人義客死舅姑以氏年少無子欲嫁之氏誓死不從守節終身正統中旌陳從禮妻劉氏安東人景泰中旌唐彦賓妻李氏鹽城人天順中旌馬海妻邵氏清河人其子璽長妻周氏亦早寡與姑同守節李政繼妻范氏清河人以上𢎞治年旌許寛妻王氏山陽人夫亡母欲嫁之氏將自殺母乃止李塘妻朱氏錦衣衞人寓淮安夫亡守節郁賓妻龎氏山陽人潘好古妻楊氏安東人趙印妻王氏安東人以上正徳中旌樂環妻薛氏鹽城人夫亡無子將自剄救免以守節終盧應春妻金氏山陽人王延祥妻陸氏山陽人許友卿妻陳氏山陽人蔣堯臣妻周氏大河衞人林相妻卓氏山陽人朱志妻蘇氏安東人以上萬厯年旌王繼祚妻韓氏安東人賈漂妻朱氏安東人俱天啟中旌王彦髙妻潘氏鹽城人夫亡守節出粟四千石賑饑事聞得旌表易無極妻孫氏鹽城人夫亡守節子之興年十五刲股療其母病事聞表其門曰母貞子孝薛炳妻羅氏安東人施有敎妻皇甫氏安東人井田妻王氏安東人以上崇禎時旌夏時中妻王氏鹽城人夫早䘮守節敎子紹為㢘吏蔣有慶妻齊氏山陽人于歸時夫已久病夫亡矢志守節朱价妻張氏鹽城人朱金妻錢氏鹽城人徐華妻淩氏鹽城人耿諫妻曾氏鹽城人陶守成妻顧氏鹽城人夏道一妻周氏鹽城人孟世昌妻殷氏鹽城人王師儁妻吳氏鹽城人郭魯得妻凌氏鹽城人司拱辰妻王氏鹽城人熊時信妻蕭氏鹽城人王在鎬妻易氏鹽城人以上皆少年守節歴數十載國朝生員吳之瓚妻吕氏安東人撫䕃昌尚未週訓之游庠薛世寀妻石氏安東人徐文采妻潘氏安東人訓導吳警妻李氏安東人以上順治年旌表宋灝妻凌氏鹽城人張仲妻金氏鹽城人生員禹守貴妻章氏山陽人撫遺腹子生孫俱顯達王國銓妻厲氏山陽人李鳳貞妻周氏山陽人夏錫疇妻王氏桃源人盧邦定妻謝氏桃源人生員徐貴瑞妻孫氏安東人劉三綱妻夏氏安東人劉胥慈妻馬氏安東人以上康熙年旌表曹玬妻丁氏山陽人事翁姑孝撫㓜子伴太姑守節雍正三年旌表職監胡昌禧妻禹氏山陽人監生孫如熊妻徐氏安東人陳朝鼎妻王氏桃源人成婚六月夫亡撫嗣守節終身以上雍正四年旌表貢生陳仁灝妻吳氏清河人生員張兆棟妻王氏清河人丁元棫妻吳氏清河人棫故氏年二十六家貧撫孤苦志守節三十餘年以上雍正五年旌表生員孫飛熊妻賈氏安東人生員汪之灝妻張氏媳丁氏俱清河人灦沒張懷妊五月後生子必達及長娶媳丁氏達又卒丁亦隨姑苦守生員張植妻楊氏清河人撫二子愛而嚴俱獲游庠以上雍正六年旌表紹興府同知程堦側室趙氏山陽人雍正七年旌表凌包山妻王氏鹽城人夏禹治妻劉氏鹽城人監生程熾妻崔氏安東人以上雍正九年旌表儒童郭怡妻卞氏山陽人夫亡無子孝養舅姑姑久病氏禱天割股以進獲痊立族子震為嗣儒童潘兆昱妻髙氏鹽城人事舅姑盡禮夫亡後育孤守節五十餘年子炳孫暎旺俱遊泮監生髙維嶽妻孫氏鹽城人蔡應熊妻張氏鹽城人潘如苓妻劉氏鹽城人楊絅妻張氏鹽城人仲又祕妻王氏清河人薛如芳妻嵇氏安東人于歸時舅姑已垂白夫伯兄故氏生子紳為伯兄後夫繼歿伯姒遺腹生子而伯姒亦故氏撫乳之如己子舅姑歿營䘮𦵏如禮僕拾金于途氏急令還之既而知其人欲為父買棺者禮謝而去紳為邑増生紳子登賢書以上雍正十一年旌表李遂妻秦氏妾馮氏俱鹽城人劉漢妻錢氏鹽城人張文郁妻陳氏清河人職監張文彬妻宋氏妾潘氏俱清河人以上雍正十二年旌表職監陳宗劉妻洪氏山陽人儒童徐光國妻陳氏鹽城人夫歿投環遇姑救甦諭以撫孤大義而止後子又歿敎育遺孫國祥成立尤喜周恤孤貧死之日被澤者哭奠盈門陳維垣妻吳氏鹽城人徐元利妻韓氏鹽城人潘樞妻葛氏鹽城人以上雍正十三年旌表髙爾珩妻凌氏山陽人嘗割股以療夫病顧時俅妻王氏山陽人夫亡守節鄰人兩遭火災婦居茅屋獨全王琳妻張氏山陽人夫亡無子歴事三姑曲盡孝養朱廣宸妻楊氏山陽人夫亡守志養姑姑疾割肝療治陳清叟妻孫氏山陽人周縞妻葛氏山陽人王全祐妻劉氏山陽人李年妻王氏山陽人陸行可妻蔣氏山陽人殷坦妻王氏山陽人陸吕陽妻司氏山陽人劉偲妻楊氏山陽人宋振貽妻周氏山陽人宋安貽妻張氏鹽城人宋茂元妻陳氏鹽城人李化龍妻薛氏鹽城人尹節印妻宋氏鹽城人郭克廣妻楊氏鹽城人凌宗愷妻王氏鹽城人成月鐸妻楊氏鹽城人陳利國妻劉氏媳林氏俱