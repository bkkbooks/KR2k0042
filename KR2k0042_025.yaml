body:
  text: 欽定四庫全書江南通志卷二十六輿地志關津二橋梁鎮市附鎮淮揚徐四府太海通三州鎮江府無關西津渡在丹徒縣西北九里北與瓜洲對岸舊名蒜山渡宋乾道中郡守蔡洸置五艘以禦風濤元延祐中增船十五明正統間巡撫周忱作二巨艦僉水工三十餘人又甃石堤三十餘丈國朝京口設有護漕救生船康熙四十六年聖祖南幸駐蹕茱萸河以救生船少特諭巡撫于準議行添設乃選京口漁舟計六十餘隻日用其六更番應調活一人者豫一金死者畀三之一著為例又捐置義田五百畝以其歲入給工費犒賞有餘則儲為來歲之用鎮江知府馮庭棠為記勒石唐杜牧之有詩國朝姜宸英有義渡贍産碑文自岷山導江而下出峽汗漫數千里至金焦一束水旋行逆折然後朝宗於海此曹子桓所為臨江賦詩徘徊而不敢進者也然余考之史記秦始皇登㑹稽還從江乘渡注其地在句容縣北六十里不知何時復徙瓜步梁庾信集有奉命使北始渡瓜步江詩至唐開元二十二年刺史齊浣以舟行繞瓜步回遠六十里始從京口埭下直趨渡江路徑而免漂溺之患故自唐至今瓜步渡者皆徙而之京口然往時京口與揚子橋對岸瓜洲特江中一洲耳後瓜洲以北淤漲與揚子橋連南直對潤州江身益狹江身狹則水流益汛急舟緣金山之麓而行春秋之間上流泛漲山水相搏觸漩而為渦激而成湍雖恬風霽景猶懼變生不測少遇風波失利一匏千金故京口之渡為天下最險余六月渡江登金山見山足艤舟五六舟人操楫而坐若有待者寺僧深爽進曰此為濟渡之舟自巡撫某公設此後凡有事於兹土者及往來行旅各捐俸及資益造舟買田置市租以贍水手之稍食及其賞格之費焉然久滋易弛也某懼斯人之弗脫於險而大隳前功願得一言以示來者余惟易既濟稱君子思患而預防其說在六四爻曰繻有衣袽終日戒夫涉川者不能戒之於未濟之前特恃其一舟之無隙以與彼狂飈駭浪爭命於呼吸之頃固且不可况於待其既濡然後操舟而拯之此與夫救火者之燋頭爛額何以異然而聖人之慮患也遍視夫事之可需者則需之有需之不能不得已而濟者則終日戒之至不得已而濟而終日之戒之猶不足以勝夫所濟者之險既已瀕於死亡矣乃忽然而得生彼仁人者之於此視夫人之脫之死而易之生其心樂不樂也自數舟者之設常歲活人以四五十計不十年而得活者四五百人矣由十年以前觀之彼四五百人者皆江上之遊魂水府之鬼籙也然則使自今十年之後之人有一不得濟以淪胥以亡者於吾心不且有戚戚乎哉若夫推前人之心以繼於無窮此則思患豫防之道宜如是也深爽學佛者也為佛之學者使人求福於冥冥其說多幻妄不可信深爽獨能推廣有司德意使人之得免於險厄且曰吾佛之道固然其為世利益多矣余樂其有是請也而書石公渡縣東北六里石公山下大港渡縣東北大港鎮西高資渡縣治西四十里甘露港渡右丹徒李莊渡丹陽縣東南五十里周家渡花家渡右丹陽蔣家渡金壇縣北十里官載渡縣北十五里龍宿渡縣東石牌村北右金壇清風橋丹徒縣治南跨關河宋景祐間郡守范希文重建又名范公橋嘉定橋縣治西南舊名利民橋跨關河宋淳熙中郡守錢良臣甃以石覆亭其上人呼為錢公橋嘉定中復甃之故又名嘉定橋千秋橋縣治西跨關河晉王恭作萬歲樓於城上橋與樓相對因名千秋緑水橋縣治北跨關河舊為游觀之勝唐杜牧之有詩俗呼為高橋升仙橋城南鶴林寺前大鶴鳴橋城東南一名孩兒橋上有石欄惠民橋縣東十五里丹徒鎮澗壁橋在澗壁鎮跨澗壁港大港橋在大港鎮馬公橋縣東南四十里新豐鎮跨漕河舊名陸公橋國朝康熙十年橋圯巡撫馬祜重建因改今名泰運橋府城南門外跨運河為吳郡往來孔道丁卯橋縣南三里跨運河晉元帝子裒鎮廣陵運糧出京口水涸奏請立埭以丁卯日制可後人構橋因名唐許渾築别墅於其側丁甪橋縣西南七十里丁甪鎮通阜橋府西門外舊為板橋以當江寧衝道明萬厯中甃以甓洗馬橋城西京口驛以唐太子洗馬陳翌所建因名高資橋縣西五十里宋延祐中建鎮西橋城西北舊名拖板橋元至順二年重建尋又圮明正統中重建右丹徒縣雲陽橋丹陽縣治東跨漕河舊名清化橋又名賢橋宋嘉熙中建後圮淳化中重建𢎞治間濬漕河拆毁尋復建惠政橋雲陽橋右俗名斜橋明成化中建三思橋縣治南大德間重建覆亭其上七里橋縣東南七里漕渠南岸珥瀆河宋元祐中建明嘉靖間知縣來汝賢改名麥舟橋以宋范純仁贈石曼卿麥舟於此嘉成橋縣南四十里珥村鎮宋嘉定中建泰定橋縣東吕城鎮一名大橋跨漕河元泰定中建蕭塘橋縣東二十里蕭塘港一名顔橋元泰定間建博望橋縣東四十里西楊橋縣東南四十里跨丁義瀆一名安豐橋元至正間建馬林橋縣西北跨辰溪長山八十四𣲖水皆由此入練湖宋嘉定中建花垾橋縣北二十里花垾鋪前明洪武中建丁橋縣西七十里丁橋鎮相傳以丁令威得名黃堰橋在縣西南四十五里亦名通德橋宋咸平中建馬嘶橋縣北六十里跨馬嘶港寨橋縣北七十里萬年橋縣南延陵鎮唐貞觀中建其後屢圮屢建右丹陽縣春雨橋溧陽縣治東舊名春市橋俗呼為中橋宋嘉定中建時久旱得雨因名陳子高詩屐聲春市雨人語夜橋燈即此胥渚橋縣東四里硯瀆橋縣治東北謝𤣥暉洗硯處秦公橋縣東南一里俗呼為下橋鳯凰橋縣北一里雙虹如翼俗呼為雙橋國朝朱雯有重建雙橋記古聖人制度之興凡以前民利用故城郭廬舍而外復有橋梁之制其來尚矣王政火覿道茀歲十一月徒杠成十二月輿梁成咸以濟民也其初始於架木後世或甃以后或浮以航惟因乎地之宜故周文綦造舟於渭秦公子針造舟於河迄今載之史傳不重哉溧陽為金陵輔邑其東南多山若金雞石屋盤白諸勝列如翠屏鬱然也獨西北皆陂池塘澤洪流巨浸集建平高淳諸道之水而匯於兹焉閭史水記曰溧陽之水東而南水之去道也西而北水之來道也蓋由固城五堰而下經升平三塔㑹於溧水之曹姥山然後直注於雙橋即今所稱鳯凰橋者嗣是繞城分三流而入於荆瀨諸溪則兹橋其鎖鑰云地為通衢往來所聚肩摩轂擊不能褰裳而往也明𢎞治初邑令新符公建雙橋跨其上以便行旅歲月奄曠橋制傾圮邑吏部史公復鳩工而新之沈青霞先生為之記兹閲百年而履跡上敝木蠧下嚼不無爛浥解拆之患壬戌冬豫署篆兹邑覩舊制之將頽也蹙然憂之曰橋梁之制王政先之凡以利民也昔陳少游為觀察使設梁以禦虐水生民賴之至今呼為大夫橋杜預造橋梁於平津衆論翕然以為不可預力任之梁成而君賞其功民拜其惠十世誦之不衰豈非利民之事為士君子所不可諉乎獨豫貧吏不能勉力任事如兩公而輸民力以供興作又勞民傷財之是懼幸有善者同力而肇舉之以聚沙成塔之心成鞭石為橋之果懸墾山伐木之雇募其力揆攢鑿撞祕之用庇其工具舁輦畚築之器備其用俾輸棟楹者若干輸櫨者若干輸甓㽋者若干版築具興材殖互飭將不日而告厥成焉將見二水中分夾綵虹而並跨雙橋齊峙駕明鏡以參差是固豫之志也夫不然則時之沍寒民將胥溺亦鳩爾衆而備王政之一端歟嘉定橋去縣四十里跨中江一名中江橋唐開元間嘗創浮梁宋元祐三年建橋曰衆樂嘉定中重建改今名上興埠橋去縣六十里安樂橋去縣三十五里隋大業初建以甓甃兩岸故又名甓橋南渡橋去縣三十五里渡濟橋去縣十二里跨瀨水萬厯中建傍有伍相國祠鎮安橋縣南三十里戴埠鎮諸山澗水皆匯於此右溧陽縣文清橋金壇縣治東百步舊名行香橋又名惠政橋宋淳熙中建端平中又撤而新之改今名清河橋縣南二百步舊名安定橋宋端平中甃以石改今名俗呼為文橋鍾秀橋縣北三里舊名懷德橋明成化中建嘉靖中甃以石又名鐘橋相傳古有銅鐘流至此故名濯纓橋縣北九里舊名三里岸橋茅山水自此出運河明𢎞治中甃以石下為三洞蓮渚橋縣東北八里明萬厯初建周公橋縣東南五里跨錢資蕩即舊刁莊渡明𢎞治間構木橋萬厯中易以石覲龍橋縣西南二里舊名社橋以明太祖曽經此易今名晝錦橋縣東八里石牌村宋紹興中建大雲橋縣東南四十里洮湖西北岸舊為彭期渡元大德間築長堤建石梁為宜興溧陽往來孔道東墟大橋縣西二十三里跨大溪為茅山水所經明正德間建莊城橋縣西北三十里為唐儲光羲故居高下湖口橋縣北八里明永樂間圯𢎞治中復建唐王橋縣西四十里唐王村一名雙橋右金壇縣丹徒鎮丹徒縣東十五里運道所經商旅輻輳有東西二港皆通大江達運河或曰鎮即故丹徒縣今土人稱為舊縣有巡司大港鎮縣東南四十里以通大港而名又東四十里安港口有安港巡司明洪武初置今因之新豐鎮縣東南四十五里與新豐塘相近唐至德二年趙侃等濟江至新豐大敗永王璘即此陸游云李太白詩南國新豐酒東山小妓歌又唐人詩再入新豐市猶聞舊酒香皆謂此非長安新豐也高資鎮縣西五十里明洪武初置高資巡司并置驛今因之丁甪鎮縣西南七十里右丹徒縣吕城鎮丹陽縣南五十里明洪武初置呂城巡司今因之延陵鎮縣南三十五里即故延陵縣也宋熙寧五年省縣為鎮以地分𨽻丹徒丹陽金壇三縣又置延陵寨於此丁橋鎮縣南六十里珥村鎮縣西南四十里珥瀆河西岸南接金壇縣界埤城鎮縣東北五里接武進縣界右丹陽縣戴埠鎮溧陽縣南三十里為入南山總路凡山中所産載至鎮始登舟甓橋鎮縣北三十里舟往金壇者必經此亦一孔道社渚鎮縣西南六十里上興埠縣西北六十里赴江寧者路必經此舊設巡檢司今裁右溧陽縣迪莊金壇縣西南二十五里直里在縣西三十里莊城在縣西北三十里西陽在縣西七十里倪莊在縣西七十里右金壇縣淮安府南鎖關在山陽縣南一里安樂關縣西北三里栁淮關縣東門外三里一名下關雲梯關縣東北二百里淮北海口其地有一套至十三套板閘關縣西二十里運河之北關差駐劄右山陽海關阜寧縣小南門外北關清河縣東南通濟閘口有部司收稅五港口護鹽關安東縣東北七十里元至元九年遣步騎連州攻破射龍溝五港口鹽場白頭河四處城堡即其地三岔關桃源縣東三十里明初設關有巡檢司查納桅封明末改移白洋河今設巡檢司於此上關渡山陽縣來遠坊之西下關渡舊淮隂驛後清河渡縣西南十五里顔家河渡黃河自清江浦東下十里草灣分南北二支其北十五里即顔家河也清江浦渡郡城西三十里右山陽喻口渡鹽城縣北一百二十里為淮河津要清溝渡阜寧縣西南百里小清口渡清河縣東北五里夏家湖口渡縣西北二十五里王家營渡大清口渡縣東北十里右清河淮河渡安東縣壩上巡司前五丈河渡縣東北三十里五港口渡縣東北七十里右安東白洋河渡桃源縣西六十里崔鎮渡縣西北三十里縣北渡縣北三百六十步右桃源東仁橋山陽縣新城東門外西義橋新城西門外舊名西鐵橋行旅輳集之所平河橋縣南四十里南至寶應六十里為往來通衢周家橋縣西南九十里北去高家堰五十里又南為翟家壩淮水東溢往往從此奔衝隄防至要羅家橋縣西北三里羅家溝伏龍橋縣東八十里通津橋縣東北十里右山陽縣㑹龍橋阜寧縣東南拱極橋縣東北升仙橋縣西南清溝鎮右阜寧縣登瀛橋鹽城縣西門外通海橋縣北門外通濟橋縣東南五祐鎮永安橋縣北新興鎮方橋縣西岡門鎮仁和橋縣西南沙溝鎮新陽浦橋縣西一百二十里右鹽城縣泄