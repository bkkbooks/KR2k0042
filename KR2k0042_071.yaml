  text: 江南通志卷七十二食貨志田賦六安徽寧池太廬鳯七府安慶府國朝原額田塘一萬九百九十四頃九十九畝九分二釐有奇節年升增田一萬六百六十一頃二十六畝七釐有奇雍正十三年實在成熟田塘二萬一千六百五十六頃二十五畝九分九釐有奇實徵折色銀一十六萬八百四十兩一錢二釐四毫有奇內望江縣派徵魚課羡餘抵解正項銀三百七兩五錢二分四釐有奇攤徵人丁銀一萬一千七百五十一兩四錢二分七釐七毫有奇匠班銀四百七十二兩五錢共實徵銀一十七萬三千六十四兩三分一毫有奇閏銀例派在內遇閏支給實徵本色米一十一萬一千五百四十五石五斗二升二合有奇外不在丁田徵解雜辦銀四千五百五十三兩六錢二分六釐六毫有奇遇閏加銀二百六十八兩八錢九分四釐八毫有奇新增扛銀三兩三錢三分有奇懷寧縣實在成熟並溢額田三千四百九十三頃六十六畝二分六釐有竒田內則例每畝計算毫有竒科銀七分九釐四漕贈銀一釐四毫有奇升一合有奇米五漕贈米一合四勺有奇攤徵人丁銀六釐九毫有竒匠班銀二毫四絲有奇實徵折色銀二萬八千四百七十三兩九錢一分四釐六毫有奇攤徵人丁銀二千四百一十三兩六錢六分六釐四毫有竒匠班銀八十四兩一錢五分共實徵銀三萬九百七十一兩七錢三分一釐有竒實徵本色米一萬八千五百一十六石四斗一升一合有奇外不在丁田徵解雜辦銀六百七十二兩一錢五分五釐有奇內商稅銀一百三十七兩二分五釐扛銀二兩四錢六分六釐四毫有奇庫協濟昌平州銀三兩兩扛銀五分四釐府魚課銀四百七十四三錢二釐六毫京扛銀五兩六錢八分六釐四毫有竒二城濠地租銀一兩五巷口地租銀三兩三錢分五釐補徵時價銀四十五兩二錢九分五釐六毫有竒遇閏加銀三十八兩五錢九毫有奇扛銀五錢二分四釐有竒桐城縣實在成熟並溢額田塘四千一百七頃四十五畝二分九釐有奇田內則例每畝計算毫有竒科銀八分三釐二漕贈銀一釐四毫有竒塘米五升一合有竒漕漕贈米一合四勺有奇科銀八釐有奇贈銀一釐四毫有竒攤米五升三合有竒毫漕贈米一合四勺有奇徵人丁銀七釐四有竒匠班銀二毫九絲有竒實徵折色銀三萬四千三十六兩二錢二分八釐四毫有竒攤徵人丁銀二千九百五十二兩九錢三分一釐七毫有竒匠班銀一百二十兩六錢共實徵銀三萬七千一百九兩七錢六分一毫有竒實徵本色米二萬一千七百九十四石八升有竒外不在丁田徵解雜辦銀一千四百八十五兩三錢一分八毫有奇內商稅銀三十四兩七錢八分九釐六毫扛銀六錢二分六釐二毫有奇庫協濟昌平州銀三兩十扛銀五分四釐京府魚課銀一千二百九六兩三錢八分三釐二毫有竒徵扛銀一十六兩七錢八分一釐九毫有竒補時價銀一百三十三兩六錢七分五釐九毫有竒遇閏加銀一百三十八兩一分七釐二毫有竒扛銀一兩八錢四分六釐九毫有竒潛山縣實在成熟田二千九百一十頃五十六畝九分九釐有竒田內則例每畝計算毫有竒科銀八分二釐二漕贈銀一釐四毫有竒升一合有竒米五漕贈米一合四勺有竒攤徵人丁銀七釐四毫有竒匠班銀二毫五絲有竒實徵折色銀二萬三千九百二十四兩二錢二分三釐八毫有竒攤徵人丁銀二千一百四十一兩四錢七分九釐一毫有竒匠班銀七十四兩二錢五分共實徵銀二萬六千一百三十九兩九錢五分二釐九毫有奇實徵本色米一萬五千四百二十六石三升五合有竒外不在丁田徵解雜辦銀四十四兩五錢八分七毫有竒內商稅銀三十九兩六錢五分四釐五毫有竒扛銀七錢一分三釐七毫有竒協濟昌平州銀三兩八扛銀五分四釐醋銀一兩一錢五分釐五毫有竒房地酒遇閏加銀三兩三分一釐有竒扛銀五分三釐五毫有奇太湖縣實在成熟田四千一十四頃七十七畝六分九釐有竒田內則例每畝計算竒科銀七分三毫有漕贈銀一釐三毫有竒攤米五升一合有竒忽漕贈米一合三勺有竒徵人丁銀五釐二有竒匠班銀三毫二絲有竒實徵折色銀二萬八千六百六十八兩六錢三釐一毫有竒攤徵人丁銀一千九百九十八兩四錢九分八釐二毫有竒匠班銀一百二十七兩八錢共實徵銀三萬七百九十四兩九錢一釐三毫有竒實徵本色米二萬一千七十七石六斗九升九合有竒外不在丁田徵解雜辦銀八十五兩五錢一分七釐八毫有竒內商稅銀三十一兩銀扛銀五錢銀五分八釐協濟昌平州三兩扛五分四釐租房地銀三錢四分五釐八毫有竒口地銀五十兩五錢六分馬路遇閏加銀二分四釐九毫有竒宿松縣實在成熟並溢額田四千四百四十七頃一十一畝五分三釐有奇田內則例每畝計算毫有竒科銀五分九釐八漕贈銀一釐二毫有竒攤米四升七合有竒毫漕贈米一合二勺有竒徵人丁銀二釐四有竒匠班銀九絲四忽有竒實徵折色銀二萬七千三百八十九兩一錢八分七釐五毫有竒攤徵人丁銀一千九十七兩四錢九分六毫有竒匠班銀四十一兩八錢五分共實徵銀二萬八千五百二十八兩五錢二分八釐一毫有竒實徵本色米二萬一千六百一十二石九斗八升一合有竒外不在丁田徵解雜辦銀一千一百一十九兩九錢三分五毫有竒內商稅銀三十一兩二錢三分四釐扛銀五錢六分二釐二毫有竒庫協濟昌平州銀三兩兩扛銀五分四釐京府魚課銀九百七十四二錢二分二釐六毫有奇徵扛銀一十二兩三錢六分四釐九毫有奇補時價銀九十八兩四錢九分二釐八毫有奇遇閏加銀三十八兩六分四釐四毫有竒扛銀四錢六分九釐二毫有竒望江縣實在成熟並溢額田二千六百八十二頃六十八畝二分三釐田內則例每畝計算毫有竒