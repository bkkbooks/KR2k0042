body:
  text: 欽定四庫全書江南通志卷六十八食貨志田賦二國朝順治二年欽奉世祖章皇帝聖諭本朝平定江南其土田規則悉用前明之舊以萬歷中賦額起徴仍蠲本年稅額十分之七兵餉十分之四其明季無藝之徴盡永除之三年奉旨長洲等縣額糧太重應否酌減江南官户免役太濫困纍小民作何限制著確議具奏命招撫內院洪承疇訂正江南賦稅經制四年一切折色徴銀行吏收官解法按明季收銀僉點殷實人户充當銀頭令其值匱收銀飯食紙張恣行賠纍拆封之時或有短少責令賠補至是痛革前弊縣點匱書一人擇老成者充之在匱出票登記流水號簿里甲赴匱完銀遵照司法自封投匱即給印票令其歸農凡一切收拆貯解官吏任之與民無關民困遂蘇六年因兵餉不敷將白糧改折正耗等米每石一兩二錢九年奉旨江南賦稅各項本色責成布政司每年於一月之前確查時值據實估定申報督撫咨部查核一面徑行所屬州縣照估定時價徴銀解交藩司選委職官領銀採買物料裝運解部十年改折三梭三線布銀其本色布匹俱照時值估辦改定料價折色銀應辦本色起運者亦隨時估值申報大吏核實編徴十二年白糧每石改折二兩徴解康熙元年户科給事中柯聳請行均田均役之法三年允科臣吳國龍疏凡縣派各部等項下錢糧悉歸司農總其成往例各作十分奏銷自是總作十分奏銷四年安慶巡撫張朝珍奏免新升當塗縣忠惠湖田包賦奉旨豁免仍以湖蕩照舊完蘆漁二課附張朝珍疏臣惟任土作貢古今通義因民利國王政所先時或勸墾荒蕪必使民先有其地而後可以辦納國賦未有以湖作田勒民包課者也如臣所屬太平府當塗縣忠惠墟即舊之丹陽湖也厯來額輸漁課銀三百一十四兩七錢零刋載全書解充兵餉順治十二年蘆政衛貞加徴蘆課銀一百七兩一錢零順治十五年衛貞又任巡按令民築埂周圍丈量作田三萬一千餘畝髙淳縣認墾四千餘畝當塗縣認墾二萬七千餘畝三年起科辦納漕糧具題覆準在户部止據按臣所報咨催辦漕在工部又有既納蘆課何以忽又歸漕之咨使承斯役者實出兩難至康熙元年當起科之期户部屢咨嚴催髙淳業已刋報由單當塗豈能獨異臣亦惟有嚴督刋入由單按畝起徴無奈湖民紛紛控告及池太道劉二章知府胡季瀛知縣葛元福節次呈詳大略言丹陽湖三面受水地勢最窪夏秋水漲浩瀚瀰漫冬春水涸一片爛泥止生水草原納草場漁課屬之工部項下前被衛按院為蘆差時加徴蘆課已是一地兩稅及巡厯當塗勒令署縣差時化督民築埂圈田上納漕糧數二千七十兩有竒然水發波衝旋築旋圮究成水國窮民何能包賠朝廷非填溝壑則死他鄉上負臣未敢輕信復令該道生育下纍有司考成等語移查髙淳納糧事例去後隨據回詳準江寧道行據江寧府詳陳丹陽湖出水納水之源厯代勞民之弊迄無成功則湖之不可為田固已彰明較著矣順治十六年衛按院題請開田改名忠惠部覆照例升科藩司遵催刋入由單然一目汪洋既無可耕之田焉可責成輸稅此揚京茂有稅命兩懸之控也伏乞轉詳撫院咨部定奪庶兩邑百姓無追呼賠補之纍永戴生成實非淺鮮等語臣始知髙淳亦未圈築成田也然户部咨催嚴迅臣督令當邑於康熙二年刋入由單乃帶徴元年額課竭力追呼終莫能應要知無地之賦而欲有司違心敲撲難乎其為民父母矣逮臣巡厯太郡有鄉民數百連名狀共八十五張環署號呼慘不忍聞臣諭以親往踏勘果真當為爾民請命衆始稍稍散去郡事既竣臣率同府縣各官舟行八十里至丹陽湖周圍熟視左右皆湖乃舒泉桐水吳漕水三湖匯合之處地勢窪下水漲之時必成巨浸閲新築堤埂大約髙一丈七八尺詢之土民云大水發時猶從埂面漫過况埂尚未築成乎墟中間有蘆草然非炊爨之蘆自然而生乃織席之蘆亦須人工插種其所生茭草止可糞田再則藉水捕魚而已由此觀之則前此湖民控告與道府縣厯經呈詳為不誣也其髙淳地界望之勢雖稍髙然亦防水沖溢徒費人力至今未曽耕種尚為一片荒蕪此江寧府前詳又鑿鑿可據也夫因地取利因地利之盈縮以取賦此聖王不易之政故田地山場各有等則奈何以汪洋澤國強民築埂以成田怒濤沖溢旋築旋頽即不惜民命然一派低窪之墟有何神術可以稼穡乎在衛按侈一時喜功之念在宋令希三年延緩之圖今徴期已及催迫維嚴髙淳飲痛包賠嵗不過二百餘金當邑元二兩年共四五千金捕魚織席之輩養生不贍而欲一時並徴非斃於箠楚之下則有掉臂而往今臣目擊最真乃復緘默不言使朝廷虛受加課之名而小民實切剝膚之患則作俑者衛貞而隱忍以成之者臣也且臣濫膺簡命撫綏民間疾苦而民之疾苦莫大於此謹據實繪圖上呈御覽乞即為議豁早蘇民困或以漢滿蘆差見在江南令敕該部其覆勘照舊歸蘆庶窮民無離散之苦有司免考成之纍地方幸甚官民幸甚五年奉旨白糧改折苦民著俱徴本色是年江南巡撫韓世琦奉旨實行均田均役十一年準江南總督麻勒吉巡撫馬祜請裁衛歸縣衛所錢糧就近併縣徴解附麻勒吉疏略江寧等十六衛原設守備十六員千總三十二員管理屯丁黃快丁錢糧查江寧等衛所屯丁黃快丁散在各州縣地方離省窵逺經管守千各官四逺催徴完納不前致逋國課今若歸各州縣就近徴比頑丁不致恃逺拖欠則糧賦易於完納且衛所本折錢糧不過二十萬散歸各州縣徴收每邑所增無幾又并入地丁考成不煩另案參罰誠為簡便况江西各衛屯田歸并之後軍民俱各稱便僉運亦無窒礙已有成效則江寧等衛丁田錢糧似應於康熙十二年為始照例歸并州縣徴收至管屯各官內千總三十二員均應裁去其掌印守備十六員若一概議裁恐運官無所統轄事務易至紛淆今應量留守備四員改為四衛分轄運千凡支領錢糧查造册結開報賢否一以守備印文為憑更屬允當其餘守備十二員應裁去以省糜費十三年準江蘇布政司使慕天顔請永行均田均役附慕天顔疏臣惟則壤定賦各有應輸之科徴而計畝當差始無偏枮之疾纍如江南州縣大者編户六七百里小者三四百里每里為一圗每圗有十甲此厯來定額之賦役也乃民間貧富不等所有田地多寡不齊若田多至數十頃而占籍止一圗或窮民僅有田幾畝而當差於一甲是豪户避役卸纍小民而隱占之弊生矣又或貧户苦纍不堪將本名田地寄籍於豪強户下以免差徭而詭寄之弊生矣又或蠧胥姦里覘知小民不諳户役之事包當里遞替納錢糧代應比較而包攬之弊生矣種種弊端皆因賦役不能均平之故耳夫均田均役之法通計該州縣田地總額與里甲之數將田地均分每圗若干頃畝編為定制辦糧當差田地既均則賦役自平即有科則輕重之别而按畝編甲其輸糧之數不甚相逺且不許豪户田多隱役苦纍小民此法自科臣柯日欽聳條議部覆奉令李復興行之最為得宜松民至今遵在案婁縣故稱之蘇松等屬倣照均編臣任江藩再三飭行無異但民間田地賣買不常每遇編審之期必應推收過割恐有姦蠧乘機炫惑有司變亂成法則貽害無窮若非奉天語警飭何以永著為例臣請均役聽民自相品搭充足敕行嗣後推收編審悉照均田里甲之數不許多田少役則隱占詭寄包攬諸弊可以永清實有益於民人矣抑臣更有請者有司徴糧若不分良頑混漏完欠并比差擾則小民難堪又查江南各屬田地山蕩灘塗等項名色繁多科糧有至六七十則不等是以刋布由單欵目冗細鄉愚全不知曉臣經詳明督撫設立徴收截票之法計算每户實徴糧銀分作十限清造截票按月限完一分於開徴日預給便民限單悉照由單編派數目刋列填寫明白俾民曉然自知本名應輸錢糧若干依限完納截票寧家印官止將未截者摘比事省而不致濫差數清而不擾良户恐法久弊生恭請敇行永遵者也是不第江南行之有益即直省通行可以興利除弊臣為賦役民生起見敢瀆宸嚴伏乞通飭施行敇部議覆徴收條約一行截票截票之法每户額徴計作十分按月一分一月又立三限按户算明照式填造俾糧户依限納銀入匱照數截票其截去者歸農未截者摘比良頑自分此憲檄頒行告誡諄切法至善也奈州縣各逞己見或不查截票而仍比甲催者或已截而仍摘全數或未截而漏摘頑户者或將截票收掌於糧書掯勒完户者或票雖截而簿未登混淆完欠者或不按應截之月限分數而任意差拿者或併花户不截欠數總歸里長甲催名下獨纍現年者其弊種種不一甚至陽奉隂違擅立滚單火票等項名色濫差厲民酷刑疊摘蠧書賣卯狼皂索費使已完之良民不獲寧家殊可痛恨今本司遵憲發截票格式著令該州縣守令造成用印令司匱吏書隨糧户完銀之時即登明流水對户截給遵限完者竟自寧家加至一月不截者印官親查票根存留未截之户按名差拘著令完截斷不許預行差押亦不許另立比簿並不許留前截後如欠户已完銀截票即免帶比若仍延抗方加責警或有急公良民能並完一年額賦或並納幾月幾限者即將本户之票照數截發量行奬勵以鼓舞輸將之衆總之票存則欠票去則完竟查票根而比簿可不設也務期有司殫力實行不墮姦胥術中則國課民生從此兩益矣一稽完欠截票之法既行專查花户之截與不截以分完欠有何不清乃仍有紛紛混摘者蓋因截法畫一糧書無作弊之竇皂快無索錢之門不便於己欲亂成規妄稱若照按月分限良户雖輸而頑户不前難應急餉於是印官受其煽惑遂不照分數而摘拿矣及比較之時止責甲催又不計完欠之多寡一概重加刑罰而比簿登數混淆並無實完實欠之數故糧户謂少完亦責多完亦責且受責不分輕重何必急公頑者自任其頑而良者亦化為頑矣今專行截票其存留未截之數一目瞭然不許用比簿不許比甲催於月終吊驗將未截頑户摘比如前月欠户於次月比較既除完户之名止將欠户稽比計通縣之户已少十之八九矣即極疲極頑之邑亦少十之六七矣若照通縣里排比較已省力大半且一月內上旬中旬下旬三限比較不截頑户身受三限之責尚有不完者乎但差催不截之户必須帶户赴比又在印官恪一遵行然後良頑允服至於流水號簿每見州縣數十里彚為一册其號至千萬之外難於稽核蠧書移圗換甲改户易數滋弊實甚本司昔宰錢塘立歸里流水之法每圖一本至今稱便行令所屬州縣一體置立逐里挨號登記不得仍將通區都圖完數總入流水一簿以杜牽溷一禁稱封凡設匱收銀糧户自封投匱永禁稱封令行亦不啻再三矣孰意州縣雖革匱吏稱收名色又改立銀鋪估色為名每遇糧户完銀勒赴鋪家經手稱銀入封鈐用私記甚至不論多寡必責傾成一錠銀匠火烙方許投匱於是縣市之積姦開張列肆擅握大戥銀色恣意估折加耗甚於吏收如此錮弊皆由官吏巧剝民膏先給圗記授意輕重間有增不如式啓封時佯喚銀鋪薄懲該鋪遂指出糧户姓名立拿重處小民聞風效命封封重勒户户私加是陽革稱封實則重耗也今本司照部頒法馬一樣較準官戥行州縣每里給發一把聽糧户將官戥稱準入封不許銀匠火烙銀鋪估色執戥封銀嗣後如有重勒害民及匱吏需索票錢者許被害糧户首告鋪匠匱役一併重究但州縣又以銀色青微及封內正數反虧為請者豈人之無良一至此乎此皆印官開勒耗之漸也應飭令州縣果有一二銀色低潮正數稍輕者不得動其原銀列名開數出示曉諭聽糧户補納不得差票拘拏倘敢虛開揑欠許即投告提取原封與糧户對認錠件訊實嚴究其銀色紋足毋論錠件準與收納不必每封傾成一錠致滋耗費一絶差擾差役之為害本司前經列示而州縣獨於糧里之中為尤甚如圖差區皂經催分管等名色各有不同總一役而異其名也因上行革去此等差名遂易一稱呼人仍其舊此輩盤踞衙門承襲頂首糧户甲催供其魚肉秋收夏熟飽其鯨吞一認役必開派使用數端一開倉必妄取公費幾兩而包收侵啖必纍重徴赴限應差又索東道此坐圖之差擾也而承票拘拿之虎役更有甚焉摘一户名先索見面錢臨比時完者亦云代候比較勒索酒錢若未完者則害不可名狀矣帶比受杖則有手輕錢照料錢正身營脫則有買囑錢代杖錢身經痛苦復要知會該房一票未銷再發籖差催皂層見疊出而前欠一兩用費至二兩正賦究竟未納蚩蚩愚氓何以自悮若此然必因撫字無方濫差所致今飭將州縣圖差區皂經催分管諸役名色實實革去斷不許留一積蠧於中先取印官甘結後有告發以縱庇論而未截票之頑户不得不差拘每里量差一役比完即銷如本月限銀三票俱不截者次月初旬即行拘比如止二票不截者姑俟中旬拘比一票不截者下旬拘比臨時激勸庶幾差拘之中又省差矣倘差役橫肆索詐計贓治罪惟勸良民早輸國課免剝啄之到門省漏巵之吹索矣是年命廷臣會議蘇松積欠應否差大臣往查分晰在官在民應追應蠲左都御史吳正治奏清查善後之策莫若減蘇松浮糧照常州府一例起科附吳正治疏題為錢糧積欠有由蘇松額賦偏重敬因清查之上諭請沛酌減之洪恩以除民生永纍以培萬世國本事伏念江南財賦之區我皇上因纍年積欠至二三百萬之多特官在民應追應蠲命廷臣會議應否差大臣往查分晰在皇上軫具見民至意臣思錢糧之所以積欠者固有其由念官不知民生困苦之原從事酌議則清理雖見於一時而拖欠仍貽於後日夫所謂積欠之由亦曰蘇松浮糧而已及今清查善後之策亦曰減蘇松之甚明浮糧而已蓋江南賦重甲於天下而蘇松兩府尤初洪武以張士誠竊踞姑蘇怒地方之附寇遂取民間租籍照額定課故蘇松額糧不惟與他省輕重懸殊即以接壤之常州一府較之亦加倍不止查常州府每畝科平米一斗五六升下至八升五升不等蘇松浮糧在故明雖已屢減然每畝科三斗七八升至三斗二升二斗五升不等下則之田亦科一斗九升夫田畝之所收非有異於别壤而輸科之逾額獨數倍於他方民力幾何其能堪此國在故明雖以私憾定重額原未嘗嵗嵗徴完今何家任土作貢取民有制普天率土應無異視奈踵前代之弊政而重困此一方民耶况查他省錢糧積欠並未有如江南之多者是浮增之糧額原非可完之數而必欠之數也今聽紙上之成數責有司以催科經催則無年不欠帶徴則纍案算完豈真民不急公吏不勤事也蓋賦重力竭實難全輸也前此屢經諸臣條奏未蒙允行在部臣不過以議減豁耳抑思賦詘由於民窮民國計為重不肯輕窮由於額重以每畝科至二三斗有餘之糧又有幫貼有條銀有丁銀有雜項差徭小民一嵗收穫不足供一嵗之徴輸一值追比嚴急則多方假貸剜肉醫瘡冀免敲撲日復一日則富者漸貧貧者益困而囂然喪其樂生之心萬一户絶丁逃為纍更大是浮糧病民而害且及國也在部臣又以蘇松積逋內有官役透冒非全屬民欠故未便議蠲耳抑思有浮糧是以有民欠有民欠是以有那移厯年那移借解欵項紛煩帶徴之官勢不免於參罰因與蠧役任意侵漁至於官更吏易頭緒淆亂侵欠難清何妨彼此分肥其透冒之弊不盡民欠未嘗不因民欠所致前此有司迫於考成以欠作完惟有揑報逮水落石出而官役褫革餉竟空懸是浮糧病民亦以病官而究無益於國也目今奉論清察侵欠自當難掩然一一面察之能一一而追之乎東南民力竭矣臣有以知其不能也故欲杜積欠之弊根必在於除故明重斂而後江南之民庶有起色從此年徴年足無民欠自無那移無那移自無透冒減浮蘇困正所以足額裕儲利民利國其道固相因也漢初田租三十而稅一故文景治致殷富論語曰百姓足君孰與不足百姓不足君孰與足我皇上視民如傷當茲旱暵之時實圖修省四海之內無不引領待澤請祈睿斷立沛松二府之浮糧酌量議減照常州府一例起科德音將蘇國輸納從此民力稍寬課日裕隆恩出自載被德無疆矣皇上億萬十四年以軍糈浩繁將江浙白糧暫為改折每石一兩五錢二十年奉恩詔白糧全徴本色起運準安徽巡撫徐國相疏請開墾之田寬限升科附疏略為請寬升科之限期以收開墾之實效事竊惟足國必先於足民而足民必先於力田未國有田野不闢而可足未息餉用浩繁則墾荒之法裕民者也矧值軍興所當汲汲講求以佐司農之仰屋臣查各直省之中惟江南浙西數府素少荒田而江北河南山東等處荒田未墾者甚多即如臣屬鳳廬安滁和五府州屬尚有積荒民屯田地九萬四千三百九十四頃三十一畝零合直省而計之不可勝計在小民豈不知無主荒田墾熟即為己業而年來報墾無幾其故何歟良以開墾荒田所需人力工本靡不數倍於耕種熟田而所獲花利又不能如熟田之豐盈統計數年之所收不能償初墾年之工本又安有餘息以輸賦稅故必寬以起科年限養其餘力使獲息足償工本然後責令升科庶幾墾者樂於從事今例內墾荒田地定限三年起科即嵗嵗成熟猶不能補償所費工本倘其間再遇水旱災傷益不能支持而年限已屆追呼踵至不惟生息全無反有剜肉醫瘡之困是以已墾者不獲遂其樂利之休未墾者咸有畏縮不前之念而荒田終不能盡闢也臣查三年升科之限雖屬舊例續於康熙十一年間經部覆前督臣麻勒吉地方之凋殘已極等事一疏準於六年後升科又康熙十二年欽奉上諭再加寬限通計十年方行起科仰見我失所之至意皇上軫念小民竭蹶開懇恐催科期迫或致普天之民無不歡欣鼓舞咸思務本盡力畎畝於是康熙十二十三十四年分臣屬安廬鳳三屬荒皇上寬田開墾至三千餘頃臣屬如此他省可知皆蒙正限起科培養民力之實效也嗣於康熙十五年月內部覆臺臣焦榮條奏將康熙十二年以前開墾荒地於十五年起科十三年以後開墾田地仍照前定例於三年後起科固為籌餉起見然升科之年分既迫而報墾者遂復寥寥如臣屬康熙十五年分止墾地五百六十九頃三十四畝零十六年分止墾地三百七十三頃七十四畝零在官非不加意督墾以冀紀敘也在民非不樂於開墾以收花利也總因措處工本物力艱難既慮三年之內豐歉難齊復恐三年之後催科緊迫故逡巡畏懼不敢認墾耳是三年升科之議雖為一時籌餉國之權宜而不能為裕為寬限庶可鼓勸人心查十足民之長策自宜量皇上格年起科乃蒙我敢率請過寬嗣後開墾田地合無外之仁臣亦不睿慈敕仰懇復六年後起科之例則追呼既緩自必人人部酌國樂趨將見野無曠土兵餉端有攸賴矣課日增寬民力以裕又準江蘇巡撫慕天顔疏豁免蘇松常等府版荒田地錢糧於康熙七年為始附慕天顔疏為坍荒賠纍無皇恩豁追亟請困以召天和事臣惟地震之變免蘇民皇上躬行修省事宜條奏臣思最重者首在恤民而恤民敇將應行應革之最苦最急者莫若豁免江南坍荒田地錢糧一事臣查蘇松常坍荒田地向來屢經勘駁實有三千餘頃合算共本折錢糧亦不滿十萬而因此賠纍反致欠多民情之隱苦實實不可勝言蓋坍者久成白水無土可問荒者磽瘠不毛無法可耕公占則係地入公家民已失業此種情形前撫臣及皇上洞臣任藩司時入覲條奏歷歷繪陳久蒙暇親勘故鑒止因兵興以來軍務倥偬前撫臣無議暫停俟事平之日議覆因循至今臣撫任三載正值軍需告急方在生節之時何敢再瀆宸嚴是以日切焦思而對此包賠之窮民赧顔無以自解臣故於自陳不職疏內首列此端為臣罪也然思皇上愛我惟恐一夫不獲恭逢下詔求言之日臣再不言民臣罪益深矣又念此坍荒錢糧如果可徴賠臣又何敢即言奈何有糧無田有户無人歷年地丁條折原無完納委係紙上虛數不豁亦無完豁之可免纍耳惟漕糧一項徒纍里甲里甲因此包賠逃亡株連不知凡幾官役因此漕欠那移墊買每致難清完猶不完也三吳賦重額繁保無頑梗拖欠然每嵗考成計民間零星尾欠積纍而有數萬或災患不時民力困竭逋逃者又數萬總以四百餘萬之額徴而論亦不可謂之頑矣此有户有田之欠數仍可於年限續完惟坍荒所欠萬萬無從責特恩蠲賠臣前於備陳舊欠無徴等事一疏具題蒙如長停者即此坍荒在內也今查前勘坍荒數內洲縣田地新經丈清升補無缺不議外太倉常熟崑山嘉定華亭上海婁縣青浦宜興九州縣確有皇上大坍荒未豁臣請豁容臣再加覆勘細數造册報部沛恩綸特準開從康熙十七年起扣免於民毋容纎毫揑冒此係永逺蘇困培我國家萬年之樂利非比一時之蠲停將見渙汗一頒民之歌舞雷動於三吳豈不可坐致休祥也哉二十四年準江蘇巡撫湯斌疏陳逋賦難清乞減定賦額並另立賦稅重地州縣官考成例附湯斌疏臣惟財賦為國家根本之計而蘇松尤為財賦最重之鄉臣以庸碌謬撫茲土見錢糧纍年逋欠每當奏銷之期多者嘗欠至五十餘萬最少者亦不下三四十萬夙夜疚心懼無以仰佐國計恆惴惴不安初疑官吏之怠玩繼疑豪強之頑梗乃一載以來詢問耆碩體察民隱間嘗巡行阡陌訪田則之髙下考徴科之多寡然後知蘇松逋賦實由民力維艱斟酌調劑貴在及時敢悉心為皇上陳我蘇松土隘人稠一夫所耕不過十畝而倚山傍之湖旱潦難均即豐稔之嵗所得亦自有限而條銀漕白正耗以及白糧經費漕贈五米十銀雜項差徭不可勝計而仰事俯育婚嫁喪葬俱出其中終嵗勤動不能免鞭撲之苦故蘇松俗好浮華而獨耕田輸稅之農民艱難實甚兩府與常鎮嘉湖壤地相接而賦額輕重懸殊即江浙閩楚並號財賦之鄉區區兩府田不加廣而可當大省百餘州縣之賦民力所以日絀也夫二府田賦之重固起自明初臣嘗考洪武年間籍沒張士誠將士誠産號為官田賦額特重而民田之起科較輕永樂以後漕運愈逺加耗滋多宣德正統間巡撫周忱奏減蘇州租七十餘萬石松江租三十餘萬石民困稍蘇至嘉靖初蘇州知府王儀請行均田之法盡括官民田而裒益之當時稍救官田之弊但正耗兼配科則繁雜吏易為姦其後以耗米作為正糧又運綱諸費額外取之於民因時派徴又如所謂九釐地畝之類日漸增益非復正嘉以前之舊至啓貞時軍餉孔殷加派日繁民不堪命矣本朝定鼎田賦悉照萬厯年間則例盡革明末無藝之徴洵稱救民水火近年因時制宜如白糧經費運軍行月永折加價等項載在全書其官收官兑之法最稱便民不可更易然亦因明朝賦重役繁以耗作正不得已為此補救之計而民力則已殫也順治初年錢糧起存相半考成之例尚寬後因兵餉急迫起解數多又定十分考成之例一分不完難逭部議以四十餘萬錢糧之州縣至與小縣錢糧不上數千或僅一二萬者一例考成官斯土者雖賢如黃霸魯恭何能自免謫譴夫人千里而來為吏誰肯以催科無術甘心廢棄一存顧恤功名之念則展轉茍且之計必生或以存留而抵起解或以此項而借彼欵或以新糧而抵舊欠參罰期迫則以欠作完賠補維艱又以完為欠種種弊竇莫可究詰一經發覺身家俱喪官之更代日勤蠧胥因之作姦頭緒紛淆侵漁任意雖嚴加追比究之欵額空懸惟二十二年適遇嵗豐二十三年荷蒙聖恩蠲漕故僅有一二縣地丁全完而他項仍多挂欠又以年外報完未副議敘之例夫人才力不甚相逺豈他省之吏幹濟獨優而蘇松之官催科偏拙良以百姓之脂膏既竭則有司之智勇俱困而前途之功名絶望則官針之砥礪難期心已灰矣地方何賴吏治人才皆足惜也積欠年久惟待赦蠲我國家𢎞敷大賚每一赦詔蘇松免租多者百萬少者七八十萬是糧額雖重原非可完之數與其赦免於追呼既窮之後何若酌減於徴比未加之先使得完肌膚而樂輸將自無損國家嵗入之實數乎蘇松版荒所在多有臣嘗委官逐一踏勘非盡石田不可耕也秖因田不抵賦力難任役人户逋逃數家株纍小民畏懼而不敢承佃倘蒙皇恩稍賜寬減其孰不踴躍復業數年之後按畝升科將見田額漸增國賦日裕是蠲無益之虛額而收墾田之實課也前此諸臣纍纍陳請適當軍興旁午餉需告匱之日皇上德且俱言前朝苛政欲復宋元之舊事勢難行今賴威逺播海表日出之邦絶域不庭之國莫不稽手國來享奉琛恐後斯正本之時上年家休養蒸黎培植根鑾輿親巡洞見村落蕭條深軫仁厚澤淪肌浹髓白叟黃聖懷又蠲漕免丁帶徴積欠深童感極而泣以為生逢堯舜之主視民如傷若地方官能以民艱上聞必當大沛恩膏起三百年之痼疾臣身在地方義無可諉不敢逺引宋元之説亦不敢比常鎮嘉湖之例惟叩懇我皇上念民力之已竭察虛額之無益宸衷獨斷渙發德音及此纂修簡明全書之時博集二廷議將蘇松錢糧合盤打算各照科則量減一分定適中可完之實數無存過重必欠之虛額更將科則稍加歸併使簡易明白便於稽核或將賦額最重州縣另立勸懲之典不與小縣一例考成使守令知可以久任可以升遷不至茍且因循事務廢弛庶幾野無不耕之土户無不完之租民力裕而吏治清賦稅充而國用足億萬年太平無疆之休端在是矣臣非不知賦額久定未便更張但體國經野貴永久而無弊茍有未善正宜變通况前代之苛政乎我皇上神聖立極事事垂法萬世此尤關國計民生之大者宏謀逺算總自睿裁非微臣所能仰贊也二十六年命纂修簡明賦役新書科臣劉國黼疏乞各省田地賦役大小等則逐一注明附劉國黼疏略臣辦事户垣見各省起科則例有大地小地上中下地之殊有一二等至六七等三四則至數十則之别不但各省不同即一省之中各府各州各縣亦多互異蓋地形有髙下平陂土性有沙鹵肥瘠古人則壤成賦固不能強之使同也但全書之內將各則田地注明折數者固多而遺漏未注者亦復不少臣江南揚州人也即以揚屬而論江都之田一萬七千餘頃額徴銀五萬餘兩全書已注明折數矣若髙郵田二萬五千餘頃額徴銀四萬一千餘兩泰州田九千餘頃額徴銀四萬四千餘兩非泰州之田僅髙郵三分之一非泰州之賦重於髙郵三倍也蓋泰州大地而髙郵小地也又如興化田二萬四千餘頃額徴銀二萬八千餘兩寶應田二千餘頃額徴銀二萬餘兩非寶應之田僅興化十分之一非寶應之賦重於興化十倍也蓋寶應大地而興化小地也小地則一畝為一畝大地則數畝折一畝一畝為一畝則賦輕數畝折一畝則賦重而全書之內皆未經注明也今獲遍覽各省全書始知大地小地未經注明者不獨臣鄉然也臣謂錢糧欵項不可不簡而田畝大小尤不可不明乞敇下纂修新書諸臣將大小等則逐一注明江南全省田賦原額田地山塘蕩漊塹塗墩灘等項一百一十五萬七千一百四十六頃四十畝有竒雲霧荒山一十六頃三畝九分草山一千七百二十九里有竒馬田一百七十一頃屋基一百六十二間半畝桑絲一千六百六十三兩六錢鹽鈔六千六百七十八口除原荒並節年水淹堤占挖廢坍江坍海田地二十萬九千七百七十二頃五十八畝有奇又松滁二府州屬折實成田折去一千三百七十五頃五十六畝有奇節年開墾升科田地一萬三千九百六十四頃八十六畝有奇順治十四年實額田地九十五萬九千九百六十三頃一十二畝有奇雲霧荒山一十六頃三畝九分草山一千七百二十九里有奇馬田一百七十一頃屋基一百六十二間半畝桑絲一千六百六十三兩六錢鹽鈔六千六百七十八口節年拋荒坍江坍海遷沙堤占水沈田地二萬九千二百三十五頃九十二畝有奇又廬鳳和三府州屬折實成田折去二萬七千九百一十四頃一十七畝有奇節年丈增墾荒溢額並蘆洲轉則升田又歸併海門鄉及潁州潁上二衛所田地八萬七千四百六十二頃一十一畝有奇開墾草山八百六十三里有奇康熙二十二年實額田地九十九萬二百七十五頃一十五畝一分四釐有奇雲霧荒山一十六頃三畝九分草山二千五百九十三里一分有奇馬田一百七十一頃屋基一百六十二間半畝桑絲一千六百六十三兩六錢鹽鈔六千六百七十八口節年坍荒開河堤占水沈田地一萬六千五百八十頃四十六畝八釐有奇又鳳六亳三府州屬折實成田折去三千九百二十二頃一畝二分八釐有奇節年升增溢額田地並蘆草田蕩五萬三千三百七頃二十六畝七分四釐有奇開墾草山四百二十六里九分有奇又金壇縣報荒未豁田二百三十三頃三十畝三分九釐有奇泗州新淤地畝二百五十四頃九十九畝五分二釐有奇雍正十三年實在田地一百二萬三千五百六十八頃二十四畝四分三釐有奇雲霧荒山一十六頃三畝九分草山三千二十里有奇馬田一百七十一頃屋基一百六十二間半畝桑絲一千六百六十三兩六錢鹽鈔六千六百七十八口額徴稅糧地畝徭里條鞭折色帶閏補徴時價並雲霧山租鹽鈔等銀內除雍正三年蒙特恩蠲免蘇松浮糧銀四十五萬外實徴銀四百六十八萬一千七百二十五兩八錢六分八釐六毫有奇遇閏加銀三萬七十六兩二錢二分二釐六毫有奇人丁攤入地畝銀四