body:
  text: 江南通志卷一百九十二藝文志子部儒家兵謀雜說隂陽類選農圃政術醫家刑法雜藝道家釋家漢淮南子二十一卷淮南劉安新語二卷彭城陸賈新序三十卷說苑二十卷說老子四篇俱彭城劉向東漢新論十七卷沛國桓談本傳作二十九篇三國太𤣥經注十卷吳陸績太𤣥經注十三卷吳陸凱新論十二卷吳毗陵顧談唐志作五卷新議八篇吳沛郡薛瑩典訓十卷典語别二卷俱吳陸景諸葛子五卷吳諸葛恪默記五卷吳張儼秦子三卷吳秦菁矯非論三十篇廣陵范愼晉言道十篇審機俱吳郡陸喜默語三十篇陽羡周處新論十卷辨道二卷俱廣陵華談新論十卷譙夏侯湛三統五德論二卷譙曹思文南北朝褚氏遺書齊廣陵禇澄正覽六卷梁建康周捨唐皇太子諸王訓十卷吳郡丁公著君臣圖翼二十五卷吳郡陸淳辨疑志三卷吳郡陸長源正論十五卷丹陽儲光羲續經說彭城劉迅續說苑十篇彭城劉貺南唐質論一卷廣陵徐鉉法言十卷劉鶚宋孔孟衍語平江張慶之樂閒格言平江龔昱時習編書志編俱平江王萬廣文三卷虞山瞿汝文寶鑑論江隂吕棐芻言五十篇巵言集五卷俱宜興蔣之奇老莊本旨丹陽洪興祖京口七原略丹徒朱叔寶確論十卷金壇張綱直說五十篇金壇丁明睟盎録金壇趙時侃天鬻子要論一卷維揚李易閒靜治本論五卷維揚張巖懶真子五卷維揚馬永卿芹宮講古三卷高郵陳造張子巵言真州張汝明洙南子徐州顔太初儒術通要經濟樞言俱徐州劉顔鬻子注一卷如臯王觀讀書記歙曹涇參同契解一卷婺源朱子潛虛發微婺源張敦實菊坡言志録婺源洪樽山窗業書婺源李繒太湖十義刻象宣城梅致和讀書通說寧國鄭魏挺知非集精金訓鑑童䝉記俱貴池葉楠家法三卷青陽方綱北山戅議一卷無為王遘河南師說十卷潁川韓元吉元原道集還原奧旨俱平江王圭澤物編親民編俱平江周文英思賢録五卷懷古録三卷辨惑編三卷俱武進謝應芳格物擇善録嘉定秦輔之先儒宗旨望江方用稽古編婺源汪逢辰太𤣥潛虛圖說婺源吳霞舉人倫事鑒婺源胡一桂明願學編寶唐語録俱上元李登淵學探微十二卷上元金潤養正圖解上元焦竑懲忿編窒欲編俱江寧殷邁三黨編江寧沈越讀書史會要江寧徐霖忠孝說義江寧陳芹棲霞語録青原語録俱江寧倪嘉慶古今類說六十卷江寧司馬秦續百川學海八十卷江寧司馬泰梅純姚咨五倫啓䝉六合劉閔藏書通讀書通俱六合孫國敉學基學統俱六合章愍讀書要語集三卷長洲王億理學述言長洲趙文辨惑編厚倫集匡正録俱長洲顧亮順應篇長洲顧存仁簡文編崇正編俱長洲伍袁萃懷賢録一長洲黃省曾一崑山沈愚維俗議從先議一一篇覺迷論原教論正續三卷俱長洲管志道莊渠語録師說俱長洲魏校學聚録吳江杜偉讀書疑二卷吳江張基正學編一吳江杜偉一婁縣吳稷緯學辨義吳江葉紹袁訓釋伊洛精義常熟陳宏讀書記常熟連鑲心說主一稿俱常熟陳交求仁至言常熟陳九疇經傳史通常熟錢汝孝人倫師表坐道論二卷俱崑山沈魯我非說自訟録俱崑山顧咸建談經録崑山楊無咎俟後編崑山王敬臣道學統系圖家祭儀俱崑山殷奎家訓一卷西齊日録俱華亭周思兼質疑録華亭莫如忠味道編性學總論省言俱華亭錢大復賢王針華亭吳稷為徽王作省愆日録華亭陳仲山吳生叢語華亭吳炯古今醒語華亭王明時三才圖㑹說一百六十卷古今考二十二卷俱青浦王圻信古餘論庸齊日記俱青浦徐三重薛子庸語武進薛應旗儒編六十卷武進唐順之讀書劄記武進徐問霞舟語録武進吳鍾巒家訓無錫高攀龍依庸堂絮語無錫劉元珍三才通考無錫秦汴尚論編無錫王達古學類編無錫余璿日省餘録無錫顧起經成均彀語無錫周子美定性書無錫邵寶經正録無錫張雲鸞戶牖針言無錫強仕辨思録古今要言俱無錫秦涵過庭直訓讀書紀要俱無錫王表讀書類無錫秦鉽荷橋子無錫談縉㑹解商語庭學愛日俱無錫張夢時心學淵源録江隂薛甲東家子十二篇江隂孫作泉上語録宜興吳正志玉池語録宜興史孟麟五倫分疏宜興王升語録丹徒朱錫中說一金壇于鑑一寶應宗周理學纂要江都朱曰藩金華正學編江都趙鶴彚聞驚心録江都孫世恩願體集江都史典㑹心言一江都王納諫一高郵孫兆祥二劍齊目編江都張懋勳一菴㑹語泰州王棟仁孝仕學訓泰州羅汝芳五倫解五卷子臣心鑑五卷俱高郵孫兆祥龍沙㑹語淡臺祠證學俱儀徴林之翰樂吾集四卷興化韓貞先正訓䝉興化李春芳驚心録沛縣趙時若異端辨稽古録俱太倉沈璵忠雅太倉龔持憲讀書後二卷太倉王世貞求道録切已録同善㑹語俱太倉陳瑚彚古編閒居觀省録俱嘉定宣光祖陶菴語録我師録俱嘉定黃淳耀傳道録海州張朝瑞古今學要通州姚繼嵂清越樓日録桐城陳朝棟桐彝續庸言邇訓俱桐城方學漸日省録一桐城何塘一潛山丁一陽省克録潛山金藻敬思録我師篇俱潛山丁一陽克已録潛山涂榮臺訓兒録宿松方際明翼言歙縣汪有光崇孝編歙縣汪祚讀書一得歙縣黃訓學言二卷歙縣許鈇廣資録歙縣汪尚寧緒言一歙縣許楚一婺源洪垣格言彚編休寧范泓正學辨休寧汪循間辟録休寧程曈自知録休寧方廷珊知新保和二書休寧畢瀚論學質言休寧金人龍遺範録休寧程敏政范子哤言休寧范淶修身格言一休寧淩雲鵬一宣城李繁春增校類編婺源汪舜民省愆録婺源潘珍三才蠡測婺源余自怡遵行録婺源汪起鵬畜德録一婺源汪尚和一婺源汪一桂近居録婺源汪世育門人問答録婺源吳文光歸養録全歸録俱婺源王夀天關證學録婺源詹軫光北山言行録婺源汪儼克已正䝉録婺源胡珙少源語録婺源余懋衡觀俗膚語婺