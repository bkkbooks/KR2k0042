body:
  text: 江南通志卷一百九十八雜類志摭史紀事江南在古為徐揚之境商周而降列於荆蠻至德端委而文明乃啟矣然漢起豐沛自孫吳六代下及元明搶攘代有盖濠泗彭城南北咽喉金陵都㑹廣陵阻江昔人所謂財賦之饒無事資其利有事啟其爭者也聖神御宇車書大同鼉鼓鯨雷萬里恬息敢忘所自乎志摭史紀事唐虞禹平水土徐州淮沂其乂揚州三江既入震澤底定夏禹㑹諸侯於塗山執玉帛者萬國塗山在今鳯陽府懐逺縣見山川商泰伯奔荆蠻自號勾吳在今金匱縣梅李郷荆蠻義之從而歸之千餘家立為吳泰伯泰伯卒無子弟仲雍立仲雍卒子季簡立季簡卒子叔逹立叔達卒子周章立是時周武王克商求泰伯仲雍之後得周章周章已君吳因而封之周章傅十三世至壽夢而吳始益大稱王周吳楚構兵簡王十二年魯成公十七年吳人圍巢伐駕圍釐虺杜註巢駕釐虺楚四邑按巢即居鄛故城在巢縣東北五里駕釐皆在無為州境虺在沛縣南六十里靈王二年魯襄公三年楚子重伐吳克鳩兹至於衡山按鳩兹在蕪湖縣東三十里衡山在今當塗縣俗名横山去鳩兹不逺靈王十二年魯襄公十三年吳侵楚戰于庸浦地名考庸浦今無為州江浦靈王十三年楚子囊師于棠以伐吳吳人自臯舟之隘要而擊之獲楚公子宜穀棠今六合縣臯舟吳險阨之道靈王二十三年楚子為舟師以伐吳無功而還靈王二十四年吳子諸樊伐楚門于巢靈王二十五年楚侵吳及雩婁聞吳有備而還杜註雩婁今屬安豐郡按今在霍丘縣西南景王七年魯昭公四年楚使屈申圍朱方克之吳伐楚入棘櫟麻楚箴尹宜咎城鍾離薳啟疆城巢然丹城州来以備吳通典朱方今丹徒杜註棘櫟麻皆楚東鄙邑地名考鍾離南北朝屬徐州治明為鳯陽縣地巢見上州来下蔡縣按今在壽州北四十里景王八年楚伐吳越師㑹楚子靈王于𤨏吳人敗諸鵲岸楚子遂觀兵於坻箕之山杜註𤨏楚地在今霍丘縣東鵲岸廬江舒縣有鵲尾渚坻箕之山在巢縣南三十里景王九年楚伐徐吳救之楚令尹子蕩帥師伐吳師于豫章而次于乾溪吳人敗其師於房鍾杜註乾溪在譙國城父縣南按城父舊城在亳州南三十里房鍾在壽州䝉城今屬潁州府景王二十年楚人及吳戰于長岸地名考今太平府西南五十里東梁山與和州南七十里之西梁山夾江相對如門亦曰天門山為楚獲餘皇處敬王元年魯昭公二十二年吳楚戰于鷄父杜註鷄父楚地安豐縣南有鷄備亭按在壽州西南六十里敬王二年楚子為舟師以畧吳疆師還吳踵楚遂滅巢及鍾離敬王五年吳子因楚喪使公子掩餘公子燭庸伐楚圍潛楚莠尹然工尹麇帥師救潛杜註潛楚邑在廬江六縣西南按潛即今灊山在霍山縣南敬王九年吳侵楚伐夷侵潛六楚救潛吳師還楚師遷潛於南岡而還注南岡即漢灊縣處敬王十二年魯定公二年吳使舒鳩人誘楚以伐桐敗楚師于豫章遂圍巢克之杜註桐小國廬江舒縣按今桐城也敬王三十一年魯哀公六年吳伐陳楚救陳師于城父按城父在亳州南已見前敬王四十年楚子西子期伐吳及桐汭杜註宣城廣德縣西南有桐水出白䂖山西北入丹陽湖按廣德今州名敬王四十一年吳人伐慎白公敗之杜註慎汝隂慎縣按今潁上縣西北有慎城闔廬遷都姑蘇壽夢有子四人長曰諸樊次曰餘祭次曰餘昧次曰季札季札賢而壽夢欲立之季札讓不可於是乃立長子諸樊攝行事諸樊除喪讓位季札季札謝之不可棄其室而耕乃舎之十三年王諸樊卒有命授弟餘祭欲傳以次必致國於季札封季札於延陵號曰延陵季子十七年王餘祭卒弟餘昧立王餘昧四年卒欲授季札季札讓逃去乃立餘昧之子僚為王公子光者諸樊之子也常以為吾父兄弟四人當傳至季子季子即不受國光父先立光當立隂納勇士專諸欲以襲王僚十三年吳因楚喪伐之為楚兵絶後而不得還光因伏甲士於窟室而謁王僚飲使專諸刺王僚殺之公子光竟代立為王是為吳王闔廬遷都姑蘇今蘇州府之長洲縣越入吳王闔廬五年伐越敗之十九年夏吳伐越越王勾踐迎擊之檇李敗之姑蘇傷吳王闔廬指傷而死立太子夫差二年悉精兵伐越敗之夫椒報姑蘇也越王勾踐以甲兵五千人棲於㑹稽使大夫文種因吳太宰嚭而行成伍子胥諫不聽卒許越平與盟而罷兵七年北伐齊敗齊師於艾陵十一年復北伐齊越王勾踐率其衆以朝吳厚獻遺之十四年春吳王北㑹諸侯於黄池欲霸中國六月戊子越王勾踐伐吳乙酉越以五千人與吳戰虜太子友丁亥入吳吳人告敗於王夫差乃引兵歸國與越平二十年越王勾踐復伐吳二十一年越圍吳二十三年十一月越滅吳春秋兵爭平王五十年魯隱公二年莒人入向杜註向小國也譙國龍亢縣東南有向城今其故城在懐逺縣西北惠王二十年魯僖公三年徐人取舒杜註舒國今廬江舒縣其故城在廬江縣東一百二十里按舒臯陶之後族衆故曰羣舒羣者舒庸舒蓼舒鳩舒鮑舒龔也孔疏曰蓼在安豐羣舒在廬江漢時舒為廬江郡治襄王七年魯僖公十五年楚人伐徐敗徐於婁林杜註徐國今下邳僮縣按泗州北八十里有古城相傳徐偃王築即此婁林徐地下邳僮縣東南有婁亭襄王九年齊人徐人伐英氏杜註廬江郡六縣西有英氏城按六縣今之六安州也襄王十五年楚伐陳取焦夷城頓而還杜註焦今譙縣夷一名城父頓國名今汝隂南頓縣襄王三十年魯文公五年楚人滅六滅蓼頃王四年魯文公十二年楚人圍巢昭王二十四年吳滅巢定王六年魯宣公八年楚人滅舒蓼定王十年楚子滅蕭杜註蕭宋附庸國簡王十二年魯成公十七年楚人滅舒庸簡王十三年楚子鄭伯伐宋宋魚石復入于彭城簡王十四年魯襄公元年諸侯圍宋彭城且伐鄭楚子辛救鄭侵宋呂留杜註呂留二縣屬彭城郡按呂即呂梁城在徐州北五十里留為張良遇漢髙處靈王二十四年魯襄公二十五年楚屈建帥師滅舒鳩景王十八年魯昭公十六年齊師伐徐至於蒲隧徐人行成杜註下邳取慮縣有蒲如阪今虹縣北景王二十一年莒子奔紀鄣杜註紀鄣莒邑也東海贛榆縣東北有紀城敬王二年魯昭公二十五年楚子使薳射城州屈復茄人焉使熊相禖郭巢為巢築郭地名考州屈在鳯陽縣西茄其近淮小邑也敬王五年吳公子掩餘奔徐公子燭庸奔鍾吾應劭曰古鍾吾國也後漢屬下邳按今邳州宿遷縣西北司吾鄉即其地敬王七年吳子使徐人執掩餘使鍾吾人執燭庸二公子奔楚吳子怒滅徐徐子章禹奔楚楚城夷而處之註夷今泗州敬王九年吳伐夷敬王二十五年魯定公十五年楚滅胡杜註汝隂西北有胡城㑹盟諸所桓王二十三年魯桓公十五年公㑹宋公衛侯陳侯于袲杜註桐縣西南有袲亭簡王十年魯成公十五年叔孫僑如及諸侯之大夫㑹吳于鍾離景王十一年魯昭公八年大蒐于紅註蕭縣西有紅亭敬王三十七年魯哀公十二年公㑹吳于槖臯衛侯㑹吳于鄖註槖臯今巢縣鄖今如臯縣顯王四十六年秦張儀及齊楚相㑹于齧桑註齧桑今沛縣楚滅越顯王四十六年楚威王興兵伐越大敗之殺越王無疆盡取吳故地越以此散諸族子爭立或為王或為君濵於江南海上秦漢楚並起秦二世元年九月沛父老率子弟共殺沛令迎劉季立為沛公二年冬十月秦泗川監平將兵圍豐沛公與戰破之令雍齒守豐十二月魏人周市略地使人招雍齒齒即反為魏守豐沛公攻豐不能取時章邯别將司馬尼北定楚地屠相至碭沛公與戰蕭西不利收兵攻碭取之還軍豐聞項梁在薛從騎百餘往見之梁與之卒五千人五大夫將十人還攻豐抜之二世元年七月陳涉等起大澤中在沛郡鄿縣其九月楚將項燕子項梁同兄子籍起兵於吳中使人收下縣得精兵八千人渡江而西東陽長陳嬰以兵屬項梁梁渡淮黥布蒲將軍亦以兵屬焉凡六七萬人軍下邳當是時秦嘉立景駒為楚王軍彭城東梁謂軍吏曰陳王先首事今秦嘉倍陳王而立景駒逆無道乃進擊秦嘉并其軍將引軍而西召諸將㑹薛計事此時沛公亦起沛往焉居鄛人范増說項梁立楚懐王孫心為楚懐王梁自號武信君再破秦軍有驕色為秦將章邯所破死項羽沛公乃與將軍呂臣引兵而東徙懐王自盱眙都彭城呂臣軍彭城東項羽軍彭城西沛公軍碭漢元年十月沛公兵遂先諸侯破秦降秦王子嬰正月項羽欲自王先王諸將相立沛公為漢王自立為西楚霸王王九郡都彭城漢平西楚漢王二年春漢王部五諸侯兵常山河南韓魏殷凡五十六萬人東伐楚入彭城項王以精兵三萬人南從魯出胡陵至蕭晨擊漢軍而東至彭城日中大破漢軍追擊至靈璧東睢水上圍漢王三匝於是大風從西北起折木發屋揚沙石窈㝠晝晦逢迎楚軍大亂漢王乃得與數十騎遁去五年冬十月髙祖與諸侯兵共擊楚軍與項羽决勝垓下淮隂先合不利却孔將軍蓼侯孔熙費將軍費侯陳賀縱楚兵不利淮隂侯復乗之大敗垓下使騎將灌嬰追殺項羽東城遂略定楚地以魯公禮葬項羽平淮南髙帝十一年七月淮南王黥布反東并荆王劉賈地北渡淮髙帝自往擊之十二年十月髙祖已擊布軍蘄西㑹甀蘄之鄉名布走令别將追之擊布軍洮水在江淮間南北皆大破之布與番君婚以故長沙成王臣使人誘殺布兹鄉民田舎平吳楚七國景帝元年鼂錯為御史大夫請諸侯之罪過削其地削楚之東海郡削吳之豫章郡㑹稽郡趙之常山郡膠西之六縣漢廷臣方議削吳吳王濞恐削地無已因以此發謀說膠西膠東菑川濟南趙楚同反天子乃遣太尉條侯周亞夫將三十六將軍往擊吳楚亞夫使弓髙侯等將輕騎兵出淮泗口絶吳楚兵後食道吳兵饑數欲挑戰終不出後吳奔壁東南陬太尉使備西北已而其精兵果奔西北不得入吳兵既餓引而去太尉追擊大破之吳王濞棄其軍與壯士數千人亡走保於江南丹徒漢兵乗勝遂盡虜之降其縣購吳王千金月餘越人斬吳王頭以告凡相守攻三月而吳楚破平後漢平江淮更始二年冬十月梁王劉永㨿國今碭山縣起兵攻下濟隂山陽沛楚淮陽汝南凡得二十八城光武建武元年十一月劉永稱帝更始琅琊太守王閎定贛榆等六縣二年秋八月盖延克永睢陽永奔譙延與戰於沛西大破之永走保湖陵今沛縣西北延遂定沛楚臨淮三年二月劉永立董憲為海西王夏四月劉永將蘇茂為吳漢所破走還湖陵虎牙大將軍盖延圍劉永於睢陽七月盖延拔睢陽獲劉永五年三月平敵將軍龎萌反與憲連和攻破彭城今徐州東南六月帝幸䝉七月帝幸沛進幸湖陵大破憲八月徇彭城下邳今邳州吳漢進圍朐今海州六年拔之斬董憲龎萌八年夏四月張步奔臨淮謀亡入海陳俊擊斬之平揚徐盜賊順帝漢安元年九月廣陵盜賊張嬰等宼郡縣二千石不能制以張綱為廣陵太守綱單車之職徑詣嬰壘門嬰大驚綱以書喻嬰請相見嬰乃出拜謁綱好語之明日將所部萬餘人與妻子面縛歸降二年十二月揚徐盜賊攻燒城市殺略吏民建康元年八月揚徐盜賊范容周生等宼掠城邑屯㨿厯陽按今為和州為江淮巨患遣御史中丞馮緄討之九月揚州刺史尹耀九江太守鄧顯討賊范容於厯陽敗歿十一月九江盜賊徐鳯馬勉等攻燒城邑築營於當塗山中十二月九江黄虎等攻合肥冲帝永嘉元年春正月廣陵賊張嬰等復反攻殺堂邑江都長九江賊徐鳯等攻殺曲陽東城長三月九江都尉滕撫討馬勉范容周生大破斬之四月丹陽太守江漢擊破賊陸宮等秋七月廬江盜賊攻盱眙滕撫遣司馬王章擊破之冬十一月中郎將滕撫擊廣陵賊張嬰破之厯陽賊華孟攻殺九江太守楊岑滕撫率諸將破斬之揚徐平曹操謀誅董卓起兵初董卓表操驍騎校尉操易姓名東歸至陳留散家財合義兵誅卓靈帝中平六年冬十二月操起兵已吾不利於滎陽還家募兵揚州刺史陳温丹陽太守周昕與兵四千餘人還到龍亢士卒多叛去至銍建平復收兵得千餘人進屯河内曹操擊陶謙初曹操父嵩為徐州刺史陶謙别將張闓所殺獻帝初平四年秋操擊謙攻拔十餘城至彭城大戰謙敗走郯操坑殺男女數十萬口於泗水水為不流遂攻取慮故城在今邳州西南睢陵邳州東南夏丘今虹縣皆屠之興平元年夏四月操復攻陶謙拔五城遂略地至東海還為劉備所要操擊破之遂攻拔襄賁所過多所殺戮曹操擊呂布初操領兖州牧獻帝興平元年兖州叛迎呂布二年春操攻拔定陶時劉備領徐州刺史屯小沛布奔之建安元年布襲備取下邳備奔操三年操東擊布冬十月屠彭城進至下邳大破布布聽陳宮固守操决泗沂水灌城遂擒布宮皆殺之曹劉攻袁術初術為曹操所破奔九江殺揚州刺史陳温領其州獻帝初平四年進兵封丘復為操所破走壽春建安元年與劉備爭徐州戰於盱眙㑹備為呂布所襲還去二年術遂稱帝夏五月呂布擊破之秋九月曹操擊術術棄軍走留其將橋㽔等拒操操擊斬之術走渡淮遂衰四年六月遣使歸帝號於袁譚譚迎術欲從下邳北過劉備要之復走壽春嘔血死孫䇿兄弟據江東初長沙太守孫堅以討賊功封烏程侯獻帝初平元年與後將軍袁術合兵討董卓二年堅破董卓軍又破呂布軍於洛陽冬十月術使堅擊劉表為其將黄祖射死四子䇿權翊匡䇿年十七見袁術術竒之以堅餘兵還䇿令攻廬江太守陸康拔之興平二年揚州刺史劉繇遣將屯横江當利今和州以拒術䇿請擊繇術許之表䇿折衝校尉䇿渡江轉鬬所向皆剋遂破秣陵攻劉繇於曲阿繇走豫章䇿威震江東術表䇿行殄宼將軍建安元年袁術僭號於壽春䇿沮之不從遂與絶二年夏五月司空曹操拜䇿騎都尉襲爵烏程侯使與呂布討袁術三年定丹陽郡之涇西六縣降劉繇將太史慈及祖郎四年襲皖城克廬江其守劉勲奔曹操擊黄祖徇豫章下之初䇿殺吳郡太守許貢貢奴客潛民間欲為報讐五年夏四月䇿出獵奴客伏而射之中頰創甚呼弟權佩以印綬命張昭等輔之十三年權討丹陽黟賊陳僕等平之以其地為新都郡十六年權自京徙治秣陵明年改名建業作濡須塢二十二年權遣陸遜討丹陽山越平之二十五年權遷都鄂改名武昌黄龍元年九月還都建業使陸遜輔太子登守武昌甘露元年遷都武昌明年仍還建康三國魏吳構兵初孫䇿死操欲乗喪伐之聽張紘言表權討虜將軍㑹稽太守獻帝建安七年秋責權任子權不受命十三年冬曹操自江陵東下權遣周瑜魯肅等與劉備逆擊於赤壁大破之操引還十二月孫權圍合肥十四年秋七月曹操軍合肥開芍陂屯田十八年春正月曹操擊權進軍濡須口號四十萬權與操牋言春水方生公宜速去操引軍還十九年夏閏五月權親攻皖城拔之還屯尋陽秋七月曹操擊權八月權攻魏合肥二十二年春正月曹操擊孫權軍三月權降二十四年以孫權為驃騎將軍假節領荆州牧黄初三年八月權遣使稱臣於魏送于禁等還魏封權為吳王加九錫吳遣都督趙咨謝魏明年魏徵吳太子登入朝不至遣將軍曹休等出洞口在厯陽今和州曹仁出濡須伐之吳卑辭上書求自改厲魏答書登朝到夕罷兵吳乃建元臨江拒守吳黄武二年春魏將曹仁以步騎數萬攻濡須吳將朱桓以兵五千禦之斬其别將常雕虜王雙三年魏主丕御龍舟循蔡潁浮淮如壽春至廣陵吳將軍徐盛列舟艦於江而植木衣葦為疑城假樓自石頭至江乗聨綿數十里丕臨望嘆曰彼有人焉未可圗也乃還四年秋八月魏主復以舟師自譙循渦入淮来伐冬十月如廣陵臨江觀兵吳嚴兵固守時天寒氷舟不得渡丕見江濤洶湧嘆曰天所以限南北也遂還吳遣將髙壽率死士於徑路夜要之獲其副車羽盖五年吳令諸將屯田七年夏五月吳使鄱陽太守周魴詐以郡降於魏魏揚州牧曹休率步騎十萬應之秋八月吳主至皖口使將軍陸遜督諸將大破休於石亭追至夾石斬獲萬餘吳黄龍元年十二月攻魏合肥不克而還三年冬十月吳主使中郎將孫布詐降誘揚州刺史王凌吳主伏兵阜陵在今和州以俟之凌遣督將步騎七百人迎布布夜掩襲死傷過半吳嘉禾元年遣將陸遜擊魏廬江魏守將滿寵整軍趨揚宜口禦之遜遁二年吳主自將攻魏合肥新城遣將軍全琮征六安皆不克還三年五月吳主入居巢湖口向合肥新城衆號十萬又遣陸遜諸葛瑾將萬餘人向襄陽將軍孫韶張承入淮向廣陵淮隂秋七月魏主自將伐吳吳兵遂遁滿寵募壯士焚吳攻具射殺吳王之弟子泰吳赤烏四年夏四月吳將全琮畧淮南決芍陂諸葛恪攻六安琮敗於芍陂六年春正月吳諸葛恪襲六安掩其人民而去十三年吳主遣軍十萬作堂邑涂塘以淹北道堂邑今六合縣吳建興元年冬十月諸葛恪修東興隄初魏欲廣田蓄穀於揚豫之間用鄧艾䇿開廣漕渠吳大帝亦於淮南築東興隄以遏巢湖後廢不治至是恪更作大隄左右結山俠築兩城十一月魏將胡遵諸葛誕率衆十萬来攻恪將兵四萬救之遵等作浮橋以渡分兵攻兩城恪遣留贊丁奉為前部時天寒雪魏諸將㑹飲見贊等兵少不即嚴吳兵得上便鼔譟亂斫魏軍驚擾爭渡浮橋橋壊軍士沒水死者數萬二年春三月諸葛恪大發州郡二十萬衆伐魏圍新城九十餘日不克㑹大暑士卒多病恪引兵還怨黷盈積孫峻因而構恪殺之吳建衡二年吳丁奉入渦口晉揚州刺史擊走之亮休廢立孫峻既殺恪恣滛暴國人側目孫英等謀討不克俱死使將軍呂據等入淮泗餞之石頭遇疾以後事付從父弟孫綝綝秉政召據殺之并族誅大司馬滕印將軍王惇吳主亮親政事綝表奏多所難問綝稱疾不朝吳主亮隂與全尚劉承謀誅之尚綝妻父也尚妻泄語綝綝夜殺承比明圍宮吳主不得出綝告太廟廢亮為㑹稽王迎琅邪王休於㑹稽十月休至羣臣奉上璽符三讓乃受綝稱草莽臣上印綬節鉞求避賢路吳主休慰諭之以為丞相荆州牧十二月臘㑹縛綝斬之夷其族發孫峻棺斵而埋之改塟諸葛恪等晉滅吳吳建衡三年吳主皓大舉兵出華里建業西載太后皇后及後宮數千人從牛渚今當塗西上遇大雪途壊士卒多怨引還天紀二年吳人大佃皖城圖北伐魏都督王渾遣揚州刺史應綽攻破之斬首五千級焚積穀百八十餘萬斛踐稻田四千餘頃毁船六百餘艘三年冬十一月晉大舉兵分道伐吳王伷出涂中今六合王渾出江西今和州出横江渡路王戎武昌胡奮出夏口杜預出江陵王濬唐彬下巴蜀東西凡二十餘萬四年春正月杜預等諸軍並進所向皆克吳主聞王渾南下使丞相張悌督丹陽太守沈瑩等衆三萬渡江逆戰三月悌圍渾部將張喬於楊荷在和州東南二十里喬降悌進與晉揚州刺史周浚陳於板橋吳銳卒衝晉兵不動衆亂晉兵乗之喬自後擊之大敗悌死之吳人大震王濬既破武昌順流徑趣建業吳主遣遊擊將軍張象帥舟師禦之象衆降濬遂鼔譟入石頭呉主皓降濬收其圖籍克州四郡四十二戸五十二萬三千兵二十三萬平揚徐盜惠帝太安二年義陽蠻張昌叛據江夏其黨石氷宼揚州敗刺史陳徽諸郡盡沒臨淮人封雲起兵宼徐州以應氷於是荆江揚豫徐五州之境多為昌所據更置牧守而氷據臨淮冬十二月議郎周玘等起兵江東討石氷斬其將羌毒氷自臨淮趨壽春守將劉準不能拒廣陵度支陳敏請兵擊之所向皆㨗遂與周玘合攻氷於建康永興元年三月氷北走投封雲雲司馬張統斬氷及雲以降元帝中興都建鄴琅琊王名睿字景文宣帝曽孫琅琊王覲之子也年十五嗣王位懐帝永嘉初用王導計始鎮建鄴賔禮名賢存問風俗江東歸心焉愍帝即位進位丞相大都督中外諸軍事遣諸將分定江東及西都不守出師露次移檄四方徵天下兵尅日進討二月平東將軍宋哲至宣愍帝詔使攝萬幾王未敢當羣臣請依魏晉故事為晉王大興元年春三月愍帝音問至王即皇帝位淮南用兵元帝大興元年十二月彭城内史周撫叛降石勒詔下邳内史劉遐泰山太守徐龕討之二年遐龕擊斬撫永昌元年冬十月後趙宼譙祖約退屯壽春明帝太寧元年春三月後趙宼彭城下邳徐州刺史卞敦退保盱眙成帝咸和元年十一月後趙將石聰攻壽陽不克遂侵逡遒阜陵殺掠五千餘人建康大震厯陽内史蘇峻遣將韓晃擊聰走之十二月濟岷太守劉闓殺下邳内史夏侯嘉叛降石勒八年秋七月後趙將石聰以譙来降九年十一月蘭陵人朱縱斬後趙將郭祥以彭城来降咸康元年夏四月趙王虎南遊其將石季龍宼厯陽分命諸將救厯陽及戍慈湖牛渚俱在太平府帝親勒兵戒嚴穆帝永和元年石季龍將路永屯壽春五年夏六月趙揚州刺史王浹舉壽春降西郎將陳逵進據壽春秋七月征北大將軍褚裒請伐趙徑赴彭城與趙將李農戰不利八月退屯廣陵陳逵聞之焚壽春積聚毁城遁還詔命裒還鎮京口六年夏五月廬江太守袁真攻合肥克之七年姚弋仲遣使来降八年三月姚弋仲死其子襄為秦兵所敗帥衆来歸送其五弟為質詔襄屯譙城襄單騎濟淮見謝尚於壽春尚去仗衛幅巾待之九年秋姚襄屯厯陽和州夾淮廣興屯田訓厲將士冬十月殷浩自壽春北伐以姚襄為前驅襄詐令部衆夜遁隂伏甲以徼之浩追至山桑䝉城縣北襄縱兵擊之浩敗走十二月姚襄徙屯盱眙詔以謝尚都督江西淮南鎮厯陽十年姚襄叛降燕五月江西流民叛降襄詔屯兵中堂十一年冬十月以謝尚鎮壽春時晉僑立青冀并幽四州於江北豫州刺史自江左以後守江則屯厯陽蕪湖進取則屯壽春十二年命桓温督諸軍討姚襄孝武太元三年秦王堅使將軍俱難宼淮陽盱眙彭超攻彭城詔右將軍毛虎生鎮姑孰以禦之四年春二月秦䧟彭城淮隂五月秦拔盱眙進圍三阿在揚州府髙郵州謝𤣥自廣陵来救超敗退保旴眙六月𤣥進攻之又敗退屯淮隂𤣥遣何謙帥舟師乗潮而上夜焚淮陽難超退屯淮北𤣥又進戰於君川復大破之難超北走八年秋八月秦王堅大舉兵入宼戎卒六十餘萬騎二十七萬前鋒至潁口詔謝石謝𤣥督衆八萬禦之冬十月秦攻壽陽克之將軍梁成等屯洛澗在懐逺縣十一月𤣥遣劉牢之帥精兵五千渡水擊成大破斬之分兵斷其歸津秦步騎奔潰爭赴淮水死石等水陸繼進秦王堅與融等登壽陽城望見八公山在壽州西北草木皆以為晉兵秦兵逼淝水而陳既而移陳少郤欲令晉兵半渡而蹙之乃麾兵使郤兵退不可止𤣥等引兵渡水擊之融馳騎略陳欲以帥退者馬倒為晉兵所殺秦兵遂潰𤣥等乗勝追擊至青岡秦兵大敗自相蹈籍而死者蔽野塞川其走者聞風聲鶴唳皆以為晉兵且至晝夜不敢息重以饑凍死者什七八朱序張天錫来奔復取壽春九年春正月遣將軍劉牢之伐秦拔譙城平王敦元帝永昌元年春正月王敦舉兵於武昌以誅劉隗為名沈充帥衆應之四月敦前鋒攻石頭周札開城門應之敦據石頭尚書令刁協驃騎將軍戴淵尚書僕射周顗皆為所害明帝太寧元年夏四月王敦移屯姑孰自領揚州牧二年六月敦復反七月至江寧帝躬率六軍出次南皇堂夜募壯士渡水掩其未備平旦戰於越城大破之斬其將何康敦憤惋死周騫祖約各逐敦所署太守賊黨沈充至宣陽門劉遐蘇峻等自南塘横擊大破之遐又破沈充於青溪賊燒營宵遁丁酉帝還宮分遣諸將追其黨與悉平之平蘇峻成帝咸和二年十一月蘇峻舉兵厯陽豫州刺史祖約以兵㑹峻十二月峻陷姑孰今太平府韶左將軍司馬流據