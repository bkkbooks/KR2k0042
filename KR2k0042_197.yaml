勰鎮之三月乙卯遣將軍崔慧景將兵討壽陽夏四月慧景於廣陵舉兵襲京師右衛將軍左興盛督京邑水部衆軍南徐州刺史江夏王寳元以京城納慧景乙卯遣中領軍王瑩屯北籬門壬戌慧景至瑩等敗績甲子慧景入京師宮内據城拒守豫州刺史蕭懿起義救援癸酉慧景棄衆走斬首八月齊攻魏壽陽魏擊敗之遂取淮南地十月己卯害尚書令蕭懿十一月齊雍州刺史蕭衍起兵襄陽西中郎將蕭頴胄以南康王寳融起兵荆州稱奉宣德皇太后令立南康王寳融中興元年春正月廢帝為涪陵王六月蕭頴孚起兵廬陵八月辛卯以太子左率李居士縂督西討諸軍事屯新亭九月甲辰蕭衍至南豫州輔國將軍監南豫州事甲胄軍二萬人於姑孰奔歸丙辰李居士與衍軍戰於新亭敗績冬十月甲戌王珍國又戰敗於朱雀航戊寅寧朔將軍徐元瑜以東府城降青冀二州刺史桓和入衛屯東宮尋亦降衍於是閉宮城門自守十二月丙寅新除雍州刺史王珍國侍中張稷率兵入殿弑帝十二月以太后令廢帝為東昏侯南康王寳融宜纂承皇祚二年春正月甲寅加大司馬蕭衍位相國梁公二月丙戌進梁公蕭衍爵為王三月庚戌車駕東歸至姑孰丙辰遜位於梁梁梁受齊禪蕭衍字叔達南蘭陵中都里人與齊同承淮隂令整皇考順之參預齊髙佐命其薨也不得志至鬱林失德帝助齊明傾齊武之嗣以雪心恥齊明崩刺雍州行仁義以結衆心尋而大臣相次誅戮永元二年冬舉事竟陵明年三月南康王即帝位於江陵請以帝都督征討諸軍假黄鉞殺湘東王寳晊及邵陵王寳佼晉熙王寳正三人鄱陽王寳寅出奔魏天監元年即齊中興二年四月丙寅梁王衍即皇帝位梁魏交兵武帝天監三年春二月魏陷梁州四年二月遣衛尉卿楊公則率宿衛兵塞洛口在定逺縣西北口冬十月丙午北伐以揚州刺史臨川王宏都督北討諸軍事柳琰為副五年三月丁亥陳伯之自壽陽率衆来降五月辛未太子左衛率張惠紹克魏宿預城今淮安府宿遷縣乙亥臨川王宏前軍克梁城在夀州東北鍾離西南辛巳豫州刺史韋叡克合肥城丁亥廬江太守裴䆳克羊石城庚寅又克霍丘城六月庚子青冀二州刺史桓和前軍克胊山城秋九月將軍藍懐恭與魏邢蠻戰於睢口在邳州下相城西南敗績巒進圍宿預懐㳟復於清南築城巒攻拔之斬懐㳟殺獲萬計張惠紹棄宿預遁還魏詔邢巒引兵渡淮與中山王英合攻梁城梁臨川王宏遁還將士死者五萬人十一月魏宼鍾離遣右衛將軍曹景宗率衆赴援六年夏四月癸巳曹景宗韋叡等破魏軍於邵陽州在鳯陽舊城東北淮水中斬獲萬計七年冬十月丙子詔大舉北伐以始興王憺為平北將軍率衆入清口車騎將軍王茂率衆向宿預八年春正月壬辰魏鎮軍參軍成景儁斬宿預城主嚴仲寳通監作嚴仲賢以城内屬按此條通鑑作七年七月事九年梁作縁淮塘北岸起石頭迄東治南岸起後渚籬門迄三橋十年三月辛丑盜殺東莞琅琊二郡太守鄧晰以胊山引魏軍遣振逺將軍馬仙㻫討之是月魏徐州刺史盧昶帥衆赴朐山冬十二月庚辰馬仙㻫大破魏軍斬馘十餘萬克復朐山城十二年鬱洲民徐道角等夜襲州城降魏梁北兖州刺史治淮隂今淮安府康絢討平之十三年梁作浮山堰夀州西北二十五里有硤石山山上二城在西岸者為西硤山逼壽陽魏遣崔亮攻之蕭寳寅決淮泗按此條見通鑑十五年二月魏鎮東將軍蕭寳寅大破梁將於淮北魏崔亮李平等克硤石斬梁豫州刺史趙祖恱此條南史不載見北史九月梁淮堰壊聲聞三百里縁淮城戍村落十萬餘口皆漂入海南史作十四年十月梁書不載普通五年六月庚子以元樹為平北將軍率衆北伐通鑑作裴䆳八月庚寅徐州刺史成景儁克魏童棧童棧鑑作僮城今鳯陽府虹縣東北九月戊申又克睢陵城在邳州東南戊午北兖州刺史趙景恱圍荆山在鳯陽府西壬戌宣毅將軍裴䆳襲壽陽今壽州入羅城弗克冬十月戊寅裴䆳元樹攻魏建陵城在沐陽縣西北破之辛巳又破曲木掃虜將軍彭寳孫克琅琊甲申又克檀丘城通鑑作亶丘辛卯裴䆳破狄城丙申又克甓城諸城俱在淮南遂進屯黎將亭在壽州壬寅魏東海太守韋敬欣以司吾城降在宿遷縣西定逺將軍曹世宗破魏曲陽城在定逺縣西北甲辰又克秦墟魏守將多棄城走十一月壬戌裴䆳攻壽陽之安城克之丙寅魏馬頭安城並来降十二月戊寅魏荆山城降六年春正月庚申魏鎮東將軍徐州刺史元法僧以彭城内附癸酉克魏鄭城在鳯陽府潁上縣東南二月乙未趙景恱下魏龍亢城此條通鑑不載見梁書夏五月己酉築宿預堰壬子遣中䕶軍夏侯亶督壽陽諸軍事北伐六月豫章王綜奔於魏魏復據彭城七年十一月辛巳夏侯亶等衆軍克壽陽城魏新野太守以郡降大通元年冬十月庚戌魏東豫州刺史元慶和以渦陽内屬十一月丁卯以中䕶軍蕭深藻為都督侵魏鎮於渦陽中大通元年夏四月癸巳陳慶之攻拔魏梁城四年春正月癸未魏南兖州刺史劉世明以城降五年六月己卯魏建義城主蘭寳殺東徐州刺史崔祥以下邳降平侯景武帝太清元年二月庚辰魏司徒侯景求以豫章廣潁等十三州内屬壬午梁以景為大將軍封河南王二年八月戊戌侯景舉兵反攻馬頭木栅荆山等戍甲辰以安前將軍邵陵王綸都督衆軍討景冬十月侯景襲譙州進攻陷厯陽戊申以臨賀王正德為平北將軍都督諸軍屯丹陽郡己酉景自横江濟采石辛亥至建鄴臨賀王正德率衆附賊十一月己未景立正德為天子於南闕前辛酉賊攻陷東府城庚辰邵陵王綸帥武州刺史蕭弄璋前譙州刺史趙伯超等入援乙酉綸進軍湖頭與賊戰敗績丙戌安北將軍鄱陽王範遣世子嗣雄信將軍裴之髙等率衆入援次張公洲十二月丙辰司州刺史柳仲禮前衡州刺史韋粲髙州刺史李遷仕前司州刺史羊鴉仁等率衆軍入援三年春正月丁巳大都督柳仲禮率衆軍分據南岸賊濟軍於青塘襲殺韋粲庚申邵陵王綸臨城公大連等率兵集南岸李遷仕及天門太守樊文皎進軍青溪東為賊所破文皎死之二月侯景遣使求和皇太子因請帝許之盟於西華門下景既運東城米歸於石頭亦不解圍啟求遣諸軍退丁未皇太子又命南兖州刺史南康王㑹理前青冀二州刺史湘潭侯退率江北之衆頓於蘭亭苑甲子侯景表陳帝失復舉兵向闕三月戊午前司州刺史羊鴉仁等進軍東府北與賊戰大敗時四方征鎮入援者三十餘萬莫有鬬志自相抄奪而已丁卯賊攻陷宮城縱兵大掠己巳賊矯詔遣石城公大欵解外援軍庚午侯景自為都督中外諸軍事大丞相録尚書辛未援軍各退散己酉帝以所求不供憂憤寢疾是月青冀二州刺史明少遐東徐州刺史湛海珍北青州刺史王奉伯各舉州附東魏五月丙辰帝崩時年八十六秋七月甲寅廣州刺史元景仲謀應侯景西江督䕶陳霸先攻之景仲自殺簡文帝大寳元年癸酉前江都令祖皓起義兵於廣陵二月癸未侯景攻下廣陵皓見害丙午侯景逼帝幸西州二年秋七月景還至建鄴八月戊午廢帝為晉安王害王太子及諸王元帝承聖元年三月王僧辨等平侯景按是年九月改元承聖敬帝之立承聖三年十一月太尉王僧辨司空陳霸先定議以晉安王方智為太宰承制自江州迎還建鄴四年二月癸丑至自尋陽入居朝堂三月齊遣其上黨王髙渙送貞陽侯蕭深明南史作蕭明通鑑作淵明来主梁嗣至東關遣吳興太守裴之横與戰敗績死之太尉王僧辨率衆出屯姑孰七月辛丑王僧辨納貞陽侯蕭深明自采石濟江甲辰入於京師以方智為太子九月甲辰司空陳霸先舉義襲殺王僧辨黜蕭深明丙午奉晉安王方智即皇帝位冬十月己巳改元紹泰平義興吳郡及南豫州譙秦二州敬帝紹泰元年十月震州刺史今湖州府杜龕舉兵攻信武將軍陳舊於長城義興今宜興太守韋載據郡以應之辛未詔司空陳霸先討載丙子南豫州治蕪湖縣刺史任約鎮北將軍譙冶滁州来安縣秦治江寧府六合縣二州刺史徐嗣徽舉兵反乗京師無備竊據石頭丁丑韋載降義興平遣晉陵太守今常州府周文育率軍援長城十一月庚辰齊安州刺史翟子崇楚州刺史劉仕榮淮州刺史柳達摩率衆赴任約入於石頭庚寅司空陳霸先旋於京師十二月庚戌徐嗣徽任約至采石迎齊援丙辰遣猛烈將軍侯安都於江寧邀之賊衆大潰嗣徽約等奔於江西庚申翟子崇等請降並放還北梁敗北齊太平元年二月癸亥賊徐嗣徽任約襲采石戍執戍主明州刺史張懐鈞入於齊三月戊戌齊大將蕭軌出柵口向梁山司空陳霸先軍主黄菆逆擊大破之軌退保蕪湖遣周文育侯安都軍梁山拒之在太平府當塗縣西南夏四月丁巳陳霸先表詣梁山撫廵將帥壬午侯安都輕兵襲齊行臺司馬㳟於厯陽大破之俘獲萬計五月庚寅齊軍水步入丹陽縣丙申至秣陵故治敕周文育還頓方丘徐度頓馬牧杜稜頓大桁癸卯齊軍進據兒塘輿駕出頓趙建故籬門六月甲辰齊潛軍至蔣山龍尾斜趨幕府山北至𤣥武廟西北乙卯司空陳霸先授衆軍節度與齊軍交戰大破之陳陳受梁禪永定元年梁太平二年十月辛未陳王霸先即皇帝位於南郊齊兵既破霸先威權日重九月位相國總百揆封陳公冬十月戊辰進爵為王至是遂下詔禪於陳陳王即位奉梁主為江隂王王琳蕭莊奔齊梁太平元年十一月梁徵王琳為司空不至陳永定元年十月琳敗陳兵獲其將周文育侯安都等二年三月立梁永嘉王莊即位於郢州通鑑作鄴六月乙巳陳詔司空侯瑱領軍將軍徐度討之三年六月琳奉永嘉王莊出屯濡須口此條南史齊書俱不載十一月琳攻大雷齊師為之聲援陳遣侯瑱侯安都徐度禦之天嘉元年二月丙申太尉侯瑱敗王琳於梁山敗齊兵於博望擒齊將劉伯球王琳及其主蕭莊奔齊臨海安成廢立永定三年八月庚戌立臨川王伯宗為皇太子天康元年四月癸酉即皇帝位二年十一月甲寅安成王頊以慈訓太后令廢為臨海王詔安成王頊入纂皇統伐齊宣帝太建五年三月壬午以開府儀同三司吳明徹都督征討諸軍事略地北邊冬十月乙巳吳明徹克壽陽城斬王琳傳首建鄴七年閏九月壬辰吳明徹大破齊軍於呂梁陳周交兵宣帝太建九年冬十月戊午司空吳明徹破周將梁士彦於呂梁十年春二月甲子周軍救梁士彦大敗吳明徹於呂梁十一年十一月戊戌周將梁士彦圍壽陽克之辛亥又克霍州癸丑以揚州刺史始興王叔陵總督水步衆軍十二月乙丑南北兖晉三州及盱眙山陽陽平馬頭秦厯陽沛北譙南梁等九郡民並自拔向建鄴周又克譙北徐二州十二年八月庚申遣南豫州刺史任忠率衆赴厯陽超武將軍陳慧紀趨南兖州九月丁亥周將王延貴率衆援厯陽任忠擊破之禽延貴等己酉周廣陵義軍主曹藥率衆来降後主叔寳之立太建十四年正月甲寅宣帝殂太子哀號俯伏始興王叔陵抽藥刀斫之復斫柳后長沙王叔堅搤叔陵叔陵出走右衛將軍蕭摩訶討斬之太子叔寳即位隋滅陳初隋文帝受周禪甚敦隣好陳宣帝不禁侵掠太建末隋兵大舉聞宣帝崩乃命班師遣使赴弔修敵國禮書稱姓名頓首而後主驕答書失禮隋文帝不恱及納蕭瓛蕭巖隋文帝愈忿開皇八年即陳後主二年十一月以晉王廣為元帥督九十總管討陳九年春正月乙丑隋將賀若弼自北道廣陵濟韓擒虎趨横江濟分兵晨襲采石取之進拔姑孰次於新林時弼攻下京口縁江諸戍望風盡走弼分兵斷曲阿之衝而入戊辰以蕭摩訶樊猛樊毅司馬消難施文慶分兵鎮守要害庚午賀若弼攻陷南徐州辛未韓擒虎陷南豫州辛巳賀若弼進軍鍾山頓白土岡之東南陳衆軍敗績弼乗勝進軍宮城燒北掖門是時韓擒虎率衆自新林至石子岡鎮東大將軍任忠出降引擒虎經朱雀航趨宮城自南掖門入城内文武百官皆遁出後主乃逃於井既而軍人以繩引出之丙戌晉王廣入據臺城送後主於東宮三月發至長安江都之役大業十二年秋七月甲子帝如江都十三年十一月唐公立代王侑為帝遥尊帝為太上皇改元義寧二年三月太上皇崩於江都温室諡曰煬江南通志卷一百九十八欽定四庫全書
