body:
  text: 江南通志卷四十九河渠志水有四瀆其三在江南境內入海以水與平地較得十之五六故稱澤國而言治水者先江南我國家特設重臣經理或専使領其事或大吏董其成睿斷神謀所以講明區畫之者必已治益治而萬世保其安其間天事與人力相應順導與周防並施漕運農田上下咸蒙其利蓋費莫巨焉功莫崇焉爰次河淮江海與夫運河水利為類七為卷十有八述河渠志第二黃河一禹貢九河在今德州以上河間數百里之地河入海乃在碣石此禹時故道也周定王五年河決礫溪稍徙而東至漢元光三年春河徙從頓丘東南流夏復決濮陽瓠子注巨野通淮泗自是河徙東郡入勃海始失禹舊迹屢塞復決遷徙泛濫班固以為河羡溢害中國尤甚者也其後河入千乘而德棣之河又播為八漢世所指以為太史馬頰者偶合於禹迹故訖東都至唐河不為害者千數百年宋太平興國八年河決滑州東南流至彭城界入於淮咸平三年河決鄆州黃陵掃浮巨野入淮泗天禧三年滑州河溢厯澶濮曹鄆注梁山濼又合清水古汴渠東入於淮皆旋塞至神宗熙寧十年七月乙丑河大決于澶州曹村澶淵北流斷絶河道南徙東匯於梁山張澤濼分為二派一合南清河入於淮一合北清河入於海明丘濬定為黃河入淮之始者也元豐元年四月澶州決口塞五月新隄成閉口斷流河復歸北至金明昌五年河決陽武徙封丘河始大半入淮而北清河之流猶未絶明洪武二十四年河決原武東經開封府城北五里又南行至項城經潁上東至壽州自是河全入於淮而故道悉淤矣嘉靖六年以前河分為六道其兩道由河南鳯泗入淮其四道由小浮橋飛雲橋大小溜溝入海時則河行開歸徐沛之地其後開歸沛諸流復堙而全河悉經徐州以入於淮矣今按河所經在江南境者其道自河南之夏邑山東之單縣東行入碭山縣北河舊在碭山縣治南三十里明嘉靖三十七年河徙始出縣北又東徑豐縣南河去縣治三十里又東徑沛縣南其南岸則蕭縣河舊在肅縣治北五十里去沛甚近萬厯三十四年河復決而南自是蕭去河才十五里而沛則去河五十餘里又東徑徐州府治北河去府治北二里又東徑靈璧縣北河去縣治一百二十里又東南徑睢寧縣北其北岸則邳州河在邳州南門外去睢寧縣治五十里又東徑宿遷縣南河去縣治四里又東徑桃源縣北河去縣百餘步又東徑清河縣南與淮水合流河去縣治一里入淮處謂之清口本名泗口自徐城東北至此皆古泗水為河所奪也縣西三十里有三汊河口泗水至此分為大小二凊河大清河經縣治東北入淮俗稱老黃河今湮其小清河于縣治西南入淮即今之清口也又東徑淮安府治北河去府治三十里又東徑安東縣南厯雲梯關而東北入於海河去縣二里自清口至此皆古淮水為河所奪也海自鹽城縣東北徑山陽縣東折而西北為黃淮入海之口其北岸則安東也雲梯關在縣東北一百里又東北一百八十里為大海自海委仰溯河源蟠亘萬餘里其流髙而逺濁而徑宋以前河自入海尚能為瀕河州郡之害况今河淮二瀆併合為一又自清河縣之清口以下沁泗沂諸水皆與河會而以下淮水為委輸則人事之修治以為東南赤子奠寧保聚之計者尤亟而自元至元以後會通之漕實資河水濟運則東南數百萬石遠輸天庾此為喉要故前明區書綦詳然明議河事者言人人殊其始也大約重疏濬之利而輕隄防之功卒之流緩勢弱沙澱日髙至於全河改徙其繼也復欲棄隄防之舊而就疏浚之新卒之河不兩強方開復塞至於勞費罔績是知疏九河為禹之大智而不知陂九澤為禹之大法知隄防為周戰國之權謀而不知鑿空為宋新法之無用豈非治名不治實議論多而無所折中歟我朝自聖祖仁皇帝南巡視涖河工指授方略首導歸壑次權蓄泄次夷衝險聖神天縱睿算周至俾黃運底績國計民生萬世利賴世宗憲皇帝宵旰經營知人善任誠敬昭格河清獻瑞明德神功上邁禹謨矣謹撰次宋以來治河入江南者悉條繫始末以著昭代成烈云宋天禧三年六月乙未滑州河溢歷澶濮曹鄆四州又合清水古汴渠東入於淮州邑罹患者三十二遣使賦諸州薪石楗橛芟竹之數千六百萬發兵夫九萬人治之王貽永知徐州作隄城南以禦水四年二月河塞羣臣入賀上親為文刻石紀功宋史河渠志舊制歲虞河決有司常以孟秋預調塞治之物梢芟薪柴楗橛竹石茭索竹索凡千餘萬謂之春料詔下瀕河諸州所産之地仍遣使會同河渠官吏乘農隙率丁夫收采備用凡伐蘆荻謂之芟伐山木榆栁枝葉謂之梢辮竹糾芟為索以竹為巨索長十尺至百尺有差先擇寬平之所為掃場掃之制密布芟索鋪梢梢索相重壓之以土雜以碎石以巨竹索橫貫其中謂之心索卷而束之復以大芟索繫其兩端别以竹索自內旁出其髙至數丈其長倍之凡用丁夫數百或千人雜唱齊挽積置於卑薄之處謂之掃岸既下以橛臬閡之復以長木貫之其竹索皆埋巨木於岸以維之遇河之橫決則復增之以補其缺凡掃下非積數疊亦不能遏其迅湍又有馬頭鋸牙木岸者以蹙水勢護隄焉熙寧十年七月乙丑河大決於澶州河道南徙合南清河入於淮蘇軾知徐州河水溢南清河匯於城下軾築東南長隄首起戲馬臺尾屬於城城賴以全請復調來嵗夫增築故城為木岸朝廷從之穀山筆麈熙寧十年河南徙合清入淮之道即今沂泗南流由徐邳入淮之道宋元明以來未之有改也金大定二十七年以徐州彭城蕭豐滕州沛屬今徐州府州長二皆提舉河防事縣令佐皆管勾河防事金史河渠志御史臺言自來沿河京府州縣官坐視管內河防缺壞略不介意若令於名銜管勾河防事如任內規措有方能禦大患或守護不謹以致踈虞臨時奏聞以議賞罰上從之禹貢錐指徐州之彭城蕭豐滕州之沛皆為沿河之地則當時河流所經大略可睹也明昌五年春正月尚書省奏都水監丞田櫟請於北清河北岸牆村決河入梁山濼故道依舊作南北兩清河分流上令宰臣集百官詳議卒寢不行是年河決陽武故隄灌封丘而東詔同知都轉運使髙旭武衛軍副都指揮使女奚列奕同往規措禹貢錐指金吉甫云河至紹熙甲寅南連大野并行泗水入淮於是有南北清河之分北清河即濟水故道南清河并泗入淮今淮安之西二十里對岸清河口是也考宋光宗紹熙五年甲寅即金章宗明昌五年是嵗河徙自陽武而東厯延津封丘長垣蘭陽東明曹州濮州鄆城范縣諸州縣界中至壽張注梁山濼分為二派北派由北清河入海今大清河自東平厯東阿平隂長清齊河厯城濟陽齊東武定青城濱州蒲臺至利津縣入海者是也南派由南清河入淮即泗水故道今會通河自東平厯汶上嘉祥濟寧合泗水至清河縣入淮者是也按宋史河渠志南北清河之名已見於熙寧十年不自金明昌五年始禹貢錐指又以丘濬言宋熙寧十年河入淮之始為誤援據天禧咸平太平興國溯至漢元光時河決史皆載入淮之文今考河道南徙合清入淮實自宋熙寧始前此遠有經流餘波所入不可謂河入淮之始也元大德元年三月徐州邳州宿遷睢寧等縣河水大溢皇慶二年六月河決陳亳睢三州延祐三年潁州泰和縣河溢泰定元年河始行汴渠至徐州城東北合泗入淮禹貢錐指河自徐州北東南流至城東北合於泗水泗水自沛縣入州境循城而東一曰清河又曰泉河其後為運河亦名閘河元初黃河由渦入淮至泰定元年由汴河決入清河自是遂為大河之經流至正四年六月河決金堤碭山豐沛皆罹水患九年五月白茅河東注沛縣成巨浸十一年四月命賈魯以工部尚書為總治河防使便宜興繕十一月工竣河復故道元史河渠志先是魯為都水使者詣河相視驗狀為圗以二策進獻一議修築北隄以制橫潰一議疏塞並舉挽河使東行以復故道至是托克托韙其後策薦於帝稱旨十一年四月命魯為總治河防使便宜興繕是月鳩工十一月水土工畢諸掃諸隄成河乃復故道南匯於淮又東入於海河防一覽黃河故道自虞城以下蕭縣以上夏邑以北碭山以南由新集厯丁家道口馬牧集韓家道口司家道口牛黃堌趙家圈至蕭縣薊門出小浮橋此賈魯所復故道靳輔治河書昔賈魯治河用沉舟之法人皆稱之竊嘗疑河底淺深坦陷不一唯草栁性柔一經壓擠則周遭克滿故塞決必用掃今以至平之舟底而沉之淺深坦陷不一之湍流則掃根透溜之患必有不俟終日而見者然以魯之才其成功如此必非孟浪尋繹至正河防記知魯之沉舟以之代壩而逼水非以之塞決而合龍也蓋彼時故河業已通流但決河勢大水流多於故河十之八又適當秋漲洄漩湍急掃不能下又其上逼水三隄短弱而勢不支恐掃行一遲水盡湧決決則故河復淤前功盡隳因急沉舟為壩以逼之所謂搶救也逮至船掃四隄並就河勢南流然後塞決耳不然魯於九月七日沉舟而龍口之合何直至十一月十一日耶按賈魯河道自徐州府北門外小浮橋以上至河南考城縣西之白茅河當時施功在江南之地者什五六苐今河道久堙故河防記所載地名多不可曉耳自賈魯之復河故道至明嘉靖三十六年北徙中間二百餘嵗雖漫溢靡常未嘗遷改其後自萬厯六年議復河故道以工巨寢之司河者每以為言又其治法為後世所用或互有損益或名異實同其有造於河不為小補也故詳考備録無復拘文多不載之例云附歐陽玄至正河防記治河一也有疏有濬有塞三者異焉河之流因而導之謂之疏去河之於因而深之謂之濬抑河之暴因而扼之謂之塞疏濬之别有四曰生地曰故道曰河身曰減水河生地有直有紆因直而鑿之可就故道故道有髙有卑髙者平之以趨卑髙卑相就則髙不壅卑不瀦慮夫壅生潰瀦生堙也河身者水雖通行身有廣狹狹難受水水益悍故狹者以計闢之廣難為岸岸善潰故廣者以計禦之減水河者水放曠則以制其狂水隳突則以殺其怒治隄一也有創築修築補築之名有刺水隄有截河隄有護岸隄有縷水隄有石船隄治掃一也有岸掃水掃有龍尾欄頭馬頭等掃其為掃臺及推卷牽制薶挂之法有用土用石用鐡用草用木用杙用絙之方塞河一也有缺口有豁口有龍口缺口者已成川豁口者舊常為水所豁水退則口下於隄水漲則溢出於口龍口者水之所會自新河入故道之潨也其濬故道深廣不等通長二百八十里百五十四步而強功始自白茅長百八十二里繼自黃陵岡亟南白茅闢生地十里口初受廣百八十步深二丈有二尺已下停廣百步髙下不等相折深二丈及泉曰停曰折者用古算法因此推彼知其勢之低昻相準折而取勻停也南白茅至劉莊村接入故道十里通折墾廣八十步深九尺劉莊至専固百有二里二百八十步通折停廣六十步深五尺専固至黃堌墾生地八里面廣百步底廣九十步髙下相折深丈有五尺黃堌至哈只口長五十一里八十步相折停廣舉六十步深五尺乃濬凹里減水河通長九十八里百五十四步四里村缺河口生地長三里四十步而廣六十步底廣四十步深一丈四尺自凹里生地以下舊河身至張贊店長八十二里五十四步上三十六里墾廣二十步深五尺中三十五里墾廣二十八步深五尺下十里二百四十步墾廣二十六步深五尺張贊店至楊青村接入故道墾生地十有三里六十步面廣六十步底廣四十步深一丈四尺其塞専固缺口修隄三重並補築凹里減水河南岸豁口通長二十里三百十有七步其創築河口前第一重西隄南北長三百三十步面廣二十五步底廣三十三步樹置椿橛實以土牛草葦雜梢相兼髙丈有三尺隄前置龍尾大掃言龍尾者伐大樹連梢繫之隄旁隨水上下以破囓岸浪者也築第二重正隄並補兩端舊隄通長十有一里三百步缺口正隄長四里兩隄相接舊隄置椿堵閉河身長百四十五步用上牛草梢土相兼修築底廣三十步修髙二丈其岸上土工修築者長三里二百十有五步有竒髙廣不等通髙一丈五尺補築舊隄者長七里三百步表裏培薄七步增卑六尺計髙一丈築第三重東後隄并接修舊隄髙廣不等通長八里補築凹里減水河南岸豁口四處置樁木草土相兼長四十七步於是塞黃陵全河水中及岸上修隄長三十六里百三十六步其修大隄剌水者二長十有四里七十步其西復作大隄剌水者一長十有二里百三十步內創築岸上土隄西北起李八宅西隄東南至舊河岸長十里百五十步顛廣四步趾廣三之髙丈有五尺仍築舊河岸至入水隄長四百三十步趾廣二十步顛殺其六之一接修入水兩岸掃隄並行其法以竹絡實以小石每掃不等以蒲葦綿腰索徑寸許者從鋪廣可一二十步長可二三十步又以曳掃索綯徑三寸或四寸長二百餘尺者衡鋪之相間復以竹葦麻檾大繂長三百尺者為管心索就繫綿腰索之端於其上以草數千束多至萬餘勻布厚鋪於綿腰索之上橐而納之丁夫數千以足踏實推卷稍髙即以水工二人立其上而號於衆衆聲力舉用小大推梯推卷成掃髙下長短不等大者髙二丈小者不下丈餘又用大索或互為腰索轉致河濱選健丁操管心索順掃臺立踏或挂之臺中鐵貓大橛之上以漸縋之下水掃後掘地為渠陷管心索渠中以散草厚覆築之以土其上復以土牛雜草小掃稍土多寡厚薄先後隨宜修疊為掃臺務使牽制上下縝密堅壯互為掎角掃不動搖日力不足火以繼之積纍既畢復施前法卷掃以壓先下之掃量水淺深制掃厚薄疊之多至四掃而止兩掃之間置竹絡髙二丈或三丈圍四丈五尺實以小石土牛既滿繫以竹纜其兩旁並掃密下大樁就以竹絡上大竹腰索繫於樁上東西兩掃及其中竹絡之上以草上等物築為掃臺約長五十步或百步再下掃即以竹索或麻索長八百尺或五百尺者一二雜厠其餘管心索之間俟掃入水之後其餘管心索如前薶挂隨以管心長索逺置五七十步之外或鐡貓或大樁曳而繫之通管束緊日所下之掃再以草土等物通修成隄又以龍尾大掃密挂於護隄大樁分析水勢其隄長二百七十步北廣四十二步中廣五十五步南廣四十二步自顛至趾通髙三丈八尺其截河大隄髙廣不等長十有九里百七十七步其在黃陵北岸者長十里四十一步築岸上土隄西北起東西故隄東南至河口長七里九十七步顛廣六步趾倍之而強二步髙丈有五尺接修入水施土牛小掃梢草雜土多寡厚薄隨宜修疊及下竹絡安大樁繫龍尾掃如前兩隄法唯修疊臺增用白闌小石並掃上及前洊修掃隄一長百餘步直抵龍口稍北攔頭三掃並行掃大隄廣與刺水二隄不同通前列四掃間以竹絡成一大隄長二百八十步北廣百一十步其顛至水而髙丈有五尺水面至澤腹髙二丈五尺通髙三丈五尺中流廣八十步其顛至水面髙丈有五尺水面至澤腹髙五丈五尺通髙七丈并創築縷水橫隄一東起北截河大隄西抵西剌水大隄又一堤東起中刺水大隄西抵西刺水大隄通長二里四十二步亦顛廣四步趾三之髙丈有二尺修黃陵南岸長九里百六十步內創岸土隄東北起新補白茅故隄西南至舊河口髙廣不等長八里二百五十步乃入水作石船大隄蓋由是秋八月二十九日乙巳導故河流先所修北岸西中刺水及截河三隄猶短約水尚少力未足恃決河勢大南北廣四百餘步中流深三丈餘益以杕漲水多故河十之八兩河爭流近故河口水刷岸北行洄旋湍激難以下掃且掃行或遲恐水盡湧入決河因於故河前功遂隳魯乃精思障水入故河之方以九月七日癸丑逆流排大船二十七艘前後連以大桅或長樁用大麻索竹絙絞縛綴為方舟又用大麻索竹絙用船身繳繞上下令牢不可破乃以鐡貓於上流錘之水中乂以竹絙絶長七八百尺者繫兩岸大橛上每絙或硾二舟或三舟使不得下船腹略鋪散草滿貯小石以合子板釘合之復以掃密布合子板上或二重或三重以大麻索縳之急復縛橫木三道於頭桅皆以索維之用竹編笆夾以草石立之桅前約長丈餘名曰水簾桅復以木榰柱使簾不偃仆然後選水工便捷者每船各二人藝斧鑿立船首尾岸上槌鼓為號鼓鳴一時齊鑿須臾舟穴水入舟沉遏決河水怒溢故河水暴增即重樹水簾令後復布小掃土牛白闌長維以草土等物隨宜填垜以繼之石船下諸實地出水基址漸髙復卷大掃以壓之前船勢略定尋用前法沈餘船以竟後功昏曉百刻役夫分番任勞無少間斷船隄之後草掃三道並舉中置竹絡盛石並掃置樁繫纜四掃及絡一如修北截水隄之法苐以中流水深數丈用物之多施功之大數倍他隄船隄距北岸才圍五十步勢迫東流峻若自天降深淺叵測於是先卷下大掃約髙二丈者或四或五始出水而修至河口一二十步用工尤艱薄龍口喧豗猛疾勢撼掃基陷裂敧傾俄逺故所觀者股辨衆議騰沸以為難合然勢不容己魯神色不動機解捷出進官吏工徒日加奬諭辭指懇切衆皆感激赴工十一月十一日丁巳龍口遂合決河絶流故道復通又於隄前通卷闌頭掃各一道多者或三或四前掃出水管心大索繫前掃硾後闌頭掃之後後掃管心大索亦繫小掃硾前闌頭掃之前後先羈縻以錮其勢又於所交索上及兩掃之間壓以小石白闌土牛草土相半厚薄多寡相勢措置掃隄之後自南岸復修一隄抵已閉之龍口長二百七十步船隄四道成隄用農家埸圃之具曰轆軸者穴石立木如比櫛薶前掃之旁每置一轆軸以橫木貫其後又穴石以徑二寸餘麻索貫之繫橫木上密挂龍尾大掃使夏秋潦水冬春凌􅑉不得肆力於岸魯常有言水工之功視土工之功為難中流之功視河濱之功為難決河口視中流又難北岸之功視南岸又難用物之效草雖至柔柔能狎水水漬之生泥泥與草併力重如碇然維持夾輔纜索之功實多蓋由魯習知河事故其功之所就如此明洪武八年大河南決挾潁入淮二十四年河決原武之黑陽山東經開封又南行至項城經潁州潁上東至壽陽鎮全入於淮故道遂淤永樂十四年河決開封經懷遠縣由渦河入淮正統三年八月乙丑直𨽻淮安府邳州河決巡撫曹𢎞以聞詔隨宜修築十二年秋七月河決滎澤入淮工部尚書石璞治之十三年河決滎陽縣東抵項城逹太和又西南逹潁州注於淮是年河決滎澤縣孫家渡口入汴至壽州入淮七月河又決滎陽東南經陳留自亳入渦口又經蒙城至懷遠界入淮太和縣志俗呼為惠民河即宋時漕河也上通古汴下達淮泗𢎞治二年開榆木集口導河流經虞城碭山四口衝經蕭縣出小浮橋五月河決汴城入淮復決黃陵岡入海命戶部侍郎白昻兵部郎中婁性治決河昻於滎澤開渠導河由陳潁至壽州合淮水入海又築渠堰於徐州以殺河勢三年户部侍郎白昻南京兵部郎中婁性築隄浚渠於徐淮之間自夏五月至秋七月工竣明孝宗實録𢎞治三年正月户部侍郎白昻奏臣奉敕修治張秋決河由淮河相度水勢至於河南中牟等縣見其上源決口南決者自祥符縣界折為二支一合潁水下塗山入於淮一入渦河下荆山入於淮又一支自歸德州通鳯陽之亳縣亦合渦河入於淮北決者一支入金龍等口至山東曹州等處衝入張秋運河去冬水消沙積決口已淤因併為一大支由祥符之翟家口合沁河出丁家道口等處俱下徐州臣以為合潁渦二水而入於淮者其間各有灘磧水脈頗微宜疏濬以殺河勢合沁水而入於徐者則以河道淺隘不能容受方有漂沒之虞況上流金龍等口雖幸暫淤久將復決宜於北流所經七縣築為隄岸以衛張秋已與河南巡撫等官議行之然所司議開河道徐淮境內河所經要地擬議未及其事尚無所統下工部議請復令昻會同巡撫等詳議修濬事宜以聞從之吳寬康敏白公傳公浚宿州古淮河入運道以分徐州之勢築蕭縣徐集等口以殺汴徐之勢通鑑記事本末白昻引中牟之決以入淮浚宿州古睢河以逹泗自小河西抵歸德飲馬池中徑符離橋而南皆浚而深廣之又疏月河十餘以殺其勢塞決口三十六河入汴汴入睢睢入泗泗入淮以逹於海水患稍息附徐溥浚睢河記略𢎞冶二年河失故道益逺泛及汴隄上命今户部侍郎白公昻往治之公舉婁君為副而屬以睢河之役婁君相其便宜自宿遷而上至歸德而北並加疏浚使淺者深隘者闊其旁民居田畝悉築隄以護崇一丈又於符離橋南鑿月河一道長五百丈濶十丈深二丈五尺沿河置減水閘七及浚渠五皆為防河計也六年二月命右副都御史劉大夏修治決河南河全考河決張秋東隄奪汶水以入海河流湍悍決口濶九十餘丈劉大夏行視之曰是下流未可治治上流先導之南行且築長隄以防大名山東之患候河頗循軌而後河可塞也於是濬賈魯舊河四十餘里由曹出徐以殺水浚孫家渡開新河七十餘里導使南行由中牟至潁以入淮又浚四府營淤河由陳留至歸德釃為二一由符離出宿遷一由亳渦會於淮張秋決口既塞又起河南胙城經滑長垣東明曹單諸縣下盡徐州作長隄亘三百六十里即今大行隄也按宋史河渠志慶厯八年河決澶州商胡掃北注乾寧軍入海是謂北流嘉祐五年河分於魏之二股河東至德滄入於海是謂東流東流至祥符初遂塞北流自元符南徙陽武又南奪汴則商湖以南諸流漸次淤絶至明𢎞治七年築斷黃陵岡北流永塞而後之司河者遂專治奪汴入泗合淮入海之河以為翕由之故道矣附劉健記略河南決口之塞黃陵岡屢合屢決既塞之後特築隄三重以護之東西各三百餘里直逹徐州正德五年工部侍即李鏜請築隄防河北徙從之明武宗實録五年九月河自儀封北徙衝黃陵岡入賈魯河泛濫橫流直抵豐沛工部侍即李鏜上修河事宜請起自大名府地名三春栁至沛縣飛雲橋止築隄共長三百十里正以防河北徙可保運道無虞雖若一時工役重大而於久逺終為有益工部覆請從之嘉靖五年以河道都御史章拯為工部侍即會撫按官相度治河明世宗實録五年六月戊寅徐沛河水溢巡按直𨽻御史戴金言黃河入淮之道有三一自中牟至荆山合長淮之水曰渦河一自開封府經葛岡小壩丁家道口馬牧集鴛鴦口徐州出小浮橋曰汴河一自小壩經歸德城南飲馬池至文家集經夏邑至宿遷曰白河𢎞治間黃河變遷渦河白河二道上源年久湮塞而徐州獨受其害若自小壩至宿遷小河一帶并賈河鴛鴦口文家集壅塞之處逐一挑浚使之流通則趨淮之水不止一道而徐州水患可以少殺矣提督漕運總兵官楊宏言徐州上流若歸德州小壩河丁家道口河亳州渦河宿遷小河等處俱有黃沁分流支派故道宜於此開浚或有捷路可開亦從其便庶可以分殺水勢漕運都御史髙友璣河道都御史章拯亦屢以為言俱下工部議覆言宜行各官勘議會奏施行至於浚賈魯之故道開渦河之上源則工夫難成未可輕舉又言沛縣一帶閘河應築之工誠不容緩宜令各官逐一相度黃河水勢向背閘河地勢髙下講求疏浚之法詔如所議命章拯督同山東河南淮揚撫按官親詣地方相度將戴金楊宏所奏斟酌築浚選委司府勤能官鳩工庀事以濟漕運六年河決徐州及曹單城武豐沛等縣楊家口梁靖口等處衝入雞鳴臺沛北皆為巨浸東溢逾漕入昭陽湖光祿少卿黃綰左都御史胡世寧並建議治河疏下總督大臣議行之按明世宗實録所戴黃綰疏欲挽河使北及造滚江龍之類正劉天和所云不切河患者今祗録胡世寧一疏附左都御史胡世寧疏略河流分則勢小合則勢大河身寬則勢緩狹則勢急治河者順其性則易逆其性則難故曰不與水爭利此其大法也河自汴以來南分二道一出汴城西滎澤經中牟陳潁至壽州入淮一出汴城東祥符經陳留亳州至懷逺入淮其東南一道自歸德宿州經虹縣睢寧至宿遷出其東分五道一自長垣曹鄆至陽穀出一自曹州雙河口至魚臺塌場口出一自儀封歸德至徐州小浮橋出一由沛縣南飛雲橋出一自徐沛之中境山北溜溝出六路皆入漕河而總南入淮今諸道皆塞唯沛縣一道僅存所謂合則勢大而河身且狹不能容納故溢出豐沛徐為患近又漫入昭陽湖故流緩沙壅運道逆塞今宜因其故道而分其勢其在汴西滎澤孫家渡至壽州一道宜長浚以分其下流自汴東南出懷逺宿遷二道及正東小浮橋溜溝二道各宜擇其利便者開浚一道以分其下流或修武城以南廢隄至豐單之黃德賀固楊明等集接至沛縣之北廟道口築隄塞決以防其北流此治河之急務也七年總理河道侍即潘希曾請浚黃河上流修築濟沛間東西長隄得旨允行附潘希曾疏略漕渠廟道口以下忽淤數十里者由決河西來橫衝廟道口之上並掣閘河之水東入昭陽湖以致閘水不復南流而沛縣飛雲橋之水時復北漫故也今宜於濟沛間加築東隄以遏入湖之路更築西隄以防黃河之衝則水不散緩而廟道口可永無淤塞之虞仍於黃河上流分浚趙皮寨孫家渡二處二水兼通則橫流以殺而運道可保無虞八年六月豐沛單三縣河隄成凡一百四十餘里九年五月河道侍郎潘希曾疏奏河復故道詔下所司知之附潘希曾疏略本年六月以來河決曹縣胡村寺東衝開一道闊三里有餘東南入古迹黃河由丁道口至徐州小浮橋入運河胡村寺東北衝開一道闊一里有餘又分二支東南支經虞城縣至碭山縣合古迹黃河出徐州東北支經單縣長隄至魚臺縣漫為坡水傍榖亭入運河其單豐沛三縣黃河賴長隄障回今沙淤平滿民多耕作夫黃河由歸德至徐入漕者故道也全河復其故道則患害已逺支流逹於魚臺則淺涸無虞此漕運之利國家之福潘希曾答司空劉麟書黃河為中原患非一日矣智者不與水爭地唯順其勢而導之後世或塞其決或隄其卑或疏其派皆隨時救患者也國家漕渠為南北咽喉勢不得不與河爭地𢎞治初河決荆隆口又決黃陵岡又決張秋當時嘗浚孫家渡宿遷小河而後荆隆黃陵張秋可塞此分泄河怒之驗也況自河南厯直𨽻至山東之曹縣恃長隄以禦河患亦既有年今單豐沛為隄獨不可以捍禦乎蓋事理可據與人力可為者如是而已十三年正月河道都御史朱裳奉詔會工部即中郭秉聰韓廷偉等相度處置河事陳疏濬隄防之要從之附朱裳等疏略黃河自古為患惟我園朝則借之以濟運渠之利故治河與古不同古也導之北以順夫就下之性今也導之南以避其衝決之虞臣等考求其䇿疏濬築三者而已漕渠窄溢洪閘束捍全河入運勢自不容要在分其流以殺其勢今梁靖口趙皮寨已疏通孫家渡亦行挑浚惟渦河一支因趙皮寨下流睢州野雞岡於正河五十餘里漫於平地注入渦河宜挑濬深廣導引汶水歸入正河河過魚臺其流漸北將有越濟寧趨安平東入於海之漸宜將魯橋至沛縣東隄一百五十餘里修築堅厚相其要害固之以石泄之以壩自城武縣至濟寧州創築縷水大隄百五十餘里以防北溢清江浦口正當黃淮會合之衝二河水淺漫入河口以致淤塞阻滯糧運宜濬使深廣而又築隄以防外漲築壩以護行舟河出魚臺雖曰借以利漕然未有數十年不變者且他徙則徐淮南北必至乾涸宜大浚山東諸泉以匯於汶河修築南旺湖隄閘壩以通蓄泄則徐沛之梁不患乾涸矣十四年河道都御史劉天和條議前河臣朱裳等會勘治河事宜工部覆如所議從之劉天和問水集一治河之要録二條治河決必先疏支河以分水勢必塞始決之口而下流自止河性湍悍如欲殺北岸水勢則疏南岸上流支河上策也然支河或不順水勢則雖開而復淤一隄防之制録三條凡創築隄必擇堅實好土毋用浮雜沙泥必乾濕得宜燥則每層須用水灑潤必於數十步外平取尺許毋深取成坑致妨耕種毋仍近隄成溝致水浸沒必用新製石夯每土一層用夯密築一遍次石杵次鐡尖杵各築一遍復用夯築平隄根宜濶隄頂宜狹俾馬可上下謂之走馬隄毋太峻水易衝嚙凡幫隄必止幫隄外一面母幫隄內恐新土水漲易壞隄防重復至四五道者往往衝決蓋修築不堅一也工程報完已矣管河監司府二不復省驗二也舊隄日就坍損車馬行人踐踏成路不復巡視完補禁治三也自今創築者必用新發尺式必編號必分定州縣工程丈尺及官夫名數必置籍備紀府二必身親督理指授工成監司必親閲實舊隄必委屬時一巡視完補車馬行人路口之隄必兩廂各築闊厚斧刃襯隄俾車可上下隄面邉廂路口各限以橫埋丈餘圓木上覆以土守隄者每遇踐踏木露即仍以土覆之隄內外栁株稀少者補植之厯年築隄率以髙一丈或一丈二尺為準但地勢不一如地勢原下隄即卑矣凡築隄以髙阜或平地髙若干為準然必逐段用平準法打量因地勢髙下而低昻之俾隄面遠近髙下一律否則貽患非小也但平準極難須水面浮板並於上兩端小橫木並前木表橫板之厚薄長短廣狹皆極其均停端正而打量之人目力詳審且再三試果無差忒而後可慿也一疏濬之制録四條疏支河以分水勢治河要法顧水有向背地有髙下治水者因其勢而利導之斯善矣然河之所向不可限量趙皮寨口之開冀少殺東流爾不數年而全河從此南徙茍非運道事重是移曹單魚臺之患於睢歸矣不可不審也開河面宜廣俾伏秋水漲有所容底宜深而狹視面僅可四之一形如鍋底俾冬春水落流迅可免淤塞近年率為平底而淺兩失之矣疏濬河泥必逺置河岸四十步外平鋪地上免妨耕種用隄者即以之成隄毋仍臨河免致雨水衝洗仍歸河內凡驗築隄之工必逐段橫掘至底而後見舊以錐刺無益也一植栁六法一曰臥栁凡春初築隄每用土一層即於隄內外邊廂各橫鋪如錢如指栁枝一層每一小尺許一枝毋太稀疏土內橫鋪二小尺餘土面止留二小寸毋過長自隄根直栽至頂不許間少二曰低栁凡隄不係栽栁時月修築者俱候春初用小引橛於隄內外自根至頂俱栽栁如錢如指大者縱橫各一小尺許即栽一株亦入土二小尺許土面亦止留二小寸三曰編栁凡近河數里緊要去處不分新舊隄岸俱用栁樁如雞子大四小尺長者用引橛先從隄根密栽一層六七寸一株入土三小尺土面留一尺許却將小栁臥栽一層亦內留二尺外留二三寸却用栁條將栁樁編髙五寸如編籬法內用土築實平滿又臥栽小栁條編髙五寸於內用土築實平滿如此二次即與先栽一尺栁樁平矣却於上退四五寸仍用引橛密栽栁樁一層亦栽臥栁編栁各二次亦用土築實平滿如隄髙一丈則依此栽十層即平矣以上三法專為固護隄岸將來內則根株固結外則枝葉綢繆名為活龍尾掃雖風浪衝激可保無虞而枝梢之利亦不可勝用矣四曰深栁前三法止可護隄以防漲溢之水如倒岸衝隄之水亦難矣凡近河及河勢將衝之處隄岸雖逺俱宜急栽深栁將所造長四尺長八尺長一丈二尺數等鐵裹引橛自短而長以次釘穴使深然後將徑直帶梢栁枝如根梢俱大者為上否則不拘大小惟取長直但下如雞子上儘枝梢長如式者皆可用連皮栽入即用稀泥灌滿穴道毋令動搖上儘枝梢或數枝全留切不可單少其出土亦須二三尺以上每縱橫五尺即栽一株仍視河勢緩急多栽則十餘層少則四五層數年之後下則根株固結入土愈深上則枝梢長茂將來河水衝嚙亦可障禦或因之外編巨栁長樁內實稍草掃土不猶愈於臨水下掃以繩繫岸以樁釘土隨下隨衝勞費無極者乎嘗觀洪波急流中周遭已成深淵而栁樹直立略不為動益信前法可行五曰漫栁凡坡水漫流之處難以築隄惟沿河兩岸密栽低小柳栁數十層俗名隨河栁不畏淹沒每遇水漲既退則泥沙委積即可髙尺餘或數寸許隨淤隨長每年數次數年之後自成巨隄如沿河居民各分地界築一二尺餘縷水小隄上栽柳栁尤易淤積成髙一二年間隄內即可種麥用工甚省為效甚大六曰髙栁照常於隄內外用髙大栁樁成行栽植不可稀少附劉天和條議略於淮一臣躬親海之間周詢密度黃淮二全河之水俱於淮安清河口會合河廣約數里東注而下河身以漸寬廣下及安東縣則已倍加深廣矣又下及海口則廣二十餘里矣初不見其停阻壅淤也若使海口果為流沙積溢則洪河巨流必將停緩盈溢淮安重鎮必將立見其沈沒矣今淮流奔注初無少緩淮人平土而居亦初未見其有所害也况海口洪波衝蕩非若安流舟楫可以往來縱有套沙亦非尺寸鐵龍爪可以爬蕩若夫甘溝菊花北滷等溝馬邏羊寨等港及通澗河開之未必無益但河廣已數十里諸河溝港之開不過數十丈闊況洪河流向東北而溝港折向東南正以水勢不順故節年壅淤今若得纍萬之財力以濬之秪恐其旋復淤塞爾海口迤北委有新淤套沙然海口迤南近已衝洗開廣前勘海口泄水工程似應停止間一臣上自河南之原武下至曹單沛七八百里沿河周行相度黃可之當防者唯北岸為重宋元迄今纍築隄岸形址皆在焉蓋河水湍悍衝徙不常其隄岸去河逺者間或僅存而瀕河者無不衝決當擇其中去河最逺大隄及去河稍逺中隄各一道塌者增修缺者補完斷者接築使北岸七八百里間聨屬髙厚則前勘應築各隄俱在其中不須另築矣合漸次修舉期於完固茍非異常之水可保無虞按劉天和議十一條今採其切江南河工者節録二條十八年從河道都御史胡纘宗請開黃河支流濟洪通漕附胡纘宗疏略河南睢州考城縣地方新開孫繼口孫祿口各黃河支流一以分殺上源歸睢二處水患一以灌下流徐吕二洪以濟官漕議於孫繼口至孫祿口另築長隄及將考城縣馬牧集等處修堵決口務築髙廣堅實密栽榆栁護之河身既寬土隄亦實大水渙發勢能容受可免衝決散漫之虞而黃河安流二洪順受運道可無患矣十九年河決睢州野雞岡由渦河經亳州入淮二洪告涸兵部侍即王以旗同河道漕運二都御史周金郭持平築塞野雞岡濬李景口支河由蕭縣以逹小浮橋凡六百餘里八閲月而成蕭縣志於是渦河堙而河之全力皆入於徐矣通鑑記事本末王以旗開支河引水濟洪糧運無阻尋復淤自是河益南徙二十一年復鑿野雞岡上流李景髙等口支河三導河東注以濟二洪二十四年河決野雞岡南至泗州合淮入海遂溢蒙城五河臨淮等縣續文獻通考萬民表云河自野雞岡而下分為二股其自東南渦河而行者則為河身其自孫繼口出徐州小浮橋者則為支流然皆併合於淮以入海是黃河入海舍淮無他道也如嘉靖庚子二洪水涸漕舟並阻議者謂黃河改流非也改流必有漫溢之處計今水道唯渦河孫繼口耳今孫繼口之出徐州者既淤則當泛濫於東南之渦河而渦河之水至今亦微蓋自清河以至徐沛地勢節髙一節往年黃河盛溢之時則上漫濟寧諸閘淹沒而淮水亦幾浸城後水勢稍降則自魚臺以出榖亭再降則由飛雲橋以出沛縣而淮水亦以次漸小又降而出徐州小浮橋則淮水亦漸平矣近年黃河水日微故小浮橋之水淤塞宿遷桃源二小河亦塞其通塞本於黃河之贏縮豈關於河之改流哉三十年從漕運都御史應檟請開三里溝河附應檟疏略先年黃河入海之道疏通無滯故開凊河口通黃河之流以濟運道今黃河入海下流如澗口安東等處俱漲塞河流壅而漸髙瀉入清河口泥沙停淤屢浚屢塞兹欲使黃河之水不入清河口須鑿澗口以決壅滯疏支河以殺水勢工力浩繁未敢輕議勘得三里溝在淮河下流黃河未合之上淮水凊多濁少議者謂直閉清河口開三里溝至通濟橋使船由三里溝出淮河逹黃河且道里甚近工費不多欲除河患無以易此三十一年八月河決徐州房村至邳州新安等處運道淤阻五十里御史黃國用以聞詔督河漕大臣先議通運船次塞決疏淺並條列利弊具奏明世宗實録河道都御史曾鈞奏上治河方略自房村集至雙溝曲頭諸處當浚自徐髙廟至邳州沂河諸處當築隄上令會同漕運都御史連礦以實舉行是年又決房村至曲頭集凡決四處淤四十餘里命官濬之三閲月而成三十二年正月從河漕都御史曾鈞等請開濬黃河下流并築塞草灣老黃河決口二月又從刑部侍即吳鵬河道都御史曾鈞等奏建三里溝河閘座附曾鈞等疏略劉伶臺至赤晏廟凡八十里乃黃河下流頃為淤沙壅塞以致奔潰此其疏濬所最先者次則草灣老黃河口衝決淹沒安東一縣亦當急築既成之後宜築長隄磯觜以備衝擊又三里溝新河口比舊口水髙六尺若開舊口雖有沙淤之患而為害稍輕若開新口未免淹沒之虞而漕舟頗便宜將新口暫建置閘座及將髙家堰增築長隄原建新莊等閘加石修砌以遏橫流吳鵬等疏略比年淮徐水患議者謂海口積沙壅開下流所致今臣親厯其地販鬻之舟往來無滯乃知積沙之説出自傳聞無容議矣惟草灣老黃河口劉伶臺宜挑淺築塞使水復故道不致橫潰三里溝新開河口迎納泗水清流可以避黃河之衝墊宜創建閘座以時啓閉三十七年河北徙自新集淤而為陸二百五十餘里河分為十一河防一覽新集河經司家道出蕭縣薊門由小浮橋入洪凡二百五十餘里故道悉淤其流趨東北段家口析為六股曰大溜溝小溜溝秦溝濁河胭脂溝飛雲橋俱由運河至徐洪又分一股由碭山堅城集下郭貫樓又析五小股為龍溝母河梁樓溝楊氏溝胡店溝亦由小浮橋會徐洪共分為十一流遂淤蓋分多則勢弱勢弱則並淤之機也四十三年河水統會於秦溝四十四年郭貫樓淤遂決華山出飛雲橋截沛以入昭陽湖北泛湖陵城口南溢於徐命官往治明會典是年接六年所鑿故迹浚為南陽新河又疏舊河自留城至境山又隄馬家橋遏河流出飛雲橋者使盡歸秦溝魚沛橫流始絶唯茶城時有淺阻附雷禮夏鎮新河工成記嘉靖四十四年秋七月黃河大水異常淤塞龎家屯從華山入飛雲橋分七股奔趨沽沛自谷亭至境山舊運河數百里遍成巨浸漕挽梗阻仰厪世宗軫憂知大司冠鎮山朱公可任特改大司空兼都御史總理河漕至則水勢瀰漫無處著足集河道撫按及司道等官僉議上源既難分導沽沛一帶又湮沒不能施工獨南陽至留城在昭陽湖南地髙黃水之患可免先年上納司冦胡端敏公建議敕都御史盛公應期開鑿以異議中止具遺迹人力可施具疏下工部題準改鑿接舊河於時不便已私者騰謗仰荷聖明洞察敕給諫何君起鳴相勘何備奏舊河雖復利去害存新河工尤可嘉害小利多旨下九卿道會議僉同公感激殫心思不計晝夜經畫築堤建閘竟底績凡一百四十一里餘復修理留城至境山凡五十三里又因薛沙二水為患各開支河以殺其勢築大壩以障其流凡所以為新河久逺計者纎悉備至即今漕艘通行無滯害去利集人以是服公用意之逺云豫告老南行備閲河工水部郎淵等同兗州太守張文淵以豫贊成於內宜記其事豫聞善治水者莫如禹禹疏九河不過順水之性而已三代以降惟漢賈讓有云不與水爭咫尺之地宋歐陽修有云河流已棄之故道難復蓋誠通逹事體者也我國家治河欲資其利通漕非昔比而河徙不常自古為然即如嘉靖以來衝決凡八處矣而紛紛持異議者乃欲疏上源復舊河是賈讓不與爭者而欲爭之歐陽修稱難復者而欲復之寧無鑿乎禹智耶况沽沛低下黃水自西而東越閘河奔入昭陽湖水去沙停旋挑旋淤則難與爭利復故道較然可晣而端敏公之初議與公之成豈漫無逹慮者哉夫睹河者思禹績乂安蒸民萬世永賴也公貞亮秉莭自信為國家建不朽逺猷遭逄世宗乾斷於上不惑浮議使輔臣與豫亦得以贊公於成變魚鱉之區為菽粟之場萬年漕餉亦永賴之是皆公心禹之心能置異議不阻大禹神靈豈無默相於其間乎書云勸之以九歌俾勿壞是宜紀功敘遺後來者所以嗣守云隆慶元年河決沛縣總理河道尚書朱衡奏請開廣秦溝修築南長隄從之附朱衡疏略古之治河惟欲避害今之治河又欲資其利故河流出境山以北則閘河淤出徐州以南則二洪涸惟出自境山至徐州小浮橋四十餘里間乃兩利而無害自黃河橫流碭山郭貫樓支河皆已淤塞故從華山分為南北二支南出秦溝正在境山以南五里許此誠運河之利也惟北出沛縣西及飛雲橋逆上魚臺為患甚大臣以為間廣秦溝使下流通行修築南長隄以防奔潰可以蘇魚沛昏墊之民三年七月河決沛縣漕舟阻邳州不得進河道都御史翁大立以聞工部尚書朱衡覆奏茶城淤塞宜俟水退乃可疏濬户部請如衡議從之明穆宗實録是年工科都給事中嚴用和言宜飭所司塞決口挑濬淤沙以紓目前之急於是工部言黃河為患自周漢至今未有能久治而不決之術要在因勢利導隨敝修補而已今沛縣東隄已完而縣城南至境山西隄未及舉修宜亟加興築以遏沛河之溢至欲多開故道以殺河勢則臣以為不可夫漢武瓠子之工宋人回河之役即嘉靖中間濬孫家渡等處費出不資旋即壅塞未有能出竒䇿使河受約束者也上是其言四年河決邳州總河侍郎翁大立條上三䇿並陳八事明穆宗實録四年九月河決邳州自睢寧白浪淺至宿遷小河口淤百八十里侍郎翁大立言邇來黃河之患専在徐邳故先欲開泇口河以遠河勢開蕭縣河以殺河流者正為浮沙擁聚河面增髙為異日慮耳今秋水洊至橫溢為災臣以為權宜之計在棄故道而就新衝經久之䇿在開泇河以避洪水議無出此兩者工部覆奏往時黃河自劉大夏設官布置而河南之患息自嘉靖初曹單築長隄而山東之患息自近年改成新河而豐沛之患息非必河自順軌由人力勝也新衝之渠卒未可就築塞決口如曩時房村方略則故道宜可通至於泇口之議雖工費不資而一勞永逸比嵗嵗疏鑿費亦自省宜令大立躬自相度條其利害以聞上是之十月翁大立言治邳閼阻之䇿有三一開泇口一就新衝一復故道請以臣三䇿下工部定議行河道諸臣協同舉事以責成功又言河工以錢糧為本以得人任事為要復條上計處工費借留漕銀議留漕米查理船稅起調夫役選用官員奬勵才賢監督工程八事疏下工部仍請復故道以濟目前之急其開鑿泇口之議令大立熟計以聞無持兩可其所陳八事上皆允行是年增築自徐沛至淮縷水長隄明穆宗實録四年十一月工部郎中張純議以徐呂二洪之間漸成填淤河隄寖薄假令來年水溢必有衝決之患請自徐邳至淮繕治兩涯增髙培薄仍築遙隄以防不測工部是其議請命都御史潘季馴勘詳以聞季馴言築隄之法有二近者所以束湍悍之流遠者所以待衝決之患皆為上䇿顧工費不資宜以見築縷水壩增益髙厚曲加保護姑為目前之計從之五年四月河復決邳州自曲頭集至王家口新隄多壞工部尚書朱衝復議開泇河請下諸臣熟計報可附朱衡疏略國家初置漕運悉資泉流自景泰以後黃河入運奪漕為河緣是河身浸廣淤沙歲積不得不藉黃河以行故今徐邳之漕河即黃河也厯考往代河趨濟博則決曹單魚沛而沽頭上下諸閘盡廢趨邳遷則決野雞岡口下毫泗而徐呂二洪頓涸今沛邑新河既成縱決曹魚可保無恙而茶城以南猶屬黃河非盡斥逺之無以善後乞將議開泇河之説下諸臣熟計是年河決油房等十一口都御史潘季馴役丁夫五萬開匙頭灣塞十一口築縷隄三萬丈挑淤八十里故道漸復附潘季馴疏略老河故道自新某厯趙家圈出小浮橋安流無患後因河南水患别開一道出小河口本河漸被沙淺嘉靖間河北徙故道遂成陸地臣奉命由夏鎮厯豐沛至崔家口由崔家口厯河南歸德虞城夏邑商丘諸縣至新集則見黃河大勢已直趨潘家口矣父老言去此十餘里自丁家道口以下二百二十里舊河形迹見在可開臣即自潘家口厯丁家道口馬牧集韓家道口司家道口牛董堌趙家圈至蕭縣一帶皆有河形中間淤平者四分之一河底皆滂沙見水即可衝刷臣以為莫若修而復之河之復其利有五從潘家口出小浮橋則新集迤東河道俱為平陸曹單豐沛永無昏墊一利也河身深廣嵗免泛溢之患虞夏豐沛得以安居二利也河從南行去會通河甚逺閘渠無虞三利也來流既深建瓴之勢導滌自易則徐州以下河身亦因而深則四利也小浮橋來流既逺則秦溝可免復衝而茶城永無淤塞之患五利也馮敏公開復邳河記隆慶庚午秋八月河決於睢寧之白浪淺既而白浪淺淤復決青羊淺又既而青羊淺淤河益分裂潰決決而南為王家口張擺渡口馬家淺口曲頭集口決而北為曹家口其小口在辛安左右者七於是河流悉繇決口南趨睢寧平地為湖漂沒軍民田廬無算輕舟從此出小河口其支分而北者出直河而正河故道自曹家口至祁之直河九十里胥為平陸淤運艘九百三十隻糧四十餘萬石官民船又數百自曹家口而上至曲頭直河而下至宿遷又九十里河身淤淺不能通舟睢民昏墊運道阻絶於是起大中丞歸安潘公於家俾治之公至博訪羣情時議多以為故道不可復有欲因睢寧決勢而利導之者公謂河源盤折數萬里水夾泥沙急則沙隨水滚稍緩則水漫沙停比年因水勢𣪚漫沙墊底髙容受漸少每一泛溢輒便為患今舊河廣且百餘丈深且不測若仍復舊河中間小渠引水衝刷兩隄夾束使不𣪚漫則水勢歸漕淤淺漸去河身自可復舊若就新衝水勢散漫湖波平淺不能復深工力所及能有幾何伏秋水至必壅不下徐邳之間將成魚鱉此必不可羣議乃定於是度逺通議工役具畚築計餱糧大發淮揚徐及廬鳯山東河南夫並徭淺各夫分司道官為五工統之公指示方略畫地課工以隆慶五年春正月十有六日肇役浚築羣工齊奮至二月二十日渠成二十三日縱水歸渠淤沙漸刷河流乃通凡舊淤糧艘及官民船皆繇渠出時築決之工張罷浚曹家二口已完而曲頭馬淺王家三大口亦已有緒公方且調集樁草益急羣下或言急此何為但笑而不言翌日風雨驟作不止兼以黃河桃花水漲會山東諸泉並至乃季春朔日水復大溢漲漫淹浸莫辨湖河新舊隄防潰決殆盡復決閔家口油房口曲頭舊口之東王家舊口之西房家口青羊口白浪淺口與諸小口凡四十三處羣情大駭役夫懼且潰公時患背疽乃裹瘡而出撫慰勞來身自督率示以必成衆志復定晝夜率作工料踵集隨用輒濟於是諸口漸合而縷水之堤亦漸成四月七日麥黃水又大至狂風挾水勢復衝決閻家口之西及半戈山之左右公督率益勵守新築口六月三日諸築塞之工咸畢先是淤河多淖沙人立輒陷工不得施公命以木橫沙面掘半􅅹水左右互倒水盡沙乾工乃得施決口懸溜數尺噴沫成雷負土入水輒便消去公命以大掃截流維以巨纜旁植巨樁其衝之處湍猛溜急樁折掃滾勢難猝就乃復相視緩急偃仰合度卒復壓以厚土勢若岡陵衝乃克定築堤捍水浮沙既不能堅而實土又為比年流沙所壓必深掘至尋丈及逺取於民間空基與隔河運取山土往來力役竟日不能數筐公命囊土程衡唱籌課役土工乃集於是兩岸屹然河流受束濬刷淤沙深廣加舊四百萬漕糧飛帆直上雖伏秋水三至懷襄徐城而曲頥以下凡公經理之地皆安流如故矣是役也用夫五萬人興工五閲月決口築塞者五十有八浚河以丈計者三萬二千四百築隄以丈計者七萬五千有零樁草栁葦以株東捆計者二十萬有零麻檾以斤計者八萬四千有零所用河漕貯積撫按贓贖徐淮商稅及徐淮糧米總計僅十一萬金有竒視初請未及三分之二而決口增築隄工髙厚倍於原題者二蓋公之經畫素定而復以身先故羣工率作因敢不竭心力事半功倍其成之速如此既成之後公又為之計久逺乃並修徐呂靈璧之堤以束上流復梨林房村之壩以防衝逸建鋪舍設官夫以時防守植草栁集工料以預備禦其善後之圖又如此使當首事之初非公堅持復故羣議方且猶豫安能専意挑濬受役之始非公指受方略則河工多未閲厯安能悉協機宜垂成之際非公先事預備則臨時且將無措安能隨用取辦復決之時非公鎮定親督則衆心方在搖惑安能堅忍有成成功之後非公長計逺慮則人情方在懈弛又安能思及久逺而為之善圖其後哉繼自今拯徐淮數十萬之民命於既弱通國家數百年之運道於既湮而俾之勿壞者公之明德顯功逺矣哉六年正月從工部尚書朱衡請修築徐州至宿遷長隄凡三百七十里並繕治豐沛泰黃隄南河全考是年創築徐呂至宿遷縣張林鋪兩岸隄各長三百七十里又徐州北至茶城築兩岸隄各長三十里八月工部尚書朱衡建議治河詔河臣萬恭加議經理十一月河工告成附朱衡疏略國家治河不過濬淺築隄二䇿濬淺有漕黃交會之異濬漕黃者或爬或撈或逼水而衝或引水而避此可人力勝者茶城與淮水會則在清河茶城清河之淺無嵗不然蓋二水互為勝負黃河水勝則壅沙而淤及其消也淮漕水勝則衝沙而通雖用人力水力居十七八築隄有截水縷水之異截水之隄可施於閘河不可施於黃河蓋黃河負湍悍之性挾川潦之勢所向何堅不破顧可以一隄當之乃縷水之隄不然河由淮入海運道實之故於兩岸築隄不便從旁潰溢始得遂其就下入海之性蓋以順為治非以人力勝水性故至今百五十六年永賴不變查清河之淺應照茶城例每遇黃河漲落時穵挑河潢導令淮水衝刷則雖遇漲而塞必遇落而通惟清江浦水勢最弱出口處所適與黃河相值比因民船由閘往來不閉遂至沙淤壅塞既有妨運道復眙患淮郡宜於黃水盛發時閉各閘惟鮮貫船隻聼令經由探有帶入沙淤隨即爬撈毋使停滯若海口訪自隆慶三年海嘯後壅水倒灌低窪之地積瀦難泄今海水固已消涸尤宜時加試測設有沙淤隨即疏浚至於築隄黃河兩岸北是縷水不得以攔截為名又疏略漕河自儀真至清江浦與臨清至張家灣逺隔黃河茶城至臨清與黃河相近清河至茶城則黃河即運河也茶城以北當防黃河之決而入茶城以南當防黃河之決以出防黃河即所以保運河故自茶城至邳遷髙築兩隄宿遷至清河盡塞缺口蓋以防黃水之出則正河必淤昨嵗徐邳之患是也自茶城秦溝口至豐沛曹單諸處創築增築以接縷水舊隄蓋以防黃水之入則正河必淤往年曹沛之患是也二處告竣則河深水束無旁決中潰之虞然沛縣窪子頭至秦溝口應築隄七十里接古北隄與徐邳之間隄逼河身應於新隄外别築遙隄譬之重門待暴增纊禦寒此二項工程尤當及時修築江南通志卷四十九
