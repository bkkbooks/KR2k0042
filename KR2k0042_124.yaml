body:
  text: 欽定四庫全書江南通志卷一百二十五選舉志舉人一唐制館監州縣學生舉其成者送尚書省其選舉不由館學謂之鄉貢皆集試於考功員外郎開元中始移貢舉於禮部宋法三年一貢舉秋取解冬集禮部春考試當時集試者通謂之舉人唐玄宗罷鄉貢舉人不由國子及郡縣學者勿舉送是也奏名於禮部仍謂之舉人宋嘉祐二年親試舉人是也至明洪武十五年定科舉法以鄉試及格者為舉人並得銓注本朝因之慎簡主司增廣解額典彌重焉逮憲皇帝簡擇試用闢仕進之門士益斌斌思歌鹿鳴來矣明洪武三年庚戌科全榜龍文明等七十三人趙權句容人湯允政泗州人張博泗州人孫盛泗州人鄭叔雨吳縣人張著常熟人唐溥常熟人鄒立誠常熟人黃著常熟人夏時崑山人郭疇崑山人朱􅛁吳江人金文徵嘉定人黃誼崇明人髙原華亭人袁凱華亭人張璧華亭人曹克端華亭人許澄華亭人曹友江隂人錢蒙宜興人儲正夫宜興人儲立夫宜興人儲益夫宜興人李善本濳山人汪翔婺源人魏益碭山人洪武四年辛亥科名數無考傅㪺崑山人陳永崑山人漆居恭江隂人郭貞江隂人洪武五年壬子科名數無考許士良江隂人方亨潁州人洪武八年乙卯科名數無考奚殼吳江人洪武十七年甲子科全榜廖孟照等六十六人孟照江西人陳恭江寧人凌輅句容人吳斌句容人齊德溧水人胡桐溧水人劉文溧水人沃浚溧水人余文六合人桂滿臨淮人李裕壽州人孫仁壽州人楊言壽州人髙舉潁州人陳璵潁州人陸鎰吳縣人馮原智吳縣人張迅崇明人茅良驥崇明人顧峘長洲人王遜崑山人胡士文華亭人倪祐華亭人陳景新華亭人張禮華亭人王覲華亭人顧諟華亭人唐盛華亭人李敏江隂人馬驤丹徒人許靈丹徒人陳迪丹徒人唐俊民丹徒人盛安丹徒人盛思明丹徒人陳友常丹徒人湯選金壇人鄒英金壇人李宏江都人鄧祐江都人陳翼泰興人陳傑髙郵人柏齡髙郵人賈俊如臯人髙迪興化人吳衡泰州人羅拱安東人楊靖山陽人楊新合肥人劉勉安東人蕭敏合肥人惠忠合肥人劉儼桐城人方升懷寧人俞本蕪湖人羅瓚望江人秦逵宣城人周原繁昌人萬道傑貴池人陳敬宗貴池人胡昌齡歙縣人程善婺源人許璿貴池人洪武二十年丁卯科施顯等二十六人王士惟溧水人欒鳳溧水人朱勝溧水人沈鏞潁上人周秉一吳縣人王好謙崑山人施顯常熟人本姓桑蔡文華亭人舒楚江都人徐麟泰州人王具瞻山陽人徐麒山陽人周文舉安東人倪貴合肥人甘霖懷寧人劉得太湖人程煜太湖人邢思文當塗人耿升當塗人尤毅當塗人田遊歙縣人鄭道同歙縣人俞慶婺源人汪宗大婺源人洪武二十三年庚午科黃文史等二十人文始福建人談允溧水人房義溧水人許暘六合人韓進潁州人陸得舉崑山人姚恕吳江人倪峻丹徒人楊元丹徒人李經沭陽人沈逵邳州人李六安人錢時桐城人方法桐城人羅寅桐城人許觀貴池人谷瑢石埭人程通績溪人王嘉建平人洪武二十六年癸酉科名數無考俞允江寧人焦敏潁州人杭濬溧水人王性溧水人陳應奎長洲人陳良崑山人蔣鑄丹徒人袁升丹徒人王孚安東人王規海州人林和合肥人白塤合肥人劉泳涇縣人宗廣涇縣人程士儀貴池人江虎歙縣人程尚休寧人柯文彬績溪人洪武二十九年丙子科尹昌隆等共七十七人昌隆江西人于源上元人陶鎔江寧人李崇江寧人趙麟江寧人嚴箎句容人馬驤溧陽人陳儒溧陽人陳鎰溧陽人趙昱溧水人梅哲溧水人莫英江浦人傅謙六合人吳珏六合人趙鼎臨淮人尹綬定逺人鄭誼臨淮人李默定逺人陳貫霍邱人杜琦泗州人王儉天長人諸葛珙潁上人楊旭泗州人薑信吳縣人姚山吳縣人趙宗禮長洲人宋玘長洲人王永年長洲人沈熊長洲人何德源吳江人范同崇明人賀文善華亭人王原華亭人石潤華亭人李學華亭人王徵上海人徐子信上海人尤實江隂人潘吉江隂人湯銘江隂人湯文顯丹徒人張順丹陽人周郁丹陽人倪端江都人劉斌江都人糜煥儀真人吕昱泰興人陳讓髙郵人郭觀如臯人張忠通州人崔升山陽人潘毅清河人盧欽清河人張材沭陽人馬節海州人王春贛榆人欒榮合肥人俞淵合肥人宋獻六安人汪貫六安人段亮英山人黃懷英山人陶誼當塗人李儀當塗人陶升當塗人秦瑀當塗人洪文洽歙縣人汪求休寧人江原宗婺源人戴善應績溪人王政滁州人劉泰徐州人建文元年己卯科劉政等二百十四人張欽上元人時泰上元人任安上元人方矩上元人何閏上元人王良上元人王憲江寧人李誠江寧人陳善江寧人王賓江寧人吳觀江寧人王滿溧陽人鍾回溧陽人彭守學溧陽人潘鵾溧陽人謝嘉溧陽人張禮溧水人朱旭溧水人夏廉溧水人湯茂溧水人宋鎬溧水人經綸溧水人孫讓溧水人劉觀江浦人史雄江浦人吳智江浦人夏潤六合人馮善臨淮人談哲臨淮人胡敏定逺人王希善五河人陳謐五河人周節五河人胡潛霍邱人陳璟靈璧人范淵大和人李瑛亳州人俞本吳縣人劉政長洲人王皓吳縣人尤安禮本姓欽吳縣人浦陟長洲人陸貞長洲人馬升崑山人姚思聰長洲人錢紳吳縣人黃本崑山人姚伯善常熟人宋珩嘉定人錢公慶華亭人陳善崑山人蕭潭吳江人吳仲文華亭人吳綱華亭人謝徵華亭人石璞華亭人穆良華亭人錢蒙華亭人楊銓上海人劉信上海人周霖上海人馮吉上海人劉庸上海人劉琳上海人蔣賢江隂人沈斯江隂人顧行江隂人楊輝江隂人王冕江隂人許節江隂人王衡江隂人鈕慶江隂人周欽江隂人許勝江隂人謝莊江隂人沈端江隂人鄧蒙江隂人王諒江隂人宋參江隂人張善江隂人何澄江隂人施敬江隂人郎祐丹徒人倪敬丹徒人鄒旭江都人劉鎮金壇人趙理江都人張英江都人