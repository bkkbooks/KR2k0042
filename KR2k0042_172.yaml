body:
  text: 江南通志卷一百七十三人物志流寓二安徽寧池太廬鳳潁八府和廣六三州安慶府漢橋玄字公祖梁國睢陽人舉孝廉補洛陽左尉桓帝末鮮卑及髙句驪叛四府舉玄為度遼將軍元至鎮休兵養士督諸將討擊皆破散在職三年邊境安靜靈帝初徴入為河南尹建寧三年遷司空轉司徒光和元年遷太尉以疾罷玄謙儉下士子弟親宗無在大官者家無居業當時稱之後避地於潛卒葬彰法山晉王祥字休徴臨沂人祥性至孝早喪親繼母朱不慈祥愈恭謹漢末避亂扶母攜弟隱居大雷三十餘年時傳其孝行屢辟固辭弟覽勸之乃應召拜司空轉太尉加侍中舉朝見司馬昭皆拜祥獨長揖武帝踐阼拜太尉進爵為公王覽字元通祥繼母弟方數嵗見祥被楚撻輒涕泣抱持祥漸有時譽母鴆之覽覺徑取酒飲母遽覆之自後朱賜祥食覽必先嘗母虐使祥妻覽妻亦必趨共覽孝友名亞於祥應召纍遷光祿大夫唐畢諴字存中河南偃師人纍官禮部尚書同中書門下平章事早嵗讀書舒州主簿山擇地葬親掘地得石作潛山賦鐫於上羅隱字昭諫餘杭人善詩賦避黃巢亂遊宿松與楊顯友善寓其家又愛望江小茗山蓮花峯築廬遁迹焉後官至諫議大夫朱溫篡位以前官召不往往謁錢鏐勸舉兵討溫鏐雖不用其言甚重之宋馮京字當世江夏人少讀書於皖之萬松山自鄉舉至廷試皆第一時尚未娶張堯佐負宫掖勢欲妻以女力辭楊萬里字廷秀吉水人中進士為零陵丞時張浚謫永杜門謝客萬里請見之浚勉以正心誠意之學因榜其堂曰誠齋纍官祕閣修撰提舉萬夀宫遂不復出愛潛山水常遊寓於舒龍仁夫字觀復江西永新人博學好古潛心理道官湖廣儒學提舉晚居黃岡宋將吕文煥降元與仁夫有舊文煥下江州仁夫過之招飲琵琶亭仁夫即席賦云老大蛾眉負所天忍將離恨寄哀絃江心正好看明月又抱琵琶過别船坐客皆掩泣罷酒避亂卜居望江隱居著述所著周易集傳其言多先儒所未發金王庭筠字子端河東人泰定間進士詞翰文彩照耀一時晚愛皖之司空山嘗居其下自號司空行窩寄者元薩天錫泰定進士為燕南道亷訪司照磨登司空山太白臺歎曰此老真山水精也遂結廬其下避世終焉朱公遷樂平人文公裔也至正間任金華學正以道德文章名於世後同長子僉遷潛山明李新之字湯銘順天人景泰丙午鄉薦任饒州訓導左遷桐城竹子湖河泊所訪李公麟遺迹歎曰山情水色正為我輩遂隱居龍眠鄧宗經會稽人淹博工詩文成化間為潛學官纂修郡志晚年髙尚遂家於潛築頤老莊以自娛國朝葉筠字竹君湖廣公安人也工詩文尤深性理諸書明季屢辟不就擔簦遊四方至皖愛江山之勝因寓居焉施德裕字惟一雲南鶴慶府人明季為黃州府同知城陷被執檢空囊知其亷釋之鼎革後寓望江學圃蒔花木自娛足不履戶外徽州府漢管輅字公明平原人精易學為人筮卜言輒竒中嘗學道祁門山中有管公壇廟晉孔瑜字敬康山隂人以軍功封餘不亭侯惠帝末歸鄉里後入新安山中改姓孫氏以稼穡讀書為務忽舍去皆謂為神人立祠祀之唐張志和字子同金華人肅宗時待詔翰林歸隱自號煙波釣徒浮家泛宅往來苕霅間後寓居祁門縣十都以終老子孫世居其地名張村范傳正字西老鄧州人元和初刺歙州擢宣歙觀察使改光祿未赴卜居休寧名其里曰博村志孟博後也宋吕廣問字仁甫開封人丞相夷簡後為婺源簿靖康南渡寓新安擢禮部侍郎密奏建儲之議孝宗即位首疏十二事以病知徽州嵗餘召對極論時事朝論韙之孔端木字子與道輔曽孫徽宗幸學訪先聖後以行藝俱優特賜上舍出身建炎南渡注黟令因卜築焉馬廷鸞字翔仲饒州人贅婺源張氏遂居焉官至觀文殿大學士寧國府晉劉遺民嘗居涇縣之水西有釣臺遺迹唐韓愈南陽人按朱子韓文考異文公有别業在宣城復志賦及歐陽詹哀辭祭十二郎文皆云就食江南蓋指宣也其示姪爽詩云宣城去京國里數逾三千念汝欲别我解裝具盤筵又云汝來江南近里閭故依然則公之家居宣州有明徴矣今敬亭山有昌黎别業祠祀之白居易太原人元和中嘗寓宣城為宣城守所貢兄沒葬城西五里今稱白府君墓居易祭烏江十五兄文所云宣城之西道傍荒草者也吕從慶字世膺河南人避黃巢亂與弟從善隱歙之堨田後從善留堨從慶入旌德萬山中所作詩有吾亦陶彭澤之語卒葬珠婆塢五代刁彥能字德明上蔡人父禮遇亂徙家宣州彥能少孤事母篤孝初在節度使王茂章帳下茂章叛吳歸吳越彥能不從而撫定其衆繼事徐知訓知訓忌烈祖屢欲加害彥能嘗隂護之烈祖代吳入為環衛後仕至撫州節度使宋王邦憲周紫芝竹坡詩話云建炎南渡邦憲客宛陵與鄉人相遇作集句一篇鄧道先南陽人乾道間官至尚書慕南陵山水卜宅居焉明石金字南仲黃梅人任御史嘉靖中諫止醮祠謫戍宣州衛後赦還湛若水字元明增城人嘗講學於宛陵鄒守益字謙之安福人嘉靖初以編修議大禮謫判廣德往來宛陵時貢安國戚袞梅守德等從之遊講學之風遂冠江左陳履祥字光庭祁門人得盱江之傳萬歷間倡教宛陵嘗聚講於同仁會館及門八百餘人陳文燭字玉叔沔人罷官後慕敬亭柏梘之勝僑寓二載國朝薑埰字如農萊陽人明季仕給諫以抗疏劾周延儒豫杖謫戍宣州遺命葬此以志死不違君之義池州府漢髙獲字敬公汝南人少遊學京師與光武有素師事歐陽歙歙下獄獲詣闕請歙帝雖不赦而引見之欲用為吏獲辭去三公爭辟不應後逺遁江南卒於石城石城人思之共為立祠宋穆修字伯長汶陽人官海州理掾恃才忤監郡者坐削籍𨽻池州後遇赦除潁州文學參軍修傳陳摶易學又首倡為古文滕宗諒字子京河南人范仲淹薦其才擢左司諫謫監池州酒稅樂九華之勝於雲外峯下築書堂以居曹清字立甫寧晉人歷起居舍人天聖中謫知彭澤縣過貴池愛東源山水遂棄官築室以居沈遼字睿達錢塘人初受知王安石及新法行遼與論事多不合久之攝華亭令使者以夙憾劾之奪官流永州更赦徙池州歷九華秋浦玩其林泉喜曰使我自擇不過爾耳即築室齊山上名曰雲巢有雲巢集孔武仲字常父新淦人元祐中官著作郎論科舉之弊詆王氏學請復詩賦取士歷寶文閣待制知宣州後坐元祐黨奪職居池州卒太平府唐李白字太白隴西人天寶中以才名供奉翰林院明皇愛其才數宴見常侍帝醉使髙力士脫鞾力士恥之擲其詩以激楊貴妃白自知不為所容懇求還山帝賜金放還常乘舟與崔宗之自采石至金陵著宫錦袍坐舟中旁若無人安祿山反轉側宿松匡廬間坐永王璘事流夜郎會赦還李陽冰為當塗令白往依之白晚好黃老渡牛渚至姑孰悅謝家青山欲終焉卒葬東麓宋石待問字則善眉山人七嵗通四聲嘗賦石上松曰何當為柱石同立太平基時以公輔期之舉進士及制科進諫史百卷真宗大悅仁宗時判太平州上書言邊事召對稱旨授太常丞知階州尋引年致仕卜居蕪湖戒子孫當以儒學忠義自立嘗曰吾生平仕宦十步九蹶命也顧身無玷缺耳皇祐三年卒知州黃庭堅表其墓子禹勤李之儀字端叔滄州人舉進士元祐中為樞密院編修官能詩善屬文蘇軾帥定武辟置幕下范純仁卒之儀代草遺表蔡京構以罪編管太平州自號姑溪居士有姑溪集杜俁字碩甫成都人崇寧間侍父宦江寧遂家蕪湖嘗從蘇軾遊有詩名韓元傑字漢臣億五世孫靖康間以蔭選知臨潁大帥劉光世竒之拔授監軍時戚方李俸各擁兵懷反側朝廷遣使撫諭莫敢前傑匹馬扣寨酣飲連日遂受降後知濠州破劉麟兵進秩移楚州後與弟元象同居蕪湖王淇字德機豫章人紹興初避李成亂徙家蕪湖資敏而學博尤精毛詩春秋所交皆知名士陳規字元則安邱人以新科明法出身任法曹調邑令靖康初勤王有功以疾請祠居當塗後知順昌堅城積粟以助劉錡大破金兵歷淮西安撫使卒楊宏中字充甫福州人弱冠補國子生韓托胄竊弄國柄竄趙汝愚於永州李祥楊簡連疏救者俱被斥宏中與同舍林仲麟等五人伏闕上書托胄大怒將竄之嶺南余端禮丐免上惻然乃送太平州編管時號六君子明張慎言字金銘陽城人自曹縣令入為御史忤逆璫謫戍甘肅崇禎時初起太僕少卿歷南京吏部尚書甲申後僑居蕪湖寄食蕭寺翻經禮佛瓢衲蕭然尋病卒廬州府漢施延沛國人避地廬江種瓜為業明於五經星官風角家貧母老周流傭賃順帝時徴拜太尉宋楊繪字元素綿竹人皇祐間擢進士第一仕至天章閣待制嘗寓無為州山中自號無為子劉筠字子儀大名人真宗朝守廬州愛廬山水因築室城中構閣藏所賜詔誥仁宗飛白書真宗聖文祕奉之閣八字以賜之謝枋得字君直江西弋陽人宋亡隱無為之南鄉州人知之相與建樓城隍廟左迎居之事以師禮後潛往江南遂為薦者所逼不屈而死元蔡章洛陽人任閩省員外郎至正丁未越海北歸遇大魚摧舟漂流七日從台州登岸至舒城遂家焉明陳夀字本仁新淦人成化進士官南兵部侍郎亷聲素著徙居合肥作詩曰買田陽羡原無計問族舒廬舊有因癡兒能識癡翁意但道歸來不道貧鳳陽府唐尉遲恭字敬德歸唐為開國元勳封鄂國公後居定逺縣東鄉子孫世為定逺人墓在石羊岡王質字華卿河汾人文中子四世孫寓居淝水上宋吕龜祥太平興國二年進士及第為殿中丞知夀州有惠政民愛留之不忍舍去遂家焉明唐肅山隂人元至正壬寅鄉薦授嘉興路學正明初以例徙濠州應薦召修禮樂書擢國史編修官以疾失朝謫佃於濠之瞿相山卒著有丹崖集國朝李彬明季仕定逺知縣歷官河南巡撫先是定人為彬立有生祠國變遂移居焉出入一蹇一僕混迹稠人中莫知其為前代開府也潁州府唐段珂汧陽人秀實孫僖宗時寓居潁州黃巢圍潁州刺史欲以城降珂募少年拒戰賊遂潰拜州司馬宋王回字深父侯官人父平言宦潁州卒葬汝隂遂家焉舉進士為衛真簿自免歸以學行見知歐陽修薦授將作監主簿為人孰行孝友質直平恕取舍進退必度於仁義與處士常秩友善熙寧中秩上其文集補回子汾為郊社齋郎歐陽發字伯和歐陽棐字叔弼歐陽辨字季默俱廬陵人父修知潁州愛其風土遂卜居焉發少師事胡瑗得古樂鐘律之説不治科舉文字自書契以來君臣世系制度文物天文地理莫不究悉以父恩補將作監主簿賜進士出身纍遷殿中丞棐廣覽強記能文辭蔭為祕書省正字登進士修卒代草遺表神宗讀而愛之意修自作也後坐元祐黨廢發早卒辨與棐屢見於蘇軾在潁唱和之詩劉攽字貢父臨江人官屯田員外郎喪父時歐陽修守潁攽往依之相與賡詠有詩云羈鳥能擇木遊魚知赴淵卜居幸樂國負郭依良田和州宋彭思永字季長廬陵人治平中為御史中丞力論濮議稱親之非英宗感動後以戶部侍郎致仕寓和州卒子衛居父喪哀毁以孝聞通判趙州有清節吕希哲字原明河南人申國公公著子為人端重有至行歷崇政殿説書開導哲宗皆理學要言紹聖間坐元祐黨謫居和州靜坐一室怡然自得嘗賦詩有除却借書沽酒外更無一事擾公私之句龔原字深父處州人歷官寶文閣待制經術粹深每朝有大議輒援古禮以對崇寧中陳瓘彈蔡京得罪原坐與瓘友善落職謫居和州起知亳州命下而卒明危素字太璞金溪人仕元歷翰林學士承旨博學善文辭朝廷大制作多出其手入明為侍講學士謫居和州卒含山旅舍廣德州宋王機字仲達宛陵人建炎兵訌徙家建平仗義好施贍恤宗族歷官修武郎尚濮王嗣永康縣主嘉定八年嵗飢部使者真德秀貽帖易粟機慨然應之溪南飢民全活甚衆盛瑞字晉祥中宣和進士紹興中愛不老泉之勝卜居焉趙時晦寓居廣德州死元兵之難明王叔英字原采黃巖人以翰林修撰旅出廣德聞靖難師入沐浴具衣冠自經賦絶命詞云人生霄壤間忠孝貴克全嗟余事君父自省多過愆周粟豈不佳所見良獨偏髙蹤逺難繼偶爾無足傳千秋史臣筆慎勿稱希賢道士盛希年依其遺筆葬之祠山之陽正統間楊士竒題其墓而祭之六安州宋汪徹浮梁人立信從祖進士纍官至樞密院與立信曽大父智宣諭湖北道六安愛其山水因居焉明史洪謨字經三原籍廣寧僑家於六辛未登進士知宜陽縣罷歸乙亥春流冦突至州守以公事出人心惶迫洪謨慷慨登陴奮勇禦敵城賴以完江南通志卷一百七十三欽定四庫全書
