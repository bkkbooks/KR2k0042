body:
  text: 江南通志卷一百六十一人物志孝義五寧池太廬四府寧國府唐蘇仲芳南陵人父死負土成墳廬於其側繞墳行哭羣烏隨之悲鳴祥雲覆墓瑞草蔓生萬晏涇人數世同居詔表門復其家楊懍旌德人光化中試太子校書行義修飭闔門義居纍千餘口以孝友世其家宋許遂字伯通宣城人早孤事母盡孝鄉人勵其子輒曰汝獨不慚許伯通乎遂子俞字堯言少失恃父所嗜味逺邇畢至隨侍都下與其婦茹粗糲而奉饌頗珍公卿多推俸佐之居喪以禮聞汪文諒字叔逹旌德人纍世同居凡一千三百口州上其事詔州縣存撫賜以百金諒兄弟感歎曰吾家治農未有一士應上之求者即以所賜金購書藏之子孫由是貴顯李經字天常南陵人母死廬墓躬執畚鍤壘垣植松地故多虎後遂絶迹汪政宣州人纍世聚居數百口詔加旌表蠲其課調呂鏜字夢祥旌德人幼孤事母以孝聞嘗遊宿亳間客潘氏不御酒食問之曰鏜逺遊親養勿給敢自享厚饌乎政和三年入京上書請嚴生子不舉之禁仕至鳯翔府判官何自興寧國人寶祐間父元貴疾禱於神刲股以進越三日愈元周淳卿寧國人親殁於墓側築永思亭哀慕厯九年不改明凌餘慶宣城人洪武初以匠役京師聞母病籲天割股時禁嚴不得輒歸白於官以聞敕以所刲股付餘慶妻兄楊添一持歸妻和糜進其母尋愈詔復役旌其門江休旌德人永樂初父坐事赴刑部臨刑屬諸子以後事休乞請代父曰吾老矣奈何以強壯易我休竟詣所司訟其事得釋父嘉其孝厚豫之以資産休曰此人子分內事因以為利可乎辭弗受侯來保尚書陳迪之僕也迪以靖難抗節與六子同日死時姻親莫敢旁視來保潛拾其遺骨還葬宣城梅應魁宣城諸生父病篤應魁禱於神願捐己算益父比卒哀毁如禮既葬廬墓疏食水飲三年始歸戴三元旌德人父品以黃册事赴詔獄三元與其兄隨至京鞫問當刑兄弟爭請代卒以三元代父死丁恕字子貞南陵人性敦厚好義鄰人垣壞獲束帛內皆白金簪珥也恕急還之吳大經宣城人父宗周𢎞治間以孝旌傳詳儒林宗周宦臨江繼母金氏從大經在家忽心動犯江濤以行適及母永訣宗周後病癰大經吮膿嘗糞居喪骨立陳希良字克忠宣城庠生母疾衣不解帶者經月及殯廬於墓朝夕哭奠父沒亦如之俞瓏字汝霖宣城人幼失怙母病篤籲天割股得愈居恆手織草屩雨雪則置衢側聽人自取母終廬墓三年詔給冠帶旌之程文冕字志髙寧國人成𢎞時三賑邑飢詔賜七品冠帶朱時俊宣城人父夢桂病死數日俊痛不忍蓋棺籲神求代桂果蘇已患癱痿俊刲股和丸進之復起張道榮涇縣人事親篤孝母殁廬墓三年正德中旌表貢汝悌宣城人父病嘗穢及卒廬墓三年費有時字子雨宣城諸生孩年母病輒泣不食父漢卿多疾好客而家貧時多方召客為父歡弟性流蕩有時以母命終身不析箸徐棠字友之宣城人性篤孝母病刲股籲天果得異人授藥而愈居喪廬墓未嘗見齒歷任婺源尉氏學博廩祿悉散之宗親云陸可宗字省我宣城諸生父病篤刲股獲蘇有田數畝悉讓其兄藉修脯為養汪昌字大祺宣城人母喪廬墓三年歲祲遺胔遍路昌撤樓板為棺以瘞之正德間以貢授進賢主簿林桂芳太平人嘉靖間父倬卒於官千里扶櫬賊劫其母桂芳翼之被創死母得免金俸宣城醫官金璞之僕本姓嚴嘉靖中璞以輸歲額死金陵子枝甫在襁褓俸破産走京師了公逋歸以所嬴百金營繕田廬與妻聶氏同撫藐孤勞悴萬狀郡守聞而旌異之梅士學字伯典宣城人萬厯舉人肆力羣籍性端醇事父孝謹奉嫡母得其歡心鄉居不入城市人以為不愧孝廉林文榜太平人萬厯間大水父宗倫被溺文榜從樓墜下援之與父同殞吳仕期字德望宣城諸生倜儻負氣張居正奪情仕期擬上相國書傳於外南操院胡檟命太平同知龍宗武捕置獄訊曰必有指授者舉其人當爾貸蓋指沈修撰懋學也仕期至死無一語連及遂斃於獄後御史孫惟誠具疏聞檟與宗武俱遣戍劉芳顯字孔昭宣城人幼孤貧甚挾策遊京師以文見知於大學士劉一燝名重京師從遊者日衆罄所贄歸葬祖父母完諸弟婚并婚從弟以延叔祀宗黨義之吳日通宣城人與弟日遇同居六十年不忍析箸人稱二難潘寧海字太乙宣城人六歲時父客外音問久絶寧海圖父像號泣中野後獲父柩於淮邳千里裹骨歸母患膈刲股以救張昭字斯明南陵人年十四父遘危疾割臂煮糜獲愈及卒哀毁骨立喪葬以禮吳珍南陵人性友愛弟疾篤告天求代不數日弟果愈珍遘疾沒弟撫其七子勝於己出沈仲曄南陵人弱冠時母沒守棺不入私室比葬父憐而召之不歸以疾卒劉邦正南陵人年十六父晳病篤割股和藥又夏月思蟹邦正號泣水濵得二蟹以愈疾每朔望禱天願減己算益父既卒御史宋纁祭其墓丁槇南陵人兄子涿論死繫獄槇恐兄絶嗣請於官願代涿死獄成知縣胡文靜察其枉白而釋之何正人南陵人七歲時母病浮腫正人以手按之而泣母喪卧尸側諸母泣勸之乃起父卒廬墓三年事聞給冠帶旌之何璧南陵人力崇正學冠昏一遵家禮太學生遼東邱經嘗寄五百金邱卒璧訪其里人張隅召經弟還之孫汝棟宣城人嘗有老匠以衣笥寄之閲歲啓笥中有白金二百兩汝棟祕之三年其子稱父遺命來取汝棟悉以付之杜三陽太平人為父母及兄刲股者四遺産悉讓其兄宗人有逋糧者為破産償之左忠涇縣人嘗分産給諸弟有鬻男償負者亡金於塗欲自盡忠解囊救之孫國訓宣城人母卒廬墓三年虎踞其前略不為動黃友璋旌德人於逆旅卧薦下得三十金坐候抵暮有老人行哭而至友璋詢得實舉以還之嚴大本南陵人割股療母居喪廬墓三年朱慶福涇縣人嫡母蕭氏病篤慶福傷貧甚惟剜肉不須錢即刲臂作糜進之尋愈洪希淧涇縣人一歲而孤為伯所撫伯病劇刲股和藥伯卒廬墓三年趙桂枝涇縣人年十三遊兵執其父露刃索金桂枝出叢薄間抱父兵以刃揮之號泣不忍釋俱被害吳惟賢寧國人父沒躬負石以甃墓道廬居三年汪文英字日賢寧國人五歲失恃哀毁如成人敬事繼母徐氏兄文光沒鞠育二孤子逾於己子張廷翰旌德人幼失父七歲授小學至文王事王季問師曰此可行於今否師云何為不可廷翰即每日雞鳴盥潄衣冠候母聞鼾聲輒欣然去或母微病不食翰亦不食母殁四時薦食如生江景宗旌德人天啓中以孝旌呂賜宗旌德人母病刲股療之兄臯宗無嗣撫遺女若己出崇禎末歲飢賜宗以己資賑粥三月又嘗途拾百金候其人還之鮑邦志字君繼旌德人母病劇持刀抉胸取肝食母立愈崇禎元年詔賜冠帶郡守為建孝子祠胡泰亨太平人兄寧犯法當死無子泰亨請代所司難之乃大呼曰國法固不可移代者甘死於法因涕泣求往疏入上嘉其義割耳減戍劉茂字時亨宣城人事母孝輕財好施嘗拒窮婦之奔者察其故即捐資代償其逋一時聞者誦義焉仕為閩中都司經歷方必通太平人年十五割股療父左鐵涇縣人兄弟同爨季弟早世遺一幼姪會有以人命誣其姪者鐵匿姪挺身任之數被拷掠諸親屬咸謂姪終不得庇鐵曰吾已有子弟止一孤我死以代姪可也會鐵死事大白姪得免孫世賢太平人父客死燕邸徒跣扶櫬歸距家半里無廬可倚書夜抱棺呼搶族人為葺數椽虎跑其側不色動廬傍忽涌甘泉既三載咸勸歸泣曰禮未葬不變服吾何歸乎梅有振字復豫宣城人母病痿痺負而卧起者十餘年兄殁撫遺孤踰己出嘗鬻麻甫定議而賈踴貴或勸增其值有振不應平生贖鬻焚劵事不勝紀曹七善南陵諸生嘗於姑蘇旅邸獲徽商所遺八百金留五日候其人還之歲飢輸粟五百石佐賑邑人賴焉何炳南陵諸生盜執其父欲殺之炳挺身出救遇害父得脫孫顯道宣城人兄弟四人已析箸以季負糧繫官各破産贖之家遂落乃復合食歷三世無敢言析者國朝劉蘭生字君徴南陵廩生南陵為征徭所困蘭生酌立條例請於邑令詳憲具疏至今民食其福歲祲施賑全活數千計趙大復涇縣人善屬文中年家落有大賈負金不索里中推為長者家居鍵户足迹不履市門夏曰瑚南陵諸生事親至孝親沒結廬墓側順治丁亥洪水為災曰瑚煮糜舟載沿隄餉之嘗應闈試同寓諸少年惡其方正一日與之步月輒登妓樓曰瑚初不識也少年先豫妓金令扄户百計誘之終不可少年始服其操方士逹旌德庠生母喪廬墓父沒刻像事之事繼母克盡子職順治九年旌表陳尚老太平人兄鶴老死於閩中丐資奔喪函其骨歸每止宿淚漬衾枕會嫂焦氏以烈死尚老拮據為之營葬饒宗良字直生寧國人少孤事母至孝年二十遊學白鹿洞歎曰吾寧不古若哉從汪有源講學躬行醇恪家酷貧敦宗族建家廟人服其化興起甚多卒無子門人祀之劉汝鳯字景威宣城諸生與弟堯熙皆以經學名天性孝友弟死衣食其從子為之婚娶姊寡而瞽迎養之終其身族黨無後及貧不能葬者竭蹶佐之食餼多年而卒王際康字五清南陵人事父篤孝痛母早沒終身侍父寢食中裙厠牏躬自浣滌登康熙乙丑進士告歸終養吏部以中書擬用堅不赴選父沒任雲南祿豐令道病卒葉正萃南陵人三月而孤母周守志以哀勞致痿疾正萃扶侍不離跬步間以事他出雖深夜必歸侍及沒躃踊號慟如醉如癡既葬廬居墓所疾卒程國聘字應之太平人兄亡撫遺孤甚至終身不與析産素與京口王生善生以忤勢要下獄國聘往省之主其家夜有少婦欵門即王生妾也具言夫陷縲絏辱身求救國聘呵之去曰吾千里跋涉為爾夫也如爾失節夫雖生亦靦顔人世矣何忍為此因秉燭逹旦為傾囊救之王生得免何士閥南陵人有何滿者盜破其祖母冢以葬親士閥訟之官三年不得直會撫憲檄兩邑令會勘滿健訟事仍未白士閥大慟觸碑而死邑令義之勒滿起棺題曰義士何士閥墓張裕南陵人明經忠義子生有夙慧祖良浩病亟忠義籲天求代裕始八歲聞之泣曰父不可死兒願死代父以代祖也隨向天密禱未幾果病家人強以藥吐弗咽曰祖病未痊吾何藥為且吾已告天矣埀死囑人曰勿令吾祖知遂卒知縣康五瑞表其閭學使張廷樞書孺孝型俗以旌之程鵬字扶九寧國諸生生平力行善事自賑荒周急下至醫藥橋梁施豫無算諸孫曽在襁褓者亦知以乳相讓一兒不食則均不食云子書以孝廉為嘉定教諭亦有聲胡嶤齡涇縣人母喪廬墓夜夢大水侵棺覺而徙葬未幾其原葬處蛟起人以為嶤齡誠孝之所感也雍正六年旌表胡曾琦寧國人性至孝母沒屏絶葷酒終身父命之逺出忽心動奔歸則父猝患中風得面訣後以廬墓哀毁而卒雍正八年旌表呂立祚旌德人生平樂善不倦瘞遺骨哺棄兒年至九十餘陳鵬年贈之以序稱其敦善行而弗衰入道德而無愧云汪炳字瑶仙南陵武舉襁褓失怙事孀母王曲得歡心母病劇刲股煮粥進之立愈會仇家以農民充役報其幼弟炳往自充母沒弟求析箸田廬惟弟便者聽已而弟亡姪貧甚仍分己田與之康熙戊子歲大祲賑榖數百石不足糴於外江以繼焉同時有姚希夔徐五元者亦以好義稱劉沆字澐起光祿卿楷子博學善文與兄沛弟燾齊名兄弟後先舉於鄉沆未售慕義強仁推廣光祿德意里黨咸被其惠南邑修理儒學沆一身肩之子敬祖雍正丙午舉人徐強南陵人雍正十三年以孝旌表池州府唐費冠卿字子軍青陽人登元和二年進士第聞母病革馳歸而母已卒廬墓終喪哭不輟聲御史李行修薦其孝行徴為右拾遺冠卿歎曰得祿養親耳得祿親喪何以祿為遂隱九華再召不起何澄粹青陽人親病日篤俗尚鬼病者不進藥澄粹剔股肉進親疾為瘳後親沒伏於墓哭踊無數以毁卒當時號青陽孝子為作誄者甚衆宋許規貴池人嘗在宣州客邸聞旁舍有建康人卧病為延醫治之不愈其人知規長者檢槖得百金托以後事且曰其所餘者悉奉君及卒規為具棺斂以餘金詣建康訪其家還之後子逖歷官員外郎孫元天章閣待制髙允文貴池人為清流主簿會里人張璉忤蔡京卒於客邸欲發棺檢視之允文力為保免京召謂曰君髙節義當旌賞授定邊軍教授實黜之也仕至汀州守以廉靜為治時稱長者方綱青陽人其先世自唐咸亨間居九華山東之上田歷四百年至綱為家督合七百餘口同爨而食每日晨起擊鼓集衆雍睦無間言著家法三卷景德二年青陽飢綱出粟五百石以賑轉運使馮亮以事聞詔旌其門寧文逹青陽人居陵陽鎮元豐間大水里中漂溺者千餘家文逹出粟五千石以賑事聞敕奬里人立祠陵陽祀之佘起銅陵人一門聚居至千三百餘人同爨而食起為家督周洽無間言子孫貴顯不絶鍾俊字穎叔銅陵人官祕書郎性至孝事親無少違其先自唐時至俊十一世同居合家衆七百餘口朝命奬其義柯應烈建德人性孝嗜學母閻氏病不解衣侍湯藥癯瘠盡瘁每夕露禱乞減算以益母壽俄聞空中有聲許特延一紀母疾遂痊又十三年而沒時江淮盜起應烈傾家資募義勇鄉里賴以安有欲官之者辭不就葉薈貴池人性至孝母於九月病渴思生李薈走哭園中李樹下忽從葉底得雙李以奉母病即愈人咸以為神賜汪與成銅陵人建炎間池遭冦兵與成一家八十口盡斃後三年與成既改葬其父余尚不得母骸為刻木肖像日侍於旁至十年乃得之祔葬父墓胡仲先字國政貴池人有幹略閭里倚以為重提舉趙范奏充民兵統領官端平間邊淮告警有保障鄉井功兩值歲飢傾其私囊量口給賑全活甚衆元方時發字子春青陽人綱之後一依綱家法為義門督邑令史午聞於朝旌門蠲役至正二年敕授潮州教授何清甫青陽人大德二年歲飢清甫出粟二千石助賑事聞詔旌李鵬飛池州人生母姚氏為嫡母不容改嫁為朱氏妻鵬飛幼不知也年十九哀痛思慕周行三歲得於蘄州之蘄田縣遂迎歸奉養久之復歸朱氏時渡江省覲既卒歲時攜子孫往祭墓終其身以有司上請詔旌其廬明童彥芳建德人洪武中從宿儒洪仲遵遊其家五世同爨桂士訓石埭人祖父母及父病士訓皆割股進俱得痊鄉人作歌頌之袁惟儒字一貴銅陵縣人宋益宗東流人並刲股療父楊永顯石埭縣人王萬年銅陵縣人王學詩貴池貢生並割股療母徐煜字尚德銅陵人素孝友其家千指同炊在鄉里每創義舉自宣德至成化五值歲飢俱出穀助賑又嘗為邑人代輸漕米徐永元建德人其家六世同居正統二年飢永元出穀二千石助賑事聞旌為義民何永敬建德人七世同居成化間旌吳永康青陽人幼失怙晝夜哀慕同里柯暹榜其堂曰慕親後以輸粟賑荒成化二年被旌夏鎮石埭人成化間父早亡鎮為傭養母母病目將瞽每日以舌舐之復明母沒殯於野結茅其側三年哭不輟聲一日野燒及其廬鎮伏棺痛哭俄風返火熄柩獲全吳徹字靜卿貴池人𢎞治中歲貢事繼母薛氏盡孝兄弟五人友愛甚篤又同邑檀世仁本諸生以母病棄所業文史遍購方書遂工診治親調藥以進愈逮後母沒居喪極哀侍父跬步不忍離李希仁青陽人事母孝母歿廬墓正德十三年被旌又石埭唐輝亦以廬墓稱孝程璋青陽人母早寡遺腹生璋及長痛母節未彰正德中徒步詣京師刺血草疏擊登聞鼓以進特旨旌表沈唐恭石埭人事繼母最孝謹兄武恭以誣繫獄論死唐恭痛武恭尚未生子詣獄代繫以出其兄適大盜劫獄囚俱逸出唐恭獨留郡守義而釋之紀孟綱貴池人有至性事親篤孝勤於奉養淡於榮利鄉里翕然稱之宋邦輔字子相東流人嘉靖丙辰進士官御史因諌大禮削籍歸躬耕養母妻操井臼子任樵牧髙風動逺邇陳桂字汝芳貴池人嘉靖中由貢授彞吾令以廉靜為治父年九十五殁桂已七十餘哀毁不輟時稱至孝子光祚素好義族有以繼嗣競者光祚曰何至以財利傷天倫乎乃推己産為定其嗣袁國光字賔求青陽人素敦厚嘗於新安旅次拾遺金俟其人還之又娶妾知為故家女即召其父挈女歸不責身值章忠銅陵人幼孤性敦孝友母病刲股母沒廬墓終身疏食兄嫂客死京師徒步往扶其櫬返胡大武貴池人嘉靖初貢入太學聞母病馳歸曲盡孝養母瞽八載一日復明人以為孝感葉叢椿字汝靈貴池人家素貧祖母年九十餘父母年亦六十兄嫂皆早逝遺孤一人叢椿盡力孝養并撫孤姪成立祖母暨父母相繼殁拮據斂葬畢其姪又亡叢椿復撫其孤嫠始終不言瘁時人賢之廖廷皓貴池人力耕養母一日廷皓在田母被虎厄急追力救始得脫負母返室見母傷處腫甚為口吮其毒數日腫始消孫憼述字清華青陽人性至孝居喪哀毁廬墓九年感馴雀之異郡邑屢舉孝子萬厯中以貢歷忠州學正署州事值懋酋之亂有城守功江鯤字南溟青陽人事孀母盡孝侍疾衣不解帶居喪不御酒肉置義田建家孰歲飢出穀周鄰里吳應彥貴池人柯逹字本章俱貴池人並刲股愈父母疾逹居喪哀毁廬墓三年萬厯中旌表柯延茹建德人事親盡孝兄薰致仕歸延茹食必共席疾必侍藥時百口共爨延茹總理家務以雍睦稱王之璘青陽人布政使一楨子天啓丁卯北闈副榜考授通判明季徴辟賢良大吏交薦之璘以養母堅辭不赴設義田贍族建義孰訓士歲飢糴穀助賑鄉人德之楚兵南下之璘罄家財募壯勇嬰城固守邑賴以全郎大徴貴池人楚師薄城馳説其帥即獲斂兵退安撫録功題授遊擊辭不受陳其恭銅陵人邑東北仁豐三墟向無埂岸江水內灌悉為巨浸崇禎十一年其恭及弟其葵捐資買繁昌縣民地為堤址創築堤四百餘丈三年始訖工自是墟無水患居民祀田祖必分胙餽之柯孟顯字惟逹貴池人幼孤事母以孝聞崇禎庚辰輸穀賑飢邑人頌之汪景德建德人刲股療父疾又母病瞽舐之復明親殁廬墓國朝陳光正石埭縣人少孤嘗自痛不逮養其父事母加謹母殁既袝葬父墓即廬其側哀號不輟有醴泉湧石罅見者以為孝感又建德吳來芳事母盡孝楊國俊石埭人父殁廬墓方祥美貴池人性孝友有幼弟為母所鍾愛喜依之居每膳祥美輒負其母來食已仍負之返積十數載以為常後其弟坐盜誣繫獄祥美盡鬻己産以雪之郎思誠字孺若貴池人幼孤事母孝嘗刲股療母疾後母殁啜粥廬墓其地素多虎自廬墓後虎遂絶迹值歲飢疫減價糶穀又施粥給藥多所全濟順治十三年徴選遺良郡守顔敏欲舉思誠純孝堅以老疾辭雍正五年旌表王之光建德人幼為石工孝事其母從工所得肉必攜歸奉母母卒廬墓三年或其日就工數十里外及夜必趨墓所吳日光青陽人性敦孝友好義樂施鄉里欽其名德平日設立條規訓戒族人皆以馴謹聞陳萬升貴池人與弟嘉蔭從弟萬鵾同就外傅康熙己酉盜掠近村嘉蔭萬鵾被執萬升請代弟死盜并殺之陳國甲字元及貴池諸生父年老抱沉疴五載侍湯藥不倦弟早世遺孤僅八月撫愛踰己子性樂善好施豫康熙戊子己丑間遇飢疫賑粟施藥存活無算居常賻贈有喪佽助貧不能婚嫁者寒施絮暑施茶橋梁道路修葺以便行人年七十二無病而終子鵬興爵皆能繼其志太平府漢方儲字聖明丹陽人除郎中丁母憂歸負土成墳種松千株鸞鳥栖其上白遊其下唐朱􅷅繁昌人割股愈親奉詔旌門王丕繁昌人數世同居里閈髙其義睦聞於朝廷旌門賜粟帛州縣時存問仍復賦稅宋趙權當塗人母病篤權焚香夜禱泣曰母死權何以生取刃刺脅取肝以進母漸瘳權亦遇良藥無患太守孫楙表其里曰孝感坊張崇繁昌人登進士第仕至太常丞自祖琄以來千口同居雍睦無間言嘉祐中楊傑過其家書義居二字遺之聶雲蕪湖人割股愈父其後伯父病復割臂以進而愈咸淳十年知州孟之縉奬其孝元張鐩字文煐東平人至元中仕太平路總管府治中秩滿因家當塗事母純孝母殁廬墓有紅蓮變白之異郡守為立孝感蓮坊大德二年旌表芮世通蕪湖人十世同居奉詔旌表夏餘逹當塗人自宋慶厯中七世祖邦政以來合族同居至正末年旌表家有田一丘每歲麥秀皆雙穗知府李習尚書汪澤民並為傳邢國傑當塗人嘗以布衣條議時政大臣為改容謝至正中檄授繁昌校官以親老固辭胡光逺當塗人事母盡孝母喪廬墓一日夢母欲食魚晨起將求魚以祭見生魚五尾列於前俱有齧痕鄰里驚異忽見有獺出草中浮水去衆乃知獺所獻事聞旌表明魏祥蕪湖人性至孝領成化乙酉鄉薦以母老不忍逺離絶意公車朝夕侍養母殁祥哀毁卒楊乙六當塗人自乙六至貴二五世同居自貴二子旺七一支更同居四世食指千計條置家法巨細有禮萬厯十年旌王華繁昌人十三世同居夏廷美字雲峰繁昌田夫篤於孝友里人敬信從張緒焦竑講學多警悟沒祀金陵理學祠韋學仁字春麓蕪湖庠生經明行修鄉里稱其孝友子受薦賑荒恤族亦有行誼李仲名當塗人太學生幼孤事母孝母沒廬墓三年後遇烈風雷雨必省視墓側嗚咽移時天啓元年旌表丁大相當塗縣人張秀蕪湖縣人徐大賔與汪錡俱繁昌縣人四人皆廬墓以孝聞徐思明當塗人父母病兩次刲股母亡廬墓天啓年旌李潔蕪湖人父病刲股及沒廬墓魯喜曽瀛孫瓃三人俱當塗人黃文星楊逄時陳昶三人俱蕪湖人魯焌與閔濟周俱繁昌人並刲股療親趙應時蕪湖人扶父櫬逺歸遭風舟覆抱櫬呼號漂數十里遇救獲免人詫其有神助章杞字𢎞奎當塗人與韓良直為密友韓疾劇以三十金授杞囑之曰妻方有孕若男也可以此撫之韓亡後妻果生子杞給衣食得成立及杞抱病垂沒呼韓氏子至啓篋金三百授之曰昔汝父臨終以三十金見托自營息歷年來今已十倍可謹守之子歸白母母感泣聞者皆髙其義丁僧當塗人鬻水麓心寺拾金欲還恐出入無時與失金者左遂削髮寺中久俟其至既還之後堅却謝金國朝楊璜字希周當塗縣人會兵繞其鄉璜匿妻子林中身守祖墓兵將執之遂赴水死子甫十齡見父溺號哭亦奔投於水久之父子兩尸擕手浮出見者嗟異孫啓綸字君受當塗人究心理學事母以純孝聞嘗負母避盜盜識之曰此孫孝子也遂解去陳三齊繁昌人農家子十二歲母死朝夕上食哭泣盡哀既葬獨廬墓側三年始歸楊一儒字翼真當塗庠生事母孝頻奉母命賙親族之困子錫汝令孝豐邑多逋賦前令坐纍者數人一儒毁産代償咸頌其義宋真儒蕪湖人與弟繩武俱少孤事母盡孝母沒兄弟廬墓悲號不輟池蓮變白色并有雙莖之異又四世同居置田贍族康熙五十三年旌表廬州府漢毛義字少節廬江人家貧以孝行稱南陽張奉慕其名往候之坐定府檄適至以義守安陽令義捧檄而入喜動顔色奉心賤之及義母卒去官數辟公府舉賢良徴皆不至奉歎曰賢者固不可測往日之喜乃為親屈也建初中章帝下詔褒美賜穀千斛常以八月遣長吏問起居壽終於家南北朝齊王虛之字文靜廬江人居父母喪以孝聞武帝永明中詔旌門蠲租三世唐萬敬儒合肥人三世同居親亡廬墓大中間旌表其門名其鄉為成孝唐海巢縣人母喪廬墓手自耕植以備祠祭忽於田中産嘉禾一本六穗一本五穗廬州刺史裴靖上其事作嘉禾表以聞張進昭巢縣人事親孝母患狐刺墮左手死進昭截左腕廬於墓徐行周舒城人數世同居詔旌其門袁傑無為人唐末盜亂傑招集義兵保障鄉里拒敵不勝死尸僵七日不仆賊棄諸河逆流而上將至黃金城母尋見之曰若是我兒呼之必動呼果動鄉人神之因立廟名其處曰呼兒港宋玉光濟廬州人母亡刻像事之如平生孝道純篤咸平中詔旌之呂士元巢縣人哲宗時立十科法士元上疏懇切未報後纍試不第歸而憤曰當今蔡確蔡卞呂惠卿章惇四害未除吾等困老田間與世無補乃去東山二里許抱書投橋下朝士王巖叟朱光庭咸惜之因名其橋曰抱書趙廣合肥人淳化中八世同居何宗壽梁縣人李吳貞合肥縣人皆割股療母病方孝子無為人名未詳母目雙盲每旦餂之久之眼復明余元燦汪安淵檀念二三人俱舒城人皆割股療母病事聞於朝詔付史館令有司依例優給元羊仁廬江人至元初阿珠兵南下仁父被殺母及兄弟皆散去仁年七歲賣為汴人李子安家奴力作二十餘年子安憐之令為良仁蹤迹母於潁州蒙古軍塔海家兄於睢州蒙古軍嶽納家弟於邯鄲連大家為役俱無恙乃遍懇親故貸得鈔百錠歷詣諸家求贖經營六年大小二十餘口復得完聚鄉里稱美大德中旌表季原禮無為人性最孝親終廬墓不食鹽醬子立與曾孫廷春居父母喪並如之立母目瞽餂之復明人謂一門純孝明吳敬無為人母疾割肝煎湯母愈而敬不傷事聞太祖官以贊禮郎廖鏞巢縣人永忠孫歷官至都督建文時豫議兵事鏞與弟銘及同縣指揮倪璘皆嘗從學方孝孺孝孺死鏞銘收葬遺骸璘慟哭奠祭俱被收論死向侃字希顔中永樂甲午鄉試宣德間判靜寧州職專撫民未幾裁天下撫民官缺巡撫獨奏留之擢御史出知澄江府侃天性孝友兄弟五人白首同居妻亡鰥居四十年髙興合肥人事親盡孝父殁廬墓三年烏巢墳樹興哭悲鳴以助其哀服滿親鄰勸歸有白鵲數百大如鶴鸛隨後翔集其宅良久方去是時同邑張俊亦以孝聞並旌錢敏舒城人永樂辛丑登第乞終養母殁廬墓詔旌之薛崇禮弱冠食餼泮宫讓選貢於師楊澤民逾年應歲薦復以讓老友周承軒邑令延主西孰訓課外毫不干以私居家孝友與兄崇仁俱為時重沈諲合肥人母喪哀毁廬墓築墻而泉湧出哭奠則鵲哀鳴成化間旌朱世藩合肥人幼孤奉母盡孝母故藩嚙棺呼號口眼血出遂喪明奉旨旌衛郡合肥人母病篤思飲泉水是年旱郡叩天掘井泉水湧出母飲之而愈鄉人稱為衛孝泉奉旨旌鄭元合肥人五世同居𢎞治時旌沈秉直十二歲刲股療母疾奉旨旌張梅合肥人母疾篤嘗糞嘗痰復病疽吮出膿血得愈父歿廬墓奉旨旌李得春合肥人年甫十三父病嘗糞刲股母病亦如之父母殁俱廬墓三年冬月有野草生花之異王紹字繼學舒城人由進士任監察御史母喪躃踊頓絶廬墓三年詔旌之同邑胡紀官吏部主事亦同時以孝旌孫剪兒舒城人早喪父事母孝樵採供甘旨母卒露宿墓側鄰翁憐之為結廬鵲巢樹上哭則悲鳴相應復有兩虎每日晡至墓側旋繞哮吼逹旦而去刻木肖母像事之終身張政廬江人父病侍湯藥及卒哀毁踰禮廬於墓側虎不為患人以為孝感正統年旌陳本忠無為人正統庚辰輸米九千二百斛子志髙二千斛志逹穀八千八十斛以備賑乂憫流民路宿即舍傍披草萊為屋百楹居之復施粥二月以食飢者父子三人俱奉敕旌朱燦無為人厚重好義正統間嵗歉燦以米四千四百斛輸官同族名亮者設粥日食數百人朝廷旌曰尚義之門張澄廬江人少時執厨役事母惟謹母喜飲澄必具佳醖少不樂輒唱舞以怡之兩拾遺金俱驗實還之嘉靖年詔賜壽官朱扆萬厯間諸生與妻李氏侍母病衣不解帶者三月妻素羸遂成痼疾與姑相繼卒時扆年未四十誓不再娶縣令為詳府云廬陽有節婦無義夫幾為缺典宜表揚以勵人心準給冠帶李大經周繼成詹天瑞俱廬江人刲股廬墓丁華一無為人兄弟五人不忍析居相與誓天折梅五枝共接一本各識之祝曰如一枝枯即某有異心後五枝俱秀實鄉里驚歎號五果丁氏吳孝子無為人逸其名家貧常執役富室身無完衣母饒甘旨富人有感其孝者常資給之後母殁未葬鄰家失火將及其廬力不能救惟伏棺以號火焰他徙左右無一免者惟孝子廬獨存章華國無為人少孤授徒養母母病篤國刺臂血飲之而愈後母病異瘡國禱神齋宿夢神人指京紅紙熏之果愈母殁三年不茹葷酒每臨肉食則涕下竟以羸疾死楊舜漁號見呂無為人敦本尚質里中目為楊古人教子姪義命自安一門之內自相師友京山李本寧述其行子維嶽鬻産助餉聞流寇之難絶粒以殁杜濂無為人少客維揚又客蕪湖嘗兩拾遺金數百金俱遲其人至悉還之後濂晝寢夢神語曰汝來日合雷震死為有隂德宥之矣次日雷擊其家牛驢各一濂無恙薑潤巢縣人母病割股張四哲合肥人崇禎乙亥流寇圍廬急四哲率弟四美四竒與賊戰城下不勝退謂兩弟曰城將陷與舉家戮辱死不如清白死遂偕弟暨妻女子婦共一十五口投井以殁佘承德無為人崇禎十五年流賊忽至承德掖其祖母劉母魏及妻楊妹玉女出避祖母母為賊所獲承德號救並遇害楊投水死國朝張維德合肥縣人崇禎乙亥流寇入境其父被執將見殺維德甫十齡延頸就刃乞代賊感而釋之順治丙申父殁德哀毁骨立既葬廬墓三年方華合肥人父妾生一子先經析産父殁後復以祖遺讓之少結婚魯氏其女瞽父母欲不娶華曰兒不娶女將誰適娶後相得甚歡張大履合肥諸生父母殁事兄益謹壬午兄卧病村居偶思肉食大履走數十里求肉不得及回兄已殞遂終身不食肉妻早亡念其荼苦單棲四十餘年李珙合肥人武舉家素饒崇禎十三年竒荒珙捐資糴穀以賑順治九年斗米四錢珙置飢民簿計口授糧月三次輪給之近者餔以糜里人稱貸劵可盈尺一日盡焚之康熙十年旱蝗富家出穀市利十倍李獨不取償有司榜其名為衆勸魏振趾合肥生員出穀賑飢親殁廬墓胡蔭合肥人親疾割股楊光耀無為人攻石為業母疾夫婦相繼割股進之各不自言久之見瘢痕相持而泣張振祚廬江人父𢎞任攜孥知四川嘉定州崇禎壬午流賊逼城祚奉父命領數騎突出求救城陷祚還見父被害觸石死時弟振祺應試回籍阻絶無音耗逮順治甲午聞信奔赴至保寧不得前巡撫李國英拔署梓潼縣閲三載道始通即辭官尋母遇之峩眉縣年七十餘矣奉以歸宋儒醇字衍魯廬江諸生有行義明末流賊劫殺西鄉中忽有一人大呼曰此余恩人宋公里也衆問故其人泣曰余蕪湖人十歲父賣我償債遇宋公助銀二十兩全余父子必保全此鄉以報德順治九年歲飢儒醇出穀千斛助賑許祝年字朴齋廬江廩貢選沐陽教諭以親老不赴後考授主事邑遭水旱首捐穀數百石倡賑濟著淡寧集張文逹字必之合肥人明季壬午夏詣北莊收麥聞冦至奔還於積尸中覔得其父尚未死負行七十里抵莊得全逹年至百有三歲奉旨建升平人瑞之坊王鳯吾合肥農夫也事孀母食必親進夏月先坐母於涼處而後往田天寒令妻抱母足而眠歲以為常髙克謹字式榖廬江人年十三父為冦獲謹乞身代冦兩釋之長而好義鬻産賑飢置田贍族還人遺金代償鬻妻者債同邑有李之幹字綰公其行義略同賈又彪字偉三舒城貢生孝友性成撫教孤姪四人不異己子有蕩産者更以已産給之相葬地山中遇虎不嘻人以為孝感雍正九年旌表朱維世字斐英舒城人敦本好施助親族之不能婚嫁者賑歲暮之不能舉火者一切施棺掩骼之事靡有不為雍正九年旌表郭士瑛字右璋舒城人康熙乙卯舉人五歲喪父哭泣如成人母殁冒雪躬自築墳友愛前母兄及庶弟人無間言許明時字吉生舒城人歲貢授建平訓導少孤事母孝母殁廬外不茹葷酒者四年嫁族人女代兄償負宋志靈廬江人字子睿事後母極孝以拔貢授訓導辭不赴母病繞膝呼號願以身代母殁廬墓三年有白烏來集之瑞張一綸字莘野無為人三齡失怙奉母極孝九歲母病危篤籲天請代遂獲延壽孺慕終身不懈友愛兄弟推財讓産雍雍如也二子喜烈俱以孝友聞父母未葬冬不衣絮樂善好施族戚待以舉火者甚衆嫁娶喪葬皆傾資助之里有義門之目江南通志卷一百六十一欽定四庫全書
