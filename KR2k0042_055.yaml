front:
  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2k0042_WYG_055-1a, image: WYG0508/WYG0508-0519a.png}
body:
  text: 江南通志卷五十六河渠志江自岷山導江盤亘六千里囊括衆流而下勢如建瓴至於漢自北入彭蠡自南入合岷江為三江並持東下經今江南之地以入於海正禹貢中江入海之故道而江水奔注海潮迴復則自巴荆以東洵居地險矣今按江水自江西之湖口縣東北逕江南之宿松縣南又東北逕望江縣南江在宿松縣治南一百二十里在望江縣治南三十里又東北逕東流縣西其對㟁則懷寧縣江去東流縣治一里經懷寧縣南門外又東北逕貴池縣北其對㟁則桐城縣江去貴池縣治五里去桐城縣治一百四十里又東北逕銅陵縣西又東北逕繁昌縣北其對㟁則無為州江去銅陵縣治里許去繁昌縣治五十五里去無為州治一百一十五里又東北逕蕪湖縣西又東北逕當塗縣西其對㟁則和州江去蕪湖縣治七里去當塗縣治十里去和州治六十里又東北逕江寧縣西其對㟁則江浦縣江在江寧縣治西十里在江浦縣治東南三里又東北逕上元縣北其對㟁則六合縣江在上元縣治北四十里在六合縣治東南二十五里又東逕句容縣北其北㟁則儀徵縣江去句容縣治七十里去儀徵縣治三里又東逕丹徒縣北其北㟁則江都縣江在丹徒縣北門外在江都縣治南四十里元和志江都縣大江南對丹徒之京口舊闊四十餘里今闊十八里蔡寛夫詩話潤州大江本與今揚子橋相對而瓜洲乃江中一洲耳今與揚子橋相連矣自古南北之津上則由采石下則由江乘而京口不當徃來之道今江面益狹渡者舍江乘而趨京口宋乾道四年築瓜洲南北城而京口之渡至今因之又東逕丹陽縣北又東逕武進縣北其北㟁則泰州江去丹陽縣治東北六十里去武進縣治北五十里在泰州治南又東逕江陰縣北其北㟁則泰興縣靖江縣如臯縣江在江陰縣治北二里靖江縣治南十里去泰興縣治四十里如臯縣治六十里靖江江分二派遶縣南北明天啟以來潮沙壅積縣北竟為平陸而大江惟經其東南縣遂為江北之地矣又東逕常熟縣北其北㟁則通州江去常熟縣治四十里去通州治十里又東逕太倉州北江去太倉州治東北九十里東入於海凡瀕江州縣間有風潮漫溢之患而江勢漸更趨北其南㟁則洲渚重複北㟁則駴波淩濤之所激盪徃徃剝蝕頽圮而瓜洲尤為飛輓之通津當北流之險溜我朝工築以時淪漂無聞轉漕濟渡官私均利考諸前史漲溢頻書隄防或闕焉鑒古而知今之流慶長也唐開元二十三年潤州刺史齊澣以州北隔江舟行繞瓜歩回遠六十里多風濤乃於京口埭下直趨渡江二十里開伊婁河二十五里渡揚子立埭舟不漂溺唐書地里志宋崇寧元年置提舉淮浙澳牐司官一員掌杭州至揚州瓜洲澳牐通治之宋史河渠志政和六年詔鎭江府旁臨大江無港澳以容舟檝聞西有舊河可避風濤歲久堙廢宜令發運司濬治宋史河渠志明永樂元年三月修揚州府江都縣河東等鄉邊江圩㟁二年十一月修築泰興縣沿江圩㟁明太宗實録泰興縣言沿江圩㟁東至新河西盡丹陽界長六千六百五十丈高一丈五尺頃被江水衝決為民患請發民丁修築從之人修築和州銅城牐上抵巢湖下接揚子江圩㟁七十餘處為江潮衝决者三年十月修無為州周興等鄉及鷹揚鄉烏江屯緣江圩㟁七年十二月遣官相度修築揚州府泰興縣攔江隄㟁為風濤衝激淪入於江者三千九百餘丈又浚大港北自縣河南出大江淤塞者四千五百餘丈洪熙元年浚儀徵壩河明史稿是後定制儀徵壩下黄泥灘直河口二港及瓜洲二港常州之孟瀆河皆三年一浚正統二年十二月修通江橋東西一帶江㟁五年六月南京守備襄城伯李隆奏積雨壞南京中新河上新河隄請俟水退量撥丁夫修築從之六年九月修築南京江㟁明英宗實録先是南京江㟁累決命工部侍郎吳政等修築政等言水深未便工力請於農隙時疏江中沙洲以殺水勢然後用工至是以興役請上命守備豐城侯李賢太監劉寧同政提督仍戒侵擾七年七月築南京浦子口大勝關隄明英宗實録先是江中有洲激水横流決隄豐城侯李賢請鑿洲引水直流則隄可固上可之㑹詔蠲天下徭役遂不果鑿止令築隄成化八年八月修築瓜洲隄㟁十八年揚州府同知李紱率泰興縣知縣蔡暹築縣西南江堰自保全鄉至廟灣港長一萬六千九百二十五丈廣三丈五尺高一丈嘉靖十二年知泰興縣朱篪増築江堰自廟灣港至過船港七千六百三十丈萬厯五年御史陳世寶言儀徵江口去牐太遠請於上下十數丈許増建二牐隨潮啟閉以截出江之船盡令入牐庶免遲滯疏入議行行水金鑑成化中建牐於儀徵通江河港者三江都之留漕通江者二已而通江港塞𢎞治初復開之既又於總港口建牐蓄水至是復議儀徵近江口増建二牐國朝康熙二十九年修砌儀徵縣江口響水攔潮二牐五十三年重修江都縣廣惠通惠二牐江防㕔冊自石人頭迤南至瓜洲江口頭牐曰廣惠四牐曰通惠五十四年江流北徙五十五年總河趙世顯㑹同漕督疏請建築江工奉㫖據趙世顯奏稱花園港地方及息浪菴前石工馬頭俱被江水衝坍屯艘之處狹窄風浪可虞題請挑穵月河等因乃伊慮及河工之意朕以普天之下生民為念無處不預為籌畫倘江水日漸北流衝刷不已則瓜洲城垣必致危險其荆州杭州等處俱有䕶城隄㟁瓜洲地方修建䕶城隄工作何保䕶不致危險庶瓜洲一帶地方始得完固賫奏張杓為人明白着九卿向伊問明詳加確議具奏又奉㫖據趙世顯奏稱江溜北徙花園港地方被衝坍塌一百二丈瓜洲息港菴前石馬頭亦被汕刷坍塌等語倘江流日漸北徙衝刷瓜洲城垣必致危險事關民生若不預為籌盡修隄保䕶斷乎不可着江南督撫總河總漕速行親徃詳加察勘作何修隄保䕶城垣勿致危險之處作速詳議一面動帑修築一面奏聞督撫河漕四院同詣瓜洲察勘㑹議修築挑浚之處一切丈尺工程並設文武汛官河兵住工毎年入歲搶修案內修防奉㫖依議附趙世顯奏畧瓜洲河道自四牐起至江口止計長二百九十七丈統名花園港渡江船隻賴以屯泊上年六月內江流北徙將四牐之下運河南岸淤蘆田畝中間倒塌一百二丈以致屯船無多臣相度情形應於四牐之旁運河北㟁挑穵月河一道以為屯船之地倘來年江流北徙逼近四牐則預將四牐石塊錠鋦拆起存貯臨期細勘另行酌議再照瓜洲之息泿菴前石馬頭已坍塌去十分之六廟宇因逼近拆去兩層拆後地遂坍塌葢因江潮泿湧大溜北趨所致臣謹㑹同總漕施世綸具賫題令阿逹哈哈番張杓奏是年建築息浪菴前䕶城隄㟁埽工長二百七丈自花園港三官殿起至四牐下劉家涵洞䕶灘隄長一百八十丈花園港埽工長四百丈瓜洲城自北水關起至西城角下首䕶城石工長三百一丈繞城河間段開挑寛深長一千三十一丈江防㕔冊已上俱於五十五年工竣建築花園港越隄埽工長五百二十丈以作重門保障桃瓜洲西門城西月河長三百丈㕔冊俱於五十七年工竣開挑瓜洲正人洲引河二道第一道長五百五丈第二道長五百二丈􅈦冊五十八年工竣重修儀徵縣江口通濟羅泗二牐六十一年允署總河陳鵬年請建築花園港西丘家巷挑水壩二座并雁翅包灘裏戧工共長一百八十五丈又建築舊四牐西龍王廟䕶埽工長一百三十八丈雍正二年奉㫖從河督齊蘇勒請建瓜洲胡家觜東㟁䕶口埽工長一百十八丈又建唐家莊束水草壩一座兩㟁各長二十丈八年奉㫖從河督孔毓珣請挑瓜洲月河自青蓮菴起至尤家碾共長三百六十七丈并於月河頭建築束水壩一座九年奉㫖准河督嵇曾筠敬籌大江形勢一疏於瓜洲正人洲挑引河長六百四十一丈五公灘開挑支河長三百六丈夾江內建築貼心壩一座長一百五十丈五尺又兩首接築攔水土壩長二百五十八丈江南通志卷五十六
