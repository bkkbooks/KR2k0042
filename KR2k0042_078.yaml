於康熙三年歸併瓜洲由閘瓜洲閘稅原屬揚州府揚河江防同知監收雍正五年歸併揚州鈔關徵收又勝家壩落地稅原屬泰州稅局大使徵收雍正六年亦歸揚州鈔關照則例徵收揚州關額稅正銀四萬四千八百八十三兩九錢有奇原額銀二萬八千六百七十二兩八錢有奇歷年溢額銀一萬六千二百一十一兩一錢有奇額定正銀如今數額解銅斤腳價歸正銀七千六百九十二兩三錢五分瓜洲儀徵額稅各欵銀四萬兩瓜洲山閘原額徵河餉銀三千三百三十三兩三錢有奇儀徵縣河餉銀三千三百三十三兩三錢有奇又儀徵民船木纜儘收儘解各欵於康熙二十年總河靳輔銀題加增銀一千兩每年額徵完解瓜儀河餉共七千六百六十六兩六錢有奇又江蘇巡撫增操餉斛腳扣餉銀一萬一千七百六十九兩有奇雍正元年總督查弼納有題每年照豐嵗溢額銀增二萬五百六十三兩奇每年合河撫督題增操餉斛腳扣餉共額徵銀四萬兩蕪湖關按蕪湖有户工兩關工部抽分設於明成化七年户部鈔關設於崇禎三年國初因之分遣兩部司官管理康熙十年併工關於户關嵗遣部屬一員雍正元年歸併安徽巡撫令地方官兼管抽收其口岸沿江河港有金柱口收户關稅清弋新莊二口收工關稅裕溪泥汊二口户工兩關兼收其東河內河浮橋下關瀂港淜港大信八處司稽察巡查户關額稅正銀一十三萬八千四百九十六兩原額銀八萬七千三百三十七兩八錢歷年溢額銀五萬一千一百五十八兩二錢額定正銀如今數額解銅斤腳價歸正銀一萬八千四百二十三兩七分五釐工關額稅正銀五萬五千五百三十兩七錢七分原額銀四萬五千三百兩康熙二十五年增銅價一萬二百三十兩七錢七分額定正銀如今數額解銅斤腳價歸正銀一萬四千六百一十五兩三錢八分五釐鳯陽倉關按鳯陽倉關原管收蘇松常鎮安寧太廬鳯淮揚十一府滁州來安全椒三州縣并鳯陽中右等八衛一所以及河南八府一州屬并飛熊英武廣武三衛民屯本折錢糧內除河南所屬徑解河南布政司外其一應米麥錢糧於康熙三十三年俱歸併糧道管收今稅額乃正陽臨淮二關所收也正陽關在正陽鎮明成化元年始立止稅船鈔􅤮篷竹木排炭無過往落地及魚茶酒醋雜項諸稅屬鳯陽府通判管理國朝順治八年歸併鳯陽倉差康熙二十年科臣條奏添設盱眙亳州二口稅務臨淮關在臨淮縣明成化元年設部推大使一員管理國朝因之順治八年聽鳯陽倉差監督自倉糧歸併糧道之後於康熙三十四年移駐正陽鎮設立關署於壽州西南六十里專管正陽臨淮二關康熙五十五年歸安慶巡撫監收委地方官管理其口岸因添設盱亳二口凡支河岐缺爐橋長淮衛鳯陽府城舊徵收外又增設懷逺澗溪缺埠暨正陽大沙二關等處至鳯陽府城於康熙五十五年因非係通衢皆市井販賣停其徵收雍正六年又將各口岸增減畫一刋榜曉示商民稱便額稅正銀七萬九千八百三十九兩舊正陽關原額二萬七兩臨淮關原額一千八百兩又併徵亳州盱眙稅課四萬一千一百一十五兩八錢三分歷年溢額銀一萬六千九百一十六兩一錢七分額定正銀如今數額辦銅斤腳價歸正銀一萬三百二十兩六錢雜稅附康熙四十三年浙江道御史王瑋條奏田房稅契用司頒契尾時江蘇安徽等屬皆遵照此例雍正六年正月奉旨準河南總督田文鏡之請徵收田房稅契銀兩飭令直𨽻各省布政司將契紙契根印發各州縣存契根於官以契紙發各紙鋪聽民買用俟民間立契過戶納稅之時令買主照契填入契根各用州縣之印將契紙發給納户收執其契根於解稅時一併解司核對至典業亦如賣契例若地方官稽察有方能據實報出稅銀至千兩以上者交部分别議敘一田房稅給發契紙徵收儘徵儘解各州縣同雍正十三年十二月初六日奉上諭民間買賣田房例應買主輸稅交官官用印信鈐蓋契所以杜姦民揑造文劵之弊原非為增國課而牟其利也後經田文鏡創為契紙契根之法預用布政司印信發給州縣行之既以書吏夤緣為姦需索之費數十倍於從前徒飽吏役之壑甚為閭閻之纍不可不嚴行禁止嗣後民間買賣田房著仍照舊例自行立契按則納稅地方官不得額外多取絲毫將契紙契根之法永行停止至於活契典業者乃民間一時借貸銀錢原不在買賣納稅之例嗣後聽其自便不必投契用印收取稅銀其地方官徵收稅課多者亦停其議敘仍著各該督撫嚴飭藩司時加察訪倘有吏書索詐侵蝕等弊立即嚴行究處毋得稍為寬縱再在京兩翼收稅之處亦照此例行一牙帖稅每帖一張稅銀四錢五分以至一兩不等每年儘徵儘解各州縣同一花布牛驢豬羊等稅銀每兩三分每年儘徵儘解各州縣同一典鋪每户輸銀五兩增歇不一各州縣同一江蘇布政使經歷司佃民稅給發契紙儘收儘解一江寧都稅司經徵騾馬稅無定額按季同雜稅彚解一江寧都稅司房稅給發契紙儘收儘解一淮安淮防廳並揚州江都儀徵通州如臯四州縣洲場稅給發契紙儘收儘解一揚州府稅課司商稅額銀一千二百一十八兩四錢遇閏加銀三十三兩三錢三分三釐有奇兩淮鹽運司代辦一揚州府揚防廳額徵由閘商稅並加增銀三萬一千二百八十一兩五錢九分五釐有奇經徵官自行解部一徐州府課程等稅銀每年儘收儘解一儀徵縣由閘梁頭操撫扣餉並賠補缺額共銀一千七百五十三兩二錢遇閏加銀一百兩一儀徵縣稅課局額徵商稅銀二千二百三十八兩七錢五分八釐有奇遇閏加銀三兩六分三釐有奇一髙郵州商稅操賞裁解充餉銀三兩七錢一揚州府邵伯司應徵門攤稅銀五十七兩二錢二分二釐係府具批解司彚同雜稅解部一通州稅課局額徵商稅銀八百六兩八分四釐有奇遇閏加銀三兩二錢九分一釐有奇一如臯縣靛花油餅等稅銀每年儘收儘解一京口將軍經收八旗騾馬稅銀亦無定額每年儘收儘解令鎮江府具批解司彚入雜稅達部一合肥縣廬江縣巢縣六安州霍山縣五州縣商稅一欵每兩三分每年儘徵儘解一壽州虹縣泗州三州縣有魚稅一欵按價每兩三分每年儘徵儘解一街口司巡檢報徵船稅銀九百六十兩有奇內除銀八百兩有奇歸入丁地案內另册奏報實該銀一百六十兩一長淮衛徵收牙帖稅銀儘徵儘解與州縣同一泗州李良橋等五處商稅銀二十兩八錢八分麯稅銀三兩牙稅銀儘徵儘解俱於雍正十三年歸入寶應縣徵收江南通志卷七十九
