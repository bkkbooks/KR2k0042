body:
  text: 江南通志卷七十九食貨志關稅周司關掌國貨之節以聨門市凡貨不出於關舉其貨罰其人周禮漢武帝元光六年初算商賈漢書南北朝宋大明八年詔東境去嵗不稔宜廣商賈逺近販鬻米粟者可停道中雜稅自東晉至陳西有石頭津東有方山津各置津主一人賦曹一人直水五人以檢察禁物及亡叛者荻炭魚薪之類小津並十分稅一以入官淮水北有大市百餘小市十餘所備置官司稅斂既重時甚苦之文獻通考隋文帝受禪除入市之稅文獻通考唐德宗時趙贊請諸道津會置吏閲商賈錢每緡稅二十竹木茶漆稅十之一以贍常平本錢帝納其䇿屬軍用迫蹙亦隨而耗竭不能備常平之積文獻通考宋建隆元年詔所在不得苛留行旅非有貨幣當算者無得發篋搜索又詔榜商稅則例於務門無得擅改更增損及創收文獻通考李重進平以宣徽北院使李處新知揚州樞密直學士杜韡監州稅以朝臣監州稅始於此文獻通考太宗淳化二年詔除商旅貨幣外其販夫販婦細碎交易並不得收其算景德四年詔江淮南民以柴薪渡河津者勿稅文獻通考大中祥符元年詔免諸路州軍農器收稅文獻通考熙寧十年以前商稅嵗額徐州七務潁州十一務楚州八務真州五務廬州六務揚州七務髙郵八務蘇州五務無為州八務俱五萬貫以上淮陽二務婺州八務俱五萬貫以下海州四務滁州四務和州六務泗州七務潤州六務常州五務江寧五務宣州九務歙州六務池州十三務俱三萬貫以下文獻通考元祐八年權蠲商人載米力勝稅錢先是熙寧六年蘇湖嵗稔穀價比淮南十五而商船以力勝稅不至至是蘇軾言法不稅五穀請削去力勝錢之條而行天聖免稅之制復權蠲之宋史附蘇軾上言臣聞穀太賤則傷農太貴則傷末是以法不稅五穀使豐熟之鄉商賈爭糴以起太賤之價災傷之地舟車輻輳以壓太費之直自先王以來未之有改也而近嵗法令始有五穀力勝稅錢使商賈不行農末皆病廢百王不刋之令典而行自古所無之弊法百世之下書之青史曰收五穀力勝稅錢自皇宋某年始也臣切為聖世病之臣頃在黃州親見纍嵗穀熟農夫連車載米入市不了鹽茶之費所蓄之家日夜禱祠願逄飢荒又在浙西纍嵗親見水災中民之家有錢無穀被服珠金餓死於市此皆官收五穀力勝稅錢致商賈不行之咎也臣聞以物與人物盡而止以法活人法行無窮今陛下每遇災傷捐金帛散倉廩自元祐以來蓋所費數千萬貫石而餓殍流亡不為少衰只如去年浙中水災陛下使江西北雇船運米以救蘇湖之民蓋百餘萬石又計糴本水腳官費不資而客船被差雇者皆失業破産無所告訴與其官司費耗為害如此何似削去近日所立五穀力勝稅錢一條只行天聖附令免稅指揮則豐凶相濟農末皆利縱有水旱無大飢荒雖日下稍失課利而災傷之地不必盡煩陛下出捐錢穀如近嵗之多也今元祐編敕雖云災傷地分雖有例亦免而穀所從來必自豐熟地分所過不免收稅則商賈亦自不行議者或欲立法如一路災傷則鄰路免稅一州災傷則鄰州亦然雖以今之法小為疏通而隔一州一路之外豐凶不能相救未為良法須是盡削近嵗弊法專用天聖附令指揮乃為通濟臣切謂若行臣言稅錢亦必不至大段失陷何也五穀無稅商賈必大通流不載見錢必有回貨見錢回貨自皆有稅所得未必減於力勝而災傷之地有無相通易為賑救官司省費其利不可勝計今肆赦甚近若得於赦書帶下光益聖德收結民心實無窮之利取進止建炎元年詔於平江崑山縣江灣浦量收海船稅應官司回易諸軍收買物色依條收稅蓋寧於海道取給軍需而不以病民也又慮稅網太密詔牛米柴麵民間日用所需並與罷稅文獻通考孝宗隆興之初凡兩淮商旅並與免稅州縣續置稅場並罷之關市之征日以蠲免中興列聖仁民之心何如哉其間貪吏並緣苛取百出私立稅場算及緡錢斗米菜茹束薪之屬或擅用稽察措置添置專欄收檢與吾民相創相劘不啻讐敵虛市有稅空舟有稅以食米為酒米以衣服為布帛皆有稅遇士大夫行李則搜囊發篋目以興販甚者貧民博易瑣細於村落指為漏稅輒加以罪空身行旅亦白取百金方紆路避之則攔截呌呼或有貨物則抽分給賞斷罪倍輸倒囊而歸矣聞者咨嗟則指曰是大小法場也是以中興以來申明越津欄稅之禁其告漏稅不實者坐之如例外多收投子錢許民越訴是宜商賈之利通而民生之用足雖中興再造民力已竭而不至於甚困者皆此之由也文獻通考元至元七年定三十分取一之制以銀四萬五十錠為額續文獻通考二十六年大增天下商稅江南為二十五萬錠續文獻通考明永樂元年奏準凡嫁娶喪祭時節上送禮物染練日織布匹及買已稅之物或船隻車輛運自已貨物并農用之器各處小民蔬果非興販者俱免稅明會典十年令各處巡按御史及按察司官體察凡有以該稅鈔數倍增收及將瑣碎之物一概勒稅者治以重罪明會典國初止有商稅未嘗有船鈔至宣德四年始設鈔關凡七所內滸墅户部差淮安揚州俱南京户部差滸墅本色鈔五百八十六萬餘貫錢一一千一百七十三萬餘文折色船料正餘銀三萬九千九百餘兩淮安本色鈔三百萬餘貫錢六百萬餘文折色船料正餘銀二萬二千七百餘兩揚州本色鈔一百六十九萬餘貫錢三百三十八萬餘文折色船料正餘銀一萬二千九百餘兩續文獻通考以鈔法不行設關收鈔量舟大小修廣而差其額謂之船料不稅其貨惟臨清北新則兼收貨稅王鴻緒明史稿正統六年罷上新河監收船鈔官續文獻通考成化元年令各處船料鈔俱錢鈔中半兼收每錢四文折鈔一貫明會典罷蘇州淮揚等處收船料鈔續文獻通考四年罷蘇杭鈔關續文獻通考七年復設各差主事監收續文獻通考七年工部尚書王復始請添部屬三員分往太平蕪湖等處抽分竹木變銀為營繕費是年所得僅千兩後至者以多得為能至萬餘兩嵗嵗加增明典彚𢎞治六年令各關照彼中則例每鈔一貫折銀三釐每錢七文折銀一分明會典七年令各處鈔關經過官民糧米剝船俱免納錢鈔明會典嘉靖九年題準各鈔關丈量船隻止以成尺為限此外零數不許逐寸科取續文獻通考四十一年奏準荆州蕪湖九江兩浙滸墅淮安揚州各關主事嵗額定數外務將餘饒悉入公帑續文獻通考四十五年題準稅淮安府過壩米麥雜糧每石徵銀一釐抵補本府所屬稅銀民壯帶徵軍餉明會典隆慶元年議準揚州滸墅二鈔關凡船隻從上江來者查無九江船稅票責令補納船料續文獻通考二年令北新淮安揚州滸墅等各鈔關主事各鑄給關防撰給敕書續文獻通考三年給事中鄭大經疏言各鈔關商稅嵗入不資而獨委柄於一主事利權所在易以不肖之心乘之自後征𣙜事仍敕各該撫按於府佐二中選委一員佐之户部覆鈔關錢糧主事既不經收必得府官管理乃能濟事但各鈔關去府城逺近不一如九江揚州杭州鈔關去府近者宜責令知府收解其滸墅臨清河西務淮安等關去府稍逺商舶往還不便則委佐二官就關經收詔可明典彚四年題準稅淮安府過壩腳頭斛夫銀每年約九千二百餘兩聽給漕運官軍月糧并河道衙門支用明會典五年題準稅淮安過壩牙銀之半以備漕運官軍月糧明會典六年令各鈔關折收銀兩萬歷十一年議準革淮安過壩斛抽腳抽等稅通行兩京十三省各撫按官嚴查所屬一應無名課稅盡數查革明會典崇禎初增關課每兩一錢王鴻緒明史稿三年復增二錢王鴻緒明史稿十三年增各關稅二十萬兩王鴻緒明史稿國朝順治二年詔崇禎三年折色徵收內扣銅斤銀買銅解部每斤六分五釐算四年奉旨米麥係民間日用準免料部議明季則例米麥俱納加補今應納加平船料若農船裝載米麥不在此例十七年主事李繼白書籍過關免料康熙四年正月奉上諭諭户工二部各省設立關稅原期通便商賈以充國用向因錢糧不敷故定例將收稅溢額者加級紀録以示鼓勵遂致各差官員務求溢額以圖加級紀録因而騷擾地方困苦商民殊為不合以後稅課務照額徵收缺額者處分溢額者加級紀録之例永應停止其輪流差遣官員亦應停罷併稅課作何徵收著議政王貝勒大臣九卿科道會議具奏特諭九月奉上諭諭户工二部各省鈔關之設原期通商利民以資國用非欲其額外多徵擾害地方近聞各處收稅官員希圖肥已任用積蠧地棍通同作弊巧立名色另設等稱於定額之外恣意多索或指稱漏稅妄拿過往商民拷詐或將民間日用細瑣之物及衣帽等類原不抽稅者亦違例抽稅或商賈已經報稅不令過關口故意遲延勒掯遂其貪心乃已此等弊端甚多難以枚舉違背國法擾害商民殊為可惡嗣後各地方官員俱著洗心滌慮恪遵法紀務期商賈通便地方相安如仍行前項情弊在內著科道官在外著該督撫參奏從重治罪決不饒恕如該督撫不參奏别經首發該督撫以徇情治罪爾部即遵諭行特諭十四年十月户部題覆本部疏議得户部疏稱今當兵餉浩繁需用錢糧之際必揀選賢能不論俸次滿漢司官各該部滿漢堂官選出咨送臣部並筆帖式亦選賢能至於定例內缺額者照分數議處溢額者並無議敘之處今正需用錢糧浩繁之際而缺額反多將官員筆帖式作何處分議敘等語查定例內如欠不及半分者罰俸一年欠半分以及一分以上者降一級調用欠二分以上者降二級調用欠三分以上者降三級調用欠四分以上者降四級調用欠五分以上者革職等語今議得欠不及半分者降一級留任餘照現定例遵行至一年額稅全完者紀録一次溢銀一千兩者加一級溢銀二千兩者加二級溢銀三千兩者加三級溢銀四千兩者加四級溢銀五千兩以上者以應升之缺先用關差官員一概不準捐納筆帖式等並無責任停其選差仍照俸次差遣亦不準其議敘處分其出差監督等不令督撫管轄或地方實有紛亂河道壅阻大兵何日過往封船該監督速行呈報户部即移咨督撫查壅阻月日情形據實具題考核若有謊報情弊該督撫不據實具題一併嚴加處分至王公文武大小各官伊等家人任意往來關津欺壓作害并兵民商人指稱王公文武各官之名借端強行欺壓嚴禁在案今若有此等行者該監督查拿報部照例處分如有地方惡棍擾害商民強霸地方該監督等不時嚴查拿懲又有抗違者指名報部照光棍例處分該監督等將本衙役及家人不行嚴管任其苛索商民將監督照罪之輕重處分康熙十四年出差官員回日亦照此例遵行奉旨依議二十年十二月二十日雲貴蕩平詔條內開各處關差如有將不應納稅之物額外橫征差役四出分踞津隘擾害商民者該督撫題參若不行題參事情發覺一併從重治罪二十八年二月十一日聖駕南巡奉上諭諭尚書張玉書等各處榷關原有則例朕舟行所至咨訪過關商民每不難於輸納額稅而以稽留關次不能速過為苦𣙜關官員理宜凜奉屢頒諭旨恤商惠民豈可反貽商民之纍自今應力除積弊凡商民抵關交納正稅即與放行毋得稽留苛勒以致苦纍違者定行從重處分爾等可即傳諭俾一體奉行稱朕意焉特諭雍正元年奉恩詔各關差除正額錢糧外加添贏餘銀兩作何減除之處該部查議具奏五年閏三月十四日兼理滸墅關稅務髙斌奏準豆稅將梁頭大船簽量多者依數每石二分六釐遞加所刮餘豆每石亦止二分六釐小販船隻準其寬減輸納附髙斌奏略滸關則例如豆稅一項名曰加補料有梁頭小販之分小販則例每石稅銀七分梁頭一丈八尺者稅銀六十七兩三錢奴才到任收稅見梁頭一丈八尺者交銀七十七兩五錢三分又外加銀二十餘兩不等細問原由據山陽江都梁頭船户呈稱丈八之船原照則例納銀六十七兩三錢後因有將船改造深寬者是以往年有均鈔之請以簽量擔數作梁頭丈尺如丈八梁頭以二千九百八十二石為率納銀七十七兩五錢三分合計每石二分六釐若內有不及數者則按二分六釐一石遞減如逾數者亦照此例遞加倘有過於船艙限槽之上是在本船之外所刮餘豆照小販例上納此實至公之道衆商遵行已久等語查小販則例每石稅銀七分梁頭止收二分六釐相去懸殊以致從前小販豆貨雖寬至五分一石仍不抵關多皇仁被梁頭包攬奴才仰體照現收米稅之例每石收寬減招徠將小販豆船銀四分而小販客商俱踴躍來關急公完納其梁頭大船據稱有改造深寬循照舊例逐船簽量多者依數每石二分六釐遞加所刮餘豆每石亦止二分六釐所收銀兩俱入庫歸併贏餘儘數彚解特是部定則例一丈八尺加補止納銀六十七兩三錢因此厯任親填簿內俱照則例填寫其餘銀兩概不登填是以奴才任內亦循向例填寫冉四思維相沿已久但梁頭船户完稅數多填簿數少旨部頒未兒疑議且將奉力奉行竟為虛文故套仰祈之印薄並未經實皇上敕部定議嗣後將部發商人親填簿俱令照日收實數登填不必止照額數扣報贏餘錢糧盡數據實填寫庶稅關收課革除陋弊實力奉行而刁頑商船亦不得借詞疑議七年二月二十三日奉上諭各關開放船隻之處向例有部頒號簿以便稽查兹聞各關另設私簿徵收惟於報部之日始將號簿挨日填造其意以水路船隻往來多寡不齊若據實填簿則不能有逐日徵收之數目恐干駁查是以設勻𣲖填造如此則簿內全非實在數目與商船過稅串票毫不相符殊非政體且凡事據實則可以無弊作偽則弊竇叢生今既任意勻𣲖填造則號簿亦為虛設矣嗣後各關於部頒號簿務須據實填寫如無船隻過稅之日亦即注明不得仍蹈前轍如敢故違定行嚴加議處該部亦不得混行指駁致滋弊端欽此八年蘇州巡撫尹繼善題通州缺額商稅奉旨自康熙三十五年至雍正三年蠲免銀一萬七千六百五十兩四錢八分各關全料平料加平料加補料新舊則例明宣德年間長船剝船贑船河船焦湖船槳船沙船四尺鈔二十五貫四尺一寸鈔二十六貫四尺二寸鈔二十七貫四尺三寸鈔二十八貫四尺四寸鈔二十九貫四尺五寸鈔三十貫四尺六寸鈔三十二貫四尺七寸鈔三十四貫四尺八寸鈔三十六貫四尺九寸鈔三十八貫以上至𢎞治元年蠲免不收嘉靖九年沙船河船船航船五尺起至一丈四尺止每鈔一貫折銀三釐每錢七文折銀一分五尺鈔一十貫該錢二十文折銀六分六尺鈔二十貫該錢四十文折銀一錢二分七尺鈔三十貫該錢六十文折銀一錢八分八尺鈔三十五貫該錢七十文折銀二錢一分九尺鈔五十賈該錢一百文折銀三錢一丈鈔八十貫該錢一百六十文折銀四錢八分一丈一尺鈔一百一十貫該錢二百二十六文折銀六錢六分一丈二尺鈔一百四十貫該錢二百八十文折銀八錢四分一丈三尺鈔二百七十貫該錢三百四十文折銀一兩零二分一丈四尺鈔二百貫該錢四百文折銀一兩二錢長船川船烏船贑船六尺起至一丈四尺止六尺鈔三十貫該錢六十文折銀一錢八分七尺鈔四十五貫該錢九十文折銀二錢七分八尺鈔六十貫該錢一百二十文折銀三錢六分九尺鈔七十五貫該錢一百五十文折銀四錢五分一丈鈔一百一十五貫該錢二百三十文折銀六錢九分一丈一尺鈔一百六十五貫該錢三百三十文折銀九錢九分一丈二尺鈔一百九十五貫該錢三百九十文折銀一兩一錢七分一丈三尺鈔二百二十五貫該錢四百五十文折銀一兩三錢五分一丈四尺鈔二百五十五貫該錢五百一十文折銀一兩五錢三分以上止以成丈成尺算其寸數畸零蠲免二十五年沙船河船船航船俱號平料每鈔十貫遞減一分每千貫減銀一兩五尺鈔一十貫該錢二十文折銀五分六尺鈔二十貫該錢四十文折銀一錢七尺鈔三十貫該錢六十文折銀一錢五分八尺鈔三十五貫該錢七十文折銀一錢七分五釐九尺鈔五十貫該錢一百文折銀二錢五分一丈鈔八十貫該錢一百六十文折銀四錢一丈一尺鈔一百一十貫該錢二百二十文折銀五錢五分一丈二尺鈔一百四十貫該錢二百八十文折銀七錢一丈三尺鈔一百七十貫該錢三百四十文折銀八錢五分一丈四尺鈔二百貫該錢四百文折銀一兩長船川船烏船贑船俱號全料六尺鈔三十貫該錢六十文折銀一錢五分七尺鈔四十五貫該錢九十文折銀二錢二分五釐八尺鈔六十貫該錢一百二十文折銀三錢九尺鈔七十五貫該錢一百五十文折銀三錢七分五釐一丈鈔一百一十五貫該錢二百三十文折銀五錢七分五釐一丈一尺鈔一百六十五貫該錢三百三十文折銀八錢二分五釐一丈二尺鈔一百九十五貫該錢三百九十文折銀九錢七分五釐一丈三尺鈔二百二十五貫該錢四百五十文折銀一兩一錢二分五釐一丈四尺鈔二百五十五貫該錢五百一十文折銀一兩二錢七分五釐後奉例輪收本折仍舊徵銀六分起解遇該納本色年分內將五分收買錢鈔扣留一分解京萬厯年間平料五尺鈔一十貫該錢二十文折銀七分六尺鈔二十貫該錢四十文折銀一錢四分七尺鈔三十貫該錢六十文折銀二錢一分八尺鈔三十五貫該錢七十文折銀二錢四分五釐九尺鈔五十貫該錢一百文折銀三錢五分一丈鈔八十貫該錢一百六十文折銀五錢六分一丈一尺鈔一百一十貫該錢二百二十文折銀七錢七分一丈二尺鈔一百四十貫該錢二百八十文折銀九錢八分一丈三尺鈔一百七十