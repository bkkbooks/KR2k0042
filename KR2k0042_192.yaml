body:
  text: 江南通志卷一百九十三藝文志集部一制誥奏議詩文集唐訓誥集八卷義興許景先批答一卷潤州李紳制集四卷江都李磎寫宣十卷江都王起宋內外制四十卷蘇州王綯外制二卷吳縣李彌遜內制三十卷武進霍端友內外制三十卷無錫尤袤建炎制誥集無錫李綱外制集丹陽葛立方西垣集一卷江都王居正制海十編通州崔敦詩內制三十卷如臯王覿玉堂制草九卷黟縣程叔逹詔誥三卷寧國汪澥元內制集平江鄧文原明制詔全書句容孔貞運內外制二十八卷續六卷俱貴池丁紹軾右制誥晉移檄章表三十卷句曲葛洪豫章啓事三卷丹陽范寧劉正公奏書一卷廣陵劉頌高茂琰奏書五卷廣陵高嵩唐少傅奏疏一卷江都李磎宋政府奏議十七卷吳郡范仲淹忠宣奏議二卷彈事五卷國論五卷俱范純仁仲淹子德孺奏議二十五卷范純粹仲淹子仲甫奏議三十卷蘇州盧秉廣平奏議十五卷蘇州程師孟王文恭奏議三十卷進讀事實五卷俱蘇州王綯石林奏議十五卷吳郡葉夢得奏議彈章二卷平江冷世光龍圖奏議二十卷吳縣范師道徽猷奏議三卷吳縣李彌遜張修撰奏議常熟張攀抑齋奏議常熟王萬丁諫垣奏議一卷毗陵丁隲敏節奏議一卷晉陵鄒浩張毗陵議奏二十五卷晉陵張守李忠定奏議無錫李綱小山奏議一卷無錫李祥忠定奏議七十卷宜興錢即簡惠奏議五卷宜興周葵榮敏奏議宜興蔣芾忠文疏稿宜興蔣重珍正肅奏議二十卷金壇王遂杜待制奏議十二卷揚州杜把吳丞相奏議揚州吳敏集諫十五卷江都王居正教授奏議二卷泰州胡瓊景祐樂府奏議一卷皇祐樂府奏議俱泰州胡瑗寶文奏議二十卷高郵孫覽莘老奏議十卷高郵孫覺張承議奏議集高郵張汝賢褒恤雜録三卷褒題集三十卷賢良進䇿十卷俱真州孫洙劉參政奏議儀徴劉大中崔侍講奏議總要五卷通州崔敦詩王龍圖諫疏三十卷奏議三十卷俱如臯王覿司農奏議五卷屯田詳議二卷俱歙方有開奏議三卷休寧程卓奏議一卷婺源朱辨起居奏議一卷婺源汪義端臺省論諫存稿十卷黟縣程叔逹奏議表啓三十卷黟縣程邁莊敏奏議三十卷宣城吳淵許國公奏稿宣城吳潛孝肅奏議十五卷合肥包拯王樞密奏議一卷無為王藺北山戅議一卷無為王明梁端肅奏議上元梁材青瑣獻納稿江西巡視稿俱上元金紳出山疏牘江寧何棟如淡豫奏稿六合潘世竒韓襄毅奏議一卷長洲韓雍綸扉奏草長洲申時行恤刑疏稿六卷長洲金應徴撫秦奏疏四卷籌陜存牘俱長洲顧其志奏議一卷長洲王元掖垣諫草長洲湯聘尹軍民利病十八疏吳縣陳鎰守溪奏疏二卷吳縣王鏊西臺奏議吳縣盧雍吳尚書奏疏吳江吳山工科奏議八卷吳江吳巖水西奏疏二卷吳江沈漢周忠毅奏議四卷吳江周宗建吳文叔奏疏五卷吳江吳渙牧越議略吳江沈啓口山都憲奏議常熟章律尚書奏議二十卷常熟程宗公肅奏議五十卷常熟徐恪松西奏議七卷常熟盧翊醒菴奏議常熟馮玘西臺奏草常熟王宗錫趙文毅奏議常熟趙用賢掖垣疏草常熟瞿式耜周勉思奏議常熟周木都憲奏草揀編二卷常熟陳察徐司空奏議常熟徐栻西垣奏草邊奏存稿俱崑山葉盛大禮奏議一卷崑山毛澄貞翁奏議二十卷崑山周倫兵垣奏疏崑山秦鏊職方奏議崑山周鳯鳴朝天奏疏督撫奏略俱華亭陳詢東孰諫草華亭張𢎞至諫垣疏草華亭蔡汝賢三垣諫草華亭許譽卿馮御史奏疏一卷華亭馮恩鳯山奏稿無錫泰金郎中奏議録無錫莫驄梅村疏稿無錫曹懷東巡疏略無錫嚴一鵬天垣疏稿全楚奏議俱無錫秦耀忠毅奏稿江隂李應升文靖疏稿二卷宜興徐溥文肅疏摘稿一卷宜興吳儼撫鄖疏草宜興蔣允儀安節奏疏遺稿一卷宜興吳逹可史玉池疏稿一卷宜興史孟麟何武莪疏稿一卷宜興何士晉張儀部疏稿宜興張納陛歷陳民隱疏稿一卷宜興任駉端毅疏稿二卷宜興陳于廷星沙城守議宜興堵允錫撫鄖奏議二卷宣雲奏議六卷總理疏稿一卷俱宜興盧象升諫垣遺稿丹陽湯禮敬竹湖奏疏稿溧陽馬從謙春曹書疏金壇于孔兼綸扉奏議楊一清滇人居鎮江張世才奏疏三卷淮安人劉侍御奏疏一卷儀徴劉學詩掖垣諫草沛縣張貞觀式齋封事録太倉陸容荆石奏草牘草太倉王錫爵仲明奏疏六卷太倉張寅經濟疏略太倉王在晉津門奏草太倉李繼貞大征疏稿嘉定張任籌邊疏稿嘉定殷都南宫奏題稿八卷嘉定徐學謨恤刑題稿嘉定嚴貞度西臺疏草嘉定何選臺端諫草嘉定時偕行諫垣疏稿嘉定李先芳疏略遺稿嘉定侯震暘儀曹疏草嘉定須之彥工垣奏疏嘉定歸子顧西臺奏疏嘉定趙𢎞範納言存稿嘉定侯洞曽石渚奏議四卷通州馬坤芹溪奏議一卷通州凌相陳督撫奏疏二十卷通州陳大科黃氏奏疏稿四卷通州黃河督撫奏議八卷通州顧飬謙蓉川奏疏桐城齊之鸞諫垣遺稿潛山金燕仁夫奏議三卷歙縣汪山臺中廷中撫黔奏疏歙縣江東之南岡奏議歙縣唐澤畢孟侯疏草二十卷歙縣畢懋康蘭臺疏稿歙縣洪世俊畿省奏疏休寧張應揚五垣奏議休寧邵庶瀛賢奏對録休寧程敏政督儲疏草婺源遊應乾崇仁堂奏疏婺源汪國楠留臺疏草婺源汪懷德禮垣疏草十二卷婺源余懋孳關中奏議婺源余懋衡河東奏議婺源汪以時督撫奏議績溪胡思仲三巡督撫平倭奏議績溪胡宗憲籌邊奏議寧國許汝驤三晉奏議寧國仙克謹諫垣奏書宣城王蓋西曹奏議宣城徐鴻起撫蜀奏議宣城徐元大憲臺奏稿棘臺駁稿俱宣城張綸保洮八議宣城高惟嶽四朝臺疏南陵汪有源玉城疏稿涇縣葉永盛行臺奏議貴池孫仁獅山奏議貴池柯相諫垣疏草青陽吳文梓端廷赦疏稿當塗人都憲奏議十二卷繁昌吳琛許中丞奏議十卷合肥許如蘭周忠愍奏議合肥周璽兵部