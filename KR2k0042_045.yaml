body:
  text: 欽定四庫全書江南通志卷四十六輿地志寺觀四太淮揚徐三府海通三州淮安府報恩光孝寺在府治東數十武祥輝觀舊基也宋虎岩伏禪師創建崇寧六年賜萬壽禪寺額開元寺在府治唐開元五年賜額寺內有枸把井聞思寺即舊大悲院在府西湖嘴宋建國朝康熙四十四年聖祖仁皇帝南巡敕改今名湛真寺即紹隆寺在府西淮北里康熙四十四年敕改今額龍興寺在府治西北清風門內晉大興二年創建觀音寺在府治東百步宋淳祐年建臺山寺在府治北宋崇寧四年建地藏寺即十王堂在府治西大聖橋西唐咸平年建景慧寺在府城西北二十餘里鉢池山有古敕賜額千佛寺舊名崇恩千佛寺在府城西南隅開佛寺在府治西南市橋內宋延祐四年建水陸寺在府治西北大軍倉西宋嘉定五年建圓明寺在府新城東北隅圓通觀音寺又名接待寺在府新城內明宣德間重建普應寺在府清江浦西北去治西三十里明平江伯陳瑄創建奉敕賜額佑濟寺在府城西北五里背堤面湖舊名湖心寺亦曰十方禪院康熙四十四年聖祖仁皇帝南巡敕改名佑濟寺觀音寺在清江浦有毗盧閣華嚴寺原在府治東北十里淮河北岸宋元豐年建後遷淮河南劉伶臺前誕登寺舊名洪福寺在府治西北三十里宋淳祐年建康熙四十四年聖祖仁皇帝南巡賜額誕登寺廣福寺在府新城西門外竹巷口永福寺在府西湖中明建通源寺在府治西十里窰溝舊為大悲庵宋時建淨名寺在府治北二十里宋元豐年建壽安寺在府馬邏鄉去治六十里宋宣和年間創建上生寺在府治南七十里白馬湖古剎也明正統間重建覺津寺舊名檀度寺在府清江浦明宋統殷有記國朝康熙四十四年聖祖仁皇帝南巡敕改覺津寺永寧寺在鹽城縣治北一百武唐武德三年建彌陀寺在鹽城縣治西十八里淨居寺在鹽城縣治西南八十里興國寺在清河縣治東南半里許元皇慶間建賜名興國寺在桃源縣治西半里許宋時創建能仁寺舊名承天寺去安東縣治里許宋祥符間賜額曰能仁塔曰妙通章化寺在安東縣治東二里𤣥妙觀在府城西唐白鶴舊址祥輝觀在鹽城縣治西北半里祐聖觀在鹽城縣伍祐場三茅觀在鹽城縣岡門鎮北去縣十八里一井水甚甘大旱不竭上真觀在清河縣治東半里許宋建上真觀在安東縣治東北一里許為徐依稀修道之所三元宮在運河北杯渡菴在清江浦棲蘆菴原名宅蘆菴在清江浦運河南岸康熙四十四年敕改今額兜率院在鹽城縣國朝康熙五年建敕賜為兜率寺揚州府天寧寺在新城拱辰門外東晉時為謝太傅安别墅義熙十四年有梵僧佛䭾跋陀羅尊者譯華嚴經於此時右衛將軍褚叔度特往建業請於謝司空琰求太傅别墅建寺焉名謝司空寺後名屢易宋政和三年改今名康熙二十三年以來聖祖南巡屢經臨幸御書匾額五一蕭閒一皓月禪心一寄懷蘭竹一般若妙源一淨因御賜禪心澄水月法鼓聚魚龍珠林春日永碧溆好風多二聯詩四首恭紀首卷法雲寺在府大東門外兩淮運司治之南晉鎮西將軍謝仁祖宅也舊有雙檜梵行寺在府東北邵伯鎮晉寧康三年建明初遷寺於本鎮惠政橋西旌忠寺在府治東南文選樓遺址也陳大建間為寂照院宋咸淳間賜今名大明寺在府西北五里古栖靈寺也寺枕蜀岡舊有寶塔康熙二十三年以來聖祖南巡御書匾額五一怡情一澄曠一平山堂一賢守清風一第五泉救生寺在府東五里第二港隋大業四年建法華寺在府東北邵伯鎮一名來鶴寺隋大業三年建周世宗征淮南駐蹕於此置法華禪院宋開寶中賜額為寺寺有銅鐘重千餘斤僧子惠募金所鑄蘇軾有鐘銘禪智寺即上方寺在府北五里蜀岡一名竹西寺天朗氣清南徐諸山蒼然在襟袖間寺有石刻吳道子畫寶志公像李白作讚顔真卿書謂之三絶碑又有蘇軾李孝博詩石刻寺側有蜀井按劉長卿懷演如上人詩序云寺即上人所建明魏尚書驥碑又云煬帝嘗夢夜遊兜率天宮聽彌勒佛說法既寤遂以離宫施為寺二說不同並存以俟參考山光寺在府灣頭鎮前臨漕河隋煬帝以宫為寺名山光宋天禧四年改曰勝果寺僧請山光舊額更建於府東南第三港沙河岸側梵覺寺舊名興教寺在府城蕃釐觀之南宋淳化間建康熙三十八年御書西來法三字額四十四年又賜梵覺禪寺額甘泉寺在府西甘泉山唐開成間移慧照舊額於此一名慧照寺惠照寺在府北三里大儀鄉唐景龍間建寶勝寺在府南楊子橋唐貞觀間建後為江水坍沒遷於城東三里天王寺太平寺並在府南揚子橋俱唐貞觀年建大聖寺在府東北三十里唐高宗時建開元寺在府城東五十里唐時建國朝順治十八年遷寺於傅李橋萬佛寺在府仙女廟北康熙三十八年御書雲門雪竇四字額善覺寺在府挹江門外官河南舊名華藏菴康熙二十八年御賜今額南來觀音寺在府通濟門內西南隅慈雲寺在江都縣東鄉宜陵鎮康熙三十八年敕賜慈雲二字額寶坊寺在儀徴縣東門外運河邊即五臺庵也康熙四十二年聖祖仁皇帝敕改今額又御賜金剛經一卷藥師經一卷天寧萬壽寺在儀徵縣東南澄江橋西唐景龍三年建宋蘇子瞻嘗於此寫經紹興中更今名乾明寺唐為大雲請雨寺宋改今名資福寺在儀徵縣東宋大中祥符元年建即儒學舊址崇因永慶寺在儀徵縣北五里宋靖康初為功德院明洪武間重建名北山寺禪惠寺在儀徵縣北二十里漢廣陵太守陳登建舊名鼉淙宋治平中更今名梵天寺在儀徵縣西方山上梁天監中梵僧建號興雲寺宋治平中賜今額禪證寺在儀徵縣橫山梁天監中建世傳昭明讀書堂唐咸通中僧神堅以堂為太子院法雲寺在儀徵縣胥浦之西唐景雲間建名慶雲寺宋改今額水月寺在儀徵縣蛾眉山松柏萬株地最幽勝地藏寺