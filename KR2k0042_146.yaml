無梗化者終江西按察使張應揚字以言休寧人萬歴癸未進士知蘭溪縣禁溺女置社倉擢御史出按雲南順寧代候二冦搆兵應揚籌畫敉寧之復按福建岀寃繫者甚衆程朝京字元直休寧人萬歴癸未進士令鄱陽邑多積逋朝京立週知實徴二册課遂如額陶丁藍芳威爲亂討平之又力言芳威於上官貸死戌邊卒爲名將累陞永平知府因灣水運天津糧至闞家口省輓輸數倍晉福建副使潘士藻字去華婺源人萬歴癸未進士授温州推官擢御史忤東厰張鯨㑹火災疏請修身親賢語甚切摰鯨乃激上怒謫廣東布政司照磨謝表曰積忱未至自反殊慙東西南北莫逃天覆地載之間進退行藏皆爲進德修業之地後量移南吏部主事陞尚寶少卿邵庶字明仲休寧人萬歴癸未進士選庶吉士改兵科給事中疏請清驛遞汰運總冗員革錦衣冐濫裁戚畹越請陞工科都給事再補禮科請臨御躬祀及行召對開儲講陞太常少卿方元彦字士美歙人萬歴丙戌進士知金華縣擢御史按甘肅嘗陳備邊五議按閩釋寃發奸郤紅毛番市鎮安海堡城又建言星變地震宜撤璫使以答天譴卒於官吳中明字知常歙人萬歴丙戌進士任瑞汀兩府推官陞主事歴吏部郎中疏列礦奄陳奉暴横狀提學河南分守汝寧汝寧王縱僕殺人中明以僕抵法備兵薊門葺邊墻開耕屯治績尤著陞陜西布政廣西廵撫南户部侍郎卒金繼震字長卿休寧人萬歴丙戌進士知義烏縣公署火恐獄囚盡斃縱之歸約令自來無後者累陞刑部郎中恤刑山東遼東釋寃繫四百餘人報命課第一洪文衡字平仲歙人萬歴己丑進士歴任南北部曹疏請建儲居工部力杜中貴横索節冗費甚多晉光祿少卿上八事上爲寢景醮之命陞太常卿議請祧睿宗時以爲當卒贈侍郎文衡性孝居喪斷酒肉不處内三年黄全初字性甫歙人萬歴己丑進士知崇德縣歲荒請蠲逋賦當事不可遂引疾歸起南國子博士遷南户部主事軍餼多冐支悉釐其弊歲省萬四千緡晉郎中汪先岸字登于休寧人萬歴己丑進士知光山縣擢御史上疏請正國本首輔依違其議遂疏劾之廵視漕河建開泇河議河成歲省金錢無算仕至太僕卿魏閹用事削籍家居剏立還古書院汪以時字太易婺源人萬歴己丑進士爲縣治最授御史督理河東礦使張忠奏開採南池徴收鹽課以時抗阻之爲所誣奏幾不免轉按山西亷治税棍出寃獄八百餘人建城堡於青龍驛轉南太僕卿葉伯鳴字雲羽休寧人任沂州同知潔已恤民塞礦穴疏鹽禁署單父平馬政出大辟三人邑以白蓮教被累者盡釋之改涿州涿地衝民疲伯鳴以休息爲理擢藩司理問金忠士字元卿休寧人萬歴壬辰進士令樂平以卓異考選御史按貴州勘定水西討平洛苗按浙江賑澇饑戢兵伍按河南𠞰巨冦歴遷至僉都御史廵撫延綏晉少司馬方時化字伯雨歙人萬歴甲午鄉薦知朝城縣時白蓮賊逼擾時化偵知邑中巨猾王甲周乙召爲約正捐其宿負以甘言撫之二人願盡力遂以計縛賊主閻氏等斬之終敘州府同知鮑應鰲字山甫歙人萬歴乙未進士授户部主事𣙜崇文税管太倉庫秋毫無染補祠祭司郎中孝靖皇太后薨詔依世宗沈貴妃例鰲以沈貴妃例簡畧乃考穆宗母孝恪皇太后時爲康妃薨儀注増十三條疏上即允行之鰲在儀司凡議諡䘏守正不阿尋陞尚寶卿晉太僕卒畢懋良字師臯歙人萬歴乙未進士除萬載令陞禮部郎督學浙江轉福建督糧道括諸項羡銀及贖鍰積榖數萬石後紅夷冦海上糧艘不通發所貯榖民藉全活尋晉方伯減加𣲖撫降海冦累陞户部侍郎總督倉塲議以本色折色相間給發每年可積米八千餘石㑹以不附魏璫斥罷時與族弟懋康並有清譽稱二畢懋康亦爲璫削籍相繼去士論以爲榮崇禎初起工部侍郎洪世俊字用章歙人萬歴乙未進士除禮部主事時諸王婚期踰制講學禮廢福藩乆不之國力爭十餘疏出叅漳南㑹紅夷入冦預堡圭嶼儲火藥禦之冦不爲害轉山東左布政平白蓮賊陞太常寺卿汪元功字元倩歙人萬歴乙未進士除光化知縣遷吉安府補順德備兵雲中力行節省以完兩年貢市額素囊部落不靖元功單車馳諭官至湖西觀察吳宗堯字仁叔歙人萬歴乙未進士知益都縣性强項中官陳増以開礦肆虐宗堯盡發其不法事列狀上聞請以一身易萬民命帝心動令増約束其下増劾宗堯阻撓礦務遂被逮民數萬遮道衛送哭聲震地下獄經年釋爲民謝存仁字生甫祁門人萬歴乙未進士授户部主事𣙜闗監兑有清望督儲遼陽陞叅政歴雲南布政陞廵撫簡兵核餉請告歸胡思伸績溪人萬歴乙未進士知上虞縣築夏葢白馬上妃三湖灌田又築梁湖石牐民享其利進兵部郎陞副使備兵懐隆建城堡修邊垣開沃田節虚冐銀兩遷保定廵撫治績尤偉畿南頼之以安畢懋康字孟侯歙人萬歴戊戌進士授中書選御史出廵長蘆盡釐鹺弊請修復河渠諸牐按陜西山東皆值飢歉講求賑法無出懋康右撫鄖陽以忤璫編名黨人尋起南通政仕至南户部侍郎吳國仕字秀升歙人萬歴甲辰進士授刑部主事守嘉興均調賦役定官解之法築海塘及漕堤建石梁於王江涇治行推第一備兵辰沅叅政川東擒奢酋將樊龍以復渝城繼搗藺賊破之數轉至福建左布政有平海冦功遷南太常卿晉户部侍郎汪有功字祖倩歙人萬歴甲辰進士知蒲圻縣擢南御史所上疏如勸青宫講學劾巨璫亂閩及藩臣不當僭祭孝陵與張差肆逆當窮治其奸皆中時弊官至尚寶丞汪煇字柱河休寧人萬歴甲辰進士由庶吉士歴吏部侍郎勁節不阿魏璫建祠欲屬煇記煇絶不與通璫銜之矯㫖削籍崇禎初復職余懋孳字舜仲婺源人萬歴甲辰進士知山陰縣擢給事中歴疏請發留中章奏舉枚卜釋繫囚停税使賑東方饑民黜西洋天主教又言帝乆不御朝中外扞格堂陛闊絶前後章數十上俱切中時弊倪思輝字實符祁門人萬歴丁未進士天啓間官給事中劾保姆客氏謫閩幕後起兵科給事歴通政使忤魏璫削籍崇禎初起刑部左侍郎南户部尚書逾年告歸舒榮都字曰俞黟人萬歴丁未進士授中書任御史上三字疏曰虚公嚴其餘言邊務則劾督撫周永春等言門户則劾通政賈繼春等皆甚剴切巡按湖廣時貴竹土司叛榮都代爲畫䇿𠞰平之天啓間欲與楊左連名劾魏閹㑹外艱不果後憂憤卒追贈太常卿江秉謙字兆豫歙人萬歴庚戌進士知鄞縣擢御史抗疏言封疆事請置本兵張鶴鳴於法訟經畧熊廷弼功内操事興秉謙連疏糾之諸奸切齒遂削籍程䇿字獻可休寧人萬歴庚戌進士授西安推官清介自勵轉南禮部主事時拜魏璫祠者如騖䇿獨不往守德安有七府奸民同日謀不軌䇿密緝捕渠魁餘不問反側以安晉鄖襄叅政流冦深入設伏大敗之汪泗論字自魯休寧人萬歴庚戌進士授漳浦知縣擢御史疏杜内批以防微漸出按江西力持大體晉太僕卿趙時用字德友休寧人萬歴癸丑進士知南安調閩縣擢給事中抗言恩蔭不宜濫敘閣臣票擬讓權中官事多内批徑出宜防其漸忤崔魏矯㫖削奪後起南鴻臚卿汪康謡字衢父休寧人萬歴癸丑進士知諸暨縣陞户部主事出守漳州有販海遭颶風者七十四人前吏誣爲海冦康謡亷實釋之蘇撫周起元以忤璫坐贓數萬下漳州籍之康謡閣不行遂削奪後復官擢福寧兵備道汪應元字長孺歙人萬歴丙辰進士授太常博士魏璫用事以奉差歸崇禎初召爲御史出按廣西歲大旱甘澍隨車罷牛税罷𣙜木多所釐革汪元標字承景歙人萬歴丙辰進士由潭陽知縣晉吏部主事歴掌四司值權璫用事罷官歸旋起備兵海上擒大盜蕭潮等千餘人閩以安堵晉福寧道許啓敏字元建歙人萬歴戊午舉人任登州府推官有負官物抵法繫獄至數百人啓敏至多所平反白院道出之其不可宥者令煎鹽貸死晉兵部主事黄願素字若鏡歙人萬歴己未進士爲撫州推官擢吏部主事疏汰假官百八十員鋟銓曹事宜存之部中他如禁飛布山燒鑿以䕶地脉設界嶺防守以清盜冦鄉人頼之黄正賓歙人由貲入官爲舍人思樹竒節萬歴中以緩册東宫抗疏劾首輔申時行下獄斥爲民遂有聲士大夫間熹宗立起故官再遷尚寶少卿致仕崇禎初閹黨徐大化楊維垣已罷官猶潛居輦下正賓疏發其奸都人快之吳彦芳字延祖歙人天啓乙丑進士知莆田擢御史甫九月疏十一上登州用兵請撤監視諸中官最後以排撃邪媚攖上怒下獄尋釋歸方士亮歙人崇禎辛未進士歴嘉興福州推官擢兵科給事中疏陳時弊論劾謝陞徐世蔭馬爌等薦方岳貢陳洪謐等陳新甲主欵議士亮首發其罪復論中官出鎮之弊乞撤回語極明切周延儒出督師無功獲譴以士亮贊畫軍務削籍歸國朝張光祁字雲仲歙人舉順治丁亥進士知鄧州督戰艦征湖南區畫有方盜壘於下庄祁單車諭之皆就撫陞禮部員外郎㑹河決不忍去治之廵督七書夜不入署以勞瘁卒吳正治字當世休寧人漢陽籍順治己丑進士選庶吉士授編修以侍講出補江西叅政轉陜西按察使所至以清亷執法著内擢工部右侍郎轉刑部諸所條議如赦令宜急行丈量宜停止禁狀外指扳嚴婦女私嫁免逃人十家連坐及收旗丁月錢皆著爲令晉禮部尚書拜武英殿大學士守成法持大體以病致仕趙吉士字天羽休寧人順治辛卯舉人知交城縣交城北阻深山自明季爲盜窟吏不敢詰值山中饑吉士以勸農閲荒爲名率數騎入山中留宿土窑左右皆懼吉士意氣自如既熟知其山川險易居民順逆一日與同官飲却月湖笙歌迭奏賊聞之不爲備忽夜半斂兵疾行由間道搗賊巢擒一百一人撫定山民一千四百餘户其不從賊者給羊酒旌之敘功陞户部主事𣙜揚州闗擢户科給事所著有續表忠記徽州府志萬青閣集洪琮字瑞玉歙人順治壬辰進士除韶州推官時東粤新附郡縣供辦軍需琮條上幫貼夫船議吏民得蘇息縛妖民郭天鵬擒䖍賊王秀皆不煩兵歴員外郎中督學陜西子景行平陽知縣清漏租除規費禁絶賃妻火葬諸惡習汪宗洙字魯源婺源人以歲貢任内邱知縣於時西山劇盜嘯聚民多流亡宗洙招徠懐集案牘不煩郡司理臨邑閲獄囚繫止有上臺委決者二人余維樞字中台婺源人以鄉副榜知永年縣葺學宫立義熟築河堤造布衣張葢廬訪以政事補臨縣政聲益著陞督捕主事卒維樞學有原本著從祀諸儒繫議泮宫禮樂合集令洺錄及文集吳聖楫字右舟歙人順治甲午選貢知文縣壤接西域番民雜處楫控御有方力懲奸民冒充旗丁蜀軍竊販馬匹之弊許書字元文歙人順治乙未進士知淶水縣旗民畏愛内擢之日挽留者遮道後由禮部郎出知南康卓有政績洪明鍾字萬貞歙人順治十五年以舉人知海澄縣時澄帥縱士卒索餉而譁明鍾曰餉非緩也吾將按籍而給如虚卒倒馬則奈何帥爲稍戢以軍興積勞卒邑人懐之程文彞字銘仲休寧人康熙甲辰進士由翰林改刑部主事舊例民娶旗女當離異文彞議償身價著爲令擢監察御史多所建白如升遵化縣陵邑爲州定地壇配位尚右清驛馬貽累廣旌節孝革除里役禁軍需私𣲖及佐貳武弁用嚴刑皆見施行累遷大理少卿仕終工部右侍郎汪錞字鐘如休寧人以江夏籍中康熙庚戌進士累官驗封司郎中每大廷集議敘資紛紜錞口授指揮羣吏咸服冡宰特薦掌選丁憂服闋借補稽勲以病歸子漋汪晉徴字符尹休寧人康熙己未進士由翰林改給事中有修先賢書院増張載世襲停藩臬卓異寛兩廣限憑諸疏丁卯主試湖廣遷順天府丞累官户部侍郎居官持重精敏居鄉講學紫陽還古書院所著有宋元明正學錄雙溪草堂集吳苑字楞香歙人康熙壬戌進士選庶吉士授檢討歴中允侍講遷祭酒奏請諸教習官學者歲滿補縣令勿補州倅以通沉滯塞倖門又嚴試補教習之法又令八旗子弟在官學者一體考校鄉㑹試量増其額以示鼓勵省親告歸所著有北黟集張瑗字松巖祁門人康熙辛未㑹試第一授翰林編修主試四川改御史明閹魏忠賢墓在西山侈甚上疏請毁之報可朝野以爲快提督河南學政瑗賦性淡泊素履端詳居官以亷謹稱江南通志卷一百四十七欽定四庫全書
