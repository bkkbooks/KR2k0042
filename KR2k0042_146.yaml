body:
  text: 江南通志卷一百四十七人物志宦績九徽州一府徽州府唐胡學婺源人咸通進士仕撫州司户上書忤田令孜竄福州尋授舒城令黄巢亂説李克用等協力𠞰之每臨陣爲前鋒後加宣歙節度討擊使南唐查文徽休寧人仕南唐累官樞密副使討建州王延政有功遷建州留後吳越兵據福州文徽攻克之入城撫其民陷伏中被執後遣還以工部尚書致仕弟文徴亦仕南唐宋魏羽字垂天婺源人初仕江南爲判官歸宋擢太子中舍真宗時終禮部侍郎羽强力有吏幹好言事歴劇職十年始踰四十鬚鬢盡白張諤字昌言歙人能文有吏材南唐秘書丞通判鄂州歸宋歴西川轉運使先是中土不習舟楫諤置威櫂軍分𨽻管勾始無覆溺之患子秉字孟節舉進士善詞翰歴官樞密直學士謝泌字宗源歙人太平興國五年進士端拱初遷殿中丞直史館時王禹偁請羣官謁宰相須朝罷同時接見以防請託泌謂不可疑大臣以私輔臣非接見賓客何以究知外事上嘉納之嘗薦王旦數人皆至卿相官至右諌議大夫判吏部銓年六十三端坐而逝洪湛字惟清休寧人雍熙進士直史館咸平間使荆湖條奏利病甚衆時議城綏州使湛相視陳七利二害凡五使西北采訪邊事甚明悉與王欽若同知貢舉爲所誣累貶儋州俞獻可字昌言歙人端拱初登第歴歸州軍事推官權領州事㑹李順反川陜官吏多棄城獻可料州兵屯沿江爲柵以遏之晉御史建言天下所上瑞物不在圖牒者毋得以聞提㸃廣西刑獄平定蠻冦爲立互市築塞以扼其險累官龍圖閣待制查道字湛然休寧人文徽孫事母孝母病思鱖羮方冬道泣禱于河得鱖以愈母端拱初舉進士歴官知果州西充賊爲患詔書招之不下道單騎趨賊所諭以詔意咸拜曰仁郡守也悉服㑹舉賢良方正拜左正言直史館天禧初求外任出知虢州時秋蝗災道不待報出官廩米賑之給民麥四千斛爲種全活甚衆道所至務寛恕嘗按部從者摘路旁棗以獻道挂錢於樹而去從兄陶字大鈞官秘書少監判大理知審刑院賜金紫陶子拱之淳化進士歴官中書舍人有亷節俞獻卿字諌臣獻可弟登咸平進士歴昭州軍事推官㑹陳進亂獻卿盡發州所積緡錢平糴得榖數萬大兵至頼以饋軍累遷三司鹽鐵判官上言天下榖帛寖耗仁宗爲罷諸無名費以鉅萬計後知杭州江潮溢鑿西山作堤數十里民便之以刑部侍郎致仕魏瓘字用之婺源人羽子爲開封府叅軍奏内侍以作燈山誅索擾民詔杖内侍歴提㸃廣西刑獄轉運使除雷化等州舟船計口之税罷柳州無名之役尋知廣州倡築城及儂智高冦廣五旬不能下朝廷以爲功累遷吏部侍郎致仕胡遇績溪人登慶歴進士儂智高陷邕州孫沔余靖以謀畧薦於朝除行營叅謀從狄青大敗智高擢湖南江西安撫使王汝舟字公濟婺源人皇祐五年進士知南劍州捕盜官邀賞増益盜贓擬死者十三人汝舟閲牘得其狀皆免死以治行第一聞哲宗時擢河北轉運判官諌罷市珠之令徙䕫州提㸃刑獄告歸先守南劍時祖母沒上言諸父無在者乞以適孫解官終三年喪詔從之著爲令有雲溪文集許元字子春祁門人以蔭歴泰州軍事推官戍兵千人自海上亡歸州守不知所爲元叱執倡首者三人餘悉勞遣遷知丹陽縣舊制盜決練湖水者罪死㑹大旱元請借湖水溉民田不待報決之守遣吏按問元曰便民罪令可也時京師粟少而江淮歲漕不給范仲淹薦爲發運判官轉輸不匱上嘉之拜侍御史孫抗字叔和黟人登進士知潯州擢監察御史劾奏狄青不當沮敗永洛城事言日食陰盛當以後宫爲戒又諌止大獵遷都官員外郎提㸃江西刑獄有言歲凶當稍貴常平粟價以利糴本者抗言此非常平本意詔從之官至工部郎中汪汲績溪人嘉祐進士授慈溪令濬河溉田數千頃民祀之擢太平推官解釋寃繫子奕襄皆登第有時名洪中孚字思誠休寧人湛孫元豐二年進士尉黄岡除鄰盜張韜主成都簿渡笮橋諭降雕門叛蠻崇寧初轉運熙河興鼓鑄𣙜酤市易之利以給邊立墩堡給鎧仗興耕屯以防剽掠青塘内附中孚出不意夜半抵其地撫慰之以察其情酋皆畏服知太原府夏人提重兵來議地界飭諸將掩撃遁去以龍圖閣待制致仕王愈字原道婺源人紹聖登第知信州睦冦犯信擊敗之爲王黼所嫉坐竄逐高宗時吕頤浩首薦愈起知無爲州軍程邁字進道黟人元符三年進士由仁和尉遷知西安縣部使者督諸郡水旱積欠邁曰衢州數年無水旱何積欠也守不能屈由是他邑皆免高宗時歴知福州温州上稱其政光前絶後今之吏師又知平江鎮江時鄱陽歲饑多盜以邁知饒州奏蠲舟車征算増米價以招商賈不踰月米大至手條寛恤三十餘事民以寧息進顯謨閣直學士汪叔詹字致道歙人崇寧五年進士爲太學博士以直言忤王黼斥歸乆之權知蕪湖縣發運盧宗原議涸丹陽湖爲田叔詹抗言爭之不得置印㕔事走京師上書言湖不可涸狀帝悟從之擢提舉潼川常平時東川鹽井鹵竭民多虧課被囚奏蠲其逋且削煑鹽之籍南渡後以司農少卿總領湖廣六路財賦凡八年無闕事汪希旦字周佐歙人登大觀進士知泗州時劇賊宋江横行及濠濠泗密邇希旦嚴守備賊不敢犯開廩賑饑蝗不入境麥生兩穗治最賜三品服歴知袁江舒三州以朝請大夫致仕胡舜陟字汝明績溪人大觀三年進士靖康中爲侍御史奏誅趙良嗣力抗和議高宗立仍前職以彈宰相出知廬州時淮西冦盜充斥舜陟修城治戰具招降劉文舜擊走張遇孫琪戒諸郡無給叛將范瓊食而陰發兵剪其後瓊遂絶江走時淮西八州惟廬安堵已而知靜江府罷官復起經畧廣西連破周聰陳旺諸冦經畫買馬諸政視常歲贏四倍運使吕源修怨讒於秦檜下獄死後事白贈少師子仔知晉陵縣嘗寓苕溪著漁隱叢話黄葆光字元暉黟人賜進士出身授齊州司理叅軍閲獄囚一夕遣數百人通判以爲疑視牘無不當者擢監察御史條奏三省樞密院吏猥多如奉入賞勞之類非元豐舊制者革之歲省費數萬蔡京怒其異已徙符寶郎復拜侍御史政和末歲旱葆光奏言蔡京僭擬跋扈大臣皆依違畏避以致天變京中以他事謫降後起知處州當方臘殘破之後盡心牧養卒州人祀之金安節字彦亨休寧人宣和六年進士歴遷侍御史秦檜兄梓知台州安節論其附梁師成罷之以是忤檜不出者十八年檜死起官歴侍講給事中封駁論奏獨立無黨張浚語人曰金給事真金石人也官至吏部尚書請歸時以爲中興以來完名高節未見其比卒諡忠肅汪若海字東叟歙人游太學以知兵召見請立康王爲大元帥鎮撫河北高宗即位遷江南經制使上言天下如常山蛇秦蜀爲首中原爲脊東南爲尾今以東南爲首安能起天下之脊哉欲圖恢復必在川陜遂以張浚宣撫川陜繼論軍食忤執政謫英州道出臨川時江夏軍馬李允文跋扈若海馳諭之允文感悟惟其下曹成不順若海以計得軍印遂奪其衆歸因獻平冦䇿朝廷悉用之湖湘遂安累遷直秘閣知江州時方經畧中原議起若海而若海已卒汪勃字彦及黟人登紹興二年第調嚴州建德簿長於吏治不事鞭扑入臺爲諌議大夫遷御史中丞與秦檜不合求領外祠六年復起知湖州民鐫木曰賢哲太守云程叔達字元誠黟人登紹興十三年第教授湖州䄂書見時宰論五事除監察御史賑兩浙饑以勞被奬遷右正言諌和糴四弊慶元中特除華文閣直學士卒諡莊節朱安國字康侯休寧人紹興二十一年登第累擢御史嘗論釋六年未決之囚知廣州劇盜陳青冦海道安國授牙校李寶方畧縛青及其黨以歸威震一方進直徽猷閣安國善談兵著陰符元機子拂宰姚江築捍海堤五千丈李知己字智仲婺源人紹興進士判婺州軍士以給衣絹輕持杖喧譁守稱疾知己呼其首勅以軍法仍計絹直給之衆乃帖服遷大宗正丞兼權都官郎汪安行字伯壽績溪人學問精博登紹興進士知灃州時入奏請罷公使庫孝宗顧宰相王淮曰此朴直做家老子政事何如淮對曰舊攝灃州民思其德孝宗曰因民之思俾復守灃官至朝奉大夫程大昌字泰之休寧人紹興進士主吳縣簿孝宗即位遷著作佐郎時貴近或與密議大昌上言宜防石顯之奸帝以治道問大昌言當求賢納諌政事内修則大有爲之業在其中提刑浙東徙漕江西復清江縣舊堰以捍江䕶田陞秘書監歴官權吏部尚書出知泉州汀賊沈師作亂大昌趣統制裴師武不俟帥府符急進兵討之賊遂潰以龍圖閣學士致仕卒諡文簡大昌博學精思所著有禹貢圖論毛詩辨正演繁露考古編易原雍錄北邊備對尚書譜及文集吳天驥字伯駿休寧人隆興進士調建昌司户能折疑難獄知信州歲饑首修荒政發廩賑糶日至萬六千人終户部員外郎朱晞顔字子淵休寧人登隆慶進士知靖州奏言襄漢通吳蜀宜移武昌大軍戍襄陽留水軍以控鄂沔改知吉州上言西蜀備邊不在南而在北宜移成都制置司於興元與荆鄂相應擢廣西運判講究鹽筴革客鈔科抑之患知臨安府仁和縣地多爲官舍軍營而税額仍舊請以本府餘財代輸報可官終工部侍郎汪泳字伯游休寧人乾道進士令蒲圻有聲累遷大理丞臨安有獄不決者即繳送棘庭泳言於朝曰如此則天獄反爲京府一院乞下臨安自後無得繳送從之歴知太湖處三州轉中奉大夫致仕程卓字從元休寧人淳熙十一年廷對首乙科嘉定中嘗使金察和議虛實歸奏敵人陵弱請固邦本修戎備以待復仇除軍器監請詔偏禆以上各條具方畧知泉州請减上供銀數又請勅廣南通行㑹子以流通境内楮幣除福州帥嚴察吏蠧税清訟息遷同知樞密院事一時政要多所規切卒諡正惠初休寧賦税以卓請得蠲免鄉人祀之黄何字景蕭休寧人知興國大冶縣有三山産鐵盜鑄者數千人尉不能緝密聞之朝調官軍且至何止軍境上單騎諭之皆感服遁散悉焚其具一境晏然歴知處州岳陽終朝議大夫吳格字之平休寧人淳熙進士提舉浙西常平茶鹽歲旱蝗令民雜藝不種之田以自食官不收苗主不收租遷帥紹興請免定科浮財物力等錢官終起居舍人朱權字聖與休寧人淳熙進士知惠州郡蝗權禱於神忽大雨水漲明日有鷹隼烏雀驅蝗赴水死廣東有冦權授將官方畧擒其魁汪義和字謙之黟人淳熙進士知新建縣歲旱白帥府曰旱勢特甚已批放八分矣帥怒其專義和執愈堅帥從之守武岡崇學校増科舉以化溪洞武健之習官至侍御史兼侍講汪文振字子泉休寧人淳熙十一年進士歴司農少卿提㸃浙西刑獄時旱蝗民饑縣督逋監錮文振錄囚至華亭釋四百餘人令俟秋償檄他縣如之民頼以活汪綱字仲舉黟人勃曽孫以任入官授桂陽軍平陽令平陽歲貢銀額萬餘兩綱以銀礦已竭力請蠲减㑹歲饑旁邑聚惡少入境爲患綱定之歴知弋陽蘭溪太平諸縣俱有政績遷知高郵軍陳揚楚二州備邊屯守之要請修築興化海堰及石䃮函管以疏運河水勢知紹興府濬蕭山古運河創牐甃涂以通舟車發巨室埂岸通湖水資灌溉儲緡錢三萬專備修築自是湖田始復理宗即位召爲寶謨閣待制奏免越經總虚額錢九萬五千緡後權户部侍郎致仕趙善璙字德純歙人以宗室登嘉定元年進士又中明法科通判廣德軍歲饑借倉司米斛錢數千緡爲糴本平價濟民遷知江州亦如之上嘉其績召爲尚書郎歴中奉大夫呂午字伯可歙人嘉定四年進士歴任兼沿海制置司時海冦未平午亷知調軍出海之弊議糧盡再給不許擅還賊舟所有悉以給軍海氛遂靖上親擢監察御史兼崇正殿説書與史嵩之忤力求去帝慰留乃復入臺益敢言無所忌所著有竹坡類藁吳發字伯韞歙人登第爲臨川法曹掾嘗慮囚慶元狴犴充斥發或罪或釋應時決遣懽聲載道吳輔字友仁休寧人嘉定進士主管兩浙運司幕職人號爲霹靂手後除御史兼崇政殿説書首列四疏上輒嘉納汪勲字鼎叔黟人嘉定登第調淳安尉邑遭水患亟命舟救溺頼全者無算授廣西檢法兼提幹北銀綱羨餘悉歸公帑改辰溪時帥以辰溪遠雜諸獠欲移之勲謂臣子之職不當趨易避難單車至邑諸獠帖服卒於官程元鳳字申甫歙人紹定元年進士歴宗學博士輪對稱旨理宗稱其有古遺直風除監察御史時臺官以論列鄭清之被出元鳳疏斥清之罪遂召還臺官元鳳所上章皆天下大計帝手書昭光清忠儒碩六大字賜之遷侍御史奏薦有德望才學政績者二十餘人累遷叅知政事拜右丞相未幾丁大全預政遂乞解機務度宗即位進少保致仕卒諡文清方岳字巨山祁門人紹定甲科除淮東安撫司幹官高郵軍閧岳以制命往戮首惡數人一城帖然制置使趙葵深倚之淳祐六年遷宗學博士時休寧程元鳳婺源吳遇與岳皆受知范丞相鐘同遷博士有新安三博士之稱差知南康軍以忤京湖閫賈似道調知邵武未莅任峒冦作馳榜諭之冦知岳威名迎拜車下歴知饒袁寧國諸州終朝散大夫岳自號秋崖有秋崖小稿及重修南北史汪應元字尹卿歙人進士調潭州司户叅軍奉檄道經綏寧㑹猺峒嘯聚應元挺身召諭卒致降服知建平縣有死囚獄具送郡道逸未幾自造庭下曰公明理盡情寧歸死朝廷聞而異之累陞直秘閣呂沆字叔朝午子端平間銓試第一知於潛逸囚聞沆至自來歸罪判婺州賈似道議行公田又矯詔廢十七界㑹子行闗子沆皆力言非便賈怒調將作監簿三學伏闕訟沆屈召赴行在不復出卒年八十一胡崇字宗叟登淳佑第授句容簿制置使吳潛辟爲閫幕委行經界法於溧陽不履畝而民皆依限自實歴官太常寺丞上言公田之非忤時相出知台州台爲賈似道鄉郡崇一切以公正行之程元岳字遠甫歙人寶祐元年進士授武學博士率學館同僚三叩閽言事遂出國門有旨慰留累遷工部侍郎嘗彈擊奸相宦寺無所畏避封歙縣開國男程鳴鳳字朝陽祁門人應武舉射䇿第一知德慶府將之官適部内山猺猖獗或止其行鳳正色曰此正臣子奮志之日也至則條置事宜出竒掩擊賊黨悉平知南雄州進無逸説有讀史發微三十卷許孔明字元熙祁門人入太學值理宗幸太乙宫伏闕上書諌游幸并言賢否混淆丞相丁大全燮理失道上嘉納之寶祐四年登第仕終宣教郎元洪椿字子壽歙人至元中爲仙居簿隣近賊竊發煽邑民李念二爲亂省遣萬户提重兵至脅官吏手狀誣闔邑皆賊將屠之椿曰盜止一鄉餘民何罪以死爭得免積官至承務郎明唐吉祥字彦貞歙人洪武庚辰進士令祁陽以一僕自隨及朝覲與僕䇿蹇出城弟自家來迎問之曰而兄行李止此矣歴葉南陽知縣皆有聲仕終工部主事葉保翁字宗茂休寧人至正壬辰蘄黄盜起保翁與汪同起兵禦冦明鄧愈克徽州得保翁授婺州守修城積糧招撫流亡終饒州知府程繩祖字叔武休寧人洪武中由御史左遷湖口令有惠政邑東黄麻潭田五百餘畝爲蛟所陷民虚輸税繩祖禱城隍神白日雷擊蛟斃胡永興字彦隆祁門人弱冠召入文淵閣纂修高廟實錄登永樂戊戌進士知三河縣奏減民賦仁宗時擢趙府左長史高煦謀不軌密使通趙永興泣諌王感悔及高煦伏誅勸王獻䕶衛上表謝王從之言者乃息王俊德字大本黟人登進士任御史廵按浙東有大豪訟搆無辜數十人亷得其由置豪於法遷河南副使叅理戎政陞廣東布政王静字永静黟縣人由貢生授御史時值營造奉命廵工南北又往西域市馬陟雪山崑崙抵弱水遍歴七十二族陞漢陽府有盜十二人上司審允待決静亷得無辜者論脱五人吳寧字永清歙人宣德庚戌進士授兵部主事遷郎中爲尚書鄺埜所倚任埜從征土木留寧掌部事陞右侍郎佐于謙籌畫有功景泰初乞歸家居三十餘年卒楊寧字彦謐歙人宣德五年進士授刑部主事隨征麓川賊約降主將欲許之寧曰兵未加而降詐也弗聽敗績諸將獲罪獨寜擢郎中復從王驥討之有功超遷右侍郎後叅贊雲南軍務練兵督耕邊夷大服閩廣盜起命寧撫江西據要設備盜至輒殱拜禮部尚書汪敬字益謙婺源人宣德癸丑進士詔使湖廣纂修宣廟實錄事竣乞終母養起授户部主事以亷能稱景泰間徽州知府以該徴税糧本色繁重疏乞折納輕賫事下户部敬力爲贊成一郡德之程富字好禮歙人領鄉薦擢監察御史按江西歲荒妖賊煽亂富直擣其巢俘獲甚衆遷右僉都御史廵撫甘肅麓川不靖總督雲南有功陞左副都御史程信字彦實休寧人正統壬戌進士授吏科給事中景泰初以天變上中興固本十事首請隆孝友以答天心陞山東叅政天順初歴僉都御史廵撫遼東成化改元四川山都掌蠻作亂進兵部尚書督師討平之裂其地立長官司凱旋進爵卒諡襄毅許士達字延佐歙人正統十年進士授御史景泰時數言事帝深納之廵按福建革除奸弊風裁凛然期滿當代耆老詣闕請留終貴州布政汪回顯字汝光祁門人正統戊辰進士授户部主事景泰初奉使見河南民饑奏發粟十餘萬石使蜀覈鹽井之乆湮者減其額新開者増之又奏除冗課十餘萬歴知廣惠二府莊歙字尚源歙人景泰辛未進士擢河南道御史考察賢否人服其明按浙江山東廣東福建奏免徴輸禁竊礦平賊冦止採珠按察雲南因其土俗以折獄訟政化大行終河南右布政洪寛字有約歙人以鄉薦授桂陽州時洞獠剽掠寛遷州治於古府舊基民頼以寧改知鄭州值創藩封濬漕河立㑹府夫役浩繁寛極言州狹民貧得免夫役之半歲大祲奏免税二分復請發陳麥官粟兼濟之程泰字用元祁門人景泰甲戌進士授户部主事犒師陜西郤總帥餽進秩郎中用兵遼東遣泰治軍奉命視山東災還陳四事多見舉行擢廣西叅政往定安南地界終河南布政康永韶字用和祁門人以舉人擢御史疏劾尚書馬昻不法爭慈懿太后山陵事有直聲尋謫知福清縣以知天文召還善筮法恐上溺術奏言臣但知易理耳仕至禮部侍郎汪貴字良貴歙人天順進士令嘉善覈田税省小民賠納之弊清介執法豪猾不利被誣去官民數千人攀號請留其衣作留衣亭邑人周宙等上書訟寃詔復職汪杲字廷輝休寧人天順進士授户部主事董輸物料於京師至江淮舟焚僚屬欲以私餘足其數杲以爲欺罔弗許上章自劾遷曲靖軍民府守羅雄土官相讐殺杲單騎馳諭即解甲降饒欽字克恭祁門人天順庚辰進士授户部主事尋知澂江府所屬土官無子欲以女襲職厚賂欽欽不受奏以職官易之覲歸不仕有清名謝潤字德潤祁門人天順進士授刑部主事陞浙江僉事屢折疑獄不可干以私汪奎字文燦婺源人成化丙戌進士除秀水知縣擢御史應星變陳言出判䕫州討平雲陽劇賊遷知成都府歲饑多盜奎緩刑弛獄發廩賑之流移還集三遷布政使進右副都御史廵撫貴州致仕方思潤字廷膏歙人成化甲午鄉舉授桂陽知州振興學校調臨江通判盜不敢犯嘗奪宸濠湖田還諸民及歸宸濠使人伺舟次殺之由間道得免洪遠字克毅歙人成化戊戌進士令三縣皆有聲爲御史敢言事遷浙江僉事歲大饑倣行富弼朱熹荒政民免流殍累官都御史廵撫雲南明著威信蠻争降服晉工部尚書卒諡恭靖葉鼐字致和祁門人以鄉薦知黄梅縣多惠政孀婦逋賦使傭織償所負有鬻牛輸税者使立劵以候秋成寃獄積年不決未旬日悉理出之憂歸民泣送越境而後返王珦字克溫祁門人成化戊戌進士選庶吉士改給事中嘗劾番僧論宫閫直聲甚著㑹試充校士官内閣私屬其甥珦遂稱疾不就查兩廣軍餉藩臬有不法者行賂求免珦卒劾之還朝疏時政六事尋爲廣西叅議胡富字永年績溪人成化戊戌進士授大理寺評事遷福建僉事釋福寧疑獄二百餘人進廣東副使瀧水猺擾民富度猺所出没處得荒田三千餘頃招獞人耕治猺畏獞遂不敢出黎人冦儋州率兵跨海討平之歴布政使進順天府尹逆瑾用事改大理卿豪奪民田賂瑾脅之富不從竟直之轉户部侍郎進尚書致仕卒諡康惠汪舜民字從仁婺源人奎子成化戊戌進士爲御史出按甘肅忤權貴謫官𢎞治初擢江西僉事決獄如流淮揚大饑奉命脤濟活饑民百二十萬人復業者八千餘户歴官右副都御史舜民好學砥行持風節所著有静軒行稿増校類編通鑑總目諸書黄華字實夫歙人成化辛丑進士任金谿平江二縣知縣陞兵部主事奉勅大閲兩京山東浙江諸地得材官騎士數萬叅議福建討平汀賊逆瑾擅權遂解組歸張敏字志學祁門人登成化辛丑進士知桐栢縣擢御史劾内宦怙寵肆横廵江時按治京口渡夫中流横索渡錢推溺行李之惡仕終四川叅議曹祥字應麟成化甲辰進士由户曹出守寶慶興文教勸農業教民作水車以濟旱潦叅政四川廵撫貴州皆著有偉績洪漢字朝宗歙人成化進士授行人累遷户部郎督楚儲奏免逋課數萬陞雲南叅議提督銀塲裁省中貴例供羨餘令礦官自赴司交課著爲令胡光字文光績溪人成化甲辰進士授廣州推官劾中貴出鎮不法事謫驛丞轉灌縣令築江都堰除虎患陞曲靖軍民府同知歸程材字良用歙人𢎞治丙辰進士司理汀州入爲御史疏劾閹寺劉瑾馬永成谷大用等竊弄威柄瑾銜之摭其細故罰米輸塞上又徙其家屬於海南瑾誅得釋張芝字廷毓歙人𢎞治丙辰進士授大理評事極言閹瑾竊權督學廣西㑹猺獞反監軍討之賊匿深穴中以計殱之擢荆南副使吳遠字惟明歙人𢎞治丙辰進士爲莆田知縣歲祲多盜遠課農桑固封守賑乏困凡學宫橋梁郵舍皆治不費於民累遷黎平知府民雜猺獞喜弄兵遠教以禮讓彬彬向化程琯字德和歙人𢎞治丙辰進士除户部主事擿發隱沒官緡四千𣙜北新闗税清理屯田皆以亷稱遷泉州知府擢兩浙鹽運使戴銑字寶之婺源人𢎞治丙辰進士選庶吉士授給事中詔求讜言銑條時事爲保治綱目上之正德初閹瑾用事銑上言宦官黨類宜加裁黜顧命大臣不宜聽引去逮杖除名世宗立贈光祿少卿戴敏字遜之婺源人𢎞治丙辰進士知辰州府時筸賊猖獗敏緋衣小隊馳賊營前驅呼曰太守來與汝語賊駭竄復呼曰太守來活汝非殺汝也賊稍稍出敏爲陳利害賊羅拜乞降尋擢貴州左叅政撫苗有功賜金幣吳漳字清甫歙人𢎞治己未進士令胙城擢御史以論逆瑾削籍瑾敗起官廵按北畿陞山東副使河決黄陵岡漳殫力鳩工禱於神願以身塞河遂南徙復故道擢都御史汪標字立之祁門人𢎞治巳未進士知武定州蠲市税民大悦陞刑部郎中逆瑾用事幾不免出知鶴慶府未期年政通民和調大理瀕行民遮擁不得前尋陞金齒兵備致仕章瑞字廷召績溪人𢎞治已未進士授行人擢御史武宗𥘉逆瑾竊柄瑞上言五事謫江西都事起知思南府時守備甘霖軍政乆弛八寨賊時出剽掠霖欲屠十三村以冒陞賞瑞切責將劾之懼而止唐澤字霈之歙人𢎞治已未進士知平鄉縣平鄉多水患澤興築堤防一百八十里遷刑部主事劉瑾擅權治獄者率阿㫖殺人澤持法獨平累陞都御史廵撫甘肅自土魯番據哈密城疆塲日多事乆之冦數千穿塞盜邊病泄多死狼狽欲潰澤計羸冦殱之不足創艾令服使醫爲診治有間遣譯命之曰若病今起矣詰朝以戎服相見冦頓顙泣謝歸上表誓終身不復反巳而悉還所侵地陞户部右侍郎卒於凉州諡襄敏鄭晃字晦之祁門人領鄉舉任曹州學正流賊入境率諸生守禦城得全陞長沙府判益勵清節逋賦者爭先輸納轉馬湖同知討平芒部叛蠻潘珍字玉卿婺源人𢎞治壬戌進士起諸暨令歴陞山東僉事流冦攻兗東掠曲阜廼奏移縣並闕里城之備兵福建捕斬海南劇盜括刷海船之爲奸利者歴陞兵部侍郎安南請討莫登庸廷議遣將問罪珍抗疏言安南遠裔祗須遣使諭以禍福何必勞師遂以沮撓成命落職珍亷直有行誼大臣交章薦不果用程文字煥章婺源人登𢎞治乙丑進士歴大理寺正獄無冤滯擢按察僉事備兵廣南猺獞不敢内犯以與當道籌議邊事不合罷歸潘旦字希周珍族子𢎞治乙丑進士授户部主事典漕真州遷邵武知府裁抑巨璫假上供擾民累陞至兵部侍郎提督兩廣㑹征安南安南遣使求貢旦上疏宜從所請以綏遠人不必窮兵萬里適珍以言得罪嚴嵩遂絀旦議不用引疾去卒贈工部尚書李汛字彦夫祁門人𢎞治乙丑進士授工部主事歴正郎出知思恩府猺獞變作單騎宣諭就撫者三萬餘人邊境悉寧金約字用博休寧人正德丁卯鄉薦署唐縣教諭㑹流賊至身自乗城守禦賊矢中項抜其鏃益奮激固守賊知有備夜遁晉國子助教潘鑑字希古婺源人正德戊辰進士歴陞福建僉事討蘇秉剪安南盜俱有功累陞右副都御史廵撫四川討平西蕃深溝諸蠻擢工部侍郎總督川貴湖廣諸省採木進兵部尚書提督兩廣軍務卒諡襄毅曹深字文淵歙人正德戊辰進士率同榜百餘人摭劉瑾逆跡疏於朝罰跪午門五日終兵部主事江一桂字伯馨婺源人正德庚午鄉薦知建寧縣擢南京部曹出守太平郡接壤交趾時莫登庸僭逆上命毛伯溫征之伯溫計先遣使臣往諭一桂請往登庸遂稱臣上偉其績賜賚特厚陞副使卒汪元錫字天啓婺源人正德辛未進士選給事中兵部論偏頭闗功敘錄太濫元錫疏斥本兵王瓊以下有罪無功不宜冐賞帝北幸昌平宣大南征宸濠元錫皆上疏力爭及世宗即位首陳先朝羣奸蠱惑基禍宜付法司定罪從之陞太僕寺卿李福達之獄以直言被杖罷歸再召官至户部侍郎卒贈尚書黄文光字應奎休寧人正德癸酉鄉薦知冠縣清儉愛民部使者持倉庫吏責私簿典庫曰令尹無一錢私出入簿安得來使大驚異趙時勉字誠之歙人正德癸酉鄉薦謁選上時務二十事知武城縣歲饑民流請監司入疏蠲民租之半每歲省厨傳之費不下數千緡胡松字茂卿績溪人居家以孝友稱由正德甲戌進士爲嘉興推官晉御史請究宸濠奸黨罷内官店裁東厰衙門薦謝遷韓文彭澤林俊羅玘諸人世宗朝論桂蕚起用王瓊事出知亷州歴陞右副都御史上治河便漕疏尋晉工部尚書時伊庶人賄嚴嵩請拓府第大將軍仇鸞陰蓄異志請屯親兵輦轂下便宜給武庫軍仗松皆力陳不可及伊庶人仇鸞敗果如松言卒諭祭葬鄭佐字時夫歙人正德甲戌進士授南刑部主事改祠部疏議大禮極陳後殿災變之由遷福建僉事尋備兵饒州𠞰誅閩饒宿冦方紀達字行可歙人正德丁丑進士令南豐擢給諌時張璁桂蕚驟用事達抗章論列調廣西僉事卒僚屬合賵而後能殮汪思字德之婺源人正德丁丑進士選庶吉士授給事中嘉靖初首薦耆舊大臣石珤韓文彭澤等以輔新政極論太監崔文鮑忠芮賢之罪薦尚書林俊之忠力救諌臣劉最讜論重一時未幾元宰論翊戴功爲外戚議封思奏寢之外補廣東僉事終雲南副使胡宗明字汝誠績溪人正德丁丑進士授户部主事進廣東叅議設竒俘馘劇盜叅政廣西平黎有功累陞副都御史廵撫遼東増築屯堡多倣古法潘潢字薦叔婺源人鄉薦第一正德辛巳進士知樂清縣入爲禮部郎進大學衍義勸御經筵改吏部署選事冢宰欲私二人潢不從督學閩中立輔仁紀業二册講明正學歴遷至户部尚書與嚴嵩忤以議論條例不合上疏自劾徒有用一緩二之心罔知隨時通變之術徙南工吏兵三部尚書卒諡簡肅程輅字邦載績溪人正德辛巳進士授行人陞兵科給事兼侍經筵上時務六事奏革詭冐武官二千七百餘員因劾武定侯郭勛忤㫖削籍後復官陳有容字仁甫休寧人嘉靖壬午舉人授歸德知州舊有額外金二千白上臺歸之公擒鄢賊高寵餘黨後知歸州有減抽分諸善政晉瑞州府同知汪仲成字汝玉績溪人嘉靖丙戌進士授大理評事有巨閹從子殺人賂諸問官求脱仲成力爭不署名竟抵法遷思恩知府時土官岑濬以叛誅其子岑金率黨攻城計縛之調柳州歲有船税千餘金成委備軍餉一無私焉鮑象賢字復之歙人嘉靖己丑進士授御史歴雲南副使累遷陜西廵撫移雲南集兵討流江賊那鑑平之總督兩廣連建靖冦功官終兵部左侍郎舒遷字于喬黟人嘉靖乙未進士授行人時都御史歐陽鐸議増山税遷力止之考選御史著居官慎己二銘議大禮多所建白按山西清理鹽課羨餘悉奏賑邊按廣東剪豪暴黜貪汚復厓山之祀所至有聲胡宗憲字汝貞績溪人嘉靖戊戌進士授益都令擢御史出按宣大定邊亂復按浙時東南苦倭冦華人汪直徐海等爲之主督撫以宗憲善用兵請當一面遂破倭於王江涇遷廵撫晉總督節制七省軍事專任治倭設竒計㩦其黨與賊首以次就擒東南寧息進大司馬加少保後以人言逮至京上曰加宗憲罪後來誰肯任事乃得釋繼又被劾下獄瘐死萬歴初追諡襄懋汪文式字時憑婺源人嘉靖癸卯鄉薦知華縣賊帥尚詔攻掠城邑一日假校尉帶數十騎過華文式偵知爲賊擒斬之事聞詔建偉績坊汪垍字仲成休寧人嘉靖甲辰進士授户部主事轉員外郎屬修㑹典十三司皆垍總裁陞福建僉事出死囚以禦倭㨗聞賜金綺擢叅議殷正茂字養實歙人嘉靖丁未進士爲兵科給事帝勤齋醮正茂與同官言黷祭非禮不肯進香予杖尋陞江西按察使廣東猺獞自𢎞治中作亂數征不克至是擢正茂右僉都御史爲廵撫往討平之陞兩廣總督時倭冦縱横正茂徙邊海謫戌之民於他處絶倭嚮導請寛減採珠銅蠟貢物以甦民困然後分布攻守盜以次盡平以功加兵部尚書晉