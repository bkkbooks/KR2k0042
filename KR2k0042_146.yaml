body:
  text: 江南通志卷一百四十七人物志宦績九徽州一府徽州府唐胡學婺源人咸通進士仕撫州司户上書忤田令孜竄福州尋授舒城令黃巢亂説李克用等協力𠞰之每臨陳為前鋒後加宣歙節度討擊使南唐查文徽休寧人仕南唐纍官樞密副使討建州王延政有功遷建州留後吳越兵據福州文徽攻克之入城撫其民陷伏中被執後遣還以工部尚書致仕弟文徴亦仕南唐宋魏羽字垂天婺源人初仕江南為判官歸宋擢太子中舍真宗時終禮部侍郎羽強力有吏幹好言事歷劇職十年始踰四十鬚鬢盡白張諤字昌言歙人能文有吏材南唐祕書丞通判鄂州歸宋歷西川轉運使先是中土不習舟楫諤置威棹軍分𨽻管勾始無覆溺之患子秉字孟節舉進士善詞翰歷官樞密直學士謝泌字宗源歙人太平興國五年進士端拱初遷殿中丞直史館時王禹稱請羣官謁宰相須朝罷同時接見以防請託泌謂不可疑大臣以私輔臣非接見賓客何以究知外事上嘉納之嘗薦王旦數人皆至卿相官至右諌議大夫判吏部銓年六十三端坐而逝洪湛字惟清休寧人雍熙進士直史館咸平間使荆湖條奏利病甚衆時議城綏州使湛相視陳七利二害凡五使西北采訪邊事甚明悉與王欽若同知貢舉為所誣纍貶儋州俞獻可字昌言歙人端拱初登第歷歸州軍事推官權領州事會李順反川陜官吏多棄城獻可料州兵屯沿江為柵以遏之晉御史建言天下所上瑞物不在圖牒者毋得以聞提點廣西刑獄平定蠻冦為立互市築塞以扼其險纍官龍圖閣待制查道字湛然休寧人文徽孫事母孝母病思鱖羮方冬道泣禱于河得鱖以愈母端拱初舉進士歷官知果州西充賊為患詔書招之不下道單騎趨賊所諭以詔意咸拜曰仁郡守也悉服會舉賢良方正拜左正言直史館天禧初求外任出知虢州時秋蝗災道不待報出官廩米賑之給民麥四千斛為種全活甚衆道所至務寬恕嘗按部從者摘路旁棗以獻道挂錢於樹而去從兄陶字大鈞官祕書少監判大理知審刑院賜金紫陶子拱之淳化進士歷官中書舍人有亷節俞獻卿字諌臣獻可弟登咸平進士歷昭州軍事推官會陳進亂獻卿盡發州所積緡錢平糴得榖數萬大兵至賴以饋軍纍遷三司鹽鐵判官上言天下榖帛寖耗仁宗為罷諸無名費以巨萬計後知杭州江潮溢鑿西山作堤數十里民便之以刑部侍郎致仕魏瓘字用之婺源人羽子為開封府參軍奏內侍以作燈山誅索擾民詔杖內侍歷提點廣西刑獄轉運使除雷化等州舟船計口之稅罷柳州無名之役尋知廣州倡築城及儂智高冦廣五旬不能下朝廷以為功纍遷吏部侍郎致仕胡遇績溪人登慶歷進士儂智高陷雍州孫沔余靖以謀略薦於朝除行營參謀從狄青大敗智高擢湖南江西安撫使王汝舟字公濟婺源人皇祐五年進士知南劍州捕盜官邀賞增益盜贓擬死者十三人汝舟閲牘得其狀皆免死以治行第一聞哲宗時擢河北轉運判官諌罷市珠之令徙夔州提點刑獄告歸先守南劍時祖母沒上言諸父無在者乞以適孫解官終三年喪詔從之著為令有雲溪文集許元字子春祁門人以蔭歷泰州軍事推官戍兵千人自海上亡歸州守不知所為元叱執倡首者三人餘悉勞遣遷知丹陽縣舊制盜決練湖水者罪死會大旱元請借湖水溉民田不待報決之守遣吏按問元曰便民罪令可也時京師粟少而江淮歲漕不給范仲淹薦為發運判官轉輸不匱上嘉之拜侍御史孫抗字叔和黟人登進士知潯州擢監察御史劾奏狄青不當沮敗永洛城事言日食陰盛當以後宫為戒又諌止大獵遷都官員外郎提點江西刑獄有言歲凶當稍貴常平粟價以利糴本者抗言此非常平本意詔從之官至工部郎中汪汲績溪人嘉祐進士授慈溪令濬河溉田數千頃民祀之擢太平推官解釋寃繫子奕襄皆登第有時名洪中孚字思誠休寧人湛孫元豐二年進士尉黃岡除鄰盜張韜主成都簿渡笮橋諭降雕門叛蠻崇寧初轉運熙河興鼓鑄𣙜酤市易之利以給邊立墩堡給鎧仗興耕屯以防剽掠青塘內附中孚出不意夜半抵其地撫慰之以察其情酋皆畏服知太原府夏人提重兵來議地界飭諸將掩擊遁去以龍圖閣待制致仕王愈字原道婺源人紹聖登第知信州睦冦犯信擊敗之為王黼所嫉坐竄逐高宗時吕頤浩首薦愈起知無為州軍程邁字進道黟人元符三年進士由仁和尉遷知西安縣部使者督諸郡水旱積欠邁曰衢州數年無水旱何積欠也守不能屈由是他邑皆免高宗時歷知福州溫州上稱其政光前絶後今之吏師又知平江鎮江時鄱陽歲飢多盜以邁知饒州奏蠲舟車征算增米價以招商賈不踰月米大至手條寬恤三十餘事民以寧息進顯謨閣直學士汪叔詹字致道歙人崇寧五年進士為太學博士以直言忤王黼斥歸久之權知蕪湖縣發運盧宗原議涸丹陽湖為田叔詹抗言爭之不得置印廳事走京師上書言湖不可涸狀帝悟從之擢提舉潼川常平時東川鹽井鹵竭民多虧課被囚奏蠲其逋且削煮鹽之籍南渡後以司農少卿總領湖廣六路財賦凡八年無闕事汪希旦字周佐歙人登大觀進士知泗州時劇賊宋江橫行及濠濠泗密邇希旦嚴守備賊不敢犯開廩賑飢蝗不入境麥生兩穗治最賜三品服歷知袁江舒三州以朝請大夫致仕胡舜陟字汝明績溪人大觀三年進士靖康中為侍御史奏誅趙良嗣力抗和議高宗立仍前職以彈宰相出知廬州時淮西冦盜充斥舜陟修城治戰具招降劉文舜擊走張遇孫琪戒諸郡無給叛將范瓊食而陰發兵剪其後瓊遂絶江走時淮西八州惟廬安堵已而知靜江府罷官復起經略廣西連破周聰陳旺諸冦經畫買馬諸政視常歲贏四倍運使吕源修怨讒於秦檜下獄死後事白贈少師子仔知晉陵縣嘗寓苕溪著漁隱叢話黃葆光字元暉黟人賜進士出身授齊州司理參軍閲獄囚一夕遣數百人通判以為疑視牘無不當者擢監察御史條奏三省樞密院吏猥多如奉入賞勞之類非元豐舊制者革之歲省費數萬蔡京怒其異已徙符寶郎復拜侍御史政和末歲旱葆光奏言蔡京僭擬跋扈大臣皆依違畏避以致天變京中以他事謫降後起知處州當方臘殘破之後盡心牧養卒州人祀之金安節字彥亨休寧人宣和六年進士歷遷侍御史秦檜兄梓知台州安節論其附梁師成罷之以是忤檜不出者十八年檜死起官歷侍講給事中封駁論奏獨立無黨張浚語人曰金給事真金石人也官至吏部尚書請歸時以為中興以來完名高節未見其比卒諡忠肅汪若海字東叟歙人遊太學以知兵召見請立康王為大元帥鎮撫河北高宗即位遷江南經制使上言天下如常山蛇秦蜀為首中原為脊東南為尾今以東南為首安能起天下之脊哉欲圖恢復必在川陜遂以張浚宣撫川陜繼論軍食忤執政謫英州道出臨川時江夏軍馬李允文跋扈若海馳諭之允文感悟惟其下曹成不順若海以計得軍印遂奪其衆歸因獻平冦䇿朝廷悉用之湖湘遂安纍遷直祕閣知江州時方經略中原議起若海而若海已卒汪勃字彥及黟人登紹興二年第調嚴州建德簿長於吏治不事鞭撲入臺為諌議大夫遷御史中丞與秦檜不合求領外祠六年復起知湖州民鐫木曰賢哲太守云程叔達字元誠黟人登紹興十三年第教授湖州袖書見時宰論五事除監察御史賑兩浙飢以勞被奬遷右正言諌和糴四弊慶元中特除華文閣直學士卒諡莊節朱安國字康侯休寧人紹興二十一年登第纍擢御史嘗論釋六年未決之囚知廣州劇盜陳青冦海道安國授牙校李寶方略縛青及其黨以歸威震一方進直徽猷閣安國善談兵著陰符元機子拂宰姚江築捍海堤五千丈李知己字智仲婺源人紹興進士判婺州軍士以給衣絹輕持杖喧譁守稱疾知己呼其首敕以軍法仍計絹直給之衆乃帖服遷大宗正丞兼權都官郎汪安行字伯壽績溪人學問精博登紹興進士知灃州時入奏請罷公使庫孝宗顧宰相王淮曰此朴直做家老子政事何如淮對曰舊攝灃州民思其德孝宗曰因民之思俾復守灃官至朝奉大夫程大昌字泰之休寧人紹興進士主吳縣簿孝宗即位遷著作佐郎時貴近或與密議大昌上言宜防石顯之姦帝以治道問大昌言當求賢納諌政事內修則大有為之業在其中提刑浙東徙漕江西復清江縣舊堰以捍江護田升祕書監歷官權吏部尚書出知泉州汀賊沈師作亂大昌趣統制裴師武不俟帥府符急進兵討之賊遂潰以龍圖閣學士致仕卒諡文簡大昌博學精思所著有禹貢圖論毛詩辨正演繁露考古編易原雍録北邊備對尚書譜及文集吳天驥字伯駿休寧人隆興進士調建昌司户能折疑難獄知信州歲飢首修荒政發廩賑糶日至萬六千人終户部員外郎朱晞顔字子淵休寧人登隆慶進士知靖州奏言襄漢通吳蜀宜移武昌大軍戍襄陽留水軍以控鄂沔改知吉州上言西蜀備邊不在南而在北宜移成都制置司於興元與荆鄂相應擢廣西運判講究鹽策革客鈔科抑之患知臨安府仁和縣地多為官舍軍營而稅額仍舊請以本府餘財代輸報可官終工部侍郎汪泳字伯遊休寧人乾道進士令蒲圻有聲纍遷大理丞臨安有獄不決者即繳送棘庭泳言於朝曰如此則天獄反為京府一院乞下臨安自後無得繳送從之歷知太湖處三州轉中奉大夫致仕程卓字從元休寧人淳熙十一年廷對首乙科嘉定中嘗使金察和議虛實歸奏敵人陵弱請固邦本修戎備以待復仇除軍器監請詔偏禆以上各條具方略知泉州請減上供銀數又請敕廣南通行會子以流通境內楮幣除福州帥嚴察吏蠧稅清訟息遷同知樞密院事一時政要多所規切卒諡正惠初休寧賦稅以卓請得蠲免鄉人祀之黃何字景蕭休寧人知興國大冶縣有三山産鐵盜鑄者數千人尉不能緝密聞之朝調官軍且至何止軍境上單騎諭之皆感服遁散悉焚其具一境晏然歷知處州嶽陽終朝議大夫吳格字之平休寧人淳熙進士提舉浙西常平茶鹽歲旱蝗令民雜藝不種之田以自食官不收苗主不收租遷帥紹興請免定科浮財物力等錢官終起居舍人朱權字聖與休寧人淳熙進士知惠州郡蝗權禱於神忽大雨水漲明日有鷹隼烏雀驅蝗赴水死廣東有冦權授將官方略擒其魁汪義和字謙之黟人淳熙進士知新建縣歲旱白帥府曰旱勢特甚已批放八分矣帥怒其專義和執愈堅帥從之守武岡崇學校增科舉以化溪洞武健之習官至侍御史兼侍講汪文振字子泉休寧人淳熙十一年進士歷司農少卿提點浙西刑獄時旱蝗民飢縣督逋監錮文振録囚至華亭釋四百餘人令俟秋償檄他縣如之民賴以活汪綱字仲舉黟人勃曽孫以任入官授桂陽軍平陽令平陽歲貢銀額萬餘兩綱以銀礦已竭力請蠲減會歲飢旁邑聚惡少入境為患綱定之歷知弋陽蘭溪太平諸縣俱有政績遷知高郵軍陳揚楚二州備邊屯守之要請修築興化海堰及石䃮函管以疏運河水勢知紹興府濬蕭山古運河創閘甃塗以通舟車發巨室埂岸通湖水資灌溉儲緡錢三萬專備修築自是湖田始復理宗即位召為寶謨閣待制奏免越經總虛額錢九萬五千緡後權户部侍郎致仕趙善璙字德純歙人以宗室登嘉定元年進士又中明法科通判廣德軍歲飢借倉司米斛錢數千緡為糴本平價濟民遷知江州亦如之上嘉其績召為尚書郎歷中奉大夫呂午字伯可歙人嘉定四年進士歷任兼沿海制置司時海冦未平午亷知調軍出海之弊議糧盡再給不許擅還賊舟所有悉以給軍海氛遂靖上親擢監察御史兼崇正殿説書與史嵩之忤力求去帝慰留乃復入臺益敢言無所忌所著有竹坡類藁吳發字伯韞歙人登第為臨川法曹掾嘗慮囚慶元狴犴充斥發或罪或釋應時決遣歡聲載道吳輔字友仁休寧人嘉定進士主管兩浙運司幕職人號為霹靂手後除御史兼崇政殿説書首列四疏上輒嘉納汪勳字鼎叔黟人嘉定登第調淳安尉邑遭水患亟命舟救溺賴全者無算授廣西檢法兼提幹北銀綱羡餘悉歸公帑改辰溪時帥以辰溪遠雜諸獠欲移之勳謂臣子之職不當趨易避難單車至邑諸獠帖服卒於官程元鳳字申甫歙人紹定元年進士歷宗學博士輪對稱旨理宗稱其有古遺直風除監察御史時臺官以論列鄭清之被出元鳳疏斥清之罪遂召還臺官元鳳所上章皆天下大計帝手書昭光清忠儒碩六大字賜之遷侍御史奏薦有德望才學政績者二十餘人纍遷參知政事拜右丞相未幾丁大全預政遂乞解機務度宗即位進少保致仕卒諡文清方嶽字巨山祁門人紹定甲科除淮東安撫司幹官高郵軍閧嶽以制命往戮首惡數人一城帖然制置使趙葵深倚之淳祐六年遷宗學博士時休寧程元鳳婺源吳遇與嶽皆受知范丞相鐘同遷博士有新安三博士之稱差知南康軍以忤京湖閫賈似道調知邵武未蒞任洞冦作馳榜諭之冦知嶽威名迎拜車下歷知饒袁寧國諸州終朝散大夫嶽自號秋崖有秋崖小稿及重修南北史汪應元字尹卿歙人進士調潭州司户參軍奉檄道經綏寧會猺洞嘯聚應元挺身召諭卒致降服知建平縣有死囚獄具送郡道逸未幾自造庭下曰公明理盡情寧歸死朝廷聞而異之纍升直祕閣呂沆字叔朝午子端平間銓試第一知於潛逸囚聞沆至自來歸罪判婺州賈似道議行公田又矯詔廢十七界會子行關子沆皆力言非便賈怒調將作監簿三學伏闕訟沆屈召赴行在不復出卒年八十一胡崇字宗叟登淳佑第授句容簿制置使吳潛辟為閫幕委行經界法於溧陽不履畝而民皆依限自實歷官太常寺丞上言公田之非忤時相出知台州台為賈似道鄉郡崇一切以公正行之程元嶽字遠甫歙人寶祐元年進士授武學博士率學館同僚三叩閽言事遂出國門有旨慰留纍遷工部侍郎嘗彈擊姦相宦寺無所畏避封歙縣開國男程鳴鳳字朝陽祁門人應武舉射䇿第一知德慶府將之官適部內山猺猖獗或止其行鳳正色曰此正臣子奮志之日也至則條置事宜出竒掩擊賊黨悉平知南雄州進無逸説有讀史發微三十卷許孔明字元熙祁門人入太學值理宗幸太乙宫伏闕上書諌遊幸并言賢否混淆丞相丁大全燮理失道上嘉納之寶祐四年登第仕終宣教郎元洪椿字子壽歙人至元中為仙居簿鄰近賊竊發煽邑民李念二為亂省遣萬户提重兵至脅官吏手狀誣闔邑皆賊將屠之椿曰盜止一鄉餘民何罪以死爭得免積官至承務郎明唐吉祥字彥貞歙人洪武庚辰進士令祁陽以一僕自隨及朝覲與僕䇿蹇出城弟自家來迎問之曰而兄行李止此矣歷葉南陽知縣皆有聲仕終工部主事葉保翁字宗茂休寧人至正壬辰蘄黃盜起保翁與汪同起兵禦冦明鄧愈克徽州得保翁授婺州守修城積糧招撫流亡終饒州知府程繩祖字叔武休寧人洪武中由御史左遷湖口令有惠政邑東黃麻潭田五百餘畝為蛟所陷民虛輸稅繩祖禱城隍神白日雷擊蛟斃胡永興字彥隆祁門人弱冠召入文淵閣纂修高廟實録登永樂戊戌進士知三河縣奏減民賦仁宗時擢趙府左長史高煦謀不軌密使通趙永興泣諌王感悔及高煦伏誅勸王獻護衛上表謝王從之言者乃息王俊德字大本黟人登進士任御史巡按浙東有大豪訟搆無辜數十人亷得其由置豪於法遷河南副使參理戎政升廣東布政王靜字永靜黟縣人由貢生授御史時值營造奉命巡工南北又往西域市馬陟雪山崑崙抵弱水遍歷七十二族升漢陽府有盜十二人上司審允待決靜亷得無辜者論脫五人吳寧字永清歙人宣德庚戌進士授兵部主事遷郎中為尚書鄺野所倚任野從征土木留寧掌部事升右侍郎佐于謙籌畫有功景泰初乞歸家居三十餘年卒楊寧字彥謐歙人宣德五年進士授刑部主事隨征麓川賊約降主將欲許之寧曰兵未加而降詐也弗聽敗績諸將獲罪獨寧擢郎中復從王驥討之有功超遷右侍郎後參贊雲南軍務練兵督耕邊夷大服閩廣盜起命寧撫江西據要設備盜至輒殱拜禮部尚書汪敬字益謙婺源人宣德癸丑進士詔使湖廣纂修宣廟實録事竣乞終母養起授户部主事以亷能稱景泰間徽州知府以該徴稅糧本色繁重疏乞折納輕賫事下户部敬力為贊成一郡德之程富字好禮歙人領鄉薦擢監察御史按江西歲荒妖賊煽亂富直搗其巢俘獲甚衆遷右僉都御史巡撫甘肅麓川不靖總督雲南有功升左副都御史程信字彥實休寧人正統壬戌進士授吏科給事中景泰初以天變上中興固本十事首請隆孝友以答天心升山東參政天順初歷僉都御史巡撫遼東成化改元四川山都掌蠻作亂進兵部尚書督師討平之裂其地立長官司凱旋進爵卒諡襄毅許士達字延佐歙人正統十年進士授御史景泰時數言事帝深納之巡按福建革除姦弊風裁凛然期滿當代耆老詣闕請留終貴州布政汪回顯字汝光祁門人正統戊辰進士授户部主事景泰初奉使見河南民飢奏發粟十餘萬石使蜀核鹽井之久湮者減其額新開者增之又奏除冗課十餘萬歷知廣惠二府莊歙字尚源歙人景泰辛未進士擢河南道御史考察賢否人服其明按浙江山東廣東福建奏免徴輸禁竊礦平賊冦止採珠按察雲南因其土俗以折獄訟政化大行終河南右布政洪寬字有約歙人以鄉薦授桂陽州時洞獠剽掠寬遷州治於古府舊基民賴以寧改知鄭州值創藩封濬漕河立會府夫役浩繁寬極言州狹民貧得免夫役之半歲大祲奏免稅二分復請發陳麥官粟兼濟之程泰字用元祁門人景泰甲戌進士授户部主事犒師陜西郤總帥餽進秩郎中用兵遼東遣泰治軍奉命視山東災還陳四事多見舉行擢廣西參政往定安南地界終河南布政康永韶字用和祁門人以舉人擢御史疏劾尚書馬昻不法爭慈懿太后山陵事有直聲尋謫知福清縣以知天文召還善筮法恐上溺術奏言臣但知易理耳仕至禮部侍郎汪貴字良貴歙人天順進士令嘉善核田稅省小民賠納之弊清介執法豪猾不利被誣去官民數千人攀號請留其衣作留衣亭邑人周宙等上書訟寃詔復職汪杲字廷輝休寧人天順進士授户部主事董輸物料於京師至江淮舟焚僚屬欲以私餘足其數杲以為欺罔弗許上章自劾遷曲靖軍民府守羅雄土官相讐殺杲單騎馳諭即解甲降饒欽字克恭祁門人天順庚辰進士授户部主事尋知澄江府所屬土官無子欲以女襲職厚賂欽欽不受奏以職官易之覲歸不仕有清名謝潤字德潤祁門人天順進士授刑部主事升浙江僉事屢折疑獄不可干以私汪奎字文燦婺源人成化丙戌進士除秀水知縣擢御史應星變陳言出判夔州討平雲陽劇賊遷知成都府歲飢多盜奎緩刑弛獄發廩賑之流移還集三遷布政使進右副都御史巡撫貴州致仕方思潤字廷膏歙人成化甲午鄉舉授桂陽知州振興學校調臨江通判盜不敢犯嘗奪宸濠湖田還諸民及歸宸濠使人伺舟次殺之由間道得免洪遠字克毅歙人成化戊戌進士令三縣皆有聲為御史敢言事遷浙江僉事歲大飢倣行富弼朱熹荒政民免流殍纍官都御史巡撫雲南明著威信蠻爭降服晉工部尚書卒諡恭靖葉鼐字致和祁門人以鄉薦知黃梅縣多惠政孀婦逋賦使傭織償所負有鬻牛輸稅者使立劵以候秋成寃獄積年不決未旬日悉理出之憂歸民泣送越境而後返王珦字克溫祁門人成化戊戌進士選庶吉士改給事中嘗劾番僧論宫閫直聲甚著會試充校士官內閣私屬其甥珦遂稱疾不就查兩廣軍餉藩臬有不法者行賂求免珦卒劾之還朝疏時政六事尋為廣西參議胡富字永年績溪人成化戊戌進士授大理寺評事遷福建僉事釋福寧疑獄二百餘人進廣東副使瀧水猺擾民富度猺所出沒處得荒田三千餘頃招獞人耕治猺畏獞遂不敢出黎人冦儋州率兵跨海討平之歷布政使進順天府尹逆瑾用事改大理卿豪奪民田賂瑾脅之富不從竟直之轉户部侍郎進尚書致仕卒諡康惠汪舜民字從仁婺源人奎子成化戊戌進士為御史出按甘肅忤權貴謫官𢎞治初擢江西僉事決獄如流淮揚大飢奉命脤濟活飢民百二十萬人復業者八千餘户歷官右副都御史舜民好學砥行持風節所著有靜軒行稿增校類編通鑑總目諸書黃華字實夫歙人成化辛丑進士任金溪平江二縣知縣升兵部主事奉敕大閲兩京山東浙江諸地得材官騎士數萬參議福建討平汀賊逆瑾擅權遂解組歸張敏字志學祁門人登成化辛丑進士知桐柏縣擢御史劾內宦怙寵肆橫巡江時按治京口渡夫中流橫索渡錢推溺行李之惡仕終四川參議曹祥字應麟成化甲辰進士由户曹出守寶慶興文教勸農業教民作水車以濟旱潦參政四川巡撫貴州皆著有偉績洪漢字朝宗歙人成化進士授行人纍遷户部郎督楚儲奏免逋課數萬升雲南參議提督銀場裁省中貴例供羡餘令礦官自赴司交課著為令胡光字文光績溪人成化甲辰進士授廣州推官劾中貴出鎮不法事謫驛丞轉灌縣令築江都堰除虎患升曲靖軍民府同知歸程材字良用歙人𢎞治丙辰進士司理汀州入為御史疏劾閹寺劉瑾馬永成谷大用等竊弄威柄瑾銜之托其細故罰米輸塞上又徙其家屬於海南瑾誅得釋張芝字廷育歙人𢎞治丙辰進士授大理評事極言閹瑾竊權督學廣西會猺獞反監軍討之賊匿深穴中以計殱之擢荆南副使吳遠字惟明歙人𢎞治丙辰進士為莆田知縣歲祲多盜遠課農桑固封守賑乏困凡學宫橋梁郵舍皆治不費於民纍遷黎平知府民雜猺獞喜弄兵遠教以禮讓彬彬向化程琯字德和歙人𢎞治丙辰進士除户部主事擲發隱沒官緡四千𣙜北新關稅清理屯田皆以亷稱遷泉州知府擢兩浙鹽運使戴銑字寶之婺源人𢎞治丙辰進士選庶吉士授給事中詔求讜言銑條時事為保治綱目上之正德初閹瑾用事銑上言宦官黨類宜加裁黜顧命大臣不宜聽引去逮杖除名世宗立贈光祿少卿戴敏字遜之婺源人𢎞治丙辰進士知辰州府時筸賊猖獗敏緋衣小隊馳賊營前驅呼曰太守來與汝語賊駭竄復呼曰太守來活汝非殺汝也賊稍稍出敏為陳利害賊羅拜乞降尋擢貴州左參政撫苗有功賜金幣吳漳字清甫歙人𢎞治己未進士令胙城擢御史以論逆瑾削籍瑾敗起官巡按北畿升山東副使河決黃陵岡漳殫力鳩工禱於神願以身塞河遂南徙復故道擢都御史汪標字立之祁門人𢎞治巳未進士知武定州蠲市稅民大悅升刑部郎中逆瑾用事幾不免出知鶴慶府未期年政通民和調大理瀕行民遮擁不得前尋升金齒兵備致仕章瑞字廷召績溪人𢎞治已未進士授行人擢御史武宗𥘉逆瑾竊柄瑞上言五事謫江西都事起知思南府時守備甘霖軍政久弛八寨賊時出剽掠霖欲屠十三村以冒升賞瑞切責將劾之懼而止唐澤字霈之歙人𢎞治已未進士知平鄉縣平鄉多水患澤興築堤防一百八十里遷刑部主事劉瑾擅權治獄者率阿旨殺人澤持法獨平纍升都御史巡撫甘肅自土魯番據哈密城疆場日多事久之冦數千穿塞盜邊病泄多死狼狽欲潰澤計羸冦殱之不足創艾令服使醫為診治有間遣譯命之曰若病今起矣詰朝以戎服相見冦頓顙泣謝歸上表誓終身不復反巳而悉還所侵地升户部右侍郎卒於涼州諡襄敏鄭晃字晦之祁門人領鄉舉任曹州學正流賊入境率諸生守禦城得全升長沙府判益勵清節逋賦者爭先輸納轉馬湖同知討平芒部叛蠻潘珍字玉卿婺源人𢎞治壬戌進士起諸暨令歷升山東僉事流冦攻兗東掠曲阜乃奏移縣並闕里城之備兵福建捕斬海南劇盜括刷海船之為姦利者歷升兵部侍郎安南請討莫登庸廷議遣將問罪珍抗疏言安南遠裔祗須遣使諭以禍福何必勞師遂以沮撓成命落職珍亷直有行誼大臣交章薦不果用程文字煥章婺源人登𢎞治乙丑進士歷大理寺正獄無冤滯擢按察僉事備兵廣南猺獞不敢內犯以與當道籌議邊事不合罷歸潘旦字希周珍族子𢎞治乙丑進士授户部主事典漕真州遷邵武知府裁抑巨璫假上供擾民纍升至兵部侍郎提督兩廣會征安南安南遣使求貢旦上疏宜從所請以綏遠人不必窮兵萬里適珍以言得罪嚴嵩遂絀旦議不用引疾去卒贈工部尚書李汛字彥夫祁門人𢎞治乙丑進士授工部主事歷正郎出知思恩府猺獞變作單騎宣諭就撫者三萬餘人邊境悉寧金約字用博休寧人正德丁卯鄉薦署唐縣教諭會流賊至身自乘城守禦賊矢中項拔其鏃益奮激固守賊知有備夜遁晉國子助教潘鑑字希古婺源人正德戊辰進士歷升福建僉事討蘇秉剪安南盜俱有功纍升右副都御史巡撫四川討平西蕃深溝諸蠻擢工部侍郎總督川貴湖廣諸省採木進兵部尚書提督兩廣軍務卒諡襄毅曹深字文淵歙人正德戊辰進士率同榜百餘人托劉瑾逆迹疏於朝罰跪午門五日終兵部主事江一桂字伯馨婺源人正德庚午鄉薦知建寧縣擢南京部曹出守太平郡接壤交趾時莫登庸僭逆上命毛伯溫征之伯溫計先遣使臣往諭一桂請往登庸遂稱臣上偉其績賜賚特厚升副使卒汪元錫字天啓婺源人正德辛未進士選給事中兵部論偏頭關功敘録太濫元錫疏斥本兵王瓊以下有罪無功不宜冒賞帝北幸昌平宣大南征宸濠元錫皆上疏力爭及世宗即位首陳先朝羣姦蠱惑基禍宜付法司定罪從之升太僕寺卿李福達之獄以直言被杖罷歸再召官至户部侍郎卒贈尚書黃文光字應奎休寧人正德癸酉鄉薦知冠縣清儉愛民部使者持倉庫吏責私簿典庫曰令尹無一錢私出入簿安得來使大驚異趙時勉字誠之歙人正德癸酉鄉薦謁選上時務二十事知武城縣歲飢民流請監司入疏蠲民租之半每歲省厨傳之費不下數千緡胡松字茂卿績溪人居家以孝友稱由正德甲戌進士為嘉興推官晉御史請究宸濠姦黨罷內官店裁東厰衙門薦謝遷韓文彭澤林俊羅玘諸人世宗朝論桂蕚起用王瓊事出知亷州歷升右副都御史上治河便漕疏尋晉工部尚書時伊庶人賄嚴嵩請拓府第大將軍仇鸞陰蓄異志請屯親兵輦轂下便宜給武庫軍仗松皆力陳不可及伊庶人仇鸞敗果如松言卒諭祭葬鄭佐字時夫歙人正德甲戌進士授南刑部主事改祠部疏議大禮極陳後殿災變之由遷福建僉事尋備兵饒州𠞰誅閩饒宿冦方紀達字行可歙人正德丁丑進士令南豐擢給諌時張璁桂蕚驟用事達抗章論列調廣西僉事卒僚屬合賵而後能殮汪思字德之婺源人正德丁丑進士選庶吉士授給事中嘉靖初首薦耆舊大臣石珤韓文彭澤等以輔新政極論太監崔文鮑忠芮賢之罪薦尚書林俊之忠力救諌臣劉最讜論重一時未幾元宰論翊戴功為外戚議封思奏寢之外補廣東僉事終雲南副使胡宗明字汝誠績溪人正德丁丑進士授户部主事進廣東參議設竒俘馘劇盜參政廣西平黎有功纍升副都御史巡撫遼東增築屯堡多倣古法潘潢字薦叔婺源人鄉薦第一正德辛巳進士知樂清縣入為禮部郎進大學衍義勸御經筵改吏部署選事冢宰欲私二人潢不從督學閩中立輔仁紀業二册講明正學歷遷至户部尚書與嚴嵩忤以議論條例不合上疏自劾徒有用一緩二之心罔知隨時通變之術徙南工吏兵三部尚書卒諡簡肅程輅字邦載績溪人正德辛巳進士授行人升兵科給事兼侍經筵上時務六事奏革詭冒武官二千七百餘員因劾武定侯郭勛忤旨削籍後復官陳有容字仁甫休寧人嘉靖壬午舉人授歸德知州舊有額外金二千白上臺歸之公擒鄢賊高寵餘黨後知歸州有減抽分諸善政晉瑞州府同知汪仲成字汝玉績溪人嘉靖丙戌進士授大理評事有巨閹從子殺人賂諸問官求脫仲成力爭不署名竟抵法遷思恩知府時土官岑濬以叛誅其子岑金率黨攻城計縛之調柳州歲有船稅千餘金成委備軍餉一無私焉鮑象賢字復之歙人嘉靖己丑進士授御史歷雲南副使纍遷陜西巡撫移雲南集兵討流江賊那鑑平之總督兩廣連建靖冦功官終兵部左侍郎舒遷字于喬黟人嘉靖乙未進士授行人時都御史歐陽鐸議增山稅遷力止之考選御史著居官慎己二銘議大禮多所建白按山西清理鹽課羡餘悉奏賑邊按廣東剪豪暴黜貪汚復崖山之祀所至有聲胡宗憲字汝貞績溪人嘉靖戊戌進士授益都令擢御史出按宣大定邊亂復按浙時東南苦倭冦華人汪直徐海等為之主督撫以宗憲善用兵請當一面遂破倭於王江涇遷巡撫晉總督節制七省軍事專任治倭設竒計㩦其黨與賊首以次就擒東南寧息進大司馬加少保後以人言逮至京上曰加宗憲罪後來誰肯任事乃得釋繼又被劾下獄瘐死萬歷初追諡襄懋汪文式字時憑婺源人嘉靖癸卯鄉薦知華縣賊帥尚詔攻掠城邑一日假校尉帶數十騎過華文式偵知為賊擒斬之事聞詔建偉績坊汪垍字仲成休寧人嘉靖甲辰進士授户部主事轉員外郎屬修會典十三司皆垍總裁升福建僉事出死囚以禦倭捷聞賜金綺擢參議殷正茂字養實歙人嘉靖丁未進士為兵科給事帝勤齋醮正茂與同官言黷祭非禮不肯進香豫杖尋升江西按察使廣東猺獞自𢎞治中作亂數征不克至是擢正茂右僉都御史為巡撫往討平之升兩廣總督時倭冦縱橫正茂徙邊海謫戌之民於他處絶倭嚮導請寬減採珠銅蠟貢物以蘇民困然後分布攻守盜以次盡平以功加兵部尚書晉户部致仕汪道昆字伯玉歙人嘉靖丁未進士知義烏縣歷福建兵備副使有悍卒擁脅巡撫巡撫莫能支道昆遽馳入軍門戮首事以徇一軍寂然倭陷興化全閩大震道昆走浙請督撫胡宗憲檄戚繼光將兵往道昆主畫䇿繼光主轉戰賊次第削平纍升都御史歷撫福建鄖陽湖廣神宗立召為兵部侍郎出閲薊遼邊備乞終養歸詩文與李攀龍王世貞狎主齊盟所著有太函集方𢎞靜字定之歙人嘉靖庚戌進士任東平州視學粵西尋轉江藩使者治嚴嵩父子獄有所波連𢎞靜訟言白之既持節入浙時方苛剔濫費𢎞靜疏言去冗不如增備增備不能惜費因大修艨艟會諸將急擊冦覆其水寨論功當超敘中蜚語歸卒贈工部尚書程金字德良歙人嘉靖癸丑進士授南工部主事秋毫不染分司龍江關要人援權相勢撓關法金箠其船工徇於市遷部郎出守漢陽發楚藩外屬姦贓張居正治第托漢陽守市木金雅不直居正居正奪情遂投劾歸方良曙字子賓歙人嘉靖癸丑進士授工部主事𣙜木荆州關吏請兼算舟充額曙不許額既足乃罷兩月告緡恤刑畿輔釋三寃獄嘗倣長垣故事治河河不為災後轄雲南濬昆明池溉田又築晉寧州城終應天府尹江一麟字仲文婺源人嘉靖癸丑進士知吉安州擢工部郎時言官吳時來等劾嚴嵩下獄一麟力救得免轉廣平知府歲旱步禱三日雨集蝗死廣冦蜂起擢監軍副使督軍力戰馘其渠時倭冦海豐島賊陷電白皆次第削平擢撫貴州有苗酋葉楷纍世負固麟設竒用間搗其巢建縣治之晉都御史兼户部侍郎總督漕務病卒諭葬祭程道東字震伯歙人嘉靖己未進士授工部主事奉詔營景藩宫室還治河有績通判青州遷知深州復以治海擢户部郎中出為雲南知府告歸凌琯字惟和歙人嘉靖壬戌進士司理南安追殺巢賊擒其渠魁擢御史政府欲釋都御史路楷琯以其黨姦殺沈錬力持不可著直聲終陜西按察使許國字維貞歙人嘉靖乙丑進士選庶吉士授檢討奉使朝鮮饋遺一無所受萬歷改元升右贊善充日講官每進講託事獻規帝悚意聽之纍官至文淵閣大學士卒諡文穆國為人木強遇事輒發數與言者為難然亷慎自守人故不能汙初在館局為張居正所器居正父病朝士醵禱國獨不往尋以奪情留任國詣其第密勸行服其在樞輔值帝倦勤纍疏請建儲帝不悅遂五疏乞休遊應乾字順之婺源人嘉靖乙丑進士歷部郎出守寧波濬陂塘通水利時郡邑承張居正指毁書院惟寧波獨存纍升雲南按察使平巨冦丁改轉廣東右布政島冦大至率勵吏士乘城拒守擢大理丞昭雪寃滯謂其屬曰廷平所以平天下之不平也如止押司冦紙尾焉用平為纍遷總督倉場先後條上四十餘事皆著為令許天贈字德夫黟人嘉靖乙丑進士知海寧躬親履畝丈田清稅擢户部主事𣙜北關以亷惠稱守建寧疏古渠創建寧二衛遷兩浙長蘆鹺使轉山東參政著有北關考兩浙長蘆事宜余一龍字汝化婺源人嘉靖乙丑進士知江山縣擢御史疏請東宫出學乞宥諌臣鄭履淳嚴絶餽遺或餉以酒碎其甕有擊甕侍御之號補湖廣僉事治兵沔陽平桐柏湖冦擢貴州副使撫叛苗四十四寨籍為編户繼而苗復為寇一龍念其狃於招撫出不意除夕往殱之特賜奬勞後以南太僕卿謝病歸汪文輝字德充婺源人嘉靖乙丑進士官御史會首相高拱以內閣掌吏部其門生輩居言路專務搏擊文輝亦拱門生心獨非之疏陳四事忤拱出為寧夏僉事監互市單騎諭敵咸感服無所擾進尚寶司卿張居正用事移疾歸楊旦字明甫休寧人嘉靖舉人知奉化縣築天寧長沙二堤民利之通判杭州革織例金三千緡轉青州疏河運三月成功致仕歸余懋學字行之婺源人隆慶戊辰進士為司理剖決若神擢南給事中論劾張居正又陳五事居正疑有所指矯旨削籍居正死召還歷官户部侍郎歸杜門著書嘗曰學患不真與其為偽中行不若為真狂狷卒諡恭穆羅應鶴字德鳴歙人隆慶辛未進士知景陵黃岡二縣召為御史按東粵適有蛋户之役應鶴説督撫曰耦而俱者蛋與民也願生俘之毋馘督撫納其言先後釋纍俘數千人督學三輔纍遷太僕卿升保定巡撫方揚字思善歙人隆慶辛未進士歷遷南户部郎有怙權相勢者私據公田託言為社田以給貧乏乞揚作記不應遂以事誣之謫秀州遷守杭州乞歸胡宥字子仁休寧人隆慶辛未進士令長垣平獄訟省租庸繕城修學政聲籍甚擢南御史江陵柄國御史傅貞言事編戍特疏請釋之巡按廣西攝廣東鹽法佐軍興用兵八寨紀功賜金幣御宴七次蓋異數云江東之字長信歙人萬歷甲戌進士由行人擢御史首發馮保徐爵姦劾僉都御史王宗載與于應昌共陷御史劉臺以媚張居正乞從先朝楊路等謀殺沈錬例抵罪命勘邊臣周詠等掩敗為功狀得實直聲大震遷太僕卿時張馮黨復搆陷張嶽沈思孝吳中行趙用賢鄒元標諸臣東之發憤上疏請先自罷復以山陵事與執政忤貶知霍州纍遷大理少卿尋以右僉都御史撫貴州被劾免官余啓元字伯貞婺源人萬歷甲戌進士知臨城縣會有履畝丈量之令啓元以無故擾民置不報忤江陵相意改霸州學正歷升部郎監豫章漕兑罷虛耗四十萬石尋督易州糧儲纍升大理寺卿致仕汪應蛟字潛夫婺源人究心性命深入閫奧萬歷甲戌進士除南兵部主事督學四川備兵易州劾礦使貪恣不報移治天津升巡撫又移保定在天津時開葛沽白塘棄地為水田歲得榖以充餉及至保定上疏請廣興水利可得田數萬頃帝許而不能行晉工部侍郎光宗立改大司農疏愛民十八條阿保客氏求墓地踰制應蛟執不與尋告歸時毁書院禁講學乃作默識解示門人所著有理學經濟二編程子鰲字坤輿歙人萬歷丁丑進士令蘭溪吏以解羡上子鰲斥之不畏強禦雅意作人參藩廣西地多猺獞鰲一意拊循無梗化者終江西按察使張應揚字以言休寧人萬歷癸未進士知蘭溪縣禁溺女置社倉擢御史出按雲南順寧代候二冦搆兵應揚籌畫敉寧之復按福建出寃繫者甚衆程朝京字元直休寧人萬歷癸未進士令鄱陽邑多積逋朝京立周知實徴二册課遂如額陶丁藍芳威為亂討平之又力言芳威於上官貸死戌邊卒為名將纍升永平知府因灣水運天津糧至闞家口省挽輸數倍晉福建副使潘士藻字去華婺源人萬歷癸未進士授溫州推官擢御史忤東厰張鯨會火災疏請修身親賢語甚切摰鯨乃激上怒謫廣東布政司照磨謝表曰積忱未至自反殊慙東西南北莫逃天覆地載之間進退行藏皆為進德修業之地後量移南吏部主事升尚寶少卿邵庶字明仲休寧人萬歷癸未進士選庶吉士改兵科給事中疏請清驛遞汰運總冗員革錦衣冒濫裁戚畹越請升工科都給事再補禮科請臨御躬祀及行召對開儲講升太常少卿方元彥字士美歙人萬歷丙戌進士知金華縣擢御史按甘肅嘗陳備邊五議按閩釋寃發姦郤紅毛番市鎮安海堡城又建言星變地震宜撤璫使以答天譴卒於官吳中明字知常歙人萬歷丙戌進士任瑞汀兩府推官升主事歷吏部郎中疏列礦奄陳奉暴橫狀提學河南分守汝寧汝寧王縱僕殺人中明以僕抵法備兵薊門葺邊墻開耕屯治績尤著升陜西布政廣西巡撫南户部侍郎卒金繼震字長卿休寧人萬歷丙戌進士知義烏縣公署火恐獄囚盡斃縱之歸約令自來無後者纍升刑部郎中恤刑山東遼東釋寃繫四百餘人報命課第一洪文衡字平仲歙人萬歷己丑進士歷任南北部曹疏請建儲居工部力杜中貴橫索節冗費甚多晉光祿少卿上八事上為寢景醮之命升太常卿議請祧睿宗時以為當卒贈侍郎文衡性孝居喪斷酒肉不處內三年黃全初字性甫歙人萬歷己丑進士知崇德縣歲荒請蠲逋賦當事不可遂引疾歸起南國子博士遷南户部主事軍餼多冒支悉釐其弊歲省萬四千緡晉郎中汪先岸字登于休寧人萬歷己丑進士知光山縣擢御史上疏請正國本首輔依違其議遂疏劾之巡視漕河建開泇河議河成歲省金錢無算仕至太僕卿魏閹用事削籍家居創立還古書院汪以時字太易婺源人萬歷己丑進士為縣治最授御史督理河東礦使張忠奏開採南池徴收鹽課以時抗阻之為所誣奏幾不免轉按山西亷治稅棍出寃獄八百餘人建城堡於青龍驛轉南太僕卿葉伯鳴字雲羽休寧人任沂州同知潔已恤民塞礦穴疏鹽禁署單父平馬政出大辟三人邑以白蓮教被纍者盡釋之改涿州涿地衝民疲伯鳴以休息為理擢藩司理問金忠士字元卿休寧人萬歷壬辰進士令樂平以卓異考選御史按貴州勘定水西討平洛苗按浙江賑潦飢戢兵伍按河南𠞰巨冦歷遷至僉都御史巡撫延綏晉少司馬方時化字伯雨歙人萬歷甲午鄉薦知朝城縣時白蓮賊逼擾時化偵知邑中巨猾王甲周乙召為約正捐其宿負以甘言撫之二人願盡力遂以計縛賊主閻氏等斬之終敘州府同知鮑應鰲字山甫歙人萬歷乙未進士授户部主事𣙜崇文稅管太倉庫秋毫無染補祠祭司郎中孝靖皇太后薨詔依世宗沈貴妃例鰲以沈貴妃例簡略乃考穆宗母孝恪皇太后時為康妃薨儀注增十三條疏上即允行之鰲在儀司凡議諡恤守正不阿尋升尚寶卿晉太僕卒畢懋良字師臯歙人萬歷乙未進士除萬載令升禮部郎督學浙江轉福建督糧道括諸項羡銀及贖鍰積榖數萬石後紅夷冦海上糧艘不通發所貯榖民藉全活尋晉方伯減加𣲖撫降海冦纍升户部侍郎總督倉場議以本色折色相間給發每年可積米八千餘石會以不附魏璫斥罷時與族弟懋康並有清譽稱二畢懋康亦為璫削籍相繼去士論以為榮崇禎初起工部侍郎洪世俊字用章歙人萬歷乙未進士除禮部主事時諸王婚期踰制講學禮廢福藩久不之國力爭十餘疏出參漳南會紅夷入冦預堡圭嶼儲火藥禦之冦不為害轉山東左布政平白蓮賊升太常寺卿汪元功字元倩歙人萬歷乙未進士除光化知縣遷吉安府補順德備兵雲中力行節省以完兩年貢市額素囊部落不靖元功單車馳諭官至湖西觀察吳宗堯字仁叔歙人萬歷乙未進士知益都縣性強項中官陳增以開礦肆虐宗堯盡發其不法事列狀上聞請以一身易萬民命帝心動令增約束其下增劾宗堯阻撓礦務遂被逮民數萬遮道衛送哭聲震地下獄經年釋為民謝存仁字生甫祁門人萬歷乙未進士授户部主事𣙜關監兑有清望督儲遼陽升參政歷雲南布政升巡撫簡兵核餉請告歸胡思伸績溪人萬歷乙未進士知上虞縣築夏蓋白馬上妃三湖灌田又築梁湖石閘民享其利進兵部郎升副使備兵懷隆建城堡修邊垣開沃田節虛冒銀兩遷保定巡撫治績尤偉畿南賴之以安畢懋康字孟侯歙人萬歷戊戌進士授中書選御史出巡長蘆盡釐鹺弊請修復河渠諸閘按陜西山東皆值飢歉講求賑法無出懋康右撫鄖陽以忤璫編名黨人尋起南通政仕至南户部侍郎吳國仕字秀升歙人萬歷甲辰進士授刑部主事守嘉興均調賦役定官解之法築海塘及漕堤建石梁於王江涇治行推第一備兵辰沅參政川東擒奢酋將樊龍以復渝城繼搗藺賊破之數轉至福建左布政有平海冦功遷南太常卿晉户部侍郎汪有功字祖倩歙人萬歷甲辰進士知蒲圻縣擢南御史所上疏如勸青宫講學劾巨璫亂閩及藩臣不當僭祭孝陵與張差肆逆當窮治其姦皆中時弊官至尚寶丞汪輝字柱河休寧人萬歷甲辰進士由庶吉士歷吏部侍郎徑節不阿魏璫建祠欲屬輝記輝絶不與通璫銜之矯旨削籍崇禎初復職余懋孳字舜仲婺源人萬歷甲辰進士知山陰縣擢給事中歷疏請發留中章奏舉枚卜釋繫囚停稅使賑東方飢民黜西洋天主教又言帝久不御朝中外扞格堂陛闊絶前後章數十上俱切中時弊倪思輝字實符祁門人萬歷丁未進士天啓間官給事中劾保姆客氏謫閩幕後起兵科給事歷通政使忤魏璫削籍崇禎初起刑部左侍郎南户部尚書逾年告歸舒榮都字曰俞黟人萬歷丁未進士授中書任御史上三字疏曰虛公嚴其餘言邊務則劾督撫周永春等言門户則劾通政賈繼春等皆甚剴切巡按湖廣時貴竹土司叛榮都代為畫䇿𠞰平之天啓間欲與楊左連名劾魏閹會外艱不果後憂憤卒追贈太常卿江秉謙字兆豫歙人萬歷庚戌進士知鄞縣擢御史抗疏言封疆事請置本兵張鶴鳴於法訟經略熊廷弼功內操事興秉謙連疏糾之諸姦切齒遂削籍程䇿字獻可休寧人萬歷庚戌進士授西安推官清介自勵轉南禮部主事時拜魏璫祠者如騖䇿獨不往守德安有七府姦民同日謀不軌䇿密緝捕渠魁餘不問反側以安晉鄖襄參政流冦深入設伏大敗之汪泗論字自魯休寧人萬歷庚戌進士授漳浦知縣擢御史疏杜內批以防微漸出按江西力持大體晉太僕卿趙時用字德友休寧人萬歷癸丑進士知南安調閩縣擢給事中抗言恩蔭不宜濫敘閣臣票擬讓權中官事多內批徑出宜防其漸忤崔魏矯旨削奪後起南鴻臚卿汪康謡字衢父休寧人萬歷癸丑進士知諸暨縣升户部主事出守漳州有販海遭颶風者七十四人前吏誣為海冦康謡亷實釋之蘇撫周起元以忤璫坐贓數萬下漳州籍之康謡閣不行遂削奪後復官擢福寧兵備道汪應元字長孺歙人萬歷丙辰進士授太常博士魏璫用事以奉差歸崇禎初召為御史出按廣西歲大旱甘澍隨車罷牛稅罷𣙜木多所釐革汪元標字承景歙人萬歷丙辰進士由潭陽知縣晉吏部主事歷掌四司值權璫用事罷官歸旋起備兵海上擒大盜蕭潮等千餘人閩以安堵晉福寧道許啓敏字元建歙人萬歷戊午舉人任登州府推官有負官物抵法繫獄至數百人啓敏至多所平反白院道出之其不可宥者令煎鹽貸死晉兵部主事黃願素字若鏡歙人萬歷己未進士為撫州推官擢吏部主事疏汰假官百八十員鋟銓曹事宜存之部中他如禁飛布山燒鑿以護地脈設界嶺防守以清盜冦鄉人賴之黃正賓歙人由資入官為舍人思樹竒節萬歷中以緩册東宫抗疏劾首輔申時行下獄斥為民遂有聲士大夫間熹宗立起故官再遷尚寶少卿致仕崇禎初閹黨徐大化楊維垣已罷官猶潛居輦下正賓疏發其姦都人快之吳彥芳字延祖歙人天啓乙丑進士知莆田擢御史甫九月疏十一上登州用兵請撤監視諸中官最後以排擊邪媚攖上怒下獄尋釋歸方士亮歙人崇禎辛未進士歷嘉興福州推官擢兵科給事中疏陳時弊論劾謝升徐世蔭馬爌等薦方嶽貢陳洪謐等陳新甲主欵議士亮首發其罪復論中官出鎮之弊乞撤回語極明切周延儒出督師無功獲譴以士亮贊畫軍務削籍歸國朝張光祁字雲仲歙人舉順治丁亥進士知鄧州督戰艦征湖南區畫有方盜壘於下莊祁單車諭之皆就撫升禮部員外郎會河決不忍去治之巡督七書夜不入署以勞瘁卒吳正治字當世休寧人漢陽籍順治己丑進士選庶吉士授編修以侍講出補江西參政轉陜西按察使所至以清亷執法著內擢工部右侍郎轉刑部諸所條議如赦令宜急行丈量宜停止禁狀外指扳嚴婦女私嫁免逃人十家連坐及收旗丁月錢皆著為令晉禮部尚書拜武英殿大學士守成法持大體以病致仕趙吉士字天羽休寧人順治辛卯舉人知交城縣交城北阻深山自明季為盜窟吏不敢詰值山中飢吉士以勸農閲荒為名率數騎入山中留宿土窑左右皆懼吉士意氣自如既熟知其山川險易居民順逆一日與同官飲却月湖笙歌迭奏賊聞之不為備忽夜半斂兵疾行由間道搗賊巢擒一百一人撫定山民一千四百餘户其不從賊者給羊酒旌之敘功升户部主事𣙜揚州關擢户科給事所著有續表忠記徽州府志萬青閣集洪琮字瑞玉歙人順治壬辰進士除韶州推官時東粵新附郡縣供辦軍需琮條上幫貼夫船議吏民得蘇息縛妖民郭天鵬擒虔賊王秀皆不煩兵歷員外郎中督學陜西子景行平陽知縣清漏租除規費禁絶賃妻火葬諸惡習汪宗洙字魯源婺源人以歲貢任內邱知縣於時西山劇盜嘯聚民多流亡宗洙招徠懷集案牘不煩郡司理臨邑閲獄囚繫止有上臺委決者二人余維樞字中台婺源人以鄉副榜知永年縣葺學宫立義熟築河堤造布衣張蓋廬訪以政事補臨縣政聲益著升督捕主事卒維樞學有原本著從祀諸儒繫議泮宫禮樂合集令洺録及文集吳聖楫字右舟歙人順治甲午選貢知文縣壤接西域番民雜處楫控御有方力懲姦民冒充旗丁蜀軍竊販馬匹之弊許書字元文歙人順治乙未進士知淶水縣旗民畏愛內擢之日挽留者遮道後由禮部郎出知南康卓有政績洪明鍾字萬貞歙人順治十五年以舉人知海澄縣時澄帥縱士卒索餉而譁明鍾曰餉非緩也吾將按籍而給如虛卒倒馬則奈何帥為稍戢以軍興積勞卒邑人懷之程文彞字銘仲休寧人康熙甲辰進士由翰林改刑部主事舊例民娶旗女當離異文彞議償身價著為令擢監察御史多所建白如升遵化縣陵邑為州定地壇配位尚右清驛馬貽纍廣旌節孝革除里役禁軍需私𣲖及佐二武辨用嚴刑皆見施行纍遷大理少卿仕終工部右侍郎汪錞字鐘如休寧人以江夏籍中康熙庚戌進士纍官驗封司郎中每大廷集議敘資紛紜錞口授指揮羣吏咸服冡宰特薦掌選丁憂服闋借補稽勳以病歸子漋汪晉徴字符尹休寧人康熙己未進士由翰林改給事中有修先賢書院增張載世襲停藩臬卓異寬兩廣限憑諸疏丁卯主試湖廣遷順天府丞纍官户部侍郎居官持重精敏居鄉講學紫陽還古書院所著有宋元明正學録雙溪草堂集吳苑字楞香歙人康熙壬戌進士選庶吉士授檢討歷中允侍講遷祭酒奏請諸教習官學者歲滿補縣令勿補州倅以通沉滯塞幸門又嚴試補教習之法又令八旗子弟在官學者一體考校鄉會試量增其額以示鼓勵省親告歸所著有北黟集張瑗字松巖祁門人康熙辛未會試第一授翰林編修主試四川改御史明閹魏忠賢墓在西山侈甚上疏請毁之報可朝野以為快提督河南學政瑗賦性淡泊素履端詳居官以亷謹稱江南通志卷一百四十七欽定四庫全書
