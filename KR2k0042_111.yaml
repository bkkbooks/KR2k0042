body:
  text: 欽定四庫全書江南通志卷一百十二職官志名宦自邦之司憲至於一命以上有功德於民者皆得祠於頖宫長吏春秋有事焉國家昭美報勸來者甚盛典也然昔之稱循吏曰所去見思又曰悃愊無華豈非治實不治名故令名益無窮歟江南藩翰之首簿領殷繁幸際盛隆之運咸和兆民聖聖纘承軫念三吳詳求理化有虞咨十二牧成周董正治官兼而備之然則仰奉德音以實心為實政之本抑亦借前事為後事之師歟夫鄉有奉嘗陂名愛敬祥生白鹿之轓香播桃花之米治行風操炳煥千載若兹異等固不乏人其有釐舉興革鑿鑿可見施行者並詳著於篇有所考鏡焉統部周孫叔敖事楚莊王稱賢相嘗起芍陂在今壽州安豐縣東徑百里灌田數萬頃後漢書循吏王景傳註黄歇楚考烈王元年以歇為相封春申君賜淮北地後請封江東因城故吳墟居之相楚八年楚復強史記本傳漢董仲舒廣川人元光元年舉賢良對策以為江都相王素驕好勇仲舒以禮誼匡正王敬重焉治國以春秋災異之變推陰陽所以錯行故求雨閉諸陽縱諸陰其止雨反是行之一國未嘗不得所欲漢書本傳魏相字弱翁定陶人昭帝時揚州刺史考案守相多所貶退丙吉與書曰朝廷知弱翁治行方大用願愼事自重藏器於身相善其言為霽威嚴居部二嵗徵為諫大夫漢書本傳黃霸字次公陽夏人宣帝時為揚州刺史三歲以賢良高第詔為潁州太守居官賜車葢特高一丈别駕主簿車緹油屏泥於軾前以章有德漢書循吏傳何武字君公郫縣人宣帝時為揚州刺史二千石有罪應時舉奏其餘賢與不肖敬之如一是以郡國各重其守相州中清平行部必先即學宫見諸生試其誦論問以得失然後入傳舍出記問墾田頃畝五穀美惡已廼見二千石以為常漢書本傳鮑永字君長屯留人光武初為揚州牧時多寇暴永以傷痍之後誅其強横鎮撫其餘百姓安之後漢書本傳歐陽歙字正思千乘人建武中為揚州牧李憲餘黨淳于臨等聚衆數千殺安豐令歙討平之後漢書儒林傳張禹字伯達襄國人建初中為揚州刺史行部理察枉訟郡邑深幽之處無不畢到多所明舉後漢書本傳滕撫字叔輔北海人順帝末劇賊范容徐鳳等為江淮巨患撫除九江都尉擊破斬之拜中郎將督揚徐二州事又乘勝斬歴陽賊華孟於是東南悉平後漢書本傳馮緄字鴻卿巴郡人少學春秋司馬兵法順帝末持節督揚州諸郡軍事與中郎將滕撫討破羣賊後漢書本傳楊秉字叔節華陰人太尉震中子為徐州刺史計日受俸以廉潔稱後漢書楊震傳百里嵩字景山封邱人為徐州刺史境内旱嵩行部所至甘雨隨注後漢記嚴遵揚州刺史行部聞道旁女子哭聲不哀繫問果以淫殺夫者按正其罪後漢記三國魏劉馥字元潁相人建安中為揚州刺史單馬造合肥空城建立州治數年中恩化大行立學校廣屯田興諸陂堨以溉稻田官民有畜又高城壘積木石編草苫為戰守備魏志本傳吕䖍字子恪任城人文帝時為徐州刺史辟王祥為别駕民事一以委之世多其能任賢討利城叛賊斬獲有功魏志木傳滿寵字伯寧昌邑人魏明帝時督揚州諸軍事時孫權頻歲攻合肥寵請移城西三十里依險立城以守誘寇入平地而掎其歸路遂連敗權兵又權遣兵佃江北寵伺其收穫時擊破諸屯盡焚穀物詔美之魏志本傳孫禮字叔達涿郡人魏嘉平中為揚州刺史吳兵侵境禮勒兵禦之芍陂自旦及暮將士死傷過半禮手秉枹鼓奮不顧身敵人始退詔書慰勞賜絹七百匹禮盡付亡者家無以入身魏志本傳晉王渾字元冲太原人武帝初為徐州刺史嵗凶民飢渾開倉賑贍百姓賴之歴都督揚州諸軍事鎮壽春陳兵東疆察攻取之勢及大舉伐吳渾率師出横江以平吳功進爵為公復鎮壽春時吳人新附渾撫循綏納人情悦服晉書本傳胡威壽春人武帝時歴徐州刺史勤於政術風化大行晉書良吏傳郄鑒字道徽金鄉人明帝時拜兖州刺史都督揚州江西諸軍鎮合肥謀滅王敦遷都督徐兖青三州事兖州刺史鎮廣陵蘇峻反進都督揚州八郡軍事率衆渡江與陶侃㑹築大業曲阿庱亭三壘以拒賊斬蘇逸降男女萬餘口又海寇抄東南諸縣鑒城京口復率衆平諸寇晉書本傳庾亮字元規鄢陵人成帝時督豫州揚州諸軍事豫州刺史鎮蕪湖將軍郭黙據湓口叛亮同太尉陶侃合軍討破之不受爵賞晉書本傳蔡謨字道明考城人成帝時都督諸軍事領徐州刺史聞石虎於青州造船掠緣海諸縣謨遣將守中洲拒之時謨所統七千餘人置戍東至土山西至江乘城壘相望隨宜防備甚有算略晉書本傳卞壼字望之寃句人蘇峻至東陵口詔以壼都督大桁諸軍時發背創猶未合力疾轉戰死之二子眕盱相隨赴賊同時見害晉書本傳謝安字安石陽夏人太元中以太保出鎮廣陵築新城又築埭於城北後人追思之名曰召伯埭晉書本傳謝元字幼度安兄子孝武時苻堅屢寇邊境朝命擇良將可禦北方者安舉元應詔拜兖州刺史監江北諸軍事鎮廣陵進擊屢破之加領徐州刺史及堅兵次項城衆號百萬元為前鋒都督以精鋭八千大敗之於淝水南尋進駐彭城晉書本傳南北朝宋王懿字仲德太原人三臨徐州威德著於彭城宋書本傳劉義欣彭城人宋長沙王道憐子元嘉中監豫司雍并四州諸軍豫州刺史鎮壽陽于時土荒民散城頽盗熾義欣綱維補葺隨時經理境内畏服道不拾遺城府庫藏並皆充實遂為盛藩又修芍陂通渒水旱患猶是得除宋書長沙景王道憐傳沈慶之字𢎞先武康人宋孝武初督南兖豫徐兖四州諸軍事鎮軍將軍南兖州刺史鎮盱眙還鎮廣陵討魯爽有功後又討平竟陵王誕宋書本傳宗慤字元幹南陽人宋孝建中歴豫州刺史監五州諸軍事竟陵王誕據廣陵反慤表求赴討遂引軍平之宋書本傳吉翰字休文池陽人也監徐兖二州豫州之梁郡諸軍事徐州刺史其下畏服莫敢犯禁宋書本傳檀道濟金鄉人宋高祖時監南徐兖之江北淮南諸郡軍事鎮北將軍南兖州刺史救東陽未至虜走還鎮廣陵後又增督青州徐州之淮陽下邳琅邪東莞諸軍事討謝晦晦不戰自潰宋書本傳梁蕭秀字彥達梁武帝弟都督南徐兖二州諸軍事南徐州刺史京口累被兵革人戸流散秀招懷撫納惠愛大行嵗饑以私財瞻百姓所濟甚衆梁書太祖五王傳蕭景字子昭梁宗室天監中以安右將軍監揚州稱眀斷符教嚴整有田舍老姥嘗訴得符還縣吏未即發姥語曰蕭監州符火煆汝手何敢留之其為人畏服如此梁書本傳韋叡字懷文京兆人梁武帝時豫州刺史領歴陽太守魏來宼擊走之天監四年都督諸軍進討平合肥遷豫州於合肥後又大破魏軍於鍾離梁書本傳馮道根字巨基酇人梁天監八年督豫州諸軍豫州刺史布政清簡十六年復前任豫部人皆喜悦武帝每稱曰道根所在能使朝廷不復憶有一州梁書本傳裴邃字深明聞喜人梁豫州刺史加都督鎮合肥攻魏拔甓城諸戍又畧地汝潁所在響應大破魏兵於壽陽邃為政寛明能得士心居身方正有威重將吏憚之梁書本傳陳蕭濟字孝康蘭陵人大建中為揚州長史高宗嘗勅取揚州曹事躬自省覽見濟條理詳悉文無滯害顧左右曰我本期蕭長史長於經傳不圖精練煩劇乃至於此陳書本傳北魏王肅字恭懿臨沂人孝文時歴都督豫州刺史以破齊將裴叔業功加督四州及叔業降附兼督江西復大敗齊兵尋為都督淮南諸軍事揚州刺史肅頻在邊悉心撫馭遠近歸附自處儉約家無餘財魏書本傳李崇字繼長頓邱人魏宣武時歴揚州刺史督淮南江西諸軍事屢决疑獄壽陽大水入城屋宇皆没將佐勸崇棄州保北山崇誓以死守水退州城獲全崇沈深有將畧寛厚善御衆在州十年鄰境憚其威名號曰臥虎魏書本傳元顯和魏宗室為徐州安東府長史刺史元法僧叛顯和與戰被執法僧執手命坐顯和叱之及就刑神色自若魏書濟隂王小新城傳北齊蘇瓊字珍之武強人也皇極中歴徐州行䑓左丞行徐州事請弛渡淮之禁淮南北先後告饑两境商販得互取糴由是彼此兼濟水陸之利通於河北北齊書循吏傳盧潛范陽涿人北齊揚州刺史在淮南十三年大樹風績為陳人所憚陳主與邊將書曰盧潛在卿宜深備之天統武平中江淮徵税頗雜百姓騷然潛隨事撫慰兼行權略境内以寧後為陳將吳明徹所獲閉氣而絶北齊書本傳徐遠字彥遐石門人仕北齊為東楚州刺史邑郭大火遠躬自赴救為之流涕仍為經營乃得安集北齊書本傳隋元景山字瑶岳洛陽人後周亳州總管率輕騎五百追陳將樊毅等一日一夜行三百餘里戰於漳口二合皆剋其城邑為司馬消難所䧟者悉平之隋書本傳賀若弼字輔伯洛陽人開皇元年為吳州總管以平陳為已任獻十策隋書本傳盧昌衡字子均范陽人為徐州總管長史甚有能名吏部尚書蘇威考之曰德為人表行為士則轉壽州總管長史宇文述委以州務隋書本傳房兆金州人徐州總管有勇略以禦海寇著功北史唐張鎮周舒人武德中壽州都督移舒州入舒以其鄉里就故宅多市酒餚召親戚與酣飲散髪箕踞如其為布衣時凡十日既而分贈金帛泣别曰今日鎮周猶得與故人歡飲明日則舒州都督治百姓耳諸公以禮隔不得復為交遊自是境内肅然唐書本傳狄仁傑字懷英太原人高宗時拜冬官侍即持節江南巡撫使吳楚俗多淫祠仁傑一切毁之止留夏禹吳太伯季札伍員四祠唐書本傳顏眞卿字清臣曲阜人浙西節度使時劉展有異謀眞卿選將訓卒為水陸備都統李峘以為生事密奏之及展舉兵渡淮峘敗走論者始多眞卿而咎峘唐書本傳李光弼營州人肅宗時以河南副元帥兼淮南等五道節度事出鎮泗州諸大將皆憚服唐書本傳劉晏字士安曹州人代宗時歴江淮轉運租庸鹽鐵常平使舊時由潤州陸運至揚子由揚子至河陰殊苦煩費晏命囊米載舟為歇艎支江船每船受千斛十船為綱減費數十倍未十年人習河險轉粟無升斗溺者又分官吏主丹陽湖禁引溉自是河漕不涸唐書食貨志杜亞字次公京兆人興元初拜淮南節度使治漕渠引湖水入渠中以通大舟因得溉田民食其利唐書本傳韓滉字太冲京兆人建中初歴鎮海軍節度使綏輯百姓均租調不踰年境内稱治德宗困奉天淮汴震騷滉遣將擊破李希烈兵漕路無梗完靖東南滉功最多人頻調發錢帛以濟朝廷當時賴之唐書韓休傳杜佑字君卿萬年人建中中歴淮南節度使决雷陂以廣灌溉海濵棄地盡為良田積米至五十萬列營三十區士馬整飭四隣畏焉唐書本傳崔衍字著深安平人德宗時宣歙池觀察使舊貢金錫十八品皆倍置市他州民匱多逃去衍蠲革之以簡靜為百姓所懷自奉儉約禄入悉賙親族唐書本傳王緯字文卿太原人德宗時浙西觀察使初州縣有韓滉特罰錢未入者十八萬緡府史請裒為進奉緯上疏願蠲以紓民詔聽之唐書本傳張建封字本立南陽人貞元四年除徐濠泗節度使地廹於寇常困蹙不支李泌請以建封代之由是復為雄鎮性樂士若韓愈許孟容等皆奏署幕府唐書本傳李鄘字建侯貞元中徐州節度張建封卒兵亂廹建封子愔主軍務帝以鄘剛敢拜宣慰使鄘持節直入軍中諭以禍福衆皆俯首一軍以安元和間歴淮南節度使王師討蔡以兵二萬分壁鄆境籍府庫留一嵗儲餘盡納於朝唐書本傳李吉甫字𢎞憲趙人元和中自政府出為淮南節度使奏蠲逋賦數百萬築富人固本二塘溉田萬頃漕渠不能居水乃築堤蓄洩江淮旱吉甫請分道賑之尋復召秉政唐書李栖筠傳盧坦字保衡洛陽人元和中拜宣歙池觀察使時江淮早穀騰貴或請抑其價坦曰所部地狹穀來他州若直賤穀不至矣不如任之既而商以米坌至市估遂平民得不饑唐書本傳路應字從衆京兆人元和中為宣歙觀察使至則出倉粟下其估半以廪餓人李錡將反以聞置鄉兵萬二千人錡反命將期以卒救湖常坐牢江東心錡以無助敗縛作響山亭營軍於左右權丞相善之鑱其説響山石韓愈平陽路公神道碑銘崔從字子義齊州人敬宗時歴淮南節度使蠲除苛政及卒下有刲股以祭者唐書崔融傳李德裕字文饒吉甫子太和中歴浙西觀察使時潤州承王國清之亂貲用空竭德裕躬自省約以留州財贍兵雖儉而均故士無怨初南方信禨祥父母有惡疾子棄不敢養德裕諭以孝慈大倫違者顯寘之法數年惡俗大變毁滛祠撤私邑山房千四百舍寇無所廋蔽天子下詔褒焉唐書本傳穆贊字相明懐州人為宣歙池觀察使捐錢四十萬假民賦故嵗旱人不流唐書本傳王凝字成庶乾符間宣歙觀察使時王仙芝黨屠建德欲襲南陵江南寰境皆盗區凝用強努據采石又遣别將馬潁解和州圍明年賊大至凝益修戰偹㑹大星隕寢庭術家勸託疾不視事凝不從誓與城相存亡賊解去尋卒贈吏部尚書諡曰貞唐書王翊傳李珏字待價其先趙郡人客居淮陰宣宗時拜淮南節度使江淮旱發倉賑民以軍羡儲粟半價糶之卒於鎮淮南之人德之叩闕下乞立碑刻其遺愛唐書本傳薛温河東人武宗時宣歙池觀察使有威重所部無敢犯舊史杜審權字殷衡杜陵人咸通中歴鎭海節度使龎勛亂徐州審權連師犄角饋粟相衘王師以濟唐書杜如晦傳張延賞蒲州人為淮南節度使歲旱民多轉徙吏禁之延賞曰食者民恃以活拘此而斃不如適彼而生茍存吾人何限焉乃具舟遣之勅吏為修室廬寛逋責歸者更増於舊唐書張嘉貞傳五代劉仁贍彭城人南唐清淮軍節度使周世宗攻之百端自正月至四月不能下五代史本傳盧綘字晉卿南昌人南唐後主時歴沿江諸營兵馬監押嘗遮敗吳越兵於海門及宋師深入授沿江都部署扼秦淮口拒之又出援丹陽大破吳越兵復授宣帥討平叛者南唐書本傳宋曹彬字國華眞定人太祖伐江南以彬為昇州西南路馬步軍都部署乘勝徑進遂圍金陵城垂克彬忽稱疾不視事諸將問疾彬曰余之疾非藥石能痊惟須諸公誠心自誓克城之日不妄殺一人則自愈矣諸將許諾明日城䧟士卒無敢肆者宋史本傳慕容德豐字日新太原人昇州都監市㕓安靜澤國富饒使者多裒聚金帛德豐獨以廉潔聞宋史慕容延釗傳喬惟嶽字伯周陳州人雍熙中為淮南轉運使先是建安北至淮澨總五堰運舟皆卸糧而過惟嶽命剙二斗門於西河第三堰相拒踰五十步設懸門積水俟潮平乃洩之自是漕舟無滯宋史本傳葉清臣字道卿長洲人景祐四年出為兩浙轉運副使疏太湖盤龍匯滬瀆港入於海而民賴其利東都事略趙賀字餘慶開封人為江淮發運使時舊軍將分部漕船主吏受賕不平賀分為三等視其功過自裁定吏巧不得施歲漕米溢常數一百七十萬蘇州太湖塘岸壞並海支渠多湮廢水浸民田賀與兩浙發運使徐奭伐石築堤流民歸業者二萬六千戸宋史本傳王宗望字磻叟固始人江淮發運使楚州沿淮至漣州風濤險惡宗望開支氏渠引水入運河為公私利宋史本傳李溥河南人淳化間制置江淮等路兼發運使高郵軍新開湖水散漫多風濤溥令漕舟東下者還過泗州載石輸湖中積為長堤自是舟行無患宋史本傳薛奎字宿藝綘州人眞宗時江淮發運使疏漕河廢三堰以便餉運宋史本傳盧秉字仲甫德清人熙寧末提㸃兩浙淮東刑獄上訃神宗問曰聞滁民捕蝗而食有諸對曰民誠饑甚殍死相繼上惻然曰前此獨趙抃為朕言之耳宋史盧革傳張綸字公信潁州人太宗時江淮發運副使奏除通泰楚三州鹽户宿負官助其器用鹽入優與之直復置監場於杭秀海三州居二歲增上供米八十萬又疏五渠以𨗳太湖開長蘆西河以避覆舟之患築漕堤為十䃮以泄横流修泰州捍海堰復逋戸二千六百民利之為立生祠宋史循吏傳張浚字德逺漢州人判建康兼行宫留守高宗幸建康浚迎拜道左風采隱然軍民皆倚以為重宋史本傳吳中甫江淮發運使自洪澤鑿渠六十里以避長淮漕運之險南志韓世忠字良臣延安人建炎四年以宣撫使駐鎭江尋進屯大儀連捷江口論者以為中興武功第一六年以宣撫處置使屯楚州楚屢經兵革世忠披草萊立軍府與士卒同力役撫集流散通商惠工山陽遂為重鎮劉豫遣兵入寇輒擊却之宋史本傳岳飛字鵬舉相州人初以秉義郎𨽻留守宗澤建炎四年頻捷收復建康遷通泰鎭撫使兼知泰州宋史本傳張俊字伯英成紀人屢為浙西江南淮西諸路制置招討宣撫使頻立戰功與韓岳並為名將宋史本傳吕祉字安老建陽人紹興七年遷兵部尚書陞督府叅謀軍事徃淮西撫諭諸軍時酈瓊與王德不協德還建康以軍𨽻督府命祉往廬州節制之密奏乞罷瓊語泄瓊叛執祉祉罵不已遇害宋史本傳虞允文字彬甫隆州人紹興末㕘江淮督府軍事敵兵四十萬宋軍裁一萬八千允文部分諸將勉以忠義大敗之於采石宋史本傳李顯忠青澗人隆興中拜淮西招撫使自濠梁渡淮與蕭琦鏖戰陡溝大敗之遂收復靈璧入城宣布德意不戮一人宋史本傳羅㸃字春伯崇仁人淳熙中除浙西提舉崑山華亭之間有澱山湖洩諸水道土豪占以為田水由是壅㸃奏請開濬溉田百萬南畿志眞德秀字景希浦城人嘉定八年為江東轉運副使歲旱蝗大講荒政以便宜發廩粟使林庠賑給竣事而還百姓送至郊外指道旁叢冡泣曰此皆往歲饑死者微公我輩相隨入此矣宋史本傳李道傳字貫之井研人嘉定中提舉江東賑饑宣池徽三郡隆冬行風雪中徧歴村谷全活甚衆後攝宣州守行朱熹社倉法諸郡效之宋史本傳崔與之字正子廣州人嘉定中權發遣揚州主管淮東安撫司事既至浚濠開月河置釣橋州城與保砦城不相屬舊築土夾城往來其中為易以甓又因山林之阻創五砦結忠義民兵沿邊得附山自固分強勇鎮淮兩軍月以三八日習馬射令所部兵皆放行之浙東流民渡江開門撫納活萬餘楚州叛卒給旗帖招之分𨽻諸軍後劉琸敗與之亟修守戰備遣精鋭布要害北軍深入無功召為祕書少監軍民遮道垂涕宋史本傳趙范字武仲蒲圻人紹定初與弟葵殱李全於揚州詔加淮東安撫副使復進兵破全餘黨於淮安宋史趙葵傳耿世安淮東副總管北兵至制置使賈似道調往漣水至漁溝以三百騎奮擊身被七創猶能追殺潰兵還走數里沒事聞贈官立廟賜諡忠武宋史忠義傳趙善湘字清臣濮安懿王五世孫紹定中歴江淮制置使平淮寇李全復平閩寇轉安撫使尋以復泰州淮安州鹽城淮隂縣四城及策應京湖功進端眀殿學士又復盱眙軍泗壽二州進資政學士宋史本傳杜杲字子昕邵武人江淮制置使李珏羅致幕下滁州受兵檄杲提偏師往援民蔽野求入滁守固拒杲啟鑰納之登陴中矢益奮卒全其城辟監崇明鎮與總領議不合引去辟廬州節度推官浮光兵變杲單騎往誅其渠魁守將爭餉金帛悉封反之安豐戍將摇扇軍情杲呼諭之一軍帖然知六安縣部使者季衍覧所書牘擊節曰九州三十三縣令之最也知定遠縣李全犯邊以杲習邊事擢知濠州制置大使趙善湘欲復盱眙用其策成功知安豐軍元兵圍城大戰擢將作監朝議帥淮西無如杜杲者詔以安撫使兼廬州進大府卿淮西制置副使兼轉運使復與元兵戰累擢刑工二部尚書以直學士奉祠帝曰杜杲兩有守功若脱兵權使有後祸朕何以使人乃起知太平州俄擢華文閣學士沿江制置使知建康府行宫留守節制安慶和無為諸郡杲罷楊林堡以其費備歴陽淮民寓沙上者䕶以師首謁程顥祠置貢士莊蠲民租二萬八千石復與元兵戰眞州進敷文閣學士宋史本傳陳塏字子爽嘉興人淳祐五年知太平州兼江東轉運副使部内諸郡災傷奏請蠲税發公帑代三縣轉折絲帛錢五十萬九千三百六十餘貫作浮淮書堂以教淮士宋史本傳姜才濠州人徳祐初歴通州副都統善騎射撫士卒有恩至臨陣軍律凜凛敵攻揚州才為三疊陣逆之三里溝戰有功又戰揚子橋所向辟易宋史忠義傳趙淮衡山人丞相葵從子歴官淮東轉運使德祐中戍銀樹壩兵敗被執阿术使招李庭芝降啗以大官淮佯諾至揚州城下大呼曰庭芝男子死耳毋降也阿术怒殺之宋史忠義傳元張晉亨字進卿南宫人淄萊路總管詔伐宋晉亨在選分道由安慶渡江丞相巴延留之戍鎮江兼預民事以鎮靜為務戰焦山𤓰州皆有功元史本傳董士選字舜卿眞定人成宗時拜江南行御史䑓中丞廉威素著不嚴而肅凛然有大臣風元史董文炳傳高睿河西人江東道提刑按察使部内草竊聲言圍宣城睿命密治兵衞司開城門聽民出入貿易自便寇以有備不敢進遂討平之元史髙智耀傳郝彬字景文霸州人擢揚州路治中鄞縣賊聚衆海島時出攻剽侵揚州彬討擒之泰興有人被殺二年賊不獲吏誣平人獄已具彬疑讞之獲真賊御史薦彬同知淮西道宣慰司事覈戸版理屯田諸廢修舉江淮財賦總管府掌東宫田賦其官屬皆從詹事院不𨽻中書往往為姦利彬為總管入見請受憲司糾察以革私弊罷所𨽻六提舉司以蘇民瘼從之兩淮鹽法日壞以彬行戶部尚書經理之彬請度舟楫所通道里所均建六倉煮鹽於塲運積之倉歲首聽羣商於轉運司探倉籌定其所乃買劵又定河商江商市易之不如法者著為法入為工部尚書元史木傳鄧文原字善之綿州人延祐五年僉江南浙西道廉訪司事平江僧憾府判官理熙賄徒告贓熙誣服文原按問杖僧而釋熙吳興民夜歸巡邏執繫亭下遁去追者刺其脅仆地有司問直初更者曰張福兒械繫三年文原得眞殺人者而釋福兒桐廬人戴汝惟夜有焚其廬者文原得其妻與弟謀殺汝惟狀人以為神移江東道徽寧廣德三郡歲入茶課鈔三千錠後增至十八萬竭山谷所藏不能充其半餘皆鑿空取民間轉運司官聽鄉里豪黠動以犯法誣民文原請罷専司俾郡縣領之徽民謝蘭家僮死蘭姪回賂誣蘭文原得其情釋蘭而坐回時久旱不雨决獄乃雨元史本傳趙璉字伯器甘陵人至正十三年立淮南江北行省於揚州以璉㕘知政事㑹張士誠䧟泰州興化命知府李齊招諭士誠請降因移璉鎮泰州士誠夜縱火登城璉力疾奮擊被創墜地瞋目大罵遂死之事聞賜鈔仍官其子元史忠義傳姚天福字君祥絳州人至元十六年授淮西道按察使將吏有豪猾為民害者悉剷除之民大悅二十六年復為淮西按察使按鉅姦一人政化大行元史本傳福壽唐古特人至正末為淮南行省平章政事是時濠泗陷師久無功福壽至督戰甚急而上游賊勢甚洶湧乃議築石頭斷江靣守禦有方衆恃以為固遷江南行䑓御史大夫集慶援絶勢孤人心震恐且倉庫無蓄積計未知所出民願為兵以自守福壽因下令民多貲者助糧餉激厲士衆為完守計城破百司奔潰福壽獨據胡床坐鳳皇䑓下指麾左右或勸之去叱之遂遇害同時死者達嚕噶齊達年達薩治書侍御史賀方元史本傳明湯和鳳陽人洪武初封信國公十八年上曰日本屢擾東海上卿雖老強為朕行視要地築城增戍固守備和乃築海上城起登萊抵江浙凡五十九城民丁四調一為戍兵鄭曉名臣記張德林鳳陽人明初以元帥守揚州時兵火之餘城中居民僅十餘家徳林招集流亡戸口日繁威肅惠懐軍民輯睦分省人物考王彬字文質東平州人巡江淮治揚州靖難兵至外禦内防七日不解甲為千戸徐政所縛舁至城上投兵中不屈死之鄭曉名臣傳宋禮字大本永寧人永樂二年工部尚書修復㑹通河浚黄河故道自是挽漕京師罷海運禮功最大鄭曉名臣傳陳遜字必恭浦城人永樂間巡按吳中平蘇松劇盜民賴以安舊通志陳瑄字彥純合肥人永樂初以平江伯充總兵都督帥舟師海運又備倭閩海海溢江北岸崩瑄起堤自海門歴通泰北至鹽城凡八百里又役人二十萬起高邱嘉定為海運表識名寳山後開㑹通河罷海運瑄議造淺艖二千艘歲運二百萬石後増至五百萬疏清江浦引水由管家湖入鴨陳口達淮就管家湖築堤十里以便引舟浚儀真𤓰洲通湖鑿吕梁百步二洪石平水勢開泰州白河通大江築高郵湖堤堤内鑿渠亘四十里淮濱作常盈倉五十區貯江南輸税徐臨清德州皆建倉便轉輸河淺處輙膠舟濱河置舍五百六十八所舍置淺夫俾導舟可行處緣河隄鑿井樹木便人行獻陵初陳七事其一言江南轉漕軍民並困上覽之戚然議寛恤仍勅奬與世伯劵景陵時鎮守淮安兼督漕運漕政益修漕渠在江淮間者瑄功為大瑄久祠清江浦漕渠旁徃徃有瑄祠鄭曉名臣傳夏原吉字維喆湘陰人戶部尚書永樂元年吳浙大水原吉行視水言嘉定劉家港即古婁江徑通大海常熟白茆港徑入大江皆廣川浚流宜疏吳淞江南北兩㟁安定等浦港引太湖諸水入劉家白茆二港使直注海人范家浜至南倉浦口可徑達海宜浚令深濶上接大黄浦以達泖湖之水各置石牐以時啟閉常修圩岸以禦暴流從之原吉布衣徒步日夜經畫盛暑揮葢去曰衆皆赤體暴日中吾何忍歲饑奏發粟三十萬石賑濟二年還朝復出治水水洩農田大利吳人尸祝之正統間勢家奪水利溝防盡壞周尚書忱治之景泰中李侍郎敏𢎞治中徐侍郎貫正德末李尚書充嗣皆治之鄭曉名臣傳周忱字恂如吉水人任蘇松巡撫二十二年先是胡概用法嚴刻忱濟以寛時蘇州逋税七百九十萬石常松亦然忱創為平米官田民田並加耗蘇税額二百九十餘萬石疏減八十餘萬令縣立便民倉水次推糧長收兩税加耗不得過十一又為押運視遠近勞逸支撥為諸費羡餘存縣倉號餘米米有餘減耗次年十六徵又次年十五更有羡縣為倉名預備諸轉假至秋抵斗還官其為農事不責償又議奏裏河軍民舟至淮安或𤓰洲交兌江北衞所漕者出通關還繳加兌米如舟未渡江南京諸衞扺倉兌者加過江等米馬草歲運費不貲忱請通州草塲立官庫折銀職官俸糧皆支南京米賤時銀一兩得米七八石忱請以重額官田極貧下户兩稅准折納銀一兩米四石又定蘇州官布不拘輕重務在長濶如式又令馬頭所領於田畝收米升九合與糧俱徵正統初淮揚災鹽課虧忱巡視奏令蘇州等府撥剩餘米縣一二萬石貯鹽塲准為縣明年田租聽竈戸上私鹽給米官得積鹽民得食米公私大濟彩繪宫殿計牛膠萬餘觔勅上供甚急忱言京庫貯牛皮久朽腐請出煎膠以餘米市皮還庫十四年邊事急工部索兵仗數百萬忱出餘米造上明盔者錫沃旬日畢辦嘗至海鹽築捍海塘令郡七縣合役萬夫自七年正月至十一年費萬計皆出忱度支海不為患毎遇凶荒輙便宜從事凡百上供及廨舍學校賢祠古墓橋梁道路溝渠修葺一切取給餘米歲不下萬計施給僧道問報餽遺各得其歡心江南之人愛戴如父母没而尸祝至今思周尚書也鄭曉名臣記羅汝敬吉水人宣德初以工部侍即奉使看詳蘇郡歲賦舊額共二百二十餘萬民間徵運不勝困弊為請於朝得赦常賦三之一自是民力稍紓南畿志王來字元之慈谿人宣徳間巡按蘇松中官陳武奉太皇太后懿㫖出使路經江南勢張甚獨為來所折歸訴之上上因心識之及代還臨軒慰勞賜宴光禄廣輿記曹𢎞宣徳間巡撫淮南山東時歲凶民饑𢎞均徭儲粟俵牛種簡孳牧殺婚禮民德其施舊通志賈諒正統二年巡視淮濟賑活饑民十餘萬築固安堤功成而民不知勞廣輿記薛希璉麗水人正統八年奉命清理鳳陽等處軍民田地摘發奸伏無敢欺隱所造文册後人遵以為式舊通志耿九疇字禹範盧氏人正統二年兩淮鹽法大弊擢運司同知性節儉嚴肅尤愼交接無毫髮私吏胥豪商勢家凛凛不敢肆嘗條奏鹽法便宜事著令内艱鹽場數千人走闕下乞留陞都轉運使嘗坐水旁童子曰水清不若使君清已而被誣得釋又以都御史清理兩淮鹽法景帝初陞刑部侍即尋又出理鹽法兼江北巡撫歲凶盗起拊循流民復業者七萬家勅錄諸郡大辟囚寃得釋者二十六人鄭曉名臣記孫鼎字宜鉉廬陵人以御史督學南畿課藝之外更訓飭士子當以躬行為本一時感其徳化皆鏃礪文行無敗檢者舊通志王竑字公度江夏人戍籍河州景泰二年總漕淮上三年兼巡撫清理鹽法賑濟劾巡河御史貪滛謫戍四年上疏言災異乞罷上嘉納引咎勅大臣修省下災郡邑賑濟竑疏言饑民流徙就食臣分遣屬吏沿河每遇過舟董令出米為粥分給賴存活者一百八十五萬八千五百人勸諭有力出米麥穀粟二十五萬七千三百石銀三千六百七十兩錢綿布半之量給被災者五十五萬七千四百七十九家缺農具種子七萬四千三百九十七家亦以官物賑給民流去撫來復業者五千五百九十三家他境流冗安輯者萬六百餘家朝議謂竑心純政平委曲調劑𢎞濟民艱况總督漕運姦貪畏憚兼理巡撫兵民慕戴陞副都御史仍治淮安鄭曉名臣記陳泰光澤人景泰中巡撫應天時富室田多輕額而重者多在貧下泰均之令五升之田倍其賦而官田之重者止取正額澤均而賦不損上下便之而富者不怨舊通志鄒來學字時敏麻城人景泰間巡撫應天時吳中水旱頻仍來學請以今歲額輸米三十萬石悉貸貧民來秋償官上從之又言蘇松等郡向俱軍兌輸京後因邊警調軍征守歲役民十五萬自輸民以重困今邊陲寧謐請仍舊上可其奏著為令吳民至今徳之舊通志崔恭字克讓廣宗人天順二年巡撫蘇松等郡所至進耆老詢利害為興革㑹都督請浚儀真漕河恭役夫六萬人程工贍廪民不告勞又浚常鎮河避江險鄭曉名臣記戴珊字廷珍浮梁人成化間以御史視學南畿珊剔歴中外所至有聲績學政尤著鄭曉名臣記劉孜字顯孜萬安人天順中巡撫應天松江有荒田四千餘頃賦額皆重久廢不耕孜請召民開佃以田肥瘠定税輕重謂之官租著為定制民懽趨之蕪萊盡闢舊通志高明字上達貴溪人天順間南京都御史南京久弛縱明振綱紀勅罷諸貪殘吏㑹滛雨極言宜修省以回災異揚州鹽寇起守兵失利勅明勦捕明造巨艦榜籌亭徃來江南北督戰又授方略御史戴琥顧以山擒賊九百餘人並江置邏堡高山望候賊出沒露踪跡不得逞中官粥私鹽縳儀眞指揮羣卒大閧明盡籍其鹽劾之鄭曉名臣記陳濂鄞縣人成化六年督理漕運立均徭之法請免運船帶磚納鈔軍民便之廣輿記李裕成化中總督漕運黜陟公明所部肅然張秋南旺湖淮安西湖諸防舊用椿木以捍衝激屢修復壞裕易以石利垂永久舊通志李綱長清人成化時總督漕務居官二十餘年家無百金產舊通志陳選字士賢天台人成化中以御史督學南畿力變浮華以身律士士多感化舊通志王恕字宗貫三原人成化間巡撫江南賑貧理寃全活萬計恕以貢獻太多所在騷擾疏乞崇恭儉為天下先中官王敬乗傳至東南大索竒玩所在驚懼恕疏極言敬苛暴久之敬等收捕下獄斬其黨中外稱快鄭曉名臣記馬文升字負圖鈞州人成化二十一年總督漕運兼江北巡撫法令一新綱紀大振王世貞史料婁謙成化間以御史督學南畿名其堂曰畏天中官汪直新幸銜謙不與通使偵伺其短竟莫能得舊通志彭韶字鳳樓莆田人成化間巡撫江南簡靜持大體不尚苛細奏折兩京文武俸糧省轉輸費公私便之廣輿記朱瑄鄞縣人𢎞治間巡撫應天開三江下流以殺湖水濬孟瀆等河以通漕運築沙湖石堤以避其險疏請立太倉州有六利上從之舊通志李充嗣字士修内江人正德間巡撫南畿時東南水利久廢充嗣隨宜濬治三月功成自是旱澇無患舊通志歐陽鐸字崇道泰和人嘉靖中巡撫應天嘗曰蘇郡地止一隅而漕餉當天下半吾不能減而能均乃請於上權其輕重立法均之舊通志雷應龍嘉靖間以御史督兩淮鹺政究官捕之倚法為奸者毁境内滛祠置邪説惑衆者於法輿論賢之舊通志鄭元韶字善夫侯官人嘉靖中任松江同知㑹巡撫林潤奏請履畝均糧元韶以才望擢按察司僉事賜勅専理徧歴阡陌區畫經界繪形版籍書其步積之數乃量腴瘠分上中下以定賦復請以五年一編徭役著為令自是民戸一年力役得五載休息焉舊通志董邦政字克平陽信人嘉靖間以僉事専領海防駐上海時倭寇犯境據高樓矙城内邦政登陴力戰用神鎗手擊却之又與同知任環合勦於界嘴西菴等處屢有斬獲舊通志翁大立字道生餘姚人嘉靖中巡撫應天㑹倭寇聚三沙兵部郎中唐順之來視師因共設方略擊破之總理河道徐州水災居民漂溺疏請發粟賑濟舊通志李遂字邦良豐城人嘉靖中巡撫淮揚時倭寇揚州屯白蒲諸將請擊之遂曰賊氣方鋭驟攻之如小挫事敗矣及賊兵益進遂曰賊過如臯必合合則道有三自泰揚逼天長鳳泗則陵寢震驚自黄橋逼瓜儀則摇南都而梗漕若從富安而東海濱斥鹵掠無所得至廟灣滅之必矣部分諸將遏賊毋得逾天長瓜儀賊果趨廟灣遂調兵設覆待之諸寇殱焉以功遷兵部侍郎舊通志鄭曉字窒甫海鹽人嘉靖間歴兵部侍郎副都御史總督漕運時倭寇淮揚曉疏請造戰舸築城堡練兵將積芻糗廟灣諸海口皆增兵設候屢敗倭前後斬首九百餘級今如臯海門諸城皆鄭曉所築以禦倭者王鴻緒明史稿潘季馴字時良烏程人嘉靖末及隆慶中再以僉都御史總理河道開新河築塞邳州睢寧決口萬厯五年歴刑部右侍郎時河決崔鎮黄水北流全淮南徙淮揚高寶間皆成巨浸首輔張居正薦季馴才出為河漕尚書季馴以淮清河濁淮弱河強當藉淮之清以刷河之濁築高堰束淮入清口以敵河之強詔從其議踰年功成累遷刑部尚書十六年復出總理河務河水暴漲衝夏鎮復築塞之季馴凡四奉治河命習知地形險易增築設防置官建牐下及木石樁埽綜理纎悉王世貞史料徐節臨汾人任淮徐道故事驛馬辦自富室斃則責其補償節酌定上中下之值聽各邑自買尤嚴差役之序民多稱便又裁石山驛開新河皆節主其議廣輿記海瑞字汝賢瓊山人穆宗初巡撫應天風采嚴峻所部凛然平賦役開水利行條編法遂為永利廣輿記王宗沐字新甫臨海人隆慶五年歴右副都御史總督漕運兼廵撫鳯陽故事漕舟五月渡淮宗沐請以正月起運春末過淮又以河決無常運道慮梗欲復海運條上便宜七事詔從之遂以六年二月運米十一萬石自淮入海五月抵天津敘功進秩並賚金帛廣輿記周孔敎字宗尼臨川人萬厯中巡撫江南時遣中使征𣙜行旅苦之户部議漕折徑輸邊鎮孔敎言其害皆免三十六年大水條上荒政二十三事又請改折漕米百五十萬并留𣙜税及漁課諸色銀二十餘萬以賑疏入未報乃先發廩濟貸又括公帑羡金至荆襄市米方舟相接米價頓平舊通志劉東星字子明泌水人萬厯二十六年河決單縣運道堙阻東星以工部侍郎兼右僉都御史總理河漕初河臣潘季馴議開黄河上流復元賈魯所浚故道朝廷以費鉅未果東星即其地開濬起曲里舖至三仙臺抵徐州小浮橋又濬漕渠自徐邳至宿計五閱月工竣費僅十萬敘功進本部尚書復開泇河引淮南北運艘工已成十之三㑹以疾卒後李化龍循其遺法與李三才共成之漕永便焉行水金鑑丁賔字廷禮嘉善人萬厯初為句容令著聲績歴操江都御史諸大利弊多所興革覈三等九則之法輸錢官募題定稅役事宜坊廂踐更之累皆絶廣輿記馮叔吉字汝廸萬厯初江上有警設副使道於池州叔吉莅任即立池陽荻港二營列巡艦於江上加築池州及東流銅陵二邑城守禦既嚴盗警遂息舊通志李三才字道甫北通州人萬厯中以僉都御史總督漕運巡撫鳳陽諸府三才豪邁有大略在淮凡十三年以折税監得民心及淮徐歲祲請賑恤蠲馬價又誅翦徐亳大盗趙古元等部内晏然舊通志李維貞字本寧京山人萬厯中以兵偹道駐壽州修廢舉墜綏靖地方大著勞績為時所稱舊通志熊廷弼字飛百江夏人萬厯間督學南畿嚴明有聲舊通志陳玊輝萬厯間屯馬御史冰清自矢去之日行貲不辦同官醵金助之舊通志周起元字綿貞海澄人天啓間巡撫吳中為政簡靜持大體性剛介織造内監李實怙魏忠賢勢恣為貪暴起元疏劾之忠賢怒嗾實劾起元與周順昌等六人同被逮死獄中紀事本末鄭二陽鄢陵人崇禎八年備兵維揚時流寇告警二陽簡飭士卒戰守俱􅊀鹽政壞竈丁欲為亂二陽扁舟諭之皆流涕歸服尋擢安撫劇賊革裏眼等五營受撫至太湖二陽移書戒監軍楊卓然勒兵以待未㡬果叛皖以有備獲全人服其先見舊通志倪元珙字賦汝上虞人崇禎時以御史督南畿學政㑹奸人詣闕訐復社罪欲盡陷一時清流事下所司案問元珙同兵備馮元颺申辨最力忤權貴意謫官紀事本末鄭崑貞字十師龍溪人崇禎時巡按應天楚帥左良玉擅離本鎮擁兵東下去蕪湖二十里遠近震恐崑貞移書諭以順逆良玉得書立還又捐俸治黄山采石孔道行旅便之號鄭公堤舊通志史可法字道鄰宛平人崇禎時歴安池巡道監江北諸軍敗賊於潛山桐城擢撫安慶立三大營以圖大舉賊多避其鋒歴總督漕運劾罷糧道之不職者三人又愼簡運官盡祛諸蠧弊後以樞輔督師死揚州舊通志張國維字玉笥東陽人崇禎時巡撫應天寛惠得士大夫心屬郡災傷輙為請命多獲寛減時流賊躙江北國維引軍擊之屢摧寇解圍築太湖繁昌二城濬鎮江及江陰漕渠並有成績擢總理河道歲旱水涸國維浚治之漕艘無阻廣輿記祁彪佳字㓜文山陰人崇禎時巡按南畿一日杖斃大猾七人所部稱快立易知由單以清賦弊捐俸置役田以甦徭困人稱真御史後巡撫應天威望尤著一時分鎮大帥多敬憚之廣輿記黄希憲字又生宜春人崇禎時撫吳廉靜有守時蘇民困於役最重者為白糧解户其次則徴收地丁銀謂之收頭希憲請於朝以白糧委縣佐而收銀屬之吏民困盡釋其法至今不變廣輿記凌義渠字駿甫烏程人崇禎時歴蘇松兵備以清操著吳俗好訟多詐義渠毎以片詞折之人又服其明舊通志馮元颺字爾馨慈溪人崇禎時歴蘇松兵備至則選材官募勇士别設一營號中權軍威大振舊通志王象晉字康宇新城人崇禎時任揚州兵備平海濱巨盗王虎子又通州民變焚劫諸巨室象晉馳往擒其魁立置之法舊通志路振飛字見白曲周人崇禎時任漕撫訓練鄉兵招集義勇他郡多為寇躙而淮獨安堵舊通志袁繼咸字臨侯分宜人崇禎時歴揚州兵備時中涓楊顯名銜命清理鹽漕恃寵驕蹇繼咸抗不為禮遂被誣劾繼咸以廉惠得人心去官日士民扳轅遮留者以萬計舊通志國朝洪承疇同安人順治二年以内院大學士經略招撫江南拊循氓庶著有綏靖之功舊通志李猶龍字紫函陜西人順治二年招撫安池等郡調度有方反側歸附平白雲大溪諸寨尤有功期年改巡撫天津皖人懷其德立祠祀之舊通志趙福星奉天人順治二年以郡御史巡撫鳳揚四郡駐泰州戡亂鋤奸整飭吏治申雪冤獄又加意振興文敎修飭學宫功績茂著李日芄字培原奉天人順治七年擢安徽操江都御史時大軍征粤滇道經安池諸郡日芃首嚴驛馬之禁非軍行重務不許擅索一騎革除蠧吏輕徭均税釐定經賦全書創立書院奬訓士類設江防營兵五里一汛江中羣盗屏跡行旅晏然潛山奸民嘯聚戮其渠魁餘黨悉散歸農又值海寇之警日芃率師控扼京口遣將截其歸路擒馘功多舊通志李嵩陽字元佩封邱人順治七年以御史督學江南時士人風尚相沿明季餘習為文多牽綴子書不遵𫝊註嵩陽取士以朱程理學為宗凡辭涉浮譎者不錄自是文體漸歸於正舊通志秦世貞字瑞寰廣寧人順治八年以御史按吳首彈貪墨收捕大蠧杖斃於市斷獄明决昭雪冤誣數十事漕卒驕横每米一石索加銀二三錢世貞奏立五米五錢法官為給之著為令舊通志胡亶字葆林仁和人分守常鎮道凡賦稅獄訟事至立剖以執法不阿見稱舊通志馮如京振武衞人順治十一年江南右布政使持已率屬峻整有丰采尤能振興文敎立五經文㑹訓勵多士皆習尚經學云舊通志馬鳴佩奉天人順治十二年總督江南具幹濟才遇事精明果斷奬廉懲貪靖山海巨寇釋善良之囚繫者蔡士英字伯彥奉天人順治十二年總督漕運疏陳漕政五事漕弊九事又請定水次領兌之規及裁領運都司十四年致仕十六年復起原職士英凡両任督漕多所振刷釐革輓輸天庾迄無虧額舊通志李來泰字石臺撫州人順治十二年督學江南尋督蘇松糧儲復分守蘇松常道歴官勤愼皆有政績來泰文學該贍於視學尤為稱職云舊通志即廷佐字一柱奉天人順治十三年由南贛巡撫陞兩江總督十六年海寇鄭成功入寇廷佐督厲將士調遣有方令崇鎮梁化鳳大破賊兵於得勝門外南土安堵舊通志哈哈木滿洲人江寧將軍與總督郎廷佐同心殫力殄除海寇舊通志石廷柱滿洲人順治十三年以鎮海大將軍駐鎮江嚴飭兵伍綏乂百姓民間稱為石佛舊通志額楚滿洲人以都統鎮守江南戢兵安民滇閩之亂提兵援江右所至約東甚嚴閭閻無擾舊通志郎賽滿洲人以都統駐蘇州時初設軍屯賽軍紀嚴肅㕓市晏然舊通志李森先字琳枝平度人順治十三年以御史巡按江南捕豪猾胥吏倚官為虐者十一人置諸法又舉孝子節婦以興民行舊通志姜圖南字匯思大興人順治十三年視兩淮鹽政時引滯課逋奸偽滋弊圖南疏通壅鹽課入應時又禁牟奪贏利竄附綱名者商人賴之舊通志陳培貞字心盤奉天人順治十三年江南左布政使時海寇犯江寧城中居民多憂糧匱培貞請開聚寶門聽民運米入城衆心始安賊營環列城外培貞建議潛開小東門與崇明總兵官梁化鳳引兵突出繞賊營後一戰破之小東門者城西北門之東偏小門也久閉塞忽出其不意賊大驚潰遂以㨗聞總督即廷佐並上其功舊通志宫家璧奉天人順治十四年分巡蘇松道裁决明敏案無留牘舊通志梁化鳳字翀天榆林人自寧國總兵官移鎮崇明時海濱伏莽出沒無時平洋平安大安聨福等沙聨為窟穴化鳳悉收復之先是鎮兵皆寄居民間化鳳申請剙建營房兵民稱便順治十六年海寇犯江寧奉調赴援衝圍入城與城中兵合悉力守禦未㡬覘賊弛備提鋭卒潛出搗其中堅遂殲羣賊克復鎮江以功擢蘇松提督予世蔭舊通志周維新奉天人以副都統駐鎮江居官簡靜和易鎮撫兵民歴八載卒於官舊通志馬祜字篤周滿洲人康熙八年擢江蘇巡撫下車首撤供帳絶餽遺正已率屬不事苛細江南舊多逋賦有司率那移報完前後相䝉袩分别吏侵民欠疏請銷追又密疏奉特㤙蠲免康熙元年至八年逋賦一百九十餘萬淮揚蘓松常鎮六郡頻困水災勘實奏請咸邀捐賑濬劉河吳淞江以利蓄洩清田畝以豁賠累行官收官兌以甦役困修築南北塘以便兵旅殲盗魁雪沉獄一時風俗清謐㑹霪雨淹沒田廬憂惶成疾臨終自草遺疏極陳水災民困言不及私舊通志麻勒吉滿洲人康熙十年總督兩江甫莅任值旱蝗倣行古理蝗之法又捐俸買蝗遠近負戴而至量多寡授緡蝗漸絶歲不告饑其為治提綱挈領務有所振起凡藩臬郡縣學校營衞驛遞場局市井一切利弊宜罷行者及舟車徃來人物之數各有品章條貫芟繁核實不苛不濫士民掇其尤著者三十八條鑱之於碑立祠祀之舊通志王之鼎字公定瀋陽人以世襲伯任松江提督陞鎮海將軍兵民愛之後提督四川吳逆叛罵逆自刎死松人立祠祀之康熙四十六年頒賜純忠遺愛四字額方國棟字干霄宛平人康熙十二年分守蘇松常道律已甚嚴莫敢干以私吳下濱湖堤岸歲久頽圮國棟躬率吏民併力修築又修沿海墩臺橋梁及吳淞劉河兩牐措辦工費不以擾民滿洲䝉古兵暫駐蘇州國棟請度城南隙地立營糗芻之屬無不預備師旅如歸民得安堵舊通志阿席熙滿洲人康熙十三年總督兩江為政清靜畫一吏民安之㑹逆藩煽變剙建營房修造戰艦悉如期集事南討大軍絡繹過境席熙徵調供億號令嚴明所部安堵及任滿還京行槖蕭然人服其操舊通志白允明奉天人康熙十四年為京口左營副將均旗丁供役嚴汛兵賞罰禁放牧學宫旁地鄉邑不擾張景仲京口防禦和輯兵民禁飭閑人不許入學宫賑饑育嬰尤孶孶樂善云慕天顔字鶴鳴靜寧人康熙十五年由江蘇布政使陞巡撫天顔在藩司時值水旱相仍賑貸緩徵開濬吳淞劉河尋入覲凡七上疏減賦除荒治黄淮寛涸田調用守令均田役最其大者撫吳復條上八疏又疏請蠲被災田賦請開濬白茒孟河並建牐蓄洩為東南之利丁思孔鑲黄旗人康熙十五年江蘇布政使以剛方才幹著稱靳輔字紫垣奉天人由翰林編修巡撫安徽晉兵部尚書總督河道甫莅任即大挑山清高寶等四州縣運河及清口以下至海口河道詳審兩河全局上陳經理河工事宜八疏悉奉俞㫖大發帑金専任委成輔於是開濬引河修築遥堤縷堤創立減壩坦坡大築高堰堵塞翟壩使淮水㑹河河水入海運道通行無阻復請開中河三百餘里令漕艘由仲家莊牐而上即入中河避百八十里黄河湍悍之險勞績茂著輔嘗持議謂治下河當竟治上河與衆議不符自康熙十六年至三十一年凡三膺簡命聖祖有實心任事之褒既老病寖劇又疏陳兩河善後之策請豁開河築堤廢田之糧并請清淤出地畝之賦卒賜祭葬諡文襄四十六年奉㫖沿淮軍民感頌靳輔治績衆口如一久而不衰著贈太子太保仍給世職拜他喇布勒哈番為矢忠宣力者勸輔所著有奏疏八卷治河書十二卷雍正十二年奉㫖崇祀賢良祠郝浴字氷滌定州人康熙十六年巡按兩淮鹽政時三逆未平鹺引壅滯浴恤商裕課措置有方以稱職留差一年尋擢左僉都御史劉選勝湖廣人康熙十七年為京口總兵官勤於訓練尤嚴防戍賞罰海氛寢息更修學中講堂射圃以助興文教劉果諸城人康熙十八年督學江南謝絶私交釐正文體委靡油􅉸之習為之頓改孔興洪曲阜人康熙二十年任江常鎮道懲豪強恵良民奬勸孝友樂育單寒士民有去後之思于成龍字北溟汾陽人康熙二十一年總督兩江先是巡撫直𨽻風節著聞朝野及兩江節制貪墨吏望風解綬豪猾皆潛徙境外奢侈僭踰者亦皆斂戢莅任即杜苞苴禁加𣲖減火耗嚴保甲清營伍除蠧胥釐關政平鹽價凡有關國計民瘼者次第舉行成龍負經濟之學於程朱源流素多發明故尤以敎育多士為心創立虹橋書院檄取高才生課習其中每親臨訓誨士當先勵品行為國棟梁勿為稂莠其所提奬陶成後多貴顯自奉儉薄有寒素所不能堪者以盡瘁遘疾卒於位贈太子太保諡清端卒之日齠童耄叟皆入弔哭周身之具麄布一衾而已士民建祠一在天妃宫側一在雨花臺畔雍正十二年奉㫖崇祀賢良祠湯斌字孔伯睢州人康熙二十三年由内閣學士擢江蘇巡撫斌莅任初悉屏供帳諸物僚屬皆洗心供職吳俗奢靡裁之以禮立嫁娶喪塟定式申賽㑹演劇博戲拳勇掠販之禁重農事以興本業復社學以訓子弟講孝經以敦人倫表揚名宦以風厲來者悉推誠感動不徒條教虛文又累疏陳吳民疾苦㑹淮揚水災斌倡屬捐濟毎口百日給米五斗令無流播吳地楞伽山五通神祠賽禱無虛日斌取神像投之石湖奏聞永禁奉㫖各省淫祠通行嚴禁斌撫吳三載食惟蔬菜供應日費百餘錢二十五年聖祖諭江寧巡撫湯斌潔已率屬實心辦事宜拔擢大用特授禮部尚書詹事府掌詹事還朝之日吳人攀送者數千人生為立祠既沒追思不忘雍正十二年奉㫖崇祀賢良祠施世綸字潯江晉江籍鑲黄旗人靖海侯諡襄壯琅仲子以廕知泰州㑹歲饑請修築范公堤以濟饑民歴揚州守移江寧所至豪右屏跡疑獄悉平丁艱去攀留者數萬人建雙亭於府署號一文亭累擢淮徐道安藩司總督漕運革羡金劾貪弁除蠧役號稱嚴明趙士麟字玉峰河陽人康熙二十五年巡撫江南捕豪猾蠧胥悉置之法境内肅然時吳城河道久湮舟楫多阻士麟疏濬永為民利尋擢吏部侍郎楊素藴陜西人康熙二十六年巡撫安徽嚴懲墨吏以儆官邪又優恤士民威惠兼著傅臘塔滿洲人康熙二十七年以刑部尚書總督兩江慰薦賢能懲黜貪墨摘發如神萑苻用戢讞决明慎屢剖疑獄課士敎民疏河墾荒二十八年聖祖南巡垂問民間利病因請免江寧房號􅏃搭地租歲八千兩又疏請江南鄉試增廣解額議准蘆課丈量五年一舉縣令親臨勘丈二載卒官特遣官予祭贈太子太保諡清端士民建祠祀之雍正十二年奉㫖崇祀賢良祠張思恭鑲藍旗人康熙二十九年為京口將軍思恭自九年擢副都統鎮京口前後莅鎮凡十八年雅尚節儉戢兵安民今文廟前立下馬牌思恭所奏請也董元卿鑲黄旗人京口將軍輯和文武綏靖軍民尤嚴旗丁重利剥民縱馬害稼之禁訓練將士勤明有法楊嘉山西聞喜人康熙二十九年分巡江常鎮道捕治衙蠧又按豪家奴置諸法嚴於律已屬吏無私謁許汝霖字時菴海寧人康熙三十年以春坊贊善督學江南汝霖浙中宿學通經書熟於文律其校士稔知甘苦宵分閲牘手定甲乙士咸服其公鑑宋犖字牧仲商邱人由江西巡撫移節江蘇凡民間利病諮訪甚勤每逄歉歲奏請蠲賑賓禮文彥奬激後進尤多造就撫吳十四載不為赫赫之譽而去後人皆思之高承爵奉天人康熙三十二年巡撫安徽時盱泗等州縣河流泛溢修築隄防三十九年再任捐俸賑飢皖人獲濟范承勲字蘇公奉天人總督兩江以鎮靜為治淮揚下河屢被水災撫綏賑恤人懷其德佟國佐奉天人巡撫安徽政尚寛平人吏浹和邵嗣堯山西人康熙三十三年以㕘議督江南學政峻節清風屏絶竿牘雅不喜冗長繁縟之辭所取制義以簡質為宗著有四書講義𫝊示學者以勞卒官士立祠肖像祀之張鵬翮字運青遂寧人康熙三十四年督學江南三十八年擢兩江總督明年晉兵部尚書總理河道首陳河工錢糧冐濫屬員因循積弊多所振刷恪遵聖祖指授方略遍行履勘殫心經畫拆攔黄壩使黄水暢達入海堅築高堰廣闢清口使淮水得暢流匯黄疏人字芒稲等河引運河水注江築挑水壩疏陶莊引河使清水敵黄永無倒灌之虞挑蝦鬚等河引下河積水入海復疏請改中河於三義壩因築堤攔舊中河水入新中河自是每歲糧艘通行無滯又開張福口引河㑹裴家塲河諸水併力助淮逼黄大溜向北黄淮皆循故道入海所著有河防記若干卷雍正十二年奉㫖崇祀賢良祠張雲翼陜西人世襲侯爵大理寺卿鎮八閩康熙三十五年移節江南在任十四年詩書樽俎訓練有方聖祖仁皇帝南巡閲軍容整肅嘉奬賞賚李鈵鐵嶺人康熙三十八年任安徽巡撫戢兵安民緩徵息訟立義學義倉又造江船以拯溺修馬橋以利渉遺愛甚多張泰交字公孚陽城人以太僕寺少卿督學江南刻苦勵操雖周親宿好莫敢干以私每校士既定甲乙集高等諸生環立几案論文章雅俗高下亹亹不倦朂以立品修行為端人善士擢大理寺卿副都御史刑部右侍郎一歲三遷仍令訖學政任在任同蘇撫宋犖捐修南版廿一史常名揚正白旗人康熙四十年安徽布政使以所屬濱江洲地多為豪右侵奪而貧弱者至有無洲之税親履丈勘還所侵地陳鵬年字北溟湘潭人初知海州歴知江蘇二府攝江藩篆並著聲績康熙六十年署河道總督尋奉世宗特㫖授總督河道兵部侍郎時漕渠淺澀遣幹吏直溯淮源疏其上流使清水暢達㑹黄濟運又挑穵黄河南北岸引河四道使對岸險工淤塞又徧閱河勢地形具得其源委高下區畫條貫將次第經理㑹病卒賜賻金二千兩諡恪勤雍正十二年奉㫖崇祀賢良祠張聖鐸分巡淮揚道戢吏懲奸多善政㑹伏水暴漲淮安西門小壩水已溢堤城中人惶懼聖鐸冐風雨躬率屬員集丁夫運料搶修越隄淮郡得全明年黄漲尤甚淮郡安東同時告急聖鐸親臨捍淮遴員馳救安東兩城卒保無虞以勞卒官章秉法字程叔㑹稽人為江南掌印都司善治獄雖老奸宿豪以數言折其機牙莫不詘服屢被檄勘災監賑恩均弊絶張伯行字孝先儀封人康熙四十九年由閩撫移節江蘇素以清正著聞豪猾憚之望風遠遁舉劾屬員無所阿狥奏請蠲𤓰洲浮税賑恤高寶下河災黎建紫陽書院令諸生肄業其中訓廸以義理之學㑹與督臣互㕘解任奉聖祖特諭有天下第一清官之褒仍起原職吳人遮道歡迎額手稱慶伯行益矢恪勤始終一節撫吳前後閲五載官吏莫敢冐法貪濫吳中推伯行清望與湯斌相亞云梁世勲延安人康熙五十年任安徽巡撫慈􅖤和易深恤民瘼其最著者皖城江磯險峻每遇風雨數十里無泊舟處勲捐金於城東五里外鑿新河四十里行旅便之郎廷極鑲黄旗人康熙五十一年為督漕都御史肅清漕政官吏弁丁皆便之穆廷栻山海關人康熙五十三年提督松江持躬清慎訓練嚴明自甘布衣藿食俸餘惠濟部兵余正健字乾行古田人康熙五十四年督學江南衡文根極理要訓士諄切按州郡傔從數人而已陞奉天府尹高其位鑲黄旗人其先屢立戰功宣勞異域康熙六十年提督松江沉靜和易地方寧靖齊蘇勒字金城正白旗人以兵部尚書總督河道莅政清勤河防完固奉上諭勅部議叙又疏復𤓰洲花園港運道建牐啓閉以順水勢堵𤓰洲城西新開河道以免江水逼城之患尤為偉績雍正十二年奉㫖崇祀賢良祠江南通志卷一百十二
