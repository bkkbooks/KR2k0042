body:
  text: 江南通志卷三十五輿地志古蹟六大廬鳳三府太平府丹陽故城在府城東五十里接江寧縣界秦置縣始皇東巡由丹陽至錢塘即此漢仍之屬丹陽郡謂小丹陽吳範從孫策下小丹陽是也今有丹陽鎭陽亦作楊應劭曰丹陽以木名邦晉志云丹陽山多赤柳故名姑孰城即今府治漢丹陽春榖二縣地東晉時置城戍守并積鹽米於此城南臨姑孰溪因名謝公城在府采石鎭晉謝尚鎭牛渚時所築却月城在府西南三十里天門山上南宋車騎將軍王元謨所築廣十餘里久廢蕪湖故城在蕪湖縣東三十里古鳩兹地左傳襄三年楚子重伐吳克鳩兹是也漢置蕪湖縣今縣東四十里有鳩兹港王敦城在蕪湖縣東北一里羅氏園王敦鎭于湖時所築南豫州城在縣東北一里金陵志云姑孰之南淮曲之陽晉成帝咸和四年僑立豫州治蕪湖即此宣春城輿地紀畧云在蕪湖今邑東尚名宣春門殆晉時僑立上黨郡城在蕪湖縣西南五里晉太元間因上黨民南渡僑立上黨郡及襄垣縣繁昌故城在繁昌縣西北四十里東晉僑置襄城郡割于湖為境并置繁昌縣屬焉寰宇記云繁昌本南陵縣地其地出石緑唐時為石緑塲今為舊縣鎭又有襄城郡址在縣東北延載鄉赭圻城在繁昌縣西南十里孫吳置赭圻屯晉哀帝召桓温入朝至赭圻有詔止温温遂築城居此今稱故縣城南丹陽廢郡在當塗縣西北梁置于湖廢縣在當塗縣南三十八里漢丹陽縣地三國吳為督農校尉治晉太康初始立于湖縣屬丹陽郡春榖廢縣在繁昌縣西北漢置新志謂在蕪湖縣陶辛圩者誤按元和志寰宇記皆云在南陵縣境應入繁昌無疑天門雙闕在府大信鎭宋大明七年帝西巡有雙爵盤旋下集繖蓋羣臣呼萬歲詔建雙闕望江樓在當塗縣慈姥磯相傳梁昭明太子讀書處又縣東南淨居院亦有昭明讀書臺太白樓在采石磯即太白祠唐元和中建陸龜䝉詩謝眺青山李白樓是也清風樓在蕪湖縣驛山之陽因蘇軾清風閣舊額以命名燃犀亭在當塗縣采石牛渚磯上晉温嶠平蘇峻還鎭至此聞其下多怪燃犀燭之見水族奇形異狀夜夢人謂曰與君幽明道别何意相照後人因建亭於此賞詠亭在采石驛前晉謝尚鎭采石月夜汎舟聞别艇詠詩邀與談論及旦知為袁宏薦於朝後人遂即事名亭焉白紵亭在當塗縣東七十五里昔宋帝與羣臣會此唱白紵歌故名姑孰亭在當塗姑孰溪上附唐李白宴姑孰亭序通驛公館南有水亭焉四甍翬飛巉絶浦嶼蓋有前攝令河東薛公棟而宇之今宰隴西李公明化開物成務又横其梁而閣之晝鳴閒琴夕玩清月蓋為接輶軒祖遠客之佳境也製置既久莫知何名司馬武公長材博古獨映方外因據胡牀岸幘嘯咏而謂前長史李公及諸公曰此亭跨姑孰之水可稱為姑孰亭焉嘉名勝槩自我作也且夫曹官紱冕者大賢處之若游青山卧白雲逍遥偃傲何適不可小才居之窘而自拘悄若桎梏則清風朗月河英嶽秀皆為棄物安得稱焉所以司馬南隣當文章之旗鼓翰林客卿揮辭鋒以戰勝名教樂地無非得俊之塲也千載一時言詩紀志捉月亭在采石鎭神霄宮内李白泛舟狂醉欲從水中捉月故名亦名暮雲亭相傳藏李白宫錦處宋梅堯臣有詩十詠亭在府城東唐李白有姑孰十詠因名蘇軾過此讀之笑為贗物見陸游入蜀記百花頭上亭在府城外尼山巓宋景定五年太守鄭羽建蛾眉亭在當塗縣北二十里據牛渚絶壁前直二梁山夾江對峙如蛾眉然故名宋熈寧二年太守張瓌建孟公亭在當塗縣官圩東岸宋咸淳八年大水知州孟知縉以身捍水水為之郤立亭表焉石刻尚存思瑾亭即采石驛皇華亭以思周公瑾故名宋眞德秀題額江山好處亭在當塗縣北二十里蛾眉峯左亦名觀瀾亭附明倪謙江山好處亭記太平為郡在南京之南百里而遠右枕江有山焉曰采石下有磯曰牛渚江自西南來合沅湘漢沔之水直走磯下姑孰之溪則自東折西而横入於江驚湍駭浪晝夜衝齧有聲磯之南直走天門東西二梁中東一水蒼翠修曲宛若蛾眉舊嘗為亭磯上以占其勝矣去蛾眉之左下坡數級地勢頗卑而坦迤幽曠山益近而奇江益近而駛其地尤勝有非蛾眉所得而擅者舊亦為亭於此名江山好處元監府鴻吉哩氏易名觀瀾歲久傾毁景泰三年豐城李侯若虛來守是郡政平訟理民安物阜嘗考尋遺迹以為是亭乃郡之絶景自昔騷人韻士若晉温嶠袁宏謝尚唐李白崔宗之諸賢皆嘗於此登眺而吟嘯者也豈惟吾輩政餘可以藉是消煩而適意邦人歲時亦得以遂遊觀之樂也容可坐視其廢乎乃與同知任能讓通判陳清推官何裒捐俸貲為倡命廣濟寺僧修惠募材重建亭成諸公與客携酒餚登而落之憑高遠望則烟嵐之杳靄雲濤之洶湧風㠶沙鳥之往來長鯨巨鼉之出没仙梵之廬漁樵之居舉接於欄檻之外千態萬貌景象無窮有以使人心開目明而神爽飛越於是揚袂引觴曰樂哉斯亭因復其名曰江山好處徵記於予予以花鳥本平時可娛之物也然感時恨别者見之適足以驚心而飛涙郡之江山信可樂矣使為守者政未能敷於下為民者政未能安於上外有責於人内有媿於已則登亭也觸物興懷無非悲傷感慨之境孰見其為可樂哉今諸公涵煦休養措斯民於衽席而民親愛之不翅父母上下之間心孚惠洽蓋無適而非可樂者況目當江山之好處哉是宜樂其樂而使民同其樂也亭之復古詎不宜乎湖山烟雨亭在當塗縣東三里月盤山據郡城游觀之勝夢日亭在蕪湖縣東一里故王敦城上晉大寧二年王敦將舉兵内向帝宻知之微行至于湖察敦營壘而出敦正晝寢夢日環其城宋時於此建亭故名玩鞭亭在蕪湖縣北二十里晉明帝微行察王敦營壘敦覺使五騎追之帝馳去見逆旅賣食嫗以七寳鞭與之曰後有騎來可以相示追者至問嫗嫗因以鞭示之五騎傳玩稽留遂久帝獲免因名亭碑石存吳波亭在蕪湖縣西門外瀕大江宋隆興二年建張孝祥書額志喜亭在蕪湖縣神山巓宋乾道七年秋禱雨於李衞公祠輒應因名雄觀亭在蕪湖縣吉祥寺右山巓名觀瀾亭西向吳仁傑易使面南識舟亭在蕪湖縣鶴兒山俯瞰大江舊名八角亭王思任𣙜關時易今名凌歊臺在當塗縣西北黃山宋孝武帝築以避暑即宋行宮也面勢虚厰高出塵壒之表唐李白有詩聯璧臺在采石山江干二石突兀中分一線石刻聯璧二大字縹緲臺在繁昌縣後山巓下瞰大江前對濡須宋熈寧間易名表裏江山臺誓清堂在當塗縣黃山祖逖渡江誓師於此宋嘉熙中吳淵建堂後陳塏以米芾所書極月亭三字易之揮麈堂在府治臨大池舊名近民吳淵重建易名盤龍齋在當塗縣南州津晉桓𤣥建齋畫龍於上後劉毅鎭此居之毅小字盤龍遂為符驗云横江館在采石對岸即和州橫江李白所咏也滴翠軒在蕪湖縣赭山廣濟院舊名檜軒有宋黄庭堅自書山谷讀書處五字北園在繁昌縣寳山宋蔡確建潘閬宅在府西今儒學是郭祥正宅在府東街中有醉吟菴蘇軾過之題詩畫竹石於壁陳規宅在府東街成賢坊羅彥輔宅在府西街張鐩宅在府城東南隅其居曰孝感坊陶安宅在府城東街明太祖賜額及堂聯謝朓宅在當塗縣青山一名青山館旁有謝公池陸游入蜀記云青山市南有元暉故宅基環宅皆青林文篠清泉奇石眞佳處也今為保和菴陶𢎞景宅在當塗縣横望山今為澄心寺因話錄云盧嚴說隨鄭常侍遊宣州當塗隱居山巖即陶貞白煉丹處也爐跡猶存李白宅在當塗縣青山之麓白至姑孰依當塗令李陽氷愛謝家青山有終焉之志周維長宅在當塗縣横望山李白有贈横山周處士詩李陽氷宅在當塗縣青山陽氷解組後築室青山最深處重巒叠嶂佳趣萬種今名萬佳山張孝祥宅在蕪湖縣西南昇仙橋有歸去來堂張崇義居在繁昌縣城崇義自祖父以來千口同居閨閫肅然嘉祐中楊傑過其門書義居二字遺之陵口戍在府北三十里或謂之東陵口晉咸和中蘇峻自歴陽濟横江登牛渚軍於陵口胡氏曰在牛渚之東北亦江濵戍守處南陵戍在繁昌縣西北下臨江渚六朝時江州東界盡於南陵蓋瀕江津要處也晉陶侃領荆州江州刺史自南陵迄於白帝數千里路不拾遺謂此梁置南陵縣治赭圻城時此地亦置戍承聖初王僧辨討侯景軍於大雷遣前軍侯瑱襲南陵鵲頭二戍克之是也九龍池在横山頂有石坎容水僅斗許能不竭内石龍子九枚長數寸黝形高足癡不畏弄昔傳人取其一坎中仍九盡取之坎中亦九也禁蛙池在蕪湖縣昇仙橋西張孝祥築堂成鄰人以池内蛙鳴為讓孝祥取硯投之隨手聲絶洗硯池在繁昌縣馬仁山唐王沖霄洗硯於此至今池水猶黑九井在府城南十里晉桓温所鑿殷仲文九日從桓温游九井賦詩即此井通江已竭其五昔有墜鞭於井者從牛渚流出見杜滔北征記龍泉寺井在府東龍泉山晉螺浮尊者卓錫開此以竹汲之則清冷可飲以繩汲之則泥滓渾濁洞井宋孝武游姑孰勅謝莊攜其子朏從乃使為洞井贊朏即於坐奏之帝曰奇童也謝公井在青山路南有磚甃謝朓鑿陶𢎞景丹井在横望山唐井在府城東十五里禪岳寺山下闌石鐫元和十二年字掛袍石在當塗縣白紵山西晉桓温率賔僚燕飲醉時掛袍於此丹竈在横山陶𢎞景煉丹設也此地環天碧嶂景物奇特所謂丹竈寒烟及五井指此石鼓在蕪湖縣石臼湖側唐貞觀二年尉遲恭來治郡舁二石鼓以壯其門相傳是石季倫家物廬州府合肥故城在今縣北漢置三國時魏揚州都督滿寵以城臨江湖賊得據水為勢請立城西北三十里依險可固守謂之新城宋曹朋之記曰合肥入斗度獨多故號金斗城亦曰金斗門今雞鳴山下有新城故址逡遒城在府東舊染縣南三十里清水橋後漢志云九江郡有逡遒縣曹操伐吳屯兵於此重築之亦曰曹城晉成帝時僑立於蕪湖縣界滁陽城在府東北寰宇記云在愼縣東北六十四里小峴城在府東七十里南齊所築詳山川赭城在縣西北唐光啓二年壽州刺史張翺遣兵寇廬州楊行宻將田頵等敗之於赭城是也梁縣城在府東北七十里漢汝南郡有愼縣劉宋僑置於此屬南汝隂郡宋紹興三十二年避諱改曰梁縣從舊郡名也今為梁縣鄉舒縣故城在廬江縣西春秋時舒國秦為舒邑漢文帝封淮南厲王子賜為廬江王都此今縣西南三十里有大城縣西北金牛山下有金牛城蓋即古舒縣遺跡也慕家城在廬江縣東二十里世傳慕容垂屯兵所築龍舒城即舒城縣治春秋為羣舒漢置龍舒應劭曰龍舒即羣舒之邑杜預曰羣舒偃姓舒庸舒鳩之屬今廬江南有舒城舒城西南有龍舒城是也舊說以龍舒為廬江地誤也詳見辨訛高陽城在舒城縣西南二十里高陽氏封其子庭堅於舒蓼之間故名黔布城在舒城縣東晉孝武時於黔布城置南新蔡郡屬南豫州尋廢羮頡城在舒城縣西北三十里漢高帝七年封兄子信為羮頡侯食邑於舒亞夫城在舒城縣東南十五里相傳周亞夫嘗領兵至此有東西二城其址尚存周瑜城在舒城縣西十八里今為淨梵寺舒鮑城在舒城縣西一百里龍舒水南或以為即古舒庸也霍湖城在舒城縣南五里又花家城一名竹里又圍箕城俱在縣西十里羊舌城一名陽石又繆家城俱在縣西十五里諸城皆南北朝及南宋初戍守之所茆城在舒城縣東南十五里亦曹操屯兵所築新附城在無為州南十五里吳諸葛恪築以居新附之人今其地為新附橋桀王城在巢縣卧牛山之隂書所謂南巢也今為紫微觀槖臯故城在巢縣西北六十里春秋云哀十二年公㑹吳於槖臯漢置槖臯縣槖臯亦曰柘臯舊說以為槖訛為拓又譌為柘也按杜預注槖音章夜反是槖字本有柘音非譌也槖臯今為柘臯鎭其東又有會吳城故址居巢故城在今巢縣東北五里夏商時南巢地周為巢伯國秦為居巢縣亦曰居鄛今古居巢城陷為巢湖南譙郡城在巢縣東南二十里晉太元中僑置南譙郡治山桑縣九江郡治在無為州襄安鎭秦漢以前江逼城下為舟車要衝潁川故郡在巢縣東南劉宋僑置屬南豫州水經注云竇湖水東出為後塘塘上有潁川僑郡故城襄安舊縣在無為州南四十里襄安鄉西對臨湖東下繁昌漢置臨湖舊縣在無為州西南臨璧山下漢置今為臨湖圩扶陽舊縣在無為州西北接巢縣界晉太元中僑置開城舊縣在無為州西四十里唐武德三年置今為開城鎭無為舊縣在無為州花家疃本巢縣之城口鎭魏武征孫權築城於此攻吳無功因號無為城䝉古學在無為州今儒學西北大街吳王宫在廬江縣紫芝坊世傳五代楊行宻故宅今為金剛寺鎭淮樓在府治明郡守龍誥重建有銅壺以核晝夜時刻五鳳樓在府東城上唐天祐中張崇創築落成之日有五色鳥集其上因名九華樓在無為州移風門上宋米芾建江之南九華諸峯屹然相向因以名樓稻孫樓在無為州大安門上宋米芾秋日登樓燕集見田禾已穫復青問諸老農曰稻孫也芾喜而名其樓又明遠樓在州楚澤門上與羣山相接下臨諸湖米芾題額講書樓在無為州城隍廟前謝枋得寓於州州人建此樓居之聖文祕奉閣在府城宋劉筠知廬州構閣藏眞宗飛白書及所賜書顏曰聖文祕奉之閣五雲閣在無為州城内五雲叟陳明所建聚山閣在無為州治宋米芾建景賢亭在府治有晏殊包拯諸公詩刻石甃壁間威遠亭在府西城上明熊文舉禦寇駐此又作稅于亭於東郊外仙隱亭在廬江縣水簾洞上宋隆興初建亭以表左慈之迹鵲亭在舒城縣西春秋云昭五年楚伐吳吳人敗諸鵲岸杜預曰即舒縣之鵲尾渚亦曰鵲亭飛霞亭在舒城縣署宋李公寅讀書處其兄伯時為畫舊宅圖蘇軾有詩教弩臺在府城東門内九獅橋北曹操所築教强弩以禦吳之舟師明遠臺在府東北七十里梁縣鄉廻環皆水中有一洲方輿覽勝云宋鮑照嘗讀書於此義門臺在府西十八里唐萬敬儒三世同居親亡廬墓宣宗大中間特表其門節婦臺在府城内惠政橋東南宋包拯舊第節婦拯冡嗣繶妻崔氏釣魚臺在廬江縣南八里石磯枕河為左慈垂釣處避暑臺在廬江縣東北隅舊傳曹操攻吳避暑休兵於此今為城隍廟釣魚臺在無為州東北一名濡須口舊傳浮丘伯釣魚之所漕臺在無為州城内舊軍學西宋時設漕運司以轉江襄漕事四望臺在無為州治内宋英宗時知無為軍滿維端建孔臺在巢縣西槖臯鎭狀如圓壇可容千人世傳孔子去楚將適吳駐車於此懸魚堂在府治西晉羊續為廬江太守有饋生魚者意難却之乃曝為乾魚懸於壁上他日復饋續乃出所懸魚示之其人慙懼而退後人為建懸魚堂三至堂在府治西宋陳堯佐三守是邦故以名堂西巖書堂在府東巢湖西岸宋安淮有記萬卷堂在無為州天慶觀西宋祥符中李景仙藏書於此多祕閣所無者以其半進於朝仰高堂在無為州治東米芾建三桂堂在無為州宋王之道與兄之義之深同科故名其堂曰三桂馬亮宅在府城和平橋東明改為下察院包拯宅在府鳳凰橋巷余闕宅即今合肥縣治明洪武中建恩柱坊尚存歸來宅在舒城縣治東宋李公麟歸隱處亞父故居在巢縣東北二十里亞父山皇覽云吏民祭亞父於居巢庭上長吏初視事必祭而後從政庭中又有亞父井同食館在府南城上唐元和中刺史路應求建左傳云楚人出師自廬以往賑廩同食因以為名後又改名建德館崇明館在廬江舊縣治南數十歩宋謝惟士知縣事省以拓縣治見碑記後為儒學璇源館在舒城縣宋元符中李公麟自為記寳晉齋在無為州治東北宋州守米芾建以晉人法書碑刻嵌壁間因名廻瀾軒在府南門外香花墩有包孝肅拯祠軒蓋為公設也青陽山房在府城東六十里巢湖北元余闕讀書處環翠山房在府城南湖右永樂港之原元葛聞孫隱居講學之所歐冶子鑄劔處在廬江縣東北二十里冶父山今為寺毛義隱處在廬江縣東北七十里毛公山有讀書洞梅福眞隱處在舒城縣西七十里梅山漢梅福棄官隱此地八公飛昇處在巢縣西槖臯鄉八公山列仙傳云八公白日上昇遺藥在器雞犬皆得仙花園在府城南二十里元至正間宣讓王遊賞之所其址尚存回車衖在巢縣西北十五里兩山夾峙中通一綫俗傳孔子於此回車隂陵道在無為州黃洛河東北即田父紿項羽處鑊里在巢縣西北濵焦湖吳太平二年孫綝拒諸葛誕於壽春大發兵出屯鑊里帝亮責綝留湖中不上屯一歩者是也姚萇村在巢縣東新安鄉相傳東晉時姚萇駐師屯田於此春秋山莊在舒城縣春秋山宋李公麟讀書處公麟有春秋山莊四時樂詞又有洗硯池亦公麟遺蹟文翁莊在舒城縣南九十里漢文翁嘗讀書於此濡須塢在無為州東北五十里一名偃月城吳用呂䝉策夾水立城狀如偃月有東西二關其地峻險東即濡須䲧西為巢縣七寳山相對為吳魏相持之所藏舟浦在府城内古金斗門外昔魏將張遼襲吳藏戰艦於此箏笛浦在府城后土廟側相傳曹操溺妓舟於此漁人夜聞箏笛聲今猶然也煉丹池在府城東四頂山上漢人魏伯陽煉丹之所故址尚存墨池在無為州治宋米芾所鑿蛙聲聒人取片瓦濡墨書之投諸池蛙鳴遂絶又大書墨池二字石刻今尚存偃月池在無為州治南每中秋夜月偃半輪故名洗耳池在巢縣教塲西相傳是許由舊蹟東興隄在無為州黃洛河吳諸葛恪作大隄築兩城使全端留畧守之梁鄱陽王範亦嘗屯兵於此三堰在舒城縣南漢羮頡所築詳見碑記此一邑之水利也嗟虞墩在府東北八十里世傳項羽於此别虞姬香花墩在府城南濠水中蒲葦數里魚鳬上下長橋徑度竹樹隂翳舊為包拯讀書處舒王墩在舒城縣北四十里舊傳漢羮頡侯築此侯封於舒故謂舒王墩摩旗墩在舒城縣南十五里世傳漢壽亭侯駐兵於此金雞墩在舒城縣西一里下有金雞潭明秦民悅建書院於此劉郎寨在廬江縣牛欄山自麓至走馬嶺上凡十數里寨址寛平可容萬衆險要可守金華寨在廬江縣黃屯山上勢最險要安樂栅在無為州東北梁太清末合州刺史鄱陽王範屯於濡須遣世子嗣將兵守安樂栅明年嗣破侯景將任約於三章遂徙鎭焉亦謂之安樂栅胡氏曰三章在濡須之東狀元井在府學宋馬亮擢進士第一故名瑠璃井在巢縣城北中有四柱色如瑠璃笑泉在巢縣南七十里聞人笑聲則泉湧沸故名浮丘釣石在巢縣濡須口水濵一大石上鐫四字舊傳浮丘釣石隋碑在巢縣紫微觀開皇十四年造今可見者只十數字鳳陽府西古城在府東十八里舊時軍壘也魯城在府西魯山之東今有東西魯城村皆以此為名一說晉太康五年鍾離移治於此改名魯城縣紫金城在府城外萬壽山前鍾離城在臨淮縣東四里古鍾離子國春秋時互為吳楚邊邑漢置鍾離縣屬九江郡治有東西二城濠水流於其中名三牛城以郡治有三石牛也郡介濠涇間多水災牛土畜故以鎭之漢下相故城在臨淮縣西北公路城在臨淮縣舊城東相傳袁術據淮南時所築小東城在臨淮縣東寰宇記云城在東北三里宋泰始二年築以鎭濠口陳太建五年廢通釋云秦始皇築當是泰始之訛樂平舊城在臨淮縣東南本漢縣屬東郡江左僑置於鍾離郡界新志云有香城在州東六十里宇家莊亦名東鄉城疑是其遺址趙草城在臨淮縣東距邵陽洲數里梁天監五年曹景宗於此築壘俾牧人得過淮北縱芻牧使别將趙草守之因以名城向城在懷遠縣西北四十里渦水之陽春秋云莒人入向杜注曰譙國龍亢縣東南有向城漢置向縣水經注云北淝水經向縣故城南俗謂之圓城或謂團城當塗城在懷遠縣西南二十里古塗山氏國漢置當塗縣屬九江郡今為馬頭集水經注云淮水經馬頭城北魏馬頭郡治即當塗故城也平阿故城在懷遠縣西南六十里戰國時齊邑漢為縣水經注云淮水北合沙水淮西岸有平阿縣故城今有平阿集在縣西南平阿山下俗譌為平莪按魏收志云譙州高塘郡有平阿縣在今天長縣及高郵州界蓋梁時僑置於此非故縣也義成故城在懷遠縣東北十五里漢為侯國水經注云北淝水經義成南世謂之楮城非也其地當渦水入淮處亦名渦口舊縣志云有拖城在縣東北十五里即古渦口城地明一統志謂義成在縣西北四十里誤龍亢城在懷遠縣西北七十里漢置縣屬沛郡今為龍亢集考城在懷遠縣南五十里沈約宋志云盱眙郡有考城縣蕭齊因之魏廢蓋即此荆山城在懷遠縣北三里亦謂之舊城梁天監中魏人以梁堰淮水命楊大眼鎭荆山因築城置戍焉邊軍城在懷遠縣西八里宋末江淮安撫使夏貴所築新城在懷遠縣南四十里宿州北境亦有新城曲陽城在定遠縣西北九十五里秦置縣應劭曰曲陽者以在淮曲之陽也後漢以下邳有曲陽改曰西曲陽水經注云洛水經淮南曲陽故城又北歴秦墟蓋亦當時戍守處也與曲陽相近隂陵城在定遠縣西北六十里莫邪山南即漢兵追項羽失道之所秦置縣後漢為九江郡治東城在定遠縣東南五十里元和志云項羽敗走東城即此秦置寰宇記云梁天監間改為定遠馬丘城在定遠縣西南二十五里即漢志當塗縣之馬丘聚也一名藍栅城芰蒲城在定遠縣西南八十五里芰蒲塘下寰宇記云梁魏交併之日魏築為壘亦名定遠城閭城在定遠縣西北一百十五里相傳魏主燾南侵時所築魏收志云楚州有沛郡領蕭相已吾三縣蓋即此柴王城在定遠縣東北七十里大横山上羊城在虹縣西北四十里今為湖或曰即相城之訛也相城見宿州霸王城在虹縣南三十里相傳項羽屯兵處夏丘城在虹縣東一里寰宇記云堯封禹為夏伯國於此故名漢置縣僮縣故城在虹縣東北七十里秦縣漢屬臨淮郡明一統志云又有僮都城在縣北一百二十里即漢取慮縣下蔡城在壽州西北三十里春秋州來邑也吳季札始邑於延陵後邑於此哀二年蔡昭侯自新蔡遷於州來謂之下蔡漢置縣又棟城在下蔡西北花苑城在下蔡城東南五里安豐城在壽州南八十里按今霍邱縣西南界有魏屬安豐郡故址即漢安風縣也此則晉時僑置者沈約宋志云南豫州安豐郡江左僑立今為安豐鄉劉關二城在壽州正陽鎭與潁州接界先主與關羽分城屯軍在此硤石城在壽州西北二十五里硤石山上兩岸相對淮水經其中相傳大禹所鑿因於山上結二城以防津要三國魏志云甘露元年諸葛誕據壽春司馬昭遣王果軍硤石以逼之梁天監十四年亦築城於此為魏所克梁城在壽州東北胡三省通鑑注云晉僑立梁郡於壽春界故有梁城其城在壽陽東北鍾離西南青岡城在壽州西二十五里晉謝元等禦秦師時築義昌城在壽州西南永初郡國志云安豐有義昌縣晉末嘗立郡狄城在壽州南梁普通五年裴邃自合肥抜魏狄城本傳作狄丘城水經注云肥水經狄丘東右㑹拖水枝津又北至成德是也黄城在壽州西梁置黄城戍尋置潁川郡於此寰宇記云晉義熙十二年置小黄縣在安豐西北三十里或即黄城也又西有郭黙城相傳晉咸和中郭黙常屯此陳大建五年吳明徹攻壽陽别將克黃城郭黙城降是二城相近也蒼陵城在壽州西北魏收志云壽春縣有蒼陵城水經注淮水自潁口左人東經蒼陵北是也安城故城在壽州南魏志梁置新興郡治安城縣即此馬頭戍城在壽州西北二十里淮濵戍守處也梁天監五年取魏合肥魏人守壽陽於馬頭置戍普通五年梁取壽陽亦置於此或以為即馬頭郡誤又馬頭東南有白捺城又南有歐陽城皆梁魏邊戍之地魚林城在壽州南安豐塘側鴛鴦門又鬭鷄城在州西南三十里符離城即宿州治故楚邑秦置縣陽城在宿州南秦置縣陳勝生此相縣故城在宿州西北相山下春秋時宋邑秦置縣漢為沛郡治今為相城鄉水經注云睢水東逕相縣故城南宋恭公之所都也或譌為襄城蘄縣故城在宿州南楚邑也秦置縣元和志云宋於此置譙郡齊以為北譙郡隋廢郡復為蘄縣又有庸城在蘄西臨渙城在宿州西南九十里戰國宋銍邑也秦置銍縣梁普通中克魏銍城因置臨渙郡以臨渙水為名今為渙陽鄉靈璧故城在宿州西北項羽追擊漢軍至靈璧睢水上即此孟康曰靈璧故小縣在彭城南括地志云靈璧故城在符離縣西北九十里臨潼故城在靈璧縣東北七十里魏置臨潼郡今為潼郡集或入虹縣或混為取慮城皆誤霸王城凡三俱在靈璧縣一縣西南七十里一縣西北七十五里一縣北七十二里皆項羽屯軍之壘榖陽故城在靈璧縣西南七十五里漢置縣洨陽故城在靈璧縣南五十里漢侯國東漢為洨縣亦名濠城魏收志云穀陽郡連城縣有濠城即漢洨縣地今為濠城集仁州故城在靈璧縣東南魏收志云仁州梁武置治赤坎城領臨潼郡及已吾義城二縣固賢城在靈璧縣北七十里舊傳為晉錮欒盈地後去金為固又有古城在縣西北百里近河岸相傳關羽張飛會於此竹邑縣治在宿州北二十五里漢初置竹縣晉曰竺邑今為符離集廢汴郡在懷遠縣西南魏收志云譙州有汴郡梁武置治蕭縣有平阿山其地當在今縣西南與壽州之廢下蔡縣相近臨濠郡在定遠縣梁置陳留故郡在壽州南寰宇記云陳留廢郡在故安豐東北五里又浚儀廢縣在縣東北二百五十歩雍丘廢縣在縣南六十里小黃廢縣在縣西北三十里又南有都陸城漢博鄉縣也三國吳朱異留輜重於都陸即此朝歌舊縣在臨淮縣東劉宋置魏收志云縣有九山城黄溪水齊周時廢今黄溪在縣東界灌丘舊縣魏收志云鍾離郡領灌丘縣有劭陽城蓋在今臨淮東北與劭陽洲相近壽春舊縣即今壽州也戰國末楚考烈王徙都命之日郢秦置縣漢為九江郡治輿地記云壽陽城中有二城一曰相國城宋武帝伐長安時築一曰金城壽陽中城也又州西四十里有壽春故城北臨淮水相傳考烈王蓋治此又州東有諸葛城相傳諸葛誕所築成德舊縣在壽州東南漢置水經注云肥水經成德縣故城西又北至芍陂也崇義舊縣在壽州東南宋志云南梁郡有崇義縣羌人所立肥陵舊縣在壽州東南新唐書志云安豐縣武德七年省肥陵縣入蓋唐初所置也甾丘舊縣在宿州東北六十里漢置廣平舊縣在宿州西南魏武定六年置斛城舊縣在宿州東北亦曰朝斛縣魏武定中置水經注云渒湖水東至朝解亭即朝斛之訛也白樿舊縣在宿州西南七十里隋志云臨渙郡有東魏白樿縣新志云有百善集蓋即白樿之譌也丹城舊縣在宿州西南仁義鄉隋志云臨渙郡有魏丹城縣定陶舊縣在宿州定陶山下後魏僑置新豐舊縣在宿州北七十里魏武定六年置今為新豐集龍山舊縣在宿州西南龍山集寰宇記云在臨渙縣西四十五里北齊置諸陽舊縣在宿州西北唐武德四年分符離縣置今州西有諸陽山蓋故縣在此陽平舊縣在靈璧縣南晉元帝僑置陽平郡於徐州連城舊縣在靈璧縣南魏收志云榖陽郡首領連城縣齊周時廢有連城鋪在縣南百里蓋因故縣為名亳社在宿州相山宋共公都相因置亳社潛龍殿在臨淮縣開元寺内南唐李昪微時嘗寓寺中故名南華樓在臨淮縣逍遙臺前萬歴中重建有莊周像望僊樓在臨淮縣城内相傳藍采和仙去人於此望之因名清淮樓在臨淮縣舊郡治子城上唐張頔詩云觀魚惠子臺蕪没夢蝶莊生塚木秋惟有清淮供四望年年依舊背城流元勲閣在府治西南明為功臣建含桃閣在臨淮縣舊為郡廨西齋宋梅詢為守呂夷簡為倅晏憇於此第一山亭在府龍興寺内明洪武十六年建有御書第一山三大字碑翛然亭在臨淮倅㕔子城上舊名觀瀾元祐中王雍為郡丞因晉簡文帝翛然臨水便有濠濮間想語乃易今名四望亭在舊府城唐刺史劉嗣之建李紳記云雲山左右長淮縈帶下繞清淮旁闞城邑紳矮小時號短李俗呼為短李亭枕淮亭在舊濠州治子城上宋時建一名望淮聖水亭在懷遠縣大禹廟前歲早禱雨輒應元人構亭其上死虎亭在定遠縣西南水經注云閻潤水西北經死虎亭夾横塘西注宋泰始間殷琰於此築壘拒劉勔之兵齊永元二年蕭懿討裴叔業亦屯兵於此通典云在壽州東四十里悞也詳見辨訛對池亭在定遠縣西北七十里相傳宋趙倚所作池即槎枒寺白蓮池鵲甫亭在定遠縣鵲甫谿水西北流經此亭下婁亭在虹縣東北左傳云楚人敗徐於婁林杜預注曰僮縣東南有婁亭鷄備亭在安豐故城西南春秋云昭公二十三年吳敗頓胡沈蔡陳許之師於鷄父杜預注曰安豐南有鷄備亭是也黎漿亭在壽州東南魏甘露中吳將朱異救諸葛誕於壽春進屯黎漿是也水經注云芍陂瀆北分為二水一水東注為黎漿水人東經黎漿亭南謂黎漿水口尉武亭在壽州北宋元嘉中劉康祖還守壽陽至尉武去壽陽數十里為魏將追及即此晝涼亭在壽州北五里下有石屋袲亭在宿州西春秋云桓公千五年公會宋公魏侯陳侯於袲伐鄭杜預注曰相縣西南有袲亭芳亭在宿州北即唐咸通中官軍敗賊處又州城内有柳溪亭扶疎亭在宿州北城上宋蘇軾守徐時嘗遺墨竹一本於宿宿人鐫石構亭貯焉故名扶疎明𢎞治初州守曾顯庸修復之張氏園亭在靈璧西鳳山下或曰在鹿鳴門外附宋蘇軾張氏園亭記道京師而東水浮濁流陸走八黃塵陂山蒼莽行者倦厭凡百里始得靈璧張氏之於汴之陽其外修竹森然以高喬木蓊欝以深其中因汴之餘浸以為陂池取山之怪石以為巖阜蒲葦蓮芡有江湖之思椅桐檜栢有山林之氣奇花美草有京洛之態華堂厦屋有吳蜀之巧其深可以隱其富可以養其菜蔬可以餉隣里魚鼈蒲筍可以餽四方之賔客余自彭城移守吳興由宋登舟三宿而至其下肩輿叩門見張氏之子碩碩求余文以記之惟張氏世有顯人自其伯父殿中君與其先人通判府君始家靈璧而為此園作蘭臯之亭以養親其後出仕於朝名聞一時推其餘力日增治之於今五十餘年矣其木皆十圍崖谷隱然凡園之百物無一不可人意者信其用力之多且久也古之君子不必仕不必不仕必仕則忘其身必不仕則忘其君譬之飲食適於饑飽而已然士罕有蹈義赴節其處者安於故而難出出者狃於利而忘返於是有違親絶俗之譏懷祿茍安之弊今張氏之先君所以為其子孫之計慮遠且周是故築室藝園於汴泗之間舟車冠蓋之衝凡朝夕之奉燕遊之樂不求而足使其子孫開門而出仕則跬步市朝之上閉門而歸隠則俯仰山林之下於以養生治性行義求志無適而不可故其子孫仕者皆有循吏良能之稱處者皆有節士亷退之行葢其先君子之澤也余為彭城三年樂其土風将去不忍而彭城之父老亦莫余厭也将買田於泗水之上而老焉南望靈璧雞犬之聲相聞幅巾杖履嵗時往來於張氏之園以與其子孫遊将有日矣觀魚臺在府西七里荘子與恵子觀魚處亦名荘周臺觀星堂在府獨山頂上明洪武初建将臺在府西古城之東逍遥臺在臨淮縣開元寺後唐刺史梁延嗣累土為臺刻莊子像覆以亭義臺在定遠縣東二十里五代時有梅氏居此宗族聚居鳴鼓會食南唐後主築臺表之判虎臺在定遠縣治宋包拯為令時有虎傷人拯移牒於神虎自赴縣繫於臺前石今臺石俱存春申君臺在壽州城東北隅相傳楚春申黃歇築鳳凰臺在壽州南門外鬬鷄臺在壽州西南三十里明一統志云俗傳二金鷄鬬於此張飛臺在壽州西陽鎭東南四里米家臺在壽州正陽鎭西相傳宋米芾所築曬書臺在宿州閔孝鄉閔子墓側莊子臺在靈璧縣潼山望荆臺在靈璧縣荆人宦此思親築臺望焉今斷碑存吹簫臺在靈璧縣西北七十里三賢堂在臨淮縣城東北隅宋時建祀彭祖莊子惠子明正統二年没入於淮威信堂在臨淮縣内宋淳熙時濠帥王囘陛辭上諭以守邊之道無出威信二字因以名堂靜正堂在臨淮縣舊郡治堂後又有清風堂皆宋時建薛長卿宅在宿州相城内中元寺長卿初以魯詩傳龔勝龔舍後為御史大夫東歸沛守遠近尊禮殊至郡人以為榮桓譚藏書處在宿州漢成帝以譚藏書多令待詔門下時謂挾桓君山之書富於猗頓之財今蕅花墅是也劉巘故里在宿州相城澤門内奕壇在臨淮縣西南二里會仙觀前刻石為棋枰傍有二窊可置子水館在臨淮縣舊濠州治唐張祜有詩又高唐館在舊濠州治西漆園在定遠縣東六十里即莊周為吏處唐天寳中尚有漆樹一二十株野火燔燒今為壟畝國府園在宿州相城北相傳内有宋伯姬黃堂基即伯姬焚死處飲馬池在壽州東南百里相傳漢英布飲馬於此留犢池在壽州城西南隅漢時苗來令壽春駕一㹀牛至後生犢一及去任曰此淮南所產也留之州人遂以名池惠子窑在臨淮縣治西南三里相傳惠子遊濠上時居此夢蝶坊在臨淮縣開元寺西莊周嘗寓此撒金街在臨淮縣内藍采和曵錢仙跡在此樂安鄉在虹縣廢僮縣界漢匡衡封樂安侯即此大澤鄉在宿州西南故蘄縣西水經注云蘄縣有大澤鄉陳渉起兵於此睡僊崖在臨淮縣曲陽門外有石崖長二丈餘中有一段平坦約六尺世傳有僊嘗卧此埀花塢在臨淮縣唐刺史獨孤及有詩並序乘龍洲在臨淮縣東北淮水中流周世宗征濠夜遣兵持炬乘槖駝絶淮濠兵驚以為鬼乘龍也莊眉戍在懷遠縣西北魏置齊建元二年魏人攻鍾離徐州刺史崔文仲遣兵渡淮攻破其莊眉戍是也禹墟在懷遠縣東南水經注云禹墟在塗山西南其地有禹會村即此蘇軾詩曰樵蘇已入黄熊廟烏鵲猶明禹會村是也蒲姑陂在虹縣北左傳云昭公十六年齊伐徐至於蒲隧杜預謂取慮縣東有蒲姑陂是也竹堌在虹縣東北七十里凄河岸石寨在府萬歲山頂築有石垣連珠寨在壽州北五里紫金山腰有石甃大路遺址尚存周世宗屯兵處花靨鎭在壽州西北二十五里相傳以宋武帝女壽陽公主名宋紹興二年廬壽鎭撫使王亨收復安豐軍之花靨鎭蓋州境戍守要地也趙歩在壽州東北淮河北岸水濵泊舟之地以趙氏居此名胡氏曰趙歩南直紫金山曹營在靈璧縣西南一百三十里相傳曹操立營於此垓下聚即漢兵圍項羽處漢志云洨縣有垓下聚元和志云垓下聚在虹縣西南五十四里蓋在今靈璧縣東南樓子莊在今靈璧縣西三十里戚家灣在靈璧縣北七十里小河南相傳為漢高祖戚夫人之故里九井在壽州南汲一井則諸井皆動淬劍泉在府遺碑村相傳莫邪劍成以此水淬之楚泉在定遠縣西六十里漢泉在定遠縣西五十里源出楚泉二泉並行自南而西合流入洛達於淮珍珠泉鳳臺縣城北五里聞人聲則泉迸如珠一名咄泉非有二泉也盩厔槃在府治南山中古槃也行色詩石刻在壽州舊安豐縣宋待制司馬池嘗監酒稅作行色詩後孫宏為之刻石漢碑在宿州相祠内八分體所謂三百有五碑也又有宋宣和封崇惠侯勅碑亦在祠内解帶石在臨淮縣清流門外俗傳項羽解帶飲石上即此啓母石在懷遠縣禹廟西石形如老嫗秦橋山石在虹縣城東陡門山產美石宋都汴時采石於此宣和石在靈璧縣西二十里外沿途多奇石魏昌城在壽州八公山東南魏延昌初梁作淮堰揚州水漲刺史李崇更起此城以備水州人號曰魏昌城寰宇記云有石城在縣北四里即此江南通志卷三十五
