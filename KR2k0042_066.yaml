body:
  text: 江南通志卷六十七食貨志洪範八政一曰食二曰貨漢書食貨志謂二者生民之本而又以為帝王所以聚人守位養成羣生奉順天德治國安民之本在焉我國家畫一之政愷悌之澤厚生惟和萬方作乂蓋所以阜而通之者至矣今謹參考古今首列田賦明則壤也繼以户口重孳生也繼以漕運實天庾也繼以稅課裕國用也於是紀蠲賑積貯渥恩施也訖於物産土地所宜也為類十有一為卷二十作食貨志第三田賦一唐虞揚州厥土惟塗泥厥田惟下下厥賦下上上錯禹貢漢髙祖約法省禁輕田租十五而稅一文獻通考景帝二年令民出田租三十而稅一漢書後漢建武六年令郡國收見田租三十而稅一如舊制晉武帝平吳之後置户調之式丁男之户嵗輸絹三匹綿三斤女及次丁為户者半男子一人占地七十畝女子三十畝其外丁男課田五十畝丁女二十畝次丁男半之女則不課按兩漢之制三十而稅一者田賦也二十始傳人出一算者户口之賦也今晉法如此則似合二賦而為一然男子一人占田七十畝丁男課田五十畝則無無田之户矣文獻通考成帝咸和五年始度百姓田取十分之田率畝稅三升至哀帝隆和中復定天下賦稅畝收二升文獻通考南北朝齊武帝時田畝稅二升其量三升當今一升鄭樵通志唐制天下丁男授田一頃輸粟二石謂之租丁隨鄉所出嵗輸絹綾絁各二丈布加五之一綿二兩輸布者麻三斤謂之調用人之力嵗二十日閏加二日不役者日為絹三尺謂之庸有事而加役二十五日者免調三十日者租調皆免通正役不過五十日凡水旱蟲蝗為災十分損四分以上免租損六以上免租調損七以上課役俱免揚州租調以錢開元中詔江南以布代租文獻通考代宗廣德元年詔一户三丁者免一丁庸稅地稅依舊凡畝二升唐書租庸調法弊自代宗時始以畝定稅而斂以夏秋至德宗時楊炎為相遂作兩稅法夏輸無過六月秋輸無過十一月唐書五代楊吳徐知誥為淮南帥定租稅上田一頃稅錢二貫一百丈中田一頃稅錢一貫八百下田一頃千五百皆足陌見錢如見錢不足許折以金銀宋齊丘以錢非耕桑所得乞虛擡時價而折紬絹綿本色又請蠲除丁口課調從之自吳變唐自唐歸宋民到於今受其賜文獻通考宋初盡削錢氏白配之目遣右補闕王永髙象先各乘遞馬均定稅數只作中下兩等中田一畝夏稅錢四文秋米八升下田一畝錢三文米七升四合取於民者不過如此姑蘇志太宗淳化間詔江南承偏制重賦流亡者宜令諸州籍頃畝之數均其賦減十分之三以為定制召遊民勸其耕種給復五年宋史嵗賦其類有五曰公田之賦官莊屯田營田賦民耕而收其租者是也曰民田之賦百姓各得專之者是也曰城郭之賦宅稅地稅之類是也曰雜變之賦牛革蠶鹽食鹽之類隨其所出變而輸之者是也曰丁口之賦計丁率米是也其輸之遲速夏有至十月秋有至明年二月者所以紓民力也文獻通考神宗熙寧間淮南路田九十六萬八千六百八十四頃二十畝官田四千八百八十七頃一十三畝見催額四百二十二萬三千七百八十四貫石匹兩斤稱角量領束江南東路田四十二萬一千六百四頃四十七畝官田七千八百四十四頃三十一畝見催額三百九十六萬三千一百六十九貫石匹兩斤束領文獻通考六年御史翟思言始趙尚寬為唐守勸民開墾髙賦繼之流民自占者衆凡百畝起稅四畝而已境內始無曠土近聞轉運司闢土百畝增至二十畝恐其勢再致轉徙望戒飭使者量加以寬從之宋史髙宗建炎四年詔江南兩浙土多粳稻須霜降成實自十月一日始收租宋史紹興間以江東帥李光言令廣德縣秋苗舊納水陽鎮鄉民憚逺者俱每一石貼三斗七升充腳剩就本軍送納立為年額且蠲其半宋史二年工部侍郎李擢言平江府東南有逃田湖浸相連塍岸久廢嵗失四萬三千餘斛乞招誘流民疏導耕墾從之宋史十二年左司員外郎李椿年言經界不正十害且言平江嵗入昔七十萬斛有畸今按籍雖三十萬斛然實入才二十萬斛耳詢之土人皆欺隱也望考按核實自平江始乃以椿年為兩浙運副專委措置經界椿年請先往平江諸縣俟其就緒即往諸州要在均平為民除害更不增稅額圖寫墟畝選官按覆令各户各鄉造砧基簿詔人户田産多有契書而今來不占砧基簿者皆沒官宋史孝宗初詔州縣受納秋苖官吏多收加耗肆為姦欺方時艱虞用度未足欲減常賦而未能豈忍使貪贓之徒重為民蠧自今違犯官吏並置重典仍沒其家宋史先是常州宜興縣無稅産百姓丁輸鹽錢二百文下户有墓地者謂之墓户經界之時均紐上稅又令帶輸丁鹽絹作折帛錢至隆興元年始用知縣姜詔言令與晉陵武進無錫三縣一例隨産均輸宋史乾道八年詔溫台處徽不通水路其二稅物帛許依折法以銀折輸宋史理宗寶祐五年行經界推排於諸路由是江南之地尺寸皆有稅矣續文獻通考元取民大約以唐為法取於江南者曰秋稅曰夏稅倣唐之兩稅元史太宗定天下賦稅地稅中田每畝二升有半上田三升下田二升水田每畝五升朝議以為太輕耶律楚材曰作法於凉其弊猶貪後將有以利進者則今已重矣元史世祖至元間用姚元之請命江南稅糧依宋舊例輸綿絹雜物是年又用耿左丞言全輸米三之一餘並入鈔以折焉以七百萬錠為率其輸米者止用宋斗斛蓋以宋一石當今七斗也元史二十四年減揚州省嵗額十五萬石以鹽引五十萬易之元史二十五年募民能耕江南曠土及曠公田者免差役三年輸租免三分之一元史二十八年命江淮寺觀田宋舊有者免租續置者輸稅元史募民耕江南曠土户不過五頃官授之劵俾為永業三年徴稅元史成宗元貞間始定征江南夏稅之制於是秋稅止命輸租夏稅則輸以木棉布絹絲綿等物其所輸之數視糧以為差糧一石或輸鈔三貫二貫一貫至一貫五百文一貫七百文元史大德間江南民户有田一頃以上者於所輸稅外每頃量出助役之田嵗收其入以充助役之費謂之助役糧是時江南嵗入之糧約四百四十九萬四千七百八十石鈔五萬七千七百三十錠四十貫又詔括江南隱蔽田令輸租又詔江南佃户私租太重以十分為率減二分永為定例續文獻通考明太祖吳元年丁未春二月太祖謂中書省臣曰豫嘗厯觀田野見人民凋敝土地荒蕪失業者多蓋因久困兵革如太平應天諸郡乃吾渡江開創之地供億先勞之民其有租賦宜與量免省臣傅瓛對曰恤民王者之善政主上念之及此真發政施仁之本續文獻通考丁卯冬十二月魚鱗册成初太祖既定天下遂覆實天下土田造成册籍既而兩浙及蘇州等府富民畏避差役往往以田産零星花附於親鄰佃僕之户名為貼腳詭寄久之相習成風鄉里欺州縣州縣欺府奸弊百出名為通天詭寄而富者益富貧者益貧矣太祖亷知之遂召國子生武淳等往各處隨其稅糧多寡分為幾區區定糧長四人乃集糧長暨耆民躬履田畝以量度之遂圖其田形之方圓大小次書其主名及田之四至編彚為册號曰魚鱗册至是册成以進百弊始絶續文獻通考洪武初令官田起科每畝五升三合五勺民田每畝三升三合五勺重租田每畝八升五合五勺蘆地每畝五合三勺四抄草塌地每畝三合一勺沒官田每畝一斗二升續文獻通考洪武三年六月上諭中書省臣曰蘇松嘉湖杭五郡地窄民衆細民無田往往逐末利而食不給臨濠朕故鄉也田多未闢土有遺利宜令五郡民無田産者往臨濠開種就以所種田永為已業官給牛種舟糧資遣之三年不徴其稅於是徙者四千餘户續文獻通考七年減蘇州松江嘉興湖州四府稅額先是張士誠竊據其地而蘇州尤稱富庶徐達常遇春等統精兵二十萬攻之數年始下太祖怒其附寇持城不降乃取諸豪族租簿俾有司加稅故蘇賦特重而松江嘉湖次之蓋以懲一時云至是命户部裁其額凡一畝科七斗五升至四斗四升者減十之二四斗三升至三斗六升者俱止徴三斗五升其以下仍舊續文獻通考十六年三月復鳳淮繇賦視豐沛鄭曉吾學編十八年令京畿及兩浙官田凡折收稅糧鈔五貫准米一石絹一匹准米一石二斗金一兩准米十石銀一兩准米二石棉布一匹准米一石苧布一匹准米七斗明㑹典二十四年令應天太平寧國鎮江廣德五處官田稅糧自後減半徴收明㑹典三十年更定鈔三貫五百文準米一石金每兩准米二十石銀每兩准米四石棉花一斤准米二斗明㑹典成祖永樂十一年令各處折徴糧金每兩准米三十石闊白棉布每匹准米一石五斗明㑹典宣宗宣德四年詔各處官田每畝舊例納糧一斗至四斗者各減十分之二四斗一升至一石以上者各減十分之三明㑹典令應天蘇松並浙江屬縣等處逺年拖缺稅糧每絹一匹准米一石二斗棉布一匹絲一斤鈔五十貫各准米一石苧布一匹准米七斗棉花一斤准米二斗明㑹典英宗正統元年令浙江直𨽻蘇松等處官田准民田起科每畝秋糧四斗一升至二石以上者減作三斗二斗一升以上至四斗者減作二斗一斗一升至二斗者減作一斗續文獻通考詔令直𨽻蘇松等處官田准民田起科蘇松遂減秋糧八十餘萬石他府有差明通紀四年奏准江西浙江福建並直𨽻蘇松等府凡官民田地有因水坍漲去處令所在有司逐一丈量漲出多餘者給與附近小民承種照民田則例起科坍沒無田者悉與開豁稅糧續文獻通考十年令應天蘇松等府州該徴草束內折色米豆量為存留本處備用其本色起運户部交納者每束折銀三分明㑹典按此即條鞭內馬草之項附各府州馬草數應天府馬草三十七萬六千四百五十八包二斤九兩四錢零蘇州府馬草五十三萬八千四百一十四包六斤八兩七錢零松江府馬草三十一萬六千二百五十一包五斤二兩五錢零斤常州府馬草七十一萬四干三百六十九包五一十兩七錢零鎮江府馬草一十二萬七百八十四包四斤一十兩二錢零廬州府馬草九萬八千三百三十七包一十二斤一十三兩零斤鳳陽府馬草二十三萬四千二百九十三包四二兩八錢零淮安府馬草四十五萬四千七百二十包三斤三兩四錢零斤揚州府馬草三十四萬九千二百三十六包六七兩三錢零兩寧國府馬草七十九萬八千六百三十二包七零池州府馬草九萬八千三百六包七斤一兩零斤太平府馬草三十五萬五千四百四十九包五一十五兩五錢零安慶府馬草一十九萬一千九百七十三包五斤八兩六錢零廣德州馬草三十萬三千四十五包九斤五兩七錢零百徐州馬草一十萬包四滁州馬草五萬六千四四十一包九斤一十兩零和州馬草二萬六千二百三十八包五斤十三兩一錢金花銀即國初所折糧者俱解南京正統五年始自南京改解內庫夏秋麥米共四百五萬九百一十九石一斗一升二合每石折銀二錢五分共折金花銀一百一萬二千七百二十九兩七錢七分八釐一毫明㑹典孝宗𢎞治二年令應天府上元等七縣官田糧每石減耗米二斗五升民田每畝勸出米二升鎮江府丹徒縣官田糧每石減耗米二斗二升民田每畝勸出米二升丹陽縣官田糧每石減耗米二斗民田每畝勸出米二升金壇縣官田糧每石減耗米二斗民田每畝勸出米一升二合太平府當塗等三縣官田糧每石減耗米二斗五升民田每畝勸出米一升寧國府宣城等六縣官田糧每石減耗米三斗民田每畝勸出米一升廣德州並建平縣官田糧每石減耗米二斗民田每畝勸出米一升五合續文獻通考十七年令蘇州松江常州三府闊白棉布以十分為率六分徴本色四分每匹折徴銀三錢五分解部明㑹典十八年時嘉興知府趙瀛建議田不分官民稅不分等則一均以三斗起徴應天巡撫歐陽鐸乃與蘇州知府王儀盡括官民田裒益之履畝清丈定為等則所造經賦册以八事定稅糧曰原額稽始曰事故除虛曰分項别異曰歸總正實曰坐派起運曰運餘撥存曰存餘考積曰徴一定額以三事定均徭曰銀差曰力差曰馬差徴一者總徴米銀之凡而計畝均輸之其科則最重者不能盡損為遞減耗米派輕齎輕者不能加益為徴本色遞增耗米時豪右多梗其議學士顧鼎臣獨以為善曰是法行吾家益千石輸然貧民減千石矣不可易也由是官田不至偏重而民田之賦反加矣王鴻緒明史稿𢎞治年間應天府官田一萬九千九百六十四頃三十九畝四分四釐民田五萬九頃六十八畝七分四釐五毫一絲夏稅小麥一萬一千六百五十四石四斗四升五勺五抄五撮綿絲折絹一千二百一十四匹一丈六寸九分二釐八毫農桑絲折絹一百四十三匹二尺七寸三分四釐四毫秋糧米二十一萬五千一百五十九石八斗四升七勺四抄蘇州府官田九萬七千七百八十六頃三十五畝三分六釐三毫民田五萬七千四百六十三頃六十二畝四分六釐三毫夏稅小麥五萬三千六百六十三石九斗一升一合二勺八抄五撮絲綿折絹六百九十七匹三丈三尺五寸七分稅鈔三千二百六十七錠七百一十五文九分農桑絲折絹一百六十七匹二丈一尺六寸一分六釐秋糧米二百三萬八千三百二十三石一斗五升一合七勺常州府官田九千四十一頃五十五畝六分八釐四毫民田五萬二千七百三十六頃一十九畝八分八釐夏稅小麥一十五萬四千三百八十七石一斗四升九合六勺絲綿折絹一千五百七十三匹一丈一尺一分七釐一毫麻布二千七十七匹二丈六尺六寸五分一釐二毫農桑絲折絹三百二十四匹二丈四尺六寸秋糧米六十萬六千九百五十四石三升三合三勺租鈔二十四錠四百六十五文松江府官田三萬九千八百五十六頃三十三畝五分二釐九毫民田七千三百頃二十八畝三分五釐七毫夏稅大小麥九萬二千二百五十八石六斗一升九勺絲綿折絹六百九十七匹三丈一尺五寸七分稅鈔三千二百六十七錠七百一十五文九分農桑絲折絹一百六十七匹二丈一尺六寸一分六釐秋糧米九十三萬九千二百二十六石二斗三升二合七勺鎮江府官田一萬三百五十六頃八十六畝二分五釐五毫民田二萬二千三百六十五頃四十八畝九分夏稅小麥五萬四千九百五十八石七斗五升五合八勺絲綿折絹二百五匹二丈八尺六寸一一分七釐九毫農桑絲折絹一十三匹二丈七尺六寸三分秋糧米一十三萬四千八百七十六石五斗七升三合淮安府官田五千三十九頃八十六畝三分二釐六毫九絲民田九萬六千三十三頃八十七畝九釐五毫六絲夏稅小麥二十二萬八千八百七十二石二斗九升八合七勺農桑絲折絹一千四百六十一匹一丈九尺七寸七分九釐秋糧米一十六萬六千四百二十三石五斗八合四勺徽州府官田八百二十一頃五十七畝四分六釐八毫民田二萬四千四百五十五頃九十四畝六分三釐夏稅小麥五萬一千四百九十八石七斗一升二合一勺人丁絲折絹八千七百七十九匹四尺三分三釐二毫農桑絲折絹一十五匹一丈四尺七寸秋糧米一十二萬一百三十三石八斗六升三合三勺寧國府官田九千七百七十一頃八十八畝六釐二毫民田五萬九百一十一頃九畝一毫夏稅小麥二萬九千五十二石三斗六升六合農桑絲折絹三十匹二尺零絲三十三兩三錢稅絲三百四十斤一十兩七錢四分二釐六毫秋糧米七萬四千二百六十二石六斗七升一合九勺鳳陽府官田一千五百八十五頃五十六畝民田五萬九千六百七十七頃一十畝七分六釐七毫夏稅小麥九萬九千三百五十八石七斗七升五合八勺六抄五撮五圭稅絲折絹一千三百八十匹一丈八尺七寸五分六釐一毫三絲二忽五微農桑絲折絹一千三十五匹四尺一寸五分秋糧米一十一萬三千五百八石六斗五升九合一勺七抄四撮五圭安慶府官田四百九十一頃六十二畝二分三釐民田二萬一千三百九十三頃三畝八分四釐夏稅小麥一萬八千九百九石三斗七合二勺農桑絲折絹三百五十三匹二丈九尺秋糧米一十一萬二千八百六十二石九斗八升四合太平府官田四千四百五十五頃六十三畝四分二釐三毫民田一萬一千七百八十八頃一十九畝七分九釐夏稅小麥一萬六千二百七十六石五斗六升絲綿折絹一百二匹九尺六寸四分二釐秋糧米三萬三千六百三十六石七斗四升七合一勺揚州府官田七千九百三十四頃五十七畝二分二釐民田五萬四千三百六十二頃四十九畝九分三釐夏稅小麥三萬九千九百二十二石二升七合二抄農桑絲折絹八百四十一匹二丈四尺農桑零絲六十四兩五錢秋糧米二十萬六千六百三石八斗六升五合五抄租鈔五千二百四貫七十一文牛租米二石五斗廬州府官田五百六十八頃七十六畝一分七釐七毫一絲民田二萬四千八百六十一頃六十九畝八分夏稅小麥九千八百七十二石一斗四升三合九勺五抄三撮農桑絲折絹六百八十七匹一丈三尺二分六釐二毫五絲秋糧米六萬六千八百三十七石二斗一升二合六勺九抄六撮八圭五粟九微池州府官田一千八百二十三頃五十七畝四分九釐三毫民田七千九十六頃五畝六分五釐八毫夏稅小麥六千八百二十四石七斗五升七合八勺五抄二撮稅絲折絹一十五匹農桑絲折絹一百九十八匹零絲一兩一錢九分七釐農桑絲三斤一兩八錢五分秋糧米六萬一千三百七十二石八斗九升五合八勺山租鈔二百四十四貫三百七十九文徐州官田二