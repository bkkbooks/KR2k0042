body:
  text: 江南通志卷五十五河渠志淮二國朝順治九年戸部左侍郎王永吉陳導淮入海事宜附王永吉疏畧治河必先治淮而導淮必先開海口按黄水自邳宿而下至清河口淮泗之水聚於洪澤湖亦出清河口㑹黄東入於海然黄强淮弱勢不相敵淮泗逼而南趨直走四百餘里出瓜州儀眞方能逹江一線運河收束甚𦂳即有大小牐河沿途宣洩而海口不開下流壅塞來水無窮去水無路所以河隄潰決修築歲費金錢海口之當開固時刻不容再緩者也查海口之在興化縣境內則有丁溪塲劉莊塲神台塲寥家港白駒塲之斗龍港等處在泰州境內者則有河垜塲之茅墩港草堰塲之鴨兒港近丁溪塲之馮家壩合洋溝等處以上諸口俱被豪棍鹽徒漁利阻塞間有開者亦以口外築壩横欄水不通行若在鹽城縣境內者縣治東南則有石墶海口西北則有天妃海口先年俱各造有石牐又有姜家堰海口流出推船港先年亦曽議造石牐以上三處係淮揚六州縣洩水要道今石墶牐既稱逼近城郭不利風水而天妃姜堰二口復被附近奸民將牐門實塞河口塡平滴水不通咽喉重地歲歲陸沉害民病國關係匪輕而未即舉行者其故有二一則恐奸徒造言阻撓然萬水東流勢必趨下沿海州縣各有海口乃天造地設非人力所為行水河港皆有舊蹟近因湮塞未免淤淺開鑿深通還其故道豈屬刱舉况先年舊牐已圮者加工修葺未造者量議増添題定牐官牐夫以時啟閉有利無害固灼然無可疑者也一則因河道甚長河新㫖不帑有限工料既難措處民夫復奉開則河隄不决許僉派凡事甚多掣肘然海口既修牐造牐之費較之塞決修隄孰多孰少若挑濬淤淺需用人夫動輙數萬自當州縣協濟豈能盡動官帑百姓自救身家何辭力役此一勞永逸之計固士民所心悦而樂輸者也康熙七年欽差大人會同河漕二督臣勘議修築翟家壩情形按高郵州志云翟家壩屬山陽縣在周橋迤南接盱眙縣界長二十五里比高堰石工低二尺許中有古溝深不過尺許舊有石牐亦有石限止留四尺水頭水入民田不通河路近因淮水衝刷年久低陷私鹽漁户偷穵成河淮水徑入寶應湖匯於高郵歲决漕隄為患揚州府志云順治十六年歸仁隄决康熙元年歸仁隄再決時部司有開周橋牐者淮水大洩而黄河逆入清口又挾睢湖等水從歸仁隄決口入與洪澤湖相連直抵高堰衝决翟家壩流成大澗九條其水東注悉歸諸湖淮揚自是歲以灾告又按康熙三年淮溢武家墩高良澗之後以障淮刷黄為定策復議修築翟家壩至是年奉㫖令山江高寳四縣民合修復詔遣重臣㑹同河督漕督踏勘明白諸臣覆奏稱翟家壩至周家橋三十里在高家堰南地勢高亢原無隄埂為天然減水壩水漲聽其漫溢仍責令高寶等縣之民但塡平衝開決口不許一槩加工増高以塞水路此瀕淮州縣志所載之大畧也九年御史徐越疏陳高堰關係最重請大修堅築附徐越疏臣向請修復歸仁隄石工使由白洋河入黄者不止以清刷黄實為截住高家堰西北水勢使此堰僅受西南淮水而為運道民生一大屏障也今因歸仁隄工尚未舉而此堰黄淮並受前報巨浪搏擊已壞石工六十餘處而全堰幾至潰決其洪波横流排山倒海已衝開淮揚一帶數十餘處決口遂至城郭僅存闗廂陸地有水高丈餘者萬一高堰突有疏虞尚復有淮揚數十州縣之城郭乎而况民生乎尚復有漕河運道可以飛輓乎而况鹽課與商稅乎則此堰之關係如何重大此堰之保障如何要𦂳故臣今不得不亟陳高家堰也高家堰石工曩皆鑿石扣準鎔鐵灌釘後來年深日久各處有朽裂從未大修經今年一番波浪衝擊動揺處處罅損若不亟議錢粮預備物料乘今冬水勢少落之一時大修堅築明年西水漲發臣愚竊慮此堰萬難倖保堰若失守淮揚數十州縣城郭廬舍百萬生靈俱屬波臣運道梗廢京師重地所𦂳需歲漕數百萬石何道輸轉且雲梯關之海口全頼黄淮二河併力衝刷一決高堰清口必淤止餘濁流一股海口必塞下壅上潰即今日之大修兩河工程勢必仍歸潰壞此高堰之利害不僅僅在淮揚而實有關於天下者也十二年淮黄水溢決高良澗又決清水潭附布政使慕天顔備陳黄淮全局疏畧高家堰捍衞洪澤蔽於淮城之南迤西則連高良澗翟家壩中設周橋牐其地比高堰稍亢故壩牐亦比高堰稍低蓋夏秋淮水盛發高堰必危高堰危而淮地陸沉矣故不使翟壩増高正欲從壩滚水出汜光白馬高寶諸湖不惟鳯泗之漲潦可消抑且高堰之築工永固及至水平壩面即閉閘不流高寶漕隄亦無傷害徃昔防河如此周宻祗因康熙元年間南河工部分司吳煒擅開周橋奸商利通私販徃徃盗决翟壩諸處以致淮水湍下諸湖盡已盈蒲及桃花水漲湖不能容浪擊風摧漕隄大壞清水潭之決所從來矣淮水既東黄躡其後濁流西泝清口遂堙清水漸㣲黄力愈悍灌入天妃牐沙隨水漫而運道淺塞矣黄淮相背淤沙罔滌雲梯關入海之路日墊日高下流哽咽而上流四潰必然之勢也淮瀆自桐栢千溪萬壑匯為洪澤湖注出清口其水㑹黄入海者十之八引資漕渠者十之二唯清口無病則湖水直瀉而北勢盛足以敵黄而黄沙不致倒灌運道惟海口無病則黄水疾趨而東其勢迅激自無淤墊之阻而奔流不致横潰四決此以清制黄用水治水千古不易之法也十五年淮黄水溢復決高家堰淮安府志是年決武家墩版工一處高家堰石工一處高良澗版工二十七處是年修築武家墩西隄河防志武家墩東西隄明李行運新河隄也十六年河督靳輔大挑清口爛泥淺引河四道及清口以下河道直逹雲梯關又於關外築束水隄屬之大海遂塞于家岡武家墩高家堰諸大決口共十六處又建眞武廟東攔河壩長三十丈河防志因新河不復行運築壩河上以便徃來十七年刱築周橋翟壩隄工二十五里塞高良澗等大小决口二十五處自是淮水始歸故道又築高堰大壩外越壩長一百八十一丈五尺靳輔治河晝洪澤湖在山陽之西南北距大河東俯高寶諸壑淮水遠自豫省復挾汝潁渦汴羣川之水匯而入焉瀠洄激蕩惟下之是趨而其地東北為下趨而北則出清口而逹於海趨而東則高寶諸壑滔天而淮揚之民其魚矣漢末陳登為廣陵守大興水利首建高堰障其東而使之北淮南千餘里地無沮洳後世治水者皆守其舊而不變自唐以來南北通運至宋黄又徙而南湖日寛廣成巨浸而是堰之所係愈重慶厯間一修於發運使張綸明初再修於平江伯陳瑄至萬厯間河臣潘季馴復大修之且砌以石者三千餘丈愈鞏固焉顧西南一帶自周橋至翟壩三十里空之而弗隄曰此處地形稍亢天然減水壩也但當時湖底深而能納雖不築隄湖水常低於㟁面惟遇異漲始溢而出故季馴又曰周橋漫溢之水為時不久諸湖尚可容受也迨黄流倒灌之後湖底墊高湖水亦因之而高况決口九道淌刷成河地形愈陷以愈高之湖放愈陷之地於是此三十里稍亢之區昔所稱漫溢不久者今且終歲滔天東注而不止不特清口之力分無以敵黄而淮且反引黄水以俱東二瀆交騰高寶諸湖盈科而不受此清水潭所以大決而不可塞而下河七邑遂同溟渤也臣奉命大修將諸決盡塞自清口至周橋九十里舊隄悉増築高厚并將周橋至翟壩三十里舊無隄之處亦刱隄之葢今日之地形水勢與明萬厯間大異即使季馴而在今日亦未有不隄者也然仍舊減水者六處計二百丈壩之而弗隄何也湖水之高於黄水者常五六尺若一任其建瓴而出則所蓄無幾一逢旱亢上源㣲細既不足以濟運更恐黄水之乘其弱而入故爛泥淺一帶湖灘昔人稱之為門限今不使盡闢欲清水常留有餘然設遇大水連旬洪波驟溢清口一道之所出不勝數百里全湖之漲勢必尋隙而四潰故隄以防之不虞之溢復壩以減之然後節宣有度旱不致於阻運而澇不至於傷隄也雖然洪澤周圍三百餘里合阜陵泥墩萬家諸湖而為一又上受全淮之委空濛浩瀚毎西風一起怒濤山湧而以一線之長隄捍之浪頭之所及土潰石卸雖歲歲増高培薄終不能禦竊思水柔物也惟激之則怒苟順之自平順之之法莫如坦坡乃多運土於隄外毎隄高一尺塡坦坡八尺如隄高一丈即塡坦坡八丈以塡出水面為準務令迤斜以漸高俾來不拒而去不留是年秋黄水大漲奇風猛浪倍異尋常而洶湧之勢一遇坦坡而其怒自平無所逞其衝突始知坦坡之力反有倍蓰於石工者故障淮以㑹黄者功在隄而保隄以障淮者功在坦坡也唯是塡積坦坡以來垂及十載風濤之所汕刷平鋪卸去離隄已四五十丈矣若用帑塡積既所費不貲又工程難見應毎年著河兵歲夫逐漸加工立為定制毎歲隄工一丈塡土二方務使所増之數適稱所耗之數則善矣久而久之離隄百丈之內必漸墊而高因叢植栁蘆茭草之屬俟其根株交結茂盛蔓延則雖狂風動地雪浪排空終不能越百餘丈之茂林深草而潰隄矣附多𢎞安修築高堰隄工記高堰在山陽縣之西南所恃以砥淮泗之衝流奠淮揚之墊溺者於是乎在益淮水自桐栢而下合汝蔡淝潁諸大川及淮南七十二山谿之水而抵泗盱匯洪澤出清口以匯於黄厯安東雲梯關入於海苟任其水清流疾保無壅決之患也惟黄河挾數千里奔騰之勢其力足以遏淮使淮少弱則將却流而東潰高堰決淮揚勢所必至也淮既旁趨濁流即內灌裏河淤塞運道且黄乘淮後并勢南趨則清口之流日緩海道之淤日積黄淮交横於淮揚千里之間而運道遂茫然而不可問矣是病淮而併以病運者莫如河而敵黄即所以利運者莫如淮故治淮乃治河治運之先務而治高堰尤治淮之首圖昔人以高堰為淮揚門戸職此故也予以山盱壩堰同知受事於康熙十六年之二月謝事於二十一年之六月凡竭蹷於河事者五載有奇雖胼手胝足不敢言勞而述水勢紀成功以告後之有事於斯堰者亦有司之職也於是計其所施功之地曰武墩決口為丈七十有七曰高堰決口為丈一百八十有餘曰六安溝曰侯二門曰孫家西北曰孫家西曰管家西曰小黄莊曰小黄莊南曰冝興集曰鄧家馬頭曰周家馬頭曰周家西曰高梁澗曰楊家馬頭凡大小決口二十為丈者四百七十有三曰三壩南曰四壩北曰陳家西曰畢家西曰六壩南曰朱家灣北曰周橋牐廟後凡決口三十一為丈者五百有八曰翟壩至周橋以里計者二十有五皆與高堰相為表裏之隄防也自清口至雲梯關數百里葭葦榛蕪此而不疏將高堰之隄防雖完而淮水之歸途猶阻恐終將旁溢而為患耳况以黄流駕淮濁沙淤墊而淮出清口之故道如爛泥淺裴家厰皆壅塞成渠其何以疏逹淮流於是乎核深計淺以治爛泥淺諸故道裏河為漕運咽喉日久不濬則無以容淮流而致他變於是乎畫地分叚算方刻期以治運河并修築兩㟁及雁翅諸工此又與治淮相終始之工役也溯其施工之時則十五年黄淮横溢衝決高堰三十四處并潰高寶運隄在予受事之先而予之始事於武墩次事於高堰在十六年皆三閲月而告竣次事於六安溝諸口自十六年仲夏至十七年春杪凡十月而告竣次事於翟壩周橋自十七年冬至明年八月而告竣蓋予五載之間其櫛風沐雨䝉霜冒暍構葦水濱身行泥淖中者凡三載至十九年秋於是諸工次第告成二瀆順軌頓還舊觀回思當日波濤山立風雨怒號旁觀者魄震魂驚靣無人色予亦茫然未知所税惟是殫心竭智大聲疾呼以與風浪爭衡於危急存亡之際者固不憚以身狥之而其最烈者則十六年之秋淫雨不休西風大作十八年之冬久雨之後繼以大水怱發颶風狂煽五日之間水高冐堰一綫長隄危同懸縷予終日跣行驚濤過顙氷結腰領間不知也事後思之曽何異强敵當前石矢交下而獲保無虞抑亦幸矣此其經畫指授則皆出自河憲靳公如武墩一口洶湧騰沸久無成績公甫視事即命於下流稍緩之處直築攔河大壩一道壩成再堵決口於是人力可施及水勢漸平遂獲奏功高堰之决也隄之內外湖波蕩漾畚築無所施公檄造土船數百給庸募夫葦木草束一時俱辦事賴以集又徃時運口在甘露城旁尤屬黄淮交㑹之地故毎值黄水盛或西北風起未免倒灌歲有閉牐築壩之煩公相度形勢命予酌改運口於爛泥淺之上挑河一道𦂳接淮水遠避黄流外築大隄以通牽輓又築横隄以防河漲自此黄河無逆入之患而運河亦免歲挑之煩矣至翟壩以至周橋成河九道葢明萬厯間有分黄導淮之議致淮之旁流愈多正流日弱刷沙無力黄流益横淤沮運道所由來也公於十六年冬命予加築大隄於一帯湖陂又塞周橋高澗牐座仍於隄外增築坦坡以固隄址使清淮涓滴無所旁洩而蓄其全力以攻久積之淤沙凡諸碩畫雖昔平江諸公不能過也予皆仰禀成算幸無隕越而至於惴惴小心夙夜不遑則不敢以不勉在工諸員大小不一予不以體勢相臨惟以情意職事交相勸勵共襄乃績他如挑土壓埽工多則費帑工少則廢事予毎先期一日行諭村民毎夫給銀四分以砲聲為期畢集工所埽下即散故得不靡帑而事辦其有決口既多取土為艱者予徃來督視就水消土露之處令遠者以木為橋度水挑運以濟舟運之窮稍近而水淺者令於水中塡出土埂千餘道以濟橋木之窮至堵築肯綮尤在中泓合龍之際勢將収則水勢洶湧十倍於時下埽如兩軍對壘事争毫髪苟或人料参差患在走埽一埽既動諸埽從之予惟先事而戒罔或弗備閉泓之日間值風雨則揮從却蓋露立水次不使有一夫之懈夜則倍其工食天子勤則加其犒賚故人役之效命蓋亦鍳其誠焉要皆之庥福河憲之訏謨小臣獲告無罪不勝厚幸謹記如左凡在工各員備著勞績並勒名碑陰以志共襄王事云十八年河督靳輔疏報翟壩合龍奉㫖據奏翟家壩成河九道盡行閉合龍門具見殫力籌畫有禆河務深為可嘉十九年復大挑清口爛泥淺裴家厰帥家莊引河四道剙建周橋高良澗武家墩唐梗古溝東西減水壩共六座淮安府志是年大挑引河四道皆成大河淮水始全出清口暢注㑹黄二十二年築南攔河壩長三十四丈河防雜説自山陽縣武家墩北厯高家堰高良澗周家橋古溝唐梗至盱眙縣翟家壩一帯隄工有石工樁工土工共長一萬五千六百四十四丈六尺內惟高家堰最窪康熙二十二年伏秋大漲之際高堰水深一丈二尺有餘石工頂上水深數寸或一二尺不等樁工水與管木相平即有簽樁極高者亦不過露頂尺餘若以前當此異漲則頃刻潰決東洩而是年厯八月之久得保無恙者一則恃挑工加築之子隄尚高過水面三四尺不等人夫有立足之地可以用力修防也一則賴挑土塡築之水內坦坡擁䕶隄根石縫不至過水石工之內尾土無蟄陷之虞石工之外風浪有消殺之勢樁不至於拔起土不至於全傾也一則藉減水壩六座隨長隨減水深至一丈二尺外而止不至更為加長也各工俱濵臨洪澤大湖所以捍一望無際之水須於頂衝之處預備物料加意堅築以圖永遠又自武家墩北至翟家壩隄工毎毎上年加高一尺則次年湖水亦必加長一尺仍復漫隄而過是以前朝潘季馴將古溝翟家壩二十餘里之地不築障水大隄止加三尺高之小堰使水小之時由湖下注水大之時漫堰而去也然明時黄河尚深湖水易出近來黄河墊高徃徃頂住湖水不得暢注故不特三尺高之小堰皆衝洗無存而又衝成河九道髙良澗高家堰一帶之樁石工亦復不時潰決於是清水潭隨圮隨塞築而復圮今於臨湖一帶修建減水壩六座計其洩水之地武家墩壩長十丈高家澗壩長十丈二尺周家橋壩長十四丈古溝壩長三十四丈五尺古溝西壩長五十三丈五尺唐梗壩長四十八丈二尺當高堰湖水止深八尺以上之時雖建此六壩可使湖水涓滴不洩以為敵黄之資及湖水長至八尺五寸以上始從壩底漸減方二十二年淮流滔滔下注厯八月之久而隨長隨減不至壅積漫隄者實此各壩減水之益但湖水長至一丈二尺外再欲加高修防費力再添建五十餘丈長之減水壩一座即使將來湖水極漲之時深不出一丈二尺之外多一處減水自然不致壅積漫隄且易防守也二十三年十一月初十日聖駕南廵閲高家堰工上以風浪利害問河臣靳輔照黄河險工下大埽防䕶如何靳輔回奏云大埽亦總為大浪掣去庶㡬下丁頭埽攩䕶亦要毎年修補二十八年聖駕南巡諭高堰石工着修理三十年命博濟李光地徐廷璽勘閲河道三十一年二月工部議覆戸部侍郎博濟等疏內應准修理高堰工程奉俞㫖行附工部覆奏畧博濟等疏稱高家堰減水壩六座內有古溝東減水壩底被水衝損其三官廟等六口向來下埽今改竹絡已完三處尚有未完應令照此修完七里閘雁翅以內底石被水衝損二丈有餘應令河臣速行修理太平牐并傍束水壩仍應令酌量開放十一月二十四日奉㫖高堰障淮敵黄關係最為𦂳要若使隄內受水則內外浸灌衝激甚屬危險髙堰之隄不固雖另増隄數層有何禆益這運料小河増加隄㟁無用高堰應作何加修以期永遠堅固應遣大臣前徃察視十二月初一日奉㫖着張玊書圖納去三十四年剙築鹽壩長五十八丈五尺三十五年河臣題兩河見在情形奉㫖著江南總督漕運總督江寜安徽巡撫公同速行會勘確議具奏奉㫖河工關係重大這㑹勘應修應築工程俱着照該督等所題作速興工該部即將錢糧撥給附督臣等議畧查清口為黄淮門户引清敵黄所係甚大祗因爛泥淺帥家莊裴家塲三道引河勢分力弱毎逢倒灌動輙淤墊應從大墩接築長隄挑濬裴家塲引河逼令全湖之水匯歸出口併力敵黄自清口厯武家墩高家堰高良澗徐壩以至翟家壩除小黄莊以南新石工見興砌外其武家墩元帝廟後隄工卑窄昔為沙灘今成巨浸急應加幫高寛舊石工五千八百餘丈內倒卸石工八百七十八丈急應修砌又石工頂上排樁之內加以木版塡築土方再於堰隄之上已築子隄者普面加高未築子隄者一律加築隄𠂻內戧霪雨淋漓亦應如式酌修茅家圍等減水六壩應加修砌并添設磯心建置牐版淮弱則下版蓄水以敵黄淮漲則啟版減水以宣洩翟壩一帶隄工低窄不堪今秋異漲漫隄過水均應加幫三十六年築山清交界東攔河壩長四十丈河防志因毎歲修葺西隄築此以便取東㟁之土三十八年三月聖駕南巡閲視高家堰諭大學士伊桑阿等朕念河道國儲民生攸關親行巡幸由運河以至髙家堰運口等處留心細閲見運口太直黄河倒灌兼之湖水淤墊以致清水不能暢流各河與洪湖之水如何得能敵黄若將清河至惠濟祠掃灣由北㟁挑引入惠濟祠後入河而運河再向東斜流入惠濟祠交匯黄水如何能得倒灌今應將清口之西壩臺加添挑水壩修築堅固加長過於東壩臺將清口安置裏邉洪澤湖擇其水深之處開直成河使湖水流黄河灣曲之處直挑引河使各險處不得受衝四月二十四日河督于成龍協理河道府尹徐廷璽奉上諭髙家堰速速修完下河田地不過一二年可以見出九月十三日上諭今歲朕南巡看得黄河逼近清口黄水毎多倒灌以致淤墊洪澤湖水不出自髙堰各壩流入髙寳諸湖自髙寳湖流入運河以至下河田地盡被淹没淮揚所屬錢糧雖頻年蠲免賑濟動帑修理隄㟁羣黎尚在水中朕深為軫念遂諭于成龍動帑挑濬洪澤湖出水隄㟁令其完工近差工部官員前往查勘清口仍然淤墊洪澤湖水仍東出口隄㟁尚未告竣等語清口甚為𦂳要如不將清口挑濬湖水不出髙堰隄工并運河隄工雖加髙厚均屬無益董安國所挑之河再加挑濬此河如不可挑或將清口迤北逺移挑濬之處大學士九卿詹事科道㑹同看閲河圖速行詳議具奏張鵬翮河防志大學士等㑹議得黄河逼近清口是以淤塞應作速挑浚不可不將黄河移逺應請勅下總河于成龍等將清口挑濬令其出水或將黄河移遠清口或即將董安國所挑之河再加挑濬詳看趁今冬急為興工不至水長之處定議具題總河題覆九卿復議得河道總督于成龍等疏稱清河縣石人溝以上沿河盡係淤泥深有七八尺餘不等人夫無立足之地難以施工臣等再四思維竊以黄河大溜勢若排山若遠移改挑工大費繁且清口對過北㟁一帶積水淤沙畚鍤難施臣等見挑裴家塲爛泥淺等引河不日可竣乂堵閉唐埂等處減壩應俟各壩堵塞之後使湖水不能東洩引出敵黄以免淤墊之患再將董安國所挑引河復加挑穵挑水壩再為接築黄水由引河而趨北㟁可無倒灌之虞至於遠移改黄之處統俟湖水出後酌定形勢另行奏請遵行相應均如所題動帑挑築奉㫖依議附户科給事中張睿疏畧皇上命前河臣董安國等將黄河灣曲處挑引水河一道使水直下遠避清口免其倒灌此非臣下意計所及但新挑引河必俟水汛大發始行開放則刷沙有力不致復淤恭讀上諭清口甚為𦂳要如不將清口挑濬湖水不出高堰隄工并運河隄工雖加高厚均屬無益眞洞鑒全河瞭若指掌臣聞居民傳說中河水從仲莊出口建瓴之勢逼溜使南是以直射湖口不獨清水難出而黄水反易入則欲挑浚清口不得不藉中河之水以制黄河之水矣又讀上諭謂將董安國所挑之河再行挑濬或將清口迤北逺移挑浚之處速行詳議臣恭繹再四有分黄導淮之法蓋黄分則勢弱清口不當頂衝從此疏浚不難其分黄不必另闢河通於仲莊牐下之中河自清河起至山陽草灣止約長七八千丈挑寛至二十丈上口縷隄穵通使黄水由此分洩下口亦穵通縷隄仍歸大河㑹流入海再於縷隄上下口建立䨇版石牐以時蓄洩則中河由此去黄河亦由此分北岸水勢既殺南岸水勢必趨而北董安國所挑新河自可刷深直下再清口去其淤墊引湖水暢洩不獨清口東下刷黄濟運而唐埂六壩過水漸小周橋翟壩亦易修築閉塞庶免下河皆墊之憂如云河不兩行分則力弱緩則沙停非所論於清口以清刷黄原取其弱以水攻沙不患其停况建俞㫖下牐又可蓄洩也奉河臣議行之十月二十日總河于成龍等疏陳兩河隄㟁修治情形奉㫖朕撫御寰區愛養兆民視同赤子務期無一人不獲其所比年淮揚所屬地方罹于水患百姓田廬俱被淹没生業蕩然朕懐深切軫念屢經蠲租賑濟乃黄河墊高清口底下淮水不能流出百姓仍被水災弗獲寧處念此淮揚數州縣生靈豈可不急為拯救乎今海內無事淮河工最為𦂳要水患未平民生失所朕用是時厪於懐若何修理河道以濟生民爾等九卿詹事科道各官亦宜念切頃問南省來人云黄水比淮水高一尺有餘若將高堰隄㟁增加堅築以束淮水使刷黄而行亦似有益但淮水瀦聚而黄河桃汛又至則高堰危險亦未可定今或堅修高堰隄㟁以束淮水使之刷黄或移清口於清江之左右或另濬河道以通舟楫俱宜一一講求此事關係甚鉅爾等會同九卿詹事科道等官細閲河圖詳議再將二本一并議奏廷議令河臣詳勘定議奉㫖河工關係重大豈惟另尋河道不可得從新剙作亦屬繁難高堰隄㟁縱多方堅築清水亦不能出今惟當議移清口於他處兩㟁俱用石工堅砌使清水流通朕南巡時曾以另開清口面諭于成龍于成龍亦奏稱淮水可從武家墩向清江浦移改此事著總河于成龍及府尹徐廷璽㑹同河道各官詳看清口當移於何處所用石工等項作速辦備著即詳議於歲前具奏餘依議十二月十七日工部等衙門會覆侍郎常綬等疏奉㫖若將高堰減水壩堵閉建造滚水壩土隄加幫高厚則湖水必高黄水又大湖水不出之時高堰隄工危險而泗州等處必至水淹着大學士九卿詹事掌印不掌印科道㑹同確議具奏三十九年三月工部等衙門㑹覆兵部尚書范承勲等疏奉㫖這挑浚運料小河將何處水引入水又從何而出並未聲明這事情并武家墩等處隄工事理俱行文范承勲等㑹同總河于成龍等詳細速議具奏㑹議得高堰隄工武家墩至小黄莊即日興築惟是清口黄流倒灌見在打壩禦黄若遽將周橋至棠棃樹內三壩全堵淮水無處宣洩而壩口之隄單薄必難捍禦議暫留夏家橋一壩再於棠棃樹以西暫築裹頭草壩備伏秋漫溢水消堵閉六壩一帶地方最為危險修防刻不可緩其再挑引河一道應俟清水河出之時兼工挑穵部覆均如所議仍請將黄淮两河并高堰作何修治禆益運道民生之處或别有善䇿令前徃河工大臣河道官員公同詳議奉㫖這本內事情着行文前徃河工尚書范承勲等會同河道總督這所議可否伊等意見又復如何之處速議具奏將董安國所挑引河再行挑濬堵閉黄水倒灌清口之日或將清江牐堵閉及查看修理更樓決口等工着侍郎常綬前徃看閲具奏四月總河張鵬翮疏請開張福口引河並建牐廷議應如所請奉㫖依議速行附張鵬翮疏畧清口為黄淮交匯之處目今粮艘北上最為𦂳要今河身淤墊竟成平陸清水隔絶不通獨有黄水流入運河深不過三尺五寸四尺不等兹部臣常綬議築攔黄壩粮艘過盡竟行堵塞使黄水不入運河再將裴家塲三處引河開浚廣寛深通引清水入運河是亦權宜之計臣相度形勢博採輿論僉云黄河北裴家塲引河身高爛泥淺係流沙旋挑旋淤裴家塲與帥家莊相連不遠即開浚深通當夏秋黄水大長力强之時引河清水終虞力弱不能相敵應於張福口挑引河一道長一千五十丈面寛十丈深一丈餘或八九尺不等引清水於黄河口相近處入運河勢在裴家塲引河之上上下水勢相濟當夏秋水長之時兩處清水交合庶可敵黄蓋因清口淤塞之後甚為廣闊非多挑引河鮮克有濟比之引湖水入江既有金灣三牐之河又有鳯凰橋䨇橋灣頭等四處之水引入人字河芒稻河水勢得以暢流入江此成法之有效者也故宜開張福口引河以導清水使之暢流建牐一座以時啟閉趁今水勢未長兼工挑濬張鵬翮摺奏應修工程一六壩之宜閉也逼清水出口以㑹黄入海其關鍵全在六壩而六壩之最要者尤在夏家橋一壩以全湖水勢趨此故也今夏水方盛若急於堵塞一則高堰隄㟁危險可虞一則湖水洶湧恐旋塞旋衝費金錢可惜日前正須備料俟水落堵塞庶為萬全之計一高堰之滾水壩宜修也高堰容納七十二處山河之水古人設壩原以洩異漲之水非以洩平漕之水也今冬六壩已閉來年桃汛黄淮並漲宣洩湖水非壩不可按南河志云武家墩高良澗周家橋古溝俱設有牐又河防一覽云翟家壩地亢為天然滚水壩今周家橋高良澗等牐俱已堵塞臣親至翟家壩見湖形漸淤水勢不由此出是古今變遷不一翟家壩亦非出水之處也前河臣將六壩改為四散水壩臣覆加相度地勢相去不逺併為三滚水壩亦屬妥協今宜備辦石料修建於壩下就原有草字河唐曹河開為引河并築順水堤則民間田廬無淹没之虞一武家墩至小黄莊之石工宜加砌也查此一帶臨河舊有石工僅出水面二三尺不等必湏加砌使髙與小黄莊見修石工一律齊髙至一古溝至六壩之石工宜修也查臨湖石工古溝而止自此迤下俱係土隄毎年歲修搶修靡費錢粮似宜修砌石隄在目前用帑雖多然計之數年之後可省歲修之費宜於滚壩告成之後漸次修舉一歸仁隄臨湖石工加灰抹縫尚有罅隙樁朽之處飭其補砌滚水壩一座尚未修築有涵洞缺口洩水盡入洪澤湖故白洋地方可無水患若將缺口堵塞水無去路現在訪求出水之處另疏奏聞行水金鑑張福口引河挑一千五十丈之外又挑河一百八十五丈𦂳接上港湖水處方能引水暢流其河頭舊隄有水口四處共長四十七丈必湏堵塞方不使湖水散漫盡歸引河河尾先接草壩方可束水濟運十一月初一日總河張鵬翮奏閉髙堰六壩附張鵬翮疏臣遵㫖督修髙堰隄壩將六壩已閉其五夏家橋堵閉過半今於十月十九日臣親徃髙堰六壩一帶催工見湖水長至三尺臣由陸路至老子山觀淮水出洪澤湖之處一望汪洋無際通湖水長三尺詢之土人云因閉壩故爾水長若再加長堤工單薄可虞臣一面令夏家橋口門緩緩進埽以便分修官上𦂳臨湖鑲柴仍催尅期竣工足禦風浪即合龍門於二十一日馳至清口見引河水勢加長臣令河兵新穵之三㲼河及疏通河口引水入爛泥淺帥家莊等河身俱已有水而張福口裴家塲二引河水長盈滿測量水平引河水高於黄仍將張福等河口之水匯入裴家塲引河一處俟其水聚力强足以敵黄於二十四日西南風起引河水驟長比黄水高一尺一寸臣率道㕔等官親放引河之水暢流入於運河臣擬俟回空粮船過完將運河頭壩堵塞逼清水出黄另疏題報但夏家橋口門堵閉後六壩水勢較今更為加長平漕之水足以敵黄溢漕之水應行宣洩因三滚壩尚未修成轉盼水凌桃汛之水又至設遇西風鼓浪無處宣洩何以保固隄㟁公議於翟家壩原有天然滾水壩之處地亢土堅仍留天然滾水壩寛百十餘丈用埽裹住兩頭平漕之水蓄以濟運溢漕之水聼其滾去出唐曹河入白馬湖若伏秋水大再於蔣家壩盡頭處原有之清水溝河以及涵洞酌量開放若水小仍閉塞總以臨期相機而行務期有裨隄防再查六壩口寛二百八十丈今清口引河共寛三十餘丈不足以宣洩全湖之水應發帑再開寛闊使水暢流敵黄至於運河伏秋水漲應由涇河澗河洩出射陽湖入於海此二河見在挑浚應將涇澗二牐動帑修補以資啟閉初十日張鵬翮奏報黄淮交㑹附疏畧臣凛遵聖訓指授方畧明晰周詳先疏海口水有歸路今歲黄水不出岸矣繼桃芒稻河引湖水入江高寳一帶水由地中行矣再闢清口開張福口裴家塲等引河淮水有出路矣又加修高堰堵塞六壩逼清水復歸故道於十月二十四日引張福口等河㑹入裴家塲河開放清水流入運河再將湖頭疏浚深闊以迎洪澤湖大溜又將張福口引水入裴家塲之處再桃寛深水大勢旺迅流暢沛今於十一月初三日直敵黄水暢流入運河矣運河之中純係清水已無黄水灌入臣於初九日自下河回至清口見水勢暢流大半入黄小半入運一水兩分若有神助官民快覩淮黄交㑹白叟黄童歡聲若雷皆皇上軫感頌我民生宵旰憂勤精誠上孚天心河神效靈念國計之所致也十三日張鵬翮奏善後事宜下廷議應如所擬奉㫖依議速行附張鵬翮疏畧我皇上聖謨獨斷指授治河方畧以至淮黄交㑹但善後之計尚應講求者見在諸引河之水勢聚而力强故足以敵黄而直出運口但大半出黄少半濟運一水兩分當伏秋黄長之時恐清水之力稍㣲臣率河官部員親行相度應於張福口裴家塲二引河空地中間迎湖大溜之處再挑引河一道面寛二十丈底深一丈㑹入一河出口敵黄俾清水之勢常强而禦黄有力將爛泥淺㑹入三汉河從七里河出文華寺運河專以濟運衆議僉同實屬可行是年鑲柴修築六安溝外越壩長一百八十一丈五尺又塞周橋以南舊減水壩六座别建滾水石壩三座上下兩座金門口寛各七十丈中一座口寛六十丈又建天然壩草壩二座一口寛六十丈一口寛六十二丈三尺開武家墩至周橋大隄內運料小河河防志前河臣靳輔開穵未成是年部臣題准即以挑河之土築大隄又因水淺未能通舟於四十一年加挑四十年二月從總河張鵬翮請加幫武家墩至運口隄工剙築新大墩至裴家塲攔湖壩一道附張鵬翮疏畧武家墩至運口隄工捍禦湖水風浪最關𦂳要今六壩堵閉全完洪澤湖水勢盛出遶流武家墩一帶隄根而舊隄卑矮單薄難資捍禦必須作速加幫高厚簽釘排樁與高堰隄工一律相平又新大墩至裴家塲從前未有隄工應剙築攔湖壩一道方可束水禦浪敵黄濟運三月初九日張鵬翮奏報清水盛出情形附張鵬翮疏畧臣欽奉聖訓指授治河方畧堵閉六壩大闢清口引清水暢流出口㑹黄入海濟運通行今三月初二初三初四三日桃汛已至黄淮並長清水盛出敵黄有餘但六壩閉後全湖蓄水隄岸卑矮者離水面二三尺高者離水面五六尺不等西風鼓浪危險堪虞應將卑矮之處再行加幫其天然滾水壩尚未開放欲其蓄水敵黄若湖水再長相機開放以保隄工初八日臣查清口形勢武家墩三汉河爛泥淺裴家塲張家莊湖頭水勢相連沛然而出面寛數百丈直繞大墩其流至運口也三汊河裴家塲張福口張家莊四引河匯為一河寛九十丈流出二座攔黄壩壩基淤沙如湯沃雪自然消化至頭座攔黄壩刷寛四十六丈兩壩臺亦係淤沙見在蟄裂若清水再長勢必刷開自難存住詢之土人云當年黄淮交㑹時此係河心若刷去壩臺口門寛闊則清流益暢方足以洩全湖盛大之勢臣觀口闊水溜粮艘揚㠶安流而過則土人之言不誣也但桃汛湖水已大伏汛勢必加長大墩一帶隄工禦河水而保運道關係𦂳要令河官作速臨湖下埽加幫隄工高厚以資捍禦二十一日內閣奉上諭今治河事雖稍有緒未可遽稱底績唐埂六壩俱已堵塞今夏秋時黄河水溢加以毛城鋪水復入洪澤湖波濤洶湧則髙家堰甚可危目下清水流出雖於運艘有益但高家堰一有衝决淮揚一帶地方俱不可保其為患甚大將所修如許工程俱付之無用矣昔于成龍任總河時不塞唐六壩非無所見蓋慮此而不行也今斷不可不愼加防䕶凡此皆朕親臨所見者並非紙上空言也張鵬翮修築石隄甚速彼處運石甚不易成工之速如此可謂實心効力者矣四月初四日工部郎中王進楫傳奉上諭諭張鵬翮保守高家堰第一要𦂳初八日張鵬翮疏陳保守高堰事宜下部議准奉㫖依議速行附張鵬翮疏畧今六壩全閉淮水初復故道水勢蓄長止由清口一路㑹黄入海一切隄工俱係新築湖寛水盛風浪易發最為𦂳要加謹保守誠如聖諭臣等公議保守之法一在分地巡防自凊口厯高家堰至六壩毎五里派官二員晝夜廵防發帑委能員備料運貯工所備用其臨湖鑲柴預防浪掣武家墩至高家堰令原修㕔員住工防守自小黄莊至周家橋令分修諸臣住工防守自周橋至六壩令分修接修諸臣住工防守一在修理險要工程查龍門大壩部臣原估鑲柴二路後止鑲一路今湖水盛大隄身單薄應將節省一路仍發帑加鑲其高澗大壩地勢低窪內有積水深潭裏戧旋修旋蟄舊隄頂寛不滿三尺一遇風浪甚屬危險臣相度形勢應於裏口築越隄一道以為重門之障其內戧蟄䧟之處下埽鑲填堅實至於宣洩之方因三滾壩尚未修成從權暫設天然滚壩遇淮黄並長之時清水由天然滾壩洩出黄水由王家營減壩洩入鹽河下海二十一日張鵬翮疏請修築髙堰清水潭隄工下部議應如所請奉㫖依議速行附張鵬翮疏畧高堰清水潭工程最為險要臣親徃勘驗原係積水深潭南一半長二十丈埽工蟄陷無存北一半長二十丈今亦蟄陷臣等公同相度此工臨湖舊隄面寛二丈三尺及三丈不等雖有石工尚虞卑薄而內裹潭形如釜底水深底淤樁埽難施幫築裏戧土工難於存立公議於內裏加築月隄一道以為重門之障此工最關𦂳要應作速修築以資捍禦五月二十一日上諭高承爵奏報泗州盱眙地方水災著總河張鵬翮㑹同兩江總督阿山親行察勘具奏前高家堰閉塞六壩時朕謂六壩基完後泗州盱眙等處必被水淹曾向九卿降有諭㫖今六壩方經閉完洪澤湖水長泛溢泗州盱眙等處城郭果被水灾高家堰隄益覺危險朕為此時厪於懐且天災靡定萬一有異常風暴及地動雷震之事亦未可知儻若高家堰至於危險則揚州淮安等處皆被災矣朕日夜念此甚切憂懼高家堰隄作何保守堅固或另有修治善䇿著張鵬翮陳奏可差爾衙門中書一員前徃七月張鵬翮奏報開放陶莊引河奉㫖張鵬翮奏開陶莊引河黄河水已向北㟁流去若黄流趨向北㟁則離清口甚遠乗此時從范承勲所築挑水壩起寛長加築隄㟁過清口将黄河及清口之水儘向下流再匯合為一處則黄河之水永無倒灌之虞朕先曾面勅于成龍今在河官員亦有知者著張鵬翮問在前曾知此事官員詳明定議奏聞其修隄所需錢粮即為估計所修之處速繪圖呈覽此事甚為𦂳要不得輕忽下所司知之附張鵬翮疏畧臣謹遵聖謨指示自范承勲所築挑水壩起加築隄工至清口西壩長四百八十丈五尺頂寛六丈底寛十丈再查西壩見長二十丈今再接長五丈新舊合長二十五丈俾清口合黄河之水向北下流過惠濟祠後合為一處益加暢沛黄水可永無倒灌之虞都御史李柟疏畧陶莊引河雖黄河大溜一入即可刷令深廣但水性就下今引河不及黄河大溜之深夏秋雨汛落後焉能捨卑就高故土人謂黄河徙之使北不但河底宜深亦且河靣宜廣臣思此河共用銀二萬三千兩有零若再加倍深廣其銀亦不過加倍而已大抵黄河之沙冬則堅固縱人工稍費易于施工今歲冬月或相其地勢機宜再加挑浚深廣亦一勞永逸之計是年修高堰大隄告竣北自武家墩隄頭南至棠棃樹長二萬四千九百八十一丈二尺三寸高二丈三四尺不等臨湖鑲柴高一丈一二三四尺不等頂寛八丈四尺底寛一十三四丈不等又自武家墩至小黄莊自小黄莊以南至古溝自古溝以南至林家西俱砌石㟁又自天然壩南至秦家高岡俱臨湖鑲柴以資保障又自武家墩起至棠棃樹加築子隄以出水面七尺為度以禦風浪剙築髙澗大壩裏月隄估砌石工長二百五丈五尺又臨湖外月隄簽釘排樁鑲柴長一百五丈剙築清水潭隄裏月隄長九十六丈剙築草字河順水隄自周橋大壩東至仁和集西長四千八百九十五丈剙築唐漕河隄自天然壩南大隄起至界溝長三千三百一十五丈築蔣家壩攔水隄自蔣家壩至周家圍長一千一百五十三丈河防志洪澤湖築髙堰南北隄㟁所以束淮水出清口敵黄濟運也於清口築新大墩一座導水七分敵黄三分濟運若遇桃㐲秋三汛湖水盛長水大易起風暴欲保隄㟁以衛運道民生於山盱汛建滚水石壩三座其由身尺寸與清口黄水形勢相照應取勢足敵黄過則聼其滚去此四季測量水平審度至當迺定壩址歴年著有成效如春夏之交黄水先長湖水勢㣲清口清水稍弱恐不足以敵黄則啟歸仁湖三牐之板放水入洪澤湖以助清口水敵黄而濟運此皆聖主數次閲視河工指示方畧精詳盡善乃克平成奏績萬世永賴屬在臣工敬奉遵行勿穿鑿私智變易成法則淮揚生靈永䝉利頼於無窮矣四十一年五月張鵬翮疏請加挑運料小河奉㫖這河著照該督所題挑浚應否永遠存留該督確議具奏又題覆下部議准奉㫖依議附張鵬翮疏畧竊照高堰運料小河原屬淺窄面寛八丈底寛五尺深五尺以資運料以保隄工臣查此河自周橋横隄起北至武家克墩止乃屬無源之水必湏隄內積水匯流入河方有濟臣等㑹勘高堰工程小黄莊一帶地形低窪見今隄裏積水與河面相平若遇風浪汕刷隄根深為可虞公議將原挑小河再加挑深使積水洩流河中由武家墩鹽河出口以免汕刷隄工實與高堰工程深有禆益又疏畧查高堰一帶隄根地形窪下積水浸汕難免坍卸之虞今將運料小河再挑深通一以宣洩隄根積水一以運送修工料物而且通商便民利益不淺或虞土塘水洩偶致消淤毎俟春融令河兵撈浚再建草壩六座毎年修葺以收束水勢應可永遠存留以保堤利民十一月張鵬翮疏報歸仁隄引河開放附疏畧歸仁聖謨動隄引河牐座等工程仰遵秋二汎黄水異漲高於帑修浚次第告竣今年伏湖水迨霜降後黄水漸消臣行令道㕔等官將臨湖歸仁安仁牐壩堵塞蓄湖水盡行引河流至臨黄祥符牐盈科開放今據報清水高過黄水一尺九寸於十一月初七日開放湖水滔滔出黄河臣親往看清水暢流沛然莫禦百姓聚觀莫不欣喜感頌皇恩歡聲雷動此皆仰頼我仁湖導睢湖諸水刷黄日益皇上聖謨獨斷發帑開浚歸寛深宿桃等處民生得所淮泗上流水勢少減誠天授之神智垂萬世之利頼者也四十二年二月初五日上諭歸仁隄引河開放分洩洪澤湖水勢若黄水加長恐清口水弱着將祥符牐下版堵閉草壩將五堡牐應酌量開放以助清水之勢三月初三日上諭高堰工程關係重大保安最為𦂳要朕今日乘舟由洪澤湖閲視見有殘缺石工以葦草鑲塡倘遇水發危險堪虞閲至六壩見新修石壩堅固方慰朕懷其殘缺石工着即興修乘水未長之前完工用資捍禦初四日上諭清口西壩乘此水淺再加長數丈有益初八日上諭高家堰石工關係𦂳要必須嚴催早完十一月奉上諭洪澤湖風浪危險毎致損壞船隻民命攸關着於沿湖坡釘樁木以廣救濟四十四年閏四月初十日聖駕臨視高堰隄工上諭石工老隄頭轉灣處甚屬險要宜作速修完十一日上臨幸惠濟祠石工大學士暨河臣等奉上諭朕三十八年閲河爾等所立之處俱屬黄水今清水暢流逼黄竟抵北㟁僅成一線朕心甚為快然觀此形勢朕之河工大成矣十月初四日上諭工部方今海宇昇平惟以安阜黎元為急東南要務莫重於河防朕數經南巡指示修築方畧凡以籌運道濟民生也自曩歲兩河先後衝决而黄流淤墊繼以高堰唐埂壩乆决未塞而洪澤湖水直從决口旁洩以致淮水力弱黄水倒灌全河幾至潰壞於是分遣廷臣發帑金數百萬増築高堰盡閉六壩俾淮水全注清口又特築挑水壩以逼黄溜趨向北㟁仍開濬陶莊引河以導黄北流然後黄水無倒灌之患四十二年以河工漸可底績躬親臨視時高堰石工尚多未竣飭令迅速修築又因仲莊牐水勢湍急恐逼黄流倒浸清口遂命閉仲莊牐改建楊家莊牐牐工既成今年春復徃巡閲比至高堰見石工仍未完固舊埽亦多朽塌諄諭河臣張鵬翮謂水勢無常修防宜豫一有疎忽則前工盡隳且甫奏安瀾旋報衝決天下其謂之何張鵬翮猶奏稱隄工捍禦可以無虞迨伏汛大水驟發果衝決古溝唐埂清水溝等處淮楊一路田畝被淹者甚衆今已嚴飭堵塞決口刻期竣工朕屢親蒞河干詳度形勢當水漲之時若高堰及運河減水壩不令開放則隄堰甚為危險若開壩宣洩則閭閻隴畝必致淹傷方春水涸民間盡皆播種一經夏水驟漲開壩放流而所播之種悉被淹没朕心惻然殊為不忍使不設法導流俾水有所收束則瀕湖及下河民田究不免於水患朕再三籌畫宜於高堰三壩之下挑濬一河兩旁築隄束水入高郵邵伯諸湖湖外亦量築土隄不使漫溢其高郵減水壩下挑濬一河兩旁築隄束水由串塲河入白駒丁溪草堰等河白駒等河淤淺之處並開濬深通俾之入海如此則各壩所出之水不致有渙散衝流之害又洪澤湖水勢大漲泗州盱眙等州縣俱被水災應於泗州一帶受水之地亦酌量築隄收束毋令汎濫則所全於淮安揚州鳯陽三郡民生者多矣此事原於河道無涉在河官止知保䕶河道不復詳計民生朕惟民間田畝所繫甚重宜圖萬全可久之䇿築隄束水行之北河業有成效則施之南河當亦有濟應從何地築隄延袤若干里需費幾何行令江南總督總漕總河江蘇巡撫㑹同確勘詳議具奏河工事宜冊是年總河張鵬翮㑹同總漕總督巡撫察勘估計於三滾水壩下挑河築堤蔣家壩添建石牐水大開放循河歸入高郵諸湖并請准發內帑修築遣官督理完工迄今開壩之水悉由壩下之河歸入高郵諸湖由束堤壩下各引河歸海不致散漫淮楊二郡億兆生靈桑麻樂業莫不感頌皇仁與天地不朽矣四十五年正月上諭見今所議應築之隄應挑之河與漕運河道絶無關涉特為淮揚所屬田畝不致淹没有裨民生之故但高家堰隄㟁甚屬𦂳要不可不嚴加防守去歲水大古溝唐埂清水溝等處俱被衝决今歲高家堰若不嚴加防守朕不能保其無衝決之患又奉上諭高家堰酌看險要之處再添建救生樁工五處四十六年二月二十二日扈從大臣及督撫總河等於御舟前奉上諭天然壩一帶聞有舊河形將此河開浚足容漕船行走建置牐座遇水小則閉牐蓄湖水敵黄水大則開放洩水一半由武家墩通入運河一半通入高郵湖商民舟楫皆得經行無阻似可為永遠之利從前曾以此事諭張鵬翮親身督率在河賢能官員詳勘定議俟回鑾具奏時朕再親徃閲定河工事宜冊是年總河張鵬翮奏准建蔣家壩石牐一座金門口寛一丈八尺牐下兩㟁挑河長一萬四千四百三十九丈五尺兩㟁築隄長五千一百五十一丈五尺迄今每遇伏秋水長開放宣洩水由金釵罕眙澗入高郵湖隄工保䕶平穩四十七年奉上諭朕南巡閱河時見洪澤湖風浪危險隄㟁陡立商民船隻觸石損壞傷人甚多朕心時切軫念因特令河臣沿湖隄剙設救生大樁自設樁以來數年內並未損船傷人于商民大有禆益此樁應時加增修愈多愈善嗣後着江寧蘇州杭州織造毎歲於節省銀內各捐五百兩解送總河衙門以備救生樁之用六十年加修自山清交界武家墩西隄至土地廟大隄頭攔河壩臨湖一面隄工長七百六十六丈七尺濬運料小河淮揚道副使傅澤洪申詳高堰山盱兩㕔所屬運料小河於康熙四十一年挑浚保隄運料誠為善䇿迄今日久淤墊運料船隻艱澁難行又於五十九年補築大工之時隄邊取土地益窪下致積水汪洋宣洩無路風浪汕刷隄根受傷實屬危險兹請挑濬深通既可保䕶隄工又可宣洩積水運送物料船隻無艱澁之虞積貯土方兵夫無望洋之歎一舉而四善備則詳請緩題估發帑興挑誠不可一日稍也雍正四年八月上諭高家堰加修隄工關係𦂳要若於歲修案內逐段增修恐致遲緩着即動正項錢粮作速估計興修五年修理高堰大隄頂上前面柴工并加高背後土隄一律取平河工事宜冊四年十月題估五年八月工竣六年七月初二日奉上諭據河道總督齊蘇勒奏稱改修山盱滾水壩三座即令河兵將沿河舊存廢石運用不須另動錢粮今工程俱已告竣等語此皆齊蘇勒平日實心任事倡率屬員而白鍾山又能遵其教令核實辦理甚屬可嘉若以從前之總河官員處此不知又冒開多少工費矣白鍾山着交部議叙齊蘇勒疏洪澤湖滾水石壩三座其北首二壩之門檻現在高出水靣五尺南壩之門檻現在高出水靣五尺五寸周橋一帶石隄現在高出水靣止有六尺若遇水長六尺即與周橋石隄之頂相平而北壩僅能洩水尺許南壩止能洩水五寸所洩無幾則周橋一帶石工甚屬危險臣等細加測量相度全湖形勢若將滾水三壩之門檻各落一尺五寸庶尋常之水可蓄瀦以敵黄而暴漲之時又得暢洩以減盈再查先年沿河兩岸建有牐壩等工因未審地勢之高下多有壩身太高不能過水而廢棄者其廢棄之牐壩石塊甚屬堅厚今若改落石壩門檻儘可折取添用不過需用搬運修整之價較之赴山採辦錢粮大有節省至於磚灰等頂係上面兩層之工所費無幾七年上諭河道總督孔毓珣天然等壩洩出之水恐其溢浸民田爾可相度動帑於壩下修築束水隄工務令各壩所洩之水悉歸湖內毋致民田被患附孔毓珣遵㫖勘議疏臣抵任後親徃湖隄五壩之下逐細詳勘查三滾壩口門共寛二百丈湖水加長約過水一二尺至三四尺不等天然二壩口門共寛一百二十丈開放過水約至六七尺不等而原挑壩下引河二道各止靣寛十二丈底寛八丈深三尺至陳家莊匯合一河止靣寛二十丈底寛十六丈深四尺是來源廣闊去路狹窄止可引其溜走中泓不能盡為容納全賴兩隄束水下趨以防旁溢而原築隄身止頂寛二丈底寛五六丈高六七八尺不等本來不甚高厚且陳家莊南甸等處兩隄相距闊者一百三四十丈窄者八十餘丈若止放滾水三壩隄內雖然窄隘尚可容納若值五壩齊開以三百餘丈之水滔滔滾注下遏上壅勢必漫濫臣循隄細看若竟疏浚引河亦可引水下注但天然二壩一開水即緣隄湍逝必致河沉水底閉壩之後又虞高寶二湖之水逆湖而行轉致倒漾是疏浚引河亦非洩水之長䇿伏思壩下隄河原備束水欲使壩下循軌誠如我皇上聖明洞鍳必應修築隄工以束其勢俾來無漫衍去有匯歸方足鞏固湖隄而保衞田畝應請將南甸隄徑窄狹之處自南岸王家菴起至趙家庄止取灣就直改闊二三丈長三百丈另築新隄一道即將舊隄之土穵築新隄其隄尾距湖尚有二十餘里向無隄工應於南岸隄尾馬家圩至應家集約十七里接築新隄一道北岸隄尾自周家圩至李良橋約十五里接築新隄一道再將南北兩岸舊隄按其段落分其平險遞為増減一律加高培厚庶兩隄夾束水勢湍流自無旁溢之患自應家集李良橋迤下去湖尚約有六七里地勢窪下土性虚鬆本難築隄况此處成熟田畝無多無庸議築以上應築隄工約需帑一十一萬一千餘兩實於湖隄民田兩有禆益此隄向係民間自行修理隄成之後請飭令地方官于附近有田之家按田畝之多寡秉公選擇殷實老成之人令為隄長凡遇放壩之時率領居民輪流赴隄晝夜巡邏搶䕶閉壩之後如有浪窩水溝於農隙時即為修補按是疏下閣臣議准覆奏於八年正月奉㫖依議十一月初四日奉上諭朕思治河之道惟有使黄水暢流無所壅滯則永慶安瀾然欲使黄水無所壅滯必須保固高家堰隄工使清水力能敵黄且以助其暢流之勢則河工永遠無慮是高堰隄工闗係最為𦂳要從前齊蘇勒雖將石工稍加幫修而朕以為不若多費帑金於隄工險要之所及單薄之處俱加修石工務令堅固高厚以為久遠之計庶於河道民生大有裨益前孔毓珣在京陛見時朕以此諭之伊亦深以為然又曾將治河之道降㫖詢問田文鏡而伊之所奏與朕意不謀而合可見高堰隄工乃必應加增修理者也着發户部帑銀一百萬兩交與孔毓珣尹繼善籌畫相度有應預備物料之處即於歲內採買早為預備再着汪漋對琳張坦麟吳昌祚前徃淮上協同河臣等悉心辦理附河道總督嵇曾筠等疏高堰山盱㕔一帶石工隄工捍禦洪澤全湖巨浪保䕶淮揚二郡民生蓄清敵黄利漕濟運最為𦂳要工皇上聖程仰賴我悉全河關鍵特發百萬帑金務加修高神天縱洞厚以為久遠之計臣查修砌石工必須於工外建築越壩攔水然後可以施工今小黄莊迤南湖面寛闊水勢浩大若建立一線孤隄安能抵禦再四思維惟有借舊石工連土留寛二丈暫為外障俟新工築定根基再將舊工拆起選石添建方資捍禦查高堰㕔屬自六堡起至小黄莊止又自小黄莊起至高良澗禹王廟前止應幫戧隄工共長五千九百七十三丈六尺六寸山旴㕔屬自高良澗禹王廟前起至古溝東壩北止又自古溝東壩南起至滾水壩北至應幫戧隄工共長三千九百三十七丈六尺三寸又疏臣等勘核題估除石工之內現在完整止須毎年照例於石工上鑲柴搶修足資捍禦無容加修外其有間段底樁腐朽石塊欹斜毎屬順砌卑矮應建越壩拆修加高一律堅實又有年久風浪撞激灰縫剝落底樁腐朽歪斜脹裂傾圮者其中雖間有完整但向係順砌之工襯裏磚石單薄若於舊石之上再加新石上重下虚勢難撑立應行通身全拆重修另換馬牙梅花等樁丁順間砌始能垂久至於修砌石工必先築越壩攔水然後可以興工今湖面寛闊水勢浩大毎遇狂風巨浪勢若排山若築一線孤壩安能抵敵且工段綿長實難保䕶况查舊工根基樁空之內向經塡滿碎石今舊樁難起新樁難下徒費人力不能施工惟有借舊石工留寛二丈暫為外障于後身開槽釘樁砌石俟新工築定根基再拆舊石選用其舊工底石因新工灰汁未老應留二層以防風浪撞激保䕶新工再清水潭一壩裏越未建石工今應一例剙建通共工長六千三百四十二丈九尺四寸八年幫築高堰壩下河隄九年大修高堰石工十年高堰石工告成江南通志卷五十五
