body:
  text: 江南通志卷三十一輿地志古蹟二蘇松二府蘇州府吳大城今府治是漢書志云吳本國周太伯所邑元和志云闔閭自梅里始遷都於此吳地記云壽夢始别築城為宮室於平門西北二里周敬王六年闔閭使子胥築大城亦曰闔閭城城周四十七里郭周六十八里隋開皇間楊素徙於古城西南橫山之東俗所謂新郭也唐初復故又曰羅城作亞字形中有大河三橫四直吳小城在長洲縣即子城在大城內吳越春秋云子胥築小城周十里不闢東門以絶越也越絶書云小城周十二里門三水門二楚封春申君於吳因城吳故墟以為都邑元末張士誠入據建太尉府後曰王府今俗稱王府基是也麋湖城在長洲縣北五十里越絶書云闔閭所置又巫門外有麋湖西城越宋王城也吳越春秋云平門外麋湖西城者麋王城也又有太公城章祈城竝在縣東北姑蘇志云章祈疑即􅝄􅖥在今二十二都居東城在長洲縣界越絶書云闔閭所遊也去縣二十里劉昭注訛為居巢城鴨城在長洲縣匠門外東南二十五里沙里中寰宇記云吳王養鴨所也東五里有豨巷是畜豬之處又東二里有豆園吳王養馬處搖城在長洲縣東南三十八里吳王子居焉後越王搖居之今其地名大姚巫欐城在元和縣東十五里越絶書云闔閭所置諸侯逺客離城也又有欐溪城闔閭所置船宫也相城在元和縣東北五十里相傳子胥初築城時先於此相地壘土而城之下濕乃止故名鴻城在元和縣治東婁門外相傳故越王城也陽城在元和縣東北三十里環繞有湖曰陽城湖後城堵城并在元和縣東南數十里堵城疑即赭城今尹山鄉有堵城里定錯城在吳縣吳市西屬小城北至平門漢荆王劉賈築魚城在吳縣西南十五里橫山下吳地記云吳王養魚處續圖經云蓋吳王控越之地宜為吳城方言吳魚同音故訛稱魚周益公南歸録云魚城在田間基厚而方高二丈博倍之為田二十畝土極細故久不壞苦酒城在吳縣魚城西南二十里吳郡志謂長老云吳王築以釀酒又有酒醋城吳地記云在胥門西南三里儲城在吳縣胥門南三里吳王儲糧處馬城鹿城俱在吳縣洞庭西山闔閭豢養之所石城在吳縣西靈岩山吳越春秋謂闔閭興樂石城注云吳之離宫越王獻西子於是酒城在吳縣壇塘邊一名壇城夫差祭子胥處臨祭勸酒故名酒城祥符圖經云在吳縣東南三十五里大江邊一名陌城衛王城在吳縣西南界相近又有舸城或曰柯城越城在吳縣胥門外西南十八里石湖旁越伐吳築此以逼之城堞髣佛具在高者猶丈餘干城在吳縣馬安溪上越干王之城也八門闔閭使子胥築大城陸門八水門八吳都賦所謂通門二八水道陸衢是也西北曰閶門文選注云象天閶闔門吳越春秋又曰昌門亦名破楚門伐楚出此門西曰胥門吳地記謂本伍子胥宅因名西南曰盤門吳地記云水陸縈回故謂之盤又名蟠門刻木作蟠龍以鎮越東南曰蛇門吳郡志云在已方故名又云越在已地吳作木蛇北向示越屬吳也東曰匠門本名干將門吳地記云吳王使干將鑄劍於此後訛為匠門又東曰婁門吳郡志云秦婁縣所值又謂之疁即今崑山也東北曰齊門越絶書曰闔閭伐齊大克取齊女為質子為造齊門又吳越春秋云闔閭為太子波聘齊女女少思齊而病乃起北門名曰望齊北曰平門吳地記云子胥平齊大軍從此出故名東北三里有巫咸墳亦號巫門吳郡志云巫平字畫相近此所謂八門也又匠門南三里有葑門續圖經云當作封門取封禺之山以為名葑門相近有赤門在城正南今猶有赤門灣又東南有魴鱮門此三門皆非八門之數至宋惟存閶胥盤葑婁齊六門水陸共十二淳熙後胥門水陸俱塞元初城郭盡毁至正中復繕完仍闢水陸門十一惟胥獨無水門聖祖御製吳閶詩至閶門詩恭載首卷養魚城在吳江縣西二十五里吳王養魚之所今為魚城村陌城在吳江縣治北寰宇記云石頭城在吳縣東南三十五里大江邊一名陌城夫差既殺子胥後悔之臨江築塘創設祭奠百姓因為立廟於此或云此即酒城在壇塘邊今屬吳江縣吳城在震澤縣界今名吳漊村扈城在常熟縣北五里石城東南畿志云世傳吳王建離宫扈蹕故名今有扈城村石城在常熟縣北五里越絶書云闔閭所置美人離城也吳地志云越獻西施於吳王王擇虞山北麓以石甃城為遊樂之所今其地有石城里九里城在常熟縣北九里福山塘東岸直九折塘口世傳吳王牧馬於此俗呼攔馬城有洗馬池今存莫城在常熟縣東南十二里相傳莫邪鑄劍處亦謂之劍城又謂之莫邪城今有廟曰莫邪大王有塘曰莫門又縣東四十里有莫城寰宇記云漢莫寵築以壯海防者海虞舊城在常熟縣治東晉太康四年分吳之虞鄉立縣利城在常熟縣北輿地志云晉元帝以海虞北境之土山立利城以處流民陶城在常熟縣東三十里相近有閭城郭城而陶城尤大與莫城等合縣境共有十二城蓋唐廣明中詔諸道州縣於村堡置城集民兵自衛也金鳯城在常熟縣西北四十八里唐天祐中吳越所築在金鳯山下故名即今福山城址尚墅城在常熟縣北十八里張士誠入福山港修此城以屯兵鵧城在昭文縣東北十五里隋大業末詔村塢皆築城自保此其故址也又有朗城亦在縣境婁縣故城在崑山縣治東吳子壽夢所築吳地記云長洲東百里有秦時古疁王莽改為婁吳郡志云婁縣今謂之崑山縣縣東北三里有村曰婁縣蓋故縣所南武城在崑山縣西北漢書婁縣注云有南武城吳王闔閭起以禦越者越絶書云婁北武城去縣三十里今為鄉金城在崑山縣東三里相傳吳王所築基址猶存東城在崑山縣東三百步南畿志云今橋巷猶以東城名耕者於東寺後多得古城磚及銅箭鏃西鹿城在崑山山下有卜將軍廟碑云葬於崑山西鹿城巴城在崑山縣西十八里其地有巴王冢巴城湖雉城在崑山縣西北十八里今雉城湖即其地崑山舊縣即今治在郡東七十里本漢婁縣地吳地記云地名全吳水名新陽梁大同初置崑山縣因縣界崑山為名信義舊縣在崑山縣西二十里寰宇記云梁天監六年以婁縣地分置舊唐書志云梁分信義縣置崑山縣取縣界山名今崑山信義村即其故址度城在新陽縣東南七十里相傳為黃巢所築旁有度城湖顔縣城瓦浦城竝在新陽縣東南皆古經所載南沙廢縣在常熟縣西北三十里宋書志云本吳縣司鹽都尉署吳時名沙中琴川志云東晉分海虞縣置南沙咸康七年立以為縣今縣西北五十里瀕江奚浦一帶地猶名南沙鄉海陽廢縣在常熟縣北蕭齊置海陽縣屬毗陵郡蓋今縣東北濵海之地興國廢縣在常熟縣東四十五里梁置東宫路西宫在長洲縣闔閭所建越絶書云東宫周一里二百七十步路西宫在長秋周一里二十六步南城宫在長洲縣干將鄉長樂里吳宫在長洲縣長洲苑東南五十里吳王别宫也陸龜䝉問吳宫詞序云甫里之鄉曰吳宫今有吳宫鄉闔閭宫在吳縣越絶書云在高平里館娃宫在吳縣西三十里吳地記云闔閭城西有硯石山上有館娃宫今靈巖寺即其地吳都賦云幸乎吳娃之館前宫後宫西宫在吳江縣沈張湖之西皆吳王夫差離宫也今村名猶沿其舊響屧廊在吳縣靈巖山相傳吳王建廊以楩梓藉地而虛其下令西施與宫人步屧繞之則響故名今靈巖寺圓照塔前小斜廊即其址長洲苑在長洲縣太湖北岸闔閭遊獵處圖經云在縣西南七十里孟康曰以江水洲為苑韋昭云在吳縣東吳都賦佩長洲之茂苑即此漢吳王濞嗣葺吳苑極一時之盛枚乘所云上林不如長洲之苑是也元和志謂長洲縣取此立名初陽樓在長洲縣郡治池上唐皮日休詩危樓新製號初陽齊雲樓在長洲縣郡治後子城上即古月華樓吳地記云唐曹恭王所建白居易有齊雲樓晚望詩今名飛雲閣西樓在長洲縣子城西門上更名觀風樓白居易詩風月萬家河兩岸笙歌一曲郡西樓陳公樓在元和縣虎丘山宋王曉記略隆興二年四月敷文陳公鎮吳興避暑虎丘寺創樓其上紅月樓在新陽縣通闠橋西元人朱君璧善畫嘗作紫霧龍宫圖十年始就人謂其妙入神品末年兵亂君璧抱圖坐樓中寇遙望虹氣貫月疑有至寶踪跡而至攘取觀之寇怒裂之而去楊鐵崖易其名曰虹月樓并記虎丘閣在元和縣輟耕録云平江虎丘閻版上一竅當日色清朗時以掌大白紙承其影則一寺之形勝悉見而頂反居下明文徵明有詩救虎閣在常熟縣興福寺左舊傳宋僧彥稱為虎拔箭故以名閣其橋名伏虎池光亭在長洲縣郡宅後即北亭唐刺史白居易命名吳郡志云亭後有酴醿洞宋紹興中郡守沈揆名之滄浪亭在長洲縣郡學東南石林詩話云錢氏廣陵王元璙别圃也宋慶厯間蘇舜欽得之作亭曰滄浪後為章惇家所有紹興後歸韓蘄王世忠俗名韓王園附宋蘇舜欽滄浪亭記豫以罪廢無所歸扁舟南遊旅於吳中始僦舍以處時盛夏蒸燠土居皆褊挾不能出氣思得高爽虛闢之地以舒所懷不可得也一日過郡學東顧草樹鬱然崇阜廣水不類乎城中並水得微徑於雜花修竹之間東趨數百步有棄地縱廣亘五六十尋三向皆水也矼之南其地益濶旁無民居左右皆林木相虧蔽訪諸舊老云錢氏有國近戚孫承佑之池館也坳隆勝槩遺意尚存豫愛而徘徊遂以錢四萬得之構亭北崎號滄浪焉前竹後水水之陽又竹無窮極澄川翠幹光影㑹合於户庭之間尤與風月為相宜豫時榜小舟幅巾以往至則灑然忘歸觴而浩歌踞而仰嘯野老不至魚鳥共樂形骸既適則神不煩觀聽無邪則道以明返思向之汩汩榮辱之場日與錙銖利害相磨戛隔此真趣不亦鄙哉噫人固動物情橫於內而性佚於外寓於物而後遣寓久則溺以為當然非勝是而易之則悲而不開唯仕宦溺人為至深古之才哲君子有一失而至於死者多矣是未知所以自勝之道豫既廢而獲斯境安於冲曠不與衆驅因之復能見乎內外失得之源浩然有得笑傲萬古尚未能忘其所寓故用是以為勝焉明歸有光滄浪亭記浮圖文瑛居大雲菴環水即蘇子美滄浪亭之地也亟求余作滄浪亭記曰昔子美之記記亭之勝也請子記吾所以為亭者余曰昔吳越有國時廣陵王鎮吳中治南園於子城之西南其外戚孫承佑亦治園於其偏逮淮海納土此園不廢蘇子美始建滄浪亭最後禪者居之此滄浪亭為大雲菴也有菴以來二百年文瑛尋古遺事復子美之構於荒殘滅沒之餘此大雲菴為滄浪亭也夫古今之變朝市改易嘗登姑蘇之臺望五湖之渺茫羣山之蒼翠泰伯虞仲之所建闔閭夫差之所爭子胥種蠡之所經營今皆無有矣菴與亭何為者哉雖然錢鏐因亂攘竊保有吳越國富兵強垂及四世諸子姻戚乘時奢僭宫館苑囿極一時之盛而子美之亭乃為釋子所欽重如此可以見士之欲垂名於千載之後不與其澌然而俱盡者則有在矣文瑛讀書喜詩與吾徒游呼之為滄浪僧云國朝潘耒滄浪亭賦伊吳城之雄濶苞萬井與千街市廛翼其鱗次官閣煥乎雲排惟南城為空曠有水木之清佳山浮青而當户水瀉白以縈階廓平疇之百頃忽心舒而目開推囂塵而頓遠延秀爽以乍來爰有巍亭冠乎高阜仰披烟霄旁帶林藪繡野襟前曲池環後豁達軒堂疏通户牖萬象森其畢呈諸竒萃而咸剖兹惟滄浪之亭勝獨超而無耦在昔子美為宋名賢負匡時之才略思補衮而濟川遭排擠於羣枉鬱忠貞而不宣厭洛下之喧雜樂吳風之清妍逺移家而卜築聊逍遙以窮年悅此奧區有竹有水草樹豐茸川原演迤密邇宫牆隔絶巷市不山而靜深非谷而宛委乃購隙地乃營亭臺扁舟草屨容與徘徊魚鳥相狎麋鹿為儕忘窮逹而遺毁譽信賢達之高懷兹其所以誇耀於圖記稱述於歐梅也五百年來陵遷谷變兔走荒阡蛇遊枯澗燈青報賽之祠鐘冷伽陀之院嗟草沒而苔封剩遺蹤其如線猗歟宋公名世宗臣柱石龍鸞萃於一身撫東南之重地煦寒谷於陽春民無隱而不恤俗無遠而弗詢既政通而人和時求舊以訪古表前修之墜言存哲士之遺矩陟層岡而賞心想高賢其如覩思濯纓於清流脊嘉名之足取爰作新亭廓是舊墟因高疉石就下浚渠依窪隆之曲折映竹樹之扶疏闢華堂於木末啓别館於巖隅雜植桐桞羅生芙蕖安翔野鳥泳躍鯈魚縱物情之暢遂來天籟之虛徐想濠濮其不遠與習池而何殊公乃於機務餘間來遊來眺集賔朋使授簡援琴觴而寄傲理東山之雅詠發南樓之清嘯政以暇而彌精思以幽而逾妙齊楊杜之高蹤同白蘇之逸調抑且扃鐍不施藩籬不設公諸士民餐芳沐潔懷賢者薦夫蘋蘩訪古者誦夫碑碣牛鐸得應黃鐘巴歌許賡白雪固將使昔賢高致標映江山而文采風流照耀不絶也載稽吳會夙富園池若辟疆之蟉松怪石任晦之曲沼層陂南園之峰巒巧麗東墅之卉木珍竒是皆豪家之所締構貴帥之所指麾既已灰飛烟滅光影無遺即兹亭之墟主亦屢易經始於王孫落成於貴戚章相得之而增華韓王有之而加闢然無有舉其姓名尋其踪跡者惟子美也官不過長史身不在巖廊為羈窮之遷客暫僑寓於江鄉徒以英風豪氣磊落軒昻直聲振於朝列翰藻播於遐荒遇雖窮而名顯身雖困而道光故令人撫遺墟而增感考陳蹟而表揚豈非豪華聲利如過隙而文章氣節為久長也哉江湖散人蓴鱸逸民去金門其已逺與泉石而相親企先賢之逸軌歎當年之數屯忽光顯於此日類蠖屈而龍伸曠百世而相契信知已之有真感高誼之難覯聊寫心於斯文四照亭在長洲縣北東圃吳郡志云宋王渙建為屋四合各植花石隨時之宜負暄野録云慶元中趙不囏會客問名亭所自銅陵主簿姚行簡對曰山海經云招搖之上其花四照華嚴經云無量寶樹普莊嚴華熖成輪光四照又云光雲四照常圓滿今四面皆花故名趙極稱賞秀野亭在長洲縣城北宋侍讀葉道卿所居吳郡志云紹興三十一年郡守洪遵建金閶亭在吳縣閶門外唐陸龜䝉謂梁鴻墓在金閶亭下一里是也醒心亭在元和縣葑門內水中有土阜對峙號曰浮墩宋熙寧間曹傃建亭其地有雙松參天今放生池即其處流杯亭在吳縣女墳湖西二百步吳地記云闔閭三月三日遊樂之地吳㑹亭在吳縣織里橋北吳江亭在吳江縣東門外唐時建松江亭在吳江縣東門外唐時建宋縣令趙球即其址建如歸亭以待使客葉清臣為記朱鶴齡文類云松江亭即古松陵驛古時亭即驛後人則别置一亭於江上為遊觀之所鱸鄉亭在吳江縣長橋上宋熙寧中縣令林肇建蓋取陳瓘秋風斜日鱸魚鄉之句垂虹亭在吳江縣長橋宋慶厯中縣令李問建楊備詩松陵雨過船頭望一道青虹兩岸頭望仙亭在震澤縣平望鎮相傳唐張志和於此仙去褚家林亭在震澤之西見松陵倡和集雅集亭在常熟縣治東縣令計宗道偕名流觴咏處沈周為繪雅集圖極目亭在昭文縣西最高峰上宋時建米芾書額後改名達觀亭萬厯中以形家言更名辛峰亭朗吟亭在昭文縣丹井東北明永樂中道士林復真建邑令傅良玉記季箎有幾年不到朗吟亭亭上風光覺倍增之句范公亭在崑山縣薦嚴寺後圃宋參政范成大讀書寺中遊息於此遂名和靖讀書臺在元和縣虎丘山宋尹焞讀書處後人繪像祀之為和靖書院姑蘇臺在吳縣西三十里姑蘇山一名胥臺越絶書云闔閭起姑蘇臺三年聚材五年乃成高見三百里續圖經云越王得神木一雙大二十圍長五十尋雕畫文章飾以白璧黃金獻於吳王王乃起此臺蓋基於闔閭而成於夫差云郊臺在吳縣橫山東麓石湖之濵明一統志云吳王祀帝於此今壇壝之形尚存琴臺在吳縣西二十五里靈巖山上臺東為走馬街射臺在吳縣西南橫山吳越春秋云立射堂於安平里任昉述異記云吳王射臺柱礎皆伏龜越絶書云射臺二一在華池平昌里一在安陽里毛公壇在吳縣洞庭西山漢劉根得道處今有石壇丹井在神景觀旁根既成仙身生緑毛人或見之故名黃堂在長洲縣雞陂之側郡國志云楚春申君子假君所建後太守居之數失火塗以雌黃遂名黃堂天下郡治名黃堂昉此或云春申君姓黃因此得名木蘭堂在長洲縣又名木蘭院嵐齊録云唐刺史張博於堂前植木蘭花盛開宴客陸龜䝉後至博連浮以大白索詩陸云洞庭波浪渺無津日日征帆送遠人甫得二句不覺頽然他客莫知其㫖陸稍醒援筆續之云幾度木蘭舟上望不知原是此花身一時驚為絶唱雙蓮堂在長洲縣木蘭堂東舊芙蓉堂也至和初吕處約以雙蓮花開易名三賢堂在長洲縣木蘭堂左南畿志云思賢亭祀韋應物白居易劉禹錫紹興中重建改為堂凝香堂在長洲縣思賢亭西臨北池招隱堂在長洲縣晝錦坊郡人胡元質所居溪堂也對峙三石甚竒傳是鎮蜀時移來之物三瑞堂在長洲縣楓橋宋孝子姚淳所居蘇軾詩有楓橋三瑞皆目見之句蓋其先墓有甘露靈芝瑞麥之異萬卷堂在長洲縣帶城橋南侍郎史正志所居如意堂在長洲縣清嘉坊明杜瓊奉母之堂也庭生嘉草以如母意故以名堂徐有貞記之陽山草堂在長洲縣去滸墅可數里花木翳然修竹萬挺明山人嶽岱結隱其中易老堂在吳縣西洞庭西李彌大知平江府罷政歸居此肯堂在常熟縣鄭起潛尚書之居宋理宗書額城南佳趣堂在常熟縣虞山東芝溪上南畿志云邑人虞子賢嘗得朱子和張忠獻城南佳趣雜詠真蹟遂築堂焉凌虛堂在昭文縣琴川志云致道觀西北嶺上有凌虛堂下瞰平湖先名望湖未考創自何年後易今名蓋取仲殊凌虛萬象間之句也四賢堂在崑山縣治宋李衡為御史與諫官王希吕相繼論張說不報給事中莫濟不書敕直學士周必大不草制四人同時去國布衣莊治賦四賢詩以紀之後衡孫潛作堂於家畫四賢像竝祀之喜廉堂在崑山縣治宋陳世昌自郡守召對理宗有一廉可喜之語因名其堂半隱堂在崑山縣治宋莫仲宣所築又有西園其别墅也韓托胄當國仲宣閒居十年號西園居士玉山草堂在崑山縣西界溪上元顧德輝築顔曰玉山佳處附元楊維禎玉山草堂記崑隱君顧仲瑛氏其世家在崑山之西界溪上與其弟為東西第又稍為園池别墅治屋廬其中名其前之軒曰桃源中之室曰芝雲東曰可詩齊西曰讀書舍後之館曰碧梧翠竹亭曰種玉合而稱之則曰玉山佳處也豫抵崑仲瑛必居子佳處且求志榜屋顔按郡志崑山縣華亭陸氏祖所窆生機雲時人因以玉出崑而名山崑也山本號馬鞍出竒石似玉烟雨晦冥時得佳氣如藍山焉故人亦呼曰玉又曰崑而仲瑛氏之居去玉山甚逺矣奚以佳名哉山之佳在去山之外者得之山中之人不知也如唐之終南隱者與司馬道人指山之佳身固在山數百里之外也雖然終南之佳終南之隱者未知也借佳為捷仕之徑千古慙德至於今山無能掩焉若仲瑛氏之有仕才而素無仕志幸有先人世祿生産又幸遭逢盛時得與名人韻士日相優游於山西之墅以琴樽文賦為吾弗遷之樂則玉山之佳非仲瑛氏弗能領而有之與終南隱者可以辨具佳之誣不誣矣范蠡宅在長洲縣太湖包山任昉述異記云洞庭湖上有釣洲蠡嘗乘舟至此遇風止釣於上刻字記焉洞庭記云在杜圻洲馬跡山南方十里多桑苧菜果臯伯通宅在長洲縣閶門內臯橋梁鴻於廡下賃春之所丁令威宅在長洲縣陽山有丹井存焉顧訓宅在長洲縣百口橋東漢時人五世同居聚族百口因所居名橋陸績宅在長洲縣臨頓里門有巨石績罷鬱林太守歸無所裝取石以鎮舟人慕其廉號鬱林石數傳至龜䝉世保其居龜䝉幽居賦云陸子居全吳東距長洲故苑一里又云地接虎丘門臨鶴市琴高宅在長洲縣交讓瀆法海寺西戴顒宅在長洲縣即今北禪寺廣異記云蘇州山人陸去奢亭子即戴顒宅也姑蘇志云唐司勳郎中陸汙嘗居之有花橋水閣見白樂天寄馮御史詩後為北禪寺又皮陸北禪寺聨句云歊蒸何處避來入戴顒宅是也王珣宅在長洲縣日華里即今景德寺陳之竒宅在長洲縣閶門人呼為陳君子宅魏了翁宅在長洲縣南宫坊宋端平間都督江淮理宗賜第吳中復親書鶴山書院四大字賜之即今巡撫治所元絳宅在長洲縣帶城橋東絳嘗參大政歸老於是邦知州章岵表為衮繡坊鄭虎臣宅在長洲縣舞鶴橋東居第甚盛號鄭半州宋末殺賈似道於木棉菴者鄭所南宅在長洲縣樂橋東條坊巷楊循吉宅在長洲縣南濠致政後居支硎山南峰曰南峰隱居文徵明宅在長洲縣德愛橋其父林所構即停雲館也徵明孫震孟宅又在寶林寺東韓雍宅在元和縣葑門內雍既貴歸吳治宅溪流環繞曰葑溪草堂時與徐有貞祝皓馮定劉珏為葑溪聨句周順昌宅在長洲縣閶門外林家巷姚希孟宅在長洲縣中街路蔡經宅在吳縣朱明寺西神仙傳云後漢王方平得道過吳住蔡經宅今蔡仙鄉是其隱處明一統志云在胥門葛洪宅在吳縣東洞庭緑石山下洪於此立壇煉丹朱買臣宅在吳縣穹窿山相傳寺基其故址也吳夫人宅在吳縣孫權之母所居即府城開元寺基周瑜宅在吳縣雍熙寺西建安三年孫策為瑜治第於吳今所稱周將軍巷是也陸玩宅在吳縣靈巖山今寺其故居也何凖宅在吳縣西朱明寺橋宅捨為寺般若臺即其故址李嘉祐宅在吳縣姑蘇臺側嘉祐罷袁州刺史居此見僧皎然酬李員外詩閭丘孝終宅在吳縣馬步橋北蘇軾謫黃州孝終為太守往來甚密軾嘗云蘇有二丘不到虎丘即到閭丘今猶名閭丘巷范仲淹義宅在吳縣元樓鑰記云范氏自唐時居於靈芝坊在今雍熙寺之後皇祐中文正公訪求宗族買田千畝作義莊以贍之宅有二松堂曰歲寒閣曰松風因廣其居為義宅中更兵燬五世至良器始悉復故地周一千四百八十丈結屋十楹寖復舊觀附宋錢公輔義田記范文正公蘇人也平生好施與擇其親而貧疏而賢者咸施之方貴顯時於其里中置負郭常稔之田千畝號曰義田以養濟羣族之人日有食歲有衣嫁娶凶喪有瞻擇族之長而賢者一人主其計而時其出納焉日食人一升歲衣人一縑嫁女者五十千娶婦者三十千再嫁者三十千再娶者十五千葬者如再嫁之數葬幼者十千族之聚者九十口歲入粳稻八百斛以其所入給其所聚沛然有餘而無窮仕而家居俟代者與焉仕而居官者罷弗給此其大較也初公之未貴顯也嘗有志於是矣而力未之逮者二十年既而為西帥及參大政於是始有祿賜之入而終其志公既歿後世子孫修其業承其志如公之存也公雖位高祿厚而貧終其身歿之日身無以為殮子無以為喪惟以施貧活族之仁遺其子而已昔晏平仲敝車贏馬以朝陳桓子觴之曰是隱君之賜也晏子曰自臣之貴父之族無不乘車者母之族無不足於衣食者妻之族無凍餒者齊國之士待臣以舉火者三百餘人如此而為隱君之賜乎彰君之賜乎於是齊侯以晏子之觴觴桓子余嘗愛晏子之好仁齊侯知賢而桓子服義也又愛晏子之仁有等級而言有次第也先父族次母族次妻族而後及其疏逺之賢孟子曰親親而仁民仁民而愛物晏子為近之今觀文正公之義田賢如平仲其規模逺舉乂疑過之嗚呼世之都三公位享萬鍾祿其邸第之雄車輿之飾聲色之多妻孥之富止乎一已而已而族之人不得其門而入豈少也哉况於施賢乎其下為卿為大夫為士廩稍之充奉養之厚止乎一已而已而族之人操壺瓢為溝中瘠者又豈少哉况於他人乎是皆公之罪人也公之忠義滿朝廷事業滿邊陲功名滿天下後必有史官書之者豫可略也獨高其義因以遺於世云賀鑄宅在吳縣鑄字方回越人卜居於府東升平橋嘗作吳趨曲黃庭堅詩云解道江南斷腸句只今惟有賀方回范成大宅在吳縣西范村北中有重奎堂奉宋孝宗御書又有石湖别墅因越來溪故城為亭榭內有天鏡閣孝宗賜御書石湖二大字周必大題壁云紫微舍人别墅登臨之勝甲於東南高啓宅在吳縣吳城東北徐有貞宅在吳縣治北蓋自謫所歸此號天全翁建堂曰天全後為祝允明所居陳鎰宅在吳縣北鐵皮巷鎰以師保致政歸作小園闢地得蔡襄所書晝錦堂石碑復有芝産於堂柱間人以是為完名全節之徵二盧宅在吳縣石湖中盧雍盧襄兄弟所居有芝秀堂見李東陽銘王敬臣宅在吳縣兵馬司橋東今稱大儒巷徐汧宅在吳縣吳趨坊宅後有二株園汧讀書處也顧野王宅在吳江縣三里橋西野王著書處也後人立廟祀之今名顧墟顧榮宅在吳江縣南荒浦村陸龜䝉詩注云陸雲為榮贈婦詩我在三川陽子居五湖隂是也今為永定寺巫咸宅在常熟縣虞山越絶書云虞山巫咸所居言公宅在常熟縣治北子游巷吳地記云宅有聖井二旁有浣紗石梁時為太子蕭正德持去巷東有言子橋夏統宅在常熟縣崇德山相傳晉處士夏統所居衛涇宅在崑山縣石浦其第有友順堂宋寧宗書額葉盛宅在崑山縣東城橋西內有菉竹堂顧鼎臣宅在崑山縣鰲峯橋歸有光宅在崑山縣酒坊橋南蝸廬在長洲縣城北宋中書舍人程俱所居俱政和間自監舒州茶場上書論時政不合來吳葺小屋號蝸廬周隱遙廬在吳縣西洞庭仙傳拾遺云周隱遙洞庭道士自云角里先生之孫學太陰煉形術死六年更生十六年又死如前更七年復生如是三度附唐令狐楚周先生住山記先生姓周氏名隱遙字息𤣥宗其道者號為太𤣥先生汝南人也抱天和冲淡之氣含至精潔朗之質玉冷泉潤松髙鶴閒韜精守道冥得真契谷神既存而長守𤣥關無鍵而不開貞元初遊蘇州吳縣之包山林屋洞秋八月始於洞西得神景觀訊其居者曰距此數里世傳毛公塢毛公道成羅浮居山三百餘歲有弟子七十二人聚石為壇遺跡猶存爾能勤求吾請導之既行而蘿篠迷路不知所往先生瞑目久之逢一物焉雙眸盡碧毛色紫而本白髙數尺餘隨而行之視乃鹿也須臾乃跪止若有所告先生默記之而還至十九年冬刜木鬋茅奠厥攸居得異石一方上有蟲篆驗之即毛公鎮地符也既而鑿户牖以為竇有鶴銜弄冠裳戲舞於庭砌後得一井香白滑甘溢為白泉其旁得石池焉深廣袤丈陽驗陰伏湛如也初先生嘗息於洞之南門中神化恍惚往往失其所在遇好風日亦來人間將至必先之以雲鶴其弟子灑掃香室俄而至矣嗟乎先生之體同乎無體矣不以晝夜更動息不以寒暑易纎厚不食而甚力走及齊馬全乎氣者也雖飲而無漏止如靈龜外乎形者也鹿以導步神柔異物也符以存視道契先躅也井泉去厲昭乎仁也池水不枯齊其慮也仙雲靈鶴之驗去來倣佛之狀其必神行而智知乎豫叔服膺先生之門二紀於兹録先生本起命為記凝神遐想直而不遺元和十三年八月華州刺史兼御史中丞令狐楚記有竹居在元和縣相城明高士沈周宅梅福隱居在吳縣姑蘇志云在西市坊鐵瓶巷口張籍故居在吳縣胥門籍贈陸暢詩有胥門舊宅今誰住之句陸孝子故居在震澤縣宋陸十七所居寶祐中郡守趙汝歷旌其門盧熊隱居在崑山縣治西南鹿城酉室在長洲縣宋王伯起所居獨處一㕓匾曰酉室日焚香燕坐其中太公石室在常熟縣虞山東二里室凡十所中吳紀聞謂太公隱東海居此老相公衙在長洲縣干將坊元參政周伯琦使吳被留張氏構此館之衙極壯麗今猶仍其舊名吳國故館在長洲縣舊傳吳國古館凡三升月館在帶城橋東烏鵲館在烏鵲橋江楓館在渴烏巷又有全吳通波臨頓龍門升羽等館升月館至宋猶存姑蘇館在元和縣盤門內西城下元大德間改為驛問潮館在崑山縣西駟馬橋下吳郡志云崑山雖近江湖自古無潮汐宋紹興間有道人云潮過夷亭出狀元是時潮忽大至知縣葉子强乃築問潮館於水濵明年邑人衛涇魁天下寒山别業在吳縣支硎山側明髙士趙宧光所居震澤别業在震澤縣唐陸龜䝉所構朱鶴齡文類云先生所居一在臨頓橋一在甫里一在震澤鎮集中自遣詩多震澤别業所作有云更感卞峰顔色好曉雲才散便當門復軒在吳縣黃村處士章憲貯書之所其後圃又有清曠堂詠歸清祕遐觀三亭各題以詩萬玉清秋軒在吳江縣同里鎮元寧昌别墅張可觀為之繪圖定軒在震澤縣宋楊紹雲所居有桃源洞廣數畝異石林立劉爚真德秀曾遊此五湖田舍在長洲縣大姚村白陽山人陳淳所居華林園在長洲縣吳地記云在華林橋又平昌里有華池龍潭里有石龍皆闔閭故蹟南園在長洲縣府學傍吳越廣陵王元璙帥吳時所置園相近有元璙别宅又有東莊亦名東墅元璙子文奉所創西園在長洲縣吳郡志云在郡圃之西直子城甚袤唐時所建今為教場孫園姑蘇志云今不知所在唐元微之寄白居易詩云孫園虎寺隨宜看不必遙遙羡鏡湖梅都官園在長洲縣西祝槱野録云梅摯晚年卜築滄浪之旁與蘇舜欽為鄰今猶稱其地為梅家園郭氏園在長洲縣飲馬橋西南本郭雲大夫所居有池號小滄浪今為巡撫院後圃拙政園在長洲縣婁門內大𢎞寺西明侍御王憲臣所築廣袤二百餘畝見文徵明記何仔園在元和縣尹山種植甚繁牡丹尤盛宋周必大嘗遊之見南歸録梧桐園在吳縣館娃宫側夫差園也一名鳴琴川樂府云梧宫秋吳王愁辟疆園在吳縣晉時顧辟疆之園也唐顧况嘗假以居郡守贈詩曰辟疆東晉日竹樹有名園年代多更主池塘復裔孫又陸龜䝉詩云吳之辟疆園在昔勝槩敵前聞富修竹後說紛怪石不知清景在盡付任君宅蓋又為任晦宅也范家園在吳縣雍熙寺後范周所居有石刻三大字緑水園在吳縣織里橋西明髙啓序云吳城南陬有曰朱家園者父老言宋朱勔故墅也廬山陳惟寅氏得之更名曰緑水以園中有池且用杜子美詩語也西園在吳縣西城橋西夏駕河上明王鏊别墅又有真適園在東洞庭文徵明有西園遊集詩歸田園在吳縣東北明司寇王心一家園中有蘭雪堂泛紅軒竹香廊諸勝鹿園在常熟縣北七十里世傳吳王豢鹿所北園在崑山縣漳潭陳氏園也石湖范成大書額東浦黃簡為記鄭氏園在新陽縣馬鞍山前宋鄭竦所築葉夢鼎題曰玉山佳處郡圃在長洲縣郡治後舊多樓亭宋建炎燬端平初張嗣古補葺易名同樂園嘉定中綦奎復立四小亭其芍藥壇每歲花開太守宴客號為芍藥會藥圃在吳縣重元寺唐末僧元達年踰八十好種名藥多自遠方致之皮日休過訪題詩以贈樂圃在吳縣清嘉坊北朱長文所居故錢氏金谷園也長文自為之記附宋朱伯原樂圃記大丈夫用於世則堯吾君虞吾民其膏澤流乎天下及乎後裔與夔契並其名與周召偶其功茍不用於世則或漁或築或農或圃勞乃形逸乃心友沮溺肩綺季追嚴鄭躡陶白窮通雖殊其樂一也故不以軒冕肆其欲不以山林喪其節孔子曰樂天知命故不憂又稱顔子在陋巷不改其樂可謂至德也已豫嘗以樂名圃其謂是乎始錢氏時廣陵王元璙者實守姑蘇好治林圃因隙地而營之為臺為沼今城中遺址頗有存者吾圃亦其一也錢氏去國圃為民居更數姓矣慶厯中豫家祖母吳夫人始構得之先大父與叔父或游焉或學焉每良辰美景則奉板輿以觀於此厥後稍廣西壖以益其地凡廣逾三十畝豫嘗請營之以為先大父歸老之地熙寧之末新築外垣盡覆之瓦方將結宇而親年不待既孤而歸於是遂卜居焉月葺歲增今更數載雖敞屋無華荒庭不甃而景趣質野若在巖谷此可尚也圃中有堂三楹堂旁有廡所以宅親黨也堂之南又為堂三楹名之曰邃經所以講論六藝也邃經之東又有米廩所以容歲儲也有鶴室所以畜鶴也有䝉齊所以教童䝉也邃經之西北隅有岡命之曰見山岡上有琴臺西隅有永齊此豫嘗拊琴賦詩於此所以名云見山岡下有池水入於坤維跨流為門水由門縈紆曲引至於岡側東為溪薄於巽隅池中有亭曰墨池豫嘗集百氏妙蹟於此而展玩也池岸有亭曰筆溪其清可以濯筆溪旁有釣渚其靜可以垂綸也釣渚與邃經堂相直焉有三橋度溪而南出者謂之昭隱寺池至於墨池亭者謂之幽興循岡北走度水至於西圃者謂之西澗西圃有草堂草堂之後有華嚴菴草堂西南有土而髙者謂之西丘其木則松檜梧柏黃檗冬青椅桐柳栁之類柯葉相蟠與風飄揚髙或參雲大或合抱或直如繩或曲如鈎或蔓如附或偃如傲或參如鼎足或並如叉股或圓如蓋或深如幄或如蛻虬卧或如驚蛇走名不可以盡記形不可以殫書也雖霜雪之所摧壓飈霆之所擊撼槎牙摧折而氣象未衰其花卉則春繁秋孤冬苞夏蒨珍藤幽花髙下相映蘭菊猗猗蒹葭蒼蒼碧蘚覆岸慈筠列砌藥録所收雅記所載得之不為不多桑柘可蠶麻苧可緝時果分蹊嘉蔬滿畦摽梅沉李剝棗斷瓠以娛賔友以約親屬此其所有也子於此圃朝而誦羲文之易孔氏之春秋索詩書之精微明禮樂之度數夕則泛覽羣史歷觀百氏考古人是非正前史得失當其暇也曳杖逍遙陟髙臨深飛翰不驚皓鶴前引揭厲於淺深躊躇於平臯種木舊園寒耕暑耘雖三事之位萬鍾之祿不足以易吾樂也然豫觀羣動無一物非空者焉用拘於此以自贅耶異日子春之疾瘳尚平之纍遣將扁舟浮海遨遊山嶽莫知其所終極雖然此圃者吾先光祿之所遺吾致力於此者久矣豈能忘情哉凡吾衆弟若子若孫尚克守之毋頽爾居毋伐爾林學於斯是亦足以為樂矣豫豈能獨樂哉昔戴顒寓居魯望歸隱遺迹迄今猶存千載後吳人猶當指此相告曰此未氏之故圃也元豐三年十二月記隱圃在吳縣靈芝坊宋樞密蔣堂所築堂兩守蘇因家焉自賦隱圃十二詠繪為圖皇祐間圃中溪館産靈芝知州李仲偃集賔僚賦詩為壽因立靈芝坊適適圃在吳縣樂圃坊內即古樂圃地明申時行所築中有賜閒堂凌處士莊在長洲縣由姑山北唐韋莊有詩東莊在元和縣葑門內明吳寬父孟融所治中有十景為一時名勝漫莊在吳江縣宋處士顧禧所居禧棄官髙隱鄉人重之拂水山莊在常熟縣虞山之麓實巖灣之東中有耦耕堂明發堂及花信樓秋水閣朝陽榭紅豆莊諸名勝羅隱菴在元和縣葑門外甫里北隅隱以龜䝉願與之遊因結菴於此後為魏了翁别業臞菴在吳江縣淞江之濵南畿志云王份故居圜江湖以入圃有與閒堂烟雨閣聚遠樓樂菴在崑山縣圓明村宋李衡歸老之地就隱在長洲縣華山宋紹興間張廷傑所葺周必大遊山記云漢卿既得華山就隱刓剔巖竇疏導泉源佳花美木四時皆有竒觀石澗書隱在長洲縣俞琰所居因自號石澗中有詠春齊端居室盟鷗軒皆琰孫貞木作梅花墅在元和縣甫里明祕書許元祐所構選地百畝瀦水壘石擅一時之勝今為海藏菴筠谷在吳縣西館橋西宋待制榮薿所居自號筠谷知臨安引年丐辭上以琉璃壺貯丹桂花且繪之便面題詩二十八字併金帶為賜復書筠谷二大字寵其歸桃花塢在吳縣城西北隅南畿志云在閶門內北城下宋時為樞密章楶别業後為蔬圃明唐寅於其地築桃花菴菴中有夢墨亭盤野在吳江縣宋狀元黃由之别墅寧宗賜名內有墨莊胡夫人真蹟三清閣共樂堂等匾由自作詩東臯在常熟縣東明少參瞿汝悅之别業子式耜增浣溪草堂貫清堂諸勝小洞庭在長洲縣齊門外劉珏纍石為山號小洞庭徐有貞為之記小瀟湘在吳江縣長橋南元寧伯讓所居林亭臺沼烟雨時可入畫圖故有是名小輞川在常熟縣虞山之麓山塘涇南明御史錢岱創取王摩詰輞川諸勝繪景十二於聚遠樓東壁人呼小輞川影娥川在昭文縣治東晉有見仙娥泛舟者故名琴川發源於此鶴市在長洲縣閶門內吳越春秋云夫差葬女勝玉舞白鶴於市聚觀者以殉葬越絶書云殺生以送死今故市巷東有舞鶴橋吳市在吳縣春申君闢兩城以為市專諸巷在長洲縣閶門內舊傳吳專諸所居今為石塔廟臨頓在長洲縣東吳王嘗逐東夷頓軍於此故名今呼為臨頓里其地有臨頓橋明一統志云或云陸龜䝉亦嘗居此雞陂墟在長洲縣婁門外二十里越絶書云吳王畜雞所也蠡口在長洲縣齊門北相傳范蠡泛五湖出此明一統志云在長洲縣界一名蠡塘白公隄在元和縣閶門外虎丘山塘白居易築南村在吳縣越來溪西吳山下寺薄盧瑢所居匾曰吳中第一林泉東村在吳縣鳯凰山南一里縣志云東園公所居園明葛一龍詩曾聞東園公住此不復出年年開白花猶是漢時橘南村在吳江縣綺川元末隱士張璹所居烏夜村在崑山縣城南晉穆帝何皇后父淮寓此産后之夕有羣烏夜驚於村落自後有烏夜鳴必邀恩赦干隧在吳縣西北戰國䇿云越王以散卒三千禽夫差於干隧史記正義云干隧在萬安山西南一里角頭即角里在吳縣洞庭西山漢角里先生所居史記正義云太湖中洞庭山西南有祿里村夏駕湖在吳縣西城下吳王壽夢避暑駕遊於此故名今城下猶存外濠即運河也有灣亦名夏駕女墳湖在吳縣西北六里相傳闔閭葬女處以水繞墳因名白居易詩女墳湖北武丘西是也百花洲在吳縣西城下胥盤二門之間明一統志云在姑蘇山上採香徑在吳縣香山傍吳郡志云吳王種香於香山使美人泛舟於此採之又名箭徑一水直如矢也吟浦在吳縣吳淞江南韋應物山莊韋嘗放舟吟咏於此故名錦帆涇在吳縣盤門內南畿志云即舊子城濠也世傳吳王嘗作錦帆以遊宋嘉定間郡守趙彥橚疏此以通運河採蓮涇在吳縣東南運河之陽南畿志云上有採蓮涇橋下可通舟傳是種蓮故處花溪在長洲縣定跨橋北青霞居士顧凝遠築别館閒亭頗極幽勝香水溪在吳縣西南吳故宫中俗傳西施浴處一云吳王宫人洗妝於此故又呼為脂粉塘古詩云安得香水泉濯郎衣上塵即此交讓瀆在長洲縣子城北續圖經云瀆因陸慧曉與張融竝宅其間有池池上有楊栁二株何㸃歎曰此池便是醴泉此木便是交讓瀆因以名今湮為民居僅汚池丈許立交讓祠於此又有交讓巷俗訛為甘將巷練瀆在吳縣太湖鴻雁山之西舊傳吳王所開以練兵王充論衡云闔閭嘗試士於五湖之側石射堋在吳縣靈巖山百步街之前有石鼓大者三十圍小者半之又有石馬如人騎可盤灣在吳縣西洞庭山下洞庭記云吳王遊太湖頓軍於此曰此亦可盤桓也遂名睡龍灣在吳江縣黃家溪相傳宋髙宗南渡時駐蹕於此有泉湧出因名走狗塘在吳縣西南跨塘橋越絶書云闔閭走犬長洲即此雉塘在吳縣練瀆西一里吳郡志云晉琅邪王彪女於此為雉所驚因禁之雉遂絶故名禁蛙池在長洲縣北禪寺東天泉禪師說法取池中一蛙㸃其頷羣蛙遂無聲其地至今不産蛙興賢池在昭文縣乾元宫宋嘉定中浚池得石刻興賢池三大字投龍潭在吳縣龜山下林屋紀遺云嘉定初民採藻於此獲吳越王所投金龍玉簡簡以銀製長九寸篆文隱然填以朱漆題云太歲壬戍時宋建隆二年也空心潭在常熟縣興福寺潭上有通幽軒皆以常建詩得名白馬澗在吳縣南二十五里明一統志云晉僧支遁養馬處石梅澗在常熟縣東嶺下相傳梅為仙侣遺核所生澗東有初平石亦仙跡云顧家青山在吳縣大石左麓顧元慶貯書所也山中名勝有八松陵即今吳江縣治吳越春秋云越追吳入於江陽松陵是也鬭鴨欄在吳江縣長橋北相傳陸龜䝉養鴨於此一名鴨漪亭仙人洞在吳江縣東門外仙里橋下深黑莫測舊傳通太湖約七十里可出林屋洞宋陳昉於此仙去昭明洞天在昭文縣乾元宫後相傳徐神翁棲息於此俗呼仙人洞其上有篆刻四字越公井在吳縣上方山治平寺中唐廣明元年修井記云隋開皇十年越國公楊素築城穿此井其徑一丈有竒石欄如屏繞之上有刻字栁毅井在吳縣洞庭東山道旁相傳其地即橘社毅與龍女寄書處雪井在昭文縣虞山乾元宫旁宋元祐中申元道南遊其師徐神翁誡之曰逢虞則止無雪則開遂構井於虞山無雪之處故名丹井在昭文縣治虞山南嶺下明宋濂銘序云梁天監初漢天師十二代孫張道裕來隱其下建招真之地鑿丹井焉宋淳熙中道士李正則浚井得藏丹石緘啓之化為雙紅鴿飛入尚湖邇年井且廢莫知其所周尊師元真窮日力尋獲之重加以甓構亭覆上時洪武元年也石幢在長洲縣城北數里唐徐浩書郡守陳師錫徙置府第鄉人夜過河上者多見鬼物乃相與請於州復置舊處怪遂絶㸃頭石在元和縣虎丘山晉竺道生說法石為㸃頭今有悟石軒沁雪石在常熟縣鷗波亭前海虞縣舊署也有二石一鐫沁雪二字趙孟俯八分書錢允言得之沈周繪圖系以詩一曰垂雲失不可考寒翠石在崑山縣顧德輝玉山草堂前德輝自撰拜石壇記宋仁宗御書碑在崑山縣清真觀內即放生池碑也縣令項公澤跋白公檜在長洲縣郡治後池光亭前水中唐白居易手植宋政和初朱勔取獻京師古杉在元和縣虎丘山殿前相傳為晉王岷所植唐末猶存羅漢松在吳縣洞庭山福泉寺舊傳蕭梁時植古松在吳縣天平山獅子巖下自地崛起甚怪正中一幹聳拔如幢延袤二畝號眠松張即之書卧雲二字匾之謂即范文正讀書處七星檜在昭文縣致道觀相傳梁天監中物竒古特甚今尚存其三餘則慶厯中補植者沈周繪三株圖陰陽柏在崑山縣永懷寺內髙麗國所進宋髙宗以賜王綯綯種於寺大殿左右髙與殿齊左花則右實右花則左實遇仙樹在崑山縣信義村宋龔猗遇異人為植銀杏後繁衍至七十餘顆鄉人稱曰遇仙樹松江府闔閭城在華亭縣南六十五里夾江又有城二相傳闔閭所築以備越漢書志注云婁縣有南武城闔閭所起以候越當即此城袁松城在華亭縣東三十五里舊圖經云晉左將軍袁嵩築此以備孫恩又名築耶城疑即此前京城在華亭縣東八十五里蕭梁析婁縣地置近浙江海鹽縣東北境白苧城在華亭縣南十里俗名白苧匯明一統志云地生野苧周回如城胥浦城在婁縣西四十里相傳梁大通間築以地接胥浦故名金山城在金山縣舊圖經云周康王南遊築此城鎮大海南接金山故名又相傳吳越錢氏築此為戍守處秦始皇馳道在婁縣西北崑山南四里相傳有大缸路西通吳城即馳道也輿地志云始皇東遊至會稽句章經此賈山至言云泰皇馳道遍天下南極吳楚此其一也按崑山南四里即古浦塘然則馳道即塘之岸也山之北又有秦皇走馬塘魯般殿在金山縣洙涇法忍寺相傳為般所造齊柱纍枅為脊鳥雀不棲殿庭雙柏亦甚古云般所植病心者掇其皮煮服之今萎烽樓在華亭縣東南寰宇記云吳時望海處不礙雲山樓在金山縣張溪元楊謙隱居處附元楊維禎記余嘗北渡揚子訪金山之勝而不知松之南又有所謂大金小金出沒於雲海之中如壺嶠之在弱流外也至正九年春余抵松之張溪溪之東有大族為楊竹西氏居之南扁其樓曰不礙雲山竹西宴於樓之上窗户四闢萬頃之雲兩鰲之島皆自獻於眉睫之下竹西風日佳時岸中樓上手揮五絃之餘與一二解人談至理既以八窗無礙者闢於目復以八荒無礙者洞於心雲山之觀盡矣備矣竹西憮然若有得起舉酒而自歌曰海之雲兮油油雨我田兮有秋海之山兮離離障我流兮東之又歌曰雲之動兮躚躚吾與雲動兮動而不遷山之靜兮層層吾與山靜兮靜而不停併録其歌以為記丹鳯樓舊在上海縣天妃宫內後樓燬明秦嘉楫修拓城樓因以舊額移置其上即以為丹鳯樓云來青樓攬輝樓在福泉縣青龍江上俱元都水監任仁發延賞之所楊維貞詩云大江如龍入海口青山似鳯來雲間翡翠碧雲樓在福泉縣杜村元杜元芳構以其髙出林表故名中貯書萬卷下有蒼碧灣及竹深荷淨晴好雨竒諸齊軒凡七十二所其别業在東南雲林池島尤勝折桂閣在華亭縣尉㕔宋李夔以右文殿修撰謫華亭生子綱於此又呼相公閣歸雁亭在上海縣城東元費用和畜雙白雁及二雛於園池以環著其足後去而復還毛羽光潔足環儼然時構園適成因名知樂亭在青浦縣大小蒸之間宋邵桂子鑿池養魚築亭其上以知者樂水知魚之樂二義名之醉眠亭在福泉縣青龍江上宋僧行中無悔所築蘇軾名之有詩小蓬臺在華亭縣元末楊維貞寓樓也踞百花潭上明貝瓊為志别有柱頰樓草元閣閣近迎仙橋西北明成化間猶存附貝瓊志略按東方朔三島記蓬萊在東海北周五千里秦皇遣徐福往求不死藥至輒有風引帆而返俗疑其妄㑹稽為東南大郡舊稱小蓬萊則以其地擬之也鐵崖楊先生族出㑹稽而老於松上即七者寮之東偏葺樓一所顔曰小蓬臺示不忘越也臺俯大川别二支其一南流其一北折而東中匯為百花潭有三石梁跨川上南曰金鼇北曰鐵龍東曰玉虹是松之勝畢效於兹而為小蓬臺所有江雲海雨山紅野緑舉在几席之下則視㑹稽之蓬萊大小不同其超乎埃壒不啻真在雲氣中矣先生晨興披鶴氅冠鐵冠燕坐其上客至不下臺好事者就見之相與高談大噱或出桃核杯酌酒酒半取鐵笛作長短弄旁若無人觀者以為謫仙人也瓊惟先生早擢高第宰天台後去而客錢塘姑蘇者久之州郡兵起往依元帥劉九九於建德九敗挈家東下松之通守顧逖具舟楫迎之蓋去㑹稽三十年而息於是非蓬萊而蓬萊矣講經臺在上海縣靜安寺宋嘉定間寺僧仲依築土臺聚其徒講習於此遺址猶存元錢嶽詩云江月衣搖金篆冷天風時送寶花來升仙臺在福泉寺青龍江隆福寺前相傳有石刻云王可交仙壇遺跡具存樂全堂在華亭縣泖涇元黃宗武宅附元虞集記華亭黃君宗武隱居長泖之灣植耕桑乎衍沃藝卉木乎幽勝上以奉乎百歲之父母下以長其奕葉之子孫優游焉誦詩讀書於太平之日蓋厚德之致也而時未有間焉其季子璋舉進士貢於京師而大夫士始知其家有所謂樂全之堂者皆欣然稱道之璋來求文以為記夫黃氏之樂如前所云者信乎其可謂全也已親之壽也身之康也子之文也甘㫖之充也藏修游息之有其所也遭夫時之無虞而不見外事也將天錫之以全也與噫求全焉則志荒有其全則意肆善保其全者知止而不自足者也長泖之樂蓋如是乎若夫聖賢之所至與天地同流而無所虧缺間斷而後樂生焉是又全而樂者也璋歸試誦豫言於家庭之間乎雙壽堂在華亭縣蒨涇明光祿少卿周庠奉親之所嘗迎飬京邸亦揭是名縉紳題詠甚富三貞堂在華亭縣東明成化間旌中書舍人張駿家為三貞之門因以名堂三貞者駿母胡氏世母瞿氏楊氏也玉恩堂在華亭縣西普照寺右明太僕林景暘宅後有翼文閣髙敞可眺九峰其上藏書數萬卷占星堂在華亭縣北艾家橋東明宗伯唐文獻宅今為學士沈荃宅二公俱諡文恪郡人以為美談曲水草堂在奉賢縣百曲港上明宣德末姚䝉與弟臨隱居之所光節堂在婁縣西吉麗橋南明福建參政任勉之致仕歸楊士竒贈以登科致仕恩榮始終八大字周忱為刻石樹之堂下終慕堂在華亭縣南龜蛇廟左明張璚自名其居寓思親也錢溥作記七松草堂在婁縣西張氏别墅水木清美老松七株尤竒古故名二陸草堂在婁縣干山即今之圓智寺陸機與弟雲讀書處南村草堂在婁縣泗涇北元陶宗儀耕讀之所來德堂在金山縣元末呂良佐居楊維貞作記瑞芝堂在金山縣明衛指揮西寧宅有芝生楣間因名張弼作記三壽堂在上海縣城南明潘恩年八十時華亭徐階嘉興吳鵬咸以同榜來稱壽宴於堂故名勤織堂在上海縣城東明蔣性中作堂以奉母母以生平勤織教之性中拜受遂以名堂心遠堂在青浦縣鍾賈山壽安寺山人鍾子鳴先世與賈姓同隱壽安山中人以鍾賈名其山此堂疑鍾氏遺蹟棲雲樓半雲亭皆名勝樂靜堂在青浦縣蒸溪元教授曹澤之休坐處又有園亭曰息影厚堂在青浦縣蒸溪元曹知白居附元虞集記九州之槩獨謂揚為輕揚其所居者然也矯其輕而抑其揚則必有道矣雲間有君子曰曹君貞素名其堂曰厚美哉厚之為言也風不厚不足以舉羽水不厚不足以勝舟雲不厚不足以致雨土不厚不足以生物是故坤道以至順配天無疆者亦以其厚而已君子知厚之可以成德也故積學以致其厚焉然則極其至也豈止於矯其輕揚而已哉貞素事琴書尚氣義友名勝樂閒退絶跡權要之門又能闢池館藝松菊弄翰戲墨吟咏乎猿鶴之羣其居三泖九峯間其人有司馬子長之風其子弟無鄙夫豪侈之習則居是堂也真知所以自厚者矣雖然益培之勿以輕揚也庶可遠大乎居竹書堂在福泉縣元曹和甫宅方回作記趙孟俯書今碑石在府學內陸機宅在華亭縣谷陽門內今普照寺相傳寺為陸氏園亭後捨為寺栁約宅在華亭縣北今栁家巷顧野王宅在華亭縣亭林鎮北有湖曰顧亭湖南有林曰顧亭林今寶雲寺其址也錢溥宅在華亭縣東三里汀西顧清宅在華亭縣東陸樹聲宅在華亭縣西南沙家橋徐階宅在華亭縣南門內今督帥府馮恩宅在華亭縣薰漕㕔旁衛涇宅在奉賢縣蕭塘今為崇福寺按涇生於蕭塘後乃遷石浦居民嘗於古井得巨磚無數皆有衛仲英三字仲英膚敏之子與涇為從兄弟也孔宅在青浦縣治北九里宋淳熙間居民浚河得碑云天寶六年黃池縣令朱氏葬於崑山縣全吳鄉孔子宅之西南其地有夫子廟在慧日院側院僧疏廟陾渠得寶玉六事璧三環二簪一今藏縣庫舊圖經云夫子未嘗適吳以闕里譜系考之孔氏二十二代孫潛後漢太子少傅避地㑹稽遂為郡人二十九代滔梁海鹽令三十二代嗣哲隋吳郡主簿三十四代貞隋蘇州長史意孔氏子孫有僑寓宦遊於吳而遂居此者即所居立先聖廟耳今廟側又有梁紇廟其為子孫奉祀之地明矣所瘞璧簪環珮之屬真孔堂之遺寶得非葬先聖衣冠寶璧於是地乎其旁有宰我墩顔淵井則因孔宅之名而遷合傅㑹者也宅後侵於慧日院今在孔宅涇北夫子廟在涇南相去頗遠梁紇廟西去益遠疑後人改作也康熙乙酉春聖祖南巡賜御書聖蹟遺徽四字匾額又澤衍魯邦四海人均化育裔分吳會千秋世永蒸嘗對聫袁嵩宅在福泉縣泗涇塘嵩宅鎮晉隆安中嵩為吳郡太守子孫遂居於此今其地曰嵩子里水曰嵩塘谷陽園在華亭縣西湖上宋朱之純退休地有自題湖齊詩北花園在華亭縣通波門外其西即採花涇其北為夜遊涇皆以園得名今廢為叢塜適園在華亭縣北明尚書陸樹聲别墅芝園在華亭縣東北馬𡺸寺西明何三畏所構中有觀濠堂歌風館諸勝孫家園在華亭縣披雲門外明孫克𢎞墅今遺有坊柱而讀書樓危峙將圮竒石卧荆棘中傲園在華亭縣南明翰林孔目何良俊别業園有四友齊謂維摩詰莊周白居易與良俊而四熙園在華亭縣積善橋左明光祿丞顧正心别墅附明張寶臣記昔勝國時玉峯顧仲瑛氏園池甲天下至今人能追其桃溪金粟菊田之室之美宛在眉睫則鐵史如掾之記存焉爾吾松顧氏熙園膾炙海內凡結綬宦遊㩦笻雲集者靡不載酒相過恣情搜討以為江左之麗矚遐壤之夸談今秋觀潮浦口適集兹園得詳覽焉遂為之記園距東郭三里許面水而門門以內為四美亭啓左扉面北落落長杉瀟瀟疏竹夾植徑中行數十武而危樓翼然榜曰熙園是園之啓途也東入山徑蒼苔碧蘚似武陵道中折而北俯仰盤旋陡入深壑嵌空中時閒淙淙聲疑山背有龍湫焉復折而南踰峻嶺下層巒劃然天門開則流觴曲水在其下為聽鶯橋花時趺坐睍睆盈耳可當數部鼓吹倚橋面南而臨者芝雲堂也其陽則竒峯萬疉古樹千章蒼茫雲際而下則華沼一曲荷香十里恍憶太液池頭好事者每欲窮其幽致則入西麓出東隅如登九折坂入五溪洞怪石巃嵸林薄隂翳幽崖晦谷隔離天日自午達晡始得穿竇出客外坐方飢疲欲卧而出者爭目眩汗浹魂搖搖不能吐一語也噫竒觀哉其陰則因閣藥房霓連雲蔓復道相屬行者每失故道商周之鼎彞唐宋之圖畫紛披闃駢其中不可更僕數則主人安神思道之所非酌霞枕香之友弗能到也慿樓西眺旋臺飛觀隱隱樹杪間冠以玉樹瓊花罨映下方令人可望不可即堂之左為長廊響屧隔岸土阜蜿蜒雜植梅杏桃李春華爛發白雪紅霞彌望極目又疑身在衆香國矣繞廊而北度飛虹橋橋平廣滑澤可坐而邀月大士閣兀立橋畔題曰水月如來稍東為池上亭又東度板橋為與清軒前臨廣池灝溔潢漾繡尾銀鱗出沒無算巨者賫浪飛涎客至舉網擊鮮稱快事遙睇南岸皓壁綺疏隱現緑楊碧藻中其壺瀛宫闕幻落塵界乎繇是陟彼北山平岡逶迤髙梧修竹蔭蔽左右西達齊青閣北望平疇緑淨款乃四起又疑下有朱陳村苐少鳴雞吠犬耳閣前周繞廣除可馳駿足對面翠屏壁立峭㠋鬱盤羽裳之客斑衣之友時遊娛其上纍數級下依水而屋雕欄繡楹虹飛霞屬歌聲時出簾箔中則小秦淮也南遵回廊數十盤鼻間微聞旃檀氣則羅漢堂峙焉堂供簿伽像三旁列五百應真金碧莊嚴鐘梵具設堂後小閣三楹藏貝葉書甚富時倩高緇翻閲鐸聲琅琅出牖外儼然古招提也堂前一巨石髙十丈許四面玲瓏真襄陽譜中物初得是石未有盤載至泖涇舟覆石沈牽挽而出先得盤次乃得石合之其舊偶也珠還劍合豈獨神千古哉構堂時掘地得古鐵缸大可容斗斛今以作焚爐亦異物也堂左經闕壯繆祠度濯錦梁並步虛廊尋石竇而出則為芝雲堂之右曠然廣庭而園之觀止矣是園也石第一水第二亭臺花木橋梁之屬第三梓澤平泉遐哉邈矣以豫耳目所睹記如婁水之王錫山之鄒江都之俞燕臺之米皆近代名區顧有其巨麗者不必有其閒曠有其清祕者不必有其廣平蓋清宇先生擲數十萬金錢收兩邑瘡痍其胸次真可吞雲夢八九故規模位置軼前哲無兩而嗣君原之文孫元慶大雅亢宗又皆以繪事擅長臆間具有邱壑其增修㸃綴俱從虎頭筆端摩詰句中出之宜其勝絶一代也余不揣蕪陋聊述梗槩如此豈能若鐵史之鋪揚乎秀甲園在婁縣秀野橋北國朝少傅王文恭頊齡别墅康熙乙酉聖祖南巡臨幸其地時藤花盛開御賜蒸霞二大字越歲復幸園中秋水軒頊齡繪圖紀恩賜金園在婁縣谷陽門外尚書王鴻緒别墅康熙乙酉聖祖南巡幸之賜御書松竹二大字匾額丁亥復駐蹕焉鴻緒有詩恭紀後樂園在上海縣黃浦東澳明陸深宅豫園在上海縣城內明潘方伯允端别墅中有玉華堂允端藏父恭定公恩所寶竒石曰玉玲瓏者故以名堂西園在青浦縣富林明曹泰别業尚夷齊在南匯縣鶴沙里元末朱聽作詩好竒楊維貞名其齊曰尚夷以規之有銘古齊在青浦縣蒸溪元曹知白居附元黃溍記古齊者雲間曹君貞素之所游息也曹君之先為永嘉大族其别於雲間有為宋季名進士者君之伯父也家益充所居益以侈大尺椽寸瓦皆非先廬之舊獨此齊之屋猶為六世故物自君之曾大父宮使府君徙置今所號為西齊於是又八十有六年矣君復繕治藻飾環以佳花美木池臺水月之勝蕭然如在窮林邃谷間更號之曰古齊而以書來徴文為記蓋將示後之人使無忘也夫所貴乎古者豈不以先世氣澤之所存乎彼沾沾焉慕為榮古而陋今者曽不足以知此方且巧取豪奪乎人之缺壺破斧枯竹敗素棄遺無所可用之物摩挲把玩而以博古自命至於其先人之廬一椽之折一瓦之隳易而去之唯恐不亟視君之為亦可少愧矣商人之詩曰自古在昔先民有作夫謂之先民而又謂之昔謂之古其辭之繁而不殺者非以致意於居處物器之細而已引而勿替必有事焉庸書而歸之俾刻石陷諸壁間庶幾後之覽者復以今為古而彌謹其存也安雅齊在福泉縣元教諭曹慶孫藏修地閲耕軒在奉賢縣南橋鎮明參政陳貞父士傑田居方孝孺有閲耕軒詩序筆議軒在上海縣何溪元末彭汝器評宋史之所萬卷軒在福泉縣青龍江元莊肅聚書其中三味軒在福泉縣元張麒以菰米蓴菜鱸魚三味奉親故名附元楊維禎記松江之集賢鄉有隱者張氏曰麒字國祥自幼清修謙謹長稱鞠躬君子時丁兵變晦跡祥澤日與古漁老樵為山水伴人勸之仕則曰余世力農素非食肉人也且藩服尚武又非吾仕之時子獨不聞吾步兵之仕乎出赴齊王冏辟秋風改衣徑决去捷如脫不頃刻留卒不與㳫祿者同鈇鑕而甘豢者乃故鄉菰飯蓴羮鱸鱠三味而已耳余幸不違親於異鄉千里外田有菰米無歉年水有蓴菜鱸魚無饉歲日以三味為吾菽水之奉而餘以覃吾賔友其樂充然也奚以仕為故顔其軒曰三味雖大貴人方丈食前五鼎九牢不以易也東維叟舟過通波塘麒不遠水陸程延致於三味所治酒食張桐弄竹為叟歡叟興酣為絙秋聲琴撫鶴南操以髙之辭曰驥北逝兮鶴南旋松之廬兮八世其延鱸有段兮菰有田羮我蓴䜴兮釀我澤泉誦有書兮歌有絃歸與歸與烏知金􅎆之瘁口兮玉羜梗咽東莊在華亭縣車墩東明孫承恩别業有讀書堂叢桂吸月悠然三亭聨璧池玉虹軒翠雲屏香雪林諸勝司馬莊在奉賢縣白沙里明張輔别業張弼有記秦望山莊在金山縣張堰西國朝尚書王日藻别墅亭臺樹石為郡南勝區清河義莊在青浦縣橫雲山國朝張淇建中有希范堂師竹軒淇與子彚置田贍族立宗祠於此一峰小隱在華亭縣北栁家巷元黃可望隱居處今福泉菴是其遺址鳯山書屋在華亭縣東明朱應祥讀書處旁有㸃易臺洗心亭諸勝樂琴書處在華亭縣東北明學士沈度所居小山招隱在婁縣小橫山下元孫稷别業有仙聖館凝翠軒諸勝雲間洞天在婁縣東南里仁坊宋參政錢良臣園南畿志云今錢家巷其遺址也有御書雲漢昭回之閣及東巖堂巫山下十二峰觀音巖桃花洞雪窗雲榭來禽渚流杯亭桃蹊杏村龜巢橘塢明月灣薝蔔林諸勝後漸廢明成化間郡守輦數峰置署圃至今存焉古村居在上海縣城南明曹迪隱居之所中有清槩軒瓢樂山房寶古齊就麓山居在青浦縣西佘山明施紹莘别業白石山寮在青浦縣東佘山明徵君陳繼儒棲隱處梧溪精舍在福泉縣青龍江上元江陰王逢避地之所中有蘿月山房冥鴻亭小草軒古窩在華亭縣元末陳珍所居創於宋咸淳初歷百餘年尚存故名楊維貞為之記雲窩在華亭縣東明太學生張正宗講學授徒之所著有大學說門人侯藎為之立傳蘆子渡在上海縣靜安寺西舊滬瀆旁俗呼為蘆子城亦晉虞潭防海寇處平原村在婁縣機山下陸機曾為平原內史故名小湖在華亭縣西城已湮涸今谷陽門內德風橋有陂澤匯城下疑其遺蹟柘湖在金山縣新運鹽河北東鄰徐浦塘張堰明一統志云湖中有小山生柘樹因名秦時有女子入湖為神水陸池在華亭縣興聖寺昔有龜數枚聞講經聲則緣砌而上講罷則去後以其地為棠溪書院池在院中養魚池在婁縣西晉陸瑁所居池為瑁養魚處明一統志云一名瑁湖鸚鵡洲在金山縣界海中金山下山北古海鹽洲後淪為海元末潮齧北岸下瞰橋井猶見一碑曰鸚鵡洲界文翬洲在上海縣界黃浦中元末始廣尋丈後延袤至數十畝王逢㩦里叟門生共登適鳴雉羣集作詩紀之因名唳鶴灘在婁縣西三里明一統志云在養魚池旁舊有亭今廢為接官㕔釣灘在金山縣朱涇明一統志云在府城南三十里唐船子和尚垂綸之地今為法忍寺又有松澤四亭是其維舟咏歌處石筍灘在南匯縣界下沙垾海塘外到海三十餘里每二三丈輒有石如筍植立沙中潮汐至此分流又名分水港吳王獵場在華亭縣東南舊圖經云吳王獵所有五茸茸各有名在華亭谷東又云陸遜生此子孫常所遊獵後人呼陸機茸今其地為桑陸滬瀆壘在上海縣舊有東西二城盡齧於江吳都記云松江東瀉海為滬海亦曰滬瀆瀆旁有壘晉虞潭所築通鑑云隆安四年吳國內史袁嵩築以備孫恩讀書堆在華亭縣亭林寶雲寺後陳顧野王讀書於此堆髙數丈橫亘數十畝林樾蒼然野王墨池在其側古岡身在奉賢縣西南曰沙岡竹岡紫岡南屬於海北抵松江長百里入土數尺皆螺蚌殼世傳海中湧三浪而成其地髙阜宜菽麥吳郡圖經云濵海之地岡阜相屬謂之岡身此天所以限滄溟而全吳人也三女岡在奉賢縣南橋舊圖經云吳王葬三女於此樞要云葬妃於此相近有明行寺今寺北二里有髙岡是其處鶴坡在南匯縣下沙鎮其地産鶴俗又呼鶴窠周公墩在金山縣垾海塘外墩距金山城不十里當潮勢奔猛處疑古人所築以戍兵防海者或因周康王金山城得名又有白茅墩逢陳墩皆舊烽堠駱駝墩在福泉縣簳山北又呼落彈墩相傳宋理宗妃林氏葬此綾錦墩在福泉縣盤龍江上元錢全衮種桑之所全衮嘗於此修郡志并韻書羅漢井在華亭縣南禪寺明一統志云宋崇寧中僧普願鑿井得羅漢像故名井泉甘冽八角井在婁縣西南與張涇橋近其水通海相傳歲旱投鐵簡於中能致雨俗謂陸氏外㕑井明一統志云在陸氏宅旁瑞光井在婁縣西南超果寺西廡下明一統志云宋太平興國中僧慶依奉吳越錢王宫中觀音像至松像舒祥光如虹貫於此井因名後復覩金饅之異邦人病者多汲飲焉東一井尤甘冽十井在青浦縣鍾賈山壽安寺環有十井水極清冽蓋十道菴遺蹟也五色泉在華亭縣西湖道院內明一統志云相傳葛稚川鍊丹湖上丹成投水中後常湧五色泉士人見者必擢髙第湧泉在上海縣靜安寺前晝夜騰沸甃井作亭其上後亭廢井湮於港中又有緑雲洞僧壽寧棲息之所檜竹桐柏層陰疉翠落人衣帽遊者疑為華陽小有之境趙孟俯顔之楊維貞為記黃耳冢在華亭縣南二里旁有普寧寺俗訛黃泥寺述異記云陸機有快犬曰黃耳慧黠解人語機在洛為書置竹筒繫犬頸犬能往還馳報犬死葬其村南二百步呼黃耳冢云劉貢父詩話又以黃耳為僕赤烏碑在上海縣舊靜安寺吳赤烏中天竺僧創重元寺勒碑紀事宋祥符間敕名靜安嘉定中遷寺而碑沒於江元錢嶽詩云悲凉斷刻三江裏想像雄文六代前又有陳朝檜唐陸龜䝉皮日休有重元寺雙檜詩即此宋政和中朱勔繪圖以進中使取之雷碎其一而殿右者尚存後寺遷亦沒沈光碑在福泉縣青龍鎮勝果寺有鬼自稱有漢烈士沈光書迹刻石宋許尚謂之鬼書石幢在華亭縣署地有湧泉云是海眼大中十三年立此鎮之石魚在婁縣干山之巔相傳風雨時每化去其脅有泉遊人掬以頮面云能明目試劍石在福泉縣北簳山東壁相傳干將試劍於此一石中剖宛如劍截銅鐘在華亭縣興聖寺相傳鑄鐘時有老嫗以雙股銀叉投液中今見於鐘腹捫之攖手或云有金指環在蒲牢側髙不可見吕公樟在華亭縣北道堂內相傳宋時有回先生過此手植樟一株於雲堂後數年復來問章公何在時樟已枯瘁乃取瓢中藥一丸瘞根下樟復榮每葉俱有瓢痕人始悟吕仙也江南通志卷三十一
