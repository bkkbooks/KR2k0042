body:
  text: 江南通志卷一百四十五人物志宦績七太海通三州太倉州宋郟亶字正父太倉州人第嘉祐進士授睦州團練推官熙寧中上書陳蘇州水利指畫條悉為吳中言水利者之凖的王安石善之授司農寺丞提舉興修兩浙水利子僑字子高亦有才孫載字積中嘉定人居練祁市為河中府户曹歷事三守皆侃侃與爭曲直㑹察訪使辟為官屬時乾佑縣令不奉行青苗法使載按之載言邑小民貧令實無罪知德清以德化民訟有纍年不决者得一言皆感悟去歷知海沂婺亳諸州皆務大體時號循吏大觀中以朝議大夫致仕龔宗元字㑹之居今太倉界以鄉貢知句容縣摘發如神楊紘持使節行部號深酷至境曰龔君已治吾往徒擾遂不入仕至都官員外郎明袁銘字德新嘉定人隱居東海倡明春秋學洪武中召對侃侃直諌除蘇州訓導與鄭閎同為經生所宗閎字以純精易學長洲縣學博陳述字宗理嘉定人宣德間為四川參政時流賊剽掠官軍失利述至推誠招撫降者三百餘人已而德陽賊燒劫祈安縣述統兵當賊衝間出竒兵撓之旬日悉平初蜀民不務本計述設法勸課數年間農桑遍野民用饒裕致仕後蜀人立祠祀焉著有農桑風化録靜軒集陸容字文量太倉人少與張泰陸釴稱婁東三鳳成化丙戌進士歷職方郎中籌畫邊事動中事宜外國貢獅子至廷議遣大臣迎之安南與占城閧議發兵往擊容俱力論得寢時告變者賞重錦衣百户韋瑛掩平民告變容請詔法司鞫瑛坐誅告者漸衰𢎞治初有倚中貴求將者上面諭之執不下事竟止太監李良舉都指揮王欽梁宏為都督僉事命已下容劾良市恩擅權卒奪所授出為浙江參政列上急務十事并論漕渠利害不報尋罷姜昻字恆俯太倉人成化壬辰進士令棗强為治清簡獄無滯囚授監察御史劾方士李孜省之奸杖午門尋以親老乞近郡便養改知寧波府擢福建參政昻性方潔在官日惟市少肉供母而自食蔬菜子龍字夢賓為禮部郎中諌武廟南巡杖幾死後為滇中兵備蒞任四年漢夷大治滇人立祠祀之龔𢎞字元之嘉定人成化戊戌進士歷吏部郎出知兗州奏免額外稅糧萬石時中貴李興過兗勢張甚𢎞獨長揖不屈纍遷右副都御史總督河道武宗嘗稱之為幹事老臣後以工部尚書致仕所著有玉書樓稿嘉定縣志楊瑛字潤卿嘉定人成化丁未進士𢎞治初為兵科給事中上疏請革弊政以保初治嘗夜出遇貴璫爭道批其頰璫泣訴上曰知是長楊須少避之後官至太僕少卿胡承字安節太倉人成化丁未進士除翰林檢討充益王府講官升左長史承文學該洽侃侃持正在王府隨事規益後卒于官范純字誠夫嘉定人成化中為四川僉事以計敗蠻兵于威州轉松潘兵備㑹鎮守內臣借供奉索金于各衛純止之不聽遂投劾歸周廣字充之太倉人𢎞治乙丑進士為吉水令贛川流賊至吉水丞簿懼且竄廣叱曰丞簿竄即死盍死賊率衆力禦城得以完擢監察御史抗疏直言為羣小所嫉屢經貶謫後為福建按察有鎮守中貴遺以金廣不省置之庫中貴懼謝罪乃與約毋撓吾三尺返其金仕至江西巡撫唐恩字天寵嘉定人𢎞治中進士生平品行端方其教及門嘗曰讀書無他務只一靜字檢身無别法只一敬字為松陽令以信義得民心縣歲貢橙橘民苦科索恩令官自採辦不煩一民以疾卒官檢其槖止俸金三兩而已沈灼字文燦嘉定人正德戊辰進士為御史首發宸濠之逆又嘗言朝廷刑獄不宜付錦衣官校忤㫖奪俸後以議大禮不見聽與句容曹鋒崑山方鳳同日掛冠歸時稱三諫從兄照字文明為刑科給事出按潼關守將姚諌獄不附劉瑾意豫杖謫戍周在字善卿太倉人正德甲戌進士知寶坻縣時中官橫索困民在執法使不得擾縣有豪紳素附劉瑾犯罪在繩之以法乃搆厰監誣在以他事繫之獄法司直其誣後為御史仍執法無少狥仕至浙江參政尋罷歸顧濟字舟卿太倉人正德丁丑進士由行人為給事中時武宗歸自南巡濟上書切諌嘉靖改元八上疏其納諌疏略云陛下首闢言路羣臣因事納忠高遠似迂闊切直或犯顔若怒犯顔則言必忤置迂闊則計必格安望忠言日聞乎陛下首翦羣凶而奸黨尚存乘機搖惑不可不畏上嘉納之後乞終養歸高鏊字企之嘉定人正德中以太醫諌南巡廷杖謫戍嘉靖中進院判丘峻字惟陟嘉定人嘉靖己丑進士授大理評事每讀獄詞必反覆紬繹同舍郎欲署事輒援其筆曰君輩勿輕作允字有大閹出鎮廣東多不法坐辟乃因鄉人密以萬金為壽峻曰五嶺之人思食其肉峻為法官而縱之乎竟論如法朱默字時言太倉人嘉靖壬辰進士知建陽縣嘗以俸百金奉父父怒貽書曰吾辛勤教汝惟忠與孝汝甫邀一第乃以官物汚我耶默得書益砥亷操輕徭賦省鞭笞政聲大著後補貴溪令時值夏言當國默無所狥言甚愛重之陳如綸字德宣太倉人嘉靖壬辰進士令侯官鞫獄如神常緩催科主計者逮其家屬如綸欣然出僕就繫民感德爭輸遂為諸邑最擢刑部主事歷官江西按察福建布政乞歸有永豐令某餉茶納百金其中如綸却弗視曰吾方飲水無所用茶其清操如此顧存仁字伯剛太倉人嘉靖壬辰進士為禮科給事時指揮劉永昌與蜀王相奏訐武定侯郭勛庇之存仁考按得實抵永昌罪㑹災異求直言存仁援議禮竄逐諸臣指斥方士忤㫖杖六十謫塞外三十年隆慶初仕至太僕寺卿王忬字民應太倉人嘉靖辛丑進士以御史巡按湖廣時大璫鎮承天為民害忬至與約毋縱舍人子漁百姓璫懾不敢犯再按順天備禦有方擢僉都御史巡撫山東㑹倭起以忬巡視江浙邀擊大創後先告捷㑹薊遼總督員缺即命忬往時練兵議起相嵩陰扼之以失事下獄論死天下寃之隆慶初子世貞疏訟詔復其官唐愛字良德嘉定人嘉靖辛丑進士知南安縣治行為八閩第一入為職方郎時邊事告急大司馬計無所出愛從容區書一京師倚重焉徐敦字汝厚太倉農家子少嘗服賈年三十始讀書成嘉靖丁未進士知諸暨陽信二縣亷潔有威望入為御史抗疏論鄢懋卿忤嚴嵩指出為山西僉事屢中蜚語與時寡合遂以苑馬寺卿致仕張任字希尹嘉定人嘉靖丁未進士守袁州分宜當國家衆素橫任一切繩以法纍遷貴州參政後撫粵㑹苦旱特題蠲賑又請𠞰十寨諸蠻為民害者捷聞賜璽書褒勞卒贈兵部右侍郎王世貞字元美太倉人嘉靖丁未進士為刑曹郎與李攀龍等相倡和時稱七才子以救楊繼盛忤嚴嵩出為青州兵備青多盜世貞約束期年盜盡散㑹父忬為嵩所殺棄官伏草土者幾十年嵩敗以薦復起歷仕浙江參政湖州久雨粟踴貴世貞捐俸募民入粟又疏乞改折民得無饑由藩臬升撫鄖陽時相居正婦弟王生譁辱縣令世貞論如法又以荆州地震上言臣道太盛語觸居正遂拂衣歸後仕至刑部尚書世貞操文柄數十年海內士多藉以成名鄉曲利病詣臺司力請終世貞日蒞州者無苛政其殁也民皆巷哭罷市所著有四部稿續稿明史料等書子士騏字冏伯鄉試第一成進士為吏部郎能文徐學謨字叔明嘉定人嘉靖庚戌進士為職方主事董築城外八堡汰去冗冒忤仇鸞意又嚴嵩屬以青詞辭不為銜之浮沉郎署者十年出為荆州守荆之興山賊數千窟其中縣令中賊餌不以聞學謨以事繫令急發兵擊之諭降三千餘人山谷盡平景恭王封德安以國小求荆之沙市地自益學謨據祖制爭辨甚力王以抗㫖劾之有詔逮問民遮道哭者數萬得從末減後纍晉少司冦大宗伯乞歸嘗首建漕折議為一方無窮之利云所著有南宫奏稿老子解世廟識餘録湖廣總志春秋億宗藩要例文集合二百五十二卷顧章志字行之太倉人嘉靖癸丑進士授行人奉使南越絶餽遺時相嵩鬻權章志獨不附移疾歸嵩敗起官纍進湖廣廣西按察副使靖江王府屯地有與民田相錯者王圖并得之章志持不可升南京兵部右侍郎後卒于官張振之字仲起太倉人嘉靖已未進士授處州推官署府事首舉條鞭法貴要斂手徴為監察御史抗疏劾貴臣又論列户部姦利狀仕至浙江按察副使浦鋐字汝器嘉靖間為監察御史以直言忤㫖奪俸尋掌河南道事時届京察執法不阿失執政意罷去以薦再起出按陜西上便宜四十餘疏後以疏救御史楊爵𬒳逮卒于獄狄雲漢字天章太倉人由鄉貢知沅江尚寬靜民愛信之都御史馬溥然行縣怪無訟者令吏人呼民許令陳訴卒無一應御史嘉歎而去九年秩滿歸貧無室廬處士沈周為作募買宅疏王錫爵字元馭太倉人嘉靖壬戌㑹試第一歷官禮部侍郎時張居正奪情翰林吳中行趙用賢上疏力爭居正怒錫爵率同官解之居正假歸治喪未匝月部臣急請召還使吏邀署名錫爵叱之去遂乞省親歸居正敗以禮部尚書入閣㑹有三王並封之議諸臣疏諌者且得罪錫爵力為調劑事得中輟後竟以錫爵言皇長子出閣如東宫儀遂求歸錫爵學有原本文章得唐宋人風格所著奏草文草牘草若干卷卒諡文肅子衡字辰玉有文名北闈領解被論奉㫖覆試援筆立成仕編修乞終養歸曹逵字履中太倉人嘉靖間進士為御史糾太宰汪鋐不法語過峻廷杖謫隨州判人稱為强項曹㑹署蘄水令時太后梓宫過蘄水責供億甚急逵飭吏民手板立水次常廩外不益一錢曰蘄水非中貴人外藏也中貴人詢知曰是故强項曹耶引帆去歷遷雲南太守曹祥字世竒太倉人知新昌縣省里甲築隄防斥豪猾九年風俗大變吏部郎應大猷稱為循吏第一王積字子崇太倉人嘗為廣東陜西參議後為湖廣參政以計平苗遷福建參政有破倭功世宗題其名于御屏龔起鳳字瑞周太倉人以舉人為定州學正典中州試故事學官先考後聘起鳳持不可曰禮聘者師也師可試乎遷知杞縣歸德有豪家李姓者殺人賄令得脫上官移起鳳訊之令欵迎甚謹私致千金起鳳不顧窮治伏罪御史行縣供帳儉陋竟以不及論罷杞人泣送盈路醵金為贐起鳳却之而歸灌園自給園多種韭時稱龔公韭云龔有成字子完嘉定人少學於歸有光鄉薦上春官所與偕者以疫死同舍避去有成獨留視醫藥死為含殮護其棺以歸士高其義後為詔安令時倭盜交訌有成誘致賊首諭令縛盜自贖盜皆解散調龍南令㑹三巢賊熾有成親往諭以禍福賊皆悅願輸租編甲由是終任無為盜者陳其詩字汝正嘉定人以舉人補新泰縣令值大旱具文禱于泰山夢神賜杯水曰新令䖍與爾解渴質明大雨有囚赴決在道逸去監司將罪令囚遽自出曰不可以我故負令君管志道字登之太倉人隆慶辛未進士官南刑部主事陳大利弊九事語侵相臣張居正大恚因志道疏內請修故甲令分巡與御史抗禮即出志道分巡嶺東諸郡志道至部果與御史齟齬御史劾奏之以言官救得降調遂移疾歸侯堯封字欽之嘉定人隆慶辛未進士為御史按閩閩有獄建寧守受賕失出堯封劾之守恃奧援左遷堯封為僉事分巡蘄州蘄故有盜出沒江中堯封置樓船搗其穴悉平之備兵襄陽嘗增城實堤築石梁二以通峴山既而水大至城外之民由石梁得度者無算後遷福建參政致仕龔錫爵字汝修嘉定人萬歷甲戌進士由縣令為水部上河漕議于司空潘季馴以河强淮弱惟築堤束水可以濟漕卒如議報功遷廣東參政歸張恆字明初嘉定人萬歷庚辰進士知建昌府片言折獄人稱為張半升以候鞫不待宿舂也時相國有與小民爭湖利者恆奪以與民舉江右循吏第一仕至參政殷都字開美嘉定人萬歷癸未進士知夷陵州時蜀鹽禁嚴販者嘗乘夜出峽舟多沒溺都謂步擔易米律所不禁悉寬之遂無溺者又開楚蜀界山道九千丈以便行人遷職方郎尚書石星忌其才劾令罷歸沈昌期字廷際太倉人萬歷癸未進士知龍溪縣為政得民心以最擢吏部主事遷文選司郎中特立不茍時冡宰倚為左右手相國趙志臯為其子求兩淮鹽運三致書囑之昌期堅不聽沒後龍溪人祀之以為神張輔之字爾贊太倉人萬歷丙戌進士歷任兵科給事時神宗深居禁內輔之疏請講學以鏡古知今視朝以竭情盡下在垣四十餘疏西平孛劉東征倭南討播皆有所論列御史曹學程忤㫖擬辟輔之力爭得末減仕至工部尚書以魏璫用事乞歸錢桓字握之太倉人萬歷己丑進士以御史出按畿南時邯鄲井陘間有大俠恣橫桓置諸法三輔震悚再按四川蜀中𣙜酤四萬恆苦中人徴督為虐桓割贖鍰代之民用不擾後以僉都御史撫南贛乞歸居鄉清謹人服其淳德李先芳字茂實嘉定人萬歷己丑進士為給事中屢有建白緬甸與土司構怨朝廷以二十萬衆征之先芳乞敇邊臣毋敝所恃以事無用人皆韙其言仕至四川參議卒嘉邑漕折之議先芳贊成之力為多王在晉字明初太倉人萬歷壬辰進士由中書為浙江杭嚴道平劇盜罷雇運人德之遷浙江江西布政使兩舉卓異歷官至兵部尚書經略薊遼改南兵部尚書歷吏刑尚書坐事削籍歸所著有海防纂要通漕類編陸獻明字君謨太倉人萬歷丁未進士為御史按湖廣時僚屬以魏璫生祠請獻明叱之裂其牘楊漣死誣贓萬計令原籍追償獻明竭力全其家再按黔㑹水西酋作亂獻明上疏言當用重兵三方並進如其言水西平仕至太僕寺正卿侯震暘字起東嘉定人堯封孫萬歷庚戌進士為吏科給事僅八月疏三十餘上及客氏再入特疏請收回成命語侵魏璫上不省後以劾相沈㴶結納中官為魏璫所逐震暘陛辭復上田賦河渠二議竟落職歸孫元化字初陽嘉定人萬歷壬子舉人好竒略得西洋軍中火器法天啓末計偕上書當事授以贊畫之任時魏璫用事罷免崇禎初起官條上時政十二事升山東參議整飭寧前兵備所用多關東士卒所向克捷後巡撫登萊以兵變論死李繼貞字散尹太倉人萬歷癸丑進士為職方郎典山東試發䇿以漢唐閹寺為問時魏璫方熾以謗訕削籍後起故官值登萊兵變督議主撫繼貞請調關外兵以解登圍亂乃定繼貞在部久邊事益練習權幸以請託不遂嗾論之三黜三起至僉都御史巡撫天津上五議大興屯田後除名復召還道卒徐憲卿字九亮太倉人萬歷癸丑進士由行人為南給事中時三案議起憲卿疏論李可灼侍疾不謹宜按法論死又疏駕帖及北司拷訊之非㑹楊漣數魏璫二十四罪奉㫖切責憲卿即上權璫罪狀一疏直糾魏客奸黨側目以奄敗得免仕至太僕寺少卿時偕行字乾所嘉定人萬歷癸未進士歷知四縣舉卓異為御史疏劾大僚張位石星等出按晉中以汾宗繁橫抗議改州為府旋奉譴歸臨終以遺金八百授子曰吾一生清慎所餘止此公塘為州邑孔道民多病涉汝其築石梁以濟往來橋成至今賴之朱邦臣字子貞太倉人以鄉舉知嶧縣時大饑民多嘯聚邦臣發庾賑之單騎往撫衆感泣歸業後補仙居㑹倭冦將至邦臣榜通衢稱客兵四集以疑之賊度蒼嶺去其餘賊悉為邦臣所擒調知黃縣免歸黃世能字濟夫嘉定人以掾吏為平凉衛經歷時靈臺縣賊聚衆殺傷官兵兵巡董國光以數百騎使世能覘賊世能曰覘賊多人彼以我為挑戰遇鬬必死今以數人往賊不備乃可得其情國光嘆曰經歷知兵我不及也往果得賊要領歸遂擊破之以才委署安定㑹與司理楊某爭一重辟囚楊理屈陰中之罷歸趙洪範字元錫嘉定人天啓壬戌進士以御史出巡滇南時土酋普名聲叛洪範用間說酋腹心何天衢降遂反擊酋兵滅之許國榮字允尊太倉人天啓乙丑進士選工科給事中時中人掌厰布邏卒詗刺外事國榮上疏極論遂禠職在諌垣疏數十上多中時病吳克孝字人橅太倉人以進士為刑部郎恤刑粵東平反幾百人尋備兵保定時保定盜賊抄掠者甚衆克孝至密擒其渠魁斬之羣盜遂散沈廷揚字季明崇明人明季海潮溢出四千金助賑由國子生為中書舍人㑹山東多警梗運道廷揚上書言海運之便上喜命造海艘試之僅半月而抵天津進户部郎督海運事竣加光祿少卿國朝錢增字裒卿太倉州人明季以進士為兵科給事忠直敢言嘗劾樞臣楊嗣昌大帥王國光等侃侃指陳不畏權勢年四十乞終養歸順治九年撫按以人材薦增以母老辭張王治字無近太倉人順治丁亥進士知桐廬縣地當閩衝更調絡繹夫數不足王治即盛服曵舟以從督師者動色謝之擢工科給事抗言東南兌糧多額外浮費請設官收官兌之法及五米五銀之例從之又疏請開浚三江及江南分置藩臬皆允舉行錢晉錫字方來太倉人康熙庚戌拔貢在禮垣時嘗疏免淮南鹽課三萬兩並止兩廣鼓鑄朝論韙之康熙四十三年山左大祲流民賣入旗者淮發回晉錫時為府尹按名給費兼檄所在舟車遞送所全活無算以終養歸海州漢徐璆字孟玉海西人父叔度遼將軍有名於邊璆自少博學舉高第稍遷荆州刺史舉奏南陽太守張忠贓億萬又奏五郡太守及屬縣有贓汙者悉徴案罪威風大行中平元年與朱俊擊黃巾賊破之遷汝南太守轉東海所在化行被徴當詣京師為袁術所劫授以上公之位璆示必死術不敢逼後拜太常三國魏徐宣字寶堅廣陵海西人太祖辟為司空掾歷丞相東曹掾文帝踐祚轉散騎常侍從至廣陵六軍乘舟風浪暴起帝船回倒宣凌波而前羣臣莫有至者帝壯之遷尚書明帝以宣為左僕射疏諌威刑太過又諌作宫殿窮盡民力手詔嘉納卒諡曰貞麋竺字子仲東海朐人祖世貨殖資産巨億徐州牧陶謙辟為别駕從事謙卒竺奉遺命迎先主於小沛後呂布襲下邳虜先主妻子竺進其妹為夫人并僮客二千金銀貨幣以助軍資賴此復振益州平拜安漢將軍待以上賓之禮宋胡松年字茂老海州懷仁人幼孤貧讀書過目不忘政和二年上舍釋褐纍遷中書舍人時方有事燕雲松年謂邊釁一開有不勝言者咈時相意建炎間知平江府貪吏解印斂跡以興利除害十七事揭於都市百姓便之使金還拜吏部尚書權參知政事以疾提舉洞霄宫卜居陽羡松年自持囊至執政所舉皆一時聞人秦檜秉政士大夫無不曲意阿附松年獨鄙之至死不通一書世以此高之明郇旃沭陽人洪武甲戌進士永樂中授給事中性警敏有幹才機事慎密受知成祖歷官鴻臚少卿卒錢貴海州人襲職指揮使謀略過人宣德中遷都指揮僉事管領京營操練有法士卒悅服纍擢中軍都督府同知為人謙恭不以富貴驕人王璟海州人正統己未進士祖規仕至參政有清直聲璟少承家學博極羣書規於本鄉奏築堤防絶海潮泛田之害璟又題免東海養馬再世遺愛鄉人德之丁泰字時亨海州人正統辛酉舉人授户部主事立朝以剛正自持人呼為鐵面丁後謫判興化賑歲饑弭虎患歷有善政乙瑄字崇璧海州人成化丙戌進士授吏部文選主事擢禮部郎中轉山西參議有清操巡視大同等處恩威兼著邊徼輯寧歸後無屋以居陳秉彛沭陽人成化戊戌進士官四川忠州守清慎愛民忠州人塑像祀於陸贄祠楊宏字希仁海州人以蔭叙襲指揮使𢎞治己未檄守紅城尋守備固原獻䇿於總制楊一清築邊牆數百里掌陜西都司平漢南盜纍遷總兵官鎮松潘斬番酋雪郎王之久為邊害者至嘉靖初節鎮淮揚督理漕運聲績偉然著有漕運志邵思忠字廷臣贛榆人由鄉貢起家為商城令釐奸祛弊簡靜不擾擢户部主事督𣙜滸墅大同清節尤著徐鸞沭陽人𢎞治甲子舉人任湖州府同知居官惠愛持身清約部民咸翕然感化胡璉字器重沭陽人𢎞治乙丑進士以刑部郎中遷閩粵二省兵備時島冦佛郎機牙掠海上璉選鋒猝入奪其火器遂為中國所用因號佛郎機纍擢巡撫以户部右侍郎致仕遇征安南薦起督餉卒孫應嘉世宗時官都給事中曽孫一炳以行義著鄉里裴天祐字順之贛榆人嘉靖庚戌進士令建安為政務寬厚巡按山東權貴囑其劾去屬吏某亷知其賢反優奬之罪人挾重賂求免死沒其金於官置之法歷官大理卿所著有拙逸亭稿張朝瑞海州人隆慶戊辰進士州有倭警捐資以助築城令鹿邑清衛豪侵官地七千餘頃擢守金華歲饑設法賑濟全活甚衆葺書院市腴田二千餘畝以贍師儒參政杭嘉湖抗疏陳礦役之害後攝府尹卒倪文純字青杜海州人以歲貢官壽州訓導禦流冦有功又單騎說降屯英霍濳太諸賊漕撫史可法薦之擢太和令葛維垣字映辰沭陽人崇禎時以進士授成都府推官鞫獄多所全活丁丑冬流冦薄城力請援兵大破賊衆解省㑹兩月之圍攝守重慶豪猾懾服擢工部主事旋授吉安知府通州宋王惟熙字國和泰州如臯人景祐進士擢大理寺詳斷官持法堅正務原人情奏案成廷尉使易之不從儂智高反掠嶺南諸州吏棄城者皆坐法惟熙議嶺南兵與城皆無足恃奈何以常法置之死上亦憫之皆得免纍官司封員外郎吳及字幾道通州靜海人以進士纍遷太常博士時仁宗春秋高及上疏言古聖重絶人世宜禁擅宫童幼聖嗣必廣帝異其言又言宜擇宗室子以備儲副嘉祐中擢祕書閣校理改右正言奏論孫沔苛暴不法龎籍輕動改衄在職數年以徑正稱出知廬州徙桂州卒王覿字明叟嘉祐四年進士熙寧中為編修三司令式删定官覿不樂居職求潤州推官二浙旱郡遣吏視苗傷不敢多除稅覿覆按盡除之哲宗立擢右正言疏論蔡確章惇韓縝張璪朋邪害正章數十上相繼斥去又劾竄呂惠卿論青苗之害乞罷新令復常平舊法時起洛蜀二黨之議覿深破其說上然之出知成都府江水貫城中為渠歲久湮塞苦霖潦覿疏治復故民德之號王公渠王俊義字堯明覿從子以太學上舍就試徽宗親擢第一蔡京邀使來見謝不往授國子博士後召為館職為王黼所惡以直祕閣知嶽州卒俊義與李祁友善首建正論於宣和間諸公卿稍知分别善惡邪正兩人力也印應雷通州人嘉熙中進士選知和州時北兵來侵和危甚應雷入守卒保其城後溫州卒作亂改知溫州應雷單騎赴任賊來覘者捕斬其魁餘黨悉散咸淳六年為兩淮安撫制置使知揚州卒贈端明殿學士弟應飛亦進士纍官户部侍郎明李儼字民瞻泰興人洪武元年充都督府斷事論輔治三計升刑部侍郎宣諭陜西還加戶部尚書賜一品服金帶令從奉天殿服之以出學士宋濓等送歸第卒於官翟善字敬夫泰興人洪武中選入國子監授吏部主事超拜侍郎尋進尚書時初罷丞相以六部分政吏部為百寮長善當重任被顧問凡所奏議皆稱㫖嘗欲為善營第於里中善曰江鄉地隘宗親且衆誠不忍奪人自益又以善家戍籍欲免之善曰今區宇初定戍卒宜增豈可以臣破例太祖善之李敬初名鴻漸通州人洪武初以文學徴授刑部尚書守法度修政事已致仕歸十四年復召為祭酒是年始行釋奠先師禮從敬請也邵旻字天民通州人永樂甲辰進士嘗謁陵讀碑文一過成誦同儕異之不知其方誦時已目他碑又能成誦矣授評事數折大獄巨璫貴戚受賄撓法旻堅持不可犯遂坐忤落職顧雄字時俊通州人成化辛丑進士授户部主事犒軍大同監守者欲餌以利怒却之督江西福建逋稅時例徴糧長紙價供筆劄費雄革之事竣以病乞歸囊無餘資鄉人稱為清白吏邵棠字民愛通州人成化丁未進士知崇慶州擢南户部郎升湖廣參議治奸民譁譟入興邸事不縱不苛轉陜西左參政陜劉瑾故鄉也騷屑太甚又大索官人賄棠曰奈何用百姓膏脂博高列乎遂移疾歸部使者交薦不起時稱其儒而不迂吏而不俗馬繼祖字崇功如臯人𢎞治庚戌進士纍遷南京監察御史有二臺長交閧繼祖劾免之臺中肅然後以忤劉瑾勒致仕張羽字鳳舉泰興人𢎞治丙辰進士授淳安知縣有惠政擢御史彈劾中貴疏論時事甚剴切巡按雲南奏免開礦及中官怙勢者出守保定以母疾乞歸復起為河南布政使淩相字忠甫通州人𢎞治己未進士歷官廣東兵備僉事𠞰平惠潮大峯嶂劇賊升苑馬寺卿署分巡事督造邊城包山於城內以絶窺伺遷四川布政使轉雲南擢副都御史巡撫湖廣告歸弟楷字端甫正德戊辰進士以户曹監兌江西歸途遇盜囊篋空空盜歎服而去姚繼巖字元肖通州人𢎞治壬戌進士歷工刑二部主事遷考功郎中以清苦稱武宗鋭意南狩巖偕部曹聨章懇留受杖未幾升太常少卿創發竟死何棠字愛之泰興人正德辛未進士歷官郎中諫武宗南巡廷杖尋升廣平知府減種馬治大豪民大悅服嘉靖初録諌南巡諸臣加從三品俸以疾告歸張􅙆字鴻舉泰興人正德甲戌進士授禮部主事諌南巡受杖謫知海鹽縣歷官副都御史巡撫延綏凡三奏捷賜金幣進户部侍郎致仕崔桐字來鳳海門人正德丁丑進士第三人授編修諌南巡詔跪午門外五日廷杖奪俸嘉靖初諌大禮復逮詔獄再豫杖出補湖廣參議備兵辰沅平安化山冦賜金幣進南太僕卿建議薛瑄從祀拜禮部左侍郎致仕著東洲正續集錢録字宗政通州人以例貢授松陽縣丞縣故有銀冶盜竊發因剽掠為患録曰此禍穴也錮之火其旁廬舍以杜覬覦督兵捕閩冦生得其渠魁境內以寧事母至孝母病割股以療子嶫錢鐸字振之海門人正德辛已進士授刑部主事嘉靖初諌大禮杖闕下出守肇慶府改學校倡文教移知鄖陽擢廣西按察副使備兵府江生縳賊首諭降三洞蠻以剛直中蜚語罷黃河字汝清通州人嘉靖壬午舉於鄉授滕縣教諭升南國子助教擢南京貴州道御史河套議起河與曽銑合忤貴臣詔廷杖未幾遷雲南僉事有殱寇功馬坤字順卿通州人嘉靖癸未進士纍官湖廣副使接壤川貴苗冦兵連數歲坤參贊督撫平之升河南布政使河南多宗室歲廪不繼輒恣橫犯法坤申嚴約束祿以時給皆悅服擢南户部尚書嘉靖末召坤於西苑問錢榖歲入幾何坤一一條對前後所上凡三十二事多見施行李夢周字希道海門人嘉靖癸未進士授寧都知縣俗好鬼祠五王廟歲市子女代牲夢周火其廟併毁諸淫祠撤故材以新學宫及構書院集諸生講習其中有勢家橫里中捕置於理籍所奪田歸之民遂為所中傷解綬歸錢嶫字君望通州人嘉靖壬辰進士授永平推官擢御史巡按廣西時靖江王僻處自恣為奸民藪嶫悉捕置諸法遷廣東副使以平黎功賜金幣升浙江參政清諸郡徭法病歸通沿江海不宜馬牧自永樂時撫臣以六安州災荒暫為代養相沿不革歲徴馬價折色銀三千餘兩民大困嶫上疏罷之陳堯字敬甫通州人嘉靖乙未進士授工部主事治清江浦鑿黃河上游避淮口以逹清江纍升貴州按察使三殿災役民採木堯為更番之議以紓民力御史奉詔採丹砂又議開永寧銀池堯皆力持之升廣西左布政裁省靖江宗人虛祿以萬計進副都御史督漕河高郵湖隄屢壞堯樹木實茭楗以代石堤遂固時黃河徙道漕艘皆膠淤堯遣水工探刁陽湖得故漕道舟以通行尋致仕歸袁隨字民悅通州人嘉靖丙辰進士授户部主事嚴嵩當國欲羅致之餌以銓司不應出知德安府歲薦饑隨不動官帑多方賑恤全活甚多擢山西提學纍升四川左布政忤張居正罷歸錢藻字自文如臯人嘉靖己未進士出守廣信有汰卒三千肆剽掠當事議啖以金藻苐先聲厲兵以待卒無敢犯境者用贖鍰廪給貧士纍遷密雲兵備晉左參政修築古北口諸塞擢南光祿寺卿請裁一切冗費終順天府尹顧養謙字益卿通州人嘉靖乙丑進士歷官福建僉事備兵薊鎮巡撫遼東邊備修舉嘗按塞憩小淩河敵騎十萬猝至養謙啓四門張蓋坐敵不敢近而退遷南京户部侍郎總督薊遼兼經略以議倭封貢事被劾求去卒贈兵部尚書陳大科字思進通州人隆慶辛未進士授河南推官召為給事中歲旱上弭災六事歷升太常卿疏救李獻可等言事被譴大璫馮保以罪閒住南京乞赦還鄉大科論其懷奸窺伺總督兩廣安南黎莫二姓交兵大科請於朝布恩信以招徠之皆請納代身金人謝罪晉都御史卒贈兵部尚書袁九臯字君鳴通州人萬歷己丑進士授鉛山知縣擢御史巡按山西浙江河南順天四省所至著風節中㫖遣官𣙜取煤稅三疏諌止擢太僕寺少卿范鳳翼字異羽通州人萬歷戊戌進士除户部主事監南新濟陽二倉酌放軍糧清核所積米計六十萬得免浥爛改吏部考功汰墨吏進名臣顧憲臣高攀龍等為時所忌歸彭大同海門人以歲貢為叙州推官有孝亷殺人臬司推門望罰金三百鍰釋之大同怫然曰殺一人罰三百金將挾萬金而殺三十人乎竟擬辟又民有修怨仇家乘父老病扶至河壩挑其仇毆之立斃訊者但論仇人死大同判曰欲甘心於仇因忍視其父河壩之死誰則致之并坐子如律李之逹字武東海門人由舉人選巨津知縣上官竒其才令攝五篆時巡撫開福龍鹽井逹爭之曰增一時之課商必虧額乃寢升興化府丞有奸辨利嫂姪資巨萬上官授之意令以資歸辨逹不聽尋去官冒夢齡字汝九如臯人以選貢授㑹昌知縣移知酆都奢寅變起與石柱司女將秦良玉協力破賊城賴以全量移寧州歸子宗起崇禎時以進士為兗西僉事監軍河上張獻忠破襄陽調襄陽監軍時賊數十萬往來窺伺城中虛無人宗與左良玉收合餘燼力保巖疆以功被上賞量調寶慶歸所著有拙存堂集朱一馮字非二泰興人以進士知信陽州節省公費銀辦開礦採木諸役民不知擾革夫馬雜支積弊舉卓異升兵部郎歷職方武選出任八閩從臬藩至巡撫定亂福寧平賊汀州天啓間所在立魏璫生祠馮獨不為立罷官國朝孫閎達字天士通州人康熙甲辰進士知太原縣愷悌得民兩造赴庭閎達懇切誨諭多罷訟而去以病歸士民追送百里外生平著省身録日所為夜必檢記魏象樞亟稱之徐起霖字傅巖通州人由前明副榜任郃陽知縣盜劫某宦捕不獲起霖出獄囚遍閲之得三人曰得盜貸汝死縱之去如期而盜悉獲人驚為神知陜西徽州詳免練餉加𣲖遷真定知府時用兵滇南真定當孔道承辦供億不以纍民江南通志卷一百四十五欽定四庫全書
