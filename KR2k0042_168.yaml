body:
  text: 江南通志卷一百六十九人物志隱逸二安徽寧池太廬鳯潁八府滁和廣六泗五州安慶府晉何準字幼道灊人弱冠知名不就徵辟兄充位居宰輔而準散帶衡門不交人事徵拜散騎郎不起南北朝宋何求字子有廬江灊人清退無嗜欲除中書郎不拜住吳居般若寺足不踰户人莫見其面又寄住南澗寺隱虎邱山梁何點求弟少不仕宋世徵為太子洗馬不就隱居東離門卞望之墓側永明元年徵中書郎豫章王命駕造門點從後門逃去竟陵王子良聞之曰豫章王尚不屈非吾所能致點弟印亦隱㑹稽世號點為大山印為小山宋張漢卿桐城人監興國軍管庫與太守論事不合即和陶潛歸去來詞歸隱三十年後宰相趙汝愚特薦不起元黃信一太湖人仁宗殿試第一工詩文不樂仕進終老巖壑間明吳宗洙字惟孔懷寧人隱居讀書不問户外有詣門求見者堅匿不出年已踰耋猶手一編八十四卒著迎暉閣消夏麈談諸集吳偆字仕富桐城人少即高隱晚年植槐於庭自號緑窗主人有詩云懶向花黃占事業三公留與後人封逮四傳而孫果列卿二方授字子留嗜學工詩晚年入四明山中結茆而棲採橡栗而食著書百篇袁平字石録宿松人性豪爽工詩文高隱西源錢可久字思畏桐城人詩才俊逸字畫遒徑自言與西湖結物外交駕舟千里訪之扣舷高歌旁若無人方見字惟素桐城人才名冠一時隱於湖山之間與詩人徐宣相倡和有古人風國朝劉若宜字宜之懷寧人明崇禎丁丑進士厯官職方司甲申闖賊陷京城兩次投繯皆為家人救不死遁居甑山三十餘年未嘗入城市張載字子容桐城諸生博學能詩文負氣節善弩射明季避流寇與父相失縋城出遍求得之力護以歸年四十即隱松山所居臨湖環峰松篁交䕃釣艇蠟屐隨意所之周岐字農父桐城人博雅好古明季貢入京屢上書言時政大司馬馮元飇疏薦恭宣督軍功授監紀推官尋謝歸隱居不出著孝經外傳行世子瑄次璧師俱力學敦行左國材字子厚桐城人光斗季子隱龍眠山所著有易學詩學杜詩解頤竝雜著若干卷徽州府唐張友正歙人結廬城陽山下貞元末魏𢎞簡來為宣徽副使重其才請為披雲亭記立成酬以金帛不顧去宋潘洋發字肖岩歙人淳祐中為太學生上書論史嵩之起復之非不報退隱潛虬山纍徴不就嘗葺龍溪紫陽諸文撰文海天琛曹汝弼字夢得休寧人高蹈不仕與林逋魏野齊名號松蘿山人程先字傳之休寧人痛父死節於金守墓不仕學於朱子邵悅字貞父休寧人隱蘿山精舍玩易象集方書施藥活人兩膺辟舉皆不就汪大發字敷之休寧人淳祐間魏了翁築室白鶴山下大發負笈從之得其傳歸建平山書院教授於鄉學者稱為騰波先生程鼎字復亨婺源人從朱松學於閩家貧甚奉母徙居窮山卒朱子表其墓汪漢字翰美休寧人居山中時邑遭寇難親知奔匿賊至漢諭以善道賊感服而去咸賴以免李繒字參仲婺源人絶意科舉築室鍾山以老朱子嘗與程珣過繒講論終日盛稱其文卒表其墓江愷字伯成婺源人潛隱耽著述時婺貢楮絲民甚病之愷以書白部使者貢得蠲程旬軒嘗稱之曰欲知隱不為徒隱須看當時免貢書范啓字彌發休寧人理宗三徵不起賜號風月處士著有雞肋録管錐志井觀記徐驤字伯驥婺源人學於胡宏著羲易圖皇極經世發微李偉字敬叔祁門人師同郡胡方平咸淳中任郡學賔師入元不仕嘗作經史訓注二圖劉光字元輝歙人開門授徒五十餘年元行省差充寧國路學正不赴羅榮祖字仁甫歙人與處士蕭㪺等同被徴鄭左參力為勸駕榮祖書招隱詩謝之趙彌忠字資敬休寧人力學窮理亷使薦以官不就許宗堯字子仁績溪人博通經史隱大鄣山纍徵不就金若洙字子方休寧人受書程若庸之門弱冠領寶祐鄉薦令黔江宋亡不仕隱居東園著述以老元汪萊甫字芳卿歙人好讀易自號草窗先生虞集薦之詔有司辟舉不赴孫嵩字元京休寧人宋時薦入太學元初歸隱山中自號艮山以示意杜門賦咏凄斷淪絶方回讀其詩歎曰持此見朱文公亦無愧矣明胡安字伯康歙人郡守陳彥回以懷才抱德舉不就羅誠輔字誠一歙人太祖駐師玉屏山以耆老召見對稱㫖欲官之不受吳買字漢臣休寧人通五經尤精易洪武初屢徵不就王寅字仲芳歙人少為高才生棄去逺游俶儻自負喜談兵工詩習禪自號十嶽山人舒遜績溪人工詩洪武中辟舉不就王善慶歙人力學善書居環溪結室僅客膝屢召不出鮑寧字廷謐歙人正統間御史郡守交薦辭不出著有天源發微辨謝陛字少連歙人嘗宗朱子帝蜀之意作季漢書以蜀承漢統而列魏吳為世家新城王貽上論正史外更有史如兩漢書外有荀悅袁宏漢紀陳夀三國志外又有謝陛季漢書陛雖少攻舉子業而性尚恬退金顯德字世榮休寧人博極羣書不求聞達出粟賑饑郡邑聞於朝欲官之不就門人私諡為節孝先生余紹祉字子疇婺源人師事黃龍光盡得其學托跡蕭寺不應有司禮召湯守敬字彥肅婺源人明初詔舉名儒辭不就唐世靖字介甫歙人一日讀書見先正云四股八比之外原有學問公卿大夫之外原有人物遂罷諸生為山人吟詩染翰逌然自適著三邱山人什一草方問孝字胥成歙人别號癯丈人亢直不肯阿世隱居不仕著蒼耳齊詩三十卷吳拭字去塵休寧人性豪縱有潔癖為詩清古淡雋工書畫又精琴理有訂正秋鴻諸譜嘗自入山擇琴材故相傳有去塵琴云國朝黃生字扶孟歙縣庠生與同學洪舫棄去舉子業一意著述黃有詩文集若干卷洪有離騷辨杜詩評律查潛字淵若婺源人為文高古性狷潔足跡不履都聚遁跡高湖山造其廬者不得見輒歎息而去好周恤鄉人至破産吳大先字維則歙人家貧以著述為事時攜琴書山水間翻繹之暇輒彈一闋自娛寧國府晉瞿硎先生不知姓氏太和末隱宣城文脊山山有瞿硎石因以為稱大司馬桓溫往造焉先生披鹿裘坐石室神色無忤溫與僚佐皆莫測乃令伏滔為作銘贊焉唐元逸士宣城人居北郭杜牧許渾並有詩贈之纍召不起皮日休貽書云足下行竒操峻退卧陵陽賜命屢頒高風轉固宋程炎子涇人隱琴高臺襟負清曠文丞相天祥過之名其樓曰森翠吳晦之字元用寧國人少謝舉業工為詩客遊江淮周覽名勝晚乃隱道山下築生香亭一室幽棲為世推重元貢性之字友初師泰從子由國子生補閩省理官明初有以性之薦者性之改名悅避居㑹稽耕漁自給邑人芮麟嘗遇之邀與俱歸辭以詩云遊絲落絮都成恨社燕秋鴻各自飛每有所感則泫然泣下既卒門人私諡曰貞晦先生梅致和字彥逺宣城人從汪澤民授春秋隱於城南部使者重之屢辟不起宋濓志其墓明林景初太平人賦性恬退洪武初求遺賢知縣梁德逺勸之仕以疾辭隱香城山號獨隱居士貢鏞字元聲宣城人博洽工詩家人夜執盜鏞不欲識其人命勿燭盜曰苦多逋負更給布粟遣之居嘗力耕足不至城府洪載字維熙涇縣人隱居嗜古遇歉嵗周恤鄉黨有鬻兒女者還其直獲盜縱之為詩有陶孟之風有水雲集國朝汪作霖字雨公寧國人明經嗜古教授生徒人鮮知者嘗獲遺金不取見人急每傾囊豫之邑人稱其古道云池州府唐高霽字暄之秋浦人隱居石門山桃花塢李白嘗游其地與同眺九華聮句李昭象字化文池州刺史方元子方元罷池州卒於宣城其家遂留秋浦懿宗末昭象至長安以文干執政路巖深器重之後避黃巢亂入九華築室碧雲峰下與張喬顧雲杜荀鶴為方外交楊行密聘之不起五代陶守立池陽人通經史善屬文南唐保大中棲隱齊山琴棋詩酒外以丹青自娛夏鴻貴池人嘗與兄鵬輯十三代史略隱居不出鄉人罕見其面子乾錫樊師古嘗師事之及守池薦於朝宋祖為製冠服召之竟不起自號清溪布衣時推一門高尚宋劉放字世疏青陽人隱居九華雙峯下自題石壁曰清隱岩著九華拾遺一卷陳翥銅陵人好閒靜却掃著書即家人亦非其時不見陳巖字清德青陽人博極羣書負用世之志宋末舉進士不第入元遂深自晦匿時方徵求隱逸乃汗漫江湖以避之及老始歸築室高陽河以居出則遍厯九華之勝有九華詩集明洪仲遵名道以字行建德人通易春秋屢受辟命皆不就後舉文行授本縣訓導以老辭與江容等游號五老劉城字伯宗貴池人嵗貢生才氣豪邁與同邑吳應箕齊名一時名公卿多推重之好談經濟大略著邊塞屯鹽河渠市馬諸議明季屢辭徵辟岩棲谷隱以終其身有嶧桐集二十卷江杏字君培建德人嵗貢生為人莊重博涉文史深於天文兵法揣事多竒中明亡後晦迹不出同里尚書鄭三俊為作傳鮑光義貴池人工詩文明季避兵棄諸生棲隱七松里所輯有周易講義又建德貢生金學重少有才名晚嵗匿跡山中潛心著述太平府唐王翀霄繁昌人雅志林壑不樂仕進貞元間築室馬仁山講學從游甚盛後尚以所隱未深更徙龍首峯之西王居巖當塗人避廣明之亂棄官隱青山楊行密據淮南以兵迫起之一日行密大㑹失居巖急使人掩其家無一在者宋韋許字深道蕪湖人從李之儀學不事科舉築室榜曰獨樂陳瓘為作記黃庭堅至邑與之游紹興初高宗特命以官不受自號蕪隂居士魚潛字德昭當塗人工詩有名後隱居不出養鵝鴨以自給元蔣子誠當塗人文宗西幸江陵憩慈湖民舍駕旋後子誠族人多攀援左右以干爵祿獨子誠徜徉溪谷採藥吟詩以逸民終明祖雋字逺志當塗人少有詩名永樂中徵修大典例當得官雋辭歸放懷詩酒翛然自適著有丹湖集戴綬字民信當塗人有孝行工古文御史及郡守交薦之授和州學正辭疾不就葺采石書院授徒以終廬州府元葛聞孫合肥人字景元早喪父事母篤孝嘗出為州文學既而曰此非養志之道吾有薄田勤力耕稼亦足供養遂歸於舍傍結環翠山房以延來學每侍母食下始出與諸生誦說間入城識與不識皆曰葛先生執政薦其學行於朝召為翰林辭不赴及卒余闕表其墓朱可與舒城人好學博覽絶意仕進家居教授文行著當時明方自勉字聖修性方嚴不茍然諾里人比之王彥方隱湖濵以古學教授宛杲字彥昭廬江人讀書通世務尤樂施豫高蹈山林不樂仕進而行誼為衆所推楊首春字元之編茅成屋匿影空山每與人講論聽者忘倦有司往物色之已掛瓢逝矣楊大濓字潔甫無為人高雅恬退以布衣為督學耿定向薦不就衣敇履穿灑然自適所著有詠史諸詩鍾濟字海源守義端嚴平生未嘗一接長吏舉鄉飲不就舍後築一園臨江面山以詩酒終其身國朝季友賢字輔皇合肥人淹貫經史兼精六甲明末大司馬史可法羅致幕下父艱歸里隱于黃山曹大復字賔魯巢縣人明諸生端方純朴究心理學得修脯輒周貧困年七十慨然去鄉邑或遇之白石山禪林中不交一言而去計其夀已百三嵗矣後莫知所之鳳陽府漢梅福字子真夀春人明尚書穀梁春秋為郡文學補南昌尉後歸夀春時王鳯專政福上書極諫至王莾亂政一朝棄妻子去後人有見福于㑹稽者變姓名為吳市門卒云桓曄字文林一名嚴龍亢人鸞子姑為司空楊賜夫人初鸞卒姑歸寧赴哀整飾從者而入曄心非之每至京師未嘗舍宿楊氏其貞介若此賔客從者皆祇其志行一餐不受于人後舉孝亷有道方正茂才三公竝辟皆不應初平中天下亂避地㑹稽遂浮海客交址元王宗嶽字良佐臨淮人厭俗學隱居講求性道人稱養高先生楊省字治卿定逺人不樂仕進以書史自娛嘗遊三峯青韭諸山遇佳處輒為題咏晚年造詣益高明盛世鳴字太古鳳陽人俶儻有藴藉嗜古文竒字嘗寓泗州隱于卜郡守物色之竒其人無錫少宰孫繼臯聞其詩薦之葉相國向高遊輦下名動公卿世鳴意不懌退而隱居號空谷居士陳琰字廷玉臨淮人性恬淡博學能詩文動循禮度隱居濠濵有司纍薦皆不出許鵬字廷舉定逺人少負氣節以賢良方正薦至京師陳時務詞多過直乃于策尾作詩自陳已志不願入選歸隱城南種竹萬竿因號竹莊以耕讀自娛著有竹莊集姚􅔆字舜用定逺人性敏過目成誦家貧授徒不慕榮利大學士謝遷與其父有舊使人召之􅔆固辭不赴趙萃一字魁北夀州人養親盡孝資敏而好學隱居山中講明易理終身不出國朝周廷棟號豫章宿州人博學多聞性理子史諸書無不精研隱居不仕工詞賦書法宗二王潁州府晉戴逵字安道譙國人太宰武陵王晞聞其善鼓琴使人召之逵對使者破琴曰安道不為王門伶人遂徙居㑹稽剡縣王徽之嘗雪夜訪之孝武帝時纍徵不至南北朝宋戴顒字仲若逵子有高名嘗注莊子元嘉中徵不就愛剡多名山隱居其下文帝每欲見之曰吾東巡日當宴戴公山下宋陳摶字圖南亳州真源人始四五嵗戲渦水岸側有青衣媪乳之自是聰悟日益後唐長興中舉進士不第隱居華山雲臺觀周世宗好黃白術召見之摶曰陛下當以致治為念奈何留意黃白之事乎宋太祖代周摶曰天下自此定矣太平興國中來朝至中書省宋琪等問曰先生得元默修養之道可以教人乎摶曰養生非方術可傳假令白日沖天亦何益於世今聖上有道仁聖之主也正君臣協心同德興化勤行修煉無出於此上益重之賜號希夷先生後還山端拱中卒明王清臣潁州人天啓初潁州張逺度買田潁南地多桃花林一日獨游見耕而歌者聽之皆杜詩也遂就與語知為清臣也有田畏徭役盡委之族為人傭耕過其廬見舊厯紙背書所作其述懷一篇云人生如泛梗飄飄殊無根飲啄得幾許營營晨與昏對此春日好荷鋤出南原近觀草色敷靜聽鳥語繁有身貴適志窮達安足論亂後不知所終滁州宋雍存全椒人隱居求志以文史自娛號南郭先生以縣有獨山晚又號獨山翁州守錢公輔曽肇皆與之游元范思敬全椒人有志操能文章至正初嘗獻治平十二策不報遂歸隱石子岡之梁莊號棲谷子明駱俊滁州人平居耽味經史不求聞達行義修潔人多重之著有靜中自樂詩集和州宋何宗英和州人紹興間以布衣上書言敵必渝盟宜先事為備請幸建康以張國勢不報遂隱居以終士論高之明杜浩字守彜和州人洪武初居南莠村力學篤行安貧不仕廣德州宋張介紹聖時人隱居城北郡守慕其名每訪以政欲疏其行學於朝介固辭不就趙平叔咸平時人隱居城西琴山側起一樓於翠微之間曰萬山樓吟詠自適元盧志賢至元時人清修高節當時重之六安州宋白朴字仁甫六安人少隨父樞判真定遭元兵父子相失自是不茹葷酒人問其故曰俟見吾親乃下咽耳宋亡不仕所著有朝野新聲太和正韻天籟集泗州隋趙徵君泗州人失其名讀書甓山隱居不仕鄉人於其遺址建甓山書院祀之明李公度字思貞泗州人弱冠領鄉薦勸之仕不應部使者以國子博士薦不就石應瑞字兆生天長人少貧困授經以養父母居家孝友中明季己卯副榜例得仕不願就選置一㕓雲水間讀書課子逍遙樂志時比之仲長統云國朝陳歌泰字古彈天長人順治戊子拔貢恬退不仕講學修行一方之中皆化為善江南通志卷一百六十九欽定四庫全書江南通志卷一百六十九人物志隱逸二安徽寧池太廬鳯潁八府滁和廣六泗五州安慶府晉何準字幼道灊人弱冠知名不就徵辟兄充位居宰輔而準散帶衡門不交人事徵拜散騎郎不起南北朝宋何求字子有廬江灊人清退無嗜欲除中書郎不拜住吳居般若寺足不踰户人莫見其面又寄住南澗寺隱虎邱山梁何點求弟少不仕宋世徵為太子洗馬不就隱居東離門卞望之墓側永明元年徵中書郎豫章王命駕造門點從後門逃去竟陵王子良聞之曰豫章王尚不屈非吾所能致點弟印亦隱㑹稽世號點為大山印為小山宋張漢卿桐城人監興國軍管庫與太守論事不合即和陶潛歸去來詞歸隱三十年後宰相趙汝愚特薦不起元黃信一太湖人仁宗殿試第一工詩文不樂仕進終老巖壑間明吳宗洙字惟孔懷寧人隱居讀書不問户外有詣門求見者堅匿不出年已踰耋猶手一編八十四卒著迎暉閣消夏麈談諸集吳偆字仕富桐城人少即高隱晚年植槐於庭自號緑窗主人有詩云懶向花黃占事業三公留與後人封逮四傳而孫果列卿二方授字子留嗜學工詩晚年入四明山中結茆而棲採橡栗而食著書百篇袁平字石録宿松人性豪爽工詩文高隱西源錢可久字思畏桐城人詩才俊逸字畫遒徑自言與西湖結物外交駕舟千里訪之扣舷高歌旁若無人方見字惟素桐城人才名冠一時隱於湖山之間與詩人徐宣相倡和有古人風國朝劉若宜字宜之懷寧人明崇禎丁丑進士厯官職方司甲申闖賊陷京城兩次投繯皆為家人救不死遁居甑山三十餘年未嘗入城市張載字子容桐城諸生博學能詩文負氣節善弩射明季避流寇與父相失縋城出遍求得之力護以歸年四十即隱松山所居臨湖環峰松篁交䕃釣艇蠟屐隨意所之周岐字農父桐城人博雅好古明季貢入京屢上書言時政大司馬馮元飇疏薦恭宣督軍功授監紀推官尋謝歸隱居不出著孝經外傳行世子瑄次璧師俱力學敦行左國材字子厚桐城人光斗季子隱龍眠山所著有易學詩學杜詩解頤竝雜著若干卷徽州府唐張友正歙人結廬城陽山下貞元末魏𢎞簡來為宣徽副使重其才請為披雲亭記立成酬以金帛不顧去宋潘洋發字肖岩歙人淳祐中為太學生上書論史嵩之起復之非不報退隱潛虬山纍徴不就嘗葺龍溪紫陽諸文撰文海天琛曹汝弼字夢得休寧人高蹈不仕與林逋魏野齊名號松蘿山人程先字傳之休寧人痛父死節於金守墓不仕學於朱子邵悅字貞父休寧人隱蘿山精舍玩易象集方書施藥活人兩膺辟舉皆不就汪大發字敷之休寧人淳祐間魏了翁築室白鶴山下大發負笈從之得其傳歸建平山書院教授於鄉學者稱為騰波先生程鼎字復亨婺源人從朱松學於閩家貧甚奉母徙居窮山卒朱子表其墓汪漢字翰美休寧人居山中時邑遭寇難親知奔匿賊至漢諭以善道賊感服而去咸賴以免李繒字參仲婺源人絶意科舉築室鍾山以老朱子嘗與程珣過繒講論終日盛稱其文卒表其墓江愷字伯成婺源人潛隱耽著述時婺貢楮絲民甚病之愷以書白部使者貢得蠲程旬軒嘗稱之曰欲知隱不為徒隱須看當時免貢書范啓字彌發休寧人理宗三徵不起賜號風月處士著有雞肋録管錐志井觀記徐驤字伯驥婺源人學於胡宏著羲易圖皇極經世發微李偉字敬叔祁門人師同郡胡方平咸淳中任郡學賔師入元不仕嘗作經史訓注二圖劉光字元輝歙人開門授徒五十餘年元行省差充寧國路學正不赴羅榮祖字仁甫歙人與處士蕭㪺等同被徴鄭左參力為勸駕榮祖書招隱詩謝之趙彌忠字資敬休寧人力學窮理亷使薦以官不就許宗堯字子仁績溪人博通經史隱大鄣山纍徵不就金若洙字子方休寧人受書程若庸之門弱冠領寶祐鄉薦令黔江宋亡不仕隱居東園著述以老元汪萊甫字芳卿歙人好讀易自號草窗先生虞集薦之詔有司辟舉不赴孫嵩字元京休寧人宋時薦入太學元初歸隱山中自號艮山以示意杜門賦咏凄斷淪絶方回讀其詩歎曰持此見朱文公亦無愧矣明胡安字伯康歙人郡守陳彥回以懷才抱德舉不就羅誠輔字誠一歙人太祖駐師玉屏山以耆老召見對稱㫖欲官之不受吳買字漢臣休寧人通五經尤精易洪武初屢徵不就王寅字仲芳歙人少為高才生棄去逺游俶儻自負喜談兵工詩習禪自號十嶽山人舒遜績溪人工詩洪武中辟舉不就王善慶歙人力學善書居環溪結室僅客膝屢召不出鮑寧字廷謐歙人正統間御史郡守交薦辭不出著有天源發微辨謝陛字少連歙人嘗宗朱子帝蜀之意作季漢書以蜀承漢統而列魏吳為世家新城王貽上論正史外更有史如兩漢書外有荀悅袁宏漢紀陳夀三國志外又有謝陛季漢書陛雖少攻舉子業而性尚恬退金顯德字世榮休寧人博極羣書不求聞達出粟賑饑郡邑聞於朝欲官之不就門人私諡為節孝先生余紹祉字子疇婺源人師事黃龍光盡得其學托跡蕭寺不應有司禮召湯守敬字彥肅婺源人明初詔舉名儒辭不就唐世靖字介甫歙人一日讀書見先正云四股八比之外原有學問公卿大夫之外原有人物遂罷諸生為山人吟詩染翰逌然自適著三邱山人什一草方問孝字胥成歙人别號癯丈人亢直不肯阿世隱居不仕著蒼耳齊詩三十卷吳拭字去塵休寧人性豪縱有潔癖為詩清古淡雋工書畫又精琴理有訂正秋鴻諸譜嘗自入山擇琴材故相傳有去塵琴云國朝黃生字扶孟歙縣庠生與同學洪舫棄去舉子業一意著述黃有詩文集若干卷洪有離騷辨杜詩評律查潛字淵若婺源人為文高古性狷潔足跡不履都聚遁跡高湖山造其廬者不得見輒歎息而去好周恤鄉人至破産吳大先字維則歙人家貧以著述為事時攜琴書山水間翻繹之暇輒彈一闋自娛寧國府晉瞿硎先生不知姓氏太和末隱宣城文脊山山有瞿硎石因以為稱大司馬桓溫往造焉先生披鹿裘坐石室神色無忤溫與僚佐皆莫測乃令伏滔為作銘贊焉唐元逸士宣城人居北郭杜牧許渾並有詩贈之纍召不起皮日休貽書云足下行竒操峻退卧陵陽賜命屢頒高風轉固宋程炎子涇人隱琴高臺襟負清曠文丞相天祥過之名其樓曰森翠吳晦之字元用寧國人少謝舉業工為詩客遊江淮周覽名勝晚乃隱道山下築生香亭一室幽棲為世推重元貢性之字友初師泰從子由國子生補閩省理官明初有以性之薦者性之改名悅避居㑹稽耕漁自給邑人芮麟嘗遇之邀與俱歸辭以詩云遊絲落絮都成恨社燕秋鴻各自飛每有所感則泫然泣下既卒門人私諡曰貞晦先生梅致和字彥逺宣城人從汪澤民授春秋隱於城南部使者重之屢辟不起宋濓志其墓明林景初太平人賦性恬退洪武初求遺賢知縣梁德逺勸之仕以疾辭隱香城山號獨隱居士貢鏞字元聲宣城人博洽工詩家人夜執盜鏞不欲識其人命勿燭盜曰苦多逋負更給布粟遣之居嘗力耕足不至城府洪載字維熙涇縣人隱居嗜古遇歉嵗周恤鄉黨有鬻兒女者還其直獲盜縱之為詩有陶孟之風有水雲集國朝汪作霖字雨公寧國人明經嗜古教授生徒人鮮知者嘗獲遺金不取見人急每傾囊豫之邑人稱其古道云池州府唐高霽字暄之秋浦人隱居石門山桃花塢李白嘗游其地與同眺九華聮句李昭象字化文池州刺史方元子方元罷池州卒於宣城其家遂留秋浦懿宗末昭象至長安以文干執政路巖深器重之後避黃巢亂入九華築室碧雲峰下與張喬顧雲杜荀鶴為方外交楊行密聘之不起五代陶守立池陽人通經史善屬文南唐保大中棲隱齊山琴棋詩酒外以丹青自娛夏鴻貴池人嘗與兄鵬輯十三代史略隱居不出鄉人罕見其面子乾錫樊師古嘗師事之及守池薦於朝宋祖為製冠服召之竟不起自號清溪布衣時推一門高尚宋劉放字世疏青陽人隱居九華雙峯下自題石壁曰清隱岩著九華拾遺一卷陳翥銅陵人好閒靜却掃著書即家人亦非其時不見陳巖字清德青陽人博極羣書負用世之志宋末舉進士不第入元遂深自晦匿時方徵求隱逸乃汗漫江湖以避之及老始歸築室高陽河以居出則遍厯九華之勝有九華詩集明洪仲遵名道以字行建德人通易春秋屢受辟命皆不就後舉文行授本縣訓導以老辭與江容等游號五老劉城字伯宗貴池人嵗貢生才氣豪邁與同邑吳應箕齊名一時名公卿多推重之好談經濟大略著邊塞屯鹽河渠市馬諸議明季屢辭徵辟岩棲谷隱以終其身有嶧桐集二十卷江杏字君培建德人嵗貢生為人莊重博涉文史深於天文兵法揣事多竒中明亡後晦迹不出同里尚書鄭三俊為作傳鮑光義貴池人工詩文明季避兵棄諸生棲隱七松里所輯有周易講義又建德貢生金學重少有才名晚嵗匿跡山中潛心著述太平府唐王翀霄繁昌人雅志林壑不樂仕進貞元間築室馬仁山講學從游甚盛後尚以所隱未深更徙龍首峯之西王居巖當塗人避廣明之亂棄官隱青山楊行密據淮南以兵迫起之一日行密大㑹失居巖急使人掩其家無一在者宋韋許字深道蕪湖人從李之儀學不事科舉築室榜曰獨樂陳瓘為作記黃庭堅至邑與之游紹興初高宗特命以官不受自號蕪隂居士魚潛字德昭當塗人工詩有名後隱居不出養鵝鴨以自給元蔣子誠當塗人文宗西幸江陵憩慈湖民舍駕旋後子誠族人多攀援左右以干爵祿獨子誠徜徉溪谷採藥吟詩以逸民終明祖雋字逺志當塗人少有詩名永樂中徵修大典例當得官雋辭歸放懷詩酒翛然自適著有丹湖集戴綬字民信當塗人有孝行工古文御史及郡守交薦之授和州學正辭疾不就葺采石書院授徒以終廬州府元葛聞孫合肥人字景元早喪父事母篤孝嘗出為州文學既而曰此非養志之道吾有薄田勤力耕稼亦足供養遂歸於舍傍結環翠山房以延來學每侍母食下始出與諸生誦說間入城識與不識皆曰葛先生執政薦其學行於朝召為翰林辭不赴及卒余闕表其墓朱可與舒城人好學博覽絶意仕進家居教授文行著當時明方自勉字聖修性方嚴不茍然諾里人比之王彥方隱湖濵以古學教授宛杲字彥昭廬江人讀書通世務尤樂施豫高蹈山林不樂仕進而行誼為衆所推楊首春字元之編茅成屋匿影空山每與人講論聽者忘倦有司往物色之已掛瓢逝矣楊大濓字潔甫無為人高雅恬退以布衣為督學耿定向薦不就衣敇履穿灑然自適所著有詠史諸詩鍾濟字海源守義端嚴平生未嘗一接長吏舉鄉飲不就舍後築一園臨江面山以詩酒終其身國朝季友賢字輔皇合肥人淹貫經史兼精六甲明末大司馬史可法羅致幕下父艱歸里隱于黃山曹大復字賔魯巢縣人明諸生端方純朴究心理學得修脯輒周貧困年七十慨然去鄉邑或遇之白石山禪林中不交一言而去計其夀已百三嵗矣後莫知所之鳳陽府漢梅福字子真夀春人明尚書穀梁春秋為郡文學補南昌尉後歸夀春時王鳯專政福上書極諫至王莾亂政一朝棄妻子去後人有見福于㑹稽者變姓名為吳市門卒云桓曄字文林一名嚴龍亢人鸞子姑為司空楊賜夫人初鸞卒姑歸寧赴哀整飾從者而入曄心非之每至京師未嘗舍宿楊氏其貞介若此賔客從者皆祇其志行一餐不受于人後舉孝亷有道方正茂才三公竝辟皆不應初平中天下亂避地㑹稽遂浮海客交址元王宗嶽字良佐臨淮人厭俗學隱居講求性道人稱養高先生楊省字治卿定逺人不樂仕進以書史自娛嘗遊三峯青韭諸山遇佳處輒為題咏晚年造詣益高明盛世鳴字太古鳳陽人俶儻有藴藉嗜古文竒字嘗寓泗州隱于卜郡守物色之竒其人無錫少宰孫繼臯聞其詩薦之葉相國向高遊輦下名動公卿世鳴意不懌退而隱居號空谷居士陳琰字廷玉臨淮人性恬淡博學能詩文動循禮度隱居濠濵有司纍薦皆不出許鵬字廷舉定逺人少負氣節以賢良方正薦至京師陳時務詞多過直乃于策尾作詩自陳已志不願入選歸隱城南種竹萬竿因號竹莊以耕讀自娛著有竹莊集姚􅔆字舜用定逺人性敏過目成誦家貧授徒不慕榮利大學士謝遷與其父有舊使人召之􅔆固辭不赴趙萃一字魁北夀州人養親盡孝資敏而好學隱居山中講明易理終身不出國朝周廷棟號豫章宿州人博學多聞性理子史諸書無不精研隱居不仕工詞賦書法宗二王潁州府晉戴逵字安道譙國人太宰武陵王晞聞其善鼓琴使人召之逵對使者破琴曰安道不為王門伶人遂徙居㑹稽剡縣王徽之嘗雪夜訪之孝武帝時纍徵不至南北朝宋戴顒字仲若逵子有高名嘗注莊子元嘉中徵不就愛剡多名山隱居其下文帝每欲見之曰吾東巡日當宴戴公山下宋陳摶字圖南亳州真源人始四五嵗戲渦水岸側有青衣媪乳之自是聰悟日益後唐長興中舉進士不第隱居華山雲臺觀周世宗好黃白術召見之摶曰陛下當以致治為念奈何留意黃白之事乎宋太祖代周摶曰天下自此定矣太平興國中來朝至中書省宋琪等問曰先生得元默修養之道可以教人乎摶曰養生非方術可傳假令白日沖天亦何益於世今聖上有道仁聖之主也正君臣協心同德興化勤行修煉無出於此上益重之賜號希夷先生後還山端拱中卒明王清臣潁州人天啓初潁州張逺度買田潁南地多桃花林一日獨游見耕而歌者聽之皆杜詩也遂就與語知為清臣也有田畏徭役盡委之族為人傭耕過其廬見舊厯紙背書所作其述懷一篇云人生如泛梗飄飄殊無根飲啄得幾許營營晨與昏對此春日好荷鋤出南原近觀草色敷靜聽鳥語繁有身貴適志窮達安足論亂後不知所終滁州宋雍存全椒人隱居求志以文史自娛號南郭先生以縣有獨山晚又號獨山翁州守錢公輔曽肇皆與之游元范思敬全椒人有志操能文章至正初嘗獻治平十二策不報遂歸隱石子岡之梁莊號棲谷子明駱俊滁州人平居耽味經史不求聞達行義修潔人多重之著有靜中自樂詩集和州宋何宗英和州人紹興間以布衣上書言敵必渝盟宜先事為備請幸建康以張國勢不報遂隱居以終士論高之明杜浩字守彜和州人洪武初居南莠村力學篤行安貧不仕廣德州宋張介紹聖時人隱居城北郡守慕其名每訪以政欲疏其行學於朝介固辭不就趙平叔咸平時人隱居城西琴山側起一樓於翠微之間曰萬山樓吟詠自適元盧志賢至元時人清修高節當時重之六安州宋白朴字仁甫六安人少隨父樞判真定遭元兵父子相失自是不茹葷酒人問其故曰俟見吾親乃下咽耳宋亡不仕所著有朝野新聲太和正韻天籟集泗州隋趙徵君泗州人失其名讀書甓山隱居不仕鄉人於其遺址建甓山書院祀之明李公度字思貞泗州人弱冠領鄉薦勸之仕不應部使者以國子博士薦不就石應瑞字兆生天長人少貧困授經以養父母居家孝友中明季己卯副榜例得仕不願就選置一㕓雲水間讀書課子逍遙樂志時比之仲長統云國朝陳歌泰字古彈天長人順治戊子拔貢恬退不仕講學修行一方之中皆化為善江南通志卷一百六十九
