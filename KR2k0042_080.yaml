body:
  text: 江南通志卷八十一食貨志鹽法周天官鹽人掌鹽之政令以供百事之鹽周禮此後世鹽官之始舊鹺志海王之國謹正鹽策管子海之鹽蜃祁望守之晏子春秋此後世場官之始舊鹺志秦少府掌山海地澤之稅以給供養漢書百官表漢吳王濞煮海水為鹽國用富饒史記列傳史起蟄曰吳王濞立國廣陵煮海水為鹽鹽所入輒以善價與民此兩淮鹽利之始嘉靖鹽法志吳王濞開邗溝自揚州茱萸灣通海陵倉及如臯蟠溪此運鹽河之始維揚志彭城以東東海吳廣陵有海鹽之饒史記貨殖傳元封元年置均輸鹽鐵官漢書食貨志地節四年詔減天下鹽賈漢書紀初元元年詔江海陂湖園池屬少府者以假貧民勿租賦玉海東漢明帝時官自鬻鹽文獻通考章和元年廣陵太守奏罷鹽官以利百姓後漢書馬祾傳三國魏於廣陵司鹽中十場總志吳有户曹尚書總四方委輸計算之任鹽政志晉江左初省課第曹置庫曹後復分曹置外左庫內左庫晉書職官志南北朝陳天嘉二年立煮海鹽賦陳書紀唐天下有鹽之國一百五江南十二地理通釋開元二年江南少尹李傑充水陸轉運使轉運使之名自此始也十八年拜宣州刺史裴耀卿為江淮轉運使以鄭州刺史崔希逸河南少尹蕭旻為之副轉運之有副使自此始也職官分紀貞元四年淮西節度使陳少游奏加民賦自此江淮鹽每斗亦增二百為錢三百一十其後復增六十江淮豪賈射利或時倍之唐書食貨志順宗即位有司重奏鹽法以杜佑判鹽鐵轉運使理於揚州元和二年三月以李㢲代之舊唐書永貞時始減江淮鹽價每斗為錢二百五十其後鹽鐵使李錡奏江淮鹽斗減錢十以便民未幾復舊唐書食貨志永貞元年度支使奏江淮鹽每斗減錢一百二十𣙜二百五十冊府元龜開成二年三月鹽鐵使奏得蘇州刺史盧商狀分鹽場三所𨽻屬本州元糶鹽七萬石加至十三萬石倍收稅額直送價錢冊府元龜南唐升元元年置海陵鹽監古今鹺略宋建隆二年詔寬鹽麯禁五代㑹要豐利監通州故有鹽場七置監以掌之太平興國中移治於通州西南唐劉式歸宋以大理寺丞贊善大夫監豐監通州志雍熙二年入中芻粟於沿邉以劵至京師江淮給鹽謂之交引九朝編年陳傅良曰國初鹽策只聽州縣給賣歲以所入課利申省而轉運使操其贏以佐一路之費初未有客鈔也雍熙二年三月令河東北商人如要折博茶鹽令所在納銀至京請令交引此邉郡入納算緡之始止齊集端拱二年九月始令商人輸芻粟塞下執交劵至江淮給以茶鹽謂之折中太平治績統類此召商中納之始大學衍義補淳化間張綸除江淮制置發運副使時鹽課大虧乃奏除通泰楚三州鹽户夙負官助其器用鹽入優與之直由是歲增課數十萬宋史張綸傳至道二年發運使楊允恭言淮南十八州其九禁鹽餘不禁商人由海上販鹽官倍數而取之至禁鹽地則上下其價今請悉禁遣吏主之是歲收利巨萬玉海前雷有終為江浙荆湖茶鹽制置使奏王子輿為判官轉江淮兩浙制置茶鹽真宗即位命為鹽鐵判官仍領制置增歲課五十餘萬貫宋史王子輿傳宋初鹽鈔未行真宗時於建安軍置鹽倉乃令真州發運適李沆為發運使運米轉入其倉空船回皆載鹽散入江浙諸路各得鹽資船運而民力寬文獻通考明道二年參知政事王隨建言願權聽通商三五年使商人入錢京師又置折博務於揚州使輸錢及粟帛計直豫鹽鹽一石約售錢二千則一千五百萬石可得緡錢三千萬以資國用宋史食貨志附王隨疏略臣隨伏思淮南鹽初甚善自通泰楚運至真州自真州運至江浙荆湖綱吏舟卒侵盜販鬻雜以砂土殆不可食吏卒坐鞭笞徒配而莫能止兼運河淺涸漕挽不行逺州村民頓乏鹽食而淮南所積一千五百萬石無屋以貯則露積苫覆歲以損耗亭户輸鹽應得本錢或無以給貧困為盜願權聽通商三五年使商人入錢京師置折博務於揚州使輸錢及粟帛計直豫鹽鹽一石售錢二千則一千五百萬石可得緡錢三千萬以資國用一利也江湖逺近皆食白鹽二利也歲罷漕運糜費風水覆溺三利也昔漕鹽舟可移以漕米四利也商人入錢可取以償亭户五利也贍國濟民無出於此范仲淹安撫江淮亦以疏通鹽利為言詔三司使江淮制置使同議謂聽商恐私販肆行請敕制置司益漕船運至諸路使皆有二三年之蓄後天禧元年制聽商人入錢粟京師及淮浙江南荆湖州軍易鹽在通楚泰海真揚漣水髙郵貿易者毋得出城餘州聽詣縣鎮毋至鄉村其入錢京師者增鹽豫之并敕轉運司經畫本錢以償亭户詔皆施行宋史食貨志附范仲淹議弛鹽禁疏略鹽稅之入但分減商賈之利耳行於商賈未甚有害也國用未減歲入不可闕既不取之於山澤及商賈須取之於農與其害農孰若取之於商賈為今計莫若先省國用國用有餘當先寬賦役然後及商賈弛禁非所先也康定元年詔三司議通淮南鹽給京東等八州於是兗鄆宿亳皆食淮南鹽矣宋史食貨志慶厯初制直司請量增江淮兩浙荆湖六路糶鹽錢下三司議三司奏荆湖已嘗增錢餘四路三十八州軍請斤增二錢或四錢宋史食貨志崇寧元年蔡京議更鹽法乃言東南鹽本或闕滯於客販請增給度牒及給封樁坊場錢通三十萬緡宋史食貨志紹興二年九月詔淮浙鹽令商人每袋貼輸通貨錢三千宋史食貨志三年減淮浙蠶鹽錢宋史髙宗紀四年正月增淮浙路鹽鈔貼納錢宋史髙宗紀九月減淮浙路鹽鈔所增貼納錢宋史髙宗紀元太宗庚寅年始行鹽法每鹽一引重四百斤其價銀一十兩世祖中統二年減銀為七兩至元十三年江南之鹽所入尤廣每引改為中統鈔九貫二十六年增為五十貫元貞丙申每引又增為六十五貫至大己酉至延祐乙卯七年之間纍增為一百五十貫元史食貨志元貞元年閏四月罷各處鹽使司鹽場改設司令司丞元史成宗紀二年七月詔茶鹽轉運司仍舊以三年為代元史成宗紀九月增鹽價鈔罷民間鹽鐵爐竈元史成宗紀大德四年中書省奏准改立倉設綱儹運撥袋支發以革前弊本司行鹽之地江浙江西河南湖廣所轄路分上江下流鹽法通行元史食貨志五年以兩淮鹽法澀滯命轉運司官兩員分司上江以整治之續文獻通考十一年七月江浙湖廣江西河南兩淮屬郡饑於茶鹽課鈔內折粟遣官賑之元史成宗紀十一月中書省臣言前為江南大水以茶鹽課折收米賑饑民今商人輸米中鹽以致米價騰湧百姓雖獲小利終為無益臣等議茶鹽之課尚如舊從之元史成宗紀天厯二年夏四月行省復請令商賈入粟中鹽計一歲總辦之數約鹽總二百五十六萬四千餘引鹽課鈔總七百六十六萬一千餘錠續文獻通考兩淮運司歲辦鹽課六十五萬七十五引自二月煎至十月足備每月該煎鹽七萬二千二百三十引元典章明洪武元年定兩淮歲辦鹽數每引重四百斤官給工本米一石後改行小引每引重一百斤明㑹典二十八年令兩淮兩浙鹽運司煎鹽工本照各場額辦鹽數關鈔遣監生管運給散明㑹典兩淮轉運使司洪武間歲辦鹽三十五萬二千五百七十六引一百斤零續文獻通考永樂間議准淮鹽每引納米二斗五升或小米四斗遇米貴小米亦止二斗五升明㑹典宣德四年令兩淮兩浙貧難竈丁除原額鹽課照舊收納其有餘鹽者不許私賣但收貯本場運司造冊發附近州縣每一小引官給米麥二斗續文獻通考五年令兩淮兩浙長蘆運司每歲額辦鹽課以十分為率八分給與守支客商二分另為收積在官候邉方急缺糧儲召中以所積見鹽人到即支謂之存積其八分年終挨次給守支客商謂之常股凡中常股價輕存積價重續文獻通考正統二年令兩淮官鹽聽各商於貴州地方貨賣鹽引於鎮逺府告銷明會典三年令各邉商中納鹽糧淮浙兼中如以十分為率淮鹽八分浙鹽二分或淮鹽七分浙鹽三分淮鹽止米麥二色浙鹽雜糧皆准明㑹典七年令兩淮運司所屬鹽場以路途便利者為上場窵逺者為下場凡支鹽之時上場派盡方以下場湊數補派以便鹽商明㑹典十三年令兩淮運司於各場利便處買立倉囤每年以揚州蘇州嘉興三府所屬附近州縣及淮安倉并兑軍餘米內量撥收貯凡竈户若有餘鹽送赴該場每二百斤為一引給與米一石年終具奏造冊申報其鹽召商於開平遼東甘肅等處開中不拘資次給與明㑹典十四年令增兩淮兩浙存積鹽為四分召商供給邉儲明㑹典景泰元年令增兩淮兩浙存積鹽為六分又令竈丁餘鹽每引給米淮鹽六斗浙鹽四斗明會典三年令兩淮運司各場竈户有將該徵糧草不分起運存留願折納餘鹽者每正糧米麥豆五斗草五束各折徵鹽一小引續文獻通考天順元年詔淮浙長蘆等鹽運司景泰七年十二月以前拖缺未完鹽課悉與蠲免舊鹺志成化七年令減兩淮存積鹽仍為四分常股六分明會典九年令兩淮運司凡盤獲一應私鹽并沒官掣割等項商鹽俱運至儀徵批驗所并本所掣割餘鹽通至二萬引以上開報差官變賣給邉續文獻通考十九年巡撫鳳陽等處副都御史奏兩淮歲辦額鹽俱以六分為常股以次關支四分為存積以備急用鹽商到場量其場分上下三七分派支近豪商巨賈輒占上場宜加禁治從之明實録𢎞治元年七月命侍郎李嗣彭韶分理淮浙鹽法大政紀二年令兩淮各場鹽囤地方皆以東西南北為界如南北為門為路則東堆存積西堆常股定立石碑每囤止一千引如總催名下有一千五百引一千為大囤五百為小囤先儘存積足數然後收常股一年鹽課皆完方徵收下年者委官盤鹽務逐引稱盤不許丈量堆垜查算明㑹典二年十二月定鹽運司嵗冊奏繳期限河東三月終淮浙四月終餘俱六月終大政紀五年令兩淮等鹽運司鹽引俱於運司招商開中納銀彚解户部太倉以備邉儲圖書編十四年二月開大同淮鹽百萬引宣府浙鹽五十萬引大政紀十六年商人周洪等奏乞納銀於户部報中兩淮運司風雨消折鹽課隨場買補明實録十七年令兩淮巡鹽御史清理各場竈丁鹽課有丁少辦納不敷者許多餘鹽課灑派丁多去處帶辦待後貧難場分竈丁復舊各照原額辦納明㑹典又議准淮鹽纍年開中過額致纍商人以後止開實在之數免至額外透派目下續到應透派者聽巡鹽御史徑行運司挨取未開常股空額免其添價明㑹典正德七年題准兩淮水鄉竈丁每歲該辦鹽九千一百四十九引每引納工本銀三錢五分解送運司給散煎辦竈丁今辦納不前每引減舊額徵銀二錢年終運司徵完解部明㑹典又令寧夏開中兩淮運司本年分鹽課每引定價二錢五分不拘糧草取勘時估貴賤道路逺近定立斗頭斤重撥納本色不願納本色者兩淮鹽課每引納銀四錢五分河東每引三錢聽從各官召商糴買抵數明會典嘉靖元年令查勘兩淮商人原中殘鹽不應革沒每引原納銀三錢加添一錢續文獻通考二年巡按御史秦越條陳查撥引鹽以平市價欲將淮北四場內商人所領莞瀆臨洪二場鹽七萬八千六百八十餘引改赴儀徵批驗所與淮南引鹽一體掣賣以濟淮南里多鹽少之處明實録六年議准以後開中兩淮鹽課價銀每引以六錢為例不許任意增添續文獻通考又議准兩淮運司餘鹽每二百斤淮南定價八錢淮北六錢續文獻通考七年奏准南京户部遇運司齎領鹽引額辦之外增刷引目兩倍共一百四十四萬道每五十道為一封移咨都察院轉行巡鹽御史用印鈐蓋發運司收領自嘉靖七年為始照商人各邉報中引目以額鹽總數為則如原在邉中正鹽一千引許報中餘鹽二千引照年分場分配搭淮南每引定銀一兩二錢淮北一兩內各除資本銀二錢五分淮南納九錢五分淮北納七錢五分俱赴運司上納照數給與引目令其自行買補免其納賑明㑹典八年議准令後各邉開中淮浙等引鹽俱要查照舊例召商上納本色糧料草束不許折納銀兩其商人自出財力開墾邉地上納引鹽者聽世法録又議准自嘉靖七年為始各邉中正鹽一引到於運司令添中餘鹽二引先納引紙價銀六釐行南京户部添刷引目二道給與商人正鹽照舊派場納賑關支添中二引聼各商自行買補過所如法稱掣每引除包索二十斤其餘每二百斤淮南納銀八錢淮北納銀六錢支掣之後赴司納價解送太倉庫候各邉支用添刷過引目年終通查搭配過邉商報中若千支賣繳到者照正額引目截角解部未支者運司貯庫造冊送部查考候次年照數補刷每年湊足一百四十四萬道以備開中明會典九年議准停止添刷引目每鹽一引五百五十斤過所內除正鹽二百八十五斤其餘鹽二百六十五斤每二百斤淮南納銀八錢淮北六錢就令本商納完給小票執照發賣該納價銀量其發賣日月限以程期赴運司上納明㑹典十五年題准兩淮鹽斤每包五百五十斤內二百八十五斤連包索為正引原定六錢近減作五錢二百六十五斤為餘鹽淮南原定八錢今減作六錢五分淮北原定六錢今減作五錢正鹽上納本色糧草餘鹽不必開邊照舊運司納銀解部轉發各邊糴買各兵糧草明㑹典二十年部議兩淮鹽額六十九萬六千三百引原無餘鹽之法請自二十年始悉遵舊法勿派餘鹽從之續文獻通考二十一年題准太倉銀積少支多各運司餘鹽照舊納銀解部以濟邉儲其兩淮價銀自本年為始量為輕減每二百斤淮南定價五錢五分淮北四錢續文獻通考二十五年命淮鹽額行地方各巡撫御史督責所司查銷退引以杜商弊明實録二十七年題准自二十八年為始開中引鹽無論常股存積不分淮浙山東長蘆俱照原定價則止令上納本色糧草仍須申嚴法令不許勢豪占中經紀包攬并禁革額外勸借官攢常例使商人獲利樂從續文獻通考二十八年議准兩淮餘鹽自二十九年為始每鹽二百六十五斤淮南徵銀七錢淮北徵銀五錢一釐續文獻通考附霍韜淮鹽利弊疏竊謂立法須公而溥行法須嚴而密然又有善適通變之權乃可久而無弊唐劉晏只用淮鹽遂濟國用臣今姑議淮鹽利弊即天下可推也國初以兩淮鹵地授民煎鹽歲收課鹽有差亦猶授民以田而收其賦也惟鹽課條例云凡各竈丁除正額鹽外將煎到餘鹽夾帶出場及私鹽貨賣者絞然則耕民納賦租外將餘粟貨賣者絞可乎此法良有深意而後人失之矣淮鹽原額歲辦三十五萬引有奇後改辦小引七十萬有奇然兩淮鹽課除正額外猶産餘鹽三百萬引有奇今正額已不得多取餘鹽復不得私賣即三百萬餘鹽安所消遣乎兩淮行鹽地方南盡湖廣西抵河南東盡東海地方數千里人民億萬家所仰食鹽只七十萬引饔飱安所取足乎是無怪乎私鹽橫溢而鹽價湧貴也國初竈丁辦鹽每引四百斤給工本鈔二貫五百文蓋洪武年間鈔一貫值錢千文故竈丁得實利而冒禁賣私鹽可絞死也今鈔一貫不易粟二斗禁絶竈丁勿賣私鹽是逼之饑以死也此後來法行之弊非初年之失也正統二年令曰貧難竈丁除正額鹽照舊收納其餘鹽收貯本場每二百斤官給米一石若是而仍賣私鹽即絞死可也但當時令雖出而米實無措故官司徒挾此令以征取餘鹽實不能必行此令以給民米麥且貧弱竈丁朝有餘鹽夕望米麥米麥不得則先從富室稱貸然後加倍償鹽者有矣貧民賣私鹽人即捕獲富室賣私鹽官亦容隱故貧竈餘鹽必積富室乃得私賣富室豪民挾海負險多招貧民廣占鹵地煎鹽私賣富敵王侯蓋法愈嚴則利愈大頑民見利而不見法於是荒棄農畝専販私鹽挾兵負弩官司不敢訶問近年恃衆往往為劫此隙不弭必貽大患不止阻壞鹽法而已然既不能講求古法以處置餘鹽復不能變通鈔法以補給工本則貧民何所仰賴而不為變故鹽禁愈嚴盜賊愈多此之由也此鹽場竈户之利弊也洪武年間召商中鹽每引納銀八分官之徴至薄商之獲至厚鹽價平賤民亦受賜永樂年間每鹽一引輸邊粟二斗五升商稅雖加邉糧仰足民亦受賜自永樂以後歲定七十二萬引復定七分常股三分存積夫曰常股者猶常行也商人先納邉糧乃給引目守場候支常年鹽也有守候數十年老死而不得支者今兄弟妻子代支之令可考也曰存積者積鹽存場遇邉糧急缺乃倍價開中越次放支之鹽也此居貨罔利非王法正體成化以後准納折色每鹽一引准納銀三錢五分或四錢二分又令云客商若無見鹽許本場買補夫曰本場買補即開餘鹽私賣之禁矣故奸商借官引以影私鹽然商人竈户兩得贏利州縣民士亦食賤鹽惟私鹽愈行則官鹽愈壅而法遂大壞今兩浙鹽課許納折色之令可考也𢎞治正德年間或權姦奏討或勳戚恩賜皆給引目自買餘鹽故法雖大壞而鹽亦平賤復有各年開中未盡鹽名曰零鹽稱掣餘鹽堆積在所名曰所鹽皆權要報中借影私鹽以壅正額故正德以前鹽價雖平而正課日損自御史秦越奏革所鹽稱掣餘鹽每二百斤作一小引稅銀一兩則取之過重自御史戴金奏減鹽價每鹽一引納銀八錢庶幾適中今之議者復論鹽包過大皆不知本末之見也夫正鹽湧貴則私鹽盛行私鹽愈行則正鹽愈滯亦其所也此商人中納之利弊也今欲復洪武之法不可得矣欲區區修補則又無策臣常竊曰治鹽利猶治河患也治鹽利不究弊源惟末流之防猶治河患不從雍冀孟津懷衛引為陂堰鑿為溝渠以廣其利分其勢乃從徐沛下流浚其淤土厚其堤防則愈浚愈淤愈築愈潰亦勢也故今欲興淮鹽之利須令淮安漕運及三邉提督都御史講求其法而責以底績務令鹽課邉儲互相關通均為休戚兩都御史共秉一心如左右手然後足以集事而底績至于選人得失委托專暫成效虛實尤宜責之吏部期之數年鹽利不興邉儲不實邉民不多邉地不闢則兩都御史及銓部諸臣誅罰連坐然後任人者不茍任於人者不敢怠玩而政有實效此兩淮利弊也舉兩淮則天下可知也三十年三月議准兩淮運司除將原額正鹽七十萬五千一百八十引及餘鹽并行開邉報中外自嘉靖三十年為始每包內加二百斤令商人照數自行買補與同新舊開邉正餘鹽數俱作一包赴儀淮二所過掣淮南淮北悉納銀解部明㑹典三十七年議准工本鹽每引淮南七錢減銀二錢淮北五錢一釐減銀一錢五分免其官買鹽斤令商自向各場小竈買鹽赴掣其扣買收買工本割沒銀照舊解部仍要每單淮南六萬六千引外加三萬四千引為一單淮北三萬四千引外加一萬六千引為一單每年淮南四單淮北二單務期一年掣盡明㑹典四十五年御史奏復兩淮鹽課舊額先是兩淮額課每歲七十萬五千一百八十引徵銀六十萬兩鄢懋卿以溢額為功加至百萬至是奏仍舊額從之續文獻通考隆慶元年三月御史蘇朝宗條奏言鹽課自都御史王紳建議扣留餘鹽八萬二千兩每引官給竈户銀二錢收買餘鹽謂之工本後以引鹽積滯旋議停罷而銀兩亦無見貯議於正鹽外每引附帶餘鹽二十斤淮南八單淮北四單共徵銀八萬二千兩有奇以抵工本之數而鹽課愈重商本愈虧今宜少從寬恤將附帶鹽斤秋季以後即為停止每引照舊以五百十斤稱掣則額課減而商困少蘇續文獻通考二年七月御史馬文煒奏兩淮餘鹽銀近多移借不便稽查請如舊規每嵗定掣淮南八單淮北四單徵完則按季解部毋得多寡越數先後愆期庶出納明而弊端斯革報可續文獻通考四年令兩淮鹽法盡復大鹽舊例明㑹典五年兩淮巡鹽御史張守約言引價太重則內商有髙價之苦而邉商有守候之難乞酌議量減原價五分從之古今鹺略萬厯七年議准淮陽二府逼近鹽場州縣聽其以米易鹽止許肩挑背負不許多捆大包明㑹典十三年户部覆巡鹽御史蔡時鼎聽收折價之議每引淮南徵銀三錢淮北徵銀二錢一分蓋廪鹽積滯暫為疏通也以後全徵本色明實録十七年户部覆兩淮巡鹽御史陳禹謨復牒成規每嵗該掣八單每單八萬五千引定於五月十一日中旬牒掣務撥單順序不得攙越明實録十九年户部題兩淮巡鹽御史徐圖議稱開存積引價二事難行僉宜停免其所議加帶割沒鹽斤淮南每引帶鹽十斤徵銀五分共十六單淮北每引帶鹽二十斤徵銀一錢共八單暫行二年另議詔可明實録四十六年巡鹽御史龍遇奇奏立鹽政綱法祖制淮鹽每年七十萬五千一百八十引自套搭行而課額虧部議謀行見引附疏積引但淮南舊引二百萬淮北舊引一百四十萬一朝疏之誠難於是淮南編為十綱每綱刻定二十萬其挂掣未行引十七萬立附字綱每年一萬七千帶行十年而淮南舊引可盡淮北編為十四綱前三年每綱刻定七萬後三年每綱刻定二十二萬末一年以前所餘七萬併挂掣極少數附搭行之計十四年而淮北之舊引盡以後逐年止行逐年之引然法以十四年為期而新舊道臣相代不無各立意見科臣於是欲循𢎞正之例若差都御史職科道官一員一次清理期內不必續差庶法立而可守明實録崇正間每鹽引加徵銀兩以充邉餉又於湖廣武漢等府增行淮引每引復派練𠞰諸餉不等舊志國朝順治二年題准兩淮綱引一百四十一萬三百六十道每引徵課銀六錢七分五釐四毫零派行淮南一百一十八萬一千二百三十七引淮北二十二萬九千一百二十三引五年題准各運司鹽課分前朝一引為二引每嵗應行一百四十一萬三百六十引每引行鹽二百斤徵銀六錢七分零九年題准增寧國食鹽引一十六萬七千三百九十八道每引徵課銀五錢二分五釐派行淮南一十一萬二千九百七十八引淮北五萬三千四百二十引十年題准增引九萬二千六百九十七道照綱引例徵課十三年題准增綱引一十六萬道照例徵課十四年題准改江都食鹽一萬引於寧國行銷十六年題准上江增食鹽九萬六千七百引照例徵課十七年定停行新增二項綱引每綱引攤納課銀一錢二分一釐零康熙元年題准改淮北食鹽一萬引於寧國和含等處行銷五年題准吉安府改掣淮鹽增綱引五萬一千三百道照例徵課六年題准湖廣衡永寶三府改掣淮鹽撥銷淮南額內綱引八萬一千七百六道其舊額課銀仍於淮南現行引目每引攤納六分八釐零八年題准食鹽照綱引例每引增課銀一錢五分零又題准停止歸綱引一十三萬八千八百四十七引於淮南綱引內每引攤納課銀一錢一分五釐零十年題准改江都食鹽六千引於寧國和含等處行銷十三年題准改淮安食鹽一萬一千九百三十引於綱引內行銷江都食鹽三萬五千九百八十一引於寧國和含等處行銷十四年題准綱食鹽引每引加課銀五分又題准改山陽等處食鹽三萬二千引於寧國和含等處行銷淮安食鹽一萬二千一百引於綱引地行銷十六年題准增綱食鹽引每引加鹽二十五斤帶課銀二錢五分又題准食鹽每引升銀一錢又題准江西南贛二府改掣淮鹽增綱引一萬五千一百道照例徵課十七年題准增寧國和含等處食鹽五萬六千引照例徵課十八年題准計丁加綱引二萬七百四十二道照例徵課二十一年題准停寧國和含等處新增鹽引減除課銀二十三年題准兩淮鹽課解部選委才幹鹽運司屬官領解不得仍委府州縣佐二官二十四年覆准停徵每引加課銀五分二十五年覆准江西南贛二府仍改食廣東鹽除去額課二十七年覆准淮南綱引鹽例有額徵桅封銀兩原因既掣之後船中總散難稽故每船給以印封帖之桅上吉安復食淮鹽嗣後引目亦照例徵輸每歲增銀三百七兩八錢一分二釐於二十六年為始又覆准河南陳州等六屬既改食蘆鹽其舊缺淮北未銷之引責淮北地方通融銷繳又覆准淮南寧國等處增食鹽一萬引太平池州安慶三府增綱鹽二萬引共增課銀二萬七千九百四十二兩六錢零自丁卯綱為始二十八年覆准安池太等府食鹽所加三萬引准其除去仍循舊額行銷三十三年議准加課一十五萬兩三十七年覆准兩淮鹽斤壅積難消將原加二十五斤之鹽暫行停止所停鹽自三十六年為始分作五年帶徵其三十七年仍將二十五斤之課鹽照舊徵運三十八年著免康熙十六年所增課銀一半又議准兩淮行鹽之處督撫以下官員俱有餽送陋規槩行禁止三十九年覆准鹽斤係民生日用商人計本經營貴則纍民賤則病商該御史㑹同該督撫照時價貴賤估值務使商民兩便四十二年題准兩淮未完鹽課先作五年帶徵今淮北諸商引積難銷將課銀八萬四千三百九十四兩分作十年帶徵四十三年題准兩淮增織造銅斤河工等項錢糧三十餘萬兩每引加鹽四十二斤又題准兩淮浮費凡鹽院差滿日賞給餽送新院到任日支借等項及書差私收等項永行嚴禁四十六年題准江南上元江寧等縣商人退回鹽引七萬六千九百九十五引交與兩淮商人行鹽辦課又題准兩淮起解鹽課錢糧例係差委鹽屬官員近年改委府佐二及州縣官押解嗣後鹽課銀兩仍委鹽屬官員領解四十七年覆准揚州等九營水師官員有巡防海口并盤查私販之責如有大夥興販者該御史即㑹同總督提鎮差撥官兵查拿四十九年覆准兩淮鹽課該御史十月到任六月奏銷期限太速俟滿任日造冊報部又覆准四十七年未完鹽課於四十八年起分為五年帶徵又覆准湖南長嶽等八府與湖北武漢等八府俱食淮鹽嗣後湖南永衡寶三府通融行銷五十年題准兩淮鹽課缺額自辛卯綱起於三年內帶完五十一年題准湖南辰州府增鹽稅銀一千三百八十六兩零分為三年帶徵五十四年議准兩淮未銷鹽引八十五萬張自五十四年起至五十八年止分作五年帶銷五十八年兩淮商人願捐銀一十六萬兩以佐軍需奉㫖軍前各項錢糧俱已料理完足兩淮商人所捐銀兩御史收貯庫內以補歷年未完之項六十年諭兩淮商人所捐犒軍銀二十四萬兩不必解部著留充補伊等未完之項雍正元年兩淮商人交加斤銀十三萬餘兩遵㫖議定歷年積缺銀一百三十五萬餘兩除准抵算外餘剩銀分作三年帶徵完補又議准湖廣鹽斤革除陋規每包減去鹽價六釐價賤時每包以一錢一分九釐為率價貴時每包不得過一錢二分四釐安鹽較梁鹽再減二釐又淮鹽運至楚省皆水商販買轉售飭地方官嚴禁囤積務俾流通其小販賣價許按道里逺近量取微利不得任意昻貴二年通泰淮三分司所屬各場海潮淹漫奉㫖即動庫銀三萬兩委員分賑其未完折價銀四萬餘兩盡行蠲免又議准兩淮行鹽地方如湖廣江西上元等處地方廣大鹽不敷用每引准其加鹽五十斤其山陽等州縣逼近場竈鹽多反致引壅不必加鹽至所加鹽斤以甲辰綱為始交與巡鹽御史照數稱掣令其出運三年遵㫖議定兩淮南北行鹽除存積廪鹽係從前煎辦之額仍照平價運銷外其自雍正二年海潮淹沒以後商本自必倍增令兩淮巡鹽御史將淮南湖廣等處行鹽以本年成本之輕重合逺近腳價酌量時價移會該地方官諭令商民公平買賣隨時銷售不得禁定鹽價以虧商亦不得高擡時價以病民務令商民兩有裨益仍將各地方所賣鹽價數目分晰報部又覆准兩淮舊例於商人之中擇家道殷實者㸃三十人為總商歷年開徵之前將一年應徵錢糧數目核明凡散商分𨽻三十總商名下令其承管催追嗣後該鹽政運司不時查訪遇有分外科派無故私索者一經發覺務行從重治罪又覆准歷年巡鹽於三十總商之內擇其二三人或四五人㸃為大總各項加派衆商嗣後禁止㸃大總主名管事以除加派侵欺之弊又覆准令該鹽政運司嚴飭衆商如有私派指稱送某官送某要路之事許立赴道院首告即行指名題參照例從重治罪又覆准商籍行鹽者子孫官於朝遂自立為官商凡引課歸入名下希圖免出公費從中取利嗣後務令一體出費將官商之名永行禁革又覆准兩淮消乏商人不能完課推入衆商代賠是為推綱嗣後除實在消乏者仍照前分完外如有積惡商棍假托消乏私賣引窩將自已缺課希圖衆商代完者許衆商立赴道院首告該鹽政運司嚴行查追將本商革去不許行鹽引窩價值抵補缺項如已經私賣務將引窩追收入官買者賣者均行治罪又覆准兩淮因海潮淹沒場竈其癸卯綱未完引鹽寬限於雍正三年六月內督令運掣全完又覆准兩淮食鹽之課輕於綱鹽如有綱鹽行銷不敷之處令該御史具題將食鹽改撥令其照綱輸課暫且接濟民食俟各場煎辦旺足即行停止四年兩淮衆商公捐銀二十四萬兩又備鹽院公務銀八萬兩奉㫖以二萬兩賞給兩淮御史以三十萬兩為江南買貯米穀蓋造倉厫之用所蓋倉厫賜名鹽義倉即著兩淮御史交與商人經理又覆准湖廣荆州府巴東縣地湧出鹽泉增引二千五百二十六道課銀二千八百六兩三錢零五年奉㫖乙巳綱商人情願公捐銀二十四萬兩令各暫行存貯將來遇有公事動用之處再候諭㫖至備巡鹽御史公務銀八萬兩聽其自行支用若不接受任其退還衆商又以竈户住居海濵難逺赴鹽義倉運致米石著於近竈之地酌立數倉即於乙巳綱商人公捐銀兩內動用若干建倉積穀並遴選商人管理以濟貧苦竈户一時緩急之用又覆准停止食鹽改撥綱地行銷又覆准兩淮鹽價令該御史及兩淮行鹽地方各該督撫出示曉諭令商民公平置賣