赴安東縣批驗鹽引所驗掣內綱鹽則所官請掣截票一切俱如南鹽之例但其鹽於掣後例不解包改捆即以原引斤重赴河南汝寧等府并本省廬鳳等府州縣分銷銷畢殘引竟投行銷地方官截角銃洞彚解鹽院繳部食鹽則即以安東壩為所鹽數無多就近委淮安分司照例代掣掣後亦不解包再捆竟赴各州縣口岸銷賣殘引亦地方官截角銃洞彚解繳部此兩淮諸鹽行運銷引之大槩也江南通志卷八十一
