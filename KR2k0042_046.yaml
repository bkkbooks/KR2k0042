body:
  text: 江南通志卷四十七輿地志寺觀五池安徽寧四府安慶府雙蓮寺在府城內阜民坊宋范文虎捨宅為之內産雙蓮因以名寺國朝康熙五十八年按察使朱作鼎重修萬壽寺元建在府城內與雙蓮天寧太平迎江為五大寺天寧寺有二一在府城內宋建今縣學舊基明正德間移建忠節坊一在潛山縣舒臺亦宋建三祖寺在府城內朝天坊原名菩提菴隋開皇間璨祖卓錫於此歷三祖遂改菴為寺明嘉靖間重修太平興國寺府西正觀門外萬松山元建明洪武間修國朝康熙八年拓舊制增建迎江寺在府東樅陽門外明隆慶間建萬佛塔有光宗御書護國永昌禪寺特建宸翰樓貯之三城寺禪龕寺宣團寺俱六朝宋建古塘寺元建明重修以上懷寧淥水鄉延壽寺雙城寺四武寺俱宋建法雨寺梁建原浦寺明建以上懷寧大豐鄉木榴寺唐建文殊寺普澤寺今名暖水寺西畬寺俱宋建以上懷寧受泉鄉平山寺植福寺俱宋建長櫟寺元建以上懷寧堯年鄉寶福寺三聖寺洪山寺車軸寺梅城寺三鴉寺俱宋建以上懷寧欽化鄉白龍寺靈泉寺淨明寺俱宋建紹聖寺乾元寺顯能寺俱元建以上懷寧潛嶽鄉洪武間俱重修大寧寺在桐城縣東城宋建於縣西明洪武間徙此法蕭寺縣東三十里有昭明太子祠唐宣宗書額桐溪寺縣東三十里雙河坂明建華嚴寺縣東九十里即浮山寺宋遠録禪師道場與歐陽修因棋說法處靈山寺縣東百二十里宋建柳子寺縣東柳峰山明建白雲寺宋白雲禪師道場有青鳥來聽說法在縣東九十里禪智寺縣東黃蘖嶺明建石屋寺在縣東百里晉建裴仙修煉在此寺有十景曰玉洞長春石屋勝蹟白驢化米黑虎巡山金雞啼月獅子卧雲石鼓轟雷仙人棋局烏鵲候客石柱仙題四望寺在縣東周家潭宋建赤城寺在縣東南楊樹灣明建青山寺在小龍山永利寺在樅陽鎮明初建五印寺在縣南城外明萬厯中建資福寺在縣南三十里梅溪寺縣南九十里茂林寺在縣南黃陂坂俱宋建此寺有飛來古鐘勝因寺舊址在縣北二里投子山唐大同禪師宋義清禪師道場明嘉靖年間廢國朝雍正十二年奉㫖重建谷林寺在縣北魯䜫山舊名清泉寺明建國朝康熙四十六年敕賜今額龍門寺在縣麻山宋清遠禪師建有十二景曰駐馬坡白龍潭雨珠巖日月巖天方池𤣥武石羅漢峰獅子山古藤洞丹書峽龍門瀑布以上桐城縣延壽寺在潛山縣東二十里宋建時思寺縣東四十里元建大通寺縣東八十里宋建清凉寺縣南五里永明寺縣南十五里俱宋建興化寺縣西同安橋宋建百丈寺縣西三十里晉建太平寺在縣北太平山為五祖演禪師佛眼佛鑑佛果道場晉咸和中建山谷寺在縣北十五里舊名乾元寺梁僧寶志卓錫之地宋太宗時有舒民柯蕚遇老僧住萬歲山指古松下掘得石篆乃志公記聖祚綿遠之文進之朝名瑞石遣使致謝諡曰寶公賜號道林真覺禪師東北隅有第三祖璨大師塔又有舍利塔唐太宗賜號覺寂至今莓苔不茁鳥雀不棲歲有龍來洗塔雷電晦冥則龍爪悉見黃魯直愛此以寺名自號天柱寺在縣北清朝鄉唐開元間崇慧禪師開山乾元間敕賜天柱寺上有漢武帝回龍橋昭明太子閣崇慧講經石入定石玉鏡池又有瀑布聲如鐘功德水能療人疾佛光寺縣北四十里明萬厯中敕建賜藏經左有鸚歌菴其石苔蘚皆緑色形肖鸚鵡俗呼為鸚歌石右有相見菴相傳兩祖師相見處古佛寺縣北百二十里即西峰寺宋建彰法寺縣北七里宋建以上潛山縣覺巖寺在太湖縣東唐牧菴祖師建四面寺在縣東四面皆山唐法智禪師建宣宗嘗遊此其下有洞通龍山嵓海會寺縣東北白雲山麓宋建題額曰淮西第三禪剎石羊寺縣南三十里宋建真乘寺縣西南唐栲栳禪師建今存塔南山寺縣西南十五里宋伏虎禪師建彌陀寺縣西百九十里唐建龍門寺縣西龍門山宋佛眼禪師建二祖寺縣北百二十里有二祖慧可遺蹟佛圖寺縣北四十里佛圖澄建有石塔以上太湖縣東禪寺在宿松縣城內唐天寶間建相傳神秀禪師出家雙峰東山寺為五祖所器重後至宿松曰吾紹東山之禪開法於此故名福昌寺縣東孚玉山唐建拓林寺縣東八十里唐建資福寺縣東十五里即北山精舍唐建寶相寺縣東臨白馬河亦曰白馬寺相傳三祖璨大師建月山寺縣東三十里宋建山形如月寺旁皆叢竹報恩寺縣東南十五里宋建忠節寺縣東南五十里晉遠公建南臺寺縣南三里唐建祖堂寺縣西十五里宋建燃燈寺縣西三十里唐金二祖師建有金像飛來佛大梵寺縣西四十里唐建龍山寺縣西北十三里梁建龍王寺在縣北唐五祖大滿禪師建初五祖開法東山有龍化為童子侍聽法音因名龍王寺東林寺在西源山晉永和初建唐貞觀間護法祖師重建有古塔石船梅坪蓮池合掌石虎溪橋挂錫樹飛翠巖諸勝西林寺縣北三十五里晉永和九年祐祖禪師建法華寺縣北五十里全舉禪師道場有昭明太子分經臺法華亭獅子石仙人跡洗米池諸勝妙勝寺縣北二十里宋建以上宿松縣青林寺在望江縣治北宋建國朝康熙七年重修土岡寺在望江縣北三十里宋建張山寺縣北六十里宋建武洲寺縣北三十五里宋建龍山寺縣北七十里唐建妙光寺縣北八十里梁建十里寺縣西北十里永思寺縣西北四十里法華寺縣西北七十里俱宋建南臺寺縣西五十里宋建有放生池褒隱寺縣西七十里唐寶慶二年為漢隱士梅福建菩提寺縣東二十里宋建大慈寺縣東北十五里唐建崇慧寺縣翔鳯門外明初建以上望江縣佑聖觀府城便民倉西真源觀懷寧景定坊明建靈源觀懷寧縣受泉鄉𤣥妙觀太湖縣治北魏左慈建明末寇焚靈泉觀宿松縣學西梁天監二年匡阜真人救民疫插劒得泉飲之立愈遂以名觀靈佑觀宿松縣東荆橋元真觀縣東五十里俱梁建紫雲