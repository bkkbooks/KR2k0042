body:
  text: 江南通志卷一百九十藝文志文獻足則能徵江南人物之為獻詳矣文其可略乎漢儒授經在沛碭間至宋新安朱子傳述大備故宣歙多説經之士自餘史才詩學諸子百家之書大江南北為尤盛固天性使然亦文學流風結習於翰墨彬彬乎千載著述之林也又多藏書之家卷帙充棟津逮者不罕今考漢隋唐宋諸史所載藝文之目撰著出於江南者雖書或軼猶載之耳目覩聞所及郡邑乗所録叅擇而取焉為類四為卷五作藝文志第九經部註疏箋訓理學語録字説商咸乂四篇商相巫咸作越絶書云虞山巫咸所出篇名見書序漢田氏易田氏名王孫碭人受業于梁丁寛傳施讐孟喜梁丘賀三人焦氏易十卷焦氏名贛一名延壽碭人受易於孟喜焦氏易林二卷焦贛自撰施氏易章句二篇施氏名讐沛人髙氏易災異説髙氏名相沛人自言受易於丁將軍傳子康及蘭陵母將永劉向校尚書大傳三大傳伏生作彭城劉向校定洪範五行傳記十一卷劉向作其子歆亦有洪範五行傳論與向頗有異同劉向禮記二百十四篇先是東海孟卿傳禮百三記十一篇向又得孔子三朝七篇明堂隂陽記三十三篇王氏史氏記二十一篇合之為此書梁人戴德即向所傳刪之為八十五篇名大戴禮其從子聖又刪去四十五餘亦離合之為四十五篇名小戴禮馬融仍取劉向本增入樂記月令明堂位三篇不知何時逸朝義増入䘮服四制篇今所傳禮記四十九篇是也聞人氏禮記聞人氏名通漢沛人受曲臺記於郯后蒼慶氏禮記慶氏名普亦沛人受禮於后蒼樂記二十三篇先是河間獻王撰樂記二十四卷後傳常山王禹成帝時獻入祕府其書遂亡此劉向所校定張守節云公孫尼子所撰其目有樂本樂倫樂理樂施樂情樂形樂化樂象賔牟賈問樂子貢問樂魏文侯問樂奏樂樂器樂作意始樂穆説律季札樂道樂義招本招頌竇公自馬融掇十一篇入禮記而餘篇遂亡矣嚴氏公羊春秋嚴氏名彭祖下邳人受公羊於魯眭孟蔡氏穀梁春秋蔡氏名千秋沛人與梁人周慶丁姓皆從魯榮廣受穀梁漢宣帝先徵千秋立穀梁學千秋卒徵慶及姓並置博士徐州舊志則謂慶姓皆徐人又丁姓弟子申章昌時史稱楚人徐州志謂徐州時為楚王封國故稱楚實徐州人也劉向新國語五十四篇劉歆左氏春秋漢初張蒼賈誼張敞等皆修左氏春秋傳而武帝止立公羊宣帝乃立穀梁至此左氏乃立孝經翼氏説一篇翼氏名奉下邳人東漢桓氏大小太常尚書章句沛郡桓榮子郁魯詩章句曲阿包咸樂原起二卷沛桓譚論語章句包咸三國周易陸氏註十五卷京房易傳註三卷京房積算雜占條例註俱吳陸績吳人周易日月變例六卷陸績同虞翻註毛詩雜問難七卷吳雲陽韋昭撰春秋古今㑹盟地圖一卷註穀梁十二卷春秋外傳國語註二十一卷俱吳丹陽唐固春秋外傳國語註二十一卷吳韋昭孝經註一卷吳謝萬按孝經正義云今文則魏有王肅蘇林何晏劉劭吳有韋昭謝萬徐整是此謝萬吳人非晉之謝萬也孝經註一卷吳韋昭孝經傳一卷彭城嚴畯五宗圖述吳沛郡薛綜晉尚書註一卷尚書舜典註一卷俱范寗其先順陽人父汪徙居丹陽毛詩草木蟲魚疏二卷吳陸璣字元恪璣隋書藝文志作機祭典三卷范汪禮答問九卷禮雜問十卷俱范寗周禮詳解安東陳邵春秋穀梁傳解十二卷穀梁傳例一卷論語説十卷俱范甯東晉周易繫辭二卷亳桓𤣥尚書註逸篇三卷京口徐邈䘮服變除一卷句容葛洪春秋經傳註十二卷徐邈五經大義三卷中庸註一卷俱譙戴逵南北朝周易論十卷齊鍾山周顒周易乾坤義一卷周易四德例一卷周易繫辭義疏二卷俱齊沛國劉瓛周易大義二十一卷大義疑問二十卷周易講疏三十五卷周易繫辭義疏一卷俱梁武帝連山三十卷梁元帝周易幾義一卷發義一卷俱梁南平王蕭偉周易註十卷梁灊人何允尚書大義二十卷梁武帝毛詩背隱義三卷宋京口徐廣邈弟隋書藝文志作二卷毛詩釋一卷宋灊人何偃毛詩序義疏三卷毛詩篇次義一卷俱齊劉瓛毛詩發題序義一卷毛詩大義十二卷俱梁武帝毛詩十五國風義二十卷梁簡文帝毛詩序註一卷梁秣陵陶𢎞景毛詩總集十卷毛詩隱義十卷俱梁何允毛詩義疏十二卷陳吳郡顧越禮論答問十三卷禮答問二卷俱宋徐廣月令章句十二卷中庸傳二卷俱宋譙郡戴顒逵子䘮服經傳義疏一卷齊劉瓛禮記大義十卷樂社大義十卷樂論三卷鍾律緯六卷俱梁武帝樂義十一卷梁武帝集朝臣共撰長春義記一百卷梁簡文帝禮疑義五十卷梁鍾山周捨顒子禮記講疏一百卷禮記義疏五十卷俱梁皇侃吳人按戴記自馬鄭增定後傳之南者為皇侃傳之北者為熊安生唐孔穎達疏以皇為據而熊本遂亡今所傳熊本大學與石經同與皇本異而孔疏於樂記亦言今次與鄭目殊記家别起意趣是皇或變鄭次而孔遂因之也梁書作講疏五十卷無義疏名隋志作講疏四十八卷義疏九十九卷序目不在列此從唐志禮答問十卷禮雜答問抄一卷禮記義十卷俱梁潛人何佟之士䘮儀註九卷䘮服治禮儀註九卷政禮十卷俱梁何允理義儀註九卷梁潛人何㸃䘮服文句義十卷梁皇侃䘮服義三卷陳吳人張冲周官義證三卷儀禮義證五卷禮記義證十卷俱後魏彭城劉芳春秋左傳例苑十八卷梁簡文帝春秋左氏義略陳張冲孝經註辨一卷齊吳人陸澄孝經義疏十八卷梁武帝孝經義疏五卷梁簡文帝皇太子孝經講義三卷天監八年皇太子孝經講義一卷俱梁蕭統孝經集註一卷梁陶𢎞景孝經義疏三卷梁皇侃孝經義十卷陳張冲孝經義疏三卷陳顧越孔子正言二十卷梁武帝輯論語集註十卷梁陶𢎞景論語疏十卷梁皇侃論語㫖義十二卷陳張冲論語義疏十卷陳顧越隋江都集禮一百二十卷吳郡潘徽等撰禮疏一百卷禮記文外大義三卷俱吳褚暉唐易傳十三卷易圖指説一卷易説變微㫖一卷俱吳陸希聲周易大義二卷周易文句義疏二十四卷俱吳陸元朗字德明詩纂義句容許叔牙禮志十卷吳丁公著類禮二十卷吳郡陸淳三禮圖九卷崑山張鎰樂書秋浦胡楚濱春秋通例三卷吳陸希聲春秋集註二十卷春秋集傳纂例十卷春秋微㫖二卷春秋辨疑七卷俱陸淳春秋三傳指要沛劉軻春秋外傳沛劉貺五經微㫖十四卷崑山張鎰論語辨註三卷吳郡張籍南唐春秋纂例江䖍嗣宋易傳易測三十卷鄭夬字揚廷江寧人得邵堯夫易學於王天悦著此書夬傳吳祕祕傳劉牧又作明數明象明傳道明次例明範五篇宋志作鄭揚庭時用書十三卷明用書九卷易傳辭三卷易傳辭後語一卷易説長洲林虙周易義類三卷吳縣顧棠易議常熟丘礪易説三卷常熟錢俁易解三十卷常熟錢佃俁弟讀易釋解五十卷崑山孫載古易十二卷周易圖説二卷俱崑山吳仁傑學易蹊徑一卷華亭田疇周易禆傳二卷易外篇一卷俱華亭林至易繫辭纂義一卷晉陵鄒浩易解十卷武進張巨易傳内篇外篇無錫李綱包氏易義江隂包天麟周易説義十四卷周易變體十六卷俱丹徒都潔易學理窟一卷丹徒艾謙周易通義二十卷古易老義十卷古經考異釋疑一卷古今易總志三卷繫辭要㫖俱丹陽洪興祖周易義海撮要房審權編百卷江都李衡刪存十二卷易傳十卷易口義十卷易繫辭説卦三卷易解十二卷俱泰州胡瑗易傳十卷髙郵孫覺易説十卷髙郵喬執中易索大究經十三卷真州張汝明易新義二卷儀徵沈季長易説十卷如臯王俊義易解舒州王日休易論歙吳㫤周易釋傳休寧錢時周易集解六卷易解義十卷俱休寧凌唐佐周易解休寧金安節易原十卷易老通言十卷俱休寧程大昌周易本義十二卷易傳十一卷易學啟䝉三卷古易音訓二卷蓍卦考誤一卷俱朱子易㫖疏釋婺源吳覺讀易筆記八卷象數稽疑俱婺源王炎讀易手編三傳宣城陳天麟易象寳鑑石埭王鎡易傳十卷乾德指説一卷復書七卷俱當塗王逢易説泗州李犍尚書解吳郡范純仁書贊吳郡朱長文書義長洲林虙晦菴書説七卷吳縣黄士毅書傳十篇吳縣謝景平尚書洪範圖解一卷崑山吳仁傑洪範九圖説華亭陳伯達包氏書義江隂包天麟書解三十卷丹陽張綱尚書辨學十三卷江都王居正尚書全解二十八卷洪範口義解一卷俱泰州胡瑗書解十三卷書義口述一卷俱髙郵孫覺書説四十卷歙吳㫤尚書譜二十卷禹貢論五卷禹貢論圖五卷俱休寧程大昌洪範圖説休寧程若庸閏月定四時成嵗議休寧吳觀萬尚書衍義休寧錢時尚書直解婺源朱弁書經解婺源許月卿書小傳十八卷禹貢辨一卷俱婺源王炎毛詩訓解二十卷吳郡李撰詩説吳郡朱長文詩考五卷詩地理考五卷俱吳許洞詩説十篇吳縣謝景平詩法崑山孫載包氏詩傳江隂包天麟毛詩辨學二十卷江都王居正毛詩講義十卷一髙郵喬執中一儀徵沈季長毛詩辨正休寧程大昌學詩管見休寧錢時詩集傳二十卷詩序辨一卷詩序辨説俱朱子詩義釋音寧國汪澥禮記中庸解吳郡朱長文禮記解長洲林虙儀禮註吳縣黄士毅禮記集説一百六十卷圖説一卷俱崑山衛湜周禮辨疑無錫尤袤禮記解七十卷揚州馬晞孟周禮辨學五卷辨學外集一卷俱江都王居正周禮講義十卷儀徵沈季長夏小正辨一卷休寧吳觀萬儀禮經傳通解朱子輯門人黄榦續成䘮禮楊復續成祭禮鄉飲酒禮儀婺源王炎樂舞新書崑山吳仁傑樂記五卷無為楊傑春秋通志二十卷吳郡朱長文春秋總要十卷吳郡李撰春秋纂類十卷蘇州葉清臣春秋傳二十卷春秋考三十卷春秋讞二十卷俱蘇州葉夢得春秋釋幽五卷演𤣥十卷俱吳人許洞春秋新解二十卷常熟陸綰春秋集傳十五卷備論二卷俱崑山王葆包氏春秋傳義江隂包天麟春秋本㫖二十卷丹陽洪興祖春秋釋例集説三卷江都李衡春秋本義二十卷江都王居正春秋要義二十卷春秋口義五卷俱泰州胡瑗春秋經解十五卷春秋尊王春秋學纂十二卷春秋經社六卷俱髙郵孫覺春秋通解十五卷余克濟春秋解舒州王日休演春秋繁露休寧程大昌春秋大㫖休寧錢時春秋衍義婺源王炎春秋門例通解石埭王鎡左傳國語要略十卷考異三卷俱廣德沈虛中孝經解五卷蘇州王綯孝經正義三卷無錫杜鎬古文孝經序贊丹陽洪興祖孝經註通州李重發孝經刋誤一卷朱子孝經解五卷婺源王炎諸經講説十卷常熟錢俁易義四書性理講解無錫喻樗諸經講義六十卷金壇王遂周書山陽王資深三經辨學江都王居正考古圖舒州李公麟論語孝經正義别纂歙舒雅六經疑義二十卷休寧程永竒九經要義補休寧汪大發考古編休寧程大昌諸經考疑婺源王炎詩書解義寧國汪澥六經辨証疑問石埭丁黼大學章句朱子中庸傳一卷泰州胡瑗中庸義一卷髙郵喬執中中庸章句中庸輯略學庸或問俱朱子論語解二十卷蘇州王綯論語釋言十卷蘇州葉夢得論語解二十卷常熟錢觀復論語解晉陵周郛先論語解晉陵鄒浩論語詳説無錫李綱論語註江隂曹密論語説十卷丹陽洪興祖論語解義十卷江都王令論語感發十卷江都王居正論語説江都李衡論語大意二十卷海陵卞圜論語解十卷儀徵沈季長論語解婺源王炎論語解義婺源李繒論語集註十卷論語精義三十四卷論語訓䝉口義論語詳説論語或問俱朱子論語義十卷貴池湯巖起孟子講義十四卷廣養氣論三篇俱吳郡李撰孟子解晉陵鄒浩孟子解六卷宜興蔣之竒孟子解義五卷江都王令孟子疑十四卷江都王居正孟子要略十四卷孟子或問十四卷俱朱子四書講義蘇州張慶之四書説約華亭田疇四書傳鎮江湯炳龍四書講説歙劉伯諶伯