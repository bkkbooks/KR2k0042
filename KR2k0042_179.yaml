body:
  text: 江南通志卷一百八十人物志列女義烈四太廬鳳三府太平府三國吳李衡妻習氏衡守丹陽諸葛恪徙琅邪王休於郡衡過繩之習諫不聴孫琳迎休立之衡懼謀奔魏習勸其詣獄自陳休勅還郡進威武将軍加棨㦸唐李白二孫女一歸陳雲一歸劉勸皆農夫觀察范傳正改瘞白於青山之陽欲令二女改適士族二女不從范竒之復其家宋焦洧妻洪氏黄魯直甥宣和間遇盜於江欲逼之氏不汚自溺侍婢宜恩均奴亦死之元葛通甫妻月娥西域人軍職馬禄丁女沔冦至城失守娥恐見辱抱所生女赴水死侍婢相率爭溺者九人大暑七日得其屍面皆如生邑人合葬黄池里為十女墓立祠以祀明花雲妻郜氏侍兒孫氏俱繁昌人陳友諒犯太平花雲死之郜以三嵗兒煒付孫遂自溺孫瘞郜畢抱煒逃為友諒所執得脱復逃渡江為敗軍捽入水附斷木至蘆渚摘蓮實啗兒得不死煒年十二授虎賁衛千户奉郜骸骨歸束草為雲軀合葬於上元縣陳諫妻李氏廣東人隨諫之太平任兩月夫死氏曰吾少嫠豈可與叔萬里同歸遂不食而死陶安繼妻陳氏當塗人夫病歿子昱孫卯兒坐法徙軍陳以前子從戎叩閽泣奏帝泫然憫念時卯兒已死立即赦出昱歸養封氏姑孰郡夫人張氏女名仙貞繁昌人張玘女正徳中流賊剽掠仙貞年方十七䕶母病不忍走被執至江口抱樹泣罵不受汚賊遂殺之繆釡妻張氏蕪湖人釡以母喪哀毁成疾将死語氏曰汝芳年宜善自託氏哀泣自縊死越二日釡亦死遂合葬楊文俊妻李氏當塗人名妙清年十七適楊未期夫病篤遂告氏曰早嫁勿自困氏哀痛先自經死王徳成妻蕭氏蕪湖人夫死守節有謀娶者舅姑潛受聘禮氏佯許届嫁期自縊死庠生方名蛟妻洪氏繁昌人蛟死氏觸棺哀慟七日不食自經而死凌守丞女繁昌人許鄭未嫁而夫殤凌七日不食死柯昌茂妻蕭氏繁昌人崇禎辛巳流賊至蕭被執不受汚亂刀剖腹而死謝智妻柯氏繁昌人聞流賊至投水死周氏女繁昌人許字庠生李模未嫁崇禎癸未左兵至挾女不從臨之以刃女堅拒被殺剖屍為四從氏女繁昌人許字姚之基未嫁聞左兵将至自溺死宣壁妻王氏繁昌人左兵至氏攜幼女逃兵殺其女而脅氏氏趨赴水兵追殺之裂其屍章其闇妻陳氏繁昌人左兵入闇攜氏逃匿亂兵漸逼氏恐被辱遂自經死胡之寜妻戴氏當塗人黄兵屠城之寜被殺驅氏行氏紿之曰家内有金鐲可取去見婢亦被縛更紿之曰願偕婢從汝婢得釋經市河牽婢躍水死貢生吳昌祚妻謝氏當塗人黄兵屠城得謝於苧田掖之行謝以兩手抱樹大罵兵斷其指氏以指擲兵面兵磔之夫倖免得襲氏指歸殮終身不再娶孫士毅妻陶氏當塗人夫死守節黄兵掠城執之氏堅拒不從兵忿怒剜其胸鈎其臟腑寸磔之其母奔䕶亦被殺庠生陳𠂻韞妻張氏當塗人有孝名亂兵掠及氏沒深淵兵出之氏奪刀斫兵不中遂自剄兵怒臠其屍張元喆妻倪氏當塗人黄兵屠城夫死無子氏遂自溺其婢方十二嵗亦從之死周金章妻程氏當塗人明季殘兵掠於鄉程遇之赴水死其子周正體亦從之溺某氏當塗人黄兵屠城有婦數人匿城樓撤其梯氏至欲上衆恐黄兵至卻之兵隨至執之訊及樓上氏曰無人兵以刃置氏頸懾之無異辭遂被殺衆婦獲免羣拜而瘞之惜其姓氏無可考閻哈兒妻某氏蕪湖人閻菜傭日不謀一食姑屢勸改嫁氏不肯從姑隂諾富家子聘氏與哈兒相抱大慟自經死鄒氏蕪湖人失夫姓字黄兵掠鄉夫以大盆積草卧婦於其中置之塘側兵鈎得之欲挾婦去以刃示婦引頸曰死便死耳又何懼兵怒碎其屍葛氏女蕪湖人施必韶聘妻遇賊至自溺死王明徳妻徐州人王為郡司鐸氏失姓黄兵屠城明徳偕其妻躍入泮水而死國朝甘氏女蕪湖人許字丁國瑞夫死女年十六父母憐其少年且貧諷以改適女不從侍父母以女紅資養衣食常不能給父母病數月不解帶籲天祈禱多方療治不效及父母歿女預将週身衣裳縫固自經而死雍正八年旌表湯徳符妻芮氏當塗人國初土冦竊發官兵𠞰之冦衆皆逃竄氏攜三嵗女與夫相失恐遭俘辱抱女躍溝溺死汪立樞妻許氏休寜人許大潮女汪寓蕪湖往楚數載而不歸氏以女紅事姑汪死於楚氏誓死守節夫兄逼氏令改適氏潛飲鹽滷二升又自投於井鄰婦救出滷氣大發膚銷肉縮口中喃喃尚聞今好了今好了數字而死黄良騄妻俞氏本歙縣人生長蕪湖年二十七夫卒欲以身殉遺子八月父諭以撫孤氏乃緘紉作勞令子就傅子至八嵗痘殤氏絶粒而死何煥妻郝氏繁昌人煥廢業廹於凍餒夜啓户自溺氏驚起攜子與女三人赴救偕溺死于斯光妻汪氏繁昌人適光未期夫歿欲殉因有妊茍延既産女弗舉氏哀慟七日而死豫章烈婦不知姓名順治戊子大兵再定江西師旋婦被掠藏舟中欲狎之婦不從至翠螺山馬王廟前殺之截尸為四林珏妻孫氏當塗人珏死氏欲身殉痛瞽姑無養繼嗣無人因忍死罄衣飾以養姑及姑歿送死盡禮哀毁而歿俞廷耀妻陶氏蕪湖人夫歿氏年二十五哀慟絶粒七日而死鍾蔡兩義婢俱當塗人一陶荷衣奉侍鍾太常媳丁氏一王氏女奉侍蔡指揮女弟蔡氏丁蔡皆孀居守志二婢及笄命嫁不從願侍奉終身各長齋數十年以室女終陳吉士妻章氏繁昌人有强汚者不辱而死廬州府唐朱延夀妻王氏舒城人延夀姊為楊行密夫人行密狎延夀延夀怒隂與田頵通謀事泄見殺妻集家人聚寳貨焚府舍曰誓不以皎然之軀為讐人所辱遂赴火死元忠宣公余闕妻蒋氏従闕守安慶城陷率其妾與子女墮井死明黔國公吳復妾楊氏合肥人復守黔陽卒氏自經詔贈貞烈淑人漳國公鄭亨妾張氏合肥人亨卒氏自經以殉詔贈貞節淑人徐錫印妻朱氏成國公純臣女錫印嗣永康侯爵卒朱樓居十餘年足不履地及流賊陷京師捧廟主自焚死仰賴妻李氏無為人賴亡自經吳一朝妻趙氏合肥人夫亡自經侯一香妻潘氏無為人早寡里有富人洪某慕其姿餌潘至家欲汚之潘拔刀自刺死事聞旌其門洪論如律張氏二女合肥人正徳壬申流賊入境欲驅二女行女相攜赴水死得屍手猶不解儲如英妻王氏合肥人有殊色崇禎壬午為賊所逼氏罵不絶口引懐中刺刀自刺死髙士貞妻王氏合肥人壬午聞賊入城将投井侍婢梅兒牽其衣勸少緩見賊来死未晚也答曰見賊恐不得死所矣遂先投井長女繼之梅兒亦溺死胡拱極妻黄氏合肥人流賊突至氏被執罵賊身被七刃而死祝亮工妻桂氏舒城人壬午春遇賊被執抱一枯樹不動曰此我死所賊斷其頸猶堅抱枯樹不釋亮工至其手方解監生祝長祉妻李氏舒城人城破匿水中賊下水掖之氏罵賊滚入深流賊怒刀石交擊渠水為紅胡中恒女舒城人許字張阿閣城陷罵賊支解之任科妻王氏舒城人姿殊麗衆賊擁之大罵不辱死生員汪士徳妻洪氏舒城人姑年八十餘扶掖出郭賊前欲犯之氏堅抱其姑被殺女始笄伏尸慟哭起反刃擊賊死之生員曾脉昌妻濮氏舒城人賊刼之不從與兩媳李氏黄氏俱被殺曾克昌妻謝氏舒城人賊令炊飯不從沃以沸湯亦不為動乘間自刎死貢士趙振先妾某氏舒城人城破被執賊露刃恐之不從斷其頸挺立如故曾之唯女舒城人城破賊執其臂女引刀斷臂而死郭維慶妻許氏舒城人賊獲之先殺慶令婦騎馬氏大罵投水死生員張國屏女舒城人許字同邑李楷崇禎壬午流冦至舒破城女被冦所獲女曰乞賜一刀以全我節賊怒殺之侯之楷妻胡氏舒城人城破賊支解其夫伏夫屍罵賊賊怒並殺之蕭貞白妻張氏無為人崇禎十五年流冦至夫妻俱被執氏紿賊使釋其夫遂詈賊賊斷其舌投屍烈焰僕蕭見氏死厲聲罵賊賊支解之董國治妻馬氏無為人寇至被掠欲汚之氏以頭觸賊刃血淋漓仆地賊怒剖其屍周培忠妻張氏無為人崇正壬午流賊入城氏與培忠俱被掠氏且哭且罵賊怒斫其足更火其廬夫婦同時焚死佘承徳妻楊氏無為人流賊突至殺其夫氏奮罵投水死佘玉女無為人流冦殺其兄将犯玊女女奮罵不從被寇寸磔死徐畢璋妻朱氏無為人流冦破城朱方孕與璋妹奔井邉氏曰井口狹煩姑推而納之朱既下璋妹哭曰父母安在吾伴嫂死矣亦躍入井陸官治妻沈氏無為人城破氏年十八與小姑名蟾女年十四以巾帕相繫投井死生員王之翰妻陸氏妾張氏俱合肥人流冦至欲汚之不辱而死唐經國妻董氏合肥人學使趙函乙母髙氏妻解氏俱合肥人生員王時彦母湛氏媳張氏俱合肥人成允母陳氏其妯張氏俱合肥人蕭嗣傑妻葛氏合肥人胡一龍妻闕氏合肥人王希松妾臧氏合肥人汪英母周氏合肥人夏聘功妻韓氏合肥人胡璞母余氏合肥人張姓婢鄭氏合肥人劉芝妻張氏廬江人貢生王孫謀妻張氏孫媳姚氏俱廬江人貢生姚履和妻丁氏妾談氏俱廬江人毛可達妻姚氏廬江人曹二妻周氏廬江人黄爾新妻吳氏舒城人江教妻胡氏舒城人黄氏婦女五人舒城人朱名逺妻方氏舒城人生員任翼世母孔氏妻祝氏俱舒城人生員楊善妻程氏舒城人黄某妻胡氏舒城人汪世徳妻楊氏舒城人任天經妻許氏舒城人姚永佑女舒城人江躍鯉妻孔氏舒城人生員曾之才妻張氏舒城人張天鼎妻單氏舒城人張竒之妻朱氏舒城人姚永著妻王氏舒城人曾之唯妻黄氏舒城人生員金生一妻胡氏舒城人胡太和女舒城人趙崇仕女無為人張景妻朱氏無為人畢力尚妻張氏無為人宇道達妻耿氏無為人石汝瓊妻蔡氏無為人生員劉光生妻朱氏無為人李從仕妻嚴氏巢縣人嚴成寛妻鍾氏巢縣人髙某妻俞氏鄭氏巢縣人生員黄秉元妻某氏巢縣人生員潘景黎妻陳氏巢縣人潘一鳯女巢縣人潘玫妻朱氏巢縣人何大知妻徐氏女何氏媳智氏時氏喬氏俱巢縣人楊茂儒妻馬氏女楊氏巢縣人生員李應甲妻劉氏巢縣人趙昌言妻王氏妹趙氏巢縣人負販妻巢縣人佚其姓氏生員徐竒妻姜氏巢縣人葛遇明妻尹氏巢縣人胡學禮妻徐氏巢縣人趙宏勲母熊氏女佛兒巢縣人嚴成志妻陳氏女五一兒巢縣人陶之令妻沈氏巢縣人陶璨妻管氏巢縣人葉士彦妾陳氏胥氏俱巢縣人徐竒女巢縣人以上遇流冦至不辱而死褚汝英妻王氏合肥人賊汚不從投水死遺名婦合肥人壬午流冦入避難至縣橋遇賊投水賊下馬掖之婦披髪大罵身中數矢而死汪賜兒無為人年十五隣有狡童竊窺之賜兒不勝忿恨自縊而死張必美妻蕭氏無為人歸美半載美亡蕭年十七與姑王氏同孀居軍人徐爾興脅之其姑懼禍勸諭蕭従之蕭曰我死則禍已何懼為遂縊死蘇䕃妻阮氏無為人鎮将黄得功守州有小卒窺氏逼之紿以就浴閉户自縊而死李烈女無為人陳氏家人女許字馬氏子馬貧未能娶有武弁朱某與陳密見女姿態絶人謀於陳出白金百兩令倍償馬原聘而已聘為繼室陳許諾女聞之謂母曰主命不可違惟邀馬郎至家一面以了宿縁可也嫗如言設酒食延馬至女隨母出再拜而入檢聘物擲於庭大聲曰業已生離需此何為馬涕泣而去女謂母曰馬郎無復再㑹幸逺送之母送近馬舍而返女已自經死任育民妻解氏舒城人育民早亡解年二十許翁老而貧将遣嫁解自縊死周氏女名留姑廬江人許字包某未婚夫卒女奔喪成服絶粒八日死丁氏女廬江人許字王子詔詔歿父潛許隣子段某女遂投井死陶憲臯妻汪氏舒城人居梅心鎮隣有惡少窺氏姿夜梯牆入氏抵死拒之大呼動隣里惡窘乃奔次日氏以首觸壁掩面泣曰女子無閫外聲我即不受汚何顔復活越三日扃户自經惡伏法邢瑞妻林氏無為人年十九夫沒殮畢慟哭不食旬日嘔血死郭士行妻陳氏舒城人夫亡遺二子未幾二子疫死氏曰我不即死者為有二孤也今二子俱死我何生為遂不食死生員謝昌言妻詹氏合肥人昌言病篤呼詹曰若艱苦已極須早為衣食計勿再遇如昌者詹痛哭請先殉遂自縊未幾昌言亦死髙士俊妻孫氏合肥人年十七夫出門貿易溺死氏聞自縊郡守吳大旌其門孫氏合肥人佚夫姓名黄仁後妻胡氏舒城人沙棟妻張氏舒城人謝容妻錢氏無為人王羅春妻李氏巢縣人胡氏女巢縣人皆殉夫死國朝張􅕩妻杜氏合肥人夫歿自經旌表沈夢雲妻楊氏舒城人夫死里少有謀委禽者氏聞之自縊旌表周維先妻趙氏舒城人維先以薙髪為業病卒氏有娠忍死以俟父母遽議改適氏曰事急矣吾不能待也取薙髪刀自刎死事聞旌表朱子才妻胡氏廬江人夫死守節有强暴謀汚之自縊而死于康熙年旌表黎志美妻劉氏廬江人早寡夫兄兩次逼嫁氏剪髪破面鳴官保節于雍正四年旌表邑庠生蔡機妻金氏合肥人工書畫夫亡盡檢付火絶粒旬餘家人乘昏憒飲以參湯復甦如是者再後終餓死于雍正八年旌表卞氏女無為人許字童文成夫歿女年十七欲死父固止之諭以在家守貞逾年父念女意或可轉有媒妁在門女揣知即自經死謝桂女無為人許字王道道歿女年十四隨母往奠願留事尊嫜母强之歸不可久之父母念其幼欲改適紿以母病趣囘而媒妁在堂母令女膾魚欵之女謂母曰此生魚可念奈何必致之死笑容自若母畧不疑也乃從容縊死帷中以上雍正九年旌表何大封妻阮氏無為人夫死守貞有授以肉誤犯其手者引刀截指血濺尺許一室盡駭蓬首鶉結時聞哭聲如是者六十年髙明令張國城妾王氏舒城人張亡遂不食而死劉有紳妻謝氏無為人夫亡自縊朱二女無為人許配陳子仲子仲殤陳為子叔更納采焉親迎前一日女靚妝投屋後溪死某妻董氏無為人嫁未一期夫病羸氏抱持供湯藥者數年某兄素無行料弟必不起敦逼改嫁堅執不從夜投水死郭氏女巢縣人許字黄萬正貿易不返人傳已死父母改字袁姓婚期至女閉户自經剛啓元妻陸氏巢縣人殉夫死趙士玊妻莢氏巢縣人夫故服三年喪葬畢服闋遂絶食而死史子明妻孔氏巢縣人夫貿易溺死聞訃投繯任紹周妻郭氏巢縣人夫歿不食死黄瓚妻吳氏無為人夫死年少族人逼改適不從强以胡姓入贅氏佯諾之及期潛啓後扉沉池中死祖懿修妻唐氏巢縣人夫歿欲殉有遺腹不果及生女椎胸而卒徐君仲妻劉氏舒城人早寡里豪賄族掠娶氏自縊死朱吉士妻張氏舒城人夫亡姑逼其改適自刎死奚某妻晉氏舒城人夫歿族人逼嫁自縊死宋又郊妻鮑氏舒城人郊赴省試卒旅舍氏聞訃自經翁姑諭之曰有遺孤在撫者何人必欲殉夫待子長成可也氏勉應之後十三年子長終絶粒死方肇祥妻任氏舒城人宋又禮妻王氏舒城人李廣圻妻奚氏舒城人汪守信妻王氏舒城人徐乾妻吳氏合肥人龔紹渤妻吳氏合肥人張拱明妻李氏合肥人方永芝妻宋氏合肥人汪曾三妻聞氏合肥人嘗割股療姑蕭元秉妻賈氏合肥人夫亡身殉髙繼國妻陸氏合肥人夫歿以兄死歸寜父乘機逼嫁不從謀計刼之氏紿以别姑拜夫墓及歸待姑寝遂縊床側黄承業妻張氏名玊徳合肥人承業本太倉人贅於肥婚後歸省病亡氏聞投繯以殉王景燦妻董氏合肥人景燦病甚刲股療之肉盡臂脱死趙徴妻江氏合肥人早寡撫孤婚娶畢拜夫墓一慟而卒蘇氏女合肥人許配劉姓夫歿自縊蔡氏女合肥人許配劉智智歿不食死張氏女合肥人許字黄氏子黄殀女素服悲號夜靜自縊武舉胡希儼妻王氏舒城人夫亡絶粒六日家人百方解勸强起視息哀毁數月而死鳯陽府漢周郁妻趙氏蘄人趙孝之女少習儀訓閑於婦道郁多行不道郁父偉謂新婦賢者當以道匡其夫不改新婦之過也婦拜受命退謂左右曰我無樊衛二姬之行故翁以責我我言而不用翁謂我不奉教罪在我若見用是子違父而従婦罪在彼不如死也遂自縊宋鍾離婦紹興間金人陷濠城氏被卒執去詈罵不屈卒斷其臂而死王宣妻曹氏定逺人建炎中盜馬進焚掠臨淮曹卧病不起賊刼持之大罵不屈死閔居正妻蒲氏定逺人蒲卓女幼寡言笑通孝經自註列女傳十七適閔㑹閔當從軍與蒲泣别蒲慷慨義形于色謂丈夫當立功閫外婦亦分榮晝錦耳後數年閔凶聞至婦年二十有六决意自裁姑及母防之急踰三日自縊元婁氏于某妻名夀春定逺人年二十餘至正十二年正月為亂兵所驅義不受辱赴濠水死史五妻徐氏定逺人元末兵亂五為義兵巷戰死兵懸其首于西門兵退氏求夫積屍中以所繫繡囊辨之方得載歸治大棺以殮氏沐浴縊死與夫同棺而葬樊婦張氏夫死于兵子宗吉方十嵗婦為兵所驅匿水中驅者謂宗吉曰呼爾母来我活汝宗吉以告其母母曰吾非不汝顧但不能失節以求生耳遂罵賊不絶死於水中明朱氏女靈璧人名善真永樂間其父以校尉客居京師善真及笄許聘丁文聰丁死父議他聘女曰吾身雖未事丁而業已議婚可更二姓耶遂縊死事聞詔旌貞烈王之屏妻劉氏鳯陽人夫故誓以身殉里鄰以姑老勸遂感泣堅志養姑及姑死適遘盜焚劫氏奔夫墓樹自縊旬日如生何淵女宿州人許嫁王璣未歸而璣卒父母欲令他適女慟哭不從一日偕姑至墓慟哭幾絶母姑扶回尋嘔血卒王邦妻馬氏年十六歸邦邦溺死氏欲往赴水同死家人阻之遂自縊厲讚妻薛氏夀州人年十九讚疾篤薛云汝瞑目去我即来矣讚死越六日遂自縊屠照妻楊氏夀州人照亡氏撫孤守節孤以病亡遂自縊張秀女虹縣人年十五聰慧貞靜流宼陷城賊入女家避囷中自經死王綬妻徐氏靈璧人正徳間流冦至靈璧氏被執不辱見殺董鑾妻茅氏靈璧人流冦入掠氏抱一子攜一女投水死以上正徳間旌表吳方妻王氏暨四女奴女妙夀珍女妙奴俱定逺人正