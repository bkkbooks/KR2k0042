間旌丁道明妻馬氏宿州人道明早世馬誓死殉母防之三日得間縊柩前王鳯鳴妻張氏宿州人事姑孝鳯鳴歿六日不食死時年二十諸生徐拱杓妻葛氏宿州人歸徐後生女及笄小字曰文崇禎辛巳秋賊入其室女大罵自刎其母乘間墜樓而死母子雙節徐映乾妻程氏宿州人映乾以哭母過慟病歿氏越三日登樓自縊徐琳妻王氏宿州人年十七琳亡氏自經以殉常曰璜妻張氏宿州人夫故即日自縊徐長堅妻宋氏宿州人長堅病死氏年二十即引繩屋梁母牽裾止之氏曰吾志決矣勿令頸血汚人衣遂縊死黄萬里妻劉氏宿州人萬里遇賊被害氏罵賊不屈死之蔣如詡妻丁氏宿州人懐宗時里中大亂丁避之母家賊驟至知不免因紿之曰吾父瘞金指授汝賊從之行過井邊投井死徐國憲妻王氏宿州人初王有姑適國憲伯氏琳於崇禎時殉節國憲病亟王執國憲手曰勿吾慮當學吾姑及國憲沒含殮畢自縊魏夢鶴妻時氏鳯陽人夫為冦殺氏隕井以殉胡志賢妻滕氏鳯陽人賊至一家被執欲殺志賢氏以身蔽之求死賊憫其義釋其夫並一家人趙國俊女鳯陽人懐宗時流賊屠鳯母攜女出避遇賊欲掠去母不忍舍女佯為樂從狀俟母得脱大罵躍入水死黄嘉賔母梁氏鳯陽人懐宗時獻賊至氏同媳梁氏與其女三人攜手結帶曰與其溺於人寜溺於淵共投深池死王新籓妻張氏鳯陽人張孀居懐宗時寇犯鳯值姑老病篤舉家咸遁張攜女婢守姑死含殮畢適賊至欲犯之張以金紿之乃與女潛取賊刀先斃女後自刎未絶指婢斷其喉婢従之賊驚嘆而去魏民治妻陳氏繼室沈氏俱鳯陽人流賊犯鳯欲殺魏陳以身蔽願請代賊殺氏魏得脱既娶沈民治死家貧無子沈苦節終身方之竒妻胡氏鳯陽人懐宗末寇亂舉家逃竄氏被掠哭罵不屈死李鐵匠妻顧氏定逺人年二十四懐宗時流冦至顧急赴濠水賊尾其後脅以刃復援之顧堅沉水中被殺死張煜妻杜氏定逺人年二十二煜疾卒杜自縊姑覺急救如是者三遂絶飲食七晝夜卒自縊申有綱妻劉氏定逺人聰慧通文墨年十五適山西民申有綱夫亡自縊徐旭妻韋氏定逺人懐宗時流寇逼之投井死周時宜妻吳氏定逺人遇冦投水死與韋氏同奉詔旌陶志善妻王氏夀州人年二十夫死撫棺號啼七晝夜自縊吳崇讓妻梁氏夀州人懐宗時扶姑劉氏避流賊及為所獲氏不従賊刃其姑脇之氏抱姑痛哭致剖腹墮胎而死髙雲路女夀州人年十五遭劉兵亂投河死王文燦妻髙氏夀州人年二十一夫故閉户自縊楊夀域妻袁氏夀州人楊夀朋妻韓氏遭亂袁氏罵賊受戮賊欽其節因釋夀域其弟妻韓氏溺死池塘張應明女夀州人夫不才逼共鬻為奴氏恐辱家聲遂自縊陳時妻朱氏夀州人年二十夫故哀毁餓死許諫妻劉氏夀州人遭亂兵不受汚斷舌剖腹而死劉壯生妻范氏夀州人幼通孝經内則夫亡毁容苦節遭兵亂姑墜江范従之死葛某妻張氏夀州人夫歿撫女守節流宼至被擄閉于寺見有烈火挈女躍入俱焚死生員楊宇宁妻潘氏夀州人遇寇擄潘上馬氏從馬上躍投溪中水淺吞沙死莊氏靈璧人夫死撫女守節遇流冦亂攜女入井中賊以石擊之尸并碎劉惺如妻李氏靈璧人流宼犯靈璧李時懐孕持刀剖腹以死周竇蘭妻陶氏靈璧人夫亡氏誓以死殉踰三月遺腹生子子又殤遂自經死馬雲衢妻田氏靈璧人夫死自縊生員趙佳兆妻梁氏靈璧人遇寇知不得脱遂自刎李希儒妻張氏靈璧人名妙蓮遇寇攜女投河死庠生髙選妻時氏虹縣人明季流冦亂夫為寇追赴河死氏絶粒七日遂自縊曹廷琇妻甘氏懐逺人年十八廷琇病故氏伴姑紡績毁容苦守以包袱作枕服闋時同姑拜墓歸夜啟包袱出衣履遂自縊中堂邑令旌之曰正操可風庠生李本妻段氏懐逺人明末劉良佐兵叛段扶祖姑避於鄉遇賊急奔入井賊持之撾石擊賊面賊怒裂其首而死崇禎時旌陳佺妻殷氏懐逺人年十九佺死氏即縊姑救之苦守三年服闋自縊榮樂湖妻郭氏懐逺人懐宗末劉良佐兵叛過懐逺女被執衣帶環結如織賊執刃强逼女佯請賊佩刃解帶及接刃自刎死舊志不知其為郭只名結帶女子今考新修懐逺縣志識之孔從周女懐逺人許字彭永年子懐宗末彭氏星散無由通音問有名家子執幣求婚女不従自縊死張雲鵬妻王氏懐逺人為流賊所獲氏厲聲罵賊賊怒斷指割舌碎尸而死生員顧賀泰妻席氏臨淮人耿氏女臨淮人方聘未歸夫亡自縊趙文學二女臨淮人流冦犯境女舉家被害先潛地窖中得脱聞冦去出逃村中冦復集二女恐汚攜手投井而死國朝張國憲二女憲弟國俊婦龔氏俱宿州人憲長女年十八次女年十六龔氏年二十三懐宗時礦賊數萬破塞大肆焚掠二女自料不免並投繯龔續縊一門三烈俱順治間旌表生員張煒妻劉氏宿州人響賊數十騎突入煒家劉被執指竈底誑之曰是窖金所賊擁往掘之劉乘隙急持厨刀自刎而死夏日升女宿州人許字貞吉尋卒女聞訃焚衣佩不食嘔血死生員張士純妻魏氏宿州人夫卒氏屢欲投繯姑防之踰日乘間自縊張文獻妻田氏宿州人夫病篤氣絶氏遂自刎踰時文獻復甦而氏已死文獻遂薙髪為僧生員秦純臣妻蒋氏宿州人年二十純臣卒自經柩側梁氏女宿州人夫死無子依父守節有楊乙者誘至其家勢逼為妻梁不従自縊死夏朂女夀州人許字方自申未嫁而自申歿其妹許字劉璇劉亦死妹與姊相約以死殉姊曰我當死但父母年老汝勿效以傷親心我為其易汝為其難遂衣喪服投繯死妹遵姊命守貞六十餘載王連錫妻葉氏定逺人强暴逼辱氏詈罵不從遂自經死俱康熙間旌表許守學妻于氏虹縣人守學他往有王二者潛入氏室逼汚氏不従憤恨自溺死雍正三年旌表魏天臣妻谷氏虹縣人為强暴許含所逼氏不受汚辱自縊死雍正五年旌表周鋐女宿州人許字張潔張死女即欲往殉母勸止之逾年母潛許丁姓女知之自書張潔妻周氏於衣前縊死雍正六年旌表李文進妻柏氏虹縣人為匪人柏魁逼辱氏不従自縊而死雍正七年旌表趙佐妻戴氏宿州人夫歿氏年二十三無子氏哀號竟夜拊棺自經死馬三㨗女臨淮人許字鄭極未婚而鄭歿氏守貞三載服闋自經俱雍正九年旌表生員黑崑妻楊氏臨淮人子甫三嵗崑病歿氏飲毒而死陳遇妻張氏臨淮人年二十夫亡誓死號泣幾月嘔血而死周維先妻趙氏臨淮人夫亡引刀斷喉而死李信章妻潘氏臨淮人夫沒誓不欲生及葬夫時遂自縊於墳所杜維楫妻陳氏宿州人維楫病歿陳視棺殮未畢投繯死丁更新女宿州人許字徐之修子夫病歿女年十七聞訃哀泣不食飲毒死張其璿妻董氏宿州人璿病篤氏衣不解帶者累月及璿卒自縊死范錫爵妻沈氏宿州人夫歿年二十三含殮畢自經死張烈女宿州人夫樵于野遇狼被噬氏哀泣至其處以鐮絶脰死丁氏丁昌泰女宿州人為瞿氏子婦夫亡自縊死劉冲漢妻何氏宿州人冲漢歿氏躬親含殮悲號欲絶踰日自縊柩前李如徳妻孫氏宿州人夫卒視棺殮畢出簪珥衣襦給家人投繯死喬印妻陳氏宿州人印卒號泣三日投繯死生員張奏妻楊氏宿州人夫歿楊年二十七無子女視棺殮畢哀慟自縊死梁荆萃妻化氏宿州人年二十一夫歿投繯家人救之乘間服砒礵死黄得中妻盛氏宿州人年十八夫死自縊于夫柩旁陳秀妻尹氏宿州人秀歿氏日夜號泣自縊死王梅妻陳氏宿州人夫歿哀慟欲絶謂叔曰吾姑少寡今衰老善侍之吾其殉乎遂投繯死卞魯妻楊氏夀州人夫死自經以殉時年二十生員黄以位妻吳氏夀州人夫死年二十二守節奉姑遭冦至為所執偕姑躍入火中焚死伊嫂姜氏亦同時投河死生員侯謹度妻張氏夀州人夫歿絶食以殉孫㑹隆妻羅氏懐逺人㑹弟培隆妻張氏響賊突至二氏奔避小舟賊追獲張罵曰汝作賊犯國法敢侵節婦耶賊怒殺之砍三刀不仆羅急持櫂桿以擊賊賊復殺之時羅年二十張十九江藻女懐逺人許聘符世緯世緯歿女過符守節三年服闋投繯死余尚徳女懐逺人許字王國隆國隆逺逰不返尚徳攜妻女尋至龍亢不值遂寓焉母死女同父灌園紡績為業毎晨起以巾覆頰左右鄰女鮮覩其面康熙二十八年父又歿女盡捐衣物殯殮閲二日自縊死生員葛先質妻尚氏懐逺人先質因母歿哀毁成疾氏曲為調䕶年餘先質歿氏痛哭縊死屍側支斐妻湯氏懐逺人夫歿氏年二十一痛絶投繯家人救甦慰之曰孤在抱汝死孤何屬未幾孤病殤氏解腰絰縊夫墓側陳文忠妻何氏懐逺人文忠與弟文徳同居有文徳妻弟蕭克讓時往来窺氏室宻邇乘文忠他出夜潛入氏聞聲大呼蕭遁氏夜集舅姑泣訴曰余暑月遭强暴夜逼閨榻何面目活人世誓必死文忠歸氏泣告盡以衣飾授之乘夜投繯死張國善妻潘氏懐逺人年二十三夫亡投繯殉生員胡一琠妻楊氏懐逺人年十五適一琠甫一載一琠歿哀毁投繯家人救甦繼姑病篤謂氏曰我旦夕必死有子七嵗爾翁後嗣賴此一綫爾幸勿死為我撫之氏勉従姑命撫夫弟至十五嵗值夫忌辰祭奠後語父母伯叔曰我所以八年不死者為翁姑撫孤故耳今已成立遂初志即投繯死沈望樓女定逺人適劉某赤貧氏知文墨以女工給饘粥㑹劉出有强暴者欲犯之沈厲辭以拒自揣夫懦恐貽横辱遂自縊柿樹下時超仲妻顧氏虹縣人夫歿自經柩側庠生沈起湄妻陸氏定逺人起湄疾篤陸夜泣告天願以身代及歿越三日自縊柩側時年十八魏尚秀妻胡氏定逺人夫死欲殉母與妯娌密防之家人逼其改嫁慟哭不食自縊死鈕旭妻陳氏定逺人旭歿氏潛身投繯姑姊救免又奮身入火中眉鬢焦枯不死越三日乘隙自縊閆進妻張氏定逺人夫歿孤殤父母欲令改嫁自經死周之璋妻王氏定逺人之璋死氏泣語其姒曰予失所天豈能茍生姑之生養死葬惟姒始終其事同姑就寝潛往拜辭自縊死王璟徹妻朱氏王琯徹妻楊氏俱定逺人璟病歿朱投繯死楊許字琯未婚琯病劇接至夫家侍湯藥二日琯卒遂自經柩傍趙民化妻周氏定逺人夫歿自經以殉張應祥妻譚氐夀州人夫溺死氏年十八投繯以殉孫天佑妻夏氏夀州人夫歿自經徐容肅妻周氏夀州人夫歿自縊死張相女夀州人許字周錫林周亡聞訃自縊為之合葬方丑妻鮑氏夀州人夫死自經劉某妻毛氏夀州人夫死自縊吏員王玉璘妻朱氏夀州人夫病禱天願以身代及歿投繯以殉韓萃妻余氏夀州人家赤貧賃屋半間以居有鄰何上者乘萃他往夜破門逼辱氏大呼何遁氏悲憤自經死生員徐致浩妻李氏夀州人夫歿欲殉俟子長而自經侯中簡女夀州人許字陳某陳歿訃至自經蒋承運妻卜氏夀州人夫病割股夫歿自經以殉孫某妻夏氏夀州人夫歿絶粒三日死陶于義妻張氏夀州人夫歿氏以死殉繆氏女夀州人許字謝岐山謝歿女聞訃投繯死江南通志卷一百八十欽定四庫全書
