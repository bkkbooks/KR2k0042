  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2k0042_WYG_007-1a, image: WYG0507/WYG0507-0189c.png}
body:
  text: 江南通志卷八輿地志沿革表四鳯穎二府滁和廣六泗五州鳯陽府禹貢徐揚二州之域古塗山氏國春秋時鍾離子國後為呉楚之邊邑秦屬九江郡漢初為淮南國武帝時復屬九江郡後漢為鍾離侯國晉屬淮南郡東晉安帝時置鍾離郡屬南徐州宋明帝時僑置徐州於此泰始末改屬南兖州元徽初復置徐州南齊為北徐州梁因之東魏改置楚州北齊為西楚州隋改曰豪州大業初復為鍾離郡唐改曰濠州天寶初又為鍾離郡乾元初又曰濠州五代南唐保大初置定逺軍宋仍曰濠州鍾離郡屬淮南西路元至元十三年置淮南安撫司升為濠州路十五年改臨濠府二十八年復為濠州屬安豐路明呉元年復為臨濠府洪武三年改中立府定為中都七年改鳯陽府直隸南京領州五縣十三國朝因之隸江南布政使司康熈六年隸江南安徽布政使司雍正二年升府屬之潁州亳州泗州為直隸以潁上霍邱二縣屬潁州太和䝉城二縣屬亳州盱眙天長五河三縣屬泗州後潁州旋升府并以亳州及州屬二縣俱為潁州府屬十一年分夀州置鳯臺縣領州二縣七潁州府禹貢豫州之域春秋時胡子國戰國屬楚秦屬潁川郡漢屬汝南郡三國魏置汝陰郡後廢晉泰始二年復置宋齊因之梁置汝陰弋陽二郡北魏亦曰汝陰郡孝昌四年置潁州北齊改置潁川郡隋開皇初郡廢存州大業初復為汝陰郡唐武徳四年置信州六年改潁州天寶初又改汝陰郡乾元初復為潁州五代宋因之屬京西路元豐二年升順昌軍節度政和六年改為順昌府金復為潁州屬汝寧府以州治之汝陰縣省入元仍屬汝寧府明改屬鳯陽府領縣二潁上太和國朝因之雍正二年升直隸州改太和縣屬直隸亳州以夀州之霍邱縣來屬十三年升為府省州置新縣一為府治又以亳州及所領太和䝉城二縣來屬隸江南安徽布政使司領州一縣五潁州府阜陽縣潁上縣霍邱縣亳州太和縣䝉城縣滁州禹貢揚州之域春秋時屬呉後屬越戰國屬楚秦屬九江郡漢初屬淮南國後亦屬九江郡後漢因之三國時屬魏晉屬淮南郡東晉僑立南譙郡於此宋因置南譙郡及平昌郡南齊改平昌郡為新昌郡梁又置北譙郡後魏因之北齊徒南譙州於新昌郡改北譙為臨滁郡北周仍曰北譙郡隋開皇初郡廢改南譙州為滁州大業初州廢屬江都郡唐武徳三年復置滁州天寶初改永陽郡乾元初復曰滁州五代屬呉南唐宋亦曰滁州屬淮南東路元為滁州路隸江北淮東道後復為州屬揚州路明初併清流全椒來安三縣入州屬鳯陽府後以州直隸南京復置全椒來安為屬領縣二國朝因之隸江南布政使司康熙六年隸江南安徽布政使司領縣二和州禹貢揚州之域春秋時屬呉戰國屬越後屬楚秦置歴陽縣屬九江郡漢屬淮南國後屬九江郡後漢為歴陽侯國三國屬呉晉屬淮南郡東晉永興初置歴陽郡宋永初二年兼置南豫州南齊又析置臨江郡梁太清中屬東魏北齊天保六年置和州周因之隋開皇初郡廢仍曰和州大業初復為歴陽郡唐初曰和州屬淮南道天寶初又為歴陽郡乾元初復為和州五代屬呉南唐宋仍曰和州歴陽郡屬淮南西路元升為和州路尋復為州屬廬州路明初以州所領之歴陽烏江含山三縣省入洪武三年改州為歴陽縣屬廬州府尋復為和州直𨽻南京仍析置含山縣為屬領縣一國朝因之𨽻江南布政使司康熈六年𨽻江南安徽布政使司領縣一廣徳州禹貢揚州之域春秋時呉桐汭地戰國屬越後屬楚秦屬鄣郡漢置故鄣縣屬丹陽郡三國呉析置廣徳縣屬宣城郡晉因之宋又析置綏安縣梁改為石封縣置大梁郡尋改曰陳留郡隋開皇初郡廢仍改石封為綏安以故鄣廣徳二縣省入屬湖州大業初改屬宣城郡唐武徳初置桃州後廢至徳初改綏安縣為廣徳仍屬宣城郡五代南唐改屬昇州宋太平興國中復屬宣州尋建廣徳軍𨽻江南道東路端拱初置建平縣為屬元至元中升廣徳路𨽻江南道明初為廣徳府改廣徳縣曰廣陽洪武四年為廣徳州直𨽻南京十三年以州治之廣陽縣省入領縣一國朝因之𨽻江南布政使司康熈六年𨽻江南安徽布政使司領縣一六安州禹貢揚州之域古六國春秋時為楚之六邑秦六縣屬廬江郡漢屬六安國後漢復屬廬江郡晉因之宋改置開化縣屬邊城左郡南齊屬安豐郡梁又置霍州及岳安郡後周州廢隋開皇初郡廢析置霍山淠水二縣屬廬州唐武徳中復置霍州貞觀中州廢改霍山為盛唐縣省開化淠水二縣入焉後又析置霍山縣屬夀春郡五代屬呉南唐後入周宋開寶中廢盛唐霍山二縣置六安縣政和中升六安軍屬夀春府咸淳初置英山縣為屬元改為六安州屬廬州路明初屬鳯陽府以州治之六安縣省入洪武十五年改屬廬州府𢎞治中又析置霍山縣領縣二國朝因之雍正二年升直𨽻州𨽻江南安徽布政使司領縣二泗州禹貢徐州之域春秋時徐子國後入於呉戰國屬越後屬楚秦置徐縣屬泗水郡漢屬臨淮郡後漢屬下邳國三國時屬魏晉屬臨淮郡宋南齊屬淮陵郡梁置高平郡北魏亦為高平郡又置南徐州梁改為東徐州東魏改東楚州陳改安州後周曰泗州隋開皇初郡廢仍曰泗州大業初州廢改屬下邳郡唐復置泗州屬河南道天寶初改為臨淮郡乾元初復曰泗州五代時楊呉置靜淮軍南唐因之宋仍曰泗州臨淮郡屬淮南東路金省郡以泗州𨽻南京路元屬淮安路𨽻江北淮東道明初改屬鳯陽府以州治之臨淮縣省入領縣二盱眙天長國朝因之雍正二年升直𨽻州又以鳯陽府之五河縣來屬𨽻江南安徽布政使司領縣三江南通志卷八
