body:
  text: 江南通志卷九十六武備志海防太湖防附後海州贛榆縣上接山東青州府界海州之地連山阻海為南北之襟要明仇俊卿所謂胊山據淮海之首者也北始贛榆與山東青州府安東衞接壤其海口大者凡九最北為荻水口五代漢乾祐間密州刺史王萬敢擊南唐荻水鎮即其地也最南小河口與海州相接海州之界三面環海北則興莊獨樹南則板蒲莞瀆東則孔望黑闗均為戍防要地六朝時嘗設重鎮以掣北魏南來之路其東北隔海相望有雲臺山一名鬱林即水經注所謂郁州者也晉隆安五年劉裕躡孫恩敗兵於此其地周百餘里六朝宋時僑置青冀二州焉國初嘗遷撤雲臺釘塞海道至康熙二十年後始議開復設東海營鎮之雲臺之東北有鶯遊山與西岸孫家山相對夾峙如門土人謂之鶯遊門鶯遊之南有髙公島皆防海要衝之地雲臺之北有虚溝營毎年東海營分兵防守東海營於康熙三十七年奉裁歸併海州營至雍正二年復設守備今自贛榆至海州營汛地其雲臺南北及海中諸山島均係東海營汛地凡列汛五十有五自海州沿海而南為淮安府安東縣界贛榆縣界汛荻水口炮臺响池莊林子莊柘汪口莊家莊九里七趙家沙馬家村朱蓬口海臍興莊口小盤子宋家口孫家莊青口沙溝村唐莊口范家口新竈劉家口龍王廟小河口瀆樹浦以上海州營汛海州界汛孔望山黑土闗臨洪富安東官口沙頭新壩六竈板浦沙港小浦中正東新疃西陬山東陬山東寧海了路山蘆依山扶山新港出河港以上俱海州營汛孫家山高公島宿城東峽口馬頭新灘大浦口新縣隔村朱蔴西市以上俱東海營汛淮安府濱海三縣北則安東中阜寧南則鹽城安東宋漣水地隔河與廟灣相對河淮之流從此入海其地有白陽鹽場團墟七里平望遏蠻等河縦横連絡俱西接官河東入一帆河以達於海俗謂之七條港其東有雲梯闗自一套以至十三套前明時大河衞指揮駐防於此蓋河海交㑹之衝云過大河口而南為廟灣舊本屬山陽縣今為阜寧縣地宋末李全遣海舟出海口以習海道明築城堡設遊擊及海防同知以協守之皆廟灣地也廟灣之西為劉莊明官兵敗倭於此追至蝦子港而遁又有蛤蜊麻線二港為從前窺伺之逕又有窈子港雍正七年新設汛地廟灣之南為射陽湖從新豐市出海之口乃阜寧鹽城二邑交界處明萬厯中漕臣凌雲翼所開濬也鹽城海口三處斗龍港新洋港野潮洋斗龍新洋為五條沙阻塞峩舸巨艑猝難出入惟野潮係新添小闗子汛地常與掘港廟灣二營㑹哨廵防其南北鹽場九所自伍佑至四安俱瀕海岸有沙岡南接大岡鎮北接山陽廟灣延百四十里有石䃮口為串場河出海之道有捍海堰即范公堤自鹽城至通泰明嘉靖間倭賊䦨入官軍據岸遏之賊不能前籌海圖編所謂彼此夾攻逼之使至湯潮岸可一戰成擒者即謂此堤也今安東為廟灣營汛地鹽城為鹽城營汛地而阜寧則二營分界戍之凡列汛四十有二自鹽城以南入揚州興化縣界安東縣界汛王采垜七套楊家港七條港以上廟灣營汛阜寧縣界汛北垜本套大套三巨塌口尖頭港排網港䨇洋子陷陽子當尖港䨇港通洋港以上俱廟灣營汛小闗子朦朧鎮溝灣以上俱鹽城營汛鹽城縣界汛新洋港炮臺草堰口廖家港沙溝鎮大岡鎮大團灣安豐鎮馬家蕩清溝鎮建陽鎮樓夏莊沙家莊黃土溝南辛野崔家莊石䃮口伍祐場便倉新洋港岡門鎮天妃口新興場上岡鎮以上俱鹽城營汛揚州沿海之邑二北則興化南則泰州至海安鎮而止興化自石䃮牐以北與鹽城分界有劉莊場明兵備陳景韶殱倭處劉莊之下為白駒場嘉靖三十八年副總兵劉顯曹克新嘗敗倭於此其地有牛灣河東入於海設南北二牐有鬭龍港自劉莊場北分流東入於海有大東河自草堰北分流丁溪河東北入海自丁溪以下為泰州境泰州營舊有六寨自興化之劉莊白駒而下曰丁羙舍在東臺場海口曰角斜曰拼茶在州東濱海之地與如臯之掘港而六前明嘗設忠孝忠義兩營嘉靖間以倭警復設海防兵備道駐防於此國朝改設守備仍屬海防後以文武不相轄改歸狼山康熙十一年添設遊擊鎮其地自泰州以北歴興化至鹽城皆為范公堤捍䕶之地州東南海中有壺豆洲梁侯景敗走自滬瀆下海欲向䝉山羊鯤以舟師直向京口至壺豆洲誅景即此地也有王家港雍正八年添置汛地増設千總一員把總二員駐防中舀竈五木樓地連北龍港蓋泰鹽二營交界處其沿海東南為海安鎮鎮有城明初常遇春所築嘉靖倭警唐順之修之地居泰州如臯之間東可控禦海口西可捍衞揚州蓋要地也今興化為鹽城營汛地泰州為泰州營掘港營汛地凡列汛十過海安入通州如臯縣界興化縣界汛白駒場大團劉莊場斗龍港以上鹽城營汛泰州界汛丁羙舍港唐家洋港伍竈港黃沙洋以上俱掘港營汛王家港右哨海口千總頭司把總駐此五木樓右哨海口二司把總駐此以上俱泰州營汛泰州入如臯歴李家堡豐利馬家二場南至掘港營掘港為洪武初信國公湯和經理海上時築舊止設土堡嘉靖三十三年倭入寇巡撫鄭曉奏設把總三十八年巡撫李鐩奏改守備統東西二營焉自掘港西南六十里至石港場宋紹興間劉豫將入寇沈與求言海道當防如角斜石港水勢湍急即此石港也如臯縣舊志曰掘港舊制南援石港狼山北救拼茶角斜李家堡但石港岸髙潮小船不可泊間於七八月風急潮髙或乗勢可入若拼茶等三寨雖地居肘腋實出掘港之背均非安營善地惟有方前舊址水草兩便宜置砦於此循港而前陳家了川腰等處亦應設兵防汛若舉其最險者又有東凌港埃沙横南坎北坎此尤獨舌大洋之兩頰至於拼茶三寨止堪後應難委前鋒是在當局勝算云今陳家了川腰等已添設汛守則石港非宋比矣由如臯沿海而南為通州州東為海門明嘗築正場蘆便二堡設大河營於此康熙十二年海門城垣衝破廢縣為鄉其大河營兵調防贛榆即於狼山右營派撥防䕶海門東汛又東為餘東餘西餘中三鳳國初餘中嘗没於江今漸復矣又東則呂四場為范公堤所由起串場河之入海從此達焉明嘉靖間叅將喬基嘗敗賊於此又東為廖角東北距海南面江滄波萬里諸島歴歴東南與崇明縣相對為海防極衝之地宋紹興六年王彦以所部民屯通州之廖角即此通州之南為狼山五峯相連屹立江岸明崇禎十七年劉澤清開藩改狼山大鎮以鄭昌帥之國朝酌用舊制設副總守備等官後復改大鎮立三營焉今通州為狼山營汛地如臯為掘港營汛地而泰州則兩營分轄之凡列汛七十由狼山南對常熟福山是為江海交㑹門户之地如臯縣界汛甜水港沙魚窪港唐家堞港埃沙横港川水窪港東陵港川腰港陳家了海子窪大洋稍以上掘港營汛通州界汛沈竈墩歇脚港大東竈墩東坦墩大漾墩營北墩泗港墩潑水墩舊營墩宣家壩中管壩張家沙蘆芽嘴唐洪竈墩嚴竈墩東社墩八里坎墩周竈墩新竈墩王竈墩廖角嘴青台墩東洲河坍塽墩三生港朱牙墩七星墩五甲墩老壩墩五里墩三里墩餘東東墩新造墩餘東墩戴青山墩王家岱墩東團墩中團墩西團墩八甲墩舊河墩餘西墩天生港十里河以上狼山右營汛三里鋪周家油坊觀音山小淺沙大横港清水港福星沙二圩木樓小圩墩生水港劍山砲臺黄泥山砲臺花毛港姚港墩任家港蘆涇港以上狼山左營汛自黄泥山砲臺至蘆涇港五汛互見江防崇明即宋三沙之地周五百餘里孤懸大海四面受敵西北望通州西南望太倉州雖呼吸可通而皆為滄波所隔唐順之所謂天生此一塊土以障蔽南直門户者也明多倭冦之警嘉靖三十二年倭據南沙又明年入野茅港又明年寇平洋沙間一年掠營前沙其明年入水瀆港又三年據縣後沙其他侵犯不可勝計國朝順治十年海寇張名振駐泊東阜平安二沙十六年鄭成功據排沙康熙二十二年周雲龍藏匿舟山皆為崇邑切膚之患邑南外洋有洋山凡東倭入寇自下入陳錢山來必於此山抛泊邑北外洋有鶯遊山即前東海雲臺論中所謂鶯遊門凡北寇竊發必抛泊於此明崇禎中海寇顧榮藏匿其地蘓松道程峋會咨淮撫史可法窮勦始平蓋皆𦂳要之地哨探所宜先者也康熙二十八年因江浙洋面盜艘竄入商舶總鎮梁鼐奉諭㫖與浙省分汛洋面以洋山馬蹟山為界馬蹟山脚以南洋島屬浙省管轄大洋山脚以北洋島屬南省管轄自西至東洋面山島俱以兩山為凖勒碑小洋山為定制焉今崇邑所轄洋中諸山毎出匯頭先至大七小七二山次東行至馬蹟山又東至花鳥山又東至陳錢山而止餘皆浙界順治十五年設蘓松水師總鎮標下八營曰中曰左右曰前後曰竒曰左右協康熙六年嚴出海之禁其沙船俱收泊崇明内港將八營官兵分派沿海各汛十四年改設提督統轄八營二十三年平海寇周雲龍仍改題為鎮復裁減八營止存四營曰中曰左曰右曰竒分界巡防凡列汛六十有八崇明縣界汛北路永寧沙東原舊臺永寧沙西原舊臺三造臺四造臺張網港原舊臺頭條港一造臺二造臺三造臺盤滧原舊臺蟶殻滧原舊臺蟶殻滧二臺東滧原舊臺北豎河砲臺西洪滧原舊臺保平沙造臺北合洪原舊臺外海山前野鵝兩沙以上蘓松水師中營汛東南施翹河南岸砲臺南洪原舊臺三條豎河舊臺顧四房溝砲臺郁黄狀造臺新開河西岸砲臺東岸砲臺盤船河造臺三條港造臺蒲沙套原舊臺當沙頭原舊臺大套原舊臺二滧原舊臺岸溝造臺四滧造臺六滧造臺七滧造臺新復裨沙以上蘓松水師左營汛東北保鎮造寨髙頭沙原舊臺蝦撇滧小七滧造臺大花洪原舊臺陳六港造臺大港造臺拳頭港造臺張家港造臺北當沙頭造臺仙景沙造臺小豎河原舊臺梅家义路造臺挑皮港原舊臺天分滧原舊臺外海大安戯臺兩沙以上蘓松水師右營汛西北施翹河北岸砲臺朱華港造臺瀾沙套原舊臺高橋洪砲臺渡船港造臺呉王狀造臺樓子港原舊臺邋遢港原舊臺掘頭港原舊臺渡頭港砲臺西阜沙原舊臺王家港造砲臺大套原舊臺徐鬍子溝造臺湃頭港原舊臺大洪造臺外海永興沙以上蘓松水師竒營汛自狼山而南與常熟福山相對為江海合流鹹淡分界處烽戍相望一葦可達晉咸和五年石勒將劉澂浮海抄東南諸縣以入海虞此自北而南也唐中和間招討使周寶討周郁於海上郁退保常熟走海陵此自南而北也國朝於康熙十九年始開海禁設立狼福對渡官船二十舸二十四年復設海闗許民出海貿捕自是狼福之間往來者項背相望其福山戍守始自明嘉靖間總督張經之議既而操江御史高桂春請募水兵萬人屬㕘將操練胡宗憲又請添置遊擊為蘓松應援並從之倭寇既平築堡於此國朝因其舊制自福山東西二墩以西皆常熟界自二墩以東入昭文縣界昭文瀕海之地其浦口之大者有三曰許浦曰徐陸涇曰白茅港許浦之地自宋乾道以前嘗從明州之定海軍分兵駐守乾道六年御前水軍統制馮湛極陳許浦要害乞移定海全軍屯此從之自是定水軍七千人置寨於此後寶慶間呉英上建屯之議復分二千五百人屯浦東百餘里之顧涇焉今寶山地徐陸舊本淺狹自田家壩鑿通以後海潮衝齧遂成大口漁舟蟻集鹽船盜艘亦時闌入康熙四十年間置堡守戍白茅港自明天順間總兵翁紹宗奏置戍兵成化間復立備倭寨嘉靖三十三年海賊劉鑑突入白茅邑令王鈇悉力禦之乃去自徐陸涇白茅出海有海外薛家沙康熙六十一年允沙民所請亦設四墩分兵駐宿以上常昭之境皆係福山營汛地惟自白茅東南養鵝墩至鐺脚墩係昭文太倉交界之地故獨屬之劉河營云凡列汛二十有四過此始入太倉州界常熟縣界汛福山東墩崔浦墩繆涇墩以上福山營汛昭文縣界汛耿涇墩朱壩墩海洋塘墩呉壩墩千步涇嚴壩墩滸浦墩周港墩瓦浦墩張涇墩徐陸涇顧港墩唐浦墩髙浦墩金涇墩舊塘墩白茅墩外海薛家沙以上俱福山營汛鐺脚墩養鵝墩横浜墩以上俱劉河營汛太倉為濱海之門户自太倉而南過七鴉浦為鎮洋縣界自鎮洋而南過劉家河為寶山縣界自寶山而南接松江府境其地與海中竺箔沙小團沙相對太倉為元時海運放洋之口帆檣燈火輻輳於此自明嘉靖三十年以後倭寇之警太倉之地兩被攻圍城外居民焚掠幾盡蓋邑當海衝為賊踪駐泊之的故也劉河營舊為張家行鎮元置嘉定州水軍分鎮萬户府遂稱水寨明置三巡檢司立烽堠六正統初金山寇警侍郎周忱指揮翁紹宗復議設軍寨焉嘉靖四十五年命設㕘將於此國朝額設遊擊駐防康熙六年劉河舊城為水所齧城東之地半入於海始議移屯茜涇鎮即今所駐地也劉河之南有顧涇汛係寶山地宋時分許浦兵守此寶山之鎮為呉淞營呉淞向有舊城明洪武十九年築嘉靖間海寇秦璠王艮自南沙乗潮入寇廨舍被焚遂移屯土城以舊城為教場後巡按尚維持以土城難守改甃磚石謂之新地順治二年王師渡江總鎮李成棟奉命南征嘗建牙於此雍正四年分立寶山縣即以呉淞所城為縣治與㕘將守備同城而治其地有楊家嘴為海口首衝順治十八年立土寨於此寶山者明永樂十年所築以為海舟標識者也其地在呉淞口之南舊有土城二皆洪武間築正統九年指揮翁紹宗復建磚城是為呉淞旱寨嵗乆漸廢後以倭寇之警萬歴四年兵備王叔杲建議改築於旱寨之北與寶山山麓相距甚邇萬歴十年怒濤決李家泓山漸坍沒城迫於海國朝順治十八年命大臣蘓宜巡視議汰城撒守康熙八年復命大臣㑹閲始題復焉三十三年奉㫖遷入内地離舊城二里是為寶山所城今為川沙營把總駐劄之地今太倉鎮洋為劉河營汛地寶山縣為呉淞營汛地過呉淞口而南自寶山旱寨而北為川沙營汛地凡列汛五十有七又南入松江府界太倉州界汛錢涇墩陳涇墩蕩茜墩髙涇墩鹿鳴墩周場墩浪港墩蔡港墩雙鳴墩塹港墩七了砲臺七了墩以上劉河營汛鎮洋縣界汛楊林墩陶家墩大赦墩新塘墩潮田墩丁涇墩劉河砲臺劉河墩破倭墩薛境墩平寇墩新開河墩牛角尖墩以上劉河營汛寶山縣界汛大川沙墩小川沙墩以上劉河營汛黄窑墩五岳墩徐澤塘墩司港墩顧涇墩薛家灘墩練祁墩司港汛練祁港汛月浦鎮汛右哨把總駐此呉木峰對江墩胡巷橋汛江灣鎮汛左哨把總駐此顧龍浜墩淘墩港墩小沙背木烽東潛墩淘港汛沙浦港汛楊行鎮汛左哨把總駐此以上俱呉淞營汛鎮海墩周家浜墩張家浜周江浜寶山城汛黄家灣楊家嘴砲臺對江墩以上俱川沙營松江一郡三面距海當震澤之下流晉袁山松築滬瀆壘於此以扼禦海之門户重其防也其沿海之縣自北而南曰上海曰南匯曰奉賢曰華亭曰金山而黄浦川沙南匯青村柘林金山等營或分或并互相應援明嘉靖間倭寇汪直徐海等嘗據柘林為巢穴綿亘二百里若老鸛嘴七八團之間皆其部落所屯聚華上之間騷然矣國朝特設提督彈壓其地居重馭輕實為籌海之勝算上海接壤嘉寶獨當黄浦之衝最為險要論者謂當守吳淞之李家口以拒賊上流守黄浦以拒賊横渡為禦防之上策也舊有墩臺十七座俱在内塘毎墩間懸六里以達於南匯康熙二年以内墩離海過逺聲息難通乃建外塘斥堠巡防瞭望内外相資為他堡所不及自今分縣以來十五墩以下屬上海十四墩以上屬南匯謂之匯者本堡地形突出海中如嘴面面受敵海寇分艐於洋山馬蹟之間遇東南風則此嘴大勒口當洋山之衝遇東北風則此嘴四五六團洪當馬蹟之衝各堡止防一面此獨三面拒防故謂之匯云南匯之東北有川沙窪明嘉靖間賊首陳東嘗屯於此由南匯而南為奉賢縣地青村營所駐也營本洪武二十年湯和所建明鄭若曽曰松江臨海者三面金山當其南南匯當其東青村當其東南二面轉屈之㑹故為衝要其地如横林朝陽廟李家路口壇廟路口牛皮小勒魚秧棚翁家港墩俱稱險要自西袁浦而南入華亭界柘林營所駐也有漴缺口為捍海堰險工之地蓋以金山許山聳峙洋面潮為兩山所束直衝漴缺故易侵齧今俱修築堅完柘林所屬如東西袁浦龍王廟草菴漕涇皆要地也自華亭而南入金山界其地東為青南之上游西為乍獨之界限明胡宗憲遣將王沛沈賊舟於金山洋蓋由其地嘉靖中設㕘將於此國朝仍其制雍正四年分設金山縣即其城為縣治凡列汛七十有八過此以南為嘉興府平湖縣白沙灣汛地係浙江海防之始上海縣界汛生字圩墩呂字圩墩湯字圩墩外十六墩曹家路墩北新墩以上六汛係外塘曹家路汛十五墩十六墩十七墩以上四汛係内塘俱川沙營汛南匯縣界汛邱家路南新墩楊家路大洪墩江家路外十墩殷家路以上七汛係外塘十四墩添設墩十三墩十二墩十一墩十墩九墩以上七汛係内塘俱川沙營汛外八墩宋家棚墩外六墩趙家棚墩新建墩方家棚墩黄家窪墩靖氛墩董家宅墩靖海墩以上係外塘頭墩二墩三墩四墩五墩六墩七墩八墩以上係内塘俱南匯營汛奉賢縣界汛翁家港五墩新四墩舊四墩荒三墩二墩頭墩椒墩大門墩朱家墩戚漴墩横林墩以上青林營汛東袁浦墩西袁浦墩以上柘林營汛華亭縣界汛陸鶴墩周公墩龍王墩漴缺墩三岔墩胡家港墩漕涇汛以上柘林營汛胡家厰東薪墩西薪墩金山頭金山墩戚家墩篠館墩以上金山營汛金山縣界汛橫瀝墩葛蓬墩以上二墩屬金山縣界白沙灣江門墩江門營新廟墩獨樹墩砲臺以上六汛屬浙江界俱係金山營汛附太湖防太湖左營守備駐防簡村界汛洪廟汛前成湖汛大村嘴汛陸家港汛長板橋汛呉家港汛以上震澤縣界太湖左營千總駐防鮎魚口等汛胥口汛韓瀆港汛靈湖嘴汛水東汛木凌橋汛茅圻汛以上呉縣界白洋灣汛莫舍港汛鮎魚口汛花涇港汛七里港汛以上呉江縣界牛腰涇汛震澤縣界太湖左營把總駐防東山界汛大水橋汛白沙汛楊灣汛長圻汛三山汛廐里汛澗橋汛余山汛以上呉縣界太湖左營把總駐防呉漊等汛呉漊汛因瀆村汛蔣家港汛娘娘廟汛永定寺汛蒲池港汛灘缺口汛練聚橋汛以上震澤縣界太湖右營守備駐防周鐵橋等汛周鐵汛竹山汛大墟汛盛瀆汛分水墩汛以上宜興縣界百瀆汛陽湖縣界太湖右營千總駐防馬山界汛金墅汛長洲縣界沙墩汛呉塘汛大阜汛獨山汛湖西岱汛以上無錫縣界楊灣汛無錫陽湖二縣交界下埠汛西村汛桃花汛古竹汛東汛耿灣汛雁門汛以上陽湖縣界太湖右營把總駐防黿山等汛黿山汛頭陀橋汛辛橋汛長沙汛漫山汛銅坑汛呂坡橋汛以上呉縣界太湖右營把總駐防鳳川等汛鳳川汛烏溪汛雙橋汛漳瀆汛後河汛以上荆溪縣界洪港汛舊瀆汛以上宜興縣界大浦汛荆溪宜興二縣交界附明曹儒湖防論太湖古震澤也延袤五百餘里雄跨蘓常湖三境自宣歙以東富陽以北諸溪山之水咸吐納焉全呉巨浸無大於此論水利則列郡田賦豐歉係焉論兵防則列郡封疆安危係焉全呉利害亦無大於此者向來論經畧者多未之及何也或謂東西洞庭及濱湖諸山古來兵燹莫及奚必議守禦然自古大兵之下江南也或從京口或從三壩志在城郭則山林必在所棄若倭寇土賊則不然志在擄掠棄無就有今腹内諸村鎮搜括已盡其志必在未經兵燹之處則沿湖諸境非所當防者耶况自宜興至金陵為道甚㨗皆今日兵議所未及也其可不思先事之防乎或又謂湖中風波與江海異若之何其禦之曰此非漁網船不可蓋江船與海船不同海船與内河之船不同内河之船與泖湖船又不同泖湖之船大小不齊運石者謂之山船運貨者謂之駁船民家自出入者謂之塘船衛所巡司所用者謂之巡船郷夫水軍所駕者謂之哨船往來津口者謂之渡船之六者雖皆習知湖中風濤之性尤未若漁船之便用也漁船莫大於帆罟無間寒暑晝夜在湖毎二隻合為一舍素為賊之所畏雖蓄貲鉅萬賊不敢近也聫而䑸之太湖攻戰此其最善乎其次為江邊船其次為厰梢船又其次為小鮮船又其次為剪網船乂其次為絲網船又其最小者為划船善用之大為軍旅之助或又謂週湖港口無慮百數焉得港港而備之曰不然湖口雖多通舟往來者不過如呉江之韭溪葉港雪落洪坍闗鮎口呉縣之莫舍漊胥口港無錫之獨山浦嶺呉塘門武進之馬蹟山宜興之荆溪東蠡河忻溪直瀆之類可指而數也各練郷兵守之而以巡哨船為之探報帆罟邊江等船嘗居深水賊豈能入湖也哉然大小漁船未經刷集一旦用之欲望其出死力不能也須平時籍之於官蠲其役専委一亷仁有司訓教之則善矣申時行湖防公署記呉水國也而震澤匯其中洪流巨浸襟帶三洲漸洳數百里所産魚蝦螺蛤薪茭果木之饒民衣食之網罟於是斧斤於是故稱利藪然而洲渚盤互島嶼紆迴逋逃亡命椎剽之奸亦窟宅於是故稱盗藪有司者蓋嘗憂之然自國家經畧以來沿江置戍嵗時操閲海上備倭壁壘相望其防最嚴宻而獨太湖之防闕如曰斯内地無動為安爾而頃年多盜閭閻村塢之間抉闗胠篋越人於貨者所在竊發官司逐捕逸之太湖風檣浪舶騰踔出沒於烟波浩渺之中莫可蹤跡蓋防之為尤難都御史曹公時聘來撫東南周視四封興修百度江介海壖防禦既飭則計所以防湖者乃籍兵壯治舟楫嚴追捕謹哨巡遴屬弁中亷勇有幹局者為總練官已復念曰湖去郡治逺而兵水宿野次觸風濤犯不測為難逺者耳日不加而難者易窺避是使爭為偷惰而相欺謾也計莫如扼要害審便宜列營建署莅而守之可以經乆乃相地得黿山之麓鳩工伐材剏立廨宇凡為屋若干楹前堂後寢翼以廊廡繚以周垣樹纛建牙規制悉備工始萬歴辛丑十月訖壬寅四月而成費取諸省存虚冒為錢若干緡則兵使鄒公墀郡守周侯一梧實規畫而曹公允行之者也署成屬余記余曩在政地所司嘗以湖盜聞詔遣兵搜緝經歲無所得始失之張皇終失之疎宕寧獨以地險故哉夫事至而備孰若未事而備之為慮逺也患生而防孰若未患而防之為謀預也今艅艎既具組練既集公署既設上有所申令下有所禀仰若立標而示望的而趨體統以正軍容以肅履斯地任斯職者盍亦趯然深思孜孜户牖之圖而永絶􅍉苻之釁也乎是役也海防貳守黄侯甲英董其役宜并書之江南通志卷九十六
