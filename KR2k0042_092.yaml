body:
  text: 江南通志卷九十三武備志國朝兵制二鎮守江寜等處滿兵将軍駐劄江寜府國初設駐防左翼四旗統兵昻邦章京一員順治十八年添設副都統二員康熙元年設立将軍統轄二十二年添設右翼四旗左翼副都統一員統轄鑲黄旗正白旗鑲白旗正藍旗協領五員鑲黄旗一員正白旗一員鑲白旗二員正藍旗一員佐領二十三員鑲黄旗六員正白旗六員鑲白旗五員正藍旗六員防禦二十八員鑲黄旗七員正白旗七員鑲白旗七員正藍旗七員驍騎校二十八員鑲黄旗七員正白旗七員鑲白旗七員正藍旗七員筆帖式二員鑲黄旗一員正白旗一員右翼副都統一員統轄正黄旗正紅旗鑲紅旗鑲藍旗協領五員正黄旗一員正紅旗一員鑲紅旗二員鑲藍旗一員佐領二十三員正黄旗六員正紅旗六員鑲紅旗五員鑲藍旗六員防禦二十八員正黄旗七員正紅旗七員鑲紅旗七員鑲藍旗七員驍騎校二十八員正黄旗七員正紅旗七員鑲紅旗七員鑲藍旗七員筆帖式二員正黄旗一員鑲藍旗一員隨甲四十副馬兵四千名歩兵八百名砲手三十名弓鐡匠一百六十四名餘兵六百名沙船二十隻捕舵繚椗手一百名水手匠役二百二十四名官坐馬一千五十八匹戰馬一萬二千匹歳需俸薪餉乾銀十四萬五千五百八十八兩米十三萬三千九百四十五石豆十一萬七千五百二十七石草七百五萬一千三百二十束雍正五年二月初六日奉㫖水師甚屬𦂳要現今天津設立水師滿洲官兵操練學習其江寜駐防滿洲官兵亦應照天津水師之例設立水師操練鎮江水師現有船隻将此船内酌量撥給江寜将軍令其學習操練至如何操練應撥給船隻若干或船隻不敷作何添造之處爾部一併定議具奏欽此兵部議江寜地方控江連海設立水師甚有裨益應将江寜滿洲蒙古官兵照天津水師例設立水師其江寜駐防八旗滿洲䝉古馬兵四千名應選年力精壮者撥一千名設為水師派協領四員佐領防禦驍騎校各十二員管轄每年春秋在大江學習操練查鎮江将軍摽下有唬船四隻沙船七十六隻每船各設磨盤砲一位子母砲二位百子砲四位捕盗舵工等項水手各十六名今江寜既設水師應将鎮江所有沙船匀配大小二十隻并捕盗舵工等項水手磨盤子母百子等砲一併撥給江寜将軍仍令食原餉銀米同滿洲兵丁學習操練再於鎮江水師營内揀選熟識水性千把四員遇操練時令其前往江寜分配八旗教習操練至操畢時回任俟滿洲諳練之日停其敎習此敎習操練每船分配滿洲官一員兵二十五名分為兩班若量船之大小宜增減官兵處該将軍等酌量增減分配将軍等不時廵看操練再大江中停泊船隻處最為𦂳要應行今該将軍等㑹同江南㫖依議總督勘定可以停泊之處加謹停泊奉九年十一月二十二日奉上諭朕因各省駐防兵丁技勇多屬生疎營伍亦覺廢弛所養馬匹多不足額其中漢軍為尤甚已於今年八月間先行曉諭申飭俟明年春月各差科道等官前徃查看倘仍不悛改嚴加議處朕思營伍廢弛兵丁怠惰之習若該管官弁等果能實心整頓訓練數月之内即可改除惟是馬匹不敷額數若責令一時購買足額或至馬價昻貴兵丁力量艱難况於南方諸省平時既難喂養而一時急切買補又較難於北方著該将軍等酌量稍為變通現養幾匹其所少者存價於官一有調遣即可購買應用不致遲悞公事此朕格外體恤之特恩若再奉行不力一經查出弁兵等俱不寛貸特諭欽此鎮守京口等處漢軍将軍駐劄鎖江府京口原設隨旗前後左右四營康熙二十一年以四營官兵歸併提督管轄本年仍歸将軍管轄二十三年裁前後二營三十六年裁京口水師總兵改設副将歸将軍管轄左翼副都統一員統轄鑲黄旗正白旗鑲白旗正藍旗協領四員鑲黄旗一員正白旗一員鑲白旗一員正藍旗一員叅領四員鑲黄旗一員正白旗一員鑲白旗一員正藍旗一員防禦二十員鑲黄旗五員正白旗五員鑲白旗五員正藍旗五員驍騎校二十員鑲黄旗五員正白旗五員鑲白旗五員正藍旗五員筆帖式一員鑲黄旗右翼副都統一員統轄正黄旗正紅旗鑲紅旗鑲藍旗協領四員正黄旗一員正紅旗一員鑲紅旗一員鑲藍旗一員叅領四員正黄旗一員正紅旗一員鑲紅旗一員鑲藍旗一員防禦二十員正黄旗五員正紅旗五員鑲紅旗五員鑲藍旗五員驍騎校二十員正黄旗五員正紅旗五員鑲紅旗五員鑲藍旗五員筆帖式三員正黄旗一員正紅旗一員鑲紅旗一員馬兵二千名歩兵一千名炮手七十二名銅藥弓鐡匠二十名官坐馬五百八十六匹戰馬六千十六匹嵗需俸薪餉乾銀七萬五千三百七十七兩米六萬七千九十八石豆五萬九千四百十八石草三百五十六萬五千八十束左營原設左營副将康熙三十八年改中軍副将兼管左營事舊額副将一員守備一員千總二員把總四員馬戰兵一百名歩戰兵四百名守兵五百名官坐馬二十八匹戰馬一百匹沙船二十七隻唬船十八隻捕舵繚椗手二百二十五名水手匠役四百六十九名康熙二十五年改歩戰兵二百名為守兵二十六年裁馬歩戰守兵三十五名馬三匹三十五年裁歩戰兵三十八名雍正二年撥歩戰守兵十一名入太湖營五年撥守兵九名入蘇州營七年添設外委千把總六員八年撥馬步戰守兵一百六十六名馬十五匹入鎮江營沙唬船除歴年抽撥增改外現存艍犁沙唬船四十四隻中軍副將一員守備一員千總二員把總四員外委千總二員把總四員俱駐鎮江府東門外馬戰兵八十二名歩戰兵一百二十九名守兵五百三十名官坐馬二十八匹戰馬八十二匹水艍船八隻犁罾船八隻沙船二十八隻捕舵繚椗手二百二十名水手匠役四百九十二名嵗需俸薪餉乾連閏銀二萬四千五百四兩六錢六分三釐零米五千六百六十六石七斗右營舊額逰撃一員守備一員千總二員把總四員馬戰兵一百名歩戰兵四百名守兵五百名官坐馬二十二匹戰馬一百匹沙船二十七隻唬船十八隻捕舵繚椗手二百二十五名水手匠役四百六十九名康熙二十五年改歩戰兵二百名為守兵二十六年裁馬歩戰守兵三十五名馬三匹三十五年裁歩戰兵三十八名雍正二年撥歩戰守兵七名入太湖營五年撥守兵九名入蘇州營七年添設外委千把總六員八年撥馬歩戰守兵一百六十六名馬十五匹入鎮江營沙唬船除歴年抽撥增改外現存艍犁沙唬船四十四隻遊擊一員駐劄鎮江府東門外守備一員駐劄鎮江府西門外千總二員把總四員外委十總二員把總四員以上分駐鎮江府東西兩門外馬戰兵八十二名步戰兵一百二十八名守兵五百三十五名官坐馬二十二匹戰馬八十二匹水艍船八隻犁罾船八隻沙船二十八隻捕舵繚椗手二百二十名水手匠役四百九十四名嵗需俸薪餉乾連閏銀二萬四千三百四十四兩二錢四分五釐零米五千六百九十石一斗余國柱京口兵米留漕疏畧凡事有利於國者必求無害於民有利於民者尤期有益於國如京口兵米嵗需一十三萬餘石向係截留江南漕糧至康熙三年疏留江漕十萬其餘不足以京口就近漕米補支至十九年始有採買之議此亦不過權宜之計未嘗慮及其便益與否也然而採買之不便有四截留之便亦有四臣請得而悉陳之盖江南澤國産米有限每嵗漕白去其大半就近採買部中每石定價八錢亦不為少然江南米價騰貴日多八錢其最平時也倘遇騰貴之日官捐則必科派民出則必加徵强買則抑民價其不便者一萬一水旱洊災無米可購勢必逺渉江楚長江風濤固不能免意外之虞即使倖保無事而船價盤剝使費多端公帑無可動之項官民無可賠之力其不便者二且米價髙下原無定時如價值少低自應總買無論司庫錢糧不能一時給發即使設法購貯在外原無倉厫而江南卑濕之地積之年乆米多朽爛責賠則無人可問折耗則無項可補其不便者三購買之米糠稻溷雜勢所必有非比漕米乾圓潔淨按月支放復加篩颺自不免於虧折官給之價原有一定支少之額何以取足其不便者四若截留本省漕米原屬民間應完之項任其米價騰貴不得顆粒短少地方就近按月解送可以朝呼夕應小民樂於轉輸兵糈不至後時此其便者一京口應放之米每月僅萬餘石漕原徵收於州縣即可散貯於州縣晒颺則民任其力虧折則民足其數而米無朽爛之患官鮮折耗之累此其便者二漕米起運旗丁有行糧漕贈之費共計四萬餘兩今既截留以本地之米養本地之兵不必動内帑十餘萬兩之購買又可嵗省行糧漕贈四萬餘兩以充兵餉此則於便之中而又有益於國者三再查康熙三年截留江漕原因此時江船未足故為移逺就近之法而江漕至鎮每在三四月之後官兵計口授食不能等待故止留江漕十萬又留本地漕米三萬餘石以為接濟之用兩省截留事反牽溷且江漕行至中途行月水脚仍不能免不如直留本地之米之為直㨗此其至便者四我皇上軫念民生無事不在種之不便截留有種種之便臣睿懐之中今採買有種告至目睹此情不敢不據以入折及截留各省誠恐京十九年採買原因各省漕倉不敷故暫行採買頃者四海昇平各省漕糧起運本色天庾殷實况自順治十六年京口官兵駐防即留本省漕米支給幾經部臣斟酌今亦不過遵循舊例國而民生兩有所裨誠不可不急復也計奉㫖著照該撫所題截留漕糧京口協水師左營原設鎮守京口左右兩路水師總兵二員各統左右二營並屬京口将軍管轄康熙二十一年改屬提督標下二十四年改左路總兵為京口水師總兵裁右路總兵并右路左營其右路右營歸併左路總兵為中左右三營三十六年裁總兵改設副将裁右營改中營為左營左營為右營仍聽京口将軍管轄本營原額逰擊一員守備一員千總二員把總四員馬戰兵一百名歩戰兵四百名守兵五百名官坐馬三十四匹戰馬一百匹沙船二十三隻唬船七隻小吧唬船四隻捕舵繚椗手一百五十名水手匠役三百十八名康熙二十二年改屬提標其沙唬船三十隻仍在将軍標二十二年撥馬歩戰守兵三十五名馬六匹入撫標二十四年收沙船十五隻歸營撥歩戰守兵六十五名入常州營又裁馬歩戰守兵三十二名馬四匹二十五年撥沙船四隻入左營裁馬歩戰守兵六十五名馬三匹二十九年撥沙船十一隻入鎮海将軍標三十五年裁歩戰兵三十三名三十八年收原裁右路馬歩戰守兵一百十五名馬十匹小吧唬船三隻歸營雍正二年撥歩戰守兵十名入太湖營五年撥歩戰守兵九名入蘇州營七年添設外委千把總六員又添撥将軍標左營唬船二隻捕舵等項水手二十八名副将一員駐劄江隂縣城遊撃一員駐劄靖江縣城中軍守備一員駐劄江隂縣城千總二員一駐防靖江縣一派防各汛把總四員派防各汛外委千總二員把總四員協同經制千把總防守馬戰兵九十七名歩戰兵一百八十七名守兵六百四十七名官坐馬三十四匹戰馬九十七匹唬船二隻小吧唬船七隻捕舵繚椗手十名水手十八名嵗需俸薪餉乾連閏銀一萬七千八百二十一兩三錢米三千七百四十石一斗是營防守江隂縣武進縣靖江縣通州如臯縣泰興縣地方江隂縣汛地墩堡三十三處武進縣汛地墩堡十處靖江縣汛地墩堡二十四處通州汛地墩堡七處如臯縣汛地墩堡十四處泰興縣汛地墩堡二處京口協水師右營原額遊擊一員守備一員千總二員把總四員馬戰兵一百名歩戰兵四百名守兵五百名官坐馬二十二匹戰馬一百匹沙船二十三隻唬船七隻小吧唬船六隻捕舵繚椗