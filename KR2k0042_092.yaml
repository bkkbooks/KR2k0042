防守吳江縣震澤縣地方吳江縣汛地墩堡七處震澤縣汛地墩堡五處馬祜請造營汛廵船疏為酌議沿河水路設立廵船以弭盗患以安商民事該臣看得臣屬蘇松常等府地方濵臨湖蕩素稱澤國為盗賊淵藪竊發靡常昔年松江提標與蘇州營各設有小快船四十隻平望無錫常州鎮江等處營汛亦各設有快船一二十隻不等分汛廵防剿擒湖㓂此因地制宜誠靖盗安民至計也自康熙七年間部差郎中卜書厙到蘇查燬沿江沿海各營可以出海之船将此等内地小快船槩議裁擱收入陸地朽壊無用邇來盗賊乘船出没水鄉河路刼剠時閒汛防官兵苦無船隻坐視賊逸不能尾追以致盗案日繁叅罰踵至節據營升詳請復設廵船臣正在檄行司道酌議適准提督臣楊捷咨議官塘河路十里安設一船節節布置撥兵廵防俾各汛有船則易於堵截追擒實修復舊制要策臣又通行各司道府按程計里酌設去後兹據册報蘇松常鎮四府屬各官塘河路及濵河要汛共應設快船三百二十五隻除上清二縣已報修船二十隻外止應造船三百五隻每船核實需用工料銀二十兩二錢二分零共該銀六千一百六十八兩六錢零其所需錢糧臣查蘇州府每年編徵水陸各營船械銀二千八百兩遞年題報收貯府庫原以備修造營船甲械之用相應於内動支打造事竣報銷日後遇有船隻損壊若照近奉部行三年始一小修五年始一大修恐致易於朽廢應照馬快船定例次年小修每船給銀三兩再次年大修每船給銀六兩五年叠造必嵗加整葺庻堅固經乆而不致沉朽無用矣惟是此項船隻臣等本因舊日汛防制度酌議成造目今滇閩逆賊告變軍興旁午四方商賈不通民間生計蕭索㳺手無頼奸徒處處挺而走險且自春徂夏霪雨連綿晝夜不息臣屬蘇松等府地方低窪田地一望皆成巨浸茫無畔岸二麥既已腐爛今值揷蒔之際田畆水深渰没秩不能栽農夫束手無策臣雖現在檄飭有司勸諭竭力䕶救冀其播種惟恐饑荒之衆流入匪類相聚為盗近又據宜興縣營申報浙省湖州府之長興縣土㓂竊發警逼縣境又據平望營呈報浙省土㓂被剿竄遁飄突隣境亟須駕船摉擒紛紛請發快船刻不容緩復准浙江撫臣田逄吉咨報湖賊嘯聚勢甚猖狂請發官兵會剿非船㫁難追擊蘇松常三府皆與浙省接壤各有巨澤大川素多伏莽兼之河港錯雜四通八達汛防官兵見無船隻廵剿遂致盗賊出没無忌至若有船營汛惟止太湖吳淞江隂等營各設沙唬船數隻止可於太湖長江海口之間乗風行使其在内港湖蕩必須輕利小艇始可飛棹掩襲此等巨艦一入内地便不能施展臣等從今日地方多事起見敢不熟籌消弭防禦之策此議朝廷金復營汛快船萬萬難緩非敢虚糜匪細用是激切錢也倘部臣惜費拘執又恐貽悞皇上俯詳陳伏乞賦奥區謀在事先乃為無患念江南財勑該部准臣動支本欵船械銀兩分發各營勒限打造完固俾官兵得以乗駕追剿則盗賊知有整備不致横肆流毒庶地方隱憂可杜民生得獲安枕矣除将應設船隻及需用料價數目造册送部查核題外臣謹會同總督臣阿席熙提督臣楊㨗合詞宻伏乞睿鑒敕部連賜議覆施行廵撫安徽等處地方軍門駐劄安慶府舊制兼提督操江康熙元年停理軍務操江所屬十一營官兵歸併總督十三年復設本標左右二營左營順治初設中軍逰擊屬操標有太平左右兩營康熙元年操標歸併總督十三年復設中軍兼管左營舊額逰擊一員守備一員千總二員把總四員馬戰兵七十五名步戰兵二百二十五名守兵四百五十名官坐馬二十二匹戰馬七十五匹二十三年裁馬戰兵二十五名馬二十五匹二十五年改馬步戰兵一十名為守兵二十六年裁馬步戰守兵二十五名馬一匹三十五年裁步戰兵一百名三十六年裁守兵二十三名三十八年撥守兵一百七十七名赴河標雍正二年撥步戰守兵七名入太湖營五年撥守兵四名入蘇州營七年添設外委千把總三員仍食馬戰兵糧八年撥守兵二名入泰州營九年逰擊改設叅将中軍叅将一員左營守備一員千總二員把總四員外委千總一員把總二員俱駐劄安慶府城馬戰兵四十九名步戰兵五十九名守兵二百七十九名官坐馬二十二匹戰馬四十九匹嵗需俸薪餉乾連閏銀七千六百九十九兩六錢八分三釐零米一千五百十六石五斗右營順治初設屬操標康熙元年歸併督標十三年復設舊額逰擊一員守備一員千總二員把總四員馬戰兵七十五名步戰兵三百名守兵三百七十五名官坐馬二十二匹戰馬七十五匹二十三年撥馬戰兵二十五名馬二十五匹赴湖廣二十五年改步戰兵一百三十三名為守兵二十六年裁馬步戰守兵二十五名馬二匹三十五年裁步戰守兵一百二十三名三十八年撥守兵一百七十七名赴河標雍正二年撥步戰守兵七名入太湖營五年撥守兵四名入蘇州營七年添設外委千把總三員八年撥把總一員守兵二名官坐馬二匹入泰州營遊擊一員中軍守備一員千總二員把總三員外委千總一員把總二員俱駐劄安慶府城馬戰兵四十八名步戰兵五十九名守兵二百八十名官坐馬二十匹戰馬四十八匹嵗需俸薪餉乾連閏銀七千五百三十六兩九錢四分五釐零米一十五百九石三斗江南通志卷九十三
