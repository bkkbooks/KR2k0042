道妻沈氏石埭人夫亡撫棺大慟既而收淚不言入室自經楊氏女名華玉石埭人許字汪餘慶婚有日而餘慶歿女聞入室自縊先是汪病劇女謂二妹曰世俗婦女殮製衣履如男子式甚無謂投繯之夕預以衣履置其側其家如言殮之檀士神妻陳氏貴池人年二十四夫亡無子誓不改適值歲飢姑與其母強為擇配遣行氏沐浴更衣詣夫塋泣别從容言笑晚自縊死陳河北妻桂氏貴池人年二十二夫亡葬畢服除從容自縊死王永大妻陳氏貴池人夫亡食貧守志有刋其改適者姑隂主之氏聞自縊蘇敏妻沈氏石埭人敏病劇氏刲股和藥弗愈敏亡氏出嫁奩分給家人乘間自縊李正皓妻沈氏石埭人家貧甚以織絍供衣食生子甫三月夫亡姑利其改適百計逼之氏度不免乃潛詣夫墓號慟再拜赴水死吳太滿妻楊氏青陽人夫亡遺腹子生七日殤母家欲奪其志自經死徐開生妻袁氏青陽人夫亡姑迫改適遂自經柯秉直妻陳氏青陽人年十八歸柯期月夫亡遺腹生子誓死以守夫兄某欲奪其志氏觸階幾絶少蘇又欲自經某懼而止後年七十三終吳太定妻劉氏青陽人年二十餘夫亡子幼舅姑衰老忍死搘拄忽夜半火起二老不能行氏衝火入掖舅出復冒死負其姑頭髮焦爛衣裙拂落火片盈地後姑享大耋氏年踰七十歿桂銓妻彭氏石埭人夫亡絶粒求死舅姑諭止之姑歿諭其子曰死吾願也已遲汝父十年嘔血數升卒馮兆升妻張氏東流人夫亡撫孤南溟成立娶婦張氏南溟又早卒氏悲不自勝赴水死婦張奔至水濵撞石幾絶並以節著徐榖樂妻馮氏建德人幼事繼母盡考歸徐六年夫亡艱苦撫孤孤又殤泣拜舅姑遂縊死程道隆妻朱氏建德人夫亡孝事舅姑遺腹生子撫之成立及舅姑歿喪葬畢遺孤又殤氏泣曰未亡人無用生為矣赴水死李緒妻蘇氏建德人夫病篤曰泉路茫茫何能獨往氏含泣曰諾夫歿姑防之密氏佯為笑語潛登樓縊死陳氏女東流人許字張元秀夫亡絶粒自經蘇百福妻徐氏石埭人歸蘇三月夫亡冰霜自矢母兄欲奪其志氏大慟周身密紉自經死桂伸側室周氏江都人伸公車道𨝍上納之留兩月氏有妊伸入都購疾而殞柩回氏長慟迎於舟次因扶歸石邑生子托於嫡不食數日卒畢天培妻沈氏石埭人一日夫出有強暴突入室犯之引刀自刎死林嶷女貴池人幼竒慧三歲能誦詩通大義事父母尤考謹許字桐城儒士汪士椽未婚士椽死女聞鍵户梳妝服汪納幣衣自刎端坐而逝死之前一日鄰里見屋有火光即之不見咸以為義烈所感云江南通志卷一百七十九欽定四庫全書
