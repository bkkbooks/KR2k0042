body:
  text: 江南通志卷一百七十九人物志列女義烈三四安徽寧池府安慶府漢焦仲卿妻劉氏仲卿為廬江小吏氏為姑所逐自誓弗嫁其母屢逼遂赴水死仲卿聞之亦自縊於庭樹時人傷之作樂府以歌其事唐張主簿妻某氏張為桐城主簿禱雨龍眠水暴至被溺氏往求尸不得乃自投觀音崖下明日其尸泝流與張合遂合葬龍眠山口事聞贈張英烈昭應侯王英烈夫人郡志主簿作張孚卿妻為王氏宋張氏太湖人張某女汪革仲子婦張汪素以資雄里閈淳熙中或首革有異志詔捕之將逃張謂姑曰不可逃而免也就逮自明弗聽張泣曰死鳥無生翼遂自沉於河革誅同室皆坐死人多其智黃千金潛山人七歲通書史許字張大中未嫁而大中卒欲更議婚女泣不從父沒有求聘者母示以意千金即以簪抉目目盲逾三月卒年十九元韓建妻某氏建知安慶路城陷死氏及全家皆殉節李忠妻王氏懷寧人忠溺死氏求尸殮畢欲投水姑救免乘間自縊步善慶妻陳氏懷寧人善慶贅於陳未幾卒氏哀慟三年猶如一日服除自經詔旌其門明方説妻姚氏桐城人年十七歸説説沒服斬衰自經死正德中詔旌貞烈吳孟傅妻姚氏桐城人年二十夫沒既葬以黃絲自縊死周見妻桂氏桐城人年二十夫亡即自經嘉靖中旌表李棟妻張氏桐城人棟死無子張經於牀母救之引斧斫已臂家人奪斧乘間投於寒冰首觸冰竅溺死其面如生胡效俊繼妻程氏桐城人夫亡密紉其衣自經死錢巨瞻妻周氏桐城人夫亡自經家人救之乃跽靈案前號七日不食死詹伯妻儲氏桐城人伯渡石溪溺死儲扄户沐浴經於靈側周一脈妻陸氏桐城人早寡葬夫畢自縊寢榻洪錦妻汪氏桐城人錦疾篤誓與同穴既卒為營大壙至葬越宿自經死遂合葬許聖德妻徐氏桐城人夫亡徐年二十餘殮畢即自經髙文學妻王氏桐城人夫亡哀號不輟父曰無過哀慟事有三等能相從地下為烈次則冰霜以事舅姑為節三則為恆人事耳王聞言即鍵户絶粒七日而死吕怡妻雷氏太湖人怡死富兒李懋欲奪之雷聞自經朱乙妻申氏太湖人朱貧且病痱氏益篤愛乙亡即自經吕薦妻宋氏太湖人薦赴郡試卒宋俟柩至以頭觸棺腦迸裂死胡聚成妻王氏安慶衛人聚成卒王即不食自經死事聞旌表吳仲淇妻楊氏桐城人夫亡家貧舅謀於其父母將以償所負楊聞吞髮死陳蕙貞潛山人許字王應宿未嫁宿病宿父母求娶氏往因毁容侍藥八月見宿必不起夜半自縊氏死六日而宿亦沒事聞建坊旌表王嘉科妻徐氏潛山人科病將革徐禱於家廟願以身代夫遂自經科病遽瘳侯君錫妻梅氏潛山人因夫病篤刲股以進得痊黃之宗妻汪氏潛山人因夫病篤刲股以進獲痊陳炯妻王氏桐城人年十七歸炯未一載炯亡氏遂一慟而絶朋至明妻侯氏太湖人夫亡侯年十九服滿自縊徐氏女潛山人許字胡乾乾天自經方九思妻胡氏桐城人早寡有議婚者遂絶粒七日死盛世英妻許氏桐城人英卒自矢立孤舅姑欲奪其志遂潛引刀刳左耳六十餘歲終潘遇妻某氏桐城人佚其姓歸遇裁數月遇死氏潛入松林中自縊方啓煜妻王氏桐城人煜病刲股和劑以進煜亡即自斷髮三十年終諸生熊夢篆妻金氏潛山人夫沒不食哀號數月以首觸其棺而死國子生韓希歆妻唐氏太湖人氏無子棄歸母家聞歆死遂哀號水漿不入口七日卒庠生阮之名妻袁氏太湖人夫亡哀號不食姑年老泣曰若汝殉吾子吾將何依相持悲感氏遂忍死奉姑姑沒遂痛哭數日卒韓鼎應妻劉氏懷寧人值亂舅姑殯于庭賊疑棺內有藏將欲剖視劉伏棺號哭有女年十三賊數盼之劉曰但得汝不驚吾先柩女非所惜也賊攜女去門外有池劉目女其女投池死賊怒殺劉詔建二坊旌表劉若宇妻吳氏懷寧人城破賊殺宇氏哭罵賊剜其雙乳而死劉餘謨妻阮氏懷寧人餘謨官給諌氏娩身方半日賊忽突至欲拽去阮叱曰我命婦肯從豺狼乎奪賊刃自刎賊怒並其兩幼子殺之何仲妻許氏懷寧人為賊所執大罵不屈被殺錢文炳繼妻顔氏懷寧人為賊所執大罵不屈被殺髙孝銘妻吳氏懷寧人為賊所執大罵不屈被殺張明煒妻遊氏懷寧人城陷賊執煒遊躍出曰幸釋吾夫即願身從賊遂釋煒遊睨煒行逺奮罵以頭觸地賊怒磔之汪世衡妻戴氏桐城人流賊掠之去氏抱樹詈賊賊怒磔之吳道震妻姚氏桐城人少寡守志賊至見執奮罵被殺死懷宗時旌王天璧妻郎氏桐城人流冦至躍入龍潭死璩伯崑妻王氏桐城人流冦至被掠厲罵不辱死汪之倫妹桐城人流冦至被掠厲罵不辱死龍氏女桐城人流冦至被掠厲罵不辱死諸生徐益晉妻石氏潛山人陷賊罵不絶口賊支解之汪澤妻胡氏宿松人陷賊不辱死徐行妻唐氏宿松人流冦執之詈曰我家世書香肯受賊辱乎賊殺之吳之瑞妻張氏宿松人冦欲汚之張紿免其夫與二子遂撞石而死劉之馥妻石氏宿松人冦縛之馬上氏自馬上倒下墮潭水而死余嘉臣女潛山人金學文女望江人黃之瑞女潛山人謝增新女潛山人葛修暗女潛山人熊應輝妻盧氏潛山人王自鑨妻陳氏潛山人朱家興妻余氏潛山人桂昌妻張氏潛山人王維寧妻嚴氏潛山人孫萬程妻徐氏潛山人金道全妻劉氏潛山人孫玉妻金氏潛山人戴昶妾毛氏懷寧人戴宗琇妻李氏懷寧人戴堯封妻劉氏懷寧人遊必常妻魯氏懷寧人髙升妻劉氏懷寧人徐憲武妻林氏懷寧人唐祖舜妻楊氏懷寧人劉若寬妻黃氏懷寧人張起鳳妻黃氏媳方氏俱懷寧人金汝賜妻黃氏懷寧人以上皆流冦陷城不辱死詹大啓妻何氏太湖人少寡撫孤世祥闖賊屠羅溪被執氏不屈賊磔之世祥負母尸投崖死錢鑣妻劉氏懷寧人亂兵劫劉出户劉紿以藏金在室得返以子授姑投身烈火死李秀野妻余氏懷寧人城潰火烈余以長子囑其夫自懷其幼子投火死方都韓妻吕氏懷寧人城潰韓救父為賊所執同遇害葉橒妻汪氏懷寧人城將潰母家迎汪出郭汪曰舅姑在義不容舍去冦至縊死陳自妻程氏懷寧人夫為賊所害程罵賊同死婢重貞時在流離棄已子而育程子焉劉蕃妻阮氏懷寧人小字女宗城陷蕃愴惶無措氏徐曰君子毋以我為念遂投池水死蔡復克妻江氏桐城人蔡家懷寧賊薄皖城氏自母家奔回百里省姑城陷被執厲聲罵賊支解死王曰善妻左氏桐城人早寡苦節流冦至縊死夫柩旁崇禎時旌張秉文妻方氏桐城人名孟式字如耀工詩善繪事崇禎己卯隨秉文宦山東流冦至秉文殉難方率妾楊氏陳氏同蹈後河死有恤典汪氏女桐城人家樅楊冦至投蓮池死林見妻張氏潛山人避冦虎頭寨賊攻急氏語見曰寨旦夕必破汝善撫諸子遂投巖死房甲妻陳氏懷寧人冦舉刃斫甲氏以身承之面項受重創賊怒復加刃氏手握其鋒四指俱斷賊竟殺甲氏經日復蘇遂為廢人終吳宗孔母胡氏懷寧人流冦執其姑氏奔出抱姑痛哭同遇害顔某妻劉氏懷寧人左兵焚掠氏出避見男婦雜行慨然曰婦人保姆不在義不出帷敢亂奔乎遂投江死黃輔時妻陳氏媳婦張氏孫媳丁氏俱潛山人輔時早逝氏撫遺孤朝屏課書授室生孫四廷耀廷才廷焰廷獻朝屏又殞媳張氏毁容勵志與姑相守冦至不辱張遂遇害有司奏聞以一門全節旌其門廷才郡庠生妻丁氏避冦白巖寨寨破賊欲劫之丁大罵抱子墜崖死戴君德妻沈氏媳盧氏及兩女孫俱太湖人流賊陷城同赴水死操髙極妻聶氏潛山人丁一驤妻石氏潛山人庠生陳鉉妻胡氏潛山人吳之雅妻楊氏潛山人劉瓊妻張氏潛山人熊繼妻某氏潛山人夏贊妻王氏潛山人桂明命妻黃氏潛山人汪啓臯妻江氏潛山人崔勝濬妻王氏潛山人吉天助妻張氏太湖人胡翥鸞妻余氏太湖人陳所學妻唐氏太湖人章於國母蔣氏太湖人方訓義妻程氏太湖人沈文樞妻蕭氏太湖人李開妻余氏宿松人張瓉妻劉氏宿松人張某二女宿松人王登妻李氏宿松人吳旵妻殷氏側室陳氏俱宿松人袁洋妻何氏媳周氏俱宿松人以上皆被賊執罵不屈死黃之正祖母王氏太湖人城陷氏與媳劉氏匿儒學內賊索得之氏躍火中媳赴泮池御史黃澍疏云王死於火節比崑岡之玉劉死於水身染芹藻之香詔旌之方氏女太湖人父為冦所執女請身代得釋度父行逺氏投清水塘死殮時得懷中詩云我本蘋藻器遭落戎馬間沉寃無訴處清水與青天其死蓋豫定云劉允若妻蕭氏望江人曹某妻徐氏望江人甘尚珍妻袁氏望江人俱遇流冦被執不辱死國朝雷永祈妻汪氏太湖人明季城破被執不辱遂遇害順治八年旌表廪生江逈妻夏氏名誥桐城人逈應試江南卒於邸誥聞其訃水漿不入口櫬歸仰天一慟而絶順治十五年旌表髙氏女桐城人許字王家俊夫亡衰絰奔喪設主於室遂守貞以終康熙年旌表陳朝棟妻方氏桐城人氏生二子舅妾無子抱他人之子立為已後翻奪氏之産以去氏未嘗與較余宣妻馮氏太湖人年十九夫亡撫二子之吉之星成立後之吉娶詹氏吉亡詹嘔血死之星生子旦娶王氏被賊冦執自刎邑令詳旌其門汪興之妻嚴氏太湖人年二十四夫亡不食向族衆泣拜哀求葬夫祖墓夫之祖若父未葬者並求葬之隨姑祭於墓畢先歸自縊周嘉聘妻何氏懷寧人左兵變嘉聘負重創氏罵賊不絶口遂并兩女俱遇害龔自成妻蘇氏廣東惠州人成娶歸潛山復逺遊有暴客忽突入欲汚之氏力扼其吭大呼鄉鄰奔赴暴急嚙氏臂因得逃氏遂嘔血絶粒死邑令往驗之臂上傷痕陡起其齒迹宛然時當暑日午氏所居三里內忽風雨隂霾驗尸畢即止康熙十一年題旌暴論如律方才妻田氏宿松人年二十二歲夫病死矢志守節已歷九年有第三伯方德遊蕩廢産逼氏改嫁氏拚死不從自刎而死雍正九年旌表林茂芝妻蔣氏潛山人夫亡服闋自經死汪氏女懷寧人父為農民女幼許字畢和和流落不歸家女待至二十八年有姦民畢三假托和名謀娶女聞自經而死束氏女桐城人生於農家許字江鐸未婚鐸死誓以身殉夫父母止之乘間引七首自刎父視其創未殊方謀救女女遽以兩指從創中斷咽而死時年十八祀烈女祠周經女桐城人許字陶亢宗婚有日矣陶沒女聞絶粒奈父母勸之食女遂絶口不言死屆婚期女闔户自縊祀烈女祠朱紹先妻虞氏望江人夫亡絶粒以殉何振伊妻宋氏望江人夫客死嶺南氏聞訃自經徐順貞望江人許字彭元元抱病聲啞彭父母願聽改適而女固持不可後彭竟絶婚女悲不自勝乘間謂其弟曰願汝善事父母遂自縊死孫瑛妻劉氏潛山人瑛省試歸覆舟溺死氏慟不欲生時因有妊數月姑及伯姒力勸乃止及産一女遂以頭觸柱昏仆於地勺水不入口七日卒孫天祐妻張氏太湖人年二十祐病即私誓曰設不諱當相從君地下及祐死斷髮納於棺隨引剪刺喉姑與母共強奪之自是勺水不入口乘間自縊死周芬熊妻光氏桐城人年二十一賦于歸僅八月夫亡氏殮葬畢絶粒七日不死以刀自刎端坐而逝顔色如生徽州府唐吳嫗休寧人黃巢之亂賊至嫗曰寧斷吾頭不可戕吾鄉賊怒殺之見白血駭去宋程氏女歙人方臘來冦女年十七不受辱罵賊死汪門二烈歙人汪福妻王氏汪承和妻吳氏姑媳也方臘冦歙姑自經吳為殮畢亦縊死朝旌雙烈元程趙妻鄭氏程旺妻吕氏俱歙人至正十五年冦亂吕負二歲兒敗卒欲掠之去鄭往救被殺吕大罵亦遇害知縣羅宣明妻蔣氏歙人冦起蔣被執力拒之賊怒斫其臂墜崖下死鮑琪妻吳氏歙人至正年遭亂不辱被害吳興祖妻吕氏歙人至正年遭亂遇兵不辱被害胡氏婺源人冦殺其夫欲掠之胡自刎明汪一中妻程人歙人嘉靖中一中官江西副使討賊遇害程號慟投井救出不死不食五日而卒詔贈淑人鮑大賔妻