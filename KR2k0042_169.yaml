body:
  text: 江南通志卷一百七十人物志藝術一江蘇松常鎮淮揚徐八府太海通三州江寧府後漢李南字孝山句容人少篤學明於風角永元中太守馬稜坐盜賊事被徵南特通賀稜訝之南曰旦有善風明日中時應有吉問旦日望景至晡乃有驛使賫詔書原停稜事南問其停留之狀使者曰度浦馬踠足是以不得速乃服焉南女亦曉家術為由拳人妻晨詣㸑室卒有暴風婦便上堂辭姑言已將亡因著其亡日如期果卒南唐吳廷紹為太醫令烈祖食飴喉中噎國醫莫能治廷紹以楮實湯進而愈馮延已苦腦中痛廷紹密詰厨人知平日嗜山雞鷓鴣投以甘豆湯亦愈羣醫叩之曰噎因甘起故以楮實湯治之山雞鷓鴣皆食烏頭半夏故以甘豆湯解其毒耳周文矩句容人仕南唐為翰林待詔工繪事精仕女後主令畫南莊圖後進圖於宋徐熙江寧人高雅閒放善畫花木蟬蝶禽魚蔬藥南唐後主嘗以熙畫為宫中供設謂之鋪殿花宋朱杰生而異相有隱德治人目如神針甫下而翳旋徹王生金陵人瞽而善聽聲丁謂守金陵王生潛聽其馬蹄聲曰參政日中必召拜相果如其言後真宗晏駕謂充山陵使王生來京師俾聽馬蹄聲曰有西行之兆諸子責曰爾知相公充山陵使有是說耳生出語人曰蹄西去而無回聲恐有他命後果罷相分司西京繼貶崖州劉虛白金陵人善相陳執中為撫州通判使者將劾之虛白曰無患使者果被召半道而去王益知韶州幾大拜還金陵召虛白問狀虛白曰當得一都官止耳益不懌以他事繫之已而益果終都官郎中元陳梅湖善皇極數受知於世祖凡遇推卜多以易數諷諫至江西宣慰副使或問何不為諸子計曰吾數非其所當傳且命貧賤令其粗知農事足矣明貝琳字宗器幼習儒精天官學被薦入欽天監正統景泰間從征占候有功成化戊子因災異條陳彌變圗治六事言多可采陳逺字中復遇弟永樂初為翰林待詔繪事精雅子孟顒善書周文銓字汝衡家金陵取內經本草難經等書務窮精奧診病立方多與衆殊嘗語其先輩顧璘曰醫非盛德莫能操其慮非明哲莫能通其說知物者巧知證者工知生者聖知化者神其持論精微如此丁毅字德剛江浦人路逢殯者棺下流血毅熟視之曰此生人血也止舁者欲啓之喪家不之信毅隨至墓所強使啓乃孕婦也診之以針刺其胸産一兒婦亦旋蘇蓋兒手執母心氣踣身僵耳針貫兒手兒驚痛開拳始娩通邑稱神著有醫方集宜玉函集蘭閣祕方國朝胡正言字曰從家居金陵嘗師法李氏登精研六書著有印藪篆草諸書龔賢字半千江寧人有隱操能詩章尤工畫僧大振劉琳俱上元人工畫談志學字習公江寧人工醫術尤精幼科全活嬰兒甚衆貧者不取值人皆德之鄭之彥字蘭巖江寧人少為諸生多病遇異人授以刀圭遂精於醫名振江左尹懷聖字安臣上元人有僧仲理菴者受學於異人凡分劑不膠古法懷聖從之遊得其祕要療治多竒驗貧者豫藥餌不責報云蘇州府漢吳泰能筮㑹稽盧氏失博山爐使筮之泰曰此物質雖為金其象實山有樹非林有孔非泉闔閭晨興見發青烟是香爐也語其處求得之三國葛衡字思真吳人明達天官能為機巧作渾天儀使地居於中以機動之天轉而地止以上應晷度晉張𢎞字敬禮吳人光祿大夫善正書子彭祖龍驤將軍善𨽻書王羲之每見其縑素尺牘輒取藏之南北朝宋陸探微吳人善畫得六法之妙生平愛寫古聖賢像顧寶先吳郡人琛之子大明中為尚書水部郎善畫法陸探微尤工行書卓越多姿褚允吳人年七嵗善棋及長冠絶當代齊褚思莊吳人以善奕名琅琊王抗第一品思莊與㑹稽夏赤松第二品思莊嘗與抗對奕自食時至暮一局未竟至五更方决抗睡於局後思莊達旦不寐梁張僧繇吳人丹青絶代嘗於金陵安樂寺畫四龍不點睛言點即飛去人以為誕固請點之乃點二龍須臾雷電破壁二龍忽失所在潤州興國寺苦鳩鴿棲梁汚穢尊像僧繇於東壁畫鷹西壁畫鷂側首向簷外鳩鴿不敢入其神妙如此顔協字子和吳人學書於范懷約藝過其師荆楚碑碣多其所書官至湘東王記室唐周廣吳人嘗師紀朋授祕訣觀人顔色即知疾病淺深不待疹候開元中有黃門自交廣回拜殿下廣曰此人腹中將産蛟龍即不能活上問黃門有疾否曰臣在大庾嶺渴飲路旁水今腹中堅如石廣以雄黃丸下之吐出物長數寸鱗甲備具陸東之吳郡人官著作郎少依舅氏虞世南𨽻行皆入妙品李嗣真云柬之學虞草體用筆則青于藍子彥逺傳父業授其甥張旭史維則字天問吳人工八分飛白二篆在唐以八分名家者四人韓擇木蔡有鄰李潮與維則也厯翰林學士卒張璪一作藻字文通吳人開元間官至祠部員外郎善畫撰繪鏡一篇言畫之要訣畢容見而驚異之嘗手操雙管一為生枝一為枯枿而四時之行遂驅筆得之一時號為神品楊惠之吳人與吳道子同師學畫見道子藝成恥焉更為塑工遂稱天下第一手石荆山吳人善琴為獨孤及所重每操琴以十合小豆為凖盡一升而移品姚兼濟吳人善琴得石荆山傳在揚州逢異人授以清風景雲等五調世傳為廣陵散之遺音顧生吳人大厯中以畫游諸侯之門每畫先貼絹數幅於地乃持墨汁及諸彩色各貯一器生飲酒半酣繞絹走十餘匝取墨汁攤寫絹上次寫諸色乃以一長巾一頭覆於所寫之處使人坐壓生執巾角而栧之回環既遍然後以筆隨勢開决為峰巒島嶼之狀滕昌祐字勝華吳人工寫生尤長於畫鵝志尚高潔脫略時態朱景環吳人算術精妙設肆盤門驛貞明中廣陵王錢元鐐鎮吳景環上書云到任後當三十年安寧至天福辛丑記其事召問則曰算數定矣及期薨宋朱象先字景初吳江人善畫馳名元符間蘇軾嘗題其畫云景初能文而不求舉能畫而不求售自言文以達心畫以適意而已故妙入自然趙伯驌字希逺千里之弟嘗畫姑蘇天慶觀進呈孝宗仕至觀察卒葬支硎山周必大為神道碑李珣吳人善律厯紹聖二年曽肇在滁命珣為漏壺以順晝夜一郡則之何充吳郡人工寫貌擅藝東南毛松崑山人善畫花鳥子益乾道間畫院待詔益子允升景定中畫院待詔皆工寫生能世家學胡舜申其先由績溪徙吳舜申通風土陰陽之術世所傳江西地理新法出於舜申嘗行郡四郭而相之以為蛇門不當塞作吳門忠告一篇葛應雷字震父吳人精於醫嘗著醫學㑹同二十卷推五運六氣之標本察陰陽升降之左右其說為詳核時按察判官李某中州名醫也因診父疾復咨於應雷聞其論父子相顧駭愕曰南方亦有此人耶乃盡出所藏劉完素張從正書與之討論無不吻合張之學盛行於江南者從此始由平江醫學教授遷江浙官醫提舉元朱圭字伯盛崑山人善書法凡三代金石刻靡不極意規倣久悟於石鼓嶧山碑之法纂舊書印并自製附焉讀書十年不下樓楊維貞作方寸鐵志唐杲字德明平江人伯父朴嘗過張秋值大疫為藥貯大盎飲之所活數千人杲未冠名聞四方有衛指揮妻立則如常卧則氣絶欲死杲言是為懸飲飲在喉間坐之則墜卧則壅塞諸竅不得出入而欲死也投以十棗湯而平王某吳人業髤漆至正間嘗以牛皮製一舟外飾以漆解卸作數節載至上都游漾灤河中觀者異之又嘗奉㫖造渾天儀可以折疊便於收藏其巧出人意表為營匠提舉明趙原字善長吳人畫師董源甚得其骨格明初召天下畫士圖厯代功臣以應對不稱㫖坐死范暹字啓東崑山人有孝行善畫花鳥永樂中入畫院供奉三十餘年博識雅淡為館閣名公所重沈宗學字起宗長洲人博學善書能作徑尺大字詹同評其書兼歐虞顔栁有冠裳珮玉氣象精醫所著有本草發揮等書子貴成字志道亦博學能書劉觀字士賔長洲人世以醫名永樂初擢御醫賜居第凡中外大臣有疾多命往治孫倫成化中為御醫又沈以潛吳誠施宗文盛繼者俱以醫著名於時又有錢瑛陳公賢俱世傳顱囟術吳下小兒醫推錢氏陳氏云沈遇字公濟吳縣人善山水水墨淺綘深色種種能之晚喜寫雪景世尤珍重盛啓東吳人名寅以字行少從王賔學兼授醫術某太監患腹鼓啓東設劑而愈太宗狩西苑太監病新起往觀焉上驚其得生乃以啓東對即命入見授御醫東宫妃病衆醫以為胎而久不産命啓東診視疏方皆破血劑東宫怒不用數日病益急復召診之曰必用臣當如前藥服之而愈蒯祥吳縣人為木工能主大營繕永樂十五年建北京宫殿正統中重作三殿及文武諸司天順末作裕陵皆其營度能以兩手畫龍合之如一每宫中有修繕中使導以入祥略用尺凖度若不經意既成以置原所不差毫釐初為營繕所丞纍官至工部左侍郎食從一品俸憲宗時年八十一猶執技供奉上每以蒯魯班呼之倪維德字仲賢吳人世以醫名維德少取內經研其奧㫖曰醫之道盡是矣病大觀以來多遵裴成和劑局方故方新病多不相值後得金季劉完素張從正李杲三家書讀之知與內經合自以所見不謬出而用藥如神每言劉張二氏治多攻李氏惟調補中氣隨世推移不得不爾也朱鶴字松齡吳縣人工行草圖繪尤深於篆學印章之文刻畫精工旁及雕鏤小玩罔不稱絶今簪有朱松齡者蓋即以其字稱之子稚征字三松雕鏤益竒巧興至始為之一器嘗厯嵗月乃成觀者如市性嗜酒酒酣興發輒作灞陵風雪圖以寄蕭颯之致盧志字宗尹崑山人精素難諸家之書官太醫院判武宗南巡召志志趣告諸大臣言冬得夏脉於法不治願定皇儲以安國本侃侃關宗社大計尋致仕嘗與修本草著有醫學百問等書子楩嘉靖間進士王綸字理之崑山人以薦預修武宗實録詩畫為沈周入室弟子尤工篆𨽻楷法㑹修闕里文廟撫臣以禮聘往穹碑大額皆出其手許初字復初吳縣人以貢授教職書法師二王尤工篆籀纍官漢陽通判陳天定字定之長洲人儒雅善畫喜元理家多名幅故花草翎毛人物絶勝山水宗沈周陳暹字季昭吳縣人善設色山水人物以畫名者六十年周臣字舜卿吳縣人學畫於陳暹而益工六法其圖像大小古靣竒妝綿密蕭散皆有意態纎穠麗冶為世所賞卞文瑜字潤甫長洲人工畫山水不名一家生平無定居爐香茗碗到處自隨吳偉業九友歌有晚年筆力凌滄洲幅巾鶴髮輕王侯之句壻俞絲字言如亦以畫名邵彌字僧彌長洲人畫山水極古秀之致書法歐虞殁後人爭購之所著詩名頤堂集吳偉業畫中九友歌云風流已矣吾瓜疇一生迂癖為人尤童僕竊嘆妻孥愁瘦如黃鶴間如鷗煙驅墨染何時休尤求字鳳邱長洲人仇英壻也以寫人物擅一時嘗畫揭鉢圖天人帝釋羣鬼阿難各極變態見者或起栗女適周牧夫婦皆工繪事支鑑字汝同崑山人工書法蠅頭蟬翼具有尋丈之勢至豐碑巨碣莊嚴卓偉無異小楷戲作叢篠澗蒲蒼翠欲滴寫生家寶之沈貞字士怡崑山人精醫學以傷寒難治取仲景論為本而採李浩或問郭雍補亡由漢而下凡論傷寒者集為傳名傷寒㑹通能補仲景之未備繆希雍字仲淳常熟人好談古今成敗事如指掌不以醫名而醫輒竒效又喜形家言著本草經疏葬經翼時周維墀崑山人字仲肅幼嗜學得咯血疾棄儒業醫從希雍遊盡得其傳授太醫官顧聽字元方吳縣人精於字學趙宧光纂說文長箋聽相與訂考其摹鐫刻印章為海內冠又造漏壺算刻度數不爽毫髮馬士鯉字雲逵吳縣人精石刻四方名公所書碑碣必屬士鯉刻之天啓中為魏璫建祠立碑敕士鯉鐫刻士鯉聞而宵遁繼而魏大巾被逮過吳門周順昌欲以女字其孫倉卒無媒士鯉遂通兩姓之好大中榜掠坐贓士鯉四方奔募歸其子輸官王綦字履若吳縣人工繪事寫山水花鳥俱蕭閒靜逺性狷介杜門以畫自娛兼供晨夕不窺户外一步國朝王簡字維文吳縣人精於吳道子寫生術下筆鬚眉逼肖康熙初召入供奉恩賞甚渥張宏字君度吳縣人畫山水蒼徑有致沈皓字朗倩吳縣人畫清逺可愛亦能書善詩王翬字石谷常熟人工畫幼摹一二名蹟王時敏見而竒之邀至西田别墅盡發所藏相與探尋業大進而名起嘗奉詔繪南巡圖年踰八十猶磅礴不衰同里楊晉字子鶴嘗受筆法於翬烟林清曠尤工村莊景物亦與翬同繪南巡圖吳厯字漁山常熟人性簡淡自逺彈琴詠詩寫山水皆有高韻與婁東王時敏極相傾慕晚年絶人泛海莫知所終顧聖之字德鄰吳縣人父顧道人工於製硯人稱之為小道人所製硯皆倣古式朴雅可玩子死媳獨擅其㙯者二十餘年欽楫字逺猶吳縣人洞徹經史放志自適寓居僧舍終身不娶寫山水饒秀韻顧樵字樵水吳江人畫入能品每槖筆游山水圖而咏之流連忘返高簡字淡游吳縣人畫清曠得倪瓚法亦能詩黃鼎字尊古常熟人寫山水蒼古秀潤自稱獨往客何萬年字永錫長洲人善推星命决人休咎得失多竒中韓菼為作傳陸漻字其清吳縣人博聞汲古家多藏書手抄幾及千卷有朱存理錢榖之風精賞鑑三代秦漢器物及唐宋而下書畫名蹟四方士大夫之好古者莫不就漻是正焉松江府宋李甲字景元華亭人善作翎毛有意外之趣蘇軾題其畫謂郭忠恕後一人米芾畫史皆稱之元曹永字世長知白子華亭人工八法正書學鍾繇行草學二王又同邑章弼字拱辰未十嵗能作榜署大字長益有名沈光明華亭人先世受術於龍樹師目疾內外障七十二種悉能療之光明世其學名益盛陸怡華亭人善醫鄰人一夕溘死怡取馬櫪去底置大釡上舁死者內之蒸以葱藥及旦皮腐而氣復大德間召至京師賜號悅道處士徐復字可豫華亭人精靈樞素問諸書其治病常審南北察彊弱而緩急投之故百不失一嘗療楊維貞危症有歌紀其事吳鍾山不詳其名家於華亭鍾賈山遂以自號善太乙九宫諸算術有竒驗楊維貞有數說皆稱述之沈瑞華亭人得畫法於黃公望嘗為楊維貞作君山吹笛圖木石幽潤山水清逺人物器具㸃綴絶工又同邑曹煥章善寫生往往逼真嘗寫席帽山人王逢像陶宗儀騎牛及濯足圖明陳璧字文東華亭人得書法於長洲宋克篆𨽻真草流暢快健洪武中以秀才徵官州判郡人學書者皆宗之相禮字子先華亭人能詩善畫尤精於奕洪武中召至京師厚賜遣歸劉基嘗以文贈之徐樞字叔拱華亭人復子洪武末召為太醫院御醫屢奏竒績厯遷院使宣德初告歸展墓宣宗親賦詩送之子彪亦以醫名朱孔陽華亭人永樂初求四方能書士寫制詞孔陽被選又書大善殿榜稱㫖授中書舍人北京宫殿成皆命孔陽題榜兼善山水寫楊士竒歸田圖人稱絶筆纍官至順天府丞子奎亦工書能詩楊青金山衛人永樂初以瓦工役京師內府屛墻著堊有蝸牛跡色若異彩成祖顧視問之以實對成祖嘉之後營北都宫闕使為都工青善心計凡制度崇狹材用多寡悉稱㫖事竣由營繕所官特遷工部侍郎沈景暘華亭人善卜永樂中召至京師命布卦問英國公張輔征南事曰此大勝之兆時正午當得捷音至時飛檄至報安南平上大悅賜鈔幣章瑾字公瑾華亭人能詩善草書尤長於畫有寒山拾得像及春江送别圖皆不愧古人何全字廷用華亭人自宋元來世以醫名全領正統丁卯鄉薦不徙故業益精其術每以匕劑起沉疴無責報意姚蒙字以正華亭人善醫術得祖父之𫝊尤精太素脉定人休咎若符契巡撫鄒來學召視脉蒙曰公根器别有一竅出汙水來學大驚曰此隱疾何由知蒙曰以脉得之左關滑而緩肝第四葉有漏通下故也張誼字履道青浦人好談易善占氣候倭冦入境適至袁氏山莊出望雲氣拉主人疾走亡何賊突入見空廬乃去時有友留啖檳榔力辭曰蓍逆不敢泊也解維不十里友果被創孫克𢎞字允執華亭人尚書承恩子少敏慧博涉羣籍書倣宋克尤工八分畫善寫生花鳥竹石無不臻妙厯官漢陽知府浦澤字時濟上海人少從詹事陸深受書法能窮古人波磔之妙嗜酒好眠或一二日不起人呼小癡時華亭張德讓同邑張電亦受書法於深與澤同名宋懋晉字明之華亭人少學畫窮日夜臨摹古蹟已從嘉興宋旭受學參以宋元遺法自成一家其弟子同邑沈士充字子居名最盛顧從義字汝和上海人嘉靖中詔選善書者入殿直應試稱㫖授中書舍人直文華殿擢大理評事楷書行草宗鍾王徑尺大字仿顔趙著法帖釋文考異趙左字文度華亭人畫宗董源兼有黃公望倪瓚之意同時丹青家以氣韻為士林所珍賞者左與同邑吳振稱雙璧焉又有上海方叔毅善畫人物神氣生動國朝葉有年字君山上海縣人善畫山水明末肅藩聞名禮聘至秦繪圖築園名勝甲於八郡歸隱石筍里購畫者無虛日卒年八十朱軒字韶九婁縣人少學書於董其昌學畫於趙左嘗謂古以畫為寫必以書入畫始佳郡中士大夫得其片縑咸寶之李中梓字士材上海人有文名善醫屢療危症皆奏竒效所著有頤生微論內經知要諸書劉道源字公原上海人與李中梓為中表因習醫盡得其妙所著有醫案心印症脉合恭等書子貞吉舉人為教諭亦精醫術陳履熙字穆如華亭人善醫嘗遇異人授藥草一篋技益神有病已絶及死二日者履熙決其可活灌藥入口遂得再生何汝閾字宗台華亭人世精醫學汝閾尤多祕方活病者萬計子嗣宗繼其學有名潘光宗字耀先華亭人世瘍醫光宗尤療治若神貧者不受酬或資以參藥無不立愈提督張雲翼病衆醫咸集禮聘光宗一診而出不復往果不起沈璠字魯珍上海人上海名醫故有李劉徐沈四家璠最後出名特著顧昉字若周上海人初至京宋駿業集名手繪南巡圖令王翬總其事昉得其祕遂以擅稱黃楷字端又南匯人畫筆清拔尤工傳神時有虎頭之目常州府南北朝齊蕭子雲字景喬蘭陵人子範弟有文藻善草𨽻厯遷侍中尺牘之美逺流海外百濟國嘗使人至建業求之梁蕭賁字文煥南蘭陵人有才學能書善畫於扇上圖山水咫尺之內覺萬里為遙終湘東王法曹參軍唐許印宗義興人初事陳為新蔡王參軍栁太后病不能言諸醫莫能療印宗請以湯薰之如言果愈仕隋及唐纍遷散騎侍郎時關中多骨蒸病得之必死印宗每療無不痊丁謙宜興人工畫竹及花草品格清逺見重於世五代董羽常州人善繪龍水海魚事李後主為翰林待詔清涼寺壁有羽畫及元宗八分題名李蕭逺草書稱寺中三絶宋僧居寧毗陵人工畫草蟲名稱籍甚嘗醉畫水墨草蟲長四五寸者筆力尤徑俊梅堯臣贈以詩甚稱之曹仁希字企之毗陵人善畫水為驚濤怒浪以至輕波細縠一筆之間自分深淺為古人所未及吳炳毗陵人工畫折枝花鳥紹興間為畫院待詔賞賚特厚許迪毗陵人工草蟲師僧居寧作黃花紫菜妙臻神品於清言晉陵人工畫荷花寧宗朝進所圖荷花障特授承節郎孫務道世其學有名元世明徐孟曽武進人善詩以醫世其家永樂間召至京賜襲衣弟孟恂工砭法時稱二仙蔣子成宜興人善畫山水人物其水墨大士像尤為世所珍永樂間徵入京師與同時趙亷畫虎邊文進翎毛並推絶技王玉字汝瑛宜興人成化末舉名醫𨽻太醫院𢎞治初每用藥有竒效寵賚甚渥纍官通政使有醫案傳世吳傑字世竒武進人𢎞治間以名醫徵至京師都御史王鉞方鎮大同聞傑名以調治邊軍請臺省爭言醫如傑當在供奉不宜出之邊地下禮部試之果無逾傑者薦入御藥房後療武宗疾屢奏竒效擢御醫至太醫院使子希周由進士官給事中惲本初字道生武進人少為諸生工畫山水以貢授中書舍人國朝唐宇肩字若營武進縣人性孝善書法家貧賣字以供甘㫖與郡中惲格畫並珍於時屠逺字帆輕武進人博學能詩尤工畫山水蘭竹同邑陳儀字象彩詩詞筆墨與逺伯仲周榮起字硯農江陰諸生能詩文工篆書尤精繪事論者以為得米家精意女禧亦工詩畫片紙殘縑為人寶貴同邑有高方者字義立亦工書邵曽復無錫人畫花鳥師惲格人耿介亦似之鎮江府宋孫守榮一名高榮世居富春因自號富春子後居京口病瞽遇異人授術以音律推五數播五行萬物終始盛衰一於音决之周坦未第時坐市肆厲聲詬僕守榮揖曰狀元何怒也周不答後果廷試第一或持金玉請辨其色摩挲之美惡立判其神竒類此明徐景暘善吟詩通繪事一時賢公卿皆與之游有薦於朝者以母老不仕宋學士濓作畫原以贈焉何淵字彥澄丹徒人精於醫徵𨽻太醫院仁宗禮遇極隆欲官之不受給太常寺正卿俸錢原濬字彥深丹徒人通醫術著集善方三十六卷錢寶字文善原濬曽孫工行楷精醫術著醫案運氣說復齊集蔣曉字東明丹陽人世業醫偶從黃冠賣卜者游得其保幼一編治疾竒驗有王氏子方周嵗忽不乳食肌肉盡削醫疑為疳曉曰此相思症也衆嗤笑之曉命取兒平時玩弄之物悉陳於前有小木魚兒一見喜笑疾遂已蔣守成字繼之丹陽人畫法吳仲圭趙千里游文徴明父子間煙雲竹石盡其妙何應璧字繼充丹徒人性頴悟貫穿醫書數千卷貧者病濟之藥更助以資鎮江良醫稱何氏又有何爌字仁源亦不計後酬報能起危疾國朝祁嗣籙字肖虛鎮江崇福觀道士精針砭多祕方治諸異毒無不立效毛一駒字子千少習經史尤精數學名公巨卿屢物色之托疾弗起卒茅山中子翥字際生傳其術淮安府南北朝徐秋夫鹽城人仕至射陽令工醫善針灸嘗夜聞鬼聲呻吟甚苦叱問之曰身是斛律斯雖死患腰痛聞君善醫求拯拔秋夫曰汝鬼術何從施曰以草束形呼我名治之如其言下二針設祭埋之夜聞鬼來謝云疾已愈時謂其術能通神宋衛朴楚州人病瞽精於律凡古厯算數命書過耳一讀即能暗誦熙寧中撰奉元厯亷布字宣仲山陽人自號射澤老農畫山水尤工枯木藂竹師蘇軾而得其神官至武學博士元趙清澗淮人工畫人物士女揚州府宋桑景舒高郵人善聽百物蟲鳥之音以占災福又精音律嘗製虞美人曲對花奏之花動搖不止杜嬰字太和真州人好讀書精醫術無貧富貴賤請之輒往與之財非義輒不受時時窮空而曠然無纍於物善言性命之理王安石嘗云每與杜君語久而不厭卒後作詩傷之稱其接物能齊物勞身耻為身云陸仲仁高郵人精繪事嘗畫三高圖獻鼂以道徐仲堅真州人隱於筮遇人至謹雖疾病召之筮不正衣巾不見能為詩亦好屬文多為賢士大夫所知有集若干卷元王仲明江都人善醫平章亷希憲疾世祖召仲明治之未即行人強之曰君能起亷相國是惠及天下也仲明遄往投以一匕立愈欲官之辭不就明陳君佐江都人善方脉洪武初為御醫永樂間棄官著黃冠服市藥武當山中以易卜人吉凶多竒中滑夀字伯仁家儀徵性警敏醫名籍甚江淮間在淮南曰滑夀在吳曰伯仁氏在鄞越曰攖寧生著素問鈔難經本義十四經發揮皆行於世殷矩字度卿儀徵人家世名醫至矩尤精萬厯癸未嵗大疫至比閭闔門不起矩晝夜鱗次奔問所活數千百人皆不受餽遺時號為殷仙劉松泉儀徵人善醫術視疾無貧富悉奔其急每夜歸則舉所得藥金不篝燈視而雜聚之家人詰其故曰恐有豐嗇美惡作區别心不如渾也一日夜歸有偷兒穴壁而入即以所得金悉與之誡曰此足汝為活無復為也其人慙謝去晚年失子妻為買婢以進嚬蹙曰吾老矣奈何誤人少女製妝嫁之夀至七十餘一日沐浴冠服端坐而終李瞻字小塘儀徵人以眼科名大學士王錫爵兩瞳反背瞻令端坐置書於几用金針從腦頰刺之初撥曰見黑影矣再撥曰見行道矣三撥則筆畫朗然曰君其神授耶以千金謝瞻却不受某舍有茶僮火爆眯目瞻為縛僮於柱手探取其睛寸許洗之炭屑出而目愈著有育神夜光丸方蓮子金針鼠尾金針說今其書盛傳方新江都人父選字以賢精醫學有贏餘輒以給宗黨之困者新精奕有神解六七嵗時觀選與客奕語選曰客某道瑕可攻不信比收局客戲謂新曰童子知我瑕乎吾不畏攻也新再為布子如前不差一道指選攻之客大敗比丱角郡中人皆無敵手與海內稱第一品李時養奕初遜李一子翌日已雁行矣國朝唐志契揚州諸生精於繪事有元人風弟志尹精花鳥時稱二唐羅慕菴徽籍移家泰州精於醫著有醫宗粹言四十卷徐州府漢樊阿彭城人學針術於華他凡醫咸言背及胸臟之間不可妄針針之不過四分而阿針嘗入一二寸至胸臟乃六七寸而病者皆瘳夀百餘嵗三國朱建平沛人善相術鍾繇曰唐舉許負無以加也南北朝宋劉瑱字士溫勔孫少有行業文藻篆𨽻丹青並為當世所稱時有滎陽毛惠逺善畫馬瑱善畫婦人並為當世第一齊垣榮祖字華先下邳人護之從子善彈登西樓見翔鵠雲中謂左右當生取之於是彈其兩趐毛脫盡墜地無傷其妙如此終兗州刺史明李冠字公冕徐州人博學能詩文善𨽻書以醫名裴仕傑徐州人通儒書習陰陽之術永樂初徵與纂修古今大典仕傑以陰陽家預焉孟思賢沛人工繪事尤精泥金人物萬厯間召見命寫容稱㫖授錦衣衛千户姜居安沛之沙河鎮人以醫名時有貴官擕家過沙河稚子病居安令以沙一斗布舟中卧兒其上久之疾良已問其故曰小兒純陽當春月而衣被皆湖綿過熱故得涼氣而解宗文魁徐州人為瘍醫多竒效而性好施事母以孝聞袁貫徐州人精醫術有老狐貌為人詣貫治疾貫診之識其為獸狐告實與藥愈之有貧家婦以難産死舁棺往瘞血出於隙貫見之以為血鮮未死啓而治之復蘇國朝路可泰蕭縣人五嵗目盲為陰陽星候術數之學厯有神驗晚年學修煉於果老洞中崔嶽銅人精幼科著痘疹詳辨行世太倉州元宋尹文字文璧崇明人官應奉翰林文字嘗學琴於秋山徐氏指法精妙大德間魯國公主聞其名召至奏胡笳十八拍公主嘉歎賜金歸老精六壬遁甲之術推測亦多竒中明張觀字可觀嘉定人畫山水師夏圭馬逺又與盛懋吳仲圭遊故筆力古徑無俗氣陳光逺僑居安亭醫術神異所善客子以痘死擕槥將之野道遇光逺視之曰而兒不死吾當活之取沙遍壅其體命衆羣擊鉦鐃之屬觀者以為誕也有頃兒忽動尋活客問其故對曰兒苦水痘無力自達得土氣乃疏金為水母鳴則水應而出矣馬軾字敬瞻嘉定人精於占驗正統間以天文生從征粵中時賊勢猖獗督師董興猶豫欲請益兵軾見大星夜隕言賊平不過四旬之內宜速戰卒如其言陳嘉言字可彰崇明人由嵗貢為夀州學正工作花鳥神致如生人咸珍之朱禮字用和崇明人善籕篆楷書得顔柳法以能書薦授户科給事纍擢尚寶卿仇英字實甫太倉人工臨摹能亂真繪寫人物以及翎毛花竹無不精妙女號杜陵內史繪畫亦有父風吳震先字長卿太倉人以舉人為德安府通判精於䜟緯知明季數丁陽九喟然曰從今便高卧已負十年閒因作負半庵杜門著述周延儒強之出不應施文㑹字志學崇明人少為諸生尋以病廢學旁通潛虛術善聆人聲音以定吉凶厯厯不爽國朝傅璪字汝文嘉定縣人精於醫鄉人黃氏家疫延璪且至聞鬼相與語曰傅公來奈何一曰吾覆其藥耳已而藥輒覆黃語璪璪親持與飲遂起有沈太學妻死未殮璪曰此尸厥耳不死也治藥灌之應手而蘇海州宋徐易海州人善畫魚兼工雜畫弟白及族人臯皆以畫魚名通州明張榮字伯仁家如臯精醫好義嘉靖乙未邑駐兵禦倭軍中大疫賴榮治得起者無算隆慶末下邳治河臯人往役者疫死過半榮自請往治夫役俱架茅蓬卧地上榮匍匐入一一療之馮鸞通州嵗貢生精岐黃術為鄖西知縣民有疾具呈求方輒效上官及同寮逺近延之後歸解所得藥金遺諸子曰此從一部本草中來非官資也著醫學大成傷寒統㑹醫說補遺國朝陳若虛通州人也為瘍醫有祕授能起死著外科正宗袁璜張經俱通州人丹青集衆家之長為時所珍江南通志卷一百七十欽定四庫全書
