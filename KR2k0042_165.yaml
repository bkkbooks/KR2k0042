body:
  text: 江南通志卷一百六十六人物志文苑二松常鎮淮揚徐六府太海通三州松江府晉陸機字士衡呉大司馬抗子少有異才太康末入洛造張華華素重其名如舊相識叅大將軍成都王頴軍事表為平原内史頴討長沙王乂以機為大都督固辭不許機軍敗頴聴䜛說怒害之機歎曰華亭鶴唳可得聞乎機辭藻宏麗葛洪稱其文猶縣圃積玉無非夜光陸雲字士龍機弟六嵗能屬文性清正有才理少與兄齊名號曰二陸宰浚儀有惠政民為立祠歴官清河内史機遇害時并被殺所著文三百餘篇行世雲弟耽為平東祭酒亦有清譽同遇害時又稱三陸云陸喜字恭仲瑁子仕呉累遷尚書入晉為散騎常侍少有聲名好學有才思作言道訪論審機娯賓諸文近百篇宋陳舜俞字令舉自湖州徙華亭慶厯六年進士嘉祐中與蘇軾兄弟同舉制科博學强記軾稱其學術才能兼百人之器云林至字徳乆華亭人淳熙進士歴官祕書省為朱子門人著釋騷子革世其學元淩嵓字山英華亭人少習舉子業㑹宋亡即棄去一放於詩鎔意鑄詞駸㝷大厯間時流盛推許之有古木風瓢集行世王泰來字復元華亭人早以詩鳴當代由鄉舉入太學旋棄去放浪江湖至元中再徴不起後特命召見館於集賢禮遇優渥尋乞歸卒其詩多不經人道語曾遇字心傳華亭人博學敏文詞工筆札與王昭大詹潤徐順孫同游時稱雲間四俊由薦授湖州安吉丞明袁凱字景文華亭人少以白燕詩得名人呼為袁白燕洪武中以布衣拜御史上言令武臣聴講俾知禮數月託瘋疾乞歸讀書峯泖間毎騎牛往來好事者繪為圖自號海叟有集朱芾字孟辨華亭人詩思飄逸兼善翰墨清潤遒勁顧禄字謹中華亭人少力學才藻豔發工書法以太學生歴官王府教授嘗過鄱陽湖賦詩太祖覧而喜之盡進所作故其集名經進云邵亨貞字復孺祖桂子自淳安徙華亭遂為邑人博通經史贍文詞工篆𨽻有蛾術集全思誠字希賢上海人博雅𢎞粹宿負文名洪武中以耆儒徴授文華殿大學士尋請老致仕歸管訥字時敏華亭人九嵗能詩長師楊維貞友袁凱洪武中歴官楚王府長史事王二十餘年以忠謹稱所著有蚓竅集子延枝亦工詩金鉉字文鼎華亭人有孝行以親老固辭薦辟喜吟咏得古詩人風格書畫皆擅長時稱三絶沈度字民則華亭人永樂初以善書薦入翰林授典籍凡金版玉册必命度書之在内廷毎承顧問必以正對歴遷翰林學士度事親孝與弟粲友愛甚篤為人貞静温雅粲字民望亦以善書與兄同官翰林進大理寺少卿時稱大小學士云李至剛名鋼以字行華亭人少頴敏從楊維貞學為詩文有清思洪武中舉明經授祠部郎歴官叅議永樂初首發建都北平議為禮部尚書修太祖實録及永樂大典以至剛領之仁宗即位出為興化知府卒錢溥字原溥華亭人正統己未進士御試薔薇露詩大見稱賞特授檢討歴官吏部尚書卒諡文通溥文章贍蔚至老不衰四方求請者相屬凡五典文衡弟博字原博正統乙丑進士仕至四川按察使亦有文名善書溥子岡博學好古曹泰字時和華亭人景泰甲戍進士坐事廢以詩鳴於時鄉之學詩者多宗之所著有大聲集居邑之富林里時人語曰富林二曹一時人豪謂泰及其弟時中也朱應祥字岐鳯華亭人領成化丁酉鄉薦少有異質嘗從藏書家借文獻通考一册經日送還曰已徧覧矣試加摘問應答如響其家因盡出所藏借之於是學益閎富大篇長什肆筆立成錢福字與謙華亭人𢎞治庚戍試禮部廷對皆第一授翰林修撰詩文藻麗敏妙登第後名聲烜赫逺近以牋版乞題者無虛日周佩字鳴玉華亭人父輿字廷參由進士為編修有學行佩𢎞治庚戌進士歴官刑部郎中武宗時劉瑾擅政即引疾歸天性孝友晚喜讀易詩文典雅翰墨皆有法陸深字子淵上海人𢎞治乙丑進士選庶吉士品望為一時館閣冠嘉靖中以祭酒入侍經筵面奏閣臣竄易講章為當路所忌左遷於外乆之召入為太常卿歴詹事府詹事致仕卒諡文裕著述甚多皆博而核詞翰並工子楫字思豫亦有文名徐獻忠字伯臣華亭人嘉靖乙酉舉人授奉化縣令尋乞歸博學高才日讀書盈寸詩文兼工尤長於賦有白蓮羽扇諸篇為時傳誦何良俊字元朗華亭人由嵗貢謁選當事重其名授南京翰林院孔目未乆移疾歸博綜羣籍千言立就所著有何氏語林四友齋叢說董宜陽字子元華亭人工詩文善古人書法與何良俊徐獻忠張之象才名相亞有四賢之目張之象字月麓上海人由國學授浙江按察司知事以吏隠自命歸益務著述罕入城市莫如忠字子良華亭人嘉靖戊戌進士歴官浙江布政潔修自好以詞翰擅名尤工近體詩有崇蘭館集子是龍字廷韓十嵗能文才名高盛善書法以貢生終時上海顧斗英字仲韓才名與是龍埒人號二韓袁福徴字履善華亭人嘉靖甲辰進士授刑部主事與王世貞李攀龍宗臣同官有小詞林之號後謫官歸以著述自娯與同里舉人張大綸輩唱和王圻字元翰青浦人嘉靖乙丑進士授清江令擢御史忤時相謫外歴遷陜西叅議致仕歸築室松江之濵種梅萬樹曰梅花源惟以著書為事有續文獻通考三才圖㑹諸書行世人皆服其博洽董其昌字元宰華亭人萬厯己丑進士選庶吉士天啓初以侍讀學士纂修神宗實録詔褒美之歴遷禮部尚書崇禎七年告歸卒其昌天才俊逸書畫妙天下超越諸家行以己意乞文者得其手書以為二絶通禪理終日無俗言有容臺集陳繼儒字仲醇華亭人少工文與董其昌齊名三呉名下士争欲得為師友未三十棄諸生築室東佘山以著述為事短翰小詞皆極風致兼善畵户外屨常滿晚年臺垣交薦屢奉詔徴皆以疾辭時青浦施紹莘字子野以諸生隠西佘工樂府詞曲以才豔稱高承祚字天錫華亭人萬厯乙未進士選庶吉士授檢討文仿曽王詩亦高秀有知古堂集又青浦吕克孝官工部郎中詞翰兼工著有愧翁集徐方廣字思曠華亭人萬厯間為諸生負盛名沉深嗜學與人言某事出某書第幾卷第幾行無一誤者性狷介有門人餽遺甚厚唯取一剪刀為文精㣲研妙李流芳亟稱之唐汝詢字仲言華亭人五嵗而瞽父兄授以三百篇及唐詩無不成誦旁通經史工諸體詩箋註唐詩援據該博兄汝諤字士雅以貢歴教授亦博學工詩夏允彝字彝仲華亭人才學宏贍與同郡陳子龍等創幾社名重海内登崇禎丁丑進士除長樂知縣多異政南都失投淵死兄之旭字元初為諸生有聲子完淳淳字存古少有異才年十三作大哀賦文采宏逸陳子龍字卧子華亭人崇禎丁丑進士歴紹興推官舉天下亷卓第一擢給事中子龍才氣豪邁所著詩賦古文宗漢魏駢體精妙徐庾弗能過也門人同邑王澐字勝時才譽早著有入室之目子龍死澐收𦵏之徐孚逺字闇公華亭人崇禎壬午舉北闈博學工文倡幾社著有十七史獵俎諸編仕福州推官時幾社中以文名者如周立勲字勒卣顧開雍字偉南彭賔字燕又宋存標字子建郁汝持字子衡朱灝字宗逺朱積字早服章曠字于野張彦之字洮侯張憲字漢度韓范字友一陸慶曽字子元陸慶臻字集生盛翼進字隣汝徐桓鍳字朗公蔣雯階字大鴻袁國梓字丹叔或終明世或入國朝或仕或隠皆翹楚也李待問字存我青浦人崇禎癸未進士授中書舍人工文章兼精書法國朝李雯字舒章上海人工詩古文詞以諸生擅盛名父逢申官部郎死闖難雯時從在邸舍哀號行乞得具棺歛王師入燕都諸大臣素聞其才薦授内院撰文中書一時詔誥咸出其手宋徴輿字轅文華亭人順治丁亥進士以文章風雅著稱少與陳子龍李雯選訂明詩學者宗之督學閩中所拔皆單寒士有全閩詩選歴副都御史田茂遇字髴淵青浦人順治戊子舉人少受業於夏允彞以詩文雄壇玷㑹試京師與王崇簡魏裔介等相倡和授新城令不赴築水西草堂觴詠以老張一鵠字友鴻婁縣人順治戊戌進士為雲南推官詩文凌厲一時在滇與中州彭而述倡和尤多竒警之篇子起麟字趾肇康熙己丑進士官編修以文學世其家詩文俱有集金是瀛字天石華亭人文簡浄有法尤長於詩與王光承呉騏倡東臯詩社引掖後進甚廣盧元昌字文子華亭人諸生著述有盛名詩學杜陵有杜詩闡唐宋八家文選操選政數十年以夀終董俞字蒼水華亭人順治庚子舉人詩文與錢芳標齊名人稱才子推錢董云舉博學鴻儒至山東遇盜劫其裝生平著作在行篋中追索之被刃傷而返好游所至多吟咏兄含字閬石順治辛丑進士亦有文名稱二董子溶字晴川高才早卒錢芳標字葆馚華亭人明刑部侍郎士貴子康熙丙午舉北闈授中書舍人風神秀異弱冠即以詩名㑹舉博學鴻儒科撫臣薦為江南第一才人以丁内艱不赴呉懋謙字六益華亭人詩文與同里呉麒齊名時有雲間二呉之目生平多貴游所至名公鉅卿皆與結詩社人以明七子中謝榛比之所著有華平苧菴諸集呉元龍字長仁華亭人康熙甲辰進士選庶吉士改主事歴郎中舉博學鴻儒科授翰林侍讀預修明史奉親以孝聞子廷揆字賔門康熙癸巳進士歴官太常少卿才望甚著彭開祜字孝緒華亭人父彦昭官御史善詩開礻承家學聨諸名士為春藻堂文社以詩古文領袖羣英尤工儷體登康熙丙辰進士仕知州歸已老猶課文不已錢金甫字越江華亭人父昶有行義鄉里推長者金甫康熙己未進士授庶吉士又以博學鴻儒即日除編修盖異數也典試江西有知人鍳歴遷侍講學士卒官少負才藻工詩古文名盛一時尤篤師友之誼多隂徳有保素堂集戴有祺字丙章金山人康熙戊辰進士辛未廷對第一授修撰文竒古似栁州詩曠逹似放翁以左遷不赴歸築草堂縱意詩酒卒王原字令詒青浦人康熙戊辰進士由知縣擢給事中以詩文名既罷歸領袖騷壇郡中為古學者皆折衷焉以夀終周彞字策銘上海人康熙丁丑進士選庶吉士授編修主雲南鄉試初在太學祭酒王士貞竒其才教為詩古文遂有名在翰林凡纂修御書必與焉敦古道徒步𦵏其房師於石首典試歸下第者猶逺送數百里弟鼎亦有文名范纉字武功婁縣人太學生博學彊識於書無不窺搜擇祕奥問字至者揮麈應之不倦工書法善畫乞畵者例酬一綿衣毎嵗積數十襲以待冬月施貧者詩文與周稚亷齊名所至傾座周稚亷字氷持華亭人茂源孫㓜頴異日讀書以寸計才名籍甚嘗游浙中倡文㑹於西湖合千餘人題為錢塘江賦稚亷先成素紙疾書一座愕眙明日衆物色之已揚帆歸矣為國子生屢試被放牢騷以死所著詩古文詞藻麗精妙人謂夏完淳後身云常州府漢高彪字義方無錫人除郎中校書東觀數奏賦頌因事諷諫遷内黄令帝勅同僚祖送上東門詔東觀畵像以勸學者三國呉華覈字永先武進人以文學自典農都尉入為祕府郎歴東觀令領右國史與韋曜薛瑩等並撰呉書孫皓時屢陳便宜書百餘上皆有補益晉顧愷之字長康無錫人尚書左丞恱子博學有才氣善丹青圖寫特妙俗傳其有三絶才絶畫絶癡絶義熙初歴散騎常侍著有文集及啟䝉記行世南北朝齊邱巨源蘭陵人舉孝亷文學為宋孝武所知勅助徐爰撰國史又參詔誥後事齊終餘杭令梁蕭幾字徳元南蘭陵人年十五作湘州刺史楊公則誄沈約竒之謂不減謝莊之作歴新安太守郡中山水多為之記子清亦有文才蕭文琰南蘭陵人竟陵王子良嘗夜集學士刻燭為詩約一寸成四韻文琰曰此自無難乃與邱令楷等共打銅鉢響絶詩成皆可觀覽蕭子範字景則南蘭陵人為南平王偉從事中郎王雅愛文學士子範偏被恩遇使製千字文其辭甚美自是府中文筆皆使具草弟子顯好學工文武帝雅愛之歴官侍中著齊書六十卷子顯子愷才學似父終太子家令蕭立南蘭陵人年十七射策甲科遷殿中侍御史文學政事為臺閣領袖獨孤及序其文比之賈馬蕭孝儼字希莊南蘭陵人懿孫射策甲科除祕書郎從幸華林園於坐獻相風烏華光殿景陽山等頌武帝深賞異之唐蕭徳言字文行引之子明左氏春秋貞觀中歴著作郎𢎞文館學士與魏徴虞世南奉詔纂經史百氏帝王興衰事迹帝愛其書博而要賚賜尤渥晚節學愈若毎對經必祓濯束帯危坐詔授晉王經進祕書監年九十七卒諡曰博秦景通晉陵人與弟暐皆精漢書號大小二秦學者非經指授謂無師法景通仕至崇賢館學士暐復踐其官以漢書授沛王劉禕之字希美晉陵人思致華敏以文辭稱歴𢎞文館學士高宗召入禁中論次新書凡千餘篇又密與參決時政時號北門學士武后時累擢中書門下同三品掌詔令許景先義興人少舉進士神龍初詣闕獻大像閣賦擢拜左拾遺開元初與張九齡等同知制誥以文翰稱張說稱其屬詞豐美得中和之氣宋單鍔字季隠宜興人兄錫字君賜嘉祐二年進士明隂陽圖緯星歴諸書嘗修周處陽羨風土記鍔嘉祐五年進士博學明經著呉中水利書蘇軾録進於朝不果行後言水利者必宗之子發政和進士官太學録袁黙字思政無錫人嘉祐癸卯進士官司農簿獻無逸傳累遷河北轉運判官學問淵博士大夫以為師法弟㸃字思與元豐乙丑進士累官通判杭州知淮陽軍致仕㸃工詩蘇軾以為有驚心駭目之竒時號二袁沈初字子深無錫人熙寧癸丑進士元祐中尚詞賦朝廷以初賦頒為天下格傳至西夏夏人織以為文錦官象山尉入為國子直講孫覿字仲益武進人大觀三年進士舉制科歴官翰林學士吏部尚書以文學名世晚嵗待人益和厚里人有求詩文者皆忻然應之年八十餘屬辭命句少壯不及有鴻慶集傳世蔣璨字宣卿宜興人之竒從子少卓越不凡操筆成章以之竒䕃補將仕郎歴知平江臨安二府鋤刈强梗豪黠畏之善為詩同郡孫覿稱其竒麗清婉有景坡堂詩卷明王逢字原吉江隂人元至正中作河清頌臺臣薦之稱疾辭避亂華亭徙上海張士誠欲辟之不就洪武中以文學徴旋以年老止之有梧溪詩集包聖字師聖江隂人仕至岳州府同知號鶴洲野人有詩名與高啟楊基為詩友王紱字孟端無錫人博學工歌詩能書寫山水竹石妙絶一時性高介畵不茍作人投金帛購片楮輒拒不應永樂初以薦授中書舍人嘗隠九龍山自號九龍山人王逹字逹善無錫人嗜學博聞洪武中為國子助教永樂初以薦除編修遷侍讀學士為文章有典則援引證據必本于六藝作詩有唐人風韻晚號耐軒有耐軒集張籌字惟中無錫人元舉省試第一洪武中以薦授翰林應奉改禮部主事歴禮部尚書籌有文學記誦淹博歴代禮文沿革俱通曉後更定社稷祀典最當帝意張宣字藻重江隂人洪武初以考禮徴尋預修元史召對殿廷授翰林編修呼為張家小秀才年三十奉詔歸娶後坐事謫吕敏字志學無錫人與高啟徐賁等為十才子洪武初官教諭浦源字長源無錫人工詩洪武中舉求賢科授晉府引禮舍人又善畵錢仲益名允益以字行無錫人長於詩歌洪武中舉明經為本縣訓導擢太常博士預修高祖實録進翰林修撰後為王府長史雅好棊待詔禁垣成祖嘗呼為棊仙自號錦榭山人芮畿字惟瞻宜興人天資絶人讀書過目成誦嘗與友約于暗中摸碑别録以驗資力不錯一字為文豪邁俊逸舉成化丙戍進士官刑科給事中多所論列弟稷亦舉進士官給事邵珪字文敬宜興人成化己丑進士歴嚴州知府性頴㧞不羣為詩文有藻思嘗有半江㠶影落尊前之句人因號為半江先生兼工小楷草書卜同字從大宜興人成化乙未進士歴官湖廣僉事才華敏妙嘗偕諸僚宴集黄鶴樓憲長屬同為黄鶴樓賦尊爼間摛千餘言思如泉湧滿座竒之著有毅齋集呉學字遜之無錫人成化甲辰進士擢御史條上十事著為令出按河南勦流寇有功歴山東按察使請老歸博雅能詩尤工八法杭淮字東卿宜興人𢎞治己未進士歴右副都御史總督南京糧儲工詩五言尤勝有雙溪集兄濟進士歴官通政使亦能詩有澤西集弟諸生濓與祝允明文璧諸人為詩文友王問字子裕無錫人從邵寳逰以學行稱嘉靖戊戌進士歴官廣東僉事性至孝以父老至桐江乞養歸父歿不復仕築室寳界山讀書二十年不履城市工詩文善書畫卒年八十門人私諡文静子鑑字汝明嘉靖末進士知武定州多善政境内大治累官吏部郎中亦以父老乞養歸父歿歴進太僕卿季科字與登江隂人嘉靖癸丑進士官給事中有清望忤執政外補歴江西布政使年三十六即告歸養母有寄寄堂稿閑居鷗盟雪浪諸集袁舜臣字承華江隂人嘉靖甲子舉人學問該洽自天文地理厯律兵刑無不精究疾革握其兄手以古樂不復作為嘆又無錫張九方以舉人授汝寧府推官罷歸賣文自給才名甚盛有覆簣諸集鄒迪光字彦吉無錫人萬厯甲戍進士累官湖廣提學副使擅衡鑑楚士愛之罷官時年甫强仕治園亭慧山麓日與當世名公卿文士游宴其中有集三百餘卷子徳基字公履負不羈才工詩文書畵尹嘉賔字孔昭江隂人萬厯庚戌進士歴湖廣提學僉事以勞卒官有才名作江上竹枝詞深為名流稱賞有焚餘集同榜進士武進鄒之麟官工部主事亦工詩文兼善書畵蔣如竒字盤初宜興人萬厯丙辰進士崇正末以浙江糧道督漕入京卒贈光禄卿詩篇標格清蒼能自成家書法尤擅名又武進蔣紹煃歴官漢陽守亦以詞翰稱顧杲字子方吏部郎憲成諸孫雅負氣節詩文俱工書法得李邕神髓國朝顧宸字修逺無錫人明崇禎己卯舉人有文名蓄書尤富晚輯宋文選杜律註解莊冏生字玉驄武進人工詩古文兼繪事順治丁亥進士授檢討超擢贊善世祖章皇帝嘗臨幸𢎞文院見壁懸冏生山水稱善冏生適侍直命給筆札更圖以進冏生因畫駿馬以寓意上大悦撤御前金盌及衣二襲賜之旋陞右庶子兼侍讀卒鄒忠倚字于度無錫人順治己丑進士壬辰廷對第一授翰林院修撰詩古文皆沖和静細未幾卒子卿森字衡湘與從兄顯吉字黎眉並以詩詞繪畵名於時龔廷歴字玉成武進人順治壬辰進士好讀書類編天文輿地諸子百家書數百卷任湖州推官以剛正忤上官罷歸益肆力古學戚藩字价人江隂人順治壬辰進士以文名于時任陜西安定令日與諸生講學論文文風丕變唐徳亮字采臣無錫人順治壬辰進士自㓜沉潛唐宋八家制義雄灝自成一家風氣為之丕變官户部郎管通州倉卒於官張星瑞字玉符武進人順治壬辰進士歴刑部員外歸里後杜門讀書於十三經廿一史貫穿融洽詩古文詞皆擅長弟祖鎬字西京康熙甲子舉人任内閣中書癖嗜史漢才名兄弟相埒鄒祗謨字訏士武進人順治戊戌進士事母以孝聞讀書日記萬言工為詩詞曹禾字頌嘉江隂人康熙甲辰進士官中書舍人舉博學宏詞歴官國子監祭酒詩古文皆有名有文集行世周𢎞字子重無錫人康熙甲辰進士廷試第三人官侍讀學士有才學居家敦孝友尚亷讓杜門讀書不騖聲譽人無賢愚共推為長者陳維崧字其年明左都御史于廷孫由諸生舉博學宏詞授檢討修明史最善駢體能于徐庾外自闢町畦詩詞皆工麗居官四年時以魚鳥湖山為念疾革時猶吟斷句云山鳥山花是故人振手作推敲勢嚴繩孫字蓀友無錫人明刑部侍郎一鵬㓜孫六嵗即能作徑尺大字以詩古文詞擅名早棄諸生舉博學宏詞力辭不獲試日賦一詩而退聖祖特命授檢討盖異數也在明史館纂隠逸傳容與藴藉盖多自道其志行云著詩文集十二卷子泓曽善畵工詩顧貞觀字華封憲成曽孫由監生考授祕書院中書康熙丙午舉順天鄉試擢國史院典籍應制諸作宏麗似唐音長短句尤工得秦栁之意楊大鶴字芝田大鯤弟康熙己未進士累官左春坊左諭徳督學順天詩文書法俱工選輯古今詩文集數十種行世儲欣字同人宜興人早失怙率兩弟讀書常至夜分博通經史文譽赫然東南之士奉為宗工至康熙庚午始領鄉薦年已六十矣一試南宫不利遂絶意仕進杜門著書以老其門人多逹者有在陸草堂文集劉齊字言潔無錫人明光禄卿元珍曽孫康熙乙丑㧞貢古文時藝皆負盛名入太學教習三年足不渉顯貴門既歸汲古益勤從弟學洙字遜五康熙庚辰進士制義有名陸楣字紫宸詩詞皆清麗典雅尤長於碑版文隠居不仕六經皆有著述古今官制考一書尤所覃精邑中與楣相先後者黄漢臣黄夏生邵羲書皆工古文華商原秦樂天馬雲翎皆能詩孫祁雍字禮若明吏部侍郎繼臯元孫有名諸生間以嵗次充貢詩古文皆有竒氣康熙丙申廷臣以博雅薦徴疾不克赴謝方琦字應雲旭子康熙丙子舉人博學工詩古文性介直邑中有大利弊事毎引為己任同郡趙司農申喬雅相推重邵長蘅字子湘武進人少稱神童十嵗為諸生長工詩古文性坦易著青門集商邱宋犖序而刋行之趙熊詔字侯赤户部尚書諡恭毅申喬長子年十五以五經入泮戊寅選貢己卯雋北闈己丑舉進士臚傳第一侍直内廷因同官訐奏記注事削職仍留供奉戊戌以大臣子弟從軍肅州熊詔自備脚力運解羡餘毫不敢私申喬卒於官特㫖許熊詔扶櫬南歸歸未匝月亦以毁卒遺摺啟奏奉㫖復職平生撰述為世所稱鎮江府唐陶翰潤州人進士歴官禮部員外郎工詩以冰壺賦得名同郡殷璠評其詩云既多興象復備風骨三百年以前方可論其體裁丁仙芝曲阿人開元進士官餘杭尉居官清謹工詩郡人又有殷遥張潮皆以詩名蔡希周曲阿人開元進士歴監察御史弟希寂終渭南尉兄弟並有詩名儲光羲丹陽人開元中登進士第召中書試文章歴監察御史工於詩所著有詩集包融潤州人能詩與賀知章張旭劉眘虚皆有雋才號呉中四傑終集賢院學士二子佶何皆工詩世稱二包皇甫冉字茂政丹陽人十嵗能屬文與弟曽皆善詩天寳中相繼舉進士王縉表冉書記曽字孝常歴官殿中侍御史當時比張氏景陽孟陽云許渾丹陽人舉進士授太平尉遷監察御史歴睦郢二州刺史别墅在丁卯橋因名其詩曰丁卯集宋呉淑字正儀丹陽人從李煜歸宋薦授大理評事預修太平御覧文苑英華等書嘗獻事類賦百篇累遷職方員外郎時諸路所上閏年圖皆鑾儀司掌之淑言天下山川險要係國家急務請以圖上職方又令轉運使毎十年一畫本路圖以進從之淑純静好古工篆隸撰説文五義江淮異人録祕閣閒談等書蔡肇字天啟丹陽人從蘇軾游第進士歴仕至顯謨閣待制坐黨籍斥不用有丹陽集三十卷弟載字天任工詩以薦除承事郎建炎初李綱辟辦公事後屢徴皆稱疾不就陳從古字晞顔金壇人進士歴知衡饒信州直祕閣力學工文著洮湖集霍篪字和卿丹徒人進士歴揚州推官舉亷吏累遷成都府路運判刻意古文尤長于詩有集周孚字信道自濟北徙丹徒讀書過目輙成誦日過書肆得盡閲天下書舉乾道進士終真州教授有蠧齋集三十卷李拱字應辰金壇人進士再中博學宏詞科歴官咸寧令詞學為後來之冠丁明字子公金壇人以特恩對策官修職郎生平無書不讀編事類讀史通考等書百餘卷卒鄉里私諡曰博雅先生譚知柔金壇人舉進士歴官通判邵州終祕書少監善為詩有華陽居士集艾謙字益之丹徒人再舉於鄉孝友天至有澹軒類藁易學理窟等書數十卷趙時侃字仲和宋宗室金壇人慶元中登第累官工部侍郎博聞强記明習典故所著有容齊筆錄睟盎録等書共一百三十卷朱叔珤字徳裕丹徒人刻意古學為京口七原畧倣桞宗元晉問其他擬古詩文甚多吕江字子恒金壇人八嵗能著文以漕舉任迪功郎主呉縣學所著有山中山外吟學者稱四平先生錢周材溧陽人七嵗能屬文鄉試第一登進士第由大理司直累官刑部侍郎終龍圖直學士時敏溧陽人敏慧善屬文政和年登第擢大理寺丞國有禮制皆令掌之累官敷文閣待制俞徳璘字宗大家丹徒魁鄉薦又魁浙漕元行省交辟皆不就性孝友好施予博學多識有佩韋文集十六卷輯聞四卷元楊如山字少游居京口為淮海書院山長著讀史說春秋㫖要及詩集若干卷郭畀字天錫丹徒人歴鄱江書院山長浙江行省辟充掾吏工書畵得趙孟頫法俞希魯字用中徳璘子丹徒人辟從仕郎歴官松江路同知學業淹貫金華宋濓推為先輩有竹素懸鈎二十卷聴雨軒集二十卷子圭長於古文洪武末為郡庠教授明戈鎬字仲京鎮江人洪武初徴至官禮部主事著鳯臺集張存字性中丹陽人洪武中嵗貢任江西安逺縣主簿五嵗能賦詩從劉基宋濓游有雪洞集行世丁禮字思敬丹徒人以耆年辟知南陽府躭吟咏工書札永樂中入覲獻周禮補註所著有郡志三餘集蘭室吟稿李熹字景豫丹徒人博雅能詩兼工書畵有遺世志著冰檗稿琴清集費誾字廷言丹徒人成化己丑㑹試第一選庶吉士歴官禮部右侍郎誾儀度閎偉善談論恥言人過孝宗臨太學賜坐講經甚加褒異為詩文清健有則所著有自考集貽笑集瀛洲竒處録向陽書屋稿補菴随録臨雍録楊炯字季徳丹徒人𢎞治己酉舉人敦古博學介然特立與人慎許可工為古文詞唐成字惟敬丹徒人詩有晚唐風著有天慵集京江遺響瓢稿等書俞桂字時芳丹徒人力學好古潛心於易與丁元吉友善同修郡志著霽野漫稿韋椿字大年丹徒人少頴異端静好學詩畫兼工外飭而中介不與時俯仰所著有考槃集自鳴稿答客言及史外别言曹大章字一望金壇人嘉靖癸丑㑹試第一殿試第二授編修敏於文毎于市囂處構腹稿歸而伸紙疾書之有文集二十卷鄔佐卿字汝翼丹徒人按察使紳之子兄仁卿嘉靖壬子舉人工為駢語令湘潭龍陽得士民心佐卿㓜負異禀充貢上春官忽謝去自稱丹徒布衣砥礪道義風化鄉人嘗客錢塘遇道士坐石上呼佐卿語期二十年訪我石室間自後佐卿多與人談長生間及兵畧及期赴道士約甫入僧舍忽端坐逝生平善楷書尤長豔體詩著芳潤齋集何文熙字景城丹徒人有文才閱書日以四五寸為度所著有左國註讀史緒言呉芊字蔓之丹徒人少窮經史為古文詩歌専師栁子厚以貢授休寧訓導陳永年字從訓丹徒人讀書傲然不可一世人以窮愁歸之者周旋弗倦詩在唐中晚間字畵亦名一時吕高字山甫丹徒人嘉靖己丑進士授户部主事累陞太僕少卿肆力詩歌古文之學嘉靖初與王慎中唐順之熊過陳束任瀚李開先趙時春稱八才子有江峯稿行世鍾鳴陛字中散丹陽人萬歴壬辰進士知永城縣陞户部主事以争國本事謫天啟中贈光禄寺丞鳴陛少負才名文章本經術今惟傳其制義孫雲翼字禹儉丹陽人萬厯辛卯鄉舉知彞陵州文工齊梁體有清暢齋駢語鰲陽漫稾橘山梅亭四六註行世眭石字金卿丹陽人萬歴辛丑進士官檢討工古文詞操筆數千言立就時宫中有郭貴人者其母眭也以甥舅禮請通石不可曰六世而袒免吾家去趙州越六世矣何能序昭穆耶貴人㝷卒詔究所賜寳履親屬有波累者人皆服其先見有東蓀集陳應昌字克彛丹徒人謝去諸生業從事天文地理律歴旁及太乙六壬竒門之學以占候罔不竒驗御史張國維聘修三呉水利全書餘所著書甚富燬於火曹廷傑字去非丹徒人家貧足跛坐卧一小閣酒後搦管立草數千言家人告薪水匱絶吚唔弗顧也天啟中楊忠烈漣糾逆閹二十四大罪疏草創於廷傑而削成於繆昌期後昌期陷獄廷傑遂杜門不出張明弼字公亮金壇人早負才望古文詩賦擅名一時崇禎丁丑進士知掲陽縣署杭州推官監軍平許都之亂歴官十年猶僦屋而居著螢芝集二十卷免角註十卷杜堇丹徒人字懼男工詩古文通六書畵山水人物草木禽獸神采流動人咸重之著有青霞亭集國朝張鳯儀字君表丹徒人少慕李贊皇張乖崕之為人熟精全史談論古人忠孝大節及成敗利鈍之故慷慨激烈如在其間者子九徴登第遺書誡曰入仕在自立母輕受人恩我為諸生三十年未嘗持一門生刺所見有王文成高忠憲其人乎外此無可北靣者其高自期許類如此蔣超字虎臣金壇人順治丁亥進士一甲第二授編修辛卯主浙江試陞修撰督北畿學政事竣疏陳十事如禁長吏笞辱諸生酌復進取舊額多見施行超性亷静博學强記手録書數百卷所著有綏安集賀裳字黄公丹陽人少以諸生入太學與張溥楊廷樞友年三十始為古文詞發所藏書讀之無不該洽有少賤齋集載酒園詩話馬世俊字甸臣溧陽人順治辛丑殿試第一對䇿稱王者天下為家不宜示同異言論侃侃性朴素釋褐䇿蹇驢一老蒼頭攜宫袍随後士林傳為佳話敏於詞翰著匡菴集潘高字孟升金壇諸生工詩嘗賦詩送袁孝子駿極為同時人所激賞有南村集子玠亦工詩有雙清集句溪集呉頴字見末溧陽人順治壬辰進士授刑部主事嘗疏言律無正刑毋得刻深以意傳法其初詞既具毋得株引滋蔓深被嘉納遷郎中出知湖州所著有蓴羮堂集湖州志溧詩閭史時有瀬江文獻之目史鶴齡字子修溧陽人康熙丁未進士官編修充庚戍同考兼日講官起居注以文學書翰稱㫖屢荷恩賜乞假歸養卒階止七品頒諭祭𦵏盖異數云史䕫字胄司鶴齡子康熙壬戌進士授編修累遷至正詹事在館閣凡稽古禮文編纂著作之事推為巨手扈從北巡著扈蹕集典試兩浙著樟亭集分理河工著觀濤集祭告南海著扶胥集王錫祉字弓銘金壇嵗貢生篤行績學著孝經集解史論十二卷多前人所未發王汝驤字耘渠金壇人選貢任新津知縣詩古文皆清微刻露制藝苦心孤詣為時所推淮安府漢枚乘字叔淮隂人為呉王濞郎中王謀為逆切諫不納去之梁從孝王游七國既平景帝召拜𢎞農都尉以病免復遊梁梁客皆善辭賦乘尤高武帝即位以安車蒲輪徴之道卒枚臯字少孺乘子武帝召見使賦平樂館善之拜為郎以媟黷幸比東方朔等從巡狩遊觀上有所感輒使賦之受詔立成唐吉中孚楚州人始為道士後登宏詞科授校書郎歴翰林學士户部侍郎詩名列大歴十才子中趙嘏字承祐山陽人㑹昌中進士杜牧見其早秋詩有長笛一聲人倚樓之句咨賞不已因稱為趙倚樓官渭南尉所著有渭南集五代孫魴淮人善吟咏楊呉據江淮文雅之士駢集魴與沈彬李建勲為詩友官宗正郎有詩百篇宋張耒字文潛淮隂人弱冠第進士從蘇軾遊為蘇門四學士之一紹聖初以直龍圖閣知潤州坐黨籍謫官徽宗初召為太常少卿出知汝頴二州在頴聞蘇軾訃為舉哀行服當國者以為罪安置黄州耒筆力絶健於騷詞尤長嘗著論言作文以理為主人服其名言元趙篔翁字維清宋丞相鼎六世孫宋末遷淮為山陽人元延祐甲寅始設科取士篔翁首膺鄉貢第二㑹試第五賜進士授泗州判官後為總管中大夫補著雅樂卒於杭著有覆瓿集金原舉鹽城人善吟咏博通經史尤工楷書篆草弱冠為郡學録歴州郡守元末歸鄉後薦授南康令有雲谷集明成寧可字仲謐鹽城人志行高潔工篆𨽻善吟咏洪武初以監生授御史擢廣東按察使卒陳擇善字從之安東人能詩洪武中授御史有漣隠集金銑字宗潤山陽人正統辛酉舉人知蘄州以文學稱聘典江西試甄㧞得人擢充翰林編纂官遷廣信知府乞歸四方求文者相繼著有省菴集漫叟日録王貞慶字善用淮安人駙馬都尉永春侯寧子寧在戚里中以文雅著貞慶尤工詩名列景泰十才子中高雲字從龍山陽人成化辛丑進士歴南禮部郎中性沉静言動必循禮法尤長於詩公暇常閉門覓句或對客揮毫著有静齋集香奩百咏張素字元卿山陽人通五經大義尤長于詩成化己酉舉人授河隂令以清節稱致仕歸以文史自娯著有檜泉集叙姓千文續咏史詩咏物行世蔡昻字衡仲山陽人少頴異嗜讀書家貧不能致毎假之藏書家一覽成誦正徳甲戍廷對第三人在史館幾三十年有聲于時歴官禮部侍郎卒著有頤貞堂集楊于臣郡諸生谷裔孫英敏好學潛究經史百家著有神光兩朝淮郡實録及枝元集呉承恩山陽人性敏而慧博極羣書為詩文下筆立成清雅流麗以貢授縣佐未乆乞歸有文集孫榘字不踰鹽城人博綜經史舉崇禎癸未進士授上虞令下車三月政聲大著歸里後日與高士結侣討論詩文徜徉林壑以終著有亦園諸集國朝嵇宗孟字淑子山陽人天資頴異善屬文詞采壯麗由乙榜歴守杭州郡乞歸未乆薦舉博學鴻儒堅以疾辭著有立命堂集楚江蠡史諸編孫一致字惟一鹽城人父助以孝友稱鄉里一致少有異才順治戊子以㧞貢赴廷試當授推官不就甲午舉北闈戊戌榜眼及第授編修歴侍讀學士性恬澹嗜學以母憂歸遂不復出糲食藜羮展卷日哦詩宗杜甫兼出入王維孟浩然間著有世耕堂集李鎧字公凱山陽人少孤力學篤于孝友舉順治辛丑進士榜後益博綜羣籍歴知綏陽盖平二縣皆著循績康熙己未舉博學鴻儒特授編修分纂明史累擢内閣學士兼禮部侍郎甲申冬以疾告歸卒生平于書無不窺至老益勤所著有詩賦及史斷讀史雜述諸編張鴻烈字毅文山陽人吏部新標子康熙己未舉博學鴻儒特授檢討纂修明史疏請開支河轉漕以避河險又時興殿工採木逺省復有寛期減數之請事悉施行部議以不應密封鐫級除國子監助教遷大理寺副以憂歸後聖祖南巡淮上鴻烈迎獻詩賦特復原職鴻烈詞藻豐蔚一時推為大才邱象隨字季正山陽人叅政俊孫次子年十四即工詩才名早盛與兄象升有淮南二邱之目以㧞貢生應博學鴻儒科特授檢討入史館纂修歴司經局洗馬性孝友未仕父歿廬墓三年通籍後追承先志積俸置田為宗祠春秋二祀費族人稱之呉晟字西李山陽人祖安邦以行義推鄉里晟舉康熙壬戍進士選庶吉士歴左中允戊辰分校禮闈有知人鍳甫踰强仕以父老告終養歸雅善詩賦有清溪草丁象咸字志諧清河人學邃行優推重鄉里最熟精通鑑有問古人世系姓名爵里者皆應答如流無一舛悞以㧞貢授蕪湖縣教諭汪之藻字薦宫清河人博渉經史文譽甚盛有止止堂集揚州府漢陳子廻顔方皆廣陵人與王充同時充論衡書篇所取天下士五人班固楊終傅毅其二即廻方也稱其文詞斐炳子政子雲之亞三國魏陳琳字孔璋廣陵人為何進主簿進召外兵誅宦臣琳諫不納避難冀州袁紹使為檄討操袁敗歸魏以為軍謀祭酒管記室操苦頭風病卧讀琳作翕然而起曰此愈我病數加厚賜皇象字休明江都人㓜工書人謂象章草入神八分𨽻入妙篆能建業有呉時天發讖及呉大帝碑在江寧府皆象書也官至侍中青州刺史晉閔鴻廣陵人與丹陽薛兼紀瞻呉郡顧榮㑹稽賀循齊名號為五俊有集二卷華譚字令思廣陵人舉秀才對策時九州秀孝無及譚者歴官多政績元帝命為軍諮祭酒譚博學多通著書三十卷名曰辨道有文集二卷新論十卷以祕書監終南北朝宋顧紳廣陵人永初中駕幸延賢堂䇿試諸郡秀才紳所對詳明稱㫖授著作郎唐公孫羅江都人官叅軍曹憲以梁昭明文選授諸生羅與魏模李善相繼傳授有文選註音義十六卷李善江都人淹貫古今顯慶中累擢崇賢館直學士註文選六十卷敷析淵洽嘗居汴鄭間講授諸生號文選學李邕字太和善長子謁李嶠願一見祕書嶠乃假直祕書未幾辭去嶠試問奥篇隠帙了辨如響遂薦授左拾遺宋璟劾張昌宗反狀武后不應邕立堦下大言曰璟所陳社稷大計當聴后色解為可璟奏明皇即位為御史中丞邕早有重名後以䜛媢出為汲郡北海太守李林甫忌之傅以罪遣羅希奭就郡按邕杖殺之邕文名天下尤長碑頌書法為當代所宗代宗時贈祕書監王紹宗字承烈江都人少貧嗜學工草𨽻學時以比虞禇客居僧舍傭書自給凡三十年傭足給一月即止徐敬業起兵聞其行以幣劫之不從將殺之唐之竒曰人望也殺之沮士心遂免武后召補祕書少監使侍皇太子後坐廢卒於家李該字彦博廣陵人學無不通尤好地理圖志考職方同異成一家言又作地志圖吕温為之序五代馮延已字正中廣陵人仕南唐官同平章事工詩有元和氣格弟延魯字叔文官勤政殿學士嘗一使於周世宗再朝於宋太祖占奏詳華頗不辱命宋徐鉉字鼎臣廣陵人十嵗能屬文仕南唐歴官至吏部尚書随後主至京師太祖責之鉉曰臣事江南國亡罪當死太祖歎曰忠臣也以為率更令太宗立鉉獨直學士院從征太原軍中書詔鉉援筆立成辭理精當以冷疾卒有集三十卷新定說文質疑論弟鍇字楚金仕南唐為内史舍人李穆使江南見其兄弟文章曰二陸不及也孫洙字巨源錫子未冠舉進士補秀州法曹舉應制科進䇿五十篇韓琦曰今之賈誼也治平中應詔疏時弊要務十七事後多施行兼史館檢討王安石主新法洙力求外補知海州多善政遷知制誥明練典故文辭典贍有西漢風潘閬字逍遥江都人嘗居洛陽賣藥暇日騎驢行吟任意所適至道初有言其能詩者召見授四門國子博士崔公度字伯易高郵人口吃而内敏書一閲不忘嘗作感山賦歐陽修甚稱之以示韓琦琦上之英宗付史館歴知海頴蔡潤宣通六州終朝散大夫直龍圖閣秦觀字少游高郵人豪雋慷慨為文長于議論登第調臨海主簿以賢良方正除太學博士歴國史院編修官坐黨籍出通判杭州御史劉拯論其増損實録貶監處州酒税又徙雷州徽宗立復宣徳郎放還至藤州卒有淮海文集弟覿覯子湛俱以文名王昻揚州人徽宗䇿進士置榜首高宗即位除祕書少監除徽猷閣待制知台州尋奉祠仲并字彌性江都人登紹興進士聰敏絶人著浮山集十六卷陳造字唐卿高郵人尉繁昌宰定海倅房陵皆有政績有詩文雜著四十卷明陸闓興化人博學多能詩畫書法皆精洪武初任楚府伴讀所著有續古樂章并詩集弟顒見宦績董璘字徳文高郵人有孝行永樂戊戍㑹試第一殿試第二授修撰改官太常與修宣廟實録以忤王振譴歸著玉堂清餘集蔣武生字用文以字行儀徴人六嵗賦萬年松詩師為避席精醫術薦授御醫陞院判事仁宗於東宫即位後特賜諡恭靖子主孝字務本主忠字存恕皆以文名為景泰十才子之二朱應登字升之寳應人𢎞治己未進士時李夢陽何景明康海徐貞卿顧璘邊貢王廷相等迭倡古文辭應登後出才華飇發千言立就遂與齊名累遷雲南左叅政罷歸景暘字伯時儀徴人正徳戊辰進士授翰林編修遷國子司業告歸與邑人蔣山卿趙鶴朱應登為古文詩詞有聲稱江北四子所著有前溪集陸弼字無從江都人博渉多撰述徴入史館與纂修葛澗字子東江都人嗜古書江淮間稱積書者無如葛氏嘗撰明人物編始洪武迄嘉靖數十卷李柷字季宣以鄉舉知濟陽縣著青蓮館攝山草塞上擬古諸集張榘字範中嘉靖甲午鄉舉隠居澄江園肆力為文章淵涵浩博嘗應聘修鹽法志時推為尊宿朱曰藩字子价應登子嘉靖甲辰進士歴南京兵刑二部知九江府有惠政卒于官曰藩詞翰播海内風華掩映輕俊自賞不以剽割為能著山帶閣集子爾之世其家學著理學纂要孫克簡為名御史黄一正字定父江都人博渉羣書為文雄卓典麗王世貞見之曰博學宏詞吾目中僅見定父子明昌十嵗侍父客分韻賦金山詩有孤島擎飛鷺狂瀾壓伏牛之句所著有五經埤傳事物紺珠等書鄭元勲字超宗江都人崇禎癸未進士工古文詞以及詩畫雜伎無不精詣與東林諸賢遊一時推為聲氣宿望釋褐未仕以知兵授職方主事命甫下而元勲歿矣國朝徐濓字泗若儀徴人資性深雋嚮往専密所著有緯雯堂詩歌史遊史論歴代帝王世紀若干卷熊敏慧字頴生江都人順治乙酉舉於鄉布袍蔬食潛心理學兼工古文詞著有汲泠堂集子維熊字偉男嵗貢生亦以文學知名著閲史約書瓜渚貞烈志張標字玉立江都人順治壬辰進士授工部主事晉郎中為文章鎔經鍊子壬辰榜中與李來泰戚藩唐徳亮相伯仲厲士貞字烈士儀徴人順治乙酉舉人九上公車至庚戍始成進士為文靈快明爽士林傳誦焉鄧漢儀字孝威㤗州人少工詩應博學宏詞科授中書舍人所著有詩觀全集呉嘉紀字野人秦州人樂道安貧嗜古工詩著有陋軒集呉綺字薗次江都人總角能詩尤工駢體順治中㧞貢生授中書舍人歴陞湖州知府罷歸有求詩文者輒以花木為潤筆因名其圃曰種字林與名士為春江花月社所著有林蕙堂集記紅集宋金元詩永等書郭士璟字飲霞江都人順治乙未進士歴工部屯田主事釐剔振刷有聲曹署子元釨字于宫工詩文以諸生取入纂修館修佩文韻府等書授中書科舍人尋入直禁苑呉世杰字萬子高郵人康熙乙丑進士讀書期於致用三逆亂後嘗出三百金贖被掠婦女於金陵計道里費次第送歸庚申乙丑兩年邑遭大水躬率民夫拯生瘞死療其病者郵舊苦役重有公正排年等名世杰以書謁巡撫湯斌悉蠲除之著有甓湖草堂詩文行世弟世燾字㓜日康熙戊辰進士入翰林選直内廷遷右中允致仕汪懋麟字蛟門江都人康熙丁未進士授祕書院中書舍人楚人朱方旦以邪説傾動公卿懋麟獨著辨道論力詆其妄與修明史陞刑部主事罷歸杜門著經史所著有百尺梧桐閣集兄耀麟字叔定亦以詩文名有抱耒堂集汪楫字舟次其先休寧人徙居儀徴少為諸生知名與呉嘉紀孫枝蔚並稱由贛榆學博應博學宏詞之薦授檢討使封琉球陞福建按察使尋遷布政使所著有中山沿革志琉球奉使録悔齋詩聞正續集觀海集王巖字築夫揚州諸生以古文擅名著白田集異香集王式丹字方若寳應人康熙癸未㑹試殿試俱第一授修撰淡於榮進時移疾尋乞歸詩有樓村集商邱宋犖選刻江左十五子詩式丹尤其傑然者李必恒字北嶽高郵諸生肆力於詩謂作詩必論境地茍詣其境矣勿以唐宋為優劣也唐詩含藴深逺比興居多宋詩據事直言敷陳大半要皆合乎三百篇之㫖著有三十六湖草堂集史申義字蕉飲江都人康熙戊辰進士改庶吉士授編修歴禮科掌印給事中以疾告歸申義為詩初倣西崑體既悔其少作風格益上聖祖嘗遣中使至直廬問翰林能詩者誰為最大學士陳廷敬首以申義對顧圖河字書宣江都人康熙甲戌登一甲第二授編修充日講官直南書房與修一統志皇輿表出視湖廣學政卒於任所著有雄雉齋集陳厚耀字泗源泰州人康熙丙戍進士除蘇州府教授改中書舍人自為諸生經史外雅好九章算法西學歴數大學士李光地薦試稱㫖開局監修算法更授翰林院編修累陞左諭徳以病乞歸陸舜字元升泰州人康熙甲辰進士由刑部郎中提學浙江舉博學宏詞以疾不赴所著有雙虹堂集宗觀字鶴問江都人以副榜為貴池訓導復遷常熟好古勤學為詩蕭疎幽雋有韋栁風李國宋字大村春芳之來孫也康熙甲子舉人性躭吟咏王士禎為揚州推官招集四方名士作詩社國宋方弱冠常推第一著有螺隠居詩集徐州府漢劉歆字子駿向子也少通詩書治易宣帝時詔與父向同受榖梁春秋尤明習及成帝召見為黄門郎領校祕書見春秋左氏傳引傳解經義理始備奏請同毛詩逸禮古文尚書皆列于學宫哀帝令與五經博士講論有不肯置對者歆移書責讓之言甚切直從騎都尉出為太守歴河内五原涿三郡病免起家右曹大夫遷中壘校尉太后使治明堂辟雍考定律歴著三統歴譜史岑字子孝沛國人以文章顯王莽時為謁者著頌誄復神說疾凡四篇朱㝢沛人為廬江太守竇武薦為司𨽻校尉黨錮事起蔓衍皆天下善士㝢列名八俊與李膺范滂等並死獄中三國魏丁儀字正禮沛人曹操慕其才欲妻以女丕曰正禮目眇尋辟為掾數與議論竒之曰即便兩目盲尚當妻女況但眇乎兒誤我後為丕所殺弟廙字敬禮亦博學洽聞桓威下邳人出自孤微年十八著渾輿經依道以見志魏景初中為安成令桓範字元則沛人延康中為羽林左監以有文學與王象等典集皇覧正始中拜大司農以清省稱嘗抄撮漢書名曰世要于時曹爽輔政以範鄉里老宿特敬之然不甚親也司馬懿起兵討爽坐誅時同郡丁謐字彦靖博觀書傳有才略為懿所恨亦被誅呉鄭禮沛國人才學博逹為呉從事中郎與張昭孫邵共定朝儀子胄字敬先有文武資局少知名舉賢良遷建安太守拜宣信校尉往遼東撃魏守將虜得男女遷執金吾胄子豐字曼季有學行裴元字彦黄下邳人有學行呉丞相步隲薦之官至大中大夫與嚴畯張承論管仲季路傳於世子欽與太子登遊處登稱其翰采晉劉訥字令言彭城人有人倫識鍳初入洛見諸名士歎曰王夷甫太鮮明樂彦輔我所敬張茂先我所不解周𢎞武巧於用拙杜方叔拙於用長訥後官至司𨽻校尉其子疇字王喬少有美譽善談名理永嘉中位至司徒左長史南北朝宋趙繹下邳人以文義見稱徴士闗康之通經學與繹友善梁到沆暨弟溉洽彭城人皆彦之孫兄弟並以文才知名仕梁沆待詔學士省溉官至兵部尚書洽為太子舍人時任昉與彭城劉孝綽劉苞劉孺呉郡陸陲張率沛國劉顯及溉洽車軌所至號曰蘭臺聚人比溉洽兄弟於二陸溉之子鏡仕梁為太子舍人作七悟文甚美鏡之子藎早聰慧歴尚書殿中郎丹陽尹梁武帝嘗謂任昉曰諸到可謂才子昉對曰臣竊以為宋得其武梁得其文洽之子仲舉志操耿特仕陳為侍中叅掌選事劉孝綽彭城人勔之孫父繪字士章位中書郎掌詔誥以文章談義為後進領袖卒官大司馬孝綽七嵗能屬文舅王融稱為神童起家著作郎嘗侍宴作詩武帝稱賞授祕書丞謂周捨曰第一官當用第一人劉氏羣從子弟以文名者凡七十餘人弟潛字孝儀官御史中丞彈糾無所顧望内行純篤奉寡嫂甚謹家事巨細必咨而後行孝綽嘗云三筆六詩三即孝儀六即孝威也孝威風儀俊舉太子率更令大同中上白雀頌甚美遷中庶子通事舍人第五弟孝勝位尚書僕射第七弟孝先侍中皆名列史傳從弟孺字孝稚仕梁為中舍人嘗侍御座為李賦受詔立成文不加㸃大同年出為晉陵太守在郡和理吏民稱之遵字孝陵有學行卒官中庶子太子深悼惜之有孝友淳深立身貞固之語北魏劉芳字伯文彭城人孝文時為中書侍郎授太子經才思深敏精博初王肅來奔芳與辯論肅曰此非劉石經耶昔漢世造三字石經於太學學者文字不正多往質焉芳音義明辯故時人號為石經朝廷凶吉大事皆就咨焉嘗表請建學校又以所置五命及日月之位去城里數有違及靈星等祀不應𨽻太常集禮記義證十卷周官儀禮義證各五卷徐州人地録二十卷劉懋芳從子博綜經史宣武初入朝位尚書外兵郎中芳甚重之所撰定朝廷軌儀皆與叅量尚書臺疑事咸訪決遷步兵校尉領考功郎中立考課黜陟之法甚有條貫孝昭初㧞硤石有功遷太尉司馬卒家徒壁立贈持節前將軍詩文見稱於時嘗撰諸品物造作之始十五卷名曰物祖北齊劉逖彭城人少而聰敏専精讀書工文藻歴官黄門侍郎修國史鄭抗字子信彭城人有文學武平末待詔文林館北周劉璠字寳義沛人父臧性方正篤志好學居家以孝聞仕梁為著作郎璠善文筆十七為上黄侯蕭曄所器重随曄在淮南忽舉身痛楚家信至知其母即以是日卒及曄終於毘陵故吏多分散璠獨奉喪還都墳成乃退入周太祖欲屠南鄭璠泣請城竟獲全明帝授内史中大夫掌綸誥尋封平陽縣子在職清白簡亮不合於時左遷同和郡守善于撫御生羌降附者五百餘家鄰郡人常越境詣璠訟理著梁典三十卷子祥字休徴㓜以神童稱十二通五經江陵平随例入闗中初璠所撰梁典始就未及刋定祥修定繕寫以卒父業唐劉伯荘彭城人為𢎞文館學士通漢書學論撰甚多自所著書亦百餘篇子之宏世其學武后時以著作郎兼修國史睿宗時贈祕書監劉知幾彭城人藏器子博覧羣書善文辭舉進士累遷鳯閣舍人修國史著史通内外四十九篇徐堅歎曰為史氏者宜置此座右也開元初遷左散騎常侍劉禹錫字夢得彭城人登貞元進士宏辭二科為監察御史以附王叔文坐貶斥召還復出為刺史連更數州終於賔客分司禹錫恃才褊心文辭多含刺譏以故偃蹇寡合詩力精悍其賦金陵懐古元白猶避其鋒劉軻沛人博學多識登第歴官至侍御史所著有春秋指要諸書文章與韓栁齊名劉商字子夏彭城人第進士歴尚書虞部郎中以病免所著有劉虞部集十卷兼工畫山水宋晁迥字明逺彭城人舉進士以吕端李沆薦擢右正言獻咸平新書五十篇理樞一篇使契丹還奏北庭記又獻玉清昭應宫頌朝廷詔令多出迥手累遷禮部尚書天聖中迥年八十一召對帝訪以洪範雨晹之應復進斧扆慎刑箴及頌年八十四卒李淑字獻臣豐人若谷子年十二真宗幸亳獻文行在命賦詩賜童子出身後進士及第官至龍圖閣學士淑警慧過人博習諸書詳練朝廷典故凡有沿革帝多諮訪制作誥命為時所稱顔太初字醇之彭城人顔子四十七世孫第進士累官國子監說書所著有洙南子鳬繹集太初有雋才慷慨好義喜為詩多規切時事以諷在位子復字長道元祐初為太常博士請令禮官薈萃古今典範為五禮書又請考正祀典俾羣記盡合聖人之經為後世法仕至國子監祭酒陳師道字無已徐州人刻苦學問諸經中尤邃詩禮文師曽鞏詩學黄庭堅元祐初以薦為本州教授除祕書省正字素惡友壻趙挺之為人適預郊祀行禮其妻聞郊壇高寒借挺之綿裘衣之問所從得却去竟得寒疾而卒生平方正有守章惇欲一見不可得傅堯俞知其貧懐金以餽不敢出口所著有后山集元傅汝礪蕭人為御史政事卓異後遷朝列大夫浙江亷訪使僉事文章典茂為時所稱袁遵道字叔正豐人性頴悟至大間以神童薦初為國學四門館正字陞伴讀歴翰林直學士子煥少游虞集之門亦有文譽累官太師右丞相贈魯國公明高遜志字士敏蕭人元末僑寓嘉興受業於貢師泰周伯琦鄭元祐為文醇雅成一家言薦為書院山長洪武初徴修元史入翰林歴官侍講學士建文時遷太常少卿典㑹試值靖難抗節遯跡卒鴈蕩山中追諡文忠劉恭字政亨徐州人領洪武丙子鄉薦山西陵川訓導永樂間歴官禮部員外郎監修永樂大典房棟字子材徐州人博學明經有文譽由國子生知􅛒縣致仕蓄書甚富閉户誦讀學益該博李紹芳字芝亭蕭人廬父母墓六年寢食典籍判滇之永昌署保山縣印一判一牒悉出手裁刻以行世晚好書如初出跨一疲馬手一卷即於馬上披閱率以為常陳鐸字大聲下邳人家金陵以世襲官指揮風流倜儻以樂府名於世山水仿沈周高飛字子翀宿遷人領嘉靖戊午鄉薦詩文清麗尤工騷雅弟冠與兄齊名人稱二高國朝萬夀祺字年少徐州人由選貢中鄉試五上公車不第築室袁公浦博覧羣書明厯法通禪理吟咏無虚日有隰西内景諸集書畫俱精工絶倫李向陽字孝乾徐州人明天啟甲子舉人乙丑㑹試却逆璫納交幾罹禍後渡江旅食金山歸而躬耕手疏五經註隂符荘騷批選唐宋八家盈千卷與萬夀祺交善孫蟠康熙丁丑進士官翰林修撰閻爾梅字用卿沛人明末舉人少交江左知名士晚年歴徧四方名山大川作為詩歌善使事益豪宕有竒氣孫圻康熙乙丑進士官編修太倉州元秦輔之嘉定人博學能文時嘉邑未有志乘輔之始撰練川志典章文獻爛然具列又著格物擇善録易經史斷武事要覧忠孝百咏等篇明王彝字常宗自號媯蜼子嘉定人少讀書天台山中學有端委不從時好洪武初與高啟謝徽等被詔同修元史史成以母老乞歸啟為作養老堂記偶桓字武孟太倉人倪雲林稱其詩有超乘挽彊之力日升川至之漸洪武中以薦仕終荆門州吏目所著有江雨軒集醉吟録鳯臺吟嘯集張泰字亨父太倉人天順八年進士入翰林詩文推重一時與李東陽齊名四方逰學京師者多受業焉所著有滄洲集章輔字道常嘉定人中年病足絶意進取以六書訛謬乃遵洪武正韻參以三蒼說文玉篇韻㑹諸書考訂同異編韻學集成十三卷又直音七卷王世懋字敬美世貞弟嘉靖己未進士才學亞于其兄人呼為小美㑹遭父難縞素者十年隆慶初父寃白歴官至太常少卿世懋吏才精敏署江西臬時嘗訊牒一字異前讞呼取比較果吏舞文也周錫字子純大倉人以貢至京時大僚應制作青詞屬令代草因擬薦留閣下錫賦烹雪茶詩寓意退就常選得潮州通判在官伉直為上臺所扼棄歸蕭然著述者三十年沈承字君烈太倉諸生少負雋才工詩古文一時聲名籍甚年未四十卒所著有即山集婁堅字子柔嘉定人經明行修為學者所宗貢於國學工詩文善書法晚與唐時升程嘉燧稱練川三老嘉燧歙人流寓嘉定詳見徽州文苑傳唐時升字叔逹嘉定人少負異才未三十謝去舉子業讀書汲古通逹世務以李文饒自期詩古文縱横踔厲尤為通人所稱李流芳字長蘅嘉定人萬厯丙午舉人公車北上抵近郊知璫焰方張賦詩而返遂絶意進取築檀園讀書其中水木清華過者如遊圖畫書法類東坡繪事出入元人詩在斜川香山間顧夢麟字麟士太倉人明季文尚險僻多與註悖夢麟與常熟楊彞獨崇先正著十三經通考行世嚴衍字永思嘉定人博學好竒尤耑讀史以司馬通鑑尚多闊畧旁搜博引以正其失書成張太史溥絶愛之衍工詩善書所著有四書說易說呉繼善字志衍太倉人崇禎丁丑進士知成都縣博文辨智風流警速工詩歌善尺牘尤愛圖繪有元人風國朝呉偉業字駿公太倉人明崇禎辛未㑹試第一殿試第二授編修給假歸娶當世榮之入國朝薦授祕書院侍講遷國子祭酒㑹丁嗣母憂歸益肆力於學問家居十餘年乃卒偉業以文學負重名尤好引掖後進詩文宏麗所著有梅村集春秋地里氏族志綏冦紀畧等書子璟字元朗康熙戊辰進士官至給事中詩文能繼其家學王時敏字遜之太倉人衡子也明崇禎初以廕歴太常奉使楚閩餽遺一無所受入國朝杜門稽古益工詩文兼精𨽻書畫法為海内所珍盛敬字聖傳太倉諸生家貧亷介自守教授生徒脩脯外不受人寸絲粒粟博學好古貫穿經史百家著述甚富黄與堅字庭表太倉人順治己亥進士未就選㑹以博學鴻儒舉授翰林院編修纂修明史未幾復命分修一統志生平崇尚經術輯解甚多詞賦盖其餘事所著有易學闡忍庵文集王原祁字茂京太倉人揆之子也康熙庚戍進士初宰渚陽地多水災詳請豁免賠累歴省垣改翰林累晉戸部侍郎嘗請寛豫省折徴之賦及呉民歴嵗之逋聖祖皆嘉納之原祁襟懐高曠工詩善文兼精六法寸縑尺素流傳禁中時稱藝林三絶性亷潔不治生産通籍後家居十年猶蕭然如寒素許自俊字子位嘉定人康熙庚戍進士知聞喜縣攜一子一僕食脫粟飯往來郡省策蹇而行贄上官詩扇之外無他物用法平恕不急催科尋乞休工詩古文遇名勝地題咏殆遍為時所推王昊字惟夏太倉人世懋曽孫生有異禀詩古文並如宿習嘗論歴科應舉之文海内翕然奉為凖的後以薦舉授中書舍人卒趙俞字文饒嘉定人康熙戊辰進士知定陶縣定陶地苦積潦俞縱横浚三渠傍渠為堤自是水不為害以病乞休杜門著述有紺寒亭集唐孫華字實君太倉人康熙戊辰進士仕吏部郎自㓜天才敏贍九試冠軍名震江左中年益務經史之學孜孜不倦年九十餘巋然為文章宿老所著有東江集王吉武字憲尹太倉人康熙丙辰進士仕至紹興府知府性恬静工詩官戸曹時與新城王士貞唱和詩名相埒年八十餘手不輟卷所著有氷菴詩集沈受宏字台臣太倉人嵗貢生性孝友篤於内行博學工詩以杜為宗少為祭酒呉偉業所激賞與相國王掞為布衣交嘗遊京師名動公卿間以介介不茍合謝歸所著有白漊集十卷全唐詩選八十八卷黄仍緒字繼武崇明人康熙丁未進士居鄉時嘗親冒矢石以禦海冦而不自言其功平居自奉甚約而性好施予讀書自經史百家以及六壬遁甲之術無所不通仕至内閣中書舍人張雲章字漢瞻嘉定人博通六經能詩古文㓜就童子試經義後作數千言論制舉未盡善學使田雯以非功令不録自是不就試晚入太學張伯行撫呉延纂禮經成喪服四卷康熙丙申九卿奉㫖薦舉文學士直省通得十三人雲章與焉未引見南歸有志輯南宋文鑑未脱藁年七十八卒有樸村詩文集三十卷行世海州唐呉通元海州人與弟通微俱博學善屬文通元舉文辭清麗科貞元初為翰林學士遷起居舍人知制誥凡有撰述皆愜帝㫖通微亦同職禁署人士榮之後以事賜死通微白衣待罪帝宥之宋孫世臣字國老海州人乾道五年進士為文精切尤工詞賦有禮管人情賦為時傳誦通州宋潘及甫字憲臣泰興人博通經史慶厯中與兄希甫同登進士充楚王教授律宗室以禮法神宗嘉之晚得目疾毎命子姪執策讀於前未卒前一日猶卧聴周書漢史口占詩以遺親友王觀字通叟如臯人惟熙從子洽聞强記善屬文與從弟覿聲稱籍甚秦觀謂其昆弟高才力學無與比者試開封府相繼第一觀中嘉祐二年第遷大理寺丞知江都縣王覿字明叟嘉祐四年第進士熙寧中為編修二司删定官覿不樂居職求潤州推官哲宗立進司諫疏論蔡確章惇韓縝張璪朋邪害正章數十上相繼斥去又劾竄吕惠卿時朱光庭以試館職䇿問訐蘇軾吕陶辨之遂起蜀洛二黨之議帝以覿言置不問後知成都府遷御史中丞持正論始終再罹譴逐不少變無疾而卒崔敦詩字大雅通州人紹興末進士歴任侍讀直學士院上疏論風俗任將經筵倖進救災五事及州縣掊克之弊皆剴切識大體奉詔删定吕祖謙所編宋文鑑有文集制槀奏議通鑑要覧等書明張珹字世璉泰興人詩翰馳名鄉舉召拜中書舍人成化年奉使朝鮮鮮人為梓皇華集有西荘遺稾顧磐字子安通州人九嵗選入州學十二嵗高等食廩中鄉舉名大譟藏書萬卷詩文有氣骨尚體裁嘗著鹽法錢榖馬政水利諸論及訂名宦鄉賢考曹大同字子貞通州人頴異能文為吏部選人同鄉李春芳為大宗伯大同上書謂始而以詞求士詞不足究士實既以格用士格不足竟士才李頷之而未及薦僅授光禄寺署丞以歸涵茹古今成藝林華燭百六十卷其詩文行世者曰玉芝樓稿石沆字瀣仲如臯人有白雲居士集其詩蕭疎閒放為一時名士之冠彭大翼字一鶴通州人以嵗薦通判梧州歸日事繙閱積四十年著成類書曰山堂肆考包壯行字穉修通州人為諸生名譟一時領鄉舉乆之始成進士主司以得包先輩為重其書畫皆有高韻冒愈昌字伯麐如臯人為名諸生負氣伉直作詩敏㨗游王世貞呉國倫之門所著有金陵集緑蕉館集國朝錢濤字射夫通州人選貢生授贛榆教諭窮經著書有孝經内外傳周易集傳詩學記周禮注山霞閣随筆醉竹堂詩集顧國琬字去非通州人子道含字同束隠居不出父子聫吟有慶堂父子集江南通志卷一百六十六欽定四庫全書
