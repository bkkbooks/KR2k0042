body:
  text: 江南通志卷四十五輿地志寺觀三松常鎮三府松江府普照寺在府治西唐乾元中建宋大中祥符元年改今額寺有陸將軍祠世傳地本陸氏園亭因以祠之舊有石刻載吳越王祭獻文今為寺伽藍神寺為祝釐道場每嵗正旦冬至郡縣習儀於此內有海月堂景蘇閣附元牟瓛記略普照寺陸士衡别業也自孫氏歸晉兄弟入洛以文人膺事任震動當時倚伏相尋曽未瞬息已有華亭鶴唳之嘆而其臺榭化為像設研席化為梵唄乃至今存何歟寺北坐九峯層巒疊嶂相為蔽虧陰陽家謂風氣藏聚可安千衆者也唐乾元時本號大明寺僧良慧嘗創釋迦如來殿逮宋祥符間改賜今額凡三度重建淳祐戊申厄於祝融里人錢武翼首議興造其事未竟子大信繼之咸淳甲戌僧慧思與武翼舊念不可廢前人功亟勸率賄施以助殿始完好每嵗州侯率其僚屬於此建道場申祝讃而禱水旱禳風災者亦皆至焉興聖寺在府東南穀市橋西五代漢乾祐二年邑人張司空子仁捨宅建初名興國長壽宋祥符中改今額地縱廣踰三十畝東有水陸池南有浮圖四面九級有鐘樓高及浮圖之半明洪武三年知府林慶以其地三之二作城隍廟南禪寺在府學東宋崇寧中張頭陀卜築於此鑿地得住世羅漢像邑人異之遂為施水菴請額於朝紹興二十九年賜名演教禪院後改今額為在城諸禪之冠僧綱司治焉北禪寺在府東北城內宋紹興間僧法寧建寧先住沂州馬𡺸山淨居寺航海至青龍有章氏者迎止於此發地得古碑云大唐禪寺又得金銅天王像因建寺焉又名馬𡺸寺附明陸樹聲題北禪雙樹詩並序馬𡺸古剎嵗久漸圮地為居民侵蝕者半獨殿前雙樹屹立度僧臘無算兵後官司取材議及焉余護存之他日過寺寺僧引余讀舊碑出雙樹下顧余曰是木向微公幾已化去今清陰宛在實仗公再來緣願一言貽山門因題識廡壁以戒芻牧嵗逺香臺半劫灰斷碑遺迹掩蒿萊回看雙樹聞僧語此日清陰是再來延慶寺在府城守禦千户所東其地本施家漾宋隆興中建乾道六年賜額明嘉靖間廢改為鹽運司公署即今新察院佛像遷南關外曰延慶移山龍門寺在府城集仙門內橋東宋僧如喜開山於黃土橋淳祐元年賜額元至正二十年遷於此中有聽雪軒左有龍淵遇旱不竭凡鄉貢舉子必於此設祖而賓興之雲峯寺在府城妙明橋西北舊北道堂也元至正末趙道淵為僧改名本一禪院康熙四十四年賜雲峯寺三字額禪定寺在雲峯寺東俗呼小北菴康熙四十二年賜今額四十四年御書般若相三字匾額積慶寺在府東南又名坐化菴元至正辛巳邑人陳源為慶禪師捨宅建慶坐化肉身在焉菴因以名東禪寺在府東門外初桃花菴也宋紹興初僧道因開山六年賜額寶勝禪院後為寺以居府東遂名東禪焉明洪武中升為叢林每嵗有司迎春於此駐節云妙嚴寺在府城西東嶽行祠之東宋咸淳間建本三乘菴元至正間重建敕賜為寺超果寺在府西南瑁湖橋之右本名長壽寺唐咸通十五年建至宋治平元年改今額寺有鴛鴦殿一覽樓雨花堂瑞光井石假山見逺亭西來堂諸勝國朝康熙四十四年聖祖巡幸御書虹光勝迹四字懸大殿西禪寺在府西白龍潭上宋嘉定間建端平間賜額西禪興福寺又名龍潭寺萬厯間重建藏經閣關帝殿生生閣國朝順治十六年僧心一修萬佛閣西林寺在府西慶雲橋北宋咸淳間建前有寶塔明正統間僧法㻞徙建於後復建毗盧閣因請額云西林大慈寺在府西南十五里北錢市元建報恩寺在府西南四十里元皇慶間僧道源建普門寺在府東北盤龍塘俗稱盤龍寺唐大中十二年建宋祥符元年賜額寺有石天王舊傳大水中漂至人多禱之寶雲寺在華亭縣亭林鎮初名法雲在市西北唐大中十三年建晉天福五年湖水壞寺始遷今所其地即梁顧野王故宅寺之初成有野王顯夢事因祠為伽藍神有元牟瓛記趙孟俯書今存七寶寺在七寶鎮初在陸寶山本陸氏香火祠俗呼陸寶菴既徙吳淞之曲請於吳越王賜以金字藏經曰此亦一寶也遂改今名後因松江潮壞三徙於兹宋初張澤捨宅為寺太平寺在胥浦南宋紹興二年僧曇無竭建元燬至正甲申僧潤玉隱建浦北有松風閣明行寺在奉賢縣南橋鎮晉天福五年里人蔣漢瑊捨宅建宋太平興國八年賜額附宋釋北澗居簡紀略華亭圖牒載春秋時夫差三女子墓田曰三女岡聲詩則插諸唐令尹詢並荆公王介甫都官梅聖俞邇岡之剎曰安和石晉天福五年蔣漢瑊環堵中芬陀利花擢於陸聚族而謀曰是八吉祥六殊勝處盍施諸釋梵家遂基此剎楨幹於是者曰本立病潮齧岸址白漢瑊議徙於此改曰明行用淮海王錢中令歸朝所請之額堂宇樓殿金碧煥粲雲棲鴛瓴月桁璇題具如經説凡所當行罔不具資福寺在梁店元至元初建福田寺在泖濵宋淳祐十五年修武郎錢仲圭建景定賜額化成永壽寺其址古胥顧泖也泖有六和神靈甚宋端平間僧妙智苦節清修並泖架一室奉神神顯靈於人凡禱祈者以所驗重輕發土實泖未幾泖隆然遂構精舍曰化成菴元泰定中賜今額法忍寺在金山縣朱涇鎮唐咸通十年建即船子和尚覆舟處寺有船子及夾山會禪師遺像東林寺在法忍寺東元至大初建本觀音堂皇慶初改額為寺澄鑒寺在泖橋俗呼泖橋寺唐天寶六年建興塔寺在泖橋西紹興四年賜額松隱寺在松隱鎮元至正間建趙孟俯書松隱二字遂以為名寺有塔與興聖西林禮塔相望海慧寺在風涇白牛市宋建隆初里人姚廷睿捨宅建寺有水波壁留春亭精進閣並廢寶藏寺在海慧寺西宋熙寧初建紹興五年賜額積善寺在上海縣治西北宋紹興間里人李阡夢金人乞坐地遂捨地為精舍度其孫師立主之元至大間有番賈航海南來拜師立道上自云慕師高德以貨寶一巨艘施之不通姓名而去立遂大拓舊規請額為積善院今寺為本縣祝釐習儀之地僧會司治焉觀音寺在上海縣西宋崇寧初建淳熙三年賜額慈報禪院從錢參政良臣請也元燬明洪武十六年僧性重建改今額為縣之首剎法華寺在觀音寺東宋開寶間僧慧建靜安寺在蘆浦初在滬瀆吳赤烏中建號重圓寺宋祥符初改今額寺有江中浮來石像石鉢又有吳越王瑜珈道場毗盧遮那像五臟皆書錢氏妃嬪氏名有赤烏碑陳朝檜講經臺蝦子潭湧泉緑雲洞與滬瀆壘蘆子渡為八景龍華寺在黃浦西龍華村相傳吳越忠懿王常夜泊浦上風雨驟至草莽間祥光燭天鐘梵隱然詢其地古龍華寺基也遂重建其西北隅舊有白蓮教院前有寶塔時時放光至今存焉明萬厯間詔頒佛藏於寺又賜範金千葉寶蓮毗盧佛一鏤銅器五敕賜大興國慈華禪寺大聖寺在上海縣東南四十里宋紹興間建後廢明初即普淨院榜今額明心寺在上海縣西南六十里梁開平初都水使者錢綽建宋治平二年賜額寺有古檜二本元豐時所植至今存焉崇慶寺在北蔡村宋嘉定間建南淨土寺在吳會俗呼南王寺宋淳祐中建初名九品觀堂元大德中改今額資壽寺在吳會北元至元末僧嚴肇建俗呼北王寺寧國寺在二十六保宋隆興中建乾道二年請額殿前羅漢松四株枝幹森矗古色蒼然蓋三四百年物也福基寺在三十保元至元間建永定寺在南匯縣周浦鎮宋淳熙間趙宮使建名永定禪院明洪武中改額慶寧寺在二十二保南蹌村宋建炎間建安國寺在二十二保宋咸淳間建南廣福寺在二十一保宋嘉泰間里人鄒運幹捨宅建俗呼鄒家寺僧宗印請額太平寺在二十三保因華亭太平寺在其西俗呼此為東太平宋太平興國間建永寧寺在新場鎮元至元間建名報恩懴院明洪武中改額元方回有記趙孟俯書南積善寺在十七保宋紹興間建隆福寺在青龍鎮唐天寶間建至長慶中始建寶塔升仙臺在其前隆平寺在隆福寺北故俗稱南寺北寺唐長慶元年建明嘉靖後改為新縣城隍廟後移縣唐行鎮欲遷不果有寶塔亦廢寺有宋馮翊陳林記襄陽米芾書普光寺在青龍鎮宋紹熙五年建頤浩寺在金澤鎮宋景定中里人費輔之始創經堂僧道崇主之其徒如信開拓遂成大剎元元貞中賜今額明萬厯五年徐階以賜衮留鎮山門乃於殿西北作樓三楹貯之莫如忠題曰有衮樓慧日寺初名普寧慧日院在孔宅里俗呼孔宅寺寺有宣聖祠元景定中易今名宣妙寺本佘山西菴宋治平二年賜額普照寺本佘山東菴宋太平興國三年聰道人開山治平二年賜額普照教院寺有道人塔下有月軒旁有虎樹亭相傳道人在山時有二虎隨侍道人死虎亦死瘞之塔旁踰年生銀杏樹二僧隱闢亭其間以虎樹名昭慶寺本佘山靈峯菴宋紹興二年建有塔壽安寺在鍾賈山下元元貞中建圓智寺在干山唐大中十三年建于邑西南二里晉天福中壞於水始遷於干山其地晉陸士衡草堂遺址也宋治平中賜額有塔在山之半明萬歷中同卿林景暘重修法堂左為二俊祠祀二陸布金寺在四十七保大盈村本法雲院唐太和二年建宋易今名崇壽寺在吳淞北楊林俗稱楊林寺宋元祐間建福善寺在內勳浦之陽梁貞明六年僧智道建時多虎患道至虎即遁去宋大中祥符元年改今額澱山寺在薛澱湖中山頂宋建炎初建紹興八年賜額普光王寺明改今額仙鶴觀在府南朝真橋東始創在橋西年月無考宋紹興三十一年道士葉太真復建請於朝賜今名明初以其地設太平南倉道士陸允中始遷今地為府境琳宫第一道紀司治焉通圓觀在青龍鎮宋景祐元年建示應菴在白龍潭東北宋淳祐間建明萬厯間僧明心即故址重建賜子定光菴在白龍潭西喜見菴在府東北七里元至順間建永福菴在府南十八里元建清涼菴在府西二十七里宋咸淳間建施水菴在莘莊鎮南宋咸淳間建有趙孟俯金書法華經蘆花菴在泖口里中曹氏建狀其勝者有百二十里碧琉璃三十六陂紅菡萏之句樵隱菴在金山縣三保國朝康熙四十四年聖祖南巡至松召僧行瀾賜禪林宗宿扁額對聯石刻經卷四十八年提督師懿德建御書樓定光菴宋景定間建與海慧寺相並潮音菴在新場元至元間建常寂菴在新場元大德十年建順治間易名南山禪院東林菴在十九保元大德六年建福田菴在三十保元至正間建東隱菴在五十保元至正二十二年建西隱菴在泰來橋市宋乾道三年建有趙孟俯碑記雲隱菴在澱湖西王巷村南接石神廟宋咸淳間建東濟菴在四十六保元至正間建德濟菴在簳山元大德三年邑人張謙建僧穹開山後有骨塔有松上覆如偃蓋然錢明宫在府東門外碧霞行宫在府東門外明嘉靖間建舊名紫霞宫普門院在古際留倉東元至元間建廣化漏澤院在府超果寺西北宋崇寧中建紹興三年賜額純陽禪院在陶宅鎮明餘姚謝遷讀書於此延壽院在婁縣李塔匯宋嘉定中建院臨驛道府人祖餞以此為節云國朝順治十六年知府祖永勳捐俸重修本名禮塔今云李塔疑以曹王明故也澄照禪院在泖中唐乾符間老僧如海作井亭施湯茗建塔五層標燈為往來之望明嘉靖間僧智明建大雄殿其徒自正於隆慶六年築石隄以為外護建寶藏閣以奉大藏經陸樹聲與弟樹德置常住田太倉王世貞為之記隆慶三年丈田均糧僉事鄭元韶知府𠂻貞吉以泖塔在湖中淹沒不常遂得免科萬厯元年復建青浦泖以西俱屬焉獨塔基因不起科仍𨽻華亭今屬婁積善院在二十五保宋慶元間千户徐名建寶月禪院在青浦城內生春橋西元至正間建佛像皆脫沙塑慧日院佘山中菴也宋太平興國三年建舊云沐堂治平二年賜額明宫保陸樹聲書雲崖風壑四大字勒石以朝衣一襲留鎮山門太師徐階奉世廟賜蟒衣付僧為供崑山塔院即今小