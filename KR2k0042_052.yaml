body:
  text: 欽定四庫全書江南通志卷五十三河渠志黃河五康熙四十一年六月初三日上諭朕因永定河南岸不時衝坍特㫖令將南岸修築石隄看來甚有裨益今黃河南岸自徐州以下至於清口通行修築石隄可否永遠有益若果有益見在國帑不為缺少朕於錢糧一無所惜修築此隄應於何處採取石料作何轉運約幾年可以告成著張鵬翮齊集河員詳議具奏九月十六日內閣奉上諭總河請開邵家莊引河掘徐家莊河觜等事若下部議必致遲延著即照所題行朕觀永定河修築之法甚善河身直河底深所以淤沙盡皆衝刷今治黃河亦用此法方為有益此工多費不過十萬兩試照永定河法修治之十九日內閣奉上諭今所開陶莊引河甚善朕前巡視南河時曽令原任員外黑碩色將引河之樁加意深築其疏濬人字芒稻二河亦佳得此二河運河甚為有益朕觀明朝治河俱自徐州以上在河南地方修築我朝自康熙元年以來俱在徐州以下修築然治下流須預防上流若上流潰決下流必至壅滯嗣後徐州以上地方河臣亦當留意再黃河之水遷徙無定朕前在寧夏時見黃河大溜每年更移今年行溜在此來年又移他處其性如此況九河故道原在河間地方後漸移向南厯代以來果能每年防禦相機修理則河道何至如此大壞皆因時當多事或十年或五年不修築不開濬所以漸難治矣明朝三百年間嘗講求河工治法彼時措置亦得其宜如山東微山湖將水蓄聚山中潦則蓄之旱則泄之皆深有益於治河者也是年創築徐州黃河南岸郭家觜石岸長五百三十九丈三尺又挑穵楊橫莊對岸引河長一千八十八丈河工事宜冊是年開放成河楊橫莊險工漸次沙淤創築睢寧縣黃河南岸戴家樓迤裏月隄長一千一百七十三丈五尺建宿遷縣黃河北岸束水隄內小石閘一座五堡磯心石閘一座幫築桃源縣黃河南岸烟墩險工掃臺長三百六十丈又開對岸引河長五百九十二丈又煙墩迤東舊有護城隄五百七十丈加幫高厚又接築六百一丈共長一千一百七十一丈為烟墩月隄又創築談家莊月隄長六百一十六丈清河縣黃河北岸陶家莊隄外引河自康熙三十八年聖駕南巡親閲水勢以黃流逼近清口恐淮水不得暢出詔開引河引黃北注四十年更開穵寬深至是年告成又因陶莊引河告成水勢逼近縣東縷隄創築撐隄於縣治護縣隄之內自縷隄起至護縣隄長二百八十四丈又加幫護縣東隄於撐隄之外自撐隄頭起至縷隄長一百九十丈張鵬翮河防志以為縣治重門之障又創築黃河南岸撐隄自陳家莊東挑水新壩尾起至縷隄長三百四十六丈幫築山陽縣黃河南岸洪福莊裏創隄長二百丈又創築韓家莊大月隄長八百八十丈加幫掃臺長八十丈四十二年二月初三日聖駕南巡遍閲中河隄工及徐家灣祥符等隄閘總河張鵬翮奉上諭觀黃河磯觜壩太短不能逼溜照永定河試將一兩處作長挑水壩即有衝壞免其賠補又奉上諭烟墩甚險雖有越隄必須保守縷隄此處挑水壩應行建築初四日奉上諭桃源烟墩至龍窩一帶隄工卑矮應行加高初五日上諭永定河分司齊蘇勒朕觀黃河險要地方應下挑水掃壩現今永定河朕親指示挑水等工俱有裨益爾遵照朕指示式樣前往烟墩九里岡龍窩三處築挑水壩數座試看有無裨益雖被衝壞無妨工完之日令該地方官盡心防守如有蟄陷不時修葺可將此㫖傳與總河張鵬翮速派賢員令其多備物料夫匠於朕回鑾之前完工如遇桃汛水發即可停止三月初二日上諭河道總督張鵬翮王公隄關係運道民生最為緊要隄岸單薄樁工漸朽應再加幫以資捍禦不可因淤灘可恃而忽之也初三日上諭河道總督張鵬翮王家營對面鮑家營應開挑引河泄黃河泛漲之水以保障清江淮安地方著即行興工仍兩岸築隄以衛民田又奉上諭黃河逢灣取直開挑引河必須於對岸水淺之處築挑水壩逼溜入引河方為有益又奉上諭開減水壩須於水緩之處不可迎溜以防奪河初四日上諭河道總督張鵬翮清口西壩乘此水淺時再加長數丈有益又半路劉河流掃灣隄岸單薄應築挑水壩十六日上諭內閣九卿等朕此番南巡遍閲河工大約已成功矣曩時總河于成龍不遵朕指授修築故未能底績今張鵬翮一一遵諭而行是以成功向來黃河水高六尺淮河水低六尺不能敵黃常患淤墊今將六壩堵閉洪澤湖水高力能敵黃則運河不致有倒灌之患此河工所以能告成也朕自御極以來無時不以民生為念雖纎悉之事不肯怠忽今四十餘年矣四海乂安民生富庶河工適又告成朕欲頒詔天下大加恩賚十月初七日上諭大學士馬齊張玉書吳琠陳廷敬朕觀河道已治總河張鵬翮及河工官員俱甚效力黃河一切工程朕知之最悉先是永定河用掃大有裨益是以朕諭張鵬翮黃河亦宜用掃張鵬翮回奏永定河勢小可以用掃黃河勢大難以用掃朕云姑試用之且所費錢糧無幾張鵬翮因而用掃河隄今果堅固矣初八日上諭工部覽河臣奏中河之水由楊家莊開河出口清水暢流敵黃舟楫通行高家堰六壩及各處工程俱保固平穩海口大通河底日深去路甚速淮水暢出黃水絶無倒灌之虞下河等處窪下之區俱得田禾豐收民居安宴所報秋汛水勢已悉所司知之初十日上諭吏工二部黃淮兩河關係運道民生最為重要朕念治河國家大事夙夜厪懷未嘗少釋披圖咨衆雖已悉其源流顧水勢變遷不常必真知洞悉方可實見施行是以不憚勤勞屢親巡閲察其險易之形勢審其疏導之機宜緩急次第具有成畫至於簡命河臣倚任甚切凡所屬官吏皆聽選用大修工程費以數百萬計嵗修帑金亦以數十萬計乃康熙三十七年黃淮並漲總河董安國不堅築隄堰疏通海口因而河身墊高溢出河岸以致倒灌洪澤湖口湖水從六壩旁泄由運河入下河淹沒民田於是罷董安國以于成龍代之朕隨授以治河方略詳加指示三十八年親往閲河駐蹕清口河干又面諭于成龍清口宜築挑水壩挑黃水使趨北岸方可免黃水倒灌之患隨指定其地再三申命于成龍不遵朕旨致無成功及用張鵬翮為河道總督面諭云頃已發帑數百萬令大臣官員往高堰築隄閉六壩使逼洪澤湖水暢出清口而清口築挑水壩尤為緊要此壩不築則黃水頂衝斷不能使向北岸湖水不得暢流張鵬翮遵朕言壩工築成黃溜遂直趨陶莊清水因以直出疊經伏秋大漲並無倒灌之事其浚張福口引河築歸仁隄疏人字芒稻涇澗等河開大通口皆遵朕㫖一一告竣今年春朕閲河至桃源見龍窩等處頂衝危險命增築挑水壩此壩工刻日訖事河勢遂平中河仲莊閘口以與清口相對特命改由楊家莊漕挽安流商民利濟曩時黃水泛漲或與岸平或漫溢四出今黃河深通河岸距水面丈餘縱遇大漲亦可無虞矣張鵬翮所修工程雖悉經朕裁斷而在河數載殫心宣力不辭艱瘁又清潔自持一應錢糧俱實用於河工無纎毫浮耗朕心深為喜悅所屬大小河員並皆勉力赴工共襄河務亦屬可嘉自總河以下各官爾二部即詳加議叙具奏是年遵奉聖祖仁皇帝親閲桃源縣黃河險工指示建挑水壩六座一南岸煙墩險工在大王廟東建挑水壩長十五丈三尺五寸寬五丈一南岸龍窩張家莊險工建挑水壩壩臺長二十七丈三尺壩身出水長十丈寬八丈一北岸九里岡險工在大王廟東建挑水壩長九丈八尺寬四丈一北岸九里岡險工舊龍門處建挑水壩二座第一座長十四丈寬五丈第二座長十三丈寬五丈一北岸半路劉河險工上水頭頂衝處建挑水壩長五丈寬八丈雁翅各長八丈又建南岸張家莊越隄長一千八十四丈又建高家灣迤裏越隄長五百丈又建北岸九里岡迤裏越隄長九百七十二丈遵奉上諭加幫修築山陽縣黃河南岸清江浦王公隄外越隄并縷隄共長七百四十四丈五尺靳輔治河書王公隄一線石工內捍運河外抵黃淮二瀆之衝為數百萬國儲咽喉地然此一隄最難保護若開引河則地形未便唯有嵗修石工排樁固址一有坍陷便行補葺而於上流層次築逼水壩二三重以護之一則溜以禦衝一則回湍以聚砂使其日漸壅墊若石工之外得淤灘二三十丈則隄址愈固無衝決之虞四十三年建築邳州黃河北岸趙家莊迤裏月隄長八百六十三丈六尺建桃源縣黃河北岸之半路劉迤裏月隄長五百丈二月初三日上諭工部總河張鵬翮請重修徐州城外隄岸徐州逼近黃河城外石隄工程甚屬緊要著即行修理四十四年正月二十三日上諭吏户兵工四部朕厪念民生加意河道屢行親閲一切疏濬修築事宜悉經周詳指畫獲告成功前黃河之水往往倒灌清口者皆由仲莊閘與清口相對駱馬湖水勢湍急遂逼黃流灌入清口朕視河時躬臨相度命河臣移仲莊閘改建於楊家莊出口工竣之後河臣報稱黃水暢流入海絶無倒灌清口之患朕尚未經親閲今欲特蒞其地察驗形勢用籌善後之規其中河黃河運河有應加修防者亦隨宜指示以圖永久二月二十六日上諭扈從大學士馬齊張玉書陳廷敬總河昨日來問以河工形勢河事已大治矣從前駱馬湖口設竹絡壩湖水大則從壩流入黃河河水大則溢流入壩內今竹絡壩止有湖水暢流黃水並無浸灌則黃河之深通可知初次到江南時船在黃河兩岸人烟樹木皆一一在望三十八年則僅見河岸四十二年則河去岸甚低是河身日刷深矣自此日深一日豈不大治聞下河連年皆大熟亦從所未有也三月十一日上諭河道總督張鵬翮河工已經告成善後方略更為緊要朕今親臨閲視修建天妃閘甚當倘黃水長至五六尺清水不長勢弱不敵黃黃水自然倒灌亦必致之理豈可因此即謂治河失策乎若遇倒灌即將天妃閘暫下版蓄清水全力敵黃不過數日黃水即退遇糧船過時即起版開放若黃水不灌不必下版其惠濟祠一帶雖建有石工但運河與黃河只隔一線之隄若黃溜衝刷石工恐不足恃著於上下適中之處相度形勢修建挑水壩三四座挑溜開行其王公隄亦應相度形勢修建挑水壩運河東隄保守最為緊要隄岸應行加幫高郵迤南湖河水勢相平界首迤南河水高於湖水東西兩隄卑薄應加幫修理著量建石工淮安近城隄岸卑薄之處亦應相度形勢修建石工黃河南岸隄工關係緊要應加謹修防閏四月十一日上諭扈從諸大臣及河臣等朕留心河道親閲者屢矣河之形勢必身歷其地始知成功之次第朕每至河上必到此惠濟祠以觀水勢三十八年以前黃水泛濫凡爾等所立之地皆黃水也彼時自舟中望之水與岸平岸之四圍皆可遙見其後水漸歸漕岸高於水今則岸之去水又高有丈餘清水暢流逼黃竟抵北岸黃流僅成一線觀此形勢朕之河工大成矣朕心甚為快然向年自寧夏回曾走黃河察看彼處河勢亦甚險水面有與相等者有更大於此者張玉書亦曾見之河在口外原走邊地因木難山是一整石山黃河至此觸石而回遂流入中國不然中國寧有此河患耶又奉上諭河道總督張鵬翮惠濟祠前植標竿處可建挑水壩祠後掃灣處亦宜建挑水壩以保淤灘但此二處挑水壩俱不宜太長恐逼水盡向北岸有礙楊家莊口門卞家汪舊壩修建甚佳再略加寬長更善十三日上諭河道總督張鵬翮九里岡隄工修理得法不似從前直掃不能挑溜今修魚鱗掃逐段挺出逼溜開行使窪處漸淤此法甚善其掃工釘樁處可再建挑水壩二座若恐水深則先建磯觜壩形出水俟其壩下漸淤層次加修則料不加多而功易成是年接築蕭縣黃河南岸順河集越隄長五百九十三丈六寸五分遵奉上閲河指示桃源縣黃河北岸九里岡險工建連環壩三座河工事宜冊將大溜挑入中泓掃工得保平穩又建築黃河北岸三坌工越隄長七百六十丈遵奉上閲河指示清河縣黃河南岸惠濟祠前後建挑水壩二座并卞家汪挑水壩亦加寬厚又遵奉上諭題准建築山陽縣黃河南岸清江浦王公隄外挑水壩一座挑溜北向建黃河北岸安東縣便益門南門東門迤西磯觜掃壩二座各長十丈又幫築裏創隄長三百四十丈山安河㕔冊是年桃伏秋汛黃水異漲大溜直衝縣城總河張鵬翮竭力搶救得全隨於縣城瀕河建築二壩挑溜開行以禦頂衝激刷之險又建三套越隄長一千八十丈四十五年改建清河縣黃河北岸王家營新減壩口寬五十丈四十六年五月二十九日上諭吏部朕厪念河防屢行親閲凡自昔河道之源流及歷來治河之得失按圖考蹟靡不周知粵從明季冦氛決黃灌汴而洪流橫溢嵗久不治迄於本朝在河諸臣皆未能殫心修築以致康熙十四五年間黃淮交敝海口漸淤河事幾於大壞朕乃特命靳輔為河道總督靳輔自受事以後斟酌時宜相度形勢興建隄壩廣疏引河排衆議而不撓竭精勤以自效於是淮黃故道次第修復而漕運大通其一切經理之法具在雖嗣後河臣互有損益而規模措置不能易也至於創開中河以避黃河一百八十里湍悍之險因而漕挽安流商民利濟其有功於運道民生至遠且大朕每蒞河干遍加咨訪沿淮一路軍民感頌靳輔治績者衆口如一久而不衰夫人臣有大建樹於國家者奬勳酬庸宜從優渥雖賜恤易名已循彜典尚應特豫褒叙賁以殊恩靳輔著加贈太子太保仍給世職拜他喇布勒哈番用彰朝廷追美勞臣之典為矢忠宣力者勸爾部即遵諭行是年補築豐縣黃河北岸吳家莊新隄長四百三十丈河工事宜冊吳家莊迤上隄工於康熙四十六年八月初六日黃水陡長風雨交加人力難施以致漫溢成缺寬一百三十丈河督張鵬翮題報估修越隄并補築新隄建安東縣黃河北岸佃湖迤上地藏菴前磯觜壩連上水雁翅下水樓崖共長三十四丈五尺又幫寬裏創隄長二百丈又創築栁園頭越隄長四百丈四十七年挑穵碭山縣黃河南岸吳家莊對岸丁家閣引河長一千三百五十三丈河工事宜冊河督張鵬翮亟請挑穵引河引溜直趨疏內題准估挑工竣是年即開放成河吳家莊險工淤閉創築蕭縣黃河南岸徐家莊月隄長五百七十一丈附見張鵬翮河防志一挑穵引河之法審勢貴於迎溜而施功宜於深闊且俟水大漲乘機開放則有一瀉千里之勢若挑穵太窄則受水無多遽難挽溜以入新河若挑穵太淺水不全趨勢緩則墊若挑引河太短水流不舒為正河所抑洄洑漩淤須挑穵寬六十丈或四十丈即窄亦須十餘丈須長二千丈或千餘丈即短亦須八九百丈方趨溜有勢而成河若挑穵引河太直固屬節省錢糧又恐直則平緩而無波瀾湍激之勢久亦漸淤也須隨黃河大勢開挑俾其河頭迎溜河尾泄水中間灣處急溜衝刷漸次河岸倒卸再於河頭築接水掃壩河尾築順水掃壩對河築挑水掃壩庶引河可成也一幫築隄工之法凡屬河道必築隄束水歸漕以防旁溢無論創築加幫總以老土為佳但黃河兩岸率多沙土恐難盡覓老土須於隄完後務尋老土蓋頂蓋邊栽種草根以禦雨淋衝汕築隄之法每土六寸行硪其岐縫處用夯堅築其新舊隄交界又用鐵杵力築層層夯硪期於一律堅實總以簽試不漏為度一卷掃下掃之法凡應用掃箇須捲長十丈八丈者方穩高一丈者掃臺要寬七丈方捲得緊如遇隄頂窄狹者架木平隄名曰軟掃臺然後捲下先將栁枝捆成掃心拴束充心繩揪頭繩取蘆柴之黃亮者􅶇打小䌁總繫於掃心之上每丈下鋪滾肚麻繩一條或不必用麻者即用蘆纜又將大蘆纜二條行繩一條密鋪於小䌁之上鋪草為筋以栁為骨如栁不足用柴代之均勻鋪平需夫五六十名如長十丈者共需夫五六百名八丈者四五百名用勇健熟諳掃總二名一名執旗招呼一名鳴鑼以鼓衆力牽拉捆捲後用牮稈創推掃將臨岸將小䌁均束於掃掃岸上每丈釘下留橛二根將滾肚繩挽於留橛之上每揪頭繩一根亦釘留橛一根看水勢之緩急定揪頭繩之多寡漸次將掃推入水中將橛頭滾肚用活扣結於留橛之上然後慢慢壓土俟掃將次沉下然後下樁每丈用一尺八寸木一根若水勢湍激頂衝掃灣並合龍之掃須用大木不在一尺八寸之例每丈用料物細數照現行工部則例配用可也一黃河內下掃之法凡黃河內掃工有修防有救險有搶險有新生險修防工程於霜降後水勢退消驗查舊掃傾欹者蟄陷者卑矮者朽爛者須將舊掃清消平妥相機補下層層簽釘大樁照依大汛水漲之痕仍高出數尺一律下成順掃薄敷以土俟其蟄定方可下丁頭掃若掃未蟄實即下丁頭掃前順掃一有蟄陷將别掃俱為帶動矣其救險工程將有危陷掃尚未去急須臨河添壓大掃長樁靠隄急清舊掃恐為匯崖填之以軟草將兩旁安穩之掃亦須補下大樁併力救護勿使走動則工程平穩矣其搶險乃因舊掃朽爛或因頂衝急溜掃下衝激空虛舊掃全去水滙崖岸舊隄坍卸岌岌堪虞當此之際人皇皇莫知所措搶險工程事有先後掃有緩急若誤下一掃誤釘一樁反致逆溜湍激衝刷舊隄欲去不能每致僨事須責令久慣掃手或熟諳工程人員殫心料理責任既專令其度量穩妥然後急為接下掃箇晝夜搶下庶舊隄無虞兩旁之掃平穩矣其新生險工每於舊險工之上下黃河大溜一時衝至掃旁舊隄坦坡坍卸急須下掃直至開溜之處而止大率掃料黃河之內以栁柴為重次則枯草樁必長大繩須堅實至於壓土非比清水掃箇黃水一入掃中即泥沙停滯若壓土太厚反恐欹卸俗云下掃無法全慿土壓者乃是言清水之掃也一黃河塞決之法凡黃河初決且不必急計裹頭亦不必急計堵塞初開