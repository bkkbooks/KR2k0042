body:
  text: 欽定四庫全書江南通志卷八十七學校志學校之設肇於唐虞至成周而大備記曰家有孰黨有庠州有序國有學其校之有比年中年三年九年之期其升之有造士俊士選士進士之等蓋化民成俗恆必由之而興賢舉能以備四方之任使亦於是乎在兩漢而後郡縣之學漸次修舉江南自言遊氏興於東吳為聖門文學稱首所謂南方之學得其精華者千百年來積而日盛挾䇿綴文之士常倍於他省我國家治平百餘年德化之所涵濡聲教之所漸被薄海內外幾於家弦誦而户詩書列聖相承加意作人之化於江南尤渥所以廣厲學宫教育之使成材者委曲周詳為從古所未有士之𨽻名庠序者宜何如砥礪束修以明稱德意紀載者重之為類三為卷五作學校志第四學宫一漢武帝時始令天下郡國皆立學校平帝元始三年立學官郡國曰學邑侯國曰校置經師一人後漢光武時李忠為丹陽太守以俗不好學乃為起學校晉太元九年尚書謝石請頒下州郡普修學校帝從之後魏天安初立郡縣學隋仁夀元年詔廢州縣學唐武德七年詔諸州縣並令置學宋慶厯四年以范仲淹請詔州縣興學校五年詔州縣學毋輒容非本土人熙寧四年州給田十頃為學糧元豐元年詔諸路州府學官揚州亳州各一員蘇州一員江寧府一員崇寧中詔縣學生三歲不赴升試者除其籍諸路賓興會試辟雍獨常州中選者多知州教授特遷一官元至元二十三年設江南各道儒學提舉司詔江南學校舊有學田復給之以養士二十五年尚書省臣奏令江南郡縣學田所入羡餘貯集賢院以給多材藝者從之二十八年令江南諸路學及各縣學內設立小學選老成之士教之二十九年詔江南州縣學田其歲入聽其自掌春秋釋奠外以廪給師生及士之無告者明洪武二年詔府州縣皆立學府學四十人州學三十人縣學二十人日給廪膳仍免其家差徭二丁十五年頒釋奠先師孔子儀注於天下府州縣學其祭各以正官行禮有布政司則以布政司其分獻則以本學儒職及老成儒士充之每歲以春秋二仲月上丁日每朔望郡縣長以下詣學行香二十六年頒大成樂器於天下永樂四年三月帝親謁廟附成祖視學記朕聞帝王之興必首舉學校之政以崇道德𢎞教化正人心成天下之才致天下之治唐虞三代之盛率由於兹也我皇考聖神文武欽明啓運峻德成功渡江首建學校親視孔子日引儒臣講論經義求古聖人之道身體力行及統有萬方即詔府州縣皆立學天下士子雲集京師復新作廟學於雞鳴山之陽親製教條頒布中外又命天下增廣生復其家府州縣皆用春秋祀孔子賜以樂舞德教廣被海外諸國并遣入學教化之隆視古為盛朕纘承大統仰遵成憲乃永樂四年三月朔日躬詣廟庭謁先師孔子前期三日雨將祀之夕卿雲澄霽星緯昭明暨旦天宇穆清朗旭鮮麗釋菜於廟退即彝倫堂文武郡臣咸侍左右師儒在席諸生序列堂下命祭酒胡儼等以次講經成禮乃還夫學以明道也道之體廣大光明配乎天地日月而其實不離乎日用之間孔子明之上以承堯舜禹湯文武之治下以為後世植綱常開太平於無窮而世之極其尊崇之禮者非於孔子有所增益特以著明其道之至大天下不可一日而無也爰因視學謹序述所以致隆之本勒碑於廟正統元年始設提督學校官南直𨽻以御史為之嘉靖三年令增應天府學廩膳增廣生員各二十名二十一年題準直𨽻金山衛學設廩膳二十名萬厯六年令南直𨽻廬鳳淮揚四府滁徐和三州提學以江北巡按兼之十二年令南直𨽻提學御史仍兼管江北國朝順治九年命禮部頒臥碑於天下學宫碑曰朝廷建立學校選取生員免其丁糧厚以廪膳設學院學官以教之各衙門官以禮相待全要養成賢才以供朝廷之用諸生皆當上報國恩下立人品所有教條開列於後一生員之家父母賢智者子當受教父母愚魯或有非為者子既讀書明理當再三懇告使父母不陷於危亡一生員立志當學為忠臣清官書史所載忠清事迹務須互相講究凡利國害民之事更宜留心一生員居心忠厚正直讀書方有實用出仕必作良吏若心術邪刻讀書必無成就為官必取禍患行害人之事者往往自殺其身常宜思省一生員不可干求官長結交勢要希圖進身若果心善德全上天知之必加以福一生員當愛身忍性凡有司官衙門不可輕入即有切已之事止許家人代告不許干與他人詞訟他人亦不許牽連生員作證一為學當尊敬先生若講説皆須誠心聽受如有未明從容再問毋妄行辨難為師長者亦當盡心教訓勿致怠惰一軍民一切利病不許生員上書陳言如有一言建白以違制論黜革治罪一生員不許糾黨多人立盟結社把持官府武斷鄉曲所作文字不許妄行刋刻違者聽提調官治罪康熙二十三年御題萬世師表匾額頒懸大成殿又頒御製學校論曰治天下者莫亟於正人心厚風俗其道在尚教化以先之學校者教化所從出將以納民於軌物者也是以古者家有孰黨有庠術有序國有學人生八歲自王以下至於庶人之子弟皆入小學及其十有五年則自元子衆子以至公卿大夫元士之適子與凡民之俊秀皆入大學蓋自家至於國莫不有學自天子至於庶人莫不學自幼至於長莫不皆學凡學有詩書禮樂以為之本干戈羽籥以為之文父子君臣長幼之道於是焉觀之六德六行之教於是焉取之所以淑其耳目手足之舉措而養其心以復其性以為修已治人之大者可謂備至矣是以當時之君子履信思順以事其上小人亦皆樂循禮而恥犯法侯撻不事而至治以興後世學校寖廣博士之途寖繁所以立教之方失先王之遺意士之遊其中者直以為利祿之階欲期道德之一詎不難哉且夫今之所謂教者誦讀焉而已爾而又弗實致其力以防其放僻邪侈之心使氣之充而識之明以漸求復其性其何以為修已治人之道哉故曰教隆於上化成於下教不明於上而欲化成於下猶却行而求前也教化者為治之本學校者教化之原欲敦隆教化而興起學校者其道安在在務其本而不求其末尚其實而不務其華以內行為先不汲汲於聲譽以經術為要不屑屑於文辭如是則於聖人化民成俗之道庶乎其有當也夫四十一年頒御製訓飭士子文曰國家建立學校原以興行教化作育人材典至渥也朕臨御以來隆重師儒加意庠序近復慎簡學使釐剔弊端務令風教修明賢才蔚起庶幾棫朴作人之意乃比年士習未端儒效罕著雖因內外臣工奉行未能盡善亦由爾諸生積錮已久猝難改易之故也兹特親製訓言再加警飭爾諸生其敬聽之從來學者先立品行次及文學學術事功原委有敘爾諸生幼聞庭訓長列宫牆朝夕誦讀寧無講究必也躬修實踐砥礪廉隅敦孝順以事親秉忠貞以立志窮經考業勿雜荒誕之談取友親師悉化憍盈之氣文章歸於醇雅毋事浮華軌度式於規繩最防蕩佚子襟佻達自昔所譏茍行止有虧雖讀書何益若夫宅心弗淑行已多愆或蜚語流言脅制官長或隱糧包訟出入公門或唆撥姦猾欺孤凌弱或招呼朋類結社邀盟乃如之人名教不容鄉黨弗齒縱幸脫禠撲濫竊章縫返之於衷寧無愧乎况乎鄉會科名乃掄才大典關係尤巨士子果有真才實學何患困不逢年顧乃標榜虛名暗通聲氣夤緣詭遇罔顧身家又或改竄鄉貫希圖進取囂凌騰沸網利營私種種弊端深可痛恨且夫士子出身之始尤貴以正若兹厥初拜獻便已作姦犯科則異時敗檢踰間何所不至又安望其秉公持正為國家宣猷樹績膺後先疏附之選哉朕用嘉惠爾等故不禁反復惓惓兹訓言頒到爾等務共體朕心恪遵明訓一切痛加改省爭自濯磨積行勤學以圖上進國家三年登造束帛弓旌不特爾身有榮即爾祖父亦增光寵矣逢時得志寧俟他求哉若仍視為具文玩愒弗警毁方躍冶暴棄自甘則是爾等冥頑無知終不能率教也既負栽培復干咎戾王章具在朕亦不能為爾等寬矣自兹以往內而國學外而直省鄉校凡學臣師長皆有司鐸之責者並宜傳集諸生多方董勸以副朕懷否則職業弗修咎亦難逭勿謂朕言之不預也爾多士尚敬聽之哉四十三年御製平定朔漠告成太學碑恭建碑亭在學五十一年奉旨升祔先儒朱熹於殿內十哲之次改題其主曰先賢五十三年以宋儒范仲淹從祀稱先儒雍正元年諭內閣禮部加封先師五世王爵肇聖王木金父裕聖王祈父貽聖王防叔昌聖王伯夏啓聖王叔梁紇改啓聖祠為崇聖祠兩廡增宋儒張迪從祀三年御書生民未有匾額頒立文廟詔郡縣二祭增用太牢又詔增先賢蘧瑗林放秦冉顔何牧皮縣亶公都子樂克公孫丑萬章先儒鄭康成諸葛亮范寧尹焞黃幹陳淳何基魏了翁趙復許謙金履祥陳澔羅欽順蔡清陸隴其從祀升周敦頤張載程皓程頤邵雍為先賢兩廡東廡首蘧瑗西廡首林放列敘先賢先儒共一百二十三人位次欽頒存學書目上諭十六條康熙二十四年頒周易折𠂻朱子全書康熙四十九年頒御製萬言廣訓雍正三年頒朋黨論雍正二年頒瑞穀圖雍正五年頒上諭雍正八年頒聖祖御纂詩經傳説彚纂書經傳説彚纂春秋傳説彚纂性理精義共四部雍正九年布政使司刋刻大板存貯各省會府學聽人刷印御製平定青海碑雍正三年頒恭建碑亭在學各府州縣入學額例國朝順治五年定額府學六十名大學四十名中學二十五名小學十二名順治十五年定額府學二十名大學十五名中學十二名小學八名康熙二十八年定額府學二十五名大學二十名中學十六名小學十二名雍正元年定額人文最盛之地大學照府學中學照大學小學照中學武童歲科並試額取府學二十名大學十五名中學十二名小學八名雍正四年蘇松常淮揚太六府州分縣文武入學額數與原縣兩分十一年升徐州為府以州治為銅山縣府縣入學名數與各府同十二年夀州分置鳳臺縣入學額數縣與州分十三年升潁州為府以州治為阜陽縣府縣入學名數與各府同江寧府江寧府儒學在府治北宋置學於鍾山之麓天聖中移建府西北景祐間徙於府治之東南元因之明洪武初改為國學十四年别建國子監於雞鳴山下遂復為應天府學正德間重修附王守仁記應天為京兆其學蓋東南教本也在國初以為太學至洪武辛酉而始改創再修於宣德之己酉自是而後浸以敝圯正德士申府尹張公宗厚始議新之未幾而遷中丞以去今中丞白公輔之相繼為尹乃克易朽興頽大完其所未備而又自以其俸餘增置石欄若干楹於櫺星門之外於時府丞趙公時憲亦協心贊畫故數十年之廢一旦修舉煥然改觀師模士氣亦皆鼓動興起與廟學一新教授張雲龍訓導戴章陳義黃森何奎邢越與合學之士二百有若干人撰敘二公之績徵豫文為記豫既不獲辭則謂之曰多師多士若知二公修學之為功矣亦知自修其學以成二公之功者乎夫立之師儒區其齋廟昭其儀物具其廩庖是有國者之立學也緝其敝壞新其朽墁給其匱乏警其墮弛是有司者之修學也而非士之修學也士之學也以學為聖賢聖賢之學心學也道德以為之地忠信以為之基仁以為宅義以為路禮以為門廉恥以為垣六經以為户牖四子以為階梯求之於心而無假於財費也其事不亦易乎修之於身而無假於雕飾也其功不亦簡乎措之於行而無不該也其用不亦大乎三代之學皆此矣我國家雖以科目取士而立學之意亦寧與三代異學之弗立有國者之咎也弗修焉有司者之責也立矣修矣而居於其地弗立弗修是師之咎士之恥也二公之修學既盡有司之職矣多師多士毋亦相與自修其學以逺於咎恥者乎無亦擴乃地厚乃基安乃宅闢乃門户固乃垣墻學成而用大之則以庇天下次之則以庇一省一郡下之亦以庇其鄉閭家族庶亦無負於國家立學之意有司修學之心哉若乃曠安宅舍正路圮基頽垣倚聖賢之門户以為姦是學校之為萃藪也則是朝廷立之而為士者傾之有司修之而為士者毁之亦獨何心哉應天為首善之地豪傑俊偉後先相望其文采之炳蔚才藝甲科之盛多乃其所素餘有不屑於言者故吾因新學之舉嘉多師多士欣然有維新之志而將進之以聖賢之學也於是乎書又於嘉靖十年制增啓聖祠敬一亭貯六針碑各縣如之萬歷中重修附焦竑記應天府學在治之東南腋山襟淮據都會之勝宋景祐中置也國朝高皇帝定鼎金陵嘗就其處為國學逮國學建詔為府學如故自此名卿材大夫踵相接於朝彬彬稱極盛矣頃萬歷丁亥濟南周公繼以巡撫至恐學漸墮弛士人佻達舉廟學而一新之他有樓有亭有橋又公所創為去今十餘載耳而圮壞居半歲己亥諸生朱萬選童廷觀言於大京兆熊公張公徐公疑者以物大務叢未暇皇庠序事也亡何京兆公謁聖於學謂此有弗飭無以稱明天子勸學興禮建首善自京師之意乃按行隱度鳩工庀材命典史喻棨王汝寵董其役而耆民徐文模又捐資力偕兩生者贊成之費稟於官役不病民閲九月而訖功木甓黝堊嚴而不華重門繚垣殿堂庖廩若經書祭器之藏若師生之舍皆爽塏壯雅冠於一時縉紳學士奔走踴躍薦獻如禮弦誦大興京兆公喟然歎士之可與學也謂余為郡人使為之記夫聖人之道性自有之然必馴擾磨揉從容遲久至於禮讓興行風俗醇美而後為學之成明興豈弟作人者垂二百餘年尊尊親親四海嚮風雖田夫野老猶知自奮於隴畝之中而况遊儒學之館被菁義之化者乎又况身際乎日月首耀於光明如留都者乎古無暇論即近出斯學者如楊刑侍傀太宰以器識稱梁端肅周襄敏以政事顯丁中丞景宫允以馴行倡顧司冦陳翰講劉清惠以文學著夫夫也本瓌琦博大之材豎光明俊偉之業巍行尊伐鬱乎不刋雖權幸當朝翠華逺指時事非矣張文僖何尚寶輩不難以九死殉之猶能令姦人泚顙回面竦然而不敢動人徒謂山川炳靈忠孝世美而孰知上之功德涵煦成就如此之深也多士幸生於斯笵型在望而京兆公復篤意教事視前人有加焉多士尚益力於學異日者登巖廊都卿相庶幾為時之偉人有如不試猶當砥礪名莭鼓舞震動有以自列於後冀無愧於鄉先哲與京兆公之意斯於所稱都人士者為不負也已夫本主上之德與賢師帥之教皆為史者之任故不敢不書以示後之人而又使之知事之所以始也熊公名某江西南昌人張公名某淮安海州人徐公名某蘇州吳縣人時張以遷秩行而徐公實克終之法得備書國朝順治九年總督馬國柱題以明國子監改為江寧府學重修聖殿旁設兩廡前立櫺星門戟門後改彝倫堂為明倫堂堂旁設志道據德依仁遊藝四齋以官署為啓聖祠以國子監坊為江寧府學坊其後祠廡漸敝康熙五年總督郎廷佐布政司金鋐督糧道口口口知府陳開虞重修十九年知府陳龍巖重修兩廡七十二楹二十一年總督于成龍倡修同知朱雯署府篆捐俸修整四碑亭及兩廡門欄二十二年知府于成龍教授謝允掄訓導鄒延屺開濬泮池築屏墻四十五年織造使曹寅五十五年布政使張聖佐相繼修葺雍正十三年總督趙𢎞恩重修附趙𢎞恩記江寧府學前明國子監也朝定我之九年以督臣馬公國柱請即其地改建府學鼎嗣順治十三年康熙二年三十四年重修規制恢麗巍煥肅穆枕湖帶溪鍾阜雞鳴左右拱峙以江南為人文淵藪江寧尤為重地而學宫之形勝氣象聿與之稱士之瞻仰弦誦其地者誠倍足以作命總督其向化興行之志矣余奉廟庭見楹桓榱桷庭宇兩江駐節江寧恭謁夫子門楯以歲久不治頽側剝蝕而有司沿習具文豆籩簋簠尊罍之不古法舞蹈聲容之不中莭均非所以尊聖人而致誠敬也乃檄行鹽驛道孔副使虔往東山聘請學者修飭祭器樂器遵古以製惟度惟具致工曲阜選士肄樂越五旬儀物既備乃治廟宇庳者崇之欹者立之葺罅整陋施丹布采越三月榮光昭煥視昔若加計費二千五百兩有竒皆出自余未敢募諸他人也仲秋之丁將修釋國奠之禮乃為文以勒之麗牲之碑夫嘗考自古人家設學教士所以育人才以致治也才以鄒魯齊晉河洛之間為盛逮晉南渡衣冠望族盡遷江左人文之盛始萃於金陵而散布三吳從此風氣日開家禮樂而户詩書其文章道誼功名莭行之美與夫簪組軒冕之富常甲於天下豈惟山川之所鍾孕者秀而永亦濡染之所及月異而歲不同也然俗之陋者蘄有以開其先風之盛朝文者蘄有以振其後我建學置師以致邊逺僻左之治誕敷荒裔陬澨咸地皆有鄒魯之風是陋者既日以開則盛者宜日以振而後可致其盛於日上之勢而不慮其哀今國日士生斯土而求所以振之之道亦惟深體乎師家立學之意而副之以實而已夫學以聖人為聖人之道精粗本末無所不該讀其書以求其道則又甚易而簡事不越於君臣父子夫婦兄弟朋友之交功不踰於學問思辨時不離於飲食居室其要不外於忠信篤敬其説則具於詩書易禮春秋其易且簡如此然由之則上為聖賢次亦不失為寡過之君子而畔之者則目為禽獸其嚴又如此以是立學以為教固足以淑天下之士而為治化之本故自宋元明以迄我朝因其制而加謹焉設科取士舉一代名器之重惟遊於學者是畀誠以能讀聖人之書必能為聖人之道也然則士之遊其宫者固將躬行篤踐以為身學深求心得默識默存以為心學而後無負於立學之意苟徒事占畢誦讀攄文綴華以為邀時弋名之具則國家亦安所賴焉班史志吳稱漢興王兄子於吳招致天下娛遊子弟枚乘鄒陽嚴夫子之徒興於文景之際淮南王招賓客著書而吳有嚴助朱買臣貴顯漢朝文辭並發其失巧而少信雖其言尚矣抑亦吳地之大略也金陵自孫吳建都後六代遞嬗祖尚清言王謝風流士有餘慕至明祖開國於此遂為留都南僚政簡務間率以詩文觴詠歌舞為娛樂冠蓋輿馬都雅相矜尚其知名之士樹壇坫角門户馳騖聲華而鮮實行明祚之移識者猶咎之今百餘年來其餘習猶有存焉者乎是今日兹郡之士風急宜振起者良惟身學心學之是務讀夫子之書即實求夫子之道師顔曽以師夫子修其易簡而凜其嚴使其學明體達用實足以任名器之重而佐治化之隆方不負聖天子勤勤訓士之至意將人才之盛邁於曩昔豈僅枚乘鄒陽嚴助之徒之足較勝乎哉余於斯廟之聿新而有厚望焉用書以告之多士是役也經畫量度虔肅將事則安徽布政使司李蘭督糧道王恕鹽驛道孔傳煥而董其役者則江寧府知府張􅒧年理事同知巴都善也社學各府州縣皆同文廟崇祀孔子以四配十哲並朱子配享以先賢蘧瑗以下七十八人先儒公羊高以下四十五人從祀各縣學同崇聖祠崇祀孔子五代配祀先賢顔無繇及孟孫氏四人從祀先儒周輔成及朱松五人名宦祠鄉賢祠各縣學同上元縣儒學舊在縣治東宋景定二年知縣龔蜚英創建元至元中縣尹田賢重修明洪武初省生儒併於府學𢎞治三年府尹秦崇於河干增置石隄障秦淮水嘉靖二年都御史陳鳳梧平學後高阜建尊經閣國朝順治六年以舊國子監改府學遂以府學為上江兩縣學其規模俱從府學制康熙五十四年布政司張聖佐重修尊經閣五十八年江蘇按察使李馥重修文廟建青雲樓雍正十二年教諭章玉樹重修江寧縣儒學舊在縣治北宋景定四年知縣王鏜建元因之明初省生儒併於府學國朝順治六年與上元縣同以府學為縣學句容縣儒學在縣治南唐開元十一年始建於縣署東宋皇祐間知縣方俊再建元豐二年葉表以縣南驛改造即今地紹興二十三年龔濤修元至大二年縣尹趙靖重建明洪武十二年知縣韓思孝修殿廡置齋室十五年知縣韓宗器修明德堂永樂十五年知縣周庸節重建戟門景泰間東廡災知縣浦洪新之成化十四年知縣徐廣重建大成殿嘉靖四十五年署縣推官張夢斗移廟廡前數十步建明倫堂尊經閣于後國朝順治十三年知縣葛翊宸修雍正四年知縣施廷瓚重修并修兩廡及各祠溧水縣儒學在大西門內唐武德間建宣聖廟于縣治東宋熙寧二年知縣關起遷於崇儒坊元升為州學明復為縣學知縣鄧鑑高謙甫相繼修葺嘉靖十七年圮於水知縣陳光華徙于京兆館東謝廷􅉅成之三十九年知縣曽震復即朝元觀基為今學周之屏成之萬厯二十八年知縣徐必道加葺國朝順治十三年知縣閔派魯重修高淳縣儒學在縣治東通賢門外明𢎞治六年建至十二年規制始備正德七年災御史徐翼周鵷重建萬厯中知縣董良遂丁日近重修知縣韓維聰增建國朝順治十三年知縣紀聖訓重修康熙三十八年知縣遊祿宜重修五十八年教諭鮑漣修葺雍正九年署知縣朱鷺修建屏墻江浦縣儒學在城東明洪武十年知縣劉進創于浦子口城內二十五年徙縣遂遷今地宣德初修景泰中知縣勞鉞重建嘉靖中張峯侯國治改建其後王守正李維樾相繼修葺國朝康熙元年教諭汪湛斯重修二十三年教諭秦松華訓導張士猷重修雍正四年知縣項維正教諭朱廷策訓導王䭲重修六合縣儒學在縣治西自唐至宋屢經遷徙明洪武五年知縣陸梅創立正統間史思古黃淵成化後唐詔萬廷程董邦政相繼修理舊西向國朝康熙六年知縣顧高嘉增修改南向三十四年知縣吳仲光移建於小東門外靣滁河監生汪宇等捐助成之五十二年知縣魏世泰修正殿文昌閣奎璧樓雍正四年知縣萬世良升高大殿建兩坊於櫺星門外蘇州府蘇州府儒學在府治南宋景祐元年范仲淹奏建以胡瑗主教事建炎兵燬紹興後以漸修復元大德初治中王都中撤而新之明洪武初知府魏觀即舊址建明倫堂闢地又新之宣德間知府况鐘重建大成殿又建至善育賢堂於後附以四齋兩廊學舍前有范公手植古檜後有尊經閣天順間知府姚堂構道山亭成化四年知府賈奭創立遊息所十年知府邱霽改作先師廟門廡橋池悉備正德元年建東西二門曰躍龍曰翔鳳嘉靖十年制增啓聖祠建敬一亭貯六針碑各州縣如之隆慶萬厯間先後修葺崇禎六年颶風作廟署祠宇橋木墻垣一時傾毁巡按祁彪佳巡撫張國維推官倪長玗纍年增修國朝順治十二年巡撫張中元率屬修葺康熙二年巡撫韓世琦布政司佟彭年七年巡撫馬祜十六年巡撫慕天顔相繼修治二十一年巡撫余國柱布政司丁思孔蘇松常道祖澤深捐資大修聖殿宏麗改觀二十四年巡撫湯斌重修附湯斌記國家興治化在正人心正人心在崇經術漢儒専門名家師説相承當詩書煨燼之餘猶存什一於千百其時選舉不以詞章通經學古之士皆得上聞朝廷定大議斷大疑博士據經以對故士大夫勇於自立無苟簡之心孝弟廉讓之行更盛衰而不變此重經術之效也宋濂洛關閩諸大儒出闌天人性道之源流故天下知性不外乎仁義禮智道不外乎人倫日用所謂得六經之精微繼孔孟之絶學宋史道學儒林釐為二傳蓋以周程張朱繼往開來師友淵源不可與諸儒等耳而道學經學自此分矣夫所謂道學者六經四書之旨體驗於心躬行而有得之謂也非經書之外更有不傳之道學也故離經書而言道此異端之所謂道也外身心而言經此俗儒之所謂經也宗洙泗而禰洛閩人心之所以正也學者必先明義利之辨謹誠偽之關則富貴貧賤之非道不處不去必劃然也造次顛沛生死禍福之間不可移易者必確然也毋為枉尺直尋之事毋作捷徑苟得之謀寧拙毋巧寧朴毋華寧方毋圓戒懼慎獨之功無時可間子臣弟友之職不敢不勉不愧於大廷亦不愧於屋漏如此則發為議論自能息邪距詖而鄉願楊墨之教不得騁也出為政事自能尊王黜霸而管商申韓之政不能施也其斯為真經學其斯為真道學也已否則剽竊浮華茍為譁世取寵之具講論踐履析為二事即誦説先儒亦何賴乎雍正九年巡撫尹繼善又重修正殿及明倫堂文廟崇祀孔子各縣學同附鄂爾泰丁祭木榜為恭逢丁祭大典嚴至飭各屬官司宜備物以告虔須先期而齋宿事竊以聖先師萬世之師表也冠帶集圜橋天子有臨雍之典春秋屆仲月上丁修釋菜之儀內則命夫胄子三公外則寄於有司羣牧典綦嚴矣誰敢懈焉本司寄任屏藩職司典守前當春祀親齋沐而宿黌宫先令儒官校簿書而正祭器乃知牲或已經宰殺既失告全致潔之心物豈盡屬肥鮮更乖博碩蕃滋之義且或帝供不充夫額數任先後以那移珍品不給於豆籩致鹽菹之雙疊兼聞各學亦有同風罔知共竭精誠但解奉行故事甚或尊罍未備疇詳犧象之形琴瑟雖陳莫辨敔箎之狀觀者如牆如堵任彼咆哮祭者似醉似癡頽然聾瞽一尊才薦滿庭之燎火無光三獻未終兩廡之燈輝已滅於是㽅鉶與簠簋悉憑顛倒几筵鹿兔共榛茭似遇摩空鸇雀分甘奪膬半由承祭之家人拍地喧天遑問糾儀之齋長廩增附學諸生怒髮衝冠與𨽻膳夫一片雄心染指凡此之類罪豈勝誅皆由約束之不嚴亦以躬行之未善不思主鬯則身膺一命幸得窺聖人門牆分獻則職任半氊原以司泮宫爼豆平時未知化導已蒙尸位之譏臨事不克恪恭難免曠官之咎為此飭郡守州牧縣令等職亦以誡教授學正諭導諸員嗣先後各精乃心以襄大典預期三日牲牷皆供乎餼牽事一朝品物盡陳於頖璧齋戒沐浴來觀習樂試歌舞於明倫堂前料量潔清退服寢衣斂精神於尊經闍畔庶幾必誠必敬斯夙夜之惟寅無怠無愆知神人之咸格是并申之條約用以頒諸學宫如左肇一既奉神位不唯簠簋籩豆照數增設即牲牷亦應聖五王各增其四有議共牲者其説不可從考之典禮惟配享甫可以共牲者專主無共牲之禮書云文王駢牛一武王騂牛一其明徵也自三代至漢唐皆不聞有共牲之説唐時祀五方帝且别以五色犢其異牲可知惟後漢有青帝赤帝共一犢白帝黑帝共一犢者祀之共犢非古也唐開元時五品以上室異牲六品以下共牲豈有王爵而可共牲者乎其各照數增一為五可也一祭牲祭品皆有定額一品一籩罔可缺遺况牲取親割以告虔也取其血毛以告全也可既宰而入學門乎豕曰剛鬛注謂其豕肥則鬛剛羊曰柔毛注謂其羊肥則毛細而柔弱此博碩肥腯之所由稱也可以瘦瘠不堪之羊豕而飲之灌之以充牲牷乎既宰且不可瘦瘠且不可况可闕其額數而以肥吏胥之囊橐乎月令曰犧牲無用牝又曰命宰祝循行犧牲視全具按芻豢瞻肥瘠察物色必比類量小大視長短皆中度五者備當上帝其饗注曰上帝且歆饗之况羣神乎嗣後各官俱須先三日親至學視牲牷如法然後稽其數使人牧之以待先一夕親割吏雖姦其何所施乎樂器俱照闕里志修理整齊不得因陋一各學祭器就簡除已完備者無論外其未完備者該學教官考據圖式移送有司設法捐備如有司推諉不肯捐備者許該教官據實申詳以憑定奪如有司新置完整亦許該教官詳明以憑嘉奬庶知其留心正務也一丁祭先數日集樂舞生演習精熟先一日與祭官員親同往看不得草率從事一丁祭先一夕凡與祭官齋宿學宫不得有一員私宿本署一丁祭之日庭燎燈燭務須光明如晝俟祭畢後已除神前燈燭之外官員不得各自張燈一丁祭之日櫺星門內不得容一間雜人所有事宜止許學書幹辦及小心謹慎門斗二人多則四人照應燈燭其官員僕從人等一槩於門外伺候萬無許僕從人持燈夾墊相隨上殿及上兩廡之禮君師一體幸勿自取罪戾以貼失禮之愆也無甫搶奪祭一丁祭之日既不許容一間雜人自燭及祭品之人倘或仍有潛匿門內乘空搶奪者以盜賊論即時擒獲解司以憑盡法重究一學宫之北聖賢靈爽所依不唯丁祭宜修治肅清即平時亦宜灑掃潔淨近見黌宫以內栽瓜種菜學圃成澆灌之場曝被晒衣諸生絶往來之路甚至丹楹刻桷徒供蝙蝠棲遲鳥革翬飛盡是鼪鼯巢穴蛛塵百斛廟貌埋埃垢之中鼺糞千箕腥穢聞宫牆之外皆巳安之若素久且視為當然甚至先儒先賢兩庶之神牌倒置鄉賢名宦兩祠之神位傾頽非其子孫有誰咨問加之朽蠧若罔聞知凡爾學官所司柯職諸門役等多亦奚為嗣後教官不時巡察務令門斗分班輪值逐日掃除學宫之內總不容有一毫塵垢庶無忝厥職也慎哉毋忽崇聖祠名宦祠各縣學同附明陸粲名宦祠議謹按蘇郡學名宦祠所祀古今監司守倅通若干人而其間甫不係於蘇者蓋六人焉王魏公旦富韓公弼歐陽兗公修蘇端明軾陸丈安九淵李文靖侗皆賢去也而得祀於蘇則知禮去疑之夫祀國之大事也將昭勳德勸忠孝示愛敬以為民質也不可不謹開諸古曰鬼神不歆非類又曰非其鬼而祭之諂也諸君子未嘗涖官兹上雖聲實顯著而惠之流於蘇也不専其祀之也越於禮矣或曰諸君子之言行功伐合於祭義所謂以勞定國法施於民者將天下得祀而何有於蘇粲以為非也在禮惟天子有天下其祀無所不通諸有國者山川百神之祭皆不出境術成公欲祀相寧俞曰相之不饗於此久矣不可以間成王周公之命祀楚昭王有疾卜曰河為祟大夫請祭諸郊王曰三代命祀祭不越望江漢睢漳楚之望也河非所獲罪也皆不果祀今之祀者郡守丞實從事焉郡守丞秩不過古諸侯諸侯之祀不敢踰國而郡守丞得祀他境之賢以為禮也亦有據乎今之制惟孔子為師儒宗得天下通祀自餘若臯陶伊尹伯夷太公之倫猶不得與孔子比其祀皆不出於其鄉與其所封之土禮之節也諸君子微有孔子之聖雖賢亦不能當臯陶伊尹伯夷太公而祀非其地也越於禮矣原其始所以得祀不可知殆邦人之好賢以是寓其愛敬或其門人子弟有官於蘇者以其私附焉而後人遂襲之與知禮者亦改而正之可矣或曰諸君子之祀列於學宫邦人習聞之三百年矣誠一日撤焉將駭民聽而傷忠厚之道夫與其過而去之也寧過而存之乎粲又以為非也夫非禮之禮君子有弗貴者焉孔子曰曽謂泰山不如林放乎以死者為無知又焉用祭以為有知夫亦忸怩而莫之顧也君子愛人以德細人愛人以姑息今為非禮之禮以瀆賢者又拂先王之經而踰當代之制非小過也不亟正焉而襲細人之姑息以為忠厚亦陋矣乂蘇自漢以來監司守倅賢而不得祀者尚多謂宜擇其人進之而罷諸所不當祀者於誼為允且使斯民知禮之嚴若是雖賢者不得僭冒庶幾禁淫祠黜匪類以示風教之本也由兹祠始鄉賢祠各縣學同吳縣儒學舊在縣治東南宋景祐時始立紹定初改建於府西賓興坊元至正十九年平江路總管周仁縣尹張經始琢石為門附鄭元祐儒學門銘天下郡縣學莫盛於宋然其始亦由於中吳蓋范文正公以宅建學延胡安定為師文教自此興焉若吳縣學按李宗諤圖經云文宣王廟在縣廨東南今三皇廟故縣治也紹定初知縣趙善瀚始建學於郡城西南之賓興坊去姑蘇驛不百步其廢置遷易概可考矣宋以杭為行都中吳乃三輔地縣學宜大於鄰邑然負城西隅於地勢蓋甚迫窄更宋迄今纍加完葺至正十九年平江路總管周仁縣尹張經皆以興學為已任覩學外門日就廢壞乃始琢石為莛與楹上象日月堅緻聳峭翼以垣牆瑰麗𢎞敞稱其為子男學宫之門攝學事盧熊及學之人士咸謂縣之有學久矣未有以石為門者非二侯致力興學不及是也遂為之銘曰有吳邑有學由宋始完宋社既墟學宫則存維學門聿嚴啓閉因陋就簡蓋已歷世郡守周侯近古遺愛張令佐侯民所共戴琢石莛楹作學之門石質如玉孚尹潤溫木易螙朽石堅斯久何莫由是以啓其蔀勒銘於兹豈特識言來遊來歌永矢弗諼明洪武五年知府魏觀重修宣德九年巡撫周忱知府况鍾徙建縣治東南為屋二百三十餘楹成化八年知縣雍泰重建櫺星門𢎞治十年知縣鄺璠加闢焉嘉靖二年知縣楊叔器作講堂西齋號舍經閣跨街建會解兩坊工未竟五年知縣蘇祐成之崇禎間知縣陳文瑞牛若麟先後重葺國朝順治十一年詔天下修學督學石申教諭夏鼎倡修十七年諸生施學先等捐修敬一亭葺興賢仰聖兩坊康熙六年布政佟彭年捐資修葺二十四年巡撫湯斌建尊經閣四十年巡撫宋犖飭攝縣事李宏重修雍正九年巡撫尹繼善捐俸修理飭縣令吳棟按察司經歷陸廷樞董其事殿廡墻垣煥然一新長洲縣儒學宋景定間始立在府城東北後毁元至正中縣長元童與郡人陸德源創建之明洪武七年知縣宋敏文張翔修葺成化九年知府邱霽乃擴地東南改建焉正德中提學張鰲盡以廣化寺地歸學嘉靖十八年巡按舒汀以教諭蕭文佐議學地湫隘謀遷之遂改城東福寧寺以為學宫創立悉如制萬厯十七年巡按李堯民重修規模畢備二十五年知縣江盈科建文星閣國朝順治十一年督學石申修葺未竣康熙間訓導王玢教諭姚文焱先後竟其工附丁思孔記古先王敷教以治天下自黨庠術序無非學校而其教之之人即一鄉之賢士大夫習知其土俗性情因以簡其帥與不帥者而興之屏之則人之淑慝咸相見而無所容其欺偽矯飾之情所以事勸而業成凡屬智能勇功之士克為國家建大猷肩大任者亦無不出於其中故自禪讓以還何代不以武功定天下及統緒甫集未有不汲汲於敷飭文教以為永安長治之基者誠以其效雖緩而功可久也逮行之寖逺儒學與吏治既分兩途一切理民經國皆以為不必出於鄉三物之中而唯智能勇功之是騖舉凡古初厲世磨鈍之具率視為迂闊無當之虛文相與掉臂而去之設有司其職者鰓鰓焉惟德教是憂反衆起而嗤訕之其人茍非篤信而強力者亦且靡然置之而不敢復道於以求人心之敦茂而道德之凝承也不綦難乎於此有人焉不顧時俗之浮言毅然立教以為已任舉廢起衰以行之斯亦人之所難能矣夫善教者猶醫也攻疾在瞑眩之際則主在標養疾於平緩之日則探其本若是者良醫也不問緩急惟其疾之所至旋轉以相逐則亦庸醫而已矣今謀治而必審其端於教是蓋能探其本者也吾所謂效雖緩而功可久也且古今治法固有相沿未變者矣古者鄉治其鄉國治其國無所嫌於私昵也後世防檢益嚴土著者不得仕於其鄉甚且立為三互之法而惟銓補學官許不避其本籍是猶教之鄉而用其習知土俗性情之遺意也然因其土俗導其性情又有不可同日而論者今自大江以南若姑蘇固吳越之一大都會也承要離伍胥之流風而文以延陵季子辭讓之節其於慷慨憤烈之事或至滅頂剝膚而不暇惜豈非明於憂患而獨立不懼者哉然而敝化奢麗之虞抑已久矣司是教者就所長以正之因其敝而革之要厥觀摩必自學校始矣嘗考志乘在郡之儒學三長洲學宫建置獨後創於宋之景定再立於元至正間而改設於明之嘉靖歷年滋多傾圮是患訓導王君受事典學喟焉歎興捐資以謀完葺度材庀工未幾而棟宇克新垣墉盡繕其所謂毅然已任者歟或猶謂立教之本在於人心學宫之建猶外飾也抑知社稷宗廟之中不施敬於民而民敬良以瞻仰遊息為觀感之所由興茍使儀容器物必淪委於狖鼯榛莽之域又何從端立教之本乎思孔不敏司會是邦栗栗焉惟教養無術之是懼王君修學成而鄉先生暨學之諸弟子員咸造余而請為之記且曰礱石以須久矣余嘉王君之志與余之見固有合也今幸逢聖天子緝熙遜敏嚮意揆文凡中外明揚之典必察其有無興行教化以為考課之殿最斯東吳人士將由兹學之振興知所以導民成俗其本必在乎是於以潔隆夫比閭黨族之化其亦將有合矣夫王君名玢安慶之桐城人康熙四十三年郡紳顧汧等修理萬代宗師坊彭定求捐造三樂堂於明倫堂後雍正四年長洲縣分置元和縣以教諭專理長洲學事五年知縣江之煒修正殿九年巡撫尹繼善捐資重修元和縣儒學與長洲共學以長洲訓導理元和學事崑山縣儒學初在縣治東宋元祐間知縣杜采遷於西南即今地明洪武初改修宣德元年知縣羅永年教諭曹升加葺景泰間知縣吳昭改建大成殿𢎞治五年知縣楊子器復新之國朝順治十五年提學張能麟捐俸倡修康熙九年知縣董正位教諭吳謐復加修葺至十一年工成雍正四年崑山縣分置新陽縣以教諭專理崑山學事雍正十年邑紳士募修正殿戟門十三年新邑顧登捐修尊經閣新陽縣儒學與崑山共學以崑學訓導理新陽學事常熟縣儒學在縣治東南前臨運河宋淳熙十年曽棨始建端平中邑令王爚改建附魏了翁重建大成殿記常熟縣學之始圖乘放失僅有梁書至和紀年餘無所考慶元三年縣令孫應時以言遊里人也始祠於學新安朱子既為證其事寶慶元年祠遷於學之左而孔堂闕壞茀不加治今令會稽王爚始至大懼無以崇化善俗約縮浮蠧踰年更而正之屬邑士胡洽胡淳庀其役以孔廟居左廟之南為大門北為言遊之祠又東北為本朝周子張子二程子朱文公張宣公祠以明倫堂居右東西為齋廬四以館士為孰二東以儲書凡祭器祭服藏焉西以居言氏之裔通為屋一百有二十楹而為垣以周之且增田四百畝有竒歲助公養之費凡言氏之裔官為衣食而延師以教之别為田五百畝以給其費白於郡於部使者為廩以貯之經始於端平二年冬竣事於明年之秋乃八月丁亥釋奠於新宫屬郡人葉輔之敘其役以求記於了翁竊惟朱子嘗記子遊之祠矣如魯論所載二三事皆發揮無餘藐兹孤陋安敢復措一詞然嘗讀禮書而竊有見焉因記廟學之成並附其説夫檀弓不知何人所作而一篇之中獨於子遊極其稱譽雖於孔門諸子率多譏評又以言曽並列其是言而非曽者非一幾若偏於抑揚然即其書考之大抵當典禮訛闕無所考訂之時人之有疑弗決者以質諸子遊故前後典禮所闕者十有四皆以言遊一言為可否亦足以見其為時人之耳目雖汰哉叔氏之一語若譏之而實尊之然則子遊以習禮列於文學蓋三代典章之遺賴遊以有存者嗚呼信為豪傑之士矣昔柳宗元謂論語所載弟子必以字惟曽子有子不字遂謂是書出於曽門蓋字與子皆得兼稱如門人之於孔子進而稱子不敢字退而言仲尼不言子其次亦有既子且字如閔子騫等不一二人或子或字者又數人然淵弓至遊夏最號高弟字而不能子也有子曽子子而不得字也就二者而論則字為尊故孝經字仲尼而子曽子禮運字仲尼而名言偃至於子思字其祖孟子字其師之祖相傳至今之人字仲尼者無敢以為疑仲尼作春秋二百四十二年間字而不名者僅十有二人而遊夏諸子之門人亦各字所師相承至於漢初猶未敢輕以字許之即是而觀則子遊以勾吳孤逺之士遂得字而不子以列於高弟之目此又豈易易然者今吳門密邇行都而常熟為壯邑有如遊之北學洙泗遂以習禮輩行顔閔寥寥千載間豈終無其人耶或者狃於習俗未有以自振我朱子既嘗表其事以風厲之豫又何言獨惟山川風氣古今猶夫人也誦先聖之書服先賢之訓嗚呼其必有聞風興起以毋負建學尊賢之意者士其勉之元皇慶中邑人楊伯麟修明因之而加闢焉宣德九年知縣郭南修兩廡學門正統二年知府況鐘修兩齋六年縣丞陳澄建尊經閣成化二年知縣甘澤修廟學𢎞治八年巡按劉廷瓚重修萬厯三十七年知縣楊漣重修國朝順治十二年提學張能鱗葺文廟康熙六年同知魯超重建尊經閣附魯超碑銘聖人以六經教人而學者往往得其性之所近要其指歸期於相通而已自漢以還諸儒各守其師説黨同伐異抵牾萬端其後始定為大經兼經之法以取士由明迄今専用一經而已然竊以為取士不必其求備而教人則欲其兼通末世功名之士黽勉章句以希弋獲視二經以外辟如侏􅍣語言之不相通而方圜鑿枘之不相入此講誦不事而詩書放棄之所由來矣常熟縣學之有尊經閣始於明正統時教諭趙永言而署縣事陳澄成之其後再修於萬厯間逮今幾六十餘年矣棟櫨欹折蓋瓦穿漏編簡之僅存者鼠嚙而蟲蠧登覽者慨然余以采風校士每過其地則思捐俸葺理之會右藩佟公諱彭年大參盧公諱綋安公諱世鼎暨郡守吳公諱道煌督糧吳公諱江偉司李龔公諱在升邑令李君璞咸樂為佽助於是鳩材聚工經始於丙午之春董其役者為學博士沈君汝蘭凡閲月而告成從衆志也既成余徘徊瞻顧而歎曰常熟小邑也而得為南國人文風氣之首者豈非子遊氏為之先耶子遊文學之科也而其言學道則愛人易使則夫聖人之教果有外於道以為學而凡詩書禮樂之文果不足以盡道歟今郡縣學有明倫堂與尊經閣並建禮也孟子謂經正則庶民興而推楊墨之害至於無父無君然則所謂道者豈有外於君臣父子夫婦兄弟朋友相接之世祖皇間而所謂經者非即親義序别信之燦然者歟我帝有見於此特命儒臣纂修經訓詔天下貢院皆得以孝經試士天下嚮風而余所見郡縣皇上繼之稽古右文崇尚實學浮屠珠宫紺宇以藏其所謂梵書唄字者至吾堯舜禹湯文武周公孔子之書雖學士大夫家猶不知所以尊禮之者何其重於彼而輕於此也蓋玩其文不察其義習其言不體諸身是雖日取聖人之書而尊禮之無益也於戲道之不行也自經學之不明始矣余承乏斯土以備防為事非有教化天子仁之責於躬幸承波不揚以與二三子講道問業於聖德威遐暢海此詩不云乎至於海邦莫不率從又曰矯矯虎臣在泮獻馘夫余之此舉亦猶行古之道也夫碑而聖世懿銘曰於皇經黼黻五典瑛瑶猗惟周行淑我譽髦德孔昭六矧伊海隅先哲之里奕奕三吳悠悠千祀炳如蔚如是𢎞是啓縹囊緗帙聖則寓焉安絃舞籥道則傳焉庇之無所曷永曷宣相彼二氏雕甍刻宇慧藏霄承琅函玉貯豈伊典墳罡儕梵侣尊經有制先民所營爰即故址以善其仍櫜鼓具舉東壁斯明易占棟隆詩歌如跂雲起虞山風來琴水虎變龍驤於焉狎紀為麟為鳳為圭為璋本諸孔孟騁乃羲皇翊我鴻祚名德無疆十八年知縣林象祖重修雍正四年常熟縣分置昭文縣以教諭專理常熟學事昭文縣儒學與常熟共學以常熟訓導理昭文學事吳江縣儒學在縣治東南舊學在城西隅宋紹興間燬於兵知縣石轍改創於垂虹橋南元至正十二年達嚕噶齊哈瑪爾氏拉爾錦命樂師選習廟樂附許從宣大成樂記按周制大胥春入學舍菜合舞秋頒樂合聲故凡釋奠必有合也其登歌清廟下管象舞大武是也故月令仲春上丁命樂正習舞舍蓋學校禮樂所自出小有舍菜而以食為主大有釋奠而以飲為主其於學校習舞與聲大合六代之樂一也吾夫子以聖人享南面王爵歷代尊崇禮頌之縟情文之備至於今莫之能尚也唐貞觀間太宗以文治然其廟享聖人襲用齊典禮僅設軒架之樂六佾之舞而已繼後開元間釋奠始用宫懸之樂至於故宋崇儒右文可謂至矣然春秋上丁釋奠東序上戊釋奠西序雖登歌有部至其用樂不以軒懸而以判架兼不設舞位先儒謂有歌而無樂非古人習樂合舞之意也遂乞釐正以表尊崇至考唐之儲君其釋奠於學鐘磬簨簴絲聲在絃匏笙並陳柷敔合止賁鼓間作塤箎和鳴具有成式禮將陳協律郎俯伏舉麾則永和之樂作登歌則肅和之樂奏雍穆紓和悅人心而娛神明者其為樂可謂盛矣今天下路府州縣莫不有學其所以尊崇聖人者冠衣服章殿寢階戺已純乎王者之禮矣若夫廟樂八音蓋猶有取乎虞廷之韶簫豈不曰後世雖有作者虞舜氏不可及矣吳江之為州也雖於吳為南北津要然州治出乎江湖之上風濤之所掀播魚龍之所出沒而州學迫里市之隘在垂虹橋之南廟享聖人既有著今學宫與廟雖皆具至於廟樂則尤缺焉至正十二年州達魯花赤哈迷里氏禮牙進公以奉議大夫來監是州既建戟門以大廟制遄命樂師選學之彥肄習廟樂甫及期而樂大備自凝安典禮變成章與八音並奏而無􅊏毫敢略者廟樂於是告完人士之美者來遊來歌觀廟樂以矢其音况當大比之年其為世用必矣若夫琴瑟在御笙歌間奏且將見蛟龍黿鼉海怪水獸與仰秣之馬出聽之魚咸感化於廟樂之盛者而况於人乎况於鬼神乎明拓其地而新之景泰六年知縣賈亮重建國朝順治九年至十三年知縣唐增吳就恆雷珽教諭洪天開相繼修葺康熙五年同知魯超推官龔在升知縣劉定國捐修雍正四年吳江縣分置震澤縣以教諭専理吳江學事知縣徐永祐重修殿廡震澤縣儒學與吳江共學以吳江訓導理震澤學事江南通志卷八十七
