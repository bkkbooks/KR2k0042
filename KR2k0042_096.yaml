body:
  text: 江南通志卷九十七武備志驛傳一郵傳之設所以通輶軒達羽檄也實與軍政相表裏江南當直省之衝舟車之役應接紛繁我國家肅清郵政體恤周詳行者無濫縱之求主者絶侵漁之弊津亭修整騄耳騰驤視古稱盛善焉爰志驛傳而船政並附見云江寧府江東驛原設馬七十五匹馬夫七十五名雍正十年裁減馬夫一十五名今現設馬七十五匹草料銀二千一百六十兩馬夫六十名工食銀八百六十四兩支應銀六百兩馬價銀一千一百二十五兩鞍轡等銀一百三十五兩嵗共支銀四千八百八十四兩雍正十二年核減草料等銀嵗共六百四十五兩七錢五分金陵驛原設馬八十五匹馬夫八十五名後於題明請將等事各案内裁減馬五匹馬夫五名又於雍正十年裁減馬夫一十六名今現設馬八十匹草料銀二千三百四兩馬夫六十四名工食銀九百二十一兩六錢支應銀六百兩馬價銀一千二百兩鞍轡等項銀一百四十四兩嵗共支銀五千一百六十九兩六錢雍正十二年核減草料等銀歳共六百八十八兩八錢龍江驛原設水夫一百名雍正四年裁減夫二十名今現設水夫八十名歳支工食銀一千一百五十二兩遞運所原設旱夫一百五十名歳支工食銀二千一百六十兩今仍照舊大勝驛原設站船二十隻水手七十名後於題明請將等事案内裁減船五隻水手十五名今現設站船十五隻水手五十五名工食銀三百九十六兩苫蓋銀五十一兩五錢嵗共支銀四百四十七兩五錢江寧縣江寧驛原設馬五十二匹馬夫四十二名後於題明請將等事案内裁減馬十二匹馬夫十名又於雍正十年裁減馬夫八名今現設馬四十匹草料銀一千一百五十二兩馬夫二十四名工食銀三百四十五兩六錢支應銀二百兩馬價銀四百兩鞍轡等銀六十兩歳共支銀二千一百五十七兩六錢雍正十二年核減草料等銀歳共三百一十八兩六錢六分六釐七毫句容縣雲亭驛原設馬五十匹馬夫四十名轎摃夫六十五名後於題明請將等事案内裁減馬十五匹馬夫十二名轎摃夫四十五名又於雍正四年增添旱夫二十名雍正六年增設馬十匹馬夫八名雍正十年裁減馬夫九名今現設馬四十五匹草料銀一千二百九十六兩馬夫二十七名工食銀三百八十八兩八錢轎摃夫二十名旱夫二十名工食銀五百七十六兩馬價銀四百一十兩鞍轡等項銀六十七兩五錢歳共支銀二千七百三十八兩三錢内在於地丁徴給銀二千二百八十八兩九錢撥補銀四百四十九兩四錢雍正十二年核減草料等銀歳共二百七十八兩八錢三分二釐龍潭驛原設馬四十匹馬夫三十二名後於題明請將等事案内裁減馬五匹馬夫四名雍正十年增設旱夫二十名裁減馬夫七名今現設馬三十五匹草料銀一千八兩馬夫二十一名工食銀三百二兩四錢旱夫二十名工食銀二百八十八兩馬價銀三百五十兩鞍轡等銀五十二兩五錢歳共支銀二千兩九錢内在於地丁徴給銀一千七百一十二兩九錢撥補銀二百八十八兩雍正十二年核減草料等銀歳共二百七十八兩八錢三分二釐溧水縣原設馬四匹馬夫二名差夫四名後全裁髙淳縣原設馬四匹馬夫二名差夫四名後全裁江浦縣原設旱夫一百四十五名雍正四年裁減夫二十五名雍正十年扣留夫四十八名今現設旱夫七十二名工食銀一千三十六兩八錢扣留雇夫銀六百九十一兩二錢歳共支銀一千七百二十八兩江淮驛原設馬五十五匹馬夫五十五名後於題明請將等事案内裁減支應等銀八十兩雍正十年裁減馬夫二十一名今現設馬五十五匹草料銀一千五百八十四兩馬夫三十四名工食銀四百八十九兩六錢支應銀三百二十兩馬價銀八百二十五兩鞍轡等銀九十九兩歳共支銀三千三百一十七兩六錢雍正八年裁驛丞歸併江浦縣管理雍正十二年核減草料等銀歳共四百七十三兩五錢五分東葛驛原設馬五十匹馬夫五十名雍正十年裁減馬夫十九名今現設馬五十匹草料銀一千四百四十兩馬夫三十一名工食銀四百四十六兩四錢支應銀二百四十兩馬價銀七百五十兩鞍轡等項銀九十兩歳共支銀二千九百六十六兩四錢雍正十二年核減草料等銀歳共四百三十兩五錢六合縣原設旱夫九十名後於題明請將等事案内裁減夫四十名雍正十年扣留旱夫二十名今現設旱夫三十名工食銀四百三十二兩扣留雇夫銀二百八十八兩歳共支銀七百二十兩棠邑驛原設馬四十匹馬夫三十二名後於題明請將等事案内裁減馬十匹馬夫八名雍正十年裁减馬夫六名今現設馬三十匹草料銀八百六十四兩馬夫十八名工食銀二百五十九兩二錢馬價銀三百兩鞍轡等項銀四十五兩歳共支銀一千四百六十八兩二錢雍正八年裁驛丞歸併六合縣管理雍正十二年核減草料等銀歳共二百三十九兩附史貽直議覆清釐驛務䟽畧臣查金陵江寧等十站差使繁冗倍於他驛原係一馬一夫者改為十馬八夫以免貽悞其餘極衝次衝各驛共五十四處現在馬三千七十三匹除遵兩馬一夫之外毎馬百匹留夫十名以備獸醫抄號等項之用至雲亭龍潭等七站馬夫工食止日支銀三分今旣一夫承管二馬應萌各增一分計共裁夫一千二百四十二名除裁扣工食増給雲亭七站各夫工食外實應裁正閏等銀一萬七千七百八兩四分尹繼善議覆清釐驛務咨文江南各驛為各省通衢差使倍於他省且南方馬匹較北驛不同水土非宜易於生病一夫兩馬難於兼顧且各驛有抄號獸醫以及煮料草水火打掃傳遞緊急本章公文等項原於馬夫内派用故前議於毎百名内酌留夫十名至金江等十站差使更屬繁多留十馬八夫若照例裁減一時差遣無人撥應闗係非輕至雲亭等七站向例馬夫工食原止三分今旣一夫承管二馬調攝控馭加倍於前工食自應一例増給相應咨部仍照原題議覆實於通省驛傳大有裨益蘇州府姑蘇驛原設馬七十匹馬夫七十名水夫二百五十名快船二十隻水手六十名後於題明請將等事案内裁減快船五隻水手十五名雍正四年裁減水夫二十名雍正十年裁減馬夫十四名又扣留水夫一百三十八名今現設馬七十匹草料銀二千一十六兩馬夫五十六名工食銀八百六兩四錢水夫九十二名工食銀一千三百二十四兩八錢扣留雇夫銀一千九百八十七兩二錢支應銀一千二百兩馬價銀一千五十兩鞍轡等項銀一百二十六兩快船十五隻水手四十五名工食銀三百二十四兩修船銀九十九兩嵗共攴銀八千九百三十三兩四錢雍正十二年核減草料等銀嵗共六百二兩七錢吳江縣平望驛原設馬六十匹馬夫六十名水夫二百三十名快船二十隻水夫六十名後於題明請將等事案内裁減馬四匹馬夫四名水夫十名快船五隻水手十五名雍正四年裁減水夫十五名十年裁減馬夫二十二名扣留水夫一百二十三名今現設馬五十六匹草料銀一千六百一十二兩八錢馬夫三十四名工食銀四百八十九兩六錢水夫八十二名工食銀一千一百八十兩八錢扣留雇夫銀一千七百七十一兩二錢快船十五隻水手四十五名工食銀三百二十四兩支應銀五百五十兩馬價銀八百四十兩修船銀九十九兩鞍轡等項銀一百兩八錢歳共支銀六千九百六十八兩二錢雍正十二年核減草料等銀歳共四百八十二兩一錢六分常熟縣原設馬二匹馬夫一名差夫四名後全裁崑山縣原設馬八匹馬夫四名縴摃夫一十五名後於題明請將等事案内裁減馬六匹馬夫三名縴摃夫一十五名今現設馬二匹草料銀五十七兩六錢馬夫一名工食銀一十兩八錢馬價銀一十兩歳共支銀七十八兩四錢雍正十二年核減草料等銀嵗共一十四兩四錢松江府華亭縣原設馬八匹馬夫四名縴摃夫一十三名後於題明請將等事案内裁減馬六匹馬夫三名縴摃夫十三名今現設馬二匹草料銀五十七兩六錢馬夫一名工食銀一十兩八錢馬價銀十兩嵗共支銀七十八兩四錢雍正十二年核減草料等銀嵗共一十四兩四錢婁縣原設馬八匹馬夫四名縴摃夫一十三名後於題明請將等事案内裁減馬六匹馬夫三名縴摃夫十三名今現設馬二匹草料銀五十七兩六錢馬夫一名工食銀一十兩八錢馬價銀一十兩歳共支銀七十八兩四錢雍正十二年核減草料等銀歳共一十四兩四錢上海縣原設馬二匹馬夫一名差夫四名後全裁青浦縣原設馬六匹馬夫三名旱夫八名後於題明請將等事案内裁減馬四匹馬夫二名旱夫八名今現設馬二匹草料銀五十七兩六錢馬夫一名工食銀十兩八錢馬價銀十兩歳共支銀七十八兩四錢雍正十二年核減草料等銀歳共一十四兩四錢常州府武進縣毘陵驛原設馬六十匹馬夫六十名水夫二百四十名快船二十隻水手六十名後於題明請將等事案内裁減馬四匹馬夫四名水夫二十名快船五隻水手十五名雍正四年裁減水夫十五名十年裁減馬夫二十二名扣留水夫一百二十三名今現設馬五十六匹草料銀一千六百一十二兩八錢馬夫三十四名工食銀四百八十九兩六錢水夫八十二名工食銀一千一百八十兩八錢扣留雇夫銀一千七百七十一兩二錢快船十五隻水手四十五名工食銀三百二十四兩支應銀五百五十兩馬價銀八百四十兩修船銀九十九兩鞍轡等項銀一百兩八錢歳共支銀六千九百六十八兩二錢雍正十二年核減草料等銀嵗共四百八十二兩一錢六分無錫縣錫山驛原設馬五十六匹馬夫五十六名水夫二百二十名快船二十隻水手六十名後於題明請將等事案内裁減快船五隻水手十五名雍正四年裁減水夫十五名十年裁減馬夫二十二名又扣留水夫一百二十三名今現設馬五十六匹草料銀一千六百一十二兩八錢馬夫三十四名工食銀四百八十九兩六錢水夫八十二名工食銀一千一百八十兩八錢扣留雇夫銀一千七百七十一兩二錢快船十五隻水手四十五名工食銀三百二十四兩支應銀五百五十兩馬價銀八百四十兩修船銀九十九兩鞍轡等項銀一百兩八錢歳共支銀六千九百六十八兩二錢雍正十二年核減草料等銀歳共四百八十二兩一錢六分江隂縣原設馬七匹馬夫四名差夫四名後全裁宜興縣原設馬三匹馬夫二名差夫四名後全裁鎮江府丹徒縣京口驛原設馬七十匹馬夫七十名水夫二百四十名旱夫五十名快船二十隻水手六十名後於題明請將等事案内裁減快船五隻水手十五名又於雍正四年裁減水夫十五名十年裁減馬夫二十七名扣留水夫一百三十五名旱夫二十名今現設馬七十匹草料銀二千一十六兩馬夫四十三名工食銀六百一十九兩二錢水夫九十名工食銀一千二百九十六兩扣留雇夫銀一千九百四十四兩旱夫三十名工食銀四百三十二兩扣留雇夫銀二百八十八兩快船十五隻水手四十五名工食銀三百二十四兩支應銀六百兩馬價銀一千五十兩修船銀九十九兩鞍轡等項銀一百二十六兩嵗共支銀八千七百九十四兩二錢雍正十二年核減草料等銀嵗共六百二兩七錢炭渚驛原設馬三十匹馬夫二十四名後於題明請將等事案内裁減馬夫工食鞍轡等銀九十五兩四錢雍正十年裁減馬夫六名今現設馬三十匹草料銀八百六十四兩馬夫十八名工食銀二百五十九兩二錢支應銀一百兩馬價銀三百兩鞍轡等項銀四十五兩歳共支銀一千五百六十八兩二錢雍正十二年核減草料等銀歳共二百三十九兩丹陽縣雲陽驛原設馬七十匹馬夫七十名水夫二百二十名旱夫六十名快船二十隻水手六十名後於