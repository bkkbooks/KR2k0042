body:
  text: 江南通志卷一百五十三人物志忠節一江蘇松常四府江寧府南北朝宋張約之棠邑人耿介不阿授吉陽令景平元年朝議廢廬陵王約之疏諫不納遂見殺梁顔見逺晉侍中含六世孫為齊御史治書梁武帝受禪見逺痛哭而死唐劉鄴字漢藩句容人為李德裕掌書記咸通初擢左拾遺召為翰林學士德裕以朋黨抱誣死鄴申直其寃復官爵後為左僕射黃巢亂僖宗西狩鄴追乘輿不及為賊捕急不肯屈遂見殺南唐李元清濠州人徙金陵李後主以吉州永新與湖南鄰命元清為永新制置使每數月一托疾不坐衙微服入湖南境以故敵人動息皆知之國亡歸京師元清偽稱失明召驗之揮刃將及頸目不為瞬乃放歸宋秦傳序江寧人淳化中充夔峽巡檢使李順之亂賊攻夔州督兵拒戰力竭乃為蠟書報上赴火死其子奭泝峽求父尸溺死時以為父死忠子死孝奏至太宗録其次子為殿直賜錢十萬劉綰溧水人纍官安撫使死靖康之難秦巨字子野江寧人檜曾孫嘉定間通判蘄州城陷巨與郡守率親兵巷戰死傷略盡巨歸署疾呼吏焚倉庫自投火中老卒冒火挽出之巨叱曰我為國死若輩可自求生掣衣就焚而死二子浚瀈皆從父死後封巨義烈侯子贈通直郎立廟蘄州元趙龍澤字萬里溧水人為人剛果有幹才授雷州清道寨巡檢侍飬不仕時汝潁兵起陷建康龍澤不屈而死子權亦從父死明孫炎字伯融句容人博學雄辨太祖下集慶召見炎首勸收攬俊傑克處州以炎為總制招劉基不至炎貽書數千言始來見處州故賊衝苖軍作亂脅降炎炎不屈賊饋酒炙炎大罵賊怒叱使解衣炎曰此紫綺裘吾君所賜當服以死遂見害後追封丹陽縣男齊泰溧水人洪武中進士纍官兵部尚書受顧命輔皇太孫時諸王皆尊屬擁兵專制地嫌勢逼泰請詔諸王母奔臨王國吏民悉聼朝廷節制諸王不悅謂齊尚書間我也後靖難兵至泰被執不屈死張益字士謙江寧人永樂乙未進士正統時遷侍讀學士知制詔詞翰敏贍時稱文豪從征殁於土木之難贈翰林學士諡曰文僖王一居上元人擢太常贊禮郎宣德初舉南郊禮儀度醇雅特遷少卿正統時死土木之難黃宏字德裕六合人𢎞治壬戌進士由萬安知縣歷江西恭議九江盜起宏平之宸濠叛一時迫脅者多得釋宏不從以手械倚柱蹙項死暴尸數日濠誅贈太常少卿祀旌忠祠鄭瓛江寧人𢎞治己未進士知新喻縣遷部郎出守南昌時宸濠蓄異志潛招巨盜劫江淮間瓛捕之每事裁抑濠誣奏瓛捶殺王府校尉構錢寧矯詔撫按究治濠令校尉先械入府辱之萬狀乃送有司濠反械繫之小舟忽風吹船開見鄰船舊兵瓛諭以禍福衆共釋其縛奪馬潰圍登岸一呼從者千人斬賊將范成等赴贛撫王守仁軍門備陳賊勢請速進兵賊平上以瓛抗逆不屈斬獲有功擢山東鹽運使何遵字孟循江寧人正德九年進士授工部主事𣙜木荆州不私一錢帝將南巡以進香東嶽為名遵抗言淫祀無福權幸見疏遏勿進遵復上書乞罷巡幸極言江彬怙權倡亂請寬宥諫臣黃鞏等不爾臣願與同死帝怒廷杖四十肢體盡裂而卒王鑾字汝和應天人正德辛未進士試政吏部為原治二篇太宰楊一清器之補文選主事晉驗封郎中諌武宗南巡廷杖傷踰年卒陳六竒字鳴驚上元人萬厯戊午舉人知南寧縣流冦內訌雲南大亂曲靖為土酋所據知府焦潤生死之六竒被執不屈閣門遇難童仲揆字元圃孝陵衛籍萬厯戊戌武進士猿臂善射冇古名將風為四川都司經略熊廷弼聞其名疏調軍前屢立戰功後與石砫土官秦邦屏率師渡河衆寡不敵仲揆揮短兵接戰中弩死贈都督廕其子張可大字觀甫應天人萬厯辛丑進士由守備歷舟山參將城久圮可大築之海潮害稼築崎蓄淡水田遂為膏腴懷宗初為登萊總兵官平島帥劉興治之亂內升左軍都督聞兵變回登州為戰守計城陷題壁自署盡節處乃自縊諡壯節胥自修字二如江寧人萬厯壬子舉人令曲陽治為三輔最艱闋補宜黃令以捕姦忤當事左遷衢州府檢校轉光祿監事未赴聞流寇陷北都具冠服北向肅拜絶粒而卒姚九疇字庚先江寧人為浦口守禦崇禎八年冬從逰擊汪之斌援江浦與流寇戰連敗之城賴以完之斌欲搜山九疇阻之不聼中賊伏九疇率所部往救出斌於重圍賊麕至援絶矢窮誘降不屈罵賊死郡人殉節於流寇之亂者有四川崇寧縣知縣劉旋貴州司主事徐有聲安慶恭將潘可大曲靖知府焦潤新鄭訓𨗳談王道梁志仁字霏玊江寧人由鄉貢授衡陽令抵任即立易徵便民之法改羅田縣流寇羅汝才攻城城陷志仁持矛巷戰殺六賊力竭被執賊碎肢體而焚之妻唐氏亦被殺事聞贈蘄州知州姪堳令仙逰耿逆亂被執不屈蘇州府三國張純字元基吳人父敦德量淵懿善文詞為海昏令有惠化純學博才秀尤勵操行拜郎中補廣德令治有異績擢太子輔義都尉赤烏十三年廢太子和純極諫權幽殺之朱據字子範吳人張溫薦其才兼文武可繼吕蒙拜建義校尉領兵屯湖孰黃龍元年徵尚公主拜左將軍赤烏中遷驃騎將軍遭二宫搆爭據擁護太子言詞懇至義形於色守之以死左遷新都郡丞追賜死晉張褘吳郡人敞子少有操行為恭帝郎中令劉裕知禕為帝所親信封藥酒付褘密鴆帝褘曰鴆君以求生何面目視息世間哉自飲而死南北朝齊陸超之吳人江州司馬隆昌元年宣城公鸞專廢立晉安王子懋起兵約超之同事鸞遣于琳之害子懋琳之勸超之逃亡對曰吾若逃非惟孤晉安之眷亦恐田橫客笑人端坐俟命超之門生以殺超之當得賞密自後斬之頭墮而身不僵殮時門生亦助舉棺棺墜其身折脛而死陸間字遐業慧曉兄子有風槩不茍合少為張緒所知仕至揚州别駕永元末刺史始安王遙光據東府作亂或勸去之間曰吾為人吏何可逃死臺軍陷城間以綱佐被收尚書令徐孝嗣啓間不豫逆謀未及報徐世標命殺之子四絳厥完襄張沖字思約吳人宋臨沮伯邵孫少有至性仕齊為青冀二州刺史遷郢州梁武帝起兵手書諭意又遣辨士説之沖確然不回明年梁兵圍之沖固守不出病將死屬府僚以誠節言終而卒贈散騎常侍梁許孝敬吳人徑勇過人為梁宣帝驍將守河東陳吳明徹攻之孝敬以無援被執戮於建康贈車騎大將軍張嵊字四山吳郡人敦孝行年三十餘猶斑衣受父杖收淚歡然仕梁吳興太守侯景攻之遣使説降嵊怒斬其使親出督戰城陷被執景欲捨之嵊罵不屈乃并其子弟十餘人俱遇害景欲全其少子嵊叱曰吾一門已登鬼録不就爾處求恩俱死唐張鎰字季權崑山人以廕授左衛兵曹恭軍纍遷殿中侍御史會齊詵搆盧樅罪鎰按驗知其誣執正其罪樅得流鎰以是坐貶大歷初為濠州刺史以最屢遷拜中書侍郎平章事盧杞忌鎰剛直出為鳳翔隴右節度使德宗幸奉天鎰將傾家資自獻行在營將李楚琳作亂鎰與二子俱遇害詔贈太子太傅圖形凌煙閣周朴字大朴吳人有詩名羈泊閩中黃巢陷郡逼其降朴曰我尚不仕天子豈從賊乎遂見害既刑項中湧出白膏數尺閩人祀於薛老峯宋王玠字介玉長洲人倜儻負氣紹興初孔彥舟鎮撫舒蘄聘為幕屬彥舟有異志欲降劉豫問計於玠玠正色喻以逆順彥舟怒囚之越數日復問玠曰君不能立功報君父而甘心與逆賊比誠欲反幸先殺我彥舟竟沉玠於龍眼磯鄉人為立祠於磯上邊知章字公望吳人髙祖肅真宗朝知邢州澶淵之役密詔便宜退保肅匿詔抗敵并納旁郡鎮魏六州老弱全活者數十萬知章崇寧進士厯官通判開德府靖康初北兵以和議退明年將復動知章適告滿代者避禍愆期澶淵當孔道或勸逃去知章寓書於平江諸弟謂茍求幸逃豈不愧守邢匿詔事乎藉使非力所能而死當見吾祖地下無靦顔其冬敵至城下軍潰死之贈朝散大夫弟知白字公式官至吏部尚書孝友篤實循蹈規矩清虛寡欲號為吉人滕茂實字秀頴吳人元發從子靖康初出使於北遷代州屢誘脅之弗為動顧自度不能生還乃自為哀詞復篆宋工部侍郎滕茂實墓九字裹以奉使黃旙密授其友董詵屬以後事欽宗北狩舊臣無敢問起居者過代州茂實獨具冠裳迎謁拜伏號慟州人皆感泣茂實請從駕不許竟憂憤成疾卒人哀其忠為起墓臺山寺嵗時祀之建炎二年張浚上其事追贈龍圖閣直學士諡忠節兄祹通判代州兵入境祹率衆守城力屈為所拘劉豫以太府卿召執節不辱而死郭元邁字英逺吳人博通經史入太學魁上舍建炎二年以和州團練使充通問副使次河朔以書抵家云出家當艱棘時難保生還此身已許國矣至北上書乞歸二聖遂留之不遣洪皓歸言其以身殉國棄之不取何以使人元邁卒死北邊鄭凝之吳人戩之孫也建炎中為浙西安撫使機宜建康潰卒犯鎮江凝之死於兵詔官其家朱良字良伯吳人為海鹽尉兵入境良謂僚友曰此正忠臣義士殉國難時也披甲執戈集部兵七百餘奮前擊之衆為披靡然力不敵竟死元楊椿字子夀吳人讀書過目成誦工古文詞丙中嵗元總兵參政脫寅時守吳辟為參謀俾守婁門甫二日張士德兵至城下衆潰去椿獨擐甲匹馬突入與戰身被數鎗度不支且大罵兵以戟裂其口血被體罵不絶而死陳普字季周吳人嘗從楊椿逰好學而文尚氣節張士德入吳兵踵其門使拜不屈且索婦女普大罵遂被數創而死明鄧彥章字朝用常熟人洪武中以賢良方正擢御史清介忠直以諫賜死劉政字仲理長洲人力學敦行誼建文元年鄉薦第一主考方孝孺書其卷曰此鳥中孤鳳也政感其知遇以忠義自許靖難時感憤不食死黃鉞字叔揚常熟人家貧無書日遊書肆借觀輒記不忘與方孝孺姚善友善建文二年進士仕刑科給事中憂居聞孝孺被戮遂慟哭不食及善死起登琴川橋再拜哭曰君與希直同報國吾忍獨生乎奮身入水死龔詡字大章崑山人父察洪武初以給事中謫戍五開死詡年十四勾補伍守金川門靖難兵入大慟變姓名王大章遁迹田間肆力經書周忱撫江南兩薦為學官堅不應曰詡老兵仕無害恐負往日金川門一慟耳卒無子門人私諡曰安節先生王永和字用節崑山人永樂甲午中應天鄉試官兵科給事中劾錦衣衛指揮馬順欺罔持節册封韓王世子妃糾正中官蹇傲厯晉工部侍郎正統以後死於土木之難贈官廕子諡襄愍欽謙吳縣人官太醫院判宣宗數召見問祕方三問以不知對最後謙伏地曰臣以醫職在保護聖躬陛下承祖宗鴻業宜兢兢自愛若此等方藥先賢不傳臣死不敢承旨宣宗怒命武士以旃裹頭付詔獄久之上悔悟釋出復其官正統末隨駕出關殉土木之難程式字以則常熟人宣德癸丑進士歷刑部員外郎土木之變扈從死難以衣冠歸葬天順改元録其子入監所著有兵政十䇿葩經衍義蔣欽字子修常熟人𢎞治九年進士歷官御史正德間劉瑾專恣逐大學士劉健謝遷欽與戴銑薄彥徵等奏健遷先朝顧命大臣不可逐又諫上宴朝廢學與瑾等馳驅射獵非人君體瑾矯旨皆廷杖削籍欽益慷慨獨上疏前後凡上疏者三廷杖者三遂卒瑾誅贈光祿卿諡忠烈唐天恩字堯仁常熟人𢎞治戊子舉人授葉縣知縣時劇賊劉七徒黨擾河朔天恩增城塹繕器械未幾盜抵城下嬰城守二十餘日城陷被執及其父政懸之庭射殺之庶母任氏二妹皆遇害事聞贈光祿少卿廕子陳淮字禹治崑山人禦倭寇遇害子應期舉於鄉瀝血上陳詔旌其門立祠曰忠烈錢泮字鳴教常熟人歷官江西恭政所在有聲以憂歸里時倭寇方熾邑令王鐡既連却之值倭劫關稅巨萬取道尚湖入海泮與鐡率兵邀之墮伏中力戰而死贈光祿卿廕子建褒忠祠徐察常熟人恪之裔孫倭寇常熟統家丁抗敵三丈浦斬獲甚衆王鐵錢泮之難察亦死之詔贈官廕子宗禮常熟人世官應天衛千戶歷都督僉事驍勇敢戰嘉靖間以倭亂調援浙西遇賊帥徐海於皂林三戰三捷以九百騎破其萬衆海辟易稱為神兵論者謂軍興以來血戰功第一竟殁於陳詔贈都督同知諡忠壯賜祠皂林趙士端字正叔常熟人以嵗貢授仙居訓導倭冦越中令被害知士端為廣文也將釋之士端瞋目大罵倭斷其首止以身歸葬顧天敘字禮初崑山人萬歷戊子舉人歷知鉛山元城嘉魚三縣以子錫疇貴即棄官不仕屏居讀書及國事危殆趣子南行錫疇以父老戀戀不忍舍天敘曰吾自盡我當盡之節汝自為汝當為之事即絶粒以死徐如珂字季鳴吳縣人萬歷乙未進士授刑部主事坐謫復起歷遷川東副使奢崇明叛戕蜀撫於重慶據之而以重兵圍成都如珂甫入境聞之即召募檄調得兵千人急攻重慶破之成都之圍以解合兵直搗賊巢破古藺斬萬餘級焚偽宫闕敘功第一擢太僕少卿轉左通政吳民擊殺緹騎閹黨議坑吳城如珂抗言曰蘇州財賦重地此令下揭竿反矣當國者心動事得解如珂積以事忤閹奉嚴旨削籍既行遣盜至舟中殺之不獲抵家甫半月知閹怒未已治具召親好道故歡飲夜分飲藥而卒顧大章字伯欽常熟人萬歷丁未進士官刑部員外時東林議起大章雖不預東林而隂為居中斡旋閹黨深忌之先是經撫之獄大章引八議欲貰熊廷弼罪廷弼楊漣鄉人也閹黨謀以鬻獄坐大章以關通罪楊漣左光斗則一網可盡於是楊左五人先後考死獨移大章刑部定爰書欲以厭天下口大章曰某自誣服又代五人誣服何以見五人地下乎飲藥未絶又雉經而死時有芝産獄中一莖六瓣大章與楊左等六人每一人死芝萎一瓣大章作瑞芝記懷宗中贈太僕少卿諡裕愍王佐聖字克仲長洲人萬歷壬子舉人知遵義縣土酋吳上才郭士竒等叛佐聖督兵深入計縳上才士竒等奪還所掠男婦三百餘口賊黨欲竄奪所檻烽火告急援兵不至賊梯城入佐聖橫劍奮呼與賊戰面受三刀以死士民立廟祀焉周宗建字季侯吳江人萬歷癸丑進士知武康仁和二縣胥著能聲擢御史客魏表裡擅權宗建前後彈擊疏凡四上璫憾甚誣以贓下詔獄考死懷宗間贈太常少卿諡忠毅周順昌字景文吳縣人萬歷癸丑進士授福州推官稅監髙宷橫斂虐民民情洶洶不測順昌仗義抗宷衆遂解散上聞撤宷歸順昌召拜吏部主事遷文選員外郎謝絶請托失要人意引疾歸嘉善魏大中以首攻魏閹被逮過吳順昌與之決以女字其孫閹黨倪文煥詗得之誣奏逮問緹騎至吳士民大譁訟寃移時而集者萬餘輩緹騎手鋃鐺擲之衆怒擊殺緹騎留順昌不得發順昌潛行赴詔獄搒掠無完膚厲聲罵閹鎮撫許顯純槌其齒盡落順昌噀血濺其面卒誣贓死獄中崇禎初贈太常卿諡忠介子茂蘭見孝義傳龔元祥字子貞長洲人萬歷乙邜舉人授霍山教諭崇禎乙亥正月流賊破霍山元祥肅衣冠秉笏坐明倫堂賊挾刃脅之不動罵賊甚厲遂縛之過文廟曰此吾死所也觸賊死之季子炳衡抱父躃踊呼號罵不絶口賊又殺之贈國子助教建忠孝祠包文達字行甫蘇州衛指揮崇禎乙亥流寇掠鳳安奉巡撫檄統兵進援兵械草草人無鬭志進戰伏發官軍鳥獸散或勸文達遁按劍叱之力盡戰死土人立包將軍祠夏萬亨字元禮崑山人萬歷戊午舉人知西平縣築城治隄練兵保甲稱能吏歷升按察僉事分巡南瑞南昌兵潰死之一家從死者二十餘人蔡懋德字維立崑山人萬歷己未進士除杭州推官歷升嘉湖井陘濟南諸道有殺賊功廷臣以知兵薦巡撫山西時闖賊陷潼關孤軍拒戰巡按汪宗友誣劾失援平陽有旨解任或謂懋德可循例出境候代懋德曰此時存亡呼吸奈何藉口以自便守危城三晝夜無援城破入三立祠自縊死將吏應時盛等四十六人從死焉後諡忠襄豫祭葬建祠以應時盛祔趙廕字任卿吳江人天啓辛酉武舉崇禎九年巡撫張國維檄為守備屯太湖縣賊至廕提兵與戰賊敗走廕追至通湖據山為營賊以百騎來山前挑戰而以千餘騎從山後襲營廕手刃數賊被執不屈死焉事聞贈指揮同知安慶人祠之毛維張字國卿吳縣人為長子縣丞署邑篆值魏鐺矯旨遣使查弔府縣庫銀維張預備一册言邑小糧輕徵解無餘使者信之迄鐺敗山西一省獨長子縣庫銀無缺遷北直河陽衛經歷巡城有功賜宴加級闖賊破彰義門酷刑逼降罵賊不屈而死徐􅊈字九一長洲人事母至孝諸生時即以名節自任魏大中被逮過吳􅊈不識大中典簪珥易金贈之周順昌歎曰國家飬士三百年如徐生者真嵗寒松柏也後順昌被逮緹騎橫索錢􅊈復與楊廷樞斂財經理之崇禎戊辰成進士選翰林庶吉士授檢討嘗以直言忤旨詣責抗論如初屢遷右庶子奉使旋里久之北上抵鎮江聞京師陷一慟幾絶及南京失守肅衣冠北向稽首投虎邱新塘橋下而死顧繩詒字敬承長洲人崇禎庚午舉人知仁夀縣獻賊狓猖勢日熾西川失守或來説降厲聲叱之馳馬至學宫從容拜先聖望北稽顙縊死順治己亥子珽琦扶柩歸葬宋學朱字用晦長洲人崇禎辛未進士為御史劾楊嗣昌田維嘉天下壯之巡按山東濟南圍急登陴守禦火焚城樓骸骼俱燼事聞贈大理卿康熙四十四年聖祖南巡賜其墓門云傳經世澤蔣若來字龍江長洲人獨骨臂善騎射為把總守浦口崇禎八年闖賊至蟻附登城若來往來奔截應刃而斃及墜城死者無算為竄百里外撫臣張國維上其功纍擢參將明年賊從間道犯江浦若來赤手搏賊擲賊所乘馬馬骨俱折復大破之拜都督守安慶又破賊於潛山後守金華孤城援絶先焚其妻子巷戰經日力盡自刎死陳于王字丹衷吳縣人世為蘇州衛千戶纍遷都司僉事守崇明擒海盜王一爵殱其黨殆盡後以事廢巡撫張國維用為中軍守備崇禎九年賊入江北圍廬州陷和州國維遣于王守六合邑賴以全十年賊犯太和于王將兵禦之於酆家店賊敗退已而數萬衆齊至圍數重諸將突圍不得出于王手執大刀左右殺賊傷重力竭北面叩頭自刎死贈昭勇將軍顧維寰字含英長洲諸生煤山之變哭臨於明倫堂巡按周一敬鳴金繡衣而來有張長瀾與維寰奮前牽其裾曰此何時尚衣此章服耶一敬慚而易之維寰泣曰在位者舉動如此時事可知矣歸自經於祖墓側一敬心銜長瀾囑學使者褫其襟長瀾遂絶意進取䇿杖逰四方齎志以殁髯樵叟吳縣人不知姓名美髯長身多膂力採薪洞庭山中負三百斤貨於人祇索百斤值人怪問之曰吾力能負何妨均值值輕售速即沽酒痛飲放歌歸午後又入山輒至人迹罕到之處人又怪之答曰吾多力合逺樵近地應讓力少者忽山中傳京師陷乃椎胸長號曰吾知天子姓朱竟換賊李耶投震澤中死朱集璜字以發崑山人明末貢士學為鄉邦推重嵗旱集璜佐縣令疏夏駕河邑賴其利乙酉南都潰投東禪寺澄潭死留句云可質祖宗可對天地生無自欺死復何愧陶琰字稚圭崑山人執經蔡懋德之門言坊行表後學奉為典型與朱集璜為中表兄弟聞集璜死琰即投繯自盡許琰字玉重長洲諸生甲申聞闖賊變大慟哀詔至躍入胥江家人馳救之遂絶粒遺詩云忠魂誓向天門哭立請神兵掃賊氛周大啓字開美長洲人崇禎甲戌進士歷知黃州府事流寇屠掠全楚黃州城已毁大啓至召民版築匝月城完遷督學道抵辰州闖賊至率土司兵及吏民逆賊於桃源賊不敢犯甲申聞變望闕再拜不食死士民哀慟稿葬於辰州永順司之小乾溪立祠祀之許王家字君聘長洲諸生素厲名節甲申聞變痛哭不輟整衣冠赴水死同邑諸生顧所受字東吳亦於學宫前赴水死徐嶧字瞻淇常熟諸生孤介立品甲申之變焚儒衣冠於文廟赴泮水死項志寧字靜伯常熟人選貢入南都見貴人多營私植黨亟歸挈家居湖濵南都潰屏食數日死時士之蹈義而終者甲申則有屈坦之不食死祝舜齡觸階死乙酉則有馮知十徐守質邑令王鐡孫道煥皆遇兵死文震亨字啓美吳縣人大學士震孟弟由貢生官武英殿中書國亡後絶粒死震孟次子乘字應符亦死胡甲桂字秋卿崑山人崇禎己邜副榜除南昌通判署守事有足軍餉功遷廣信同知力守危城及城破自經死子泓在崑山先死於難顧咸建字漢石崑山人大學士鼎臣曾孫崇禎癸未進士授錢塘知縣戢姦宄嚴警備巡按以貪殘激變咸建調護冇方四境以安及錢塘不守殉難死兄咸正字端木崇禎癸酉舉人授延安推官治績甚著舉亷卓第一後亦死於難弟咸受字幼疏天啓甲子舉人邑城破死焉國朝尹明廷字蓂階吳縣人順治己丑進士選授廣西平樂知府李定國之亂城破被執不屈死遺骸瘞府治牌坊下子正始往粵求得之負以歸事聞贈太僕寺卿廕一子入監松江府元潘世英字積中華亭人至正間用御史薦赴閩從軍諭降興化諸寇督兵守關已而閩寇復作自安溪突至入廨舍世英安坐不起罵賊被害明王守信字蕉雪上海人建文時布衣授徒自給靖難兵起憤鬱絶食死劉仲禮字用和上海人建文四年八月以明經辟召至應天遇靖難師入不食七日死閔電字起光上海廪生素有膽略嘉靖甲寅倭寇出沒海上官軍及客兵來援者屢戰輒挫電與同志倡義團結鄉里千人禦之頻有斬獲後戰於新場鎮衆寡不敵沒於陳李府上海人為南匯哨官倭薄城府與二子香黍力戰敗之復手刃賊之夜劫城者明日復戰中炮而死官為立忠勇祠曾孫中孚明季官劉河逰擊甲申戰沒顧國縉字寅美上海人萬歷丙午舉於鄉授崑山縣教諭遷南國子監丞天啓末操江都御史劉志選諂事魏璫倡議建祠文廟左國縉誓死力爭幾陷黨禍會閹敗乃免遷刑部郎歷擢按察副使分巡桂林有破猺賊楚寇功以疾請老甲申三月聞流寇陷京師慟哭不食死李逢申字延之上海人萬歷己未進士官工部郎寇陷京師被執不屈身受五毒自經死張肯堂字載寧華亭人天啓乙丑進士為濬縣令大著聲績擢御史流賊陷鳳陽條上滅賊五事計慮周悉時不能用出按福建數以平寇功受賚還朝劾楊嗣昌督師無功凡所條奏懇切而中事情後巡撫閩中殉難死時文選郎中朱永佑字爰啓亦華亭人崇禎甲戌進士與肯堂同被難王鐘彥字粲伯華亭人祖明時由進士歷官副使有清名鍾彥天啓丁邜舉人授長洲縣教諭入為國子博士纍遷工部員外郎甲申三月闖賊圍京師分守彰義門城陷被執不屈死鍾彥孝友清介盡節之日囊無一錢其友殮而殯之宋天顯字敬夫華亭人御史賢之孫由監生授中書舍人甲申三月為賊所執殉節死施溥字汝中華亭人父大經兄泳皆仕至府佐溥以貢授順天永清衛經歷十七年遷樂亭知縣未赴值京師陷百官皆被寇驅脅溥歎曰我父兄皆荷國恩我豈可失臣節遂仰藥死何剛字慤人上海人崇禎庚午舉人性諒直以節義自許才學通練郡守方嶽貢修築海塘自青村至柘林延袤數千丈剛經紀其役三嵗告成費省工倍十七年上疏言事擢職方主事募兵金華後以兵𨽻史可法城破投井死瞿騫上海人己邜嵗貢庚辰廷試特賜同進士授滕縣知縣流寇陷城死之衛時春華亭人青八世孫掌後府京師陷懷鐵劵闔門十七人皆赴井死王域字元壽華亭人舉鄉薦授宿州學正流賊至佐有司捍禦有功遷工部主事郎中出守建昌城被圍分守南門城破死之孫士美青浦人由鄉薦授舒城教諭崇禎八年流寇至令以他事出士美代守七十餘日城以全擢知深州城破自刎於角樓父訥亦自縊一家死者十三人贈太僕少卿吳嘉印字繩如華亭人天啓甲子鄉薦歷官南戶部主事築海塘有功為人方正不茍乙酉聞變謁方孝孺祠投繯死時上海陳于階為欽天監博士亦縊於公署侯承祖金山人為參將守金山明亡猶與子世祿守城城破世祿巷戰身中四十矢死之承祖亦被獲令降曰吾家食祿二百八十年今日不當以死報國哉遂死徐念祖字無念階玄孫以諸生廕中書國變城破與妻張二妾陸李皆自縊國朝沈天成名上章以字行華亭縣人康熙十三年福建耿逆反執總督范承謨時天成在督幕亦被械繫錮獄三年抗節不屈及聞承謨殉節即自經死贈國子監學正陪祀承謨祠天成工詩有聽鵑詩一卷繫獄時作葉映榴字丙霞上海人明副都御史有聲子順治辛丑進士選庶吉士歷官湖北糧道康熙二十七年武昌兵變入巡撫轅門露刃譟呼巡撫避走映榴冒刃直前諭以朝廷威德賊不應且逼之從逆瞋目叱之奪刀欲自刎賊曰殺好官不祥勒入署以兵環之映榴繕遺疏叩闕畢升公座罵賊自刎賊大驚匍匐入拜而去事聞贈工部右侍郎廕一子御書忠節二字諡之常州府漢虞俊字仲卿無錫人少以孝友稱哀帝時為御史遷丞相司直王莽執政召為司徒俊飲藥卒光武即位表其墓晉周處字子隱魴子未弱冠膂力絶人不修細行後改過自新仕吳為東觀左丞入晉纍遷御史中丞氐齊萬年反詔𨽻安西將軍夏侯駿討之令引兵五千擊賊七萬兵敗援絶左右欲退處曰是吾效節致死之日也遂力戰死贈平西將軍元帝時追諡孝侯周筵玘兄子歷黃門侍郎從弟續潛聚兵將為亂筵奉丞相睿命與義興太守孔侃協謀即侃坐上格殺續遷太子右衛率轉吳興內史為王敦誣害南北朝齊蕭懿字元達南蘭陵人永元末為豫州刺史崔慧景圍臺城東昏馳使召懿入援懿方食投箸而起率鋭卒三千赴難以平慧景功授中書令幸臣茹法珍等所憚乃説東昏除之或勸西奔襄陽懿不從曰古皆有死豈有叛走中書令耶與弟融俱賜死梁蕭淵藻字靖藝懿子封西昌侯頻蒞州鎮人吏咸稱之歷遷侍中中書令侯景之亂淵藻曰吾國之台鼎不能誅翦逆賊正當同死朝廷耳不食而卒蕭咨字世恭懿從子封武林侯歷衛尉卿簡文即位後侯景防衛轉嚴惟咨及王克殷不害並以文弱入侍講論不輟後王殷懼禍自疏咨不忍離帝朝覲無絶賊惡而殺之陳昕字君章慶之子七嵗能騎射太清二年侯景兵圍歷陽昕自臨川太守召還為景所執景攻臺城令昕射書入城譎守者開門納兵堅拒不從見殺陳蕭允字叔佐南蘭陵人通達有識鑒仕梁侯景陷臺城百寮奔散允獨整衣冠坐景軍敬焉尋居京口百姓懼賊波駭允獨不行曰性命自有常分豈可逃而免乎卒免於難陳後主嘗問蔡徵徵曰清虛玄逺殆不可測隋師濟江授官不就文帝義之厚賜帛卒年八十四南唐陳喬字子喬自廬陵徙無錫歷中書舍人勸後主勿降宋及城陷自縊宋李熙靖字子安晉陵人德裕九世孫登進士第再中詞學兼茂科歷右司員外郎忤王黼貶秩黼罷遷中書舍人蔡攸又惡之出知撫州靖康初除顯謨閣待制張邦昌立使直學士院固拒之憂憤不食索筆書王維百官何日再朝天句遂卒贈延康殿學士蔣興祖字以承宜興人之竒孫以廕歷開封府陽武令治為畿邑最靖康初北兵犯京師過縣境或勸走避興祖曰吾世受國恩當死於是力戰而殁贈朝散大夫胡唐老字俊民晉陵人宿曾孫崇寧進士歷知鎮江府兼浙西安撫使建康失守潰卒戚方等趨鎮江時唐老兵不滿千度力不敵乃撫之無何方欲犯臨安迫令部衆以行唐老不從諭以禍福方脅之唐老怒罵遂遇害贈徽猷閣直學士諡忠愍吳政字𢎞道宜興人博學強記兼資文武寧宗朝以陳俊卿薦知棗強安豐軍歷任興元都統北兵入階成和鳳等州大將王立望風潰竄政聞之一日夜馳三百里至鎮斬立以徇力戰郤之詔進其官後二年復戰於黃牛堡兵少無援死之追贈樞密使袁植字材老無錫人崇寧間進士為監察御史陳邊防十三事以誅佞人為先不納引疾歸建炎初召為左司諫忤宰臣出守嶽州會李允文剽掠湖湘執植植正色詆賊遇害追贈直龍圖閣吳載堅字節齋宜興人寶祐中進士授四川提刑按察使疏陳親賢逺佞選將練兵四事不報後與文天祥起兵敗歸築土室居之家人罕得見其面遂以是終姚訔宜興人參政希得子元兵圍常州守臣遁州人以城降劉師勇復常州詔以訔知常州與陳照劉師勇王安節包圭等力戰固守城陷不屈與照等皆死之詔贈訔龍圖閣待制陳照字光伯無錫人元攻常州照以朐山令守母喪姚訔辟為通判墨衰協守矢盡城陷訔死之照猶斂兵巷戰敗死追贈朝奉大夫直寶章閣子應黿杜門終身衣冠不改胡應炎字煥卿晉陵人宿八世孫咸淳中進士元兵至常郡守姚訔署為節度判官告父總及兄應發曰吾家世受國恩今不得復顧家矣選壯士三千自將乘城殺元將校甚衆城陷巷戰力屈被擒與父兄俱遇害莫謙之宜興人為郡城寺僧德祐元年糾合義士捍禦鄉閭詔授溧陽尉元兵陷常州謙之在城中率衆力戰死贈武功大夫時常州天慶觀賜紫道士徐道明城破兵屠城脅道明拜不屈被殺包圭晉陵人性沉毅有籌略元兵圍常郡守姚訔聞圭名引與共戰守城陷訔遇害圭猶斂兵巷戰被執罵賊死元李士龍江隂人從丞相托克托南征長鎗氐掠地至睦士龍率所部擒斬及勢不可為飲藥仰誓曰吾報主盡矣勿令敵砍吾頭倚馬瞪目而逝年才二十五許晉字德昭江隂人至正壬辰冬紅巾賊陷江隂晉與仲子如璋聚衆保護鄉里尋聞官軍駐近郊隂遣約為內應及官軍與賊遇不利晉戰益力賊黨復掎其後其子如璋與家僮俱破圍而入父子俱戰沒於陳父老俱墮淚曰父死忠子死孝名其里為忠孝里明吳雲字友雲宜興人元翰林待制洪武中歷官刑部尚書出為湖廣行省參政元梁王據雲南負險不服先遣王褘招諭之遇害復命雲往時梁王遣使漠北鐵知院諸人為大軍所獲太祖釋之令與雲偕行既入境諸人懼以奉使被執得罪誘雲詐為漠北使者改制書共紿梁王雲誓死拒之遂為所殺及雲南平詔馳傳返葬𢎞治中諡忠節與王褘並祠額曰二忠王亨字仲理無錫人洪武中舉秀才擢四川按察司僉事有威惠會紅苖破城衆數萬亨驅戍卒以戰為賊所得縛而求金亨大罵被三刃然賊終無意殺之乃大呌辱國如此何以生為觸牆死陸士隆字季平無錫人洪武中舉明經拜監察御史抗疏發胡惟庸姦狀忤旨見殺妻及子皆死之劉基為作忠節孝三歌儲福無錫人𨽻籍燕山衛以好義稱燕兵起挈母妻逃去永樂初簿録亡卒調曲靖衛仰天嘆曰吾雖賤卒義不為叛逆臣竟不食死黃謙字損之武進人以儒生為沛縣典史靖難兵至謙與知縣顔伯瑋縣丞唐子清集民兵五千築堡備禦尋往東昌援鐵鉉兵成祖即位執謙至不屈死伯瑋子清同時殉難正統初御史彭朂建三忠祠於沛縣祀之孫泰武進人官北平都司靖難兵起竭力守禦戰於懷來陷陳死之陳洽字叔逺武進人永樂間官大理卿贊大軍討安南轉吏部侍郎復同張輔討平交趾拜兵部尚書鎮撫其地宣德初黎冦復叛命贊成山侯王通軍討之通引兵渡沙河洽力止弗聼遇伏兵敗洽揮刃殺賊數人自剄死贈少保諡節愍官其子樞刑科給事中嘉靖中建祠祀之髙曇字景雲無錫人正統中由國子生授漳州府判鄧茂七構亂曇督軍餉次茶鋪被執罵賊死贈工部郎漳民立祠祀之曹懷字于德無錫人正德壬辰進士户科給事中諫南巡詔杖嘉靖初集議大禮忤旨又詔杖創甚呻吟中再疏論當事諸臣語極戅直出守永平調思恩吳玭宜興人由吏員任贑縣主簿正德丙子江西有寇竊發勢張甚南贛巡撫王守仁檄諸軍進討玭勇於赴鬭陷陳被殺事聞贈贛縣知縣廕子羣入監席上珍靖江人邑諸生有膽力嘉靖中倭寇薄城率鄉兵禦之從東門鼓譟而出手殺數十賊東至秦家橋為賊所害張邦鋐宜興人萬歷中由武進士歷四川松潘參將副總兵征苖戰死懷宗贈恤盧象升字建斗宜興人以大名兵備破流冦撫鄖陽𠞰湖南北賊遂總七省軍務破李自成總督宣大畿輔告警督師入援與本兵楊嗣昌忤孤軍次巨鹿賈莊力戰死弟象觀字幼哲有英略癸未進士授金溪令未上聞懷宗殉社稷赴水死劉熙祚字仲緝武進人天啓甲子舉人懷宗末官御史按湖南時荆襄諸郡相繼沒於寇熙祚抵嶽州親調兵堵截四戰四捷斬賊數千至長沙賊大至兵潰令部將護吉桂惠三藩先行身引兵斷後賊追及被執罵賊死贈太僕卿弟永祚字叔逺由貢生仕至興化知府亦殉國難綿祚字季連以崇禎辛未進士知永豐縣討平山賊有功陳震亨字百里江隂人天啓中武進士官都司指揮流賊逼鳳陽力戰死贈昭勇將軍建祠死所又武進王孟超亦以武進士官湖廣都司僉書山寇甘明陽等侵嶽出戰兵敗被執罵賊死贈遊擊將軍薛自昌武進人世襲百戶崇禎十三年署永生洲守備隨總兵程龍征流寇萬騎猝至血戰不克死之賊憾自昌驍勇焚其尸金鉉字伯玊武進人崇禎戊辰進士由教授歷工部主事中官張彞憲總理户工二部屬視諸曹鉉疏爭之忤旨切責俄削籍歸杜門謝客學日益邃十七年起兵部主事巡視皇城流寇陷大同疏請撤宣府監閹杜勳専任撫臣朱之馮不聼勳果以宣府迎賊之馮死之京師陷被朝服投御河死弟錝亦殉難我世祖章皇帝賜鉉諡忠潔王章字漢臣武進人崇禎戊辰進士由知縣擢御史請罷內操劾內臣冒功出按草肅力持風紀還朝巡視京營流賊犯都分守阜城門城破賊呼章下馬章叱之賊怒拔刀碎章膝坐地大罵賊攢槊殺之家人覔尸猶一手據地張口怒目如叱賊狀我世祖章皇帝賜諡曰節愍子之栻仕閩亦死難馬世竒字君常無錫人崇禎辛未進士選庶吉士授編修座主周延儒當國務引大義規切之進諭德丁艱服除值延儒再相推逺權勢不入都及還朝進左庶子延儒已賜死親昵者悉避去世竒力經紀其喪時寇警日聞帝數召對廷臣世竒奏當飭督撫鎮將約束部伍令兵不虐民人心親附賊勢乃孤帝稱善京師陷自縊死世祖章皇帝賜諡文肅給祠田七十畝陳貞達字則謙宜興人于廷子以廕官户部主事忤璫謫順天府知事賊陷京師或勸之去不從被執罵賊不屈賊桎其兩足投馬櫪中漬以馬矢罵不絶口而死毛協恭字力懷武進人崇禎庚辰進士授寧德令以亷能調繁侯官却餽遺革羡耗多惠政明亡投水死王孫蘭字畹仲無錫人崇禎辛未進士歷廣東兵備副使分巡韶州獻賊犯粵屬邑多潰韶士女出城逃竄而偽官傳檄將至孫蘭遂自縊朝命贈恤之華白滋字紫梁無錫人少從髙顧逰官飬利州學正值交趾入寇城陷登明倫堂自縊死莫可及字君愚宜興人由監生授長沙照磨崇禎癸未護寧鄉縣印流賊破縣不屈死二子若鼎若鈺奔訪遺骸俱及於難薛聞禮武進人以吏員授黃陂主簿有惠政流寇至聞其名欲官之挾與俱去暮即亡歸率衆誅偽令賊復大至執之罵不絶口死王行儉字質行宜興人崇禎丁丑進士由刑部郎出知重慶府府常宿重兵行儉撫戢有方獻賊至苦戰固守賊穴地入城陷被擒不屈為賊臠死過俊民字尊伯無錫人嵗貢生官臨安訓導會兵潰邑吏皆遁俊民縊死功臣山龔廷祚字伯興無錫人馬世竒門人崇禎癸未進士為中書舍人知明將亡寄書其子預以死自誓南都破肅衣冠投水死秦之鑑字尚明武進人崇禎癸未進士令仁和數月告歸住馬迹山教授生徒後逰嵩山至儀封聞當事有薦而辟之者忽嘔血卒薛應玢武進人崇禎戊辰以監生除陜西隴州同知明年四月流寇困城應玢率兵民嬰守百餘日食盡援絶城陷死吳鍾巒字巒稚武進人已見儒林傳後任桂林推官國亡自焚死戚勳字伯屏江隂人以諸生例入國學授中翰奉差督閩餉歸順治乙酉城破大書闔門殉難中書戚勳八字于壁挈妻妾女婢二十一口自焚死同死者癸酉舉人夏維新字燦焉諸生王華吕九韶許用國朝徐之龍字仲升江隂人順治丙戌恩貢授神木知縣庚寅春王永強作亂之龍嬰城固守糧盡援絶城陷之龍及二子廷綸寵綸俱死詔贈按察司僉事賜祭葬廕一子華鍾本姓秦無錫人順治四年嵗貢知富川縣撫叛歸俘拊循有績亡何滇寇大至被執渡江中流鍾投水死事聞詔贈按察司僉事官其子沚張令憲字嘉仲無錫人順治四年授香山知縣滇寇破香山令憲及子丹翰皆見殺詔贈按察司僉事廕一子知縣嵇永仁字留山無錫人少為吳郡廪生尚氣節以經濟自負閩督范承謨知其賢遂延於幕時康熙十三年逆藩耿精忠將煽亂永仁勸承謨早為備乃條上撥餉補兵安插逃辨屯田等議並請提精兵駐上逰以應變賊尤銜之既叛幽承謨别室隨驅迫永仁至逆邸脅之降不屈誘以官爵益忿詈不從乃錮永仁於獄重困辱之永仁氣彌厲以炭畫壁作詩與承謨遙倡和凡在獄踰三年聞承謨被害遂自經死事聞恤鏹歸葬贈國子監助教雍正七年世宗憲皇帝贈吏部尚書特豫建祠賜御書忠節流芳匾額十一年晉贈光祿大夫文華殿大學士江南通志卷一百五十三欽定四庫全書
