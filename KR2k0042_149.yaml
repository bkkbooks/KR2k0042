body:
  text: 江南通志卷一百五十人物志宦績十二潁州一府滁和廣六泗五州潁州府秦甘茂下蔡人秦武王以為左丞相使約魏伐韓茂恐人間之與王盟於息壤起兵擊韓遂拔宜陽甘羅茂孫年十二使於趙趙割五城以廣秦河間乃封羅為上卿漢何比干字少卿汝隂人少學尚書於鼂錯兼通法律為汝隂獄吏決曹掾平活數千人武帝時為廷尉正時張湯持法深而比干務存仁恕後遷丹陽郡都尉獄無寃囚淮泗號曰何公後漢郭憲字子橫宋人王莽拜憲郎中賜以衣服憲焚之而逃光武即位徵拜博士遷光祿勳屢直諌帝曰嘗聞關東觥觥郭子橫竟不虛也三國魏夏侯惇字元讓譙人少即以烈氣聞太祖初起惇嘗為裨將從征吕布為流矢所中傷左目後領陳留濟隂太守加建武將軍時大旱蝗惇乃斷大夀水作陂身自負土率將士勸令種稻民賴其利文帝即位拜大將軍惇雖在軍旅親師受業持身清儉有餘財輒以分施卒諡忠侯吳吕範字子衡汝南細陽人少為縣吏從孫策東渡領宛陵令討破丹陽賊遷都督孫權征江夏範與張昭留守及征關羽又留守建業纍官至大司馬初策使範典財計權私有所求範必關白權以範忠誠故厚見信任子據為安軍中郎將數有功遷驃騎將軍晉曹攄字顔逺譙人為臨淄令縣有寡婦養姑甚謹姑以其年少令改適婦守節不移姑愍之密自殺親黨告婦殺姑婦自誣服攄至廉得其情釋之獄有死囚攄於嵗夕暫放回家皆如期而至為襄城太守時屢經寇難攄綏懷振理旬月尅復永嘉中為征南司馬討賊戰沒南北朝魏董紹字興逺鮦陽人好學有文為宣帝所賞除洛州刺史頗得民情後遷御史中丞梁夏侯詳字叔業譙郡人年十六父喪廬墓有雀三足集其廬衆咸異焉服闋刺史殷琰召補主簿宋太始初琰舉豫州叛明帝遣劉勔討之詳勸琰歸欵一州以全令新汲治有異績為建安戍主攻魏荆亭戍賊衆大潰髙祖義兵起與蕭穎胄同創大舉西臺建領南郡太守軍國大事穎胄多決于詳遷湘州刺史善吏事為百姓所稱纍官侍中尚書右僕射夏侯亶字世龍詳長子領安陸太守甚有威惠邊人悅服遷吳興復有惠政普通六年大舉北伐加使持節代裴邃與魏相拒頻戰克捷降城五十二為都督豫州緣淮南豫霍義定五州軍事豫南豫二州刺史輕刑薄賦務農省役頃之民户充復卒諡曰襄二子誼損誼襲封豐城公太清中侯景入寇誼與弟損率部曲入城並卒圍內夏侯夔字季龍亶弟以功封保城縣侯大通中為豫州刺史州積嵗寇戎人頗失業夔於倉陵立堰溉田千餘頃嵗收穀百餘萬石以充儲備兼贍貧人境內賴之民歌之曰我之有州頻仍夏侯前兄後弟布政優優卒諡曰桓子撰嗣官至太僕卿唐李紳字公垂亳州譙人元和初擢進士第短小精悍詩最有名時號短李李錡鎮浙西辟為從事錡寖不法數諫不聽會朝廷遣使召錡錡偽稱疾不應命令紳作疏紳陽怖不能成章錡怒囚之錡誅或欲以聞謝曰本激於義非市名也乃止穆宗時為翰林學士會昌中歷淮南節度使治尚剛嚴尋入相卒諡文肅宋李穀字惟珍潁州汝隂人少任俠為鄉人所困發憤從學所覽如宿習舉進士擢監察御史歷仕漢周拜中書侍郎平淮南多穀策令學士陶穀為贊賜之加開府儀同三司宋建隆中卒贈侍中張綸字公信潁州汝隂人有材略太宗時為江淮發運使奏除通泰楚三州鹽户宿負疏五渠導太湖入於海築漕河隄二百里於髙郵北旁錮巨石以泄橫流泰州有捍海堰延袤百五十里久廢不治嵗患海濤綸奏修之身自臨役堰成民利之所至興利除害多善政再遷東上閣門使王臻字及之汝隂人舉進士纍遷淮南轉運副使時建議濬淮南漕渠廢諸堰臻言揚州召伯堰實謝安為之人思其功以比召伯不可廢也徙閩州閩多先食野葛而趨仇家求鬭即死其處以誣仇人臻辨察其狀被誣者多得釋官至御史中丞臻剛嚴善決事所至有風節張傅字巖卿進士及第稍遷祕書省著作佐郎知奉符縣徙楚州會嵗飢不待報發上供倉粟賑貸所活以萬計因拜章待罪詔奬之歷官工部侍郎致仕卒傅強力治事七為監司所至審核簿書勾摘姦隱州縣憚之傅曰此正所以愛州縣也吏不敢慢則州縣不復犯法矣時人以為然魯宗道字貫之亳州譙人舉進士為定逺尉真宗時為諭德上嘗使使召之方與鄉人飲酒於肆使者曰上訝來遲當何辭以對宗道曰即以實對飲酒人之常情欺君臣子之大罪使者如其言上嘉其忠實仁宗即位拜參知政事太后嘗問唐武后何如主對曰唐之罪人也宗道剛直無所畏避人嘗憚之目為魚頭參政因其姓且言骨鯁也卒諡肅簡張信臣字公立亳州人為浦江尉其長多貪黷憚其清廉通判遂州州民李十師以左道惑衆逺近患之信臣發其罪遂人以安魯有開宗道從子以廕知韋城縣尋知確山縣富弼薦之以為有古循吏風知金州辨蠱獄之誣天方旱獄白而雨知南康軍代還時方行新法王安石問江南如何曰法新行未見其患當在異日也知衛州水災人乏食擅貸常平錢穀與之且奏蠲其息徙冀州增隄明年河決水果至不能冒隄而止召為膳部郎中官至中大夫曹穎叔字力之亳州譙人進士及第歷夔州路轉運判官夔尚淫祠悉禁絶之纍遷右司郎中陜西都轉運使自慶厯鑄大鐵錢民盜鑄不己穎叔請罷鑄諸郡鐵錢以三鐵錢當銅錢之一從之進龍圖閣直學士知永興軍元摩該太和人初為庫庫部將至正間任平章事忠直敢言不畏權勢後卒於晉寧子仲禮扶柩歸葬明安然潁州人洪武初為起居注歷山東河南參政浙江布政司拜御史大夫時太祖設四輔官以然為之練達庶務多所禆益卒諭祭賜葬李敏潁州人洪武五年由辟舉為工部尚書改江西行省參政九年復除工部尚書以疾卒諭祭賜葬吳斌霍丘人由太學生擢刑部主事持法不撓纍升都察院左都御史章順舉字元凱潁上人洪武中以人材薦歷官勤慎纍升河南布政使尋調廣西有惠政張泌字淑清潁州人洪武中由嵗貢授兵科給事中升光祿寺卿在任二十餘年於御膳必躬視精潔祭享宴會必豐腆馭下以寬處事以公衆咸服之受成祖寵遇尤渥嘗御題其畫像云張思恭蒙城人洪武間貢入太學授刑科給事中正直清介遇事敢言人有暮夜以金遺之者却不受其人強委金而去詰旦言於朝上嘉其有守升刑部侍郎馭下嚴明人畏服之嘗兼綜軍務能謹邊防為時名臣陳巖蒙城人初名亮被薦入見太祖賜名巖命招諭湖廣洞寇及境寇持兵猝至巖無怖色宣諭德意悉棄兵羅拜又遣督逋租於常德察其土瘠人貧請令輸鈔帛代租為慈溪縣丞民困於田租之增額為奏罷之歷官台州府通判趙亮亳州人任慶雲縣典史督民耕織嵗荒捐俸買穀給貧民以賢能聞升崇仁縣知縣盜息民安尋升撫州府知府卒卜謙潁上人領永樂辛卯鄉薦授工科給事中嘗從皇太孫監國南京忠於輔導丁內外艱廬墓六載宣德間直文華殿陳事每見嘉納升陜西僉事轉山東副使忤近幸左遷陜西參議民聞謙至歡迎者塞途尋以足疾致仕韓璽潁州人由鄉貢授工科給事中選侍皇長孫講讀尋遷山東按察副使宣宗御極思念舊人召還侍文華殿忤權貴出為廣東參政致仕歸室如懸罄泊如也王質字夢瑾太和人永樂甲午舉人歷官御史上疏陳十事皆有裨大政松門聚盜質奉命往察還奏止罪渠魁餘悉宥之境賴以寧正統二年升山東布政使時濟南多虎質至禱於神三日捕虎十七餘皆引去升户部侍郎尋轉刑部尚書性清介所食惟蔬人呼青菜王李賢有傳陳嶷字九峰蒙城人宣德中舉賢良方正授刑部照磨屢決疑獄楊士竒薦之擢御史蜀獠叛胡濙舉嶷往𠞰嶷集將士授方略一戰而克升陜西副使郭升字騰霄潁州人天順庚辰進士明初潁之登甲第者自升始任工部主事督運徐州吕梁洪從古險厄大石百餘伏水中每嵗溺船數百岸為水所齧仄隘不能容足升鑿石以殺水勢甃岸以石板束以鐵釘灌以石灰為功甚巨植柳濬井以蔭濟行人值考課軍民詣闕請留擢郎中仍蒞洪事維揚河善淤運舟膠淺當事檄升治之升疏淤滯置儀徵白塔河閘河溢則泄於江江漲則引於河瀦蓄有法升陜西參議未任卒今洪上有郭公祠髙桂字月菴潁上人由監生授德興丞時宸濠作逆巡撫江西都御史王守仁率師討之桂以督餉功升萍鄉令引老告歸散金以周貧族而自奉常不給儲珊字朝珍潁州人𢎞治己未進士為清江縣知縣選御史巡按山東抗疏奏劉瑾不法狀謫岢嵐州判瑾誅起南京兵部主事擢浙江僉事劇賊王浩八亂桃源珊提兵𠞰之戰屢捷偶與上官左即拂衣歸敘功仍賜綵幣銀牌盧翰字子羽潁州人嘉靖甲午舉應天鄉試授兖州府推官署滕縣事有巨盜難獲廉其出沒蹤迹盡擒之當事比之虞詡復署曹縣抗疏發賑全活萬人齊魯之士不逺數百里來受業門下翰教以孝友力行親為證解六經告歸後汝潁淮泗間有學行者多出其門徐熙霍丘人由嵗貢授巴縣知縣縣多虎舊設機穽捕之益甚熙至齋沐告於神虎悉逺遁石顯字孔彰潁上人由嵗貢任南陽通判改大名升夔州府同知贊政有聲享年百嵗有竒張光祖潁州人嘉靖壬辰進士授巨鹿縣知縣調繁上虞修白馬湖築海塘四十里上虞民建祠祀之擢御史巡按關中疏劾總制以下殺無辜以冒功忤權貴意遂罷歸尚爵字淑仁潁州人父病樂石饘粥必嘗便溺器必親滌舉嘉靖辛卯鄉試授掖縣知縣遷永平通判灌園得金掩其封不取歸家僻處村落不入城市和易恬淡人稱長者王謨字體文潁州人嘉靖壬戌進士授保定推官屯田使者逮百許人羅織成獄謨有憂色母問故跪曰兒不能殺人媚人恐失使者意以貽母憂母曰兒為仁人我不難為仁人母竟平其獄擢給事中劾時相髙拱謫興平丞修洪口堰納金山諸泉秦民利賴之仕至浙江僉事李學禮字子立潁州人嘉靖已未進士授户部主事敡歷中外三十年值嵗歉嘗輸粟活飢民萬餘又嘗開膠河以利漕運後以養母告歸王之屏字汝藩潁州人嘉靖乙丑進士令永嘉有惠政晉户部郎升建昌知府御史劉臺劾張居正巡撫王宗載希居正旨羅織欲殺臺之屏力爭臺得減戍歷升雲南右布政王希哲字思賢太和人家貧奮志儒業嘉靖壬午領鄉薦選蒙隂令居官清徑邑有宦豪素恣橫哲至斂戢在任日惟蔬食每旦置數錢門外令𨽻卒買菜以給許廷桂字世芳蒙城人嘉靖癸未進士令阜城擢御史劾宦官七人觸大璫怒削職人以此賢之差印馬時疏江淮折色一省皆頌其德李國士字汝志亳州人萬厯丁丑進士為豐城令選給事中故事省中有疏先白政府國士曰倘關白而有所撓將遂不言耶竟以是與政府左出為浙東僉事歷陜西右布政思明之役調兩省兵七萬討之檄為監軍冒暑雨瘴癘兼程抵太平賊聞之氣奪乃諭以脅從罔治降者三萬四千人斬獲以千計進山西左布政乞休歸王道增字益甫潁州人萬厯庚辰進士選御史視鹺兩浙以劾債帥不法忤當路轉湖廣僉事閩人李贄以儒起家二千石削髮留鬚肆意隱怪橫詆孔孟縉紳靡然惑之道增獨逐之出境後贄竟以左道被逮論者服其持正仕至四川右布政王維垣字伯師潁州人由嵗貢授四川合州同知知州劉冠南賢而有風力推官索賄不遂讒於御史奏逮之合民赴闕訟寃事下撫按推官擒為首者將以激變論如律維垣詣兩臺力辨冠南事無實百姓為賢守訟寃不當坐冠南因得復官百姓皆貰罪推官銜之遂拂衣歸白夏字履中潁州人弱冠中河南鄉試授山西靈石縣知縣課最為三晉第一丁母憂補北直𨽻遷安縣首揆張居正病畿輔諸郡邑皆為祈禱夏堅不列名遷汾州守汾有悍宗為民患夏束以法皆斂手去汾人尸祝之胡應聘字任宇潁州人萬厯丁酉中河南鄉試授海豐縣知縣值嵗大飢賑濟米不足請於上臺出庫銀俾民易粟鄰邑取息以為給又貸民牛種民有輕罪者令搜草根自贖由是荒蕪盡闢收穫數倍遷灤州知州未幾謫東藩理問監泰山香稅一無染指屢遷屢躓後以德府審理致仕家居環堵蕭然人稱廉吏王確潁上人領鄉薦為餘杭令有惠政嘗雪寃獄雪者餽金不受為建却金亭內艱服闋補東明令以治河功擢汾州守時宗室暴橫以法裁抑之被流言桂冠歸徐治民字元禮潁州人由嵗貢授棠陽令戴星出入百廢俱興尚書張鶴鳴奉命餉雲中夜過縣鈴柝聲達旦問役者曰奉使君令防盜使君神明事必知之不敢懈也歷遷刑部郎治獄屢折勳貴出為平越知府輦下泣而送之者數萬人劉九光字文孚潁州人萬厯乙未進士由縣令歷職方郎中條上方略十事悉允行轉山東參政督理糧儲國用充足兼設法救荒多所全活擢廣西右布政分守蒼梧猺人窟於箐洞時出剽掠將吏請剿以邀爵賞九光諭以威德無不輸服升雲南左布政乞休歸鹿獻陽字寧光潁州人天啓乙丑進士授大同府推官方奉檄赴新平至聚落城時大同猝被圍屯堡防禦久疏獻陽與吏民分地堅守閲數日援至圍解論功以邊才薦降敕嘉奬賜白金十錠韓獻策字起卿潁州人崇禎甲戌進士觀政大理寺值流賊陷潁一門殉難者十一人具疏陳情備言其父光祖忠憤殺賊被執不屈並男婦慘死之狀朝廷憫之敕部議恤尋授行人使唐藩拮據王程而卒寧豫慶字大履潁州人中立孫崇禎甲戍進士授掖縣知縣縣新罹兵慶悉心撫字民獲生全更值軍興旁午郡縣難支慶一切奏辦大吏交章薦之徵為户部主事轉員外郎專督新餉時邊儲告匱外解後期從前司餉者相繼被譴獨慶委曲應辦從容中欵以才器議改吏部忌者擠之即移疾歸髙天佑字味元潁上人由選貢授觀城縣知縣三年膺上考升左州知州致仕歸時邑屢告警凡築城濬河備火器理糧餉靡不竭力從事更捐金建敵臺一座於城東北隅以扼要害城被圍急與邑令親冒矢石督戰者凡一月忽暈仆城上舁歸而卒國朝李文煌字包暗潁州人順治丁亥進士選庶吉士改吏科給事中條陳利弊皆中機宜出為廣東參議時版宇初定境有負固未服者或剿或撫悉歸誠焉遷鄖陽副使地當滇楚之交民貧驛衝户口多流亡文煌招撫勸墾獲有寧字再轉冀寧參政致仕劉佐臨字與襄潁州人廷石子順治己亥進士授山東兖州府推官數平反大獄省釋無辜未幾裁推官改武城縣知縣經亂後民散土荒佐臨招徠勸墾一二年間人盡復業庚戍夏令民修築城隄民以農時求緩不聽且嚴督之隄成二日河決隄不沒者尺許衆驚為神遷山西汾州府同知引年歸弟壯國字幼公與佐臨同榜進士濟寬字公定亦登賢書有同胞三鳯之目壯國知山西夏縣築姚暹渠堤三十里三日而成後以勘荒為民請命觸怒巡撫遂被劾罷濟寬授宣平知縣撫循有治聲尋以疾乞歸郝巽字先五潁州人前天啓丁卯中河南鄉試康熙初授漢陽府推官廉平不擾兼有吏才王師南征巡撫委催九江軍需巽星夜經理比大軍至而楚北糧芻早集城下戎事初罷案牘山積巽按律原情務從輕比馳驅鞅掌以勞卒官劉搢字子方潁州人順治己亥進士授洪洞縣知縣縣有龍社里山洞深險頑民逃入不奉租調且時出剽掠搢率精騎直抵洞中擒其魁餘黨悉散汾河水溢沒民田萬餘畝勘山中多棄地勸民開墾得熟田如沒數焉為令六年境內以治會與上官齟齬遂歸王公楷字木重潁州人順治辛丑進士授成安縣知縣鄰邑有告夫被殺者株連數十人公楷奉檄理之訪其里中自某死後有屠沽兒往外未歸即命蹤迹捕之果得因姦殺死狀獄遂決縣苦漳水公楷請豁瀕河地租晝夜行泥淖中率民修築堤防疏通畎澮未幾水竟西徙出境士民德之以丁內艱歸李甲聲字公振潁州人由拔貢授廣西天河縣知縣叛民殺官吏會兵進𠞰甲聲奉檄監軍以叛民因憤作亂餘皆誘惑軍雖壓境弗令輕戰故土官母持金夜叩軍門求𠞰以復其仇甲聲不許逆黨聞之相繼解去乘間搗賊巢殱其魁亂遂定土官母以叛民子女分給軍士甲聲宣諭以國法悉令放還再任夀張遷漳州同知隨征臺灣率敢死士冒險先登島寨漸復升廣州知府調慶陽所至勸耕平訟革除陋例西鳯飢民就食於慶捐穀倡賑全活甚多張琦字佩玉潁州人康熙庚戌進士授陵川縣知縣行取為户部主事歷郎中時江撫宋犖以旱災入告同官嚴駁之琦曰今嵗大旱皇上宵旰憂勤不可駁也别具允稿題覆得免正供銀一十八萬九千兩遷福建建寧府同知多善政三年移病歸李紳文字陟屺康熙戊辰進士選授蒲江知縣縣僻居山谷迭遭兵燹榛莽滿城紳文為之立市㕓通鹽鐵商旅漸集學宫久廢捐俸倡建置學田以資貧士擢御史巡視東城授山西學使留充丙戌會試同考波纍去官尋起知保定府平反疑獄疏通夾河以勞卒唐勳字萬有潁州人康熙己未進士知廬陵縣修白鷺書院進諸生講學不輟丁母艱歸服除補臨縣知縣遇嵗荒未及申進即行發賑全活數萬人未幾病卒黃陛字子納亳州人由拔貢授河南項城令為政寬平稅免耗羡訟無贖鍰升四川茂州知州建文廟清糧餉減稅課在任七年有麥秀七岐之異顔光旿亳州人康熙庚辰武進士由侍衛任龍關遊擊捐資設立里仁會以助兵民婚喪之無力者又建書院課兵民子弟升廣東春江副將值嵗飢有司以未奉上檄不便開倉旿力擔平糶升福寧鎮總兵陳奏保甲指掌册營中設立儲倉二事下督撫行之卒於官滁州宋張昷之字景山全椒人父佖有詩名仕南唐入宋官史館昷之舉祥符進士纍遷殿中丞慶厯間以富弼范仲淹等薦除天章閣待制後以光祿卿致仕昷之忠廉鯁直尚節義吏治精明議論慷慨子次元以父蔭歷官提點江淮荆浙福建廣南坑冶鑄錢司事躬自巡歷務革積弊卒於道清正有父風張瓌字唐公全椒人參知政事洎之孫舉進士除祕閣校理歷淮南轉運使三司責諸道羡財淮南獨上金九錢三司移文譙責瓌以賦數民貧對入修起居注知制誥英宗時遷諫議大夫生平遇事輒言觸忤勢要屢黜不悔弟璪神宗朝歷官參知政事徐象賢全椒人祥符進士調山陽主簿歷韶陳二州司理陳有巨盜未獲縣取他盜掠服象賢知其寃持不可守怒象賢曰乞緩捕期不獲願獨坐尋遇赦盜詣府自首守服其明仕至太子右贊善大夫孫敷宣和進士宰相薦其才自潭州通判擢荆湖北轉運判官以通敏稱吳蔚全椒人熙寧進士調臨淮主簿攝令事時青苗法行旁邑奉行峻急蔚施行得宜民以不擾歷知廣德彭池三州所至興學校得士心吳革蔚弟與兄同舉進士調揚子主簿遷貴池令有兄弟爭訟革流涕譬曉俱感泣去知廣德軍值建平嵗飢力請賑濟全活萬計知南雄州發摘姦伏郡內肅清歷湖南運判卒子五人皆登第明何世隆滁州人元季糾義兵捍鄉里太祖創業率衆歸附授萬户即命守滁以功纍遷右副都元帥州境當兵革之後民物凋殘世隆盡心拊綏衆賴以安楊元杲滁州人太祖駐滁值嵗旱欲禱于神元杲奏對稱旨常侍左右掌機宜文字悉當扈蹕渡江權江南行省右司員外郎歷應天府尹練達政體時論推重子賁字彥華以詞翰知名官周府紀善阮𢎞道滁州人家素寒及壯知學通吏事太祖初駐滁結事左右從駕渡江授中書省員外郎歷福建江西行省參政俱有聲時全椒侯元善亦從渡江掌簿書文字為員外郎後歷參知政事魏忠字文卿滁州人介特有守以薦授諸暨州州判調洛陽令遷守大同政尚清簡吏民德之月俸僅取足餘悉歸之官黃純全椒人永樂庚子舉人歷輝縣蒲圻教諭宣德中詔選文學士特擢兵科給事中疏陳時政皆中窽要遷江西提學副使章惠全椒人永樂中由貢授平陽令以廉惠得民心每有勾攝不遣𨽻卒止用粉牌以次傳遞題其版曰不貪不食于民有益人隨牌至庶免譴責邑中便之無違令者沈青滁州人以軍功纍官都督正統中修建京師九門城樓及宫殿成封修武伯卒諡襄榮馬諒字子諒全椒人宣德癸丑進士歷官南户部侍郎諒為人精敏所蒞有政績出入中外三十餘年清操雅節始終不變劉清字廉夫滁州人正統戊辰進士選庶吉士己已之變北兵犯德勝門百官分地守禦清督衛士防禦甚嚴擢兵科給事中巡視紫荆關雅有威望佐都督毛福夀討竹查山叛苗所得廩賜悉頒麾下將士感勵遂大奏捷擢刑部侍郎後左遷四川參政卒石澄字士亷滁州人天順丁丑進士授刑科給事中一日進讀章疏英宗喜其詞氣侃直呼為石給事繼因彈劾稱旨特書名于屏遷鴻臚寺少卿劉必賢字天祐滁州人天順丁丑進士歷知諸暨南城二縣以政最入為御史尋出守衢州有治聲黃􅛁純之子天順庚辰進士擢御史振肅風紀以劾權貴謫常山丞遷知化州轉道德二州所至興學祛弊政化大行劉愷字伯和滁州人成化乙未進士令武陟有惠政擢御史糾閹人蔣琮罪疏三上謫瀏陽丞歷薊州知州薊為畿輔劇地素多權貴侵撓吏治愷一無所徇纍擢福建參政吳璋全椒人成化丙戌進士授户部主事抽分蕪湖盡却耗羡歷郎中以清正忤貴臣出守鶴慶毀淫祠興禮教滇人化服錢山字靜夫滁州人成化丙戌進士除御史出為浙江按察司僉事築海塘以禦民患轉江西行部至豐城值大水民飢不俟奏請發粟賑貸遷副使致仕張綱字萬善來安人成化戊戌進士由南户部郎出守嶽州以簡素自持平恕為治調黎平未赴卒子楠舉進士歷官鴻臚卿清粹有父風石祿字允升澄之子𢎞治庚戌進士授行人歷遷順天府丞劾劉瑾不軌謫茶陵知州時論壯之于鏊字器之滁州人正德戊辰進士授户部主事解邊鎮餉金督徐州倉儲皆以廉謹聞選御史巡視長蘆鹺課兼理河道所至剗弊剔蠧風采大著繼巡宣大宗屬中貴皆望風悚服遷浙江按察司副使擒大盜湯毛九等進山東按察使調貴州致仕孫存字性甫滁州人正德甲戌進士授禮部主事纍遷河南左布政使吏才敏練尤精于法比嘗輯一代典制與疏例互相發者附于律令名曰讀法周冕字服之滁州人正德丙子舉人授新安令時洪水為災冕築堤千餘丈民免漂溺擢南御史遇事敢言中外憚之查勘各衛屯田及紫沙等處蘆洲清界址除宿弊以忤權要出守鶴慶不赴乞歸彭儒字伯真全椒人嘉靖乙酉舉人歷兖州濟南泰安同知居官廉謹尤多幹略文牒盈前片言立剖戚賢字秀夫全椒人嘉靖丙戌進士歷知歸安唐二縣平徭役清獄訟摧豪猾毀淫祠值嵗凶民飢賑糶有方以卓異徵纍擢刑科都給事中因太廟災疏請進賢退不肖謫山東布政司都事尋致仕闢南譙書院聚徒講學闡發良知宗旨胡松字汝茂滁州人嘉靖己丑進士授東平知州歷湖廣參議協𠞰湖北叛苗尋督山西學政值太原有警松條奏十二事皆切邊計特擢參政協守雁門俄落職後起陜西參政纍遷江西巡撫未蒞任聞流賊犯境率兵千餘倍道疾馳出賊不意悉殱之又討平廣西賊帥張璉遷侍郎升南京吏部尚書松潔己好修富經術晚主銓柄以振拔淹滯為己任卒諡恭肅弟楩字汝嘉倜儻有才略以兄廕纍官寶慶知府時蠻酋李文祿等屢𠞰未獲楩以計擒之竇潤字子雨滁州人嘉靖乙未進士授户部主事分司徐州事竣還部殁無以殮人服其清宋璘字玉輝來安人嘉靖丁酉舉人授嚴州推官雪淳安寃獄攝建德篆及監九廟大工材木潔己無私子行可亦由舉人授嚴州推官清操肖父邵夢麟字道徵滁州人嘉靖己未進士授大理寺評事遷寺副歷河南僉事清屯田數萬頃置兩驛以蘇民困擢浙江參議督兵禦倭獲其酋數十人終山東參政江以東字貞白全椒人隆慶戊辰進士授户部主事歷南考功郎出督江西學政以疾乞歸生平清介絶俗歸後時衣布袍跨驢以行所居止敝廬數椽石應嶽來安人隆慶辛未進士選庶吉士改給事中屢有建白務得大體歷官户部侍郎彭夢祖字應夀全椒人萬厯庚辰進士由户部主事纍遷浙江台紹副使刋布台郡易俗四宜固海防儲軍實王嘉賔字國賢滁州人萬厯癸未進士授定海令親給駐防軍餉杜大帥及監軍侵漁之弊調諸暨設方略擒巨盜以艱歸起補海寧築海塘銅鞮數十里以捍水患徵拜御史卒賈巖字魯瞻滁州人萬厯壬辰進士授户部主事時國本未定疏請册立慷慨數千言尋考功郎趙南星典計以清正被斥巖抗疏申救語侵輔臣謫曹州判李鵬南全椒人萬厯癸卯舉人知尉氏縣釋寃囚有惠政遷雲南府通判卒後流寇犯邑中有尉氏人特訪其故廬拜哭而去金光辰字居垣全椒人明戊辰進士授行人選御史糾內璫救言官大著風節尋以言事忤旨召對平臺詰責再三辭氣不撓謫浙江按察司照磨父九殿喜曰子以直道事君吾復何憾召為大理寺正屢擢左僉都御史總憲劉宗周以廷諍獲譴光辰申救尤力復鐫級謫外國朝金光昊光辰從弟也明季侍父九陛赴棗陽令任流冦逼城父命之歸避光昊曰父殉城子殉父何避為佐父固守棗城獲全後舉壬午鄉試令長子黠胥欲以前令逋糧責民代償光昊精于檢察民無擾纍嵗旱禱雨立應有麥穗五岐之瑞以瘁卒官貧不克殮潞守鳩金助之金拱敬滁州人父若嵩居鄉有長者名拱敬性至孝嘗刲股療母疾舉明季癸未進士順治三年授兵部主事尋調吏部歷考功郎中繼以太僕寺少卿管文選司郎中事拔才舉能悉稱其職吳國龍字玉騧全椒人父沛耆儒有名行國龍明季癸未進士授户部主事母喪廬墓順治中以漕撫蔡士英薦徵用康熙元年授工科給事中歷禮科掌印給事中封章屢上皆有裨軍國大計丙午典試山東得人最盛朱宏憲字守謙全椒人順治辛卯舉人由溧水教諭遷完縣令均徭革耗又邑俗多輕生每以投繯服鴆構訟不止宏憲悉置不問舊習頓革子大乾舉進士歷知章邱武清二縣俱有善政金光房字天駟光辰弟順治己亥進士授九江推官以亷明稱缺裁改補瓊山令益著清節又議均貢香黎人樂附鄰縣有欲以𠞰黎邀功者力寢其事鎮兵譁噪單騎出諭軍情立定尋卒於官子作鼎康熙甲辰進士有文名和州宋沈立字立之歷陽人舉進士簽書益州判官提舉商胡掃采托大河事迹古今利病為書曰河防通議治河者悉守為法遷兩浙轉運使茶禁害民著茶法要覽乞行通商法詔從之擢右諫議大夫出為江淮發運使居職辦治初立在蜀以官粟售書積卷數萬神宗問所藏立上其目及所著名山水記魏矼字邦達歷陽人宣和二年上舍及第紹興初纍遷考功郎會星變陳言髙宗識其忠擢御史在職七月論事凡百二十餘章遷祕書監力論和議之非忤秦檜屢出奉祠張邵字才彥烏江人宣和三年上舍及第建炎初調衢州司刑曹事詔求可使軍前者邵慨然請行以不屈留北十五年與洪皓朱辨俱全節南歸纍官敷文閣待制知池州再奉祠卒子孝曾後亦以出使殁張祁字晉彥以兄邵奉使恩補官祁負氣尚義趙鼎張浚皆器重之與胡寅友善秦檜素憾寅因誣祁罪下大理檜死獲免纍遷直祕閣淮南轉運判官張孝祥字安國祁子舉紹興二十四年進士第一纍遷起居舍人出知撫州年未三十蒞事精確移守平江庭無滯訟以張浚薦召入除直學士院兼都督府參贊軍事歷帥靜江湖南北皆有聲績卒年三十八孝宗惜之有用才不盡之嘆張孝伯孝祥從兄登隆興元年進士第開禧中纍官參知政事時韓托胄當國孝伯勸弛偽學禁始追復趙汝愚官一時貶斥者得還故職子即之官至直祕閣有書名陸同字彥和歷陽人以父有常蔭補官知望江縣請蠲營田賦外之征移知廬江中外皆薦孝宗書其名于御屏擢知房州復以大臣薦遷京西轉運判官首罷襄陽薪蒸之禁平反鹿門山獄尋請祠歸子世良時任廣東提刑以父老亦乞侍養旋里元張茂之字宗榮含山人纍官淮南轉運使以寬厚稱明何宗顯烏江人博涉經史元季領鄉薦避兵嚴州胡大海克嚴州得之薦于太祖及定婺州改為寧越府即命知府事宗顯首開郡學延儒士葉儀宋濓為五經師時久亂學廢至是始聞弦誦聲加意拊循郡以大治馮榮和州人吳元年舉人材知華亭縣海濵盜猝起執榮欲害之邑民何潤挺身詣盜力言榮良吏宜釋始得免及盜平榮請于大帥止戮渠魁而貸良民之詿誤得脫死者數萬復興學勸農平徭清獄民益感恱徐伯常和州人嗜學篤行洪武初舉人才由典史歷知縣以廉幹聞案無留牘吕秉直和州人洪武初舉人才知泰興縣為人淳篤蒞事果決尤敦尚風化民俗歸厚張貞字有祥茂之孫洪武中膺文學薦授真定令以慈惠得民心秩滿日老稚扳留至不能前遷都督府斷事致仕永樂初以循吏召用貞引疾固辭特詔褒嘉王斆字子學含山人永樂初由楷書授推官遷東昌府通判所至皆以亷謹稱鞫獄多平反歷官三十年家無餘資張祐字一德含山人永樂甲辰進士授刑科給事中以讜直忤時出守處州威惠並行俄奔父喪因郡有冦警特命起復督軍𠞰平加俸三級郡人立祠祀之王璽字廷用和州人正統戊辰進士觀政户部奉敕賫金帛犒兩廣軍士尚書金濂薦其才授本部主事屢奉差督辦通州天津草束浙江鈔課及儹督紫荆糧儲皆有廉能之稱歷兩浙鹽運使盡釐宿弊又州人王珍由進士令浦江亦有治聲唐忠字以信含山人天順已卯舉人授密雲令捕治豪猾請蠲水衝田糧民甚德之以艱歸家居貧甚至鬻衣以給胡澄字景濂含山人天順已卯舉人授寧都令慈惠多善政九載秩滿民籲留之又三載遷寧海州同知以暴疾卒州人哀悼武臯字舜弼和州人𢎞治癸丑進士授長史輔導榮藩日進講讀勤恪盡職榮藩嘉之深加禮重馬應龍字公濟和州人正德辛未進士授户部主事大軍討河南流寇奉命督餉給軍賊平有銀幣之賚又從都御史彭澤西征蜀盜率偏師進𠞰斬獲千計遷郎中尋出理遼東糧儲潔己奉公邊鎮竦服擢山東按察司副使整飭霸州等處兵備痛懲積弛之弊軍政一新百廢具舉又剪除巨盜及勢家之素為囊槖者境內肅清民皆設位祀之于家萬慶字子餘和州人嘉靖已未進士授行人奉使楚巾盡却餽遺擢刑部員外郎有豪猾倚中貴勢犯私鑄罪諸司莫敢詰慶獨置之法無所貸遷守泉州舊有不便于民者數事慶悉罷之輿情大愜又計擒倭寇海濵獲安張尚儒和州人萬厯中由貢授巴東令以政最遷歸州知州新灘有險石尚儒特命工鐫鑿以便行旅人多頌之國朝成性字我存和州人舉順治己丑進士授中書舍人選御史出按福建有清直聲轉兵部主事以大學士馮溥薦擢工科給事中李衷燦字藜仲含山人順治巾以貢授洵陽令遷冀州知州復補荆門州時有𠞰寇之師衷燦竭力轉餉以繼大軍由是巨寇李來亨等皆即殄平擢衛輝同知問學於耆儒孫竒逢執弟子禮時人稱之張其善字同人含山人順治辛丑進士授東安令邑中民猺雜處素稱難理其善蒞官清惠境內翕然遷髙州府通判未任卒胡騰虯含山人貢生歷萊陽韓城二縣丞潔已愛民以廉惠稱卒於官韓人立祠祀之廣德州三國吳朱治字君理故鄣人隨孫堅征伐拜司馬從破董卓孫策薨治與張昭立權每進見權恩敬特隆治性儉約雖富貴車服唯供事封故鄣侯宋倪濤字巨濟廣德人年十五試太學第一舉進士纍官司勳員外郎時議有事燕雲大臣羣相附和濤獨抗言其非王黼怒其阻軍事貶監朝城酒稅再徙茶陵船場卒明年金師至朝廷憶濤先見録其子李嘉言廣德人隆興初進士後從范成大使北歷知常饒二州皆有去思尋以尚書充使而還吳應龍字雲翔建平人嘉定進士遷知興國軍治最趨命入奏陳八事理宗嘉納之拜御史官止廣南西路運判章汝鈞字和叔建平人淳祐進士授國子監書課官召試館職首以厚人倫扶國綱為對以祕書正字家居時多以差役破家汝鈞與梅應發倡行義役公私便之鄰郡取則焉除祕書郎卒梅應發字定夫廣德人淳祐間進士居官忠貞廉退秩至中奉大夫直寶章閣致仕元初召起之辭以疾明姚恕建平人洪武甲子舉人任杞縣令性介才達綽有政譽擢御史所至振肅官至江西按察使靖難兵起宣城陳尚書迪不屈死恕陳壻也亦被戮孫升字伯髙建平人永樂甲申進士任御史時妖婦唐賽兒作亂升統張旟馬撫王真等敗賊於諸城山東悉平擢遼府長史終建昌知府胡廙廣德人永樂中貢任給事中升左副都御史讜直敢言時建平馬政擾民廙援祖制疏言州居山磧無平原可放牧免之尋改福建參政濮瑾字良玉廣德人由選貢知寧陽縣兩賑飢民全活甚衆委督逋糧至誠勸諭民咸樂輸上官交薦以親老乞歸薑洪字希範廣德人成化戊戌進士知盧氏縣勸耕教織有循吏風孝宗時擢御史疏時政八條多見採納按湖廣楚藩請益莊田洪奏罷之升雲南參政土官陶洪約八百媳婦共為亂洪乘間捕治亂遂戢合兵討洞蠻桃古平之轉山西布政劉瑾求賂弗與落職歸瑾誅擢山西巡撫惟收月俸六石卒官無以為殮諡莊介吕盛字文郁建平人𢎞治己未進士任湖州知府時孝豐湯許為寇盛深入其阻諭以禍福兵不血創而就俘餘寇悉平後備兵天津武宗南巡時方飢饉盛以無礙官錢給四方流民俾充夫役民不知擾未幾改雲南屯田副使宗璽字朝用建平人𢎞治己未進士授大理寺正時逆瑾暴虐多害善良璽平反不撓出為江西副使值副使胡世寧疏宸濠不軌十事濠亦誣劾世寧章下藩臬議濠嗾致世寧於辟衆持疑相向璽獨奮筆白其誣遷福建兵巡平大帽山寇有旨增秩改廣西按察復平叛獠終雲南布政使清公帑巨萬以贍軍旅潘潤字時雨廣德人正德甲戌進士歷官儀部郎擢守處州當道議增郡賦力爭而止比入覲民有餽遺堅拒勿受衆構却金亭以懷之遷雲南兵備副使李得陽字伯英廣德人嘉靖乙丑進士任户部𣙜淮關盡蠲浮苛知九江府築三洲堤建澄江樓萑苻息警歷升湖廣巡撫鍥成賦役全書永為規式奏止荆沙衡永採木之害以乞養歸追嘉撫楚之績起南工部侍郎會陵殿城諸工役並興以勞瘁卒官贈户部尚書李模字子範廣德人嘉靖間進士仕刑部主事委漕運理刑減稅二萬兩擢吏部稽勳司稱銓曹第一亷吏夏良心字宗堯廣德人隆慶辛未進士除刑部主事歷升山西參議轉兩浙水利道築海堤功加秩賜金按察山東布政河南皆遇飢歉賑濟有方擢江西巡撫時兩璫𣙜稅嵗幾十五萬奏減七萬有竒加兵部右侍郎捐罰鍰四千金設倉置田儲粟備賑卒贈兵部尚書李天植字性甫廣德人隆慶辛未進士授平陽推官擢吏科給事巾鄒元標趙用賢糾張居正奪情被杖天植疏救甚力有旨選閹寺多人天植言儒士進學數少中貴選用數多事體倒置語攻政府出參饒南道時毀天下書院欲併廢白鹿洞膳田天植力持不可後歷曹濮兵備以終管九臯字如鳴廣德人隆慶庚午舉人知富陽縣以卓異擢御史彈劾不避權貴歷廣東副使清操益勵李徵儀字于來天植孫萬厯辛丑進士知清江縣擢御史疏言鄒元標顧憲成趙南星直諫蒙譴宜峻擢以備啓沃閲視山海居庸兵馬條上便宜數事皆報可劾李三才盜用皇木發內監冒破金磚等費止內苑營建臺榭皆俞允巡視長蘆鹽政督學順天掌河南道臺綱肅然升大理寺左丞以不附魏璫削籍比璫誅原官起用夏之彥字士美廣德人萬厯壬子舉人知應山縣痛革徵收贏羡行户供應都御史楊漣直諫罹璫禍鍛鍊追贓下本貫承比之彥設匱募金且鬻産二千金代贖臺檄下漣幼子于獄為築别室居之名曰疢疾軒時餽槖饘或為危之之彥曰使某附楊公得禍天下萬世應有知我者遷武昌府丞鑿壓霧嶺通道五十里升浙江鹽運司運同却常例疏鹽引商民兩利戈簡字行可廣德人崇禎辛未進士知晉江縣謝絶請謁綜賦汰役練兵修學息海氛靖山寇皆有成績王之棟字嘉隆建平人崇禎間恩貢僉判卬州民愛戴如父母攝篆榮蒲二邑會討叛蠻督餉黎城瀘河諸處調運不匱以不善事上官左遷去任國朝包元翀字拂雲廣德州人順治間恩貢授平隂令時濟上屯兵縣苦供億元翀區畫以濟斷獄明允蝗入縣界虔禱之遂出境六安州明張子貞字彥誠英山人洪武間由國子生授車駕司主事言事謫戌嶺海復起遷山東僉事以切直忤時謫𨽻苑馬寺上見其題龍江衛詩詔復其官敡歷中外幾四十年清心苦節寵辱不驚尚書蹇義嘗嘆曰居官不必逺法古人近效張子貞可矣潘嶽字居仁六安人永樂丁酉鄉薦授鄭州訓導擢監察御史彈劾不避權貴忤旨發充後軍都督府掾府帥待以優禮嶽曰非朝廷意也執役無異羣吏復職按浙閩單騎問民疾苦暑日手自持蓋家居置田給族人以承庸調汪霖字潤夫六安人景泰進士歷御史按雲南浙江所至振紀綱雪寃滯不為苛察成化初監征粵軍升大理寺丞以左僉都御史巡撫畿內凡八受璽書奬諭生平寬厚謹慎為世所稱潘貞字景徵嶽之子天順進士纍遷福建副使核銀課加耗重息以補他課之逋進四川按察使出滯獄擒豪僧升布政司貴州苗亂徵兵糧於蜀開府罔知所措貞請以苗攻苗發近疆播州龍州之卒應之潘鏜字宗節貞子𢎞治丙辰科進士官監察御史首劾閹黨髙鳯又條時政四事皆不報以劾逆瑾矯制削籍瑾敗起授廣東按察司僉事彭辨之字問夫霍山人正德戊辰進士知餘杭時浙苦織造辨之請於上官奏裁之守彰德補饒州為政務安靜終山東參政潘鋭字宗魯六安人正德丁丑進士授行人力諫南巡荷校跪闕下曝十日杖五十降南國子監學正世宗即位復其職因論柄臣再杖謫其剛直蓋天性云子子正字汝中嘉靖壬辰進士擢給事中論罷冡宰汪鋐謫西平縣丞纍遷湖廣兵備討平亂苗遷貴州參政歸丘玳字文玉六安人嘉靖戊戌進士授户部主事餉兵榆林一洗扣除尅減之弊遷守溫州海上巡徼者輒誣漁販為盜悉原而釋之調守寧波亟繕城郭倭至得免蹂躙歷官不攜家纍榆林之役或報夫人訃且至叱曰此豈顧家時耶其首公盡職如此張澡字子新襲職六安衛指揮積功至參將先後駐浙江十年禦倭大小數十戰皆捷鎮海之功尤偉總兵吳淞上沿海沿江諸圖議移鎮滇南授征蠻將軍印鎮粵西叛苗未靖設方略撫𠞰兼施尋以南京都督致仕徐必進六安人弱冠登第歷禮刑二部郎出守嘉興七年郡人戴之三塔寺五太守祠必進居其一遷福建副使致仕郝錦字絅卿六安人崇禎丁丑進士授豐城縣令縣糧賦甲江右錦核包攬清里甲裁陋規政最一時移新建令時獻賊震袁吉士民逃竄錦調兵食治守械衆心乃安遷御史侃侃有諍臣風泗州漢韓牧字子台臨淮人哀帝時為御史嘗建言水利宜于九河故道穿之縱不能為九但為四五亦可以殺水勢三國魏陳矯字季弼東陽人明帝時為尚書令帝嘗至尚書門矯啓曰陛下欲何之帝曰欲案行文書耳矯曰此臣職分非陛下所宜臨也帝乃回車其直亮如此後進爵東鄉侯卒諡文貞晉陳騫東陽人矯子沉厚有智略仕魏為尚書郎遷中山安平太守並著治績晉武帝即位以佐命功封髙平郡公加太尉卒諡武南北朝齊劉元明臨淮人歷仕山隂建康令有吏才官至大司農宋許遵字仲塗泗州人舉進士擢大理詳斷官知長興縣賑濟水災益興水利溉田甚溥熙寧間知夀潤二州纍官中散大夫李稙字元直泗州臨淮人明敏篤學客蘇軾門鼂無咎見之曰此國士也以女妻焉靖康初向子諲轉運京畿時盜起路阻使稙督犒師銀百萬糧百萬石自淮趨濟卒以計達秦檜當國稙丐祠奉親檜死除户部郎中丁母憂哀毀廬墓有白鷺朱草之祥劉鎮遺之書曰忠臣孝子元直兼之矣為京西河北路轉運使措畫有方廷議倚重遷江南東路轉運使上書言江防十策卒諡忠襄王霆字廷叟東陽人嘉定四年中絶倫異等科授承德郎知濠州職事修舉金兵至光州以霆知州事霆分遣間諜整飭戰守之具大戰州西光人乃安明鄒魯盱眙人洪武中以聰明正直舉授河內縣主簿尋以事降會稽縣典史耆民奏其廉能遂升知縣執法不阿為人誣奏逮至刑部事直特升大理寺丞王晏盱𣅿人洪武初以薦授教職升滋陽知縣廉能有節槩博學多聞仕至陜西參政張彥禮五河人洪武間以人才徵令陽武多惠政秩滿民詣闕請留在任十八年卒於官囊槖蕭然不能歸里因家其地金純字德修泗州人洪武間由太學生授吏部文選郎纍升刑部侍郎永樂間扈從北征尋奉命發河南丁夫開濬黃河故道漕運賴之遷禮部尚書調工刑二部在刑部時務寬大宣德中致仕卒贈山陽伯丁寧字惟和五河人永樂甲辰進士宣德七年巡按廣東風紀大振嘗盛暑中過梅關見行者病暍顛踣皆思得水乃躬披荆棘偶見石潤曰此必有水命鑿之不踰尺而泉溢遂浚焉名福民泉至今行旅賴之陳敏字內修天長人景泰癸酉舉人為酃縣知縣縣多虎患敏禱于神虎遂逺去改令連城興起文教躬自誨迪連城科目久缺至是遂多登第者張昊字朝元天長人𢎞治丙辰進士授烏程令擢御史升江西僉事分巡九江時姚原洞蠻冦掠昊與參政董朴討之斬獲三百餘人欲搗其巢穴約董進兵不至為賊所執不敢加害仍委之而去回籍聽勘廷議復職昊事父母孝事繼母如其母撫二弟有恩義子天駙字雲卿嘉靖乙酉鄉薦清宦之後饔飱不繼而讀書不輟及仕兖州府通判不持一錢歸陳道盱𣅿人為文選主事出知金華能斷大獄纍遷南刑部尚書陳大章盱眙人道之子由進士授刑部主事歷兵部職方郎擢太僕卿長於吏治所在著聲兼工詩詞善畫墨菊一時推重沈應乾字蒞川五河人嘉靖庚戌進士初任海南令纍升保定知府多惠政積俸悉留郡帑備賑仕至密雲兵備副使嚴嵩父子執政未嘗一謁其門嵩怒言官希嵩旨劾之遂歸里常三省字魯軒泗州人嘉靖丙辰進士歷官湖廣右參議泗苦水患三省投揭於撫按請開濬為總河劾奏罷職既淮流陡漲水侵祖陵三省復以分黃導淮之説言於行河使者卒用其議以襄成功鄉人至今頌德胡士竒字浮冶天長人萬厯丙辰進士授萊蕪縣知縣擢御史巡按宣大嘗抗疏劾魏忠賢馮應京字可大盱眙人萬厯壬辰進士歷任湖廣僉事風采大著稅監陳奉恣橫不法巡撫以下不敢出聲應京疏列奉九大罪上怒逮問士民擁檻車號哭不得行既去則家為位祀之禁獄者四年釋歸復職所著有經世日用編蓄艾編月令廣義諸書卒贈太常少卿諡恭節崇正學字佩一天長人由監生考授州判時武舉陳啓新言事稱旨擢省垣正學抗疏劾之降選平陽縣主簿值海冦侵擾正學單舟諭寇寇悉降朝廷序其功後引疾歸國朝孫振先泗州人順治初署武進縣時守宗灝貪狼多籍富民家且將請兵屠城振先以死爭之城得以全江南通志卷一百五十欽定四庫全書
