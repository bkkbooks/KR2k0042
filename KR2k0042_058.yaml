body:
  text: 江南通志卷五十九河渠志運河明洪熙元年十一月濬儀徵瓜洲壩河先是平江伯陳瑄奏儀徵瓜洲壩下河道年久淤塞請發附近軍民疏濬上以東作方興姑俟農隙至是命鎮江揚州常州三府儀徵揚州鎮江三衛共以軍民二萬疏濬仍命瑄董之宣德五年平江伯陳瑄言淮安西湖河岸乃牽挽舟船往來通路比因風浪衝激岸多坍塌樁木不存淮安府滿浦五壩閉廢已久其官吏壩夫俱無差役乞令守視西湖隄岸遇有損壞就令修治從之是年八月浚白塔河及儀徵等壩河明宣宗實録御史陳祚言白塔河宜開浚置閘又侍郎趙新言宜浚白塔河及儀徵舊江口鑰匙河黃泥灘清江閘俱宜浚導上遣主事潘厚及揚州淮安府官審視仍與平江伯陳瑄議可否及所用人力至是厚還奏開浚實便白塔河儀徵壩河約用四萬五千八百人計四十日可完清江閘河用一萬八千人計十五日可完上從之於是工部請發揚州淮安軍夫先開白塔河置閘工畢就浚清江閘儀徵鑰匙河上曰三處用工勞人太甚其儀徵鑰匙河俟明年農隙修浚七年七月置呂梁漕渠石閘明宣宗實録平江伯陳瑄以呂梁上洪地陡水急漕舟難行奏準令民於舊洪西岸鑿梁渠深二丈濶五丈有竒夏秋有水可以行舟至是復欲深鑿置石閘二時其啓閉以節水庶幾往來無虞事聞命附近軍衛及山東布政司量發民夫工匠協力成之是年陳瑄於白塔河置新閘潘家大橋江口四閘令江南糧船自孟瀆河過江入白塔河至灣頭入漕河省瓜洲盤壩之費南河全考江南舟由瓜洲車壩入漕河自白塔河開瓜壩棄不用近白塔置壩舟行瓜儀正統三年築髙郵湖隄明英宗實録隄長四百二十五丈舊用土築遇風撞激輒敗即有木橛葦東蔽護亦不經久至是甃以磚石用糯米糊和灰以固之始堅緻可久矣六年修髙郵州北門起至張家溝一帶河隄七年修築淮安西湖中路十餘里以便漕運八年三月濬瓜洲壩東港明英宗實録洪武間瓜洲壩有東西二港永樂間廢東港壩為厰以貯材木正統初廷臣議徙木濬港未果至是督漕總兵官都督僉事武興言壩廢港塞非惟舟楫往來遲延且艤泊大江有風濤之虞請俟秋成於鎮江揚州二府僉夫七千餘人復修從之又濬常州孟瀆河德勝河揚州白塔河明英宗實録漕運總兵官都督僉事武興巡撫侍郎周忱等奏常州府武進縣民言漕舟出夏港泝大江風濤險阻害不可勝言常州西城有德勝新河北入江江北揚州府泰興縣有北新河中間有淤淺者俱宜浚之以避大江險阻浙江都司署都指揮僉事蕭華言永樂宣德間漕舟自常州府孟瀆河出江入白塔河江行不踰半日今孟瀆河淤淺請浚之廣東按察司知事黃武浙江處州衛指揮使牛通皆以為言事下臣等計議華等所言皆有據請先浚孟瀆河其白塔河有四閘可於其中大橋閘築壩候運河水泛則啓閘行舟水落則仍閉塞德勝河亦宜修浚惟北新河計當役一十五萬五千人一月方完請俟浚理孟瀆河白塔河德勝河完再議上從之九年正月福建按察司謝莊奏請浚鎮江府丹徒縣甘露壩至常州府城東河道從之十二月疏常州鎮江運河十三年二月濬泰皇寺巴河續文獻通考徐州呂梁二洪皆分黃河水以通舟楫其泰皇寺巴河原係分水之處年久淤塞水脈微細先此都督同知武興奏請疏濬以冬寒土堅而止至是復請上命所司發軍夫濬之十四年四月修直𨽻髙郵州甎河塘景泰二年正月濬直𨽻鎮江常州運河七月浚徐州小黃河通漕明英宗實録初以河決沙灣水皆東注徐呂二洪淺澀敕右副都御史王暹處置至是暹上言黃河自崑崙發源流入中國其所經歷之處自陕州以西有山峽不能為害陕州以東則地勢平緩水易泛溢故為害甚多自洪武二十四年河改流從汴梁北相離四五里許東南轉至鳳陽入淮者為大黃河其支流分出徐州以南者為小黃河以通漕運自正統十三年以來河復故道從黑洋山復徑趨沙灣入海止存小黃河從徐州出岸髙水低隨濬隨塞故徐州之南不得飽水臣等遵聖諭自黑洋山東南直至徐州督同河南三司疏濬其臨清以南可令副都御史洪英督同山東三司疏浚從之三年鎮江知府林鶚請濬京口閘甘露壩從之七月築沙灣隄是年浙江參政胡清言直𨽻鎮江府有河通常州府河有新港奔牛等壩止能容小船往來而輸運糧草大船俱涉歷大江風濤不測常致損溺請敕有司開疏其河革去其壩惟置石閘以蓄水則船通而害除矣事下工部移文核實咸以為便從之五年七月直隸揚州府奏六月大風雨湖水泛溢決髙郵寶應隄岸命左副都御史王竑督有司修築之十月工部奏近聞儀徵瓜洲二壩每遇冬春潮水退縮之時往來舟船膠淺難行宜于二壩下各置閘於潮水漲時閉閘蓄水用通舟船從之是年陳泰遷左僉都御史疏理徐州吕梁二洪及運河天順元年冬尚寶司少卿淩信奏江南運糧者泛大江至瓜洲壩有風浪之險宜從鎮江府裏河而裏河自新港至奔牛一百六十餘里河道淺狹又有三壩大船不利車盤七里港口又有金山橫阻江水不得入以故糧船多冒險損壞宜通七里港口引江水灌入濬新港至奔牛一帶為便奏下工部覆奏宜令管理糧儲河道官僉都御史李秉及郎中沈彬提調附近有司通濬從之二年浚儀徵漕河及常鎮河明史稿右副都御史巡撫蘇松諸府崔恭與都督徐公浚儀徵漕河又浚常鎮河避江險三年四月工部奏國家大計莫先于糧運今聞自通州以南直抵揚州河道膠淺糧運難行宜馳文于管河道官令量起附近衛所府州縣軍民設法疏濬其水塘泉源亦宜疏通以濟運河從之六年疏濬淮安以南運河成化元年五月總督漕運副都御史陳恭請修築髙郵湖岸自杭家嘴北起至張家溝鎮南止凡三十里有竒從之三年七月總督漕運右副都御史滕昭言儀真瓜洲孟瀆諸處河港乃貢賦必由之道舊因淺滯令旁近揚州鎮江常州諸府衛興工疏浚是後著令三年一浚然所司怠玩浚不以時直至窮冬召衆興役則手足皸瘃雖浚無實徒為勞耳請自後每于冬初即為興工從之四年六月工部管洪主事郭升奏徐州洪勢最險自昔兩隄庳隘稍遇水漲舟行無路往來甚艱而閘河上口一壩勢亦如之雖頻年修築亦唯取辦一時殊非經久之䇿又如外洪翻船等石裡洪壩下一灣尤為險惡屢壞行舟今欲以大石修砌兩隄其外則錮以鐵錠其內則填以雜石而又鑿去外洪翻船惡石用石鋪平裏洪隄岸以便來往須勸率往來中外官員及逺近客商以給其費量倩所屬各淺夫及本洪溜夫以供其役工部以聞詔可八年八月修築淮安抵儀徵瓜洲湖河隄岸衝決者一十五處南河全考河道侍郎王恕請治揚州至淮安湖塘造閘䃮引塘水接濟運河十一年置儀徵河港三閘明憲宗實録工部郎中郭升奏江南進貢糧運等船至儀徵壩雖夏月潮盛亦須人力絞挽方能達河少有錯失船即損壞而裡河壩岸恐為潮水衝決多開缺口以殺其勢水退復修為費甚大儀徵縣羅泗橋舊有通江河港上至裡河幾四里許潮大之時內外水勢相等此港可置三閘潮來先啓臨江閘使船隨潮而進俟潮既平乃啓中二閘放之如此不惟往來舟船利便而裡河水勢亦即疏泄不待決口重費也詔可之升會督漕都御史李裕勘議修完而儀徵店户惡其奪己利賄囑所司假以走泄水利閉之至是升復條陳開閘之利不開之患工部覆奏以升言誠有益經久之䇿宜允所請從之是年總漕李裕等奏新開揚州白塔河潮水往來恐久而淤淺宜下所司與瓜洲儀徵諸河皆三年一浚又言江南孟瀆河亦多淤淺乞下巡撫巡按等官勘驗疏浚以便漕運工部覆奏從之是年增設直𨽻江都縣留潮通江二閘十三年總漕都御史李裕巡河郎中郭升重修白塔河附王嶼記維揚郡治東北兩舍許宜陵鎮側有河名白塔蓋古運河支流以南屬於江北逹於淮者也宣德壬子平江伯陳公瑄釃浚舊道建新開大橋潘家江口四閘以蓄泄水以便江南漕運厯嵗滋久中多壅淤舟既不通閘亦隨毁乃者成化癸巳冬巡河郎中郭君升上其事於總漕都御史李公裕以詢於衆得修河事宜以屬郭君而總其成郭君召集旁近兵民二萬人疏舊河二十里築東西捍水隄四十里建通江大同二閘其大橋新開閘之故存者咸修復之又增建土壩三夏月潮漲則由閘冬月水涸則由壩又建減水閘五以防泛濫淺鋪五以備疏瀹凡有益於河者無不為之經始於丁酉三月以是年六月畢工通判鮑克寬具事顛末來請記豫嘗考之吳城𨝍溝昉於左傳渠通江湖載之遷史唐漕江淮撤閘置堰宋至紹興易堰以閘則漕河出於揚境者最為切要漕法之講於先儒者最為詳備漕數之給於縣官者最為豐溢大抵建國於西北為不拔之基取材於東南供不資之費由今視昔初無少異興事勸功有待於人此白塔之所為濬理於今日也雖然古人嘗以潤州北距瓜步沙尾紆匯六十里舟多敗溺遂涉漕路由京口埭沿伊婁渠以逹揚子嵗無覆舟且減運錢數萬今京埭既淤淺不勝重載則由常州孟瀆河入江遡流而趨伊婁回還百八十里視六十里既兩倍之而大江風濤之險漂溺之患月所不免斯河既成則江南漕舟出孟瀆河者可徑投斷腰洪入夾江三十里入河又四十里而逹揚境脫不測之淵以即安流施功當時敷被後世如此役者庸可得乎十六年增甃吕梁洪二石堤堤長七十餘丈築石壩一百六十五丈復於壩西築堤二十餘丈𢎞治元年二月修儀徵瓜洲二處壩下河口及淮安府福興閘七年七月髙郵康濟河成明孝宗實録初南京兵部左侍郎白昂奏漕船經髙郵甓社湖最忌西北風往來舟楫多致覆溺若於磚塘內開復河一道四十里引水行舟可免風濤之患於是巡河監察御史孫衍管河郎中吳瑞因共挑濬並置閘堰築堤岸以利牽挽往來稱便九年四月重甃髙郵堤巡按直𨽻監察御史鄧璋言髙郵湖為運河喉襟之地而自杭家閘迄於張家鎮凡三十餘里其堤面故磚為濤所齧屢修輒壞勞費無算宜易以石庶幾可久而新修康濟河西岸亦須豫為甃築以免衝決之虞河之北閘仍宜北遷五里許庶舟行可以盡避湖面之險從之十年建江口各閘明孝宗實録都御史李蕙請於瓜洲新壩至倉壩一壩至四壩港口儀徵鑰匙河及歇馬亭請各建一閘以便漕運工部覆奏謂二壩邊臨大江潮長則壩低水髙固易於車放潮落則壩髙水低殊不為便莫若於江口總港內各建一閘潮平之時下板蓄水令與壩相平為便從之十四年正月巡撫都御史彭禮奏鎮江府所屬運河南抵奔牛壩北至新港壩先因河道淺狹運船俱從孟瀆河出大江經行徑抵瓜洲遞年起夫四千往瓜洲壩挑淺民實勞於重役乞令本府人夫止於本處挑濬其瓜洲壩一帶運河令江北府屬並附近州縣人夫撈淺庶民無重役之勞從之二月儀徵新建攔潮閘成附楊一清記儀徵之有攔潮閘便漕也儀徵為漕河自前代已然國家定都北方嵗漕東南粟以供京師多由此道蓋喉襟最要地也顧漕河之水至是當入江髙卑勢殊河易泄且涸宋嘉定間置三閘為蓄水計尋再舉廢洪武辛亥始築為壩成化甲午巡河郎中郭君升建議置閘四為東關為響水為中閘為羅四閘以通於江一時稱便獨妨罔利者煽為泄水之説閘遂不用𢎞治戊申朝命郎中施君恕相所宜復東關羅四二閘廢響水中閘然江濱無閘潮無所瀦上閘啓注不可遏於是復起泄水之議漕運總戎郭公鋐嘗欲增置江濱攔潮閘或謂江濱多浮沙不果𢎞治己未冬都御史張公敷華奉敕為巡撫總漕事有以攔潮之䇿獻者公詢於衆揚州府同知葉君進曰元嘗承檄董濬河濬及江濱深七尺土黃壤無沙閘必可置公曰然遂以聞乃會郭公檄葉君任其事卜以庚申十月八日始事度地勢定造閘之規髙一丈八尺中廣二尺八寸袤三丈而東西亘加袤之二爰琢爰甃犬牙相入磨礲剷磢崖削砥平疊石數重以固其涯松樁櫛比以固其底凡所取資得先年濬河羡餘銀千兩有竒不責辦於有司故工巨而官不知費事集而人不告勞距經始之期才四閲月耳閘成謂閘啓閉宜有定規乃視河縮及潮之長落啓閉傳檄有司遵行之是嵗江河會通舟無留行比秋霖潦浹旬潮水大漲得以時泄不橫決為隄堰害亦惟閘是賴焉十六年八月修通州至儀徵一帶河道十七年十月總督漕運都御史張縉請浚揚州淮安一帶運河及將清江口築塞淮安府仁信等壩修完以蓄水利漕十二月疏濬常州運河明孝宗實録工部議浙江蘇松等處運船俱由夏港口並孟瀆河出江二三百餘里方到瓜洲其大江中有黃團等山風濤險惡往年糧運皆由常州奔牛壩直抵鎮江府京口閘不過一百五十餘里徑過江而就抵瓜洲近年以來此河淤淺宜下所司起附近軍民夫併力疏濬且修復練湖導引水源以防歲旱仍三年兩濬務成永久之計詔速行十八年重建儀徵通濟閘附黃瓚記儀徵縣東南自成化甲午提河工部郎中郭君升疏言於朝置閘曰臨江曰通濟曰響水曰裏河口而通濟當其中方其置閘也狙儈之家狃於壩利往往浮言喧騰謂有泄水過鹽之患若無事於置閘然者及閘成僅踰兩紀而通濟遂廢然潮水之至也不踰時而退船之羣次於閘也銜艫接舳無慮百數茍無通濟紆匯瀦蓄有以逗其勢將跬步千里前響水而弗及後臨江而已逺其不淺涸損壞者幾希癸亥之厄可鑒也故臨江諸閘不可無而通濟尤不可無於是南京工部分司署員外郎事何君白於總督漕運右副都御史張公公韙其議檄通判揚州府事韓侯知儀徵縣事馬侯協力起廢肇事於𢎞治乙丑正月朏未四閲月訖工凡用物以株計松杉榆木三百七以斤計黃白檾麻八百五十生熟鐵八百軟篾油灰各千二百以石計秫米七十灰千二百二十五總費白金二百四十二兩有竒閘髙二丈五尺襯石千七百四十九丈雖閘址仍舊而規制加壯云是年管理河道工部郎中張瑋奏髙郵等州縣原設石閘石橋涵洞蓋專為湖河之計將以時其啓閉而蓄泄水利比來為近堤人家私立洞口掌理遇水溢則竊自閉水消又竊穵堤岸以致衝決遺患乞將涵洞築塞每五里改砌減水石閘一座以絶盜決之弊從之正德二年三月添設清江浦新壩閘二座明武宗實録議者謂春冬淮水退消清江浦淤淺外河與裡河湖水髙下懸隔設壩盤剝舟行未便宜將壩改作內外二閘以時啓閉節水通舟從之六月從督漕都御史洪鐘言復開白塔河及江口大橋潘家通江四閘十四年三月從督漕都御史臧鳳言修浚常州上下運河嘉靖五年工部郎中陳育賢奏修汜光湖堤月河詔治河都御史章拯督漕都御史髙友璣會議相度附陳育賢奏略揚州寶應縣汜光湖為糧運必由之路湖四面甚廣水勢瀰漫僅以三尺之堤障之一旦積雨水發則橫奔衝決不惟阻糧運而河堤以東田土俱成巨浸此第一患也臣以為障水固所當先泄水亦不可緩請於河隄以東修築月河以分水勢如工費浩繁財力有限則請自淮安而下自寶應至髙郵建平閘數處以泄其流亦中䇿也七年河道都御史盛應期奏開新河明世宗實録盛應期奏沛縣迤北河道地形庳下泥沙易集以故纍濬纍塞今詢之官民盛稱昭陽湖東自北進汪家口南出留城口約長一百四十餘里可改為運河北引運河之水東引山下之泉內設蓄水閘旁設通水門及減水壩以時節縮較之挑濬舊河勞逸甚逺且可為永久之利計用夫六萬五千人用銀二十萬兩有竒期六月而畢章下廷臣雜議皆言應期議是上乃命應期及春和督官興事至七月疏濬昭陽湖東一帶新河工已及半會旱災修省言者多謂新河之開非計詔罷其役冬漕河侍郎潘希曽加築濟沛間東西兩堤以拒黃河十年十二月户部貟外郎范韶御史聞人銓奏於泛光湖宜建減水閘五座浚赴海渠五條築堤節流以防衝決之虞命總督漕運都御史會同勘視十五年從督漕都御史周金奏請於新莊更置一渠立閘附周金奏略淮安清河口抵瓜儀四百餘里乃運道咽喉所資白馬泛光髙郵邵伯諸湖皆無源之水往者黃河北徙自飛雲橋榖亭分流入漕渠是以沽頭諸閘頗得其濟自嘉靖六年後河流益南由渦河直下長淮而梁靖口趙皮寨二攴分流小浮橋小河口各入清河匯於新莊閘遂灌裡河水退沙存日就淤塞故老皆言河自汴來本濁渦淮泗清新莊閘正當二水之口河淮既合昔之為沛患者今移淮安矣請於新莊更置一渠立閘以資蓄泄十九年九月運糧千户李顯疏築運河三事其一謂揚州南自儀徵北抵淮安俱藉寶應泛光湖諸水接濟乃湖南北相去三百里廣百二十餘里卒有暴風漂蕩不測議於汜光湖隄迤東開築越河以免水患其二謂北自淮安南至瓜儀水勢上下相去丈許惟賴瓜儀二壩關防先年壩決水衝河道淤淺宜令瓜洲陳家灣儀徵新城地方並揚子橋及揚州東關各增一閘若瓜洲壩衝決則下陳家灣儀徵壩衝決則下新城閘如二閘閉水不及則下揚子橋閘再不及則下東水關閘以留水利其三謂儀徵下接揚子橋大江商舶輻輳河道壅塞糧運阻誤成化年間曽將新城通江舊河疏浚寬廣河道疏通官民稱便後廢不修今宜仍前修浚以禆漕政命工部議行三十一年九月河決徐州房村集至邳州新安運道淤阻五十里總河副都御史曽鈞上治河方略乃濬房村至雙溝曲頭築徐州髙廟至邳州沂河四十四年七月河決沛縣上下二百餘里運道俱淤河漕工部尚書朱衡奏開新河總理河道潘季馴議復疏舊河衡巡行決口舊渠已成陸而盛應期所鑿新河故迹尚在地髙河決至昭陽湖不能復東乃定計開濬而季馴則謂新河土淺泉湧勞費不資不如浚留城以上故道初淤可復也由是二人議不合四十五年二月遣工科右給事中何起鳴勘視河工明世宗實録朱衡持前議益堅身自督工時浮議籍籍有謂衡違衆自用故興難成之役以要功者給事中鄭欽疏請遣官勘視問新河與舊河孰便起鳴奉詔至沛縣勘河工還上言舊河之難復有五黃河全徙必殺上流如新集龎家屯趙家圈等處以不資之財而投之於河流已棄之故道勢必不能一也自留城至沛莽為巨浸無所施工二也橫亘數十餘里褰裳無路十萬之衆何所棲身三也挑浚則淖陷築岸則無土且南塞則北奔四也夏秋淫潦浚後難保不淤五也新河內多舊堤髙埠黃水難侵開鑿之費視舊河為省且可逺將來潰決之患故尚書朱衡任其必可開開成運道必利而議者見謂難成亦有三焉一以夏村迤北十六七里地髙恐難接水然地勢北髙南低大約止深三丈一照水平加深何患水淺一以三河口積沙深厚水勢湍急不無滯阻然或建壩攔截或用石包砌每歲挑淺如例何患沙壅一以馬家橋兩岸築堤五里微山取土不便又水口投掃勢必不堅恐難經久然此亦在委任得人培築髙厚無必不可措力之理臣又觀居民之情在新河者則稱新河可開在舊河者則執舊河可復皆為市廛之私非為國家運道計也天下之事勢窮則變變則通沛縣河患至此極矣往時舊河淤塞未深都御史盛應期開新河垂成而廢至今惜之今黃水異常伏漕無日尚可溺於人情安土而不為通變之謀哉故臣斷以為開新河宜如衡言開新河而不全棄舊河宜如季馴言疏入下工部會廷臣議俱合上意乃決隆慶元年五月河工成新河自南陽達沛縣留城百四十一里舊河自留城達境山茶城五十三里役丁夫九萬餘人行水金鑑尚書朱衡從南陽以南東至夏村及東南至留城凡一百四十一里因故都御史盛應期所鑿而深廣之引鮎魚諸泉薛沙諸河注其中壩三河口又疏舊河築馬家橋堤遏河之出飛雲橋者使盡入秦溝自留城至赤龍潭又五十三里凡為閘八減水閘二十為壩十有二為隄三萬五千二百八十丈有竒石隄三十里由是黃水不復東運道通而沛流息三年九月總河都御史翁大立請於梁山之南别開漕河詔令相度地勢未果行附翁大立疏略漕河即泇河也新河既成水盡趨秦溝而南北各支河悉並流焉河勢漸大漲至是決沛縣徐州受其害茶城淤塞漕船阻邳州不能進既雖稍通而黃水橫溢臣按行徐州循于房山過梁山至於境山入地濱溝直趨馬家橋上下八十里間可别開一河以通漕運其利有十自秦溝濁河至徐州洪諸狂瀾激湍逺不相涉一也依山為隄雖有洪濤必不泛溢二也漕舟循堤而上牽挽不難三也無茶城淤淺之患省盤剝之費四也由馬家橋至境山四十里由境山至徐州洪四十五里視舊河為近驛遞夫價並可減省五也驛路改從新堤往來徑捷六也徐州募夫可並吕梁二洪徭夫可遂裁革七也計沛縣六鋪至境山築隄百里當用銀十三萬有竒今開新河則長堤可緩費益大省八也糴榖貯倉假工役以濟飢民兼節財賑荒弭盜之術九也棄舊河以為水壑即河決谷亭沛縣從鴻溝以泄徑從小浮橋下徐洪運道無梗十也顧其難亦有三地濱溝當築大壩接黑龍潭堤至楊山壩西當别開一道至舊河繞出茶城及開渠建閘費皆不資此其難在工費嵗屬大飢而徭夫工食往往不繼待哺之民怨讟易生此其難在工食役夫二萬仍聽番休而錢糧不益淹以嵗月必招謗議此其難在工程犯此三難以興十利臣固未易辦也惟上速集廷臣議之十二月開濬裏河等處時淮河自板閘至西湖觜開濬垂成而裏口等處復塞總督漕運侍郎趙孔昭言清江一帶黃河五十里宜築堰以防河溢淮河髙家澗一帶七十餘里宜築堰以防淮漲工部覆請裏河等處亟行開濬以築堰事宜及海口築塞寶應越河二事均酌議舉行從之四年四月河道都御史翁大立修築髙郵等處湖堤是年秋黃河暴至茶城復淤淮水亦大溢自泰山廟至七里溝淤十餘里而水從諸家溝旁出至清河縣河南鎮以合於黃河大立言黃河在睢寧宿遷之間遷徙未知所定請濬古睢河由宿遷歷宿州出小浮橋以泄二洪之水且規復清河魚溝分河一道下草灣以免衝激之患則南北運河可保而大立已內遷方受代詔令新任都御史潘季馴區畫九月中河決邳州糧艘阻不進總河翁大立請開泇河以避黃水翁大立言比來河患不在山東河南豐沛而專在徐邳故先欲開泇河口以逺河勢開蕭縣河以殺河流者正謂河沙壅聚河面增髙為異日慮耳今秋水洊至橫溢為災權宜之計在棄故道而就新衝經久之策在開泇河以避洪水乞決擇於二者會罷去而季馴則主復故道五年都御史潘季馴開復邳河附馮敏功記隆慶庚午秋八月河決於睢寧之白浪淺既而白浪淺淤復決青羊淺既而青羊淺淤河益分裂潰決決而南為王家口張擺渡口馬家淺口曲頭集口決而北為曹家口其小口在辛安左右者七於是河流悉由決口南趨睢寧平地為湖漂沒軍民田廬無算輕舟從此出小河口其支分而北者出直河而正河故道自曹家口至邳之直河九十里胥為平陸淤運艘九百三十隻糧四十餘萬石官民船又數百自曹家口上至曲頭直河下至宿遷又九十里河身淤淺不能通舟雎民昏墊運道阻絶於是起大中丞歸安潘公於家俾治之公至博訪羣情時議多以為故道不可復有欲因睢寧決勢而利導之者公謂河源盤折數萬里水夾泥沙急則沙隨水滚稍緩則水漫沙停比年因水勢散漫沙墊底髙容受漸少每一泛溢輒便為患今舊河廣且百餘丈深且不測若仍復舊河中開小渠引水衝刷兩堤夾束使不散漫則水勢歸漕淤淺漸去河身自可復舊若就新衝水勢散漫湖波平淺不能復深工力所及能有幾何伏秋水至必壅不下徐邳之間將成魚鱉此必不可羣議乃定於是度逺邇議工役具畚築計餱糧大發淮揚徐及廬鳳山東河南夫並徭淺各夫分司道官為五工統之公指示方略畫地課工以隆慶五年春正月十有六日肇役羣工齊奮至二月二十日渠成二十三日縱水歸渠淤沙漸刷河流乃通凡舊淤糧艘及官民船皆由渠出時築決之工張擺渡曹家二口已完而曲頭馬淺王家三大口亦已有緒公且調集樁草益急羣謂急此何為但笑而不言翌日風雨驟作不止兼以黃河桃花水漲會山東諸泉並至乃季春朔日水復大溢瀰漫淹浸莫辨湖河新舊堤防潰決殆盡復決閻家口油房口曲頭舊口之東王家舊口之西房家口青羊口白浪淺口與諸小口凡四十三處羣情大駭役夫懼且潰公時患背疽乃裹瘡而出撫慰勞來身自督率示以必成衆志復定晝夜率作工料踵集隨用輒濟於是諸口漸合而縷水之堤亦漸成四月七日麥黃水又大至狂風挾水勢復衝決閻家口之西及半戈山之左右公督率益勵親守築口六月三日諸築塞之工咸畢先是淤河多淖沙人立輒陷工不得施公命以木橫沙面決半瀝水左右互倒水盡沙乾工乃得施決口懸溜數尺噴沫成雷負土入水輒便消去公命以大掃截流緧以巨纜旁植巨樁其衝之處湍猛溜急樁折掃滚勢難猝就乃復相視緩急偃仰合度卒復壓以厚土勢若岡陵衝乃克定築堤捍水浮沙既不能堅而實土又為比年流沙所壓必深掘至尋丈及逺取於民間空基與隔河運取山土往來力役竟日不能數筐公命囊土程衡唱籌課役土功乃集於是兩岸屹然河流受束濬刷淤沙深廣如舊四百萬漕糧飛帆直上雖伏秋水三至懷襄徐城而曲頭以下凡公經理之地皆得安流如故矣是役也用夫五萬人興工五閲月決口築塞者五十有八浚河以丈計者三萬二千四百築以丈計者七萬五千有零樁草栁葦以株束捆計者二十萬有零麻檾以斤計者八萬四千有零所用河漕貯積撫按贓贖徐淮商稅及淮徐糧米總計僅十一萬金有竒視初請未及三分之二而決口增築堤工髙厚倍於原題者三蓋公之經畫素定而復以身先故下民率作罔敢不竭心力事半功倍其成之速如此既成之後公又為之計久逺乃並修徐吕靈璧之堤以束上流復築林房村之壩以防衝逸建鋪舍設官夫以時防守植草栁集工料以豫備禦其善後之圖又如此五月工科給事中張博請改瓜洲土壩為閘以便漕舟六年禮科給事中雒遵會工部尚書朱衡勘泇口河附雒遵疏略泇口河從馬橋東過微山赤山吕孟等湖踰葛墟嶺而南經侯家灣良城至泇口鎮又涉蛤鰻周栁諸湖乃逹邳州直河口以入黃河凡二百六十里取道雖捷施工實難葛墟嶺髙出河底六丈餘開鑿僅至二丈硼石水泉湧出侯家灣良城雖有河形水中多伏石不可施鑿縱鑿之湍石不可以通漕且蛤鰻周栁諸湖築堤水中功費無算微山赤山吕孟等湖雖可築堤然須鑿葛墟嶺以泄正𣲖開地濱溝以散餘波乃可施工與其煩勞厚費以開泇口之河孰若時加修防如期儹運保百數十餘年之故道疏上詔尚書朱衡同總理河道都御史萬恭覆勘衡奏有三難大略如遵指乃罷六月工部尚書朱衡報徐沛等處河堤工完是年總河侍郎萬恭請建瓜洲閘自時家洲達於花園港開渠長六里有竒其年冬閘成一名廣惠一名通惠於是五總船始下壩萬歷元年正月總河侍郎萬恭檄浚蘇松常鎮一帶河道建三汊河東水弔橋自是吳浙之運可與江西湖廣徵發相同是年萬恭建復淮南平水閘與淺船淺夫又建天妃廟口石閘修復境山閘儀徵建平水閘二座江都一座髙郵十座寶應八座山陽二座凡二十三座座三百金自儀徵至山陽有五十一淺淺設撈淺二小船船七金淺夫十名天妃口大閘一門除堪改廢閘石料仍用二千五百金境山舊閘五百二十金凡費工料一萬餘金二年三月工部奏改瓜洲下閘及建詹家洲中閘附部覆河道萬恭疏瓜洲花園港等處原設建閘蓋俾江南糧運可以直逹免盤壩之費也自隆慶六年花園港豬市上下閘成迄今二載糧艘無滯省民間不資之費但上閘重建方畢而下閘衝齧又壞合行河道將瓜洲應改下閘詹家洲應建中閘作速興舉並議運河揚子橋亦於明年接續修建以收全功七月貢生許汝愚請浚練湖焦干杜墅以濟運河行水金鑑許汝愚上言東南運道水勢之澀莫甚於丹陽地勢之髙莫甚於夾港國初於此置為閘者四曰京口曰丹徒二閘居上以防三江之易涸曰呂城曰奔牛二閘居下以防五湖之易泄自丹陽起至鎮江蓄為湖者三曰練湖曰焦干曰杜墅以濟漕河之用遂免海運之艱以故四月交兌五月過淮維時雨澤大降江潮盛行不假湖水亦足以濟歲久延襲居民侵為田畝焦杜二湖俱為平陸僅存練湖猶有侵者而四閘俱空設矣今改為十月臨倉雨澤既少江水枯落不免剝淺才十里之區有閲三四月而不得盡達於江者雖添設儹運枉費推挽而開河之議起矣夾港兩岸髙者數十丈而河僅闊數丈許下之開鑿愈深則上之坍塌愈速瀕冬役民以浚之春來淤塞如故歲興大役民何以堪莫若修三湖之故址就四閘之完基蓄泄以時下修呂城奔牛二閘以時糧運之入上修京口丹徒以時糧運之出况乎上流既溢則奔牛而下又何不通之患哉破此説者必以淹沒民田為辭不知前此占湖為田今仍舊修葺非廢田以為湖也即欲補此數頃之田則沿江一帶新漲常稔洲田無慮千頃民方爭佃構訟不息其皆𨽻於丹徒以此相易不亦可乎時總理河道傅希摰言練湖先已疏築無容别議焦干杜墅二湖地窪源少無益運道四閘若廢有妨蓄泄其事遂寢三年二月總河右僉都御史傅希摰請開泇河附傅希摯疏略徐邳一帶河身墊淤壅決變徙之患不在今秋則在來嵗幸而決於徐吕之下猶可言也若決於蕭碭之上則閘河中斷兩洪俱涸矣幸而決於南岸猶可為也若決於北岸則不走張秋必射豐沛矣莫若開創泇河置黃河於度外庶為永圖耳泇河之議嘗建而中止謂有三難而臣遣錐手步弓水平畫匠人等於三難去處逐一勘踏起自上泉河口開向東南則起處低窪下流趨髙之難可避也南經性義村東則葛墟嶺髙堅之難可避也從堤溝河經郭家西之平坦則梁城侯家灣之伏石可避也至於泇口上下則河渠深淺不一湖塘聯絡相因大較上泉河口水所從入也下至大河口水所從出也自西北而東南長五百餘里比之黃河近八十里河渠湖塘十居八九源頭活水脈絡貫通此天之所以資漕也昔尚書朱衡開新河都御史潘季馴開邳河權救一時情事忙促工費浩大今雖尚幸無梗然相時度勢要之不免卒有不虞而後竭天下之財力以通咽喉何啻如新河邳河之情事洶洶已哉若拚十年之費以成泇河泇河既成黃河無慮壅決矣茶城無慮填淤矣二洪無慮艱險矣運艘無慮漂損矣洋山之支河可無開境山之閘座可無建徐口之洪夫可盡省馬家橋之限工可中輟今日不資之費他日所省尚有餘抵也故臣以為開泇河便因列為議工費酌工程擬督工請監工四欵上之章下户工二部勘議三月命工科給事中侯于趙會傅希摰及儧運按臣勘議泇河附侯于趙等題會勘泇河事宜自泉河口至大河口五百三十餘里內自直河至清河三百餘里自來河道無恙無賴於泇斷在可已惟是徐吕至直河上下二百餘里宜開以避二洪邳河之害約費一百五十餘萬金特良城伏石長五百五十丈比原勘多四百七十丈開鑿之力難以逆料性義馬陵俱限隔河流之處二處既開則豐沛河決必致灌入宜先鑿良城石土豫修豐沛堤防而後可徐議也又謂正河有目前之患而泇河非數年不成故治河為急開泇為緩上責侯于趙等阻撓然議亦寢七月修通濟福興新莊三閘附御史劉光國議以天妃閘地勢髙於通濟淮水灌溢多於黃水謂宜將通濟閘及福興新莊二閘增卑培薄務令髙厚堅固仍令清江厰分司專司啓閉每五月以後九月以前二水盛發之候嚴加封閉官民船聽其自行轉盤惟回空船至每二日啓放一次隨放隨閉不許官民船越規擅進以貽水患八月總河都御史傅希摰言茶城一帶運道咽喉宜自梁山以下挑濬與茶城交相為用淤舊則通新而挑舊淤新則通舊而挑新惟築壩斷流通其一以備不虞從之是年河決崔鎮淮決髙家堰髙郵湖決清水潭丁志等口知府邵元哲開菊花潭以泄淮安髙寶三城之水東方芻米稍通清水潭口衝決督漕侍郎張翀以修復老隄工力浩大數十年始可成功恐新運已臨決口未就且令糧船暫由圈田以行而御史陳功則稱圈田淺澀不便牽挽外湖水闊四十餘里風有不順必至稽阻工科給事中侯于趙亦以兩臣持議未決恐致過淮後期乞敕所司速議並欲以淮南運道專責漕臣而以淮北運道命河臣傅希摰一意經理務時加挑濬以圖萬全從之命漕運及河道衙門嚴督郡縣將清水潭原決堤口設法堵塞勿得恃圈田外湖致稽糧艘四年五月河漕侍郎吳桂芳題請修復髙郵西河老隄復傍老隄由圈田改挑康濟越河並築中隄按髙郵捍湖老隄長亘四十里永樂時陳瑄所建至𢎞治間白昂於境內越民田三里鑿康濟越河通餉避河者為東堤其捍隔民田者為中堤中堤之中有田數十萬畝所謂圈田也嗣後圈田淹沒老堤傾圮萬歷三年泗水南下衝決清水潭等處故塞決後即議修老隄甃砌磚石改越河廢東堤改築中隄以便牽挽是年淮安知府邵元哲修築淮安長堤又疏鹽城石䃮口下流入海五年三月修浚丹陽練湖武進孟瀆河以濟漕運附直𨽻巡按御史郭思極條奏一復練湖以資蓄泄蓋江南漕河北髙南下京口一帶地形髙亢河流易涸雖奔牛吕城建閘啓閉蓄水以待運船而實仰藉練湖以為之源也練湖北去丹陽城百步而近漕河縈繞其側周圍四十餘里仰受長山八十四溪之水匯為巨浸唐宋以來築有中梗斗門石閘天順成化間屢嘗疏浚增修夏秋戽水溉田冬春放水濟運故有湖水放一寸河水漲一尺之諺自往時守令狃於近利令豪右告佃成田寖失舊額而傍湖之民私開涵洞網取魚利年涸一年今且揚塵矣為漕河經久計急宜請復一修孟河以旁通舟楫奔牛吕城二閘例應冬閉春啓蓄水以待運船然秋冬之交回空運船與往來官船必取道於此欲恪守成規勢不可得有不由二閘而可以間道逹江者為武進之孟瀆河延袤六十餘里外通長江內資灌溉自嘉靖間防倭入冦築壩堵塞於是河流漸微日就阻塞而船不復經行矣今計開浚約費五萬餘金取諸漕運衙門無令獨纍武進一縣此河一開既有私道以通舟楫而運閘得啓閉之宜又引江潮以進奔牛而運河資接濟之力矣是月巡按御史陳世寶條陳六事一增建儀徵二閘因江口去閘太逺欲於上下江口迤邐十數丈許各建一閘潮始來豫啓板以納之潮初退即下板以閉之使出江之船盡數入閘以免遲滯一開瓜洲河港塢將屯船塢挑濬深闊使船之先入者屯聚於內又於鹽壩之東開一曲港與新閘外港相合使船之後至者續泊於內以免金山挂江之險部覆允行是年冬髙郵湖土石二隄新開越河南北二閘及老隄加髙石層增設護堤木城各工竣事附總督漕運侍郎吳桂芳疏略髙郵石堤工將底績宜及時開挑越河查先年侍郎白昻開康濟越河去老隄太逺河成之後人心狃於目前越河之安而忘老隄外捍之力年復一年不復省視遂致老隄與中隄俱壞而東隄不能獨存今宜倣侍郎王恕之議挨老隄十數丈取土成河使隄工往來共由人得照管不致蹈前轍六年九月河道侍郎潘季馴築髙家堰及清江浦柳浦灣以東加築禮智二壩修寶應八淺石隄長八十五丈六尺又復淮安新舊閘壩遷通濟閘於淮安甘羅城南以納淮水故道盡復十年河道尚書淩雲翼開永濟河雲翼以運船由清江浦出口多艱險乃自浦西開永濟河七十里起城南窑灣歷龍江閘至楊家澗出武家墩折而東合通濟閘出口更置閘三以備清江浦之險是時漕河就治淮揚免水災者前後十餘年十二年八月吏科給事陳大科請開寶應越河報可附陳大科疏略江南漕艘歷髙寶抵淮寶應汜光一湖浩蕩無際槐角樓一帶據湖之中其形如兜兩翼向為運道梗所司議開越河而一主圈田以助夾攻一主靠堤以省修築昔白侍郎昻康濟一河圈田之制也比南尚書吳桂芳靠堤開越河十餘年來未聞衝圮臣以為靠堤便十三年六月寶應越河工成賜名𢎞濟明神宗實録寶應有泛光湖素稱重險國初平江伯陳瑄築石堤於湖之東蓄水以為運道上有所受而下無所宣因決為八淺匯為六潭則興鹽諸場皆沒而淮水又間從周家橋漫入洶湧排空萬歷十二年糧艘溺者數十總漕李世達按臣馬永登鹽臣蔡時鼎議於石隄之東開越河以避其險乃命工科給事中馮露往視之河身長一千七百七十六丈凡為石閘三減水閘二為隄九千二百四十丈石隄三千三十六丈子隄五千三百九十丈費公帑二十餘萬八月都御史王廷瞻行工部郎中許應逵築髙郵護城隄杭家觜六百丈又小湖口堤五百三十丈十七年五月修清江浦運道濬武進橫林漕河總河都御史潘季馴修建邵伯湖石隄長一千二百八十丈補舊石隄六百十二丈又於寶應縣白馬湖東築八淺石隄長八十五丈六尺又因漕水旁潰入寶應湖以致流緩沙停自黃浦至三官廟之西築西土隄長三千六百三十五丈束水由漕以省挑浚之費十九年三月總理河道潘季馴議以鎮口閘去河甚近雖淤易為疏通宜照舊道挑濬科臣復稱引衆議欲開月河以分水勢通蘇洵湖以導積水上命河漕等衙門勘議妥當具奏河防一覽徐北鎮口黃運交會之處伏秋黃水大發多灌入本口動至淤阻原任中河郎中陳瑛創建古洪內華二閘近工科都給事中常居敬題建鎮口一閘如遇水發下版謹閉俟黃水消落即啓閘縱水外衝而漕河無淤墊之患啓一閉二悉如清江裏河事規與近日題奉明例行之其鎮口閘外東西兩隄原係挑河所積客土未堅內水湧出未免剝損伏秋之前密護樁笆隄固則閘無虞矣二十六年三月命漕河御史勘議泇河附工部題覆工科給事中楊應文議開泇河疏略頃堌口一決黃河南徙徐吕而下幾於斷流於是開李吉小浮橋等處及鎮口以下建閘引水以通漕目前似可無虞矣然非永久之計也蓋泇河北接汶泗諸水東受沂蒙諸泉其源本不易竭而岸髙土堅又能東其流而使之不漫即有湖也而涯涘可循即有石也而罅漏可鑿隆慶間河臣翁大立萬厯間河臣傅希摯嘗議開而不果若以河道嵗修之費而用之於此事半功倍一勞永逸臣固以為泇河宜議也科臣之言良有深見但事在彼中難以遙度宜咨河臣及巡漕等各御史勘議可否以為行止是年總漕劉東星檄郎中顧雲鳳署道事揚州府知府楊洵督夫開挑邵伯越河長一十八里闊一十餘丈十一月又挑界首鎮越河長一千八百八十九丈七尺各建南北金門石閘二座其邵伯越河又建減水石閘一座三十年鳯陽巡撫李三才議治河緊急之䇿鎮口閘起至磨兒莊倣閘河之制每三十里建閘一座依時啓閉以濟新運及堅城集至鎮口閘止挑浚河渠約費銀一十九萬有竒五月髙郵北關小閘口潰決長六丈郎中顧雲鳯築塞之仍加磚石包砌三十二年總理河道工部侍郎李化龍大開泇河自直河至李家港二百六十餘里漕船由以行盡避黃河之險明神宗實録工部題覆李化龍疏請亟開泇河酌浚故道大要言河自開歸而下合運河入海其路有三由蘭陽道考城至李吉口過堅城集入陸座樓出茶城而向徐邳是名濁河為中路由曹單經豐沛出飛雲橋泛昭陽湖入龍塘出秦溝而向徐邳是名銀河為北路由潘家口過司家道口至何家隄經符離道睢寧入宿遷出小河口入運是名符離河為南路前督臣排群議以興兹役竟以資用乏絶不得竣事然自堅城以至鎮口河形尚爾宛然故為今計惟守行隄開泇河其善有六其不必疑有二泇河開而運不借河有水無水聽之善一以二百六十里之泇河避三百三十里之黃河善二運不借河則我為政得以熟察機宜而治之善三估費二十萬金開二百六十里比朱尚書新河事半功倍善四開河必行召募春荒役興麥熟人散富民不苦賠窮民得以飬善五糧船過洪必約春盡實畏河漲運入泇河朝暮無妨善六為陵捍患為民禦災無疑者一徐州城向苦洪水暴至泇河既開徐民之為魚者亦少無疑者二題請遵照施行及工科都給事中侯慶逺亦題稱共贊河漕大計事部議泇河應挑直河應建閘座及築隄應用錢糧依議取用如或原議所開河底不無欠缺期日果爾太迫經費果爾不敷不妨照依科臣條議再為增益以圖久逺至科議歲巡歲報事規尤為河工急切要務各該府道督臣悉宜一體申飭上曰泇河既屢經料理端緒可成該總河身親籌度詳悉著及時上緊分工開浚所議經費如有不敷許其再為增益務圖久逺之計八月李化龍奏報分水河成糧艘由泇河者已過三分之二由黃河大溜者止三分之一而過洪曾不逾限國之福也三十五年二月總河曹時聘上泇河善後六事行水金鑑總河曹時聘言全河既已就軌泇河委應厚終開泇於梗漕之時固不可因泇而廢黃漕利於泇河之後亦不可因黃而廢泇兩利俱存庶緩急可賴如謂南陽之患已去而徐邳之險可乘異時有失誰司其咎乎因議築郗山之隄削頓莊之觜平大泛口之溜浚貓兒窩等處之淺建巨梁首衝之閘增三市徐塘之壩以終泇河未就之功又議設河官置官夫建驛遞立巡司嚴閘禁加裁展以成新渠三十八年九月直𨽻巡按御史蘇惟霖疏陳黃泇利害請專力於泇附蘇惟霖疏略黃河自清河縣經桃源北逹直河口長二百四十里此在泇下流水平身廣極力催運舟止日行十里然以别無所經故必用之自直河口而上厯邳徐二州逹鎮口長二百八十餘里是謂黃河又百二十里方抵夏鎮東自貓窩泇溝逹夏鎮止長二百六十餘里是謂泇河東西相對舍此則彼黃河水在三四月則淺與泇同若五月初旬後洶流自天而下一步難行又其水挾沙而來河口日髙一日七月初輒淺涸十倍無一時可由者泇河一水安流嵗修有例既無溺溜終鮮風波率而由之計日可逹即河身稍狹而水不若鋪灘之淺其貓窩諸淺亦不必浚蓋自河流至則閘水積山泉之胍止有此數河身髙則髙受低則低受深淺相隨非云水深則深水淺則淺水之多寡不係河身深淺也或有稍宜拓而浚者但得實心任事之河官嚴其稽核因利乘便不三五年缺略悉補可成數百年之利唯於泇下流諸口謹嚴防禁而夏鎮之吕公堂邳州之沂河口更甚庶所藉蒙獨諸泉洸泗濟諸流不至隨到隨涸伏乞敕下工部詳酌利害一意修泇以濟新運四十一年十一月帶管河道漕撫陳薦檄郎中何慶元揚州道熊尚文開寶應縣𢎞濟河北月河長一百三十丈南月河長一百五十丈又建近湖西堤九淺七淺滚水石壩二座於明年完工按𢎞濟河南北二閘遇夏秋淮水漲發二閘不及吞吐行舟覆溺至是開挑月河創建滚水二壩分殺河怒水溜遂平江南通志卷五十九
