body:
  text: 江南通志卷一百十六職官志名宦五安徽寧三府安慶府漢朱邑字仲卿舒人少時為舒桐鄉嗇夫亷平不苛以愛利為行未嘗笞辱人存問耆老孤寡遇之有恩所部吏民愛敬焉漢書循吏傳三國孟宗為吳雷池監作鮓寄母母還之曰汝為魚官作鮓寄我非避嫌也吳書晉陶侃字士行鄱陽人少孤貧廬江太守張夔召為督郵領樅陽令有能名遷郡主簿會州從事之郡欲有所按侃閉門部勒郡吏謂茍相逼不以禮吾能禦之從事即退晉書本傳唐獨孤及字至之洛陽人天寶末為舒州刺史嵗旱鄰郡多逋亡而舒獨安以課賜金紫唐書本傳麴信陵吳縣人貞元中為舒州望江令愛民如子嵗旱齋戒為文痛自引咎以鐵板丹書禱於神雨驟至及受代民遮道不得去後卒於官將輿櫬歸邑民號哭留葬治所南畿志張萬福元城人嘗攝舒州刺史督捕淮南盜賊窮破株黨唐書本傳胡珦字潤博宗城人貞元中刺舒州嵗大熟麥一莖數穗閭里歌舞之考功以聞韓愈胡良公神道碑韓震元和八年令桐城自開元中徙治山城地多獳虎毒虺震焚剃草木其害遂除民始獲安安慶府志鄭榖滎陽人守舒州水旱小沴虔禱輒應齊楚飛蝗為災將及舒榖夙興告於神蝗旋退復為雷雹麋爛百姓歌曰禾稼美如雲實由鄭使君安慶府志宋馮瓚字禮臣歷城人嘗知舒州境內多産菰蒲魚鱉防禦使司超盡征其入瓚以為攘奪民利奏請蠲之宋史本傳遊酢字定夫建陽人歷知舒州待僚吏有恩使人樂自盡而無敢慢民戴若父母去久愈見思云宋史道學傳李炳肥鄉人以殿中侍御史出知舒州建隆初征金陵沿淮供億惟舒無匱宋史本傳劉沆字沖之吉州人天聖八年通判舒州有大獄歷嵗不決沆數日剖之人服其能宋史本傳李孝基字伯始幽州人嘗知舒州簿書繁委判決如流舒吏受賂鬻獄孝基亷得其實即抵吏罪安慶府志李師中字誠之楚丘人神宗時知舒州師中為治不尚威罰務以信服人至明而恕去之日民擁道遮泣馬不能行宋史本傳黃庭堅字魯直分寧人徽宗朝知舒州以德化民不事箠楚愛山谷寺林泉之勝築精舍於傍自號山谷道人安慶府志孫知微高宗時通判舒州淮賊劉忠薄舒知微繕甲兵厲士卒登陴固守城陷不屈賊怒臠而食之南畿志蕭服字照甫廬陵人調望江令治以教化為本訪王祥卧氷池孟宗泣筍臺皆為築亭刻唐賢令麴信陵文於石俾民知趨向宋史沈畸傳黃幹字直卿閩縣人寧宗時知安慶府沿邉多警民情震恐乃請城安慶不俟報即日興工城分十二料先自築一料計工費若干然後委官吏役民兵五千人人役九十日而計人户産錢起丁夫通役二萬夫人十日而罷日五鼓坐堂濠寨官受命畢乃治府事理民訟接賔客閲士卒會僚佐究邊防利病次則巡城視役晚入書院講論經史是嵗大旱幹登郡閣望濳山再拜雨即至後二年北軍破黃州淮東西皆震獨安慶按堵無恐既而霖潦月餘巨浸暴至城屹然無虞舒人德之曰不殘於寇不蹈於水生我者黃父也宋史道學傳夏椅安慶通判元兵壓境制置使范文虎以城降椅義不肯屈仰藥而卒衣襟中有遺筆云職當其劇運逢其否負吾君親方寸亂矣命無所逃當死而死五十六年歸其天理南畿志元陳寧宋德祐初元師下饒州寧匿山中巴延素聞寧賢下令不得寧即屠其地寧流涕曰奈何以我故而殘鄉里遂出見巴延送入京授泌州知州遷安慶同知行府事嫗育噢咻皖人戴為慈母安慶府志余闕字廷心廬州人至正十三年起闕副使僉都元帥府事分兵守安慶時南北音問隔絶兵食俱乏抵官十日而寇至拒却之乃集有司與諸將議屯田戰守計環境築堡寨選精甲外扞而耕稼於中屬縣灊山八社土壤沃饒悉以為屯明年春夏大飢人相食乃捐俸為粥活者甚衆民失業者數萬咸安集之又明年秋大旱為文祈潛山神三日雨盜據石蕩湖平之令民取湖魚而輸魚租十五年夏大雨江漲屯田禾半沒城下水湧有物吼聲如雷闕祠以少牢水輒縮秋稼登得糧三萬斛闕度軍力有餘乃浚隍增陴外環以大防深塹三重南引江水注之環植木為柵城上四面起飛樓表裏完固升都元帥廣西貓軍五萬從元帥阿爾斯蘭沿江下抵廬州闕移文詔還軍貓有暴於境者收殺之凛凛不敢犯時羣盜環布四外闕居其中左提右挈屹為江淮一保障論功拜江淮行省參知政事仍守安慶通道於江右商旅四集池州趙普勝帥衆攻城連戰三日敗去乂至相拒二旬退懷寧縣逹嚕噶齊伯嘉努戰死十七年普勝同青軍兩道來攻拒戰月餘敗走秋拜淮南行省左丞安慶倚小孤山為藩蔽命義兵元帥胡巴延統水軍戌焉十月沔陽陳友諒自上遊直搗小孤山巴延戰四日夜不勝追至山口鎮明日癸亥薄城下闕遣兵扼於觀音橋俄饒州祝寇攻西門闕斬却之乙巳賊乘東門紅旗登城闕簡死士力擊賊復敗去戊申賊并軍攻東西二門又却之賊恚甚乃樹柵起飛樓庚戌復來攻金鼓聲震地闕分諸將各以兵扞賊晝夜不得息癸卯賊益生兵攻東門丙午普勝軍東門友諒軍西門祝寇軍南門四面蟻集外無一甲之援西門勢尤急闕身當之徒步提戈為士卒先士卒號哭止之揮戈愈力仍分麾下將督三門之兵自以孤軍血戰斬首無算而闕亦被十餘創日中城陷城中火起闕知不可為自剄墮清水塘中妻伊伯氏及子德生女安安皆赴井死元史本傳按闕女名安安史作福童誤福童其甥也亦殉節今依賈良傳改正韓建字公懋遼西人至正中以宗正郎中知安慶潁六盜起所在守令多棄城走建治城隍計軍實示民必守與賊大小百餘戰皆敗之盜大忿乃悉衆來城南郛久隳為民居聫艦以為捍蔽盜縱火舟焚艦諸守將皆潰民走視建建方部署寮吏如平日民乃無恐且戰且撲盜轉西郛却之東郛又却之相火所經撤民屋材夜為柵盜無所利乃引去時余闕來戍郡道聞城陷矣比至乃完問故父老皆曰韓公完我及安慶為陳友諒所陷建方卧病罵不屈求死甚急賊怒殺之舁尸去葬南門外江邊安慶府志余闕同時死者建一家被害城中民相率登城樓自捐其梯曰寧俱死此誓不從賊焚死者以千計其知名者萬户李宗可紀守仁陳彬金承宗元帥府都事特穆爾布哈萬户府經歷段桂芳千户和實布哈新李廷玉葛延齡丘卺許元琰奏差烏德美百户黃寅孫安慶推官黃圖嚕岱經歷楊桓知事余中懷寧尹陳巨濟凡十八人元史余闕傳明談啓宗字敬先明初知安慶府寇至啓宗帥殘民固守陳友諒死太祖憫江夏屢困戰鬬不忍加兵命啓宗往諭之啓宗宣明威德言論慷慨聞者感動厚其禮遇復命還安慶安慶府志周濟洛陽人知安慶府故事民役以三等九則準之濟易以什伯之法民以為便郡中婚葬從奢下令約之嵗時宴會甚張者罰如令風俗一變安慶府志鍾蕃字廷芳崇德人知安慶府嚴而當於法有侵官儲者夜投火燬籍蕃有所疑故禱神而曰神告我收訊之其人引服聞者皆驚安慶府志胡儼字若思南昌人知桐城縣心存撫字政尚寬平蠲逋賑乏除虎驅蝗表祀循良歷有惠績鄭曉名臣記袁慶祥字德徴雩縣人成化間知潛山少有氣節嘗詣闕上書繫獄杖幾死及來潛興學勸農平賦息訟不期年政績卓然潛山縣志姚嶽長興人𢎞治間知宿松愛民禮士然不少假借異縣民有負租課者族大而驕嶽請於臺使者捕坐如律故事邑令北覲多括民財為資嶽獨秋毫無擾民有道獻者悉却之宿松縣志張文錦字暗夫遼陽人正德中知安慶府宸濠來攻出府庫金懸城上向守偹楊鋭曰師行號令出於君而信賞係於我鋭喜曰戎可以即矣時文錦力疾坐城上以鎮衆心城賴以完南畿志楊鋭南京羽林指揮守備安慶知宸濠必反嘗作大江自岷峨至海圖實於彭蠡處致意又於安慶城內設井治鈎距火藥埋地中及宸濠圍城衆戴板掘城號呼震天鋭用布一方裼以紙束火藥散於戴木上一時火發盡棄去冦夜成橋接城欲上鋭偽實大銃以石金鼓迎之寇望奔散即遣人由水穴出燒之相守二十餘日知寇已懈乃使泅者入水次聞舟中鼾聲即剠殺斬纜發舟於江中岸頭放火銃城上喊聲相接命指揮崔文縱殺之寇失錯而返論功拜都督僉事南畿志王誥霸州人正德中知懷寧到官裁旬日宸濠來攻誥獨守北城晝夜與賊戰賊數敗却以功遷知蘭州安慶府志胡纘宗字世甫泰安人由南吏部郎中擢守安慶築龍壩開吳塘烏石堰以溉田修文廟祭器建射圃進諸生行鄉射禮暇即講學郡齋人文蔚起安慶府志吳之才字室白新昌人令懷寧政尚惇大不苛索細過嵗苦蝗之才諭民捕之計石給錢米明年水災復請蠲租賑給安慶府志石簡字亷伯臨海人知安慶府均賦役定為圖籍安慶府志王宗徐字鵝泉江西人守安慶敝衣蔬食端潔峭直以忤當路去官精形家者言於東郭外建浮圖七級以砥江流皖用是日盛安慶府志董進第字子庸元城人嘉靖中令太湖一疏一鮭不妄取於民遊潛山樵子歌曰山水之清猶有飛塵縣官之清不染一塵太湖縣志羅汝芳字惟德南城人嘉靖中知太湖務以德化民闢講堂與諸生明聖學公事亦多決於其中吏民有過諄諄訓誡刑雖設而不用時單騎尋勝樵豎不知其為官也乃自作歌曰我馬飲清泉清泉照我馬童子不知官紛紛來馬下太湖縣志陳于階兩人同姓名俱知桐城一為遵化人嘉靖末行一條編法吏不擾民當事善之請檄天下以為式桐濵江有洲沃衍數十里于階曰此可障而耕築堤成田嵗獲榖數萬石民名之曰陳家洲一曲周人萬厯初四郊清晏而于階修城民頗駭之及流寇猖獗桐獨以城堅得全桐城縣志蹇達巴縣人萬厯乙亥授安慶府丞攝篆望江請城望江七閲月告竣明年復董役城桐城後流寇殘破郡縣二城獨完安慶府志張緒字無意漢川人桐城教諭少與張居正同舉赴選部居正趣使召之緒曰未見天子豈敢先謁相公由是不得官京師緒講學民環聽者亦蒸蒸焉會大訃銓部將黜之皖守曾汝檀曰此天下第一流寧罷檀毋黜緒乃得留既出不使緒知緒聞亦不報謝桐城縣志常自裕鄢陵人天啓初授安慶府推官二王之國道經皖先聲拆毁河漘民居開纜徑又取縴夫數千民間騷動自裕抗議止之安慶府志王治心欣州人崇禎庚辰授安慶同知不假人嚬笑居官灌園植蔬以自給所職江防屯糧至即核虛伍剔隱佃豪強憚之後乞致仕巡撫黃配元曰吾將表君為諸郡標準何得遽及菟丘巡撫史可法亦疏言如王治心者不通長安一字然終不得調乙酉左兵破安慶治心具衣冠坐廳事厲聲罵曰爾客兵何故作逆爾皖兵何故助逆我清官王治心也恨不能盡殱爾輩遂遇害安慶府志來集之蕭山人崇正壬午安慶推官時困兵荒罹法者衆集之訊獄詳慎小眚悉宥之癸未秋左兵萬艘泊江掠婦女無算集之抗義贖還民得完聚安慶府志楊爾銘筠連人崇禎七年知桐城年甫弱冠流寇圍城親率士民格鬬得退寇氛益張登陴擊柝繕壘請援者七年城賴以完尋擢御史桐城縣志張利民侯官人崇禎間知桐城縣時張獻忠百計攻城凡四十餘晝夜利民死守會總兵黃得功來援圍乃解城內安插孫羅兩營兵三千禍不減賊利民委曲交歡兵民以安桐城縣志黃配元江西人崇禎七年知望江縣八年調懷寧周城建敵臺浚舊濠又於濠外築牛馬墻具炮石守禦在縣六年賊不敢逼望江縣志潘可大江寧人崇禎八年授安慶營守備尋晉遊擊丁丑寇大掠野可大與安池兵備道史可法四面堵截以功加參將總兵程龍進勦可大副之遇賊於酆家店賊數萬騎來攻龍可大祗三千人結營守且戰營破可大自剄龍自焚史可法招魂而哭之為立祠城東安慶府志張寶山四川人初𨽻總戎麾下史可法命率健丁八十人戍桐城賊勢甚熾寶山身先士卒皆一當百授桐標營參將戰輒捷辛巳賊革里眼叛寶山禦之戰死於魯硔山桐城縣志戚國泰字寧宇義烏人起行伍崇禎十三年操江鄭二陽命國泰駐大雷練鄉勇籍皆市人國泰申紀律數年遂成徑旅升參將賊入境城西北角圮國泰夜密築疑城障之賊至城已完恃以防固國泰凡守望江七年禦賊禦左兵皆以血戰卒保孤邑望江縣志朱應嘉沈丘人崇禎十四年知潛山時張獻忠踞桐遣帥破潛應嘉與典史沈所安抱印潛居太平寺賊尋蹤至執歸桐索賄以贖應嘉厲聲曰死即死耳我身膺民社不能掃清豺虎肯以賄免乎罵不絶口與所安俱遇害潛山縣志施元緒浙江人崇禎十五年授宿松丞時邑新破於賊加以蝗疫緒奉檄徵漕歎曰民食草皮再加敲撲民盡矣吾寧以一人代千萬人之死晨起具衣冠端坐自縊事聞得邀蠲免民皆泣宿松縣志趙繼春崇禎間任太湖守備縣築城方半流賊突至繼春逆戰於洪家嶺孤軍無援力竭死之太湖縣志金應元會稽人崇禎間知太湖賊寇潛山應元議請兵不果越數日賊長驅入境應元自誓必死賊執之加刃于頸脅令跪應元曰聚六州鐵鑄跪字不成賊怒殺之事聞贈太僕少卿廕一子太湖縣志袁懋齡字大年豐城人崇禎間令望江兵荒洊至行賑恤力守孤城鄰縣皆破邑獨全望江縣志丘壯猷六安人崇禎壬午以參將移鎮太湖張獻忠營於天堂山壯猷夜遣兵襲之多所斬馘既而部卒通賊濳引入城壯猷血戰死太湖縣志國朝賈壯字止菴襄城人順治丙戌進士知懷寧縣兵燹未久壯招集流亡惠通工商或單騎巡行田間咨民疾苦時滇閩楚粵用兵懷為八省孔道供億繁劇壯儲偫有素即羽檄紛馳莫不咄嗟立辦復建文廟輯邑志百廢具舉以課最擢户部主事歷官僉憲舊通志鄭遹元密雲人順治己丑進士知潛山縣兵燹後一意撫綏修舉廢墜操江都御史李日芃檄取邑志歷百二十年未修遹元排纂詳核上之與鎮將梁大用協築土城自此守禦有備民樂安堵舊通志黃熙纘字敬菴晉江人順治甲午舉人授安慶府推官署郡篆會海氛告警安慶以上遊孤峙人情洶洶熙纘誓衆登陴悉力捍禦有持偽檄至者立縛置獄中已而大兵會勦熙纘率各營水師追擊之以功擢刑科給事中世襲三等阿達哈哈番舊通志常大忠字二河交城人順治壬辰進士知潛山邑畝籍無稽大忠單騎從數力荷餱糧履畝清丈賦役以均建立書院捐資置學田於邑治建庫樓各鄉立眺臺以備守望又折𠂻古禮及律書著明冠婚喪祭之制以示民皆遵行之舊通志趙世貞字興公開原人由貢授沛令有賢聲升安慶知府清慎愛民均地丁省徭役捕蝗禱雨皆有實政在郡十年民安訟息卒於官蕭然無以殮民肖像祀之舊通志遲大魁奉天人順治間為宿松縣丞值江西金聲桓亂邑與九江接壤逆黨突至有勸之偕逃者大魁義不茍免罵賊而死張洪極杏山人順治八年知桐城縣會嵗旱徒跣走四十里禱於屋脊山踰年復旱亦如之桐當孔道時大兵往來洪極拮據措辦不擾民間嵗餘去官士民惜之盧肇冶烏程人順治中知宿松縣邑當凋瘵之餘悉心撫字閭里安恬流亡復業時比之和風瑞日孫繼文奉天人順治中知宿松縣素嫻勇略大兵至皖策應調度悉協機宜㕓士不驚鄉民安堵張茁字文霞嘉善人順治十三年知安慶府汙萊初墾闢者苦額賦不支茁力請上官題請三年後起科瀕江蘆洲多坍缷茁單騎親丈酌腴瘠均廣狹洲民咸得蘇息王民皥字孟遷臨川人順治十五年知宿松縣勸民節用務本墾荒田千頃有竒奉檄丈畝為畫圖以進造册編審户丁釐剔詭寄會部使者文洲民皥徒行露宿供億悉出俸錢又力請豁明季新增之課邀恩得免鄥汝楫江夏人順治乙未進士十五年知桐城縣夙有威名豪強為之斂迹前令葉桂祖革除里役汝楫踵行愈力又均魚課本折解費延孰師於四門城樓資之館餐俾教民間子弟徽州府三國賀齊字公苖山隂人仕孫權為中郎將擊丹陽黟歙破之權遂割為新都郡以齊為太守吳志本傳南北朝宋羊欣太山人新安太守在郡四年簡惠著稱宋書本傳齊蕭潁胄字雲長南蘭陵人為新安太守吏民懷之齊書蕭赤斧傳梁伏暅字元曜安丘人梁新安太守民賦不登者輒以太守田米助之郡多麻苧家人無以為繩民為立祠梁書本傳任昉字彥升樂安人梁天監六年為新安太守不事邊幅每曳杖徒行民通詞訟者就路決焉卒於官闔郡痛惜共立祠祀之梁書本傳徐摛字士秀郯人梁大通三年為新安太守政尚清淨教民禮義勸課農桑期月之間風俗便改梁書本傳唐蘇瓌字昌容武功人為歙州刺史時來俊臣貶州參軍人懼其復用多致書請瓌瓌叱其使曰吾忝為州牧高下自有體能過待小人乎遂不發書唐書本傳薛稷字嗣通汾隂人為黟令今有薛公祠碑廣德三年立南畿志劉贊字公佐大厯中歙州刺史觀察使韓滉奏其治有異行加金紫南畿志崔淙字君濟博陵人刺歙州簡約束明信誓懲害郡之姦除險詭之俗召拜長安令南畿志崔元亮字晦叔磁州人元和中刺歙州故事民間馬牛生駒犢官輒籍之吏得為姦元亮焚其籍悉不問民多山處輸租甚苦為下令計斛輸錢逺近便之唐書本傳邢羣字渙思河間人刺歙州時杜牧為睦守問往來者邢君何以為治曰急於束縛黠吏冗事弊政不以久逺必務盡根本牧嘆曰邢君去縉雲日老稚泣送於路用此術也南畿志吕季重河東人為歙州刺史歙東南有車灘湍悍每覆舟季重出俸錢疏鑿遂成安流因名吕公灘南畿志路旻元和中令祁門邑西武陵嶺險溢旻鑿石為盤道又閶門溪水壞舟開斗門泄之今號路公溪南畿志陳甘節咸通三年為祁門令時閶門溪斗門久廢甘節以俸募民穴石積木為梁因山派渠餘波導入乾溪舟行乃安新安文獻志宋李維字仲方肥鄉人咸平中知歙州至郡起學舍行鄉射之禮代還同判太常禮院宋史本傳歐陽潁字孝叔廬陵人知歙州有盜殺人於市三年捕不獲潁至得之治七州皆有聲南畿志王薦字繼道宣城人知歙縣遵教條布慈惠免逋責寬徭稅吏絶侵宄人無淹繫以致道遺莫拾户闢不閉蔣之竒嵗寒亭賦蘇轍字子由眉山人元豐間知績溪縣時有令江東諸郡市買戰馬他邑預括民馬吏緣為姦轍曰取馬使者未到徐為之備可也及州符至縣督馬轍乃以夏稅違期為由召諸鄉保正副詰之曰誰為有馬者衆以實對復諭之曰事止此矣取馬者至則出馬不至則已皆再拜曰幸甚然取馬者卒不至南畿志黃誥字君謨嶽陽人紹聖二年知歙州首謁先聖升堂講周禮諭父老遣子弟入學聽講更創學舍明年登第者十人南畿志曾孝藴政和中知歙州方臘起青溪孝藴敕郡內無得奔擾分守厄塞人恃以安南畿志郭師中宣和初知徽州亷潔愛民不受私謁方臘陷歙師中死之新安文獻志洪造舉進士黟縣尉方臘倡亂造拒之為所殺璽書褒美宋史洪皓傳毛粟宣和初為徽州司士參軍嘗攝州事適睦冦陷城執粟欲降之不屈罵賊而死舉家遇害南畿志盧宗原宣和三年知徽州睦寇既平奉詔修築城垣即大甎隱起為文以戒後人無忘寇難綜理有道民賴以安南畿志鞠嗣復不知何許人宣和初知休寧縣方臘黨破縣脅使降嗣復罵賊求死賊曰我縣人也明府有善政我不忍殺乃委之而去初嗣復聞難率吏民修城立門衆赴工守備略就朝廷知之進其官二等宋史忠義傳郟升卿乾道三年知徽州奏罷創科錢及歙縣絹南畿志趙師夔乾道間鎮新安嵗祲遣郡從事下邑計口授粟擲姦憝釐積弊凡民所不便者皆罷之郡人立祠於天慶觀南畿志陳居仁字安行興化軍人淳熙初知徽州至則告以天子節經費以惠儉瘠不能推廣聖德吏則有罪乃招三衙軍植二表於庭有輸納中度而遭抑退者抱所輸立表下親視之人無留滯吏不能措手鄰州有訟多詣臺省乞決於居仁秩滿邦人挽留由間道去宋史本傳祝禹圭字汝玉信安人淳熙中知休寧縣為政清簡常著東西銘解朱子為作新安道院記程敏政文獻志李子宣知婺源縣請蠲無名之稅南畿志張拱辰字南暉淳熙中知祁門縣嵗旱躬踐深山循行阡陌視所傷之處蠲其租賦邑人歌曰桑底不聞兒捕雉道旁只見馬留錢程敏政文獻志盛文昭知婺源縣敏而能察囹圄未嘗妄繫一人南畿志龔椿字永年紹熙間知祁門嵗飢與縣尉姚淑問發常平粟以賑不待報曰但活一縣百姓雖失官何憾秩滿兒童裂綵為旗聨句龔父活我福夀千春亦餞姚尉曰薰陶和氣一千日全活飢民十萬家程敏政文獻志趙希逺字安父嘉定初守徽州飛蝗翳日希逺禱於神蝗散山谷中翌日皆死米價騰踴即發廪賑給兼勸富民捐粟為助全活無算南畿志袁甫字廣微鄞縣人知徽州府治先教化崇學校訪便民事上之請蠲減婺源紬絹茶租折帛錢月樁錢請照咸平紹興乾道寬恤指揮受納徽絹定每匹十兩請下常平轉運兩司蓄常平義倉備荒興修陂塘創築百梁以父憂去宋史本傳趙希訴嘉定中徽州推官上官檄委鑿山取石砌漁梁又撥錢五千緡市田以備將來修築希訴措置得宜民不知擾南畿志彭方字季直桐廬人嘉定間知歙縣愛養民力征賦以時太守袁甫賢之發郡帑五百萬佐其惠政方悉以代輸下户折斛之額始方父子皆從學於朱子至是即縣齋建祠并為記程敏政文獻志任良弼嘉定中令休寧時臣僚奏乞下江東漕司問拯弊之䇿良弼請本縣折帛一項減三分之一又請蠲積欠二十萬緡詔俱從之南畿志謝采伯紹定間知徽州府徽與衢嚴接壤盜發常山采伯請調兵遏之禱雨輒應虎豹遁迹程敏政文獻志劉炳字叔文紹定間知徽州新學舍教育士子撥田以繼廪粟減租蠲逋罷巖鎮市𣙜南畿志魏克愚字明已臨卭人了翁之子淳祐壬子知徽州闢貢院作橋梁政恬事熙民安其化南畿志王應麟字伯厚慶元府人父撝嘗守徽州民稱清白太守應麟始至父老慶曰此清白太守子也摧豪右減租賦民大悅宋史本傳元趙謙樊川人至元四年以懷逺大將軍為徽州路總管言於行省夏稅折納綿絹為邦人永利南畿志許楫字公度太原人至元間為徽州路總管民租入親視槩量時當僧格立尚書會計天下錢糧户部尚書王巨濟倚勢刻剝遣吏徴徽民鈔多輸二千錠巨濟怒其少欲更益千錠楫曰公欲百姓死耶生耶如欲其死雖萬錠可徴也巨濟怒解徽州賴以免考滿去徽之績溪歙縣民柯三八等因飢阻險為寇行省左丞以兵捕之相拒七月使人諭之三八等曰但得許總管來皆降矣楫單騎趨賊壘衆見楫來皆拜曰請署榜以付我楫請退軍一舍賊果降元史良吏傳陳發江西人元貞中為休寧尹單騎之官首開渠溉田各數千頃府檄收永豐倉廪料量公平無粒粟羡溢秩滿仍單騎而歸南畿志郝思義字宜之真定人大德中徽州路總管以宰相子自裹衣糧來郡新學宫刋朱子語類蠲除酒稅頒農桑輯要於里社縣囚至郡即遣民立碑記之南畿志宋節燕京人大德中為歙令勸農桑農有惰者令社長供報籍充夫役俟改悔後除名又諭父老遍立鄉孰訓子弟杜絶私謁門庭闃然程敏政文獻志于文傳字受道吳人知婺源州以禮訓民禁婚喪之踰制者創州學及晦菴書院元史本傳張毅字彥𢎞洛陽人大德中為績溪尹嵗飢勸富民分賑復置義倉儲粟有飛蝗蔽空羣虎入境毅虔禱于忠烈廟是夕大風雨蝗盡滅又有猛獸如彪逐虎食之民為立石紀之南畿志薛居信字仲宣河東人皇慶中為祁門尹初至元間官行括勘法官吏虛增民田數居信獨赴公省自實蠲減虛數南畿志張蒙完得濟寧人天厯中令祁門嵗飢躬詣各都發廪分賑勸富民平糶招諭商旅米艘踵至民賴以濟祁門縣志張士謙樂安人至正中以南臺御史出知婺源州明兵至力守五十餘日城陷被執先戮其妻脅之降士謙曰吾為國死忠豈畏死耶遂遇害事聞追封清河郡伯程敏政文獻志明鄧愈虹縣人明初開疆至郡明立賞罰撫以恩信繕城郭設官府四境晏然程敏政文獻志魏君祥夀陽人明初以行省管勾知徽州單舸一僕之官除一切苛政治城濠均賦稅修葺廨舍官庾建朱子祠以弟子配享程敏政文獻志白謙濠梁人明初知婺源州甲辰冬鄰寇陷城遇害葬于縣之環村南畿志陳彥回字士淵莆田人洪武三十一年知徽州府靖難師起彥回糾兵將入援事定被繫爭以大義而死南畿志張齊錢塘人明初知歙縣時官民廬舍皆燼齊諭民復業課農桑興學校構紫陽書院政治蔚然南畿志吳遜夾江人知歙縣亷靜手植庭柏至今比之甘棠歙志縣朱珍字仲理明初知休寧縣建縣四門休寧縣志鍾友諒字明德缺縣人明初知祁門縣剃蓬蒿開市井招逋逃闢土地建立廟學百廢具興祁門縣志余寶字均缺袁州人明初知祁門縣創各官廨及坊巷開新河為橫梁以便民祁門縣志董興廬州人明初鎮守黟縣羅寇劫掠興率民兵固守寇平歸朝黟民繪像祀之南畿志王虎洪武初知黟縣羅寇之餘招撫流散勸課農桑政治第一南畿志蔡美字世宣廬州人洪武初知績溪縣城南有田千餘畝旱則無獲美召耆老相視水源于上三里乳溪口築碣鑿石引水灌田遂得常稔南畿志黃彪臨川人永樂七年黟縣丞縣故折收苧布後改徴棉布地不産棉頗為民患彪具實請如舊詔許之南畿志孫遇字際時福山人正統中知徽州先是嵗造弓費纍萬遇獨減十之九乙巳京師有警檄郡邑造軍器鐵價踴貴遇令民出廢鐵有差旬日而集景泰間休寧黟縣飢民聚衆劫粟按郡者欲發兵勦之遇單車往諭即解在郡幾二十年後擢江西布政使程敏政文獻志龍晉字遵序吉水人由進士知徽州府開良堨灌田三千餘畝南畿志張魁字萬選新淦人正統間知績溪縣清釐糧册民無欺隱築堨溉田千餘畝有兄弟叔姪爭田久不斷魁引普明故事作詩諭之俱悔悟遂成禮讓之風程敏政文獻志董復字德初會稽人成化中知黟縣黜姦胥恤貧弱邑多山谷大雨時行壞民廬舍復築堤捍之更闢田數百餘畝程敏政文獻志彭澤字濟物長沙人𢎞治中守徽州葺學宫新紫陽書院課諸生拔其尤者廪給之徽州府志何歆字子敬博羅人由御史出守徽州郡數火災歆下令郡中五家為墻里邑相效家治崇墉自後六七十年無火災災輒易滅程敏政文獻志留志淑號朋山晉江人正德中由杭州守改徽郡六邑晏然蘇郡飛派白糧力為懇免杭人請於朝願還其守奏可復治杭徽民立祠祀之徽州府志鄭玉字于成莆田人嘉靖間知徽州府嵗飢引諸生問閭閻疾苦多方賑恤時皇木擾民為奏免之徽州府志王繼禮號節齋文縣人嘉靖壬辰補徽州守性亷直郡無墨吏會朝廷遣真人有事齊雲山中官數輩供億百出父老皆恐繼禮曰是無與民事有太守在願以身當之中官不得逞四境蝗起虔禱於神一夕悉飛去徽州府志陶承學會稽人嘉靖中守徽州設爨具於廳事前兩造刻期至攜米自炊曲直立判去民有半升賢太守之謡徽州府志高節永清人嘉靖中知歙縣時以部派有所徴索民將上控節助資遣之後得免嵗額徴完報上官每後他縣曰不如是人將謂歙民富征派日滋民重囷矣歙縣志劉廷梅字與和南昌人嘉靖中知歙縣首禁訟師民有訟輒諭以情理人皆感泣尋徴為主事以犢車載母敝衣羸馬從之父老奉壺漿遮道百里不絶歙縣志宋國華奉新人嘉靖間知休寧縣甫蒞任決疑獄以十數釐清賦役視前減三之一休寧縣志尤烈字子偉晉人嘉靖間知祁門縣常齎錢酒出郊外勞力農而鞭其蕪穢者時旁郡飛坐白糧鄰邑擬任之烈獨毅然脫冠以爭事遂寢又清軍使者多斃人杖下行部至祁烈委曲調護全活甚衆祁門縣志屠存仁知黟縣政簡刑清去官惟敝衣兩篋黟縣志杜銓鄞縣人嘉靖中知黟縣冬月無炭令家人暴簷暉有餽一魚者却而責之黟縣志張濤字元裕黃陂人萬厯中以科臣放歸起知歙縣始至大旱既復苦雨濤散賑請以贖鍰令富人買米平糶又放昔人以興作救荒乃作河西堤葺祠宇建塔霞山民多食於官飢不為害以遷去民肖像祀霞山歙縣志萬國欽字二愚新建人萬歷十一年知婺源縣始甃通衢以石嵗飢傾儲為賑又諭富民平糶出粟者旌私閉者罰暇即進諸生課藝手定甲乙文體翕然一變擢御史婺源縣志洪應衡知徽州府下車亷姦胥數人置之法一郡肅然時璫案株連戕善類應衡曰吾不能殺人以媚人悉報罷後乞休去徽州府志朱大雅字正之桐鄉人天啓乙丑知祁門縣務以禮教導民縣有山出土每嵗江右陶人買為瓷值二千金例歸令大雅則以給工治稠木嶺險道六十里顔市鎮民變太守擁兵閉城檄屬令大雅至一言而解逆璫建祠力拒之守怵以利害不少懾遷大理評事去之日行橐蕭然祁門縣志陸錫明平湖人知徽州府民貧賦缺錫明多方調劑為前人完積逋三萬常語僚佐曰守官如守身身失而得官如衾影何徽州府志金蘭字谷生會稽人天啓中知婺源縣諸生貧者置田贍之修亷惠倉以備旱潦婺源縣志戴自成漢陽人知徽州府時皇木官銅波害無辜自成力請省豁常謁直指於姑孰值建陽軍變殺姦胥脅寧郡丞赴教場將釁鼓自成單騎冒白刃抗聲諭以逆順自辰及未衆呼青天亂始定丞乃獲免徽州府志翟敬字行簡猗氏人以檢討謫知休寧縣善察疑獄庭無寃滯民舍火敬向火再拜風反火滅邑治門廡鼓樓三思橋皆所創建休寧縣志唐良懿吉安人崇時知徽州府正已率屬嵗荒多方賑恤全活數萬時集諸生講學天都書院今即其堂祠之徽州府志溫璜字介石烏程人崇禎末授徽州推官訓民兵為保障計南都覆守令皆遁璜盡攝其印以守知事不可為先刃其妻女遂自剄復蘇引手抉其創而死徽州府志何起鳳南充人崇時以賢良方正授休寧縣丞善發姦伏鄰邑疑獄皆求訊嵗大旱起鳳與城隍神并繫三晝夜乃大雨休寧縣志國朝張學聖奉天人順治二年知徽州府時郡初定民多流徙學聖招徠撫綏四民復業與徽寧道張文衡總鎮張天祿加意輯兵愛民後俱遷秩去時有挽不住三張弓之謠舊通志張維光廣寧人順治中為黟縣令時邑有逆僕聚衆為亂大姓竄匿維光至佯不問密請上憲發兵擒其渠魁戮之并勦除餘黨百餘人民得安堵郭四維號帝京猗氏人順治四年授績溪令邑姦民每借命展轉扳害四維知其弊痛懲抑之有誣告者必反坐且諄諄勸諭民俗一變竇士範字方海蒲城人順治八年以進士為黟縣令為政務持大體姦胥縮手豪猾斂迹清賦稅興學校復建挹秀橋於石山民利濟焉舊通志來承祉號駢茀高陵人順治十年授休寧縣丞性亷介署績溪篆盡除陋例不受民間一絲一粟鞫訟好語􅍁曲若家人父子去之日送者如市李之韡號郁和銅梁人順治十五年知績溪縣發姦摘伏胥吏畏若神明海寇告警百計撫輯民咸安堵去之日止行囊三肩張行健字天行海鹽人康熙十年授祁門良禾司巡檢甲寅逆藩兵逼城城陷都司臧世龍死之行健被執不屈亦遇害事聞贈世龍遊擊將軍行健金山衛經歷士民立祠演武亭東并祀之廖騰煃字占五將樂人康熙二十八年知休寧縣遇負氣輕生凡以服毒自經投河來控者即勒令埋葬勿得株纍民皆懲忿自愛又俗錮婢不嫁悉禁絶之編審黃册陋規苛派數千金悉申請勒石永禁擢御史邑人祀之海陽書院寧國府漢何比干字少卿汝隂人為丹陽都尉獄無寃囚後漢書何敞傳注何氏家傳李忠字仲都黃人建武六年為丹陽太守時海濵江淮多擁兵據土忠到郡招懷降附其不服者誅之旬月皆平乃起學校習禮容春秋鄉飲選用明經郡中向慕之墾田增多流民占著者五萬餘口三公奏課為天下第一後漢書本傳張馴字子俊定陶人為丹陽太守有惠政後遷大司農後漢書儒林傳三國諸葛恪字元遜琅琊人嘉禾三年領丹陽太守時山賊深逺莫能盡擒恪移書長吏令各保疆界不與交鋒候其稼熟縱兵芟刈使無遺種於是山賊飢窮漸出降得兵數萬吳志本傳晉鍾雅字彥胄潁川人為宣城內史錢鳳作逆率衆屯清弋時廣德人周玘攻雅雅退據涇縣收合士庶斬之鳳平拜左丞晉書本傳陶汪丹陽人咸康中宣城內史汪有幹略招隱逸廣學舍士民嚮學者並辟為掾吏百姓歌之曰人當勤學得主簿誰復為之陶明府南畿志南北朝齊謝朓字玄暉陽夏人明帝時為宣城太守每高齋視事吟嘯自若而未嘗以玩替政南畿志梁王志字次道琅琊人宋孝武末為宣城內史郡民張倪吳慶爭田經年不決志到官父老謂曰王府君有惠政吾鄉里有如是爭耶倪慶相攜謝罪所訟遂為間田梁書本傳何逺字義方郯人宣城太守郡經寇逺盡心綏理途巷市里城隍廄庫所過若營家焉秩奉並無所取每嵗暮擇民尤貧者免其租調民為立祠祀焉梁書本傳唐張路斯景隆中宣城令墾土田通水利至今城北有張路斯田南畿志裴耀卿字渙之絳州人開元中刺宣州首務教化率父老行禮奏樂歌白華由庚等篇明孝子養親之義聞者為之感泣南畿志班景倩開元中宣州刺史有風力恤疾苦除貪暴踰年黜贓吏以百計南畿志竹承構開元中宜州刺史戢姦黜暴與班景倩等時有班竹之謠南畿志裴敦復開元中刺宣州政務大體不事煩苛當時稱為良吏南畿志李孝儞天寶中由太平令徙涇政清而簡不矯飾干譽士民懷之卒于涇子孫家焉廣德盜起頻陷城邑入涇獨不忍壞其廬南畿志崔陵字德長大厯中令南陵性介潔疾賄如讐吏籍民田糧失實賦多逋陵召父老言狀為核而正之積逋以完南畿志范傳真順陽人元和中令寧國韋瓘稱其肅以檢姦儉以約身和以納民敏以應務物不夭落民得休泰攝南陵復修大農陂民賴其利南畿志宋賈黃中開寶中知宜州嵗祲出俸造糜所全活以千數乂立弭盜法姦宄屏息宋史本傳李堅知宣城縣水泉委匯暑雨流潦輒傷禾稼堅峻為之防嵗以有秋南畿志吕誨字獻可開封人慶厯中為旌德簿愛民如子而治姦暴則嚴後入朝以直諫顯宋史本傳劉安節字原成溫州人元豐中知宣州為政有程式不事刑威人自不敢犯猾胥每相戒曰神可欺公不可欺州大水民苦疾疫安節載醫藥拯撫以勞卒於官南畿志練毖延平人元祐中知旌德政尚簡易興學奬士邑子弟如汪澥吕鏜皆其造就雅有清操人飲酒清者輒稱練長官酒嘗建北渡橋亦以練公名之南畿志李光字泰發上虞人建炎三年車駕移建康以光知宣州宣邇行都光乃繕城隍立保伍選武健得甲士萬餘分戍險要會劇盜戚方圍宣光百計守禦嘗置匕首於枕匣約家人曰城卒不可保我必死汝輩亦宜自殺閲二十八日賊退城得全宋史本傳張果四川人建炎中知宣州宣州大水城郭將沒果抱民籍入水死水勢驟減郡人求其尸禮葬之祠於城北南畿志李椿字夀翁洺州人紹興中寧國軍節度推官治豪民偽券還陳氏田吏才精強人稱之宋史本傳趙愷乾道中判寧國究心民事嘗築墟堤之隤圮者又請增士人貢額帝手詔嘉奬宋史宗室傳郭嶤字高叔淳熙中知南陵縣政尚慈恕嘗除工山坑冶之患修復堰陂以資灌溉至今賴焉南畿志李延忠字居厚臨安人開禧中知旌德縣創置學田八十餘畝捐縣市諸鄉地稅錢九千餘緡膳學宫弟子建縣東石橋及亭舍十餘楹行者便之旌德縣志王栐字叔永無為人嘉定中知涇縣初縣治多水患栐遷建於賞溪橋之南村民奠厥居修廢舉墜良吏稱最涇縣志杜範字成之黃巖人嘉熙三年知寧國府適大旱以便宜發常平粟初倉庫多空未幾米十餘萬斛錢亦數萬悉以代輸下户賦兩淮飢民多剽掠其首張世顯尤勇悍擁衆三千抵城下範遣人犒之令勿擾以俟處分世顯謀窺城範以計擒斬之宋史本傳王遂字去非敷陽人淳祐元年出守寧國除積弊定斗斛置義役奏罷蕪廢逃亡田稅嘗詣學宫訓勵諸生及載酒出郊慰勞農人羣頌之曰作民父母後王前杜南畿志魏把字南夫夀春人為涇令罷無名科費太平繁昌二縣獲盜宰尉希功賞日加鍛鍊因誣引涇民五十三家把聞馳檄取審悉縱諸被誣者宋史本傳趙與䅯德祐元年知寧國縣元兵至與䅯率衆與戰死之吏楊義忠亦戰死南畿志元劉性字粹衷廬陵人至元初為旌德尹亷明剛果修學剔弊年榖屢豐虎不入境南畿志施正大涇縣人至元間丞相巴延下江南辟知本縣初縣治在水西時苦漂蕩正大始徙于水東至今利賴又學舍鄰大安寺為僧侵據正大與教諭賀桂孫請於部使者復之涇縣志王貞字伯善東魯人元貞初為旌德尹慈惠有為凡學宫縣廨壇廟橋道葺治一新旌德縣志吳師道字正傳蘭溪人元統中寧國路録事嵗大旱師道勸大家得粟三萬餘石又請于朝得粟四萬石鈔三萬八千錠有竒以充賑所存活三十餘萬人元史儒學傳吕良佐字唐臣為涇縣尹亷幹慈仁治民以信後朝廷延訪耆舊良佐與焉南畿志蘇濟字汝舟益都人至正初為涇縣尹浚渠均賦修學宫鑄祭器復浮屠氏侵田以餼諸生百姓歌曰四民藝業通縣官有蘇公又曰三載民無憂賴有蘇汝舟趙孟俯撰德政記南畿志劉耕孫字存吾茶陵人至正十五年為寧國路推官會長鎗賊鎖南班等攻寧國耕孫日署府事夜督城守城陷力戰而死元史忠義傳明陳灌字子將廬陵人洪武初知寧國府首詢民隱延禮師儒倉吏為姦灌刻期行視諸廪吏得先期實廪而弊革旱潦洊至灌增築墟岸為斗門以時蓄泄又作户帖定版籍郡民稱便後詔以其法行天下南畿志王文質六安州人明初知宣城時兵革初定文質撫綏招徠教士勸農民始安集乃建縣治徙縣學於泰和門內宣城縣志栁世榮洪武初知太平縣首務清理田糧黃山峭壁田不可耕者申免稅糧一千五百餘石太平縣志梁德逺洪武中知太平縣蕪田逋稅悉折收輕齎以恤其困民肖像祀之南畿志宋獻棗強人永樂時知寧郡庠校祀典咸所釐整居官九年門無私謁寧國府志舒謨樂平人宣德中知旌德縣慈惠亷敏行政宜民後擢御史旌德縣志袁旭字廷輔江西樂安人正統初知寧國府改建府學壯麗甲諸郡創宛溪二石橋雖洊興大役民不知擾詔舉守令治狀卓異者行宴賚凡十人旭居第二後坐蜚語卒於獄郡人祀之濟川橋左寧國府志陳雅晉江人正統中為宣城丞嘗攝縣事遇旱虔禱荷校自責已果大雨嵗賴以稔南畿志沈性字士彝會稽人天順中知寧國府裁冗費省繁科姑熟有重役宣城嵗往協濟積為民病性奏改輸費免役一邑稱便南畿志尹清字周潔富順人成化中知旌德縣撡持亷介平易近民秩滿士民泣送之旌德縣志王濬字文深河南人成化十年以御史謫涇縣丞鋤強植弱均賦役通錢法學校壇廨橋梁多所修建涇縣志薑綰字玉卿弋陽人𢎞治初以御史謫遷寧國同知杜私謁抑豪強聽訟明允鄰境民訟不決輒白當路願屬薑郡丞由是委任叢沓所至咸服諺曰寧都司馬薑老愈辣廣輿記顔祿夀字天庇巴陵人𢎞治中為寧國通判有持百金囑左右置帷中斥不受暇即荷鋤治圃一室蕭然寧國府志樂護字鳴音臨川人𢎞治中知宣城縣亷明有才飢民聚黨肆劫護單騎撫諭衆咸感泣因計口以賑入覲遇盜發笥止銀四十兩盜曰久聞宣城樂青天乃汝耶還之而去宣城縣志李鸞字天瑞固安人𢎞治中由御史謫知涇縣建尊經閣置義冢造浮艘諸所繕舉甚衆涇縣志張瀚字克容博平人𢎞治中知太平縣明敏清勤積榖備賑興學育才治績甚多太平縣志李文字載道嶧縣人𢎞治中為宣城主簿初邑文廟以附府輟祀文始行春秋釋菜禮因著為令捐俸創雙溪石梁至鬻其家騾車以足之橋成宣人德之名李公橋南畿志胡東臯字汝登餘姚人正德中知寧國府有才略會大造版籍更定里甲搜剔姦弊田賦一清修築墟堰曲為擘畫又嘗躬歷屬邑民有訟輒就聽之寧國府志及宦字士顯交河人正德間由給事中出為寧國知府質直有清撡高淳豪民以養馬援宣涇諸邑協助撫臣將如議宦力爭得免當宦爭馬政時其父適從北來持蓋躡屩止署外呼宦語曰汝幸毋得罪百姓異日可相見也飯于廨後旋挾蓋躡屩而去其時已拜給諫封矣蓋其父子清厲如此寧國府志蕭山荆州人正德中丞宣城用亷直忤當路罷去不能具行李時編修邵銑為推官贈以詩有去馬人爭挽歸裝月共寒之句宣城縣志賈啓字啓之黃岡人正德中知涇縣為政嚴明事至即決邑雖煩劇而公庭閴寂民有官清吏廢之謠涇縣志王廷相字子衡儀封人正德中以庶吉士謫知寧國縣器度𢎞闊以文學飭吏治期月間百廢具舉寧國縣志劉起宗巴縣人嘉靖中知寧國府負才強敏嘗檄諸屬邑核實田數履畝丈量官民均賦創涇縣水西精舍置田膳多士聘名賢講明正學一時人士蒸蒸嚮慕寧國府志方逢時字行之嘉魚人嘉靖中知寧國府景王之國所過陵轢守宰多亡匿逢時獨往部署所需皆立辦又面奏諸璫驕橫狀王為引罪治之江上諸郡藉是得無擾大盜馬黨等越獄禱于神逸盜果踧踖待縛數年間外户不閉寧國府志李默字時言甌寧人嘉靖初以吏部郎謫判寧國亷峭不阿議減名田勸米及慎征派重建靖難死節尚書陳公祠纂修郡志矜嚴有體寧國府志雷禮字必進豐城人嘉靖初為寧國推官讞獄明慎涇有豪民吳榮四與華某格鬬而華死榮四急捶殺其僕舁于華所以當之無何華蘇榮四更訴華殺其僕論死禮亷其實坐榮四罪華得釋寧國府志周奎字象賢萬安人嘉靖中知宣城縣亷儉慈愛嵗大飢發廪出帑推士夫之忠信者行各里散給民不入市並得全活宣城縣志楊九韶餘姚人嘉靖癸丑知南陵築墟一十五處瀦泄有法至今利賴邑苦養馬九韶奏蠲七十匹民困漸蘇南陵縣志周詩字汝學錢塘人嘉靖丁巳知南陵縣嵗大水奏請減逋負數千又請豁種馬牧害少息清核姦民隱田一千有竒田賦以均南陵縣志郜永春字子元長垣人嘉靖癸亥知南陵縣創建縣城徙建學宫核田畝清賦役民頌再造南陵縣志林文瓊江山人嘉靖中南陵丞不攜妻孥俸錢每贍貧民暇即與士人講明正學民有貌古心亦古節苦身更苦之頌南陵縣志胡永成字思貞安福人嘉靖中知涇縣敏斷有為奬勵英俊清里籍袪蠧弊積粟萬餘石嵗祲賴以賑給涇縣志陳守仁號我山德化人嘉靖中知涇縣有清撡崇尚風教著諭民集訓申述古禮以艱去賻贐悉不受鬻衣以行涇縣志鍾紐號東岑永豐人嘉靖中知涇縣政崇寬簡清節始終如一嘗捐俸甃路十里造下坊渡浮橋以調去民有遺思涇縣志彭明甫字則誠萬載人嘉靖間為寧國丞約已愛人去之日僅敝衣數襲寧國縣志張鳳翀寧州人嘉靖間旌德知縣時高淳奏派養馬旌民洶懼翀抗言山嶺非芻牧之場囚服詣軍門力辨得免以才調丹陽輕裝就道旌德縣志甘澧蘄州人嘉靖十三年知旌德縣時條編未行灃裁省厨傳寬里甲諸費有中貴過縣索供帳橫甚澧遣吏致常廪吏不敢往澧乃易吏服往見中貴怒曰令安在答曰邑如懸磬不足以犒從者令遁矣中貴度無所得乘傳去旌德縣志王皥安福人嘉靖中寧國訓導建鳳山書院進諸生討論聖學寒暑不輟嘗輯四禮纂要刋行寧國府志劉世亨字以進臨川人嘉靖四十五年知涇縣為政勤化導嚴法紀省費均徭置學田以贍士以優異徴士民泣送至采石者數千人涇縣志王嘉賔字光國滕縣人隆慶中知寧國府刻文天祥勸農辭誡諭勤懇涇妖民董代聚衆將倡亂檄兵捕治先是東溪以舟濟時苦漂溺為建石橋四十丈民德之稱惠濟橋寧國府志薑竒方字孟博監利人隆慶五年知宣城縣周悉民隱建豫備常平二倉儲榖待賑創水陽諸厫斂粟待兊至今軍民便焉宣城縣志蕭良譽字以孚漢陽人萬厯間知寧國府勸民力田敦孝弟嘗課諸生首識湯賔尹必冠南宫卒如其言寧國府志金勵字霜鐔西華人萬厯間知寧國府振風紀明正學奬拔寒畯兼置田膳之嵗災力請蠲貸遣糴楚豫平糶民不告飢寧國府志黃尊素字真長餘姚人萬厯中寧國推官嚴明執法豪貴斂手公餘則引生徒講課士類興起以治行擢御史廣輿記陳公相字子顯漳浦人萬厯中知宣城坦易剛直吏民畏服嵗旱多方拯恤建議改折漕粟二萬石以去就爭卒報可建待學書院置養士田文治大興宣城縣志盧維屏字建台欣州人萬厯中令宣城清介有風力時里役之弊私費倍公賦維屏置匭庭中細民得自納煩費省築新稔石陂免新河莊竹木雜稅宣城縣志張堯文字復吾新淦人萬厯十二年知涇縣寬和簡易而發姦摘伏如神復水西書院祀田嵗連祲經營賑貸全活不下萬家涇縣志張時徹南城人萬厯中知旌德革耗羡勸農桑時中使以開採至供億不資時徹悉從官辦絶不擾民會大計當課最鄭司理以那解錢糧難之旌民一夜代輸五百金其得民如此旌德縣志鄧啓隆安福人天啓初為寧國推官清苦自勵嘗他出家人誤受一紳士香荈啓隆歸追而還之嚴寒所服氈四緣皆蟲嚙士民嘆服寧國府志宗敦一字淩霄四川人崇禎五年知旌德縣政崇簡易禮士愛民大盜吕大祚等剽掠行旅悉擒治之旌德縣志高承埏浙江人崇禎時知涇縣沈毅有威望定踐更均郵遞革加耗絶餽遺訟簡民安涇人歌曰琴溪水清且芬旵山阜青入雲誰其比高使君涇縣志國朝秦宗堯字明宇奉天人順治九年授寧國知府性亷儉嘗質衣自給米薪蔬腐人皆得稽其數郡舊貢黃連非寧産也民慮不供已奏折直三之二順治十三年詔許知府得言地方利病宗堯同巡按御史鍾有鳴交疏請改得全免舊通志劉九禮陜西人康熙十年任寧國營參將軍令嚴明約束士卒無得擾害有一卒暴取民薪立縛而置之法甲寅饒賊掠近境郡邑震動九禮防禦有方以靜鎮之民恃以無恐擢京口副將百姓遮道拜送馬不得前舊通志傅大業字用滋建昌人康熙間授太平知縣值嵗旱大業捐米為倡又親詣邑大姓委曲勸輸設厰發粟編名立竿以次給發萬人無一遺亦無一譁者大盜某妄扳鄰家未字女為媳大業屢折其誣盜辭卒不易憲檄嚴駁執不少移後竟得釋馬光字幼實鄒平人康熙十三年知寧國縣邑素僻陋光下車建尊經閣立西津書院諭民以禮教俗為一變時徽浙兩界伏莽跳梁練鄉勇嚴偵候迄不敢犯邑中有無賴子屢作不靖光擒其渠魁置之法民以安堵嘗興水利較權量至今有馬公塘市肆間以馬公斗為準治邑六年以卓異薦擢御史王鄰字欽四曲周人康熙十六年知太平縣時禁革里排他邑以錢賦竒零夫馬紛錯或仍問之里排鄰獨奉行禁革如例聽訟則令原告自持一牒投被訴之家兩造至庭即片言決遣五載不遣一役至民家絶苞苴杜請託以卓異遷部曹陳主策字世持河南靈寶人康熙二十年知寧國縣首禁革糧里行一條編法以便輸納折獄明允負者亦心服遷理藩院判江南通志卷一百十六
