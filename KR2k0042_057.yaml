body:
  text: 江南通志卷五十八河渠志運河一古者粟米之賦近出畿甸而川陸貢道遠逹荒服其後鄭白之渠遠引淮海之粟武牢之倉就納江南之米大率轉輸之利莫如水漕陸運之費幾於百倍然則穿漕渠置堰閘可不究悉歟今江南之地自禹時貢道北則浮淮泗以逹河南則沿江海以逹淮泗至吳開𨝍溝通江淮隋益廣之遂為轉漕長利矣然宋熙寧間復以避淮險開復河元江淮歲漕阡一令海運明初猶海運河運並行當時熟計利害豈得云淮險於海抑亦黃河南徙之後淮水入海之故道為濁流所淤是以南常患於奔衝北常虞於淺澀遂為漕梗歟然宋元諸臣言漕事者不及河患前明嘉靖初河益徙而南不得不議治河濟運而河之為漕梗者亦屢矣我朝闢清口開中河資黃之利復避黃之害而於南北運河灌輸扞護之宜雖極於枝洔澗渠經途區别無不審黃淮江海及諸湖河之全局而治之盡人之功實順水自然之性所以安瀾告慶飛挽應時閭閻之間不復知有雇載賃馱皸瘃重趼之苦此由聖謨睿畫超越萬古實我國家之本計在焉天庾歲入數百萬石祿廪所出亦動盈萬計度支取給悉東南惟正之供舳艫銜尾北向泝流自中河入泇河過濟浮衛直抵天津實惟山東河南二省運道在江南之北其餘漕運涉江者會瓜儀四閘涉淮者會清口是江南為運道綱絡而瓜儀清口尤江南運道門户也謹按江南運河一自浙江之嘉興府王江涇北入江南蘇州府吳江縣境凡三十里徑平望鎮曰南塘河一自湖州府南潯鎮而東入鶯脰湖凡五十里出平望與南塘河合曰西塘河二河合而西北凡四十里徑吳江縣城東又引而西北曰北塘河亦曰古塘河凡二十里入夾浦為長洲縣境又三十里徑府城西閶門崑山新陽二縣漕運自縣西二十里至巴城巡司十里至唯亭又三十里至府城婁門又十里至閶門松江府華亭奉賢婁金山上海南匯青浦福泉八縣漕運俱經青浦縣北大盈浦出吳淞江入婁江繞崑山縣南而太倉州鎮洋縣漕運自東四十里來會又西七十里並逹於閶門又西北三十里徑滸墅關又十五里徑望亭常熟昭文二縣漕運自縣五十里至吳塔二十里為長洲縣之冶長涇又十里為漕湖又十里至望亭望亭北為常州府無錫縣境又北二十里曰新安又北三十里徑縣城南引而西北十里至高橋江陰縣漕運自縣南十里經蔡涇閘又南二十七里至青陽鎮又南三十里為五㵼河出高橋合無錫運河又北二十里徑洛社又北二十里徑橫林為武進縣境又引而東北十里徑戚墅堰十里徑丁堰二十里逹常州府城宜興縣漕運自縣北三里橋五十里至鍾溪過五洞橋入府城南運河鎮江府溧陽縣漕運由氿湖繞宜興縣之荆溪出西蠡河來會又北三十三里為奔牛閘又引而東北三十里徑呂城為鎮江府丹陽縣境又稍迤西北二十里徑陵口十三里至七里橋金壇縣運河自荆城港出珥瀆河至七里橋合又北十里徑縣城南四十里徑新豐又二十七里徑丹徒鎮又引而西北逹鎮江府城又稍迤東北五里出京口閘涉大江入瓜洲口為揚州府江都縣境十五里徑八里鋪又十里為三汊河口有揚子橋其西為瓜儀運河瓜儀運河為江安等諸府州縣及湖廣江西二省通江入運總會之要路江之南岸江寧府上元江寧二縣漕運自石城橋三十里至觀音山渡江而北至六合縣瓜步鎮會江浦六合運船自江北開行十里至礬山三十五里至青山而句容運船自龍潭渡江會於揚州府儀徵縣治又東七十二里出三汊河口太平府漕運當塗縣北出采石河二十五里入江蕪湖縣西七里入江繁昌縣出瀂港入江五十里至東梁山又四十里至采石鎮又五十里至江寧府之江寧鎮寧國府宣城寧國南陵涇旌德太平六縣漕運並會於府北灣沚河北出揚清口合黃池下流出水陽河入江江口即太平府之東梁山池州府漕運貴池縣自廣濟河入江建德縣自堯城渡經東流縣入江青陽縣自大通鎮入江銅陵縣西距江一里而近自東流縣西江行一百三十五里至池口驛又八十五里至銅陵縣又六十里至太平府繁昌縣之荻港驛江之北岸廬州府合肥舒城巢三縣漕運並是巢湖一水貫注經運漕鎮出和州之裕溪口入江廬江縣無為州由黃洛河經運漕出裕溪口又二十里至太平府西梁山與東梁山對峙安慶府漕運懷寧縣瀕江潛山太湖二縣並自北至府有水次倉在懷寧境桐城縣自樅陽河入江望江縣在府西南距江才十五里宿松縣自西經泊湖出望江縣之吉水鎮入江自望江江口東北行九十里至府同安驛十里至桑園二十里趨南岸為池州府貴池縣之黃湓又七十里至池口驛已上諸府州縣江運漕船隨地遠近遞續交會俱由龍江關北二十里渡江北至瓜步又東北六十里至北新河入儀徵四閘逹三汊河與蘇松常鎮太五府州漕船並會自揚子橋迤西折而東北十五里逹揚州府城泰州漕運自州治六十里至宜林五十里至府城東門又北十五里徑茱萸灣又北三十里徑邵伯埭又北三十里過露筋廟又北三十里迤西而北為高郵州泗州天長縣漕運自石梁河出邵伯湖入通湖閘口東直高郵城而興化縣漕運自西出口直高郵州之北二十里又引而東北二十五里徑清水潭又北十五里為六漫閘又引而東北二十里徑界首驛又東北二十里徑汜光湖口人稍迤東北折而西北凡四十五里徑寶應縣又折而西北二十里為黃浦雙閘入淮安府山陽縣境又西北十里為涇河閘十里為平河橋又折而東北五十里徑楊家廟十里逹淮安府鹽城縣漕運自澗河徑淮安府北出口又折而西北稍迤東北凡十五里為版閘淮關在焉又迤東而北十五里為清江浦又西北三十里為天妃閘折而東出為清口之對岸是為運口淮之北岸淮安府之桃源縣徐州府之銅山蕭碭山三縣及邳州之睢寧縣鳯陽府之懷遠虹靈璧三縣及宿州潁州府之阜陽縣潁上縣亳州蒙城縣太和縣直隸泗州之五河縣淮之南岸鳳陽府之定遠壽州鳯臺直隸六安州併英山霍山二縣潁州府之霍邱直隸泗州及盱貽縣已上各州縣漕運俱會入淮出洪澤湖由清河縣帥家莊入黃河運道黃河自西橫絶而東淮自西南挾七十二溪之水奮湧出清口匯河直注大海勢若建瓴糧運越甘羅城順流過惠濟祠折而西北入楊莊運口西為御示閘又西為鹽河閘海州併贛榆縣運河即鹽河也徑清河縣北又西北徑三坌凡十七里入桃源縣境是為下中河五里徑來安集五里徑衆興集八里徑悅來集又西北入宿遷縣境為上中河又三里徑仰化集海州之沭陽縣漕運東由碩項湖西經鹽河南出仰化集又四十里徑宋家莊又北而西四十里徑宿遷縣北西寧橋又西迤南三十里為中河口南為黃河北為駱馬湖故俗謂之十字河也又西北四十里為窑灣竹閘入邳州境又北五里為馬莊閘十五里徑貓兒窩二十五里徑徐塘口邳州漕運自東來會又北三十里為泇口又北二十五里為汶河口南越梁王城北接臺莊入山東省境沛縣漕運自劉昌莊四十八里至山東兖州府魚臺縣之王家口有夏鎮楊莊珠梅三閘是為泇河各府州縣有白糧附運折色抵餉之不同並詳漕運夏浮于淮泗達于河徐州貢道沿于江海達于淮泗揚州貢道書蔡傳沿江入海自海入淮泗禹時江淮未通故沿於海周吳城𨝍溝通江淮左傳注於𨝍江築城穿溝東北通射陽湖西北至宋口宋一作末入淮通糧道也今廣陵韓江是禹貢錐指吳越春秋吳將伐齊自廣陵闕江通淮曰渠水漢志江都縣有渠水首受江北至射陽入湖是也又名中瀆水水經注中瀆水首受江于江都縣縣城臨江昔吳將伐齊北霸中國自廣陵城東南築𨝍城城下掘深溝謂之韓江亦曰𨝍溟溝自廣陵出山陽白馬湖徑山陽城西又東謂之山陽浦又東入淮謂之山陽口是也漢吳王濞開𨝍溝自揚州茱萸灣通海陵倉及如臯蟠溪三國魏正始四年秋九月大興屯守廣開淮陽百尺二渠又修諸陂于潁之南北萬餘頃自是淮北倉庾相望壽陽至于京師農官屯兵連屬焉隋開皇七年四月于揚州開山陽瀆以通運漕大業元年發河南道諸州郡兵夫五十餘萬開通濟渠自河起滎澤入淮千餘里又發淮南諸州丁夫十餘萬開𨝍溝自山陽至揚子江三百餘里水面闊四十步曽子固集滎陽之西有廣武二城汴水自二城間小澗中東流而出濟水至此乃絶桓溫將通之而不果者晉太和之中也劉裕浚之始有湍流奔注以漕運者義熙之間也皇甫誼發河南丁夫百萬開之起滎陽入淮千有餘里更名之曰通濟渠者隋大業之初也後世因其利焉六年十二月敕開江南河自亰口至餘杭郡八百餘里水面闊十餘丈唐開元二十二年齊浣遷潤州刺史潤州北界隔大江至瓜步尾紆匯六十里船繞瓜步多為風濤所漂損浣乃移漕路於京口塘下直渡江二十里又開伊婁河二十五里即達揚子縣自是免漂損之災歲減腳錢數十萬數年復為汴州刺史淮汴水運路自虹縣至臨淮一百五十里水流迅急舊用牛曳竹索上下流急難制乃奏自虹縣下開河三十餘里入於清河百餘里出清水乃開河至淮陰縣北岸入淮免淮流湍險之害唐書地理志宿州虹縣廣濟新渠齊浣開自虹至淮陰北十八里入淮以便漕運既成湍急不可行遂廢廣德元年劉晏分官吏主丹陽湖禁引溉自是漕河不涸貞元四年節度使杜亞自江都西循蜀岡之右引波趨城隅以通漕溉夾陂田唐書杜亞傳亞拜淮南節度使治漕渠引湖陂築防庸入之渠中以通大舟夾隄高卬田因得灌溉疏啓道衢徹壅通堙人皆悅賴元和三年李吉甫為淮南節度使築漕渠隄堰以防不足泄有餘名平津堰八年常州刺史孟簡開古孟瀆長四十一里唐書地理志武進縣有孟瀆引江水南注通漕溉田四千頃元和八年刺史孟簡因故渠開無錫縣有泰伯瀆東連蠡湖亦元和八年孟簡所開十一年十二月置淮潁水運使運揚子院米自淮陰泝流至壽州四百里入潁口又泝流至潁州沈丘界五百里寶厯二年王播復領鹽鐵轉運使時揚州城內官河水淺遇旱即滯漕船乃奏自城南閶門西七里港開河向東屈曲取禪智寺橋通舊官河開鑿稍深舟航易濟所開長一十九里其工役料度不破省錢當使方圓自備而漕運不阻後賴其利五代周顯德五年正月己丑世宗欲引戰艦自淮入江阻北神堰不得渡欲鑿楚州西北鸛水以通其道遣使行視還言地形不便計工甚多乃自往視之授以規畫發楚州民夫浚之旬日而成用工甚省巨艦數百艘皆達於江三月浚汴口導河流達於淮於是江淮舟楫始通此宋之漕運所由始也宋開寶間議征江南詔用京西轉運使李符之䇿發和州丁夫及鄉兵凡數萬人鑿橫江渠於厯陽令符督其役渠成以通漕運而軍用無闕雍熙中轉運使劉蟠議開沙河以避淮水之險未完而受代喬維嶽繼之開河自楚州至淮陰凡六十里舟行便之宋史喬維嶽傳喬維嶽為淮南轉運司淮河西流三十里曰山陽灣水勢湍悍運舟多罹覆溺維嶽規度開故沙河自末口至淮陰磨盤口凡四十里又建安北至淮澨五堰運舟所至十經上下其重載者皆卸糧而過舟時壞失糧綱卒緣此為姦潛有侵盜維嶽始命創二斗門於西河第三堰二門相距踰五十步覆以厦屋設縣門積水俟潮平乃泄之建橫橋岸上築土纍石以牢其址自是弊盡革而運舟往來無滯矣至道中王嗣宗為江浙荆湖發運使初漕運經泗州浮橋舟多覆壞嗣宗徙至城隅遂獲安濟景德三年七月汴水決南至亳州合浪宕渠東入於淮是年內侍趙守倫建議自京東分廣濟河由定陶至徐州入清河以達江湖漕路役既成遣使覆視以地有隆阜而水勢極淺雖置堰埭又厯吕梁灘磧之險非可漕運罷之時制置江淮等路並發運使李溥因高郵軍新開湖水散漫多風濤令漕舟東下者還過泗州因載石輸湖中積為長隄自是舟行無患天禧二年江淮發運使賈宗言諸路歲漕自真陽入淮汴厯堰者五糧載煩於剝卸民力罷於牽挽官私船艦由此速壞今議開揚州古河繚城南接運渠毁龍舟新興茱萸三堰鑿近堰漕路以均水勢歲省官費十數萬功利甚厚詔屯田郎中梁楚閣門祗侯李居中按視以為當然明年役既成而水注新河與二堰平漕船無阻公私大便四年開揚州運河天禧中知江陰軍崔立開橫河六十里通運漕天聖間張綸除江淮制置發運副使築漕河隄二百里於高郵北旁錮巨石為䃮以泄橫流夢溪筆談淮南漕渠築埭以蓄水不知始何時舊傳召伯埭謝公所為按李翔來南録唐時猶是流水不應謝公時已作此埭天聖中監真州排岸司右侍禁陶鑑始議復閘節水以省舟船過埭之勞是時工部郎中方仲荀文思使張綸為發運副使表行之始為真州閘歲省冗卒五百人雜費百二十五萬運舟舊法舟載米不過三百石閘成始為四百石船其後所載寖多官船至七百石私船受米八百餘囊囊二石自後北神召伯龍舟茱萸諸埭相次廢革至今為利嘉祐三年鍾離瑾為江淮制置發運使殿直王乙者請自揚州召伯埭東至瓜洲浚河百二十里以廢二埭詔瑾規度以工大不可就止置閘召伯埭旁是年鄭向為兩浙轉運副使疏潤州蒜山漕河抵於江是年徐的為淮南江浙荆湖制置發運副使奏通泰州海安如臯縣漕河詔未下的以便宜調兵夫浚治之出滯鹽三百萬計得錢八百萬緡遂為制是年李禹卿判蘇州築隄太湖八十里為渠益漕運又蓄水溉田千餘頃元豐二年浚淮南運河自召伯堰至儀徵十四節六年正月戊辰開龜山運河至二月乙未告成長五十七里闊十五丈深一丈五尺初發運使許元自淮陰開新河屬之洪澤避長淮之險凡四十九里久而淺澀熙寧四年皮公弼請復濬治起十一月壬寅盡明年正月丁酉而畢人便之至是發運使羅拯復欲自洪澤而上鑿龜山裏河以達於淮帝深然之會發運使蔣之奇入對建言上有清汴下有洪澤而風浪之險止百里淮邇歲溺公私之載不可計凡諸道轉輸涉湖行江已數千里而覆敗於此百里間良為可惜宜自龜山蛇浦下屬洪澤鑿左肋為復河取淮為源不置堰閘可免風濤覆溺之患帝遣都水監丞陳祐甫經度祐甫言往年田棐任淮南提刑嘗言開河之利其後淮陰至洪澤竟開新河獨洪澤以上未克興役今既不用閘蓄水惟隨淮面高下開深河底引淮通流形勢為便但工費浩大帝曰費雖大利亦溥矣祐甫曰異時淮中歲失百七十艘若捐數年所捐之費足濟此役帝曰損費尚小如人命何乃調夫十萬開治既成命之奇撰記石刻龜山後至建中靖國初之奇同知樞密院奏淮水浸淫衝刷隄岸漸成墊缺請下發運使及時修築自是歲以為常是年蔣之奇為江淮荆浙發運副使請鑿龜山左肋至洪澤為新河以避淮險自是無覆溺之患互見淮水元祐四年十二月京東轉運司言清河與江浙淮南諸路相通因徐州呂梁百步兩洪湍淺險惡多壞舟楫由是水手牛驢撁户盤剝人等邀阻百端商賈不行朝廷已委齊州通判滕希靖知常州晉陵縣趙竦度地勢穿鑿今若開修月河石隄上下置閘以時開閉通放舟船實為長利乞遣使監督興修從之是年知潤州林希奏復呂城堰置上下閘以時啓閉其後京口瓜洲奔牛皆置閘紹聖二年詔武進丹陽丹徒縣界沿河堤岸及石䃮石木溝並委令佐檢察修護勸誘食利人户修葺任滿稽其勤惰而賞罰之從工部之請也四年水部員外郎趙竦請濬十八里河令賈種民相度呂梁百步洪添移水磨詔發運并轉運司同視利害以聞紹聖中曾孝藴管幹發運司糶糴事建言揚之瓜洲潤之京口常之奔牛易堰為閘以便漕運商賈既成公私便之又提舉兩浙常平徙江淮荆湖發運泗州議開直河以避漲溢沙石之害孝藴以淮汴不相接不可成既而工役大集竟成之未幾河果塞蘇京令丹陽募民重浚練湖易置斗門十數元符元年正月知潤州王愈建言呂城閘常宜車水入澳灌注閘身以濟舟若舟沓至而力不給許量差牽駕兵卒併力為之監官任滿水無走泄者賞水未應而輒開閘者罰守二令佐常覺察之詔可是年二月詔蘇湖秀州凡開治運河港浦溝瀆修疉堤岸開置斗門水堰等許役開江兵卒是年三月甲寅工部言淮南開修楚州支家河導漣水與準通賜名通漣河是年王宗望為江淮發運使楚州沿淮至漣州風濤險舟多溺議者謂開支氏渠引水入運河歲久不決宗望始成之為公私利代吳安持為都水使者二年閏九月潤州京口常州奔牛澳閘畢工先是兩浙轉運判官曾孝藴獻澳閘利害因命孝藴提舉興修仍相度立啓閉日限之法是年吳居厚為江淮發運使疏支家河道通漕楚海之間賴其利召拜户部尚書崇寧二年十二月詔淮南開修遇明河自真州宣化鎮江口至泗州淮河口五年畢工大觀二年八月詔常潤歲旱河淺留滯運船監司督責濬治政和四年二月工部言前太平州判官盧宗原請開修自江州至真州古來河道堙塞者凡七處以成運河入浙西一百五十里可避一千六百里大江風濤之患又可就土興築自古江水浸沒膏腴田自三百頃至萬頃者凡九所計四萬二千餘頃其三百頃以下者又過之乞依宗原任太平州判官日已興政和墟田例召人户自備財力興修詔沈鏻等相度措置六年八月詔鎮江府傍臨大江無港澳以容舟楫三年間覆溺五百餘艘聞西有舊河可避風濤歲久堙廢宜令發運使濬治重和元年二月前發運副使桞廷俊言真揚楚泗高郵運河堤岸舊有斗門水閘等七十九座限則水勢常得其平比多損壞詔檢計修復宣和二年九月以真揚等州運河淺澀委陳亨伯措置三年春詔發運副使趙億以車畎水運河限三月中三十綱到京宦者李琮言真州乃外江綱運會集要口以運河淺澀故不能速發按南岸有泄水斗門八座去江不滿一里欲開斗門河身去江十丈築軟壩引江潮入河然後倍用人工車畎以助運水從之四月詔曰江淮漕運尚矣春秋時吳穿𨝍溝東北通射陽湖西北至末口漢吳王濞開𨝍溝通運海陵隋開𨝍溝自山陽至揚子入江雍熙中轉運使劉蟠以山陽灣迅急始開沙河以避險阻天禧中發運使賈宗始開揚州古河繚城南接運渠毁三堰以均水勢今運河歲淺澀當詢訪故道及今河形勢與陂塘瀦水之地講究措置悠久之利以濟不通可令發運使陳亨伯內侍談正條具措置以聞六月臣僚言比緣淮南運河水澀逾半歲禁綱舟篙工附載私物今河水增漲其令如舊初淮南連歲旱漕運不通揚州尤甚詔中使按視欲疏濬運河與江淮平會兩浙有方臘之亂內侍童貫為宣撫使談正為制置使貫欲海運陸輦正欲開一河自盱眙出宣化朝廷下發運使陳亨伯相度亨伯遣其屬向子諲視之子諲曰運河高江淮數丈自江至淮凡數百里人力難濬昔唐李吉甫廢閘置堰治陂塘泄有餘防不足漕運通流發運使曾孝藴嚴三日一啓之制復作歸水澳惜水如金比年行直逹之法走茶鹽之利且應奉權幸朝夕經由或啓或閉不暇歸水又頃毁朝宗閘自洪澤至召伯數百里不為之節故山陽上下不通欲救其弊宜於真州太子港作一壩以復懷子河故道於瓜洲河口作一壩以復龍舟堰於海陵河口作一壩以復茱萸待賢堰使諸塘水不為瓜洲真泰三河所分於牝神相近作一壩權閉滿浦閘復朝宗閘則上下無壅矣亨伯用其言是後滯舟皆通利云五年三月詔呂城至鎮江運河淺澀狹隘監司坐視無所施設兩浙專委王復淮南專委向子諲同發運使呂淙措置車水通濟舟運是月臣僚言鎮江府練湖與新塘地理相接八百餘頃湖水一寸益漕河一尺其來久矣今堤岸損缺不能貯水乞候農隙次第補葺詔本路漕臣並本州縣官詳度利害檢計工料互見水利六年九月從盧宗原請開池州車軸河口宋史河渠志盧宗原復言池州大江乃上流綱運所經其東岸皆暗石多至二十餘處西岸則沙洲廣二百餘里諺云拆船灣言舟至此必毁拆也今東岸有車軸河口沙地四百餘里若開通入社湖舟經平水徑池口可避二百里風濤拆船之險請措置開修從之七年九月丙子又詔宗原措置開濬江東古河自蕪湖由宣溪溧水至鎮江渡揚子趨淮汴免六百里江行之險建炎間吳中甫為江淮發運使自洪澤鑿渠六十里以避長淮漕運之險紹興七年兩浙轉運使向子諲增置練湖斗門石䃮附向子諲疏略鎮江府呂城夾岡形勢高仰因春夏不雨官漕艱勤尋遣官屬李澗詢究練湖本末始知此湖在唐永泰間已廢而復興今隄岸弛禁致有侵田冒決故湖水不能瀦蓄舟楫不通公私告病臣已令丹陽知縣朱穆等增置二斗門一石䃮及修補隄防盡復舊迹庶為永久之利十六年五月浚運河乾道六年淮東提舉徐子寅言淮東鹽課全仰河流通快近運河淺澀自揚州灣頭港口至鎮西山光寺前橋垜頭計四百八十五丈乞發五千餘卒開濬從之七年二月詔令淮南漕臣自洪澤至龜山淺澀之處如法開撩是年臣僚言丹陽練湖幅員四十里納長山諸水漕渠資之故古語云湖水寸渠水尺在唐之禁甚嚴盜決者罪比殺人本朝寖緩其禁以惠民然修築甚嚴春夏多雨之際瀦蓄盈滿雖秋無雨漕渠或淺但泄湖水一寸則為河水一尺矣後廢不治堤岸圮闕不能貯水強家因而專利耕以為田遂致淤澱歲月既久其害滋廣望責長吏濬治堙塞立為盜決侵耕之法著于令庶幾練湖漸復其舊民田獲灌溉之利漕渠無淺涸之患詔兩浙漕臣沈度專一措置修築互見水利淳熙五年以漕臣陳峴言於十月募工開濬無錫縣以西橫林天井及奔牛呂城一帶地高水淺之處以通漕舟浙西運河自臨安府北郭務至鎮江江口閘六百四十一里九年知常州章沖奏常州東北曰申港利港黃田港夏港五斗港其西曰竈子港孟瀆泰伯瀆烈塘江陰之東曰趙港白沙港石頭港陳港蔡港私港令節港皆古人開導以為溉田無窮之利者也今所在堙塞不能灌溉臣嘗講求其説抑欲不勞民不費財而漕渠旱不乾水不溢用力省而見功速可以為悠久之利者在州之西南曰白鶴溪自金壇縣洮湖而下今淺狹特七十餘里若用功濬治則漕渠一帶無乾涸之患其南曰西蠡湖自宜興太湖而下止開浚二十餘里若更令深遠則太湖水來漕渠一百七十餘里可免濬治之擾至若望亭堰閘置於隋之至德而徹於本朝之嘉祐至元祐七年復置未幾又毁之臣謂設此堰閘有三利焉陽羡諸瀆之水奔趨而下有以節之則當潦歲平江三邑必無下流淫溢之患一也自長洲至望亭一百三十五里運河亦有所節則沿河之田旱歲資以灌溉二也每歲冬春之交重綱及使命往來多苦淺涸今啓閉以時足通舟楫免車畎灌注之勞三也詔令相度開浚十四年揚州守臣熊飛言揚州運河惟藉瓜洲真州兩閘瀦積今河水走泄緣瓜洲上中二閘久不修治獨潮閘一座轉運提鹽及本州共行修整然迫近江潮水勢衝激易致損壞真州二閘亦復損漏令有司葺理上下二閘以防走泄從之紹熙五年從淮東提舉陳損之議築高郵寶應等處隄堰並斗門石䃮宋史河渠志淮東提舉陳損之言高郵楚州之間陂湖渺漫茭葑彌滿宜創立隄堰以為瀦泄庶幾水不至於泛溢旱不至於乾涸乞興築自揚州江都縣至楚州淮陰縣三百六十里又自高郵興化至鹽城縣二百四十里其隄岸傍開一新河以通舟船仍存舊隄以捍風浪栽栁十餘萬株數年後隄岸亦牢其木亦可備修補之用兼揚州墟鎮舊有隄閘乃泰州泄水之處其閘壞久亦於此創立斗門西引盱眙天長以東衆湖之水起自揚州江都經由髙郵及楚州寶應山陽北至淮陰西逹於淮又自高郵入興化東至鹽城而極於海又泰州海陵南至揚州泰興而徹於江共為石䃮十三斗門七乞以紹熙堰為名鑱諸堅石奏聞除直祕閣淮南轉運判官慶元五年兩浙轉運浙西提舉言以鎮江府守臣重修呂城兩閘畢再造一新閘以固隄防庶為便利從之嘉泰元年浚常鎮運河修閘堰宋史河渠志守臣李珏言州境北邊揚子大江南並太湖東連震澤西據滆湖而漕渠界乎其間漕渠兩傍曰白鶴溪西蠡河南戚氏北戚氏直湖州港通於二湖曰利浦孟瀆烈塘橫河五瀉諸港通於大江而中間各自為支溝斷汊曲繞參錯不以數計水利之源多於他郡而常苦易旱之患何哉臣嘗詢訪其故漕渠東起望亭西上吕城一百八十餘里形勢西高東下加以歲久淺淤自河岸至底其深不滿四五尺常年春雨連綿江湖泛漲之時河流忽盈驟減連歲雨澤愆闕江湖退縮渠形尤亢間雖得雨水無所受旋即走泄南入於湖北歸大江東徑注於吳江晴未旬日又復乾涸此其易旱一也至若兩傍諸港如白鶴溪西蠡河直湖烈塘五瀉堰日為沙土淤漲過潮高水泛之時尚可通行舟楫若值小汐久睛則俱不能通應自餘攴溝别港皆已堙塞故雖有江湖之浸不見其利此其易旱二也况漕渠一帶綱運於是經由使客於此往返每遇水澀綱運便阻一入冬月津送使客作壩車水科役百姓不堪其擾豈特溉田缺事而已望委轉運提舉常平官同本州相視漕渠並徹江湖之處如法浚治盡還昔人遺迹及於望亭修建上下二閘固護水源從之嘉定間臣僚言國家駐蹕錢塘綱運糧餉仰給諸道所繫不輕鎮江閘口河道淤塞不復通舟乞今漕臣等開撩從之汪綱知高郵軍以興化民田濱海昔范仲淹築堰以鄣潟鹵守毛澤民置石䃮函管以疏運河水勢歲久皆壞乃增修之部使者聞於朝增一秩陳居仁守鎮江治古海鮮界港為石䃮丹徒境上蓄泄以時以通漕運李庭芝主管兩淮制置司事至揚鑿河四十里入金沙餘慶場以省車運兼浚他運河放亭户負鹽二百餘萬亭民無車運之勞元至元二十一年二月辛巳浚揚州漕河二十六年正月議江南運米由江陰入江至直沽倉元史世祖本紀海船萬户府言山東宣慰使樂實所運江南米陸負至淮安易閘者七然後入海歲止二十萬石若由江陰入江至直沽倉民無陸負之苦且米石省運估八貫有奇乞罷膠萊海道運糧萬户府而以漕事責臣當歲運三十萬石詔許之大德四年春正月癸卯浚淮東漕渠十年浚吳淞江等處漕河又濬真揚等州漕河令鹽商每引輸鈔二貫以為傭工之費延祐元年遣官浚揚州淮安等處漕河四年復浚揚州運河六年浚鎮江練湖至治三年浚鎮江路漕河及練湖役丁萬三千五百人通漕類編至治三年江浙行省言鎮江運河全藉練湖之水為上源漕運商販舟楫無不由此以供億前朝嘗濬此湖瀦蓄潦水若運河水淺開放練湖一寸可添河水一尺近年淤淺以致遞運不通乞加修治制可工畢又置河兵百人專任修理泰定元年真州珠金沙河松江府吳江州諸河淤塞詔所在有司傭民丁浚之明洪武元年大將軍徐逹開塌場口入於泗以通運五年二月命兩淮都轉運鹽使司移通泰等州批驗所於儀真縣仍疏濬運河以便商旅十四年十一月浚揚州府官河自揚子橋至黃泥灘凡九千四百三十六丈十五年十二月浚揚州儀徵湖九千一百二十丈置閘壩十三處十七年閏十月修築江都縣申港壩浚河道五百六十七丈二十年正月命工部主事楊德禮往高郵督有司修築並湖隄岸因揚州府同知任祥之言堤岸圮壞故有是命二十六年八月命崇山侯李新往溧水縣督視有司開胭脂河上面諭之曰兩浙賦稅漕運京師歲實浩繁一自浙河至丹陽捨舟登陸轉輸甚勞一自大江泝流而上風濤之險覆溺者多朕甚憫之今欲自畿甸疏鑿河流以通於浙俾運輸者不勞商旅獲便故特命爾往督其事爾其蒞事惟勤役民勿暴新頓首受命而行暨河成人皆便之建文四年修常州府武進縣剩銀河閘永樂元年七月户部尚書郁新等言淮河至黃河多淺灘跌坡饋運艱阻請自淮安用船可載三百石以上者運入淮河沙河至陳州潁岐口跌坡下復以淺船可載二百石以上者運至跌坡上别以大船載入黃河至八栁樹等處令河南車夫運赴衛河轉輸北京從之閏十一月浚揚州府江都縣瓜洲壩河道十二月修揚州府江都縣永真沙邊江墟岸二年正月揚州府高郵州耆民言自州北門至張家溝湖岸兩京之要路民田之巨防湖納天長盱眙諸水雨潦漲溢風波衝決隄岸每歲修築旋復傾圮阻絶驛路傷損民田乞遣人相度重為修理從之十一月鎮守淮安都指揮施文言淮安諸壩舟航往來每遇天旱壩下淤淺重勞人力近城舊有清江浦二閘比年坍壞乞命有司修砌以便往來從之浚儀真清江壩下水港三年五月淮安府海州言臨洪場民歲於管瀆場界耕種輸作陸運艱難州北舊有河上通高橋下接臨洪近年淤塞乞疏濬以便舟楫從之七月浚淮安府山陽縣運鹽河計一十八里十一月浚淮安府攴家河長一萬一千九百七十丈四年八月工部言呂梁洪霖雨水決近河路并圈溝橋一十九丈六尺宜發民修理從之九月揚州府泰州判官黃通理言州境舊有運鹽官河每遇霪雨輒泛溢傷民田宅乞於普定秦潼河及西溪南儀阡三處各開水口使下流經興化鹽城界入海仍各置閘以時啓閉永為民利從之十一月户部言高郵州東河等處塘岸傾圮江都縣劉家墟港淤塞命有司發民修浚十二月常州府孟瀆河閘官裴讓言河自蘭陵溝北至閘六千三百三十丈南至奔牛鎮一千二百二十丈年久堙塞艱於漕運乞發民疏治命右通政張璉發蘇松鎮江常州民丁十萬浚之八年三月修鎮江府丹陽縣練湖塘十二月蘇州府吳江縣言石塘官路右臨太湖左邉松江南至平望嘉興連年土石坍塌橋梁斷壞請及時修理計用三萬七千四百餘人半月可完從之敕通政使趙君任督之務令堅固毋虛勞民力九年正月揚州府高郵州言城北張家溝塘岸三十里舊用甎石包砌防遏甓社等九湖及天長諸水近因春雨浸淫各水暴漲衝決塘岸九百八十丈又自張家溝北至寶應縣南至江都縣東至興化縣界塘岸百餘里間有坍塌乞發丁夫如舊修治令工部核實修築三月浚揚州府瓜洲壩河道及修通江減水二閘修蘇州至嘉興石土塘橋路七十餘里泄水洞百三十一處六月淮安府沭陽縣知縣王泰言縣南沭河北連山東南通淮安洪武間常疏浚以便轉運今壅塞四十餘里轉輸既艱水復為患乞於農隙浚治從之八月浚常州府江陰縣青暘等處河道十年十一月修揚州府儀徵縣緣江隄岸及浚夾港等處河道浚鎮江府京口新港甘露三港逹於江十二年八月浚淮安府海州城南官河二百四十里十月常州府江陰縣請浚萬歲河及塘涇等河從之十一月浚蘇州府崑山縣太平河是年平江伯陳瑄請鑿徐吕二洪以通漕運更於洪口建閘按宋元祐四年京東轉運司言清河與江浙淮南諸路相通因徐州吕梁百步兩洪湍淺險惡多壞舟楫朝廷已委官度地勢穿鑿此即瑄所鑿之道也十三年五月開清江浦河明太宗實録凡漕運北京舟至淮安過壩度淮以達清河口挽運者不勝勞平江伯陳瑄時總漕運故老為瑄言淮安城西有管家湖自湖至淮河鴨陳口僅二十里與清河口相直宜鑿河引湖水入淮以通漕舟瑄以聞遂發軍民開河置四閘曰移風曰清江曰福興曰新莊以時啓閉人甚便之是年建淮安五壩運船經壩入淮南河全考仁字壩義字壩在新城東門外東北自城南引湖水抵壩口外即淮河遇清江口淤塞運船經此入淮禮字壩智字壩信字壩在新城西門外西北引湖水抵壩口外即淮河遇清江口淤塞則官民商船經此逹於淮十四年四月設直隸淮安府山陽縣之清河福興清河縣之新莊邳州之乾溝徐州之沽頭上沽頭下沛縣之金溝山東濟寧州之谷亭孟陽泊魯橋十閘置閘官各一員按明初都金陵則漕於江其餉遼卒猶漕於海自永樂都燕後歲漕東南四百萬石由江涉高寶諸湖絶淮入河經會通河出衛河白河遡大通河以逹於京師諸洪泉壩閘以次修舉五月修揚州府邵伯鎮上下二閘是年平江伯陳瑄疏濬故沙河置閘通舟南河全考先是漕至淮安悉從府東北車壩入淮逆水行六十里至是瑄因宋喬維嶽所開沙河舊渠益加疏治置閘通舟踰年而功成漕人德之為立祠焉十五年五月遣官巡視北京通州至儀徵河道十九年九月修直隸高郵州新開湖塘岸江南通志卷五十八
