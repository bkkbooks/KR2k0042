作司徒敷五教其後大於商湯以帝制六百祀而周代之周衰代周者其在湯孫乎吾夫子繼周而起稱素王天之命也天若曰作君而王者吾王之勞以九州其建號也有涯作師而王者吾弗王之勞以萬世其稱名也無涯斯孔子之道所以集羣聖之成而孔子之子若孫所以邁羣聖而最熾也表章聖裔昉於元朔易代加崇至於今隆比三恪於赫哉無疆惟休歟支流别子散在寰區莫不克振祖烈稱彬彬焉江隂梧塍孔氏其一也梧塍之有孔氏始武功大夫垕紹興間以統制守江隂軍因家焉十四傳為處士抃始建聖廟又三傳為諸生興綱育珺移建於西莊大擴舊制其堂以奉先聖祖也配以述聖宗也次配以武功梧塍所自始也其廳事以集族人東廡以祀有德西廡以祀有功示勸也其田以供祭矢弗鬻器以備物矢弗假義也訪遺支之在太倉者共祀春秋聨族屬也其族姓願朴而力田諸生好德而文以世其家語有之七世之廟可以觀德繇孔氏以觀聖德不猶望京山之峩峩而懷崑崙覩清流之洋洋而溯宿海耶戊戌秋豫命祀生重修逾月告成諸生請記於豫以垂久逺豫於是嘆吾道之大而聖人之尊不可褻也二氏之教浸淫於人心其宫廟祠宇充塞天下優俳奴𨽻得而創之薦以褻味祝以淫詞其徒方自以為恭而不知褻乃滋甚也敬在外非由內也吾夫子之祀京師郡邑而外罔敢褻舉舉之者非奉詔旨則聖人之後也而吾夫子在天之靈赫赫洋洋陟降左右士自八歲入小學十五入大學即凜凜祗畏不敢斁思不必入廟始敬也敬在內非由外也豫故為文以示孔氏子孫而不僅以示孔氏子孫也司馬子長道魯過闕里見車器竹䇿皆有先民遺風流連不忍去蓋聖德入人深也時方出秦熖子長所謂道六藝耳今天下聖道昌明士習畫一躋斯廟者覩爼豆禮器睪然其有思乎豈獨聖人之子若孫勉焉願學聖人也袁府君廟在宜興縣治西南祀漢陽羡令袁玘許真君廟在宜興縣青陽市祀晉許謐相傳即真君宅忠烈行廟在宜興縣姚村祀漢秣陵尉蔣子文尚書廟在宜興縣青陽市祀明周忱烈女廟在宜興縣順一坊祀五代時何氏氏罵賊死􅖘亭侯廟在荆溪縣五賢區祀漢蔣澄周孝侯廟在荆溪縣治東南隅祀晉平西將軍周處義興太守廟在荆溪縣臨津城祀齊任昉夏王廟在江隂縣夏港口張睢陽廟在江隂縣虹橋西祀唐張巡靖江縣亦有祠陳烈士廟在江隂縣新村祀宋陳忠忠義祠在府西門節孝祠在直街圖二祠所屬縣俱如制卞忠貞祠在府城勝西里范文正祠在府署西南隅蘇東坡祠在府治顧塘橋北國朝康熙四十四年御題坡仙遺範四字扁額又有祠在荆溪之蜀山即東坡書院明𢎞治中侍郎沈暉重建附明李東陽蜀山蘇公祠祀常州宜興之荆溪有蜀山本獨山也志稱蘇文忠公與蔣學士之竒同舉進士買田卜築於兹山之麓於是易獨為蜀按爾雅山獨者皆為蜀志又稱愛其名而居之者理則然也公嘗欲作亭種橘預名曰楚頌後上表乞居常及歸自嶺南卒於州邸其弟文定公以其喪去葬於潁上其家亦不復至常矣當是時蓋有所謂東坡書院者尋輒廢越七十年郡守朝子健擇州學旁地建祠祀公元僧敏機因山為祠為之居守朝公武徐一夔皆有記今常州祠尚存而蜀山祠廢已久𢎞治庚申縣人沈公暉自南京工部侍郎致仕歸以告巡撫都御史彭公禮巡按御史王君憲知府連君盛知縣王君鍭僉議既協鍭躬訪遺址悉為居民所據贖而歸之得地三十餘畝一時好義者爭割田山捐金市以益之士人吳綸輩鳩材督工國子生王永實相其役經始於辛酉之四月至十二月而成為堂六楹肖公像於其中堂左右二亭一刻公楚頌帖及諸詩詞一刻興造之碑東西廡及門各四楹廳館庖湢諸室為楹者以十數其外則甃石為周垣百二十丈視州祠深廣略稱而偉麗過之矣既乃用表忠觀故事命道士謝允昻居之歲奉祀焉夫天下之論名臣碩輔者或原於嶽降或歸之地靈文章氣節亦以為得江山之助固也及乎遐陬僻壤一丘一壑或有所憑藉亦足以不朽於世是所謂人與地者恆相須以顯而亦不能不相為重輕若君子去父母之邦則遲遲其行越在他國則觸物感事懷思顧戀而不能已是蓋存乎人而物不與焉會稽東山以謝傅名其在金陵亦築土以象之為東山者何限而非其人莫之名也公之自蜀入􅏖隱然重京師父子兄弟之名遂擅天下則公乃天下之人俗傳三蘇生而眉山之草木皆枯者妄也及其流離貶竄不能歸其鄉卜居兹山托名以寄意潁之山名曰峨眉者亦此義耳後雖其體魄在潁而魂氣之無不之者安知不徘徊眷戀於兹山也耶且公所謂不待生而存不隨死而亡者將流行充塞於天地間而况其經過化存神之地哉公之文章氣節天下莫不尊之是雖不得與天下之祭揆之鄉先生社祭之義有過而無不及獨山之為蜀也其社之類乎然則是祠之設固耆民俊士衣冠爼豆所宜周旋而傾注焉者也夫使文章不如公氣節不如公則蜀之王萬亦嘗榜鄭邸為蜀舍而朱俊民劉跂為之記銘然亦不顯東陽楚人而燕産嘗因贈太師徐文靖公之約買田兹鄉而遽罹家難竟莫之遂今工部以其迹頗相類而不知其文之弗稱也請為記祠事之成豫於是亦誠有感焉因用楚語作迎送神辭其亦橘頌之遺意也夫其辭曰橘之樹兮如蓬鬱青蔥兮間玲瓏彼亭兮在中信吳邦兮楚風橘之樹兮如蓋採芳鮮兮薦甘脆我公兮來歸神陟降兮如在公之樹兮荒萊公之亭兮空苔望遊魂兮歸來公歸來兮恍不可以見渺惆悵兮悠哉荆之土兮如酥荆之米兮如珠山有茶兮溪有魚生不足兮歿有餘公去此兮何居楚之調兮欷歔蜀之山兮盤紆神往復兮無定所聊為此兮踟蹰生不為世所容兮沒將恣其所如鑿余井而得泉兮又安窮其所之彼亭常存兮樹常實恃以薦公兮願少駐乎須臾國朝儲欣蜀山東坡書院記先生蜀人也弱冠筮仕嗣後出入中外不常厥居有以除授至者徙者請外者羣小搆禍安置者量移者地或善或惡或極遼以惡寵辱自上趨避無由若乃擇地而處不以宦與罪至而意氣慨然將徜徉終老於其山水之間獨吾陽羡而已蜀山處邑東南蓋陽羡諸山之卑且獨者相傳舊號獨山先生以山形似蜀為去偏名蜀而居之吾意先生舟入荆溪浮於東氿三十里得是山登巔極目太湖如鏡東南萬峯如笏如屏是山實山水門户先生善選勝即其址稅駕焉而非係乎蜀之似與不似也從此泛罨畫品玉潭芒鞋笻杖無不到田夫方外無不交於是天逺夕陽之詞亂山白雲之句紅友黃封之歎與金沙寺僧剖竹調水之符佳言韻事日日以新而惜乎居之不久也間考先生之來大約在允常州居住前後為元豐七年八年此兩年中離黃赴登又嘗待命於泗留題於揚時月可考是則先生居此雖閲兩年其實不過數月耳嗟乎先生一謫齊安居之者四年一竄南海居之者六年及心所喜樂買田築室曾不數月以去亦足見行止非人而先生生平動與願違若此類甚衆也然先生在天之靈亘百世不磨滅者其所依回眷戀將在鬱鬱不樂處者歟抑在所樂歟則夫陽羡人士相與作為宫室以爼豆先生者先生之靈實式憑之可壞陋弗飭耶蜀山故有東坡書院廢不知何時明𢎞治朝邑沈侍郎暉贖舊址而鼎建焉以偉麗稱國初漸圮有道士曰蔣普引以為任積三十年力腐折頽敗葺治煥然又於似蜀堂後造樓而書院益偉麗狹前制矣考於康熙之戊寅磨石而屬豫以記豫喜先生書院整新又嘉道士良且方卒就厥志也因記其光舊創始之大略如是先賢祠在府城內祀延陵季子等七十五人邵康節祠在府治漳湟里祀宋邵雍劉龍圖祠在府治馬迹山祀宋劉晏楊龜山祠在府治朝京門內張南軒祠在府城祀宋張栻胡文恭祠在府城德安門外祀宋胡宿忠義祠在府城正覺寺址祀宋文天祥姚訔等十五人附明胡華毗陵忠義祠録序毗陵古常郡也而祠以忠義名天下所無也而吾常有焉常之忠義前此猶未顯也至宋之末始大顯焉忠義在人心固未嘗泯宜無間於天下古今而獨歸於宋末者有説也蓋常有泰伯季子之遺風自古髙節所興由克遜以立風俗君子尚義庸庶厚龎漢魏而降衣冠南度禮義之俗寖盛逮至趙宋人以忠厚立國當時臣民咸有忠君愛國之心而常之人才風俗愈甚獨異他郡處常守易寂無所見也時危事變節斯著焉方德祐初元師入境大江東西郡縣皆望風奔潰獨吾常知州姚公訔通判陳公照與統制王安節等鼓舞忠義為守禦計且誓與城同存亡卒之糧盡援絶義勇百萬同日被戮無一人降滿城忠義信古今天下所無而僅一見於吾常者也夫以常之忠義如此至今廟宇不崇祭享不及精忠大節幾於晦塞不有君子表而出之愈久而忘終歸泯沒何以勸激天下後世又何以顯常之忠義超絶古今也耶此吾葉君司韶有所感發督合庠友而私祭所由興私祭興而新䤪所由著也觀其於文丞相劉都統阮應得萬安僧則議其應祀劉溶則議其不當黜定位次有議人各有贊序列傳鑑志以著其出處詳略祭有期有品有文立祠有碑與侵毁祠基宇有帖有狀君嘗乞祭於有司有呈古人感慨於忠義有詩一一收録分為上下卷後自為序而列其目於卷首用心密矣旻兒輩俱出門下見而義之將為鋟梓以廣其傳君因先期呈書臬司俾余序焉余惟忠義之事惟忠義者知所崇重為能表而出之以勵風化昔孔北海表鄭公鄉而過者起敬文潞公題明道墓而學者知歸吾見斯録一出而毗陵忠義之名益著忠義著而諸公之英聲偉烈震耀兩間人人知所景仰吾輩又當以君之録逹於朝行將立廟奉祀勒石頌功隆一代崇褒之典而大顯揚於時於以勵髙風激頽俗匪直有勸於常抑有勸於天下後世是録有關於忠義大矣鄒公祠在府治咸寧街祀明蘇松兵備道鄒墀唐荆川祠在府城外運河岸西南祀明唐順之忠節祠在府城正覺寺西祀明兵部尚書陳洽王忠愍祠在府治奔牛鎮祀明季殉難御史王章國朝順治十年奉旨褒恤賜地十區奉祀海烈婦祠在府治運河岸靈濟龍祠在武進縣奔牛閘周殿撰祠在武進縣忠佑廟西廡祀宋周把崇賢祠在武進縣史家巷祀明胡濙劉仁賢祠在武進縣南祀明大理寺丞劉光斗三王祠在陽湖縣東北祀東嶽忠佑廣惠之神湯襄武祠在陽湖縣祀明東甌王湯和顧左丞祠在無錫縣南林祀晉顧悅之晉書愷之父悅之歷尚書左丞伍相公祠在無錫縣西五十里胥山下關江上春申君祠舊在黃公澗上今徙錫山西麓華孝子祠在無錫縣惠山左祀晉孝子華寶附元髙明華孝子祠記惠山寺之東偏當泉水之上有三賢祠按志書今祠址華孝子所居宅也初祠久廢吳人王彬始復倡建既成則以三賢事刻諸石且曰初址實孝子故居孝子之事不可以沒而不著復礱其碑因以記其事章善也孝子名寶晉義熙末始八嵗父豪戍長安且行謂曰我還為汝冠後長安陷父歿寶奉命至七十不婚冠或問之不忍答輒號慟彌日建元三年詔表其門閭凡史載孝子事若此蓋自西晉以來尚淵虛賤名檢教弛法斁波流風靡而孝子獨能篤至行終始不渝其誠意惻怛可以貫金石于雲霓若與宇宙日月同其久於此見天之降𠂻人之秉彝不以衰世末俗而有異也孝子晉人而志謂齊孝子者蓋孝子生於晉長於宋歿於齊當其一身而天下三易姓當時居朝廷有爵位者朝事司馬氏夕事劉朝事劉夕事蕭恬不以為怪而孝子奉父一言七十年餘未嘗斯須忘以至歿身不替使當時朝廷有爵位者其奉君命恪官守亦咸若華氏子則晉不當為宋宋不當為齊而孝子宜不曰齊孝子也几遊於兹者憩幽林酌清泉臨風覽古懷三賢之髙風慕孝子之至行有志者宜