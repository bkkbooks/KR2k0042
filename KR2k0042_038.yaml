body:
  text: 欽定四庫全書江南通志卷三十九輿地志壇廟三祠墓附松常鎮三府松江府社稷壇在府城北門外風雲雷雨山川壇在集仙門外官紹塘敕建先農壇在府治東郊壇旁置有藉田歲以仲春亥日行耕藉禮郡厲壇在通波門外縣曰邑厲里社鄉厲二壇在各鄉保關帝廟在府城國朝雍正五年奉旨追封三代公爵同日祭于後殿城隍廟在府城興聖塔院後敕建八蠟神廟劉猛將軍廟並在府治西南以上壇廟所屬縣皆如制旗纛廟在守禦千户所廳後輔國將軍廟在府治西南祀吳陸遜陸凱陸抗忠義祠節孝祠俱在府城二祠所屬縣皆如制唐宋忠良祠在府城南祀唐平章侍郎陸贄宋丞相李綱衛文節祠在府治蕭塘鎮祀宋參知政事衛涇明懷宗時移建城內月河塘胡公祠在府學西祀元教授胡存道方正學祠在府治普照寺西偏祀明方孝孺萬厯中建國朝康熙中知府魯超重修聖祖御書賜額曰忠烈名臣附魯超重修祠記方正學先生生於台之臨海殉節於金陵而松故有祠則以先生之子孫在松故也先生當成祖靖難時衰麻慟哭誓死不屈以是觸成祖怒刑及九族先生幼子德宗在台年甫九歲刑部尚書魏澤時謫寧海尉受詔摉捕憐而匿之有天台秀才余學夔者佯乞食於市口嗚嗚唱歌以諷澤澤心動越二日塗遇復唱歌如前澤心知為義士乃密以德宗託之學夔挾德宗遁至松江歷青村諸鎮以織網貿米得沽學夔又潛入郡屬祠部郎俞允共為營護而先生門人任勉者為參政家居開之就見德宗因妻以養女德宗由此冒姓俞氏後恐以同姓賈禍改姓余轉遷白沙鄉德宗生三子友直友諒友竹子孫繁衍世家於松至萬厯間督學侍御楊公廷筠詢訪得實檄郡建祠命其子孫復故姓夫成祖之時忠義之士殱滅無遺瓜蔓之抄禍延海內而罹禍之慘無如先生者至於種族門誅而怒猶未息後漢冦榮所謂張羅四海設罝萬里雖楚購伍員漢求季布無以復過者也以事勢言之雖有朱家之栁車孫嵩之復壁豈能容舍保藏存先生一線之祀哉然而成祖之威至亢暴也能殺先生之身而終不能奪先生九死不移之節能赤先生之族而終不能斬先生萬世血食之嗣此不可謂非天也余魏諸公不憚滅族之誅奮身協力隱匿遺孤卒全先生之祀此皆有天焉相之而其至性髙義同符古人雖程嬰之全趙孤王成之保李燮其蔑以過之矣豫觀有明一代忠義之士一殱於靖難再殱於魏閹而至於甲申之難忠臣義士不屈於闖賊蹈白刃赴鼎鑊而死者猶不可勝數此固先生及黃練諸人忠義之節有以倡之也然則如先生者上為日星下為河嶽足以立天柱而奠地維其繫於世道人心豈細故哉祠久毁不治豫特為飾而新之祠既成豫為設羊豕之奠中奉先生而旁以余魏俞任四公附焉俾方氏之子孫賢而有學行者世守其祀凡夫松郡之士及四方來遊者入先生之廟正容肅拜有典刑如在之思可以教忠焉觀余魏諸公棄家忘身保全忠裔有古人之節可以教義焉方氏之子孫世世相承蒸嘗勿替當思所以不愧祖德而勉為君子可以教孝焉所謂舉一事而三善備焉者其在此也因書之以為記俾鑱諸麗牲之石夏周二公祠在府西南祀明周忱夏元吉成化十五年建國朝魯超有重修祠記國家大政莫重乎財賦而財賦出於農田農田由於水利賦額不定則取民無制而吏得因緣為姦矣水利不修則旱潦無所資蓄泄無所備而田悉化為汙萊矣故古之名臣皆於斯盡心焉如明之夏周二公是也明永樂二年蘇松諸郡大水夏公以户部尚書奉命發浙西兵民數十萬疏決壅滯公上言嘉定之劉家港徑通大海常熟之白茅港徑入大江宜浚吳淞江南北兩岸安亭等浦港以引太湖諸水入劉家白茅二港使之直注江海乂松江大黃浦乃通吳淞要道今下流壅塞難即疏濬傍有范家濱至南蹌浦口可徑逹海宜濬令深閣上接大黃浦以逹河之水相度地勢各置石閘以時啓閉每歲水涸之時修築墟岸以禦暴流如此則功可成奏上得旨允行水患乃息公布衣徒步晝夜經畫咸暑却蓋弗御又念歲荒民飢奏發廩三十餘萬石賑之所全活無算民至今思之周公在宣德間以工部侍郎巡撫江南時蘇松常三郡積欠糧以千萬計公亷知豪強有力者不出加耗貽纍小民又糧長徵收斗斛無制取羡自由遂奏設管糧官定斗斛式立水次倉以秋糧正米為則定為加耗而以各户應納之數置注由帖分授之俾户自持帖輸納官倉里胥不得上下其手又令諸縣各立倉貯米以便賑貸名曰濟農復立交兑法使民免長運軍獲羡餘人皆稱便又松江賦額素重公奏請於朝得減稅糧三十餘萬又請極重官田極貧下户並從輕折銀一兩折米四石布一匹折米一石計松江一郡得輕折米四十八萬二千六百餘石民獲蘇息公蒞事勤敏時乘小艇駕輕輿出舍郊外與農夫野老欵曲談語因得以周知利病在任凡十有八年至今言巡撫之有惠政者必首稱文襄公焉夫二公之功業在天下利澤在東南豈獨松之民被其德哉然松故有祠則以二公之功德所在尸祝而愛尤在於松也二公之去今二百餘年矣東南之水利日以淤塞田畝日以荒蕪而稅糧之額日以加重誠得如二公者出不辭勞不畏罪有飢溺由巳之思有憂樂同民之意則陂瑭港浦之淤者可通田之蕪者可治民之困於賦役者可以少紓而東南飢饉流亡之患庶幾有瘳矣此民所以思二公之德至於今日愈久而愈不忘也祠久蕪沒僅存遺址豫為鳩工庀材復其舊觀既落成為文以紀之夏公名元吉字維哲諡忠靖湖廣湘隂人周公名忱字恂如諡文襄江西吉水人其他行治事實具載國史不書書其有德於吳人者豫既為之作記又緣邦人思二公之意作詩二章以頌之曰暨暨夏公功在河渠布衣徒步周爰咨茹暑不張蓋勞不乘輿三江震澤實為洪瀦劉港白茅泄彼尾閭溉我田疇長我新畬公之不來室無峙糈公之既來飯稻羮魚川伯順流老幼安居千載思公拜公堂除福我吳民黍稷與與於赫周公來旬來宣公未蒞止民呻以癲賦斂無藝雀鼠蠧穿公援成畫則壤永編排闔上疏請折請蠲澤被八州惟忪德偏息黥補劓拯溺解懸十有八載鴻恩覃延畢公君陳庶其比肩公歿歲久厥德不鐫雲車風馬精爽在天惠我人斯於萬斯年忠烈祠在府治鍾賈山祀明深州知州孫士美與其父訥董文敏祠在府治興聖寺後祀明禮部尚書董其昌康熙四十四年聖祖御賜芝英雲氣四字扁額崇正祠在周家藻里祀周思兼萬厯年建張宫諭祠在鳳凰山祀張以誠崇禎時建陸文定祠在府西門外興福寺南祀明尚書陸樹聲髙義祠在府治南祀顧正心徐文貞祠在府學東南祀明大學士徐階錢太史祠在府治西門外平政橋西祀明錢福崇禎時建三烈祠在府城右文街祀明張烈婦陳氏嚴烈婦許氏烈女楊氏報功祠在府治漴闕祀明知府方嶽貢邑人曹家駒吳嘉印何剛國朝邑人吳含文宋際莊徴麟李令祠在府治白龍潭之陽祀國朝婁縣令李復興沈文恪祠在府城興聖寺後祀國朝禮部侍郎沈荃康熙年間聖祖賜扁額曰清愼勤曰格物曰落紙煙雲曰飛霞舊德又賜對聨一副曰兩幅彩箋揮逸翰一聲寒玉振清詞王忠毅祠在府城普照寺西祀國朝江南提督王之鼎康熙四十六年聖祖御賜純忠遺愛四字扁額周太守祠在府城北門內清風橋祀國朝知府周錞元四賢祠在華亭縣細林山祀晉張翰陸機陸雲梁顧野王五先生祠在華亭縣干山祀陸機陸雲楊維楨錢惟善陸居仁顧侍郎祠在華亭縣寶雲寺祀梁顧野王父子忠孝祠在華亭縣學東祀明大理寺丞馮恩子應天府通判行可楊允繩父子三賢祠在婁縣七星橋側舊為范文正祠明崇禎時以范履氷范純仁合祀國朝順治間以明兵部尚書范鏓大學士范景文附為五太師祠孟侍御祠在上海縣三十五保祀明孟暘羣忠祠在上海縣祀上海縣丞劉東陽建平縣丞宋鰲鎮海衛指揮使武尚文浙江鎮撫吳賢鳳陽散官丁爵邑人楊鈿皆嘉靖間死倭難黃道婆祠舊在上海縣烏泥涇屢遷今在張家濱寧國寺西明天啓間張所望移建附明張之象記上海西南草餘里為烏泥涇故有道婆祠云道婆者姓黃氏本鎮人也初淪落崖州元元貞間附海舶歸閩廣多種木棉織紡為布名曰吉貝而道婆最善是業州里宗之先此烏泥涇土壤磽瘠民多困貧因謀樹藝以給遂覓種於閩廣間然尚無踏車椎弓之制率用手擘去子線絃竹弧置案間振掉成劑厥功甚艱道婆乃教以制造捍彈紡織之具既以便民矣至於錯紗配色綜線挈花又各有法故被褥帨帶之類織以折枝團鳳碁局文字粲然若寫土人競相倣習稍稍轉售他方以牟利業頗饒裕未幾道婆卒莫不感恩灑泣而共葬之已立祠歲時享之頃歲行遊其所已鞠為灌莽撫迹低回者久之豫遂於居舍之東北隅聽鶯橋捨地二畝集里中尚義者經始方旬煥然改飭像設具備神有棲憑焉先王之制禮也法施於民則祀之吾松之民仰機利以食實此道婆發之茍被其澤者無忘追本之思則祠祀可不廢矣三公祠在上海縣三十保祀明都御史海瑞僉事鄭元韶上海知縣敖選周方二賢祠在上海縣祀明巡按周如斗知府方亷沈布政祠在上海縣祀明沈恩陸文裕祠在上海縣學宫後祀明詹事陸深潘方伯祠在舊演武場上祀潘允端允端董漕儲惠及桑梓士民德之忠勇祠在南匯縣祀明死倭難邑人李府及二子香黍嘉靖中建仰德祠在南匯縣川河保祀明喬鏜喬木萬厯中建海忠介祠在青浦縣南城濠上祀明都御史海瑞丁清惠祠在青浦縣南祀明都御史丁賓漢濮陽王墓在小蒸西四里廬江太守陸康墓在府西北二十里潁川太守陸閎墓在華亭縣西北四十里三國吳丞相陸遜墓在府西二十三里大司馬陸抗墓尚書陸瑁墓左丞相陸凱墓俱在府城外海鹽侯陸禕墓在崑山宛陵侯諸葛瑾墓在奉賢縣坍石橋西雍正九年知縣舒慕芬於其地得殘碑因重為立石晉左光祿大夫陸曄墓在府城西四十里平原內史陸機墓在華亭縣西北二十五里又青浦縣治北三十里有髙丘舊呼陸丞相墓嘉靖間土人見墓上有一金蛇盜伐其塜得古器甚多後聞於官悉捕治命封其塋地西陽亭侯陸監墓在婁縣左將軍袁嵩墓在上海縣長人鄉嵩為賊害其下李祥收骨歸葬唐朝散郎顧謙墓在北亭鄉嵩子里五代前蜀丞相潘葛妻李氏墓在潘店北杏涇之左碑上有天漢四年葬五字宋贈太子少保朱承進墓在佘山將仕郎衛公佐墓在佘山詩人儲泳墓在南匯縣周浦樂靜先生曹澤之墓在青浦縣小蒸元義士夏椿墓在華亭縣細林山三髙士墓在華亭縣干山東麓三髙士者楊維貞陸居仁錢維善也朱柯墓在華亭縣橫涇貞素先生曹知白墓在華亭縣干山子永祔蘭溪知州章夢賢墓在嵩宅里夏世澤墓在集賢鄉秦裕伯墓在上海縣淡井廟北孝子徐誠墓在上海縣長人鄉衛謙墓在佘山松江訓導王文澤墓在橫雲山轉運使瞿霆發墓在南匯縣下砂江夏公費寮墓在青浦縣陸寶原宣慰副使任仁發墓在青浦縣駱駝墩明御史袁凱墓在東門外賢遊涇侍郎王鍾墓在佘山訓導邵亨貞墓在佘山宣城伯衛炳墓在府城內北禪寺右贈尚書張璚墓在城南龜蛇廟側尚書錢溥墓在佘山府丞朱孔暘墓在佘山府尹吳玘墓在府東六磊塘布政夏寅墓在府西白龍潭知府張弼墓在鳳凰山都御史唐珣墓在府城北荷祥涇尚書張鎣墓尚書張悅墓尚書孫承恩墓俱在盤龍塘修撰錢福墓在府東華陽橋給事中張承憲在天馬山東南太常卿夏衡墓在府城南彭家莊贈大學士徐黼墓在景家堰西尚書顧清墓在唐橋太僕卿沈愷墓在北城濠上侍郎徐陟墓在府城西南尚書陸