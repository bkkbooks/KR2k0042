body:
  text: 江南通志巻一百五十六人物志忠節四廬鳯潁三府滁和廣廬州府楚范増居鄛人年七十好奇計説項梁立楚後佐項羽霸天下漢王用陳平計間項王項王疑范増増大怒曰天下事大定矣君王自為之願賜骸骨歸行未至彭城疽發背死三國王蕃字永元廬江人博覽多聞兼通術藝為散騎中常侍孫皓時衆譖毁蕃蕃氣體髙亮不能承顔順指遂迕皓意見殺丞相陸凱上疏曰蕃處朝忠蹇大吳之龍逄也昔事景皇納言左右歎為絶倫而陛下惡其直對梟之殿堂有識悲悼宋詹世勛家扵舒修偉沉毅其勇莫敵累薦為舒城民兵正將弟世勣副之招募强壯結以信義與敵戰栲栳原被重創死密佑廬州人咸淳十年為江西都統元師逼撫州佑逆戰被圍數重力戰終日衆幾盡乃斫圍南奔渡橋馬蹶被執元帥壯其勇欲降之不屈許以官不受又令佑子説之曰父死子安之佑叱曰汝行乞於市第曰密都統子誰不憐汝也怡然解衣請刑觀者泣下禇一正字粹翁廬州人武舉進士為提刑諮議督戰髙沙被創死劉師勇廬州人以和州防禦使助姚訔守常州時張彦守吕城兵敗被執常州勢益孤元巴延寘彦城下招降師勇以大義斥彦及城陷師勇潰圍出從二王海上憂憤而卒元余闕字廷心合肥人少喪父授徒以養母登元統元年進士由同知為刑部主事三月疏滌寃滯獄五百入翰林修宋遼金三史至正壬辰天下兵動闕為淮西宣慰副使分守安慶賊不能犯者五年累遷淮南行省右丞陳友諒兵薄城下闕戰却之賊益兵來攻闕為士卒先身被十餘創城陷死之妻蔣氏子徳臣女安安皆赴水死甥福童戰死闕賜諡忠宣明太祖詔立廟嵗時祀之明劉友仁合肥人與弟謙隨胡大海取徽寜等處多戰功歿扵陣命祔祀功臣廟廖永安字彦敬巢人從太祖率舟師攻曼濟哈雅渡江下太平集慶克池州所至有功後擊張士誠戰太湖水淺舟膠被執欲降之不屈死追封楚國公諡武閔桑世傑無為人明初與諸將攻江隂石牌寨陣亡贈永義侯侑享太廟汪澤廬江人鄱陽湖戰歿封廬江縣子祀康郎山徐明合肥人陳友諒攻洪都明為管軍百户從指揮薛顯開城突戰被執死之追封合肥縣男郈明合肥人陳友諒圍南昌明從諸將徃援之遇敵康郎山大戰死扵陣追贈梁縣子王仁趫舒城人從征陳友諒戰鄱陽湖陣亡封舒城縣男廟祀康山王徳朱昇同戰死扵康郎山皆贈合肥子祀康山忠臣廟宋國興合肥人年十八以總管先登與陳額森戰南臺太祖解白龍袍衣之敵誤以為太祖攢槊刺之至死常遇春翼上潰圍出其弟晟嗣兄官累軍功為副總兵靖難後進都督封西寜侯卒諡忠順汪河舒城人倜儻有大志嘗師余闕以文章名太祖渡江用為大都督府都事奉使庫庫特穆爾被拘六年完節不屈逮王師下河南庫庫遁走定西河始得歸陳征西方畧進吏部侍郎濮英合肥人從將軍馮勝出征遇伏發被執英絶食不言乘間自剖腹死贈金山侯諡忠襄子璵在襁褓即封為西涼侯瞿能合肥人通子少隨父立功驍勇絶倫建文時以都督從李景隆北拒靖難兵力戰白溝河所向披靡斬馘數百㑹旋風起及其子俱戰死余瑱合肥人官北平都指揮與同官謝貴密謀拒靖難師貴死瑱走居庸闗練兵將襲北平成祖命將徃擊之瑱且戰且守援兵不至棄闗走懐來再敗被執死之徐凱合肥人鎮守四川靖難兵起召充副總兵移鎮滄州與吳傑平安等相為犄角兵敗被擒不屈死甯忠合肥人累官都督建文初從李景隆進拒北平戰敗真定被執不屈死宋瑄合肥人西寜侯晟之子建文中為右衛指揮使禦靖難兵戰死靈璧弟瑛尚公主嗣侯爵殉土木之難同邑劉真以軍功充大寜總兵靖難兵起真夜負勅印浮海而南還應天成祖即位命鎮遼東愧憤卒陳懐合肥人永樂中積戰功至都督正統中封平鄉伯死扵土木之難贈侯諡忠毅陳植合肥人元舉鄉試不仕洪武間為主事建文初官兵部侍郎靖難兵至植督師江上督將密謀送款植責以大義督將遂殺植迎降邀賞成祖立誅其人具棺殮植遣官䕶喪歸葬周讓字克遜無為人洪武中監生通敏博辯倜儻尚氣節以劉基薦任給事中永樂初兩使西域被拘徙之荒野瀕死者數讓終不屈諭以本朝恩信卒令番人隨之入貢有重使古刺集備載其事李紹賢字崇徳其先巢人編伍泗州正徳丁丑舉進士除行人篤學敦行遇事果決以小臣抗疏諫止南巡被杖五十創甚數日死盧謙字吉甫廬江人萬厯三十二年進士知永豐縣擢御史督北直學政逆璫煽焰告病歸里崇禎八年流賊破城謙朝服端坐大罵死之賊投尸於池水盡赤贈光禄卿時殉節於流寇之亂者有合肥人黄克嘉任湖東守備𠞰賊死廬江舉人張𢎞任四川知縣巢縣人曹同任鄖西知縣俱城陷被執死程楷合肥人天啟乙丑進士知平湖縣陟南禮部郎出守東昌峻拒屬吏之餽厯雲南參政歸壬午流賊圍城楷與經厯鄭元綬協守南薫門城陷不屈死之贈光禄卿胡守恒字見可舒城人崇禎戊辰進士授嘉興推官召試平臺改編修晉東宫講官庚辰較禮闈乞歸養獻賊攻城守恒與遊擊孔廷訓督民兵共守廷訓叛降賊遂見殺子永亨夜入賊營收骸歸葬康熙庚戍成進士授行人分巡廣東有治績鳳陽府漢陳咸沛國洨人成哀間以律令為尚書平帝時王莽輔政誅不附己者何武鮑宣等咸嘆曰易稱君子見幾而作吾可以逝矣即乞骸骨去及莽簒位召咸為掌寇大夫不肯應時三子參豐欽皆在位悉令解官歸鄉里閉門不出入猶用漢家祖臘曰吾先人豈知王氏臘乎後莽復徴咸遂稱病篤收斂其家律令書文皆壁藏之常戒子孫曰為人議法當依扵輕雖有百金之利慎無與人重比三國樓𤣥字承先沛郡蘄人孫休時為監農御史孫皓時厯官大司農皓求忠清之士用𤣥為宫下鎮禁中侯主殿中事𤣥正身率衆奉法而行應對切直數忤皓意後人誣𤣥訕謗政事遂被詰責送付廣州華覈言𤣥清忠奉公乞赦之以責後效皓疾𤣥聲名徙交阯密勅將張奕殺之奕未忍殺奕卒𤣥扵器中見勅書還便自殺晉嵇紹字延祖魏中散大夫康之子也十年而孤事母孝謹山濤領選啟為祕書丞元康初為給事黄門侍郎以不阿比侍中賈謐封弋陽子遷散騎常侍趙王倫署為侍中惠帝復阼遂居其職河間王顒成都王穎舉兵向京都朝廷北征紹馳詣行在值王師敗績扵蕩隂百官散潰唯紹儼然端冕以身捍衛兵交御輦紹遂被害帝側血濺御服及事定左右欲浣衣帝曰此嵇侍中血勿去累贈太尉諡曰忠穆桓彛字茂倫譙國龍亢人榮九世孫起家州主簿為逡遒令累遷尚書吏部郎明帝伐王敦參密謀敦平封萬寜縣男丹陽尹尋補宣城内史蘇峻之亂彛率兵討之時州郡多遣使降峻稗惠勸彛偽與通和以紓交至之禍彛曰吾恩義在致死焉能與醜逆通問如其不濟此則命也遣將俞縱守蘭石峻攻之將敗左右勸縱退軍縱曰吾之不可負桓侯猶桓侯之不負國也力戰死彛固守經年勢孤力屈城陷遇害咸安中改贈太常諡曰簡五子温靈豁祕沖南北朝梁裴之横字如岳夀陽人之髙弟好賓游重氣俠不事產業之髙乃為狹被蔬食以激勵之遂與僮屬數百人扵芍陂大營田墅遂致殷積侯景亂出為貞威將軍討景又隨王僧辯破侯景於巴陵景退遷平北將軍封豫寜侯復為吳興太守魏尅江陵横出守蘄城營壘未周而魏軍大至兵盡矢窮遂扵陣歿贈侍中司空公諡曰忠壯子鳯寶嗣唐夏侯端夀春人髙祖微時與相友即位拜河南道招慰使傳檄州縣次譙州㑹亳汴二州刺史已降王世充道塞無所歸計窮糧盡麾下二千人不忍委端去端乃殺馬宴大澤中謂衆曰我奉王命義無屈公等宜去因欲自刎爭持之乃止世充遣人以吏部印召之端焚書解節毛懐之間道走歸拜祕書監出為梓州刺史何武夀春人嘗被誣至州投石自明守釋之未幾寇起武詣守曰此誠畢命之秋也領偏裨入樅陽兵潰鬭死周憬夀春人仕唐謀誅武三思不克遁入比干廟謂人曰比干古忠臣神而聰明其知我乎三思虐害忠良滅亡不乆可竿吾頭於國門以見其必敗遂自刎宋姜才濠州人為通州副都統時淮多健將然驍勇無踰才才知兵善騎射撫士卒有恩至臨陣軍律凜凜守揚州與元師戰流矢貫肩才拔矢揮刀而前所向辟易德祐二年宋亡阿珠使人招之才曰吾豈作降將軍耶東至泰州將入海阿珠圍之㑹才疽發脅不能戰遂為所執勸之降肆罵不屈阿珠怒咼之揚州元張仲仁臨淮人讀書尚氣節流寓泗州以賈魯召歸諭安豐不克死之子順理亦死明韓成虹縣人從太祖征陳友諒大戰鄱陽湖被圍計無所出成進曰古有殺身以成仁者臣不敢辭太祖遂賜龍袍成服之對賊衆投水中以疑之賊遂退友諒敗死追封髙陽郡侯祠於康郎山趙徳勝濠人勇敢有氣節從太祖累功為元帥守南昌陳友諒攻城將壊德勝且戰且築城復完巡城至東門腰中流矢鏃入六寸拔出嘆曰命也恨不能從上定中原垂令名於竹帛耳言畢而絶贈梁國公諡武桓祀功臣廟花雲懐逺人驍勇絶人從太祖累建奇功守太平陳友諒來攻城陷被執怒罵奮躍而起縛皆絶奪守者刀連斬五六人衆怒叢射之至死罵不絶口追封東丘郡侯茅成定逺人攻張士誠戰死追封東海郡公曹良臣夀州人積功封宣寜侯北征至鄂勒琿河敵騎大集力戰死焉追封安國公諡忠壯孫興祖濠人恪之父沉毅有謀大將軍徐達倚重之守海陵移鎭彭城累官副都督守燕山六衛出塞遇敵力戰死追封燕山侯諡忠敏李夢庚鳳陽人從太祖渡江與郭景祥同典文書為左司郎中歴都督府參軍謝再興守諸全上命夢庚徃總制軍事再興忿夢庚出己上遂叛執夢庚以降吳夢庚死之祔祭功臣廟張耀夀州人累功為指揮使北征戰殁常榮懐逺人遇春再從弟為指揮同知隨李文忠北征戰於鄂勒琿河陷陣死之常惟徳懐逺人從太祖為鎮撫戰死鄱陽湖封懐逺子祭於康山忠臣廟常徳勝懐逺人從太祖為千户戰死鄱陽湖封夀春縣男祭於康山忠臣廟劉成靈璧人從征有功守長興為永興翼左副元帥張士誠兵以十萬來攻成出西門擊敗之擒其帥敵愈衆戰死贈懐逺將軍立廟長興孫虎夀州人屢立戰功為指揮使北征至應昌遇敵鏖戰死之追贈樂安伯楊國興定逺人從太祖累立戰功最驍勇鎮宜興授指揮使征張士誠戰死於閶門胡觀定逺人東川侯海次子靖難兵起力戰死徐輝祖達長子嗣爵有材氣數出練兵各省靖難兵起建文帝命援山東與燕再戰破之及召還而諸將遂不振燕兵渡江猶引軍力戰燕王至金川門獨守父祠不迎遂削爵幽繫之尋卒萬厯中録建文忠臣廟祀以輝祖居首諡忠貞丘福鳯陽人起卒伍事成祖於藩邸樸戇鷙勇臨陣敢力戰深入累功封淇國公後北征至臚朐河敵大至被執遇害李逺懐逺人以靖難功封安平侯嘗以輕騎八百破敵數萬後與丘福北征力戰馬蹶被執罵不絶口死追封莒國公諡忠壯伍雲定逺人以衛指揮同知從征交阯屢有功仁宗初隨方政討黎利於茶籠鼓勇陷陣死之陳忠臨淮人永樂中積官指揮同知仁宗時從征交阯攻多邦城先登擒偽官阮事吳忠等黎利寇清化戰死與伍雲同優卹崔聚懐逺人從成祖起兵累授都督僉事宣徳初同柳升征交阯升死聚整軍至昌江賊至力戰被執不屈死魏貞懐逺人進士官御史從英宗北狩死土木之難湯允勣字公讓鳯陽人和曽孫始為諸生善詩景泰初求將才周忱薦之授錦衣百户厯衛指揮僉事諸將忌之不令治事益放情詩酒與劉溥王淮輩唱和號十才子天順中落職成化時以薦授延綏參將分守孤山堡寇大至允勣方病力疾上馬禦戰衆寡不敵陷陣死事聞贈祭朱勇懐逺人能子赬面虬髯厯掌都督府事晉太保乆典兵柄正統十四年隨駕北征歿於陣追封平隂王諡武愍劉雄臨淮人成化時為四川都指揮僉事剛勇敢戰嘗捕漢州賊生擒七十餘人德陽人趙鐸亂雄追之羅江大水河連敗賊以救千户周鼎徑奔賊陣叢刺死贈都指揮同知子襲職皇甫斌夀州人為衛指揮同知毎戰必身先士卒宣徳中禦寇於密城東峪自旦及晡力戰矢盡援絶而死子弼以身衛父亦戰死方震孺字孩未夀州人萬厯癸丑進士由知縣授御史天啟初以巡城忤魏璫璫銜之值遼警一日上十三疏慷慨請出闗犒師遂以監軍巡按遼東時巡撫王化貞棄廣寜而震孺莅前屯嚴守璫惡震孺亦罪及之誣以贓私咒詛坐大辟懐宗初釋免久之起巡撫廣西京師陷率師勤王馬士英阻之憂憤而卒張應徴字賓明定逺人明末任泰安州同知值土寇為亂城陷應徴手刃數人被執罵不絶口曰城破身亡吾事畢矣遂遇害許心亮臨淮人明末為劉兵所執問城中虚實亮拒言火器糧餉甚足劉怒縛於樹截其兩耳亮罵不絶武一諤宿州人為徐王墳世襲祀丞崇禎丙子流寇亂居民盡逃一諤謂職司林木當以死守同妻路氏及子孫闔門罹難有司上其事請恤陳保山臨淮人崇禎八年以都司守臨淮流寇壓境保山力戰於隆平寺死之柳鳴鳳鳳陽人明末司訓安慶流寇破城黨有鳴鳳鄉人欲全之鳴鳳曰丈夫受君恩寧肯偷活可借爾刃礪我頸遂被害孫光啟靈璧人明末為興化教諭城破投泮水未死輿人掖以見帥予以官不受徐永吉夀州人家貧養親自守明末流寇偪令為賊抗節不從賊怒殺之潁州府周伍員字子胥潁之乾谿人父奢為楚平王所殺員走入吳闔廬使為行人謀伐楚魯定公四年與楚戰於柏舉楚師敗績遂入郢闔閭死子夫差立敗越於夫椒越王使使厚幣請和員諫弗聽太宰嚭讒之王賜之屬鏤之劒以死吳人思之為立祠江上晉丁穆字彦逺譙國人為順陽太守苻堅寇順陽穆戰敗被執稱疾不仕後堅傾國南寇穆與闗中人士謀襲長安事泄遇害宋吕祉霍丘人進士官都督參謀紹興間淮西副統制酈瓊叛降於劉豫祉死之妻吳氏亦自縊以殉孫暉霍丘人靖康之亂團結淮民保䕶鄉井擢招信尉建炎中北兵將渡淮暉率兵民禦之城陷死扵勅書樓牛富霍丘人為侍衛馬軍司統制戍襄陽移守樊城累戰不為衂且數射書襄陽城中遺吕文煥相與固守兩城凡六年不拔富力居多城陷富帥兵巷戰身被重傷以頭觸柱赴火死贈靜江軍節度使諡忠烈洪福安豐人夏貴家僮也從貴積勞為鎮巢雄江左軍統制貴降元遣從子招福福斬之元兵攻城久不拔貴至城下好語請單騎入城福信之門啟伏兵起執福并其二子大淵大源福大罵數貴不忠南向而死鞏信安豐軍人為荆湖都統沉勇有謀文天祥開督府信詣之官團練使督府都統制江西招討使天祥自興國趨永豐元兵追之信戰於方石嶺中數矢傷重不能戰自投崖石而死贈清逺軍承宣使立廟旌之元李冕潁州人至正辛卯劉福通作亂以紅巾為號流劫鄉市冕率衆拒之被執罵賊死李黼字子威潁州人冕弟泰定四年廷試第一授翰林修撰累官江州路總管至正十一年徐夀輝將丁普郎來寇黼部署兵民出戰身先陷陣賊大敗黼曰賊不利於陸必由水道薄我乃以長木冒鐡錐於杪暗植水中㑹西南風急賊舟果揚帆鼓噪而至遇樁不得動黼發火箭射之焚溺死者無算拜江州路都總管已而賊勢愈熾黼勢孤援絶賊薄城焚門而入黼叱賊曰殺我毋殺百姓賊刺之墮馬與從子秉昭俱罵賊死事聞贈淮南行省中書左丞隴西郡公諡忠文立廟江州曹彦可亳人至正間妖賊起里中皆不知書羣趨彦可家以刀斧逼之寫旗彦可曰我儒者知有君父豈能為汝寫旗遂遇害事聞諡節愍明李傑霍丘人從征有功調北征陣亡贈鎮國上將軍梁文潁州衛世襲指揮同知正德七年流賊圍潁上勢張甚文率官軍迎撃戰於蓮花鋪奮勇陷陣所向披靡已而賊衆大至衆寡不敵力戰死之詔加優恤陞其子為指揮曽翀字習之霍丘人嘉靖己丑進士授南京刑部主事改御史彈劾不避權勢且論汪鋐罪上罷鋐而惡翀疏中有諍臣杜口語杖之垂斃曰臣言已行臣死何憾竟死追諡忠節張鶴鳴字元平潁州人萬厯丙戍進士授歴城縣知縣厯遷貴州巡撫兵部右侍郎總督陜西三邉晉本部尚書引疾歸復起南工部尚書安奢構禍再授節鉞視師五省懐宗初予告回籍八年流寇攻潁捐金募士授兵登陴城陷被執罵不絶聲備極楚毒而死時年八十五子大同字同甫冦至匿諸弟他所獨隨父見父死伏尸號慟罵賊以死合家男女殉難者十數人張鶴騰字元漢鶴鳴弟萬厯乙未進士授潞城縣知縣調榆次值嵗饑煮粥躬親散給投藥施槥收育棄嬰後皆以張為姓徴户部主事擢郎中累陞雲南副使請告還里流寇至與兄鶴鳴督戰守禦城陷死之王印字雲卿潁州人工五字詩築慧湖别墅游處其間旁有廢塚或勸平之笑曰此亦吾隣也作隣墓記刻石䕶焉更創宗祠以聨族凡冠婚喪祭一以古禮為法流寇至以善射守城及城陷縊於城頭柏樹以死劉廷𫝊字惟中潁州人九光從子為諸生狀貌魁梧任俠好義萬厯末楊應龍反播州調兵及潁潁兵不願行將殺䕶行尉為亂廷傳乃攜酒脯邀於郭外相與雜坐飲啖以微言動之且為保任其家室衆感悟崇禎八年流寇入潁州易衣冠拜祖廟遣子體仁速去賊至瞑目叱之遇害劉廷石字洞甫九光子博通古今書善策事公卿咸欲薦之曰吾不欲由他途進流寇薄潁廷石守西陴竭力堵禦賊乃由北門入被十餘創輿歸伏枕猶口授其兄廷榜及學正周逢泰數百言令繕牘乞隣道兵殺賊遂絶甯儉字堯光潁州人中立子貢入成均以假還里屬流寇熾甚乃散家財募戰士得二百人寇薄城命長男印昌率義勇出南城禦賊賊轉至北據髙樓攻城而城陷矣僕從勸其引避儉不聽與妻楊氏端坐堂上賊至厲聲大罵夫婦同時遇害幼孫龍亦殉焉韓光祖字肇華潁州人進士獻䇿之父宿儒碩學流賊至被執脅使跪叱曰吾生平讀書止知忠義遂大罵賊怒碎其屍妻妾俱死仲子定策字五雲見父遇害手刃二賊被殺孫日曦亦罵賊死劉大濟字汝楫潁州人為名諸生潁陷於賊至西七里河自投於水而死州人私諡曰節慎先生王聘汝字起莘潁州人母時氏殉難聘汝憤甚糾集鄰壯數百人殺賊力戰於楊家店自巳至酉身被數十創死陳繼信字鳳津潁州人工趙仇諸家畫法年六十餘有童騃狀平居自謂善刀劒買一刀刻殺賊報天子五字於柄上賊至結束精嚴或誚其老宜自愛曰公故不知我一命須數命為抵城潰持刀撃賊於南城傷五六人刀折遂見殺郭三杰字荆門潁州人年四十舉於鄉居近北門流寇至登陴助守見西北隅潰投黒龍潭死鹿勁字建功潁州人生負神勇善騎射流賊攻城衆推勁守北門賊附而上者撃踣無算近郭有髙樓俯臨雉堞賊登之矢石交下城破猶巷戰殺賊賊蜂擁而至勁孑身無助中十餘矢乃斃賊怒臠割肢體殆盡事聞祀忠烈祠李從師潁州衛指揮同知領兵二百守城城陷獨身轉戰受十三創而死王廷俊潁州衛指揮僉事防守西門射一賊中額賊識其面城陷磔之田之穎大理寺右寺副李生白光禄寺署丞同妻韓氏李元白光禄寺署丞同妻王氏楊南陜西㑹寜縣知縣劉道逺封文林郎浙江黄巖縣知縣丁嘉遇四川䕫州府學訓導李茂叢貢生楊得坤貢生王之麒潁州衛千户孫陞潁州衛百户羅元慶中所百户田之振潁州衛百户田得民中所百户汪檀前所百户尚日濟武舉人李承訓武舉人汪邦弼候選經厯李維紀諸生同妻趙氏及子女一家十八口投井死王致志諸生同妻唐氏田大生聞于階聞于邦王國泰亓鳳翔卞文斗王乾亨丁嘉運劉栻姚克智丁崇先郭之英姚同寅尚日恒陳純李孕生王致和申華郭之豪田之萃郭瑋馬負圗錢人瑋盧元貞馬寀國馬柱國韓中佐楊于世王啟昌邢元錫熊叶夢王維新李汝珽盧傳世喻天叙楊士貞郭之產郭獬賀嘉貞聞慎言四十一人俱諸生王文煥田之蔚田之茂田之尹四人俱監生張濟民醫官孔道隆祀生田之蕙丁振先二人俱儒士亓中元嚴克長王尚亷亓旋祁標王公枋六人俱處士張肅範王之幹趙謙祁瀛潘守仁汪茂椿張思明黄國八人俱商民王九成工人自田之穎至王九成并妻女家口共一百二十二人皆潁州人死乙亥寇難周應正武平衛人正千户由武舉任浙江都司倭寇犯杭州應正募得義兵千人趨賊營斬首百餘乘勝追至黄山寇突出四面攻圍正力戰被鎗陣亡題奏立祠贈本衛指揮僉事雅元聲亳州人孝廉流寇至亳脅之從聲曰吾登賢書委身於國豈肯作賊賊怒殺之並及其子秦培篤太和諸生崇禎八年流寇至與妻王氏俱被獲賊首欲用之篤曰吾朝廷良士肯委身於賊乎賊又令其叩頭稱千嵗即釋之篤植立不屈嚼齒大罵賊怒碎其齒㫁其舌罵猶不絶夫妻同被害秦思凡太和人流寇抵縣被擒即驅之攻城凡大聲呼城上曰死賊無計攻城不過牛皮覆車以避矢石所懼惟火語未畢賊碎其首守城者遂以柴藁焚皮車城因得全滁州明吳得全椒人洪武中為龍里守禦所千户三十年古州峒蠻作亂攻城得乞兵貴州都司堅守以待賊燒門急攻得開門奮撃中毒弩死贈指揮僉事譚淵滁州人驍勇善射洪武中襲父勝職為燕山䕶衛副千户從靖難戰於真定及壩上馳騎突陣斬獲甚多至夾河搏戰馬蹶被殺永樂初追封崇安侯諡壯節子忠以淵故封新寜伯方政全椒人勇略過人以靖難功累遷都督同知充總兵官出鎮松潘叛番聽命逋亡復業移鎮大同正統初進右都督征麓川援絶突陣死追封威逺伯諡忠毅周賢滁州人景泰初累功至都指揮僉事天順初擢都督僉事赴寜夏寇二萬騎入賢撃之連戰皆捷追至野馬澗中流矢卒賢初坐事下吏自以不復用後釋罪感激誓死報竟如志贈都督同知子玉字廷璧嗣職舉將材厯官至右都督何洪全椒人襲世職正統中從征麓川景泰末從征天柱銅鼓皆有功厯官都指揮使掌四川都司事成化初擢都督僉事留四川趙鐸反數陷城殺吏洪擒斬其將賊引去乘勝陷陣為賊所圍左右跳盪殺賊甚衆力竭而死贈都督同知和州宋蔣子春厯陽人隱居教授建炎初北兵至新塘見子春容儀秀整欲命以官子春怒罵被殺陸有常厯陽人建炎初知臨淄縣抗敵而死事聞贈官廕子龔楫字濟道其先處州人父原崇寜中謫居和州遂家焉楫懦如不勝衣聞北兵南下陷諸郡縣輒忿恚不食誓以必死及北師築堡新塘楫率家僮與鄉兵徃襲之先勝後敗力鬭而殁明耿定和州人宣徳中以薦辟厯刑部郎中有能名出為浙江叅議正統十年處州盜起定引軍𠞰捕率先督戰陷陣而死事聞贈按察使馬如蛟字騰仲和州人天啟壬戌進士授浙江山隂令清操皭然崇禎元年徴授御史以彈劾著直聲出按四川預平安邦彦之亂八年冬獻賊犯和州如蛟方里居傾貲募士與知州黎𢎞業登陴固守麾壯士出擊賊兩戰皆捷㑹風雪晝晦守者皆潰賊遂入城如蛟率士巷戰力竭被殺兄鹽運司判官如蚪弟諸生如虹及家屬十四人皆死詔贈太僕少卿張元楨和州人官鴻臚寺序班歸里後獻賊攻城分守北門城陷被殺贈本寺署丞陳問世陶應昌陶應賡姚承舜趙世光以上俱和州諸生獻賊破城問世以衛母見殺餘悉掖母投水死楊鳳墀王良翰王之節宋鶴齡成建中李寅陽郝萬秋馬文卿盛唐盛美以上俱和州人城陷鳳墀闔門殉節餘皆不屈死俞應登含山人崇禎中由貢厯即墨縣教諭獻賊破含邑不屈死劉芳逺字芝南和州人崇禎十四年嵗貢授嘉定訓導十七年闖寇陷北都芳逺聞變哀慟整衣冠北向拜畢坐明倫堂自刎張秉純徐正夫俱和州諸生聞北都之變秉純絶粒死正夫自縊廣徳州宋王汝翼建平人知廣徳縣元兵入境汝翼死之明夏魁暘字宿甫建平人以貢訓奉化攝浦江縣事賊陷義烏及浦江魁暘誓衆登陴城破被執抗罵不屈殞於池六安州明徐公輔六安人以軍功從太祖征陳友諒戰死鄱陽湖中後贈東海郡侯廟祀康郎山徐瑾六安人正統間為鄞縣丞處州盜起瑾率壯士邀撃數有功因援兵不至死之朝廷遣使優恤廕一子劉㑹字嘉㑹英山人正統乙丑進士官户部主事己巳北征主事羅紳當扈從適母病㑹與紳同年相友善請代行土木之難遂罹害景泰初勅奬廕子入監劉世芳字穎玉英山拔貢生厯任廬陵宛平丞陞新河令超擢濟南僉事未至任甲申三月流賊陷京城得報仰天慟哭以頭觸柱嘔血數升卒黄今度字國顔六安人明季壬午流賊攻城今度破產偕紳士固守城陷被執諭以歸順今度大罵誓不欲生賊怒以髮繋馬曵之而走力脱躍城濠中四面射之皆不中溺死直立水中面目如生髮指眥裂其弟今文亦殉難死妻徐哭累年亦死張國正六安人世襲千户陞指揮明季壬午流寇襲城國正督衆巷戰中流矢死子斯美奔救亦死時鎮撫陶賡明指揮劉良佐文學田呈芳梅國秀霍山黄中理劉炫吳時道張大翼李懐信胡瑋江源洞宋貞及時際順等均不屈節死泗州晉劉翼淮陵人衡陽太守永昌之亂起兵復晉祚力戰死之南北朝宋劉位招信縣横山人靖康初率數百人勤王將行㑹淮上盜起部使者檄位保鄉井盜畏其鋒號横山劉家軍建炎三年合兵收復滁州即攝州事敵奄至城下出戰中流矢歿於陣詔贈建寜節度使建廟於滁賜號剛烈梁任孝恭臨淮人幼孤事母至孝家貧無書從人借讀一過目略無所遺梁武帝聞其才召入西省為司文侍郎文筆敏速毎奏稱善侯景之亂不屈被害明耿再成字徳甫五河人從太祖渡江多著勞績累陞行樞密院判官守處州㑹苖軍叛再成聞變即上馬收兵不及迎賊痛罵遂被害追封髙陽郡公諡武壯子天璧見武功井孚盱眙人洪武中鎮守龍里古州洞蠻林寛作亂燒城門孚戰死贈正千户世襲李紹賢字崇徳盱眙人正徳丁丑進士授行人嘗頒詔至徐州有中使席班首立命撤之中使愕然去諌武宗南巡廷杖死嘉靖初贈御史姚允恭盱眙人由貢任霍山訓導教士有方秉性剛毅值流寇臨城冠帶坐明倫堂罵賊殉難事聞贈國子監學録王養正字聖功州人崇禎元年進士厯官南康知府殱巨寇鄧毛溪熊髙一方賴之後分巡建昌城破被執死陳濟世字斗華五河人由嵗貢任沭陽縣訓導致仕歸里崇禎十六年流寇破城縱兵肆掠濟世曰為國諸生不能殺賊當守不能守當死忍坐視其淫掠乎遂整冠帶同妻趙氏坐明倫堂罵賊而死國朝周永緒字繩武盱眙人順治六年進士為廣西副使遇寇殉難於平樂贈光禄寺少卿江南通志卷一百五十六欽定四庫全書
