body:
  text: 江南通志卷一百四十二人物志宦績四常州一府常州府後漢王關字選公無錫人明易及天文更始中為侍御史終陳留太守不交豪强人號王獨坐彭循字子陽毗陵人建國二年海賊丁儀等萬人據吳太守聞循勇謀以為邑令循曉儀利害應時散去民歌之曰時嵗倉卒賊縱橫大㦸强弩不可當賴有賢令彭子陽三國吳周魴字子魚陽羡人父賓少折節好交守廣平多政績魴舉孝廉為寧國長錢塘大帥彭式為寇以魴為令旬月平之遷丹陽西部都尉鄱陽太守誘魏大司馬曹休入皖邀擊勝之在郡十二年恩威並行子處見忠節晉周玘字宣佩處長子强毅沈斷有父風烈石氷據江夏陳敏反揚州及錢璯寇陽羡皆率兵討斬之三定江南元帝特置義興郡以旌之為吳興太守甚有威惠百姓敬愛卒諡忠烈南北朝齊蕭惠基思話第三子姊為桂陽王休範妃休範叛高帝以惠基為軍副了不自疑袁粲劉秉起兵秉是惠基姊夫惠基安靜無預帝益恩信永明中為侍中尚書令蕭赤斧南蘭陵人為雍州刺史勤於奉公不營産利纍遷太子詹事卒於家貧無絹為衾子穎胄好文義穎達好武勇武帝曰兄文弟武宗室便不乏才後穎胄厯官侍中尚書令穎達終左衛將軍蕭緬字景業南蘭陵人自五兵尚書出為吳郡太守有能名厯遷雍州刺史所部畏愛及卒喪還百姓緣沔水悲泣設祭峴山為立祠周山圖字季寂義興人宋元嘉中領白衣隊拒魏兵於瓜步以功加鎮軍將軍後事齊高帝勸帝除沈攸之及攸之攻郢城預䇿其不能克又贊世子頤留屯湓口帝是之領御前西廂直衛蕭敷字仲達南蘭陵人少有學業為隨郡內史招懷逺近士庶安之以為前後之政莫及明帝深稱敷風化之美蕭嶷字宣儼蘭陵人都督荆州初沈攸之開人告訐囚繫甚衆嶷至鎮一日遣三千人市租素重悉為寬假及為南蠻校尉開館立學風教大振梁蕭景字子昭南蘭陵人初仕齊為永寧令政為百城最武帝踐阼厯南兗雍二州刺史吏人畏敬抄盜絶迹又監揚州尤稱明斷遷都督郢州復有能名卒諡曰忠子勵厯守淮南宣城豫章皆有善政及遷廣州去豫章人吏俱齎糧食逺送數百里蕭昂字子明景弟厯輕車將軍監南兖州初兄景為兖州德惠在人及昂來代時人方之漢馮氏終江州刺史蕭洽字宏稱惠基子齊永明中舉明經梁為南徐州治中近畿重鎮前後居者皆致巨富洽清身守職妻子不免饑寒纍遷臨海太守為政清平不尚威猛蕭介字茂鏡南蘭陵人少穎悟有器識大同中為武陵王府長史以清白稱出為始興太守甚著威德厯遷都官尚書每軍國大事必先訪介帝謂朱异曰端右才也太清中帝納侯景介上表極諫帝省表嘆息卒不能用蕭琛字彥瑜惠基從子起家齊太學博士天監中遷吳興太守郡有項羽祠於郡㕔事安神座守多避舍琛至叱曰生不能與漢祖爭中原久據此何也撤之後頻蒞大郡有名聲不事資産陳蕭引字叔休介子方正有器度避侯景亂南適嶺表廣州刺史歐陽紇有異圖引數規正之及陳平番禺引北還厯庫部侍郎掌知營造自吕梁之敗戎儲空匱引在職一年器械充足後主即位為中庶子建康令以請屬不行被譛免官唐蕭瑀字時文梁明帝子也以女兄為隋晉王妃厯拜內史侍郎出守河池郡擊降部內鈔賊萬人又擊走薛舉後歸唐封宋國公署秦王府司馬委以樞管與房杜不協屢免官輒復起太宗嘗賜詩曰疾風知徑草板蕩識誠臣後拜太子太保同中書門下三品卒詔贈司空曽孫定為袁潤等六州刺史治最擢太子少師贈太子太師蕭鈞瑀從子永徽中纍遷諫議大夫𢎞文館學士能直諫終太子率更令子瓘渝州長史居母喪毁卒瓘子嵩有定瓜州擊吐蕃功授同中書門下三品中書令子衡衡子復復子湛湛子置置子遘皆宰相衡弟華華子恆恆子俯恆弟悟悟子倣亦宰相自瑀至遘凡八葉蔣儼義興人貞觀中擢明經第為右屯衛兵曹參軍太宗將伐高麗募為使人皆憚行儼獨奮然請往為莫離支所執以兵脅之不屈高麗平得歸帝壯其節授朝散大夫高宗朝進蒲州刺史摘伏戢姦號良二千石後封義興縣子高智周晉陵人舉進士為費令取俸與丞尉均民安其化纍遷壽州刺史治尚文雅行部先見諸生質經義及政得失既乃録獄訟課耕桑儀鳯初拜同中書門下三品卒年八十二諡曰定薛登義興人父士通隋末為鷹揚郎將江都亂據城拒賊武德初持地自歸終泉州刺史登通貫文史少與劉知幾齊名武后時纍遷左補闕疏言選舉不宜濫又諫四夷質子不宜留京師出刺常州有政績遷左丞睿宗初為御史大夫忤太平公主出為岐州刺史後歸田家苦貧詔給致仕祿蔣乂字德源義興人有史才貞元間厯官起居舍人轉司勳員外皆兼史職嘗疏裴延齡罪惡拒王叔文不與交當世高之元和中預修德宗實録纍遷祕書監卒諡曰懿長子係官史館修撰參修憲宗實録踵修國史次子伸相宣宗季子偕厯史官修撰撰唐厯及文宗實録俱有名徐仁紀晉陵人聖厯中授右拾遺數論事不合遂移疾歸神龍初宣慰使表其行可勵俗召拜右補闕復抗言出為靈昌令宋張觀字仲實毗陵人南唐進士歸宋拜監察御史會三司言劍外賦輕詔觀往按諸州稍增之觀疏言不便太宗然之厯知黃州揚州皆有善政雅好論事辭理切直遷廣南轉運蔣堂字希魯宜興人舉祥符五年進士官監察御史禁中火宫人多屬吏堂言火起無迹宜修德應變歸咎宫人是重天譴詔原之論郭后不當廢坐贖知越州奏復鑑湖之為豪右侵者為江淮制置發運使厯守蘇杭二州以尚書禮部侍郎致仕卒清修好學有吳門集二十卷胡宿字武平晉陵人舉進士尉揚子救溺數千人通判宣州決婦殺其夫之獄以出平民之被誣者知湖州築石塘百里捍水患民號曰胡公塘召知制誥言禮部貢士當用三年之制從之唐介貶嶺南中使護往宿言介如道死受殺直臣名帝為追還中使拜樞密副使言南北通好六十年不宜以捕魚伐葦細事生釁卒諡文恭子宗炎善為詩藻思清婉舉進士官鴻臚卿館遼使能尊國體厯知密州卒錢公輔字君倚武進人少從胡瑗學第進士甲科知明州進知制誥英宗立陳治平十議以不草翰林學士王疇制謫滁州團練使神宗初復知制誥兼知諫院忤王安石出知江寧府帝欲召還安石扼不可徙揚州提舉崇福觀卒錢顗字安道無錫人慶厯六年進士知烏程贛二縣皆以治行聞治平末召拜監察御史裏行王安石行新法顗論其談堯舜而首財利謫衢州監稅後徙秀州家貧母老丐貸以給朝夕蘇軾贈以詩有烏府先生鐵作肝之句世因目為鐵肝御史葛宫字公雅江陰人舉進士知南劍州土豪彭孫憑山澤為盜宫遣沙縣尉諭降之並溪山多産銅銀吏挾姦罔利課嵗不登宫變其法嵗羡餘六百萬三司使聞於朝論當賞宫曰天地所産吾顧盜之又可為功乎徙知滁秀二州秀介江湖間吏為關涇瀆上以征往來者民苦之宫命撤毁厯官工部侍郎蔣之竒字穎叔堂從子舉嘉祐三年進士官太常博士擢御史上謹始五事厯淮東轉運副使修水利以食流民揚之天長宿之臨渙橫斜三溝尤其大者溉田至九千頃擢江淮荆浙發運副使元豐六年漕粟至京師計六百二十萬石鑿龜山至洪澤為新河以避淮險自是無覆溺之患知廣州以平寇功除寶文閣待制紹聖中進翰林學士鄒浩以言事獲罪之竒貽書通問責守汝州徽宗立召還擢知樞密院事尋罷之竒為部使十二任六典會府以幹辦稱胡宗愈字完夫宿從子舉進士甲科宿謝政英宗問子弟誰可繼者以宗愈對召試學士院神宗立兼知諫院爭李定不當為御史忤王安石通判真州厯御史中丞哲宗問朋黨之弊具君子無黨論以進擢尚書右丞知成都以清靜稱拜吏部尚書卒錢即字中道宜興人舉熙寧九年進士崇寧中為陜西轉運判官轉餉稱最召對陳靈武大寨泉不可取知慶州築安邊城包地萬頃縱耕其中嵗得粟數十萬知延安府童貫宣撫陜西高估金帛賤入民粟關中騷然即極陳其害貶永州團練副使起知興仁府徙太原卒諡忠定佘中字行老宜興人熙寧五年偕兄貫試禮部中預選而貫黜請黜已而薦兄有司雖不許士論嘉之次年魁廷對紹聖二年使遼還奏河朔城隍隳圮乞葺治以戒不虞宣靖間金人長驅入議者始思其言以諫新法忤㫖謫霅川守致仕邵材字聖規宜興人熙寧問與父潜同舉進士嘗為監察御史郡上疑獄刑部議當貸死用事者以為不當貸仍欲坐言貸者材抗言如此恐獄吏由此不復以疑獄聞矣時司馬光極論新法之害王安石屬材劾光材曰君實正人可厚誣乎即自劾歸蔣靜字叔明宜興人元豐中舉進士調安仁令俗好巫疫癘流行病者寧死不服藥靜悉論巫罪毁淫像三百投諸江徽宗時厯顯謨閣待制知江寧府茅山道士劉混康以方技得幸其徒倚為姦利靜皆置之法鄒浩字志完晉陵人元豐中舉進士哲宗朝官右正言有請以王安石三經義發題試士者浩論其不可陜西奏邊功中外皆賀浩獨言持勝為難京東大水浩言宜思消復之實蹇序辰看詳元祐章奏詆欺不平浩言威福操柄不宜下移又劾章惇不忠慢上未報賢妃劉氏立復力爭不可惇詆其狂妄削官羈管新州徽宗立召還遷左司諫蔡京用事責衡州又竄昭州五年始得歸稍復直龍圖閣疾作楊時往省之僅存餘息猶眷眷以國事為問語不及私高宗即位贈寶文閣直學士諡曰忠子柄陳瓘稱其才高識逺仕終天台守胡交修字已懋宗愈從子崇寧中進士中詞學兼茂科建炎中厯給事中直學士院李成盜江淮朝議親征上言此將帥之責不足辱王師議遂寢時欲以四川交子行之諸路極陳不可又諫大舉之非薦從子世將守蜀號稱名帥出知合州卒交修三入翰林號稱職自宿宗愈至交修世將皆任禁林交修裒次為書號世絲綸集以侈一門之盛胡世將字承公宿曽孫與交修同舉進士纍官刑部侍郎出知洪州兼江西安撫使建昌兵變以便宜發兵討平之知成都府安撫四川吳玠以軍乏糧奏請用世將議用轉般摺運之法軍儲稍充公私便之玠卒代宣撫川陜拒守有功收復隴州破岐下諸屯以疾卒於軍諡忠獻霍端友字仁仲武進人舉崇寧六年進士第一厯官禮部侍郎疏請侍從補外即請郡除待制知陳州陳地汙下久雨積潦水不時泄乃益開新河二百里達於淮水患遂去致仕卒胡珵字德輝晉陵人宣和中進士受學於楊時太學生陳東上書理為潤色其文又與李綱同舟東下謫梧州召為史館校勘趙鼎當國以熙豐元祐舊史蕪穢屬珵筆削以論和議忤秦檜罷張守字子固晉陵人舉進士再中詞學兼茂科厯監察御史高宗駐蹕維揚上防淮渡江六事忤執政意遣撫諭京城還奏金人必來願蚤為備知福州止築城之議時諸將皆以獻俘為功守言西河山東民皆陛下赤子驅迫以來宜貸使歸願留者聽又請蠲閩民貸常平緡錢十五萬召拜參知政事徙知紹興府建康謀帥上曰建康重地大臣有德望者惟張守可至鎮卒諡文靖孫抑户部侍郎周葵字立義宜興人宣和六年進士高宗駐驆臨安擢監察御史徙殿中侍御史在職僅兩月言事至三十章後以忤秦檜落職檜死起知紹興府孝宗即位除兵部右侍郎手詔問錢穀出入葵言人主不宜留心細故必有小人導之蓋指龍大淵曽覿也孝宗色動拜參知政事同知樞密院卒諡簡惠有文集奏議喻樗字子才自祥符徙家無錫少慕伊洛之學從楊時游舉進士以趙鼎薦授祕書省正字力言和議之非忤秦檜出判衡州致仕檜死起大宗正丞厯擢浙東提舉常平以治績聞樗有人倫鑒張九成沈晦樊光逺輩未第時俱以第一人期之後果然有易義四書性理講解學者稱玉泉先生尤袤字延之無錫人舉進士為泰興令修築舊城金兵入揚州獨泰興以有城得全民為立生祠遷著作郎以言事出守台州築城捍水除江東提舉常平值嵗旱單車行部核一路常平米通有無以賑貸又推行朱熹荒政於諸郡除太常少卿兼直學士院高宗恤禮廟號皆袤討定光宗即位奏願謹初戒始召除給事中繳還內除敕令擢禮部尚書力勸帝孝事重華宫袤少從喻樗游得程頤之傳方乾道淳熙間道學為人所忌袤在掖垣首言道學有益於治道孝宗然之卒諡文簡有遂初文集孫焴禮部尚書蔣芾字子禮之竒曽孫舉紹興中進士第二人授建康理官孝宗即位擢起居郎首奏加意邊防厯遷參知政事同知國用請停招兵以足食為籌邊志上之拜右僕射同平章事上鋭意恢復力陳天時人事未可忤㫖罷政李祥字元德無錫人隆興元年進士厯提舉淮東淮西運判兩淮錢不定祥奏請更鑄紹興新錢從之遷國子祭酒丞相趙汝愚去國祥上疏力爭公論藉以立卒諡肅簡邱崈字宗卿江陰軍人隆興進士為建康府幕官以丞相虞允文薦召對言恢復之志不可忘恢復之事未易舉出知秀州華亭捍海堰廢潮嵗壞田蘇湖皆被害奏築三月堰成潟鹵復為良田纍擢四川安撫使吳挺死崈乞選他將代之遂革世將之患後挺子曦復為蜀帥遂叛人服崈先見遷刑部尚書江淮宣撫使金兵入淮或勸崈棄廬和守江崈曰棄淮則與敵共長江之險矣吾當與淮南俱存亡拜同知樞密院事卒諡忠定葛邲字楚輔江陰人舉進士厯正言遷給事中外戚濫恩除官邲皆繳奏不行紹熙初拜左丞相専守祖宗法度薦進人物卒諡文定配享光宗廟蔣重珍字良貴無錫人少從尤袤學嘉定十六年進士第一簽判建康軍首以本心外物二者界限為言差通判鎮江府會火災應詔陳言上讀之感動端平初入對請召用真德秀魏了翁時議出師關洛重珍力爭不聽遂自劾後以守刑部侍郎致仕卒諡忠文吳懋字禹功晉陵人崇寧進士調當塗縣主簿嵗饑官出粟糶民坌集他吏監者多擾亂蹂踐懋以灰布地疏其行列人無譁者決更十數令不決之訟入為吏部員外郎責王時雍於政事堂至欲以笏擊之後知明州輯兵民著功效耿秉字直之江陰人紹興中進士律已清方所至以利民為事兩為浙漕始以江陰軍認納和買絹匹不堪請以酒息輸代繼奏本路數邑版賦重請蠲減得減萬數又申請役法六事至今遵用厯官煥章閣待制蔡戡字定夫晉陵人登乾道間甲科持節五年所部十四郡嵗以礦銀為病戡出羡代輸民甚德之擢河南憲使折李昂霄之亂於方萌寧宗朝為京尹嵗潦糴艱戡請發倉粟托胄相請老丁逢字端叔晉陵人乾道間進士金使來賀生辰怙强驕黠逢曰示弱何以為國上書乞上方劍斬之上批付宰相此人才氣可用令安豐盱眙二縣皆有殊績除川秦茶馬使屏供張修馬政纍官寶謨閣待制强翊字君翔晉陵人元豐五年除金壇簿章惇少與翊善翊漸覺惇傾險心惡之惇居潤時翊任屬邑惇問慰殷至而翊未嘗通一書及惇以宰相起翊自若也尋引年致仕元陸垕字仁重江陰人以孝友聞至元間丞相巴延兵南下垕時未冠直入軍門論議有合兵不入境奏授同知徽州路總管府事纍遷浙西廉訪使抑豪强誅貪墨奏免儒役及舉行助役法乞終養歸卒諡莊簡陳文杰字漢卿武進人以薦授慶元儒學正浙東帥重其名遣二子就學二子挾貴胄無弟子禮羣蒼頭日臂鷹鷂躙學舍文杰呵之撲教二子奪鷹縱之復具以白帥帥益悚敬尋辟為掾纍擢東流尹明毛節字伯尚武進人洪武時以三老奏事入京題詩金山寺上遊幸見之大稱賞即授御史巡按江西出行部毁淫祠鋤强暴一境以寧王思明字克明武進人洪武初以薦召侍燕邸以所校綱目及大學衍義獻卒諡康懿朱顒字德觀靖江人洪武初以才行舉為臨江守報最擢吏部侍郎錢本中字德文武進人洪武中以薦知吉水縣單騎入山谷中撫降亂民之嘯聚者凡數萬人後以事免父老奔走乞留學士胡廣薦之復任吉水民聞本中來空閭井迎拜卒於官民哀慕留葬其地嵗時奠祭之吳肇無錫人洪武間以耆老拜御史建文中諫削奪親藩太驟又力言李景隆不可用丁父憂歸聞靖難兵入都痛哭幾絶隱孟墅以醫養母時靖江朱昶以薦厯秦府長史文皇繼統堅乞歸田有雪江集胡濙字源潔武進人建文二年進士授給事中成祖即位疑建文帝尚在遣濙遍巡天下遷禮部侍郎仁宗時陳十事並嘉納之轉國子祭酒宣德初進禮部尚書正統時奏汰法王以下番僧千餘人景泰中進太子少傅加太子太師英宗復位乞歸卒年八十九贈太保諡忠安濙喜怒不形人稱其德量厯事六帝十知貢舉殷序字序賓無錫人永樂甲申進士厯四川布政使北京初建採木於蜀序督役有法宣德中平茂州賊有功轉雲南致仕卒段民字時舉武進人永樂甲申進士官刑部郎以平恕稱為山東參政時妖婦唐賽兒遁大索天下出家婦女民力為矜宥人情始安車駕北征轉餉出塞費省事給擢刑部侍郎卒諡襄介子實端介有父風纍官福建參政曽孫金官户部主事有廉聲嚴本字志道江陰人永樂中以薦授刑部主事從尚書宋禮採木於蜀遇烏䝉蠻持兵猝至本論以朝廷威德皆懾伏散去遷大理寺正前後皆厯法官平反寃獄甚衆倪敬字汝敬無錫人祖父峻洪武時鄉舉官給事中諫文皇佞佛忤㫖出使占城剛正不撓敬正統戊辰進士授御史出按山西戍將侵餉者悉治之再按福建時議開銀礦抗疏得寢景泰間陳敬天修德六事謫宜山縣典史天順初知祥符縣從安逺侯栁溥西征師旋道卒楊璿字叔璣無錫人五世同居正統己未進士纍官都御史厯秦晉楚豫及撫畿內皆著聲績王謙字益夫武進人官中書舍人因災異奏疏剴切景泰初以太常卿出守䕫州治行為蜀最䕫人畫像祀之杜宥字叔寬江陰人景泰甲戌進士擢御史以災異直言謫典史遷英德知縣時鄰境多寇宥創立縣城賊至死守圍不解夜縋士焚其營賊驚潰去移韶州通判歸盛顒字時望無錫人景泰辛未進士天順時以劾石亨曹吉祥由御史謫知束鹿縣立九則法以均徭役訟者片言折之民謡曰束鹿令錫山盛清如水明如鏡郊外有隙地爭來築室居之遂成市號清官店纍擢都御史巡撫山東境內旱饑顒大修荒政民賴以濟趙敔字叔成武進人景泰甲戌進士授御史因言事謫官尋召還成化初首訟于謙等寃出按江西嵗旱奏免逋糧二百六十餘萬貸鹽鈔二載免漕運一年秩滿即擢江西按察使以忤權貴罷劉本道江陰人由掾吏從靖逺伯王驥征雲南纍官户部侍郎總督糧儲先是漕運京糧陸運四十餘里本道建議令京軍歇操餘月運糧至京而漕運之糧止通州交納嵗省羡耗五十餘萬石時同邑徐晞亦由掾吏起家厯官至兵部尚書以德量稱徐溥字時用宜興人景泰甲戌廷試第二人授編修厯吏部侍郎𢎞治初拜文淵閣大學士以目眚乞歸卒諡文靖溥性凝重為首輔承劉吉恣睢之後鎮以安靜務守成法事有不可輒疏爭之時稱名相嘗再廬墓置義田以贍族人所著有謙齊集王㒜字廷貴武進人忠子也景泰辛未賜進士第三人為南京祭酒修舉教法士風丕變纍官吏部尚書為人言動不茍以孝友稱憫兄子澄之孤移其廕廕之嘗購得楊氏别業其先塋在焉將徙之㒜不可為闕其垣使祭掃子沂字希曽成化乙未進士卒官副都御史事父至孝中裙厠牏身自浣滌雖貴顯賓至侍立無倦所得恩蔭以讓其姪白昂字廷儀武進人天順丁丑進士厯給事中纍擢兵部侍郎河決武原昂奉敕往治有功進刑部尚書詔修問刑條例昂列定百餘事內行謹飭痛弟蚤世移蔭其子立義學以教宗人卒諡康敏子圻由進士厯官右副都御史總督南京倉儲所蒞皆著政績吳淵字本深武進人天順丁丑進士厯守福州多雪寃獄逋租萬數勸諭有方民不擾而公賦足同邑毛珵以舉人厯泉州守有清節秦䕫字廷韶無錫人天順庚辰進士守武昌治行為湖廣第一纍官江西布政所至惠澤及人既去皆立祠祀焉父殁䕫年六十餘哀毁感疾卒子鋭字國英執喪廬墓建祖祠設祭田薛為學字志淵武進人成化丙戌進士授監察御史遇事敢言掌法司章疏有能名安撫荆襄流民宣布威德衆賴輯寧既沒民立祠祀之陸簡字廉伯武進人成化丙戌廷試第三人授編修預修宋元綱目纍擢詹事兩典㑹試號得人卒於官簡學問該博識度超逺有龍臯集華山字仁甫無錫人成化乙未進士知許州有貴家子犯法當死監司欲曲全之山力爭卒抵於法有奸民以地獻鈞州徽王府山執不與入為部曹擢湖廣右參議賑鄖陽饑築房山城政績尤偉周字克禮武進人成化戊戌進士知萬載縣以剛直忤郡守調永春剖決疑獄人服其神遷太僕丞卒時無錫張遜由舉人厯涿州守亦以善決疑獄稱陳周字文美無錫人成化辛丑進士授户部主事議開引鹽商人賄司徒以請周曰引故欲開不當以賄力持不可出為河南參政周王侵民田周判還民行部得穴金檄令償汝民逋租民為建却金亭時武進蔣容江陰邵經俱以進士先後守潞州力繩瀋藩之不法為王所奏徵下獄後釋歸莫驄字日良無錫人成化甲辰進士授工部主事管濟寧閘旁有月河嵗決為患驄改壩建石閘嵗省費數萬終兵部郎有頤齊集時同邑繆昌亦以進士官工部主事奉敕勘勢家地還民終四川布政使張愷字元之無錫人成化甲辰進士知東平州時大璫李興治水張秋所至笞辱長吏以要貨賄獨愷徒手謁之璫知其廉無所問擢守黎平戢軍惠民諸苗感化見黜於逆瑾瑾誅升福建鹽運使以疾歸行李蕭然生平未嘗一介取人居家三十年未嘗一入公府盜嘗夜入其室發篋空無所得嗟嘆去吳儼字克溫宜興人成化丁未進士選庶吉士屢遷侍講學士掌南京翰林院以忤劉瑾被斥瑾誅復官纍擢禮部尚書武宗北巡抗疏極諫卒諡文肅從弟仕由進士厯督晉閩粵豫學政校士精審仕孫士貞令上虞有聲厯禮科給事中王珀字廷瑞武進人成化丁未進士授御史巡南城以忤中涓貴戚謫官遷南雄知府善治疑獄郡有𣙜場前守率以墨敗珀錙銖無私華津字濟之無錫人成化丁未進士授松滋令以卓異擢刑部主事遇疑獄反覆參鞫盡求生之道改户部嘗監通州倉有怙內監勢請事者峻拒之厯廣平知府太僕丞欲收養馬民免地稅錢十之五津憫民久困養馬之纍遂白巡撫寢其事遷山西參議卒胡華字惟峻武進人成化丁未進士授御史搏擊不避權貴屢奉敕巡方皆有能名厯官布政使徐紘字朝文武進人𢎞治庚戌進士厯升廣東按察司僉事分巡嶺東式陳獻章廬建周敦頤書院築堤扞海潮嶺南蠻蛋雜居吏多不檢紘發姦摘伏墨吏望風解綬升雲南按察副使秦金字國聲無錫人𢎞治癸丑進士厯官河南參政行部至封邱擊敗流寇纍擢巡撫湖廣擒斬劇盜討平郴桂及香爐山諸苗嘉靖初為户部尚書以爭興獻太后上尊號事忤㫖罷後起南京户工二部尚書致仕卒諡端敏著有鳯山集夏從壽字如山江陰人𢎞治癸丑進士官户部郎忤劉瑾落職瑾誅厯福建布政使減市舶踰制罪以清盜源留嵗解羡餘以贍軍食擢撫鄖陽乞致仕歸時同邑高貫以進士官浙江副使有剛直稱陳策字嘉言無錫人𢎞治癸丑進士守饒州盜據桃源洞單騎入巢諭降之以洞阻深僻奏建萬年縣擢福建參政平汀漳盜遷江西左布政宸濠亂後撫綏凋瘵民賴以寧貢安甫字克仁江陰人𢎞治丙辰進士由知縣擢南御史劾壽寧侯張鶴齡怙寵驕恣武宗即位劉瑾擅政輔臣劉健謝遷相繼罷安甫疏爭之瑾怒下獄廷杖斥為民瑾誅起山東僉事尋引疾歸黃昭字明甫江陰人𢎞治丙辰進士官職方主事拒絶諸璫干請忤劉瑾罷起福建按察副使黃田山寇嘯聚聞昭往皆散去又以計平亂兵昭在正德中與同邑貢安甫史良佐並列黨籍華昶字文光無錫人𢎞治丙辰進士官户科給事中未半載疏七上己未會試劾罷考官程敏政調南太僕主簿厯遷四川參政鎮守內臣以重賂啖昶欲市茶西邊以規利峻却不許事遂寢終福建布政有雙梧集湯沐字新之江陰人𢎞治丙辰進士由知縣擢御史忤劉瑾謫官起廣東僉事釐剔鹽政諸弊以楊一清薦擢浙江布政平孝豐寇嘉靖初巡撫四川平松潘寇入為大理卿李福達獄起以奏讞忤㫖罷莊襗字誠之武進人𢎞治丙辰進士令寶坻外戚中官窟穴為奸襗悉裁以法邑舊無城襗請築之二旬而畢冢宰倪嶽疏襗政績十七條行之天下擢户部主事出督徐倉發粟賑荒不待奏報以忤劉瑾罷嘉靖初應詔陳江南十事特命所司行之史良佐字禹臣江陰人𢎞治己未進士由行人擢南御史正德初與同官共劾劉瑾請留輔臣劉健謝遷下詔獄廷杖削籍歸後起雲南副使平十八寨叛苗濬治滇池海口溉田千頃滇人德之劉乾靖江人𢎞治己未進士官户部郎以廉明稱屢出督餉薊州民為立生祠以忤劉瑾再被逮厯南光祿卿請移本寺額辦煮醪於北寺詔從之省費十倍葛嵩字鍾甫無錫人𢎞治己未進士由行人擢給事中閲冀州軍儲核貴戚所侵地歸之民武宗初詔核在京諸營衛嵩釐剔無所狥積弊盡革又請出先朝宫人罷田獵誅奄豎忤劉瑾斥罷徐問字用中武進人𢎞治壬戌進士守登州盜賊屏跡調臨江築堤七十二所以和民纍擢巡撫貴州以平獨山土司䝉鉞功拜兵部右侍郎厯南户部尚書乞歸卒諡莊裕問清操絶俗敝廬蕭然田不滿百生平學宗紫陽有讀書劄記山堂萃稿薛金字子純江陰人𢎞治壬戌進士官給事中劾劉瑾冒耗內帑謫詹事府主簿後擢廣西僉事平妖人李通保之亂招集岑流諸邑民全活無算有治齊集承天秀字鍾之靖江人正德丁卯舉人令錢塘織監畢某謀逆天秀勒兵為備奄不敢發事聞奄伏誅天秀以功擢南陽同知丁致祥字原德武進人正德戊辰進士授户部主事監軍儲理鹽課奸弊一清漕舟自江達淮每多阻滯致祥督漕興復儀真舊閘嵗省費萬計厯陜西副使撫漢中流民威惠並行周金字子庚武進人正德戊辰進士官給事中都督馬昂納有妊女弟於後宫金請誅昂而却其女嘉靖中厯撫延綏宣府散遣驕卒之圍帥府者纍擢南京户部尚書致仕卒諡襄敏毛憲字式之武進人正德辛未進士擢給事中疏斥大臣為奸者數人武宗西幸力請回鑾不報謝病歸有古菴文集毗陵人品記顧可久字與新無錫人正德甲戌進士授行人諫武宗南巡下獄廷杖謫國子學正世宗即位擢户部郎議禮忤㫖復杖闕下厯廣東副使備兵瓊海先是峝黎出劫及可久至皆望風款附嘗按行諸郡咨詢黎倭出沒之處相其厄塞險阻而為之備禦繪成圖說後人遵用輒效為軍中指南云蔣同仁字公甫武進人正德甲戌進士官寺正嘉靖初詔按閩獄多平反癸未議大禮伏闕受杖幾斃厯官參議周振武進人正德丙子舉人初令餘干再任天台有橋當要道水湍激每造輒圮振禱於神因以石柱砥之橋遂成邑人神之名曰晉陵橋前後為縣八年俸入悉代貧民輸負至入覲不能具道里費兩縣之民立祠祀之餘干堂下有槐久枯振至復茂人以為德政所感云楊淮字東川無錫人正德丁丑進士授户部主事監淮通二倉除囤基及額外席草費罷中官茶果之供監內庫奄人例有供餽悉絶之厯郎中以公勤廉慎稱嘉靖初切諫興獻帝祔廟再被廷杖卒後贈太常少卿惲釜字器之武進人正德辛巳進士知安陸州獻陵更制董役中官恣肆御以禮法遷知溫州府人以十善頌之郡人張孚敬當國釜同年也惡其剛直不阿調成都張衮字補之江陰人正德辛巳進士厯國子監祭酒世廟時逮繫議禮諸臣侍郎何孟春員外林惟聰等抗疏忤㫖衮上疏申救奏罷陜西織造止雲南採辦撤浙江內監有水南集江陰縣志華金字子宜無錫人正德辛巳進士厯天津副使以抗直忤上官乞致仕歸至戚陸完為太宰金在都足不及其門完敗收其母喪於獄并恤其孤同年張孚敬貴顯欲援以共事金峻却之孫鑾字朝望武進人正德辛巳進士授刑部主事嘗勘一獄侍郎某授之意鑾不可出讞楚獄寃抑悉得平反守漢中修堰溉田置衛辨之貪墨者於法厯雲南副使邊儲素窘鑾括羡賦捐浮費積至萬緡擢太僕卿歸華察字子潜無錫人嘉靖丙戌進士居部曹與王慎中唐順之輩講習詩古文有名纍官侍讀學士掌南翰林院嘗奉使朝鮮却國王餽典鄉會試稱得人居鄉築城繕學減租助役尤多義舉唐音字希古武進人嘉靖戊子舉人令雞澤清介自持上官下令有不合輒格不行後卒官幾無以殮自部使者以下皆賻之子一麟堅辭不受一麟後舉進士官南吏部亦以節行著唐順之字應德武進人嘉靖己丑㑹試第一選庶吉士調兵部主事改編修忤座主張孚敬以吏部主事罷歸久之選宫僚起春坊司諫疏請元旦朝東宫復削籍時屢有邊警又倭躙江南北以薦起厯兵部郎中出視薊鎮邊務條上便宜九事尋視師浙直敗倭有功加右通政擢撫淮揚上海防善後九事以勞卒官順之學問該洽尤長古文有荆川集又取古今載籍區分部居為左右文武稗五編行世崇禎時追諡襄文黃正色字士尚無錫人嘉靖己丑進士令南海邑人霍韜座主也其宗人有犯繩以法韜賢之薦擢南京御史劾尚書張瓉坐奪俸護視章聖太后梓宫南葬劾同行巨璫鮑忠等不法反為所構下獄搒掠謫戍遼東隆慶初起南太僕卿卒祀遼陽三忠祠子學海由進士官贛州守清介有父風張選字舜舉無錫人嘉靖己丑進士蕭山知縣報最擢給事中諫郭鄖代祭太廟干上怒廷杖八十已斃復蘇謫為民居職僅三月建言得罪名動海內隆慶初起通政司參議薛甲字應登江陰人嘉靖己丑進士官兵科給事中時方士邵元節用事輔臣夏言陰與交通甲四疏指切時事排斥異端因忤言謫官後厯四川兵備僉事尤魯字懋宗無錫人嘉靖壬辰進士以行人使汴藩歸陳藩臣虐民之害纍官工科都給事中劾罷勳臣幸宦鬻權軍伍者五人請節幸御保聖躬蕃皇嗣辨異端擢順天府丞攝尹事奏革占役借馬出巨璫故入死罪十人擒大猾於戚畹宦寺之門徐材字懋卿江陰人嘉靖丁酉舉人授兗州府推官州有疑獄久不決材至廉得其實遂具獄論如法河決曹縣捍築有功厯遷刑部郎居鄉嘗畫稅法以均官民時同邑湯明善亦以舉人倅嚴州理寃獄築湖堤遷淮府長史萬士和字思節宜興人父吉桐廬訓導有學行士和嘉靖辛丑進士選庶吉士授禮部主事出為湖廣參政撫納叛苗二十八寨纍擢副都御史督南京糧儲奏行便民六事萬厯初拜禮部尚書以剛直忤張居正謝病歸卒諡文恭有履菴集周嶅武進人嘉靖辛丑進士廉潔峭直官登州守除猾捕盜人服其神以憂歸卒貧不克葬御史周如斗為助其費尤瑛字汝白無錫人嘉靖甲辰進士留心韜略手畫九邊圖著論三十篇官儀制司主事力清藩府之賄出為廣東僉事平劇賊四十餘巢遷江西參政卒子鏜亦有詞學選卭州判官不赴有集數百卷劉光濟字憲謙江陰人嘉靖甲辰進士纍官南兵部尚書嘉靖間民苦賦役光濟撫豫時為一條鞭法奏聞通行天下萬厯初在南樞首輔張居正奪情議起或諷其具疏請留堅執不從居正恚嗾御史論罷金九成字鳴韶武進人嘉靖甲辰進士初令定海鋭意興革修築捍海堤人號曰金公塘調章邱治行悉如定海吏畏民安遷主事卒弟九臯令武康有救荒善政曹三暘字子泰宜興人嘉靖甲辰進士授大理評事厯官工部尚書生平精於法律獄詞一經其手情法帖然又諳國家典故每遇正務人不能決者徐以片言定之子司勳孫應秋並舉進士有文采應秋厯官參政秦梁字子成無錫人嘉靖甲辰進士授南昌推官除劇盜擢給事中京師築外城被命董役同事宦官侵冒工帑劾罷之厯通政司參議忤嚴嵩出督浙學諸生鄉試中式九十五人而梁所首拔居五十有六屢遷江西布政使邱緯武進人嘉靖丁未進士授侯官令在任四載考績為天下第一擢户部郎督儲通州移昌平正運辨乾沒之罪出守南陽以清勤卒官汪汝達字志行無錫人嘉靖癸丑進士令黃巖邑瀕海故無城島倭入寇汝達捐俸倡衆築之三月城完及寇再至民恃以固守厯官參議清操絶俗致仕歸鬻居以食黃巖士民知其貧醵八十金聞於官郵致之適病卒遂以為殮周子義字以方無錫人嘉靖乙丑進士選庶吉士厯南國子監司業南雍諸生素窳惰不振子義教飭有方輔臣張居正奪情南都九列俱具疏請留子義以正論告祭酒故成均獨無疏居正沒始遷禮部侍郎改吏部生平究心經世之學熟習國家典故及為㑹典總裁披校尤勤卒諡文恪所集有國朝故實二百卷胡涍字原荆無錫人嘉靖乙丑進士厯知永豐安福二縣入覲至不能具槖裝擢御史首論大璫馮保銜之會慈慶宫災延燒連房涍請放遣先朝後宫保摘其疏語以激帝怒斥為民同邑華察知其貧以負郭田二頃餉之辭不受自號為民御史放情山水間以卒施夢龍字伯雨無錫人隆慶戊辰進士知武定州政聲與前守王鑑埒報最擢户部員外𣙜稅淮西商民感悅遷刑部郎恤刑畿內有明允之稱厯江西副使吳中行字子道武進人尚寶丞性子隆慶辛未進士選庶吉士授編修首上疏劾張居正奪情事廷杖削籍直聲震天下居正死起故官厯升掌南翰林院風節尤著子亮奕元俱舉進士亮官御史亦以剛直聞終大理少卿奕令龍溪元官湖廣布政皆有聲績季子襄由舉人厯滄州知州以忤巨璫罷范鳴謙字貞夫江陰人隆慶辛未進士令龍溪擢御史出按真定諸郡郡多貴戚一裁以法浙中兵民相繼告變敕往巡視僇其渠魁反側以安唐鶴徵字元卿順之子隆慶辛未進士授禮部主事厯南太常少卿計殲妖人劉天緒劾璫毆屬丞正其罪以病免與顧憲成等講學東林以博洽聞年踰八十手不釋卷施䇿字懋揚無錫人隆慶辛未進士授禮部主事改南吏部攝考功郎掌計典既核且嚴尋奉使高麗力却餽遺清操上聞擢南太僕卿駐滁陽三年清馬政蘇驛困滁人德之孫元徵由進士厯湖廣福建僉事有平巨寇功𤣥孫熙舉人有文行秦耀字道明無錫人隆慶辛未進士官給事中多所建白纍擢僉都御史出撫南贛平岑岡劇賊擒南雄妖僧自贛移楚嵗旱饑疫疏請糴穀行賑全活及收瘞無算有荒政摘要孫繼臯字以德無錫人萬厯甲戌廷試第一厯官吏部侍郎嘗疏救御史曹學程于獄及諸言官之被譴者佐銓時屢陳選途壅滯之弊以諫孝安太后山陵事忤㫖罷歸繼臯清不近名峻不絶俗獨能持大體嚴一鵬字化卿無錫人萬厯丁丑進士以母老不謁選越七年始授行人擢御史劾厰監張鯨置之法又劾湖廣稅監陳奉出按山東疏請罷礦稅不報條列稅監陳增贓私二百萬增以憂死巡方三年乃得代厯刑部左侍郎卒萬象春字仁甫無錫人萬厯丁丑進士選庶吉士改給事中議復建文年號加景帝廟諡酌議藩祿裁內侍止內操前後七十餘疏多見施行厯巡撫山東時倭寇朝鮮登青萊三郡戒嚴象春選兵儲餉東郡恃以無恐疏論礦稅之害忤礦璫引疾歸吳達可字安節宜興人萬厯丁丑進士由知縣擢御史視鹽長蘆值嵗祲繪饑民十四圖上之請賑貸按江西劾稅璫潘相罪還掌河南道佐總憲溫純京察時沈一貫當國達可挺立不阿正人賴之纍遷通政使告歸卒子正志由進士官刑曹劾言官之排擊正人者謫宜君典史直聲震一時後厯江西僉事李應祥字善徵無錫人萬厯丁丑進士知臨海縣海倉險逺委輸者苦之應祥請改折又出帑金市馬以紓牧馬之困參議陜西調護礦事官私咸便尋調督學卒侯先春字元甫無錫人萬厯庚辰進士官給事中條列轉漕救荒十五䇿播州獻俘疏請年十六以下者皆免死閲視遼陽劾罷大帥之不職者稅監高淮糾斥鎮將先春力爭非制帝怒謫官卒後贈太常少卿孫鼎鉉進士官户部主事袁一驥字季友江陰人萬厯癸未進士官禮部郎請復建文年號即得㫖改正纍擢閩撫力裁稅璫高宷之橫并疏劾其不法即撤回京閩人歡呼尋乞歸閩人思其德立専祠祀之徐常吉字士彰武進人萬厯癸未進士授中書舍人擢南户科給事中户科故攝後湖黃冊所入不資常吉皭然不染督學房寰貪墨不法劾斥之外轉浙江僉事未任卒史孟麟字際明宜興人萬厯癸未進士選庶吉士改給事中冢宰孫鑨考功郎趙南星掌京察孟麟實左右之南星斥亦引疾歸砥礪名節預東林講㑹起太僕少卿挺擊事起疏請立皇太孫以絶覬覦被謫歸後起南禮部主事至太僕卿沈應奎字伯和武進人萬厯乙酉舉人守裕州有惠政冢宰孫丕揚過裕不往迎謁孫突入其署見方烙餅炙韭因與共食入朝薦其廉擢主事出知汀州稅監高宷恣橫憚應奎不敢入其境厯南光祿少卿坐黨事削籍顧允成字季時憲成弟萬厯丙戌進士時新用鄭貴妃允成對䇿極言內寵羣小之害執政駭且恚置末第會御史房寰劾南都御史海瑞允成奏寰欺妄詔以出位言事奪冠帶還家久之由教授厯禮部主事三王並封抗疏爭之未幾以劾輔臣謫官乞假歸從兄講學東林先後居官僅六十日後贈光祿少卿有季時大辨小辨偶存二書安希范字小范無錫人萬厯丙戌進士厯南吏部主事時政府多斥異已希范上言輔臣誤國不忠正人如趙用賢趙南星孫鑨等先後被斥忠言如高攀龍反䝉重譴乞嚴諭閣臣無挾私植黨疏入削籍歸與高顧諸賢講學東林天啓初贈光祿少卿王就學字所敬武進人萬厯丙戌進士授户部驗糧㕔主事中官需索橫恣解户有纍死不得掣批者就學稱引祖制章兩上卒得請著為令改禮部進員外又調吏部以諫仁聖太后梓宫將發有遣官代送之詔具疏力諫忤㫖削籍龔道立字應升武進人萬厯丙戌進士初授兵曹有儒帥畏寇求內徙廢帥落職求起用挾重賂以進皆拒而罷斥之出知建寧弭亂卒拊窮黎及入覲鬻家産以資行李厯湖廣按察使乞休歸薛敷教字以身武進人應旗孫萬厯己丑進士以直言忤閣臣勒回籍起厯國學助教爭三王並封事因申救考功郎趙南星謫光州學正乞養歸垢衣糲食一介不取家居二十年力持清議鄉人不敢為非與顧憲成兄弟講學東林卒贈尚寶司丞周繼昌字文白無錫人萬厯己丑進士由禮部郎出為湖廣僉事值王師征播召募齎送經畫得宜改命督學以艱去起補山西晉藩素慢士每禁士府第又有巡按欲以私隙殺士繼昌皆力爭得免遷浙江溫處道討平礦賊擢順天府丞未任卒葉茂才字參之無錫人萬厯己丑進士官南工部主事𣙜稅蕪關課滿輒縱商船不復取稅纍擢南太僕卿以建言引歸天啓中擢南工部侍郎致仕凡通籍四十年十九在告與高顧講學東林清介絶俗布衣蔬食終其身陳幼學字志行無錫人萬厯己丑進士知確山中牟二縣有異政擢刑部主事恤刑畿內多所平反出守湖州收大猾三人杖殺之豪强屛息咨訪民情無微不達御史録其治行三十六事上之於朝厯江西副使歸起太常少卿卒著有禮樂考諸書張納陛字以登宜興人萬厯己丑進士由刑部主事調禮部時有三王並封之議納陛與同官顧允成等力爭之事得寢趙南星掌內計以執法忤輔臣被斥復疏救甚力謫鄧州判尋乞歸預東林講席闡發精切顧憲成深推重之儲昌祚字立寵宜興人萬厯壬辰進士令鄱陽浦城二縣有政績兩邑俱建祠祀之厯四川兵備副使致仕歸居鄉以厚德稱殁後數年邑有民變焚毁巨室廬墓獨相戒勿犯儲氏顧言字尚實江陰人萬厯壬辰進士令慈溪捐俸遷縣治民不知役抑礦璫定軍變開杜白二湖以興民利厯四川參政卒時靖江孫同倫由舉人令德化築封廓桑樂二洲石堤百餘里更置石閘以泄瀦水民賴之厯官雲南參政湯兆京字伯閎宜興人萬厯壬辰進士令豐城擒劇盜報最擢御史劾宫閹之橫論礦稅之害掌河南道主察典斥去湯賓尹等數人力請福王之國論冢宰趙煥擅權遂奪俸以不得其職告歸居官清正負時望清議倚以為重卒贈大僕卿孫慎行字聞斯武進人萬厯乙未廷對第三人授編修纍官禮部侍郎署部事合文武諸臣伏闕力請福王之國尋告歸熹宗立召拜禮部尚書論紅丸一案斥輔臣方從哲之罪秦藩由旁支進封賄近幸封四子郡王力爭不得即引疾歸魏忠賢擅權修三朝要典奪慎行官遣戍寧夏懷宗初起故官召入未及奏對卒諡文介慎行學行醇潔為一時縉紳冠陳于廷字孟諤宜興人萬厯乙未進士由知縣擢御史劾閣臣朱賡當斥視鹺河東劾稅使張忠撓鹽政按江西糾湖口稅閹潘相罪天啓中纍擢吏部侍郎攝尚書事以會推冢宰忤魏忠賢斥為民懷宗初起南京右都御史主察典盡斥諸不肖者召拜左都御史加太子少保復以奏事伉直削籍歸于廷負清望端亮有守同邑周延儒當國一無所附麗顧應暘字太初無錫人萬厯丁酉舉人由南刑部郎出守思恩地險多盜應暘募人鑿山闢路且計道里設戍守由是行旅無虞又以誠信撫土猺境內以寧遷蒼梧道引疾歸劉元珍字伯先無錫人萬厯乙未進士授南禮部主事進兵部郎中㑹京察論劾執政沈一貫比昵僉人罔上不忠謫極邊後起光祿少卿卒於官罷歸與錢一本為同善㑹行義重於時何士晉字武莪宜興人萬厯戊戌進士由推官擢給事中遇事敢言論張差挺擊事疏三上鄭國泰出揭辨再劾之出為浙江僉事天啓初巡撫廣西敗安南有功擢總督兩廣魏忠賢用事以爭挺擊削籍歸李守俊字念劬宜興人萬厯辛丑進士厯户部主事𣙜九江未及期課滿即放關免稅商人建祠祀之擢廣西布政時海內藩司皆為魏璫建生祠恥之不赴坐黨高攀龍削籍聽勘崇禎時復起湖廣布政卒於官同邑路進以進士守湖州嵗饑盜起責成太湖漁舟巨盜咸就縛厯官布政使龔三益字仲友武進人萬厯辛丑進士選庶吉士纍遷侍講奉詔使楚藩王年少而驕閽人導從掖門入三益峻責之王慙闢中門見乙卯典試北闈為忌者所中左遷湖廣參政引疾歸子九疇亦成進士有文名吳宗達字上于武進人萬厯甲辰廷對第三人授編修厯東閣大學士時政尚操切宗達劑量於寬嚴之間裨益殊多有言官得罪特㫖立決宗達揭救得免又疏爭分遣中官監邊鎮軍卒諡文端周炳謨字仲覲子義子萬厯甲辰進士選庶吉士厯禮部侍郎纂修光宗實録載三案事直筆無所阿忤魏璫有武闈所取士許顯純請介紹於璫厲聲拒之即日告歸其黨因劾所纂實録非實削職炳謨已前卒矣後追諡文簡華元禔字爾遐無錫人萬厯甲辰進士授新鄭知縣調商邱給牛置屯募力助墾稽其積散而賞罰之商俗好為掾史以避役元禔第墾田多者用之以治最擢御史鮑際明字伯參無錫人萬厯甲辰進士授海康令地震城圮而欽州以變告際明為慰撫部署民以無恐調同安奬拔寒士再調寧都清郵傳察姦胥時推為百城表錢春字若木武進人一本子萬厯甲辰進士由知縣擢御史按湖廣劾守備中官又抗疏論首輔方從哲出為福建參議後遷光祿卿偕九卿疏糾魏忠賢削籍歸後起通政司纍擢户部尚書督倉儲儧運除漕船壓白糧之弊白糧先漕行自春始尋改南户部以申救黃道周罷歸陸大受字凝逺武進人萬厯丁未進士厯户部郎中疏請減福王莊田劾鄭國泰驕恣亂法又力爭挺擊事出守撫州以清節聞大受身非言官遇事敢言坐京察罷後薦起未用卒華敦復字雍明無錫人萬厯丁未進士由户部郎出知嚴州厯遷四川布政使時有議加蜀糧六十萬者以去就力爭得寢預平奢酋敘功受賞許鼎臣字爾鉉武進人萬厯丁未進士厯光祿丞以忤魏璫歸後起本寺少卿寧武兵叛擢撫山西請蠲租恤貧增餉募士兵民感賴寧武遂平在晉甫十月前後八十餘疏墨吏敗將悉正其罪旋奉命協𠞰河南流寇為監璫論罷陸完學字汝成武進人父南陽以貢授善化令有清名完學舉萬厯丁未進士官浙江僉事嵗饑或議減米價完學謂杭不産米減價則商裹足矣越數日商舟四集價果平擢撫浙江海潮壞堤漂沒萬計完學修築海塘始免沖潰之患纍官兵部尚書董應揚字于廷武進人萬厯己酉舉人纍官兵部員外以廉能著時京僚有進馬之額應揚貧質束帶及邸舍用物以應里中以孫慎行張瑋與應揚為三清莊起元字中孺武進人萬厯庚戌進士厯户部郎督餉天津籌畫海運省公帑巨萬大璫崔文升等督漕監司皆執屬官禮起元獨與抗衡終太僕少卿弟廷臣同年進士厯鄖陽守罷建魏璫生祠以氣節著纍遷湖廣布政范世正字獻吉靖江人由庚戌副榜令羅田邑介麻黃間豪紳大猾持吏短長又民素刁悍世正為治嚴明一無縱舍始各斂戢清汰里役令行禁止遷廣平郡丞繆昌期字當時江陰人萬厯癸丑進士選庶吉士挺擊事起力言主風癲之非授檢討即移疾歸天啓初起遷左贊善進諭德楊漣劾魏忠賢有言昌期代草疏者忠賢大恚恨遂落職繼入織監李實疏中逮繫追贓拷掠斃於獄後贈詹事諡文貞毛士龍字伯高宜興人萬厯癸丑進士由推官擢給事中楊漣以譴去抗疏請留內侍劉朝以盜資下獄論死夤緣魏忠賢得釋士龍嚴劾之諸奄恨刺骨又數忤魏璫再削籍謫戍平陽尋逮治潜匿以免崇禎初起用厯僉都御史周鼎字在調宜興人萬厯癸丑進士授平陽推官厯總河侍郎加工部尚書明末河決長山泇河塞決策開之三月告成次塞決口築遙樓二堤邳州三面距河屢被河患請改河羊山外州遂以安李應升字仲達江陰人萬厯丙辰進士授南康推官出寃民十九人於死撤湖口關稅復白鹿洞書院擢御史抗疏糾魏廣微魏忠賢又代都御史高攀龍草疏劾崔呈秀閹黨曹欽程劾應升遂削籍繼竄入李實疏逮繫追贓下獄尋斃之崇禎初贈太僕卿諡忠毅子遜之字敏公隱居不仕著述甚富蔣允儀字聞韶宜興人萬厯丙辰進士天啓初由知縣擢御史劾張鶴鳴方從哲及王紹徽時魏忠賢擅權因冬至上扶陽抑陰疏中㫖切責奪俸出按陜西適王紹徽秉憲令嗾其門人劾罷之崇禎即位起掌河南道主京察貶斥甚多仕路一清厯撫鄖陽儲顯祚字文曙宜興人萬厯丙辰進士官户部郎監內官儲閹聚而譁撻其首一人天啓初出理延寧糧儲延鎮缺餉萬數顯祚便宜調劑軍心以安遷襄陽知府有貴戚恣橫悉裁以法不少貸值魏忠賢用事前所撻其黨也即乞歸後復起厯湖南按察使張瑋字席之武進人萬厯己未進士由户曹調職方郎中為廣東提學撫臣為魏璫建祠欲瑋撰上梁文自投劾歸崇禎初起備兵嶺北山寇蹂躙郡邑瑋身冒矢石搜斬無算又傳檄諭賊降之厯遷左副都御史時總憲劉宗周僉都御史金光辰與瑋同視事臺中肅然京師目為三清卒諡清惠張有譽字誰譽江陰人萬厯己未進士授南户部主事𣙜邗關五尺以下舟悉免其稅厯江西糧道天津有警以兵法部勒漕艘五千餘退入海口事定抵通擢四川按察使兼攝藩篆癸未大計舉清廉第一纍官南户部倉場侍郎周詩雅字廷吹武進人萬厯己未進士令寶坻革馬户侵占魏璫黨莊客二人倡白蓮教畿輔騷動以計除之左遷上林簿厯貴州提學僉事白貽清字希賢武進人萬厯己未進士授户部主事備兵榆林有水泉三條溝張義堡諸捷厯户部侍郎督餉宣大進尚書總督倉場簡任司屬攬持紀綱得大臣體貢修齡字國祺江陰人萬厯己未進士令東陽以治行卓異擢刑曹引經斷獄時稱明允出為浙江參議督漕運盡削陋規厯江西參政盧象升字建斗宜興人天啓壬戌進士知大名府擒劇盜馬翩翩遷大名兵備扼守要害屢破流寇尋撫鄖陽𠞰湖南北諸賊殆盡遂總理七省軍務大破李自成於汝又擊破諸賊於滁俘斬無算改總督宣大大興屯政積穀二十萬㑹丁外艱候代畿輔告警特命起復督師入援與本兵楊嗣昌忤孤軍次巨鹿縣南十里賈莊力戰死象升三賜尚方劍未嘗戮一偏裨愛才恤下畿民聞其死皆雨泣贈太子少師兵部尚書諡忠烈又與弟象觀再見忠節傳秦缸字儼海無錫人天啓壬戌進士由知州入為户部郎管東宫㕔節費辭羡以清廉稱巨璫張彜憲督理户工二部屬視諸曹缸不為屈忤璫告歸周士登字伯升武進人天啓乙丑進士厯川東道闖賊犯䕫州掠䕫餉數十萬朝議嚴詰百姓聞之爭先樂輸旬日間充舊額仍命監軍四省率兵追寇擒賊首一字王普天飛等劉憲章字端甫武進人崇禎丁丑進士官御史巡城行保甲法貴戚奸民屏息不敢橫疏救劉宗周張瑋金光辰尤著直聲同邑劉呈瑞以進士官御史按京畿不避權貴畿輔告警力守通州諸城多潰惟通獨全趙繼鼎字止安武進人崇禎庚辰進士授公安令時新徙縣治經畫撫綏甚有條理勢豪猾吏懲治不少貸惠藩承奉旗校抵驛取民夫擾甚繼鼎身為衆夫先詣承奉不敢繹騷而去升兵部主事以父喪歸家居授徙以終其身子申喬申季高世泰字彚旃攀龍從子懷宗時以進士授禮部主事厯湖廣提學僉事嚴立教條以理學訓士葺江夏濂溪書院遴楚士講習其間任滿乞歸與諸同志勤舉講㑹國朝莊應㑹字春候武進人明季以進士司儀曹督學八閩順治初補江西參政值金聲垣亂以軍功遷右布政入覲疏請汰袁瑞三府浮糧厯升刑部右侍郎卒弟應詔以恩貢令興寧山賊竊發有守禦功金聲垣叛時將軍談泰知其才疏授瑞州推官未幾致政歸同邑馮達道字惇五順治丁亥進士授户部主事應㑹請汰浮糧疏下同官咸難之達道力爭得報可吕宫字長音武進人順治丁亥進士廷對第一授祕書院修撰纍官𢎞丈院大學士在侍從時請建常平倉為吏侍肅清銓政薦江東耆舊密勿襄贊持身謹飭請停江浙白糧以蘇民困楊兆魯字泗生武進人順治丁亥進士授刑曹郎條奏五事皆中時宜提學江西請留餘額生一千八百餘人升按察建南歸徐可先字聲服武進人順治丁亥進士除束鹿令有平盜功改任龍泉造石梁五百餘丈以濟行旅禁溺女崇學校民俗一變升刑部主事厯山東提學告歸蔣永修字紀友宜興人順治丁亥進士知應山縣勞來有恩鄰境賊起練民兵守禦賊不敢逼舉卓異擢刑科給事中出知貴州平越府清丈苗民虛稅八千有竒擢湖廣提學副使振興文教楚風為之一變子景祁工文章周啓雟字立五宜興人順治丁亥進士授庶吉士纍遷右庶子厯鴻臚少卿歸杜門不干謁邑有大利弊則身任之止宜邑添兵駐防之議陳版荒逋糧均派之失皆有造於桑梓劉幬字江舟靖江人順治丁亥進士知建安縣建為山賊窟穴大兵進𠞰饋餉調運籌畫得宜事平招流亡貸脅從建民德之薛信辰字侯執無錫人順治己丑進士授潮州知府發守將郝尚久姦謀未幾尚久叛縛信辰將害之百姓環泣請命乃繫獄家屬投井死者五人大兵平潮信辰始得釋尋備兵井陘時議圈地授旗人信辰調劑兵民咸感悅厯升浙江布政使顧煜字銘柏無錫人順治己丑進士宰象山仁儉自勵練兵却寇履畝平徭設觀瀾社集諸生講課號大治以失上官意罷歸儲曽字觀我宜興人順治己丑進士知永豐縣豐多盜曽擒其渠魁誅之餘悉解散兵有奪民財者置諸獄其黨持提標僞檄計挾以遁曽并繫之自是驕兵斂迹脫明忠臣魏冕後裔戍伍籍以征糧不及額免歸越一年奉檄仍詣豐民爭先輸納逋額竟清子振康熙丁未進士右春坊右庶子居官恪慎掄康熙壬戌進士授臨川知縣亦廉靜有守周季琬字文夏鼎子與兄仲球同登順治壬辰進士由庶吉士改御史疏陳江南漕政之敝康熙初請躬承匕鬯疏入留中明春季琬卒前疏忽奉聖祖俞㫖豫馳驛歸葬嶽鍾淑字天濤武進人順治壬辰進士令錢塘改閩縣皆有惠政擢吏部主事升員外門無私謁退食焚香讀書而已路遴字子將宜興人順治壬辰進士官刑部郎多所平反條議革九鎖柙牀遷永平守築石堤數百丈以捍灤河水災鋤强暴護善良在郡三年治行稱最秦鉽字克繩無錫人順治乙未㑹試第一廷對第三人授編修出為廣東參議備兵杭嚴有告無為邪教者其教戒飲酒食肉鉽即於堂下各食以酒肉散遣之按察江西有叛人久未獲所司得姓名相似者鍛鍊誣服鉽訊釋之賊亦旋獲後遷湖廣糧儲道告歸徐元珙字輯五武進人順治乙未進士為刑曹郎出分巡建寧弭山藪窟穴之姦移守口北撫定邊民之避調發者升太常卿議兩郊配位及釐正北海祀所皆傅經義厯遷左副都御史子永寧字坤載康熙辛酉舉人任大理寺評事能於其職居鄉稱長者許之漸字青嶼武進人順治乙未進士任户部主事考授監察御史稱敢言救科臣楊雍建參革義王孫可望懲莊頭劉七皆著風采旋巡視陜西茶馬歸張偉字漢公順治丁酉武舉康熙甲寅滇黔叛條陳十事於軍門督撫薦授靖逺監督同知擢知延安府十三載綏輯兵民升副使道卒於官華亦祥字纘長無錫人順治己亥進士第二人授編修遷侍讀居家孝友周宗黨之急同邑有繫逮入都者多委頓道路亦祥為護恤之各得保全楊大鯤字陶雲武進人廷鑑子順治己亥進士授庶吉士為姻戚所纍謫新建丞大臣薦邊才擢九江同知有軍功厯升貴西分巡道入覲請裁併黔西諸府隨擢按察山東卒於官嶽宏譽字聲國順治辛丑進士任山西靈邱令丁艱起補獲鹿邑多桀猾莊頭星布宏譽一以法繩之舉卓異授兵部主事轉刑部郎升湖廣提學僉事有公明稱湯自超字軼人武進人以嵗貢令桂東修城建倉積荒之後賑恤災黎全活甚衆內升中書告歸許育芳字尹吉康熙壬子副榜令任邱巡撫李光地薦其政績擢知邠州改北通州築隄百二十里以捍水患核旗莊之占民産者居鄉好行其德三黨待以舉火者常數十家而自奉清約如寒士任𢎞嘉字葵尊宜興人父繩隗順治丁酉舉人有逸才𢎞嘉康熙丙辰進士授行人擢御史至左通政遇事敢言請升程朱配享廣鄉舉額裁冗員禁夤夜之勾較編丈之批駁皆有益風教周清原字雅楫武進人舉博學宏辭授翰林院檢討厯官副都御史疏請革鋪舍飭刑具又請直省俱立育嬰堂收養棄孩俱得㫖允行聖祖嘗稱為孝子御書孝經賜之遷工部右侍郎卒蔡鵬江陰人年十五補邑諸生父與邑豪劉某相讐令袒豪置鵬父於理鵬走京師直父寃以是知名參安親王幕從征吳三桂有功授長沙令三桂以僞劄招之鵬告王馘其使招集流民給牛種墾荒蕪民有起色以上官不悅罷歸陶自悅字心兑武進人康熙戊辰進士知猗氏縣減耗羡嵗二千餘兩升澤州知州捕鹽梟李某置之法却商人規例減鹽價什之四奉京力陳衰狀歸里研精宋五子書教人坐立飲食皆有法則朱廷鋐字玉汝江陰人康熙戊辰進士授淳化令㑹嵗歉民饑廷鋐核實詳報上官遲之乃按户給帑一兩隨以擅給自劾不問擢御史厯大理寺少卿告歸趙申季字行瞻康熙丁丑進士任遷江令邑素多科派申季一切革之輯獞蠻劫掠者禁豪强放穀漁民舉卓異改授翰林院編修督學山東廉慎自矢評隲試卷不假手幕客以勞卒官陳聶恆字曽起武進人康熙庚辰進士授荔浦令邑多獞猺姦民挾以煽亂聶恆單騎抵其巢諸酋羅拜因諭以禍福令返荔民之居獞穴者又補長寧興學造士文風一變治最授刑部主事改翰林院檢討未幾卒陳大經字筠操無錫人由監生授寧津令門無閽人投訟牒者入燕寢訴其情被訟者亦然曲直立剖催科不用鞭撲亦無逋者農時民告貸於官則應之秋償不責息病者為診脈豫之藥鮮不效嘗有大役鄰邑部送役夫千人至縣期尚緩餱糧將盡大經盡散遣還與約某日至衆感之及期畢集章耿光字子覲江陰人康熙丙午舉人居鄉以孝友聞任徽州府學教授割俸修葺學宫以為諸士倡嘗請於上官設天都書院及義學四所以教士子山賊竊發文武官有倉皇引避者耿光獨曰吾雖無城守責亦朝廷官也當效死於此聞者壯氣江南通志卷一百四十二欽定四庫全書
