body:
  text: 江南通志卷二十五輿地志闗津一橋梁鎮市附江蘇松常四府星經云牽牛神一名天闗太公金匱云春三月斗為天闗又晉書天文志云天津九星主四瀆津梁江南次牛斗之分星襟江淮之靈瀆闗則山有清流水有海門津則方山為東石頭為西實上應天文雄跨南服矣至於虹形鴈齒以濟車徒旗亭鼓戍以聚商旅又與闗津相為表裏者也江寧府龍江闗在江寧縣西儀鳯門外今移上新河舊管收工部稅務另設户部鈔闗康熙二十八年併兩稅為一民商稱便大勝闗江寧縣南二十里明初陳友諒來侵太祖命楊璟駐兵大城港禦之友諒大敗去因名大勝港置大勝闗石灰山闗上元縣幕府山北明初置江淮闗江浦縣東南三里明洪武二十四年建闗置巡司於此今如故浦子口江浦縣東二十里為南北津渡之要明置守禦所國朝初設叅將駐防康熙中改用守備江東渡上元縣龍江渡五馬渡幕府山前晉元帝與諸王渡江處右上元南津江寧縣南南朝置校尉守之侯景入冦南津校尉江子一與弟子四子五同殉難於此毛公渡馴象門外即古麾扇渡唐家渡縣北三十里與六合梅家步相對即古張公凹渡馬家渡西南九十五里亦曰馬家洲又為馬家步宋建炎間金人由馬家渡渡江陷太平州即此右江寧下蜀渡句容縣北七十里東陽渡西北八十里茅塲渡北八十里東陽鎮側右句容何莊渡溧水縣西北四十五里梅梁渡西南二十五里石臼湖津濟處也右溧水高淳渡高淳縣治西南西陡門渡縣西三十里界丹陽湖三汊河為寧國太平衝要水陽渡西三十里固城渡東南三十里分界渡西北十五里祠城渡東北三十里陳家渡東四十里撑龍港渡西二十里右高淳八字溝渡江浦縣東八里濱江新江口渡東南十三里濱江與省城中河相對韋游溝渡西南五十里接和州界三汊河渡東北四十里邑令置船二為官渡右江浦囘軍渡六合縣宣化渡右六合大中橋上元縣通濟門内舊名白下復成橋大中橋北通濟橋通濟門外中和橋通濟橋東南上方橋中和橋東南上三橋皆跨濠水鼎新橋舊名小新橋崇道橋在鼎新橋西倉巷北近全節坊太平橋俗呼為笪橋在鼎新橋東上三橋皆跨運瀆内橋太平橋東運瀆合青溪處舊名虹橋宋政和中蔡嶷修南渡後建行宫於此改名天津橋後改今名昇平橋内橋東北即宋東虹橋大市橋内橋西北即宋西虹橋北門橋洪武街南跨古城濠囘龍橋漢西門内石步橋縣東北四十五里即古羅落橋晉元興末劉裕討桓𤣥自江乘進至羅落橋土橋縣東七十五里與句容接界右上元縣鎮淮橋江寧縣聚寳門内即古朱雀航吳名元津武定橋鎮淮橋東文徳橋縣學宫右利涉橋文徳橋東即桃葉渡東晉以來未有橋以通濟水闗來水天門宜敞也順治初太守李正茂設木橋名利涉康熙癸夘易木以石議者謂天門閉塞不利人文非古設渡之意復廢石而易以木焉淮青橋秦淮與青溪合流處斗門橋即古禪靈寺橋其北又有乾道南北二橋明一統志在三山門内秦淮合運瀆處張侯橋淮水南對瓦官寺吳張昭所造故名晉義熙六年盧循焚查浦進至張侯橋即此南渡橋舊跨秦淮李白與酒客數人棹歌秦淮往石頭訪崔侍御詩云捨舟共連袂行上南渡橋飲虹橋縣西南百餘步跨秦淮本名萬歲橋楊吳時名新橋至今俗仍呼新橋上浮橋新橋西下浮橋上浮橋西皆跨秦淮聚寳橋聚寳門外即古長干橋楊吳城金陵鑿濠引秦淮水繞城置此橋跨之石城橋石城門外跨城濠三山橋三山門外跨城濠江東橋江東門外賽工橋馴象門外明遜國時侍中黄觀妻女死節處來賓橋馴象街近橋有來賓樓故名善世橋來賓橋西皆跨躍馬澗水流通城濠板橋縣西南四十里晉簡文帝為王時常與桓温及武陵王晞同載游於板橋温遽令鳴鼓吹角車馳卒奔晞大恐帝安然無懼色温由是憚服又晉伐吳丞相張悌死於板橋悌家在板橋西河亭橋縣東南二十五里一名河定橋新林橋縣西南十八里梁武帝敗齊師處即今西善橋秣陵橋縣東南五十里到駕橋夾岡門明太祖曽駐此東善橋縣東南四十里吉山下右江寧縣集仙橋句容縣東南一里許永安橋縣南七里下有小港入於秦淮降真橋茅山玉晨觀西白鶴橋縣東南三里懸纛橋縣西十五里周瑜嘗駐軍於此周郎橋縣西二十里亦以瑜名沈公橋縣南二十五里相傳以沈慶之名高平橋縣西南三十五里竹里橋縣北六十里右句容縣惠政橋溧水縣東門外跨秦淮水舊名臨淮橋尚書橋縣東十里九澗橋東三十五里以有九澗之水匯故名橋神龍橋東四十五里舊名神靖橋尚義橋縣南二十五里積慶橋南三角鋪前秦淮橋小西門外楊林橋縣北五里通省官路天生橋縣西十里高十二丈闊七丈五尺明洪武十年太祖命崇山侯李新鑿胭脂岡二十里成河通蘇浙運道橋因石勢而成若天生然故名花溪橋縣西四十五里跨花溪港永昌橋縣西北永夀寺側洪驛橋縣南洪藍埠烏刹橋縣西北四十五里秦淮水經其下接江寧縣界募軍橋縣北三里明嘉靖間李佛保與倭戰死處長樂橋縣東北二十五里右溧水縣東新橋高淳縣東南望洋門外西新橋縣西南襟湖門外高闊二丈五尺長十五丈永濟橋在西新橋左初為甘棠渡後建石橋上三橋俱跨官溪河上曹塘橋縣東四十里跨曹塘河永清橋東六十里為吳越要津舊係木梁順治八年建石橋永康橋一名下橋縣東南七十里上二橋俱跨胥河上橋亦跨胥河接建平縣界里仁橋一名灣橋縣東北十五里跨桃花澗王婺矛牙橋東六十里當江寧廣徳浙江孔道邑人劉啓東妻王氏年二十夫死無子守節捐貲建鄉閭義之因名雙橋南十里本雙河渡明萬厯中建石橋水碧橋西南三十里跨水陽河接宣城界宣徽之水至此皆澄碧因名永興橋東北三十里跨藕絲塘右高淳縣宣化橋一在江浦縣治西數百步一在浦子口滄波門外與六合接界以宣化鎮名珍珠橋縣東二十里白馬橋縣南五十里獬鳯橋縣西南二十里石磧橋縣南石磧鎮惠政橋西六十里接和州界茅塘橋縣北三十里跨通江大河又北五里為横橋皆通浦子口驛路右江浦縣龍津橋六合縣治南數十步為水陸要㑹成化志云橋一十八洞纍石為之黄巢兵燹之後石橋廢自宋迄今皆作浮橋追人橋來春門外宋太祖兵禦南唐至此故名冶浦橋縣東五里跨冶浦河唐祖詠有詩善家橋東南二十五里瓜步六合儀徴分路處茅家橋南二十五里滁口山北沿河通長蘆陳里港馬昌河橋西南二十里黄湖橋西北十五里程家橋西二十里水通滁河縣西諸山集鎮悉由此出亦會聚之區也竹鎮橋西北三十三里河道紆曲一邑闗鍵故竹鎮殷阜勝他處八百橋東北三十里舊傳唐有八百梵僧往冶山講經過此故名蘆塘橋東北二十里橋東北五里有蘆塘寨因以名橋焉右六合縣靖安鎮上元縣西北十五里本名龍安鎮以鎮有龍灣也宋曰靖安建炎四年岳忠武邀敗金人於此淳化鎮縣東四十五里亦曰淳化闗其地遮蔽句容應接京口形勢衝要有巡司石步鎮縣東北四十里即羅落橋鎮土橋鎮縣東七十五里接句容界湖熟鎮縣東七十里笪橋市縣治西數百步百物所聚一名夜市閭巷細民每持衣物立門首荒販收之次日五更即至市轉售古詩有云金陵市合月光裏則夜市由來舊矣花林市縣東三十五里齊梁諸墳多在其地東流市縣東北四十里有橋曰東流以水流自東因名棲霞市棲霞寺前去城四十五里索墅市縣東二十里清化鄉有索墅坊湯泉市縣東六十里湯山龍都市縣東南五十五里右上元縣江寧鎮江寧縣西南六十里金陵鎮縣南六十里本陶吳鋪景徳二年改為鎮秣陵鎮縣東南五十里元設巡司及稅務明置秣陵闗今仍為鎮有巡司新橋市縣西南即古魚市今新橋十字街口即其地也三山街市江寧縣北東口市縣南聚寳門外長十里西口市長干橋南今西街口小口市聚寳門外來賓橋西一名小市口世說張闓家小市江東市縣西江東門外商販雲集新林市縣西南二十里近新林浦杜橋市縣南四十里板橋市縣西南三十里路口市縣南七十里銅井市縣西南八十里朱門市縣南九十里右江寧縣白土鎮句容縣東四十五里為句容丹陽之中路元置稅務明設白埠公館今稅務廢而鎮常為往來駐宿處常寧鎮縣東南四十里宋天禧初置常寧寨亦以此名縣舊有巡司及稅務局今裁東陽鎮縣西北六十里宋置東陽砦巡司後裁下蜀鎮縣北六十里東去鎮江府界十五里唐置鹽鐵轉運使在揚州宋發運使在真州皆於江南岸置倉轉搬今下蜀鎮北有倉城基并鹽倉遺址尚存河口鎮縣北七十里舊名斜溝龍潭鎮縣西北八十里逼臨大江地有龍潭因名明初置巡司兼設水馬驛建文四年燕王渡江次龍潭是也今裁巡司以驛丞兼攝司事右句容縣官塘鎮溧水縣東二十五里道出溧陽蒲塘鎮縣南二十五里孔家鎮縣南四十五里蒲千鎮縣東北十五里間道出句容楊塘市縣東四十五里道出溧陽洪藍市縣南十五里亦名洪藍埠有河道北通秦淮南達石湖百貨聚集為商賈貿易之所新糧倉在焉邰村市縣南六十里接建平縣界明嘉靖間設河泊所於此萬厯年革烏山市縣北三十里柘塘市縣北四十五里與烏山俱為趨省孔道右溧水縣廣通鎮高淳縣東五十里接溧陽界即古東壩地明洪武中置鎮有巡司固城鎮縣南三十里春秋吳固城即此水陽鎮縣西南三十里臨水陽河河之南與宣城接界漆橋市縣東北三十里戴家城市縣東三十里東壩市縣東五十里南唐市縣南十里蘆溪市縣西十里右高淳縣浦子口市在江浦縣東二十里石磧鎮縣西南三十五里高望鎮縣西南二十里晉太康初伐吳王渾使李純屯高望城是也香泉鎮縣西北三十里南去湯泉五里即故湯泉鎮也又有湯泉寨在湯泉元末居人築以禦寇東葛城鎮縣西北三十五里明初置館驛於此西葛城鎮縣西北四十五里接滁州界汊河集縣北三十里濱滁河小店縣西北二十里又西北五里有高麗店茅塘市縣西北三十里茅塘橋右江浦縣瓜步鎮六合縣東南二十五里瓜步山下長蘆鎮縣南二十五里舊為戍守處宋時置鎮設沿江巡官監稅渡於此宣化鎮縣南宣化山之陽為建康往來津渡之要宋紹興十一年張浚救濠州為金所敗馳入宣化吳表臣言大江下流最急者有建康之宣化是也竹鎮縣西北三十三里宋設巡司及稅務於此本名竹墩以宋廟諱更名竹鎮皇厰河集縣南五十里外江内河集中之最繁衍者雷官集縣西南五十里通滁州大道程家橋集縣西二十里地通大河亦繁盛施官集縣西五十里裴家集縣西北五十里馬家集縣北五十里右六合縣蘇州府滸墅關府西北二十七里百貨到此完稅有監收公署楓關閶門西七里為南北衝要地介吳長二縣各省商米豆麥屯聚於此駟馬闗崑山縣小西門外界涇闗常熟縣西南五十里胥闗渡府胥門外九里河渡胥口東南之九里其河南抵東洞庭武山趾管家浜渡楓闗西北陸市鋪渡元和縣唯亭東車塘渡青洋江紅廟渡青洋江三江渡張家渡新渡明月渡浦缺渡沙蘿渡以上六渡俱在吳淞江南接青浦崑山縣界白茒塘渡在昭文縣渡沿海舊建白茒塘橋備巡海兵馬經行橋深闊易圮康熙三十四年改設官渡又有徐六涇渡亦然飲馬橋府治東宋淳祐中知府魏庠建織里橋府治西本吳王織里俗訛為吉利樂橋吳縣東吳赤烏二年建石巖橋織里橋西唐刺史白居易建名白頭橋有石刻字元總管道童重建改今名石巖葢其自號也憇橋城内西南吳軍憇息於此因名來遠橋胥門内舊姑蘇驛置此宋紹興間王㬇奏建專待屬國信使故名又