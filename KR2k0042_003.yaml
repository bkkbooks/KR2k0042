body:
  text: 江南通志卷四輿地志建置沿革總表江南之地包絡江淮控引河海實兼禹貢三州之域自淮以南東薄於海所謂淮海揚州江南最居要地淮以北則徐州之南土而西北兼得豫州東南之境其幅員為大自周官職方辨九州之地首列揚州蓋財賦所出其於藩服為重自塗山氏之國禹會諸侯於此春秋戰國之際吳楚最為彊盛而商書作咸乂之臣孔門居四科之賢實産江南而表著於六經其於風氣之開闢為先故其地自書傳以來有可考者左傳吳城邗溝以通江淮蓋北屬之沂東屬之濟以與晉會於黃池而西取楚之鍾離居巢六灊於是三江五湖淮海之瀕盡為吳國其後入於越并兼於楚然至今獨稱吳地云秦懲戰國始置郡邑分天下為四十郡江南得鄣郡泗水會稽九江潁川碭郡凡六郡之域其見於班史者又有東陽郡吳郡郯郡宋劉攽以為皆非秦郡王應麟以為楚漢之際所置者是也漢以秦郡遼闊更開置郡國高帝置東海郡改泗水為沛碭為梁國又立荆楚淮揚江都諸國武帝改鄣為丹陽又分置廬江臨淮廣陵汝南諸郡元封五年分天下為十三部部置刺史而揚徐豫兗四州仍用禹貢舊名然廣陵屬徐山陽屬兗非有夏之疆索矣後漢明帝改臨淮為下邳章帝改楚國為彭城郡順帝分會稽郡自浙江以西為吳郡其餘並仍前漢而所統城邑互有更易焉三國魏十二州有豫青徐揚其增置郡二十一有譙郡安豐而所省郡七一為廬江吳五州有揚州其增置郡二十一有新都吳興而自合肥以北至夀陽悉屬於魏皖城牛渚濡須並為吳重鎮蓋江淮之間魏吳邉境矣晉武帝平吳以天下為十九州而宣城臨淮毗陵諸郡或增或復厥後甚多江左因遺民南渡僑置牧司非其舊地又名號數易境土屢分不足深考宋世又多從土斷於是京口有南徐之名廣陵得南兗之號豫州立於江西青冀治於東海南齊州郡略從宋舊所謂京輦神臯望實隆重撫綏遐荒扞禦疆埸者蓋亦僅見爾梁武帝奄有舊吳克復淮浦其間郡縣每有析置陳氏威力不出於荆揚而江南州郡彌繁二代地志史氏闕焉北朝魏收淮北齊拓淮南洎周南清江甸至東夏削平之歲承高氏併省郡邑之後益多裁減隋開皇三年遂廢諸郡尋以户口滋多置州領縣大業之初更併省諸州尋即改州為郡隋氏州郡之名唐宋以來大半相㳂不改而禹貢九州之名漢晉所以統郡國者遂與州郡並列如廣陵郡為揚州彭城郡為徐州是也唐太宗始以山河形便創分十道曰江南道升潤常蘇宣歙池諸州在焉曰淮南道揚楚滁和夀廬舒諸州在焉曰河南道徐泗濠宿海亳潁諸州在焉開元二十一年又分江南道為東西而每道置採訪使如漢刺史之職其州郡則高祖為州明皇為郡肅宗復為州犂然有可統紀斯疆理之善者也五代職方出於攘竊之餘山川既隔風氣不通曷足究悉宋太祖平江南太宗朝吳越因唐十道分為十五路天聖析為十八元豐又析為二十三於是有江南東西路淮南東西路而其州郡頗沿唐制然仍南唐置者為泰州仍後周置者為通州改南唐雄逺軍置者為太平州又增安東真州又置高郵廣德無為淮陽諸軍宋一統之世與東晉南北朝迥異乃於兩漢六七郡之地建州設軍倍於隋唐良由編户孶殖墾藝寖廣政事條目日以益繁因時立制其勢然歟周隋之際有總管府唐有大都督府如漢晉刺史治所宋人每以龍潛舊邸升州為府如江南之安慶寧國後代遂以府名州郡亦自宋制云至宋南渡後以東南形勢所在立行都於建康而淮北之地並入於金金有單夀亳潁宿泗海徐邳等州蓋縣有改𨽻而州罕易置焉元有天下立中書省一行中書省十有一以統諸路府州其在今江南者江浙行省為路九集慶太平池州廣德寧國徽州平江常州鎮江府一松江州一江陰河南江北行省為路五廬州安豐安慶揚州淮安府一高郵又有汝寧府之潁州歸德府之徐宿邳亳四州又有中書省濟寧路濟州之沛縣其府州之制並因於宋而路與府州等自元始也明初改元集慶路為應天府建都府治悉改路為府改平江路為蘇州府而以汝寧歸德之潁宿邳亳四州分𨽻鳯陽淮安以歸德之徐州𨽻京師凡府十三州四皆直𨽻焉永樂後為南京府州訖無增省𢎞治中增置屬州一太倉後增縣四高淳青浦靖江霍山宋世領州縣者或府或州或軍元兼置路明専設府州較畫一矣皇清順治二年平定江南改置江南承宣布政使司駐省城十八年為左布政使領安慶徽州寧國池州太平廬州鳯陽淮安揚州九府徐滁和廣德四州分置右布政使駐蘇州領江寧蘇州松江常州鎮江五府康熙五年右布政使增領揚州淮安二府及徐州六年定為江蘇安徽二布政使司領府州如故松江府增置縣一婁縣揚州府通州省縣一海門雍正二年督臣查弼納量地制宜一疏請改鳯陽府之潁亳泗三州蘇州府之太倉州淮安府之邳海二州揚州府之通州廬州府之六安州並為直𨽻州以蘇州松江常州府之十一縣最稱繁劇悉分為二縣分太倉州置鎮洋縣分婁縣金山衛地置金山縣八年署督臣史貽直請改江寧府之溧陽縣屬鎮江府九年署督臣尹繼善請以淮安府之山陽揚州府之江都並分為二縣十年復請改徐州為徐州府增置附郭一縣以直𨽻邳州改𨽻府為屬州與睢寧宿遷二縣均歸府轄鳯陽府屬之夀州分置一縣十三年安徽巡撫王紘請改潁州為潁州府增置附郭一縣以直𨽻亳州改𨽻府為屬州與䝉城太和二縣均歸潁轄俱奉㫖允行今江南省江蘇布政使司領江蘇八府直𨽻三州安徽布政使司領安徽八府直𨽻五州竊惟江南為國家東南屏翰遭際聖朝游泳德化世祖章皇帝統一寰宇綏靖淮海聖祖仁皇帝深仁厚澤浹髓淪肌生息長養六十一年世宗憲皇帝至聖至明仁育義正豁免浮糧興修水利蠲賑緩徵德施汪濊體國經野斟酌變通分畫改𨽻隨宜盡善一十三年中民生日厚風俗益醇今皇上以聖繼聖紹揚前休御極以來浩蕩洪恩於江南霑被尤渥從此耕鑿之利普文明之化成土宇昄章永水太平自虞夏迄今為江南之極盛矣謹撰江南省建置沿革總表而各府州次第分系如左凡為府十六直𨽻州八屬州七縣百一十二附查弼納疏題為量地制宜請將附近之縣分𨽻各州以專責成事竊查江南財賦甲於海內欵項既多催科不易州縣那移出納多致虧缺全賴知府不時盤查乃知府或因所屬錢糧太多欵項太繁而詞訟刑名又復棼如或因所屬州縣過多路途隔逺而親臨往返致稽時日盤查均未詳悉因循故套照出無虧印結逮至水落石出雖定罪參追究難完補與其究追於事後莫若稽察於未然則山西撫臣諾敏題准分𨽻各州便於稽核實有禆於錢糧也江南應行分𨽻之處有以州縣過多幅􅊷太廣而應分者如安徽所屬之鳯陽府屬是也鳯陽一府管轄一十八屬地方遼闊東西廣一千二百里南北袤一千里界連齊豫最屬險要知府鞭長不及巡歷難周若以屬縣分𨽻各州則地近易查事簡易治查鳯陽一府所屬泗州宿州夀州潁州亳州共五州而潁州在府西四百二十里亳州在府西北四百八十里界聨豫省去府窵逺應以原屬潁州之潁上縣並附近州治之霍邱縣均𨽻潁州改為直𨽻亳州雖無掛銜屬邑而太和䝉城二縣附近州治應將亳州改為直𨽻而以太和䝉城二縣歸其管轄再泗州去府雖不及二百里而界連淮揚湖水廣闊相近之盱眙天長五河三縣水路險要最多鹽梟出沒應將泗州改為直𨽻而以盱眙天長五河三縣歸其管轄則統屬相連呼應自靈重湖深山稽查更易其餘宿州夀州仍歸該府管轄以一十八屬而分去其十則地近事簡易於經理矣有以錢糧太多刑名太繁而應分者如江蘇所屬之蘇州府屬是也蘇州一府雖止八屬然江蘇布政司所屬七府一州地丁雜項等銀四百萬兩零米麥豆二百五十八萬石零而蘇州一府銀居一百二十九萬零米麥豆居一百七萬零是一府所屬之銀米實居一省三分之一其繁雜可知加以盜案命案一切刑名實數倍於各府皆須知府一身管理雖有長才實難兼顧若使分𨽻則糧少事簡中才亦可䇿效查蘇州府屬之太倉州襟江帶海糧多事繁若以附近州南之嘉定縣並原屬之崇明縣均歸該州改為直𨽻則蘇州府八屬分去其三止存五屬與松江常州二府相等刑名錢穀經理自易矣再有以路途隔逺往返稽延而應分者如淮安府屬之邳海二州揚州府屬之通州廬州府屬之六安州是也淮安之邳州隔越黃河離府四百二十里海州僻處海濱離府三百七十里均接壤山東河海險要之處邳州則將原屬該州之宿遷睢寧二縣就近歸州改為直𨽻海州則將原屬該州之贛榆縣並附近之沭陽縣歸州管轄亦改為直𨽻揚屬之通州濱江傍海地最險要去府亦四百二十里應以附近之如臯泰興二縣均屬通州亦改為直𨽻廬屬之六安州雖去府不及二百里而阻山帶澤地控豫省本屬緊要地方其原屬掛銜之英山縣去府五百四十五里錯處楚壤地尤險逺應以英山縣並原屬六安掛銜之霍山縣同歸六安州管轄亦改為直𨽻則縣之去州為路甚近呼吸相聞易於為理矣其知州之一切考成俱照知府之例處分以上各縣如此分𨽻則屬邑既少錢糧易於查察虧空漸可杜絶而刑名詞訟以及生童考試俱免守候跋涉之苦不惟禆益於錢糧抑且有利於地方民生也至新改直𨽻各州亦各有倉庫若無専責恐致侵那應將潁州亳州泗州六安州四州錢糧仍就近令鳯廬道不時盤查太倉州錢糧就近令蘇松糧道不時盤查邳州錢糧就近令淮徐道不時盤查海州通州二州錢糧就近令淮揚道不時盤查如通同𨼆匿疏忽失察均照知府之例處分官吏無庸添設倉庫各有責成矣史貽直疏略為請分首府之屬縣改𨽻别郡等事江寧一府所轄八縣守斯郡者即才具優長已慮汲深綆短查溧陽縣距府二百七十里由縣至上興埠水路七十里小河沙淺舟楫難行又陸路六十里山路一百四十里更屬﨑嶇且非驛遞通衢公文上下押糧解犯等事素稱不便一有緊急公務每至呼應不靈此溧陽縣之不宜𨽻於江寧府也又查縣志漢時名永安𨽻丹陽郡至隋以後改𨽻江寧今丹陽現𨽻鎮江府則溧陽原係鎮江府舊屬再鎮江一府只轄丹徒丹陽金壇三縣不若江寧八縣之多况溧陽至鎮江府城止二百三十里較江寧更近四十里且係內河一舟可達遞送公文押解糧犯深屬便宜請將溧陽縣改𨽻鎮江府云云尹繼善疏略為請分繁劇之縣以禆吏治事淮安府屬之山陽縣揚州府屬之江都縣路當衝要事務殷繁附居府城幅􅊷遼闊雖有幹練之員肆應難周竊思蘇松常三府大縣自分設以來官民均便山陽江都二縣亦應各添一令分疆而治與地方甚有禆益查山陽有廟灣鎮見有城池營汛居民稠密可以改為縣城廟灣西至蘇家嘴板湖集陳家集等處北至北沙單家港周門東坎等處東至海邉原皆山陽所管今均劃歸新縣管轄惟南門外里許射陽湖之南岸即屬鹽城縣地界應鹽邑之草偃口一帶地方劃分新縣管轄廟灣城中原設有海防同知已經移駐童家營所有該同知衙門即為新縣衙署添造倉庫監獄書吏房舍再添設縣丞一員專管糧河事宜聽河臣題補並添設典史一員管理捕務草偃口係私鹽出沒之所應將廟灣司巡檢移駐其地與原設之鹽場大使分任巡緝均𨽻新縣管轄鹽城之清溝司巡檢移駐上岡地方以清疆界應設教職查舊縣訓導向分駐清江學宫不便撤回應將鹽邑訓導撥歸新縣將廟灣舊有學宫再行增修又江都縣新舊兩城舊城府東分與新縣府西分與舊縣新城自小東門外至缺口門南歸舊縣北歸新縣其邵伯上官二巡司並邵伯驛歸新縣管轄其瓜洲萬夀二巡司並廣陵驛歸舊縣管轄江邑原有縣丞主簿典史教諭訓導各一員將縣丞管舊縣河務主簿管新縣河務添設典史一員管新縣捕務訓導歸新縣管轄又如臯縣東沿海一帶港口繁多恐有私米出海民竈雜處縣令鞭長不及請添設主簿一員駐劄掘港場責令稽察彈壓並請鑄給印記以専責成又疏略為酌請改設府縣以専責成以禆吏治事竊照直𨽻知州其責同於知府本州事簡地僻猶可兼綜若地處衝要政務繁紛雖有長才實難勝任如下江之直𨽻徐州界連三省襟帶湖河為南北咽喉江蘇門户且地廣人稠水陸交通一切刑名錢糧事務甚多雖本州一邑之事猶慮竭蹶不遑何能再顧屬邑應請將徐州升為府治設立知府一員附郭添設知縣一員該府除轄附郭一縣並豐沛蕭碭四縣外有直𨽻邳州一州並所屬之睢寧宿遷二縣境土與徐毗連城池相隔亦在百里內外徐州既升為府邳州毋庸再設直𨽻與睢寧宿遷二縣均歸徐州府轄其一州七縣左右聨絡彈壓控馭於形勢亦甚相宜其應設同知通判首領各員查徐州有淮安府分駐徐屬河務同知一員即改為徐州府河務同知添設管理糧鹽捕通判一員經歷一員其附郭設立一縣應改設佐雜查徐州原有鹽捕河務州同一員南岸州判一員北岸州判一員應改為糧河縣丞一員南岸主簿一員北岸主簿一員均仍管河務原有吏目一員應改典史一員原有閘官三員巡檢一員東岸利國桃山彭城四驛驛丞均歸新設附郭之縣管轄再查上江鳯陽府屬之夀州四至周圍千里民俗刁頑命盜頻聞私鑄睹博叠經發覺所屬正陽關一帶又係水陸馬頭奸良溷跡知州一員難以肆應請分設一縣添知縣一員分疆而理以城內之東北隅並北門外之石馬店等處東門外之石頭鋪一帶地方劃分新縣管轄並設典史一員管理捕務如此則要地有統理劇邑有分任而吏治易收實效矣王紘疏略為酌請改設府縣以専責成以裨吏治事竊照直𨽻知州其責實同於知府本州事簡民淳自可兼理若地處邉要民刁政繁雖有長才實難勝任如上江之直𨽻潁州界接豫省地方遼闊錢榖而外刑名事件數倍他屬且俗悍民頑正需整頓即本州地方之事猶慮竭蹶不遑何能再顧屬邑似應請將潁州升為府治設立知府一員附郭添設知縣一員即以潁州原治地方為新縣管轄該府除轄新縣一縣並原屬之潁上霍邱二縣外其直𨽻亳州一州並亳屬之䝉城太和二縣境土與潁毗連潁州既升為府則亳州毋庸仍設直𨽻可與䝉城太和二縣均歸潁州府管轄共一州五縣在知州知縣既得各辦本任事務知府可以統率稽察巡歷整飭於吏治民風均可望其實效新縣附於郡城而亳在潁之北䝉城在潁之東北霍邱在潁之東南潁上在潁之東太和在潁之西北則潁郡適居其中四址相若左右聨絡彈壓控馭於形勢亦屬相宜至知府員下僚屬應添設糧捕通判一員專司監兑一州五縣漕糧督緝捕務並添設經歷一員兼管府司獄事新縣員下應添設縣丞一員典史一員舊有沈邱鎮巡檢一員即歸新縣統轄其府學事務即以潁州原有學正改為教授縣學事務即以潁州原有訓導改為新縣訓導分𨽻管理毋庸另外添員知府與經歷衙署原有知州吏目舊署新縣縣丞亦有州同舊署府監縣文倉俱有州監州倉至府學學改名以縣學附入均廟教授訓導衙署即將州毋庸添建惟通判與新縣知縣典史衙署及新縣監庫應請添造其現在潁州學文武生員應各半分𨽻府縣兩學肄業將來歲科兩試該府學與新縣學入學名數並廩增貢額俟會同學臣另核具題至新設府名似可倣照下江徐州改府之例即改為潁州府添設新縣恭候欽定佳名如䝉州府應仍由鳳陽道管轄盤查所有各恩允改設之潁敕部員應換應給印信關防鈐記請擬另行咨部議換給其有應另擬字樣者酌江南通志卷四
