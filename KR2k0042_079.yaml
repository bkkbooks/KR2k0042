body:
  text: 江南通志卷八十食貨志蘆課江南全省國朝原額上中下蘆田地密稀蘆地上中下草地荻草荒地山埸白沙泥灘埂划塌蕩濠塘水水影等項共四萬九千八百四十九頃二畝四分六釐有奇上下基地一千四百六十四丈一尺六寸一分江蘇布政使經歷司原額蘆田水蕩墟地共二千四十五頃三十三畝四分六釐有奇節年升增田灘五十九頃六畝九分六釐有奇實在蘆田灘蕩墟地共二千一百四頃四十畝四分三釐有奇河泓一道樓房披二百九十八間碾八部康熙三十年劃歸各該州縣管理徵解節年坍減蘆州等項一千五百一十九頃七十六畝九分四釐有奇坍除樓房披二十四間丈坍上下基地一十二丈劃出歸併江西德化縣並九江衛管理稀蘆地等項一百一十四頃四十二畝三分八釐有奇江蘇蘆地劃歸安徽管理出入扺算少五十三畝七分三釐節年升增并歸入江蘇布政使經歷司橫海江陰江寧三衛及莞瀆場入官蘆洲等項共一萬三千二百三十三頃九十二畝三分有奇又劃歸江西彭澤湖口二縣稀蘆草地七頃六十一畝六釐有奇雍正十三年實在上中下蘆田地密稀蘆地上中下草地荻草荒地山場白沙泥灘埂划塌蕩濠塘水水影等項共六萬一千四百五十五頃八十二畝七分七釐有奇河泓一道樓房披二百七十四間碾八部上下基地一千四百五十二丈一尺六寸一分實徵蘆課正腳等銀一十七萬三千三百八十二兩一錢六釐八毫有奇江蘇布政使司國朝原額上中下蘆田密稀蘆地上中下草地荻草荒地山場白沙泥灘埂划塌蕩濠塘水影等項共二萬五千八百五十頃九十四畝九分五釐有奇河泓一道樓房披二百九十八間碾八部節年坍減蘆洲等項三百三十一頃三十三畝三釐有奇坍除樓房披二十四間又劃出歸併東流當塗無為州和州四州縣管理蘆洲田地灘蕩等項二千四百一十二頃六十四畝二分二釐有奇節年升增並歸入布政使經歷司及莞瀆場入官蘆洲等項共九千二百三十四項一十三畝七分有竒雍正十三年實在上中下蘆田密稀蘆地上中下草地荻草荒地山場白沙泥灘埂划塌蕩濠塘水影等項共三萬二千三百四十一頃一十一畝五分四釐有竒河泓一道樓房披二百七十四間碾八部實徵蘆課正腳等銀一十二萬一千五百五十七兩五錢九分一釐有竒江寧府原額上中下蘆田地密稀蘆上中下麥草地泥灘埂划水蕩水影等項共八千五十八頃五十六畝二分四釐有竒河泓一道樓房披二百九十八間碾八部節年坍減蘆地等項九頃九十七畝七分七釐有竒坍除樓房披二十四間劃歸武進丹徒儀徵東流當塗無為州和州七州縣管理蘆洲等項二千八百四十八頃四十一畝八分七釐有竒雍正八年以溧陽縣改屬鎮江府額減蘆洲四十八頃一十二畝九分有竒節年升增并歸併經歷司寺監蘆洲等項一千六百一十頃八十五畝六分有竒又丹徒縣劃歸上元縣管理蘆洲七十九頃五十五畝九分有竒雍正十三年實在上中下蘆田地密稀蘆上中下麥草地泥灘埂划蘆墩划場水蕩水影等項共六千八百四十二頃四十五畝二分有竒河泓一道樓房披二百七十四間碾八部實徵蘆課正腳等銀二萬八千一百六十九兩四錢五分三釐四毫有竒上元縣實在上中下田地密稀蘆麥草地埂划塘上中下泥灘水影等項共一千六百五頃九十畝三分一釐有竒河泓一道內每畝上密蘆地科銀六分密蘆地一則科銀四分一則科銀三分五釐釐稀蘆地科銀三分上上田科銀一錢一分五上中田科銀一錢五分上上中次田科銀一錢田上田科銀八分五釐中田科銀七分下科銀六分上地一則科銀四分一則科銀三分五釐四中地科銀三分下地科銀一分麥地科銀分基地科銀一錢三分三釐則熟地科銀八分地埂划一則科銀二分五釐一科銀一分草科銀一分灘水科銀四分有埂溝科銀一分科蘆地外泥科銀九釐六毫竒水蕩一則銀一分一則科銀一釐灘沙灘科銀一分泥草灘科銀八釐二毫上泥科銀五釐次灘科銀二釐釐下泥灘科銀一釐復復沙上地科銀三分五埂地科銀四分沙上中下田埂划蘆草地上中下泥灘俱與前科則同起科光灘水影例不實徵蘆課正腳等銀九千三百二十七兩六錢一分六釐八毫有竒江寧縣實在上密密稀蘆中麥上次草地泥灘江灘等項共三百八十六頃四十八畝九分一釐有竒內每畝上密蘆科銀六分科密蘆科銀四分地稀蘆科銀三分上草地銀一分次草科銀五釐堆中麥地科銀四分十泥灘科銀二釐上新河木江灘徵課銀三四兩四錢八分四釐實徵蘆課正腳等銀一千二百一十六兩一錢五分七毫有竒句容縣實在上中下蘆田密稀蘆地草地上中下埂划泥灘等項共七百一十一頃八十五畝一分六釐有竒內每畝上上田一則科銀一錢一分五釐一則科銀八分五釐中田科銀七分竒下田科銀六分四上密蘆地科銀六分三毫有密蘆地科銀分稀蘆地科銀三分埂草地科銀一分下上埂划科銀一分五釐灘中划科銀一分埂划科銀一釐次泥科銀三釐下泥灘科銀一釐光泥灘例不起科實徵蘆課正腳等銀一千四百八十七兩九錢二分二釐六毫有竒溧水縣實在蘆墩草灘共一十七頃四十一畝一分一釐有竒內每畝蘆墩科銀四分二分草灘科銀實徵蘆課正腳等銀三十六兩五錢五分九毫有竒髙淳縣實在蘆墩七頃七十三畝二分九釐有竒內每畝科銀二分實徵蘆課正腳等銀一十五兩四錢六分五釐九毫有竒江浦縣實在上中下蘆田密稀蘆麥草地埂划泥灘水蕩水影等項共一千八百九十六頃五畝七分五釐有竒內每畝上上田科銀一錢一分五釐上田科銀八分五釐中田科銀七分蘆下田科銀六分埂上密蘆科銀六分科麥地密俱科銀四分划水蕩