body:
  text: 江南通志卷一百十職官志文職十二廬鳳潁三府滁和廣六泗五州國朝分轄廬州府知府一員同知一員通判一員經厯一員照磨一員知事檢校順治初年裁儒學教授一員復設訓導一員常積庫大使並裁司獄司司獄知府趙允光大興人貢生順治三年任蔣文運進士張之英登封人吳允升奉天人胡鳳閣直𨽻人黃承運韓威宣山西人舉人王業興奉天人王階景州人進士胡獻珍錦州人貢生聶源宣府人舉人劉道著奉天人貢生薛之佐四川人舉人康熙十九年任杜立本寶坻人廕生康熙二十二年任張純修正白旗人貢生康熙三十二年任馬雲從鑲黃旗人監生任康熙四十六年姚漁鑲紅旗人監生康熙五十三年任陳廷綸平樂人進士康熙五十九年任吳節民泉州人廩貢雍正二年任孔興誥曲阜人監生雍正二年任趙向奎聞喜人舉人雍正四年任馮景夏桐鄉人舉人雍正五年任于其珣文登人歲貢雍正六年任徐大枚正藍旗人進士雍正六年任盧見曾德州人進士雍正十三年任髙越鑲黃旗人監生雍正十三年任合肥縣知縣一員縣丞一員主簿裁典史一員儒學復設教諭一員訓導一員石梁鎮巡檢一員泒河驛驛丞一員護城驛驛丞一員店埠驛驛丞一員知縣藺完瑝陜西人進士張鯤翔陜西人進士司南河南人貢生呂鳴燕直𨽻人舉人缺祥直𨽻人貢生朱治隆貢生楊世滋貢生張九鼎直隸人舉人方象璜嚴州人進士萬盛江西人舉人瞿戴仁達州人舉人雷動聲奉天人筆帖式曾光龍廣平人進士范時著奉天人監生熊一栻南昌人監生季惠毛四川人舉人沙渭山東人拔貢葉永隆大興人嵗貢賈暉正紅旗人王文煥鑲白旗人康熙四十四年任陸登選甌寧人舉人康熙五十四年任王作梅河內人進士康熙五十七年任李月槎奉天人監生康熙六十年任馬倬睢州人進士雍正三年任馬振先隆安人拔貢雍正五年任趙良墅考城人嵗貢雍正七年任戴昕馬平人舉人雍正十二年署任張潮山陽人舉人雍正十三年任張吉掖縣人監生雍正十三年署任陶士偰寧鄉人進士乾隆元年署任廬江縣知縣一員丞簿俱裁典史一員儒學復設教諭一員訓導一員冷水關巡檢一員知縣周迓祚翼城人舉人順治二年任陳所聞鄭州人生員順治四年任孫𢎞哲樂安人進士順治七年任祁文友廣東人進士順治十八年任孟述乾南和人康熙四年任許長庚湘潭人舉人康熙七年任王𢎞聲奉天人康熙八年任耿光祖山東人貢生康熙九年任崔冕安平人舉人康熙十年任劉爾成通州人教習康熙十一年任孫承麟臨海人舉人康熙十二年任盧均天應山人副榜康熙十五年任馬光東光人貢生康熙二十年任李衍芳鶴慶人舉人康熙二十三年任王仁深儀封人舉人康熙二十六年任吳賓彥錢塘人吏員康熙三十五年任孫承祚滿州人筆帖式康熙四十五年任何洪先涪州人舉人康熙五十四年任馬洪遂閬中人舉人康熙六十年任塢廷豳陽朔人舉人雍正四年任陳慶門盩厔人進士雍正七年任熊郢昌雲南人舉人雍正十二年任陳景淳秀水人貢生雍正十三年署任李長發西華人嵗貢雍正十三年任髙式矩洪洞人嵗貢乾隆元年署任舒城縣知縣一員丞簿俱裁典史一員儒學復設教諭一員訓導一員梅心驛驛丞一員三溝驛驛丞一員知縣于應昌恩縣人貢生丁時升奉天人趙來鳴禹州人進士陸秉忠奉天人王宗聖奉天人周敬先漢陽人貢生龔勳浙江人進士張若煌膠州人貢生劉茂桂山西人貢生張可捷大同人舉人蔡其珍營山人舉人何朝聘奉天人廕生張文炳臨川人舉人張開新直隸人貢生周國柱奉天人官生董守義奉天人張傑陜西人舉人李其藩髙明人舉人朱振嘉興人進士王朝瑞長山人嵗貢沈以栻嘉興人貢生周振舉祥符人進士張廷標鐵嶺人進士李光埏興安人舉人蔣鶴鳴秀水人舉人趙復普雲南人舉人趙良墅考城人貢生陳守仁石屏人進士鄧本立武昌人舉人雍正十年任陳洪猷廣東人舉人雍正十一年任郭鑲大名人廩生雍正十三年署任黎超凡華陽人舉人雍正十三年任無為州知州一員州同知一員州判裁吏目一員奉裁今復設儒學學正一員復設訓導一員土橋河巡檢一員奧龍河巡檢一員泥汊河巡檢一員黃雒河巡檢一員知州孟孔傳東平人拔貢順治二年任方安民奉天人貢生順治五年任佟國禎奉天人貢生順治七年任喻珩南昌人進士順治十二年任劉顯第奉天人貢生順治十五年任孟登雲趙州人官監順治十七年任李佑之長山人恩貢康熙二年任顔堯揆永春人拔貢康熙六年任楊竒烈奉天人貢生康熙十四年任孟述緒奉天人進士康熙十五年任王國輔正黃旗人廕生康熙十八年任韓淑文項城人進士康熙二十五年任張國楨寶坁人監生康熙二十七年任李璋正白旗人監生任康熙三十三年孫成已益都人拔貢康熙四十三年任胡良佐奉天人廕生康熙四十五年任韓開藩㑹稽人監生康熙四十八年任李廷煥鑲藍旗人監生任康熙五十三年韓繼先易州人監生康熙六十年任姚宗先山西人嵗貢雍正三年任張鏻鍾祥人嵗貢雍正七年任翁是平常熟人監生雍正十一年任丁士龍河內人嵗貢雍正十二年署任何其昱宜賓人舉人雍正十二年署任程雲貴州人舉人雍正十三年任范從徹鄞縣人監生乾隆元年任巢縣知縣一員原設主簿一員裁典史一員儒學復設教諭一員訓導一員焦湖司巡檢一員知縣段爾發東明人嵗貢順治三年任程萬鵬正紅旗人陳自明奉天人順治六年任趙熿無極人貢生順治十五年任龔庚昕隨州人貢生順治十七年任聶芳建寧人嵗貢于覺世山東人進士康熙七年任呂振永城人進士王錫髙平人舉人斐振元正白旗人監生楊極奉天人例監康熙二十一年