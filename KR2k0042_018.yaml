body:
  text: 江南通志卷十九輿地志風俗江南本勾吳舊俗左思所謂率土論都獨端委所彰髙節所興者也漢書地理志以為東海淮泗之間屬魯沛楚山陽屬宋其民有聖人之教化近先王之遺風又以為吳粵與楚接比數相并兼其俗略同蓋其文辭之失巧與啙窳不求積聚者自古已然然風俗者教化之所移易非獨其水土之性殊氣習之所尚不同也我朝覃敷文德久道化成漸摩以仁義節和以禮樂則吳中君子尚禮庸庶敦厖風俗澄清而道教隆洽史冊所傳聞者庶幾徵信於今兹矣江寧府君子勤禮恭謹小人盡力耕殖祥符圖經其人士習王謝之遺風以文章取功名者甚衆沈立金陵記南方水土柔和其音清舉顔介之永嘉之後衣冠萃止文藝儒術於斯為盛通典俗英且毅士清以邁地大而才傑宋楊萬里風流文物冠映古今汪藻建業自六代為都邑民物浩繁人材輩出實士林之淵藪楊演山川渾深土壤平厚華而不佻淳而不俚戚氏志生人之性亢朗冲融重義而薄利風俗之美喜藝文而厭凡鄙鄉鄰婚喪貧乏者互相佽助成之金陵文獻之邦以故寰宇推為奧區士林重其清議彈射臧否剖析毫釐擘肌分理者至今猶然俱舊志蘇州府因士類顯名於歷代而人尚文因僧徒倡法於羣山而人尚佛漢第五倫𫝊泰伯遜天下季札辭通國德之所化者逺矣更歷漢晉以來風俗清美俗多祠宇舊圖經志山澤多藏育風土清且嘉泰伯導仁風仲雍揚其波晉陸機詩郊無曠土多勤少儉吳郡志君子尚禮庸庶淳厖隋書當趙宋時俗益丕變有胡安定范文正之遺風焉及後禮義漸摩而前輩名德以身率先又皆以文章振動今後生文詞動師古昔而不梏於専經之陋矜名節重清議下至布衣韋帶之士皆能摛章染墨其俗甚美惟夫奢侈之習未能盡革舊志松江府文物衣冠蔚為東南之望經學詞章以至書翰咸有師法府志吳中族姓之盛自東漢以來有聞於世逮魏晉而後彬彬輩出左太冲所謂髙門鼎貴魁岸豪傑虞魏之昆顧陸之裔居於華亭者為最著故士奢於學民興於仁宋魏了翁記儒官翼翼不異鄒魯元趙孟俯四方名流彚萃於此薰陶漸染之功為多何良俊負海枕江水環山拱自成一都會民生其間多秀而敏其習尚亦各有所宗以至田野小民皆知以教子孫讀書為事土膏沃饒風俗淳秀俱舊志常州府人性佶直黎庶淳遜敏於習文疏於用武寰宇記建自泰伯宣於延陵髙節所興由克遜以立風俗左思賦頴異之材挺生此邦風俗記地偏俗儉宋蘇軾卜居說縣人學子知所向慕朱子宜興學記能振頽風以激衰俗非好賢樂善未易能爾府志人秀而文葛邲貢院記不事浮華少為商賈耕稼自給士尚儒術縉紳代不乏人男子不逺遊女子不交易士夫不衣文繡不乘輿馬俗多尚吟咏舊志士大夫皆知繩趨尺步納身軌物以為士民標準宜興志鎮江府本泰伯之化有謙讓之風舊圖經其禮遜謙謹婚嫁喪葬雜用周漢之禮寰宇記士大夫崇靜退貴氣節民庶循禮樂業而不好競嘉定志人性柔慧尚浮屠而少積聚宋志土風質而厚士風淳而直咸淳志士習詩書敦簡素民間故土力耕稼而不急工商之利嗇於自奉婦人恥出門戶金壇志京口為舟車絡繹之衝四方商賈羣萃而錯處轉移百物以通有無舊志淮安府人多輕剽士任氣節隋書志重禮教崇信義闤市或雜澆僞至於農氓顓固極矣地理志士勤學問民務農商有淳厚之風禮讓之俗中都志書軌新邦英雄舊里宋蘇軾淮隂廟碑漸漬聖化綽有餘風圖冊喜學問從教化雖兵革之餘猶有是心元志淮安之俗淳實尚義勇悍習戰舊志地大物衆細民棄本務末豪右亦頗崇華黜素南畿志土沃生蕃河患豐歉不常安東志揚州府土俗輕揚孔氏六帖流寓無定憩梁栁世隆揚州之俗號為繁侈元和志地分淮海風氣清淑俗務儒雅士興文藝明王與學記俗尚侈靡其士多明秀俊偉彭時學記俗從約而易化士循理而多文海陵之民惟事耕漁性多朴野俱郡志土髙而廣於水俗廓而勤於稼髙郵題名記徐州府徐方鄒魯舊國漢興猶有餘風杜氏通典人頗鷙悍其士子挾任節氣好尚賓游蓋楚風焉隋書志霸者之餘以武為俗宋陳師道學記蕭風俗渾厚多智慮務農生財朝端中沛地鄰鄒魯務稼穡尚禮義沛縣志沛以勇宕為俗李蔚美政記碭邑之學弦歌方盛元大成殿記豐熟可抵三州民事農桑樂輸賦役而其俗亦淳豐縣志俗多楚音朴直舒徐地理志風俗髙邁迥出等倫舊圖經士願民朴重亷恥崇信義邳州志太倉州正統以後太倉始立學校仕進者輩出文物漸盛於前明陸容太倉氣習風類耿拔自樹財賦攸出政重農官周鳳岐𢎞治以後竟名大邦峻城深池文學顯於天下張溥俗尚氣節好清議少不檢即私相非笑且安土不好逺遊無故未嘗適百里縱商游不至經歲舊志嘉定風氣沉厚其君子務讀書行義以古人為師王衡崇明越在海表其土風古其性勍其人馴擾舊志海州海州古郯子國也孔子嘗遊焉其地密邇鄒魯昔為東海郡號稱多材海州志贛僻在海隅人性顓朴無機利之習明王典閭閻殷富人物焜煌山川草木潤媚而韶秀淮平以北稱美土焉董杏沭漢之厚邱治居淮朔壤接東省有洙泗之遺風家詩書而户禮樂弦歌之聲不絶於閭巷草野忠孝節義時見於愚夫愚婦沭陽志通州文采風流衣被到今稱為淮南書院舊志魚鹽之利商賈多集弦歌之聲章甫亦衆宋學記通阻江濱海盜稀訟簡通州志如臯水土清淑自胡安定以經學倡率東南閭巷秀民皆知向學弦誦之風於今為盛如臯志安慶府江南之氣躁徑厥性輕揚晉書同安郡人性剛强風氣果決其舊風然也自平陳後俗尚淳質好儉約喪祀婚姻率漸於禮隋書土壤膏沃人性輕揚善商賈廛里饒富宋史風俗清美天性忠義荆楚饒徑士吳越多秀民皖介兩服之間沉潛髙明蓋兼具矣俱舊志安慶人物忠敢不愧於古懷寧易桐城逹望江慤灊山毅太湖諍宿松直大抵江北風氣近厚故其習尚多類中州明胡纘宗六皖山川美贍弦誦力本其禮教信義聞之熟矣安慶志徽州府地雜甌駱性剛强君子務為奇行髙節而羞不義異才間出朱子文集自昔多以材力保捍鄉土其後寖有文士山限壤隔民不染他俗勤於山伐能寒暑惡衣食淳熙志新安為文公闕里後先相望斯文盛昌明授朱升學士制山居十之五民鮮田疇以貨殖為恆産善識低昻時取豫以故賈之所入視旁郡倍厚其家居也為儉嗇而務蓄積女人尤號能儉大都務為貞潔雖妾媵女厮之徒亦以流合為恥故李維貞曰歙女流之鄒魯也冠冕之倫多尚氣節矜取豫有唐風瞿瞿之意其髙者杜門却軌自偶古人監司守相莫能識其面俱舊志寧國府火耕水耨民食魚稻以漁獵山伐為業飲食還給不憂凍餓亦亡千金之家漢書地理志川澤沃衍有海陸之饒其人君子尚禮庸庶敦厖故風俗澄清而道教隆洽亦其風氣所尚也隋地理志舟車繁會風俗和柔唐尉遲樞記宣州故秦鄣郡地阻以重山緣以大江其俗佻而侈其人徑而悍有裴公耀卿者為刺史端本重學宣人始服化矣陳簡甫開元良吏記地廣而僻人質而文元志所産多材故秀民悅詩書好禮義閭巷田塘之氓悉有以自資而無慕於外舊志池州府民淳氣和衆貨畢給雖人物稠夥而有訟不嚚雖租賦浩穰而聞令必集宋盛約記人性便利喜動經生學士文雅彬彬以漁獵為業俱秋浦志冠婚喪祭互相周恤石埭志剛柔既殊雅俗亦分人志懷刑衣冠濟濟人性機敏往哲熙熙大槩士夫崇恬退尚氣節婦女親蠶織工紡績土著之民憚逺行不事貿遷甘心貧窶以故六邑利權半歸寄客百家末藝盡出遊民俱舊志太平府火耕水耨民食魚稻螺蛤故呰窳偷生而無積聚漢地理志當塗井邑雖疏而開豁物産豐懿宋張舜民南征録姑孰本江東道院民淳不澆洪邁貢院記其民渾然太朴帷土物是愛故能臧厥心惟本業是崇是以無末作吳淵蕪湖附河距麓舟車之多貨殖之富衣冠文物之盛殆與州郡埓元黃禮質而不華儉而不侈務耕讀之業絶淫博之風祝鑾記地既分則風俗異詎可以輕揚目之劉子澄太平圖經廬州府人物語音風土明茂皆勝淮左其性躁徑風氣果決隋書地理志風俗淳朴事耕桑崇儉重名務學賢才彚興舊圖經其民質直而無二心舊志人物清修苦節廉介忠義黃宗載記自昔其民質朴不好爭訟而風俗淳美王志英序衣冠文物之懿視昔有加生民爼豆婚嫁於桑梓間弦誦之聲接於四境朱鏞序山川髙深風氣完密有中州質願之美元虞集記其俗朴茂剛健而少文其民勤力稼穡而多殷富王章記土厚水深士生其間剛徑篤實足以任重楊博記俗尚淳質好儉約喪祀婚姻率及於禮廬江古志人性淳厚好學務本畏犯法而少鬬訟無吳楚徑悍之風無為圖䇿鳳陽府鳳陽性率真直其食粳稻其衣絁布寰宇記淮南著美風流所被文詞並興在城務商在野勤嗇無告訐之風俱濠梁志鍾離風俗號稱近古鳳陽志俗慕學問才産文武方輿勝覽務儉勤農知慕孝行夀州圖經土俗儉朴民生淳厚力農務本逐末者少鄉里無鬭爭之習彬彬然有古之遺風臨淮記宿地闢民聚風俗淳美宋應奎進士題名記潁州府汝南之别皆急疾有氣勢漢書地理志舊傳其俗傲蕩今則好尚稼穡重於禮文其風皆變於古隋書志民性安舒多衣冠舊族土地褊薄迫於營養洛俗然也汝隂在二京之交頗同於洛邑宋史志民淳訟簡而物産美土厚水甘而風氣和歐陽修思潁詩序里巷敦扶持之教男女别飲食之筵元史志汝潁人率性真直賤商務農寰宇記尚氣安愚風土記汝潁固多奇士賁嵩論風俗清麗人備文武舊志平原曠野土壤饒沃水陸四通五逹而無崇山峻谷之險阻舊志仁厚之俗勤農事惡衣服人皆忠義本於張巡許遠之表率亳州志人性質朴惟務農桑今則工商交作詞訟簡少俗尚禮義視昔為盛異聞集滁州地僻訟簡其俗安閒宋章衡醉翁亭記滁介於江淮之間舟車商賈四方賓客之所不至民生不見外事而安於畎畝衣食歐陽修豐樂亭記習尚勤儉専力農桑郡志雖風俗淳厚而尚氣節易以德化難以力服吕元中紫微泉記和州楚越之地飯稻羮魚不待賈而足地勢饒食無饑饉之患以故呰窳偷生無積聚而多貧史記歷陽人性躁徑風氣果決自平陳之後俗頗尚淳質好儉約隋志女工尚堅全男工尚墾闢市無蚩眩工無雕彤無遊人異物以遷其志唐劉禹錫記四民各安其業而儒雅之風尤甚和州志廣德州民力於南畝不務商賈漢地理志民淳事簡號江東道院南畿志人性直好義君子業儒術而尚質朴小人崇節儉而務農桑婦女不出戶閣富貴不服羅綺宋曽鞏志境大壤沃食貨富穰曽鞏鼓角樓記六安州舒六之貢利盡荆楚晉伏滔正淮論淮右名州沃野千里明朱子奢民力田疾作輸納以時庶幾家給人足舊志六地介南北剛柔適中文業武功彪炳史冊民勤耕稼士崇氣節皆以禮讓相先無復嚚訟俱六安志泗州地接齊魯民尚淳朴以信義為先與洙泗通源雍容揖讓有古君子風舊志泗人性舒緩朴直城市之民不為商鄉落之民鮮識字士習文雅清恬願慤學校畏清議仕宦顧名節泗州志盱眙自古稱為壯縣民强徑易馴以義元揭徯斯天長民朴而願士質而文龍侍御記江南通志卷十九
