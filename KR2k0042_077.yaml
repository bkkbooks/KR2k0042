body:
  text: 江南通志卷七十八食貨志漕運二國朝順治初原額漕糧正兌改兌正耗米二百二十三萬二千九百五十三石三斗四升七合有竒白糧正耗舂辦等米二十七萬一千六百一十二石六合有竒隨漕白項下本色米三十四萬二千二百八十石九斗六升有竒麥三萬七千八百一十七石八斗五升一合有竒豆五百六十石八斗七升八合有竒折色銀九十三萬二千五百七十一兩五錢九分九釐有竒本色三分席七萬七千一百二十六領八分有竒輪運千總一百七十二員隨幫百總六十七員丁四萬六千七百三十七名內除減丁外實運丁四萬一百一十九名五分船四千二百六隻內除減存外實運船三千五百八十四隻九分康熙二十二年額徵漕糧正兌改兌正耗米二百二萬六百八十七石七斗八升八合有竒白糧正耗舂辦等米一十萬五千八百四十六石八斗八升四合有竒隨漕白項下本色米三十三萬二千九百一十六石九斗四升六合有竒麥三萬四千六百四十七石四斗一升五合有竒豆與原額同折色銀九十萬二百三十九兩五錢二分五釐有竒本色三分席六萬一百五十二領二分有竒輪運千總隨幫百總俱與原額同丁四萬七百六十名三分船三千六百四十三隻九分雍正十三年實在漕糧正改兌正耗米二百一十一萬五千六百三十一石一斗八合有竒白糧正耗米一十九萬三千七百八十三石五斗八升二合有竒內漕糧正改兌正米一百五十四萬八十四石八斗一升二合有竒耗米五十七萬五千五百四十六石二斗九升五合有竒九白糧正米一十五萬四百七十三石二斗一升合有竒耗米四萬三千三百一十石三斗六升三合隨漕白項下本色米三十九萬四千六百六十四石八斗一升三合有竒麥九萬二千八十石一斗二升有竒豆五千五十六石七斗八升一合內贈貼五米一十萬四千二百七十四石六斗三升一合有竒行月米二十五萬一千一十四石七斗四升七合石盤耗并運船水手食米三萬九千三百七十五四斗三升五合行月麥九萬二千八十石一斗二升有竒豆月糧豆一千六十五石七斗六合徐倉行月三千九百九十一石七升五合折色銀一百三萬七千七百四十兩一錢三分一釐有竒內贈貼銀一十七萬八千七百八十九兩七分二釐有竒輕齎正扛席木板折旱腳船料等銀一十八萬四千四百四十三兩七錢四分六釐有竒加漕裁扣并新增協濟等銀一十一萬一千七百五十三兩二錢五分二釐六升米折銀三萬一千七百二十八兩七錢二分六釐贍裁扣幫官廩工銀二百一十六兩行月凑修運等銀一十一萬七千五百九十兩七錢六分七釐戶俸廩揚亳二倉屯折支剩山河搬運永減月糧口鹽鈔等銀二萬四十四兩二錢四分九釐分民七軍三銀一萬一千一百八十二兩二錢四七釐有竒改折灰石銀三萬五千六十五兩一錢九分七釐錢各倉扛費銀一十一萬四千七百五十三兩六八分八釐三白糧經費銀一十萬四千五百六十三兩九錢分裁存經費銀一十二萬七千六百九兩二錢五分七釐本色席五萬四千九百八領一釐有竒松板九百五十九片八分一釐有竒輪運千總一百三十員隨幫百總六十三員丁四萬三百四十名船三千八百三隻江安等處督糧道所轄各府州衛漕糧正雜等項國朝順治初原額漕糧正改兌正耗米六十八萬一千九百八十一石八斗三升有竒隨漕項下本色米二十萬一千三百五十九石六斗五升一合有竒麥二萬一千六十二石五斗七升五合有竒豆五百六十石八斗七升八合有竒折色銀二十五萬六千四百九十一兩三錢四分八釐有竒本色三分席七萬七千一百二十六領八分有竒輪運千總一百五十員隨幫百總五十九員丁三萬九千四百九名內除減丁外實運丁三萬三千三百九十名七分船三千五百五十八隻內除減存外實運船二千九百九十隻一分康熙二十二年額徵漕糧正改兌正耗米五十三萬七千九百七十六石九斗三升五合有竒隨漕項下本色米一十九萬二千八百三十一石六斗二升八合有竒麥一萬八千一百石三斗七升二合有竒豆原額同折色銀二十三萬四千八十七兩五錢八分八釐有竒本色三分席六萬一百五十二領二分有竒輪運千總隨幫百總俱與原額同丁三萬四千三十一名五分船三千四十九隻一分雍正十三年實在漕糧正改兌正耗米五十七萬八千五百八十五石一斗四合有竒內正改兌正米四十三萬五千五百八十四石四斗一升八合有竒耗米一十四萬三千石六斗八升六合有竒隨漕項下本色米二十一萬一千三百三十七石三斗六升九合有竒麥七萬五千五百一十三石二斗四升八合有竒豆五千五十六石七斗八升一合內漕贈五米二萬七千四百二十三石二升七合有竒係隨漕給丁沿途濟運之項升行月米一十六萬九千六百二十二石六斗六九合係動放江興新宣等衛各幫丁行月之項升鳯淮二倉米一萬四千二百九十一石六斗七三合內除動放廬鳯等衛各幫丁行月外餘剩解部動月糧麥二萬七百四十一石六斗七升四合係放廬鳯淮揚等衛各幫丁月糧之項鳯淮徐三倉麥五萬四千七百七十一石五斗六升四合內除動放廬鳯等衛各幫丁行月外餘剩解部二月糧豆一千六十五石七斗六合係動放淮大衛各幫丁月糧之項徐倉豆三千九百九十一石七升五合內除動放廬鳯等衛各幫丁行月外餘剩解部折色銀三十八萬五千七百六十八兩六錢六分一釐有竒內漕贈五銀二萬七千四百二十三兩二分七釐有竒係隨漕給丁沿途濟運之項輕齎席折旱腳船料等銀四萬七百一十四兩六釐有竒內除解通銀一萬八千餘兩并凑放造船料價行月外餘銀解部分加漕裁扣等銀七萬六千二百九十兩九錢八四釐係動放江興各幫行月之項新增銀二萬八千三百九十四兩九錢八分四釐係動放江興各幫官丁俸廩行月之項協濟銀七千六十七兩一錢八分四釐係給放江興各幫造船鑽夫底料之項六升米折銀二萬四千八百一十五兩二錢二分三釐係動放江興新安等衛各幫丁漕船之項行月凑修等銀四萬六千九百七十兩四釐係動放新安等衛各幫丁行月凑修漕船之項俸廩揚亳二倉屯折支剩山河運永減月糧戶口鹽鈔等銀二萬四十四兩二錢四分九釐聽候撥給運丁濟運餘剩解部鳯倉米麥扛費等銀七萬九千二百九兩五分六釐淮倉麥折扛費等銀一萬三千三百五十八兩九錢九分徐倉銀二萬一千四百八十兩八錢五分四釐以上三倉銀內除動放廬鳯等衛各幫丁行月外餘剩解部本色席五萬四千九百八領一釐有竒松板九百五十九片八分一釐有竒輪運千總一百一十員隨幫百總五十三員丁三萬四千四百五十名船三千二百一十四隻江寧府額徵漕糧正改兌正米六萬二千六十四石七斗五升八合耗米二萬三千四百八十三石四斗一升五合隨漕雜項米共三萬五千八百五十六石九斗六升八合內贈貼米四千二百七十七石四斗八合南屯行月米三萬一千五百七十九石五斗六升銀三萬六千一百九十五兩二錢八分六釐內贈貼銀四千二百七十七兩四錢八釐八輕齎席折并五釐席銀四百五十一兩二錢分七釐協全裁書辦工食銀一千一百九十一兩六錢濟安慶衛半折行月銀二百二十三兩三錢五分四釐新加漕銀八千二百一十七兩六錢三分二釐增銀一萬四千八十七兩五錢二分五釐釐黃快三則屯糧協濟銀三千五百九兩三錢九江寧厰料銀一千四百三十二兩四錢一分二釐兩六升過江米折銀二千八百四七錢四分九釐本色席七千七百五十八領六釐本色松板二百四十八片六分安慶府額徵漕糧正兌米五萬九千一百五十四石七斗六升八合耗米二萬三千六百六十一石九斗七合有竒隨漕雜項米共一萬四千七百二十九石六斗六合有竒麥二千四百三十七石二斗一升三合內贈貼米二千九百五十七石七斗三升八合零安慶衛行月米一萬一千七百七十一石八斗六升八合百協濟廬州府月糧本色麥二千四三十七石二斗一升三合銀四萬四千八百一十三兩有竒內贈貼銀二千九百五十七兩七錢三分八釐有竒輕齎席折并五釐席銀七千九百一十一兩九錢五分全裁書辦工食銀一千七百九十四兩四錢千民七軍三料價并魚課篙師海防房地等銀三九百一十六兩二錢七分一釐安慶衛行月銀八千七十六兩六錢一釐廬扣守千現候改品俸薪銀七十兩一錢協濟州府月糧麥折銀九百九十六兩八錢六釐釐給守千現候俸廩工銀三百七十八兩七錢六鳯倉麥米折銀一萬八千七百一十兩四錢二分八釐本色席七千三百九十四領三分四釐有竒本色松板三百二片三分四釐有竒徽州府額徵南米二萬二千九百四十八石九斗隨漕雜項銀共七千四百六十八兩七錢二分八釐內行月銀四千一百七十五兩一釐辦工食銀一千七百一十六兩四錢全裁書民七軍三料價銀一千五百七十七兩三錢二分七釐寧國府額徵漕糧正兌米三萬石耗米一萬二千石隨漕雜項米共一萬四千八百三十二石七斗二升二合內贈貼米二千一百石合南米九千二百六十三石二斗二升二宣州衛行月米三千四百六十九石五斗銀一萬三千九百八十兩二錢三分七釐內贈貼銀二千一百兩兩輕齎席折并五釐席銀四千一十二五錢全裁書辦工食銀一千七百一十兩四錢釐民七軍三料價銀七百四十七兩一錢一分六行月并凑修漕船銀三千七百二十八兩一錢四分七釐山河搬運銀八十二兩五錢七分五釐鳯倉麥折銀一千六百兩本色席三千七百五十領本色松板一百五十三片三分三釐池州府額徵漕糧正兌米二萬五千石九斗四升九合耗米一萬石三斗七升九合隨漕雜項米共一萬五百八十六石五斗一升四合有竒內贈貼米一千七百五十石六升六合有竒南米五千一百七十七石九斗四升八合百新安衛行月米三千六五十八石五斗銀一萬二千三百一十八兩一錢三分八釐有竒內贈貼銀一千七百五十兩六分六釐有竒錢輕齎席折并五釐席銀三千三百五十三兩一二分六釐有竒裁扣書役工食銀一千六百七十四兩四錢銀建東二縣歸併饒撫南三衛所屯米折正贈共五千五百四十兩五錢四分六釐本色席三千一百二十五領一分一釐有竒本色松板一百二十七片七分八釐有竒太平府額徵漕糧正兌米一萬七千石耗米六千八百石隨漕雜項米共九千二百六十石內贈貼米一千一百九十石行月米八千七十石銀一萬五千七百六十七兩六錢七釐內贈貼銀一千一百九十兩七輕齎席折并五釐席銀二千二百七十三兩錢五分全裁書辦工食銀一千二百六兩八錢三新增銀四百八十九兩八錢六分三釐黃快則屯糧協濟銀八兩八錢三分二釐料民七軍三料價并本府豐濟倉餘剩行月抵充價共銀一千八百九十五兩七錢五分三釐分本府支剩行糧米折銀三百八十四兩七錢四二釐行月銀五千九百一十七兩八錢六分七釐鳯倉麥折銀二千四百兩本色席二千一百二十五領本色松板八十六片八分八釐廬州府額徵漕糧正改兌正米一萬一千五百六十一石耗米四千四百二十八石八斗隨漕雜項米共一萬五千四百三石四斗三升三合麥二百二十七石三斗四升六合內贈貼米七百九十九石四斗九升淮月糧米一萬二千八十二石七斗九升九合倉本色米二千二百九十三石七斗九升八合鳯鳯倉本色米二百二十七石三斗四升六合倉本色麥二百二十七石三斗四升六合銀八千