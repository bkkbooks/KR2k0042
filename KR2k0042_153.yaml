body:
  text: 江南通志卷一百五十人物志忠節二鎮淮揚徐四府太海通三州鎮江府南北朝梁江革字休映濟陽人居京口舉南徐州秀才隨豫章王鎮彭城城失守被執魏刺史王延明聞革才名厚加接待革稱腳疾不拜令為碑文辭不能將加箠撲革厲色曰今日得死為幸誓不為人執筆延明知不可屈放還後除光祿大夫卒諡強子德藻仕陳為御史中丞唐桓彥範字士則丹陽人門蔭授官狄仁傑見而器之纍擢御史中丞與張柬之等謀誅張易之昌宗於廡下中宗復位以定䇿功封譙郡公韋后預政上表切諫不納用方士為祕書監國子祭酒執不可尋封扶陽郡王罷其政武三思矯制殺之睿宗立復其官爵諡忠烈宋洪造字彥襲丹陽人興祖弟登進士第授歙州黟縣尉方臘陷郡縣造使家人間道奉親以歸而身當其衝據險殺賊賊憤甚及城破首取造擊殺之事聞贈廕張縝字彥智金壇人以父廕官至寶文閣學士金壇縣開國男建炎三年守揚州兵至朝廷恐縝力不能支許退保鎮江縝堅守不動城潰與妻子皆死之陳東字少陽丹陽人貢入太學欽宗即位率其徒伏闕上書請斬蔡京梁師成李彥朱勔王黼童貫六賊時李邦彥議和李綱主戰因小失利罷綱東又上書言綱可任邦彥宜斥乃召綱髙宗即位東復請留綱而罷黃潛善汪伯彥又請帝親征以還二聖俱不報會布衣歐陽徹亦上書言事潛善以語激怒髙宗遂收東東從容如平時手書區處家事具衣冠出别同邸與徹同斬於市髙宗後悔贈祕閣修撰茅湘字清淑丹徒人陸秀夫薦其才擢兵部侍郎從秀夫負帝昺蹈海死元祠祀秀夫崖山獨以湘配髙桂字德方丹徒人第進士歷官髙郵知府後扈從之海上進樞密使與陸秀夫同死於海趙淮字元輔以從父葵賜第溧陽遂家焉德祐中元兵大舉起淮為大府寺丞招集義兵倚屺山置寨與元兵戰敗被執不屈使往揚州招李庭芝降至則反大呼勵以死守元帥怒殺之罵不絶口二妾殉焉元堵簡字無傲金壇人為浙江行省檢校官從平章強通擊張士誠被執不屈遇害明郭任丹徒人用薦入官亷慎有吏才仕至户部侍郎靖難兵入抗義而死子經亦坐死時有丹陽人賀純管軍百戶已老聞變被甲策馬厲聲迎詬被害張德字仲敬丹徒人建文元年以薦授都督府斷事上治安五䇿時大臣建削弱諸王之䇿德疏言宜制之以禮不可以細人告變輒動搖宗室又見尚書齊泰言事皆曲突徙薪之計燕兵起德犒師至東昌與北兵遇奮勇擊殺馬蹶被執燕王趣釋之德瞋目攘臂言極激烈王怒劍斷其臂左右刃交下至死不仆文皇即位誅逆黨德以陳死不入籍族得全馬從謙字益之溧陽人嘉靖乙未進士仕至光祿少卿時盛修道家齋醮中官杜泰怙勢乾沒從謙切諫並發泰姦泰因誣從謙誹謗廷杖死萬厯時子冇譁以明經上書訟寃追贈太常寺少卿張捷字前之丹陽人萬歷癸丑進士知山陰縣擢御史疏請內官當受考察於禮部司禮不得侵其權如百官受考察於吏部閣輔不得侵其權之例官終吏部左侍郎嵗乙酉自經於雞鳴山寺捷居家孝友在官有清節以與東林相惡比匪人損名然其死也士論咸豫之賀應選字繼登丹陽人天啓甲子舉於鄉授四川資陽令張獻忠已躪全蜀應選嬰城固守城破闔門十七人俱被害荆本徹字濓之丹陽人崇禎甲戌進士出溫體仁門下有氣節與同年誓曰異日茍待罪言路宜别邪正罔顧私恩體仁銜之授建昌推官所屬南豐瀘溪令為相私人本徹發其隂事白巡按罷之體仁益怒誣為浮躁免官後以職方郎中監下江軍殁於浙東荆偉字元升丹陽人對䇿髙等授墊江縣繕城厲兵為固守計山賊龔遂等數出剽掠設竒敗之會獻賊窺蜀約遂為內應城陷不屈死陳册字用卿金壇人崇禎六年授四川寧番經歷署屏山縣事流寇破城罵賊死沈元鑑字竟亭金壇人授隨州吏目張獻忠犯隨元鑑同知州防禦兩月援兵不至城陷賊衆脅降元鑑曰有死而已遂被害其子文淵赴難賊剸其手死而復蘇負骸骨歸葬王希髙金壇人杜門讀書不交一人聞李自成陷京師即號泣出門其家蹤迹之不得明晨見希髙端坐居伍村池中就視之已死馮厚敦字培卿金壇人明季壬午以貢授江隂訓導城陷坐明倫堂自縊死妻王氏與其姊結袵投水死時丹徒人潘文先為江隂訓導罷官與馮同死之鄧藩錫字晉伯金壇人明季甲戌進士由知縣歷官知兗州府甫抵任城破死妾某氏亦攜子投井死王明汲字孟用金壇人以舉人任贛州同知大兵下南昌圍贛明汲與撫軍萬元吉固守八閲月城破死之明汲之族有王明灝王榮圖諸生也王汝紹布衣也皆死甲申之難丹陽諸生王介休亦聞變不食七日死徐有聲字聞復金壇人登鄉薦歷官至郎中督餉大同城陷於流賊被執不屈死陸明永字嵩年丹陽人為華亭教諭國變題詩明倫堂自經死國朝李琚字玉樹丹徒縣人順治乙酉武舉授福建興化左衛千總以𠞰山寇功擢福州閩安鎮水師守備丙申秋寇三十餘萬犯福州境琚連戰三日身被數十創遂殁於陳家口五十餘俱遇害贈都司僉書淮安府漢臧洪字子源射陽人旻子舉孝亷太守張超請為功曹勸超倡義兵誅董卓與諸牧守大會酸棗攝衣升壇詞氣慷慨超遣與劉虞共謀為兵所阻寓於袁紹紹以為東郡太守時曹操圍張超於雍丘袁曹方睦洪請救不許超城遂陷因與紹絶紹圍之歷年不下吏民感德莫有叛者及城陷紹生執洪欲屈服之不從見殺陳容射陽人隨臧洪為東郡丞先城未破洪使歸袁紹洪被執時容在坐起謂紹曰將軍舉大事而先誅忠義豈合天意紹慚遂使人牽出容顧紹曰今日寧與臧洪同死不與將軍同生遂俱見殺在坐者竊相嘆曰如何一日殺二烈士五代張雄淮人周侵南唐楚州民間自相團結拒敵謂之義軍雄所將最有功歷官袁州刺史及宋師入江南金陵危急雄糾兵東下以救之至溧陽猝遇宋師與其子七人皆力戰死宋趙師旦山陽人以蔭起家皇祐中守康州儂智髙反攻城師旦力不敵或請避賊不聼血戰而死兵官馬貴及卒三百人無一人降者贈光祿卿康州人立廟以祀王安石志其墓劉晟山陽人以氣節名鄉里嘗與鄉薦紹興初權本州録司事通判劉晏殺太守晟諭以禍福時和好初成晏謀劫嵗幣以楚城反綱運已抵城南晟䇿騎奔告綱運遂獲全晏知事泄執晟殺之闔門遇害繆朝宗淮人宋環衛官知海州從文天祥於平江天祥歸福安自婺間道以從空坑之敗自經山間米立淮人三世為將從陳奕守黃州奕降元立潰圍出江西制置使黃萬石署為帳前都統制元兵略江西萬石降立迎戰被執不屈萬石諭之立曰立三世食趙氏祿趙亡何以生為竟遇害張孝忠淮人德祐初元兵東下知信州謝枋得走入安仁調孝忠逆戰圍湖坪矢盡揮雙刀擊殺百餘人軍潰中流矢死張德輿淮人景炎二年與淮西野人原寨劉源等起兵興復司空山民傅髙起兵應之遂復黃州夀昌軍戰於樊口殺元將鄭鼎未幾元襲破司空山復陷夀昌德輿死之黃文政淮人戌蜀軍潰間道走靜江馬暨邀與同守城被執大詬不屈元軍斷其舌文政含胡叱咄至死不絶聲陸秀夫字君實鹽城人景定元年進士李廷芝鎮淮南辟置幕中主管機宜文字纍擢參議官德祐初以禮部侍郎使元軍請和不就益衛二王走溫州秀夫追從之立端宗於福州進同僉樞密院事端宗崩又立衛王秀夫為左丞相祥興二年崖山破驅妻子先入海負王赴海死年四十四從死者十餘萬人明龔遂榮淮安人讀書好竒計嘗從討福建賊以功授千戶景帝時議迎上皇遂榮投書大學士髙穀極言禮宜從厚帝怒索書急榖等諱之遂榮自縛詣闕曰臣實為是書冀感動陛下耳下獄久之得釋居貧授徒後復疏請還政上皇未上而泄復下獄杖幾死攣不行者數年徐庠世襲大河衛指揮使正德七年與流賊戰於鍾吾力鬭陳亡事聞升級世襲蕭鳳來世襲大河衛正千户嘉靖三十八年領兵屯廟灣禦倭力戰沒於陳又本衛百戶蘇臣亦陳亡王𢎞安東人天啓初𠞰白蓮賊被執不屈釘於二樹之間罵不絶口而死趙世選字韋所山陽人歲貢生崇禎八年授和州訓導抵任九月獻賊逼城世選與和州黎𢎞業學正康正諫分城誓守三日城陷罵賊不屈死事聞贈國子監學録潘𢎞字若稚山陽人以貢生授舞陽知縣崇禎十四年闖寇陷城𢎞作告先聖文誓必死賊索印脅降𢎞怒罵不屈賊支解之子澄瀾痛哭投井死贈僉事王伯度鹽城人以武科授崇明守備崇明濵海多賊伯度出搗賊巢被圍數重中流矢死弟伯聖以單騎潰重圍負兄尸出巡撫張國維特疏褒之周文煒清河人由貢歷商州同知署知州事癸未十月闖賊犯境文煒竭力守禦城陷被執罵不絶口為賊所磔子元生哭父詈賊亦被殺李幹才鹽城廪生甲申聞李自成破京師即焚儒衣冠絶意不食同學諸人為詩文生祭之瞪目無一言而死揚州府漢劉瑜字季節廣陵人好經學延熹八年舉賢良方正上書陳事召問災咎之徵拜議郎竇武謀誅宦官引為侍中武敗被殺子琬傳瑜學舉方正不就蔣子文廣陵人漢末為秣陵尉逐盜至鍾山為盜擊傷其額死後吳主追封為中都侯立廟祀之三國華融字德㽔江都人好學善屬文吳郡張溫就皇象學借止融家溫後為選部尚書擢融太子庶子遂知名官侍中左將軍滕印勒兵拒孫綝使融詐詔發兵融不從遇害晉趙誘字元孫淮南人纍葉將門積功賜爵平阿縣侯代陶侃為武昌太守第五猗於荆州作亂誘拒之戰死子應王導引為從事中郎南頓王宗反應殺宗於是王導庾亮並倚仗之遷西豫州刺史卒唐來濟江都人護兒子篤志文章曉暢時務貞觀中擢進士永徽初同中書門下三品檢校吏部尚書嘗保護太子承乾又力沮以武氏為后武銜之貶台州刺史徙庭州總兵拒突厥謂其衆曰吾嘗絓刑網蒙赦不死今當以身塞責遂不介而馳沒焉李磎字景望江都人鄘之孫登進士纍遷戶部郎中分司東都黃巢陷洛磎挾尚書八印走河陽時留守劉允章為賊脅遣就磎索印拒不與允章悟亦不附賊入為翰林學士辭職歸乾寧元年召同中書門下平章事王行瑜韓建擁兵闕下殺之都亭驛行瑜誅詔贈司徒宋沈攸字子宜揚州人建炎間賊邵青犯真州攸攝揚子簿以所練土兵禦敵北門死之元欒鳳髙郵人任諸暨知州方國珍叛執鳳不屈與妻王素英俱被害趙璉字伯器儀徵人至治初進士纍官江淮行省參知政事張士誠降復叛襲璉於泰州璉力戰被執大罵死明王鼎儀徵人為趙忠飬子明初忠從渡江有戰功沒於陳鼎襲職復姓王守太平陳友諒以重兵來犯城陷鼎罵賊不屈死之韓節揚州人建文時為工部郎中素懷耿忠嘗曰論語事君以忠一語終身用之不盡臣子不察此讀聖賢書所學何事時北兵日逼分守金川門城陷巷戰敗績死王烈泰州人世襲守禦正千戶嘉靖三十三年倭冦通州巡撫鄭曉檄烈往援至黃茅港遇伏力戰不勝死之加贈一級世襲指揮僉事陳輔堯字九室江都人萬歷舉人授長寧知縣調歸善擢膠州知州有饋山繭者受而懸之公帑中遷永平同知赴瀋陽查馬事未竣遼潰左右曰公無守土責盍去諸輔堯曰孰非封疆臣吾理芻馬即吾之封疆也拔佩刀自刎贈按察僉事諡忠烈古道行江都人明季辛未武進士以參將守駱馬湖庚辰寇至苦戰屢勝援兵不至殁於陳郝景春字和滿江都人萬歷壬子鄉舉授鹽城教諭遷房縣知縣時賊張獻忠陽受撫尋叛率衆圍房房兵少庾空賊碁布四境聲問不通遣使求援者盡為賊獲景春同子鳴鸞督兵且守且戰五晝夜賊多死欲解去而指揮張三錫縋賊登城城遂陷擁景春去景春以手畫頸示其子曰此下不甚痛父子決計死耳獻忠欲降之益大罵遂父子被害贈太僕寺少卿建祠江都以鳴鸞祔王道隆字萱生江都人天啓甲子舉於鄉除夀州教諭升濵州知州壬午冬城破道隆身被數創慷慨不屈死家屬十餘口俱被難濵立祠表其忠髙孝鋕字仲達江都人以鄉舉任信陽知州流賊陷城逼降罵賊不屈死贈布政司參政楊廷璧字荆璞江都人以貢授舒城教諭賊張獻忠寇邑廷璧分守西門語縣令曰吾職非守土今日之事義不可辭萬一不守張許吾師也嚴守三晝夜矢石皆盡城陷被執罵賊遇害子濟之亦死倪可大字簡白儀徵人天啓中嵗貢為霍丘訓導明季丁丑流賊圍城督民兵拒守城陷可大嚙指噴血罵不絶口遂被害妻女皆自縊僕倪表亦死梁於涘字飲光江都人明季癸未進士知萬安縣蒞任甫一月城破死之韓鼎新字煥然江都人以貢教諭浙江某縣城破公服縊堂上鄭為虹字天玉江都人崇禎癸未進士除浦城知縣擢御史巡仙霞關駐浦城時鄭芝龍盡撤守關將仙霞嶺二百餘里間虛無一人大清兵入閩為虹亟還浦城縱士民出走自守空城死之王道淑字善長儀徵人由恩貢任湖廣按察司經歷廣州破死之其子棫瑞從死李信字吾斯興化人以歲貢授和平知縣城破與其二子泓逺淑逺俱死之宋祥逺字元來江都諸生氣節自許工古文辭著聼月山房集乙酉城破偕妻某撫其子曰有汝以延先祀吾二人不敢偷生矣夫婦皆縊死韓默字文適江都縣學諸生揚州城破時默謂妻蕭氏曰吾讀聖人書當守義死不可茍活若自為計易巾服墜井中妻蕭氏長子彥超俱從死同時自盡者有指揮髙一麟諸生汪應坤張映發劉慶逺金飈吕家齊饒餘汪自盤王廷珮等髙孝纘字中伯揚州諸生城破書衣襟曰首陽志睢陽氣不二其心古今一致自縊於學宫王纘字伯綿王績字亞綿王續字叔綿陳天拔醫生陸瑜畫士戴之藩武生張德義兵馮應昌市民以上皆揚州人城破自盡國朝陳錡字鼐臣揚州人順治間武進士任荆州府副總兵領前鋒會𠞰山賊李來亨深入伏發從騎皆沒錡拔腰劍自剄賜葬廕一子千總劉欽鄰字江屏儀徵人順治辛丑進士奉母不就銓至康熙戊申始授富川知縣縣新定欽鄰百計撫綏甲寅孫延齡叛於桂林兵圍城城陷巷戰不勝被執送桂林以兵守之欲授以官欽鄰怒擲其印北面拜闕東向拜母自縊死事聞贈光祿少卿諡忠節董潾字禹門江都人恩貢以軍功授沙縣知縣順治四年有山賊羅某與妖僧米逢年共為亂環攻沙三月潾方并力禦東門而逢年誘縣丞黎某開西門納賊潾被執罵賊甚厲賊怒叢射之割其頭去贈按察司僉事王相吕字望子泰州人以鄉舉授睢寧教諭順治九年叛賊海時行來寇城陷被執罵不絶口賊斫之握印而死子奪刀救父亦被賊斫死而復蘇事聞贈國子助教徐州府漢周苛沛縣人為御史大夫髙祖使守滎陽楚圍滎陽急漢王遁去使苛守之楚破滎陽苛嫚罵不屈項羽怒烹苛後論功封苛子為髙景侯周緤沛人以舍人從髙帝起沛戰有利有不利終無離上心封蒯成侯上欲自擊陳豨泣阻之以夀終諡貞史遷稱其操心堅正篤厚君子龔勝字君賔楚人哀帝徵為諫大夫數上書言百姓貧盜賊多吏不良災異數見制度太奢刑罰太深賦斂太重徙光祿大夫給侍中言董賢亂制逆上指後為渤海太守王莽秉政乞骸莽既篡漢遣使者拜勝為講學祭酒稱疾不應後二年復遣使者奉璽書太子師友祭酒印綬安車駟馬迎勝勝稱病篤使者以印綬就加勝身輒推不受謂門人曰誼豈以一身事二姓哉遂不食十四日死年七十九三國謝慈字孝宗彭城人撰喪服圖及變除論行世為孫奮傅以直諫見殺晉劉邁字伯羣彭城沛人少有才幹為殷仲堪中兵參軍以言折桓玄避下都僅免後為竟陵太守從弟毅與劉裕同謀起義邁將應之事泄為玄所害南北朝宋劉康祖彭城人父虔之為江夏相死於魯宗之之難追贈梁秦二州刺史康祖膂力絶人每犯法文帝以勳臣子原貸之後為參軍被委任折節自修元嘉中魏太武圍汝南康祖為前驅攻破魏軍其年秋魏師復至衆寡不敵死之劉勔字伯猷彭城人少有志節以功封金城縣五等侯殷琰據豫州以叛勔討降之約令三軍不得妄動城內士庶感悅立碑紀德後守尚書右僕射中領軍桂陽王休範難作死之諡曰忠昭劉𢎞字仲逺彭城人魏太常芳之孫仕周為本郡太守隋髙祖平陳之役從渡江以功封濩澤縣公拜泉州刺史會髙智慧亂來攻州𢎞拒守百餘日救兵不至與士卒數百人煮犀甲腰帶剝樹皮食之抗節彌厲城陷被害孫道登彭城人魏永安初為梁將韋休等所獲脅使招降鄉曲道登乃厲聲倡呼但當努力賊無所能遂見屠戮朝廷遣官弔祭賜五等子爵隋劉子翊彭城人大業間授侍書侍御史嘗從幸江都因侍切諌遣上江督運為賊吳棊子所掠欲要以為主不從會煬帝被弒羣賊執至臨川城下使以帝崩告城中子翊反其言遂見害五代沈斌字安時下邳人仕晉為祁州刺史契丹犯境斌出擊不利敵將趙延夀招之降斌罵不屈城陷死之劉仁贍字守惠彭城人仕南唐為清淮軍節度使鎮夀州周師攻之百端仁贍堅守四月不可下舍去明年復至唐君臣奉表願割地輸貢而仁贍堅守如故子崇諫幸其父病謀出降仁贍立命斬之士卒皆感泣願死守已病甚不知人其副使孫羽以城降世宗命舁仁贍至帳前嗟嘆久之復使入城飬疾是日卒李筠豐縣人為周昭義軍節度使宋太祖即位遣使加筠中書令使者至洛州筠取周太祖畫像懸於壁涕泣不已北漢主聞之以蠟書約筠同舉兵宋遣石守信等分道擊之敗筠於長平筠走保澤州宋主列柵圍之入其城筠赴火死宋趙立徐州人補都虞侯建炎三年徐州陷知州王復闔門百口死之立巷戰奪門出為敵所擊死夜半而蘇殺守者入城率殘兵邀擊之軍聲大振以復徐州功授忠翊郎權知州事楚州急立往援頰中矢不能言以手指麾既入城休士而後拔鏃劉豫兩遣使立立焚其書曰吾必滅豫而後已以漣水軍鎮撫使兼知楚州敵圍之急戰守百餘日忽飛炮碎其首左右馳救立曰吾終不能與國定亂矣言畢而卒詔立廟楚州諡忠烈宋汝為字師禹豐人靖康元年北兵圍京師闔門遇害汝為思報國家及父兄之讐建炎三年謁陳邉事髙宗嘉納假武功大夫奉國書使北行次夀春遇完顔宗弼軍劫而縛之欲加僇汝為無懼色惟請達書就死宗弼曰此忠義士也又持丞相書往見劉豫開陳禍福勉使歸朝豫不聼誘以官固辭越十年亡歸獻恢復方略秦檜將械送汝為於金乃變姓名亡入蜀能知死期祭其先終日大慟將終神氣不亂子南強字子居亦徙紹興後知沙縣歷雅州咸著政績魏勝字彥威宿遷人多智勇善騎射紹興末勝聚衆起義取漣水海州權知州事諭他縣皆定益圖收復與敵戰斬馘無算聞於朝授閣門祗侯知海州隆興初改知楚州勝紀律如宿將鎮撫一方民安其政每戰標名於旗敵望旗而走或當危迫中輒呼曰魏勝在此敵皆辟易後扼清河口援救不至死之贈保寧軍節度使諡忠壯元石普字元周徐州人至正五年進士授國史院編修以將略稱歷升樞密院都事時張士誠據髙郵普請兵往討之水陸並進乘勝拔十餘寨斬賊數百遂拔髙郵縱火燒其關門賊懼謀棄城走總兵某者忌普功突出普軍前為賊所敗普軍亂力戰死之韓準字公衡沛人年二十登進士授承事郎同知孟州冬有蠅敕民多蓄氷以防夏熱明年果然賴氷愈疾者無算纍升河南僉事築堤陂田嵗收粟數千斛轉湖廣參政蘄黃冦起被圍五十四日竭力捍禦城卒得全陳友諒破隆興欲致之不可饋以糗不受授江西行省參政城陷追準宣敕準曰此吾所受於君者並取吾首去卒藁葬福州明謝升徐州沛縣人與蘇州王玭友善以忠義相砥建文時為監察御史練兵給餉甚著勞績靖難後不屈死之父旺子皎謫戍金齒妻女俱謫發湯克寬邳州衛人承世廕歷浙江參軍升副總兵擊倭於溫州寧海蘇松間輒克之又為廣東總兵破賊吳平後赴薊鎮炒蠻入掠追出塞遇伏戰死朱用之睢寧人幼負勇略正德六年流賊攻睢城用之倡衆出戰軍敗被執賊愛其勇欲用為將不從被殺又邳州衛百戶張輔驍勇過人與流賊戰邳河南岸奮勇深入沒於陳房永宿遷人前為六安衛指揮正德七年流賊猖獗聞永善騎射襲其家劫以為帥永諭以大義不從被害時同邑張廷美以選募與流賊戰邳州殺賊首數人後援不繼力鬭而沒任巡蕭勇士嘉靖中倭寇淮揚巡應選至廟灣數戰皆勝單騎還遇别冦突至巡更還戰矢盡馬傷遇害事聞荷優恤陳我謀蕭人幼習兵法天啓三年督帥王三善徵從軍征黔酋安邦彥纍立竒功授電光營參將大方之役主帥陷重圍我謀麾騎馳援遂與俱沒貴撫梁柄以事聞熹宗命廟祀黔土歐陽復蕭人襲武功右衛指揮使回籍崇禎十年流寇躪徐參議徐標舉復領鄉營八月與賊戰被執不屈死之標弔以詩有白刃斷喉難斷義黃沙埋骨不埋名之句梁𢎞道字廓如蕭諸生崇禎十五年袁冦圍城佐縣令守北門城破猶手殺賊後賊來益衆遂見害同死者有戴奮翼字雲程亦蕭諸生邵宗元字景康碭山人由恩貢為保定府同知署府印李自成陷燕京遣偽將趨保定射書城上誘降宗元手裂之時督師李建泰隂懷異志叩關入召衆議事欲得宗元印印文書降賊宗元不與面數其負國喪心罪建泰遂夜縋其私人出約降明日城陷宗元被執不屈握印而死吳汝琦徐州人明季備兵歸德與守道蔡鳳同死滕九萇徐州人以順天京衛經歷家居明末流寇擾徐被執罵賊為所殺王明德字皓儒徐州人明季為太平訓𨗳亂兵入城從容偕其妻赴泮水死王飬心徐州諸生甲申三月養心聞變痛哭絶粒七日不死乃闔户自經王台輔字贊化邳州衛太學生明末草疏欲諫內臣出鎮事甫入都遇國變痛哭南還後自縊死縱四通字開之縱日升字天際四通子朱道光字可大皆蕭諸生丙子之變城破俱不屈死御史上其事從祀鄉賢郭復性字繼善郭復初字見心俱蕭人死難旌表李荷春蕭人幼有文名兵至與縣令議城守跨馬巡城堞日夜不休城破沒濠死王道充豐諸生壬午兵變邑令委守東門城陷同子賔死之時從知縣劉光守禦南門者有皇甫世明字恆照亦死國朝韓尚亮字繼川徐州人勇力善騎射明末盜起嘗糾義勇破賊保全鄉里順治二年從下江南又從平越閩有功委為副將燒敵桃花嶺陳襲將軍寨擒其王九年海寇鄭成功圍漳州城內絶糧食皮紙都盡至啖死人凡九月援兵至圍始解以堅守功署漳鎮總兵康熙初授福建水師左路總兵三年卒於官篋無餘金幾不能殮吕爾占睢寧人由嵗貢授蒙城訓𨗳未及赴任順治十年膠寇陷城爾占奮勇大呼奪刀殺賊賊怒攢刃刺之身中數創罵不絶口而死太倉州宋孫察朝議大夫載從子以朝散郎使北守節不屈裹以油絮焚之罵不絶口而死姚舜元字景瑞嘉定人為平江府東南副將守吳淞德祐改元冬元師下平江舜元語弟舜賔子應龍曰國家厚澤在人大本未去收合散亡事可圖也元師偏將東巡莫敢犯境會大霧四塞襲兵猝至舜元與舜賔應龍皆死之元尤鼎臣太倉州吏至正末張氏兵入吳州倅奉印降鼎臣阻之不得為其將所縶啖以美官不屈抶百餘終身錮之明王燾字濬仲太倉人萬歷戊午舉人歷仕知隨州時隨為賊衝燾率民兵擊殺三百餘人賊圍城堅守二十日不下崇禎十年賊縱火焚隨南城守將遁燾知事敗冠帶自縊死張振德字季修嘉定人以選貢知四川興文縣兼署長寧時藺賊作亂振德日夜巡城自度形勢不能保退檢篋中得銀兩許付幼子緄曰吾不及見汝冠矣促之行未幾賊衆薄城下振德方出戰忽大雨城摧賊擁入振德左手持兩印右執匕首危坐廳事妻錢氏與兩女坐後堂積薪坐側賊逼俱投火死明日賊至火焰中見振德尸面如生兩印在手堅不可取皆駭愕稱忠臣羅拜而去事聞贈光祿卿諡烈愍丘繼武字起葉嘉定人為醴陵尉升威逺參軍解南糧以賊梗不得達僦民倉儲之有姦人獻米於賊賊遣使執繼武赴營賊素知其名欲官以永州道繼武踞牀嫚罵或勸之繼武曰吾與蔡江門以忠節相許豈忍負之遂遇害蔡江門者諱道憲長沙理刑城陷不屈賊支解之先繼武一日云沈雲祚字子凌太倉人明季庚辰進士知華陽縣獻賊攻夔門雲祚見蜀王陳守禦之䇿不納慷慨誓死城破被執幽於大慈寺賊黨饋食誘降雲祚躍起罵曰吾有口食賊肉耳豈食賊粟哉遂遇害侯洞曾字豫瞻震暘子少與弟岐曾岷曾稱江南三鳳天啓乙丑進士歷官左通政其督學江西時閲卷必焚香告天得人最盛分巡嘉湖定漕卒之亂嘉邑素貧瘠每苦漕糧不給洞曾上書朝士先得減漕後得永折皆其力焉乙酉七月從容賦詩死於家之葉池子演潔從死海州宋孫傅字伯野海州人登進士中詞學兼茂科歷中書舍人以言事貶欽宗即位拜尚書右丞俄同知樞密院以傅輔太子留守太子北去傅曰吾為太子傅當同生死子來省叱之去遂死於北紹興中諡忠定明何洲海州人與中書舍人宋和郭節友善同仕建文朝素以忠義相朂靖難後遂相約棄官變姓名走異域賣卜自給王振贛榆人為福建惠安巡檢捕賊被殺其子冒矢石救父亦被害有司具奏詔廕子入監以表其忠孝王俊字華陽贛榆人由歲貢授新蔡教諭崇禎十五年闖寇破縣俊坐明倫堂手劍叱賊賊抉俊目斷其手至死不屈劉文炳海州人光宗后兄子封新樂侯崇禎甲申三月闖賊陷京城母杜氏繫縧帶樓上作十數繯命家僮貯薪樓下并召已嫁二女歸同死賊至俱投繯令家人於樓下舉火文炳自外入遂與叔繼祖及弟文耀俱投井死劉氏闔門死難者四十二人通州宋孫益泰興人紹定中李全犯揚州縣令募益率衆力拒衆且却益厲聲曰何以見令君遂身先赴敵死贈保義郎同時顧緒顧珣俱戰死明朱顯忠如臯人從傅友德征蜀克文州令留守番寇數萬來攻力戰却之詰旦圍益急顯忠悉出兵開東門拒戰被傷力不支城破為亂兵所殺茅誧字大方泰興人洪武間以學官召對纍官副都御史靖難兵起駙馬梅殷統兵守淮南誧貽詩勸殷辭意激烈永樂初逮赴京師不屈死妻子二孫俱死獄中周臣字元弼通州人進士授刑部主事大臣子坐姦淫臣正其罪左遷薊州同知復軍屯田之沒於豪家者以贊畫軍務功升順天推官逆瑾黨罹罪窮治不少貸瑾誣之下獄無所坐止罰俸有投匿名疏瑾罪惡者瑾大怒矯旨責五品以下廷跪暑日中遂以死曹頂通州人有膂力嘉靖中倭寇擾南畿應募為兵大敗賊於江中復來寇通頂率水兵壁於城外疊出撓賊賊畏之引去以功當為頭領官辭不受倭又由掘巷犯通頂與戰於城北殺賊八人天雨泥淖追賊墮塹中賊大至攢槊而殺之徐可行字爾思通州人以太學生授長興主簿有土賊作亂突於元旦入縣堂執知縣石有恆逼獻帑金可行聞變亟挺劍與賊鬬賊梃刃交下竟先令而死罵不絶口事聞贈通判賜專祠許直字若魯如臯人明季甲戌進士知義烏縣有清操歷文選員外李自成破京城令百官報名直曰有一死而已乃作家書寄父賦絶命詩六章投環死國朝賜諡曰忠愍族子德溥字元博聞京師陷慟哭纍日殷尚聲字黃鍾通州人為桂陽州判有郝成忠者闖賊之梟將也闖既死獨郝一軍猶壯流駐桂陽民與賊閧遂圍城城破尚聲死之男婦從死者六人國朝吳應昌字德符通州人也以武解元登順治壬辰進士授彭城衛守備升浦口都司己亥六月海寇入犯調防談家洲以陷陳不屈死自盡世襲拖沙喇哈番江南通志卷一百五十四欽定四庫全書
