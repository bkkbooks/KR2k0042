誓死心不移欲死不死將何為欲揮豫讓橋下劍欲操博浪沙中椎衣緋如火如衣衰懐刃如雪甘如飴疾行犯駕氣何壯千秋萬世當如斯誦之勃勃有生氣可以亷頑立懦也考革除之際以身殉國者自勛戚大臣下至樵夫門卒之流凡數百人人才之盛古今無與為比雖功名如三楊不免射鈎之恥得與諸公朽骨抔土争千秋萬嵗之名哉王稌者方公之門人負骸骨葬聚寶山復輯公遺文為侯城集傳於代亦文氏之王鼎翁云崇明寺在句容縣東北隅晉咸熙中建名義和梁昭明太子書額宋太平興國年改今額寺有浮圖甚峻鐘樓有趙孟頫手蹟興教寺在句容縣治東北晉咸寧間建金華寺在句容縣治東南晉咸康三年尚書令李邈捨宅造靈曜寺宋改今額開福寺在溧水縣南門外萬壽橋西唐開元間建名天興寺宋改今額上方寺在溧水縣西二十五里本古刹舊傳為孫鍾種瓜處鍾富春人吳大帝之祖也早孤事母孝嘗於此種瓜有三少年造鍾乞瓜鍾事之惟謹三少年指山下善地示之行數百步即化鶴去鍾如其言後子孫果昌至今其鄉曰思鶴鄉崇慶寺在溧水縣東南八里梁大通間鴻鶴禪師在東廬山建道塲後至中山西建寺宋改今額建炎兵燬餘枮檜二株華勝寺在溧水縣南三里舊在思鶴鄉佛子墩宋乾道五年移寺額復興於此興教寺在溧水縣大西門外唐天復時剏無想寺在溧水縣南十八里杜城山麓唐武德時建宋時掘土得石觀音像祀於後閣寺門外有古柏二株寺西有南唐韓熙載讀書臺廣嚴寺在溧水縣北四十里唐天復三年剏明覺寺在溧水縣西四十里唐咸通十年剏興化寺在溧水縣東北三十里唐大中時建名豐安寺宋改今額妙果寺在溧水縣東三十五里白鹿鄉舊在安興鄉唐時所建也宋嘉祐三年移此興善寺在溧水縣西四十里左山中舊傳即黄初平牧羊處唐大順中建般若寺在溧水縣南四十五里儀鳳鄉宋嘉熙三年建大通寺在溧水縣東北十五里梁大通九年建太安寺在溧水縣東北三十里長壽鄉唐天祐三年建永壽寺在溧水縣西北明萬厯三十六年建保聖寺在高淳縣東五里唐貞元中建名龍城宋祥符中改今額禪林寺在高淳縣東二十里唐咸通中建龍化寺在高淳縣南五十里唐咸通初建顯慈寺在高淳縣西四十里唐中和間建名劉莊寺宋紹興中改今額飛來寺在高淳縣西南三里相傳明天啓二年中秋夜有銅像彌勒一尊端坐太平圩之東角因建寺名曰飛來定山寺在江浦縣東北三十里獅子峯下有泉出殿中亦名定山泉石佛寺在江浦縣東北十八里宋建炎中建東濟寺在江浦縣西三十里舊名湯泉院宋元祐中重建接待寺在江浦縣治西門外明洪武初建長蘆寺在六合縣南二十五里宋天聖中建靈巖寺在六合縣東十五里靈巖山上唐咸通中建卧佛寺在六合縣東北南唐保大中建寶聖寺在六合縣北四十里屏山之北元至和元年建有泉亦名寶聖祗洹寺在六合縣北五十里冶山唐開元間建盧龍觀在府西北盧龍山與儀鳳門相接明高帝克偽漢陳友諒親樹旌麾督戰於此山及即位改為獅子山環以城建觀其上靈應觀在府烏龍潭側與石城門近宋名恩隆祠明正統間以禱雨有騐賜今額洞𤣥觀在府東方山之麓葛仙公白日飛昇處吳大帝赤烏二年建唐貞觀間併入巖棲觀明重建洗藥池錬丹井猶存紫芝觀在府鍾山下仙鶴觀在府東北仙鶴門外漢時建𤣥真觀在府中和橋北明永樂十八年建玉虛觀在府東上方門外吳時剏唐保大間重建朝真觀在府淳化鎮東明正統間建清源觀在府城南雨花臺側宋建棲真觀在府南安德鄉明正統間建賜額佑聖觀在府西江東門外明成化二年建青元觀在句容縣治西南隅葛洪故宅梁天監中建五雲觀在句容縣華陽洞西五雲峰下宋天聖中建聖祐觀在句容縣大茅峰頂剏於漢宋淳祐中賜額玉晨觀在句容縣大茅峰下舊傳高辛氏時展上公於此得仙後周有郭真人巴陵侯漢有杜廣平東晉有楊真人許長史梁有陶𢎞景唐有李元靜南唐有王貞素俱在此得道梁為朱陽館唐太宗時為華陽觀明皇時為紫陽觀宋祥符初改今額世稱為茅山第一福地崇壽觀在句容縣大茅峰之下華陽南洞側晉任敦舊宅劉宋元嘉十一年始建壇宇齊建元初名崇元館宋大中祥符七年勅賜今名附元虞集碑記大茅山之下當華陽南洞之便門有崇壽觀者本晉洞天館主任敦故宅宋元嘉十一年路太后始建壇宇太始中廬陵太守孔嗣之重立以奉曲阿高士華文賢齊建元二年勅句容王文清仍立而主之名崇元館武帝以太子時至焉唐貞觀初勅改為崇元觀有太極元年所樹碑石完而文冺可識者左拾遺孫處懸文楊幽經書數字而已天寶七年李元静先生奉勅重修復民百家偹修葺寶厯三年主者有賀恩寶則因器物銘識而考見者也宋大中祥符七年勅賜今名大元至治二年句曲外史張君嗣真始來主之顧瞻方臺近對南面左峰疊玉右引大茅之支而回合焉定録君授言大茅山下有泉水近水口處可立静舍陶隱居云近南大洞口有好流水而多石少出便平比有王文清居之則此觀是矣乃嘆曰山中館宇自齊梁唐宋至於今代有増益求諸晉人之舊惟此與玉晨許長史宅耳而吾所治乃傾廢隘陋特甚豈不在我耶於是度材鳩工更後堂為太元殿以復舊規象三茅君於中東為任華王李賀五君祠西為陶隱居祠充前殿基為𢎞道壇自製銘其上壇東為元武祠西為廣恵祠後為文賢講堂而前都門門外浚古津池盡受大茅南面諸原之水循池西南得昭明太子讀書臺臺東有井曰福鄉井福鄉者因昭明道館名也出諸榛莽著文刻石覆之以亭而巖洞泉石之勝近在百步内者皆按圖表之可以觀覽泰定元年上清四十五代宗師劉君大彬朝京師授予始末俾為之次第焉張君吳郡人名天雨内名嗣真字伯雨别號貞居所著外史山世集三卷碧巖懸會録二卷又尋山志十五卷考索極精博云崇福觀在句容縣中茅峰西白雲峰下初華陽宮道士王景温退居結廬於此宋紹興間詔即所居建觀乾元觀在句容縣茅山大横山下梁天監中陶隱居剏鬱罡齋天聖間改賜今額有觀妙先生碑後閻希顔李徹度皆修煉於此紫陽觀在句容縣大茅峰下崇禧宮左太平觀在句容縣茅山側即陶隱居華陽館也宋元符中改今額抱元觀在句容縣茅山柳谷泉舊名柳谷菴宋政和八年因陳希徵修行於此賜今額清真觀在句容縣茅山大羅源中宋政和中建紹興間每嵗三月十八日四方道人會此時多鶴至謂之鶴會香山觀在溧水縣城東北隅元時所建明嘉靖間學宮圯縣令易觀址建學移觀於縣治東尋仙觀在溧水縣治東南仙壇鄉梁建白石觀在溧水縣治東南六十五里荆山中舊傳卞和獲玉之地有卞和塑像李白詩云白石分金井丹砂布玉田是也井僅三四尺投之以石則水上沸如珠祠山觀在高淳縣治南元至元初建尋真觀在高淳縣治北萬壽觀在高淳縣寶陽門外宋時建玉虛觀在江浦縣浦子口𤣥真觀在六合縣治西高岡之上宋隆興初建慈應菴在府東麒麟門外龍潭大道國朝康熙六年建古林菴在府吉祥寺之左明萬厯間律師古心創建水草菴在府通濟門外明萬厯間建有放生池圓覺菴在府南馴象門明萬厯年建律僧白齋燃指臂苦行拓修濟生菴在府石城門内西隅烏龍潭南以上諸菴皆接衆之所隱仙菴在府城西北虎踞關側相傳宋陶𢎞景隱居於此故名明初冷謙諸真人多遊此王思任有碑記龍華菴在府城銀鼎橋西康熙五十九年按察司葛繼孔置地延僧寶光募建孤舟菴在江浦縣西門定山珠泉側明萬厯丁酉年建朝天宮在府城西石城門内崇道橋北即吳冶城也晉為西州城劉宋為國學後廢置總明觀以居儒士尋以道者居之仍舊觀名楊吳建紫極宮徐鉉作記云冶城峻址西州舊宇卞忠貞之遺壠郭文舉之故臺宋元屢改額明洪武十七年重建易今名洞神宮在府城淮清橋西宋景定間建元李孝光有記真武行宮在府東南洪武門外舊為神樂觀明初郊祀習樂之所天妃宮在府獅子山下儀鳳門外明文皇帝遣使海外遇颶風天妃現像䕶之奉勅建此有御製碑崇禧萬壽宮在句容縣茅山華陽洞南門之東唐王知逺師陶𢎞景得其道法見知於太宗貞觀初置觀居之元改今額趙孟頫書碑記元符萬寧宮在句容縣茅山積金峰下宋嘉祐中蜀人王畧結廬煉丹於此後道士劉混康居之徽宗賜額祠宇宮在句容縣中茅峰西唐天寶中勅建紫竹林在府城北耆闍山麓明末顓愚禪師建祗陀林在府城西南隅鳳凰街之南明末建徑山雪嶠天童五峰皆駐錫於此三官堂在府城武定橋東明洪武中建江南通志卷四十三
