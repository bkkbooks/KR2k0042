body:
  text: 江南通志卷四十三輿地志寺觀一江寧一府仙佛之宇經始於江南者天保為報上之嘉名崇元為洞天之華構其後金刹瑶宮建勝幡而啟妙門者往往標映江山與翠樾丹霞參差高下矣朱子萬杉寺詩云願以清浄化永作太平基又齋居聞磬詩云此時鄰磬發聲合前山響起對玉書文誰知道機長是則朝香夜梵風鐸霜鐘起人天初覺之心助聖朝清和之理抑豈可少哉江寧府靈谷寺在府鍾山東南舊於獨龍阜建道林寺梁武帝為寶誌禪師建塔於玩珠峰前名開善宋改太平興國後改蔣山明洪武初徙山之東偏改名靈谷自山門入松徑五里乃至寺大殿皆壘甓空洞而成後有浮圖即梁寶誌禪師幻身改塟於此塔前有石泉石旁有古松偃幹明高帝月夜掛衣處國朝康熙四十六年聖祖仁皇帝南巡臨幸賜御書靈谷禪林四字匾額御書天香飄廣殿山氣宿空廊對聯御書石刻金剛經一部御書泥金心經一卷御書白居易絶句金扇一柄烟滿秋堂月滿庭香花漠漠磬鈴鈴誰能來此尋真諦白老新開一藏經御書木刻藥師經一部附新城王士禎遊記逰鷄籠龍潭之明日遂往鍾山過青溪拜侍中黄公祠祠有夫人血影石出通濟門經天壇壇已廢彌望蔓草縈烟而已沿鍾山行屢有向背峰崿蔽虧雲日明晦誦沈隱侯千雲非一狀蘇端明峰多巧障日之句歎其極工按江左時刺史還任例種松千頭山在六朝故多林木勝國為陵園地龍鱗虬鬛彌遍山谷上陵者寒濤天籟中不復見山今十九供樵㸑矣寺燬於乙酉丙戌間惟無量殿寳公塔存上人於南靈隱豁堂師法嗣為言寺廢之由乘願而來欲以十年重興初地午浴樓下樓後面屏風嶺風逢逢自絶壑下林木颯然有聲飯方丈畢偕上人觀景陽鍾禮寶公塔予登焉上人不能從問三絶碑亦燬於火三絶者張僧繇畫誌公像李太白賛顔魯公書也寺舊有誌公法衣革履吳道子畫折蘆渡江鳥巢佛印三教畫壁皆不見惟頽壁數版丹青漫漶如天吳紫鳳顛倒裋褐而已稍東為説法臺址旁即八功德水榛荆䝉茸無復涓滴南為琵琶街僧雛拊掌隱若弦絲之音殿前有巨鐵剪鍥大吳字上人訛為赤烏時物按明高帝初定建康為吳國公八年為吳王此當是未改元時所作然不識何所用之上人云相傳山有蛟鑄此為鎮云梅花庵在山門東寒香數百樹尚横斜山翠中問周顒草堂王安石定林舊址皆不可詳㑹日夕遂與上人别樵唱滿山悲風騷屑澗水潺湲屢亂流而渡昔人登樂遊原詩若為今咏之上人貽予豁堂詩自蔣陵至青溪遂盡其卷湯休帛道猷之流也棲霞寺在府東北攝山南齊明僧紹故宅陳江總有碑尚存隋文帝琢白石為塔寘舍利唐改功德寺高宗製明隱君碑亦尚完南唐改妙因寺徐鉉書額宗改普雲寺仁宗賜金寶方碑明洪武初仍賜額棲霞有王世貞記僧寮倚山架壁各擅其勝白雲庵紫峰閣尤稱幽峻明覺浪禪師開法於此笑峰竺菴繼起焉衡陽寺在府東北四十里清風鄉即古寶城寺昔朗法師駐錫於此有衡陽神女來聴講因名寺唐天祐三年徐温重建寺舊有保大七年齊已重開衡陽寺古跡詩石刻草堂寺在府慈仁鄉唐家渡濵大江舊建鍾山西麓本齊周顒捨宅明洪武七年徙寺於此嘉善寺在府鐵石山明正統中僧法通建寺賜額山椒有石佛閣蒼雲崖一線天竒石綺錯崖壑幽勝焦竑為記崇化寺在府古高峰院與嘉善寺相連明正統間重建賜額崖下有泉沸起水面若散花名梅花水幕府寺在府北幕府山晉元帝渡江王導嘗駐軍於此梁天監中武帝與寶誌禪師來遊始建寺因名幕府山有逹摩洞𢎞濟寺在府北觀音門外燕子磯明洪武初即山建觀音閣正統初因閣建寺賜名𢎞濟殿閣皆緣崖構成危石半空以鐡繩穿石繫棟俯臨大江為金陵絶景三塔寺在府神策門外明永樂間建香林寺原名興善寺在府太平門内明時建國朝康熙三十八年聖祖仁皇帝南巡改為香林寺方丈内御書覺路二字匾額佛國寺在太平門外鍾山之西古華嚴菴也明景泰間建賜額翼善寺在府東南相傳晉謝安高卧東山及與張元圍碁賭墅即其處梁資福院武帝建淨名院神僧寶誌説法於此宋元改净名寺明正統間重建賜今額定林寺在府東方山宋乾道間建鍾山舊有上定林寺寺廢移其額於此明𢎞治間重建有昭明讀書臺石龍池諸勝天寧寺在府高橋門外祈澤寺北五里青龍彭城二山之間山林幽迴野泉散落人跡罕到宋治平間建附明顧􅚇遊天寧寺記正德丁丑春子兄東橋先生赴官台州予出餞於祈澤寺酒數行東橋别去予與諸君共宿祈澤舊聞隣寺號天寧者境絶幽夐次早邀諸君遊從僧借小童導騎緣寺前逕登山厯墟墓數處即平野曠然兩旁皆童山環抱縱轡行里餘見山盡處如門闕狀闕外諸山濃淡晦明如畫方愛玩未已覺山腹間隱隱有樓閣在空際到即寺也衆皆大喜棄馬振衣緣石逕而登逕且半聞陂陁下灌莽中有聲洶洶如雷奔風怒予謂諸君此當有異泉乃遣人蹤跡之徐歩入寺寺僧多出乞食獨老僧恵禧者見客至似喜延入室焚香供茗甚肅室亦雅㓗不類荒山少憩復出寺先所遣人來報山下果得泉但荒翳不可入予奮然先行藤梢竹刺時絓冠袂輙絶之以去稍下見泉珠零玉散飛落石澗中可十數處不知所從來亦莫能極其所止澗闊尺餘兩旁及底皆山石自然所成玲瓏㟏岈清泉如空碧下漬予喜呼酒飲擇泉流平緩處列坐汎觴引滿數觥而出回及山半得泉脉樹間乃平地湧出不甚瀰溢不知何緣流衍之廣乃爾既登復觴寺外石上數行乃上馬歸莊嚴寺在府治東高橋門外晉永和四年謝尚捨宅建宋大明中路太后另建莊嚴寺於西樂園改此為謝鎮西寺金陵新志云謝尚莊嚴寺已改興嚴寺考謝尚宅又在城中竹格渡不知何年徙此明永樂間僧真常重建仍前名江總舊有寺碑祈澤寺在高橋門外祈澤山宋少帝景平元年建名祈澤治平寺梁即寺置龍堂龍池在焉會昌中廢南唐昇元間復宋改祈澤寺為祈禱雨澤之所本業寺在府麒麟門外宣儀鄉梁天監九年建有唐乾德年寺碑慧居寺在府治東六十里句容縣界寶華山相傳為梁寶誌公道塲故名寶華久廢明嘉靖間僧普照建寶公庵萬厯間僧妙峰奉勅建銅殿賜名聖化隆昌寺國朝順治二年僧見月建白石戒壇康熙四十二年聖祖南巡勅賜慧居寺額御書心經一卷金剛經一卷四十六年南巡駕幸山中賜飛白大書蓮畍雲香四字額懸於銅殿精持梵戒四字額懸於戒壇雍正十二年總督趙𢎞恩奉㫖重修雞鳴寺在府城北雞籠山與臺城相接晉永康間倚山為室始建道塲明洪武二十年改剏雞鳴寺置門三曰秘密關觀由所出塵徑皆賜額也遷靈谷寺寶誌公法函瘞於山麓建浮圖五級國朝康熙四十四年御書雞鳴古蹟四字匾額同泰寺在府北臺城内梁大通元年武帝幸寺捨身宋為法堂寺明為營衞地清涼寺在府西北石城門内清涼山吳順義中建為興教寺南唐為文益禪師道塲後主嘗畱宿寺中有未能歸去宿龍宫之句宋太平興國間改清涼廣恵寺蘇軾嘗捨彌陀佛像於寺中有詩明洪武初賜今額左上為清涼臺俯視大江即南唐翠微亭舊址登覽最勝西偏為善慶菴幽潔高爽莫愁湖朗然在目寺舊有董羽畫龍李後主八分書李霄逵草書時人目為三絶鐵塔寺在府治西北冶城後岡劉宋泰始中建名延祚寺唐有靈智禪師生無目能通曉經論時人稱有天眼為建塔今寺廢獨塔存永慶寺在府北門橋之西與謝公墩相近梁永慶公主建又名白塔寺明洪武中重建賜今額吉祥寺在府清涼山之北宋治平二年賜額後有古梅虬枝鐵幹扶疎數畝金陵寺在府定淮門内馬鞍山唐沙門貫休建靜海寺在府西北儀鳳門外盧龍山之麓明永樂間内監鄭和使西洋歸因建寺賜額普緣寺在府城西北隅晉名耆闍寺大報恩寺在府城南聚寶門外古長干里吳赤烏間康僧會致舍利吳大帝建寺及塔晉太元九年劉薩訶於越王城望氣得舍利於此建長干寺梁武帝發塔下舍利及爪髪髪青紺色帝命復修塔瘞之南唐時寺廢為營廬久之舍利數見感應宋祥符中釋可政表其狀復建寺賜塔號聖感舍利寶塔天禧二年改為天禧寺明永樂十年勅建塔九級賜額大報恩寺御製碑記塔高百餘尺皆五色琉璃頂冠黄金照耀雲日江山城郭悉在凴眺中篝燈百二十有八居民㸃炷無虚夜數十里風鐸相聞星光的爍明嘉靖間大殿燬惟塔存國朝康熙三年重修二十三年聖祖南巡駕嘗幸塔之最高頂御書不二法門四字匾額懸於大殿御製幸報恩寺詩一首恭紀首卷又每級御書一額曰一乘慧業二儀有象三空勝地四海無波五律精嚴六通真諦七寶蓮花八表同風九有𢎞觀又賜金佛一尊金剛經一部供奉塔頂御製登報恩寺浮圖詩一首㳟紀首卷三十八年塔燬特頒帑金修建御製修報恩寺塔初畢登之詩一首恭紀首卷附明盛時泰塔賦出都門以游衍兮經長干之故墟瞻寶塔之崒􅟭兮心四顧而踟蹰始卜築於孫吳既再興於晉馬獲石内之三珠得函中之半髮光煜而亂輝色青紺而騰發惟金粟之自炯出玉毫而普現乃寳氣之燭幽故慈光之上燀厯塵刼而獨存超人天以自展惟明祖之龍興兮振大法於將隳既離明之繼照兮拓𢎞基而建之念櫛沐之久劬兮哀罔極之難報證寳地以舒䖍兮仰提慈而洞照發睿念於淵衷兮沛綸音於天詔遂乃近徵畿甸逺募荒陲畫甄工之意巧極目匠之伎竒凖宫闕以立極擬路寢而築基備百制之儲萃煥五色之葳𬎼飾隨材而殊質彩呈體而異施盤后土以奠方兮浚重泉而作鎮擁蓮趺以旋規兮列朱楹而作蹬映紺殿以孤蹇兮超􅓏廊而直䟴出木末以髙標兮踰臺顛而獨峻故逺而視之則嶒峵嵣㟮一何高也崢嶸巘崿又何麗也嶵峗嶕嶢誠可駭也嶙峋熣燦亦何異也玲瓏烺炫輝若海藏之涌生焉巍巍嵯嵯紛葩爛熳若空界之幻成焉竦露盤於雲中兮峙金相於天闕開八户以翕施兮盤九曲而嶻嶪剛風寥寥拂其上兮灝氣汩汩旋其根勢嶐嵷而直矗俾喬嶽以失尊掩映雲表若隱若彰凴陵旻昊輝輝煌煌心仰瞻而内悸兮目搖搖以喪精魂滛淫以自失兮睫閃閃而若驚於是詳其制度觀乎窈㝠崇基詭制巨搆殊形高踰三八數邁徑三非尋丈也鈎鬬簷牙坐計甲乙非斵削也闢以八維虛實其四順陰陽也列牖設篝婉轉洞徹通明暗也甃㽃瓳以為固兮盤鉛錯以為堅懸鈴鐸以為振兮罥蚌蠣以為緣列巨靈以顯化兮飾諸像以感緣冠纓鎖胄悉其飭兮耳目眉髮暨其全虎豹犀象蹲其下兮蓮曇蔓鉢嵌其巔外侈極於𢎞麗内縝緻於精微上標極於峻迥下盤固於無倪雕欄婉轉而逶迤兮瑣闥軒翥而𢎞張棼繚繽紛以相齧兮斗栱奮起而翺翔螭頭岉崛以交結兮豹尾夤緣而横當懸棟㟏岈而撑柱兮綺阿露佩以飄颺鎪鏤煒煌而煊炫兮布置絡繹以縱横飛梁偃蹇以翕翼兮層櫨岋而昻藏金除燡燭而赫起兮皓壁螢液以韜光於是極目而矚則長江渺渺其束帶兮羣山隱隱而如垤闤闠遠其椆依兮城闉聳其密疊廛市迴其千圍兮衝衢委其四列阡陌交其塍偃兮原隰互其明滅趨視若燭龍之下翔佇瞻恍火齊之上騰昕暮互其變態兮風霾鬱其聿蒸倐現彩於罔測兮忽幻質於虛無既作鎮於神京兮又翹凖於皇都極寰海之浄土兮孰兹塔之可如誠法界之偉觀兮擬㝠工之所鏤匪近知其可詮兮恍神鬼之自符願照迷方於十地兮續慧性於八區庶普人智於罔極兮注洪澤以沾濡天界寺在聚寶門外善世橋南舊在城中大市橋北元名龍翔集慶寺明初改天界寺洪武戊辰災徙建今所寺中萬松菴半峰亭最勝能仁寺在聚寶門外天竺山舊在古城西