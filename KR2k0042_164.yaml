body:
  text: 江南通志卷一百六十五人物志文苑一江蘇二府聖人之道源逺而末分自言子還吳淡臺居楚於是南方之學得其精華而論者以為江左文章流風綺靡是亦沿其波不尋其源者矣考諸載籍所傳代多作者春華秋實兼可採掇殆庶幾彬彬文質者歟今國家作人之盛雲漢昭回光嶽混同之氣髙謝六朝雅頌和平之聲同風三代蓋有道之長人文化成固不僅如東京文苑篇辭為貴者也江寧府晉王鑒字茂髙堂邑人少以文章著稱杜韜作逆鑒上疏勸元帝親征後拜駙馬都尉出守宜興許謐句容人博學知名仕為郡主簿王導蔡謨並辟從事皆不就後歷官至散騎常侍王羲之字逸少司徒導從子起家祕書郎拜右軍將軍㑹稽內史嘗遺殷浩書止北伐與謝安書論賦役深達時務書翰之美凌跨百代子獻之書法與父齊名厯官中書令南北朝梁紀少瑜字幼陽秣陵人年十三能文賦京華樂王僧孺見而賞之嘗夢陸倕授以青鏤管筆文綵益著隋諸葛穎丹陽建康人年八歲能屬文厯仕梁周習周易圖緯倉雅莊子清辨有俊才隋晉王廣引參軍事轉記室及即位遷著作郎賜詩優異從征吐谷渾加正議大夫有集二十卷唐王昌齡江寧人開元進士為祕書郎工詩緒密而思清以不護細行貶龍標尉詩家稱王江寧五代朱存金陵人南唐時取孫吳而下六朝書具詳成敗得失之要作覽古詩二百章地志家多援以為證宋盧郢升州人好學有才藝善吹鐵笛李後主時試賦擢第一嘗代徐鉉為文口授吏書之鉉以文進後主曰語勢似非卿作鉉以實對由是知名後歸宋纍官知全州有治績朱舜庸建康人好古博雅為府學正嘗編金陵遺事自里巷口傳至仙佛之書無不研綜名續建康志元李桓上元人以鄉舉纍官江浙儒學副提舉其文紆餘豐潤有名江東楊剛中字志行上元人為文竒奧動法古人而不屑為凡近語元眀善極歎異之終翰林待制有霜月集行世明夏煜字允中江寧人好學有俊才以詩名太祖召置幕下為中書省博士伐陳友諒時煜侍太祖草檄賦詩洪武初總制浙東諸府楊勉江寧人永樂初進士文皇選曾棨等二十八人讀書中祕勉其一也時勉年最少風姿俊偉詩文舂容典則出諸作者右授刑部主事升本部侍郎坐事出參廣東政李莊字敬中父為灤城侯殁於王事莊從劉溥逰刻意詞翰人爭傳之倪謙字克讓上元人正統己未進士第三人奉使朝鮮文翰風采傾動海邦天順己卯主試順天黜權貴子誣構謫戍開平成化初復職官至南禮部尚書諡文僖所著有玊堂稿遼海編諸集陳鎬字宗之家南京少與弟欽俱有文名同舉成化丙午鄉試眀年同登進士同由郎署為督學副使時詫兄弟三同鎬督學山東為衡文第一厯官至巡撫著矩菴漫稿金陵人物志欽知廣平有惠政郡人號為陳母著自菴集海山聨句集顧璘字華玉上元人𢎞治丙辰進士由知縣厯知開封府忤鎮守中官矯詔逮獄謫知全州遷知府仕至南刑部尚書璘少負才名與陳沂王韋肆力為詩文稱金陵三俊晚歲家居構息園接引勝流坐客常滿王韋字欽佩上元人徽子𢎞治乙丑進士改庶吉士纍遷太僕少卿母喪毁卒詩文婉麗有雋味著南原集子逢元亦詞翰有名陳沂字魯南上元人十歲能文著孔墨辨赤寶山賦銘正德丁丑進士選庶吉士除編修與修武宗實録歷山東參政疏捐馬種薪木運布諸征以不附張孚敬桂蕚改山西行太僕卿致仕歸杜門著述管景字子山嘉靖中以貢授廣信府檢校監司聞其才檄署水豐上饒二縣撫定上饒窑民之亂遷布政司檢校嘗修江寧府及上元縣志謝璿字文卿家金陵八歲賦暮秋有紫塞風寒雁叫霜之句驚其座人儲巏為考功作檀園詩社璿每擅埸兄弟四人各以詩畫名璿子少南從顧璘遊亦知名陳芹字子野嘉靖甲午舉人教諭崇仁邑令有素所恨者二生誣以罪司牒提究芹力白得免人謂能舉其職遷奉新令調寧鄉歸芹才藻敏贍兼工繪畫起邀笛閣於秦淮結青溪社與名士觴詠許穀字仲詒上元人嘉靖乙未㑹試第一是年親試進士入中祕穀對䇿剴切讀卷者恐忤上意故抑之授戶部主事厯南尚寶司卿致仕穀為顧璘髙弟風流儒雅以耆宿主盟詞壇後先相望云盛時泰字仲交江寧人歲貢生才氣橫溢䑛筆伸紙滚滚不休嘗攜所著兩都賦謁王世貞和其擬古七十章三日而就世貞為氣奪焦竑字弱侯江寧人為舉子即博極羣書負重望萬厯己丑殿試第一除修撰充東宫講官進講必從容叩擊隨機納誨又采故事繪圖演義名養正圖說進之忌者日甚以丁酉主試北闈文體險誕謫州同知復削籍歸益專事著述講求留都事宜言於當事行之所著有經籍志獻徴録筆乘類林等書同時有周暉字吉甫上元人胸饒藴蓄性好編纂著有金陵瑣事正續集又黃應登字徴甫萬厯中以貢授教諭賣文養親所修纂者有獻徴録列卿紀京學志諸書張榜字賓王句容人萬厯癸卯舉鄉試聰穎絶人書史過目成誦落筆如風雄談雅謔沁人心腑在南雍舉幡留大司成馮夢貞上疏請伏斧鑕以直先生人皆義之凌世韶字宫球江寧籍為諸生即以詩文名崇禎甲戌進士知福清縣不事催科坐謫汀州經厯署寧化縣遷處州推官擢戶部歸性介特自矜重其文有貴人持百金介密友求作其父墓銘揮去之曰腕可斷此等文不可作也張文峙字紫淀家鍾山之陽貫穿經史辨核掌故務為根底有用之學撰南樞志一百七十卷纂明布衣詩一百卷陳丹衷字旻昭江寧人崇禎癸未進士少以孝聞登第後請纓自效授御史召募苖兵未遂志卒為文閎奧自成一家國朝劉思敬字純之江寧人十歲能文順治丁亥進士任刑部郎中執法無所避分校禮闈得士最盛尋擢參議乞終養修江南省志著徹賸八編程邑字翼蒼江寧人工詩能文順治己丑進士授庶吉士以不諳國書出為蘇州教授課士有法遷國子助教纂修明史白夢鼐字仲調江寧人少與兄夢鼎勤學尚志節時有二白之目鼐舉康熙庚戌㑹試第二官大理評事總憲魏象樞以博學宏詞薦庚申補行福建鄉試鼐為考官得士稱盛倪粲字暗公上元人為諸生即以淹雅著名康熙丁巳舉鄉試應博學宏詞薦官檢討胡任輿字孟行上元人文筆秀雅舉康熙辛酉鄉試第一甲戌進士廷對第一授修撰侍講筵厯升諭德朱圻字次郊上元人性峭潔工詩文書翰為諸生祭酒著夏雲堂天放居集子元英康熙己丑進士官編修詩古文皆工著左傳拾遺先著字遷甫江寧人博覽多聞工詩文及樂府長短句與同里張㹅徐時盛輩相唱和所撰嚴許集藥裹集勸影堂詞及易微詞潔等書行世黃越字際飛上元人康熙己丑進士官檢討少以文名凡所撰述海內流傳奉為矩矱晚益沉酣宋五子書能抉其藴同里朱文鑣字履安性醇厚恬雅亦以文學知名李東櫰字兆三句容人嘗自言生平得力於精義二字博通經史工詩文稟性醇厚雍正癸卯舉於鄉任寧化知縣卒於官徐佩字子燧上元學生生六歲而孤家貧無力購書每至書肆觀之一屬目輒成誦長通六籍百家臯比談經得其指授悉成名雋學者多以胡安定稱之母曹苦節備極孝養伯母袁氏年十六守志無子養之如己母終身其篤行又如此蘇州府漢嚴助吳人舉賢良方正對策百餘人武帝獨善助對擢為中大夫在左右見任用嘗侍燕從容帝問所欲對願為㑹稽太守於是拜為㑹稽太守數年復侍中有竒異輒使為文及賦頌三國吳沈友字子正吳人年十一華歆行風俗見而異之呼沈郎可登車語乎友逡巡曰先生銜命將以裨補先王之教整齊風俗而輕脫威儀乎歆慚曰自桓靈以來雖多英彥未有幼童若此者及冠博學善屬文兼好武事注孫子兵法孫權以禮聘之既至論王霸之略權斂容敬焉正色立朝清議峻厲為庸臣所譖以死張儼字子節吳人弱冠知名以博聞多識拜大鴻臚使於晉孫皓謂曰今南北通好以君有出境之才故相屈行既至賈充裴秀等欲傲以所不知而不能子勃翰勃撰吳録三十卷翰别見陸璣字元恪吳人為太子中庶子烏程令撰毛詩鳥獸草木蟲魚疏二卷沈珩字子山吳郡人少綜經學尤善春秋內外傳有智謀能専對使至魏文帝引珩自近談語終日珩隨事響答無所屈服以奉使有稱封永安鄉侯官至少府晉張憑字長宗吳郡人舉孝亷初欲詣丹陽尹劉惔鄉里皆笑之既至惔處之下坐神意不接㑹王濛就惔清言有所不通憑於末座判之言㫖深逺足暢彼我之懷一坐皆驚惔延之上坐清言彌日留宿至旦遣之既還船須臾惔遣傳教覓張孝亷船便與同載詣簡文帝帝與語歎曰張憑勃窣理窟官至御史中丞張元之字祖希吳人少以文學顯扶風張業大儒也間其才引與語曰今日真解矇矣遂請上堂難問極日范寧亦稱元之為吳士之秀孝武時厯吏部尚書出為吳興太守與㑹稽內史謝元稱南北二元南北朝宋張鏡吳人與顔延之鄰延之談義飲酒喧呼不絶而鏡靜默無聲後鏡與客談延之從籬邉聞之取胡牀坐聽辭義清逺延之心服謂客曰彼有人焉由是不復酣叫鏡兄演弟永辨岱俱知名時謂張氏五龍顧願字子恭吳人覬之從子好學有文詞名於世大明中舉秀才對䇿稱㫖擢著作佐郎早卒初覬之嘗謂秉命有定分非智力所移以其意命願著定命論齊張融字思光吳郡人暢子有孝義忌月三旬不舉樂事嫂甚謹為封溪令浮海至交州作海賦以示顧覬之覬之曰卿此賦實超元虛但恨不道鹽耳即求筆注曰漉沙搆白熬波出素積雪仲春飛霜暑路領司徒從事中郎乞假東出武帝問住在何處答曰臣陸處無屋舟居非水後問其從兄緒緒曰融未有居止權牽小船於岸上住帝大笑融元義無師法而神解過人髙談鮮能抗拒永眀中卒文集數十卷行世自名為玉海陸澄字彥淵吳人少好學博覽無所不知宋泰始中為尚書殿中郎纍遷度支尚書嘗與王儉書陳王弼注易元學之所宗而鄭注亦不可廢并言左氏杜學之長穀梁舊有麋信近益以范寧不足兩立儉皆韙之儉在尚書省出巾箱几案雜物令學士𨽻事事多者與之人各得一兩物澄後來更出諸人所不知事復數條并奪物將去竟陵王子良得古器小口方腹而底平可容七八升以問澄澄曰此名服匿單于以豫蘇武詳視器底有字倣佛可識如澄所言隆昌中卒諡靖梁陸倕字佐公吳人慧曉子少勤學善屬文晝夜讀書一編必誦於口嘗借人漢書失五行志四卷乃暗寫還之略無遺脫竟陵王子良開西邸延英俊與范雲蕭琛任昉王融蕭衍謝眺沈約並以文學稱八友梁武帝雅愛倕才乃敕撰新漏刻銘又詔為石闕銘敕褒美之遷太常卿卒兄子繕亦知名張率字士簡吳人性寬雅能屬文時陸少元家有父澄藏書萬餘卷率與少元善盡讀其書梁天監中直文德待詔使抄乙部書又撰古婦人事寫給後宫取假東歸為待詔賊奏之手敕答曰相如工而不敏枚臯速而不工卿可謂兼二子於金馬矣歷黃門侍郎丁生母憂卒率自少屬文七略及藝文志所載詩賦亡其文者並補作之陸煦吳郡人徽孫學有思理位太子家令撰晉書未就著陸史十五卷陸氏驪泉志一卷兄子罩字洞元篤學多所該覽善屬文為簡文記室參軍禮遇甚厚以母老求去公卿咸祖道皇太子賜黃金五十斤時人方之疏廣顧協字正禮吳人和六世孫舉秀才尚書沈約覽其策歎曰江左以來未有斯作為廷尉正冬服單薄蔡法度欲解襦與之不敢發口謂人曰我欲解身上襦衣顧郎恐顧郎難衣食者厯鴻臚卿卒官無衾以殮協博極羣書撰異姓苑五卷瑣語文集若干卷陸雲公字子龍吳人五歲誦論語毛詩九歲讀漢書從祖倕與劉顯質問十事對無所失顯歎異之及長好學有才思製泰伯廟碑吳興太守張纘經途讀其文曰今之蔡伯喈也至都言之武帝召為尚書儀曹郎纍遷中書黃門郎兼掌著作卒陳陸瓊字伯玉雲公子六歲為五言詩有詞采都下號曰神童朱异言之武帝召見風神警亮帝甚異之陳天嘉中以文學屢遷尚書殿中郎諸大手筆並敕付瓊後主即位直中書省掌詔誥初雲公奉梁武敕撰嘉瑞記瓊述其㫖而續焉丁母憂過毁以卒子從典八歲讀沈約回文援筆擬之便有佳致十二作栁賦其詞甚美從父瑜特所賞愛命家中墳籍皆付之陳亡入隋位著作佐郎楊素奏從典續司馬遷史記迄於隋末就坐事免陸琰字溫玉瓊從弟歷法曹參軍直嘉德殿學士博學善占誦世祖嘗使製刀銘援筆即成副琅邪王厚聘齊厚病卒琰為使主時年二十餘風神韶亮占對間敏齊士大夫皆傾心焉大建初兼東宫管記卒後主求其文撰成二卷陸瑜字幹玉琰弟少篤學美詞藻官晉安王外兵參軍東宫學士兄琰時為管記並以才學侍左右時人比之二應從父兄玠從父弟琛玠字潤玉𢎞雅有識度善屬文大建初為東宫管記有集十卷琛字潔玉少警俊事後母以孝聞為給事黃門侍郎中書舍人參掌機密隋陸士秀字南容吳人博通百家幼時在陳容儀迅舉齊使李騊駼問江南孟婆是何神答曰山海經言帝之二女遊於江郭璞注天帝二女尊為神由此言之則孟婆也以天帝女尊之為孟猶郊祀志以地神為泰媪也騊駼曰僑南之辨無以加焉後仕隋為學士唐朱佐日吳人兩登制科三為御史武后嘗吟詩曰白日依山盡黃河入海流欲窮千里目更上一層樓問是誰作李嶠對曰御史朱佐日詩也賜綵百匹轉侍御史子承慶與父齊名陸餘慶蘇州人元方從父已冠名未顯兄元表唶曰爾名宦不立奈何餘慶感激讀書三年以博學稱舉制䇿甲科與陳子昻杜審言等號方外十友好奬薦寒品晚進人有過輒面折退無一言終太子詹事諡曰莊張從申吳人善書世稱獨步擢第為祕書省正字後官長史弟從師仕終河南法曹參軍張說撰墓志云冲和純粹辨博閎達卓犖好古跌宕逸羣忘懷樂道終葬虎邱西原張旭字伯髙吳人善草書與包融賀知章張若虛號吳中四士嘗見公王擔夫爭道得筆法觀公孫大娘舞劍器而得其神每大醉呼叫狂走乃下筆或以頭濡墨而書既醒自視以為神世號張顛得旭傳者崔邈顔真卿孫過庭字虞禮吳郡人官胄曹工書嘗著書譜自以行草書之宋髙宗謂妙備草法手不少置子翔亦善書沈既濟吳縣人經學該眀拜左拾遺史館修撰議武后進非以德請省其本紀德宗時詔兩省置待詔官權公錢收子贍用既濟諫止之撰建中實録時稱其能子傳闕于公異吳人擢進士第李晟表為掌書記朱泚平露布於德宗曰臣既肅清宫禁祗奉寢園鐘簴不移廟貌如故帝覽泣下問誰為之或以公異對帝咨嗟久之張籍字文昌吳郡人貞元中進士韓愈薦為國子博士厯水部員外郎終國子司業性狷介工詩與孟郊元白並號元和體樂府尤有名顧况字逋翁吳郡人性詼諧工詩歌為韓滉節度判官稍遷著作郎怏怏不樂求歸吳結廬茅山自號華陽真逸皇甫湜撰集序云逸歌長句若穿天心出月脅非尋常所能及子非熊少俊悟一覽成誦好陵轢時輩為衆所抑久困場屋長慶中陳商榜無非熊名詔進所試敕及第尋亦棄官隱茅山或傳其得長生術云陸暢字達夫吳人蚤有才名舉進士授祕書丞雲陽公主出降詔作催妝詩稱㫖為劍南節度使韋臯所厚作蜀道易以美臯陸扆字祥文吳人舉進士第一進學士屬辭敏捷嘗與諸學士金鑾殿作賦獨先就昭宗歎曰貞元時陸贄吳通元兄弟善內廷文書後無繼者今朕得卿斯文不墜矣與宗人希載文才德器名冠一時朝中號二陸天復初為朱全忠所害陸希聲吳人景融四世孫博學善屬文通易春秋老子論著甚多精書法世所稱雙鈎撥鐙法傳自二王希聲以授沙門𧦬光昭宗時官至户部侍郎同中書門下平章事吳仁璧字廷寶長洲人大順中及第善屬文工詩精星學吳越錢鏐待以客禮訪求天文固辭非所知鏐母殂具禮幣請為志文不從鏐怒沉之江中時人憐之有詩一卷宋劉少逸長洲人年十一工文詞其師潘閬攜謁長洲令王禹稱吳縣令羅處約以所作為贄二令負重名疑其假手因與聨句皆敏妙二令驚異聞於朝賜進士及第謝炎字化南吳人太子賓客濤弟端拱初厯華容公安二縣令為文法韓栁與杭州盧慎齊名謝絳字希聲吳人濤子以父任入官又舉進士楊億得其啓事謂人曰此文中虎也厯兵部郎知制誥出知鄧州卒絳以文學顯兼有政事才歐陽修王安石皆極稱之子景初字師厚慶厯中擢第纍遷屯田郎博學工詩景平字師同景回字師復亦並有文名景平官至祕書丞陳睦字子雍祖司諫絳自閩徙吳第進士治平中詔舉館閣才學之士與劉攽李清臣首被選終寶文閣待制許洞字洞天吳縣人舉咸平三年進士以才學自負曠放不羈與潘閬錢易為友所著詩詞甚多尤精左氏官烏江主簿陸綰字權叔常熟人舉進士終職方郎中工歌詩蘇洵嘗贈詩美其篤學好文於諸經有造詣米芾字元章吳人厯太常博士知無為軍召為書畫學博士擢禮部員外郎出知淮揚軍為文竒險不蹈襲妙於翰墨得王獻之筆意畫山水人物自名一家工臨摹善賞鑒遇古器物書畫極力求之必得乃已子友仁字元暉力學嗜古亦善書畫世號小米仕至兵部侍郎敷文閣直學士黃䇿字子虛吳人父彥熙寧中進士知浦江縣清直眀恕民畫像祀之策九歲以詩見蘇軾軾曰子異時必以文顯弱冠擢第教授齊州上書忤蔡京崇寧初以黨籍羈管登州建炎中除直袐閣通判嚴州有集四十卷子維纓字端冕以文名宣和末屢上書言事纓子季魯有集十卷陸徽之字彥猷常熟人由太學生上舍賜進士官濮陽主簿髙才博學建中靖國初詔求直言徽之力陳時政闕失放歸大觀末復徴用已卒魏憲字令則吳江人與弟志俱進士有聲熙豐問纍遷中書舍人給事中其文溫厚雅正得代言體以直學士致仕憲執親喪三年不御酒肉廬於冢上有芝草甘露之祥周南字南仲吳縣人與孔元忠滕宬皆從葉適遊紹熙元年對策言甚切直大要謂小人之倡為異說以䝉蔽陛下者一曰道學二曰朋黨三曰皇極夫箕子謂有猷有為有守乃有才有道有操執之人也今所指為道學朋黨者正斯人耳奈何反棄之而謂建皇極哉考官得其文驚嘆光宗疑之格置乙科官終祕書省正字張公秀字仲實蘇州人紹興中臨海縣令有善政嘗從葉適遊風流詞翰推重一時邉純德字公靜崑山人幼孤至孝貧不廢禮才思敏給以能詩為范成大所知嘗與倡和五中鄉舉就奏名即致仕撰脂韋子五十卷子瀛濟並有學行孫緯字彥文吳人擢進士第官至尚書郎精於典故著本朝人物志王伯廣字師德常熟人少從楊邦弼學由進士乙科調德清尉善詩文四六亦膾炙人口所著有聽雨集張攀字從龍常熟人登進士厯袐書丞銓次中興館閣書目凡一萬四千九百四十三卷上之終起居郎有益齊文集髙常字履常吳郡人清癯灑落性嗜吟咏有覆瓿集五卷尤焴周弼馮去非為之序吳人之學詩於周弼者湯仲友顧逢陳瀧逢字君際弼稱為顧五言瀧字伯雨博涉經史百氏深於春秋仲友字瑞夫淹貫經史氣韵髙逸同郡陳發嘗評髙湯顧陳四子之詩輯為一編曰蘇臺四妙張慶之字子善吳人棄舉子業精思經史百氏擬太元作測靈撰孔孟衍語老子注號海峯逸民自為傳以伯夷蔣詡陶潛自况元湯彌昌字師言吳郡人父暉老咸淳進士父子皆以周禮發解彌昌由建康路教授轉瑞安州判官致仕生平篤志義理有文名著周禮解義等書衛培字寧深崑山人涇曾孫博通經史習知前代典故充貢龍虎榜賦文不起草有倚馬之才聘為州學訓導劉嶽字公泰祖開宋神醫世居星子宋季來吳元祖詔求南士嶽應聘入見世祖詢其先世習醫官以太醫院未幾詔以文合古作改翰林學士知制誥所著有東崖小稿朱德潤字澤民崑山人延祐末用趙孟俯薦官編修至正間浙省辟為參謀攝守長興招徠流離以病免讀書一過能記工詩文善畫虞集稱之曰澤民文章典雅惜以畫掩其名宋旡字子虛其先固始人父遷於吳旡遂為吳人以才略應樞府辟典東征萬户書檄入海遭颶風失道漂經髙麗諸山罹沉疴歸以病薄味清齊日從林下逰與趙孟俯鄧光薦輩稱詩年八十一卒所著有翠寒啽囈二集蔣堂字子中吳人幼讀書有大志長以孝友間中泰定鄉試隱居教授執經受業者不逺千里而至其後登左右榜者多出其門至正間用薦為嘉定州教授郭翼字羲仲崑山人少從衛培學邃於易為文力追古人楊維貞謂可方軌西京李孝先稱其詩與人不同調晚得訓導官以終著有林外野言李世英字伯英長洲人精書學作韵類三十卷以字為本音為幹義訓為枝葉自一而二井然不紊凡十年成書從子文仲又本說文作字鑑五卷辨㸃畫刋除舛謬以備一家之書干文傅黃溍為之序張雯字子昭吳人力學嗜書構樓藏書自經傳子史稗官無不具其學該通淵博時宋亡已久雯從故老訪宋遺文舊事著書曰繼潛録子田字藝已亦工詩文孫肯字繼孟從金華宋濓學為詩文清麗有法顧權字用衡崑山人博通羣典尤究心於易為文章刻意有古作者矩度一字不當不茍出隱居教授卒無子知州揭傒斯買地葬之馬鞍山側葛乾孫字可久吳人生有竒氣膂力絶人好擊刺戰陳之法以至隂陽律呂星數靡不精究長乃折節治經研覃淵邃肆力古學為文章陵轢古今父應雷以醫書授之稍治輒精而不屑以自見或試之皆取異效周南老字正道敦頤之後其先世自道州徙吳南老用薦為吳縣主簿又辟為浙省掾入眀徴詣太常議郊祀禮禮成放還南老端毅好學本於義理而詳於制度所著有易傳集說喪祭禮舉要等書顧阿瑛字仲英崑山人輕財結客年三十始折節讀書築别業於茜涇西曰玉山佳處四方文士若楊維貞柯九思方外張伯雨等咸主其家其園池亭榭之盛圖書之富及餼館聲歌並甲一時而才情妙麗與諸公亦略相當嘗舉茂材署㑹稽教諭辟行省官屬皆不就張士誠欲强以官乃去隱於嘉興既而以子恩封武略將軍水軍千户洪武初隨其子遷臨濠卒周砥字履道吳人博學工詩嘗寓荆溪與馬治孝常者窮山水之勝著荆南倡和集晚歸吳中與髙楊輩結社錢逵字伯行吳縣人父良佑字巽之博學工詩尤工篆𨽻逵刻意力學至正間官淮南行省員外郎洪武初選詣太常議禮禮成放還後以事逮京師卒逵淳厚雅飭稽古考訂雖老不倦篆𨽻行楷悉追古人繆侃字叔正常熟人博雅工書好蓄法書古器弟佚亦能詩善畫同邑嚴煥字子文以進士終朝奉大夫文章整健詩學尤邃陸友字友仁吳縣人博雅好古有詩名工漢𨽻八分行楷尤能鑒别鐘鼎銘刻法書名畫嘗著研史墨史印史黃錫孫字禹疇常熟人讀書勵行窮約不易其守善造就後進為文尚理氣詩尤精粹時太初字大本常熟人淵雅善詞章嘗詠白燕詩云珠簾十二中間捲玉剪一雙髙下飛楊維貞極稱之同邑陸景元字子善行義端飭博學能文詩尤髙古又有朱桓字仲威盛彧字季文鄧士英字伯琚錢蘇字更生元季皆以文學知名於時盧觀字彥逺崑山人敦行寬厚記問該博見道分眀凡經史禮樂百氏之書繕寫殆遍文質字學古崑山人學行卓然詞章竒放為楊維貞所稱與盧觀趙天祐衛琯盛得瑞范天與六人為邑中耆碩有司月給禀膳焉俞日强字曰莊崑山人以孝聞淹貫經史有集行世又有金至善字伯明修德樂施老益力於學明傅著字則眀常熟人文詞典雅見推於時洪武初與修元史終潞州知府袁華字子英崑山人少穎悟不羣工詩尤長於樂府楊維貞極稱之洪武初為郡學訓導同邑呂誠字敬夫與華齊名時稱袁吕張簡字仲簡吳郡人初為黃冠師以母老歸養遂返巾服博通儒家書尤工詩饒介嘗延諸文士賦詩髙楊輩咸在簡詩第一有集若干卷虞堪字克用宋丞相允文裔孫家長洲隱居不仕家藏書甚富手自編輯工詩兼善寫山水洪武中為雲南教授卒官吳中世儒家虞氏與南園俞氏為最陳則字文度崑山人洪武六年舉秀才授應天府治中厯户部侍郎出為大同府同知文詞清麗元季以工詩名於吳下髙啓北郭十友之一也髙啓字季迪長洲人少孤力學工詩年十六或薦於張吳參軍饒介介見啓詩驚異以為上客啓不屑去隱吳淞江之青邱洪武初以廷臣薦與修元史授編修擢户部侍郎以年少未習理財辭遂賜罷放還復居青邱先是啓以史事為魏觀所知觀為蘇守為徙居城中接見甚密觀得罪連坐死時年三十九楊基字孟載其先蜀人大父宦遊江南遂家於吳九歲能背誦六經著書十萬餘言名曰論鑒眀師下蘇州基以饒介客安置臨濠尋起為滎陽知縣後為山西按察使被讒奪職卒於京基尤工詩與髙啓張羽徐賁齊名號吳中四傑申屠衡字仲權長洲人少從楊維貞學春秋為古文有法洪武三年徵至京師草諭蜀書稱㫖授修撰以病免同時有陶琛字彥珩亦有文學志尚髙潔工古篆書以薦為儒學官史謹字公敏崑山人少與倪瓚髙啓遊博學好古工書畫洪武間翰林學士王景薦其才授應天府推官左遷湘隂縣丞罷歸鄒奕字宏道吳江人秀目美髯議論英發文詞髙古至正間進士洪武初知贛州府坐事謫甘肅二十年永樂初以蹇義薦召還有吳樵稿謝徽字元懿長洲人博學能詩與髙啓齊名同召修元史同授官辭歸再起為國子助教卒弟恭亦能詩袁養福字能伯吳縣人眀初為福建憲使髙啓有詩贈行行潔才髙有詩名精於書法吳寬稱其書郭有道碑得歐陽詢筆意劉以禮字德讓蘇州人學識該博儀觀偉然洪武初以貢授沛縣教諭時學徒久廢以禮舉鄉人張倫為訓導協心教之多所成就瞿莊字敬夫常熟人孝子嗣興子用薦授翰林典簿宋濓稱其文學蔚茂應制諸作率皆稱㫖終福建布政王履字安道崑山人博通羣籍能詩文工繪事精醫藥洪武間嘗遊華山作圖四十幅記四篇詩一百五十首嘗云先輩言文章當使移易不動慎勿與馬首之絡相似余遊華之詩敢謂軼昌黎而配少陵庶免乎馬首絡之弊而已畫師夏圭評者謂作家士氣皆備醫得金華朱彥修之傳著醫書百卷張適字子宜長洲人七歲能賦詩彈琴十歲通五經時號聖童洪武初以秀才舉擢工部都水郎病免得朱長文樂圃故地觴詠自得有甘白先生集梁時字用行長洲人博學工文章亦善書札洪武中用薦授岷府紀善遷翰林典籍修永樂大典充副總裁盧熊字公武崑山人觀子洪武初熊以元季教諭迫遣赴京以善書擢中書舍人遷兖州知州濬兖河事集而民不擾熊少從楊維貞逰博學工文尤精篆籀子彭祖孫瑛俱能傳家學沈澄字孟淵長洲人洪武中以人才應薦至京尋引疾歸周忱巡撫吳中嘗就澄訪時政多所舉行雅善詩尤好客人擬之顧阿瑛翰林金問坐事繫獄十年衣食之需皆澄周之子貞吉恆吉從陳繼逰蔚有聞望隱跡尚義有父風俱能詩又皆善繪事妙處逼宋人王行字止仲吳縣人髫時隨父為人讎藥藥千品悉志不爽王異之試授論語翌日已成誦遂以所儲書恣其披閲三年辭去文名大譟授徒城北援據古今纚纚不窮家徒壁立几無留帙叩其所自曰向得之藥肆翁耳洪武初延為府學經師諸生心易之以五經雜進問難行隨問辨答無有疑滯衆始嘆服葉顒字伯卬吳縣人家洞庭東山父國英倜儻好結納名士故顒學有端緒元季中江浙行省鄉試署和靖書院山長眀初故人長興侯耿炳文招顒欲薦於朝顒不可放情詩酒有許光逺亦家洞庭洪武初應召至京獻詩又陳省刑薄賦之䇿以老乞歸時稱洞庭二老朱應辰字文奎吳縣人少從楊維貞學為古文詞洪武間終江隂訓導詩文衍暢炳蔚尤精篆籀之學吳文泰字文度吳縣人耽於詩清才逸思雖罹憂困嘲弄不輟同郡丁敏字遜學亦喜吟詠更相推敲故所業益精文泰洪武間為涿州同知謫戍雲中卒宋克字仲溫長洲人博涉書史少任俠擊劍走馬學握竒陳法張氏據吳度其無成藩府欲致之不能得眀初徵為侍書出為鳳翔同知旋歸隱南宫里工草𨽻時作詩見志髙啓有南宫生傳陶振字子昌吳江人洪武末舉眀經終安化教諭少學於楊維貞兼治詩書春秋三經詩語豪俊有名於時趙友同字彥如長洲人自少篤學從宋濂逰洪武末任華亭訓導大臣薦其文學召修永樂大典五經四書性理大全書成以母喪歸滕用亨字用衡初名權長洲人問學博辨文章爾雅兼精六書篆籀之妙髙出近世永樂中被召年幾七十矣面試篆書作麟鳳龜龍四大字又獻貞符詩稱㫖授翰林待詔王璲字汝玉以字行長洲人少穎異落筆數千言纍官春坊贊善嘗應制撰神龜賦汝玉第一解縉次之聲名大譟永樂中宫僚多得罪汝玉與焉洪熙初贈太子賓客諡文靖兄璉字汝器洪武中編修文學不減汝玉而早卒朱吉字季野崑山人有文學用薦授給事中後以善書改中書舍人子定安字士隆工古篆得周伯琦之傳定安弟永安字士常亦善筆札同邑葉盛曰邑衣冠舊族必推朱氏士隆兄弟出處不同清修苦節同為時重夏昶字仲昭崑山人以經術進而書法特妙永樂中試其書第一特命諸宫殿榜皆昶書之厯官太常卿致仕昶平易可親而風流文雅有高人之致詩詞清麗尤工畫竹石擅名天下朝鮮日本諸國皆懸金購之兄昺亦善書官中書舍人屈昉字季恆崑山人讀書不事章句詩篇傳播為楊士竒所知問邑令曰季恆安在令不能答乃心識之㑹詔舉經明行修之士即以昉薦授南海縣丞久之致仕錢紳字孟書吳人父中字孟則娶於陳夫婦皆讀書善琴紳與陳繼為內外兄弟遊同方學同師各以所業更互辨難俱為通儒紳質淳行端所藏書皆手自繕寫官鄞縣教諭劉珏字廷美長洲人正統三年舉人官至山西按察僉事老而好學工於唐律時人稱為劉八句行草師李雍畫師王䝉皆得古人筆意精於鑒賞殘縑斷墨靡不藏弆劉溥字原博長洲人祖彥敬以醫事太宗溥遊學兩京研覃載籍尤精天文律厯之學宣德初以文學徴有言其善醫者遂以為太醫院吏目非其志也其詩初效西崑久益竒肆當時有晏鐸王淮鄒亮湯印績蘇平沈愚蔣主忠蔣主孝徐震諸人以詩自豪號十才子推溥為尸盟者鄒亮字克眀長洲人才思藻麗受知巡撫周忱正統初用况鐘薦官至監察御史為人謙謹酷嗜書積至千餘卷施槃字宗銘吳縣人家東洞庭山幼警敏有都憲張某令屬對曰新月如弓殘月如弓上弦弓下弦弓對曰朝霞似錦晚霞似錦東川錦西川錦張大驚正統己未年二十三廷對擢第一入翰林日立程限讀書詩文逼古人楊溥深重之陳鑑字緝熙長洲人父謫戍蓋州鑑依王一居為道士一居命索債浙東乃從師受學債無所問市書數篋而歸一居奇之使卒濡業正統戊辰及第授編修纍遷祭酒平生無聲色之好精於鑑古多藏法書名畫王穆字仲逺長洲人博識古今吳中稱為宿學嘗築東郭草堂讀書其中王璲為之記子肄字敏道從陳繼學正統中以賢良舉為安吉縣丞劉昌字欽謨吳縣人讀書過目成誦正統甲子舉南闈第一乙丑㑹試第二纍官廣東左參政為文典雅詩尤溫麗有中州文表等書子嘉䋭字協中風儀如玉數歲據小兒習書選古詩儼如成人十五喪父盡讀其遺書年二十四而卒鄭文康字時乂崑山人登正統戊辰進士以父母繼喪遂不仕居家枕藉經史尚友古人操觚頃刻千言稿成輒為人持去其存者有平橋集十八卷多記載時事有益勸懲而文尤簡質有法度張淮字豫原吳縣人棄舉子業好攻詩嘗於廣坐中賦牡丹詩一百首依元僧眀本梅花詩韵衆以為神嗜酒落魄一夕醉死同邑有陳體方者每為詩文必酒酣以往才始縱發嘗數篇並奏或口授人書書者腕脫不給子韶字太和亦嗜酒工詩語妙一時陳頎字永之長洲人景泰庚午舉人以陽武縣訓導歸博學工古文清修介特人莫敢犯李應貞字貞伯長洲人景泰癸酉舉人選中書舍人厯南太僕少卿好古博學篆楷俱入格桑瑾字廷璋弟瑜字廷瓚常熟人兄弟自為師友瑾景泰丙子瑜天順己卯先後領鄉薦同謁選瑾判處州瑜判溫州同日拜命出都在任俱有政績初仕時兄弟相約早乞休後竟同時致仕還里一時以為美談瑾以䘵不逮養終身不御甘美詩文醇質著讀易備忘瑜有吟忩選粹等書同時邑中兄弟競爽者有錢寬字理容錢洪字理平博學修行詩並載湖海耆英集沈鐘字仲律長洲人天順庚辰進士終山東提學副使與章懋羅倫友善時稱十君子好賦詩多至萬餘首徐震字德重吳縣人家世好文與其父章日相劘切學益進嘗同晏鐸蘇平倡和在景泰十才子之列沈愚字通理崑山人父方清修好學積書數千卷皆親㸃校愚博涉百氏以詩名吳下與劉溥諸人稱十才子善行草曉音律詩餘樂府傳播人口弟魯字誠學専攻古學為文閎博一時稱作者莫旦字景周吳江人成化乙酉舉人卒業太學作一統賢關二賦名動京師謝晉字孔昭吳縣人能詩工山水嘗自戲為謝叠山吳寬贈詩有風流前輩杳難攀謔語空傳謝叠山之句趙寬字栗夫吳江人成化辛丑㑹試第一出吳寬之門開榜日頗以吳士為嫌主司召試詩賦下筆數千言葩藻奪目論者乃服官終廣東按察使文林字宗儒長洲人成化壬辰進士父洪字公大成化乙酉舉人官淶水教諭林知永嘉縣升南太僕寺丞出為溫州知府居官廉平所至見思好交遊為詩文眀暢不蹈襲與楊循吉李應貞沈周善而其子徴眀尤有名桑悅字民懌常熟人生有異質讀書一過輒能默記年十九舉成化乙酉鄉試再試禮部竒其文以䇿論語竒肆置乙榜選泰和訓導考滿謁吏部尚書王恕惜其久滯為遷長沙通判改栁州頃之移疾歸悅拓落自負與世齟齬文詞瑰麗汗漫後頗厭華繪趨平易春秋周禮皆有傳解凡六十餘卷黃雲字應龍崑山人家貧力學嘗就藏書家借録卷帙甫畢心口了然凡刑名錢榖水利算數軍旅儀注無不究心文宗蘇軾書法黃庭堅𢎞治中以歲貢授瑞州訓導庭謁監司恥之外艱歸絶意仕進戴冠字章甫長洲人生而穎異篤學過人其學自經史諸子百家山經地志隂陽厯律與夫稗官小說莫不貫綜議論髙逺務出人意表詩尤清麗文亦俊朗以貢授紹興訓導陳䝉字允德常熟人好攻詩涵音揉律務底和平一走筆連數十篇泉決雲湧名動一時沈周志其墓楊循吉字君謙吳縣人成化甲辰進士除禮部主事好讀書每當得意處則手足踔掉不能禁人呼為顛主事年未三十即致仕結廬支硎山下課讀經史以松枝為籌不精熟不止武宗南巡召見命賦打虎曲稱㫖每扈從輒在御前承㫖循吉恥與優伶雜處請急歸自定其詩文為松籌堂集㑹粹諸類書曰奚囊手鏡最為該博盧儒字為已常熟人充􅜶子博學能文善筆札文學韓栁書法歐顔自負甚髙以薦授中書舍人嘗被命作雪賦諸臣未就儒立成以進詞林皆嘆服都穆字元敬吳縣人七歲能詩杜門篤學𢎞治己未進士仕至太僕卿嘗奉使至秦中訪其靈勝形勢故宫遺壤作西使記搜金石遺文作金薤琳琅歸老之日齊居蕭然日事讎討或至乏食輒笑曰天壤間當不令都生餓死晏如也錢仁夫字士宏常熟人少學於陳九疇聞性理之學舉𢎞治己未進士官禮部員外郎劉瑾方用事即引疾歸天性孝友為族人置義莊工書畫與沈周輩倡和吳中稱風流丈翰者必推焉祝允眀字希哲長洲人參政皓之孫五歲作徑尺字九歲能詩及長超穎過人讀書過目成誦巨細精粗咸貯腹笥有觸斯應吐詞命意逈絶俗界效齊梁月露之體髙者凌徐庾下亦不失皮陸玩世自放書學自急就以逮虞趙罔不得其結構𢎞治壬子舉於鄉除興寧知縣稍遷通判應天府自免歸子續舉進士官終布政使文徴明初名璧以字行更字徴仲長洲人父溫州守林有名德與吳寬李應貞沈周為執友徴明受文法於吳受書法於李受畫法於沈又與徐貞卿祝允眀唐寅切劘為詩文為人孝友溫恭修長者之行嘉靖初以貢入京用薦授翰林院待詔三載謝病歸以清名長德主吳中風雅之盟者三十餘年後生晚進逰其門者皆得其造就年九十猶能蠅頭細書方為人書墓志缺伸閣筆而逝唐寅字子畏吳縣人中𢎞治戊午鄉試第一坐同舍舉子事發為吏不就築圃桃花塢遊息其中其學務研窮造化尋究律厯旁及風烏壬遁太乙出入天人之間其於應世詩文不甚措意曰後世知我不在此竒趣時發或寄於畫下筆直追唐宋名匠雖遭放廢坐客常滿文章風采照耀江表寧籓以厚幣聘甫至即佯狂以歸同邑張靈字夢晉善圖畫文思便敏佻達自恣祝允眀愛其才令受業門下與寅交最善蔡羽字九逵吳縣人其學邃於易以太學生赴選尚書見其名曰此吾少日所聞易蔡生耶奏授翰林院孔目為文法秦漢洞庭諸記欲與栁宗元爭長詩沉著竒麗人比之李賀朱存理字性甫長洲人少從杜瓊逰汲古不倦聞人有異書必欲訪求手自鈔録其所纂輯有鐵網珊瑚等書元季明初中吳南園何氏笠澤虞氏廬山陳氏書籍金石之富甲於海內繼其後者則存理與朱凱其尤也時稱兩朱先生王渙字渙文長洲人正德己卯舉人官嘉興府通判博綜羣書善為古賦詩宗白樂天晚效范陸少與文徴眀齊名吳中祀神必祝云生子當如陸南王渙文徴眀南亦與渙同舉於鄉黃魯曾字得之吳縣人正德丙子舉人為文閎衍好奇縱詭詩多散佚弟省曾美風姿攻古文詞最為博洽嘉靖辛卯魁鄉薦試禮部不第學於王守仁湛若水之門詩宗李夢陽省曽拙於書命子姬水學書於祝允眀遂傳其筆法朱凱字堯民長洲人與朱存理齊名日挾策呻吟求昔人理言遺事而識之對客舉似如引繩貫珠纚纚不能休吳中故實往往藉以考焉正德中卒遺書散軼集亦不傳僅有句曲紀遊詩一卷湯珍字子重長洲人嘉靖間以貢官崇德縣丞詩文名一時文嘉文彭彭年咸出其門陸師道字子傳長洲人嘉靖戊戌進士官儀制主事告歸侍養年未三十也杜門却掃二十五年嘉靖末用薦起纍官尚寶司卿師道自儀部歸已負重名慕文徵眀北面稱弟子手鈔典籍積數千卷丹鉛儼然善詩工小楷古𨽻傍曉繪事人謂徴眀四絶不減趙孟俯而師道亦復似徴眀云陳道復名淳以字行長洲人少師文徴眀天才秀發善畫尤好寫生一花半葉淡墨欹斜非畫工可及詩取適意子栝畫亦放浪不俗周天球字公瑕長洲人為諸生從文徴眀遊篤志古學善大小篆𨽻行草徴眀後豐碑大碣皆出天球手隆慶中遊京師宴集倡酬之作一時詞客皆為讓坐錢穀字叔寶吳人少孤貧家無典籍遊文徴明之門日取架上書讀之以其餘能習繪事得沈周法晚葺故廬讀書其中日夕校勘至老不衰手録古文金石書數千卷錢同愛字孔周長洲人邑諸生為文竒崛深奧讀之不能句然思元語麗自足成家尺牘尤佳同邑劉鳳字子威嘉靖庚戌進士纍官河南僉事著古文數十萬言觀者驚其繁富憚其奧僻蓋皆振竒之士云彭年字孔嘉長洲人長身玉立少磊落嗜讀書書法宗歐顔遊文徵眀之門家徒壁立所交多賢豪長者不肯一言干乞文彭字夀承弟嘉字休承長洲人待詔徴眀子彭詩宗陶謝李白字法鍾王懷素尤精篆𨽻又善篆印逼真漢人以歲貢屢官教職終國子監博士嘉書畫皆超詣能傳其家法貢入太學選吉水訓導遷和州學正歸嘉孫從簡字彥可善書畫端方有品歲薦未選卒皇甫沖字子浚弟涍字子安汸字子循濓字子約長洲人𢎞治癸丑進士順慶知府録之子也沖嘉靖戊子舉人博綜羣籍留心世務口好劇談所撰緒言及申法等書凡數十萬言皆不傳涍中嘉靖壬辰進士除工部主事以才望改春坊遭忌左遷纍官浙江按察僉事其詩特工五言汸嘉靖己丑進士纍官雲南按察僉事其詩追溯魏晉含咀六朝旁搜李唐自成一家濓嘉靖甲辰進士除工部主事遷興化府同知詩意元詞雅律細調清長於造景務在幽絶四甫之詩聲調倣佛相似吳中風雅於斯為盛王寵字履吉吳縣人與兄守字履約並從蔡羽學棲林屋三年既而讀書石湖之上二十年手寫經書皆一再過文徴眀長寵二十四歲折輩行與定交尤工書妙得晉法自號雅宜山人守舉嘉靖丙戌進士官至右副都御史總理河道未久卒張鳳翼字伯起長洲人與弟獻翼燕翼並有才名吳人語曰前有四皇後有三張鳯翼嘉靖甲子舉人獻翼字幼于刻意為歌詩好易十年中箋注凡三易於是三張之名獻翼尤籍甚燕翼字叔貽亦有文名與鳯翼同舉於鄉早卒鄭若庸字中伯崑山人以詩名吳下趙康王聞其名走幣聘入鄴與謝榛客王父子間與交賓主之禮為王著書採掇古文竒字纍千卷名曰類雋潘一桂字無隱吳江人少負才名南陽王好詞賦厚幣聘之居一月謝不能曳裾王門稱疾歸詩多𢎞麗章美中字道華常熟人九歲能屬文嘉靖丁未進士仕至廣西副使子士雅萬厯己丑進士歷官工部郎中父子皆能詩曾孫在兹字素文有文名以歲貢考授知縣未仕卒沈啓字子由吳江人嘉靖戊戌進士官至湖廣副使精眀英斷所至有聲生平博學閎覽遍窺諸經子史尤邃於易著書甚多其吳江水利考言水道最為詳核盧襄字師東吳縣人嘉靖癸未進士歷兵部職方郎中善廉事有所審畫必中機宜性喜學每得異書輒手自繕録既仕益勤雖簿領叢沓不廢占畢為文敷腴眀暢詩尤精詣袁袠字永之吳縣人嘉靖丙戌進士選庶吉士忤張孚敬改兵部主事兵部火謫戍湖州㑹赦歸薦歷廣西提學僉事袠七歲能詩博習典故著皇眀獻實等書與兄表褧褒從兄弟衮裘皆以文行知名吳中稱袁氏六俊王懋眀字僅初長洲人讀書經目輒誦裒集舊聞多所撰述人稱為經笥僑居錫山華察贈詩有多間時起豫之句潘德元字鄰玉崑山人嘉靖甲午舉人官應天府治中能詩兼工書翰為歸有光所稱徐繗字紹卿吳縣人居洞庭山父早殁其母蔡依弟羽以居繗受學焉詩文皆得其指授與皇甫汸黃省曾兄弟互相摩切經營用思愈老愈深姜元字元仲吳江人少博學嗜酒不就博士弟子試晚善黃魯曾徐繗徐詩華美姜務雅淡極意陶鍊一時人謂為詩家逸民吳子孝字純叔長洲人一鵬子嘉靖己丑進士由翰林歷官湖廣參議議論秀發為文章𢎞衍浩博嘗病宋史繁蕪欲加刪潤稿未就而卒王稚登字伯穀吳縣人十歲為詩長而駿發雕香刻翠名滿吳㑹間嘉靖中逰大學士袁煒之門賦瓶中紫牡丹有色借相公袍上紫香分太極殿中烟之句一時紙貴吳門自文徴眀殁後稚登振華啓秀擅詞翰之席者三十餘年奬引寒素敦篤故舊有古人風義張元凱字左虞吳縣人以世辨管蘇州衛事折節讀書寄於詩酒以自放善王世貞兄弟世貞序其詩以沈慶之曹景宗為比俞安期字羡長吳江人慷慨尚氣節盱衡抵掌意興勃如嘗以長律一百五十韻投贈王世貞世貞為之傾倒孫樓字子虛常熟人工古文詞乞文者滿户對客口授侍史令書書者恆不給中嘉靖丙午鄉試選湖州推官乞歸杜門校訂藏書萬卷邵圭潔字伯如常熟人工制舉業尤工䇿論古文詞嘉靖己酉舉於鄉五上公車不第選德清教諭卒為人篤行留心經濟錢有威字惟重常熟人嘉靖庚戌進士歷官刑部郎中忤時相左遷廣州判歸肆力為文詞著廣州集王執禮字子敬崑山人嘉靖乙丑進士終應天府丞居官以仁眀稱少孤事母極孝篤志力學從歸有光授經旁通諸史百家有光謂可與評論古今者獨執禮一人瞿景淳字師道常熟人嘉靖甲辰㑹試第一殿試第二歷官禮部侍郎有大度能容物而遇事確不可奪與嚴嵩陸炳慷慨爭事力持大體於書無所不窺尤好左傳攻制科業與王鏊齊名學者宗之稱昆湖先生吳中英字純甫崑山人生而竒穎好讀書守父書千卷考論質辨多先儒所未發性孝友善事繼母弟産中落歲有常給嘉靖辛卯舉鄉榜年且老矣營城東地藝橘千株鬻以自給閉户不與世往還令男女環侍誦詩而已書法遒徑類其為人歸有光方八歲見其葬枯骨文即與定交曰班馬之才也張鴻字子賓崑山人居新洋江口讀書無晝夜家貧與兄並耕隴上兄為里長每催科受榜掠鴻輒詣縣代縣令怪其意氣方受杖輒止曰而何人者鴻曰里長實書生也試之文立就慰而免之與田者負荷雜行間過其友吳中英歸有光家便弛擔入談往復掊擊既畢仍擔而去沈立字道立吳江人嘉靖甲子鄉試第一戊辰成進士厯官檢討少逰唐順之之門得其指授所為古文兼歐陽修蘇軾體法顧夢川字禹祥崑山人侍御潛之子性磊落好讀書父遺書萬卷夢川取大白置兩楹間客至則沃之抽架上書相與揚攉古今考訂訛謬焚膏繼晷不少倦晚棲心元理寄興淡泊子二人終身不異財以孝友聞魏學禮字季朗吳縣人篤學强識其詩有云萬里彤雲江雁後千家玉笛隴梅前王世貞見而嘆曰騷壇上何可無此君張文柱字仲立崑山人年十二賦關山月詩一座嘆賞萬厯戊子舉於鄉終臨清知州孫七政曰仲立髙才燦發託意幽元如氷壺秋月宜著烟霞之外徐漢稚字榖梁常熟人擅詩名嘗在松江莫是龍座賦詩客皆傾倒同邑李茀字永錫孫柚字遂初俱積學工詩為名流所重又有陸昞者少從文徴眀逰書畫得其遺意亦能詩吳默字因之吳江人文學為時所推重尤工制舉義萬歷壬辰㑹試第一歷官太僕寺卿立朝最淺遷除皆不赴時論髙之顧天埈字升伯崑山人萬厯壬辰進士授編修掌記注管理制敕從容敏辦以左諭德致仕天埈敏秀通理讀書都於無味處得想初與王肯堂為沉博絶麗之文力務獨詣謝歸後門館清寂丹黃卷籍至萬餘詠歌自得味道以老王志堅字淑士崑山人萬厯庚戌進士歷湖廣提學僉事部議為天下學政第一讀書最有條理先經次史次子集參核異同考訂純駁學者宗之同時人題其墓曰文學政事彬彬文質之君子龔埏字季宏崑山人所居僅蔽風雨下帷讀書兼工行草其書每借之人作行草謝之抉奧摘微號稱博雅著書數萬言性挺遂急人之難人尤重其髙義范允臨字長倩吳縣人宋參政仲淹十七世孫萬厯乙未舉進士歷官福建參議先僉事雲南時值鳳克作亂猝圍㑹城允臨登陴百端防禦城藉以完致仕後討論泉石流連觴詠臨池尤得晉人法逺近爭購之自仲淹置贍族義田三十頃至明季僅存三之一允臨復以腴田十頃佐其入人稱其善繼云俞允文字仲蔚崑山人十五為馬鞍山賦援據該博長老皆推遜之年未及強謝去諸生讀書汲古才名日盛工於臨池正書規橅歐陽行筆出入米芾與王世貞交最善列諸廣五子之首都穆曰崑山有三絶允文詩歸有光文張鴻舉業也沈本初字大中崑山人杜門耽詩有韋孟風小楷倣顔真卿時稱二絶張廷臣崑山人覃精詞苑王世貞極稱之早卒子士瀹孤貧困瘁去之留都折節讀書每一篇出輒為人傳誦張應武字茂仁崑山人從歸有光遊上窮六經下鈎諸史抵掌論古今人物山川四塞兵農戰守之事皆若身在其間以三吳水利不修時乘小艇出沒太湖吳淞間著論三篇為掌故家所稱薛學閔字君叔崑山人工文善書與俞允文梁辰魚切劘晚益工王世貞謂讀之如逰輞川清月映郭淪漣上下同時夏暐字士琰王庚字于載俱以詩文名有城南倡和稿孫七政字齊之常熟人淹通五經由諸生入太學與四方名士酬和篇什名稱日起王世貞汪道昆皆折輩行與交性任俠喜結客尊酒論文座中常滿而生産日挫延名宿顧憲成課諸子敦重孝友不茍取豫苦吟羸瘦卒宋奎光字培岩常熟人萬厯壬子舉人能詩古文詞工書法謁選龍川知縣調浙江寧海縣為方孝儒立祠以表忠節歸田後家益貧賦詩不輟年八十七卒俞琬綸字君宣長洲人萬厯癸丑進士任西安知縣風流文采掩映一時性簡傲不樂仕宦嘗與友書云擢翼梯髙之志胸中絶無捱過一兩年稍免堂下侏儒即尋故邱籉笠矣書法秀挺人尤寶愛陳元素字古白長洲人通經史兼善臨池出入歐虞顔米間片緘尺牘人爭寶之間畫蘭得趙孟俯法修身如玉不妄交遊學者私諡曰貞文先生陳瓚字叔祼以字行長洲人熟精離騷文選有詩名工山水一水一石俱得古人意著有嫗解集顧雲鴻字朗仲常熟人起家孤貧讀書修行以忠孝名節為己任中萬厯庚子鄉試退而卜築虞山之藤溪研精六籍一句一義少有抵牾穿穴古今訓故疏通證明而後已為古文詞筆力雄健頡頏古人邵濓字茂齊常熟人治毛氏詩善談名理學者宗之纍舉不中小築於北城之麓信筆為歌詩傲兀可喜顧大韶字仲恭常熟人學識淹洽尤研極詩經三禮論說多人所未發或勸著書大韶曰春秋以前作者之事備矣雖聖人但述而不作宋元以來述者之事備矣雖志士但當誦而不述著有秉燭齊隨筆徐桂字茂吳長洲人萬歷丁丑進士除袁州府推官恃才自放坐計吏免歸以詩名吳越間尤工詠物艷體之作王叔承字承父吳江人少孤以好古謝去博士弟子業為詩豪宕莽蒼為王世貞兄弟所推聞趙王賢而好客乃之鄴及知客見王必長跪稱主臣弗屑也遂北入燕訪燕市酒人遺跡悲歌縱酒又之塞上歸來縱逰吳越閩楚名山水所至皆編成詩卷張大復字元長崑山人少英邁絶倫父維翰授以經史漢魏唐宋諸家故學有原本文日竒名日起父殁哀毁兩目喪眀猶成筆談梅花草堂諸集王煥如字仲玉崑山人有經世略凡先代典故兵農禮樂無不瞭如指掌攻古文詞搜覽考訂準以體要所著有吳中水利等書瞿純仁字元初常熟人孝子嗣興後與顧雲鴻邵濓輩讀書詠歌為文鮮妍妙麗終不得志以殁時王宇春字季和讀書纘言勇於為人嘗冒暑急顧大章之難傷暍道卒何允泓字季穆年十四五即為詩古文長而自唐宋以來經世大典如杜鄭馬邱四氏書窮極指要好談三吳水利訪問三江古道及夏周疏濬遺跡窮鄉沮洳扁舟往返自負甚髙人鮮當其意陳仁錫字眀卿長洲人父允堅萬厯乙未進士除諸暨知縣邑田沃瘠迥殊而起科均則允堅履畝丈量髙下其額民困以蘇卒於官仁錫哀毁骨立贈賻一無所受天啓壬戌殿試第三人入翰林每進講多所規正㑹魏璫給鐵劵欲仁錫作誥詞堅不屬草削籍歸崇禎初起原官終南京國子祭酒好古博洽著書甚富卒諡文莊子濟生名最著孫元凱字若士崑山人與太倉顧夢麟常熟楊彝並以諸生持文柄為詩學昌黎古文詞嚴峭近栁州天性髙介史可法開禮賢館聘主其事其題豫職辭弗受讀書賦詩以終周永年字安期吳江人少負才名制義詩文倚待立就所著詩纍萬首信筆匠心不以劌鉥為能事葉紹袁字仲韶吳江人天啓乙丑進士除武學教授遷工部主事明亡剃髮為僧感愴成疾卒詩詞韶秀忠君愛國間出香奩有韓偓之遺風焉子燮字星期以嘉興籍中康熙庚戌進士選寶應知縣好學有文著已畦集馮復京字嗣宗常熟人強學廣記少業詩鈎貫箋疏著六家詩名物疏謂冠婚喪祭不當抗家禮於㑹典之上作遵制家禮晚見明實録謂通紀詳而野吾學裁而疏史料炫博妄而繆憲章典則白檜無譏作眀右史略未就而卒馮夢龍字猶龍吳縣人才情跌蕩詩文麗藻尤工經學所著春秋指月衡庫二書為舉業家所宗崇禎時貢選夀寧知縣葛一龍字震父吳縣人以資列選人范景文典銓識其名曰是吳下詩人葛髯者也除雲南理問無何謝歸為詩刋落剪刻法蔡羽清綺之體鄭敷教字士敬長洲人光宙子崇禎庚午舉人湛深經術天啓間吳中倡為文社敷教與楊廷樞張溥陳子龍為一時眉目詩學杜甫書法在蘇米間徜徉山水以終顧凝逺字青霞長洲人通政使九思孫好尚風雅居北郭之花溪亭館蕭閒愛蓄商周秦漢法物畫師董巨間出入於荆關一時名士多與為雲霞之交朱隗字雲子長洲人治博士業雅尚風藻天啓中吳中復社聚四方績學之士分主五經隗驅馳江表為一時㕑顧詩宗中晚弟陵字望子亦能詩畫許元溥字孟宏長洲人父自昌中書舍人構梅花墅聚書連屋元溥日出其書遍觀之於經義罔不淹通尤邃於易喜購書自號千卷生崇禎庚午舉於鄉不仕卒從子虬字竹隱順治戊戌進士授思州府推官再遷永州知府其制義文稿家絃户誦所著有周易注解等書毛晉字子晉常熟人好古博覽構汲古閣藏書數萬卷開雕經史百家及祕本鈔傳之書使古今典籍不致盡散亡銷蝕者晉實有力焉所著有明詩紀事等書國朝潘柳章字聖木吳江人隱居力學綜貫百家尤精於史裁同邑吳炎字赤溟才學與柳章相埒吳䎖字扶九吳江人貢生博學工文倡復社一時羣彥咸來㑹以文行相砥礪弟字羽三順治乙未進士歷知澄邁豐城漢川三縣有古循吏風子祖修字慎思克世家學尤長於詩豪邁能自成家以諸生終孫永祚字子長常熟人貫穿經史工詩古文崇禎乙亥拔貢當受推官待次歸里闖賊變後隱於山中順治中當事敦薦不起教授生徒每言文章事業不從五倫中出者總為無本之學所著有雪屋集馮班字定逺常熟人復京子為詩沉酣六代出入溫李之間其論詩自三百篇以下一一尋其脉絡區其畛域葉襄字聖野長洲人鋭志經籍為名諸生甲申後棄去專攻詩律一以唐人為宗尤工儷語有六朝風致同邑黃始字靜御亦工詩善駢體汪琬字苕文長洲人順治乙未進士為户部主事康熙己未舉博學宏詞授編修峻立標望不諧於俗在史館兩月撰史稿七十五篇杜門一年稱疾乞歸讀書堯峯益以文章為己任論者謂歸有光之後一人而已沈世奕字韓倬吳縣人順治乙未進士官翰林請假歸杜門讀書賞識尚書韓菼於未遇時人服其精鑒子旭初字寅生康熙丙辰進士官編修朝初字洪生康熙己未進士官侍讀並工詩文朝初子曾純字天維康熙庚辰進士選義烏知縣有善政尤侗字展成長洲人博物洽聞馳聲藝苑以恩貢為永平推官鋤強扶弱緣事罷歸家居二十餘年才望益著康熙己未舉博學宏詞授檢討纂修明史未幾乞歸優遊林壑復二十餘年登大耋子珍字謹庸康熙壬戌進士亦官翰林世其家學宋實穎字既庭長洲人順治辛卯舉人興化教諭淹貫經史博綜旁搜詩文典雅騷壇推為名宿侍講繆彤少而執經其學得於實穎者為多錢陸燦字湘靈常熟人順治丁酉以第二名舉於鄉詩歌骨力雄厚古文磊落自喜晚與王日藻秦松齡尤侗徐乾學輩為耆年㑹諸人皆兄事之年幾九十猶馳騁文筆間不少衰吳兆騫字漢槎吳江人童時作膽賦纍千餘言長繼復社主盟名動一時順治丁酉領鄉薦被斥徙尚陽堡二十餘年作長白山賦名益逺著宋德宜捐金贖之得歸同榜孫暘字赤崖常熟人文社名與兆騫相埒亦同謫戍同時放還孫承恩原名曙字扶桑常熟人為諸生負才標望文工六朝詩學溫李順治戊戌殿試第一授修撰數被顧問從幸南海子賜騎御間名馬適大風揚沙中寒疾卒賜金歸葬錢中諧字宫聲吳縣人順治戊戌進士康熙己未舉博學宏詞授編修詩文雄贍條議三吳水利開濬劉河民利賴焉范必英字秀實允臨子順治丁酉舉人康熙己未舉博學宏詞授檢討纂修明史謝病歸儲書萬卷日誦讀其間凡古今經世大典以及詩文源流髙下歷歷能指數詩古文詞綺麗雅馴晚喜汲後進從逰多名雋之士吳縣金沈劼字以時長洲汪嗣文字山文並拔貢生其尤著者顧有孝字茂倫吳江人以詩名於時嘗甄綜百家之詩開雕分授盛行於時吳愈字敬生長洲人生而端慤言規行矩授徒數十輩日披閲數百牘不少倦每當省㑹試索閲闈牘决其雋否不爽毫黍而愈獨屢蹶僅以歲貢授溧水訓導年八十卒門人私諡曰端仁先生計東字甫草吳江人順治丁酉舉人為人慷慨磊落嘗以唐馬周宋陳亮自比與汪琬講歐曾之學過中州與湯斌講程朱之學故其文醇雅有矩矱家貧奔走四方所至設几禮之葉方藹字子吉崑山人父重華字德元明崇禎戊辰進士歷官太常少卿有才望方藹順治己亥殿試第三授編修屢被顧問康熙癸丑賜宴瀛臺撰八針以獻聖祖善之命撰太極圖說賜貂裘文綺纍遷刑部侍郎卒官賜金營葬諡文敏徐與喬字揚貢崑山人順治辛丑進士絶意仕宦博涉多識分經史子集為四部採擇評注名曰辨體學者稱之繆彤字歌起吳縣人康熙丁未殿試第一授修撰升侍講以艱歸淡於宦情遂専以課後學為事巡撫湯斌內召奏吳中薦紳以道義自持者彤為首先是彤為庚戌同考官所拔如許自俊郭琇輩皆知名於世徐乾學字原一崑山人八嵗能文為顧錫疇所知十三通五經康熙庚戌殿試第三人授編修壬子主順天鄉試所拔皆夙學文體一變纍遷左都御史刑部尚書罷歸乾學以文章受知試平蜀頌瀛臺賦經史賦乾清宫讀書記班馬異同辨皆第一直南書房凡有叩問應答如響及歸詔攜一統志宋元通鑑即家開局編輯尋奉召復官而乾學已卒生平敦兄弟之好急友朋之難尤勤於造進人物海內有太邱道廣之目韓菼字元少長洲人所為經義力振庸靡康熙癸丑㑹試第一對策力言三藩當撤以第一人及第授修撰纍遷內閣學士謝病里居㸃勘六經漢唐宋箋詁義疏靡不采獲而裁其中史稱班馬陳夀文宗唐宋六家詩尚唐音將著書以老閲八年起原官晉掌翰林學士禮部尚書遇廷議持論侃侃不阿在部多所建白卒於位長子孝嗣字祖語康熙庚辰進士經義能世其家學徐秉義字彥和崑山人乾學弟生而嶷重攻舉子業務闡發經傳微㫖康熙癸丑㑹試第二殿試第三授編修乙卯典試浙江一時知名士幾盡歷升詹事試萬夀無疆賦為第一壬午典順天鄉試得士如浙闈遷內閣學士聖祖南巡書恭謹老成四字以賜之翁叔元字寶林常熟人庚熙丙辰殿試第三人授編修文望甚著戊午主山東鄉試得士皆名雋歷官祭酒纍遷刑部尚書致仕潘耒字次耕吳江人以布衣舉博學宏詞官檢討纂修明史以母憂歸不復出耒幼有聖童之目試以厯日首尾不遺一字兄柳章有史才耒承受家學復從顧炎武徐枋戴笠逰故其學貫穿淹洽無所不通旁及厯術算數宗乘道藏悉有神㑹徐釚字電發吳江人以布衣舉博學宏詞授檢討纂修明史尋乞歸所著詩文膾炙藝苑少刻菊莊樂府朝鮮貢使仇元吉見之以金餅購去貽詩云中朝擕得菊莊詞讀罷煙霞照海湄北宋風流何處是一聲鐵笛起相思黃儀字子鴻常熟人精輿地之學凡郡邑建置沿革山川險易畫圖著說縷析條分徐乾學修一統志多用其說蔡方炳字九霞崑山人懋德子性嗜學涉獵羣書兼工篆草兄方熺字涵之痛父殉闖賊之難絶意人事隱居以老雖屢空不肯干人卒日貧無以殮彭寧求字文洽長洲人祖行先字務敏明末拔貢生當授知縣隱居不出內行完潔雅善書法寧求幼孤事母孝其祖課之益邃於學康熙壬戌以第三人及第授編修歷中允恬淡無競工古文詞書法遒媚分纂殿閣諸書以勞卒官蘇翔鳳字苞九常熟人父祖䕃順治壬辰進士官户部主事以廉幹稱翔鳳積學嗜古收名早而遇合遲康熙壬戌登進士知沂水縣半月而卒同里曽倬字漢瞻康熙己卯舉人文行兼粹孫嶽頒字雲韶吳縣人康熙壬戌進士選庶吉士改編修歷官禮部侍郎管國子監祭酒為諸生時母病割股和藥入翰林以能詩善書受知聖祖常召入內殿賜坐論古今書法每有御製碑版必命書之居官廉謹進位司成故鄉尚無一椽以居聖祖特命賜第一區并賜買田銀一千兩里黨榮之年七十奉㫖校勘二十一史卒官陸肯堂字邃升長洲人才氣磊落康熙乙丑㑹試殿試皆第一國朝之連擢㑹狀者韓菼彭定求肯堂及定求之孫啓豐皆吳産也咸稱科名盛事云肯堂由修撰升侍讀卒官金居敬字榖似長洲人少負才名邃於經史八大家為文取法歸有光屢躓場屋康熙乙丑成進士年已暮矣知靈邱縣人吏浹和未幾卒官吳中以文學成名進士而仕宦不顯者順治壬辰則有陸夀名字處實終寧國教授辛丑則有蔣埴字曠生終樂清知縣康熙甲辰則有周邦鼎字璧侯終郯城知縣丁未則有趙炳字明逺庚戌則有管父才字麟功陳二酉字泰逸俱未仕丙辰則有顧丁瑮字湘珮終弋陽知縣戊辰則有湯傳渠字子方終清流知縣張尚瑗字宏蘧吳江人康熙戊辰進士選庶吉士改興國知縣自幼英異老益嗜學詩文古雅尤好奬借後進雖才長一藝亦津津樂道之惠周惕字元龍長洲人少從徐枋逰究心經學及詩古文詞汪琬以古文名世少許可雅重周惕康熙辛未成進士入翰林調密雲知縣卒官同時崑山徐昂發字大臨博學工詞翰名與周惕等庚辰進士歷編修何焯字屺瞻長洲人康熙乙丑選貢癸未欽賜舉人進士選庶吉士充武英殿纂修改編修卒贈侍讀學士焯性通敏博覽淹貫長於考訂所論述後學奉為指南汪份字武曹長洲人年十四隨祖希汲任沂州希汲以官逋繫獄份侍側讀書連日夜獄吏竒之為文詞氣雄邁康熙癸未進士授編修弟鈞字右衡壬午舉人士鋐字文升工詩古文兼書法丁丑㑹試第一官至右春坊從弟倓字安公弱冠文名籍甚辛未進士官編修汪繹字玉輪常熟人康熙庚辰殿試第一少年髙科才名籍甚而謙退不矜醖藉多風韻臚傳日馬上口占云歸計豈謀千頃竹浮生只辦十年官旋豫告歸乙酉奉命校唐詩於揚州尋卒蓋口占遂為詩讖云吳廷貞字山掄長洲人夙慧工文康熙丙子舉順天鄉試以寄籍詿誤己卯聖祖南巡廷貞獻迎鑾詩得復還舉人奉旨召入南薰殿癸未成進士選庶吉士厯左春坊諭德纂修佩文韻府月令輯要兼教習進士以勞卒官張大受字日容嘉定籍長洲人父慶孫字曾餘順治甲午舉人廬於匠門溪上聚徒說經學者稱履素先生大受弱冠即能文韓菼極稱之康熙庚午鄉薦闈牘為天下傳誦喜汲後進四方造門講藝者無虛日己丑成進士官檢討視學貴州上亷其清勤特令再任以疾卒官同里杜定京字世求康熙己卯舉人郭豐貽字子升廩貢生文筆韶秀皆為菼所稱定京逰菼門豐貽大受弟子也顧嗣立字俠君長洲人考功郎子咸子康熙己卯順天舉人壬辰欽賜進士選庶吉士改中書以疾歸嗣立博學有才名尤工詩所居秀野草堂常集四方知名士觴詠無虛日輕財好義家以日貧而風流文雅照映一時所選詩集皆盛行於世吳士玉字荆山為諸生即以文名四方康熙丙戌進士入翰林升侍講督順天學政癸卯主江西鄉試纍官至禮部尚書卒詩宗韓蘇所著有吷劍集劉石齡字介于長洲人孝子龍光子也七歲即能誦三都兩京諸賦及長篤嗜古學以能詩名尤工五言韓菼陳元龍欲薦之朝力辭以布衣終王世琛字寶傳長洲人明大學士鏊八世孫父銓字東發康熙庚午副榜纍官禮科給事中敦氣誼重然諾善繪事書法世琛康熙壬辰殿試第一人授修撰歷侍講督山東學政勸實學斥浮僞青齊文體一變纍遷少詹事視學未竣以勞卒官世琛工詩古文兼善書畫得父筆法謝志發字雲翼長洲人父文昌通經術克承家學兼工詩所著有一角山樓詩稿周振業字右序吳江人明御史宗建曾孫以嵗貢中雍正癸卯副榜才髙行潔邃於理學從逰甚盛所得修脯悉以散宗黨之貧者嘗遇故人子於途哀其衣單即解衣豫之忍凍而歸因感疾卒江南通志卷一百六十五欽定四庫全書
