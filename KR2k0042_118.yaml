  text: 江南通志卷一百十九選舉志杜佑有言行教化在乎設職官設職官在乎審官才審官才在乎精選舉選舉之法三代以德行道藝自漢以來多以文藝取之然鄉舉里選之不行因乎風俗明試以功之古制亦先敷奏故唐宋諸人屢議改易卒仍舊格其間得人往往稱盛我朝文教誕敷闢門取士特以闡聖教崇儒學黜浮華敦本實為先所以辨論官才崇興教化之原在此矣首進士天子親策試賜之者也次舉人鄉國所賔貢也次薦辟網羅遺逸昔之制舉今之曠典也而貢監附焉為類三為卷十有九述選舉志第七進士禮王制造士之秀者升諸司馬曰進士先儒謂司馬政官以其可使從政也厯秀士選士俊士造士四級而後得至蓋所以待之重矣其論而升之惟其賢惟其能也自漢為禮官甲科射䇿對䇿經義時議皆試以文辭故隋設進士科唐宋因之熙寧問士各占治經試大義次兼經論䇿又制䇿親試始與前明取進士約略相類本朝因明舊制近復分直省與計偕之數臨期奏請定額於是瀕海邊陬之士駢聯參南省之選而江南之數為尤多也隋大業張損之吳縣人唐貞觀上官儀揚州人來濟揚州人永徽髙智周晉陵人調露馬懷素丹徒人神龍許景先義興人吳少微歙縣人開元王昌齡江寧人許恩江寧人丁仙芝潤州人蔡希周潤州人蔡希寂潤州人儲光羲潤州人陶翰潤州人蕭頴士潤州人張暈潤州人談戭丹陽人申堂構丹徒人程諫休寧人劉太真宣城人張喬南陵人沈郡南陵人天寶歸崇敬吳縣人錢起吳縣人蔣洌義興人蔣渙義興人權臯皇甫曽皇甫冉包佶包何至德顧况吳縣人廣德孫革上元人大厯冷朝陽上元人陳潤吳縣人顧少連吳縣人楊凝吳縣人歸登長洲人陸贄蘇州人奚陟揚州人張維儉當塗人王建潁州人陳商繁昌人建中陳羽上元人于公異吳縣人李鄘揚州人貞元麯信陵吳縣人錢徽吳縣人陸亘吳縣人張貞甫吳縣人張平叔吳縣人沈傳師吳縣人湯賚丹陽人羅立言宣城人張籍和州人元和陸暢吳縣人歸融長洲人施肩吾武進人李紳潤州人權璩潤州人王起江都人王炎江都人王播江都人費冠卿青陽人長慶顧師雍吳縣人太和畢諴吳縣人許渾丹陽人開成陸瓌吳縣人沈樞吳縣人楊假吳縣人歸仁晦長洲人喻鳬義興人㑹昌胡悅句容人項斯江寧人楊嚴吳縣人楊收吳縣人沈詢吳縣人談銖吳縣人顧非熊吳縣人張黯吳縣人趙嘏山陽人盧嗣立秋浦人王鐸江都人王鄂當塗人孟遲青陽人大中楊乘吳縣人畢紹顔吳縣人歸仁翰長洲人蔣伸義興人蔣曙義興人李備南陵人駱用錫南陵人汪遵涇縣人李磎江都人張原祕滁州人許棠涇縣人咸通翁彥樞吳縣人楊昭業吳縣人歸仁紹長洲人歸仁澤長洲人胡學婺源人武瓘秋浦人顧雲秋浦人王季文青陽人周繇建德人崔璐乾符楊涉吳縣人康駢秋浦人廣明錢珝吳縣人楊巨吳縣人中和楊注吳縣人光啓陸扆吳縣人顧在鎔吳縣人大順吳仁璧長洲人汪極歙縣人杜荀鶴石埭人景福歸藹長洲人張路斯潁上人乾寧楊鏻吳縣人伍唐圭秋浦人殷文圭秋浦人光化曹松舒州人天復王希羽歙縣人天祐楊凝式吳縣人崔庸吳縣人歸係長洲人附年分無考者邱為吳縣人李赤吳縣人楊發吳縣人徐世業吳縣人崇頴吳縣人張誠吳縣人陸參吳縣人畢知顔吳縣人顔萱吳縣人鄭璧吳縣人司馬都吳縣人莊布吳縣人張浤吳縣人陸賔虞長洲人歸仁憲長洲人歸修長洲人陸器常熟人狀元李雍江都人王式江都人郭𢎞霸舒州人徐仲源舒州人沈佳期廬州人邢文偉全椒人五代梁蕭立蘭陵人晉周穀潁州人南唐盧郢江寧人狀元舒雅歙縣人吕文仲歙縣人查陶休寧人胡昌翼婺源人邱旭宣城人伍喬貴池人狀元湯悅貴池人湯淨貴池人楊文郁貴池人宋乾德宋維武進人宋絳武進人周絳溧陽人太平興國洪湛上元人張觀武進人張秉歙縣人謝泌歙縣人李含章宣城人馬亮合肥人包令儀合肥人姚鉉合肥人牛冕徐州人雍熙查盛泰州人淩䇿涇縣人端拱龔識蘇州人查拱之泰州人周歸貞泰州人查道如臯人舒雄歙縣人李照歙縣人俞獻可歙縣人楊國華宣城人梅詢宣城人髙惠連宣城人淳化劉少逸長洲人錢昆長洲人丁謂吳縣人淩咸吳縣人謝濤吳縣人陸元圭吳縣人龔緯崑山人葛昭華江陰人周嘉貞泰州人許南史祁門人查拱辰泰州人至道翟驤江都人咸平李諶蘇州人談應蘇州人胡堯佐吳縣人許洞吳縣人鄭為吳縣人龔紀吳縣人龔㑹元崑山人許式常熟人李起武進人丁咸亨武進人盛賁武進人王盤武進人沈緘江陰人葛宫江陰人陳亞江都人陳知微髙郵人周安貞泰州人鄭載吳江人俞獻卿歙縣人吕士元歙縣人聶致堯歙縣人方仲詢歙縣人程賔王歙縣人盛京銅陵人徐起無為人景德張處仁武進人錢治武進人胡晏武進人張收武進人閔惟慶歙縣人洪融歙縣人劉勤涇縣人劉湜涇縣人大中祥符謝絳吳江人唐儼吳縣人范巨吳縣人胡獻卿長洲人范仲淹蘇州人富嚴蘇州人林咸德蘇州人孫嶽嘉定人王簡武進人强弼武進人張鑄武進人李仲偃武進人王樞武進人吳遵路丹徒人韋陡丹徒人邵飾丹陽人顧祥金壇人方溥歙縣人方仲兮歙縣人俞希甫歙縣人聶冠卿歙縣人程琳休寧人胡濟婺源人許俞黟縣人汪昊績溪人盛度銅陵人柯茂先建德人柯光祖建德人柯文虎建德人郭維當塗人陳堯卿髙郵人徐越無為人張昷之滁州人徐象賢全椒人天禧錢象先吳縣人鄭修長洲人吕諤華亭人徐天錫武進人錢尚武進人蔣堂宜興人邵梁宜興人仲簡江都人魏平仲歙縣人汪震婺源人張齊宣城人天聖吳感吳縣人鄭條吳縣人范琪吳縣人葉清臣長洲人元絳長洲人范師道長洲人林茂先長洲人林龔明長洲人鄭戩崑山人陳之武