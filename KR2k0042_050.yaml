body:
  text: 江南通志卷五十一河渠志黃河三國朝順治元年命兵部尚書楊方興治河是年黃河自復故道二年河決考城之劉通口三年劉通口河流北徙自午溝至徐州河涸四年黃河疏通決口工成九年河決邳州水三日遂退附御史楊世學治河事宜疏略今之水勢與前代雖異而實同前代止治河今則兼治淮矣蓋淮為河之下流而濱海諸州縣如鹽城興化泰州劉莊白駒諸鹽場則又淮之下流也各處下有海口上有閘壩河水暴漲多開閘壩使出海口則自無潰決乃前代已行之利臣聞定鼎之初居民因新昌餘孽緣海遁去漸次堵塞繼而行水之處變為墟田土豪衙蠧據為己有此海口所由塞也水東入海鹽船重載逆挽而西致費人力今海口既塞則行船安穩商人便之不樂復開此海口所以終塞也雖有安東廟灣亦可入海而其流不疏則勢不急水行壅溢所以潰決因是而上之則決於開封矣中之則決於髙寶矣間有謀及海口者其中奸人阻撓一曰海潮灌入則民田竈場俱被其害不知海潮原有定時海口之內亦有防閘自有海口以來未聞田不可耕鹽不可煮也一曰水所經行之處城郭廬舍恐被衝漂不知入海之渠深浚之則無泛溢且海口盡開則水勢分散必不至衝漂也一曰沿海多冦須設兵以防不測不知水門啓閉必有專司入海之水其勢甚迅舟難逆行且水中但設敕下河暗樁則舟可斷也伏乞必行將凡有海口之處盡漕重臣親至其地毅然行開浚其漕隄閘口開閉各因其時然後循下流而上至於河身闢其淺隘去其淤沙使河身益深足以容水則河之波不及於陸河之委易達於海河南淮右之民庶幾其有瘳乎十二年大王廟決口塞淮安府志大王廟逼近荆隆口自荆隆口決後下流之河身已經淤澱及大王廟又決下流益淤且自七年至十二年厯五載餘河身日就澱髙祇因彼時河身尚深數丈是以雖有淤沙將河底逐漸澱髙而人不及知也十五年河決山陽之柴溝姚家灣總河朱之錫築塞之十六年總河朱之錫奏河政十事下部覆准奉㫖依議附朱之錫疏略一特議建設栁園黃河悍激湍流勢若奔馬禦險塞決非掃罔功每捲一掃用栁動以千百束計千里長隄歲用栁料數且不資況伏秋河勢陡變掃料在手咄嗟之頃轉危為安可以免塞決之費即萬一有決掃料在手旋決旋塞不致正流日淤旁口日豁可以免塞大決之費故必使生植之數常有餘於採辦之數然後可以源源相繼查前河臣楊方興題請責成印官各於河干按汛栽栁分别多寡照例勸懲俱經部覆奉有㫖臣竊以為尤宜責令黃河經行各州縣印官於瀕河處所各置栁園數區或取之荒地或就近民田量給官價每園安置徭堡夫數名布種澆灌既便責成而道㕔等官可以親詣稽察秋冬驗明行以勸懲之例數年之後遍地成林不但有濟河工而河帑可以少節民力可以少蘇一嚴剔河工弊端臣惟一事立則一弊生河工大矣豈能無弊因去弊之故輒議變法併以誤河如語所云因噎廢食也臣詳加體訪約有數端一曰工程有石工有土工有掃工有樁笆工工力不到法式非宜料物虛浮徒事粉飾此一弊也一曰器具有方船活閘刮版戽斗鐡鏟鐡钁布㨮竹筐鐡舀杏葉杓鐡簸箕五齒鐡扒鐡杵木夯石硪雲梯等項儲備不預徒手莫施製作潦草不堪適用此二弊也皆誤工者也一曰夫役有厰夫堡夫溜夫隄夫泉夫閘夫淺夫鋪夫或食條編或食河銀有募夫食估計河銀尅減工食奸豪包估賣富僉貧賄鬻私逃此三弊也一曰物料有樁木栁稍磚石草柴蘆檾灰鐡糯米桐油等項交修掯索扣減價值折乾肥私盜用官物此四弊也皆誤工而兼以病民者也然有在官在衙蠧地棍之不同在官者宜責司道府㕔互相覺察在衙蠧地棍者責成各屬推官不時開報重者題恭輕者究治庶奸弊可除而河工克濟是則勞民費財中撙節撫恤之一道也按十事今録二條以事不專指江南故不備載康熙元年從總河朱之錫請復河差三年舊例七年築塞桃源縣烟燉決口是年河決桃源之黃家觜塞之復決次年堵塞八年河決清河之三汊口九年河決清河之黃家營二堡盧家渡文華寺至永興集是年總河羅多題准創築自宿遷縣西門吳家墩起至桃源縣大古城縷隄長八千一百五十八丈五尺又創築自桃源縣烟墩舊險工東頭起至駱家營清河縣界縷隄長七千七百四丈八尺又自桃源縣界起東至龍王廟皆因舊隄址加築髙一丈面二尺廣濶六尺長三千三百三十四丈揚州府志自九年後黃運等河并歸仁隄翟家壩白洋河等工俱用正賦濬塞黃河以外分為三大工分司道官總管餘各以佐二督工於是年九月開工皆總河羅多所請也十年八月安東茆良諸决口堵塞淮安府志先是山安一帶小決口甚多而茆良口為大茆良決於康熙四年厯今七載始塞故下流海口流緩沙停而淤澱日久云是年河決桃源之陳家樓即塞之十一年六月二十七日上諭諭工部河道屢年衝決地方被災民生困苦深軫朕懷據差往看視決口侍衛吳丹學士郭廷祚回京繪圖進呈朕觀黃河自宿遷以至清河皆為緊要雖有遙隄恐一層未足捍蔽水勢應否於遙隄之外再築遙隄爾部即行河道總督漕運總督㑹同相視商酌築隄果否有益爾部即遵諭行十二年桃源七里溝決口堵塞十四年河決徐州之潘家堂及宿遷之蔡家樓俱築塞之十五年黃流倒灌洪澤湖決髙堰三十四處黃淮合併東下漕隄多潰詔遣工部尚書冀如錫户部侍即伊桑阿親行相視訪究利病刻期奏報是年桃源新莊決口塞治十六年六月總河尚書靳輔大挑清口爛泥淺引河四道及清口以下至雲梯關河道七月靳輔陳河道修治刻不容遲並經理河工事宜八疏附靳輔河道修治刻不容遲疏略治河之道必當審其全局將河道運道為一體徹首尾而合治之而後可無弊也蓋運道之阻塞率由於河道之變遷而河道之變遷總由向來之議治河者多盡力於漕艘經行之地若於其他決口則以為無關運道而緩視之殊不知黃河之治否繫數省之安危即或無關運道亦斷無聽其衝決而不為修治之理矧決口既多則水勢分而河流緩流緩則沙停沙停則底墊以致河道日壞而運道因之日梗是以原委相關之處斷不容於岐視也今若不察全局之情形事勢而因循故事漫為施工則堵東必西決堵南必北決徒費時日徒糜錢糧而終歸無益豈惟無益將河患日深而莫可救藥矣何也黃河之水從來裹沙而行水大則流急而沙隨水去水小則流緩而沙停水漫沙隨水去則河身日深而百川皆有所歸沙停水漫則河底日髙而旁溢無所底止故黃河之沙全賴各處清水併力助刷始能奔趨歸海而無滯也查今日河患之所以日淺者皆因順治十六年至康熙六七年所衝之歸仁隄古溝翟家壩王家營二鋪邢家口等處各決口不即堵塞之所致也蓋歸仁一堤原以障睢水并永堌邸家白鹿諸湖之水不使侵淮且令由小河口白洋河二處入河助黃刷沙者也自順治十六年歸仁隄衝決之後睢湖諸水悉由決口侵淮不復入黃刷沙以致黃水反從小河口白洋河二處逆灌停沙積漸淤成陸地至康熙六七年間各處水大黃淮并漲黃漲而王家營邢家口二鋪口等處衝潰矣淮漲而古溝翟家壩等處衝潰矣王家營邢家口二鋪口等處衝潰之後黃河之水由決口四漫者多而由雲梯關外入海者少古溝翟壩等處衝潰之後淮河之水由髙寶諸湖直射運河衝決清水潭下淹髙江等七州縣之田者多而赴清口㑹黃入海者少河淮兩水俱從他處分泄不復并力刷沙以致流緩沙停海口積墊日漸淤髙從此由逺至近由外至內河沙無日不停河底無日不墊海口淤而雲梯關亦淤雲梯關淤而清江浦清口并淤矣逮至康熙十五年間各處又復水大黃淮又復并漲清口以下之河身既髙不能奔趨歸海而睢湖諸水又合淮水并力東激以故除古溝翟家壩等原衝九處之外又將髙良澗版工衝決大小二十六處髙家堰石工衝決口大小七處諸水盡由各決口直注運河加衝清水潭三淺等處各決口下淹七州縣之田而涓滴不出清口黃水又乘髙四潰衝決于家岡等處又復灌入爛泥淺將武家墩版工衝決五十丈入故明所開之廢河厯楊家廟㑹合淮水直奔清水潭其武家墩上流刷成大河寬一二百丈不等又分一股入洪澤湖由髙家堰石工決口㑹淮歸并清水潭而於各舊決口之處則又浸淫四漫較之以前勢愈分泄以致下流更淤而河身之髙墊更不可言矣查自清江浦至海口約長三百里向日黃河水面在清江浦石工之下今則石工與地平矣向日河身深二三四丈不等今則深者不過八九尺淺者僅有二三尺矣黃河淤運河亦淤今淮安城堞卑於河底矣運河淤清口與爛泥淺盡淤今洪澤湖底漸成平陸矣尤有堪虞者現在之河身既已墊髙而黃流裹沙之水自西北萬里而來晝夜不息一至徐邳宿桃等處即便緩弱散漫臣目見河沙無日不加積河身無日不加髙若此時不及早大為修治則不特洪澤湖漸成陸地將南而運河東而清江浦以下淤沙日甚行見三面壅遏而黃流無去路矣夫以萬里逺來浩浩滔天之水竟至無路可去則勢必衝突內潰而河南山東二省恐俱有淪胥沉溺之憂彼時雖費千萬金錢亦難以尅期補救臣是以謂今日修治刻不可緩也但既經修治則必使無旋修旋圮之虞更必使有可行可久之道始為有當臣逐細籌酌其間修舉情形有必當師古者有必當酌今者有須分别先後者有須一時並舉者總以因勢利導隨時制宜為主臣謹備采衆論詳加斟酌將應行事宜分為八疏具題第一疏略臣竊見今日治河之最宜先者無過於挑清江浦以下厯雲梯關至海口一帶河身之土以築兩岸之隄也查清江浦以下河身原濶一二里至四五里者今則止寬一二十丈原深二三丈五六丈者今則止深數尺當日之大溜寬河今皆淤成陸地已經十年矣兹欲令黃淮之水盡從此故道入於海必須略開去路導之使行蓋築隄堵絶用水刷沙雖為治河不易之䇿然河身淤土有新久之乾不同三年以內之新淤外雖版土而其中淤泥未衝刷最易五年以前之久淤其間淤泥已乾與版沙結成一塊衝刷甚難故必須設法疏浚也如以治新淤之法治之恐決口盡堵黃淮齊下之際因河身淺窄一時衝刷不開又生他變况用水刷沙即曰不必挑浚而束水歸漕則又必須築隄既築隄矣與其取土於他處何如取土於河身寓浚於築而為一舉兩得之計也今臣擬於河身兩旁近水之處離水三丈下鍬掘土各挑引水河一道掘面濶八丈底濶二丈深一丈二尺以待黃淮之下注蓋黃淮下注之日中央既有一二丈舊河左右又各有八丈新鑿之河其所存兩旁之地雖屬堅土而薄僅三丈一經三面之夾攻順流之衝洗不待多時即可盡行刷去將新舊之河俱合為一矣又兩旁既各挑深一丈二尺則中央河心自可刷至二丈之外河至深二丈寬四十丈便不窄淺從當此日洗日刷日深日寬自可免意外之變而漸復日之舊矣其所浚丈尺計每地一丈掘土六方即以之挑築兩岸之隄底濶七丈面濶三丈髙一丈二尺每丈亦用土六十方查白洋河至雲梯關約長三百三十里清河縣至雲梯關約長二百里以每里一百八十丈科之共約長九萬五千四百四千丈每丈用土六十方共計用土五百七十二萬方其九萬五千四百丈之內有原未有隄者有原有隄而今全無土者有原有隄而今更缺窪須增填者有隄根存土髙一二尺至六七尺不等寬三四尺至一丈五六尺不等者合有無多寡而計之牽約存舊土二方四分通共約存舊土二十二萬八千九百六十方須實增土五百四十九萬五千四十方至於取土之處雖以離水三丈為度然河身有在中央者有折流在南岸及北岸者逺近不齊必須隨地科算總之離隄三十丈之內不許取土其三十丈以外取土者每土一方用夫四工二百四十丈以外取土者用夫五工合逺近而牽算之大約每土一方用夫四工每工照例給銀四分又自雲梯關外以至海口尚有百里之遙除近海二十里潮大土濕之處無容置議外其餘八十里之河身若不挑浚以導之築隄以東之則黃淮合流出關之際河身既窄而淺兩旁又堅而厚大水驟至不能承受歸漕勢必四處漫溢雖關外之路與運道生民無涉然一經漫溢則正河之流必緩流緩則沙必停沙停則底必墊關外之底既墊則關內之底必淤不過數年必復見今日之患矣臣聞治水者必先從下流治起下流疏通則上流自不飽漲故臣又切切以雲梯關外為重而力請一例築隄以絶後患惟是近海之隄止期足以攔水不必過於髙厚隄底止期寬五丈面亦須寬三丈髙止須六尺亦一體照取河心之土築之至於地廣夫多其間恐有偷安茍且情弊必須用畫段丈驗之法以釐之其法容臣預督各監理官量取上之逺近按工畫段每用夫五千工為一段編定字號插牌標識其中有原係平地者有更有缺窪須填者有存舊隄之土多寡不等者并隄段長短丈尺之數逐一書明標識之上仍立簿一本一體登記交各監理官即按各州縣協募人夫多寡之數照工撥給隄段令其如式挑築臣仍親臨工所用部臣冀如錫等條杵議鐡杵杵隙盛水不漏之法不時查驗以别其夯之堅否第二疏略臣請挑浚清江浦而下至海口一帶河身之土以築兩岸之隄乃先治下流以導黃淮歸海之計也然下流雖治上面有淤墊之處不及早疏通則髙家堰等一帶決口盡堵淮水直下之時難免阻滯散漫之虞查洪澤湖下流髙家堰以西至清口約長二十里原係汪洋巨浸為全淮會黃之所自淮流東決黃水逆灌之後將此一帶河身漸漸淤成平陸向之汪洋巨浸者今止存小河一道矣查工部尚書冀如錫等條議內開清河一帶沙淤之處速行挑浚等語然淤沙萬頃挑浚實難臣再四思維惟有倣照挑浚清江浦以下河身之意於小河兩旁離水二十丈之地各挑引水河一道俾其分頭衝洗庶可漸漸刷開至於挑清江浦引水河臣止擬離河身三丈而此處議離河身二十丈者蓋清江浦以下係十年久淤之堅土而此乃三年以內之新淤臣曽帶領夫役掘土試驗浮而一層版土深有二尺下則係淤泥尺許淤泥之下又屬版土版上之下又屬淤泥掘深六尺有竒而尚不能倒當日之湖底且面層版土雖極堅硬而第二層版土因在淤泥之下反潤而鬆故雖離河身二十丈之逺而易於衝刷不久便可合而為一也惟是此處淤沙既易衝刷而臣亦議開引水河者蓋臣目擊面層版土之堅硬恐一時衝刷不開又於他處生變是以不敢不略議導引之策以圖萬全耳其所挑引水河應面寬六丈底寬二丈深五尺每淤地一丈掘土二十方逺傾於引水六十丈之外每方用夫三工每工給銀四分此工一治庶淮河下注之時可以衝闢淤泥徑奔清口會黃刷沙而無阻滯散漫之虞矣按靳輔八疏今録二者第三四五疏陳淮運事宜分載淮水運河條內餘係錢糧官辨不專指江南故不録是月初九日奉㫖河道關係重大這所奏經理河工事宜各本著九卿詹事科道㑹同逐一詳議具奏又奉㫖議政王貝勒大臣九卿詹事科道掌印不掌印各官㑹同詳確議奏廷議酌量修築奉㫖河道關係重大應否緩修並㑹議各本內事情著總河靳輔再行確議具奏附靳輔覆題疏略黃河滔天瀰瀿之水非海無歸然自清口歷清江浦雲梯關以至海口尚有三百三十里之遙其中非得寬深廣大之渠受其來而聽其去安能使之暢流無阻也臣聞順治年間河道未壞之時清江浦以下之河身深二三丈至五六丈不等寬二三百丈至六七百丈不等廣大如此是以雖遇伏秋水漲足以有容而不至於泛溢乃今日清江浦以下之河身深二三尺至五六尺不等寬十二三丈至十八九丈不等逼窄如此是以即使霜降水消亦難承載而每至於潰衝也將今昔寬深之數牽算而合較之則前此河水之深十倍於今河身之寬三十倍於今以十倍與三十培合算之是今日受水之河身僅有此三百分中之一分耳夫黃淮之水自若也伏秋之漲仍然也而其入海之路竟淤去三百分中之二百九十九僅存一線其何能容各處漫衝潰溢誠勢所必至者也不惟是也自臣於本年四月初六日到任之後目擊清江浦以下三百里河身淺窄情形而清江浦以上深雖不過丈餘寬則尚有百餘丈及二三百丈不等也乃自七月十八夜楊家莊遙隄潰決之後一路漸漸淤淺臣親乘小艇偏閲河中自清江浦以上歷清口并清河桃源兩縣以至楊家莊前通計一百七十餘里其向之深丈餘者今則止深二三尺至五六尺不等矣向之寬百餘丈者今則止寬十餘丈至二三十丈不等矣雖此係新淤之土不難刷開然下流不通將令刷歸何處耶今臣若欲照廷臣先將緊要之處配量修築則必以急堵楊家莊決口為先務以其為漕艘必經之地現在淤泄難行也殊不知清江浦以下三百里久淤之河未經疏通即使楊家莊閉合龍門不旋踵而他處又必告潰況清江浦以上至楊家莊業已盡行淤淺如將下流河身及早挑濬疏通然後竭力堵塞楊家莊決口則龍門閉合之後河流入海有途一百七十里新淤可以漸漸刷開故道可復漕運亦可無誤若不挑浚下流而但議堵決則水至無歸不特徒費錢糧徒勞民力此一百七十里新淤斷斷不能刷去必且更於楊家莊以上徐邳睢靈地方另行潰決決口移上一里則河身多淤一里將見東豫二省頻告水災而駱馬湖以下勢必全無運道矣此臣所以力請修治而斷斷不敢議緩也至於南岸遙隄自白洋河宿遷縣境起上歷邳州睢寧靈璧以至徐州共計程二百八十里其隄外淤灘甚有與隄頂相去僅尺許及竟與隄頂平者乂有隄外久停積水一派汪洋每遇大風鼓浪將舊隄積漸撞擊莫不剝落坍殘僅存數尺北岸遙隄自清河縣起上歷桃源宿遷邳州睢寧以達徐州共計程四百里內清河至宿遷一百六十里係漕船經行驛遞飛馳之地隄工尚完及至駱馬湖而上凡見在之隄悉皆殘缺不堪隄頂較之外灘不過髙四五六七尺不等且必有積水浸隄甚至兩面皆水日受汕擊之患者不得不併請急修雖駱馬湖以上非漕船經行之地殊不知黃河上流有決則下流必淤必故駱馬湖以下至清口一帶攸關運道之黃河得駱馬湖以上無旁泄之事方能深通是以凡此兩岸危險情形均當逐一修治也合而計之今日治河之道疏下流幫隄岸堵決口皆屬至緊之工誠緩一不可者也下流既疏殘隄既幫決口既堵則淮水可使徑直趨海然後并堵楊家莊決口急挽黃流使之赴清口㑹淮則故道可復河道既可復故而并將駱馬湖以上兩岸卑薄殘缺之處逐一修治再行設兵看守之法庶幾可保久逺而不至於徒費錢糧徒勞民力也又題覆第一疏略臣細察情形兩岸遙隄固屬必需而縷隄尤不可少蓋黃河流急則沙行流緩則沙墊而河身窄則流急寬則流緩今莫妙於築隄以束水而以遙隄并加築格隄用隄衝決使守隄人等盡力防護縷隄設或大水異漲即有漫衝亦至遙隄格隄而止自不至於奪河成缺守隄人等隨即將舊隄仍舊築起為工亦易臣請將原估築遙隄之土六十方分築遙縷二隄或隔五七里或隔十餘里又以所餘之土再築格隄均令守隄人等逐年加幫務極髙厚再查南岸白洋河以上至徐州北岸清河縣以至徐州一帶隄工淺缺危險斷須急為併治至於治之之法臣籌維再四若徒加幫遙隄則既不能束水而又無重門之障良非至穩之著亦於近河去處加築縷隄并量築格隄以為外籓其殘缺遙隄亦即一體加幫髙厚方稱萬全也按靳輔覆題八疏今節録第一疏餘與原疏略同是年創築雲梯關外束水隄一萬八千餘丈塞于家岡武家墩髙家堰等處大決口十六處十七年二月廷議總河靳輔覆題八疏啓奏第六疏奉㫖河工著動用正項錢糧第八疏沿河地畝撥給兵丁及地主作幫丁一欵奉㫖著再確議餘俱俞允命更定河工處分之例命撤回南北中河三分司部員其河道工程委該地方監司府佐二管理命設江南河兵八營凡五千八百六十名罷淮揚二府徐州並靈璧縣堤淺等夫三月塞山清安三縣黃河兩岸張家莊王家營邢家口二鋪口羅家口夏家口吕家口洪家口竇家口等處餘諸小口並塞之十一月部覆靳輔再陳經理第一疏未盡事宜奉㫖河道關係重大特簡靳輔專任一切修築事宜今該督以節省錢糧建立減水壩挑濬引水河具題爾部不即準行議令伊桑阿等㑹議乃故為耽延殊屬不合著照該督所題行其撥動民夫之處著㑹同各該督撫定議具奏附靳輔再陳第一疏未盡事宜疏略皇上不惜費數百萬金錢濟運而實欲兼保民也今徐州命臣大修河道蓋不專為以下雖在大修而上流漫衝以致宿徐等州蕭碭虹靈睢宿等縣處處被災雖漫溢之處離河甚逺並不奪河阻運然大水驟至之際禾苗盡空秋成失望若不並為圖治則歲歲伏秋勢必淹沒必須設法治之庶可稍救此數州縣歲歲被災之苦臣往來相度反覆籌維黃河之水雖合千支萬派而來然怒漲之時亦皆逐寸加增兩岸之隄髙者不過一丈低者僅有五六尺若河身之水止增三四尺猶可也其如河底勢髙每每驟長長與隄平即便漫隄而過水過之處隄工隨被洗去立成缺口於是隄外逐漸所積五六尺髙之水盡從決口奔騰而下所過之地禾稼漂流室廬傾倒臣愚以為既知水之逐漸加增則當作一逐漸泄之之法惟有建築減水壩之為得也查桃源縣地方向有减水壩四座臣親為勘量每座止寬一丈七尺合四座計之其泄水之地不及七丈以無窮之水而俱欲賴此七丈地面泄之自屬無益今臣擬築之減水東西寬十二丈南北長十八丈六尺中立磯心六座兩旁俱用石牆土內密釘排樁灌以漿灰上鋪石版聨以鐡錠每壩一座共成七洞每洞各寬一丈八尺計其泄水之地共有十二丈六尺先於碭山縣南岸建壩一座以減豫東二省驟來之水碭山壩內疏泄不及者隨於蕭縣南岸又建一壩以減之更於徐州北岸大谷山去處並州城對岸子房山去處連建二壩以減之至州城之下尚有疏泄未盡者則於花山去處亦建一壩以減之如此則隨漲隨減隨減隨流河內之水既無湧積漫隄之虞隄內之流亦無泛溢奔騰之害不特蕭碭豐徐之田畝漸漸可耕而徐州以下邳睢靈璧新舊河隄俱可不至於橫決以上碭蕭徐三州縣地方所建五壩內南岸二壩所減之水導歸睢河從姬村永堌等湖而下使沙停湖內聽清水由洋河復入黃河北岸州城迤上二壩所排之水排入微山吕孟等湖而下亦使沙停湖內聽清水由韓莊閘歸運河出駱馬湖復入黃河花山一壩所減之水引令從新決大口內而下亦使沙停口內聽清水由貓兒窩歸運河亦出駱馬湖復入黃河至宿桃一帶則仍受全河之水自是怒漲非常於是亟於宿遷北岸攔馬湖朱家堂溫州廟連建二壩以減黃河與駱馬湖㑹合之水又於桃源北岸之古城黃家觜二處亦建二壩以減黃河與白洋河㑹河之水更於清河北岸西王家營張家莊二處安東北岸邢家莊一處連建三壩以減黃河與淮河㑹合之水以上宿桃清安四縣所建八壩俱在北岸其所减之水內宿遷三壩與古城一壩俱引入楊家莊大決口內黃家觜壩引令歸黃家觜舊衝口內西王家營張家莊二壩俱令歸張家莊大決口內邢家莊一壩引令歸邢家莊舊決口內各各排入倉基等湖使之東北由沭河海州之連潮二河入海如此則每歲五六七八月之間凡遇河流暴漲宣泄有途加以人力修防之密自不至於壅積傷隄漫衝橫決其餘夏初秋季水平之時與冬夏等月水涸之候則皆仍復歸漕安流趨海更免旁泄停沙淤髙河底之患是年創築睢寧縣黃河南岸自衛工頭起至峯山四閘縷隄一千三百四十五丈自峯山四閘起至武官營縷隄三千三百十一丈三尺河防雜說睢寧縣黃河南岸舊遙隄卑矮而清水口一帶內係窪區外有積水如黃河風浪搏擊最為危險歲修之費不資康熙十八年於峯山龍虎山上下創築縷隄數千丈包清水口積水於隄內然後穵開舊遙隄撤乾積水變成膏田數百頃睢民賴之今則全河歸故新築縷隄尚屬卑矮當按水跡一律加髙又創築韓家莊月隄長一千一百一十丈創築邳州黃河北岸自徐州界起至廟山縷隄長二百二十三丈內有舊格隄又創築自劉家寨起至劉家店縷隄長三百四十丈又創築自豐山起經青陽山塘池羊山寺至董家堂頭壩縷隄長二千六百五十一丈又修築自馬船幫起經宋家莊至五工頭縷隄長一千一百九十二丈又創築邳睢㕔署前撑隄長九十八丈張鵬翮河防志今居民鱗集已為街市又修築自五工頭起經戚字堡至舊遙隄頭縷隄長八百四十五丈又創築自舊遙隄頭起至沈家堂縷隄長九百五丈又創築自舊遙隄中間至羊山寺西遙隄長五百二十一丈又創築自綿山起至拐山格隄長二百一十九丈又創築馬家山格隄長一百九十五丈創築桃源縣黃河南岸自臨河隄起至烟墩舊險工東頭縷隄長七千二百九丈六尺又創建張家莊減水壩一座創建清和縣王家營減水壩一座清河縣志是年總河靳輔自龍王廟起至四鋪溝山陽縣界接築縷隄四千九百三十八丈縣前玉皇閣一帶地勢當衝題定樁掃要工五百餘丈歲加修繕又自桃源縣東界至石人溝築縷隄一千八百六十三丈十八年二月允總河靳輔請留漕米二十萬石濟河工是年創建宿遷縣之朱家堂溫州廟桃源縣之古城清河縣之王家營安東縣之茒良口減水壩共六座又築宿遷縣黃河南岸蔡家樓墩即廟月隄長二百九十五丈老隄頭月隄長四百二十九丈彭家堡月隄長八百七十五丈十九年築蕭縣黃河南岸東鎮口格隄長八百六十四丈隄北有大橫隄南有小橫隄皆舊廢隄河防雜說黃河南岸上自碭山縣毛城鋪下至徐州城雖原有遙隄一道然近者離河五七里逺者離河二三十里其間地勢髙窪不等每於伏秋異漲之時河水必從窪處出漕直灌隄根方其出漕之時挾沙而漫逮水落歸漕而沙留於岸是以近河灘地每為淤墊較之二三十里外原舊築隄之地竟髙五七尺或丈餘不等故直灌隄根之水不一二日而水髙於隄少窪之處漫溢成缺嵗嵗然也此水下注不特鳳徐淮屬州縣漫淹而其水全歸洪澤湖撼擊髙家堰一有不支則全淮東㵼黃躡其後而清口淤運河墊清水潭等工皆不可保矣是徐州以上碭蕭黃河南岸隄工雖與運道隔逺而實與運道相關甚切也康熙十九年於近河髙灘之上築縷隄長一萬八千餘丈固可免十一州縣之水災但卑矮不足禦異漲更須幫築髙厚務期堅實又於蕭縣東鎮店地方築格隄長八百餘丈有此一隄雖遇異漲自有重門之障潰決之患永可免矣築徐州黃河北岸自董家山經盧家山至邳州界遙隄長一千六百六十四丈築邳州黃河北岸自沈家堂起至直河口宿遷縣界縷隄長二千四百五十三丈九尺築桃源縣黃河南岸臨河隄自宿遷縣界白洋河鈔關口起至舊縷隄長一千四十一丈淮安府志是年夏秋南北皆霪雨七十日黃淮並漲有滔天之勢然衝齧之隄隨圮隨葺不致大患賴新築工堅之所致云二十年塞楊家莊決口二十一年五月河決宿遷縣徐家灣塞之六月河決宿遷縣蕭家渡是年大修兩河各隄工告竣淮安府志先是河流一線業經挑引河疏通盡堵楊家莊借水刷沙但引河淺窄雖有減水壩泄之而飽極漩搜勢如鼎沸遇徐灣隄卑遂致漫決徐灣堵後又加怒刷引河雖漸加寬深然既飽漩搜之際乘蕭渡土鬆又決蓋徐灣蕭渡皆逺年舊隄曩時夯築堅否無由窮詰也是年兩河各隄工俱經築竣總河靳輔方疏請大臣閲驗及蕭渡決後有候補布政司崔維雅著河防二書進呈請盡變前法於是上遣廷臣勘驗復召靳輔入見咨詢兩河情形輔備悉條奏辨論維雅勦襲之謬上韙輔議令卒功復俞善後之請發帑金增築前工之稍卑者更將逺年舊隄盡為加築挑積淤數千丈增建猫兒窩欄馬河唐梗邵伯南減水壩以為萬全之計云二十二年三月塞蕭家渡口兩河㑹歸故道總河靳輔以聞並陳險汛日漸增加奉㫖據奏蕭家渡決口堵塞黃河大溜直下七里溝等處逐漸坍塌險工甚關係緊要應速行修築務令隄岸堅固不致再有衝決所需銀兩著該督將就近見在錢糧先行動用後以河銀補項六月靳輔請修上流隄岸奉㫖俞允十月從靳輔請添設河員增江南營河兵六百名是年修築睢寧縣黃河南岸自戴家樓至韓家莊縷隄長二千八十二丈二十三年七月徐州黃河漲溢靳輔治河書九月二十七日題奏今歲黃漲數倍去年徐州迤上自七月二十二日即與去年大漲水跡相平又疊長無消隨放減水石壩暫為分疏而南岸十八里屯北岸李道華樓髙地無隄之處亦復漫灘過水又將碭山北岸王家堂隄工漫缺三十餘丈約略上流泄去之水不下十分之二而徐城水勢復增長不止直至九月初六日方始消落城社幸免潰衝至徐州以下三山頭房村並靈璧縣張寒來等各堡原屬窪區八月二十日夜大雨颶風將來字堡漫缺隄工四十餘丈而徐州北岸長樊大隄歲修險工又因水溜至急衝去掃工兩段幸有月隄未斷獲免套河阻運至宿桃山清安五縣黃河賴攔馬河減水壩分泄兩岸隄工俱無漫缺唯安東北岸二鋪原非修防之處塌缷隄工六十餘丈幸有月隄不至為患聖祖仁皇帝南巡閲視河工御製祭文命學士孫在豐致祭河神靳輔治河書十月迎駕於紅花埠上問今年河道如何比前深通否長樊大壩却如何了回奏河道比前更深通但今年水大異常將長樊大壩衝去幾掃幸有月隄今已下掃保護住矣上問河道既已深通果然可以保得無虞否回奏如今全在多備料物修防險工為主險工無失即可永逺無虞又問當日舊黃河在何處從何路入海幾時潰決衝斷運河奏前代黃河原從大名府德州海豐利津等縣入海順治初河決河南荆隆口黃河由張秋南北運河兩分並由山東鹽河入海是晚上駐蹕紅花埠侍衛傳㫖云朕為河道憂心異常有許多言要問爾少頃奉諭傳進上問前崔維雅奏各減水壩不當建依爾見識還是當建不當建回奏這減水壩是必要的若無此各壩河道斷難成功又問爾有博通古今的人否回奏通曉政事有一人姓陳名潢浙江杭州人十八日御製祭文命學士孫在豐致祭河神訖駕臨攔馬河上問靳輔這攔馬河減壩的水減往何處去回奏這水從東湖由沭陽海州一帶入海又問此處離北運口多少路回奏十五里是晚駐蹕宿遷十九日駕自宿遷起行一路見栽栁繁茂云這栁栽得甚好將來不愁缺栁矣隨問云水面比隄裏平地是那邊髙俟水涸可打量明白再行具題回奏云必須俟冬底水涸時從徐州一路逐處打量方得明白上至蕭家渡問吏部尚書伊桑阿云目今河道比爾當初來看時何如回奏比先漸漸治成本日駕至桃源駐蹕二十日駕將至清河縣望見清口問云此是清口否回奏是上云我為河道關係國計民生刻刻在念將爾進的河圖日日展看情形都看熟了十一月上回鑾至天妃閘上諭靳輔云今年黃水倒灌運河不可為訓爾必須酌一至妥之䇿使之永不倒灌方好回奏臣再三籌畫别無他䇿惟有分黃助淮一法今年黃水倒灌因黃强淮弱所致臣欲於徐睢黃河南岸再造減水壩幾座如遇黃淮並强之時啓黃河北岸減水壩開泄若黃强淮弱則南北兩岸減壩並啓以北壩泄黃以南壩引黃助淮敵黃如此防法可無倒灌之虞上云此法甚好再細斟酌作速具題是年修築碭山縣黃河南岸自虞城界經毛城鋪石閘至蕭縣界縷隄長一萬四千四百十六丈八尺修築蕭縣黃河南岸自碭山界至徐州界縷隄長一萬一千六百八十九丈修築徐州黃河南岸自蕭縣界經王家山郭家觜上壩頭三山頭至靈璧縣界縷隄長一萬六千一百六十八丈六尺又修築黃河北岸自吳家寨至李道華家樓縷隄長一萬二千一百九十三丈按李道華家樓以下無隄之處凡九十里蓋因黃河上流寬濶而徐城以下窄狹一遇大漲即難容受故從來不議築隄使漫溢之水從岡頭湖荆山口轉入運河修築靈璧縣黃河南岸自徐州界至睢寧縣界衛工頭縷隄長三千九百四十八丈又建王家山天然石閘一座蘇家山石閘一座條築十八里屯天然石閘東西各一座張鵬翮河防志王家山天然石閘建以泄黃漲自三十九年至今河底漸深水不過閘又建楊橫莊挑水壩一座大谷山石壩一座修築睢寧縣黃河南岸自武官營經余家堂至戴家樓縷隄長四千三百二十三丈自韓家莊至古隄頭宿遷縣界縷隄長六千一百四十一丈五尺二十四年二月廷議覆靳輔善後事宜疏奉㫖這建造減水閘壩若俟該督撫等㑹議具題必致遲誤靳輔前曾奏稱建造此等閘壩將無用滚水壩舊石可用等語這事情著差前經看閲河道諳練河工司官一員速往與靳輔詳議若建壩分水不致多損民田著即一面興工一面具題倘水無歸路多致淹沒著㑹同該地方督撫等官確議具奏即中党愛與督撫等㑹議應速行建造廷議照覆允行附靳輔善後事宜疏略徐州以上直至河南滎澤縣之西河道俱寬數百丈若遇伏秋異漲漫灘而上直抵兩岸隄工其寬不下數十里逮至徐州北岸係山觜南岸係州城中央河道俱寬六十八丈將千支萬派浩浩無涯之水緊緊束住不能暢流既艱於下達則自難免於上湧是以徐州迤上南岸之漫溢歲歲見告臣先於黃河南岸碭山縣毛城鋪創建減水石壩一座蓋擬分泄徐城迤上之異漲也乃今年河流異漲兩壩不足宣泄復於李道華樓十八里屯等髙阜無隄之處漫灘而行且將王家堂隄工漫缺此徐城以上之情形也今臣細酌善後之計在黃河南岸必須於毛城鋪減水壩之上再添減水深底石閘一座不獨分泄異漲而石閘之水先至壩後可免建瓴傷壩之虞乂於徐州王家山十八里屯二處就山根開鑿減水深底石閘三座更於徐州北岸太谷山等處添鑿減水深底石閘二座統計徐城以上其添減水石閘六座平常則閉閘束流異漲則啓閘分泄則徐城自免潰衝而徐城以上各隄俱可保固矣又河流自徐城下行一百餘里至睢寧縣鯉魚山地方北岸係鯉魚山南岸一帶為峯山龍虎山兩山相峙夾黃河於中央河面僅寬百丈而河底乃係山腳衝刷不深河流到此又為一束以致今年有來字堡之漫缺也臣擬於南岸峯山龍虎山之旁開鑿天然減水深底石閘四座以為隨機分泄之計又南岸各閘壩減水之下必由歸仁隄經過目今止有五堡減壩一座並便民閘一座不足分泄應於五堡附近添建深底石閘一座減水大石閘一座並將便民閘再行改深五六尺以資分泄庶可無虞又攔馬河先後共建減水壩六座今必須再添建深底石閘一座使河流由閘先進積水以養壩尾俾免傷壩之虞又南岸各閘壩既建之後不特可以殺黃河怒漲之勢而淮流微弱之時又可藉以分引黃河之水由歸仁隄下注洪澤湖使助淮流然洪澤湖周圍數百餘里所引上流分黃之水一時不能灌滿仍難免黃水倒灌運河之患今必須再於清河縣西建雙金門大石閘一座並於閘下挑引河萬餘丈如遇黃河十分異漲則立啓此閘由引河分泄歸海則黃淮㑹河之處又可減黃水一二尺有裨運道最為喫緊至於清河縣運口添設石閘一座更屬保運濟漕至要之工亦應於運口閘之上乘時速建者也又題覆張鴻烈條奏疏略治河之法不在挑河而在築隄若止議挑而不髙築堅隄則水至無束散漫田間不特仍前淹地而所挑之河不久淤成平陸是徒勞民傷財而無濟於民生定國計惟竟以築隄為主量築隄需土之多寡以挑河穵土之寬深俾隄成而河亦成則水不旁泄或徑直趨海或就近趨湖由湖歸河由河入海庶為永逺利民之舉是年修築靈璧縣黃河南岸自徐州界撐隄起至龍虎山臨河子隄長二千六百八十四丈內接徐州子隄長七百七十四丈係民築按徐靈交界處縷隄與子隄不同縷隄在謝家樓之西子隄在黑家口之西建睢寧縣黃河南岸自龍虎山至峯山天然減水深底石閘共四座按建四閘以泄異漲之水流入孟山等湖又創築武官營子隄長七百四丈修築武官營大月隄長三千一百三十四丈張鵬翮河防志康熙三十年間武官營險極曾於月隄之中又築重堰未竣而北岸沙灘開穵引河告成河流北徙其工遂輟又創築朱家樓前格隄長五百三十五丈二十五年修築徐州黃河北岸狼矢溝月隄長八百丈閉塞桃源縣徐升石壩一座二十六年幫築宿遷縣楊家莊舊決口創隄長七十八丈二十七年建築桃源縣黃河北岸新莊口排樁工長一百四十丈二十八年築山陽縣黃河南岸柴市雞觜壩一座二十九年建砌清河縣天妃壩石工長三百四十七丈三十年九月十九日大學士伊桑阿等奉上諭河道關係甚屬緊要今河道情形如何之處須差大臣前往勘閲應差大臣著列名具奏二十四日奉㫖看閲河道著博濟李光地徐廷璽去三十一年工部議覆户部侍即博濟等疏請行令河臣靳輔修防險工八處奉俞㫖行附工部覆奏略臣等議得博濟等疏稱黃河南岸自徐州以上毛城鋪起至海口止北岸自大谷山起至雲梯關六套止所有減水閘壩現無衝損黃河流刷深寬數年以來黃水並未出岸海口迅流無阻其黃河南岸楊橫莊險工隄內地勢甚窪且無月隄見今所下之掃亦屬單薄烟墩險工水勢湍溜而掃根之水甚深所下之掃單薄馬邏險工水勢湍溜又無月隄北岸朱家莊險工逼近皂河運道所下之掃亦屬單薄安東縣便益門南東門二險工逼近城垣以上六處俱屬危險應令河臣修造月隄培掃修築其餘險工亦應令河臣預為修防十月從總河靳輔請命吏部尚書熊賜履往鳳淮揚三府徐州㑹同督撫清查開河築隄建造閘壩栽栁田畝盡豁錢糧並兩河歸故中河告成後淤成熟地應升科田糧是年修築徐州黃河南岸楊橫莊月隄長三千四百三十六丈增設清河縣黃河南岸天妃壩石工雞觜壩一座長十丈靳輔治河書一大興經理凡大工之興必先審其全勢全勢既審則必以全力為之康熙十六年以前淮潰於東黃決於北運涸於中而淮南海口且滄桑互易若不將兩河上下之全勢統行規畫源流並治疏塞俱施而但為補苴旦夕之謀勢必潰敗決裂而不可收拾臣經理河工八疏請帑至數百萬計我皇上睿謀獨斷悉准施行此兩河之得以復故也一挑濬引河塞決之方必先殺其勢平其怒而後人力得施焉則莫如引河之善也引河之用有三一曰分流以緩衝也河一决則全流盡趨決口奔騰激蕩樁掃無所施應於對岸上流别開一河以引之則決口緩矣一曰預浚以迎溜也河身既淤為平陸即異日黃流歸故必漲溢而他潰故必預開一渠以迎之務使水至歸渠遂其湍迅之勢則刷沙有力而後無旁出之虞一曰挽險以保隄也河性猛烈方其順流而下也則藉其猛以刷沙當其橫突而至也則恣其烈以崩岸故當其倐忽激射之時宜酌左右之間急開一渠以挽所衝之溜頭引入中流以奪其勢而後危隄可保故曰其用有三也至於度土地髙卑之數以定挑穵之淺深驗土性淤鬆之殊以酌渠路之去取又在任事者之盡心焉一開闢海口雲梯關乃黃淮二瀆所由以入海者也海口之髙皆因關外原屬坪厰漫灘以故出關之水亦隨地散淌散淌則無力無力則沙停耳禹貢紀河之入海曰同為逆河入於海夫河也而曷以逆名海湧而上河往而下兩相敵而後入故逆也禹既播之為九又曷為而同之不同則力不一力不一則不能逆海而入也禹貢聖人之書其言不可易也潘季馴曰海無可浚之理惟有導河以歸之海然河非可以人力導惟有繕治隄防俾無旁溢則水由地中沙隨水去也今日之雲梯關外即今日之逆河而不隄以求其同不同以求其入海得乎爰是清口以下至雲梯關三百餘里挑引河以導其流於關外兩岸築隄一萬八千餘丈凡出關散淌之水咸逼束於中涓滴不得外溢衝沙有力海口不浚而盡闢矣一塞決先後河水奔溢之時決口或大或小議塞者先大而後小不知理有不然者蓋大口難塞非踰旬纍月不能竣逮大口工竣小口又復汕刷而成大是所塞之工處處皆大口矣大口既已寬濶至於成河止矣急將諸小口盡行堵塞而後以全力施之大者一量水減泄至柔莫如水然茍不得其平雖天下之至剛者不能禦平水之法奈何曰量入為出而已上流河身至寬至深下流不敵其半勢必潰決而河靣窄狹之處或城鎮山岡不可開闢則上下相度地形多建滚水閘壩及􅚱洞放入通水之溝渠以測土方之法移而測水務使所泄之水適稱所溢之數則其怒平矣至其下或復寬濶如故又恐其力弱而流緩流緩而沙停則仍引上流所泄之水歸之正河以一其力如是則雖以洪河之浩瀚而盈虛消長之權操之自我一防守險工防河之要惟有守險工而已江南自徐邳而下大抵皆城郭村鎮不得不畫地戒嚴守險之方有三一曰掃二曰逼水壩三曰引河三者之用各有其宜當風抵溜其掃必栁七而草三何也栁多則重而入底然無草則又疏而漏故必骨以栁而肉以草也禦氷凌之掃必丁頭而毋橫何也氷堅鋒利橫下掃則小擦而糜大磕必折也然掃灣之處則丁頭掃又兜溜而易衝必用順掃魚鱗櫛比而下之然後可以攩溜而固隄至十分危急搜根刷底上隄而下坐掃不能禦則急於上流築逼水壩回其溜而注之對岸或一二三道若止一道恐河流悍烈壩一摧而隄即不可救也若開引河其費甚巨必酌地形而為之若正河之身迤而曲如弓之背引河之身徑而直如弓之弦則河流必自舍弓背而趨弓弦險可立平若曲折逺近不甚相懸河雖開無益也一運載土方運土初以人力有限以驢代之然莫若車運之便夫驢之力雖勝於人然芻秣之費喂養之勞倒斃之患合而較之殆不得當矣車之製當用獨輪小車蓋挑工之處大抵原隰髙低溝坑斷續雙輪則不行且小則往來捷而不滯也一車所載可得土二百斤一車可抵三夫之運一土方則例土以方一丈髙一尺為一方然有上方下方之别有專挑兼築之分至挑河又有起土淺深之不同築隄亦有運土主客之不同其土方工直更有人力强弱之不同焉主土者就近挑穵之土以所築之隄為準者也離隄十五丈外取土挑至隄基之上用大石夯硪之或以七寸為一層夯至五寸或以一尺為一層夯至七寸然後再上一層上夯如前法每隄髙一丈兩面坦坡應築寬六尺再加隄身二丈則頂寬二丈底當寬八丈髙一丈用勾股法科之每丈計築成上方土五十方每方一錢五分應給銀七兩五錢也客土者迤逺挑運之土以所起之土為準者也髙寶定例以五十大籮為一方每籮約重二百餘斤每方約重一萬斤連搬運上船工銀六分運至工所又工銀八分由船而運至隄上又工銀五分專挑者止挑去河身之土而不係築隄者也兼築者即用挑河之土以築防河之隄也上方下方者以築成隄工之實土為上方土塘所取之鬆土為下方也然一隄之中亦自有上方下方之别如築隄一丈則以平地起至五尺為下方自六尺至一丈為上方一南岸遙隄一工其利有四黃患不測作重門之障一也束散漫之水匯湖入黃沮洳涸而為沃壤二也引黃入淤歲久加髙即岸成隄不煩再築三也挑工築隄即開成小河一道伏秋保險運料便易四也統計此隄約長八九萬丈自房村至峯山有子縷二隄今應將子隄為縷隄而以縷隄為遙隄自峯山至宿遷便民閘舊有遙越隄皆須量為加修至吳城亦有見在之隄不煩另築然此隄所束者徐州以下之水而蕭碭以上隔於山岡尚未有所束也再於毛城鋪起築隄至王家山以束徐州以西碭山以東並十八里屯二閘之水使悉由鹽河歸睢溪口入靈芝等湖厯歸仁隄以匯於洪澤則自碭山以及清河縣境七百里别無霪潦之虞一黃河三砂河流順軌以來河底日深然尚有礓砂三處為河之梗三砂之口曹家窰砂最巨橫亘一二百丈每冬春水落時去水面不過一二尺河流迅疾一遇限砂則廽瀾旋洑從底而起舟行甚險計惟於南岸伏砂斷絶之處另開越河里許引河流使之避砂而行但所開之河不過深一丈寬五六丈聽河流自行汕刷當於春初河防少暇時調河兵挑浚不煩募役一黃淮交濟黃淮二瀆地也然黃强之時多淮强之時少惟即以黃濟淮使强者不獨强則二瀆交得其平而㑹同之勢成此減水各閘壩之最為得也黃河莫窄於徐州其至寬者莫能過百丈一遇伏秋水漲衝突他潰淮水北出清口每患為黃流所抵淮少弱即不免乘虛內注思善後利運之圖唯有殺黃以濟淮而殺黃濟淮之䇿無如閘壩善建置閘壩之地又無如徐州上下善乃經營相度於黃河南岸碭山毛城鋪徐州王家山十八里屯睢寧峯山龍虎山等處為減水閘壩共九座其因山根岡址鑿為天然閘者居其七既以殺黃且使所過之水各隨地勢由睢溪口靈芝孟山等湖以入洪澤而助淮如遇淮漲而黃消則淮自足以敵黃而閘壩亦無可過之水如遇淮消而黃漲則九閘壩所過之水分流而並至即借黃助淮以禦黃而淮之消者亦漲倘更遇黃淮俱漲則彼此之勢略等有中河以泄黃周橋六壩以泄淮亦不至偏强為害矣又以天然之岡址鑿天然之閘座雖驚濤動地終不能迸山根而敗之真千載之利三十二年閉塞桃源縣崔鎮支河三義石壩三座三十三年六月二十日上諭內閣問往湖灘河朔送船官員言今年黃河之水較每年甚大上流之地水勢既盛至江南地方則黃河隄岸可危皆未可知也遣員外即綽奇靳治豫馳驛往于成龍處今年水勢何如有無衝決詳悉詢問還奏是年建徐州黃河南岸毛城鋪小石閘一座大石壩一座張鵬翮河防志伏秋黃漲由此漫出小神湖康熙三十九四十年河身漸深水不過閘惟四十一年異漲之水出閘三十四年八月命永停遣員察勘河工江南通志卷五十一
