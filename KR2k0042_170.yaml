body:
  text: 江南通志卷一百七十一人物志藝術二安徽寧池廬鳳潁七府滁和六泗四州安慶府明何公冕潛山人遇異人授符籙習之能呼風雨役鬼神會嵗旱郡守呼令祈雨公冕對役笑曰吾非汝可呼者但汝往來烈日良苦吾書符汝手令握固馳府即有片雲覆頭役至守怒獨來役告以故令開掌則雷電交作莫不驚懼守躬往迎之公冕曰上帝封雨部當暫取揚子江水解熱澤及五十里耳移時大雨如注雜魚蝦齊下史仲宏桐城人少習形家言遇異人以青烏祕訣授之遂臻其妙曽卜投子山陡嶺一穴法當大貴於除夜行衢巷暗聽之有機杼聲讀書聲嬰兒聲者即授之具者惟方德益家即以相畀後科第蟬聮不絶張達泉懷寧人精醫得異授顔銓部渾為兒時中痘已死達泉視之曰未死也急掘地作坑置兒其中取新水數桶用紙蘸之重貼身上少頃有細煙起兒手微動達泉喜曰生矣復水沃之氣蓬蓬上蒸大啼數聲乃取起進以藥旋愈周公穆桐城人幼見其父與人圍棋劣不勝心怏怏乃畫紙為局張於卧榻上仰視彌月忽請於父曰幸呼前奕者來兒當勝之父以為謾也姑試之連勝三局其人斂手退曰是兒他日當為國手年三十遂以絶技名國朝陳延字遐伯潛山人幼而多慧凡技之善者見即摹仿酷肖尤精篆刻延折右手一切書畫皆用左腕遷鳩兹與蕭雲從稱畫苑二妙著孤竹詩集行世嚴宫方字則菴桐城人業醫方書靡不窺覽榮衛虛實辨晰微茫尤善治竒病多人所不解者楊磊字嘉玉桐城人兄森博極羣書名公巨卿交辟之磊學行精通尤邃醫理活人無算與嚴宫方齊名徽州府宋吳源字德信休寧人神於醫授翰林醫官程惟象婺源人善占算英宗在潛邸豫言其兆既登極賜以御書江嘉婺源人精醫術病疫家夢一神曰吾避江君病者遂愈張擴字子充歙人稱良醫有傷寒昏懵擴曰此嗜卧證三日必蘇蘇則必飲飲以此藥必睡睡覺當得汗而愈果然又有患嗽人以為勞擴飲以藥忽大吐視涎中得魚骨宿疾頓愈范天錫字夀朋休寧人診脈決死生為郡醫最元徐存誠祁門人善醫蓄藥救人明劉然字季然歙人善行楷書楊明時字不棄歙人工詩辭書畫吳羽字左千歙人善寫佛像山水花鳥氣韻生動江副護休寧人精醫著有試效集成暨諸醫書行世以賣藥金建亭通衢遊朝宗婺源人精地理永樂時卜建天夀山朝宗尤見褒賞余有道婺源人善丹青懸鷹於堂能驚雞雀汪機祁門人著醫案本草會編素問抄脈訣胡田祁門人善針灸為太醫院御醫陳嘉謨祁門人善醫著本草蒙荃國朝許寧字裕卿以醫往來歙休間有竒效能以手代針用推拏法世罕其傳著遁氣符醫紀黃遊諸集行於世徐起字仙客歙人精六書工摹印寧國府唐夏榮有相術蕭嵩陸象先為僚壻時蕭尚未仕陸已任洛陽尉榮謂象光曰陸郎十年位極人臣然不及蕭一門貴而且夀人未之信天寶中嵩兼中書令年八十餘子華厯中書侍郎同平章事乃服其氷鑑云紀叟善釀嘗飲李白以酒既卒白哭之曰紀叟黃泉裏還應釀老春夜臺無李白沽酒與何人陳氏能作筆家傳右軍與其祖求筆帖子孫世精其法包貴善畫虎其子繼之皆傳於世宋諸葛高世工製筆梅堯臣次歐陽修試諸葛筆詩云筆工諸葛高海內稱第一林逋云頃得宛陵葛生筆如麾百勝之師橫行紙墨所向如意元徐文中字用和善針術鎮南王妃患風文中診脈按曲池而針潛入焉妃殊不覺移晷手足並舉次日起坐明方希叔字元甫宣城人善八分書精繪事其畫草蟲用淡墨而飛動如生得服氣養生之術年九十餘查萬合字了吾涇縣人針術最精人稱半仙劉貴炳字斗南旌德人醫術得異人之傳臨症自出新意不膠古方明季大疫施藥賑飢人皆德之周子幹字慎齋太平人知道術嘗經柏葉山見石塞路幹祝而去之一夕震雷石裂行旅坦然李治字赤山太平人工書筆勢遒徑欲透紙背蔡子仁字梅坡太平人善寫真嘗作三樓一閣圖得李昭道父子遺法國朝畫僧半山徐姓名在柯善畫得倪瓚吳鎮沈周筆意王猷字肇宗宣城人少業儒後遇異人授以導引術遂隱於卜占決無不竒中嘗以日者之言多謬著九十四家年月考及算數三式切韻等書傳於世劉光揚宣城人善鐫碑碣近快雪堂琅華館諸帖皆其所鏤刻宋犖嘗作歌以贈之池州府宋張賁字元明青陽人為宣州司理工畫元陸仲逺青陽人精醫術能察腧輪經脈審榮衛順逆著千金聖惠方太平府宋祝次仲字孝友太平人工山水尤善草書明彭正字思直當塗人永樂間以良醫再使西洋子賔世其業天順壬午乘傳診療諸王所至奏效楊瑗字師蘧當塗人官王府教授善繪園圃菜茹其支莖細嫩葉蝕蝸篆處生趣盎然從任字子重繁昌人官黃州府經厯負竒氣兼嗜異書於天官律厯戰陳醫藥太乙竒門遁甲六壬皆探得其要占驗如神太史焦竑稱為絶技國朝濮澄字仲謙當塗人有巧思以鏤刻名世陳醇儒字蔚宗當塗庠生工漢𨽻八分書尤長於山水俞文字武先繁昌人善行草書畫亦入能品芮養仁字六吉當塗人精於醫著有醫經原始諸書沈大望字震甫蕪湖人精岐黃之學窮乏人病者輒出參茋療之懷宗時太池時疫大作奔馳救治無算廬州府晉韓友字景先廬江舒人善占卜圖宅相冡行京費厭勝之術消殃轉禍無不竒驗于寶問其故友曰筮卦用五行相生殺如按方投藥治病以冷熱相救其差與不差不可必也元康六年舉賢良元帝渡江以為廣武將軍杜不愆廬江人少就外祖郭璞學易卜有竒驗郗超嘗試之歎曰雖管郭何以尚此後為建威參軍宋趙廣合肥人李伯時家小史久侍伯時畫亦工其藝建炎中陷賊賊聞其善畫使圖所掠婦人廣不肯斷其右手拇指遣去而廣平生實用左手亂定惟畫觀音大士而已明李恆字伯常合肥人洪武初擢周府良醫嘗奉旨集袖珍方諸書年老致仕王親賦詩以餞命長史瞿祐序其事林時合肥人善太素脈有一妊婦求治時語其家人曰夏得秋脈定死當在庚申辛酉間果驗郭民安巢縣庠生攻醫術遇病者如痌瘝之在已乙亥被圍民安登埤協守城陷後令以下皆被執不屈賊次第殺之將及民安忽一賊奔救曰八十老翁降之何用殺之何為因得放歸後追記其人乃昔年窮途病夫施藥愈之者也趙修祿巢人工畫馬寫大士千幅徐體乾巢人其占用左邵法與焦氏易林相符契其天文得之劉誠意皆著有成書國朝許學文合肥縣人精醫尤善幼科著有痘科約言保赤正脈二書鳳陽府漢董奉居鍾離為人治病輒愈重者種杏五株輕者一株遂有萬株今鳳陽縣南有杏山唐崔白濠人工畫尤精花卉翎毛宋惠崇夀陽人工詩畫有名于世金武正宿州臨渙鎮人祖某官太史靖康後棄官歸農正精易數貞祐間行樞密院以上客禮之軍士所咨其應如神王博韓榮皆醫道通神宿州衛百户李昶少時弱疾不起延二人視之韓決其速愈夀八十餘王再視謂八十四後皆如其言元朱肯堂荆山醫士慕董仙壺公之為人五世知名明趙道震字處仁精醫術洪武間自金華徙籍定逺活人甚多永樂時召修大典運氣書年八十四卒著傷寒類證傳于世郝志才鳳陽人深通醫理高帝病甚志才以針調氣以藥理中未幾霍然授為太醫院判何欽字大敬懷逺人精醫學者請究其術欽曰先讀易以察時變讀禹貢識九州山川風土博極方書歸約於內經始可與言耳王鴻儒奉使鳳陽疾作延欽一劑而愈鴻儒為文紀之國朝陳應鶴鳳陽縣人善作草書丰骨遒徑人爭寶之薛嘉猷字若采定逺學生工詩文尤善草書人呼為薛字潁州府後漢華陀字元化沛國譙人遊學徐土曉養性之術年百嵗有壯容史所載醫術精竒世稱為神曹操苦頭風眩陀針隨手而差其絶技皆此類後操以召之不至怒為所害晉隗照汝陰人善於易臨終書版授其妻曰吾亡後當大荒窮慎勿賣宅後五年有詔使龔姓來頓此亭此人負吾金即以版往責之照亡其家大困至期果有龔使者止亭中妻賫版責金使者惘然沉吟良久曰汝夫何善曰善易使曰噫我知之矣乃取蓍筮之卦成撫掌曰妙哉隗生所謂含明隱迹者也因告其妻曰吾不負若金汝夫自有金五百在堂屋東頭去壁一丈入地九尺知吾善易故書以俟耳妻還掘之如其言明張玠字秀甫潁州人善醫有監司病塊投大黃數兩弗動玠曰脈細而附骨氣口虛是積在中央氣轉無力大黃反消胃耳法當獨參兩餘可下如其言果下痰若敗卵數升陸吏目心痛玠曰水溢脣正黑此蟲也投苦練下蟲滿匜他神驗皆類此張葵潁州人正德己卯舉人能作飛白書徑數丈頗有竒氣畫法直逼馬逺世多寶愛之滁州明魯文質字子良全椒人善醫從太祖渡江進藥屢效授太醫院判和州晉陳訓字道元厯陽人少好祕學天文厯算陰陽占候無不畢綜尤善風角言未來事悉驗宋徐兢字叔明厯陽人舉宣和中進士厯書學博士篆籕得李斯法畫亦入神品山水人物俱冠絶六安州明李玉字成章六安本衛千户善騎射尤精針灸人號曰神針李玉吳鵬習堪輿家言萬厯二十七年礦稅忽開姦人乘隙規利欲遍發霍蓼金斗諸山人心皇皇鵬為危論以動中官全廬得免發掘之禍所著有五寶經朱雲成徽人居於六形貌狂易酒後吐言雜以啼笑皆寓人生死禍福已輒竒中郝進士某謁選問何任為誦臨帝子之長洲得仙人之舊館及令豐城調新建亭有額曰仙人舊館諸生郝慕孩少潁異雲成每見必哭曰水仙子後覆舟彭蠡死壬午五月賊至令卜之哭曰我在數中已而賊夜襲城屠戮殆盡雲成亦遇害聶寵六安人習醫善診脈父卒侍叔父疾刺股血和藥進之遂愈鄉人遺孤女寵收養之治奩以嫁貧者輒往治之不責報泗州宋楊介字吉老盱眙人善醫著傷寒論脈訣行世徽宗嘗苦脾疾國醫進藥不效介言飲水太過以米煎大理中丸服之遂愈明徐安字古瀛盱眙人正德時年七十餘博學多能尤長算數所著有算法三卷江南通志卷一百七十一欽定四庫全書
