body:
  text: 江南通志卷二十輿地志城池一州下江府縣禮記云城郭溝池以為固周禮夏官之屬有掌固掌修城郭溝池者是也任其萬民用其材器若有山川則因之呉地為東南都會自昔立二八之通門帶朝夕之濬池其因川陸之奥作金湯之固者規模可以概見而大江南北峻堞深隍亦往往慿流峙之自然加塹築之人力矣繁劇之縣畫疆而理増設官司無改井邑保民以徳不以城池聖世所以臻敉寧之效歟江寧府江寧府始自越范蠡築城於長干楚置金陵邑城於石頭其後六朝有都城有臺城有丹陽郡城隋為蔣州唐為昇州皆有城五代楊吳為金陵府城宋元仍之俱詳見古蹟明初建都城惟南門大西水西三門因舊更名聚寶石城三山外自舊東門處截濠為城開拓八里増建南門二曰通濟曰正陽正陽而北建東門一曰朝陽自鍾山之麓西抵覆舟山建北門一曰太平又西據覆舟雞鳴緣後湖以北至直瀆山而西八里建北門二曰神䇿國朝改為得勝曰金川西北括獅子山於内雉堞東西相向建門二曰鍾阜曰儀鳳迤邐而南建定淮清凉二門以接舊西門實周九十六里其皇城則在都城内之東鍾山之陽前直正陽門外城西北據山帶江東南阻山控野闢十有六門東南北六曰姚坊仙鶴麒麟滄波髙橋上方西南六曰夾岡雙橋鳳臺馴象大安徳小安徳西一曰江東北三曰佛寧上元觀音周百八十里西又有柵欄門二一在儀鳳門西一在江東門北共十八門上元縣附郭自通濟門而北至西北儀鳳門屬焉江寧縣附郭自通濟門而南至正西石城門屬焉句容縣呉赤烏二年築子城周三百九十丈唐天祐八年縣令邵全邁修築宋淳祐六年令張榘重築後圯明景泰間知縣浦洪劉義建門樓𢎞治三年知縣王僖砌以石嘉靖三十三年知縣樊垣始築磚城周七里有五門溧水縣隋始築城周五里有奇宋紹定中縣令史彌鞏修之明初知州鄧鑑更築周七百餘丈門有六洪武間知縣郭雲重建正徳中知縣陳銘甃以磚尋毁知縣陳憲因其址築土城嘉靖初知縣王從善擴其東隅建石橋以泄水十年水敗東南隅知縣張問行修十七年水復潰三十六年知縣曾震始造石城髙三丈廣如舊然石甃其外而内猶土也城東西有池髙淳縣明嘉靖五年知縣劉啟東築土城東北因岡阜西南藉淳溪為池門有七江浦縣明洪武四年八月始築浦子口城設應天衛於城内九年改為縣治後遷治曠口山無城萬厯元年知縣周一經始築土垣六百九十餘丈下甃以石八年知縣余乾貞築城延袤七百八十丈門有五引水環之國朝康熙中知縣徐龍光董志建項維正屢修城樓及女牆六合縣宋前跨河為一城紹興中就舊濠築城於河北隆興初於其北又築一城俱甃以磚尋復築河南土城於是六合分而為三乾道紹興嘉泰相繼修之歴元至明初圮成化十年知縣唐詔創為四門後於每隅各增其一嘉靖三十九年築堡以圍縣署崇禎九年六月流賊破六合其鄉中書舍人孫國敉上城六合議蘇州巡撫張國維巡按陳起龍疏請於朝建城河北知縣仲聞韶董其事城周千三百二十餘丈髙二丈五尺北及東各二門西及南一門南街一帶皆商賈水陸所經又開便易小門七城河環之四門有橋蘇州府蘇州府呉闔閭築城周四十二里三十步為門八東曰婁曰匠西曰閶曰胥南曰盤曰蛇北曰齊曰平歴代皆仍其舊至隋楊素徙城横山東即今新郭唐武徳九年復還舊城分城之東置長洲縣以卧龍街為界乾符三年刺史張搏重築之梁龍徳二年始以甎甃裏外有濠宋初諸門漸塞而大圯於開禧間嘉定中太守趙汝述沈皥相繼修治寶祐二年趙汝歴增置女牆補建葑婁齊三門樓元定江南凡城池悉命湮毁雖設五門蕩無防蔽至正十一年兵起復詔天下繕完城郭知府髙履築壘開濠還闢胥門至張士誠入據增置月城明興更加修築城為亞字形内外長濠廣至數丈門有釣橋以通出入崇禎十五年推官倪長圩重加修葺國朝康熙元年巡撫都御史韓世琦改建城垣併闊女牆今城周四十五里長五千六百有五丈髙二丈八尺廣丈有八尺女牆髙六尺為門六葑婁齊閶胥盤各有水陸門惟胥無水門又於每門建官㕔軍器庫凡窩鋪百有五十七敵臺五十七雉堞三千五十一門有守門官公館及營房而鎖鑰則歸總捕同知焉雍正七年浙江總督李衞暨署江蘇巡撫張坦麟檄委修繕傾圮八年巡撫尹繼善復檄補修又舊有子城在大城東偏相傳亦呉所築周十二里自漢至宋皆為郡治張士誠時為太尉府士誠敗遂圮呉縣附郭得城西之閶門胥門南之盤門長洲縣附郭雍正三年分縣後得城北之齊門元和縣附郭分得城東北之婁門及東南之葑門崑山縣向未有城惟樹竹木為柵至宋猶然元至正十七年方國珍犯境始築土城禦之門有六明𢎞治四年知縣楊子器建樓其上嘉靖五年邑人都御史周倫疏請築磚城十七年於沿海州縣無城者次第修舉始甃以磚期年而成周十有二里長二千三百八十七丈髙二丈八尺雉堞四千五百八十七池深五尺廣六尺新陽縣雍正三年分與崑山同城東半壁屬焉常熟縣唐武徳初始遷虞山下周二百四十步髙一丈厚四尺列竹木為柵宋建炎間縣令李闓之始建五門元築土城至正十六年張士誠據呉以常熟邊江要害甃為磚城周九里三十步髙二丈二尺厚一丈二尺最為完固明永樂中歳大祲饑民盗城磚易食城日圮嘉靖三十二年倭入冦知縣王鈇重築之髙二丈四尺周一千六百六十六丈建門七西北二門枕山餘五門内外各有渠外渠廣倍内渠皆通以水關其後西北門在虞山巔者以形家言塞之萬厯甲午知縣張集義増城之髙三尺國朝康熙十九年水圮數百丈糧儲副使劉鼎暨知縣髙士䴊修築福山城明嘉靖間知縣馮舜漁江隂主簿曹廷慧築周三里萬厯間知縣楊漣修設兵防江為邑重鎮國朝遊撃駐焉康熙十三年督撫諸臣疏請捐修一十一年知縣髙士䴊重葺昭文縣雍正三年在常熟分出與常熟同城以西北鎮江門而東至東南迎春門為境雍正六年知縣勞必逹修呉江縣梁開平間呉越王錢鏐築城後廢宋嘉祐二年縣令裴煜復建南北二門元至正十六年張士誠據其地重築髙二丈八尺厚一丈五尺周五里二十七步陸門四水門五各以方名明成化元年知縣陳堯弼重建城樓後俱傾圮正徳九年知縣蕭韶復大築之嘉靖三十三年倭入冦知縣楊芷倡議増築髙三丈二尺厚一丈八尺長一千八十四丈五尺又為四門月城及敵樓敵臺窩鋪三十六年知縣曹一麟覆以甓國朝順治四年知縣李承尹修康熙四年知縣劉定國復増修城樓為堞二千三百五十一窩鋪箭臺俱三十六砲臺四并濬外城濠深倍於昔雍正七年知縣徐永祐修震澤縣由呉江分出與呉江縣同城自東水門而北至西水門為境松江府府城元末張士誠據呉時築明洪武間因而葺之周九里一百七十三步髙丈有八尺濠廣十丈深七尺門四東曰披雲西曰谷𤾉南曰集仙北曰通波門有樓樓外為月城城倚九峯面黄浦左大海而右三江上建敵臺窩鋪雉堞三千三百八十九嘉靖間知府方廉萬厯間華亭知縣王廷錫聶紹昌崇禎時知府方岳貢相繼修築國朝康熙二年霖雨傾圮巡撫韓世琦提督梁化鳳率屬捐修舊堞併三為一府城西門外有西倉城周二里髙一丈八尺陸門四濠廣六丈深三尺餘嘉靖間築以衞漕糧萬厯中知縣章允儒崇禎時知府方岳貢相繼増修國朝順治十五年奉㫖准官收官兌按圖增造倉厫數十間於水次以便小民交納焉華亭縣附郭柘林城明嘉靖中以倭警巡按尚維持建議築周圍四里髙一丈八尺門三池深一丈五尺闊十丈國朝康熙十三年修二十二年上海知縣史彩重葺奉賢縣府城東九十里有青村城明洪武十九年安逺侯築周六里髙二丈五尺門四各有樓外有月城永樂中都指揮使谷祥増修萬厯間巡撫趙可懷修濬池深一丈六尺闊十丈國朝康熙十三年重修二十二年華亭知縣南夢班重葺雍正三年分華亭設今縣以青村城為治九年署知縣舒慕芬重濬城濠婁縣附郭縣在郡治後城中専屬華亭金山縣府南七十二里有金山衞城明洪武十九年安逺侯築周十二里三百步髙二丈八尺廣二丈門四環城有池深丈有八尺廣十二丈永樂中都指揮使谷祥増髙五尺萬厯間巡撫趙可懷崇禎時知府方岳貢相繼修濬國朝康熙十三年重修二十二年婁縣知縣史彬重葺城舊分𨽻華婁二邑雍正三年分婁縣為金山縣建治城中得舊屬婁邑之西南半壁焉上海縣明嘉靖間知府方廉因倭亂築城圍九里髙二丈四尺門大小凡六堞三千六百有奇濠廣六丈深一丈七尺同知羅拱辰於四門益以敵樓箭臺環濠為土牆萬厯中知縣許汝魁奉檄城加五尺開小南門水關引薛家浜水以通市河民利賴焉後知縣徐可求劉一爌相繼甃石南匯縣郡城東北百二十里有南匯城本金山衞之分署明洪武十九年安逺侯築城圍九里百三十步髙二丈二尺門四各有樓永樂中都指揮使谷祥𢎞治初指揮使翁熊萬厯中巡撫趙可懷俱重修池深一丈四尺闊十丈國朝康熙十三年重修二十二年上海知縣史彩重葺五十七年郡同知鄭山督修青浦縣明萬厯二年知縣石繼芳創築城周圍一千三十丈髙二丈三尺堞一千七百一十五建敵樓窩鋪門樓六旱門五水闗三濠廣三丈深一丈國朝雍正七年知縣楊鳳然九年知縣魯𢎞璋修葺福泉縣雍正二年由青浦縣分出得城之東北常州府常州舊有羅城後唐天祐間築明洪武二年中山侯湯和改築新城於其内視舊狹五之三周圍十里二百八十四步髙二丈五尺廣二丈甃以磚石門七東曰通呉南曰徳安西曰朝京北曰青山次東曰懷徳次南曰唐化次北曰和政門各有樓水闗四池深二丈闊十六丈成化十八年巡撫王恕奉朝命檄知府孫仁修其傾圮以巨石重甃之加髙三尺壯麗増於舊觀正徳間知府李嵩嘉靖中知府金豪萬厯時通判趙堪相繼修葺國朝康熙九年知縣張令望重修垣堞雍正八年知府包括修葺城門水闗附明李東陽常州府修城碑記凡藩郡衛所所治必建城郭以宿兵守民防禦奸宄國家重熙累洽百五十年武備寖緩城不時葺識治體者必先焉常州府古毘陵郡為南都肘腋呉越喉襟地最要且自晉太康初已有城唐天祐間増置外郭歴代以降修廢不常我太祖下江南命中山侯湯公和以重兵鎮之始於郭内改築今城周十里有奇既久為霖潦所壞成化間知府孫侯仁修之輒復壞掌固之令視為虚文正徳辛未冬渤海李侯嵩來知府事首議修築時北方羣盗出没畿省間城郭弗豫者多嬰其害江南逺在數千里外咸謂侯為過計候曰城固當修修必豫備雖勞吾民亦佚道也吾與樂成耳乃白於巡撫都御史王君縝巡按御史原君軒巡捕御史楊君鳳皆以為宜侯亟令於衆第産賦金量力授役刻日定籍丈度尺計分工而並作聽政之暇躬莅共勤惰而懲勸之補缺為完益卑為崇飾舊為新垣壤堅厚廉角峻整樓櫓扉闈閎深壯麗而又滌隍浚池架梁成途凡為城之事罔不備具越三月而告畢居者櫛比行者輻輳萬目改視千夫増氣吏慶於官士頌於庠民歌於野皆幸其功之成而猶或以為無大損益者居無何北盗為王師所迫舍騎入舟上溯江漢承流而下越鎮江踰孟瀆急攻江陰東南之民安於富庶不習兵革流言夜驚危不自保侯以完城付寮屬暨兵衞曰是足以守吾任其戰躬帥吏士民兵拒於江謀畫内定勇敢外倡厚為募賞而嚴其不用命賊方貪利肆志藐如無人不虞其遽出也我兵恃城為本倚守為命無不一當百擒其醜若干人賊引而退月餘再至將殊死戰間侯復出竟不敢逼西奔於狼山㑹提督軍務都御史陸君完移兵江南以舟師蹙而殱之事遂大定向之惑者始相率而語曰我侯之力斯城之功也蓋常之屬邑有五而江陰當盗之衝其去郡治不啻百里使當是時城不固則守不敢出出必不能展布心力以收成功今一城修而闔境無事旁至呉越諸郡皆安堵貼席獲免於驚擾之患是其所係豈細故哉天下之事恒壞於因循而成於豫備使為郡縣者皆能先事而虞貞固而幹乘髙據深披堅執銳固守而力禦則保障之利天下共之彼蕞爾之寇猝然之變豈至燎原而焚石然則斯役也雖無所試吾固將與之况其明效顯驗焯焯如此哉且民保於城城保於徳莒恃陋而不修城魯恃城而不修政春秋皆譏之李侯之修蓋有不徒然者常之大夫士僉謂不可無所紀述以示來世台州府同知武進殷君鎰予中表之䣊也以侯予禮部所舉士寓書於工部郎中無錫顧君可學上京師湖廣布政司叅議江陰夏君從夀亦予所舉道其事尤詳因為文及詩寓而歸之俾刻焉侯歴監察御史有聲其為郡治行茂著比以禦賊功加禄三品佐斯役者為同知羅瑋通判陳碧温應璧謝思道推官栗登故并書之而諸執役出力之名氏則列之碑陰其詩曰有城巖巖有池潭潭大江之南築之隆隆浚之溶溶郡侯之功侯之始謀有廢必修其民咻咻侯心不移為所宜為曰匪吾私澤流令行既經既營不日其成人蕃物華中孽以牙於江之涯兵强勢尊賊徒既奔我城固存矧此一方維城峨峨壯哉山河侯功不磨武進縣附郭陽湖縣附郭雍正二年由武進縣分出自東水闗而北至大北門境長三里有奇無錫縣城在梁溪東相傳宋乾興中縣令李晉卿因舊址修築元明疊加繕治至嘉靖間圮知縣王其勤更築之周一十八里髙二丈一尺甃以磚石陸門四水門三池深二丈闊一丈七尺國朝康熙七年知縣呉興祚重修其後知縣曾子駒徐永言相繼繕葺金匱縣與無錫縣同城而分東之半為境計長九里江陰縣舊城建于楊呉後燬元末復繕治明初增築為門四後圮正徳中知縣黄鉼修築土城周九里有奇髙一丈五尺厚如之女牆髙二尺五寸嘉靖間知縣毛鵬錢錞金柱相繼修築盡甃以甎池深七尺闊四丈二尺又楊舍堡城在縣東七十里楊舍其地濱江扼要舊無城明嘉靖間屢有倭患三十七年巡按尚維持䟽請建城周六百餘丈髙二丈三尺門四水闗一崇禎時增修敵臺窩鋪九十六座宜興縣舊城創於孫呉赤烏六年城陽羨即此明初改築永樂中益展拓之周九里三十步髙二丈五尺門四各有樓池深一丈五尺闊三丈餘荆溪縣與宜興縣同城而分其東之半為境靖江縣元末張士誠將徐太二始築土塹明成化十三年知縣張汝華修築為城周七里四十步髙一丈八尺門四嘉靖中知縣汪玉甃以磚石城樓雉堞始備知縣應昻復築甕城加城髙三尺池廣六丈五尺深一丈八尺鎮江府鎮江古有京城呉有鐵甕城又有東西夾城建於唐俱詳古蹟唐乾符中潤帥周寶更築羅城二十餘里宋元因之明初元帥耿再成因遺址重建指揮宋禮奉勅甃以磚石周九里十三步髙二丈六尺門四東曰朝陽南曰虎踞西曰金銀北曰定波水闗二其池自西至南通漕河自北至拖板橋行舟楫萬厯中城垣周遭加髙三尺國朝康熙元年鎮海大將軍劉之源重修丹徒縣附郭丹陽縣故城久圮明嘉靖三十四年知縣陳奎重築今城周九百七十九丈髙二丈二尺門四居民以為隘巡撫張景賢令於城外拓之知縣史永夀增築焉為門五水闗二池寛八丈有奇萬厯中知縣周應鰲重濬金壇縣舊城唐長夀元年築歲久湮圮明正徳七年知縣董相重建土城周一千二百四十二丈髙二丈門六幷水闗皆甃以石已而知縣劉天和以闗基不固改築之嘉靖中知縣趙圭甃以甓疊石為基周千二百三十四丈四尺髙二丈六尺池深廣各丈許萬厯間知縣許𢎞綱復改築兩水闗髙廣各倍於昔天啟四年大水城東圮百餘丈知縣楊錫璜修之國朝順治初知縣胡延年康熙中知縣康萬寧李暽俱重修溧陽縣南唐昇元二年始築土城周四里許河貫城中宋建炎中西拓青安草市加廣二里建門五水門二明初命將士修築仍其舊址而界新安草市於外又命部使郭景祥石甃之周九百丈有奇髙二丈七尺厚二丈八尺濬池深丈餘廣五倍四門外復增置瓮城𢎞治九年知縣符觀以南城逼泮宫徙築河堧以廣之嘉靖間增設堡屋修葺女牆月城淮安府淮安有三城舊城創於晉南宋時地為重鎮守臣陳敏重築之稱為銀鑄城明初增修始以甎甓徧置樓櫓周十一里髙三丈雉堞二千九百九十六門四東曰觀風南曰迎逺西曰望雲北曰朝宗其北一里曰新城舊為北辰鎮地元末張士誠偽將史文炳嘗築土城於此洪武十年指揮時禹建以磚石周七里二十丈髙二丈八尺為五門二城之間曰聯城俗所謂夾城也嘉靖三十九年漕運都御史章煥題建東城長二百五十六丈有奇西城長二百二十五丈有奇萬厯中復加厚増髙而後三城之平如一其城濠表裏相通逹於運河山陽縣附郭阜寧縣雍正九年分自山陽鹽城二縣治郡東北一百五十里廟灣城鹽城縣宋紹興乾道間始築土城明永樂十六年指揮楊清千户馮善始易以磚周七里一百三十四步髙二丈二尺厚如之池深九尺嘉靖間檢校祝雲鶴署篆重修初城止有東西及北三門萬厯中知縣楊瑞雲始建南門居民便之清河縣元至元十五年築土城周六里惟立東西北三門南枕小清河今僅存遺址安東縣舊城俱圮明𢎞治十五年知縣郭韶於遺址築土圍建更樓四所設門啟閉萬厯中知縣詹道溥増築為土城天啟初知縣劉君聘奉詔興建周八里有奇髙二丈四尺門四國朝康熙七年水圮修葺桃源縣元至元間始築土城明正徳六年知縣李廷鵬因舊址修築周三里髙一丈五尺門四池深一丈嘉靖間知縣龍復禮重修設㵼水洞三崇禎五年知縣龔奭増築女牆置雉堞以磚後因河决地震城遂堙廢揚州府府城自呉王夫差城邗楚王熊槐城廣陵始其後歲久殘毁周世宗命韓令坤别築新城宋髙宗南渡詔吕頤浩修揚州城周二千二百八十丈葢即古城遺址也明初僉院張林守揚州以宋城太大改築西南隅周九里七百五十七丈五尺髙三丈厚半之門五南曰安江北曰鎮淮西曰通泗東曰寧海東南曰小東俱有甕城樓櫓雉堞警鋪敵臺相望南北水門二是為舊城新城則創於嘉靖丙辰以倭患用副使何城等議築之西接舊城周十里千五百四十一丈九尺髙厚與舊城等七門南曰挹江鈔闗在焉又南為便門東南曰通濟東曰利津東北為便門北亦曰鎮淮後改廣儲又北曰拱辰南北即舊城濠口為二水門東南即運河為濠北濠引水注焉萬厯中知府呉秀郭光浚池増城堞敵臺國朝順治四年知縣郭知遜十八年知縣熊明遂雍正四年知縣王元穉七年知縣陸朝璣相繼修葺𤓰洲城在府南四十五里大江之濵宋乾道中築後圮明嘉靖間復築城東西跨壩周一千五百四十三丈有奇髙二丈一尺厚半之門四便門一江都縣附郭甘泉縣附郭雍正九年由江都縣分出儀徵縣宋乾徳中築城周一千一百六十丈嘉定中郡守豐有俊袁申儒復相繼築東西翼城明洪武初知州營世寶同知戈文徳因其舊址増築之周九里二百四十六步髙二丈四尺雉堞三千六百二十有奇建城樓四戍鋪四十有三是為今城嘉靖三十五年知縣師儒每門甃甓二十七丈有奇髙與舊城準下闢重門捍禦稱便髙郵州有新舊二城今城即宋舊城也周十里三百十六步髙二丈五尺闊一丈五尺門四濠塹環之地形四面下而城基獨髙狀如覆盂故名盂城開寶四年知軍事髙凝祐築淳熙十三年郡守范嗣蠡建樓於四門開南北二水門通市河開禧中増以重濠元時知府李齊修築明洪武時復甃以磚増設櫓堞嘉靖間知州趙和補其卑缺後知州劉峻請於撫按州修其七衞修其三城益固國朝順治十五年知州呉之俊雍正二年知州張徳盛俱葺之其新城則宋咸淳初揚州制置使畢侯築在舊城東北二門外興化縣宋寶慶元年縣令陳垓始築土城周六里一百五十七步明洪武五年千戸郭徳蔡徳劉人傑以磚更建髙一丈八尺内外環水為濠嘉靖間城漸圮知縣胡順華修築視舊加髙一丈厚四丈為門四各冇樓浚池廣二丈五尺深一丈萬厯中知縣翁汝進復培土増厚並置四水闗石闌以防水患國朝順治十二年知縣任登級繕修城樓雉堞寶應縣宋嘉定間縣令賈涉始為土城元至正中僉院蕭成増築之甃以磚周九里三十步明初城夷為民居嘉靖中以倭警巡撫季遂檄副史劉景韶重築城周一千四十餘丈髙二丈門五水闗一敵臺八國朝康熙七年地震圮其東南知縣孫蕙修築泰州南唐刺史褚仁規始築羅城二十五里周顯徳中團練使荆罕儒増子城於東北隅更築羅城合西南舊城周十里即今城是也宋建炎中通判馬尚増修甓其外為四門紹興初城圮端平後州守許堪别創堡城於湖蕩沮洳中去城五里曰新城元末張士誠據新城明初復修舊城尋建州治新城遂圮今城周二千三丈二尺髙二丈七尺門樓四水闗二池廣五十二丈袤二千三十餘丈為防海要害萬厯中水患傾圮州守譚黙修築國朝康熙十三年知府金鎮知州嚴愈重修海安城在州治東百二十里周三里三十步甃甓表裏明常遇春築以屯兵後圮嘉靖間巡撫唐順之暨海道劉景韶重建土城六里許徐州府徐州城建於六朝宋時王元謨嘗稱城隍峻整宋蘇軾金完顔仲徳俱增築明洪武初壘石甃甓周九里有奇髙三丈三尺廣亦如之三面阻水即汴泗為池獨南可通車馬門四東曰河清西曰通汴北曰武寧南曰迎恩萬厯中副使舒應龍知州劉順之環城増䕶隄以防河患副使陳文燧開支河以洩城中積水崇禎時副使唐煥叅議徐標相繼修葺國朝順治十八年兵備項錫印大加修濬三載始竣康熙七年圮重葺銅山縣附郭雍正十一年新設蕭縣古城在縣治北宋時河決水没乃築南城歲久圮明正徳十一年知縣王隆即遺址増築外甃以石周四里許為門四萬厯初沉於水知縣伍維翰遷於白茅山麓畧具垣墉崇禎時被流寇殘毁國朝順治五年知縣祖永勲始補築康熙四年知縣沈大觀益修治而新之碭山縣明正徳八年知縣李金始築土城周百六十八丈髙九尺五寸外䕶以隄嘉靖以後因水溢衝圮萬厯二十八年知縣熊應祥遷建於舊治西里許周八百四十丈二尺髙一丈五尺廣三丈門四各有樓隍深一丈廣五丈四千八年知縣蔡一熊改建磚城崇禎時知縣劉芳復加修濬國朝康熙三十七年知縣柴爾皓修葺豐縣舊有土城周九里明正徳中知縣裴爵環城築堤以防水患嘉靖五年黄河決城陷知縣髙祿遷於華山之陽三十一年知縣徐蓂從民便還舊治築土城周一千九百八十四步髙二丈餘門四後知縣胡又心増築䕶城堤萬厯中知縣費思箴始傅甓石增樓櫓雉堞知縣戴一松以河決益修築䕶城堤加髙廣崇禎九年知縣方遴偕於四門各建子城國朝順治二年署縣事胡増光於城角外建砲樓四五年知縣閻玿增女牆二尺城外堤上復築土城凡數百丈開濬池隍而架以木橋重城巨塹遂稱險固沛縣古城久堙明嘉靖二十二年知縣王治創築土城周五里髙廣各二丈隍深廣如之為門四知縣周涇繼之壘石甃甓髙廣視舊有加萬厯中知縣倪民望符璽等修浚後圮於水知縣李汝讓整葺修築䕶城堤夏鎮城在縣治東北四十里新河西岸萬厯中工部主事楊信徐繼善築門四各有樓城外有濠西南有䕶城堤邳州明洪武中指揮王恒因舊城址築周五里有奇西南二面阻沂泗正徳中知州周尚化增築西北東南二隅嘉靖間知州陳柏重修國朝康熙初水濫衝圮二十九年知州孫居湜楊州同知馬驤奉㫖於艾山改建周五里十三步髙二丈八尺悉以甎門四東曰先春南曰來薰西曰迎爽北曰拱極各有樓雉堞一千五百一十有一其北枕山東西南三面因深為池䕶以重堤宿遷縣明正徳初知縣鄧時中創築土城南自新溝北至馬陵萬厯中與河岸俱圮知縣喻文偉遷建於馬陵山去舊治北二里城周四里許髙一丈五尺門四後多損壞知縣趙敬賓孫湛莫應奎聶鋐相繼修補萬厯甲午知縣何東鳳易以瓴甓睢寧縣舊有土城明正徳中知縣王蒼建嘉靖間知縣陳嘉畧甃以石隆慶初圮萬厯十三年知縣申其學重築周五百七十六丈五尺髙一丈八尺門四外甃磚石内實土泥其後屢經水患衝沒蕩然崇禎十一年知縣髙岐鳳重加修築國朝康熙三十九年河決傾圮大半五十六年知縣劉如晏修築西北石城六段太倉州太倉舊設木柵元至正十七年張士誠遣其將髙智廣築今城周十四里五十步髙二丈廣三丈門七曰大東曰朝陽曰大南曰大西曰小西曰大北曰小北門樓七警鋪六十有六敵臺二十有八水門四周有池池深一丈五尺廣八丈六尺鎮洋縣雍正二年分州城之朝陽門大南門小西門以為境崇明縣自元至明城凡五遷萬厯十一年知縣何懋官卜遷於長沙李大經繼之遂築今城周四里三分髙二丈厚一丈門五池闊十八步後知縣莊尚稷加髙三尺國朝順治十六年遊擊王龍知縣陳慎修十八年總兵張大治塞舊濠築土城於外周六里髙二丈八尺外鑿新濠闊二十餘步康熙十四年提督劉兆騏甃外城五門各建有樓嘉定縣宋嘉定十二年縣令髙衍孫築土城元至正十七年張士誠遣其將吕珍重築始用磚石周九里為門四入明漸圮其後屢築土牆以資捍禦嘉靖三十二年倭警知縣萬思謙以土堞難守改甃以甓知縣楊旦繼之重甃加髙建城樓改置雉堞敵臺守鋪之屬城周二千二百六十六丈髙二丈九尺廣五丈濠廣十三丈深一丈國朝順治中知縣查逢盛劉𢎞徳康熙中知縣余敏趙昕相繼修葺寶山城在縣東南與上海縣接壤明萬厯七年築周三里髙丈有八尺設兵守禦國朝康熙十三年督撫諸臣題請捐修二十二年嘉定知縣間在上重葺三十三年常熟海防同知李繼勲重修城垣四門三百六十丈五十八年復葺之寳山縣在嘉定縣東南四十里有呉淞城明洪武十九年滎陽侯鄭遇春築周五里有奇嘉靖初東北漸傾兵備副使王儀於西南一里更築土城後遂以舊城為教塲土城仍甃磚石周七百二十丈髙二丈四尺門四池廣六尺深一丈國朝康煕初知縣潘師質趙昕修十三年重修二十二年嘉定知縣聞在上重葺雍正二年改為縣治海州海州相傳舊有東西二城元季皆圮明洪武二十三年千戸魏玉等因西城故址築土城永樂中千戸殷軾砌以磚石周九里一百三十步髙二丈五尺厚如之門四東曰望孔西曰通淮南曰朐陽北曰臨洪池深六尺其後知州呉必學鄭復亨周燧楊鳳劉夢松等相繼繕葺贛榆縣舊有土壘元至正二十四年平章王信修築周四里有奇明洪武初知縣郎廷珪正徳中知縣馮澤增修後淮安知府薛􅢫以邑為郡東北藩蔽議甃以磚而未行至萬厯十五年知縣樊兆程始經營竣事周六百七十一丈髙二丈廣稱之池深闊各二丈崇禎十年知縣徐維翰甃南北月城國朝順治初知縣穆爾謨濬池益深康熙七年城圮後知縣余廷瑞巡檢李英修葺沭陽縣明正徳七年知縣易瓚始築土城其後屢遭河患萬厯二十年知縣徐可逹議甃以磚至四十四年知縣杜從心始訖工城周八百四十丈髙二丈厚如之有東西南小南四門而無北門崇禎十五年知縣劉士璟加髙雉堞環城鑿池國朝康熙十三年知縣張奇抱以城多震塌修復加垜通州通州城周顯徳六年靜海制置巡檢副使王徳麟始築土壘繼復甃以陶甓周圍六里七十步為門三宋建隆中設戍樓寶祐中賈似道増築甕城明初守禦千戸楊清姜榮相繼修築設三釣橋又間三水闗以通市河嘉靖三十四年知州翟澄浚為深濠匝以穹堤隆慶二年知州鄭舜臣重加修治是為舊城萬厯二十六年知州王之城以備倭請築新城南以望江樓為門北抵舊城延袤七百六十丈髙一丈九尺然外雖甃石以成内實沙土霪雨易傾頗煩修築國朝屢加葺治海門鄉舊為縣猶有遺址明嘉靖三十三年築城周圍五里三分髙二丈五尺門四各有戍樓水闗池廣六丈國朝康熙十一年為海水所圮縣省入通州附元周衡修城記昔周世宗以顯徳五年遣師擊南唐南唐主盡獻江北地明年始築通州城而甓之宋髙宗南渡其臣吕祉以為通州與平江崑山縣福山對岸趠順風不半日可至須預為之防於是置水軍起許浦以至顧涇由此言之則通實平江襟喉為今要害抗扼之地而其城築視他處尤所當先者也定逺大將軍李侯天禄以至正十六年統兵作鎮念城久隳欲事版築深惟民力自兵興之後有所弗堪迺經營計度水甓灰石積之於漸起丙申春三月逮己亥春迺始鳩工命材從事楨幹畚鍤而副元帥陳忠又為之協力贊襄於是杵築應和工力堅密遂為名城屹然金湯為國藩屏矣侯其有見於設險守國之義乎侯天挺英邁馭軍牧民恩威竝著通之民咸願紀侯之美以為非勒之金石無以章示永久乃請於衡衡因不辭而為之記元袁浩州治譙樓碑銘更漏之制尚矣肇造於黄帝宣於夏殷備於周始立挈壺氏掌之鑄銅為壺中實以水竅壺為漏浮箭為刻以侯中星早晏驗晝夜長短後世遂廣麗譙嚴鐘鼔賓餞寅於𤾉昧啟閉戒於扃鑰四時盈縮兆民作息實賴乎此非為華侈雄偉而作通故楚地宋淳熙間始建於州治之南崇臺屭贔華棟騫舉烽燧夜禁唯謹混一以來為鬱攸所燬自至元丁丑將及一紀分郡符提戍兵者一無所問更鼓刻漏無節民未便之丁亥秋太守朝請大夫許昌馬公毅下車未幾百廢具興睹斯樓草創謀諸僚寀將有事改作監郡奉政大夫呼圖克和卓同知州事忠顯校尉馬公判官承事郎張處恭從事濠梁孫君天麟皆力為張圭互督是役不遑啟處編氓之好義者子來而從仍塹壘之舊貫為樓凡四楹輪奐翬飛杗桷壯嚴俾司晝夜主刁斗之士居之前鎮通萬夫長安逺大將軍張公鼎與守郡萬戸昭信范侯應純暨千夫長莫不樂為捐俸以助不給新鼓鼙建旗幟鑄壺滴置籌箭弛者張而廢者舉焉經始於仲春初吉落成於季秋九日既僝工郡老謂宜刻銘以垂永久求文於余辭終弗獲洪惟國家奄有區宇頒朔授時一凖古制内設太史院外立陰陽學晝夜百刻各有攸職京圻而下神州赤縣咸立譙樓傳夜漏鳴宵柝使民朝作暮息而鼠竊狗偷者不得肆其欲矧通在揚東南之極金城千里瀕薄江海為險要控扼之地哉是舉也誠所謂起廢墜於久湮成不朽於將來其賢不在廉范寇恂下固宜紀之銘曰陰陽之道日月代明晝凡六時夜分五更誰其伊始曰公孫氏三代而下制作大備壺竅下通漏箭量刻誰其尸之挈壺是責以驗中星以定昏曉陳厥金鼔是曰麗譙維此通城僻臨江滸民俗淳厚素稱樂土漏刻有壺譙樓有城主司不謹燬於離明龍集己丑功成不朽垂十六年緒始克就廢興有數為陵為谷人存政舉無往不復郡僚經始元戎作成庻民子來舊貫斯仍垣墉闔闢羲娥代謝禦暴干城承平晝夜子翼借留叔度來暮民極雍熙皇圗鞏固如臯縣舊無城明嘉靖十三年知縣劉永準始作六門三十三年苦倭患邑人李鎮等建議築城周七里髙二丈五尺城樓四水闗二池深一丈二尺廣十五丈知縣陳雍董其成萬厯中知縣王以䝉築月城張星築敵臺泰興縣宋舊城毁於寇紹興間縣令尤袤更築土城後亦圮明𢎞治間知縣原秉忠立四門嘉靖三十四年知縣姚邦材奉詔築城周七里髙二丈五尺門五池環其外深一丈闊五丈其後知縣許希孟増設重門萬厯中知縣陳繼疇建敵臺浚池江南通志卷二十
