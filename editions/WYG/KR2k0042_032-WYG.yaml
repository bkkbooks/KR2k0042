body:
  text: 江南通志卷三十三輿地志古蹟四揚徐二府太海通三州揚州府廣陵城在府東北去江四十里戰國楚邑史記云楚懐王十年城廣陵秦置廣陵縣漢吳王濞都此為江都國後漢為廣陵郡隋曰揚州故城西據蜀岡北包雷陂外有大城中為子城亦曰牙城周顯徳四年韓令坤以城大難守築故城東南隅為小城以治之既而李重進始改築於故城南二十里宋建炎三年郭棣知揚州以故城憑髙臨下四面險固即遺址建築謂之大城明初於大城西南隅改築而故城廢府志云北濠即今柴河其上城基培塿可尋南濠即運河今云蔡家山者即其南角樓也東門在東水關内江都故城在江都縣西南四十六里漢置寰宇記云城臨江水為水所侵齧無復餘址䢴溝城在甘泉縣蜀岡上左傳杜預注云吳將伐齊自廣陵城東築䢴城城下掘深溝謂之䢴溝城輿縣城在甘泉縣漢置屬臨淮郡張公城在甘泉縣漢桓帝時廣陵張嬰所築張綱為郡守單騎造其壘示以恩信嬰恱服歸降因號張公城新城在甘泉縣非今之新城也晉寜康十年謝安出鎮廣陵之步邱築城邵伯埭明歐大任詩云謝公鎮廣陵甘棠人勿剪君見東山雲何似邵伯堰今堰存城廢蕪城在甘泉縣宋寳祐志云即䢴溝城嵗久荒蕪宋鮑照作蕪城賦遂稱蕪城趙鶴郡乗又謂蕪城為劉宋時城附南北朝宋鮑照蕪城賦濔迆平原南馳蒼梧漲海北走紫塞鴈門拖以漕渠軸以崑岡重江複關之隩四㑹五達之莊當昔全盛之時車挂轊人駕肩㕓閈撲地歌吹沸天孶貨鹽田鏟利銅山才力雄富士馬精研故能侈秦法佚周令劃崇墉刳濬洫圗修世以休命是以板築雉堞之殷井幹烽櫓之勤格髙五嶽袤廣三墳崪若斷岸矗似長雲製磁石以禦衝糊赬壌以飛文觀基扄之固䕶將萬祀而一君出入三代五百餘載竟𤓰剖而豆分澤葵依井荒葛􅇢途壇羅虺蜮階鬭麕鼯木魅山鬼野䑕城狐風嘷雨嘯昏見晨趨饑鷹厲吻寒䲭嚇雛伏􅕝藏虎乳血餐膚崩榛塞路崢嶸古馗白楊早落塞草前衰稜稜霜氣蔌蔌風威孤篷自振驚沙坐飛灌莽杳而無際叢薄紛其相依通池既已夷峻隅又以頽直視千里外惟見起黄埃凝思寂聽心傷已摧若夫藻扄黼帳歌堂舞閣之基璇淵碧樹弋林釣渚之館吳蔡齊秦之聲魚龍爵馬之玩皆薫歇燼滅光沉響絶東都妙姬南國麗人蕙心紈質玉貌綘脣莫不埋魂幽石委骨窮塵豈憶同輦之愉樂離宫之苦辛哉天道如何吞恨者多抽琴命操為蕪城之歌歌曰邉風起兮城上寒井徑滅兮丘隴殘千齡兮萬代共盡兮何言寳祐城在甘泉縣舊名堡城即隋迷樓故址宋寳祐四年勅大使賈似道築詔謂包平山而瞰雷塘者此也又有夾城在西北四里亦是時築左安城在儀徵縣西二十里宋治平中建地多山谿旁有崇邱道出六合盖舊時戍守處也新城在髙郵州東北宋咸淳初揚州制置使畢再遇築土城於東北二門外與舊城相埒今僅存遺址子城在泰州城内東北隅周二里有竒表裏皆甓周刺史荆罕儒築今圮新城在泰州北宋端平中州守許堪修州城别築堡城於湖蕩中去城五里謂之新城海安故城在泰州東一百二十里劉宋置明初常遇春至㤗州舊城遂東築海安城屯兵絶張士誠通州餉道安宜城在寳應縣西南本漢平安縣治蕭齊改置安宜縣石鼈城在寳應縣西八十里魏鄧艾築此以營田晉永和中荀羡鎮淮隂屯田於東陽之石鼈即此通典云山陽重鎮守險有平陽石鼈金牛城在寳應縣東南十五里孝義鄉宋熙寜間築土色皆黄形狀如牛韓王城在寳應縣東南四十里宋紹興間韓世忠鎮淮隂時築又髙黎王城在縣西南八十里侯村鄉宋治平中髙黎王築廣業廢郡在髙郵州梁析竹塘三歸二縣置齊陵廢縣在江都縣東南六十里齊永平初置建武五年遏艾陵湖水立裘塘屯移縣於萬嵗村江陽廢縣在江都縣隋志云舊曰廣陵開皇十八年置縣曰䢴江大業初更名江陽揚子廢縣在儀徵縣東南十五里漢江都縣地隋末杜伏威置戍守於此名揚子鎮唐永淳初置揚子縣髙郵廢縣即今高郵州治秦髙郵亭也漢置縣屬廣陵國宋秦觀詩云吾鄉如履盂髙據揚楚􅆃環以萬頃湖粘天如四壁故亦名盂城臨澤廢縣在髙郵州東北九十里劉宋置今臨澤鎮即故縣也海陵廢縣即今泰州治漢置九域志云東至海一百七里建陵廢縣在泰州東北七十里晉義熙中置寜海廢縣在泰州東南一百里晉義熙中置今為寜海鄉又有蒲濤廢縣在州東南今蒲津鄉疑即其地宋郊壇在江都縣南門外法雲寺建炎二年髙宗祀天南郊築壇在此柴墟在泰州南七里宋岳飛以泰州無險可恃退保柴墟即此隋臨江宫在江都縣南二十里大業七年帝升釣䑓臨揚子津大宴百僚遂建此亦曰揚子宫宫内有凝輝殿宫西有懸鏡亭澄月亭春江亭又有顯福宫在城外東北詳見宋寳祐志趙鶴郡乗宋行宫在江都縣治宋建炎元年髙宗奉太后至揚州駐此楊吳故宫在江都縣舊子城内久廢隋江都宫在甘泉縣大儀鄉大業元年敕王𢎞大修江都宫中有成象殿流珠堂水精殿諸處令宫人盛飾謂之飛仙今為上方禪智寺又有十宫在城北五里長阜苑内曰歸鴈曰回流曰松林曰楓林曰大雷曰小雷曰春草曰九華曰光汾曰九里南唐永寜宫在泰州城内李昪遷楊行密子孫於海陵號其居曰永寜宫相傳州治譙樓即其宫闕故址太子院在儀徵縣横山西即禪證寺梁昭明太子讀書建堂於此後僧神堅改為太子院淮東道院在泰州舊治内大㕔之東宋左丞陸佃為守時以海陵地僻事簡謂之道院後嘉定間郡守李珙始加淮東二字宋章武殿在江都縣建隆寺宋祀太祖御容於此崇政殿在江都縣宋建炎二年髙宗䇿諸郡奏名進士於崇政殿海陵監在泰州東北百二十里五代煮鹽之務也南唐昇元初於海陵置州以轄其監管鹽場八南四北四開寳七年置監於如臯縣海陵倉在泰州東漢吳王濞所置太倉也枚乗傳所謂海陵之倉即此甲仗樓在江都縣新城晉謝安建文選樓在江都縣太平橋北旌忠寺大業拾遺記云有梁昭明太子文選樓王觀揚州賦云帝子乆去兮空文選之樓鳳凰樓在江都縣廣北鄉鳳凰池側十道志云隋煬帝建迎仙樓在江都縣唐淮南節度使髙駢建於廨邸羅隠詩云仙境是誰知處所人間空自造樓䑓籌邉樓在江都縣宋郭棣知揚州建曰籌邉又即府南門城建樓曰鎮淮明月樓在江都縣大街東元富民趙氏嘗晏客樓上趙孟頫過之乞作楣帖題云春風閬苑三千客明月揚州第一樓主人大恱徹酒器為夀江淮勝槩樓在江都縣𤓰洲鎮明正統十三年周忱建王英記騎鶴樓在江都縣大街内以太平廣記騎鶴上揚州句名摘星樓在甘泉縣西北城角即迷樓故址宋紹聖三年晁補之修後為寳祐城樓府志云後有摘星亭摘星䑓皆其地卷書樓在甘泉縣西北隅宋髙宗駐蹕揚州以提㸃廨為尚書省禮部程俱寓直詩有夜寒持被卷書樓之句揚子江樓在儀徵縣南唐時建府志云宋慶元中郡守呉洪再建於鑑逺亭北更名頫江樓烟雨竒觀樓在儀徵縣西南大江濵宋呉機詩序謂江山一景實儀徵勝槩因建此樓葢取葉石林半空烟雨之句又建中和樓在朝宗門上淮春樓在髙郵州西北宋郡守趙不慙建多寳樓在髙郵州北門外太平街西賈商雲集競售珍竒今僅存橋名寳樓橋望京樓在泰州宋咸平中曾致尭建景范樓在泰州迎恩門内宋范仲淹舊行衙也清風樓在泰州舊治内又名清風閣彭城閣在江都縣大業雜記注云舊為彭城村隋煬帝因地名閣延和閣在江都縣治内唐髙駢建髙八丈飾以珠玉綺窓繡户每旦焚名香列異寳以祈王母之降羅隠詩云延和髙閣上干雲小語猶疑天上聞焼盡降真無一事開門迎得畢將軍觀音閣在甘泉縣即迷樓故址舊傳為呉絳仙梳粧䑓雲山閣在甘泉縣西北隅即環碧亭舊址寳祐志云陳升之建名勝志云吕公著守揚時建落成值中秋燕客其上秦觀即席賦詩一坐歡服玉鈎亭在江都縣唐李夷簡鎮淮南於城西南見新月如鈎遂建此亭賞心亭在江都縣唐李蔚鎮淮海於戯馬䑓西建此亭適薛陽陶至奏蘆管一曲其聲自然如來天上蔚大佳賞贈以詩云虚心纎質鴈銜餘鳳吹龍吟定不如亭未有名因名賞心春明退朝録云唐成都有散花樓河中有薫風樓綠莎㕔揚州有賞心亭潤州有千嵓亭皆勝蹟竹西亭在江都縣大儀鄉寳祐志云官河北岸禪智寺前唐杜牧詩誰知竹西路歌吹古揚州因名風亭在江都縣治内宋徐湛之為南兗州刺史以廣陵城北多陂澤水物豐盛乃建風亭月觀吹䑓琴室並在宫城東北角池側招集文士極一時逰玩之盛無雙亭在江都縣后土殿西宋王禹偁移瓊花詩序云后土殿瓊花天下獨一株耳永叔為揚州作無雙亭以賞之彼土人别號八仙花或曰李衛公所賦玉蘂即此非也詳見辯訛又有瓊花䑓則元人以八仙花補植者羙泉亭在江都縣治内宋歐陽修建鄭興裔重修斗野亭在江都縣邵伯埭宋煕寜二年建輿地志云揚州於天文屬斗野故名紹興元年鄭興裔更造於州城迎恩橋南嘉定間崔與之改題曰江淮要津四柏亭在江都縣宋元豐中教授崔浩著四柏賦以見志淳熙中重建學宫教授彭方復植四柏於㕔事之南因以名亭借山亭在江都縣九曲池北宋馬仲甫買池築亭名曰借山勸耕亭舊在江都縣淮海堂後每嵗仲春郡守出郊勸農寓於上方寺宋慶元五年郭杲改建亭於寺前遂移舊亭題額於此江山風月亭在江都縣𤓰洲鎮東南元熊漢卿别墅鎮南王嘗避暑於此春貢亭在甘泉縣蜀岡宋時揚州貢茶皆出蜀岡因名水亭在甘泉縣北隅唐獨孤及建南唐徐知誥引宋齊邱畫灰秘謀於此延賔亭在甘泉縣南唐李昇建白沙亭舊在儀徵縣白沙洲唐韋應物有白沙亭逢吳叟歌宋嘉定間方信儒移於注目亭故址青鸞亭白鶴亭在儀徵縣西小山宋祥符間詔即其地鑄聖像有青鸞白鶴飛繞爐冶之上因立二亭谿隂亭在儀徴縣東范氏園宋蘇軾詩云白水滿時雙鷺下綠槐髙處一蟬吟酒醒門外三竿日臥看谿南十畝隂壯觀亭在儀徵縣北三里北山之巔宋政和中郡守詹度建米芾題額芾詩邀賔壯觀不辭寒玉立風神氣上干又東有扄岫亭宋發運便張嗣昌創附宋楊萬里重建壯觀亭記儀徵逰觀登臨之勝處有二發運司之東園北山之壯觀亭是也亭立北山之椒居髙俯下江准表裏皆在目中自城中以望亭中如髙人勝士登山臨水而送歸人也如仰中天之䑓縹緲於烟雲之外也自亭中以望江南之羣山如驪黄騄耳競奔爭馳而不可縶也如安期羡門御風騎氣隔水相招而不得親也米元章嘗官發運司暇則徘徊其上為之城且大書其扁至建炎庚戍火於兵再至紹興辛巳又火於兵淮人過者㒺不慨歎今太守左昌時屬工徒為屋三楹為墻百堵前敞以軒後邃以檻種萬松以繚其西北又藝桃李梅杏楊栁千本以牣其南谷儀徵之士民登而樂之相與謁予記且曰吾侯秩滿將歸於朝留之不可惟侯奉法循理節用愛人至於葺府庾繕溝壘訓兵戎虞疆塲夙夜殚力以整以備江海盗寇悉縳至麾下姦愚跡熄不敢竊發年穀洊登倍蓰他境因治之餘復此壯觀州人耄倪再見承平氣像俾過之者得以挹江南之形勝而起騷人之思北望神州而動撃楫枕戈之想則斯亭豈特逰觀登臨之勝而已哉願為特書惠爾淮士以詔於無止余曰諾哉紹熈二年四月記鑑逺亭舊在儀徵縣潮牐西宋米芾書額後建於城西南曰注目亭慶元中又建於頫江樓前仍名鑑逺天開圗畫亭舊在儀徵縣西城上取山谷天開圗畫即江山之句以名宋淳熙中郡守姚恪建後因甃城而廢以其名掲於頫江樓嘉定間吳機别建於朝宗門外江濵又於其後創水竹喜凉漣漪聞凱傳幽五亭翫珠亭在高郵州北一十里樊良鎮宋嘉祐間天長澤陂有一大珠天晦多見後轉入甓社湖或在新開湖鎮當珠往還之處因建此亭濯纓亭滄浪亭在興化縣舊稅務前宋天聖間范仲淹建范詩笑解塵纓處滄浪無限情浮香亭在泰州舊治藕花洲之後有古梅秦太虚諸人唱和黄法曹梅花是也宋紹興初陳垓守泰州鐫茂陵御書額及秦觀蘇軾蘇轍詩於上垓又建須友亭與浮香亭對種竹為屋曰須友以竹必友梅也又建歸鶴亭在州東七里響林昇真觀内每嵗二月勸耕坐亭中勞父老以酒果或與客觴詠竟日海嶼亭在泰州西南宋建炎前將迎所也米芾書額溪光亭在泰州西溪鎮迎賔亭避湖亭奉先亭距此不逺俱宋范仲淹建迎止亭在泰州西溪鎮北中洲山有宋范仲淹遺跡南風亭在泰州西溪鎮西南宋晏殊建思賢亭在泰州西溪鎮東寺塔院宋吕夷簡手植牡丹於此後人思之因建亭曰思賢孔融䑓在江都縣寳鏡巷内李文饒賦云廣陵東南有顔太師猶子宅即孔北海故䑓鬬雞臺今失所在按拾遺記煬帝於呉公宅鬭雞䑓下恍惚與陳後主相遇杜牧揚州詩云秋風放螢苑春草鬬雞䑓崑邱䑓在江都縣禪智寺側宋歐陽修築府志云䑓名取鮑照軸以崑岡之句明歐大任詩云地軸横崑岡上有百尺䑓戱馬䑓在江都縣桂苑叢談作戲馬亭後山詩話云其下路即玉鈎斜吳王濞釣䑓大觀圗經云在揚州城北十二里髙二丈吳公䑓在甘泉縣劉宋大明三年沈慶之攻竟陵王誕時所築弩䑓髙十丈周二百步陳大建中吳明徹圍東廣州增築之以射城内故名府志云一名雞䑓唐武徳中𦵏煬帝於吳公䑓下即此其下有路號玉鈎斜為隋宫女𦵏處樂逰䑓在儀徵縣北六里城子山一名東廵䑓文游䑓在髙郵州東宋蘇軾孫覺秦觀王鞏同游載酒論文於此因名李公麟為圗刻於石國朝王士禎重修文游臺記古来風流文采魁梧竒傑之士其在當時或不遇或遇矣而以名髙而取忌守道而叢謗至不得一日安其身於廟堂之上甚者播遷江湖嶺嶠之間而坎壈以老死然數千百年後學士大夫讀其書思慕其為人至於其所嘗㳺眺憇息之地必且披榛棘訪碑誌往往為之流連感激太息慿弔於荒烟斷靄之中豈其遇有幸不幸歟抑豐於此則歉於彼天道之乗除同然歟昔蘇長公生宋盛時以文章名動天下試館閣為侍從之臣洊歴大藩天子至以宰相器之不可謂不遇矣然終以直道見尤謝景温李定舒亶之屬繼肆其弹射卒至流離惠州儋耳窮海絶嶠之濵不究其用為天下惜至并所為文章亦禁錮之何其不幸也考公平生踪跡多在江淮又嘗與孫莘老秦少㳺王定國軰游處最善而孫秦二君子者皆髙郵人故郵樂得公而顯而文㳺䑓在城東北里許即公與三君子所嘗㳺眺者也宋淳熙中王詗葺之嘉泰中吳鑄重新之其興廢之蹟大畧見於應公武王元凱二記自明正徳迄今康熙又二百餘年矣余以順治十七年四月來李廣陵文書之暇多泛小舠往来三十六湖之上因登是䑓而弔之嗟其頽廢荒落謀諸州守吳君及州之士大夫思所以修葺而振起之者㑹吳君秩滿擢蜀之龍安守以去繼之者閩海曾君余復告之而曾君又以憂歸繼之者鐡嶺李君余告之如初盖始辛丑迄甲辰閲四嵗三守而䑓之工以成余因是慨然有感也方公洎三君子以直道不見容於世放跡湖海登是臺以嘯詠發舒其無聊不平之氣亦偶然耳豈嘗計及數百年之後斯䑓存歿與後之人為之太息憑弔感激而流連者耶余生後公且五六百載猶得登斯䑓拜公祠宇恨不及四公當日同其㳺眺登臨之樂而親聆其音㫖詩曰髙山仰止景行行止斯䑓也亦後之髙山景行也自宋迄今閲五六百載所謂僉壬者其人與骨皆已朽而斯䑓巋然公之風流照映於無窮然則公不可謂不幸也公嘗作太息一篇送少游之弟少章有感於孔北海之論盛孝章也其言曰英偉竒逸之士不容於世俗乆矣雖然自今觀之孔北海盛孝章猶在世而向之譏評者與草木同腐嗟乎昔之視古不猶今之視昔乎䑓在泰山廟後有樓有亭皆可以望逺登其上則長湖淼漫風㠶杳靄稲塍柳陌繡錯而碁布於秋髙宻雪之時尤宜樓與亭皆不自名而從䑓者存占也拱極䑓在興化縣北城即元武䑓故址元縣令詹士龍讀書處府志云昭陽十二景之一讀書䑓在寳應縣西八十里齊興寺内舊傳梁武帝讀書處四并堂宋韓琦於郡圃建堂取四難并之義府志云後慶元中趙鞏復建於杏花村康山草堂在江都縣新城東南隅築土為山構堂其上明正徳中康海去官客揚州與名流常讌此董其昌題額曰康山草堂時㑹堂在甘泉縣蜀岡宋造貢茶之所梅尭臣詩云雨發雷塘不起塵蜀崑岡上暖先春烟牙才吐朱輪出向此親封御餅新平山堂在甘泉縣蜀岡上宋郡守歐陽修建江南諸山拱列簷下因名咸淳五年李庭芝鎮揚州築城包之城廢堂亦為栖靈寺僧所據康熙二十年郡守金鎮建堂寺右堂後増樓五楹額曰真賞祀歴代賢郡守於其上二十三年聖祖南巡臨幸御書怡情二字四十四年又御書平山堂及賢守清風四字懸額堂内聖祖御製平山堂詩恭紀首卷附宋沈括平山堂記揚州常節制淮南十一郡之地自淮南之西大江之東南至五嶺蜀漢十一路百州之遷徙貿易之人往還皆出其下舟車南北日夜灌輸京師者居天下之七雖選帥常用重人而四方賔客之至者語言而目不相誰何終日環坐滿堂而太守應决一府之事往往亦不暇盡舉其職故凢州之宴賞享勞太守之所游處起居率皆有常處不能以意有所揀擇以為賔客之歡前守今參政歐陽公為揚州始為平山堂於北岡之上時引客過之由是平山之名盛聞天下嘉祐八年直史館丹陽刁公自工部郎中領府事去歐陽公之時纔七十年而平山僅若有存者皆朽爛剝漫不可支撑公至踰年之後悉撤而新之又封其庭中以為行春之䑓昔之樂聞平山之名而來者今又將登此以博望遐觀其清凉髙爽有不可以語傳者也揚為天下四方之衝朝至乎此者夕不知其往民視其上若通道大途相值偶語一不快其意則逺近搔摇謗喧紛不可解公於此時能使威令徳澤洽於人心政事大小無一物之失而寄樂於山川草木虚問曠快之問人之得此足以為樂而不知其致此之為難也後之人登是堂思公之所以樂將有指碑以告者也國朝金鎮平山堂記余莅揚值軍興伊始征調旁午數月始得整理廢墜稍稍就緒偕郡之賢士大夫觴咏蜀岡之上感平山堂之毁為僧文寺與汪舎人蛟門暨同游諸君將謀復之也既為述宋歐陽公治郡政績以其餘力創為是堂及今之既廢而宜復之意以語共莅茲土者視舊址迤西又闢前後隙地二畝許益之度材量費上自廵鹺侍御既僚屬大夫其心同其言樂以九月經始嵗終迄成事木石堅緻黝堊鮮彩軒檐既啟江山欲来五百年之壯觀一朝頓復適余奉視郵政於江寧喜其將去而落成也復偕諸君子登山置酒而樂之郡之父老既歡既愉士女奔凑攀崖捫級來觀者不絶是時適檇李曹司農至首為五十韻長句紀其事凢郡之縉紳學士及四方名流無不揳宫徴敲金石效竒呈羙於兹堂之上論者謂與蘇王秦劉諸賢之唱和不相上下而惜乎余非歐陽公其人也夫一堂之興復微耳然人情欣欣若以為事之必不可少何也方今東南多事揚以四逹之衢吾得與二三子保境休息於此里門宴開守望不事四方之結轂而至者指為樂土此非大幸耶當此之時而使前賢之名跡缺焉湮沒至廢為梵鐘燈火之塲而不恤既非所以稱為民父母之意揆之人情亦必有鬱然不樂者也以余之徳薄所以能使一時之爭勸其事而歡樂其成功者凡以順人情之所欲為而已然為此於萬難倥偬之際比之前人創建之日其勢尤有不易者非諸君子之協力交賛即予何能藉手以告成哉是皆不可以無記也朱彞尊真賞樓記平山之堂既成越明年中書舍人汪君季甪拓堂後地為樓五楹設栗主以祀歐陽永叔劉仲原父蘇子瞻諸君子名曰真賞之樓盖取諸永叔寄仲原父詩中語也君既為文勒堂隅識落成之嵗月請予作斯樓記於是樓成又逾年矣方山隂金公將知揚州府事實期予適館既而予不果往及聞堂成之日四方知名士㑹者百人多予舊好咸賦詩紀其事顧予獨客二千里外不獲與私心竊悔且憾回憶曩時客揚州登堂之故址草深數尺欲求頽垣斷砌所在不能辨識愾然長謡謂兹堂之勝殆不可復覩曽幾何時而晴闌畫檻忽涌三城之表且有飛樓峙其後既感廢興之相尋復歎賢者之必有其助也當永叔築堂時特出一時興㑹所寄然春風楊栁盖别乆而不㤀子瞻三過其下悵仙翁之不見至題詞快哉亭尚吟思此堂未已即永叔亦感仲原父能留其游賞之地賦詩逺寄是當時諸君子未嘗一日忘茲堂可知已肇祀焉庻其馮依而不去者與堂之廢自世人視為㳺觀之所可以有無守是邦者或不為葺治至於日圯理固然也試登是樓見永叔以下凢官此土有澤於民者皆得置主以祀後之君子必能師金公之遺意克修前賢之蹟則是斯樓成而平山之堂始可歴乆不廢足以見汪君之用意深且逺也予雖不穫觀堂落成與諸名士賦詩之末猶幸勒名樓下附汪君之文並傳於後亦可以勿憾矣夫谷林堂在甘泉縣宋元祐中建蘇轍詩深谷下􅆼窕髙林合扶疎景范堂在興化縣㕔後范仲淹嘗宰是邑後人思之作是堂三至堂在泰州治内宋曽肇建肇祖致尭咸平中知泰州父易占知如臯肇復典是郡因立三至堂堂後有六詠亭積翠亭文㑹堂在泰州舊治内宋天聖間滕宗諒為郡從事建與范仲淹富弼胡瑗唱和其中讀書堂在泰州東北八十里景徳寺東廊宋天聖中富弼随父任與胡瑗周孟陽同讀書於此時范仲淹滕宗諒俱官海陵謂三人皆公輔器厚遇之後果然瞻衮堂在泰州北城上宋紹興間韓世忠移軍楚州命提舉董畋築城於髙沙都督張浚嘗次於此因築䑓曰瞻衮芍藥㕔在江都縣治内輿地紀勝云州宅舊有此㕔在都㕔之後聚一州芍藥絶品於其中今鎮淮堂是也董仲舒宅在江都縣大東門之外今兩淮運司署即其地内有董井府志云井上有亭有碑謝安宅在江都縣運司前法雲寺内晉寜康問安鎮廣陵居此手植雙檜至唐猶存楊行密宅即江都縣之光孝院行密於光化間以宅施為僧院李昪宅在江都縣春亭寺朱夀昌宅在髙郵州城西小街内夀昌事母至孝建有彰孝坊髙麗館在江都縣南門外宋元豐七年詔京東淮南築髙麗館以待朝貢之使紹興三十一年向子固重建榜其門曰南浦亭曰曕雲四達齋在髙郵州舊治内宋郡守趙晦之建蘇軾為之銘螢苑在甘泉縣隋大業末帝幸江都大索螢火數斛夜出逰山放之光遍岩谷故名唐杜牧之詩有秋風放螢苑之句隋苑在甘泉縣大儀鄉一名上林苑唐杜牧詩紅霞一抹廣陵春指此皂角林在江都縣𤓰洲鎮北原有皂角樹三株相距數里南幾志云今為逓鋪宋楊萬里詩有河邉落葉知何樹今古相傳皂角林之句萬花園在江都縣堡城内宋端平十三年制使趙葵即統制署為之壺春園在江都縣大市東宋寳祐志云東酒庫内有佳麗樓稱郡康處即此影園在江都縣明鄭元勲别業崇禎庚辰夏園中黄牡丹盛開廣集名流讌賦南海黎遂球作稱第一元勲貽以二觥一時稱盛東園在儀徵縣東翼城内宋皇祐間侍御許元建中有澄虚閣清讌堂共樂堂拂雲亭諸舊蹟附宋歐陽修真州東園記真為州當東南之水㑹故為江淮兩浙荆湖發運使之治所龍圖閣直學士施君正臣侍御史許君子春之為使也得監察御史裏行馬君仲塗為其判官三人者樂其相得之歡而因其暇日得州之監軍廢營以作東園而日往逰焉嵗秋八月子春以其職事走京師圗其所謂東園者来以示予曰圉之廣百畝而流水横其前清池浸其右髙䑓起其北䑓吾望以拂雲之亭池吾俯以澄虚之閣水吾泛以畵舫之舟敞其中以為清讌之堂闢其後以為射賔之圃芙蕖芰荷之的歴幽蘭白芷之芬芳與夫棘佳花羙木列植而交隂此前日之蒼烟白露而荆也髙甍巨桷水光日景動摇而下上其寛閒深靚可以答逺響而生清風此前日之頽垣斷塹而荒墟也嘉時令節州人士女嘯歌而管絃此前日之晦晏風雨鼪鼯鳥獸之嘷音也吾於是信有力焉凢圖之所載盖其一二之畧也若乃升於髙以望江山之逺近嬉於水而逐魚烏之浮沉其物象意趣登臨之樂覧者各自得焉凢工之所不能畵者吾亦不能言也其為我書其大槩焉又曰真天下之衝也四方之賔客往来者吾與之共樂於此豈獨私吾三人者哉然而池䑓日益以新草樹日益以茂四方之士無日而不来而吾三人者有時而皆去也豈不眷眷於是哉不為之記則後孰知其自吾三人者始也予以為三君子之材賢足以相濟而又協於其職知所後先使上下給足而東南六路之人無辛苦愁怨之聲然後休其餘閑又與四方之賢士大夫共樂於此是皆可嘉也乃為之書梅園在儀徵縣西十五里中有古意亭宋嘉定間郡守吳機建衆樂園在髙郵州郡圃宋郡守楊蟠所作堂曰時燕豐瑞閣曰摇輝玉水䑓曰華胥亭曰明珠四香序賢庵曰塵外迷春唐郡圃在江都縣唐開元間有杏數十株花時如錦太守張晏立館其下曰争春後人號圃曰杏村芍藥圃在江都縣禪智寺前宋韓琦守郡圃中發金帶圍四朶非常種也讌時王珪為監郡王安石為幕官陳升之初授衙尉丞過此亦與焉各簮其一後四公相繼登宰輔白沙鎮今儀徴縣治南唐徐温自金陵來朝因改白沙為迎鑾鎮二十四橋在甘泉縣隋置皆以城門坊市為名後周顯徳四年韓令坤築州城分布阡陌别立橋梁所謂二十四橋者或存或廢不可得而考矣唐杜牧之寄韓判官詩二十四橋明月夜玉人何處教吹簫宋歐陽修詩都將二十四橋月換却西湖十頃秋桑里在江都縣西南二十里宋大明三年沈慶之攻竟陵王誕於廣陵宋主命於桑里置烽火即此嵇家莊在髙郵州東南十五里宋末嵇聳迎文天祥於家事之甚謹復使其子與客伴送至泰州天祥得由通州航海達閩天祥再至嵇家莊詩云小泊嵇莊月正絃莊官驚問又何船今朝哨馬灣頭出又在青山大路邉三阿在髙郵州西八十里即北河鎮在晉為三阿謝安破苻堅將彭超之地唐為下阿徐敬業屯兵於此公路浦在甘泉縣伏滔北征記云袁術自九江來奔袁譚於下邳經此因名胥浦在儀徵縣西十里源自小銅山東南流至城西入於江舊有伍子胥廟浦因名俗傳子胥解劍渡江處見吳越春秋鬬鴨池在江都縣漢江都易王故姬李陽華嘗畜鬭鴨於池上磨劍池宋寳祐志云隋鑄錢監在磨劍池之西九曲池在甘泉縣隋煬帝欲幸江都命樂人撰水調九曲建木蘭亭於池上按節歌之因名九曲池雷塘在甘泉縣亦曰雷陂漢江都王建逰雷陂即此唐武徳中改𦵏隋煬帝於雷陂南平岡上元蘇大年詩云雷塘春雨綠波濃古塚寒烟蔓草空斜日欲沉山色近行人無處問隋宫郭欒潭在泰州東北十八里港口市相傳唐時有郭欒二氏居此相為婚姻欒於積薪下得卵殻大如斗以貯米錢皆不竭郭假之不還一日欒氏釜中躍生魚卜之家當陷晨具舟逃去而風雷大作惟遺一織女與郭氏俱陷其地遂成潭每聞潭下有織機聲後為立龍魚廟隋堤在江都縣隋大業初開䢴溝入江渠廣四十步㫄築御道樹以楊栁時謂之隋堤唐劉禹錫詩揚子江樓烟景迷隋家宫樹拂金堤龍舟堰在江都縣南二十里揚子橋西魏主丕臨江試龍舟於此因名蓮花垜在興化縣安仁鄉舊傳有嫂姑刈稻姑堕水嫂援之俱溺瘞道傍塚忽生蓮數朶里人驚異啟視之乃從口出遂稱蓮花垜歐陽戍在儀徵縣東北十里水經注云邗溝水上承歐陽引江入埭六十里至廣陵城即此梁陳間陳霸先與侯景戰屯之地𤓰步井在江都縣𤓰步山相傳魏主燾所鑿又煉丹井在古儀徵觀後玉勾井在江都縣蕃釐觀後名勝志云昔有黄冠持畵軸見守帥畫中字皆雲章鳥篆不可識既去使人尾其後至后土祠井而沒乃使獄囚縋下視之見一洞署曰玉勾洞天蜀井在甘泉縣蜀岡上禪智寺側其泉脉通蜀江相傳有僧洗鉢蜀江失之從此井浮出僧遊揚識之水味甘冽蘇軾曽取大明泉較之以為不如也題為第一泉玉女井在髙郵州西南樂徐道人郟道光與一女居井旁煉丹同日上升澡絲井在泰州東䑓場西谿鎮相傳漢董永偕天女往傭時汲此井以澡絲水源廣不竭每蠶熟時井有白草根長丈餘如絲然徐州府彭城在府東南尭封彭祖於彭城號大彭氏國於此水經注云大城内有金城東北又有小城小城西又有一城大司馬琅琊王所修元和志云州内城貞觀五年築其外城即古大彭氏國也舞陽城在府西北五十里漢封樊噲為舞陽侯城此或曰即濮陽之訛垞城在府北三十里北面臨泗水元和志云故垞城在彭城北二十六里或曰古崇侯國州志云今謂之榮城明嘉靖末黄河北徙城遂為漕黄交㑹之衝後河口東移榮城乃為内險吕梁故城在府東元和志云吕梁故城在彭城縣東五十七里即故吕縣也城臨泗水其東二里有三城一在水南一在水中東上一在水北並髙齊所築立鎮以防陳冦又吕城東十里吕梁洪上有二城一曰雲夢一曰梁王土人謂雲夢為韓信梁王即彭越又洪西岸有尉遲城唐尉遲敬徳督徐州嘗鑿吕梁洪因築此城曹公故城在府東南六十五里吕梁東岸或言曹公築此以圗吕布西岸又有城臨水是布之所固也號曰吕布固魏書地形志云吕布自下邳與曹公相持築城於此城上有戰䑓亦布所築彌黎城水經注云彭城西南有彌黎城新志云縣南太山傍有迷劉城盖彌黎之訛也曹馬城在蕭縣舊城西北中有古塔相傳曹操曽駐馬於此郭城在蕭縣西南二十五里相傳後周太祖所築南畿志云方二千三百步扶陽城在蕭縣西南五十里漢丞相韋賢封邑於此又見亳州蕭子國城在蕭縣治西北城臨古汴城邑攷云古蕭國城一名黄楊城亦謂北城在舊城北二十里古縣皆治此宋時河決徙治南城明萬歴五年沒於水乃遷今治去舊城十里杼秋城在蕭縣西七十里漢置後漢書云杼秋縣名屬梁國光武封劉般為侯於此狐父城在碭山縣西南三十里史記云曹參撃秦將司馬尼於碭東破之取碭狐父即此亦名狐父聚梁城在碭山縣城内漢以秦碭郡為梁國梁孝王增築之今縣治居其東北隅碭縣故城在今碭山縣南秦置即今永城界之保安鎮下邑故城在今碭山縣東三里秦置安陽故城在碭山縣東北二十五里春秋時麻城也後魏置安陽縣魏收志云安陽縣治麻城是也今為麻城集香城在碭山縣南水經注云碭陂中有香城司馬城在豐縣西北三十五里漢浮陽侯司馬耀所封邑有鐡碑邀帝城在豐縣西南二十里漢髙帝征黥布過沛沛父老送至豐西力請復豐帝從之因名其城曰邀帝亦曰邀駕城偃王城在豐縣北五十里相傳徐偃王所築仲虺城在沛縣南四十里半屬府境相傳仲虺居此晉地道記云仲虺城在薛城西三十里俗名斗城廣戚故城在沛縣東五里泗河之東漢為廣戚侯國莽居攝元年奉孺子嬰為漢嗣改縣曰力聚明嘉靖中又於此築城曰沽頭城舊有沽頭牐三今皆圮泗水舊城在沛縣治東秦以沛為泗水郡治湖陵城在沛縣西北五十里與山東魚䑓縣接界故宋邑秦置縣今為湖陵牐去廟道口十八里運河所經也又有灌城在縣西北二十里相傳漢將灌嬰所築又泗河東岸有舊城相傳張士誠所築留縣故城在沛縣東南五十里春秋曰㐮公元年楚子辛侵宋吕留杜預注云彭城郡之吕城留城也秦置縣漢封張良為留侯國於此下邳城在邳州東三里春秋時邳國應劭曰邳在薛後徙於此故曰下邳秦置下邳縣漢封韓信為楚王都此寰宇記云下邳有三城大城中城吕布築小城石崇築良成故城在邳州北六十里春秋云昭公十三年晉侯將㑹吳子於良是也漢封魯安王子文徳為良成侯國於此後為縣北齊省隋志云有良城縣乃故武原縣非良成也武原故城在邳州西北百里勝陽山西泇口社漢置縣柤口城在邳州東北春秋云諸侯㑹吳於柤是也水經注云沐水東南經柤口城東合祖水余行城在邳州北八十里受賢鄉元季平章王信築俗稱為余行省城下相城在宿遷縣西界輿地廣記云宿遷秦下相地應劭曰相水出沛國相縣於水下流置縣故曰下也今縣西七里有下相社又有項王故城在運河西三里凌縣故城在宿遷縣東南五十里秦置凌縣漢為泗水國水經注云泗水東經凌柵南即舊凌縣治也宿預故城在宿遷縣東南漢置厹猶縣晉改置宿預司吾故城在宿遷縣北春秋時鍾吾國漢置司吾縣應劭曰鍾吾國即司吾也魏時訛曰峒峿水經注云司吾城在司吾山東寰宇記云峒峿鎮在今縣西北七十里司吾故鄉樊階城在宿遷縣西北亦作樊諧通鑑云宋秦始元年沈攸之退保樊階城是也古城在睢寜縣西北七十里俗名瞻王城南畿志云在宿遷治西五里相傳項羽所築又有新城在縣東北五十里南畿志云韓平章守禦邳州所築九城在睢寧縣東北二十五里有東西二城取慮城在睢寜縣西南秦置縣漢志云汝南步游張為取慮令即此小市門即府城通汴門北史云世祖至彭城登亞父塚以望城内遣宋隊主蒯應至小市門宣詔勞問江夏王義恭即此白門即邳州大城之門元和志云下邳縣即古邳國城城有三重大城周廽十二里半魏武擒吕布於白門即大城之門也中城周四里吕布所守小城累磚堅峻周二里許晉北中郎將荀羡郄曇所治西南又有一城石崇所築也輿地志謂白門在徐州南門詳見辨訛沛縣舊治在今沛縣北秦置縣為泗水郡治漢為髙祖湯沐邑後以屬沛郡謂之小沛水經注云泗水經沛東合黄水又南經小沛縣東寰宇記謂徵山下有故沛城即小沛也陽平故郡在府北魏收志云南陽平郡治沛南界後寄治沛城隋志云周併南陽平郡入彭城晉寧故郡在宿遷縣東南晉置永固舊縣在蕭縣東南四十里永固山下元至大間置縣於此今為永固鎮睢陵故縣即今睢寜治漢為侯國後為縣西楚故宫在府治内宋時猶存俗呼為霸王殿沛宫在沛縣東南二十里漢髙帝宴父老於沛宫即此史記云孝惠五年以為髙祖原廟附唐栁宗元沛上原廟碑銘昔在帝尭光有四海元首萬邦時則舜禹稷卨佐命垂統股肱天下聖徳未衰而内禅元臣繼天而受命四姓承休迭有中邦五神還運炎徳復起周道削㓕秦徳暴戾皇天疇庸審厥保承乃命唐帝之後振而興之又俾元臣之後翊而登之所以紹復丕績不墜厥祀故曲逆起為策士輔成帝圗吐謀洞靈奮竒如神舜之胄也汝隂脫帝網推陷暴氣扶乗天休運行嘉謀禹之苗也鄼侯保綏三秦控引漢中宏器廓度以大帝業卨之裔也淮隂整齊天兵𨗳揚靈威覆趙平魏拔齊殄楚平陽破三秦收魏王絳侯定楚地固劉氏皆稷之裔也克復尭緒昭哉甚明天意若曰建大徳者必唐帝之胄故漢氏興焉翼炎運者必唐臣之孫故羣雄登焉是以高帝誕膺聖祚以垂徳厚探昊穹之粤㫖載幽明之休祐殺白帝於大澤以承其靈建赤旂於沛邑以昭其神假手於嬴以混諸侯馮力於項以離闗東奉纉尭之元命而四代之後咸獻其用徳乗木之大統而秦楚之盛不保其位既建皇極設都咸陽撫正四方訓齊天下乃樂沛宫以追造邦之夲乃歌大風以昭武成之徳乃奠舊都以壯王業之基生為湯沐邑沒為思樂之地且曰萬嵗之下魂游於此惟兹原廟沛宫之舊也祭蚩尤於是庭而赤精降𨗳靈命於是邦而羣雄至登布衣於萬乗而子孫得以纉其緒化環堵為四海而黎元得以安其業基岱岳之髙源洪河之長蓄靈擁休此焉發跡盖以道備於是而後行之天下制成於是而後廣之宇内天下備其道而神復乎本宇内成其制而心懐其舊宜其正名以表功用成其始俾生靈盡其敬焉陳本以宅神用成其終俾生靈盡其慕焉故髙帝定位建兹閟宫惠皇嗣服爰立清廟綿越千祀至今血食此所以成終而成始也且夫以斷蛇之威安知不運其宻用佐嵗功以流澤歟以約法之仁安知不流其神睠相舊邦之遺黎歟以紹唐之餘慶統天之遺烈安知不奮其神化大祐於下命土歟然則展敬乞靈烏可已也銘於舊邑以廸天其辭曰既蕩蕩明徳時維放勛登翼炎運唐臣之孫秦綱離鹿駭東夏長蛇封豕蹈躍中野天復尭緒鍾祐於劉赫矣漢祖播兹皇猷揚旂沛庭約從諸侯豪暴震疊威聲布流總制虎臣委成良疇勦殄霸楚遂荒神州區宇懐濡黔黎輯柔表正萬國炎靈用休定宅咸陽以都上游留觀本邦在鎬如周穆穆惠皇宗禋克承崇崇沛宫清廟是憑原念大業肇經兹地方專元命亦舉嚴祀建旂釁鼓遂據天位魂遊故都永介丕祚煥列唐典嚴恭罔墜勒此休銘以昭本始利國監在府東北盤馬山下接沛縣界漢元封初從桑𢎞羊請於沛縣立鐵官唐置秋邱冶宋初升為監以董其事舊志謂蘇軾所建誤寳豐監在府治東宋元豐六年置鑄錢局於此八年廢燕子樓明一統志云在城西北隅南畿志云在州廨中唐貞元中徐州節度使張愔妾闗盼盼所居黄樓在府城東門上宋熙寜中蘇軾建附宋蘇轍黄樓賦熙寜十年七月乙丑河決於澶淵東流鉅野北溢於濟南溢於泗八月戊戌水及彭城余兄子曕適為彭城守水未至使民具畚鍤蓄土石積蒭茭完窒隙穴以為水備故水至而民不恐自戊戌至九月戊辰水及城下者一丈八尺塞東西北門水皆自城際出雨晝夜不止子瞻衣䙝履屨廬於城上調急走發禁卒以從事令民無得竊出避水以身率之與城存亡故水大至而民不潰方水之滛也汗漫千餘里漂廬舍敗塜墓老弱蔽川而下壯者狂走無所得食槁死於丘陵林木之上子瞻使習水者浮舟楫載􅟿餌以濟之得脫者無數水既涸消朝廷塞澶淵未暇及徐子瞻曰澶淵誠塞徐則無害塞不塞天也不可使徐人重被其患乃請増築徐城相水之衝以堤防之水雖復至不能以病徐也故水既去而民益親於是即城之東門為大樓焉堊以黄土曰土能勝水徐人相勸成之轍方從事於宋登黄樓覧觀山川弔水之遺迹乃作黄樓之賦其辭曰子瞻與客逰黄樓之上客仰而望俯而嘆曰噫嘻殆哉在漢元光河決瓠子騰蹙鉅野衍溢淮泗梁楚受害二十餘嵗下者為汙澤上者為沮洳民為魚鼈郡縣無所天子封祀泰山徜徉東方哀民之無辜流死不藏使公卿負薪以塞宣房瓠子之歌至今傷之嗟維此邦俯仰千載河東傾而南洩蹈漢世之遺害􅊶原隰而為一窺吾墉之摧敗吕梁齟齬横絶乎其前四山連屬合圍乎其外水廻洑而不進環孤城而為海舞魚龍於隍壑閲㠶檣於睥睨方飄風之􅌺發震鞞鼓之驚駭誠蟻穴之不救分閭閻之横潰幸冬日之既廹水泉縮以自退棲流枿於喬木遺枯蚌於水裔聼澶淵之奏功非天意吾誰賴今我與公冠冕裳衣設几布筵斗酒相屬飲酣樂作開口而笑夫豈偶然也哉子瞻曰今夫安於樂者不知樂之為樂也必渉於害者而後知之吾嘗與子慿兹樓而四顧覧天宇之𢎞大繚青山以為城引長河而為帶平臯衍其如席桑麻蔚乎斾斾畫阡陌之縱横分園廬之向背放田漁於江浦散牛羊於烟際清風時起微雲霮䨴山川開闔蒼莽千里東望則連山参差與水皆馳羣石傾奔絶流而西百歩涌波舟楫分披魚鼈顛沛沒人所嬉聲崩震雷城堞為危南望則戲馬之䑓巨佛之峯巋乎特起下窺城中樓觀翺翔巍峩相重激水既平渺莽浮空駢洲接浦下與淮通西望則山斷為玦傷心極目麥熟禾秀離離滿隰飛鴻羣往白鳥孤沒横烟澹澹俯見落日北望則泗水湠漫古汴入焉滙為濤淵蛟龍所蟠古木蔽空烏鳥號呼賈客連檣聨絡城隅送夕陽之西盡𨗳明月之東出金鉦湧於青嶂隂氛為之辟易窺人寰而直上委餘彩於沙磧激飛楹而入户使人體寒而戰慄息洶洶於羣動聼川流之蕩潏可以起舞相命歡飲千石遺棄憂患超然自得且子獨不見夫昔之居此者乎前則項籍劉備後則光弼建封戰馬成羣猛士如林振臂長嘯風動雲興朱閣青樓舞女歌童勢窮力竭化為虚空山髙水深草生故墟盖将問其遺老既已灰滅而無餘矣故吾將與子弔古人之既逝憫河決於疇昔以變化之無在付杯酒於終日於是衆客釋然而笑頽然而醉酒傾月墜扶携而出陳師道黄樓銘熙寜十年京東路安撫使臣某轉運使臣某判官臣某稽首言河決澶州南傾淮泗彭城當其衝夾以連山扼以吕梁流泄不時盈溢千里平地水深丈餘下顧城中井出脉發東薄兩隅西入通洫南壊水垣土惡不支百有餘口而後已守臣蘇軾念惟流亡為天子憂夙夜不怠以勞其人興發戍兵固敝應卒外為長橋乗髙如虹以殺其怒内為大堤附城如環以持其潰築二坊於南門之外以適南山以安危疑發倉庾明勸禁以恵困窮以督盜賊宣布㤙澤廵行内外吏民嚮化興於事功法施四邑誠格百神可謂有功矣宜有褒嘉以揚郡縣十月二日甲子奏京師明年元豐正月甲子制誥諭意臣軾惟念祗承謨訓人神力同敢自為功以速大戾而明揚褒奨無以報稱乃作黄樓於東門具刻明詔以承天休而明徳意使其客陳師道為之銘臣師道伏惟吕尚南仲内撫百姓外平諸侯詩羙文武伊甫召虎南征北伐功歌宣王君能使人以盡其才君之明也臣能有功以報其上臣之義也君臣各盡其道以惠斯民國之福也世之幸也臣師道又惟感而通之者道也行而化之者徳也制法明教之者政也治人成功者事也昔之詩人歌其政事則并其道徳而傳之聲名而播之後王有則可舉而行之顧臣之愚何與於此誠樂其君臣之盡道云爾臣不佞昧死上黄樓銘其詞曰時皇治惟戒修明法度協和隂陽十有一年天災行河失其防齊魯梁楚千里四達潰亂散亡皇仁隐憂臨遣信臣以惠東方嬴老不窮安慰撫飬發散積倉流人如歸居人㤀危完聚靡傷天叙地平明聖成能人神效􅖤靈平告戒百穀豐盈萬邦樂康郡縣祗畏允廸聖謨終事無荒皇功不居歸休臣民邇昭逺揚守臣拜手夸大休嘉使民不忘改作黄樓以臨泗上述修故常庻民無佞原始要終銘之石章以告成功以揚徳聲永永無疆快哉亭在府城東南即唐薛能陽春亭故址宋熙寜中李邦直持節徐州建此郡守蘇軾易名曰快哉放鶴亭在雲龍山西麓宋張天驥築右有古井名飲鶴泉蘇軾有放鶴亭記蘇墨亭在府東南百步洪洲上明成化中主政尹珍於洪東崖亂石間得石刻一上書郡守蘇軾山人張天驥詩僧道潜月中遊十六字盖軾守徐時筆也因建亭百洪之洲名曰蘇墨嘉靖間李汝蘭葺之黍丘亭在碭山縣南左傳云宋圍曹曹伯陽築五邑於其郊有黍邱杜預注曰下邑縣西南有黍邱亭齧桑亭在沛縣西南戰國策云張儀及齊楚之相㑹於齧桑即此徐廣曰齧桑在梁與彭城間泗水亭在沛縣東南里許漢髙祖為亭長即其地附漢班固沛水亭碑銘皇皇聖漢兆自沛豐乾降著符精感赤龍承鬿流裔襲唐木風寸天尺土無竢斯亭建號宣基維以沛公揚威斬蛇金精摧傷渉闗陵郊係獲秦王應門造勢斗璧納忠天期乗祚受爵漢中勒陳東征剟擒三秦靈威神祐鴻溝是乗漢軍改歌楚衆易心誅項討羽諸夏以康陳張畫策蕭勃翼終出爵褒賢裂土封功炎火之徳彌光以明源清流潔本盛木榮叙将十八賛述股肱休顯運祚永永無疆國寜家安我君是升根生葉茂舊邑是仍於皇舊亭苖嗣是承天之福祜萬年是興髙遷亭在邳州界後漢封尚書令周承為髙遷亭侯十三州志云下邳縣有髙遷鄉昇仙亭在邳州治南相傳州人劉綱於此仙去後人築亭立嗣戯馬䑓在府城南一里項羽因山築䑓以觀戲馬晉義熙中劉裕在彭城九日大㑹賔僚賦詩於此今為䑓頭寺有故塔在焉平䑓在碭山舊縣東漢梁孝王大治宫室為􅃨道自宫連屬於平䑓三十里唐為燕喜䑓南畿志云城東五十歩䑓上有石刻三大字相傳唐李白筆按李白有秋夜與劉碭山泛燕喜亭池詩厭氣䑓在豐縣城内縣治東始皇東逰築以厭王氣者附宋王禹偁厭氣䑓銘古之王者築靈䑓視雲物察氣候之吉㓙知政教之善惡茍理合天道垂休降貞則必日新其徳以奉之化失民心為妖作沴則必夕􅅥其躬以懼之如是則變禍福而反災祥不為難矣烏有築髙䑓厭王氣行巫覡之事禦天地之災者乎嬴政之有天下也始以利嘴長距雞鬬六國而擅塲復以鉤爪鋸牙虎噬萬方而食肉終以多蔵厚歛蠶食兆民而富國然後成五嶺築阿房驅周孔之書盡付回祿惑神仙之術但崇方士收大半之賦則黔首崩分用慘刻之刑則赭衣櫛比鯨鯢國政螻蟻人命原膏野血風腥雨羶六國嗷嗷上訴求主天將使民息肩於炎漢故望氣者云東南有天子氣於是祖龍廵狩築䑓以厭之殊不知民厭秦也訴之於天天厭秦也授之於漢秦獨厭天厭民而自王乎向使築是䑓告天引咎遷善樹徳封六國之嗣復萬民之業薄賦歛省徭役銷戈鎔兵最稼穡除髙斯之暴政修唐虞之墜典下從人望上答天意則王氣不厭而自銷矣劉項之族何由而興哉某逰豐之沛間覩䑓之舊址思古覧今悵然有懐灑翰濡毫遂為之銘曰䑓之築兮救秦之衷厭之不得為漢之基氣之厭兮慮漢之昌厭之不得速秦之亡秦之厭漢其惟一身漢之厭秦乃有萬民髙䑓巍峩王氣氤氲秦政已矣漢徳為新泱泱前古茫茫後塵故國蕪沒荒䑓草蓁行人環竦惻愴斯文歌風䑓在沛縣治東南舊有亭在泗水西岸碑刻漢髙祖大風歌亭久傾圯明成化間移於縣東南射㦸䑓在沛縣南門西後漢袁術攻劉備於沛吕布馳往救之曰諸君觀布射㦸中小枝便當解去一發果中䑓以此名䑓上有蜀先主廟逍遥堂在府治後蘇軾為守時與弟轍㑹宿於此各有詩楚山堂在府城北元錢光弼為平江路總管時建拱翠堂在蕭縣聖泉山中宋竇敦禮建彭祖宅在府治西北隅宅舊有井唐皇甫冉詩舊井苔近寢堂是也又城東為彭祖樓方輿勝覽云汴泗二水經彭城縣彭祖樓之側漢髙祖舊宅在豐縣中陽坊漢髙紀云沛豐邑中陽里人述征記謂在豐水東九十里當作九里蕭何宅在豐縣東門城下盧綰宅在豐縣城西北隅綰與髙祖同里封燕王宋建炎中改為永寜寺大彭館在府西南唐時驛傳所經亦為迎餞之地以古大彭國為名咸通間龎勛陷彭城執觀察使崔彦曾於大彭館即此梁園相傳在碭山縣平䑓下梁王育飬禽獸之所李白詩作梁苑枚乗賦作菟園謝惠連賦髙適詩作園樊巷在沛縣歌風䑓北即樊噲所居斷碑猶存又有樊井在南門外相傳屠狗處紅亭鄉在蕭縣西北左傳云昭八年大蒐於紅杜預注曰蕭縣西有紅亭水經注謂之鴻溝亭因鴻溝水爲名寰宇記謂之洪亭皆聲相通也亷里在府西北有龔勝宅漢書云龔勝居彭城之亷里彭城三里彭城劉氏同出楚元王後宋武帝時劉氏分為三里以别帝族左將軍劉懐肅居安上里豫州刺史劉懐武居叢亭里宋氏帝族居綏輿里蕭縣有綏輿山即其地孟徙里在彭城一名瀆上漢韋孟所居午溝里在碭山縣東北接豐縣界後梁太祖始生之地嘗改為衣錦鄉伍貟里在宿遷縣北七十里桃溝崖項羽里在宿遷縣舊治北一里梧桐巷懸水村在府吕梁洪莊子云吕梁懸水三十仞故名雍門村在府東南五十里戰國時雍門周彈琴見孟嘗君此其故居閔子村在蕭縣城南朱陳村在豐縣東南百里宋蘇軾有題朱陳村嫁娶圖詩枌榆社在豐縣東北十五里漢髙祖初起禱枌榆社後四年天下悉定詔令豐治枌榆社以時祀之顔師古注云以樹為社神也伏道在豐縣東北城下秦始皇東逰以厭王氣至豐漢髙祖即自疑乗夜潜出遁芒碭山至今道中荆棘皆順生圯橋在邳州治東南隅年乆水沒元和郡志云下邳有沂水號長利池池上有橋即黄石公授書之地東楚謂橋為圯漢書云張良歩下邳圯上俗呼圯橋疉文之誤也焦墟在邳州東宋泰始三年沈攸之援下邳屯軍焦墟即此寒山堰在府東南十八里梁蕭淵明伐魏嘗於此壅泗水以灌彭城蘇堤在府城東南宋蘇軾守郡時河決匯城下築長堤障之石崇牐在宿遷縣東南三十里故址尚存楚王井在府西楚王山之南漢楚元王時鑿其井九十有九栁公井在豐縣西門外公名毅舊立廟有碑琉璃井在沛縣里許深不可測其味甘冽世傳漢髙帝所鑿葛洪井在邳州葛嶧山頂世傳葛洪煉丹於此又舊州治西南有項羽井州北有漆井相傳石崇所鑿孝感泉在蕭縣舊城中唐主簿宋思禮事繼母孝大旱母羸疾禱此得泉飲之即愈尉栁晃為刻石頌其孝感古墓銘在府治髙流之為刺史河決城壞得一墓銘曰死後三百年背後生流泉頼有髙流之遷吾上髙原流之為造棺槨改塟焉古鼎明萬歴二十八年秋沛縣北朱氏掘地得鼎中注五銖錢甚多因舁置學宫石刻竹宋蘇軾筆刻竹二枝於二小石上今嵌沛縣學宫大門東西壁上太尉陳球碑在邳州有二附宋洪适䟦漢故太尉陳公之碑篆額陳公名球下邳淮浦人三剖郡符五入卿寺再為三公靈帝光和二年卒本傳載球令繁陽郡守求賄不獲趣督郵令逐之督郵不可曰魏郡十五城獨繁陽有異政乃止桂陽賊李研陸梁荆部州郡懦弱不能禁太尉楊秉表為零陵守期而賊散州兵朱盖反與桂陽胡蘭轉攻零陵編木為城不可守備掾史白遣家避難球怒曰復言者斬乃悉内吏人老弱與共城守私揉木為弓相距十餘日㑹救至賊破詔拜一子為郎熹平元年為廷尉曹節欲别塟竇太后詔公卿大㑹朝堂球忠憤奮發抗議不撓奸佞為之退聼史載其事六百餘言光和二年為永樂少府與司徒劉郃謀誅宦官事洩下獄死史載其事又三百餘言大凢碑碣率與史傳牴牾球之二碑獨繁陽事迹不同所書零陵平賊事雖破石文缺其存者皆與傳合至廷尉永樂時則一辭不措故熹平之議光和之謀咸無焉殆有所畏而然也嗚呼東漢閽寺之盛人主拱手君子䘮氣然剛毅之士寜接踵以赴死不詘身以媚竈故漢道雖曰陵遲無法度紀綱可以慿藉而能立國又百餘年者皆忠臣義士之力也漢志雒陽城有中東門上東門後碑亦作中東城門此碑云換東城門後殆省文也左傳虞閼父為周陶正而此作遏父陳敬仲至齊為工正掌百工之官也而此作公正太尉橋公而此作喬皆借用也又後碑䟦漢故太尉陳公之碑篆額公既不得其死門人或畏憚凶熖必不敢立石雙表也兩碑之前幾二百字可讀其未則文字凋落如晨星相望豈其間蓋有憤懟哀切之語後來亦有所懼而剔之乎漢人𨽻法有所謂省文者如爵之為鶴之為寉是也經傳多書蟻作蛾似亦是省文左傳蛾析戴記蛾子時術列子未聚禽獸蟲蛾黄帝紀淳化鳥獸蟲蛾元帝紀白蛾羣飛蔽日長楊賦扶服蛾伏皆讀蛾為蟻𨽻釋中秋下旬碑有蛾附之句此云蜂聚蛾動亦蟻省也試劒石在豐縣漢髙祖廟内有石髙三尺餘中裂如破竹不盡者寸許太倉州塗松城在州東北三十五里七浦南舊為塗松鎮宋元豐間去鎮為市張士誠築城設營於此今廢崇明舊城在崇明縣治東北本通州海濵地唐武徳間海中湧出二洲謂之東西二沙所積髙廣魚樵者依之遂成田廬楊吳因置崇明鎮於西沙宋天聖三年續漲一沙與東沙接建炎間姚劉二姓避居之因名姚劉沙建中靖國初又湧一洲於西北即今之三沙也嘉定中於姚劉沙置天賜鹽塲元至元十二年升姚劉沙為崇明縣改崇明鎮為西沙以屬之後縣治凢五遷其前三治城郭里居半歸烟海惟平洋沙城遺址猶彷彿云塢城在嘉定縣南越絶書云婁門外有鴻城者故越王城也去吳縣一百五十里姑蘇志謂在嘉定縣南五十里吳淞江南相傳吳王所築鴻塢字相類道里亦相近葢即一城也疁城在嘉定縣南門外即唐之疁城鄉也元設教場於此一名疁塘又避吳越王諱遂易名曰婁塘滬瀆城在嘉定縣西南四十里晉隆安二年袁山松為吳郡太守時築以備孫恩今半毁江中太倉即今州治相傳孫吳置倉於此舊名東倉元至元十九年建海運倉於此是時海外諸畨交通市易謂之六國馬頭舊無城張士誠始築城守禦明洪武中置太倉衛𢎞治十年始割崑山常熟嘉定三縣地置州即故酒庫司為州治按太倉緣始舊説各異詳見城池後軍厰在嘉定縣東南三十五里宋韓世忠曽駐軍於此滄江風月樓在州城北巷口墨妙亭在州淮雲寺元顧信得趙孟頫書即摹石構亭覆之名曰墨妙趙書又有歸去來辭送李愿歸盤谷序石刻在儒學内畏壘亭在嘉定縣安亭鎮歸有光讀書其中名曰畏壘自為記婁曲草堂在鎮洋縣武陵橋下殷奎所居又有春水船最勝為奎讀書處農隠堂在嘉定縣黄姑塘龔昱與陸游劉過吟咏唱和處嘉樹堂在嘉定縣北三十里練祈塘宋強氏所居强先世贇自汴居吳手植嘉木如皂莢二百餘年物也致美堂在嘉定縣歸有光所居也堂前有二石歸有二石歌芝秀軒在州元馬廷玉所居虞集書額李光孝撰記楊維貞撰歌辭時稱三絶江雨軒在鎮洋縣東北五十里茜涇元偶桓所居瑞竹軒在嘉定縣集仙宫元大徳中道士孫應元以枯竹架薔薇竹忽叢茂成林因名其軒曰瑞竹團溪魚樂亦名樂隠園在州沙頭鎮元瞿逢祥隠居處楊維貞記李重發隠居在崇明縣姚劉沙周氏園在州普福寺後周棠創又築七岡在雙鳳菽園在州城西南隅明徳坊明參政陸容所構相近又有錦溪别墅明參政陸築東園在州東門外王錫爵家園水石亭榭皆一時名流所布置其孫時敏加葺焉弇山園在鎮洋縣隆福寺西明王世貞家園廣七十餘畝中疉三峰曰上弇中弇下弇極亭榭卉木之勝又有澹圃世貞弟世懋所築譚氏園在嘉定縣月浦上亭館卉木俱勝秬園在嘉定縣晏海門内侯峒曽之東園也梅村在州太倉衛西王士騏舊業夲名賁園國朝吳偉業拓而新之易今名歸村在州西十二里王時敏别業附吳偉業歸村躬耕記吾友王烟客奉常治西田於歸涇之上歸涇者去城西十有二里或曰先有歸姓者居焉或曰以其沿吳塘而北可歸也故名之烟客自號歸村老農築農慶堂以居而以告其友人曰吾年六十盖已老矣將躬耕乎此聞者疑之曰古之為耕者以其有耕者之樂也土膏陸海畝乃一鍾芍陂白渠灌及萬頃故有築堤作塘開田引瀆役使數千家此羙田上腴者之樂也若夫陸渾山中褒斜谷口平疇廣野出於孤峰疉嶂之巔屏棄世事隔絶人代架幽壑以立屋焚深林而糞田此髙山窮谷者之樂也烟客自奉常謝政幅巾里門有城中賜第以安起居有近郊别墅以娛杖履圗書足以供朝夕之翫賔客足以接談笑之樂又何必去城市謝朋舊以樂此躬耕為也烟客曰不然此田是先朝禄賜之所遺也是先相國文肅所以貽子孫也往者神廟之世海内乂安生民不見兵火江以南大臣之致政家居者羙田宅盛其舍厚自奉飬而吾祖惟得海濵寢邱之地以供饘粥蕭閑杜門不知家人生計性愛田野嗜花藥開種竹之圃於東郊築藝菊之亭於北郭而猶患過客之跡我也晚嵗璽書存問郡邑大夫執板而賀謁者車塡馬咽而吾祖命小舟檇短策逍遥於南陌北阡遇者不知為三公也即今三十餘年而韋相之莊籬落猶存陸生之田桑麻如故舊老遺民尚有過而歎息者吾為人子孫忍使茀而不治乎且吾受前人餘澤奉車省闥陪祀陵園以及親郊視學大閲耤田無不具簮笏以從已而持節啣命渡錢塘入豫章渉沅湘踰閩嶠足跡幾丰天下世故流離衰遲頽暮猶得守先疇之􅅵畝以送餘齒退而與田夫野叟談昇平之遺事叙生平之舊㳺不亦幸歟若夫歌舞陸博通飲食侈逰觀下至逐什一之利競錐刀之末者非吾之所樂也吳偉業聞之曰追述祖徳禮也保素節而出流俗義也其為躬耕也大且備矣是不可以不記黄姑村在州張涇闗渡東南三里相傳牽牛織女二星降其地織女以金箆畫河水湧牽牛不得渡土人因立祠俗呼織女廟廟西有水名百沸河周公村在嘉定縣西南鄉巡撫周忱常歩村舍有老嫗預知將至治饌餉之今遂名其村新豐鄉在嘉定縣南三十六里宋咸淳中里民築土得石刻曰唐新豐鄉今之黄渡即其地練祁市今嘉定縣治本崑山縣之春申鄉地宋嘉定間割崑山西鄉之安亭并東鄉之春申臨江平樂醋塘凢五鄉就練祁要㑹之地置縣以年號為名水格分濤在崇明縣大洋中水分鹽淡淡水色白鹽水色黒淡水自西來鹽水自東至每潮轉濤分兩水相激聲若雷霆蝦港在崇明縣東三沙俗傳宋髙宗南渡至此有大蝦二湧水挟船出海因名仙人踪在嘉定縣南馬陸村有池如人跡水旱無盈縮楊涇在寳山縣西四十里土人楊九娘性至孝父命夜守桔橰為蚊嚙不易其處竟以羸死里人傷而祀之其地廣九里今絶無蚊鶴跡石在嘉定縣南翔講寺相傳里人掘地得石徑丈常有二鶴飛集其上寺以是興人謂為來鶴之祥佛耳泉在寳山縣月浦鎮浮信講寺内宋寳慶間建寺有僧道嵩鑿井得髹木佛耳甚異之因名佛耳泉今存菊花泉在寳山縣楊涇涇下有泉湧出飲之令人夀婁塘古松在嘉定縣婁塘鎮北野田中大可十圍横旦數畝相傳是宋時物西隐雙松在嘉定縣西隠寺大殿前有羅漢松二株大可合抱今殿燬松榮茂如舊古梧桐在嘉定縣七都浦陳氏墓大可兩合抱髙十丈數百年物也海舶在洋中百里外即見此樹古桂在寳山縣候氏宅髙數丈大數圍可䕃四五畝花時香聞十里外拗栲雙鍾元至正中二鍾随潮至崇明東沙岸旁相擊作聲土人取之一置夀安寺一置慈濟寺晨昏扣之皆作拗拷音海州朐縣故城在州東孔望山之西秦置漢書志注云秦始皇立石海上以為東門闗寰宇記云古盧王城在縣西九里即漢舊朐縣梁天監中魏將盧昶屯據此城故以為名艾不城在州東北田横避難漢使艾不追横所築後晉移贛榆縣於此北齊天保初省鍾離昧城在州南史記云項王亡將鍾離昧家在伊盧後漢志云朐縣有伊盧鄉元和志云在朐縣一百里其城即昧所築寰宇記云伊盧鄉亦名中盧盧石在東句盧在西故曰中盧古州城在州城東前接髙山後枕積水其山半壘石為城東南面海地理新書以為即古海州其山之巔為孔望山明御史黄國用建亭於上曰孔望亭南畿志云下有龍洞東有浴龍池古今題咏石刻甚多紀鄣城在贛榆縣東北七十五里左傳云齊伐莒莒子奔紀鄣杜預注曰贛榆縣東北有紀城即紀鄣也南北朝為戍守處水經注云游水自贛榆又東北經紀鄣故城南又東北入海祝其城在贛榆縣西南四十二里水經注云游水自羽山又北經祝其縣故城西縣東有夾谷浦莒城在贛榆縣西十五里水經注云㳺水自祝其又左經即丘故城莒子始起此後徙莒世謂此為南莒贛榆故城有二一在贛榆縣東北三十里者漢縣也元和志云亦名鹽倉城一在故東海縣北四十九里青山之隂者唐縣也元和志云隋末土人臧君相築利成故城在贛榆縣西六十里漢置水經注云游水自朐縣又北經利成故城東故利鄉也又曰武陽溝水東出倉山山有鹽官城即古利成也虎坑城在贛榆縣西南北朝置戍處抗金城在贛榆縣西南五十里宋時築界牆城在贛榆縣北六十里東際海西連山中城在沭陽縣西左傳云成九年城中城杜注曰厚丘縣西南有中城或曰即建陵縣厚丘故城在沭陽縣北六十里漢置建陵故城在沭陽縣建陵山下漢為侯國後魏置建陵縣隂平故城在沭陽縣西北六十里漢置懐文故城即今沭陽縣治本漢厚邱縣地東魏為沭陽郡兼置下城臨渣懐文服武等縣後周改懐文為沐陽舊縣城在沭陽縣南二里宋元嘉四年築土為城即下城廢縣浮營城在沭陽縣西二十五里又南營城在縣東南十五里黄軍營城在縣西南五里黒軍營城在縣西十五里東營城在縣南十里西北營二城在縣西北十里新興營城在縣西北三十里皆元至正間築武陵故郡在贛榆縣南五十九里魏置縣南有洛安鎮即故洛安縣也義塘故郡在贛榆縣西北近莒州界東魏武定七年置義塘郡治黄郭城領義塘歸義懐仁三縣寰宇記云歸義在縣北二十五里懐仁在縣西二十三里古辟陽城海西故縣在州南漢置曲陽故縣在州南漢置今為曲陽村東安故縣在州治西八十三里漢置東海故縣在州治東北古鬱洲也水經注云朐縣東北海中有大洲謂之郁洲後漢書志注云山海經曰鬱洲在海中一曰郁洲郭璞云在縣界世傳此山自蒼梧徙來上皆有南方樹木博物記云縣東北海邉植石秦時立之東門宋泰始六年置西海郡魏武定七年改曰東海舊有大小二城宋賈似道築今為東海營望梅樓在州治北宋王珪詩云城外滄溟日夜流城南山色近城樓景疏樓在州治東北石延年通判海州以州西北二古墓為二疏墓刻碑其旁後遂收入圗經建有景疏樓皆仍延年之誤也詳見辨訛聖化亭在州治西五十里夾谷山曬書䑓在贛榆縣西三十里子貢山俗傳端木子讀書於此龍且故壘在州治東北有大小二壘韓信下齊項羽遣龍且築壘於此海口故壘在州之黒土灣海口有古營壘大營在州治西五里元阿魯尚書攻圍海州時築昇仙墩在沭陽縣治東南二里紫陽真人昇仙處秦始皇碑在贛榆縣東地道記云海中去岸百九十歩有始皇碑長一丈八尺廣五尺厚八尺三寸一行十三字潮水至加其上三丈去則三尺見也落星石在贛榆縣北四十里隕星化石髙一丈白如玉東海大松在州東大海中相傳三代時物秀異竒古宋徐積有詩通州泰興舊城在泰興縣西北南唐昇元初析海陵置縣距今縣治四十里静海故縣今州治本漢海陵縣地後周顯徳中置通州以静海縣屬焉海門故縣在州東續文獻通攷云海陵縣東境其地為東㳍洲楊吳為東布鎮南唐置縣元明間歴經江海侵逼三徙治所國朝康熙十一年縣城圮於海遂廢入通州臨江故縣在如臯縣南本海陵縣地晉安帝置後周并入寜海縣古鄖邑在如臯縣北春秋云哀十二年衛侯㑹吳於鄖公及衛侯宋皇瑗盟杜預註曰鄖發陽也海陵東南有發繇口今縣北立發口盖其地又縣東十里有㑹盟原相傳吳楚㑹盟處攷春秋之世吳楚始終不聞㑹盟惟有衛侯㑹吳一事㑹盟原當指此海山樓在州治南城上宋大觀中州守朱彦建前有綠漪亭陳博古詩云門外海濤奔鐡騎檻前山背擁金鰲望江樓明正徳中州守夏邦謨建後郡人尚書馬坤重建於州南二里許名曰望江以備倭也萃景樓在州南狼山明嘉靖中同知舒纓建勅書樓在泰興縣治㕔前宋元豐中建宣和中重修棲雲閣在州狼山西宋咸寜中建輿地志云閣後即望仙橋宋王覿記謂仙人吕洞賔臥於雲中騰空去州人翹望之閣名因此三㑹堂在州狼山東北顧巨海南瞰長江吳楚勝槩一覽可盡宋提刑薛球太守臧師顔通判吳天常三人皆舊好㑹此因名胡瑗宅在如臯縣南十里俗名胡家莊芙蓉園在如臯縣南一里宋史聲奉其父逸叟居此萬花園在如臯縣治東三里元鎮南王世子建堂植萬花於此水繪園在如臯縣冐氏别業饒水竹之勝利豐監在州南三里古煎鹽之所宋太平興國中升為監管西亭豐利永興吕四石港利和金沙餘慶八塲雉臯如臯縣馬塘河岸也岸在水中名雉臯南畿志云即春秋賈大夫射雉之所集賢里在如臯縣儒學東宋王惟熙王觀王覿王俊乂相繼登第鄉人榮之因名其里狀元坡在如臯縣西北十里宋狀元王俊乂讀書院前地也放鶴田在州吕四塲境相傳吕洞賓四逰於此故以名塲放鶴田即其遊處海門島在州東南海中布洲峽在州南三十里輿地記云通州有東南二布洲相傳舊為海沙所漲而成嘗有布機流出因名賣魚灣在通州石港塲宋文丞相過此有詩連珠池在如臯縣西北二十里數池相接如連珠度軍井在如臯縣西十里許宋岳飛鎮通泰引軍數千人過此飲之不竭因名江南通志卷三十三
