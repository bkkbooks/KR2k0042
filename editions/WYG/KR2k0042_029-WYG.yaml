body:
  text: 江南通志卷三十輿地志古蹟一江寜一府江寜府江乘城在上元縣北五十里秦縣史記始皇三十七年自會稽還過呉從江乘渡即此湖熟城在上元縣丹陽鄉去縣五十里淮水北漢縣元和郡國志云在舊江寜縣東南七十里石頭城在上元縣石城門西北金陵志云周顯王三十八年楚城石頭曰金陵邑漢建安十七年呉改為石頭城丹陽記云呉時土塢後因山加甓為城因江為池地形最為險固冶城在上元縣治西金陵圖考云春秋時金陵未有城邑惟石頭東有冶城相傳夫差鑄劔於此南畿志云孫呉冶鑄之所在宋天慶觀即今朝天宮雅游編云晉孝武建冶城寺安帝以寺為苑傍有卞將軍墓謝安王羲之同登處亦曰冶亭宋義熙十一年劉鍾領石頭戍事屯冶亭是也别有東冶亭史稱王導遷冶於縣東七里葢東冶也金城在上元縣東北三十五里相傳孫呉所築金陵新志云上元縣金陵鄉舊名金城戍晉太原八年謝安勞師于金城即此或稱琅邪城咸康初桓溫為琅邪内史鎭金城齊書云南琅邪本治金城永明中移白下戚氏以為金城即句容之琅邪城是也今句容縣有琅邪鄉古都城在上元縣秦淮北五里呉大帝所築周迴二十里十九步其城門悉用洛陽舊名自東晉始建康實錄云都城三重外重六門宣陽廣陽津陽清明建陽西明也後增置十二門宮苑記云南四門最西曰陵陽後改廣陽正門曰宣陽稍東曰開陽後改津陽最東曰清明東面二門東曰東陽北曰建春後改建陽西面二門南曰閶闔北曰西明北四門西曰大夏中曰𤣥武齊時改曰宣平稍東曰廣莫陳改北㨗最東曰延熹又自晉以來秦淮南北兩岸設籬門五十六所謂之郊門又有國門梁天監中作在越城東南亦曰望國門臺城在上元縣治北元武湖側輿地紀勝云一曰苑城本呉後苑城也晉咸和中作新宮遂為宮城下及梁陳宮皆在此晉宋時謂朝廷禁省為臺故謂宮城為臺城城周六里百一十步有門六南曰大司馬東曰萬春曰東華西曰西華曰大陽北曰承明又自晉以後宮門初不立闕至梁天監七年始立石闕二於端門外陸倕為銘南都志云今四十八衛以南天津橋大街以北即臺城故處附梁陸倕石闕銘有序昔在舜格文祖禹至神宗用變商俗湯黜夏政雖革命殊乎因襲揖讓異於干戈而晷緯㝠合天人啟惎克明峻徳大庇生民其揆一也在齊之季昏虐君臨威侮五行怠棄三正刑酷然炭暴踰膏柱民怨神怒衆叛親離蹐地無歸贍烏靡托於是我皇帝拯之乃操斗極把鈎陳翼百神禔萬福龍飛黑水虎歩西河雷動風驅天行地止命旅致屯雲之應登壇有降火之祥龜筮協從人祇響附莫不援旗請奮執鋭争先夏首凴固庸岷負阻協彼離心抗兹同徳帝赫斯怒秣馬訓兵嚴鼓木通凶渠泥首𢎞舸連舳巨艦接艫鐵馬千羣朱旗萬里折簡而禽廬九傳檄以下湘羅兵不血刃士無遺鏃而樊鄧威懐巴黔底定於是流湯之黨握炭之徒守似樊籬戰同枯朽革車近次師營商牧如雲士女冠葢相望扶老攜幼一旦咸集壺漿塞野簞食盈塗似夏民之附成湯殷士之歸周武安老懐少伐罪弔民農不遷業市無易賈八方入計四隩奉圖羽檄交馳軍書押至一日二日非止萬幾而尊嚴之度不諐於師旅淵黙之容無改於行陣計如投水思若轉規䇿定帷幄謀成几案曾未浹辰獨夫授首乃焚其綺席棄彼寶衣歸璇臺之珠反諸侯之璧指麾而四海隆平下車而天下大定拯兹塗炭救此横流功均天地祥分光嶽于是仰協三靈俯從億兆受昭華之玉納龍叙之圖類帝禋宗光有神器升中以祀羣望攝袂而朝諸夏布教都畿班政方外謀協上策刑從中典南服緩耳西羈反舌劍騎穹廬之國同川共穴之人莫不屈膝交臂厥角稽顙鑿空萬里攘地千都幕南罷障河西無警於是治定功成邇安逺肅忘兹鹿駭息此狼顧乃正六樂治五禮改章程創法律置博士之職而著錄之生若雲開集雅之館而欵關之學如市興建庠序啟設郊丘一介之才必記無文之典咸秩於是天下學士靡然向風人識廉隅家知禮讓教臻侍子化洽期門區宇乂安方面静息役休務簡歲阜民和歴代規模前王典故莫不芟薙剪截允執厥中以為象闕之制其來已逺春秋設舊章之教經禮垂布憲之文戴記顯游觀之言周史書樹闕之夢北荒明月西極流精海岳黄金河庭紫貝蒼龍元武之制銅爵鐵鳯之工或以聽窮省寃或以布治懸法或以表正王居或以光崇帝里晉氏浸弱宋歴逶遲禮經舊典寂寥無記鴻規盛烈湮没罕稱乃假天闕於牛頭託逺圖於博望有欺耳目無補憲章乃命審曲之官選明中之士陳圭置臬瞻星揆地興復表門草創華闕於是歲次天紀月旅太簇皇帝御天下之七載也構茲盛則興此崇麗方且趨以表敬觀而知法物覩雙碣之容人識百里之典作範垂訓赫矣壯乎爰命下臣式銘磐石其辭曰惟帝建國正位辨方周營洛涘漢啟岐梁居因業盛文以化光爰有象闕是惟舊章青葢南洎黄旗東指懸法無聞藏書弗紀大人造物龍德休否建此百常興兹雙起偉哉偃蹇壯矣崔巍旁映重疊上連翠微布教方顯火日初輝懸書有附委箧知歸鬱崛重軒穹隆反字形聳飛棟勢超浮柱色法上圓制模下矩周望原隰俛臨烟雨前賔四會却背九房北通二轍南湊五方暑來寒往地乆天長神哉華觀永配無疆建康城在上元縣治南寰宇記云古建康縣初置在宣陽門内晉咸和二年燬移入苑城六年又徙出宣陽門外御街西今建初寺門路東西州城在上元縣治晉揚州刺史治所王導所剏也及會稽王道子領揚州居東府故以此為西州城西則冶城東則運瀆胡三省通鑑注云揚州治所在臺城西故謂之西州懐德城在上元縣鍾山鄉東晉為琅邪國人隨帝過江者置建康志云懐德縣舊置於宮城南七里建初寺前路東後改為費縣移於宮城西北三里宋大明七年改置於江浦縣西臨沂城在上元縣東三十八里獨石山北臨大江今攝山之西白常山即其地晉咸康三年分江乘縣置自晉至宋常為南琅邪郡治齊移郡治於白下縣屬焉陳末廢按南琅邪又常治金城見金城下宣武城在上元縣西北九里宋沈慶之築孝武閲武於其地亦謂為武帳岡檀城在上元縣東四十里輿地志云在金華橋東本謝元别墅太傅謝安與奕棋所勝者宋屬檀道濟故名建康志云在墅城東八里地圖謂之城子墅今清風鄉有城子村在黄城橋之西即其地白下城在上元縣西北十八里本名白石陂晉咸和三年陶侃討蘇峻從部將李根之計築壘於此張敦頤本朝事迹云白下本江乘之白石壘也齊武帝以其地依山帶江因移南琅邪郡治焉亦名琅邪城唐武德九年改金陵為白下縣移治白下故城今靖安鎭北有白下城故基屬金陵鄉胡氏通鑑注云葢即今之龍灣捍國城梁侯景築在桐樹灣即古大航地同夏城在上元縣東長樂鄉建康實錄云梁武帝生於同夏里大同三年置縣因城焉胡氏通鑑注梁武以三橋舊宅為光宅寺在同夏里韓滉五城唐德宗狩梁州韓滉觀察江東乃築石頭五城自京口至土山南唐都城在上元縣楊呉順義中築初六朝舊城在北去秦淮五里及徐温改築近南西據石頭南接長干東至白下橋北臨珍珠河設東西二水門貫淮水於城中内有子城周四里是為金陵府南唐因之建都宋初置昇州治陸游筆記云李璟所作都城高三丈因江山為險固濠塹重複可堅守至紹興間已二百餘年所損不及十之一舊紫禁城在上元縣明都城東偏當鍾山之陽去宋元東城外二里其西安門以北宮墻即都城故址東出青溪橋處也皇城前與正陽門對曰洪武門内承天門端門左東長安門右西長安門承天門之前東近北曰東華門内東上南門東上北門西近北曰西華門内西上南門西上北門北曰元武門内北上東門北上西門近子城東曰左闕門西曰右闕門大内六門正中曰午門左曰左掖右曰右掖東曰東安西曰西安北曰北安午門内曰奉天門左小門曰東角右小門曰西角東西隅有東西角樓東角南曰左順西角南曰右順聖祖御製金陵舊紫禁城懐古詩恭紀首卷附明鄭普恭䟦第一林泉後嘉靖乙巳年閏正月二十四日户部湖廣司郎中臣鄭普兵部車駕司郎中臣程秀民户部雲南司郎中臣張邦瑞以部命赴内科填銷出入之數其日天和景晴相與循宮墻望舊闕苑外花園者我太祖高皇帝時游息之所也内宮監太監張宣適率人掃除其中因得入觀之修竹千竿老樹百餘本土山一堆環湖石數層上有御亭一屋僅數楹旁立第一林泉一石又一石刻龍穴二小字中有龍形無竒花怪石崇臺深沼以為樂因慨然有感于吾高皇之垂訓立國其儉質類如此乃因張宣摹刷一幅置之静齋使窮邑委巷之人或得與觀之庶知我國家所以長乆者固有在也臣普謹題城按苑外花園郡志失載今㨿此文當在舊紫禁内然遺蹟不可考矣存此文以志明太祖之儉質云越城在江寜縣聚寶門外報恩寺西宮苑記云周元王四年越相范蠡所築圖經云城周圍二里八十步在秣陵縣長干里建康志云在江寜縣尉廨後遺址猶存人呼為越臺秣陵城在江寜縣東南五十里秦縣建康實錄云在故臺城南八里是也宋書云本治去京邑六十里今名故治村即今秣陵關也白馬城在故江寜縣北三十里金陵故事云呉時烽火臺二所一在石頭左一在白馬城丹陽郡城在江寜縣東南寰宇記云郡城在今長樂橋東一里周一頃有東南北三門南畿志云今在武定橋東南有長樂巷葢自東城角之内外皆是郡治江寜故城在江寜縣西南六十里宋書云晉太康初分秣陵立臨江縣尋更名江寜其治臨江濵南為江寜浦隋開皇十年移於冶城故城始廢今有江寜鎭置驛東府城在江寜縣舊皇城西安門外青溪橋東南臨淮水晉會稽王領揚州宅在州東故曰東府輿地志云東府城安帝時築宋以後常為宰相府第每建康有事必置兵守此亦謂之東城梁末燬陳天嘉末徙治府東三里齊安寺西臨淮水王含五城在江寜縣東南二十五里晉太寜初王敦黨王含錢鳯自栅塘西置五城宋大明五年使劉延孫于五城受封版南畿志云在丹陽郡城之東竹里城建康志云在句容縣北六十里東陽鎭東齊永元二年張佛䕶等拒崔慧景時所築胡氏通鑑注謂即建康竹篠鎭在行宮東北三十里許二説不同杜城在溧水縣南十二里隋大業末杜伏威屯軍於此竹城建康志云在溧水縣東南七十里新志謂在髙淳縣東六十里今固城渡有竹城圩未詳孰是宋周邦彦詩竹城何檀欒層翠分雉堞王封盡四塹同有歲寒節似因竹名城也古固城在高淳縣建康志云古固城春秋時呉築在今溧陽之西溧水縣界周七里餘故址尚存亦名平陵城新志謂在高淳縣南三十里即固城鎭滕公廟記謂即呉瀬渚縣地詳見溧陽皇姥城在高淳縣東南六十里開化城在高淳縣南五十里寰宇記云開化城在固城東去溧水縣九十里即溧水舊縣薛城在高淳縣西十五里俗傳元末有邢光輔者築此以禦寇明初以城來歸今遺址尚存林木繁茂為游覽之所曹城在江浦縣西南三十五里相傳曹操所築黄龍城在江浦縣西南六十里和陽舊志云在烏江山如伏龍因城此以斷其脉棠邑故城在六合縣北春秋時楚之棠邑呉王城在六合縣姜家渡西呉主權分兵屯守處𤓰步城在六合縣𤓰步山側齊建元初徙齊郡治𤓰步仍置臨淄縣為治胡墅城在六合縣東三十里濵江南對石頭城梁敬帝初陳霸先夜襲齊軍斷其運道即其地瓦梁城在六合縣姜家渡西瓦梁堰上北齊瓦梁郡也即呉王城故基南唐時于涂水上立東西瓦梁城宋嘗修故城開四門今餘址尚存晉王城在六合縣宣化鎭隋晉王廣伐陳築此對石頭城盤城在六合縣盤城山側下有宋步軍司莊及寨建康府治在上元縣即南唐都城内子城也金陵圖考云宋開寶八年復昇州仍以宮為州治天禧二年陞江寜府建康軍節度使封壽春郡王為昇王建炎三年改為建康府紹興三年高宗駐蹕明年徙府治於東錦繡坊御史臺治在上元縣大中街北宋初為轉運司署紹興三年改為建康府治元至元二十三年為行御史臺治明太祖入金陵建軍府於此後為呉王宮東沿青溪西接古御街後阻内橋東虹舊瀆皇城既建遂稱此為舊内今獨存周垣集慶路治即今江寜縣治金陵圖考云元至元十二年即建康府治開省十四年更立建康路十六年徙治於西錦繡坊大軍庫内後遷徙不常而終於銀行街東南佳麗樓地天厯二年改名集慶附明陳沂金陵歴代互見圖考歴代城邑變置若不可悉辨然鍾山自東北而迤􅆔于西南大江自西南而環抱于東北覆舟阻其後聚寶當其前青龍石硊掖其左石頭三山踞其右秦淮横其中考諸漢以後郡城皆在淮水之南六朝宮城皆在淮水之北而近于覆舟楚秦隋唐之城皆在淮水西北而據于石頭楊呉以後之城皆跨淮水之南北而近于聚寶國朝因山距淮盡乎四極以是據方辨位庶幾可得矣按六朝宫城正門曰大司馬門南對都城之宣陽門二里宣陽門南對朱雀門五里臺省相望為御街朱雀門臨淮水上朱雀航北今考鎭淮橋東南桐樹灣處當是航所中正街府軍營内小橋當是宣陽門處直出北口西華門西大街當是大司馬門處國學成賢街南口當是宮後平昌門處珍珠河正在宮内也成賢街外號以東直抵西十八衛之後當為都之北城宋上元縣西細柳營直北當為東城武學以北當為西城其規模大畧可見南唐之宮前臨内橋東盡昇平橋西盡大市橋北盡小虹橋為子城之限宋行宮即此内橋南直抵鎭淮橋此則南唐之御街也志云鎮淮橋即朱雀橋者葢蕭梁時移航于此遂名舊航之處唐所謂長樂渡也南渡長樂一里抵東城角内外皆丹陽郡城之基又東南近倪塘乃晉王含五城又南當是古揚州治清凉寺地以至石頭山脊為楚金陵邑城又北為唐韓滉五城少東南則隋蔣州城又東則冶城今朝天宮處又西扺下街有西州橋即西州城地唐上元縣城亦是其處皆石頭之麓相去不逺南循三山水關内下浮橋北為賞心亭少西為折栁亭出水關中街水環繞處當為白鷺洲洲之上今普惠寺當是李白酒樓繞南城角高處即昇元閣舊基少北高阜皆鳯凰臺山少西即建初寺寺西即杏花村聚寶門外為長干向西為越城少南為秣陵城東南為國門轉東至通濟跨城處當為東府城大中橋東畔為白下亭長安街西口當為宋永安宮北抵竹橋之側當為金華宮六朝城後今國學處為元圃小教塲西門内為上林苑將臺處當為樂遊苑蔣廟之西南當為商飈館西北為親蠶宮此皆可因㨿而互見者也臨滁廢郡在江浦縣梁末置輿地紀勝云古臨滁郡在清流縣東南三十五里之葛城俗呼為羅城明初割屬江浦新志云有東西葛城東葛城在今縣西北三十五里西葛城在縣西四十里陽都廢縣在上元縣故臨沂境東晉僑置宋大明中省入臨沂又即丘廢縣亦晉僑置宋元嘉中省入陽都南史云齊高帝曾祖攜為即丘令即此方山廢縣在六合縣東方山下齊周時所置開皇四年省方山縣入六合晉太社太稷壇在上元縣古都城宣陽門外晉元帝立金陵志云在舊江寜縣東二里晉北郊壇在上元縣城北宋禮志云晉成帝立在覆舟山南太祖以其地為樂遊苑移於西後以其地為北湖又移於湖塘西北其地卑濕又移於白石村東其地又為湖乃移於鍾山北東道西與南郊相值後罷白石東湖北郊復舊處宋耕壇在上元縣東郊十五里宋元嘉二十年度宮之辰地八里之外整置千畆開阡陌立先農壇御耕壇梁普通三年移耤田於建康北㟁别有祈年殿明天地壇在上元縣洪武門外明京國圖志云太祖以王者父天母地無異祀理乃建壇於此合而祀之壇制闢四門繚以朱垣内復為垣圍列壇中上為大祀殿前為齋宮今廢呉南郊壇在江寜縣宋禮志云孫權太元元年祭南郊今秣陵縣南十餘里郊中是也晉氏南遷立南郊於已地宋大明三年移郊兆於牛頭山西在宮之午地後以舊地為吉祥移還本處梁武帝南郊壇在今城東南與婁湖近晉雩壇在江寜縣晉穆帝永和中立於南郊傍梁天監九年移於城東耤田之域内陳方明壇在江寜縣婁湖側陳宣帝太建十年立臨壇分遣大使頒盟誓以禦周人晉太廟在江寜縣秦淮西晉中宗立宋以後仍之通典謂廟門北有竹葉文石元嘉中得之陸澄云晉武帝郊禖石也宋明堂在江寜縣樂逰苑南宋大明五年立其牆宇規制一如太廟十有二間以應期數梁天監中修築呉太初宮在上元縣即孫策故府江表傳云呉赤烏十年詔以建業宮材柱細小徙武昌宮材瓦更繕治之名曰太初宮晉渡江即以為府舍即位稱建鄴宮呉昭明宮在上元縣後主甘露三年六月起新宮於太初宮東大開苑囿起土山作樓觀飾以珠玉又鑿城北渠引後湖水流入宮内巡繞堂殿窮極伎巧呉南宮在上元縣舊江寜縣治北二里呉太子宮宋置欣樂營即此地舊通志云在臺城南晉建康宮在上元縣臺城晉咸和七年宮成名曰建康宮亦曰新宮晉永安宮在上元縣呉東宮也宮苑記云在臺城東華門外安帝立何皇后居此謂之永安宮桓元拆其材木入西宮以其地為射圃宋親蠶宮在上元縣臺城西白石壘宋大明三年立皇后親蠶宮於西郊上元縣志云在鍾山鄉闍婆寺前紗市宋未央宮在上元縣景和元年以東府城為未央宮石頭城為長樂宮北邸為建章宮南第為長楊宮齊青溪宮在上元縣東二里齊武帝紀云宋元嘉十七年生於建康青溪宅永明元年築青溪舊宮即故宅也遺址僅存梁