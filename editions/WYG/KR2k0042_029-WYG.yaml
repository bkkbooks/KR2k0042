榮以白羽揮之其軍自潰因以名渡桃葉渡在江寜縣秦淮青溪合流處王獻之愛妾名桃葉渡名因此今為利涉橋子游里金陵故事云在上元縣東二十二里元金陵新志云按家語言偃呉人金陵亦呉也九域志謂言偃里在上元縣長千里在江寜縣輿地紀勝云建康南五里有山岡其間平地民庶襍居有大長干小長干東長干並是地名小長干在瓦官寺南西出大江又天禧寺在城南門外始名長干寺宋改名乃大長干也今報恩寺前大道呉都賦長干延屬注云江東謂山間為干建業之南其地平衍故號為長干烏榜村在上元縣天慶觀西慶元志云初立西州城未有籬門樹烏榜而已故以名村射雉塲在上元縣東二十里六朝事迹云齊置五百所皆以七寶裝翳燕雀湖在上元縣圖經云城東二里昭明墓側湖周二里流入青溪宋元時為白蕩湖一名前湖尋堙相傳明代宮殿正値其處或云故元武門外有水一泓其遺迹也覆杯池在上元縣東北古臺城中晉元帝以酒廢政王導諫之帝因覆杯池中以為戒善泉池在上元縣東北臺城東一名九曲池梁昭明太子所鑿芙蓉池在上元縣西唐李德裕有遊金陵芙蓉池記長命洲在上元縣石頭城前梁武帝日市鵝鴨雞豚之屬放生於此置户十家以穀粟餧養以洲為長命洲新洲在江寜縣金陵鄉去城四十里南史云宋武帝微時伐荻新洲今薛家洲是其地舟子洲在江寜縣近鎭淮橋梁天監十二年以朱雀門東北淮水紆曲數有水患又舟行旋衝太廟灣乃鑿通之中央為此洲諸郡秀士上計者憩止於此金陵記云洲在城南隅周回七里當朱雀航長樂渡之間今廢夢筆驛在上元縣東冶亭即江淹夢還郭璞筆處臨江驛在江寜縣北臨大江舊縣名因以名驛鷄鳴埭在上元縣六朝事迹云齊武帝早遊鍾山射雉至此鷄始鳴是在青溪西南又按齊書裴后傳載帝幸琅邪城事其埭又當近北今清化市是其處二埭皆當時所歴方山埭在江寜縣東南四十五里呉赤烏八年使陳勲于方山立埭號方山埭梁書沈瑀傳云方山埭高峻冬月公私行侣以為艱難帝使瑀行治之乃開四洪斷行客就作三日立辦南埭在江寜縣東水門王安石贈段約詩聞君更欲通南埭割取鍾山一半青正對舊青溪閣賀若弼壘在上元縣北二十里隋平陳賀若弼過江於蔣山龍尾築壘韓擒虎壘在上元縣石頭城西有平陳碑薛道衡作大業壘在句容縣北晉郄鍳屯京口所築與曲阿庱亭號為三壘胡氏曰大業里名在丹陽縣北仁威壘在句容縣白羊門内南史云梁承聖初周𢎞讓為仁威將軍城句容以居曰仁威壘謝公墩在上元縣冶城北二里其形起伏曲折實城西北勝地相傳謝安所嘗登也吹劒錄云荆公宅乃謝安所居地有謝公墩公賦詩曰我名公字偶相同我宅公墩在眼中公去我來墩屬我不應墩姓尚隨公邀笛步在上元縣青溪橋右王徽之邀桓伊吹笛處青溪栅在上元縣城東秦淮栅在江寜縣即栅塘呉時夾淮置栅梁天監中作兩重栅皆施行馬至南唐時置栅如舊朱年隴在江寜縣南六十七里年生齊末遭亂母亡廬墓終日負薪有白紫芝生隴上至今名其居為孝感里藏冰井在上元縣覆舟山宮苑記云宋孝武大明中鑿上有凌室六朝每歲藏氷於此龍天王井在上元縣臺城前景陽井在上元縣景陽樓下一名胭脂井應潮井在上元縣酉陽雜爼云蔣山有應潮井在半山間俗傳與江潮相應嘗有破船朽板自井中出元和井在上元縣郡圃石闌刻元和五禩四字保寜古井在江寜縣東驍騎右衞倉内深數十丈中極空闊以四大鐡人承之水甘美大旱不涸天禧寺義井在江寜縣南報恩寺側天聖中唐文遇令寺僧可政鑿響井在江寜縣西南陶呉鎭以紗帛䝉其上擊之作鼓聲投以瓦礫則作鐘磬聲沸井在句容縣東三十里聞人聲則沸否則已異苑所云句容延陵季子廟前有井嘗沸是也陶𢎞景井在句容縣茅山華陽宮前上方井在溧水縣西二十里上方寺中上刻字云唐貞元記玉泉在江寜縣學宮内宋時有人逐至此掘地得泉因名劉基有銘卓錫泉在江浦縣東北二十里定山寺内梁時僧達摩宴坐石巖思西域水以錫卓石遂得泉昇元碣在上元縣南唐末築昇元閣基得碣云抱雞昇寶位走馬出金陵子建居南極安仁秉夜燈東陵驕小女騎虎渡河氷後皆騐漢溧陽長校官碑在溧水縣光和四年立後沈於固城湖濵宋紹興十一年溧水尉喻仲逺始得之置於官舍今在孔廟大門右同泰寺石在上元縣臺城本梁同泰寺楊呉順義中置干福院院前有石四各高丈餘云此陳三品石也宋政和中取入汴京置延福宮王安石為之銘到公石在上元縣慶元志云梁到溉家有礓石長丈六尺武帝命舁入華林園置宴殿前迎石之日傾都縱觀謂之到公石金華石在上元縣本金華宮中石高九寸引手可舉至趙宋猶存於府治秦淮石在江寜縣宋太祖建國四年改元乾德先是浚秦淮得此石有大宋乾德四年六字考㨿輔公祏有此偽號石出􅆘値是時人以為符䜟云古桂在溧水縣城東察院内一本九幹傳是六朝時所植林古度為之賦江南通志卷三十
