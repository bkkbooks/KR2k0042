body:
  text: 江南通志卷一百九十五雜類志志為史之一體今以表與傳入志所謂各從其類以類聚也其為九志所不能入而通志所不可棄者天時之一禨一祥人事之一言一行古書之一信一疑繫於江南者不能更僕數矣網羅散失參伍而鉤稽之其詳備尚難焉若片羽碎金之可珍則識者所不廢也易有雜傳禮有雜記而史亦有雜家竊取其名漫羨而無歸者歸焉為類四為卷六作雜類志第十紀聞一江寧府倪文毅岳家鐵作坊任南大司馬每往部必步出街口登車曰鄉黨父兄宗族所在豈得居然自尊又嘗曰吾輩兒童時能讀書作對鄰里親姻俱喜忽而入學補廩又喜中舉人進士又皆喜及其為官居鄉刻薄此心何安且禀膳科舉入京諸費孰非鄉里脂膏一旦得志圖報不得何敢妄作威福乎王襄敏以旂家於聚寳門小市口之西屋宇樸隘為都憲時每過家必引避小市口路曰此皆我鄰居父老為貿易者我不忍以車前八騶妨其務也鄰有老人與封翁善王幼以伯父呼之既貴猶不改後有勸其郊居不便請市羊市橋大宅者王曰門㕔高大必常得青衣數人守之吾一老書生安能辦此矧兒輩耶雨花臺東梅將軍廟祀晉豫章内史梅賾也舊志謂賾嘗屯營此地按漢武時古文尚書出孔子壁皆蝌蚪書孔子十一世孫安國定為五十八篇并序一篇為五十九篇獻之遭巫蠱事未列於學宫皇甫謐以授鄭冲冲授蘇愉愉授梁栁栁授臧曹曹授賾賾於元帝時奏上其書亡舜典一篇至齊建武中姚方興得之隋開皇中募遺典始獲全而夏侯歐陽所傳皆廢賾之有功於書如此世人苐知為梅將軍不知有傳古文尚書事陸慧曉家於汝南灣當秦淮曲折處張融自稱天池逸民牽船住岸與之為鄰劉璡謂人曰吾聞張融與陸慧曉并宅其水必有異味酌而飲之曰飲此則鄙吝之萌盡矣明祖實錄上以海内太平思欲與民偕樂乃命工部作十樓於江東諸門之外令民設酒肆以接四方賓旅既又增作五樓至洪武二十七年八月成賜百官鈔宴於醉仙樓金潤與王浚俱以高年居林下相友善潤子紳躋南少司寇謁浚向執猶子禮甚恭至是浚延之上座紳不辭而坐浚不悅别後移書於潤具道其事潤切責紳云吾止此老友以爾傲慢致絶何以為情乃移書謝之浚不納潤率紳往謝三返而後得見自是欵洽如故前輩風度如此童軒性寡合不妄取子雖貴家人衣食不給王恕為巡撫有所饋亦不受毘陵王㒜知其介不敢致饋值有持禮幣求文者因謂曰童尚書文勝予可往求之至則童問曰汝自來乎抑有使之者乎其人以王尚書對遂却而不納金澤為都憲能知人王以旂在諸生中澤即器重之贈以所服金帶曰子異日名位當似我也後以旂為尚書如其言顧璘撫楚時張居正年甫十三有雋才璘大為賞器解所服金帶贈之曰子異日何但繫此帶聊以見予期子意耳出少子峻與結世好後居正在政府感璘知已議與祭葬官峻為上林苑監事李重官於浙海鹽鄭曉為諸生重許為國士曰子必得元鄉試果第一赴公車往辭重曰此行仍當第一若第二人弗予見也已舉第二迨歸逡巡不敢見三君知人畧相似云江寧貢士盛仲交時泰高才博學既困場屋将老矣居常仰屋而嘆妻沈曰君見里中得意人乎不過治第舎買膏腴榮耀閭里耳以妾觀之有三殆焉屈志狥人一也踰憲黷貨二也生子不肖之心三也孰與君家居著書之為高乎隱處山中以免三殆奈何長嘆盛笑曰爾能是吾今可為大城山樵矣周吉甫有山中白雲一卷中多見道語如云世事惟偶然者最佳偶有醇醪適知心聚首偶有餘錢適書畫來售偶欲登涉適伴侣相約真乃快意事又云向平謂富不如貧貴不如賤此語尚有計較未能脫然於富貴貧賤之外又云對明月照止水便懷澄慮世間無心之物能使人亦無心也誦之使人泠然顧起元曰南都自盛仲交後推此君為隱士之傑矣王允恭為和陽教官督學熊廷弼索劣生允恭力言其無熊固索允恭自鋃鐺以見遂免時稱有守劉尚書麟廣洋衛千户蒼子也鄉舉時魏國公讌之二鼓歸蒼不容相見麟與家人莫測其故求師趙先生問之曰子得舉佳事乃不與相見又不言其故彼何從知而改之蒼曰我是本府站㕔千户麟纔一舉遂爾縦飲耶趙乃引麟相見請罪海瑞為南右都御史一日因送表向三山門内一孝亷家借坐孝亷家極壯麗憚海清嚴盡撤㕔事什物列舊敝椅待之有楊綰令人減騶撤樂之風瑞所至人必擁輿聚觀婦孺咸歡呼歌舞即司馬温公之入洛不過是也其初來莅任止攜二竹笥舟泊上河人猶不知嘗延醫入見室中所御衾幬皆白布蕭然如寒生也卜璠生平好施徳嘗卜地牛首山側見負戴者苦渴即以資穿井今鐵心橋井是也偶經一橋聞下哭聲甚哀詢之則夫婦逼於債攜幼子欲自盡也捐金救之後過吳江夜深舟覆附船底漂數十里得登岸叩户求濟啓視則昔之橋下人也遂得具食燎衣易舟以行劉誥家復成倉前糴軍支所餘月米發之得官鏹十錠謹候其處翌日有鋃鐺號而至者遺鏹糧弁也主者已逮治之矣誥還之事乃白誥故貧聞者多之李時勉正統中為祭酒大師英國公張輔及侯伯二十餘人早朝畢奏曰臣等皆武夫不諳經典願賜一日假詣國子監聴講上命以三月三日往是日太師率諸侯伯到監始攜茶湯果餅之屬甚豐李祭酒命諸生立講五經各一章講罷設饌諸侯伯讓曰教授之地皆就列坐惟太師與祭酒抗禮久之太師屢辭祭酒曰秀才家飯不易措置願太師少寛命諸生歌鹿鳴之詩賓主雍雍抵暮而散此真太平盛事也梁尚書材為廣東左轄旦夕皆飯堂上侑以青菜或冬瓜蘿蔔惟一味比擢副都御史巡撫江右薦紳皆饑諸大觀橋解衣盡歡痛飲大嚼視所服圓領用浙蕉極下者衷服布素澣補惟兩裾鮮潔始知其節嗇乃習慣成自然爾罷官後門庭蕭然如寒士同時管簡校子山亦罷官歸同在武定橋南北相向而居子山造樓居廣田產會親友其門如市人稱之曰管尚書梁簡校丁清惠賓官南司空時盡心民事每五日一評薪米之價市儈不得輒擅低昻榻前特設一柝語門卒曰遇有以便宜告者許非時得聞外每傳鼓榻前即擊柝應之雖熟睡時不禁城中河渠皆賓所疏濬者王三原恕為都御史時巡撫南畿一日至市無賴子乗醉面詈之王略無怒色徐曰此人醉矣命吏卒遣之劉清惠麟知紹興甫五十日政聲大和越人肖其像為小劉祠既為工部尚書心慕樓居無力築之文内翰徵明為寫層樓圖以遺之嘗張之於壁命曰神樓楊升庵為作神樓曲今此畫價值百金是殆真樓弗若矣劉清惠請老家居遇直指使者來頗以飲食苛求屬吏稍不精腆輒被誚讓郡縣患之清惠曰此人吾門生會當開諭之俟其來謁因欵之曰欲設席相邀恐有公務廢閣不如今日留此一飯但老妻他往無人治具能從家常飯對食乎直指以師命不敢辭唯唯就坐則又故延緩之自朝過日午饑甚比就案設食惟脫粟一盂菽乳一器而已少頃佳餚美醖羅列盈前直指不復能下箸公强之對曰適已飽甚兹不能也公笑曰此可見飲饌原無精粗饑時易為食飽時難為味時使然耳直指喻其言遂絶不敢以盤餐責人劉司空璽以江西運糧把總擢江西都指揮使巡撫盛應期知其亷明每屬以疑獄多所平反一日某御史按部南昌謁文廟諸生進講中庸至白刃可蹈中庸不可能御史問若鄉人先輩誰可當此諸生對以文公天祥璽在座聞之縮項曰奈何以專聶之行加諸仁至義盡之賢乎且仁至義盡之外豈更有所謂中庸耶諸生歎服而退謝與槐督學廣西喜臨桂儒童張鳴鳯文筆竒古因進而訓之曰子不患不成名患胸中無全書耳乃取兩漢書親為之句讀令五日進院一背雖出巡亦攜之行逮與槐轉官兩漢書已卒業矣其造就後學如此鳴鳯字羽王後來南都拜於墓下立碑而去參議蔣浤少冶顧侍郎起元之外祖也顧云公少為諸生所居在下街口門有樓二間即公讀書處也後罷官歸猶讀書其上杜門埽軌人罕覿其面有通鑑綱目一部每閱一過即以一色筆誌之凡數閱五色皆備所批字畫精謹深可寳玩此不惟見前輩撡履清貞矯矯人外即其終身學古無他嗜好亦當時醇樸寡欲之一端也沈韓峯侍御看綱目亦用五色筆前輩讀書用意大都爾爾今人鹵莽言之令人慨歎深顧文莊起元博覽羣書能文章兄弟四人一進士官光祿一舉人官主事每元旦拜家廟畢長幼團集酒一壺上席列坐者凡三四行亦飲而不釂子弟皆空杯而已起元發言必朝章家政惟光祿唯唯主事以下皆不敢出聲此風士大夫家安可復覩也朱侍郎之蕃和易長者父衣與焦弱侯同鄉舉焦重學識之士頗輕蕃每見即遭譏讓然蕃終身父執事之惟謹蕃官南侍郎歴綰五部尚書印每乗輿回西及倉巷口東及橋即下輿徒步至家鄰有婚䘮雖細民之家必親至延之飲亦往與里人噱笑無異寒素程閣老國祥家甚微以菽乳為業幼時治骨角每日入市夜則讀書與賈户部必選同學有一扎今在賈孫爾安處蓋鄉舉日招賈飲酒者扎云足下毋以不售為恨某寒微之家驟發不祥反用為懼其器度如此逺到非偶然也國祥為户部尚書日賈必選為司務論事偶不合侍郎司屬皆在前賈厲聲曰吾與我旋三十年筆研交而末路變節可乎我旋國祥字司㕔當衆呼之祥不以為忤李如真與朱侍郎元价皆世居倉巷朱後輩既貴達李但以朱大哥呼之朱未嘗不疾應李名登字士龍耿天台弟子由明經為新野令所居屋後名月牙巷垣内一小樓時有雙藤倚門蓋留都士大夫多造訪者其地有封崇寺已毁如真鬻字以復之雲浦盛時泰字仲交高才博學有聲文場既屢失意將老矣居常仰屋而歎其妻沈氏曰君見里中得意人乎不過治第舎買膏腴榮耀閭里爾以妾觀之有三殆焉屈志狥人一也踰憲黷貨二也生子不肖之心三也孰與君家居著書之為高乎從君隱處山中可免三殆之憂奈何長歎哉仲交笑而諾之陳廷尉士芳以選貢官吏部時頗著風采嘗語子弟曰聖賢千言萬語不離謹慎二字要須時時檢㸃又曰讀書講學當思實落用處何在若但付之空言為取利祿計即辜負不淺石城門外居民哈九開飯肆有攜五十金赴江浦縣完糧者遺銀肆中哈九追及江邊還之其人至江浦見大風覆舟人俱溺死念銀失復得願以救人遂呼舟救溺許酬以銀比救一人問之即哈九子順治五年事句容孫炎字伯融明祖命招致劉伯温基基堅不肯出以寳劍遺炎炎作詩以為劍當獻天子封還之基無以答遂逡巡就見康熈間溧水司徒珍為濟陽令有村民某與鄰陳獨者約侣貿易至暮而陳來叩門呼其子問何以失約子以父晨出告明日陳又來率其子覓父至他村見某已被殺古墓旁遂偕其子訟於令司徒問父出門何所挾曰挾八百錢又問陳叩門作何語偕汝覓父作何狀得尸在何地具以告則曰八百錢乃致命之由也叩門倉猝間呼子不呼父已知門内主人死矣且父既不與偕行陳何以獨知其處約與貿易者陳報信者陳偕子覓尸者陳得尸訟官者陳其為陳獨所殺也何疑陳駭服闔邑稱為神君云六合縣令某因耿天臺定向講學行部至縣令曰王陽明先生但言良知不言良能得無遺漏否耿曰如子官名知縣不名能縣豈亦有所遺耶蓋此知字未易承當如一縣窮簷蔀屋之下其艱苦疾痛無不了然洞悉則撫循之者自不能已矣若茫然未知縱幹當一二興利除害事祗為門面計為思朝廷設知縣之意終屬曠官也蘇州府庾氷為吳國内史蘇峻反遣兵攻氷氷棄郡奔會稽峻購氷甚急吳鈴下卒引氷入船乃故艤船市渚去飲酒醉還舞櫂向船曰何處覓庾内史此中便是氷大惶怖不敢動兵見船小謂卒狂醉都不復疑因送過浙江寄山陰魏家得免事平氷報卒恩問所願卒曰出自厮下不願名器少苦執鞭恒患未得快飲酒使有酒畢餘年足矣氷為起大舎市奴婢使門内有百斛酒終其身張率在新安遣家僮載米三千斛還吳耗失大半率問其故答曰雀鼠耗也率笑曰壯哉雀鼠不復研問張緒口不言利有財輒散之清言端坐或竟日不食門生見緒饑為之辦食張充少不拘檢肆意畋逰父緒請假還吳始入西郭值充正獵左手臂鷹右手牽犬遥望見緒乃放鷹紲犬向舟而拜緒曰一身兩役無乃勞乎充跪對曰充聞三十而立今二十九矣請至來歳終身折節緒曰若過而能改乃顏子矣明年幡然易操尋師就學博覽古籍鬱為名士袁洵弟子粲幼名愍孫好學有清才隨洵在吳郡擁敝裘讀書足不踰户其從兄顗出遊要愍孫愍孫輒稱疾不動或有欲與洵子婚者洵曰覬不堪正可與愍孫婚耳陸象先在官務以寛仁為政司馬韋抱直嘗言望明公稍行杖罰以立威名不然恐下人怠廢象先曰為政者理則得矣何必嚴刑樹威損人益已以傷仁恕之道范忠宣純仁罷相與程伊川頤相見責以某事合言何為不言如是數四純仁但稱謝他日頤偶見純仁劄子一篋凡頤所力言者皆已先言之矣但不與頤辯一詞惟謝罪耳范純仁嘗誡子弟曰人雖至愚責人則明雖有聰明恕己則昏苟能以責人之心責己恕己之心恕人不患不至聖賢地位又曰六經聖人之事也知一字則行一字又曰惟儉可以助亷惟恕可以成徳范正平勤苦學問操履甚於貧儒純仁當國時與外氏子弟結課於覺林寺去城二十里正平徒步往來人不知為丞相子蔣侍郎堂慶歴間由宜興徙居蘇州告歸後郡守李仲偃即其居第建坊曰難老以祝之蔣愀然謂胡文恭宿曰此俚俗歆羨内不足而誇之人者也必撤去胡因其第有芝草之瑞乃改為靈芝坊退語人曰識必因徳而後達蔣公之徳蓋人所畏故其識如是非我所及鄭希尹景平居帶城橋為人剛正不詭隨守鄱陽未半載拂衣歸人問之曰奉天子命為守職當撫字乃不得行其志今日須金㡬百明日須金㡬千枯骨頭上打不出也時朱勔用事勢可炙手士大夫中惟鄭無阿附意五經博士陳嗣初繼母吳夫人守節撫孤嘗以二語訓繼曰懋於學則道明安於欲則心晦此至理名言粹然相朂於聖賢也盧仲甫秉父光祿卿名革自徳清徙吳遂為吳人秉少有俊譽嘗謁蔣侍郎堂坐池亭蔣曰亭沼粗適恨林木未就耳秉曰亭沼如爵位時來或有之林木非培植不成似士大夫立名節也蔣深味其言李撰教授真定時曾布為鎮曾妻邀李母妻燕集武官提刑宋者妻亦預席盛飾而至珠翠耀目李姑婦所服浣濯布素而已又各攜其子俱來宋之子眉目如畫衣裝華煥李之子樸陋而弦誦如流曾妻曰教授今雖貧諸郎皆令器他時未易量提刑之子雖楚楚趨走才耳後李五子俱登科彌遜彌大尤著宋之子止閣門祗候果如所言王鑑真定安平人耿介厲名節父官平江路吳縣尹鑑侍養終任樂其風土遂隱居吳中臨頓里足跡不出户者二十年應門惟一婢客至輒叩鄰家貰酒對客劇飲家貧無儋石之儲然非其義一毫不茍取性嗜蟹人或饋兩蒲青願易一詩曰我豈以口腹害物命耶盡放之江中而償以詩沈右字仲說年四十未有子其妻為置一妾姿色美麗右詢其父祖名女泣對曰妾范復初之女也父䘮家貧老母見鬻於此右惻然淚下因語其妻曰此女之父吳中名士亦吾故人豈忍以為妾當如己子視之即召其母令擇壻具奩遣送郡人稱之至正間朝遣兵部員賫空名告身過江南募民納粟補官自五品至九品粟有差而民無一願者松江知府崔思誠集屬縣豪右大姓列庭下不問有無輒施拷掠衆皆悲涕入粟且逼抑使就官惟平江監郡六十不為使者所惕力爭其不可闔郡得免崔聞之大慚金壇張徳常起家吳縣丞歴縣尹遷嘉定州同知其行也諸文士分賦吳中舊蹟送之廣陵成廷珪得龍門廬山陳汝秩得采香逕宛丘陳秀民得靈巖吳郡鄭元得越公井錢塘范致大得石湖江陰張端得林屋館青丘劉堧得虎丘太原王逢得劍池薊丘聶鏞得天平山四明陳樸得白雲泉會稽張憲得吳王井四明陳桱得太湖石勾吳周砥得洞庭山晉陵張體得琴臺巴西鄧徳基得玩花池清河張端義得錦帆涇崑山盧熊得館娃宫吳郡王行得放鶴亭渤海高啓得響屧廊高郵龔宜得梧桐園吳郡黄本得白公檜延陵徐文舉得百花洲江隂張瑄得采蓮涇海昌董翔鳯得辟疆園無錫顧常得夫椒山而遂昌鄭元祐亦賦采香逕且為之序楊文貞士竒薦士蘇州有三人尚書楊翥都御史吳納五經博士陳繼翥與楊在武昌固患難之交訥黑窰匠以一文繼教書儒生以一詩皆入啓事悉列顯秩為名臣況鍾守蘇州興學禮士鄒亮獻詩鍾賞之將薦於朝有以匿名書數亮過失潛揭於府治門況得書嘆曰彼欲阻我薦正速成亮名耳遂薦其才學可用召試授吏刑二部司務轉監察御史吳縣尤安禮字文度官至貴州叅議歸田後人罕見其面況太守鍾入覲楊東里士竒詢其起居鍾無以應士竒曰公為守土吏乃不識尤文度耶鍾歸訪之見一老絡絲巷中布衣紃履環堵蕭然鍾欲割官地益宅謝不可遺以金亦不受鄉人傳為美譚吳訥居家嚴肅孫淳以御史按某處便道歸省怒曰簡書之謂何杖三十遣之外孫錢昕登第來謁命執糞之禮加帚箕上無塵長者嘗宴郡守命淳行酒昕執炙拱立左右守跼蹐求同席乃令各攜一杌坐廡下起侍酒炙禮如初後淳卒於官民奉為神牲楮日甚訥令人持文一通告彼城隍神俾驅還無為厲一夕里巷聞車馬聲僉曰御史歸矣太監牟良知書好禮正統間織造蘇州有人以刻絲獻者良曰此内府所未曾有也今以上聞必為民病因却其所獻趙煥之庾幼撫於從伯中丞士諤方有母䘮衣麻衣值歳時兄弟皆綵服庾獨匿不肯易服中丞甚器重之一日與仲兄奕中丞呼庾至詬且撻之而薄責已子庾不解中丞曰汝父母相繼歿貧困非力學何以自樹且汝賦資敏勉加奮厲無慮不達我子才不汝逮䝉業而安耳汝何自比於彼暴棄若此庾由是感激向學卒以成名每為人述此事輒涕洟不止韓雍家居或以韓世忠像遺之曰公之先也韓取懸中堂焚香再拜而返之曰韓雍出自寒微人所共見豈敢妄祖蘄王陳興立居長洲之蠡口奉母至孝母嗜楊涇橋糕離家十餘里興立不避風雨寒暑每旦致之如是者將十年忽一日途遇破衲道人求糕即與啗之復往買歸而道人已畀前糕與母且留一瓢云將此注水飲人可以療病自是病者日求瓢水飲之疾良已一時以為孝感遂聞於朝明孝宗遣中使取瓢以去興立歿里人為立祠上元史忠字端本自號癡翁工畫山水人物嘗訪沈啓南周於吳門不值見堂中㡧有素絹摇筆作山水不題姓名而去啓南歸見之曰吳中無此人必金陵史癡也邀之回留三月乃返晚無嗣一女既笄壻貧不能娶與壻期元夜畧具隻雞斗酒我當過飲至夜誑其妻女云家家走橋觀燈盍亦隨俗可乎攜其妻女送至壻家留其女一笑而别都穆字元敬居吳之南濠以太僕少卿致仕家居讀書不輟嘗有娶婦者夜大風雨滅燭徧乞火無應者衆雜然曰都少卿家當有讀書燈在叩其門果得火齋居乏食笑曰天壤間當不令都生餓死徐恪為御史一太守送厯日百本有金葉一片共約千金恪將􅔦封固後按其地命太守領􅔦去亦不言及申文定時行在政府日秀水朱太傅國祚見時行於邸第時方九齡時行特起避席留之讀書一日從師出遊國祚失足蹈汙泥時行命僮子回取履僮子誤持時行朝鞵至國祚不敢納時行笑曰履之終當踐我迹耳及舉順天鄉試同學少年有侮之者時行怫然曰是且大魁天下若輩焉知明年國祚果臚傳第一陳珍凡國華萬厯甲戌進士歴刑部郎中廣州知府歸年至九十及見後甲戌進士同縣嚴栻登第國華戲投以同年刺枉顧之時傳為美談懷宗時巡按御史祁彪佳於月朔特行賞善罰惡之典前三日遍約郡之士大夫集圓妙觀又諭闔郡父老畢至乃舉善人某某花紅給賞囚惡人某某將杖殺之以詢士大夫皆曰可又以詢諸父老亦皆曰可遂杖殺之逺近悅服崑山周夀誼年一百一十四歳魏觀守蘇州舉為鄉飲賓是生於宋者也成𢎞間崑山士大夫有弔㑹月輪一人主之祭王文恭綯王侍御葆李樂菴衡劉改之過易蓮峰斗元顧尚書禮龔安節詡諸無嗣者之墓後楊循吉之墓在郡城濠南詹事姚希孟祖墓近焉姚展祖墓必啐酒楊墓歳以為常崑山顧夢圭字武祥當參議粤藩賦詩云夏月行部至雷州思製一葛且復休冬月行部至廉州思製一裘且復休故衣雖穿尚可補秋毫擾民民亦苦吕仲木擷梅花贈之曰武祥如此花矣聞者以為美譚崑山許立知海豐縣每出行見一老父掃墓無間使人問之曰吾父母生平畏蛇蝎今雖歿恐其潛撓致體魄不安耳許奬其孝請與鄉飲以勵風俗常熟東鄉有義鴿冢相傳一人謫戌其弟在家偶持鴿入市見少年束裝因問何往曰代兄戌耳遂感泣曰吾兄在何地而不一顧耶不謀妻子竟帶鴿往後傳家信悉賴此鴿鴿死葬焉常熟趙氏祖傳纒喉風藥甚效而方極祕惜一日趙氏子與友章某飲章詢其方不答酒次趙喉間忽痛不可忍乃大聲曰為求猪牙皂角來來則搗爛以酸醋調末入喉四五𠻳痰大吐痛立止章數以告人傳者遂衆譚曉居常熟之東里與兄照相友愛照持門户而曉用圭頓術財至不貲曉無子病篤其女壻覬覦之曉不可乃以照之次子培為後曉死照念弟以辛勤起家已奄有之不義後培亦旋死適倭寇張甚而邑無城衆洶懼議築城以禦括公私帑僅充費十之五計無所出照躍然曰吾財有所以用之矣籍其藏得四萬金獻於官不日而工畢寇來不能入邑得全而照竟為貧人以老吳江鱸鄉亭傍畫范蠡張翰陸龜䝉像謂之三高至元間里人祠祀之張邁題壁云功迹盡高天下士豈惟吳地作三高夜夢老人來云張陸吳産也吳人固當祀之范蠡越產與勾踐陰謀十年卒以滅吳吳之仇也吳人不當祀之子何為附會之乎子之詩我不與也邁覺異其言志於祠壁徐孝祥居吳江茒屋數楹而樹石幽勝有田數畝供饘粥而已隱居好客客至必留飲歳常釀酒數石而自奉布衣草屨泊如也一日後園徐步見樹根一六坍陷諦視之下有石甃啓之皆銀也亟掩之人無知者㡬三十年值至治壬戌歳大歉孝祥曰是物當出世耶乃啓其穴銀如故日取數錠收糴以散貧人所全活者不勝計銀盡乃已女適人惟荆布遣之而於穴中銀錙銖無犯其子純大以明經發解官至翰林供奉承㫖孝祥封如其官壽九十七杜偉吳江人萬歴時仕工部郎學者尊為靜臺先生嘗曰有意為道徳道徳亦名利無心於名利名利皆道徳杜偉幼育於沈給諫漢仲之子嘉謨沈竒其穎悟廟見而子之後歸安茅鹿門坤作沈墓志直書偉杜姓偉致書茅欲芟去之茅答云萬物本乎天人本乎祖此必不當諱者太史公傳衛青至云青無本姓冐衛媼為衛古人於此等絶無含糊足下賢者也一切文章行誼當與古人相應何必嚅嚅效世眼所爭耶茅此論甚正其引衛青事今人必不肯言偉亦不以為忤厥後仍復本姓蓋得乎茅之言也崇禎末吳江大疫觸屍氣必死諸生王玉錫之師一家五人死無敢窺門者弗論棺殮也玉錫毅然直入曰師弟之謂何忍坐視耶至屍所一一棺殮之并抱所遺襁褓子出藥乳得生松江府咸平初趙屯漁婦張罾河上得一白龜如錢色玉瑩電眸朱尾宫畫燦然放於河夜有光熒熒往視之龜在焉乃獻於官郡守具表以聞張君房曰按瑞應圖千歳龜巢蓮葉上其出也其將以應千歳之運乎且白西方色也龜歸也豈西夷懷歸乎明年朔方叛帥李繼遷貢馬賈宣伯有神藥嘗過松江得巨魚置罟中因投少刀圭藥魚引吸即死後吳江有怪土人謂蛟為孽宣伯以數刀圭投潭中明旦老蛟死浮於水而水蟲莫知其數其藥云受之皂閣山王天師止熬黄檗水以熱酒沃之别無他物黄土橋周保宋敷文閣學士尹之後也年三十餘未有子保性䖍恭樂施夜夢神人授十八味藥方既寤知即五積散曰是委予施濟人也遂造酒三十石漬藥以施酒盡則出其方俾人自漬酒服雖疾無弗愈者自是有男子五咸以為誠感獲報云翰林學士高智耀河西人嘗奏崇學校正儒術者户籍免其徭松江學宫像而祠之知府張之翰為之贊曰公生西夏遭際聖元力扶吾道名動中原致位内相垂裕後昆徳日益彰身日益尊畫像雲間在泮之坤香火弗墜埃塵莫昏百千年兮不亡者存宋末北橋俞彌恭與子端好施惠凡售物者自百緡而下一聽所邀償之糴及百斛必悞唱籌以裨其不足人謂之癡孫彬頎而美年三十無子嘅謂所親吾志得一官而有四子以英俊雄傑名天其可必乎人咸哂之已果育四子唯傑夭折餘至正間並位星郎彬亦貴如其志云談公綽以老人受憲司命簡災田於松江夜宿華亭富人家富人欲虚冐災田數厚欵之寢密室夜分一女子出榻後談驚叩之女曰父貸主人粟積利三十石因以妾質今夕奉主人命來也談遽起求出而門扃不可啓呼主人弗應乃諭女曰汝良家子吾安敢汚張燈待旦既主人入談曰某所負我當代償幸以女還其家主人慚謝遂焚劵而還之華亭市舖一物如桶而無底非木非竹亦非鐵石莫能名而用之者一日有海舶老商見之驚喜撫弄不已叩所值其人亦黠駔漫索三百緡商酬以三之二遂付之因叩曰某實不識此物今既賣無悔理幸以告我商曰此至寳也名曰海井尋常航海必須載淡水自隨今但以大器滿貯海水置此井於中汲之則皆甘泉矣按范石湖集載海中大魚腦有竅吸海水噴從竅出則皆淡疑海井即此魚腦骨也楊維貞避地松江嘗有一貴遊子既破產流落海上數踵維貞門一日竟持所購倪瓚畫去左右欲發之維貞曰吾哀其困使往見一達官以畫為介耳非盜也任勉之歿未葬里長編其子𢎞為本縣養馬夫教授言於太守葉冕冕嘆曰有是乎即諭令歸治䘮大書榜於門曰今後均徭故官子孫一例優免費榮敏㮤斛銘云出以是入以是子子孫孫永如是㮤為名臣而克勤小物隨處可想見洪武中數遣使者廉察諸仕宦家任勉之令鄱陽時使者至其第茅舍三間父灌園母紡績使者紿以客遊至鄱有札寄子否父因貽書畧曰天道福善禍淫甚可畏也勿謂已安已治而懈怠勿謂已能已足而驕矜使者以書上達并陳所居狀太祖嘉嘆旌異之劉鈍兄銑永樂間以會計事坐法繫京師獄鈍婚二日即趣裝北行䕶兄後兄思歸鈍陰乞守者代兄繫兄歸紿父母謂弟旅病卒既而里人官長安者為司寇白而釋之既歸家人驚以為鬼鈍具言其故與父母相對泣兄愧逸去後鈍生二子璵玉璵天順舉人仕至建寧太守玉生子衮仕汀洲通判衮子兆元舉進士懷慶推官上海秦嘉楫初授行人使周藩周王偉其風度厚贐之秦悉謝却王乃衣以一狐裘曰天氣方寒幸使者為逺道計不得已諾之至把縣托同年以裘歸王曰某小臣何敢辱王服張莊簡悅自律甚嚴而待物不苛有四川監司赴任請教張曰川行甚險州縣卑官攜妻孥往者實以軀命博升斗祿幸無以微罪斥去之李觀察希顏居東郊洞涇上止茒屋三間其門人為御史行部來謁見其室陋曰何不稍擴之李曰無力辦此御史請任之李曰是即民脂民膏御史不敢復言宋天民公望與顧文僖清同學友善及文僖主考秋闈宋竟不入試顧深以失之為恨抵家始知其故即造慰曰何自逺乃爾答曰我兩人交厚不得則損公衡鑑得疑公私我故引避以兩全也顧大嘆服顧文僖清修松江府志黄憲副明致書云夫志者所以識一方之事凡人物風俗政教賦稅之類無不該載即古之一國史也前之修者間雜以私致後之觀者不甚信服執事於是非筆削可不加意乎且執事行將入閣而操天下刑賞之大權於此亦小試耳謹拭目以俟毋使後人之視今猶今之視昔也陸文裕深出入館閣前後㡬四十年每抄錄國朝前輩事命子弟熟讀曰士君子有志用世非兼通今古何得言經濟今世學者亦有務為博洽問及朝廷典故一代之經制沿革恍如隔世縱才華邁衆終為俗學正統間富林焦震家生瑞竹凡二本皆異梢同幹森然齊長越三四年又生一本亦如之震隱居教授與弟友愛深至人以為和氣所鍾云巡撫周文襄忱有詩咏之曰植物有修竹獨為貞靜姿況作此嘉瑞一本挺兩岐間生已為異重見真絶竒考祥揆所自天和本人為君家世積善習隱勤詩書孝友既不爽徳慶日以滋冲融感和氣徵應良在兹繁陰媚駢幹密葉交連枝春妍色不競氷霜操豈移虚心待結實擢秀期諸兒朝陽有彩鳯翽翽將來儀張鎣巡按山東過酒肆帘拂其冠墜地公徐命拾冠著之諸長吏惶恐繫賣酒傭待㦸門公諭曰自後帘可高懸竟遣之去為大司寇時有獄須急報夜坐趣吏治文書遲明早奏夜半書既就吏拂燭汚文書叩頭請死公曰悞耳趣再書之坐待達曙不寐張弼為兵部郎數以直言忤當路遂出守南安入覲至京謁李文正東陽閽人辭焉弼題其几云始知東閣先生貴不放南安太守叅東陽固賢者與弼善弼非譏之也而風流亮直之概可想云其守南安時各郡收兵議賞武夫吏卒惟願得其墨妙故多以筆札佐郡費有方伯入覲緘楮一篋求書以饋長安貴人弼笑曰吾不能為書傭也為書四紙而還之其持正又如此曹時中分巡黔中所過題咏郵壁及還復經其處見有屬和者詞甚佳訪知為從行指揮所作既而其人罪當褫職特釋之及歸其人饋五百金公曰我惜汝才耳豈有私耶却不受家居廣富林不輕入郡邑守令初至一通謁歸即杜門守令至亦不接見年八十不復冠帶見客幅巾布袍賦詩飲酒人樂其真率華亭吳丕顯初補學官弟子製青苧布為襴衫後以授兄子太僕炯以及孫曾家有青苧亭至今存焉襴衫之製諸生服之洪武二十四年三易其式而後定用玉色絹布為之寛袖皂緣繫絛垂繻其後漸易以藍又罕用布者矣潘奎為本郡掾慈仁好拯物太守御下嚴胥吏無敢啓口有豪甚殘暴往往誣陷殺人賄諸役煆鍊人無敢辨一日當審錄退奎伏地為諸囚白寃并數豪不法事甚具守乃覆訊得實悉解放捕豪下獄後奎於吏舍生子守夢諸神騎乗鼓吹送一兒至吏舍醒而念曰有徳者必有後是潘奎家也月給粟周之所生子即尚書恩也錢福里居日有老儒館梁溪鄒氏詭稱錢狀元師以取重鄒與錢舊相識適報錢至河下鄒以錢来必謁師大治具以待師惶窘無措謂主人曰我當往舟中與偕來乃詣錢叩頭請死囁嚅吐實錢笑曰是不難欣然同往侍坐盡醉而罷瑁湖橋有賣餅師析箸爭父遺貲構訟兄以五十金乞顧文僖清居間求勝清佯應之使人召其弟叩所爭狀弟謂兄匿百金不予耳顧笑曰是易決何至遂傷天性即召兄至出金授弟曰我與若兄弟分此百金矣兩人感愧泣謝而去馮恩有布衣交曰郭濟恩上疏逮詔獄惟濟與同起居槖饘之饋五易寒暑及恩得論戌而濟以勞憊卒於旅次恩哭之慟撫其子女成立給以田宅遇之如家人子弟云四義僧舍利塔在佘山之北嘉靖間知府方廉所建皆征倭死事僧也羣鸛旋飛俗謂鸛井鸛飛成井必有風雨若探巢攫其子則一方致旱嘉靖間松江大風㧞木鸛巢墮地有子不損老人侯姓者取䕶之鸛復成巢負去其後侯老得疾氣絶矣鸛銜一草如箸置其口復活或曰此東海祖州不死草也嘉靖乙夘順天鄉試首題仁以為己任次題必得其名二句司禮巨璫持主考甚急宣言於朝曰仁以為己任下不知是何語徐文貞階曰即必得其名必得其夀徐文貞階督學兩浙時有士子文用顏苦孔之卓語徐批杜撰後散卷士子曰此語出揚子法言徐遽出位揖之曰本道科名早未曾讀書今承教矣衆皆嘆服徐鴻洲三重有八語自識室中曰室無美姬堂無俊僕案無戲具門無雜賔又宅取安人田取給食書取明道器取適用徐文貞階以禮部右侍郎遷吏部時榜於壁上曰咄汝階二十一而及第四十三而佐天官國恩厚矣何以稱塞所不竭忠殫勞而或植黨以擯賢或徇賄而鬻法或背公以行媚或持祿以自營神之殛之及於子孫張所兹思敬娶許氏外舅歿分授百金張曰此許氏物也立命還之從父給諫承憲有門生典試密寄關節一紙給諫子幼召思敬授之謝曰以此而得何以立縉紳間竟不受後司訓署邑篆歴以清介著早於一言徵節概矣隆慶間張燭知華亭縣櫃吏餽羨金千餘循故例也張悉籍其數報於兩臺請補别稅額臺使旌之曰塵視千金今猶額公署退食堂海瑞為巡撫意在搏擊豪强而兵備蔡國熙承時相風㫖首發難於徐文貞階於是雲間刁風特熾告訐無虚日或投栁跖告伯夷叔齊牒諷之海殊自悔乃盡焚訟牒故老言此陸莊簡光祖戲筆也蔡汝賢侍郎營墓塟父墓旁有人以積土來售畚鍤將半土中微露磚槨蔡惻然亟移原土封之不復取直林景暘以太僕家居性惇恪而雅負倫鑒喜奬後進延文士與子有麟同學每舉會必晨起滌几席設楮墨客具必親閱三命題期以酉刻畢畢則引大觥酌客稱引古道相慰勉迄無倦容與其會者張宗伯鼐鄭憲副棟杜方伯喬林杜駕部士基姜中翰雲龍錢比部大忠及李紹文也奚夢芝母病早夜籲天復収瘞遺胔為母祈福母夢神針兩頤及膝病遂瘥叔貧乏嗣養之迨卒稱貸治䘮姊密以筐篚寄芝暴卒籍而歸其子萬歴初司訓金壇遷曹縣教論徐文貞階嘉靖癸未探花及第夀八十一及見後癸未進士陸文定樹聲嘉靖辛丑會元夀九十七及見後辛丑進士姚方伯永濟萬歴戊戌登第夀九十八亦及見順治戊戌進士皆松之人瑞也郡侯許維新嘗坐早衙見興聖寺浮圖上有人盤旋使𨽻攝至具言為寺中磨治墖頂許熟視良久問其姓名居址命鄰里具収管狀存案以其人趫捷異常可慮也其防微周密如此又嘗開濬郡河募工挑土擇無業荒灘積之故河旁無留土久而通利其灘積髙遂以葬無主之䘮超果寺兩廊旅櫬累百一旦盡空蓋治河難於運土此亦可為法萬歴間府城有劫盜先數日有人載稻草灰堆積東城下髙卑大小不一處是夕羣盜刧城中自城飛墮灰上安然而去有詰奸之責者不可纖𤨏不察也李凌雲為御史日過滄州州守裁其夫馬李不為忤後巡按福建而州守為汀州同知自以前嫌必當被譴及李行部至旅見畢復召入謂曰屬吏皆先容競進獨君無有已登啓事幸自勉竟首薦之葉蕃春憲副有聲之父居黄浦東嘗宿邸舍主人出追逸僕獨少婦在日且暮矣蕃春渡浦避之時甚風雨足繭血濡無所顧又鄰有妾與嫡忤者胠篋逃夜匿蕃春園蕃春密召其夫與俱歸曰無箠楚使聞諸人為而垢其質行修飭如此徐炯倜儻好施振人之急不能償者多出劵還之家居南橋嘗以事至郡所過津梁十餘處皆圮毁不治歎曰風雨冰雪中病涉者多矣遂捐資悉創石梁里人至今賴之又覽南橋形勢有明行寺居南而北無鎻結因捨地建佛閣三座石甃洞門以通往來與寺遙望為浦南名鎮焉年逾耄無疾而終杜啓勲内行甚飭家貧假錢貿布之大賈席冏卿家市之司庫者於本值外誤發羨銀數十金勲不知也歸始知乃復棹舟以餘金歸席又嘗拾遺金於木市艤舟待亡金者歸之不告姓名而去李存素玠瑩積學教授恒語學者曰狂得聖人之神狷得聖人之骨惟鄉愿襲聖人之皮毛耳人推為確論張勃父年九十餘病不能起步明季土寇索財欲殺其父勃以身捍宛轉白刃間賊感其孝俱獲免小碭里民高英偶他出夜未歸羣盜窺高繼妻張及女慧俱二十許有姿遂夥至女聞之遽呼母起曰賊至矣寧鬭死毋為所汚且命幼弟挑燈曰看我殺賊遂握刈草刀伏門左張持鋤伏門右一賊巨斧斬門入柄長礙户落稍緩而女刀已斮賊頦墜一賊奮㦸入張揮鋤擊之不中中楣堅不能脫女為指壁間稻义張遂引义刺賊洞胸背一賊憤甚遽赤手入奪女刀賊手刃女手柄劃然柄刃為二賊雖得無柄刃而手傷甚不能用女則以柄撾之而張又拾地下賊斧亂劈賊退未逾限而斃當是時門外賊林立駭愕不敢入爭負屍逸去明日青村所守備楊廷棟往勘得狀且見賊頦兵卒咸咋舌義田贍族自宋范文正公仲淹創行於吳中負郭常稔之田千畝其規例見錢公輔記嗣是前明申文定時行義莊田若干畝陳文莊仁錫田蕩三百畝又唐順之記無錫華進士從龍近郭田千畝皆倣文正公之意其他惜不盡聞國朝刑部尚書張照祖淇以田千畝贍族田在婁縣照具以奏奉㫖張淇所置義田著照伊孫所請立冊存案張淇以已田作為公產贍養宗黨其敦本厚族之誼可嘉應加恩旌奬以昭義舉著交該部酌議具奏部覆張淇照伊子彚吏部侍郎加四級職銜給與封典仍行文署江撫喬世臣飭該縣立冊存案載入縣志張氏子孫不得擅賣族人外人不得擅買違者照例治罪奉㫖依議士大夫咸歎美之以為盛事常州府楊龜山時正和間寓毘陵居龜巢巷嘗謁鄒志完時志完已病楊至臥内見之猶問以時事如何互相咨嗟龜巢巷在今周仙巷口張誠旌孝碑宋元豐七年毘陵華直内所重建誠須城人自祖綰六世同居男女少長合一百十七口以耕漁為業每旦坐堂上集子弟分工授事皆整容悚息而出不敢少怠南渡後徙居毘陵子孫以文學取科第為毘陵望族是碑沒於郡人薛埜之家園元至治間因治地得之植於庭倪瓚自先世以來代雄於貲瓚厭棄紛華清修好義其師鞏昌王仁輔老而無嗣奉養終其身歿為制服執䘮營葬務致誠慤嘗鬻産得錢千百緡㑹張雨至其家念雨老不再至推與不留一緡無錫有義犬冢張籌遇毒蛇犬嚙殺蛇中毒死籌葬之勒石以志云洪武元年余以尚書禮部奔先考䘮歸講䘮禮時則鄰姻得菴費翁數相過從六月既望時雨新霽余因訪得菴於弓河草堂步行新橋委巷泥濘沒屐齒余踞盤石濯足有蛇蟠石交縳余左足事出不意時惟一黄犬隨余行余顧犬太息犬解余意嚙蛇數段死犬亦旋死余相河南隅一丘用筦席四襲坎葬云嗚呼銜結之報書傳所載非誣也乃余親受此犬脫非常之厄謹朱書元石追而納之壙與得菴親臨視焉余乃一梧主人姓張氏葬之為六月二十四日徐晞永樂中由縣功曹歴陞兵部尚書其為功曹時有貧人悞籍戍丁被攝祈免具酒為夀令妻進觴而身自引避妻殊色也晞一見絶裾走仍脫免之尤文簡延之每公退則閉户謝客日計手抄若干古書其子弟及諸女亦抄書嘗曰予所抄書將彚而目之以代饑之肉寒之裘寂處之朋友幽憂之金石琴瑟也張通叅選大節甚著臨終語所親曰先輩身死國事如施御史武許給事靈皆未與祀典吾累陳之有司未之信也吾死勿置我鄉賢以增吾愧湯大理沐公餘日錄云予仕武義時適奉部檄旌表節婦朱氏先期召婦入邑蓋鄉民徐信妻守節五十年矣用綵亭二一置金縷一置文牘題綵聨云喜聞鼓吹喧通市羞殺琵琶過别船又云食荼敢謂當年苦啖蔗方知此日甘又云地無塵土沾荆布天有恩波載柏舟以竹兜坐婦導迎遍城市許婦女縱觀仍偕儒官送至其家蓋奉宣徳意固臣職之大端表勵風俗尤親民之首務聊竭此心而已朱仲南為縣主刑吏景泰末無錫大饑民無食者羣聚而之有榖之家强貸焉有榖之家指為盜上之郡郡守擬以辟仲南爭之曰法當笞足矣守怒其狥榜掠甚毒嚴訊至再無異辭獄以不成英宗復辟諸囚邀赦出仲南曰我為小吏活三十六人心亦可以無負矣遂解役歸張養浩嘗行髙橋之南遇醉而鬭者一人墜金於地張拾而黙觀焉鬭已其人始覺大惶廹澘然出涕張徐呼謂曰男兒何不能自慎以有此失茍非我恐金不歸矣遂還之其人謀所以報不顧而去子愷舉成化進士顧榮僖可學副使可久之祖少貧寄食於姻邵早起立門外富人鄒雲騎馬過一僕騎而負笥以從下馬攜笥如溷既見主已逺遂馳去忘其笥顧視之一笥金也俟其來還之雲聞馳謝願分十一以贈不受時適有蘇商見而義之妻以女後乃日昌終邀封典陳廣儒家子孤貧通家顏氏衣食之廣無能强飯酣卧而已且有風疾顔厚之不少衰顔之讐賄侍婢置毒餅中以進廣知不泄遽入攘餅食之左右方怪駭食頃嘔出細蟲無算問之終無所言及侍婢夜逃人始漸知其事而廣風疾頓除夀至九十八顧言曾祖清年逾四十妻方娠適寒夜清宿郡邸有女來奔清正襟出庭中冐寒立比旦托事歸而是夜即生子至言貴顯邵文莊寳幼與同邑丁松年惠逺稱三竒童嘗同至洞虚宫嗣龍山房道士年八十餘謂曰聞三君敏妙我有王學士夀先師祖文千餘言能誦十過記當烹白鵝以進於是丁誦一過背之不失一字惠誦兩過訛四五字邵細讀三過又聽二子背誦各一過訛十餘字道士進鵞既去謂弟子曰邵子深沉寡言舉止不茍此逺大之器二子質敏而氣浮非其倫也又三年而丁以儒士第一人應舉不第尋卒惠後仕終順天通判邵至大位悉如道士言萬宗伯士和唐荆川順之門人也分守饒州謁别荆川荆川以磁盂二為贐或曰饒固多磁何贐是唐曰惟其多磁是以贐也萬子他日歸而磁不加益者乃真我弟子也惠山之麓有碧山吟社成𢎞間諸名徳為文㑹之處好事者繪圖以紀其勝邵寳為之記王宗幼䘮母父傭惠山僧舍及宗年十三慟哭迎父歸止於外家旦暮負薪以養既二年拾遺囊於道俟其人至而還之則報以三緡受而買二驢負載取直父養稍裕又十年始僦屋三登里娶妻生子痛母早世終身不飲酒食肉當宗策蹇時為富民張江齮齕瀕死後江與强銘者訟久不相下會銘一奴死遂誣江殺之知宗之仇江也餽之金而引為証及就訊宗慷慨明其始末還所餽金於官修三登倉其子曰澤澤子台問問子鑑皆登第許鼎臣之父繩武以屋典毛敬宇銀四十兩敬宇不戒於火屋燬繩武慰之曰典銀當奉還已而書與鼎臣曰毛敬宇失火吾家當自再造耳鼎臣方為僉憲亦以銀寄歸曰應還其銀也父子同心好義與范文正詢堯夫麥舟事相類鄒忠穎極孝一日將飯食肉而美問母曾飯未既而知先母飯也自咎罰穢水二碗終日不食又極友愛祖居一區得第後讓弟居之弟三鬻於人三贖以與弟居之孝廉許世卿伯勲嘗揭安貧五戒於壁曰詭収田糧干謁官府借女結婚多納僮僕向人乞覓又揭省事五戒於壁曰無故拜客輕赴酒席妄薦館賓替人稱貸濫與義㑹又有和風未學由由惠清節寧希望望夷之句每勅其子曰人何可不學但口不說欺心話身不做欺心事出無慚朋友入無慚妻子方可名學人耳白惠風貽清當㑹試五日父訃至或勸匿之白曰今科不第尚有來科終天之悲如何可遏今違含殮罪已莫逭況可入闈以冀非分耶星夜馳歸後服闋登第宜興堵作邦妻徐氏少寡止一女亦早寡母問當守故女以夫情對母作色曰婦人之節守義不守情夫情與欲鄰念情即欲動欲㡬動而守不遷者寡矣女凜然受戒母女相依操如霜肅趙登之熙瀛四十無子方與諸昆謀卜地葬親而形家言地獨不利於熙瀛嗣續奈何熙瀛毅然曰有諸猶子在趙氏鬼不餒但得親骨入土吾絶嗣甘心焉竟葬之後生子林玖登鄉薦孫枝繁衍萬歴間島盜躙毘陵官兵懦縮顧湯卿率里中子弟為團練厲衆扼據河北諸村設伏山溪叢薄𠞰殺無算會夜逐北錯足墮水遂遇害官檄各處倣行顧保障法寇平為建祠曰義烈江陰縣簿曹廷慧力捍危城四十日不寢食卒用火攻退倭論功陞蘇州判去有戰馬直百金曹以官物留於縣上官知之命日給圉人料銀一錢豢之二十餘年乃死劉崟混跡牙儈襄陽估王姓載棉花至常因往浙以銀二千餘兩并衣囊手書單貯崟處估去溺死錢塘江崟聞之即馳信估子子至悉以前所貯及單與之子感涕願分其半崟義不受自後子孫科甲綿盛云萬歴壬子鄉闈學臣命諸生在省候榜榜首武進張瑋也瑋師同邑髙秉忠夙儒弟子登榜者并瑋得十七人例鹿鳴讌五魁坐堂上餘列兩廡瑋白監臨御史弟子不得先師移秉忠席堂上其十七人者向秉忠肅拜而後就坐一時以為盛事萬歴末商舟浮江來艤黄田港舟人死藁葬城北隅舟人故畜一犬犬繞屍悲鳴呼之不去商舟解維其犬臥墓下寒暑不暫離居人哀之咸給其食且為草窟以庇焉又博瀦里民家一犬對宇而居者時與之食後其家主人死主婦即嫁對宇者犬遂絶不入其門與之食亦不食竟悲號臥死空室中嗚呼人之愧此者多矣天啓乙丑秋將毁東林書院高忠憲攀龍夜召儒學吏潘守命之曰書院毁矣惟是燕居廟孔子神位豈可俱毁吾念惟文廟複壁中可藏特以相托毋泄乃呼燈躬奉神位付潘明年公及於難其後燕居廟再建潘之子華言於衆乃迎而祀焉廼安為華仲儀僕仲儀戌淮貲盡無所得食安因求事乾没日以所得歸給其主又王朋者亦華氏傭主為郡諸生悞殺其族人之僕朋竟詣官言主有事郡學去錫邑百里殺人者朋也歴訊任益力瘐死獄中又姚錄者從其主姚期綱運入都期罹法東厰捕之急因期出惟錄守舍遂自言期子縳之去道遇期亂以他語期乃逸錄至官榜掠甚酷堅言父逃久之得解歸崇正丁丑錫邑第者七人持年晚生刺謁嚴司寇一鵬嚴為萬歴丁丑進士年九十出見笑謂曰今日承諸君不棄老耄他年丁丑又有後來者援例謁諸君也胡時中進曰是時晚生輩又率諸後來者以謁先生耳相與大笑嚴固人瑞而一時詞令之善如此陳大智家世素封性孝尚義識松江錢龍錫於諸生曾造羈人舖及雲亭鎮橋張公殿撫諸姪成立以已資分析授之還貧人劵育族女於家失火延燒其堂詭辭曰吾室小正欲别構卒成禮嫁之巢五一震林為禮部郎康熈初朝議去四書八股制藝専用時務論䇿取士震林言八股可去四書五經不可去於是採其說例以經書命題江陰縣名宦祠傾圮已久木主散失僅存三五露處祠内康熙間學博某為之修葺煥然一新學博夜夢入祠中見衣冠甚偉者四十餘人揖而告之曰君為吾輩安設木主吾輩為君修葺宫牆閱月有學役吳欽於祠旁鋤地忽得白金三十兩願獻於官學博曰疇昔之夢驗矣吾敢染指此金乎手授邑紳輩築宫牆三十餘丈不日告成學使田雯曰此將來一段佳話也鎮江府漢時有金牛出於山東馳到曲阿畍村人柵斷其道謂其地為柵口牛皆奔聚因曰奔牛又相傳萬策湖中有銅牛人逐之走至此柵今柵口及堰皆以此名二說微異溧陽舊多蠱毒丞相韓滉為浙江觀察欲絶其源時有僧住竹林寺每絹一疋易藥一丸中蠱毒者多獲全濟值滉女有疾浴於溫泉而愈乃捨女裝奩造浮圖於泉之右延竹林藥僧主之滉因求其方刋石於縣市以流布焉唐末石不復存而溫湯之寺不改有夏氏世傳其方藥以溫湯為名誌所自也原方以五月初桃皮生用二錢盤蝥以麥麩炒去翅足二錢大㦸生用二錢三物為末以米泔淀為丸如棗核形凡中蠱者於食前以米泔下一丸坐靜室中忌婦人孝服猫犬見此方崇寧間竹林住持僧智淳得之於帥府曾氏云唐代宗時李秀卿刺湖州至維揚逢陸鴻漸羽李素熟羽名因赴郡抵揚子驛曰陸君善於茶天下聞名況南零水又殊絶二妙千載一遇乃命軍士挈瓶操舟汲南零羽執器以俟俄水至羽以杓揚之曰江則江矣非南零者既而傾諸盆至半遽止之曰此南零者矣軍士大駭跪曰齎自南零舟蕩覆水懼其尠挹岸水增之處士神鍳也又李徳裕在中書有親知奉使京口徳裕曰還日金山下中冷水可與汲一盎來其人舉棹日醉而忘之至石城下方憶乃汲一瓶於江中歸獻徳裕飲而嘆曰江表水有異於頃歳矣頗似建業石城下水其人謝過不敢隱蕭楚材知溧陽縣時張乖崖詠作牧一日召之食見几案有詩句云獨憾太平無一事江南閒殺老尚書楚材為易憾字作幸字詠出見稾曰誰改我詩者楚材曰公功高位重姦人側目之秋且天下一統公獨憾太平何也詠感嘆曰君我一字之師也王正肅遂紹定間曾為平江守以師黄榦之訓書諸紳曰士友當親而賢否不可不辨財利當逺而㑹計不可不明折獄以情毋為私意所牽薦士以才母為權要所奪當言則言不視時而退縮可去則去不計利而遲回庶㡬名節之全不愧簡冊所載范文正仲淹在睢陽遣子純仁往蘇州取麥五百斛純仁時年尚少既還舟次丹陽見石曼卿問寄此久近石曰三䘮在淺土欲葬之而北歸無可與謀者純仁以麥舟付之單騎到家文正曰東吳見故舊乎曰曼卿為三䘮未舉方滯丹陽時無郭元振無可告者文正曰何不以麥舟與之曰已與之矣宋末賊掠潤州城門不啓者十七日民餓死且半時有費簧者出粟施粥活人甚衆鄉人曰皆簧所祐也遂名其里曰簧祐以志其徳丹陽吉棠少時父令負販眭仲徳途遇之勸令就學曰家貧須麥粥養父仲徳曰麥粥我家有之攜歸與子􅈌同學後棠為御史過仲徳家家惟一椅讓棠坐自坐木臼棠辭不敢因並坐檻上仍出麥粥啖之時􅈌已列刑垣矣北固有蜂甚巨冠色赤鳥撲之墮地羣蜂數萬結聚不去一二日皆死楊文襄一清取而瘞之作義蜂記楊文襄一清在靈州人有笑其演營習陣者楊謂余誠書生不諳軍旅然以古人行必謹哨探止必修戰備為法其敢忽諸又每諭諸將曰無事常如有事時隄防有事常如無事時鎮靜念武侯衞公未嘗廢營陣世無岳武穆豈可恃野戰為能耶李重嘗授經溧陽史氏歳俸八十金史憐先生貧私為置子錢歳暮進之重但受如約餘麾之弗顧後舉正徳間進士官至副使歸老後仍授經於溧陽高淳間恒無以自給丹陽蔣教諭從教性戅直有市井子驟富以金線結為履見而惡之紿曰吾欲倣其式既進履即令童子擲諸水曰小人敢爾奢僭王給事煜年十三遊庠時縣令與邑紳互訐直指詣學諭諸生曰為令者左為紳者右諸生俱左煜獨徐步至右直指曰小秀才何獨異煜曰問理之曲直不問人之多寡論人之是非不論年之大小直指顧謂令曰此子即樹爾他日之敵矣爾其行哉及壯讀書金山寺一日以訪友出適嚴嵩以翰林學士入朝道金山入其館見案間文善之久待不至留名刺函十金屬寺僧道意煜見之曰彼日後得志必為奸黨何以是汙我擲其金於江戴從商尚質性介特嘉靖間一就試學使者鄙其苛文碎儀即棄去隱居篤學自壯至老不取人一錢不飯人一飯嘗著不取歌曰我取人一錢人取我一緡旦旦相取月月相纒是以下有血地上有刀天我今不取我念曠然爾念曠然聊以頤我年又不飯歌曰若通人飲食是隨人往來我來彼往彼往我來歡則為狎怨則為猜歡情恒不常怨情最易久偪側一世間負債如羊狗我寧吞大冶之鎔銅決不霑烏程之清酒吕城人陳瑶能於馬上運鐵义數百人叢刺之莫能近嘉靖倭寇江南大府令鄉民絶橋自守而募能斬倭者一首賞錢萬瑶率其徒數十人應募乗白騾與倭戰騾上倭首纍纍也一日倭悉衆死戰倭法臨陣左手持刃挺而前右手刃纔數寸人不虞其右也近則舒之長五六尺削鐵如肉因斷瑶义瑶呼徒易义瑶每戰令徒載數义隨之而性貪馘首專其功徒無與者徒憾之不應瑶度倭盛不可敵奔逸至吕城牐先是瑶需渡而牐斷則肘下挾騾一躍逕渡以為常是日腰懸七倭首仍掖騾欲躍累重墜於河倭競前殺之賀邦泰幼時其父鎬建亭水中令讀書而撤其圯賀戲以一木支岸逕行出入甚熟後令莆田率民擊倭馬逸馳倭壘倭逼之前臨大河廣踰丈橋毁獨一木渡賀遂棄其騎趨而撤之倭驚以為神崇禎初大官庖開應支物價簿帝詰内侍謂太浮且曰炙鵞醃鰣肉酢在某肆市之錢半百耳内侍驚愕丹陽談允謙有述事詩云潛邸曾親到市纒民間物價每留連西華鵞炙前門酢一箸纔消半百錢陳都諫獻策妻程氏隨夫在京邸獻策方會議三案於内府薄暮未歸有婦稱鄰嫗求謁閽者不能禁直入榻前泣告曰妾奉聖夫人客氏也待罪掖廷已歴年所亦有何罪而議者將及焉妾聞卿家大人直聲竒節知夫人亦良苦敬以黄金百鎰為夫人夀願大人憐而赦之程謝曰夫人休矣妾以鄙陋之質櫛不設􅁫衵不引帛猶自愧非分安用此黄金為且大廷國是向兒女子嘵嘵夫人謂殿陛中真無一男子耶聲色俱厲正論侃侃士大夫有不逮者張君表鳯儀子九徵登第貽書都門誡之曰入世在自立毋輕受人恩我為諸生三十年未持一門生之刺所見有王文成高忠憲其人乎外此無可北面矣人謂此不特為氣骨語實名言也華鈺以璽卿家居有富人子殺人祈鈺居間干當道劵千金却之明日倍其劵又明日再倍其劵鈺曰我豈與若較此哉若罪故無生理吾分亦無居間理郡邑試諸生鄉大夫各為所親先容鈺獨無所謁或偽署鈺牘以進鈺廉得之不白是非但語署牘者毋納諸生金人服其清介而仍不失長者淮安府王義方拜御史嘗買宅既數日忽對賔朋指庭中青桐樹一雙曰此無酬直賔朋言樹當隨宅無别酬例義方曰此嘉樹非他物比召宅主付之錢四千王義方為魏徵所知徵欲妻以夫人之姪王辭不取俄而徵薨王乃取女人問其故曰初不附宰相今感知已故也米芾知漣水軍時祀先聖極誠敬上自香帛酒醴羮醢下及牲牢灌獻靡不竭誠躬親致齋九日方敢涖事祭時香烟直上不散結成伯牛受享四字羣覩駭異明崇禎間賀相國逢聖為應城教諭質明丁祭親見先聖自空中攜一芹而起與此事同淮陽楊孝子名昊字克彰刑科給事理之父也昊早䘮父哀毁甚而每强顔以慰母心事母能養志母酷愛其孫昊嘗牽率諸子抱弄母前枚指之曰某可承家某可事生業某當作官以顯門閭母聞之大悅其他問安視膳𤨏節不異常人而一以至誠感動有司旌其門華亭張弼為之立傳安東濵海人房得莘猶子妻劉氏驅牛駕車運薪於野方載數束虎忽摶劉氏牛力抵之虎棄去劉登車牛拽行十餘步虎復追至牛復抵之虎又棄去劉傷臂不能登車牛角薪於地空車就劉劉匍匐上車牛曳之行猶再三回顧抵家乃已劉得不死飼牛終身不令服軛云永樂十二年事韋彥質斌成化時在諫垣批鱗敢諫然每自省曰假彈射以快私讐掇細緩以沽公道我所深恥後提學福建公正不可干以私而衡鑒精審曰糊名命題我則試人填名揭案人則試吾矣庸髙下其手耶凡所奬㧞皆能速蜚丘志中度為山陽邑生館於郡守署郡守欲因事周之可數百金度竟辭去曰守不知丘生丘生不患貧也後官太僕卿適開府當推人有諷之者曰當軸急君甚一枉見即可得度笑曰乃有呈身都御史耶竟以忤權璫罷去岳薦當明季棄諸生隱居勵行嘗語人曰聖賢精蘊盡於六經四子其要歸不越大學一書凡人生平其用力當在致知其涵養當在主敬以躬行為實學以隨處體認天理為反身求已之要至今淮干學者猶欽其緒言云桃源令蕭文蔚撰邑諺以儆座右有云衙門相逼官不能為民主差使過繁民不能為身主又云貧村瀕河製一艇實有易逃之路急以刑是使之逃宜防於先時破釜隔日煮三升實無難去之家嚴其課是驅之去宜防於平日順治間徽人程元昭僦居安東齊文光之舍貰酒為業夜半見所砌花臺上有光撥土視之則白鏹一巨缸也急呼主人告之曰奈何慢藏至此盍収之齊曰非也天賜汝遜讓再三且勸程曰天與汝而可不取乎吾誓不須此非分之財爾其遄歸程後居蘇州成巨富歳一往來必有所饋遺而齊絶不受并未嘗言及前事嗚呼程固君子如齊者尤不可及矣孫超宗母塋在安東城北平旺河沱溝康熙間中河口決直當其衝孫聞之奔赴見白浪澎湃如雷松楸根已向上不數武即壟矣水深不可測而夜昏黑泅不能至孫痛哭呼天跪水内徹夜籲龍神不絶黎明家人肩柴負木接踵而至下樁埽以救危急則見塋前昨夕之深不可測者已横起沙壟溜水兩分去如燕尾見塋止塌去一角而四週皆成平陸安東有朱母蘇氏節孝祠朱以傑其裔孫也康熙間火災自城外延燒城内不啻千餘家而節孝祠廹於烈熖以傑奔救之見祠内平地出火燄起數尺勢不可保乃呼天痛哭懷神主期以身殉哭未已忽反風祠火盡滅惟焦門外旗杆二株廟貌一無所損人以為誠孝所感云揚州府廣陵高爽博學多才齊永明中舉孝廉先是劉蒨為晉陵令爽詣蒨不相接甚銜之俄而爽代蒨為令蒨迎贈甚厚爽受饋答書人問其故答曰彼自餉晉陵令耳何關爽事司徒杜衍天禧間知揚州嘗召賔幕閒語我致政之後必買一小駟八九千者飽食訖跨之著一粗布襴衫入市看盤鈴傀儡足矣杜深志豈在傀儡蓋居髙位欲自汚退老耳後致仕果行前志海寧人王興公伯起少年時曾一舉進士輒嘆曰士不自重與千百人旅進坐軒廡下獻小藝規合有司可恥也遂棄去閉門力學嘉平間被薦不起孫叔靜鼛本錢塘人隨父徙江都微時與蔡京善常言蔡子貴人但才勝徳恐貽天下憂及為屯田員外郎京謂之曰我若用於天子願助我鼛曰公誠謹守祖宗之法以正論輔人主示節儉以先百吏而絶口不言兵天下幸甚鼛何為者後竟以忤蔡罷揚州産芍藥佳者不減姚黄魏紫蔡京知州日作萬花㑹其後嵗嵗循習人頗病之元祐間蘇文忠軾來知州正遇花時吏白舊例軾判罷之書報王定國云花㑹撿舊案用花千萬朶吏緣為奸乃揚州大害已罷之矣雖殺風景免造業也蘇文忠軾知揚州夢行山林間一虎來噬窘甚有紫衣道士揮袖障公叱虎使去明旦道士投謁曰夜出不至驚否蘇叱曰鼠子乃敢爾正欲杖汝脊汝謂我不知豎子夜來術耶道士惶怖而退蔣頴叔之奇為江淮發運使才智有餘人莫能欺嘗於所居公署前置一占風旗使人候之置籍焉令諸漕綱日程亦各記風之便逆蓋雷雨雪雹霧露或有不均而風則無頓殊者每運至取其日程厯以合之責其稽緩者綱吏畏服熙寧中髙麗入貢所經州縣悉索地圖所至皆造送山川道路形勢險易無不備載至揚州牒州取地圖是時丞相陳升之判揚州紿使者欲備見兩浙所供圖倣其規制造送及圖至都聚而焚之具以事聞宋祖自平江南詔以兵器盡納揚州不得支動號曰禁庫方臘作亂童貫出征許於逐州軍選練兵仗既開禁庫兩將士望見所貯弓挺直曰此良弓也因出試之宛然如新計開寳至宣和一百五十年而膠漆不脫可謂異矣靖康末東南起勤王之師帥臣翁彦國令揚州作院造神臂弓限一月成皆不可用識者以為國初之弓限一年成而今成於旬日之間宜乎美惡之相絶也張舜文汝明徽宗時知岳州屬邑得古編鐘求上獻張曰天子命我以千里懼不能仰承徳意敢越職以倖賞乎朱光信恕樵薪於草堰場以養母每從王艮齋聽講有禮之者曰我以數十金貸汝別尋生計庶免作苦且可日夕從吾輩遊也朱得金恚曰子非愛我也我自此憧憧然經營念起斷送一生矣遂擲還之學使者召之不往以事役之短衣徒跣而入儲文懿巏字靜夫泰州人卒於南都後三年歸柩海陵攢於墓舍將葬啓視棺上生黝墨成繪畫文具畫家皴染之法前則奇石枯松旁出二篠莖葉咸備左則梅株夭矯稍著數花右如左而樹枝差短其文深入木理四方來觀詫為神異顧尚書璘為作靈徵記嘉靖初揚有司訓徐覲者於啓聖祠旁縱奴射鸛一日鸛銜火焚祠有鸛數百盤旋烈焰之上若快心者徐坐焚祠去官奴亦瘖楊實夫果嘉靖間官至侍郎清介恬退嘗語人曰吾生平無所長惟不識瑾寧彬三人差自慰耳李文定春芳及第臚傳前一日在寓邸與客弈或密以所擬甲乙報李返坐自如置帖碁枰下終局無㡬微見顔色客詰之徐以帖示客曰拙卷亦預進呈之列耳衆以此多其度廷對前數日夢紅帛纒身不得脫及臚傳世宗見其名大喜曰桃李當春日正芳妍之時以硃筆遶春芳二字圏之居政府時考官以典南闈試來别袖出預擬試題呈正李置篋中而已將揭曉夫人問兒輩知可中否曰題難焉得中夫人驚何以預知因語其故夫人問寄兒輩否曰人以心腹待我故先期見示語兒輩非彼所望於我也從篋取出火之李碧海思誠夫人于氏極賢明當思誠為宗伯加宫保時夫人家居有人言公行入閣者夫人正色曰宰相可為而於閹宦得志之時則可為而不可為也曾銑有膽畧長於用兵其撫邊時當除夜猝命諸將出塞上時無警諸將置酒度歳不欲行賂鈐卒求緩於銑妾妾啓銑銑斬卒以狥諸將不得己丙夜被甲行果遇寇擊敗之翼日入賀畢問何以知有警也銑笑曰見烏鵲非時噪以故知之皆大服盧守常倅陳州日畜二鶴甚馴一創死一哀鳴不食盧勉飼之乃就食一旦鳴繞盧側盧曰爾欲去耶有天可飛有林可棲不爾羈也鶴振翮雲際數四回翔乃去後盧老病無子歸休黄浦溪上晚秋蕭瑟曳杖林間忽有鶴盤空聲鳴淒斷盧仰祝曰若非我陳州侣耶果爾當下鶴竟投入懷中以喙牽衣旋舞不釋盧撫之泣曰我老無嗣形影相弔爾幸留此當如孤山逋老共此殘年遂引之歸盧殁鶴亦不食死家人瘞之墓在丁堰宗臣為閩督學卒於官僚屬生儒咸赴弔於靈几上得遺詩三首超脫塵􅅽以故相傳尸蛻云劉靜之永澄萬歴間為順天教授北方稱為淮南夫子嘗曰謙謙自牧由由與偕在醜不爭臨財無茍此居鄉之利也耳習𤨏尾之談目習徵逐之行以不分黑白為渾融以不悖時情為忠厚此居鄉之害也夫惡人不可為矣庸人又豈可為乎惡人不當交矣庸人又豈足交乎南江寺僧羅得一雁籠置窓外秋夜聞月下有雁聲與籠雁相鳴答俄而撲拉簷下僧亟起視則二雁交頸俱斃又婁生以矰弋為業方捕隻雁入籠而飛雁盤空呌聲甚苦頃即自投而下籠中者伸脰就之交結死婁為感動瘞之叢薄間破矰斷繳改業焉劉西郭清師事林東城司訓浮梁教嚴而氣和或從而問著述則曰帖括是尊最悞後進問學術則曰道寓諸庸目前皆是謝家店民家有雙燕巢於梁既乳四燕其雌忽為鷙鳥所摶俄有羣燕挾一雌來留與為偶閱一二日四雛悉斃主人怪之啓視喉間皆蒼耳子蓋雌妬殺之也此與張邦基墨莊漫錄所載廣陵牛氏燕事正同又皆出於揚土亦大異事劉翼齋希文為諸生時嘗以朔望謁監司時有某生怙勢豪横出訟牒理債於公庭衆雖不與其事然皆附和長跪希文獨挺身離班次竦立監司詰之對曰所言公何敢不伏謁若結黨狥私此膝寧輕屈耶監司大加器重東廂民陳穀死有所愛犬常伏柩旁不去既葬犬時時往宿其冢數日乃一歸求食家人殊不知也穀子相為諸生以時掃墓見犬方專冢臥為之加慟韓樂吾貞以陶瓦為業從朱信學久之有得縣令嘉之遺米二石金一鍰貞受米返金謝曰某窶人無能補於左右但與貞居者幸無訟牒煩公府此所以報明府也每遇㑹講有談世事者輒大噪曰光陰有幾乃作此閒談耶或尋章摘句則又噪曰舍却當下不理㑹搬弄陳言此豈學究講肆耶在座莫不警省咸寧人倪璜寓居廣陵母劉病齋沐祈天七夜不寐一日方沐浴盆水忽冰成竒花扶疎三本幹葉俱備母病遂愈人咸嗟異為孝徵李維嶷長敷宗伯公子與姪清同舉於鄉鄉人嘖嘖稱羨長敷顧清慨然曰吾不喜而憂也夫盛滿道家所忌且積徳以致福今無乃福溢於徳乎故可憂也夏心尼宗孔髫歳為諸生篤行嗜學嘗銘座右曰五倫之外無事業六經之外無文章年近百歳髙郵守三晉之賔筵云方立禮繼母愛已出子遇立禮不慈鞭撻至酷立禮受之無怨言江都人莫不稱其孝其父卒母閉之空室中不予食者三日有犬銜餅自竇中入與之得不死母意其已斃啓門見猶生遂以為神暴亦漸已陳恕先以忠江都諸生敦實學持身以敬為主每曰敬則寡慾可以成仁敬則心虚可以益智敬則氣聚可以生勇三達徳皆由敬出也妖人朱方旦妄言禍福走謁者如騖汪蛟門懋麟為辨道論闢之謂國家幸太平無事得此輩以資談諧玩弄足矣今𫝊㑹者崇奉太過或謂孔氏復生或謂大禹再見甚謂移檄玉皇則祈雨立應不惟上侮聖人亦且獲罪天地一旦朝廷震怒加以妖言惑衆之罪吾不知朱某安所逃死時孝感熊賜履掌翰林佩其言枉顧訪之與定交汪後罷官歸構十二研齋於平山堂側吟嘯以老云徐州府漢高祖父太上皇前史不載其名後漢章帝紀祠太上皇於萬年注名煓一名執嘉高后紀載高祖母曰昭靈后唐王智興為徐州節度一日諸從事㑹飲賦詩智興至從事即屏去翰墨智興言適間作詩何獨見某而罷復以箋陳席上小吏置箋智興前智興引毫立成曰三十年前老健兒剛被郎官遣作詩江南花栁從君詠塞北烟塵獨我知四座驚嘆監軍謂張祜曰觀兹盛事豈得無言祜乃獻詩曰十年受命鎮方隅孝節忠規兩有餘誰信將壇佳政外李陵章句右軍書蕭縣劉伯龍家有清節宋元嘉中為武陵太守歸貧甚將營什一之方忽見一鬼在旁撫掌大笑伯龍嘆曰貧窮固有命乃復為鬼所揶揄耶遂止􅄯文元迥在翰林以文章徳行為真宗所優異稱為君子長者天禧初因草詔命坐賜茶既退已昏夕上顧左右取燭與學士中使就御前取燭為導出内門𫝊付從史又嘗宴宜春殿内出牡丹百餘盤千葉者纔十餘朶賜親王宰臣上顧迥及錢文禧維演各賜一朶凡賜禁中名花故事惟親王宰臣中使為之插花餘皆自戴上獨令内侍為迥戴花觀者榮之李若谷未第時與韓億為友俱貧同試京師每出謁更迭為僕若谷先登第授許州長社縣簿赴官自控妻驢億為負箱將至長社三十里謂億曰恐縣吏來須别因取箱中錢六百以其半遺億一氊一席亦割分之相持大哭後億亦登第皆仕至叅知政事天聖間新進士謁李子淵若谷求教若谷曰某自守官來常持四字曰勤謹和緩一後生應聲曰勤謹和既聞命矣緩之一字某所未聞若谷正色曰何嘗教賢緩不及事來且道世間何事不因忙中錯了黄瑞禾䆃明經能詩嘗揭於壁曰十分貧也還栽竹四壁蕭然不賣琴其高致可挹王封麓國輔丁公里人仕為鄢陵令性剛正嘗有司李欲取其公署一牀者國輔曰此公家物非有司所能私予趙子雝時若沛貢生性仁厚家畜一驢聞鄰人生子謂妻曰彼年三十始有兒脫驢鳴驚之是我過也遂賣之崔眉山字曰嵋嘗為聖府典籍年六十尚無子妾數年不孕妻復為購一婢崔惻然曰子之有無命也安用多玷以滋予罪擇配遣之未㡬而前所納妾連舉二子徐州有義虎橋相傳有商迷道悞墮虎穴謂必死乃虎熟視不加噬晝則出取物食之夜歸若為之䕶者月餘商稍諳虎性謂之曰吾失道至此幸君惠我我久客外家有父母妻子思欲一見仗君力能置我大道中幸甚虎即伏地摇尾商喻意騎其背虎躍出置諸道旁顧而悲跳分去後數載商偶經其地見獵者縳一生虎將獻之官視之乃前虎也虎見商回睨不捨商亦感泣與衆具道前事亟出重貲贖之衆義其所為釋縳縱深山中後人於其地為橋以表焉邳州有慈母樹順治間州民劉清源幼失生母嫡母沈氏撫養之食必先嘗寢必同臥恩踰已出其家祖墓有樹枯十三年矣一夕復生枝葉更茂前時人以為沈徳所感故以號樹云順治間宿遷知縣金華鄭應兆奉臺檄令以逋賦紳士名列上候處分獨不肯具報或謂之曰子寧不為官計乎應兆曰我安忍以數百人身名博我一官哉竟以此去諸生王來彝懷逺讀書教子每云家居能教一子弟心術正即流徳無窮也當諸子弟㑹食必諄諄以天理二字相戒勉太倉州龔熙仲明之以孝行節誼著於海濵紹興間舉鄉貢年已六十或勸少為詐匿以避老龔笑曰吾生平不欺豈以始進易心乎嘉定王彝自號媯蜼子學有淵源文甚高潔時楊鐵崖維貞以文雄東南傾動一世彝獨作文妖一篇詆之練達者子寧從父知嘉定縣㑹族誅部民郭元宗曾被盜誣達廉其寃出之至是詣達欲與俱亡達以懷姙妾黄氏屬之而與妻赴海死郭迎黄氏處别室生男謹䕶之念其父為邑侯而嘉定號練川乃托姓侯名之曰居練既而詔除諸臣家屬罪黄囑居練勿自明以是無知者黄守節九十三歳卒按縣志及縣令題名并江西通志俱無練達姓名因練氏已削籍不敢載耳乃其家藏有宗譜足徵世傳不誣也陸安甫伸未第時州大夫請修州志陸謝曰志者一方文獻史稱虞世南豫修書虞茘虞寄得佳傳至今訾之先子州人予何執筆後登第竟以觸璫怒死明初嘉定縣吏某一鄰人以訟在縣白吏求私直之吏曰今郡縣官皆公廉奉法吾曹革心疇敢出入文牘汝事直苐公理之決無枉鄰人如教果獲伸感吏饋粟二石吏驚却之不得曰吾以鄉曲之故為君受一斛後因假歸遂以原粟奉鄰母曰此若兒所寄今以還母此吏殊可風也真如有姚生者素險賊嘗構怨於陸某陸充糧長乗馬自本都夜歸姚偵其無備操刀伏中途橋下馬至橋躑躅不進陸鞭之纔進遂為姚所殺月暗幽寂無知者馬逸歸向陸妻驚嘶不已若有所訴妻知其夫必死非命持燈隨馬去至橋下獲尸焉妻哀哭告馬曰夫死不得賊何以雪寃馬即前導至姚門鼔足蹴不休姚出則直前嚙之妻於是執以赴官姚竟抵法大場鎮農家婦舉止修整嫣然閨中秀也夫貧蠢婦毁裝佐之日與村姑里媼輩習田間勞苦無難色間有親戚憐其貌者執手作慰藉語則歛容謝曰兒樂此不疲且非是無以奉我尊嫜也如是者十餘年有子矣以竭作故病瘵死死前一日忽向其夫索筆硯夫不識一丁字者詣鄰家假至婦見之嘆曰謝此緣久何期今日遂成長别耶起題一絶云當年二八過君家刺繡無心只枲麻今日對君無别語免教兒女衣蘆花語意凄婉其生平曉義命雅自韜晦恥炫鬻尤卓卓可傳云黄蘊生淳耀釋褐後寄弟書曰吾廷試傳臚時見鼎甲先上人皆嘖嘖稱羨吾此時嘆息無限夫天地間自有為數千年一人數百年一人者今人必不肯為數千百年之一人而必欲為三年之一人何也崇明有吳姓老人者康熈間年九十九歳其妻亦九十七歳老人少壯時嗜酒好賭博有四子盡鬻為人奴四子咸能自立各贖身娶婦列肆同居以養父母四子始擬每月輪供諸婦曰翁姑老矣必三月後奉甘㫖太疎復擬每供各一日諸婦又曰必三日後奉甘㫖亦疎於是每日序進一餐越五日則又共設於中堂父母南向坐諸子孫婦以男女分東西行稱觴獻夀又置一橱四子日納錢其中隨老人所用老人好博不已四子常密持錢送博家囑令佯輸老人常勝持錢歸忻忻如也長子於時年七十七餘皆白頭孫曾二十餘人總兵劉兆旌其門曰百齡夫婦齊眉五世兒孫遶膝嘉定令陸隴其記其事海州州有廟祀牛今遺址尚在曩有農耕於野夜宿隴間虎來欲啖農牛在側䕶之觸虎農覺不知也反鞭牛之駭躍為驚已又熟睡及明起視牛死審之知牛為虎傷力竭而死也方悟已之活為牛救云故報以廟祀為文以祭曰牛為我役我為牛主我牛幼時親經調理天或寒歟置於燠地時或饑歟供以草具旦摩暮撫已去復視頭角崢嶸供我農事幸爾之生嗟爾之死既非喘月又無釁隙猛虎出嵎欲啖其主非爾在旁我其死矣幸爾在旁盡力以抵及旦視之虎敗爾死嗚呼蠢獸尚知徳可以人不如山陰立廟堂祭祀增欷嘘贛榆楊秀才妻劉氏孀居宣和間朝廷收復中原科增郡縣兌夫錢劉氏以十萬緡代下户之輸所積空矣而旦日視之錢復滿室每緡首有麻青二字人咸駭異或云青州有麻十萬家豈非神運至此耶因於青州踪跡果有麻氏失錢劉請歸之麻不受乃悉散施之後家益富通州紹興中沈與求聞劉豫於京東造舟因言海道當防如通泰料角石港水勢湍急海舟至此必覓沙上水手方能掉運舟航轉入倘於此處為備盡拘水手無為賊得則賊自不能衝突矣司寇陳敬甫堯先後持憲以疾惡聞然嘗奏記徐文貞階曰天之生大賢大不肖僅僅耳大抵中材為多惟彼中材有志而未練則見欺有才而暴施則見忌此兩者茍器使之近於賢苛責之近於不肖愚意均當姑置而觀其後乃可階甚善之通人至今稱陳廉介而不失長者臯城東湯家灣有佘氏族居隆萬間里中貴人用青烏家言售佘氏一善地為墓既售則盡發其冢旁一冢則佘之􅄔婦所葬夫也􅄔有姑年老念冢必不免一日市牲醴盡邀佘族奉其姑上座而拜且遍拜族人進三爵乃出匕首置几上曰新婦奉姑本欲終其天年不謂今日禍及夫骨何用生為今與姑長别俟貴人來以頸血濺之矣自是挾匕首共起居貴人駭不敢奪今一冢獨存彭大同世精胡氏春秋在通推為專門任叙州司理時有楊氏子修怨於仇家乗父老病扶至河壩而挑毆之遂致死訊者以仇家論抵大同捉筆大書曰春秋無将將則必誅其欲甘心於仇因以忍視其父河壩之死誰則挾之坐子如律直指署其判曰推官讀春秋可謂見諸行事矣崔聲逺鐄為黄户長掌鄉稅嘗以輸稅金五百兩付鎔工工以無劵欺而負焉鐄竟破産償之官時三原王恕知揚州廉其狀謂鐄訟鎔工當為追理鐄對曰鐄廢産是已破一家矣奈何復破一家恕嘆曰仁人之言也鎔工聞而慚感圖償邵潛自號五岳外臣傲僻不諧俗好嫚罵人多惡之及與李維楨鄒迪光黄汝亨陳繼儒諸前輩遊所著友誼錄循吏傳印史諸書多可傳者年五十無子復娶妻妻嫌其貧老棄去一婢又為勢豪所奪遂孑身棲如臯城西門外年八十矣康熈間新城王尚書士貞過臯訪之茒屋三間黝黑如漆邵筋骨如鐵白髪鬖鬖被領雙眸炯然具果䔩留王飲尚能進數觴且與修禊冐氏洗缽池賦詩陳檢討維崧曰古今文人多窮然未有如邵先生者聽其言愴然如劉孝標自序也江南通志卷一百九十五欽定四庫全書江南通志卷一百九十五雜類志志為史之一體今以表與傳入志所謂各從其類以類聚也其為九志所不能入而通志所不可棄者天時之一禨一祥人事之一言一行古書之一信一疑繫於江南者不能更僕數矣網羅散失參伍而鉤稽之其詳備尚難焉若片羽碎金之可珍則識者所不廢也易有雜傳禮有雜記而史亦有雜家竊取其名漫羨而無歸者歸焉為類四為卷六作雜類志第十紀聞一江寧府倪文毅岳家鐵作坊任南大司馬每往部必步出街口登車曰鄉黨父兄宗族所在豈得居然自尊又嘗曰吾輩兒童時能讀書作對鄰里親姻俱喜忽而入學補廩又喜中舉人進士又皆喜及其為官居鄉刻薄此心何安且禀膳科舉入京諸費孰非鄉里脂膏一旦得志圖報不得何敢妄作威福乎王襄敏以旂家於聚寳門小市口之西屋宇樸隘為都憲時每過家必引避小市口路曰此皆我鄰居父老為貿易者我不忍以車前八騶妨其務也鄰有老人與封翁善王幼以伯父呼之既貴猶不改後有勸其郊居不便請市羊市橋大宅者王曰門㕔高大必常得青衣數人守之吾一老書生安能辦此矧兒輩耶雨花臺東梅將軍廟祀晉豫章内史梅賾也舊志謂賾嘗屯營此地按漢武時古文尚書出孔子壁皆蝌蚪書孔子十一世孫安國定為五十八篇并序一篇為五十九篇獻之遭巫蠱事未列於學宫皇甫謐以授鄭冲冲授蘇愉愉授梁栁栁授臧曹曹授賾賾於元帝時奏上其書亡舜典一篇至齊建武中姚方興得之隋開皇中募遺典始獲全而夏侯歐陽所傳皆廢賾之有功於書如此世人苐知為梅將軍不知有傳古文尚書事陸慧曉家於汝南灣當秦淮曲折處張融自稱天池逸民牽船住岸與之為鄰劉璡謂人曰吾聞張融與陸慧曉并宅其水必有異味酌而飲之曰飲此則鄙吝之萌盡矣明祖實錄上以海内太平思欲與民偕樂乃命工部作十樓於江東諸門之外令民設酒肆以接四方賓旅既又增作五樓至洪武二十七年八月成賜百官鈔宴於醉仙樓金潤與王浚俱以高年居林下相友善潤子紳躋南少司寇謁浚向執猶子禮甚恭至是浚延之上座紳不辭而坐浚不悅别後移書於潤具道其事潤切責紳云吾止此老友以爾傲慢致絶何以為情乃移書謝之浚不納潤率紳往謝三返而後得見自是欵洽如故前輩風度如此童軒性寡合不妄取子雖貴家人衣食不給王恕為巡撫有所饋亦不受毘陵王㒜知其介不敢致饋值有持禮幣求文者因謂曰童尚書文勝予可往求之至則童問曰汝自來乎抑有使之者乎其人以王尚書對遂却而不納金澤為都憲能知人王以旂在諸生中澤即器重之贈以所服金帶曰子異日名位當似我也後以旂為尚書如其言顧璘撫楚時張居正年甫十三有雋才璘大為賞器解所服金帶贈之曰子異日何但繫此帶聊以見予期子意耳出少子峻與結世好後居正在政府感璘知已議與祭葬官峻為上林苑監事李重官於浙海鹽鄭曉為諸生重許為國士曰子必得元鄉試果第一赴公車往辭重曰此行仍當第一若第二人弗予見也已舉第二迨歸逡巡不敢見三君知人畧相似云江寧貢士盛仲交時泰高才博學既困場屋将老矣居常仰屋而嘆妻沈曰君見里中得意人乎不過治第舎買膏腴榮耀閭里耳以妾觀之有三殆焉屈志狥人一也踰憲黷貨二也生子不肖之心三也孰與君家居著書之為高乎隱處山中以免三殆奈何長嘆盛笑曰爾能是吾今可為大城山樵矣周吉甫有山中白雲一卷中多見道語如云世事惟偶然者最佳偶有醇醪適知心聚首偶有餘錢適書畫來售偶欲登涉適伴侣相約真乃快意事又云向平謂富不如貧貴不如賤此語尚有計較未能脫然於富貴貧賤之外又云對明月照止水便懷澄慮世間無心之物能使人亦無心也誦之使人泠然顧起元曰南都自盛仲交後推此君為隱士之傑矣王允恭為和陽教官督學熊廷弼索劣生允恭力言其無熊固索允恭自鋃鐺以見遂免時稱有守劉尚書麟廣洋衛千户蒼子也鄉舉時魏國公讌之二鼓歸蒼不容相見麟與家人莫測其故求師趙先生問之曰子得舉佳事乃不與相見又不言其故彼何從知而改之蒼曰我是本府站㕔千户麟纔一舉遂爾縦飲耶趙乃引麟相見請罪海瑞為南右都御史一日因送表向三山門内一孝亷家借坐孝亷家極壯麗憚海清嚴盡撤㕔事什物列舊敝椅待之有楊綰令人減騶撤樂之風瑞所至人必擁輿聚觀婦孺咸歡呼歌舞即司馬温公之入洛不過是也其初來莅任止攜二竹笥舟泊上河人猶不知嘗延醫入見室中所御衾幬皆白布蕭然如寒生也卜璠生平好施徳嘗卜地牛首山側見負戴者苦渴即以資穿井今鐵心橋井是也偶經一橋聞下哭聲甚哀詢之則夫婦逼於債攜幼子欲自盡也捐金救之後過吳江夜深舟覆附船底漂數十里得登岸叩户求濟啓視則昔之橋下人也遂得具食燎衣易舟以行劉誥家復成倉前糴軍支所餘月米發之得官鏹十錠謹候其處翌日有鋃鐺號而至者遺鏹糧弁也主者已逮治之矣誥還之事乃白誥故貧聞者多之李時勉正統中為祭酒大師英國公張輔及侯伯二十餘人早朝畢奏曰臣等皆武夫不諳經典願賜一日假詣國子監聴講上命以三月三日往是日太師率諸侯伯到監始攜茶湯果餅之屬甚豐李祭酒命諸生立講五經各一章講罷設饌諸侯伯讓曰教授之地皆就列坐惟太師與祭酒抗禮久之太師屢辭祭酒曰秀才家飯不易措置願太師少寛命諸生歌鹿鳴之詩賓主雍雍抵暮而散此真太平盛事也梁尚書材為廣東左轄旦夕皆飯堂上侑以青菜或冬瓜蘿蔔惟一味比擢副都御史巡撫江右薦紳皆饑諸大觀橋解衣盡歡痛飲大嚼視所服圓領用浙蕉極下者衷服布素澣補惟兩裾鮮潔始知其節嗇乃習慣成自然爾罷官後門庭蕭然如寒士同時管簡校子山亦罷官歸同在武定橋南北相向而居子山造樓居廣田產會親友其門如市人稱之曰管尚書梁簡校丁清惠賓官南司空時盡心民事每五日一評薪米之價市儈不得輒擅低昻榻前特設一柝語門卒曰遇有以便宜告者許非時得聞外每傳鼓榻前即擊柝應之雖熟睡時不禁城中河渠皆賓所疏濬者王三原恕為都御史時巡撫南畿一日至市無賴子乗醉面詈之王略無怒色徐曰此人醉矣命吏卒遣之劉清惠麟知紹興甫五十日政聲大和越人肖其像為小劉祠既為工部尚書心慕樓居無力築之文内翰徵明為寫層樓圖以遺之嘗張之於壁命曰神樓楊升庵為作神樓曲今此畫價值百金是殆真樓弗若矣劉清惠請老家居遇直指使者來頗以飲食苛求屬吏稍不精腆輒被誚讓郡縣患之清惠曰此人吾門生會當開諭之俟其來謁因欵之曰欲設席相邀恐有公務廢閣不如今日留此一飯但老妻他往無人治具能從家常飯對食乎直指以師命不敢辭唯唯就坐則又故延緩之自朝過日午饑甚比就案設食惟脫粟一盂菽乳一器而已少頃佳餚美醖羅列盈前直指不復能下箸公强之對曰適已飽甚兹不能也公笑曰此可見飲饌原無精粗饑時易為食飽時難為味時使然耳直指喻其言遂絶不敢以盤餐責人劉司空璽以江西運糧把總擢江西都指揮使巡撫盛應期知其亷明每屬以疑獄多所平反一日某御史按部南昌謁文廟諸生進講中庸至白刃可蹈中庸不可能御史問若鄉人先輩誰可當此諸生對以文公天祥璽在座聞之縮項曰奈何以專聶之行加諸仁至義盡之賢乎且仁至義盡之外豈更有所謂中庸耶諸生歎服而退謝與槐督學廣西喜臨桂儒童張鳴鳯文筆竒古因進而訓之曰子不患不成名患胸中無全書耳乃取兩漢書親為之句讀令五日進院一背雖出巡亦攜之行逮與槐轉官兩漢書已卒業矣其造就後學如此鳴鳯字羽王後來南都拜於墓下立碑而去參議蔣浤少冶顧侍郎起元之外祖也顧云公少為諸生所居在下街口門有樓二間即公讀書處也後罷官歸猶讀書其上杜門埽軌人罕覿其面有通鑑綱目一部每閱一過即以一色筆誌之凡數閱五色皆備所批字畫精謹深可寳玩此不惟見前輩撡履清貞矯矯人外即其終身學古無他嗜好亦當時醇樸寡欲之一端也沈韓峯侍御看綱目亦用五色筆前輩讀書用意大都爾爾今人鹵莽言之令人慨歎深顧文莊起元博覽羣書能文章兄弟四人一進士官光祿一舉人官主事每元旦拜家廟畢長幼團集酒一壺上席列坐者凡三四行亦飲而不釂子弟皆空杯而已起元發言必朝章家政惟光祿唯唯主事以下皆不敢出聲此風士大夫家安可復覩也朱侍郎之蕃和易長者父衣與焦弱侯同鄉舉焦重學識之士頗輕蕃每見即遭譏讓然蕃終身父執事之惟謹蕃官南侍郎歴綰五部尚書印每乗輿回西及倉巷口東及橋即下輿徒步至家鄰有婚䘮雖細民之家必親至延之飲亦往與里人噱笑無異寒素程閣老國祥家甚微以菽乳為業幼時治骨角每日入市夜則讀書與賈户部必選同學有一扎今在賈孫爾安處蓋鄉舉日招賈飲酒者扎云足下毋以不售為恨某寒微之家驟發不祥反用為懼其器度如此逺到非偶然也國祥為户部尚書日賈必選為司務論事偶不合侍郎司屬皆在前賈厲聲曰吾與我旋三十年筆研交而末路變節可乎我旋國祥字司㕔當衆呼之祥不以為忤李如真與朱侍郎元价皆世居倉巷朱後輩既貴達李但以朱大哥呼之朱未嘗不疾應李名登字士龍耿天台弟子由明經為新野令所居屋後名月牙巷垣内一小樓時有雙藤倚門蓋留都士大夫多造訪者其地有封崇寺已毁如真鬻字以復之雲浦盛時泰字仲交高才博學有聲文場既屢失意將老矣居常仰屋而歎其妻沈氏曰君見里中得意人乎不過治第舎買膏腴榮耀閭里爾以妾觀之有三殆焉屈志狥人一也踰憲黷貨二也生子不肖之心三也孰與君家居著書之為高乎從君隱處山中可免三殆之憂奈何長歎哉仲交笑而諾之陳廷尉士芳以選貢官吏部時頗著風采嘗語子弟曰聖賢千言萬語不離謹慎二字要須時時檢㸃又曰讀書講學當思實落用處何在若但付之空言為取利祿計即辜負不淺石城門外居民哈九開飯肆有攜五十金赴江浦縣完糧者遺銀肆中哈九追及江邊還之其人至江浦見大風覆舟人俱溺死念銀失復得願以救人遂呼舟救溺許酬以銀比救一人問之即哈九子順治五年事句容孫炎字伯融明祖命招致劉伯温基基堅不肯出以寳劍遺炎炎作詩以為劍當獻天子封還之基無以答遂逡巡就見康熈間溧水司徒珍為濟陽令有村民某與鄰陳獨者約侣貿易至暮而陳來叩門呼其子問何以失約子以父晨出告明日陳又來率其子覓父至他村見某已被殺古墓旁遂偕其子訟於令司徒問父出門何所挾曰挾八百錢又問陳叩門作何語偕汝覓父作何狀得尸在何地具以告則曰八百錢乃致命之由也叩門倉猝間呼子不呼父已知門内主人死矣且父既不與偕行陳何以獨知其處約與貿易者陳報信者陳偕子覓尸者陳得尸訟官者陳其為陳獨所殺也何疑陳駭服闔邑稱為神君云六合縣令某因耿天臺定向講學行部至縣令曰王陽明先生但言良知不言良能得無遺漏否耿曰如子官名知縣不名能縣豈亦有所遺耶蓋此知字未易承當如一縣窮簷蔀屋之下其艱苦疾痛無不了然洞悉則撫循之者自不能已矣若茫然未知縱幹當一二興利除害事祗為門面計為思朝廷設知縣之意終屬曠官也蘇州府庾氷為吳國内史蘇峻反遣兵攻氷氷棄郡奔會稽峻購氷甚急吳鈴下卒引氷入船乃故艤船市渚去飲酒醉還舞櫂向船曰何處覓庾内史此中便是氷大惶怖不敢動兵見船小謂卒狂醉都不復疑因送過浙江寄山陰魏家得免事平氷報卒恩問所願卒曰出自厮下不願名器少苦執鞭恒患未得快飲酒使有酒畢餘年足矣氷為起大舎市奴婢使門内有百斛酒終其身張率在新安遣家僮載米三千斛還吳耗失大半率問其故答曰雀鼠耗也率笑曰壯哉雀鼠不復研問張緒口不言利有財輒散之清言端坐或竟日不食門生見緒饑為之辦食張充少不拘檢肆意畋逰父緒請假還吳始入西郭值充正獵左手臂鷹右手牽犬遥望見緒乃放鷹紲犬向舟而拜緒曰一身兩役無乃勞乎充跪對曰充聞三十而立今二十九矣請至來歳終身折節緒曰若過而能改乃顏子矣明年幡然易操尋師就學博覽古籍鬱為名士袁洵弟子粲幼名愍孫好學有清才隨洵在吳郡擁敝裘讀書足不踰户其從兄顗出遊要愍孫愍孫輒稱疾不動或有欲與洵子婚者洵曰覬不堪正可與愍孫婚耳陸象先在官務以寛仁為政司馬韋抱直嘗言望明公稍行杖罰以立威名不然恐下人怠廢象先曰為政者理則得矣何必嚴刑樹威損人益已以傷仁恕之道范忠宣純仁罷相與程伊川頤相見責以某事合言何為不言如是數四純仁但稱謝他日頤偶見純仁劄子一篋凡頤所力言者皆已先言之矣但不與頤辯一詞惟謝罪耳范純仁嘗誡子弟曰人雖至愚責人則明雖有聰明恕己則昏苟能以責人之心責己恕己之心恕人不患不至聖賢地位又曰六經聖人之事也知一字則行一字又曰惟儉可以助亷惟恕可以成徳范正平勤苦學問操履甚於貧儒純仁當國時與外氏子弟結課於覺林寺去城二十里正平徒步往來人不知為丞相子蔣侍郎堂慶歴間由宜興徙居蘇州告歸後郡守李仲偃即其居第建坊曰難老以祝之蔣愀然謂胡文恭宿曰此俚俗歆羨内不足而誇之人者也必撤去胡因其第有芝草之瑞乃改為靈芝坊退語人曰識必因徳而後達蔣公之徳蓋人所畏故其識如是非我所及鄭希尹景平居帶城橋為人剛正不詭隨守鄱陽未半載拂衣歸人問之曰奉天子命為守職當撫字乃不得行其志今日須金㡬百明日須金㡬千枯骨頭上打不出也時朱勔用事勢可炙手士大夫中惟鄭無阿附意五經博士陳嗣初繼母吳夫人守節撫孤嘗以二語訓繼曰懋於學則道明安於欲則心晦此至理名言粹然相朂於聖賢也盧仲甫秉父光祿卿名革自徳清徙吳遂為吳人秉少有俊譽嘗謁蔣侍郎堂坐池亭蔣曰亭沼粗適恨林木未就耳秉曰亭沼如爵位時來或有之林木非培植不成似士大夫立名節也蔣深味其言李撰教授真定時曾布為鎮曾妻邀李母妻燕集武官提刑宋者妻亦預席盛飾而至珠翠耀目李姑婦所服浣濯布素而已又各攜其子俱來宋之子眉目如畫衣裝華煥李之子樸陋而弦誦如流曾妻曰教授今雖貧諸郎皆令器他時未易量提刑之子雖楚楚趨走才耳後李五子俱登科彌遜彌大尤著宋之子止閣門祗候果如所言王鑑真定安平人耿介厲名節父官平江路吳縣尹鑑侍養終任樂其風土遂隱居吳中臨頓里足跡不出户者二十年應門惟一婢客至輒叩鄰家貰酒對客劇飲家貧無儋石之儲然非其義一毫不茍取性嗜蟹人或饋兩蒲青願易一詩曰我豈以口腹害物命耶盡放之江中而償以詩沈右字仲說年四十未有子其妻為置一妾姿色美麗右詢其父祖名女泣對曰妾范復初之女也父䘮家貧老母見鬻於此右惻然淚下因語其妻曰此女之父吳中名士亦吾故人豈忍以為妾當如己子視之即召其母令擇壻具奩遣送郡人稱之至正間朝遣兵部員賫空名告身過江南募民納粟補官自五品至九品粟有差而民無一願者松江知府崔思誠集屬縣豪右大姓列庭下不問有無輒施拷掠衆皆悲涕入粟且逼抑使就官惟平江監郡六十不為使者所惕力爭其不可闔郡得免崔聞之大慚金壇張徳常起家吳縣丞歴縣尹遷嘉定州同知其行也諸文士分賦吳中舊蹟送之廣陵成廷珪得龍門廬山陳汝秩得采香逕宛丘陳秀民得靈巖吳郡鄭元得越公井錢塘范致大得石湖江陰張端得林屋館青丘劉堧得虎丘太原王逢得劍池薊丘聶鏞得天平山四明陳樸得白雲泉會稽張憲得吳王井四明陳桱得太湖石勾吳周砥得洞庭山晉陵張體得琴臺巴西鄧徳基得玩花池清河張端義得錦帆涇崑山盧熊得館娃宫吳郡王行得放鶴亭渤海高啓得響屧廊高郵龔宜得梧桐園吳郡黄本得白公檜延陵徐文舉得百花洲江隂張瑄得采蓮涇海昌董翔鳯得辟疆園無錫顧常得夫椒山而遂昌鄭元祐亦賦采香逕且為之序楊文貞士竒薦士蘇州有三人尚書楊翥都御史吳納五經博士陳繼翥與楊在武昌固患難之交訥黑窰匠以一文繼教書儒生以一詩皆入啓事悉列顯秩為名臣況鍾守蘇州興學禮士鄒亮獻詩鍾賞之將薦於朝有以匿名書數亮過失潛揭於府治門況得書嘆曰彼欲阻我薦正速成亮名耳遂薦其才學可用召試授吏刑二部司務轉監察御史吳縣尤安禮字文度官至貴州叅議歸田後人罕見其面況太守鍾入覲楊東里士竒詢其起居鍾無以應士竒曰公為守土吏乃不識尤文度耶鍾歸訪之見一老絡絲巷中布衣紃履環堵蕭然鍾欲割官地益宅謝不可遺以金亦不受鄉人傳為美譚吳訥居家嚴肅孫淳以御史按某處便道歸省怒曰簡書之謂何杖三十遣之外孫錢昕登第來謁命執糞之禮加帚箕上無塵長者嘗宴郡守命淳行酒昕執炙拱立左右守跼蹐求同席乃令各攜一杌坐廡下起侍酒炙禮如初後淳卒於官民奉為神牲楮日甚訥令人持文一通告彼城隍神俾驅還無為厲一夕里巷聞車馬聲僉曰御史歸矣太監牟良知書好禮正統間織造蘇州有人以刻絲獻者良曰此内府所未曾有也今以上聞必為民病因却其所獻趙煥之庾幼撫於從伯中丞士諤方有母䘮衣麻衣值歳時兄弟皆綵服庾獨匿不肯易服中丞甚器重之一日與仲兄奕中丞呼庾至詬且撻之而薄責已子庾不解中丞曰汝父母相繼歿貧困非力學何以自樹且汝賦資敏勉加奮厲無慮不達我子才不汝逮䝉業而安耳汝何自比於彼暴棄若此庾由是感激向學卒以成名每為人述此事輒涕洟不止韓雍家居或以韓世忠像遺之曰公之先也韓取懸中堂焚香再拜而返之曰韓雍出自寒微人所共見豈敢妄祖蘄王陳興立居長洲之蠡口奉母至孝母嗜楊涇橋糕離家十餘里興立不避風雨寒暑每旦致之如是者將十年忽一日途遇破衲道人求糕即與啗之復往買歸而道人已畀前糕與母且留一瓢云將此注水飲人可以療病自是病者日求瓢水飲之疾良已一時以為孝感遂聞於朝明孝宗遣中使取瓢以去興立歿里人為立祠上元史忠字端本自號癡翁工畫山水人物嘗訪沈啓南周於吳門不值見堂中㡧有素絹摇筆作山水不題姓名而去啓南歸見之曰吳中無此人必金陵史癡也邀之回留三月乃返晚無嗣一女既笄壻貧不能娶與壻期元夜畧具隻雞斗酒我當過飲至夜誑其妻女云家家走橋觀燈盍亦隨俗可乎攜其妻女送至壻家留其女一笑而别都穆字元敬居吳之南濠以太僕少卿致仕家居讀書不輟嘗有娶婦者夜大風雨滅燭徧乞火無應者衆雜然曰都少卿家當有讀書燈在叩其門果得火齋居乏食笑曰天壤間當不令都生餓死徐恪為御史一太守送厯日百本有金葉一片共約千金恪將􅔦封固後按其地命太守領􅔦去亦不言及申文定時行在政府日秀水朱太傅國祚見時行於邸第時方九齡時行特起避席留之讀書一日從師出遊國祚失足蹈汙泥時行命僮子回取履僮子誤持時行朝鞵至國祚不敢納時行笑曰履之終當踐我迹耳及舉順天鄉試同學少年有侮之者時行怫然曰是且大魁天下若輩焉知明年國祚果臚傳第一陳珍凡國華萬厯甲戌進士歴刑部郎中廣州知府歸年至九十及見後甲戌進士同縣嚴栻登第國華戲投以同年刺枉顧之時傳為美談懷宗時巡按御史祁彪佳於月朔特行賞善罰惡之典前三日遍約郡之士大夫集圓妙觀又諭闔郡父老畢至乃舉善人某某花紅給賞囚惡人某某將杖殺之以詢士大夫皆曰可又以詢諸父老亦皆曰可遂杖殺之逺近悅服崑山周夀誼年一百一十四歳魏觀守蘇州舉為鄉飲賓是生於宋者也成𢎞間崑山士大夫有弔㑹月輪一人主之祭王文恭綯王侍御葆李樂菴衡劉改之過易蓮峰斗元顧尚書禮龔安節詡諸無嗣者之墓後楊循吉之墓在郡城濠南詹事姚希孟祖墓近焉姚展祖墓必啐酒楊墓歳以為常崑山顧夢圭字武祥當參議粤藩賦詩云夏月行部至雷州思製一葛且復休冬月行部至廉州思製一裘且復休故衣雖穿尚可補秋毫擾民民亦苦吕仲木擷梅花贈之曰武祥如此花矣聞者以為美譚崑山許立知海豐縣每出行見一老父掃墓無間使人問之曰吾父母生平畏蛇蝎今雖歿恐其潛撓致體魄不安耳許奬其孝請與鄉飲以勵風俗常熟東鄉有義鴿冢相傳一人謫戌其弟在家偶持鴿入市見少年束裝因問何往曰代兄戌耳遂感泣曰吾兄在何地而不一顧耶不謀妻子竟帶鴿往後傳家信悉賴此鴿鴿死葬焉常熟趙氏祖傳纒喉風藥甚效而方極祕惜一日趙氏子與友章某飲章詢其方不答酒次趙喉間忽痛不可忍乃大聲曰為求猪牙皂角來來則搗爛以酸醋調末入喉四五𠻳痰大吐痛立止章數以告人傳者遂衆譚曉居常熟之東里與兄照相友愛照持門户而曉用圭頓術財至不貲曉無子病篤其女壻覬覦之曉不可乃以照之次子培為後曉死照念弟以辛勤起家已奄有之不義後培亦旋死適倭寇張甚而邑無城衆洶懼議築城以禦括公私帑僅充費十之五計無所出照躍然曰吾財有所以用之矣籍其藏得四萬金獻於官不日而工畢寇來不能入邑得全而照竟為貧人以老吳江鱸鄉亭傍畫范蠡張翰陸龜䝉像謂之三高至元間里人祠祀之張邁題壁云功迹盡高天下士豈惟吳地作三高夜夢老人來云張陸吳産也吳人固當祀之范蠡越產與勾踐陰謀十年卒以滅吳吳之仇也吳人不當祀之子何為附會之乎子之詩我不與也邁覺異其言志於祠壁徐孝祥居吳江茒屋數楹而樹石幽勝有田數畝供饘粥而已隱居好客客至必留飲歳常釀酒數石而自奉布衣草屨泊如也一日後園徐步見樹根一六坍陷諦視之下有石甃啓之皆銀也亟掩之人無知者㡬三十年值至治壬戌歳大歉孝祥曰是物當出世耶乃啓其穴銀如故日取數錠收糴以散貧人所全活者不勝計銀盡乃已女適人惟荆布遣之而於穴中銀錙銖無犯其子純大以明經發解官至翰林供奉承㫖孝祥封如其官壽九十七杜偉吳江人萬歴時仕工部郎學者尊為靜臺先生嘗曰有意為道徳道徳亦名利無心於名利名利皆道徳杜偉幼育於沈給諫漢仲之子嘉謨沈竒其穎悟廟見而子之後歸安茅鹿門坤作沈墓志直書偉杜姓偉致書茅欲芟去之茅答云萬物本乎天人本乎祖此必不當諱者太史公傳衛青至云青無本姓冐衛媼為衛古人於此等絶無含糊足下賢者也一切文章行誼當與古人相應何必嚅嚅效世眼所爭耶茅此論甚正其引衛青事今人必不肯言偉亦不以為忤厥後仍復本姓蓋得乎茅之言也崇禎末吳江大疫觸屍氣必死諸生王玉錫之師一家五人死無敢窺門者弗論棺殮也玉錫毅然直入曰師弟之謂何忍坐視耶至屍所一一棺殮之并抱所遺襁褓子出藥乳得生松江府咸平初趙屯漁婦張罾河上得一白龜如錢色玉瑩電眸朱尾宫畫燦然放於河夜有光熒熒往視之龜在焉乃獻於官郡守具表以聞張君房曰按瑞應圖千歳龜巢蓮葉上其出也其將以應千歳之運乎且白西方色也龜歸也豈西夷懷歸乎明年朔方叛帥李繼遷貢馬賈宣伯有神藥嘗過松江得巨魚置罟中因投少刀圭藥魚引吸即死後吳江有怪土人謂蛟為孽宣伯以數刀圭投潭中明旦老蛟死浮於水而水蟲莫知其數其藥云受之皂閣山王天師止熬黄檗水以熱酒沃之别無他物黄土橋周保宋敷文閣學士尹之後也年三十餘未有子保性䖍恭樂施夜夢神人授十八味藥方既寤知即五積散曰是委予施濟人也遂造酒三十石漬藥以施酒盡則出其方俾人自漬酒服雖疾無弗愈者自是有男子五咸以為誠感獲報云翰林學士高智耀河西人嘗奏崇學校正儒術者户籍免其徭松江學宫像而祠之知府張之翰為之贊曰公生西夏遭際聖元力扶吾道名動中原致位内相垂裕後昆徳日益彰身日益尊畫像雲間在泮之坤香火弗墜埃塵莫昏百千年兮不亡者存宋末北橋俞彌恭與子端好施惠凡售物者自百緡而下一聽所邀償之糴及百斛必悞唱籌以裨其不足人謂之癡孫彬頎而美年三十無子嘅謂所親吾志得一官而有四子以英俊雄傑名天其可必乎人咸哂之已果育四子唯傑夭折餘至正間並位星郎彬亦貴如其志云談公綽以老人受憲司命簡災田於松江夜宿華亭富人家富人欲虚冐災田數厚欵之寢密室夜分一女子出榻後談驚叩之女曰父貸主人粟積利三十石因以妾質今夕奉主人命來也談遽起求出而門扃不可啓呼主人弗應乃諭女曰汝良家子吾安敢汚張燈待旦既主人入談曰某所負我當代償幸以女還其家主人慚謝遂焚劵而還之華亭市舖一物如桶而無底非木非竹亦非鐵石莫能名而用之者一日有海舶老商見之驚喜撫弄不已叩所值其人亦黠駔漫索三百緡商酬以三之二遂付之因叩曰某實不識此物今既賣無悔理幸以告我商曰此至寳也名曰海井尋常航海必須載淡水自隨今但以大器滿貯海水置此井於中汲之則皆甘泉矣按范石湖集載海中大魚腦有竅吸海水噴從竅出則皆淡疑海井即此魚腦骨也楊維貞避地松江嘗有一貴遊子既破產流落海上數踵維貞門一日竟持所購倪瓚畫去左右欲發之維貞曰吾哀其困使往見一達官以畫為介耳非盜也任勉之歿未葬里長編其子𢎞為本縣養馬夫教授言於太守葉冕冕嘆曰有是乎即諭令歸治䘮大書榜於門曰今後均徭故官子孫一例優免費榮敏㮤斛銘云出以是入以是子子孫孫永如是㮤為名臣而克勤小物隨處可想見洪武中數遣使者廉察諸仕宦家任勉之令鄱陽時使者至其第茅舍三間父灌園母紡績使者紿以客遊至鄱有札寄子否父因貽書畧曰天道福善禍淫甚可畏也勿謂已安已治而懈怠勿謂已能已足而驕矜使者以書上達并陳所居狀太祖嘉嘆旌異之劉鈍兄銑永樂間以會計事坐法繫京師獄鈍婚二日即趣裝北行䕶兄後兄思歸鈍陰乞守者代兄繫兄歸紿父母謂弟旅病卒既而里人官長安者為司寇白而釋之既歸家人驚以為鬼鈍具言其故與父母相對泣兄愧逸去後鈍生二子璵玉璵天順舉人仕至建寧太守玉生子衮仕汀洲通判衮子兆元舉進士懷慶推官上海秦嘉楫初授行人使周藩周王偉其風度厚贐之秦悉謝却王乃衣以一狐裘曰天氣方寒幸使者為逺道計不得已諾之至把縣托同年以裘歸王曰某小臣何敢辱王服張莊簡悅自律甚嚴而待物不苛有四川監司赴任請教張曰川行甚險州縣卑官攜妻孥往者實以軀命博升斗祿幸無以微罪斥去之李觀察希顏居東郊洞涇上止茒屋三間其門人為御史行部來謁見其室陋曰何不稍擴之李曰無力辦此御史請任之李曰是即民脂民膏御史不敢復言宋天民公望與顧文僖清同學友善及文僖主考秋闈宋竟不入試顧深以失之為恨抵家始知其故即造慰曰何自逺乃爾答曰我兩人交厚不得則損公衡鑑得疑公私我故引避以兩全也顧大嘆服顧文僖清修松江府志黄憲副明致書云夫志者所以識一方之事凡人物風俗政教賦稅之類無不該載即古之一國史也前之修者間雜以私致後之觀者不甚信服執事於是非筆削可不加意乎且執事行將入閣而操天下刑賞之大權於此亦小試耳謹拭目以俟毋使後人之視今猶今之視昔也陸文裕深出入館閣前後㡬四十年每抄錄國朝前輩事命子弟熟讀曰士君子有志用世非兼通今古何得言經濟今世學者亦有務為博洽問及朝廷典故一代之經制沿革恍如隔世縱才華邁衆終為俗學正統間富林焦震家生瑞竹凡二本皆異梢同幹森然齊長越三四年又生一本亦如之震隱居教授與弟友愛深至人以為和氣所鍾云巡撫周文襄忱有詩咏之曰植物有修竹獨為貞靜姿況作此嘉瑞一本挺兩岐間生已為異重見真絶竒考祥揆所自天和本人為君家世積善習隱勤詩書孝友既不爽徳慶日以滋冲融感和氣徵應良在兹繁陰媚駢幹密葉交連枝春妍色不競氷霜操豈移虚心待結實擢秀期諸兒朝陽有彩鳯翽翽將來儀張鎣巡按山東過酒肆帘拂其冠墜地公徐命拾冠著之諸長吏惶恐繫賣酒傭待㦸門公諭曰自後帘可高懸竟遣之去為大司寇時有獄須急報夜坐趣吏治文書遲明早奏夜半書既就吏拂燭汚文書叩頭請死公曰悞耳趣再書之坐待達曙不寐張弼為兵部郎數以直言忤當路遂出守南安入覲至京謁李文正東陽閽人辭焉弼題其几云始知東閣先生貴不放南安太守叅東陽固賢者與弼善弼非譏之也而風流亮直之概可想云其守南安時各郡收兵議賞武夫吏卒惟願得其墨妙故多以筆札佐郡費有方伯入覲緘楮一篋求書以饋長安貴人弼笑曰吾不能為書傭也為書四紙而還之其持正又如此曹時中分巡黔中所過題咏郵壁及還復經其處見有屬和者詞甚佳訪知為從行指揮所作既而其人罪當褫職特釋之及歸其人饋五百金公曰我惜汝才耳豈有私耶却不受家居廣富林不輕入郡邑守令初至一通謁歸即杜門守令至亦不接見年八十不復冠帶見客幅巾布袍賦詩飲酒人樂其真率華亭吳丕顯初補學官弟子製青苧布為襴衫後以授兄子太僕炯以及孫曾家有青苧亭至今存焉襴衫之製諸生服之洪武二十四年三易其式而後定用玉色絹布為之寛袖皂緣繫絛垂繻其後漸易以藍又罕用布者矣潘奎為本郡掾慈仁好拯物太守御下嚴胥吏無敢啓口有豪甚殘暴往往誣陷殺人賄諸役煆鍊人無敢辨一日當審錄退奎伏地為諸囚白寃并數豪不法事甚具守乃覆訊得實悉解放捕豪下獄後奎於吏舍生子守夢諸神騎乗鼓吹送一兒至吏舍醒而念曰有徳者必有後是潘奎家也月給粟周之所生子即尚書恩也錢福里居日有老儒館梁溪鄒氏詭稱錢狀元師以取重鄒與錢舊相識適報錢至河下鄒以錢来必謁師大治具以待師惶窘無措謂主人曰我當往舟中與偕來乃詣錢叩頭請死囁嚅吐實錢笑曰是不難欣然同往侍坐盡醉而罷瑁湖橋有賣餅師析箸爭父遺貲構訟兄以五十金乞顧文僖清居間求勝清佯應之使人召其弟叩所爭狀弟謂兄匿百金不予耳顧笑曰是易決何至遂傷天性即召兄至出金授弟曰我與若兄弟分此百金矣兩人感愧泣謝而去馮恩有布衣交曰郭濟恩上疏逮詔獄惟濟與同起居槖饘之饋五易寒暑及恩得論戌而濟以勞憊卒於旅次恩哭之慟撫其子女成立給以田宅遇之如家人子弟云四義僧舍利塔在佘山之北嘉靖間知府方廉所建皆征倭死事僧也羣鸛旋飛俗謂鸛井鸛飛成井必有風雨若探巢攫其子則一方致旱嘉靖間松江大風㧞木鸛巢墮地有子不損老人侯姓者取䕶之鸛復成巢負去其後侯老得疾氣絶矣鸛銜一草如箸置其口復活或曰此東海祖州不死草也嘉靖乙夘順天鄉試首題仁以為己任次題必得其名二句司禮巨璫持主考甚急宣言於朝曰仁以為己任下不知是何語徐文貞階曰即必得其名必得其夀徐文貞階督學兩浙時有士子文用顏苦孔之卓語徐批杜撰後散卷士子曰此語出揚子法言徐遽出位揖之曰本道科名早未曾讀書今承教矣衆皆嘆服徐鴻洲三重有八語自識室中曰室無美姬堂無俊僕案無戲具門無雜賔又宅取安人田取給食書取明道器取適用徐文貞階以禮部右侍郎遷吏部時榜於壁上曰咄汝階二十一而及第四十三而佐天官國恩厚矣何以稱塞所不竭忠殫勞而或植黨以擯賢或徇賄而鬻法或背公以行媚或持祿以自營神之殛之及於子孫張所兹思敬娶許氏外舅歿分授百金張曰此許氏物也立命還之從父給諫承憲有門生典試密寄關節一紙給諫子幼召思敬授之謝曰以此而得何以立縉紳間竟不受後司訓署邑篆歴以清介著早於一言徵節概矣隆慶間張燭知華亭縣櫃吏餽羨金千餘循故例也張悉籍其數報於兩臺請補别稅額臺使旌之曰塵視千金今猶額公署退食堂海瑞為巡撫意在搏擊豪强而兵備蔡國熙承時相風㫖首發難於徐文貞階於是雲間刁風特熾告訐無虚日或投栁跖告伯夷叔齊牒諷之海殊自悔乃盡焚訟牒故老言此陸莊簡光祖戲筆也蔡汝賢侍郎營墓塟父墓旁有人以積土來售畚鍤將半土中微露磚槨蔡惻然亟移原土封之不復取直林景暘以太僕家居性惇恪而雅負倫鑒喜奬後進延文士與子有麟同學每舉會必晨起滌几席設楮墨客具必親閱三命題期以酉刻畢畢則引大觥酌客稱引古道相慰勉迄無倦容與其會者張宗伯鼐鄭憲副棟杜方伯喬林杜駕部士基姜中翰雲龍錢比部大忠及李紹文也奚夢芝母病早夜籲天復収瘞遺胔為母祈福母夢神針兩頤及膝病遂瘥叔貧乏嗣養之迨卒稱貸治䘮姊密以筐篚寄芝暴卒籍而歸其子萬歴初司訓金壇遷曹縣教論徐文貞階嘉靖癸未探花及第夀八十一及見後癸未進士陸文定樹聲嘉靖辛丑會元夀九十七及見後辛丑進士姚方伯永濟萬歴戊戌登第夀九十八亦及見順治戊戌進士皆松之人瑞也郡侯許維新嘗坐早衙見興聖寺浮圖上有人盤旋使𨽻攝至具言為寺中磨治墖頂許熟視良久問其姓名居址命鄰里具収管狀存案以其人趫捷異常可慮也其防微周密如此又嘗開濬郡河募工挑土擇無業荒灘積之故河旁無留土久而通利其灘積髙遂以葬無主之䘮超果寺兩廊旅櫬累百一旦盡空蓋治河難於運土此亦可為法萬歴間府城有劫盜先數日有人載稻草灰堆積東城下髙卑大小不一處是夕羣盜刧城中自城飛墮灰上安然而去有詰奸之責者不可纖𤨏不察也李凌雲為御史日過滄州州守裁其夫馬李不為忤後巡按福建而州守為汀州同知自以前嫌必當被譴及李行部至旅見畢復召入謂曰屬吏皆先容競進獨君無有已登啓事幸自勉竟首薦之葉蕃春憲副有聲之父居黄浦東嘗宿邸舍主人出追逸僕獨少婦在日且暮矣蕃春渡浦避之時甚風雨足繭血濡無所顧又鄰有妾與嫡忤者胠篋逃夜匿蕃春園蕃春密召其夫與俱歸曰無箠楚使聞諸人為而垢其質行修飭如此徐炯倜儻好施振人之急不能償者多出劵還之家居南橋嘗以事至郡所過津梁十餘處皆圮毁不治歎曰風雨冰雪中病涉者多矣遂捐資悉創石梁里人至今賴之又覽南橋形勢有明行寺居南而北無鎻結因捨地建佛閣三座石甃洞門以通往來與寺遙望為浦南名鎮焉年逾耄無疾而終杜啓勲内行甚飭家貧假錢貿布之大賈席冏卿家市之司庫者於本值外誤發羨銀數十金勲不知也歸始知乃復棹舟以餘金歸席又嘗拾遺金於木市艤舟待亡金者歸之不告姓名而去李存素玠瑩積學教授恒語學者曰狂得聖人之神狷得聖人之骨惟鄉愿襲聖人之皮毛耳人推為確論張勃父年九十餘病不能起步明季土寇索財欲殺其父勃以身捍宛轉白刃間賊感其孝俱獲免小碭里民高英偶他出夜未歸羣盜窺高繼妻張及女慧俱二十許有姿遂夥至女聞之遽呼母起曰賊至矣寧鬭死毋為所汚且命幼弟挑燈曰看我殺賊遂握刈草刀伏門左張持鋤伏門右一賊巨斧斬門入柄長礙户落稍緩而女刀已斮賊頦墜一賊奮㦸入張揮鋤擊之不中中楣堅不能脫女為指壁間稻义張遂引义刺賊洞胸背一賊憤甚遽赤手入奪女刀賊手刃女手柄劃然柄刃為二賊雖得無柄刃而手傷甚不能用女則以柄撾之而張又拾地下賊斧亂劈賊退未逾限而斃當是時門外賊林立駭愕不敢入爭負屍逸去明日青村所守備楊廷棟往勘得狀且見賊頦兵卒咸咋舌義田贍族自宋范文正公仲淹創行於吳中負郭常稔之田千畝其規例見錢公輔記嗣是前明申文定時行義莊田若干畝陳文莊仁錫田蕩三百畝又唐順之記無錫華進士從龍近郭田千畝皆倣文正公之意其他惜不盡聞國朝刑部尚書張照祖淇以田千畝贍族田在婁縣照具以奏奉㫖張淇所置義田著照伊孫所請立冊存案張淇以已田作為公產贍養宗黨其敦本厚族之誼可嘉應加恩旌奬以昭義舉著交該部酌議具奏部覆張淇照伊子彚吏部侍郎加四級職銜給與封典仍行文署江撫喬世臣飭該縣立冊存案載入縣志張氏子孫不得擅賣族人外人不得擅買違者照例治罪奉㫖依議士大夫咸歎美之以為盛事常州府楊龜山時正和間寓毘陵居龜巢巷嘗謁鄒志完時志完已病楊至臥内見之猶問以時事如何互相咨嗟龜巢巷在今周仙巷口張誠旌孝碑宋元豐七年毘陵華直内所重建誠須城人自祖綰六世同居男女少長合一百十七口以耕漁為業每旦坐堂上集子弟分工授事皆整容悚息而出不敢少怠南渡後徙居毘陵子孫以文學取科第為毘陵望族是碑沒於郡人薛埜之家園元至治間因治地得之植於庭倪瓚自先世以來代雄於貲瓚厭棄紛華清修好義其師鞏昌王仁輔老而無嗣奉養終其身歿為制服執䘮營葬務致誠慤嘗鬻産得錢千百緡㑹張雨至其家念雨老不再至推與不留一緡無錫有義犬冢張籌遇毒蛇犬嚙殺蛇中毒死籌葬之勒石以志云洪武元年余以尚書禮部奔先考䘮歸講䘮禮時則鄰姻得菴費翁數相過從六月既望時雨新霽余因訪得菴於弓河草堂步行新橋委巷泥濘沒屐齒余踞盤石濯足有蛇蟠石交縳余左足事出不意時惟一黄犬隨余行余顧犬太息犬解余意嚙蛇數段死犬亦旋死余相河南隅一丘用筦席四襲坎葬云嗚呼銜結之報書傳所載非誣也乃余親受此犬脫非常之厄謹朱書元石追而納之壙與得菴親臨視焉余乃一梧主人姓張氏葬之為六月二十四日徐晞永樂中由縣功曹歴陞兵部尚書其為功曹時有貧人悞籍戍丁被攝祈免具酒為夀令妻進觴而身自引避妻殊色也晞一見絶裾走仍脫免之尤文簡延之每公退則閉户謝客日計手抄若干古書其子弟及諸女亦抄書嘗曰予所抄書將彚而目之以代饑之肉寒之裘寂處之朋友幽憂之金石琴瑟也張通叅選大節甚著臨終語所親曰先輩身死國事如施御史武許給事靈皆未與祀典吾累陳之有司未之信也吾死勿置我鄉賢以增吾愧湯大理沐公餘日錄云予仕武義時適奉部檄旌表節婦朱氏先期召婦入邑蓋鄉民徐信妻守節五十年矣用綵亭二一置金縷一置文牘題綵聨云喜聞鼓吹喧通市羞殺琵琶過别船又云食荼敢謂當年苦啖蔗方知此日甘又云地無塵土沾荆布天有恩波載柏舟以竹兜坐婦導迎遍城市許婦女縱觀仍偕儒官送至其家蓋奉宣徳意固臣職之大端表勵風俗尤親民之首務聊竭此心而已朱仲南為縣主刑吏景泰末無錫大饑民無食者羣聚而之有榖之家强貸焉有榖之家指為盜上之郡郡守擬以辟仲南爭之曰法當笞足矣守怒其狥榜掠甚毒嚴訊至再無異辭獄以不成英宗復辟諸囚邀赦出仲南曰我為小吏活三十六人心亦可以無負矣遂解役歸張養浩嘗行髙橋之南遇醉而鬭者一人墜金於地張拾而黙觀焉鬭已其人始覺大惶廹澘然出涕張徐呼謂曰男兒何不能自慎以有此失茍非我恐金不歸矣遂還之其人謀所以報不顧而去子愷舉成化進士顧榮僖可學副使可久之祖少貧寄食於姻邵早起立門外富人鄒雲騎馬過一僕騎而負笥以從下馬攜笥如溷既見主已逺遂馳去忘其笥顧視之一笥金也俟其來還之雲聞馳謝願分十一以贈不受時適有蘇商見而義之妻以女後乃日昌終邀封典陳廣儒家子孤貧通家顏氏衣食之廣無能强飯酣卧而已且有風疾顔厚之不少衰顔之讐賄侍婢置毒餅中以進廣知不泄遽入攘餅食之左右方怪駭食頃嘔出細蟲無算問之終無所言及侍婢夜逃人始漸知其事而廣風疾頓除夀至九十八顧言曾祖清年逾四十妻方娠適寒夜清宿郡邸有女來奔清正襟出庭中冐寒立比旦托事歸而是夜即生子至言貴顯邵文莊寳幼與同邑丁松年惠逺稱三竒童嘗同至洞虚宫嗣龍山房道士年八十餘謂曰聞三君敏妙我有王學士夀先師祖文千餘言能誦十過記當烹白鵝以進於是丁誦一過背之不失一字惠誦兩過訛四五字邵細讀三過又聽二子背誦各一過訛十餘字道士進鵞既去謂弟子曰邵子深沉寡言舉止不茍此逺大之器二子質敏而氣浮非其倫也又三年而丁以儒士第一人應舉不第尋卒惠後仕終順天通判邵至大位悉如道士言萬宗伯士和唐荆川順之門人也分守饒州謁别荆川荆川以磁盂二為贐或曰饒固多磁何贐是唐曰惟其多磁是以贐也萬子他日歸而磁不加益者乃真我弟子也惠山之麓有碧山吟社成𢎞間諸名徳為文㑹之處好事者繪圖以紀其勝邵寳為之記王宗幼䘮母父傭惠山僧舍及宗年十三慟哭迎父歸止於外家旦暮負薪以養既二年拾遺囊於道俟其人至而還之則報以三緡受而買二驢負載取直父養稍裕又十年始僦屋三登里娶妻生子痛母早世終身不飲酒食肉當宗策蹇時為富民張江齮齕瀕死後江與强銘者訟久不相下會銘一奴死遂誣江殺之知宗之仇江也餽之金而引為証及就訊宗慷慨明其始末還所餽金於官修三登倉其子曰澤澤子台問問子鑑皆登第許鼎臣之父繩武以屋典毛敬宇銀四十兩敬宇不戒於火屋燬繩武慰之曰典銀當奉還已而書與鼎臣曰毛敬宇失火吾家當自再造耳鼎臣方為僉憲亦以銀寄歸曰應還其銀也父子同心好義與范文正詢堯夫麥舟事相類鄒忠穎極孝一日將飯食肉而美問母曾飯未既而知先母飯也自咎罰穢水二碗終日不食又極友愛祖居一區得第後讓弟居之弟三鬻於人三贖以與弟居之孝廉許世卿伯勲嘗揭安貧五戒於壁曰詭収田糧干謁官府借女結婚多納僮僕向人乞覓又揭省事五戒於壁曰無故拜客輕赴酒席妄薦館賓替人稱貸濫與義㑹又有和風未學由由惠清節寧希望望夷之句每勅其子曰人何可不學但口不說欺心話身不做欺心事出無慚朋友入無慚妻子方可名學人耳白惠風貽清當㑹試五日父訃至或勸匿之白曰今科不第尚有來科終天之悲如何可遏今違含殮罪已莫逭況可入闈以冀非分耶星夜馳歸後服闋登第宜興堵作邦妻徐氏少寡止一女亦早寡母問當守故女以夫情對母作色曰婦人之節守義不守情夫情與欲鄰念情即欲動欲㡬動而守不遷者寡矣女凜然受戒母女相依操如霜肅趙登之熙瀛四十無子方與諸昆謀卜地葬親而形家言地獨不利於熙瀛嗣續奈何熙瀛毅然曰有諸猶子在趙氏鬼不餒但得親骨入土吾絶嗣甘心焉竟葬之後生子林玖登鄉薦孫枝繁衍萬歴間島盜躙毘陵官兵懦縮顧湯卿率里中子弟為團練厲衆扼據河北諸村設伏山溪叢薄𠞰殺無算會夜逐北錯足墮水遂遇害官檄各處倣行顧保障法寇平為建祠曰義烈江陰縣簿曹廷慧力捍危城四十日不寢食卒用火攻退倭論功陞蘇州判去有戰馬直百金曹以官物留於縣上官知之命日給圉人料銀一錢豢之二十餘年乃死劉崟混跡牙儈襄陽估王姓載棉花至常因往浙以銀二千餘兩并衣囊手書單貯崟處估去溺死錢塘江崟聞之即馳信估子子至悉以前所貯及單與之子感涕願分其半崟義不受自後子孫科甲綿盛云萬歴壬子鄉闈學臣命諸生在省候榜榜首武進張瑋也瑋師同邑髙秉忠夙儒弟子登榜者并瑋得十七人例鹿鳴讌五魁坐堂上餘列兩廡瑋白監臨御史弟子不得先師移秉忠席堂上其十七人者向秉忠肅拜而後就坐一時以為盛事萬歴末商舟浮江來艤黄田港舟人死藁葬城北隅舟人故畜一犬犬繞屍悲鳴呼之不去商舟解維其犬臥墓下寒暑不暫離居人哀之咸給其食且為草窟以庇焉又博瀦里民家一犬對宇而居者時與之食後其家主人死主婦即嫁對宇者犬遂絶不入其門與之食亦不食竟悲號臥死空室中嗚呼人之愧此者多矣天啓乙丑秋將毁東林書院高忠憲攀龍夜召儒學吏潘守命之曰書院毁矣惟是燕居廟孔子神位豈可俱毁吾念惟文廟複壁中可藏特以相托毋泄乃呼燈躬奉神位付潘明年公及於難其後燕居廟再建潘之子華言於衆乃迎而祀焉廼安為華仲儀僕仲儀戌淮貲盡無所得食安因求事乾没日以所得歸給其主又王朋者亦華氏傭主為郡諸生悞殺其族人之僕朋竟詣官言主有事郡學去錫邑百里殺人者朋也歴訊任益力瘐死獄中又姚錄者從其主姚期綱運入都期罹法東厰捕之急因期出惟錄守舍遂自言期子縳之去道遇期亂以他語期乃逸錄至官榜掠甚酷堅言父逃久之得解歸崇正丁丑錫邑第者七人持年晚生刺謁嚴司寇一鵬嚴為萬歴丁丑進士年九十出見笑謂曰今日承諸君不棄老耄他年丁丑又有後來者援例謁諸君也胡時中進曰是時晚生輩又率諸後來者以謁先生耳相與大笑嚴固人瑞而一時詞令之善如此陳大智家世素封性孝尚義識松江錢龍錫於諸生曾造羈人舖及雲亭鎮橋張公殿撫諸姪成立以已資分析授之還貧人劵育族女於家失火延燒其堂詭辭曰吾室小正欲别構卒成禮嫁之巢五一震林為禮部郎康熈初朝議去四書八股制藝専用時務論䇿取士震林言八股可去四書五經不可去於是採其說例以經書命題江陰縣名宦祠傾圮已久木主散失僅存三五露處祠内康熙間學博某為之修葺煥然一新學博夜夢入祠中見衣冠甚偉者四十餘人揖而告之曰君為吾輩安設木主吾輩為君修葺宫牆閱月有學役吳欽於祠旁鋤地忽得白金三十兩願獻於官學博曰疇昔之夢驗矣吾敢染指此金乎手授邑紳輩築宫牆三十餘丈不日告成學使田雯曰此將來一段佳話也鎮江府漢時有金牛出於山東馳到曲阿畍村人柵斷其道謂其地為柵口牛皆奔聚因曰奔牛又相傳萬策湖中有銅牛人逐之走至此柵今柵口及堰皆以此名二說微異溧陽舊多蠱毒丞相韓滉為浙江觀察欲絶其源時有僧住竹林寺每絹一疋易藥一丸中蠱毒者多獲全濟值滉女有疾浴於溫泉而愈乃捨女裝奩造浮圖於泉之右延竹林藥僧主之滉因求其方刋石於縣市以流布焉唐末石不復存而溫湯之寺不改有夏氏世傳其方藥以溫湯為名誌所自也原方以五月初桃皮生用二錢盤蝥以麥麩炒去翅足二錢大㦸生用二錢三物為末以米泔淀為丸如棗核形凡中蠱者於食前以米泔下一丸坐靜室中忌婦人孝服猫犬見此方崇寧間竹林住持僧智淳得之於帥府曾氏云唐代宗時李秀卿刺湖州至維揚逢陸鴻漸羽李素熟羽名因赴郡抵揚子驛曰陸君善於茶天下聞名況南零水又殊絶二妙千載一遇乃命軍士挈瓶操舟汲南零羽執器以俟俄水至羽以杓揚之曰江則江矣非南零者既而傾諸盆至半遽止之曰此南零者矣軍士大駭跪曰齎自南零舟蕩覆水懼其尠挹岸水增之處士神鍳也又李徳裕在中書有親知奉使京口徳裕曰還日金山下中冷水可與汲一盎來其人舉棹日醉而忘之至石城下方憶乃汲一瓶於江中歸獻徳裕飲而嘆曰江表水有異於頃歳矣頗似建業石城下水其人謝過不敢隱蕭楚材知溧陽縣時張乖崖詠作牧一日召之食見几案有詩句云獨憾太平無一事江南閒殺老尚書楚材為易憾字作幸字詠出見稾曰誰改我詩者楚材曰公功高位重姦人側目之秋且天下一統公獨憾太平何也詠感嘆曰君我一字之師也王正肅遂紹定間曾為平江守以師黄榦之訓書諸紳曰士友當親而賢否不可不辨財利當逺而㑹計不可不明折獄以情毋為私意所牽薦士以才母為權要所奪當言則言不視時而退縮可去則去不計利而遲回庶㡬名節之全不愧簡冊所載范文正仲淹在睢陽遣子純仁往蘇州取麥五百斛純仁時年尚少既還舟次丹陽見石曼卿問寄此久近石曰三䘮在淺土欲葬之而北歸無可與謀者純仁以麥舟付之單騎到家文正曰東吳見故舊乎曰曼卿為三䘮未舉方滯丹陽時無郭元振無可告者文正曰何不以麥舟與之曰已與之矣宋末賊掠潤州城門不啓者十七日民餓死且半時有費簧者出粟施粥活人甚衆鄉人曰皆簧所祐也遂名其里曰簧祐以志其徳丹陽吉棠少時父令負販眭仲徳途遇之勸令就學曰家貧須麥粥養父仲徳曰麥粥我家有之攜歸與子􅈌同學後棠為御史過仲徳家家惟一椅讓棠坐自坐木臼棠辭不敢因並坐檻上仍出麥粥啖之時􅈌已列刑垣矣北固有蜂甚巨冠色赤鳥撲之墮地羣蜂數萬結聚不去一二日皆死楊文襄一清取而瘞之作義蜂記楊文襄一清在靈州人有笑其演營習陣者楊謂余誠書生不諳軍旅然以古人行必謹哨探止必修戰備為法其敢忽諸又每諭諸將曰無事常如有事時隄防有事常如無事時鎮靜念武侯衞公未嘗廢營陣世無岳武穆豈可恃野戰為能耶李重嘗授經溧陽史氏歳俸八十金史憐先生貧私為置子錢歳暮進之重但受如約餘麾之弗顧後舉正徳間進士官至副使歸老後仍授經於溧陽高淳間恒無以自給丹陽蔣教諭從教性戅直有市井子驟富以金線結為履見而惡之紿曰吾欲倣其式既進履即令童子擲諸水曰小人敢爾奢僭王給事煜年十三遊庠時縣令與邑紳互訐直指詣學諭諸生曰為令者左為紳者右諸生俱左煜獨徐步至右直指曰小秀才何獨異煜曰問理之曲直不問人之多寡論人之是非不論年之大小直指顧謂令曰此子即樹爾他日之敵矣爾其行哉及壯讀書金山寺一日以訪友出適嚴嵩以翰林學士入朝道金山入其館見案間文善之久待不至留名刺函十金屬寺僧道意煜見之曰彼日後得志必為奸黨何以是汙我擲其金於江戴從商尚質性介特嘉靖間一就試學使者鄙其苛文碎儀即棄去隱居篤學自壯至老不取人一錢不飯人一飯嘗著不取歌曰我取人一錢人取我一緡旦旦相取月月相纒是以下有血地上有刀天我今不取我念曠然爾念曠然聊以頤我年又不飯歌曰若通人飲食是隨人往來我來彼往彼往我來歡則為狎怨則為猜歡情恒不常怨情最易久偪側一世間負債如羊狗我寧吞大冶之鎔銅決不霑烏程之清酒吕城人陳瑶能於馬上運鐵义數百人叢刺之莫能近嘉靖倭寇江南大府令鄉民絶橋自守而募能斬倭者一首賞錢萬瑶率其徒數十人應募乗白騾與倭戰騾上倭首纍纍也一日倭悉衆死戰倭法臨陣左手持刃挺而前右手刃纔數寸人不虞其右也近則舒之長五六尺削鐵如肉因斷瑶义瑶呼徒易义瑶每戰令徒載數义隨之而性貪馘首專其功徒無與者徒憾之不應瑶度倭盛不可敵奔逸至吕城牐先是瑶需渡而牐斷則肘下挾騾一躍逕渡以為常是日腰懸七倭首仍掖騾欲躍累重墜於河倭競前殺之賀邦泰幼時其父鎬建亭水中令讀書而撤其圯賀戲以一木支岸逕行出入甚熟後令莆田率民擊倭馬逸馳倭壘倭逼之前臨大河廣踰丈橋毁獨一木渡賀遂棄其騎趨而撤之倭驚以為神崇禎初大官庖開應支物價簿帝詰内侍謂太浮且曰炙鵞醃鰣肉酢在某肆市之錢半百耳内侍驚愕丹陽談允謙有述事詩云潛邸曾親到市纒民間物價每留連西華鵞炙前門酢一箸纔消半百錢陳都諫獻策妻程氏隨夫在京邸獻策方會議三案於内府薄暮未歸有婦稱鄰嫗求謁閽者不能禁直入榻前泣告曰妾奉聖夫人客氏也待罪掖廷已歴年所亦有何罪而議者將及焉妾聞卿家大人直聲竒節知夫人亦良苦敬以黄金百鎰為夫人夀願大人憐而赦之程謝曰夫人休矣妾以鄙陋之質櫛不設􅁫衵不引帛猶自愧非分安用此黄金為且大廷國是向兒女子嘵嘵夫人謂殿陛中真無一男子耶聲色俱厲正論侃侃士大夫有不逮者張君表鳯儀子九徵登第貽書都門誡之曰入世在自立毋輕受人恩我為諸生三十年未持一門生之刺所見有王文成高忠憲其人乎外此無可北面矣人謂此不特為氣骨語實名言也華鈺以璽卿家居有富人子殺人祈鈺居間干當道劵千金却之明日倍其劵又明日再倍其劵鈺曰我豈與若較此哉若罪故無生理吾分亦無居間理郡邑試諸生鄉大夫各為所親先容鈺獨無所謁或偽署鈺牘以進鈺廉得之不白是非但語署牘者毋納諸生金人服其清介而仍不失長者淮安府王義方拜御史嘗買宅既數日忽對賔朋指庭中青桐樹一雙曰此無酬直賔朋言樹當隨宅無别酬例義方曰此嘉樹非他物比召宅主付之錢四千王義方為魏徵所知徵欲妻以夫人之姪王辭不取俄而徵薨王乃取女人問其故曰初不附宰相今感知已故也米芾知漣水軍時祀先聖極誠敬上自香帛酒醴羮醢下及牲牢灌獻靡不竭誠躬親致齋九日方敢涖事祭時香烟直上不散結成伯牛受享四字羣覩駭異明崇禎間賀相國逢聖為應城教諭質明丁祭親見先聖自空中攜一芹而起與此事同淮陽楊孝子名昊字克彰刑科給事理之父也昊早䘮父哀毁甚而每强顔以慰母心事母能養志母酷愛其孫昊嘗牽率諸子抱弄母前枚指之曰某可承家某可事生業某當作官以顯門閭母聞之大悅其他問安視膳𤨏節不異常人而一以至誠感動有司旌其門華亭張弼為之立傳安東濵海人房得莘猶子妻劉氏驅牛駕車運薪於野方載數束虎忽摶劉氏牛力抵之虎棄去劉登車牛拽行十餘步虎復追至牛復抵之虎又棄去劉傷臂不能登車牛角薪於地空車就劉劉匍匐上車牛曳之行猶再三回顧抵家乃已劉得不死飼牛終身不令服軛云永樂十二年事韋彥質斌成化時在諫垣批鱗敢諫然每自省曰假彈射以快私讐掇細緩以沽公道我所深恥後提學福建公正不可干以私而衡鑒精審曰糊名命題我則試人填名揭案人則試吾矣庸髙下其手耶凡所奬㧞皆能速蜚丘志中度為山陽邑生館於郡守署郡守欲因事周之可數百金度竟辭去曰守不知丘生丘生不患貧也後官太僕卿適開府當推人有諷之者曰當軸急君甚一枉見即可得度笑曰乃有呈身都御史耶竟以忤權璫罷去岳薦當明季棄諸生隱居勵行嘗語人曰聖賢精蘊盡於六經四子其要歸不越大學一書凡人生平其用力當在致知其涵養當在主敬以躬行為實學以隨處體認天理為反身求已之要至今淮干學者猶欽其緒言云桃源令蕭文蔚撰邑諺以儆座右有云衙門相逼官不能為民主差使過繁民不能為身主又云貧村瀕河製一艇實有易逃之路急以刑是使之逃宜防於先時破釜隔日煮三升實無難去之家嚴其課是驅之去宜防於平日順治間徽人程元昭僦居安東齊文光之舍貰酒為業夜半見所砌花臺上有光撥土視之則白鏹一巨缸也急呼主人告之曰奈何慢藏至此盍収之齊曰非也天賜汝遜讓再三且勸程曰天與汝而可不取乎吾誓不須此非分之財爾其遄歸程後居蘇州成巨富歳一往來必有所饋遺而齊絶不受并未嘗言及前事嗚呼程固君子如齊者尤不可及矣孫超宗母塋在安東城北平旺河沱溝康熙間中河口決直當其衝孫聞之奔赴見白浪澎湃如雷松楸根已向上不數武即壟矣水深不可測而夜昏黑泅不能至孫痛哭呼天跪水内徹夜籲龍神不絶黎明家人肩柴負木接踵而至下樁埽以救危急則見塋前昨夕之深不可測者已横起沙壟溜水兩分去如燕尾見塋止塌去一角而四週皆成平陸安東有朱母蘇氏節孝祠朱以傑其裔孫也康熙間火災自城外延燒城内不啻千餘家而節孝祠廹於烈熖以傑奔救之見祠内平地出火燄起數尺勢不可保乃呼天痛哭懷神主期以身殉哭未已忽反風祠火盡滅惟焦門外旗杆二株廟貌一無所損人以為誠孝所感云揚州府廣陵高爽博學多才齊永明中舉孝廉先是劉蒨為晉陵令爽詣蒨不相接甚銜之俄而爽代蒨為令蒨迎贈甚厚爽受饋答書人問其故答曰彼自餉晉陵令耳何關爽事司徒杜衍天禧間知揚州嘗召賔幕閒語我致政之後必買一小駟八九千者飽食訖跨之著一粗布襴衫入市看盤鈴傀儡足矣杜深志豈在傀儡蓋居髙位欲自汚退老耳後致仕果行前志海寧人王興公伯起少年時曾一舉進士輒嘆曰士不自重與千百人旅進坐軒廡下獻小藝規合有司可恥也遂棄去閉門力學嘉平間被薦不起孫叔靜鼛本錢塘人隨父徙江都微時與蔡京善常言蔡子貴人但才勝徳恐貽天下憂及為屯田員外郎京謂之曰我若用於天子願助我鼛曰公誠謹守祖宗之法以正論輔人主示節儉以先百吏而絶口不言兵天下幸甚鼛何為者後竟以忤蔡罷揚州産芍藥佳者不減姚黄魏紫蔡京知州日作萬花㑹其後嵗嵗循習人頗病之元祐間蘇文忠軾來知州正遇花時吏白舊例軾判罷之書報王定國云花㑹撿舊案用花千萬朶吏緣為奸乃揚州大害已罷之矣雖殺風景免造業也蘇文忠軾知揚州夢行山林間一虎來噬窘甚有紫衣道士揮袖障公叱虎使去明旦道士投謁曰夜出不至驚否蘇叱曰鼠子乃敢爾正欲杖汝脊汝謂我不知豎子夜來術耶道士惶怖而退蔣頴叔之奇為江淮發運使才智有餘人莫能欺嘗於所居公署前置一占風旗使人候之置籍焉令諸漕綱日程亦各記風之便逆蓋雷雨雪雹霧露或有不均而風則無頓殊者每運至取其日程厯以合之責其稽緩者綱吏畏服熙寧中髙麗入貢所經州縣悉索地圖所至皆造送山川道路形勢險易無不備載至揚州牒州取地圖是時丞相陳升之判揚州紿使者欲備見兩浙所供圖倣其規制造送及圖至都聚而焚之具以事聞宋祖自平江南詔以兵器盡納揚州不得支動號曰禁庫方臘作亂童貫出征許於逐州軍選練兵仗既開禁庫兩將士望見所貯弓挺直曰此良弓也因出試之宛然如新計開寳至宣和一百五十年而膠漆不脫可謂異矣靖康末東南起勤王之師帥臣翁彦國令揚州作院造神臂弓限一月成皆不可用識者以為國初之弓限一年成而今成於旬日之間宜乎美惡之相絶也張舜文汝明徽宗時知岳州屬邑得古編鐘求上獻張曰天子命我以千里懼不能仰承徳意敢越職以倖賞乎朱光信恕樵薪於草堰場以養母每從王艮齋聽講有禮之者曰我以數十金貸汝別尋生計庶免作苦且可日夕從吾輩遊也朱得金恚曰子非愛我也我自此憧憧然經營念起斷送一生矣遂擲還之學使者召之不往以事役之短衣徒跣而入儲文懿巏字靜夫泰州人卒於南都後三年歸柩海陵攢於墓舍將葬啓視棺上生黝墨成繪畫文具畫家皴染之法前則奇石枯松旁出二篠莖葉咸備左則梅株夭矯稍著數花右如左而樹枝差短其文深入木理四方來觀詫為神異顧尚書璘為作靈徵記嘉靖初揚有司訓徐覲者於啓聖祠旁縱奴射鸛一日鸛銜火焚祠有鸛數百盤旋烈焰之上若快心者徐坐焚祠去官奴亦瘖楊實夫果嘉靖間官至侍郎清介恬退嘗語人曰吾生平無所長惟不識瑾寧彬三人差自慰耳李文定春芳及第臚傳前一日在寓邸與客弈或密以所擬甲乙報李返坐自如置帖碁枰下終局無㡬微見顔色客詰之徐以帖示客曰拙卷亦預進呈之列耳衆以此多其度廷對前數日夢紅帛纒身不得脫及臚傳世宗見其名大喜曰桃李當春日正芳妍之時以硃筆遶春芳二字圏之居政府時考官以典南闈試來别袖出預擬試題呈正李置篋中而已將揭曉夫人問兒輩知可中否曰題難焉得中夫人驚何以預知因語其故夫人問寄兒輩否曰人以心腹待我故先期見示語兒輩非彼所望於我也從篋取出火之李碧海思誠夫人于氏極賢明當思誠為宗伯加宫保時夫人家居有人言公行入閣者夫人正色曰宰相可為而於閹宦得志之時則可為而不可為也曾銑有膽畧長於用兵其撫邊時當除夜猝命諸將出塞上時無警諸將置酒度歳不欲行賂鈐卒求緩於銑妾妾啓銑銑斬卒以狥諸將不得己丙夜被甲行果遇寇擊敗之翼日入賀畢問何以知有警也銑笑曰見烏鵲非時噪以故知之皆大服盧守常倅陳州日畜二鶴甚馴一創死一哀鳴不食盧勉飼之乃就食一旦鳴繞盧側盧曰爾欲去耶有天可飛有林可棲不爾羈也鶴振翮雲際數四回翔乃去後盧老病無子歸休黄浦溪上晚秋蕭瑟曳杖林間忽有鶴盤空聲鳴淒斷盧仰祝曰若非我陳州侣耶果爾當下鶴竟投入懷中以喙牽衣旋舞不釋盧撫之泣曰我老無嗣形影相弔爾幸留此當如孤山逋老共此殘年遂引之歸盧殁鶴亦不食死家人瘞之墓在丁堰宗臣為閩督學卒於官僚屬生儒咸赴弔於靈几上得遺詩三首超脫塵􅅽以故相傳尸蛻云劉靜之永澄萬歴間為順天教授北方稱為淮南夫子嘗曰謙謙自牧由由與偕在醜不爭臨財無茍此居鄉之利也耳習𤨏尾之談目習徵逐之行以不分黑白為渾融以不悖時情為忠厚此居鄉之害也夫惡人不可為矣庸人又豈可為乎惡人不當交矣庸人又豈足交乎南江寺僧羅得一雁籠置窓外秋夜聞月下有雁聲與籠雁相鳴答俄而撲拉簷下僧亟起視則二雁交頸俱斃又婁生以矰弋為業方捕隻雁入籠而飛雁盤空呌聲甚苦頃即自投而下籠中者伸脰就之交結死婁為感動瘞之叢薄間破矰斷繳改業焉劉西郭清師事林東城司訓浮梁教嚴而氣和或從而問著述則曰帖括是尊最悞後進問學術則曰道寓諸庸目前皆是謝家店民家有雙燕巢於梁既乳四燕其雌忽為鷙鳥所摶俄有羣燕挾一雌來留與為偶閱一二日四雛悉斃主人怪之啓視喉間皆蒼耳子蓋雌妬殺之也此與張邦基墨莊漫錄所載廣陵牛氏燕事正同又皆出於揚土亦大異事劉翼齋希文為諸生時嘗以朔望謁監司時有某生怙勢豪横出訟牒理債於公庭衆雖不與其事然皆附和長跪希文獨挺身離班次竦立監司詰之對曰所言公何敢不伏謁若結黨狥私此膝寧輕屈耶監司大加器重東廂民陳穀死有所愛犬常伏柩旁不去既葬犬時時往宿其冢數日乃一歸求食家人殊不知也穀子相為諸生以時掃墓見犬方專冢臥為之加慟韓樂吾貞以陶瓦為業從朱信學久之有得縣令嘉之遺米二石金一鍰貞受米返金謝曰某窶人無能補於左右但與貞居者幸無訟牒煩公府此所以報明府也每遇㑹講有談世事者輒大噪曰光陰有幾乃作此閒談耶或尋章摘句則又噪曰舍却當下不理㑹搬弄陳言此豈學究講肆耶在座莫不警省咸寧人倪璜寓居廣陵母劉病齋沐祈天七夜不寐一日方沐浴盆水忽冰成竒花扶疎三本幹葉俱備母病遂愈人咸嗟異為孝徵李維嶷長敷宗伯公子與姪清同舉於鄉鄉人嘖嘖稱羨長敷顧清慨然曰吾不喜而憂也夫盛滿道家所忌且積徳以致福今無乃福溢於徳乎故可憂也夏心尼宗孔髫歳為諸生篤行嗜學嘗銘座右曰五倫之外無事業六經之外無文章年近百歳髙郵守三晉之賔筵云方立禮繼母愛已出子遇立禮不慈鞭撻至酷立禮受之無怨言江都人莫不稱其孝其父卒母閉之空室中不予食者三日有犬銜餅自竇中入與之得不死母意其已斃啓門見猶生遂以為神暴亦漸已陳恕先以忠江都諸生敦實學持身以敬為主每曰敬則寡慾可以成仁敬則心虚可以益智敬則氣聚可以生勇三達徳皆由敬出也妖人朱方旦妄言禍福走謁者如騖汪蛟門懋麟為辨道論闢之謂國家幸太平無事得此輩以資談諧玩弄足矣今𫝊㑹者崇奉太過或謂孔氏復生或謂大禹再見甚謂移檄玉皇則祈雨立應不惟上侮聖人亦且獲罪天地一旦朝廷震怒加以妖言惑衆之罪吾不知朱某安所逃死時孝感熊賜履掌翰林佩其言枉顧訪之與定交汪後罷官歸構十二研齋於平山堂側吟嘯以老云徐州府漢高祖父太上皇前史不載其名後漢章帝紀祠太上皇於萬年注名煓一名執嘉高后紀載高祖母曰昭靈后唐王智興為徐州節度一日諸從事㑹飲賦詩智興至從事即屏去翰墨智興言適間作詩何獨見某而罷復以箋陳席上小吏置箋智興前智興引毫立成曰三十年前老健兒剛被郎官遣作詩江南花栁從君詠塞北烟塵獨我知四座驚嘆監軍謂張祜曰觀兹盛事豈得無言祜乃獻詩曰十年受命鎮方隅孝節忠規兩有餘誰信將壇佳政外李陵章句右軍書蕭縣劉伯龍家有清節宋元嘉中為武陵太守歸貧甚將營什一之方忽見一鬼在旁撫掌大笑伯龍嘆曰貧窮固有命乃復為鬼所揶揄耶遂止􅄯文元迥在翰林以文章徳行為真宗所優異稱為君子長者天禧初因草詔命坐賜茶既退已昏夕上顧左右取燭與學士中使就御前取燭為導出内門𫝊付從史又嘗宴宜春殿内出牡丹百餘盤千葉者纔十餘朶賜親王宰臣上顧迥及錢文禧維演各賜一朶凡賜禁中名花故事惟親王宰臣中使為之插花餘皆自戴上獨令内侍為迥戴花觀者榮之李若谷未第時與韓億為友俱貧同試京師每出謁更迭為僕若谷先登第授許州長社縣簿赴官自控妻驢億為負箱將至長社三十里謂億曰恐縣吏來須别因取箱中錢六百以其半遺億一氊一席亦割分之相持大哭後億亦登第皆仕至叅知政事天聖間新進士謁李子淵若谷求教若谷曰某自守官來常持四字曰勤謹和緩一後生應聲曰勤謹和既聞命矣緩之一字某所未聞若谷正色曰何嘗教賢緩不及事來且道世間何事不因忙中錯了黄瑞禾䆃明經能詩嘗揭於壁曰十分貧也還栽竹四壁蕭然不賣琴其高致可挹王封麓國輔丁公里人仕為鄢陵令性剛正嘗有司李欲取其公署一牀者國輔曰此公家物非有司所能私予趙子雝時若沛貢生性仁厚家畜一驢聞鄰人生子謂妻曰彼年三十始有兒脫驢鳴驚之是我過也遂賣之崔眉山字曰嵋嘗為聖府典籍年六十尚無子妾數年不孕妻復為購一婢崔惻然曰子之有無命也安用多玷以滋予罪擇配遣之未㡬而前所納妾連舉二子徐州有義虎橋相傳有商迷道悞墮虎穴謂必死乃虎熟視不加噬晝則出取物食之夜歸若為之䕶者月餘商稍諳虎性謂之曰吾失道至此幸君惠我我久客外家有父母妻子思欲一見仗君力能置我大道中幸甚虎即伏地摇尾商喻意騎其背虎躍出置諸道旁顧而悲跳分去後數載商偶經其地見獵者縳一生虎將獻之官視之乃前虎也虎見商回睨不捨商亦感泣與衆具道前事亟出重貲贖之衆義其所為釋縳縱深山中後人於其地為橋以表焉邳州有慈母樹順治間州民劉清源幼失生母嫡母沈氏撫養之食必先嘗寢必同臥恩踰已出其家祖墓有樹枯十三年矣一夕復生枝葉更茂前時人以為沈徳所感故以號樹云順治間宿遷知縣金華鄭應兆奉臺檄令以逋賦紳士名列上候處分獨不肯具報或謂之曰子寧不為官計乎應兆曰我安忍以數百人身名博我一官哉竟以此去諸生王來彝懷逺讀書教子每云家居能教一子弟心術正即流徳無窮也當諸子弟㑹食必諄諄以天理二字相戒勉太倉州龔熙仲明之以孝行節誼著於海濵紹興間舉鄉貢年已六十或勸少為詐匿以避老龔笑曰吾生平不欺豈以始進易心乎嘉定王彝自號媯蜼子學有淵源文甚高潔時楊鐵崖維貞以文雄東南傾動一世彝獨作文妖一篇詆之練達者子寧從父知嘉定縣㑹族誅部民郭元宗曾被盜誣達廉其寃出之至是詣達欲與俱亡達以懷姙妾黄氏屬之而與妻赴海死郭迎黄氏處别室生男謹䕶之念其父為邑侯而嘉定號練川乃托姓侯名之曰居練既而詔除諸臣家屬罪黄囑居練勿自明以是無知者黄守節九十三歳卒按縣志及縣令題名并江西通志俱無練達姓名因練氏已削籍不敢載耳乃其家藏有宗譜足徵世傳不誣也陸安甫伸未第時州大夫請修州志陸謝曰志者一方文獻史稱虞世南豫修書虞茘虞寄得佳傳至今訾之先子州人予何執筆後登第竟以觸璫怒死明初嘉定縣吏某一鄰人以訟在縣白吏求私直之吏曰今郡縣官皆公廉奉法吾曹革心疇敢出入文牘汝事直苐公理之決無枉鄰人如教果獲伸感吏饋粟二石吏驚却之不得曰吾以鄉曲之故為君受一斛後因假歸遂以原粟奉鄰母曰此若兒所寄今以還母此吏殊可風也真如有姚生者素險賊嘗構怨於陸某陸充糧長乗馬自本都夜歸姚偵其無備操刀伏中途橋下馬至橋躑躅不進陸鞭之纔進遂為姚所殺月暗幽寂無知者馬逸歸向陸妻驚嘶不已若有所訴妻知其夫必死非命持燈隨馬去至橋下獲尸焉妻哀哭告馬曰夫死不得賊何以雪寃馬即前導至姚門鼔足蹴不休姚出則直前嚙之妻於是執以赴官姚竟抵法大場鎮農家婦舉止修整嫣然閨中秀也夫貧蠢婦毁裝佐之日與村姑里媼輩習田間勞苦無難色間有親戚憐其貌者執手作慰藉語則歛容謝曰兒樂此不疲且非是無以奉我尊嫜也如是者十餘年有子矣以竭作故病瘵死死前一日忽向其夫索筆硯夫不識一丁字者詣鄰家假至婦見之嘆曰謝此緣久何期今日遂成長别耶起題一絶云當年二八過君家刺繡無心只枲麻今日對君無别語免教兒女衣蘆花語意凄婉其生平曉義命雅自韜晦恥炫鬻尤卓卓可傳云黄蘊生淳耀釋褐後寄弟書曰吾廷試傳臚時見鼎甲先上人皆嘖嘖稱羨吾此時嘆息無限夫天地間自有為數千年一人數百年一人者今人必不肯為數千百年之一人而必欲為三年之一人何也崇明有吳姓老人者康熈間年九十九歳其妻亦九十七歳老人少壯時嗜酒好賭博有四子盡鬻為人奴四子咸能自立各贖身娶婦列肆同居以養父母四子始擬每月輪供諸婦曰翁姑老矣必三月後奉甘㫖太疎復擬每供各一日諸婦又曰必三日後奉甘㫖亦疎於是每日序進一餐越五日則又共設於中堂父母南向坐諸子孫婦以男女分東西行稱觴獻夀又置一橱四子日納錢其中隨老人所用老人好博不已四子常密持錢送博家囑令佯輸老人常勝持錢歸忻忻如也長子於時年七十七餘皆白頭孫曾二十餘人總兵劉兆旌其門曰百齡夫婦齊眉五世兒孫遶膝嘉定令陸隴其記其事海州州有廟祀牛今遺址尚在曩有農耕於野夜宿隴間虎來欲啖農牛在側䕶之觸虎農覺不知也反鞭牛之駭躍為驚已又熟睡及明起視牛死審之知牛為虎傷力竭而死也方悟已之活為牛救云故報以廟祀為文以祭曰牛為我役我為牛主我牛幼時親經調理天或寒歟置於燠地時或饑歟供以草具旦摩暮撫已去復視頭角崢嶸供我農事幸爾之生嗟爾之死既非喘月又無釁隙猛虎出嵎欲啖其主非爾在旁我其死矣幸爾在旁盡力以抵及旦視之虎敗爾死嗚呼蠢獸尚知徳可以人不如山陰立廟堂祭祀增欷嘘贛榆楊秀才妻劉氏孀居宣和間朝廷收復中原科增郡縣兌夫錢劉氏以十萬緡代下户之輸所積空矣而旦日視之錢復滿室每緡首有麻青二字人咸駭異或云青州有麻十萬家豈非神運至此耶因於青州踪跡果有麻氏失錢劉請歸之麻不受乃悉散施之後家益富通州紹興中沈與求聞劉豫於京東造舟因言海道當防如通泰料角石港水勢湍急海舟至此必覓沙上水手方能掉運舟航轉入倘於此處為備盡拘水手無為賊得則賊自不能衝突矣司寇陳敬甫堯先後持憲以疾惡聞然嘗奏記徐文貞階曰天之生大賢大不肖僅僅耳大抵中材為多惟彼中材有志而未練則見欺有才而暴施則見忌此兩者茍器使之近於賢苛責之近於不肖愚意均當姑置而觀其後乃可階甚善之通人至今稱陳廉介而不失長者臯城東湯家灣有佘氏族居隆萬間里中貴人用青烏家言售佘氏一善地為墓既售則盡發其冢旁一冢則佘之􅄔婦所葬夫也􅄔有姑年老念冢必不免一日市牲醴盡邀佘族奉其姑上座而拜且遍拜族人進三爵乃出匕首置几上曰新婦奉姑本欲終其天年不謂今日禍及夫骨何用生為今與姑長别俟貴人來以頸血濺之矣自是挾匕首共起居貴人駭不敢奪今一冢獨存彭大同世精胡氏春秋在通推為專門任叙州司理時有楊氏子修怨於仇家乗父老病扶至河壩而挑毆之遂致死訊者以仇家論抵大同捉筆大書曰春秋無将將則必誅其欲甘心於仇因以忍視其父河壩之死誰則挾之坐子如律直指署其判曰推官讀春秋可謂見諸行事矣崔聲逺鐄為黄户長掌鄉稅嘗以輸稅金五百兩付鎔工工以無劵欺而負焉鐄竟破産償之官時三原王恕知揚州廉其狀謂鐄訟鎔工當為追理鐄對曰鐄廢産是已破一家矣奈何復破一家恕嘆曰仁人之言也鎔工聞而慚感圖償邵潛自號五岳外臣傲僻不諧俗好嫚罵人多惡之及與李維楨鄒迪光黄汝亨陳繼儒諸前輩遊所著友誼錄循吏傳印史諸書多可傳者年五十無子復娶妻妻嫌其貧老棄去一婢又為勢豪所奪遂孑身棲如臯城西門外年八十矣康熈間新城王尚書士貞過臯訪之茒屋三間黝黑如漆邵筋骨如鐵白髪鬖鬖被領雙眸炯然具果䔩留王飲尚能進數觴且與修禊冐氏洗缽池賦詩陳檢討維崧曰古今文人多窮然未有如邵先生者聽其言愴然如劉孝標自序也江南通志卷一百九十五
