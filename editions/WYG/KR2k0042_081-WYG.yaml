body:
  text: 江南通志卷八十二食貨志錢法上古太昊以來有錢太昊氏髙陽氏謂之金有熊氏高辛氏謂之貨陶唐氏謂之泉商周謂之布齊莒謂之刀通典虞夏商之幣金為三品史記平凖書周太公立九府圜法黄金方寸而重一斤錢圜函方輕重以銖漢書食貨志景王更鑄大錢徑一寸二分重十二銖國語秦銅錢質如周錢文曰半兩重如其文通典漢興患秦錢重難用更令民鑄筴錢至孝文五年筴錢益多而輕乃更鑄四銖錢其文為半兩令民縱得自鑄故吳諸侯也以即山鑄錢富埓天子史記平準書武帝行三銖錢更行半兩錢又造白金皮幣又令京師鑄赤仄漢書後漢世祖行五銖錢後漢書靈帝鑄四出文錢後漢書獻帝鑄小錢後漢書三國吳嘉平五年鑄大錢一當五百吳志赤烏元年鑄當千錢吳志晉元帝過江用孫氏赤烏舊錢輕重雜行大者謂之比輪小者謂之四文晉書南北朝宋元嘉間鑄四銖錢孝建初鑄四銖文曰孝建景和間鑄景和二銖錢有来子荇莱鵝眼延環等名千錢長不盈三寸斗米萬錢商賈不行太始初禁鵝眼延繯餘錢皆通用復禁民鑄官錢亦廢唯用古錢以上俱宋志天監間鑄五銖錢唯京師及三吳等州得用梁書普通中又鑄公式女錢更鑄五銖鐵錢梁書陳天嘉間鑄五銖錢陳書大建間鑄大貨六銖以一當五銖之十與五銖并行尋廢仍行五銖陳書隋開皇元年鑄新錢名曰五銖每錢一千重四斤四兩十年詔晉王廣聴於揚州立五鑪鑄錢十八年晉王廣以江南人間錢少請於鄂州白紵山有銅鑛處置十鑪鑄錢從之以上俱隋書唐武德四年廢五銖錢鑄開元通寳錢儀鳳間瀕江民多私鑄錢為業詔巡江官督捕載銅錫鑞過百觔者入官武后時令錢非穿穴及鐵錫銅液皆得用之盗鑄蠭起江淮尤甚開元初遣御史蕭隠之括江淮惡錢天寳中詔天下置九十九鑪鑄錢揚潤宣等州各置十鑪每歲鑄錢三千三百緍寳應間詔准鹽鐵轉運使劉晏奏以江嶺諸州任土所出積之江淮易銅鉛薪炭鑄錢輸京師及荆揚二州大厯間禁天下鑄銅器建中初准户部侍郎韓洄奏請停止江淮鑄錢七監貞元中准張滂奏禁止天下銷鑄銅器以上俱唐書宋太平興國初詔昇州置監鑄錢令轉運使採山川之銅給官鼓鑄雍熈初令江南諸州官庫所貯雜錢每貫及四斤半者送闕下不及者銷毁端拱間詔申私鑄及銷錢之禁江北諸州錢新舊大小兼行江南用大淳化錢景徳間制錢有四監池州曰永豐每千重五斤以上俱宋史景祐初詔三司以江東等處歲輸緍錢合三十餘萬易為金帛錢流民間文獻通考慶厯間勅江南鑄大銅錢江池饒儀虢等州鑄小鐵錢文獻通考熙寜初詔京西淮南諸路各置鑄錢監路以十萬緡為額元豐間詔徐州置寳豐下監歲鑄折二錢二十萬緡轉移陜府元祐間罷崇寜元年詔准吳居厚奏以江池饒建錢額不敷議減銅増鉛錫歲増鑄錢十萬餘緡又令以歲鑄小平錢増料改鑄聖宋通寳當五大錢三年罷小平錢復徐州寳豐監改鑄折二錢為折十其舊新二錢期一歲勿用又詔准右僕射趙挺之奏以當十錢不便命江南東西兩浙并改折十錢為折五淮南重寳錢亦作當五五年以折五折十上供小平錢留本路錢監歲課以八分鑄小平錢二分鑄當十錢尋江南兩浙淮南重寳錢作當三旋復當五當十詔京西聴用當十錢置眞州鑄錢監以本路所換錢不依式者改鑄當十錢又令江池饒建州諸監以當十之五分鑄小平錢尋以當十錢滋弊日甚令官私見在者并作當三大觀間江南福建兩浙准鑄鐵錢又鑄夾錫錢尋以擾民皆罷之政和間詔准淮東諸路錢監改鑄夾錫政和錢又以夾錫錢不便令淮南夾錫錢期三月官私俱禁不用仍罷鼓鑄以上俱宋史建炎間兵革州縣困敝鼓鑄皆廢文獻通考紹興初并廣寧監于䖍州并永豐監于饒州宋史乾道間銅錢禁用于淮而易以鐵錢淮民以困詔銅錢并㑹子仍過江行使文獻通考又以和州有錢監舒州有古監詔司農丞許子中徃淮西措置鑄折二鐵錢令兩浙通行淳熙間詔舒州歲増錢十萬貫以三十萬貫為額尋以御史黄治奏詔除之又以舒州薪炭不便減額五萬又減十萬又并舒州之宿城監入同安監紹熙二年減同安監歲鑄十萬貫嘉泰間罷舒蘄鼓鑄開禧間復之以上俱宋史嘉定七年復罷同安監鑄錢續文獻通考元中綂十四年禁江南行用銅錢十七年江淮等處頒行鈔法廢宋銅錢是年括江淮銅錢銅器二十二年勅不拘銅錢聴民仍用俱續文獻通考明洪武初置寳源局于應天府鑄大中通寶錢以四百為一貫四十為一兩四文為一錢設官専管又命各省置局頒洪武通寳錢有當十當五當三當二當一五等重如其當之數行小錢重一錢令照式鑄之宣徳間詔南京工部鑄宣徳通寳錢𢎞治間詔南京工部鑄𢎞治通寳錢嘉靖間詔南京鑄嘉靖通寳錢又詔准部議銅錫等料俱出南京工巧而物賤四六分派未鑄制錢均歸南京鼓鑄又於寳源局續鑄嘉靖制錢繼革鏃車以鑪盪代而私鑄日盛錢不流通尋罷之萬厯間詔南北直𨽻開局兩部照舊四六分鑄萬厯通寳錢又令南京工部分鑄萬厯通寳錢以上俱續文獻通考國朝順治五年議准江寧設厰開鑄順治通寳錢每文重一錢二分八年議准各布政司止各開一局餘俱停止十年詔令鑄造制錢務令精工背鑄一釐兩字户部添一户字各省添本省一字鑄不合式者㕘究江寧江字十四年題准各省鑄局概行停止獨令寳泉局鼓鑄十七年復設各省爐座歸併布政司承管錢背後添清漢文寧字各一每文重一錢四分康熙元年鑄康熙通寳様錢頒發各省局依式鑄造順治錢仍舊行使尋停各省鑄錢止留寳泉局江寜局六年詔復各省鼓鑄爐座添設蘇州鞏昌等處鑄局照式鑄字蘇州蘇字九年停江寜蘇州江西等省錢局二十三年議准鼓鑄制錢行文各省俱照式鼓鑄每文足重一錢尋罷雍正四年詔禁三品以下不得用黄銅器皿民間所有器皿悉行出賣當官給價着九卿確議具奏九卿遵㫖議定嗣後京城三品以上官員准用黄銅器皿民間樂器圓鏡戥子仍照原議外其餘文武各官軍民人等一應大小器皿俱不得仍用黃銅所有舊存黄銅器皿除箱櫃上事件外其餘不論輕重多寡悉行交官領價旂人交本旂佐領管收漢官民人交五城御史管收隨交隨收按依成色估足斤兩照部定每斤一錢一分九釐零給發寛以三年之限如有過限藏匿不交賣者以私藏禁物律治罪其有小鋪冷攤從前收買零星銅器三月内盡行交官領價違者即照私藏禁物律治罪其打造銅器店舖如有仍將黄銅製造器皿者照銷毁制錢從律治罪其直省悉照京城例以三年為限交收五年十一月詔令直省州縣民間交納銅器准其抵作正賦錢糧應如何舉行方為妥協着戸部詳議具奏戸部遵㫖議定各省有未完舊欠錢糧准其以黃銅器皿抵交除四川廣西雲南貴州四省並無民欠西安民欠無多其餘各省各該督撫酌量於該省民欠内以二十萬為率准令欠户交納銅器扣抵應完舊欠之數倘銀數扣抵完日該省尚有交納銅器該督撫再行具題請㫖此所交銅器熟銅照額定價值每斤以一錢一分九釐九毫零生銅價值比熟銅減二每斤以九分五釐九毫零各州縣官于紳民交納時按其生熟成色觔兩以所定價值算抵如有奸民銷毁制錢充作廢銅片塊不成器皿物件者發覺之日照律治罪其收銅之州縣官不得絲毫扣減價值亦不得以重稱收兌令其􅃜折每季將所收銅器觔兩數目報明督撫解交公所該督撫於年終奏報其無民欠之省分及無民欠之州縣與無舊欠之糧户并奉天州縣人民有以銅器交官者俱按生熟成色給與價值將所收銅器存貯公所於年終奏報如各省地方官有見將己資收買黃銅器皿者着解交公所該管官即按生熟銅觔給與價值倘地方官有不遵諭㫖借捐買名色以賤價收買民間銅器者該督撫即指名題參交部嚴加議處九年二月題准各省收買銅器三年期滿已請寛限一年在案今經一年限滿苐恐民間尚有未交銅器若因限滿停其收買誠恐愚昧小民不敢交賣仍藏匿在家致干法網或有不肖棍徒藉端訛詐亦未可定請將民間未交銅器准令照舊赴官收買按生熟銅色給價併令各直省督撫轉飭所屬通行曉諭凡有未交銅器飭令速行赴官交賣俟中外報收銅觔完日奏請停止以上㑹典乾隆元年二月十九日户部尚書海望奏為請弛銅禁以資鼓鑄以便民生事切念錢文為民間日用所需宜加經理近年以來鼓鑄無缺價值昻貴建議者莫不多求禁銅之法而臣獨以弛禁為請者誠以錢貴之害小累民之害大僅禁黃銅已為深擾而弊竇多端槩禁黄白器皿滋擾尤深而於錢法亦終無禆益也臣請詳悉敷陳伏祈聖主採擇夫銅器散布民間相習甚久一旦禁使勿用則其情有所不便而易生藏匿之心往往遷延而不交交納而不盡緩之則互相觀望急之則百弊叢生是以展限之奏請屢聞收買之告竣無日胥吏借此需索刁民借此訛詐得賄則賣官法不得賄則入人罪搜括難盡用法不均其弊一也民隠既難上達有司未必皆賢民間交納銅器或有侵蝕扣尅僅得半價者或有除去使費空手而歸者名為收銅實為勒取其弊二也此等銅質本極粗雜加之銹爛一經錢局鎔化折耗甚多工價不減收買之時原費帑金即所得不償所失鼓鑄毫無所益其弊三也又况黄銅乃係紅銅白鉛配搭而成是以百萬斤之黄銅器皿其中即有紅銅五六十萬斤今禁用黃銅而不禁紅銅是較之未禁之先銅又多費而適以昻其價值速其私毁是故未禁黄銅之先白銅甚少既禁黄銅之後白銅甚多豈白銅之所產果多皆奸匠銷毁制錢攙藥煑白以成器皿博厚利耳其弊四也凡此四弊若不究其根源以酌變通之計徒將一切銅器槩行禁止臣竊以為不可何則銅器之禁若止行京師則他處仍得販賣於事無濟若通行直省則普天之下業此者不下數萬户藉此以衣食者不下數十萬人今既禁使勿造是伊等平日所造器皿務必令其交官以備鼓鑄矣夫民間銅本原溢於官價加以工本為數更多必若合算工本全數散給則小民雖不至于􅃜本已有失業之苦而於國帑亦大有折損若祇照官價收買則銅本旣屬不敷而工價又無所出此等小民皆屬借貸經營生計甚薄一旦失其所依欲改業則無門欲坐食則無本其何以堪夫鼓鑄錢文原為便民利用今因鼓鑄需用而頓使民間失業是欲便民而適以累民我皇上軫恤商民無㣲不至即一夫不獲尚厪宸衷豈忍使數十萬人之流離失所乎臣又考之史䇿而知禁銅乃前代權宜之計非可常行者也銅器為民間必需之物故前代亦有因銅禁既嚴採買於官而鬻之於民者既而官煩民病仍聴民間造器而官為立價輾轉彌縫迄無善法其事已大可槩見矣我國家錢貨流通聖祖仁皇帝六十餘年未嘗下一禁銅之令而銅未嘗不足於用故曰禁銅足以擾民而於錢法究無禆益也又聞古語云銅貴錢重則有私行銷毁之弊銅賤錢輕則滋私鑄射利之端是以錢文輕重必須隨銅價之低昻而増減庶可杜私燬私鑄之弊上年世宗憲皇帝特飭九卿議令酌減分數其錢一文重一錢二分每年合節省銅斤四五十萬斤緣事在初行自未能立竿見影然所以調劑夫銅貴錢重者成效自有可觀固已不必屑屑於禁銅之末務矣臣愚請照康熙年間舊例將收禁銅之令悉行停止民間買賣悉從其便祗于雲南蘇州辦銅之處立官分職統計部用銅斤若干數目盡行採取如有餘銅任民販賣則鼓鑄自得充裕而小民亦不致失業似於國計民生均屬有益伏乞皇上睿鑒施行王大臣謹奏户部尚書海望請弛銅禁并將禁銅之弊詳悉敷陳一事請交九卿定議奉㫖知道了四月十九日九卿議覆將收買黃銅器皿及禁用黄銅之處悉行停止嗣後民間買賣悉聴其便奉㫖依議採銅條例康熙十四年議准各省産銅及白黒鉛處所有民具呈願採該督撫選委能員監管採取若地方官不准願採之民赴部控告查果採得鉛銅者將不准採銅之官革職十八年覆准各省採銅鉛處令道員總理府佐分管州縣官專司任民採取八分聴民發賣二分納官造冊季報近墳墓處不許採取事有未便該督撫題明停止道㕔官如得税銅鉛每十萬觔紀録一次四十萬斤加一級州縣官得税每五萬觔紀録一次二十萬觔加一級所得多者照數議叙上司誅求逼勒者從重議處其採取銅鉛先聴地主報名採取如地主無力聴本州縣人報採許雇隣近州縣匠役如有越境採取並衙役擾民照光棍例治罪五十四年議准江蘇安慶湖南湖北江西浙江福建廣東八省額辦銅觔遴選能員出洋採辦定限于四月完半十月全完倘逾限不完照例議處雍正八年覆准江蘇安徽浙江江西福建等省各遴委道府大員承辦每年上下兩運銅觔上運銅觔寛至次年八月起解下運銅觔寛至次年十二月起解准令滇洋並採滇銅定價每担不得過十四兩五錢洋銅每担十三兩赴滇者委員至雲南所屬產銅地方價買出洋者招商給批至日本國採取鼓鑄規則江寧蘇州兩局奉部頒錢様鑄雍正通寳錢每文重一錢四分一串重八觔十二兩用生熟銅各半匀搭每銅百觔去耗銅九觔鑄制錢十串四百文給工料錢一串五百一十五文得錢八串八百八十五文加扣補串䋲一十五文共得八串九百文計銅本銀熟銅每觔一錢一分九釐九毫三絲生銅每觔九分五釐九毫對搭生熟銅每百觔該銅本銀一十兩七錢四分一釐五毫制錢八串九百文值銀八兩九錢計不敷銅本銀一兩八錢四分一釐五毫准令開銷正帑題准部覆按卯鼓鑄其錢繳送藩庫每串作銀一兩搭放兵餉蘇州設寳蘇局於府城内以蘇松糧道總理蘇州府通判協理雍正八年七月十二日開局鼓鑄設爐十二座一月兩卯每卯爐一座用對搭生熟銅二千四百觔十二爐共用對搭生熟銅二萬八千八百觔工料錢四百三十六串三百二十文加串繩錢四串三百二十文計銅本銀三千一百八兩五錢八分五釐實得制錢二千五百六十三串二百文每串值銀一兩作銀二千五百六十三兩二錢仍不敷銅本銀五百四十五兩三錢八分五釐自十七卯起又増爐四座共設爐十六座凡在局官員書役薪水工食心紅紙張一年需銀三百六十七兩二錢局内應用天平戥子等器共需銀一十三兩三錢三分又續増收拾銼刀鐵木等匠每爐一卯増銀一兩五錢又每銅百觔加礶子價銀一兩二錢均于司庫存貯公項下動給彚報核銷安徽設寳安局於江寜城内以鹽驛道總理池州府同知協理雍正十年三月十九日開局鼓鑄設爐四座一月兩卯每卯爐一座用對搭生熟銅二千四百觔四爐共用對搭生熟銅九千六百觔給工料錢一百四十五串四百四十文加串繩錢五百四十文計銅本銀一千三十五兩九錢八分四釐實得制錢八百五十四串四百文每串作銀一兩值銀八百五十四兩二錢仍不敷銅本銀一百八十一兩五錢八分四釐凡在局官員書役薪水工食心紅紙張一年需用三百一十六兩八錢局内應用天平戥子等器需銀一十兩七錢均于司庫存公項下動給彚報核銷江南通志卷八十二
