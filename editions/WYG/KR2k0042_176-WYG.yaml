達氏六合人夫亡自縊葉先馨妻季氏六合人夫亡痛哭而死庠生孫繼善妻謝氏六合人夫亡無子立姪姪又死曰吾無望矣自經死趙某妻楊氏佚夫名京衛人夫死於陣氏投河死錦衣衛指揮黄賓妾王氏江寜人夫亡自縊奉旌表經國猷妻管氏溧水人夫亡自縊奉旌表都司母承恩女上元人許聘姚某未嫁夫亡聞葬期自縊死宣氏女句容人許字湯維藩夫亡死節國朝李順妻林氏上元人夫亡三年喪畢托言抱病餓死康熙六十一年旌表王氏女上元人許字沈邦彦夫亡欲過門守貞父未許刺指血書以貽父曰生則沈氏人死則沈氏鬼題墓曰沈門王氏遂自縊王善性妻潘氏句容人夫亡九年繼姑逼令改嫁投繯而死以上雍正五年旌表金升妻許氏江寜人嫁三月夫亡欲死救免母攜歸閲七年終不食死雍正八年旌表陸思賢妻殳氏溧水人遇海寇自殺蔣竒玉妻梁氏江寜人夫病篤籲天求代知必不起積薪先自焚死王某妻汪氏上元人順治己亥海宼薄近郊氏家幕府山下懼見辱赴池水死呉某妻高氏江寜人夫為驢傭氏年十七夫没舅欲以甥某入贅氏潛具巵酒至夫墓拜哭而返夜自縊常復妻劉氏上元人夫死有娠產後一慟而絶朱氏女江寜人未婚夫亡自經鄭端媳某氏江寜人端聘媳未迎子病没媳聞訃題絶句二首有尺綃從報命便是百年情之語遂闔户自縊任氏女金陵人許字楊存敏甫受聘而敏没女誓不更適或將委禽焉女聞遂墮樓而死趙氏女江寜人幼字葛某逺商不歸女初依母母卒葛之父迎女於家厯二十餘年𫝊葛某已沒女即宻紉其衣投繯而死詹某妻周氏江寜人少無父母歸詹後繼姑行穢見其貌美導以淫不從百端凌逼氏宻紉上下衣自經死趙國棟妻錢氏上元人年十八歸趙半載趙卒於義烏縣尉任所氏罄奩殯殮扶櫬歸里立伯氏子為嗣曰吾事畢矣絶粒七日嘔血而死蘇州府漢許昇妻吕氏昇少為博徒氏數勸不悛父欲改嫁氏曰命之所遭義無離二昇感激勵學遂致名譽為本州辟命行至夀春為盜所害刺史捕得之氏迎喪於路詣州請甘心讐人乃手斷其頭祭昇後遇黃巾賊欲污之氏不受辱見殺一時風雷大作賊懼叩頭謝罪殯葬之公孫達妻卻氏拒賊不辱被殺李公謀妻戴氏遭賊不受辱被殺三國呉張氏三女皆有節行兄温為權所囚姊妹已嫁者皆見録奪其中妹先適顧承官以逼改嫁丁氏飲藥而死南北朝張稷女呉郡人名楚媛適會稽孔氏無子歸宗稷為青冀二州刺史州人徐道角作亂稷見害女以身蔽刃先父卒唐呉仁璧女長洲人少能詩文父敎以天象隂陽之學嘗謂父曰大人慎事出入恐罹憂毒天復初錢鏐命撰母墓銘璧不從被繫女泣曰文星失位大人其不免乎鏐沈之江並女同害時年十八宋張弼妻徐氏建炎三年金兵至揚州官軍潰肆掠執徐欲汚之徐罵曰朝廷畜汝輩備緩急今敵犯行在反乘機為盜恨我女子不能引劍斷汝頭肯受辱茍活耶賊殺之呉永年妻何氏金兵破平江永年與其姊妻奉母逃匿兵得其姊及何何紿曰我婦人東西惟所命耳兵信之次水濱俱投於河劉士英妻陳氏建炎初居母家被擄投井元后載妻某氏載行役至正丙申城陷氏屬其子女於姻家赴水死沈度乙妻謝氏崑山人少寡至正壬辰方谷珍剽掠氏積薪自焚死潘元紹七姬段氏年十八程氏年三十翟氏年二十三徐氏年二十羅氏卞氏彭氏年皆二十二至正丁未紹臨戰語曰我受國重寄義不顧家脱不虞若等當自引决段氏最少先縊六姬相繼縊死乃焚其尸合葬浦玉田妻梅氏呉郡人至正十六年淮兵破城氏為所得欲汚之氏赴水水淺不得溺兵以刃脅之不為動舍去後至者復欲鈎出之力挽不肯升以戈揕其腋死擔夫婦家郡城夫為擔夫張士誠時應募充戰士死婦斂其屍既焚收骨裹以帛仰天大慟與骨俱投於水周烈婦張氏崑山人夫為百夫長與其伍謀刺其帥事泄夷其家帥之子豔氏姿語曰能從我活汝命氏憤詈不屈死齊億妻邱端一常熟人億為贅壻早世邱誓死不二張士誠兵入其父遇害見氏美欲汚之大罵不屈投水死某人妻某氏常熟人本貴族通文翰元末兵亂某父母與妻皆被掠某聞以身贖父母歸兵欲汚氏遂殺某氏佯曰焚我夫乃從汝兵焚某氏潛以釘畫瓦上有乘此烈焰生死同科之語書畢急投火中兵挽之已灼爛矣明錢珍妻顧氏常熟人元季避亂珍前妻邵氏子及顧所生子俱在襁褓顧謂夫曰行難兩全冢子不可失乃棄已子鄉里方之魯義姑盧氏夫本如臯人避役僑居常熟盧與女並有姿色有兵備道役張島幸於本官藉勢凶暴欲以盧為妻以女與其黨乃誣其夫為盜獄未具竟沈其夫於海中盧聞之手刃其女隨自刎死後巡按廉其實治島及其黨如律聞於朝詔建二烈祠祀焉邵某妻薛氏崑山人洪武初邵坐法押赴京氏少艾押卒悦之謂邵曰若欲生至都下俾妻事我否則死矣邵懼乃呼婦語故婦佯應乘間自縊楊椿妻王氏呉人椿死張士徳之難氏冒鋒鏑尋尸三日不得幾被禍者數四既乃抱城門柱大呼訴其魁曰人孰無夫婦汝等専事殺人而來耶抑欲為安民計耶魁韙之禁兵勿阻其徃來乃得尸於張香橋下輿歸葬之與子女二人皆不食死胡原妻錢氏崑山人洪武末原戍雲南竄歸事覺坐棄市錢與訣曰君萬里歸為母與妾耳君死妾何獨生至夜自縊史景忠妻鄒氏呉人景忠謫戍大寜鄒與偕行及大寜兵亂有欲犯鄒者脅以刃延頸就死時年二十有二姚廣孝姊居長洲相城里廣孝以靖難功封少師往謁其姊姊閉户不納曰那見做和尚不了的是個好人廣孝遂於門外再拜而去沈濬妻呉氏崑山人濬病死子十歲呉曰吾不能復撫兒矣斂夫畢從容自經年二十九黃福安妻陳氏崑山民家女嫁未期福安病卒陳已產一子撫棺盡哀至夜經死陸安妻鍾氏崑山人洪武中安父以事逮京師議大辟安初婚乃謂鍾曰吾不忍吾父死將代刑汝其奈何鍾曰君行我有以處此安往竟死鍾遂自經朱佩妻王氏湖涇農家女年十四嫁佩越四年夫亡父母憫其早寡無子潛以許人王覺之乃縊死徐景仁妻于氏呉郡人初景仁未婚而以罪被刑兩家父皆欲中止女不從竟成婚後數年景仁以前事戍雲南氏弟曰他適可免否則死萬里矣于氏曰此何難遂自經死桑瓊繼妻程蘭常熟人夫亡蘭祖洪憐其年少迫改適蘭擗踊嘔血不食三日死龔濓妻周氏崑山人年二十夫亡為夫立後不食死周鎰妻王氏崑山人夫亡誓以身殉所親諭以撫孤明志已而二孤相繼夭從容自縊董朝憲妻朱氏呉郡人姻家徐應臣豔朱氏姿延朝憲醉之突抵朱前扼其吭朱大罵碎面刳胸應臣遁隣媪趣朝憲歸朱曰吾忍以俟若吾必死若截吾體埋之自胸以上請磔以飼狗言訖引刀斷一指血濺衣裙越三日應臣邀朝憲釋憾朱聞益憤投水死其屍逆流應臣門怒目指髪宛有生氣事聞旌廬建祠置應臣於辟周稱妾董氏呉郡人稱殁董以䊵扇書氷清玉潔四字自經死陳大清妻林氏長洲人大清令龍巖卒於官林赴井死呉會妻姜氏呉郡人會工繪事婚數月卒歲洊饑姑諷其他適不從則誶語激之姜乃檢夫丹青一縑繫袵帶自經龔汝驥妻周氏呉郡人夫亡自經死倪士義妻楊氏呉郡人義亡誓不獨生為夫營壙鑿鴛鴦二字於壙石或諷以改適楊面發赤自剄死朱珙妻張氏常熟人年十八夫亡兄潛許龔姓誘歸將要諸塗張聞計逃匿遂引針刺傷左目示無他志某烈婦常熟人𢎞治辛亥歲大饑夫鬻其妻與賣餳者得錢三十七文博一飽而去妻行數十步過小橋大呼夫投水死王永妻張氏常熟人少寡舅姑欲嫁之張闔户自經家人救止剪髮斷指自誓至八十四歲曹順妻葉氏呉縣東洞庭人景泰中順客死舅姑欲令改適不從强之夜自經簷下顧烈女崑山人許字王氏未嫁夫亡叔父復許嫁徐氏强之行女以帛纒束其體不可解謂徐曰吾非汝家婦乃故王郎妻也堅拒不成禮至夕縊死呉奎妻王氏呉縣東洞庭人奎逺賈姑有淫行與所私飲並欲汚氏命取酒所私入爨室戲捉其臂氏憤拔刀斫臂不殊再斫乃斷垂死父母欲訟於官氏曰死則死耳豈有婦訟姑理耶尋卒陸淑清長洲人許字楊紹紹貧不能娶執役逺出惡少豔其容色謀妻之集黨撼其翁父兩家懼禍諾焉氏聞自縊韓廷珪妻孫氏呉縣人廷珪販蓆潯陽氏與二女隨往值濠兵至母女共束一繩赴河死王土妻陸氏崑山人土病將革語氏曰我死汝安歸氏指心以誓土死氏即不食乘間闔户自經年二十有二周春妻俞氏呉縣人春病革與俞訣勉以守節俞慮其疑已也遽握剪刺左目血流遍體隨欲刺其右姑奪剪諭曰爾欲養舅姑育子留一目可也越六日春卒守志黃璣妻陸氏長洲人夫亡母逼改適氏嘆曰違親非孝再醮非節即自經死陳林妻顧阿妹長洲人楊孝妻張氏吳郡人三貞女呉郡人五貞女呉縣東洞庭人曹鑑女常熟人洞庭少婦常熟人陳某妻桑氏常熟人楊烈女常熟人蕭烈女常熟人以上皆遭倭亂不辱死錢氏常熟人嘗割臂肉救大母病倭躙其旁氏恐汚及遽投水家人挽之無何以臂瘡潰卒周鑑妻王氏崑山人夫亡自經嘉靖年旌徐倣妻朱氏常熟人遭倭亂不辱與女招細妾楊氏婢閨秀俱投水死錢皓女如潔呉人許字曹鏷子禟後有廢疾願解婚錢氏從之更許烏程温氏及禟卒温氏來迎女聞闔户自經楊一䕫妻顧氏崑山人夫被酒溺死氏痛其非命日夜號哭一夕自縊死歸善世妻陳氏崑山人夫亡即欲自裁母止之言兒已許夫死矣乃含尸以玉珥留一自含曰泉下以此為信卒乘間縊死李某妻須氏呉縣人少而美夫死市兒謀娶之氏泣曰利吾夫死而妻我猶殺吾夫也市兒糾黨掠取氏奔母家母不敢留返於姑姑拒之投姊姊又拒之遂自經陳恵妻須氏呉縣人早寡土豪顧臣豔其姿糾黨强娶自經死譚文煥妻陸氏常熟人夫亡氏年二十九慟哭自刎姑奪其刀蓋棺時投身入攀棺不脱蓋壓斷二指後索刀不得以針刺喉死事聞被旌張烈婦家里涇其夫死夫之弟攘其田廬逼嫁之婦遁逃兄所夫弟偵其兄出刼以如所許陸氏者為婦婦即絶食陸氏婦女日與居説之不答竟縊死殷㮚妻葉氏呉縣東洞庭人夫亡視含斂畢投繯死方夢嘉妻瞿氏崑山人夫亡私謂女曰若與弟善事祖母吾死後即穿穴葬汝父旁夜經死金烈女常熟人名孝細母包姙五月而夫亡遺腹生女包後欲改適女嘆曰十七年氷霜一旦委地從母不若從父地下遂自經死王某妻張氏常熟人早寡家貧甚屋茆為風捲往母家乞稻秸數束母以微言諷氏拊膺曰奈何以貧故謂女有他心哉歸以苧線易錢市雞酒奠訖自經棺側陸茂才妻錢氏常熟人茂才病勞瘵勢不起父母潛有異議錢喻其意即謝絶不歸及茂才病篤貧不能具粥糜不得已歸告父母乞升斗負還而茂才已卒仰天大慟具羹飯祭畢縊死尸旁朱一鴻妻張氏居常熟塘頭鎮一鴻逺館惡少宗周恱其色挑之不得夜二鼓操刃排門入徑持之張號泣疾呼髪被面頭觸瓶盎盡碎周錯愕遁去張誓曰不死何以雪恥遂積薪臥其上火之肩背焦爛宛轉十六日以死事聞置周於法建祠子祭宗境妻徐氏常熟人境有疾富人何文烱欲娶之誣氏父彬於縣捕彬及境夫婦拷掠徐不勝寃憤自經死炎天經月顏色如生知縣楊漣按律正罪郁某妻王氏常熟人年十九歸郁無何郁患瘋疾别寢王悉力調䕶數年郁徳之欲擇良配以報語之故王泣曰妾事君無失徳何以至此今夕請同衾鷄鳴起自經范五昌妻姚氏常熟人五昌游遨破家一日有人驀入内室向姚曰而夫許我來也姚大呌得脱赴水死浦氏女常熟人父位有强暴唐夀謀汚之不辱投河死夀伏誅邱堅妻錢氏常熟人堅溺於水氏覓尸不得奮身投河漁舟急救得不死夫尸隨浮出趙一鳯妻尤氏崑山人夫死遺孤又殤尤曰可以從吾夫矣急為夫營葬惡少豔其色曰彼盼美而流烏能久也尤聞之取石灰淹目立枯置棺自隨視夫葬畢觸石裂額卧棺中而死彭餘璋妻鄭氏崑山人年二十而夫亡殮畢淚盡不能言潛自沈死正統年旌陶子舸妻方氏崑山人歸子舸期年而寡欲自經或責以養姑氏諾逾九年姑殁含殮畢入室屑金和水服之不死投井隘不能下夜至舍西投河死嘉靖年旌顧應元妻房氏崑山人甫婚一年應元與父早出隣舍火氏披衣疾呼姑出走惶遽時索中衣不得奮身投火死應元歸視之下體成燼上體顏色如生葉輝妻周氏呉縣東洞庭人輝客雲間病卒氏聞即自經周文遂妻馬氏呉縣東洞庭人年二十二夫亡誓以身殉忍死養姑姑殁即自經死曹憲輅妻周氏呉縣東洞庭人夫亡沐尸易衣並易已衣周宻紉之自縊夫側殷氏女呉縣人許字陳元儁儁亡女聞欲往弔父止之乃手刲左耳授兄持祭亡人慟絶而甦後病篤延醫止之曰吾求速死可令醫手著吾臂耶尋卒張士栢妻陳氏呉江人夫死里豪徐洪知其少艾賄士栢兄納為妾陳守死不可洪以配其僕求死益力父訟於縣縣令章某納洪賂誣枉之使𨽻批頰笮指下於獄會推官行縣例出之巡按至陳隨父控告既投牒即自刎死巡按上其事旌之洪伏法令未幾亦死周嘉妻王氏長洲人嫁甫一月夫陣亡氏縊死沈信女呉江人里豪王四欲汚之女斷指以示後復挾悍少羣簒女女窘甚擲碗傷王面得脱隨死事聞王論如律支纘武妻陳氏崑山人婚一月武病將死語妻父曰妻年少必嫁之既殯氏絶粒十有一日死事聞旌表建祠學宫之右麫肆婦長洲臨頓里人佚其姓氏其夫亡氏自經於柩側張氏二女崑山人父振徳令興文二女與母錢並隨官舍天啓初宼作入城縱火二女大呼曰吾母子得死所矣皆投火自焚景運昌妻陳氏崑山人嫁未期夫亡氏求死姑止之越十有七日卒自經初運昌病氏父來視聞死頓足曰吾女死矣其見信如此國朝張敬懐妻某氏常熟人與女遇兵誓死不汚俱被殺嚴燦妻顧氏呉縣人夫為仇誣陷獄當死順治辛卯巡按秦世貞按呉氏白夫寃自刎堂下寃得雪周氏女長洲人許字何綸言未嫁夫亡欲往弔不可遂自經死王漢侯妻梅氏長洲人夫羸疾七年死氏拮据殯殮呼搶欲殉有夫女弟遣已子日夜防閑之後氏紿甥他出遂自經柩前華氏女長洲人許字施家未嫁夫亡聞訃絶粒七日不死自縊婢救解復持刃母奪之乃令守節夫家哭泣十二載得羸疾死沈聖章妻王氏夫遇賊被害氏哭罵賊怒斫死時年二十有三戴氏女許字呉其機未嫁機殁矢志不二服將除投繯死陸慶之妻顧氏常熟人沈子猷妻金氏呉縣人夫逺出與孀姑同居姑素與鄰人通並欲汚氏氏大罵被擊仆地而絶姑以暴病語人巡撫湯斌勘實上聞姑與所私俱棄市袁夀先妻譚氏常熟人夫亡親戚逼令改適氏自殺以上康熙年旌表錢了文妻徐氏常熟人嫁半載夫亡豪暴刦奪成姻氏斷髮毁容誓死不從鳴之官卒全其節雍正四年旌表羅廷佐妻錢氏呉縣人夫客死氏聞訃自經生員陳啓瀛妻沈氏呉江人遇宼刃其夫掠氏去兩手攀竹不從罵不絶口賊怒斫死母收殮之手猶握竹不可脫母哭告曰今母殮汝非賊也乃展而殮焉龎雲衢妻費氏呉江人夫亡殮畢入房刎死僵立不仆顏色如生以上雍正五年旌表呉氏女長洲人冢宰呉一蜚女許字宋啓業未嫁夫亡誓不欲生念父宦母殁弟妹無依隠忍三年父歸更訂陸氏女吞金不死投井不得伺間裂宋聘帛自縊遺書典宋氏簪珥具後事雍正六年旌表章揆蒼妻馬氏常熟人早寡而美人多謀娶舅貧為利所動數欲嫁之氏輒求死而止後族人宻與盧某訂婚紿氏同姑探親舁入盧家氏覺觸柱投階折齒毁面盧因盛陳金珠簪珥誘之氏怒奮罵抵諸地百方索死盧懼禍送之還翁拒户不納氏奔夫殯所號慟竟夜遂投河死雍正十年旌表張樹勛妻趙氏呉江人夫亡服毒死雍正十一年旌表莊應龍妻張氏呉江縣人守正禦暴捐軀明志節烈可嘉雍正十二年旌表宋景莪妻沈氏呉江人夫亡葬畢衰麻密紉自經於床錢鼎臣妻鈕氏湖州烏程縣人年十八歸震澤錢氏夫亡誓不再適舅潛與長興王二訂婚刦氏入舡奮躍入河死宋爾城妻葉氏長洲人舉人實穎之母順治初湖兵縱掠氏懼辱投井死幼子實栗泣曰母死何心獨存亦赴井死鄒化明妻王氏長洲人避亂呉淞江宼追至謂夫曰子有親在急循蘆中可避我死此遂赴水死徐樹聲妻張氏長洲人夫亡懐孤兒避兵林間兒啼賊覺為剽騎所得自刎未死騎强與俱益奮罵遂攅刀斃之周氏長洲人陳琦孫婦為湖宼所執奮袂投水死琦次媳張氏大呼曰姆得死所亦赴水死其女孫甫十三罵賊被殺迮斌妻陳氏呉江人湖宼橫戮氏翁夫父子四人俱被害氏同老僕赴賊巢收其尸賊欲加刃氏延頸曰寜殺吾而還吾四尸賊憐而與之時年二十七後苦節三十五年卒沈氏女呉縣人許字黄于庚未嫁夫亡誓不二志兄欲攜之避兵不從閉户絶粒死項氏女秀水人許字呉江周應祁周死女聞訃夜起以素絲約髪衣内外悉縞大書於几曰告父母兒為周郎死矣遂自縊因合葬焉蔡懋良繼妻張氏崑山人夫亡值兵亂二子皆前母所出欲偕之避兵氏曰未亡人得死為幸豈可奔走道途以自取辱投池中死次子方燧不忍捨其母留侍不去竟遇害蔡方燧妻張氏燧死於兵氏先與姑沈池中氏若有神扶之三日不死家人救免守貞四十年呉銘訓妻沈氏呉江人宼殺銘訓氏躍出作擊賊狀被斫死生員楊應聯妻鈕氏呉江人湖宼猝至氏負病姑匿蘆葦中盜見露刃脅之氏哭罵盜怒斫其臂遂躍入河死沈承銘妻張氏呉江人湖寇至宻紉其衣自刎死張氏女呉江人湖宼至欲汚之投於河宼挽之起適宼焚其廬奮身投火中骨肉俱燼陳元芳妻陸氏呉江人兵至夫病不能避氏曰夫在義無棄去兵欲挾之行不從被殺章淳妻薛氏常熟人游兵掠城舅與夫皆被殺氏倉皇投井兵挽其衣碎顱而死言誾如妻某氏常熟人偕夫避亂夫遇害氏大罵被殺徐萱妻沈氏常熟人萱及二子遇盜被殺兩媳皆不屈死氏㦸手大罵被砍數十罵不絶口蕭爾亨妻許氏常熟人夫為亂兵所殺氏哭罵兵怒斷其手足罵不止剜兩乳始絶聲潘興玉妻時氏常熟人夫婦避兵相失氏為所得罵不絶口死蔣暹女織素常熟人母殁父謀避兵女曰干戈滿地何處求全夜拜哭母柩自經死管氏女崑山人許字包宗賢夫亡守貞邑被兵自縊蔡瓊藻妻周氏呉縣洞庭人夫有心疾夫兄瓊滋輒往調之氏訴諸姑姑不為禁氏憤極縊死越三十年瓊滋忽夜發狂揵户手刃妻女自刎有小婢匿牀下見一紅衣女子往來室中紅衣蓋氏殮時服云史洽妻王氏長洲人洽亡洽叔父遽議改適氏憤欲觸堦死乃止日課子讀書檢夫遺篋號慟不能起迎醫診視曰腸已斷矣數日而死胡士彦妻黄氏呉郡人嫁未三載夫亡慟欲死以懐姙冀得一男及産女女又殤間歸省母會夫家火燼士彦柩焚倉皇歸視家人輩已棄遺骨蔓草間黄泣至其所取夫遺骨歸士彦弟以為不祥輒詬詈之黃乃割臂肉同枯骨置瓶内瘞諸城下往别父母還自經死劉昭武妻陸氏呉郡人夫病割臂肉以進不起日夕號慟淚盡繼以血殷紅遍體未幾一慟卒呉泰妻尤氏呉郡人年二十而寡義不欲生姑勉慰之乃强食息越三年自經死任紹孟妻言氏常熟人婚三年夫亡閉户自經家人救之毎食必慟哭遂成病殁呉周繼妻厲氏常熟人夫亡自經程忠謀妻周氏常熟人少寡無子閲三十餘年姑殁女嫁乃自縊陳藝先妻蔣氏常熟人早寡無子有狂夫慕其姿隂謀奪志蔣抱石沈淵死孫之炯妻屈氏常熟人夫亡自刎棺前葉氏女呉縣東洞庭人許字王氏子未嫁夫亡女成服詣柩前斷指自誓聞有議婚者乃縊死申氏女呉縣人許字錢厯才夫亡自縊邵氏女呉縣人許字申希文未嫁夫亡聞有他姓議婚遂絶粒而死袁七妻陳氏呉縣人七傭作數出比鄰周二假乞火叩門將犯之氏詬呼得脱恒以刀自衛一日夜半周排户入氏持刀拒之周怒奪刀砍氏斷首而走里人擁周赴官斃於獄巡撫韓世琦立碑里人建祠祀之沈乾妻居氏常熟人乾嗣父欲汚之氏以死拒與乾憤甚乘夜夫婦同縊死教諭金之潢妻葉氏呉江人夫任廬江教諭卒於官氏扶柩還祖墓遂縊死周文遂妻馬氏呉縣東洞庭人早寡無子忍死奉姑居二年姑殁父諷歸改適遂自經顧汝紘妻沈氏呉縣東洞庭人夫亡絶粒五日不死尋自刎仆地復起整衣而逝黃永祥妻劉氏呉縣人永祥以兄負債被逮懼刑投河氏大慟亦赴水死趙漢階繼妻周氏呉江人夫亡月餘自縊陳裕容妻徐氏呉江人夫死於兵氏尋至夫厝處慟哭赴水死顧氏女許字張九彰夫亡自殺徐氏女許字仲某仲染惡疾辭婚父母私諾許氏聞之闔户自經管正偁妻徐氏夫亡自經徐松元妻鈕氏呉江人夫亡即赴水死馬氏女呉江人許字丁某未婚夫亡訃至女方食投箸入臥内自縊邵氏女常熟人許字張瑋夫亡自經席永敬妻諸葛氏常熟人夫亡服闋自經何述臯妻秦淑常熟人通文翰夫亡破古鏡以半貯棺半自佩絶粒數日死沈氏女呉江人許字顧某未嫁鄰鄒氏子夜踰垣强逼之女取剪刀刺喉死鄒伏法趙烈婦某氏常熟人趙故宦僕氏美而莊主數挑之不為動一日强逼之氏泣曰夫人嚴敢相從乎主謀於妻妻固不妬先召氏入宻室盛供帳諭以意因鍵其户至暮主人啓户入縊死矣王氏女名蘭香元和縣甪直鎮農家女幼時已許字父窶甚以女質於林為從媵林壻恱其姿數調之不應遂加箠辱女因製一綿繩自隨一夕壻乘間强逼之女奮拒得脫夜静乃以所製綿繩自縊死尹子明女長洲人居滸墅鎮許字句容張國富未婚張歿女聞訃竟日不語宻紉上下衣投河死時年十七陳氏女呉縣人字林大治未婚卒女聞訃投繯死松江府晉張茂妻陸氏平原内史機族女茂為呉郡太守被沈充所害陸氏傾家産率茂部曲為先登以討充充敗陸詣闕上書為茂謝不尅之罪詔曰茂夫妻忠誠舉門義烈宜追贈茂太僕元劉氏燕山人幼失父母依兄以居贅壻松人初不知為戍卒而已有妻久之會赦紿劉暫歸即來數年不至劉訪於松壻棄絶之劉慟哭剪髪誦經行乞構一室製棺夜臥其中踰五十年室火氏入棺大呼隣人乞與蓋棺以畢志遂與室俱燬陸燾妻趙氏燾鄞人元季挈家避兵松之瓢湖至正丁未氏為亂兵所掠投水死張某妻呉氏名妙寜上海人贅張氏子氏以父連染大獄泣曰吾不遄死禍延良人遂自縊夫獲免王子温妻諸氏華亭人至正丙申苗兵變温欲挈氏逃難氏曰豈可以我累而身耶苐去我自為計賊人逼之氏怒罵被殺朱道存妻費氏字元琇上海人值苗寇被掠不辱罵賊死氏妹元徽歸華亭陶氏早寡守志亦罵賊不辱死人稱雙節明張文通妻俞氏名妙觀上海人夫亡自經年二十有六正統三年旌錢岐妻宋氏名夀貞華亭人夫亡絶粒死詔旌其門蔡應奎妻周氏青浦人夫以罪死姑强之再適抱女投河而死沈黙妻李氏青浦人嫁甫三月夫死自縊莫隠妻張氏華亭人嫁甫踰年夫亡絶粒死奉詔旌表陳氏女青浦人許字沈槐未嫁夫亡欲往奠父母阻之自縊死邢應鳳妻陳氏華亭人夫亡守節其弟潛受他姓聘紿之歸省夜泊舟浦口始請易吉刦之行氏抱幼女躍入黄浦郡守抵弟罪表其門何良傅妻宋氏華亭人良傅疾篤暴絶氏謂不復起即自縊已而良傅復甦終身不再娶沈思道妻孫氏上海人夫亡自經嘉靖九年旌楊氏女華亭人許字唐氏子尋夭氏即持齋勵志父母欲更議婚氏聞自縊死葬後墓生連理枝譚應禮妻高氏華亭人嘉靖三十三年倭破郡城氏避不及被執不受汚罵賊見殺二僕婦亦赴水死事聞旌表韓洪謨妻張氏華亭人倭犯境洪謨被殺氏號赴並遇害陸野塘妻某氏華亭人被倭掠奮罵不受辱賊遂刃之氏引頸而死夏世勲妻王氏華亭人遇倭亂投水死朱煥妻焦氏華亭人遇倭亂投水死夏氏女華亭人遇倭亂投水死陶氏女華亭人聞倭至投河死張氏女華亭人遇倭亂投水死朱氏二女華亭人倭寇至俱躍入水死何四妻王氏青浦人遇倭亂投河死焦氏子婦唐氏青浦人倭犯境赴水死朱氏婢秋香青浦人倭亂投河死陳允正妻唐氏華亭人夫亡遺孤繼死遂自縊衣帶間書夫婦同葬四字萬厯中旌嚴某妻許氏華亭人嚴好飲博諸惡少窺氏顔艾利誘其夫夫語氏氏叱之屢被箠楚不從一日諸惡少以壺豆進氏避之隣嫗家少間聞闔户聲嫗往視已自刎仆地萬厯二十年郡守表其貞烈李九星妻康氏華亭人萬厯中從姑扶舅櫬逺歸經彭蠡湖夜半風撼舟氏驚墮水姑呼漁人援出之氏泣告姑曰兒夙承母訓言不出閨今乃假漁人手乎抵家即自經馮夢貞為之𫝊陸懋廉妻盛氏華亭人夫亡自縊死陳愷妻顧氏華亭人夫亡自縊死胡體晉妻侯氏華亭人夫亡後有欲奪其志者自縊死李光初妻楊氏青浦人夫亡將殮氏斷一指投棺中誓從地下既葬絶粒而亡顧氏女華亭人許字秦氏子秦亡父母將别議婚即自縊死曹氏女華亭人許字薛繼憕憕亡誓以死守聞有求娶者絶粒死張文㷆妻王氏華亭人少寡遺腹生子又殤父母欲奪其志氏服衰麻自經於張氏宗祠張亮臣妻楊氏上海人夫亡誓以身殉及遺腹生男乳之服闋即托孤親族自縊死國朝楊氏女青浦人許字唐嘉會未嫁夫亡父母復議婚女聞自經死與唐合葬順治年旌表王五妻陳氏上海人拒王才强姦不辱奮罵被殺而死康熙年旌表張文輝妻顔氏青浦人夫亡自縊再以救免絶粒八日而死雍正六年旌表顧定妻朱氏上海人嫁三月夫亡守節八載至雍正八年秋拒許才强姦自刎死十一月題請旌表魯祥妻張氏婁縣人其姑故娼也因與祥共迫氏為娼不從則箠撻勿與飲食脅之益急氏泣告其父曰我必死命也慎勿抵夫罪潛赴萬安橋急湍中死八日得其尸面如生衣上下百結里人為立祠墓側蘇恵妻葉氏青浦人夫亡絶粒死沈匡濟妾翟氏華亭人夫殁坐臥一小樓兵至投井死呉期伸妻沈氏華亭人兵至抱幼女赴池死徐俊妻張氏上海人俊疫死貧不得棺張伴尸而臥以一女為萬氏養媳始得錢以殮後族子利其改適與其母謀嫁周某遂自經死年三十四顧颺妻倪氏上海人海寇劫其家氏觸墻死張旦兮妻范氏上海人拒逼姦被殺顧竒妻某氏上海人拒姦被殺徐士述妻趙氏上海人族人奪其産逼之嫁氏赴水鄰救之遂成疾死童嘉恕妻褚氏上海人夫亡絶粒死唐氏上海人夫與某博負以氏償之自縊死夏某妻瞿氏上海人夫死於寃自縊尸側陸昇階妻曹氏上海人夫亡百餘日值寒食設祭時哀慟而絶唐元晟妻楊氏上海人夫亡守節十年姑與繼母逼嫁之服鹽滷死呉連妻張氏上海人夫亡後有刼娶之者給其束裝自縊而死周某妻張氏上海人夫亡後有謀娶之者氏聞遂自縊死顧徳修妻王氏上海人早寡父謀嫁之氏聞痛哭即自縊死徐天禄妻秦氏上海人本某姓婢夫亡守節十餘年其主令改適自縊死張某妻湯氏華亭人夫亡後鄰舍火氏伏夫柩願與俱燼須臾風反火息人謂至誠所感沈元齡妻葉氏華亭人夫亡自縊配祀三烈祠黃士英妻潘氏華亭人夫亡自縊救免及女嫁嘆曰吾事畢矣遂一慟而絶鍾某妻盧氏華亭人夫為王氏青衣婚一月隨主至京師既以瘵歸病革語氏令改適氏以死誓夫亡絶粒自經死張氏女華亭人為莊氏養媳未婚夫亡舅更議以女配姪女歸謂其祖母曰此萬不可若爾我不活矣我去某日來收我尸皆不之信將婚前四日縫結衣帶夜出投水死董謙妻華氏婁縣人嫁二載而寡及葬夫嫁女畢後遂自縊死沈廷棟妻曹氏青浦人順治十六年盜刼貞溪氏出避猝遇賊度不能脫抱幼女投溪水死陶尚象妻周氏青浦人夫亡絶粒死錢氏女奉賢人許字程迪迪殤女闔户自經顧𢎞妻唐氏南匯人夫亡母勸之他適氏號慟欲死幼女哀哭願偕死並沈於河唐望麟妻潘氏南匯人嫁甫二十七日夫亡自經馬繼援妾孫氏南匯人夫亡舅諷之改適氏投繯絶仆地會救不死守節終身常州府唐鄒待徴妻薄氏江隂人隨夫宦江南遭世亂為盜所獲將辱之乃宻以其夫官誥托村媪轉付待徴遂死李華為作烈婦詞南唐何氏女江隂人為盜賊所掠欲汚之女紿曰當修容以見須㬰盛飾出大罵不絶口赴水死邑人義之為立祠於昭聞鄉宋李易母蔣氏江隂人建炎三年金兵至夏港易官僉判守臣胡紡謂易曰吾曹死守城郭公有母宜少避易以告母母曰我去則汝決不能守矣願與汝同死卒不去謝天與妻鄧氏武進人事姑盡孝徳祐末元兵猝至家人皆走姑以瞽不能行氏守姑為所獲投水死元姚臨妻金氏宜興人元末兵起臨挈家入太湖遊兵追之氏度不免即率幼女赴水死趙氏二女江隂人至正間廣徳寇掠郡縣長女抗節自經越三年次女遇盜亦赴水死王逢賦雙珠詞哀之朱道存妻費氏道存宦江隂氏依父居上海為苗軍所執將犯之大罵不辱遂被殺陳惠妻曹氏江隂人遇寇氏與女俱抗節死子婦呉氏奮力救姑賊斫其臂血濺衣裙王逢為作三貞篇秦筆妻江隂人佚其氏兵亂筆挈妻居呉中筆病亡氏自縊鄒珙妻華氏無錫人至正末兵亂氏隨夫走匿追及度不能脱顧謂夫曰我義不受辱君善自保赴水死儲原善二女宜興人紅巾賊亂二女度不能免私誓以同死及賊至相抱投水死後同葬焉名雙貞墳陳氏靖江人隨父楚良避亂遇賊欲掠去即投水死明華源長妻鄒氏無錫人夫病革以孤托母而不及婦婦嘆曰不我信矣遂自經越三日夫亡陳旭妻臧氏武進人夫病革囑以改嫁氏泣不能答夫亡即自縊死詔表其門曰貞烈張文煥妻邵氏無錫人煥官巡檢捕寇戰死遺孤十齡邵屬於文煥故人姚樞抽刀自刎孟元卿妻李氏武進人夫亡欲殉以姑在隠忍姑殁殮畢遂自經死姚冕妻錢氏武進人夫客死柩還即自經杭氏女宜興人許字楊鉷鉷家業日替父圖改盟女堅執不可父隂受他姓聘女聞自經江相女靖江人年十七聞倭寇入掠宻以布自裹以煤自塗及賊至欲汚之女奮起奪賊刃而刎未絶投江死胡秀妻徐氏江隂人早寡有求婚者自經死于錫調妻杭氏武進人湖寇起不辱遇害孟道傅妻李氏武進人夫亡自經張守敬妻劉氏靖江人夫亡有陳姓謀娶之不從刼歸逼之遂自縊死事發陳伏誅周氏鄒氏婢也配義兒李昌夫死誓以身殉主婦命左右守之後既葬守者懈自縊死薛𤦺妻張氏江隂人夫死召夫弟托孤自刎於幕趙崇禧妻郁氏江隂人崇禧為家衆所殺郁年二十五脫簪珥以購賊首置之法撫陳媵所生子陳亦終身不嫁劉玉妻龔氏江隂人夫亡有强逼之者乃以所生子女寄母家舉火自焚邑令上其狀旌焉巢氏女武進人許字惲鎮未婚鎮卒奔喪守貞事姑孝謹姑亡遂經死𢎞治中旌尤輔妻成氏無錫人隨夫居靖江江水夜至家人裸而升屋氏不肯與俱整衣端坐榻上死俞氏婦無錫人夜火及寢婦求衣不得一僕冒火救之婦曰寜死耳豈可裸而出户耶遂焚死華緯妻呉氏無錫人正徳中劇寇劉齊犯江隂氏出走猝遇賊以刃脅之不從磔其屍投之江中朱性妻顧氏靖江人年二十二夫亡誓死自守正徳中流賊刼掠江南氏懐夫木主隨姑走匿及旦失姑所在遂縊死時有同邑孫氏馮氏亦死寇難劉官舍妻呉氏江隂人夫與其曹逺賈不歸有言其夫實死於其曹氏泣曰勢不能雪仇須訟於地下自經死陸某妻翟氏江隂人嫁二十七日夫亡貧無以殮泣告族屬周佽之事畢自經殯所王岳妻呉氏無錫人夫病囑籌身後事氏曰妾當死君前既而夫病亟氏乃設酒饌邀夫族屬及其兄弟三人至曰吾夫將死請以一見至夕乃跪夫牀下自縊嘉靖年旌呉氏女武進人許字顧氏子夫病往奉湯藥夫亡自縊朱氏女歸夏秉常年十三尚未成婚倭亂為所執奮身躍入河死錢季子妻鄒氏無錫人年二十二為倭賊所獲賊植刃於栢氏奮力騰身栢上觸刃穿腹而死陸子才妻蔡氏無錫人嘉靖中乘舟歸寜倭猝至欲汚之遂投水死事聞旌表呉璅妻李氏宜興人夫亡守節有逼其改適者自經死徐文秀妻王氏宜興人夫亡無子與柩寢處撫木幾穿卜地為雙壙以誓同穴後舅潛納他姓聘氏聞之自經萬厯年旌周珍妻張氏宜興人年二十珍妹年十八人以飛語誣之二女曰非一死不足以明心嫂姑俱赴水死儲篤妻陸氏宜興人夫亡慟哭四十九日以身殉何其孝繼妻呉氏宜興人夫為族子毆斃前妻子士晉方九歳氏藏夫血衣匿子外家朂之力學及士晉舉於鄉氏拊夫棺大慟死士晉成進士持血衣訟於官讐人伏辜具疏上聞詔付史館金鉉母章氏武進人鉉死國難母赴井死徐安逺妻楊氏武進人安逺奉父叔美挈妻妾避亂太湖父遇害安逺慟哭赴水死妾蕙香曰事急矣躍入湖楊隨之賊遽遮止欲犯之露刃相脅楊即引頸就刃自斷其喉馬世竒妾朱氏李氏俱無錫人懐宗甲申三月闖賊陷都城世竒語二妾曰吾受國恩宜死二氏泣對曰主死殉國妾死殉主尚何言即同自縊李氏年僅十六後俱䘏贈孺人附祀旌表王章妻某氏妾某氏俱武進人懐宗末章官御史死國難二氏在籍聞訃俱一慟而絶陳邦選妻徐氏無錫人為遊兵所掠逼之赴水死徐文姜妻陳氏無錫人夫墮水死陳聞即自經孫啓妻鄭氏武進人明末盜起所過剽掠氏恐為所辱赴河死盛于鄗妻黄氏靖江人年二十三夫亡請鄗弟子為後曰夫有後吾事畢矣不食死懷宗九年旌褚某妻呉氏靖江人夫亡姑令改適自經死浦氏女無錫人許字陳毓華未婚夫亡女聞誓以死殉父母守之甚宻乘間投河死衣皆宻紉雙環繫焉陳聘物也旦日毓華母聞而往視喉間隠隠有聲目暫一開而瞑邑人祠祀之張燦妻劉氏江隂人兵至燦姊妹俱被執去氏獨奮詈强持上馬嚙去兵一指兵恨亂斫其身數段張維貞妻高氏江隂人苦節已四十餘年城破兵至偕子邁及孫俱赴水死高日增妻呉氏江隂人夫為兵所殺即晚殮葬閉樓投環而死王月梅靖江人某氏媳兵刼之行見一小溝奮身入淺不没取泥遍塗兵攢槊殺之王翼事妻莊氏武進人張𢎞謨妻繆氏江隂人韓璐妻蔣氏江隂人沙志禮妻何氏江隂人戚有元妻章氏江隂人顧端甫妻高氏江隂人陳宗虞妻張氏江隂人邢公祚妻蔣氏江隂人張達道妻任氏靖江人劉氏女靖江人庠生瞿徳毅妻項氏靖江人以上遇兵不辱死國朝丁氏女江隂人許字徐祗先夫亡自經歸葬徐氏墓康熙年旌表沈黌妻倪氏江隂人因割股救母而殞氏葬夫畢自經以殉雍正五年旌表董氏女武進人許字瞿元春未嫁夫亡女闔户自經家人排闥救之因剪髮毁容自誓必死居七年聞夫柩已葬繼嗣已定謂兄曰我死可送我柩歸瞿氏墓以全吾志託病絶粒七日死元春父聞之迎柩與元春合葬雍正七年旌表馮繼冉妻薛氏陽湖人幼通書史繼冉從弟繼韓窺其端麗貽書汚玷憤恚自剄事聞旌表繼韓論如律孫氏女江隂人許字楊安基未婚夫亡奔喪成服將葬即自經夏氏女江隂人許字陸繩武未婚夫殁奔喪哭奠葬夫三日自經死以上雍正十一年旌表蔣九逮妻岳氏武進人年二十六夫亡無子葬夫畢自經死李某妻朱氏武進人夫亡有薛某欲刼以歸氏同女投河死周魁妻何氏武進人夫墮河死氏沿河號泣兩晝夜始得夫屍翁令改適自經死許之濬妻呉氏武進人有强犯之者不從遇害曹氏女無錫人許字朱氏子未婚夫亡女矢志不二有强委禽者服衰絰自經諸士蘭妾葉氏無錫人士蘭客死遺孤幼葉曰待成立死耳稍長死之朱氏女無錫人許字張錫婚有日而張殞女聞紿其母與嫂他出闔户自經沈士珍妻馬氏無錫人早寡舅欲嫁之自經死王氏女無錫人許字金兆年女年十四聞夫病殁即投繯殉母覺救甦後父母欲改字之女大書一紙於卧室几上云生為金氏人死為金氏鬼天也不諒只一死豈不偉遂投井死胡烈女江隂人許字徐五四徐以讐訟獲死罪繫獄或勸改字女固拒之夫死獄中即自經周氏女江隂人許字李燮燮以酒狂自經女欲奔喪李不可亦自經死趙氏女江隂人許字方氏子方卒父母欲改字之女聞自經救免復吞銅卒潘寀宏妻李氏江隂人夫亡氏年二十六誓以身殉緣翁篤老忍死養翁撫六歲孤成立翁殁葬畢一夕宻紉上下衣自經臥室何氏女江隂人許字陳世榮童年養於陳未婚夫亡氏剪髪爪納柩中誓不嫁姑逼之投繯死戴川妻張氏江隂人川以事謫戍陜西娶氏生二子川殁氏籲當事請歸江隂守節督撫哀其志賞給驛馬移咨江蘇巡撫氏以驛中廩給供口糧徒步攜二子歸邑人士義之為裒金供其饘粥邢近綱媳某氏江隂人城破時氏據巨井欄坐遇男子欲投井氏叱曰汝輩易覔死所留此以為我婦人盡節地兵近乃踴身入焉許國棟妻李氏江隂人被兵不辱挈媳并子女自焚徐步妻許氏江隂人兵至闔門赴井曹氏女江隂人倪春岡妻高氏江隂人殷華石妻呉氏江隂人邵國初妻任氏宜興人邵齊疆妻陸氏宜興人邵璽妻任氏宜興人邵遂祖妻呉氏宜興人丁佳妻黃氏宜興人丁明妻黃氏宜興人蘇氏女宜興人沈伯芳妻王氏宜興人毛重泰妻史氏宜興人以上皆為兵所迫不辱死蔡氏女宜興人許字談邦植未婚夫亡自經死尹佐妻陳氏宜興人佐訓䝉在外因逋糧縣役欲污之自刎死張氏女宜興人許字邵正垣未嫁夫亡即自經萬文彪繼室曹氏宜興人年十七夫殁投井死呉某妻王氏宜興人夫亡有强委禽者自縊死張氏女陽湖人名聖姐賦性端淑有匪人以穢語相加女聞自刎海烈婦徐州陳有量妻徙居武進家貧氏有姿色康熙六年有運丁林顯瑞以銀三兩誘氏夫婦入糧艘遣夫他往百計誘奸不從强逼之氏堅拒自經死水手藍九廷鳴之官勘實林伏辜邑人立祠於西門外運河旁任氏女宜興人適閔姓兵至赴水死王紹妻錢氏宜興人事姑至孝一日母饋以鵝菜覆其上錢即分菜進姑徐按得鵝急欲補進而姑適至錢愧恨奔告母曰倉猝奉姑失悞姑雖不言我不死無以自明然姑待我厚我死姑必悲是重吾不孝也乞以妹與吾夫終事姑嫜遂縊而卒母以次女續焉江南通志卷一百七十七
