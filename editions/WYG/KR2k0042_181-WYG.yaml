  text: 江南通志卷一百八十二人物志列女完節一江蘇二府江寧府宋劉虎妻王氏虎為觀察使自廬州徙居建康拒元兵扵五河中矢洞腹而死氏守志五十餘年虎子裕妻郝氏孫應麟妻亦郝氏皆早寡守節王友筠妻李氏句容人淳祐年旌表元李成妻周氏上元人劉英傑妻吳氏上元人劉祐妻馬氏上元人王元壽妻楊氏上元人張和妻黄氏溧水人以上俱守節旌表明何官童妻汪氏上元人母病刲股夫亡守節李志妻孫氏上元人李純妻屈氏上元人蘇官福妻薄氏上元人田二妻王氏上元人黄公受妻龔氏上元人陳安兒妻汪氏上元人奚善才妻顧氏上元人劉受妻楊氏上元人陳保兒妻吳氏上元人劉畱住妻倪氏上元人鄧信妻魏氏上元人伊端妻魏氏上元人楊阿庇妻陳氏上元人楊氏佚夫名姓江寧人李老哥妻孫氏江寧人沈氏佚夫名姓江寧人于氏佚夫名姓江寧人孫敏妻喬氏江寧人唐思敬妻尤氏江寧人庠生陳福妻俞氏江寧人趙壽妻吕氏江寧人羅受童妻倪氏江寧人舉人任忱妻焦氏江寧人徐昱妻錢氏江寧人葉阿僧妻張氏江寧人陳阿福妻秦氏江寧人張純妻龔氏江寕人王闗孫妻言氏江寧人陸阿葛妻倪氏江寧人趙春妻吕氏江寧人周稱住妻張氏江寧人徐真保妻朱氏江寧人孫成道妻徐氏江寧人徐鳯岐妻王氏江寧人王應鳯妻顧氏江寧人張五妻俞氏江寧人李佛保妻胡氏江寧人夏齊周妻董氏江寧人童鉉母張氏江寧人黄益妻梅氏江寧人方翰妻盛氏江寧人生員張光世妻康氏江寧人李長庚妻唐氏江寧人陳鎧妻王氏江寧人庠生陳河洛妻王氏側室尹氏江寧人王年十八尹年十五夫以割股救母創死王斷髪截耳置棺中與尹同守節朱約妻石氏句容人笪元善妻鄧氏句容人徐尚學妻趙氏句容人曹哻妻張氏句容人馬壽春妻王氏句容人譚謙妻王氏句容人孔士傑妻許氏句容人陳儀之妻魏氏句容人張徳清妻周氏句容人舉人武尚訓妻王氏溧水人陳時美妻蕭氏高淳人楊紹春妻王氏高淳人葛善三妻劉氏高淳人孔昌妻劉氏高淳人李徳祚妻章氏高淳人刲股愈夫夫亡守節陳時召妻張氏高淳人生員吳近伯妻施氏高淳人孔尚武妻陳氏高淳人劉開宗妻李氏高淳人趙思訓妻狄氏江浦人嚴師心妻蔡氏六合人高仲良妻張氏六合人吳達妻俞氏六合人趙思訓妻張氏六合人生員朱思近妻弓氏六合人丁允恭妻洪氏六合人丁尚彬妻解氏六合人馬鑑妻江氏六合人郭盟妻徐氏六合人厲暟妻徐氏六合人林寳妻許氏六合人楊祖壽妻余氏府軍衛人以上皆受旌表吳仁妻馬氏上元人年十八夫亡奉姑教子兵過相戒無敢犯壽百有二嵗王嘉相妻殷氏上元人王以材妻狄氏江寧人張治妻武氏江寧人謝瑜妻張氏江寧人庠生劉芳逺妻林氏江寧人張逸妻孫氏句容人初張孫二家俱娠遂訂婚逸年十歲而父死舉家謫戌逸隨母往稍長母命還鄉就婚氏之父欲負約氏不可曰娠而許之患難而棄之非人也卒歸逸遂從之戌所王樑妻端木氏溧水人早寡撫幼孤成立娶婦生孫襁褓之中子婦相繼卒又撫孫成立苦節七十餘年壽九十有六陳忠妻王氏江寧人忠守交趾戰没氏年二十三與其父攜二幼女登竹筏求忠屍殮之扶柩南歸以苦節終史可模妻李氏順天人故相國可法之弟婦夫亡長跪夫柩前號泣五晝夜垂死父母力勸乃止奉孀姑來江寧姑病篤刲股療之有要人聞其賢遣官往聘脅以危言氏乃割耳截鼻拒之史存守妻趙氏子媳徐氏俱高淳人劉定濤妻葉氏高淳人孫可大繼妻王氏高淳人史汝華母王氏高淳人以上皆守節數十載國朝邢道悌妻袁氏高淳人悌卒子甫彌月氏嚙指血自誓靡他生員朱圻妻盛氏江寧人江良機妻徐氏江寧人梁資生妻顧氏江寧人汪仕禹妻朱氏江寧人張文科妻鄭氏江寧人太學生沈啓元妻葉氏六合人袁日近妻邢氏江寧人年十八寡生遺腹子名鳯池撫養成立入泮陳鳴霄妻邢氏高淳人年十七適霄逾年霄卒百苦備嘗養姑課子壽至八十三歲卒生員陳鳴鶴妻李氏高淳人甫生子夫殁或勸之改節氏曰不見我邢母乎姑殁禮𦵏撫子入庠以上順治年旌表袁士竒妻魯氏上元人事舅姑盡孝撫兩孤親自訓督姚震妻張氏上元人李順妻林氏上元人許國柱妻張氏江寧人守節清貞持家盡瘁生員徐名貽妻張氏江寧人金士文妻汪氏江寧人十九歲寡守志終身監生蔣宗藩妻曹氏江寧人傅懋哲妻孔氏高淳人夫死撫孤守節庠生王思誠妻張氏高淳人撫子􅅔仕温縣知縣金振昂妻楊氏高淳人早寡力貧茹苦守節趙世輔妻梁氏江浦人喪夫無子紡績奉養翁姑苦節自守樂仁侯妻劉氏江浦人事繼姑以孝聞撫嗣子克成立以上康熙年旌表孔衍岳妻沈氏高淳人夫病劇辭婚氏曰我願死作孔氏之鬼及歸孔二載而寡立嗣守志紡績事姑年八十五卒雍正元年旌表談明寰妻陶氏上元人吳永熾妻程氏上元人吕雋公妻張氏上元人夫死藉針指養舅姑守節四十八年貢生武遴瑂妻李氏江寧人舉人方宣嚴妻何氏江寧人苦節四十三年奉高堂訓子女悉中禮節生員鄭詠妻俞氏江寧人矢志守節四十八年甯琪妻蔣氏江寧人夫亡塟祭以禮撫子成立楊明介妻汪氏江寧人少寡守志辛苦備嘗歴四十年生員周家璜妻王氏句容人夫死欲殉念遺孤在抱撫之守節李昌煥妻戴氏句容人年十八夫亡絶粒欲死因有遺娠翁姑諭以存後乃受命連事繼姑俱以孝聞湯子韜妻陳氏句容人夫亡欲死翁姑諭以孤兒何托遂撫孤成立生員趙甡妻傅氏句容人夫亡無子立姪以延夫後守節五十三年以上雍正二年旌表生員徐必選妻周氏江寧人夫亡殮畢將自經恍惚見朱衣人呵止之因昏仆地救甦苦節課三子皆成立周爾恒妻沈氏江寧人早寡撫孤成立劉霈