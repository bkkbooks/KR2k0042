body:
  text: 江南通志卷四十四輿地志寺觀二蘇州一府蘇州府報恩寺在府城北故稱北寺吳赤烏初孫權為乳母陳氏剏開元中詔改開元吳越錢氏移支硎山報恩寺額於此故名梁僧正慧造浮圖於中凡十一層宋元豐間重建蘇文忠軾捨銅龜以藏舍利建炎四年罹兵燹寺塔俱燼紹興間行者金大元再剏止九層國朝康熙三年鄧尉剖石壁禪僧來寺修塔八年夏告成以三元房為方丈名塔院承天寺在報恩寺西南甘節坊内梁衛尉卿陸僧瓉捨宅剏初名廣德重元寺宋初改今名元末張士誠據以為宮明洪武初復為寺正統八年燬成化十年重建康熙五十八年聖祖仁皇帝欽賜金葉祥光四字匾額雍熙寺在府周武狀元坊内本周瑜故宅梁為陸襄太守宅天監二年捨以為寺僧清閒開山名法水寺唐僧壁法重建宋改今名元燬明洪武初以其地為城隍廟僧廣宣乃即城隍廟左重建東華嚴寺在周武狀元坊孫吳時建宋咸淳初賜額西華嚴寺在府西北隅元至元二十年報恩寺僧同覺開山其徒元沖嗣建朱明寺在府城隍廟西晉朱明富而孝友其弟聴婦言避兄離居明以金穀盡與弟唯畱空室一夕風雨財悉飄還明宅弟與婦媿而自縊明遂捨宅為寺代逺漸為民居繼為官署至國朝順治十一年巡撫周國佐因署中屢見神光遂遷南城發地得須菩提碑刻五百羅漢朱明字蹟在焉副戎朱光照異之重建娑羅閣巡撫張中元捐造凖提閣漸成叢席海𢎞寺在朱明寺南宋至德間剏自樓子和尚寶林寺在府西北隅元至正間僧圓明開山明宣德二年燬正統十一年重建奏改今額内有栟櫚徑梧桐園水竹亭山茶塢煑雪寮停鵠館諸景定光寺在府徐胡橋西宋景定間建明英宗召天下名僧講演經典寺僧永琮應召稱㫖賜紫伽黎勅額定光講寺開元寺在府盤門内吳大帝母捨宅建永禪僧開山名通元寺寺有石佛相傳晉建興二年滬瀆海口漁者夜見神光照水徹天旦而視之乃二石像浮水上吳人朱膺等於海濵迎入城置通元寺光明七晝夜不絶其後漁者復於此獲一青石鉢遂併以供佛唐東宫長史陸東之書碑延載元年則天遣使送珊瑚鏡一面鉢一副宣賜供養兼改重雲寺開元初再改今額舊在城北陲後唐同光中錢氏遷置於此宋紹興間守臣洪邁作戒壇明萬歴四十六年僧如緣建閣供奉欽賜大藏純壘細甎不用寸木雄傑冠江南瑞光寺在府盤門内開元寺南吳赤烏四年孫權為報母建舍利塔十三級僧性康居之名普濟禪院宋元豐二年神宗命漕使李復圭延圓炤宗本禪僧説法時有白龜聴講法鼔自鳴翠竹合歡寶塔放光故堂名四瑞宣和間朱勔捐資幷建寶塔七級復賜寺額瑞光禪寺淳熙十三年法林住持重葺有白牛自來助役工畢乃斃今白牛塚尚存舍利塔凡燃燈之夜太湖漁人網捕無所獲湖與塔相去三十里康熙四十二年聖祖仁皇帝賜普度羣黎四字匾額報國寺在府學西元至元間建賜額報國寺明天順中重修泗州寺在府杉瀆橋東南本報恩寺子院宋景定間僧惟一感泗州大聖夢移置南城賜額泗州禪寺龍興寺在府治西南范成大志云梁置吳地記云則天后置御書額開元五年再興刺史張廷珪摹勒御書於碑然房琯所撰碑與此不同明初廢西竺寺在府平權坊内即祥符寺唐大中間郡人司馬厚捨宅建初名馬禪宋大中祥符初易今名西禪寺在府治西南吳中四大禪寺之一也唐貞觀間建宋紹興間信安郡王孟忠厚改建為隆祐太后薦嚴之所明嘉靖間郡守胡纘宗借正殿為巡鹽公署萬厯間改遊擊公署尋廢至國朝康熙十三年侍講繆彤歸復永定寺在府治西南吳地記云梁天監中郡守郡人顧彥先捨宅建唐乾符間賜今額陸羽書初寺在閶門北景福二年始遷於此元僧九臯作海印堂牓為元台哈布哈所書雄偉可觀利濟寺在府閶門外南濠宋紹興間建明洪武初為叢林成化六年燬二十三年寺僧𢎞毅大心浄心重建寒山寺在府閶門西十里楓橋下相傳寒山拾得嘗止此故名石佛寺在府閶門外南濠齊隠士何求嘗開講於此宋嘉定間重建明洪武間歸併利濟寺成化間又建萬厯初又廢天啓六年郡紳毛堪士人張世俊捐資興復慧慶寺在府閶門外西五里元延祐間建至元間兵火廢僅存退居於涇西明成化𢎞治間僧達俊如珪即退居修葺治平寺在府上方山下梁天監二年建名楞伽寺宋治平元年改今名寺旁有石井隋人刻字蓋楊素移郡横山時也明嘉靖辛巳寺僧智曉構石湖草堂於寺内又有竹亭西南房有五賢祠祀唐寅文徵明王守王寵湯珍上方寺在府楞伽山上隋大業四年吳郡太守李顯建浮圖七級寶積寺在府治平南紫薇村西隋大業四年建廣福寺在府吳山嶺上晉天福間吳越中軍節度使錢文奉建為其父廣陵王璙墓祀之所本名壽聖院宋天聖間建僧惟久屢遷其址治平中改賜今額薦福寺在府薦福山下或云亦錢氏建寶華寺在府寶華山梁天監間􅤇􅤇尊者嘗卓錫於此中有􅤇􅤇泉宋祥符間知府秦羲重建寶雲寺在横山堯峰本名壽聖寺康熙四十二年聖祖仁皇帝賜寶雲寺三字匾額附明王鏊記吳横山之西南有峯名堯莫知所始或曰堯時民於此避水也唐末慧禪師始建精藍曰免水院宋改為壽聖寺有寶雲禪師居之元涉國初久茀不治𢎞治初有雲谷􅉅禪師與其徒文通披叢剔薈始立山門繚以石垣觀音龍王之殿寶雲碧玉之沼東齋西隠以次修復而大殿未遽議也雲谷示寂文通卒矢先志乞諸檀越大雄之殿頓還舊觀矣予北歸造焉峭壁梯空側足而上至巔曠然平夷樹木縈紆泉石秀麗却而望之太湖萬頃浩蕩在前而吳興雲間諸峯隠隠可見信地之高且勝者也地雖勝而其蕪也久得人以居之則蕪者治頽者起事之興廢其不在人乎興福寺在府下堯峯宋咸淳中建法音寺在府獅山舊名思益寺唐開元中建宋高宗南渡值壽聖公主薨擇葬毬山賜名思憶國朝康熙四十四年聖祖仁皇帝賜法音寺三字匾額資福寺在何山下靈巖寺在靈巖山即吳故館娃宮晉司空陸玩捨宅為寺梁天監二年重建剏寶塔感智積菩薩之異稱智積道塲宋改為秀峰禪院太平興國二年藩臣孫承祐為姊錢王妃資冥建甎塔九層紹興中詔賜韓蘄王薦先福更號顯親崇報寺明洪武中賜今名永禁民間採石國朝康熙二十八年聖祖仁皇帝賜嵐翠二字額三十二年欽賜彌勒偈四句彌勒真彌勒分身千百億時時示時人時人自不識附宋孫覿靈巖記略梁天監中重建靈巖寺成有異僧負鉢囊以入憩殿廡下長身黧面梵相竒古其徒莫之省夜半索筆墨自圖其像於殿之東北壁而去黎明不知所在衆始驚異之居無幾有胡僧顧見其書惜曰此西土智積菩薩像也何為在此於是道俗犇走來觀稽首皈依如師出世唐宰相陸象先吳人也有弟得危疾一日有僧叩門問疾象先引至卧内僧索杯水噀之一噀而病良已象先驚謝出金帛數牀弗受顧謂其弟曰我靈巖僧它日還吳來過我遂去不復見其年象先弟觀察桂管道吳中趨靈巖問僧所舍無有遍從寺僧求之亦非是方悵然欲還俄見壁間所畫像肖焉驚喜亟拜施錢五十萬修供作佛事徘徊數日而後去其事載於吳越國沙門智賢之文傳於山中父老之口見於大乘經菩薩品云智積舊有殿在院之東廡庳迫破露不足以稱四方祈向奉事之意長老智訥飭其徒募衆力大之於是訥過余於晉陵求文以為記明月寺在府木瀆靈巖山前後唐清泰二年建觀音寺在支硎山東麓晉支道林建唐景龍間賜額報恩明洪武間併白雲寺北峯寺在支硎山支道林建南峯寺在支硎山南峯舊名天峯院亦支道林建即古支硎寺以後修建賜額今圮止存支公放鶴亭報恩寺在支硎山西本名寒山明趙宧光凡夫宅殁即葬焉人稱其地曰趙墳其後僧素潤得之為禪院内有雲根泉華山寺在支硎山西蓮華峯東南長松夾徑寺境幽絶國朝康熙二十八年聖祖仁皇帝賜遠清二字額御製欲遊華山未往詩一首恭紀首卷三十八年欽賜翠巖禪寺四字額又香域二字額御製華山詩一首恭紀首卷又賜閒起溪雲下詩清山雨歸對聯三十九年欽賜斗室二字額白雲寺在天平山唐寶厯二年建名白雲菴以山有白雲泉也宋慶厯間范仲淹以先墓所在奏為功德寺賜今額普賢寺在天平山之東牛頭峯塢内宋景定間建金山寺在金山下元至正間建賀九寺在鹿山之南嶺嵗久淹沒明正統間修復崇禎五年郡紳文震孟建惟心閣於龍潭上西資寺在吳山西係古吳山寺穹窿寺在穹窿山陽相傳朱買臣故宅梁天監二年建明洪武初姚廣孝為僧嘗居此奉勅改顯忠禪寺嘉靖中粥為民產崇禎十三年復建名拈花寺康熙四十一年聖祖仁皇帝賜拈花禪寺四字匾額寧邦寺在穹窿山陰寧邦塢宋紹興十二年韓蘄王世忠部將戰還薙髮隠此學禪賜額寧邦禪院明萬厯間僧雲川募衆鼎新白馬寺在香山之麓相傳蕭梁時因伐樹祀白馬之神故名晉支道林開山宋景德四年重建萬厯間殿堂盡圮地屬居民崇禎十七年聖恩寺剖石壁禪僧恢復基址國朝順治三年法嗣巨冶鳩工新建山有泉名梅泉天宮寺在胥山南太湖濵梁天監三年建宋天聖中修明洪武間為叢林寺光福寺在鄧尉山龜峯下梁大同間九真太守顧某捨山建有舍利塔七層明隆萬間烏程董份倡衆修建聖恩寺在鄧尉山之右唐天寶間建天壽禪寺宋寶祐間又建聖恩禪菴元季寺燬菴存萬峯禪僧時蔚開山説法又創天壽寺尋燬明正統八年僧道立奏請賜今額崇禎元年吳江知縣熊開元延三峯漢月法藏禪僧主席建大法堂後金粟圓悟禪僧又移堂院左今兩院並峙法嗣剖石𢎞璧又建大悲堂藏經閣殿宇莊嚴寮舎次第為叢席冠國朝康熙二十八年聖祖駐蹕於此賜松風水月四字匾額天壽寺在銅井山宋紹興間建元至正間廢明洪武初復建昭明寺在錦峯山相傳梁昭明太子蕭統建或謂山産文石故名唐會昌中廢宋嘉泰中白馬寺僧南重拓建有理宗書賜鄭起濳錦峯二字藏寺中明洪武初為叢林寺僧於此采石遞至南京寺旁有石蕩即采石處延慶寺在府横金鎮唐長慶三年建吳越錢氏修宋天聖間重建實相寺在香山西太湖濵舊有實相院范成大志云古廢寺梁大同十年重興宋大中祥符中賜今額寳壽寺在八都黄蘆村唐大中七年剏乾德二年吳越錢氏重建宋嘉定間重修長山寺在二十三都梁大同間建晉慶寺在臯峯山塢晉支道林建秀峯寺在府西華鄉宋紹興間建姑蘇寺在横山之錢莊梁天監二年建清逺寺在府蓮華峰東南本名華山寺明僧鹿亭結茅於此後講僧一雨卓錫法嗣汰如蒼雪二僧相繼興建殿宇檗菴正志繼之長松夾徑寺門幽絶有華山初地坊翠峯寺在府東洞庭莫釐山東北唐將軍席温捨宅建宋初雪寶明覺顯禪僧住山説法今寺有悟道泉白樂天有詩靈源寺在東洞庭碧螺峯下寺有靈泉故名梁天監元年建能仁寺在東洞庭長圻嶺東梁天監二年建内有泗州池相傳見泗州塔影彌勒寺在東洞庭飯石峯下唐乾符間吳越王建興福寺在東洞庭俞塢南法海寺在東洞庭莫釐峯南隋莫釐將軍捨宅建華嚴寺在東洞庭翠峯東北楊家灣梁天監二年建永福寺在東洞庭武山之西金山東北梁天監二年建上方寺在西洞庭山唐會昌六年僧道徹開山名孤園寺宋嘉泰間重建始改今額寺前跨澗有香花橋橋旁古松偃覆於上曰臥龍松包山寺在西洞庭山梁大同二年建天監中再葺宋靖康中僧懐深居此卓錫其地泉即湧出甃井置欄國朝朱彝尊記略康熙甲申三月朔暨同里沈秀才自林屋洞門扶杖步至神景觀坐笨車尋包山寺將至行新松林下約千