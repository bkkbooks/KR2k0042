建明姚廣孝為僧時居此後建祠於中有勅賜碑文華嚴菴在府竹青塘宋建永慶菴在府下雉瀆後周廣順元年建超化菴在崑山縣東南二里宋淳熙中建後改名和豐菴每嵗迎春於此崇寧菴在崑山縣西北巴城湖之左宋崇寧中建海潮菴在崑山縣恵安鄉何村明萬厯十五年建瑞石菴在上方院之右宋明道元年建白龍菴在常熟縣頂山梁天監元年建拂水菴在虞山西嶺明洪武三年建晏林菴在虞山西宋紹興六年建真武菴在吳江縣三里橋北俗稱北天門藴空菴在吳江縣黄溪東寨湖内東吳赤烏三年司馬盛斌結寨於此明建文初僧了然建菴普明菴在吳江縣龎山湖濵元至正中建夜則懸燈於竿以指行舟崇真宫在府永豐倉東宋政和八年里人黄悟微捨宅剏建東嶽行宫在府虎山靈順宫在東洞庭之楊灣祀相國伍員剏自貞觀二年宋高宗南渡時扈蹕官軍分道經湖風濤不可航禱神立應為遣官齎金葺治封員為忠武英烈顯聖安福王里人楊嗣興捐地若干畝益恢其故上真宫在西洞庭龍頭山西三里梁大同四年隠士葉道昌捨園宅建天妃宫在北寺東宋元祐間剏元泰定四年海道都漕運萬户府奉㫖勅建明嘉靖二十二年又勅賜重建按神姓林宋時莆田都巡檢林愿之女生而神異能言人禍福立廟祀之祈禱輙應乾元宫在虞山北宋元祐中建紹興丁卯改築招真庵取致道舊額名乾元宫附宋康與之記自姑蘇出齊門㳂而北望山如巨鼇蓋常熟縣之虞山也邑去江不及程陂湖畎澮之積自南至者傾馳㑹於江江河既應則迅瀾倒流二水相制移時而不能去山無竒谷惟荒墟白草醜石散亂坡陀迤􅆔而西有修林横抹隠見於兩山之間其中為招真菴元祐中道人申氏泰陵徐處士弟子也松林森茂庭宇簡寂如隠君子之居通州道士喻抱元増治之舊名竹林至是更以招真請記於僕乃歌招真之詞以系之曰白鶴巢兮丹井空蓬山杳兮烟霞濛陵谷變兮今古木葉下兮秋風飛仙去兮朝太微黄冠野服兮以遊以嬉飡霞臥月兮世不我違與世滌映兮天門可馳蒼龍嘷兮雲漫扉石泉冽兮山芋肥俯仰宇宙兮日月蔽虧靈秀回薄兮野芳呈姿山中之樂兮萬化莫移他人不來兮隠者曷歸崇義院在府西北隅宋紹興間建浄慧院在府西北隅宋景祐四年建白雲禪院在閶門外宋慶厯間范仲淹奏即天平山白雲菴改功德寺移菴於此明萬厯二十年郡紳徐元正重修貝葉禪院一名雲泉菴在府白蓮涇慧慶寺後内有古井名雲泉元至治間剏明萬厯間僧巢松葺垣得碣有陸龜䝉時翻貝葉添新藏間插松枝䕶小泉之句更今名明因禪院在府横山下即薦福山感慈院宋景祐間建妙音禪院在府行春橋西茶磨山麓宋淳祐堯山主開山明洪武中重建中峯禪院在支硎山寒泉上本支公古刹也不知廢於何年地屬王氏天啟中鏊元孫永思施為講僧一雨通潤静室天衣禪院在翠峯寺右悟道泉在焉宋雪竇説法時寺集千僧有天衣懐禪僧願汲水供衆忽折擔蹉跌而化桶湧白蓮報忠院在西洞庭包山梁天監九年建戒幢律院在府九都舊為太僕徐泰如西園捨為寺崇禎八年建甘露律院在閶門西半塘明建國朝康熙九年布政慕天顔復建殿閣即菴前官河為放生池僧淨起復有退居與院址相接名香嚴菴佛華禪院在府采雲里明崇禎十六年建元和道院在府治後宋端平間建清微道院在府治西支家巷内宋端平間建安隠道院在府石巖橋南宋嘉泰間建高真道院在府織里橋南宋嘉泰間建太初道院在盤門内宋寶慶間建太微道院在閶門南城下元至正八年建佑聖道院在閶門南濠元至元間建富春道院在府木瀆鎮宋治平間建全真道院在府光福迂里靈應道院舊名高真堂在府東洞庭之梁家瀨宋建元季燬明成化間重建王鏊有記嘉靖四年移於本山之湖沙里改今名回真道院在府城東北宋咸淳間建靈隠道院在府城烏鵲橋東南宋嘉定元年勅建悟真道院在齊門外宋何蓑衣真人退修之所有墓在院東冲和道院在府上十四都蠡口宋何真人賜塋之側元末道士周鶴林退修之所善成道院在婁門外官瀆唐初建通明道院在府甪直鎮之西張滙宋祥符中建通神道院在府陳墓鎮元時建太微律院在府滸墅關南蓮池院在崑山縣西南五十里陳墓村宋嘉泰中孝宗妃陳氏塟此因建有蓮池八景西乾道院在崑山縣馬鞍山陰順治中邑人為辟穀道人吕毖建頂山廣福院在虞山北嶺下梁大同十二年石使君捨宅建名頂山院宋治平間改頂山壽聖院續改今額寺有十景上方院在頂山小嶺之外夾兩山之間白龍泉在焉大慈塔院在虞山拂水巖東報恩寺國朝玉林琇禪師自京師還山世祖章皇帝勅賜帑金建塔院福城禪院在常熟縣小東門外蕭應宫建萬厯戊申建塔三層崇禎甲戌續建四層資福院在常熟縣南門外明崇禎十五年王憲曾捨宅建國朝康熙三年修建闢放生池於山門外三峯清凉禪院在常熟縣北門外數里前臨烏目澗萬厯四十一年漢月藏禪師大興法席邑紳士施飯僧田六頃有竒聖壽禪院在吳江縣西北延壽坊故稱北寺吳赤烏中建靈真道院在吳江縣仙里橋南元至正十三年建崇福道院即圓壇廟在吳江縣南六保長橋宋淳熙二年建朗吟谷在鄧尉山妙高峯僧菴内國朝順治間辟穀道人吕毖鑿石架木構閣以供斗姥又築桴菴在靈巖山塘南其村多植桃名小桃源毖修静於此元和山居在府閶字四圖明洪武時建祐聖山居在府九都明𢎞治甲子建真武閣在吳江縣南門外明嘉靖中建今稱三天門江南通志卷四十四
