body:
  text: 江南通志卷一百八十九人物志列女貞孝二安徽寧池太廬鳳潁八府滁和廣六泗五州安慶府明程氏女系出河南隨父家於皖許字楊宗禮未婚夫亡家貧母强之再字女泣曰餓死事小失節事大紡績自給終身祀烈女祠方氏女桐城人許字盛某未嫁夫亡服衰徃哭歸依兄以居年七十卒左氏女桐城人許字韓旵旵父避仇逺適挈旵行聴女别議婚女曰一與之盟焉能更事他人堅守至二十載旵歸成婦七年卒章氏女太湖人許字汪氏子未婚汪夭女毁容截髮守志以終羅氏女望江人小字引貞許字方自宣方夭女聞百計求死為母姊所持因求歸方氏紡績奉姑二十年無疾而終崇禎時旌表國朝黄巽貞懐寧人許字葛一舉舉早没黄年十五聞訃奔喪㫁髮奉養舅姑縞衣疏食卒合葬舉墓祀烈女祠程氏女懐寧人許字陳洪未婚洪死女固請服喪立嗣守志嘗刲股療姑病髙氏女桐城人許字王家俊夫亡衰絰奔喪設主於室守貞以終康熈年旌表許氏女桐城人許字儒童胡尚虞尚虞死衰絰奔喪獨居紡績孝養舅姑立尚虞兄子祚履為嗣雍正十三年旌表童氏女桐城人許字馮某方氏女桐城人許字葉文元吴氏女桐城人許字張若琅姚氏女桐城人許字王士瑤周氏女桐城人許字章彌六林氏女潛山人許字王前洛馬氏女潛山人許字黄化澤次子周氏女太湖人許字章鍾祥以上俱未嫁夫亡守貞儲良相妻時氏潛山人嘗刲股以愈姑病夫病復然龍氏女望江人名佛貞割股救祖母疾徽州府唐章氏二女歙人隨母登山採桑虎攫母二女號呼摶虎母竟獲免終身奉母不嫁刺史劉賛表所居為孝女鄉宋汪三桂妻張氏歙人嫁逾月而夫亡養舅姑以孝聞葉氏女婺源人許字程士龍未嫁奔夫喪誓不再適事聞旌表葉氏女歙人父母殁鞠於叔母叔母疾割股救之終身不嫁年八十一終明程溧妻汪氏休寧人刲股療姑病詔旌表李徳伭女婺源人年十六聞父遇害慟哭自經洪武九年立祠歲祀汪基女婺源人許配葉天彛奔喪事舅姑守節旌表胡氏女歙人名玉娥年十三偕弟之憲割股療母病題旌雙孝方氏女休寧人許字李宗敏敏死議婚不從徃李守節終養舅姑旌表王氏女休寧人許字程思未婚客死氏守志養姑建坊旌表江巖龍妻方氏歙人繼姑性嚴好督責疽發背方親視藥洗滌至以舌䑛瘡口二十五而寡撫妾遺腹子成立崇禎時旌俞堂妻胡氏婺源人家貧翁老瞽病瘋堂傭外胡生養死葬以勞瘁死江茂嵩妻俞氏婺源人嵩客外姑病篤俞夢神教以進乳乳姑從之姑愈而俞以困憊死朱隠貞歙人年十七許嫁未適而夫死不嫁終身詹子民二女歙人姊名師妹名岳皆未嫁守志終身程法姑歙人許字蒋應約約亡女臨喪哭奠隨孀母守節程氏女歙人許字吴從仕仕亡女奔喪守節許氏女歙人幼警悟通書史年十七刲股療父疾黄細姑歙人許字章一綱綱死寇難女坐卧一室禪誦終身黄玉芝歙人性至孝嘗刲股療母病施氏女婺源人父仁卿殁遺孤二齡女年十五撫弟不嫁人稱其居為貞節里國朝金氏女休寧人許字吴士書士書早殁守貞終身雍正三年旌表曹氏女婺源人許字汪㬢夫亡守貞盧氏女黟縣人許字許永元元死女詣許守貞雍正四年旌表吴氏女歙人許字胡國辰辰亡女過門事舅姑立嗣守貞雍正九年旌表金慶治妻汪氏婺源人事翁姑盡孝姑盲籲天禱祠得明雍正十年旌表胡氏女歙人名芳葵年十九尚未許字事父母祖父母俱得歡心祖母病劇女刲左股和羮進得愈逾時病復作女復刲右股家人無有知者忍痛侍側晨夕弗少怠祖母死女號慟創裂連呼祖母及父母而絶汪于賡女歙人母病瘋父逺館女侍疾盡孝母亡殮畢遂投繯卒程氏女休寧人許字趙徠徠卒京邸女年十六聞訃詣趙立嗣守貞卒年四十有三寧國府南北朝宣城女逸其姓母為猛獸所攫女啼號搏獸行數十里獸置其母去梁天監中詔旌其門元葛妙真宣城人年九歲聞術者言母年至五十當死即涕泣茹素終身不嫁以祈母夀詔褒異之唐八妙宣城人兄亡姪幼憐其孤遂留撫之終身不字明仲文妻郭氏宣城人年二十夫亡家貧奉姑姑病親為嘗糞事聞旌表汪徳香南陵人未嫁夫死奉夫主居一室家被焚所居獨完萬歴年旌與梅烈婦同祠胡催蓮涇縣人許聘朱御御亡衰經徃奠偕一婢樓居不見一人姑病籲天刲股得瘳年六十卒其婢亦以處女終身事聞旌表張星妻陳氏宣城人繼姑甚嚴嘗以無事碎其首父聞之恚氏曰兒自失足耳非姑所致也姑得惡疾同卧起者三月無懈意翟抱貞涇縣人許字王怡怡亡氏衰經奔喪遂依舅姑以節終趙善末妻王氏涇縣人幼養於趙未婚末亡伯父欲使他適氏曰侍姑終天年可也年三十六姑没又勸之氏曰吾老矣又何之遂以完節聞國朝胡氏女太平人許字汪忠瑚瑚亡守貞胡昺妻周氏涇縣人未婚昺亡矢志守貞以上雍正三年旌表錢氏女宣城人許字施躋躋亡守貞雍正五年旌表邵重妻盛氏南陵人夫亡隣媪以家貧勸令改適盛齧㫁一指示之事姑至孝一夕盜執其姑亟以身衛刃傷左臂仆地右臂仍擁抱其姑盜為感動釋去章女佳英南陵人許字曹元輔輔卒女終身居一小樓年八十餘卒姚希儒妻施氏南陵人儒臨没以瞽母弱息相諉氏謹事瞽姑飲食坐起弗少離年七十三卒卒時命子虞曰必葬我姑之側姑在時跬步無我不能行今泉路誰倚乎我願地下長相随也賀大震妻王氏涇縣人姑信幼子譖逼震出之王歲時問遺不敢怨尤閱數年姑病亟姑命迎還氏刲股療姑姑悔且泣夫弟譖氏者亦感悟遂相保如初梅氏女宣城人許字施士錞未婚錞卒女詣施守貞旦夕慟哭三年没俞氏女宣城人許字胡鳳聲夫病同母徃視及鳳聲没留胡養姑白首一節黄日新妻程氏寧國人寡居奉姑姑病劇氏夜夢神語以人肝可治明日便剖肝進之創甚而卧鄰嫗知其故以語姑姑驚喜曰婦孝乃若是霍然起走視婦婦見姑亦驚喜而起姑由此遂愈而婦創未合求醫途遇一人裂帽氊與煎湯飲果效所遇殆神人云池州府明章氏女名佳英貴池人幼孤依兄嫂兄以逋賦竄死佳英與其嫂撫遺孤終身不字周氏女名清香東流人許字阮廷柏廷柏偕媒妁納聘歸舟溺死女聞設位哭遂獨居紡績守志以殁詔旌之余謂道妻李氏銅陵人姑疾篤貧不能延醫剖肝療姑以過傷死管氏女名蓮姑貴池人許字胡邦賢未婚夫卒徃依舅姑立後守節垂三十年殁章氏女名嘉姑青陽人許字曹某未嫁夫亡乃剪髮居一樓父母殁三弟幼稚皆撫之有成陳某妻沈氏青陽人翁疾刲股以進遂愈沈氏女名新第石埭人許字涇縣查一球一球死父復許湯某女以死拒歸查奉姑至老其所居室每歲有孤燕棲之涇人士為作孤燕來巢詩沈氏女石埭人許字李電電與博徒遊為父逐莫知所徃翁與父諭令改適女泣不從父怒每日僅給米二合女志愈堅獨居紡績年踰八十始殁桂一羨妻吴氏石埭人刲股療姑及夫鄭氏女建徳人許字陳某陳夭女聞請徃成服奉姑父母持之遘疾而殞國朝佘氏女貴池人許字柯繼超夫殤歸柯立嗣守貞陳氏女銅陵人許字方國榜未婚守貞孝事翁姑以上雍正九年旌表胡氏女石埭人許字沈自材未婚材殁歸沈守貞以老雍正十三年旌表夏氏女名端姑貴池人許字姜蓁齡齡將婚而夭女閉閣八年髮為盡白姜氏迎歸立嗣後以母喪哀毁卒章氏女貴池人名坤姑許字潘有昌有昌夭父母别議婚女聞自經母救之乃衰服詣潘哭夫於墓奉姑以終孔尚坤子婦方氏建徳人坤病劇氏刲股以進臂創甚醫者云須活鼠皮傅之尋一鼠自來若隂有畀之者傅之而愈姚之皋妻劉氏建徳人性至孝歲大饑糠籺不飽必購米以奉翁姑姑殁哭之㡬絶後年踰七十陳氏女石埭人許字周嶽齡将婚而嶽齡殞女聞訃卧床不起絶粒六日死目不瞑父囑以送柩合塟扵周女復張口應聲目始瞑太平府五代聶氏女當塗人家貧女年十三隨母採薪虎攫母去女持刀追虎殺之母屍得全宋李之儀妻胡氏名淑修字文柔之儀以撰范純仁遺表事蔡京陷之獄淑修之京得范手創稿證之儀得免後編管太平州遂家焉淑修純孝負土塟親淚落枯枝復生詹氏紹興初淮賊至蕪湖欲殺其父兄詹泣拜求以身代賊釋其父兄女随行過市橋躍入水死時年十七鄉人為立祠以祀明太祖有詩褒之明學士陶安妻喻氏當塗人名徳常事姑以孝聞髙帝克金陵時安移家就焉氏因邀母偕徃友諒陷城諸喻多被其害氏母以移居無患潘禮女當塗人名妙靜許字陸永資夫死誓不改字媒氏偶勸之潘以沸湯自抵其首自是無敢言者年七十六終於家俞珖女蕪湖人名寳姐許字陸謙謙死俞守貞四十有二年萬厯間旌呉實妻芮氏蕪湖人實亡氏苦節事姑盡孝姑病刲股以作羮姑死刻木肖像奉侍如生苦節至七十餘萬厯間旌表其墓徐民極妻董氏繁昌人名春英董輝女極遘竒疾氏刲股以療之不起截髮苦守姑病篤復刲臂以進立愈奉姑終老强資之妻劉氏繁昌人姑病篤籲天割心和藥以進姑病遂愈氏夀登百歲孫氏二女繁昌人孫富季女兩姊嫁季嚴拒不字願侍父以終養其伯兄聰女方十齡見而誓之曰姑能孝我獨不能孝乎亦堅不受人聘年各七十餘郡人稱為雙白徐憲女當塗人名采芹母病刲股孝事雙親終其身不適人白氏當塗人父夫俱失其名未嫁夫亡守貞不改年七十有餘忽更衣拜木主前禮終而氣絶異香滿室張椿女當塗人名玉貞幼字谷姓夫亡父母欲更配誓不肯從守貞終老俞氏蕪湖人許字潘子謙謙死守貞終身生員湯一藻女蕪湖人許字呉兆辰辰亡守貞三十餘年而卒國朝楊可侯妻施氏當塗人年十九夫殁撫遺腹子刲股療姑病姑卒哀慟㡬絶復事繼姑孝敬無異教子成立守節厯四十二年康熈年旌表王國勷妻潘氏蕪湖人年二十夫亡撫藐姑割股療姑疾李氏女當塗人許字朱時鳳夫殁誓同穴守貞夫家厯三十年卒陳國治妻晉氏當塗人年二十九夫死守節撫孤割股療翁教子成立以上雍正二年旌表施有應妻周氏當塗人年二十八夫殁事舅姑盡孝姑病氏割股以進撫孤成立雍正三年旌表萬尚相妻齊氏蕪湖人年十九夫亡苦志守節姑病氏割股以進撫孤成名雍正五年旌表曹氏女蕪湖人許字范馴䕫䕫死誓不改字守貞終身雍正十年旌表張氏女蕪湖人許字韋聖聰未嫁夫亡守貞隣家火災氏䕶翁姑不出門天反風火滅雍正十三年旌表庠生陳啟忠妻潘氏當塗人潘譢女受聘後夫患瘋疾舅辭婚氏截髮以誓歸陳侍夫疾夫卒事舅姑以孝父譢死無子氏迎櫬歸葬苦節五十餘年庠生魯天璧妻邵氏當塗人夫亡貧甚勤紡績以奉姑剜肝以療姑病姑殁營塟盡禮汪元選女當塗人許字呉炯然炯死汪守貞不字與寡母胡氏共帷苦節朱氏女當塗人許字戴國榮戴卒氏年十六奔喪撫棺泣血歸依孀母守貞厯三十餘年卒曹氏女當塗人名淑女許字黄元鼎未嫁黄逺遊不歸氏矢志獨居一樓廿餘年卒魏日曉妻唐氏當塗人夫與翁姑病俱刲股療之夫亡苦節五十三年卒沈載道妻殷氏當塗人夫亡苦節教子刲股療姑張治維妻徐氏當塗人初割股療姑夫病復刲股苦節撫孤五十餘年丁士端妻劉氏當塗人年十七夫亡苦節教子翁病刲股療之楊復泰妻張氏當塗人夫亡苦節姑病痿朝夕扶掖無頃刻離庠生曹臺岳妻方氏當塗人姑病篤氏籲天刲股以進姑立愈張旭妻孫氏當塗人姑病刲股療之太學生鍾開祚妻孔氏當塗人姑遘竒疾氏割股和肉糜以進姑姑疾頓起嘗歸寧見江畔暴屍捐貲鬻槥以瘞夫亡守節以終身楊榑妻曹氏當塗人名青楨性孝父死嘔血數升事翁姑盡禮盡