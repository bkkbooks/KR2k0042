body:
  text: 江南通志卷十三輿地志山川三常鎮淮三府常州府横山在府治東北三十五里舊曰芳茂山晉右將軍曹横塟此因易今名而芳茂特為一峰之號風土記又謂之大横峴北五里曰三山三峰相連中一峰尤峻拔又十里曰髙山俗名舜山孟城山在府北八十里或云晉孟嘉嘗隠於此俯瞰大江孟河經其下入江山相近有嘉山山有白龍潭鄉人嵗旱禱雨於此孟河東有黄山亦臨大江黄公山在府治東南八十里相傳為楚黄歇封地又南有章山又東南有龜山又南有梅堂山以上武進縣官長山在府東南其峰雄冠諸峰若官長然故名上有龍泉仙人洞獅子巖夾山在府治東南七十里中包秦陽二小山因名半屬江陰馬跡山在府治東六十里太湖中其西麓地名西青石壁屹立下有四穴圓徑盈尺深六七寸水落則見相傳以為神仙馬跡云夫椒山馬跡之從山也東曰夫南曰椒春秋吳敗越於夫椒即此津里山與馬跡山相連舊名秦履山相傳始皇嘗自夾山登此唐邵偃記云山連馬跡夫椒峰巒圍合波影映帶實為奇觀按江陰縣西南二十里有秦望山俗稱茶岐山葢即此山也以上陽湖縣錫山在無錫縣西五里惠山之支隴也陸羽志云山東峰當周秦間大産鉛錫漢興始殫遂以名縣山下有錫山澗流第二泉之水惠山在無錫縣錫山之西一作慧一名古華山又曰歴山又名西神山山有九隴蜿蜒如龍故又名九龍山南北連亘百餘里磅礴甚逺舊志謂其北十里為龍山者誤也山上為九峰下有九澗有惠山寺第二泉在焉其第七峰為石門水簾洞在焉第二泉之上有若氷洞深不可測或云泉發源於此有方圓二池其中相通而圓池最佳以唐陸羽所定故又曰陸子泉暗渠東出流分為二一下雙河一入梁溪泉上有亭康熙二十三年聖祖仁皇帝南廵駐蹕汲泉先進兩宫然後酌而嘗之二十八年聖駕自浙還復臨泉上御書品泉字命諭徳秦松齡刻於漪瀾堂賜秦氏寄暢園二額一曰山色溪光一曰松風水月山西北為龍尾陵道楚春申君所築上有白龍潭惠山之陽為青山粲山章山墨潭山上有石池其水如墨又南為唐山厯山名為華􅣦口在無錫縣惠山南二十里其西有柯山風土記云吳仲雍六世孫柯相所治與厯山相望俗合名曰舜柯山按漢志無錫有厯山春申君祠正謂今之惠山也後代乃指此為厯山耳獨山在無錫縣西南十八里東為五里湖西為太湖其三面皆山而勢不相屬故名北與管社山相望為浦嶺門南與充山相望為獨山門凡梁溪之水入五里湖而西皆由二門以入太湖又獨山西曰三山亦在湖中横山在無錫縣西南二十里東與龍山勢若相附而中斷為平疇通華􅣦口梁溪入太湖之所經也其下有太小澗名盤龍南有鎮山鎮山東有管社山南入於湖寶界山在無錫縣西南二十五里一名漆塘山東盼五里湖西臨震澤上有通惠泉太白老人躍鯉諸峰宋知州錢紳卜築於此其南為大浮山東南為石塘山下即石塘枕長廣溪路耿山在無錫縣石塘山北於羣山中特髙上有石池不盈不涸前長廣溪後太湖左五里湖良為勝景南為許舍山華藏山在無錫縣西南三十五里其陰又有青山東臨太湖舊有雲海亭即望湖亭也青山西有韓灣孟灣諸山閭江山在無錫縣西南四十里南畿志云下有太湖别浦名閭江因名山麓有天井泉故又名天井山其西為胥山又西有歸山吳王既浮子胥於江國人於此山望其歸也軍將山在無錫縣西南四十里濱於太湖南畿志云南唐時戍兵於此以備吳越故名山下有甲仗塢其支峰為象山相接者有五浪山白茅山羊祈山又軍將東南斷而復起者為長泰山吳塘山在無錫縣西南五十餘里白茅之南西臨太湖下山東南三里許接長廣溪遂入於湖曰吳塘門遂至鵓鴣山大小雷山在無錫縣西南太湖之濱延入里許危崖三面波濤衝激訇若殷雷小雷西有盤塢山其形盤曲窅然而深樵者裹糧而入竹山在無錫縣太湖之濱長林怪石勝冠羣山下有石跨立水次其廣倍虎邱千人石琴山在無錫縣東五里湖東隔湖與寶界山相望皇山在無錫縣東五十里吳地志云泰伯所葬西有吳王墩即梅里一稱鴻山謂東漢梁鴻曾居此東嶺有梁鴻井香山一名顧山在無錫縣與常熟江陰界上有龍潭安陽山在無錫縣西北五十里與府治界風土記云周武王封周章少子贇於安陽即此卒葬其下山勢峻拔有峰名文筆又有龍湫廣袤三丈南徐記云山産石堪作器江東數州皆藉之膠山在金匱縣東四十里與惠山東西相望宛若翠屏九域志云山嶺路南有梁蕭侍郎故宅今為興化寺有泉二一曰竇乳一曰滌硯其西為鳳凰山西南有白檐山芙蓉山在金匱縣東北二十五里芙蓉湖在其下山以湖名也上有二峰一名龍井一名天乙金匱山在金匱縣城中向謂邑之鎮也産石玲瓏採取傷耗今為土阜矣金匱分縣以此名君山在江陰縣北二里君謂春申也亦名瞰江山突起平野横枕江流四望無際延攬可為雄勝宋有松風亭今廢又有浮逺堂取東坡江逺欲浮天之句以名青山在江陰縣西十里秀銳孤立寰宇記云上有九爐為干將冶鑄之所觀山在江陰縣西南二十里相傳呉王之所遊觀也故名西與府之觀山相屬由里山在江陰縣東南十五里或訛為遊鯉山其巔出雲以為雨候上有白龍洞山側有瓠子岡白龍山在江陰縣東南五十里其上有龍洞嵗旱禱之時應綺山在江陰縣東十里宋志云昔吳王泛舟至此見野花如綺因以名山有善利泉清冽甘美敔山在江陰縣東十五里山上有堆阜纍纍相比以形如敔而名俗謂耙齒山定山一名女山在江陰縣東二十五里舊志以敔女為一誤也唐法響禪師駐錫於此有玉乳泉又名虎跑泉稷山在江陰縣東三十里又名薛山相傳唐薛稷别業在焉相近為覆酒山又名為覆舟山沙山在江陰縣東四十五里初本平陸晉宋間江潮湧沙而成楊吳敗吳越兵於沙上即其地白鹿山在江陰縣東五十里宋志云昔吳王出獵得白鹿於此因名黄山在江陰縣東北六里亦取春申君姓為名上有席帽峰輿地志云上有石室為楊呉時烽火之所遺址猶存下有郭景純故宅西北相接者為大石小石二山其下有石離立俯潄江濤奇險清絶蕭山在江陰縣東北十五里一名小山祭江臺在焉其東有彭公山宋志云彭越東征營此故名真山在江陰縣東北十五里祥符圖經作甄山十道志云石筏山梁時建至真觀於上改今名山下有石如牌懸江中故又名石牌山香山在江陰縣東北三十里呉地志云吳王遣美人採香於此上有採香徑其地又為香灣楊呉時張可琮敗吳越兵於香灣即此山西七里曰鳯凰山又西七里曰蟠龍山浮山在江陰縣東北揚子江中西臨石矴東控巫門為江海門户盤龍山一名蛟山在江陰縣東十五里源山須知云唐埀拱中有黄龍盤其上三日荆南山在宜興縣西南荆溪之南縣志云東漢陽羡長袁玘有善政其殁也天降銅棺或云山昔産銅有司采之故名銅官後人乃譌官為棺也山髙而大巖洞絶勝上有龍池嵗旱禱雨輙應其北有善行洞山之東麓為静樂山其南為芙蓉山西為横山一名大蘆山北為南嶽山孫皓既封國山遂禪此山為南嶽其地為古陽羡産茶處附明都穆南嶽銅官二山記己未從潘氏村東南十里行山峽間竹樹陰翳無往來者所值惟樵人一二里至南嶽山按南嶽本衡州之衡山呉孫皓以陽羡山石裂為瑞遣使封之改曰國山遂禪此為南嶽蓋漢武嘗移衡山之祭於􅈞霍皓竊其義耳南嶽寺在山之麓因山以名門有卓錫泉旱嵗不竭又有稠錫樹極髙大枝葉與他木絶異相傳唐天寶中有稠錫禪師自桐廬來築庵演法寺與樹皆其遺跡每季春縣官祀山之神然後以茶入貢蓋其地即古之陽羡茶産此獨佳宋鄒忠公自嶺外歸東遊愛之欲誅茅不果而李丞相綱亦留詩山中寺近頗廢法堂後舊有天然井泉甚甘潔已塞於僧予為之惋惜大抵庸僧必敗毁山泉景物以絶遊者此其恒態不特一井然也寺之左三百步有飛瀑千尺如白龍下垂匯而為池僧言稠錫禪師剖腹洗腸之處今名洗腸池予欲南上登銅官山路陡峻不可以輿循厓而行旁無草木下視甚危時東風横發四山圍之力益勁予與𨽻僕屢仆相顧皆大駭扶擕而前七里達僧庵一僧已出童子煑茶供客其側有善行洞昔善行尊者之所居也洞深數丈坐石小飲午飯於僧庵庵之後巨石如偃其隙流泉涓涓不息晝夜僧引之以竹終嵗仰給殆天授歟山髙百八十五丈周十五里為一縣之鎮予所厯僅及其半聞山巔池有三足鼈六目龜詢之山人云今不復見惟蜤蝪遊其中縣官值旱禱雨輒應興盡不暇登陟銅官之說縣志謂漢令袁玘有善政其歿也天降銅棺遂葬於是今山南巨石髙壘若塚狀咸以為玘墓所在殊不經意昔者兹山産銅有司採銅於山如鐵官鹽官之類後之人訛官為棺云姑識之俟博識者煙山在宜興縣西南三十里諸峰環峙南曰羅漢北曰鷄籠東曰仙人西曰紫雲有魚磯下臨深谷世傳孫堅嘗釣於此唐貢山在宜興縣東南三十五里東臨罨畫溪山產茶唐時入貢故名一名茶山有金沙泉在其下香蘭山在宜興縣東南五十里南曰大蘭北曰小蘭皆產蘭與香山相接後遂合而名之其北麓濱於太湖名曰蘭渚相近者有大潮山一名南山其西有楚山㞯山在宜興縣東北二十五里上有龍池龍祠其東為虞山東北為金鵝山唐改義興為鵝州以此陽山在宜興縣東北三十五里風土記作㟄山上有周子隠試劍石淬劍遺迹具在􅖘山在宜興縣西北七十里西界溧陽漢建武中嘗封蔣澄為􅖘鄉亭侯即此其對峙者為卧牛山荆山安樂山柚山在宜興縣西北八十里昔多橘柚懸瞰洮湖與二坏山對峙二坏皆在洮湖中曰大坏山小坏山四面水環蹵浪如雪湖濱又有漸山峰巒亦奇甑山在荆溪縣西南二十五里有南甑北甑其形如甑雲湧若炊烟然小心山在荆溪縣西南三十五里一名敷金嶺君山之西峰也寰宇記云金硎承小心以山下有泉流砂其色如金故名即金砂泉國山在荆溪縣西南五十里東接芙蓉據吳志當名陽羡山吳天璽元年有石裂成室孫皓遣官封禪改曰國山立石頌徳蓋仿漢武移衡山之祭於􅈞霍也山形如鼓篆文環繞其上今多漫滅不可讀其地又有離墨山以古鍾離墨得道於此而名或以為即國山龍池山在荆溪縣西南七十里山髙五里南曰白雲巖稍西曰伏虎巖上有二池相傳以為龍之所潛山所由名也章山在荆溪縣西南七十里舊稱黄山風土記云即今方巖也與沸泉武花二山連亘入寧國界通典云陽羡有章山又武花西北有礪山形如礪石下亦有金沙泉茗嶺山在荆溪縣西南八十里一名象山一曰閩嶺自新安而來至廣徳入縣界東西支分為衆山之宗西十五里為馬耳山遥看尖聳登其上則寛平又西五里為天頂山以其特髙於諸峰故名伏牛山在荆溪縣西南百里一名金牛嶺與晨山皆界溧陽晨山北為蔣山錦山又北為大小俞山又分界山亦在西南百里入廣徳界頤山在荆溪縣東南三十五里唐陸希聲退隠於此謂此山東走震澤震為雷魚龍之所蓄有頤之象故名著二十七詠記臺池泉石林木之勝有偃月嶺希聲詩有山嶺依稀偃月形之句山東連洞靈諸峰屬於蜀山蜀山在荆溪縣東南三十八里山特峙無附麗原名獨山宋蘇軾愛其風景類蜀為改今名山麓有東坡書院義山在荆溪縣東南六十里東臨太湖西抵垂脚嶺有義鄉城遺址南入長興界孤山在靖江縣東北二十里初峙江中距山百步有石碇明成化八年潮沙壅積山與石碇連為平陸矣旁有仙人臺及洞垂脚嶺在宜興縣南六十里入長興忻溪界十道志云陟者多重􅘆故名楊梅嶺一名山花嶺在荆溪縣君山西昔産蜜楊梅齊梁間入貢任昉謂其病民奏罷之黄埠墩在無錫縣運河中流寺塘涇口康熙二十八年聖祖南廵駐蹕墩上有佛殿賜御書蘭若二字額仙蠡墩在無錫縣梁溪之南舊傳范蠡曾泊於此一名仙女墩善卷洞在宜興縣國山東南一名龍巖舊經以為周幽王時洞忽自裂異形奇狀若飛若墮見者無不凜然外峭中坦其廣可坐千人壁間皆鑱佛像有石筍髙丈餘謂之玉柱洞有三曰乾洞石室也又大小水洞泉深不可測三洞相承如重樓宋熙寧間有僧求洞之深行三十里許見石碓石床甚異未竟而返附明都穆三洞紀遊義興山水甲於東南而善卷乾洞及大小水洞尤號勝絶嵗癸亥夏四月乙卯予始至宜興欲為三洞之遊丙辰遂與客泛舟西南行四十里午食抵玉帶橋舍舟北折渡石橋長松夾道其大有合抱者二里達善權寺寺在國山東南齊建元中建葢祝英臺之故宅也門有榜曰龍巖福地行松間數百步泉上有亭翼然曰湧金小憇久之復行上圓通閣左祀唐李司空蠙宋李忠定綱李學士曽伯及我朝周文襄忱四公皆有惠於寺而司空則義興人也閣之下多唐宋碑刻不暇悉讀後稍右古栢仆地如蒼虬欲走不可控豢自是登釋迦佛殿其規制與今絶異山之僧方䇿近於柱礎下見刻字云創於大中十年七月蓋自唐迄今幾七百年山路邃僻不罹兵燹其巋然獨存宜也相傳昔創殿時雷震其處柱有字者凡三一曰詩米漢一曰謝鈞記一曰詩米漢謝鈞之記字皆倒書大可徑尺非篆非隸深入木理或謂三者皆雷神之名不可曉也正統間周文襄來遊見之戲命削謝鈞記三字隨削而字隨入文襄異之乃止今柱上削處猶窪鄉民恒摹榻以去云佩之可以愈痞入三生堂觀李曽伯書扁右偏石壁刻碧解庵三大字即祝英臺讀書處而李司空亦藏修於是寺之後亂石離立泉交流其間數十步至小水洞上飛巖突出巉峻可二十仞而大石翼其左右其中有竇形類偃月深莫可測水由是出客投以瓦石輒然鳴李司空碑謂微時親見白龍騰出洞中葢龍穴云水出洞潛行石下百步乃見其一南注經寺中鐘樓一東注至於寺門一自湧金南下與東流匯至玉帶橋入於溪鄉之人資以灌田甚利暮宿策房丁巳寺後東北上山里許經九斗壇昔梁武帝嘗於此禱雨五代時為道士所據僧争之至聞於朝遂復為其有西北循石磴而下至乾洞石崖有刻字曰仙李巖下小洞如甕覘之無所見洞左峭壁百丈一古木葉類榆朴根縁壁下垂附石而出復產枝葉人不知其根也洞門巨石中峙其通明處可容千人上流乳凝結詭狀不一其下石紛錯交互青緑眩目顧接不暇左一石類象特巨背復有石類佛趺坐兩目可辨右巨石與左石相向類獅子張頤若肆齧者行百步即深黒童子秉炬前導約數十步有石柱崇幾二尋大六圍光潔如玉唐張承吉詩所謂玉柱閟靈根是也稍前有鹽堆米堆及仙人丹竈鹽堆米堆者皆以石色晶瑩取其形似恐炬滅不可久留出乾洞北下五十步草木䝉翳聞泉聲怒如轟雷衆皆膽掉股慄幾不能措足又西南下八十步至大水洞上即所謂乾洞仰視之如石樓然其前湧泉犇赴石上濺沫如銀注入洞中流出小水洞一石卧當泉衝洞穹然髙敞口石立如臬頗類乾洞上有懸石欲墮觀者竦懼而石之白而方者髙下井井儼如經畫曰仙人田瀦水尺許冬夏不枯客争取以潤目仙人田左下有池圓徑一丈其北壁石如渴獸欲飲於池䇿云自此而入可聞寺中鷄犬聲而石滑湍急足不能進午刻飯方丈明日遂歸予性好遊嘗讀山經地志所載三十六洞天七十二福地雖不能遍厯然往往見不逮閒如三洞者怪奇偉麗乃平生之所未見而不列於洞天福地予因是又有以感士君子之修徳樹功或不幸而滅沒無聞不得顯暴後世如三洞者夫豈少哉雖然蒐奇覽勝以足予之平生則斯遊之幸亦已多矣故叙而記之張公洞在宜興縣東南五十五里相傳以為風雷所開髙六十仞周五里三面皆飛崖絶壁惟穴其北向遊者秉炬而入厯百磴至燒香臺仰視天光自竅中下屬大石縱横離立不可名狀皆作碧緑色有仙人房𤣥武石芝田丹竈錦屏瑶草諸異行三里許南有小洞可徑以出道書在天下福地之數風土記云張道陵嘗修道於此故名其側有㑹僊巖峭石壁立數仞宋紹聖間有見二僊倚石者因名巖下有泉寒冽淵澄極旱不竭明代有人於此闕地得石刻玉泉二字題始知為古泉也附明都穆遊張公洞記戊午從潘氏早食欲為張公之遊舟遂經東溪風逆甚四十里至湖􅆜鎮微雨予興不可遏乘肩輿冐雨東南行羣山在目蒼翠可挹五里避雨天申宫舊名洞靈觀嘗有後唐明宗題標及宋韓熙載撰碑今皆不存而殿宇亦已傾圮所存惟三星石門而已須臾雨霽道士隨予南行至盂山舍輿而登路多草莾約半里抵張公洞詢道士洞之得名云唐仙人張果老得道之所予嘗覽周處風土記為漢張道陵修仙於此而郭景純亦稱陽羡有張公洞則知名洞始於道陵不以果也洞面西北其周五里脣有石相距丈許上一石横亘宛若門闕俯身從石級南下數十步上皆飛巖峭壁嵌空邃深駭人心目莫敢端視予足弱附石小憇盤旋而下又數百步洞益空豁石壁三面儼如堂宇其通明處方可四丈謂之天窻雜樹䝉翳天光下垂傳為赤烏中震霆所霹上石乳萬株異形詭狀不可摹繪時有泉下滴人黙承之出洞衣潔如故稍有言其滴處遂痕歸必浣滌亦甚異也中一臺崇三丈面可坐百人宋縣令趙伯淳築以息遊者坐飲久之俯瞰㝠窅足不能措命童子秉炬前後扶攜而下臺南石刻張公福地四字道書謂天下福地七十有二此其五十八也臺之下怪石紛錯欹而倚者銳而出者郤而後者顛而欲仆者抜而起者横理者端莊而拱者偃者夷者將斷而復續者與石乳皆蒼緑一色𫝊染不逮又有如筍之植如鳯之騫如獸之怒而走飢而噬葢洞之妙至此咸萃而遊者亦多止是洞西壁斜裂下多亂石其東一穴類洞而小人不敢入正南壁下其深黒處云可通後洞出洞半里東折觀後洞門石頗隘予疲極不能入又東南數百步至㑹仙巖孤峰側立數仞横里若鑿道士言昔有人見一叟倚石遯形而入因以名巖其空洞有泉出焉自右而趨潺潺有聲極可聴一斷碑臥草際乃元延祐四年重修㑹仙亭記與客共酌巖下日已迫暮聞多虎不可久留遂返君陽洞在荆溪縣君山之陽因名唐陸希聲自稱為君陽遁叟大江在府北五十里江陰縣北一里而靖江之東南也西自丹陽入界經府治北東抵江陰東北與通泰州相對行郡境百八十餘里漢志所謂毘陵東北入海為北江是也得勝新河在府西十八里舊名烈塘河宋紹熙間浚治置牐明重浚改今名又府西北有白龍河東通澡子港有剩銀河北流入江皆與得勝新河合孟瀆河在府西三十里奔牛鎮唐刺史孟簡因故渠開此瀆因名宋至明屢加疏治久復患淤國朝康熙二十年江撫慕天顔奏請重浚建牐復故道焉鳴鳯河一名直瀆在府西三十里奔牛鎮東北接運河南通白鶴溪運河在府南自望亭入無錫界流經郡治西北抵奔牛鎮達於孟河行百七十餘里吳夫差所鑿隋大業中自京口穿河至餘杭擬通龍舟此其故道也自唐武徳後累濬為江南之水驛云西蠡河在府南一名浦陽溪北枕運河南經陳渡橋入滆湖宋單諤水利書為范蠡所開又府西南有平原談村佘澤孟津諸河俱入滆湖惠明河在府城内西南受荆溪自西水門入經郡治前稍東出靈雉橋與後河合流入運河以上武進縣網頭河在府西青山門外延袤六十五里入無錫江陰界其攴流有四皆入於江一自通江橋東北流為澡子港一自楊頭鄭陸橋東流為利港一自後塘橋東北流為申港一自三山石堰東北流為新溝又府東丁堰河自運河北行來㑹府東北黄汀河東入江陰西與網頭河合順龍河在府南三十里東通採菱港西接西蠡河志謂舊通荆溪自東壩既築而其流遂微乂府南有永安永興二河俱合於此薛堰河在府南七十里自周橋分流經唐橋折而南所稱薛堰通津也稍南為白馬涇河上渡至下浦港入湖又縣東南有太平河華渡河黄堰河俱與此合流水䃮河在府東四十里東南接運河北過無錫入江隂界後河在府城内一名市河宋史云慶厯中郡守李餘慶始穿龍塘河經大市引惠明河東注出裏虹橋與運河合以上陽湖縣雙河在無錫縣北五里一西北通河滸錢橋貫直湖港入武進界一東南與梁溪合流其支流又分為南北二䢴溝而皆合於南陽湖五瀉河在無錫縣北十四里南接運河出上湖大陂北經府治暨江陰界又北至申港入江潮汐所至可勝二百石舟宋元祐間治芙蓉湖為田置牐於此今則架橋其上名曰髙橋潭塘河在無錫縣東三十五里自鴨城河旁注而北貫興塘港與新河接新河南宋時所開北通大江今塞直河在金匱縣又名弦河以其側有弓河箭河而名也昔未有城時糧運由此故亦名運河長河在江陰縣一名東河自新河分流而西截蔡港清溪等口入由里涇西接黄田港入於江長壽河在江陰縣東南四十里南接黄塘河北通長河東新河在江陰縣東南八十里由無錫界經長河而合於谷瀆港入江又有南新河自西陽至習禮橋與東新河合九里河在江陰縣南二里南抵蔡涇牐北接黄田港以江潮東西經此合趨邪涇捲湧沙土壅積兩間隨浚隨淤漕港河在江陰縣西南三十五里自無錫界四河分流西行折而北出山塘河西口趨石堰以達於申港入江乃無錫武進江陰三縣之分界河也崇溝河在江陰縣西十里自三山石堰而東徑秦望山合夏港入江横河在江陰縣城東宋天禧中知軍崔立開以通漕凡六十餘里南轉河即江陰縣城濠自朝宗門循城西流轉而北至澄江門接黄田港入於江商漕諸船出江者皆由此學前河在江陰縣始鑿於宋之元豐二年嵗久湮塞明正德初邑令劉絃浚其遺跡復引江潮入泮通澤河在宜興縣東二十里明嘉靖間邑令馮惟訥以東溪風波險惡浚此西接荆溪東連太湖便民河在宜興縣西南二里西通洴浰渰東入荆溪相傳漢袁玘所鑿以避西溪之險民甚便之因名明成化中邑令袁道重濬名後袁河謂袁玘不得專美於前也東蠡河在荆溪縣東十五里北接餘皮渰東南入於太湖宋咸平中浚滆湖一名西滆又名沙子湖在府西南三十五里半屬宜興東連太湖西通蕪浦港郭璞賦所謂具區洮滆是也宋建湖在府東南三十里舊志云宋髙宗時所治故名又府東南有青城河自採菱港分流入於此以上武進縣太湖在府東南暨宜興無錫二縣俱控太湖其東為長興南為蘇州陽湖以近陽山得名在府東五十里界無錫縣湖之東北為北陽湖西南為南陽湖今多淤為田芙蓉湖在府東五十五里界於蘇常之間一名上湖一名射貴湖一名無錫湖越絶書稱其大萬五千三百頃自宋以後居民屢増堤堰塞而為田寰宇記云其流東南為五瀉水以上陽湖縣濠湖一名鵝湖俗名鵝肫蕩在無錫縣南六十里與常熟分界漕湖一名蠡湖在無錫縣東南五十里與長洲分界唐地理志云元和八年孟簡開泰伯瀆并導蠡湖故亦名孟湖五部湖在無錫縣東北十里東西二十里南北十里其源濁而流清溉田百餘頃今湮洮湖在宜興縣西北九十里一名長塘湖周迴百有餘里上受溧陽金壇之水下通太湖松江入於海風土記云陽羡西北有洮湖宋庾業為義興太守西討孔顗至長塘湖即此白鶴溪在府西南二十里北通運河南入滆湖西接丹陽界梁溪一名梁清溪在無錫縣西門外源出惠山南入太湖北合於運河梁大同中浚故名長廣溪在無錫縣南十八里北自石塘通五里湖東合蠡口河南經下澤橋出吳塘門而入太湖吳地記云陳勲所導東溪一名東九在荆溪縣東西南諸山水東入太湖者並匯於此東瀉溪在荆溪縣東南三十六里陸希聲頤山録謂山前百餘步衆流合而東故名舊稱兩岸多藤花春時照映水中青緑可愛故亦名罨畫溪一名五雲溪荆溪在荆溪縣南以近荆南山得名上通蕪湖下注震澤漢書謂中江出蕪湖西南東至陽羡入海即此溪也周處斬蛟在此自明中葉以後水口阻隘其流日以淤澁昔唐杜牧嘗作水榭於是溪之上宋蘇軾又欲買田種橘其間葢山水致為佳勝附明李東陽荆溪賦有谿來自西南兮勢奔騰而蜿蜒界甸服以為中江兮稱義興之名川上源出於蕪湖兮下通流於震澤乃雲雨之是興兮亦蛟龍之攸宅厯松江以入海兮渺不知其所極棹蘭舟而遐騖兮與羣山而逶迤畫屏爛其前陳兮錦帳紛其後隨樓閣倒景其空青兮沙石分明而陸離彼魚與鳥其何心兮亦水泳而雲飛惟夫君子好修兮稟坤輿之清淑鍾世澤於名門兮䕃嘉林於喬木泓一鑑以為池兮結重茅以為屋朝攬秀於山顛兮暮搴芳乎水曲抱經濟以用世兮出觀光於上都躡瀛海之髙踪兮覽長江之壯圖歎墨突之不得黔兮念陶園之將蕪列魁象於三台兮寄髙情於五湖余養癖於林泉兮每探奇而索奥考兹地於山經兮恨不髙飛而逺到重文靖之盟言兮亦惟斯人之為好慕楚頌之遺風兮矧蜀山之惟肖孰使谿之名荆兮復洞庭之是號豈不懷乎三湘兮莾風濤之浩浩更楚人聚而咻之兮功垂成而不告嵗忽忽其屢兮竟罔罔而莫宣時寐往而寤歸兮宛兹谿之在前吾將探石髓於神仙兮尋勝景於桃源佇飛舄於左喬兮遡歸槎於張騫雲幢霧節不可以久駐兮恍若送乎登仙荆溪主人聞而歌曰余之谿兮故鄉余之莊兮此堂抱余甕兮水傍洴兮練兮中央進則用兮退有藏修吾道兮相與翺翔招美人兮不來渺余懷兮天一方余亦從而和曰荆之溪兮孰使為清荆之山兮孰使為靈人與地而俱佳兮文與獻而俱徵彼信美而非吾土兮悵無樓之可登感妙思於吳歌兮歎騷辭於楚聲西溪一名西九在荆溪縣西上受潤州廣德匯縣西境諸山澗之水繞郭流經東溪以入太湖採菱港在府東南十二里東入於陽湖運河自此分流而南合龍游徐湖中村諸水世傳隋時所鑿戚墅港在府東三十里南接運河東南入於太湖又自水月河通北陽湖三山港在府東三十里東北界江陰南接運河西北入於申港以上陽湖縣花渡港在無錫縣西北三十五里東接運河西貫直湖港入於陽湖雙牌港在無錫縣西北四十五里與武進分界北接運河南入陽湖大渲港小渲港在無錫縣西南十六里皆分自梁溪西為大渲東為小渲又南行二十里至青祁渰始合居人於此植芰荷為游觀云石頭港在江陰縣東三十里自三河口導長河而南經横河入於江又有雷溝港在縣東三十五里又東二里曰陳港又東十一里曰蔡港俱南達横河入於江宋濱江置戍處明洪武中重浚谷瀆港在江陰縣東六十四里源有二一自無錫界北經新河一自長河而東㑹於三河口北入於江又支流自東南循顧山入常熟界令節港在江陰縣東六十五里自谷瀆港東北入江夏港在江陰縣西十里南引五瀉堰過青陽厯鎮出蔡涇牐北入於江迤􅆔七十五里界縣境而中分為江陰百瀆之宗申港在江陰縣西三十里一名申浦舊志云春申君所開以導江南流其水東入無錫五瀉河西入武進戚墅堰合於三山石堰又北流入於江利港在江陰縣西五十里自武進界鬼涇口東北行二十五里入於江明𢎞治癸丑浚申利桃花三港以行溢水嘉靖間復與桃花港同浚桃花港在江陰縣西六十里合立埭河西北行五里入於江黄田港在江陰縣北三里傳為黄歇所開引江水以溉田因名舊志以此為運河直扺無錫漕渠瀾港在靖江縣西接城河南通大江新港在靖江縣東五里曰東新港西二十八里曰西新港西十五里曰南新港西北五里曰北新港又小新港在西北大新港在西南玉女潭在荆溪縣張公洞西南三里深廣逾百尺舊傳玉女修煉於此唐權徳輿稱陽羡佳山水以此為首金牛潭在荆溪縣張公洞後其水渟泓不竭舊傳有金牛入於此又名伏牛潭南唐韓熙載洞靈觀碑所謂臥金牛於潭底是也白茫潭在荆溪縣西四十五里廣數百畝受金壇溧陽諸水龍泉灣在府南七十里四時瀑水飛流雖旱不竭蠡瀆在無錫縣東南其水通太湖由梁墓涇達於運河寰宇記云范蠡伐吳所開其支分而為蠡口河泰伯瀆在無錫縣東五里西連運河東達蠡湖唐刺史孟簡嘗浚之袤九十里廣十有二丈溉田千頃其支流為香涇梅花浜延祥等河百瀆在宜興縣西南七十五里為上瀆北六十里為下瀆舊以荆溪居數郡下流遂於太湖濱疏百派以分其勢又開横塘袤四十里以貫之瀕湖畎澮皆通焉單諤水利書云自蕪湖溧陽五堰達吳江猶人之一身五堰為首荆溪為咽喉百瀆為心震澤為腹蓋謂脉絡相貫也今多湮廢宋治平中樓閌知宜興所浚者四十二瀆明𢎞治中亦浚三十餘瀆而已解祟泉在江陰縣東十八里迴入山谷湛潔靚深金沙泉在宜興縣凡有三處色皆如金一在小心山一在唐貢山一在礪山餘皮渰在宜興縣東十八里廣十餘里受荆溪湛瀆之水東入於湖洴浰渰在宜興縣西二十七里受溧陽諸流注於荆溪入湖湖洑渚在荆溪縣東南五十里其流北折而東入於太湖張渚在荆溪縣西南七十里發源章山合流於潼渚匯於荆溪孟涇在宜興縣西北四十里唐刺史孟簡所浚以避滆湖風浪之險因名鎮江府北固山在府北下臨長江迴嶺斗絶其勢險固故名又名北顧山因梁武帝改京口城樓曰北顧樓得稱元和志云北望海口實為壯觀宜為顧也晉謝安蔡謨鎮此并於山上作府庫儲軍實山有寺曰甘露西有秋月潭走馬澗相傳漢昭烈曽走馬於此西南有鳯凰池天津泉狠石山後有鐵柱峰一名石帆觀音洞在其下又旁有甘露跨鼇二門又府治有陽彭山附明湯寅北固山賦汩長江而東騖截堆埼以孤稜負崇構而傑起峙崱屴而嶔緬張氏之行役云托植於金陵乃其指天日循迴龍紆京峴而右􅗇稱别領於鮫宫跨黄鶴而南沿凌寶葢而西雄没天津之伏流圻海涵之沖瀜迅風切而落響旭日起而升紅邈飄颻於紫烟蹴磊砢之南松挺萌臺之妮妮沾流泉而灑沫漾颯㳫之疎鐘恍四山之鏜鞈顧青螭而依依遂憑堦而造闥曬葐蒀而何象儼白榆之可剟爾乃杖金䇿側角巾侵蕭瑟之寒曦納亭皋之芳春採江蘋而斜渡蹙潛波而渙鱗經畛畷而躑躅俄陟阻而無硍始凸悚而坳驚漸地蜷而縷曲拂乎天之胎禽攀九垓之仙躅逺嶧微而迎茜石路欹而銜緑樓臺羃而髙騫諸峰逈而起㐲其前則千雄萬堞綺列鱗次伍兩雲屯翟葆風厲千畝之㕓五都之市白地紌繏珠緋縪璲隠隠輷輷澀譶糾刺大胥之所不能名隸首之所不能記芝楣繡桷麗厥芸堂䡾䡾乎其千霄視而迷方鳴鐘食鼎淇園玉圃雜卉葳㽔以疏途叢英阿那而分户彫爼鼏勺留賓歌舞嘗瓊禾而詎甘進臛蠵而停箸七盤紛而近郁管紘嘐而遐赴延郛蔽郭朱蕞碧抽荆杞凭原而隆翠溝塍界路而承流横唐頽之青蔥俯丹華之彫鎪其後則多景之樓清暉之閣枝岝峉而交撑結䂺􅛭而如托濔漫轇轕䂄焉神愕曲䃞盤根於虚空神鷹奮飛而下掠㝪望江之危亭並蛾眉而依約吳楂楚舶於山之阿前迎後距擊汰揚波集布䭵而櫹操飍矞於盤渦元㝠蕩日飂風多亮朱明之不燠宜披裘而婆娑朝暾夕橮旁睨邪眺絢雲霞而作壁插層濤之浩浩㴸烟生而迆颺混太虚而皛溔西則浩旰歙赩浮玉相望竦重欒於波底壓􅢨􅡰而為堂東則焦巖蓊葺彷彿乎懐襄嵌霧樹於飛澇􅐯碭於中央惚兮惘兮䘏乎湯湯曲江之鉅麗控海門之微茫其左則殷殷繹繹坡陁直下隠弅之丘曠䍚之野崇岡列而嵧嶷平林㬣而瀟灑道安遁跡宋玉誅茅制龍經而泉沸企曳尾而心遥承密葉以為幄𣙜蒼松而崺為橋沓乎翳薈畫為阡陌忽嶻嶪而髙縁㨛峛而低迫間墝䂽之田疇峾淪之大澤藏籦籠而有人帶修巒之重碧嘉樹列蔦蘿延倚雲傍潺湲鍜浮圖之峥嶸見圌汝於東軒信恢炱以儻閬朔句曲以相纒其右則岷嶺分派波濤南析川迤澮隠霜葦風荻噲乎其隅湜乎其室捷獵镺蔓亭榭磧濟濟鏘鏘飈馳轂擊斥闤闠之紛紜肆㺒而相敵歸蒜山之晴雲停酒罌之勁翮走馬之澗硍乎中開隔四空而閟跡巨靈啄其崔嵬狀庨豁以崆㟅驚䂄睒而徘徊扳葛而驚條掛雨捫壁而温霧縈苔仰碅碖之若墜頫窋䆛以頻猜慄􅓥􅓥而屏息蹠砊硠而成雷怪石帷舒乍前乍却㟒嶙嶙峋躋空欲落磓碐碐以敷青疊䂩䂩而獻蕚披半角而垂鋩倬芙蓉之初削羅衆卉而脅生被蒨峭而猗靡參髙緑而先霜糝卑紅而晩滋其上則列刹言言鬱紆曲布事存天監名仍甘露鏤楶有唼之鱗碧題有不彫之樹栱橑習其斜錯枅栖詭其扠㧎廲廔宿月金輪棲霞叢篠翍其閌櫨櫪杌其隈軼厚伽而遜製豈般爾之能裁堂則雷音䕶勅實實翼翼𢎞綵緻而翬飛揭離樓而並飭亭則鎮海臨江居山之陽懸旅楹於崛岉敞磊硌而磅硠其他曲檻燠房填摛丹飾詭形而殊狀者不可殫述出柳溪之㳺鰻懐北軒之暮笛法序岪而増髙月潭浟而清洌鎤嵩丘之鏗入江聲而争急栟櫚溽暑而扇隂檉椐豔陽而呈繪丹楓悽其憯惻樅栝簌其晻藹花餘四時月饒畸睞鳱鴠則戒夜而鳴鷓鴣則葉庇其背他若六霙縈盈而溢素螮蝀霍濩而吹帶赤松匿景而垂絲纎阿馳輪而眩采其下則培塿東走落景西明巋層櫨於石壁勢縱􅑨而究升面翠蘚以啟牖接倒樹以安亭幽篁觸砌而戞玉菡萏灑露而鋪星虚洞積香而中窈鳯池含藻而波澄雨華垂青海嶽浄名纍以宻檜闈以山櫻文以翡翠聲以和鶯援鵁鶄之孤嶼啄玉於遥汀任公詹父草樹為廬乘舟容裔風水當居騰淼漫以天浮㳫浰淢而卑趨設罶罩施􅊻罛鈎必逮雙網必盈䒀潛鱗為之駭徙天吳為之欷歔估客之船落帆之浦疊漿聨篙明滅洲渚沙鴇漂其奄忽楚岫濛而霞吐蟹堁之田多黍多稌既腴壤之浫洝況編町於兹滸眠碌碡於雲根理耰鋤於繁楚秩秩斯干講武之堂製𢎞敞以䆗窱映蘭薄而襟江吉日維戊干戈戚揚於是鐵杖之倫超距之士竝集洶湧魚服象弭驚帆逸足照夜騄耳金􅛸飾而濩畧桃花縟而千里乃踰唐陂導坑衡彎青檀而弸彋奮軯礚之驚霆百金命中貫月穿星弩具臂銲并搴旗格猛其徒如林足以讋海若悸百靈耀五兵於設險榮李花而迄今若夫衛公之栢車蓋無存明皇之像遺真已諼物既往而代非愴靡徵而不尊僧繇探微是留殊繪吳生擅場妙麗神㑹踐狠石之如羊懮阡眠於蕭艾悵典午之更非感孫劉而一慨九陽届節有鳴倉庚於以修禊於江斯清於京斯依彯然華纓載忻載燕鼔瑟吹笙亦有㛹如姣好先施陽文細腰善步其從如雲曳䋪縞之纎袿髾綺紈而夕熏婉徐步兮裶裶樂莫樂兮青春然則兹山者綜其所宜而程其所用首籍籍於過江永神皋之均重徒觀其山形而勢嵬櫐􅖺嵲修竹良材參差櫹矗足使寗封頤神而不返支遁布金而存朴總二善以同規陋褦襶之往復至於地非金闕夙標名勝謝元釣鱸以㝠志令則凌雲而寄興米顛托病以栖閒客兒紛游而竊詠美令軌於曩賢實青丘而並競若夫聞風層城峨眉積雪香罏恒霍之奇女几天台之别雖名羡於山經終險􅬐而遼僻未有聳城闕而邇峙攬曲涯而吐納果擇勝而逍遥庶兹土之尤絶國朝湯斌陽彭山春望詞䟦京口形勝甲東南金焦北固其名特著故畫舫籃輿日萃其下而未有知所謂陽彭山者是山也雖無奇峰危巘深澗絶壑之觀然登其上而三山雲樹環翠如屏長江洶湧風帆隠見與潤州城堞樓櫓烟火十萬餘家無不近在几席俯仰指顧亦登臨之勝槩也特其名不見於山經輿誌故騷人之游屐不至即或至焉而文字不足以發之世亦莫得而傳焉則山川之幸不幸豈不以人哉戊申三月董子文友來自毘陵與何子雍南程子千一偶登此山乘春騁望各賦詩十章曰陽彭山春望詞三子皆以詩文擅名當世其詞雖記一時聞見所及而江山形勝如指諸掌余聞京口盛時名家巨族競選山水靚冶之區治園亭臺榭極嵗時游覽之娛自海艘告警山川如故風景頓殊三子懐古睠今感慨係之宜其詞之婉麗而凄愴也夫天下幽巖邃壑徒為樵夫漁子所棲游者多矣此山南望則米元章之遺墓在焉其西則昭明太子讀書處也風流文章想見其人何後來游者篇什零落乎此詞流傳於世吾見尋奇探幽者詫為奇聞異蹟必將載酒登髙窮極眺望墨版淋漓侈為游覽盛事四方聞而不得至者與金焦北固同入夢想也故余謂仙宫佛窟士女繽紛不可言游游陽彭山者自三子始書此所以慶此山之遇也石公山在府北九里瀕江與焦山對峙下有石檻山形如雙象一曰象山有象山洞蒜山在府西五里元和志云臨江壁絶山多澤蒜因名或曰算山謂周瑜與諸葛亮議拒曹操之所東晉末孫恩浮海至丹徒劉裕大破其衆於此山本寛廣宋元間淪入於江今西津渡口水中孤峰獨峙者也附明林魁蒜山考蒜山在丹徒縣西三里比臨江上無峰嶺山生澤蒜因以為名按晉孫恩浮海奄至丹徒率衆登蒜山劉裕奔擊大破之投崖赴水死者甚衆唐劉展叛田神功將三千軍於𤓰洲將濟江復將步騎萬餘陳於蒜山又徐知誥常游蒜山除地為廣場編虎皮為大幄率僚屬㑹於下舊志又謂蒜山松林中可卜居蘇子瞻詩蒜山幸有閒田地著此無家一房客觀此則舊寛廣可容萬人宋時猶可居止不知何年淪入於江也銀山在府西江口舊名土山唐劉禹錫詩土山京口峻是也元時以與金山對峙易今名今亦名雲臺山山側為鎮屏山下有潮音洞其别阜曰玉山金山在府西七里大江中初名浮玉山風濤環遶勢若飛動岩洞泉石皆名勝也九域志云唐裴頭陀於此開山得金因賜今名然梁天監四年僧祐髙寶誌於金山修水陸㑹則金山之名當在唐前又名伏牛山宋真宗夢游其山又改名龍游山旋復故名其頂有金鰲妙髙等峰浮圖冠其上有泉名中泠陸羽以為天下第一山之東有日照巖一曰朝陽洞東麓有善才石一曰鶻峰西有石排山隠出水面若􅑉筏然相傳郭璞墓在焉自康熙二十三年聖祖仁皇帝南廵建有行宫屢經駐蹕先後賜御書匾額天王殿曰勅建江天寺大雄寶殿曰動静萬古行宫曰江山壯觀曰吐納萬象留雲亭曰江天一覽暢遂樓曰澄懐日新佛印山居曰水天清映龍洞曰松風石御書樓曰浮翠樓大悲殿曰禪棲朝陽洞曰雲峰禪堂曰祗樹御製恭侍皇太后駕臨金山記恭紀首卷五州山在府西三十里晉永嘉後幽冀青并兖五州之人流寓京口故顔延之車駕幸京口詩云望幸傾五州疑山名縁起於此梁武帝曾幸焉輦道尚存山有泉其流所匯曰夕溪又府西四十里有香山鐵爐山五十里有曹山明成祖嘗駐蹕其下黄鶴山在府西南三里一名黄鵠山宋武帝微時游息於此有黄鶴飛舞其上因名宋戴顒隠黄鶴山文帝每欲見之曰吾東廵當宴戴公山下故又名戴公山磨笄山在黄鶴山東南宋戴顒女於此磨笄誓不適人因名菊花山在磨笄山南其對峙者為天福山長山在府西南二十五里上有靈泉其流與練湖通溉田甚多南有塔山髙驪山在府西南五十里亦名句驪山相近為覆船山舊志以為即酒嬰山之異名招隠山在府南七里本名獸窟山宋處士戴顒隠焉故名寰宇記云梁昭明太子讀書於此石案猶存下有真珠泉虎跑泉鹿跑泉又有昭明所開古井及玉蘂亭唐李徳裕玉蘂花詩刻石今存西有峴山與招隠聨勢俗稱大峴小峴又相近凰凰山迴龍山夾山福田山白山在府東南十五里舊志云宋刁約葬此有白躍出因名相近為唐山馬蹟山在府東南三十五里道書第四十九福地也山有青童君馬蹟故名又有葛稚川煉丹井有黄龍青龍二洞花山在府東三里一名東山皇甫冉詩云北固多陳迹東山復勝遊即此又府東三十里有雩山大瀆山六十三里有華山舊志云即樂府所謂華山畿者京峴山在府東五里京口京鎮皆因以名一名丹徒峴或稱荆峴國朝順治十六年大敗海寇於此北有汝山相近者釡鼎山鼎石山焦山在府東北九里大江中舊傳以東漢焦光隠此得名寰宇記通典亦謂之譙山亦曰浮玉山與金山對峙相去十五里上有焦仙嶺三詔洞以焦光三詔不起也又有獅子海雲觀音羅漢棧道等巖青玉塢碧桃灣山之餘支東出並立於波間者曰海門山康熙中聖祖南廵臨幸山中賜御書匾額山門曰定慧禪寺大雄寶殿曰香林曰法雲慧日御製焦山詩三首恭紀首卷圌山在府東北六十里濱大江江流自東而西而北轉屈之間層峰峭壁俯瞰湍波京口之咽喉也山有上下二箭洞下有東霞寺宋史張世傑與元兵戰於江中不利退奔圌山即此日精山在府學内上有日觀遺址月華山在府治西南一名萬嵗山晉刺史王恭建萬嵗樓於上至唐猶存宋初稱為月臺今遺址在焉下有秦潭宋為放生池壽邱山在府治西南宋武帝故宅所在即位後築丹徒宫南麓有龍華寺即其地今建丹徒縣學國朝改名聖像山觀音山在丹陽縣東北三里一名惠山中有玉乳泉為中泠之亞其後為甘草山經山在丹陽縣東北三十里昔有異僧講經於此故名一名金牛山輿地志謂漢時金牛出山之東馳至曲阿上有金牛洞洞口僅容一人其中甚廣下有泉甚清冽繡毬山在丹陽縣東北三十六里三山相連如繡毬上有白鶴泉陳山在丹陽縣東北四十里下有玉龍泉又水漸山黄連山皆在縣東北沈