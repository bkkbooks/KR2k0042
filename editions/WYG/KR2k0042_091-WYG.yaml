body:
  text: 江南通志卷九十二武備志有文事必有武備自兵與民既分而軍旅之事益重大江南北上下在昔多雄藩重鎮歴代設險之法葢其詳也我國家於水陸要害營哨塘汛棊布星列尤控制得宜烽堠無警而士馬飽騰葢蒐閲訓練者精矣奮武衛除戎器何待聽鼓鼙而思将帥哉自歴代兵制迄於今既核繫之江海之防尤詳焉逮於舟騎若郵政之於陸船政之於水亦附及之為類四為卷七作武備志第五兵制一周揚州屬吳楚二國春秋時互相攻於卑梁鍾離潛巢之間史記吳楚世家吳舟師有艅艎左傳魯昭公十七年楚敗吳師獲其乘舟艅艎吳復敗楚師取艅艎以歸有戈船漢書注臣瓚曰伍子胥書有戈船以載干戈因謂之戈船有下瀬伍子胥書有下瀬船秦置郡尉掌佐守典武職甲卒漢書百官表漢踵秦而置材官於郡國漢書刑法志更郡尉名都尉漢書百官表九江都尉治歴陽今和州沛郡都尉治蘄今宿州南界臨淮都尉治盱眙丹陽都尉治歙汝南都尉治汝隂今潁州又水泉用樓船廬江㑹稽等郡有樓船又有戈船有下瀬船南越列傳元鼎五年詔江淮以南樓船十萬師徃討南粤衛尉路博徳為伏波将軍主爵都尉楊僕為樓船将軍故歸義粤侯二人為戈船下瀬将軍後漢建武六年罷都尉并職太守後漢書百官表每有劇賊郡尉臨時補置應劭注七年又罷車騎材官樓船光武帝紀後以刺史領兵馬稱為州将揚州刺史治九江郡歴陽後漢書郡國志三國魏置都督諸州軍事以都督揚州諸軍事治夀春都督青徐諸軍事治下邳魏刺史亦典兵杜恕傳恕議古之刺史奉宣六條以清靜為名今可勿令領兵以専民事後又上疏曰臣前以州郡典兵則不勤民事宜别置将守以盡治理之務不報揚州刺史治合肥劉馥傳馥為揚州刺史單馬造合肥空城建立州治後治夀春南齊志夀春淮南一郡之㑹地方千餘里有陂田之饒北距淮水漢魏揚州刺史所治徐州刺史治彭城而居巢新城亦命将戍守以備吳滿寵傳寵疏言合肥城南臨江湖北逺夀春賊來攻圍得據水為勢而官兵徃救甚難今城西北三十里有奇險可依宜更立城以固守此為引賊平地而犄其歸路於計為便詔報聽今合肥縣西北三十里雞鳴山北故址猶存吳都秣陵城石頭通鑑注城石頭吳人保江之根本置宫下鎮都下督營下督統都下兵吳志孫韶傳韶子楷天璽元年為宫下鎮驃騎将軍滕允傳太元元年以允為都下督朱然傳然子蹟以膽力遷營下督而凡典兵之職有督有監自歴陽魏志孫權遣将屯歴陽外以備夀春内以衞江南至濡須塢吕䝉傳勸權夾水口立塢所以備豫甚精謂之江西營通鑑注大江東北流故自歴陽至濡須口皆謂之江西而建業謂之江東置濡須督張昭傳昭子承為濡須都督江北廣陵之地置監軍使者孫亮傳五鳳二年使衛尉馮朝城廣陵拜為監軍使者督徐州諸軍事又淹北道孫權傳赤烏十三年遣兵十萬作堂邑涂塘以淹北道以絶魏兵之窺建業遏巢湖孫權傳黄龍二年築東興堤遏湖水城東興諸葛恪傳建興元年㑹衆於東興更作大堤左右結山俠築兩城使全端留畧守之後魏分兵攻兩城城不可卒㧞以備魏江東濵江兵馬重地則置京下督孫韶傳韶子楷為京下督蕪湖督妃嬪傳徐祚以戰功至蕪湖督牛渚督孫桓傳桓督牛渚作横江塢虎林督陸允傳永安元年徵為西陵督後轉虎林又置吳郡都督鎮東方吳書權拜吳奮吳郡都督以鎮東方新都都尉鎮山越孫權傳建安十三年遣賀齊平歙立新都郡吳多舟師而兵有解煩敢死兩部又有車下虎士甘寜傳丹陽青巾孫皓傳及健兒凌統甘寜傳武射駱統傳之名然大率强者為兵弱者補户陸遜傳陳表賜復新安二百家允表陳讓還官充精鋭料正户羸民補其處陳武傳晉武帝封同姓大國三軍兵五千人次國二軍兵三千人小國一軍兵千五百人其都督徐揚二州亦如魏文獻通考懐帝永嘉初又分揚州置二督都督揚州江南諸軍事鎮建業都督揚州江北諸軍事鎮夀春時以瑯琊王睿督揚州之江南周馥督揚州之江北先是諸州刺史亦領兵太康元年吳平乃詔州郡悉去兵大郡置武吏百人小郡五十人後以盗賊羣起州郡不能制乃以都督併任刺史文獻通考晉之平吳也舟師最盛作大船大筏王濬傳濬作大船連舫百二十歩受二千餘人以木為城起樓櫓開四出門其上皆得馳馬徃來又畵鷁首怪獸於船首以懼江神舟楫之盛自古未有吳人於江磧要害處以鐡鎖横截又暗置鐡錐長丈餘濬乃作大筏數十令善水者以筏先行錐著筏而去又作大炬長十丈大數十圍灌以麻油燃鎖融液斷絶於是船無所碍徑造三山東晉南渡調兵不出三吳大發毋過三萬有大将軍都督四鎮四征四平之號其諸州刺史任重者為都督輕者為督或帶四中郎将凡所治之地皆置州兵文獻通考揚州刺史治西州城後治東府城通鑑注揚州治在建康臺城西故謂之西州東府在建康臺城東又嘗出鎮姑孰孝武初桓冲及廣陵之步邱孝武時謝安加大都督鎮步邱徐州刺史初鎮廣陵以兗州領徐州後徙鎮京口者四成帝時郄鍳蔡謨何充以至康帝時桓温穆帝時禇裒荀羡又太和中郄愔又寜康中桓冲至太元初王藴又安帝時劉裕至㳟帝時劉道憐廣陵二寜康初刁彛王坦之又太元中謝元淮隂穆帝時荀羡下邳穆帝時荀羡郄曇以至哀帝時庾希各一又分北徐州刺史鎮彭城彭城三面阻水獨南通軍馬東晉以為北境藩捍兗州刺史初治京口元帝僑置後徙鎮合肥太寜元年郄鑑彭城泗口太寜二年劉遐金城康帝時褚裒通鑑注在江乘之蒲州琅琊僑郡下邳穆帝時郄曇荀羡哀帝時庾希山陽哀帝時庾希盱眙穆帝時禇裒海西時郄愔淮隂孝武時朱序各一廣陵三太寜三年郄鑑又孝武時王坦之謝元刁彛又晉末鎮此京口二成帝時郄鑑又穆帝時禇裒海西時郄愔青州刺史初末俱鎮廣陵元帝僑置以廣陵控接三齊故青兗同鎮其中徙鎮淮隂二元帝時劉隗孝武時朱序京口二孝武時司馬恬王㳟安帝時諸葛長民劉道憐豫州刺史成帝僑置初鎮譙元帝時祖逖祖約後徙鎮譙二穆帝時謝奕哀帝時袁真夀春四元帝時祖約穆帝時謝尚哀帝時袁真安帝時劉義慶馬頭二穆帝時謝尚孝武時朱序歴陽三穆帝時謝尚簡文時桓熙孝武時桓石䖍庾凖庾楷蕪湖二成帝時庾亮庾懌穆帝時謝尚姑孰二孝武時桓冲安帝時桓元劉毅牛渚一穆帝時趙允冀州刺史或治淮南或治江北并州刺史或居江南或居江北後徙鎮譙哀帝時姚襄又徙鎮山陽安帝時劉道憐幽州刺史治三阿苻堅攻幽州刺史於三阿司州刺史元帝僑置治合肥以上分見列傳大抵晉之拒劉曜石勒以合肥淮隂夀陽泗口角城為重鎮其後攻苻堅則以長淮為衝要扼慕容徳姚興以彭城為北境藩扞鄭通志東晉之舟師太尉劉裕破盧循於江文獻通考安帝義熙六年循因裕北伐襲建康方艦而下裕還出輕利闘艦躬提幡鼔衆軍爭先軍中多萬鈞神弩裕自中流蹙之因風水之勢賊艦悉泊西岸岸上軍先備火萬具悉焚之賊衆大敗宋刺史仍加都督領兵揚州刺史寄治京師南徐治京口以近都特重其任徐治彭城王元謨表曰彭城南届大淮左右清汴表裏京甸捍接邉境城隍峻整襟衛周固又自淮以西襄陽以北經塗三千達於濟岱六州之人三十萬户常得安全實由此鎮鍾離東海朐山南兗治廣陵盱眙兗寄治彭城淮隂南豫治歴陽姑孰宣城豫治睢陽歴陽青冀二州治鬱州今贛榆明帝失淮北僑立青冀二州共一刺史初以彭城歴城東陽為藩扞元嘉中伐魏發縁淮三郡兵集盱眙縁江五郡集廣陵而江南白丁輕進易退以致敗故魏主經彭城臨江屯瓜歩攻盱眙及東陽歴城䧟彭城降而長淮盡為北境矣通志齊自泰始以來将帥各募部曲屯建康後從李安請非淮北常備外餘軍悉皆輸遣若親近宜以隨身者限人數文獻通考諸州刺史亦加都督惟以徐為北徐兗為北兗以冀治漣口餘治所皆因宋南齊書州郡志自宋失彭城諸郡齊淮北之地少但以夀春淮陽角城漣口朐山為重鎮永元初豫州刺史又以夀春入於魏通志梁諸州兵制亦如齊後務拓境宇頻事經畧欲重其将帥凡鎮戍多置為州通志揚鎮建康而徐則分南北西東鎮京口鍾離渦陽宿豫兗分南北鎮廣陵淮隂豫分西南南鎮歴陽合肥夀陽姑孰西鎮晉熙青分南北鎮鬱州贛榆又共鎮招逺今海州而又廣設淮譙武安睢潼潁仁義霍合秦涇十三州分鎮淮隂譙城歸政今邳州定逺竹邑今宿州取慮今虹縣汝隂赤坎虹縣西南安豐岳安今六安州合肥尉氏今六合沛而譙又鎮新昌分南譙鎮南譙城分見本紀列傳葢屢與魏軍交戰於淮之南北尅宿遷合肥翟邱朐山彭城夀春等郡南朝之境幾復然旋得旋失及景平後江以北悉入於齊其初大抵以硤石汝隂郡下蔡合州鍾離淮隂朐山為重鎮通志梁韋叡以舟師破魏於淮韋叡傳魏人於邵陽洲兩岸為兩橋立柵數百歩跨淮通道叡装大艦使太守馮道根等為水軍㑹淮水暴漲叡即遣之闘艦競發臨魏壘以小船載草灌以膏焚其橋風怒火盛水又漂疾倐忽之間橋栅盡壊道根等身自搏戰軍人奮呼無不一當百魏人大潰王僧辨破侯景於江王僧辨傳景命侯子鑒為水戰之備僧辨至姑孰子鑒帥歩騎萬餘人於岸挑戰又以鵃千艘載戰士僧辨令細船退縮留大艦夾泊兩岸子鑒之衆謂将退爭趨之大艦斷其歸路陳初已失淮但以江為境大建中伐齊屢㨗淮南之地盡復後敗於周而江北之地又盡沒通志其刺史都督所鎮惟不置東西徐淮武睢潁秦涇實增司晉江吳四州鎮黄城晉熙南陵吳郡以豫鎮夀陽北譙鎮盱眙安鎮宿預義鎮尉氏餘悉如梁見本紀併通鑑胡注陳之舟師周文育敗徐嗣徽於七磯周文育傳嗣徽引齊人渡江據蕪湖帝詔文育還都嗣徽等乃列艦於青墩至於七磯以㫁其歸路及夕文育鼔譟而反攻之嗣徽驍将鮑砰獨以小艦殿丈育乘軍舴艋跳入砰艦􅛓砰仍牽其艦而還賊衆大駭侯瑱敗王琳於蕪湖侯瑱傳琳引合肥巢湖之衆舳艫相次而下瑱進獸檻洲琳戰却及夕東北風吹其艦並壊琳入浦以鹿角繞岸不出時西魏将史寜躡其上流琳率船東去蕪湖十里而泊瑱令軍士晨吹蓐食頓蕪湖洲尾以待之乗東南風縱火章昭達以大艦中江而遣大敗之後防戎船艦悉還都下江中至無一隻故隋軍渡江而平之通志後魏於晉世起代迨獻文天安元年宋薛安都以彭城附遂有淮北之地宣武景明元年齊裴叔業以夀陽降又得淮南之地至東魏孝靜武定中乗間畧地盡取江北郡縣通志初置州都督總軍人後以刺史為當州都督北齊書髙隆之傳葢魏仿周典置六軍刺史以農隙教之合為百府每府一郎将主之分屬二十四軍開府各領一軍大将軍凡十二人統二開府一柱國主二大将軍復加持節都督以統焉文獻通考其刺史在江淮間者徐治彭城南兗治譙城南徐治宿豫東魏改為東楚州海治龍沮東魏置潁治汝隂東徐治下邳渦治渦陽魏置渦州及渦陽東魏改譙州楚治鍾離合治汝隂霍治南陳睢治取慮譙治新昌揚治夀春淮治懐恩仁治已吾即赤坎東揚鎮東成魏以其地在夀春之東故置東揚州東徐鎮圑城以上見魏書地形志其鎮都大将亦稱鎮将在江淮間者彭城鎮将梁城鎮将汝隂鎮将絳城鎮将梁國鎮将又置行臺節度軍事徐州行臺鎮彭城亦曰東道行臺又曰東南道行臺魏於彭城立東南道行臺後齊畧梁地南際於江刺史仍為都督總當州士馬其不同魏者無南徐東揚潁渦譙淮而增置東廣東楚潼秦江和涇七州鎮廣陵宿豫夏邱瓦梁晉熙歴陽石梁以仁鎮蘄睢鎮睢陵東徐