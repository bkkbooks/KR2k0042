江四萬七千楚州武鋒軍一萬一千分屯列戍增損靡常宋代水軍之制南渡以後愈盛沿河江淮帥府各置水兵二軍要郡别置水兵一軍次要郡别置中軍號曰凌波樓船軍又有鎮江置劄御前水軍乾道三年招三百人淳熙五年招千五百人江隂水軍乾道四年置三百人平江許浦水軍乾道七年七千人淳熙五年増五百人池州都統司水軍淳熙元年千人嘉定中增置三千人太平州采石駐劄御前水軍嘉定十四年五千人建康都統司靖安水軍原𨽻都統司嘉定中𨽻節度通州水軍乾道五年置池州清溪雁汊控海水軍建炎四年置一千五百人兩淮水軍紹興元年置二千人以上文獻通考附錢之望條三邊戰守事宜疏畧揚州有三城三塘楚有大小清河淮東恃此為扼敵來處足矣敵設乗虚自昭信盱眙抵淮隂不一日薄揚州不二日由滁真通泰亦經至江上彼兩路何獨不然陛下可無令韓琦范仲淹者通一路險易熟議之乎且卒饑財匱兵少今曰之大患也然而卒欲飽則財愈之矣財欲無乏則減兵且不暇其何以增耶若兵自耕民自戰沿江諸軍各擇地分内閒田種之而民兵外弩手用一法給器械較精惰畧計可十五萬與屯田大兵相參此三路之郛郭也昔韓世忠在鎮江張浚在建康淮東西便為屯分大儀天長昭闗柘臯敵來則戰豈有定所三路助之所向克㨗近諸郡修城築堡遣兵更戍犬牙占認尺寸之外秦越自分如是則誰肯出力㑹戰於要害之地耶臣觀諸軍氣習今昔頓殊昔欲戰不欲守今言守不言戰馴致疲懦十年之外雖守不能矣陛下幸詔諸将復紹興屯名使如世忠浚軰苦戰立勲庶幾無令消磨坐視相盡汪綱兩淮預備疏畧淮地自昔號財賦淵藪西有鐡治束富穭稻足以自給淮右多山淮左多水足以自固誠能合兩淮為一家兵財通融聲勢合一雖不假江浙之力可也祖宗盛時邊郡所儲足支十年慶厯間中山一鎮尚百八十萬石今宜上法先朝令商旅入粟近塞而算請錢貨於京師入粟拜爵守之以信則輸者必多邊儲不患不豐州郡禁兵本非供役乃就糧外郡耳今不為戰鬬用乃使之供力役緩急戌守専倚大軍指日待更不諳風土豈若土兵生長邊地墳墓室家人自為守耶當精擇伉壮廣其尺籍悉𨽻御前軍額分擘劵結以助州郡衣糧之供又率如山陽武鋒軍制則邊面不必抽江上之戍江上不必出禁衛之師生養休蕃勞費俱息金地南際於淮建節鎮設防禦亳州集慶軍節度使鎮譙宿州保靜軍節度使鎮符離徐州武寜軍節度使鎮彭城泗州防禦使治淮平淮平舊盱眙縣明昌六年以宋有盱眙軍故名正隆四年造戰船於通州五年遣都水監徐文等率舟師九百浮海討東海縣民張旺詔曰朕志不在一邑将試舟師耳續文獻通考元兵制盡改遼金之舊有征伐之事則置行樞密院或缺曰行院淮南江北行樞密院鎮揚州至正十一年置後徙治建康二十八年徙江淮等處行中書省大都督府治揚州後移治建康至元十四年置二十四年徙有宣尉司掌軍民及邊陲軍旅之事或兼都元帥府淮東道宣尉司治揚州至元十五年立十九年省二十一年復立淮東等處宣尉使司都元帥府治天長至正十五年置統帥濠泗義兵萬户府置司於泗州天長縣其監臨東南諸省統制各路軍馬曰行御史臺至正十二年命右丞相托克托總制諸路軍馬即軍中加太師其鎮守各路者曰萬户府列為上中下三等所管軍上府七千之上中府五千之上下府三千之上各置達嚕噶齊一員萬户一員典兵至元間改江淮江西元帥招討司為萬户府䝉古漢人相叅作三十七翼在江淮間者宿州高郵沿海上萬户府邳州真州中萬户府常州鎮江潁州廬州亳州安慶路江隂水軍淮安夀春揚州泰州松江鎮江水軍建康下萬户府後以揚州建康鎮江三城跨據大江人民繁㑹置七萬户府至元二十八年置又有宿州義兵萬户府至正十四年置添設兵馬司都指揮等於徐州至正十年置軍戍則有海州東海四千人至元十二年置廬州三千人至元十二年詔以巴延阿珠所調河南新僉軍三千人還守廬州揚州䝉古軍千人至元二十年留戍志以上分見百官地理至元中以軍萬人𨽻江浙行省習水戰又以征日本船運糧江淮及教軍水戰又勅習泛海者募水工至千人為千户百人為百户又擇瀕海沿江要害二十二所分兵閲習伺察諸盗續文獻通考附余闕論兩淮利害状疏奉聖㫖楊存中等採訪到淮南西路事宜欲廢廬州并管下四縣以附舒州徙和州於東闗并改和州為歴陽縣而合肥歴陽二縣并升軍額仍各差兵将屯戍臣竊謂朝廷欲併省移易州縣之意令侍從臺諫看詳大要不過有三一曰據形勢要害以禦冦二曰酌道里逺近以便民三曰減官吏浮費以足用今據存中等所申欲廢廬一郡四縣之地以附益舒州則是舍形勢而就僻陋如備禦何欲舉廬一郡四縣之民而供輸帥府則是舍近便而趨險逺如綏撫何今兩淮經兵火之後城郭室廬焚燬户口牛畜散亡見雖招集猶未復業帥司欲行措置茫若捕風無所用力今遽移郡置堡剏建官府豈無騷動謂之省費得乎即此三者無一可行然參酌事宜權衡輕重緩急先後當有次第今所甚急莫若以戍兵為首屯田次之修堡以控要害又次之盖州郡無兵則不可為守百姓無兵則不敢安業如廬之合肥和之濡須皆昔人控扼孔道魏明帝嘗云先帝東置合肥南守襄陽西固祁山敵來輒破於三城之下盖地有所必爭也而孫權築濡須塢魏累攻不克守将如甘寜等常能以寡制衆盖形勢之地攻守百倍豈有昔人得之可以成功而今日有之反棄不問非良䇿也伏望朝延特於沿江量遣将校及兵一二萬人早為經畫分戍二州使壘壁相望足為沿淮一帶聲勢以絶窺伺然後廣開屯田使兵民雜耕仍修築東西闗之險以備固守其餘就募弓箭手之屬以次施行無不可者况開濡須巢湖之水上接店埠下抵江口可通漕運則二州之戍兵與就食沿江初無少異而舒卷之間成效相逺欲乞朝廷參酌施行宋文瓚論守江戍将疏畧江隂通泰為江之門户而鎮江真州次之國初設萬户府以鎮其地今戍将非人致賊艦徃來無常集慶花山賊凡三十六人官軍萬數不能進討反為所敗後竟假手鹽徒雖能成功豈不貽笑逺近宜亟選智勇以圖後功不然則東南五省財賦恐非我國家有矣明統兵之制大畧有三一為都督府一為鎮戍将領一為督撫兵備初立大都督府設内外衛所及各都指揮使司後又分大都督府為五府𨽻外衛於都司而都司及内衛各以其方𨽻五府惟親軍不屬南京五軍都督府所屬衛所則有留守左衛鎮南衛水軍左衛驍騎右衛龍虎衛英武衛龍虎左衛屬左軍都督府本府所屬衛仍𨽻京師左府虎賁右衛留守右衛水軍右衛武徳衛廣武衛屬右軍都督府本府所屬衛仍𨽻京師右府留守中衛神策衛廣洋衛應天衛和陽衛牧馬千户所屬中軍都督府本府所屬衛仍𨽻京師中府留守前衛龍江左衛龍驤衛飛熊衛天策衛豹韜衛屬前軍都督府本府所屬衛仍𨽻京師前府留守後衛横海衛鷹揚衛興武衛江隂衛屬後軍都督府本府所屬衛仍𨽻京師後府又有中都留守司轄衛八曰鳳陽曰鳳陽中曰鳳陽右曰皇陵曰留守左曰留守中曰長淮曰懐逺所一曰洪塘現在今鳳陽府蘇州府衛三蘇州太倉鎮海所二吳淞千户崇明千户松江府衛一金山所三淞江千户青村千户南匯嘴千户鎮江府衛一鎮江揚州府衛三揚州儀徵髙郵所三興化千户泰州千户通州千户淮安府衛三淮安大河邳州所三海州千户東海千户鹽城千户廬州府衛二廬州六安安慶府衛一安慶太平府衛一建陽寜國府衛一宣州徽州府衛一新安和州衛一瀋陽右滁州衛一滁州徐州衛二徐州徐州左皆𨽻京師中軍都督府其鎮戍将領總鎮一方者曰鎮守一路者曰分守守獨守一堡一城者曰守備與主将同守一城者曰協守其總鎮或掛将軍印或不掛印皆曰總兵次曰副總兵又次曰叅将又次曰逰擊将軍南直𨽻狼山提督副總兵駐通州嘉靖三十七年設水路自瓜儀周家橋掘港直抵廟溪雲梯闗陸路自通泰淮揚天長直抵鳳泗各叅将守備把總等官悉聽節制鎮守江南副總兵駐吳淞舊係總兵官駐劄福山港復移駐鎮江後復駐鎮江儀徵兩處嘉靖八年裁革十九年仍設二十九年又革三十三年仍設為副總兵官駐金山衛四十三年改駐吳淞専管江南水陸兵馬分守徐州叅将駐徐宿隆慶四年自睢陳叅将改所轄徐州武平曹濮睢陳等處地方兵分為三營徐州一營宿州一營歸徳一營運糧行駐徐州以保運道氷合駐宿州以防陸路春駐歸徳以防竊發金山叅将駐金山舊以蘇州叅将駐金山防禦沿海柘林青村南匯川沙一帶後改逰擊萬歴二年改設以劉家河叅将移駐劉家河遊擊将軍駐崇明舊係叅将駐金山萬歴二年改設以金山逰擊移駐崇明儀徵守備駐儀徵江口専管江北備倭捕盗事務安慶府守備駐雷港鹽城守備駐邳州舊係㕘将嘉靖四十三年改設無事駐劄邳州有事防守鹽城泗州守備駐泗嘉靖三十七年添設萬歴二年令專一防䕶陵寝掘港守備駐掘港舊設把總嘉靖三十六年改設揚舍守備駐揚舍舊設革萬歴十三年復設哨守海口鳳陽軍門中軍官駐淮安嘉靖四十年設把總十三員俱駐劄本處川沙堡嘉靖三十九年設撥金山衛千户一員防守柘林堡嘉靖三十九年設撥金山衛千户一員防守劉家河嘉靖三十二年設荻港萬歴三年設統建陽一衛京口圌山嘉靖三十年設福山港周家橋東海俱嘉靖三十三年設大河口嘉靖三十七年設以鹽城把總移駐於此狼山水兵嘉靖三十九年設逰兵萬歴三年設駐劄上新河自狼山至圌山與通泰合兵廵哨中山鎮萬歴七年設提督漕運鎮守淮安總兵官駐劄淮安其總督廵撫操江兵備以文臣監督總督舊稱軍門而廵撫皆贊理或提督軍務操江専督廵江其按察司官整飭兵備者或副使或僉事或以他官兼副使僉事沿海者稱海防道兼分廵者稱分廵道兼管糧者稱兵糧道總理糧儲提督軍務兼廵撫應天等府地方駐江寜徽安池兵備道駐池州管轄徽州安慶池州三府又建陽宣州安慶各衛所提防江賊礦徒寜太廣兵備道駐寜國管轄寜國太平二府廣徳一州句容等六縣蘇松兵備道駐太倉整飭蘇州松江二府兵備兼理糧儲水利農務常鎮兵備道駐江隂整飭鎮江常州二府兵備兼理糧儲水利農務總理漕運兼提督軍務廵撫鳳陽等處兼管河道駐淮安潁州兵備道駐潁管理廬州鳳陽滁州地方衛所兼管江防事宜淮揚海防道駐泰州整飭淮揚海防江洋仍分管揚州儀徵髙郵等衛泰州鹽城通州等所京操官軍徐州兵備道駐徐整飭徐宿等處兵備兼管淮安府徐州及淮北衛所及淮安邳州大河徐州沂州等衛莒州東海西海等所京操官軍又有中都領班都司四員春班二員秋班二員凡江南額設官軍十一萬二千一百六十七員名召募軍兵七千一百四十九名其戰船額設沿海每衛五十隻新江口一百三十一隻江南通志卷九十二
