body:
  text: 欽定四庫全書江南通志卷九十學校志書院江寧府江寧府書院在上元縣治北舊為錢厰地國朝雍正二年總督查弼納建顔曰鍾山書院檄選通省士子肄業其中延師敎訓月給廩餼世宗憲皇帝御書敦崇實學扁額賜之十年奉㫖省會建立書院賜帑金一千兩復加葺治凡門二層堂二進樓二層兩旁齋舍百餘間以帑金置田兼支存公銀兩為士子膏火資使朝夕講誦以期成德達材明道書院在江寧府鎮淮橋東北宋淳熙初留守劉珙以程子顥嘗為上元簿祀之學宫嘉定間改築新祠淳祐間郡守吳淵依白鹿洞創建理宗賜明道書院額元圮明嘉靖初御史盧煥即今址為書院祀程子其中嵗久復傾國朝康熙六年知府陳開虞同推官謝銓倡修復舊制南軒書院在府城天禧寺方丈後本宋張栻講習之地真德秀建祠祀焉至元中遷於城東大德元年重建舊地今圮文昌書院在江寧府學成賢街原國子監文昌閣也明萬厯間助敎許令典創建國朝順治十七年學博朱謨同學生白夢鼎等重修建坊申請額曰文昌書院以為讀書講學之所崇正書院在府治北淸涼寺東明嘉靖間督學耿定向建并有學田後無考新泉書院在府治長安街明嘉靖間禮部侍郎湛若水建置田數頃以延四方之士後圮江東書院在府治鹽倉街元郡人王進德創建南臨秦淮吳澄嘗於其中講授從受業者甚衆泰定元年定額曰江東書院今無存昭文書院在江寧縣湖孰鎮梁蕭統宴遊之地有東湖讀書臺宋咸淳中方拱辰扁曰昭文精舍元至元中定額昭文書院今無存白馬書院在江浦縣東門外白馬寺左明知縣李維樾講學處今廢門額尚存新江書院在江浦縣南門外祀明莊㫤南京禮部尚書湛若水建為文會之所虹橋書院在府盧妃巷國朝康熙二十一年督院于成龍建檄上下江知名士肄業其中一時稱盛蘇州府蘇州府書院在府學尊經閣後國朝康熙五十三年巡撫張伯行建為士子肄業之所崇祀朱子其中顔曰紫陽書院附張伯行記文學盛於東南自古然矣葢自延陵季子聘魯觀樂辨六代升降之繇瞭如指掌及言氏受業於聖門而論者以為南方之學得其精華厥後文物聲名甲於海内英才蔚興代有其人彬彬乎久稱極盛我皇上御極五十二年中間以文章大魁天下者三吳之士居大半而臺衡碩望侍從清班賛太平而襄盛治者繼踵而起此固沐浴乎先王之流風餘韻而孰非簡聖朝禮樂敎化之所漸摩也不佞忝膺無以宣上德而命撫臨茲土數載於茲夙夜兢兢方懼達下情竊自念弇陋不文株守章句無能從諸君子後窺觀文學之藩籬顧幸生大道昌明之會仰皇上學見我源於二帝三王孔曾思孟之道靡不兼綜條術淵貫復加意表章濓洛鬬閩數大儒尤以朱子為集諸儒之大成而升之於十哲之列聖明特見誠前古後今之所莫及也昔聖門四科文學居一當時游夏二子已不能無少異同及至後世尊徳性道問學兩家分門幾成聚訟而朱子之道迭明迭晦於五百年之間惟我皇上躬行心得獨深信朱子之道子之道明即二帝三王欽定紫陽全書以敎天下萬世朱孔會思孟之道無不明矣然則學者之所以為學敎者之所以為敎其可不以紫陽為宗乎哉不佞竊以三呉文學淵䔩先賢風化於今猶有存者而後進傳習雜而不貫或務華而離其實或求精而入於虚所謂文學者殆非聖門之文學也故樂與多士恪遵聖敎講明朱子之道而身體之此紫陽書院之建所以不能已也迺經之營之地度於學宫之旁材取於僧廬之毀工成於農隙之餘中為崇祀紫陽夫子之堂而旁為諸生講學藏修之舍庖廪湢浴靡不畢具經始於癸巳之冬落成於甲午之春塈茨丹雘翼翼嚴嚴諸生來學於其中者亦知所以為學之方乎夫武城蕞爾下邑耳子游以禮樂為敎而弦歌之聲溢於境内至動聖師莞爾之喜余於是聖天子知學道之為益大哉况今人心而三吳文學之盛建中和之極明禮樂以淑又非他州所可比諸生其可不仰追先賢而以學道為務􅁘夫宣揚敎化以仰佐皇上成人材厚風俗至意者不佞事也因紀書院建立之由而推明其意以諗學者雍正二年江蘇布政使鄂爾泰重為修葺增廓其制徵七郡之士弦誦其中間以政暇聚於春風亭親與唱和士風一時振起刻有南邦黎獻集二種一制義一古文詩賦鄂陞任後士庻於書院旁構堂顔為西林氏講學處十年奉㫖建立書院即於此重加整理書院中舊有田三百畝欽賜帑金一千兩置田以資膏火為永久計學道書院初在府城東北隅宋元舊址皆廢明嘉靖二年知府胡纘宗因景德寺改作書院以祀言子後為講堂堂後為弦歌樓兩廡各五十楹扁曰東南鄒魯後改為督糧道署遷書院於社學文正書院在府雍熙寺後宋咸淳間郡守潛説友立祠以祀范仲淹元至正六年總管吳秉彜改祠為書院舉其族之嫡嗣奉祀明成化間重修國朝兩江總督范承勳大為修整建先憂後樂石坊於門外鶴山書院在府南宫坊内宋參知政事魏了翁之賜第也理宗親書鶴山書院四字題額明嘉靖九年知府李顯移建書院於巡撫行臺之左國朝康熙二十四年巡撫湯斌捐俸重修金鄉書院在府西市坊内宋贈澹臺子羽為金鄉侯故名嘉靖二年知府胡纘宗建有正大堂分翼左右廡庭中有兩亭萬厯初圮崇禎九年巡撫張國維復建澹臺書院在長洲縣尹山巔宋尹焞讀書之所明練廩設義塾其中後圮國朝康熙中里紳彭定求疏募重建雍正初落成和靖書院在長洲縣界宋尹焞讀書虎邱西庵題齋曰三畏端平二年胡淳曹豳奏立書院以祀焞後圮嘉靖初知府胡纘宗以龍興寺復改為書院甫里書院在長洲縣治東唐陸龜䝉故宅元元統二年裔孫德源請以已貲建書院設山長主敎事後圮玉峯書院在崑山縣馬鞍山南麓先儒狀元衞涇藏修於此趙孟頫書額文學書院初在常熟縣醋庫橋東元至順間巨室曹善誠建以祀子游闢講堂設師弟子員而額之曰文學書院至正末燬於兵明宣德元年知縣郭世南改建於儒學西巡撫周忱更其名曰學道尋又圮嘉靖時知縣王杲改建虞山麓西北與墓近表曰南方精華附瞿景淳記永嘉王公治常熟之二年乙丑政修民和百廢具興學宫之左有吳公祠公既展謁因嘆曰嗟乎茲固先賢吳公之鄉也國家方以文學造士今僅有祠而書院不立造士之制無乃缺諸且嵩陽嶽麓類有書院矧茲為吳公之郷而獨缺焉固有司之事也乃相地於邑治之西得廢圃一區介兩憲院間西枕山麓顧瞻則吳公之墓在焉公曰可矣乃白之按院温公温公極是之首發贖鍰若干助其役公乃度基址計丈尺具材用卜日興工其地南阻民居乃東闢為書院門門内稍虚其南為垣途北折為門表曰南方精華言南方學肇吳公也門内為池樹以棹楔表曰洙泗淵源言吳公之道本洙泗也又進為學道堂揭示遺訓俾士民知所興也堂北為祠門中建祠宇旁翼以亭自非瞻禮門不輕啟明有敬也堂之左右稍北則對立書樓稍南則對立號舍各蔽以牆出入有門升降有階士之肄業其中而升堂問難者有過廊冀士或得霑時雨之敎也既成以復温公且其圖示余俾余記之余淺陋何能為役然余有感焉自吳公興起斯文俾吾濱海之民皆獲與知夫子之道弦誦之聲與鄒魯並真有大造於學者吳公故有専祠然僅容俎豆而不足以聚生徒則崇敎之道未備也今書院之立奉祀有祠講道有堂藏書有樓肄業有舍規制宏敞真足以報呉公之德而慰吾人景行之思矣余獨念今之以文學名者或有異於吳公也吳公之在孔門進退以禮深達先王制禮之㣲一時若曾子子夏咸推之試用於武城弦歌之風洋洋焉夫子至為莞爾而笑吳公之文學葢篤其實非徒飾空言者也若今之以文學名者徒飾空言為千禄之資耳無乃有異於吳公乎夫宗其道則思祀其人者吾人之情也傳其學必思篤其實者吾人之分也世有豪傑之士必有不安於科舉之習而以操履為重者矧至吳公之鄉而依其門牆可徒浮華是競以忝吳公乎是可以省矣不然吾邑固有學校豈不足以造士而司敎化者必勤勤於書院之立哉是役也成於王公而温公實主之温公憲體振肅事之害財者雖小必革獨善王公此役首助成之其表章名德風勵人心可想見焉王公復濟以精敏役興而民不知勞事節而民不知費使千年曠典新於一旦葢均可書云萬厯三十四年知縣耿橘重新之更名虞山書院構弦歌樓天啟中魏璫毀之崇禎六年後裔言福言恂如請於知縣楊鼎熙重建國朝康熙中糧道馬逸姿修養賢書院在常熟縣學明倫堂西國朝康熙四年督糧道參政盧綋海防同知魯超特設講學知縣李璞捐建虞溪書院明𢎞治間知縣計宗道建於常熟縣阜成門外殿橋西以祀虞仲顔其堂曰讓德松江府九峯書院初在府治西北宋時邑人衞謙建後趙驥以宋李綱生於華亭因祀綱於此明正德十一年同知侯自明奉提學張鰲山檄改建於谷陽門西西湖書院在府治西南元元貞元年知府張之翰建大德間里人邵天驥重建元統二年知府申秉禮重修遷姚氏義塾其中以便來學一時生徒甚盛至正中廢後為西湖道院今不存附明張鼐與當事興復書院書自古王教之成也崇本而易其末導晦而復之明為之立學校義塾書院時告之以聖賢之路而興起其仁義之心故夫書院之設羣薦紳父老子弟而嵗日月為之㑹迎四方之高賢達士登講者之席質疑辨難以明其敎習雍容登進主客揖讓之儀以和其氣窮性命精㣲推廣天地萬物以為國家之用故講習熟而型摹立心性開而志氣振其於民皆有赧然油然而不忍自甘於淫放者松澤國也地洳而人柔善下無有卓然强立肩道之重者則書院之興起何可少哉今黨庠之間羣弟子而官師訓之薦紳不入席也里社父老不與聞也逺方之高賢達士未嘗臨而問也聲偶帖括鄙俚之言薰人之心此人物之所以益下也願明公設書院一路以講習型摹之松之書院如九峯西湖皆可考顧九峯地囂而不可復西湖之址一名各水沿西郭而南地莽蕪而汚邪洄曲羣本聳植尚存環碧泳波之遺意此為一郡融結之地而聞曠無用同於櫟社復而創之易為力也明公以理學名世建節南土而吾松僻壤一隅不獲見德化之盛觀禮樂道德之原是亦明公所惻隱也夫射之於廣漢也一人焉樹之招則衆逐而善射出矣此樹招者力也望洋而濟見艤舟焉而人競渡矣操舟者益於濟也夫王敎之成亦若此矣伏惟明公興復書院廣講習敦摹式推廣郡縣薦紳之美意以慰父老子弟喁喁之望仁澤浹乎肌膚德敎􅃋乎海隅明公之恩施與聖澤俱不朽風俗幸甚扶風書院在府治東百歩國朝康熙二十一年郡紳王廣心許纘曾等建知府魯超延敎授陸在新開講於此今為節婦祠仰高書院在上海縣學南明正德時知縣鄭洛書建仰高祠以祀名宦鄉賢後别作祠於學遂改為書院孔宅書院在靑浦縣北舊有孔子廟宋時因其地立書院以養士元初為寺僧所據至正時復還書院置山長主之里人章弼重修常州府道南書院在府朝京門内宋楊時嘗監本州市易務因講道焉紹興初知府黃灝始立祠祀之尋燬於兵明正統間知府葉蓁即西山公館塑公像與蘇軾合祀名二賢祠正德十四年徙毘陵驛於朝京門外知府陳實即驛址建道南書院延給事毛憲講學其中士子雲集嘉靖間改為兵備道署延陵書院一在府城雙桂坊季子祠西國朝康熙十年布政慕天顔知府駱鍾麟就祠側地建書院附魏禧記常州為古延陵地吳季子所封邑故郡縣季子遺廟最多舊誌有延陵書院故址不可攷葢其廢而不興者不知幾百年矣嵗辛亥郡太守駱公鍾麟慨然以風敎為己任有意興復之而延陵裔孫武進諸生發祥鬻産以謀建造於是就郡城雙桂里季子祠西偏之廢址創復古延陵書院太守時與郡邑大夫士講學其中未幾太守以憂去而新太守紀公堯典復振興其事講習如舊時常州為古今人文之藪倡明道學者代有其人書院之設自南宋周伯忱先生至明孫文介張清惠凡四五建至於今廢墜者數十年一旦得賢有司起而舉之常之大夫士觀感興起彬彬乎道德之林矣書院凡為廡為堂為室若干區地廣若干畞作於某嵗月落成於某嵗月發祥竭力經營之宜興邵贊協圖之禧來客茲土得交常之賢人君子而不以禧為不文命為記勒諸石禧固謝不獲於是拜手而言曰昔孔聖以學之不講為吾憂而兌之大象曰君子以朋友講習自宋之小人以偽學誣君子始有講學之禁禧嘗以為講學之人有不盡出於君子者而攻講學之人則斷未有不出於小人自宋以來可見矣然漢唐之黨禍君子與小人相攻也至雒蜀之黨分而君子與君子相攻矣雒蜀之争是君子之講學與君子之不講學者相攻也至朱陸之黨分近日程朱陽明之説異而君子之講學與講學者相攻矣嗚呼不有君子其流弊抑又何所㡳也易曰殊途而同歸為學者各有所得力之處要歸於聖賢之道而已是故弊有所必救則殷周損益雖聖人之制可以改其未善理有所合則諸子百家之言未嘗不可以發明聖人之經若執一自用是此非彼始以相長之義而成相勝之氣以徑路之殊成門户之異則已之偏私膠固與小人之怙勢專利者其間不能以寸顧嘵嘵然曰吾講聖人之學也是何異於之楚而北其轍哉吾知諸君子之必不出於是也夫正其身以率物虚心以受人將天下之忮求自消況一堂之上乎禧庸劣於講學之堂不足以供糞除之役今因諸君子之請而妄述所聞於師友者以附記事之後是雖不能辭道聴塗説之罪或庻幾備曚瞍之箴頌云爾是為記一在江陰縣順化坊舊為公館明成化間知縣謝廷桂建嘉靖間知縣李元陽重修設季子位以祀之聚學者肄業其中今廢東林書院在金匱縣城東宋陽時講學處久圮明成化間邑人邵寳建書院於泰伯瀆上以講學附王守仁記東林書院者宋楊龜山先生講學之所也龜山沒其地化為僧區而其學亦遂淪於訓詁詞章者且四百年成化間今少司徒泉齋邵先生以舉子復聚徒講學於其間先生既仕而址復荒屬於邑之華氏華氏先生之門人也以先生之故仍讓其地為書院用昭先生之迹而復龜山之舊先生則自述其廢興而以記屬之某當是時遼陽高君文豸方來令茲邑聞其事謂表明賢人君子之蹟以風勵士習此吾有司之責而顧以勤諸生則謂之何爰筆其所備而亦遣人來請嗚呼物之廢興厥有成數矣而亦存乎其人夫龜山沒使有若先生者相繼講明其間則龜山之學邑之人將必有傳者豈遂淪於訓詁詞章而莫之挽當時從龜山游不無人矣使有若華氏者相繼修葺之縱其學未即大明其間必有溯流以窮源者亦何淪沒廢置之久又使某時有司若高君者以風勵士習為己任書院必不至於頽圮又何至化為浮屠之室而蕩為草莽之墟乎是三者皆宜書之以訓後若夫龜山之學得之程氏上接孔孟而下啟羅李晦菴統緒相承斷無可疑先生樂易謙虚德器溶然不見喜怒人之悦而從之若百谷之趨大川論者以為有龜山之風非有得於其學宜莫能之然而世之宗先生者或以其文翰之工或以其學術之邃或以其政事之良先生之心其殆未以是足也從先生游者其以予言而求先生之心以先生之心而求龜山之學信乎書院之復不為虚矣書院在泰伯瀆之上東望梅村二十里而遙周泰伯之所從逃也方華氏之讓地為縣鄉之人與其同門之士争相趨事若恥於後泰伯之遺風尚有存焉特世無若先生者以倡之耳是亦不可以無書久之又圯萬厯間邑人顧憲成復建於今地高攀龍繼之天啟五年為魏璫所毀國朝康熙中巡撫湯斌復營建巡撫宋犖成之附熊賜履重修東林書院記東林宋儒楊龜山先生論學處也明神廟時梁溪顧涇陽高景逸二先生倡道東南遂因其舊址構為書院偕同志講肄其中四方之士多歸之於是東林之名滿天下天啟中魏璫煽虐大誅戮海内正人特指東林為黨籍書院以燬及璫敗有㫖修復而多事之餘傾圮如故僅道南一祠頽然涼烟衰草間而已今天子隆重師儒崇奬道術近於特允言官請令直省營建書院為士子觀摩地是景逸先生之從孫節培集里中戚友申請於有司庀材鳩工廣行購募越朞月而落成講堂學舍規制悉備諸生以時誦習不異曩時節培乃走書至金陵屬余為文以紀其事夫學也者學為聖學為賢也講也者講明所以為聖為賢之理俾知所從事也因其迹以考其心豈非宇宙之常經人生之切務而君師天下者之所樂聞而亟許之者乎乃或者從而嫉惡之至設為厲禁焉嗚呼此果何為者也粤自削迹伐木而後吾黨之禍一見於宋紹聖再見於慶元嘉泰之間迨至前代熹宗之世而其禍彌烈矣雖然撫今追昔反而内求吾黨亦當有分任其咎者葢小人之忌害君子也非必有深怨積恨誓不可並生於天地之間者也惟是平居立身制行殊途背馳不啻薰蕕氷炭之不相入而所為君子其人者則又待之甚嚴絶之太過致若輩無地以自容又不幸吾黨之聲譽日隆交遊日衆一時標榜附和之子或未免名實􅆾違首尾衡决遂未足以服若輩之心而適予以可攻可議之釁此同文黨錮之獄小人每悍然為之而畧無所顧也然則講學一事顧可以終廢乎是葢有道矣方今泰運方亨宇内壇席之盛蒸蒸蔚起嗚呼此誠斯道昌明之一大機㑹也則願吾黨有志之士以黙識為真修以篤行為至敎勿口舌軋擊以矜能勿意見紛挐以長傲尊賢客衆嘉善矜愚偕遊於大道為公之世而絶國無所為怙已凌人之弊開當世以雌黃之端此則家化民移俗之至意而亦從古聖賢開物成務之極功也操斯衞也以往將講學二字永為千古美談東林名勝直與天壤並存可矣余生也晚嘗從先世遺書與聞梁溪之緒論茲幸逢是役之竣也為之盱衡往事因著為反躬刻責之言以自勉勵且為吾黨勸也吾黨亦有以許之否湯斌批請續祀道南呈詞東林書院龜山先生講學地故當時從祀皆其門人相傳即忠定南軒象山慈湖之賢猶加釐正葢先儒之慎如此顧高諸先生皆興復東林同堂講習其祀於東林固宜天崇以後號東林者幾遍天下其間直節清修力排閹䜿扶植綱常者皆可與顧高諸先生争烈然此可謂之東林黨人而與書院無與也若盡舉當年號東林君子者而入之恐道南俎豆無地可容而其間或有名實不相副者亦無辭以拒之矣為今日計當倣前人釐正忠定諸先生遺意而為之亦紹述前賢之一端也且遊此地者要當講求龜山端文忠憲之學想見當日林下寂寞真修黙證而不必於諸先生之應入應出紛紛聚訟以啟門户之争可也仰縣抄送書院仍具文報查繳二泉書院在無錫惠山寺右明正德間邵寳建有野橋雲階海天亭㸃易臺超然堂國朝順治間按察使蔡獻臣提學張能鱗先後捐貲修造東坡書院在宜興縣蜀山明𢎞治間建後圮國朝康熙三十七年道士蔣普葺而新之明道書院在宜興縣城東隅周孝侯墓左明萬厯間太僕史孟麟講學其地知縣喻致知倡建書院為士紳講習之所巡撫周孔敎題曰明道名賢學士雲集與東林相輝映後圮澄江書院在江陰縣布政坊巷西南元至正中里人蔡以忠以别業立義塾事聞於上賜額曰澄江書院設山長其講㑹之所曰德義堂後圮其遺址今為闗壯繆祠馬洲書院在靖江縣南門外明知縣陳函輝建集諸生㑹課於中鎮江府淮海書院初在北固山鳳凰池宋淳熙中太常少卿龔基先創建宋理宗御書四字賜為額元至元中為甘露寺所併元貞元年敎授黃一龍重建於儒林里明初併入縣學崇禎十四年知府鄭一岳創建於故址改名香山書院國朝順治五年知府趙士冕增修樓舍更其名曰三山書院十一年以後改為駐鎮軍府淸風書院在丹徒縣壽邱山宋范仲淹讀書處明正德十五年知縣李東即其地建書院今圮杏壇書院在丹徒縣壽邱山國朝順治十三年知縣張晉創建繚垣植杏數百株使諸生居之後圮茅山書院在金壇縣茅山宋天聖中侯仲逸創建敎授生徒知府事王隨奏給田三頃充書院用後為崇禧觀所併端平中再建於三角山尋圮淳祐中郡守王埜復之未幾又圮咸淳七年更建於顧龍山今改為圓通菴淮安府仰止書院在府城東南名臣祠内明正德十一年提學張鰲山建忠孝書院在府城東門外舊為尼寺明正德十四年巡按成英毀之建書院以祀宋徐績陸秀夫設六館以肄多士志道書院在府學南明萬厯中推官曹于汴建正學書院在鹽城縣治北明嘉靖十七年縣丞胡鰲創建有文會堂燕居堂歌鹿堂東西號舍後為叅將府崇正書院在淸河縣明隆慶五年知縣張性誠以如意庵改建書院立號舍二十間置齋長二人領袖諸生中有講堂買地為園以資膏火天啟間圮臨川書院在淸河縣漁溝鎮距縣四十里國朝康熙三十二年知縣管鉅以漁溝士民輻凑子弟多向學思造就之乃建書院令就學焉揚州府甘泉書院在府東門外天寧寺東明嘉靖間湛若水過揚講學於此後御史朱廷立知府易瓚為建書院御史聞人銓徐九臯知府侯秩增修資政書院在府治東隅明成化間知府王恕建以敎郡邑學弟子𢎞治間知府馮忠重修今圮維揚書院在府西門内仰止坊明嘉靖間鹽使雷應龍建萬厯間鹽使彭端吾修崇禎間鹽使楊某重葺令師儒講肄其中安定書院一在江都縣治東南三元坊國朝康熙元年鹽使胡文學建以祀宋儒胡瑗一在泰州治東提舉陳垓創於方洲泰山之間以祀胡瑗嵗久廢成化間提學陳選塑像儒學中婁謙遷於小西湖上𢎞治五年泮官方岳移今地有祀堂三間經義治事二齋嘉靖間知府王臣重建徐州府彭東書院在府城東北隅明嘉靖二十五年副使王梴建為諸生講讀之所今圮彭西書院在府城西南隅即舊武學明嘉靖六年副使趙春建為武生居業之所二十五年副使王梴復拓之改為彭西書院今圮養正書院在府吕梁分司之南明嘉靖三十五年主事王應時因舊社倉拓之為書院有育德堂左右翼書屋後為居學軒徐邳之士咸肄業於此今圮龍峯書院在碭山縣明萬厯元年知縣王廷卿剏建為諸生居業地有天語亭瑞麥亭凌雲書院在宿遷縣治南明萬厯三年知縣喻文偉建中為明德堂後為静思軒左右日新時習二齋集諸生會文其中桂林書院在睢寧縣治後國朝康熙五十七年知縣劉如宴作義學於城隍廟西監生王訥捐今地建書院為課士之所而以義學地立院太倉州明德書院在嘉定縣學宫左明萬厯三十二年知縣韓浚建置田三百畝天啟四年毀為勸農公署崇禎初復改書院今圮安慶府安慶府書院在府儒學内自文廟明倫堂以東皆其地也國朝順治九年操撫李日芃創建顔曰培原書院康熙十年巡撫靳輔命知府姚琅興復書院命敎授莊名弼課士其中附靳輔記書院之設何昉乎葢不忘乎洙泗之意而宗仰之不衰也然歴稽往牒創不一其人建不一其地於以一道同風扶進學業非不有頼而豫章為最著葢文成事業在天壤文章本理學而最有功於道統者則莫如提倡良知二字夫知或由於生或由於困或由於學而其終則歸功於格致乃格物一篇已失其傳而所補之章先儒猶有徹上徹下之論則繼夫子而言知者誠莫如子輿氏之言良知為最當矣雖然大學一書言誠言正言明德中庸一書言率性言盡性言擇善非皆求知之良乎非皆同功而一貫乎何以子輿氏獨尊良知而文成公獨提倡之也書云惟天地萬物父母惟人萬物之靈命之之為性率之之謂道所以道原於天知本於性試向庸人而語之曰某也若何忠某也若何孝則聞者必徵於色發於聲而喜其為忠臣孝子也又語之曰某也若何不忠某也若何不孝則聞者又必徵於色發於聲而怒其不忠不孝也夫聞忠孝而喜聞不忠不孝而怒皆知也皆知之最良者也其意亦莫不誠也其心亦莫不正也則其德亦莫不明也其善亦莫不至也推此知而一貫無不貫也推此知而家國天下亦莫不齊治平也古人云不忘君謂之大臣不忘世不忘道謂之大儒亦皆謂知之不容已也昔劉元臣登進士不即就選乃受學於司馬温公後乃得存誠之道所謂物物各具一實理人人各具一實心者即此良知是也惟實固良惟良必實耳皖城東舊有書院是操府李君培原所起也凡講堂齋舍門廡號房規制亦宏整乃沿習既久曠廢不振予自下車以來每恐不能體朝廷興賢育才之意爰於簿書之暇召集生徒月有課日有講告之七郡三州亦莫不舉行亦既駸駸乎文㑹輔仁矣然衡文之際每勵師儒以倫常之道切實之義而推原於誠意正心以引發其良知爰更著其説以示多士則雖謂廣其説於天下而獨先伸其説於所及也亦何不可是為記二十年巡撫徐國相二十三年巡撫薛柱斗先後增修集郡邑生講學四十八年巡撫葉九思重修改曰修永書院雍正七年知府徐士林重修禮讓堂及東首齋舍九間復集諸生肄業十年奉㫖建立書院大加葺治前建碑亭中為禮讓堂左右增置號舍賜帑金一千兩置腴田一百一十一畝益以歴任撫按捐置各屬學田共計三十五頃六十畝零額租穀麥一千七百一十五石零額銀三百四十八兩零悉歸書院為膏火資又知府徐士林於陞任時捐銀六十兩懐寧縣李元祥為置民田額租穀一十一石地課一兩六錢並佐書院膏火附徐本記欽惟我皇上繼天立極文德誕敷聲敎暨訖無逺弗屆癸丑春勅天下省㑹於學校外建立書院為興賢育才地各賜帑千金又念士子敬業樂羣膏火之資不繼命督撫籌畫支給睿慮周詳湛恩汪􅐮海内德造之選聞風慕義争自濯磨甚盛典也本奉命來撫上江恭承金如數飭皖守懷令購置附郭膏腴田諭㫖檄安藩發帑一百一十一畝即以懐令掌其租賦資書院諸生膏火熏之久逺皖城舊有書院在府泮之左面江流枕龍嶽實據一城之勝於是親為相度形勢門廡齋堂深廣爽塏因年逺傾廢鳩工葺治棟宇較斵垣墉塗茨堂左右各七楹為號舍東西各九楹為六齋又於堂東隙地増改號舍數十間寛敞可容百餘人按皖江歴任撫按嘗捐置各屬學田共計三十五頃六十畝有竒額租穀麥一千七百十五石有竒額銀三百四十八兩有竒向雖為賑恤貧士之需而實飽吏胥之腹本莅任後畢力清釐杜其溢濫賑恤貧士之外餘俱飭貯郡庫修葺書院治辦器具皆取給焉嵗之所入自雍正十一年始悉歸書院以佐膏火之不足行奏入充報可爰卜吉灑埽延名師擇各屬有志之士入之相聖天子與講明實學以上荅之雅化焉自昔書院之制以興行禮讓棫樸作人石鼓嶽麓白鹿睢陽四者為盛葢當時庠序之敎未修士因擇地為羣居講習之所朝廷畧一崇奬之而已今天下學校之盛敦厲名實禮陶樂淑猶荷殊恩加意於此為之養其德性閑其身心恤其口體日用吾知風氣之隆人才之盛必有極乎前古之所未聖恩並有者矣敬刻石恭紀料工價之由俾後之有事於叙田畝院宇之制物斯土者永以為則云青陽書院在懐寧縣余忠宣廟内祀元余闕以闕戰守之暇即率諸生講性命之學戰士擐甲以聽故建今廟猶存二良書院在府治東明嘉靖時知府胡纘宗以漢文翁朱邑皆有功於皖創書院以祀之使諸生讀書其中今圮近思書院在府治北明知府胡纘宗建奉周程張朱五子使有志性理之學者肄習其中中為聚奎堂前為主敬堂旁有書舍崇禎間巡按田惟嘉檄府重修即今北察院龍山書院在府治北明嘉靖三十二年知府李遜即社學舊址建有正義堂正德修業堂退省堂左右號舍學舍今圮山谷書院在懐寧縣儒學前明知府胡纘宗撤佑聖觀之西僧庵為之後燬於兵國朝順治九年山谷後裔推官黃敬璣重建諸生亦有誦習其中者桐溪書院在桐城縣西北隅明嘉靖間知府胡纘宗知縣沈敎移靈泉寺於西以其地建書院祀周程張朱五子使諸生有志學道者知所觀法後知縣鄺濤易太霞宫為書院今因錢尚書葬其處邑人呼為錢家書院皖山書院在潛山縣舒王臺上即天寧寺地明嘉靖間知府胡纘宗以程朱二夫子皆嘗至潛游酢黃榦皆有治績於潛遂撤寺建書院以祀程朱以游黃配今復為寺來仙書院在望江縣東門外國朝康熙十九年知縣陳柿祚建二十二年知縣伊巘重葺捐俸置田以供寒士之就學者徽州府紫陽書院在府城外紫陽山麓自宋淳祐六年郡守韓補始建於城南門外理宗賜額曰紫陽書院元至元間遷於南門内之江東道院改道院為書院延祐二年又遷於南門外故址之左後燬於兵明洪武初邑人重建於歙縣學右成𢎞正嘉間知府王勤彭澤熊桂知縣林騰蛟戴東旻先後修葺然歴年久僅存朱子像而已而紫陽山麓之書院則正德時知府張芹創建嘉靖間知府何東序修葺集七學之士講讀其中附汪道昆記郡中特建紫陽書院事徽國文公其地屢遷逓有興廢其一在縣儒學之右文公裳衣在焉建自國初西向成化庚子郡丞張公改而南向靣紫陽山正德壬申郡守熊公遷廢寺以都形勝增置堂廡齋舍凡若干楹為臺為池莫不備具乃簡七校之士講業其中一時人文益斌斌矣嵗久就圮迄今垂五十年嘉靖丙寅縣大夫林公由進士領縣事始謁祠下周視而嘆曰元立閩人也閩之俎豆文公者至盛矣此文公父母之國而祠事不治謂有司何乃鳩工程材葺其舊者咸若更始復度臺前餘地增置講堂堂外為垣樹桃李若竹箭垣之南為亭奉世宗皇帝敬一箴堂之東為門揭宋理宗賜額其興事自十一月至於正月其財用出公帑若干緡工不告勞民不知役都人莫不欣欣焉喜也縣文學徐君耒告成事屬道昆勒石紀之在令甲有司主屬廟祀先師博士諸生咸在學舍法久寖廢學舍曠而不居當事則又崇祀其鄉先生為之尸祝而誘之進魯人之陟岱必先東山吳人之陟滄溟必先震澤其觀法也近則其用力也專且國之養賢猶農之樹稼一夫而受十畝嵗入幾何第令程工而相土之宜其穫過當乃令養士日廣視疇昔且仆倍之使必程督而後行日不暇給及既釋業而仕緩急將有頼馬卒然試之所養或非所用何以故失養故也敎之必因其材居之必擇其地善養者慎諸文公以經術明聖人之道若揭日月而行世儒斤斤猶或求多於訓詁要以篤行君子較然與古為徒故其遺書至今誦之弗絶當世以經術論士舍文公奚適哉使徒挾經術為取士之資直優孟之抵掌耳尚安事養必也躬行為本出入不倍所聞是則文公之徒也都人士後文公而興觀法不逺即有事於海岱夫非東山震澤之類與今天子改元士蒸蒸嚮用視文公尼於有宋何論逕庭都人士資適逢時顧自養何如耳語曰良田無晩嵗膏澤多豐年此縣大夫意也道昆不佞敬為都人士申之國朝順治間知府祖建衡重修康煕九年知府曹鼎望集諸生講學於此至今稱盛斗山書院在府治東斗山之顛明湛若水曾講學於此嘉靖十年知府馮世雍葺為精舍萬厯間改為書院國朝順治間燬康熙九年知府曹鼎望重建師山書院在府城西十里元鄭玉構精舍於師山有三樂堂極高明軒著春秋闕疑於其中後人因之為書院南山書院在歙縣巖鎮南山之麓明嘉靖中烏程姚舜牧寓山中著書學者從之因創書院國朝康熙二十一年里人於故址重建每嵗三月聚此講學還古書院在休寧縣萬安山依山疊石而成明萬厯十年知縣祝世祿始建給事中邵庻成之天啟間魏璫盡燬天下書院崇禎初復故國朝順治十年邑人趙吉士捐貲重修集士子講學於此康熙中知縣廖騰煃復興之祀朱子其中瞻雲書院在休寧縣城内舊曰海陽書院今為講學所國朝康熙二十九年知縣廖騰煃重修晦菴書院在婺源縣元至元二十四年知州汪元圭創書院於文廟側額曰晦菴延祐初災後至元間再建於縣學之東北至正兵燬明嘉靖九年知縣曾忭改建於縣治後山上更名曰紫陽書院後知縣鄭國賓張檟相繼置田為講學會文之費萬厯間知縣馮時來重修監生程亨嘉輸助今圯明經書院在婺源縣考川元至大間里人胡淀建知州黃惟中聘胡炳文主敎事請於朝賜額置山長一員至正時燬於兵明成化間重建後圮萬厯間重建閬山書院在婺源縣閬山元至正間行樞密院判汪同建聘趙汸為師以敎鄉之俊秀者今圮東山書院在祁門縣睂山明正德末知府留志淑因東嶽廟基為書院以祀朱子集諸生講肄後災嘉靖間知縣陳光華重建更名曰環谷書院後知縣尤烈修而廣之碧陽書院在黟縣治南舊儒學基明嘉靖四十二年知縣謝廷傑捐俸建以地在碧山之陽故名崇禎間重建寧國府志學書院在府治北景德寺後明嘉靖四十三年提學耿定向知府羅汝芳建有會講堂左右號舍四十楹書院西為宛陵精舍嘉靖四十三年知縣姜台建待學書院在府治文昌臺右明萬厯十七年知府廖恒吉知縣陳公相建二十六年知縣尹三聘重修改為正學書院崇禎間知府徐大儀倡募重修國朝康熙十七年訓導姚士重修葺鳯山書院一名明德書院在寧國縣學射圃前明正德中知縣王時正建嘉靖萬厯間知縣胡子亞徐一檟重修後圮國朝康熙十六年知縣馬光重建於西津橋東滸制度軒敞設理學先儒位置田為學者膏火之資後知縣陳主策增置田助之文峯書院在太平縣治南明嘉靖中知縣邱振省開福寺建後知縣劉元凱重修更名天都書院後圮萬厯五年知縣張廷榜重建後改為公館知縣潘應化復之明末復圮國朝順治八年知縣陳善政重建後為講堂前為凌雲閣籍山書院在南陵縣治東北因山為石臺明知縣沈堯中建國朝康熙八年知縣屈升瀛重修池州府齊山書院在府城南五里元時設山長主敎事宣城貢尚書師泰嘗為之後圮繡春書院在府齊山宋狀元華岳讀書處明狀元黃觀築翠㣲精舍正德十年知府何紹正即故址建書院有聚奎堂置田其中後同知任柱復置田益之萬厯初移建陽春嶺下三十三年知縣羅憲凱復移建舊址今圮儲材書院在府城西北城隍廟前明嘉靖二十年知府曾仲魁建五經書院隆慶間知府尹士龍改為實學書院萬厯十六年知府姚士觀易今名後圮池陽書院在府學宫西南本常平倉址國朝康熙二十年知府喻成龍建集六邑諸生肄業其中置田七百餘畝以為供膳講誦極盛今為憲使往來駐節之地矣附喻成龍記天下之所以𢎞道化美風俗立功名乗風澤者惟此人才而已矣而儲才先於養士養士先於勤學載考禮官天子辟雍諸侯澤宫以云學也下及鄉遂以三士三大夫卿主之而書院之設所以與辟雍澤宫六卿六遂相為贊治者也百年以來鮮有修舉予為慨然思所以儲才養士以開一代之隆以豫國家之用則書院其始地也歴稽往牒自漢集諸生於白虎觀講五經同異鄭元馬融及隋王通皆廣集生徒共相授受然書院之名未立也名之立自唐始開元初建麗正書院以張説為使代宗作蓬萊殿舍以李泌為使憲宗創石鼓待四方學者以李寛為使南唐昇元則嶽麓有建也太平興國則鹿洞有建也嵩陽鶴山奏置院長建安麗澤掌以布衣而大元之太極天厯之横渠隆慶天啟之靈濟首善又班班可數也於是鴻儒尉興大業颷起猗云盛矣予綰組池陽有興敎育才之任簿書之暇率寮寀進耆碩訪八桂翠㣲遺址湫隘曲側不足當甲觀酉山之選嗣於學宫西南有連厫舊基其地高廣軒豁登而望之逺岫平臨清江環溯烟雲竹樹觸目琳瑯陟巘降原於茲為勝爰剔榛莽畚砂礫測景植圭繪圖釐册而後鳩工庀材焉經始於辛酉七月之初竣於壬戌春王之吉繚垣百堵丹雘千楹顔於門曰池陽書院誌地也堂曰經治志業也曰敬學誌學也東西序列匝廡周廊庖廩膏薪充庾盈室既次第就裁區畫纎當因採購鴻文搜羅祕笈聖經國史諸子百家凡數千卷刋石紀編貯備觀覽徴郡學及六邑諸生升其孝秀英敏者讀書其中而以郡邑學博主之相與修業砥行為國羽儀庻幾師禮官遺意而於前賢詎不望古遙集也哉若云文翁之倡化茂叔之講學以俟君子余方遜謝告不敏也是為記陽明書院在青陽縣九華山化城寺右明嘉靖初知縣祝增建以祀王守仁後改為祠陵陽書院在石埭縣治西明畢似范講學其中國朝康熙十年知縣姚子莊重修今圮太平府天門書院舊在太平府大信鎮宋淳祐六年守臣陳塏建為淮士流寓者肄業之所置田以養之九年呉淵奏請賜額理宗親書天門書院以近天門山故名後馬光祖牟子才江萬里相繼修葺增濓溪明道伊川横渠晦庵南軒東萊七賢祠元時漸廢至明遺址為鎮人所併萬厯二十二年知府顧汝學移建於城内青山書院之故基而拓之有孚化堂書舍五十六楹明末圮采石書院在府城北二十里采石鎮元至元十四年宣慰使張𢎞範剏建泰定間郡守賈煥山長楊伋重建堂齋門亭庖庫至正間亷訪使崔敬增修置田明宣德三年知府徐敬重修天啟間置采石兵營以書院為江防行署後同知梁斗輝復改為振采書院翠螺書院在府治太白樓後虞公祠側國朝雍正六年知府李暲新建置田以給學者丹陽書院在府東南八十里黃池鎮宋景定五年貢士劉某建郡守朱禩孫聞於朝賜額丹陽書院從漢郡名也元至大中憲使盧摯人匠提舉陳童置田六百畝以養多士附吳澄書院養士記黃池鎮有書院舊矣自宋景定甲子貢士劉君肇建郡守諸公以聞朝賜丹陽書院名額撥僧寺沒官之田二頃給其食厥後僧復取之書院遂無以養士至大戊申憲使盧公議割天門書院之有餘以補不足令既出㑹公去不果如令人匠提舉陳侯分司黃池暇日與羣士遊習知書院始末慨然興懐移檄儒司儒司上之省省下之郡郡太守主之力竟如憲撫初議俾天門書院歸田於丹陽以畝計凡四百侯猶以為未足以贍乃勸士之有田者數十家暨官之好義一二人各出力以助或十畝或五畝有八畝七畝者有四畝三畝二畝者積少而多所得之田以畝計凡二百噫丹陽書院之創垂五十年而敎養之闕餘十年今一旦有田六百畝盧公開其始成侯成其終盧公勉勵學校固其職也陳侯典治絲設色之工而用心儒敎有出於職分之外者尸祝越尊俎而治庖可乎唐風之詩曰職思其居又曰職思其外夫居者其分也外者其餘也唐風思之逺者也於職既盡其分而兼及其餘所思可謂逺也已陳侯有馬侯所勸率𨽻匠籍者五之一𨽻儒籍者十之八此豈以氣勢利害動而使從哉能得其心悦而樂助葢有以也非才之優識之定其孰能感人如是田之疆畝名數久則湮羣士請勒諸石而陳侯之功尤不可冺春秋常祀不書侯此舉非常也宜得書若夫士既有以養必知所以學是不待余言也侯名童單州人明天順間改為公館同仁書院在繁昌舊縣距今縣治四十里明萬厯二十五年知縣吳縝重建門廊堂寢二十三楹今圯廬州府孝肅書院在府城南濠内香花墩明𢎞治間知府宋鑑建以祀宋包拯嘉靖中御史楊瞻重修於南岸建屋數楹以居其子孫焉龍眠書院在舒城縣治東舒王祠西即宋李公麟龍眠山莊故址元至順中知縣爕理溥化建集師生為肄業之地附元揭傒斯記治民之道使民知禮義而已使民知禮義先示其所尚而已民知所尚則知所向方哉廬州舒城長爕理溥化用湖廣舉首取泰定四年第得茲邑首理學政咸用其學以敎導民民始益知人之所以為貴儒之所以為重而復知所以養生而送死居二年曰民其可敎矣乎如是又治地邑東得李公伯時龍眠山莊故基於東禪寺舒王祠西嘗沒於寺者據山川之會想昔賢之遊處乃㑹其禄入募工度功作書院以事先聖先師以為出治立敎之本不踰時而成凡殿堂門廡齋舍庖庫及李公之祠為屋三十有六楹以其靣對龍眠之山端嚴竒峻能出雲雨膏澤天下榜之曰龍眠書院且示不忘李公之故而邑賢者范鳯瑞割田二百畝以供祭養既告成於廟遂立之師進諸生而敎之凡民有來觀者必勸之以學是時上既撥亂集大命兵革未息鐖疫未復郡縣長吏能以荒政自任且不足遑知禮義之敎也而舒城勸分則出粟之家惟恐後民之强暴子弟一有弗若則父兄長老切責詬怒惟恐見絶於長吏休休焉日以興學為事舒之民卒無一人攜離轉徙者長吏豈獨賢民得其所以生者也舒著於春秋故山有春秋之山水有舒水始入於隨後并於楚其民勇而好義非獨舒為然楚之城皆然故楚常為强國最後宋室南遷賴其民蔽遮江淮幾二百年然當時學校之敎鬱而不施仁義之政厄而不行養生者不得盡其歡喪死者不得究其禮此非上之過長吏之責也今吾君既畀爾以賢長吏一以詩書禮義覺爾民民亦知所尚乎若曰升其堂陳其器設其牲齊而行其典禮如是而已此事聖人之疏節也非作書院意也舒之人尚其朂哉李公諱公麟邑人博學好古舉進士歴刪定及檢法官未老致仕蘇文忠黄文節二公嘗過其山莊故合祀於堂之北是役也建始於天厯三年之春而訖於改元至順縣學之明倫堂亦其所建也是嵗冬十月朔記正學書院在合肥縣學西明嘉靖間督學耿定向建敬一廣居大成三堂志伊學顔二軒又名廬陽書院今圮青陽書院在合肥縣東六十里巢縣之上因山為名元余闕讀書處水濓書院在廬江縣南門外明嘉靖三十年知縣何汝璋敎諭周以魯因池構亭繚垣築室聚徒講習其中今圮毛公書院在廬江縣東北七十里明嘉靖五年知縣周良㑹即漢毛義讀書處故址建以教鄉之俊秀者今圯楊林書院在廬江縣白湖之東七十里明嘉靖三十四年邑紳朱紱建聚族黨讀書其中朔朢伏臘鄉約正副等宣讀上諭申明鄉約鳳陽府西山書院在臨淮縣曲陽門外明嘉靖十三年知縣謝廷舉奉巡按張惟恕創建三十年知縣何立重修今無存鳳臨書院在臨淮縣西闗國朝康熙四十七年知縣王紘建捐俸延師課士初名啟䝉書院政餘即親臨提誨學者講為已切實功夫諭以正衣冠尊瞻視二語言簡㫖深人人可以自力聞風者自逺而至悉資之膏火改曰鳳臨書院至今弦誦不輟文昌書院在懐逺縣西荆山之麓明嘉靖十三年建後廢國朝康熙五十六年邑人李佺等重建雍正元年知縣唐暄加修每月朔朢率諸生講學課藝其中興學書院在虹縣治東南隅國朝康熙初知縣龔起翬建十六年知縣彭翼宸建文昌閣於後其前為星聚堂朔朢集諸生課業循禮書院在壽州治東北明署學正黃竒士建今改為梓潼觀潁州府西湖書院在府西湖之南宋歐陽修守潁樂其風土及致仕歸潁築室於此明嘉靖十四年兵備李宗樞判官吕景䝉即遺址建後兵備陳洙孔天映繼成之中為四賢堂祀晏歐吕蘇四公前為露臺後為梧月柳風堂最後面湖為勝絶亭今圮於河滁州南譙書院在全椒縣東南二里明嘉靖中給事戚賢建聚徒講學今圮景濓書院在來安縣南門外明太僕周海門倡明理學士翕然宗之萬厯十六年知縣周之冕因建書院集諸生講習其中和州峩􅖭書院在和州城西南隅峩􅖭墩舊為清風樓宋元祐中改為連雲觀明知州王􅈟改建峩􅖭書院以為生儒講學之所嘉靖元年同知薛祖學改為烈女祠十六年州判王朝用遷烈女祠於城南重建書院環峯書院在含山縣學宫東國朝康熙十四年巡撫靳輔檄各郡縣立書院為講肄之所知縣劉祚全始建此講堂書舍規模𢎞敞十六年署縣事通判黃際會於書院之右復設義學為塾師敎讀館廣德州復初書院在州文廟西北舊為元妙觀明嘉靖四年判官鄒守益徙觀於東郊即其址建書院以訓多士上為尊經閣下為明善堂東西翼號舍各十一楹置田三百畝以供學者萬厯間知州方沆陸長庚段猷顯李得中相繼修葺今圮茅茹書院在州學明倫堂東國朝康熙五年里人公建置田以為會課之費六安州龍津書院在州城武定門外一里舊為龍王廟明嘉靖六年知州歐陽德改建為格致書院後同知林華率諸生講習其中建廓然臺逺望數十里前為講堂左右列號舍扁曰龍津書院國朝康熙五十三年知州張璨訪遺址重葺泗州泗水書院在州城内國朝順治十年知州宋德芳建後守備陳某借為官廨康熙十二年知州李德耀别立營房而復之後為義塾今湮崇聖書院在盱眙縣第一山昔孔安國為臨淮守創立書院有先聖燕居殿今玻瓈泉即其遺址始興書院在天長縣治東明成化五年知縣易居仁建後為社學又改為公館同人書院在天長縣朱孝子祠東明邑人王心與門人吳恕等建以講讀後圮國朝順治初知縣李毓秀又於縣學西建之樓房㕔堂園圃畢備今亦漸圮江南通志卷九十
