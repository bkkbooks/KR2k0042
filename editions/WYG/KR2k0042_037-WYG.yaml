body:
  text: 欽定四庫全書江南通志卷三十八輿地志壇廟二祠墓附蘇州一府蘇州府社稷壇在府城盤門外風雲雷雨山川壇在盤門外勅建先農壇在郡學之東壇旁有耤田歲以仲春亥日行耕耤禮郡厲壇在虎丘山前縣曰邑厲里社鄉厲二壇在各鄉保關聖廟在府治卧龍街武狀元坊雍正五年奉㫖追封三代公爵同日祭於後殿城隍廟在府治武狀元坊勅建八蜡神廟在府城劉猛將軍廟在府城中街仁風坊以上壇廟所屬縣皆如制旗纛廟在府城齊門教塲内舊在蘇州衛治福吳富農龍神廟在府城元和縣署西雍正五年遵建至德廟在閶門内祀吳泰伯漢永興二年建於閶門外雁宕村南吳越錢氏移建於此明宣德中郡守況鍾修國朝康熙二十四年巡撫湯斌修附明周忱重修至徳廟記宣徳五年秋七月禮部郎中況鐘伯律奉璽書擢守於蘇州視事之日吏以囚牘進見民之繋於獄者凡千餘人尚爭務勝交相訐訟有經十餘載而未決者伯律姑置弗問越明日率郡之父老進謁於吳泰伯廟見其堂宇傾仆垣墉頽圯吏民奉事弗䖍乃喟然歎曰民不見德宜乎刑之不清也是非郡守之先務乎即日命工度材撤其舊而新之曰堂曰室曰門曰廡為屋凡四十楹繚以周垣堅以甓甃不十日而告成復率父老潔牲醪祗祀於廟居人過客瞻望咨嗟於是獄之繋囚交相愧悔曰泰伯以天下讓民無得而稱焉吾輩所爭僅錐刀之末耳何重貽郡侯之羞乎皆相與俯伏庭下自服其辜不數日而獄以空虚告予時奉命巡撫於江南列郡至蘇州祗謁祠下父老以其事告且曰昔者狄梁公以冬官侍郎為江南巡撫使毁吳楚淫祠千七百所而此廟則在所留而不毁者去今千年得吾郡侯葺而新之巡撫之來又適當其時吳民觀感興起自今其無復爭競之風乎予乃登其父老而告之曰方泰伯之奔呉也斷髪文身示不可立然荆蠻義之從而歸之千餘家遂端委以臨其民是欲辭富貴而富貴隨之及其後世夫差狃於必勝窮兵黷武破楚困齊欲霸天下卒之國亡身戮妻子為虜是欲求富彊而失其富彊矣然則吳地數千年之富庶由泰伯之三讓有以致之也其鬭爭之成風者亦由夫差之好勝有以啟之也爾民欲為泰伯之讓乎欲效夫差之爭乎一則廟食萬世一則貽笑千載其得與失必有能辨之者孔子曰能以禮讓為國乎何有則予與太守期望於吾民之意父老曰善請以是為記遂書於麗牲之石使四方之來謁者咸有所觀感而興起焉豈獨蘇州之民而已哉周康王廟在府治市曹橋相傳晉隋間嘗戮人於此因立廟取成康刑措意夫差廟在姑蘇山東北又常熟崑山皆有廟祀水平王廟在西洞庭消夏灣祀太湖水神水仙廟在子城東南祀古蒼龍神相傳即柳毅也又一在城西雁宕村春申君廟在府城内西北祀楚黄歇蕭王廟在府治樂橋祀漢蕭何㑹稽太守廟在府治穹窿山南祀漢朱買臣韓將軍廟在府治官瀆橋南祀漢韓說顧元公廟在府治黄天蕩東祀晉驃騎將軍顧榮東山廟在府治虎丘山祀晉司徒王珣西山廟祀王珉又崑山景德寺亦有司徒祠聖姑廟在包山晉王彪二女有靈異相繼卒後人祀之靈濟廟在府治陽山澄照寺祀白龍神宋熙寧間建韓蘄王廟在府治南禪寺左妙隱菴祀宋韓世忠明嘉靖中建舊在靈巖山西麓者今圮忠烈廟在府治天平山白雲寺宋范仲淹先祠周孝子廟在府治大街祀宋周容楊和王廟在府治習義鄉祀宋將楊沂中晏公廟在葑門西營内神在元時嘗陰翊海運封平浪侯羊太守廟在府治烏鵲橋南祀宋羊元保太湖廟在吳江縣南醋坊橋側祀太湖神順濟龍王廟在吳江縣長橋盛將軍廟在吳江縣三都西祀三國吳司馬盛斌赤烏初斌有功於吳江卒後邑人即墓立廟昭靈侯廟在吳江縣治東祀唐刺史曹王明明唐太宗第十四子為吳郡有惠政周將軍廟在震澤縣七都祀三國吳周瑜巫咸廟在常熟縣致道觀祀商相巫咸劉太尉廟在常熟縣虞山西祀宋將劉錡靈惠廟在常熟縣治東南祀周孝子容惠應廟在崑山縣馬鞍山之陽祀崑山神唐中和二年建宋崇寧間賜額婁侯廟在崑山縣婁縣村祀吳陸遜張昭遜昭先後封婁侯張公廟在崑山縣東南三十里祀宋張方平雙忠廟在崑山縣内祀明季殉難山西巡撫蔡懋德隨州知州王燾忠義祠節孝祠俱在府城内各縣俱如制古聖祠在府治葑門祀逸民朱張季子祠在府治西南錦塢峰下祀吳季札元至正間建闕里分祠在長洲縣孔氏六十六世孫興豫建祀孔子復聖祠在府治楓橋西十里祀顏子宋元豐中建今圮言公祠在學道坊祀子游亞聖祠在東禪寺西祀孟子明萬厯中建伍相國祠在胥門祀伍員舊在盤門内明萬厯中裔孫伍袁萃移置今所又有祠在東洞庭山附明陳瑚伍公廟記吾郡東洞庭山楊灣里有伍公子胥祠焉公之廟食兹土也久矣當夫差之賜死浮之於江吳人憐之立祠江上名之曰胥山今去郡西三十里地入太湖名胥口者即其處祠尚存而祠前古墓松檜參差相傳以為公葬其下楊灣之祠則里人奉為土神有事禱焉而又稱之曰胥王廟王爵之封始於宋髙宗南渡時後人由此遂仍其號云壬子夏山中士周宗魯述其建祠本末屬予記之伐石以俟今天下佛老子宫所在都有國家禁令扞格不得行而吾吳習俗楞伽之山無少長男女舟車鼓吹奉牲醴以徼福者春秋無間日至於聰明正直而為神者則或黍稷不馨廟貌不治淪落於荒烟蔓草之中嗚呼不有君子何以反其俗也唐狄梁公廢江南淫祠而公之廟獨與大禹泰伯季札竝垂天壤者何哉予嘗考公之為人其始也出萬死一生忍怨數十年而卒行其志其既也竭心於所事犯顏强諌被讒殺其身而不悔由前言之則為孝子由後言之則為忠臣豈非砥柱人倫而爭光日月者哉往者巡撫大臣治舟師習水戰大閲於胥口祠中必祭告然後入萬厯間某巡撫不禮公坐少頃若有撻其背者嘔血歸竟死一武弁守洞庭矢溲公墓旁入舟狂呌不踰時亦死乙酉秋黄蜚兵泊太湖將不利於洞庭夜見神火滿山疑有偹也不敢動葢其靈異如此嗚呼公之精誠氣燄足以感人者赫赫在天地之間豈其與山魈澤怪較長短爭有無而喑啞叱咤以禍福驚動恐懼人以食其土然匹夫匹婦多好以此稱公予故不得而畧也於是書其事而系之銘曰烈哉伍公萬夫之雄以子則孝以臣則忠没為明神簡在蒼穹楊灣之里洞庭之東波濤喧豗草木䝉戎其來如雲其去如風神所憑依環堵幽宫孑孑周生即鹿林中震不於鄰而於其躬卜告於廟後吉先凶信而有徵神誘其衷乃樹斯碑酬德報功於千萬年廟食攸崇二戴祠在虎丘山祀漢戴德戴聖康熙間建徐南州祠在府城天妃宫前祀漢徐穉任使君祠在天慶觀祀漢㑹稽都尉任延陸内史祠在府治益地鄉祀晉陸雲慧感夫人祠在承天寺夫人陸氏梁衛尉卿僧瓚女僧瓚捨宅為寺寺祀夫人為伽藍神號聖姑潘博士祠在府治齊門東匯祀隋潘徽五賢祠在虎丘山平遠堂祀唐韋應物白居易劉禹錫宋王禹偁蘇軾明萬厯中建陸宣公祠在府治五龍堂巷祀唐陸贄韋蘇州祠在府學内左偏祀唐刺史韋應物宋景祐間建甫里先生祠在府治東五十里角直鎮祀唐處士陸龜䝉宋嘉定間建元至正間重建蘇公祠在府治滄浪亭祀宋蘇舜欽國朝巡撫宋犖增建韓魏公祠在至德橋南書巷内祀宋韓琦吕東萊祠在府治𤣥妙觀前祀宋吕祖謙范文正公祠在府治義宅東祀范仲淹宋淳熙中建明宣德中郡守況鍾重建胡安定祠在府治潘時榮巷祀宋胡瑗二程祠在虎丘東祀宋程顥程頤國朝康熙九年建魏文靖祠在府治南宫坊即鶴山書院祀宋魏了翁初賜第蘇州即書院為祠明宣德間改為巡撫公署𢎞治中復建於左偏朱文公祠在府治祥符寺巷祀宋朱子張公祠在府治北寺東祀宋張載宋公祠在府治閶門外祀宋宋恭朱公祠在府治葑門祀宋朱夀昌劉公祠在府治大街祀宋劉子翬劉子羽劉鞈劉珙滕忠節祠在府治草橋祀宋滕茂實明洪武間建張都南祠在府治狀元坊祀宋張日中周武公祠在府治濂溪坊祀宋死節周興裔濂溪四世孫潛公祠在范文正公祠内祀宋端明殿學士平江知府潛說友咸淳間建魏給諌祠在虎丘祀宋郡守魏庠蔣宻直祠在虎丘祀宋郡守蔣堂三公祠在府治承天寺祀宋郡守吳淵吳潛趙與范文穆公祠在石湖上祀宋參知政事范成大附明王鏊記昔在有宋吾蘇入參大政者有兩范公文正當仁宗時開天章閣求治更張庶政將大有為未一年以小人不恱罷文穆當孝宗朝在政府兩月末及有為以言者罷前宋之冶莫盛仁宗南渡後莫盛孝宗皆銳意太平二公皆以身許國可謂千載之遇而皆不能少試其志嗚呼忠良不容於時自昔已然獨二公乎哉文正子孫在吳中最盛所謂歳寒堂者有司春秋享祀不絶而文穆之後無聞焉觀其使金爭受書之儀舉朝皆悚有蘇子卿嚼雪之操繳還閣門張說詞頭有陽城裂麻之忠奏罷明州海物之獻葢以孔戡之政同其在成都閲兵築戍奬勵名節間與陸務觀諸人賡倡風流餘藴漸被岷峨而吳中民風土俗人情物態纎悉備見其詩用世之具素講於胷中而時莫之用非其君不用而小人尼之嗚呼其可惜矣吴城西南十里有浸曰石湖山曰呉山湖山之間廢壘隱然即所謂越城也文穆之别墅在焉其境最勝周益公謂天閲絶景以與其人而數世之後求其彷彿不復得所謂夀櫟天鏡閣玉雪坡皆已湮於荒烟野蔓之中過者傷之而孝宗宸翰碑石巍然獨存御史盧君雍家越來溪上少時數過其地與其弟約曰他日且將爼豆文穆於斯及為御史始克如志正德庚辰六月廟成肖公像於中移阜陵手書陷置壁間以辟風日歲時享祀如儀乃屬予記其事鄭所南祠在府治能仁寺内祀宋鄭思肖國朝順治間移置廣生庵金仁山祠在府治天妃宫前祀元金履祥顧原魯祠在府治卧佛寺東祀元顧愚附明瞿景淳記顧原魯先生者蘇之崑山人也先生元末天下兵起學士大夫爭竄山澤亡棄故時業先生獨抱墳籍隱居海上誦讀不輟學者稱為原魯先生𢎞治中先生所居鄉分𨽻太倉祀太倉州學迨先生四世孫封給諌海隱公徙長洲復立専祠於郡城故復迎先生主妥新祠扁曰濓洛遺儒云太史氏曰余嘗觀古今人物雖公卿侍從以功業著者亦相望於世而儒之醇者則曠世不數見豈非儒之難其人哉孔孟之後數千年而得周子河洛二程復羽翼之斯道始明說者謂有以接孟氏之傳迄今復數百年接濓洛之傳者考亭朱子之外不多見道在人心不容終亡元末乃得原魯先生余竊有感焉方髙皇帝之初一新文命招選儒碩共定朝章先生嘗一至京師訪所延儒生復遯跡海濱不應有司貢舉嘗聞之故老先生讀書必正冠服終日端坐更寒暑無惰容所憑几兩肱迹入木寸許其觀經史多所箋釋不泥成說今所著述不可復見葢散逸多矣嘉靖初年詔錄所在野史有司從故老言乃舉祀州學後郡守金公城復斥吳縣卧佛寺東隙地建専祠葢以風勵來學且使先生子孫家吳城者得便瞻謁云給諫君考論世德每恨於文籍之無徵然先生去今餘二百年故老稱篤學好禮者猶必曰原魯先生則先生之所養可想也余嘗病漢初去古未遠先王之教猶未息漢之儒者乃僅得張良叔孫通其人豈秦人坑焚之後世果無真儒亦有之而深藏不出焉言論風㫖不概聞於後也乃今以原魯先生推之世固有黙㑹道真不求人知者矣先生殆其一也謂朱子之後濓洛之學不傳是斯道有滅息之時而重誣吾人也可乎哉今給諌君復講學不怠顧多君子斯道重有頼矣先生諱愚封給諌海隱公諱啟明海隱公淳厚博雅亦祀郡學今祔先生祠給諫君名存仁堂成於某年月日行吳縣給帖蠲差者督糧叅政餘姚翁公大立云表忠祠在府治雍熙寺西祀明遜國忠臣姚善黄子澄二尚書祠在府胥門外胥橋祀明夏元吉周忱明𢎞治中建今圮又有周文襄祠在寶林寺内況公祠在府學祀明郡守況鍾正統間建陳僖敏祠在府城鐵瓶巷祀明左都御史陳鎰成化中建國朝康熙間改建巷北韓襄毅祠在府學東祀明韓雍嘉靖間建王文恪祠在府治舊景德寺祀明大學士王鏊周忠介祠在府治衛西祀明周順昌崇禎時建徐公祠在府治祀明徐汧國朝潘耒重建徐宫詹公祠碑人之自致不朽者惟此忠孝大節孤行於天地間而善俗維風亦常以勸忠教孝為先務故勝國之忠節往往表彰於興朝若周世宗之旌劉仁贍宋藝祖之褒韓通明太祖之表余闕竝為贈官立祠而齊髙祖勅史臣為袁粲立傳元修宋史亦具載文陸諸人葢忠於所事而殉之以死者人臣之極則褒忠録節以扶植綱常者古今之通義身殁而名存事久而論定正氣憑焉不可得而磨滅也前明末造朝臣死忠者班班可考而吾吳則宫詹勿齋為最著公自為經生時即以希聖希賢自淬厲入詞苑為講官正色立朝風節與文文肅姚文毅相上下北都之變公方家居不即死比聞金陵不守指池水謂人曰江萬里吾師也卒自沉以死天下稱純臣焉公殁四十餘年而潛庵湯公來撫吾吳為公建専祠於虎丘載在祀典有司春秋致祭崇德報功甚盛典也已而徐氏有敗類之孽竄入其中姦民從而誘之遂至毁像撤屋盡售諸人於是徐之宗老暨郡人士控於中丞于公下長邑覆勘乃正厥罰主持其事者郡紳咸集而侍講訪濂彭公之力為多第毁祠之罪雖懲而復祠之資未辦㑹彭公有編纂之事於維揚言於銀臺曹公首捐厚資兼諭所屬佽助得祠費太半於是郡士大夫協力裨補不日落成以虎丘故址頽陷改築於長洲學宫之東偏祠屋三楹中奉宫詹公旁以許顧兩文學配許先生玉重聞燕京之變行哭三日自縊福清觀不死投胥江不死絶粒七日死顧先生東湖當金陵變後自縊學宫不死復赴水死兩先生以布衣諸生而慷慨殉國人尤賢之用配宫詹公忠臣烈士叅列一堂宫詹公有子昭法先生亦以清操介節見重於世稱真孝廉中丞于公别致褒奬祀諸鄉賢殷禮竝稱聞者興起夫庠序之設所以明人倫也至性人人本具聖賢人人可為處變處常各有當盡之道母曰俎豆學宫非吾儕事其可也耒少受業於孝廉先生備聞世德幸祀典之再光公論之不泯也謹叙述其始末云三髙祠在府治華山下祀明趙宦光王在公朱鷺景賢祠在府治堯峯資慶寺祀明吳寛附明申時行記吳郡城西二十里許峯巒林壑幽奇瓌麗之觀不可勝數吳山最勝從吳山折而南衡岡叠巘蜿蜓崒嵂者不可勝數堯峯最勝堯峰有寺曰資慶葢宋建云或曰在晉為免水院故堯時民避水處云寺據山巔俯瞰笠澤縹緲莫釐諸峰在襟帶間懸崖仄徑凊泉秀石葢堯峰之勝盡在於是然歲久荒落去城闉絶遠冠葢屐履之遊不至即至不數數也余友周公瑕氏遊憩山中酌寶雲泉而甘之將作亭其上未果久之覩一像廡間黯黯不辨類非神佛者怪之以問寺僧僧曰嘻此故宗伯吳文定公像也往公讀書結社於此登朝乃去寺且圯矣賴公垣之而新故肖貌為祠以報而祠竟燬獨遺像存焉然莫能復也公瑕則慨然曰吁有是哉曩吾師衡山先生嘗及公門其言論風㫖相似推本言之公吾師之師也且夫復廢宇還舊觀以景先哲報德舉意庶其在此吾力能成之乃出資貿材涓辰庀役既成則奉文定公像居其中以衡山先生配而買田若干畝畀寺僧掌之曰令世世香火之奉與兹山俱永毋絶也公瑕遊京師語余請顏其祠余命之曰景賢且記其事語曰髙山仰止景行行止雖不能至然心嚮往之曩文定公匏庵先生以耆宿任公卿至貴重然恭謹無與比與人言未嘗不推轂當世之賢士衡山先生聲滿天下兒童婦女莫不知名而退焉若無能者其奬後進游揚薦達惟恐不及葢先輩之典型如是當是時吳俗斌斌乎可觀矣自二先生往而吳俗凡幾變垂紳側弁之士斷斷如也繇斯以觀二先生之系世道豈淺鮮哉然二先生者不獨薦紳家稱之而遺民故老能傳其事不獨俎豆學宫之上而深山窮谷能妥其靈不獨邦居大夫尚知禮於其廬而及門私淑之士至於尸而祝之低囬瞻戀而不能去則以見二先生之賢而景仰之在人心無窮已也有能惕然追慕二先生之風而曠然一變乎頽俗豈不為世道之幸與此殆公瑕建祠之意不獨報其私巳也書以俟之翰林王公祠在長洲縣祀宋長洲令王禹偁天禧間建和靖先生祠在元和縣虎丘西庵祀宋尹焞焞嘗讀書於此有三畏齋明嘉靖間重建忠烈祠在元和縣乗鯉坊祀宋文天祥明嘉靖中建附明王鏊序忠義之在天下未嘗亡而宋世以身殉國能信大義於天下者視前代為獨盛而文丞相之死尤偉且顯其許國之忠屢躓而奮百挫不回至於今愚夫稚子皆知其為烈也夫死一也有重於太山有輕於鴻毛則所處者異耳是故非死之難處死為難若公可謂善處死也自古以死殉國者皆居其官死其職事也方元兵渡江詔徵天下勤王無一人至者公於時出知遠州非有天下之責乃獨慨然奬率三軍毁其家以殉國其氣固巳凜然葢天下矣及挺身出使被執而逸流離江關山棲海竄卒達行在當是時宋葢亡矣猶號召義旅克復州縣軍敗身執志在必死祈死不死卒致之燕雖元之君臣亦皆嗟歎其賢必欲生之不得卒得死柴市從容南向有若平時葢成仁取義公志素定於中非若倉卒履變慷慨殺身之為此公之死所以獨異而其節尤偉且顯者讀其傳誦其詩悲其志想見其人嗚呼雖與日月爭光可也公之起則知平江常州受圍公遣兵援之會詔趣入衛公去而平江旋送欵矣使公不去平江必能與常犄角常猶戰不屈公其有不能乎二州力勢或可支即不能支亦當背城死戰元兵不敢長驅臨安得徐為之備不至倉卒旁皇一旦猝而為辱也其後公過吳門感念悽悽遺民聞公至無不垂涕者於此見公之惓惓於吳吳人之不能忘公也公既死燕京廬陵皆祠而吳獨缺太僕少卿文君森其先自廬陵徙衡山自衡來吳葢公之裔胄也子斗願以其地作廟世守其祀巡按御史謝君琛以聞詔可賜其廟曰忠烈有司春秋享祀如禮正德十年夏廟成請予紀其事於石以詔來裔焉銘曰嘻吳故墟有巍新宫宫祀為誰丞相信公崎嶇嶺海百死無二卒死於燕卓哉正氣公身可殺公志莫折於萬斯年其志烈烈撑拄乾坤昭掲日月惟忠惟義率土嚮之況兹吳門公所素治公治於吳不能百日公惠在吳終古不没公嗣公遺後復吳居作廟掲䖍帝命曰俞綱常民彞弗渝弗墜享祀千秋為世臣礪國朝鄭敷教有記大宋養士三百年國亡死事之臣甚烈文丞相信國公實首稱焉百世而下祀公於所生之鄉所死之地所經厯之境幾徧方域矣其勅建於吳中也自正德六年辛未始也公昔勤王之師常開閫平江既係燕獄有集杜詩二百首如自作年譜其叙蘇州云予領兵赴闕時陳宜中歸永嘉留丞相夢炎當國夢炎意不相樂出予以制閫守平江尋以獨松事急趨還宿衛予行未㡬姑蘇陷哀哉公葢一日不能忘姑蘇而蘇州之人心百世不能忘公有以也其奉勅改建於學宫自嘉靖二十年辛丑長洲縣學既遷之後公之後人待詔公徵明書正氣歌於堂之壁生氣凜然惟公之學一歸於孔孟殺身成仁舍生取義以公衣帶中所藏立公位於孔氏之庭豈曰時會使然葢亦至聖大賢精英有以相盪也自辛丑至萬厯乙卯厯七十餘年而祠宇日圮邑宰胡公士容謀於公後人孝廉震孟重修之後孝廉亦以狀元位至相國風節義概能繩其武云自乙卯至今庚戌又五十餘年而傾圮者鞠為草莽矣其裔孫世光謀助於一時好義之人心則顧考功予咸實首倡之濱死以屬其後人而堂宇重新焉葢予讀宋史至信國公事及井中心史所載文丞相序未嘗不骨顫魂揺有甚於謝翺之慟哭也公嘗謂大宋三百年宗廟社稷為賈似道一人所破壞於乎何後世似道接迹而如信國公者虚無人信國公之靈其必有恫乎不寧倍於昔日者乎祠之始建再建聞於朝重修也輸於官今煢煢興起於不振之子孫與夫好義之人心是可悲也已雖然今日而猶可興起也即人心為足恃而我公日星河嶽之精英為不磨也夫陳五經祠在元和縣圓橋巷祀明檢討陳繼國朝潘耒有記前明仁宗時吾郡陳先生繼宋文忠公堯叟之裔明州判篆之九世孫父經厯公汝言卒於濟南官舍先生生甫十月母吳夫人抱之還吳家徒壁立躬自紡績撫且教之既長乃從名師碩儒游沖然即有所得凡於義理之歸皆體察而究明之家日益貧學日益富與其德配金孺人墾鋤廢地以致其孝養躬耕樂道若將終身維時仁宗欲求鴻儒講論治道少傅楊公士奇舉先生於朝授翰林院五經博士宣宗嗣位命修兩朝實録攷覈為當立朝多所講明輔臣喜得資助晉官檢討將大用之以年老疾作上疏乞歸前後從先生游者凡數百人皆經明行修闡揚師說可以信今而傳後先生之德為不孤而學之所被者廣豈非中流之一柱而為吾儒所宗主者乎先是先生神位於前明時奉於郡庠鄉賢祠中未有専祠以馨俎豆康熙二十九年先生之世孫瓛及圭等請於中丞洪公建祠於長邑之懸橋里載之祀典俾瓛輩奉其禋祀以垂不朽於是文孫書梓其家乗索詞於耒以鑱諸石此不獨陳氏子孫登斯堂而思祖德以持其身鄉之人士其有不觀感而興起者哉是為記申文定祠在元和縣流化坊祀明大學士申時行韓宗伯祠在元和縣祀明韓世能三賢祠在元和縣虎丘山祀明文震孟姚希孟陳仁錫又有陳文莊祠在虎丘山寺西専祀陳仁錫國朝汪琬陳文莊公祠堂記前明南京國子祭酒贈詹事陳文莊公之没也是為崇禎七年閲十年其長君濟生獻公所著書於朝始予贈諡追録其子一人建専祠以祀於是偕其弟濟楨卜地建祠於府治卧龍街歲月且久有司時節往祀輒歎其宻邇市寰湫隘不足以稱也乃謀遷於虎丘得民居若干楹間而更新之門廡壯麗堂寢崇宏其旁則餕食有所庖湢有廬又其旁則有廩有倉凡文莊公所置贍族義田若干頃及祭田若干畝其所得歲租悉出納於此葢其地山川之雄秀林陸之亢爽烟雲竹木之靚深實稱神明所棲非故祠比工已告成次君濟楨復聚族謀曰維兹麗牲之碑闕焉無辭以刻非所以妥先靈而示子姓也乃來謁某為文某自惟鄉曲晚進未及登公之堂而受其學顧少而嘗從兩公子游倘獲挂名碑尾附公以不朽固素願也遂不敢禮辭謹按劉念臺黄石齋兩先生所撰文莊公家傳每言公之在熹宗末也以講官負重望㑹逆奄魏忠賢父子冒功求給鐵券公當草誥詞忠賢屢遣使趨公公奮曰首可斷誥不可草由是觸忠賢怒興妖人孫文豸獄牽連及公竟削籍以歸數揚言殺公慬而得免嗟乎間觀史所載宦官之禍無世蔑有殆未有如漢唐及前明之甚者也然而漢之亡也以十常侍唐之亡也以北司是直宦官與士大夫為難耳前明則不然君子小人雜然竝立於朝日夜分門户求傾軋而小人遂借刃於宦官以戕君子此其過在士大夫非専屬諸宦官也當是之時吾郡被禍最酷不幸而死則有周忠介忠毅兩公幸而生則有公與文文肅姚文毅三公夫兩周公之死非輕生也公與文姚之生非避死也皆天也天之死兩周公所以伸忠臣之節也其生公與文姚諸賢者所以養直臣之氣也假令諸賢悉畢命於鋃鐺桁楊之下則國無人焉吾見夫靦顏䝉面絶無顧恤嘑九千歲之不已必至於九錫策九錫之不已必至於勸進亦何所畏忌而弗敢為耶此公與諸賢之幸存係於前明宗社非小也某故曰天也由今思之向之號為義子義孫者其威福勢燄非不盛且熾也曾㡬何時而俱歸於澌盡泯滅雖下訖於婦人豎子亦往往㦸手恣口指斥其姓氏以為詬厲而公與諸賢獨名在天壤能使言之者太息聞之者興起然則君子小人其獲報於天者又孰為愈哉今且距公之没踰五十年矣四方士庶往來虎丘者登其祠而拜瞻其袥主有不欷歔俯仰想見公之風聲氣烈徘徊不去者乎吾知其必無是也祠成於康熙十九年又三年某始為之文至若公之述作巳行於時其家世生卒之詳已見於劉黄兩先生所撰者槩不復詮次云公諱仁錫字明卿天啟壬戌科進士第三人由編修厯官南祭酒别自號芝臺學者稱芝臺先生忠孝龔先生祠在元和縣中臺基祀明龔元祥張公祠在元和縣虎丘白公隄祀明張國維二姜先生祠祠臨虎丘山古鶴澗祀明姜埰姜垓女金剛祠在支硎山祀明烈婦張士伯妻陳氏崇禎時建宋文恪祠在元和縣虎丘山祀國朝大學士宋德宜顧孝子祠在元和縣虎丘山塘祀國朝顧天朗聖祖御書賜孝靖二字額甘泉祠在吳江縣治南六里祀龍神三髙祠在吳江縣釣雪灘祀越范蠡晉張翰唐陸龜䝉附宋范成大記乾道三年二月吳江縣新作三髙祠成三髙者越上將軍姓范氏是為鴟夷子皮晉大司馬東曹掾姓張氏是為江東步兵唐贈右補闕姓陸氏是為甫里先生三君生不竝世而鴟夷子皮又嘗一用人之國功大名顯而去之季鷹魯望翛然臞儒使有為於當時其所成就不可逾度要皆以得道見微脫屣天行清風峻節相望於松江太湖之上故天下同髙之而邑人獨私得奉烝嘗以誇於四方邑大夫趙伯虚以故祠為陋將改作鄉老王份獻地雪灘乃築堂其上告遷而奠焉且屬石湖范成大為之辭噫不有君子其能國乎今乃自放寂寞之濱掉頭而不顧人又從而以為髙此豈盛際之所願哉後之人髙三君之風而跡其所以去為世道計者可以懼矣至於豪傑之士或肆志乎軒冕宴安留連卒悔於後者亦將有感於斯堂而成大何足以述之然屈平既從彭咸而叢桂之賦猶招隱士凝若幽處林薄不死而仙況如三君蟬脫溷濁得全於天者嘗試倚楹而望水光浮空雲日下上風帆烟篷飄忽晦明意必往來其間成大亦何足以見之姑效小山作歌三章以招之焉遂從而歌之歌曰若有人兮扁舟撫湖海兮遠遊衆芳媚兮髙丘忽獨君兮不可留長風積兮波浪白蕩摇空明兮南北一色鏡萬里兮鞭魚龍列星剡兮其下孤篷顧懐兮斯路與涼月兮入滄浦戰爭蝸角兮昨夢一笑水雲得意兮垂虹可以艤棹仙之人兮夀無涯樂哉垂虹兮去復來載歌曰若有人兮横大江秋風起兮歸故鄉鴻㝠飛兮白鷗舞吳波鱗鱗兮而在下嗟人奚為兮天地四方美無度兮吾之上膾修鱸兮雪霏登菰蒓兮芼之水山續兮胥命君可望兮不可追頫倒景兮揮碧寥娱宴息兮江又之臯菉蘋堂兮廡杜若一杯之酒兮我為君酌歌曰若有人兮北江之渚披雲而晞兮頮烟雨菊莎兮把棘歲晼晚兮何以續君食偭五鼎兮腥腐羞三泉兮終古千秋風露兮歸來故墟月明無人兮蒼石與語牛宫洳兮生蒲荷潮東西兮下田一波訪南涇兮鄰曲山川良是兮丘隴多稼九畹兮今其刈聊舂容兮兹里諸葛武侯祠在吳江縣薛步村顧公祠在吳江縣北門外三里橋側祀晉顧野王三忠祠在吳江縣長橋祀吳伍員唐張巡宋岳飛吳孝子祠在吳江縣祀明孝子吳璋沈太常祠在吳江縣後祀明沈漢周相國祠在吳江縣治東祀明周道登周忠毅祠在吳江縣永定橋祀明御史周宗建周恭肅祠在震澤縣上塘祀明周用清權祠在常熟縣虞山北麓祀虞仲吳公祠在常熟縣學大殿後祀子游又文學書院在縣東康熙四十四年御賜文開吳㑹四字扁額附宋朱熹記平江府常熟縣學丹陽公祠者孔門髙弟弟子言偃子游之祠也按太史公記孔門諸子多東州之士獨公為吳人而此縣有巷名子游橋名文學相傳至今圖經又言公之故宅在縣西北而舊井存焉今則雖不復可見而公為此縣之人葢不誣矣然自孔子之没以至於今千有六百餘年郡縣之學通祀先聖公雖以列得從餟食而其鄉邑乃未有能表其事而出之者慶元三年七月知縣事通直郎㑹稽孫應時乃始即其學宫講堂之東偏作為此堂以奉祠事是歲仲冬長至之日躬率邑人學士大夫及其子弟奠爵釋菜以妥其靈而以書來曰願有記也熹惟厯代之前帝王之興率在中土以故德行道藝之教其行於近者著而人之觀感服習以入德者深若入勾吳之墟則在虞夏五服是為要荒之外爰自泰伯采藥荆蠻始得其民端委以臨之然亦淑慎其身而虞虢之後相傳累世乃能有以自通於上國其俗葢亦樸鄙而不文矣公生其間乃能獨恱周公仲尼之道而北學於中國身通受業遂因文學以得聖人之一體豈不可為豪傑之士哉今以論語考其話言類皆簡易疏通髙暢宏達其曰本之則無者雖若見詘於子夏與要為知有本也則其所謂文學固宜有以異乎今世之文學既又考其行事則武城之政不小其邑而必以詩書禮樂為先務其視有勇足民之効葢有不足為者至使聖師為之莞爾而笑則其與之之意豈淺淺哉及其取人則又以二事之細而得滅明之賢亦其義氣之感黙有以相契者以故近世論者意其為人必當敏於聞道而不滯於形器豈為南方之學得其精華者乃自古而已然也耶矧今全吳通為畿輔文物之盛絶異曩時孫君於此又能舉千載之闕遺稽古崇德以勵其學者則武城絃歌之意於是乎在故熹喜聞其事而樂為之書至於孔門設科之法與公之言所謂本所謂道及其所以取人者願諸生相與勉焉以進其實使此邑之人百世之下復有如公者出而又有以一灑夫媮懦憚事無廉恥而嗜飲食之譏焉是則孫君之志而亦熹之願也公之追爵自唐開元