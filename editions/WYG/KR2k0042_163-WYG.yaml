body:
  text: 江南通志卷一百六十四人物志儒林二州安徽寕池太廬鳳潁八府和廣六三安慶府南北朝宋何尚之字彦德潛山人雅好文義為文帝所知為丹陽尹立宅南郭外設學聚生徒四方慕義來㳺者謂之南學累遷吏部尚書尚之立身簡約車服率素妻亡不娶執衡當朝畏逺權柄卒諡簡穆齊何佟之字士威潛山人少好三禮師心獨學疆力専精手不輟卷為京師碩儒仕齊為國子博士遷驃騎諮議叅軍國家吉凶禮皆取决焉所著文章禮義百餘篇元王幼學字行卿望江人生於宋季幼罹兵禍俘掠至河南陳氏得之養以為子乃命之學勤苦博覽業遂大進元至元間歸望江躬耕慈湖之坂與同志講道不輟所著有通鑑綱目集覧盛行於世方用字希才望江人少負逸才與揭徯斯朱公遷歐陽𤣥同㳺許白雲之門以羽翼斯文相砥礪時稱許門四傑所著有先儒宗㫖茗谷叢説諸書明程桯字用慿懷寕人積學勵行設教里中逺近就學者前後數百人耑以踐履篤實為務嘉靖中舉眀經為臨武令有惠政何唐字宗堯桐城人少孤貧沉潛有大志正德辛巳進士年二十即以斯道自任授南兵部主事有直指餽金虞其弗受戒使者致而去唐欲辭不得嘆曰吾邸安得宿此乃易錢周九市之貧者曰代直指為惠耳後因事忤中貴告歸凡從㳺者告以稽古眀道立法善俗為先慕曾子之學作日省錄學者稱省齋先生金道寓字晴嵐潛山人少孤以學行著聲搆竹浪館率諸弟姪讀書其中晚年精心濓洛之學著有朱陸異同辨竹浪館文集弟道心亦端恪醇雅過人金道器字達生潛山人性嗜學博極羣籍破産積書朝夕沉涵其中初宗陸子静以簡易悟入後豁然曰無戒慎功終屬影響自是専讀朱子書因知德性不能離問學而耽空守寂不但背程朱之門庭亦非象山之初㫖也晚年學益醇深㳺於詩字二南懷寕人事親孝日夕侍膳親食然後敢食以諸生入太學時盱江羅近溪為海内儒宗千里負笈受業其門與金陵焦竑輩結為里社開示後學倣朱子立義倉七楹於其鄉凶歲賴以全活者數百家余榮臺潛山人少從從父皖川講學長而設教授徒以省身克己為要著有克己錄四書辨疑性理集成諸書顔素字質卿懷寕人自少講求性道毅然曰聖人可學而至也萬厯甲戌進士授中書丁内艱遂不復出結廬石門窮究古今尤邃於易其學以易簡直截見性為宗所著有易研及詩文數卷仕至應天府丞呉嶽秀字幼鍾懷寕人萬厯庚辰進士授中書舍人與同年顧憲成輩講學東林以道徳文章相礪遷給諌直聲震天下卒以忤權貴出為右布政尋乞歸築方丈一室改號遯齋晚年謂湛若水先生隨處體認天理之語為學者入聖之門大書於室用以自警童自澄字定夫桐城人萬歴間布衣初見張甑山即毅然志學嘗自言曰泰州起布衣為餘姚髙弟彼丈夫也遂篤志聖賢交四方講學之士弟子彌衆建輔仁㑹館於棕棲之坐卧一小樓怡神養氣年八十四卒呉應賓字尚之桐城人母孫夢飛星入口而生少穎異日誦千言比長博覽羣籍登萬歴丙戌進士官編修以目眚告歸家居四十載惟閉户著述闡發性命之旨同里左光斗方大任交章以理學薦特召辭不赴上疏極論時政上嘉之著宗一聖論十篇性善二書學庸論語釋行世方鯤字羽南桐城人少為名諸生長而研求經學謂詩文小道非儒者所急㑹豫章葉兼山講易桐城鯤盡得其學推河洛縱横之圖以測古人制樂用兵之法黄道周何楷見之嘆以為從前所未有也方學漸字達卿桐城人志洛閩之道講學桐川秋浦間揭性善之㫖弟子嘗數百人方大鎮字君静學漸子萬歴己丑進士歴官大理少卿與同志講學於京師首善書院㑹羣小排斥毁之大鎮筮得同人於野遂號野同隠白鹿山與門人講學不輟作居敬論六篇開斯錄桐川講義易意詩意禮說人稱為文孝先生劉若宰字穎平懷寕人崇禎戊辰廷試第一以宫允充日講官㑹講修己以敬章反覆陳説上微倦斜倚御座乃旁引五子之歌曰為人上者奈何不敬上為端坐聞母微疴五疏乞終養情詞悲切特允之國朝陳朝棟號磻石桐城諸生初解論語孟子即謂聖賢可學其師異之既長殫精宋儒理學諸書以大道務在躬行生平孜孜惟求寡過以子焯貴封如其官著清越樓日錄三易露箋等書劉餘清字不疑懷寕人聞其父若實講隨處體認天理餘清曰此正學者入聖之門遂沉潛理學眀季舉賢良嘗受業於姜曰廣司訓蕪湖倡眀絶學著易問太極説西銘解蔣延姬字孔緒懷寕人家貧嗜學隠居教授晚年益深眀性理徽州府南北朝梁胡明星黟縣人天監初為太學博士賀瑒舉助修五禮遷太常卿武帝崇尚釋氏宗廟以麪為犧牲上疏切諌不聴與朱异不合棄官歸宋江致一字得之休寕人從胡瑗㳺宣和鄉舉首選靖康中伏闕上書乞斬蔡京童貫等六奸臣復李綱相位聲震中外尋授承信郎朱松字喬年婺源人登進士第授建州政和尉調尤溪尉召試館職除祕書省正字歴司勲吏部郎秦檜决䇿議和松上章極言不可出知饒州嘗自謂性褊急害道因取古人佩韋之義名其齋疾革時語子熹曰胡原仲劉致中劉彦仲此三人學有淵源吾即死徃受學焉元至正間追諡靖獻呉儆字益恭休寕人紹興進士通判邕州張栻稱其忠義果斷緩急可仗薦於朝召對首陳恢復大計備論帥臣􅈇司協濟之宜遷廣南西路安撫儆文辭峻潔一𠂻諸道著有竹洲集諡文肅汪楚材字太初休寕人紹興進士歴任廣西運司幹官嘗問學於朱子呉儆以儒學名呉㫤字叔夏歙縣人朱子歸婺源㫤先執經館下安貧守道徴為郡校書弗就學者稱友堂先生程洵字允夫婺源人學於朱子初任衡陽主簿調廬陵録參與新使不協臺章有云吉州知錄程洵亦在偽學之流朱子曰今日始見吾弟行止分眀有克齋集俞易直字平叔歙人元豐登第為彭澤尉歴三任以母老歸易直清修苦操臨殁郡守曾諤命其屬徃視見環堵蕭然因問後事易直曰棺已具衣已浣矣方屬妻子祔𦵏先塋不為齋具此外無所需也曾遣吏齎錢五萬供湯藥不受吏再至不復視曰吾平生貧不惟今日豈以五萬錢變吾志哉是夕卒王炎字晦叔婺源人登乾道乙科授崇陽簿累遷知湖州不畏強禦邸第貴价有撓政者炎註於牘曰汝為天子親亂天子法炎為天子臣正天子法人傳誦之初著易解未竟病篤乃夜祝天願須臾無死以成書卒如其言有雙溪類藁滕璘字徳粹婺源人與弟珙俱從朱子㳺以乙榜尉鄞縣改四川制置司幹官韓侂胄當國或勸璘一見可得掌政璘不肯屈官至朝奉大夫璘初為論語説朱子見而善之既而語之曰學以變化氣質為功而不在於多立說璘􅌶然自是不敢輕論著汪安仁績溪人慶元進士授學錄淳熙中率太學生三百二十八人入奏請朝重華宫不報仕終興國軍教官錢時字子是歙人師慈溪楊簡以易冠曹試既而絶意科舉究眀理學主象山書院講席以薦入史館旋以國史宏綱未畢求去五經四書皆有著述學者稱融堂先生金朋説字希傅休寕人淳熙丁未進士知鄱陽縣時厲偽學之禁凡薦舉改官悉令漕帥取狀方得擢用朋説應薦上狀言素師朱熹講孔孟及程氏遺書實不知為偽遂解職歸詹初字以元休寕人淳熙間薦為太學錄韓侂胄用事上辨邪正一疏不報解官歸著寒松閣集汪萃字叔耕休寕人屏居讀易旁通諸書嘉定間應詔陳言論天變人事民窮吏汙之弊不報時朱子召赴經筵未至莘逆通書言財不待先生而富兵不待先生而強惟主上父子之間所不能濟者待先生而濟朱子深契之所著有栁塘集劉伯諶字諶甫歙人居父䘮遵古制著理學正傳四書講説弟伯証字証甫以文謁魏了翁真徳秀咸稱善為之序有唐史撮要左氏本末三傳制度等書真魏二人相繼論薦力辭不仕程若庸字達原休寕人從饒魯㳺得朱子之學咸淳間登進士累為安定臨汝武林三書院山長呉澄程鉅夫皆出其門稱勿齋先生所著有性理字訓講義太極洪範圖説謝璡字公玉祁門人授廸功郎從朱子講性命之學言行醇正為時名儒程永竒字次卿休寕人受業朱子居家嘗倣伊川宗㑹法以合族人又舉行吕氏鄉約冠婚䘮祭悉用朱氏禮鄉族化之偽學難作遁於邑之東山平生玩索經傳所著有六經四書疑義朱子語粹格齋藁疾革門人問之正衣冠而起曰吾不能多言呼筆大書一敬字而逝學者稱格齋先生元汪一龍字逺翔休寧人宋咸淳進士令句容歲大饑倣朱子南康遺規為便民十條行之至元中教授紫陽書院闡朱子之學學者稱定齋先生胡一桂字廷芳婺源人父方平精於易宋景定間一桂領鄉薦入元退而講學逺近師之嘗入閩博求朱子緒論為周易本義附錄纂註十七史纂人倫事鑒歴代編年諸書學者稱雙湖先生陳櫟字夀翁休寧人年十五鄉人皆師之致力於聖人之學以為有功聖門者莫若朱子朱子殁而諸説亂真乃著四書發眀禮記集成讀易編讀詩記爾雅釋六典撮要春秋三傳節註資治通鑑精節增廣通畧論孟訓䝉日議書解數十萬言延祐初復科舉櫟舉於鄉不赴禮部居家教授呉澄嘗稱櫟有功於朱子凡江東受學者盡遣歸櫟櫟所居堂曰定宇學者稱定宇先生程直方字道大婺源人讀書十年不下樓尤深於易入元絶意仕進行部至者必造請或延至學宫執禮受教倪士毅字仲宏休寧人祖父三世以經學教授鄉里毅世其學以教授於黟二十三年黟人化之學者稱道川先生胡炳文字仲虎婺源人嘗為信州道一書院山長時餘干饒魯之學本出朱熹而説多牴牾炳文深正其非作四書通以發其未盡之藴尤以易名家作易本義通釋學者稱雲峯先生門人同邑王偁字伯武著書極博朱升素稱該洽凡有疑必曰以問伯武程復心字子見婺源人師朱洪範友胡炳文嘗著四書章圖又著纂釋二十卷以發濓洛諸儒之㫖至大間行省獻其書於朝薦授徽州路教授王埜翁字太古婺源人通經工詩詞尤嗜易先儒之論皆謂陽實隂虚埜翁則謂天氣運地形停陽虚隂實呉澄善其説扁其室曰行易從學者甚衆鄭玉字子美歙人篤志聖賢之學四方來受業者衆至不能容共構師山書院以居之至正十四年以翰林待制召謝使者不出日以著書為事眀兵至守將欲要致之玉曰吾既不能慷慨殺身以勵風俗猶當從容就死以全節義遂自縊死所著有春秋闕疑餘力藳學者稱師山先生程榮秀字孟敷休寧人幼學於方囘及囘以睦州附元因辭去從許月卿受易延祐中以薦提舉浙江儒學於諸經子史悉有記錄以家禮出朱子殁後中多未定之論復取朱子言行有渉於禮者為翼禮以傳焉汪炎昶字懋逺婺源人幼能詩長而淵源六經發揮朱子之㣲㫖而疏之曰四書集疏其教人必使循序漸進其文竒而有法呉霞舉字孟陽歙人父龍翰宋迪功郎編國史院實錄霞舉性孝友嘗領歙邑教事所著有易管見筮易太𤣥潛虚圖説又有文公喪禮考異曹涇稱為紫陽功臣程龍字舜俞婺源人宋咸淳進士仕至睦州推官臨安歸元除永嘉縣尹轉湘隂知州以徽州路同知致仕所著有尚書毛詩二傳釋疑禮記春秋辨証及三分易圖龍以仕元非本志自號不不翁明趙汸字子常休寧人先學於九江黄澤又從臨川虞集㳺獲聞呉澄之學覃思㝠悟通貫六經尤邃於春秋作春秋屬辭以著聖賢筆削之㫖作春秋集傳以眀聖人經世之志著左氏傳補註春秋師説以為學者求端用力之階至正末嘗起鄉兵保鄉井眀興召修元史學者稱東山先生朱升字允升休寧人少師事陳櫟復偕趙汸從黄澤學舉元鄉薦授池州學正士服其教大江南北學者雲集㑹蘄黄冦亂避兵窮谷著述不輟眀太祖召見授翰林學士知制誥升尤邃經學著諸經旁註書傳補正學者稱楓林先生子同歴官禮部侍郎范凖字平仲休寧人元末束書從朱楓林避地三年㳺於閩從學益衆久之歸隠雲溪洪武初舉本邑訓導召為葭川令清苦自甘洞民化服擢工部主事卒於官所著有虀甕藳西㳺率藳等書汪克寛字德一祁門人元泰定中舉鄉薦教授宣歙間著春秋纂疏易程朱傳義詩音義㑹通禮經補逸綱目考異學者稱環谷先生明初召修元史書成將授官固辭以老乞歸程敏政賛其像稱為考亭世嫡第四人史局布衣第一人六經皆有説而春秋獨盛平生皆可師而出處尤正謝復字一陽祁門人讀書不求仕進聞呉與弼倡道小陂負笈徃從三歲而歸所得必見之躬行居家孝友䘮祭冠婚悉遵古禮或問學曰知行並進邑令問政告以謹辨義利視民如傷兩言人稱西山先生汪循字進之休寧人㳺荘㫤之門與王守仁數相論辨登𢎞治丙辰進士為永嘉知縣擢判順天應詔陳内修外攘十事時逆瑾亂政上裁減中官疏不報罷歸洪垣字峻之􅄔源人嘉靖壬辰進士知永康縣擢御史疏請罷巡幸選宫寮革餘鹽清選法黜貪汚一疏而御史曹郎以下得罪者二十餘人出知温州坐事罷歸垣初登第受學於湛若水罷官後仍從卒業家居四十餘年而卒游震得字汝潛婺源人嘉靖戊戌進士由行人入諫垣世宗好方士言公卿多以祝釐進震得獨昌言其失上震怒廷杖外補副使贛州分守辰州省税榷停積逋掣民壯裁調發兩地皆尸祝之歸創虹東書院講學其中著有性理纂要談藝要錄汪禔字介夫祁門人刻苦砥礪上友古人事母至孝著有家禮砭俗投壺儀節檗菴遺稿范淶字原易休寧人萬厯甲戌進士知南城縣累遷浙江按察福建布政所至興利除害雅尚理學南中為江陵相祝釐淶獨不赴海中丞瑞謂南中得個半人淶其一也著休寧理學先賢傳范子哤言晞陽文集余懋衡字持國婺源人萬厯壬辰進士令永新請通行官解法以紓民困擢御史論罷礦説巡按陜西劾税璫梁永為永所毒㡬死上為撤永民始靖閱視固延兩鎮條上十事掌外計列計典七條著為令天啟初召為大理卿累陞兵部侍郎魏閹請恩䕃諸弟姪及保姆客氏子懋衡以婦寺冒濫非典封還兩勅陞南吏部尚書引疾歸初懋衡於新安紫陽書院倡興理學後與鄒元標馮從吾構首善書院於京師魏閹毁書院懋衡亦坐削奪所著有乾惕齋集語録經翼諸書江旭竒字舜升婺源人補諸生入太學奏所著孝經翼孝經疏義請勅儒臣補成孝經大全命題取士詔從之仕為安岳丞所著有續皇眀通記筆花齋集漢魏春秋等書程瞳休寧人不求仕進専務實學著閑闢錄辨朱陸之異同著新安學系與朱子合者存背者去又有新安文獻紫陽風雅諸書謝顯字惟仁祁門人沉慧好學家貧或勸之治生對曰治生孰若治心從湛若水學静坐有得云此學如過獨木橋絶無倚靠立脚處督學耿定向檄祀鄉賢評之曰跡其所至已在善信之間充其所志不底聖人不已洪德常字常伯歙人少有逺志硏心六籍及宋元眀諸儒之書著中庸要領周程張朱五子學約知行合一錄養生格言次子珣貢生授武進訓導亦以學行聞汪九漪字紫瀾休寧人少嫻文詞晚年専精邵子易學原本廖氏以聲音為理數統宗而參用祝氏異同之㫖著續皇極經世書七音類集述其孫應銓直南書房嘗以其書進御程智字雲莊休寜人深究易理髙攀龍亟稱之著有二四一三參兩諸説及大易宗㫖中庸㫖説諸書國朝施璜字虹玉休寧人日以存何念接何人行何事讀何書吐何語五者自勘教人九容以養其外九思以養其内九德以要其成著有五子近思録發明與呉曰慎講學紫陽還古兩書院曰慎字徽仲歙人著易爻徴大學中庸章句翼呉之騄字耳公歙人壬子舉人教諭績溪遷丹陽教授分校己夘湖廣鄉試置義田設義學以教養族人為文詞達理舉著有孝經類解桂留堂集寧國府宋孫自修字敬夫宣城人從朱子逰朱子嘗貽書商確傳訓既没自修追記池錄一卷載朱子語錄汪澥字仲溶旌德人少從胡瑗學易王安石著三經義傳澥首傳其説登進士第知黟縣嘗擿偽劵及築隄障民咸徳之累遷司業祭酒以儒名者三十年人士推之元左繼樗字芳逺涇縣人任安慶路教授接物和平讀康節擊壤集嘆曰人不見此書則心不通大後陞錢塘令移疾歸築精舍曰隠齋終日危坐手大易性理諸編推究性命之學明董傑字萬英涇縣人平居端謹無惰容成化丁未進士上疏論經筵忤冢宰出知沔陽州累遷保定知府練兵儲粟盜發賴以無恐仕至江西巡撫卒官視其私篋白金不盈兩傑潛心理學以聖賢自期著七士辨以眀學術邪正云呉宗周字子旦宣城人少孤篤孝嘗被旌於朝以眀正道闢異學為己任登𢎞治丙辰進士方觀政御史黄山給事中龎泮以言得罪抗疏救之出守臨江與士子講行五禮儀式著有廣崇正辨諸書學者稱石岡先生張棨字士儀涇縣人幼穎異五歲授書即欲循雞鳴盥潄之禮十歲遍治諸經十七廩諸生究心時務觀書獨得大㫖尤長於易歐陽文莊為南祭酒徃從之逰以名節道義相劘切倡建水西精舍延名儒歳主講㑹公卿咸折節加禮由是水西之學名天下貢安國字元略宣城人窮究性命由眀經司訓湖口嘗主白鹿洞書院知東平州力行所志學者咸尊嚮之汪景字希道南陵人少好讀書已而嘆曰日記萬言適增耳目障耳於是一意於文行交致之功從湛若水逰鄒守益錢德洪咸以畏友目之由孝亷司理嘉興汝寧執法不避豪右甫考績即乞歸見一時學者多宗虚無之教每言聖門之學以實踐為功真知為貴作良知辨讀陸子集辨等書皆有功斯道云施宏猷字允升宣城人少受業陳履祥得羅旴江之傳日聚同人講學興起者衆叔祖亡嗣遺産千金宏猷捐為義田以贍宗族其先貸於人者亦不下千金悉焚其券而以已資代為營𦵏學者稱中眀先生查鐸字子警涇縣人嘉靖末進士隆慶初為給事中忤髙拱出為山西參議遷湖廣副使移疾歸繕水西書院講學其中後進多歸之徐榜字薦所涇縣人萬歴選貢廷試神宗御批云天下文章當以徐榜為式成進士仕至浙江右布政榜志在濓洛厭華麗寡笑言脫粟布衾終身儒素汪有源字惟清太平人少聞講孝弟章輙喜謂孝弟我分内事後師祁門陳九龍在金陵數與焦竑鄒元標楊起元髙攀龍徃復㑹講詞色冲然平易近人學者人人以為坐春風中稱為崑一先生國朝沈夀民字眉生宣城人寵曾孫博通經史善古文懷宗末巡撫張國維以賢良方正薦徴赴闕下即抗疏劾大司馬楊嗣昌奪情誤國總督熊文燦不能制敵不報拂衣歸講學姑山之麓從逰者數百人後黨人禍作避地蘭溪溧陽相陳名夏以書招之不應足跡不履城市者三十年已而屬疾諭門人劉堯枝施閠章等曰以此心還天地以此身還父母以此學還孔孟語畢而卒梅文鼎字定九宣城人貢生博雅善屬文尤耽精歴算兼通中西之學自製揆日測算諸器皆獨出新意所著歴算八十八種皆發前人所未發李光地以文鼎所著歴學疑問三卷進呈聖祖奨許召見德州舟次者三因年老放歸田里御書績學參微四大字賜之詔光地曰此學今鮮知者當世僅見也文鼎生平留心經濟不為無用之學而孜孜好善老而彌篤卒年八十九池州府宋王鎡字時可石埭人登紹興八年進士第授興國軍司户髙宗以時事召對稱㫖累擢監察御史有風力歴中書舍人兼直學士院侍講鎡素通經術善訓導向多門徒及髙宗為呉后家置大小教授以磁領其職其所撰戚里元龜為后家起也又著春秋門例通解易象寶鑑明李呈祥字時龍貴池人年三十九應歲貢赴廷試歸築一軒自署曰尚志日端坐其中研經味道謁王守仁於江西辨析同異深契良知之㫖轉授門徒柯喬丁旦皆其入室弟子郡守屢薦其文行公卿皆敬慕之所著有古源日錄知行二論施達字下之青陽人研精理學不應科舉隠天柱峯一門之内家人應對起居悉準内則曲禮傳經講學聽受者常數百人稱天柱先生懷宗九年尚寶卿張瑋以隠士薦不赴卒其門人即天柱講堂祠之所著有讀書知易信易序卦圖儒行注孝經註諸編太平府唐張惟儉當塗人精左氏穀梁春秋舉進士歴和州刺史與侍御栁鎮友善鎮子宗元作先友記記父諸友皆天下善士惟儉預焉宋王逢字㑹之當塗人以博洽聞教授姑蘇學徒常數百人時胡瑗在湖州學教法盛東南逢㡬亞之晚登進士乙科歴國子監直講太常博士所著有易傳十卷及乾德指説復書諸編元姚和中當塗人世傳儒學不應徴召從㳺甚盛如尚書婺源汪澤民同邑李習李翼兄弟皆出其門明謝理當塗人鶱子成化壬辰進士以親老不仕著有周易解春秋解諸編廬州府漢許子威廬江合肥人為中大夫光武少時從受尚書宋楊傑字次公無為人少有名於時元豐中舉進士數任太常一時禮樂之事皆預討論嘗議禧祖配帝及四后升祔之禮從之與范鎮議樂制不合朝廷舍傑而從鎮然論者終以傑説為當官終兩淛提㸃刑獄有樂記五卷明孫鎮合肥人洪武中諸生以經眀行修除户部主事時以課程事罪部官鎮抗言不宜連坐恐傷國體忤㫖戍滇南薦復職除衞輝知府靖難兵起衞輝當南北之衝鎮堅守不下永樂登極謫戍山海宣德初赦囘除上饒丞不就方欽字寅之𢎞治舉人篤學力行知福山縣同官俱為流賊所害欽以好官不要錢獨免劉瑾用事監司斂諸屬金錢獻媚欽獨無所輸因注下考謫齊河教諭子榘正德癸酉舉人知平隂縣耿直忤時亦有清操蔡悉字士備合肥人嘉靖進士任常德推官築六堤以免水患累遷南光禄寺少卿晉尚寳司卿極論礦稅之害不從告歸平生沉酣六經深探理學清操亮節淮西人宗之所著有先後大學解御製敬一箴解胡鐸字君求舒城人孝友直方廬父墓三年當途交薦後開輔仁講㑹闡眀正學四方就教者以千數李籛字華仲天啟辛酉舉人崇禛間廬鳳災荒籛以謁選入都慨然具疏請加軫恤署沂州學正所著有四書講嘯月集國朝葛遇朝字鼎如巢人甲戌進士博極典墳初任莒州調澧州陞户部員外郎晚尤嗜學鳳陽府漢召馴字伯春九江夀春人少習韓詩博通書傳以志義聞鄉里號之曰德行恂恂召伯春肅宗朝拜左中郎將入授諸王帝嘉其義學恩寵甚崇官至光禄勲孫休青州刺史桓榮字春卿沛郡龍亢人少學長安習歐陽尚書十五年不窺家園教授九江徒衆數百人世祖拜為議郎使授太子毎朝㑹輙令榮於公卿前敷奏經書帝稱善拜為博士車駕幸太學㑹諸博士論難於前榮温恭藴藉辨明經義儒者莫及常令止宿太子宫侍講二十八年拜為少傅賜以輜車乗馬榮大㑹諸生陳其車馬印綬曰今日所䝉稽古之力也顯宗即位尊以師禮乗輿嘗幸太學令榮坐東面設几杖天子親自執業三雍初成拜榮為五更賜爵關内侯桓郁字仲恩榮子敦厚篤學傳父業以尚書教授門徒常數百人襲父爵悉以租入與兄子汎遷侍中帝自置五家要説令郁較定於宣眀殿授皇太子經歴遷屯騎校尉和帝即位竇憲奏郁白首好禮經行篤備復入侍講累官太常郁教授二帝恩寵甚篤顯於當世有尚書桓君大小太常章句桓焉字叔元郁子眀經篤行有名稱永初元年入授安帝三遷為侍中步兵校尉順帝立為皇太子以焉為太傅即位後授禁中封陽平侯歴官太尉弟子傳業者數百人桓彬字彦林焉之兄孫少與蔡邕齊名初舉孝亷拜尚書郎時中常侍曹節女壻馮方亦為郎彬厲志操與左丞劉歆右丞杜希同好交善未嘗與方共酒食之㑹方深怨之竟為所論廢所著七説及書凡三篇蔡邕等論序其志有過人者四夙志早成岐嶷也學優文麗至通也仕不茍禄絶髙也辭隆從窊潔操也乃共樹碑而頌焉父麟字元鳳桓帝初為郎侍講禁中以直道牾左右出為許令桓譚字君山沛國相人博學多通徧習五經能文章尤好古學數從劉歆楊雄辨析疑異以父任為郎王莽居攝咸競競褒稱德美譚獨黙然自守世祖即位大司農宋宏薦拜議郎給事中上書陳時政帝欲以䜟决疑譚復極言䜟之非經出為六安郡丞著書言當世行事二十九篇號曰新論元和中肅宗東巡至沛使使者祠譚冡鄉里以為榮徐宣沛國銍人為講學大夫以易教授子憲亦傳宣業施延字君予蘄人少為諸生眀五絰星官風角靡有不綜家貧母老常詣呉郡海鹽取卒月直賃作半路亭父以養母時馮敷為督郵知其賢者下車入亭請與飲食脫衣與之餉錢不受舉有道高第為侍中順帝時為太尉南北朝齊劉瓛字子珪相人篤志好學博通五經聚徒教授屢除官不就以母老闕養拜彭城郡丞儒學冠於當時京師士子貴逰莫不下席受業性謙率通美不以髙名自居有至性祖母病疽經年手持膏藥漬指為爛母孔氏謂親戚曰阿稱便是今世曾子阿稱瓛小名也梁天監中詔為瓛立碑諡曰貞簡先生劉璡瓛弟方軌正直建元初為武陵王􅈌冠軍征虜叅軍􅈌與僚佐飲自割鵞炙璡起請退兄瓛夜隔壁呼璡共語璡下牀著衣然後應命瓛問其久璡曰向束帶未竟其立操如此宋吕希哲字原眀公著子少從焦千之孫復石介胡瑗學復從程顥程頤張載㳺聞見由是益廣范祖禹薦詔以為崇政殿説書其勸導人主以修身為本修身以正心誠意為主遭崇寧黨禍奪職希哲樂易簡儉有至行晚年名益重逺近皆師尊之元周楨字子幹安豐下蔡人操行端簡絰史淹通以儒業任安豐路判官歸老手不釋卷明石璟字廷用臨淮人成化辛夘鄉薦見聞該博學有源本劉昺字晉初鳳陽人知山隂縣歴官山東濟南道通經致用以聖賢自期篤於踐履嘗曰學求諸内而已所著有光化亭稿箧中集楊嘉猷字原忠懷逺人萬歴丙子舉於鄉師事馮少墟楊復所講艮止之學官冀州守厯鎮逺府有異績與泰州王心齋合肥蔡肖謙稱淮南三賢著有清粹録等書鄭斐字非文夀州人理學湛深里中無長幼咸稱鄭先生訂正䘮禮一編尤為簡要國朝張介字受兹夀州人歲貢篤志聖賢之學司訓潛邑士風丕變陳赤字懷丹夀州人事親盡孝力學篤行所著有周易解及詩文集潁州府後漢張酺字孟侯汝南細陽人趙王張敖之後少從祖父充受尚書能傳其業顯宗開四姓小侯學酺以尚書教授論難當上意除為郎賜車馬衣服令入侍皇太子講率有匡正累官至司徒宋尹拙潁州汝隂人性純謹博通經史顯德初拜檢校右散騎常侍通判太常禮院事與張昭同修實錄又與昭及田敏同詳定經典釋文周世宗北征命翰林學士作祭白馬文學士不知所出訪於拙拙厯舉郡國祀白馬者以十數時服其博子季通有文學以䕃仕國子博士明李惟一字君守䝉城人少志聖賢之道日夜勤思豁然通一貫之㫖著太極一貫諸解官婺源訓導和州唐髙子貢厯陽人弱冠㳺太學徧涉六經尤精史記舉眀經厯𢎞文館直學士東莞公融為和州刺史從子貢授業明成清字介甫和州人由貢生厯仁和教諭硏究理學訓士有法著道學淵源集諸編人稱初水先生又􅅤山汪沛自副榜授貴溪訓導以博洽稱於時廣德州宋查深廣德人隠居力學治平間郡守錢公輔薦於朝力辭乃為築堂於城西名曰清容延請教誨郡子弟儒風日振學者稱清容先生明錢用壬字成夫廣德人元末進士第一授編修洪武初改御史䑓經歴預編大眀律官至禮部尚書上言文廟祀典宜以仲春仲秋二上丁以丞相初獻學士亞獻祭酒終獻又定藉田禮俱從之謝士貞字彦良建平人永樂中以眀經任本學訓導循循善誘邑人知學皆其教也濮陽淶字真菴廣德人嘉靖丁酉舉人公車時適楊繼盛以忠諌死淶素服徃哭㡬被禍通判南昌平花園積寇獲豐城劫盜為人端直俸入不以自潤所著有四書禮記貞義韵學大成圖書性理訂疑夏思字官眀廣德人少而苦學寒暑不輟舉隆慶庚午鄉試王錫爵竒其文延為子衡師起家瑞昌教諭累遷禮部司務以請建儲忤㫖歸著約言編還初録六安州晉杜夷字行齊廬江􅈞人博覽經籍教授生徒千人不應察舉元帝時除國子祭酒太子三至夷第執經問義及即位夷自表請退臨終遺命角巾素衣以歛著幽求子二十篇兄崧字行髙少有志節惠帝時俗尚浮偽崧著任子春秋以刺世宋焦煥六安人素履貞介建炎乙亥赴試京師其僕拾得旅舍主婦金鐶行數日煥方覺曰失物者必鞭笞其左右赴水投繯皆勢所有吾寧不試當急返還之以全人命㑹場屋災展期重試煥遂首舉明楊忭字節夫六安人景泰丙子鄉薦官東平知州弟惇字載夫成化進士累官光禄寺卿兄弟並孝弟清謹為一時所重朱賢字從善六安人天順進士潛心理學與天台陳選齊名任監察御史直諫忤㫖謫花林驛丞尋復職潘子正字汝中銳之子少講學於湛甘泉歐陽甫野先生之門嘉靖壬辰進士擢兵科給事中劾冢宰王鋐専恣列其罪狀詔罷遣之厯官湖廣兵備端嚴清直多惠政後以貴州參政罷歸張孔傳字淵魯六安人天啓丁夘鄉薦不仕博通諸史留意鄉邦利病六安舊苦徭役畏僉㸃如湯火孔傳倡議請通計應費若干以糧為斷而一切以官主之民困始蘇江南通志卷一百六十四欽定四庫全書江南通志卷一百六十四人物志儒林二州安徽寕池太廬鳳潁八府和廣六三安慶府南北朝宋何尚之字彦德潛山人雅好文義為文帝所知為丹陽尹立宅南郭外設學聚生徒四方慕義來㳺者謂之南學累遷吏部尚書尚之立身簡約車服率素妻亡不娶執衡當朝畏逺權柄卒諡簡穆齊何佟之字士威潛山人少好三禮師心獨學疆力専精手不輟卷為京師碩儒仕齊為國子博士遷驃騎諮議叅軍國家吉凶禮皆取决焉所著文章禮義百餘篇元王幼學字行卿望江人生於宋季幼罹兵禍俘掠至河南陳氏得之養以為子乃命之學勤苦博覽業遂大進元至元間歸望江躬耕慈湖之坂與同志講道不輟所著有通鑑綱目集覧盛行於世方用字希才望江人少負逸才與揭徯斯朱公遷歐陽𤣥同㳺許白雲之門以羽翼斯文相砥礪時稱許門四傑所著有先儒宗㫖茗谷叢説諸書明程桯字用慿懷寕人積學勵行設教里中逺近就學者前後數百人耑以踐履篤實為務嘉靖中舉眀經為臨武令有惠政何唐字宗堯桐城人少孤貧沉潛有大志正德辛巳進士年二十即以斯道自任授南兵部主事有直指餽金虞其弗受戒使者致而去唐欲辭不得嘆曰吾邸安得宿此乃易錢周九市之貧者曰代直指為惠耳後因事忤中貴告歸凡從㳺者告以稽古眀道立法善俗為先慕曾子之學作日省錄學者稱省齋先生金道寓字晴嵐潛山人少孤以學行著聲搆竹浪館率諸弟姪讀書其中晚年精心濓洛之學著有朱陸異同辨竹浪館文集弟道心亦端恪醇雅過人金道器字達生潛山人性嗜學博極羣籍破産積書朝夕沉涵其中初宗陸子静以簡易悟入後豁然曰無戒慎功終屬影響自是専讀朱子書因知德性不能離問學而耽空守寂不但背程朱之門庭亦非象山之初㫖也晚年學益醇深㳺於詩字二南懷寕人事親孝日夕侍膳親食然後敢食以諸生入太學時盱江羅近溪為海内儒宗千里負笈受業其門與金陵焦竑輩結為里社開示後學倣朱子立義倉七楹於其鄉凶歲賴以全活者數百家余榮臺潛山人少從從父皖川講學長而設教授徒以省身克己為要著有克己錄四書辨疑性理集成諸書顔素字質卿懷寕人自少講求性道毅然曰聖人可學而至也萬厯甲戌進士授中書丁内艱遂不復出結廬石門窮究古今尤邃於易其學以易簡直截見性為宗所著有易研及詩文數卷仕至應天府丞呉嶽秀字幼鍾懷寕人萬厯庚辰進士授中書舍人與同年顧憲成輩講學東林以道徳文章相礪遷給諌直聲震天下卒以忤權貴出為右布政尋乞歸築方丈一室改號遯齋晚年謂湛若水先生隨處體認天理之語為學者入聖之門大書於室用以自警童自澄字定夫桐城人萬歴間布衣初見張甑山即毅然志學嘗自言曰泰州起布衣為餘姚髙弟彼丈夫也遂篤志聖賢交四方講學之士弟子彌衆建輔仁㑹館於棕棲之坐卧一小樓怡神養氣年八十四卒呉應賓字尚之桐城人母孫夢飛星入口而生少穎異日誦千言比長博覽羣籍登萬歴丙戌進士官編修以目眚告歸家居四十載惟閉户著述闡發性命之旨同里左光斗方大任交章以理學薦特召辭不赴上疏極論時政上嘉之著宗一聖論十篇性善二書學庸論語釋行世方鯤字羽南桐城人少為名諸生長而研求經學謂詩文小道非儒者所急㑹豫章葉兼山講易桐城鯤盡得其學推河洛縱横之圖以測古人制樂用兵之法黄道周何楷見之嘆以為從前所未有也方學漸字達卿桐城人志洛閩之道講學桐川秋浦間揭性善之㫖弟子嘗數百人方大鎮字君静學漸子萬歴己丑進士歴官大理少卿與同志講學於京師首善書院㑹羣小排斥毁之大鎮筮得同人於野遂號野同隠白鹿山與門人講學不輟作居敬論六篇開斯錄桐川講義易意詩意禮說人稱為文孝先生劉若宰字穎平懷寕人崇禎戊辰廷試第一以宫允充日講官㑹講修己以敬章反覆陳説上微倦斜倚御座乃旁引五子之歌曰為人上者奈何不敬上為端坐聞母微疴五疏乞終養情詞悲切特允之國朝陳朝棟號磻石桐城諸生初解論語孟子即謂聖賢可學其師異之既長殫精宋儒理學諸書以大道務在躬行生平孜孜惟求寡過以子焯貴封如其官著清越樓日錄三易露箋等書劉餘清字不疑懷寕人聞其父若實講隨處體認天理餘清曰此正學者入聖之門遂沉潛理學眀季舉賢良嘗受業於姜曰廣司訓蕪湖倡眀絶學著易問太極説西銘解蔣延姬字孔緒懷寕人家貧嗜學隠居教授晚年益深眀性理徽州府南北朝梁胡明星黟縣人天監初為太學博士賀瑒舉助修五禮遷太常卿武帝崇尚釋氏宗廟以麪為犧牲上疏切諌不聴與朱异不合棄官歸宋江致一字得之休寕人從胡瑗㳺宣和鄉舉首選靖康中伏闕上書乞斬蔡京童貫等六奸臣復李綱相位聲震中外尋授承信郎朱松字喬年婺源人登進士第授建州政和尉調尤溪尉召試館職除祕書省正字歴司勲吏部郎秦檜决䇿議和松上章極言不可出知饒州嘗自謂性褊急害道因取古人佩韋之義名其齋疾革時語子熹曰胡原仲劉致中劉彦仲此三人學有淵源吾即死徃受學焉元至正間追諡靖獻呉儆字益恭休寕人紹興進士通判邕州張栻稱其忠義果斷緩急可仗薦於朝召對首陳恢復大計備論帥臣􅈇司協濟之宜遷廣南西路安撫儆文辭峻潔一𠂻諸道著有竹洲集諡文肅汪楚材字太初休寕人紹興進士歴任廣西運司幹官嘗問學於朱子呉儆以儒學名呉㫤字叔夏歙縣人朱子歸婺源㫤先執經館下安貧守道徴為郡校書弗就學者稱友堂先生程洵字允夫婺源人學於朱子初任衡陽主簿調廬陵録參與新使不協臺章有云吉州知錄程洵亦在偽學之流朱子曰今日始見吾弟行止分眀有克齋集俞易直字平叔歙人元豐登第為彭澤尉歴三任以母老歸易直清修苦操臨殁郡守曾諤命其屬徃視見環堵蕭然因問後事易直曰棺已具衣已浣矣方屬妻子祔𦵏先塋不為齋具此外無所需也曾遣吏齎錢五萬供湯藥不受吏再至不復視曰吾平生貧不惟今日豈以五萬錢變吾志哉是夕卒王炎字晦叔婺源人登乾道乙科授崇陽簿累遷知湖州不畏強禦邸第貴价有撓政者炎註於牘曰汝為天子親亂天子法炎為天子臣正天子法人傳誦之初著易解未竟病篤乃夜祝天願須臾無死以成書卒如其言有雙溪類藁滕璘字徳粹婺源人與弟珙俱從朱子㳺以乙榜尉鄞縣改四川制置司幹官韓侂胄當國或勸璘一見可得掌政璘不肯屈官至朝奉大夫璘初為論語説朱子見而善之既而語之曰學以變化氣質為功而不在於多立說璘􅌶然自是不敢輕論著汪安仁績溪人慶元進士授學錄淳熙中率太學生三百二十八人入奏請朝重華宫不報仕終興國軍教官錢時字子是歙人師慈溪楊簡以易冠曹試既而絶意科舉究眀理學主象山書院講席以薦入史館旋以國史宏綱未畢求去五經四書皆有著述學者稱融堂先生金朋説字希傅休寕人淳熙丁未進士知鄱陽縣時厲偽學之禁凡薦舉改官悉令漕帥取狀方得擢用朋説應薦上狀言素師朱熹講孔孟及程氏遺書實不知為偽遂解職歸詹初字以元休寕人淳熙間薦為太學錄韓侂胄用事上辨邪正一疏不報解官歸著寒松閣集汪萃字叔耕休寕人屏居讀易旁通諸書嘉定間應詔陳言論天變人事民窮吏汙之弊不報時朱子召赴經筵未至莘逆通書言財不待先生而富兵不待先生而強惟主上父子之間所不能濟者待先生而濟朱子深契之所著有栁塘集劉伯諶字諶甫歙人居父䘮遵古制著理學正傳四書講説弟伯証字証甫以文謁魏了翁真徳秀咸稱善為之序有唐史撮要左氏本末三傳制度等書真魏二人相繼論薦力辭不仕程若庸字達原休寕人從饒魯㳺得朱子之學咸淳間登進士累為安定臨汝武林三書院山長呉澄程鉅夫皆出其門稱勿齋先生所著有性理字訓講義太極洪範圖説謝璡字公玉祁門人授廸功郎從朱子講性命之學言行醇正為時名儒程永竒字次卿休寕人受業朱子居家嘗倣伊川宗㑹法以合族人又舉行吕氏鄉約冠婚䘮祭悉用朱氏禮鄉族化之偽學難作遁於邑之東山平生玩索經傳所著有六經四書疑義朱子語粹格齋藁疾革門人問之正衣冠而起曰吾不能多言呼筆大書一敬字而逝學者稱格齋先生元汪一龍字逺翔休寧人宋咸淳進士令句容歲大饑倣朱子南康遺規為便民十條行之至元中教授紫陽書院闡朱子之學學者稱定齋先生胡一桂字廷芳婺源人父方平精於易宋景定間一桂領鄉薦入元退而講學逺近師之嘗入閩博求朱子緒論為周易本義附錄纂註十七史纂人倫事鑒歴代編年諸書學者稱雙湖先生陳櫟字夀翁休寧人年十五鄉人皆師之致力於聖人之學以為有功聖門者莫若朱子朱子殁而諸説亂真乃著四書發眀禮記集成讀易編讀詩記爾雅釋六典撮要春秋三傳節註資治通鑑精節增廣通畧論孟訓䝉日議書解數十萬言延祐初復科舉櫟舉於鄉不赴禮部居家教授呉澄嘗稱櫟有功於朱子凡江東受學者盡遣歸櫟櫟所居堂曰定宇學者稱定宇先生程直方字道大婺源人讀書十年不下樓尤深於易入元絶意仕進行部至者必造請或延至學宫執禮受教倪士毅字仲宏休寧人祖父三世以經學教授鄉里毅世其學以教授於黟二十三年黟人化之學者稱道川先生胡炳文字仲虎婺源人嘗為信州道一書院山長時餘干饒魯之學本出朱熹而説多牴牾炳文深正其非作四書通以發其未盡之藴尤以易名家作易本義通釋學者稱雲峯先生門人同邑王偁字伯武著書極博朱升素稱該洽凡有疑必曰以問伯武程復心字子見婺源人師朱洪範友胡炳文嘗著四書章圖又著纂釋二十卷以發濓洛諸儒之㫖至大間行省獻其書於朝薦授徽州路教授王埜翁字太古婺源人通經工詩詞尤嗜易先儒之論皆謂陽實隂虚埜翁則謂天氣運地形停陽虚隂實呉澄善其説扁其室曰行易從學者甚衆鄭玉字子美歙人篤志聖賢之學四方來受業者衆至不能容共構師山書院以居之至正十四年以翰林待制召謝使者不出日以著書為事眀兵至守將欲要致之玉曰吾既不能慷慨殺身以勵風俗猶當從容就死以全節義遂自縊死所著有春秋闕疑餘力藳學者稱師山先生程榮秀字孟敷休寧人幼學於方囘及囘以睦州附元因辭去從許月卿受易延祐中以薦提舉浙江儒學於諸經子史悉有記錄以家禮出朱子殁後中多未定之論復取朱子言行有渉於禮者為翼禮以傳焉汪炎昶字懋逺婺源人幼能詩長而淵源六經發揮朱子之㣲㫖而疏之曰四書集疏其教人必使循序漸進其文竒而有法呉霞舉字孟陽歙人父龍翰宋迪功郎編國史院實錄霞舉性孝友嘗領歙邑教事所著有易管見筮易太𤣥潛虚圖説又有文公喪禮考異曹涇稱為紫陽功臣程龍字舜俞婺源人宋咸淳進士仕至睦州推官臨安歸元除永嘉縣尹轉湘隂知州以徽州路同知致仕所著有尚書毛詩二傳釋疑禮記春秋辨証及三分易圖龍以仕元非本志自號不不翁明趙汸字子常休寧人先學於九江黄澤又從臨川虞集㳺獲聞呉澄之學覃思㝠悟通貫六經尤邃於春秋作春秋屬辭以著聖賢筆削之㫖作春秋集傳以眀聖人經世之志著左氏傳補註春秋師説以為學者求端用力之階至正末嘗起鄉兵保鄉井眀興召修元史學者稱東山先生朱升字允升休寧人少師事陳櫟復偕趙汸從黄澤學舉元鄉薦授池州學正士服其教大江南北學者雲集㑹蘄黄冦亂避兵窮谷著述不輟眀太祖召見授翰林學士知制誥升尤邃經學著諸經旁註書傳補正學者稱楓林先生子同歴官禮部侍郎范凖字平仲休寧人元末束書從朱楓林避地三年㳺於閩從學益衆久之歸隠雲溪洪武初舉本邑訓導召為葭川令清苦自甘洞民化服擢工部主事卒於官所著有虀甕藳西㳺率藳等書汪克寛字德一祁門人元泰定中舉鄉薦教授宣歙間著春秋纂疏易程朱傳義詩音義㑹通禮經補逸綱目考異學者稱環谷先生明初召修元史書成將授官固辭以老乞歸程敏政賛其像稱為考亭世嫡第四人史局布衣第一人六經皆有説而春秋獨盛平生皆可師而出處尤正謝復字一陽祁門人讀書不求仕進聞呉與弼倡道小陂負笈徃從三歲而歸所得必見之躬行居家孝友䘮祭冠婚悉遵古禮或問學曰知行並進邑令問政告以謹辨義利視民如傷兩言人稱西山先生汪循字進之休寧人㳺荘㫤之門與王守仁數相論辨登𢎞治丙辰進士為永嘉知縣擢判順天應詔陳内修外攘十事時逆瑾亂政上裁減中官疏不報罷歸洪垣字峻之􅄔源人嘉靖壬辰進士知永康縣擢御史疏請罷巡幸選宫寮革餘鹽清選法黜貪汚一疏而御史曹郎以下得罪者二十餘人出知温州坐事罷歸垣初登第受學於湛若水罷官後仍從卒業家居四十餘年而卒游震得字汝潛婺源人嘉靖戊戌進士由行人入諫垣世宗好方士言公卿多以祝釐進震得獨昌言其失上震怒廷杖外補副使贛州分守辰州省税榷停積逋掣民壯裁調發兩地皆尸祝之歸創虹東書院講學其中著有性理纂要談藝要錄汪禔字介夫祁門人刻苦砥礪上友古人事母至孝著有家禮砭俗投壺儀節檗菴遺稿范淶字原易休寧人萬厯甲戌進士知南城縣累遷浙江按察福建布政所至興利除害雅尚理學南中為江陵相祝釐淶獨不赴海中丞瑞謂南中得個半人淶其一也著休寧理學先賢傳范子哤言晞陽文集余懋衡字持國婺源人萬厯壬辰進士令永新請通行官解法以紓民困擢御史論罷礦説巡按陜西劾税璫梁永為永所毒㡬死上為撤永民始靖閱視固延兩鎮條上十事掌外計列計典七條著為令天啟初召為大理卿累陞兵部侍郎魏閹請恩䕃諸弟姪及保姆客氏子懋衡以婦寺冒濫非典封還兩勅陞南吏部尚書引疾歸初懋衡於新安紫陽書院倡興理學後與鄒元標馮從吾構首善書院於京師魏閹毁書院懋衡亦坐削奪所著有乾惕齋集語録經翼諸書江旭竒字舜升婺源人補諸生入太學奏所著孝經翼孝經疏義請勅儒臣補成孝經大全命題取士詔從之仕為安岳丞所著有續皇眀通記筆花齋集漢魏春秋等書程瞳休寧人不求仕進専務實學著閑闢錄辨朱陸之異同著新安學系與朱子合者存背者去又有新安文獻紫陽風雅諸書謝顯字惟仁祁門人沉慧好學家貧或勸之治生對曰治生孰若治心從湛若水學静坐有得云此學如過獨木橋絶無倚靠立脚處督學耿定向檄祀鄉賢評之曰跡其所至已在善信之間充其所志不底聖人不已洪德常字常伯歙人少有逺志硏心六籍及宋元眀諸儒之書著中庸要領周程張朱五子學約知行合一錄養生格言次子珣貢生授武進訓導亦以學行聞汪九漪字紫瀾休寧人少嫻文詞晚年専精邵子易學原本廖氏以聲音為理數統宗而參用祝氏異同之㫖著續皇極經世書七音類集述其孫應銓直南書房嘗以其書進御程智字雲莊休寜人深究易理髙攀龍亟稱之著有二四一三參兩諸説及大易宗㫖中庸㫖説諸書國朝施璜字虹玉休寧人日以存何念接何人行何事讀何書吐何語五者自勘教人九容以養其外九思以養其内九德以要其成著有五子近思録發明與呉曰慎講學紫陽還古兩書院曰慎字徽仲歙人著易爻徴大學中庸章句翼呉之騄字耳公歙人壬子舉人教諭績溪遷丹陽教授分校己夘湖廣鄉試置義田設義學以教養族人為文詞達理舉著有孝經類解桂留堂集寧國府宋孫自修字敬夫宣城人從朱子逰朱子嘗貽書商確傳訓既没自修追記池錄一卷載朱子語錄汪澥字仲溶旌德人少從胡瑗學易王安石著三經義傳澥首傳其説登進士第知黟縣嘗擿偽劵及築隄障民咸徳之累遷司業祭酒以儒名者三十年人士推之元左繼樗字芳逺涇縣人任安慶路教授接物和平讀康節擊壤集嘆曰人不見此書則心不通大後陞錢塘令移疾歸築精舍曰隠齋終日危坐手大易性理諸編推究性命之學明董傑字萬英涇縣人平居端謹無惰容成化丁未進士上疏論經筵忤冢宰出知沔陽州累遷保定知府練兵儲粟盜發賴以無恐仕至江西巡撫卒官視其私篋白金不盈兩傑潛心理學以聖賢自期著七士辨以眀學術邪正云呉宗周字子旦宣城人少孤篤孝嘗被旌於朝以眀正道闢異學為己任登𢎞治丙辰進士方觀政御史黄山給事中龎泮以言得罪抗疏救之出守臨江與士子講行五禮儀式著有廣崇正辨諸書學者稱石岡先生張棨字士儀涇縣人幼穎異五歲授書即欲循雞鳴盥潄之禮十歲遍治諸經十七廩諸生究心時務觀書獨得大㫖尤長於易歐陽文莊為南祭酒徃從之逰以名節道義相劘切倡建水西精舍延名儒歳主講㑹公卿咸折節加禮由是水西之學名天下貢安國字元略宣城人窮究性命由眀經司訓湖口嘗主白鹿洞書院知東平州力行所志學者咸尊嚮之汪景字希道南陵人少好讀書已而嘆曰日記萬言適增耳目障耳於是一意於文行交致之功從湛若水逰鄒守益錢德洪咸以畏友目之由孝亷司理嘉興汝寧執法不避豪右甫考績即乞歸見一時學者多宗虚無之教每言聖門之學以實踐為功真知為貴作良知辨讀陸子集辨等書皆有功斯道云施宏猷字允升宣城人少受業陳履祥得羅旴江之傳日聚同人講學興起者衆叔祖亡嗣遺産千金宏猷捐為義田以贍宗族其先貸於人者亦不下千金悉焚其券而以已資代為營𦵏學者稱中眀先生查鐸字子警涇縣人嘉靖末進士隆慶初為給事中忤髙拱出為山西參議遷湖廣副使移疾歸繕水西書院講學其中後進多歸之徐榜字薦所涇縣人萬歴選貢廷試神宗御批云天下文章當以徐榜為式成進士仕至浙江右布政榜志在濓洛厭華麗寡笑言脫粟布衾終身儒素汪有源字惟清太平人少聞講孝弟章輙喜謂孝弟我分内事後師祁門陳九龍在金陵數與焦竑鄒元標楊起元髙攀龍徃復㑹講詞色冲然平易近人學者人人以為坐春風中稱為崑一先生國朝沈夀民字眉生宣城人寵曾孫博通經史善古文懷宗末巡撫張國維以賢良方正薦徴赴闕下即抗疏劾大司馬楊嗣昌奪情誤國總督熊文燦不能制敵不報拂衣歸講學姑山之麓從逰者數百人後黨人禍作避地蘭溪溧陽相陳名夏以書招之不應足跡不履城市者三十年已而屬疾諭門人劉堯枝施閠章等曰以此心還天地以此身還父母以此學還孔孟語畢而卒梅文鼎字定九宣城人貢生博雅善屬文尤耽精歴算兼通中西之學自製揆日測算諸器皆獨出新意所著歴算八十八種皆發前人所未發李光地以文鼎所著歴學疑問三卷進呈聖祖奨許召見德州舟次者三因年老放歸田里御書績學參微四大字賜之詔光地曰此學今鮮知者當世僅見也文鼎生平留心經濟不為無用之學而孜孜好善老而彌篤卒年八十九池州府宋王鎡字時可石埭人登紹興八年進士第授興國軍司户髙宗以時事召對稱㫖累擢監察御史有風力歴中書舍人兼直學士院侍講鎡素通經術善訓導向多門徒及髙宗為呉后家置大小教授以磁領其職其所撰戚里元龜為后家起也又著春秋門例通解易象寶鑑明李呈祥字時龍貴池人年三十九應歲貢赴廷試歸築一軒自署曰尚志日端坐其中研經味道謁王守仁於江西辨析同異深契良知之㫖轉授門徒柯喬丁旦皆其入室弟子郡守屢薦其文行公卿皆敬慕之所著有古源日錄知行二論施達字下之青陽人研精理學不應科舉隠天柱峯一門之内家人應對起居悉準内則曲禮傳經講學聽受者常數百人稱天柱先生懷宗九年尚寶卿張瑋以隠士薦不赴卒其門人即天柱講堂祠之所著有讀書知易信易序卦圖儒行注孝經註諸編太平府唐張惟儉當塗人精左氏穀梁春秋舉進士歴和州刺史與侍御栁鎮友善鎮子宗元作先友記記父諸友皆天下善士惟儉預焉宋王逢字㑹之當塗人以博洽聞教授姑蘇學徒常數百人時胡瑗在湖州學教法盛東南逢㡬亞之晚登進士乙科歴國子監直講太常博士所著有易傳十卷及乾德指説復書諸編元姚和中當塗人世傳儒學不應徴召從㳺甚盛如尚書婺源汪澤民同邑李習李翼兄弟皆出其門明謝理當塗人鶱子成化壬辰進士以親老不仕著有周易解春秋解諸編廬州府漢許子威廬江合肥人為中大夫光武少時從受尚書宋楊傑字次公無為人少有名於時元豐中舉進士數任太常一時禮樂之事皆預討論嘗議禧祖配帝及四后升祔之禮從之與范鎮議樂制不合朝廷舍傑而從鎮然論者終以傑説為當官終兩淛提㸃刑獄有樂記五卷明孫鎮合肥人洪武中諸生以經眀行修除户部主事時以課程事罪部官鎮抗言不宜連坐恐傷國體忤㫖戍滇南薦復職除衞輝知府靖難兵起衞輝當南北之衝鎮堅守不下永樂登極謫戍山海宣德初赦囘除上饒丞不就方欽字寅之𢎞治舉人篤學力行知福山縣同官俱為流賊所害欽以好官不要錢獨免劉瑾用事監司斂諸屬金錢獻媚欽獨無所輸因注下考謫齊河教諭子榘正德癸酉舉人知平隂縣耿直忤時亦有清操蔡悉字士備合肥人嘉靖進士任常德推官築六堤以免水患累遷南光禄寺少卿晉尚寳司卿極論礦稅之害不從告歸平生沉酣六經深探理學清操亮節淮西人宗之所著有先後大學解御製敬一箴解胡鐸字君求舒城人孝友直方廬父墓三年當途交薦後開輔仁講㑹闡眀正學四方就教者以千數李籛字華仲天啟辛酉舉人崇禛間廬鳳災荒籛以謁選入都慨然具疏請加軫恤署沂州學正所著有四書講嘯月集國朝葛遇朝字鼎如巢人甲戌進士博極典墳初任莒州調澧州陞户部員外郎晚尤嗜學鳳陽府漢召馴字伯春九江夀春人少習韓詩博通書傳以志義聞鄉里號之曰德行恂恂召伯春肅宗朝拜左中郎將入授諸王帝嘉其義學恩寵甚崇官至光禄勲孫休青州刺史桓榮字春卿沛郡龍亢人少學長安習歐陽尚書十五年不窺家園教授九江徒衆數百人世祖拜為議郎使授太子毎朝㑹輙令榮於公卿前敷奏經書帝稱善拜為博士車駕幸太學㑹諸博士論難於前榮温恭藴藉辨明經義儒者莫及常令止宿太子宫侍講二十八年拜為少傅賜以輜車乗馬榮大㑹諸生陳其車馬印綬曰今日所䝉稽古之力也顯宗即位尊以師禮乗輿嘗幸太學令榮坐東面設几杖天子親自執業三雍初成拜榮為五更賜爵關内侯桓郁字仲恩榮子敦厚篤學傳父業以尚書教授門徒常數百人襲父爵悉以租入與兄子汎遷侍中帝自置五家要説令郁較定於宣眀殿授皇太子經歴遷屯騎校尉和帝即位竇憲奏郁白首好禮經行篤備復入侍講累官太常郁教授二帝恩寵甚篤顯於當世有尚書桓君大小太常章句桓焉字叔元郁子眀經篤行有名稱永初元年入授安帝三遷為侍中步兵校尉順帝立為皇太子以焉為太傅即位後授禁中封陽平侯歴官太尉弟子傳業者數百人桓彬字彦林焉之兄孫少與蔡邕齊名初舉孝亷拜尚書郎時中常侍曹節女壻馮方亦為郎彬厲志操與左丞劉歆右丞杜希同好交善未嘗與方共酒食之㑹方深怨之竟為所論廢所著七説及書凡三篇蔡邕等論序其志有過人者四夙志早成岐嶷也學優文麗至通也仕不茍禄絶髙也辭隆從窊潔操也乃共樹碑而頌焉父麟字元鳳桓帝初為郎侍講禁中以直道牾左右出為許令桓譚字君山沛國相人博學多通徧習五經能文章尤好古學數從劉歆楊雄辨析疑異以父任為郎王莽居攝咸競競褒稱德美譚獨黙然自守世祖即位大司農宋宏薦拜議郎給事中上書陳時政帝欲以䜟决疑譚復極言䜟之非經出為六安郡丞著書言當世行事二十九篇號曰新論元和中肅宗東巡至沛使使者祠譚冡鄉里以為榮徐宣沛國銍人為講學大夫以易教授子憲亦傳宣業施延字君予蘄人少為諸生眀五絰星官風角靡有不綜家貧母老常詣呉郡海鹽取卒月直賃作半路亭父以養母時馮敷為督郵知其賢者下車入亭請與飲食脫衣與之餉錢不受舉有道高第為侍中順帝時為太尉南北朝齊劉瓛字子珪相人篤志好學博通五經聚徒教授屢除官不就以母老闕養拜彭城郡丞儒學冠於當時京師士子貴逰莫不下席受業性謙率通美不以髙名自居有至性祖母病疽經年手持膏藥漬指為爛母孔氏謂親戚曰阿稱便是今世曾子阿稱瓛小名也梁天監中詔為瓛立碑諡曰貞簡先生劉璡瓛弟方軌正直建元初為武陵王􅈌冠軍征虜叅軍􅈌與僚佐飲自割鵞炙璡起請退兄瓛夜隔壁呼璡共語璡下牀著衣然後應命瓛問其久璡曰向束帶未竟其立操如此宋吕希哲字原眀公著子少從焦千之孫復石介胡瑗學復從程顥程頤張載㳺聞見由是益廣范祖禹薦詔以為崇政殿説書其勸導人主以修身為本修身以正心誠意為主遭崇寧黨禍奪職希哲樂易簡儉有至行晚年名益重逺近皆師尊之元周楨字子幹安豐下蔡人操行端簡絰史淹通以儒業任安豐路判官歸老手不釋卷明石璟字廷用臨淮人成化辛夘鄉薦見聞該博學有源本劉昺字晉初鳳陽人知山隂縣歴官山東濟南道通經致用以聖賢自期篤於踐履嘗曰學求諸内而已所著有光化亭稿箧中集楊嘉猷字原忠懷逺人萬歴丙子舉於鄉師事馮少墟楊復所講艮止之學官冀州守厯鎮逺府有異績與泰州王心齋合肥蔡肖謙稱淮南三賢著有清粹録等書鄭斐字非文夀州人理學湛深里中無長幼咸稱鄭先生訂正䘮禮一編尤為簡要國朝張介字受兹夀州人歲貢篤志聖賢之學司訓潛邑士風丕變陳赤字懷丹夀州人事親盡孝力學篤行所著有周易解及詩文集潁州府後漢張酺字孟侯汝南細陽人趙王張敖之後少從祖父充受尚書能傳其業顯宗開四姓小侯學酺以尚書教授論難當上意除為郎賜車馬衣服令入侍皇太子講率有匡正累官至司徒宋尹拙潁州汝隂人性純謹博通經史顯德初拜檢校右散騎常侍通判太常禮院事與張昭同修實錄又與昭及田敏同詳定經典釋文周世宗北征命翰林學士作祭白馬文學士不知所出訪於拙拙厯舉郡國祀白馬者以十數時服其博子季通有文學以䕃仕國子博士明李惟一字君守䝉城人少志聖賢之道日夜勤思豁然通一貫之㫖著太極一貫諸解官婺源訓導和州唐髙子貢厯陽人弱冠㳺太學徧涉六經尤精史記舉眀經厯𢎞文館直學士東莞公融為和州刺史從子貢授業明成清字介甫和州人由貢生厯仁和教諭硏究理學訓士有法著道學淵源集諸編人稱初水先生又􅅤山汪沛自副榜授貴溪訓導以博洽稱於時廣德州宋查深廣德人隠居力學治平間郡守錢公輔薦於朝力辭乃為築堂於城西名曰清容延請教誨郡子弟儒風日振學者稱清容先生明錢用壬字成夫廣德人元末進士第一授編修洪武初改御史䑓經歴預編大眀律官至禮部尚書上言文廟祀典宜以仲春仲秋二上丁以丞相初獻學士亞獻祭酒終獻又定藉田禮俱從之謝士貞字彦良建平人永樂中以眀經任本學訓導循循善誘邑人知學皆其教也濮陽淶字真菴廣德人嘉靖丁酉舉人公車時適楊繼盛以忠諌死淶素服徃哭㡬被禍通判南昌平花園積寇獲豐城劫盜為人端直俸入不以自潤所著有四書禮記貞義韵學大成圖書性理訂疑夏思字官眀廣德人少而苦學寒暑不輟舉隆慶庚午鄉試王錫爵竒其文延為子衡師起家瑞昌教諭累遷禮部司務以請建儲忤㫖歸著約言編還初録六安州晉杜夷字行齊廬江􅈞人博覽經籍教授生徒千人不應察舉元帝時除國子祭酒太子三至夷第執經問義及即位夷自表請退臨終遺命角巾素衣以歛著幽求子二十篇兄崧字行髙少有志節惠帝時俗尚浮偽崧著任子春秋以刺世宋焦煥六安人素履貞介建炎乙亥赴試京師其僕拾得旅舍主婦金鐶行數日煥方覺曰失物者必鞭笞其左右赴水投繯皆勢所有吾寧不試當急返還之以全人命㑹場屋災展期重試煥遂首舉明楊忭字節夫六安人景泰丙子鄉薦官東平知州弟惇字載夫成化進士累官光禄寺卿兄弟並孝弟清謹為一時所重朱賢字從善六安人天順進士潛心理學與天台陳選齊名任監察御史直諫忤㫖謫花林驛丞尋復職潘子正字汝中銳之子少講學於湛甘泉歐陽甫野先生之門嘉靖壬辰進士擢兵科給事中劾冢宰王鋐専恣列其罪狀詔罷遣之厯官湖廣兵備端嚴清直多惠政後以貴州參政罷歸張孔傳字淵魯六安人天啓丁夘鄉薦不仕博通諸史留意鄉邦利病六安舊苦徭役畏僉㸃如湯火孔傳倡議請通計應費若干以糧為斷而一切以官主之民困始蘇江南通志卷一百六十四
