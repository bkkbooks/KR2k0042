body:
  text: 江南通志巻一百五十五人物志忠節三安徽寧池太五府安慶府三國陳武字子烈松滋人年十八謁孫䇿於夀春因從渡江征討有功拜别部司馬䇿破劉勲多得廬江人以武為督所向無前孫權時累功進偏將軍建安二十年從擊合肥奮命戰死權哀之自臨其𦵏宋劉源字叔清淮西野人原義兵長也今為潛山地源性慷慨負大節咸淳中率山寨兵以保障鄉里徳祐元年范文虎以安慶降元景炎二年源與安撫使張徳興起兵倡義復司空山傅髙舉兵應之源建寨野人原相為犄角遂復黄州夀昌軍用景炎正朔元兵攻源寨不能克遂移兵襲破司空山寨破之源守禦三年至是徳興及傅髙俱死黄州夀昌復陷元兵復困之力戰而死元葛昂字銘徳潛山人元季兵起昂募義保障鄉曲駐兵皖山累立戰功事聞授安慶萬戸府金符千戸後天完兵攻安慶府城陷昂死之陳道夫懐寧人余闕守安慶得便宜辟道夫為懐寧尹撫綏有方時敵攻城勢急闕欲自殺道夫曰忠臣當死於敵徒死何名今力尚未窮宜與公死守幸一戰而勝可保全江淮矣遂屢却强敵城陷與闕同死之明王勝桐城人喜讀書尤好兵法元末歸明累功官右副元帥攻陳友諒取江州賜金帶良馬鄱陽之戰謀欲火攻勝應募詐降夜縱火焚其營乘火奮擊大破之勝死於火贈太原郡侯祀康郎山甘霖懐寧人洪武丁邜鄉薦建文時為御史剛介敢言靖難兵起被執不從遂求死從容受戮方法字伯通桐城人洪武己卯鄉薦授四川都司斷事永樂改元諸藩表賀法不署名尋詔逮諸藩不署名者法登舟告家人曰至安慶告我次望江瞻望再拜曰得望吾先人鄉足矣自沉於江俞鑑字元吉桐城人以進士授職方主事英宗北征備官隨駕郎中胡寧當行以病求代鑑慷慨許諾或曰家逺子㓜奈何鑑曰為國臣子敢計身家尚書鄺埜知其賢數與計事鑑曰惟力勸班師耳竟死土木之難周璽字天章太湖人𢎞治丙辰進士累官給諫劉瑾專權璽疏其擅改成命乞正典刑瑾銜之囑遷順天府丞使去言路時錦衣指揮楊玉附瑾誣璽蔑視使臣矯制下獄令玉自鞫玉杖之三十璽不少屈曰吾死不足惜令忠義畏懼可惜耳瑾聞益怒加杖之遂死於獄後瑾伏誅正徳朝賜祭世宗即位復賜祭廕其子汪鑾懐寧人正徳己夘宸濠擁衆攻城北鑾遇被執脅令諭城中出降誘以崇爵鑾至城下大呼曰上師已破南昌賊困極將遁可堅守賊怒解其屍賊退衆犬爭欲噉之一犬守䕶甚力遂不能進見者知係鑾犬因知為鑾屍也有司狀聞詔旌其門張澤字大被懐寧人以選貢授沅江令擢衢州别駕出逋賦者於囹圄民感泣争輸時督府胡宗獻威傾兩浙其前驅求索無厭守令奉之惟謹澤縛而杖之尋移廣安牧出寃濫五十餘人特遷雲南僉事分廵安普時武定猺部鳳繼祖拒命奉檄督戰賊伏起被執歸寨澤衣冠危坐賊願得手書移軍門澤叱曰天朝大臣為賊作説客耶遂死之事聞贈光禄少卿賜廟額忠節左光斗字遺直桐城人萬歴丁未進士由中書授御史議興水利北人始知藝稻光宗昇遐與楊漣争移宫兩人力為多朝野並稱為楊左累遷僉都御史漣疏魏閹光斗與謀又草忠賢二十四大罪疏未上而謀泄奪職歸羣小憾不已搆汪文言獄入光斗名逮至京師同漣拷訊死忠賢敗贈太子少保諡忠毅張秉文字含之桐城人淳之孫萬歴庚戌進士由知縣歴任江楚閩粤司道在粤勦海寇李魁竒等崇禎時仕至山東左布政使濟南圍急瀝血遺書二子有身為大臣當死封疆語拒守中箭死妻方氏妾陳氏投水死贈太常卿阮之鈿字實甫懐寧人以薦舉授榖城知縣未至賊獻忠已據其城求撫總理熊文燦許之令屯牧之鈿察其意欲積榖待時而發宻報文燦勸設備不聼獻賊果反之鈿刺血題壁曰讀盡古聖書籍飬成浩然心性今日殺身成仁不愧賢良方正遂仰藥未絶賊索印不予遇害贈尚寶少卿孟振邦字維新安慶衞世職乞休歸飬中丞史可法强出視衞篆擢叅將左兵陷城遂殉之月餘始得屍顔色如生夏統春字元夫桐城人以保舉授黄陂縣丞流賊犯陂邑統春已遷麻陽知縣未行乃督衆拒守親冐烽火衣不結帶凡十五晝夜賊偽解圍去越五日乘昧爽潰城統春巷戰力竭被執嘆曰惟一死報朝廷耳罵賊不屈賊支解之吳普昭字克明桐城諸生崇禎丁丑流賊逼掠率鄉民團聚格鬬十餘日被害妻孫氏痛夫難哭泣三月死子先璘先殉之婦李氏許氏義不受辱亦死人謂一門五義云笪光𢎞字宏生桐城人端方有介節崇禎丁丑遇流賊不屈死之左光燦桐城諸生崇禎丁丑突遇賊被縛捜袖中得一簿知為保障一方計憾而叱之光燦罵曰殺即殺鼠輩更何問哉賊益怒㧞舌斷足備極􅃤毒知縣張和民請於御史題旌焉時同邑姚孫極王夷吾趙之葵姚孫林陳力均死之又有左旗以庠生殉節汪之璞字石生潛山人明末流寇為亂衆聚保崑崙推璞為長張獻忠環攻璞屢出竒謀多所斬獲寨賴以全嘗上八䇿於撫軍黄配元元竒其才留麾下曰吾得之璞流寇不足平也㑹省親歸寨遇寇攫獲牌票脅之降太罵不屈賊支解之配元聞之大慟給匾致祭同邑王培基字仲因為太湖縣城守城陷被執死之又王立邦徐顯問俱守義死戴君徳太湖人通五經精歴律著有古史斷等書行世崇禎壬午流賊陷城憤詈不屈殺之妻沈氏同媳雷氏擕兩女孫俱赴水死同邑王鼐臣吳夢暘雷綿祚雷延發雷膺祚阮之甫黄應龍俱守義死何大同字于野宿松廪生崇禎壬午流寇猝至被執擁至寨下曰貰爾死為我呼開寨門大同不應復擁之去復至一寨令曰前堡汝家所在故不從今可速賺之大同曰皆戚里也肻以數百人命易我一命乎遂遇害張鳳翥宿松人崇禎辛未進士累官兵備副使分守承徳䕶顯陵單騎招安土寇値闖賊東下親自登陴嚴守勵衆而郡屬開門迎賊鳳翥身受三刃扶創走郢鄂募勇敢恢復竟卒於路周日耀桐城人外兄左光斗被逮道路以目日耀獨左右檻車送之京洎左死於獄仍扶其櫬歸甲申五月聞闖賊破京師仰天大慟絶粒九日嘔血數升而卒胡士恂懐寧人性至孝力學尤邃於易明末左兵陷城慷慨罵賊以死妻張氏亦赴水死二子再寅紹虞俱悲憤不食死紹虞妻蔣氏亦自縊殉時同邑何霖方應旂陳尚炳俱罵賊死丘全潛山人土寇攻崑崙砦脅全使招砦中出降全佯許之至砦門大呼固守勿降賊刳其腹而去王九鼎字在徳潛山人明季北直故城令時流寇連陷七十餘邑故城原壘土而卑隘九鼎以忠義奬率士民死守浹旬力不支城陷遂以身殉先是九鼎以單騎赴任左右惟二子基㤗㤗踉蹌赴難叩閽上書奉㫖查覆俱稱歴任屢著惠績一死凛烈千秋贈太僕寺少卿廕一子江襟楚字雲渚由知縣轉瓊州别駕解組歸遇流賊被執不屈大罵截舌而死同邑劉守中亦殉節陳學良字象頤望江人以明經司鐸祁門及嶺東韶郡教歸里與弟學開隱居講道乙亥流寇遍鄉落學良與弟守嵗達旦偪近賊營或勸其匿笑曰命果骩雖匿能免耶昆弟猶行交拜禮次日賊入門露刃挾之學良厲罵遂遇害時年七十八陳貞申潛山人郡庠生少負志節有文行崇禎丁丑為流寇所執脅之跪不屈賊曰爾為秀才可為我供書寫貸爾死貞申厲聲曰我豈為賊役者憤罵不已賊怒支解之同邑徐益隆吳自周王世美俱不屈死柴維煥字有文宿松諸生同三子避賊於陳漢山並為賊執維煥身長大饒膂力欲强與俱不屈賊殺其長子以脅之旋殺其次又殺其季終不屈賊乃殺之時同邑陳昌言夏時行石思琳俱死義孫臨字武功桐城人兵部侍郎晉之弟楊文驄招致幕中奏為職方主事文驄殉節臨與同難張應奎懐寧人年七十猶讀書不輟所著有大衍圖邵子圜中圖解西銘説諸書城陷不屈死國朝汪吉字廸庵太湖縣人順治初以功授荆州逰擊値小李等賊突犯當陽縣屬時賊多兵少吉奮勇無前挺身血戰而死奉㫖優卹贈廕賜祭𦵏韓應震字伯卿太湖人順治己丑除廣東信宜令三年擢兵馬指揮未出廣遇賊犯信宜守將田自强反顔從賊縛應震送賊營應震大罵不屈而死趙煥文懐寧人以郡掾任陜西白水縣典史康熙戊午興安賊叛令煥文招撫賊執而脅之煥文厲罵乃㧞舌刳目棄屍井中事聞賜祭贈河南封邱縣主簿廕一子徽州府南北朝陳程文季字少卿靈洗子多幹畧有父風大建中從吳明徹北伐齊常為先鋒齊軍咸憚之號為程虎後隨明徹侵周戰敗不屈死於長安贈散騎常侍諡曰威悼宋淩唐佐字公弼休寧人元符進士建炎間知南京劉豫陷南京被執唐佐宻疏其虚實以蠟書告於朝事泄遂見害詔贈徽猷閣待制曹文休寧人崇寧進士授睦州建徳丞方臘之亂死其官詔進秩與恩澤程全字禹昌休寧人方臘盗起縣令棄印去全起義兵以軍功授承節郎苖劉之亂從劉光世勤王賊平授開州團練使後死王事贈官録其後曹夬黟人崇寧登第仕本州通判方臘之亂死於官盧臣忠黟人政和進士歴官右正言後扈駕建康敵使有逼近御舟者臣叱退之失足墜水中數日帝使没者拯之拱立如生贈右諫議大夫詹世勛婺源人紹興三十年以薦為舒城縣民兵正將嘗以六十人敗金兵於栲栳原明日復悉衆來世勛戰死朱弁字少章婺源人建炎初為通問副使與王倫使金通問兩宫留五載倫將歸弁曰使者以節為信今印亦信也願留印使弁得抱以死遂懐印起卧與俱金人迫弁仕劉豫弁曰吾恨不食其肉肻臣之乎吾有死耳後和議成弁南歸入見便殿言敵情秦檜惡之僅轉奉議郎王觀國字賔老祁門人紹興十八年進士授陜州宜興縣尉値賊起不屈被害贈官一等録其家程光廷字朝望休寧人嘉定進士知羅山縣趙方辟為節制三闗部軍䇿應殁於王事贈朝奉郎許月卿字大空婺源人淳祐間登第時徐元􅇐力攻史嵩之史隂殺之月卿率三學諸生伏闕訟寃後又數上書斥丁賈奸邪出佐江西漕宋亡衰服深居三年不言謝叠山嘗書其門曰要看今日謝枋得便是當年許月卿汪立信字誠甫婺源人淳祐進士歴知江陵府勸賈似道盡國中兵沿江分屯置府聨絡固守否則輸嵗幣得緩師期以修守備俱不用咸淳十年似道督師次江上以立信為招討使募兵援江上諸郡受命即日上道與似道遇蕪湖曰某去尋一片趙家地上死耳至髙郵欲控引淮漢為後圖尋聞似道師潰乃置酒召賔佐與訣慟哭三日扼吭而卒贈少傅子麟在建康不肻從衆降走閩死程洙休寧人淳祐進士授貴池縣主簿繼調上元盡誠撫字當代民請留不得發元兵入建康百官降附洙獨沐浴闔門縊死有南窻詩集胡廷桂字伯詵婺源人咸淳進士授平樂尉饒守唐震素知其才辟居簽幕徳祐元年元兵臨城與震協謀捍禦城陷皆死之夏師堯字達徳休寧人咸淳進士授諫議郎嘗忤權奸被謫後陞翰林學士承㫖扈從航海元兵襲崖州死之江友直字徳正歙人為本州教授伯顔入臨安友直升堂痛哭不食死𦵏梅口人名其墓曰餓殺塜程楚翁婺源人元兵入臨安楚翁潛謀興復事泄被執復脱去投馬廷鸞謝枋得在閩遂入閩從之及枋得被執北去楚翁遂死逆旅中汪維崇字賢甫歙人妻福王與芮女授承節郎及革命不食死元汪澤民字叔志婺源人延祐五年進士歴同知推官多異政以知州召修宋遼金三史除國子司業以禮部尚書致仕居宣州長鎗軍叛來寇城城陷被執不屈死贈官諡文節所著有巢深燕山宛陵三稿鄭玉字子美歙人至正十四年除翰林院待制浮海徵之辭疾不起明兵至守將將要致之玉曰吾豈事二姓者具衣冠北面冉拜自縊死吳訥字克敏休寧人少能詩學兵法善騎射至正末授建徳路判官兼義兵萬户守徽州明兵至戰敗不屈自刎死年二十七明程國勝休寧人元末結鄉兵保鄉里明兵下徽州㧞為總管府先鋒從征有功太祖與陳友諒戰康郎山其將張定邊直犯太祖舟舟適膠淺國勝與諸將駕飛舸奮擊水怒湧舟始脱而國勝等深入敵艦力戰死之追封定安郡侯諡忠愍汪清字徯安休寧人太祖與陳友諒戰鄱陽湖清詐降友諒為内應夜舉火中外夾攻火中猶作戰鬬狀遂焚死録忠贈盱眙子祀於康郎山黄彦清歙人建文時為國子博士以名節自勵永樂初坐私諡建文帝被逮不屈死程通字彦亨績溪人祖平坐法遣戌延安父以誠省兄於廣冒瘴死通舁父柩歸𦵏廬墓三年赴太學上書陳情乞祖還鄉辭極懇切太祖憐之命兵部除其籍驛送平還庚午通舉鄉試授遼府長史文皇將舉兵通上封事陳備燕之䇿及即位械至京師死獄中汪一中字正叔歙人嘉靖甲辰進士歴任刑部主事改都水郎治蘆溝決堤有功擢江西副使大盜猝起薄㤗和廵檢劉芳力戰死一中祭之曰爾猶死疆事我不滅賊何以生為遂列陣俘斬數賊明日賊大集一中躍馬當賊鋒脅中鎗臂中刃遂與將王應鵬俱戰死贈光禄寺卿諡忠愍程箕字斗南績溪人明經任福安教諭嘉靖間倭突至箕與令共守禦外援不至城陷或勸避去箕叱曰分城以守可避死乎督戰益力被執不屈死弟子員從死者二十二人郡上其狀褒予卹典淩子儉字仲廣歙人萬歴戊子舉人歴户部郎陞曲靖知府道經貴州値安寇之變督撫留為監軍共城守圍久糧絶至煑革以食儉書壁曰一暝萬世不冺九死百折不囬遂殁吳懐賢字齊仲休寧人以與纂修授中書舍人讀楊漣劾魏忠賢疏稱快註其旁曰當如任守忠即時安置吳昌期以劾忠賢還籍懐賢遺書稱之辭多激烈同官傅應星忠賢甥也懐賢不加禮應星乃以告忠賢怒坐楊左黨下獄拷之從容言曰懐賢何人乃得與楊左同死遂斃於獄懐宗初贈工部主事方國儒字道醇歙人少孤事母至孝登天啟辛酉鄉舉授保康令獻賊躪境國儒力戰七晝夜賊遁去踰月賊擁十餘萬衆復自房山來攻外援盡絶被執罵不絶口身中七刀死吳賜玉歙人以廕判南康𠞰賊遇害贈按察司僉事汪偉字叔度休寧人明季戊辰進士授慈溪令擢翰林檢討充東宫講官流賊陷承天荆襄偉議九江增設總督從之賊薄都城守兵乏餉偉出貲市餅餌充食及城陷妻耿氏先投繯乃書壁自經死世祖章皇帝賜謚文毅呉開先歙人逰澤州崇禎五年流賊躙山西監司知開先勇略署為將使擊賊賊敗去從沁水轉掠陽城開先渡沁戰擊斬數百人砲盡無援戰死吳可箕歙人為南京國子監生聞賊陷京師自題詩衣襟上縊死於鷄鳴山之闗侯祠凌駉歙人明季癸未進士以職方從督輔李建㤗出拒闖賊至保定駉獨與賊戰被創既死復甦乃走臨清建義於齊豫間勢不可支從容自盡康正諫字秦木祁門人明季舉人授和州學正流寇圍城急與妻汪氏先後投池死寡媳章氏亦赴井死贈國子監監丞馬嘉字六禮祁門人明季舉人甲申聞闖寇之難自縊死國朝鄭之文字貞卿休寧人臨清籍順治己丑武進士授紹台道守備十四年海寇犯順之文獨障危城相持閱月食援俱絶賊斬門刼之百計誘降之文罵不絶口遂遇害寧國府晉俞縱宣城人咸和初為桓􅂜部將蘇峻之亂􅂜遣縱守蘭石與峻將韓晃遇衆寡不敵左右勸其退守縱曰吾受桓侯恩厚吾之不負桓侯猶桓侯之不負國也力戰死贈興古太守宋鮑琢旌徳人宣和中方臘寇旌徳琢糾義兵擊破之後賊張遇逼黄池琢以禦冦功補承信郎又明年賊盧進寇涇琢率兵力戰中流矢卒王行之字才仲太平人為婺州士曹宣和三年方臘黨寇婺州守臣皆遁去行之曰吾獄官分當死職遂遇害贈通直郎詹友端宣城人政和鄉貢建炎初上書言復仇取中原事語甚壯後戚方圍宣城友端倡衆守禦賊平補廸功郎紹興壬子盜發西安郡委友端攝尉與賊力戰中流矢卒王相如字次卿宣城人建炎初江右盜起相如為所得州有檄招附賊令草檄以報相如叱曰吾即死不能為賊作牒遂遇害方致堯寧國人建炎庚戌叛將戚方寇寧國致堯率鄉兵破之伏石嶺賊益兵至遂被執賊脅之降罵曰吾豈從賊反耶賊殺之趙汝曏宣城人嘉熙間判文州北兵來攻與知州劉鋭晝夜摶戰城守踰兩月援絶城陷汝曏被執不屈賊臠殺之周真字子繼旌徳人咸淳中奉文天祥劄授本縣尉同邑宰守縣元兵壓境力戰死之楊義忠字大書寧國縣吏元巴延攻寧國知縣趙與禟戰死義忠率衆城守凡六十晝夜亦死之元王翕宣城管軍百户至正間長槍賊攻郡城將陷翕呼弟曰我受國恩當死顧老母在汝宜出避語訖即殺妻子自刎死張文貴宣城百戸至正十七年明兵下寧國路守將出降文貴仗節死妻妾亦自殺梅實字仲實宣城人官集慶路照磨至正末明兵圍集慶城陷不屈闔門遇害張國岡南陵人至正丙申趙雙刀寇南陵國岡率義兵與戰兵敗被執不屈賊斷其兩膝至死罵不絶口明何通㤗字季貞寧國人元末嘗倡鄉兵却紅巾賊後寧國既屬明而偽吳兵復攻其壘城陷自剄里人為立祠汪文炳字炳叔洪武初為都昌知縣陳友諒擁衆來攻援絶被執賊欲官之抗詈而死陳廸字景道宣城人洪武鄉薦召為翰林編修預修大典擢雲南布政烏䝉曲靖等煽亂擊破之建文初徵為禮部尚書靖難兵起疏陳大計與齊㤗極論李景隆不可任督餉過家未嘗一入聞變赴京成祖召廸責問抗詞不屈與子鳳山丹山等同日磔死衣帶中得詩有千秋公論明於日照徹區區不二心語懐宗末賜諡忠烈俞逢辰字彦章宣城人有學行洪武鄉薦選充燕府伴讀建文初成祖稱病宻謀靖難逢辰力諫且宻告藩閫張昺謝貴曰王本無恙公等勿懈隄防及師起復泣諫誅死懐宗末賜諡忠愍萬琛字廷獻宣城人成化舉人𢎞治中令瑞金適閩廣流賊大入有勸琛遁者琛斥之率民兵與戰力屈被執罵賊遇害賊退得其屍身被創十六截指三詔贈光禄寺卿予廕吳景字伯陽南陵人𢎞治進士歴官四川按察僉事守江津時播州賊逼川南御史遁去景禦賊手殺數人城陷大呼曰寧殺我毋殺百姓被執不屈死之饒鼐字象台旌徳人天啟舉人除蒲臺令城陷死之御史旌曰烈尹朱懋華字仲弢南陵人進士授浙江定海知縣莅政數月聞闖賊入京明社為墟乃北望遥拜自縊於署沈夀崇字旭海宣城人冇容子以武進士歴官興都留守闖賊入承天罵賊而死贈都督僉事屠紹臯字士際寧國人羲英孫也以恩貢授上津知縣獻賊陷城被執不屈死國朝李煌字仲宣宣州衞人也順治間恩貢授萊州推官尋攝膠州鎭將海時行擁兵叛脅之不從遂見害贈僉事汪化鰲字魚君涇縣人由㧞貢歴漢中府同知呉逆陷漢中偪受偽職鰲撫膺痛哭自經死槀𦵏漢中城南孫斌字淑獻南陵人以武進士為福寧逰擊耿逆反招斌斌斬其使飛報督撫請兵合討耿逆怒縛至省斌抗詞不屈發置興化棄妻子而逃至背嶺山追卒至梃杖交下推墮峻崖腰肋皆折丁巳春王師下興化斌扶杖謁軍門奉㫖優叙累官䕫闗副將都督同知聞繼母殁求解任詔特許之武臣丁憂之例自斌始劉讓宣城人從征粤西以軍功授西林知縣康熙二十年隨征貴州軍前散餉於南寧遇賊逼脅不從被殺池州府唐姚顯字當晦銅陵人廣明元年黄巢陷潼闗顯拒戰死僖宗嘉其忠追爵王諡英烈立廟祀之宋羅復字無悔銅陵人登政和二年進士第知胙城縣靖康之難兵逼城下復率縣人力禦之身被重創不去南渡後以忠節褒程端中自河南遷池州建炎中知六安軍事北兵攻六安端中固守城破死之池州都統制程全收其骨𦵏於池葉諒建徳人開禧三年北兵分道南下諒集義兵拒之中流矢卒贈武經大夫立祠所居雙溪丁黼字文伯石埭人登淳熙十四年進士第知信州冇修城功轉運使真徳秀薦之端平三年以四川制置副使兼知成都府成都逼近敵壘城中兵不滿七百累疏告急不報元兵圍城出戰不利或勸其走威茂避之黼曰職在守土走將安之悉衆出東門力戰中鏑死贈顯謨閣待制諡恭愍仍敕建褒忠祠於其鄉江應洪字㤗之青陽人登慶元五年進士第有器識善邑宰趙方方後帥襄陽辟應洪為佐方卒攝帥事後知徳安府决數十年疑獄以理劇稱擢淮東提刑兼知揚州元兵大至多方禦之力屈死華岳字子西貴池人為武學生輕財好俠開禧中韓侂胄當國岳上書極斥其罪編管建寧圜土中侂冑誅放還復入武學登嘉定武科第一為殿前司官以宰相史彌逺當國鬱不得志謀去之事覺下臨安獄獄具坐議大臣當死寧宗知岳名欲生之彌逺曰是欲殺臣者遂杖死東市清溪二生貴池人不知其姓名徳祐元年元兵破池州州倅趙昴發死之冇二生撫昴發屍哭曰生為趙氏臣死為趙氏鬼何以洗此寃清溪一泓水躍入弄水亭下死蘇劉義貴池人歴官殿帥初𨽻吕文徳麾下及諸吕降元招之不從死崖山之難元陶起祖銅陵人至正間聚義兵捍鄉里衆恃以安授廬江知縣判銅陵縣事遷池州同知為趙普勝叛軍所執不屈被殺明錢清字公清青陽人倜儻好義元末兵起清糾集義旅捍衞鄉邑與趙普勝立寨相望寇來則拒退則率人力耕給食一方倚頼及將軍常遇春兵至清率衆歸命授千戸吳元年從征張士誠力戰死柯永淳貴池人父徳禮元末同錢清起義兵保障池州明初從常遇春征伐有功官千戸永淳襲職永樂中從英國公張輔征交趾力戰死黄觀字瀾伯貴池人洪武辛未㑹試廷試皆第一授翰林修撰日侍御前命編寫省貪録撰法司榜文歴禮部侍郎建文元年改官制為侍中及靖難師渡淮觀奉詔徴上㳺諸郡兵入衞還抵安慶聞金川門之變朝服再拜自沉於羅刹磯急湍中妻翁氏暨二女家屬十餘人盡死湯九州石埭人少任俠游京師尚書鄭三俊見而器之薦授京營小職歴逰擊懐宗六年為昌平副總兵赴河南追斬賊首混天王於馬鞍山繼復有陽邑青店夏村横山諸㨗威名大著賊深畏之尋赴援山西中蜚語削職俾殺賊自効九年以孤軍由嵩縣深入賊壘窮追四十餘里没於陣李可受字季度青陽人自㓜勵志節崇禎六年以太學生授澄城主簿時流寇躙秦中澄城屢被攻圍可受輒佐其令以死守八年秋賊大至或勸可受棄城走可受曰死吾分也走將奚之城陷不屈死蘇瓊字青城石埭人崇禎甲戌進士授景州知州景當畿南劇衝多大璫要職瓊毎與之抗為所忌調知瀘州時張獻忠屢犯瀘瓊堅守却之己卯冬冇監司夜過邑啟城賊乘之以入瓊督衆巷戰力竭被執脅降不屈罵賊而死妻舒氏亦自殺婢僕從死者七人事聞贈太僕卿佘字聿髙銅陵人崇禎辛巳以貢授隨州判署州事㑹流寇擾楚隨為賊徃來屢經之路前牧多託故避去署事才八日而賊突至破州城索印不與且大罵遂遇害鄭三謨字都甫建徳人尚書三俊兄由舉人歴南戸部郎盡釐度支宿弊出為髙州知府連署雷瓊亷三郡廵守道以才能稱盜刧茂名獄掠及府庫三謨赴救為賊所害郡人三日哭争相度材運甓立廟祀之湯文瓊字兆鰲九州從孫性至孝父母殁廬墓盡毁授徒京師崇禎甲申三月闖寇陷城文瓊慨然語其友曰吾雖布衣獨非本朝臣子乎乃書報國二字於壁又書衣衿云位無文丞相之位心存文丞相之心投繯而絶越五日面色如生陳公誥字大誥貴池人工文善書甲申五月聞北都淪陷闔戸痛哭自經死馬應魁字守卿貴池人為小將史可法㧞為副總兵毎戰披白甲大書盡忠報國四字於背後巷戰死國朝曹誠青陽縣人以貢歴寧州知州勤於其職康熙三年土司昌言等作亂寇寧州誠盡力守禦城陷被殺太平府晉王諒字㓜成丹陽人少有幹略叅王敦府事稍遷武昌太守時新昌太守梁碩専威交土敦以諒為交州刺史既到境謀誅碩不克碩率衆圍諒廣州刺史陶侃遣救未至而諒敗碩逼奪諒節諒固執不與遂斷諒右臂諒正色曰死且不畏斷臂何有憤怒而卒樂道融丹陽人少有大志好學不倦務周人急有國士風為王敦叅軍敦以討劉隗為名遣道融召甘卓同舉兵道融忿敦逆節説卓襲敦卓始然之率所部致討既而復納敦和將旋軍道融晝夜泣諫憂憤而死南北朝齊董僧慧姑孰人慷慨有節義晉安王子懋鎭潯陽僧慧為防閣子懋起兵赴難僧慧預其謀及子懋遇害僧慧被執請於主帥願俟晉安斂畢就死王元邈義而許之白明帝減死配東冶子懋子昭基九歳以方二寸絹為書訊其消息僧慧見書曰此郎君書也悲慟而卒宋石天麟字文祥禹勤子元豐中以勇敢應募偕侍禁李資由峽州入招撫溪峒諸蠻諭以禍福多迎降者資武人以殺降激變蠻復反天麟力戰遇害唐敏求字好古當塗人宣和六年進士調徳化主簿盗起敏求率衆捍禦力不支遂遇害事聞贈官補其子楠將仕郎惠直字子温當塗人崇寧二年進士歴太常博士建炎二年周公望使金奏辟同行及命下或勸直辭直曰天歩方艱豈臣子擇利時乎兼程而進疾作卒髙郵僧舍子貺官敷文閣直學士孫徳昭當塗人建炎中以諸王郡馬領兵禦北兵於大儀力戰而死贈忠烈侯張伯麟字慶符當塗人以氣豪里中毎慕古人竒節紹興初以明春秋補入太學時秦檜主和議百僚相戒以言伯麟痛憤因題齋壁曰夫差而忘勾踐之殺而父乎事聞檜下之獄箠楚無完膚坐以指斥罪流吉陽軍馬進當塗軍籍𨽻慈湖寨伉健沉鷙軍中憚之紹興中軍校周青等據城叛謀屠城後敺所掠絶江渡淮而北進隂結其儔十人挺刃雜隊伍中進突出斫青中頰餘無繼進者遂為賊害併及妻子尋官軍收復州城上其事贈官立廟賜額明恩陶居仁蕪湖人以行義聞鄉里為鎮江録事叅軍元兵攻鎮江守臣遁統制官舉城降居仁被執逼使降居仁曰吾固知歴數已窮詎可失忠義求茍活耶遂見殺主帥義之為棺斂並使人䕶送還鄉溯流數百里不踰時即至人多異之為立祠趙時賞字宗白宗室子居太平州咸淳元年進士歴知旌徳縣徳祐元年元兵至境拒戰有功遷直寶章閣從二王入閩文天祥開府南劍奏辟叅議軍事江西招討副使提兵復寧都時賞風神明俊議論慷慨有䇿謀及空阬之潰被執不屈死吕武太平州歩卒文天祥出使應募從行偕脱鎮江之難沿淮東走海道賴武力為多天祥開府南劒武以功補官天祥遣徃約結州縣起兵相應復由間道㑹天祥於汀梅挺身捍難後死江西一軍揮涕𦵏之明王愷字用和當塗人通經史太祖建中書省用為都事歴遷左右司郎中佐胡大海駐婺州苖軍作亂害大海執愷欲降之愷正色曰吾守土義當死肻從賊耶賊怒並其子行殺之追封當塗縣男吳晟當塗人總管昇弟陳友諒陷姑孰晟為所執不屈死昇長子興與友諒兵戰於采石死之次子振亦没王事嚴徳字君輔當塗人少以驍勇聞從太祖平江浙以功累遷海寧衞指揮同知守禦杭州洪武元年征台州賊戰殁追封天水郡公林聰字文敏世襲建陽衛職聰立功兩廣歴擢都指揮僉事留鎮鬱林州成化三年蠻寇犯境聰提軍出禦戰殁捍塘史記言字司直當塗人明季舉人由長沙令遷知陜州陜當賊衝記言出私財募士力戰俘斬甚多賊引去俄復乘雪夜攻城陷之執記言廹降叱曰有死知州無降知州也遂被殺贈光禄少卿金鼎祚字爾錫當塗人崇禎八年㧞貢生授蘆山令張獻忠陷蜀鼎祚闔門殉節沈受蒲字男玉當塗庠生崇禎十一年舉賢良方正授横州知州以清操聞遷䕫州府同知調成都獻賊破城受蒲與弟受躬死之家口數十人俱罹害江南通志巻一百五十五欽定四庫全書江南通志巻一百五十五人物志忠節三安徽寧池太五府安慶府三國陳武字子烈松滋人年十八謁孫䇿於夀春因從渡江征討有功拜别部司馬䇿破劉勲多得廬江人以武為督所向無前孫權時累功進偏將軍建安二十年從擊合肥奮命戰死權哀之自臨其𦵏宋劉源字叔清淮西野人原義兵長也今為潛山地源性慷慨負大節咸淳中率山寨兵以保障鄉里徳祐元年范文虎以安慶降元景炎二年源與安撫使張徳興起兵倡義復司空山傅髙舉兵應之源建寨野人原相為犄角遂復黄州夀昌軍用景炎正朔元兵攻源寨不能克遂移兵襲破司空山寨破之源守禦三年至是徳興及傅髙俱死黄州夀昌復陷元兵復困之力戰而死元葛昂字銘徳潛山人元季兵起昂募義保障鄉曲駐兵皖山累立戰功事聞授安慶萬戸府金符千戸後天完兵攻安慶府城陷昂死之陳道夫懐寧人余闕守安慶得便宜辟道夫為懐寧尹撫綏有方時敵攻城勢急闕欲自殺道夫曰忠臣當死於敵徒死何名今力尚未窮宜與公死守幸一戰而勝可保全江淮矣遂屢却强敵城陷與闕同死之明王勝桐城人喜讀書尤好兵法元末歸明累功官右副元帥攻陳友諒取江州賜金帶良馬鄱陽之戰謀欲火攻勝應募詐降夜縱火焚其營乘火奮擊大破之勝死於火贈太原郡侯祀康郎山甘霖懐寧人洪武丁邜鄉薦建文時為御史剛介敢言靖難兵起被執不從遂求死從容受戮方法字伯通桐城人洪武己卯鄉薦授四川都司斷事永樂改元諸藩表賀法不署名尋詔逮諸藩不署名者法登舟告家人曰至安慶告我次望江瞻望再拜曰得望吾先人鄉足矣自沉於江俞鑑字元吉桐城人以進士授職方主事英宗北征備官隨駕郎中胡寧當行以病求代鑑慷慨許諾或曰家逺子㓜奈何鑑曰為國臣子敢計身家尚書鄺埜知其賢數與計事鑑曰惟力勸班師耳竟死土木之難周璽字天章太湖人𢎞治丙辰進士累官給諫劉瑾專權璽疏其擅改成命乞正典刑瑾銜之囑遷順天府丞使去言路時錦衣指揮楊玉附瑾誣璽蔑視使臣矯制下獄令玉自鞫玉杖之三十璽不少屈曰吾死不足惜令忠義畏懼可惜耳瑾聞益怒加杖之遂死於獄後瑾伏誅正徳朝賜祭世宗即位復賜祭廕其子汪鑾懐寧人正徳己夘宸濠擁衆攻城北鑾遇被執脅令諭城中出降誘以崇爵鑾至城下大呼曰上師已破南昌賊困極將遁可堅守賊怒解其屍賊退衆犬爭欲噉之一犬守䕶甚力遂不能進見者知係鑾犬因知為鑾屍也有司狀聞詔旌其門張澤字大被懐寧人以選貢授沅江令擢衢州别駕出逋賦者於囹圄民感泣争輸時督府胡宗獻威傾兩浙其前驅求索無厭守令奉之惟謹澤縛而杖之尋移廣安牧出寃濫五十餘人特遷雲南僉事分廵安普時武定猺部鳳繼祖拒命奉檄督戰賊伏起被執歸寨澤衣冠危坐賊願得手書移軍門澤叱曰天朝大臣為賊作説客耶遂死之事聞贈光禄少卿賜廟額忠節左光斗字遺直桐城人萬歴丁未進士由中書授御史議興水利北人始知藝稻光宗昇遐與楊漣争移宫兩人力為多朝野並稱為楊左累遷僉都御史漣疏魏閹光斗與謀又草忠賢二十四大罪疏未上而謀泄奪職歸羣小憾不已搆汪文言獄入光斗名逮至京師同漣拷訊死忠賢敗贈太子少保諡忠毅張秉文字含之桐城人淳之孫萬歴庚戌進士由知縣歴任江楚閩粤司道在粤勦海寇李魁竒等崇禎時仕至山東左布政使濟南圍急瀝血遺書二子有身為大臣當死封疆語拒守中箭死妻方氏妾陳氏投水死贈太常卿阮之鈿字實甫懐寧人以薦舉授榖城知縣未至賊獻忠已據其城求撫總理熊文燦許之令屯牧之鈿察其意欲積榖待時而發宻報文燦勸設備不聼獻賊果反之鈿刺血題壁曰讀盡古聖書籍飬成浩然心性今日殺身成仁不愧賢良方正遂仰藥未絶賊索印不予遇害贈尚寶少卿孟振邦字維新安慶衞世職乞休歸飬中丞史可法强出視衞篆擢叅將左兵陷城遂殉之月餘始得屍顔色如生夏統春字元夫桐城人以保舉授黄陂縣丞流賊犯陂邑統春已遷麻陽知縣未行乃督衆拒守親冐烽火衣不結帶凡十五晝夜賊偽解圍去越五日乘昧爽潰城統春巷戰力竭被執嘆曰惟一死報朝廷耳罵賊不屈賊支解之吳普昭字克明桐城諸生崇禎丁丑流賊逼掠率鄉民團聚格鬬十餘日被害妻孫氏痛夫難哭泣三月死子先璘先殉之婦李氏許氏義不受辱亦死人謂一門五義云笪光𢎞字宏生桐城人端方有介節崇禎丁丑遇流賊不屈死之左光燦桐城諸生崇禎丁丑突遇賊被縛捜袖中得一簿知為保障一方計憾而叱之光燦罵曰殺即殺鼠輩更何問哉賊益怒㧞舌斷足備極􅃤毒知縣張和民請於御史題旌焉時同邑姚孫極王夷吾趙之葵姚孫林陳力均死之又有左旗以庠生殉節汪之璞字石生潛山人明末流寇為亂衆聚保崑崙推璞為長張獻忠環攻璞屢出竒謀多所斬獲寨賴以全嘗上八䇿於撫軍黄配元元竒其才留麾下曰吾得之璞流寇不足平也㑹省親歸寨遇寇攫獲牌票脅之降太罵不屈賊支解之配元聞之大慟給匾致祭同邑王培基字仲因為太湖縣城守城陷被執死之又王立邦徐顯問俱守義死戴君徳太湖人通五經精歴律著有古史斷等書行世崇禎壬午流賊陷城憤詈不屈殺之妻沈氏同媳雷氏擕兩女孫俱赴水死同邑王鼐臣吳夢暘雷綿祚雷延發雷膺祚阮之甫黄應龍俱守義死何大同字于野宿松廪生崇禎壬午流寇猝至被執擁至寨下曰貰爾死為我呼開寨門大同不應復擁之去復至一寨令曰前堡汝家所在故不從今可速賺之大同曰皆戚里也肻以數百人命易我一命乎遂遇害張鳳翥宿松人崇禎辛未進士累官兵備副使分守承徳䕶顯陵單騎招安土寇値闖賊東下親自登陴嚴守勵衆而郡屬開門迎賊鳳翥身受三刃扶創走郢鄂募勇敢恢復竟卒於路周日耀桐城人外兄左光斗被逮道路以目日耀獨左右檻車送之京洎左死於獄仍扶其櫬歸甲申五月聞闖賊破京師仰天大慟絶粒九日嘔血數升而卒胡士恂懐寧人性至孝力學尤邃於易明末左兵陷城慷慨罵賊以死妻張氏亦赴水死二子再寅紹虞俱悲憤不食死紹虞妻蔣氏亦自縊殉時同邑何霖方應旂陳尚炳俱罵賊死丘全潛山人土寇攻崑崙砦脅全使招砦中出降全佯許之至砦門大呼固守勿降賊刳其腹而去王九鼎字在徳潛山人明季北直故城令時流寇連陷七十餘邑故城原壘土而卑隘九鼎以忠義奬率士民死守浹旬力不支城陷遂以身殉先是九鼎以單騎赴任左右惟二子基㤗㤗踉蹌赴難叩閽上書奉㫖查覆俱稱歴任屢著惠績一死凛烈千秋贈太僕寺少卿廕一子江襟楚字雲渚由知縣轉瓊州别駕解組歸遇流賊被執不屈大罵截舌而死同邑劉守中亦殉節陳學良字象頤望江人以明經司鐸祁門及嶺東韶郡教歸里與弟學開隱居講道乙亥流寇遍鄉落學良與弟守嵗達旦偪近賊營或勸其匿笑曰命果骩雖匿能免耶昆弟猶行交拜禮次日賊入門露刃挾之學良厲罵遂遇害時年七十八陳貞申潛山人郡庠生少負志節有文行崇禎丁丑為流寇所執脅之跪不屈賊曰爾為秀才可為我供書寫貸爾死貞申厲聲曰我豈為賊役者憤罵不已賊怒支解之同邑徐益隆吳自周王世美俱不屈死柴維煥字有文宿松諸生同三子避賊於陳漢山並為賊執維煥身長大饒膂力欲强與俱不屈賊殺其長子以脅之旋殺其次又殺其季終不屈賊乃殺之時同邑陳昌言夏時行石思琳俱死義孫臨字武功桐城人兵部侍郎晉之弟楊文驄招致幕中奏為職方主事文驄殉節臨與同難張應奎懐寧人年七十猶讀書不輟所著有大衍圖邵子圜中圖解西銘説諸書城陷不屈死國朝汪吉字廸庵太湖縣人順治初以功授荆州逰擊値小李等賊突犯當陽縣屬時賊多兵少吉奮勇無前挺身血戰而死奉㫖優卹贈廕賜祭𦵏韓應震字伯卿太湖人順治己丑除廣東信宜令三年擢兵馬指揮未出廣遇賊犯信宜守將田自强反顔從賊縛應震送賊營應震大罵不屈而死趙煥文懐寧人以郡掾任陜西白水縣典史康熙戊午興安賊叛令煥文招撫賊執而脅之煥文厲罵乃㧞舌刳目棄屍井中事聞賜祭贈河南封邱縣主簿廕一子徽州府南北朝陳程文季字少卿靈洗子多幹畧有父風大建中從吳明徹北伐齊常為先鋒齊軍咸憚之號為程虎後隨明徹侵周戰敗不屈死於長安贈散騎常侍諡曰威悼宋淩唐佐字公弼休寧人元符進士建炎間知南京劉豫陷南京被執唐佐宻疏其虚實以蠟書告於朝事泄遂見害詔贈徽猷閣待制曹文休寧人崇寧進士授睦州建徳丞方臘之亂死其官詔進秩與恩澤程全字禹昌休寧人方臘盗起縣令棄印去全起義兵以軍功授承節郎苖劉之亂從劉光世勤王賊平授開州團練使後死王事贈官録其後曹夬黟人崇寧登第仕本州通判方臘之亂死於官盧臣忠黟人政和進士歴官右正言後扈駕建康敵使有逼近御舟者臣叱退之失足墜水中數日帝使没者拯之拱立如生贈右諫議大夫詹世勛婺源人紹興三十年以薦為舒城縣民兵正將嘗以六十人敗金兵於栲栳原明日復悉衆來世勛戰死朱弁字少章婺源人建炎初為通問副使與王倫使金通問兩宫留五載倫將歸弁曰使者以節為信今印亦信也願留印使弁得抱以死遂懐印起卧與俱金人迫弁仕劉豫弁曰吾恨不食其肉肻臣之乎吾有死耳後和議成弁南歸入見便殿言敵情秦檜惡之僅轉奉議郎王觀國字賔老祁門人紹興十八年進士授陜州宜興縣尉値賊起不屈被害贈官一等録其家程光廷字朝望休寧人嘉定進士知羅山縣趙方辟為節制三闗部軍䇿應殁於王事贈朝奉郎許月卿字大空婺源人淳祐間登第時徐元􅇐力攻史嵩之史隂殺之月卿率三學諸生伏闕訟寃後又數上書斥丁賈奸邪出佐江西漕宋亡衰服深居三年不言謝叠山嘗書其門曰要看今日謝枋得便是當年許月卿汪立信字誠甫婺源人淳祐進士歴知江陵府勸賈似道盡國中兵沿江分屯置府聨絡固守否則輸嵗幣得緩師期以修守備俱不用咸淳十年似道督師次江上以立信為招討使募兵援江上諸郡受命即日上道與似道遇蕪湖曰某去尋一片趙家地上死耳至髙郵欲控引淮漢為後圖尋聞似道師潰乃置酒召賔佐與訣慟哭三日扼吭而卒贈少傅子麟在建康不肻從衆降走閩死程洙休寧人淳祐進士授貴池縣主簿繼調上元盡誠撫字當代民請留不得發元兵入建康百官降附洙獨沐浴闔門縊死有南窻詩集胡廷桂字伯詵婺源人咸淳進士授平樂尉饒守唐震素知其才辟居簽幕徳祐元年元兵臨城與震協謀捍禦城陷皆死之夏師堯字達徳休寧人咸淳進士授諫議郎嘗忤權奸被謫後陞翰林學士承㫖扈從航海元兵襲崖州死之江友直字徳正歙人為本州教授伯顔入臨安友直升堂痛哭不食死𦵏梅口人名其墓曰餓殺塜程楚翁婺源人元兵入臨安楚翁潛謀興復事泄被執復脱去投馬廷鸞謝枋得在閩遂入閩從之及枋得被執北去楚翁遂死逆旅中汪維崇字賢甫歙人妻福王與芮女授承節郎及革命不食死元汪澤民字叔志婺源人延祐五年進士歴同知推官多異政以知州召修宋遼金三史除國子司業以禮部尚書致仕居宣州長鎗軍叛來寇城城陷被執不屈死贈官諡文節所著有巢深燕山宛陵三稿鄭玉字子美歙人至正十四年除翰林院待制浮海徵之辭疾不起明兵至守將將要致之玉曰吾豈事二姓者具衣冠北面冉拜自縊死吳訥字克敏休寧人少能詩學兵法善騎射至正末授建徳路判官兼義兵萬户守徽州明兵至戰敗不屈自刎死年二十七明程國勝休寧人元末結鄉兵保鄉里明兵下徽州㧞為總管府先鋒從征有功太祖與陳友諒戰康郎山其將張定邊直犯太祖舟舟適膠淺國勝與諸將駕飛舸奮擊水怒湧舟始脱而國勝等深入敵艦力戰死之追封定安郡侯諡忠愍汪清字徯安休寧人太祖與陳友諒戰鄱陽湖清詐降友諒為内應夜舉火中外夾攻火中猶作戰鬬狀遂焚死録忠贈盱眙子祀於康郎山黄彦清歙人建文時為國子博士以名節自勵永樂初坐私諡建文帝被逮不屈死程通字彦亨績溪人祖平坐法遣戌延安父以誠省兄於廣冒瘴死通舁父柩歸𦵏廬墓三年赴太學上書陳情乞祖還鄉辭極懇切太祖憐之命兵部除其籍驛送平還庚午通舉鄉試授遼府長史文皇將舉兵通上封事陳備燕之䇿及即位械至京師死獄中汪一中字正叔歙人嘉靖甲辰進士歴任刑部主事改都水郎治蘆溝決堤有功擢江西副使大盜猝起薄㤗和廵檢劉芳力戰死一中祭之曰爾猶死疆事我不滅賊何以生為遂列陣俘斬數賊明日賊大集一中躍馬當賊鋒脅中鎗臂中刃遂與將王應鵬俱戰死贈光禄寺卿諡忠愍程箕字斗南績溪人明經任福安教諭嘉靖間倭突至箕與令共守禦外援不至城陷或勸避去箕叱曰分城以守可避死乎督戰益力被執不屈死弟子員從死者二十二人郡上其狀褒予卹典淩子儉字仲廣歙人萬歴戊子舉人歴户部郎陞曲靖知府道經貴州値安寇之變督撫留為監軍共城守圍久糧絶至煑革以食儉書壁曰一暝萬世不冺九死百折不囬遂殁吳懐賢字齊仲休寧人以與纂修授中書舍人讀楊漣劾魏忠賢疏稱快註其旁曰當如任守忠即時安置吳昌期以劾忠賢還籍懐賢遺書稱之辭多激烈同官傅應星忠賢甥也懐賢不加禮應星乃以告忠賢怒坐楊左黨下獄拷之從容言曰懐賢何人乃得與楊左同死遂斃於獄懐宗初贈工部主事方國儒字道醇歙人少孤事母至孝登天啟辛酉鄉舉授保康令獻賊躪境國儒力戰七晝夜賊遁去踰月賊擁十餘萬衆復自房山來攻外援盡絶被執罵不絶口身中七刀死吳賜玉歙人以廕判南康𠞰賊遇害贈按察司僉事汪偉字叔度休寧人明季戊辰進士授慈溪令擢翰林檢討充東宫講官流賊陷承天荆襄偉議九江增設總督從之賊薄都城守兵乏餉偉出貲市餅餌充食及城陷妻耿氏先投繯乃書壁自經死世祖章皇帝賜謚文毅呉開先歙人逰澤州崇禎五年流賊躙山西監司知開先勇略署為將使擊賊賊敗去從沁水轉掠陽城開先渡沁戰擊斬數百人砲盡無援戰死吳可箕歙人為南京國子監生聞賊陷京師自題詩衣襟上縊死於鷄鳴山之闗侯祠凌駉歙人明季癸未進士以職方從督輔李建㤗出拒闖賊至保定駉獨與賊戰被創既死復甦乃走臨清建義於齊豫間勢不可支從容自盡康正諫字秦木祁門人明季舉人授和州學正流寇圍城急與妻汪氏先後投池死寡媳章氏亦赴井死贈國子監監丞馬嘉字六禮祁門人明季舉人甲申聞闖寇之難自縊死國朝鄭之文字貞卿休寧人臨清籍順治己丑武進士授紹台道守備十四年海寇犯順之文獨障危城相持閱月食援俱絶賊斬門刼之百計誘降之文罵不絶口遂遇害寧國府晉俞縱宣城人咸和初為桓􅂜部將蘇峻之亂􅂜遣縱守蘭石與峻將韓晃遇衆寡不敵左右勸其退守縱曰吾受桓侯恩厚吾之不負桓侯猶桓侯之不負國也力戰死贈興古太守宋鮑琢旌徳人宣和中方臘寇旌徳琢糾義兵擊破之後賊張遇逼黄池琢以禦冦功補承信郎又明年賊盧進寇涇琢率兵力戰中流矢卒王行之字才仲太平人為婺州士曹宣和三年方臘黨寇婺州守臣皆遁去行之曰吾獄官分當死職遂遇害贈通直郎詹友端宣城人政和鄉貢建炎初上書言復仇取中原事語甚壯後戚方圍宣城友端倡衆守禦賊平補廸功郎紹興壬子盜發西安郡委友端攝尉與賊力戰中流矢卒王相如字次卿宣城人建炎初江右盜起相如為所得州有檄招附賊令草檄以報相如叱曰吾即死不能為賊作牒遂遇害方致堯寧國人建炎庚戌叛將戚方寇寧國致堯率鄉兵破之伏石嶺賊益兵至遂被執賊脅之降罵曰吾豈從賊反耶賊殺之趙汝曏宣城人嘉熙間判文州北兵來攻與知州劉鋭晝夜摶戰城守踰兩月援絶城陷汝曏被執不屈賊臠殺之周真字子繼旌徳人咸淳中奉文天祥劄授本縣尉同邑宰守縣元兵壓境力戰死之楊義忠字大書寧國縣吏元巴延攻寧國知縣趙與禟戰死義忠率衆城守凡六十晝夜亦死之元王翕宣城管軍百户至正間長槍賊攻郡城將陷翕呼弟曰我受國恩當死顧老母在汝宜出避語訖即殺妻子自刎死張文貴宣城百戸至正十七年明兵下寧國路守將出降文貴仗節死妻妾亦自殺梅實字仲實宣城人官集慶路照磨至正末明兵圍集慶城陷不屈闔門遇害張國岡南陵人至正丙申趙雙刀寇南陵國岡率義兵與戰兵敗被執不屈賊斷其兩膝至死罵不絶口明何通㤗字季貞寧國人元末嘗倡鄉兵却紅巾賊後寧國既屬明而偽吳兵復攻其壘城陷自剄里人為立祠汪文炳字炳叔洪武初為都昌知縣陳友諒擁衆來攻援絶被執賊欲官之抗詈而死陳廸字景道宣城人洪武鄉薦召為翰林編修預修大典擢雲南布政烏䝉曲靖等煽亂擊破之建文初徵為禮部尚書靖難兵起疏陳大計與齊㤗極論李景隆不可任督餉過家未嘗一入聞變赴京成祖召廸責問抗詞不屈與子鳳山丹山等同日磔死衣帶中得詩有千秋公論明於日照徹區區不二心語懐宗末賜諡忠烈俞逢辰字彦章宣城人有學行洪武鄉薦選充燕府伴讀建文初成祖稱病宻謀靖難逢辰力諫且宻告藩閫張昺謝貴曰王本無恙公等勿懈隄防及師起復泣諫誅死懐宗末賜諡忠愍萬琛字廷獻宣城人成化舉人𢎞治中令瑞金適閩廣流賊大入有勸琛遁者琛斥之率民兵與戰力屈被執罵賊遇害賊退得其屍身被創十六截指三詔贈光禄寺卿予廕吳景字伯陽南陵人𢎞治進士歴官四川按察僉事守江津時播州賊逼川南御史遁去景禦賊手殺數人城陷大呼曰寧殺我毋殺百姓被執不屈死之饒鼐字象台旌徳人天啟舉人除蒲臺令城陷死之御史旌曰烈尹朱懋華字仲弢南陵人進士授浙江定海知縣莅政數月聞闖賊入京明社為墟乃北望遥拜自縊於署沈夀崇字旭海宣城人冇容子以武進士歴官興都留守闖賊入承天罵賊而死贈都督僉事屠紹臯字士際寧國人羲英孫也以恩貢授上津知縣獻賊陷城被執不屈死國朝李煌字仲宣宣州衞人也順治間恩貢授萊州推官尋攝膠州鎭將海時行擁兵叛脅之不從遂見害贈僉事汪化鰲字魚君涇縣人由㧞貢歴漢中府同知呉逆陷漢中偪受偽職鰲撫膺痛哭自經死槀𦵏漢中城南孫斌字淑獻南陵人以武進士為福寧逰擊耿逆反招斌斌斬其使飛報督撫請兵合討耿逆怒縛至省斌抗詞不屈發置興化棄妻子而逃至背嶺山追卒至梃杖交下推墮峻崖腰肋皆折丁巳春王師下興化斌扶杖謁軍門奉㫖優叙累官䕫闗副將都督同知聞繼母殁求解任詔特許之武臣丁憂之例自斌始劉讓宣城人從征粤西以軍功授西林知縣康熙二十年隨征貴州軍前散餉於南寧遇賊逼脅不從被殺池州府唐姚顯字當晦銅陵人廣明元年黄巢陷潼闗顯拒戰死僖宗嘉其忠追爵王諡英烈立廟祀之宋羅復字無悔銅陵人登政和二年進士第知胙城縣靖康之難兵逼城下復率縣人力禦之身被重創不去南渡後以忠節褒程端中自河南遷池州建炎中知六安軍事北兵攻六安端中固守城破死之池州都統制程全收其骨𦵏於池葉諒建徳人開禧三年北兵分道南下諒集義兵拒之中流矢卒贈武經大夫立祠所居雙溪丁黼字文伯石埭人登淳熙十四年進士第知信州冇修城功轉運使真徳秀薦之端平三年以四川制置副使兼知成都府成都逼近敵壘城中兵不滿七百累疏告急不報元兵圍城出戰不利或勸其走威茂避之黼曰職在守土走將安之悉衆出東門力戰中鏑死贈顯謨閣待制諡恭愍仍敕建褒忠祠於其鄉江應洪字㤗之青陽人登慶元五年進士第有器識善邑宰趙方方後帥襄陽辟應洪為佐方卒攝帥事後知徳安府决數十年疑獄以理劇稱擢淮東提刑兼知揚州元兵大至多方禦之力屈死華岳字子西貴池人為武學生輕財好俠開禧中韓侂胄當國岳上書極斥其罪編管建寧圜土中侂冑誅放還復入武學登嘉定武科第一為殿前司官以宰相史彌逺當國鬱不得志謀去之事覺下臨安獄獄具坐議大臣當死寧宗知岳名欲生之彌逺曰是欲殺臣者遂杖死東市清溪二生貴池人不知其姓名徳祐元年元兵破池州州倅趙昴發死之冇二生撫昴發屍哭曰生為趙氏臣死為趙氏鬼何以洗此寃清溪一泓水躍入弄水亭下死蘇劉義貴池人歴官殿帥初𨽻吕文徳麾下及諸吕降元招之不從死崖山之難元陶起祖銅陵人至正間聚義兵捍鄉里衆恃以安授廬江知縣判銅陵縣事遷池州同知為趙普勝叛軍所執不屈被殺明錢清字公清青陽人倜儻好義元末兵起清糾集義旅捍衞鄉邑與趙普勝立寨相望寇來則拒退則率人力耕給食一方倚頼及將軍常遇春兵至清率衆歸命授千戸吳元年從征張士誠力戰死柯永淳貴池人父徳禮元末同錢清起義兵保障池州明初從常遇春征伐有功官千戸永淳襲職永樂中從英國公張輔征交趾力戰死黄觀字瀾伯貴池人洪武辛未㑹試廷試皆第一授翰林修撰日侍御前命編寫省貪録撰法司榜文歴禮部侍郎建文元年改官制為侍中及靖難師渡淮觀奉詔徴上㳺諸郡兵入衞還抵安慶聞金川門之變朝服再拜自沉於羅刹磯急湍中妻翁氏暨二女家屬十餘人盡死湯九州石埭人少任俠游京師尚書鄭三俊見而器之薦授京營小職歴逰擊懐宗六年為昌平副總兵赴河南追斬賊首混天王於馬鞍山繼復有陽邑青店夏村横山諸㨗威名大著賊深畏之尋赴援山西中蜚語削職俾殺賊自効九年以孤軍由嵩縣深入賊壘窮追四十餘里没於陣李可受字季度青陽人自㓜勵志節崇禎六年以太學生授澄城主簿時流寇躙秦中澄城屢被攻圍可受輒佐其令以死守八年秋賊大至或勸可受棄城走可受曰死吾分也走將奚之城陷不屈死蘇瓊字青城石埭人崇禎甲戌進士授景州知州景當畿南劇衝多大璫要職瓊毎與之抗為所忌調知瀘州時張獻忠屢犯瀘瓊堅守却之己卯冬冇監司夜過邑啟城賊乘之以入瓊督衆巷戰力竭被執脅降不屈罵賊而死妻舒氏亦自殺婢僕從死者七人事聞贈太僕卿佘字聿髙銅陵人崇禎辛巳以貢授隨州判署州事㑹流寇擾楚隨為賊徃來屢經之路前牧多託故避去署事才八日而賊突至破州城索印不與且大罵遂遇害鄭三謨字都甫建徳人尚書三俊兄由舉人歴南戸部郎盡釐度支宿弊出為髙州知府連署雷瓊亷三郡廵守道以才能稱盜刧茂名獄掠及府庫三謨赴救為賊所害郡人三日哭争相度材運甓立廟祀之湯文瓊字兆鰲九州從孫性至孝父母殁廬墓盡毁授徒京師崇禎甲申三月闖寇陷城文瓊慨然語其友曰吾雖布衣獨非本朝臣子乎乃書報國二字於壁又書衣衿云位無文丞相之位心存文丞相之心投繯而絶越五日面色如生陳公誥字大誥貴池人工文善書甲申五月聞北都淪陷闔戸痛哭自經死馬應魁字守卿貴池人為小將史可法㧞為副總兵毎戰披白甲大書盡忠報國四字於背後巷戰死國朝曹誠青陽縣人以貢歴寧州知州勤於其職康熙三年土司昌言等作亂寇寧州誠盡力守禦城陷被殺太平府晉王諒字㓜成丹陽人少有幹略叅王敦府事稍遷武昌太守時新昌太守梁碩専威交土敦以諒為交州刺史既到境謀誅碩不克碩率衆圍諒廣州刺史陶侃遣救未至而諒敗碩逼奪諒節諒固執不與遂斷諒右臂諒正色曰死且不畏斷臂何有憤怒而卒樂道融丹陽人少有大志好學不倦務周人急有國士風為王敦叅軍敦以討劉隗為名遣道融召甘卓同舉兵道融忿敦逆節説卓襲敦卓始然之率所部致討既而復納敦和將旋軍道融晝夜泣諫憂憤而死南北朝齊董僧慧姑孰人慷慨有節義晉安王子懋鎭潯陽僧慧為防閣子懋起兵赴難僧慧預其謀及子懋遇害僧慧被執請於主帥願俟晉安斂畢就死王元邈義而許之白明帝減死配東冶子懋子昭基九歳以方二寸絹為書訊其消息僧慧見書曰此郎君書也悲慟而卒宋石天麟字文祥禹勤子元豐中以勇敢應募偕侍禁李資由峽州入招撫溪峒諸蠻諭以禍福多迎降者資武人以殺降激變蠻復反天麟力戰遇害唐敏求字好古當塗人宣和六年進士調徳化主簿盗起敏求率衆捍禦力不支遂遇害事聞贈官補其子楠將仕郎惠直字子温當塗人崇寧二年進士歴太常博士建炎二年周公望使金奏辟同行及命下或勸直辭直曰天歩方艱豈臣子擇利時乎兼程而進疾作卒髙郵僧舍子貺官敷文閣直學士孫徳昭當塗人建炎中以諸王郡馬領兵禦北兵於大儀力戰而死贈忠烈侯張伯麟字慶符當塗人以氣豪里中毎慕古人竒節紹興初以明春秋補入太學時秦檜主和議百僚相戒以言伯麟痛憤因題齋壁曰夫差而忘勾踐之殺而父乎事聞檜下之獄箠楚無完膚坐以指斥罪流吉陽軍馬進當塗軍籍𨽻慈湖寨伉健沉鷙軍中憚之紹興中軍校周青等據城叛謀屠城後敺所掠絶江渡淮而北進隂結其儔十人挺刃雜隊伍中進突出斫青中頰餘無繼進者遂為賊害併及妻子尋官軍收復州城上其事贈官立廟賜額明恩陶居仁蕪湖人以行義聞鄉里為鎮江録事叅軍元兵攻鎮江守臣遁統制官舉城降居仁被執逼使降居仁曰吾固知歴數已窮詎可失忠義求茍活耶遂見殺主帥義之為棺斂並使人䕶送還鄉溯流數百里不踰時即至人多異之為立祠趙時賞字宗白宗室子居太平州咸淳元年進士歴知旌徳縣徳祐元年元兵至境拒戰有功遷直寶章閣從二王入閩文天祥開府南劍奏辟叅議軍事江西招討副使提兵復寧都時賞風神明俊議論慷慨有䇿謀及空阬之潰被執不屈死吕武太平州歩卒文天祥出使應募從行偕脱鎮江之難沿淮東走海道賴武力為多天祥開府南劒武以功補官天祥遣徃約結州縣起兵相應復由間道㑹天祥於汀梅挺身捍難後死江西一軍揮涕𦵏之明王愷字用和當塗人通經史太祖建中書省用為都事歴遷左右司郎中佐胡大海駐婺州苖軍作亂害大海執愷欲降之愷正色曰吾守土義當死肻從賊耶賊怒並其子行殺之追封當塗縣男吳晟當塗人總管昇弟陳友諒陷姑孰晟為所執不屈死昇長子興與友諒兵戰於采石死之次子振亦没王事嚴徳字君輔當塗人少以驍勇聞從太祖平江浙以功累遷海寧衞指揮同知守禦杭州洪武元年征台州賊戰殁追封天水郡公林聰字文敏世襲建陽衛職聰立功兩廣歴擢都指揮僉事留鎮鬱林州成化三年蠻寇犯境聰提軍出禦戰殁捍塘史記言字司直當塗人明季舉人由長沙令遷知陜州陜當賊衝記言出私財募士力戰俘斬甚多賊引去俄復乘雪夜攻城陷之執記言廹降叱曰有死知州無降知州也遂被殺贈光禄少卿金鼎祚字爾錫當塗人崇禎八年㧞貢生授蘆山令張獻忠陷蜀鼎祚闔門殉節沈受蒲字男玉當塗庠生崇禎十一年舉賢良方正授横州知州以清操聞遷䕫州府同知調成都獻賊破城受蒲與弟受躬死之家口數十人俱罹害江南通志巻一百五十五
