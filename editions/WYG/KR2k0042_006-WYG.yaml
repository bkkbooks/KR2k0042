body:
  text: 江南通志卷七輿地志沿革表三安徽寧池太廬六府安慶府禹貢揚州之域古皖伯國春秋時桐子國亦舒國之地後入於楚秦屬九江郡漢初屬淮南國後屬廬江郡三國初屬魏後屬吳晉亦屬廬江郡東晉義熈中置晉熈郡宋南齊因之梁初為豫州治後改西豫州大寳初又改晉州北齊曰江州陳復曰晉州隋開皇初郡廢改晉州曰熈州大業初改同安郡唐武德四年改舒州屬淮南道天寳初復曰同安郡至德初改盛唐郡乾元初復曰舒州五代屬吳南唐宋仍曰舒州同安郡屬淮南西路政和五年置德慶軍紹興十七年改安慶軍慶元初升為安慶府元為安慶路𨽻淮西江北道明初改寧江府尋復為安慶府直𨽻南京領縣六國朝因之𨽻江南布政使司康熈六年𨽻江南安徽布徽州府禹貢揚州之域春秋時屬吳戰國屬越後屬楚秦屬鄣郡漢屬丹陽郡後漢末屬吳建安十三年始分丹陽郡置新都郡晉太康元年改新安郡宋齊因之梁承聖中析置新寧郡陳天嘉三年仍省入新安郡隋閉皇九年郡廢置歙州大業三年復為新安郡唐武德三年復為歙州天寳元年又為新安郡乾元元年復為歙州五代入於吳南唐宋太平興國元年𨽻江南東路宣和三年改歙州為徽州元為徽州路𨽻江東建康道明初改興安府尋為徽州府洪武二年降婺源州為縣直𨽻南京領縣六國朝因之𨽻江南布政使司康熈六年𨽻江南安徽布政使司領縣六寧國府禹貢揚州之域春秋時屬吳戰國屬越後屬楚秦屬鄣郡漢屬丹陽郡三國時屬吳晉平吳置宣城郡東晉成帝時僑置淮南郡宋仍為宣城郡昇明初以淮南郡併入宣城尋復故梁析置南陵郡兼置南豫州陳又置北江州隋開皇中郡廢為州曰宣州大業初復為宣城郡唐武德初曰宣州屬江南西道天寳初又為宣城郡乾元初復曰宣州大順初升寧國軍節度五代楊吳亦置寧國軍南唐因之宋仍曰宣州宣城郡屬江南東路乾道二年升寧國府元為寧國路𨽻江東建康道明吳元年改呉安府尋改寧國府直𨽻南京領縣六國朝因之𨽻江南布政使司康熈六年𨽻江南安徽布政使司領縣六寧國府宣城縣南陵縣涇縣寧國縣旌德縣太平縣虞夏商池州府禹貢揚州之域春秋時屬吳戰國屬越後屬楚秦屬鄣郡漢屬丹陽郡三國時屬吳晉屬宣城郡宋南齊因之梁屬南陵郡陳因之隋屬宣州大業初屬宣城郡唐武德四年以宣州之秋浦南陵二縣置池州屬江南道貞觀初州廢仍屬宣州永泰元年析宣州之秋浦青陽二縣饒州之至德縣復置池州又置秋浦郡尋廢五代南唐升為康化軍宋仍曰池州屬江南東路元改為池州路𨽻江東建康道明為池州府直𨽻南京領縣六國朝因之𨽻江南布政使司康熈六年𨽻江南安徽布政使司領縣六太平府禹貢揚州之域春秋時屬吳戰國屬越後屬楚秦屬鄣郡漢屬丹陽郡三國時屬吳晉分屬丹陽宣城二郡東晉咸和中僑立淮南郡後又僑立豫州治此宋亦為淮南郡元嘉中分立南豫州南齊梁陳因之隋平陳廢南豫州及淮南郡改屬蔣州唐武德四年復置南豫州八年州廢改屬宣州南唐置新和州尋改為建平軍後周改雄逺軍宋開寳九年改平南軍太平興國二年改為太平州屬江南東路元為太平路𨽻江東建康道明為太平府直𨽻南京領縣三國朝因之𨽻江南布政使司康熈六年𨽻江南安徽布政使司領縣三廬州府禹貢揚州之域古廬子國又巢伯國春秋時舒國及羣舒諸國後屬楚秦屬九江郡漢初為淮南國後分立廬江郡東漢為合肥居巢臨湖龍舒侯國三國時合肥以北屬魏餘屬吳晉亦為廬江郡又分屬淮南郡宋兼置南汝隂郡南齊因之梁天監五年置豫州尋改為南豫州太清元年又改為合州北齊兼置北陳郡隋開皇初郡廢改合州為廬州大業初復為廬江郡唐武德初曰廬州屬淮南道天寳初曰廬江郡乾元初復曰廬州五代楊吳置昭順軍南唐改保信軍後周因之宋仍曰廬州保信軍屬淮南西路建炎初為安撫司治所元初置淮西總管府尋改為廬州路𨽻淮西江北道明初為廬州府領州一縣四洪武十五年以鳯陽府之六安州英山縣來屬直𨽻南京𢎞治中又析置霍山縣領州二縣六國朝因之𨽻江南布政使司康熈六年𨽻江南安徽布政使司雍正二年升六安州直𨽻仍以英山霍山二縣屬之今領州一縣四附明王萬年廬江地理辯廬江漢應劭以為古廬子國葢先王所建萬國之一非所謂中廬亦非所謂匡廬也馬氏輿地考直以廬州當之但知今之廬而不知古之廬也郡人髙誨氏辯其當在廬江而曰或無為言亦未决葢見今之無為而亦未求諸古也今無為地曰臨湖曰襄安曰居巢在漢晉時竝列為廬江屬縣隋始併省至宋太平興國二年方即巢縣城口鎮置無為軍古之廬在此乎然廬江於漢晉郡縣中何在按郡國志云凡縣名先書者郡所治也當在舒及攷三國志孫堅䇿權列𫝊皆如玉海在皖之言則非舒也又按蜀建興十年吳人擊魏廬江都督滿寵曰權舍船二百里懸軍深入恐其走不及耳皖城去江不數里而寵云爾者又似不在皖矣葢先此曹操遣廬江太守朱光屯皖大開稻田吕䝉勸權破之遂以蒙為廬江太守豈濱江自皖以南皆屬之而魏之廬江固自若歟皆不可攷也然以意義逆之前漢在舒後漢之末在皖南朝之治在灊或龍舒至隋大業間始遷郡治於合肥乃併省灊龍舒地置今縣而乃以廬江為名景泰庚午修學築墻得宋建隆二年修縣志碑於土中祝况記曰廬江春秋廬子之國也晉宋以還庸為列郡隋大業中改為縣况邑人其言未必無據也輿地攷并唐書皆謂廬江漢龍舒縣隋改今名固矣而并灊云何葢攷歴志吾郡者皆列屬縣名至隋以後止有廬江而無灊與龍舒亦猶止有襄安而無臨湖居巢者其併省為一可想也一統志以灊城古跡在廬江南二里左傳註廬江六縣西南而六城皆舒城東南六十里有灊川又為邑名則灊之併為廬江益明矣况今大城金牛城濠隍儼然形勢亦壯安知其非廢址歟但班固漢志註灊天柱山在南有祠范蔚宗後漢志亦曰有天柱山似皆指灊之在安慶者言固雖掌圖書長史學然館閣編摩之下豈皆一一經歴者耶神禹治水跡遍天下而紀九河水道尚有與今不合而况於固乎蔚宗以後皆蹈襲不足言也抑廬江之灊名自春秋戰國其在六安者梁時始改而安慶本漢皖城後為懷寧縣清朝玉照二鄉宋人於此立四寨元人立野人原寨及至治三年始析置縣名曰灊山安得以元人所置所名者而紊之耶且二縣俱以山名又非止曰灊也不然則灊江之灊於灊之灊皆可言灊矣噫世逺跡荒漫無稽攷吾惟㑹其理而已矣烏敢盡信書哉江南通志卷七
