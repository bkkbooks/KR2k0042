body:
  text: 江南通志卷一百三十一選舉志舉人七國朝順治二年乙酉科共一百四十五人張九徵丹徒人解元汪永瑞吳縣人董文驥常州府人汪逺徽州府人周龍甲山陽人曾紹唯太倉人熊敏慧揚州府人韓獻六安州人王化明蘇州府人許襄無錫人杜汝用宜興人臧天格桐城人徐果逺無錫人楊演興化人路汝㨗江寧人徐騰暉武進人左圖六安人袁秉銓鎮江人李廷樞江寧人周茂源華亭人堵廷棻無錫人蔣永修宜興人江之崑池州人鮑鳯翔無錫人顧予升長洲人汪匯六合人陳憲冲常州人郭礎揚州人李蔚溧水人馮且丹徒人朱克簡寳應人張熤贛榆人巫之巒當塗人顧玳江都人李銘常金壇人繆慧逺吳縣人薛紹聲吳縣人許煥太倉人張安茂青浦人萬應臯宿松人聶政新丹陽人毛重倬武進人狄敬溧陽人史象晉上元人易象兌海門人張寛泰興人楊鏞吳縣人張星裔武進人周仲球宜興人張愈大巢縣人蔡于宣廬州人汪夢蒲池州人薛耳武進人唐朝鼎常熟人王際有鎮江人陳其勳池州人于雲石金壇人葛維屏鎮江人沈御吳縣人錢祖夀常熟人唐懋淳髙淳人蔣超金壇人李廷榘松江人陳鍹石埭人林中桂江都人鮑蘭徽州人錢世錦盱眙人李瀅髙郵人曹垂燦松江人張方葵淮安人王自新句容人汪浴日六安人郭亮江寧府人吳晉剡宜興人周五嘗巢縣人費達溧陽人王鎬含山人張祚先常州人王應京吳縣人韓豫丹徒人鄒自式武進人朱允治常熟人彭文煒江寧府人王天璧桐城人黄永太倉人許瑤常熟人徐鼎松江人沙衍中長洲人沈在湄無錫人李正蔚盱眙人秦才管南陵人李貞上元人唐稷宣城人顧仁鎮江人陳常無錫人趙函乙合肥人譚希閔揚州人髙翺江寧人潘芬常州人李敬江寧人丁象鼎五河人楊鼎鎮江人趙觀乙合肥人潘泗水南陵人莊起賢金壇人史樹駿武進人張如璿江寧府人周啓巂宜興人孫自成江都人胡之駿淮安人朱選江隂人劉尭枝宣城人蔣怡江寧府人黄中瑄常州人宋徴輿華亭人程汝業廬州人陳廷楹鎮江人潘士璜桐城人楊模聖懷逺人吳禔之武進人孫穎禾無錫人陸本江寧人葉正蓁全椒人尹明廷吳縣人沈搏上常州人蔣龍光宜興人葛天驊蕪湖人徐可先武進人周珽溧陽人過松齡無錫人沈濬溧陽人丁日乾泰州人范朝瑛吳縣人厲士貞儀徵人張炳宜興人陳有度通州人左國林桐城人史士僎黟縣人馮𢎞道常州人楊𢎞祚盱眙人沈昇初蘇州人徐惺江寧府人沈光啓鳯陽府人謝觀上元人胡禹冀江寧府人順治三年丙戌科共一百四十五人秪列一百四十四人范龍長洲人于之寅泰興人孫知本丹陽人徐明弼蕪湖人張新標山陽人孫宗彛髙郵人束京鎮江人王康侯金壇人劉思敬江寧府人施閏章宣城人髙岳英鎮江人顧煜無錫人周式太倉人朱鳯台靖江人吳之紀吳江人陳嘉會揚州人張王治太倉人曹鍾浩金壇人顧予咸吳縣人翁長庸常熟人徐我達泰州人黄宣泰山陽人黎曜興化人方若珽桐城人張晧宣城人林文學揚州人史允𤦺江寧府人蔣扶金壇人王大礽桐城人陳覺先崑山人陳适高郵人潘瀛選宜興人呉六一寧國人張寀江都人荆子周丹陽人薛眉武進人顧景鉉吳縣人姚椽建德人王相呂泰州人王道光金壇人管嘉藩南陵人楊廷錦常州人李丹金壇人李籙崑山人孫開先髙郵人陳繩舜句容人儲方榮宜興人石瑋興化人鄒登嵋常州人顧鏞松江人彭士俊溧陽人方元成桐城人錢嘉徴常州人陳德慶溧陽人徐國鼎青陽人董上治武進人蔡瓊枝無錫人陳卓江都人劉惠恒吳縣人葉萬善和州人鄧旭夀州人王鳯鼎廬江人張幼學泰州人董世仁婺源人吳守寀武進人汪燦宣城人曾振甲常熟人吳應震宜興人馮逹道武進人錢裔僖常熟人范之俊揚州人季振宜泰興人趙開雍寳應人繆植長洲人馬廷桂蘇州人方亨咸桐城人李宗孔揚州人楊兆魯常州人鮑鳯仞無錫人閻兆儀江都人袁仍獬通州人薛信辰無錫人龔百藥武進人姚騰芳松江人錢穀江寧府人陸有聲常州人劉振盱眙人徐致覺六安人卜永昇安東人韋一鶴蕪湖人陳忠靖泰州人周培丹徒人王松常州人王榜寳應人王鏗華亭人張習孔歙縣人徐謙生常州人葉舟江寧人錢召常熟人阮鞠廷南陵人曹開顯廬州人季芷常州人李元麒石埭人楊廷蘊常州人莊冏生常州人田芳旌德人胡宗虞常州人劉允謙夀州人朱殿宸山陽人王綦隆通州人張子循崑山人翁嗣聖常熟人吳慶期宜興人王言當塗人王彬寳應人周道隆山陽人李應軫髙郵人余國柱崑山人邱鎣常州人許庠金壇人張標江都人朱之翰上元人虞宁金壇人馮雷鳴金壇人周建鼎潁州人諸保宥崑山人何棅崇明人吳調元上元人須兆祉武進人王熊瑞長洲人李瑛崑山人孫熿和州人王世噩鹽城人汪觀寧國人翁需常熟人呂鳴純泰興人駱士憤六安人程芳朝桐城人吳鼎玫武進人劉師峻揚州人錢孫愛常熟人張迎禊無錫人胡可及淮安人儲曾宜興人盛文太倉人戴鉉建德人北榜金世濓吳江人順治五年戊子科共一百四十五人袁大受金壇人盛治揚州人蔡祖庚上元人史鼎玉金壇人詹之瑛山陽人閔敘江都人龔廷歴武進人王絲合肥人宗章埈江都人諸豫崑山人楊潔興化人宋之儒江都人張願金壇人陳嘉善江寧府人曹期嘉南陵人楊元勳句容人何酇侯崑山人許熙宇金壇人張灝鎮江人于朋舉金壇人王廣心松江人陸求可山陽人楊令哲常州人王綱廬州人王國瑋揚州人路遴宜興人李嘉印泰州人周􅒇吳縣人陳啓潛吳江人王大章當塗人束真丹陽人李坤鎮江人岳鍾淑武進人卞穎揚州人黄如馨常州人宋德宜蘇州人彭桐城人張延基上元人方膏茂安慶人秦鉽長洲人何如龍歙縣人胡復誠華亭人許纘㑹