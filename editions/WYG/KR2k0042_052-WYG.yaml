body:
  text: 欽定四庫全書江南通志卷五十三河渠志黄河五康熙四十一年六月初三日上諭朕因永定河南岸不時衝坍特㫖令將南岸修築石隄㸔来甚有裨益今黄河南岸自徐州以下至於清口通行修築石隄可否永遠有益若果有益見在國帑不為缺少朕於錢糧一無所惜修築此隄應於何處採取石料作何轉運約幾年可以告成著張鵬翮齊集河員詳議具奏九月十六日内閣奉上諭總河請開邵家莊引河掘徐家莊河觜等事若下部議必致遲延著即照所題行朕觀永定河修築之法甚善河身直河底深所以淤沙盡皆衝刷今治黄河亦用此法方為有益此工多費不過十萬兩試照永定河法修治之十九日内閣奉上諭今所開陶莊引河甚善朕前巡視南河時曽令原任員外黑碩色將引河之樁加意深築其疏濬人字芒稻二河亦佳得此二河運河甚為有益朕觀明朝治河俱自徐州以上在河南地方修築我朝自康熙元年以来俱在徐州以下修築然治下流須預防上流若上流潰決下流必至壅滯嗣後徐州以上地方河臣亦當留意再黄河之水遷徙無定朕前在寜夏時見黄河大溜每年更移今年行溜在此来年又移他處其性如此況九河故道原在河間地方後漸移向南厯代以来果能每年防禦相機修理則河道何至如此大壞皆因時當多事或十年或五年不修築不開濬所以漸難治矣明朝三百年間嘗講求河工治法彼時措置亦得其宜如山東微山湖將水蓄聚山中澇則蓄之旱則洩之皆深有益於治河者也是年創築徐州黄河南岸郭家觜石岸長五百三十九丈三尺又挑穵楊横莊對岸引河長一千八十八丈河工事宜冊是年開放成河楊横莊險工漸次沙淤剙築睢寜縣黄河南岸戴家樓迤裏月隄長一千一百七十三丈五尺建宿遷縣黄河北岸束水隄内小石牐一座五堡磯心石牐一座幫築桃源縣黄河南岸烟墩險工埽臺長三百六十丈又開對岸引河長五百九十二丈又煙墩迤東舊有䕶城隄五百七十丈加幫高厚又接築六百一丈共長一千一百七十一丈為烟墩月隄又剙築談家莊月隄長六百一十六丈清河縣黄河北岸陶家莊隄外引河自康熙三十八年聖駕南巡親閲水勢以黄流逼近清口恐淮水不得暢出詔開引河引黄北注四十年更開穵寛深至是年告成又因陶莊引河告成水勢逼近縣東縷隄剙築撐隄於縣治䕶縣隄之内自縷隄起至䕶縣隄長二百八十四丈又加幫䕶縣東隄於撐隄之外自撐隄頭起至縷隄長一百九十丈張鵬翮河防志以為縣治重門之障又剙築黄河南岸撐隄自陳家莊東挑水新壩尾起至縷隄長三百四十六丈幫築山陽縣黄河南岸洪福莊裏戧隄長二百丈又剙築韓家莊大月隄長八百八十丈加幫埽臺長八十丈四十二年二月初三日聖駕南巡徧閲中河隄工及徐家灣祥符等隄牐總河張鵬翮奉上諭觀黄河磯觜壩太短不能逼溜照永定河試將一兩處作長挑水壩即有衝壞免其賠補又奉上諭烟墩甚險雖有越隄必須保守縷隄此處挑水壩應行建築初四日奉上諭桃源烟墩至龍窩一帶隄工卑矮應行加高初五日上諭永定河分司齊蘇勒朕觀黄河險要地方應下挑水埽壩現今永定河朕親指示挑水等工俱有裨益爾遵照朕指示式様前往烟墩九里岡龍窩三處築挑水壩數座試㸔有無裨益雖被衝壞無妨工完之日令該地方官盡心防守如有蟄陷不時修葺可將此㫖傳與總河張鵬翮速派賢員令其多備物料夫匠於朕回鑾之前完工如遇桃汛水發即可停止三月初二日上諭河道總督張鵬翮王公隄闗係運道民生最為𦂳要隄岸單薄樁工漸朽應再加幫以資捍禦不可因淤灘可恃而忽之也初三日上諭河道總督張鵬翮王家營對面鮑家營應開挑引河洩黄河汎漲之水以保障清江淮安地方著即行興工仍兩岸築隄以衞民田又奉上諭黄河逢灣取直開挑引河必須於對岸水淺之處築挑水壩逼溜入引河方為有益又奉上諭開減水壩須於水緩之處不可迎溜以防奪河初四日上諭河道總督張鵬翮清口西壩乗此水淺時再加長數丈有益又半路劉河流埽灣隄岸單薄應築挑水壩十六日上諭内閣九卿等朕此番南巡徧閲河工大約已成功矣曩時總河于成龍不遵朕指授修築故未能底績今張鵬翮一一遵諭而行是以成功向来黄河水高六尺淮河水低六尺不能敵黄常患淤墊今將六壩堵閉洪澤湖水高力能敵黄則運河不致有倒灌之患此河工所以能告成也朕自御極以来無時不以民生為念雖纎悉之事不肯怠忽今四十餘年矣四海乂安民生富庶河工適又告成朕欲頒詔天下大加恩賚十月初七日上諭大學士馬齊張玉書呉琠陳廷敬朕觀河道已治總河張鵬翮及河工官員俱甚効力黄河一切工程朕知之最悉先是永定河用埽大有裨益是以朕諭張鵬翮黄河亦宜用埽張鵬翮回奏永定河勢小可以用埽黄河勢大難以用埽朕云姑試用之且所費錢糧無幾張鵬翮因而用埽河隄今果堅固矣初八日上諭工部覽河臣奏中河之水由楊家莊開河出口清水暢流敵黄舟楫通行高家堰六壩及各處工程俱保固平穩海口大通河底日深去路甚速淮水暢出黄水絶無倒灌之虞下河等處窪下之區俱得田禾豐收民居安宴所報秋汛水勢已悉所司知之初十日上諭吏工二部黄淮兩河闗係運道民生最為重要朕念治河國家大事夙夜厪懐未嘗少釋披圖咨衆雖已悉其源流顧水勢變遷不常必真知洞悉方可實見施行是以不憚勤勞屢親巡閲察其險易之形勢審其疏導之機宜緩急次第具有成畫至於簡命河臣倚任甚切凡所屬官吏皆聽選用大修工程費以數百萬計嵗修帑金亦以數十萬計乃康熙三十七年黄淮並漲總河董安國不堅築隄堰疏通海口因而河身墊高溢出河岸以致倒灌洪澤湖口湖水從六壩旁洩由運河入下河淹沒民田於是罷董安國以于成龍代之朕隨授以治河方畧詳加指示三十八年親往閲河駐蹕清口河干又面諭于成龍清口宜築挑水壩挑黄水使趨北岸方可免黄水倒灌之患隨指定其地再三申命于成龍不遵朕旨致無成功及用張鵬翮為河道總督面諭云頃已發帑數百萬令大臣官員往高堰築隄閉六壩使逼洪澤湖水暢出清口而清口築挑水壩尤為𦂳要此壩不築則黄水頂衝㫁不能使向北岸湖水不得暢流張鵬翮遵朕言壩工築成黄溜遂直趨陶莊清水因以直出疊經伏秋大漲並無倒灌之事其浚張福口引河築歸仁隄疏人字芒稻涇澗等河開大通口皆遵朕㫖一一告竣今年春朕閲河至桃源見龍窩等處頂衝危險命增築挑水壩此壩工刻日訖事河勢遂平中河仲莊牐口以與清口相對特命改由楊家莊漕輓安流商民利濟曩時黄水泛漲或與岸平或漫溢四出今黄河深通河岸距水面丈餘縱遇大漲亦可無虞矣張鵬翮所修工程雖悉經朕裁㫁而在河數載殫心宣力不辭艱瘁又清潔自持一應錢糧俱實用於河工無纎毫浮耗朕心深為喜悦所屬大小河員並皆勉力赴工共襄河務亦屬可嘉自總河以下各官爾二部即詳加議叙具奏是年遵奉聖祖仁皇帝親閲桃源縣黄河險工指示建挑水壩六座一南岸煙墩險工在大王廟東建挑水壩長十五丈三尺五寸寛五丈一南岸龍窩張家莊險工建挑水壩壩臺長二十七丈三尺壩身出水長十丈寛八丈一北岸九里岡險工在大王廟東建挑水壩長九丈八尺寛四丈一北岸九里岡險工舊龍門處建挑水壩二座第一座長十四丈寛五丈第二座長十三丈寛五丈一北岸半路劉河險工上水頭頂衝處建挑水壩長五丈寛八丈雁翅各長八丈又建南岸張家莊越隄長一千八十四丈又建高家灣迤裏越隄長五百丈又建北岸九里岡迤裏越隄長九百七十二丈遵奉上諭加幫修築山陽縣黄河南岸清江浦王公隄外越隄并縷隄共長七百四十四丈五尺靳輔治河書王公隄一線石工内捍運河外抵黄淮二瀆之衝為數百萬國儲咽喉地然此一隄最難保䕶若開引河則地形未便唯有嵗修石工排樁固址一有坍陷便行補葺而於上流層次築逼水壩二三重以䕶之一則溜以禦衝一則回湍以聚砂使其日漸壅墊若石工之外得淤灘二三十丈則隄址愈固無衝決之虞四十三年建築邳州黄河北岸趙家莊迤裏月隄長八百六十三丈六尺建桃源縣黄河北岸之半路劉迤裏月隄長五百丈二月初三日上諭工部總河張鵬翮請重修徐州城外隄岸徐州逼近黄河城外石隄工程甚屬𦂳要著即行修理四十四年正月二十三日上諭吏户兵工四部朕厪念民生加意河道屢行親閲一切疏濬修築事宜悉經周詳指畫獲告成功前黄河之水往往倒灌清口者皆由仲莊牐與清口相對駱馬湖水勢湍急遂逼黄流灌入清口朕視河時躬臨相度命河臣移仲莊牐改建於楊家莊出口工竣之後河臣報稱黄水暢流入海絶無倒灌清口之患朕尚未經親閲今欲特莅其地察驗形勢用籌善後之規其中河黄河運河有應加修防者亦隨宜指示以圖永久二月二十六日上諭扈從大學士馬齊張玉書陳廷敬總河昨日来問以河工形勢河事已大治矣從前駱馬湖口設竹絡壩湖水大則從壩流入黄河河水大則溢流入壩内今竹絡壩止有湖水暢流黄水並無浸灌則黄河之深通可知初次到江南時船在黄河兩岸人烟樹木皆一一在望三十八年則僅見河岸四十二年則河去岸甚低是河身日刷深矣自此日深一日豈不大治聞下河連年皆大熟亦從所未有也三月十一日上諭河道總督張鵬翮河工已經告成善後方畧更為𦂳要朕今親臨閲視修建天妃牐甚當倘黄水長至五六尺清水不長勢弱不敵黄黄水自然倒灌亦必致之理豈可因此即謂治河失策乎若遇倒灌即將天妃牐暫下版蓄清水全力敵黄不過數日黄水即退遇糧船過時即起版開放若黄水不灌不必下版其惠濟祠一帶雖建有石工但運河與黄河只隔一線之隄若黄溜衝刷石工恐不足恃著於上下適中之處相度形勢修建挑水壩三四座挑溜開行其王公隄亦應相度形勢修建挑水壩運河東隄保守最為𦂳要隄岸應行加幫高郵迤南湖河水勢相平界首迤南河水高於湖水東西兩隄卑薄應加幫修理著量建石工淮安近城隄岸卑薄之處亦應相度形勢修建石工黄河南岸隄工闗係𦂳要應加謹修防閏四月十一日上諭扈從諸大臣及河臣等朕留心河道親閲者屢矣河之形勢必身歴其地始知成功之次第朕每至河上必到此惠濟祠以觀水勢三十八年以前黄水汎濫凡爾等所立之地皆黄水也彼時自舟中望之水與岸平岸之四圍皆可遙見其後水漸歸漕岸高於水今則岸之去水又高有丈餘清水暢流逼黄竟抵北岸黄流僅成一線觀此形勢朕之河工大成矣朕心甚為快然向年自寜夏回曾走黄河察㸔彼處河勢亦甚險水面有與相等者有更大於此者張玉書亦曾見之河在口外原走邊地因木難山是一整石山黄河至此觸石而回遂流入中國不然中國寜有此河患耶又奉上諭河道總督張鵬翮惠濟祠前植標竿處可建挑水壩祠後埽灣處亦宜建挑水壩以保淤灘但此二處挑水壩俱不宜太長恐逼水盡向北岸有礙楊家莊口門卞家汪舊壩修建甚佳再畧加寛長更善十三日上諭河道總督張鵬翮九里岡隄工修理得法不似從前直埽不能挑溜今修魚鱗埽逐段挺出逼溜開行使窪處漸淤此法甚善其埽工釘樁處可再建挑水壩二座若恐水深則先建磯觜壩形出水俟其壩下漸淤層次加修則料不加多而功易成是年接築蕭縣黄河南岸順河集越隄長五百九十三丈六寸五分遵奉上閲河指示桃源縣黄河北岸九里岡險工建連環壩三座河工事宜冊將大溜挑入中泓埽工得保平穩又建築黄河北岸三坌工越隄長七百六十丈遵奉上閲河指示清河縣黄河南岸惠濟祠前後建挑水壩二座并卞家汪挑水壩亦加寛厚又遵奉上諭題准建築山陽縣黄河南岸清江浦王公隄外挑水壩一座挑溜北向建黄河北岸安東縣便益門南門東門迤西磯觜埽壩二座各長十丈又幫築裏戧隄長三百四十丈山安河㕔冊是年桃伏秋汛黄水異漲大溜直衝縣城總河張鵬翮竭力搶救得全隨於縣城瀕河建築二壩挑溜開行以禦頂衝激刷之險又建三套越隄長一千八十丈四十五年改建清河縣黄河北岸王家營新減壩口寛五十丈四十六年五月二十九日上諭吏部朕厪念河防屢行親閲凡自昔河道之源流及歴来治河之得失按圖考蹟靡不周知粤從明季冦氛決黄灌汴而洪流横溢嵗久不治迄於本朝在河諸臣皆未能殫心修築以致康熙十四五年間黄淮交敝海口漸淤河事幾於大壞朕乃特命靳輔為河道總督靳輔自受事以後斟酌時宜相度形勢興建隄壩廣疏引河排衆議而不撓竭精勤以自効於是淮黄故道次第修復而漕運大通其一切經理之法具在雖嗣後河臣互有損益而規模措置不能易也至於剙開中河以避黄河一百八十里湍悍之險因而漕輓安流商民利濟其有功於運道民生至遠且大朕每莅河干徧加諮訪沿淮一路軍民感頌靳輔治績者衆口如一久而不衰夫人臣有大建樹於國家者奬勲酬庸宜從優渥雖賜䘏易名已循彜典尚應特予褒叙賁以殊恩靳輔著加贈太子太保仍給世職拜他喇布勒哈番用彰朝廷追美勞臣之典為矢忠宣力者勸爾部即遵諭行是年補築豐縣黄河北岸呉家莊新隄長四百三十丈河工事宜冊呉家莊迤上隄工於康熙四十六年八月初六日黄水陡長風雨交加人力難施以致漫溢成缺寛一百三十丈河督張鵬翮題報估修越隄并補築新隄建安東縣黄河北岸佃湖迤上地藏菴前磯觜壩連上水雁翅下水樓崖共長三十四丈五尺又幫寛裏戧隄長二百丈又剙築栁園頭越隄長四百丈四十七年挑穵碭山縣黄河南岸呉家莊對岸丁家閣引河長一千三百五十三丈河工事宜冊河督張鵬翮亟請挑穵引河引溜直趨疏内題准估挑工竣是年即開放成河呉家莊險工淤閉剙築蕭縣黄河南岸徐家莊月隄長五百七十一丈附見張鵬翮河防志一挑穵引河之法審勢貴於迎溜而施功宜於深闊且俟水大漲乗機開放則有一瀉千里之勢若挑穵太窄則受水無多遽難挽溜以入新河若挑穵太淺水不全趨勢緩則墊若挑引河太短水流不舒為正河所抑洄洑漩淤須挑穵寛六十丈或四十丈即窄亦須十餘丈須長二千丈或千餘丈即短亦須八九百丈方趨溜有勢而成河若挑穵引河太直固屬節省錢糧又恐直則平緩而無波瀾湍激之勢久亦漸淤也須隨黄河大勢開挑俾其河頭迎溜河尾洩水中間灣處急溜衝刷漸次河岸倒卸再於河頭築接水埽壩河尾築順水埽壩對河築挑水埽壩庶引河可成也一幫築隄工之法凡屬河道必築隄束水歸漕以防旁溢無論剙築加幫總以老土為佳但黄河兩岸率多沙土恐難盡覓老土須於隄完後務尋老土蓋頂蓋邊栽種草根以禦雨淋衝汕築隄之法每土六寸行硪其岐縫處用夯堅築其新舊隄交界又用鐵杵力築層層夯硪期於一律堅實總以簽試不漏為度一卷埽下埽之法凡應用埽箇須捲長十丈八丈者方穩高一丈者埽臺要寛七丈方捲得𦂳如遇隄頂窄狹者架木平隄名曰軟埽臺然後捲下先將栁枝綑成埽心拴束充心繩揪頭繩取蘆柴之黄亮者􅶇打小䌁總繋於埽心之上每丈下鋪滾肚麻繩一條或不必用麻者即用蘆纜又將大蘆纜二條行繩一條密鋪於小䌁之上鋪草為筋以栁為骨如栁不足用柴代之均匀鋪平需夫五六十名如長十丈者共需夫五六百名八丈者四五百名用勇健熟諳埽總二名一名執旗招呼一名鳴鑼以鼓衆力牽拉綑捲後用牮稈戧推埽將臨岸將小䌁均束於埽埽岸上每丈釘下留橛二根將滾肚繩挽於留橛之上每揪頭繩一根亦釘留橛一根㸔水勢之緩急定揪頭繩之多寡漸次將埽推入水中將橛頭滾肚用活扣結於留橛之上然後慢慢壓土俟埽將次沉下然後下樁每丈用一尺八寸木一根若水勢湍激頂衝埽灣並合龍之埽須用大木不在一尺八寸之例每丈用料物細數照現行工部則例配用可也一黄河内下埽之法凡黄河内埽工有修防有救險有搶險有新生險修防工程於霜降後水勢退消驗查舊埽傾欹者蟄陷者卑矮者朽爛者須將舊埽清消平妥相機補下層層簽釘大樁照依大汛水漲之痕仍高出數尺一律下成順埽薄敷以土俟其蟄定方可下丁頭埽若埽未蟄實即下丁頭埽前順埽一有蟄陷將别埽俱為帶動矣其救險工程將有危陷埽尚未去急須臨河添壓大埽長樁靠隄急清舊埽恐為匯崖填之以軟草將兩旁安穩之埽亦須補下大樁併力救䕶勿使走動則工程平穩矣其搶險乃因舊埽朽爛或因頂衝急溜埽下衝激空虛舊埽全去水滙崖岸舊隄坍卸岌岌堪虞當此之際人皇皇莫知所措搶險工程事有先後埽有緩急若悞下一埽悞釘一樁反致逆溜湍激衝刷舊隄欲去不能每致僨事須責令久慣埽手或熟諳工程人員殫心料理責任既專令其度量穩妥然後急為接下埽箇晝夜搶下庶舊隄無虞兩旁之埽平穩矣其新生險工每於舊險工之上下黄河大溜一時衝至埽旁舊隄坦坡坍卸急須下埽直至開溜之處而止大率埽料黄河之内以栁柴為重次則枯草樁必長大繩須堅實至於壓土非比清水埽箇黄水一入埽中即泥沙停滯若壓土太厚反恐欹卸俗云下埽無法全慿土壓者乃是言清水之埽也一黄河塞決之法凡黄河初決且不必急計裹頭亦不必急計堵塞初開之時水勢洶湧未可與爭㸔其出口急溜若有奪河情形須建挑水壩以遏其勢上流挑穵引河以挽其流速運積料物料物既積矣猶在得時時可堵矣裹頭舊隄務必多下邊埽堅固停妥然後逐漸進埽埽不可緩緩恐決口漸深又不可急急恐下埽有失埽必欲其大而長長大則穩捲埽首重於繩纜其揪頭滾心滾肚必須長壯務使繩勝埽莫使埽勝繩埽既下矣薄用土壓埽將沉於水方釘簽樁再加套埽其樁亦必須長大計埽將到底方可再進沉水將次合龍之際須查在工料物除合龍之外仍多積料物須防合龍之後必有一大蟄陷每於合龍之後復開決者率因蟄陷故也於合龍之時晝夜兼工堵塞遇有毛道過水或係樁頂不平或係埽手作弊故留罅隙必須急為壓土使其平實於罅隙用稻草或紅草塞之務使㫁流若涓涓不息漸至蟄陷不急搶救則潰矣欲杜樁埽手之弊惟有恤其勤勞厚以賞賚不必按日計值惟以成工為主則工易舉而成亦速也至決口初開時不係頂衝之處出口勢緩去口平散亦不必急計堵塞久之率多掛口淤墊也一建築挑水壩之法凡黄河迎溜之處宜建築挑水壩又名順水又名磯觜又名馬頭其功最大如清河縣境内之運口每為黄水急溜直逼卞家汪闗攔清水不得暢出以致運口淤墊陶家莊引河數挑不成仰遵聖謨指示於運口迤西築挑水壩一座將黄水挑逼北徙清水得以暢出陶家莊引河得以成功今二瀆合流河工告成者攸賴於是凡遇有險工之處照式築之裨益非小酌試建築之法壩欲其寛不可甚長須做雁翅邊埽以順上流勿使埽頭逆溜有掀揭之虞若離縷隄逺者須接築格隄捍禦以防異漲時黄水溢壩後衝刷之虞又附見河防志載黄河各險工徐州郭家觜險工長五百三十九丈潘家馬路嵗修險工長六十四丈康熙四十年間因對岸新生鷄心灘大溜埽灣崖岸坍塌遂成險工楊横莊嵗修險工長四百三十五丈楊横莊挑水壩西雁翅嵗修險工長四十二丈曹家莊搶修險工長八十六丈楊家窪嵗修險工長三百二十三丈小店嵗修險工長三百一十丈呉家莊搶修險工谷家莊嵗修險工二工相連共長三百一十丈狼矢溝嵗修險工長二百五丈長樊大壩嵗修險工長三百二十丈睢寜縣王家堂嵗修險工長三百一十一丈五尺戴家樓嵗修險工長三百四十丈邳州塘池栁園頭搶修險工兩工相連共長一百六十五丈羊山寺前嵗修險工長二百七十八丈自董家堂頭壩起至馬船幫止嵗修險工長十工百二丈宋家莊搶修險工長九十八丈戚家堡嵗修險工長一百一十九丈青墩營姚家莊三官廟嵗修險工三工相連共長四百六丈宿遷縣彭家堡嵗修險工長一百四十二丈徐家灣龍門搶修險工長一千二十一丈陳家道口嵗修險工舊長九十一丈五尺又坍塌河崖二十五丈共長一百一十六丈五尺皁河攔嵗修險工舊長八十四丈五尺新生七丈五尺河北鎮下灣搶修險工長二百三十六丈大古城嵗修險工長一百一十四丈桃源縣烟墩嵗修險工舊長二百五十八丈康熙四十一年東頭新生險工一百五丈龍窩汛險工志内未載丈尺張家莊嵗修險工舊長四百三十丈康熙四十一年又新生險工五十四丈談家莊嵗修險工舊長二百七十丈康熙四十一年又新生險工五十丈九里岡嵗修險工長三百三十三丈三尺上渡口嵗修險工長六十丈七里溝磯觜壩嵗修險工長五十七丈三坌嵗修險工舊長一百一十九丈康熙四十一年又新生險工二十丈半路劉險工志内未載丈尺清河縣石人溝嵗修險工長五百丈玉皇閣嵗修險工長六百九丈山陽縣老壩口嵗修險工長一百四十二丈小車路口嵗修險工長六十丈大車路口嵗修險工長二百四十九丈朱家溝嵗修險工長一百九十四丈洪福莊嵗修險工康熙四十年長六十丈四十一年又新生三十二丈柴市湯董莊嵗修險工兩工相連共長四百三十五丈上張莊嵗修險工長五百一十九丈尹家莊韓家莊嵗修險工二工相連共長四百三十五丈新港嵗修險工長一百五十丈周家渡唐家堡小茭陵何家莊大茭陵嵗修險工五工相連共長一千五百六十七丈胡家莊嵗修險工長一百六十丈童家營嵗修險工長一百七十八丈安東縣邢家河險工長六百五十丈鄭家馬頭嵗修險工長一百三十五丈時家馬頭險工嵗修新舊共長二百二十九丈八尺又搶修三十五丈便益門嵗修險工長三百一十八丈南東兩門嵗修險工共長二百五十丈汪家莊二塘搶修險工二工相連共長二百四十五丈窑灣搶修險工舊長一百五十五丈四十年河身漸深水勢稍平止搶修挑水壩二丈七尺四十一年異漲之水搶修一百五十七丈八尺龍潭口搶修險工長五百五十丈老隄頭嵗修險工長三十四丈佃湖搶修險工長四十五丈栁園頭新生險工長二百九十五丈六尺陳家莊新生險工西磡險工即在陳家莊下掌家港險工在西磡之下已上三工志内未詳丈尺按靳輔治河書徐州南岸險工三曰郭家觜曰楊家窪曰小莊北岸一曰長樊大壩睢寜之境盡於南岸險工三曰王家堂曰戴家樓曰羊山寺邳州之境盡於北岸險工四曰塘地大壩曰羊山寺曰董家堂曰五工頭宿遷南岸險工四曰蔡家樓曰彭家堡曰徐家灣曰白洋河草壩北岸三曰朱家堂曰楊家莊曰古城桃源南岸險工三曰烟墩曰龍窩曰李家口北岸五曰九里岡曰上渡口曰七里溝曰新莊口曰三坌山陽之險俱在南岸險工凡十有二曰王公隄曰老壩口曰草灣湯董莊曰顔家河上張莊曰真武廟曰周家渡曰唐家堡曰小茭陵曰何家莊曰大茭陵曰馬邏沈家圍曰羅家左家口二十里安東險工六曰二鋪曰便益門曰南門曰東門曰茆良口曰佃湖此與河防志所載險工多寡有不同者靳輔又云有昔險而今平有昔平而今險蓋河道變遷衝刷不