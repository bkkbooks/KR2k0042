又加幫尹韓二莊越隄等工共長二千七百五十一丈又加幫沈家園越隄格隄等工長八千五百九十八丈八尺河工事宜冊六年工竣六年建徐州黄河南岸曹家壩埽工長一百十丈加幫睢寜縣黄河南岸王家堂縷隄長四百六十丈建宿遷縣黄河南岸皁河集前摟崖埽工長一百六十丈建桃源縣北門外黄河南岸䕶崖埽工長一百四十七丈又建黄河北岸單家莊䕶崖埽工長一百五十丈七年二月初五日奉上諭齊蘇勒練達老成深悉河工事務是以授嵇曾筠為副總河專管北河而令齊蘇勒兼理南北兩河之事今尹繼善新管河務朕意欲令尹繼善嵇曾筠分任南北兩河又思治河之道必合全河形勢通行籌畫方可疏導安瀾若分令兩員管理恐有推諉掣肘之處著怡親王大學士等會同署蘇州巡撫王璣及九卿内本籍江南河南山東之人通曉河務者詳悉速議具奏七月初八日上諭黄河隄岸乃運道民生所闗最為𦂳要年来殫心經理增卑培薄幸隄工堅固共處安瀾但工程報竣例應歸汛修防而額設河兵堡夫只能修補水浪衝激之處防備臨險搶䕶之用至於隄身一年之内風雨淋漓車馬踐踏漸致侵蝕者亦勢所必有而隄遠工多不能責諸寥寥兵役也朕留心訪察已久又復詢問通曉河工之人知河防一覽内載有潘季馴每嵗派夫加高五寸之請即從前靳輔亦有每兵一名招募幫丁四名給以隄内空地耕種免糧嵗令加土五寸之議與朕計慮之處實相符合朕思隄工雖千有餘里若按丈每年加修五寸計費不過三四萬兩倘置之不議一年剝削四五寸合十年而計之其所費之多恐有不止於加修之數者況河流漲漫不時難以預料何若逐年増修保固為未雨綢繆之計也朕意如此其果否有益之處著南北兩河總督尹繼善嵇曾筠悉心商酌詳確定議具奏至於州縣派夫錮弊久經嚴革而募丁給田之説亦不可行其每年嵗修之費或動用藩庫帑金或於臨河州縣應解公用銀兩内就近支給若有不敷於藩庫撥補亦著河臣一併定議具奏九月十四日内閣進呈聖祖仁皇帝治河方畧奉上諭著内閣敬謹收貯朕惟聖祖仁皇帝軫念民生而於黄運兩河尤厪聖懐自甲子以迄丁亥六次親厯河干指授方畧一切修築堵塞事宜無不出自宸衷規畫數十年來聖謨睿訓備載此書凡有河防水利之任者皆應悉心詳閲奉為法則著繕寫三部發給孔毓珣嵇曽筠尹繼善令其敬謹閲㸔必於河務大有裨益但河性遷移或今日情形與昔年有不同之處著孔毓珣等三人㑹同商酌具奏又當年或有奉㫖案件此書未經載入而該衙門有檔可稽者亦著查明具奏是年建宿遷縣黄河南岸蔡家馬路摟崖埽工長一百七十丈八年九月總河嵇曾筠疏請預備工料以資修守十二月奉俞㫖行附嵇曾筠疏略河工料物全在及時儧辦貯工濟用方資修守遍閲黄河自徐屬之碭山以至山安海口雨岸綿長一千六百餘里隄埽工程在在險汛如同鱗集兼之邳宿桃中高堰淮揚一帶湖河工程攸闗運道民生均屬𦂳要每年嵗搶以及新險貴帑數十萬用料億千萬束方能敷用從前河道除額運葦蕩營柴一百五十萬之外俱於河庫通融發帑年前預給辦料銀兩購貯料物但所辦之料不過十分之二三工多料少分貯難周一遇水勢漲發雖臨期陸續購辦每多挽運維艱緩不濟急且江南柴束産自海口一帶守候風信辦運更延時日若非先事預圖恐致臨期坐誤請照豫省之例每年於九十月内即預為約計各㕔需用之料通融動支銀兩預備十分之七酌量工程險易分貯各工限以本年十一月内運工一半次年正月内務令全運到工其餘俟次年㸔工程之緩急再為辦運是年剙築邳州黄河北岸宋家灣摟崖埽工長三百一十丈建宿遷縣黄河南岸鈔闗前摟崖埽工長一百五十丈建桃源縣黄河南岸沈家莊䕶崖埽工長一百五十丈加高清河縣黄河北岸石人溝縷隄長二百五十丈楊家莊隄長一百一十五丈王家營減壩迤東起隄長二百一十六丈河工事宜冊九年三月工竣又加高黄河南岸清口東甘羅城隄長一百四十六丈卞家汪隄長八十四丈天妃壩隄長三百二十丈河工事宜冊九年三月工竣九年剙築蕭縣黄河南岸徐家莊摟崖埽工長一百九十八丈徐屬㕔冊徐家莊對岸漲出沙觜大溜直射南岸建築摟崖埽箇保固險工剙築徐州黄河南岸楊家窪月隄長三百丈剙築睢寜縣黄河南岸劉家樓迤裏月隄長二百五十五丈朱家壩迤裏月隄長五百一十六丈五尺河工事宜冊俱為重門以保隄工建築靈璧縣黄河南岸張家瓦房壩臺併摟崖埽工長一百五十丈邳睢㕔冊因徐州境内茅家山二十里長河大溜直射南岸以致新生險工築壩臺摟崖埽以資捍禦剙築宿遷縣黄河南岸孟城菴月隄長二百五十丈又建築黄河北岸王家灘挑水壩二座各長十丈並上下雁翅䕶崖埽長一百一十丈建築桃源縣黄河南岸蔡家莊壩臺長十丈並上下雁翅䕶崖埽長八十丈加幫山陽縣黄河南岸韓家莊縷隄長三百九十丈十年建築阜寜縣北岸四套月隄長一千八百丈附嵇曾筠疏畧阜寜縣黄河北岸四套五套一帶地方坐當黄河尾諸水匯歸入海之區地形最窪危險堪虞前於雍正八年秋汛水勢驟長人力難於保䕶致將四套埽工衝塌今因南岸長出沙灘溜勢日漸北徙四套上下甚屬危險若再搶築埽工則臨河地勢虛鬆不特難於保䕶且錢糧需費浩繁臣親赴該工逐細確勘必須寛築隄防以禦汎水於三套以下高阜之處建築月隄一道庶上下包䕶兠灣俾水勢循軌東注不致有出漕旁洩之患奉㫖依議十一年建築龔家營月隄長一千一百五十五丈徐家莊月隄長二千九百八十丈附嵇曾筠疏略山陽縣黄河南岸龔家營地方坐當黄水入海門户最為𦂳要祗因舊有縷隄臨河太近大溜汕刷河崖坍塌入裏致成埽灣險工若下埽修防工段綿長需料浩繁且全黄之水建瓴而下埽刷埽根更難保護急應在於縷隄之南圏築月隄一道避其湍激之勢以順其就下之性又阜寜縣黄河南岸徐家莊地方去海更近雍正八年題大溜日漸南徙經前河臣孔毓珣止計長二千九建月隄一道自徐家莊至陳家浦百八十丈原估止高八尺頂寛二丈底寛六丈續經臣等㑹疏題修在案迄今復歴三載北岸沙灘日長頂衝大溜直射南岸而該處地形窪下前次所築之隄殊屬卑薄恐汎水長發黄水下注海潮上湧難資捍禦亟應加幫高厚以固隄防查山陽縣黄河南岸龔家營上自邵家莊後起下至吉家莊後止創築月隄一道長一千一百五十五丈阜寜縣黄河南岸自徐家莊起至陳家浦止加幫月隄長二千九百八十丈奉㫖議又合龍閉氣説堵閉決口至合龍時正河尚未寛通旁流又復阻塞全河水勢進退兩難屈不能伸之日此時茍措置少有不周必致尋路奪門乗虚潰陷盡棄前工故堵合決口築至祗寛十餘丈之時務將從前已下各埽凡揪頭滾肚以及樁橛等項一一檢㸃明白更驗明積料積上若干然後每邉各再進一二埽鑲墊極穩方可捲下合龍埽箇其埽或用單用雙俱可不拘既下埽閉合之後一鼔作氣竭力鑲瑱層層加壓著地随即簽樁至埽尾溜㫁為率至從前做過各埽須自靠隄起至龍門口止通身壓土三四尺加鑲又不可一律鋪填如埽面寛十丈者止於埽頭埽尾各鑲寛一二丈其埽面中間多用土壓埽上壓土愈重埽箇愈穩將来蟄陷亦少若夫堵合決口之後河流亦必去埽工數十丈之外似乎足資鞏固但近埽之處不有河形即係窪地水勢一長仍必分流倘不早為防備則外口嫩沙見水便消壩下埽工倘或朽腐一有更變便無從下手亟須於龍門外口約畧長短再下順埽數十丈或二路二層或二路一層以䕶之如龍門裏口跌塘尚淺則於裏口建貼心壩以為内戧更著𦂳晝夜搶築裏越大隄一道方為萬全無失蓋以論水者氣勢二字本屬相連勢之所趨氣必隨之今裏戧外䕶而又圏以越隄俾其氣無所透而其勢亦隨以退阻淤沙掛灘可跂而待司壩工者其可不急為之善後耶又石工説石工之要第一先審水勢如黄河水性靡常沙土虚鬆除山陵岡麓土性堅凝量為建築石主以資捍禦其餘㮣難壘砌又如清水頂衝之處建牐若遇山水大發全力衝動必致潰裂難支惟熟察夫来源之清濁為頂衝為拖溜擇地建造方能堅久是水勢之貴於斟酌者一也一在先據根基如根基不能堅實雖密釘長樁層壘巨石平墊下座必致塌陷務須選擇土性堅凝之處然後施工則久而不敝即至歴年既遠間有損傷基址永固易於修理是根基之貴於堅實者一也至於壘砌之法首重底樁毋論馬牙梅花務必株株實在方能著力一有虛鬆則力難勝重上實下虛道身受病即全體俱堅間冇一二樁根不能到地偶遇石縫接筍之處立致欹斜偏側是以按照漕規估計有二截三截之分而測量地勢簽釘務以著實到地為要是底樁之貴於實在者一也一重石塊不拘丁砌順砌務須六面琢平方能穩固倘一面不平即一處不穩每有任聽匠作草率了事鑿鑿不平用碎石襯墊迨至壘砌既高其力愈重所墊碎石難支工完未幾旋有蟄裂是石塊之貴於平整者一也一重對縫石縫不密則罅隙可虞易於滲漏即使灌以濃漿而灰縫粗疎不能鎔成一片串水之患勢不能免凡鬬筍接縫之處務必琢磨細緻參差壓縫勾抿合式方資鞏固是接縫之貴於緻密者一也一重灰汁灰有真􅎓之辨汁有濃薄之分少不留心察㸔則動多虛假茍至計及錙銖希圖節省即有匠工牙儈乗機舞弊灰則攙和沙泥汁則半多清水豈能融洽膠黏充盈飽滿徒飾外觀其弊不可勝言是灰汁之貴乎察核者一也一重丁石不拘大小石工如得層層丁砌自當格外堅固否則層丁層順間砌皆能垂久如非喫𦂳大工則估計順砌居多每層順砌一丈例用丁頭石三塊每塊長三尺六寸庶與襯裏磚石裏外牽扯方資鞏固如謂壘砌在中無可考究所用丁頭石長不如式則牆裏二石兩不相蒙倒卸之虞半多由此是丁石之貴於照佔者一也一重襯磚牆石之後接砌裏石裏石之後復襯河磚蓋土石性殊難於聨屬以磚貼土誠有妙理如或聰明自用更改成規動謂磚性不堅不如省去不知土石性難融洽分而不屬大有疎虞是襯磚之貴乎如式者一也一重尾土石工背後用土填築土石相接最難聨屬夯杵不密每致成患務須砌石一層即填土一層用雜木夯杵百錬千錘方能堅凝貼合如壘砌既高方始填土以及任意堆積先後失宜雨淋水灌非虚鬆塌卸則脹裂傾欹均為石工大患是尾土之貴乎堅密者一也一重月壩凡修砌石工必先築月壩攔水法用兩面排樁襯以笆蓆中填土心攩溜閉氣不使少有滲漏以便施工此不易之則也然於洪波巨浪中一壩孤懸勢難屹立如徒固執舊章不知變通萬一工程將半壩有疎虞前功盡棄所損實多又在因地制宜如水淺則用月壩水深則留存舊工一二層以為外障退進一二丈穵漕釘樁壘砌是月壩之貴於相機者一也他如清槽戽水扣錠安鋦集料庀材鳩工利器事無巨細貴周備而不遺時有後先毋臨期而滋誤若夫金門雁翅之須詳磯心裹頭之有别迎水跌水在長短之合宜減壩滾壩實同工而異用牐洞無分乎大小隄堰總貴乎高堅形制雖殊施工則一要須熟習於平時方不致周章於臨事也謹於高堰工成為志大畧於此又隄工走漏説語云千金之隄潰於蟻穴穴之不可不慎也所貴平時巡查嚴密有則填塞斯汛水長發乃可無患如隄内積水之區色泛微黄必臨水坦坡有進水之穴洞查勘得實即用鐵鍋扣住勿使走氣周圍用上填壓堆成高厚土址切勿脚踹杵夯致令洩氣恐有意外之慮㫁水之後或於隄頂或於隄腰穵至患處尋其過水之洞層層填土夯築堅實此截築法也又如河水漫灘隄根滲漏洞穴難尋但見裏隄過水即令會水精細人在外坦逐細踹尋凡過水之處抽氣必大易於覺察踹尋著實萬勿用碎石草把填塞越塞越漏恐成大患須量洞口之大小或塞以棉襖或塞以棉被便可堵住設或洞口寛大必使一人赤體將洞口坐住一面飛集人夫於所坐之下周圍塞土離人二三尺圍繞成圏築成井様寛七八尺高出水面二三尺俟外水不入即令塞穴之人扶竿速起立將井上填實若恐頂衝汕刷加以䕶埽防風㫁不致潰裂此外堵法也更有一種井穿獾洞外面似無大壞不知隄内已屬空虚一遇水長怱然走漏勢如泉湧不可復救則非覆鍋塞絮所能奏效者須細㸔隄外之水如淹隄二三尺隄内平地比外地低窪一二尺過水不大宜飛調人夫即於隄内走漏處𦂳接大隄買土急築小月隄一道攔定走漏之水勿使伸腰透氣聴其流滿月隄内外相抵則不過水矣然後從月隄兩頭挨次用土實填築成裏戧一道可資鞏固切勿先於漏處用土加幫夫少則不能立成夫多則蹂躪塌卸反損大隄此内堵法也倘或隄外水深五六尺隄内之地又較外地界矮倉猝相乗焉能築此高厚月隄以資捍禦則宜星運軟草於隄外坦坡下挨次鋪鑲細土層層加壓加至出水則漏自㫁俟汎水消落當築裏月隄一道内外兼治方可永固大抵獾洞鼠穴不在隄之外坦而在裏陡不在人跡常經之地而在幽僻荆棘之間嚴飭各汛文武員弁修補於平時自不貽悞於倉猝巡查之責屬之兵夫督催之任寄之官弁實為閒中之當急小中之最大者也司河者幸毋忽視焉十一年八月邳睢黄河南岸王家堂對岸沙灘天賜開闢引河一道險工永停修防大學士總督河道嵇曾筠題奏詔致祭河神十二年八月築安東縣黄河北岸王家馬頭險工長一百五十丈十一月修築宿遷桃源安東阜寜等縣夏家馬路陳家樓王家馬頭辛家蕩等處越隄又下埽加鑲埽臺江南通志卷五十三
