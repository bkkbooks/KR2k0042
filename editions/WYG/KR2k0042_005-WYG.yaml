body:
  text: 江南通志卷六輿地志沿革表二鎮淮揚徐四府太海通三州鎮江府禹貢揚州之域春秋時為吳之朱方後屬越戰國屬楚秦改朱方為丹徒屬㑹稽郡漢初屬荆國後屬江都國元封初屬㑹稽郡後漢屬吳郡建安十三年孫氏自吳徙治於此謂之京城尋遷建業設京口鎮晉屬毘陵郡元帝初割海虞之北境立東海郡永和中寄治京口宋元嘉八年立南徐州治南東海郡以丹徒屬焉始為實土梁改曰蘭陵郡陳又改東海郡隋開皇九年郡廢十五年置潤州以州東潤浦為名也大業初州廢屬江都郡唐武德三年復置潤州天寳元年始以京口為丹陽郡乾元復曰潤州五代入於吳南唐宋政和三年升為鎮江府屬浙西路元為鎮江路𨽻江南浙西道明初改江淮府尋改鎮江府直𨽻南京領縣三國朝因之𨽻江南布政使司康熈六年𨽻江南江蘇布政使司雍正八年改江寧府之溧陽縣來屬領縣四附明林魁金陵辯杜牧之詩金陵津渡小山樓一宿行人祇自愁潮落夜江斜月裏兩三星火是𤓰洲葢唐人指京口曰金陵按張氏行役記甘露寺在金陵山上李約初至金陵於李錡坐屢讚招𨼆寺標致杜審權自潤州刺史除尚書左僕射制曰頃罷機務鎮於金陵駱賓王送間五還潤州詩序云言返維桑修途指金陵之地元微之寄浙西大夫李德裕詩云金陵大守曽相伴如此者不可枚舉葢當時江寧句容俱𨽻潤州故也南北南東海郡丹徒縣宋書志南東海曲阿縣宋書志晉陵太淮安府禹貢揚州之域春秋時屬吳戰國屬越後屬楚秦屬九江郡漢屬臨淮郡後漢屬廣陵郡三國屬魏晉亦屬廣陵郡東晉義熈中置山陽郡兼立南兖州宋南齊因之梁又立北兖州置淮隂郡北魏亦為山陽郡東魏改淮隂郡為淮州北齊又置射陽郡陳改為鹽城郡隋開皇初郡廢十二年置楚州大業初州廢改屬江都郡唐武德四年置東楚州八年改曰楚州屬淮南道天寳初為淮隂郡乾元初復曰楚州五代後唐長興三年升順化軍節度南唐亦置順化軍宋為楚州山陽郡屬淮南東路建炎間入於金尋復紹定元年置淮安軍端平元年改為淮安州元為淮安路𨽻江北淮東道明為淮安府直𨽻南京領州二縣九國朝因之𨽻江南布政使司康熈六年𨽻江南江蘇布政使司雍正二年升海州邳州直𨽻以贛榆沭陽二縣屬海州宿遷睢寧二縣屬邳州九年分山陽縣及鹽城縣之草偃口等處置阜寧縣領縣六揚州府禹貢揚州之域春秋時屬吳戰國屬越後屬楚秦屬九江郡漢初為淮南國後為江都廣陵國屬徐州後漢為廣陵郡三國時屬魏後屬吳晉移廣陵郡治淮隂以所領諸縣屬焉東晉分置海陵山陽二郡南北朝宋置南兖州北齊改為東廣州陳復為南兖州後周改為吳州隋開皇初為揚州置總管府大業初府廢置江都郡唐武德三年復為南兖州六年又改邗州尋復為揚州屬淮南道天寳元年改揚州為廣陵郡乾元初復曰揚州置淮南節度五代楊吳改江都府南唐以為東都宋為揚州廣陵郡屬淮南東路建炎初升帥府元至元中建大都督府置江淮等處行中書省尋改為揚州路𨽻江北淮東道明初置淮海府改維揚府尋復為揚州府直𨽻南京領州三縣七國朝因之𨽻江南布政使司康熈六年𨽻江南江蘇布政使司十一年省海門縣雍正二年升府屬之通州直𨽻以泰興縣及泰州所領之如臯縣改屬九年分江都縣置甘泉縣今領州二縣五徐州府禹貢徐州之域古大彭氏國春秋時為宋之彭城邑戰國屬楚亦謂之西楚秦置彭城縣屬泗水郡漢屬楚國地節元年改為彭城郡黄龍初復為楚國後漢為彭城國三國時屬魏晉亦為彭城國為徐州治東晉元帝初僑立徐州於淮南太元九年復置徐州於此義熈七年改為北徐州宋亦為徐州及彭城沛二郡泰始中屬北魏亦置徐州及彭城郡北齊置東南道行䑓北周立總管府隋開皇中行䑓廢大業初府廢復為彭城郡唐武德中曰徐州𨽻河南道天寳初曰彭城郡乾元初復為徐州貞元十六年建武寧軍節度咸通十二年改感化軍五代石晉時復曰武寧軍宋仍為徐州彭城郡屬京東路紹興後入於金省郡曰徐州屬山東西路元屬歸德府以州治之彭城縣省入明初以徐州屬鳯陽府尋直𨽻南京領縣四國朝因之𨽻江南布政使司康熈六年𨽻江南江蘇布政使司雍正十一年升徐州府省州置銅山縣為府治又以二年改直𨽻之邳州及所領宿遷睢寧二縣來屬領州一縣七太倉州禹貢三江之婁江在其地西接崑山至劉河口入海元以前地名太倉而未置州縣二漢吳晉宋南齊屬婁縣梁隋唐五代屬崑山縣元屬崑山州明吳元年始立太倉衛𢎞治十年建為太倉州屬蘇州府以崇明縣為屬領縣一國朝因之雍正二年升直𨽻州分置鎮洋縣又分嘉定縣置寳山縣俱來屬𨽻江南江蘇布政使司領縣四附明朱瑄請立州治疏臣惟事有便於民者不嫌於創改政有益於治者不憚於更張如太倉設州誠於軍民便利有六如崑山管轄唐茜涇等處常熟管轄直唐雙鳯塗松等處嘉定管轄劉家港等處各離縣逺若干里到太倉各近若干里若將附近鄉都分割則納糧當差不致逺涉一也太鎮二衛本備倭寇而設近年官軍俸糧俱往别縣關支猶為不便萬一宼發城閉何恃以守若立州則糧積充足有備無患二也衛所内外軍民雜處大率軍多刁横欺凌民户興訟委官不得約㑹致監禁日乆若立州則民有宗主不致受欺軍知畏懼不敢縱惡設有獄詞可以旦夕聽成三也附近人民每將貨物入城變易有等光棍用彊攙買尋閙搶奪以致鄉民别處市集路逺費多若立州庶免前弊四也崇明離蘇州甚逺其民到府必經太倉而守禦千戸所又屬鎮海衛轄若立州統領崇明則逺近相制五也衛學軍生例有嵗貢三縣民生附近衛學肄業既無廩資又無嵗貢故科第以下白首窮經遂絶生路若立州軍民生徒廩貢得視别學勸掖後進六也以臣愚見灼知有益用敢備陳伏乞睿鑒施行海州禹貢徐州之域春秋為魯之東境後屬楚秦置朐縣屬郯郡漢屬東海郡亦分屬琅琊郡後漢屬東海郡魏晉因之宋泰始中僑立青冀二州於此置北海郡南齊亦立青州梁立南北二青州東魏改為海州兼置琅琊義塘二郡後周改琅琊為朐山郡隋開皇初郡廢仍曰海州大業初改東海郡唐復為海州屬河南道天寳初又為東海郡乾元初復曰海州五代屬吳南唐後入周宋仍曰海州東海郡屬淮南東路建炎間入於金曰海州𨽻山東東路後復歸宋景定二年析置西海州尋省元至元十五年升海州路𨽻江北淮東道後改為海寧府尋為海寧州屬淮安路領縣三明仍為海州屬淮安府以州治之朐山縣省入改沭陽縣屬淮安府領縣一贛榆國朝因之雍正二年升直𨽻州仍以淮安府之沭陽縣來屬𨽻江南江蘇布政使司領縣二通州通州本廣陵郡海陵縣之東境大江至此入海東晉義熈中置蒲濤縣屬海陵郡隋開皇初海陵郡廢仍省入海陵縣後以其地置狼山鎮舊為淮東之鹽亭場五代南唐立静海都鎮制置院後周顯德中建静海軍尋升為通州分其地置静海海門二縣而治静海宋初改崇州尋復為通州屬淮南東路政和中置静海郡建炎四年入於金尋復元至元十五年改通州路𨽻江北淮東道二十六年復為州屬揚州路領縣二静海海門明屬揚州府洪武初以州治之静海縣省入領縣二海門崇明後崇明改屬蘇州府領縣一國朝因之康熈十一年以海門縣省入雍正二年升直𨽻州以揚州府之泰興縣泰州之如臯縣來屬𨽻江南江蘇布政使司領縣二通州如臯縣泰興縣江南通志卷六
