body:
  text: 江南通志卷一百四十一人物志宦績三松江一府松江府後漢陸康字季寧呉郡呉人少仕郡以義烈稱刺史臧旻舉為茂才除髙成令以恩信為治遷武陵太守轉桂陽樂安二郡所在稱之時靈帝欲鑄銅人調民田畆斂十錢康上疏諫内倖譛之徵詣廷尉釋免歸復徵為議郎拜廬江太守平郡賊黄穰等獻帝時加忠義將軍三國吳陸遜字伯言康從孫始仕孫權幕府出為海昌屯田都尉勸督農桑百姓䝉賴募兵平會稽鄱陽賊帥拜定威校尉權數訪世務納其議以為帳下右部督吕蒙薦其才堪負重拜偏將軍代蒙鎮陸口遂克公安南郡拜撫邊將軍封華亭侯進封婁侯黄武元年劉備率大衆至夷陵立數十屯遜以火攻拔之破其四十餘營加輔國將軍領荆州牧改封江陵侯後又大敗魏大司馬曹休於皖赤烏七年代顧雍為丞相尋卒諡昭侯陸抗字幼節遜子襲父爵拜奮威將軍歴遷鎮軍大將軍都督信陵西陵樂鄉諸軍事孫皓即位抗聞都下政令多闕憂深慮逺乃上疏陳時宜十七條鳯皇元年西陵督步闡據城叛遣使降晉羊祜率師向江陵抗破其將楊肇遂拔西陵誅闡東還樂鄉貌無矜色拜大司馬荆州牧卒陸瑁字子璋遜弟少好學篤義從父績蚤亡一男一女皆數嵗瑁迎攝養至長乃别嘉禾元年徵拜議郎選曹尚書孫權忿公孫淵反覆欲親征之瑁上疏諌權再覽瑁書嘉其詞理端切遂不行子喜亦涉文籍好人倫孫皓時為選曹尚書陸凱字敬風遜族子黄武初為永興諸暨長所在有治跡除儋耳太守討朱崖斬獲有功遷建武校尉討山賊陳毖於零陵克捷封都鄉侯轉武昌右部督孫皓立進封嘉興侯遷左丞相時政事多謬凱上表疏皆指事不飾忠懇内發子褘為太子中庶子華覈表薦褘體質方剛器幹强固董率之才魯肅不過云晉陸士光以字稱瑁孫少有雅望元帝初鎮江左辟為祭酒以清貞著預討華軼功封平望亭侯明帝時厯尚書左僕射為領軍將軍與王導卞壼等輔皇太子成帝踐阼拜光祿大夫蘇峻之難隨帝在石頭舉止方正不以兇威變節峻以士光呉士之望不敢加害峻平進爵為公卒諡曰穆弟玩字士瑤器量淹雅仕至司空玩子納字祖言清貞絶俗官厯尚書令宋朱諤字聖與秀州華亭人舉進士第二徽宗時官御史中丞嘗奏願開内閣延羣臣從容論道如神宗故事厯拜尚書右丞卒諡忠靖栁約字元禮秀州華亭人大觀三年進士遷博士深於經術屬詞粹微大為學者師慕靖康初權殿中侍御史論三鎮不可棄高宗時以直龍圖閣知嚴州時金人大入列郡震恐約屹保孤城悉力捍禦境内安堵進集英殿修撰召入對再三奬勞擢權户部侍郎約感激盡言凡例外宣索皆執奏不進會高麗請修貢議遣使報聘加試户部侍郎充其選且將大用當路忌之終敷文閣待制衛膚敏字商彦華亭人宣和元年進士厯遷秘書省校書郎命假給事中使金徃復争辯殊不為屈建炎初拜右諫議大夫后父邢煥除待制太后兄子孟忠厚除學士膚敏言非祖宗法二人因改職又言揚州錢塘俱非帝王都宜亟遷金陵因陳守江之䇿帝善其言除刑部侍郎卒錢良臣字友魏華亭人紹興進士厯官參知政事徳望端偉為時所重孝宗褒之曰如卿真可謂通世務之儒遂書通儒二字賜之出知鎮江卒諡文恵許克昌字上達華亭人紹興末舉進士第一以有官改第二累官右正言時松江新涇塘為海潮衝突鹹水延及嘉湖二境克昌請於上移堰入運港以避潮勢由是三州之田免鹹潮之患元費㮤字子壽自長興徙上海宋末以䇿干兩淮制置使補武節郎提舉上海市舶元初遷管軍總管鎮守上海沿海民船無所統或流為盜賊㮤請錄編户而官領之得海船數千稍木數萬備國用卒諡榮敏任仁發字子明華亭人年十八中鄉試元兵南下大帥見而器之委招安海島遷貳都水監府境開江置牐皆仁發主其議大都通恵河歸徳府黄河杭之鹽官海塘皆嘗治之具有蹟效後以浙東道宣慰副使致仕有所著水利書十卷行於世今人稱畫馬必曰任水監云子子昭亦能畫瞿霆發字聲父上海人幼穎悟才氣不羣元兵次臨安率衆歸附境賴以全擢進義校尉授兩浙運司副使海潮壊鹽塲死者萬計傾力救之流亡復還鹽事以集拜都轉運使浙東饑稽户數第物力而均之課更以最聞明杜隰字宗原華亭人祖元芳父希仲俱有文名隰學行並高洪武初中詞科為太常賛禮郎奉使緬甸詰其不庭以其人入貢稱㫖授禮科給事中所著有雙清集弟桓亦有詩名王公亮華亭人洪武中為吏科給事中升應天府丞永樂初調四川右布政復調廣東居官簡静知大體廉重愷悌所至人皆悦服任勉之字近思華亭人洪武甲戌進士知鄱陽縣令有不便者或為匿名書詆之下令曰告我以過是忠於我也累官福建參政宣正間政事文章以勉之為稱首陳貞字景祺華亭人洪武中舉為禮部主事帝謂其見事明敏命攝部事永樂初厯遷河南參政黄河決勞來有方民不失業盜發汝寧以計離其黨降其首於均山子詢字汝同永樂戊戌進士選庶吉士天順二年以國子祭酒致仕卒天性剛直文章清勁主考兩京及為司成所奬拔士後皆為名臣王鐘字公簴華亭人洪武中以薦為燕府紀善侍世子守北京恭慎小心甚為世子所重永樂元年陞户部右侍郎為人端厚沈静從容詳雅事無留滯僚友多服其能卒洪熙初帝思舊勞諡以僖敏何廣字公逺華亭人洪武中以貢授縣令遷御史至陜西按察副使人謂其任郡邑則為循吏在風憲有澄清志位藩垣得大臣體精於律學所著有律解辯疑夏禮字公立上海人洪武中入太學拜御史疏劾勲貴忤㫖出為知縣永樂時復以薦為御史遷陜西按察副使積嵗疑獄一言而決葉宗行華亭人讀書尚氣節永樂中東呉大水宗行上書請濬范家浜引黄浦水歸於海帝善其言命從夏尚書原吉治之水患果息原吉薦其才擢知錢塘縣役均訟簡決獄如神按察使周新風采嚴峻尤重之嘗伺宗行出潜窺其舍惟笠澤銀魚乾一裹新嘆息而去時呼為錢塘一葉清同邑張昕字賓暘亦佐原吉治水議與宗行合以薦授户部郎又里人周顯有幹略當事濬呉淞故道倚其才以成大役黄翰字汝申華亭人永樂壬辰進士累官山東按察使豪邁多權略凡疑獄一問即決江西人以妖術惑衆廣東畜蠱毒採生殺人皆捕誅之仍刻石著解蠱方俾其術不得行蔣性中字用和上海人宣徳丁未進士有司舉故事為立表其門性中曰榮吾家曷若利吾鄉乎即移所費為石梁於鶯脰湖上徃來便之除兵科給事中議節冗食以養驍勇遷江西參議論均田賦事皆施行夏寅字時正華亭人正統戊辰進士授南京吏部主事力學為文以閎奥稱進郎中督江西學政崇實學黜浮華知人善鑒士經其賞拔者後多知名陞江西參政處州民有走聚山谷者寅檄至即散進山東布政卒嘗謂人有三可惜此生不學一可惜此日閒過二可惜此身一敗三可惜所著有東游錄史詠諸編張鎣字廷器華亭人正統戊辰進士景泰初授御史厯陞右副都御史巡撫寧夏始以甎甃城導河流溉靈川屯田七百餘頃後為南京兵部尚書卒諡莊懿鎣襟度恬曠更事三朝所設施皆有成績五世孫仲謙萬厯中仕至雲南參政以清雅稱唐瑜字廷美上海人景泰辛未進士授南京禮科給事中知衢州府有恵政擢湖廣參政置廩積穀嵗歉民賴以濟襄河為患作隄障之厯遷山西雲南布政甘肅巡撫所至有聲唐珣字廷貴華亭人天順丁丑進士為福州知府奸人冒中貴笞辱僉事以下官珣知其詐執而置諸法厯右都御史總督兩廣軍務府江盜起討平之賜勅嘉勞卒於鎮張悦字時敏華亭人天順庚辰進士授刑部主事厯遷吏部左侍郎南京吏部尚書改兵部致仕卒諡莊簡悦操行清謹提學浙江甄别才器為士類所信服在湖廣執法不阿成化時中官尚銘在東厰任事衆競趨其門悦獨不徃銘敗悦名益彰在吏部為尚書王恕所倚信嘗兩攝選衆稱公允張弼字汝弼華亭人成化丙戌進士由兵部郎出知南安府其地當兩廣要衝亡命者聚山谷為民害弼至悉平之大庾嶺路險隘取商税僦工闢之架橋甃石二十里以便行者毁淫祠立社學俗為一變弼襟度恬曠而敦尚行履以風節自持為詩清健有風致尤以草書名張誥字汝欽華亭人成化丙戌進士選庶吉士改監察御史出按湖廣有能聲厯遷右副都御史巡撫雲南決疑獄諭亂蠻得撫綏體本邦孟宻二部連兵不解誥檄諸道練兵討之皆懼而自戢張黼字仕欽上海人成化丁未進士官南刑部郎中精於法律有里嫗訟子不孝反覆開諭且呼母為子理髮皆感泣去每有疑獄輒忘寢食以求其情子鳴鳯字世祥𢎞治進士令永康有政績擢御史抗章劾劉瑾削籍瑾敗復官終湖廣副使顧清字士廉華亭人𢎞治癸丑進士選庶吉士厯遷侍讀以守正不阿為逆瑾所嫉降編修尋調南京兵部員外郎瑾誅復原官擢禮部右侍郎引年乞休陞尚書致仕卒諡文僖清好學敦節行士論重之嘗疏請武宗預定儲位諫巡幸世宗繼統凡迎駕頒詔諸大禮援古証今所議得體李希顔字原復華亭人𢎞治癸丑㑹魁正徳中以廣東僉事奉表詣闕時逆瑾擅權希顔獨不踵其門京師稱鐵腰李進參議露章劾梁文康子暴横奪俸歸尋起原官遷雲南按察使以勞瘁卒官黄明字天章華亭人𢎞治癸丑進士厯南兵部車駕司郎中中貴憚之無敢託公差濫索馳傳者出守汀州值會𠞰屬邑武平宼或議括民財充軍餉明出官帑羨金給之境内無擾遷雲南副使致仕曽孫廷鳯字孟威官武定知府廷鵠字孟舉官順天通判皆有聲楊瑋字伯玉華亭人𢎞治丙辰進士授工部主事奏貴戚張氏挾寵撓法罪其家奴數十人遷光祿寺丞武宗日索子鵝腦數十頭作畫睂食瑋對中官言狼籍用物謫隰州同知陞知瀘州時征鄧茂七瑋單騎入賊巢招撫其餘黨皆解甲降厯四川副使致仕卒弟璨字仲玉由進士厯官應天府丞璨子秉義字士宜嘉靖間官給事中有直聲張𢎞至字時行華亭人弼子𢎞治丙辰進士改庶吉士授刑科給事中言初政漸不克終八事甚切直於時政多所匡救兄𢎞宜字時措由進士厯廣西兵備以勞卒官孫承恩字貞甫華亭人父衍字世延成化進士知延平府辯盜寃禁火化俗為之變嵗旱步禱烈日中得疾卒承恩正徳辛未進士入翰林世宗登極以庶子充經筵講官多所發明累擢禮部尚書掌詹事府時齋宫設醮承恩獨不肯冠黄冠遂乞致仕歸卒諡文簡呉稷字舜弼華亭人正徳甲戌進士授金華推官時章文懿懋家居講學嘗造請以質所疑移恵州以執法忤直指遷徽王府長史王素驕稷進賢王箴及芸窻賦規之因王自號芸窻故稷以名賦尋致仕歸隱於東郊多著述嘗佐顧文僖清修府志富好禮字子超華亭人正徳庚辰進士官刑曹郎有清慎名御史馮恩以論冢宰汪鋐下獄好禮力争謂無死法鋐銜之出守重慶遷建昌副使境有大渡河行者觸瘴多死好禮鑿山湮塹築塘堡數百里屬之省城尋乞歸徐階字子升華亭人嘉靖癸未廷對第三人授編修以議孔子王號謫官於外久之召拜司經局洗馬厯進禮部尚書兼文淵閣大學士與嚴嵩同在相位嵩每忌之而帝委任階亞於嵩嵩既敗階當國盡反嵩所為保全善類詔獄漸虚任事者皆得以功名終一時翕然稱名相隆慶中予告歸里萬厯初卒年八十一贈太師諡文貞弟陟字子明嘉靖丁未進士厯官南京刑部侍郎性貞介兄居政府不因之以取顯達人多重之陟子琳以父任厯楚雄知府有恵政階𤣥孫本高官錦衣千户以拒魏忠賢建祠奪職崇禎初累官左都督潘恩字子仁上海人嘉靖癸未進士授知州厯遷浙江參政按部海鹽倭宼猝至圍城數十匝恩力禦之危城得全巡撫河南徽恭王子多掠良家子占民田賊殺無辜恩發其罪論廢徙伊庶人忮惡尤甚剪其羽翼累擢南京工部尚書左都御史致仕卒諡恭定子允哲字伯明允端字仲履皆舉進士居官有名馮恩字子仁華亭人嘉靖丙戌進士授行人擢南京御史論罷南北郊彗星見劾張孚敬汪鋐方獻夫為根本腹心門庭三彗下獄論死會審起立不跪辨甚强時稱四鐵御史謂其口其膝其膽其骨皆鐵也子行可上疏請代死得減戍雷州後赦歸隆慶初進大理寺丞卒陸樹聲字與吉華亭人嘉靖辛丑進士第一選庶吉士厯遷禮部尚書予告歸卒年九十七諡文定樹聲性恬黙而嚴重有骨氣張居正當國欲引以為重樹聲介然不屑也嘗陳四方災異又論時政十事語甚切報聞而已通籍六十四年先後多請告家居官於兩都不及一紀海内皆仰其清徳子彦章字伯達萬厯己丑進士授行人以父老在職二年即乞終養給半俸異數也後厯官至南京刑部右侍郎工詩文善書法楊允繩字翼少華亭人嘉靖甲辰進士以行人擢兵科給事中疏屢上皆報可又論大臣受餽遺不貲語尤切尋巡視光祿劾寺丞胡膏虚冒物料膏誣搆允繩欺謗齋醮遂下獄論絞死西市隆慶初贈光祿少卿諡忠恪周思兼字叔夜華亭人嘉靖丁未進士授平度知州嵗祲旁郡飢民掠食且為亂思兼作小木牌數千散置四郊令飢民執以入城給銀米諭之復業衆遂定擢工部郎督厰清源募民囊土築河堤堤成三日秋漲大發民賴以全除湖廣僉事宗人有倚藩府勢為不法者悉案正其罪遷廣西提學未赴而卒子紹元字希安隱居績學工八分書紹節字希允以病謝諸生杜門著書兄弟友愛知名於時紹元子裕度工楷篆以孝聞龔愷字次元華亭人嘉靖丁未進士為御史仇鸞之開馬市也帝命尚書史道主之愷劾道委靡遷就誤國事帝方向鸞謂愷等借道論鸞杖八十奪俸按粤西列靖江王驕恣狀復疏止大征粤宼帝是其議遷湖廣副使歸董傳䇿字原漢華亭人祖恬𢎞治進士官刑部錄囚多平反厯大理少卿傳䇿嘉靖庚戌進士除刑部主事抗疏劾嚴嵩六罪下獄拷掠會地震謫戍南寧隆慶初召復原官累遷至南京禮工二部侍郎唐自化字伯咸華亭人嘉靖癸丑進士授將樂令治行稱最徵拜御史查補直𨽻山東山西積逋疏奏畿甸之下宜從寛䘏詔罷其征都人大悦改行人司司正厯兵部郎中長於治劇剖決如流本兵楊博最重其才卒於官子本堯字世承隆慶辛未進士由金谿令擢御史巡視十庫光祿奏逐中貴之侵冒者數人終貴州參政陸樹徳字與成樹聲弟嘉靖乙丑進士由推官陞刑部主事改禮科給事中穆宗時疏言上下交為泰非與公卿輔弼相論難何以劘君徳酬萬幾又條議諸邊計甚悉累擢右僉都御史出撫山東請裁募兵費戒苛罰俱報可後移疾歸林景暘字紹熙華亭人隆慶戊辰進士選庶吉士授禮科給事中神宗初政進十二箴以獻轉兵科左巡視京營請廣召募選鋒均糧凡十餘事厯遷南太僕卿歸數薦竟不出家居時應撫令所屬縣田出助役錢率七十畆徵一金景暘力争得減十之七子有麟以父蔭官至龍安知府以清謹稱許樂善字修之華亭人隆慶辛未進士為郟縣令擢御史首輔張居正奪情總憲率諸御史上公疏慰留樂善為居正門下士獨不署名按畿南有棗强令倚勢為不法劾治其罪尋掌河南道典内計條上六事遂著為令甲又疏請停礦税救建言御史曹學程舉朝稱之厯遷南京通政使請告歸卒唐文獻字元徵華亭人萬厯丙戌廷試第一授修撰為東宫講官每講畢大璫出揖不通一言輔臣沈一貫忌侍郎郭正域剛直欲以妖書事陷之文獻邀同列力白其誣正域獲免給諫李沂劾大璫廷杖文獻徙步掖之手調湯藥人多其義厯禮部侍郎掌翰林院卒諡文恪從子諸生允振字叔起有文行王孫熙字君文華亭人萬厯乙未進士授缺入為大理評事有大璫坐重辟行萬金求免孫熙曰爾金如山我案如山論如律為台州知府地有麻枲民不知織生女多不舉乃購工教以經緯之法嚴溺女之禁久之所育女皆任織名王公布子元瑞官御史有清名張以誠字君一弼𤣥孫肆力於經史百家朝章典故莫不該洽萬厯辛丑廷試第一人授修撰遷左中允疏請東宫出御講筵以重國本慰人心詞㫖愷切尋轉右諭徳丁外艱歸以哀毁卒以誠舉止安雅敦尚名節士論推重張鼐字世調華亭人萬厯甲辰進士由庶吉士厯遷少詹事上疏言事語斥近倖魏忠賢惡之擢南京禮部侍郎引疾去忠賢削其籍鼐砥礪名節為文章通達國體崇禎初起原官黄體仁字長卿上海人萬厯甲辰進士時館相國李廷機家使試館職謝曰某老矣不足以辱此選門人徐光啟可也光啟遂入翰林而體仁為主事厯知登州府罷坊市雜税脱建文忠臣陳迪子孫於戍籍擢東兖道副使值嵗祲而福王之國請盡革迎謁供億諸費民徳之當路不悦罷歸撰續上海志田賦諸篇最詳覈云徐光啟字子先上海人萬厯甲辰進士選入翰林以少詹兼河南道御史練兵通州賜勅如巡撫厯禮部右侍郎為魏黨所劾落職崇禎初召還轉左日食失驗光啟言厯久必差宜及時修正乃置局修厯以光啟領之得元太史令郭守敬之意而法加宻進禮部尚書尋拜東閣大學士卒於位諡文定所著有農書厯指漕河議兵事巵言等書錢龍錫字稚文華亭人萬厯丁未進士選庶吉士厯南京吏部侍郎魏璫銜其不附已削其籍崇禎初年用枚卜拜東閣大學士改文淵閣以定逆案深為羣小所嫉因袁崇煥獄陷之死帝以龍錫素循謹詞臣黄道周等力救久始得遣戍夏嘉遇字正甫華亭人萬厯庚戌進士授保定推官廉恵為畿輔冠擢禮部主事時給事中亓詩教御史趙興邦挾政府恣為奸横嘉遇五上疏劾之亓趙自引去時論快焉天啟初冢宰趙南星用物望自南吏部召為銓司署選事魏璫屬其姻黨誣奏被斥歸崇禎初贈太常少卿錢士貴字元沖華亭人萬厯庚戌進士由知縣擢御史議移宫紅丸挺擊三案請誅李可灼論政府罪如律會魏忠賢竊政反三案以傾朝士遂謝病歸崇禎初起故官厯南大理寺丞以疾告家居十餘載力行善於鄉後召為刑部侍郎未至卒許譽卿字公實華亭人萬厯癸丑進士由推官拜給事中抗疏極論魏忠賢罪又陳時弊言厰衛流毒宦官内操忠賢益怒鐫秩歸崇禎初起原官陳五事規切廷臣有訐之者遂自引去久之復起流賊毁鳯陽皇陵譽卿憤激發大臣玩寇之罪後削籍歸董羽宸字邃初上海人萬厯癸丑進士授餘姚令報最擢御史巡視山東預平白蓮妖賊厯遷吏部侍郎剛方獨立忤時相被劾歸時同邑何萬化字宗元萬厯壬戌進士厯官湖東參政亦平境中妖賊之亂張履端字旋吉華亭人萬厯壬子與兄拱端弟軌端同舉於鄉丙辰成進士知晉江束鹿二縣在晉江分校戊午鄉試得漳浦黄道周在東鹿有惡少結黨白晝刼殺人吏莫敢問履端誅其首惡境以寧滹沱河數決為城患乃去河二十里作新城規制詳宻民忘其遷天啟中擢兵部主事以草疏忤璫斥歸崇禎初起吏部未赴卒弟軌端字方同知邵陽縣楚賊犯境約苗兵赴急大破賊於天王寺有㫖奬賚會卒王陞字超之華亭人萬厯丙辰進士為兵部主事偕同官張履端代尚書草疏請省刑薄斂大忤權璫意去職崇禎初補本官厯郎中薦總理盧象昇専督楚豫以靖寇六合縣舊無城當寇訌淮泗陞請以兵部所省江南驛站銀築之累擢太僕寺少卿以忤時相歸杜喬林字君遷華亭人萬厯丙辰進士由主事出知湖州府枕太湖故多盜時王崑崙等竊發喬林宻謀捕擊五十餘日羣盜悉平累遷浙江右布政使分巡温處到官六日海寇劉香老入犯圍府城晝夜捍禦廉得賊諜誅之出兵奮撃三戰皆捷以病告歸子麟徵字仁趾由進士官刑部主事疏諫大璫總理部務及出監宣大諸鎮事葉有聲字君實上海人萬厯丙辰進士己未廷試由侯官知縣擢給事中論勤政治體言路仕途四事尋以忤魏璫削籍崇禎時厯遷河南按察使兩禦流寇有功後以左副都御史免官屏居村墅以壽終陳所聞字無聲華亭人萬厯己未進士授刑部主事時奄勢方燄内侍劉朝李進忠輩繫獄諸郎無不通殷勤獨所聞視之如常囚俄調工部主事董作山陵奄人監䕶恣乾沒所聞莅事精敏虚冒無所容羣奄奪氣董象恒字有仲華亭人萬厯己未進士知開州白蓮賊倡亂捕斬之厯福建參政討鄭芝龍有功擢僉都御史巡撫浙江捐俸造漕船五百以濟運時流寇竊發各省多殘破兩浙獨完象恒之力為多趙東曦字馭初上海人萬厯己未進士由知縣擢給事中論加派預徵捜括捐助皆茍且之政請興屯塞下以充軍用又劾奏奄人王坤監視失䇿乞正其罪悉罷中使監鎮之任忤㫖調外張昂之字匪激華亭人天啟壬戌進士授盧陵令郡紳有素附魏忠賢欲改文天祥白鷺書院建璫祠者昂之力格其事遂為所搆削籍歸崇禎初起兵部主事知保寧府張獻忠寇蜀昂之召募勇鋭梟其大帥措餉給兵士力保巖疆以功遷川東道尋告歸沈匡濟字方平青浦人天啟壬戌進士授錢塘令時勢家侵占西湖為園田悉釐正之厯官山東提學副使初在浙分校甲子鄉試烏程淩忠清義渠其所取士也李世祺字壽生青浦人天啟壬戌進士由行人擢給事中陳大計當定者二大弊當去者三帝納之力言中官監視諸鎮之非不能用又疏劾時相温體仁呉宗達忤帝意貶官後起行人司副厯遷太僕卿包爾庚字長明華亭人明季以進士知廣東羅定州戢悍兵雪寃獄弭峒徭之變民建祠祀之以卓異徵不赴國朝張安豫字子建華亭縣人由太學生授齊東丞值東省饑盜起安豫單騎入龍山賊營諭以禍福皆解甲降擢齊河令督餉入京順治初授金華府知府招徠綏輯政績大著遷浙西守道張安茂字子美華亭人以誠子順治丁亥進士授工部主事分校戊子北闈稱得人兼綜漕務宿弊盡革厯浙江提學僉事輯泮宫禮樂全書遷陜西西寧道副使諸舜發字陶叟青浦人順治丁亥進士授户部主事厯陜西提學僉事請屬不行試卷高下皆手自閲定以積勞卒綏徳州官署所遺惟圖書數卷而己周茂源字宿來華亭人順治己丑進士厯刑部郎中授處州知府處山路險仄募民開鑿二百餘里自是所過若坦途又招集流亡給牛種墾田一干八百餘頃以逋誤左遷歸日事著述有鶴静堂集子綸字鷹埀有文名王廣心字伊人華亭人順治己丑進士授行人厯主事擢御史巡視京通二倉漕政自明季以來奸弊百出廣心事事釐剔疏凡三十餘上清操凜然雖大猾不敢撓又修築通會河運道輸挽無阻以親老乞歸所為詩文宏麗有集許纉曽字孝修華亭人明通政使樂善曽孫順治己丑進士選庶吉士陞中允以才堪外任轉江西驛鹽道理郵政以豁民累除鹾蠧以通商引遷川東道時寇孽未殄從征萬州及取大昌皆有功擢河南按察使莅職勤敏刑獄一清以事罷復補雲南按察使尋乞終養歸陸振芬字令逺華亭人順治己丑進士時兩粤未定破格用才特擢嶺東恵潮道隨大軍進討諸郡邑以次削平抵任後招流亡省徭役民遂大和癸巳四月駐潮總兵郝尚久作亂兵圍道署振芬誓死不屈宻遣家人齎蠟丸牒請兵𠞰賊尚久伏誅力辭題敘引疾歸里沈荃字貞蕤華亭人明大理卿粲裔孫父紹曽有至行聚徒授業荃順治壬辰廷對第三人授編修出為河南大梁道有政績洊厯詹事府詹事卒諡文恪荃學行醇潔名重館閣書法尤推獨步為聖祖所賞士以一長來謁者輒為嘘植子宗敬字南季兼工書畫康熙戊辰進士仕至四譯館卿顧大申字見山華亭人順治壬辰進士授工部主事分司夏鎮河道節省公費築城以守人服其廉幹晉郎中出為陜西洮岷道僉事卒於官平日留心經濟所著河渠論言水利者多採用之施維翰字及甫上海人順治壬辰進士授臨江推官陞御史在臺班十七年所條奏皆闗大體累擢右副都御史巡撫山東遷浙江總督前院疏劾軍士鼓譟一案縲絏二百餘人維翰至即日會讞多所平反調福建總督未抵閩署卒諡清恵王日藻字印周華亭人陞孫順治乙未進士授工部主事由員外郎出為河南提學僉事報最擢參議補河道累遷浙江按察江西布政使所莅有聲晉副都御史巡撫河南疏請開墾荒田四十四萬餘頃悉成沃壤分轄河務籌畫精宻内遷刑部侍郎轉户部厯工户二部尚書賦役諸政裁斷允愜以事落職復起總理高堰河工勤瘁卒工所特復原秩王頊齡字顓士廣心子康熙丙辰進士授太常博士己未薦舉博學鴻儒改授編修纂修明史厯工部尚書武英殿大學士雍正初以老乞休上手勅慰留年八十四卒於位贈少傅諡文恭頊齡初以文學進洊厯卿曹諳練典故在政府八載恪誠純一以風度稱弟九齡字子武康熙壬戌進士由庶吉士厯官左都御史恬静有雅量高層雲字二鮑華亭人明檢討承祚孫康熙丙辰進士授大理寺評事擢吏科給事中章奏屢上皆秉禮執法多所彈正遷通政司右參議厯太常寺少卿卒官層雲工詩文善書畫得者寶藏之王鴻緒字季友廣心子康熙癸丑進士廷對第二人授編修厯侍讀學士妖人朱方旦以左道煽惑一時鴻緒特具疏列其三大罪方旦伏法累擢左都御史總裁明史自工部尚書轉户部解任歸後復修詩經傳説彚纂及省方盛典並為總裁官張集字殿英上海人康熙丙辰進士授行人擢御史疏免漕田丈量以除民累及釐軍政嚴保題等事糾庸懦提鎮不避怨嫌厯官至吏部侍郎連丁内外艱服闋補兵部左侍郎尋謝病歸集性樸儉為大臣自奉若寒畯以徳量稱顧昌祚字受周上海人康熙己酉舉北闈授江華知縣粤西苗為患唯猺能禦之前令尅減嵗賞遂不用命昌祚如額以給猺悦服悉力抗禦四境帖然後以忤上官意左遷徐賓字虞門華亭人康熙戊辰進士授臨城令有山名紫壺套邑之奸民多嘯聚其中賓單騎諭降之總理宣沙與桃花口牧馬皆著勞績以卓異徵授户部主事擢吏科給事中轉刑科掌印詳陳積貯以杜侵漁及請截漕米賑山東饑悉見施行曹泰曽字彚初上海人康熙戊午鄉薦授莆田令清賦簡訟御吏嚴察有大姓殺人賄府求脱泰曽力持之卒正其罪條邑中利弊六事請之上官鋭意興革尋坐執法被劾罷從弟炯曽由貢生知贛縣亦著政聲廖鳯徵字樾阡華亭人選拔入都大學士陳廷敬重其才品延為二子師康熙癸酉舉北闈選授林縣令邑素剽悍難治鳯徵訓以禮法俗為一變又均平户役民懷其徳丁内艱歸江南通志卷一百四十一欽定四庫全書江南通志卷一百四十一人物志宦績三松江一府松江府後漢陸康字季寧呉郡呉人少仕郡以義烈稱刺史臧旻舉為茂才除髙成令以恩信為治遷武陵太守轉桂陽樂安二郡所在稱之時靈帝欲鑄銅人調民田畆斂十錢康上疏諫内倖譛之徵詣廷尉釋免歸復徵為議郎拜廬江太守平郡賊黄穰等獻帝時加忠義將軍三國吳陸遜字伯言康從孫始仕孫權幕府出為海昌屯田都尉勸督農桑百姓䝉賴募兵平會稽鄱陽賊帥拜定威校尉權數訪世務納其議以為帳下右部督吕蒙薦其才堪負重拜偏將軍代蒙鎮陸口遂克公安南郡拜撫邊將軍封華亭侯進封婁侯黄武元年劉備率大衆至夷陵立數十屯遜以火攻拔之破其四十餘營加輔國將軍領荆州牧改封江陵侯後又大敗魏大司馬曹休於皖赤烏七年代顧雍為丞相尋卒諡昭侯陸抗字幼節遜子襲父爵拜奮威將軍歴遷鎮軍大將軍都督信陵西陵樂鄉諸軍事孫皓即位抗聞都下政令多闕憂深慮逺乃上疏陳時宜十七條鳯皇元年西陵督步闡據城叛遣使降晉羊祜率師向江陵抗破其將楊肇遂拔西陵誅闡東還樂鄉貌無矜色拜大司馬荆州牧卒陸瑁字子璋遜弟少好學篤義從父績蚤亡一男一女皆數嵗瑁迎攝養至長乃别嘉禾元年徵拜議郎選曹尚書孫權忿公孫淵反覆欲親征之瑁上疏諌權再覽瑁書嘉其詞理端切遂不行子喜亦涉文籍好人倫孫皓時為選曹尚書陸凱字敬風遜族子黄武初為永興諸暨長所在有治跡除儋耳太守討朱崖斬獲有功遷建武校尉討山賊陳毖於零陵克捷封都鄉侯轉武昌右部督孫皓立進封嘉興侯遷左丞相時政事多謬凱上表疏皆指事不飾忠懇内發子褘為太子中庶子華覈表薦褘體質方剛器幹强固董率之才魯肅不過云晉陸士光以字稱瑁孫少有雅望元帝初鎮江左辟為祭酒以清貞著預討華軼功封平望亭侯明帝時厯尚書左僕射為領軍將軍與王導卞壼等輔皇太子成帝踐阼拜光祿大夫蘇峻之難隨帝在石頭舉止方正不以兇威變節峻以士光呉士之望不敢加害峻平進爵為公卒諡曰穆弟玩字士瑤器量淹雅仕至司空玩子納字祖言清貞絶俗官厯尚書令宋朱諤字聖與秀州華亭人舉進士第二徽宗時官御史中丞嘗奏願開内閣延羣臣從容論道如神宗故事厯拜尚書右丞卒諡忠靖栁約字元禮秀州華亭人大觀三年進士遷博士深於經術屬詞粹微大為學者師慕靖康初權殿中侍御史論三鎮不可棄高宗時以直龍圖閣知嚴州時金人大入列郡震恐約屹保孤城悉力捍禦境内安堵進集英殿修撰召入對再三奬勞擢權户部侍郎約感激盡言凡例外宣索皆執奏不進會高麗請修貢議遣使報聘加試户部侍郎充其選且將大用當路忌之終敷文閣待制衛膚敏字商彦華亭人宣和元年進士厯遷秘書省校書郎命假給事中使金徃復争辯殊不為屈建炎初拜右諫議大夫后父邢煥除待制太后兄子孟忠厚除學士膚敏言非祖宗法二人因改職又言揚州錢塘俱非帝王都宜亟遷金陵因陳守江之䇿帝善其言除刑部侍郎卒錢良臣字友魏華亭人紹興進士厯官參知政事徳望端偉為時所重孝宗褒之曰如卿真可謂通世務之儒遂書通儒二字賜之出知鎮江卒諡文恵許克昌字上達華亭人紹興末舉進士第一以有官改第二累官右正言時松江新涇塘為海潮衝突鹹水延及嘉湖二境克昌請於上移堰入運港以避潮勢由是三州之田免鹹潮之患元費㮤字子壽自長興徙上海宋末以䇿干兩淮制置使補武節郎提舉上海市舶元初遷管軍總管鎮守上海沿海民船無所統或流為盜賊㮤請錄編户而官領之得海船數千稍木數萬備國用卒諡榮敏任仁發字子明華亭人年十八中鄉試元兵南下大帥見而器之委招安海島遷貳都水監府境開江置牐皆仁發主其議大都通恵河歸徳府黄河杭之鹽官海塘皆嘗治之具有蹟效後以浙東道宣慰副使致仕有所著水利書十卷行於世今人稱畫馬必曰任水監云子子昭亦能畫瞿霆發字聲父上海人幼穎悟才氣不羣元兵次臨安率衆歸附境賴以全擢進義校尉授兩浙運司副使海潮壊鹽塲死者萬計傾力救之流亡復還鹽事以集拜都轉運使浙東饑稽户數第物力而均之課更以最聞明杜隰字宗原華亭人祖元芳父希仲俱有文名隰學行並高洪武初中詞科為太常賛禮郎奉使緬甸詰其不庭以其人入貢稱㫖授禮科給事中所著有雙清集弟桓亦有詩名王公亮華亭人洪武中為吏科給事中升應天府丞永樂初調四川右布政復調廣東居官簡静知大體廉重愷悌所至人皆悦服任勉之字近思華亭人洪武甲戌進士知鄱陽縣令有不便者或為匿名書詆之下令曰告我以過是忠於我也累官福建參政宣正間政事文章以勉之為稱首陳貞字景祺華亭人洪武中舉為禮部主事帝謂其見事明敏命攝部事永樂初厯遷河南參政黄河決勞來有方民不失業盜發汝寧以計離其黨降其首於均山子詢字汝同永樂戊戌進士選庶吉士天順二年以國子祭酒致仕卒天性剛直文章清勁主考兩京及為司成所奬拔士後皆為名臣王鐘字公簴華亭人洪武中以薦為燕府紀善侍世子守北京恭慎小心甚為世子所重永樂元年陞户部右侍郎為人端厚沈静從容詳雅事無留滯僚友多服其能卒洪熙初帝思舊勞諡以僖敏何廣字公逺華亭人洪武中以貢授縣令遷御史至陜西按察副使人謂其任郡邑則為循吏在風憲有澄清志位藩垣得大臣體精於律學所著有律解辯疑夏禮字公立上海人洪武中入太學拜御史疏劾勲貴忤㫖出為知縣永樂時復以薦為御史遷陜西按察副使積嵗疑獄一言而決葉宗行華亭人讀書尚氣節永樂中東呉大水宗行上書請濬范家浜引黄浦水歸於海帝善其言命從夏尚書原吉治之水患果息原吉薦其才擢知錢塘縣役均訟簡決獄如神按察使周新風采嚴峻尤重之嘗伺宗行出潜窺其舍惟笠澤銀魚乾一裹新嘆息而去時呼為錢塘一葉清同邑張昕字賓暘亦佐原吉治水議與宗行合以薦授户部郎又里人周顯有幹略當事濬呉淞故道倚其才以成大役黄翰字汝申華亭人永樂壬辰進士累官山東按察使豪邁多權略凡疑獄一問即決江西人以妖術惑衆廣東畜蠱毒採生殺人皆捕誅之仍刻石著解蠱方俾其術不得行蔣性中字用和上海人宣徳丁未進士有司舉故事為立表其門性中曰榮吾家曷若利吾鄉乎即移所費為石梁於鶯脰湖上徃來便之除兵科給事中議節冗食以養驍勇遷江西參議論均田賦事皆施行夏寅字時正華亭人正統戊辰進士授南京吏部主事力學為文以閎奥稱進郎中督江西學政崇實學黜浮華知人善鑒士經其賞拔者後多知名陞江西參政處州民有走聚山谷者寅檄至即散進山東布政卒嘗謂人有三可惜此生不學一可惜此日閒過二可惜此身一敗三可惜所著有東游錄史詠諸編張鎣字廷器華亭人正統戊辰進士景泰初授御史厯陞右副都御史巡撫寧夏始以甎甃城導河流溉靈川屯田七百餘頃後為南京兵部尚書卒諡莊懿鎣襟度恬曠更事三朝所設施皆有成績五世孫仲謙萬厯中仕至雲南參政以清雅稱唐瑜字廷美上海人景泰辛未進士授南京禮科給事中知衢州府有恵政擢湖廣參政置廩積穀嵗歉民賴以濟襄河為患作隄障之厯遷山西雲南布政甘肅巡撫所至有聲唐珣字廷貴華亭人天順丁丑進士為福州知府奸人冒中貴笞辱僉事以下官珣知其詐執而置諸法厯右都御史總督兩廣軍務府江盜起討平之賜勅嘉勞卒於鎮張悦字時敏華亭人天順庚辰進士授刑部主事厯遷吏部左侍郎南京吏部尚書改兵部致仕卒諡莊簡悦操行清謹提學浙江甄别才器為士類所信服在湖廣執法不阿成化時中官尚銘在東厰任事衆競趨其門悦獨不徃銘敗悦名益彰在吏部為尚書王恕所倚信嘗兩攝選衆稱公允張弼字汝弼華亭人成化丙戌進士由兵部郎出知南安府其地當兩廣要衝亡命者聚山谷為民害弼至悉平之大庾嶺路險隘取商税僦工闢之架橋甃石二十里以便行者毁淫祠立社學俗為一變弼襟度恬曠而敦尚行履以風節自持為詩清健有風致尤以草書名張誥字汝欽華亭人成化丙戌進士選庶吉士改監察御史出按湖廣有能聲厯遷右副都御史巡撫雲南決疑獄諭亂蠻得撫綏體本邦孟宻二部連兵不解誥檄諸道練兵討之皆懼而自戢張黼字仕欽上海人成化丁未進士官南刑部郎中精於法律有里嫗訟子不孝反覆開諭且呼母為子理髮皆感泣去每有疑獄輒忘寢食以求其情子鳴鳯字世祥𢎞治進士令永康有政績擢御史抗章劾劉瑾削籍瑾敗復官終湖廣副使顧清字士廉華亭人𢎞治癸丑進士選庶吉士厯遷侍讀以守正不阿為逆瑾所嫉降編修尋調南京兵部員外郎瑾誅復原官擢禮部右侍郎引年乞休陞尚書致仕卒諡文僖清好學敦節行士論重之嘗疏請武宗預定儲位諫巡幸世宗繼統凡迎駕頒詔諸大禮援古証今所議得體李希顔字原復華亭人𢎞治癸丑㑹魁正徳中以廣東僉事奉表詣闕時逆瑾擅權希顔獨不踵其門京師稱鐵腰李進參議露章劾梁文康子暴横奪俸歸尋起原官遷雲南按察使以勞瘁卒官黄明字天章華亭人𢎞治癸丑進士厯南兵部車駕司郎中中貴憚之無敢託公差濫索馳傳者出守汀州值會𠞰屬邑武平宼或議括民財充軍餉明出官帑羨金給之境内無擾遷雲南副使致仕曽孫廷鳯字孟威官武定知府廷鵠字孟舉官順天通判皆有聲楊瑋字伯玉華亭人𢎞治丙辰進士授工部主事奏貴戚張氏挾寵撓法罪其家奴數十人遷光祿寺丞武宗日索子鵝腦數十頭作畫睂食瑋對中官言狼籍用物謫隰州同知陞知瀘州時征鄧茂七瑋單騎入賊巢招撫其餘黨皆解甲降厯四川副使致仕卒弟璨字仲玉由進士厯官應天府丞璨子秉義字士宜嘉靖間官給事中有直聲張𢎞至字時行華亭人弼子𢎞治丙辰進士改庶吉士授刑科給事中言初政漸不克終八事甚切直於時政多所匡救兄𢎞宜字時措由進士厯廣西兵備以勞卒官孫承恩字貞甫華亭人父衍字世延成化進士知延平府辯盜寃禁火化俗為之變嵗旱步禱烈日中得疾卒承恩正徳辛未進士入翰林世宗登極以庶子充經筵講官多所發明累擢禮部尚書掌詹事府時齋宫設醮承恩獨不肯冠黄冠遂乞致仕歸卒諡文簡呉稷字舜弼華亭人正徳甲戌進士授金華推官時章文懿懋家居講學嘗造請以質所疑移恵州以執法忤直指遷徽王府長史王素驕稷進賢王箴及芸窻賦規之因王自號芸窻故稷以名賦尋致仕歸隱於東郊多著述嘗佐顧文僖清修府志富好禮字子超華亭人正徳庚辰進士官刑曹郎有清慎名御史馮恩以論冢宰汪鋐下獄好禮力争謂無死法鋐銜之出守重慶遷建昌副使境有大渡河行者觸瘴多死好禮鑿山湮塹築塘堡數百里屬之省城尋乞歸徐階字子升華亭人嘉靖癸未廷對第三人授編修以議孔子王號謫官於外久之召拜司經局洗馬厯進禮部尚書兼文淵閣大學士與嚴嵩同在相位嵩每忌之而帝委任階亞於嵩嵩既敗階當國盡反嵩所為保全善類詔獄漸虚任事者皆得以功名終一時翕然稱名相隆慶中予告歸里萬厯初卒年八十一贈太師諡文貞弟陟字子明嘉靖丁未進士厯官南京刑部侍郎性貞介兄居政府不因之以取顯達人多重之陟子琳以父任厯楚雄知府有恵政階𤣥孫本高官錦衣千户以拒魏忠賢建祠奪職崇禎初累官左都督潘恩字子仁上海人嘉靖癸未進士授知州厯遷浙江參政按部海鹽倭宼猝至圍城數十匝恩力禦之危城得全巡撫河南徽恭王子多掠良家子占民田賊殺無辜恩發其罪論廢徙伊庶人忮惡尤甚剪其羽翼累擢南京工部尚書左都御史致仕卒諡恭定子允哲字伯明允端字仲履皆舉進士居官有名馮恩字子仁華亭人嘉靖丙戌進士授行人擢南京御史論罷南北郊彗星見劾張孚敬汪鋐方獻夫為根本腹心門庭三彗下獄論死會審起立不跪辨甚强時稱四鐵御史謂其口其膝其膽其骨皆鐵也子行可上疏請代死得減戍雷州後赦歸隆慶初進大理寺丞卒陸樹聲字與吉華亭人嘉靖辛丑進士第一選庶吉士厯遷禮部尚書予告歸卒年九十七諡文定樹聲性恬黙而嚴重有骨氣張居正當國欲引以為重樹聲介然不屑也嘗陳四方災異又論時政十事語甚切報聞而已通籍六十四年先後多請告家居官於兩都不及一紀海内皆仰其清徳子彦章字伯達萬厯己丑進士授行人以父老在職二年即乞終養給半俸異數也後厯官至南京刑部右侍郎工詩文善書法楊允繩字翼少華亭人嘉靖甲辰進士以行人擢兵科給事中疏屢上皆報可又論大臣受餽遺不貲語尤切尋巡視光祿劾寺丞胡膏虚冒物料膏誣搆允繩欺謗齋醮遂下獄論絞死西市隆慶初贈光祿少卿諡忠恪周思兼字叔夜華亭人嘉靖丁未進士授平度知州嵗祲旁郡飢民掠食且為亂思兼作小木牌數千散置四郊令飢民執以入城給銀米諭之復業衆遂定擢工部郎督厰清源募民囊土築河堤堤成三日秋漲大發民賴以全除湖廣僉事宗人有倚藩府勢為不法者悉案正其罪遷廣西提學未赴而卒子紹元字希安隱居績學工八分書紹節字希允以病謝諸生杜門著書兄弟友愛知名於時紹元子裕度工楷篆以孝聞龔愷字次元華亭人嘉靖丁未進士為御史仇鸞之開馬市也帝命尚書史道主之愷劾道委靡遷就誤國事帝方向鸞謂愷等借道論鸞杖八十奪俸按粤西列靖江王驕恣狀復疏止大征粤宼帝是其議遷湖廣副使歸董傳䇿字原漢華亭人祖恬𢎞治進士官刑部錄囚多平反厯大理少卿傳䇿嘉靖庚戌進士除刑部主事抗疏劾嚴嵩六罪下獄拷掠會地震謫戍南寧隆慶初召復原官累遷至南京禮工二部侍郎唐自化字伯咸華亭人嘉靖癸丑進士授將樂令治行稱最徵拜御史查補直𨽻山東山西積逋疏奏畿甸之下宜從寛䘏詔罷其征都人大悦改行人司司正厯兵部郎中長於治劇剖決如流本兵楊博最重其才卒於官子本堯字世承隆慶辛未進士由金谿令擢御史巡視十庫光祿奏逐中貴之侵冒者數人終貴州參政陸樹徳字與成樹聲弟嘉靖乙丑進士由推官陞刑部主事改禮科給事中穆宗時疏言上下交為泰非與公卿輔弼相論難何以劘君徳酬萬幾又條議諸邊計甚悉累擢右僉都御史出撫山東請裁募兵費戒苛罰俱報可後移疾歸林景暘字紹熙華亭人隆慶戊辰進士選庶吉士授禮科給事中神宗初政進十二箴以獻轉兵科左巡視京營請廣召募選鋒均糧凡十餘事厯遷南太僕卿歸數薦竟不出家居時應撫令所屬縣田出助役錢率七十畆徵一金景暘力争得減十之七子有麟以父蔭官至龍安知府以清謹稱許樂善字修之華亭人隆慶辛未進士為郟縣令擢御史首輔張居正奪情總憲率諸御史上公疏慰留樂善為居正門下士獨不署名按畿南有棗强令倚勢為不法劾治其罪尋掌河南道典内計條上六事遂著為令甲又疏請停礦税救建言御史曹學程舉朝稱之厯遷南京通政使請告歸卒唐文獻字元徵華亭人萬厯丙戌廷試第一授修撰為東宫講官每講畢大璫出揖不通一言輔臣沈一貫忌侍郎郭正域剛直欲以妖書事陷之文獻邀同列力白其誣正域獲免給諫李沂劾大璫廷杖文獻徙步掖之手調湯藥人多其義厯禮部侍郎掌翰林院卒諡文恪從子諸生允振字叔起有文行王孫熙字君文華亭人萬厯乙未進士授缺入為大理評事有大璫坐重辟行萬金求免孫熙曰爾金如山我案如山論如律為台州知府地有麻枲民不知織生女多不舉乃購工教以經緯之法嚴溺女之禁久之所育女皆任織名王公布子元瑞官御史有清名張以誠字君一弼𤣥孫肆力於經史百家朝章典故莫不該洽萬厯辛丑廷試第一人授修撰遷左中允疏請東宫出御講筵以重國本慰人心詞㫖愷切尋轉右諭徳丁外艱歸以哀毁卒以誠舉止安雅敦尚名節士論推重張鼐字世調華亭人萬厯甲辰進士由庶吉士厯遷少詹事上疏言事語斥近倖魏忠賢惡之擢南京禮部侍郎引疾去忠賢削其籍鼐砥礪名節為文章通達國體崇禎初起原官黄體仁字長卿上海人萬厯甲辰進士時館相國李廷機家使試館職謝曰某老矣不足以辱此選門人徐光啟可也光啟遂入翰林而體仁為主事厯知登州府罷坊市雜税脱建文忠臣陳迪子孫於戍籍擢東兖道副使值嵗祲而福王之國請盡革迎謁供億諸費民徳之當路不悦罷歸撰續上海志田賦諸篇最詳覈云徐光啟字子先上海人萬厯甲辰進士選入翰林以少詹兼河南道御史練兵通州賜勅如巡撫厯禮部右侍郎為魏黨所劾落職崇禎初召還轉左日食失驗光啟言厯久必差宜及時修正乃置局修厯以光啟領之得元太史令郭守敬之意而法加宻進禮部尚書尋拜東閣大學士卒於位諡文定所著有農書厯指漕河議兵事巵言等書錢龍錫字稚文華亭人萬厯丁未進士選庶吉士厯南京吏部侍郎魏璫銜其不附已削其籍崇禎初年用枚卜拜東閣大學士改文淵閣以定逆案深為羣小所嫉因袁崇煥獄陷之死帝以龍錫素循謹詞臣黄道周等力救久始得遣戍夏嘉遇字正甫華亭人萬厯庚戌進士授保定推官廉恵為畿輔冠擢禮部主事時給事中亓詩教御史趙興邦挾政府恣為奸横嘉遇五上疏劾之亓趙自引去時論快焉天啟初冢宰趙南星用物望自南吏部召為銓司署選事魏璫屬其姻黨誣奏被斥歸崇禎初贈太常少卿錢士貴字元沖華亭人萬厯庚戌進士由知縣擢御史議移宫紅丸挺擊三案請誅李可灼論政府罪如律會魏忠賢竊政反三案以傾朝士遂謝病歸崇禎初起故官厯南大理寺丞以疾告家居十餘載力行善於鄉後召為刑部侍郎未至卒許譽卿字公實華亭人萬厯癸丑進士由推官拜給事中抗疏極論魏忠賢罪又陳時弊言厰衛流毒宦官内操忠賢益怒鐫秩歸崇禎初起原官陳五事規切廷臣有訐之者遂自引去久之復起流賊毁鳯陽皇陵譽卿憤激發大臣玩寇之罪後削籍歸董羽宸字邃初上海人萬厯癸丑進士授餘姚令報最擢御史巡視山東預平白蓮妖賊厯遷吏部侍郎剛方獨立忤時相被劾歸時同邑何萬化字宗元萬厯壬戌進士厯官湖東參政亦平境中妖賊之亂張履端字旋吉華亭人萬厯壬子與兄拱端弟軌端同舉於鄉丙辰成進士知晉江束鹿二縣在晉江分校戊午鄉試得漳浦黄道周在東鹿有惡少結黨白晝刼殺人吏莫敢問履端誅其首惡境以寧滹沱河數決為城患乃去河二十里作新城規制詳宻民忘其遷天啟中擢兵部主事以草疏忤璫斥歸崇禎初起吏部未赴卒弟軌端字方同知邵陽縣楚賊犯境約苗兵赴急大破賊於天王寺有㫖奬賚會卒王陞字超之華亭人萬厯丙辰進士為兵部主事偕同官張履端代尚書草疏請省刑薄斂大忤權璫意去職崇禎初補本官厯郎中薦總理盧象昇専督楚豫以靖寇六合縣舊無城當寇訌淮泗陞請以兵部所省江南驛站銀築之累擢太僕寺少卿以忤時相歸杜喬林字君遷華亭人萬厯丙辰進士由主事出知湖州府枕太湖故多盜時王崑崙等竊發喬林宻謀捕擊五十餘日羣盜悉平累遷浙江右布政使分巡温處到官六日海寇劉香老入犯圍府城晝夜捍禦廉得賊諜誅之出兵奮撃三戰皆捷以病告歸子麟徵字仁趾由進士官刑部主事疏諫大璫總理部務及出監宣大諸鎮事葉有聲字君實上海人萬厯丙辰進士己未廷試由侯官知縣擢給事中論勤政治體言路仕途四事尋以忤魏璫削籍崇禎時厯遷河南按察使兩禦流寇有功後以左副都御史免官屏居村墅以壽終陳所聞字無聲華亭人萬厯己未進士授刑部主事時奄勢方燄内侍劉朝李進忠輩繫獄諸郎無不通殷勤獨所聞視之如常囚俄調工部主事董作山陵奄人監䕶恣乾沒所聞莅事精敏虚冒無所容羣奄奪氣董象恒字有仲華亭人萬厯己未進士知開州白蓮賊倡亂捕斬之厯福建參政討鄭芝龍有功擢僉都御史巡撫浙江捐俸造漕船五百以濟運時流寇竊發各省多殘破兩浙獨完象恒之力為多趙東曦字馭初上海人萬厯己未進士由知縣擢給事中論加派預徵捜括捐助皆茍且之政請興屯塞下以充軍用又劾奏奄人王坤監視失䇿乞正其罪悉罷中使監鎮之任忤㫖調外張昂之字匪激華亭人天啟壬戌進士授盧陵令郡紳有素附魏忠賢欲改文天祥白鷺書院建璫祠者昂之力格其事遂為所搆削籍歸崇禎初起兵部主事知保寧府張獻忠寇蜀昂之召募勇鋭梟其大帥措餉給兵士力保巖疆以功遷川東道尋告歸沈匡濟字方平青浦人天啟壬戌進士授錢塘令時勢家侵占西湖為園田悉釐正之厯官山東提學副使初在浙分校甲子鄉試烏程淩忠清義渠其所取士也李世祺字壽生青浦人天啟壬戌進士由行人擢給事中陳大計當定者二大弊當去者三帝納之力言中官監視諸鎮之非不能用又疏劾時相温體仁呉宗達忤帝意貶官後起行人司副厯遷太僕卿包爾庚字長明華亭人明季以進士知廣東羅定州戢悍兵雪寃獄弭峒徭之變民建祠祀之以卓異徵不赴國朝張安豫字子建華亭縣人由太學生授齊東丞值東省饑盜起安豫單騎入龍山賊營諭以禍福皆解甲降擢齊河令督餉入京順治初授金華府知府招徠綏輯政績大著遷浙西守道張安茂字子美華亭人以誠子順治丁亥進士授工部主事分校戊子北闈稱得人兼綜漕務宿弊盡革厯浙江提學僉事輯泮宫禮樂全書遷陜西西寧道副使諸舜發字陶叟青浦人順治丁亥進士授户部主事厯陜西提學僉事請屬不行試卷高下皆手自閲定以積勞卒綏徳州官署所遺惟圖書數卷而己周茂源字宿來華亭人順治己丑進士厯刑部郎中授處州知府處山路險仄募民開鑿二百餘里自是所過若坦途又招集流亡給牛種墾田一干八百餘頃以逋誤左遷歸日事著述有鶴静堂集子綸字鷹埀有文名王廣心字伊人華亭人順治己丑進士授行人厯主事擢御史巡視京通二倉漕政自明季以來奸弊百出廣心事事釐剔疏凡三十餘上清操凜然雖大猾不敢撓又修築通會河運道輸挽無阻以親老乞歸所為詩文宏麗有集許纉曽字孝修華亭人明通政使樂善曽孫順治己丑進士選庶吉士陞中允以才堪外任轉江西驛鹽道理郵政以豁民累除鹾蠧以通商引遷川東道時寇孽未殄從征萬州及取大昌皆有功擢河南按察使莅職勤敏刑獄一清以事罷復補雲南按察使尋乞終養歸陸振芬字令逺華亭人順治己丑進士時兩粤未定破格用才特擢嶺東恵潮道隨大軍進討諸郡邑以次削平抵任後招流亡省徭役民遂大和癸巳四月駐潮總兵郝尚久作亂兵圍道署振芬誓死不屈宻遣家人齎蠟丸牒請兵𠞰賊尚久伏誅力辭題敘引疾歸里沈荃字貞蕤華亭人明大理卿粲裔孫父紹曽有至行聚徒授業荃順治壬辰廷對第三人授編修出為河南大梁道有政績洊厯詹事府詹事卒諡文恪荃學行醇潔名重館閣書法尤推獨步為聖祖所賞士以一長來謁者輒為嘘植子宗敬字南季兼工書畫康熙戊辰進士仕至四譯館卿顧大申字見山華亭人順治壬辰進士授工部主事分司夏鎮河道節省公費築城以守人服其廉幹晉郎中出為陜西洮岷道僉事卒於官平日留心經濟所著河渠論言水利者多採用之施維翰字及甫上海人順治壬辰進士授臨江推官陞御史在臺班十七年所條奏皆闗大體累擢右副都御史巡撫山東遷浙江總督前院疏劾軍士鼓譟一案縲絏二百餘人維翰至即日會讞多所平反調福建總督未抵閩署卒諡清恵王日藻字印周華亭人陞孫順治乙未進士授工部主事由員外郎出為河南提學僉事報最擢參議補河道累遷浙江按察江西布政使所莅有聲晉副都御史巡撫河南疏請開墾荒田四十四萬餘頃悉成沃壤分轄河務籌畫精宻内遷刑部侍郎轉户部厯工户二部尚書賦役諸政裁斷允愜以事落職復起總理高堰河工勤瘁卒工所特復原秩王頊齡字顓士廣心子康熙丙辰進士授太常博士己未薦舉博學鴻儒改授編修纂修明史厯工部尚書武英殿大學士雍正初以老乞休上手勅慰留年八十四卒於位贈少傅諡文恭頊齡初以文學進洊厯卿曹諳練典故在政府八載恪誠純一以風度稱弟九齡字子武康熙壬戌進士由庶吉士厯官左都御史恬静有雅量高層雲字二鮑華亭人明檢討承祚孫康熙丙辰進士授大理寺評事擢吏科給事中章奏屢上皆秉禮執法多所彈正遷通政司右參議厯太常寺少卿卒官層雲工詩文善書畫得者寶藏之王鴻緒字季友廣心子康熙癸丑進士廷對第二人授編修厯侍讀學士妖人朱方旦以左道煽惑一時鴻緒特具疏列其三大罪方旦伏法累擢左都御史總裁明史自工部尚書轉户部解任歸後復修詩經傳説彚纂及省方盛典並為總裁官張集字殿英上海人康熙丙辰進士授行人擢御史疏免漕田丈量以除民累及釐軍政嚴保題等事糾庸懦提鎮不避怨嫌厯官至吏部侍郎連丁内外艱服闋補兵部左侍郎尋謝病歸集性樸儉為大臣自奉若寒畯以徳量稱顧昌祚字受周上海人康熙己酉舉北闈授江華知縣粤西苗為患唯猺能禦之前令尅減嵗賞遂不用命昌祚如額以給猺悦服悉力抗禦四境帖然後以忤上官意左遷徐賓字虞門華亭人康熙戊辰進士授臨城令有山名紫壺套邑之奸民多嘯聚其中賓單騎諭降之總理宣沙與桃花口牧馬皆著勞績以卓異徵授户部主事擢吏科給事中轉刑科掌印詳陳積貯以杜侵漁及請截漕米賑山東饑悉見施行曹泰曽字彚初上海人康熙戊午鄉薦授莆田令清賦簡訟御吏嚴察有大姓殺人賄府求脱泰曽力持之卒正其罪條邑中利弊六事請之上官鋭意興革尋坐執法被劾罷從弟炯曽由貢生知贛縣亦著政聲廖鳯徵字樾阡華亭人選拔入都大學士陳廷敬重其才品延為二子師康熙癸酉舉北闈選授林縣令邑素剽悍難治鳯徵訓以禮法俗為一變又均平户役民懷其徳丁内艱歸江南通志卷一百四十一
