body:
  text: 江南通志卷一百十七職官志名宦六池太廬鳳四府池州府唐韋仲堪字權輿令青陽豈弟而民從南畿志李芃字茂初趙州人李勉觀察江西表芃為判官永泰初宣饒劇賊方清等截江刧商旅支黨盤結芃請以秋浦置州扼衿要使不得合從勉是其計奏以宣之秋浦青陽饒之至德置池州即詔芃行州事唐書本傳蕭復字履初池州刺史有治行唐書本傳張嚴建中初池州刺史因公坐法免苦節立身直躬激俗㢘潔惠愛特異常流李冉舉嚴自代疏孫愿貞元後三任池州刺史積漸所致民濡澤焉南畿志李方元字景業刺池州勾檢戸籍所以差量徭賦者皆有科品章程吏不得私嘗曰沈約年八十手寫簿書蓋為此唐書李遜傳杜牧字牧之萬年人㑹昌中刺池州牧之剛直有竒節不為齪齪小謹論列大事指陳利病尤切南畿志竇潏乾符六年刺池州黄巢亂後百姓死徙城邑為墟潏檢訪鄉籍安集流亡築城浚濠立廨舍竇潏重建大㕔壁記陶雅合肥人池州團練使時諸州多貪暴獨雅寛厚得民舊史南唐呉仲舉興國人為池陽令宋曹彬伐江南遣使招降仲舉殺其使及破池州執仲舉仲舉曰世禄李氏國亡而死職也彬義而舍之薛居正舊史宋成昂開寳間知池州始建學校興教化南畿志羅彦輔嘉祐間知池州屬歲旱善舉荒政奏課第一南畿志王哲字微之嘉祐中以學士知池州司馬光有齊山記寄頌其美南畿志汪奕字公偉績溪人哲宗初第進士知東流縣有書生上書觸時忌憲使欲置重典奕以為狂疾宜寛其罪奏上果貸死憲使謝曰微君幾陷失入矣南畿志楊元秉紹興中知青陽縣毎事精覈羣吏縮手臺省亦難屈以私遷儒學於縣治東南邑人宜之南畿志黄子游紹興十九年知池州論青陽苗税多於諸邑悉為之蠲除南畿志陳昇卿乾道二年知青陽縣減南唐宋齊邱私增之賦南畿志林桷字子長玉山人淳熙七年知銅陵縣晝日垂簾庭無訟者以最增秩南畿志許介髙陽人淳熙十一年知青陽縣有惠政嘗建九華祠及去民思之請于朝以介配享其中南畿志潘鋗字叔剛長樂人慶元四年知銅陵縣自處儉約折服豪强南畿志趙方字彦直衡山人慶元五年知青陽縣誠心愛民告其守曰催科不擾是催科中撫字刑罰無差是刑罰中教化人以為名言宋史本傳王伯大字㓜學福州人嘉定間知池州尋召還端平二年復以江東提舉常平兼知池州興學校拓貢院奏增貢額繕城浚池葺齊山諸亭南畿志張洽字元德清江人嘉定中通判池州州民張德修誤蹴人死獄吏誣以故殺洽疑之請覆鞫不聽㑹天大旱洽言于提㸃常平袁甫甫乃閱獄遂從徒罪復白郡請蠲征税寛催科以召和氣守為寛税三日果大雨宋史道學傳焦煥炎字晦甫紹定間差知池州兼沿江制置使奉省劄令逐沿江流民不得寄住煥炎憫之為疏撫綏之策朝廷嘉納之池州府志趙昴發字漢卿四川人咸淳十年權通判池州元兵渡江池守棄官去昴發繕壁聚糧為守禦計明年元兵至都統制張林隂降昴發晨起書几上曰君不可叛城不可降夫婦同死節義成雙乃與妻雍氏同縊元丞相巴延為具棺斂合𦵏祭其墓而去宋史忠義傳元陳伯奎天台人至元初為銅陵尹建學校表先賢士知嚮學銅陵縣志程端禮字敬叔鄞縣人有經術篤於踐履傳朱子明體達用之㫖至元間教諭建德增學舍以居生徒著讀書日程使學有師法盡復學田之為民占者始田三百畝及受代增至一千畝元史儒學傳陳思濟字濟民柘城人池州路總管江浙行省平章伊蘇岱爾威勢赫然摘淘金戸三千括民間田畝檄下力上章以止之元史本傳史午至元二十九年尹青陽旌表節義以勵風俗南畿志實都䝉古人大德四年監石埭縣舊制歲輸秋苗二萬八千石皆本色轉輸山陂所費不貲都請改折色名輕齎著為令石埭縣志周應極字南翁鄱陽人至大間同知池州案無留滯散羨賦還民池州府志張士元字𢎞道延祐中尹貴池嘗平反殺人獄吏弗忍欺貴池縣志徐泰亨字和甫至順二年為青陽尹邑舊有荒田千四百頃出租税泰亨募人墾闢其累始除有告四十人同發廩粟者吏欲准盜論泰亨曰吾不忍其發粟求生而反抵死悉笞而遣之銅陵人爭魚池三十年不決泰亨數語立剖青陽縣志蕭文孫廬陵人至元間池州路經歴建宋趙公祠祀趙昴發夫婦著忠孝二史褒表人物池州府志王興祖字國珍吉州人至正七年為池州路總管㢘惠建三賢祠碑猶存池州府志李宗可蘄州人至正十八年為池州路判官陳友諒屢冦安慶余闕命宗可權義兵萬戸統新軍守砦嘗横槊入賊中殺傷甚衆及城陷宗可馳還盡殺其妻子自刎死池州府志上官凝邵武人元末為銅陵尉秩滿有十數叟送之餽藥數器至前路發視皆白金也追召其人語之曰吾奉法循理本非私汝詎可以私終乎卒不受銅陵縣志明王祖順洪武初知池州創制畢舉調度有方南畿志王希顔洪武十八年知池州府時有舍人劉蠻兒以解囚馳府甬道直入㕔事希顔擒治之狀聞太祖嘉其不避權勢遣使勞焉池州府志趙安洪武二十一年知池州以㢘能膺上考南畿志尹安茶陵人洪武五年知石埭勞來安集興學教士南畿志夏霖字民悦洪武中建德知縣御史劉天錫名其堂曰忠勤記之南畿志孟常鄱陽人洪武中知石埭調建德邑多逋賦為撙節區畫以償又力請於朝得減賦額萬計秩滿民赴闕乞留兩邑俱崇祀石埭縣志吕復衛輝人洪武末以國子生授東流典史勞于撫字後官工部郎中南畿志商賔洛陽人洪熙元年以吏科謪知銅陵縣請聴民墾闢俟熟而後賦之增額田以數千計秩滿銅民赴闕請留歴三考皆以最聞銅陵縣志楊俊巴陵人正統元年知池州有惠政卒於官遺槖一琴池州府志葉恩臨海人正統二年知府事葺學宫興士類凡聽斷有關大閑者系詩于牘尾以示勸誡人皆愧悟南畿志雷浩華容人成化三年池州同知不染一塵卒於官無以殮池州府志洪達淳安人成化四年知青陽縣仁恕重建縣㕔青陽縣志趙珪鄞縣人成化六年池州同知公平簡肅無敢私干池州府志王政字布德易州人成化十六年知青陽縣四境多盜嚴加捕緝大葺學校製祭器購書籍邑東五阡圩患水溢為建橋三座以濟行者青陽縣志周源同安人成化十七年知石埭縣律已㢘臨民惠遇災能䘏南畿志楊季方番禺人成化二十二年東流知縣單騎之官㢘豪强者置之法察鬻子女者為贖還之東流縣志陳良器字彦成錢塘人𢎞治二年知池州内和外剛聽斷眀決南畿志言芳鄒平人𢎞治四年由知府左遷池州同知攜一僕之官謁臺使不屈節而禮賢士若不及焉卒於官篋中止二袴餘俸五星池州府志祁司員山隂人𢎞治十二年知池州府吏民畏懐雖聲若不出口而毅然有任重道逺之意政績炳然南畿志錢瓚鄞縣人𢎞治十五年知青陽縣豪右貧細各安其業南畿志何紹正字繼宗淳安人正德九年知池州建府學大成殿修明倫堂及兩廡又修建德銅陵青陽三縣學宫建齊山書院又增城浚濠築新河堤及銅陵五十餘圩池州府志杜秉􅂜號滏涯永年人嘉靖二十九年知池州毁淫祠折節正士水旱有禱立應池州府志詹萊常山人嘉靖三十六年池州同知大盜章玉九等刧掠江上萊悉擒之捐俸置趙昴發祭田葺其祠宇池州府志厲汝進灤州人嘉靖中池州推官執法不骫擢戸科給事首劾大學士嚴嵩降典史池州府志陳萬言南海人嘉靖三十九年池州推官有風采景王之國閹寺驛騷萬言毎裁抑之署銅陵尤多惠政池州府志楊茂清鄞縣人嘉靖中知貴池縣其政因土俗順時宜興廢皆當民情張時徹撰碑銘余初字復之淳安人嘉靖中知東流縣造黄冊均里甲平徭役東流縣志徐衍慶永清人嘉靖中知貴池清介質實㑹章聖太后梓宫返𦵏承天道經池郡衍慶趣辦夫役溽暑奔趨卒橐無殮資貴池縣志鍾大賔字體嘉曲江人嘉靖三十八年知東流丈量田畝不失尺寸定賦均平東流縣志劉孜江夏人嘉靖四十年令銅陵景王道江上孜與推官陳萬言經理夫役民以不擾立祠與陳並祀銅陵縣志李得春鍾祥人嘉靖四十一年由禮科謫知石埭量田公平加意士類民為立祠於仙壇宫石埭縣志田登年忠州人嘉靖四十三年令青陽奉檄築城令民照丁田自購磚石一月工具青陽縣志李子躍東平人隆慶二年知石埭和而慤遇旱步禱赤日中對槁禾流涕雨大注石埭縣志王頤字觀生沔陽人萬厯三年以南給諫來知府事公餘不休私署於堂左構琴鶴堂寢處其内使客脯餼例取給於里甲頤悉除之一切皆給市值佐兵憲繕城堞築千栁堤以備江警勞卒無以為殯士民泣賻之池州府志劉孟雷字靜之廬陵人萬厯十一年知池州㢘猾胥十數人置之法建興濟橋甃青雲堤以通行旅備蓄洩池州府志何思登蒲圻人萬厯二十年知府事民有寃抑力為申雪權勢弗能撓尋遷副使單車襆被就道池州府志方遂京山人萬厯中由進士知池州易直子諒民依之如父母尋調守開封老㓜卧轍不得行池州府志徐金星字玉垣鄞縣人萬厯中知建德縣賑活無算讞獄平允當道薦表凡十一上擢御史建德縣志葉明元同安人萬厯中知石埭省浮費清滯獄請上官裁減差使以節夫馬石埭縣志陸階字五雲桐鄉人萬厯二十一年知石埭縣旱禱即雨革里甲供億諸費罪罰皆從其寛卒於官貧不能殮士民為之經紀喪事石埭縣志羅憲凱字元甫豐城人萬厯三十年知貴池清介不為鷙擊而人自憚之貴池縣志劉受書萬厯中令建德端方愷悌嘗質米而炊訟不赴訊者聽囹圄空虚吏胥多告歸農建德縣志徐一科字瀹盈弋陽人萬厯中知銅陵歲大水諸圩盡潰乃剏築都埂長八十餘里民名之曰徐公堤銅陵縣志張燦垣字紫城成都人天啓末知貴池庭訊數十百人無不了了輕徭減役貴池縣志何應明字曙初晉江人崇禎五年知建德精於釐剔稍有餘羨即充各里逋欠建德縣志田瑞龍字蒼霖固始人崇禎七年知貴池流冦在皖瑞龍募壯丁守禦尤留心文學訪舉名賢貴池縣志王家柱字石卿江陵人崇禎十一年知青陽調貴池時講荒政至解章服市米以食餓者江北冦警繕治城堞訓士儲糧為備青陽縣志葉幹字伯貞金華人崇禎十四年知石埭楚帥舟師東下江上震動幹親率涇太青石四縣鄉兵扼龍口以備不虞石埭縣志李際明順德人崇禎十四年知建德杜苞苴贖鍰槩不入私橐建德縣志向思敬貴池典史㢘介有為致仕去士大夫贈言盈篋邑令龔守愚詩曰歸心浩蕩鷗波濶宦况蕭條馬骨髙貴池縣志胡鯤化鹿邑人崇禎十六年知銅陵縣時過兵索餉鯤化以身當之及左夢庚兵水陸并下親冒矢石城破被害訓導安東張緯典史餘姚胡國瑨同死之銅陵縣志程九萬湖廣人崇禎十七年以府知事署東流縣事乙酉叛將楊么兒破縣死之東流縣志龎昌印西充人崇禎十七年知青陽縣未數月以治聞明亡被逮至五溪服鴆卒縣人立祠祀之青陽縣志國朝馬𢎞良本姓張名自昌號文寰昌平人順治二年以院辦事官隨督帥洪承疇南下池州降即以𢎞良為知府時山谷負固鎮池總兵于永綏欲殱之𢎞良請𠞰撫並用兵之所指輒先一舍招降全活數十萬人山谷平百姓稍稍復業𢎞良存撫備至復學校勸耕桑并約束守兵使不為民擾調知岳州池人泣送數百里蔣應仔山隂人順治二年知銅陵縣安集流散勸督農桑民漸樂業以次補築雉堞復起堂皇悉心規畫民不煩而事集劉曰義遼陽人順治七年知銅陵縣築城垣修學宫規制悉勝其舊又修紫陽書院以造士濬河道治街衢諸廢具舉岳申字式南沔縣人康熙三年令貴池年將七十案牘皆手自裁定嘗策一馬行郊原於陂塘圩堰處指示疏濬蓄洩之法布衣糲食署中毎至絶糧舊通志姚子莊字六康歸善人康熙五年知石埭縣首條錢糧六弊六法行之編里甲均徭役置義塾十二所以訓民間子弟人咸徳之汪元綬宛平人康熙十八年授池州府同知清介自矢嚴防禦查汛守境以大寧歲凶監賑活者萬數舊通志馬得貞介休人康熙二十一年知銅陵縣性剛介明於聽斷縣多圩田毎值水溢輒躬履圩岸率民增築隄防不辭勞瘁李燦字君章奉天人康熙二十五年授池州府知府飭六邑減耗羨嚴保甲倡修府學大其規模令六邑皆如制又築貴池黄屯阪埂開銅陵洋山磯路重建城南濟川橋起城東迴瀾書院趙衍東陽人康熙癸丑進士知貴池縣邑多積逋弊由於總戸催科者莫得其主名衍為按戸清註俾以實田辦實賦宿弊頓除建縣㕔事起學宫文昌閣用形家言作水德亭於城東城内遂少火災太平府晉胡毋輔之字彦國泰山奉髙人性嗜酒永昌中為繁昌令始節酒自厲甚有能名晉書本傳南北朝梁丘仲孚字公信呉興人永明七年為于湖令有能名太守吕文顯以權幸凌轢屬吏仲孚獨不為屈梁書本傳唐張邈為郡司功叅軍開元以來良吏邈居其一有寒松貞玉之操陳簡甫記李陽氷字少温廣漢人寳應初為當塗令李白來依之贈詩云華邑艱難時浮雲空古城居人若薙草掃地無纎莖惠澤及飛走農夫盡歸耕廣漢水萬里長流玉琴聲雅頌播呉越還如泰階平李白詩集宋宋準字子平雍丘人開寳六年知平南軍㑹改軍為州即以準知州事準美丰儀善談論居官所至有治聲宋史文苑傳王知微字幾之仁宗時以祕書丞知當塗縣時築萬春圩工役甚急知微請俟農隙使者始不悦久乃信重之南畿志夏希道字太初慶厯間令繁昌邑陋民貧希道至惠愛多方日以生聚修舉廢墜規模一新南畿志何述字缺道浦城人為當塗令邑瀕江歲多水患述為築堤捍禦之南畿志汪汝則字叔方宣和初除蕪湖縣丞以助平方臘功改衢州士曹時廷臣奏對有論及守令人材者上曰使人人如汪汝則何患不治南畿志周葵字立義宜興人紹興中知州事水壊圩堤葵悉繕完歲乃大熟市河久湮令城中家出一夫官給之食併力濬導公私便之宋史本傳張運字南仲紹興三十二年知太平州當兵飢疾癘之餘殫勞來安集之方嚴斥堠攻守之備理財賦造戰艦繕甲兵申禁令民賴以安宋史本傳曾覺晉江人紹興末令繁昌歲飢發廩賑給又捐資修葺學宫南畿志虞允文隆興元年以敷文閣學士知太平州舊制民舉子必納添丁錢歲額百萬貧民生子多不育允文憫之為措置官項代補自後戸口日增宋史本傳呉芾字明可仙居人舉進士第乾道三年知太平州造舟以梁姑溪歴陽築者久役潰歸聲言欲趨郡境芾呼至城下厚犒遣之而宻捕倡亂者繫獄以聞詔褒諭之宋史本傳楊倓字和義淳熙三年知太平州學宫祭器用錫倓易以銅重建四齋令秀民肄業其中精選師儒以司訓導甫期年行藝皆斐然可觀南畿志李椿字壽翁洺州人淳熙五年知太平州力圖上流之備請選將練習緩急列艦上可以援東闗濡須下可以應采石宋史本傳洪邁字景盧樂平人淳熙十五年知州事政尚寛簡民皆向化郊産異麻狀若靈芝進敷文閣學士南畿志呉箕字嗣之休寧人嘗宰當塗剖析民訟編類成書名聽辭類稿南畿志趙汝愚字子直紹熙元年知州事存心仁厚持身潔白收召賢能大有政績吏民懐之南畿志孫懋宣州人紹熙三年知太平州首汰冗吏士民稱服朱子嘗稱之曰愛立而教明古良吏也南畿志趙汝勣宋宗室慶元三年令當塗年饑穀貴汝勣開倉散米萬斛一邑全活事聞詔他郡皆倣汝勣賑濟法宋史宗室傳呉柔勝字勝之寧國人嘉定間知州事州故舊時授經處親戚交游有犯柔勝一繩以法罷城下税減萬春圩租市河淤塞捐貲濬之宋史本傳王習之三山人嘉定中令繁昌學校壇壝驛傳無不修舉南畿志徐鹿卿字德夫豐城人淳祐初領太平州蠲采石蕪湖兩務蘆税蝗入當塗境鹿卿露香黙禱忽飄風大起蝗悉渡淮宋史本傳牟子才字存叟井研人寳祐三年知州事首教民孝弟以前人慈竹義木二詩刻而頌之間詣學為諸生講説經義修采石戰艦百餘艘造兵仗以千計前官負綱錢七十萬緡悉為補之蠲黄池酒息及秋苗畸零併夏税畸零紬帛絲棉麥若干郡有平糴倉以米五十石益之又以緡錢二十五萬創抵庫歲收其息以助糴本建李白祠自為記宋史本傳元白珽字廷玉錢塘人至元二十八年授太平路學正時兵燹後聖殿齋廡祭器俱廢珽悉心修葺建天門采石二書院太平府志歐陽𤣥字原功瀏陽人延祐初調蕪湖尹縣多疑獄久不決𤣥察其情悉為平反貢賦徵發及時民樂趨事教化大行蝗不入境元史本傳賈煥字華甫開封人泰定元年授太平路總管歲饑募粟分賑建壇壝修學舍築石城濬尚書塘太平府志王惟中字擇卿懐孟人泰定三年尹當塗㑹水潦旱蝗相仍惟中捍堤禱雨捕蝗無寧晷以禮義感富民令出粟分賑全活甚衆當塗縣志浦源字以開長洲人泰定中令蕪湖境内大水募粟賑給㑹郡發廩米千石令減直以糶源謂民有錢可糴則不饑矣盡以米濟之語同列曰郡有責吾獨償不以累諸君也蕪湖縣志倪淵字仲深烏程人泰定中授當塗主簿先是延祐初邑令經理田土考覈失實令淵署篆乃分畫編次為圖籍釐隠匿除增加衆大悦歲祲四境上災狀郡戒縣弗受淵爭之不得即日求解組去郡守驚悟遣吏謝即委以檢視淵躬視阡陌稽實蠲税民賴以甦當塗縣志暢師文字純甫南陽人至正間太平路總管歲大旱捐俸致禱㴻雨大降公田米積之盈屋曰我家能盡食此乎呼貧士及細民恣其取去元史本傳靳義字處宜河南人至正十二年守太平寛仁勤敏溧水彭賔等倡亂分道來冦義列營要害且戰且撫賔等皆敗降明兵渡采石義赴水死太平府志明楊偁字廷舉合肥人元至正乙未太祖取太平丙申偁知蕪湖民散賦逋偁首詢疾苦興利除害招徠遺黎撫摩凋瘵邑以治稱壬寅建縣治立坊舍南畿志許瑗字栗夫樂平人明初知太平府厲士卒修城池撫黎庶陳友諒以兵十萬來攻瑗偕樞宻院判王鼎守將花雲堅壁拒守城陷皆死之南畿志花雲懐逺人為太平守將元至正二十年五月陳友諒圍城雲率麾下三千人結陣迎戰三日友諒不得入乃以巨舟乗漲泊城西南隅舟尾髙與城平士卒縁之上時城中乏食士不能戰丙辰城遂陷賊縛雲急雲怒罵曰賊奴爾縛吾吾主必滅爾斬為膾也遂奮躍大呼起縛盡絶奪守者刀連殺五六人復罵曰賊非吾主敵也曷不速降賊怒縛雲舟檣叢射之比死罵不絶口妻郜氏赴水死谷應泰通鑑紀事本末黄朝弼明初知蕪湖縣蕭然類寒畯公務雖冗退必讀書去官士民爭醵金為贐不受惟出所攜書一篋易鈔而行南畿志呉聰潮州人明初蕪湖縣丞性至孝嘗畫海雲南望圖懸於壁民有不得乎親者痛治之復泣語曰吾以不得侍親為憂汝幸在膝下何為不孝聞者多感悔焉廣輿記王俊字用章永平人洪武五年知當塗出俸錢創建邑學不足則售其家田園助之以德化民濟以威嚴當塗縣志周鑄洪武中知繁昌撫民有方律巳以嚴尋擢御史繁昌縣志孟㢘洪武中知當塗縣坐事與縣丞趙森同逮獄耆民具列善政詣闕以請遣還任當塗縣志顔宣永樂中令繁昌修縣㕔建城隍廟禱雨即應繁昌縣志黄誠合浦人宣德七年授蕪湖教諭勤於學政規矩嚴整與司訓廖驩兩人相濟蕪湖縣志盧忠字以誠漳州人正統初授府學訓導日進諸生講解寒暑不輟巡撫薦其才堪戎伍上曰與其戎伍得人何如學校得師太平府志張嵓字具瞻上虞人初授宣城教諭正統三年巡撫周忱薦知當塗題梅詩贈之云疎影横斜出泮池一氊清冷最相宜彈琴却傍青山去百里春田在此時嵓蒞官清勤黌宫縣治譙樓驛傳橋梁道路修葺一新簿書填委暮必至學舍省諸生勤惰後歴官知荆州府當塗縣志李慶景泰末令繁昌縣治濵江數有水患慶建議内遷繁昌縣志周鳳字文祥汲縣人成化九年知太平府衣食寒素不以家累自隨嘗疏通市河郡人便之太平府志唐詔陽信人成化中同知太平清謹簡易吏民愛服卒於官啓笥惟書數卷太平府志劉憲字廷式益陽人成化間知蕪湖百廢俱修遷瀂港驛於縣市遷河口鎮巡司於瀂港邑人便之蕪湖縣志徐禮字敬先餘杭人成化中令繁昌建社學起舖舍弊除利興尋擢御史繁昌縣志包羲民字淳夫合浦人成化末知繁昌撫下寛仁尤毅然有守不喜飾厨傳以媚上官㑹以憂去士民惜焉繁昌縣志徐節字時中壽昌人以御史出知太平建學宫修郡志造浮橋均郵遞民間失火節奔救禱天火隨滅㑹觸直指怒突至府清庫并檢内宅僅得敝衣數事直指慙云如此賢太守安用撫按為特疏薦之太平府志張伯祥字元吉鄞縣人𢎞治中知蕪湖勤䘏民隠有古循吏風邑庠舊無尊經閣為經營創建功成而民不知擾蕪湖縣志趙文奎字璧仲江陵人𢎞治間知繁昌建旌善申明亭修壇壝贍孤寡繁昌縣志趙祐字汝翼雙流人𢎞治中令繁昌重農勸學政肅獄平隣邑訟不得直多求聽斷尋擢御史繁昌縣志底藴字希準廣寧人正德間以給事中出知太平府明爽愷悌建養濟院太平府志林有年字以永莆田人正德初知繁昌㢘而有才以課最擢御史繁昌縣志李永蕃字貽錫永興人正德中知當塗振興士類繕築圩堤均徭除羨決訟如流當塗縣志汪本字惟中浮梁人正德間知蕪湖流冦猖獗客兵四集本悉心籌畫軍需不缺民無所病蕪湖縣志王軾字子敬揭陽人正德十五年知蕪湖甫下車值宸濠反中官擁兵作威福僚屬逃匿軾身當之芻糧委積咄嗟而具蕪湖縣志郭湍莆田人正德中府學教授拔諸生之秀者讀書齋中夜分省其勤惰或煮茗炊粥佐之正德己卯嘉靖壬午乙酉三科貢士皆出其門太平府志林鉞字宏用晉江人嘉靖中守太平興賢造士養老䘏孤嘗築姑溪壩建亭其上由是姑水瀠折不苦衝決太平府志馬森字孔養嘉靖中知府事歲祲出官粟數萬斛以活民善讞獄隣郡有寃抑俱願就決太平府志陳璋字圭仲光州人嘉靖中授太平同知勇敢多才長於應變倭賊蕭顯破上海操撫交薦璋能辦賊命同蘇州同知任環統兵籌畫璋上禦倭二十事從之七月破顯斬首千餘級寇遁太平府志李价番禺人嘉靖中知當塗雅負通才為政專尚寛簡禮賢敬老周䘏無告尤加意庠序士民皆愛服焉當塗縣志王德溢字懋中連江人嘉靖中知蕪湖徭役里甲與江夫事宜裁處悉當蕪湖縣志張永明字衷誠烏程人嘉靖間知蕪湖㢘慎公平時章聖太后梓宫南祔道經江上中貴多所誅求永明委曲劑量供應悉如禮制民賴以安子天德産於蕪署後成進士復為蕪令有惠政邑人顔其堂曰繼美蕪湖縣志陳一道字邦緒晉江人嘉靖間任蕪湖丞倭寇犯江上奉檄南陵防𠞰臨敵衆潰一道獨奮勇殺賊以勢孤遇害家人子義赴援亦死事聞贈一道應天通判子義贈應天經歴立祠縣治東祀之蕪湖縣志錢立字守禮仁和人初授刑部主事海瑞言事繫獄立謹視之得無恙萬厯二年知太平府築蕪湖城剏官圩東石堤四十里遷當塗學宫于城南蘇馬賦太平府志王貽德字師禹全州人萬厯中守太平門無私謁郡齋可羅雀時詔居官㢘介者特賜宴賚貽德名居第一太平府志王繼明字用晦永嘉人萬厯間由當塗令歴知太平府秩滿瀕行餘俸二百金悉散給貧乏抵家無擔石儲所居不蔽風雨太平府志何士林字翹甫富順人萬厯二十九年知太平府歲頻水士林糴穀分賑又刻木為隷閭井不聞追呼復馬政增其價值民免貽累太平府志馬重德字瑞軒遼陽人萬厯中授太平通判以㢘能屢署上考攝篆當塗及𣙜闗蕪湖均有惠政太平府志蔡時鼎漳浦人以御史直言降典史萬厯中遷太平推官讞獄一以仁恕署府篆歲祲請于撫按築堤開糴太平府志李春熙字皥如建寧人萬厯中太平推官不以擊斷為能署篆當塗禁勾攝緩徵徭拓儒學基址築姑溪壩買田為增修費視事裁數月所興革皆切中利弊太平府志章嘉貞字元禮德清人萬厯丙申知當塗歲祲疫死者載道嘉貞賑饑施藥暑雨不輟大水圩岸將崩躬督捍救經月露宿水愈溢泣曰堤潰民其魚矣無民奚以令為躍入巨浸中若有物翼之者衆亟挽以上得不死水漸平堤得無恙當塗縣志鄧光祚字日昌曲江人萬厯間知當塗建天門書院集多士肄業其中當塗縣志朱汝鼇字雨化長興人萬厯間知當塗條畫築圩十五則曲盡其利釐剔里甲積蠧㢘邑大憝寘之法建集賢樓大成坊當塗縣志葉繼美字含章嘉善人萬厯中知蕪湖㢘明剛果下車即遷學金馬門吉址尋擢給事中蕪湖縣志勞永嘉字無施崇德人萬厯三十年知蕪湖不諂事上官送迎幾廢歲時遣吏問民疾苦以時存䘏蕪湖縣志曾袠字資銘東莞人萬厯中知蕪湖縣牒訴喧沓袠目視耳聽手批口答一時并舉了無錯謬百姓畏而愛之蕪湖縣志鄧一儒沔陽州人萬厯中知繁昌待士有禮撫民有恩馭吏有法救荒必實決獄不爽繁昌縣志王柱字克中長沙人萬厯三十八年知繁昌歲頻饑捐俸設粥復勸富家出粟助之諭民增築圩堤躬為督察建横塘河口二壩以資蓄洩繁昌縣志胡爾慥字孟修德清人萬厯間知郡事濬河建闗節費代餉太平府志李若訥字季重臨邑人萬厯末知太平禮士勤民太平府志陳善道字敬甫華亭人萬厯末當塗教諭對諸生藹若家人不受貧士餽遺且推解之性至孝丁母憂哭踊幾殞去之日諸生泣送者二百餘人當塗縣志晏清字元州黄岡人天啓元年知蕪湖㢘介明允尋調呉江百姓請留呉吏來迎至相爭于路不得行再宿然後去蕪湖縣志鄭瑜字崑石東莞人崇禎時知太平府正已率屬一時撫按監司皆加敬禮歲饑發廩不繼捐俸佽之仍諭富室出糶左良玉兵南下瑜嚴加守備增城浚濠屹然無恐太平府志徐養心字無所江陵人崇禎六年知當塗流寇屠和陽難民數千聚江干無舟不得渡賊且近呼號將赴水養心望見曰隣民猶吾民亟命船盡渡之姑孰無備衆心危殆養心令沿江徹夜張炬礟聲不絶賊懼乃退尋擢御史當塗縣志梁應材號瑶石陽春人崇禎時知蕪湖毎晨出視事必焚香告天誓與百姓興利除害訟獄無擾徵斂不苛學舍久圮經營修建蕪湖縣志張繼曾字省之清江人崇禎十年知繁昌先是邑令羅明祖嘗議築城中止繼曾次第經營身先督察功成而民不擾繁昌縣志井焜字虞章霸州人崇禎十二年知蕪湖毎春親歴村社勸課農桑時江北流寇猖獗焜修城堡為防衛計躬自措辦不取諸民民恃以無恐蕪湖縣志國朝張京澤州人順治二年知當塗縣清操節儉飯脱粟服御無華飾為政簡易折獄明敏自輯讞語為琴餘録徵收田糧正額外不留耗羨民咸德之陞工科給事中林中瑜字玉崑遼陽人順治三年協鎮太平奉檄𠞰撫麻姑港口所至有功郡東土寇竊發中瑜統兵搗其巢穴馬陷深塹殁於陣范為憲字眉生内江人順治三年知繁昌縣土寇千餘人薄城下憲率衆登陴面中流矢不少動指麾勇士從城南隅出力戰殺賊賊驚遁事平士民有為仇家所陷以賊案株連者憲力為申雪悉荷全宥劉震龍字駕甫莆田人順治間舉人令繁昌敝衣蔬食一介不取里役陋規革除殆盡凡讞獄片言決遣蠧猾斂跡㑹部使者清丈江洲震龍躬冒霜雪奔走蘆葦中絶不假手胥吏以故繁邑獨無增課之累以疾卒官士民醵金為賻始得歸葬以上舊通志張邦寄字震軒遼東人由浙東監司左遷蕪湖令㢘介平允自奉粗糲五年如一日畢髙選字萬青萊州人順治十三年授蕪湖丞勤于吏治毎邑有大事輒毅然自任不辭勞瘁斷決疑獄摘發如神嘗修葺學宫兩廡集邑弟子肄業其中出俸錢以廩給之廬州府漢王景字仲通建初八年為廬江太守先是民不知牛耕地力有餘食常不足景驅率吏民教用犂耕又訓令蠶織為作法制皆著于鄉亭後漢書循吏傳應融字義髙汝南人守廬江八年有惠政拜司𨽻校尉漢紀范式字巨卿金鄉人順帝時為廬江守有威名後漢書獨行傳羊續字興祖太山平陽人桓帝時廬江太守㑹黄巾賊攻舒焚燒城郭續發男子二十以上皆持兵勒陳其小弱者使負水灌火力戰大破之安豐賊戴風等作亂續復擊破斬首三千餘級生獲渠帥其餘黨貸與佃器使歸農業後漢書本傳盧植字子榦涿郡人靈帝時拜廬江太守深達政宜務存清靜𢎞大體後漢書本傳陶謙字恭祖丹陽人少舉孝㢘除舒令郡守不樂而謙在官清無可糾劾呉書陸康呉人靈帝時廬江太守申明賞罰擊破賊黄穰等後漢書本傳南北朝陳荀朗字深明潁隂人侯景之亂朗起兵據巢湖簡文帝宻詔授朗豫州刺史使討景朗率兵自巢湖出濡須邀破景軍陳書本傳唐朱敬則字少連亳州人武德中為廬州刺史代還無淮南一物所乗止一馬一子步從而歸唐書本傳賈深長樂人乾元中廬州刺史李華稱其有文武才畧推心馭下治有嘉績舊史路應求字從衆平陽人代宗時刺廬州州城故土為之應求始易以甓莅政精敏吏不敢欺民風為之一變舊史羅珦㑹稽人德宗時刺廬州民間病者捨醫藥禱淫祠下令止之修學宫政教簡易有芝草白爵之祥以治最賜金紫唐書循吏傳李翺字習之憲宗時刺廬州㑹歲旱疫亡籍口四萬權豪賤市田屋而窶戸仍輸賦翺下教使以田占租收豪室税萬二千緡貧弱以安唐書本傳鄭綮字藴武僖宗時刺廬州黄巢掠淮南綮移檄請毋犯州境巢笑為斂兵歲滿去贏錢千緡藏州庫後他盜至終不敢犯鄭使君錢唐書本傳宋謝惟士陳留人建隆初以大理評事知廬江時江淮新定繕修縣治撫綏士民境内以安南畿志陳堯佐字希元閬州人真宗朝再知廬州堯佐十典大州以方嚴束下使人知畏而重犯法至其過失多保佑之歐陽修陳公神道碑銘劉筠字子儀大名人再知廬州筠臨事明達治尚簡嚴宋史本傳劉綜字居正虞鄉人真宗時知廬州强敏有吏才所至挫抑豪右振興法度時論美之南畿志陳希亮字公弼青神人仁宗朝知廬州時有虎翼軍士屯壽春者以謀不軌伏誅其黨數百人遷於廬各懐疑懼竊入府舍將為不利希亮流其渠魁以其餘給左右使令且守倉庫衆皆感激指心自誓迄不敢貳南畿志張田字公載澶淵人嘉祐末知廬州治有善迹嘗作欽賢堂繪漢唐以來清能刺史晨夕拜之宋史本傳楚建中字正叔洛陽人仁宗朝以天章閣待制出知無為軍㢘靜不擾去後歴三甲子民更立祠祀之南畿志孫覺字莘老髙郵人神宗時為合肥主簿歲旱郡守檄民捕蝗輸官覺曰民方艱食若以米易之必盡力是為除害而享利也守悦推其法于他縣民賴之後為廬州守以明恕著聲宋史本傳朱服字行中烏程人哲宗時知廬州值歲饑便宜賑䕶全活十餘萬口逾年大疫又課醫持善藥分拯之賴以安者甚衆宋史本傳王蘧紹聖初知無為軍健於吏才興三圩開十二井又築北領以捍水患世䝉其利南畿志李公麟字伯時舒州人元符中為無為州司尸叅軍政尚通敏聽事判決筆無停思剏製漏箭銅壺工巧獨絶宋史文苑傳陳瓘字了翁南劍沙縣人大觀中以右司諫劾蔡京謫知無為軍為政㢘平南畿志米芾政和間知無為軍善察民寃行法不畏强禦時飛蝗入境不傷禾稼人咸異之宋史文苑傳呉懋字禹功陽羨人徽宗時令廬江時劇盜劉五掠州縣去廬江纔一驛懋之官行至中塗或止之懋笑曰男兒當斬賊平亂鼠輩何為者今行縛之賊聞其來不敢入境南畿志胡伸字彦時婺源人以司業知無為軍㑹巢縣黠民訴其令斂錢數百千櫝藏列肆中伸察其妄遂按訴者罪伸政尚慈恕而利病灼然去之日士民繪像祀之南畿志趙善俊字俊臣太宗七世孫紹興末知廬州㑹歲旱江浙饑民踵至善俊分給官田貸牛種僦屋以居至者如歸又以焦湖湮涸饋運不通乃募鄉兵保孤姥二山治屋儲粟以備敵增學舍修包拯祠人感其化宋史宗室傳丁仁湖廣人寧宗時知無為軍嘗築堰蓄水以資灌溉民呼為丁公堰南畿志江潤身字崇德婺源人咸淳初為合肥主簿清㢘剛決讞獄尤矜恕多所平反南畿志元塔海廬州路總管時飛蝗北來民患之海禱于天蝗乃引去亦有墜水死者民乏食開廩減直俾民糴之所活甚衆元史本傳實喇布哈䝉古人泰定間任舒城縣達嚕噶齊歲旱民饑富家閉糴衆將肆焚掠溥化奬勵好義之民令出錢糴穀驗口賙給四境以安舒城縣志王碩河南人延祐初授無為州同知㢘潔有幹材不畏彊禦嘗檄清理學田搜抉隠漏凡得田一百一十九頃又追積負糧米三百石自是廩有餘粟士得餼養無為州志明唐元字元亨臨淮人明初知無為州招徠流散安集有方以課最擢太僕寺卿無為州志蘇敏昌平人洪武初授廬州推官刑政不苛擢知府莅任八載甚得民心卒於官民流涕南畿志董曾知無為州陳友諒執曾欲降之不屈縛而沈諸江世傳泥汊口即曾遇害處無為州志伍塾字貢均廬陵人洪武中知廬江開設縣治招撫流移嘗手書孝經論語教民誦讀廬江縣志樂瓚潞州人洪武十年知無為州剛毅信直吏民畏服南畿志鄒以信廬陵人永樂五年知無為州政尚德教州人感化以博學能文稱文章太守南畿志王仕錫南城人永樂二十二年知無為州興學勸農修廢舉墜任滿民留之復任九年南畿志揭稽字孟哲廣昌人宣德十年以御史出知廬州興革悉中矩度先是永樂中遷齊藩于廬王素驕衛士强攫民物頗為郡害稽力奏移之廬州府志劉顯豐城人宣德十年知舒城縣課農桑興學校增開水利與漢劉馥俱祀羮頡侯廟舒城縣志杜彪魏縣人知無為州初下車故不事事案牘紛積吏胥以為可欺已而情弊灼然迺振紀綱均賦役鋤强扶弱民大悦服無為州志程文確山人成化中知舒城縣通練吏治興學校修水利歲災為民懇免歲辦繇賦尋擢御史舒城縣志馬金字汝礪西充人初授廬州通判再遷知府歴任久盡去宿蠧建余忠宣公祠創景賢書院修郡庠尊經閣購書藏之廬州府志呉英裕州人成化間知巢縣理繁劇井然有條奸胥無所措手巢縣志楊璲字廷佩原武人正徳中知廬州府時劉瑾專政境内有巨惡張杲璫張龍兄也璲發其奸撲殺之庫吏循故事以羨餘獻璲曰盜官錢者法當遣速令歸之庫廬州府志聶曼字子貞金谿人廬州教授邃於易終日端坐無惰容僚友喪𦵏多所佽助諸生窮甚者月給以米廬州府志孫聰字克明北直人正德中知合肥寇亂之後招撫流移悉心安集合肥縣志齊恩隆德人無為州同知善騎射流寇犯圌山檄恩往禦以衆寡不敵死之贈光禄寺丞無為州志龍誥字孔錫攸縣人正德中知廬州府嘉靖癸未大旱開廩設粥平糶營建惠民倉鎮淮樓藉力役以給食所活數萬道死者設義塚瘞之廬州府志呉嶽字汝喬汶上人嘉靖中知廬州設旌善癉惡二亭分列民之賢不肖朔望進諸生講經義歲大疫擇醫市藥設局以療之税課千金例輸府悉白上臺貯公帑西山産薪惟供官爨弛其禁與民共之廬州府志胡奎字應文新淦人嘉靖庚寅授廬州推官議刑無失入詿誤者多為辨脱廬州府志張瀚字子文仁和人嘉靖間守廬州州西闗故有濠源出李陵雞鳴諸山雨潦則病涉瀚跨流為橋民賴以濟歲祲發粟嚴禁糴販數讞大獄多所平反廬州府志屠仲律字宗豫嘉興人嘉靖庚申以南御史出知廬州諳于吏治而愛民尤切歲歉罄囊代輸秋税不復徵補㑹疾作百姓祈禱四出願以身代竟卒于官廬州府志王家賔嘉靖間知廬州府䘏荒興學皆極誠懇以拂權貴去官廬州府志潘恕字行甫海陽人嘉靖間知合肥吏民一見輒不忘置學田數百畝歲收以給寒畯合肥縣志陳其樂貴溪人嘉靖中知合肥雖居官家人不廢紡績其同邑夏言當路未嘗一通書問合肥縣志陳懋觀福建人隆慶初知廬州遇士以禮嘗曰毎見諸生暴堦下心即不安斷獄不輕入罪情法相麗者猶矜慎再三廬州府志何寵臨海人由進士知無為州不事苛察而法所當施絶無寛假倭入寇江上羽書日至寵修築城池申嚴烽燧一方賴焉無為州志王俸字㢘父秀水人萬厯中知廬州剔蠧息民歲大旱手執槁禾流涕禱壇壝且拜且行赤日當午雷雨忽大作廬州府志江沛然黄岡人以給事中謫官經歴署廬江事積弊之後力為振刷㢘渠奸寘之法一境肅清廬江縣志陳應龍號起田侯官人萬厯十五年知無為州濵江一帶為圩三百六十有竒盛夏江流内灌膏腴盡没應龍親歴汙萊相度累月申請照糧派夫築堤五千二百七十餘丈民名之曰陳公壩無為州志何邦漸浪穹人萬厯中知無為州州歲徵漕米八千九百有奇約以十之四運黄雒河交兑北上餘由長江行千三百里解鳳陽江濤覆溺及虧耗需索甚為民害邦漸請留鳳陽臨淮二縣米充鳳餉而本州併于黄雒河交兑彼此稱便無為州志胡震亨字孝轅海鹽人萬厯中除合肥令英察若神民扞網者輒指數姓名蠧吏毫毛不敢有所犯邑有世家裔犯竊震亨則資以錢諭令自新其人感媿卒改行合肥縣志洪邦光福建人知無為州州除養馬免糧田外一切歲辦不均邦光酌議申請分秋糧夏麥絲絹糖油四則以税糧馬價照畝均攤至今垂為定例無為州志呉大朴固始人崇禎時知廬州府乙亥春流寇薄城大朴守東門發礟斃其魁縱火燒城外民居之為賊窟者又起礟樓臨濠東石牐賊不敢逼廬州府志熊文舉字公逺新建人崇禎時知合肥㢘平流賊薄城文舉分守西偏築威逺亭其上指畫有方合肥縣志嚴覺字知非歸安人崇禎時知巢縣乙亥春流寇陷城被執不屈舉家遇害巢縣志趙興基字鶴天雲南人通判廬州崇禎壬午張獻忠薄城下興基分守水西門防禦甚力五月城陷仗劍下戍樓手刃數賊被創而死經歴鄭元綬浙江人分守南薰門亦死之廬州府志國朝趙允光大興人順治初知廬州府時兵燹之後流亡未復允光招徠撫字輕徭均賦民獲其利無為巢縣間有頑民聚黨為患允光捕之悉獲其魁繩以法張鵾翔字鵬舉陜西人順治丁亥進士知合肥縣為政和平嚴不過刻寛不過縱時皆以循吏稱之舊通志呉允昇字賔廷奉天人順治九年知廬州府寡慾省刑民被其惠時歲連旱允昇設法賑濟全活者衆學宫圮壊捐貲繕葺士民立祠祀之舊通志王業興字鳴石奉天人順治中知廬州府值海氛逼境業興親率家丁及營卒登陴捍禦屢挫賊鋒州得無事治郡十三年勸課農桑減省刑獄民咸德之又出俸錢建斗文書院聚諸生肄習其中後遷荆南巡道佟國貞奉天人順治中知無為州瀕江田廬恃圩壩為捍蔽十六年三壩將圮國貞相度形勢自鮑家橋至周思溝預築堤四千丈有奇名曰四壩後三壩傾而田廬卒無恙王宗聖奉天人順治中知舒城縣年二十餘詳慎如老吏斷訟莅事吏不能欺兵燹後安輯流亡威德並著張可捷大同人順治中知舒城縣為人悃愊無華不炫才不沽名安靜寛和始終如一蔬食布袍順民好惡一時稱良吏焉祁文友廣東人順治十八年知廬江縣清丈量均里甲平賦役勸農桑薛之佐字鶴齊蒼溪人知廬州府精明强幹剔弊釐奸豪强不逞之徒皆潛徙境外士民頌之聶源字天水宣府人知廬州府為政寛簡愛民禮士值大兵至郡軍需旁午源殫心籌畫閭閻得以不擾未幾引年乞休士民皆泣送之顔堯揆永春人康熙六年知無為州時前令佟國貞所築新壩漸為江濤所齧揆自李家祠至王家渡築壩八百八十丈濶三丈髙一丈九尺次年大水田廬恃以無恙并和州含巢二縣皆賴焉州民勒石於壩上名之曰顔公壩何朝聘奉天人康熙初知舒城縣明敏有才畧正賦不缺於供而民無催科之擾招民墾田給以牛種治舒七載獄訟衰息董守義奉天人康熙中知舒城縣有幹濟才逆藩之亂舒為衝邑大兵往來驛絡舟車芻糗應時而辦閭閻無擾邑人戴之李衍芳字徵逺雲南人康熙二十三年知廬江邑南有二湖環湖皆圩田惟缺口一河通江洩水豪民毎截河作壩障上流以資灌溉澇則以隣為壑又編竹横於河以收漁利民病之衍芳特申請除去鳳陽府漢宋均字叔庠安衆人建武中遷九江太守郡多虎患均到退奸貪進忠善虎東渡中元元年山陽楚沛多蝗飛至九江境輒東西散去後漢書本傳時苗鉅鹿人建安中為壽春令始之官用黄牸牛駕車歲餘生一犢及去謂主簿曰令來時本無此犢是淮南所生也留之而去後漢紀晉劉頌字子雅廣陵人武帝時為淮南王相在官嚴整甚有政績舊修芍陂歲用數萬人豪强兼并孤貧失業頌使計工受直百姓歌其平惠晉書本傳互見揚州府人物南北朝宋垣䕶之字彦宗桓道人元嘉中為鍾離太守王𤣥謨攻滑臺䕶之百舸為前鋒虜牽𤣥謨水軍大艚連以鐵鎖三重絶䕶之路䕶之中流而下以長柯斧斷鎖惟失一舸餘舸並全宋書本傳齊沈文季字伯達武康人官尚書右僕射魏軍南侵明帝遣文季鎮壽春文季入城嚴加守備魏軍遁百姓無所損齊書本傳梁曹景宗字子震新野人梁天監五年魏拓跋英攻鍾離詔景宗往援擊破之梁書本傳隋趙軌洛陽人為壽州總管長史芍陂舊有五門堰蕪穢不治軌更開三十六門灌田五十餘頃隋書循吏傳元孝矩洛陽人拜壽州總管髙祖賜璽書曰楊越氛祲侵軼邊鄙爭桑興役不識大猷以公志存逺略故令鎮邊服懐柔以禮稱朕意焉隋書本傳唐員半千字榮期齊州人為濠州刺史不專任吏所至禮化大行唐書本傳張鎰字季權河南人大厯中刺濠州政條清簡延經術之士講教生徒比去州升明經者四十人李靈耀反鎰團鄉兵嚴守禦唐書本傳張萬福元城人㓜從征有功賜名正德宗時李正已反屯兵埇橋江淮漕船不敢踰渦口乃以萬福刺濠州帝曰先帝改爾名者所以褒也朕謂江淮草木亦知爾威名若從所改恐賊不曉是卿復賜舊名萬福馳至渦口駐馬於岸悉發漕船賊兵倚岸熟視不敢動唐書本傳李遜字友道為濠州刺史時觀察使多額外浮斂遜一不應唐書本傳侯固大中間濠州刺史奏乞增植桑無加税有石刻在定逺縣門舊史五代李延鄒鄱陽人濠州録事叅軍郭廷謂降周時命草降表延鄒責以忠義廷謂以兵脅之延鄒投筆曰大丈夫終不負國為叛臣作降表遂遇害南唐書郭廷謂傳宋王郁臨江人為濠州判官臨没謂家人曰吾歴官五十餘年慎于用刑活人多矣後其有興者乎宋史王欽若傳張式字景則建安人天禧時知濠州州人縊其妻而以自殺告獄既具式詰之立伏人以為神終身不營田宅得禄即以置書曰子孫業此足矣南畿志魏琰字子浩知壽州盜殺寺童子有司執僧笞服琰㢘知其寃脱械縱之一府爭以為不可後數日得真盜宋史本傳呉奎字長文濰州人至和二年知壽州專以仁恕及民事至立斷吏民久而思之宋史本傳張昇字杲卿韓城人嘗守濠州昇忠信清儉不受私謁分俸禄以贍九族宋史本傳陳堯佐字希元閬州人知壽州歲大饑堯佐自出米為糜以食饑者於是吏民皆爭出米所全活者數萬人宋史本傳曾致堯字正臣南豐人知壽州州近京師諸豪大商結權貴號為難治致堯居歲餘斂手不敢犯人亦莫見其以何術而然也既去壽人遮留以一騎二卒逃去過他州猶有追之者歐陽修曾公神道碑銘盛修已通判宿州建炎三年盜入宿修已被執不屈為所害南畿志康允之建炎中知壽春府渠賊丁進聚衆萬餘人攻城允之率軍民固守賊解圍去奏至髙宗謂輔臣曰此郡守得人之效也南畿志徐瑞益金華人為虹縣尉張邦昌偽詔至縣令以下迎拜宣讀如常儀獨瑞益不赴向子諲言於朝為易文資南畿志邵青紹興中為兵馬鈐轄濠州陷青巷戰死之南畿志連南夫應山人髙宗時守濠州舊有東西二城濠水經其間入淮南夫決濠水由城西徑達於淮合二城為一南畿志楊照濠州將官金圍城急照躍上角樓刺賊俄中流矢卒有統領丁元者呼其徒毋負國一舟二百人皆鬭死宋史忠義孫暉傳王阮字南卿江州人紹熙中知濠州請復曹瑋方田修种世衡射法日講守備與邊民訪北境事終阮在濠無南侵患宋史本傳王霆字定叟東陽人理宗朝知濠州節浮費糴粟買馬以備不虞尋差知安豐軍臣寮上言王霆在濠人甚安之不宜輕易詔再守濠職事修舉宋史本傳李庭之淳祐中為兩淮制置司叅議官議栅清河五口增淮南烽火一百二十及知濠州復城荆山以備淮南凡所籌措皆切中機宜宋史本傳趙士嶐字景瞻淮南西路兵馬鈐轄駐壽春劇賊丁一箭衆號十萬攻城三旬不退士嶐募軍中敢死士與之謀選壯士數百出賊不意擊走之宋史本傳元王庭玉字國寳清苑人至元十五年授招信路總管府達嚕噶齊崇教化勸農桑勵風俗境内稱治南畿志李良祐為靈璧縣尹縣經兵燹城郭為墟至元二十四年復立縣良祐相度形勢内廨外市皆所經始靈璧縣志安汝明寧晉人延祐中宰定逺興利除害三年土田闢戸口增盜息賦均民無勞役定逺縣志嚴忠信東昌人知濠州政尚嚴明大興學校南畿志谷杲字明之至治二年為安豐路總管有能聲南畿志哈喇字元素賜姓金至順間為鍾離縣達嚕噶齊平反寃獄政為諸邑最南畿志呉昇字起東黄巖人至正間尹虹縣性㢘潔才具亦優士民稱之虹縣志張謙字文益髙唐人至正六年安豐路總管歲饑賑䘏有方多所全活南畿志明蔣子杰奉化人洪武初任知府寛嚴相濟惠政甚多南畿志樂徽洪武初知虹縣政教修舉百廢皆所興造虹縣志樂瓚陽城人洪武初知臨淮縣㢘幹賦均役平臨淮縣志鄭真鄞縣人洪武中教諭臨淮多方造士㑹晉王之國道經臨淮召講春秋真開陳大義王甚喜南畿志楊浩江陵人永樂中知府事律已無私御下有道鳳陽府志楊鏞永樂中知懐逺縣㢘謹愛民遷知沂州百姓攀留懐逺縣志閻斌乾州人宣德四年授臨淮縣丞盡心撫字吏民愛服將代相率詣上臺乞留在官二十三年終始一節臨淮縣志何誠字則明莆田人正統元年知虹縣清慎慈惠士民愛戴秩滿父老三百餘人詣闕請留㑹以疾卒百姓行號坐哭如喪考妣虹縣志楊瓚正統間知鳳陽府持身㢘介莅政公勤入覲上賜襲衣褒勞鳳陽府志白玉後軍都督府同知成化元年守禦鳳陽修復芍陂興水利至今賴之廣輿記章鋭字元進鄞縣人成化二十一年知府事持已公勤讞獄精審修學宫刻中都志綱舉目張得為政大體鳳陽府志劉槩濟寧人成化間知壽州發姦摘伏豪黠屏跡禁師巫斥淫祀招延名儒振興黌序尤講禦荒之策量道里逺近分設預備倉又建石橋置義塜古良牧無以過焉壽州志曾大有字世亨麻城人𢎞治中知定逺縣凡黌舍官廨城郭坊市悉為增拓修治撲滅妖賊孔布等一境晏然定逺縣志呉九功雲南後衛人正德元年知臨淮縣莅政清平存心慈愛行取赴闕士民追送留鞭懸于縣門之左臨淮縣志楊麓字孔瞻德州人正德二年知定逺縣創建磚城民賴保障定逺縣志陳伯安黄陂人正德六年以御史謫知靈璧縣時流寇楊虎擁衆來攻伯安被執不屈賊義而釋之歸益圖守禦之計增髙城若干尺鑿河廣八里以環其外全邑藉屏障焉靈璧縣志蔣賢隴州人正德六年授靈璧主簿楊虎入寇賢與指揮錢英率民兵扞禦被執大罵不屈皆遇害南畿志趙楷嘉靖間知鳳陽縣身服布袍出入跨一羸馬從役二三人不畏强禦豪猾望風斂迹三日一至學宫拔弟子之秀者廩給之多所成就鳳陽縣志劉熇字德輝完縣人嘉靖四年知定逺縣時大饑疫邑里蕭然熇拊循三年逃者以集居者以饒定逺縣志劉天民字希尹歴城人嘉靖四年知壽州崇奬節孝懲刈頑梗立鄉社以厚風俗北門石橋久圮增修二百餘丈積穀三萬石備荒壽州志林大槐莆田人嘉靖四十五年知懐逺縣持身清約日食止一蔬修復陂塘積貯倉粟卒于官無以為殮士民悼之懐逺縣志張淵江西人隆慶五年知鳳陽縣毎節省歲支公費及兊運餘米以代百姓之不能輸者加意恤民而嚴于馭吏以蜚語劾去吏有進藏中鏹為道里費者笑曰吾肯以官休易操耶斥不受鳳陽縣志陳永直蒲州人萬厯中授捕盜通判執法甚嚴初至獲劇盜折其脛沈淮水中四境肅然鳳陽府志王存敬號明洲確山人萬厯三十年知懐逺縣凶荒頻仍亟圖休養墾荒賑饑仁聲騰于逺邇懐逺縣志黄克纘晉江人萬厯中知壽州愛民禮士而不避權要常語寮佐曰受職自有定分名節千古不磨申請編派等則名曰一條編至今賴之壽州志賈應龍安陽人萬厯三十一年知臨淮縣縣自國初為鳳陽府治後府移鳳陽而縣仍名為附郭凡公事皆與鳳陽一例協辦民吏重困應龍始申請免之又調兩驛夫馬皆得均平臨淮縣志陳泰交莆田人萬厯四十四年尹靈璧首革催頭包攬之弊除河夫馬戸外幫與里甲各色科擾流亡復業者數千家靈璧縣志張中藴永嘉人萬厯四十八年知懐逺縣性亢直居官不攜眷屬一綈袍數年不易歴知鳳陽府鳳陽府志范紹裘字次濂㑹稽人天啓丙寅任糧馬通判署司李事攝鳳陽臨淮篆所至以㢘能稱時鎮守太監劉鎮建魏璫生祠於臨淮紹裘絶不為屈世尤服其勁節鳳陽府志朱國相榆林人署正留守事乙亥流賊張獻忠由壽春攻鳳陽國相率營兵接戰于上窰山生擒賊騎二人射死甚衆頃之賊萬騎俱至矢如蝟集遂自刎死時留守中衛指揮陳𢎞道亦力戰死之鳳陽府志張國翰鳳陽衛指揮崇禎八年流賊攻城督衆力戰退之十七年劉良佐叛兵攻城又募敢死士縋城出戰城以得全鳳陽府志顔容暄漳州人復聖裔知鳳陽府流賊犯境遣兵同朱國相接戰及聞敗暄冠帶坐堂上罵賊不屈賊殺之火其屍于堂階石上血漬成形宛如其像郡人立塜建祠祀焉鳳陽府志莊祖誼成都人崇禎十五年知懐逺縣甫下車即設計擒崔乾兩劇賊以卓異聞懐逺縣志李彬呈貢人崇禎十五年知定逺縣當流寇蹂躙之後總鎮黄得功移鎮定逺彬為修城練兵廣儲積造火器招撫流移協力䕶持民甚賴之定逺縣志國朝史記功滿洲人順治初年知鳳陽府瘡痍之後以撫綏為事輕徭省役勸課耕桑民皆樂業舊通志張純熙真定人順治間進士授鳳陽推官嚴明有守猾吏不敢營私權要請屬槩拒不應以持正稱舊通志張啓泰長山人順治初知鳳陽縣當兵革之後撫育黎元奬拔士類人咸徳之舊通志潘登貴字天章嘉定州人順治二年知懐逺縣時兵戈甫定民氣未復登貴寛和鎮靜一以噢咻為治境内安焉舊通志張爾翮富平人順治二年知虹縣繕城池嚴守備賦税勸諭輸納徵比不苛預備糧糗以給往來士馬民不知擾王棐字再旦長山人順治三年知壽州州頻經寇亂廬舍蕭條棐一意休養釐剔弊蠧翦除强暴為民捍患禦災又加意造士禮髙年使諭民為善居數月政化大行王業北平人順治四年知壽州下車㢘胥蠧為民害者立除之一境稱快六年洪水驟至城門不得闔業挺身躍入甕城水中一手持重賞一手持刀云用命閉門者即給賞不用命者誅一時併力閉門億萬人得免沈溺李大升字木生猗氏人順治十年守壽州莅政精敏境内水利久湮為重修芍陂塘躬督畚鍤田疇資以灌溉清里甲革耗羨誅鉏姦蠧捐貲修學建東西齋舍集諸生奬誨之一科獲雋者十有三人為州中盛事聶士貞字元次監利人康熈七年知定逺縣先是邑苦逋賦或株繫無辜士貞盡行省釋令以限完納逋戸感德輸賦倍早期年流民盡歸田畝墾闢因崇學校奬節義優耆老恤㷀獨事簡民安鞭笞不用以憂去官士民號泣遮留三日方出境江南通志卷一百十七
