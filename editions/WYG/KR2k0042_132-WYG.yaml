body:
  text: 江南通志卷一百三十三選舉志舉人九康熙三十八年己卯科共九十三人方苞桐城人史普溧陽人周畿宜興人馬尹常熟人韓孝嗣長洲人秦學洙蘇州人周翥太倉人王鐄鹽城人林鏡婁縣人陳錫爵青浦人甯世藻潁州人何如梓鎮江人汪國儀和州人張鍾岳宜興人曾倬常熟人張綏華亭人王履仁江都人王懋訥寳應人夏瑜當塗人沈從隆長洲人錢名世武進人許穀常熟人周恒溧陽人趙啓賢太湖人杜定京蘇州人周振緒華亭人顔敏鹽城人鄧輝上元人汪份長洲人顧陞無錫人須洲武進人鄒增山陽人陶正芳揚州人潘旂宜興人張翥江都人劉肇鍈揚州人張邰鳯陽人姚孔釴安慶人張秉亮上元人王時中上元人吳兆選桐城人單雲瑞常熟人張鳴臯丹徒人王圖炳華亭人崔德峻太平人髙建才金壇人嚴德垕蘇州人李滋霖懷逺人汪琳常熟人陳程鵬華亭人游杏苑夀州人黄秉銓溧陽人周㫤桐城人俞庭棟蘇州人朱周士崑山人金彝休寧人蔣錫震宜興人孔毓璣江隂人郁士超宜興人秦源寛無錫人蘇鍾嵋石埭人謝陞南陵人諸晉青浦人陳人文溧陽人徐永宣武進人范光晨江隂人吳瞻淇歙縣人楊飛熊宜興人蔣麟婁縣人蔡御乾蘇州人蔡一楷休寧人程彦武進人劉京鎬靖江人盧階升長洲人秦樹績常州人何光逺桐城人錢濬太倉人沈元煉溧陽人張學庠蘇州人邱聞衣山陽人倪文輝崇明人程歙縣人戈輯常州人李生渤廬江人吳延炯江寧府人孔幼儀高淳人江源如臯人周永祺常州人施宏任無錫人賈珩高郵人李舒春宜興人岑鳯池建平人徐斌上元人北榜王守烈常熟人魏嘉謀繁昌人狄字溧陽人劉師恕寳應人賀洪道丹陽人史貽直溧陽人蔣廷錫常熟人嚴密長洲人顧嗣立長洲人張三第長洲人趙熊詔武進人胡承謀涇縣人廖賡融婁縣人莊擢武進人費士龍溧陽人張翮上海人韓孝基長洲人劉墀武進人唐執玉武進人賀秉源丹陽人康熙四十一年壬午科共八十三人吳楚竒鳯陽人袁天衢靖江人李茂才婺源人馮暠蘇州人陳起春溧陽人王式丹寳應人張維煦華亭人金碩佺休寧人胡伯炯績溪人劉植敬崑山人吳樞太倉人張有石含山人王麟和州人喬儆揚州人徐駿蘇州人劉嘉本江隂人張公望含山人柯天健南陵人喬兆棟寳應人黄運開崇明人周金簡常州人李射斗無錫人彭隅溧陽人金森吳縣人吳之琯常熟人張梁婁縣人沈儼鹽城人朱國蘭休寧人繆詵常州人王爵江都人嚴容句容人蔡學洙江寧人張自超高淳人曹士竒懷寧人過崧孫和州人陳洯石埭人朱基慶靖江人劉應褒鳯陽人王霖上元人馬益常熟人許攀桂宜興人王應珮望江人褚愈長洲人周憲淮安人楚重光當塗人鄭禄天無錫人王粤冮寧人陳蔚懷寧人曹思義無錫人潘宷鼎溧陽人錢澂太倉人荆雲駿丹陽人朱琬無錫人楊淮泰州人陶立忠鹽城人包爾純上海人楊企震武進人程璲池州人周天成上元人陸應龍溧陽人張覲光嘉定人朱纘揚州人范仁沛江寧府人黄師瓊蘇州人楊潭蕪湖人林殿楨江浦人成申寳應人許進桐城人汪以忠廬江人張睿思長洲人劉方泓靖江人徐嘉璟宜興人劉朝講高淳人吳作舟潁州人賈邦楨高郵人郭芑傳長洲人章玉樹江隂人汪鈞長洲人黄振鷺溧陽人陳永謨天長人陳元度江都人張聖教崇明人趙炳文吳江人北榜時圮授嘉定人劉洽武進人雲中官廣德州人曹志宏歙縣人朱廷宁靖江人蔡嵩上海人卞咸和江都人施燾無錫人朱書宿松人吳早全椒人張澤婺婁縣人王文師儀徴人嵇曾筠無錫人龔銓安武進人錢榮世武進人王允文長洲人李棟興化人程永禮常熟人湯大輅江隂人王德修長洲人李無逸句容人朱鋐長洲人王嘉猷武進人本姓蔣何焯長洲人康熙四十四年乙酉科共九十六人趙音無錫人俞景炤蘇州人孫宗緒興化人錢倬吳江人汪沺民六合人孫達和吳江人華謙金山衛人徐陶璋崑山人金時芳江都人周楨句容人張儲穀寳應人李炳旦興化人吳資生蘇州人宣魯安慶人陸方濤吳江人蔣進髙郵人李長庚武進人盧香如臯人陸榮源松江人余光耿婺源人李蒸興化人吳士玉吳縣人方一韓夀州人繆曰藻吳縣人杭蕃泰州人沈作霖吳江人陳厚耀泰州人陶元運通州人張觀瀾江隂人吳崧歙縣人蔣漣常熟人何其偉武進人朱金山靖江人徐天瑞吳江人王澍金壇人王圖烺華亭人金殿詔江都人劉炳鹽城人孫秉均徽州人劉秉鉉無錫人後天祜寧國人陳垿蘇州人吳紹方桐城人蔣學海長洲人王作賔合肥人劉金章靖江人王奕鴻太倉人吳驄安慶人汪越寧國人方景詡崑山人李玉鋐揚州府學通州人路衡常州人張鉞山陽人潘建功山陽人李仁齡建德人徐作廕興化人鞠孫樓婁縣人盧廣潁州人翟一枝涇縣人郁芬松江人夏申書揚州人陸賜書長洲人陸允斌崇明人潘寧引溧陽人程塏安東人張越太倉人洪澤歙縣人汪守鑾徽州人盧翀黟縣人戴兆佳建平人楊曦當塗人汪璷休寧人程鏊安東人何隆遇桐城人張鵬興化人鄒奕鳯長洲人阮體元宣城人程有則蘇州人叢方菡如臯人洪瀛繁昌人孫基鳯陽人蔣泂常熟人秦芝田無錫人胡崑貴池人張希聖旌德人張景崧吳縣人張霽祁門人張球六安人徐學海吳縣人桂翔石埭人胡壂建德人王希曾崇明人劉志垣潁州人涂學詩江寧人茆振旂宣城人劉方沛靖江人北榜楊祖楫武進人楊錫恒華亭人孫順吳江人徐振青浦人秦道然無錫人俞儀長洲人沈廷藻溧陽人黄越上元人王圖熹婁縣人齊方起桐城人張鵬翮武進人吳翊太倉人沈天寳吳江人李暘婁縣人張機丹徒人李嗣發吳縣人蔣芳洲武進人莊楷武進人張起麟華亭人繆沅泰州人陳王謨吳江人吳文淵金壇人張鏞無錫人王玉璿上元