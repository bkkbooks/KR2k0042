body:
  text: 江南通志卷四十一輿地志壇廟五祠墓附安徽寜池太五府安慶府社稷壇在正觀門外嶺上風雲雷雨山川壇在府城東勅建先農壇在府城外東五里遵置祠宇耤田歳以仲春亥日行耕耤禮郡厲壇在府北郊縣曰邑厲里社鄉厲二壇在各鄉保關帝廟在府治北國朝雍正五年奉㫖追封三代公爵春秋仝日祭於後殿城隍廟在府城盛唐門内縣城隍廟在山口鎮勅建八蜡神廟劉猛將軍廟並在樅陽門外里許以上壇廟所屬縣俱如制旗纛廟在各衛所龍王廟在府治康濟門東嶽廟在府治樅陽門外棠梨廟在太湖縣西祀唐張巡文孝廟在太湖縣治東北祀梁昭明太子北神廟在太湖縣南六十里祀楚三閭大夫狄梁公廟在太湖縣北三十里又廟北二里有墓狄公曾貶彭澤令邑人為置生祠此地與彭澤近固應有廟墓五穀廟在宿松縣西北三十里河西廟在宿松縣治東祀漢縣令張何丹天妃廟在宿松縣小孤山有二一在岸一在山宋封助順安濟廣濟惠濟夫人元加封顯靈明加封天妃聖母碧霞元君有司春秋致祭景祐廟在宿松縣東南三十八里竹墩祀唐張巡忠潔王廟在望江縣雷港鎮祀楚屈原麴大夫廟在望江縣北祀唐縣令麴信陵忠義祠在府學内節孝祠在府治西門外二祠各縣俱如制學優祠在府治内祀宋儒游定夫黄直卿韓忠臣祠在府城内祀元韓建附明徐傑舉祀奏議竊見元封豳國公諡忠宣余闕之墓坐落本郡城西郡治東祠為有司朔望謁拜歲時致祭之所而守臣韓建不與焉臣考闕所著青陽文集内載大節記有云宗正郎中韓建云云所以揚建之懿美於無窮也復考元史并闕死節本末一則曰守臣韓建一家被害建方臥疾罵賊不已執之以去不知所終一則曰總管韓建舉家被殺建病不能興賊執之建罵賊不輟求死甚急賊不殺以户扇舁去不知所終臣竊以為韓建之在當時力攻固守其大節如彼被執之際病不可為猶且罵賊求死其不屈如此賊舁去雖曰不知所終必不肯屈節偷生以茍免也且建守於前闕繼於後實為一體闕已蒙表揚得以賜祭而守臣韓建完城戰守精忠大節似與闕亦相頡頏今乃落落無聞誠為缺典伏望擴天地之量廣一視之仁乞勅禮部許於本祠内添設建木主一位庻歳時有事於闕而建得與一爵之榮使盡節於前代者不冺其善隂受夫國家之恩守土於將來者有所激勸思奮其報功之義矣下禮部議韓建禦冦之功死國之義與知府傑所言同韓建宜侍於余闕一體致祭庻忠臣之懿美垂於不朽聖明之恩典延於無窮矣制曰可二忠祠在府治北郭祀宋通判孫知微夏椅厯久祠圯今併入府學四忠祠並祀余忠宣祠在府學東祀元忠臣余闕以韓建李宗可配推官黄突倫歹以下二十有三人皆從闕死節祔祀之又正觀門外有祠專祀余闕闕與烈夫人墓即在後國朝靳輔重修祠祀從來忠義之氣上貫日星下鍾河嶽非細故也是以聿追大節者必崇廟貌而禋祀之豈僅曰報此孤臣哉葢秉彛之良人所固有茍以對越往哲而於瞻拜肅將之下輒多鼓動扳起則禋祀之矞皇正所以維人心培風教也皖固古舒州地自漢以來名賢之涖節兹土者未易更僕數逮有元忠宣余公以敦詩説禮之儒膺鎻鑰折衝之寄且當劇冦蜂起勢若鼎沸公乃嬰孤城僅聯民兵數千大小三百餘戰每出其神智以摧敵鋒敵無不愕眙敗遁者嗚呼偉哉且廥儲枵然庚癸罔諾公又率凋疲之衆耔穫荆棘中即脫栗饗士士無不敵愾一當百者尤戞戞稱難焉及厯六閲載江淮鱗雉皆解甲應賊於是蟻附日益夥城中餉盡矢竭而陷公慷慨罵賊自刎賊義而瘞之嗚呼烈矣哉説者以公之奇畧純忠雖史乘不槩見謂惟睢陽張中丞可與頡頏者㫖哉言乎及公既自靖而夫人蔣氏復率其子女視死如歸且一時麾下士憤激自殺者亦千餘人則又踪追岳鄂而氣軼田横矣嗚呼異哉予撫皖六載每公餘按行公壁壘遺址慨然想見其為人輒低徊留之不忍去於是考公廟祀之典實載於皖志遡自元至正以迄於今厯三百餘年勿替皖人士多悲歌感慨者皆公遺澤也乃閲厯既久虎觀榱桷不無風雨飄摇者予念公忠義之氣既與日星河嶽同其奠麗豈必以廟貎之輪奐而後妥厥靈爽哉惟是人心之觀感實關俗尚之汚隆夫以公廟貌嵳峩使肅將瞻拜者咸激昂而知所勸其有禆於風聲不大且逺耶於是檄皖郡劉守鳩工倡新之而好義桴應遂告竣於丁巳之季春劉守拂貞珉請予為之記因灑筆而書之有如此烈夫人祠在府治青陽書院東祀余闕妻及子徳臣女福童四忠祠在府學東因二忠祠圯知府張楷即啓聖祠舊址立祠祀宋通判孫知㣲夏椅明總兵程龍叅將潘可大名四忠又以宋統制范勝等元都統制陳宗義等明潛山知縣李印嘉等叅將王培基遊擊張其威三十四人皆捍禦城守殉節於皖因附祀焉烈女祠在府治正觀門外朱司農祠在桐城縣西祀漢朱邑吳烈侯祠在桐城縣西祀唐張孚卿徐常侍祠在桐城縣連城山祀南唐徐鉉嘗以直言貶舒州三年後人立祠竇將軍祠在桐城縣舊書院内祀皖撫義卒竇成國朝姚文然記皖撫標營竇公諱成蜀人也以勇烈聞身長七尺虬鬚若神在將軍廖應登麾下以死存桐邑邑人徳之歳時伏臘爼豆不絶村氓小子平生不識公作何名何狀過必拜曰我竇公也及見公或稱之以其髯曰竇某將軍云初逆賊張獻忠之掠江北也應登承命皖撫以兵三千防桐一日公從應登將百餘人之廬州道經舒城方解鞍憇息而賊游騎卒至乘其無備刼之去賊狹應登抵桐俾招降桐人是時皖之諸縣大率皆破所存者唯懐寧及桐城而已而皖撫玩冦援師不出城中無蓄積軍民饑死者相枕賊騎益增四合如山人無固志賊謂應登曰汝卒中有為我招降守兵者乎以公對公謬許諾一無難色陽陽如平常賊以公先四賊左右夾之曲刅鈎之直兵推之公俛首徐行至城下忽仰而大呼曰我竇成也賊廹我招降汝汝輩但努力固守慎勿降賊連日穴城城山根活石不可穴也且火藥已盡言未卒賊大怒以刅碎其首支解之至死罵不絶口桐之守吏將聞之曰竇成小卒也猶不為不義屈况在位食祿者乎乃并力禦守時城守有林搆者縋城下晝夜兼行數百里乞師於鳳陽總鎮黄公得功擲身於地哭不絶聲黄公義之星馳赴援賊敗走大軍追之獻忠馬躓幾獲焉城所以全者本公一死之力也賊既退臬使張公亮至桐泣祭建祠立主於桐之西書院曰竇公祠癸巳歳秋文學江君之漢為之塑像勒石焉甲午春予至祠拜其像其長老為言之若此嗚呼公小卒也而桐人皆公之豈非孔融所謂公者仁徳之徽號不必三事大夫哉然則聞公風雖遠逖足以自振况拜其像觀其容貌者乎乃為之記黄公祠在桐城縣西門内祀明黄得功明季援桐勦賊桐人徳之史公祠在桐城縣治西祀明史可法張方伯祠在桐城縣南門内祀明張秉文方明善祠在桐城縣東祀明方學漸左公祠在桐城縣東祀明左光斗方斷事祠在桐城縣東門内祀明靖難死事方法皖山祠在潛山縣北門内皖公山神周大夫皖伯之神也漢立天柱山南隋大業八年懐寧令辛公義移皖水之隂吴陂堰側里人號為吴陂神周瑜祠在潛山縣西北二十里吴陂祠魏劉馥開吴陂溉田吴吕䝉鑿不通水注稻田三百餘頃功利及人先未立廟里人以潛山廟在吴陂之側因指名以祀焉唐開成五年刺史鄭穀又於廟側别建祠忠節祠在潛山縣治東門内祀漢邴原大節祠在太湖縣北門祀元守臣韓建白雲祠在宿松縣南涇江口祀唐狄仁傑惠民祠在宿松縣治北祀明都御史彭韶朱瑄成化間知縣孫衍白於巡撫彭韶奏免糧三千餘石𢎞治辛酉知縣施溥請於巡撫朱瑄免漁課餘積民懐朱彭之徳立巡撫惠民祠以知縣孫衍施溥祔焉後又益以邑令邢旭謝鑌明季兵燬國朝康熈己酉知縣朱經髙捐捧重修以明令熊廷棟入祠二十二年知縣朱卷又以總督于成龍並祀焉三孝祠在望江縣東門祀王祥孟宗徐仲源忠烈祠在望江縣治祀唐張巡許逺雷萬春忠節祠在望江縣治西街祀明王之慶上古赫胥氏陵在潛山縣天柱山朝陽峰左漢大司農朱邑墓在桐城縣西南二十里石井鋪邑少為桐鄉嗇夫亷平有恩後登列卿病且死屬其子曰我故為桐鄉吏其民愛我必葬我桐鄉後世子孫奉嘗我不如桐鄉民子因葬於桐鄉西郊外民果共為起塜立祠歲時祭祀不絶邑令張雲墓在桐城縣北五里雲祈雨龍眠山下雨大作没於水其妻聞之投崖死溯流與雲合遂葬於此太尉喬元墓相傳在潛山彰法山廣教寺後元梁國睢陽人後漢書注建安七年曹公軍譙遂至浚儀遣使以太牢祀元其祭文云奉命東征屯次鄉里北望貴土乃心陵墓是也邑令張何丹墓在宿松縣南西山下三國吳偏將軍周瑜墓在宿松縣圭山瑜卒於柴桑移葬於此南北朝齊何昌㝢墓在潛山縣報恩寺後何思墓在潛山縣王家坦唐駙馬柴紹墓相傳在潛山縣太平山畢諴墓在潛山縣梁公狄仁傑墓在太湖縣九村坂邑令麴信陵墓在望江縣北隅之崇岡有貞元題碑孝子徐仲源墓在望江縣北十里國朝康熈庚子知府張楷為立碑表其墓五代西平王周本墓在宿松縣西三十里宋知舒州黄庭堅墓在懐寧縣王祐墓光祿王罕墓並在潛山縣王家坦黄貞女墓在潛山縣東門千金巷内千金其小字也處士向榮墓在太湖縣龍山下明萬厯中山水衝决得榮墓誌知為皖人少通經史結茅𨼆居年九十卒進士潘琛墓在宿松縣福昌嶺後石興宗墓在宿松縣九衝塍興宗嘗捨宅為宫以祀張巡宗卒即葬此學士吴􅕬墓在望江縣西北五里􅕬星變陳言屢徴不仕墓碑存明正徳間知縣周鏞教諭馮善為表之周必尹墓在望江縣北四十里永恩寺前提舉龍仁夫墓在望江縣北三十里懸頂山有碑存元右丞余闕墓在府西門外二里闕死難賊義之求屍葬此國朝康熈己亥知府張楷為之甃石建礦視舊加廣焉雍正六年安徽按察使劉柟復為修建墓門石垣附國朝劉柟修墓門垣石紀事髙陽後學劉柟以雍正六年戊申秋九月恭膺簡命視臬上江其明年春侍大中丞魏公勸農西郊駐節覽古共展謁忠宣公祠墓裵裒故墟荒盛朝落增慨伏念忠烈如公遺跡不振甚非公命卜崇節褒賢磨世礪俗之至意爰承中丞吉鳩工麤具墓門一石闌左右翼之墓垣圍共一十有三文計費工銀五十三両有竒閲十有二日而竣資皆公蠲罔役民力祠墓既肅瞻仰彌欽廼敢親詣墓下並率董役人員本司照磨簡發直𨽻通州劉成璠髙鳯翰汶上縣趙本䖍祭告試用官山東膠州成刋石紀事永昭後來郡守韓建墓在府康濟門外江濵李宗可墓在余墓之左馬倅墓在余墓之右皆與闕同死者康熈庚子郡守張楷並甃以石都統制陳宗義墓在潛山縣九都坂有碑記處士王㓜學墓在望江縣北二十里雄魚山方開宗墓在望江縣北六十里赤城坂歐陽元表其墓明布政劉尚志墓在府小龍山布政吴嶽秀墓在府古角城汪道亨墓在府治西門外義士汪鑾墓在府北郭外宸濠攻城被執不屈遇害中書顔素墓在懐寧縣石牛山御史趙景初墓在桐城縣北峽關舉人方法墓在桐城縣北東龍眠方學漸墓在桐城縣松門嶺少卿方大鎮墓在桐城縣白鹿莊贈少保錢如京墓在桐城縣城内孝子檀郁墓在桐城縣投子山西尚書吴用先墓在桐城縣㑹公山贈少保左光斗墓在桐城縣北三十里巡撫方孔照墓在桐城縣東合明寺下妻吴氏祔孝子夏子孝墓在桐城縣土地嶺有碑布政張秉文墓在桐城縣西薛家舖妻烈婦方氏祔知縣夏統春墓在桐城縣北東龍眠尚寶丞金燕墓在潛山縣北縣令趙宗普墓在宿松縣將軍石良墓在宿松縣豆溪興宗