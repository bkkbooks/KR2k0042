賊乃俘帝心追悼恩禮優金書煌煌封列侯爰始廟祀垂千秋歳時將享潔牲牢鼓我笙簧撃我鼗神不來兮心忉忉神之來兮駕虹霓祥烟氤氲風清淒江濤不起無鯨鯢神之格兮儼冠裳綰符帶劔頎而長啜蘭羞兮飲瓊漿神之去兮靡少停流為河海爛為星蹇余延竚瞻儀型帝隆典禮維勸忠匪忠匪臣曷以庸於赫我公昭無窮陶學士祠在當塗縣東街祀明陶安即安故宅梁文孝祠在蕪湖縣昇平橋東祀蕭統李衛公祠在蕪湖縣赤鑄山祀唐李靖忠臣祠在蕪湖縣東南七十里祀宋叅軍陶居仁張狀元祠在蕪湖縣長街巷内祀宋張孝祥海忠介祠在蕪湖縣城外祀明海瑞陳通判祠在蕪湖縣察院東祀明死事縣丞陳一道烈女祠在蕪湖縣儒學西祀烈女詹氏鄧公祠在繁昌縣東門外祀明知縣鄧一儒王公祠在繁昌縣東北祀明知縣王柱貞女祠在繁昌舊縣鎮祀烈女張仙真烈婦祠在繁昌縣朝陽門外祀生員方鳴蛟妻洪氏三國吴景帝定陵在府城東凌家山景帝諱休權第六子也南北朝齊和帝陵在府城北黄山和帝諱寶融明帝第八子禪位於梁世傳嶽廟行宫基即其陵也漢班超妻鄧氏墓在繁昌縣黒沙洲有碑三國吴刺史陶基墓在當塗縣横山麓地名陶墓門宋淳祐間墓碑猶在將軍黄葢墓在繁昌縣十八都近墓號黄墓渡晉刺史陶璜墓在當塗縣六十五里太守陶回墓在當塗縣小朝山下陶如海墓陶登墓並在超域有碑其碑隂云父子相繼為忠孝墓大司馬桓温墓在府城南十五里青山北蜀太守毛璩墓在府城南七里尼山圩宋大明中遣祭桓温毛璩墓刺史楊亮墓在府城東十五里泊山南楊震七世孫碑隂有故蜀將吏五百人名殷仲文墓在縣南十五里唐翰林李白墓在府青山西北麓附唐范傳正新遷墓碑畧公名白字太白其先隴西成紀人涼武昭王九代孫也父客不求禄仕夫人夣長庚而生白天寶初召見於金鑾恩遇無比遂直翰林既而上疏請還舊山晚嵗渡牛渚磯至姑孰悦謝家青山有終焉之志盤桓利居竟卒於此傳正早於人間得公遺篇逸句吟詠在口無何叨䝉恩奬亷問宣池按圖得公之墳墓在當塗邑因令禁樵採備灑掃訪公之子孫欲申慰薦凡三四年乃獲孫女二人召至郡庭進退閒雅應對詳諦祖徳如在儒風宛然云先祖志在青山遺言宅兆頃屬多故殯於龍山東麓地近而非本意墳髙三尺日益摧圮力且不及無如之何聞之憫然將遂其請因令當塗令諸葛縱躬相地形卜新宅於青山之陽以元和十二年正月二十三日遷神於此遂公之志也西去舊墳六里南抵驛路三百歩北倚謝公山即青山也天寶十二載勅改名焉余作新墓銘輙刻二石一寘於泉扃一表於道路亦峴首漢川之義也李淳風墓在蕪湖主簿賈島墓在府城南二里省庄圩唐鄭谷有詩云五字與八韻俱為時所先幽魂應自慰李白墓相連宋安撫使陳規墓在府南姑孰鄉青山之北編修李之儀墓在府東北十五里郡馬孫徳昭墓在當塗縣博望鄉丁葛村承直郎孫應成墓在當塗縣甑山北太守石禹勤墓在蕪湖縣丹陽鄉黄庭堅題墓贈宣義郎石天麟墓在蕪湖縣丹陽鄉米芾題其墓曰宋故死節之士蕪湖石君墓太常丞石待問墓在蕪湖縣南二十里丹陽鄉黄庭堅題其墓叅軍陶居仁墓在蕪湖縣東南二十里移風鄉難歸葬於家𨼆士韋許墓在蕪湖縣治前數十歩元張飛卿墓在當塗縣翠螺山麓飛卿鎮采石殉難葬此完顔權墓在當􅂗縣東南凌家山十女墓在蕪湖縣東四十里徳政鄉丁月娥率諸女死難合葬一塜附元戴良記月娥者西域人也軍職馬禄丁之女蕪湖葛通用之妻自㓜貞懿婉柔蒸蒸孝友長益小心敬順謹飭不怠其歸葛氏葛家之冢婦盧方掌内政月娥事之如事姑待諸姊從女皆有恩盧大喜日率諸婦諸女詣月娥請曰某承姑緒言命主中饋佐蒸嘗然懼無以為隂教倡敢以諸婦諸女屬之姊惟朝夕諭誨必有濟於是閫以内皆秩然由於禮純然化於正上詔下唯號為徳門已而南北兵起盧謂郡有城郭可依兵衞可恃仍屬月娥擕諸婦諸女至郡郡有儒士張綱中者與葛有連遂僦其屋以居無何沔冦奄至城失守月娥慨然曰吾簮纓家女何忍見犬豕耶即抱所生女赴水死諸婦諸女咸愕然相顧曰母嘗導我以禮閑我以正今臨難背去尚得在世稱人乎自長及㓜及婢媵凡九人皆爭相入水無敢後者事稍定家人匍匐問狀剛中為物色得其屍時大暑已七日月娥顔貌如生而手所抱女猶凛不可奪餘亦相挽屍水中久而不泛見者以為異父老憐而語之曰十人死既同葬不宜以異處遂擇故居之南黄池里為開大壙瘞之題之為十女墓明孫富十墓以行軍叅謀佐太祖取太平卒於軍詔賜城南周家山以葬學士陶安墓在府城北五里神山都御史端廷赦墓在府城東北八里張塘都御史喻智墓在府城斗兒山都御史倪嵩墓在府城東十里大學士何如寵墓在府城東五十里歸善鄉都御史杜智墓在蕪湖縣赭山副千户萬通墓在蕪湖縣都御史嚴升墓在繁昌縣延載鄉都御史吴琛墓在繁昌縣春穀鄉都御史李蕙墓在府西馬鞍山江南通志卷四十一
