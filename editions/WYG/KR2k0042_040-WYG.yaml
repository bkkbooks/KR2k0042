不去吴堅守大郡以固籓籬敵雖張必恐我乗其後乃又趣公以去門庭不戒堂室以危天之所廢誰能違之嗚呼悲矣論者謂公早年勇退投間自放有謝安石之逹慷慨上書乞斬宋臣師孟有朱雲之勇孤軍赴援力謀社稷眞州之脫空坑之敗循州之執艱危萬狀誓死不悔有顔魯公之節燕京被留從容義命顧問慇懃應對如禮有箕子之貞既趣柴市南嚮再拜臨刑自若有比干之義葢公之志可以塞宇宙公之忠可以貫日月史臣謂公一死收宋室三百年養士之效豈不然哉予因撰次公事而述厥赫赫者以昭示後來亦宣人之志也郡守以下咸書名左方以見祠所由始云汪公祠在府南郭祀元尚書汪澤民附明王恕記生不違時死能全節此人之所難是人也雖死猶生令名無窮焉貪生畏死不顧名節此小人之所為是人也未聞終不死不善之名無窮焉公姓汪氏諱澤民字叔志登元延祐戊午進士第官至集賢直學士以嘉議大夫禮部尚書致仕公既歸築室宛水之濵讀書自娱當紅巾餘黨冦宣州之日公為江東部使者畫守城禦冦之䇿十餘事冦再至擊退已而長鎗叛帥鎻南班程述等挾兵渡江欲犯宣城或勸公去之公曰昔江萬里寓鄱陽大軍逼城衆皆走散猶坐守以為民望况宣民離合視吾去留夫何之後城䧟為萬户丁堅使前鋒葛義執公逼降不屈遂遇害將死罵猶不絶口鎻南班等雅服公名為具衣冠以葬之事上於朝贈資善大夫江浙等處行中書省左丞上䕶軍追封譙國郡公諡文節葬在寧國郡東南嶧山之麓因厯年滋久鞠為茂草土人平治之藝麥其上成化丙午厥孫汪養能訟於官同知劉誠覆實之為封其域未幾誠遷去通判天台陳紀得公神道碑於宋太史景濓先生文集中謀諸知府涂觀欲為治墳建祠勒銘於石慰答忠魂以為天下萬世臣子勸遂具以請余嘉其義而許之紀乃經營作石修塋域壘墳墓勒宋太史所為碑銘監之神道造石橋於其前復於郡城南三里許市地建祠廵按御史江右孫弁出公帑五千金以助成之首事於癸卯春訖工於是年冬馳書請余為記夫人臣之居其位食其禄任其事一遇大變臨大節或心無所主茍安一時之生而忘厥大義者往往有之求其見道分明視死如歸者幾何人哉公當謝事歸田之日無職守無責任聞冦至而不去以為民望復為部使者畫䇿以禦之及其被執逼降至死不屈此其所以難能也宜其膺顯贈獲美諡流芳百世使人敬之慕之至於如此使公當冦至之時奉身以竄被執之時屈身以降不過數年亦歸於盡人將唾罵之不暇又何贈諡敬慕之有紀為此舉固可謂知所重弁復助成其事可謂與人為善者矣其所以為天下國家推忠節勵風俗者不在斯乎因其請姑摭此與之俾刻石以示來者夫公之文章事業與家世履厯之詳則有宋太史所為碑銘在兹不贅王文成祠在府治正學書院祀明王守仁俞公祠在府治大東門内祀明俞逢辰附明陳俊記畧予按革除籍見一時死事臣蹈湯火中甘心潤鼎鑊輙拊膺太息淚淫淫下暨見俞公周旋委曲抗節不附致殲身以狥輒又拊膺太息涙淫淫下也或曰俞公死親黄觀方孝孺練子寧云何曰黄方諸公非建文臣耶日受簡廸列員職奔奏死何可辭譬左右手然一旦頭目腹心變手足不搔衛捧掖得乎即文皇彼食其禄自盡其心之語亦諒之矣至俞公燕臣也縱均之奉朝請然所委質者燕耳使俞公為文皇地亦胡病於忠哉卒從一而終不少詭狥嗚呼諸臣死建文易俞公死建文難諸臣眎建文戚文皇疏俞公眎建文疎文皇戚此成仁取義難易親疏之辨之大較也故曰俞公死加諸公一等云然公與禮部尚書陳公廸俱宣人黄公觀即乂貴池人方二三百里間同時死事者居其三歆豔千載震耀寰區豈崧嶽間氣江海精英繄獨一方鍾歟祠搆城東孔道前大門繚之垣中崇堂室後即居羣子孫業儒者望之枚枚栗栗弔古者過之欷以悲感時者聞之奮以激逐臣放子聞之愀然不欲生頑夫鈍士聆之低顔顙泚車將近而轅為之回也俞公名逢辰字彦章世居水陽西鎮里由洪武戊午鄉試辟燕府教授尋遷伴讀云時萬厯丁丑五月吉日七賢祠在府治前祀明知府方逢時鄭繼之蕭良譽金勵王公弼周光夏後增入管起鳯羅公祠在府治景徳寺祀明知府羅汝芳陳尚書祠在府學東祀明陳廸附明李黙靖獻祠記昔我髙皇帝締造家邦每以扶植綱常培養士氣為務故雖勝國黨桀吠堯猶必曲宥之以示萬世人臣之義固以奠安元元非此道無由也厥後懿文太子薨髙皇已有倦勤之意永惟付託重計深懐𨼆憂左顧右却頼有二三藎臣為之羽翼既而靖難師興鍾􅒶不移市朝安堵則文皇帝有再安宗社之力然齊黄諸人自以身受國恩不敢懐二駢首就殲宣城陳公廸與焉予時讀公事狀未嘗不掩卷而悲也按公以洪武乙卯舉京闈辟本郡學訓導嘗為郡萬夀賀表上覽而異之召拜翰林編修累遷雲南左布政後徴為禮部尚書同受顧命時兵起國勢臲卼公等力陳計畫南北相持者五年事既弗就公益抗節不遜遂并其子丹山等磔東市臨刑猶作五噫并詩至今讀之使人澘然淚下豈其忠憤所感思以頑民自待者也子糾之難忽死而仲請囚人固各有志不能以彼易此文皇曰彼食其禄自盡其心又曰使子寧尚在朕當用之聖人所以扶植培養之者寧有已時哉公死之日子孫孑無噍􅁼百餘年來宣人破諱其事成化間郡守涂君觀稍祀公於故里尋即湮廢使英爽之氣飄溘而無所依予甚悼焉嘉靖壬辰予以吏部郎謫判是邦亟求其後得公五世從孫太學生大林者而問之故乃謀諸前守餘姚邵君曅具以狀白於巡按督學兩御史請復置祠春秋薦享如大司馬溧水齊公故事二公嘉許大林亦奉地來獻地當郡學之東公少讀書處也予更旁購他地益之中為正堂奉公像以居又北為浩然堂各