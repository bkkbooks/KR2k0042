body:
  text: 江南通志卷八十三食貨志蠲賑漢武帝元鼎二年詔以水潦移於江南廹隆冬至懼其饑寒不活遣博士中等分循行諭告所抵無令重困吏民有賑救飢民免其戹者具舉以聞前漢書後漢明帝永平十八年大旱詔勿收兗豫徐州田租芻藁以見穀賑給貧人後漢書順帝陽嘉二年詔以吳郡會稽饑荒貸人種糧後漢書桓帝建和元年荆揚二州饑遣四府掾分行賑給後漢書三國魏明帝景初元年冀兗徐豫四州民遇水遣侍御史循行賑救之魏志吳大帝赤烏十三年丹陽句容及故鄣寧國鴻水泛溢詔原逋責給貸種食吳志晉武帝泰始五年青徐兗三州水遣使賑䘏之晉書惠帝元康五年兗豫徐揚等州大水詔遣御史巡行賑貸晉書成帝咸和四年會稽吳興宣城丹陽大水詔復租税三年晉書咸康元年揚州諸郡饑遣使賑給孝武寧康二年三吳義興晉陵及㑹稽遭水之縣尤甚者全除一年租布其次聴除半年受賑貸者即以賜之晉書太元十八年荆揚二州大水傷秋稼遣使賑䘏之晉書南北朝宋文帝元嘉七年吳興晉陵義興大水遣使巡行賑䘏南史宋紀十二年六月丹陽淮南吳興義興大水以徐豫南兗三州會稽宣城二郡米穀百萬斛賜五郡遭水人八月原除遭水郡諸逋負宋書十七年徐兗青冀四州大水遣使賑䘏又詔前所給揚南徐二州百姓田糧種子兗豫青徐諸州比年所寛租穀應督入者悉除半今年有不收處都原之凡諸逋債優量申减并禁州郡估税所在市調煩刻宋書孝武帝孝建二年三吳饑詔所在賑貸宋書大明元年吳興義興大水遣使開倉賑䘏宋書八年以東境偏旱詔出倉米付建康秣陵二縣隨宜贍䘏又原除揚南徐州七年逋租宋書齊髙帝建元元年九月詔三吳義興三郡遭水減今年田租齊書武帝永明元年詔賑賜建康秣陵二縣貧人又吳興義興遭水縣蠲降租調南史齊紀五年六月霖雨過度水溢京師遣官隨宜賑賜七月詔原丹陽屬縣積年逋租八月詔蠲吳興義興二郡租調齊書六年吳興義興被水之鄉賑賜各有差齊書九年以吳興義興大水詔蠲二郡租南史齊紀十一年原除南豫州之歴陽譙臨江廬江四郡三調衆逋宿債齊書明帝建武二年吳晉陵二郡失稔之鄉蠲三調有差齊書陳宣帝大建十二年亢旱詔丹陽吳興晉陵建興義興東海等十郡即年田賦禄秩各原半其丁租半申至來歳秋登陳書唐徳宗貞元八年以江淮所停運米委轉運使於水灾州縣糶之以救貧乏資治通鑑宣宗大中九年以旱遣使巡撫淮南減上供饋運蠲逋租發粟賑民又罷淮南宣歙浙西冬至元日常貢以代下户租税唐書五代周世宗顯德六年淮南饑上命以米貸之或曰民貧恐不能償上曰民猶子也安有子倒懸而父不為解者安責其必償也文獻通考宋太祖建隆元年賑揚州城中飢民宋史三年正月賑淮南饑六月賑宿州饑宋史開寳八年平江南詔出米十萬石賑城中飢民文獻通考太宗雍熙二年四月遣使賑江南諸州飢民九月蠲江浙諸州民逋租宋史三年以昇宣等十四州前歳官所賑貸並蠲之宋史淳化四年詔以江淮饑遣使巡撫宋史五年正月遣使賑亳潁等州飢民九月遣使分行亳潁泗壽州按視民田被水及種蒔不時者并蠲其租宋史真宗咸平二年江浙春霜害稼分使發粟賑之宋史景德元年江南東西路饑命使賑之宋史大中祥符二年四月昇州火遣御史訪民疾苦蠲被火屋税九月賜泰州被水民粟宋史三年以江南旱昇潤州屢火遣使存撫宋史五年五月江淮兩浙旱給占城稻種教民種之八月减運河水灌淮南民田仍寛租限十二月賑泗州饑又淮南河北饑減直鬻穀以濟流民宋史七年十二月淮南江浙饑除其租宋史乾興元年正月蠲秀州水災民租二月詔蘇湖秀州民飢貸以廪粟又詔賑徐州貧民宋史仁宗天聖元年以淮南水災遣使安撫宋史四年蠲淮南被水田租宋史五年江寧府揚眞潤州江水溢壊官民廬舍遣使安撫賑䘏宋史明道二年詔發運使以上供米百萬斛賑江淮飢民宋史景祐元年正月淮南饑出内藏絹二十萬代民歳輸二月權減江淮漕米二百萬石宋史皇祐三年遣使安撫江南飢民宋史英宗治平元年以上供米三萬石賑宿亳二州水災户又濠泗廬夀髙郵軍大水遣使行視疏治賑䘏蠲其賦租宋史神宗熙寧元年帝以内侍有自淮南來者言宿州民飢多盗繫囚衆本路不以聞詔遣太常博士陳充等視宿亳等州災傷又詔河北災傷州軍刼盗罪死者並減死刺配廣南牢城年豐如舊附司馬光疏臣竊聞降勅下京東京西災傷州軍如人户委是家貧偷盗斛斗因而盗財者與減等斷放未知虚的若果如此深為不便臣聞周禮荒政十有二散利薄征緩刑弛力舍禁去㡬率皆推寛大之恩以利於民獨於盗賊愈更嚴急所以然者葢以饑饉之歳盗賊必多殘害良民不可不除也頃年嘗見州縣官吏有不知治體務為小仁者或遇凶年有刼盗斛斗者少加寛縱則盗賊公行更相刧奪鄉村大擾不免廣有收捕重加刑辟或死或流然後稍定今若朝廷明降勅文豫言偷盗斛斗因而盗財者與減等斷放是勸民為盗也百姓乏食官中當輕徭薄賦開倉賑貸以救其死不當使之相刼奪也今歳府界京東京西水災極多嚴刑峻法以除盗賊猶恐春冬之交飢民嘯聚不可禁禦又况降勅以勸之臣恐國家始於寛仁而終於酷暴意在活人而殺人更多也文獻通考六年賑江淮兩浙饑宋史七年詔浙西路提舉司出米賑常潤州饑宋史八年詔賑常潤州飢民宋史熙寧中趙抃以大資政知越州兩浙旱蝗米價湧貴餓死者十五六諸州皆榜衢路禁人増米價抃獨榜衢路令有米者増價糶之於是諸州米商輻湊詣越米價更賤民無餓死者宋名臣言行録哲宗元祐六年以蘇湖常三州大水兼浙西諸郡災傷詔賜米百萬斛錢二十餘萬緍賑之文獻通考八年遣使按視淮南水災宋史徽宗崇寧四年蘇湖秀三州水賜乏食者粟宋史髙宗紹興元年三月賑淮南流民八月蠲徽州被賊民家夏税宋史七年蠲建康府太平宣州逋賦及下户今年身丁錢宋史十三年三月賑淮南飢民仍禁遏糴九月蠲淮南逋欠坊塲錢及上供帛宋史二十一年以兩淮民復業未久寛其租賦宋史二十六年詔兩淮邊民未復業者復其租宋史二十八年蠲平江被水民逋賦又蠲楚州歸附民賦役宋史是年詔在法水旱檢放及七分以上者濟之自今及五分處即撥義倉米賑濟文獻通考三十年詔滁州上供錢依濠州盱眙軍例更展免一年又蠲淮東州軍上供銀絹米麥經總制錢一年續文獻通考孝宗隆興元年賑兩淮流民又以兩浙江東大水悉蠲其租宋史二年賑江東兩淮被水貧民宋史乾道三年兩浙水江東西路蝗賑之宋史六年詔江東運司將建康府太平州被水縣人户今年身丁錢並與放免續文獻通考九年楚州饑賜米五千石賑之又江東之太平廣德淮西之無為軍和州民多艱食並行停征賑䘏續文獻通考淳熙三年以常州旱寛其逋負之半宋史四年蠲太平州民貸常平倉米宋史六年正月賑淮東飢民三月再賑宋史七年正月蠲淮東民貸常平錢米十一月蠲兩淮州軍二税一年宋史是年奏免池州檢放旱苗米及經總制錢續文獻通考八年以徽饒二州民流者衆出南庫錢三十萬緍賑糶又江浙兩淮等處水旱相繼發廪蠲租遣使按視民有流入江北者命所在賑濟之宋史九年詔江浙兩淮旱傷州縣貸民稻種計度不足者貸以樁積錢宋史光宗紹熙四年賑江淮兩浙被水貧民宋史五年淮右旱知滁州請發常平粟賑其民龔維蕃賑荒錄紹熙五年淮右大旱滁為甚時會稽石公宗昭典州事預謀荒政前期檄屬縣校公私之儲積令存私家合用之數而以其贏籍於官度猶不給請於朝乞發常平粟并撥樁積錢糴米麥乃以合郡上下分為九等凡有儲蓄若營運者與為二等客者皆勿給其有田而無收及有業而不能營者則録其户口而給之其餘工術技藝往來負戴與夫民田租户官田佃客凡有所依而不自贍者則計口給券日糴於官鰥寡孤獨癃老廢疾者濟之人受粟二升㓜者減半量地逺近與民之衆寡置給粟之所凡八十四富人之羡粟其籍於官者則計其幾何勸以就糶凡糶若糴各書於厯時取而稽考之視民食之緩急而先後其出給之期選上户信實者掌出納委學職徃來督察之豐其資給校其折耗下至搬運脚乘紙札貫索皆優給其直凡貸若濟者則并給慮其徃來之冗費也凡糶者皆日給懼其冒請而濫給也檢柅欺弊奨勸勞能郡士之被選委者手書酒炙之饋日至其主糴上户預給照據量免差役民以公事至庭必宛轉諮諏諸塲之孰整孰惰動息必知之取其尤者各一人加賞罰而示勸慾焉諭以禍福感以信義功過畢知大小競勸民有冒憲非故犯願出粟自贖者令各縣拘籍候糶畢照免又擇吏胥之勤幹者發舟運鏹告糴於他郡其民居僻阻饋給勞費則募土豪借糴本令便宜貿易以賙給之期償於來歳凡道途邸舍皆貯粟以備商旅之需棄男女者人得收養仁聲旁洽流民輻輳郡治薦罹俶擾㕔事未建乃鳩工度材僦民就役計日酬傭視常時加厚凡木石竹葦土瓦之求鬻者雖至㣲必優其價衆爭趨之由是服役於官者皆仰以贍給而負販者因得以求售懽呼力作民忘其勞閲兩月訖事榱題雄峙冠於淮右朝廷聞公治行以度支郎召民聞命蹙額曰公去吾屬填溝壑矣乃相率號呼請留壯者走告諸臺乞寢召命老稚填塞衢巷晝夜守之固遣弗肯去郡僚之白事者伺其出必攀輿諦視夜則燃燭以辨如是者閱再旬通守以事申諸司次第剡聞朝㫖令需代民始服故公以活民為己責夙夜調度至廢寢食居處於外士民之入見者不以時接言當於理立罷行不淹刻所收米直復糴於他有所循環無度故出給雖多而流通不匱又勸民雜蒔菽粟以為後繼其癃老羸弱者處於僧廬為糜以食之今無失時疾病者濟以醫藥時躬造焉察其寒饑公智慮精詳局量寛和而待人一以誠實舉措不計小費而亦未嘗妄施合饑民及流徙而至者凡數萬背冬渉春無一人凍餒者明年三月後詔趨見公乃行朝廷第荒政滁為最寧宗慶元初趙汝勣知當塗時歳饑穀貴乃開倉散米萬斛一邑獲全事聞詔他郡依汝勣賑䘏法續文獻通考六年常潤揚通泰和州江隂軍旱賑之續文獻通考嘉泰元年浙西江東兩淮旱賑之仍蠲其賦續文獻通考嘉定元年出米二十萬石賑江淮流民續文獻通考二年八月出米十萬石賑兩淮流民續文獻通考八年七月出米三十萬石賑糶江東飢民續文獻通考十年詔江東提舉司出米十萬石賑給貧民續文獻通考十六年九月詔江淮諸司賑䘏被水貧民十一月太平州大水詔賑䘏之宋史十七年四月詔廬州賑糶飢民時知廣德軍耿秉田發倉賑濟活飢民萬餘自劾矯制之罪上聞之賜璽書褒異續文獻通考附袁甫進區處故事臣竊為區處流民之策惟富弼之法最為簡要所謂簡要之䇿惟曰散處其民於下而總提其綱於上而已竊聞金陵諸邑流民羣聚皆來自淮西荷戈持刄白晝肆掠動輒殺傷沿江出兵驅之其在句容之境者軼入金壇若宣城若池陽若當塗所在蟻聚剽刼成風逃亡之卒皆入其黨江南姦民卒多附和目前勢已若此冬杪春初日月尚長蔓延不已各將潰裂四出不可收拾臣愚欲乞朝廷行下督府及諸閫與凡安撫總漕諸司作急措置自一路而推之諸路由諸路而推之諸郡每處流民隨所在分之凡贍養之費惟分則易供居止之地惟分則易足此非臣之臆說也弼擇所部五州勸民出粟得十五萬斛益以官廪隨所在貯之又擇公私廬舍十五萬區散處其人以便薪水弼之所作可謂委曲詳盡矣今日果能推行此策非但勸民出粟而已或撥上供之數或撥樁管之錢或乞科降則上下當相視如一家或請團結則彼此當聨絡為一體而所謂團給者又不止一途而已能勞苦者庸其力有技藝者食其業其間有為士者則散於庠序爲商者則使之貿遷心有所繫而姦無所萌此皆分說也分之愈多則養之愈易而其要在督府制間以及總漕諸司為之領袖而已是故民貴乎分而權貴乎合所謂散處其民而總提其綱者正謂此也臣願朝廷使長吏任責一如青州故事流民幸甚宗社幸甚理宗寳慶元年滁州大水詔撥㑹子三千緡米千六百石賑䘏被災之家續文獻通考淳祐四年詔蠲髙郵民耕荒田租宋史七年鎮江府旱詔兩浙轉運司檢覆蠲米七萬四千石有奇宋史十年十二月詔江浙沿江郡縣刷其流民口數於朝廷樁管錢米内賑濟仍許於寺觀及空閒官舍居住續文獻通考寳祐六年詔常州江隂鎮江發米賑贍淮民宋史度宗咸淳六年嘉興華亭兩縣水免公田租五萬一千石民田租四千六百一十石宋史元世祖至元十六年以江南漕運舊米賑軍民之飢者元史十八年通泰二州饑發粟賑之元史十九年江南水民飢者衆令所在官司發廪以賑元史二十五年中書省臣言杭蘇湖秀四州大水請輟上供米二十萬石賑之帝是其言元史二十七年八月晉陵無錫二縣霖雨害稼并免其田租五月江隂大水免其田租元史十月寧國等路大水民流移者四十五萬八千四百七十八户凡賑粟五十八萬二千八百八十九石續文獻通考二十八年正月免江淮貧民至元十二年至二十六年所逋田租元史三月杭州平江等五路溧陽太平徽州廣德州鎮江五路江南湖廣大都饑發粟賑之續文獻通考二十九年湖州平江嘉興鎮江揚州寧國太平七路大水免其田租又太平寜國平江饒常湖六路民艱食發粟賑之元史成宗大德元年九月以鎮江之丹陽金壇旱並以糧給之十月揚州淮安路饑賑之十一月常州路及宜興縣旱並賑之元史二年正月建康寜國太平廣徳饒池等處水發臨江路糧以賑二月以浙西嘉興江隂江東建康溧陽池州水旱並賑䘏之續文獻通考三年正月免江南夏稅十分之三九月揚州淮安旱免其田租元史四年二月寧國太平兩路旱賑之九月建康常州江陵饑給糧濟之元史五年六月平江等十四路大水以糧二十萬石隨各處時值賑糶續文獻通考六年六月賑廣德太平饒婺寜國等路饑七月建康民飢賑之元史十年以揚州之泰興江都淮安之山陽水蠲其田租元史十一月以米二萬一千餘石賑糶揚州饑續文獻通考十一年六月江浙饑賑糧三月七月以江浙湖廣江西屬郡饑詔行省發粟賑之又兩淮屬郡饑於鹽茶課鈔内折粟遣官賑之又詔富家能以私粟貸者量授以官八月以江東郡縣饑遣官賑之江南饑以十道廉訪使所儲賍罰鈔賑之十一月平江等處大饑發糧五十萬一千一百石賑之續文獻通考武宗至大元年正月廣德建康鎮江等六路饑户月給米六斗以没入物貨𨽻徽政院者鬻鈔賑之二月淮安等處饑以兩浙鹽引十萬貫貿粟賑之六月内郡江淮饑免今年常賦及夏税十一月詔免建康廣徳田租元史二年正月免江淮夏税又詔各處人民饑荒轉徙復業者一切逋欠並行除免仍除差税續文獻通考仁宗皇慶元年寜國路涇縣水賑糧二月元史延祐二年勅江南行臺賍罰鈔賑䘏飢民續文獻通考四年揚州淮安等處饑發廪賑之續文獻通考英宗至治元年三月賑寧國路饑六月滁州霖雨傷稼蠲其租八月鹽城山陽髙郵興化水并免其租元史二年廬州路六安舒城縣水賑之元史三年三月平江路嘉定州饑發粟賑之又崇明諸州饑賑之九月淮安揚州屬縣饑賑之十一月鎮江路丹徒縣饑發米賑糶元史泰定帝泰定二年四月以鎮江諸郡饑賑糧五萬餘石五月平江等十二郡饑賑糶未三十二萬五千餘石續文獻通考三年揚州路屬縣水免其租又建康太平池州諸路饑并賑之元史四年正月淮安揚州諸路饑并賑之四月建康太平常州諸路饑賑糧鈔有差六月廬州路饑賑之元史文宗天厯二年詔賑池州廣徳寜國太平建康鎮江常州諸路及江隂州饑民元史至順元年正月揚州廬州等路饑以兩淮鹽課鈔五萬錠糧五萬石賑之二月建康廣徳鎮江諸路饑賑糧一月又寜國路饑賑之元史七月以江浙大水民饑詔行省以入粟補官鈔三千錠及勸出粟十萬石賑之是歲被災者多尤加賑䘏續文獻通考二年三月以安慶之望江縣淮安之山陽縣去歲皆水災免其田租四月以髙郵寳應等縣去歲水并免其租元史順帝元統元年江浙旱饑發義倉糧募富人入粟賑之元史二年鎮江常州松江江隂等處水旱勅有司發義倉糧賑之又池州青陽銅陵饑發粟以賑元史五月中書省臣言江浙大饑以户計者五十九萬五千六十四請發米六萬七百石鈔二千八百錠及募富人出粟發常平義倉賑之并存海運糧七十八萬三百七十石以備不虞詔從之續文獻通考至元元年徽州饑發米賑貸之元史二年松江府上海縣饑發義倉糧及募富人出粟賑之元史三年發義倉糧賑溧陽飢民元史六年正月邳州饑賑米兩月三月淮安路山陽縣饑賑之元史至正元年揚州路崇明通泰等州海潮災傷賑之元史八年平江松江水災給海運糧十萬石賑之元史明太祖訓凡天下承平四方有水旱等災驗國之所積於被災去處優免税糧若豐稔之歲雖無災傷亦當驗國所積稍有附餘擇地瘦民貧處優免之特不為常例續文獻通考凡賑濟令災傷去處有司不奏許本處耆宿連名申訴有司續文獻通考洪武二年十二月賑應天蘇松諸府貧民舊通志三年六月賑蘇松飢民明典彚八年免蘇松旱租鄭曉吾學編九年七月蘇松大水免其田租十二月賑江南饑鄭曉吾學編十一年五月蘇松水災蠲免歴年逋賦遣使行賑飢民舊通志成祖永樂元年詔以蘇松水田量免今年租稅明典彚二年定蘇松等府水淹去處給米則例每大口米一斗六歲至十四歲六升五歲以下不與每户有大口十口以上者止與一石其不係全災内有缺食者原定借米則例一口借米一斗二口至五口二斗六口至八口三斗九口至十口以上者四斗候秋成扺斗還官續文獻通考六月賑濟蘇湖鄭曉吾學編十一月從户部奏請蠲蘇松糧租有差舊通志三年賑江東飢民明政統宗四年賑蘇松等府復業民户舊通志七年發廪賑貸潁州缺食軍民明政統宗八年正月詔以揚州淮安鳳陽軍民疾苦免其被災田租明典彚七月命户部賑安慶徽州鎮江等郡飢民明政統宗十年邳州水災命御史徃賑之明典彚十一年徐州水災民乏食發廪賑之明典彚十二年蠲蘇松五府水災田租舊通志宣宗宣德元年遣官覆視蘇松諸府災傷蠲其税舊通志八月巡撫周忱奏置蘇松等府濟農水次等倉以備賑䘏續文獻通考七年詔蠲蘇松水災田畝租税舊通志八年以濟農倉米賑濟蘇松飢民明通紀九年江南大旱令諸郡大發濟農倉以賑貸之明通紀英宗正統二年淮揚地方被災勅巡撫按視給貸明政統宗九年令揚州府江潮泛漲淹死人民量給鈔收瘞續文獻通考十年蠲免蘇松常鎮等十四府州縣九年水災無徵糧米共四十萬餘石舊通志十三年賑鳳陽等處飢民明政統宗景皇帝景泰二年廬鳳徐淮諸郡大饑發廣運倉賑濟明典彚三年賑濟徐州飢民明典彚四年鳳陽等處大水蠲免本年税糧明典彚山東河南江北直𨽻徐州等處災傷令所在問刑衙門責有力囚犯於缺糧州縣倉納米賑濟雜犯死罪六十石流徒三年四十石徒二年半三十五石徒二年三十石徒一年半二十五石徒一年二十石杖罪每一十一石笞罪每一十五斗續文獻通考英宗天順四年秋江南北大水免徵被災州縣糧草有差明典彚憲宗成化元年勅南直𨽻撫按官賑濟飢民明政統宗二年江淮旱饑命副都御史徃賑䘏之鄭曉吾學編七年以水災免鳳陽府泗州天長盱眙宿州徐州蕭沛碭豐諸縣夏税明政統宗十三年以南直諸府州水災民飢遣使賑濟明典彚十八年南畿饑命户部糶常平倉濟之明政統宗十九年奏准鳳陽等府被災秋田糧以十分為率減免三分其餘七分除存畱外起運者照江南折銀則例每石徵銀二錢五分續文獻通考孝宗𢎞治五年二月詔以水災免蘇松等府衛糧草子粒有差十一月免應天蘇松常鎮太平寧國七府𢎞治四年夏税秋糧舊通志七年江南水災准以存留折銀二十萬兩兌軍米三十萬石分賑各屬明典彚八年五月以水災免應天蘇松常鎮等府𢎞治七年糧草子粒有差又免本年夏麥十之三十一月以滸墅關今年秋冬二季并明年春夏二季課税銀留賑蘇松常鎮四府飢民舊通志十六年命南工部侍郎賑濟江淮明典彚十七年議准蘇松災傷改折起運糧米明㑹典武宗正徳元年鳳陽等府大水令巡撫加意賑䘏明典彚三年五月南兵部尚書言留都地方災傷最甚遣官賑濟明典彚十二月以蘇松等府旱災令無災處所免軍米及兩京俸糧共折五十萬石省其耗費以補災傷地方起運之數舊通志四年丹陽金壇二縣大饑撥蘇常二府米穀賑之明典彚五年以蘇松常三府水災凡起運税糧俱量改折各衛所屯田子粒并視災之輕重蠲免舊通志七年以旱災免蘇松常鎮四府秋糧有差舊通志十三年淮徐等處歲饑截漕運粟數萬石并益以倉儲賑濟明典彚十四年以蘇松常鎮等府水災蠲免夏税有差舊通志十六年鳳陽廵撫奏稱淮徐連歲災傷特以淮揚二鈔關船料銀十五萬兩并發太倉銀三萬兩賑之明典彚世宗嘉靖元年南京江水泛溢遣官巡視賑䘏明通紀二年應天蘇松淮揚徽池等郡徐滁等州大旱特留蘇松折兑銀兩折鹽價蘇常粳白米滸墅關鈔課應天府缺官皂薪贖鍰等金并發太倉銀二十萬兩折漕米九十萬石賑之明典彚三年南畿諸郡大饑令户部侍郎督賑江淮又發帑金十五萬分賑淮鳳二府明典彚五年令鳳陽等處被災州縣税糧照例除免應解物料暫且停徵兩廣鹽價留四萬兩接濟應用續文獻通考七年以蘇松被災蠲免全税發太倉庫銀一百萬兩抵補起存錢糧餘行賑濟舊通志八年令撫按曉諭積糧之家量其所積多寡以禮勸借若有仗義出穀二十石銀二十兩者給與冠帶三十石三十兩者授正九品散官四十石四十兩者正八品五十石五十兩者正七品俱免雜泛差役出至五百石五百兩者除給與冠帶外有司仍於本家豎立牌坊以彰尚義又題准災傷地方軍民人等有能收養小兒者每名日給米一升埋屍一軀者給銀四分隣近州縣不得閉糴又題准各災傷地方守巡官查審流民大口給穀二三斗小口一二斗令各速還原籍續文獻通考三十二年秋議准徐淮水災减免有田有户之人應納税糧五萬石其見在淮徐兩倉米麥専給與無田無户之人或不敷將淮徐附近府州縣該起運兑改及各處見運到淮漕糧内照數截撥補給續文獻通考三十三年題准淮鳳災傷將未完改兑糧待麥熟後止徵折色明㑹典又議准漕運本色十分為率七分徵運三分折徵每正兑米一石連蓆耗徵銀七錢改兑米一石連蓆耗徵銀六錢續文獻通考蘇松等府兵荒相繼盡蠲本年存留錢糧改折起運之半舊通志三十八年兩淮三十塲分災傷異常令支庫貯挑河銀兩酌量賑濟明典彚四十年以蘇松等府水災改折起運糧米停徵宗人府米折京庫折草布絹等銀仍留關税與各府引價事例銀賑濟舊通志四十三年議准淮揚徐州災傷改折嘉靖四十四年應運四十三年分兑運改兑秋糧淮安所屬邳州海州鹽城山陽睢寜五州縣各准三分安東贛榆沭陽宿遷桃源清河六縣及徐州所屬蕭縣各准五分徐州并碭山沛縣豐縣及揚州府所屬興化縣各准六分續文獻通考四十五年淮徐饑命巡鹽御史以修河道銀賑之明政統宗穆宗隆慶三年八月以江南北各府災傷命查蘆洲課銀自嘉靖二十一年至四十三年逋負者悉蠲之九月詔南直𨽻太倉州崇明靖江嘉定溧陽吳江髙淳六合長洲丹徒等縣改折漕糧有差無漕糧者停徵租一年十月免徴鳳陽淮安揚州三府及徐州鐵麻料價銀一年十一月詔減廬鳳淮揚四府徐滁和三州軍餉銀三萬一千餘兩并免鳳陽府民壯銀八千餘兩又將四府三州帶徵積逋銀錢俱行停免又詔免應天等府今年蘆課之半又蘇州松江常州三府改折額解禄米倉糧二年十二月又改折松江府華亭上海二縣漕糧十之五存留蠲免亦如之又免淮安府徐州髙郵州寳應縣嵗徵追捕民壯軍餉三萬四千餘兩又詔留兩淮鹽課銀二萬兩淮揚船銀三季以賑饑民續文獻通考四年二月以水災免直𨽻廬州府屬霍山舒城六安三州縣秋糧有差續文獻通考五年四月以直𨽻淮安府所屬州縣災傷詔停徵積逋馬價九月以南直𨽻銅陵等縣水災詔許改折起運漕糧及蠲免存留有差十月以水災命蠲南京錦衣等衛所及直𨽻揚州等衛所屯糧有差又以徐淮等處災傷許改折蠲免各項錢糧有差仍令有司賑濟如例續文獻通考神宗萬厯九年江北淮鳳及江南蘇松等府災傷著動支各該州縣庫銀倉穀賑濟明通紀十六年吳中大荒發太僕寺馬價及南京户部銀兩賑濟舊通志十七年因災免淮鳳各府本年起運倉麥米十之五又南糧水兑十之三舊通志二十二年三月以徐淮等處去歲水災遣使以兩宫及中宫銀五萬五百兩賑濟又覽給事中楊東明飢民圖命部臣議可蠲可賑者以聞戸部條上以漕糧十五萬平糶江北續文獻通考二十九年十一月戸部覆直𨽻巡按何熊祥題蘇松水災異常乞將嘉定縣永折漕糧姑准減折一年毋分正改每石折徵銀五錢以後仍照原題起解被災十分江隂一縣被災九分以上太倉州吳江崑山武進江隂宜興金壇七縣本年漕糧俱准改折七分仍徵本色三分被災八分以上長洲吳縣常熟華亭上海青浦無錫丹徒丹陽九縣俱准改折五分仍徵本色五分其改折之數不分正改照例每石折銀五錢連蓆板耗脚輕齎在内每同本色齊徵其改折項下運軍月糧亦准扣數免編及查靖江縣被災雖止七分以上姑念疲邑准將該年應解南京光禄寺白糧每石折銀八錢四門倉糙米每石折銀六錢與别縣本色一同徴觧南京户部其正徵帶徵金花銀兩等項已經差官守催速令追完解進及南京各衛倉米已經題准改折毋容别議奉㫖是續文獻通考三十六年蘇松常鎮四府水災詔留税銀五萬兩賑濟明通紀熹宗天啓四年七月賑䘏江南水旱災民十月改折江南漕糧明通紀七年蘇松常大水免本年起存額賦有差舊通志懐宗崇正十四年大旱詔蘇松等府漕米改兑麥折三分舊通志附續文獻通考賑貸羣議一議儲蓄自大學生財有道之外惟積穀可以備凶荒賑饑惄而民不至於流移如漢大司農中丞耿壽昌奏設常平倉以給北邉省轉漕賜爵闗内侯唐開成元年户部奏請公私田畝别納粟一升添置義倉從之又宋淳熙八年浙東提舉朱熹言乾道四年間建民艱食熹請於府得常平米六百石請本鄉土居朝奉郎劉如愚共任賑貸夏受粟於倉冬則加二計息以償自後逐年斂散或遇少歉即蠲其息之半大饑即盡蠲之凡十四年得息米造成倉厫及以原數六百石還府見管米三千一百石以為社倉不復收息每石止收耗米三升故一鄉四五十里内雖遇凶年人不缺食請以是行於司倉我朝正統六年置預備倉民有飢窘卽時驗實賑濟如遇豐年仍依例支給官銀收糴備用嘉靖六年詔各撫按司道督責有司照見行事例設法多積穀米以備饑荒仍倣古平糶法春放支以脤貧民秋成抵斗還官不取息如見在米穀數少各將貯庫銀并問過紙贖銀趁秋成委的當官糴買此時估量添二三文庶來者輻輳易於收積府以一萬石州以四五千石縣以二三千石為率明立簿籍稽查如遇荒年減價糶與貧民按以上數條實積儲良法近來有司率以簡訟為德政而紙贖之入縱不别費亦無㡬何今倣朱子社倉法有司遇年豐時查各集鎮鄉村大處置一社倉勸諭本處得過鄉民輸借或三五石十石二十石不拘多少俱聽其願不許逼廹每倉以百為率不及則以官錢買補之遇春間民缺食聽本處民借用登簿秋償每石加息穀三斗放收委之鄉約保正㸔守責之甲長鄉夫待三四年後所積息穀過其本者仍将原勸借穀石照數退還各主如不願領者以出穀多寡行賞或以尚義匾其門此正所謂以取於民者還以予民不費之惠莫過於此公私俱病惟停蠲則民雖二議停蠲盖嵗值大祲厄於無所入猶幸於無所出我朝永樂十九年詔自十七年以前各處逋欠税糧程課鹽課馬草等項及十八年被水地税糧悉與蠲免宣德八年兩直𨽻河南山東山西凡被災地方自七年以前逋欠夏秋糧户口鹽糧及官軍屯糧子粒詔皆停徵其逋欠各項及今夏秋税糧盡數蠲免嘉靖十六年被災地方應免錢糧已徵者准作本户下年該納之數未徵者照例蠲免何者民間殷實户間有積聚尚堪補一家食指并宗族親鄰枵腹稱貸者惟常税不蠲其素藏遺粒悉供輸納冀免鞭敲而貧民既稱貸無竇又征求不已富者不至於貧貧者不至於流亡不已也惟急議停蠲則為仁政所當先者奈何二三有司或拘泥常限預期征之或恐完數不及碍其遷轉停蠲之㫖方下而税糧數計已完賢者則議抵補下年不肖者扣入私囊竟使朝廷恩澤徒為紙上虚文民轉展溝壑嘯聚為盗咎將誰職凡遇水旱災傷有司速行踏勘申請奏聞速議停蠲庻聖澤不辜民沾實惠矣三議賑濟粤稽漢文元鼎二年江南水潦遣博士等官循行告災所民無令重困吏民有捄賑飢民免其厄者具以名聞宋太平興國八年以粟四萬石賑同州饑咸平三年出粟十萬石賑兩浙貧民我朝嘉靖三十四年歲祲詔發内帑銀三萬兩賑濟飢民盖賑濟所以賙窮民無告者若稍得過之家雖遇大祲無收猶能稱貸富室或百計求活不至流亡惟無告窮民生借無路坐以待斃賙之期宜急賙之法宜圴必須藉仁明掌印官親自臨地清查臨倉調停給散不使有遺吏胥不致漁獵定期赴領隨給不得擔延等候萬一荒村逺域用舟車載至其地散之庻枵腹之民不致斃之倉下仆之中途矣不然雖空竭倉廪而嗷嗷者卒未免為溝中之瘠也惡在其為民父母乎四議撫恤宋天聖七年閏二月詔河北轉運司契丹流民其令分送唐鄧襄汝州以間田處之仍令所過人給米二升初河北轉運司言契丹大饑民流過界河上謂輔臣曰雖境外之民皆朕之赤子可賑救之國朝洪武七年詔各處人民流移願歸或身死抛下老幼還者聽從其便鰥寡篤疾之人貧難存活者有司勘實官給衣糧養贍宣德五年各處百姓因饑逃移者行布按州郡招諭復業仍善加撫恤免其户下税糧雜差盖民以水旱災傷生活無計差税無辦倘遇賢有司多方賙濟設法撫綏緩其賦役寛其逋負貸其種子靖其寇盗葺其室廬尚堪存活不至流竄萬一他邑流移至我疆界須念呻吟愁怨上干天和驅逼嘯聚類致揭木要必撼摇觀望禁諭有術號呼逃竄招撫有方僑寓寄食館穀有備仆憊骼骸贍塟有道擲妻捐子録育有宜不願復業許令附籍思返故鄉資給路費此仁人君子忠厚存心亦弭盗睦隣之大義也五議平糶古稱商賈之事可通於官府盖握權奇時通塞銖較而寸權之亦救荒權宜之一策也大都年凶穀貴小民病之若發官廩減價出糶而四方巨儈販運穀米一時輳集其價自平矣我朝周忱巡撫直𨽻初至蘇松屬大饑穀貴忱㢘得江浙湖廣大稔令人槖金至其地故抑其直勿糴且紿言吳中米價髙甚用是三省大賈販米數百艘集吳中忱乃下令盡發官廩貸民半收其值城中未價驟減各賈進退兩難只得賤糶忱復椎牛釃酒謝之各賈悉大歡而去米價旣平乃復官糴以實廪葢昔耿壽昌之法穀賤増價而糴穀貴減價而糶忱葢祖其法而善用之者但減不可大減増不可過增使不越原值庻官廪不竭而惠可繼矣然所以佐平糶者又在無遏糴俾商販諒我之公凡道經我境者俱運米而來又在無抑價俾商販聞風價值倍常自將輻輳而至慎斯術也復何患米價不漸平而嗷嗷者不甦之生哉在積穀多寡要六議發倉夫近來令甲有司殿最知所積之穀雖民所輸而非民之藏雖君所儲而非君之利盖專為備荒計耳若歲荒穀價騰湧民嗷嗷待哺命在旦夕司民牧者更不必拘泥待報之常期即宜發粟救濟年終彚報以朝廷所蓄活朝廷赤子誰曰不可宋李允元通判寜州㑹歲饑發倉粟數萬賑之民得不流徙國朝夏原吉奉命徃撫三吳饑民奏發倉粟三十餘萬石民頼以濟夏寅以吳中饑投書撫臺發廪二十萬斛糴十萬石三吳頼以全活以上三公皆不拘待報之常而發倉行賑可為後世法倘慮其散之易歛之難必待報聞而後發則枵腹之民不為溝中瘠者鮮矣七議倡義葢富民國之衛也民之依也所謂藏富於民者藏之此矣記曰富則仁義附焉夫好義之心人孰無之要在上之人陽激而陰率之則倜儻之士將浮慕焉而雖嗇夫亦捐千金如敝蓰矣宋程珦知沛縣㑹久雨平原出水穀既不登晩種不入珦計可耕而種時已過矣乃募富室得豆數千石以貸民使布之水未盡涸而甲已露矣是年遂不艱食陳堯佐知壽州歲大饑公自出米為糜以食餓者吏民遂爭出米活數萬人公曰以令率人不若身先而使其從之樂也趙閲道知趙州歲大歉公集富民誘以賑濟之義自解腰間金帶置庭下於是施者雲集全活十數萬人我朝何喬新奉命賑晉中請發内帑并淮鹽銀數萬兩勸貸富室得粟數十萬石活三萬人招回復業者十四萬人附藉者六萬餘户凡此皆以百姓之財救百姓之死倡導鼓舞之機惟豪傑黙運之已耳扶老挈幼八議煮粥盖凶年人民流徙飢餒疾病驅之不前緩之則斃資之錢幣則價湧而難糴散之菽粟則廪歉人衆而難徧惟煮粥庻可救燃眉宋程頤謂救飢者使之免死而已非欲其豐肥也當擇寛廣之處宿戒使辰入至已則闔門不納午而後與之食申而出之日得一食則可不死矣其活力自能營一食者皆不来矣比之不擇而與者當數倍之多也凡濟飢當分兩處擇羸弱者作稀粥早晩兩給勿使至飽俟氣稍完然後一給第一先營寛廣居處切不得令相枕藉作粥須官自嘗恐生及入石灰也我朝萬厯十四年河南彰徳府飢巡撫衷公議發賑餘米數千石及該府庫置銀若干於豐穰處糴米隨在委官煮粥日一餐人給三碗眀年復行開封等州縣如彰徳所全活不可勝計大都煮粥雖救荒下䇿然舉行固自有法葢處之宜廣不宜隘舉之宜同不宜異令行宜嚴不宜寛食之口宜散不宜聚授之餐宜遍不宜頻是在賢守令善行之而己賑給之錢類費而鮮實餔之九議給粟葢凶年行粥或聚而難散惟出公廪之餘藉富室之蓄計口給粟人不過升合家不過斗釡庻㡬乎拯溺救焚之一策也昔趙抃知越州令吏録老稚不能自食者二萬一千九百餘人故事歲廪窮人止三千石抃勸富人及僧道食羡者得粟四萬八千餘石自十月朔起人日受一升幼小者半之市郊各置給粟所共五十七處受粟者男女異地各以便受之且戒富人勿閉糴又出官粟五萬餘平其價糶之為糶粟所十有八處以便糴者又傭民修城為工者三萬八千計工倍與粟棄男女者得收養之全活甚衆蘇次恭為澧州開賑患劄記不公給印厯一本用紙半幅上自書家大人若干小兒若干合請米若干榜於門如虚首出甘罪又請米分㡬人為隊用旗引卯時一刻給第一隊二三刻及辰巳如之即老幼婦女病弱悉得均糴萬厯十五年中州饑時𠂻巡撫貞吉至其地見河北諸郡及他省流寓者甚衆因命所司查勘每大口給粟二斗小口五升活二萬餘人願回籍者計程人給粟日二升又移檄本郡邑計口賑之有地者量給種一時復業者三千餘口以上三公皆得給粟良法舉而行之存乎其人而已嗷待餔命在旦夕救荒如救十議權宜葢飢民嗷焚非大豪傑權宜從事曷克有濟哉昔汲黯奉命按河内適見貧人傷水旱萬餘家至有父子相食者因以便宜矯詔開賑歸請加罪武帝賢而釋之范仲淹守杭值歲大祲縦民競渡日出宴湖上自春至夏富民空巷出游又詔僧修寺及新倉厫吏舍日役千夫監司劾其不恤荒嬉游公乃條叙所以皆欲發有餘之財以惠無者是歲兩浙惟杭無流民范堯夫知慶州飢殍滿路官廪盡空公議發常平封樁粟麥濟之州邑欲俟奏請後發公曰人七日不食死可待報乎吾寧獨坐罪不累若等遂發粟國朝韓文綰南樞歲凶餓殍相枕藉公移咨户部預支官軍三月俸糧度支以未得命為辭公曰救荒如救焚民命在旦夕安能忍死以待也即罪吾獨當之遂發米六千石以上四公皆能便宜從事有地方之責者訪其意而行之則蒼生幸甚江南通志卷八十三
