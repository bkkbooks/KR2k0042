  text: 江南通志卷一百十九選舉志杜佑有言行教化在乎設職官設職官在乎審官才審官才在乎精選舉選舉之法三代以徳行道藝自漢以來多以文藝取之然鄉舉里選之不行因乎風俗明試以功之古制亦先敷奏故唐宋諸人屢議改易卒仍舊格其間得人往往稱盛我朝文教誕敷闢門取士特以闡聖教崇儒學黜浮華敦本實為先所以辨論官才崇興教化之原在此矣首進士天子親策試賜之者也次舉人鄉國所賔貢也次薦辟網羅遺逸昔之制舉今之曠典也而貢監附焉為類三為卷十有九述選舉志第七進士禮王制造士之秀者升諸司馬曰進士先儒謂司馬政官以其可使從政也厯秀士選士俊士造士四級而後得至葢所以待之重矣其論而升之惟其賢惟其能也自漢為禮官甲科射䇿對䇿經義時議皆試以文辭故隋設進士科唐宋因之熙寧問士各占治經試大義次兼經論䇿又制䇿親試始與前明取進士約畧相類本朝因明舊制近復分直省與計偕之數臨期奏請定額於是瀕海邊陬之士駢聯參南省之選而江南之數為尤多也隋大業張損之呉縣人唐貞觀上官儀揚州人來濟揚州人永徽髙智周晉陵人調露馬懐素丹徒人神龍許景先義興人呉少微歙縣人開元王昌齡江寧人許恩江寧人丁仙芝潤州人蔡希周潤州人蔡希寂潤州人儲光羲潤州人陶翰潤州人蕭頴士潤州人張暈潤州人談戭丹陽人申堂構丹徒人程諫休寧人劉太真宣城人張喬南陵人沈郡南陵人天寶歸崇敬呉縣人錢起呉縣人蔣洌義興人蔣渙義興人權臯皇甫曽皇甫冉包佶包何至徳顧况呉縣人廣徳孫革上元人大厯冷朝陽上元人陳潤呉縣人顧少連呉縣人楊凝呉縣人歸登長洲人陸贄蘇州人奚陟揚州人張維儉當塗人王建潁州人陳商繁昌人建中陳羽上元人于公異呉縣人李􅅠揚州人貞元麯信陵呉縣人錢徽呉縣人陸亘呉縣人張貞甫呉縣人張平叔呉縣人沈傳師呉縣人湯賚丹陽人羅立言宣城人張籍和州人元和陸暢呉縣人歸融長洲人施肩吾武進人李紳潤州人權璩潤州人王起江都人王炎江都人王播江都人費冠卿青陽人長慶顧師邕呉縣人太和畢諴呉縣人許渾丹陽人開成陸瓌呉縣人沈樞呉縣人楊假呉縣人歸仁晦長洲人喻鳬義興人㑹昌胡悦句容人項斯江寧人楊嚴呉縣人楊收呉縣人沈詢呉縣人談銖呉縣人顧非熊呉縣人張黯呉縣人趙嘏山陽人盧嗣立秋浦人王鐸江都人王鄂當塗人孟遲青陽人大中楊乘呉縣人畢紹顔呉縣人歸仁翰長洲人蔣伸義興人蔣曙義興人李備南陵人駱用錫南陵人汪遵涇縣人李磎江都人張原祕滁州人許棠涇縣人咸通翁彦樞呉縣人楊昭業呉縣人歸仁紹長洲人歸仁澤長洲人胡學婺源人武瓘秋浦人顧雲秋浦人王季文青陽人周繇建徳人崔璐乾符楊渉呉縣人康駢秋浦人廣明錢珝呉縣人楊鉅呉縣人中和楊注呉縣人光啟陸扆呉縣人顧在鎔呉縣人大順呉仁璧長洲人汪極歙縣人杜荀鶴石埭人景福歸藹長洲人張路斯潁上人乾寧楊鏻呉縣人伍唐珪秋浦人殷文圭秋浦人光化曹松舒州人天復王希羽歙縣人天祐楊凝式呉縣人崔庸呉縣人歸係長洲人附年分無考者邱為呉縣人李赤呉縣人楊發呉縣人徐世業呉縣人崇頴呉縣人張誠呉縣人陸參呉縣人畢知顔呉縣人顔萱呉縣人鄭璧呉縣人司馬都呉縣人莊布呉縣人張浤呉縣人陸賔虞長洲人歸仁憲長洲人歸修長洲人陸器常熟人狀元李邕江都人王式江都人郭𢎞覇舒州人徐仲源舒州人沈佳期廬州人邢文偉全椒人五代梁蕭立蘭陵人晉周穀潁州人南唐盧郢江寧人狀元舒雅歙縣人吕文仲歙縣人查陶休寧人胡昌翼婺源人邱旭宣城人伍喬貴池人狀元湯悦貴池人湯淨貴池人楊文郁貴池人宋乾徳宋維武進人宋絳武進人周絳溧陽人太平興國洪湛上元人張觀武進人張秉歙縣人謝泌歙縣人李含章宣城人馬亮合肥人包令儀合肥人姚鉉合肥人牛冕徐州人雍熙查盛泰州人淩䇿涇縣人端拱龔識蘇州人查拱之泰州人周歸貞泰州人查道如臯人舒雄歙縣人李照歙縣人俞獻可歙縣人楊國華宣城人梅詢宣城人髙惠連宣城人淳化劉少逸長洲人錢昆長洲人丁謂呉縣人淩咸呉縣人謝濤呉縣人陸元圭呉縣人龔緯崑山人葛昭華江陰人周嘉貞泰州人許南史祁門人查拱辰泰州人至道翟驤江都人咸平李諶蘇州人譚應蘇州人胡堯佐呉縣人許洞呉縣人鄭為呉縣人龔紀呉縣人龔㑹元崑山人許式常熟人李起武進人丁咸亨武進人盛賁武進人王盤武進人沈緘江陰人葛宫江陰人陳亞江都人陳知微髙郵人周安貞泰州人鄭載呉江人俞獻卿歙縣人吕士元歙縣人聶致堯歙縣人方仲詢歙縣人程賔王歙縣人盛京銅陵人徐起無為人景徳張處仁武進人錢治武進人胡晏武進人張收武進人閔惟慶歙縣人洪融歙縣人劉懃涇縣人劉湜涇縣人大中祥符謝絳呉江人唐儼呉縣人范巨呉縣人胡獻卿長洲人范仲淹蘇州人富嚴蘇州人林咸徳蘇州人孫岳嘉定人王簡武進人强弼武進人張鑄武進人李仲偃武進人王樞武進人呉遵路丹徒人韋陡丹徒人邵飾丹陽人顧祥金壇人方溥歙縣人方仲兮歙縣人俞希甫歙縣人聶冠卿歙縣人程琳休寧人胡濟婺源人許俞黟縣人汪昊績溪人盛度銅陵人柯茂先建徳人柯光祖建徳人柯文虎建徳人郭維當塗人陳堯卿髙郵人徐越無為人張昷之滁州人徐象賢全椒人天禧錢象先呉縣人鄭修長洲人吕諤華亭人徐天錫武進人錢尚武進人蔣堂宜興人邵梁宜興人仲簡江都人魏平仲歙縣人汪震婺源人張齊宣城人天聖呉感呉縣人鄭條呉縣人范琪呉縣人葉清臣長洲人元絳長洲人范師道長洲人林茂先長洲人林龔明長洲人鄭戩崑山人陳之武