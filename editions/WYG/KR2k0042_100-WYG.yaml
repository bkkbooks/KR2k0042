body:
  text: 江南通志卷一百一職官志文職三宋代節度觀察之職特為虛名不復預方岳之事而監司之任則有帥漕倉憲諸官帥則諸路安撫使漕則諸路轉運使憲則諸路提刑按察使倉則提舉常平倉謂之倉司唐節度多兼觀察及度支營田招討經畧等使宋則監司各有建臺之所毎司專有長官專有掾佐而號令之行於統屬者從此始煩矣按江南舊無安撫自宣和三年始詔江寧與杭越諸州守臣並帶安撫使建炎元年李綱請於沿河沿淮沿江各置安撫使兼馬歩軍都總管二年又令將兵處知州帶管内安撫自是安撫之職始重時諸路又有安撫大使凡二品以上為帥者即以大名之轉運之職肇於唐時諸道分置廵院宋祖懲籓臣擅有財賦不歸王府自乾徳以後始置諸道轉運使多以帥守兼領浸尋日久其權漸重凡賦盗刑獄邊防金榖之任無所不統於是景徳中建提㸃刑獄一司復以知州帶一路安撫鈐轄自領軍事以分其權慶厯中又患其過輕三年詔諸路轉運使並兼按察使毎歳具官吏能否至六年罷之其轉運之在江南者自太平興國二年初置江淮發運使於京師遥掌漕事至道元年始就淮南置局其後屢省屢復俱在淮南之地慶厯七年置司於真州今揚州府儀徵縣乾道以後率以平江府守臣兼領糴運之事云江左提刑之設始於開寶九年遣和峴採訪江南道時係特遣不為專官後置諸路提㸃刑獄尋罷復置紹聖中乃詔三歳一遣郎中御史按察諸路監司是為提刑按察使提舉之官始於熈寧時遣使提領常平倉不𨽻漕臣政和初詔江淮荆浙六路共置茶鹽提舉一員建炎元年詔提舉常平之任併歸提刑至紹興九年復置經制司改常平官為經制某路幹辦常平公事未㡬罷復為提舉常平司東南提舉多以茶鹽司兼領之時江南之地又有總領一官敘位在轉運副使之上淮東總領掌鎮江諸軍錢糧淮西總領掌建康池州諸軍錢糧其屬有糧料院審計司𣙜貨務都茶塲封樁庫贍軍酒庫惠民藥局等官俱統於總領其他若制置使經畧使招討使招撫使鎮撫使等皆有事則設不常置按江南之壤分𨽻七路其中軍州郡府之遷移防團節帥之升降以今考之屬江南東路者六曰江寧府本昇州節度使天禧二年升為建康軍節度使舊領江南東路兵馬銓轄建炎元年建為帥府三年復為建康府寧國府本寧國軍節度使乾道二年升為府徽州池州建炎後以建康路安撫使知池州太平州本軍事開寶八年改為南平軍太平興國二年升為州廣徳軍太平興國四年置為軍屬兩浙路者四曰平江府太平興國三年改平江軍節度使政和三年升為府鎮江府本鎮江軍節度使政和三年升為府建炎三年置帥四年加大使兼沿江安撫使府設西北南三㕔通判常州江隂軍屬淮南東路者十五曰揚州舊領淮南東路兵馬鈐轄建炎元年升帥府四年為徵揚鎮撫使嘉定中淮東制置開幕府於楚州仍兼安撫使亳州本防禦大中祥符七年建為集慶軍節度使宿州建隆元年升防禦開寶元年建為保靜軍節度使楚州紹定元年升山陽縣為淮安軍端平元年改軍為淮安州海州泰州本團練乾徳五年降為軍事建炎四年置通泰鎮撫使泗州滁州本軍事建炎間置滁濠鎮撫使真州本軍事乾徳三年升為建安軍通州髙郵軍開寶四年為軍熈寧五年廢為縣元祐元年復為軍建炎四年升承州置鎮撫使紹興五年廢為縣以知縣兼知軍事安東州太平興國三年置漣水軍景定初升為安東州招信軍本盱眙縣建炎三年升為軍淮安軍清河軍屬淮南西路者八曰夀春府本夀州政和六年升為府乾道三年罷為安豐軍六安軍政和八年升軍廬州本保信軍節度使舊領淮南西路兵馬鈐轄建炎三年兼本路安撫使紹興初寄治巢縣乾道二年置司於和州五年復舊和州本防禦淳熈二年兼管内安撫使安慶府本團練州建隆元年升為防禦政和五年置舒蘄鎮撫使紹興十七年改安慶軍慶元元年升為府濠州無為軍太平興國三年建為軍懷逺軍寶祐五年建為軍屬京東路者淮陽軍太平興國七年建為軍屬京西路者徐州武寧軍節度使屬京西北路者順昌府舊防禦後為團練開寶六年復為防禦元豐二年升順昌軍節度使政和六年改為府其官制更易之畧如此其守令之職宋初分命朝臣出守列郡號權知軍州事其二品以上帶中書樞密宣徽院職事者則稱判太守又設通判以貳軍州之政與州守均禮而判推支使書記録曹之屬謂之幕職宋初縣令常用朝官出宰以重民社之寄其後參用京官幕職及試銜官天聖以後令選猥下為清流所不與靖康初命改官者必為縣令紹興七年詔寺監丞簿等任滿已改官人未歴民事者各與堂除知縣一次乾道二年詔非兩任縣令不除監察御史自是人無不為令者縣令之屬宋初但置簿尉無丞天聖中始置丞於赤縣熈寧四年縣二萬以上者乃置丞嗣後小邑率不置丞以簿兼之統部曹彬昇州行營都部署丁謂平江軍節度使丁徳裕常潤經畧使陳升之韓絳以上鎮江軍節度使慕容延釗越王元傑錢維濬張雍李公藴牛冕以上淮南節度使李參張景憲喬維岳王嗣宗李昌齡范正詞張燾李師中馬仲甫李沆魯宗道呉中甫胡令儀蔣堂呉居厚陳遘以上淮南轉運使髙安期王宗望趙賀薛奎李先沈立李溥黄震賈宗張瓌張綸楊允恭張商英蔣之奇以上江淮發運使王􅎦韓億龔鼎臣以上淮南安撫使凌策淮南東路安撫使王巡徳楊景宗以上舒州團練使趙宗望舒州防禦使張詠翁彦國以上江東安撫使孫甫江東轉運使譚延美廬夀濠巡檢使雷有終保信軍節度使王審琦忠正軍節度使韓琦司徒出鎮淮南郭從義髙繼冲王全斌陳洪進曹彬夏竦以上武寧軍節度使潘美潁州團練使孔守正馬知節竇貞固杜彦鈞以上潁州防禦使趙承慶趙守巽劉師勇以上和州防禦使趙師巖和州觀察使分轄楊克讓賈黄中劉保勲韓遂許驤源䕶雷有終盧文正陳欽祚髙象先郭異李偉宋覃張繼美吕祐之劉知信馬亮薛暎丁謂以上昇州知州薛顔王欽若王随李廸張士遜滕渉李允元李若水陳執中張若谷盛京郎簡葉清臣劉沆楊告李宥張奎張方平皇甫泌劉湜向傳式包拯王琪梅摯馮京魏琰郭申錫王贄彭思永吕溱龔鼎臣王安石孫思恭呉中復錢公輔沈起傅堯俞沈立葉灼元積中吕嘉問孫昌齡孫坦劉庠陳繹王益柔王安禮楚建中蔡卞林希熊本謝麟黄履陸佃曾肇曾布何正臣吕惠卿陳軒吕升卿葉濤陶節夫鄧祐甫陳祐甫朱彦王漢之徐勣蔣靜姚祐范坦曾孝藴盧航沈錫曾孝序薛昻呉拭蔡嶷俞㮚張莊盧襄曾孝緒宇文粹中李彌遜趙明誠以上江寧府知府閻象梁周翰柴成務宋璫魏庠陳省華裴莊喬維嶽張去華王贄梅詢劉師道皇甫選曾致堯黄震秦羲方仲荀陳靖孫冕康孝基李適葉參周實盛度黄宗旦王􅎦陸東朱㢲崔軻范仲淹陸若李宋卿柳植張億柳灝富嚴吕溱林濰趙槩滕宗諒胡宿梅摯蔣堂王琪李仲偃邵飾吕居簡唐珣王彦臣蔡抗李汶圭鞠真卿陸經裴煜沈扶李綖葉均陳安石潘夙唐詔嚴君貺章岵程師孟王誨胡宗愈滕甫韓朴楊景畧韓鐸孫覺晏知止呉安持林希劉淑劉珵王覿黄履范鍔賈易劉定呉居厚蔣之翰賈青王子京吕公雅祝安上陳師錫張公庠呉伯舉張恕黄誥邵䶵王漢之蔡渭郭茂恂許光凝孫傑呉栻李孝夀王誥馬防盛章以上知蘇州宋康年應安道賈諲樓异胡直孺季倫王靚以上知平江府丁徳裕王詵楊大雅李昭述王禔陳商李餘慶彭思永范師道王安石陳襄呉遵路李載朱彦李孝節徐申安泳魏憲以上知常州軍州事崔立范宗古朱昌符張其葛閎楊士彦以上知江隂軍劉䝉正柳開魏瓘劉師道王随龎籍范仲淹劉立之王琪張昪錢公輔滕甫孫覺王安禮鞠真卿許遵王覿張耒龔原曾布葛蘩俞㮚以上知潤州軍李圖南林震蔡居厚毛友虞奕李堯文柳庭俊趙億梅執禮蔡翛李皓以上知鎮江軍府事沈起張傳李宣魏亷以上知楚州鮑田孫洙王祖道張叔夜以上知海州蕭均米芾李盛趙槩以上知漣水軍田畫知淮陽軍石守信李䖍耘王賛張延嗣楚昭輔邊翊侯贇段思恭侯陟董儼張觀趙延進薛居帷王賔王禹偁魏羽柴成務王化基曾致堯凌策許逖薛顔戚綸王随王允明周起盛京杜衍盛度朱㢲范雍陳執中張若谷宋庠蘇紳陳商韓琦張奎歐陽修蘇舜元楊察柳植張顯之孔宗翰包拯唐介許元韓宗武錢明逸王琪刁約韓縝裴煜朱夀隆徐綬彭思永田諒李兌馮京錢公輔王居卿章岵陳升之狄棐鮮于侁許將黄好謙王益柔吕公著蒲宗孟楊景畧章濯劉敞吕惠卿鄧綰王安禮章惇謝温仁蔡京滕元𤼵王存李承之張璪蘇軾蘇頌章衡程嗣恭蹇序辰林希張耒陳軒龔原曾肇呉伯厚蔣之奇王資深章縡管師仁張詢劉拯范鏜彭汝霖范坦周種呉執中王渙之石公弼吕益柔林攄張子憲唐恪許光凝周燾徐處仁洪中孚薛嗣昌徐鑄毛友王本李回許份呉敏李康梁揚祖以上知揚州王文祐田錫謝濤晏殊孔道輔張綸張次山陳瓘曾肇以上知泰州軍梁周翰毛滂邵必姚兕楊蟠陳敏呉鑄以上知髙郵軍王素胡安國以上知通州孫構向子忞以上知真州馮瓉李孝基李炳趙孚樂史楊澈唐肅吕溱王安禮孫鍔朱公綽楊希元游酢李師中舒雅黄庭堅孫傑林希以上知舒州蘇簡能蘇徳祥李度李維趙昻方演謝濤曹修古黄珀歐陽穎蘇夀錢仙芝王琪張經吕元規張慎修潘玨王擴徐總黄誥顧臨董正封虞賔曾鍔狄樞丁湜曾孝藴吕灝劉光許頌梅澤蘇補衮王舉直江渢郭師中張仲珪盧宗原唐作求上官恢以上知歙州李幹賈黄中桑塤魏咸熙潘仁謙髙適羅延吉許驤楊緘李凖鄭驤賈昭明胡克順張樞宋鸞曾㑹楊舉正董龜正朱載裴莊盛梁邊肅劉徳基曹定裴光元馮璉盧革彭愈李榖李含章凌策蘇國華髙儼章頻蘇維甫江嗣宗晏殊蘇為葉參柳植劉随沈同楊蛻夏侯圭葉清臣俞獻卿呉遵路呉待問趙宗道郭輔袁抗邵飭彭思永馬遵吕士龍湯夏孫錫章岷宋任刁約余良肱沈括沈紳沈立石鑑丁竦唐淑問陳侗蔣續侯利建黄庭堅劉安節蔡卞林希周之純張修傅燮朱服賈易王安禮章衡張耒何正臣沈銖朱安國劉涇陳師錫劉珵邵材何正中鮑朝賔路昌衡何琬李彦卿席旦韓崇直錢遹吕宗鄧祐甫曾肇虞漢何甫檀宗旦陸傳王磐翟汝文沈錫俞燾上官復錢昂張叔夜呉長吉管思可魏憲以上知宣州樊若水成昂梅詢李虛己楊告王逵王贄閔郎中陳昱關魯雍孝聞沈立包拯呉中復王哲陳桶周應龍葉凱羅彦輔鄭雍吕溱呉蔚張存明胡則劉斁錢勰滕元𤼵勾濤詹延年吕廣問席旦張士詡章嵩以上知池州李雅知平南軍宋凖王洞王仲華陳若拙何䝉陸若冲張正中施昌言楊畋李寛宋敏求張伯玉章峴王承祐李仲卿彭思永張瓌畢仲逹吕希哲梅灝盛仲孫黄庭堅韓忠直王景修王資霍漢英徐勣何昌言樂昭厚唐秷陸藴劉㑹元單暐徐禋周需范垍臧祐之沈思以上知太平州馮瓉楊景明趙安易劉䝉叟刁衎魏震趙良規趙鎔宋太初佘獻卿楊日嚴劉綜陳堯佐馬亮劉筠梁頠張子憲唐詢馮京陳希亮張億林濰包拯張田呉及吕公孺吕公弼李端愿李柬之鄭興劉定傅堯俞孫覺穆珣吕居厚王質李良輔蹇周輔朱服楊汲陳軒章衡龔原陳師錫蔣猷林顔翟汝文馮詢以上知廬州楚建中茹孝標雙漸米芾王蘧胡伸楊傑陳瓘以上知無為軍程端中知六安軍王郁韓丕崔立趙抃游酢梅詢劉䝉叟何䝉連南夫以上知濠州楊覃曾致堯楊察柳植魏琰連庶朱景呉奎以上知夀州彭訢知順昌府楊重勲任布趙秉趙尚寛劉航朱夀隆馬從先石揚休李昉陳希亮富紹庭石昌言以上知宿州張茂植畢士安周起張師徳柳植李士衡劉筠夏竦歐陽修陸經蘇軾薛向章衡徐宗况趙宗道李評陸佃陳師錫燕肅林攄錢象先蔡齊王旭王襄以上知潁州郭廷謂王洙宋祁李廸晏殊楊大雅宇文虛中蘇頌蒲宗孟韓億張知白王統富弼宋庠曾鞏歐陽修張商英彭思永王徳用馮京劉攽晁補之馮熈載曾悟鄧洵武以上知亳州朱昂知泗州畢再遇呉說以上知旴􅇇軍侯贇馬元方梁鼎趙徳彞陳文灝陳興呉元扆閻日新戚綸薛顔張宗誨徐起孔道輔李廸趙及王洙孫沔吕公綽吕溱任顓孫祖徳趙槩韓贄傅堯俞蘇軾孫覺馬黙彭汝礪杜純孔宗翰楊汲曾肇賈易劉奉世徐處仁以上知徐州牛冕王禹偁韓丕張禹珪歐陽修張方平蔡挺陳鐸蔡延慶章衡陳知新沈希顔曾肇唐恪梅執禮以上知滁州劉沆王欽臣劉摯胡宗愈呉居厚范純仁吕希道賀鑄以上知和州成悦梅詢錢公輔朱夀昌孫覺石公弼賈易孫諤陳禾上官均周烈以上知廣徳軍江南通志卷一百一
