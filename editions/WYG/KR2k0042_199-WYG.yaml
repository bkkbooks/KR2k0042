body:
  text: 江南通志卷二百雜類志辨訛贛榆故城按贛榆故城有二一為漢縣在贛榆界一為唐縣在海州界詳見海州古蹟舊志乃云在贛榆縣北青山之隂混二城為一地亦舛錯也沭陽故僮縣元和志沭陽縣劉宋元嘉四年於此置僮縣屬南彭城郡按漢僮縣在今鳳陽府虹縣界宋書志北下邳郡有僮縣乃泰始中失淮北後僑立在廣陵界俱非今縣境帷蕭子顯齊書志北東海郡領僮縣當即今縣也海州之廢沂州寰宇記廢沂州城在縣西一百四十步宋泰始三年失舊沂州五年於胊山東北僑置沂州至泰豫元年移朐縣就泝州北周建徳六年改沂州為胊州隋開皇二年省按宋志無沂州惟徐州注泰豫元年移治東海胊山則沂州當即徐州之譌且隋志亦無朐州恐皆舛誤也休寜之黎陽廢縣黎陽廢縣在今休寜縣東南黎陽鄉屯溪率口之間而寰宇記謂有隋廢休寜縣在縣東南三十五里南當水口按隋氏休寜治萬嵗山乃孫休時海陽舊地不應復有此址當是誤以黎陽為休寜也當塗之小丹陽括地志丹陽故城在江寜縣東南五十里九域志當塗縣有丹陽鎮即故縣也而班固地理志丹陽郡丹陽縣注曰楚之先熊繹所封陳宣帝詔亦曰邇熊繹之遺封按楚始封之丹陽史記徐廣注在南郡枝江正義云歸州秭歸縣東有丹陽城熊繹始封是與此相距幾千里非吴地之丹陽也而當塗之故丹陽城乃吳地之丹陽漢置丹陽郡治宛陵而丹陽別自為縣因有小丹陽之名班固以此為楚始封之丹陽誤矣胊縣非臨胊魏書地形志琅邪郡朐縣二漢屬東海郡晉曰臨朐屬琅邪郡按漢臨朐縣有二一屬齊郡一屬東萊郡東漢屬齊國晉屬東莞郡與朐縣両地晉東海郡仍有朐縣未甞改為臨朐也通鑑注朐縣晉曰臨朐屬東莞郡魏復曰朐屬琅邪郡亦承魏志之訛厚邱訛廩邱漢厚邱縣後魏改曰沭陽即春秋時魯之中城邑杜註云在東海禀邱縣西南按廩邱齊邑左傳襄二十四年齊烏餘以廩邱奔晉杜註云今東郡禀邱縣故城是一齊邑一魯邑非即厚邱也晉東海郡無廩邱縣杜註當屬傳寫之訛而舊唐書志云沐陽漢廩邱縣是又因杜註而訛矣通州靜海縣五代史職方考周世宗置通州分其地置静海海門二縣為屬而治靜海是靜海縣周世宗所置宋政和七年以通州置靜海郡仍領靜海海門二縣而續文獻通考云靜海縣宋置靜海郡時並置縣是未考五代史之故耳廬州應劭曰廬州古廬子國也通典因之而復云左傳自廬以往即此地考左傳杜註廬今襄陽中廬縣漢屬南郡與廬江郡之廬名同而地異又廬州古蹟有同食館唐元和中刺史路應求建亦採左傳自廬以往振廪同食之義爲名其誤與通典同古英國史記夏本紀封臯陶之後于英六註索隠曰地理志六安國六縣咎繇後偃姓所封英地闕正義曰英即蓼也又曰英後改為蓼數説不同蓋英地久已無可考矣今英山縣始見於元史志續文獻通考云英山縣本羅州羅田縣東鄉地宋淳祐間立鷹山寨咸淳初改名英山因立為縣屬六安軍是英與鷹以音同而改非即古英國也英山志云縣有英布宅又因布姓英氏而附㑹其説耳丹徒曰京通典漢建安十三年吳鎮丹徒築城南靣西靣各開一門因京峴為京鎮因門為京口而文獻通考復引爾雅絶髙曰京為証則京當因丹徒峴而得名然三國以前丹徒未有京之名蓋孫權初鎮丹徒謂之京城侈大言之耳東晉至梁陳皆以此地為京城而建康謂之京邑十字碑丹陽縣延陵鎮西北九里延陵季子廟中有孔子書嗚呼有吳延陵君子之墓十字舊謂之十字碑開元中勅殷仲容摹刻大厯十四年蕭定重刻石又江隂縣申浦延陵季子墓亦有是碑但譯其文君子作季子字畫小異一刻於廟一刻于墓皆至聖遺蹟也而廣川書跋云仲尼書延陵墓碑今入淳化官帖中不類豐碑石柱所刻書亦異籕文又孔子未甞至吳其書是非不可考也唐人于季子墓刻此十字張從申書其後而籕字極大一書而傳於世者大小不同竟誰當其傳哉書跋之說蓋疑其非真矣然考李陽氷書初學嶧山後見仲尼書季札墓字便變化是碑陽氷所從得法又古於嶧山以書品論之亦未可輕議也溧陽舊縣溧陽舊縣有二一秦置縣于古固城在今髙淳縣界固城湖之側隋開皇九年改為溧水縣而故城廢一唐武徳三年析溧水地復置縣在今縣西北四十五里又李賀記云孟東野貞元中為溧陽尉溧陽昔為平陵縣縣南五里有投金瀬瀨南八里有故平陵城而縣志亦云平陵廢縣在縣西北四十里平陵山西與賀説合唐天復元年始移今治土人猶謂其處曰舊縣村舊志并為一條遂混黟縣黟縣之名舊有二説劉煦曰黟音同䃜縣南石墨嶺出石墨故也圖經云新安貢柿心黑木故以名縣二説皆穿鑿字義似乎近纎考新安志黄山舊名黟山秦置黟縣取義于此南畿志從之其説為正松滋廢縣通典云霍邱漢松滋縣續通典云宿松縣漢元始中為松滋縣屬廬江郡晉武帝以荆州有松滋縣遂改為宿松両説互異考漢書志廬江郡松滋縣東漢時省三國魏置安豐郡復置松滋縣為屬晉以後因之至隋始改名宿松故隋書志無松滋縣唐武徳初别置松滋縣屬蓼州七年省入霍邱縣通典以唐蓼州之松滋為漢松滋誤也至續通典晉改宿松之説考宋南齊志安豐郡仍有松滋縣則以隋改名為正霍邱志松滋廢縣在縣東十五里漢初置松兹侯國在今宿松縣界後漢省唐初改置于此武徳七年廢考核最明又寰宇記松兹一名祝兹即古鳩兹春秋鳩兹邑在蕪湖縣既非宿松亦非霍邱記又誤矣六蓼六蓼二國虞夏以封臯陶後六後為六安州蓼後為霍邱縣本無可疑一説六蓼故城俱在夀州而遂以六安州為漢􅅗縣霍邱縣為漢松滋皆非也碭山秦置碭郡治碭縣本因山得名其後或為碭縣或為碭山其名屢易而縣治亦遷改不常今縣屬徐州而山則在歸徳之夏邑境舊志謂山在縣東南誤也崑山吳郡婁縣梁大同初分置崑山縣本取縣界山為名唐天寳中割縣之南境置華亭縣而崑山遂在華亭界後蘇人以馬鞍山為崑山而松人翻以崑山為小崑皆非也皖城在􅅗山辨皇輿全覽及明一綂志皆云元至治三年分懐寜清朝玊照二鄉於故懐寜置潛山縣南畿志亦云潛山古有城即府治故址葢懐寜縣東晉安帝時置地在三國吳之皖城故新唐書志云懐寜縣有皖山又圖經云縣之最著者有潛皖天柱三山以地言之則曰潛山謂其逺近山勢皆潛伏也以國言之則曰皖山謂皖伯所封之國也以峰言之則曰天柱指其最髙者名之也而三國吴之皖城在今懐寜縣之北今潛山縣亦在懐寜縣之西北一百四十里則南畿志所謂古有城者即是吳之皖城及元分懐寜為潛山而潛皖天柱三山皆在潛之境内則今之潛山即古皖伯所封之國在吴謂之皖城在東晉以後謂之懐寜在元以後謂之潛山馬端臨所謂郡邑有時變更山川終古不易者也又考一綂志今之懐寜宋端平三年隨府南徙則皖城在潛山無疑而以今之懐寜為皖城者誤也安豐城有二辨一在霍邱漢置安風縣後漢為安風候國三國魏置安豐郡晉安帝省宋末復置東魏郡縣俱廢水經注淮水東為安豐津水南有城故安豐都尉治後立霍邱戌是也此在霍邱之西南界一在夀州沈約宋志南豫州安豐江左僑立晉安帝省為縣宋齊梁間屢復置隋開皇初郡廢以縣屬淮南郡唐屬夀州明初省寰宇記縣在夀州南八十里今為安豐鄉水經注渒水西北逕安豐縣故城西是也古舒縣古龍舒考舊説及府縣志皆以舒城為古舒縣而以廬江為古龍舒按蕭齊志廬江郡舒縣注建元二年為郡治隋書廬江縣注齊置廬江郡梁置湘州據隋志所云置郡之地與齊志合觀是舒與廬江皆為郡治而今之廬江即古之舒縣明矣但其改舒縣為廬江不知何時梁陳無志可考隋志又不詳後人縁此致疑然其實一也又按漢志廬江郡所領有舒龍舒二縣杜預注廬江南有舒城舒城西南有龍舒明是舒縣在東龍舒在西今舒城在廬江之西則舒城之為龍舒尤為明證且其縣唐時所置上取古舒城為名後人泥其名以為即古舒縣遂反以廬江為龍舒誤矣取慮臨潼二城舊志謂取慮漢縣後魏置臨潼郡謂之臨潼城在虹縣北一百二十里按虹縣北六十里即睢寜界取慮既在虹縣北一百二十里尚得謂虹縣地乎又按秦二世二年取慮人鄭布同起兵圍東海則取慮秦已有之又按臨潼故城在今靈璧縣東北七十里金志元光初議于靈璧縣潼城鎮設倉都監是也而取慮又在臨潼東北屬睢寜界魏収志云臨潼郡治臨潼城孝昌中陷武定六年復置兼置晉陵縣為郡治又云梁武置潼州武定六年改置睢州治取慮城是取慮臨潼本為二城後人混為一城誤以潼州為潼郡也故虹城按故虹縣在今五河縣西元和志云武徳四年在今虹縣南百里故虹城重置虹縣十三年移於今理即今虹縣也計虹縣南四十里即入五河界則故虹城之在五河明矣舊志入虹縣誤潁州非平輿辨後漢地理志汝南郡有平輿有沈亭故國新唐書地理志蔡州有平輿注云貞觀元年省入新蔡天授二年復置宋史淮西路有夀春安豐霍邱而無平輿疑是時平輿已入金矣輿圖偹考于河南沈邱下注云古沈子國漢平輿合諸漢志平輿有沈亭之説相符則平輿的在沈邱潁州志以平輿人如陳蕃許劭之倫俱載入者誤僑立州郡考輿地沿革南朝僑立州郡以處過江人士其在今鎮江界者曰南徐州曰南東海郡又曰南彭城又甞置郯朐利城祝其厚邱西隰襄賁等七縣寄居曲阿蓋南朝北境僅得徐州彭城之半而東海郡縣郯朐利城等與南朝為近其人民多來遷者故不没其舊地名以安挿之所以彭城東海何劉諸族不得不為鎮江人物然竟同之土著則無别今約略其來居未久者入流寓蘭陵舊通志蘭陵諸蕭俱載鎮江者以西晉毘陵郡兼轄今常鎮之地後分丹徒曲阿為武進梁又改曲阿武進為蘭陵是今丹徒丹陽亦曽稱武進稱蘭陵矣人物之所以混也今亦莫辨其全與鎮江無渉但南蘭陵之名夫人知是常州則諸蕭入常州府為宜䝉城非莊周故里辨按䝉邑前漢地里志屬梁國今歸徳府地而江南之䝉城在漢為山桑縣屬沛郡至五代時始置䝉城史記以莊周為䝉人應在梁國而非五代所置之䝉城矣商邱縣有小䝉城云是荘周故里宿遷舊説宿國甞遷此故名按歐陽忞曰晉元帝督運軍儲於此以為邸閣因有宿預之名安帝遂立宿預縣唐時以代宗諱始改宿遷與宿國無預毘陵晉陵辨晉永嘉中東海王越食邑毘陵以世子名毘改毘陵為晉陵事詳宋書州郡志而晉書地理志但言毘陵之置而不及晉陵之改明一綂志則云東晉改晉陵按此乃西晉之制非東晉也二志皆未詳􅜊白公勝封邑廬江郡慎縣文獻通考云白公勝邑按左傳子西召勝使處吴境為白公杜註白楚邑也汝隂郡褒信縣西南有白亭是勝之封邑在褒信矣白公敗吳於慎非封慎也至廬江郡之慎縣乃江左僑置本漢九江郡逡遒縣之地而通考混為汝隂之慎訛之訛矣宋國地辨春秋宋國之地今屬江南者惟徐州之彭城蕭二邑宿州之相銍二縣而國都則在河南歸徳之商邱所謂閼伯之墟微子之所封是也舊志凡宋大夫華元樂喜向戍諸人皆入鳳陽府人物者非至汝隂郡新郪縣東漢章帝以封殷後因改曰宋本七國時魏地舊志蓋誤以東漢宋縣為春秋之宋耳焦山鎮江之焦山相傳為焦先所居按髙士傳云焦先世莫知所出或言生乎漢末自陜居大陽及魏受禪結草為廬於河之湄止其中其後野火燒其廬先因露寢遭冬雪大袒卧不移則先為魏人非吴人明矣更考魏略曰中平末先年二十餘避亂客揚州建安初西還陜界是先東下時年尚少未幾即還其居兹山與否不可知或因山名偶同其姓遂附㑹之耶建徳縣堯城舜城寰宇記舜井城在縣南四里城中有舜井故名按元和志堯城在縣南舜城在縣北本為二城寰宇記遺去堯城而以縣南為舜城皆舛也亳州之湯陵桐宫桑林皇覽云湯冡在濟隂亳縣東北郭去縣三里金仁山謂桐宫在州東三里新志乃謂州即湯都且有桑林湯陵諸蹟是竟以亳州為古亳地矣按今亳州乃漢譙縣為魏武故里至尚書三亳其西亳為今偃師去州絶逺北亳為䝉城南亳為榖熟皆在今歸徳府商邱縣境商邱有大蒙城小蒙城非即今亳州所屬之蒙城縣也相去亦百餘里漢晋諸儒從無以譙為亳之説至後周始改為亳亦遥取商邱之亳為名耳又按括地志云洛陽偃師縣東有湯冢近桐宫則非今之亳州明矣故如桐宫桑林諸蹟皆不載下邳白門後漢書云曹操自将撃吕布至下邳城下布與麾下登白門宋武北征記云下邳城有三重魏武擒布于白門大城之門也是白門之在下邳無疑矣三國魏志云太祖軍至彭城陳宫謂布宜撃之布曰不如待其來攻蹙著泗水中及太祖攻之急布於白門樓上謂軍士曰卿曹無相困我自足當明公而輿地志謂白門徐州南門今按魏志云不如待其來攻是至彭城時猶未軍臨城下也曰及太祖攻之急則已及下邳矣且建安初先主為徐州牧屯下邳吕布擊取之三年曹操攻吕布於下邳决泗沂水以灌城擒布殺之操之擒布在下邳則布所登之白門樓其為下邳又何疑焉輿地記未審考也滁陽城寰宇記滁陽城在廬慎縣東北六十四里吴赤烏三年遣兵斷滁作堰以淹北道遂築此城按吴志赤烏十三年遣軍十萬作堂邑涂塘其地在全椒六合二縣界與合肥尚逺又晉書志江西廬江九江之地自合肥北至夀春悉屬魏時廬江郡居巢襄安諸縣江津要害之地雖為吳所據豈能越境築城于此當是魏人所築以偹吴耳焦城通典亳州理譙縣周武王封神農之後於焦即其地也有古焦城考史記周本紀註地理志𢎞農陜縣有焦城故焦國也據此則非亳州之譙矣譙本春秋陳之焦邑左傳僖二十三年楚代陳取之古焦城蓋陳楚時舊城耳金山城周公墩金山縣有金山城捍海塘外有周公墩皆昔人所築戍兵防海之地而舊經云周康王南逰築此城以鎮大海墩與孔宅為周公孔子遺跡周康王未甞南巡周公未甞至吳其謬妄不待辨也一説吴越錢氏築以戌守近是周瑜城舊志謂吳周瑜從孫權舉義徙家於舒因築此城按瑜本傳瑜廬江舒人孫堅興義兵討董卓徙家于舒堅子䇿與瑜同年友善瑜推道南大宅以舎策升堂拜母有無通共是瑜本家于舒徙家者乃孫氏也謂瑜徙家于舒者訛傳稱孫堅興義兵而志謂孫權亦訛丹陽人物兩漢三國丹陽郡治宛陵而丹陽别自為縣在今江寜溧水之間至隋始省入溧水縣自隋以前諸史所載之丹陽人皆屬江寜而寜國府志亦間載之蓋誤以郡為縣耳又唐武徳初復析置丹陽縣貞觀元年省入當塗故太平亦有丹陽之地而府志因載入隋以前丹陽人物皆誤天柱山天柱山舊名南嶽髙七千餘仞綿亘數百里連跨安慶六安界其南曰潛山其北曰霍山皆此山也史記武帝登禮灊之天柱山號曰南嶽應劭曰灊縣屬廬江南嶽霍山也水經注灊者山水名也開山圖灊山圍繞大山為霍山爾雅大山宫小山曰霍郭註云宫謂圍繞之自唐以前皆以灊霍為一山至通典以霍山為漢灊縣地則天柱似専屬六安而懐寜縣註復云有灊山一名天柱山其説両岐明楊循吉求其説不得遂謂灊山縣别有一天柱山非漢武登封之南嶽灊山去六安僅數百里山川亘互安得有両天柱乎睢水舊通志小河在靈璧縣城北六十里即睢水項羽大破漢軍於靈璧東睢水上即此所引與史記合而徐州之睢水復云楚項羽敗漢睢水上水為不流即此兩地不同而一事疊見誤矣蟂磯蕪湖縣西南七里大江中蟂磯相傳昭烈孫夫人自沉于此有廟在焉顧炎武云按蜀志先主既定益州而孫夫人還吴又裴松之註引趙雲列傳曰先主入益州雲領留營司馬時孫夫人以權妹驕豪多将吳吏兵縱横不法先主以雲嚴重必能整齊特任掌内事權聞偹西征大遣舟船迎妹而夫人欲將後主還吴雲與張飛勒兵截江乃得後主還是孫夫人自荆州復歸于權而後不知所終蟂磯之説殆妄今考蕪湖吴地夫人既以蜀為重必不肯當先主之出而挈子歸吴既已歸吴又何必以身殉蜀既欲殉蜀又何不死于蜀地而死于吴地皆不可解似當以顧説為正花靨鎮宋孝武帝建含章殿帝女夀陽公主人日卧殿簷下梅花落額上號梅花粧其地在建康城宫内而夀州之花靨鎮亦以夀陽公主梅粧而名附㑹極矣馬頭戌梁天監五年取魏合肥魏人守夀陽于馬頭置戌普通五年梁取夀陽亦置戌于此其地在夀州西北二十里或以為即馬頭郡者誤晉安帝于故當塗縣置馬頭郡在懐逺縣西南二十里非夀州也泗州挂劍臺寰宇記挂劍臺在大徐城臨朱沛水相傳為季子挂劍處括地志徐君廟在泗州徐城縣西南一里即延陵季子挂劍之徐君也按泗州為古徐子國大徐城即古徐子國也漢之徐縣隋之徐城縣皆泗州地而舊志或入於邳州或入於徐州誤矣新亭勞勞亭新亭在江寜城西南丹陽記云吳所築東晉後名士多讌集於此見王導𫝊梁簡文帝亦有侍逰新亭應令詩是也勞勞亭在江寜城南勞勞山上古送别之所見李白詩上有望逺樓宋時改臨滄觀與新亭兩地所記甚明而建康志云新亭壘在城西南十二里其亭乾道五年留守史正志即故基重修臨滄觀在今城南顧家寨路東輿地紀勝云新亭在江寜十里俯近江渚今名勞勞亭輿地志云新亭壘上有望逺樓宋改曰臨滄觀即勞勞亭故基兩亭合而為一非也揚州東閣舊志云舊傳揚州有東閣為梁何遜咏梅之所按今之揚州梁為南兖州廣陵郡其時揚州治丹陽郡今江寜府也何遜本傳天監中起家奉朝請遷中衛建安王水曹行參軍兼記室建安王者南平元襄王偉初封天監六年遷使持節都督揚南徐二州諸軍事右軍将軍揚州刺史則何遜東閣咏梅當在丹陽郡不在廣陵郡矣楊慎丹鉛録亦云遜未身到揚州揚州亦無東閣揚州文選樓明一統志曹憲為隋祕書監以文選教授生徒李善魏模輩皆出其門所居名文選巷故樓以憲得名按大業拾遺記云梁昭明文選樓隋煬帝甞登眺焉是樓以昭明得名不因憲也陸機祖祠華亭普照寺有陸將軍祠為廣衛將軍相傳為陸機之祖按吳志機祖遜初拜撫軍將軍又拜鎮西将軍又拜上大將軍吳因漢制雖置雜號将軍而考之遜𫝊未甞有廣衛之稱若機曽祖紆守城門校尉髙祖駿九江都尉亦未甞位至将軍也段秀實宅舊志英山縣有段秀實宅按本傳秀實姑臧人自安西府别將以至四鎮北庭行軍涇原鄭潁節度使其生平宦績所至皆在西陲大厯十三年朝京師賜第一區應在長安舊志以秀實曾領鄭潁又甞賜第遂舉英山之響山以實之不知秀實開府地實在涇原而鄭潁不過遙領以資軍實耳觀馬璘傳云涇軍乏財帝諷李抱玉讓鄭潁可見而秀實之為帥實代馬璘則鄭潁非其所厯而有宅之説誤矣定遠縣死虎亭宋書死虎亭去夀陽二百里應在今定逺縣西南通典云在夀州東四十里誤又按殷琰劉勔傳皆作宛唐而黄回王敬則劉懐珍劉悛王肅𫝊皆作死虎水經注又作死虖三説不同皆以字形相近而訛也建陵辨梁武帝父追尊為文皇帝廟號太祖陵曰建陵陵有碑曰太祖文皇帝之神道歐陽修集古録以為宋文帝神道碑按宋陵號長寜自在蒋山特其碑中八字與宋主廟號同故誤以為宋也二陵見宋齊二書建康實録甚明郭璞墓顧炎武云晉書郭璞𫝊璞以母憂去職卜𦵏地於暨陽去水百歩許人以近水為言璞曰當即為陸耳其後沙漲去墓數十里皆為桑田王惲集乃云金山西北大江中流亂石間有叢薄鴉鵲棲集為郭璞墓按史文元謂去水百歩許不在大江之中且當時即已沙漲為田而暨陽在今江隂縣界不在京口又所𦵏者璞之母而非璞也世説載璞詩曰北阜烈烈巨海混混纍纍三墳惟母與昆則璞又有二兄同𦵏據此則王惲所云乃因史文而附㑹之又以璞之母墓而訛為璞墓皆世俗沿青烏家不經之説也明沈周詩氣散風衝豈可居日本使臣詩墓前無地拜兒孫早已識其妄矣二疏墓沈括筆談云海州東海縣西有二古墓石延年通判海州因行縣見之曰漢二䟽東海人此必其墓也遂謂之二䟽墓刻碑其旁後人收入圖經予按䟽廣東海蘭陵人蘭陵今屬沂州承縣今東海縣乃漢之贛榆自屬琅邪郡非古之東海也今承縣東自有䟽廣墓其東二里有疏受墓延年不講地志但見今謂之東海縣遂以二䟽名之極為乖誤按筆談之説甚核然宋蘇軾金党懐英皆有詩則承延年之誤也華亭陸氏自唐以前松江未立郡縣華亭亦僅以一亭隸於吴郡之婁舊志以陸氏世居華亭如漢之曰康曰績吴之曰遜曰􅎨曰凱曰瑁晉之曰機曰雲曰士光列之松江人物是矣若陸續即康之祖陸玩即士光之弟陸納又玩之子而復分載蘇州人物中亦未考其家世故也李耳按史記李耳楚苦縣人漢陳國苦縣晉改為谷陽隋改谷陽為仙源唐改仙源為真源屬亳州譙郡宋省真源入鹿邑置衛真縣元初復省衛真入鹿邑則李耳歸徳之鹿邑人非今江南地唐宋之亳州領六縣惟譙城父二縣今江南境餘俱屬河南舊志載李耳鳳陽人物中誤矣又宋史隐逸傳陳摶亳州眞源人摶生於唐末時真源尚未省入鹿邑也亦非今江南之亳州人鄭國史記仲尼弟子列傳鄭國家語作薛邦俱不言何國人張守節正義云避漢髙祖諱邦為國而姓又互異地當從闕舊志以宋封國為朐山侯纂入海州人物按鄭國唐贈滎陽伯宋封朐山侯既有兩地又仲尼弟子有魯人而贈南陵伯封華亭侯者豈得皆以為江南人乎兒寛舊通志兒寛載入亳州按史兒寛千乘人前漢志屬青州入亳州誤虞詡舊通志載亳州虞詡陳國武平人按後漢地理志武平注云左傳諸侯侵陳鳴鹿杜預曰縣西南有鹿邑皇輿表于鹿邑下注云東漢始置武平縣屬陳國則虞詡為河南鹿邑人又孔全亦鹿邑人俱誤入亳州陳咸漢書陳萬年𫝊子咸為南陽太守以殺伐立威媚陳湯以求薦徴為少府後為翟方進奏免以憂死而後漢陳寵傳云曽祖父咸成哀間以律令為尚書王莽輔政咸心非之乞骸骨去職及莽簒位召咸為掌寇大夫謝病不應其後莽復徴遂稱病篤是漢有兩陳咸一免官而憂死一兩徴而不起迥然異趣舊志乃云陳咸萬年子擢御史中丞王莽再徴不起是合兩人為一矣况陳萬年之子咸沛郡相人陳寵之曽祖咸沛國洨人兩史所載籍貫亦異是儀三國吳志是儀北海營陵人本姓氏郡相孔融嘲之遂改為是後依劉繇避亂江東繇軍敗儀徙㑹稽孫權承攝徴拜騎都尉蓋儀生于北海暫至江東而即徙㑹稽非江南人明甚徐衆評亦曰儀以羇旅異方客仕吳朝諒矣惟吴書云儀為人儉約不治彥宅甚卑陋鄰家起大屋大帝望見問左右以儀家對大帝曰儀儉必非及問果他宅舊志以有宅之説遂列之江寜人物誤也三江孔安國謂彭蠡江分為三以入震澤遂為北江而入海班固謂北江自毘陵縣北東入海南江在吳縣南入海中江自蕪湖縣西南東至陽羡入海水經注同王安石宗之蘇軾謂豫章江入彭蠡而東至海為南江岷江㑹彭蠡以入海為中江漢自北入江匯為彭蠡以入海為北江自彭蠡而下則三江為一過秣陵京口以入海曽鞏亦同其説又有謂岷江浙江松江者郭璞也宗郭氏説而以今之揚子江吳淞江錢塘江當之者邉韶陳師凱歸有光顧炎武也有謂南松江錢塘江浦陽江者韋昭也其以為松江東江婁江者則自庾闡吳都賦注始而張守節史記正義蔡沈尚書傳及黄震金履祥諸家皆主其説按孔氏謂江自彭蠡分為三以入震澤不知江自夏口合漢以入彭蠡即合為一未甞分而為三且未甞入震澤也班氏之説近世朱鶴齡亦取之謂大江東過江隂許浦入海所謂北江永陽江在溧陽西北下流至宜興注太湖入海所謂中江吳淞江分東婁二江入海所謂南江北江中江為太湖上流南江為太湖下流上下流皆入海故曰底定然此皆自㑹稽入海者而班氏加以南北中之名遂與江漢入匯之文相混又以大江與永陽江吴淞江並稱三江亦恐大小不敵也蘇氏之説以揚州三江即荆州之中江北江而猶闕其一因以彭蠡餘波冒南江之名足之夫彭蠡發源章贛而西章有江南之號或可稱南江但此三江若即是江漢彭蠡則江漢既見荆州彭蠡既見上文不應下又重出三江且經謂彭蠡之下為中江北江而蘇氏于彭蠡之上求三江亦不相合又與震澤懸隔而不相屬也郭氏以岷江浙江松江為三江亦恐大小不敵至淅江自杭言之曰錢塘自越言之曰浦陽本一江而二名韋氏析一為二并松江為三尤為失之唯庾氏吳都賦注謂太湖東注為松江下七十里分流東北入海為婁江東南入海為東江張氏史記正義謂在蘇州東南三十里名王江口一江西南上七十里至太湖曰松江即古笠澤江一江東南上七十里至白蜆湖曰上江亦曰東江一江東北下二百餘里入海曰下江亦曰婁江其分處號三江口今以經文攷之荆州既書江漢朝宗於海則揚州不必更及江漢且荆州九江既不指岷江則揚州三江亦不當指岷江又揚州之文彭蠡豬而後陽鳥居三江入而後震澤定則三江必為震澤下流震澤納百川之水而注之江三江洩震澤之水而入于海東南水利咸在焉庾氏張氏説似為妥協今從之䢴溝據通鑑隋大業元年開邘溝自山陽至揚子江三百餘里六年穿江南河自京口至餘杭八百餘里舊志併為一條誤以元年為六年孟瀆唐元和間常州刺史孟簡開泰伯瀆復浚一瀆後人名曰孟瀆自是兩河泰伯瀆在無錫縣東五里西連運河達蠡湖孟瀆河在常州府西三十里東南接運河北流六十里入于江舊志不載唐孟簡開瀆而先立一條曰泰伯開瀆後人名曰泰伯瀆下注云又名孟瀆両河併而為一誤矣漕渠宋史河渠志真宗天禧二年江淮發運使賈宗言諸路嵗漕自真揚入淮汴厯堰者五糧載煩于剥卸民力罷于牽挽官私船艦由此􅄩壊今議開揚州古河繚城南接運渠毁龍舟新興茱萸三堰鑿近堰漕路以均水勢嵗省官費十數萬詔屯田郎中梁楚閣門祗候李居中按視以為當然明年役既成而水注新河與三堰平漕船無阻公私兩便此議發于二年而成于三年舊志不載原委而云天禧末發運使魯宗道通浚真揚漕河按魯宗道𫝊天禧元年與劉􅂱為右正言尋除戸部員外郎兼右諭徳踰年遷左諭徳仁宗即位遷戸部郎中並無為江淮發運使事龍山無錫縣慧山一名九龍山陸羽謂山陽有九隴若龍偃卧故名實一山也舊志於慧山下阮注云一名九龍山又另立龍山一條云在慧山北十里實無此山也黄河舊志載永樂九年侍郎金純築堤導河經二洪南入淮考是年江南境並無築堤導河入淮之事按太宗實録九年三月壬午浚河南黄河故道葢河水累歳為患至是决壊民田廬益甚事聞遣侍郎張信往視信訪得祥符縣魚王口至中灤下二十餘里有舊黄河岸與今河靣平浚而通之俾循故道則水勢可殺遂繪圖以進詔發河南民兵十萬命興安伯徐亨工部侍郎蔣廷瓉率運木夫同侍郎金純相度開浚仍遣定國公徐景昌以太牢祀河神戸部侍郎古朴以太牢祭河南境内山川是河南事與江南全無闗渉當塗辨後漢書下邳王𫝊建初四年以九江之當塗等縣益下邳國李賢注當塗在今豪州鍾離縣此説是也而荀淑𫝊遷當塗長滕撫𫝊陰陵徐鳳等築營當塗山中注皆云當塗在今宣州其説互異按宣州之當塗乃東晉僑置之縣非漢之當塗也葢賢注書時集儒臣張大安劉訥言許叔牙等數人共為之不出于一手故有自相牴牾之處擇其是者從之可矣然今之當塗乃即晉僑置之邑而古當塗之廢已久堂邑辨後漢質帝紀廣陵賊張嬰攻殺堂邑長注云堂邑縣屬廣陵郡今揚州六合縣此注與後漢郡國志合又鍾離意傳遷堂邑令注堂邑故城在今博州堂邑縣西北按博州之堂邑乃隋開皇中所置即今東昌府堂邑縣非漢廣陵屬邑也漢時尚無此縣意安得令其地兩注亦一是一非又通典云春秋棠邑漢為堂邑葢棠堂二字本不同而諸書中有以漢之堂邑作棠邑者亦誤石城辨後漢髙獲傳獲逺遁江南卒於石城注石城在今蘇州東南後人因此注遂謂獲隠蘇州常熟石城鄉皆非也漢丹陽郡有石城縣又據水經石城縣在牛渚東宋白續通典云池州貴池石埭二縣皆漢石城縣地獲遁跡之所葢在是耳厯陽山辨明一綂志厯陽山在和州西北四十里江表傳厯陽縣有石山謂之石印又云石印封發天下當太平吳孫皓甞遣使祭以太牢葢今和州古厯陽縣地故所載如此按吳志孫皓𫝊天璽元年鄱陽言厯陽山石文理成字與江表傳之言合但厯陽之上冠以鄱陽而吳之鄱陽郡由孫權分豫章地置乃今江西饒州地非和州也又胡三省言晉志鄱陽郡無厯陽縣有厯陵縣陽當作陵并引饒州圖經所載鄱陽厯陵縣有石印山為証則吴志及江表傳之厯陽已屬厯陵之訛後代纂志者并不察鄱陽之文直指為和州之山斯尤誤矣舊志亦仍之而未削也當利浦辨明一綂志當利浦在和州城東漢末劉繇遣将張英屯當利口以拒袁術即此志説是也舊志不採而引他志言晉王濬過三山王渾遣人邀之濬曰風當利不得泊即此按劉繇屯兵當利事見吴志孫策傳又周瑜傳瑜從孫策攻㧞當利則當利之名其來已久不始于晉也又王濬伐吳自武昌順流東下已至三山則距建康有四十餘里而當利在三山西八十餘里非濬軍所過也况濬本言風利不得泊亦無當字他志所云皆鑿空之説舊志採之誤矣霍邱辨明一綂志云霍邱縣周霍叔處封邑并言叔有塜在縣淮水岸上按史記武王封叔處於霍注引漢書地理志云河東彘縣霍叔所封又鄭元周禮注霍山在彘縣本春秋時霍國地杜預左傳注略同按漢彘縣今山西霍州則言霍叔封霍邱及淮㟁有塜之説皆不足據舊志悉仍之是未深考耳且因左傳晉獻公滅霍之文并附㑹獻公之墓亦在霍邱其誤滋甚徐州辨史記齊威王語魏王曰吾臣有黔夫者使守徐州則燕人祭北門趙人祭西門按此徐州乃齊之西北境與燕趙接壤與淮北之徐州了不相渉葢燕趙皆在大河以北去今之徐州絶逺明一綂志列黔夫于徐州名宦而舊志承之俱失考也山陽辨今之淮安府在晉為山陽郡今山陽縣即晉舊縣名也自晉以前淮安無山陽之名舊志淮安人物中入漢山陽曹竟按漢有兩山陽一山陽郡今山東兖州府地一河内郡山陽縣今河南懐慶府地皆非今淮安之山陽也又竟事附載漢書鮑宣傳而志云見厯代忠義録亦考之未詳矣張純舊志廣徳名宦中入漢張純云純京兆人為廣徳令有異績按京兆之張純字伯仁東漢人仕光武朝位至大司空其前後厯官具載范史本傳未甞為廣徳令葢為廣徳令有異績者乃吳郡之張純字元基仕三國吳大帝時官終太子輔義都尉其事蹟皆見吳志孫和傳注中舊志誤合為一耳劉榮劉江明代衛弁承襲例得沿祖名故鄭曉名臣傳云劉榮沿父名江為總旗從靖難立功厯官左都督充總兵守遼東以破倭功封廣寜伯復名榮則劉榮即劉江非二人也明一統志淮安人物中分榮江為二人并異其籍貫舊志則言江鎮遼破倭榮為江子皆誤蔣山輿地志鍾山又名蒋山漢末秣陵尉蒋子文討賊戰死于此吳大帝為立廟子文祖諱鍾因改蒋山明一統志與舊志並採其説按胡三省通鑑注言孫權祖諱鍾蒋山之名當因是而改二説互異然詳考之胡説為長虎頭辨吳郡志引唐陸廣微吳地記言顧悌仕吳為虎頭将軍按悌之厯官詳見吳志顧雍傳注中甞為偏将軍無虎頭之號兼孫吳時亦不聞置此官陸記誤也又明一統志言晉顧愷之甞為虎頭将軍人號顧虎頭而舊志仍之按晉書百官志無虎頭将軍據唐張彥逺名畫記虎頭乃愷之小字非官也此誤始于宋吳曽能改齋漫録而後人相沿未止耳徐光諸人時代辨徐光三國孫吳時人見吳志注而舊志誤以為春秋之吳又徐秋夫劉宋時人見南史而誤以為趙宋昌義之蕭梁時人見梁書而誤以為朱梁杜僧明陳人見陳書而誤以為唐此皆顯與史戾者又古有杜康據李善文選注或云黄帝時人葢善亦疑而未能定其時代然魏武帝短歌行及曹植七啟中皆已引之則為漢以前人可知舊志以康為晉人殆未考魏武父子詩文耳曹休為吳郡太守辨姑蘇志守令表有漢吳郡太守曹休按魏志休傳載其前後厯官甚詳無守吳郡事葢仕漢為吳郡守者乃休之祖父非休也休值漢亂避地至吳于太守舍見祖父畫像涕泣下拜王沉魏書記其事即見休傳注中但佚其祖之名耳姑蘇志誤列休于表舊志削之是也梁適知淮安軍辨宋理宗紹定元年升楚州山陽縣為淮安軍淮安之名始此按梁適傳適仕仁宗朝位至宰輔甞知淮陽軍非淮安也葢淮安置軍在適歿後百餘年矣據地理志太宗置淮陽軍于邳州地在長淮之北故曰淮陽取古人水北曰陽之義而淮安則地在淮南故淮陽屬京東東路而淮安屬淮南東路二軍疆界本自截然舊志作適知淮安軍乃仍明一統志之誤也米芾知山陽辨宋史芾𫝊擢禮部員外郎出知淮陽軍未甞知山陽也當芾之時山陽尚為縣未升軍考芾前此厯官甞知雍邱縣無知山陽事葢山陽亦淮陽之訛此皆舊志仍明一統志載入而失于釐正者也淮安鎮辨宋史忠義傳張吉慶州卒為淮安鎮守烽西夏宼東谷掠得之脅降不從見殺按宋慶州屬陜西路所轄有東谷砦懐安鎮而無淮安見于地理志甚詳蓋其地去淮甚逺不當以淮安為名吉𫝊中訛懐為淮乃傳録之誤然其地在陜西史文自明與淮南無涉舊志採入淮安人物誤矣陽州作揚州辨五代志河南郡宜陽縣東魏置陽州北史盧勇傳遷揚州刺史鎮宜陽按宜陽在戰國為韓地即今河南府之宜陽縣也揚當作陽舊志誤採入揚州名宦又言太和中授揚州刺史髙祖賜書奨異按勇鎮宜陽乃孝靜帝時事非太和中也又賜書者乃北齊髙祖神武帝非魏髙祖獻文帝也志説與史無一合者吴置新安辨晉書地理志新安郡吳置按吳志孫權傳建安十三年分丹陽黟歙二縣地置新都郡又吳臣賀齊為新都太守朱據左遷新都郡丞各見本傳則吳置新都非新安也至晉武太康元年始改名新安具見宋書州郡志晉志所云較宋志為踈矣惟吳志陳表傳中有新安都尉之文然此乃傳寫之誤據諸葛瑾傳注中所引吳書葢表本為新都都尉斯尤明証也後代纂志者尚有沿晉志之説是未詳考之于吳宋二史而䆒其始末耳九峰辨宋史蔡沈建寜人躬耕不仕隠居九峰乃謂建寜府之九峰在崇安縣南即武夷山因山有九曲故名九峰後學者稱沉為九峰先生以此至松江九峰沈生平足跡所未至舊志以山名偶同採入流寓誤矣平江辨宋平江有二一縣一府平江府即今蘇州屬浙西路平江縣為岳州所轄之邑屬湖北路宋史李衡傳衡岳州平江人㳺學吳下其非吴人明矣舊志誤入蘇州人物今據史㳺學吳下語改入流寓魏據濡須拒蜀辨舊志和州濡須山魏據其西以拒吴蜀此承明一統志之文也按濡須為吳要地屢與魏兵相持于此見于吳魏二志者詳矣地有東西兩闗云魏據其西以拒吳是也若蜀境去濡須絶逺其兵安得渉斯地而魏特據險拒之乎吳下蓋衍一蜀字王範辨舊志無為州東興堤梁合州刺史王範屯兵于此按屯兵者乃梁武帝從子鄱陽王範王非姓也據梁史範傳太清元年除合州刺史鎮合肥侯景之亂棄鎮出東闗請兵于魏東闗即東興堤章華臺辨舊志章華䑓故址在亳州據左傳楚子成章華之䑓杜預注在今南郡華容縣通典云古華容在竟陵郡監利縣即今湖廣荆州府屬縣也蓋去亳地逺矣牛口辨舊志潁州霍邱縣城東牛口埠集唐太宗追竇建徳處按唐史太宗敗建徳于虎牢追奔三十里建徳竄匿牛口唐兵執之則牛口即近虎牢不在霍邱地名偶同爾相人入下相辨漢沛郡相縣今為宿州地臨淮郡下相今為宿遷若漢之薛廣徳隋之劉臻皆相人見于漢隋二史甚明舊志並作下相採入淮安人物非也又蘭陵有南北之異南蘭陵即今常州而北蘭陵乃今山東地南齊周盤龍據南史本北蘭陵人明一統志誤入常州舊志削之是也丹陽郡治辨自両漢三國丹陽郡皆治宛陵即今寜國府治至晉武太康二年置宣城郡治宛陵而丹陽郡移治建康今江寜府是也漢丹陽守李忠明一統志入寜國府名宦本不誤舊志改入江寜非也蔡洲擒盧循辨明一統志應天府西蔡洲在江中宋髙祖擒盧循於此舊志仍之按晉義熙中循入冦建康泊蔡洲宋髙祖率諸軍拒之循退後屢敗走交州之龍編晉軍邀擊循投水死斬其首傳送建康事詳晉史交州即古之交趾龍編其屬縣也非擒于蔡洲二志並誤蒋濟張令鐸漢末及後五代疆宇分裂所除之官每有遥授而非實任者如漢建安中除蒋濟為丹陽太守是時丹陽已為孫氏所據不得赴郡矣又周世宗以張令鐸領常州防禦使按世宗攻南唐止取淮南之地自江以南如昇常諸州其官吏皆由唐主除授世宗不得而命之則令鐸之常州防禦亦止遥領使職耳此二人皆非實任舊志列濟于職官入令鐸于名宦踈矣陸傪唐貞元中陸傪自祠部員外郎出為歙州刺史赴官未至卒于道詳見權徳輿所作墓誌葢傪雖除歙州而不及莅任舊志採入徽州名宦葢震于韓愈送陸歙州序而失之耳淩準明一統志和州名宦入唐淩準言準為和州刺史有政績栁宗元為作權厝志按宗元志中止云以連累出和州降連州初不言在和政績又唐史亦但言準自翰林學士貶連州司馬而不及和州事葢準先坐王叔文黨出為和州刺史未至復斥連州故略之也則有政績之説為誤舊志仍之亦失考矣王庭筠寓安慶辨舊志安慶流寓中入金王庭筠云晚愛郡之司空山居其下按金史王庭筠傳太和元年為翰林學士明年卒官無晚歳山居事况是時南北分境庭筠以文學貴顯于金不得越疆而寓宋地也志甚誤李戡舊志戡宜興人隐陽羨里按唐史戡為宗室渤海王奉慈七世孫甞隠陽羨非本貫宜興後又應平盧節度王彥威之辟為幕府廵官非終于隠居者今改入常州流寓彭脩彭循彭脩字子陽毘陵人守吳令見後漢書獨行傳而張勃吳録所載彭循事其姓字爵里並同但脩循互異按漢史云郡言州請脩守吳令而吳録又云太守聞循勇謀以守令謀即請字之譌守令蓋攝令也語皆相符當是一人雖傳言脩討賊中流矢死而吳録則云循見盜陳説利害即各散去此或傳聞異詞記事者㣲有參差耳又三國時魏有郭脩見三少帝紀而蜀後主傳作郭循宋胡三省言循當作脩并引洪适𨽻釋之文為証言漢𨽻法脩循二字只爭一筆正與此類也姑蘇志名宦中入彭脩全採漢史之文而附注吳録彭循于下蓋亦以為一人特未顯言耳今姑從毘陵人品紀及舊省志作二人而附辨於此以俟博識聴箏堂辨舊志江寜古蹟有聴箏堂引宋張養正六朝事迹云晉元帝幸謝安宅命讌安侍坐使桓伊吹笛又撫箏作金縢曲按此事見晉書伊傳乃孝武帝非元帝也又帝召伊飲讌安侍坐伊先奉帝旨吹笛畢繼自請以箏歌皆在帝所非幸安宅也養正所記皆與史異殊不足據聴箏堂故蹟又因張説附㑹耳諸墓辨吳志孫堅葬曲阿而晉元康中吳令謝詢有表求為堅策父子置守塜人與志不合明盧熊孫王墓辨言必始𦵏曲阿後遷于吳史文失載其説良是又舊志中諸墓最多附㑹如楚項羽𦵏榖城見史記而有墓在江浦漢張劭志作元伯葢舉其事𦵏汝南見范史而有墓在盱眙唐李勣程知節尉遲恭皆陪𦵏昭陵郭子儀陪𦵏建陵俱見史傳而有墓在睢寜淮安定逺六合是皆不可信今略辨其尤者餘不及縷舉也至宋王象輿地紀勝揚州有淳于棼墓按唐人作淳于棼傳記夢入蟻穴事其文見太平廣記特文士寓言㳺戯之作本無其人安得有墓而宋後諸志悉仍而不削尤荒誕矣同榮周景周瑜三國吳志周瑜廬江舒人從祖父景景子忠皆為漢太尉張璠漢紀景父榮章和時為尚書令是瑜與榮景服屬皆舒人也舊志分周榮周景屬安慶周瑜屬廬州是未詳考其家世矣蕭方唐宋藝文志皆載蕭方三十國春秋按蕭方當作蕭方等梁元帝長子敬帝方智之兄梁書有𫝊葢二名也二志皆脱一等字今省志藝文中列方等所著書而其名從梁史以與唐宋志異故特辨之陳果仁舊通志陳杲仁字世威晉陵人仕陳為監察御史未幾挂冠歸養母母死刺血書孝經繼母病思牛炙適禁屠刲股以進母病愈郡上其事旌表至大業中奉詔平長白山及江寜義寜中與沈法興等剪東陽賊二十萬擢左司徒煬帝被殺沈法興入毘陵陽為起義隂欲據之懼杲仁不附已遂遇害按唐書沈法興傳大業末法興為吳興郡守東陽賊略吳興煬帝詔太僕丞元祐討之義寜二年江都亂法興與祐将孫士漢陳果仁執祐名誅宇文化及收兵趨江都至毘陵通守路道徳拒之法興襲殺道徳據其城遂定江表十餘州自署江南道總管聞越王侗立乃上書稱大司馬録尚書事承制置百官以陳果仁為司徒則司徒為法興所署非因剪東陽賊而擢者也法興定江表十餘州之後然後上書越王署果仁為司徒則亦非初至毘陵遂遇害者也唐書又云法興聞侗被廢自稱梁王意南方諸城可跂而平専事威戮下有細過即誅之果仁之遇害或即在其時而史未有明文獨其既死之後屢現靈異南唐保大三年封武烈帝夫人軫氏封武烈后明洪武初詔去封號題木主曰司徒之神至今廟食常州無錫間士民事之惟謹其名史作果仁舊志作杲仁則字形相近而訛也張籍新唐書云張籍和州烏江人韓愈與孟郊書亦云張籍在和州居䘮家甚貧而愈張巡傳後則云吳郡張籍至張洎編次籍詩曰蘇州吳人按籍寄蘇州白使君詩云登第早年同座主題詩今日是州民贈陸暢詩云共踏長安街裏塵吳儂獨作未歸身胥門舊宅今誰主君過西塘與問人則籍為蘇人無疑當是籍生於蘇後甞居和故唐書誤以為和州也權德輿唐書稱權臯自略陽徙居丹徒徳輿臯子也故舊志以徳輿載入丹徒但按韓愈權公墓碑云授節鎮山南以疾求還道薨于洋之白草亭𦵏河南北山在貞孝東五里貞孝即臯諡也是其両世雖居丹徒而皆𦵏河南矣李公麟明一統志南畿志舊省志俱載入安慶府而舒城縣志據所得舊碑龍眠記定為舒城人考宋史文苑傳云舒州人舒州今安慶也桐城縣志載公麟龍眠山荘遺蹟甚詳則公麟當屬之安慶矣而王偁東都事略作舒城人此書在宋史前典核可信廬州志亦不為無據然終以正史為定宗澤明一統志有宗澤墓在鎮江注云澤以言事謫居潤夫人死藳𦵏丹徒後澤卒因合𦵏焉舊説遂謂澤家于潤然考宋史澤為義烏人其官位厯厯可數未甞以言事謫其罷登州也唯云退居東陽結廬山谷間耳東陽義烏鄰邑亦未甞居潤也盧雍伊乗張益明洪武初徙富室實京師數世以後遂同土著如盧雍伊乗伊敏生張益諸人皆占籍應天今入之江寜可矣舊志蘇州府又収之非也二喬宅喬𤣥墓案三國志周瑜傳孫策克皖得喬公兩女皆國色策自納大喬瑜納小喬史于喬公不載其名第稱公栁子厚所謂年之長老通曰公若毛公申公涪公是也曹操祭太尉橋公文案後漢書橋𤣥字公祖靈帝時遷司空轉司徒栁子厚所謂天于之三公稱公是也橋與喬姓字既不同名亦各别况喬公皖人今為安慶府潛山縣橋太尉是梁國睢陽人今為歸徳府睢州相去千餘里考太尉傳中絶無避地居皖之事而三國魏志云建安七年曹公軍譙遂至浚儀遣使以太牢祀橋𤣥其辭曰奉命東征屯次鄉里北望貴土乃心陵墓浚儀今河南開封府祥符縣宋真宗時改浚儀為祥符是太尉以睢州人而𦵏于祥符總與安慶之潛山無涉也府志于古蹟内載二喬宅云漢喬𤣥避地居此有二女負國姿宅前有井水猶帶脂粉色因于墳墓内入喬𤣥墓并易其姓為喬欲令太尉得佳壻而先使二喬認假父不亦謬乎又按太尉以靈帝光和六年卒年七十五至獻帝建安三年孫策破皖之嵗凡十六年計二喬初嫁必當及笄之年則方其始生而太尉已當作土中人矣算其年分亦未合也唐柴紹墓安慶府志云唐駙馬柴紹墓在潛山縣太平山亦非也按新唐書傳紹晉州臨汾人尚髙祖女平陽公主高祖起義旗時有功累封霍國公徙封譙國貞觀二年卒夫紹以功臣與佐命例當賜塋域陪葬京師况公主已于前武徳六年薨髙祖以主有武功特異其禮令𦵏用前後部羽葆鼓吹大路麾幢虎賁甲卒班劍其尤為京師長安無疑豈有羽葆鼓吹經行三四千里之逺至舒州而營葬耶主既葬長安後五年而紹薨太宗親自臨問豈有不與主合葬而孤孑一墓逺在舒州之域耶其為𫝊譌無疑後人第弗深考耳顧右丞祠顧右丞祠在無錫縣南林祀晉無錫令顧愷之按晉書本傳愷之晉陵無錫人父悅之厯尚書左丞亦不言為無錫令然則右丞乃左丞之訛而所祀者乃愷之父悦之也今據史本改正江南通志卷二百欽定四庫全書江南通志卷二百雜類志辨訛贛榆故城按贛榆故城有二一為漢縣在贛榆界一為唐縣在海州界詳見海州古蹟舊志乃云在贛榆縣北青山之隂混二城為一地亦舛錯也沭陽故僮縣元和志沭陽縣劉宋元嘉四年於此置僮縣屬南彭城郡按漢僮縣在今鳳陽府虹縣界宋書志北下邳郡有僮縣乃泰始中失淮北後僑立在廣陵界俱非今縣境帷蕭子顯齊書志北東海郡領僮縣當即今縣也海州之廢沂州寰宇記廢沂州城在縣西一百四十步宋泰始三年失舊沂州五年於胊山東北僑置沂州至泰豫元年移朐縣就泝州北周建徳六年改沂州為胊州隋開皇二年省按宋志無沂州惟徐州注泰豫元年移治東海胊山則沂州當即徐州之譌且隋志亦無朐州恐皆舛誤也休寜之黎陽廢縣黎陽廢縣在今休寜縣東南黎陽鄉屯溪率口之間而寰宇記謂有隋廢休寜縣在縣東南三十五里南當水口按隋氏休寜治萬嵗山乃孫休時海陽舊地不應復有此址當是誤以黎陽為休寜也當塗之小丹陽括地志丹陽故城在江寜縣東南五十里九域志當塗縣有丹陽鎮即故縣也而班固地理志丹陽郡丹陽縣注曰楚之先熊繹所封陳宣帝詔亦曰邇熊繹之遺封按楚始封之丹陽史記徐廣注在南郡枝江正義云歸州秭歸縣東有丹陽城熊繹始封是與此相距幾千里非吴地之丹陽也而當塗之故丹陽城乃吳地之丹陽漢置丹陽郡治宛陵而丹陽別自為縣因有小丹陽之名班固以此為楚始封之丹陽誤矣胊縣非臨胊魏書地形志琅邪郡朐縣二漢屬東海郡晉曰臨朐屬琅邪郡按漢臨朐縣有二一屬齊郡一屬東萊郡東漢屬齊國晉屬東莞郡與朐縣両地晉東海郡仍有朐縣未甞改為臨朐也通鑑注朐縣晉曰臨朐屬東莞郡魏復曰朐屬琅邪郡亦承魏志之訛厚邱訛廩邱漢厚邱縣後魏改曰沭陽即春秋時魯之中城邑杜註云在東海禀邱縣西南按廩邱齊邑左傳襄二十四年齊烏餘以廩邱奔晉杜註云今東郡禀邱縣故城是一齊邑一魯邑非即厚邱也晉東海郡無廩邱縣杜註當屬傳寫之訛而舊唐書志云沐陽漢廩邱縣是又因杜註而訛矣通州靜海縣五代史職方考周世宗置通州分其地置静海海門二縣為屬而治靜海是靜海縣周世宗所置宋政和七年以通州置靜海郡仍領靜海海門二縣而續文獻通考云靜海縣宋置靜海郡時並置縣是未考五代史之故耳廬州應劭曰廬州古廬子國也通典因之而復云左傳自廬以往即此地考左傳杜註廬今襄陽中廬縣漢屬南郡與廬江郡之廬名同而地異又廬州古蹟有同食館唐元和中刺史路應求建亦採左傳自廬以往振廪同食之義爲名其誤與通典同古英國史記夏本紀封臯陶之後于英六註索隠曰地理志六安國六縣咎繇後偃姓所封英地闕正義曰英即蓼也又曰英後改為蓼數説不同蓋英地久已無可考矣今英山縣始見於元史志續文獻通考云英山縣本羅州羅田縣東鄉地宋淳祐間立鷹山寨咸淳初改名英山因立為縣屬六安軍是英與鷹以音同而改非即古英國也英山志云縣有英布宅又因布姓英氏而附㑹其説耳丹徒曰京通典漢建安十三年吳鎮丹徒築城南靣西靣各開一門因京峴為京鎮因門為京口而文獻通考復引爾雅絶髙曰京為証則京當因丹徒峴而得名然三國以前丹徒未有京之名蓋孫權初鎮丹徒謂之京城侈大言之耳東晉至梁陳皆以此地為京城而建康謂之京邑十字碑丹陽縣延陵鎮西北九里延陵季子廟中有孔子書嗚呼有吳延陵君子之墓十字舊謂之十字碑開元中勅殷仲容摹刻大厯十四年蕭定重刻石又江隂縣申浦延陵季子墓亦有是碑但譯其文君子作季子字畫小異一刻於廟一刻于墓皆至聖遺蹟也而廣川書跋云仲尼書延陵墓碑今入淳化官帖中不類豐碑石柱所刻書亦異籕文又孔子未甞至吳其書是非不可考也唐人于季子墓刻此十字張從申書其後而籕字極大一書而傳於世者大小不同竟誰當其傳哉書跋之說蓋疑其非真矣然考李陽氷書初學嶧山後見仲尼書季札墓字便變化是碑陽氷所從得法又古於嶧山以書品論之亦未可輕議也溧陽舊縣溧陽舊縣有二一秦置縣于古固城在今髙淳縣界固城湖之側隋開皇九年改為溧水縣而故城廢一唐武徳三年析溧水地復置縣在今縣西北四十五里又李賀記云孟東野貞元中為溧陽尉溧陽昔為平陵縣縣南五里有投金瀬瀨南八里有故平陵城而縣志亦云平陵廢縣在縣西北四十里平陵山西與賀説合唐天復元年始移今治土人猶謂其處曰舊縣村舊志并為一條遂混黟縣黟縣之名舊有二説劉煦曰黟音同䃜縣南石墨嶺出石墨故也圖經云新安貢柿心黑木故以名縣二説皆穿鑿字義似乎近纎考新安志黄山舊名黟山秦置黟縣取義于此南畿志從之其説為正松滋廢縣通典云霍邱漢松滋縣續通典云宿松縣漢元始中為松滋縣屬廬江郡晉武帝以荆州有松滋縣遂改為宿松両説互異考漢書志廬江郡松滋縣東漢時省三國魏置安豐郡復置松滋縣為屬晉以後因之至隋始改名宿松故隋書志無松滋縣唐武徳初别置松滋縣屬蓼州七年省入霍邱縣通典以唐蓼州之松滋為漢松滋誤也至續通典晉改宿松之説考宋南齊志安豐郡仍有松滋縣則以隋改名為正霍邱志松滋廢縣在縣東十五里漢初置松兹侯國在今宿松縣界後漢省唐初改置于此武徳七年廢考核最明又寰宇記松兹一名祝兹即古鳩兹春秋鳩兹邑在蕪湖縣既非宿松亦非霍邱記又誤矣六蓼六蓼二國虞夏以封臯陶後六後為六安州蓼後為霍邱縣本無可疑一説六蓼故城俱在夀州而遂以六安州為漢􅅗縣霍邱縣為漢松滋皆非也碭山秦置碭郡治碭縣本因山得名其後或為碭縣或為碭山其名屢易而縣治亦遷改不常今縣屬徐州而山則在歸徳之夏邑境舊志謂山在縣東南誤也崑山吳郡婁縣梁大同初分置崑山縣本取縣界山為名唐天寳中割縣之南境置華亭縣而崑山遂在華亭界後蘇人以馬鞍山為崑山而松人翻以崑山為小崑皆非也皖城在􅅗山辨皇輿全覽及明一綂志皆云元至治三年分懐寜清朝玊照二鄉於故懐寜置潛山縣南畿志亦云潛山古有城即府治故址葢懐寜縣東晉安帝時置地在三國吳之皖城故新唐書志云懐寜縣有皖山又圖經云縣之最著者有潛皖天柱三山以地言之則曰潛山謂其逺近山勢皆潛伏也以國言之則曰皖山謂皖伯所封之國也以峰言之則曰天柱指其最髙者名之也而三國吴之皖城在今懐寜縣之北今潛山縣亦在懐寜縣之西北一百四十里則南畿志所謂古有城者即是吳之皖城及元分懐寜為潛山而潛皖天柱三山皆在潛之境内則今之潛山即古皖伯所封之國在吴謂之皖城在東晉以後謂之懐寜在元以後謂之潛山馬端臨所謂郡邑有時變更山川終古不易者也又考一綂志今之懐寜宋端平三年隨府南徙則皖城在潛山無疑而以今之懐寜為皖城者誤也安豐城有二辨一在霍邱漢置安風縣後漢為安風候國三國魏置安豐郡晉安帝省宋末復置東魏郡縣俱廢水經注淮水東為安豐津水南有城故安豐都尉治後立霍邱戌是也此在霍邱之西南界一在夀州沈約宋志南豫州安豐江左僑立晉安帝省為縣宋齊梁間屢復置隋開皇初郡廢以縣屬淮南郡唐屬夀州明初省寰宇記縣在夀州南八十里今為安豐鄉水經注渒水西北逕安豐縣故城西是也古舒縣古龍舒考舊説及府縣志皆以舒城為古舒縣而以廬江為古龍舒按蕭齊志廬江郡舒縣注建元二年為郡治隋書廬江縣注齊置廬江郡梁置湘州據隋志所云置郡之地與齊志合觀是舒與廬江皆為郡治而今之廬江即古之舒縣明矣但其改舒縣為廬江不知何時梁陳無志可考隋志又不詳後人縁此致疑然其實一也又按漢志廬江郡所領有舒龍舒二縣杜預注廬江南有舒城舒城西南有龍舒明是舒縣在東龍舒在西今舒城在廬江之西則舒城之為龍舒尤為明證且其縣唐時所置上取古舒城為名後人泥其名以為即古舒縣遂反以廬江為龍舒誤矣取慮臨潼二城舊志謂取慮漢縣後魏置臨潼郡謂之臨潼城在虹縣北一百二十里按虹縣北六十里即睢寜界取慮既在虹縣北一百二十里尚得謂虹縣地乎又按秦二世二年取慮人鄭布同起兵圍東海則取慮秦已有之又按臨潼故城在今靈璧縣東北七十里金志元光初議于靈璧縣潼城鎮設倉都監是也而取慮又在臨潼東北屬睢寜界魏収志云臨潼郡治臨潼城孝昌中陷武定六年復置兼置晉陵縣為郡治又云梁武置潼州武定六年改置睢州治取慮城是取慮臨潼本為二城後人混為一城誤以潼州為潼郡也故虹城按故虹縣在今五河縣西元和志云武徳四年在今虹縣南百里故虹城重置虹縣十三年移於今理即今虹縣也計虹縣南四十里即入五河界則故虹城之在五河明矣舊志入虹縣誤潁州非平輿辨後漢地理志汝南郡有平輿有沈亭故國新唐書地理志蔡州有平輿注云貞觀元年省入新蔡天授二年復置宋史淮西路有夀春安豐霍邱而無平輿疑是時平輿已入金矣輿圖偹考于河南沈邱下注云古沈子國漢平輿合諸漢志平輿有沈亭之説相符則平輿的在沈邱潁州志以平輿人如陳蕃許劭之倫俱載入者誤僑立州郡考輿地沿革南朝僑立州郡以處過江人士其在今鎮江界者曰南徐州曰南東海郡又曰南彭城又甞置郯朐利城祝其厚邱西隰襄賁等七縣寄居曲阿蓋南朝北境僅得徐州彭城之半而東海郡縣郯朐利城等與南朝為近其人民多來遷者故不没其舊地名以安挿之所以彭城東海何劉諸族不得不為鎮江人物然竟同之土著則無别今約略其來居未久者入流寓蘭陵舊通志蘭陵諸蕭俱載鎮江者以西晉毘陵郡兼轄今常鎮之地後分丹徒曲阿為武進梁又改曲阿武進為蘭陵是今丹徒丹陽亦曽稱武進稱蘭陵矣人物之所以混也今亦莫辨其全與鎮江無渉但南蘭陵之名夫人知是常州則諸蕭入常州府為宜䝉城非莊周故里辨按䝉邑前漢地里志屬梁國今歸徳府地而江南之䝉城在漢為山桑縣屬沛郡至五代時始置䝉城史記以莊周為䝉人應在梁國而非五代所置之䝉城矣商邱縣有小䝉城云是荘周故里宿遷舊説宿國甞遷此故名按歐陽忞曰晉元帝督運軍儲於此以為邸閣因有宿預之名安帝遂立宿預縣唐時以代宗諱始改宿遷與宿國無預毘陵晉陵辨晉永嘉中東海王越食邑毘陵以世子名毘改毘陵為晉陵事詳宋書州郡志而晉書地理志但言毘陵之置而不及晉陵之改明一綂志則云東晉改晉陵按此乃西晉之制非東晉也二志皆未詳􅜊白公勝封邑廬江郡慎縣文獻通考云白公勝邑按左傳子西召勝使處吴境為白公杜註白楚邑也汝隂郡褒信縣西南有白亭是勝之封邑在褒信矣白公敗吳於慎非封慎也至廬江郡之慎縣乃江左僑置本漢九江郡逡遒縣之地而通考混為汝隂之慎訛之訛矣宋國地辨春秋宋國之地今屬江南者惟徐州之彭城蕭二邑宿州之相銍二縣而國都則在河南歸徳之商邱所謂閼伯之墟微子之所封是也舊志凡宋大夫華元樂喜向戍諸人皆入鳳陽府人物者非至汝隂郡新郪縣東漢章帝以封殷後因改曰宋本七國時魏地舊志蓋誤以東漢宋縣為春秋之宋耳焦山鎮江之焦山相傳為焦先所居按髙士傳云焦先世莫知所出或言生乎漢末自陜居大陽及魏受禪結草為廬於河之湄止其中其後野火燒其廬先因露寢遭冬雪大袒卧不移則先為魏人非吴人明矣更考魏略曰中平末先年二十餘避亂客揚州建安初西還陜界是先東下時年尚少未幾即還其居兹山與否不可知或因山名偶同其姓遂附㑹之耶建徳縣堯城舜城寰宇記舜井城在縣南四里城中有舜井故名按元和志堯城在縣南舜城在縣北本為二城寰宇記遺去堯城而以縣南為舜城皆舛也亳州之湯陵桐宫桑林皇覽云湯冡在濟隂亳縣東北郭去縣三里金仁山謂桐宫在州東三里新志乃謂州即湯都且有桑林湯陵諸蹟是竟以亳州為古亳地矣按今亳州乃漢譙縣為魏武故里至尚書三亳其西亳為今偃師去州絶逺北亳為䝉城南亳為榖熟皆在今歸徳府商邱縣境商邱有大蒙城小蒙城非即今亳州所屬之蒙城縣也相去亦百餘里漢晋諸儒從無以譙為亳之説至後周始改為亳亦遥取商邱之亳為名耳又按括地志云洛陽偃師縣東有湯冢近桐宫則非今之亳州明矣故如桐宫桑林諸蹟皆不載下邳白門後漢書云曹操自将撃吕布至下邳城下布與麾下登白門宋武北征記云下邳城有三重魏武擒布于白門大城之門也是白門之在下邳無疑矣三國魏志云太祖軍至彭城陳宫謂布宜撃之布曰不如待其來攻蹙著泗水中及太祖攻之急布於白門樓上謂軍士曰卿曹無相困我自足當明公而輿地志謂白門徐州南門今按魏志云不如待其來攻是至彭城時猶未軍臨城下也曰及太祖攻之急則已及下邳矣且建安初先主為徐州牧屯下邳吕布擊取之三年曹操攻吕布於下邳决泗沂水以灌城擒布殺之操之擒布在下邳則布所登之白門樓其為下邳又何疑焉輿地記未審考也滁陽城寰宇記滁陽城在廬慎縣東北六十四里吴赤烏三年遣兵斷滁作堰以淹北道遂築此城按吴志赤烏十三年遣軍十萬作堂邑涂塘其地在全椒六合二縣界與合肥尚逺又晉書志江西廬江九江之地自合肥北至夀春悉屬魏時廬江郡居巢襄安諸縣江津要害之地雖為吳所據豈能越境築城于此當是魏人所築以偹吴耳焦城通典亳州理譙縣周武王封神農之後於焦即其地也有古焦城考史記周本紀註地理志𢎞農陜縣有焦城故焦國也據此則非亳州之譙矣譙本春秋陳之焦邑左傳僖二十三年楚代陳取之古焦城蓋陳楚時舊城耳金山城周公墩金山縣有金山城捍海塘外有周公墩皆昔人所築戍兵防海之地而舊經云周康王南逰築此城以鎮大海墩與孔宅為周公孔子遺跡周康王未甞南巡周公未甞至吳其謬妄不待辨也一説吴越錢氏築以戌守近是周瑜城舊志謂吳周瑜從孫權舉義徙家於舒因築此城按瑜本傳瑜廬江舒人孫堅興義兵討董卓徙家于舒堅子䇿與瑜同年友善瑜推道南大宅以舎策升堂拜母有無通共是瑜本家于舒徙家者乃孫氏也謂瑜徙家于舒者訛傳稱孫堅興義兵而志謂孫權亦訛丹陽人物兩漢三國丹陽郡治宛陵而丹陽别自為縣在今江寜溧水之間至隋始省入溧水縣自隋以前諸史所載之丹陽人皆屬江寜而寜國府志亦間載之蓋誤以郡為縣耳又唐武徳初復析置丹陽縣貞觀元年省入當塗故太平亦有丹陽之地而府志因載入隋以前丹陽人物皆誤天柱山天柱山舊名南嶽髙七千餘仞綿亘數百里連跨安慶六安界其南曰潛山其北曰霍山皆此山也史記武帝登禮灊之天柱山號曰南嶽應劭曰灊縣屬廬江南嶽霍山也水經注灊者山水名也開山圖灊山圍繞大山為霍山爾雅大山宫小山曰霍郭註云宫謂圍繞之自唐以前皆以灊霍為一山至通典以霍山為漢灊縣地則天柱似専屬六安而懐寜縣註復云有灊山一名天柱山其説両岐明楊循吉求其説不得遂謂灊山縣别有一天柱山非漢武登封之南嶽灊山去六安僅數百里山川亘互安得有両天柱乎睢水舊通志小河在靈璧縣城北六十里即睢水項羽大破漢軍於靈璧東睢水上即此所引與史記合而徐州之睢水復云楚項羽敗漢睢水上水為不流即此兩地不同而一事疊見誤矣蟂磯蕪湖縣西南七里大江中蟂磯相傳昭烈孫夫人自沉于此有廟在焉顧炎武云按蜀志先主既定益州而孫夫人還吴又裴松之註引趙雲列傳曰先主入益州雲領留營司馬時孫夫人以權妹驕豪多将吳吏兵縱横不法先主以雲嚴重必能整齊特任掌内事權聞偹西征大遣舟船迎妹而夫人欲將後主還吴雲與張飛勒兵截江乃得後主還是孫夫人自荆州復歸于權而後不知所終蟂磯之説殆妄今考蕪湖吴地夫人既以蜀為重必不肯當先主之出而挈子歸吴既已歸吴又何必以身殉蜀既欲殉蜀又何不死于蜀地而死于吴地皆不可解似當以顧説為正花靨鎮宋孝武帝建含章殿帝女夀陽公主人日卧殿簷下梅花落額上號梅花粧其地在建康城宫内而夀州之花靨鎮亦以夀陽公主梅粧而名附㑹極矣馬頭戌梁天監五年取魏合肥魏人守夀陽于馬頭置戌普通五年梁取夀陽亦置戌于此其地在夀州西北二十里或以為即馬頭郡者誤晉安帝于故當塗縣置馬頭郡在懐逺縣西南二十里非夀州也泗州挂劍臺寰宇記挂劍臺在大徐城臨朱沛水相傳為季子挂劍處括地志徐君廟在泗州徐城縣西南一里即延陵季子挂劍之徐君也按泗州為古徐子國大徐城即古徐子國也漢之徐縣隋之徐城縣皆泗州地而舊志或入於邳州或入於徐州誤矣新亭勞勞亭新亭在江寜城西南丹陽記云吳所築東晉後名士多讌集於此見王導𫝊梁簡文帝亦有侍逰新亭應令詩是也勞勞亭在江寜城南勞勞山上古送别之所見李白詩上有望逺樓宋時改臨滄觀與新亭兩地所記甚明而建康志云新亭壘在城西南十二里其亭乾道五年留守史正志即故基重修臨滄觀在今城南顧家寨路東輿地紀勝云新亭在江寜十里俯近江渚今名勞勞亭輿地志云新亭壘上有望逺樓宋改曰臨滄觀即勞勞亭故基兩亭合而為一非也揚州東閣舊志云舊傳揚州有東閣為梁何遜咏梅之所按今之揚州梁為南兖州廣陵郡其時揚州治丹陽郡今江寜府也何遜本傳天監中起家奉朝請遷中衛建安王水曹行參軍兼記室建安王者南平元襄王偉初封天監六年遷使持節都督揚南徐二州諸軍事右軍将軍揚州刺史則何遜東閣咏梅當在丹陽郡不在廣陵郡矣楊慎丹鉛録亦云遜未身到揚州揚州亦無東閣揚州文選樓明一統志曹憲為隋祕書監以文選教授生徒李善魏模輩皆出其門所居名文選巷故樓以憲得名按大業拾遺記云梁昭明文選樓隋煬帝甞登眺焉是樓以昭明得名不因憲也陸機祖祠華亭普照寺有陸將軍祠為廣衛將軍相傳為陸機之祖按吳志機祖遜初拜撫軍將軍又拜鎮西将軍又拜上大將軍吳因漢制雖置雜號将軍而考之遜𫝊未甞有廣衛之稱若機曽祖紆守城門校尉髙祖駿九江都尉亦未甞位至将軍也段秀實宅舊志英山縣有段秀實宅按本傳秀實姑臧人自安西府别將以至四鎮北庭行軍涇原鄭潁節度使其生平宦績所至皆在西陲大厯十三年朝京師賜第一區應在長安舊志以秀實曾領鄭潁又甞賜第遂舉英山之響山以實之不知秀實開府地實在涇原而鄭潁不過遙領以資軍實耳觀馬璘傳云涇軍乏財帝諷李抱玉讓鄭潁可見而秀實之為帥實代馬璘則鄭潁非其所厯而有宅之説誤矣定遠縣死虎亭宋書死虎亭去夀陽二百里應在今定逺縣西南通典云在夀州東四十里誤又按殷琰劉勔傳皆作宛唐而黄回王敬則劉懐珍劉悛王肅𫝊皆作死虎水經注又作死虖三説不同皆以字形相近而訛也建陵辨梁武帝父追尊為文皇帝廟號太祖陵曰建陵陵有碑曰太祖文皇帝之神道歐陽修集古録以為宋文帝神道碑按宋陵號長寜自在蒋山特其碑中八字與宋主廟號同故誤以為宋也二陵見宋齊二書建康實録甚明郭璞墓顧炎武云晉書郭璞𫝊璞以母憂去職卜𦵏地於暨陽去水百歩許人以近水為言璞曰當即為陸耳其後沙漲去墓數十里皆為桑田王惲集乃云金山西北大江中流亂石間有叢薄鴉鵲棲集為郭璞墓按史文元謂去水百歩許不在大江之中且當時即已沙漲為田而暨陽在今江隂縣界不在京口又所𦵏者璞之母而非璞也世説載璞詩曰北阜烈烈巨海混混纍纍三墳惟母與昆則璞又有二兄同𦵏據此則王惲所云乃因史文而附㑹之又以璞之母墓而訛為璞墓皆世俗沿青烏家不經之説也明沈周詩氣散風衝豈可居日本使臣詩墓前無地拜兒孫早已識其妄矣二疏墓沈括筆談云海州東海縣西有二古墓石延年通判海州因行縣見之曰漢二䟽東海人此必其墓也遂謂之二䟽墓刻碑其旁後人收入圖經予按䟽廣東海蘭陵人蘭陵今屬沂州承縣今東海縣乃漢之贛榆自屬琅邪郡非古之東海也今承縣東自有䟽廣墓其東二里有疏受墓延年不講地志但見今謂之東海縣遂以二䟽名之極為乖誤按筆談之説甚核然宋蘇軾金党懐英皆有詩則承延年之誤也華亭陸氏自唐以前松江未立郡縣華亭亦僅以一亭隸於吴郡之婁舊志以陸氏世居華亭如漢之曰康曰績吴之曰遜曰􅎨曰凱曰瑁晉之曰機曰雲曰士光列之松江人物是矣若陸續即康之祖陸玩即士光之弟陸納又玩之子而復分載蘇州人物中亦未考其家世故也李耳按史記李耳楚苦縣人漢陳國苦縣晉改為谷陽隋改谷陽為仙源唐改仙源為真源屬亳州譙郡宋省真源入鹿邑置衛真縣元初復省衛真入鹿邑則李耳歸徳之鹿邑人非今江南地唐宋之亳州領六縣惟譙城父二縣今江南境餘俱屬河南舊志載李耳鳳陽人物中誤矣又宋史隐逸傳陳摶亳州眞源人摶生於唐末時真源尚未省入鹿邑也亦非今江南之亳州人鄭國史記仲尼弟子列傳鄭國家語作薛邦俱不言何國人張守節正義云避漢髙祖諱邦為國而姓又互異地當從闕舊志以宋封國為朐山侯纂入海州人物按鄭國唐贈滎陽伯宋封朐山侯既有兩地又仲尼弟子有魯人而贈南陵伯封華亭侯者豈得皆以為江南人乎兒寛舊通志兒寛載入亳州按史兒寛千乘人前漢志屬青州入亳州誤虞詡舊通志載亳州虞詡陳國武平人按後漢地理志武平注云左傳諸侯侵陳鳴鹿杜預曰縣西南有鹿邑皇輿表于鹿邑下注云東漢始置武平縣屬陳國則虞詡為河南鹿邑人又孔全亦鹿邑人俱誤入亳州陳咸漢書陳萬年𫝊子咸為南陽太守以殺伐立威媚陳湯以求薦徴為少府後為翟方進奏免以憂死而後漢陳寵傳云曽祖父咸成哀間以律令為尚書王莽輔政咸心非之乞骸骨去職及莽簒位召咸為掌寇大夫謝病不應其後莽復徴遂稱病篤是漢有兩陳咸一免官而憂死一兩徴而不起迥然異趣舊志乃云陳咸萬年子擢御史中丞王莽再徴不起是合兩人為一矣况陳萬年之子咸沛郡相人陳寵之曽祖咸沛國洨人兩史所載籍貫亦異是儀三國吳志是儀北海營陵人本姓氏郡相孔融嘲之遂改為是後依劉繇避亂江東繇軍敗儀徙㑹稽孫權承攝徴拜騎都尉蓋儀生于北海暫至江東而即徙㑹稽非江南人明甚徐衆評亦曰儀以羇旅異方客仕吳朝諒矣惟吴書云儀為人儉約不治彥宅甚卑陋鄰家起大屋大帝望見問左右以儀家對大帝曰儀儉必非及問果他宅舊志以有宅之説遂列之江寜人物誤也三江孔安國謂彭蠡江分為三以入震澤遂為北江而入海班固謂北江自毘陵縣北東入海南江在吳縣南入海中江自蕪湖縣西南東至陽羡入海水經注同王安石宗之蘇軾謂豫章江入彭蠡而東至海為南江岷江㑹彭蠡以入海為中江漢自北入江匯為彭蠡以入海為北江自彭蠡而下則三江為一過秣陵京口以入海曽鞏亦同其説又有謂岷江浙江松江者郭璞也宗郭氏説而以今之揚子江吳淞江錢塘江當之者邉韶陳師凱歸有光顧炎武也有謂南松江錢塘江浦陽江者韋昭也其以為松江東江婁江者則自庾闡吳都賦注始而張守節史記正義蔡沈尚書傳及黄震金履祥諸家皆主其説按孔氏謂江自彭蠡分為三以入震澤不知江自夏口合漢以入彭蠡即合為一未甞分而為三且未甞入震澤也班氏之説近世朱鶴齡亦取之謂大江東過江隂許浦入海所謂北江永陽江在溧陽西北下流至宜興注太湖入海所謂中江吳淞江分東婁二江入海所謂南江北江中江為太湖上流南江為太湖下流上下流皆入海故曰底定然此皆自㑹稽入海者而班氏加以南北中之名遂與江漢入匯之文相混又以大江與永陽江吴淞江並稱三江亦恐大小不敵也蘇氏之説以揚州三江即荆州之中江北江而猶闕其一因以彭蠡餘波冒南江之名足之夫彭蠡發源章贛而西章有江南之號或可稱南江但此三江若即是江漢彭蠡則江漢既見荆州彭蠡既見上文不應下又重出三江且經謂彭蠡之下為中江北江而蘇氏于彭蠡之上求三江亦不相合又與震澤懸隔而不相屬也郭氏以岷江浙江松江為三江亦恐大小不敵至淅江自杭言之曰錢塘自越言之曰浦陽本一江而二名韋氏析一為二并松江為三尤為失之唯庾氏吳都賦注謂太湖東注為松江下七十里分流東北入海為婁江東南入海為東江張氏史記正義謂在蘇州東南三十里名王江口一江西南上七十里至太湖曰松江即古笠澤江一江東南上七十里至白蜆湖曰上江亦曰東江一江東北下二百餘里入海曰下江亦曰婁江其分處號三江口今以經文攷之荆州既書江漢朝宗於海則揚州不必更及江漢且荆州九江既不指岷江則揚州三江亦不當指岷江又揚州之文彭蠡豬而後陽鳥居三江入而後震澤定則三江必為震澤下流震澤納百川之水而注之江三江洩震澤之水而入于海東南水利咸在焉庾氏張氏説似為妥協今從之䢴溝據通鑑隋大業元年開邘溝自山陽至揚子江三百餘里六年穿江南河自京口至餘杭八百餘里舊志併為一條誤以元年為六年孟瀆唐元和間常州刺史孟簡開泰伯瀆復浚一瀆後人名曰孟瀆自是兩河泰伯瀆在無錫縣東五里西連運河達蠡湖孟瀆河在常州府西三十里東南接運河北流六十里入于江舊志不載唐孟簡開瀆而先立一條曰泰伯開瀆後人名曰泰伯瀆下注云又名孟瀆両河併而為一誤矣漕渠宋史河渠志真宗天禧二年江淮發運使賈宗言諸路嵗漕自真揚入淮汴厯堰者五糧載煩于剥卸民力罷于牽挽官私船艦由此􅄩壊今議開揚州古河繚城南接運渠毁龍舟新興茱萸三堰鑿近堰漕路以均水勢嵗省官費十數萬詔屯田郎中梁楚閣門祗候李居中按視以為當然明年役既成而水注新河與三堰平漕船無阻公私兩便此議發于二年而成于三年舊志不載原委而云天禧末發運使魯宗道通浚真揚漕河按魯宗道𫝊天禧元年與劉􅂱為右正言尋除戸部員外郎兼右諭徳踰年遷左諭徳仁宗即位遷戸部郎中並無為江淮發運使事龍山無錫縣慧山一名九龍山陸羽謂山陽有九隴若龍偃卧故名實一山也舊志於慧山下阮注云一名九龍山又另立龍山一條云在慧山北十里實無此山也黄河舊志載永樂九年侍郎金純築堤導河經二洪南入淮考是年江南境並無築堤導河入淮之事按太宗實録九年三月壬午浚河南黄河故道葢河水累歳為患至是决壊民田廬益甚事聞遣侍郎張信往視信訪得祥符縣魚王口至中灤下二十餘里有舊黄河岸與今河靣平浚而通之俾循故道則水勢可殺遂繪圖以進詔發河南民兵十萬命興安伯徐亨工部侍郎蔣廷瓉率運木夫同侍郎金純相度開浚仍遣定國公徐景昌以太牢祀河神戸部侍郎古朴以太牢祭河南境内山川是河南事與江南全無闗渉當塗辨後漢書下邳王𫝊建初四年以九江之當塗等縣益下邳國李賢注當塗在今豪州鍾離縣此説是也而荀淑𫝊遷當塗長滕撫𫝊陰陵徐鳳等築營當塗山中注皆云當塗在今宣州其説互異按宣州之當塗乃東晉僑置之縣非漢之當塗也葢賢注書時集儒臣張大安劉訥言許叔牙等數人共為之不出于一手故有自相牴牾之處擇其是者從之可矣然今之當塗乃即晉僑置之邑而古當塗之廢已久堂邑辨後漢質帝紀廣陵賊張嬰攻殺堂邑長注云堂邑縣屬廣陵郡今揚州六合縣此注與後漢郡國志合又鍾離意傳遷堂邑令注堂邑故城在今博州堂邑縣西北按博州之堂邑乃隋開皇中所置即今東昌府堂邑縣非漢廣陵屬邑也漢時尚無此縣意安得令其地兩注亦一是一非又通典云春秋棠邑漢為堂邑葢棠堂二字本不同而諸書中有以漢之堂邑作棠邑者亦誤石城辨後漢髙獲傳獲逺遁江南卒於石城注石城在今蘇州東南後人因此注遂謂獲隠蘇州常熟石城鄉皆非也漢丹陽郡有石城縣又據水經石城縣在牛渚東宋白續通典云池州貴池石埭二縣皆漢石城縣地獲遁跡之所葢在是耳厯陽山辨明一綂志厯陽山在和州西北四十里江表傳厯陽縣有石山謂之石印又云石印封發天下當太平吳孫皓甞遣使祭以太牢葢今和州古厯陽縣地故所載如此按吳志孫皓𫝊天璽元年鄱陽言厯陽山石文理成字與江表傳之言合但厯陽之上冠以鄱陽而吳之鄱陽郡由孫權分豫章地置乃今江西饒州地非和州也又胡三省言晉志鄱陽郡無厯陽縣有厯陵縣陽當作陵并引饒州圖經所載鄱陽厯陵縣有石印山為証則吴志及江表傳之厯陽已屬厯陵之訛後代纂志者并不察鄱陽之文直指為和州之山斯尤誤矣舊志亦仍之而未削也當利浦辨明一綂志當利浦在和州城東漢末劉繇遣将張英屯當利口以拒袁術即此志説是也舊志不採而引他志言晉王濬過三山王渾遣人邀之濬曰風當利不得泊即此按劉繇屯兵當利事見吴志孫策傳又周瑜傳瑜從孫策攻㧞當利則當利之名其來已久不始于晉也又王濬伐吳自武昌順流東下已至三山則距建康有四十餘里而當利在三山西八十餘里非濬軍所過也况濬本言風利不得泊亦無當字他志所云皆鑿空之説舊志採之誤矣霍邱辨明一綂志云霍邱縣周霍叔處封邑并言叔有塜在縣淮水岸上按史記武王封叔處於霍注引漢書地理志云河東彘縣霍叔所封又鄭元周禮注霍山在彘縣本春秋時霍國地杜預左傳注略同按漢彘縣今山西霍州則言霍叔封霍邱及淮㟁有塜之説皆不足據舊志悉仍之是未深考耳且因左傳晉獻公滅霍之文并附㑹獻公之墓亦在霍邱其誤滋甚徐州辨史記齊威王語魏王曰吾臣有黔夫者使守徐州則燕人祭北門趙人祭西門按此徐州乃齊之西北境與燕趙接壤與淮北之徐州了不相渉葢燕趙皆在大河以北去今之徐州絶逺明一綂志列黔夫于徐州名宦而舊志承之俱失考也山陽辨今之淮安府在晉為山陽郡今山陽縣即晉舊縣名也自晉以前淮安無山陽之名舊志淮安人物中入漢山陽曹竟按漢有兩山陽一山陽郡今山東兖州府地一河内郡山陽縣今河南懐慶府地皆非今淮安之山陽也又竟事附載漢書鮑宣傳而志云見厯代忠義録亦考之未詳矣張純舊志廣徳名宦中入漢張純云純京兆人為廣徳令有異績按京兆之張純字伯仁東漢人仕光武朝位至大司空其前後厯官具載范史本傳未甞為廣徳令葢為廣徳令有異績者乃吳郡之張純字元基仕三國吳大帝時官終太子輔義都尉其事蹟皆見吳志孫和傳注中舊志誤合為一耳劉榮劉江明代衛弁承襲例得沿祖名故鄭曉名臣傳云劉榮沿父名江為總旗從靖難立功厯官左都督充總兵守遼東以破倭功封廣寜伯復名榮則劉榮即劉江非二人也明一統志淮安人物中分榮江為二人并異其籍貫舊志則言江鎮遼破倭榮為江子皆誤蔣山輿地志鍾山又名蒋山漢末秣陵尉蒋子文討賊戰死于此吳大帝為立廟子文祖諱鍾因改蒋山明一統志與舊志並採其説按胡三省通鑑注言孫權祖諱鍾蒋山之名當因是而改二説互異然詳考之胡説為長虎頭辨吳郡志引唐陸廣微吳地記言顧悌仕吳為虎頭将軍按悌之厯官詳見吳志顧雍傳注中甞為偏将軍無虎頭之號兼孫吳時亦不聞置此官陸記誤也又明一統志言晉顧愷之甞為虎頭将軍人號顧虎頭而舊志仍之按晉書百官志無虎頭将軍據唐張彥逺名畫記虎頭乃愷之小字非官也此誤始于宋吳曽能改齋漫録而後人相沿未止耳徐光諸人時代辨徐光三國孫吳時人見吳志注而舊志誤以為春秋之吳又徐秋夫劉宋時人見南史而誤以為趙宋昌義之蕭梁時人見梁書而誤以為朱梁杜僧明陳人見陳書而誤以為唐此皆顯與史戾者又古有杜康據李善文選注或云黄帝時人葢善亦疑而未能定其時代然魏武帝短歌行及曹植七啟中皆已引之則為漢以前人可知舊志以康為晉人殆未考魏武父子詩文耳曹休為吳郡太守辨姑蘇志守令表有漢吳郡太守曹休按魏志休傳載其前後厯官甚詳無守吳郡事葢仕漢為吳郡守者乃休之祖父非休也休值漢亂避地至吳于太守舍見祖父畫像涕泣下拜王沉魏書記其事即見休傳注中但佚其祖之名耳姑蘇志誤列休于表舊志削之是也梁適知淮安軍辨宋理宗紹定元年升楚州山陽縣為淮安軍淮安之名始此按梁適傳適仕仁宗朝位至宰輔甞知淮陽軍非淮安也葢淮安置軍在適歿後百餘年矣據地理志太宗置淮陽軍于邳州地在長淮之北故曰淮陽取古人水北曰陽之義而淮安則地在淮南故淮陽屬京東東路而淮安屬淮南東路二軍疆界本自截然舊志作適知淮安軍乃仍明一統志之誤也米芾知山陽辨宋史芾𫝊擢禮部員外郎出知淮陽軍未甞知山陽也當芾之時山陽尚為縣未升軍考芾前此厯官甞知雍邱縣無知山陽事葢山陽亦淮陽之訛此皆舊志仍明一統志載入而失于釐正者也淮安鎮辨宋史忠義傳張吉慶州卒為淮安鎮守烽西夏宼東谷掠得之脅降不從見殺按宋慶州屬陜西路所轄有東谷砦懐安鎮而無淮安見于地理志甚詳蓋其地去淮甚逺不當以淮安為名吉𫝊中訛懐為淮乃傳録之誤然其地在陜西史文自明與淮南無涉舊志採入淮安人物誤矣陽州作揚州辨五代志河南郡宜陽縣東魏置陽州北史盧勇傳遷揚州刺史鎮宜陽按宜陽在戰國為韓地即今河南府之宜陽縣也揚當作陽舊志誤採入揚州名宦又言太和中授揚州刺史髙祖賜書奨異按勇鎮宜陽乃孝靜帝時事非太和中也又賜書者乃北齊髙祖神武帝非魏髙祖獻文帝也志説與史無一合者吴置新安辨晉書地理志新安郡吳置按吳志孫權傳建安十三年分丹陽黟歙二縣地置新都郡又吳臣賀齊為新都太守朱據左遷新都郡丞各見本傳則吳置新都非新安也至晉武太康元年始改名新安具見宋書州郡志晉志所云較宋志為踈矣惟吳志陳表傳中有新安都尉之文然此乃傳寫之誤據諸葛瑾傳注中所引吳書葢表本為新都都尉斯尤明証也後代纂志者尚有沿晉志之説是未詳考之于吳宋二史而䆒其始末耳九峰辨宋史蔡沈建寜人躬耕不仕隠居九峰乃謂建寜府之九峰在崇安縣南即武夷山因山有九曲故名九峰後學者稱沉為九峰先生以此至松江九峰沈生平足跡所未至舊志以山名偶同採入流寓誤矣平江辨宋平江有二一縣一府平江府即今蘇州屬浙西路平江縣為岳州所轄之邑屬湖北路宋史李衡傳衡岳州平江人㳺學吳下其非吴人明矣舊志誤入蘇州人物今據史㳺學吳下語改入流寓魏據濡須拒蜀辨舊志和州濡須山魏據其西以拒吴蜀此承明一統志之文也按濡須為吳要地屢與魏兵相持于此見于吳魏二志者詳矣地有東西兩闗云魏據其西以拒吳是也若蜀境去濡須絶逺其兵安得渉斯地而魏特據險拒之乎吳下蓋衍一蜀字王範辨舊志無為州東興堤梁合州刺史王範屯兵于此按屯兵者乃梁武帝從子鄱陽王範王非姓也據梁史範傳太清元年除合州刺史鎮合肥侯景之亂棄鎮出東闗請兵于魏東闗即東興堤章華臺辨舊志章華䑓故址在亳州據左傳楚子成章華之䑓杜預注在今南郡華容縣通典云古華容在竟陵郡監利縣即今湖廣荆州府屬縣也蓋去亳地逺矣牛口辨舊志潁州霍邱縣城東牛口埠集唐太宗追竇建徳處按唐史太宗敗建徳于虎牢追奔三十里建徳竄匿牛口唐兵執之則牛口即近虎牢不在霍邱地名偶同爾相人入下相辨漢沛郡相縣今為宿州地臨淮郡下相今為宿遷若漢之薛廣徳隋之劉臻皆相人見于漢隋二史甚明舊志並作下相採入淮安人物非也又蘭陵有南北之異南蘭陵即今常州而北蘭陵乃今山東地南齊周盤龍據南史本北蘭陵人明一統志誤入常州舊志削之是也丹陽郡治辨自両漢三國丹陽郡皆治宛陵即今寜國府治至晉武太康二年置宣城郡治宛陵而丹陽郡移治建康今江寜府是也漢丹陽守李忠明一統志入寜國府名宦本不誤舊志改入江寜非也蔡洲擒盧循辨明一統志應天府西蔡洲在江中宋髙祖擒盧循於此舊志仍之按晉義熙中循入冦建康泊蔡洲宋髙祖率諸軍拒之循退後屢敗走交州之龍編晉軍邀擊循投水死斬其首傳送建康事詳晉史交州即古之交趾龍編其屬縣也非擒于蔡洲二志並誤蒋濟張令鐸漢末及後五代疆宇分裂所除之官每有遥授而非實任者如漢建安中除蒋濟為丹陽太守是時丹陽已為孫氏所據不得赴郡矣又周世宗以張令鐸領常州防禦使按世宗攻南唐止取淮南之地自江以南如昇常諸州其官吏皆由唐主除授世宗不得而命之則令鐸之常州防禦亦止遥領使職耳此二人皆非實任舊志列濟于職官入令鐸于名宦踈矣陸傪唐貞元中陸傪自祠部員外郎出為歙州刺史赴官未至卒于道詳見權徳輿所作墓誌葢傪雖除歙州而不及莅任舊志採入徽州名宦葢震于韓愈送陸歙州序而失之耳淩準明一統志和州名宦入唐淩準言準為和州刺史有政績栁宗元為作權厝志按宗元志中止云以連累出和州降連州初不言在和政績又唐史亦但言準自翰林學士貶連州司馬而不及和州事葢準先坐王叔文黨出為和州刺史未至復斥連州故略之也則有政績之説為誤舊志仍之亦失考矣王庭筠寓安慶辨舊志安慶流寓中入金王庭筠云晚愛郡之司空山居其下按金史王庭筠傳太和元年為翰林學士明年卒官無晚歳山居事况是時南北分境庭筠以文學貴顯于金不得越疆而寓宋地也志甚誤李戡舊志戡宜興人隐陽羨里按唐史戡為宗室渤海王奉慈七世孫甞隠陽羨非本貫宜興後又應平盧節度王彥威之辟為幕府廵官非終于隠居者今改入常州流寓彭脩彭循彭脩字子陽毘陵人守吳令見後漢書獨行傳而張勃吳録所載彭循事其姓字爵里並同但脩循互異按漢史云郡言州請脩守吳令而吳録又云太守聞循勇謀以守令謀即請字之譌守令蓋攝令也語皆相符當是一人雖傳言脩討賊中流矢死而吳録則云循見盜陳説利害即各散去此或傳聞異詞記事者㣲有參差耳又三國時魏有郭脩見三少帝紀而蜀後主傳作郭循宋胡三省言循當作脩并引洪适𨽻釋之文為証言漢𨽻法脩循二字只爭一筆正與此類也姑蘇志名宦中入彭脩全採漢史之文而附注吳録彭循于下蓋亦以為一人特未顯言耳今姑從毘陵人品紀及舊省志作二人而附辨於此以俟博識聴箏堂辨舊志江寜古蹟有聴箏堂引宋張養正六朝事迹云晉元帝幸謝安宅命讌安侍坐使桓伊吹笛又撫箏作金縢曲按此事見晉書伊傳乃孝武帝非元帝也又帝召伊飲讌安侍坐伊先奉帝旨吹笛畢繼自請以箏歌皆在帝所非幸安宅也養正所記皆與史異殊不足據聴箏堂故蹟又因張説附㑹耳諸墓辨吳志孫堅葬曲阿而晉元康中吳令謝詢有表求為堅策父子置守塜人與志不合明盧熊孫王墓辨言必始𦵏曲阿後遷于吳史文失載其説良是又舊志中諸墓最多附㑹如楚項羽𦵏榖城見史記而有墓在江浦漢張劭志作元伯葢舉其事𦵏汝南見范史而有墓在盱眙唐李勣程知節尉遲恭皆陪𦵏昭陵郭子儀陪𦵏建陵俱見史傳而有墓在睢寜淮安定逺六合是皆不可信今略辨其尤者餘不及縷舉也至宋王象輿地紀勝揚州有淳于棼墓按唐人作淳于棼傳記夢入蟻穴事其文見太平廣記特文士寓言㳺戯之作本無其人安得有墓而宋後諸志悉仍而不削尤荒誕矣同榮周景周瑜三國吳志周瑜廬江舒人從祖父景景子忠皆為漢太尉張璠漢紀景父榮章和時為尚書令是瑜與榮景服屬皆舒人也舊志分周榮周景屬安慶周瑜屬廬州是未詳考其家世矣蕭方唐宋藝文志皆載蕭方三十國春秋按蕭方當作蕭方等梁元帝長子敬帝方智之兄梁書有𫝊葢二名也二志皆脱一等字今省志藝文中列方等所著書而其名從梁史以與唐宋志異故特辨之陳果仁舊通志陳杲仁字世威晉陵人仕陳為監察御史未幾挂冠歸養母母死刺血書孝經繼母病思牛炙適禁屠刲股以進母病愈郡上其事旌表至大業中奉詔平長白山及江寜義寜中與沈法興等剪東陽賊二十萬擢左司徒煬帝被殺沈法興入毘陵陽為起義隂欲據之懼杲仁不附已遂遇害按唐書沈法興傳大業末法興為吳興郡守東陽賊略吳興煬帝詔太僕丞元祐討之義寜二年江都亂法興與祐将孫士漢陳果仁執祐名誅宇文化及收兵趨江都至毘陵通守路道徳拒之法興襲殺道徳據其城遂定江表十餘州自署江南道總管聞越王侗立乃上書稱大司馬録尚書事承制置百官以陳果仁為司徒則司徒為法興所署非因剪東陽賊而擢者也法興定江表十餘州之後然後上書越王署果仁為司徒則亦非初至毘陵遂遇害者也唐書又云法興聞侗被廢自稱梁王意南方諸城可跂而平専事威戮下有細過即誅之果仁之遇害或即在其時而史未有明文獨其既死之後屢現靈異南唐保大三年封武烈帝夫人軫氏封武烈后明洪武初詔去封號題木主曰司徒之神至今廟食常州無錫間士民事之惟謹其名史作果仁舊志作杲仁則字形相近而訛也張籍新唐書云張籍和州烏江人韓愈與孟郊書亦云張籍在和州居䘮家甚貧而愈張巡傳後則云吳郡張籍至張洎編次籍詩曰蘇州吳人按籍寄蘇州白使君詩云登第早年同座主題詩今日是州民贈陸暢詩云共踏長安街裏塵吳儂獨作未歸身胥門舊宅今誰主君過西塘與問人則籍為蘇人無疑當是籍生於蘇後甞居和故唐書誤以為和州也權德輿唐書稱權臯自略陽徙居丹徒徳輿臯子也故舊志以徳輿載入丹徒但按韓愈權公墓碑云授節鎮山南以疾求還道薨于洋之白草亭𦵏河南北山在貞孝東五里貞孝即臯諡也是其両世雖居丹徒而皆𦵏河南矣李公麟明一統志南畿志舊省志俱載入安慶府而舒城縣志據所得舊碑龍眠記定為舒城人考宋史文苑傳云舒州人舒州今安慶也桐城縣志載公麟龍眠山荘遺蹟甚詳則公麟當屬之安慶矣而王偁東都事略作舒城人此書在宋史前典核可信廬州志亦不為無據然終以正史為定宗澤明一統志有宗澤墓在鎮江注云澤以言事謫居潤夫人死藳𦵏丹徒後澤卒因合𦵏焉舊説遂謂澤家于潤然考宋史澤為義烏人其官位厯厯可數未甞以言事謫其罷登州也唯云退居東陽結廬山谷間耳東陽義烏鄰邑亦未甞居潤也盧雍伊乗張益明洪武初徙富室實京師數世以後遂同土著如盧雍伊乗伊敏生張益諸人皆占籍應天今入之江寜可矣舊志蘇州府又収之非也二喬宅喬𤣥墓案三國志周瑜傳孫策克皖得喬公兩女皆國色策自納大喬瑜納小喬史于喬公不載其名第稱公栁子厚所謂年之長老通曰公若毛公申公涪公是也曹操祭太尉橋公文案後漢書橋𤣥字公祖靈帝時遷司空轉司徒栁子厚所謂天于之三公稱公是也橋與喬姓字既不同名亦各别况喬公皖人今為安慶府潛山縣橋太尉是梁國睢陽人今為歸徳府睢州相去千餘里考太尉傳中絶無避地居皖之事而三國魏志云建安七年曹公軍譙遂至浚儀遣使以太牢祀橋𤣥其辭曰奉命東征屯次鄉里北望貴土乃心陵墓浚儀今河南開封府祥符縣宋真宗時改浚儀為祥符是太尉以睢州人而𦵏于祥符總與安慶之潛山無涉也府志于古蹟内載二喬宅云漢喬𤣥避地居此有二女負國姿宅前有井水猶帶脂粉色因于墳墓内入喬𤣥墓并易其姓為喬欲令太尉得佳壻而先使二喬認假父不亦謬乎又按太尉以靈帝光和六年卒年七十五至獻帝建安三年孫策破皖之嵗凡十六年計二喬初嫁必當及笄之年則方其始生而太尉已當作土中人矣算其年分亦未合也唐柴紹墓安慶府志云唐駙馬柴紹墓在潛山縣太平山亦非也按新唐書傳紹晉州臨汾人尚髙祖女平陽公主高祖起義旗時有功累封霍國公徙封譙國貞觀二年卒夫紹以功臣與佐命例當賜塋域陪葬京師况公主已于前武徳六年薨髙祖以主有武功特異其禮令𦵏用前後部羽葆鼓吹大路麾幢虎賁甲卒班劍其尤為京師長安無疑豈有羽葆鼓吹經行三四千里之逺至舒州而營葬耶主既葬長安後五年而紹薨太宗親自臨問豈有不與主合葬而孤孑一墓逺在舒州之域耶其為𫝊譌無疑後人第弗深考耳顧右丞祠顧右丞祠在無錫縣南林祀晉無錫令顧愷之按晉書本傳愷之晉陵無錫人父悅之厯尚書左丞亦不言為無錫令然則右丞乃左丞之訛而所祀者乃愷之父悦之也今據史本改正江南通志卷二百
