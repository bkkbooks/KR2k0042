祛蠧弊士民戴德焉門毓英瀋陽人順治五年知霍山縣時土寇作亂肘腋皆其黨與毓英悉力捍禦籲憲請援身先士卒轉戰深入渠魁授首霍城獲全泗州漢孔安國字子國武之弟魯申公弟子為臨淮太守其治官民皆有㢘節稱漢書儒林傳路温舒字長君鉅鹿人宣帝即位上尚德緩刑書帝嘉納累官臨淮太守治有異績漢書本傳薛宣字贛君郯人以御史中丞出守臨淮政化大行漢書本傳侯霸字君房河南宻人王莽時霸官淮平大尹更始徵霸百姓號哭遮道乞留且戒乳婦勿舉子曰侯君去必不能全使者慮霸就徵臨淮必亂不敢授璽具以狀聞後漢書本傳朱暉字文季南陽宛人永平中為臨淮太守所拔用皆厲行士其諸報怨以義犯率得生濟其不義之囚即時僵仆吏民畏愛為之謡曰强直自遂南陽朱季吏畏其威民懐其惠後漢書本傳孟嘗字伯周上虞人舉茂才令徐縣州郡表其能尚書楊喬稱其清行出俗能幹絶羣後漢書循吏傳謝熙山隂人令徐縣明達有吏才後漢紀南北朝宋沈璞字道真武康人元嘉末為盱眙太守繕城浚隍魏太武以三十萬衆攻之不克宋書自序唐蘇晉藍田人為泗州刺史以仁恕為政吏民信服舊史張伾以軍功遷守泗州值水患悉力捍禦卒完一城唐書本傳崔珙博陵人有威重精吏治以拔萃異等累擢至泗州刺史得士心唐書本傳杜慆萬年人咸通中守泗州龎勛反圍城甚急處士辛讜勸慆出家屬獨以身守慆曰吾出百口求生衆心摇矣不如與將士共死生衆聞感泣讜乃請救於郭厚本賊解去賊又敗杜審權令狐綯兵以鐵鎖絶淮流梯衝乗城糧盡為薄饘以給遣李圓約降慆怒殺之凡十月慆撫循士皆殊死奮讜冒圍出入糾輯援師卒完一州唐書杜佑傳宋段思恭澤州人開寳中代馬繼業知泗州下車矯其失綏撫夷落訪求民病悉條奏免之後歴知壽州宿州並著勞績宋史本傳朱昂字舉之衡山人太宗時知泗州嘗聚淮水流屍三千為塜瘞之有戍卒謀亂昂誅其首惡支黨悉貰之宋史本傳張夏知泗州值大水築堤禦之景祐初後守因其舊而加廣焉歐陽修先春亭記歐陽載字則之廬陵人知泗州有浮屠誘民男女投淮水死載盡捕其徒詰其姦民誅數人遣還鄉里者數百人遂毁其寺歐陽修工部郎中歐陽公墓誌銘歐陽觀廬陵人為泗州判官夜治官書嘗屢廢而歎妻問之曰此死獄也我求其生而不得爾歐陽修瀧岡阡表趙抃通判泗州濠守給廩賜不如法士卒欲變守閉門不出轉運使檄抃攝治之抃至從容如平時州以無事宋史本傳傅楫字元通仙遊人揚州司戸叅軍攝天長令發摘隠伏姦猾屏跡宋史本傳陶令靖康間知盱眙縣徽宗南幸以南山有十景詔所在清蹕令辭以非旬日可辦帝嘉其直而止南畿志賈公望字表之韓城人欽宗時知泗州靖康二年運使翁彦國勤王至泗州逗留不進公望責以大義始行及張邦昌偽命至率官屬哭天慶觀聖祖殿焚其赦書遂不能越泗而南當時服其壯烈南畿志趙立徐州人建炎四年為泗州水軍鎮撫使劉豫遣葛進齎書誘立立怒斬之又遣劉偲持榜招之立令將出就戮偲大呼曰公非我故人乎立曰吾知忠義為國何問故人卒斬於市宋史忠義傳沈該歸安人紹興十二年知盱眙軍有賢聲南畿志傅球字命之考城人通判泗州淮水溢毁城朝廷遣中使䕶築絶淮取土道逺度用卒六萬球相度近隄防有髙阜平之得土以漕運回舟載之省工費殆半南畿志元李景道字克中太谷人為盱眙尹天厯元年遷建縣治斬荆棘鑿山趾所費鉅而民不擾盱眙縣志郝偁字子榮河間人至元間為天長尹擇民間童子可教者立塾置師絃誦相望又新廟學籍豪民隠蔽田七頃有奇入其租為師生廩禄時人頌之天長縣志明林庭蘭字廷秀福建人洪武三年知盱眙縣潔已撫民以循良稱盱眙縣志鄭仁憲字平之㑹稽人成化間知天長縣興學校繕館舍修壇墠立坊市凡政教之大者次第畢舉天長縣志藍馥浮梁人成化十八年知五河縣創集塲建義倉五河縣志葛浩上虞人𢎞治十年知五河縣歲旱徒步禱雨往還數十里躬親捕蝗卒不為災民築捕蝗臺於茇憩之所今尚存五河縣志許弼𢎞治間知泗州在任六年積穀至二萬石年饑百姓多賴以濟泗州志汪應軫字子宿由庶常出知州事武宗南巡江彬方用事横索供億應軫以一身當之民得無擾嘗遣人至浙西市小桑數萬株課民樹藝尋擢給事中去之日艤舟龜山見家人載石砧急命投於淮水至都猶上疏乞免泗州運糧養馬諸累泗州志潘槐宣化人嘉靖中知五河縣博聞强幹大著賢聲五河縣志林希元嘉靖中以大理評事謫判州事歲大饑人相食青陽滄湖嘯聚數百人希元躬往慰諭解散其黨且請貸其罪而賑恤之境内以安泗州志邵時敏字伯來餘姚人嘉靖間令天長築馬埠堤數百丈建二石橋以便民民呼其堤曰邵公堤橋曰邵公橋天長縣志楊子龍鄞縣人嘉靖中知天長縣首議經費里甲繼請撤還驛傳及革䕶城河糶糴之税至修學宫東西月池排纂縣志皆闗為政大體天長縣志楊化隆慶中知泗州城内外石堤皆所創築泗州志陳永直由通判遷知州事增築東南䕶城石堤請豁髙家堰築堤夫役五百名免徵草料銀數百兩泗州志浦朝柱定州人萬厯十五年知州事歲凶穀價騰涌出俸金逺糴米麥平糶與民又以餘米作粥全活無算州屢被水患請於河憲疏濬清河口門限沙民賴之泗州志潘士紳江西人萬厯中知五河縣一切羨耗贖鍰盡為捐革訟至即理案無留牘時他邑民有控於直指者將下某府其人不欲改下某州又不欲叩頭曰願下五河其見信鄰封如此五河縣志沈嘉賔萬全衛人萬厯中知五河縣寡言笑慎取予人號為鐵面公至接待士民和煦如春風拂人五河縣志方堪新城人萬厯中知五河時澮沱二水横流為患堪築壩數十丈南橋圮復治至今名方公橋五河縣志汪文燦字弢輔宜良人崇禎十六年由新野令遷州守時髙傑兵駐州大肆焚掠文燦面叱總兵李朝雲朝雲佯許仍不戢文燦摳衣躍入城河漁舟救之得甦李乃約束士卒泗民以安泗州志蔣佳徵灌陽人崇禎間知盱眙縣流寇破城不屈死事聞贈尚寳卿廕一子盱眙縣志羅萬象字光大南昌人崇禎時知天長縣賦額外分毫無所溢減省吏胥裁足供事發摘奸隠豪􅃛慴伏天長縣志章世純字大力臨川人懐宗時署天長教諭學通經史旁涉諸子百家督課士子多經濟實用天長縣志國朝王師保四川人順治初知五河縣歲荒乏米漕餉莫辦詳請以麥代米一邑便之李毓秀字應詔沔池人順治二年知天長縣時屢經兵燹民多流亡毓秀加意招徠勸課耕稼貧者給以牛種聽訟明決境無寃民王辛字菩山直𨽻人順治七年以進士授天長知縣莅官九載大著政績值海寇陷城抱印自經死奉㫖贈按察司副使廕一子傅應薦奉天人順治十二年知泗州時年二十有四曉練吏治尤持重敦大體已亥夏淮漲灌城譌傳北堤已潰左右趣登舟應薦叱曰吾他適如民何乃於堤前拜水疾呼聞者感泣禱畢水勢驟減城得不没以上舊通志范三俊大谷人順治十八年知泗州深沈練達事至即決創設赤厯一書丁糧綱目燦若列眉迄今循其成法江映鯤字南溟閬中人康熙元年令天長邑苦里甲當差值年動至破産映鯤痛為革除民困以甦又里甲分糧黠者糧多而戸皆殷實懦者糧少而戸更凋瘠映鯤毎里均以二十二石自是里役無菀枯之異給便民自納單載糧數若干毎月完銀若干完即註單里書收頭不得因縁為奸民甚便之袁象乾良鄉人康熙五年知泗州州數被水災田没而糧額不減民不能支象乾下車即請上憲題蠲本州水沈抛荒田糧萬五百有奇州人永賴朱𢎞祚字徽䕃濟南人康熙七年除盱眙令革諸雜派定徵輸畫一之法盱俗好訟輕生為揭律通衢訟以衰止歲旱急請蠲賑又措銀買米分給饑民鄰封就食者盈萬時蝻生徧野倏有羣蝗過野蝻皆附翼飛去歲以大豐舉卓異第一江南通志卷一百十八
