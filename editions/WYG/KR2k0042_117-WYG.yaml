body:
  text: 江南通志卷一百十八職官志名宦七潁州一府滁和廣六泗五州潁州府漢何敞字文髙平陵人永元間為汝南太守以寛和為政遣儒術大吏案縣顯孝弟有義行者及舉寃獄輒以春秋斷之修濬鮦陽舊渠墾田增三萬餘頃後漢書本傳宋登字叔陽長安人汝隂令為政明能號為神父後漢書儒林傳徐𢎞字聖通為汝隂令縣多大姓怙强骩法𢎞至㢘其尤者擒治之風俗一變後漢紀虞延字子大陳留人建武初除細陽令毎歲時伏臘輒遣徒繫歸家並應期而還有囚於家被病自載詣獄既至而死延率吏掾殯於門外百姓感悦後漢書本傳陳重字景公宜春人為細陽令布政有異化後漢書獨行傳三國魏盧毓字子家涿郡人譙郡太守文帝以譙舊鄉大徙民充之以為屯田土地磽瘠百姓窮乏毓愍之表徙民於梁俾就沃衍魏志本傳南北朝宋李熙國鮦陽令元嘉三年遣大使巡行四方散騎常侍孔黙之等上言熙國在事有方民思其政乃與宋縣令成浦各賜絹三十疋榖二百斛特示奬賚以勸於後南史何道山桑令元嘉初文帝遣大使巡行四方王歆之等上言山桑令何道自少清㢘白首彌厲應加褒賚以勸於後南史北魏劉模信都人太和初守潁州寛猛相濟有治聲後遂家於潁潁州志唐栁寳積永徽中潁州刺史修椒陂塘溉田三百頃舊史李岵潁州刺史興利除害得民庶心舊史李繁泌子敬宗朝由𢎞文館學士出為亳州刺史境内劇賊為患繁有機略出兵捕斬之唐書本傳楊凝字懋功𢎞農人汴帥董晉表為判官亳州刺史缺晉以凝行州事增墾田決圩堰築堤防水患以息唐書楊憑傳五代王祚并州人周顯德初為華州刺史改鎮潁州均部内税租補實流徙以出新籍州故有通商渠距淮三百里歲久湮塞祚疏導之遂通舟楫郡無水患宋史王溥傳宋王旭字仲明大名人知潁州荒政修舉宋史王祐傳劉渙髙安人志尚髙潔天聖中為潁上令持正不阿以忤上官棄去隠廬山之陽歐陽修作廬山之詩以美之南畿志晏殊字同叔臨川人以禮部尚書罷知潁州手植雙栁於西湖後人思之為建雙栁亭南畿志李迪字復古鄄城人景祐二年知亳州有亡卒羣剽城邑發兵捕之久不得迪至悉罷所發兵偵知賊匿處潛遣壯士擒斬以徇宋史本傳歐陽修字永叔廬陵人皇祐元年知潁州塞白龍溝蓄水西湖灌田以為民利又建書院俾潁人咸知向學宋史本傳蔡齊字子思膠水人以戸部侍郎出知潁州卒後潁人見其故吏猶號泣思之宋史本傳段少連字希逸開封人仁宗時知䝉城縣少連才具通敏事無大小剖決如流尤厲風節不為權要所撓宋史本傳趙宗道字子淵嘉祐四年京西大饑轉運使請擇賢郡守以甦災黎宗道被選知潁州賑給存勞不遺餘力瘡痍漸起流亡以復南畿志蘇頌以集賢校理知潁州仁宗山陵調發倉猝頌為度土産有無髙估緩期官自為市民不知擾而課最他郡潁人德之宋史本傳張知白字用晦滄州人知亳州御史王嘉言知白守道循公當官不撓宋史本傳宋庠字公序雍邱人治平元年以使相判亳州庠所至以鎮靜為治宋史本傳富弼字彦國河南人熙寧二年以使相判亳州青苗法出弼謂如是則財聚於上人散於下持不行被劾歸洛宋史本傳蘇軾字子瞻眉山人元祐六年以龍圖閣學士出知潁州時將鑿黄堆以注淮軾以水平準之淮之漲水髙於新溝幾一丈鑿必為潁患乃言於朝從之郡有宿賊久不獲軾召汝隂尉李直方捕之以小不應格推賞不及軾請以已之年勞當改朝散郎階為尉賞不從其後吏部以軾當遷軾謂已許直方又不報宋史本傳朱光庭字公掞偃師人元祐六年由給事中謫知亳州光庭在邦在家臨民臨事造次動靜一由至誠宋史朱景傳吕希純壽州人公著子徽宗時知潁州先是公著嘗知潁有善政希純推廣父政教化大行宋史本傳曾悟字䝉伯靖康中為亳州士曹金兵至被執抗辭嫚罵衆刃劘之妻孥同日遇害宋史忠義曾怘傳陳規字元則安邱人紹興十年知順昌府葺城壁招流亡立保伍北軍至與劉錡區畫力戰以退之初規至順昌即廣糴粟麥實倉廩㑹計議司移粟赴河上請以金帛代輸至是得其用以成功宋史本傳元歸暘字彦温汴梁人至順初同知潁州鋤奸擊强人不敢以少年易之元史本傳克哷至順二年知霍邱縣勸課農桑修舉廢墜為一時良吏元史本傳王公孺汲縣人以奉議大夫知潁州㢘潔安靜與民休息潁州志張柔字德剛易州定興人鎮亳州環亳皆水非舟楫不達柔甃城壁為橋梁屬汴堤以通商賈之利復建孔子廟設校官弟子員元史本傳嘉琿達延祐元年知太和縣均徭平訟勸課農桑歲旱䖍禱即雨邑中火災迪往救有反風之應鄰邑飛蝗不入迪境比代父老攀轅不得行太和縣志巴延薊國公托克托之孫城父縣達嚕噶齊為民追賊奮不顧身為賊所害民于福寧鎮立祠祀之元史本傳明張文弼洪武元年知亳州創建州治學宫勤於撫字流亡復業六年改為亳縣調知他州亳州志李天祐洪武元年同知州事兵燹之後庶務草創天祐隨宜經理招撫流移民始復業潁州志車誠餘姚人洪武四年知潁上縣以誠信治民課最擢知光州潁上縣志黄良洪武五年知太和縣㢘介愛民修縣治建黌宫造士課農不朞月百廢具舉太和縣志游兆福建人洪武七年判潁州修築清陂塘民永賴之潁州志盧試榮東陽人正統元年知亳縣重修學宫創建義門倉儲粟以便賑給亳州志孫震字景威鄔陵人正統元年知䝉城縣勤敏㢘幹百廢修舉建境内社學二十餘所教化大行䝉城縣志孫景名富陽人正統六年知潁州興學校隆秩祀以清惠牧民得為治大體潁州志鄭祺字彦禧貴溪人景泰初知潁上縣㢘仁舊田制編戸一十三里祺增為十七里賦斂以舒秩滿士民乞留遷通判仍知縣事三年潁上縣志髙昇阜城人天順中知霍邱縣縣故無城昇督民築土垣以為捍禦霍邑之城自此始霍邱縣志賀思聰永平人成化十三年知亳縣慈惠宜民以憂去服除士民伏闕乞令復知亳許之又二年汲汲以備荒為政儲粟至二萬餘石亳州志劉讓江西人𢎞治初知潁州州衛異屬兵毎虐民讓至有犯者悉寘之法軍伍帖然潁州志孫誠新河人知霍邱縣霍自前令髙昇始築土城誠至易土以磚民樂趨事不數月功竣屹然保障霍邱縣志王旻曹縣人𢎞治九年知太和縣㢘明剛正不畏强禦吏民敬畏方之包孝肅太和縣志王沂滋陽人𢎞治中復陞縣為州沂來知州事善決疑獄重修大成殿建明倫堂築壇壝治公廨作預備軍儲等倉儲粟五萬石歲饑躬視賑給亳州志孟統字儒宗寧陽人𢎞治中授䝉城縣丞㢘潔自持修黌宫實倉廩士民沾惠䝉城縣志葉寛字德夫晉江人正德四年知䝉城縣縣故無城流賊至焚燬民舍抄掠至慘寛為築磚城浚深池得以捍蔽迄今賴之䝉城縣志趙䕫錦州人正德十三年知太和縣政尚寛平值流寇復增築城堞甃以磚石太和縣志李天衢字行之樂平人正德中授兵備僉事流寇犯潁上天衢明號令嚴守禦親冒矢石設竒擊賊旬日乃遁去更勞來逃民俾復寧宇南畿志趙塤字平仲餘姚人由戸部員外郎謫亳州同知㢘靜自守官舍蕭然亳州志傅棨清苑人由尚寳卿謫亳州同知勸學興禮修理城堤倉厫多所補益亳州志劉􅔩清苑人由鄉貢知太和縣通達政體有守有為均地利濬溝渠耕桑交勸民歌思之太和縣志吕景䝉字修飭象州人嘉靖中由御史謫判潁州委心奉職不以遷謫介意繕西湖書院建三忠六貞祠以振風化潁州志茅宰山隂人嘉靖十六年由郎署左遷潁州同知謡曰民之父母愷弟君子我潁毛公可以當此潁州志陳誥莆田人嘉靖中知州事除耗羨申減驛馬庫役等費潁州志陳址施州衛人隆慶中判潁州清嚴執法吏有以賂嘗者杖而遣之妻布裙垢無他可更乃易綌裳以浣恚形於色址從容相慰略不介意潁州志謝詔贛縣人萬厯中守潁州裁決曲當鋤强扶弱潁州志黄楷永福人萬厯中令霍邱淮水暴溢壊民廬舍溺人畜無算楷督舟拯救全活甚衆捐俸置學田士民德之霍邱縣志王世䕃萬厯中知霍邱縣多惠政築灃河堤以捍水患至今利賴霍邱縣志呉一鸞字文盛麗水人萬厯中知䝉城縣躬履田畝清丈地數均差徭釐戸口捐修文廟製祭器購書籍置學田又教民鑿塘浚池以泄水患䝉城縣志潘章字星海雲南人天啓六年謫判潁州植一木於庭書天地神明鑒察六字晨出焚香以拜然後視事潁州志趙士寛山東人崇禎七年以廕任通判決事精敏流寇圍潁登陴守禦城陷猶募死士堵殺力竭死之妻崔氏同二女俱自焚死事聞贈恤廣輿記尹夢鼇雲南人崇禎七年知潁州城陷猶手殺數賊中刀墮水死事聞與通判趙士寛並加優恤廣輿記左相申明季知霍邱流寇再破霍城相申被執大罵不屈賊怒磔之霍邱縣志廖維義長壽人崇禎時司訓徐州以禦寇功遷潁上令仁民愛士深得衆心屢却巨寇鄰邑被難者從之若歸市尋擢御史百姓遮留號泣潁上縣志任有鑑山東人崇禎十五年以郡倅署潁州事潁屢經兵燹戰守無具有鑑以忠義激發人心是年春賊衆犯境率鄉民堵殺所獲馬牛即行賞賚婦女避難相失者封養署中事定訪其家還之及秋賊盤踞潁地宻請兵捕𠞰㑹河水漲溢殺溺死者無算潁賴以全潁州志呉世濟字楫侯歸安人崇禎時知太和縣甫至寇賊交訌閭井驚怖世濟不請兵謂兵甚於賊率丁壯晝夜登陴守禦有方危城獲全著有禦寇始末傳世太和縣志國朝呉國用奉天人順治六年知霍邱縣未數月興革協宜凋瘵漸起時山賊陳伯紹擁衆入寇㑹久雨城圮賊闌入國用揮刀躍馬率甲士巷戰勢蹙馬仆大呼曰吾當以死衛百姓遂自刎事聞贈按察司僉事䕃一子舊通志鮑𢎞仁瀋陽人順治六年知潁上縣性明敏簿書填委據案剖決立盡捐俸錢修東城二百餘丈不煩民力清驛遞禁雜派請豁無主荒地五千餘頃田本沛富平人順治七年知䝉城縣時兵燹之後殫心撫恤釐剔宿弊催科則花戸親輸遞馬則設法官養夏秋米麥二税悉除耗贈邑民勒石頌德焉瞿乃慎順治十二年知潁上縣性仁厚不尚威嚴潁田故多汙萊為招撫流移勸督墾闢漸成膏壤催輸有法賦辦而民不擾時有民稱衆母吏畏神君之頌陳大倫字理仲定興人順治十四年知䝉城縣時田賦混淆流民未復為裁定畫一之法均里甲除奸蠧漕糧郵遞徹底清釐舊有邪教誘惑愚民大倫捕其魁寘之法邑以大治喻三畏字念兹奉天人康熙五年知潁州清慎平恕革除耗羨重築西湖堤岸灌溉桑麻濬濠牐通水利潁人食其德遷建寧郡丞死耿逆之亂喪過潁士人絡繹奔奠以上舊通志竹緑猗涇陽人康熙八年由粤東監司左遷䝉城令䝉邑凋弊一以噢咻為治徵輸驛遞盡除科羨歲省民錢數千緡聴訟平允上官毎有疑獄輒下䝉城讞決以憂去官貧不能束裝滁州漢劉平字公子彭城人建武中為全椒長有惠政百姓感之或增貲就賦或減年從役獄無繫囚後漢書本傳唐韓思復字紹忠長安人大厯間滁州刺史境有銅坑人苦鏟鑿為累思復為賈他郡費省獲多有黄芝五生州署民刻石頌其祥唐書本傳韋應物建中二年為滁州刺史性髙潔節食寡欲公餘焚香黙坐雖工詩而政不廢舊史闗播字務元衛州人陳少游鎮淮南表為判官攝滁州刺史李靈耀叛少游屯淮上播儲資力給軍興人無愁苦唐書本傳宋趙普字則平幽州人周末宋太祖拔滁州宰相范質奏普為軍事判官太祖與語竒之㑹獲盜百餘人當棄市普疑有無辜者請更訊之全活甚衆宋史本傳李彦明為全椒令建學宫新縣治政有丰采豪强折服四境帖然南畿志元時忱知全椒縣百姓愛之縣乏井民俱汲水襄河忱為穿井縣門外聽人挹取至今呼元公井南畿志王禹偁至道初出知滁州閩人鄭褒徒走來謁禹偁愛其儒雅為買一馬送歸或言其買馬虧直太宗曰彼嘗却李繼遷五十馬顧肯虧一馬價哉宋史本傳歐陽修慶厯初知滁州以鎮靜為治明不至苛寛不至縱吏民安焉南畿志趙槩慶厯初以祠部郎出知滁州時渠寇李二過其境語人曰我山東人也公嘗知青州民愛之如父母我不忍犯率衆而去宋史本傳盧秉字仲甫德清人熙寧末提㸃兩浙淮東刑獄上計神宗問曰聞滁民捕蝗而食有諸對曰民誠饑甚殍死相繼上惻然曰前此獨趙抃為朕言之耳宋史盧革傳王俞為全椒令建學宫於縣東南襄水之側奬善懲惡訟平盜息南畿志姚仲孫字茂宗商水人通判滁州歲饑詔發官粟賑濟主吏不以時給仲孫至立劾主吏夜索丁籍盡給之宋史本傳梅執禮字知勝浦江人元符五年知滁州時賦鹽虧額滁亦苦抑配執禮曰郡不能當蘇杭一邑而食鹽乃倍粟數民何以堪請於朝詔損二十萬滁人德之宋史本傳劉位招信人為滁濠鎮撫使攝州事紹興中屢敗金兵金遣使招之位斬其使未幾金兵奄至位出戰中流矢死贈建寧軍節度使建廟淮陽賜號剛烈南畿志黄師中建炎間為全椒令縣廨燬於兵師中結茅以居清靜為治閭里盜發推尋其跡輒得四境肅然南畿志張處厚知全椒縣復建縣治於市橋西北性㢘介不妄取興馭胥吏尤嚴飭南畿志魏安行樂平人以張浚薦知滁州郡罹兵燹壇廟皆毁安行從草莽中得碑依政和法式立焉招墾土田民賴之南畿志辛棄疾字㓜安厯城人乾道間知滁州滁遭兵燼井邑凋殘棄疾寛征薄賦招集流亡教民兵議屯田乃剏奠枕樓繁雄館辟江東安撫司叅議官留守葉衡雅重之南畿志許巽嘉泰中知滁州境内故有津渡三前守月賦錢巽悉蠲罷仍各造舟以濟南畿志林㟽知滁州時州賦鹿非其土産㟽上言得免南畿志趙葵紹定中知滁州以州為兩淮門戸乃修城浚濠嚴設守具南畿志元劉琪至元間知滁州創鐘樓建永濟橋增置大成樂器南畿志社居敬汴梁人泰定初為來安尹㢘謹有惠政尤汲汲於興學校崇教化歲蝗居敬齋沐致禱蝗不入境來安縣志楊樸字文素河南人至正中全椒尹寇入城樸盡殺妻女朝服坐堂上盜欲降之樸指曰我已戕家屬正欲死官守耳乃連唾之死元史忠義傳蔣居仁廣陵人至正中知來安縣精於吏治民樂其政南畿志明周鼎鄞縣人洪武八年知滁州始滁隷中書事皆符下有不可者封上之已𨽻鳳陽府守數加苛責并毛舉細事撼鼎鼎不為動滁當孔道簿書填委鼎綜核嚴明治最他州滁州志呉穎字克懐閩人永樂初授全椒教諭善形家言以築文筆峯致飛語動上怒乃率諸生登明倫堂曰始禍者予也予死若等獲生矣遂自縊諸生王冕等為卜𦵏南山之陽全椒縣志陳璉東莞人永樂五年知滁州政教兼舉治為江北諸郡最秩滿滁人請留遷揚州知府仍知州事南畿志留衢正統中知全椒縣有循良之政全椒縣志周正安陸人天順八年知滁州有治績聲望與陳璉相埒滁州志趙禮成化間知來安縣創築土城繕學宫作官廨立市廛修堤防百廢俱興來安縣志曾顯𢎞治三年知滁州滁當衝要方貢夫馬驛騷民苦煩費顯議中道池河為定逺西徼設站協之河決徐州田租不入撫按議令滁代輸顯力爭得免滁州志孫贇正德中尹全椒修建黌宫堂廡率出俸錢成之視學造士時稱良師全椒縣志林文卿正德中全椒教諭時遷學宫悉力程督工皆堅緻課諸生講求鄉射義悉如古泮宫法全椒縣志陳則清嘉靖中知滁州歲大旱發廩賑貸逾年疫作民病不能行因量地設場為糜食之又請折鳳麥以免輸運之苦滁州志王邦瑞字惟賢宜陽人嘉靖中知滁州時徭傳馬驢取具田丁又屯所養馬田地多乾没邦瑞力請蠲逋欠均科派平馬政減重徵奉㫖釐覈民困得紓滁州志趙鏜嘉靖中知全椒衛屯恣虐鏜大為懲艾仍請於屯田御史毎屯置老人轄之號稱良法全椒縣志凌約言嘉靖中知全椒縣民苦養馬豪黠詭為邑供丁而以馬役遺下農約言釐弊懲奸酌量盡善邑自是無馬患河南師尚詔反糾集丁壯預為三覆以待寇聞風潛遁全椒縣志顧問嘉靖中由御史謫知來安往時六合滁陽南北夫馬率有驛路後改經來安遂成孔道民苦供億問悉為禁絶驛困以甦來安縣志魏大用嘉靖中授來安令前令趙禮築土為城久圮大用悉力經營易以磚甓百姓賴以安堵來安縣志張四術嘉靖中知來安㢘謹愛民其於六合馬夫迂道尤力請禁止來安縣志丁士竒萬厯間知滁州建四隅角樓以備守望監司取鍰金逾額帑積不支自鬻家棗園償之滁州志陳允升萬厯中守滁州滁田瘠糧重民不能供毎有棄産去者允升履畝清丈計額均賦一境賴焉滁州志孫森萬厯中知滁州衛弁忌其嚴覈摭訴監司森抗對得白因寘侵帑諸弁於法時郵遞衝疲勘合白牌雜遝至森調度有方滁州志田梴萬厯中知全椒縣立漢劉平祠顔其堂曰仰劉縣治後河南北通津行者病涉移諮和守各造浮橋至今利濟全椒縣志樊玉衡萬厯中以御史建言謫判無為州遷全椒令敬禮耆碩表章先賢因俗便民除蠧尤力尋膺薦督理漕河抗疏請冊立謫戍雷陽道經滁滁民往送揮手謝之跨驢而去全椒縣志劉是萬厯中知全椒崇節孝鋤豪猾蠲逋慎獄全椒縣志闗驥萬厯中令全椒下車值加派河夫毅然為民請命以去就爭遂得末減全椒縣志管學經萬厯中知全椒縣貌文弱而施政有方摘發侵欺覺察偽篆又捕獲鄰境大盜全椒縣志呉羽文萬厯中知全椒煦嫗單赤掊擊豪猾諸所興除皆大利害為人氷蘖自持顰笑不假全椒縣志錢應元萬厯中來安教諭㑹令虐士誣揭上臺應元不避嫌怨抗白其寃直指為之霽顔來安縣志秦植天啓中知全椒未下車即發諸吏蠧狀人以為神至杜苞苴除耗羨薄税通商調知皖江惟攜布絮一篋而行全椒縣志孔尚則至聖裔崇禎時知全椒時軍興旁午徵調無虚日尚則咄嗟立辦至里役長催火耗起解等件久滋民累一切釐革全椒縣志國朝甯鳴玉字楚珍奉天人順治十四年知滁州時賦多逋欠鳴玉按籍清釐分限立單令逋者照輸各給完狀後江南州縣皆以奏銷被遣滁獨無恙湯九圍奉天人順治間為來安知縣邑故凋敝田畝多鬻於省州紳士土著存者十裁二三里役大為民害九圍定為官收官解之法積困以甦舊通志楊鶴年字清華滿洲人順治十六年以鳳陽府同知署滁篆時海寇入犯滁宻邇㑹城人心惶擾鶴年宻為守備以靜鎮之譌言繁興皆置不問直指及備兵使者服其持重有請輒報可士民賴之鄭邦相字又僑咸寧人康熙六年知滁州治尚簡靜首申功令令輸賦者自封投櫃革僉報徵糧里甲積困以甦聽訟委曲開諭民多感悔威惠並著萑符亦為屏息趙清貞字幹周奉天人康熙十四年知滁州值歲大旱力懇上官題請蠲賑旋得報可全活無算聴訟明敏片言剖決民皆懾服和州南北朝宋劉湛字𢎞仁南陽人梁郡太守改歴陽奸吏犯贓百錢以上皆殺之自下莫不震肅宋書本傳張齊字子響馮翊人歴陽太守齊手不知書目不識字而在郡有清政吏事甚修梁書本傳唐張無擇慈谿人和州刺史時水潦害農無擇請蠲穀賑之採訪使李知柔素不快其直諒宻奏以附下為名貶蘇州别駕老㓜遮道攀留舊史張知謇字匪躬幽州人中宗時和州刺史清介有威嚴南畿志宋傅堯俞字欽之鄆州人治平中知諫院以爭濮議出知和州絶不言諫官時事通判楊洙問之堯俞曰前日言職也今為郡守當宣朝廷美意而乃沾沾追前闕政與誹謗何異宋史本傳凌沖字子和蘇州人知含山秩滿束裝家人有蓄一砧者沖視之曰非吾來時物命還之南畿志宋昌祚為和州鈐轄建炎四年州被圍數匝昌祚與楚軍指揮鄭立共激士卒晝夜備禦不少怠城破昌祚等皆死譙樓上宋史忠義傳韋永壽紹興末以統制官與北軍戰於和州其子世堅救之同死宋史忠義屈堅傳姚興相州人紹興末興𨽻都統王權麾下北軍渡淮興拒之退保和州遇於尉子橋力戰手殺數百人北軍誤興父子俱死贈容州觀察使立廟賜額旌忠宋史忠義傳冷世修字良器通判和州時守尚嚴峻世修濟之以寛吏民愛戴秩滿相率詣臺使乞留南畿志周虎臨淮人開禧二年知和州時敵兵圍城急虎乗城固守其母何氏激厲將士誓與城俱存亡合戰屢殺賊驍將敵大創引去州人為立母子生祠南畿志趙師嵓嘉定三年為和州觀察使有惠政南畿志元馬澤字潤甫任邱人知和州以經術飾吏事禮師儒修庠校均戸役年歉籌畫賑饑全活甚衆南畿志疊卜泰字允恭蒲城人泰定中烏江縣監為治以教先法春行勸農自裹糧以從民有訟者輒曉以禮法人皆感服南畿志明郭景祥字仲德濠梁人洪武初總制和州增樓櫓浚城濠置公署剙學宫飭農事廣屯田威望大著帝遣使以璽書勞之和州志李相字彦章四明人洪武初由京兆尹出知和州建州署築郭公銅城二壩南畿志陳𤦺字士英霍州人洪武中知和州民服其化男女異路囹圄空虚南畿志戴泰一福建龍溪人永樂初以隠逸應召知和州以清白稱南畿志侯潤寧海人正統十一年知和州嚴明㢘幹鋤强扶弱南畿志黄潤玉鄞縣人景泰初知含山縣鑿渠塘築隄堰躬課蓄洩含山縣志劉隆廬陵人天順六年知和州實倉廩平糶糴歲凶民賴以給奸胥病民必按律懲治不少貰訟至曲直立判南畿志董錫㑹稽人天順中和州同知均徭役清軍伍修黌宫興水利南畿志呉漣南海人為含山令樸易㢘潔以德化民歲饑作饘粥餉流移所活萬餘人公餘進邑諸生設帳講易廣輿記林長繁莆田人𢎞治中知和州愛民惜財案牘詳審和州志顧珀字戴祥晉江人正德四年知和州簡訟輕役發奸摘隠和州志孔公才字希文曲阜人正德中知和州渠寇劉六猖獗練兵修城復鑿重濠賊偵知有備不敢犯和州志祝𢎞舒四州人正德七年知含山縣崇學校毁淫祠清戸口平賦役含山縣志賈應春真定人嘉靖七年知和州事至立剖奸胥無所措手和州志孟雷澤州人嘉靖十一年知和州辭色不少假而内實坦易僚佐皆以臺部左遷以雷年少數易侮之雷風節不少挫羣僚亦心服焉和州志張叔宣内江人嘉靖二十三年知和州民有訟者輒和顔諭之毎里擇有行義者一人勸民以禮使勿爭嘗單車出見村婦逐隊挑田間野菜持一束歸和羮召諸僚佐共食之時有陳御史北上叔宣裁其夫役陳不能平尋按廬鳳㢘叔宣清介更力薦之和州志陳冠南昌人由刑部郎謫和州同知均徭除羨課士勸農鰥獨無告者時出俸錢周之和州志鄭曉海鹽人嘉靖中由吏部郎左遷和州同知多惠政性簡淡居城西峩嵋書院公事之暇著述不輟和州志晉朝臣洪洞人隆慶七年知和州清里甲除奸蠧崇奬節義甄拔寒微和州志郭繼芳字履謙富順人萬厯中授和州知州建巽塔徙泮宫和州志袁伯鑰豐城人萬厯初知含山田畝戸口詳請立一條編積弊一清含山縣志黎𢎞業字孟擴廣東人崇禎時知和州乙亥冬張獻忠圍城將陷𢎞業繫印於肘跪請於母李氏母泣諭曰子勿以我為累事至此有死而已遂自縊妻楊氏妾李氏四女皆自縊𢎞業乃望闕痛哭以硃題壁曰為官不負民為臣不負君忠孝誠已盡死生安足論引佩劍自刎未絶復甦更濡頸血書曰為臣死忠為子死孝大丈夫何惜一死哉賊突入被傷數刃而死事聞贈太僕少卿廕一子同時州判錢大用同妻妾及長媳死學正康正諫訓導趙世選吏目景一髙皆死之和州志國朝徐萃字元伯山東臨清人旗下貢士順治初知和州以簡御煩以惠兼義公餘讀書課士有風雅之遺民肖像祀之任憲伊清澗人順治四年以貢士同知和州有惠政遷兩淮運判士民思之朱長泰字謙茹德平人順治丁亥進士知含山縣嚴正果斷有包拯再出之謡鄰民有寃抑上控輒求下含山讞訊奬善黜惡不遺餘力三年考績以㢘敏著稱楊繼芳字仲延南和人拔貢順治十七年知和州為政敏給簿書叢錯綽有餘閒在任期年百務釐舉四野謳歌以上舊通志夏瑋字禹貢寧逺人康熙九年知和州均賦役省獄訟城垣就圮捐貲繕築不以擾民復修學宫纂志乗百廢具舉周元宰金州衛人康熙十六年知含山縣徵輸令民自納革里甲兜收之弊歲饑多方賑恤課民力田不足者給以牛種陞江寧同知去之日士民請留者數千人石參字星川奉天人康熙二十八年知和州宅心仁恕下車有不破一家不傷一士之誓賑恤災黎革除科派省差擾以息民嚴保甲以清盜卒於官士民立祠祀焉何偉字五峯奉天人康熙三十九年知和州臨政勤敏馭吏嚴明歲災區畫賑恤存活甚衆催科不事鞭扑輸者恐後禮師儒葺黌舍卒於官州民奉主與石守同祀號二賢祠廣德州宋范仲淹廣德司理叅軍日抱獄牘與守爭是非守盛怒不為屈歸必記其往復折辨之語於屏比去至字無所容貧止一馬鬻之徒歩而歸宋名臣言行録范師道字貫之呉縣人知廣德縣民喜淫祀歲用牛千數師道禁之妖妄遂絶南畿志錢公輔字君倚武進人治平間知廣德軍舊學在城北以卑隘徙之東南嘗撰學諭委曲訓誘使人知所崇嚮南畿志朱嗣孟樂平人為廣德司戸兼司理叛卒戚方犯廣德嗣孟有膽略直詣賊壘為陳逆順禍福方以忤已殺之事聞贈宣教郎宋史忠義王儔傳王儔建炎中權通判廣德軍戚方引兵過廣德入其郛儔不屈與判官李唐俊司法潘偊權知廣德縣韋績縣丞蔣䕫皆死宋史忠義傳洪興祖丹陽人紹興中知廣德軍鑿陂塘六百餘所民無旱憂宋史儒林傳熊彦照淳熙六年知廣德軍歲祲發倉賑給治為江東最南畿志耿秉由知廣德軍歲凶發倉粟賑給活饑民萬餘寧宗聞之璽書褒異南畿志趙彦誠嘉定中知廣德軍興學校重鄉飲置田以贍生徒立為善齋以教宗子南畿志王介字元石金華人知廣德軍韓􅇑胄隷人蘇師旦忿介不通謁目為偽黨有勸其自明者介曰我髪已種種豈畏鼠輩耶􅇑胄亦懼公議不敢發宋史本傳章一璧字君玉浦城人寳慶元年知建平縣振興學校深得治體南畿志林棐紹定四年知廣德軍奏蠲兩縣逋租一萬五千餘石代輸積欠十二萬貫公餘輯桐汭新志二十卷南畿志施德懋㑹稽人端平間知建平縣歲凶力行賑貸士以無養多失業招集教之復學田五百畝贍焉南畿志董槐字廷植定逺人淳祐中為廣德録事叅軍有誣富民李桶私鑄兵器結豪傑以應李全者捕繫之獄槐攝通判察其枉上書言狀桶得釋宋史本傳常楙字長儒海鹽人咸淳中知廣德軍郡大水不待上聞發倉粟活饑民又置慈㓜局立先賢祠民甚德之宋史本傳黄震淳祐間判廣德軍初孝宗頒朱熹社倉法於天下廣德之民困於納息人以熹之法不敢議震曰法出於聖人猶有變通安有先儒立法不思救其弊耶為别買田六百畝以其租代社倉息約非凶年不貸而貸者不取息郡有祠山廟夙稱靈應江淮之民詣禱者率身攖桎梏自行笞掠以徼福利悉禁絶之宋史本傳趙時踐字容月采石人宋末為廣德司戸叅軍郡守重其才使攝建平縣事元兵南下先驅擁東門時踐登縣樓搥皷伐鉦為守禦計城陷與妻子僕妾八人皆赴溪潭死南畿志王汝翼宋末知廣德縣元兵入境汝翼死之南畿志元王勉字懋德婺州人大德間尹建平杜私謁㑹大饑疫殫心賑恤復單騎挾醫人給藥卒於官子孫家焉建平縣志胡定國瑗孫大德間典建平學事興復學宫横經講説以道正人士類頌之建平縣志明陳寧明初授廣德知府歲旱百姓告災太祖不允寧赴京奏曰天旱田禾不收若復督徵必逃徙之蘇州是為張士誠益民也太祖曰爾大膽敢如此言從之南畿志張翼字鵬飛合肥人洪武三年知建平縣興舉廢墜規模整飭建平縣志羅坤泰吉水人永樂中知廣德州興學造士祛弊息爭一郡稱平廣德州志魯鐸泌陽人由國子生知建平縣政務寛恤視民事如家事去後民常思之建平縣志李觀字廷賔武昌人正統八年知建平縣建文廟築陂塘創預備倉及壇壝郵舍建平縣志周瑛字梁石莆田人成化間授廣德知州巡行原野察農勤惰更示蠶繅法訓迪士子至夜分乃散著廣孝慈録及祠山雜辨以諭民廣德州志邵蕃字文盛餘姚人成化中知建平縣清介愛民不任威力建平縣志孫紘鄞縣人𢎞治間知廣德州誠信㢘能鎮靜不擾廣德州志江暉字景孚仁和人正德中知廣德州出不坐乗食無兼味武宗南幸江以南率苦供億暉措辦得宜一方獲安廣德州志趙崇賢浙江人正德四年知廣德州時方議津貼建平軍需以助養馬崇賢曰馬政派自草塲軍需出於田畝縣民食田力而州民為之納税非制也亟白憲司停止之廣德州志鄒守益字謙之安福人嘉靖初由翰林謫判廣德州創復初書院置學田講良知之學士類翕然從之廣德州志連鑛永平人嘉靖七年知建平縣明律善斷設策擒亂民虞順境内以寧建平縣志陳德騄字房甫應城人嘉靖中知建平諸羨餘悉充正賦申減牧馬之額裁諸色供億履畝覈丈積弊盡除建平縣志趙佑卿嘉靖四十五年知建平築山陽楊學潘城等圩建平縣志宋鼇湘陽人嘉靖中建平縣丞倭躙郡邑鼇甫至即率民兵往禦至上海孤軍援絶倭衆猝至遂遇害殮時創鏃滿體士民哀之建平縣志陸長庚平湖人萬厯十一年知廣德州新黌宫置學田課耕濬渠置倉水隄以便軍民廣德州志朱之楫字斯濟通山人萬厯中知建平縣遷學宫墾浮湖廢地開西河增置義倉建平縣志張宗信山西人萬厯中知建平狷潔自持親民