  text: 江南通志卷四十八輿地志寺觀六和太廬鳯潁四府滁廣六泗五州太平府萬壽寺在府城東門内宋景德中勅分化城為萬壽寺寶祐三年濬放生池造石梁於上以通山門古化城寺在府城内向化橋禮賢巷呉大帝時為康里國僧會法師建道場三此其一也其址最廣宋孝武南廵駐蹕於此増二十八院院各有額唐天寶間造舍利塔大戒壇鑄銅鐘一李白銘至宋分其半為設險之所餘為西菴廣濟寺在府北采石山呉赤烏二年建宋天聖十年改廣濟院白雲寺在府東南青山之東峰六朝宋建福源寺在府東龍泉山六朝宋時螺浮尊者開山於此舊名龍泉宋改福源院明改今額澄心寺在府東横山齊陶𢎞景棲隠地宋嘉祐中改澄心院紹定中重建報恩光孝寺在府城西南隅唐名瑞竹寺宋紹興間改今額俗稱南寺古麓心寺在府城北采石鎮寶積山之東南一名寶積禪林舊在楊墓山唐武德四年建宋紹興中移建今所彌勒寺在府東南多福鄉唐貞觀二年建均慶寺府東南湖陽鄉唐乾元二年建東承天寺在府姑孰鄉上官莊唐大中三年建廣敎寺府城東黄池鎮唐大中三年華林覺禪師建宋紹興中改今名大仁寺在府北慈湖馬鞍山唐天成元年建廣福禪寺在府北黄山巔宋嘉祐三年建賜額廣福院藏雲寺在府城東歸善鄉舊名延壽院又名雲際院宋嘉祐中改今名無相寺在府城外尚書塘一名靈山寺元皇慶二年建吉祥寺在蕪湖縣西五里舊名永壽唐永和二年建宋景祐中賜名吉祥院東能仁寺在縣東即南唐古城院也宋大中祥符元年改曰東承天院政和中遷於城東寺後為夢日亭址普門寺在縣西南丹陽鄉甸山舊名普濟院南唐順義五年建明洪武中改今額普濟寺在縣南舊名水西宋天聖改今額以上蕪湖縣廣善寺在繁昌縣南十里八峯山下寺始於東晉明寶月禪師卓錫於此山多異蹟隠靜禪寺縣東南二十里隠靜山一名五峯寺六朝宋杯渡禪師建宋大中祥符間改晉慧禪寺嘉祐三年建閣藏三朝御書百一十軸龍泉寺縣西南二十里清隠山唐乾符間建善利寺在縣治南先在舊縣名善利院宋太平興國間建明天順元年遷縣寺移今所靈山寺縣西北靈山墩宋嘉祐間名戒香院明改今額圓炤寺在縣西十里銅山下化城寺縣東北三十里峩橋鎮舊在靈塘名松城寺宋焦韜移此嘉祐八年改今額幢山寺縣西三十里青山下宋淳熙六年建有甘泉古井碑龍華寺縣西十五里宋紹興二年建以上繁昌縣𤣥妙觀舊名天慶在城北宋太中祥符間建紹興二年徙建新城西門内希夷觀府城崇敎坊舊在城南宋紹興元年建名希夷堂元元統六年遷建於此改今額寧淵下觀在蕪湖縣西四里上觀舊在蟂磯山因風濤不便祈禱即佑聖祠增創宋隆興中賜今額元帝觀在繁昌縣西十五里紅花山頂唐乾符間建山腰有半山宮西延觀在繁昌縣西五十里荻港鎮舊名清華宋改今名相傳趙自然住此修煉神霄宮在采石鎮唐賢坊内有太白祠宋嘉泰元年建禪那院在府東南丹陽鎮齊永明二年建舊名禪定又名宣善宋淳祐中改今額淨居院在府多福鄉孳牧厰梁大寶元年建太平興國院府東白苧山宋紹興三年􅃯建廣濟院在蕪湖縣北赭山南麓唐乾寧中建有塔黄庭堅滴翠軒遺址在焉西能仁院在蕪湖縣治後即南唐古城羅漢院宋政和元年與東能仁寺同賜額真宗御書閣在焉常寂院在繁昌縣東北雲居山創於唐名古城寺宋嘉祐中改今額香雲院在縣東北三山香爐峰唐元和中建宋嘉祐中改今額崇法院縣南二十里唐建名雲峰菴宋嘉祐中改今額資聖院在縣東南隠玉山舊名浮丘寺宋嘉祐中改今額清隠院在縣西青山一名青山寺山下有翠麓亭太極洞普照禪林在蕪湖縣西北五里廬州府壽龍寺在府東南五十里晉建浮槎寺在府東浮山上梁建初名道林又曰福嚴先有梵僧過是山曰此闍耆一峯也萬壽寺在時雍門内歲豐橋南唐武德間建開福寺府西大蜀山唐貞觀間慧滿禪師道場有碑記明教寺在大東門内教弩臺遺址唐大厯中裴緝奏為明教寺三城寺在府城東天王寺在西平門内唐建明正綂丁卯重建有碑文地藏寺在北城内宋淳熈八年建五星寺府南嶽廟東宋咸淳中建邑棠寺府東三十里宋建羅漢寺在明教寺後石佛寺在三河鎮宋建包城寺在店埠鎮元建寶福寺在府小蜀山元建演法寺在府梁縣鄉金剛寺在廬江縣東南紫芝坊即楊行密故居舊名光化吳主建以居伏虎禪師妙光寺在縣西南元建冶父寺在縣東北二十里唐伏虎禪師建國朝順治四年重修大隆寺在縣東南元建金牛寺在縣西南四十五里宋僧安雅建有塔竹林寺在縣東六十里宋慶元五年建甘泉寺在縣東元建國朝順治十一年重修以上廬江縣觀音寺在舒城縣治西唐建白水寺在縣西鄉真如寺縣南十里千佛寺縣東二十里大聖寺縣東十里俱宋建旌忠禪寺在縣西香社寺在縣桃城鎮伏虎寺在縣城南三里淨梵寺在縣西周瑜城俱元建西伏虎寺在縣西梅嶺内有錫杖泉虎跑泉以上舒城縣景福寺在無為州治西唐貞觀中建國朝順治十五年修羅漢寺在州城東唐永徽三年建延福寺在州南宋淳祐三年建寶林寺在州西有古塔唐垂拱二年建南汰寺在州汰水之南宋咸平元年建有古塔北汰寺在州汰水之北唐永徽二年建雙泉寺在州北鄉唐伏虎禪師建泗州寺在州太平鄉宋開寶五年建慈雲寺在太平鄉宋建淳熙中勅賜教忠禪院巖臺寺在州開城鄉宋景徳三年建報國寺在州開城鄉宋建國朝順治五年修以上無為州定林慈氏寺在巢縣崇善坊梁建宋乾道中建塔西隱寺在縣臥牛山下梁建宋景定明宣徳重修見寺碑濡須寺在縣龜山上金城寺在縣西南圓通寺縣南二十里宋建相山寺在縣南山中宋開寶四年建高宗