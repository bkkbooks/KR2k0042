body:
  text: 江南通志卷十二輿地志山川二蘇松二府蘇州府陽山在府城西北三十里一名秦餘杭山一名萬安山一名四飛山以四面視之勢若飛動也顧元慶新録序云去城三十里蟠矗特異以其背陰面陽故曰陽山大峰十二箭闕最髙戰國策云越王以散卒三千禽夫差於干隧今萬安山有隧山即其地也箭闕下有文殊寺白龍塢嶺西有龍母塚前有龍湫白龍廟在焉東北有白鶴山以丁令威宅名山有白墡可用圬墁潔白如粉唐時嵗以供進故亦名白墡山東北過金芝嶺曰管山山北大石湧出如蓮花下有雲泉西為陽抱山西北為彭山北為雞籠山甑山東南有象山即福壽山又徐侯山在陽山西北十里一名卑猶吳越春秋云越王以禮塟吳王夫差於卑猶即此東南過鳳現嶺為鳳凰山又南為賀九嶺相傳吳王登此賀重九壁有賀九嶺三大字高景山天平支隴也越絕書作高頸山其西麓對花山厓谷盤拱處曰金盆塢宋魏了翁墓在焉其南為斜堰嶺金山亦天平支隴也初名茶塢山晉宋間鑿石得金易今名有石梁横架兩壁脈理不聨無所根蒂其下空洞通人行或以為類天台石梁山故多美石採之者衆近已殘毁白豸山在府西北三十二里滸墅之北按越絶書舊名胥女山春申君封吳更名今名為白石山以上長洲縣虎邱山在府城西北九里吳越春秋云闔閭塟此以扁諸魚腸劍三千為殉越三日金精結為白虎踞其上故名又曰海湧山絶巖聳壑茂林深篁為江左邱壑之表初山踞平疇中唐白居易始鑿山麓引水四周溪流迴映縁山南一徑而入遂有遥深幽邃之致其最勝者為劍池兩岸劃開中涵石泉深不可測世傳秦皇鑿山求劍處也稍前為千人石髙下平衍可坐千人神僧竺道生講經於此有㸃頭石生公講經時聚石為徒石輒㸃頭因名左有千葉白蓮池秦皇試劍石憨憨和尚泉清逺道士養鶴澗陸羽石井泉東晉為王珣别墅山下因有短簿祠劉宋何求兄弟陳顧越唐史德義並隠此上有浮圖雲巖寺梅花樓小吳軒平逺堂仰蘇樓五臺山千頃雲小竹林諸勝聖祖仁皇帝南巡屢幸是山上建行宫萬嵗樓御賜匾額雲巖寺曰連雲梅花樓曰澹香樓山門曰虎阜禪寺二山門曰路接天閶天王殿曰香界連雲大殿曰仙景澄輝關帝閣下曰雲光臺禪堂曰水雲深處行宫内曰静逺曰晴巒飛翠曰含輝山館萬嵗樓曰青雲鏡曰天光雲影又有御書亭碑勒御製虎邱山詩附梁顧野王虎邱山序夫少室作鎮以峻極而標奇太華神掌以削成而稱貴若兹山者髙不槩雲深無藏影卑非培塿淺異疎林秀壁數尋被杜蘭與苔蘚椿枝千仞掛藤葛以懸蘿曲澗潺湲修篁䕃映路若絶而復通石將頽而更綴抑巨麗之名山信大吳之勝壤若乃九功六義之興依永和聲之製志由興作情以詞宣形言諧於韶夏名文暢於鐘律由來尚矣未有登髙能賦而韜斐麗之章入谷忘歸而忽鏗鏘之節故總轡齊鑣競雕蟲於山水雲合霧集争歌頌於林泉於時風清邃谷景麗修巒蘭佩堪紉胡繩可索林花翻灑乍飄颺於蘭皋山禽囀響時弄聲於喬木班草班荆坐磻石之上濯纓濯足就滄浪之水傾縹瓷而酌㫖酒剪緑葉而賦新詩肅肅若與三徑齊蹤鏘然似共九成諧韻盛矣哉聊􅄒時事寄之翰墨宋王禹偁劍池銘并序虎邱劍池泉石之奇者也吳地記引秦王之事以為詭説考諸舊史則無聞焉矧儒家者流不可語怪因為銘以辨之銘曰茂苑之側震澤之巖巖虎山沉沉劍池峻不可以仰視深不可以下窺疑乎太極作􅏜化工好奇水物設險山妭忌危䧟其泉也葢取諸坎磔其石也以象乎離艮有止兆䝉無亨期構此屯難成乎險巇直恐夏后弗能導之豈惟秦王而能肇兹葢其始也一氣發泄兩儀分别爭融鬭結擊搏而裂斷壁雙掲摩雲不徹翠秃青殘挫銳而中絶寒流下咽犇山未决雪壅雷收抝怒而曲折蹙束湍瀨枒槎洞穴鰌翻成窟龍戰有血匪自人力葢從天設誰謂一拳登之維艱誰謂一勺挹之不竭池實自然劍何妄傳勒名山嶺破衆惑焉尹山在府葑門外十八里大姚山在府東南葑門外三十五里張林山在甫里鎮離城五十里周和山在府婁門外三里白蜆山在府城東三十里唯亭山在府城東三十五里以上元和縣玉遮山在陽山南横列如屏今呼遮山舊志謂之查山其南有案山化山苦竹山其北有蜀山東南有貞山東有官山馬山又東為雅宜山本名雅兒唐青州刺史張濟女雅兒塟此其南有朝山又東則五城山又東則真如塢與小白陽相連錦峰山在陽山西南山產異石霞駁雲燦宋兵部尚書鄭起潛居此淳祐中理宗書錦峰二字賜之鄧尉山在錦峰山西南去城七十里漢有鄧尉者隠此其地為光福里故又名光福山北有龜山光福塔在焉山之西北為虎山中通一溪跨以石梁曰虎山橋其東麓有七寶泉鄧尉西行厯鳥山觀山朝山塢西磧山彈山過長旂嶺竺山至𤣥墓出入湖山間居人愛植梅樹花開時數十里如積雪諸山惟西磧最高大其旁又有鐵山吾家山石帆山皆附鄧尉又馬駕山在鄧尉之隂又青芝山在鄧尉西南羣山環拱中稍豁一隅致為佳勝附明徐枋鄧尉十景記虎山橋凡遊鄧尉者必由虎山橋虎山固鄧尉諸山之始也其地四面皆山中匯二堰以受諸山之水廻環上下約二十餘里有石梁在亂山中雄跨二堰間層巒叠嶂映帶無已而左右巨浸波光極目正如長虹夭矯横亘碧落毎一登眺不復知此身之在塵世矣余每謂鄧尉二堰實不减西子湖以其山水相得也然西湖諸山奇麗處正如子瞻所云淡粧濃抹猶能擬似若鄧尉二堰則如仙真勝流不可方物矣余酷愛鄧尉山水之勝一嵗中嘗三四過之每至虎山橋輙徘徊不能去也司徒廟司徒廟柏千年物也雄奇偃蹇各極其致有非圖畫之所能盡者殆不减杜少陵所咏孔明祠前柏也零落空山榛蕪滿地昔人祠宇湮没無聞多矣而此獨以柏樹得傳不亦異乎或曰此漢高宻侯祠也銅坑過虎山橋為龜山龜山之麓直接平堤夾岸榆栁皆在下堰中遙望水際有物如螺雜樹䝉之浮廟墩也堰之盡長虹縹緲如綫銅坑橋也外則太湖具區矣烟水淪漣山林杳㝠而輕帆出没直浮天末亦一山之絶銅井鄧尉攴山銅井最勝以其石有泉也其頂高出諸山獨有二大樹冠之逺見三十里石磴盤紆拾級而上旣陟其巓有巨峰横偃大如十間屋其高幾丈嵌空崚峋作勢奇妙峰下有泉二俱在石罅中石皆青碧色其質細潤如古銅器而泉深如井故云銅井一云泉底有銅故水味常澁要不可考也峰側有古廟居二大樹下廟旁精舍三四楹坐臥食息與奇峰相對而烟雲出沒皆在足底真殊境也石璧鄧尉諸山苦少奇石故石壁雖在僻逺而遊屐之所必到也先自平疇躡山麓而上數折至山之半闕徑如砥夾路皆松杉也上倚巉巖下俯太湖湖水漰湃吞囓山足風起則谷嘯水湧聲聞甚逺盤山而行二里許將至石壁下又有一峰隔之再轉而入其徑最狹過數武忽有平地周數畝上即石壁也石固遜銅井之靈妙而獨以雄峭作奇嶄嶻如削壁色正黄勢廻抱當不减赤城矣中有精舍遊者至此必止息焉槎山鄧尉看梅名勝處𤣥墓稱絶餘則馬家山董墳朝元閣槎山磡上皆其選也然馬家山朝元閣皆有梅花而無太湖山不得水其勢不奇磡上固臨湖然一面取致曠而不深惟槎山則三面皆崇山峻嶺復自平田中突起一小山山之麓直入湖中登山瞰湖則逺水兼天一望無際而廻顧三面凡巖壑壁塢籬落叢薄幽深窈窕曲折層叠無非梅也春日旣麗花光照眼正如玉波雪浪洶湧青巒碧巘間自與澄湖萬頃爭奇矣七十二峰閣明顧文康墓在潭山之麓七十二峰閣即丙舍也閣傍多長松巨石後有峭壁雄據閣背山面湖一望而七十二峰之勝皆在目矣黛睂螺髻縹緲烟波間吾不能為形容也西灣西灣在𤣥墓之西太湖至此一曲故名西灣其地為鄧尉山中最僻處人跡罕到而多隠者依山而村山家野店無不朴古山多叢竹彌衍數萬亦諸山所無也余喜其地之僻嘗遊息焉地在湖漘毎中秋濤聲直薄於枕意即唐張潮所詠之西灣也隔湖即鳳凰山云磡上磡上亦名東灣以與西灣相對也多高崖抜起湖中亦有平沙浮衍波面崖上下皆山家屋宇蘺落井井行列屋後皆高山循山皆梅花數里中無雜樹軒窓乍啓波光如射而蒹葭離披天水俱永直移我情矣𤣥墓名勝志云吳之中惟𤣥墓最僻亦最奇面臨險隩丹崖翠壁望之若屏又名鄧尉法華障其前銅坑青芝迤邐其左遊龍界其右岡連嶺屬詭狀殊態不可殫述余以為此固仙山之所有也未足盡其勝也若以梅花為香國廻環百里皆梅與山水相間此天下之山之所無也而尤奇者以漁洋為屏太湖為沼左右開障其整如列睂此種氣象茍非開法王座則何物足以當之勝國末萬峰和尚駐錫於此故𤣥墓亦名萬峰厯年三百昔之祗林覺路蕪沒於荒榛衰草中不可復問今剖和尚繼之而法席愈盛於是危樓傑閣遍滿山崖矣國朝汪琬遊馬駕山記馬駕山在光福鎮西與銅井並峙山中人率樹梅藝茶條桑為業梅五之茶三之桑視茶而又减其一號為光福幽麗奇絶處也予入山與諸子循鄧尉之隂前行數十步輙有平原曲澗廻流倒影澄澈見底心稍稍喜於時遊人輿者騎者屣而從者不絶於道旣至山麓則其境益奇界以短畦藩以叢竹隂森蔚薈裁通小徑不能受輿騎率皆捨而徒步矣前後梅花多至百許樹香氣蓊勃落英繽紛入其中者迷不知出稍北折而上望見山半累石數卜或偃或仰小者可几大者可席蓋爾雅所謂礐也於是遂往列坐其地俯窺旁曯濛然㿣然曳若長練凝若積雪綿谷跨嶺無一不佳又有微雲弄白輕烟繚青左澄湖以為境右崇嶂以為屏水天浩漾蒼翠錯互然則極鄧尉𤣥墓之觀孰有尚於兹山者耶惜乎地深且逺莫有治廬其址者故不能信宿於此以窮其幽盡其變此則予之恨也馬駕山不載郡志或又謂之朱華山云𤣥墓山在鄧尉西南六里東晉青州刺史郁泰𤣥塟此故名按姑蘇志引聖恩庵開山記𤣥墓作袁墓上有聖恩寺丹崖翠閣望之如屏絶頂可攬全湖之勝康熙二十八年聖祖仁皇帝南巡駐蹕寺中賜御書松風水月四字其山陰與至理諸山相連直抵吕山西則孫家嶺諸山漸入於湖南為周山又法華山在𤣥墓山南一名鉢盂山三面皆在湖中峰塢幽閴遊者鮮至其東有横山漁洋山與周山相屬彈山在西磧之左發迹湖濱横亘六七里直接青芝瀕湖處有七十二峰閣所據極勝茶山一名繡裘山狀類土阜而通體皆石南去太湖不百步浮六小峰如翠螺摇曳水面厯厯可拾花山舊名華山一名天池山距陽山東南五里山石峭抜巖壑深秀續圖經云華山於羣山獨秀望之如屏或登其巔有石蓮花狀以此得名或云晉太康中曾生千葉蓮花也老子枕中記云吳西界有華山可以度難疑即此上有石屋二間四壁皆鑿浮圖像又有虎跑泉蒼玉洞桃花澗洗心泉諸勝其南為鹿山西有清流山東南為隆池山聖祖仁皇帝南巡幸此御製詩刋於華山寺恭紀首卷支硎山在縣西十五里晉支遁嘗隠此山得道升雲而去蘇州志平石為硎山多平石故因支遁以支硎為號焉山有石室寒泉放鶴亭馬跡石别有南峰東峰等峰唐建支山院處南有三巨石屹立如門下有觀音寺故亦名觀音山又定山在支硎西相傳支遁創報恩寺於此禪定故名續圖經謂支硎一名報恩山天平山在縣西二十里方輿勝覽云巍然特髙羣峰拱揖郡之鎮也林木秀潤更多奇石有卓筆峰飛來峰五丈石卧龍峰中子峰毛魚池大小石屋盧志云山頂正平有望湖臺圓石而湖者曰照湖鏡有白雲泉一線泉華蓋松又有穿山洞蟾蜍石及龍門南趾有白雲寺范仲淹祖墓在焉其西有筆架峰其後羣石林立名萬笏林又仰天山在天平西數里舊名馬鞍山宋范成大營墓於此慕仲淹為人遂改今名天平之西又有寒山明處士趙宧光鑿石為澗引泉為池山之勝境也附明髙啓遊天平山記至正二十二年九月九日積霖既霽灝氣澄肅予與同志之友治饌載醪指天平山而遊焉山距城西南水行三十里至則舍舟就輿經平林淺塢閒道傍竹石䝉翳有泉伏不見作泠泠琴筑聲予欣然停輿聴久之而去至白雲寺謁魏公祠憩逺公庵然後循其麓由狙杙以上山多怪石若臥若立若摶若噬蟠拏撑拄不可名狀復有泉出亂石間曰白雲泉綫脈縈絡下墜於沼舉瓢酌嘗味極甘冷泉上有亭名與泉同草木秀潤可蔭可息過此則峰迴磴盤十步一折委曲而上至於龍門兩岸並峙若合而通窄險深黒過者側足又其上有石屋二大可坐十人小可坐六七人皆石穴空洞廣石覆之如屋焉既入則慄然若將壓者遂相引以去至此蓋始及山之半矣乃復離朋散伍競逐幽勝予居前益上覺石益怪徑益狹山之景益奇而余之力亦益以憊矣顧後者不予繼乃獨褰裳奮步窮山之髙而止焉其上始平曠坦石為地拂石以坐則見山之雲浮浮天之風颼颼太湖之水渺乎其悠悠予超乎若舉泊乎若休然後知山之不負於兹遊也既而欲下失其故路樹隠石蔽愈索愈迷遂困於荒茅叢篠之間時日欲暮大風忽來洞谷唅呀鳥獸鳴吼予心恐懼俯下疾呼有樵者聞之遂相導以出至白雲亭復與同遊者㑹衆莫不尤予好奇之過而予亦笑其恇怯頽敗不能得兹山之奇絶也秦臺山在天平山之右與萬笏林相隣相傳秦皇遊㑹稽嘗登此故名其南則羊腸嶺嶺右為白羊山嶺南為赤山長可數里土石多赭色小白陽山在府城西一名伏龍山左抱靈巖右帶穹窿前瞰太湖為吳中勝處舊有寄心庵今廢其東南為博士塢彌陀嶺竺峰嶺又東南則獅子巖又南則野芝塢皆連屬靈巖山胥山在府西三十里太湖口寰宇記云子胥既死吳人立祠江上因名胥山下有九折路南出太湖吳王所闢以望太湖者也按越絶書云闔閭之時大霸築吳越城城中有小城二徙治胥山然則胥山之名在闔閭時已有之矣未必因於子胥也姑蘇山在府西三十里横山西北一名姑胥一名姑餘古姑蘇臺在其上司馬遷嘗云登姑蘇之臺以望五湖即此岝㠋山在府城西南金山之東圖經云形如獅子故亦名獅子山也水經注以為岝嶺山吳地記云吳王僚塟此山南有大石相傳為墜星山右有土阜曰鈴山左曰索山皆以獅子名續圖經云山南有思益寺白居易嘗遊之今廢何山在獅山北一里一名鶴阜山其地舊為鶴邑墟也梁隠士何求何㸃塟此故改今名横山在府西南十一里姑蘇山東隋書十道志云山四面皆横故名一名踞湖以其背臨太湖若箕踞也續圖經云此山鎮郡西南臨湖控越吳時要地隋開皇中嘗遷郡於横山東以山為屏蔽周圍甚廣環以佛刹如薦福楞伽寶華堯峰之類有五塢芳桂飛泉修竹丹霞白雲也堯峰山在横山西南吳劉鳯記云堯嶺者記堯時水所至也其髙踰千仞蓋洪水汩原東南下卑其勢必滔墊古有所識也烟霞瀰漫不辨晴雨有清暉軒碧玉沼多景巖寶雲井白龍洞觀音巖偃蓋松妙髙峰東齋西隠十景今僅有存者上為聖壽寺下為興福院康熙二十三年聖祖仁皇帝南巡賜翰林院編修汪琬御書一卷因建閣於山西麓又西為鴨踏嶺嶺下為石塢中産文石其南有寶華山長旗嶺其東有感慈塢又東為吳山其南有桃花塢臨太湖白楊灣與吳江分界楞伽山一名上方山在吳山東北上有浮圖東南麓有丁家山唐人丁公著父喪負土成墳故名其北為寶積山又北為吳王郊臺東北為茶磨山黄山在茶磨山北四里胥塘之北諸峰髙下相連俗稱筆格山周必大遊山録謂有法雲寺及浮圖今皆無靈巖山在府西南二十五里一名硯石山越絶書云吳人於硯石山作館娃宫即其處也續圖經云山西有石鼓故又名石鼓山登其巔俯瞰具區烟濤浩渺一目千里而碧巖翠塢㸃綴滄波之間誠絶景也續圖經云山頂有三池月池研池玩華池雖旱不竭昔吳王置離宫於此有琴臺館娃宫西施洞響􅓏廊吳王井遺蹟其石壁峭抜者為佛日巖平坦處有靈巖寺康熙二十八年聖祖仁皇帝南巡幸此穹窿山續圖經云在縣西南六十里兩嶺相趨名曰同嶺産自然銅又曰銅嶺越絶書云赤松子採赤石脂於此又神仙傳秦穆公魚吏赤鬚子食柏實石脂絶榖後往吳山升仙去即穹窿山也山髙而平其頂方廣可百畝半山有泉名法雨可以灌田東嶺下有盤石髙廣丈許相傳有朱買臣讀書臺其北有紫藤塢百丈泉香山在府西南七十里北連穹窿山南近太湖為胥口吳地志云吳王遣美人採香於此或云種香處下有香水溪今名箭涇洞庭西山在太湖中一名包山又名夫椒山漢書云下有洞穴潛行水底無所不通號為地脈故謂洞庭山道書以為第九洞天周迴百三十餘里重岡複嶺縈洲曲溆諸峰無不奇挺而縹緲峰為最髙縁山擇勝名刹凡十有八而林屋洞毛公壇桃花塢消夏灣崦裏諸迹尤著中涵緑野自成村聚居人以桑梔橘柚為常產每秋髙霜餘丹實與茂林相差於巖壑間望之若金翠圖繪云林屋洞有三門同㑹於一有金庭玉柱又有石鼓石鐘其聲清越漢劉根於此學道以洞故一名林屋山西洞庭之北曰横山曰陰山晉陰長生煉丹處東為禹期山或云禹㑹諸侯於此南有大雷小雷五湖賦云大雷小雷湍波相逐又有金庭玉柱等山洞庭東山亦在太湖中周六十餘里史記謂之莫釐山相傳莫釐將軍居此盧志一名胥母山越絶書云闔閭旦食於紐山晝行於胥母是也以洞庭在西故今稱為東洞庭視包山差小而岡巒起伏廬聚物產大畧相似論者謂稍遜西山之清潤云其東麓曰武山本名虎山吳王養虎於此西南曰三山有三峰相連昔有稱此湖為三山湖者以此又有澤山厥山以上吳縣明王鏊洞庭兩山賦并序楚之湖曰洞庭吳之山亦曰洞庭其以相埒耶將地脈有相通者耶郭璞云包山洞庭巴陵地道潛達傍通是未可知也而吾洞庭實兼湖山之勝始山特為幽人韻士之所棲靈山佛子之所宅至國朝名臣徹爵往往出焉豈湖山之秀磅礴鬱積至是而後泄於人耶東岡子曰山川之秀實生人才人才之出益顯山川顯之維何蓋莫過於文兩山者秘於古而顯於今其實有待子無庸辭余曰然乃為之賦其詞曰吳越之墟有巨浸焉三萬六千頃浩浩蕩蕩如滄溟渤澥之茫洋中有山焉七十有二渺渺忽忽如蓬壺方丈之彷彿日月之所升沉魚龍之所變化百川攸歸三州為界所謂吞雲夢八九於胸中曽不蔕芥者也客曰試為我賦之夫太始沕穆一氣推遷融而為湖結而為山爰為羣峰散見叠出於波濤之間或現或隠或浮或沉或吐或吞或如人立或如烏鶱或如黿鼉之曝或如虎豹之蹲忽起二峰東西雄據有若巨君彈壓臣庶又若大軍之出千乗萬騎旌幢寶蓋繚繞奔赴東山起自莫釐或騰或倚若飛雲旋颷不知幾千百折至長圻蜿蜒而西遊西山起自縹緲或起或伏若驚鴻翥鳯不知幾千萬落至渡渚迴翔而北折試嘗與子登髙騁望近則重岡複嶺嵅岈庨豁縈洲枉渚䖤蟺緬邈逺則烟蕪渺瀰天水一碧帆影見而忽無飛鳥出而復沒靈巖則返照孤稜弁山則輕烟一抹此亦天下之至奇也若乃長風駕浪歕山欱野足使人魂驚而汗駭及其風日晴熙縠紋漪漪又使人心曠而神怡至於瑶海上月流光萬頃星河倒懸盪漾山影又一奇也遥山霽雪凝華萬疊玉鑑冰壺上下相合又一奇也風雨晦明頃刻異候烟雲變滅咫尺殊狀雖有至巧莫能為像試嘗與子弔古尋幽則有迴巖穹壑䆗窱相通琳宫梵宇暮鼔晨鐘壽藤靈藥美箭長松金庭玉柱石函寶書靈威丈人之所窺也貝闕珠宫繡縠鳴璫柳毅書生之所嫓也翠峰杜圻范蠡之所止息黄村甪頭綺皓之所從逝也而闔閭夫差之跡尤多存者玩月之渚消夏之灣牧馬之城圏虎之山練兵之瀆射鶚之巒出金鐸於淺瀬逸梅梁於驚湍他若毛公燒丹之井蔡經鍊藥之墩聖姑絶雉之塘雪竇降龍之淵其石則岌崒嶙峋痩漏嵌空牛奇章有甲乙之品宋艮岳有永固之封其泉則囦淪觱沸甘寒澄碧墨佐君表無礙之名天衣禪留悟道之跡斯地也孫尚書欲卜居而不能范文穆思再至而不果豈如吾人生長兹上依巖架棟占野分圃散為村墟凑為闤闠桑麻交蔭雞犬鳴吠里無郭解劇孟之俠市無桑間濮上之音婚姻相通若朱陳之族理亂不識若武陵之源佛貍之馬跡不到周顒之俗駕自旋星應五車地絶三班盧橘夏熟楊梅日殷園收銀杏家種黄柑梅多庾嶺梨美張谷雨前芽茗蟄餘萌竹水族則時裏之白膾殘之銀魴鱸鮒鮆自昔所珍吾且與子摘山之毳掇野之茸割湖之鮮釀湖之醲泛白少傅月夜管絃之舟扣天隨子太古滄浪之歌弔吳王之離宫叩隔凡之靈窩凌三萬頃之瓊瑶覽七十二之嵯峨其亦足樂乎彼岳陽彭蠡非不廣且大也而乏巍峨之氣天台武夷非不髙且麗也而無浩渺之容蓋物不兩大美有獨鍾兹謂人間之福地物外之靈峰是固極遊觀之美而未知造化之工且夫天地之間東南為下非是湖為之尾閭洩之瀦之則汎濫横溢江左之民其為魚乎懷襄之世湖波震蕩非是山為砥柱鎮之繞之則奔激暴囓湖東之地其為沼乎唯夫天作之寛以納以容地設之隘以襟以帶禹順其流分疏别派三江既入萬世永頼而後吾人乃得優游於此蓋至是而始知造化之意深神禹之功大七十二峰記太湖之山發自天目迤􅆔至宜興入太湖融為諸山湖之西北為山十有四馬蹟最大又東為山四十有二西洞庭最大又東為四十有七東洞庭最大馬蹟兩洞庭望之渺然世外即之茂林平野閭巷井舍仙宫梵宇星布碁列馬蹟之北津里夫椒為大夫差敗越處也西洞庭之東禹期黿山其北橫山陰山葉余長沙山為大長沙之西衝山漫山為大東洞庭之東武闕數百家或西闕家馬蹟兩洞山為大此上有居人數十庭分峙湖中其餘諸山或逺或近若浮若沉隠見出没於波濤之間馬蹟之西北有若積錢者曰錢堆稍東曰大㞦小㞦與錫山若連而斷舟行其中曰獨山有若二鳬相向者曰東鴨西鴨中為三峰稍南大嶞小嶞與夫椒相對而差小為小椒為杜圻范蠡所嘗止也西洞庭之北貢湖中有兩山相近曰大貢小貢有若五星聚曰五石浮曰茆浮曰思夫山有若兩鳥飛且止者曰南鳥北烏其西兩山南北相對而不相見見即有風雷之異曰大雷小雷横山之東曰干山紹山曰疃浮曰東嶽西嶽世傳吳王於此置男女二嶽也其前為粥山云吳王飼囚者也有若琴者曰琴山若杵曰杵山大竹小竹與衝山相若物浮水面可見者曰長浮􅋪頭浮殿前浮與黿山相對而差小者為龜山有二女娟好相對曰謝姑有若立柱嶻嶭者玉柱稍却金庭其南為峐山為厯耳中髙而旁下者筆格驤首若逝者石蛇有若老人立石公石蛇石公石最奇與黿山龜山南北相對曰鼉山旁曰小鼉若螺者青浮二鼉之間若隠若見曰驚籃東洞庭之南首鋭而末岐者曰箭浮若屋欹者王舍浮苧浮又南為白浮澤蕨之間有若笠浮水面者蒻㡌有逸於前後追而及之者猫鼠有若碑碣横者曰石牌是為七十二然其最大而名者兩洞庭也蔡羽銷夏灣記山以水襲為奇水以山襲尤奇也再襲之以水又襲之以山中函池沼寛周二十里舉天下之所無奇之奇銷夏灣是也灣去郡城且百二十里春秋時吳子常從避暑因名銷夏自吳迄今􅂷二千年遊而顯者不過三五輩其不為凡俗所有可知已湖之山莫大於包山山之峰莫大於縹緲峰髙不知其幾里袤五十里有奇峰之南水道三十里為苕溪其弗能與苕溪參者諸巒抱其外也苕之北舟行三十里以求縹緲峰其弗能與縹緲峰直者亦諸巒為之拒也四面峰巒交萃獨以一面受太湖其中虚如抱甕其南列門闕焉由門闕東西盼西為龍頭山其次為小洞庭為石蛇為舍為蕪為鼠鬭之石不得而名焉東則大小明月灣為石公為澤為蕨為三山不得而名焉明月之灣其背為梭山厥土墳壚厥產林擒鴨脚櫻桃柚柿梨棗龍頭之背為圻村厥土白礫厥產玉石盧橘當銷夏之腹印浮其上乍有乍無為衆安之洲帆落洲上則四面環合為屏為翰聳妍效譎以與縹緲相拱峰之巔有草無木其麓多木無草丹宫梵室䝉蔽林靄鐘鳴鼔應然後知仙釋之廬魚行鳥過形影交徹帆翔其上而莫之知避也夫天地既異而處其僻信乎遊者之難至矣向使移而置之附郭則撰壺觴秣車馬者日不暇給豈獨為吾灣哉人將僬乎劍負以趨萬物失所矣夫造化無意者也設是灣如有意鬼神之能不得而與非㝠契其事孰能樂之嗚呼非惟世之人不得而樂灣之人亦莫得而樂也余世居灣上有所獨得私志之龎山在吳江縣東南三里其北即龎山湖虞山在常熟縣西北里許虞仲居此故名海虞或云海嵎亦名海巫又名烏目皆此山也雖無峰巒而蜿蜒起伏畧如臥龍今縣跨山為城分踞巖壑城内有仙人洞城外有拂水巖崖石陡峻水奔注如虹凌風飛濺最為奇勝山陽有寶巖灣山陰有桃源洞又有三沓石與石城石門諸峰錯峙下有石壇破山在常熟縣虞山北六里相傳龍鬭而山破故名上有鬭龍澗傍有硃沙洞放生池東北有空心潭又有舜井頂山在常熟縣破山北十二里上有齊女峰相傳齊景公女葬此又有白龍池水簾洞南有烏目澗皆虞山之别峰支嶺也福山在常熟縣西北四十里俯臨大江與通州之狼山相望境特雄本名覆釡唐改為金鳯五代吳越改今名山麓有東嶽行祠壽山在常熟縣西北四十里與福山相連北濱大江又名陶山河陽山在常熟縣西北四十里一名鳯凰山髙一百二十丈上有秀峰醴泉又有梁時古檜及唐狀元陸器讀書臺志山在常熟縣與河陽山相峙按盧志居民鑿池得唐斷碑有鷙山之語則志當作鷙塔山俗呼箬㡌山在河陽山南晉處士夏統宣城太守邴臻嘗居此范山在常熟縣北三十六里相傳梁范冀兄弟居此故名常熟山在常熟縣北三十七里本名銅官或云洞觀唐改今名石家山在銅官山北茯苓山在常熟縣西北六十五里下有龍潭石䦨猶存相傳舊產茯苓故名宛山一名苑山在常熟縣西五十里產石堅潤可為硯顧山在常熟縣西北五十里連無錫江陰二縣界俗呼三界山亦曰香山烏邱山在常熟縣東南二十七里去崑承湖三里或作塢山秦柱山在崑山縣東南三十里按圖經秦柱山在海鹽縣東南三十里而寰宇記又云縣南三十里有秦柱山又吳録云一名秦望山秦始皇登此望海故名盧熊志云今千墩寺佛殿有山髙二丈者是或以千墩去海甚逺雖陵谷變遷古今不一未敢信其必然也又東山在縣東南車塘里宋范良遂讀書築亭其上扁曰墨莊馬鞍山在新陽縣西北廣袤三里髙七十丈孤峰特秀極目湖海上有慧聚寺又有華藏寺及浮圖七級玉泉井大小石浮圖南有桃源洞北有鳯凰臺西有一線天東有東巖又有紫雲巖桃源洞長陽洞文筆峰始縣以崑山得名今崑山割𨽻華亭縣界遂呼馬鞍山為崑山産玲瓏石康熙四十四年聖祖仁皇帝巡幸登文筆峰因建皇殿於上大海在昭文縣東百里自白茆港口而下為江海交㑹處三江一名三江口在府東南三十里舊説東江松江婁江皆自太湖分流今由吳江縣東北流經長洲崑山東入嘉定界者為松江一名吳淞江自吳縣北入運河經郡城東過崑山至太倉州境者為婁江唯東江不可考或以黄浦當之詳見河渠志以上係吳縣姚城江在吳江縣東南三十里由松江分派以達於白蜆二江吞吐衆流經黿蕩入澱山湖凡三十餘丈大江在昭文縣北西接江隂之涸瀆浦東至太倉界之撑脚浦福山港居其中北對通州狼山最稱險要新江在崑山縣宋嘉祐間所開其西接松江南入陳湖北入鰻鱺湖又有四十二浦西北之陽城南之澱山湖水皆納焉新洋江在新陽縣出自松江而流於横塘通卜處浦大虞浦吳淞江在新陽縣南九里運河在震澤縣南自嘉興石塘北流經郡城為胥江為南濠又北繞白公堤出望亭入無錫界續圖經謂之䢴溝按隋開江南河通龍舟以巡㑹稽即此河也陽城湖在府東北二十里所納之浦凡十視諸湖蕩為大東為包湖傀儡蕩二水與陽城合而為一又東為巴城湖北為鰻鱺湖施澤湖沙湖在府東二十里一名金沙湖湖雖小而與吳淞江諸水吞吐有青邱戴墟二浦以上長洲縣澹臺湖在府西南十八里太湖之東史記云澹臺子羽南遊至江索隠注吳國東南澹臺湖即其故址吳地記以為子羽宅所䧟自此東經寶帶橋入運河分流入黄天蕩及陳湖又東為獨墅諸湖又東為尹山諸湖尹山湖在府東南二十里尹山市東北漕湖本名蠡湖在府西北四十里寰宇記云范蠡伐吳開蠡瀆通此故名其稱漕湖不知何始或以其通漕運故也唐書地理志云元和八年孟簡開太伯瀆并𨗳蠡湖故以瀆為孟瀆湖為孟湖其實古之蠡湖也其東有蠡口湖之西屬無錫而其浸皆在長洲以上元和縣太湖在府西南三十餘里禹貢謂之震澤周官爾雅謂之具區國語史記謂之五湖其實一也越絶書云太湖三萬六千頃水經注韋昭云方圓五百里踞蘇常及湖州三郡地中有七十二山居民環匝北有百瀆納常潤諸郡之水南有諸漊納天目宣歙諸山之水為東南巨浸楊修五湖賦云頭首無錫足蹄松江負烏程於背上懐大吳以當胷數言可作圖經也昔稱五湖多異説不足據然今亦有菱湖莫湖游湖貢湖胥湖五湖又有梅梁金鼎東皋里等名而統曰太湖其水由長橋口注松江東入於海附明王鏊五湖記吳郡之西南有巨浸焉廣三萬六千頃中有山七十二襟帶三州東南之水皆歸焉其最大者二一自寧國建康等處入溧陽迤􅆔至長塘并潤州金壇延陵丹陽諸水㑹於宜興以入一自宣歙天目諸山下杭之臨安餘杭湖之安吉武康長興以入而皆由吳江分流以入海一名震澤書所謂震澤底定是也一名其區周禮職方揚州之藪曰其區山海經浮玉之山北望其區是也一名笠澤左傳越伐吳吳子禦之笠澤是也一名五湖范蠡乘舟出五湖口太史公登姑蘇臺望五湖是也五湖者張勃吳録云間行五百里故名虞仲翔云太湖東通長洲淞江南通烏程霅溪西通宜興荆溪北通晉陵滆湖東連嘉興韭溪水凡五道故謂之五湖陸魯望云太湖咸池五車之氣故一水五名然今湖中亦自有五湖曰菱湖莫湖游湖貢湖胥湖莫釐之東周三十餘里曰菱湖其西北周五十里曰莫湖長山之東周五十里曰游湖沿無錫老岸周一百九十里曰貢湖胥山之西南周六十里曰胥湖外又有三小湖夫椒山之東曰梅里湖杜圻之西魚查之東曰金鼎湖林屋之東曰東皋里湖而吳人稱謂則惟曰太湖云爾陳湖在府東南三十五里曠野之區接崑山縣界石湖在府西南二十里白洋灣所匯也界吳縣吳江之間有茶磨諸峰映帶頗為勝絶吳郡志云范蠡從此入五湖處宋㕘政范成大居此孝宗書石湖二字賜之其東一溪北流横塘曰越來溪與木瀆水合出横塘橋東入胥門外運河為胥江亦曰胥塘北流閶門運河曰綵雲港自横塘北入運河曰洞徑胥塘之水又㑹為沙湓潭與虎邱山塘水合曰射瀆相傳吳王嘗射於此亦名石瀆又北為長蕩轉入婁江胥口自太湖東出於香山胥山之間又東為木瀆香水溪在焉又東與越來溪㑹曰横塘以上吳縣鮎魚口在吳江縣太湖之北北流經齾塘入盤門運河東至分水墩東流入長洲界為柳胥港即夾浦轉入澹臺湖南流入吳江縣界為龎山湖龎山湖在吳江縣自分水墩南流入甘泉橋匯於此其下流為黎湖菱湖葉澤湖新湖葉湖之東為九里湖亦名同湖急水港杓頭潭清水蕩在焉澱山湖在吳江縣界長洲崑山之間吐納東南諸水玉峰續志云湖屬華亭惟北岸𨽻蘇郡其北為范青漾為度城湖北入新洋江汾湖在吳江縣一名分湖以分屬吳江嘉興也其東流入謝宅蕩蓴菜蕩南陽港又東通三泖入華亭界北入三白蕩鶯脰湖在震澤縣西南其源自天目東流至荻塘㑹爛溪水併出平望匯於此以其形似鶯脰故名亦名鶯鬭湖又有震澤湖唐家湖蠡澤湖沈張湖並在縣治崑承湖在常熟縣東南五里自無錫以東長洲以北之水匯流於此洚溪在震澤縣西南西受烏程諸水東分為横古塘又東合於南潯荻塘㑹十四港以入於湖白茆港在昭文縣東七十里自縣城内運河分流西合山塘尚湖崑承諸水東至沙營塘吳中諸水北流者皆由此以達於海宋明至今相繼修治詳見水利許浦在常熟縣北七十里西接梅李塘㑹崑承諸湖水以達於海宋孝宗時設水軍寨於此又黄泗浦蔡浦在縣西北俱西接江陰北入揚子江七浦在昭文縣一名七浦塘一名七鴉浦洩陽城諸湖之水以達於海千墩浦在崑山縣東南四十里新洋諸江之水匯流於此接吳淞江入海明永樂中太常少卿袁汶奉詔浚之今南流注於澱山湖黄涇在昭文縣北自陳家市南流至七星橋又新開洪西自七星橋沿湖港至沈浜東流入白茆港耿涇在昭文縣坊浜流至大江口琴川在昭文縣治横港七派如琴絃然皆發源虞山東注運河今多湮塞按述異記云梧桐園在吳宫本吳王夫差舊園也本名鳴琴川後省鳴字沿稱至今松江府崑山在府西北二十三里長谷之東陸氏之先塟此世謂山因二陸如玉出崑岡得名然士衡詩已有婉孌崑山之語則山名已在前山形圓秀而潤傍無附麗望之如覆盎然其上有三聖閣下瞰大泖在几席間山陰有二陸故居初梁時置崑山縣遂誤以馬鞍山為崑山其實崑山在華亭不在彼也松人反以小崑自名山有九峰九峰者一鳯凰二陸寶今以厙公當之三佘四細麻五薛六機七横雲八干九崑也在唐宋未名自元凌嵓作九峰詩楊維貞陶宗儀亟稱九峰於是大著以上華亭縣横雲山在崑山東北本名横山唐天寶中易今名或云以陸士龍名也其巔有白龍洞潛通澱湖深不可測下有祭龍壇嵗旱禱焉小横山顧志云在横雲東中限一水嶐然而興由絶頂至東北皆峰巒隠起壁立數仞色盡赭人呼為小赤壁盡壁斬然一罅如虎邱試劍石狀前有石可踞而坐下瞰小澗亦九峰奇絶處也陳志云山之麓有小山招隠元孫稷所居又傳有僲雲館凝翠軒為蘇東坡遊賞處今廢機山顧志云在横雲後南北相望以陸機得名山下有平原村亦以機為平原内史也前有陂澤人家散布汀岸若圖畫干山在機山東九峰中最為髙大或傳干將曽此鑄劍舊圖經則云有干姓者居此故名又以形如天馬稱為天馬山上有浮圖七級登覽者極江海之觀山頂有雙石魚相傳風雨化去其脅有泉掬以頮面能明目鍾賈山在千山東一水左限沈經塘與盧山對峙相傳以鍾賈二姓居此得名又名中介山以介在九峰間也盧山在沈經塘疑亦以盧姓得名以上婁縣柘山在金山縣柘湖中湖已涸山在平陸生柘樹因名鄉人祠三姑之神於此秦山在金山縣張堰鎮西俗謂秦皇曽登此望海故又稱秦望山山之陽有仙人洞查山在金山縣張堰南稍東去秦山十餘里舊名遮山錢衮定為查據集仙外傳云查玉成煉丹海上小山中今山臨海上有浴丹井而鄉名又曰仙山其當為查無疑也金山在金山縣海水中舊志云去府九十里周康王嘗於此築城其北即古之海鹽縣後淪於水山有平坡可坐其北有寒穴泉明初設衞於華亭以金山為名又小金山亦在海中元楊維貞云淞之南有大金小金出沒於雲海之中者是也又金山東有許山西有浮山勝山又有竹嶼山達岸山蘇山羊山西北距金山衞七八十里皆在海中而羊山為尤大澱山在青浦縣舊通志云在薛澱湖中山形四出如鼇上建浮圖下有龍洞云通太湖山屹立湖中今山在平田去湖益逺向有十景俱廢陳志云又西北一小山山皆石骨名箕山細林山在青浦縣舊名神山唐天寶間易名細林元時仙人彭素雲宅此昔有神鼉仙館四字筆法奇異或云吕純陽書明錢溥有細林八景詩甘白泉在東麓附梁簡文帝細林山銘神山本名秀林山或稱辰山在華亭西北二十餘里列九峰第四僻在一方雖非巨麗未經標品而自古神仙往往托跡實震旦之靈阜也余以幾暇結駕游衍覽兹佳勝腃焉有懐乃作銘曰閣號天井山稱地維碧雞金馬越瀆梁池懐靈藴徳孕寶含奇此亦仙岫英名逺攡昔有鶯窟不燒浄土邁彼髙蹤構兹法宇引葉成帷即樹為柱石砌危横崖堦斜竪白巘途逺丹源路深長林萬頃偉木千尋竹窻看博松間聴琴捐氛蕩累散賞娯襟佘山在福泉縣舊傳有佘姓者養道於此故名按吳興志亦有佘山上有東漢佘將軍廟好事者遂指此為東佘云其髙與干山等東西二峰延亘數里招提蘭若隠見其中望之穠郁深秀明陳繼儒施紹莘隠此土宜茶有泉名洗心甚清冽產筍香如蘭康熙五十八年聖祖仁皇帝南巡賜御書蘭筍山三字額懸於宣妙寺薛山在福泉縣佘山東中限一水吳地記云昔薛道約居此因名嘗掘地得石誌曰玉屏山形亦肖故又稱玉屏山下有羅池產藕甚佳今池已竭鳯凰山在福泉縣圖經云山之鎮曰鳯凰以其據九峰之首延頸舒翼宛若鳯翥故名東枕通波西連玉屏修峻特起羣山拱揖左有青壁髙數十仞勢如削成其上多虬松古藤厙公山在福泉縣鳯凰山南昔有厙公隠此得名陳志云土宜盆盎可栽蘭竹陸寶山在福泉縣本陸氏家山界鳯凰玉屏之間向列九峰之一後以取土夷為平陸簳山在福泉縣鳯凰山北顧㑹浦東距府三十六里上海之境自此始嘉禾志作竹簳俗呼北簳又訛為北干以南有干山也舊云土宜美箭故名或傳產鐵今皆無山有玉寶泉甚清洌有雨華洞宋張頭陀隠居於此今塞福泉山在福泉縣簳山北以有美泉得稱山下皆黄土青浦分縣為福泉以此名大海環府之東南二境淞江與黄浦㑹而入焉其㑹處曰蹌口其南與紹興寧波相望耆老云深夜籟寂時越中鷄犬之聲相聞今天日晴明南岸諸山皆厯厯可指自金山東過勝山為南洋又東至洋山又東南為南大洋北至髙家嘴為蘇州洋又東為東大洋宋元間諸番貢道皆由青龍市舶司今於上海設海關松江在府北七十四里上海縣界府因以名一名吳淞江亦曰松陵江其源出太湖自吳江長橋東流至尹山北流至甫里東北流至澱山北合趙屯浦東合大盈浦又東合顧㑹浦崧子浦盤龍浦凡五大浦至宋家橋東南流與黄浦㑹而入海將入海别為滬瀆在上海縣北十里上有城壘附宋葉清臣松江賦澤國秋晴天髙水平遥山晚碧極浦寒清循游具區之野縦汎吳淞之􅍽東瞰滄海西瞻洞庭槁葉微下斜陽半明樵風歸兮自朝暮夕溜滿兮誰送迎浩霜空兮一色横霽色兮干名於時積潦未收長江無際澄瀾方興扁舟獨詣社橘初黄汀葭餘翠驚鷺朋飛别鵠孤唳聴漁楖之遞響聞牧笛之長吹既覽物以放懷亦思人而結欷若夫敵冦初平霸圖初盛均憂待濟同安則病魚貪餌而登鈎鹿走險而忘命一旦辭禄揚舲高泳功崇不居名存斯令達識先明孤風孰競又若金耀不融洛塵其䝉宗城寡捍王國争雄拂衣洛土震耀江東拖翠綸兮波上膾蟬翼兮柈中倘即時之有適遑我後之為恫至如著書笠澤端居甫里兩槳汀洲片帆烟水夕醉酒壚朝盤魚市浮游塵外之物嘯傲人間之世富詞客之多才劇騷人之清思緬三子之清徽諒隨時之有宜非才髙見棄於榮路乃道大不容於禍機申屠臨河而蹈壅伯夷登山而食薇皆有為而然爾豈得已而用之别有執簡仙瀛持荷帝柱晨韜史氏之筆暮拂使臣之斧登覽有澄清之心臨遣動光華之賦何從欲之流滋慰逺遊之以懼肇提封之所履屬方割之此憂將濬流而匯川其拯濟乎畛疇轉白鶴之新渚據青龍之上游濯埃垢於緇袂刮病膜乎昏眸左引任公之釣右援仲由之桴思勤官而裕民乃善利之逺猷彼全身以逺害蓋孔臧於自謀鮮鱗在俎真茶滿甌少回俗士之駕亦未可為兹江之羞國朝任辰旦吳淞江賦并序蓋三江為禹治南條之一而吳淞又為禹治三江之一也按諸水利實綦鉅焉嗣迺興廢靡常纍臻平陸自國朝受命以來江南卿大夫皆名賢諮濬故道規畫咸備厥功茂矣及余筮仕申江復奉令而踵成之爰為之賦其辭曰啟亶禹迹之逺敷覩江流而思邈衍壙垠於平沙辰曜而光矚匝三吳以運靈衆流奔匯而注之壑爾廼瀉其區之横波開天臺之筦鑰納銷夏引松陵合薛澱饒茸城三泖就谷長蕩迅騰澉浦下潤風渚地行以暨青龍白鶴之派羣分條縷莫不趨焉而共寧況乎月盈而潮汐渟乾而放盈可滀瀦以當雨抑陂障以衞耕溉田疇之繡錯利帆檝之舟乗舳艫艅舠之接榜稼禾華實之滋榮是誠南州之普澤而吳㑹之𢎞津也當夫四序之代移所在靈源之各適漲濱澳於桃花盪焱景於神宅蒲荇延青芷蘋摇白漁火羅星連歌起拍旋且白帝降而寒澄𤣥女翔而凝澤揚水窟之商颷濯蘆洲之蟾魄西爽清肅而水下朔風沍洌而冰積托神理於漣漪咸順令而應節歎觀瀾之變遷逝如斯而不息爾乃鷗䳁鵾雞鵁鶄之羽殊干名以應化鯪鰩鯩鯿鱣鮪之鱗辨萬族以隨時觜􅏲龜􅎕貝螺之異種虬􅉬蛟蜉莫之離若奇洵稱寶藏不測之府皆紛蕃詭誕而能知夫陽侯列陣江妃奮武風烈雷殷沙簸雲聚濤翻駕電之輪浪拊靈鼉之鼓潏溵湙以駭目涌汗洗渒以肆怒隄岸於焉若撼客子於焉慄股斯又塹險之巨浸為莅土者責永祐惟是皇清定鼎上聖下賢習坎向離括坤包乾既河清而海宴方祥集而瑞全文教丕播於海童豐功昭格於水仙則江靈之効命以朝宗固將配有夏而億萬斯年青龍江在福泉縣東北吳志云孫權造青龍戰艦於此故名昔通滬瀆入海浩瀚無涯韓世忠曽駐軍於此其上為巨鎮置市舶司其佳麗擬於杭州元以後江既阻隘鎮亦遂廢明嘉靖間建青浦縣於故址之西後徙今猶稱舊青浦日月河在府城中普照寺南古䜟云日月河通出狀元河久湮塞明代成化間知府樊瑩濬之錢福果狀元及第後復淤萬厯間知府許維新又濬之張以誠狀元及第倉河在普照寺後明代軍儲北倉在其陽故名西南通豐樂橋東北通波塘與邱家灣水合玉帶河横貫府學中如帶故名其源自仙鶴西北行轉而東與集仙門水合運鹽河在金山縣自城北流至張涇橋與城河接長六十三里凡西南諸水皆由之以入於浦按府别有運鹽河在青村西又東運鹽河在亭林南舊西湖在府西本名瑁湖因陸子璋養魚池故名相傳葛稚川嘗煉丹其上故湖中嘗有五色泉郡人見之必擢髙第王安國梅詢許尚俱有題詠後跨一石梁其上即所謂瑁湖橋以上華亭縣柘湖在金山縣運鹽河見古蹟鶯竇湖在上海縣西南五十五里周五里舊有邢竇二姓居此故名今已淤塞訛為櫻桃匯一作鶯脰湖薛澱湖在青浦縣一名澱山湖以中有澱山也其源自長洲白蜆江經急水港而來周圍幾二百里實古來鍾水之地北由趙屯浦東由大盈浦入於松江東南由爛路港以入三泖蓮湖在青浦縣境東通澱山西通金澤塘三泖在金山縣太史公云泖之為言茂也晉陸機對武帝云三泖水冬温夏涼有上中下三名又曰圓泖大泖長泖又谷水一名華亭谷吳地記謂陸氏世居於此故名機詩所謂髣髴谷水陽者是也其西南受浙西諸水西北受澱湖諸水由華亭界入於黄浦論者以為即三泖故谷水又一名谷泖云横泖在福泉縣自北曹港分支經唐行鎮絶大盈浦東流為東横泖為横塘入盤龍浦南蹌浦在上海縣東北三十六里其支流為東溝浦西溝浦都臺浦在上海縣鹹塘東故曹家溝也明天順中巡撫都御史崔恭所濬上有行臺因名黄浦在南匯縣西六十里戰國時楚黄歇所鑿土人因稱為黄浦一稱春申浦其首曰潢潦涇上源為黄橋斜塘為三泖為澱湖為急水港為白蜆江其下流經奉賢南匯上海之境而北㑹吳淞江入海名上海浦此水視淞婁二江為大故論者以為即古之東江云海潮一日二至從浦出入詳見水利趙屯浦在福泉縣澱山湖北舊直受湖水㵼於松江其闊至五十丈通江五大浦之一也今自北曹港分支北流愈北愈隘浦口束以石梁僅通舟楫而已大盈浦在福泉縣澱山湖東起自南曹港口北與北曹港合過青龍江又過白鶴匯入於松江顧㑹浦在福泉縣大盈之東其上源曰通波塘出府城北流為祥澤塘遂别為崧子浦至上海縣界合青龍江入於松江自青龍江既微而其流遂入於泖盤龍浦亦然崧子浦在福泉縣舊名崧塘自顧㑹浦分流注於松江盤龍浦在福泉縣崧子浦東其上流曰盤龍塘自府城東北流入於松江其入江處曰盤龍匯介華亭崑山之間步其徑纔十許里而迴旋迂緩逾四十里如龍之盤故名青村港在奉賢縣南橋塘東達於縣城龍泉港在奉賢縣招賢涇東急水港在青浦縣西南五十里長二十餘里闊處至三十丈西接吳江白蜆江乃東江之上流也南曹港在福泉縣即舊鹹魚港自澱湖東南何家港東流納龍河水東北為斜瀝入北曹港又東北為大盈浦南接柘澤東為諸家塘北曹港在福泉縣西南與崑山分界西合何家港三分蕩斜瀝港諸水東過縣城入横泖一支北為新河入趙屯浦一支入大盈浦自蕩而東至西虹橋皆宏闊迅駛湖水頼以宣洩白龍潭在府西谷陽門外廣可十餘頃相傳有龍蟄其下水深而清可瀹可釀嵗旱禱之有應泗涇自祥澤塘北折而東合盤龍塘又北東為蒲匯塘元時為水道之要今皆淤淺以上婁縣奉賢涇在奉賢縣洮港東北流入運港華亭分縣為奉賢以此名招賢涇在奉賢縣奉賢涇東從令涇在奉賢縣横瀝東朱涇在金山縣承嘉善平湖長泖諸水貫市橋東流水勢湍悍東為横涇又東為蕩涇其北流者入於横潦涇歸涇在金山縣胥浦塘北新涇在福泉縣横濼東古名新涇浦南通蒲匯塘北入松江其支渠甚多巨漕在奉賢縣南橋塘北范家浜在上海縣東即大黄浦明尚書夏原吉所開馬家浜在上海縣南通都臺等浦西入吳淞江東北至界浜與嘉定分界有寶鎮堡在焉張堰在金山縣北江南通志卷十二
