  text: 江南通志卷七十食貨志田賦四常鎮淮揚四府常州府國朝原額平沙髙低極髙低田山灘塘蕩埄墩城塌蘆埂涇溝山竹茶地等項六萬一千九百八十六頃二十六畝七分九釐有竒節年豁除遷沙挑廢坍荒等項田地四百五十八頃四十一畝二分九釐有竒節年開墾陞科轉則等項田地八百二十二頃七十六畝八分八釐有竒雍正十三年實在田地等六萬二千三百五十頃六十二畝三分八釐有竒實徵折色銀五十六萬六千四百八十七兩二錢六分有竒遇閏加銀三千一百三十二兩六錢一分四釐五毫有竒攤徵人丁銀一萬二千九百九十五兩六錢六分三釐七毫有竒遇閏加銀四百八十一兩二錢七分二釐有竒匠班銀五百八十九兩二錢五分八釐二毫有竒除閏共實徵銀五十八萬七十二兩一錢八分一釐九毫有竒實徵夲色米三十五萬六千三十二石六斗九升一合有竒遇閏以增抵减外仍减米五十七石九斗八升四合有竒麥七千九百七十五石五斗五升二合有竒外不在丁田徵解雜辦銀六千七百五十九兩四錢二分一釐七毫有竒遇閏加銀一百一十三兩四錢五分四釐三毫有竒武進縣實在田灘蕩埄八千三百九十六頃一十三畝三分五釐有竒平内則例每畝計算合有竒田科平米二斗四沙田科平米一斗八升四合有竒竒髙低田科平米一斗三升四合有極髙低田科平米八升三合有竒山灘蕩埄科平米三升八合有竒平田并各則折實田騐派税糧銀七分五釐五毫有竒十銀四釐九毫有竒夲色米六升七合六勺有竒竒麥一合五勺有漕贈五米二合四勺有竒地畝銀一分七毫有竒攤徭里銀一分二釐八毫有竒徵人丁銀二釐七毫有竒匠班銀一毫有竒實徵折色銀七萬七千五百九十五兩八錢九分五釐九毫有竒遇閏加銀五百二十五兩七錢四分三釐五毫有竒攤徵人丁銀一千九百六十七兩二錢九分八釐五毫有竒遇閏加銀八十三兩六分四釐六毫有竒匠班銀七十三兩八錢九分九釐除閏共實徵銀七萬九千六百三十七兩九分三釐四毫有竒實徵夲色米五萬二千二百二十三石九斗三升四合有竒遇閏加米一石三斗五升五合有竒麥一千一百三十九石八升有竒外不在丁田徵解雜辦銀二千一百七十四兩二錢三分三釐有竒内役田租銀一千一百八十三兩一錢一分五釐黄山脚蘆灘銀七百五兩三錢七釐九毫有竒毫門攤正費銀一百六十六兩四錢一分一釐一有竒漁課銀二十三兩二錢一釐九毫有竒十六兩一錢九分七釐城租銀九遇閏加銀一十四兩六錢八分一釐六毫有竒陽湖縣實在田灘蕩埄八千七百七十八頃五十一畝五分五釐有竒内平田沙田髙低田極髙低田山灘蕩埄各科平米并折實田及騐派税糧夲折米麥等項俱與武進縣同内每折實田一畝攤徵人丁銀二釐七毫有竒匠班銀九絲七忽有竒實徵折色銀八萬一千九百二十二兩六錢八分六釐一毫有竒遇閏加銀五百五十五兩五分九釐二毫攤徵人丁銀二千七十六兩七錢六分四釐七毫有竒遇閏加銀八十七兩六錢八分六釐六毫有竒匠班銀七十三兩四錢四分除閏共實徵銀八萬四千七十二兩八錢九分九毫有竒實徵夲色米五萬五千一百三十六石一升五合有竒遇閏加米一石四斗三升有竒麥一千二百二石五斗四升九合有竒外不在丁田徵解雜辦銀一千七百六十一兩三釐九毫有竒内役田租銀一千四百六兩二錢八分五釐黄山脚蘆灘銀一百二十九兩四錢一分二釐三毫有竒新陞銀一十一兩七錢六分九釐六毫有竒門攤正費銀一百五十七兩八錢二釐銀漁課銀二十三兩二錢一釐九毫有竒城租三十二兩五錢三分三釐遇閏加銀一十四兩九釐九毫有竒無錫縣實在田山灘蕩墩埄等項六千九百二頃四十七畝五分五釐有竒平内則例每畝計算升五合田科平米一斗九髙田科平米一斗五升五合五勺低田科平米一斗四升四合山灘蕩塘蘆埂涇溝科平米七升五合七勺山墩埄城塌地科平米二升每折實平田一畝科税糧銀七分六釐六毫有竒十銀四釐六毫有竒夲色米六升四合二勺有竒竒五米二合三勺有竒麥一合四勺有地畝銀一分六毫有竒有竒徭里銀一分二釐九毫攤徵人丁銀三釐二毫有竒匠班銀一毫有竒實徵折色銀六萬四千五百三十三兩五錢二分九釐八毫有竒遇閏加銀四百四十四兩七錢三分二釐五毫有竒攤徵人丁銀一千九百七兩六錢五分八毫有竒遇閏加銀八十三兩九錢五分六釐五毫有竒匠班銀九十四兩四錢五分二釐除閏共實徵銀六萬六千五百三十五兩六錢三分二釐七毫有竒實徵夲色米四萬九百四十三石四升五合有竒遇閏以增抵减外仍减米一十二石三斗九升七合有竒麥八百九十七石六斗四升二合有竒外不在丁田徵解雜辦銀三百二十七兩八錢九分一釐七毫有竒内租錢鈔折銀一分一釐有竒門攤課鈔銀二百一十兩二錢三分三釐二毫有竒銀漁課銀一十四兩九分九釐九毫有竒城租一百三兩五錢四分七釐五毫遇閏加銀一十六兩一錢五分六釐八毫金匱縣實在田山灘蕩墩埄等項七千三百三十三頃八十二畝三分四釐有竒内各則田科徵銀米并折實田俱與無錫縣同每折實田一畝攤徵人丁銀二釐八毫有竒匠班銀一毫五絲有竒實徵折色銀六萬七千九百九十五兩八分一釐九毫有竒遇閏加銀四百六十八兩五錢八分七釐八毫有竒攤徵人丁銀一千七百七十三兩四錢一分四毫有竒遇閏加銀七十八兩四分八釐五毫有竒匠班銀一百兩一錢六分四釐除閏共實徵銀六萬九千八百六十八兩六錢五分六釐四毫有竒實徵夲色米四萬三千六十一石二斗一升六合有竒遇閏以增抵减外仍减米一十三石六升三合有竒