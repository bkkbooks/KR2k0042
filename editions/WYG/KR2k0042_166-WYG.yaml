body:
  text: 江南通志卷一百六十七人物志文苑三安徽寧池太廬鳳潁五八府除和廣六泗州安慶府漢周興廬江舒人榮子初除郎中少有名譽永寧中尚書陳忠上疏薦興略曰孝友之行著於閨門清厲之志聞於州里藴匵古今博物多聞三墳五典無所不覧屬文著詞有可觀採詔拜為尚書郎三國魏何楨字元幹潛人有文學仕魏為𢎞農太守入晉為尚書光禄大夫南北朝陳何之元潛人梁天監末司空袁昻表薦之遷信義令宗人敬容勢位隆重頻相顧訪終不造焉著梁典起齊永元元年訖於王琳遇獲七十五年行事為三十卷唐曹松字夢徴舒州人天復初登第授祕書正字時同榜王希禹劉象柯崇鄭希顔年皆七十餘號五老榜松詩學賈島有集三卷楊顯宿松人工書史善吟咏羅隠避黄巢亂來松僑寓其家倡和甚多宋王珪字禹玉成都華陽人後徙舒弱嵗竒警出語驚人舉進士甲科積遷侍讀學士嘉祐立皇子中書召珪作詔珪曰此大事也非受㫖不可明日請對曰海内望此舉乆矣果出自聖意乎仁宗曰朕意決矣珪再拜賀退而草詔歐陽修聞而歎曰真學士也拜尚書左僕射封岐國公諡曰文珪以文學進流輩咸共推許其文閎侈瓌麗自成一家朝廷大典䇿多出其手詞林稱之李公麟字伯時舒州人第進士歴中書門下删定官好古博學多識竒字自夏商以來鐘鼎尊彝皆能考定世次辨别欵識為考古圖元符三年以御史致仕歸肆志龍眠岩壑間有晉魏風格畫入神品黄庭堅謂其風流不減古人為藝所累云弟公權公寅俱舉進士有名王日休舒州人善教誨先遵小學後及寫字讀書治經閲史作文井井有條著易解春秋解呉㮚字子寛望江人紹興中詔求直言㮚極論時政得失忤時相編管台州後任南康司户龍圖學士陳賈等薦其文章典麗可備著述不報棄官歸元馮三竒懐寧人至順初進士為光山尹遷國史編修預修宋遼金三史賈良宿松人文藻煥發行中矩矱余忠宣闕延訓子弟闕闔室殉難良為紀其顛末事確詞嚴得春秋遺意呉翺望江人嗜學工文至正間三孝堂譙樓諸記皆其屬筆羅汝成字甫成望江人以明經掌本學教素行能服多士其文詞著見者猶存程宗傑惠政一碑明丁相懐寧人於書無所不究尤長於詩著老女吟數十首自況一時争傳誦之以明經入太學仕至别駕金一梅字元夫潛山人好學能文絶意仕進率子弟敦尚詩禮著有天香館集金琣潛山人嘉靖乙酉鄉薦博洽多才名其從父燕文學傾一時琣名與頡頏家藏書五萬餘卷沈酣其中喜為詩歌與邑中徐桂倡和晚補徳興令有惠政龍映字仲光望江人嘉靖間明經為榖城令偉貎宏辯以詞賦雄一時翰林朱大韶游映門輯其稿題曰兩山集邑志乆缺重為纂修咸推文獻阮之鏘字南阮懐寧人澹然塵外詩文卓爾不羣尤工草書容士賔字寅主懐寧人髫年即賦四時歌行古雅可誦長益工長篇多至百餘韻無不竒縱幽異范崇仁桐城諸生隠居嗜古年九十餘猶能口誦古書數千卷時有趙鋭者年六十亦好讀書苦目盲曰天其忌我博也崇仁曰我多君三十年君苐坐我以口寫君以耳觀天安能忌之汪萬頃字叔度桐城人以明經為教諭博學多才工詞賦嘗讀書於寺寺後有井因僧洗垢遂涸時嵗旱萬頃為文告井水遂湧出亦一異云侯珦桐城諸生博洽善文嘗衍蘇氏迴文詩周旋出入邪正方圓共得八百首文章閎肆秀麗娯志烟霞終身不仕金憲字廷紀潛山人自少為詩歌古文筆不加㸃家多積書史吟咏自得著有思補亭集天香館詩二十餘卷行世弟表亦工文黄朝相字六仲潛山諸生十嵗能詩輒琳瑯可誦後博學益善詞賦王世薦字見思潛山人博極羣書自經史子集外天文歴律地志稗官靡不淹通詩力追漢魏盛唐為文落筆疾如風雨晚年學益富詩益工著有華鬘集金道合字洞觀潛山人嗜古博學弱冠即馳聲藝苑後以明經訓餘姚與葛寅亮倪元璐善三年俸錢盡市書籍移諭楚黄與邑令争雪諸生寃不合即告歸著瑶草山房集史評集杜共八十餘卷馬士式字月川太湖貢生授登封教諭善古文詞訓課有方多成名士以薦擢本縣令大著亷聲所著述皆有典則宋宜中字正宇太湖諸生嗜學家貧不能購書向人借信宿輒還或訝其速答曰已識之矣夜與友行經碑下宜中手按一過記誦不遺其所著皆古博奥衍士林宗焉石譽字試庵宿松人幼聰頴出語驚人為諸生讀書躬行凡日用常行随口陳説皆成格言里中化之多著述呉泰字碧溪宿松人嘗遊呉雪夜吟梅花詩百首時競傳焉著碧溪文集行世洪雲翼字望冶懐寧人博洽工文詞萬歴間以明經任浙江宣平令解組歸年九十三卒程之魯字禹璜懐寧人阮自華序其詩以為竒秀蒼妍有雲浮波騰之致著有文脊山房稿阮自華字堅之懐寧籍桐城人萬厯戊戍進士力學嗜古主盟騷雅東海屠隆録四君子詩馮夢貞朱長春虞淳熙其一則自華也官慶陽守告休歸日與海門諸子觴咏以娯晚節著霧霛詩集尤善草書葉燦字以沖桐城人萬厯癸丑進士累官國子司業士習浮夸燦為開示名理進以古學因忤魏璫落籍崇禎初起翰林掌院教習有方歴遷禮部尚書歸著書數百卷卒諡文荘子士璋户部郎士瑛進士俱世其家學姚康原名士晉字康伯以字行桐城諸生博通經術肆力於詩古文詞崇禎中舉賢良方正不就史可法鎮皖延為記室所著詩文甚富惟太白劍二卷行世田有年字孫若宿松人崇禎庚辰進士累官浙江驛傳副使署臬篆政舉之暇召生童課藝刻大觀集造就人才入覲乞終養築清貽館與弟逢年詩文倡和著毛詩箋疏十三經纂注呉國琦字公良桐城人幼讀文選朗覆三都兩京賦一字無舛詩古文詞數千言立就年十五刲股愈父疾稱純孝崇禎辛未成進士司理漳州平反沉獄八百餘案歸蔬食布袍文名愈重著懐茲堂詩文集尚書音易占禮畧諸書子𢎞安順治壬辰進士國朝方以智字密之桐城人明崇禎庚辰進士官翰林檢討晚游方外旅病萬安臨終猶與弟子講業論道不輟生平博極羣書所著有周易圖烹雪録等書汪延造字深之潛山人善屬文游黄道周譚貞黙之門貞黙與之著見聖篇廿一史説晚築博易齋専事著述有周易圖說周易講義兼山堂集史學三筆行世王振基字爾玉潛山人與弟揚基並以才名著明末冦踞邑里衆避萬澗山振基設計捍衛衣食之全活甚衆所著伊洛薪傳麟經指掌等書逺邇傳誦潘江字蜀藻桐城人性敏慧肆力詩古文四方從游甚衆康熙己未以博學宏詞薦母老不赴隠居著述所著有木厓詩集六經蠡測字學析疑記事珠古年譜龍眠風雅前後集陳衷赤字爾靖潛山人生而頴異過目成誦博覧羣書著貞勝編歴代以還賢愚治亂鍳戒昭然持身飭亷隅邑令常大忠建三立書院延請講學學者歸之呉道新字湯日桐城人少負文名明天啟丁卯舉於鄉標格雋挺讀書白雲山有著作數十卷呉廷楷字端儀懐寧人為文根極理要出入經史郡邑前後交聘修志推為百年文獻陳焯字黙公桐城人七嵗能詩文年二十游呉越間名大噪作寳帶橋看月歌呉人譜入絃管順治壬辰成進士應補部職以母老乞歸養親歿廬墓三年所著有滌岑詩文前後集姚孫森字繩先桐城人博學有文名尤工於詩公卿争折節禮之明末舉賢良方正順治初署龍泉教諭課士先道徳而後文藝多所造就移疾歸所著有可處堂詩行世丁宗䕫字以懋潛山諸生鍵關讀書究心易春秋大義文行俱優邑令常大忠置三立書院延請講學及門多成名俊周南字汝為桐城諸生少負經濟才凡古今制度沿革及成敗得失能道其所以挾䇿走京師條陳皆軍國大計嘗客粤帥幕飲酒高㑹帥出歌者十數人各持扇求詩立就七言律毎人一首舉座大驚書法類顔魯公詩文集多散佚自題所居曰鶴巢馬教思字臨公桐城人父之瑛明崇禎庚辰進士順治初官定陶令多惠政教思才氣卓犖文不起草康熙己未㑹試第一官翰林分考禮闈最為得人以簡抗失院長意遂拂衣歸益事著述有古學類解左傳紀事本末等書詩古文别為十卷錢選字枚一懐寧人康熙乙丑進士除茂名令課士勸農興利剔弊歴有治聲歸里後著作甚富尤長於史學張贇字越萬桐城諸生購書萬卷批纂晝夜不輟尤専心易理著周易九圖淺説行世及歩天經世返觀卧遊諸集童鋐逺字方平桐城諸生刻苦勵學程書自課寒暑弗輟自六經左國下逮荘騷無不淹貫嘗講易於五畆園列坐聴者數十人咸為推服及門受業者咸知名當時擢巍科登顯秩而鋐逺竟困場屋以終著有易學管窺門人張廷璐鐫板行世周廣桐城廩生博極羣籍濓洛闗閩之書俱析其奥詩古文辭甚富性坦易待人從無疾言遽色卒年八十有四姚士藟字綏仲桐城人康熙戊辰進士父文燮順治己亥㑹魁士藟工詩文深醇和雅有劉向曽鞏遺風官編修入直内廷試必稱㫖聖祖嘗稱其品行忠厚文學甚優錫賚優渥所著有瞻雲草南歸草餘齋詩集泳園文集張佑字吉如桐城人隠居好學善為詩至晚益工劉輝祖字北固桐城人嗜學工文海内名俊皆推重之舉庚午鄉試第一著藕浦詩古文集四十卷弟㨗亦與齊名辛卯科解元張廷􅋒字黼臣桐城人相國英第四子年十二為緑牡丹詩即見賞於名公卿為文合度十六補博士弟子苦吟篤學搆思精審以故得羸疾後省親京師卒程師恭字蜀材懐寧人十嵗通五經以㧞貢授永川縣令生平喜著書有歴朝史斷韻府羣書行世方舟字百川桐城人寄籍金陵甫冠通諸經博渉子史其時文指事類情羽翼經傳韓菼見而歎曰此於三百年作者之外自成一家者也序而行之國朝以諸生之文而横被六合者獨舟與金壇王汝驤耳北平李塨表其墓曰孝友江鄉之望文章海内之師張廷珩字瑲聞芑仲子博學洽聞詩古文皆淵雅工書法雍正癸卯御試舉人進士殿試二甲第一名授翰林院檢討内廷供奉充講官御製七言詩一首以褒之皆異數也甲辰分校北闈所取得人卒於官恩賜白金二百兩䕶其喪歸張廷瓘字璧臣大學士英季子自幼聰雋長肆力於學苦心研索務窮奥窔為文落筆秀異復極意琢磨一字未安未肯脱稿性方介嚴重言行必蹈矩矱樂施予急難濟困雖傾嚢槖不惜意致恬淡高雅於世俗徴逐之紛避之若凂歿年三十四里黨惜之徽州府唐呉少微新安人登第歴官至御史時天下文章宗徐庾氣格卑弱獨少微與同官富嘉謨詞本經學雄邁高雅文體一變稱呉富體子鞏中書舍人皇甫湜字持正新安人以進士為陸渾尉仕至工部郎數忤同省求分司東都留守裴度辟為判官修福先寺將求碑文於白居易湜怒曰近舍湜而逺取居易請從此辭度謝之即請斗酒飲酣援筆立就度贈以繒采甚厚湜大怒曰自吾為顧況集序未嘗許人今碑字三千字三縑何遇我薄耶度笑而酬之王希羽歙州人天復元年登第年已七十餘與曹松劉象柯崇鄭希顔年相亞號五老榜特授校正五代汪台符歙州人博學工文好王霸大略徐知誥鎮金陵台符上書陳民間九患知誥善之宋齊邱嫉其才使人醉之沉蚵蚾磯死及昇元中所行諸政利民者皆台符發之宋舒雅字子正歙人才辭敏贍南唐時以狀元登第後歸宋太宗造閣禁中藏四庫書雅與校理累遷職方員外郎出守舒州致仕後直昭文館卒吕文仲字子臧歙人南唐進士為大理評事入宋授太常太祝與修太平御覧廣記文苑英華歴官翰林侍讀學士文仲乆居禁近富詞學器韻淹雅嘗使高麗後使至必詢其出處仕終集賢院學士聶冠卿字長孺歙人舉進士授建昌推官楊億愛其文大臣交薦召試館閣校勘累官侍讀學士毎進讀春秋必引尊王黜霸之義以諷嘗與修大樂製奉禋歌以備三疊是年郊祀遂用焉有蘄春河東等集邱濬字道源黟人天聖中進士歴官至殿中丞因讀易悟損益二卦以此能通數知未來興廢好為詩觀時感事嘗語家人曰吾夀終九九一日在池州賦春草詩而逝年八十一胡伸字彦時婺源人七嵗賦荘周夢蝶詩入太學與汪藻齊名登進士仕著作佐郎與修神宗日厯及禮書後知無為軍有徳政民繪其像於學宫汪藻字彦章婺源人寓饒州崇寧二年進士瓊林宴頒氷謝表立成一座驚歎羣臣和徽宗御製詩唯藻作衆莫能及歴官著作郎與王黼不合出判宣州時梁師成用事令客邀致之藻不往高宗時起直學士院詔令皆出其手時以比陸宣公纂修日歴成除顯謨閣學士知徽州從官典鄉郡時以為榮王昺字偉文婺源人宣和初調豐城簿遷知吉州平生好義自雄讀書敏疾著雲嵓集中興要務史評羅願字端良歙人父汝楫字彦濟由進士歴官吏部尚書願七嵗為青草賦夀其父登第判贛州知南劍州改鄂州鄂人繪像於靈竹寺願文章古雅縝密有先秦西漢之風朱子亟推讓之嘗欲附名集後著新安志爾雅翼鄂州小集兄頌字端規為郢州守亦知名宋松年字徳操休寧人紹興進士嗜史學於唐書功尤勤調信州録參即官所結閣網羅百氏闗於唐者萃焉名其閣曰紬書證疑刋誤書成將進上而卒張敦頤字養正婺源人紹興登第為南劍州教授與朱松友善陞倅宣城攝郡事所著有編年六朝事蹟衡陽圖志滕愷字南夫婺源人紹興進士調信州司戸參軍朱子稱其才智傑然逺過流輩遺文甚少為可惜程珌字懐古休寧人紹熙四年進士令富陽代者以邑豪名授珌珌置不觀曰吾未欲知名使聞而改過足矣擢祕書省兼編修侍讀帝嘗留意筆札珌言太宗留心詞翰在僭國削平之後真宗鋭情文墨在澶淵却敵之餘上為悚然官終端明殿學士著洺水集内外制類稾祝穆字和父歙人與弟癸同事朱子於雲谷著事文類聚方輿勝覧諸書子洙嘗著四書集註附録宰執取其書進呈授太學博士呉觀萬字亨夀休寧人篤尚紫陽朱子之學著潮說夏小正辨閏月定四時成嵗講義皆擴前人所未發元方囘字萬里歙人初為随州教授上書數賈似道罪有十可斬入元授建徳路總管致仕著讀易釋疑碧流集桐江集瀛奎律髓名僧詩話宋季雜傳諸書程文字以文婺源人仕至禮部員外郎為文精深明潔虞集嘗稱重之與莆田陳旅相伯仲洪焱祖字潛夫歙人椿子除平江路學録歴官休寧尹為文根極理要而超然游意於語言之表著新安續志爾雅翼等書曹涇字清甫休寧人文學與方囘齊名宋咸淳戊辰進士授昌化簿入元為紫陽書院山長研窮經學為文典古有法馬端臨其弟子也撰文獻通考其學實自涇出潘榮字伯誠婺源人學長於史著通鑑總論反覆數千言該括古今興亡大要學者稱節齋先生汪漢卿字景良黟人以薦授國史編修官轉翰林修撰博聞强記在翰苑十年凡中朝討論典故衆不能識者叩之立應至大中以國子監丞致仕明唐仲實字桂芳歙人太祖至歙召見首問平天下要道以不嗜殺人對太祖大悦因力陳築城之苦即為罷役命攝紫陽書院山長著武夷小槀白雲集畧鄭潛字彦昭歙人有學行以詩名元末由内臺掾仕至泉州路總管入明官潞州同知所著有白沙槀樗菴集汪仲魯名叡以字行婺源人元季兵起與弟同集義旅保鄉邑明興歸附授安慶税令洪武中召見講西伯戡黎授左春坊左司直命續薰風南來詩及他應制皆稱㫖帝以善人呼之與朱善劉三吾並稱三老姚璉字叔器歙人從胡雲峰游為太平教授時賊侵徽饒璉上十策參政薦之朝不就太祖至徽與唐仲實同召見歸隠自署曰雲山一􅂴翁詹同字同文婺源人幼頴異虞集見之曰才子也以弟槃女妻之至正中舉茂才異等授彬州路學正歸明為國子博士同淹貫羣籍應教為文才思泉湧以文字結主知歴官翰林學士承㫖兼吏部尚書乞編日歴更請分類輯聖政為皇明寳訓所著有海涓集天衢吟嘯集子徽字資善洪武中歴官左都御史兼吏部尚書坐藍黨死方勉字懋徳歙人永樂乙未進士選庶吉士屢應制作詩賦當㫖遷御史按獄江浙陞湖廣參議陳二十二事皆準行之子暕登進士授行人修蜀志呉遜字以恭歙人精研易理善詩文著有可筠稿曾孫熙講學斗山王畿甚器重之程敏政字克勤信子十嵗以神童召試稱㫖讀書翰林成化丙戍廷試第二授翰林院編修歴遷侍講學士孝宗即位視學籍田儀注皆命銓定進講經筵呼先生而不名承詔議從祀孔廟諸賢考據詳確出入惟允上方向用大臣忌之罷歸後召還官終禮部侍郎所著有道一編篁墩文集新安文獻志皇明文衡諸書程玠字文玉歙人有異才殫究皇極星厯毉卜之學成化甲辰進士奉使江南而卒丘濬狀其行實稱為一代異人著大定數太素脉訣松崖毉徑唐臯字守之歙人正徳甲戍廷對第一授修撰大禮議起諸臣競攻張璁桂蕚臯謂楊廷和曰張公不為無理但當擇其可從者以慰帝衷斯能執其必不可從者以安孝廟耳廷和然之臯乃上疏請於本生備其尊稱以伸追逺之道繫其始封以逺正統之嫌帝怒奪俸三月後累官至侍讀學士臯為文下筆立就或請改竄則更撰不襲前文一字著心庵集史鑑會編汪思敬字養浩祁門人潛心文學練逹時務侍郎楊寧薦舉不赴召著有易學象數舉隅周易博通釋學史管見余光字晦之祁門人嘉靖壬辰進士授大理評事擢御史按河東鹽政議補課例切中時宜按廣東上征安南表輔導太子疏皆賜俞納獻兩京賦命付史館張聘夫字時珍婺源人嘉靖甲子舉人知連江縣以方正不阿調鄖陽教授㝷擢國子助教所著有三史解頤兩漢禁臠唐書管豹諸書呉子玉字瑞榖休寧人童年好學過目成誦應聘修纂有白岳志郡志金陵人物志中立四子集更定名世文宗韻學大成碩輔寳鑑及郡邑各詞記譜牒多出其手自著有瑞榖詩文二集十二論茗州呉氏家記數百卷晚應萬歴間貢授應天訓導薦入史館江應曉字覺卿歙人入成均就判涪州躭吟咏厭苦簿書歸就駐蹕山麓築室博覧羣籍所著有對問編囂囂集學者稱山城先生江來岷字本初歙人鄉舉知酃縣平藍冦定楚藩鵝洲之變猺蠻嘯聚山谷來岷單車往諭擇其子弟置之膠庠蠻不復擾嘗從直指游衡山代作朱陵洞天碑文古奥為時所稱祀南嶽倣騷製迎神送神諸曲至今歌之詩文與王世貞汪道昆相頡頏所著有桃源集潘緯字仲文歙縣人仕中書舍人工為詩著作家稱其攻苦精思擺落凡近時人或未之知當與具眼者共推之呉士竒字無竒歙人萬歴壬辰進士知寧化縣累擢湖廣布政使覈從來奸胥盜帑至十七萬有餘入為太常卿以拒魏奄招中㫖致仕所著有三祀志史裁考信編徴信編緑滋館稿胡尚英字超凡歙人萬歴己未進士館選時主者閱其卷稱為陸贄後身取冠庶常歴官南京祭酒移宫詹所著有擊鉢唫超凡集詞林紀諸集金聲字正希休寧人父賈於楚因占籍嘉魚崇禎戊辰進士選庶吉士慷慨靣陳時務後乞歸以御史召擢僉事未赴乆之起翰林院編修入覲中道聞北京破號慟歸見冦賊蠭起設守助法保鄉里王師下江南徽後服聲單騎見帥曰拒守者某也遂死聲刻苦為文古淡深博學者宗之夏雨金字韓雲休寧人崇禎甲戍進士授河間推官時當宁以修練儲備四事黜陟郡邑雨金膺紀録者再歴知泉州府撫諭南安狫賊陞河南副使所著有夢荘詩草秋水堂集程嘉燧字孟陽休寧人少不羈棄舉子業學擊劍不就乃折節讀書精音律工書畫而詩尤名世當時稱為松圓詩老僑居嘉定老於歙有松圓浪淘集國朝汪瑶光字文岫歙人道昆孫博學世其家著五臺游草香林草趨庭紀聞等書順治末為提督張天禄幕客歸老函山程邃字穆倩徽州人為人高古學博思竒詩文書畫皆工鐫篆尤稱絶藝許楚字芳城歙諸生長年游歴呉越歸而杜門著述其黄山新安江兩賦最有名著青巖文集遺民集新安外紀藝文幸存録汪汝謙字然明歙人為人任䘏分宅指囷移居武林招集勝流為湖山詩酒之㑹論者稱其鈎探風雅編次金石刌度律吕雖専門肉譜不能與争云姚允明字汝服休寧人博極羣書嘗倣春秋用字法以編年兼論斷為史書十卷張膽字貢赤休寧人隠於黟之天潛山嘗合古今文而選其精者曰文統定傳合二十一史而删其謬者曰治統定傳合古今聖賢及諸儒先書而輯其要者曰道統定傳又有古今十大疑辨一書其友汪有光字謙子黟人與膽講道石林有批㸃孟子檀弓汪洪度字于鼎歙人少通經俠游名場所著有新安大好山水志新安節烈志及息廬詩其黄山新安江諸作最為名流所賞方式玉字玉如歙人工詩善畫順治中以貢授鹿城訓導時鹿城雅樂盡缺式玉修舉之刋為圖悉如闕里所著有渉江草醉翁石照詩呉啓元字青霞休寧人太學生少孤嗜學専攻詩好游覧名勝以助其超詣著秀濯堂詩集時謂與程嘉燧抗行汪灝字紫滄休寧人康熙壬午以獻賦召入内庭癸未賜進士第授編修總武英殿纂修事所著有知本堂詩文稿李彭庚字又籛婺源人文多竒氣詩尤嶔嵜歴落毎對酒即豪吟酒醒輒焚去人以畸士目之宋和字介山歙縣人年三十始讀書深山中為古文四十學大就入都先後為韓菼陳鵬年孫勷所激賞謂其非唐以下之文也詩亦古茂相國王掞八十索撰夀序辭不能書掞曰苐欲君集中有此文耳居隘巷中杜門著書几席蕭然貧老不能歸卒於京師所著有雪晴軒集查士標字二瞻休寧人書法精妙人謂米董再出畫亦超詣求者填門或終嵗不可得遇困乏時揮洒尺幅人争購之年八十餘卒於江都寧國府唐劉太沖宣州人博洽工詩顔真卿守平原辟從事畫策拒安禄山真卿嘗為文送之稱才不偶命而徳無其鄰弟太真舉進士善屬文貞元間詔羣臣宴曲江賦詩帝自第之以太真為上王炎宣城人工詩嘗遊蜀李白為劍閣賦贈之及卒哭之曰王公希世寳棄世一何早許棠字文化涇縣人咸通中與張喬鄭谷等稱十哲賦洞庭詩有云四顧疑無地中流忽有山人稱許洞庭乆困名場李頻為京兆參軍首薦之始得登第初為本縣尉又嘗為江寧丞汪遵幼為吏善絶句詩而深自晦密許棠應二十餘舉遵猶在吏籍一旦辭役就貢㑹棠送客灞滻遇之問曰汪遵何以至此遵曰就貢棠怒曰小吏無禮然遵竟先棠五年登第五代蒯鼇宣城人孤貧力學唐末文體纎麗鼇獨能自振有承平風為人亷直嘗藏龍尾硯客有欲色鼇亦心許客行即徒步馳數舍予之初與樊若水善若水仕宋欲薦之鼇謝去隠廬山卒邵拙宣城人博通經史有詩百篇曰廬嶽集又手鈔史傳文集三百卷宋梅堯臣字聖俞詢從子也工詩錢惟演引為幕僚日相酬倡歐陽修自以為不及遂以詩名天下有人得蠻布弓衣上所織堯臣詩也初以詢䕃得官大臣屢薦宜在館閣召試賜進士為國子監直講累遷尚書都官員外郎預修唐書成未奏而卒邱旭字孟陽宣城人南唐後主試賦擢第一入宋吕䝉正判銓習旭名曰若非能賦者乎謂為古人乃並世耶薦授令録遷京秩卒於衡州周紫芝字少隠宣城人家貧苦學歴樞密院編修官知興國軍政崇簡静終日焚香課詩而事不廢初秦檜愛其詩頗厚遇焉後和御製詩云已通灌玉親祠事更有何人敢告猷檜怒其諷已出之元貢奎字仲章宣城人為齊山書院山長時方議行郊祀禮奎討定上之朝廷多採其說遷應奉翰林文字纂修成宗實録終集賢直學士諡文靖淩希惠字季和涇縣人自號水西道人嘗寓宣城與諸名士為吟社有詩集張師愚字仲愚寧國人好學工詩兩領鄉薦撰梅堯臣年譜多所摭引與弟師曽並從汪澤民遊澤民禮下之嘗稱平生畏友有二張汪珍字聘之太平人隠居黄山博學工詩盧疎齋摯雅重之汪澤民一見心服毎稱南山先生明貢欽字元禮宣城人成化進士歴官文選郎詩文豪蕩李西涯有秋水芙蓉之目貢汝成字玉甫宣城人領正徳鄉薦嘉靖初預修祀儀成典及獻郊廟賦並賜金帛授翰林待詔預校録諸經史上復古治䇿十五事時稱博雅梅鶚字百一旌徳人正徳進士博綜羣籍為文援筆千言滉洋浩博譽重一時未仕卒弟鷟與鶚齊名左鎰字應衡涇縣人嘉靖進士歴官尚寳卿入直視草思藻英發㑹開明堂行大饗禮景雲見作景雲賦上之肅宗稱賞王廷幹字維貞涇縣人七嵗能文讀書日以寸計登嘉靖壬辰進士年未弱冠奉詔歸娶授行人累遷九江知府乞休歸鍵户著述一切碑版皆出其手有集十卷行世孫攀字士龍宣城人長於記問嘗得周禮古本徧考諸家折衷為一書與貢汝成纂注三禮先後相望里中稱博洽焉沈懋學字君典宣城人風骨竒矯工草𨽻善騎射及詩歌古文萬厯丁丑廷對第一授翰林修撰嘗應詔賦宣宗元元圖詩稱㫖眷遇日優㑹張居正奪情趙用賢呉中行以疏論廷杖懋學持章往救格不入遂引疾歸扁舟野服放浪西湖苕霅間崇禎時追諡文節湯賓尹字嘉賓宣城人萬歴乙未冠南宫廷對第二授翰林編修仕至南祭酒以制舉業名天下胡國鑑字正甫宣城人萬歴進士歴官南禮部郎中杜門家居究心史學李維貞序其文謂語無空設體無失宜云呉伯與字福生宣城人萬歴進士仕至副使肆力典籍博極羣書工古文詞多所輯著梅守箕字季豹宣城人豪宕善屬文援筆立就湯賓尹贈詩云坐上若無梅季豹也容他輩得猖狂家貧能緩急人人皆異之著有居諸集子元祚從子蕃祚台祚皆善詩文喜任俠王世貞贈詩云從誇荆地人人玉不及梅家樹樹花盖謂諸梅競秀也梅鼎祚字禹金宣城人生而癯甚父憐之欲焚其筆硯乃匿帳中黙誦年十六禀諸生性不喜經生業以古學自任文詞雅贍海内皆知其名閣臣申時行欲以文徴明故事疏薦辭不赴歸隠書帶園構天逸閣藏書坐卧其中孫朗中亦工詩文書畫劉振字自我宣城人慷慨善持論嘗縱游齊梁燕趙間中原多擾范景文巡撫河南振以布衣上書由是知名尋返金陵鍵户著撰輯明三百年實録旁稽野乘裁以己意名曰識大録國朝茆薦馨字楚畹宣城人康熙己未探花授翰林編修時集詞臣纂修五代史及易經講義薦馨分輯不懈蜀平獻詩聖祖深加奬勵未幾卒孫卓字予立宣城人襄之子淹博經史敦崇氣誼康熙己未進士對䇿第二人授翰林編修奉使册封安南卒於粤西道中盛於斯字此公南陵人少負異禀詩古文詞倚席立就為人慷慨卓犖雅有竒氣後以家貧落魄而歿少司農周亮工為表其墓高詠字阮懐宣城人幼有神童之目其學無所不窺書畫與詩世稱三絶康熙己未以博學鴻儒特授翰林院檢討充明史纂修官所撰史槀皆詳慎不茍著有若巖堂集梅庚字耦長宣城人五嵗而孤稍長苦志力學以詩文見稱於施閏章高詠康熙辛酉舉於鄉選泰順令邑苦嵗修海船庚莅任五年累不及民著聴山詩鈔漫與集汪越字師退南陵人康熙乙酉舉人性好學穿穴經史後進咸資其指授當事者多折節願與交而越垂老舌耕不事干謁其著述甚富程元愈字偕栁少自歙徙居宣城性孝友為文悉本六經秀水朱彝尊新城王士禎亟稱之所著有儷體文鈔昭明詩選輯注池州府唐胡楚賔秋浦人高宗時以善屬文為右史與諸儒同撰樂書百僚新戒臣軌十餘篇為文甚敏必酒中下筆高宗嘗以金銀盃斟酒飲之文成輒賜焉㝷兼崇賢直學士武瓘秋浦人有詩名登咸通四年進士第為益陽令初以感事詩受知主司蕭倣及在益陽杜荀鶴寄詩有縣稱詩人理無嫌日寂寥之句盧嗣立秋浦人以詩名登咸通十四年進士第時咸稱主司為得士顧雲字垂象秋浦人初與杜荀鶴殷文圭同讀書九華山有文筆受知宰相令狐綯登咸通十五年進士第以執政薦修國史加虞部員外郎高駢鎮淮南辟為從事康駢字駕言秋浦人乾符中登第有文名著劇談録行世杜荀鶴字彦之石埭人登大順二年進士第為宣州帥田頵從事奉使至汴梁太祖厚遇之表薦於朝除翰林學士主客員外郎知制誥有唐風集張喬秋浦人與弟霞俱有詩名喬咸通中京兆試月中桂詩為時傳誦大順初登第後避亂棲隠九華以終時同邑韋彖以能賦名嘗游京師學士呉融竒其才薦之亦歸隠九華卒殷文圭秋浦人居九華山苦學硯為之穿有才名登乾寧間進士第後歸江南仕於呉歴官翰林學士有詩五集五代殷崇義學士文圭子幼頴敏嘗夢飛星墜水盤中吞之文思日進仕南唐為宰相所撰書檄文誥皆稱典贍及後主降宋崇義随入朝因避宋諱改姓名湯恱嘗奉勅撰江南録又同修太平御覧諸書宋曹緯字元象貴池人以文名元祐間與劉燾崔執柔劉正夫號四傑官翰林學士從弟組亦有文名齊天覺字莘夫青陽人少好學讀書倦暫隠几而卧三十年未嘗解帯就枕由是經史子集靡不淹貫舉於州歴贛州僉判俞夢龜銅陵人生即有齒能言睡寤嘗作讀書聲六嵗即通經籍理宗時應童子科問以諸義無不知者授太子正字直祕書監元楊少愚青陽人少好學博通羣書著有秋浦集九華外史諸編明劉正䝉字養卿貴池人工文詞其歌詩得元和體以國子生選湯溪縣丞遷襄府工正歸又同邑詩人劉岐官河間丞有林下集佘翹字聿雲郎中敬中子四嵗授書即能成誦長遂悉究經史詩古文皆有名臨川湯顯祖見而竒之呼為小友舉萬歴辛卯鄉薦屢上春官不第著書以老有翠微集浮齋集諸編柯日東字朝陽建徳人知州鑑之子少負才名鄉先逹皆就之論事所著有映玉齋集又同邑江大虬博洽工文金宗範東流人萬歴乙酉舉人學博而才雋尤工詩善草書又青陽呉光裕長於詩賦兼工篆楷有申椒園集弟光錫亦能古文通篆書呉應箕字次尾貴池人太學生性倜儻善談論力持清議與東林諸賢相應和生平以經濟自負文詞雄偉為一時才俊之宗華亭陳子龍以宋陳亮比之所著有樓山堂集兩朝剝復録東林始末諸書又同邑李㦂崇禎庚午舉人亦有才名嘗著天啓事實一編國朝劉廷鑾字得輿貴池人父城明季以文雄江左廷鑾少承家學又師事父友呉應箕盡得其傳日益淵博詩文皆偉麗聲名籍甚康熙元年以貢考授州同知未仕卒所著梅根集及他纂述凡數百卷又同縣姜可乆受業廷鑾父及應箕之門通經史大義作詩文濡筆立就著有斐園集陳克祥字季麟銅陵諸生父國瑞以好義聞鄉里克祥資敏嗜學時人推其博洽太平府南北朝梁周興嗣字思纂先世陳郡遷姑孰博學善屬文天監初奏休平賦其文甚美累擢員外散騎侍郎光宅寺成勅興嗣與陸倕各製碑文帝用興嗣所製自是銅表銘栅塘碣檄魏文次韻王羲之書千字並使興嗣為之毎奏帝稱善後佐撰國史歴給事中卒唐陳商字述聖當塗人有文學舉進士㑹昌中歴禮部侍郎祕書監撰敬宗實録十卷宋郭祥正字功甫維之子當塗人母夢李白而生少有詩名時梅堯臣方擅名一時見而歎曰真太白後身也舉進士歴知瑞州棄官隠青山自號謝公山人有青山集行世徐遘繁昌人熙寧中舉進士弟迪紹聖初登第兄弟相師友詩文清麗人比二蘇石􅐂字敏若禹勤孫元符進士崇寧中又舉博學宏詞才名籍甚時梁師成用事方鈎致知名士或勸􅐂往謁􅐂拒不從仕止州幕著有橘林集方汝彊字南夫繁昌人紹興末舉進士不樂仕宦以觴咏自怡有詩名明潘廷堅字叔聞當塗人初太祖渡江以陶安薦除太平教授累遷翰林學士洪武四年典㑹試宋濓副之廷堅文譽最盛尤以謙慎為太祖所稱後請老歸子黼字章甫亦以文學嚮用仕至江西按察使預修律令李習字伯羽當塗人叙之子領延祐四年鄉薦授書院山長太祖至采石習偕門人陶安迎駕即擢知太平府年八十餘矣以亷辦聞習與弟翼才名相埒江左目為二李呉萊稱習之文簡密嚴奥翼之文豐腴縟麗習子汶字宗茂以才學召入史館預修元史出為巴東令移南和皆有善政謝九成字鳯儀繁昌人嘉靖丙戍進士由重慶推官歴擢吏部郎中乞歸後杜門著述有經史管見綱目前紀諸編蕭雲從字尺木蕪湖人崇禎己卯副榜不赴銓選専以詩文自娯有梅花堂遺稿兼工畫得倪黄筆法廬州府南唐伍喬廬江人性嗜學以淮人無出已右者遂渡江居廬山國學一夕見人掌自牗入署讀易二字忽不見喬大歎輒取易讀之探索精微越數年有僧夢大星曰伍喬星也訪得喬使應進士舉試畫八卦賦喬第一元宗大愛其文命勒石為永式仕至考功員外郎有集一卷宋姚鉉字寳之合肥人太平興國進士甲科淳化中直史館侍宴内苑應制賦賞花釣魚詩特被嘉奬歴官舒州團練副使卒鉉文詞敏麗善筆札藏書至多在淛課吏寫書為薛映所掎摭有集二十卷又纂唐人文章為百卷目曰文粹楊寘字審賢合肥人察之弟少有雋才慶厯二年舉進士京師試國子監禮部皆第一試崇政殿又擢第一通判頴州未至官持母喪病羸卒先是其友夢寘作龍首山人寘自謂龍首我四冠多士山人無禄之稱我其終是乎已而果然胥致堯合肥人少力學為文辭官至左班殿直歐陽修志其墓子流以才能稱阮美成舒城人元豐中進士知巢縣為政愷悌喜吟咏時稱阮絶句焦蹈字悦道無為人文翰有名崇寧三年計偕後期適南宫火命禮部改試蹈為第一時口號云不因南省火安得狀元焦蹈凡四首鄉薦又由省元登第盖三元云李臺卿字明仲廬州人性介特博學彊記有史學考正同異多所發明知天文律厯千嵗之日可坐數也朱翌字新仲舒人政和間進士時人諱言詩翌獨沉涵六藝文思飇發南渡後為中書舍人掌書命文章忤時宰謫曲江有潛川集元潘純字子素廬江人少有俊才嘗著卦辭諷切當時詩極精麗其錢塘懐古句最為當時稱誦明秦鳯字子儀舒城人洪武進士知興山縣擢給事中以言事改衛輝府同知卒於官撰營建宫闕賦洪熙輔政策高岡遺稿郭奎字子章巢人少遊余闕之門青陽遺集其所藏弆也明初參朱文正軍事詩歌悲壮坐文正事誅宋濓趙汸為序其望雲集邢寛字用夫無為人永樂甲辰進士廷對䇿祭祀兵戎考究詳明議論醇正擢第一開科以來江北士占名第一者自寛始授修撰進侍講纂修宣廟實録陞學士祝富字堯臣舒城人博學工詩文成化㑹試乙榜除伊陽教諭三校省闈由國子學正遷伊府長史悉心輔導時宗室以事忤王力為辯解聞於朝進階旌之著有黙庵集呉廷翰字崧伯無為人正徳進士官至山西叅議被命採端溪硯已不持一枚其亷謹多類此著漫録業言櫝記甕記志略考湖山小稿蘇原諸集董子策字霞峰合肥人嘉靖進士以户部郎視𣙜滸墅闗商船輻凑乃就關傍别開支河令曰凡舴艋可出此橋者聴商民徳之嘉靖末進廣東按察司僉事辭歸一意著述逺近丐其文或不時應率敦請至再里中遇難得之物輒相詫曰豈求董進士文耶黄道月合肥人萬厯進士官中書舍人風神俊朗詩文清妙弟道日舉於鄉書翰為世所珍王寖大字幼章合肥人崇禎丁丑進士再任知縣以亷能稱擢南吏部郎歸居家捍衛鄉里規畫荒政具有幹略其學尤長於史著春秋説史綱鈔數十萬言國朝龔鼎孳字孝升合肥人舉崇禎甲戍進士歴官兵垣我朝以原官召用累遷左都御史再謫再起復都憲晉刑兵禮三部尚書鼎孳洽聞博學工詩古文士林推之弟鼎孠字伯鼎署仙居縣篆山賊之願歸農者請給牌免死更給農具全活甚衆著有稻香樓詩集孫維祺字起山廬江人少而頴異為文風發泉湧辛未成進士令河間改淶水事母以孝聞鳯陽府三國薛瑩字道言綜子初為祕府中書郎歴官選曹尚書太子少傅右國史華覈疏薦瑩渉學既博文章尤妙同寮之中􅉷為冠首請卒修呉史皓遂命瑩為左國史著書八編名曰新議晉嵇康字叔夜本姓奚自㑹稽遷於譙之銍縣銍有嵇山家於其側因氏焉與魏宗室婚拜中散大夫少有雋才博洽多聞好老荘之業常修養性服食之事著養生論寓居山陽與阮籍山濤向秀阮咸王戎劉伶相友善遊於竹林號為七賢山濤為選曹舉康自代康答書拒絶之著文論六七萬言皆為世所玩詠兄喜字公穆晉揚州刺史宗正嵇含字君道銍人好學能文舉秀才除郎中時𢎞農王粹以貴公子尚主館宇甚盛圖荘周於室使含為之讚含援筆為弔文文不加㸃粹有愧色歴官廣州刺史平越中郎將諡曰憲南北朝梁劉顯字嗣芳沛國相人幼聰敏號神童好學博渉多通任昉嘗得一缺簡書人莫能識顯云是古文尚書所删逸篇昉檢周書果如其說沈約命駕造焉策顯經史十事顯對其九顯問其五約對其二名流極推賞之歴官平西諮議叅軍加戎昭將軍隋劉臻字宣摯顯子年十八舉秀才宇文䕶辟為記室軍書羽檄多出其手隋高祖受禪高熲以臻随軍典文翰進封饒陽縣伯躭恱經史終日殫思精於兩漢書時人稱為漢聖唐裴嚴字子肅夀春人舉賢良方正策第一拜拾遺詞章峭麗官京兆尹强幹不阿貴勢後為翰林學士元孟祺字徳卿宿州符離人幼敏悟善騎射官國史院編修一時典册多出其手歴官嘉興府總管首以興學為務以功封魯郡公諡文襄子二人遵遹楊叔幹字立之定逺人少有才名博覧强記登省元入翰林益著聲望明胡敏字伯成定逺人洪武己卯鄉薦與修明初大典歴官營繕員外郎累謫盧龍以薦起授鄞縣令遷監察御史周常字茂永定逺人中永樂壬辰進士歴任福建河南僉事所至風裁凛然性敏悟讀書日記萬言為文章下筆立就尤長於詩苖衷字公彝定逺人永樂辛卯殿試第二授編修修宣廟實録屢典文衡累官大學士卒贈少保諡文康有雪窻稿歸田録淩耀宗臨淮人博學宏詞官禮部員外天順間與修一統志黄淮字中甫定逺人博覧羣書著有通鑑輔義顧伯謙字有終臨淮人𢎞治壬子鄉薦學本六經居鄉孝友著有起亭集任文石字伯介宿州人嗜古學工詩賦手不釋卷丙子廷對司訓維揚尋退居相山著有相山志藕花墅集國朝丁啓明字東有宿州人初為諸生時被誣遭吏議以詩見知監司獲解詩名益振任柔節字定子宿州人隠居相山之麓博學嗜古於書無所不讀善著作喜吟咏有詩文數十卷行世潁州府三國魏曹植字子建譙人武帝子十嵗善屬文時銅雀臺新成帝命為賦援筆立就建安十六年封平原侯徙封臨淄文帝即位貶爵安鄉侯明帝時封陳王嘗上表求自試卒諡曰思曹冏字元首譙人魏少帝族祖為𢎞農太守時天子幼稚冏作六朝論欲感悟曹爽爽不能納晉夏侯湛字孝若譙人幼有才名善文章而美容觀與潘岳友善京師謂之連璧泰始中舉賢良對策拜郎中後出為野王令政清多暇著昆弟誥官至中書侍郎南陽相子承為南平太守王敦亂承露檄逺近列敦罪状後為敦所執欲殺之以王廙苦請得免曹毗字輔佐譙國人魏大司馬休曽孫好文籍能屬詞累遷太學博士尚書郎光禄勲唐李敬元亳州譙人博覧羣書尤善於禮高宗在東官馬周薦其才召入崇賢館侍讀假内府書讀之撰次禮論及他書數十百篇累官中書令封趙國公卒諡文憲曽孫紳見宦績王建字仲初潁州人大歴十年舉進士太和中歴陜州司馬與韓愈張籍同時相友善工為樂府歌行宫詞百首傳播天下宋傅瑾字公寳汝隂人任蔡州助教力學彊記尤邃字韻有字林補遺十二卷音韻管見三卷聞見録十卷周子雍汝隂人嘗受學於陳無已為詩清麗有法大觀初再復湟鄯京師以元夕張燈開宴徽宗賦詩賜羣臣其頷聫云午夜笙歌連海嶠春風燈火過湟中席上和者皆莫及時子雍客開封尹宋喬年所喬年密走价求援得句云風生閶闔春來早月到􅅾萊夜未中大為時所稱王銍字性之潁州人高宗南渡時為浙西幕僚作守備䇿千言上之時帥後悉驗焉著有黙記七朝國史雪溪集略續清夜録國老談苑等書王亷清字仲信頁州人銍長子秦熺倚父勢移書郡將欲取其先世藏書且餌以官亷清拒之曰願守此書以死不願官也熺不能奪而止著有廣古今同姓名録新乾曜真形圖補定水陸章句王明清字仲言亦銍子積學修徳不慕榮進克紹前業所著有揮塵録投轄録玉照新志行於世金劉瞻字岩老亳州人天徳三年南榜登科為史館編修自號攖寧居士作詩工於野逸有集行世明邢嵩字維嶽潁州人博雅邃經學以貢入太學祭酒湛若水器之潁後進多從學焉授黄州府通判薛蕙字君采亳州人年十二能詩正徳甲戍登進士授刑部主事諫南巡予杖後起官陞考功司郎中嘉靖中大禮議起蕙援據經傳撰為人後解為人後辯凡數萬言入奏下詔獄尋得貰復職㑹亳守顔木得罪忌者誣蕙與木同年疑有奸利詔解任聴勘既而事白遂堅卧不出屏居西原著書樂道泊如也所著有約言西原集解大寧齋目録五經雜録老子集解張􅖌字汝明潁州人於書一覧不忘詩風骨清俊登嘉靖戊子賢書為太湖令旬日而返嘗曰武功如衛霍文章若李杜花間露耳故著述成輒棄去其感懐云汗漫多情淹客住尋常有酒對花開雅有淡致王尚循字淡父頁州人給諫謨子為詩常廢寢食人皆笑之乃裒其詩千餘首自名之曰由粲集傳其少年時跅弛不羈父患之忽奮筆題其楹曰過也如日月之食復其見天地之心自是折節讀書人比之周孝侯云國朝劉體仁字公勇潁州人廷傅子順治乙未進士歴吏刑二部郎請假歸里卒體仁生而英異目重瞳子五嵗父於􅂰上授大學中庸及就𫝊經史一覧成誦居郎署三年輦下諸名賢争欲識體仁體仁亦樂為之盡尤好奬借寒畯藏書二萬餘卷告歸後日手一編不問户外事詩筆一出人士競傳誦之居家孝友婣睦恂恂可稱滁州唐邢文偉全椒人少以博學知名江淮間咸亨中歴太子典膳丞太子罕接宫臣文偉上書切諫後右史缺高宗曰文偉切諫吾兒此直臣也遂授之累遷鳯閣侍郎兼𢎞文館學士宋張洎字偕仁全椒人舉進士仕南唐為清輝殿學士後歸宋太祖以其有文選直舍人院太宗時歴翰林學士叅知政事洎文采清麗博覧道釋書有文集五十卷行世徐徽全椒人運判象賢子嘉祐間進士歴提舉利州常平致仕歸里詩深沉典麗文亦淵雅紹聖中曽肇守滁與為文字交王彦成全椒人大觀初舉進士調泰州法曹以左丞薛昻薦召對徽宗曰近觀榮遇集見卿文理優長特授祕書省校書郎累官太僕卿范酉新字孟申滁州人所著孝順詩一卷元葛涃字敏問滁州人博渉經史工文辭至正間有司舉為清流校官學者皆服其指授明范常字子權滁州人學甚淹貫太祖召典文牘洪武初歴遷翰林學士及致政賜詩四章人以為榮子組官至雲南叅政有修潔稱樂韶鳯字舜儀全椒人博學能文章多智略從太祖渡江叅贊軍事洪武中拜尚書改侍講學士修大明日歴重定洪武正韻更製釋奠先師樂章尋移疾免復起國子司業遷祭酒弟暉以人材知開封府禮太常卿毅諸暨州同知並知名李傑字懐英滁州人景泰癸酉舉人官翰林待詔有詩名又來安郝孔昭字起潛由進士令常山博學多著述任扃字啓敬滁州人通經術能詩有玉山樵唱集國朝呉國對字玉随全椒人中書國鼎季弟順治戊戍廷試第三人授編修累遷侍讀督順天學政國對才學優贍工詩賦善書法對客運翰如飛言論風采館閣推重子旦朂昇俱有文譽昇康熙戊午舉人潘運皥字熙仲滁州人順治己丑進士授中書舍人以博洽稱詩筆敏妙著有西沆紀遊諸編和州宋錢藻字純老和州人幼孤篤學文詞雋偉舉進士賢良方正直言極諫諸科名動一時歴翰林侍讀學士元豐中卒官曽鞏誌其墓明蔣禮和州人永樂壬辰進士歴官中允文譽甚盛後學宗為矩度戴重字敬夫和州人崇禎時以貢授湖州推官調亷州詩古文皆醇潔有河村集廣徳州宋查揆深之孫熙寧中上舍生神宗問近臣舍選有以江南查揆張汝舟對後第進士為太學博士卧疾不起陳紆以詩悼之曰舍法得才傳黼扆古人馳譽重賢闗何大圭字晉之廣徳人年十八試禮部第一詩文有聲沈虚中廣徳人舉進士歴官吏部尚書所著有通鑑事類左傳國語要略考異國史要綱桐川集明戴初字復之建平人成化丁未進士性剛介甘貧力學有詩名歴宰三邑皆以亷稱戈維屏字元衛廣徳人萬厯辛卯舉人攻苦積學一郡英雋皆出其門孫振宗字簡伯廣徳人萬厯壬子鄉薦家貧力學善古文詞夏儀字長卿廣徳人良心之孫頎然玉立咳吐成文一時名動公卿崇禎辛未進士授中書科舍人國朝雲中官字軒臣廣徳人高才生選貢文譽籍甚癸未登進士授中書舍人為人狷潔抗直不樂仕宦嘗授經他省辭而歸主人彊納四十金於行笥要之明年復往不果欲還其金無便臨歿猶出金屬其子必寄之封識如初閲六年矣六安州明何慶元字長人嘉靖戊戍進士文名籍甚授工部主事分司高郵築堤以便蓄洩公私便之陞雲南兵備乞終養不赴工古文詞著長人集呉蘭字卿佩六安人嘉靖戊戍進士為邑令不喜簿書改教授講道自得選直内閣母憂歸遂不復出著書數百卷為文沖淡流暢翰墨尤遒勁有法泗州宋李犍招信人官國子博士著易說國朝施端教字匪莪以貢訓宣城令范縣陞東城兵馬指揮風雅知名又精六書工草𨽻所著有嘯閣集古詩韻匯唐詩韻匯等書錢世熹字紹文五河人明崇禎時選貢考授推官不就選益自刻勵讀書康熙己酉庚戍聫㨗制義紙貴一時為人秉義執禮不茍合於俗未仕而卒卒之日僅存茅屋三間陳天篤字因其天長人生無啼聲家人疑其瘖周嵗見杜少陵宣政退朝詩似欲吟哦狀父􅃧之曰識之乎則頷而笑因指首二字問之忽應聲曰天門父駭然知其有夙慧後讀書目五行下成通儒韓竹字一韓天長人少頴異好學工文章康熙癸丑成進士選庶吉士授編修丙辰分校禮闈所得皆知名士給假歸娶念父母春秋高即移疾里居幾二十年服食不異寒素尤好行善事於鄉江南通志卷一百六十七欽定四庫全書江南通志卷一百六十七人物志文苑三安徽寧池太廬鳳潁五八府除和廣六泗州安慶府漢周興廬江舒人榮子初除郎中少有名譽永寧中尚書陳忠上疏薦興略曰孝友之行著於閨門清厲之志聞於州里藴匵古今博物多聞三墳五典無所不覧屬文著詞有可觀採詔拜為尚書郎三國魏何楨字元幹潛人有文學仕魏為𢎞農太守入晉為尚書光禄大夫南北朝陳何之元潛人梁天監末司空袁昻表薦之遷信義令宗人敬容勢位隆重頻相顧訪終不造焉著梁典起齊永元元年訖於王琳遇獲七十五年行事為三十卷唐曹松字夢徴舒州人天復初登第授祕書正字時同榜王希禹劉象柯崇鄭希顔年皆七十餘號五老榜松詩學賈島有集三卷楊顯宿松人工書史善吟咏羅隠避黄巢亂來松僑寓其家倡和甚多宋王珪字禹玉成都華陽人後徙舒弱嵗竒警出語驚人舉進士甲科積遷侍讀學士嘉祐立皇子中書召珪作詔珪曰此大事也非受㫖不可明日請對曰海内望此舉乆矣果出自聖意乎仁宗曰朕意決矣珪再拜賀退而草詔歐陽修聞而歎曰真學士也拜尚書左僕射封岐國公諡曰文珪以文學進流輩咸共推許其文閎侈瓌麗自成一家朝廷大典䇿多出其手詞林稱之李公麟字伯時舒州人第進士歴中書門下删定官好古博學多識竒字自夏商以來鐘鼎尊彝皆能考定世次辨别欵識為考古圖元符三年以御史致仕歸肆志龍眠岩壑間有晉魏風格畫入神品黄庭堅謂其風流不減古人為藝所累云弟公權公寅俱舉進士有名王日休舒州人善教誨先遵小學後及寫字讀書治經閲史作文井井有條著易解春秋解呉㮚字子寛望江人紹興中詔求直言㮚極論時政得失忤時相編管台州後任南康司户龍圖學士陳賈等薦其文章典麗可備著述不報棄官歸元馮三竒懐寧人至順初進士為光山尹遷國史編修預修宋遼金三史賈良宿松人文藻煥發行中矩矱余忠宣闕延訓子弟闕闔室殉難良為紀其顛末事確詞嚴得春秋遺意呉翺望江人嗜學工文至正間三孝堂譙樓諸記皆其屬筆羅汝成字甫成望江人以明經掌本學教素行能服多士其文詞著見者猶存程宗傑惠政一碑明丁相懐寧人於書無所不究尤長於詩著老女吟數十首自況一時争傳誦之以明經入太學仕至别駕金一梅字元夫潛山人好學能文絶意仕進率子弟敦尚詩禮著有天香館集金琣潛山人嘉靖乙酉鄉薦博洽多才名其從父燕文學傾一時琣名與頡頏家藏書五萬餘卷沈酣其中喜為詩歌與邑中徐桂倡和晚補徳興令有惠政龍映字仲光望江人嘉靖間明經為榖城令偉貎宏辯以詞賦雄一時翰林朱大韶游映門輯其稿題曰兩山集邑志乆缺重為纂修咸推文獻阮之鏘字南阮懐寧人澹然塵外詩文卓爾不羣尤工草書容士賔字寅主懐寧人髫年即賦四時歌行古雅可誦長益工長篇多至百餘韻無不竒縱幽異范崇仁桐城諸生隠居嗜古年九十餘猶能口誦古書數千卷時有趙鋭者年六十亦好讀書苦目盲曰天其忌我博也崇仁曰我多君三十年君苐坐我以口寫君以耳觀天安能忌之汪萬頃字叔度桐城人以明經為教諭博學多才工詞賦嘗讀書於寺寺後有井因僧洗垢遂涸時嵗旱萬頃為文告井水遂湧出亦一異云侯珦桐城諸生博洽善文嘗衍蘇氏迴文詩周旋出入邪正方圓共得八百首文章閎肆秀麗娯志烟霞終身不仕金憲字廷紀潛山人自少為詩歌古文筆不加㸃家多積書史吟咏自得著有思補亭集天香館詩二十餘卷行世弟表亦工文黄朝相字六仲潛山諸生十嵗能詩輒琳瑯可誦後博學益善詞賦王世薦字見思潛山人博極羣書自經史子集外天文歴律地志稗官靡不淹通詩力追漢魏盛唐為文落筆疾如風雨晚年學益富詩益工著有華鬘集金道合字洞觀潛山人嗜古博學弱冠即馳聲藝苑後以明經訓餘姚與葛寅亮倪元璐善三年俸錢盡市書籍移諭楚黄與邑令争雪諸生寃不合即告歸著瑶草山房集史評集杜共八十餘卷馬士式字月川太湖貢生授登封教諭善古文詞訓課有方多成名士以薦擢本縣令大著亷聲所著述皆有典則宋宜中字正宇太湖諸生嗜學家貧不能購書向人借信宿輒還或訝其速答曰已識之矣夜與友行經碑下宜中手按一過記誦不遺其所著皆古博奥衍士林宗焉石譽字試庵宿松人幼聰頴出語驚人為諸生讀書躬行凡日用常行随口陳説皆成格言里中化之多著述呉泰字碧溪宿松人嘗遊呉雪夜吟梅花詩百首時競傳焉著碧溪文集行世洪雲翼字望冶懐寧人博洽工文詞萬歴間以明經任浙江宣平令解組歸年九十三卒程之魯字禹璜懐寧人阮自華序其詩以為竒秀蒼妍有雲浮波騰之致著有文脊山房稿阮自華字堅之懐寧籍桐城人萬厯戊戍進士力學嗜古主盟騷雅東海屠隆録四君子詩馮夢貞朱長春虞淳熙其一則自華也官慶陽守告休歸日與海門諸子觴咏以娯晚節著霧霛詩集尤善草書葉燦字以沖桐城人萬厯癸丑進士累官國子司業士習浮夸燦為開示名理進以古學因忤魏璫落籍崇禎初起翰林掌院教習有方歴遷禮部尚書歸著書數百卷卒諡文荘子士璋户部郎士瑛進士俱世其家學姚康原名士晉字康伯以字行桐城諸生博通經術肆力於詩古文詞崇禎中舉賢良方正不就史可法鎮皖延為記室所著詩文甚富惟太白劍二卷行世田有年字孫若宿松人崇禎庚辰進士累官浙江驛傳副使署臬篆政舉之暇召生童課藝刻大觀集造就人才入覲乞終養築清貽館與弟逢年詩文倡和著毛詩箋疏十三經纂注呉國琦字公良桐城人幼讀文選朗覆三都兩京賦一字無舛詩古文詞數千言立就年十五刲股愈父疾稱純孝崇禎辛未成進士司理漳州平反沉獄八百餘案歸蔬食布袍文名愈重著懐茲堂詩文集尚書音易占禮畧諸書子𢎞安順治壬辰進士國朝方以智字密之桐城人明崇禎庚辰進士官翰林檢討晚游方外旅病萬安臨終猶與弟子講業論道不輟生平博極羣書所著有周易圖烹雪録等書汪延造字深之潛山人善屬文游黄道周譚貞黙之門貞黙與之著見聖篇廿一史説晚築博易齋専事著述有周易圖說周易講義兼山堂集史學三筆行世王振基字爾玉潛山人與弟揚基並以才名著明末冦踞邑里衆避萬澗山振基設計捍衛衣食之全活甚衆所著伊洛薪傳麟經指掌等書逺邇傳誦潘江字蜀藻桐城人性敏慧肆力詩古文四方從游甚衆康熙己未以博學宏詞薦母老不赴隠居著述所著有木厓詩集六經蠡測字學析疑記事珠古年譜龍眠風雅前後集陳衷赤字爾靖潛山人生而頴異過目成誦博覧羣書著貞勝編歴代以還賢愚治亂鍳戒昭然持身飭亷隅邑令常大忠建三立書院延請講學學者歸之呉道新字湯日桐城人少負文名明天啟丁卯舉於鄉標格雋挺讀書白雲山有著作數十卷呉廷楷字端儀懐寧人為文根極理要出入經史郡邑前後交聘修志推為百年文獻陳焯字黙公桐城人七嵗能詩文年二十游呉越間名大噪作寳帶橋看月歌呉人譜入絃管順治壬辰成進士應補部職以母老乞歸養親歿廬墓三年所著有滌岑詩文前後集姚孫森字繩先桐城人博學有文名尤工於詩公卿争折節禮之明末舉賢良方正順治初署龍泉教諭課士先道徳而後文藝多所造就移疾歸所著有可處堂詩行世丁宗䕫字以懋潛山諸生鍵關讀書究心易春秋大義文行俱優邑令常大忠置三立書院延請講學及門多成名俊周南字汝為桐城諸生少負經濟才凡古今制度沿革及成敗得失能道其所以挾䇿走京師條陳皆軍國大計嘗客粤帥幕飲酒高㑹帥出歌者十數人各持扇求詩立就七言律毎人一首舉座大驚書法類顔魯公詩文集多散佚自題所居曰鶴巢馬教思字臨公桐城人父之瑛明崇禎庚辰進士順治初官定陶令多惠政教思才氣卓犖文不起草康熙己未㑹試第一官翰林分考禮闈最為得人以簡抗失院長意遂拂衣歸益事著述有古學類解左傳紀事本末等書詩古文别為十卷錢選字枚一懐寧人康熙乙丑進士除茂名令課士勸農興利剔弊歴有治聲歸里後著作甚富尤長於史學張贇字越萬桐城諸生購書萬卷批纂晝夜不輟尤専心易理著周易九圖淺説行世及歩天經世返觀卧遊諸集童鋐逺字方平桐城諸生刻苦勵學程書自課寒暑弗輟自六經左國下逮荘騷無不淹貫嘗講易於五畆園列坐聴者數十人咸為推服及門受業者咸知名當時擢巍科登顯秩而鋐逺竟困場屋以終著有易學管窺門人張廷璐鐫板行世周廣桐城廩生博極羣籍濓洛闗閩之書俱析其奥詩古文辭甚富性坦易待人從無疾言遽色卒年八十有四姚士藟字綏仲桐城人康熙戊辰進士父文燮順治己亥㑹魁士藟工詩文深醇和雅有劉向曽鞏遺風官編修入直内廷試必稱㫖聖祖嘗稱其品行忠厚文學甚優錫賚優渥所著有瞻雲草南歸草餘齋詩集泳園文集張佑字吉如桐城人隠居好學善為詩至晚益工劉輝祖字北固桐城人嗜學工文海内名俊皆推重之舉庚午鄉試第一著藕浦詩古文集四十卷弟㨗亦與齊名辛卯科解元張廷􅋒字黼臣桐城人相國英第四子年十二為緑牡丹詩即見賞於名公卿為文合度十六補博士弟子苦吟篤學搆思精審以故得羸疾後省親京師卒程師恭字蜀材懐寧人十嵗通五經以㧞貢授永川縣令生平喜著書有歴朝史斷韻府羣書行世方舟字百川桐城人寄籍金陵甫冠通諸經博渉子史其時文指事類情羽翼經傳韓菼見而歎曰此於三百年作者之外自成一家者也序而行之國朝以諸生之文而横被六合者獨舟與金壇王汝驤耳北平李塨表其墓曰孝友江鄉之望文章海内之師張廷珩字瑲聞芑仲子博學洽聞詩古文皆淵雅工書法雍正癸卯御試舉人進士殿試二甲第一名授翰林院檢討内廷供奉充講官御製七言詩一首以褒之皆異數也甲辰分校北闈所取得人卒於官恩賜白金二百兩䕶其喪歸張廷瓘字璧臣大學士英季子自幼聰雋長肆力於學苦心研索務窮奥窔為文落筆秀異復極意琢磨一字未安未肯脱稿性方介嚴重言行必蹈矩矱樂施予急難濟困雖傾嚢槖不惜意致恬淡高雅於世俗徴逐之紛避之若凂歿年三十四里黨惜之徽州府唐呉少微新安人登第歴官至御史時天下文章宗徐庾氣格卑弱獨少微與同官富嘉謨詞本經學雄邁高雅文體一變稱呉富體子鞏中書舍人皇甫湜字持正新安人以進士為陸渾尉仕至工部郎數忤同省求分司東都留守裴度辟為判官修福先寺將求碑文於白居易湜怒曰近舍湜而逺取居易請從此辭度謝之即請斗酒飲酣援筆立就度贈以繒采甚厚湜大怒曰自吾為顧況集序未嘗許人今碑字三千字三縑何遇我薄耶度笑而酬之王希羽歙州人天復元年登第年已七十餘與曹松劉象柯崇鄭希顔年相亞號五老榜特授校正五代汪台符歙州人博學工文好王霸大略徐知誥鎮金陵台符上書陳民間九患知誥善之宋齊邱嫉其才使人醉之沉蚵蚾磯死及昇元中所行諸政利民者皆台符發之宋舒雅字子正歙人才辭敏贍南唐時以狀元登第後歸宋太宗造閣禁中藏四庫書雅與校理累遷職方員外郎出守舒州致仕後直昭文館卒吕文仲字子臧歙人南唐進士為大理評事入宋授太常太祝與修太平御覧廣記文苑英華歴官翰林侍讀學士文仲乆居禁近富詞學器韻淹雅嘗使高麗後使至必詢其出處仕終集賢院學士聶冠卿字長孺歙人舉進士授建昌推官楊億愛其文大臣交薦召試館閣校勘累官侍讀學士毎進讀春秋必引尊王黜霸之義以諷嘗與修大樂製奉禋歌以備三疊是年郊祀遂用焉有蘄春河東等集邱濬字道源黟人天聖中進士歴官至殿中丞因讀易悟損益二卦以此能通數知未來興廢好為詩觀時感事嘗語家人曰吾夀終九九一日在池州賦春草詩而逝年八十一胡伸字彦時婺源人七嵗賦荘周夢蝶詩入太學與汪藻齊名登進士仕著作佐郎與修神宗日厯及禮書後知無為軍有徳政民繪其像於學宫汪藻字彦章婺源人寓饒州崇寧二年進士瓊林宴頒氷謝表立成一座驚歎羣臣和徽宗御製詩唯藻作衆莫能及歴官著作郎與王黼不合出判宣州時梁師成用事令客邀致之藻不往高宗時起直學士院詔令皆出其手時以比陸宣公纂修日歴成除顯謨閣學士知徽州從官典鄉郡時以為榮王昺字偉文婺源人宣和初調豐城簿遷知吉州平生好義自雄讀書敏疾著雲嵓集中興要務史評羅願字端良歙人父汝楫字彦濟由進士歴官吏部尚書願七嵗為青草賦夀其父登第判贛州知南劍州改鄂州鄂人繪像於靈竹寺願文章古雅縝密有先秦西漢之風朱子亟推讓之嘗欲附名集後著新安志爾雅翼鄂州小集兄頌字端規為郢州守亦知名宋松年字徳操休寧人紹興進士嗜史學於唐書功尤勤調信州録參即官所結閣網羅百氏闗於唐者萃焉名其閣曰紬書證疑刋誤書成將進上而卒張敦頤字養正婺源人紹興登第為南劍州教授與朱松友善陞倅宣城攝郡事所著有編年六朝事蹟衡陽圖志滕愷字南夫婺源人紹興進士調信州司戸參軍朱子稱其才智傑然逺過流輩遺文甚少為可惜程珌字懐古休寧人紹熙四年進士令富陽代者以邑豪名授珌珌置不觀曰吾未欲知名使聞而改過足矣擢祕書省兼編修侍讀帝嘗留意筆札珌言太宗留心詞翰在僭國削平之後真宗鋭情文墨在澶淵却敵之餘上為悚然官終端明殿學士著洺水集内外制類稾祝穆字和父歙人與弟癸同事朱子於雲谷著事文類聚方輿勝覧諸書子洙嘗著四書集註附録宰執取其書進呈授太學博士呉觀萬字亨夀休寧人篤尚紫陽朱子之學著潮說夏小正辨閏月定四時成嵗講義皆擴前人所未發元方囘字萬里歙人初為随州教授上書數賈似道罪有十可斬入元授建徳路總管致仕著讀易釋疑碧流集桐江集瀛奎律髓名僧詩話宋季雜傳諸書程文字以文婺源人仕至禮部員外郎為文精深明潔虞集嘗稱重之與莆田陳旅相伯仲洪焱祖字潛夫歙人椿子除平江路學録歴官休寧尹為文根極理要而超然游意於語言之表著新安續志爾雅翼等書曹涇字清甫休寧人文學與方囘齊名宋咸淳戊辰進士授昌化簿入元為紫陽書院山長研窮經學為文典古有法馬端臨其弟子也撰文獻通考其學實自涇出潘榮字伯誠婺源人學長於史著通鑑總論反覆數千言該括古今興亡大要學者稱節齋先生汪漢卿字景良黟人以薦授國史編修官轉翰林修撰博聞强記在翰苑十年凡中朝討論典故衆不能識者叩之立應至大中以國子監丞致仕明唐仲實字桂芳歙人太祖至歙召見首問平天下要道以不嗜殺人對太祖大悦因力陳築城之苦即為罷役命攝紫陽書院山長著武夷小槀白雲集畧鄭潛字彦昭歙人有學行以詩名元末由内臺掾仕至泉州路總管入明官潞州同知所著有白沙槀樗菴集汪仲魯名叡以字行婺源人元季兵起與弟同集義旅保鄉邑明興歸附授安慶税令洪武中召見講西伯戡黎授左春坊左司直命續薰風南來詩及他應制皆稱㫖帝以善人呼之與朱善劉三吾並稱三老姚璉字叔器歙人從胡雲峰游為太平教授時賊侵徽饒璉上十策參政薦之朝不就太祖至徽與唐仲實同召見歸隠自署曰雲山一􅂴翁詹同字同文婺源人幼頴異虞集見之曰才子也以弟槃女妻之至正中舉茂才異等授彬州路學正歸明為國子博士同淹貫羣籍應教為文才思泉湧以文字結主知歴官翰林學士承㫖兼吏部尚書乞編日歴更請分類輯聖政為皇明寳訓所著有海涓集天衢吟嘯集子徽字資善洪武中歴官左都御史兼吏部尚書坐藍黨死方勉字懋徳歙人永樂乙未進士選庶吉士屢應制作詩賦當㫖遷御史按獄江浙陞湖廣參議陳二十二事皆準行之子暕登進士授行人修蜀志呉遜字以恭歙人精研易理善詩文著有可筠稿曾孫熙講學斗山王畿甚器重之程敏政字克勤信子十嵗以神童召試稱㫖讀書翰林成化丙戍廷試第二授翰林院編修歴遷侍講學士孝宗即位視學籍田儀注皆命銓定進講經筵呼先生而不名承詔議從祀孔廟諸賢考據詳確出入惟允上方向用大臣忌之罷歸後召還官終禮部侍郎所著有道一編篁墩文集新安文獻志皇明文衡諸書程玠字文玉歙人有異才殫究皇極星厯毉卜之學成化甲辰進士奉使江南而卒丘濬狀其行實稱為一代異人著大定數太素脉訣松崖毉徑唐臯字守之歙人正徳甲戍廷對第一授修撰大禮議起諸臣競攻張璁桂蕚臯謂楊廷和曰張公不為無理但當擇其可從者以慰帝衷斯能執其必不可從者以安孝廟耳廷和然之臯乃上疏請於本生備其尊稱以伸追逺之道繫其始封以逺正統之嫌帝怒奪俸三月後累官至侍讀學士臯為文下筆立就或請改竄則更撰不襲前文一字著心庵集史鑑會編汪思敬字養浩祁門人潛心文學練逹時務侍郎楊寧薦舉不赴召著有易學象數舉隅周易博通釋學史管見余光字晦之祁門人嘉靖壬辰進士授大理評事擢御史按河東鹽政議補課例切中時宜按廣東上征安南表輔導太子疏皆賜俞納獻兩京賦命付史館張聘夫字時珍婺源人嘉靖甲子舉人知連江縣以方正不阿調鄖陽教授㝷擢國子助教所著有三史解頤兩漢禁臠唐書管豹諸書呉子玉字瑞榖休寧人童年好學過目成誦應聘修纂有白岳志郡志金陵人物志中立四子集更定名世文宗韻學大成碩輔寳鑑及郡邑各詞記譜牒多出其手自著有瑞榖詩文二集十二論茗州呉氏家記數百卷晚應萬歴間貢授應天訓導薦入史館江應曉字覺卿歙人入成均就判涪州躭吟咏厭苦簿書歸就駐蹕山麓築室博覧羣籍所著有對問編囂囂集學者稱山城先生江來岷字本初歙人鄉舉知酃縣平藍冦定楚藩鵝洲之變猺蠻嘯聚山谷來岷單車往諭擇其子弟置之膠庠蠻不復擾嘗從直指游衡山代作朱陵洞天碑文古奥為時所稱祀南嶽倣騷製迎神送神諸曲至今歌之詩文與王世貞汪道昆相頡頏所著有桃源集潘緯字仲文歙縣人仕中書舍人工為詩著作家稱其攻苦精思擺落凡近時人或未之知當與具眼者共推之呉士竒字無竒歙人萬歴壬辰進士知寧化縣累擢湖廣布政使覈從來奸胥盜帑至十七萬有餘入為太常卿以拒魏奄招中㫖致仕所著有三祀志史裁考信編徴信編緑滋館稿胡尚英字超凡歙人萬歴己未進士館選時主者閱其卷稱為陸贄後身取冠庶常歴官南京祭酒移宫詹所著有擊鉢唫超凡集詞林紀諸集金聲字正希休寧人父賈於楚因占籍嘉魚崇禎戊辰進士選庶吉士慷慨靣陳時務後乞歸以御史召擢僉事未赴乆之起翰林院編修入覲中道聞北京破號慟歸見冦賊蠭起設守助法保鄉里王師下江南徽後服聲單騎見帥曰拒守者某也遂死聲刻苦為文古淡深博學者宗之夏雨金字韓雲休寧人崇禎甲戍進士授河間推官時當宁以修練儲備四事黜陟郡邑雨金膺紀録者再歴知泉州府撫諭南安狫賊陞河南副使所著有夢荘詩草秋水堂集程嘉燧字孟陽休寧人少不羈棄舉子業學擊劍不就乃折節讀書精音律工書畫而詩尤名世當時稱為松圓詩老僑居嘉定老於歙有松圓浪淘集國朝汪瑶光字文岫歙人道昆孫博學世其家著五臺游草香林草趨庭紀聞等書順治末為提督張天禄幕客歸老函山程邃字穆倩徽州人為人高古學博思竒詩文書畫皆工鐫篆尤稱絶藝許楚字芳城歙諸生長年游歴呉越歸而杜門著述其黄山新安江兩賦最有名著青巖文集遺民集新安外紀藝文幸存録汪汝謙字然明歙人為人任䘏分宅指囷移居武林招集勝流為湖山詩酒之㑹論者稱其鈎探風雅編次金石刌度律吕雖専門肉譜不能與争云姚允明字汝服休寧人博極羣書嘗倣春秋用字法以編年兼論斷為史書十卷張膽字貢赤休寧人隠於黟之天潛山嘗合古今文而選其精者曰文統定傳合二十一史而删其謬者曰治統定傳合古今聖賢及諸儒先書而輯其要者曰道統定傳又有古今十大疑辨一書其友汪有光字謙子黟人與膽講道石林有批㸃孟子檀弓汪洪度字于鼎歙人少通經俠游名場所著有新安大好山水志新安節烈志及息廬詩其黄山新安江諸作最為名流所賞方式玉字玉如歙人工詩善畫順治中以貢授鹿城訓導時鹿城雅樂盡缺式玉修舉之刋為圖悉如闕里所著有渉江草醉翁石照詩呉啓元字青霞休寧人太學生少孤嗜學専攻詩好游覧名勝以助其超詣著秀濯堂詩集時謂與程嘉燧抗行汪灝字紫滄休寧人康熙壬午以獻賦召入内庭癸未賜進士第授編修總武英殿纂修事所著有知本堂詩文稿李彭庚字又籛婺源人文多竒氣詩尤嶔嵜歴落毎對酒即豪吟酒醒輒焚去人以畸士目之宋和字介山歙縣人年三十始讀書深山中為古文四十學大就入都先後為韓菼陳鵬年孫勷所激賞謂其非唐以下之文也詩亦古茂相國王掞八十索撰夀序辭不能書掞曰苐欲君集中有此文耳居隘巷中杜門著書几席蕭然貧老不能歸卒於京師所著有雪晴軒集查士標字二瞻休寧人書法精妙人謂米董再出畫亦超詣求者填門或終嵗不可得遇困乏時揮洒尺幅人争購之年八十餘卒於江都寧國府唐劉太沖宣州人博洽工詩顔真卿守平原辟從事畫策拒安禄山真卿嘗為文送之稱才不偶命而徳無其鄰弟太真舉進士善屬文貞元間詔羣臣宴曲江賦詩帝自第之以太真為上王炎宣城人工詩嘗遊蜀李白為劍閣賦贈之及卒哭之曰王公希世寳棄世一何早許棠字文化涇縣人咸通中與張喬鄭谷等稱十哲賦洞庭詩有云四顧疑無地中流忽有山人稱許洞庭乆困名場李頻為京兆參軍首薦之始得登第初為本縣尉又嘗為江寧丞汪遵幼為吏善絶句詩而深自晦密許棠應二十餘舉遵猶在吏籍一旦辭役就貢㑹棠送客灞滻遇之問曰汪遵何以至此遵曰就貢棠怒曰小吏無禮然遵竟先棠五年登第五代蒯鼇宣城人孤貧力學唐末文體纎麗鼇獨能自振有承平風為人亷直嘗藏龍尾硯客有欲色鼇亦心許客行即徒步馳數舍予之初與樊若水善若水仕宋欲薦之鼇謝去隠廬山卒邵拙宣城人博通經史有詩百篇曰廬嶽集又手鈔史傳文集三百卷宋梅堯臣字聖俞詢從子也工詩錢惟演引為幕僚日相酬倡歐陽修自以為不及遂以詩名天下有人得蠻布弓衣上所織堯臣詩也初以詢䕃得官大臣屢薦宜在館閣召試賜進士為國子監直講累遷尚書都官員外郎預修唐書成未奏而卒邱旭字孟陽宣城人南唐後主試賦擢第一入宋吕䝉正判銓習旭名曰若非能賦者乎謂為古人乃並世耶薦授令録遷京秩卒於衡州周紫芝字少隠宣城人家貧苦學歴樞密院編修官知興國軍政崇簡静終日焚香課詩而事不廢初秦檜愛其詩頗厚遇焉後和御製詩云已通灌玉親祠事更有何人敢告猷檜怒其諷已出之元貢奎字仲章宣城人為齊山書院山長時方議行郊祀禮奎討定上之朝廷多採其說遷應奉翰林文字纂修成宗實録終集賢直學士諡文靖淩希惠字季和涇縣人自號水西道人嘗寓宣城與諸名士為吟社有詩集張師愚字仲愚寧國人好學工詩兩領鄉薦撰梅堯臣年譜多所摭引與弟師曽並從汪澤民遊澤民禮下之嘗稱平生畏友有二張汪珍字聘之太平人隠居黄山博學工詩盧疎齋摯雅重之汪澤民一見心服毎稱南山先生明貢欽字元禮宣城人成化進士歴官文選郎詩文豪蕩李西涯有秋水芙蓉之目貢汝成字玉甫宣城人領正徳鄉薦嘉靖初預修祀儀成典及獻郊廟賦並賜金帛授翰林待詔預校録諸經史上復古治䇿十五事時稱博雅梅鶚字百一旌徳人正徳進士博綜羣籍為文援筆千言滉洋浩博譽重一時未仕卒弟鷟與鶚齊名左鎰字應衡涇縣人嘉靖進士歴官尚寳卿入直視草思藻英發㑹開明堂行大饗禮景雲見作景雲賦上之肅宗稱賞王廷幹字維貞涇縣人七嵗能文讀書日以寸計登嘉靖壬辰進士年未弱冠奉詔歸娶授行人累遷九江知府乞休歸鍵户著述一切碑版皆出其手有集十卷行世孫攀字士龍宣城人長於記問嘗得周禮古本徧考諸家折衷為一書與貢汝成纂注三禮先後相望里中稱博洽焉沈懋學字君典宣城人風骨竒矯工草𨽻善騎射及詩歌古文萬厯丁丑廷對第一授翰林修撰嘗應詔賦宣宗元元圖詩稱㫖眷遇日優㑹張居正奪情趙用賢呉中行以疏論廷杖懋學持章往救格不入遂引疾歸扁舟野服放浪西湖苕霅間崇禎時追諡文節湯賓尹字嘉賓宣城人萬歴乙未冠南宫廷對第二授翰林編修仕至南祭酒以制舉業名天下胡國鑑字正甫宣城人萬歴進士歴官南禮部郎中杜門家居究心史學李維貞序其文謂語無空設體無失宜云呉伯與字福生宣城人萬歴進士仕至副使肆力典籍博極羣書工古文詞多所輯著梅守箕字季豹宣城人豪宕善屬文援筆立就湯賓尹贈詩云坐上若無梅季豹也容他輩得猖狂家貧能緩急人人皆異之著有居諸集子元祚從子蕃祚台祚皆善詩文喜任俠王世貞贈詩云從誇荆地人人玉不及梅家樹樹花盖謂諸梅競秀也梅鼎祚字禹金宣城人生而癯甚父憐之欲焚其筆硯乃匿帳中黙誦年十六禀諸生性不喜經生業以古學自任文詞雅贍海内皆知其名閣臣申時行欲以文徴明故事疏薦辭不赴歸隠書帶園構天逸閣藏書坐卧其中孫朗中亦工詩文書畫劉振字自我宣城人慷慨善持論嘗縱游齊梁燕趙間中原多擾范景文巡撫河南振以布衣上書由是知名尋返金陵鍵户著撰輯明三百年實録旁稽野乘裁以己意名曰識大録國朝茆薦馨字楚畹宣城人康熙己未探花授翰林編修時集詞臣纂修五代史及易經講義薦馨分輯不懈蜀平獻詩聖祖深加奬勵未幾卒孫卓字予立宣城人襄之子淹博經史敦崇氣誼康熙己未進士對䇿第二人授翰林編修奉使册封安南卒於粤西道中盛於斯字此公南陵人少負異禀詩古文詞倚席立就為人慷慨卓犖雅有竒氣後以家貧落魄而歿少司農周亮工為表其墓高詠字阮懐宣城人幼有神童之目其學無所不窺書畫與詩世稱三絶康熙己未以博學鴻儒特授翰林院檢討充明史纂修官所撰史槀皆詳慎不茍著有若巖堂集梅庚字耦長宣城人五嵗而孤稍長苦志力學以詩文見稱於施閏章高詠康熙辛酉舉於鄉選泰順令邑苦嵗修海船庚莅任五年累不及民著聴山詩鈔漫與集汪越字師退南陵人康熙乙酉舉人性好學穿穴經史後進咸資其指授當事者多折節願與交而越垂老舌耕不事干謁其著述甚富程元愈字偕栁少自歙徙居宣城性孝友為文悉本六經秀水朱彝尊新城王士禎亟稱之所著有儷體文鈔昭明詩選輯注池州府唐胡楚賔秋浦人高宗時以善屬文為右史與諸儒同撰樂書百僚新戒臣軌十餘篇為文甚敏必酒中下筆高宗嘗以金銀盃斟酒飲之文成輒賜焉㝷兼崇賢直學士武瓘秋浦人有詩名登咸通四年進士第為益陽令初以感事詩受知主司蕭倣及在益陽杜荀鶴寄詩有縣稱詩人理無嫌日寂寥之句盧嗣立秋浦人以詩名登咸通十四年進士第時咸稱主司為得士顧雲字垂象秋浦人初與杜荀鶴殷文圭同讀書九華山有文筆受知宰相令狐綯登咸通十五年進士第以執政薦修國史加虞部員外郎高駢鎮淮南辟為從事康駢字駕言秋浦人乾符中登第有文名著劇談録行世杜荀鶴字彦之石埭人登大順二年進士第為宣州帥田頵從事奉使至汴梁太祖厚遇之表薦於朝除翰林學士主客員外郎知制誥有唐風集張喬秋浦人與弟霞俱有詩名喬咸通中京兆試月中桂詩為時傳誦大順初登第後避亂棲隠九華以終時同邑韋彖以能賦名嘗游京師學士呉融竒其才薦之亦歸隠九華卒殷文圭秋浦人居九華山苦學硯為之穿有才名登乾寧間進士第後歸江南仕於呉歴官翰林學士有詩五集五代殷崇義學士文圭子幼頴敏嘗夢飛星墜水盤中吞之文思日進仕南唐為宰相所撰書檄文誥皆稱典贍及後主降宋崇義随入朝因避宋諱改姓名湯恱嘗奉勅撰江南録又同修太平御覧諸書宋曹緯字元象貴池人以文名元祐間與劉燾崔執柔劉正夫號四傑官翰林學士從弟組亦有文名齊天覺字莘夫青陽人少好學讀書倦暫隠几而卧三十年未嘗解帯就枕由是經史子集靡不淹貫舉於州歴贛州僉判俞夢龜銅陵人生即有齒能言睡寤嘗作讀書聲六嵗即通經籍理宗時應童子科問以諸義無不知者授太子正字直祕書監元楊少愚青陽人少好學博通羣書著有秋浦集九華外史諸編明劉正䝉字養卿貴池人工文詞其歌詩得元和體以國子生選湯溪縣丞遷襄府工正歸又同邑詩人劉岐官河間丞有林下集佘翹字聿雲郎中敬中子四嵗授書即能成誦長遂悉究經史詩古文皆有名臨川湯顯祖見而竒之呼為小友舉萬歴辛卯鄉薦屢上春官不第著書以老有翠微集浮齋集諸編柯日東字朝陽建徳人知州鑑之子少負才名鄉先逹皆就之論事所著有映玉齋集又同邑江大虬博洽工文金宗範東流人萬歴乙酉舉人學博而才雋尤工詩善草書又青陽呉光裕長於詩賦兼工篆楷有申椒園集弟光錫亦能古文通篆書呉應箕字次尾貴池人太學生性倜儻善談論力持清議與東林諸賢相應和生平以經濟自負文詞雄偉為一時才俊之宗華亭陳子龍以宋陳亮比之所著有樓山堂集兩朝剝復録東林始末諸書又同邑李㦂崇禎庚午舉人亦有才名嘗著天啓事實一編國朝劉廷鑾字得輿貴池人父城明季以文雄江左廷鑾少承家學又師事父友呉應箕盡得其傳日益淵博詩文皆偉麗聲名籍甚康熙元年以貢考授州同知未仕卒所著梅根集及他纂述凡數百卷又同縣姜可乆受業廷鑾父及應箕之門通經史大義作詩文濡筆立就著有斐園集陳克祥字季麟銅陵諸生父國瑞以好義聞鄉里克祥資敏嗜學時人推其博洽太平府南北朝梁周興嗣字思纂先世陳郡遷姑孰博學善屬文天監初奏休平賦其文甚美累擢員外散騎侍郎光宅寺成勅興嗣與陸倕各製碑文帝用興嗣所製自是銅表銘栅塘碣檄魏文次韻王羲之書千字並使興嗣為之毎奏帝稱善後佐撰國史歴給事中卒唐陳商字述聖當塗人有文學舉進士㑹昌中歴禮部侍郎祕書監撰敬宗實録十卷宋郭祥正字功甫維之子當塗人母夢李白而生少有詩名時梅堯臣方擅名一時見而歎曰真太白後身也舉進士歴知瑞州棄官隠青山自號謝公山人有青山集行世徐遘繁昌人熙寧中舉進士弟迪紹聖初登第兄弟相師友詩文清麗人比二蘇石􅐂字敏若禹勤孫元符進士崇寧中又舉博學宏詞才名籍甚時梁師成用事方鈎致知名士或勸􅐂往謁􅐂拒不從仕止州幕著有橘林集方汝彊字南夫繁昌人紹興末舉進士不樂仕宦以觴咏自怡有詩名明潘廷堅字叔聞當塗人初太祖渡江以陶安薦除太平教授累遷翰林學士洪武四年典㑹試宋濓副之廷堅文譽最盛尤以謙慎為太祖所稱後請老歸子黼字章甫亦以文學嚮用仕至江西按察使預修律令李習字伯羽當塗人叙之子領延祐四年鄉薦授書院山長太祖至采石習偕門人陶安迎駕即擢知太平府年八十餘矣以亷辦聞習與弟翼才名相埒江左目為二李呉萊稱習之文簡密嚴奥翼之文豐腴縟麗習子汶字宗茂以才學召入史館預修元史出為巴東令移南和皆有善政謝九成字鳯儀繁昌人嘉靖丙戍進士由重慶推官歴擢吏部郎中乞歸後杜門著述有經史管見綱目前紀諸編蕭雲從字尺木蕪湖人崇禎己卯副榜不赴銓選専以詩文自娯有梅花堂遺稿兼工畫得倪黄筆法廬州府南唐伍喬廬江人性嗜學以淮人無出已右者遂渡江居廬山國學一夕見人掌自牗入署讀易二字忽不見喬大歎輒取易讀之探索精微越數年有僧夢大星曰伍喬星也訪得喬使應進士舉試畫八卦賦喬第一元宗大愛其文命勒石為永式仕至考功員外郎有集一卷宋姚鉉字寳之合肥人太平興國進士甲科淳化中直史館侍宴内苑應制賦賞花釣魚詩特被嘉奬歴官舒州團練副使卒鉉文詞敏麗善筆札藏書至多在淛課吏寫書為薛映所掎摭有集二十卷又纂唐人文章為百卷目曰文粹楊寘字審賢合肥人察之弟少有雋才慶厯二年舉進士京師試國子監禮部皆第一試崇政殿又擢第一通判頴州未至官持母喪病羸卒先是其友夢寘作龍首山人寘自謂龍首我四冠多士山人無禄之稱我其終是乎已而果然胥致堯合肥人少力學為文辭官至左班殿直歐陽修志其墓子流以才能稱阮美成舒城人元豐中進士知巢縣為政愷悌喜吟咏時稱阮絶句焦蹈字悦道無為人文翰有名崇寧三年計偕後期適南宫火命禮部改試蹈為第一時口號云不因南省火安得狀元焦蹈凡四首鄉薦又由省元登第盖三元云李臺卿字明仲廬州人性介特博學彊記有史學考正同異多所發明知天文律厯千嵗之日可坐數也朱翌字新仲舒人政和間進士時人諱言詩翌獨沉涵六藝文思飇發南渡後為中書舍人掌書命文章忤時宰謫曲江有潛川集元潘純字子素廬江人少有俊才嘗著卦辭諷切當時詩極精麗其錢塘懐古句最為當時稱誦明秦鳯字子儀舒城人洪武進士知興山縣擢給事中以言事改衛輝府同知卒於官撰營建宫闕賦洪熙輔政策高岡遺稿郭奎字子章巢人少遊余闕之門青陽遺集其所藏弆也明初參朱文正軍事詩歌悲壮坐文正事誅宋濓趙汸為序其望雲集邢寛字用夫無為人永樂甲辰進士廷對䇿祭祀兵戎考究詳明議論醇正擢第一開科以來江北士占名第一者自寛始授修撰進侍講纂修宣廟實録陞學士祝富字堯臣舒城人博學工詩文成化㑹試乙榜除伊陽教諭三校省闈由國子學正遷伊府長史悉心輔導時宗室以事忤王力為辯解聞於朝進階旌之著有黙庵集呉廷翰字崧伯無為人正徳進士官至山西叅議被命採端溪硯已不持一枚其亷謹多類此著漫録業言櫝記甕記志略考湖山小稿蘇原諸集董子策字霞峰合肥人嘉靖進士以户部郎視𣙜滸墅闗商船輻凑乃就關傍别開支河令曰凡舴艋可出此橋者聴商民徳之嘉靖末進廣東按察司僉事辭歸一意著述逺近丐其文或不時應率敦請至再里中遇難得之物輒相詫曰豈求董進士文耶黄道月合肥人萬厯進士官中書舍人風神俊朗詩文清妙弟道日舉於鄉書翰為世所珍王寖大字幼章合肥人崇禎丁丑進士再任知縣以亷能稱擢南吏部郎歸居家捍衛鄉里規畫荒政具有幹略其學尤長於史著春秋説史綱鈔數十萬言國朝龔鼎孳字孝升合肥人舉崇禎甲戍進士歴官兵垣我朝以原官召用累遷左都御史再謫再起復都憲晉刑兵禮三部尚書鼎孳洽聞博學工詩古文士林推之弟鼎孠字伯鼎署仙居縣篆山賊之願歸農者請給牌免死更給農具全活甚衆著有稻香樓詩集孫維祺字起山廬江人少而頴異為文風發泉湧辛未成進士令河間改淶水事母以孝聞鳯陽府三國薛瑩字道言綜子初為祕府中書郎歴官選曹尚書太子少傅右國史華覈疏薦瑩渉學既博文章尤妙同寮之中􅉷為冠首請卒修呉史皓遂命瑩為左國史著書八編名曰新議晉嵇康字叔夜本姓奚自㑹稽遷於譙之銍縣銍有嵇山家於其側因氏焉與魏宗室婚拜中散大夫少有雋才博洽多聞好老荘之業常修養性服食之事著養生論寓居山陽與阮籍山濤向秀阮咸王戎劉伶相友善遊於竹林號為七賢山濤為選曹舉康自代康答書拒絶之著文論六七萬言皆為世所玩詠兄喜字公穆晉揚州刺史宗正嵇含字君道銍人好學能文舉秀才除郎中時𢎞農王粹以貴公子尚主館宇甚盛圖荘周於室使含為之讚含援筆為弔文文不加㸃粹有愧色歴官廣州刺史平越中郎將諡曰憲南北朝梁劉顯字嗣芳沛國相人幼聰敏號神童好學博渉多通任昉嘗得一缺簡書人莫能識顯云是古文尚書所删逸篇昉檢周書果如其說沈約命駕造焉策顯經史十事顯對其九顯問其五約對其二名流極推賞之歴官平西諮議叅軍加戎昭將軍隋劉臻字宣摯顯子年十八舉秀才宇文䕶辟為記室軍書羽檄多出其手隋高祖受禪高熲以臻随軍典文翰進封饒陽縣伯躭恱經史終日殫思精於兩漢書時人稱為漢聖唐裴嚴字子肅夀春人舉賢良方正策第一拜拾遺詞章峭麗官京兆尹强幹不阿貴勢後為翰林學士元孟祺字徳卿宿州符離人幼敏悟善騎射官國史院編修一時典册多出其手歴官嘉興府總管首以興學為務以功封魯郡公諡文襄子二人遵遹楊叔幹字立之定逺人少有才名博覧强記登省元入翰林益著聲望明胡敏字伯成定逺人洪武己卯鄉薦與修明初大典歴官營繕員外郎累謫盧龍以薦起授鄞縣令遷監察御史周常字茂永定逺人中永樂壬辰進士歴任福建河南僉事所至風裁凛然性敏悟讀書日記萬言為文章下筆立就尤長於詩苖衷字公彝定逺人永樂辛卯殿試第二授編修修宣廟實録屢典文衡累官大學士卒贈少保諡文康有雪窻稿歸田録淩耀宗臨淮人博學宏詞官禮部員外天順間與修一統志黄淮字中甫定逺人博覧羣書著有通鑑輔義顧伯謙字有終臨淮人𢎞治壬子鄉薦學本六經居鄉孝友著有起亭集任文石字伯介宿州人嗜古學工詩賦手不釋卷丙子廷對司訓維揚尋退居相山著有相山志藕花墅集國朝丁啓明字東有宿州人初為諸生時被誣遭吏議以詩見知監司獲解詩名益振任柔節字定子宿州人隠居相山之麓博學嗜古於書無所不讀善著作喜吟咏有詩文數十卷行世潁州府三國魏曹植字子建譙人武帝子十嵗善屬文時銅雀臺新成帝命為賦援筆立就建安十六年封平原侯徙封臨淄文帝即位貶爵安鄉侯明帝時封陳王嘗上表求自試卒諡曰思曹冏字元首譙人魏少帝族祖為𢎞農太守時天子幼稚冏作六朝論欲感悟曹爽爽不能納晉夏侯湛字孝若譙人幼有才名善文章而美容觀與潘岳友善京師謂之連璧泰始中舉賢良對策拜郎中後出為野王令政清多暇著昆弟誥官至中書侍郎南陽相子承為南平太守王敦亂承露檄逺近列敦罪状後為敦所執欲殺之以王廙苦請得免曹毗字輔佐譙國人魏大司馬休曽孫好文籍能屬詞累遷太學博士尚書郎光禄勲唐李敬元亳州譙人博覧羣書尤善於禮高宗在東官馬周薦其才召入崇賢館侍讀假内府書讀之撰次禮論及他書數十百篇累官中書令封趙國公卒諡文憲曽孫紳見宦績王建字仲初潁州人大歴十年舉進士太和中歴陜州司馬與韓愈張籍同時相友善工為樂府歌行宫詞百首傳播天下宋傅瑾字公寳汝隂人任蔡州助教力學彊記尤邃字韻有字林補遺十二卷音韻管見三卷聞見録十卷周子雍汝隂人嘗受學於陳無已為詩清麗有法大觀初再復湟鄯京師以元夕張燈開宴徽宗賦詩賜羣臣其頷聫云午夜笙歌連海嶠春風燈火過湟中席上和者皆莫及時子雍客開封尹宋喬年所喬年密走价求援得句云風生閶闔春來早月到􅅾萊夜未中大為時所稱王銍字性之潁州人高宗南渡時為浙西幕僚作守備䇿千言上之時帥後悉驗焉著有黙記七朝國史雪溪集略續清夜録國老談苑等書王亷清字仲信頁州人銍長子秦熺倚父勢移書郡將欲取其先世藏書且餌以官亷清拒之曰願守此書以死不願官也熺不能奪而止著有廣古今同姓名録新乾曜真形圖補定水陸章句王明清字仲言亦銍子積學修徳不慕榮進克紹前業所著有揮塵録投轄録玉照新志行於世金劉瞻字岩老亳州人天徳三年南榜登科為史館編修自號攖寧居士作詩工於野逸有集行世明邢嵩字維嶽潁州人博雅邃經學以貢入太學祭酒湛若水器之潁後進多從學焉授黄州府通判薛蕙字君采亳州人年十二能詩正徳甲戍登進士授刑部主事諫南巡予杖後起官陞考功司郎中嘉靖中大禮議起蕙援據經傳撰為人後解為人後辯凡數萬言入奏下詔獄尋得貰復職㑹亳守顔木得罪忌者誣蕙與木同年疑有奸利詔解任聴勘既而事白遂堅卧不出屏居西原著書樂道泊如也所著有約言西原集解大寧齋目録五經雜録老子集解張􅖌字汝明潁州人於書一覧不忘詩風骨清俊登嘉靖戊子賢書為太湖令旬日而返嘗曰武功如衛霍文章若李杜花間露耳故著述成輒棄去其感懐云汗漫多情淹客住尋常有酒對花開雅有淡致王尚循字淡父頁州人給諫謨子為詩常廢寢食人皆笑之乃裒其詩千餘首自名之曰由粲集傳其少年時跅弛不羈父患之忽奮筆題其楹曰過也如日月之食復其見天地之心自是折節讀書人比之周孝侯云國朝劉體仁字公勇潁州人廷傅子順治乙未進士歴吏刑二部郎請假歸里卒體仁生而英異目重瞳子五嵗父於􅂰上授大學中庸及就𫝊經史一覧成誦居郎署三年輦下諸名賢争欲識體仁體仁亦樂為之盡尤好奬借寒畯藏書二萬餘卷告歸後日手一編不問户外事詩筆一出人士競傳誦之居家孝友婣睦恂恂可稱滁州唐邢文偉全椒人少以博學知名江淮間咸亨中歴太子典膳丞太子罕接宫臣文偉上書切諫後右史缺高宗曰文偉切諫吾兒此直臣也遂授之累遷鳯閣侍郎兼𢎞文館學士宋張洎字偕仁全椒人舉進士仕南唐為清輝殿學士後歸宋太祖以其有文選直舍人院太宗時歴翰林學士叅知政事洎文采清麗博覧道釋書有文集五十卷行世徐徽全椒人運判象賢子嘉祐間進士歴提舉利州常平致仕歸里詩深沉典麗文亦淵雅紹聖中曽肇守滁與為文字交王彦成全椒人大觀初舉進士調泰州法曹以左丞薛昻薦召對徽宗曰近觀榮遇集見卿文理優長特授祕書省校書郎累官太僕卿范酉新字孟申滁州人所著孝順詩一卷元葛涃字敏問滁州人博渉經史工文辭至正間有司舉為清流校官學者皆服其指授明范常字子權滁州人學甚淹貫太祖召典文牘洪武初歴遷翰林學士及致政賜詩四章人以為榮子組官至雲南叅政有修潔稱樂韶鳯字舜儀全椒人博學能文章多智略從太祖渡江叅贊軍事洪武中拜尚書改侍講學士修大明日歴重定洪武正韻更製釋奠先師樂章尋移疾免復起國子司業遷祭酒弟暉以人材知開封府禮太常卿毅諸暨州同知並知名李傑字懐英滁州人景泰癸酉舉人官翰林待詔有詩名又來安郝孔昭字起潛由進士令常山博學多著述任扃字啓敬滁州人通經術能詩有玉山樵唱集國朝呉國對字玉随全椒人中書國鼎季弟順治戊戍廷試第三人授編修累遷侍讀督順天學政國對才學優贍工詩賦善書法對客運翰如飛言論風采館閣推重子旦朂昇俱有文譽昇康熙戊午舉人潘運皥字熙仲滁州人順治己丑進士授中書舍人以博洽稱詩筆敏妙著有西沆紀遊諸編和州宋錢藻字純老和州人幼孤篤學文詞雋偉舉進士賢良方正直言極諫諸科名動一時歴翰林侍讀學士元豐中卒官曽鞏誌其墓明蔣禮和州人永樂壬辰進士歴官中允文譽甚盛後學宗為矩度戴重字敬夫和州人崇禎時以貢授湖州推官調亷州詩古文皆醇潔有河村集廣徳州宋查揆深之孫熙寧中上舍生神宗問近臣舍選有以江南查揆張汝舟對後第進士為太學博士卧疾不起陳紆以詩悼之曰舍法得才傳黼扆古人馳譽重賢闗何大圭字晉之廣徳人年十八試禮部第一詩文有聲沈虚中廣徳人舉進士歴官吏部尚書所著有通鑑事類左傳國語要略考異國史要綱桐川集明戴初字復之建平人成化丁未進士性剛介甘貧力學有詩名歴宰三邑皆以亷稱戈維屏字元衛廣徳人萬厯辛卯舉人攻苦積學一郡英雋皆出其門孫振宗字簡伯廣徳人萬厯壬子鄉薦家貧力學善古文詞夏儀字長卿廣徳人良心之孫頎然玉立咳吐成文一時名動公卿崇禎辛未進士授中書科舍人國朝雲中官字軒臣廣徳人高才生選貢文譽籍甚癸未登進士授中書舍人為人狷潔抗直不樂仕宦嘗授經他省辭而歸主人彊納四十金於行笥要之明年復往不果欲還其金無便臨歿猶出金屬其子必寄之封識如初閲六年矣六安州明何慶元字長人嘉靖戊戍進士文名籍甚授工部主事分司高郵築堤以便蓄洩公私便之陞雲南兵備乞終養不赴工古文詞著長人集呉蘭字卿佩六安人嘉靖戊戍進士為邑令不喜簿書改教授講道自得選直内閣母憂歸遂不復出著書數百卷為文沖淡流暢翰墨尤遒勁有法泗州宋李犍招信人官國子博士著易說國朝施端教字匪莪以貢訓宣城令范縣陞東城兵馬指揮風雅知名又精六書工草𨽻所著有嘯閣集古詩韻匯唐詩韻匯等書錢世熹字紹文五河人明崇禎時選貢考授推官不就選益自刻勵讀書康熙己酉庚戍聫㨗制義紙貴一時為人秉義執禮不茍合於俗未仕而卒卒之日僅存茅屋三間陳天篤字因其天長人生無啼聲家人疑其瘖周嵗見杜少陵宣政退朝詩似欲吟哦狀父􅃧之曰識之乎則頷而笑因指首二字問之忽應聲曰天門父駭然知其有夙慧後讀書目五行下成通儒韓竹字一韓天長人少頴異好學工文章康熙癸丑成進士選庶吉士授編修丙辰分校禮闈所得皆知名士給假歸娶念父母春秋高即移疾里居幾二十年服食不異寒素尤好行善事於鄉江南通志卷一百六十七
