定為常額續増人丁永不加賦仍不許有司於造册之時藉端需索用副朕休養生息之意五十五年御史董之燧疏請統計丁銀按畆均派户部議覆各省州縣地畆人丁原有不同隨地制宜相沿已久未便更張如有情願買賣地畆而丁應從地起者其地亦隨買主輸課奉㫖依議附董之燧疏畧續生人丁永不加賦皇上軫念民生髙厚之恩真有加無已但現在人丁尚多偏苦各省州縣丁制亦有不同有丁從地起者丁從人起者丁從地起者其法最善而無知愚民每每急求售地竟地賣而丁存至丁從人起者凡遇編審之年富豪大户有囑里書隱匿不報而小户貧民盡入版册無地納税亦屬不堪一切差役俱照丁起派以田連阡陌坐享其逸貧無立錐身任其勞既役其身復徴其税逃亡者有所不免一遇國逃亡非親族賠累則累也嗣後既不増額則有定課虚懸現在人丁之敇部行數可稽臣請地方官確查各縣地畆若干統計地令直𨽻各省丁人丁之銀數若干按畆均派在有地者所加無多不為苦無地者得免賠累實為幸雍正五年總督范時繹題請以雍正六年為始丁隨田辦奉㫖依議附范時繹疏畧丁銀隨田併征最為均平良法直𨽻各省厯來丁地分征者節經俞㫖題明歸併奉有州縣内向有丁銀隨田徴輸者亦有在案今江南各丁田各辦者查各屬田地原有髙下之殊按畆起科亦有輕重之别所有丁銀各就本縣地畆均攤為便且可省改造全書之煩至中間成熟銀米科算或照地畆科算亦皆下順輿情便於輸納相應皇仁題明以雍正六年為始丁隨田辦以廣兩六錢有奇再山陽一縣每地銀一兩攤徴丁銀一又江寧縣歸併外衛地銀一兩亦攤丁銀一兩二分有奇似乎獨重但按畆而計山陽縣每畆原徴銀一分八釐零今加人丁項不足五分之數江寧歸併外衛每畆徴銀一分九釐零今加人丁項尚不足三分九釐之數再收租納糧均輸猶易若責之無地光丁不無追呼之擾如海州山陽髙郵江都四州縣無地軍丁額數無幾均入民田毎畆所増不過絲毫之間均應畫一攤徴再安徽等屬尚未造册詳報但事同一例應概請攤徴俱自雍正六年為始按丁銀即漢之口算唐之調宋之丁米當時有授田之制無無田之丁及授田法不行而無田之丁始以丁銀為苦矣増除之際吏胥得縁為奸自聖朝増丁不増賦丁隨田辦而貧民得以安枕為自古未有百世不易之良法也此今條鞭内人丁欵匠班雍正七年奉㫖准署總督范時繹安徽巡撫魏廷珍江蘇巡撫王璣疏将上下兩江匠班銀免徴攤入地畆徴輸附疏畧各屬匠班銀兩向係按匠徴輸相沿久逺今查安徽屬除當塗和州含山三州縣全書原未編有匠班毋庸另議外其懐桐等五十七州縣每年額徴共銀三千八百七十兩三錢二釐零江蘇屬除山陽桃源安東以及邳州宿遷雎寧等州縣久在田丁内徴解外其上元等六十州縣每年額徴共銀七千六百八兩五錢三釐零縁厯年久逺原匠子孫逃故無追是以各州縣有於現業匠户派徴者有著族屬親鄰里逓賠補者若攤入田畆徴輸在有田之户所増無幾而手藝貧民受益良多相應造具攤徴清册請於雍正七年為始此條鞭内匠班之欵永折漕糧地方江寧府屬髙淳溧水二縣每正兑米一石連耗折銀七錢改兑米一石連耗折銀六錢淮安府屬安東縣正兑改兑米俱毎石連耗折銀五錢揚州府屬興化縣每石連耗折銀五錢舊屬蘇州府今屬太倉州之嘉定縣並嘉定分出之寳山縣正兑米每石連耗折銀七錢改兑米每石連耗折銀六錢以上折銀俱入地丁項下徴解順治十六年因江寧省衛月糧不敷巡按馬騰陞題定折漕州縣每正米一石一例加増銀二錢五分一釐三毫七絲二忽九微三纎七沙七塵七埃六𣺌二漠徴解江安糧道交納徽州府屬應徴南米康熙二十八年總督傅臘塔以該屬䖏萬山之中不通舟楫深為苦累題定改折每石徴銀八錢恩免山陽清河桃源宿遷安東髙郵寳應碭山徐州衛等九州縣衛挑河築堤挖廢民屯田地四百四十六頃九十五畆零雍正九年蘇州巡撫尹繼善題請将該額徴銀米麥豆等項自康熙五十一年起至雍正五年止悉行蠲免奉㫖依議沛縣昭陽湖水沈田地二千一百六十八頃七十六畆題定應徴銀米每年冬勘之後涸則次年帶徴淹則題請蠲免雍正十年十二月總漕性桂題請将湖田本年漕米先行挖除徴收俟冬勘後如有涸復於次年帶徴奉㫖依議雍正十二年江蘇巡撫髙其倬題挖廢田地内碭山縣田地四頃七十二畆零徐州衛屯田三頃六十一畆零於雍正六七年間淤平各户丁照額輸将所有山陽阜寧清河桃源宿遷安東髙郵寳應八州縣共挖廢田地四百三十八頃六十一畆零自雍正六年起至十年止請将該額徴銀米麥悉予蠲免部覆仍令以後按年委員確勘有無淤出應徴應免之䖏報明保題奉㫖依議十三年十一月十六日署副都御史陳世倌奏請農忙停徴總理事務王大臣議定例徴收錢糧於農忙之時停徴雍正五年議准條奏頑民恃有停徴之例輾轉規避以致積欠嗣後州縣於停忙之日查明糧户限内完半者照例俟開徴後再完如未完半之户仍行追比夫小民辛勤力作一嵗之中五六兩月最為𦂳要生計於是乎出賦税於是乎辦誠不可以催科妨其本業况四月限内之不能完半者多因青黄不接無力輸将難因一二頑户概行徴比即稍緩時日亦可於開徴之後催令完納應如陳世倌所奏請敇部通行直省嗣後農忙之時仍照舊例概停徴比奉御批所議甚是依議速行十二月二十七日奉上諭朕聞淮安府阜寧縣所屬射陽湖地方於雍正五年經齊蘇勒題陞淤地八千一百餘頃陞租銀四千餘兩又康熙五十九年查丈射陽湖北岸淤灘案内有民人周士孔楊景希陞地四百餘頃應陞銀一百七十兩俱係有糧無地小民賠累難堪是以向來積欠纍纍從未清完今各項舊欠雖已蠲免然将來新賦無出勢必仍行追比甚屬累民著将前項陞地八千六百五十頃四十九畆零租銀四千二百六十一兩零俱行豁除以甦民困該部即遵諭行乾隆元年二月十六日奉上諭朕聞江南淮安府屬之桃源縣徐州府屬之宿遷縣雎寧縣濱臨黄河沿河地畆淹涸靡常雍正五年因朱家口潰決之水復循故道其舊淹田地始得涸出而河臣為地棍所欺遂以此地為新淤之腴産睢寧縣報陞地五千三十九頃宿遷縣報陞地四千七十二頃桃源縣報陞地三千八百四十二頃嗣䝉皇考世宗憲皇帝勤求民隱特頒諭㫖以淤地勘報不實令河臣㑹同督臣委員查勘共豁地七千二百餘頃萬民感頌所有存留地五千七百餘頃俱照各縣成例折算實地三千五百餘頃科則亦經減輕其潼安一衛裁汰改歸州縣徴收乃比年以來應納錢糧仍催徴不前盖此淤出之地畆即舊有之糧田是以民力維艱輸将不繼也朕以愛養百姓為心既洞悉其中情事自當加恩開除以紓民力著将宿遷睢寧桃源三縣現存新淤涸復改科地糧額徴銀六千五百四兩全行豁免其雍正十三年淤地未完錢糧亦免徴收至水沈地畆仍照例歸於每年冬勘該部即遵諭行四月十六日户部議查得署理蘇州巡撫顧琮以蘇松常鎮等府額賦繁重荷䝉皇上軫念民瘼格外施恩諭令酌減耗羨以紓民力今分别科則輕重量減差等請自乾隆元年起一切新舊錢糧将科則最重之蘇松太三府州遵減耗羨五分計共減耗銀七萬七千三百八十三兩零科則次重之常鎮二府酌減耗羨三分計共減耗銀二萬八千一百九十一兩零通共減耗銀一十萬五千五百七十四兩零再查江省錢糧耗羨自雍正六年提解充公酌定加一徴收以為各官養亷並一切地方有定無定公費年底造册核銷通省每年額徴地漕雜税學租蘆課等項耗羨共銀三十七萬五千一百七十二兩零今除去蘇松常鎮太五府州酌減銀兩外實收耗銀二十六萬九千五百九十八兩零毎年嵗需各官養廉及有定無定公費並隨時辦理公費每年約需共銀三十三萬四千餘兩以嵗入耗羨支給計不敷銀六萬四千五百餘兩查有揚海兩關額税之外每年計有盈餘銀約共八萬餘兩可否将此盈餘税銀每年撥給六萬四千五百兩以資添補統於年底造册送部核銷俾公事得無匱乏等因㑹同江南總督趙𢎞恩合詞具題前來查江南賦重之區如蘇松常鎮四府較之他省幾及數倍應如所請以奉文之日為始飭令各屬按數徴收仍通行出示曉諭如有不肖官吏私自巧取苛索累民者該督撫即行題叅嚴究再稱養廉公費不敷於揚海兩關盈餘銀内動支添補亦應如所請統於年底報銷案内造報可也奉㫖依議江南通志卷六十八
