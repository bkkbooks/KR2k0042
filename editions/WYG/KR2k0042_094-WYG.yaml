body:
  text: 江南通志卷九十五武備志江防大江北岸安慶府望江縣上接湖廣黄州府界安慶為呉楚交㑹之地其江西自湖廣黄梅縣流入宿松界小孤山矗立波濤間號海門第一闗元余闕命水軍戍守所恃以為安慶藩蔽者也而北岸之屬縣治者少故敘江防者自望江始望江古設大雷戍晉劉裕之戰盧循陳徐度之禦王琳皆於此而懐寧縣為今安慶府治三國呉魏相争迭為重鎮國朝則以廵撫坐鎮復以副將協守焉葢江至安慶勢最衝險而諸要地皆密邇宜守上自小孤下至桐城之三江口六百丈凡三縣列汛二十有六過此而東入廬州府無為州界望江縣界汛黄家􅡉桃樹灘雷港卞家套江心蓮花洲路灌溝土嘴俱安慶營汛懐寧縣界汛洲頭口光洲張家港花園王宣夾口桑園前江溝鴨兒溝俱安慶營汛桐城縣界汛柘家灣鐵板洲三江口新開溝殷家溝邱家埠下埠頭武梁洲係池州府貴池縣跨江汛地六百丈老洲頭以上俱安慶營汛蔡家窑遊兵營汛廬州以無為一州南與銅陵繁昌蕪湖三縣對江勢至此洲夾愈多従此南渡繁昌可以避三山七磯之險而又以巢湖相為表裏故呉魏争衡此為守禦之隘明萬歴時操江御史董堯封奏以廬州府同知兼管江防并改無為同知移駐泥􅆜河重其防也自泥􅆜而上起灰河下至裕溪凡列汛十有六過此入和州界無為州界汛灰河土橋胡家溝􅲯魚口紫沙洲尾白魚池泥􅆜薛家灣港板橋新洲夾牛門溝蟂磯中路田家溝裕溪遊兵右哨把總駐此以上俱遊兵營汛和州與太平府相對南北互為險梁山廹接南之博望山横鎖大江中所謂天門也國朝特設游兵營駐防焉而横江可直渡太平則尤為津口之要害昔蘓峻之登牛渚侯景之襲姑孰韓擒虎之克采石俱取道於此長江惟和州以重險扼其中而上下不得以徑過攻守所必争至針魚嘴之内通州治姥下太陽石跋芝麻諸河之緣江為藪皆要地凡列汛九過此入江浦界和州界汛西梁山總汛遊兵營遊擊駐此窑頭姥下河太陽河牛路針魚嘴石跋河芝麻河陳橋洲以上俱遊兵營汛江寧之江浦六合兩縣本古棠邑地唐宋以來或屬江都或屬真州自前明割屬畿郡立浦口營遂為江寧䕶江之要地國朝設守備雍正二年更設把總添水陸汛各六廵防視昔加密自浦口而上屬江浦下至二套口舊屬六合今改屬上元六合之汛自𤓰埠始𤓰埠為滁水出江之所經昔北魏主燾屯兵𤓰步宋人為之戒嚴及南唐齊王景達設柵於𤓰步即𤓰埠也自此下至沙洲屬六合凡三縣列汛十有九過此入揚州界江浦縣界汛響水套公子洲西江口黃𤓰壟楊四廟浦口以上俱竒兵營汛上元縣界汛浦山髙埂頭急水溝王家溝大蓬門黃厰河二套口以上俱竒兵營汛六合縣界汛𤓰埠田家橋段腰西溝福龍洲沙洲以上俱竒兵營汛揚州之儀徵江都二邑南臨大江儀徵上接六合平分黃天蕩太子洲之險東溝至青山嘴波濤傾仄明呉臣襲賊於此而胥浦橋則宋邵宏淵引兵之所據也儀澂之下江口有新洲明鹽梟又多集於其間是以國朝於儀徴立竒兵營以駐防而分巡焉而江都則又立𤓰洲營蓋江都為通漕出江之口南與金焦相對最為要地自此下歴十餘港至三江口江勢益濶北有寶墖灣南有􅆜江江防考所謂第一重門户者也則又為京口水師之所巡凡二縣列汛四十有三又東過復業新洲入通州泰興縣界儀徵縣界汛東溝竒兵營右哨千總駐此白茅墩梁山嘴青山王家溝一戧港黄泥灘竒兵營把總駐此江口舊江口竒兵營把總駐此巷連港侯庄墩馬港何家港何家港墩俱竒兵營汛江都縣界汛花園港墩花園港瓜洲城即本營汛駐此本營守備大砲臺水師右營右哨把總駐此新港墩新港倒流港墩卞家港朱明港草龍港墩深港黃港墩薔薇港墩沙河港小史家港大史家港墩八港梁家港墩孫基港孫基港墩徐家壩墩徐家壩繆家嘴墩三江口墩三江口水師右營左哨千總駐此復業新洲墩復業新洲嘶馬墩王家嘴墩以上俱京口水師右營汛通州泰興縣隔江與丹陽武進二邑地相對國初設周橋守備而永生洲分為南北兩營嗣併為㤗興營至康熈十一年始屬京口水師防汛蓋自周橋坍於江而常州之靖江又壅江來屬泰興之江止於縣西二十五里入境經縣西南三十里入靖江遂别開一河為兩縣之界名曰界河界河之上有得勝港明初嘗敗張士誠於此有黃家港與武進孟瀆河對岸有新河港元置千塘巡司於其地凡列汛二十自此至孤山南入靖江界東入如臯界泰興縣界汛朱潭窩墩詹徐庄墩五洲陳吉庄墩趙李庄墩口岸墩口岸汛得勝墩馮家港墩李家港蔣家港墩過船港野􅆜港墩洋㴓港墩黃家港墩黃家港水師右營左哨把總駐此新墩新河口墩以上京口水師右營汛漁㴓港墩界河口墩以上京口水師左營汛常州之有靖江跨江而北若贅旒然以彈丸之地當江海之衝然東則狼山控其下西則圌山扼其上皆險而可據靖居其間故不為敵之所利明初嘗屯重兵以斷淮徐南侵之路焉邑本名馬䭾沙在江之中流天啓間沙渚漲塞遂北屬泰興其接壤之西北有永定營隂沙等處為叢雜之地防上流者當守永興團太平等港防下流者當守永慶團青龍等港邑中諸墩臺舊在内地國朝順治十三年始移築江邊以便瞭望康熙六年復增建焉凡列汛二十有四自靖江而東北為通州如臯縣界靖江縣界汛界河口西夾王墩東夾王墩大港墩繆清港墩宣家嘴衙前港墩翟家墩蘆塲墩陳公港天港墩瀾港稅房水師左營左哨頭司把總駐此瀾港墩蘓家港䨇港墩西蟛蜞港東蟛蜞港天生港陸助港和尚港安寧墩龍潭墩張國墩太平墩俱水師左營汛通州如臯之地西南接靖江隔江與江隂石牌范港相對自前明以來專意海防至于江洋之責則列艦聨營為游徼而已國朝順治十六年海䑸泊南沙于是始議建立墩臺設兵廵哨康熙九年規制大備其石莊港天生港游龍河皆前明寇盜之藪自此東南為通州與蘓州常熟縣相對江濶八十里有蒲沙褚家沙明設把總于此又東為狼山鎮狼山據江海之匯屹然與福山對峙勢若扃鑰今設總兵府建左右中三營鎮其地凡列汛二十有七自狼山以東為大江出海之口詳見海防志如臯縣界汛百姓圩佘李小圩蘆塲沙鵝阮庄張家臺沈家圩佘家圩沙揚庄水師左營左哨二司把總駐此劉家灣楊家臺天生港冒家圩李家圩宋家圩俱水師左營汛通州界汛阮家圩李家港灰川港九圩港復興沙任蘆港蘆涇界港俱水師左營汛蘆涇港任家港砲臺姚港花毛港黃泥山砲臺以上五汛互見海防狼山俱狼山左營汛大江南岸池州府東流縣上接江西九江府界池州之江自東流始西以馬當山與江西之彭澤分界為上流之門户東下響水磯以江中蓮花洲之半北與安慶之望江縣分界又東以雁􅆜鎮為要地宋置雁􅆜軍又東至貴池之黃湓李陽河古石城虎林之險恃此池口内通秋浦達於府城而王家套武梁洲則跨北岸之地錯處于桐城三江口老洲頭之間又東至銅陵之大通河銅陵與無為州相對唐楊行密自無為州渡江駐兵銅官即銅陵也銅陵之東荷葉套丁家洲老觀嘴張灣潭皆夾江也凡三縣列汛三十有七過此入太平府界東流縣界汛官塲響水磯香口烏石磯東流河吉陽黃石磯髙家嘴渡船口俱安慶營汛貴池縣界汛黃湓殷家匯紫巖塘寶賽磯李陽河安慶營右軍千總把總駐此烏沙夾中夾口冰凍灣池口流波磯仙姑廟郭港梅埂五埠溝俱安慶營汛銅陵縣界汛大通江心荷葉洲洋山磯横港以上安慶營汛江中洲頭掃把溝銅陵河口遊兵營左哨二司把總駐此長山磯丁家洲老鸛嘴紫沙洲頭錢家灣清水溝張灣潭以上遊兵營汛太平府所屬三縣皆濱大江六朝時以此地為南州其戍防視東西二府為尤重蓋其地多險要繁昌之要荻港瀂港其險則板子磯明黄得功築砲臺於此三山磯晉王濬舟師自武昌趣於此蕪湖以䨇港為要以磯蟂兒墩為險而當塗之險要為最有四合山為伏戎之地有東梁山北對西梁山號曰天門梁周鐵虎立柵于此以備江州唐輔公祏連鐵鎖于此以斷江路采石磯北對横江渡隋平陳宋平南唐明常遇春破完顔布哈皆由此而入又有牛渚磯慈姥磯和尚港亦皆險要凡三縣列汛二十有五過此入江寧府界繁昌縣界汛荻港河口遊兵營左哨千總駐此板子磯黑沙洲頭舊縣髙安橋三洲􅆜教化渡洋夾沙三山螃蠏磯瀂港蕪湖縣界汛䨇港蟂兒墩磯寡婦磯俱遊兵營汛當塗縣界汛四合山東梁山青草溝采石上口鯽魚洲采石下口遊兵營左哨頭司把總駐此思賢港和尚港烈山港白廟以上俱遊兵營汛江寧省㑹之地西北二面恃江為限列柵置戍自古而然衡其大勢上流則自横江采石以取新林下流則自廣陵京口以趨石頭他若車家渡宣化渡浦子口皆為津濟之衝要國朝特㝛重兵設總督將軍以資彈壓而六合江浦二邑介在江北仍屬本府以為外衛焉其中上則有慈姥磯烈山港下三山之險魏主宏伐齊詔於慈姥山置一軍烈洲置二軍三山置二軍即其地東為大勝河内通板橋新林浦與白鷺洲相對東北為新江口直江東門又東北為草鞋夾與江北浦口城相望此江寧縣界也自此而下入上元界至焦家嘴江形自北而東其勢委折兩岸獨闊為自昔防守要地又東為燕子磯直觀音門與江北六合之二套口相對峭壁懸絶又東為黄天蕩有太子洲港􅆜叢雜又東至龍潭港入句容界由龍潭而下為老鸛嘴與隔江青山嘴相對又東過天寧洲至髙資港凡三縣列汛二十有二過此入鎮江府丹徒縣界江寧縣界汛仙人磯江寧河口犢兒磯三山磯大勝闗䨇牐燈盞溝上河牌灣新江口竒兵營左哨千把總駐此草鞋夾俱竒兵營汛上元縣界汛七里洲燕子磯傅家溝草堂寺朱家嘴九分塘三江口柏家牐俱竒兵營汛句容縣界汛螺螄溝天寧洲坎潭橋炭渚墩以上俱竒兵營汛鎮江自昔為用武之地金陵鎖鑰之重全倚乎此宋陳亮曰京口連岡三面大江横陳於前勢如虎之出穴是也北與廣陵瓜洲相對為津濟衝要國朝設鎮海將軍統八旗宫兵屯駐於此江水自髙資歴洪信港而下為西馬頭汛鎮江之馬頭有二玉山之西為西馬頭象山之東為東馬頭皆鎮江守禦之地東至京口牐為漕艘出江總會之路銀山金山對峙於南北望瓜洲江濤洶湧隋賀若弼之平陳唐李子通之蹙沈法興皆取道於此又東為北固山依山為壘下臨長江為必争之地又東為焦山與象山夾峙象山之東即東馬頭矣又東為丹徒港港中設牐内通腹地商賈輻輳又東至圌山地勢扼要嘉靖間操江閭東兵科范宗吴㑹議所謂瓜儀鎮江之下有山破江而生為留都之門户江海之襟吭蓋謂此也自前明以來防守甚嚴與北岸三江口相為應援又東至朱張圩入丹陽界丹陽有三夾口而盪網洲居其間其下夾與周家橋相對沙渚叢雜尤宜慎防又東至包港過界河凡二縣列汛三十有二又東則入常州府武進縣界國朝麻勒吉有請移水師疏為靖移布水師以捍巖疆均分兵力以實内地事竊以江南通省兵力惟京口聚兵最多但兩路之兵無汛防之責臣以為瓜鎮以下江靖以上為京口就近之江汛應令其廵防將左路總兵官原額弁兵船隻今該鎮以其半自随移駐江隂以其半移駐靖江并孟河江汛總歸管轄以右路總兵官原額弁兵船隻令該鎮自随其半移駐瓜洲留其半於鎮江并泰興鎮江江汛總歸管轄仍為将軍羽翼誠有裨實用原舊江靖以上瓜鎮以下之汛兵俱可裁撤移防内地今嵗旱蝗災酷異常鳳廬之間被災尤甚誠恐鳳廬潁泗一帶地方盗賊乗問竊發不可不豫為防備若得邀俞允兩鎮移駐之命即將江靖各營所裁弁兵分置鳳泗并他處需防之地另疏報明如此則江海重地皇上速兵力未分災傷内地武備得厚矣臣謹密賜勅部議覆施行題伏乞丹徒縣界汛華山墩髙資港新洲頭以上竒兵營汛洪信港樂亭港七里港錢家港簰灣水師右營右哨二司把總駐此玉山頭蒜山墩運河口小插東馬頭丹徒港諫璧港孫溪港大港水操㕔韓橋圌山墩水師右營中軍守備駐此山北港郭家港墩何家灘匡家橋朱張圩水師右營右哨千總駐此以上水師右營汛丹陽縣界汛太平港水師右營左哨頭司把總駐此趙家墩復濟墩林港墩包港界港三聖墩以上俱水師右營汛常州之地北枕大江與泰興相對靖江雖接泰興並處江北實仍𨽻常州以為犄角之勢而南岸之縣則為武進江隂武進孟瀆河口有孟河堡城縦横三里明嘉靖間所築國朝康熙二十年廵撫慕天顔開浚建牐始復舊制其地最稱險要東至魏邨牐南宋置寨於此又東至桃花港與江隂分界又東至申港為春申君開浦置上下屯之地又東為夏江口黄田港口與靖江縣諸沙相對又東過江隂縣為君山黄山黄山之西北連大小石灣地勢竒險吴時嘗置烽堠于此又東至巫山獨立中流與如臯縣相對為江海之門户又東至瀔瀆港為楊舍協防重地又東至川心港凡二縣列汛四十有五入蘓州府常熟縣界武進縣界汛孟河水師右營汛黃山頭小河臺小河墩剰港墩大河墩魏村墩顧村墩澡港臺圩塘墩水師左營左哨千總駐此桃花臺以上水師左營汛江隂縣界汛桃花墩種九墩横丹墩利港墩蘆埠臺申港臺徐村墩新溝臺孟濟墩夏港臺伍堡墩黄田港水師左營右哨頭司把總駐此鵝鼻墩大石灣黄山墩蕭山石牌臺石牌西石牌中石牌東巫山臺新定沙正興沙西墩以上水師左營汛正興沙東墩善港墩新港復善沙西復善沙東泗港墩范港墩瀔瀆港以上俱楊舍營汛東寧沙墩水師左營右哨二司把總駐此永寧沙墩平寧沙墩以上俱水師左營汛蘓州獨常熟為江海交㑹之地自孫呉時西陵舉火達於南沙固已置烽堠於其地吴越錢氏嘗遣其將屯滸浦戍福山福山列戍自此而始福山之上自烏沙港東至黄泗浦三丈浦奚浦西洋浦以及福山堡皆福山營汛福山與通州狼山相對為大江出海之門南宋韓世忠所屯守處其堡城為侍郎胡宗憲平倭後所築今以遊擊鎮之與北岸狼山三營隔江策應屹然雄鎮也凡列汛一十有八自福山以東詳海防志常熟縣界汛烏沙港呉園墩新庄墩楊壩墩黃泗浦方壩墩鹿苑墩楊涇墩奚浦墩黃鶯墩小陳浦墩大陳浦墩江涇墩西洋墩黄涇墩蘆浦墩鰻魚墩福山西墩本營遊擊駐此以上俱福山營汛江南通志卷九十五
