body:
  text: 江南通志卷一百七職官志文職九江蘇松常四府國朝分轄江寧府知府一員順治二年改應天府尹為江寧知府改治中為同知江防同知一員康熙五十六年移駐揚州三江營監巡鹽務管糧同知一員理事同知一員原有馬政同知順治七年裁督鑄同知康熙十三年裁船政同知雍正二年裁北捕通判一員南捕通判一員舊有鹽捕西捕水利管糧督捕查鹽等通判俱於順治十五年奉裁又各府推官一員俱於康熙六年奉裁此係諸府所同以後不偹載經歴一員照磨一員檢校一員知事裁儒學教授一員復設訓導一員康熙三年裁減教職十六年照舊復設各府州縣同都稅司大使一員宣課司大使一員龍江關大使一員龍江關宣課司大使一員批騐茶引所大使一員龍江遞運所大使一員秣陵鎮巡檢一員江東司巡檢一員江淮司巡檢一員朝陽門分司龍江裏外河泊所司獄司司獄俱奉裁江東驛驛丞一員舊有金陵驛今歸併夲驛隂陽學正術一員醫學正科一員僧綱司都綱一員副都綱一員道紀司都紀一員副都紀一員四屬之設各府同知府李正茂宛平人拔貢順治二年任林天擎奉天人㧞貢順治四年任張錦翼城人舉人順治六年任邉維隆任邱人舉人順治九年任李持江津人順治十年任孟元祥符人恩貢順治十一年任何中舉瀋陽人貢生順治十二年任李雋永年人舉人順治十四年任高培元肅寧人生員順治十六年任徐恭鐵嶺衛人廕生順治十七年任張羽明奉天人舉人順治十八年任陳開虞西安人生員康熙二年任張際龍蕭山人拔貢康熙八年任孫芳奉天人康熙十三年任陳龍巖福建人康熙十八年任于成龍奉天人廕生康熙二十一年任郭恒蒲城人康熙二十六年任高向台翼城人康熙二十八年任趙世顯奉天人康熙二十八年任施世綸鑲黃旗人廕生康熙三十二年任王光謨鑲黄旗人康熙三十五年任劉琰陽穀人康熙四十年任陳鵬年湘潭人進士康熙四十二年任陳如升豐潤人康熙四十五年任劉涵涇陽人康熙四十七年任衛淇高平人康熙五十一年任吳應鳳蒲田人康熙五十七年任郭汝楩正白旗人康熙六十一年任李如蘭陽曲人歲貢雍正五年任郭朝端鑲紅旗人監生雍正十年任王霔正紅旗人監生雍正十二年署任范燦秀水籍吳江人進士雍正十二年任張年景州人歲貢雍正十二年署任汪㑹正休寧人舉人雍正十三年調盧見曾德州人進士雍正十三年任張年雍正十三年任上元縣知縣一員縣丞一員主簿裁典史一員儒學教諭一員復設訓導一員淳化鎮廵檢一員知縣黃應諶大興人内院供事順治二年任王自成烏程人貢生順治三年任張育葵陜州人生員順治四年任郭士賢奉天人貢生順治六年任姜廷槐㑹稽人拔貢順治十年任張鴻基永年人進士順治十三年任王登善黄縣人官監順治十五年任張希聲沙河人舉人順治十七年任白崇周奉天人貢生康熙元年任李乾生閬中人舉人康熙七年任李如鼎安福人舉人康熙十年任唐嗣昌康熙十年任徐培基康熙十年任于述統奉天人貢生康熙十八年任金以謀浙江人貢生康熙二十七年任戴銘康熙二十七年任李元森廣西人舉人康熙三十三年任蔣玥河南人貢生康熙三十四年任徐克昌雲南人舉人康熙三十九年任劉德至河南人貢生康熙四十年任趙聨㨗陜西人貢生康熙四十六年任王遐祚浙江人進士康熙五十一年任曹鋐廣西人舉人康熙五十三年任唐開陶四川人歲貢康熙五十五年任刁承祖祁州人進士雍正三年任唐際運沈邱人舉人雍正五年任袁淑鶴曹縣人貢生雍正七年任穆健行合江人舉人雍正八年任陳濟東臨桂人舉人雍正九年任姚日升仁和人進士雍正十一年任江寧縣知縣一員縣丞一員舊有清軍城捕二丞康熙五年清軍奉裁存城捕今改為糧捕水利縣丞又原設主簿裁典史一員儒學教諭一員復設訓導一員江寧驛驛丞一員原有大勝驛驛丞今裁知縣袁懋齡豐城人舉人順治二年任李呈芬江夏人舉人順治三年任邵擢武城人進士順治四年任吕朝輔正黄旗人貢生順治六年任杜來鳳武鄉人進士順治七年任崔詔之平度人拔貢順治十年任葛攀桂武功人拔貢順治十一年任馮紱來浙江人拔貢順治十三年任陳永吉奉天人官生順治十五年任周永清奉天人廕生康熙四年任愈滋慧新㑹人舉人康熙七年任吳汝亮濵州人舉人康熙九年任呂夢𤦺南海人舉人康熙十一年任崔登華永平人官貢康熙十二年任方殿元番禺人進士康熙十三年任王朝鼒奉天人監生康熙十五年任孫起綸安邱人進士康熙十六年任陳殿邦長樂人舉人康熙十七年任胥錫祚濰縣人監生康熙十八年任崔岳宗鑲黄旗人廕生康熙十九年任佟世燕正藍旗人官生康熙二十一年任蔣毓祥全州人康熙二十五年任葉永清平和人康熙二十七年任徐關寳鑲白旗人康熙二十八年任陳九睦鑲黄旗人例監康熙三十六年任譚有年秀水人康熙四十五年任蘇壎南安人康熙四十九年任臧長源長興人康熙五十四年任黄光夏德化人舉人雍正元年任孔毓珠曲阜人雍正五年任王錫海鹽人舉人雍正六年任吳湘臯㑹昌人舉人雍正八年任王仁錫海寧人雍正九年任唐如栢浙江人舉人雍正十年任郎大成昌平人拔貢雍正十二年署任張嘉論海寧人監生雍正十三年署任句容縣知縣一員縣丞一員主簿裁典史一員儒學教諭一員復設訓導一員龍潭驛驛丞一員舊有龍潭廵檢司與驛丞並設後廵檢奉裁龍潭驛丞兼攝廵檢事乂有税課司大使雲亭驛驛丞今俱裁隂陽學訓術一員醫學訓科一員僧㑹司僧㑹一員道㑹司道㑹一員四屬官惟附郭之縣統攝於府不另設餘縣並置如右後不復詳載知縣傅覲光曹縣