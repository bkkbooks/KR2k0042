body:
  text: 欽定四庫全書江南通志卷八十四食貨志蠲賑二國朝世祖章皇帝平定江南順治二年奉㫖蠲免本年税糧十分之七兵餉十分之四其明末無藝之徵盡永除之三年蘇松巡按趙𢎞文題請奉㫖本内稱長洲等縣額糧太重應否酌減江南官户免役太濫困累小民作何限制俱著詳察舊制確議具奏四年南中大祲設粥賑之八年蘇松等府大水改折秋糧十分之六寧國等府旱災改折秋糧三分之一又賑濟蘇州等處飢民九年江南大旱勅督撫按視災傷江蘇等處改折漕糧免派耗米安慶諸屬蠲免正賦改折漕糧並除耗米安慶操撫李日芃請於鄰省市米平糶每石減價之半十一年靖江海嘯漂毁民舍蠲免本年秋糧三分之一十二年廣徳等處旱災免錢糧十分之一十三年詔蠲地畝人丁本折錢糧拖欠在民者十六年江南大水奉㫖蠲免十五年以前未完錢糧聖祖仁皇帝康熙元年鳳陽泗州等處被災照分數免銀有差二年鳳陽等處災傷分數不等蠲銀有差三年松江上海等處颶潮秋發奏報災傷蠲銀有差四年欽奉恩赦直𨽻各省順治十六七八年舊欠錢糧著照蠲免十五年以前一體除免本年蘇松等府水災蠲銀米停徴有差七年淮安山陽泗州天長等州縣水災免本年額賦十分之一八年欽奉恩詔内開康熙元二三年直𨽻各省丁地正項錢糧實係拖欠在民不能完納者該督撫奏請蠲免九年蘇松淮揚等處大水被災田地漕白米攤徵仍蠲起運改折十分之三十年欽奉恩詔内開康熙四五六年各省丁地正項錢糧實係拖欠在民不能完納者該督撫奏請蠲免是年江南大旱蠲被災田地起運正賦十分之一二三不等漕糧改折外耗贈米俱奉蠲免十一年五月旱蝗欽奉恩㫖念江南水旱頻仍停徵九年分攤米折銀並停徵九年以前未完錢糧附靳輔請分年帶徵疏為鳳廬二屬連嵗罹災民皇仁事不堪命特請分年帶徵少紓困苦以廣江北各屬竊惟去秋旱蝗之災傷無如江北為甚被災之慘又無如鳳廬二府為尤甚也向經前撫臣張朝珍節據各屬申詳當將情形繪疏入告在命赴任案嗣縁臣銜擊慘傷又經臣特請賑恤復荷道經鳳屬目浩蕩皇仁准動正賦銀四萬兩分撥賑濟臣去冬奉道擁㫖踏勘臨靈二縣報荒親見災黎鳩形鵠面扶攜載臣哀訴連年旱澇情狀臣隨加撫慰并飭令地方各官設法捐輸各就本地建厰施賑而流離望風歸來自冬徂春災民藉此活命始得盡力農田今節據鳳廬二府各州縣詳稱竒災之後小民謀生國無計其本年輸將紛紛申詳分年帶徵暫寛民力賦萬難一例上諭諭前來臣伏讀連年水旱相仍災傷甚重與别省不户部江南省同若將舊欠錢糧一併追徵民生愈致困苦朕心不忍其該省以前未完錢糧察實係拖欠在民者㫖爾部著暫行停徴俟民力稍蘇之時再行具奏請即遵諭行特諭欽此仰見皇上如天之仁從前積欠既䝉軫恤停徵容臣查明另徒題外今鳳廬二屬極災極困其本年額徵賦税令敲吸實難完納臣極知事關錢糧度支維艱豈敢輕議但稔知民艱又安敢隠黙不為皇上請仰祈部俯將二屬上年被災各州縣衛所内除稍上睿鑒勅堪輸納之州縣不敢一槩請緩外其餘如鳳屬壽泗鳳臨懐五定虹霍天靈十一州縣廬屬六合舒廬四州縣并鳳陽府左右中前後懐長壽泗洪廬六十三衛所本年賦税今嵗酌徵五分儘其支給本地兵餉以及河漕驛站等項倘支解不敷仍於别府州屬撥足補苴其餘五分酌於康熙十二十國三兩年帶徵一通融間在攸賴矣課并無虧缺而災民實有麻勒吉報明江寧流移飢民疏為報明江寧省城流移饑民甚衆仰體皇洪仁勸輸賑粥以恤災黎事竊惟江南地方災荒荷蒙上屢次蠲賑饑黎得以保全淮揚各屬見蒙俞允捐輸事例其捐到銀兩陸續發賑鳳陽各屬先䝉查皇恩大賑安慶府屬先經題准倉穀發賑廬州府屬有存貯捐納米石撫臣勒輔見㑹疏而題請惟江寧省城兩年災傷雖未合蠲免之例收穫實寡人稠米貴多不聊生既無存貯欵項又不敢以淮揚捐輸之銀分濟于不成災地方臣目擊饑民情形隨與司道府官酌議設厰賑粥勉力捐輸并勸紳士商民共襄善事分設三厰自十二月初旬煮粥開賑凡捐到銀米登記印簿臣與司道府官不時到厰騐視每厰饑民日有二三萬人每日用米二三百石不等約至四月中旬始可停止凡尚義捐助者臣多方奬勉自可源源接賑至如府屬六合等縣滁屬來安鎮屬丹陽寧屬宣城太平見在設厰賑粥池州廣徳俱報煮粥給賑臣均行奨勉發示勸諭捐輸至鳳屬鳳臨天定四縣被災尤甚雖當大賑之後臣仍與府道官多方捐措煑粥期皇上軫使災黎咸獲存濟伏念恤民瘼睿懐殷切為臣子者推廣當然本不敢煩瀆洪仁隨宜設賑自是職分宸聰但官紳士民尚義樂施其捐助數少者臣自酌行奬勵倘有捐輸及額者若不獲邀恩典則無以示鼓勸容臣賑畢之日查明題明伏乞題叙合先皇上睿鑒施行王𢎞祚江南賑饑記粤稽三代而上有荒嵗而無荒民堯湯水旱民鮮孑遺之嗟其時主聖臣良視民猶子補救備至故天不能為之災繼至周禮荒政十二補救極其詳盡然行之後世者惟散利薄征最切夫散利即今之賑薄征即今之蠲二者皆善政也若通行於皇上御官民間以推廣徳義莫亟於賑之一法也我災傷極以來如天好生加惠元元每聞四方水旱倍厪宵旰庚戌嵗淮揚大祲流莩載道時督撫諸公繪圖以奏皇上惻然軫念遣大臣㑹賑辛亥大旱復遣大臣截漕開詔發帑金廩粟賑嗣鳳屬旱蝗特甚又加賑焉匪惟蠲租緩征而已且聖允督撫麻公之請此災黎者亦既周且渥矣獨是江寧主賢臣所以克全省㑹之地五方錯處米價湧貴加以逺近饑民趨省丐食絡繹不絶遂至價益倍增㑹城貧窶皆成載道饑夫時事之可憂寧僅人滿已耶幸際麻公駐鎮兩江其善政及人更僕莫數大要以朝廷愛民之心為心遘兹啼饑慘目請蠲既格乞賑嫌數瀆毅然倡議賑粥有以費大難繼之説進者矣公弗顧惄如調飢之在躬而不能一刻緩也採輿論稱善士者敦禮之授以方畧俾董賑事一切薪米之資先為措給懸示勸諭仁言諄懇維一時諸公憂患同心分猷襄事或罄捐積俸或易質裘馬或多方勸諭竭蹶急公勇義若渴爰訂十二月朔設一粥厰於城南之報恩寺設一粥厰於城内之神廟始就食者各以數千計日漸至二三萬因亟移城内一厰於城東之觀音閣增一厰於城北之静海寺三厰日計口數萬人日需米數百石登計簿籍章章可覩第江南邇年水旱頻仍人多匱乏家鮮蓋藏自贍不給責捐輸於窮盡之日蓋難言矣乃今紳士商民無論見義者樂輸恐後馴至越界越疆聞風而效壺漿之惠且競推而為泛舟之役也昔韓魏公為廣惠倉應受米者三日一給人一升幼者半之陳文惠公知壽州遭嵗大饑公自為粥以食餓者吏民以公故皆争出粟以活數萬人富鄭公移青州河朔大水民流江東勸民出粟得十五萬斛益以官廩凡活五十萬人此皆善行其賑者也麻公匹休古人受糜盈器困人為善時於臨政之暇減從輕騎偕司府營協周視三厰稽執事之勤惰視治粥之精粗覩稠人之授受事益飭而民益親慈悲佛號所由作也藉微實有人饑已饑之至情幾何不秦越視之虚文應之汎汎焉付之胥吏之手以滋弊哉余過從觀賑糜汁濃膩散給應時男女别於途出入循其序董賑者奉命而各殫其勞就食者飽徳而各遵其令聚數萬饑民於一所卒無擁擠顛蹶之虞聚數十萬饑民於一城并無穿窬盜賊之患儼若有韓富紀律部署其間化鳩鵠而成含哺鼓腹之氓荒政可弭盜賊不已隂寓於賑饑之内耶所謂有荒嵗無荒民於今親見之依稀三代而上之風也事竣諸善士以公施賑四月有竒日全活數百萬生靈功徳稀有而慕義向風者亦為近今罕見不可以無紀乃請余記以垂不朽余旅人也䝉恩予告金陵調攝夙疾敬謝不文而躬逢其㑹聿觀厥成誼不獲辭勉為之記得以覽焉而有感也若夫亟公助賑協力經營則織造曹公藩司徐公慕公臬司陳公糧道王公驛道王公學道簡公郡守張公城守張公郡佐魏公馮公楊公何公胡公暨上江二令也捐輸為士民首倡則鄉紳佟鄧胡蔡徐葉黄張諸公分厰董賑不憚勞悴者報恩則沈黄劉龎諸朱安楊觀音閣則黄龔錢髙静海則卞姜萬羅也例得備書是年江寧各屬秋災蠲銀有差安徽各屬發粟按籍分賑十二年揚州各屬大水凡全淹田地正賦漕糧漕項槩行蠲免又奉㫖水淹田地但有涸者效墾荒例三年後起徵以後凡涸出田地亦准三年起徵四月十二日諭户部江南蘇松常鎮淮揚六府連年災荒民生困苦與别處不同朕心時切軫念除今年錢糧已經派撥兵餉其六府康熙十三年地丁正項錢糧特行蠲免一半以昭朕存恤災黎至意爾部即將應蠲免數目察明確議具奏特諭十三年鳳陽泗洲揚州高郵泰州寶應滁州等處被災蠲免地丁銀兩漕米鳳米月糧米等有差興化等縣積水淹田正賦漕糧俱免十四年鳳陽泗州揚州高郵泰州寶應等處被災蠲銀有差興化縣正賦漕糧俱免十五年揚州高郵等處水災蠲免銀兩有差興化全免十六年蠲免同前十七年江南各屬水災蠲停地丁漕項銀兩有差滁州全椒等處旱蝗奉㫖蠲免正賦十分之三又蘇常等處俱動支正項錢糧買米賑濟十八年正月發帑令江蘇撫臣等親行督賑是年三月至八月不雨奉㫖江南財賦繁多舊欠無徵錢糧如再行徵比恐累小民其十年十一年十二年錢糧俱著蠲免其十三十四十五十六年錢糧俱自十九年起分年帶徵以舒民力著該撫通行曉諭務令均沾實惠以副朕愛養斯民至意該部知道又奉㫖九分十分荒者免本年税銀十分之四七分荒者免十分之三五六分荒者免十分之二高郵等處水災蠲停正賦銀兩又奉㫖各屬災田漕米緩至來年帶徵于緩徵米内半徵漕米半徵漕麥不拘米色紅白粳秈並納又奉㫖鳳陽地方水旱准動鳳倉米二萬石并積穀二千石賑濟又借正帑銀三萬兩接賑又鳳廬滁三屬照被災分數蠲銀有差漕糧改折外耗贈米俱奉蠲免附徐國相題請改折疏去秋亢旱臣屬地方在在罹災而罹災特重者又以皇上洪鳳滁二屬為最荷䝉動倉糧正項命臣多方賑恤慈允蠲正賦復准借災黎始得茍延殘喘盡力農田然災傷之後十室九空必得今嵗秋成豐稔庶幾積困稍甦乃自季夏以來又復兩月不雨阡畝如焚兼之蝗蝻肆害野無遺草民不堪命其鳳廬安滁和等府州縣衛被災慘苦情形業經臣繪疏入告見在勘取分數冊結另題請蠲外今據安徽布政司布政使龔佳育㑹同江安督糧道副使章欽文詳請改折縁由到臣據此該臣看得漕糧額供天庾以充官俸軍糈雖遇災不准蠲免而改折向有定例蓋稻穀出於田畝必須西成豐稔始得有米完漕也臣屬地方素稱荒瘠不意上年罹災之後今嵗鳳廬安滁和等處亢暘不雨禾苗盡枯兼以蝗蝻雲集西成絶望據各州縣衛申報災傷情形業已具疏入告而各屬士民又以糧米産於田畝今遍地罹災糟米採買無出紛紛赴臣衙門匍匐呼號不一而足并據府州縣官申詳民間日食不週漕米委係無從辦納情詞甚為迫切臣經批行藩司㑹同糧道確查今據該司道㑹同酌議請循照康熙十年之例將漕糧正米改折徵銀蠲豁耗贈并鳳倉存留米石以麥粟代解通融支給前來臣查上年被災鳯盧安三屬漕糧經臣石題請改折部覆以江浙二省己折五十四萬餘恐京城天不敷支用未經准行臣念一面嚴督道府有司設庾重務不敢再為凟請隨法催辦曉諭民間措銀赴外郡採買交兑并經處題明寛限兩箇月始得陸續買兑完竣其間措之苦搬運之艱小民已力竭髓枯然一年偶遇之災尚可勉力拮据今嵗災後逢災不特本處田禾枯槁無收鄰郡亦同被旱荒米價日昂商賈不至採買無從其慘苦情形比之上年更甚見今災民嗷嗷餬口莫措若將漕糧仍徵本色即使日事敲追此輩計窮力竭徒然迫之逃亡終於國儲無益遡查漕糧遇災改折厯有成例於康熙九年蘇松嘉湖水災前任江寧撫臣馬祐浙江撫臣題范承謨漕糧而臣屬康熙十年鳳廬安三府早荒准改折亦經前撫臣靳輔鳳題准漕糧改折徵銀倉糧以麥粟代解况今嵗廬安滁和各府州當上年災祲之後較比康熙九年之蘇松嘉湖十年之鳳廬安初被一年荒災者其慘苦實相倍蓰若慮改折京倉不敷查上年河臣靳輔年題留漕糧二十萬石以濟河工夫食仍於十八改折米内照數補徵本色是今年兑運之米較上年額數又增二十萬石矣既增二十萬而止減七萬似無不敷之處即此請折之七萬餘石來年秋成豐稔亦可于十九年改折數内補徵遞年通融原不虧起運京倉慈俯之額臣身任地方目擊民艱不得不仰懇漕米實鑒安鳳廬等屬連嵗罹災民不堪命本色實無出將鳳屬壽宿潁亳懐定五虹䝉霍旴天靈潁上太和十五州縣廬屬六合舒廬巢英霍七州縣安屬懷桐潛太宿望六縣康熙十九年起運十八年分漕糧准照康熙十年之例正米盡數改折其給軍耗贈濕潤等米并贈銀槩予豁免内有英山一縣漕米向係全書額編銀兩買兑竟將原銀起解隨漕行月一併改折至鳳屬之泗鳳臨三州縣并滁全來和含五州縣原無漕米所有額解倉糧漕項并有漕各州縣倉糧俱請以麥粟代解則一轉移間不惟正供并無虧損而災黎得免逺方購賈盤剝之費且小民少辦此數萬之漕糈在米價不致湧貴即可寛餘力以購買日食其於地方民生利賴非淺矣再照折漕價值見今部定粳米每石九錢粟米每石七錢據司道㑹議咸稱因災改折原以恤民議價必須少抑庶有益於民詳請酌損但值需餉之際臣不敢議減應仍照見今折漕之價折徵者也十九年淮揚蘇松常鎮等處大水奉㫖蠲免被災田畝錢糧十分之三緩徵本年被災田漕米于二十年分帶徵附慕天顔請賑疏為恭請酌賑極災饑民以洪仁廣據江蘇布政司布政使丁思孔呈詳前事等情事到臣據此該臣看得救災設賑原屬不得已之請我皇上視民如傷惟恐一夫不獲凡有上聞必䝉俞允全活之衆既頌此殘黎謂既賑之後可幸享有豐仁恩浩蕩而臣等撫九重年上慰慶四野含哺乃不意江南連年水旱民愈宵旰下窮而災愈甚是皆臣等撫綏無術莫能召感休祥以致小民困阨所以每一請蠲每一請賑惟有跼天恩之蹐悚惶竊慮益深耳如今年春賑饑動帑數十萬難再臣罪之雖現在開例收補而尚未捐足夏秋水淹地方又多饑黎絶食倘可設法全濟曷敢上厪宸衷惟是臣細加察訪現在被災各屬人民實有嚴冬無完衣蔽體者亦有累日而炊烟常斷者又有廬壊而乞食飄零者疫殁而父子待斃者蓋因旱荒之後繼以洪水積苦至今謀生無路官役催呼在門老幼哀號在室江南江北處處有之臣於此時又能食下咽臥貼蓆乎念國用之殷繁不弟不能生節更且屢祈蠲賑臣心何忍故自入冬以來臣查極災極苦之處多方捐措稍稍賑恤使之茍延不致凍餓絶命若至來春麥熟尚遥饑饉愈迫不得不再籲恩沛澤但就大江以南而論蘇常鎮等屬向係繁華之區今城市外貌尚自可觀而窮郷村僻之民饑寒交切實堪悲閔前憲臣勘報之災皆係水沉顆粒無收田地餘即一望有稻者迨刈穫多成空粃此等情形臣已備陳於前疏但江南人民衆多一邑之男婦幾有數十萬食口既繁收米實少辦漕且萬分艱難安能計及温飽然問民之疾苦而周恤之臣職分當然臣與司道有司日夕商確聞水郷貧農拾取魚蝦尚可博換升合以自存又開春興濬白茆孟河亦可招徠赴工以食力其真正無告之惸獨孤寡則臣等竭力鼓勸以期全活不敢槩請國帑矣惟大江以北地方十餘年昏墊方起之瘡痍復遭今嵗沉淹未有若高郵一州城郷俱浸之最慘及興鹽二邑邵伯一郷之盡災者此憲臣親勘時以重災入告今高郵舉足皆災地滿目皆饑民必須廣行施賑庶得生全而興化鹽城全淹待賑更切又寶應泰州江都三屬雖不比高興鹽之全災而窮慼亦甚皆為憲臣所目擊臣時時體訪確情行據藩司具詳前來查高郵興化鹽城寳應泰州五州縣及江都之邵伯郷饑民遍地旦夕莫保臣當分委廉能官員於康熙二十年正月初十日開賑起至麥熟止或按口大小分别散給銀米或設厰附近煮粥令其赴食務期因時制宜隨地就便不令失所但此賑項名口數目尚難定而措捐萬無應濟伏望皇上准臣先動正項核實賑畢報銷統候捐輸例銀還項活此數十萬命皆為朝廷耕鑿之赤子所全實多况江北人民不比江南之多請賑此六邑饑民約計其數不過如江南二大恩允縣之衆動帑亦屬有限諒䝉虚冐分毫也臣謹㑹臣刻刻以節用為心自不敢題同督臣阿席熙河漕臣勒輔合詞具伏乞睿鑒勑部議覆施行二十年揚州等處水災蠲停正賦銀兩附慕天顔設厰賑饑疏為饑民望賑甚迫亟請洪恩開濟事竊念臣屬地方今嵗夏秋赤旱遍地禾苗枯萎兼以蝗蝻踵至在在失收真屬從來未有之竒荒報災共有四十州縣其餘雖有未報災傷及勘不成災者僅十餘處而亦皆薄收俱非豐稔臣業將被災情形及委官勘實災田分數先後㑹疏入告荷䝉皇上特遣部員來南察勘民情既已錢糧分别蠲折指日上達災黎可望更生見候部議將浩蕩均沾目今災地窮民饑苦己極望賑迫切實有刻惟是難緩待者農夫終嵗勤動惟冀秋成得以資食乃今秋困於胼胝疲勞萬狀當初旱之時無不仰望雨澤之繼至男婦老稚悉力桔槹尤賴麥熟所收以餬其口迨旱既太甚溝港斷塞農本已罄枵腹徒嗟而業主又復稍給饘粥再為挖渠引流多方車救孰意滴雨不施泉源亦竭力田之農民固已束手骨立而有田之業户亦皆室懸罍空矣共顧焦禾惟相飲泣是以交冬以來乏食者更苦寒威將樹皮石屑充膓豈能久活臣聞見所及處處同然早夜圖維亟思賑救臣先酌議告糴於江楚滿望買米一到即為貧民療饑不謂楚地亦遇災傷無從購買接閲楚撫臣咨覆臣幾荒迷痛哭莫知適從差往江西採辦官員亦據囘稱價貴艱得尚未運到見今本地米值日昂且無多買之處如上年江南被旱今春􅥐饑四方尚有客販而至臣於彼時鼓勵官紳士庶共相捐濟屆正月初旬設厰皇上俯賑粥旋䝉請動帑買米給散普救災黎又得河臣允督臣㑹之留漕鹽臣之勸商狼鎮臣之分力協捐民遂得以有生不至流離今則災後重災委實田中顆粒欽差無穫外來商賈杳然故至窮簷絶粒最早兹活不部員厯勘以下江之民比上江之民稍可存在即賑之内但臣屬江蘇等府州縣與上江鳳廬地方迥不相侔蓋鳳廬地廣人稀即稔熟之年原覺村墟蕭索一遇災而荒凉更甚若江蘇常鎮等屬寸地片壤皆係賦重之産村落相聯人民稠密雖貧家室空如洗而外觀仍似蕃庶臣從今春親賑之後曾遍厯郊野目擊疾苦情形今日如此真饑不即拯救竊恐老弱空填溝壑壯健疾貧思逞不僅棄土逃亡也臣受撫綏重任敢不鰓鰓過慮皇上飢乎惟我特允督臣㑹溺斯民題展開事例廣行分賑正遺黎再生之日然而賑濟之法宜籌至當若欲每人給米來春饑民愈多領者如蟻拒之不能一經挨户稽查反滋冐濫而外方乞食之人不與焉况人支斗粟不數日而食盡仍復餓傷更難為繼且領米於城或分給於市鎮逺近不等匍匐為艱莫若就災地近區多設粥厰在道路適均之處煮粥散食使饑民逺不過十里便其扶老攜幼則稍可自全者決不䝉恥食粥而溷濫之弊一清所賑之民甚溥至公至廣而又節省者也再查臣屬幅􅊷遼闊如淮徐去臣所駐蘇城最逺河漕臣靳輔以勘工時常往來熟悉其人民困苦真情臣現在咨商河臣就近區畫分任賑濟仍請皇上勑下該督速行酌議勘賑外如江寧一屬應聴督臣查賑揚州一屬仍藉鹽臣分濟惟蘇常鎮所屬長洲吳縣常熟武進無錫江隂宜興丹徒丹陽金壇臣已先為勸捐米石發往各邑飭令在城郷各設厰五六處公舉好義紳士誠實耆民董理其事於臘月十五日為始煮粥開賑而江屬之六合句容二邑揚屬之江都為該屬諸邑中被災尤甚者臣亦先買米酌發咨㑹督鹽二臣矣以上應賑各屬煮粥所需柴米雖臣與司府等官極力設法但有司無力可捐紳民值災難助現措之米不過供賑數日將來饑民衆多務須源源接濟賑至麥熟始行停止仰懇皇上准將見展捐輸事例銀兩動支買米報銷則江南數百萬饑黎得慶復生不致輕去其郷委填溝壑而來嵗田畝耕耨有人仍復可收樂利矣除買米設厰賑過災民數目容俟造冊送部查核外臣謹㑹皇上睿同總督臣阿席熙合詞縷晰披陳仰請鑒勑部速賜議覆施行蘇松常等府地方坍缺版荒田地賠糧累民奉㫖將版荒田地一應本折錢糧盡行豁免于康熙七年為始先是巡撫韓世琦勅書内開抛荒田地不許人户包賠於是蘇松九州縣開報奉㫖永行蠲免附慕天顔請豁蘇松版荒疏為坍荒賠累無追亟請皇殊恩豁免甦民困以召天和事臣惟地震之變上躬行修省勑將應行應革事宜條奏臣思最重者首在恤民而恤民之最苦最急者莫若豁免江南坍荒田地錢糧一事臣查蘇松常坍荒田地向來屢經勘駁實有三千餘頃合算其本折錢糧亦不滿十萬而因此遺累反致欠多民情之隠苦實實不可勝言蓋坍者久成白水無土可問荒者磽瘠不毛無法可耕公占則係地入公家民已失業此種情形前撫臣及臣任藩司時入覲條奏厯厯繪陳久䝉皇上洞鑒止因兵興以來軍務倥傯前撫臣無暇親勘故議暫停俟事平之日議覆因循至今臣撫任三載宸嚴正值軍需告急方在生節之時何敢再凟無以自是以日切焦思而對此包賠之窮民赧顔解臣故於自陳不職疏内首列此端為臣罪也然思我皇上愛民惟恐一夫不獲恭逢下詔求言之日臣再不言臣罪益深矣又念此坍荒錢糧如果可徵賠臣又何敢即言奈何有糧無田有户無人厯年地丁條折原無完納委係紙上虚數不豁亦無完豁之可免累耳惟漕糧一項徒累里甲里甲因此包賠逃亡株連不知凡幾官役因此漕欠那移墊買每致難清完猶不完也三吳賦重額繁保無頑梗拖欠然每嵗考成計民間零星尾欠積累而有數萬或災患不時民力困竭逋逃者又數萬總以四百餘萬之額徵而論亦不可謂之頑矣此有田有户之欠數仍可於年限續完惟坍荒所欠萬萬無從責賠臣前於備陳舊欠無徵等事一疏題䝉特恩蠲停者即此坍荒在内也今查前勘坍荒數内如長州縣田地新經丈清陞補無缺不議外其太倉常熟崑山嘉定華亭婁縣上海青浦宜興九州縣確有坍荒未豁臣請皇上大沛恩綸特准開豁容臣再加覆勘細數造冊報部從康熙十七年起扣免於民毋容纎毫揑冐此係國永逺甦困培我非比一時之蠲停將見渙汗一頒家萬年之樂利民之鼓舞雷動於三吳豈不可坐致休祥也哉伏乞皇上鑒允施行是年十二月奉恩詔兵革寢息人民乂安免康熙十三四五六七年地丁民欠錢糧二十一年揚州高泰等處水災蠲停正賦銀四萬有竒興化積水淹田正賦漕糧全免其揚州歸併高郵等衛屯田錢糧自康熙十八年為始各伍屯田被旱災除漕項外蠲免四分二十三年九月恩詔江南浙江江西湖廣省分自用兵以來供應繁苦宜加恩恤康熙二十四年所運漕糧著免三分之一又自康熙十三年起至二十二年拖欠漕項錢糧著自二十三年起每年帶徵一年以免小民一時並徵之累二十四年三月以邳州二十三年水災蠲免地丁銀二千四百餘兩四月蠲免沐陽縣地丁銀三百六十餘兩六月巡撫湯斌奉二十年恩詔題免蘇松等七府州屬地丁及併衛帶徵項下十三年至十七年未完銀七十六萬八千六百一十四兩有竒米二萬六千四百一石有竒九月以邳州本年水災蠲免地丁銀三千四百七十一兩八錢有竒又沛縣秋災蠲免地丁銀十分之三十一月初四日諭户部恩㫖恭紀首卷江南宿遷興化邳州高郵鹽城等處水災蠲免康熙二十四年下半年二十五年上半年地丁各項錢糧二十五年閏四月二十二日諭大學士恩㫖恭紀首卷鳳陽徐州等處亢旱發鳳陽倉銀米賑濟又沛縣本年秋災蠲免地丁銀兩仍賑濟饑民二十六年十一月二十六日諭户部恩㫖恭紀首卷江蘇所屬各郡縣二十七年應徵地丁各項錢糧俱奉蠲免二十六年未完錢糧亦悉奉豁除又泰州興化本年水災蠲免地丁銀四千六十五兩有竒米七百八十二石有奇二十七年三月奉㫖將十七年以前未完漕項銀米麥俱著蠲免五月蠲免寶應縣涸出田地二十六年未完錢糧及本年地丁錢糧八月蠲免山陽縣二十五年缺丁銀兩十月奉恩㫖安徽所屬各郡縣二十八年應徵地丁各項錢糧俱著蠲免二十八年正月奉㫖江南除正項錢糧己與直𨽻各省節次蠲免外再將全省積年民欠一應地丁錢糧屯糧蘆課米麥豆雜税槩與豁除七月二十二日諭户部恩㫖恭紀首卷蠲免邳州被水田畝應納地丁漕項厯年逋欠盡奉豁除二十九年蠲免江都縣本年秋災銀一千三百七十五兩有奇米一百八石有奇又歸併高郵衛銀七十五兩有奇三十年九月蠲免興化縣本年秋災銀三千八百一兩有奇十二月初四日諭户部恩㫖恭紀首卷各省嵗運漕米向來未經議免除河南省明嵗漕糧已頒諭免徵外湖廣江西浙江江蘇安徽山東應輸漕米著自康熙三十一年始以次各蠲免一年又賑濟宿遷睢寧二縣飢民三十一年以興化本年秋災蠲免地丁銀四千六十七兩有奇又賑濟鹽城縣饑民三十二年二月以沐陽縣上年秋災蠲免地丁銀四千九百七十四兩有奇九月十六日諭内閣恩㫖恭紀首卷江蘇安徽等處夏旱免本年漕糧三分之一俟至應蠲年分補還十一月以沐陽安東高郵寳應四州縣本年秋災蠲免地丁銀一萬七千四百八十三兩有奇米八百三十八石一斗有奇十二月以興化縣本年秋災蠲免地丁銀二千九十四兩有奇又版荒田地銀一千一百九十九兩有竒三十三年蠲免山陽縣捐田地丁銀三十二両六錢有奇米麥豆四十九石有奇先是總河靳輔奏山陽縣訓導移駐清江浦仍於山陽縣捐田二十頃為修葺碑亭學宮河神廟之用請將所捐之田免其賦役至是巡撫宋犖復請豁除又蠲免江都縣本年被災地丁銀兩三十四年蠲免高郵興化寶應三州縣上年被災錢糧又賑濟長洲吳江常熟崑山青浦等縣飢民三十五年賑濟淮揚徐所屬二十州縣飢民三十六年正月二十二日諭大學士恩㫖恭紀首卷揚淮徐等處被災錢糧盡行蠲免六月蠲免江都縣牧馬草塲三十三年以前銀米十二月以鹽城山陽高郵泰州興化寶應六州縣本年被水蠲免地丁銀八萬六千五百四十七兩有奇米麥六萬九千九百八十七石五斗又賑濟淮揚徐所屬二十州縣及淮安大河徐州三衛飢民三十七年六月以海州大河衛水災蠲免地丁銀三千三百二十六兩有奇又鹽城縣水災蠲免地丁銀六千八百一十三兩有奇十一月二十五日諭户部恩㫖恭紀首卷海州山陽安東鹽城高郵泰州江都興化寶應壽州泗州亳州鳳陽臨淮懐逺五河虹縣䝉城盱眙靈璧等州縣并各衛所康熙三十八年一切地丁銀米等項及漕糧盡奉蠲免又高郵泰州江都興化寶應五州縣蠲免本年被災地丁銀十一萬九千九百一十兩有奇米麥七萬四百九十四石有奇又賑濟鹽城等九州縣飢民三十八年三月初七日諭户部恩㫖恭紀首卷著將漕糧截留十萬石於高郵寶應興化泰州鹽城山陽江都受災七州縣各留一萬石悉較時價減值發糶餘米三萬石著於邳州留八千石宿遷桃源清河安東四縣各留五千五百石亦較時價減糶三月十三日諭户部恩㫖恭紀首卷江蘇安徽所屬舊欠帶徵錢糧除康熙三十三年恩詔内己經赦免外其三十四五六年一應地丁米麥豆雜税俱著豁免三月二十二日諭户部恩㫖恭紀首卷淮安府屬海州山陽安東鹽城揚州府屬高郵泰州江都興化寶應九州縣並淮安大河二衛康熙三十七年未完地丁漕項等銀一十九萬有奇米麥一十一萬石有奇全奉蠲免四月十六日諭户部恩㫖恭紀首卷以鳳陽府屬去嵗水災蠲免康熙三十七年該府屬壽州等十一州縣并泗州一衛未完地丁漕項銀米九月蠲免高郵州牧馬草塲銀九十餘兩又高郵泰州江都興化四州縣本年被災復蠲免雜辦銀七百一十餘兩十一月初五日諭户部恩㫖恭紀首卷海州山陽安東鹽城大河衛高郵泰州江都興化寶應被災各州縣衛康熙三十九年地丁銀米等項及漕糧漕項銀兩盡奉蠲免又賑濟淮揚所屬饑民又蠲免潁州被災田畝銀四百九十七兩有奇四十年奉㫖將江蘇巡撫所屬州縣等處除漕項外康熙四十一年地丁錢糧盡行蠲免四十一年奉㫖安徽巡撫所屬府州縣衛等處康熙四十二年分地丁錢糧除漕項外通行蠲免四十二年四月奉㫖徐州睢寧縣三十七八九三年未完地丁倉項銀二萬四百二十二兩零及邳州四十年未完錢糧俱著免徵八月奉㫖賑濟邳州等處又令應免錢糧另議具奏四十三年四月蠲免江安二屬黄快缺丁銀六千四百四十餘兩七月蠲免淮揚二屬輕齎等銀一萬八千二百六十餘兩贈米六千一百九十餘石四十四年蠲停鳳陽府屬