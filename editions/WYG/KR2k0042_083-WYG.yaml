石又動積穀賑濟飢民六月奉㫖恩蠲江蘇各屬康熙十一年至五十年未完地丁等銀七百二十九萬六千二百九十兩零米豆四十三萬七千二百二十石零又蘆課等銀一十九萬二千七百三十三兩零十二月賑濟江蘇常鎮淮揚六府屬二十四州縣被水飢民二年二月蠲免靖江丹陽上年被災地丁銀一萬九千三百六十餘兩米六百二十餘石六月特恩蠲免江南全省康熙四十六年至五十年舊欠地丁銀六十三萬三百餘兩米麥二十六萬八千六百七十餘石十二月蠲免蘇松常鎮淮揚所屬十五州縣本年被災地丁銀七萬三千八百五十餘兩米豆六千五百四十餘石仍賑濟饑民緩征漕米又江南沿海地方海潮泛溢民被災發倉賑濟又通泰淮三分司所屬海潮淹漫奉㫖發庫銀三萬兩委員分賑蠲未完折價銀四萬餘兩三年三月十九日奉㫖准將蘇州府正額銀蠲免三十萬兩松江府正額銀蠲免十五萬兩著為定例上諭恭紀首卷怡親王疏蘇松田税宋時每畝輸賦一斗元時水田不過五升明太祖因蘇民為張士誠固守不降盡籍諸豪族及富民田以為官田按私租簿為税額每畆四五斗七八斗至一石以上蘇州一府秋糧至二百七十四萬六千餘石時民田仍照元時之額嵗輸僅十五萬石餘皆徵之官田松江官田畧少秋糧亦至一百三十餘萬石計蘇州田地山蕩灘漊等共九萬九千九百餘頃松江四萬八百餘頃以宋時均税一斗合算蘇松正額祇應一百四十萬餘石乃加増二百六十四萬餘石幾二倍於原額矣至宣徳時以蘇松官田租額太重遞減二三分蘇松二府減七十餘萬石巡撫周忱定均耗之法以官田税額攤派民田每畝税額少者一斗九升多者至三斗六七升不等其後以二府額糧太多地産米石不敷始於平米内改徵條折此地丁等項折銀所由始也嘉靖時增江浙税賦百二十萬蘇松又在加增之内嗣後東南被倭又有額外提編之加萬厯時又每畝加増九釐後於九釐外再加三釐自宣徳遞減之後嘉靖萬厯時後遞增浮額三十餘萬於是二朝府之民終明之世困於重賦我賦税凡嘉靖以後平定海内悉除前明苛政各省洪恩加增者槩行蠲免蘇松二府明代屢增之額因未浩蕩萬民樂業惟經詳悉奏請至今仍舊伏查蘇州府條折兵餉徭里人丁匠班隨漕經費等項嵗徵銀一百六十二萬六千九百兩零松江府八十三萬三千五百三十兩零蘇州府正耗漕白等項嵗徵米九十七萬五千二百三十石零松江府四十一萬八千五百八十石零其嵗徵額米厯年以來民間輸納完者天居多且兵食攸關無庸請減惟額徵地丁銀項每庾正供至次年奏銷之期蘇州一府民欠必至三十餘萬兩松江一府十五六萬兩積累數年動至三四百聖朝萬幸遇時施曠典蠲免宿逋至數百萬而數年之内糧户日受追比之苦地方官亦因承追而罷去者多矣此雖有額皇上心徵之名而無徵收之實也我江西南昌府屬明初周蔀屋洞照萬里雍正二年恩㫖酌加增浮糧已䝉浮糧事同一體但從來加浮之額減寛免今蘇松皇上欽為數太多或應酌減幾分仰候定五月以丹徒縣濱江坍田奉㫖蠲免額徵銀一千六百二十餘兩米麥一千九百七十餘石自康熙五十一年為始十二月以太平泗州盱眙三州縣本年秋災蠲免地丁銀三千一百餘兩米麥豆一百二十餘石仍賑濟飢民緩徵舊欠又以蘇松常鎮揚太通七府州被災蠲免二年蘆課銀五千二百一十餘兩又賑濟山陽清河寳應興化宿遷睢寧六縣被水飢民四年奉㫖著動支庫銀賑給泗州被災民户八月又蠲免泗州田畝銀四百四十餘兩九月蠲免望江無為銅陵黟縣宣城蕪湖繁昌貴池等被災州縣銀米有差十二月以南陵等縣本年被災蠲免地丁銀四千八百五十餘兩米豆三百二十餘石又以宣城縣本年被災蠲免地丁銀八千二百三十餘兩米豆六百八十餘石又賑濟江蘇松常鎮淮揚太邳徐所屬三十九州縣被災飢民又宣城等十州縣將社倉常平倉省倉捐還漕米并安慶截留漕米内動用設厰煑賑所有應徵新舊錢糧暫停徵催五年八月以福泉陽湖二縣上年被災蠲免地丁銀一萬一百四十餘兩米二百七十餘石又上元丹徒二縣秋災蠲免四年蘆課銀五百五十餘兩九月十二日上諭恭紀首卷著江南總督動用庫銀二萬兩於上下兩江被水之處散賑六年以江都泰興二縣被災蠲免五年分蘆課銀二千二百餘兩六月蠲免東流無為臨淮懐逺四州縣水災田畝銀四千七百八十餘兩米豆七十餘石九月以懐寧桐城等十四州縣并鳳陽衛上年秋災蠲免地丁銀一萬二千七百餘兩米麥豆一千一百三十餘石七年閏七月以靖江縣上年被災蠲免地丁銀九千八百八十餘兩米三千一百七十餘石八月奉㫖安徽等屬著免雍正八年地丁銀四十萬兩八年六月奉㫖蠲免通州税課局缺額商税自康熙三十五年至雍正三年共銀一萬七千六百五十餘兩七月奉㫖上江宣涇等十七州縣又貴池建平繁昌三縣水災著動支帑銀賑濟其有應免錢糧盡奉蠲免又邳州宿遷桃源等處大水動支藩庫銀兩賑濟本年錢糧悉行蠲免有已經完納者准作明年額徵之數八月初九日上諭恭紀首卷江南被水州縣漕糧按成災分數蠲免十月以壽州合肥縣及廬州衛上年被災蠲免地丁銀一萬一千八百六十八兩五錢有奇麥六十八石二斗有竒十二月奉㫖著直𨽻江南等省督撫動支常平倉米穀核實賑給外來就食之災民并動存公銀兩賞為路費資送囘籍又賑濟淮揚海邳徐所屬十八州縣飢民九年三月以建平縣上年被災蠲免地丁銀六百一十二兩四錢有奇米豆二十六石九斗有奇四月蠲免山陽清河等八州縣并徐州衛挖廢田地自康熙五十一年至雍正五年地丁銀米又蠲免大河衛桃源縣司挖廢田并栽栁廢田銀兩六月以宣城旌徳銅陵懐逺四縣上年被災蠲免地丁銀九千九百五十餘兩米豆一千一百七十餘石八月蠲免宣城旌徳銅陵懐逺漕糧五千九百餘石又免寧國無為壽州鳳陽臨淮等十州縣并鳳陽長淮二衛銀一萬九千五百九十餘兩米麥豆八千七百五十餘石十年三月奉恩㫖以官侵吏蝕包攬錢糧分為十年帶徵實在民欠更緩作二十年帶徵自壬子年為始即以帶徵完納之分數為次年蠲免之分數五月蠲免吳江震澤二縣坍田自康熙五十一年至雍正三年地丁銀一萬四千一百五十二兩有奇米麥豆一萬四千三百一十六石有奇八月蠲免寧國旌徳滁州全椒來安等被災州縣銀九百餘兩米豆三百四十餘石又以徐州豐沛蕭碭五州縣并徐州衛上年秋災蠲免地丁銀四千一百七十餘兩又奉㫖江南濱海人民被水著督撫等督率有司誠心撫綏毋使失所十二月准總漕性桂疏截留漕米四十萬石以備平糶附性桂疏畧漕米關係天庾例應乾圓潔浄今據蘇州府屬之常熟昭文太倉州屬之鎮洋松江府屬之上海華亭常州府屬之江隂靖江揚州府屬之泰州江都興化通州屬之泰興如臯淮安府屬之鹽城共十三州縣詳報田稻自被水以後其中勘不成災之田畝或稱稻經鹽潮灌浸不能乾潔飽足或稱疊遭風雨蚰虫米粒細小青白不一等情又據蘇州府屬之長洲元和吳縣吳江震澤崑山新陽松江府屬之金山常州府屬之無錫金匱江寧府屬之江浦淮安府屬之阜寧桃源并海州共十四州縣各詳稱田地雖不成災但當吐花結秀之候秋雨過多米色不無減損雖碎細可以簸揚而青粒殊難揀浄各等因俱經臣嚴行批飭經徵各員務須揀擇乾浄好米上納去後惟是秋雨過多蚰虫間生以致米色不能純潔則雖紅白兼收私稉並納恐不能米色全純也以臣愚見凡經先後題報被災之州縣其中有勘不成災之處應納漕糧者及原未成災但報米色不純之州縣應全納漕糧者除飭令選擇乾浄堪以久貯之米仍照常兑運通倉交納外若有實係不能純潔之米令各州縣報明數目酌留四十萬石仍貯本處倉厫於明春確訪時價酌減平糶查照被災之輕重分别平糶之多寡雖江省積穀亦多但穀能經久多儲益善且地方廣闊人民繁庶需米甚多目今淮安米價日貴食米每石已賣至一兩三四錢不等民食未免艱難訪聞各府米價亦貴來春青黄不接之時恐米價又長臣再四思維若將各屬不純之米截留本處平糶將來米價不至騰貴其平糶事竣仍令各州縣將米價解赴上下兩江糧道轉解户部一轉移間米無霉爛之虞民受平價之益其於明春生計似有裨益臣與總河臣嵇曾筠就近籌商亦慮明春米價增長似應截留平糶且漕河兩標兵丁計有九千餘名力作河兵葦蕩營兵一萬餘名其標兵俱於春夏二季支領折米每石折銀七錢五分而河兵則槩領折色自行買食兵民雜處需米浩繁若於四十萬石之内截留十萬石在皇恩普淮平糶則兵民均荷遍矣十一年正月奉㫖江南常熟等二十二州縣并華亭等六縣沿海被水地方已定議大賑三次著再加賑四十日其有從前遺漏貧民并先可餬口而目下力不能支者亦著查明補賑再被水之鹽塲竈户亦照貧民例加賑一月又以九年徐州并所屬四縣徐州衛秋災蠲免地丁銀四千一百七十餘兩八月二十三日以雍正十年舒宿虹靈六霍天長等州縣并宿州一衛秋災蠲免地丁錢糧三千一百三十餘兩十二月奉上諭江蘇雨水稍多收成歉薄著將乙夘年起運漕米截留二十萬石於被水州縣平糶新舊條銀及本年南漕等米緩至來年麥熟開徵仍令動支倉穀分别賑濟又奉諭將本年漕米一半折徵每石折徵銀一兩十二年二月十九日以雍正十一年宿靈虹泗四州縣秋災蠲免地丁錢糧四千六百一十餘兩其應徵新舊錢糧一併停徵仍動存公銀兩採買雜糧賑濟飢民十二月以宣南涇太鳳臨懐滁全來和十一州縣並懐滁全來和五州縣歸衛以及鳳陽衛秋禾被水照災分數蠲免地丁錢糧共九千三百三十一兩有奇米豆一千八十五石有奇仍動倉穀賑濟飢民五月十三年九月初三日皇上登極恩詔内開各省民欠錢糧係十年以上者該部查明具奏候㫖豁免九月十三日奉上諭恭紀首卷將雍正十二年以前各省錢糧實欠在民者一併寛免從前江南積欠錢糧内曾有官侵吏蝕二項亦著照民欠例寛免十月初七日奉上諭恭紀首卷據果親王奏江南等省漕項蘆課及學租雜税等銀著全省豁免十一月十一日奉上諭恭紀首卷江南太平府蕪湖縣有雜派江夫河蓬錢糧嵗徵銀二千三百零四兩即行寛免永著為例十一月十六日奉㫖豁免雍正十二年以前錢糧耗羨銀兩附總理事務王大臣議署副都御史陳世倌疏查錢糧火耗提解歸公以為各官養廉及地方公事之用凡遇蠲免錢糧之年若將耗羨一併蠲除則民邀浩蕩之恩而官受拮据之苦必自轉滋弊端所以雍正八年欽奉諭㫖凡遇特恩蠲免錢糧其耗羨仍舊輸納若因水旱蠲免者不得徵收耗羨將此永著為例欽此欽遵在案但查耗羨隨正項交納為勢猶便正項既蠲而獨徵耗羨其弊最多蓋以耗羨原屬零星小項為數無幾一經徵比則往返守候飲食盤費等項必至加倍因而胥役遂得包攬苛索書吏遂得重戥稱收且不肖官員因非正項錢糧上司不為查察遂得於耗羨之外復徵耗羨以飽私槖種種流弊皆勢特恩所必至者况現在官養廉無涉查本年九月内奉蠲免之項尤與各㫖寛免雍正十二年以前民欠錢糧其在雍正十二年以前各官應支養廉早已支給若現年之養廉自有現年之耗羨可徵原不藉此舊欠應用應如陳世倌所奏請勑下該部通行各省將現在其耗羡一併豁免嚴飭地特恩蠲免十二年以前之項奏方官不得私行徴收謹奉御批所議甚是依議速行十二月初八日奉特恩豁免雍正十二年以前帶徵緩徵漕項本折銀米十二月初十日奉㫖豁免直𨽻江蘇安徽浙江河南山東等省雍正十二年以前未完額徵河銀并江南省未完額徵黄快丁銀錢及江南山東二省各州縣衛所未完額徵造船等項銀兩附工部奏疏雍正十三年九月二十三日奉上諭將雍正十二年以前各省民欠錢糧及江南省官侵吏蝕之項一併寛免欽此臣等查臣部有直𨽻江蘓安徽浙江河南山東等省每年額徴河銀共二十八萬三千七百八十餘兩各省按年徴解江南總河為河工之用又江南省每年額徵黄快丁銀共一萬三千七百餘兩係江蘇安徽二省各州縣於田畝内攤徵為黄快等船差修工食之用又江南山東二省各州縣衛所每年額徵造船料銀七千九百三十餘兩為修造漕船之用均係編徵條欵臣部於欽奉上諭之後隨即咨詢户部據户部覆稱前項銀兩完欠各數咨報工部查核應聴工部自行辦理臣等恭查前項銀兩俱係民欠之項應否一例寛免之處理合奏聞奉議㫖依十二月十九日以潛山縣泗州秋禾被水蠲免地丁錢糧二百六兩七錢有奇米麥一十九石八斗有奇仍動倉穀賑濟飢民五月乾隆元年四月初四日奉上諭江南阜寧鹽城等處州縣上年夏秋之間雨水稀少田禾歉收曾降諭㫖著該督撫委員查勘被災情形已將阜鹽興海四州縣乏食窮民等加恩賑恤其額徵錢糧各按灾傷分數照例扣蠲至應徵漕糧等項復令緩至今冬帶徵朕思此等地方被灾之後既有本年應納之糧又有上年帶徵之項未免新舊交催追呼兩迫輸納維艱著將阜鹽興海四州縣雍正十三年未完緩征漕糧一例豁免以舒民力再聞阜寧鹽城二縣漕米昨年未降諭㫖之先已有按數完納者此等急公良民尤當加以恩澤著逐一確查將已完之數准抵今年應完之項俾得一體霑恩該督撫飭令該州縣實力奉行毋使奸胥地棍中飽滋弊欽此江南通志卷八十四
