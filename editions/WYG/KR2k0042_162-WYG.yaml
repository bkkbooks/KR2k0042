body:
  text: 江南通志卷一百六十三人物志儒林一江蘇松常鎭淮揚徐八府太海二州班固言儒家者流其道最為髙裒集諸儒修經學者述儒林傳其特為傳者如沛施讐髙相東海后倉嚴彭祖附見者若江東馯臂子弓碭田王孫魯賜沛戴崇子平褚少孫淮陽彭宣淮南賁生山陽張就張長安東海髪福九江陳俠張邯皆今江南地所産也葢其盛如此然則源流𣲖别支葉蕃滋居可知矣况聖朝彰闡六學勸興黌序所以崇奬風厲倍隆於古者乎或授受一經或旁通大義為箋疏傳註之學尤較著者具録於篇江寧府三國唐固字子正丹陽人修身積學稱為儒者著國語公羊穀梁傳註講授常數十人孫權為呉王拜固議郎自陸遜張温等皆拜之黄武四年為尚書僕射卒唐許叔牙字延基句容人邃於詩禮貞觀間拜𢎞文館直學士獻詩纂義十篇子子儒字文舉髙宗時議北郊禮許淹句容人精訓詁與魏横公孫模皆以博學名家宋周啓明字昭囘昇州人景德中舉賢良方正既召㑹東封報罷弟子百餘人不復求仕轉運使陳堯佐表其行義於朝賜粟帛仁宗時除試助教遷太常丞元孫轍金陵人學行純篤教授不倦口不及人過士至郡以不詣轍為恥諸部使及長吏之賢者多造請焉明陳遇字中行江寧人博究經史仕元為温州教授棄官歸明初以薦召見太祖與語大悦命為翰林學士中書左丞禮部尚書皆不受然國家事多所獻替非正道不陳眷待甚厚卒賜葬鍾山子恭官至工部尚書陶元素字希文上元人正統元年進士乞歸養親歴聘典浙江河南鄉試家居吉凶禮儀悉遵朱子而叅以時制金潤字伯玉上元人正統間以鄉貢授兵部司務己巳威喇入宼上欲親征潤白於尚書鄺埜曰細事未可重煩車駕上疏不報土木之變言於司馬于謙請堅壁清野以待之謙從其言軍國大計每與咨議知南安府致仕潤有文章尤邃於易嘗畫圖系解著淵學探微十二卷沈鐘字仲律上元人天順庚辰進士授驗封主事改南主客司與章懋羅倫為友時稱十君子歴陞僉事副使督學湖廣山東仕三十餘年無所干謁李文正稱之曰今之不識相門者仲律一人耳蔣浤字惟深上元人成化丁未進士官叅議性樸茂篤孝友家居數十年杜門讀書人罕覿其面喜讀性理大全通鑑綱目每閲一遍用一色筆評註至五色皆備字畫精好顧文莊見之曰即此可見前輩風流金賢字士希江寧人𢎞治壬戌進士授給事中奉命勘兩淮重獄時奄瑾亂政諸司讞獄皆取瑾意㫖賢獨否瑾恨之出守大名徙延平歸賢精春秋學病諸傳之舛令微文隱㫖不見於後著紀愚十卷或問百篇行世景暘字伯時上元人正德戊辰進士除翰林院編修時逆瑾亂政陵轢朝士景暘獨弗阿毎當進講必越宿齋沐覬有感悟遷國子司業六館諸生咸以為得師改左中允管南京國子司業事南方士習稍正以母憂去遂卒暘性篤孝義母目盲暘旦夕禱於神雙眸復明殷邁字秋溟江寧人嘉靖辛丑進士仕至貴州提學副使以疾歸復起提學浙江進太僕寺􅀸釐革雇役偽票諸弊萬厯中張居正當國以邁有盛名欲引以為重邁不應久之進南太常旋以禮部侍郎管南祭酒致仕學者稱白野先生盧璧字國賢金吾衛籍嘉靖戊戌進士仕至苑馬寺少卿孝友廉介居官常禄外秋毫無取歸杜門却掃人罕見其面楊希淳字道南上元人年十四督學胡象岡試孔子惜繁纓論意為宿學見其㓜更異之督學耿定向試以學莫先於立志論尤相賞契生平操持甚嚴嘗力却人厚餽臨終戒無丐人銘墓曰我固無求者死後乃有求耶李登字士龍上元人文行特著隆慶初選貢授新野令折鍰納粟以備饑築堤成梁以捍水民戴其惠以伉直忤時改崇仁教諭講明鄒魯之學有願學篇寳唐語録朱之蕃字元升衣之子萬厯乙未殿試第一奉使朝鮮遇屬國君臣嚴重有體事竣盡却餽贐朝鮮重之擢右諭德掌南翰林院事晉南禮部侍郎丁艱歸不復出素行孝友既貴悉以遺田推弟辦同產子女之婚嫁分宅居父執之妻孥鄉黨重之顧起元字隣初國輔子萬厯戊戌㑹試第一殿試第三由編修歴吏部左侍郎當軸欲引以大拜起元避居遯園七徴不起友人題其小築曰七召亭學問該博凡古今成敗人物賢否諸曹掌故無不通曉居家絶迹公府惟地方利弊不恤身任而力爭之後卒諡文莊鄭宗化字尚德上元人以明經教諭滁陽學者宗之稱明臺夫子孝友端慤游於耿定向羅洪先焦竑之門顧起元目為今之黄憲子元厚讀書敦行有父風劉閔字子賢六合人家貧力養母或恚怒則衣冠跪牀下以父喪未葬三年斷酒肉不内寢朔望輒號於殯所隣族憐之為助其葬妻失愛於母出之終身不復娶當事交薦其學行詔授本學訓導所著有家禮考註昭穆圖宗子説五倫啟䝉等書國朝張正綱字敦五上元人敦勵實學嘗云孔辨君子小人孟辨舜跖之徒未有利關不破可以語為人者注周禮離騷春秋多昔賢所未發張自超字彞嘆髙淳人康熙癸未進士博極羣書研究經史一以躬行實踐為主不事聲華釋褐後授經講學文行日著徐元夢撫浙時禮聘為書院山長後奉召入都行至茌平無疾而終未竟其用著春秋宗朱辨義蘇州府漢臯𢎞字奉卿呉人家世冠族少有英才與桓榮相善榮薦其經術自揚州從事拜議郎子徽官至司徒長史顧綜字文偉呉人明帝時辟有道歴官至尚書令帝舉三代之禮以正月上日幸辟雍延綜為三老設几杖從綜乞言焉南北朝齊張緒字思曼呉人父演太子中舍人緒少知名清簡寡欲齊髙帝用為太常卿領國子祭酒緒長於周易言精理奥見宗一時遇者肅然如在宗廟卒諡簡子子充多所該通尤明老易仕齊累官義興太守為政清浄梁天監初歴吏部尚書居選以平允稱遷國子祭酒登堂講説皇太子以下多執經以拜梁皇侃呉郡人少好學師事㑹稽賀瑒精力専門盡通其業尤明三禮孝經論語仕梁為國子助教於學講説聽者常數百人召入壽光殿説禮記義武帝善之侃性至孝日限誦孝經二十徧丁母憂歸邵陵王綸欽其學厚禮迎之尋卒所撰諸經義並見重於世學者傳焉陸璉呉郡人天監四年詔開五館建立國學總以五經教授置五經博士各一人以璉及沈峻等補博士各主一館館有數百生給其廪餼於是懷經負笈者雲㑹焉陳陸慶呉郡人徧通五經尤明春秋左氏傳節操甚髙仕梁為婁令入陳屢辭徴辟築室屏居永陽王欲見之不可得乃於陸榮宅穿壁觀之謂榮曰嚴君平鄭子眞何以加兹子士季從顧野王學左氏馬班諸書唐初終𢎞文館學士張沖字叔元呉郡人仕陳為左中郎將好覃思經典撰春秋義畧喪服孝經論語義諸書後入隋授漢王諒侍讀諒出牧并州引為博士子後印隋潘徽字伯彥呉郡人少受禮於鄭灼受詩於施公受書於張沖並通大義尤精三史始煬帝鎭廣陵引為博士令與諸儒撰江都集禮及帝嗣位復詔徽與褚亮等助楊素共撰魏書㑹素卒而止褚輝字髙明呉郡人以三禮學稱於江南煬帝時徴天下儒術之士悉集内史省相次講論輝博辯無能屈者擢太常博士唐陸德明名元朗以字行呉人陳大建中太子徴四方名儒講於承光殿德明始冠與國子祭酒徐孝克抗對屢奪其説舉座咨賞入隋為國子助教王世充僭號遣其子元恕即其廬行束脩禮德明恥之服巴豆㪚卧東壁下元恕入拜德明對之遺痢竟不與語世充平太宗徴為秦王府文學館學士命中山王承乾受業貞觀初終國子博士太宗後閲德明所撰經典釋文甚嘉之厚賜其家張後印字嗣宗隨父沖在并州以學行見稱髙祖鎭太原引居賔館以春秋授太宗武德中擢員外㪚騎侍郎太宗即位歴國子祭酒嘗賜宴月池令羣臣以春秋酬難帝曰朕昔受大義於君今尚記之永徽中致仕卒諡曰康陪葬昭陵孫齊邱累官朔方節度使東都留守諡貞獻朱子奢呉人通春秋左氏傳博觀子史隋大業中直祕書學士入唐授國子助教貞觀初髙麗百濟同伐新羅連兵數年不解新羅遣使告急帝令子奢充使諭㫖以釋三國之憾子奢雅有儀觀海外欽服皆上表謝罪累轉𢎞文館學士唐初太廟止四室子奢始發七廟之議帝嘗欲觀起居紀録子奢曰陛下無過舉雖見無嫌然以此開後世史官之禍可懼也上雖不從人多韙之施士匄呉人明毛鄭詩通春秋左氏傳善講説朝之賢士大夫從而執經考疑者繼於門太學生習二經者皆其弟子由四門助教為博士秩滿當去諸生輒拜疏乞留貞元十八年卒官韓愈誌其墓陸質字伯沖呉人本名淳以避憲宗諱改質有經學尤深於春秋少師事趙匡匡師啖助質盡得其傳陳少游鎭揚州辟為從事後薦於朝拜左拾遺歴給事中皇太子侍讀卒學者稱文通先生元延祐中集賢大學士曲出言質所著春秋纂例辨疑微㫖三書有益後學請令江西行省鋟梓以廣其傳仁宗從之宋陳之竒字虞卿呉人天聖中舉禮部御試不得第退居十年無仕進意舅丁謂欲官之力辭不就寳元初及第歴太常博士之竒孝於親約於身信於朋友篤行好學逺近欽其名德皆以君子稱之錢象先字資元呉人中進士髙第宰相呂夷簡薦其經行為國子監直講終吏部侍郎象先長於經術仁宗留神經藝屢有顧問象先輒依經以對因以諷論政事時務有啟迪獻納之益留侍經筵前後十五年嘗修勅成例賜勲爵仁宗以象先事母孝特賜章服榮之朱長文字伯原呉人從泰山孫明復授經尤邃於春秋博聞强識篤學力行舉進士歴校書郎丁父憂歸家居二十年時俊咸師仰之因其所居樂圃號樂圃先生元祐中起本州教授同舉者徐積陳烈時號三先生其教人先經術而後詞章召為太學博士祕書省正字元符初卒哲宗知其清賻絹百匹生平撰述甚多並行於世林虙字德祖呉郡人登進士第教授常州身為勸率從者風靡大觀三年廷試常士預選者五十三人詔以進賢宜受上賞特轉一官知州徐申於學之南立進賢坊以榮之遷開封府左司錄請老歸虙自六經諸子而下錯綜貫穿著有易説書義等書王綯字唐公崑山人建炎初為御史中丞歴拜參知政事為人剛正有守文章温潤典雅深於理趣所著有論語解孝經解諸書王蘋字信伯呉江人從二程子於洛為髙弟通春秋視楊時猶為後進時亦以為後來師門成就惟蘋耳髙宗駐蹕平江郡守孫祐薦其學行宰相趙鼎復薦之賜出身除正字蘋奏治平三事上深嘉其通曉世務歴著作佐郎通判常州睌作論語集解未成而卒寶祐初里人沈義甫建明教堂祀蘋以陳長文楊邦弼配皆其弟子也義甫亦有名行嘗為白鹿洞書院山長力行朱子學規陳長方字齊之呉江人從王蘋游紹興中舉進士為江隂教授尋歸閉門著書學者稱惟室先生章憲字叔度常熟人樂道好德操履髙潔師事王蘋而與朱震呂本中等游尤邃於春秋呉仁傑字斗南崑山人淳熙進士歴國子學錄博洽經史為時碩儒嘗講學朱子之門詩文亦名一時所著有古易及周易圖説樂舞新書諸編衛湜字正叔崑山人參知政事涇弟好古博學嘗集禮記諸家傳説名禮記集説寳慶二年上之仕至直寳謨閣知袁州學者稱為櫟齋先生錢俁字廷碩常熟人舉進士終朝請郎平生躭味經籍尤精易學所著有易説諸編王楙字勉夫蘋從孫早孤奮學母殁後以不逮養不預鄉薦著書終老子德文字周卿孫敄字行父並有學行德文以魏了翁眞德秀薦仕至承節郎滕宬字季度呉人沈敏好學躭研經史淳熙中舉賢良以忤考官被擯後雖再召薦者不絶處之漠如也葉適薦其學行賜號廉靖居士孟文龍字震翁昭慈后五世姪孫以髙祖忠厚鎭呉遂家焉累調浙東提舉常平幹辦公事以内艱不行國亡後力辭當事之薦不出户庭三十年著易解大全三十卷子潼歴松江府判官亦以篤學勵行稱俞琰字玉吾呉縣人初以詞賦稱宋亡隱居著書不復仕進以義理之學淑諸人於書無不讀尤精易學好鼓琴既老自號石澗卒年七十餘其所纂述諸書並行於世子仲温克繼其學元邵光祖字𢎞道呉人博學好古研精經傳講習埀三十年通三經所著有尚書集義范成字性存父霖元初以名儒召歴禮部侍郎立朝有論議氣節自浙東徙呉成幼力於學卓然有立獲親炙前朝遺老治家有法以經術教授章句名數無不究極隨才誘掖成就後學郡嘗禮致為訓導子焕有孝行王原傑呉江人學邃行潔至正間領鄉薦値兵興不復仕教授於鄉所著有春秋讞議明徐逹左字良夫呉縣人從名儒受易書二經元季隱光福山中置家塾合族屬子弟教之鄉黨遵化洪武初用薦為建寧訓導師道克立所著有四子書及文集趙文字宗文長洲人永樂中用薦知鄱陽縣鄉里稱篤實君子所著有理學述言諸編王璉字汝嘉長洲人贊善璲弟舉明經歴大庾教諭永樂初召修永樂大典充副總裁又修五經四書性理大全書成留為翰林五經博士進侍講洪熙初開𢎞文閣璡與楊漙陳繼日直其中禮遇甚厚璡文章不及璲而理致為勝制行醇篤楊士竒深重之楊翥字仲舉呉縣人少以德量稱仁宗朝楊士竒薦之召授編修歴禮部尚書告歸翥修身謹行言動不妄與物無競一時搢紳推厚德者翥為最文章平實恬和如其人顧巽字順中長洲人受易於鄉儒周傳永樂甲辰進士呉中易學實始於巽當時賀廉孔友諒顧珣皆從巽受經尤安禮字文度長洲人父義字崇道有名行安禮少從父寓武昌與楊士竒楊翥以德業相勵建文元年舉於鄉為方孝孺所取士仕至貴州參議安禮平居若無所可否至辨析理欲毫介不茍金問字公素呉縣人少受易於俞貞木家貧無書從人借讀無不通曉永樂時以被薦為司經局正字時宮僚多得罪問與黄淮楊溥同坐繋三人相得甚省躬念咎之暇各持一經講論曰此處憂患之道也正統間終禮部右侍郎問義聞流著平生閲履否泰相循而不變所操製述雅健書得魏晉筆法星厯之學尤精兄聲亦好古嗜學問事之如嚴師劉鉉字宗器長洲人事母以孝聞永樂時以善書徴入翰林遂舉庚子鄉薦授中書舍人宣德間與修實録言行不茍與人交一以誠信權門要路未嘗渉迹歴國子祭酒嚴教條以約諸生無敢倖進者天順初遷少詹事侍太子講讀卒上嗟悼曰安得學行醇篤如斯人者耶諡文恭陳繼字嗣初呉縣人汝言子生十月而孤家所存惟書二萬卷其母守節教繼及長學成名盛事母至孝有司上其事使御史察之繼方隨母抱甕行灌母以壺漿與之拜而後飲朝廷嗟異仁宗初以楊士竒薦召授翰林五經博士時初開𢎞文閣繼日直閣中備顧問進檢討致仕繼為人端恪其學自經史百氏皆考究精核文章根義理臨卒誦西銘存順没寧二語而逝子寛完皆能文王庭字元直崑山人少師事葉文莊盛盛甚器之領天順壬午鄉薦授鄜州學正終瀋王府長史庭學貴踐履不尚詞華律身教人動以禮法周木字近仁常熟人成化乙未進士歴官河南布政生平究心理學晚尤好易所畫諸圖因羲文邵子之所命者而衍之其於洪範所陳配合皆有倫類居家冠婚喪祭悉遵古儀注學者稱勉思先生子炯字光宇舉進士累官山西布政以才守稱鄧韍字文度本姓蔡常熟人正德丙子舉人以通經博古為學常倣呂祖謙大事記論次古今得失曰如有用我執此以往為文有體要尤篤好濂洛關閩之學杜偉字道升呉江人嘉靖壬子舉人官工部主事篤志聖學講明濂洛宗㫖躬行實踐不務標榜所著有正學編諸書學者稱静臺先生徐師曾字伯魯呉江人嘉靖丁未進士歴官吏科給事中移疾歸里闢書舍南湖上講誦如諸生萬厯中屢詔起辭不赴益研究經學撰禮記集註諸編學者稱魯菴先生歸有光字熙甫崑山人弱冠通六經三史蔚為大儒嘉靖庚子舉南闈第二人八上春官不第讀書談道居嘉定安亭江上四方來學者數百人海内稱震川先生乙丑舉進士歴官太僕寺丞所著有洪範傳諸編子子慕字季思萬厯辛卯舉人再試不第屏居江村講性命之學懷宗中有詔搜訪遺逸時子慕已前卒巡按表其名行追贈翰林院待詔孫昌世字文休曾孫莊字元恭並以詞翰擅名王應電字昭明崑山人受業於魏校篤好周禮謂周禮自宋以後或著書指摘或以己意更次此皆諸儒之周禮也覃精十載求聖人之心溯斯禮之源原設官之意成周禮傳詁數十卷以為百世不易矣既就正羅洪先洪先嘆曰昭明之書如盤根樛枝附麗宛轉即白虎諸儒莫能駕其上也翰林陳昌績以師禮事之江撫胡松為刋行於世應電又研精字學訂正説文譌謬名曰經傳正譌又著同文備考書法指要諸編並行於世王敬臣字以道長洲人江西叅議庭子事親以篤孝聞人目為王曾子少受業魏校聞黙成之㫖嘗言議論不如著述著述不如躬行自見耿定向語以無獨成之學由是多所誘掖弟子從游者四百餘人其學以愼獨為先深以標立門户為戒學者稱少湖先王萬厯中廷臣薦其學行以博士徴辭不行詔以所授官致仕後復以巡按薦詔有司時加優禮鄭光宙字道夫呉縣人師事王敬臣盡得其傳敬臣晚歳每語來受業者曰道夫進業立誠足為學者師盍往事之自是生徒日盛所著有周易管窺諸書學者稱拱山先生何思佐字穎凡長洲諸生家世以儒學相傳精曲臺禮有纂述行世楊廷樞字維斗呉縣人兵部尚書成孫孝子大濚子舉懷宗庚午鄉試第一為諸生時即以文章氣節負重名與諸名流分經立課集漢唐以下諸儒義疏傳説辨其源流得失領解之後聲譽日盛士林奉為模楷因其所居臯里稱臯里先生門弟子著錄者二千人甲申之後授命蘆墟門人私諡忠文王錫闡字寅旭呉江人博綜羣書尤精厯象之學創新法候日月食較密於前人撰有厯法厯説諸編一時碩儒皆推服其學究天人韓洽字君望長洲人隱居羊山以髙節著深於字學所著有篆學測解釋訓考源識者言足證説文長箋之誤楊无咎字震伯廷樞子痛父罹難杜門隱居歴八十年與徐枋朱用純稱呉中三髙士生平覃思經學多闡前人所未發所著有譚經録諸書朱用純字致一父集璜殉難時用純方補郡諸生茹哀隱痛遂棄舉業授徒贍母潛心理學四子六經及濂洛關閩之書探索融㑹務在躬行實踐所著有四書講義諸編國朝顧炎武字寧人崑山人貢生少負異質篤志古學九經諸史皆能背誦生平足跡半天下所至考其山川風俗疾苦利病如指諸掌凡所論著皆上下古今貫串精核卓然成一家言當代咸服為通儒於六書音義尤有獨得李光地以為自漢晉以來所未有學者稱亭林先生楊彞字子常常熟人以貢歴都昌知縣移疾歸少與婁東顧夢麟友善明季俗學多創新説背傳註彝與夢麟講説辨難力明程朱之説天下翕然從風稱楊顧之學晚年目盲猶請友人讀書其側為諸生講説無少倦朱鶴齡字長孺呉江諸生嗜古博學注杜甫李商隱詩時稱詳贍晚年潛心六經長於箋疏之學考證精核所著有毛詩通義尚書埤傳諸編彭定求字勤止長洲人康熙丙辰㑹試殿試俱第一授脩撰歴官侍講先後里居二十餘年泊若寒素父瓏舉進士自長寧令罷歸結社講學學者宗之定求夙承門風又從游湯潛菴先生之門益研求心性宗㫖粹然負儒者之望嘗編纂儒門法語䝉正錄諸書儀封張公伯行撫蘇尤相契合裁成後學佽助為多王喆生字醇叔崑山人明刑部郎中臨亨孫舉人志長子少師事邑中耆儒朱用純能得其傳舉康熙壬戌進士官編修授職七月即乞假養母絶意仕進讀書敦行品望日重兩任邑中清田事先後為中丞湯斌宋犖所推表章前哲扶植桑梓每不遺餘力著懿言日錄張伯行稱其精深博大比之抑戒云松江府三國陸績字公紀呉郡人康子博學多識星厯筭數無不該覽孫權統事辟為奏曹掾出為鬱林太守加偏將軍績意在儒雅非其志也雖有軍事著述不廢作渾天圖注易釋元皆傳於世南北朝陳顧野王字希馮呉人七歳讀五經知大㫖長而徧觀經史精記黙識天文地理蓍龜占候蟲篆竒字無所不通以篤學至性知名仕梁及陳歴官黄門侍郎所撰有輿地志玊篇元象表諸書行世孫道衍字正平唐開元中登文學優贍科宋陳伯逹華亭人紹興中進士其學深於經術著洪範九圖九説田疇華亭人嘉定間嘗設講席於國學六館之士皆執北面禮所著有學易蹊徑等書元陳宏字君宏華亭人以儒業著聞邃於易嘗著易象發揮易孟通言童子問夏侯尚元字文卿華亭人為文下筆立就嘗作中庸管見聚疑原孟等書皆出先儒議論之表趙孟頫薦為東宮伴讀既而主禮典樂皆稱職郯王聞其賢招致之待以國士王被誣誅尚元力陳王忠孝數事得白遂歸不復仕王昭大字茂卿華亭人博綜經傳於易尤精詣授湖州教授致仕歸周之翰字申甫華亭人博極羣書尤精易學所著有乾坤闔闢天地生成隂陽變化山川流峙四圖并贊以發其藴自號易癡道人講授於鄉以壽終王文澤字伯雨上海人博學通經所著有尚書制度圖三卷官府學訓導子黙字子章多藝善談論書法趙孟頫至正中徴至京書金字釋典擬官翰林力辭歸明殷奎字孝章華亭人少從楊廉夫受春秋洪武四年以薦授陜西咸陽教諭所撰有道學統系圖家祭儀關中名勝集後徙居崑山卒門人私諡文懿先生弟璧箕俱明經篤行林鐘華亭人有學行通詩書春秋宣德中任崑山訓導入侍經筵歴遷山東參政宋瑛字克輝華亭人少嗜學既領鄉薦益肆志學問務窮理期有以體之身心措諸事業登天順丁丑進士授工部主事人樂其簡易而憚其嚴中貴人不悦偵其過無所得遂引疾歸遠方來受業者甚衆事母孝居喪哀毁有燕乳白雛於堂徐三重字伯同青浦人萬厯甲戌舉禮部丁丑廷試授刑部主事時政尚綜核而三重獨持平恕甫滿一考即乞假歸以父老遂不復出家居四十餘載内行醇謹門風肅穆生平篤志理學以朱子為宗學者稱鴻洲先生所著庸齋日記信古餘論諸書皆可埀世範俗長子貞秩以孝謹稱次子貞稷字叔開由進士官刑部主事亦有平允名歴東川兵備以父年七十乞侍養歸屢薦不起以名德重一時貞秩子銘敬貞稷子銘常懷宗時俱領鄉薦錢大復字肇陽華亭人領萬厯鄉薦授蓬萊令每月朔集諸生講義致仕歸構日新書院講理學歴九年寒暑不輟其門人莊大儒字仲醇尤刻志聖賢之學子龍錫徐鳯彩字聖期華亭人太學生與兄孚逺聲名相埒六經皆有纂述尤精於詩所著詩經輔註四卷子允貞孫懷祖皆有士行國朝張昺字長史華亭人康熙辛未進士選庶吉士性恬澹無營淬志理學座師李光地於禮闈閲策深賞其西銘之對能闡先儒所未發入史舘後又頻與講論契合尤深謂門弟子中穎悟無如昺者未久疾卒所著西銘圖論中庸精義光地皆錄而存之常州府宋杜鎬字文周無鍚人南唐時舉明經任集賢校理仕宋為崇文院檢討㑹將祀南郊彗星見宰相趙普問鎬鎬曰當祭而日食猶廢况謫見如此乎帝嘗問西漢賜與用黄金而今難得何也鎬曰當時佛事未興故金價賤預修册府元龜特置龍圖閣直學士以榮之累官禮部侍郎博學多識眞宗每得古器異書必詢之皆能究其本末張巨武進人少從胡瑗遊與同郡蔣之竒胡宗愈丁隲為四友嘉祐中舉明經歴國子監直講王安石新經行巨即引去時論髙之著易解十卷龎安仁字宅道晉陵人通五經尤長於易鄒浩從受業唐棣字彥思宜興人政和五年進士從河南程頤學能得其傳編次伊川語録百餘條歴官祕書少監丁隲字公㸃晉陵人嘉祐初進士以經學倡後進尤長於易春秋李定用事辟為屬以疾辭蘇軾曾肇孔文仲交章薦隲司馬光當國隲謁之獨後光曰眞自重士也除太常博士改右正言元祐間疏請正士風後出知處州周孚先字伯忱晉陵人偕弟恭先往洛從程頤學與楊時相友善在頤門下凡十七年後歸生徒逺至者衆創城西城東書院兄弟分主之楊時至郡館之城西命諸生師之孚先由鄉薦入太學官臨安教授著有論語解凌浩字直翁無鍚人與同邑陳敏同學於胡瑗以經術知名治平乙巳進士嘗為蓬萊武陟令以能名召拜太學博士推胡瑗之學以誨士士多從之出守渠陽元陸文圭字子方江隂人博通經史百家及天文地理律厯醫藥筭數之學為文融㑹經傳東南學者皆宗師之朝廷屢遣使馳幣聘之以老疾不行所居在城東學者稱之曰墻東先生有墻東類稿二十卷梁益字友直江隂人博洽經史而工於文詞陸文圭卒後浙西稱學術醇正為世師表惟益一人所著有詩傳旁通發揮朱子之學為精又有詩緒餘史傳姓氏纂陸以道字士𢎞無鍚人明易溯程朱之源得象外㫖至正二年進士歴翰林待制明謝應芳字子蘭武進人篤志好學以道義名節自勵元至正初隱白鶴溪上授徒講學江南平有司徴脩郡志强起赴之德望重東南縉紳逹官過郡必訪其廬詩文典雅藴藉有辨惑編龜巢稿毘陵續志思賢錄孫作字大雅後以字行江隂人世以儒名為文醇正典雅著書十二篇號東家子宋濂比之法言通書元季避兵呉中張士誠廩禄之旋謝去客松江以居洪武六年召脩日厯書成累擢國子司業坐事免復起待詔終長樂縣教諭門人稱清尚先生陳濟字伯載武進人與弟洽浚從謝應芳遊濟尤學問該博成祖修永樂大典用大臣薦以布衣召為都總裁書成授右贊善又命授諸皇孫書僦室以居僅蔽風雨為文章根據經史必務理勝不事葩藻所著有詩傳通證書傳補經元史舉要通鑑綱目集覽正誤諸書周衝字道通宜興人由舉人仕訓導至唐府紀善遊王守仁湛若水之門嘗曰湛之體認天理即王之致良知也兩家門人各相非笑衝為疏通其㫖與蔣信集師説為新泉問辨錄薛應旂字仲常武進人嘉靖乙未進士由慈谿令改九江教授徐階督學江西檄掌白鹿書院事擢南吏部考功郎中主察典輔臣嚴嵩令尚寳􅀸諸傑囑應旂去一御史應旂反黜傑嵩怒嗾御史劾之謫建昌通判歴浙江提學副使罷歸所著有考亭淵源憲章錄宋元通鑑甲子㑹紀四書人物考髙士傳浙江通志諸書王升字世新宜興人由嵗貢官國子學錄張居正柄國欲網羅當世知名士託升友道意欲令典制勅升力辭不就通判成都有廉譽遷鹽課提舉謝歸有四書輯畧讀左贅言諸書行世學者稱孚齋先生錢一本字國瑞武進人萬厯癸未進士由知縣擢御史上建儲論相二疏語極戅直斥歸郡守歐陽東鳯構經正堂講學推一本主之與顧憲成分主東林講席學者稱啓新先生最精易學有像象管見象鈔續鈔範衍呉桂森字叔美無鍚人從顧憲成髙攀龍講學東林書院萬厯丙辰歳貢廷試歸學易於錢一本受所著像象管見廣其意作像象述像象金針易説談易隨問同邑諸生鄒期楨字公寧亦從攀龍學静坐有得時稱兩素衣先生華允誠字汝立無鍚人天啟壬戌進士對䇿極陳奄寺之害置二甲除户部主事値魏璫亂政告歸懷宗初起工部員外郎京師戒嚴守德勝門稱㫖改職方劾輔臣温體仁尚書閔洪學朋比阿黨詔奪俸旋乞歸後殉國難少與兄允謀允誼從錢一本髙攀龍游盡得其學俱以儒學稱允誠有春秋説四書大全叅補允誼有三象粹精春秋傳戴記纂疏諸書行世岳虞巒字舜牧武進人崇正辛未進士歴江西按察歸惟以著書為事晚尤好易撰周易感春秋平義二書時宜興諸生儲漧受學於錢一本著有易疑春秋屬比直書子秬亦以學稱有周易集義呉鍾巒字巒穉武進人崇正甲戌進士少從髙攀龍顧憲成講學門下士數百人江陰李應昇為最初令長興以旱潦緩徴税不中額謫紹興府照磨量移桂林推官國亡自焚死所著有周易卦説大學衍義霞舟語録諸書秦鏞字大音無鍚人崇禎丁丑進士令清江多惠政父爾載師事髙攀龍鏞承家訓精理學著有易序圖説通書解皇極内篇小衍叅同閣集李如一初名鵬翀字貫之江隂人應昇從父篤學好古其論學以六經為淵海箋疏為梯航謂朱子戴記未有成書網羅鈎貫撰禮記緝正通儒稱之堵景濂字濂生無鍚人崇禎壬午舉人授徒講學學者稱禾齋先生從游者八百餘人有禮經貫四書就正語時江陰諸生顧文熊亦著禮經集解及厯象圖書二考諸編國朝任元祥字王谷邑諸生學以良知為宗持身嚴肅言動不茍建宗祠定宗法族人世世遵之詩文眞樸典則井然與商邱侯方域寧都魏禧同邑陳維崧名相埒著鶴鳴堂集商邱宋犖序之董以寧字文友武進人郡諸生天資明敏少喜為詩詞古文於天文厯象樂律方輿之㫖多所發明晚年盡棄去専事窮經於易宗來知德闡錯綜之妙於春秋則欲參三傳而另為一書著正誼堂集秦松齡字留仙無鍚人順治乙未進士歴官左春坊左諭德七歳讀中庸閉目潛思良久告其師曰吾識性矣十九官庶常世祖章皇帝召試詠鶴詩有髙鳴常向月善舞不迎人之句指示閣臣曰此人必有品置第一以逋糧案罣悞歸田旋以博學宏詞薦侍從講幄纂修明史里居二十餘年研精宋五子書窮經尤邃於詩著毛詩日箋髙愈字紫超無鍚人攀龍從孫私淑乃祖言動不茍父嗜飲每赴宴愈必袖小燈伺道旁扶掖歸雨雪益謹與人言依於孝弟肫懇動人尤嚴取與年七十門弟子共市一新冠為壽猶却之邃經學周禮尤精熟以歳貢終華學泉字天沐無鍚人性聰穎嗜讀書於六經各能㑹通古人義疏而折衷以己意著述甚多尤深於易起居坐卧惟易是偕為人豈弟樂易篤於同氣鍵户四十餘年以布衣終呉晉剡字錫孺宜興人順治壬辰進士授廉州推官以清節著尋丁母憂歸結廬墓側絶志仕進遵紫陽半日讀書半日静坐之法覃思理學與同邑湯之錡相砥礪病中聞兄明孺卒力疾往哭遂不起湯之錡字世調宜興人至性純篤居親喪一循古禮就地寢苫事諸父如父於先儒書無不讀而以周子主静之説為宗倣髙忠憲復七規春秋兩㑹四方學者翕然宗之延陵書院暨鍚山東林書院各延主講席不就有詢朱陸異同者則曰顧吾力行何如耳多辨論何益其卒也整襟危坐而逝任培元宜興人父贊性敦厚直諒家貧自樂每言及明愍皇帝輒痛哭不已培元教授里中奉朱子小學為準繩嘗言既為吾弟子當為其終身謀先使識義理大分根柢既端即轉之農工商賈終不入於大惡定宗法十八則治族人子弟有犯啟祠告祖行杖雖素有名者不少假楊懷逺字文來宜興諸生讀書有疑義必究析其所以然雖先儒不敢遽信積四十年成四書明辯錄微言大義及名物典故皆在焉又考古限田均田制為一書古今祭禮為一書復纂周禮疑五經疑諸儒源流考鄉評備考諸編家貧常苦饑而一介不茍取卒金陵邸舍同時有周亦魯字型曾亦諸生為人謙謹樸茂教授里中積脩脯營家祠及祭田陳其難字克艱江隂諸生博聞强識尤深於易嘗著易圖系及六書樂律通鑑地理考學士揆叙聘至京與講易月餘安溪李光地極推服年九十五卒徐世沐字爾瀚江隂諸生不赴科舉積學力行與當湖陸隴其相契居家有禮法不作佛事年八十五卒子恪羅城令能詩文卒官孫崑諸生奔喪道死金敞字廓明靖江人好讀顧憲成髙攀龍遺書以聖人為必可學及長師事荆溪湯之錡長之錡三歳執禮恭謹之錡卒卜居無鍚遵攀龍復七規與同志静坐讀書興起者甚衆章大士字我任武進人少慕包拯海瑞為人長從湯之錡金敞得聞顧髙之學乃虚心抑氣以聖賢為歸病亟時誦邵雍上天生我詩一笑而逝鎭江府漢包咸字子良曲阿人受業長安習魯詩論語歸鄉里途為赤眉所執晨夜誦經自若賊異而遣之光武即位舉孝廉除郎中授皇太子論語遷大鴻臚經傳有疑輒遣小黄門就問顯宗以咸有師傅恩而素清苦俸賜増於諸卿咸皆㪚給諸生之貧者子福拜郎中亦以論語入授和帝三國韋昭字𢎞嗣雲陽人為太史令撰呉書孫休時為博士祭酒命昭依劉向故事校定衆書孫皓即位遷侍中領左國史皓以瑞應問昭昭答曰此家人筐篋中物耳皓欲為父和作紀昭以和未登帝位當立傳不當為紀皓滋不悦積前後嫌忿誅之所著有洞記三卷官職訓及辨釋各一卷子隆亦有文學晉臧燾字德仁祖汪自東莞家京口善三禮之學為國學助教議宣太后不當配食中宗從之又因太廟災議祧禮學者多是之南北朝梁臧嚴字彦威燾孫孤貧勤學性耿介不輕造請僕射徐勉欲識之嚴終不詣歴監義陽武寧郡累任皆逼蠻嚴以數門生單車入境羣蠻悦服有文集十卷從子盾累官領軍將軍為人敏贍有風力長於撥繁幼從徴士諸葛璩受五經璩許為王佐才唐施敬本丹陽人為四門助教明皇將封禪詔有司講求典儀盥手洗爵侍中主之祀天神太祝主之敬本歴陳古制言盥洗乃鬱人之事今侍中位宰相非鬱人比今太祝乃下士以下士接天以大臣奉天子輕重不倫非禮也時以為識體屢遷至右補闕祕書郎宋姚闢字子張金壇人皇祐元年進士授項城令通州通判所至有聲時以辭章相尚闢獨究心六經與蘇洵同修禮書有太常因革禮一百卷焦千之字伯强丹徒人歐陽修勉以棄科舉之學專意經術呂公著判潁州延教其子嚴毅方正以師道自重嘉祐中舉行誼為國子直講歴知無錫州葛勝仲字魯卿丹陽人紹聖進士為太學正累遷太常􅀸詔續太常因革禮書㑹建儲以勝仲兼諭德作仁孝學三論獻太子又採歴代太子善惡成敗之迹日進數事除國子祭酒歴知數州有政績忤朱勔罷歸卒諡文康湯泳字叔永丹陽人粹於理學與弟沂同遊考亭之門其問答見文公語類官南廓簿領未赴卒竇從周字文卿丹陽人志尚沖雅年五十偕弟澄從朱子學耑以操心為己為學者倡兄弟築室講道一夕盜入其室睥睨久之知為從周居謂其徒毋驚此公相率去朱子曰忠信可行於此見之劉宰字平國金壇人紹熙元年進士調眞州司法時朝㫖責出身見任人供狀不讀周惇頤程顥程頤等書方得考試宰喟然曰平生所學謂何首可斷狀不可得也遷浙東倉司幹官不樂仕告歸理宗時累奉㫖授官皆不起隱居三十年施惠於鄉邦雖生理素薄而見義必為既竭其力復質貸以繼之又毁滛祠八十四所書無所不讀以博考訓注而自得之為貴卒諡文清有漫堂集三十卷顧奎字應文丹徒人貢太學好學篤行後進師尊之每郡博士至必執弟子禮迎致鄉校以為領袖元王垚字樂天居京口長於康節經世之學至大改元瀋陽王奏充説書從王使髙麗還陳便利三十餘事湯炳龍字子文居京口辟慶元市舶提舉學問該博四書五經皆有傳註尤深於易詩歌甚工號北村集陳鈞字公秉居金壇歴官至湖南𣙜茶提舉通諸經尤長於易著原理原數二篇有文集明丁元吉字旡咎丹徒人博學尤深於易善造就弟子性至孝喜吟詠考古論事談養生治疾之方所著書多至二百餘卷子璣丁璣字玉夫丹徒人成化戊戌進士授中書舍人嘗因星變陳治道本末反覆千言而根極於正心擢廣東副使提督學校生平守程朱之學其教人正容端坐澄心定氣使躁釋慮消為政先風化而一以誠意將之所著有補齋集八卷大學疑義等書于鎰字南金金壇人成化甲午舉人德性端重孝友見稱知萬載縣務以德化究心理學著中説朱鍚丹徒人任榮府紀善嘗從王心齋艮游潛心理學所著語録行世王濂字仲清金壇人正德癸酉舉人學於羅文莊欽順精研理奥躬行實踐欽順所著困知記屬濂序之謁選湖州推官楊文㐮一清稱其清操直節從􅆂養省察中出王樵字明逸金壇人臬子嘉靖丁未進士授行人遷刑部主事嘗曰士大夫以留心案牘為俗吏文墨詩酒為風雅夫飽食官禄受成胥吏謂之風雅可乎乃著讀律私箋甚精核萬厯初分巡浙西入為尚寳􅀸轉鴻臚􅀸疏請勵精聼納急宗社大計歴官南京右都御史致仕樵素簡黙至談經學則娓娓不倦閉門宴坐樸遫如寒士徒歩里中與負擔者讓道無忤容卒諡恭簡所著有周易私錄尚書日記春秋輯傳四書紹聞編方麓居士集束桓字子威丹陽人以貢士授寧州判州廹洞蠻桓身歴其地戒毋剽掠賊既斂戢守將倖功請勦桓力爭於督府得罷兵調膠州兩視髙宻即墨篆上官例取無礙錢糧桓狀言賦役有成書徴收有實冊安所得無礙者雖報可而心銜之卒罷歸與丹徒貢生殷士望月為講學㑹以孝悌求仁為本敦朴存誠為務學者稱懷玉先生于孔兼字元時金壇人湛孫由進士授九江推官再陞禮部郎中累疏爭三王并封議得寢又疏救考功郎趙南星謫安吉州判尋投劾歸與顧憲成髙攀龍講學東林嘗云學在不事空言無求頓悟光宗立贈光禄少􅀸兄文熙官大名兵備副使亦有名王肯堂字宇泰金壇人都御史樵子萬厯己丑進士授檢討仕至福建叅政生平好讀書著述甚富於經傳多所發明有論語義府尚書要㫖律例箋釋鬱岡齋筆麈尤精醫理著醫科證治準繩等書盛行於世工書法輯鬱岡齋法帖數十卷手自鈎搨為一時石刻冠笪繼良號我箴丹徒人萬厯辛卯鄉舉署寧國府教諭作廟祀考禮樂考示諸生又上黌宮六議於學使者遷鉛山知縣講易鵞湖書院晉絳州知州時議為魏忠賢置祠上林繼良執不可遷判順天魏崔惡之以東林邪黨削奪歸懷宗時起户部郎中上賦役便民議出知汀州告歸講學天心書院有語錄行世著鵝湖讀易十二卷潘槐字廷卿金壇人萬厯中貢士任廬州府訓導署英山縣篆汰浮糧白寃獄儆刁頑甫四月而頌聲大著歸與顧憲成髙攀龍講學於八卦亭符應乾字健甫金壇人萬厯丙午鄉舉知零陵著惜夫惜馬歌沿途皆咏之陞南康府同知主白鹿洞教事與諸生講學著鐸講行世國朝顧言字子訥丹徒人由明經授石埭訓導遷豐縣教諭繼陞池州教授辭不赴所至訓諸生先德器後文藝著易編合朱纂道學正宗行世史岱字東觀金壇貢生選授學正後補禮部司務岱敦行績學遵父逸裘遺命建小宗祠立宗法議祔祧作小宗志又著五祀考釋菜考補輯孔子家語内篇外篇雜篇學山集淮安府漢澓中翁東海人善詩書宣帝在民間依倚許廣漢兄弟及祖母家史氏從之受學衞宏字敬仲東海人與河南鄭興俱好古學從九江謝曼卿受毛詩因作詩序又從司徒杜林受古文尚書光武以為議郎作漢舊儀四篇以載西京雜事又著賦頌七篇皆傳於世晉陳邵字節良襄賁人郡察孝廉不就以儒學徴入為陳留内史遷燕王傅撰周禮評行世泰始中詔稱邵清貞潔静博通六經宜在左右以篤儒教可為給事中卒於官宋徐積字仲車山陽人父石以神童舉知羅城縣父殁以父名石終身不用石器足不踐石事母至孝從胡瑗學應舉入都載母以行登進士第母亡廬墓三年雪夜哭墓側不絶音有甘露木連理之瑞客從南越來積與論嶺表山川險易鎭戍踈宻如指掌客嘆曰不出户知天下徐公是也廷臣薦其孝行道義文學宜表其賢乃授楚州教授卒賜諡節孝處士國朝岳薦字西來山陽人明季棄諸生篤志汲古博通經史久之所得益深所養彌粹事親孝謹家貧薦與妻噉糠覈而奉養甘㫖必具有庶弟甫生其生母暴亡薦夫婦棄己女而乳之平日指授學者專用宋儒程朱之學為準的矩言楷行人皆欽服及殁同里劉昌言及長洲汪琬並為作傳閻若璩字百詩其先自太原徙山陽若璩淹貫經史學博而思精最長於考訂多闡先儒所未發所著有尚書疏證四書釋地困學紀聞注又同縣張弨字力臣篤學嗜古精於六書一時耆碩皆推服之揚州府漢徐淑字伯進廣陵人博雅好學隨父愼在京師纘孟氏易春秋公羊傳禮記周書舉茂才除渤海令遷琅邪都尉唐曹憲江都人仕隋為祕書學士聚徒教授公卿多從游尤邃小學煬帝令與諸儒譔桂苑珠叢規正文字又註廣雅藏於祕書唐貞觀中召不至即家拜朝散大夫太宗嘗讀書有竒難字輒遣使問憲具為音註援驗詳確帝咨賞之卒年百餘嵗宋王令字逢源眞州人王安石嘗謂曰始得君文獨愛君才既而見君衣刓履缺坐而語未嘗及已之窮退而詢知君終嵗食不葷不以銖忽妄售於人世之自立如君者有幾後居江陰卒所著有論語孟子講義廣陵集十卷䝉求一卷沈季長字道原眞州人舉進士第累官崇政殿説書元豐初帝御邇英殿季長進講周禮稱㫖帝論漢武帝學神仙為貪生以固位因言人臣固位天下之士能輕爵禄者少季長曰士輕爵禄為士言之則可為國言之非福也人主有尊德樂道之心士皆以不得爵禄為恥至於言違諌愎士有去志始以爵禄為輕帝曰誠如卿言後官至國子監直講王居正字剛中揚州人熙寧中王安石以新經義頒天下居正獨非之十餘年不應舉至宣和三年始第進士仕終史舘修撰髙宗初居正次前世聼納事為集諌十五卷以開廣上意於上前極論秦檜檜諷中丞何鑄劾居正為趙鼎所薦奪職楊時嘗出所著三經義辨示居正曰吾舉其端子成吾志因著毛詩辨學詩辨學周禮辨學及辨學外集等書堯允恭字克遜海陵人兩領鄉薦專意經傳尤邃於易有詩文二十卷明石光霽字仲濂泰州人讀書五行俱下洪武中以貢授國子學正進博士作春秋鈎𤣥王艮字汝止泰州人初授書鄉塾信口談説中理解後謁王守仁於豫章踞上坐與語氣凌其上已乃執弟子禮學益深造子襞字宗順亦以學鳴王棟泰州人艮從弟以嘉靖中歳貢為深州學正歴主白鹿洞書院著有一庵㑹語沈珠字汝淵江都人中正德丙子鄉試從祭酒湛若水遊授永新知縣陞南國子監丞若水徒滿四方珠為都講林春字子仁泰州人授業於王艮動有繩檢嘉靖壬辰㑹試第一授户部主事累遷文選郎中吏部故矜崖岸自尊重惟春氣愉色和不以行能先人母病假歸就故所讀書處講學母病間補原官時紳士講學京師者數十人志行敦實首推春選曹多事日夕勤瘁卒槖餘四金不能棺寮友賻助得殮許繼字從志儀徴人治蔡氏尚書王守仁湛若水並推重之巡撫唐龍劉節相繼按部造其廬朱永年字仲開儀徴人嘉靖中歳貢授光山知縣時世宗寵方士陶仲文官兼大宗伯奉命之興都監司臺使者皆先驅迎永年弗往既見又長揖不拜仲文大怒劾罷之歸杜門著書有集行世周蕙字廷芳泰州人始為蘭州戍卒聽人講大學首章有感遂讀書從薛瑄門人段堅李㫤遊研究五經學益邃後還泰州幅巾深衣動必由禮州人化之稱小泉先生其門人王爵字鍚之亦泰州人教人務以誠敬為本官保安州判韓貞興化人從王艮子襞游提奬後進來學者數百人督學耿定向器重之學者稱樂吾先生張懋勲字堯光江都人私淑王守仁所著有二劍齋日編及心學正統等書何堅字叔節江都人嘉靖庚子舉鄉試授臨江府判遷瀋府審理歸以修學著書為事買田射陽為溝洫蓄洩以資旱潦如古井田法製器候氣驗律聽聲又著漕渠七義當世多採用之林之瀚字爾憲儀徴人少而嗜學坐卧處皆書隨處體認天理六字以自警萬厯庚子中鄉試累官至寧州知州時稱儒吏所著有龍沙㑹語澹臺祠證學等編劉永澄字静之寳應人敦行孝友究心理學萬厯辛丑成進士歴官兵部主事孫兆祥髙郵人歳貢生潛心理學著格物論明善論天論良知論子臣心鏡等書國朝俞楷字陳芳㤗州人以歳貢充内廷供奉進經學劄子陳時文科舉之弊補天長訓導擢華亭教諭著三極易知録俞子書三刻弟梅字師巖康熈癸未進士改庶吉士授編修典試山西著有治河方畧郭嗣齡字引年江都人為仲父後以孝聞家貧授徒積脩脯為兄嫂營喪𦵏研精理學所著神化性命通一無二論士林傳之其傳記序説皆具古法康熈乙未成進士授松江府教授潔已課士為一時廣文之最雍正癸卯同考浙江鄉試其從兄彭齡字商山康熈丙午舉人文譽與嗣齡競爽徐州府漢韋孟彭城人為楚元王傅及孫王戊荒滛不道孟作詩諷諌後亡去位徙家於鄒自孟至賢五世為鄒魯大儒魯賜碭人受詩于申公官至東海太守治民有廉節稱嚴彭祖字公子下邳人以春秋公羊専門教授宣帝時為博士歴河南東郡太守入為左馮翊遷太子太傅廉直不事權貴或勸其少自勉强以取宰相彭祖曰凡通經術固當修行先王之道何可委曲從俗苟求富貴乎官終太傅蔡千秋字少君沛人嘗受榖梁春秋於魯榮廣及皓宣公宣帝時為郎召見與公羊家並説帝善榖梁説擢千秋為諌大夫給事中田王孫碭人受易於丁寛王孫又授施讐孟嘉梁丘賀由是易有施孟梁丘之學髙相沛人治易亡章句專説隂陽災異自言出於丁将軍寛授子康由是易有髙氏學施讐字長卿沛人從田王孫受易常謙讓稱學廢不教授後以梁丘賀薦拜博士甘露中與五經諸儒雜論同異於石渠閣讐授張禹禹授彭城戴崇繇是施家有張彭之學翼奉字少君下邳人治齊詩好律歴陰陽之占元帝時待詔宦者署言事必採究經史窮極隂陽以寓法戒論祭天地於雲陽汾陰及諸寢廟不以親疏迭毁皆煩費違古制後定迭毁禮徙南北郊皆自奉發之以諌大夫終子孫皆以學為儒官翟牧字子况沛人與蘭陵白光同受易孟喜為博士由是有翟孟白之學焦贛字延壽梁人自云嘗從孟喜問易㑹喜死京房以為延壽易即孟氏學從之至成帝時劉向考易説皆祖田何唯京氏為異由是易有京氏學戴崇字子平沛人受易丞相張禹得施讐之傳後為九卿戴賔沛人平帝時以施氏易授陳留劉昆昆以異政顯慶普字孝公沛人與大小戴同受禮於后蒼為東平太傅普授魯夏侯敬橋仁字季卿梁人與同郡楊榮從小戴受禮學仁仕為大鴻臚榮仕為琅邪太守由是小戴有橋楊之學龔舍字君倩通五經以魯詩教授與兄龔勝並著名節世謂之楚兩龔舍不願仕以勝薦徴為諌大夫病免哀帝時即家拜太山太守之官數月乞骸骨王莽居攝中卒唐林字子髙受書於長安許商商師周堪得大夏侯勝之傳者也商門人四科林列德行後以明經飭行顯名於世王莽時上疏諌正有忠直節褚少孫沛人事王式問經數篇式謝曰聞之於師具是矣自潤色之鄧彭祖字子夏沛人受易於五鹿充宗官眞定太傅陳宣字子興蕭人博學明魯詩光武徴拜諌議大夫帝出宣前引行稍遲乘輿欲驅鈎宣御者墮車下宣諌曰王者車鳴鸞步佩玉孝文帝却千里馬謂朕乘是馬獨先安之願以文帝為法帝納其言遂徐行按轡申章昌字曼君楚人梁丁姓弟子傳穀梁春秋為博士至長沙太傅徒衆尤盛由是穀梁春秋有申章氏學聞人通漢字子方沛人后倉説禮數萬言號曰后氏曲臺記授通漢通漢以太子舍人論石渠至中山中尉三國嚴畯字曼才彭城人善詩書三禮性純直避難江東張昭薦為騎都尉魯肅卒呉主以畯代肅畯固辭樸素書生不閑軍事諸葛亮深善之所著孝經傳潮水論傳世宋劉顔字子望彭城人好古學不專章句舉進士知龍興縣免官家居教授數百人所著有儒術通要經濟樞言石介見其書嘆曰恨不在弟子之列子庠見宦績明劉儼字若思蕭人洪武中知慈利縣廉惠並著儼好學明經義邑令郝玘為建易安書院聚徒授講蕭士悉宗之馬津字宗孔徐州人蕙裔孫正德丁丑進士任餘干令宸濠反從王守仁征討擢御史抗疏敢言遷大理寺丞出為福建提學副使端已帥物秉經貞教士皆悦服所撰有克復諸篇許詢字問芻蕭人氣體端凝詩書外無他嗜好尤精周易尚書每御臯比為弟子説經語如注疏聽者競相傳寫丙子罹寇難門人私諡之曰文端先生太倉州明秦約字文仲太倉人父玉居崇明孝友工詩洪武初約應廷試愼獨箴拜禮部侍郎以母老辭歸再徴詣京師上書言事上悦以約年老難劇任授溧陽教諭御史練則成等薦之稱為宿學遺老云陸釴字鼎儀太倉人天順癸未㑹元為東宮侍讀亶心敷納禮度莊雅憲宗每屬目焉以疾乞歸釴潔清有志操學問淹洽文章完愼病亟猶自以東宮舊人具遺章言事其不忘家國如此趙中行字子與嘉定人嘉靖癸夘舉於鄉好學厲志節以經綸自負時邑有倭警中行為畫守禦之法邑人賴之上公車不第有故人重其才薦於嚴相嵩擬授臨清州守中行夜促裝南還其進退不茍如此張采字受先太倉人崇禎戊辰進士少與張溥同讀書七録齋中以六經史漢倡明古學時號婁東二張通籍後集鄉老自誓毋使宗黨子弟奴僕勢凌鄉里渝約者共斥之風俗一變令臨川移疾歸益潛心濂閩之學溥性寛博愛而采嚴喜甄别可否故銜采者多所著有知畏堂集張溥字天如太倉人崇禎辛未進士選庶吉士乞假歸益讀書倡古學曰復社學者歸之以不及門為恥時有以婁東社黨中溥者事下巡撫都御史提學倪元珙言諸生誦服聖賢聚徒講習無可罪者㑹溥病卒而張采疏辨事乃已後以御史給事中交章言溥砥行力學表章六經請徴遺籍備乙覽奉㫖呈進黄淳耀字藴生嘉定人崇禎癸未進士少即以聖賢自期著自監錄知過錄後為日厯晝之所為夜必書之晚而造詣益深詩古文悉軌先正原本六經緼袍糲食不茍取一錢嘗白一人寃其人欲餽之五十金而不敢言乃納諸書笥經數日檢出大駭還之嘉定破從容入僧舍與弟淵耀相對縊死淵耀字偉恭諸生好學敦行如其兄國朝陳瑚字言夏太倉人崇禎壬午舉人少通五經求實學鼎革後與其門弟子磨礲名行䃚礪經術粹然為居敬窮理工夫著有聖學入門四書講義求道録切已録等書王御字聖乘太倉人明季以舉人令房山力懇上官疏除瘠田浮賦房民得甦引疾歸杜門却掃尋繹遺經以倡明絶學為己任請業者必告以立心為己􅆂養性情之實著有證我箋先賢學記等書陸元輔字翼王嘉定人少師黄淳耀以敦篤之姿精微之學稱之自早年以存誠主敬自勵至老不倦其學博極羣書而要歸於六經士大夫相語往往稱陸先生不舉其字也康熙十七年有以博學鴻儒薦者元輔雅不欲違素志以不入格罷歸所著有十三經註疏類抄續經籍考陸世儀字道威太倉人少穎悟尤究心先儒語錄及經濟諸書順治間督學張能麟聘輯儒宗理要後嘗講學於鍚山東林書院説易於毘陵大儒祠受業者數百人著有思辨錄論學酬答康熙五十年巡撫張伯行刻其集稱為吾道干城周象明字懸著太倉人康熙壬子舉人性行端潔臺司延請講學象明正容就席為説洪範九疇大㫖及先賢敬一箴精切詳明一時父老子弟莫不拱聽著有七經同異錄尚友編事物考辨蘇松田賦備考共數百卷没後門人春秋祀之海州隋包愷字和樂東海人兄愉明五經愷悉傳其業從王仲通受史記漢書尤稱精究學漢書者宗之教授嘗數千人大業中為國子助教卒江南通志卷一百六十三欽定四庫全書江南通志卷一百六十三人物志儒林一江蘇松常鎭淮揚徐八府太海二州班固言儒家者流其道最為髙裒集諸儒修經學者述儒林傳其特為傳者如沛施讐髙相東海后倉嚴彭祖附見者若江東馯臂子弓碭田王孫魯賜沛戴崇子平褚少孫淮陽彭宣淮南賁生山陽張就張長安東海髪福九江陳俠張邯皆今江南地所産也葢其盛如此然則源流𣲖别支葉蕃滋居可知矣况聖朝彰闡六學勸興黌序所以崇奬風厲倍隆於古者乎或授受一經或旁通大義為箋疏傳註之學尤較著者具録於篇江寧府三國唐固字子正丹陽人修身積學稱為儒者著國語公羊穀梁傳註講授常數十人孫權為呉王拜固議郎自陸遜張温等皆拜之黄武四年為尚書僕射卒唐許叔牙字延基句容人邃於詩禮貞觀間拜𢎞文館直學士獻詩纂義十篇子子儒字文舉髙宗時議北郊禮許淹句容人精訓詁與魏横公孫模皆以博學名家宋周啓明字昭囘昇州人景德中舉賢良方正既召㑹東封報罷弟子百餘人不復求仕轉運使陳堯佐表其行義於朝賜粟帛仁宗時除試助教遷太常丞元孫轍金陵人學行純篤教授不倦口不及人過士至郡以不詣轍為恥諸部使及長吏之賢者多造請焉明陳遇字中行江寧人博究經史仕元為温州教授棄官歸明初以薦召見太祖與語大悦命為翰林學士中書左丞禮部尚書皆不受然國家事多所獻替非正道不陳眷待甚厚卒賜葬鍾山子恭官至工部尚書陶元素字希文上元人正統元年進士乞歸養親歴聘典浙江河南鄉試家居吉凶禮儀悉遵朱子而叅以時制金潤字伯玉上元人正統間以鄉貢授兵部司務己巳威喇入宼上欲親征潤白於尚書鄺埜曰細事未可重煩車駕上疏不報土木之變言於司馬于謙請堅壁清野以待之謙從其言軍國大計每與咨議知南安府致仕潤有文章尤邃於易嘗畫圖系解著淵學探微十二卷沈鐘字仲律上元人天順庚辰進士授驗封主事改南主客司與章懋羅倫為友時稱十君子歴陞僉事副使督學湖廣山東仕三十餘年無所干謁李文正稱之曰今之不識相門者仲律一人耳蔣浤字惟深上元人成化丁未進士官叅議性樸茂篤孝友家居數十年杜門讀書人罕覿其面喜讀性理大全通鑑綱目每閲一遍用一色筆評註至五色皆備字畫精好顧文莊見之曰即此可見前輩風流金賢字士希江寧人𢎞治壬戌進士授給事中奉命勘兩淮重獄時奄瑾亂政諸司讞獄皆取瑾意㫖賢獨否瑾恨之出守大名徙延平歸賢精春秋學病諸傳之舛令微文隱㫖不見於後著紀愚十卷或問百篇行世景暘字伯時上元人正德戊辰進士除翰林院編修時逆瑾亂政陵轢朝士景暘獨弗阿毎當進講必越宿齋沐覬有感悟遷國子司業六館諸生咸以為得師改左中允管南京國子司業事南方士習稍正以母憂去遂卒暘性篤孝義母目盲暘旦夕禱於神雙眸復明殷邁字秋溟江寧人嘉靖辛丑進士仕至貴州提學副使以疾歸復起提學浙江進太僕寺􅀸釐革雇役偽票諸弊萬厯中張居正當國以邁有盛名欲引以為重邁不應久之進南太常旋以禮部侍郎管南祭酒致仕學者稱白野先生盧璧字國賢金吾衛籍嘉靖戊戌進士仕至苑馬寺少卿孝友廉介居官常禄外秋毫無取歸杜門却掃人罕見其面楊希淳字道南上元人年十四督學胡象岡試孔子惜繁纓論意為宿學見其㓜更異之督學耿定向試以學莫先於立志論尤相賞契生平操持甚嚴嘗力却人厚餽臨終戒無丐人銘墓曰我固無求者死後乃有求耶李登字士龍上元人文行特著隆慶初選貢授新野令折鍰納粟以備饑築堤成梁以捍水民戴其惠以伉直忤時改崇仁教諭講明鄒魯之學有願學篇寳唐語録朱之蕃字元升衣之子萬厯乙未殿試第一奉使朝鮮遇屬國君臣嚴重有體事竣盡却餽贐朝鮮重之擢右諭德掌南翰林院事晉南禮部侍郎丁艱歸不復出素行孝友既貴悉以遺田推弟辦同產子女之婚嫁分宅居父執之妻孥鄉黨重之顧起元字隣初國輔子萬厯戊戌㑹試第一殿試第三由編修歴吏部左侍郎當軸欲引以大拜起元避居遯園七徴不起友人題其小築曰七召亭學問該博凡古今成敗人物賢否諸曹掌故無不通曉居家絶迹公府惟地方利弊不恤身任而力爭之後卒諡文莊鄭宗化字尚德上元人以明經教諭滁陽學者宗之稱明臺夫子孝友端慤游於耿定向羅洪先焦竑之門顧起元目為今之黄憲子元厚讀書敦行有父風劉閔字子賢六合人家貧力養母或恚怒則衣冠跪牀下以父喪未葬三年斷酒肉不内寢朔望輒號於殯所隣族憐之為助其葬妻失愛於母出之終身不復娶當事交薦其學行詔授本學訓導所著有家禮考註昭穆圖宗子説五倫啟䝉等書國朝張正綱字敦五上元人敦勵實學嘗云孔辨君子小人孟辨舜跖之徒未有利關不破可以語為人者注周禮離騷春秋多昔賢所未發張自超字彞嘆髙淳人康熙癸未進士博極羣書研究經史一以躬行實踐為主不事聲華釋褐後授經講學文行日著徐元夢撫浙時禮聘為書院山長後奉召入都行至茌平無疾而終未竟其用著春秋宗朱辨義蘇州府漢臯𢎞字奉卿呉人家世冠族少有英才與桓榮相善榮薦其經術自揚州從事拜議郎子徽官至司徒長史顧綜字文偉呉人明帝時辟有道歴官至尚書令帝舉三代之禮以正月上日幸辟雍延綜為三老設几杖從綜乞言焉南北朝齊張緒字思曼呉人父演太子中舍人緒少知名清簡寡欲齊髙帝用為太常卿領國子祭酒緒長於周易言精理奥見宗一時遇者肅然如在宗廟卒諡簡子子充多所該通尤明老易仕齊累官義興太守為政清浄梁天監初歴吏部尚書居選以平允稱遷國子祭酒登堂講説皇太子以下多執經以拜梁皇侃呉郡人少好學師事㑹稽賀瑒精力専門盡通其業尤明三禮孝經論語仕梁為國子助教於學講説聽者常數百人召入壽光殿説禮記義武帝善之侃性至孝日限誦孝經二十徧丁母憂歸邵陵王綸欽其學厚禮迎之尋卒所撰諸經義並見重於世學者傳焉陸璉呉郡人天監四年詔開五館建立國學總以五經教授置五經博士各一人以璉及沈峻等補博士各主一館館有數百生給其廪餼於是懷經負笈者雲㑹焉陳陸慶呉郡人徧通五經尤明春秋左氏傳節操甚髙仕梁為婁令入陳屢辭徴辟築室屏居永陽王欲見之不可得乃於陸榮宅穿壁觀之謂榮曰嚴君平鄭子眞何以加兹子士季從顧野王學左氏馬班諸書唐初終𢎞文館學士張沖字叔元呉郡人仕陳為左中郎將好覃思經典撰春秋義畧喪服孝經論語義諸書後入隋授漢王諒侍讀諒出牧并州引為博士子後印隋潘徽字伯彥呉郡人少受禮於鄭灼受詩於施公受書於張沖並通大義尤精三史始煬帝鎭廣陵引為博士令與諸儒撰江都集禮及帝嗣位復詔徽與褚亮等助楊素共撰魏書㑹素卒而止褚輝字髙明呉郡人以三禮學稱於江南煬帝時徴天下儒術之士悉集内史省相次講論輝博辯無能屈者擢太常博士唐陸德明名元朗以字行呉人陳大建中太子徴四方名儒講於承光殿德明始冠與國子祭酒徐孝克抗對屢奪其説舉座咨賞入隋為國子助教王世充僭號遣其子元恕即其廬行束脩禮德明恥之服巴豆㪚卧東壁下元恕入拜德明對之遺痢竟不與語世充平太宗徴為秦王府文學館學士命中山王承乾受業貞觀初終國子博士太宗後閲德明所撰經典釋文甚嘉之厚賜其家張後印字嗣宗隨父沖在并州以學行見稱髙祖鎭太原引居賔館以春秋授太宗武德中擢員外㪚騎侍郎太宗即位歴國子祭酒嘗賜宴月池令羣臣以春秋酬難帝曰朕昔受大義於君今尚記之永徽中致仕卒諡曰康陪葬昭陵孫齊邱累官朔方節度使東都留守諡貞獻朱子奢呉人通春秋左氏傳博觀子史隋大業中直祕書學士入唐授國子助教貞觀初髙麗百濟同伐新羅連兵數年不解新羅遣使告急帝令子奢充使諭㫖以釋三國之憾子奢雅有儀觀海外欽服皆上表謝罪累轉𢎞文館學士唐初太廟止四室子奢始發七廟之議帝嘗欲觀起居紀録子奢曰陛下無過舉雖見無嫌然以此開後世史官之禍可懼也上雖不從人多韙之施士匄呉人明毛鄭詩通春秋左氏傳善講説朝之賢士大夫從而執經考疑者繼於門太學生習二經者皆其弟子由四門助教為博士秩滿當去諸生輒拜疏乞留貞元十八年卒官韓愈誌其墓陸質字伯沖呉人本名淳以避憲宗諱改質有經學尤深於春秋少師事趙匡匡師啖助質盡得其傳陳少游鎭揚州辟為從事後薦於朝拜左拾遺歴給事中皇太子侍讀卒學者稱文通先生元延祐中集賢大學士曲出言質所著春秋纂例辨疑微㫖三書有益後學請令江西行省鋟梓以廣其傳仁宗從之宋陳之竒字虞卿呉人天聖中舉禮部御試不得第退居十年無仕進意舅丁謂欲官之力辭不就寳元初及第歴太常博士之竒孝於親約於身信於朋友篤行好學逺近欽其名德皆以君子稱之錢象先字資元呉人中進士髙第宰相呂夷簡薦其經行為國子監直講終吏部侍郎象先長於經術仁宗留神經藝屢有顧問象先輒依經以對因以諷論政事時務有啟迪獻納之益留侍經筵前後十五年嘗修勅成例賜勲爵仁宗以象先事母孝特賜章服榮之朱長文字伯原呉人從泰山孫明復授經尤邃於春秋博聞强識篤學力行舉進士歴校書郎丁父憂歸家居二十年時俊咸師仰之因其所居樂圃號樂圃先生元祐中起本州教授同舉者徐積陳烈時號三先生其教人先經術而後詞章召為太學博士祕書省正字元符初卒哲宗知其清賻絹百匹生平撰述甚多並行於世林虙字德祖呉郡人登進士第教授常州身為勸率從者風靡大觀三年廷試常士預選者五十三人詔以進賢宜受上賞特轉一官知州徐申於學之南立進賢坊以榮之遷開封府左司錄請老歸虙自六經諸子而下錯綜貫穿著有易説書義等書王綯字唐公崑山人建炎初為御史中丞歴拜參知政事為人剛正有守文章温潤典雅深於理趣所著有論語解孝經解諸書王蘋字信伯呉江人從二程子於洛為髙弟通春秋視楊時猶為後進時亦以為後來師門成就惟蘋耳髙宗駐蹕平江郡守孫祐薦其學行宰相趙鼎復薦之賜出身除正字蘋奏治平三事上深嘉其通曉世務歴著作佐郎通判常州睌作論語集解未成而卒寶祐初里人沈義甫建明教堂祀蘋以陳長文楊邦弼配皆其弟子也義甫亦有名行嘗為白鹿洞書院山長力行朱子學規陳長方字齊之呉江人從王蘋游紹興中舉進士為江隂教授尋歸閉門著書學者稱惟室先生章憲字叔度常熟人樂道好德操履髙潔師事王蘋而與朱震呂本中等游尤邃於春秋呉仁傑字斗南崑山人淳熙進士歴國子學錄博洽經史為時碩儒嘗講學朱子之門詩文亦名一時所著有古易及周易圖説樂舞新書諸編衛湜字正叔崑山人參知政事涇弟好古博學嘗集禮記諸家傳説名禮記集説寳慶二年上之仕至直寳謨閣知袁州學者稱為櫟齋先生錢俁字廷碩常熟人舉進士終朝請郎平生躭味經籍尤精易學所著有易説諸編王楙字勉夫蘋從孫早孤奮學母殁後以不逮養不預鄉薦著書終老子德文字周卿孫敄字行父並有學行德文以魏了翁眞德秀薦仕至承節郎滕宬字季度呉人沈敏好學躭研經史淳熙中舉賢良以忤考官被擯後雖再召薦者不絶處之漠如也葉適薦其學行賜號廉靖居士孟文龍字震翁昭慈后五世姪孫以髙祖忠厚鎭呉遂家焉累調浙東提舉常平幹辦公事以内艱不行國亡後力辭當事之薦不出户庭三十年著易解大全三十卷子潼歴松江府判官亦以篤學勵行稱俞琰字玉吾呉縣人初以詞賦稱宋亡隱居著書不復仕進以義理之學淑諸人於書無不讀尤精易學好鼓琴既老自號石澗卒年七十餘其所纂述諸書並行於世子仲温克繼其學元邵光祖字𢎞道呉人博學好古研精經傳講習埀三十年通三經所著有尚書集義范成字性存父霖元初以名儒召歴禮部侍郎立朝有論議氣節自浙東徙呉成幼力於學卓然有立獲親炙前朝遺老治家有法以經術教授章句名數無不究極隨才誘掖成就後學郡嘗禮致為訓導子焕有孝行王原傑呉江人學邃行潔至正間領鄉薦値兵興不復仕教授於鄉所著有春秋讞議明徐逹左字良夫呉縣人從名儒受易書二經元季隱光福山中置家塾合族屬子弟教之鄉黨遵化洪武初用薦為建寧訓導師道克立所著有四子書及文集趙文字宗文長洲人永樂中用薦知鄱陽縣鄉里稱篤實君子所著有理學述言諸編王璉字汝嘉長洲人贊善璲弟舉明經歴大庾教諭永樂初召修永樂大典充副總裁又修五經四書性理大全書成留為翰林五經博士進侍講洪熙初開𢎞文閣璡與楊漙陳繼日直其中禮遇甚厚璡文章不及璲而理致為勝制行醇篤楊士竒深重之楊翥字仲舉呉縣人少以德量稱仁宗朝楊士竒薦之召授編修歴禮部尚書告歸翥修身謹行言動不妄與物無競一時搢紳推厚德者翥為最文章平實恬和如其人顧巽字順中長洲人受易於鄉儒周傳永樂甲辰進士呉中易學實始於巽當時賀廉孔友諒顧珣皆從巽受經尤安禮字文度長洲人父義字崇道有名行安禮少從父寓武昌與楊士竒楊翥以德業相勵建文元年舉於鄉為方孝孺所取士仕至貴州參議安禮平居若無所可否至辨析理欲毫介不茍金問字公素呉縣人少受易於俞貞木家貧無書從人借讀無不通曉永樂時以被薦為司經局正字時宮僚多得罪問與黄淮楊溥同坐繋三人相得甚省躬念咎之暇各持一經講論曰此處憂患之道也正統間終禮部右侍郎問義聞流著平生閲履否泰相循而不變所操製述雅健書得魏晉筆法星厯之學尤精兄聲亦好古嗜學問事之如嚴師劉鉉字宗器長洲人事母以孝聞永樂時以善書徴入翰林遂舉庚子鄉薦授中書舍人宣德間與修實録言行不茍與人交一以誠信權門要路未嘗渉迹歴國子祭酒嚴教條以約諸生無敢倖進者天順初遷少詹事侍太子講讀卒上嗟悼曰安得學行醇篤如斯人者耶諡文恭陳繼字嗣初呉縣人汝言子生十月而孤家所存惟書二萬卷其母守節教繼及長學成名盛事母至孝有司上其事使御史察之繼方隨母抱甕行灌母以壺漿與之拜而後飲朝廷嗟異仁宗初以楊士竒薦召授翰林五經博士時初開𢎞文閣繼日直閣中備顧問進檢討致仕繼為人端恪其學自經史百氏皆考究精核文章根義理臨卒誦西銘存順没寧二語而逝子寛完皆能文王庭字元直崑山人少師事葉文莊盛盛甚器之領天順壬午鄉薦授鄜州學正終瀋王府長史庭學貴踐履不尚詞華律身教人動以禮法周木字近仁常熟人成化乙未進士歴官河南布政生平究心理學晚尤好易所畫諸圖因羲文邵子之所命者而衍之其於洪範所陳配合皆有倫類居家冠婚喪祭悉遵古儀注學者稱勉思先生子炯字光宇舉進士累官山西布政以才守稱鄧韍字文度本姓蔡常熟人正德丙子舉人以通經博古為學常倣呂祖謙大事記論次古今得失曰如有用我執此以往為文有體要尤篤好濂洛關閩之學杜偉字道升呉江人嘉靖壬子舉人官工部主事篤志聖學講明濂洛宗㫖躬行實踐不務標榜所著有正學編諸書學者稱静臺先生徐師曾字伯魯呉江人嘉靖丁未進士歴官吏科給事中移疾歸里闢書舍南湖上講誦如諸生萬厯中屢詔起辭不赴益研究經學撰禮記集註諸編學者稱魯菴先生歸有光字熙甫崑山人弱冠通六經三史蔚為大儒嘉靖庚子舉南闈第二人八上春官不第讀書談道居嘉定安亭江上四方來學者數百人海内稱震川先生乙丑舉進士歴官太僕寺丞所著有洪範傳諸編子子慕字季思萬厯辛卯舉人再試不第屏居江村講性命之學懷宗中有詔搜訪遺逸時子慕已前卒巡按表其名行追贈翰林院待詔孫昌世字文休曾孫莊字元恭並以詞翰擅名王應電字昭明崑山人受業於魏校篤好周禮謂周禮自宋以後或著書指摘或以己意更次此皆諸儒之周禮也覃精十載求聖人之心溯斯禮之源原設官之意成周禮傳詁數十卷以為百世不易矣既就正羅洪先洪先嘆曰昭明之書如盤根樛枝附麗宛轉即白虎諸儒莫能駕其上也翰林陳昌績以師禮事之江撫胡松為刋行於世應電又研精字學訂正説文譌謬名曰經傳正譌又著同文備考書法指要諸編並行於世王敬臣字以道長洲人江西叅議庭子事親以篤孝聞人目為王曾子少受業魏校聞黙成之㫖嘗言議論不如著述著述不如躬行自見耿定向語以無獨成之學由是多所誘掖弟子從游者四百餘人其學以愼獨為先深以標立門户為戒學者稱少湖先王萬厯中廷臣薦其學行以博士徴辭不行詔以所授官致仕後復以巡按薦詔有司時加優禮鄭光宙字道夫呉縣人師事王敬臣盡得其傳敬臣晚歳每語來受業者曰道夫進業立誠足為學者師盍往事之自是生徒日盛所著有周易管窺諸書學者稱拱山先生何思佐字穎凡長洲諸生家世以儒學相傳精曲臺禮有纂述行世楊廷樞字維斗呉縣人兵部尚書成孫孝子大濚子舉懷宗庚午鄉試第一為諸生時即以文章氣節負重名與諸名流分經立課集漢唐以下諸儒義疏傳説辨其源流得失領解之後聲譽日盛士林奉為模楷因其所居臯里稱臯里先生門弟子著錄者二千人甲申之後授命蘆墟門人私諡忠文王錫闡字寅旭呉江人博綜羣書尤精厯象之學創新法候日月食較密於前人撰有厯法厯説諸編一時碩儒皆推服其學究天人韓洽字君望長洲人隱居羊山以髙節著深於字學所著有篆學測解釋訓考源識者言足證説文長箋之誤楊无咎字震伯廷樞子痛父罹難杜門隱居歴八十年與徐枋朱用純稱呉中三髙士生平覃思經學多闡前人所未發所著有譚經録諸書朱用純字致一父集璜殉難時用純方補郡諸生茹哀隱痛遂棄舉業授徒贍母潛心理學四子六經及濂洛關閩之書探索融㑹務在躬行實踐所著有四書講義諸編國朝顧炎武字寧人崑山人貢生少負異質篤志古學九經諸史皆能背誦生平足跡半天下所至考其山川風俗疾苦利病如指諸掌凡所論著皆上下古今貫串精核卓然成一家言當代咸服為通儒於六書音義尤有獨得李光地以為自漢晉以來所未有學者稱亭林先生楊彞字子常常熟人以貢歴都昌知縣移疾歸少與婁東顧夢麟友善明季俗學多創新説背傳註彝與夢麟講説辨難力明程朱之説天下翕然從風稱楊顧之學晚年目盲猶請友人讀書其側為諸生講説無少倦朱鶴齡字長孺呉江諸生嗜古博學注杜甫李商隱詩時稱詳贍晚年潛心六經長於箋疏之學考證精核所著有毛詩通義尚書埤傳諸編彭定求字勤止長洲人康熙丙辰㑹試殿試俱第一授脩撰歴官侍講先後里居二十餘年泊若寒素父瓏舉進士自長寧令罷歸結社講學學者宗之定求夙承門風又從游湯潛菴先生之門益研求心性宗㫖粹然負儒者之望嘗編纂儒門法語䝉正錄諸書儀封張公伯行撫蘇尤相契合裁成後學佽助為多王喆生字醇叔崑山人明刑部郎中臨亨孫舉人志長子少師事邑中耆儒朱用純能得其傳舉康熙壬戌進士官編修授職七月即乞假養母絶意仕進讀書敦行品望日重兩任邑中清田事先後為中丞湯斌宋犖所推表章前哲扶植桑梓每不遺餘力著懿言日錄張伯行稱其精深博大比之抑戒云松江府三國陸績字公紀呉郡人康子博學多識星厯筭數無不該覽孫權統事辟為奏曹掾出為鬱林太守加偏將軍績意在儒雅非其志也雖有軍事著述不廢作渾天圖注易釋元皆傳於世南北朝陳顧野王字希馮呉人七歳讀五經知大㫖長而徧觀經史精記黙識天文地理蓍龜占候蟲篆竒字無所不通以篤學至性知名仕梁及陳歴官黄門侍郎所撰有輿地志玊篇元象表諸書行世孫道衍字正平唐開元中登文學優贍科宋陳伯逹華亭人紹興中進士其學深於經術著洪範九圖九説田疇華亭人嘉定間嘗設講席於國學六館之士皆執北面禮所著有學易蹊徑等書元陳宏字君宏華亭人以儒業著聞邃於易嘗著易象發揮易孟通言童子問夏侯尚元字文卿華亭人為文下筆立就嘗作中庸管見聚疑原孟等書皆出先儒議論之表趙孟頫薦為東宮伴讀既而主禮典樂皆稱職郯王聞其賢招致之待以國士王被誣誅尚元力陳王忠孝數事得白遂歸不復仕王昭大字茂卿華亭人博綜經傳於易尤精詣授湖州教授致仕歸周之翰字申甫華亭人博極羣書尤精易學所著有乾坤闔闢天地生成隂陽變化山川流峙四圖并贊以發其藴自號易癡道人講授於鄉以壽終王文澤字伯雨上海人博學通經所著有尚書制度圖三卷官府學訓導子黙字子章多藝善談論書法趙孟頫至正中徴至京書金字釋典擬官翰林力辭歸明殷奎字孝章華亭人少從楊廉夫受春秋洪武四年以薦授陜西咸陽教諭所撰有道學統系圖家祭儀關中名勝集後徙居崑山卒門人私諡文懿先生弟璧箕俱明經篤行林鐘華亭人有學行通詩書春秋宣德中任崑山訓導入侍經筵歴遷山東參政宋瑛字克輝華亭人少嗜學既領鄉薦益肆志學問務窮理期有以體之身心措諸事業登天順丁丑進士授工部主事人樂其簡易而憚其嚴中貴人不悦偵其過無所得遂引疾歸遠方來受業者甚衆事母孝居喪哀毁有燕乳白雛於堂徐三重字伯同青浦人萬厯甲戌舉禮部丁丑廷試授刑部主事時政尚綜核而三重獨持平恕甫滿一考即乞假歸以父老遂不復出家居四十餘載内行醇謹門風肅穆生平篤志理學以朱子為宗學者稱鴻洲先生所著庸齋日記信古餘論諸書皆可埀世範俗長子貞秩以孝謹稱次子貞稷字叔開由進士官刑部主事亦有平允名歴東川兵備以父年七十乞侍養歸屢薦不起以名德重一時貞秩子銘敬貞稷子銘常懷宗時俱領鄉薦錢大復字肇陽華亭人領萬厯鄉薦授蓬萊令每月朔集諸生講義致仕歸構日新書院講理學歴九年寒暑不輟其門人莊大儒字仲醇尤刻志聖賢之學子龍錫徐鳯彩字聖期華亭人太學生與兄孚逺聲名相埒六經皆有纂述尤精於詩所著詩經輔註四卷子允貞孫懷祖皆有士行國朝張昺字長史華亭人康熙辛未進士選庶吉士性恬澹無營淬志理學座師李光地於禮闈閲策深賞其西銘之對能闡先儒所未發入史舘後又頻與講論契合尤深謂門弟子中穎悟無如昺者未久疾卒所著西銘圖論中庸精義光地皆錄而存之常州府宋杜鎬字文周無鍚人南唐時舉明經任集賢校理仕宋為崇文院檢討㑹將祀南郊彗星見宰相趙普問鎬鎬曰當祭而日食猶廢况謫見如此乎帝嘗問西漢賜與用黄金而今難得何也鎬曰當時佛事未興故金價賤預修册府元龜特置龍圖閣直學士以榮之累官禮部侍郎博學多識眞宗每得古器異書必詢之皆能究其本末張巨武進人少從胡瑗遊與同郡蔣之竒胡宗愈丁隲為四友嘉祐中舉明經歴國子監直講王安石新經行巨即引去時論髙之著易解十卷龎安仁字宅道晉陵人通五經尤長於易鄒浩從受業唐棣字彥思宜興人政和五年進士從河南程頤學能得其傳編次伊川語録百餘條歴官祕書少監丁隲字公㸃晉陵人嘉祐初進士以經學倡後進尤長於易春秋李定用事辟為屬以疾辭蘇軾曾肇孔文仲交章薦隲司馬光當國隲謁之獨後光曰眞自重士也除太常博士改右正言元祐間疏請正士風後出知處州周孚先字伯忱晉陵人偕弟恭先往洛從程頤學與楊時相友善在頤門下凡十七年後歸生徒逺至者衆創城西城東書院兄弟分主之楊時至郡館之城西命諸生師之孚先由鄉薦入太學官臨安教授著有論語解凌浩字直翁無鍚人與同邑陳敏同學於胡瑗以經術知名治平乙巳進士嘗為蓬萊武陟令以能名召拜太學博士推胡瑗之學以誨士士多從之出守渠陽元陸文圭字子方江隂人博通經史百家及天文地理律厯醫藥筭數之學為文融㑹經傳東南學者皆宗師之朝廷屢遣使馳幣聘之以老疾不行所居在城東學者稱之曰墻東先生有墻東類稿二十卷梁益字友直江隂人博洽經史而工於文詞陸文圭卒後浙西稱學術醇正為世師表惟益一人所著有詩傳旁通發揮朱子之學為精又有詩緒餘史傳姓氏纂陸以道字士𢎞無鍚人明易溯程朱之源得象外㫖至正二年進士歴翰林待制明謝應芳字子蘭武進人篤志好學以道義名節自勵元至正初隱白鶴溪上授徒講學江南平有司徴脩郡志强起赴之德望重東南縉紳逹官過郡必訪其廬詩文典雅藴藉有辨惑編龜巢稿毘陵續志思賢錄孫作字大雅後以字行江隂人世以儒名為文醇正典雅著書十二篇號東家子宋濂比之法言通書元季避兵呉中張士誠廩禄之旋謝去客松江以居洪武六年召脩日厯書成累擢國子司業坐事免復起待詔終長樂縣教諭門人稱清尚先生陳濟字伯載武進人與弟洽浚從謝應芳遊濟尤學問該博成祖修永樂大典用大臣薦以布衣召為都總裁書成授右贊善又命授諸皇孫書僦室以居僅蔽風雨為文章根據經史必務理勝不事葩藻所著有詩傳通證書傳補經元史舉要通鑑綱目集覽正誤諸書周衝字道通宜興人由舉人仕訓導至唐府紀善遊王守仁湛若水之門嘗曰湛之體認天理即王之致良知也兩家門人各相非笑衝為疏通其㫖與蔣信集師説為新泉問辨錄薛應旂字仲常武進人嘉靖乙未進士由慈谿令改九江教授徐階督學江西檄掌白鹿書院事擢南吏部考功郎中主察典輔臣嚴嵩令尚寳􅀸諸傑囑應旂去一御史應旂反黜傑嵩怒嗾御史劾之謫建昌通判歴浙江提學副使罷歸所著有考亭淵源憲章錄宋元通鑑甲子㑹紀四書人物考髙士傳浙江通志諸書王升字世新宜興人由嵗貢官國子學錄張居正柄國欲網羅當世知名士託升友道意欲令典制勅升力辭不就通判成都有廉譽遷鹽課提舉謝歸有四書輯畧讀左贅言諸書行世學者稱孚齋先生錢一本字國瑞武進人萬厯癸未進士由知縣擢御史上建儲論相二疏語極戅直斥歸郡守歐陽東鳯構經正堂講學推一本主之與顧憲成分主東林講席學者稱啓新先生最精易學有像象管見象鈔續鈔範衍呉桂森字叔美無鍚人從顧憲成髙攀龍講學東林書院萬厯丙辰歳貢廷試歸學易於錢一本受所著像象管見廣其意作像象述像象金針易説談易隨問同邑諸生鄒期楨字公寧亦從攀龍學静坐有得時稱兩素衣先生華允誠字汝立無鍚人天啟壬戌進士對䇿極陳奄寺之害置二甲除户部主事値魏璫亂政告歸懷宗初起工部員外郎京師戒嚴守德勝門稱㫖改職方劾輔臣温體仁尚書閔洪學朋比阿黨詔奪俸旋乞歸後殉國難少與兄允謀允誼從錢一本髙攀龍游盡得其學俱以儒學稱允誠有春秋説四書大全叅補允誼有三象粹精春秋傳戴記纂疏諸書行世岳虞巒字舜牧武進人崇正辛未進士歴江西按察歸惟以著書為事晚尤好易撰周易感春秋平義二書時宜興諸生儲漧受學於錢一本著有易疑春秋屬比直書子秬亦以學稱有周易集義呉鍾巒字巒穉武進人崇正甲戌進士少從髙攀龍顧憲成講學門下士數百人江陰李應昇為最初令長興以旱潦緩徴税不中額謫紹興府照磨量移桂林推官國亡自焚死所著有周易卦説大學衍義霞舟語録諸書秦鏞字大音無鍚人崇禎丁丑進士令清江多惠政父爾載師事髙攀龍鏞承家訓精理學著有易序圖説通書解皇極内篇小衍叅同閣集李如一初名鵬翀字貫之江隂人應昇從父篤學好古其論學以六經為淵海箋疏為梯航謂朱子戴記未有成書網羅鈎貫撰禮記緝正通儒稱之堵景濂字濂生無鍚人崇禎壬午舉人授徒講學學者稱禾齋先生從游者八百餘人有禮經貫四書就正語時江陰諸生顧文熊亦著禮經集解及厯象圖書二考諸編國朝任元祥字王谷邑諸生學以良知為宗持身嚴肅言動不茍建宗祠定宗法族人世世遵之詩文眞樸典則井然與商邱侯方域寧都魏禧同邑陳維崧名相埒著鶴鳴堂集商邱宋犖序之董以寧字文友武進人郡諸生天資明敏少喜為詩詞古文於天文厯象樂律方輿之㫖多所發明晚年盡棄去専事窮經於易宗來知德闡錯綜之妙於春秋則欲參三傳而另為一書著正誼堂集秦松齡字留仙無鍚人順治乙未進士歴官左春坊左諭德七歳讀中庸閉目潛思良久告其師曰吾識性矣十九官庶常世祖章皇帝召試詠鶴詩有髙鳴常向月善舞不迎人之句指示閣臣曰此人必有品置第一以逋糧案罣悞歸田旋以博學宏詞薦侍從講幄纂修明史里居二十餘年研精宋五子書窮經尤邃於詩著毛詩日箋髙愈字紫超無鍚人攀龍從孫私淑乃祖言動不茍父嗜飲每赴宴愈必袖小燈伺道旁扶掖歸雨雪益謹與人言依於孝弟肫懇動人尤嚴取與年七十門弟子共市一新冠為壽猶却之邃經學周禮尤精熟以歳貢終華學泉字天沐無鍚人性聰穎嗜讀書於六經各能㑹通古人義疏而折衷以己意著述甚多尤深於易起居坐卧惟易是偕為人豈弟樂易篤於同氣鍵户四十餘年以布衣終呉晉剡字錫孺宜興人順治壬辰進士授廉州推官以清節著尋丁母憂歸結廬墓側絶志仕進遵紫陽半日讀書半日静坐之法覃思理學與同邑湯之錡相砥礪病中聞兄明孺卒力疾往哭遂不起湯之錡字世調宜興人至性純篤居親喪一循古禮就地寢苫事諸父如父於先儒書無不讀而以周子主静之説為宗倣髙忠憲復七規春秋兩㑹四方學者翕然宗之延陵書院暨鍚山東林書院各延主講席不就有詢朱陸異同者則曰顧吾力行何如耳多辨論何益其卒也整襟危坐而逝任培元宜興人父贊性敦厚直諒家貧自樂每言及明愍皇帝輒痛哭不已培元教授里中奉朱子小學為準繩嘗言既為吾弟子當為其終身謀先使識義理大分根柢既端即轉之農工商賈終不入於大惡定宗法十八則治族人子弟有犯啟祠告祖行杖雖素有名者不少假楊懷逺字文來宜興諸生讀書有疑義必究析其所以然雖先儒不敢遽信積四十年成四書明辯錄微言大義及名物典故皆在焉又考古限田均田制為一書古今祭禮為一書復纂周禮疑五經疑諸儒源流考鄉評備考諸編家貧常苦饑而一介不茍取卒金陵邸舍同時有周亦魯字型曾亦諸生為人謙謹樸茂教授里中積脩脯營家祠及祭田陳其難字克艱江隂諸生博聞强識尤深於易嘗著易圖系及六書樂律通鑑地理考學士揆叙聘至京與講易月餘安溪李光地極推服年九十五卒徐世沐字爾瀚江隂諸生不赴科舉積學力行與當湖陸隴其相契居家有禮法不作佛事年八十五卒子恪羅城令能詩文卒官孫崑諸生奔喪道死金敞字廓明靖江人好讀顧憲成髙攀龍遺書以聖人為必可學及長師事荆溪湯之錡長之錡三歳執禮恭謹之錡卒卜居無鍚遵攀龍復七規與同志静坐讀書興起者甚衆章大士字我任武進人少慕包拯海瑞為人長從湯之錡金敞得聞顧髙之學乃虚心抑氣以聖賢為歸病亟時誦邵雍上天生我詩一笑而逝鎭江府漢包咸字子良曲阿人受業長安習魯詩論語歸鄉里途為赤眉所執晨夜誦經自若賊異而遣之光武即位舉孝廉除郎中授皇太子論語遷大鴻臚經傳有疑輒遣小黄門就問顯宗以咸有師傅恩而素清苦俸賜増於諸卿咸皆㪚給諸生之貧者子福拜郎中亦以論語入授和帝三國韋昭字𢎞嗣雲陽人為太史令撰呉書孫休時為博士祭酒命昭依劉向故事校定衆書孫皓即位遷侍中領左國史皓以瑞應問昭昭答曰此家人筐篋中物耳皓欲為父和作紀昭以和未登帝位當立傳不當為紀皓滋不悦積前後嫌忿誅之所著有洞記三卷官職訓及辨釋各一卷子隆亦有文學晉臧燾字德仁祖汪自東莞家京口善三禮之學為國學助教議宣太后不當配食中宗從之又因太廟災議祧禮學者多是之南北朝梁臧嚴字彦威燾孫孤貧勤學性耿介不輕造請僕射徐勉欲識之嚴終不詣歴監義陽武寧郡累任皆逼蠻嚴以數門生單車入境羣蠻悦服有文集十卷從子盾累官領軍將軍為人敏贍有風力長於撥繁幼從徴士諸葛璩受五經璩許為王佐才唐施敬本丹陽人為四門助教明皇將封禪詔有司講求典儀盥手洗爵侍中主之祀天神太祝主之敬本歴陳古制言盥洗乃鬱人之事今侍中位宰相非鬱人比今太祝乃下士以下士接天以大臣奉天子輕重不倫非禮也時以為識體屢遷至右補闕祕書郎宋姚闢字子張金壇人皇祐元年進士授項城令通州通判所至有聲時以辭章相尚闢獨究心六經與蘇洵同修禮書有太常因革禮一百卷焦千之字伯强丹徒人歐陽修勉以棄科舉之學專意經術呂公著判潁州延教其子嚴毅方正以師道自重嘉祐中舉行誼為國子直講歴知無錫州葛勝仲字魯卿丹陽人紹聖進士為太學正累遷太常􅀸詔續太常因革禮書㑹建儲以勝仲兼諭德作仁孝學三論獻太子又採歴代太子善惡成敗之迹日進數事除國子祭酒歴知數州有政績忤朱勔罷歸卒諡文康湯泳字叔永丹陽人粹於理學與弟沂同遊考亭之門其問答見文公語類官南廓簿領未赴卒竇從周字文卿丹陽人志尚沖雅年五十偕弟澄從朱子學耑以操心為己為學者倡兄弟築室講道一夕盜入其室睥睨久之知為從周居謂其徒毋驚此公相率去朱子曰忠信可行於此見之劉宰字平國金壇人紹熙元年進士調眞州司法時朝㫖責出身見任人供狀不讀周惇頤程顥程頤等書方得考試宰喟然曰平生所學謂何首可斷狀不可得也遷浙東倉司幹官不樂仕告歸理宗時累奉㫖授官皆不起隱居三十年施惠於鄉邦雖生理素薄而見義必為既竭其力復質貸以繼之又毁滛祠八十四所書無所不讀以博考訓注而自得之為貴卒諡文清有漫堂集三十卷顧奎字應文丹徒人貢太學好學篤行後進師尊之每郡博士至必執弟子禮迎致鄉校以為領袖元王垚字樂天居京口長於康節經世之學至大改元瀋陽王奏充説書從王使髙麗還陳便利三十餘事湯炳龍字子文居京口辟慶元市舶提舉學問該博四書五經皆有傳註尤深於易詩歌甚工號北村集陳鈞字公秉居金壇歴官至湖南𣙜茶提舉通諸經尤長於易著原理原數二篇有文集明丁元吉字旡咎丹徒人博學尤深於易善造就弟子性至孝喜吟詠考古論事談養生治疾之方所著書多至二百餘卷子璣丁璣字玉夫丹徒人成化戊戌進士授中書舍人嘗因星變陳治道本末反覆千言而根極於正心擢廣東副使提督學校生平守程朱之學其教人正容端坐澄心定氣使躁釋慮消為政先風化而一以誠意將之所著有補齋集八卷大學疑義等書于鎰字南金金壇人成化甲午舉人德性端重孝友見稱知萬載縣務以德化究心理學著中説朱鍚丹徒人任榮府紀善嘗從王心齋艮游潛心理學所著語録行世王濂字仲清金壇人正德癸酉舉人學於羅文莊欽順精研理奥躬行實踐欽順所著困知記屬濂序之謁選湖州推官楊文㐮一清稱其清操直節從􅆂養省察中出王樵字明逸金壇人臬子嘉靖丁未進士授行人遷刑部主事嘗曰士大夫以留心案牘為俗吏文墨詩酒為風雅夫飽食官禄受成胥吏謂之風雅可乎乃著讀律私箋甚精核萬厯初分巡浙西入為尚寳􅀸轉鴻臚􅀸疏請勵精聼納急宗社大計歴官南京右都御史致仕樵素簡黙至談經學則娓娓不倦閉門宴坐樸遫如寒士徒歩里中與負擔者讓道無忤容卒諡恭簡所著有周易私錄尚書日記春秋輯傳四書紹聞編方麓居士集束桓字子威丹陽人以貢士授寧州判州廹洞蠻桓身歴其地戒毋剽掠賊既斂戢守將倖功請勦桓力爭於督府得罷兵調膠州兩視髙宻即墨篆上官例取無礙錢糧桓狀言賦役有成書徴收有實冊安所得無礙者雖報可而心銜之卒罷歸與丹徒貢生殷士望月為講學㑹以孝悌求仁為本敦朴存誠為務學者稱懷玉先生于孔兼字元時金壇人湛孫由進士授九江推官再陞禮部郎中累疏爭三王并封議得寢又疏救考功郎趙南星謫安吉州判尋投劾歸與顧憲成髙攀龍講學東林嘗云學在不事空言無求頓悟光宗立贈光禄少􅀸兄文熙官大名兵備副使亦有名王肯堂字宇泰金壇人都御史樵子萬厯己丑進士授檢討仕至福建叅政生平好讀書著述甚富於經傳多所發明有論語義府尚書要㫖律例箋釋鬱岡齋筆麈尤精醫理著醫科證治準繩等書盛行於世工書法輯鬱岡齋法帖數十卷手自鈎搨為一時石刻冠笪繼良號我箴丹徒人萬厯辛卯鄉舉署寧國府教諭作廟祀考禮樂考示諸生又上黌宮六議於學使者遷鉛山知縣講易鵞湖書院晉絳州知州時議為魏忠賢置祠上林繼良執不可遷判順天魏崔惡之以東林邪黨削奪歸懷宗時起户部郎中上賦役便民議出知汀州告歸講學天心書院有語錄行世著鵝湖讀易十二卷潘槐字廷卿金壇人萬厯中貢士任廬州府訓導署英山縣篆汰浮糧白寃獄儆刁頑甫四月而頌聲大著歸與顧憲成髙攀龍講學於八卦亭符應乾字健甫金壇人萬厯丙午鄉舉知零陵著惜夫惜馬歌沿途皆咏之陞南康府同知主白鹿洞教事與諸生講學著鐸講行世國朝顧言字子訥丹徒人由明經授石埭訓導遷豐縣教諭繼陞池州教授辭不赴所至訓諸生先德器後文藝著易編合朱纂道學正宗行世史岱字東觀金壇貢生選授學正後補禮部司務岱敦行績學遵父逸裘遺命建小宗祠立宗法議祔祧作小宗志又著五祀考釋菜考補輯孔子家語内篇外篇雜篇學山集淮安府漢澓中翁東海人善詩書宣帝在民間依倚許廣漢兄弟及祖母家史氏從之受學衞宏字敬仲東海人與河南鄭興俱好古學從九江謝曼卿受毛詩因作詩序又從司徒杜林受古文尚書光武以為議郎作漢舊儀四篇以載西京雜事又著賦頌七篇皆傳於世晉陳邵字節良襄賁人郡察孝廉不就以儒學徴入為陳留内史遷燕王傅撰周禮評行世泰始中詔稱邵清貞潔静博通六經宜在左右以篤儒教可為給事中卒於官宋徐積字仲車山陽人父石以神童舉知羅城縣父殁以父名石終身不用石器足不踐石事母至孝從胡瑗學應舉入都載母以行登進士第母亡廬墓三年雪夜哭墓側不絶音有甘露木連理之瑞客從南越來積與論嶺表山川險易鎭戍踈宻如指掌客嘆曰不出户知天下徐公是也廷臣薦其孝行道義文學宜表其賢乃授楚州教授卒賜諡節孝處士國朝岳薦字西來山陽人明季棄諸生篤志汲古博通經史久之所得益深所養彌粹事親孝謹家貧薦與妻噉糠覈而奉養甘㫖必具有庶弟甫生其生母暴亡薦夫婦棄己女而乳之平日指授學者專用宋儒程朱之學為準的矩言楷行人皆欽服及殁同里劉昌言及長洲汪琬並為作傳閻若璩字百詩其先自太原徙山陽若璩淹貫經史學博而思精最長於考訂多闡先儒所未發所著有尚書疏證四書釋地困學紀聞注又同縣張弨字力臣篤學嗜古精於六書一時耆碩皆推服之揚州府漢徐淑字伯進廣陵人博雅好學隨父愼在京師纘孟氏易春秋公羊傳禮記周書舉茂才除渤海令遷琅邪都尉唐曹憲江都人仕隋為祕書學士聚徒教授公卿多從游尤邃小學煬帝令與諸儒譔桂苑珠叢規正文字又註廣雅藏於祕書唐貞觀中召不至即家拜朝散大夫太宗嘗讀書有竒難字輒遣使問憲具為音註援驗詳確帝咨賞之卒年百餘嵗宋王令字逢源眞州人王安石嘗謂曰始得君文獨愛君才既而見君衣刓履缺坐而語未嘗及已之窮退而詢知君終嵗食不葷不以銖忽妄售於人世之自立如君者有幾後居江陰卒所著有論語孟子講義廣陵集十卷䝉求一卷沈季長字道原眞州人舉進士第累官崇政殿説書元豐初帝御邇英殿季長進講周禮稱㫖帝論漢武帝學神仙為貪生以固位因言人臣固位天下之士能輕爵禄者少季長曰士輕爵禄為士言之則可為國言之非福也人主有尊德樂道之心士皆以不得爵禄為恥至於言違諌愎士有去志始以爵禄為輕帝曰誠如卿言後官至國子監直講王居正字剛中揚州人熙寧中王安石以新經義頒天下居正獨非之十餘年不應舉至宣和三年始第進士仕終史舘修撰髙宗初居正次前世聼納事為集諌十五卷以開廣上意於上前極論秦檜檜諷中丞何鑄劾居正為趙鼎所薦奪職楊時嘗出所著三經義辨示居正曰吾舉其端子成吾志因著毛詩辨學詩辨學周禮辨學及辨學外集等書堯允恭字克遜海陵人兩領鄉薦專意經傳尤邃於易有詩文二十卷明石光霽字仲濂泰州人讀書五行俱下洪武中以貢授國子學正進博士作春秋鈎𤣥王艮字汝止泰州人初授書鄉塾信口談説中理解後謁王守仁於豫章踞上坐與語氣凌其上已乃執弟子禮學益深造子襞字宗順亦以學鳴王棟泰州人艮從弟以嘉靖中歳貢為深州學正歴主白鹿洞書院著有一庵㑹語沈珠字汝淵江都人中正德丙子鄉試從祭酒湛若水遊授永新知縣陞南國子監丞若水徒滿四方珠為都講林春字子仁泰州人授業於王艮動有繩檢嘉靖壬辰㑹試第一授户部主事累遷文選郎中吏部故矜崖岸自尊重惟春氣愉色和不以行能先人母病假歸就故所讀書處講學母病間補原官時紳士講學京師者數十人志行敦實首推春選曹多事日夕勤瘁卒槖餘四金不能棺寮友賻助得殮許繼字從志儀徴人治蔡氏尚書王守仁湛若水並推重之巡撫唐龍劉節相繼按部造其廬朱永年字仲開儀徴人嘉靖中歳貢授光山知縣時世宗寵方士陶仲文官兼大宗伯奉命之興都監司臺使者皆先驅迎永年弗往既見又長揖不拜仲文大怒劾罷之歸杜門著書有集行世周蕙字廷芳泰州人始為蘭州戍卒聽人講大學首章有感遂讀書從薛瑄門人段堅李㫤遊研究五經學益邃後還泰州幅巾深衣動必由禮州人化之稱小泉先生其門人王爵字鍚之亦泰州人教人務以誠敬為本官保安州判韓貞興化人從王艮子襞游提奬後進來學者數百人督學耿定向器重之學者稱樂吾先生張懋勲字堯光江都人私淑王守仁所著有二劍齋日編及心學正統等書何堅字叔節江都人嘉靖庚子舉鄉試授臨江府判遷瀋府審理歸以修學著書為事買田射陽為溝洫蓄洩以資旱潦如古井田法製器候氣驗律聽聲又著漕渠七義當世多採用之林之瀚字爾憲儀徴人少而嗜學坐卧處皆書隨處體認天理六字以自警萬厯庚子中鄉試累官至寧州知州時稱儒吏所著有龍沙㑹語澹臺祠證學等編劉永澄字静之寳應人敦行孝友究心理學萬厯辛丑成進士歴官兵部主事孫兆祥髙郵人歳貢生潛心理學著格物論明善論天論良知論子臣心鏡等書國朝俞楷字陳芳㤗州人以歳貢充内廷供奉進經學劄子陳時文科舉之弊補天長訓導擢華亭教諭著三極易知録俞子書三刻弟梅字師巖康熈癸未進士改庶吉士授編修典試山西著有治河方畧郭嗣齡字引年江都人為仲父後以孝聞家貧授徒積脩脯為兄嫂營喪𦵏研精理學所著神化性命通一無二論士林傳之其傳記序説皆具古法康熈乙未成進士授松江府教授潔已課士為一時廣文之最雍正癸卯同考浙江鄉試其從兄彭齡字商山康熈丙午舉人文譽與嗣齡競爽徐州府漢韋孟彭城人為楚元王傅及孫王戊荒滛不道孟作詩諷諌後亡去位徙家於鄒自孟至賢五世為鄒魯大儒魯賜碭人受詩于申公官至東海太守治民有廉節稱嚴彭祖字公子下邳人以春秋公羊専門教授宣帝時為博士歴河南東郡太守入為左馮翊遷太子太傅廉直不事權貴或勸其少自勉强以取宰相彭祖曰凡通經術固當修行先王之道何可委曲從俗苟求富貴乎官終太傅蔡千秋字少君沛人嘗受榖梁春秋於魯榮廣及皓宣公宣帝時為郎召見與公羊家並説帝善榖梁説擢千秋為諌大夫給事中田王孫碭人受易於丁寛王孫又授施讐孟嘉梁丘賀由是易有施孟梁丘之學髙相沛人治易亡章句專説隂陽災異自言出於丁将軍寛授子康由是易有髙氏學施讐字長卿沛人從田王孫受易常謙讓稱學廢不教授後以梁丘賀薦拜博士甘露中與五經諸儒雜論同異於石渠閣讐授張禹禹授彭城戴崇繇是施家有張彭之學翼奉字少君下邳人治齊詩好律歴陰陽之占元帝時待詔宦者署言事必採究經史窮極隂陽以寓法戒論祭天地於雲陽汾陰及諸寢廟不以親疏迭毁皆煩費違古制後定迭毁禮徙南北郊皆自奉發之以諌大夫終子孫皆以學為儒官翟牧字子况沛人與蘭陵白光同受易孟喜為博士由是有翟孟白之學焦贛字延壽梁人自云嘗從孟喜問易㑹喜死京房以為延壽易即孟氏學從之至成帝時劉向考易説皆祖田何唯京氏為異由是易有京氏學戴崇字子平沛人受易丞相張禹得施讐之傳後為九卿戴賔沛人平帝時以施氏易授陳留劉昆昆以異政顯慶普字孝公沛人與大小戴同受禮於后蒼為東平太傅普授魯夏侯敬橋仁字季卿梁人與同郡楊榮從小戴受禮學仁仕為大鴻臚榮仕為琅邪太守由是小戴有橋楊之學龔舍字君倩通五經以魯詩教授與兄龔勝並著名節世謂之楚兩龔舍不願仕以勝薦徴為諌大夫病免哀帝時即家拜太山太守之官數月乞骸骨王莽居攝中卒唐林字子髙受書於長安許商商師周堪得大夏侯勝之傳者也商門人四科林列德行後以明經飭行顯名於世王莽時上疏諌正有忠直節褚少孫沛人事王式問經數篇式謝曰聞之於師具是矣自潤色之鄧彭祖字子夏沛人受易於五鹿充宗官眞定太傅陳宣字子興蕭人博學明魯詩光武徴拜諌議大夫帝出宣前引行稍遲乘輿欲驅鈎宣御者墮車下宣諌曰王者車鳴鸞步佩玉孝文帝却千里馬謂朕乘是馬獨先安之願以文帝為法帝納其言遂徐行按轡申章昌字曼君楚人梁丁姓弟子傳穀梁春秋為博士至長沙太傅徒衆尤盛由是穀梁春秋有申章氏學聞人通漢字子方沛人后倉説禮數萬言號曰后氏曲臺記授通漢通漢以太子舍人論石渠至中山中尉三國嚴畯字曼才彭城人善詩書三禮性純直避難江東張昭薦為騎都尉魯肅卒呉主以畯代肅畯固辭樸素書生不閑軍事諸葛亮深善之所著孝經傳潮水論傳世宋劉顔字子望彭城人好古學不專章句舉進士知龍興縣免官家居教授數百人所著有儒術通要經濟樞言石介見其書嘆曰恨不在弟子之列子庠見宦績明劉儼字若思蕭人洪武中知慈利縣廉惠並著儼好學明經義邑令郝玘為建易安書院聚徒授講蕭士悉宗之馬津字宗孔徐州人蕙裔孫正德丁丑進士任餘干令宸濠反從王守仁征討擢御史抗疏敢言遷大理寺丞出為福建提學副使端已帥物秉經貞教士皆悦服所撰有克復諸篇許詢字問芻蕭人氣體端凝詩書外無他嗜好尤精周易尚書每御臯比為弟子説經語如注疏聽者競相傳寫丙子罹寇難門人私諡之曰文端先生太倉州明秦約字文仲太倉人父玉居崇明孝友工詩洪武初約應廷試愼獨箴拜禮部侍郎以母老辭歸再徴詣京師上書言事上悦以約年老難劇任授溧陽教諭御史練則成等薦之稱為宿學遺老云陸釴字鼎儀太倉人天順癸未㑹元為東宮侍讀亶心敷納禮度莊雅憲宗每屬目焉以疾乞歸釴潔清有志操學問淹洽文章完愼病亟猶自以東宮舊人具遺章言事其不忘家國如此趙中行字子與嘉定人嘉靖癸夘舉於鄉好學厲志節以經綸自負時邑有倭警中行為畫守禦之法邑人賴之上公車不第有故人重其才薦於嚴相嵩擬授臨清州守中行夜促裝南還其進退不茍如此張采字受先太倉人崇禎戊辰進士少與張溥同讀書七録齋中以六經史漢倡明古學時號婁東二張通籍後集鄉老自誓毋使宗黨子弟奴僕勢凌鄉里渝約者共斥之風俗一變令臨川移疾歸益潛心濂閩之學溥性寛博愛而采嚴喜甄别可否故銜采者多所著有知畏堂集張溥字天如太倉人崇禎辛未進士選庶吉士乞假歸益讀書倡古學曰復社學者歸之以不及門為恥時有以婁東社黨中溥者事下巡撫都御史提學倪元珙言諸生誦服聖賢聚徒講習無可罪者㑹溥病卒而張采疏辨事乃已後以御史給事中交章言溥砥行力學表章六經請徴遺籍備乙覽奉㫖呈進黄淳耀字藴生嘉定人崇禎癸未進士少即以聖賢自期著自監錄知過錄後為日厯晝之所為夜必書之晚而造詣益深詩古文悉軌先正原本六經緼袍糲食不茍取一錢嘗白一人寃其人欲餽之五十金而不敢言乃納諸書笥經數日檢出大駭還之嘉定破從容入僧舍與弟淵耀相對縊死淵耀字偉恭諸生好學敦行如其兄國朝陳瑚字言夏太倉人崇禎壬午舉人少通五經求實學鼎革後與其門弟子磨礲名行䃚礪經術粹然為居敬窮理工夫著有聖學入門四書講義求道録切已録等書王御字聖乘太倉人明季以舉人令房山力懇上官疏除瘠田浮賦房民得甦引疾歸杜門却掃尋繹遺經以倡明絶學為己任請業者必告以立心為己􅆂養性情之實著有證我箋先賢學記等書陸元輔字翼王嘉定人少師黄淳耀以敦篤之姿精微之學稱之自早年以存誠主敬自勵至老不倦其學博極羣書而要歸於六經士大夫相語往往稱陸先生不舉其字也康熙十七年有以博學鴻儒薦者元輔雅不欲違素志以不入格罷歸所著有十三經註疏類抄續經籍考陸世儀字道威太倉人少穎悟尤究心先儒語錄及經濟諸書順治間督學張能麟聘輯儒宗理要後嘗講學於鍚山東林書院説易於毘陵大儒祠受業者數百人著有思辨錄論學酬答康熙五十年巡撫張伯行刻其集稱為吾道干城周象明字懸著太倉人康熙壬子舉人性行端潔臺司延請講學象明正容就席為説洪範九疇大㫖及先賢敬一箴精切詳明一時父老子弟莫不拱聽著有七經同異錄尚友編事物考辨蘇松田賦備考共數百卷没後門人春秋祀之海州隋包愷字和樂東海人兄愉明五經愷悉傳其業從王仲通受史記漢書尤稱精究學漢書者宗之教授嘗數千人大業中為國子助教卒江南通志卷一百六十三
