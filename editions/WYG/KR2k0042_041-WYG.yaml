以公為端明殿學士沿江制置使江淮招討使俾就建康府募軍以援江上諸郡公受詔不辭即日上道以妻託愛將金明執其手曰我不負國家爾亦必不負我遂行與似道遇蕪湖似道撫公背哭曰不用公言以至於斯既至建康守兵悉潰四而皆北軍公知事不可成歎曰吾生為宋臣死為宋鬼終為國一死率所部數千人至髙郵欲控引淮漢以為後援已而聞似道師潰蕪湖江漢守臣皆望風降遁歎曰吾今日猶得死於宋地乃置酒召賔佐與飲為表起居三宫與從子書屬以家事夜分起步庭中慷慨悲歌揮拳撫膺者三扼吭而卒遺表聞贈太傅金明以公之䘮歸葬丹陽厥子麟内書寫機宜文字在建康不肯從衆降崎嶇走閩以死𢎞治己酉廷議毁天下淫祠而六安石湖寺亦在廢中㑹大中丞仁和李公昂適駐節兹土乃進父老而問之故因歎曰按禮以勞定國以死勤事則祀之能禦大災能䘏大患則祀之先生忠誠貫日月使其策果行宋之為宋未可知也是豈可湮没也哉乃檄撤僧廬之座而貌先生之像於中額曰宋端明殿大學士汪公祠命有司歲時致祭焉意表前哲勵後人厚俗之道也是不可以不紀仇公祠在六安州通濟門外明正徳壬申都督仇鉞解六安圍六人感之肖像立祠歐陽文莊祠在州城北門外祀明知州歐陽徳史相祠在州東祀明相國史可法二程夫子祠在英山縣城隍廟後祀宋程顥程頤南嶽神祠在霍山頂三蘇祠在霍山縣治東祀宋蘇洵蘇軾蘇轍宋狀元焦煥墓在州焦家莊南知六安軍程會墓在霍山縣撞山下元淮西總管潘通墓在州西望江灣之南學士熊徳旻墓在霍山縣復覽山下明御史潘岳墓在州西望江灣南都御史汪霖墓在州南寳塔岡光祿楊惇墓州南􅈝步河布政使潘貞墓在州西望江灣南僉事潘鏜墓在州西望江灣南叅政彭辨之墓在州南陡步河行人司潘鋭墓在州東南蔣家灣叅政潘子正墓在州東南蔣家灣知府邱玳墓在州南七里井都督僉事張澡墓在州南五十里髙廟副使徐必進墓在州西烟墩集副使何慶元墓在州東郭外東禪堂前贈太僕楊四知墓在州南聖人山御史郝錦墓在州北清水湖國朝編修徐致寛墓在州西徐家集知府駱士憤墓在州西五里龍王砦泗州社稷壇在州治香華門西風雲雷雨山川壇在州治西門外􅃯建先農壇在州治東門外雍正四年遵建州厲壇在州治西在縣曰邑厲里社鄉厲二壇在各鄉保關帝廟在州治南門國朝雍正五年奉㫖追封三代公爵仝日祭於後殿城隍廟在州治西勅建八蜡神廟劉猛將軍廟並在州治東郊以上壇廟所屬縣皆如制禹王廟在州治桴橋口河神廟在州治南淮瀆廟在旴眙縣下龜山寺西南世傳大禹鎮水怪處介之推廟在天長縣浮山子胥廟在天長縣東北十五里忠義祠節孝祠俱在學宫右二祠屬縣俱如制馬邵二公祠在州治南察院祀明馬斯臧邵陛今圯顯忠祠在州城内祀明御史李紹賢今圮義勇祠在州治東岡後移建龍窩驛東祀明蘇旺兄弟皆正徳中死流冦之難附明桂祥記正徳壬申大盗起郊甸渡河踰宿由靈虹犯我雙溝時義勇士蘇旺蘇智蘇旻兄弟謂朱文玘曰賊勢雖盛幸未猝至先擊之可挫其鋒乃挺身往戰各手刄數賊鎮之壯者亦荷戈遥為聲援而老弱婦女得以渡淮避之賊大至遂皆遇害然賊亦阻懼西歸雙溝以東不被兵者皆其力也先時立祠於東岡嵗久頽弊今移置於龍窩驛之東焉知泗州事汝陽桂祥曰四子者草莽賤臣也為臣死忠為子死孝之道素無師友講明之功一旦臨大難挺身赴戰死而不悔卒使東南免於刼辱之禍其功可謂偉矣士大夫平居髙談闊論以綱常自許一遇變故輙辜恩負國忘恥事讐有市井人所不屑而為之甘心者自諸義勇視之豈直狗彘而已耶夫義以率戰勇以定功可以風臣道矣乃立義勇祠祀草莽之豪傑媿衣冠之賊也呂東萊祠在盱眙縣祀宋吕祖謙祖謙六世孫伯宗招撫盱眙遂家於此范文正祠在盱眙縣祀宋范仲淹周濂溪祠在盱眙縣祀宋周敦頤雙貞祠在盱眙縣東北陡山下祀何氏二烈女明隆慶間建包孝肅祠在天長縣東門祀宋包拯以拯嘗為天長令朱公祠在天長縣勝因寺西南祀宋朱夀昌沃公祠在天長縣東門祀明死倭冦難沃田附明孫以仁重修祠記將軍沃公諱田家世山東登州衛指揮同知公自幼賦性英敏體貌魁梧夙諳韜略登嘉靖己丑武進士第以浙江署都指揮僉事守備儀徴嘉靖丁巳夏五月十日倭冦犯廣陵焚刼甚慘乘勢欲冦天長公奉檄提青州兵為是邦防禦計廼營兵於崇家岡上待之去縣治東六里許冦聞有公截西路疑遲不敢進十有五日繼間廣陵追兵四集遂由蘆龍直趨天長公迎擊破之諸冦氣甚沮潛伏莽野日暮天霽氣爽分方戒嚴與各部將籌以生擒諸冦待旦黑霧障天咫尺人不相辨加以東風大作冦乃併力突入人馬潰亂首尾不應公獨躍馬前敵手刃十數人餘冦忽焉䧟賊中遂遇害焉嗚呼冦非公之截殺必逕入天長天長素無城池民素無備不其岌岌哉翌日冦旋遁去而殘毒不敢肆諸士女命獲保全皆公之敢戰懼之也夫公不惜一人之身一邑之民命皆賴以生其功誠不細矣時總制梅林胡公以公狀上聞勅贈鎮逺將軍都督僉事世襲指揮使嵗戊子知縣黄泰然奉侍御張公命為公建祠於東門外龍行集中春秋祀之而民為公痛心戴徳者歲時復有私祠當時復有私祠當時同死事者指揮岳君寵百户劉君葵例得同祀隆慶改元余按兹土過祠而惜其規制未備也爰命知縣楊子龍增樹門廉恢其卑隘新其貌像而氣象規模視昔為光且大矣夫先王之制祀禮法施於民則祀之以死勤事則祀之以勞定國則祀之以能禦大災捍大患則祀之公之死豈惟禦災捍患而已哉耿耿忠義垂之千古而不磨廟貌血食當厯千古而弗諼也司風紀者不當揄揚以表忠魂以勸臣子之精誠報國者哉敬書此以紀其歲月云雙忠祠在五河縣治北二十里祀唐張巡許逺大忠祠在五河縣北城臺祀明耿再成孫烈女祠在五河縣天保宫後女少失恃父鑾繼娶李氏李攜前夫鄭子來歸鄭屢欲汚女女以刀斷其頸旋自刎死嘉靖間邑令髙某為之樹坊建祠並置祀田數十畝附明李穆記孫烈女者五河邑安定里人也名老姐父鑾母朱氏女生而聰穎居家毅然寡嬉笑里中人咸異之自㓜許聘張氏子舉後不幸朱氏早亡孑然與父居父嘗欲歸諸張以圖繼室也適張卑猥貧未能娶鑾遂繼李氏與女共家焉先是有鄭州兒者李前夫子也李寡無依擕州兒以適於孫州兒素恃母寵待女無狀女惟處之端嘉靖丙辰秋九月十有四日州兒見室傍無人即以淫心調女女震恐喊之越五日州兒從工所至值女俯几治麫州兒自後摟女以口吮其肩意其為犬彘心也遂以麪刀反斫不中州兒獲走女即仰天號哭往訴其姊三姐及嬸舒氏曰吾不幸早䘮吾母父又常出鄭賊時欲汚我我決刃之以自刎不然吾惟有死而已其嬸及姊曲為解諭強歸然其心忿忿常不忘也丁巳春三月念九日州兒以取薪紿其母曰薪多吾力弗任半委中途盍取諸母信而往擔薪以歸視房戸内掩怪而強啓以進見州兒卧南壁下頸未斷者如線女倚北壁水缸氣息垂絶頸刃自左而右者痕僅三寸血流滿室未幾亦絶焉但其死所與奸賊去逺毫髪弗溷顏色服履整整有生氣里人狀其事於邑令邑令髙君異之拘隣戚而博訪焉其姊三姐嬸舒氏哭而訴曰此女此心自去秋懐已決矣今果然也因備述所云云髙君心未深然及謀諸四隣四隣曰然詢諸李母母亦曰有之採諸隣近學宫多士皆曰此衆所共聞也於是髙君為之備衾不崇殯殮一時士民往弔如市事聞當道巡按侍御堯山吴公潁谷馬公相繼表其間而例奏請旌焉髙君嘉其節欲識之不朽廼於孫氏家後治塋塋前樹石坊一座置田數十畝以瞻時祀復於城内隙地築臺建堂扁曰烈女祠祠前仍立石碑葢厚典也事竣備其實以求予言予亦嘉事之不偶而歎其有關風教也是為記明祖陵在州北三十里周楚懐王墓在盱眙縣治㕔後遺跡尚存宋孝子朱夀昌墓在天長縣東四十五里舊勝因寺西南旁有祠明尚書金純墓在州應山集曹國長公主墓在盱眙縣靈蹟鄉内明太祖皇姊配隴西王李貞合葬太原長公主墓在盱眙縣太平鄉牧羊山西南明太祖皇姊配駙馬都尉汪清合葬尚書陳道墓在盱眙縣官莊西南行人李紹賢墓在盱眙縣下龜山僉事馮應京墓在盱眙縣西南靈山僉事張昊墓在天長縣六里墩之南御史胡士奇墓在天長縣上白湖之北御史丁寜墓在五河縣安定鄉節婦胡氏墓在五河縣南七里黄棟莊烈女孫氏墓在五河縣南安定鄉國朝副使周永緒墓在盱眙縣東山江南通志卷四十二
