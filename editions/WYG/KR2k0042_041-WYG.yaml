body:
  text: 江南通志卷四十二輿地志壇廟六祠墓附廬鳯潁三府滁和廣六泗五州廬州府社稷壇在府治西門外風雲雷雨山川壇在府治南門外先農壇在府治東郊雍正四年遵建郡厲壇在府治拱辰門在縣曰邑厲里社鄉厲二壇在各鄉保關帝廟在府治和平橋東國朝雍正五年奉㫖追封三代公爵春秋同日祭於後殿城隍廟在府治東勅建八蜡神廟劉猛將軍廟俱在府余公廟橋東以上壇廟所屬州制旗纛廟在武教塲將軍廟在府治水西門内城上祀宋少保楊沂中姚李二公廟在府治徳勝門外祀宋統制姚興招撫使李顯忠巢湖聖妃廟在合肥縣姥山晉太康中建相傳居巢縣地昔有一巫嫗豫知未然所説吉凶咸有徴驗居巢縣門有石龜巫云若龜出血此地當陷為湖未幾鄉邑祀祭有人以猪血置龜口中巫嫗見之南走囘顧其地已陷為湖人多頼之為巫立廟今湖中姥山廟是也唐羅𨼆有詩廣惠廟在廬江縣東南四十里礬山之隂祀漢張渤元至正間建靈澤廟在無為州蟂蟣山祀漢昭烈后孫氏賜額曰靈澤附明郭子章蜀望臺記蕪江心有磯磯不甚雄聳顧獨嶙峋峭麗兀突浮水上與孤山金山後先砥狂瀾葢蕪一大勝㮣云磯上祠孫夫人孫夫人者漢先主牧荆州内孫仲謀女弟而妻之者也磯夫人死所也夫人業已妻劉死不劉而孫不蜀而吴即吴不宫而磯按志論者二曰夫人還省母過灤江聞先主崩蜀摧哭自沉又曰劉孫有郤夫人歸吴舟艤磯側不忍見仲謀遂歾於磯王義烏公作蟂磯記事語甚辨具載磯志中而卒罪陳夀銓叙之畧予謂畧不在夀在蜀蜀有國不設史官故典率逸亡考非然某年夫人如吴某年夫人在吴某年夫人卒吳例得書而何竟溷溷若斯起千載人疑哉故夫人死事可亡辨已夫人死今數千歲後凜凛乎生氣㣲獨蕪中人靈威神明即千艘萬航過磯者誰不停橈而血饗之至歔欷悲悼不忍去非夫姱節貞心英聲義魄動天地感鬼神惡能以其抔土卷石羈客子心而下其無從之涕故予謂夫人之死劉無疑也歸吴者形沉磯者骸而其一念之靈明猶若翺翔乎永安之左右而絪緼野馬於三峽五屼之巔際逐波錦江隨雲玉壘每風號吴天月冷荆水像響如在精魂可悲嗟乎哀矣余來視𣙜逡巡故事三日謁祠下愴愴低回者久之獨怪其土偶桃梗充斥宇階若一叢祠然而夫人所為死者不得並爼豆其間非夫人意為左像𤣥徳右像夫人築層臺居之名曰望蜀臺余往遊燕趙過鄒魯墟謁孟廟既覩子輿石像跪伏母前最後又祀其父若母讀楚書瀟湘皇英廟貌九嶷而僾然在位受二女果者非大舜氏耶合而祀之庶幾乎義矣且也金陵故劉氏土孫氏乗亂而竊据之𤣥徳飄泊蜀隅生不能驅許昌武昌二賊一完祖宗舊物白帝遺恨死且不瞑余為招魂俾與夫人世食兹山嗟嗟𤣥徳其能無愉快也耶臺髙二丈六尺廣八丈中奉𤣥徳夫人左祠關雲長張翼徳右祠臥龍先生諸葛孔明又所以擁衛神靈且杜夫非鬼而祀於其中者汪越公廟在無為州祀唐汪華巢湖神廟在巢縣銀瓶山上姚王廟在巢縣東山頂祀宋統制姚興伏羲廟在巢縣西北東山口浮槎山頂忠義祠在學内節孝祠在府治二祠所屬州縣俱如制包孝肅祠在府治南濠内祀宋包拯附明黄金孝肅書院記包孝肅公宋之名臣也其精忠直諫可比漢之汲長孺而過之視唐魏鄭公出處尤正其廉節冠一時趙清獻而下不論也其載諸宋史者炳炳與日月爭光其傳與天地相為悠久卓乎不可尚已苐公為廬人仕於廬者往往以簿書期會為心求能表章先賢以風後進則寥乎未之有聞監察御史陽城宋君克明來守是邦未踰年六事漸舉百廢具興謂公乃鄉賢顧可漫不加之意乎郡城有河河之中有洲舊為浮屠氏所據太守至是撤而去之因相其地庀材陶瓦鳩工事事南面建屋五間中坐公之像東西翼以夾室植竹木於四圍而環之以牆前建大門其地峻疊石為梯數十級登焉題其額曰包公書院新傑壯偉過者為之改觀擇庠俊張福輩十餘人讀書其中而公二十四世孫大章亦與焉太守嘗於祭畢謂諸生曰士學宜師聖賢若公乃表表焉百世可師者也吾欲爾曹居家行已則師公之孝立朝事君則師公之忠庶不負建新院之意福輩奉教帷謹間以書來屬予記之嗚呼為政貴識大體不務末節嚴先生祠堂范仲淹構之韓昌黎潮州廟王滌新之以其所關者大也孝肅之風足以廉貪立懦其有功於名教大矣不比之重而務其他可乎太守善斆乃及於是有以激人心而觀風化可謂得其大體與况其所費悉出自規畫一無所取於民其才之長又有過人者繼自今廬之士氣丕振或以直諫顯或以廉節著忠臣孝子之門上紹先賢之芳躅未必不由此舉基之是太守亦有大功於名教也於是乎書余忠宣公祠在府城東門外祀元余闕附明李東陽記正徳改元之嵗知廬州府馬金言元故淮南左丞余闕當至正之亂分守安慶誓死血戰為江淮保障及陳友諒趙普勝諸軍合攻陷其城乃引刀自剄死並其妻妾子女將佐士卒無一辱於賊者其事甚偉當其時已贈行省平章事豳國公諡忠宣國朝洪武初始詔廟祀於死所闕雖出䝉古而所居合肥青陽山故宅亦有祠久不治惟漢紀信生於西充死於滎澤唐許遠生於新城死於睢陽文天祥生於廬陵死於柴市而今皆兩地並祀若闕之精忠大烈可方文許較諸紀氏葢百倍過之而鍾靈毓秀之地不得為郡縣所祀子弟所仰其為禮亦甚缺請修葺舊祠秩諸常祀復其守者比於安慶以昭一代之盛詔曰可於是重修廟寢堂室暨凡物所有事者令縣正官以歲春秋再致祭焉於戲綱常之道根乎天性具於人心無時與地而或間故居不必中國世不必正統忠臣義士往往有之漢唐宋之死節者代有其人而宋季尤甚説者以為忠厚養士之報元之以大魁死者四人其他崇名膴仕者後先相望忠宣以一郡之弱二千人之寡抗東南數萬之衆戰至於七十之多嵗至於六七之久而竟不失其正以死又能使一門五節闔郡之士從而死者千餘人較功論烈尤大且著者也我明祖高皇帝綏猷惇典著為律令以表古今之忠義至其所驅逐所勘定者亦不以君廢其臣而表章之此可見綱常之道雖出於天而立教以治世者固聖人事也又以見忠義之激於中者苟自盡於所事皆可謂不失其正者也抑聞髙皇於膚敏祼將之士雖包荒含垢而實有宋太宗范質之憾充􅁼至盡無異於武王封比干釋伯夷之義矣而况為其主而死於亂賊之手者寜不表之以為天下教哉然則忠宣之重表於今日者亦豈非詒謀示法之大端也哉族祖希蘧先生與忠宣同舉進士分左右榜而唱名謝恩皆同班序雅相厚世所傳青陽集者先生實序之而以不得效死為忠宣愧東陽仰窺聖主之仁復有感於先世之誼因表其事且以風天下之為人臣者若忠宣之族里行績則見本朝所著元史及潛溪宋學士傳為詳博雅君子尚有考焉周忠愍祠在府治明教臺東祀明周璽附明葉逢春記余讀廬陽誌列忠節者自漢周平孫而下迄於我明曹瑞卿屈指葢三十一人瑞卿跡其行事宜列之其剛直二十八人皆以亂畧之頃激大義抱忠憤而為敵所殱者至以直言而斃則惟我朝周忠憤李崇徳兩公焉豈時當草昧則人心易激忠義慷慨之士多而居常往往養位酣禄緘黙株守之士衆乎不然何死敵者餘什九而以直諫死者不什一耶兩公者以忤武宗斃於杖下崇徳語在他傳中若忠愍則以忤逆瑾故肥之兒童婦女無不嘖嘖葢公被拷掠身無完膚矣猶弗少屈曰吾死不足惜令忠義畏愞可惜耳斯言也豈古所稱君子人與蘇明允云使我獲知人之明而天下受不可一朝居之禍不忍也充忠愍之意使其成殺身之仁而杜天下敢言之口不忍也為宗社生靈計而非為一身後區區之名詎不賢哉公祠碑記尚缺公之孫弟子員於徳因蓬萊浦君以請葢浦君以六安貳署肥事也余按忠愍與瑾黨楊玉勘事弗阿弗狥瑾惡之遂罹此惨假令忠愍少假之辭色縱不得其懽心亦可免禍而忠愍不以彼易此里有富翁羣儂葢日至摩踵以承之其後至者則摩其摩者之踵一儂獨愕然而進長揖而與之坐語羣儂皆愧而驚走忠愍者其不摩踵之流與忠愍即死而國家忠義之氣藉是以扶持而不墜其功豈小補哉浦君為此請者浦之先君以忤世廟被杖尋卒於獄夫世廟之聖明不世出者於忠愍有抑鬱未伸遽焉淪没之㫖如此而於浦公又如彼豈日月之明或蔽寸雲而雷霆之威偶摧直木者乎君其有所感夫有所悲夫蔡氏祠在府治十字街東祀明蔡悉屠公祠在府治察院前祀明太守屠仲律今廢宣聖南祠在廬江縣宣聖五十八代孫孔思原徙廬江建家廟春秋祭如學宫儀大忠祠在廬江縣祀明靖難死事陳植二賢祠在舒城縣内祀漢文翁朱邑三劉祠在舒城縣東祀漢頡羮侯劉信刺史劉馥明知縣劉顯二狀元祠在無為州祀州人宋元豐狀元焦蹈明永樂甲辰狀元邢寛楚公祠在無為州祀宋待制楚建中附宋趙汝談記郡故祠賢守三曰王公蘧陳公瓘米公芾王公蘇黄門之壻適之之兄也為吏健於才紹聖初為郡人興三圩開十二井又築北嶺以捍水至今䝉其利陳公坐論蔡京繇右司諫斥謫尋起郡復罷其政猶未洽此土也邦人以其天下士而吾里乃幸辱焉故誇以為榮而米公則翰墨妙當世在郡所作樓觀皆手自題其扁民每瞻思之余謂是三賢者祠之當矣然考諸圖志則先是楚公建中嘗守此其治一以清靜不擾去之日有遺愛而獨缺其祠豈不忽諸余反覆其説而得焉西都所傳循吏無惠文時人豈惠文世無良吏哉其故可思矣嗚呼國家慶歴嘉祐間天子垂衣裳執大象羣有司奉法循禮而海内宴安無事田不盡利也而食有餘於飽井不盡甘也而飲有餘於味上下數十年間其布政郡國者大抵非博厚長者即忠信善士也故雖以楚公之才學亦不刻厲涌發以求自判於常人而民所以懷公者亦惟此心不祈表於外也嗚呼獨非盛徳之至歟王公既繇功食二公因復名饗葢其次第如此而楚公逺矣顧有輕重乎哉今中興以淮為邊而無為創前之敵難未遠也衆懼莫敢即安淳熈末公私始稍稍鳩聚若欲自况内郡者而開禧戎事動矣汝談之來承乏此地流宕者未返瘡痍者未瘳府無旬月之儲而宿負新貸符督交至余熟視莫知其為也喟然嘆曰時安得復有楚公者以為爾民父母其庶乎而余劣不足進此矣於是議追為公之祠以記公行事而歴訪乃無一得葢公既不以名蹟遺後故遺老亦無傳者相距三甲子矣嗟乎以余之淺陋曾何足知公而區區企竦歆慕如將見之者徒以文正范公所薦而文富司馬諸公之所遊也公既老以天章閣待制歸雒世所傳耆英圖有公像余因得取之其出處大致在國史不論第論世道本末使知前無祠於公不為少而今有祠不能為公多使人知夫翹翹之名察察之行凡為一世之所慕耀而爭趨者皆公之細焉爾賈公祠在無為州祀宋賈易二賢祠在巢縣萬家山麓祀巢父許由范亞父祠在巢縣治内祀范增又一在縣東七里居巢子祠在巢縣學内祀劉知幾寗公祠在巢縣北關内祀明知縣寗承勲漢頡羮侯劉信墓在舒城縣北四十里五代伍喬墓在廬江縣馬厰岡宋學士劉筠墓在府東水西門外太子少保馬亮墓在府城西七里晏殊銘侍郎包令儀墓在府東七里叅政包拯墓在府東十五里附宋林至記至為淮西從事之三月始得再拜謁孝肅包公墓下嗚呼慶歴嘉祐之間何其盛也仁宗皇帝以天地髙厚之徳平治天下而又延登耆雅容納忠讜維時孝肅公危言直論排斥權倖切劘治道而扶持國本者覩奏疏可考焉至其臨政明不可欺剛不可撓公不可干以私今百餘