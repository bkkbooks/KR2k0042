body:
  text: 江南通志卷二十一輿地志城池二安慶府府舊城即今潛山縣城地也通典云楚靈王所建歴代因之宋嘉定十年黄幹知安慶府以金兵破光州請諸朝徙城於盛唐灣宜城渡之隂去舊治百四十里其城北負大龍南瞰長江東阻湖西限河周九里一十三步門五東曰樅陽東南曰康濟南曰盛唐今改鎮海西曰正觀北曰集賢元至正丙申守帥余闕増高至二丈有六濬重濠三引江水環繞明洪武庚午指揮戈預重修濬池深至一丈嘉靖辛丑知府吳麟於城内周圍加甃以甓天啟癸亥知府陳鑣通判歐陽騰霄大加修葺崇禎乙亥知府皮應舉補其傾圮知縣黄配元續砌周城馬道北闗一帶增高雉堞建敵臺濬舊濠其後五城樓燼於兵火國朝順治二年知府桑開第重建七年夏淫雨城圮操撫李日芃知府王廷賓知縣賈壯修補復故十七年操撫宜永貴重修女牆合舊四為一設立窩鋪以備守禦康熙四十九年巡撫葉九思修築懐寧縣附郭桐城縣舊有城相傳為隋同安郡故址門四有樓宋末徙治樅陽又徙池之李陽河元時始還舊治城久傾圮明萬歴丙子知縣陳于階建磚城周六里門六崇禎乙亥知縣楊爾銘重加修葺更設窩鋪炮臺壬午知縣張利民以北山有臨下之勢於北門增建月城計十有八丈國朝康熙九年雨圮知縣胡必選修葺雍正十年重修潛山縣舊城即府治故址久圮明季兵備道史可法知縣柯支桂建城備寇工未竟而罷國朝順治六年操撫李日芃與副將梁大用知縣鄭遹元築土城收縮西南由高營壩至同安橋與東北舊址接康熙五年知縣周克友復修城之東北接於西南舊址五十八年知縣段舒改築西南門太湖縣土城周七里環城有池深廣各丈餘門六有樓明嘉靖中知縣王良卿修萬歴間水漲東北成河崇禎丙子知縣楊卓然建磚城避水患收縮止周六里甲申知縣李盛英修尋經流寇洪水六門傾圯國朝順治五年知縣李世洽修康熙五年雨圮北城知縣羅綺修十一年雨圮西城知縣王崇曾修十三年知縣方人龍建東北兩城樓十九年知縣章時化修東西兩門宿松縣明崇禎乙亥知縣茍天麒始築城址外垣門六尋經寇燹工遂廢國朝康熙十一年知縣朱維高建懸樓二十座以備守禦二十二年知縣朱卷復造大小東門及北門城樓五十八年知縣李泰葺化龍門望江縣明萬歴乙亥同知蹇達署縣篆始建四門咸有樓周六百二十六丈崇禎乙亥知縣黄配元增高己卯春雨圮知縣祝維嵩補築未及半流寇驟至守將戚國泰躬為負石五晝夜工成國朝順治六年知縣王世印重修城樓康熙五十三年知縣馬駿改建東南門徽州府府城在烏聊山麓唐汪華築東半抱山西半據平麓歴宋至元代有修補明初總兵鄧愈加築周九里七十步高三丈二尺廣一丈五尺東西北三面有濠闊二丈四尺深一丈二尺南及東南以山險無濠為門五東曰得勝西曰潮水南曰南山北曰鎮安東北曰臨溪自北門而東至南門為敵樓七門外各設兵馬司房窩鋪三十有三嘉靖四十五年知府何東序増修加高三尺又建南山鎮安二門月城增築西門外敵臺國朝康熙二十一年徽寧道黄懐玉知府林國柱修葺歙縣治舊在郡城外無城明嘉靖三十三年倭入寇知縣史桂芳始議建城周七里有竒高三丈廣二丈西南以郡城為屏蔽餘三面皆山不池而險為四門門側各有連弩之臺守陴之舍二十有四瞭望樓二所休寧縣宋始城周九里三十步為六門元仍舊明堙嘉靖三十五年知縣林騰蛟建議重築周九里有竒高二丈廣如之北踞天葆山東亘東山之巔南臨汶溪西臨夾溪門有七城外引水為池後令潘清亶竟其緒國朝康熙二十一年知縣俞獻修葺婺源縣南唐時建治於弦高鎮挾深溪為險檢校司空劉津始築城周九里三十步二門宋因之元時立木栅四門明初樞密院判汪同復因遺址為城周五百三十餘丈後坍壊嘉靖間知府何東序通判馮叔吉議建石城俯瞰繡水旁臨杉潭為門四俱有樓有月城又為小門亦四計長九百餘丈又太白圍牆在婺源縣南七十里太白潘村地接鄱湖屢被寇害明嘉靖二十九年以里人奏請奉詔築周五里有竒祁門縣宋始築土城周五里四門明堙嘉靖間知府何東序檄知縣桂天祥營築周一千六十丈高二丈廣一丈三尺建五門西北因山為固東南倚河為池黟縣宋築土城周二里六門明堙嘉靖中知府何東序通判何叔吉重建甃以磚石周七百三十餘丈高二丈廣一丈二尺為門五皆有樓西南環以高岡東北以大河為池崇禎七年增築月城國朝知縣竇士範江旣入曹振邦王景曾前後相繼修葺績溪縣宋築土城周五里元因之明堙嘉靖間知府何東序檄知縣郁蘭改築周八百四十一丈高二丈廣一丈三尺為門四俱有樓以大河為池國朝康熙十一年知縣劉滋修葺寧國府府城初創於晉内史桓彝隋開皇間刺史王選始大展拓之宋建炎三年郡守吕好問繕修元至正中廉訪使道童重加甃甓城高二丈五尺厚三丈周延九里一十三步門五東曰陽徳東偏曰泰和南曰薰化西曰寳成北曰拱極西北據山阜東南跨原隰宛句二水合流不經疏鑿明知府鞠騰霄宋獻葉錫益飭治焉舊堞一萬三千有竒崇禎時知縣梁應竒併三為二今共八千九百七十垜原鋪一十三所今計增設一百二十九所國朝順治中知府管起鳳秦宗堯知縣王同春修築康熙七年東南隅城圮知府孔貞來修之十九年知府王國柱知縣鄧性復加修整附唐韓熙載宣州築新城記粤自結繩初代爰申弧矢之威執玉已旋遞設金湯之險逮至七雄闢土二霸専征其或盟約未孚則崇百雉而以尊王室仇讐尚熾復嚴八襲而用保邦家由是九服畏威諸侯述職式閭懋徳仍垂裕於後昆定鼎洪基啟重光於奕世及其素靈有國炎政披圖未嘗不廣樹藩防久司方面帶河阻險將制敵以平艱高壘深溝遂取威而定霸爾后五方分鼎六代乗龍咸皆高蹠前規重席故範雖復寢扃静柝已無伺隟之虞然後列郡通都常育磐石之固則知百王遺式歴代所因利用建侯率由斯道者也我唐中興三葉聖歴再周貞觀不違飛沈自若義聲騰於九有靈光施於八埏國步已康而闗防益謹用張下武大展雄圖載習五兵克殱勍敵重營堅壁以制不庭乃詔寧國軍節度使檢校太尉同中書門下平章事都督宣州諸軍事宣州刺史濟南公築此新城者矣公擢隂陽之秀氣含川嶽之上靈才為時生榮不世出心堅鐵石氣激風雲森武庫之戈矛杜私門之營壘負流丹之勇竟折銳以摧堅沉背水之機必追奔而逐北義征不譓方圖烟閣之形功濟多艱更鏤昆吾之鼎所以疊縻天爵頻擁隼旟政理浹旬仨風載路牙帳荷絶甘之恵編閭興來暮之謠況寧國重藩宣城奥壤星分牛斗地控荆吳扼天下之嚥喉作闗東之襟帶雄加侯甸必須良將之籌謀勢壓江山實假崇垣之壯麗於是特飛鳳詔命展金墉公乃選五稼豐登三農閒隙遂敷心計因著土功是以將校呈規工徒獻藝士皆樂往民以恱來荷長鍤以成雲陳豐畚而翳日因高就逺以日繼時萬堞才成堅同石堡四門始畢儼若玉闗爰自壬戌嵗二月興役至癸亥年三月畢工所築新城自金光門西北轉至舊城崇徳門東北角長五里三百三十三步從崇徳門以南轉至金光門東長四里二百三十步新舊城共長一十里一百九十三步新築濠塹亦從金光門遶新城轉透出大溪長八百九十四丈深三丈有餘造成大樓八所其諸敵樓橋道等不可殫書公前在京口日浚溝池崇壁壘洎移鎮撫復繕城隍凡標準地形督責功力委蛇延袤必躬必親日入而休曾無倦意牛酒犒士絲綸賞功士卒塗曁日月相望公又釀醪醴豢犧牲三日一餉軍夫五日一享將校由是萬民負畚咸恱豫以忘勞列校褰裳稟威嚴而盡力其動也山迴地轉勢若奔雷其静也雨息風恬齊如剪紙數年之役期月而成觀其千雉豐餘重門静忽飛閣神行而聳漢璇題月照以羅空層簷翼舒雕楹虬躍高陴矗而山屹方櫳豁以洞開排畫桷以星攢下臨無地走長廊而雲布横射遙天而又别一帶之寒江自為天塹環千尋之深洫宛是湯池固可藩屏皇居折衝萬里者也懿哉乎城之為役也暫勞永逸旣不騫而不崩有備無虞信可大而可久銘功勒石以播無窮其詞曰於赫有命洪惟我唐中興奕葉三聖垂光王猷允塞靈貺孔章賢士在位猛士守方王公設險以守其國重門擊柝以待暴客況此宣城國之閫閾不有金湯何為控扼烈烈虎臣爰兹鎮牧廉問方期仁風載沐寅承廟算允因玉燭遂度土工乃陳畚輂經之營之壘堞疏流萬尋淵引千雉雲浮石堡玉闗鐵瓮金甌雄加九服麗絶方州飛簷鳳舉畫栱龍游疊碧鴛兮霧合亘長雲兮翼舒何巨防之可比視方城其蔑如勒勲績於貞石作藩屏於皇居癸亥嵗十月五日宣城縣附郭南陵縣舊無城明正徳間知縣胡文靖置四門嘉靖癸亥知府羅汝芳知縣郜永春始建周九百三十六丈二尺高二丈五尺厚三丈門四水闗三萬歴九年知縣沈堯中增高三尺又於西北二門之中築臺增戍以二門相距逺也崇禎間知縣甘文奎重修涇縣舊無城明正徳中知縣鄭氣立三門嘉靖癸亥知府羅汝芳知縣陳廷芝築周九百三十二丈高二丈七尺厚三丈内外並甃以石門四水闗二城外有濠沿河舊建石堤萬歴丙申知縣陳大綬又自西門至北水闗重築石堤十餘丈崇禎間知縣尹民興復修寧國縣舊有城宋南渡後增築周五百一十九丈高一丈五尺厚稱是三門元至正中白總管建北門明洪武時塞北門正徳間知縣王時正增建四門城樓嘉靖間知縣范鎬更復三門國朝雍正七年知縣劉鑑修濬旌徳縣舊無城元元貞中縣令王貞立四門後燬明嘉靖間知府沈志言知縣趙在奉督撫檄始築城周八百九十二丈高二丈厚一丈二尺門七皆有樓内水門一國朝順治十四年知縣王融康熙八年知縣李士竑雍正八年知縣紀咸相繼重修太平縣舊無城明𢎞治正徳間知縣王雄朱守相繼置五門嘉靖癸亥知府羅汝芳知縣顧鎰建周九百丈有竒高一丈六尺厚稱是門五水闗二西北倚山萬歴丙子知縣張廷榜増築池州府府城相傳唐永泰間刺史李芃築黄巢破後刺史竇潏修復之南宋知州李彦卿李思重趙炎陳覃傅伯召葉永漸徐橋程宗仁相繼營葺嘉定中知州史定之復於城外西偏築新城如偃月狀元堙明正徳十二年郡守何紹正建磚城西北仍舊址而拓東南隅三百餘丈共周一千四百二十八丈高二丈三尺厚倍之立門七南曰通逺南左曰毓秀右曰鍾英東曰九華西曰秀山北左曰迎恩右曰望京門各有樓有月城濬濠之堙為民業者萬歴初兵備副使馮叔吉太守王頤復増而高之國朝康熙十年通逺門大觀樓圮郡守樸懐玉貴池令張應薇重建貴池縣附郭青陽縣舊無城明嘉靖四十四年邑令田登年始築周八百三十二步高二丈厚半之立四門各有樓及月城水闗二萬歴十八年知縣秦應鸑加築城北隅高之銅陵縣舊無城明萬歴三年兵備副使馮叔吉檄知縣姜天衢始築後令黄縉成之周七百丈高二丈一尺厚一丈二尺立四門各有樓及月城後知縣熊藎臣改闢東門國朝順治二年知縣蔣應仔劉曰義相繼修葺石埭縣宋立土城明嘉靖四十五年知縣曾諶始以磚甃之立門五各有樓東西水闗二建徳縣舊無城明嘉靖四十五年知縣譚經始築周五里高一丈八尺厚一丈立門四各有樓崇禎十年知縣宛三竒增高四尺五寸東流縣舊無城明萬歴元年知縣陳春築周三里半高一丈八尺厚一丈立門五各有樓崇禎時知縣許茂莘復増高三尺後圮國朝順治六年知府梁應元知縣蘇𢎞謨修復太平府府城肇築於吳黄武間東晉太和七年桓温重築唐保大三年復高廣之高三丈周十五里跨姑溪河宋建炎中知州郭偉改築新城割姑溪於城外減舊三分之一為今制周六里高三丈六尺厚稱是門六東曰行春正南曰南津南左曰龍津南右曰姑孰西曰澄江北曰清源明初屢有修治崇禎十六年巡按御史鄭崐貞甃以青石四隅設堞樓增窩鋪五十一所沿城為濠由東南開渠引水作新壩東北出水為梅莊牐以時啟閉水深而城益高國朝康熙中知縣寇明允高起龍繕修附明王世貞太平府修城記太平古金陵支邑也後稍進為郡與金陵俱倚天塹而固自金陵之為帝者都而太平之人民田土兵衛不能當其十之一然實據其上游為之儲胥禦圉而制其命如古所謂左馮翊者當天下之割而且合北不得太平不可以窺金陵南不得太平金陵不可以守夫以太平之重若此而自明興二百餘年以來守土者安於平治之形而不暇省其城低庳使弱者憑二尋之衿不必羽而登也所甓僅表而毋及裏陿不容軌土惡善潰不必淫霖而隳也萬歴辛巳壬午間莆田林侯來為守恤民隠搜吏弊興士風諸所以稱塞守狀良悉顧以時周行睥睨間而憂之謂卒有不虞如柙櫝何即不穀狃前人茍簡及瓜以俟後之君子彼復狃我將縣官何所賴哉而㑹治兵使者程公按部來與林侯筴合乃上侯議督撫中丞孫公江防中丞吕公巡按侍御陳公得報可為具疏聞之上下大司馬大司徒議報可下中丞侍御已復下程公程公下侯所與倅陳某當塗令楊某規度所増築為堞者三千七百六十而贏其崇二丈三尺而贏裏垣之崇一文六尺而贏厚一丈七尺而贏週遭為丈一千六百六十而贏所改飾為麗譙者五為津闗者三為戍廬者三百而贏計直為中金一萬七千七百几十而縮謀之帑不足則請諸郡減卒直八千四百四十餘金為之幹不足則陳公以千金益之程公再以千金益之孫公以五百金益之又不足林侯與楊令復率贖鍰千金益之又不足則為勇爵賜級以勸郡人某某及三千餘金益之林侯乃率厲其屬與士卒分功於版築間蓋不閲嵗而城成以書屬余俾記其事余嘗憶易曰王公設險以守其國未已而又曰重門擊柝以待暴客蓋取諸豫夫以大聖人而當取卦尚象時夫豈有暴客之足虞而制為重門擊柝彼所以待暴客預變之訃周且逺也故曰繻有衣袽終日戒又曰其亡其亡繫於苞桑若世宗朝寧不亦重熙累洽哉一旦島寇卒起而大江以南佳麗之地其無城者城而庳且薄者悉其子女玉帛以餧寇三里之垣茍不至隫老弱荷擔而立乗高下瞰賊目飽氣盡而走耳城之不可以已也如是今幸臺察監司諸大夫與林侯合筴而固太平不至大損縣官帑雖曰齊民之力而善用之說以先民民忘其勞咸相率赴事不嵗而成百嵗之偉功且因以為金陵上游衛其事豈淺小哉雖然所謂有形險也無形之險在黔首心林侯固已饒得之矣請以是風倅令及後之君子毋忽諸則永永有賴哉當塗縣附郭蕪湖縣古城宋建炎中隳明萬歴三年知府錢立議建工未竣同知龍宗武繼之至九年知縣周之翰乃完工國朝順治十五年池太道宋之屏倡募重葺門五皆有樓周五里高三丈近城無濠惟長河一帶東匯涇宣諸水經南城西達於江有自然之險繁昌縣明天順中遷治後無城崇禎八年知縣羅明祖始築十一年知縣張繼曾踵而成之十四年知縣馮洪孜復加修葺置窩鋪城高二丈周六百四十六丈八尺門四東南西三面皆濠繞城址出瀂港入於江國朝康熙十三年知縣梁延年修附宋曾鞏繁昌興造記太宗二年取宣之三縣為太平而繁昌在籍中繁昌者故南陵地唐昭宗始以為縣縣百四十餘年無城垣而濱大江常編竹為障以自固嵗輒更之用材與力一取於民出入無門闗賓至無舍館今治所雖有屋而庳褊破露至聽訟於廡下案牘簿書棲列無所往往散亂而不可省而獄訟賦役失其平歴七代為令者不知幾人恬不知改革日入於壊故世指繁昌為陋縣而仕者不肯來行旅者不肯游政事愈以疵市區愈以索寞為鄉老吏民者羞且憾之事之窮必變故今有能令出因民之所欲為悉破去竹障而垣其故基為門以通道往來而屋以取固即門之東北構亭瞰江以納四方之賓客旣又自大其治所為重門步廊門之上為樓歛勅書置其中廊之兩旁為羣吏之舍視事之㕔便坐之齋寢廬泡湢各以序為㕔之東西隅凡案牘簿書室而蔵之於是乎在自門至於寢廬總為屋凡若干自計材至於用工總為日凡二千三百九十六日而落成矣夏希道太初此令之姓名字也慶歴七年十月二十三日此成之年月日也始繁昌為縣止三千户九十年間四聖之徳澤覆露生養今幾至萬家田利之入倍他壤有魚鰕竹葦柿栗之貨足以自資而無貧民其江山又天下之勝處可樂也今復得能令為樹立如此使得無嵗費而有巨防賓至不惟得以休而耳目尚得以為之觀令居不惟得以安而民吏之出入仰望者益知尊且畏之獄訟賦役之書悉完則是非倚而可定也予知縣之去陋名而仕者爭欲來行旅者爭欲遊昔之疵者日已減去而索寞者日以富繁稱其縣之名其必自此始夏令用薦者為是縣至二十七日而計材以至於落成不惟興利除弊可法也而其變因循就功効獨何其果且速歟昔孟子譏子産恵而不知為政於戲如夏令者庶幾所謂知政者歟於是過子産矣凡縣之得令為難而得能令而興事尤難幸而事興而得後人不廢壤之尤難也今繁昌民旣幸得其所難得而令又幸無不便巳者得卒興其所尢難皆可喜而無憾也惟其欲後人不廢壊之未可必也故屬予記其不特以著其成其亦有以警也廬州府古皆土城唐廬州刺史路應求加甓焉城初據金斗河為池宋乾道間郭振帥淮西以鎮大城小拓其地跨河立水闗二元末城圮僉事馬世徳請發公私錢十萬貫修之明仍其舊城周四千七百六丈高三丈闊四丈門七東曰威武曰時雍南曰南薰曰徳勝西曰西平曰水西北曰拱辰四面濠俱深廣二闗上跨水西門下跨時雍門為金斗河流出入之處正徳中劇盜劉六等起知府徐鈺慮水闗難守築埭障之而導水為外濠以自固郡址西高而東下蜀山雞鳴山土山諸水匯於水西門逕城中金斗河每春夏水溢則東闗受害為甚後知府張瀚濬流以殺其勢知縣胡震亨建牐以防其涸民便之合肥縣附郭附元余闕合肥修城記至正十一年寇起淮南自浙西江東西湖南北以及閩蜀之地凡城所不完者皆陷合肥之城久圮倉卒為柵以守柵成賊大至民賴柵以完其後僉憲馬君至顧而曰以柵完民幸也非所以固迺白皇孫宣讓王及憲使高昌公議修其城遂發公私錢十萬貫召富人之為千夫長百夫長者傭小民相所圮廢盡築之富人得官發錢無甚費咸喜助不足小民方饑得傭錢奔來執事鼛鼓不設鞭扑不施捧柴荷畚麕至競作自十三年二月朔戒事九月畢城四千七百有六丈六門環為睥睨設周廬具飾器門皆起樓櫓相盜所必攻者甓之計用木若干甓四百四十八萬用人之力七十七萬八千城成而盜不至者今期月矣余生長合肥知其俗之美與夫所不從亂而可與守者有三焉其民質直而無二心其俗勤生而無外慕之好其材彊悍而無孱弱可乗之氣當王師之取江南所至諸郡望風降附獨合肥終始為其主守至國亡乃出降天下旣定南人爭出仕少不達則怨議其上而不可止吾合肥之民布衣蔬食秀者治詩書朴者服農賈婚䘮社飲合坐數百人無一顯者無少疾怒不平之色驅牛秉耒雞鳴而耕朝而息日昃而耕暮而息不合耦而終十畝負二石之米日中超百里而無憊容惟其質直而無二心故盜不能欺勤坐而無外慕之好故利不能誘彊悍而無孱弱可乗之氣故兵不能誅昔者木柵猶足以力戰禦寇而無肯失身於不義者今而得賢使君修其垣墉救其疾苦攜持撫摩以與民守之而民之與君又歌呼爱戴與君共守自今至於後日是雖無盜有亦不足憂也君前為庸田僉事城姑蘇今憲淮南又城合肥一人之身而二郡之民賴之以有無窮之固儒者之利不其溥哉君名世徳字元臣由進士第歴官應奉翰林文字樞密都事中書檢校庸田僉事又其官與余前後為史氏城又余之所志而未成者也因為紀之其執事與凡供役之人則載之碑隂舒城縣元末邑人許榮建土城明𢎞治十一年知縣安郁増築南臨大河嵗慮潰決嘉靖中知縣何偁初易以磚後歴郭懋陳魁士黄宗聖錢允燦朱世昌凡五令而功始竟周一千三十九丈高一丈五尺門六環城有濠明末殘毁國朝順治中知縣丁時陞等相繼完繕雍正八年知縣陳守仁修之廬江縣土城亦元末許榮建明景泰以後知縣李顯胡𤾉馬鑛周良㑹劉裁軒尚朱李𤾉吉等相繼修築易土以磚周八百五十二丈高一丈五尺闊九尺門六池深六尺廣二丈五尺崇禎三年知縣張雲鵠修其傾圮十二年耿廷籙因寇亂於城外築牛馬牆濬濠益深建重闗石壩城守以完國朝順治七年知縣孫𢎞喆雍正八年知縣陳慶門俱重修無為州在宋為軍壁明初知州趙君祥始築城周九里高一丈二尺闊七尺門六東引花林大河為濠深一丈闊五丈九尺嘉靖中巡按御史吳伯朋用郡人劉崙議改建甎城高二丈四尺萬歴四十六年久雨傾圮知州陳賢才修崇禎時復加修浚國朝順治六年城西南壊知州方安民修雍正九年知州張鏻修葺附明徐階修築無為州城記無為州故有城周若干丈其始不知所由築及元末而圮今復城之者監察御史吳君百朋也嘉靖辛亥壬子間倭賊竊寇海上州人布政㕘議劉君崙以侍御憂居言於同知今按察僉事許君用中請城以為之備而無為去海逺衆相與迂之不聽後三年倭寇益肆致焚燒郡縣劫守吏而取其蔵天子詔有司各得為城自保於時許君已去州之吏無能任其事者明年丙辰奉命按江北㑹寇犯淮揚逺近洶洶君歎曰是尚可不急圖哉乃進州守何寵條公帑之羨得若干緡使具諸費而召其民告語之使出力以供諸役民胥應無後始事於七月八日凡為日九十城成寇間不敢犯州父老子弟相與樂其生而頌君之功於是劉君走書京師請予記按誌無為𨽻廬州廬在曹魏南宋蓋南北之界而攻守者所必先也想其時高城固門百倍他郡而民之苦於兵革亦有甚焉者矣逮我朝混一區宇列聖相繼禮教明法令一寇賊奸宄無所容其間而廬又於天下為中土其吏民宴然無復戰爭之慮故城之遺址坐視其沒於荒榛野草之中無復以為省者夫豈非治平之徵而臣民之大幸與然君子之為政未嘗不以其身其天下之樂亦未嘗不以其心先天下之憂城郭溝池所以設險而守國者蓋不俟患之旣至乃為之圖也若兹城之久而復沒也又豈非有司之失職而論政者所深慨與自江南用兵以來戰守之務取倉卒以致喪敗者多矣彼其心非盡不知患之當備惟夫計迂習惰而僥倖免諸其身故備之弗豫也無為今巨州寇所窺也非賴吳君殆不免於焚劫然國家之制吏率以九載乃得去其官惟御史之出按則一年而代計吳君之日宜易以僥倖無事而獨汲汲乎備以脫州人於兵火之中此其賢於世之君子逺矣予故為記其事以告為政者使知勸焉巢縣舊城圮元守帥王珪因舊規甃之至明嘉靖間惟北門樓堞如故餘皆木柵知縣李謨嚴宏更築周十二里高二丈三尺闊六尺西南臨河東北據山門四隆慶中知縣易可久萬歴中知縣陳經言崇禎時知縣寗承勲俱修葺國朝康熙七年知縣于覺世修雍正七年知縣鄒瑆重葺鳳陽府府城明洪武七年建周五十里四百四十三步高丈餘皆土築惟東北磚壘四里有竒門十有二曰洪武朝陽獨山塗山父道子順長春長秋南左甲第北左甲第前右甲第後右甲第其長秋父道子順三門後裁九門名猶存池本無水軍民分種為田鳳陽縣附郭明洪武五年建外城周圍九里三十步高二丈許門四内城周圍六里許高二丈五尺二城皆磚築内城東南及西三面有池舊為皇城崇禎八年守監王裕民以流寇犯鳳奏請鳳無城郭令民得聚居於此國朝康熙六年置縣治臨淮縣梁天監五年築城周圍九里十三步高二丈五尺東遶渦流西環濠水北湧淮河門六各有樓明正徳七年巡視都御史叢蘭守備太監閻瑄重修嘉靖中知縣吳鼎訓導郭維城鳳陽衛經歴嚴時亨隆慶中知縣陳中烈萬歴中知縣鄭之亮賈應龍相繼修治國朝順治六年淮水溢圮數十丈知縣徐必進修懐遠縣舊城相傳南北朝時所築周圍九里十三步高因荆阜深阻渦淮明景泰初知縣王道因舊址修建其後傾圯遂無城郭崇禎時流寇猖獗巡撫朱大典請城荆山詔遣欽天監載圖度地於淮河兩岸始建新城僅周三里二百餘步定遠縣舊有土城明正徳七年知縣楊麓易以磚石周五里二百三十六步高二丈餘門四環城有池深二丈北池闊二十丈餘皆闊十丈十四年知縣高璧重修嘉靖以後知縣高鶴盧春􅈍陳鵬舉李彬相繼修葺虹縣舊惟土堡嵗久傾圮明景泰初知縣王磐𢎞治中知縣樊江修之萬歴二十二年知縣任愚始建磚城周圍五里十三步高二丈門五又有水門二敵臺八座池深九尺闊三丈壽州舊城久堙宋嘉定間許都統重建周圍十三里有竒高二丈五尺廣二丈門四東為池塹北接淝河西連湖中明正徳中知州吳節同知梁穀袁經嘉靖中知州栗永禄甘來學吕穆感萬歴中知州鄭􅦨相繼増修國朝順治六年大雨知州王業修鳳臺縣壽州同城宿州城肇於唐明洪武十年始壘石覆甓周圍六里三十步高二丈四尺廣二丈五尺門四外有月城池深一丈闊如之靈璧縣古未有城明𢎞治中知縣陳玉始築土城旋圮正徳初知縣陳伯安即遺址建周六里有竒高一丈九尺門四池深八尺闊二丈知縣邢隆繼修潁州府潁州舊城周四里高一丈八尺明洪武間指揮僉事李勝建北城萬歴二年知州趙世相稍移西築南城與舊合為一周五里四十四步北門仍舊東西南三門俱在新城南曰迎薰東曰宜陽西曰宜秋俱有樓有月城正徳甲戌兵備孫磐始甃以磚北倚潁水為隍嘉靖二十年兵備蘇志皋萬歴初知州謝詔濬隍置牐阜陽縣附郭潁上縣舊有土城元季圮明初千户孫繼達始建磚城周二里六十二步高二丈五尺門四南北西三面有池東面臨河嘉靖中兵備蘇志皋濬萬歴間知縣屠隆築隄崇禎九年知縣廖維義重築國朝順治八年城圮於水知縣鮑𢎞仁修霍邱縣舊惟土垣明成化間知縣高昇𢎞治中知縣王啟修葺正徳七年都御史叢蘭檄通判方賓易以甎石知縣孫誠繼之始竣周六里二百七十三步高一丈八尺門四知縣劉佐李璉周佩楊善等修之其池深三丈闊一丈知縣王啟鑿知縣陳表重濬亳州明洪武初築土城宣徳十年指揮周廣甃以甎石周九里三十步高一丈五尺廣倍之形如卧牛故名卧牛城門四𢎞治十一年知州劉寧増修太和縣舊有土城明正徳間判官楊威加築知縣趙䕫繼甃以磚周一千八百七十九步高二丈二尺厚七尺門四各有樓池深三丈闊五丈䝉城縣明初築土城周九里有竒立西南及北三門其東渦水環遶未立門景泰初知縣孫震修補正徳六年知縣葉寛重建磚城嘉靖間知縣劉繼先開東門又開水門二後黄河水溢北城傾圯知縣劉宗鼎建議縮城今僅六里許天啟中知縣吕希尚崇禎時知縣王化澄楊子竒葺治國朝順治中知縣田本沛典史余司韜康熙中知縣竹緑猗修滁州州舊有子城羅城相傳唐宋間築明洪武中拓為今城周九里十八步高一丈七尺門六東曰化日小東曰環漪西曰永豐小西曰觀徳南曰江淮保障北曰拱極有月城又有上下水闗建於宋嘉定明洪武中修跨沙河為池國朝知州寗鳴玉鄭邦相余國􅕠王賜魁相繼修葺全椒縣明成化七年知縣張碧創始嘉靖戊午知縣顧達始築為城周二里許高厚各一丈門三並有重樓襄河遶其後為池萬歴中知縣楊道臣崇禎時知縣方允昌國朝康熙中知縣藍學鑑屢加修理來安縣明成化四年知縣趙禮築土垣嘉靖三十五年知縣魏大用始為磚城高二丈門六各有樓萬歴中知縣周之冕修崇禎時知縣吳志高鑿池深三丈廣五丈國朝康熙十九年知縣喬嵩修和州州舊有城相傳范増所築明初知州張純誠重修周一十一里高二丈四尺門六上皆有樓東曰朝陽西曰臨湖偏西曰横山南曰横江偏南曰環江北曰香泉水闗二濠塹深廣萬歴元年知州康誥於六門築重城各周十五丈内外皆磚上為女牆崇禎時陷於流寇知州萬民戴重葺國朝康熙中屢經雨圮知州夏瑋王瑄繕治含山縣舊無城明正徳七年知縣張文淵始築土垣周三里高一丈五尺門四池深廣各丈餘嘉靖中知縣葛麟易以磚石高厚有加國朝知縣朱長泰范貞相繼増修廣徳州明洪武初元帥趙繼祖邵榮鎮此始建城垣周八里高一丈五尺廣八尺門六東曰迎春西曰崇徳南曰明威北曰閱武東南曰石溪東北曰常州即今水闗池深八尺闊一丈六尺嘉靖中始甃以磚自正徳後知州劉節莊士元吳同春段猷顯屢修屢圮國朝康熙二年知州楊苞又修之其六門之名改為熙春安貞麗正拱辰鍾秀惟常州仍其舊稱焉建平縣舊無城明崇禎八年知縣侯佐始築周七百八十丈高一丈廣二丈五尺門四國朝康熙四年知縣李景榮三十七年知縣茅成鳳俱修葺六安州州舊有土城明初指揮王志甃以石正徳中毁於寇知州李袞指揮劉芳撤而新之増置敵臺二十七座周一千一十丈高二丈三尺闊如之門四東曰朝京南曰鎮南西曰通濟北曰武定後増文昌門有樓有月城池深一丈四尺闊七丈崇禎末為張獻忠所陷通判羅傑知州徐潘等修補未竟國朝知州劉克孔王所善王廷曾李懋仁相繼修之英山縣元初至元間築土城周三里後圮明時但倚山帶河為險城不復設𢎞治己未盜起主簿徐璋承檄重築高一丈二尺闊五尺缺東南隅因河為濠門五明末賊蹂躙之基址僅存霍山縣元時曹平章保障其地曾築土城明𢎞治中知縣崔中吳霖因舊址相繼修築周一千一百丈歴正嘉隆萬中知縣王坊陳中復楊楠吳達迭甃甎石高一丈八尺水闗二池深一丈闊二丈明季寇燬知縣曾廷􅇐張相重修國朝順治中知縣欒元魁修水闗泗州宋有東西二土城明初甃以甎石始合為一汴河貫其中周九里三十步高二丈五尺東西南北四門西南又一門名香花隆慶中巡按蔡應𤾉萬歴中巡按李時成邵陛相繼修築環城有濠外有石堤建牐啟閉崇禎時大水灌城郡守李希楧穴城以洩水國朝康熙十二年知州李徳燿修城及堤其後淮湖泛漲堤不能支城遂淪陷寄治於盱眙山盱眙縣古稱城小而堅有六門宋嘉定十一年修盱眙軍城阻山帶河明永樂間圮今北門尚存名曰淮汴天長縣舊有土城周六里餘明嘉靖三十六年知縣黄泰然因建磚城周一千四十六丈有竒高二丈廣二丈七尺門四各有樓東西有月城環城有池深廣俱二丈萬歴中知縣田所賦崇禎時知縣羅萬象重葺五河縣舊有土城為淮水所圮嘉靖中知縣高珍遷建磚城周四里高二丈三尺廣三丈四尺門四各有樓池深一丈五尺闊三丈六尺國朝順治九年知縣丁浴初康熙二十二年知縣鄭鼐俱修葺江南通志卷二十一
