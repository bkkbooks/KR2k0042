body:
  text: 江南通志卷八十九學校志學宫三安慶府安慶府儒學舊在正觀門外元末燬於兵明洪武初知府趙好徳即山谷書院創建在府治之東正統中巡撫周忱知府王璜重建廟廡橋門堂齋號舍射圃咸備成化中知府陳雲鶚撤學前藥局為櫺星門知府王璠繼作泮池石梁規制大備後知府徐傑陶煦張文錦相繼修治嘉靖十年詔增啟聖祠及敬一亭貯六箴碑各縣如之明末城潰舊制僅存十之四國朝順治八年操撫李日芃知府王廷賓李自貞相繼增修康熙十一年巡撫靳輔捐俸倡修知府姚琅敎授莊名弼各捐俸重建殿廡橋門泮宫昭代文明坊悉復舊規附靳輔記自四代之學興而辟雍之典盛尊三老五更則圜橋而觀聽者以億萬計増庠序學舍則雲集而升臯比者至八千士猗歟盛哉然辟雍而外厥有泮宫其在詩曰思樂泮水薄采其芹葢儲棟梁而育英才歴代莫與易焉越我皇大清龍興五十八年以來擴清海内雅意右文今舉臨上御極之八載化洽政治逺人來庭爰咨宗伯以雍之典徵衍聖於闕里闡乾元於司成於是負笈擔簦觀光而戾止者薄海内外僉曰乃聖乃神乃武乃文將六五帝而四三王亦何有於漢唐以古作人之典誠莫有盛於斯者也予於辛亥秋恭承簡命來撫茲土下車之次循舊典以謁先師顧瞻廟貌有圮其容爰仰榱題亦隕其奥詢之郡守與學博則曰茲學創於洪武之紀擴大於正統之年自茲以後年逺寖弛周文襄而後葢未能復臨觀之義云予曰人存政舉宫牆之事曷可緩乎予因首倡其義而姚守則力肩其事於是庀材鳩工先以僚屬之捐俸繼以紳士之赴義經營於壬子之冬落成於癸丑之秋凡為殿為堂為㢘為門為閣為廨為墉者必堅必緻莫不煥然一新繼自今春秋養老飲射讀法於其中者賢有司之事也考鐘伐鼓横經論道於其中者嚴師長之職也歌詩習禮則古昔稱先王周旋揖讓於其中者羣弟子之業也夫道之在人猶水之在地無地而不有水則無人而不具道凡爾多士既入是禮門由是義路當念人既具道而身又在名教之中即當以天地萬物為已任以君親師友嚴立身大而敦倫明道致君澤民精而窮理盡性格致誠正高而立德立言立功以乘不朽壙而仰觀俯察叅贊以隆守待則達而在上為龔黄為卓魯為燕許事功亦本之道德微而在下或著書立説或紹先開後或輔經翼傳文藻亦本之性功古人云通三才曰儒敷五教在寛是所望於師儒者惟曰既勤垣墉惟其塗塈茨既勤樸斵惟其塗丹艧將學於斯弦誦於斯下學而上達亦於此泮宫而始基之矣若曰徒勤帖括以為羔鴈之助博一第以為身家之謀則攻其末而棄其本精之漓者物必窳諸士其當戒之哉姚郡守復進而請曰學宫成不可以無記也遂援筆而記其事以告來茲是役也贊其議者方伯徐國相觀察使佟國貞董其成者郡守姚琅協其謀者郡丞胡靖懐令段鼎臣身其勞者學博莊名弼例得並書至洪武初知府趙好徳創建以後及順治間知府李士楨重修以前其為修為建者官不一其人人不一其事咸有功於聖賢不可諼也則又令掌故者紀其人紀其事於碑陰十二年改建啟聖祠於明倫堂後二十一年巡撫徐國相率知府劉橒敎授郝毓㠁訓導汪良相修治五十八年知府張楷重修啟聖祠明倫堂六十年又重修大成殿及兩廡㦸門雍正七年知府徐士林敎授惲宗洵重修十一年巡撫徐本以舊崇聖祠在明倫堂後規制未協改建崇聖祠於前移明倫堂於後又重修大成殿增建敬儀亭於㦸門外左側添易籩豆銅鐘石磬如式附徐本記天下郡邑皆有學學必有廟以祀先聖先師並追崇其所皇上中自出禮莫大焉我緝熙光明昭格上下而尤加意和建極聖敬日躋御極之黌序詣太學追封先師五代叙列配享諸賢以為初親天下萬世矜式士之遊於學門者自黨庠術序而下琴瑟鐘鼓之聲登降揖讓之禮耳濡目染賢才美質知學者足以開其心頑鈍之民亦習聞禮義知倫秩所由序矣余於壬子秋承命撫鎮安徽諸郡縣至之日謁文廟退坐明倫堂諸生升階揖拜講習如禮慨然以是為風化之所自起而循視廊廡風雨薄蝕崇聖一祠居明倫堂之後規制未協夫聖人之道莫大於定名分而别等威故尊卑上下有分宫室宗廟衣服車旗有制所以立隆為極而古今莫之能損益也羅䂊章曰吾聖人之道高明廣大固非言語所能形容然而精粗初無二致為學者必明乎此然後謂之知學為政者必通乎此然後為之知政一門之建一屏之設形氣之粗而至精之理焉往而不在乎又况闗乎規制之大者乎攷崇聖之建祠自宋大中祥符間以顔曾恩孟配享堂上顔路曽晳伯魚從祀兩廡以為抑父崇子欲别設一室祀啟聖而以三子配迨明洪武中宋濓解縉始復起其説而後程謝諸臣相繼闡明之至正統時裴侃條奏文廟位次謂啟聖已創殿於大成殿西而顔曽思孟父皆追封公遷配啟聖殿嘉靖九年大學士張璁請於大成殿後另立一堂是崇聖一祠始居殿西而改立殿後全彜倫而妥聖靈人道之極也明倫堂為師生請習之所宜列崇聖殿後余於癸丑春塢工庀材後者前之前者後之丹楹刻桷輪奐一新凡帶楯負戺之所視履攸宜至夏之季五閲月而工始竣為率師生觀其落成高明整飭儀矩森嚴豈直為觀美而已哉詩曰藹藹王多吉士媚于天子藹藹王多吉人媢于庻人余願吾士民之仰觀為式者由是明諸心修諸身行於父子兄弟夫婦朋友之間皇猷而而達於君臣上下人民事物之際各盡其分贊乃襄至治以應重熙累洽之風於此葢有厚望焉鐫石而為之記崇聖祠名宦祠鄉賢祠各縣學同懷寧縣儒學舊在正觀門内依仁坊元末燬於兵明洪武初知縣閻節徙建於忠節坊有學無廟正統間敎諭周子葛始建文廟正德六年提學御史黃如金易天寧寺地改建即今址萬厯間廟災知縣劉拱辰重建後學地為民居所侵天啟間推官常自裕清還舊基大加創建明末燬國朝順治三年知縣賈壯重建十三年知府李士貞知縣周霖次第修治十八年敎諭成梁建大觀閣於東偏康熙七年知縣馬剛敎諭王雲龍重建文廟及明倫堂二十年敎諭楊渭英捐建講學堂提學田雯額曰經義堂問竒亭五十年巡撫李成龍知府張楷重修雍正七年敎諭謝有煇添設兩廡從祀先賢先儒神位并首創祭器八年復同訓導文楫知縣詹宜倫謀辦樂器九年知府徐士林知縣李元祥捐置如制并置經書律例立印冊存學桐城縣儒學舊在桐溪橋東宋元祐初知縣溫子謙武子春相繼建立後燬於兵明洪武初知縣翟那海遷於縣治東南佑文坊後知縣孔希善嚴頤陳勉相繼修葺國朝順治十二年知縣石朗敎諭沙衍中訓導解詵重修康熙八年儀門櫺星門圮知縣胡必選捐俸建造二十二年知縣王凝命敎諭王立極訓導邱五典重修明倫堂建存存堂雍正七年知縣倪大成率邑紳士捐修正殿及堂廡潛山縣儒學在縣治東明洪武初知縣張仁創建成化間知縣袁慶祥修之嘉靖後知縣高廷紳鄒守王玉汝先後修葺明季燬於兵國朝順治十年知縣鄭遹元敎諭潘煜如李思伯重修十六年訓導蕭汝榮建造啓聖祠康熙九年知縣周克友建明倫堂十五年重修正殿十六年敎諭程式琦訓導王仁灝捐修儀門櫺星門十九年知縣劉芳輝建義學於明倫堂後五十八年知府張楷知縣段舒捐修聖殿濬泮池建德侔天地道冠古今二坊左建奎星樓右建文明樓雍正八年重修太湖縣儒學在縣治西明洪武初知縣章通建𢎞治後知縣李承勛同知林有禄知府李遜知縣羅汝芳相繼修治明末燬於兵國朝順治六年知縣李世洽建明倫堂知縣王廷舉鄒應錫相繼加修康熙十一年知縣王崇曾訓導葉惺心建奎星樓十六年知縣方人龍改建兩廡及櫺星門四十五年敎諭錢源肇重修五十年建尊經閣講堂雍正八年知縣李蕡敎諭程有則重修崇聖祠宿松縣儒學在縣治東南元縣尹戴昌建明正統間知縣謝驥重建嗣後知縣孫衍顔敏施溥推官王孫昌知縣楊之屏相繼修葺國朝順治三年知縣孟瑄重修十一年知縣孫繼文重修康熙二年後知縣王民皥朱維高朱卷先後加修雍正八年知縣劉泰重修望江縣儒學在縣治北宋季學隨縣遷江口元至正間復故址附陳天民講堂記王化自北而南修文學以風天下崇儒雅以倡士氣復徭役置學官帝王之道光演於明時聲敎之塈流聞於四海由是郡邑敎化之宫與昔比隆矣雷川縣故有學燼於兵火假宫薌江元天開闢諸賢綱維斯道前尹張公魯瞻以先聖遺像巋然獨存於烈焰之餘深嘆其異遂載以歸後元公榮爰即舊址起立黌舍行釋奠禮至元辛巳正室成大德丙午始建東西廡及門衆士經營壘葺寖還舊觀百爾器具以次咸興獨講堂則有所未暇焉皇慶二年春天民承乏來茲使圖撤舊而新之爰咨爰度鳩材徴工卜日鼎構土木之費浩繁學租之入用度不足盡供前序方開宗贊議以補其不逮協力以助其不給用㡳厥成羣儒之功為多學介縣治北大江横其南雷江直其東昔傳沙塞雷江口狀元從此有縣佳識語也至是一夕沙洲忽生興賢之明詔正頒開先之符肇見文明之運適當為多士賀也先是田租嵗入名存實亡於是始理疆畝覈欺弊邑賢大夫壓福達勢劉榮祖薄正索羅崇風化正公議奸㸃欺負之徒莫逃於明鑑工既訖則學宫之制備學田之疆域復邑賢大夫俾記其事且刻田之疆域於碑陰庶幾來者有稽賢宰之美亦藉以傳遂為銘曰孔聖之道百王所宗國都郡邑孰非王宫聖道彌光大成益封春日􅊝李化雨文風雷江之旁翼翼宫牆有相之道巋然靈光藏修有地講讀有堂多士游歌濟濟洋洋棟宇恢恢逺矣成規誰歟來者尚其葺之元末燬於兵明洪武間知縣徐煥重建宣德𢎞治間敎諭陳遴張夔先後増擴嘉靖初同知魏文象知縣余綋更造堂齋後知縣朱軾孫琦楊廷薦等復葺之國朝順治六年知縣王世寅重建明倫堂及兩廡櫺星門十四年知縣王澤隆敎諭姚見龍更建堂祠康熙元年敎諭談志建觀德亭修文昌閣九年訓導方至樸復加修葺二十一年知縣伊巘重修明倫堂雍正四年敎諭陸煥重修正殿徽州府徽州府儒學唐及宋初皆在城東北隅太平興國三年知州事蘇德祥遷羅城東門内烏聊山上嘉祐四年遷於南門内熙寧中復遷烏聊山紹聖二年復遷於故址紹興間知州汪藻増建左廟右學德祐間兵廢元至元十五年復建後燬明洪武初重建堂齋廟廡橋門射圃悉備正統八年御史徐郁命同知徐亨増新之知府孫遇畢其役成化間提學御史陳選婁謙先後檄府修建附莊㫤記徽州府學故不治蓮塘婁先生以御史奉命提學南畿至則嘆曰此吾朱夫子之鄉也而是學乃不治哉於是郡之守貳莫不鼓無振作庀材鳩工以後為戒而奔走執役之人亦皆晨夜展力不以倦告不數月而徽學大治且為南畿諸學之冠定山莊㫤諗於衆曰蓮塘之所以汲汲是學者豈止於徽哉將以汲汲於天下之學也夫以朱子之鄉止於徽則天下之學所當治者皆古聖賢之地而必孔子之魯孟子之鄒濂溪之舂陵二程之河南以及夫是徽而已天下無古聖賢者其學皆不治也而可哉葢曰有孔子則堯舜禹湯文武之道益大有朱子則濓溪二程之道益明是孔子朱子者天下斯文之主古今學者之師而曰朱子之鄉則鄉之人學聖賢者庻幾可以不出其鄉而不至以為東家某矣夫鄉之人去其國千里見故鄉之人則必談笑而喜其不然者必非故鄉之人也居稠人廣坐之中有談聖賢人者其鄉之人必曰此豈爾所知哉吾知其詳吾里相近而居相接也至於學也獨無然乎此徽人所以必學朱子吾蓮塘之意也雖然朱子亦豈可以㮣學哉朱子一也有古之朱子吾之朱子蓮塘之所以告徽人者古之朱子乎抑吾之朱子乎古之朱子聖賢之影響紙上之成迹而吾之朱子無他吾心之本體吾之朱子也吾心之神明吾之朱子也居吾敬以立其本窮吾理以致其知精以察之一以守之則吾之所以叅天地者此吾之所以繼往聖而立人極者亦此所謂朱子者在我而不在古朱子之後又一朱子矣蓮塘不棄予每與論學况夫徽之豪傑出聖賢之鄉者哉或曰學朱子而不學孔子何也曰以徽人言故謂之朱子朱子學孔子者學朱子乃所以學孔子也孔子者自然之朱子朱子者勉然之孔子學朱子者將止於朱子哉𢎞治間知府彭澤增創號舎嘉靖十年制増啟聖祠並建敬一亭貯六箴碑各縣如之國朝康熙三年知府藺一元敎諭張霖重修並建尊經閣師儒等舎九年知府曹鼎望修㦸門十二年知府張登舉徽寧道王緒祖重修聖殿五十四年邑人項憲捐貲重建明倫堂兩廡及儀門子項絪畢其役雍正三年學宫前東南鄒魯石坊燬於暴風絪子道暉又捐貲重建十年敎授儲郁文重修崇聖祠鄉賢祠及櫺星門各處柵闌邑人徐景京徐璟慶重建名宦祠十一年項道暉又重修正殿尊經閣文公祠及内外墻垣甬道崇聖祠名宦祠鄉賢祠各縣學同歙縣儒學在縣治東宋淳祐間知府謝堂始建元初戍兵撤燬敎諭吕泰初等相繼興復至大三年縣尹宋節葺之明初知縣張齊因故址重建正統間知縣高年又撤新之規制已具而前逼民居景泰間敎諭羅鎡復購地而廣之成化間知府周正復加修建嘉靖末知縣謝廷傑戴東旻葉高標踵修國朝順治四年知縣宋希肅重修康熙三年署縣事府同知聶煒知縣吕應瑞重建明倫堂十一年聖殿圮徽寧道吕正音知府曹鼎望知縣孫繼佳敎諭吉天助重建雍正十年敎諭錢澂募修邑人徐景京徐璟慶捐修文廟及兩廡明倫堂休寧縣儒學在縣治南宋初在縣東紹興六年縣尉陳之茂遷於南門外之左即今地元至元大德間增修至正間燬明洪武間重建廟學成化六年同知黃用宣擴普滿寺地起明倫堂將大興學舍而巡按費臻仍以地歸寺後提學戴珊又以寺地歸學𢎞治十一年都御史彭禮命知縣李華復購寺地以擴其基歴正嘉規制大備國朝順治八年知縣翁人龍康熙二年知縣傅維楧修十七年敎諭張問達訓導孫應嗣加葺後知縣廖騰煃張韜重修雍正九年邑人黃治安捐修正殿婺源縣儒學宋慶厯間創建於縣東附洪邁記江南俗本嚚於訟歙浪受其名婺源人重不幸至席鼎湯最沸之目縣人翰林汪公藻吏部朱公松文章行誼表表獨立不忍視鄉曲䝉惡聲顧而之他鄉紛閔閔焉諸生時相與言學宫在西邊九十五年寖入於壊地勢黯昩青衿不能羣居陰陽家流雜指山鄉背為不韙當徙而趨新士大夫滋益多謡謗宜革是時乾道嵗戊子今彭君烜曰嘻吾責也將安所易置乎曰吉莫如城東驛君曰是在部使者非吾實顓盍請諸請之而俞且致五十萬錢侑費傾城大喜儒生王允恭李知已並捐其旁便近地倡出錢粟諸公喜趨之即其冬廟殿及藏書閣成􅂷就矣會郡守好惡異疑縣特以計科歛民書掲邀愬章至換他健吏耳日鈎訐亡一詞始搏頰愧悔聽緒成之然首議者倦矣謝工遣徒仆木撤瓦丞尉亦懲艾噤不敢復發口獨殿閣棲棘籬中不敢毀望之愀然又三年後令洪君邦直至瞿然悼前故曰二千石惟不興學縣令攬衆謀而自辦之靳尼其成安敢此即出郡錢六十萬使訖役既萎而蘇既僂而伸民又益喜勇勸視曩時加倍有頃百室之宫成靚深廣盱不嗇於素過者心開目明無間處者於是雋秀士滕生恪以降百有一人介令為容遣信千八百里走贛川合詞告鄱陽洪邁曰願有以記予鄉壤與斯邑接令君又宗盟長其何辭今之學非古之墊也庠序之制既以糟粕僅存至於主敬以直内立義以方外致知格物之本窮理盡性之要正心誠意之傳綿綿延延如綫不絶曽子且死不忍一簀之姑息舉扶而易之季路臨大難正冠結纓之暇如在洙泗工尹商陽手弓而殺人掩目止御不忘有禮死生之變争戰之急亦大矣而歸趣如此况乎從容進退灑埽寢食之間哉少成若天性習慣如自然古之人歟其天資高明後世雖不可跂及向非輔之以學問士必不能不敎民而驅使戰是謂棄民不素養士而空其必然斯謂棄士宜國家拳拳致力立學徧海内臨之官師而不容釋也嗚呼事難興而易敗今夫是役有邑子開先部使者畀其地縣大夫憗為之而職敎化者顧歴四年閲兩令始克潰於成故予詰曲登載驗其至難後之君子朝夕游於斯尚思先王之所以敎古人所以行朝廷所以留意祭酒之所以急刋其春華以既秋實窮高極深暴白成就使逺近稱頌曰婺源又有人若是乃答令君本意科第餘事爾熙寧中知縣劉定遷縣西即今地後屢遷屢復附朱子藏書閣記道之在天下其實原於天命之性而行於君臣父子兄弟夫婦朋友之間其文則出於聖人之手而在於易詩書禮樂春秋孔孟氏之籍本末相須人言相發皆不可以一旦而廢焉者也葢天理民􅉓自然之物則其大倫大法之所在固有不依文字而立者然古之聖人欲明是道於天下而垂之萬世則其精㣲曲折之理非托於文字亦不能以自傳也故自伏羲神農列聖繼作至於孔子之身然後所以􅂷世立敎之具燦然大備天下後世之人自非生知之聖則必由是以窮其理然後知有所至而力行以終之固未有飽食安坐無所猷為而忽然知之兀然得之者也故傅説之告高宗曰學於古訓乃有獲而孔子之敎人亦曰好古敏以求之是則君子所以為學致道之方其亦可知也已然自秦漢以來士之所求乎書者類以記誦剽掠為功而不及乎窮理修身之要其過之者則遂絶學捐書相與馳騖乎荒虛浮誕之域葢二者之域不同而於古人之意則胥失之矣嗚呼道之所以不明不行其不以此與婺源學宫講堂之上有屋焉榜曰藏書而未有以藏莆田林侯虙知縣事始出其所寳太常神筆石經若干卷以填之而又益廣市書凡千四百餘卷列庋其上俾肄業者得以講敎而誦習馬熹故邑人而客於閩茲以事歸而拜於其學則林侯已去而仕於朝矣學者猶指其書以相語感歎久之一旦遂相率而踵門謂熹盍記其事且曰比年以來鄉人子弟願學者衆而病未知所以學也子誠未忘先人之國獨不能因是而一言以曉之哉熹起對曰必欲記賢大夫之績以詔後學垂方來則有邑之先生君子在熹無所辱命顧父兄子弟之言又熹之所不忍辭者其敢不敬而諾諸於是竊記所聞如此以告鄉人之願學者使知讀書求道之不可已而盡心焉以善其身齊其家而及於鄉達之天下傳之後世且以信林侯之德於無窮也是為記云元末兵燬明洪武初知州白謙因故址重建天順成化間知縣張瑄韓儼相繼修繕𢎞治間凡再修而火知縣喬恕聶瑄先後建造嘉靖初又燬知縣曹忭拓地重建萬厯間知縣趙昌期建尊經閣國朝順治九年知縣馬元訓導金注修葺十一年知縣張𢎞美敎諭翟皓重修十五年府訓導吳煥然增修康熙二十六年知縣張廷元重修正殿三十一年署縣事蔣燦重修明倫堂五十七年知縣竇祖禹重修大成殿祁門縣儒學舊在縣治南宋端拱中知縣張式始建元移治西南即今地至正時燬於兵明洪武初知縣鍾友諒因故址重建永樂七年大水圮宫垣知縣路逵修葺成化𢎞治間再燬再修正德中巡按鄺約拓地而大之嘉靖至天啟歴有修舉國朝順治十五年知縣陳法敎諭張季琪重修康熙十二年知縣何縉訓導周祚光重修十九年敎諭吳人龍加葺黟縣儒學在縣治後宋初在縣南元因之後燬於兵明屢加修建以地形洿下輒壊正德九年巡按御史吳鉞度縣西北高爽地屬知府熊桂徙建之歴年増葺國朝康熙九年知縣杜𢎞重修十年知縣藺佳選重修三十年知縣曹貞吉修正殿及明倫堂雍正八年敎諭林燾訓導丁煃修兩廡績溪縣儒學宋在縣治東元初廢為軍營乃遷於縣治西即今地明洪武五年知縣蔡美增建明倫堂兩廡櫺星門射圃悉備正統十三年知府孫遇以學基狹隘購地增修成化間同知黃用宣改建明倫堂正德間知府熊桂敎諭敖越更新之嘉靖三十九年知縣林應雷重構浴沂亭國朝順治八年知縣郭世維修十五年知縣李之韡重修康熙十年知縣劉滋加葺雍正八年敎諭湯顯忠重修大成殿及明倫堂寧國府寧國府儒學在府治東南舊在府治東宋崇寧間知府李彦卿移於城内建炎三年仍復舊址紹興十年知府汪伯彦更徙而東面文脊峯淳熙嘉定間歴加修葺元總管陳大中改建後燬於兵明洪武初知府黃榮祖徙建今地正統中知府袁旭撤而新之明倫堂東西分列四齋廟廡橋門諸制悉備復造學門於廟東御書樓於堂北嘉靖十年制増啟聖祠並建敬一亭貯六箴碑各縣如之萬厯後知府陳俊李國觀蕭良譽金勵相繼修葺崇禎時知府黃夢松重建明倫堂知府周光夏重建大成殿國朝順治六年知府管起鳯重修康熙九年知府莊泰𢎞大加修葺十九年知府王國柱又捐俸修理敎授徐馮訓導姚士重董其事崇聖祠名宦祠鄉賢祠各縣學同宣城縣儒學在府治西南舊在城東南明洪武間知縣王文質徙建泰和門内後知縣邢知逺又改建縣治西宣德間知縣蕭吉重修正統七年知府袁旭遷建今地嘉靖二十六年知縣蕭綸重建國朝順治間知縣陳正中王同春相繼修葺康熙十二年廟圮十六年知府莊泰𢎞知縣李文敏敎諭徐化民募修正殿其工未竟二十一年知縣袁朝選敎諭陸志遇訓導錢邦達各捐俸助成之南陵縣儒學在縣治東即崇敎寺舊址初在縣治南宋紹興間遷縣東南元季燬明洪武四年知縣甘潤敎諭劉子潛重建嘉靖四十年改移縣東未及修葺四十四年知府羅汝芳知縣郜永春終其事萬厯四年知縣林鳴盛復加修葺增建尊經閣及號舍十一年知縣沈堯中移聖廟於南四丈崇禎間知縣杜繩甲重建明倫堂國朝順治十年知縣楊必達重修康熙十八年知縣屈升瀛敎諭顧芳菁訓導張翥建大成坊二十一年知縣杜源敎諭顧芳菁訓導徐鍾麟重修尊經閣雍正三年知縣宋廷佐敎諭章克長訓導童昊重建邑人劉沆輩董其成規制一新涇縣儒學在縣治北即大安寺故址初在縣南南唐保大四年推官吳光輔創建宋咸平中圮於水既重建又燬於兵淳熙中知縣汪行中徙建今地元至元間圮僧據其地縣尹施正大敎諭賀桂孫力復之尋燬於兵明永樂間知縣薛蕙重建正統初知府袁旭增葺之明末燬於兵國朝順治六年敎諭施化逺募修康熙十八年知縣鄧琪棻捐修明倫堂二十二年知縣蔣雲翼敎諭楊言書訓導汪瀠重建正殿四十三年知縣孔毓培訓導姚光俊重建明倫堂貢生趙濬重建啟聖祠寧國縣儒學在縣西門外初在縣東南宋紹興間徙東門外明洪武十五年知縣鄭承事改建今地正統間知府袁旭知縣劉清增拓之𢎞治間知縣孫珍徙明倫堂於聖殿西嘉靖中知縣沙竒訓導樊玭作泮池國朝康熙十八年知縣馬光建尊經閣二十年知縣陳王策捐俸重修四十八年郡同知郭威釗署縣事捐俸增修旌德縣儒學舊在縣東尉廨宋崇寧初知縣嚴適建宣和間燬紹興中知縣趙伯傑徙建東十歩元因之至正末燬明洪武三年知縣朱鐸重建嘉靖間知縣柳應陽稍徙而北後知縣李調元建文昌閣於學東萬厯間知縣秦文㨗大加增建天啟間敎諭周民改泮池於櫺星門外國朝順治二年廟宇盡圮徽寧道張文衡敎諭吳邦俊倡修建明倫堂於舊址八年徽寧道袁仲魁捐俸建兩廡及儀門月臺十年兵備道孫登第申偉抱知縣周一熊相繼繕修康熙四十一年督學張泰交允邑紳士請遷學宫於縣治西重建大成殿門堂齋廡規制俱備太平縣儒學在縣治東南初在縣治西宋嘉祐中知縣孫覺徙建今地元至正間重建明洪武三年知縣李簡修正統間提學彭朂命知縣張珪增建後又拓而新之正德間知縣楊良臣復拓前基易櫺星門以石嘉靖中圮敎諭王佳士改建明倫堂鑿泮池天啟間漸圮敎諭龔立本重修國朝順治五年敎諭虞敬募造泮池石橋修明倫堂康熙二年知縣陳恭敎諭袁澄訓導董雲申加葺二十年知縣王璘因宫牆隘狹市地拓垣廣舊址十之七雍正二年知縣陳永宗重修池州府池州府儒學在府治西北舊在城東南隅附唐韋表㣲池州夫子廟麟臺碑銘二儀即閉三象乃乖聖道埋鬱人心不開上無文武下有定哀吁嗟麟兮孰為來哉周雖不綱孔實嗣聖詩書既刪禮樂大定勸善懲惡姦邪乃正吁嗟麟兮克昭符命聖與時合化行位尊茍或乖戾身窮道存於昭魯邑棲依孔門吁嗟麟兮孰知其仁運極數殘德至時否楚國寖廣秦封益多牆仞廹阨﨑嶇闗里吁嗟麟兮靡有攸止世治則麟世亂則麕出非其時麋鹿同羣孔不自聖麟不自祥吁嗟麟兮天何所亡按此碑載山東通志而唐詩紀事所錄特加以池州二字宋開寳初知府成昴移建於城西北至和間知府吳仲復仍移建於東南後陳桷周應龍葉凱王伯大相繼修之元燬於兵明洪武三年知府孫炎重建正統初知府葉恩加修成化初知府李宏重造明倫堂四齋兩廡㦸門石柱泮池橋𢎞治末知府陳良器祁司員何紹正相繼修葺嘉靖十年制增啟聖祠並建敬一亭貯六箴碑各縣如之然其地卑濕夏澇江漲水廹學宫隆慶元年知府尹士龍遷於今地後知府馮叔吉落成之國朝順治七年知府梁應元修康熙十六年知府喻成龍重修附張英記池北隅廟祀夫子宫牆多士者葢已二百餘年土木之工不三十年而輙毀以故旋圮旋葺前賢之官於此地者各與有勞勩載在冊書不容冺滅而要未有若金州喻公今日建學之盛也何則今之時亦大異於昔之時也期會簿書日不暇給非若向之從容就理也職掌雖具然不闗乎六計無操約以程也而且軍興旁午長吏多以峙具茭芻劬勞鞅掌非若向之時乘農隙百廢具修也無怪乎郡若邑多委謝後來而自視蘧廬然矣喻公獨謂今天子右文至意正以學宫為人心根本之地余亦體俸錢上意盡心焉已耳是以良盡夙具斷不道謀竭力捐而外更有事於募助令六邑之有力者助之貲而財可勝任矣鏟鑿畚插茨絡圬墁聚百工非有專官不能朝視而暮扶也於是遴府幕及吏胥之能者視作登記纎悉備載而力可勝任矣物力有餘故經費無逗撓趨作無怠媮自丁已冬月經始至戊午六月為夫子廟如制上可建三丈旗下可容千餘人葢堂堂焉可以慿鬼神廡下周還奐美兩兩如翼若啟聖祠若明倫堂文昌祠皆次第修舉不遺餘力㦸門外窳地為泮水其外為一坊顔之曰泮宫公親書之英曰喻公知為政夫士民之秀也規其地宜則易化示之象儀則易從昔文翁治蜀以敎化而蜀中諸士比於鄒魯之鄉一時有長卿淵雲之屬蔚起焉宗澤官龍游興庠序延師儒而擢科者相繼彼其民皆未知學也矧公乘昌期視形勝而臨訓誨之有不追美於曩日也哉夫耑以科日期人才固非敎者之至意顧士不由之無由自見如靖難之陳公黃公皆是也余聞公於兩公祠宇皆加意營造公之所以朂池人士者深矣僅科名云爾乎哉或曰學之役不自公為郡始也公以建德令遷監郡即謀之於前太守周公洎六邑之令長而身任其事公之功懋哉余曰唯唯於時學愽吳門陸君德元京口包君斌屬余同籍章孝亷書以屬予予乃為之記崇聖祠名宦祠鄉賢祠各縣學同貴池縣儒學在府治西明洪武三年建學於縣治東𢎞治十三年知府祁司員遷於黃狀元觀故宅即今址萬厯間推官李養冲知縣蕭繼美相繼修治國朝順治十二年知縣李愈昌修康熙十八年知縣劉光美重修二十一年知縣羅鎔敎諭錢墋訓導宗觀捐修二十四年同知周疆大修靑陽縣儒學在縣治東南舊在縣西宋隆興二年知縣楊元秉遷縣治東南元大德間縣尹吳廷輔遷縣治西明洪武七年知縣張文昱復遷東南故址即今地成化間知縣王政重修𢎞治末知縣錢瓚重修萬厯中重修徐鳴臯有記國朝順治十三年知縣楊夢鯉重修康熙二十一年知府喻成龍增修四十七年知縣張容重修雍正十年邑人增修銅陵縣儒學在縣治東舊在縣治西宋淳熙中知縣林桷遷於縣治東元末燬於兵明洪武初知縣時守道重建復圮宣德七年邑人余志貴等修之正德十年知府何紹正復遷於縣西舊址嘉靖十七年知縣周納仍遷於東舊址明末燬國朝順治間知縣蔣應仔劉曰義裴國熙相繼修葺康熙十八年邑人余繼益合族捐貲重建聖廟石埭縣儒學在縣西門外舊在縣南門外元末燬明洪武三年知縣陳霖始建後知縣尹安續成之嘉靖十六年知縣潘大綸移建今地萬厯後屢圮屢葺國朝順治間知縣高駿升王太初相繼重修康熙八年知縣姚子莊訓導周體元重修文廟造尊經閣建德縣儒學在縣治西北舊在縣治東宋嘉定間知縣吳淵移建於此明因之自宣德至正德間知縣吳楨蒯賢敎諭李淮皆重修附汪偉記監察御史吳公奉命巡南幾諸郡甲戌冬又十一月六日按節於池之建德再閲日謁先聖於文廟已登明倫堂坐諸生執經以次講已起觀射諸生攝弓矢耦進射已乃周覽棟宇顧瞻後前還坐於堂進師生而言曰茲學敝甚不修何以稱育賢之典且吾觀堂東地最勝今所建處偏而後虛殆首事者之不審乎不改為何以發山川之竒敎諭李淮對曰此淮之夙心也非直淮也邑之士塈凡莅於茲者咸病之顧力弗贍耳君乃令會一堂兩齋及門之費凡若干先勸邑中好義者捐貲以助得百金餘繼出行臺贖刑之金又二百餘乃掄材鳩工卜日興事益市鄰堂民居隙地以廣基議既定乃撤其故作之去舊堂十丈許後枕象山之䧺前挹玉峯之秀四閲月而堂齋暨門告成地勝材良頓易舊觀民不知勞如神之輸諸生朝揖於堂而退修於齋中雍雍于于心目為舒皆充然若有得也於是敎諭淮其事本末走南雍請記且曰願一言為吾士告予作而歎曰盛哉茲舉也觀諸此可以知為學矣夫聖人之道本自中正而光明其偏邪晦蝕非道之弊也為道者之過也昩者不知習而安焉者有矣其知而不能改改而不能大有所振拔皆過也不猶茲堂之舊乎一旦翻然覺悟舍其舊而新是圖以趨於中正光明之域囘視向之所處始惕然而懼赧然以慙不猶茲堂之今日乎矧士之為學不費材力方寸轉移之間而得失相懸奚啻千里又有易於堂之為者亦何憚而久不為此也諸士觀茲堂之成既有所感發矣當益堅乃志勵乃行動以聖賢為標準以修諸身而達諸政俾國家収多士之效鄉邑有多賢之稱推原厥功知有所歸庻幾不負諸君子惓惓之心也君名鉞字肅威江西臨川人承委而協力相其成者郡守何侯紹正節推王用賢邑令周希黙及敎論李淮也好義者邑民路鎮徐㶅童養觀也文廟仍其舊前此興修自有記茲不及云崇禎四年知縣楊錫璜政建於西門外國朝康熙元年知縣高寅復移建城内舊址屢圮屢修四十八年通判署縣事胡開京重修東流縣儒學在縣治東宋初建學在縣東北元貞元中縣尹袁裕擴之後燬於兵明洪武初縣丞祝文貴移建於縣治東即今地成化中知縣蕭珮改建於縣治東北崇禎間燬國朝順治間知縣鄧繼球蘇宏謨復移建於縣東故址康熙十五年知縣侯之桓重葺二十二年署縣事同知周疆重修並造學舍六十一年士民募捐移建於縣左附周疆記方今海字昇平聖天子敦崇文教鋭意振興屬在庻寮承流宣化詎敢隕越以自外余佐治池陽甫至見池之文物衣冠彬彬郁郁而兩庠巋麗書院崇宏知非有主持風敎者以作興鼓舞於其間曷克臻此今年癸亥夏五月奉檄視篆東流恭謁文廟授講畢周視殿廊牆廡草創規模缺然有待爰與學博洪子景行倡捐修葺之紳衿耆舊亦樂為附圖度諮謀凡廢者舉之剝者補之以期周備於是由正殿以及啟聖祠向之鞠為茂草者為之設立圍墉潤施甃砌偃者蝕者悉易去正配各主俱金碧馬余視事未兩月而經營區畫工役争趨一望橋門朱炳丹煥坊表聯額各如制煌煌然幸改舊觀矣夫三代以來司樂司成專主敎事周禮始並屬之黨正州長即今之牧民長吏也以是為政即以是為敎厥後政敎判然士君子稱先則古未嘗不思得位行道及出身加民征賦雜其耳目刑賞摇其心志案牘交乘誇飾吏治以敎民為己任者幾人哉或曰孔子之道夫人而具之讀其書以法其行固有在此而不在彼者徒崇廟貌何為乎雖然入廟思敬古誌之矣封越儼然羮牆如見相與警心觸目以培養夫忠信之原則人心因之以正學術由之以成處而砥行立名出而經邦𢎞化以副朝廷雲漢天章之盛者又豈可量也哉宋儒葉適曰儒術不進天下無正學師道不立天下無善人相得益彰余更於洪子不無厚望云太平府太平府儒學在府治西宋治平中遷子城東南附王安石記太平州新學在子城東南治平三年司農少卿建安李侯仲卿所作侯之為州也寛而有制静而有謀故不大罰戮而州既治於是大姓相勸出錢造侯之庭願興學以稱侯意侯為相地遷之為屋若干間為防環之以待水患而為田若干頃以食學者自門徂堂閑壯麗密而所以祭養之器備具葢往來之人皆莫知其經始而特見其成既成矣侯罷去州人善侯無窮也乃來求文以識其時嗟乎學之不可以已也久矣世之為吏者或不足以知此而侯知以為先又能不費財傷民而使其自勸以成之豈不賢哉然世之為士者知學矣而或不知所以學故予於其求文而因以告焉葢繼道莫如善守善莫如仁仁之施自父子始積善充之以至於聖而不可知者之謂神推神而上之以至於聖人之於天道此學者之所當以為事也昔之造書者實告之矣有聞於上無聞於下有見於初無見於終此道之所以散百家之所以成學者之所以弊也學乎學乎將以一天下之學者至於無弊而止遊於斯饌於斯而余説之不知則是美食逸居而己者也李侯之為是也豈為士大夫美食逸居而已哉建炎紹興間又兩遷而後定於今址自乾道後歴元相繼修葺明洪武初以州陞為郡學永樂中知府徐敬更修正統七年知府楊士敏當塗知縣張嵓撤而新之𢎞治嘉靖間知府徐節周進隆林鉞相繼葺治嘉靖十年制增啟聖祠建敬一亭貯六箴碑各縣如之萬厯後知府陳璧劉應錡余思明何士林李若訥劉正衡先後增修國朝順治十一年知府王以約大修康熙元年知府胡季瀛修尊經閣十一年知府黃桂倡修敎授宋驤董其事十九年知府楊霖又修五十五年知府李敏廸重修大成殿兩廡雍正七年知府李暲敎授蔡兆昌重修櫺星門㦸門重建明倫堂文星閣尊經閣崇聖祠名宦祠鄉賢祠各縣學同當塗縣儒學在府治東南宋紹興間郡學地先縣未置學元始置而未立學宫明洪武六年知縣王俊始建地在西隅附孫大雅記邑有學學有廟禮也僨於兵時也僨而復興不書常也興而專美於前書乎不書懼復勸也謹按姑孰縣三當塗故聱劇更以事殷不遑暇給敎弛俗窳寖為當然洪武五年永平王俊屬宰是邑下車之日首登進其民間學所在皆謝不知問左右吏吏相顧愕眙謝亦如之俊嘆曰民不知學焉能知方乃殱蠧抉貪示以不取又示以不偏朞年民恬於化俊曰可矣乃召父老端笏齋服而令曰嘻子來前若知有父子乎曰有知有君臣乎曰有知君君臣臣父父子子所從來乎曰不知也俊起立以手加額曰此吾夫子之敎也敎猶天也天可忘乎吾嘗愛仰敬畏如父母神明日月雷霆也人不知有父母神明日月雷霆則狂愚聾瞽而已今使若等去狂愚聾瞽以服天子之命而尊聖人之敎可乎衆曰諾敢不唯命於是卜吉日率父老子弟距行春門不百武辨方正位鳩工庀材闢地之湫隘洿深以為亢爽得畝若干禮殿倫堂門廡齋庖以次畢興繚地以垣飲射以圃像先聖之容秩先師之位丹漆黝堊金碧斧藻巍然煥然礱密堅緻雖數世封君之家有弗能侔又剡致郡士為師以主之生徒坌集弦誦之聲竟日夜不輟歴再稔廟興學完集大夫士謁先聖行釋菜禮民環觀之嘖未嘗有會詔郡縣立鄉學置弟子員髫年齔穉左提右挈于于而來籍人凡五十人不踰月冠帶趨鏘顒昂儼雅莫不知敎君子謂若有相者矣嗚呼為之難易在人成之難易在天使為有不盡其難則成固不獲其易為於人若此成於天若彼書是以勸來者宜哉俊字用章精敏亷勤事無大小談笑麾之吏畏民服學校其一也是役也會令之俸半入學而敎諭胡昭訓導劉會李炳則左右之里士陶仲實於子中實經營之學舊在城東門外洪武三年始改卜於此其地葢宋之尉司云後知府楊士敏知縣張嵓拓治成化初知縣韓恭重建文廟正德初御史冼光屬知府周紞重造廟門齋廡嘉靖初知府林鉞知縣張一厚增修萬厯二年巡按宋儀望始遷建今地凡明倫堂尊經閣聚奎樓大成坊以次修舉明末燬於兵國朝順治四年知縣張京修其僅存者十三年兵道周體觀重修門堂殿宇漸復舊觀康熙十年訓導史以徵重修正殿十二年知縣寇明允踵成之十九年知縣王斗樞修兩廡㦸門五十八年署知府張鼎募修集賢樓崇聖祠雍正四年提學孫嘉淦以學租銀修明倫堂兩廡十年提學王蘭生以學租銀修大成殿尊經閣蕪湖縣儒學左縣治東南宋元符三年知縣蔡觀建附張商英元符建學頌莆陽蔡君製邑蕪湖才優職舉政成令孚作新廟學推本真儒走書求文紀厥終初乃敘而係之以頌曰宣水在東大江滔滔匯為蕪湖有邑其臯江山靈氣宜爾士類不漁不鹽儒業是肄落落蔡君粲粲其文爰師爰長庶事孔勤不揭揭以銳不剪剪以細我有詩書以誨以勵迺侈斯庠廼崇斯堂邑士戾止冠圓履方圓冠如之何高明不息方履如之何博大以直能地能天爾性則然譬彼泉蒙其達成川爾學爾問聖師之心令君之訓長湖汪洋鱗潛羽翔樂只君子德音不亡歴元屢加修葺明洪武中知縣宋彬重建明倫堂後縣丞周宗博知縣陳源崔諭相繼葺治成化中知縣張淮置祭器附張淮置祭器記禮器之制尚矣籩篚以竹俎豆以木簠簋登鉶以陶鼎爵尊罍之屬或以玉或以金或以木各有其義與所宜也自遭秦臧學之後禮經殘缺器亦就敝而先王之制度蕩然不復存矣後世禮圖如簠簋犠象尊與爵之形制不無可議近世有以陶為之者則一於瓦範銅為之者則一於銅而古之以竹以木以金以陶者畧無差别僅存其名號而已噫制度之精㣲雖老師宿儒猶莫知焉可慨也夫太祖皇帝誕膺天命大興文敎制作之盛度越千古列聖相承益隆聖道肆我皇上尤注意焉詔加籩豆增樂器尊崇之典曠古所無於戲盛哉成化丁酉冬十有二月朔淮來知蕪湖縣事越明年戊戌春二月將有事於上丁先期詣學宫徧閲所藏器類皆以陶而銅錫亦間用之苦窳闕裂率不可用心竊病焉既而謀諸丞陸瑀敎諭胡直訓導趙賛王綸欲考古今之制而新之乃走王生倣於南雍歴訪形制並購博古圖歸每退食之頃反覆詳考參以詩書之圖質以先儒之言復得李生贊相與討論之似有得其一二其疑而不決者則質諸胡公焉如是者久之然後乃敢命工編竹為籩篚斵木為俎豆範金為鼎釜屈木為爵斗陶瓦為簠簋登鉶尊罍他如盛牲有匣滌牲有桶供薦有盤盥洗有器蠟炬有臺毛血有盤秋八月上丁復有事焉籩豆静嘉牲牷肥腯凡在祭與奔走者莫不有孚顒若有神人胥悦之意於禮敬而將之以物則以器而其器又足以感人如此則器亦大矣哉胡公欲圖其形制與目於麗牲之石以示永久且慮敝或觀圖為之則敝不敝矣亦盛心也復請淮記以弁諸首萬厯十二年知府林一材徙建縣東察院基址十九年知府陳璧仍徙舊地後知縣梁應材重修加高廣焉國朝順治四年知縣賈一竒敎諭甯鳴玉重修十七年知縣黃裳増修康熙三十三年知縣紀統五十三年知縣孟光庭雍正七年知縣朱文昭踵修繁昌縣儒學在縣治西宋慶厯間建於舊縣内附王安石記奠先師先聖於學而無廟古也近世之法廟事孔子而無學古者自京師至於鄉邑皆有學屬其民人相與學道藝其中而不可使不知其學之所自於是乎有釋菜奠幣之禮所以著其不忘然則祀先師先聖者以有學也無有學而徒廟祀孔子吾不知其説也而或者謂孔子百世師通天下州邑為之廟此其所以報且尊榮之夫聖人與天地同其德天地之大萬物無可稱德故其祀質而已無文也通州邑廟祀之而可以稱聖人之德乎則古之事先聖何為而不然也宋因近世之法而無能改至今天子始詔天下有州者皆得立學奠孔子其中如古之為而縣之學士滿二百人者亦得為之繁昌小邑其士少不能中律舊有孔子廟而庳下不完又其門人之像惟顔子一人而已今夏君希道太初至則修而作之且為子夏子路十人像而治其兩廡為師生之居以待縣之學者以書屬其故人臨川王安石使記其成之始夫離上之法而茍欲為古之所為者無法流於今俗而思古者不聞敎之所以本又義之所去也太初是無變今之法而不失古之實其不可以無傳也至元燬明初重建天順元年知縣王珣徙縣治學因徙於治東成化九年知縣林域以地僻陋乃遷治西正德十二年提學黎鳯命知縣俞應成又徙於治東嘉靖四十五年推官邱浙遷今地萬厯中知縣吳鎮重修附焦竑記繁昌學創於宋之慶厯舊在延載鄉縣治之南已遷東北天順初元徙縣治金峩鄉而學居其東成化正德間兩徙其處嘉靖丙寅府推官邱浙用少司徒徐公貢元之議復遷今址萬厯丁亥吳侯鎮來為令篤意敎事念河直學宫之後形勢弗固采李生一恂議浚河立廟河干為墩墩為二亭以障其缺己亥春大成殿若兩廡若櫺星門咸大修之神棲士藪既閟且康譽髦來㳺以後為恥仁風行而四達義方􅆒而遐騖實侯倡之於是一恂軰走金陵屬余為記余謂三代逺已漢唐間立學而不以著令宋至仁宗始詔天下為廟學而士不滿二百人者猶靳不得立國朝修禮樂尊儒術以文太平之功其制眡近代為備繁昌小邑也學屢遷改必適士心而後已師帥之於是亦既勤矣而士之居焉者僅僅操筆為詞章以蘄中有司之程豈國家所以造士之意哉且學之議遷起於士風之不振而所稱不振者非科目之弗盛而古道之不興也三代黨庠術序之法鄉射養老尊賢勸農攷藝選言受成獻馘靡不繇學當其時士大夫材行完潔而事功雋偉絶非後世之可幾然其本曰明人倫而已人倫明則良心醇固機智不生然後能外成敗而自信其守故古薦紳先生抗志權姦乃心王室有廢錮摧抑而其操彌厲者輓近世敦樸之行㣲而險詖薄惡之習勝亷耻之道喪而妒賢賊善之意多何者俗流失世敗壊而孝弟之敎衰也夫叔季眡三代如夢覺之變古法茀廢非一日矣不知古之為敎實出於人心法可亡而人心自若也在有志者之自立而已繁昌故静僻芬華所不至士生其間復多美茂之才况得呉侯焉作新之雖昔之蔽陷者將革其敝風而偕之大道又况乎學問之民故余書侯之績因及古今之變與所望於士者使歸而刻石焉天啟後知縣劉孔源馮洪孜相繼修治國朝順治十一年知縣張搢重修學前置文峯塔康熙七年知縣吳升東捐募增修後知縣李臨王廷珹劉育德踵修廬州府廬州府儒學在府治東肇於唐會昌盛於宋咸平廢於紹興之兵革乾道以後帥守趙璠老翟朝宗重新之明宣德中同知謝庸創修正統後知府揭稽史儒孟圯馬金李崙徐鈺相繼增繕門廡堂齋悉備並建尊經閣正德中知府龍誥重修附明王禕記太守下車之三日當謁文廟為禮升明倫堂聴講諸生率以所稔習庸近之業應名以進太守無所是非首肯曰勉之諸生各頓首謝敎而退勤者朔望率如故事學業之成廢行履之淑慝漫不加省嗚呼師帥之職審如是乎哉今廬州太守龍公來莅郡進師生於堂而諗之曰凡我二三子之從事於庠序者將顒顒昻昻襲衿佩之光以耀其鄉閭乎抑含咀饜飫於詩書之腴以澤其體膚乎將淟涊汩沒竊膳廩之入以飽其妻子乎抑沈浸渟涵深入聖賢之室以無忝青陽大蜀之靈秀乎衆皆曰不敏敢不祗命於是口授疑義問辨切劘有出於科舉文字之外者衆皆悦鰓鰓然惟恐不及人人自以為得所師矣乃諗於衆曰明珠之光不繫乎櫝而美櫝者以為珠重良工之勤不必於肆而居肆者以為工資廬之廟學毀圮弗葺非所以崇儒雅而飾至治也盍舉而新之皆從命於是鳩工庀材卜日而舉屬敎授宋君希睿董其役殿廡門堂齋居號舍各以重輕先後就緒經始於正德辛巳秋仲明年春季告成希睿乃以書幣走京師而屬記於禕禕嘗被命提學河南廬與汝相密邇公之政敎稔聞之以風勵郡邑獨不知所以善誘於諸生者何道也夫道學之暢明敷達於天下也久矣而奚疑於是哉特以近世學者以言語文字為煩直趨徑造為速而或病乎朱子之學為未足以發明洙泗伊洛之㫖其為論説精神亦能有所感發四方之士負聰明偉特不羣之才者翕然起而宗之將以學問為呫嗶之陋遂盡暴棄而不之講也豈不悖哉禕嘗考之白鹿楣間之掲皆取諸孔門邃論非考亭所創也請以是揭諸堂齋之右俾聰明偉特不羣之士有所折衷何如既敘公之成績而於末也以是訊之嘉靖十年制增啟聖祠建敬一亭貯六箴碑各縣如之萬厯三年知府吳道明重修增建興文樓明季燬於兵國朝順治三年知府呉允昇重建康熙二十一年知府薛之佐大加修葺二十二年知府杜立本畢其工後知府張純馬雲從姚漁陳廷綸繼修雍正五年知府趙向奎重修崇聖祠名宦祠鄉賢祠各州縣學同合肥縣儒學在縣治東南舊在武威門外宋淳熙中少保郭振拓城基遷於景賢書院即今址元至正時重建明洪武初知府張義撤而新之永樂正統間踵修景㤗二年災知府史濡拓地重建𢎞治間知府馬金建尊經閣天啟間知府張正學知縣陳琯重修明末燬於兵國朝順治三年訓導蘇紹軾募建後知縣方象璜訓導宰維翰相繼修葺康熙二十一年知縣范時著捐修正殿兩廡二十二年知府杜立本增修後重建明倫堂雍正九年知縣趙良墅重修大成殿及兩廡舒城縣儒學在縣治西元至正間燬明洪武初知縣員議建今地宣德末知縣劉顯楊縉孫寳雷孟冬黃誥徐成位陳魁士敎諭傅敏功雷芳相繼增葺明末寇燬僅存大成殿國朝康熙三年知縣何朝聘捐俸倡修後知縣王朝端重建明倫堂三十九年知縣沈以拭重建大成殿五十三年敎諭徐千之捐募重修雍正七年知縣陳守仁建崇聖祠廬江縣儒學舊在南門内元至正元年縣尹兀顔綱修建明洪武七年知縣傅鉉遷於三思橋北即今地洪熙元年知縣黃惠重建大成殿天順四年知縣王慶重建明倫堂成化間知縣梅江劉紳相繼修建櫺星門泮池橋𢎞治間知縣胡暘重修置號舍正德嘉靖間知縣劉夢熊周良㑹劉裁先後拓地增修明季知縣張雲鶚建文昌閣於堂後旋燬於兵國朝順治四年知縣周迓祚草創㕔事康熙六年知縣孟述乾捐貲重建聖殿及櫺星門十六年知縣盧均天敎諭李大濩募建明倫堂二十二年知縣馬光敎諭王琳徵訓導丁象臨重修并建官舍四十二年知縣呉賓彦重修五十四年知縣何洪先重修雍正四年九年知縣鄔廷豳陳慶門續修慶門增置祭器樂器無為州儒學宋皇祐間建在錦繡溪北崇寧初徙於漕臺東尋復故址元燬明洪武五年知州王奉訓重建繚以周垣宣德十三年知州王仕錫建講堂齋舍天順至萬厯間知州楊士倧辛文淵同知許用中知州洪邦光同知查志文知州趙範陳嘉賓相繼修葺國朝順治九年知府佟國貞大修之康熙三年知州李祐之訓導曹鼎臣重修十九年兩廡將圮知州王國輔學正史逸孫訓導何嗣和捐募修建知州張國貞修尊經閣三十六年知州李璋重建泮池石橋巢縣儒學在縣治西宋紹興間知縣江琯創建趙登善踵成之元季兵燬明洪武初知縣桂廷用重建𢎞治中建尊經閣附明陳楷記巢縣學背之高邱舊為五䫘廟所據廟之棟宇雄偉壯麗俯瞰黌宫凡邑之祈禱佚遊者率由講堂徑入鉦鼓之聲自旦達暮大為弦誦之病成化丙申莆陽陳君瑞來典學心欲毀而力未任嵗戊戌適吾慈桂君璉來貳敎即毅然曰夫子之宫而可以妖淫淆之哉斥之奚容緩耶與陳君協謀明年上其事於府得請檄縣亟毀之俾以基宇歸學縣令李進膠於巫史禍福之説固執不可陳桂二君義形於色躬率諸生踣其像而撤之即顔其楣曰尊經閣移御書經史於其中而扃鑰之李令憤且恚構他事以加害桂羣弟子思慕不忘徵余記之余惟尊經以閣重道也闢邪以正衛道也以重道之心為衛道之計郡邑大夫正當鼓舞誘掖之不暇顧乃倒戈相攻曽不知其所遊非聖門所讀非孔氏書乎朱子有言不能攻討而又倡為不必攻討之説是亂賊之徒也桂君所學所藴吾徒平日所畏者不得一有所施而竟為奸邪所害惜哉雖然桂君死而閣存見閣猶見桂君也閣以載經經以載道諸生登斯閣者講焉習焉辨焉思焉使道之載於經經之載於閣者皆在我而無餘此尊經之實也而桂君之死猶不死若徒以是為觀視之美誦説之具尊經云乎哉學者朂諸嘉靖間改建於慈氏寺萬厯中巡撫吳桂芳捐俸協助復建於故址後知縣王寧陳綸相繼修治明末傾毀國朝順治十四年敎諭魏侯聘重修康熙十一年知縣于覺世重修二十九年知縣楊極重修後知縣孫芝芳捐俸修兩廡㦸門櫺星門雍正十年知縣鄒瑆敎諭范正笏修崇聖祠尊經閣鳳陽府鳳陽府儒學在譙樓西雲濟街明洪武十八年置國子監十九年改為府學景泰間知府仲閔修之成化間知府章鋭重修規制畢備𢎞治十三年知府孟俊增繕嘉靖十年制增啟聖祠建敬一亭貯六箴碑各縣如之崇禎四年災六年知府徐四蔭重建大成殿及堂廡齋房尊經閣名宦鄉賢祠嵗久漸傾國朝康熙四年知府戴斌重修十八年鳳廬道孫蘭知府耿繼志同知劉芳聲各捐俸增修敎授湯原振董其事崇聖祠名宦祠鄉賢祠各州縣學同鳳陽縣儒學舊在縣治東南明洪武初建𢎞治初知縣潘永嘉修萬厯三十年署縣事通判李光前開雲路玉帶水四十一年知縣萬嗣達濬泮池國朝康熙九年户部分司圖鼐詹惟聖敎諭岑兆旂捐貲重修二十一年知縣丁耀祖敎諭項龍章訓導張昊捐俸重建正殿兩廡櫺星門二十五年知縣李縉改建城内縣署西偏臨淮縣儒學舊在縣治西明洪武三年知縣樂瓚始建二十七年徙建於府學舊基宣德間主簿蕭本芳重修𢎞治間知府孟俊撤而新之嘉靖二十二年水災學宫盡圮六年知縣陳哲改天池宫舊址為學宫萬厯十五年知縣陳民性仍遷於縣治西舊址二十五年知縣薛芳重修旋燬二十三年知縣賈應龍修葺國朝順治六年為淮水冲沒知縣徐必進改建於曲陽門外書院舊址十八年署縣事同知郭顯功復遷正殿於崇儒坊旋遭水圮康熙九年署縣盱眙縣丞葛翊宸訓導尤運昌改建於聞喜門外後知縣魏宗衡募捐繕修二十三年知縣陳宗建敎諭蘇應秋又改建於南門外滋德坊四十七年知縣王紘捐俸修葺并設義學懷逺縣儒學在縣治東南元季燬於兵明洪武三年知縣唐蔚敎諭王景章即故址創建成化十七年淮水漲溢學圮移建縣治東荆山之麓正德七年提學御史黃如金知縣李豫復移建今址嘉靖間知縣徐玠任俊商承學王存敬莊祖誼相繼修葺明末傾圮國朝順治十二年知縣傅鎮國敎諭申詒芳修之康熙十一年知縣于鴻漸訓導俞潛飛又捐修五十六年知縣劉鑑捐俸重修邑人楊大勳助修兩廡濬泮池建三橋其上雍正元年庠生宋暄於雲路前建奎星閣定逺縣儒學舊在縣治西宋淳熙六年改建縣治東南後燬於兵明洪武三年知縣朱玉即舊址重建正統二年知縣沈安修𢎞治間知縣朱恭曾大有章澤相繼修葺嘉靖三十三年知府高鶴捐修國朝順治十一年知縣高萬仞訓導談志重修康熙三年知縣徐杆捐俸加修二十年知縣曲震重修大成殿虹縣儒學在縣治東明洪武三年知縣樂徽建正統七年知縣何誠遷於察院東汴河北萬厯二十八年知縣任愚遷於舊址之東後知縣伍元正張鳳翼相繼修繕久漸圮壞國朝康熙十二年知府章欽文知縣龔起翬捐俸增修十六年知縣彭翼宸復修壽州儒學唐宋並在州治東南元移州治西清淮坊明洪武二年知州夏侯顯修正統七年知州惠理重修景泰間知州王長福重修成化間知州陳鎰建尊經閣𢎞治間同知董豫闢學前地為賢路立泮宫坊正德間知州林僖大新之嘉靖十年知州粟永禄又新之後因水圯國朝順治十二年知州李大升捐俸助修康熙十八年學正荆拯何琴雅知州沈顯貴相繼修繕雍正十二年分設鳳臺縣以學正專理壽州學事鳳臺縣儒學與壽州共學以壽州訓導理鳳臺學事宿州儒學在州治東元至元十一年知州左昺建元末兵廢明洪武三年知州呉彦中即舊址重建正統初御史彭朂更新之成化間知州張黼修廟廡尊經閣建號舍及㑹講亭萬厯二十三年知州崔維嶽增修明末頽壞國朝康熙十年知州吕雲英捐修踰年