記全椒之黌左隅伏而邇者城其縣樓櫓之乃益嵸嵸起堪輿家弗是利也僉曰左之墟可樓地濱河易於瀉非厚厥基弗樓隆慶丁卯余邑侯翔張學諭秉鐸議臺之不果辛未冬則嚴侯來也詣黌謁覽歎曰是不可尊經閣乎請之撫軍督學使者僉曰可侯於是首捐俸若干金而學訓顔節張滂典史郁敬暨邑中薦紳學彦居民蔑不有腆出也曰貲奚手則擇耆民貯焉而諸生魯時行金惟精楊崇等督工旦暮以之計竣事凡五閲月下臺上樓榱桷修修甃堞道遒重簷囘檻枚如翼如南山左羅大河外流望者心竦登者神遊然而帑無銖損農無晷稽民懽而募工嘻而趨丁丁登登不日成之是嚴侯之績也或問涇川王子曰具形者偽存心者真經尊之心奚其閣名王子曰子謂尊經於心似也然而古之人奚刻之銘奚書之紳書紳刻銘存識焉耳矣夫無形者心也有象者物也無形者易忘有象者恒識也是故不有過闕里入太廟而肅然凛然者乎夫肅然凜然者心也至闕里太廟而後動者象觸之也諸生之業於黌也不有觸之象而動之心者乎於是乎懦者過之攘臂奮興昩者過之低垂繹沈闡厥義名不肖者過之慚畔厥經忝爾青衿將面為之赤而行為之逡也若是則尊經者固尊以心者之銘與紳哉或問嚴侯王子曰循吏哉嚴乎何以知之曰以尊經閣知之夫尊經敎之程也敎士宦之首也文翁之所以化蜀者用是道也故曰循吏哉嚴乎王子之遊淮上過椒也則茲閣之上梁日也侯偕王子登焉而椒士夫之丐王子文也德侯也年久學圮國朝順治六年提學李嵩陽命知縣趙鼎立重修康熙七年兩廡圮知縣藍學鑑重修二十一年知縣王作舟敎諭施􅋿曾訓導朱紱各捐俸修葺雍正三年知州朱爾融知縣汪兆熊修正殿明倫堂十年知縣丁銘修崇聖祠來安縣儒學宋崇寧初縣令魏淵博建於縣東南隅建炎後燬元前至元三十年縣尹徐榮重建至正七年縣尹蔣居仁闢而新之元末兵燬明洪武十四年重建永樂至正德知縣徐仕禄趙禮主簿張鎧知縣王馴相繼重修嘉靖三十六年知縣魏大用易櫺星門石柱隆慶間知縣劉正亨闢青雲路建青雲樓萬厯二十年敎諭史載道建尊經閣國朝康熙二十二年知縣喬嵩敎諭朱端邑紳周蔚周濓等重建正殿及兩廡知州王賜魁助成之雍正八年知縣伍斯璸重修和州和州儒學舊在橫江門外宋開禧中安撫耿與義重修元末燬於兵明洪武初遷州治東南隅叅軍郭景祥知州張純誠重建永樂初吏目張良興改造明倫堂宣德中知州黃恕同知蘇紳董錫相繼修葺正德中知州孔公才建尊經閣嘉靖初知州易鸞成之嘉靖十年制增啟聖祠建敬一亭貯六箴碑縣如之後判官王朝用改遷於百福寺萬厯間知州郭繼芳復遷故地建文峯塔於巽方附明焦竑記和州古歴陽東與采石畫中流為水疆總江淮水陸之衝為姑孰金陵之蔽葢南北間一都㑹也峯巒綿亘雄踞西北亭亭如玉圭然民生其間者率剛勁而果決淳質而儉約其土風之美如此明興高皇帝由滁陽拔和城跨有江東混一寰宇不五載而大業成焉迄今公若侯而下礪山帶河載於盟府者且五百餘人皆和之産也高皇帝投戈講藝轍以興學育才為先而和去京師不百里乃二百年以來學宫湫隘弗稱明天子作人至意州大夫馮侯始謀遷之先後經營未有成績嵗壬辰曽侯至毅然以為已任凡百厝置務竟厥功於是故者飾者興士由此感奮於學不勸而力莫不曰侯之有造於我也學正李春茂訓導李一本馮三元岑東曙因相率而請記於予予惟國之建學將畜材以待用也然而非文致太平武龕亂畧惡得為材成周以三物造士維時士於三德既已涵泳其要𦕈而究極其指歸迨於行誼之醇備藝術之優嫺又兼有而時出之嘗觀其論士慮囚一出於學師行而受成反而獻馘靡不於是則為敎之備可知也近世士靡實用為文者以呻吟呫嗶自多談兵者以躍馬挽彊為務其名甚美而試之鮮效夫三德六藝六行人心所自有而行之又不難顧自秦漢以下衰㣲絀塞空見於載籍之文而莫或振起者患無其志耳記曰勇敢强有力者天下無事則用之於禮義天下有事則用之於戰勝戰勝則無敵禮義則順治順治無敵此得士之效也國初首建義旗和之豪俊蒸蒸然勒竹帛而乘鼎彜亦云盛矣至於嚮所稱三物者非索之外也乃能黽勉於所難而不能反求其所易則士風之剛勁果決者無乃不善用之邪蜀至僻逺文翁修起學宫於成都親自飭勵至經明行修比於齊魯况和為首善之地得曽侯焉興作誘進之異日者真材輩出施澤於堂皇之上服冕搢笏令氓庻安而姦宄息必自今始矣詩曰明明魯侯克明其德既作泮宫淮夷攸服又曰濟濟多士克廣德心桓桓於征狄彼東南夫修泮宫而遽及於服淮夷狄東南以見文德武功非二道也故予述國初人材之盛以屬望於多士如此曽侯名克唯湖廣襄陽人其善政不可殫書而此其一云崇禎間燬知州左瑛復新之國朝順治初知州盧汝擇州同知舊署益以廢衛之半改建新學後復傾頽康熙中知州夏偉倡修學正羊世澤董其成崇聖祠名宦祠鄉賢祠縣學同含山縣儒學舊在崇儒坊東宋崇寧初始建元至正初縣尹榮克讓重修後燬於兵明洪武十四年知縣王均美因舊基重建成化間邑民朱清捐葺之嘉靖二十八年知縣葉繼善以城南安國寺基可建學遂遷焉萬厯元年袁伯鑰修葺崇禎間燬知縣朱多鯤重修建之國朝順治十三年知縣黃鼐捐募重修康熙二年知縣范貞鼎新尊經閣四十九年邑人募修正殿五十一年邑人陶飇捐修啟聖祠雍正六年邑人張覺斯張同重墁正殿七年邑人唐紘等重修學後圍牆廣德州廣德州儒學宋天聖中司理范仲淹建於州治北治平中錢公輔遷於州東南隅即今地後燬於兵紹興初知廣德軍洪興祖重葺元時知廣德路偰文質擴而新之明洪武二年同知趙有慶重建廟廡堂齋咸備永樂九年知州楊瀚廓舊址鑿學河成化十年知州周瑛遷明倫堂築萬桂山𢎞治二年知州辛禮易民田為學河嘉靖十年制增啟聖祠建敬一亭貯六箴碑縣如之萬厯十五年知州陸長庚增鑿河之南繚垣曲檻後知州段猷顯徧植桃李於上國朝順治七年操撫李日芃兵備道袁仲魁捐俸重修至十一年學正黃如馨訓導淩質竣工康熙六年知州楊苞重修學正荆振董其事崇聖祠名宦祠鄉賢祠縣學同建平縣儒學舊在縣東門外河堤北岸宋初屢經兵燹後圯於水淳熙初縣尉趙善興重建元大德間燬明洪武間知縣宋禮重建正統時知縣李觀修葺𢎞治時堤決學廢正德間署縣判官况照重修嘉靖末圮知縣林應彩遷於縣東南後知縣鍾振增葺之萬厯二十六年知縣朱之楫復遷堤北原所未幾水溢垣圮四十二年知州張嗣誠知縣向萼輝仍遷城内即今地崇禎間敎諭鄧京里人史大典增建明末燬於兵國朝順治六年諸生史象先捐修康熙四年知縣李景爃復建㦸門櫺星門後知縣張顧行茅成鳳繼修雍正六年知縣衞廷樸重修六安州六安州儒學在州治東北始建於元大德初至元間知州王大有成之明洪武三年知州薛敬重建王成繼之規制乃備後知州陸瑜游璧何勝包洪益金山李袞相繼增修嘉靖初知府徐璿更新之嘉靖十年制增啟聖祠建敬一亭貯六箴碑縣如之後知州邵德久同知鄧向榮修明倫堂歐陽德開泮池唐可封建門外石坊萬厯間知州楊際㑹李懋檜同知劉垓先後修治明季燬於兵國朝順治三年安廬道趙振業捐俸屬學正凃廷楹加葺文廟及明倫堂康熙三年學正劉炎建啟聖祠二十一年知州陳恭捐俸重建兩廡學正孫謙訓導光宏賁募建學門官舍三十年學正朱廷容倡修邑人魏世忠董其事四十九年重修大成殿明倫堂雍正八年學正吳雲珧重修兩廡崇聖祠名宦祠鄉賢祠各縣學同英山縣儒學在縣治西北元至元間縣尹段朝立創建後燬於兵明洪武初知縣朱陵重建九年隋斌踵成之宣德末知縣賀完重修嘉靖八年葉邦榮遷學於縣治東三十四年李鳳復遷於西隆慶間知縣葉世行敎諭漆星增葺天啟三年知縣楊世祿改遷於北門外後署縣事丁立表又改建北城内國朝康熙十一年知縣陳震先李澍修葺二十三年知縣劉五瓏敎諭周璠訓導甯擢建東西兩廡櫺星門四十年知縣林弼敎諭吳之騄改遷於北門雞鳴山以舊學宫為文昌祠霍山縣儒學在縣治東明𢎞治八年知縣崔中始立學吳霖相繼營建正德時知縣王坊重加規畫嘉靖十三年知縣歐紹説州判林應麒重修萬厯十六年知縣陳維翰遷於河北三十九年知縣黃守經復遷於舊址明季燬國朝順治十年知縣欒元魁重建廟堂樓閣廊廡門坊俱備泮水名躍龍池濬學西城河二百餘丈以通水脈雍正七年知縣徐天德重修泗州泗州儒學舊在州治西元至治中州守李守中因舊址剙建明永樂中重修成化十七年知州言芳改建知州婁鑑踵成之正德末知州汪應軫大增修葺嘉靖十年制增啟聖祠建敬一亭貯六箴碑縣如之萬厯二十二年潁道李驥千捐修殿廡齋祠墀廊門牆構造一新國朝順治六年大水學宫半圮十一年尊經閣災康熙十一年雷震櫺星門十八年又水二十二年知州莫之翰始擇州城外堤上改建新學泗堤前後皆培土築之二十四年州城湮於水寄治盱眙縣今學宫在縣龜山之麓崇聖祠名宦祠鄉賢祠各縣學同天長縣儒學舊在縣治東元季兵燬明洪武四年縣丞嚴植建於縣前十五年知縣劉道源遷於縣城東隅正綂後知縣周安王哲鄭仁憲敎諭吾翕知縣胡大有邵時敏楊子龍先後修葺萬厯二十四年知縣徐文光遷於南倉三十年敎諭陳以姬善形家言復遷於故地崇禎初漸傾圮知縣臧太初敎諭鄺昭重建明倫堂修大成殿及兩廡國朝康熙三年知縣江映鯤敎諭張希哲訓導吕光盛重修五十二年知縣潘兆遴重修盱眙縣儒學宋時在縣治西後因兵廢元泰定間徙縣治於山城學徙於玻瓈門明洪武三年仍舊址重建嘉靖萬厯間修葺國朝康熙二年知縣李時茂修之十六年敎諭馬士芳重修二十四年知縣胡應麟建尊經閣移築泮池四十八年署縣事胡隆署學事方世宏重修大成殿六十一年敎諭韓履曾訓導吳鳳翔重修崇聖祠及兩廡五河縣儒學舊在縣治東元至大間徙縣治西北明洪武三年修建嘉靖間河溢傾圮十五年知縣蕭文明遷於澮河北天啟七年知縣陳善學又遷於澮濱崇禎十六年知縣王師保又遷於城西鳴鳳岡建文峯塔國朝康熙十一年知縣李雲景重修建明倫堂尊經閣江南通志卷八十九
