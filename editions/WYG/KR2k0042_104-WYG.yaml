  text: 江南通志卷一百五職官志文職七國朝統部總督部院順治二年江南初入版圖命内院大學士經略招撫四年停止内院特設總督一員初轄江南河南江西三省自六年以後止轄江南江西二省康熈元年裁去操江歸併總督十三年止轄江南一省至二十一年仍轄兩江帶理操江雍正元年三月吏部覆議兩江總督統理江蘇安徽江西三處廵撫事務地濶兵多與川陜總督俱實授兵部尚書職銜著為例洪承疇福建人進士順治二年以經略任馬國柱奉天人順治四年任以後係總督馬鳴佩奉天人順治十二年任郎廷佐奉天人順治十三年任麻勒吉滿洲人狀元康熈十年任阿席熈滿洲人康熈十二年任于成龍山西人副榜康熈二十一年任王新命潼川人貢監康熈二十三年任董訥平原人康熙二十六年任傅臘塔滿洲人康熙二十七年任范承勲瀋陽人康熙三十三年任張鵬翮遂寧人進士康熙三十八年任阿山鑲藍旗人康熙三十九年任邵穆布鑲藍旗人康熙四十五年任噶禮正紅旗人康熙四十八年任赫壽正紅旗人康熙五十一年任常鼐正白旗人康熙五十六年任查弼納鑲藍旗人康熙六十一年任范時繹瀋陽人雍正四年署任史貽直溧陽人進士雍正八年署任高其倬鑲黄旗人進士雍正八年任尹繼善鑲黄旗人進士雍正九年署任魏廷珍景州人進士雍正十年署任高其倬雍正十一年再任趙𢎞恩鑲紅旗人貢生雍正十一年任總漕部院自前明以來駐節淮安以便䟎運國朝因之順治六年裁去鳳撫歸總漕兼理廵撫事十六年復設鳳撫總漕遂專督七省漕運事務王文奎浙江人順治二年任楊聲逺順天人順治四年任吳惟華陜西人順治四年任以後兼管鳳撫沈文奎即王文奎復姓順治十年再任蔡士英奉天人順治十二年任亢得時山西人順治十五年任蔡士英順治十六年再任以後專管漕務林起龍大興人進士康熙元年任屈盡美奉天人康熙六年任帥顔保滿洲人康熙八年任邵甘滿洲人康熙二十年任徐旭齡錢塘人康熙二十四年任慕天顔靜寧人進士康熙二十六年任馬世濟鑲紅旗人康熙二十七年任董訥平原人康熙二十八年任興永朝奉天人康熙三十二年任王樑正黄旗人康熙三十三年任桑格滿洲人康熙三十四年任董安國鑲紅旗人康熙三十四年任赫壽正紅旗人康熙五十年任郎廷極鑲黄旗人康熙五十一年任施世綸鑲黄旗人廕生康熙五十四年任張大有郃陽人進士康熙六十一年任性桂正藍旗人雍正八年任魏廷珍景州人進士雍正十年任顧琮鑲黄旗人雍正十三年署任補熙鑲黄旗人雍正十三年署任程元章上蔡人乾隆元年任總河部院歴任駐劄山東濟寧州自康熙十六年以後江南工程緊要就近駐劄淮安府山陽縣之清江浦雍正缺年分設南北總河北駐山東南駐江南分任河工靳輔奉天人康熙十六年任馬齊滿洲人康熙二十七年任王新命潼川人貢監康熙二十七年任靳輔康熙三十一年再任于成龍鑲紅旗人康熙三十二年三十七年任董安國鑲紅旗人康熙三十四年任張鵬翮遂寧人進士康熙三十九年任趙世顯鑲紅旗人康熙四十八年任陳鵬年湘潭人進士康熙六十年任齊蘇勒正白旗人雍正元年任孔毓珣曲阜人雍正七年任稽曾筠無錫人進士雍正八年任趙𢎞恩鑲紅旗人貢生雍正十三年署任髙斌鑲黄旗人乾隆元年任廵撫都察院江南分上下江設兩廵撫蘇松廵撫自明嘉靖以來久設國朝因之初轄江蘇松常鎮五府康熙五年鳳撫奉裁始併轄淮揚徐三府州康熙元年停止提督軍務之銜十三年以軍興復令提督軍務安徽廵撫國初以操江兼管後以任重事繁康熙元年操江軍務歸併總督始專任廵撫之事所轄安徽寧池太廬鳳七府滁和廣三州雍正二年上江分出六安泗潁亳四州下江分出太倉邳海通四州俱為直隸十一年陞徐州為府併入邳州十三年陞潁州為府併入亳州兩廵撫仍照舊額統轄江蘇廵撫土國寳大同人順治二年任周伯逹萊陽人進士順治六年任土國寳順治七年再任周國佐奉天人順治九年任張中元正黄旗人監生順治十一年任蔣國柱正黄旗人順治十六年任朱國治正紅旗人順治十七年任韓世𤦺正紅旗人康熙元年任馬祜正黄旗人進士康熙八年任慕天顔静寧人進士康熙十五年任余國柱大冶人進士康熙二十一年任王新命四川人貢監康熙二十三年任湯斌睢州人進士康熙二十三年任趙士麟雲南人進士康熙二十五年任田雯德州人進士康熙二十六年任洪之傑湖廣人進士康熙二十七年任鄭端直隸人進士康熙二十九年任宋犖商邱人廕生康熙三十一年任于凖山西人康熙四十五年任張伯行儀封人進士康熙四十九年任王度昭諸城人康熙五十一年署任張伯行康熙五十一年再任赫壽正紅旗人康熙五十四年署任施世綸鑲黄旗人廕生康熙五十四年署任吳存禮正黄旗人康熙五十五年任查弼納鑲藍旗人雍正元年署任何天培正白旗蒙古人雍正元年署任張楷正藍旗人舉人雍正三年任范時繹瀋陽人雍正四年署任陳時夏元謀人進士雍正四年任張坦麟漢陽人舉人雍正六年署任趙向奎聞喜人雍正六年署任尹繼善鑲黄旗人進士雍正六年署任王璣錢塘人雍正七年署任彭維新湖廣人進士雍正七年署任尹繼善雍正七年再任王國棟瀋陽人進士雍正九年署任喬世臣滋陽人進士雍正九年任孫國璽正白旗人雍正十一年署任高其倬鑲黄旗人進士雍正十一年署任顧琮鑲黄旗人乾隆元年署任安徽廵撫李猶龍洵陽人貢生順治二年任李棲鳳奉天人順治三年任王順治年任劉洪遇順治年任李日芃奉天人順治七年任以後操撫兼管秦世徵奉天人順治十二年任蔣國柱奉天人順治十二