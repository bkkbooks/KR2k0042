body:
  text: 江南通志卷一百四十八人物志宦績十寜池二府寧國府唐羅立言宣城人貞元進士令河陰始築城郭當築處率為豪富所據立言下令畫地使民自築民憚其嚴數旬而畢因設鎖絶汴流姦盜屏息宋李含章宣城人太平興國進士廷試春雨如膏賦太宗稱善敭歴内外循公潔已雅號稱職凌䇿字子奇涇人雍熙乙酉年進士淳化間歴廣南西路轉運使入為户部判官先是嶺南輸香藥用郵卒萬人肩負抵京䇿請陸運至南安汎舟而北止役卒八百大省轉輸之費知廣州廣英路自吉河趨板歩二百里每夏瘴行旅輒死䇿請由英州大源洞伐山開路至曲江為便徙知洪州饒産金販者有禁逮繫滿獄䇿請縱民販市官責其算公私利焉改知益州兩川錢弊多盜䇿請鑄大錢以一當十從之䇿前後仕蜀凡六任真宗嘗謂其治蜀敏而有斷云後以工部侍郎卒梅詢字昌言宣城人端拱進士召試中書直集賢院時李繼遷攻靈州詢請以朔方授潘羅支使自攻取問誰可使者詢請行上壯之為三司户部判官屢陳西邉事論曹瑋馬知節才可用傅潛楊瓊敗績當誅田紹彬王榮等責令自效以贖過後遷給事中知審官院仁宗覽歴代户口登耗之數顧謂侍臣今天下民籍幾何詢對曰帝王恭儉有節則户口充羨賦歛無藝則版圖衰減五季生齒彫耗賴祖宗休養户口葢倍於前矣尋出知許州卒子鼎臣舉進士歴翰林學士上飛白書墨荘二字賜之曰美卿世居文翰之地也楊佐字公儀宣城人舉進士累遷發運判官汴水淺溢不常漕舟不能屬佐度地鑿瀆以通河流京城地勢南下夏苦霖潦佐開永通河以洩溝澮於野外而水患息又議治孟陽河從之後使契丹卒於途趙稹字表微宣城人擢進士第歴遷益州路轉運使真宗令條上蜀中利害一日章數上蒲江縣捕盜不得逮平民楚掠誣服稹行部得寃狀悉縱之仕終禮部尚書卒諡僖質楊璵字器之宣城人天聖進士知袁州衢信二州民争水利委璵決之璵曰衢上流水所自出然衢民頻泄水外河溉不及信争繇之起其著令先衢而後信訟遂平王知微字幾之宣城人慶厯登第僉判賀州鼔鑄嵗増課百萬遷祕書丞知當塗縣時築萬春圩調夫甚急知微請俟農隙部使者不悦既而重之與王安石同年安石嘗問以法度沿革知㣲惟言士去就有命名器非假人物坐是不進用仕終龍川倅劉琦字公玉宣城人博學強覽立志峻潔以都官員外郎通判歙州召為侍御史建言自城綏州數致羌寇宜棄之浙西開漕渠役甚小使者張大其事以功遷官言者論其非詔琦就劾官吏人人惴恐琦但案首謀二人而己汪齊字子思涇人慶厯進士累遷尚書都官員外郎時行青苗免役法齊詣朝堂力言不便王安石曰此法便天下獨公不便爾遂出判池州王平字裔中熙寧進士寧國以制科舉者自平始補韜畧尉邑民與寺僧争水利平曰寺所利者磑碾耳民所資者畝澮竟子民嘗驗毆死者曰尚可生捄之果甦其莅事精敏多類此徐勣字元功南陵人舉進士除桂州教授王師討交趾檄勣從軍大将郭逵逗留不進勣疏於朝逵坐貶後判通州率民築瀕海廢堤民賴其利徽宗立擢寳文閣待制兼侍講帝謂勣臣僚進對惟卿鯁直朕所倚賴大觀二年知太平州入覲極論茶鹽法為民病帝曰不見卿久今日乃聞嘉言加龍圖閣直學士留守南京初蔡京以勣舊事藩邸曲意事之勣不少降節京入輔勣亦終不復用方懋徳字元相南陵人宣和中為武康尉有丐者死或以誣富人沈氏獄已具懋徳辨釋之改令錢塘時郡科磚五十萬懋徳持不可立庭下屹不去卒罷汪汝則字方叔涇人建炎間助平方臘有功帝嘉其能録姓名於屛授紹興府通判歴知信衢二州有惠政時臣僚登對論郡守人才上曰使人人如汪汝則何患不治陳天麟字季陵宣城人紹興進士調廣徳簿嵗饑代郡将為書請部使者得粟數千斛以賑改知襄陽募忠義軍浚古眢河尋知贛州時茶商寇贛吉間麟預為守備民恃以安江西憲臣辛棄疾討賊天麟給餉補軍事平棄疾奏今成功實天麟方畧也孫楙字徳操太平人紹興進士厯判池真郢三州所至以興學節財為務入覲髙宗嘗論公生明上問何以生公曰廉生公又問何以生廉曰儉生廉累遷知温州朱熹稱其愛立而教明古良吏也梅成和字徳修涇人紹興登第調江夏簿徒歩之官時岳飛討楊么於洞庭安撫使劉湜守鄂渚令督軍儲掌箋表多所裨助賊平授太湖令文㮤涇人淳熙進士累官至御史抗疏三上災異事直指權相忤㫖罷歸林宗放字問禮宣城人淳熙進士教授通州學有舊刋三諫集載章惇姦狀時惇孫為守欲去其版宗放不予改知蘭溪邑號大治授廣州通判番禺海舶例有私獻却不受致仕後自號拙軒老人奚士達寧國人淳熙進士教授復州改知績溪簽書淮南判官初達與同舍郎沈渙講習禮經相勉曰曲禮母不敬大學母自欺當終身行之後能不渝其言弟士遜累官至大理卿會韓侂胄死史彌逺議起大獄士遜曰廷尉天下之平侂胄誠姦若加以大逆非所敢知遂忤㫖罷汪晦之旌徳人淳熙進士倅江陵郡郡有三海八櫃恃為險固豪右據以為田晦之力復之時劵法初變晦之乃流通泉幣又築寸金堤以捍江政績甚偉吳淵字道父柔勝子嘉定七年進士丞相史彌逺許為國器欲授官辭以親在當禀命彌逺為之改容尋辟令江東九郡有訟於使者輒請屬淵改差浙東制置司幹辦公事居外艱累詔起復力辭曰事親莫大於送死茍冒哀求榮他日何以事君服闋累進右文殿脩撰適政府欲用兵中原據闗守河淵謂國家力决不能取即取之不能守丞相鄭清之不悅未幾一如淵言差知鎮江厯江東轉運使兩淮流民入境者四十餘萬淵撫而濟之加華文閣直學士歴沿江制置屯田使湖南峒寇蔓入江右袁洪大震淵命将討平之朝廷付淵以光豐蘄黄之事創司空山等三大砦嵯峨山等二十二小砦分立隊伍星聨棊布擢資政殿大學士封金陵侯進爵為公寳祐五年拜叅知政事卒諡敏荘贈少師吳潛字毅夫柔勝子淵弟嘉定十年進士第一歴遷尚書右郎官都城火潛疏言陛下齋戒修省必使國人孚信毋徒減膳撤樂又言與元為鄰當以和為形以守為實以戰為應不宜輕啟兵端其後淮師敗亡皆如潛言端平初求直言潛陳九事忤時相罷後歴官簽書樞密院事封金陵郡侯叅知政事判慶元府條具軍民久逺計積錢百餘萬代民輸帛前後捐逋税五百四十餘萬進封國公後上章劾丁大全沈炎為炎所論劾責授化州團練使循州安置卒徳祐初追復原官贈少師韓元龍宣城人為天台令以徳化民邑遂大治性純孝與弟尚書元吉相友愛俱以文學顯時人比之坡頴焦炳炎字濟甫太平人淳祐進士知袁州奏竄新喻尉楊大明以雪嫠婦之寃後除右正言以言事忤當軸作詩貽知舊云事至諫官言不得身為宰相有何榮遂解職歸方處和字徳修旌徳人調玉山丞罏户黄姓者夜以白金密遺其子處和麾去比歸復以斑竹杖為贐怪其重不受刳杖果納金其中其廉介類此章燾宣城人知蘄州寛平不擾擢提㸃湖南刑獄全州将兵刼守臣為亂燾誅其首惡餘皆諭遣後拜刑部侍郎每議獄傅以經術時推為平允虞儔字夀老寧國人舉進士歴知績溪以廉静著擢監察御史排擊貴近綱紀肅然累官兵部侍郎元貢師㤗字泰甫宣城人奎之子幼師吴澄在太學時路拾遺囊亟追還之泰定四年擢第歴紹興路推官數剖疑獄入翰林預修后妃功臣列傳除吏部侍郎江淮兵起京師乏食詔師㤗和糴浙右得糧百萬歴户部尚書轉漕閩海以鹽引易糧給京師凡數十萬石陳良弼字公輔宣城人少辟憲史有聲除嘉興路教授以廉吏稱調上元簿坐伉直自免後以旌徳尹致仕吴師道稱其才足以濟事辨足以服人知足以自衛衆謂其知言明秦逵字文用宣城人洪武乙丑進士仕至工部尚書議定輪班匠法三年為班更番輸作量地逺近為班次候撥免其徭役工匠便之上以學校為國儲才而士子巾服如吏胥宜更制命逵製式頒行天下戚遜字彦志宣城人洪武中以貢授兵部主事永樂間歴山東叅政嵗饑流移載道請於朝未報輒發粟賑之詔奨賚遷交趾布政芮麟字志文宣城人洪武間為建寧知府嵗饑民困發粟以濟郡有上下闗衛分兵戌守小人倚為姦利商旅苦之麟疏其弊得罷為政寛簡有古循吏風劉希賢宣城人以掾為餘姚主簿性狷介卒於官同僚檢其篋止俸銀五錢帕二方縣為殮其喪歸之丁鎡字永時南陵人永樂中以書法徴入國子監除户部主事出使徐州嘗便宜發倉賑饑土木之變募義勇勤王仕終刑部右侍郎范懋字士勉南陵人永樂間由舉人授河西令遷隰州同知廉明不可犯百姓以包孝肅稱之為立思廉亭貢珊字廷甫宣城人性孝友母疾嘗糞兄病疽吮之正統辛未進士知唐山縣覈清河官地以還民時以佛稱入覲卒於京無以為殮唐山民奔走哭奠争出車錢䕶其喪歸王著字有輝涇縣人由貢士除浙江按察司經歴嘗奉檄巡温州久旱禱雨輒應慈谿多虎為害竭誠禱神比浹旬斃十三虎民遂安吳詔相字廷臣宣城人由鄉薦知汝州不畏彊禦州境肅清左仲輝以字行涇縣人天順進士歴户部郎出知永州時新建藩府王欲闢地仲輝阻之改知彰徳藩府之擾十倍於永咸御以禮法置泉陂二所溉田五千餘畝張綸字大經宣城人成化進士擢御史按真定平鄉令欲増淤田税檄報淤决不常不可遺民患遷大理卿興襄二府争灘地連逮七十二家綸為奏定事遂息改刑部左侍郎推治博野慶成二王獄稱㫖時武宗政柄旁落中官用事綸奏奸黨秦用等當誅連及巨璫疏留中不下因致仕孫昊字曰明南陵人少以文學名督學御史戴珊稱十才子以昊為首成化丁酉鄉舉知海寧縣築堤捍海民賴以安王達字徳孚涇縣人成化進士嘗决鳯陽河南争田之獄又發十三年之盜銀於倉地吏民驚服遷知武昌府斬妖僧繼曉擒妖術道士李孜省立三等九則之法以均田役時守備太監假進貢漁獵細民奏革之湖湘水旱相仍疏罷襄府營建以寛民力年未五十致仕江漢字紀南旌徳人成化進士任户部郎中西蜀旱饑奉詔賫内帑賑之條畫周悉遷寳慶知府首制豪猾不得借勢宗藩區别兵民禁戢流散蠧弊盡革徐説字以中宣城人成化進士歴南右通政嘗册封靖江王資贐甚厚一無所取致仕歸務以忠信先鄉里王葢字舜功宣城人𢎞治進士在諫垣多所彈劾時禁軍横甚至侵掠官物葢請治如法上命榜刻東安門自是少戢陳孜南陵人𢎞治鄉薦任霸州同知清覈宣遼二鎮屯田有能聲陞寧羌知州時川蜀流賊起郡邑殘毀惟寧羌獲全邵道宗字師魯太平人𢎞治舉人任樂陵知縣立保甲保馬法縣境以寧世宗南巡供億糗糧民不病擾調郯城修築沂河馬耳灣諸堤先是馬耳灣下有神蛟據之屢築屢圯乃備牲祭告忽風霧中有物飛騰而去功遂成沂州鑛廢盜賊繼起率土兵平之蕭瑞涇縣人正徳進士授靖安知縣時奉新華林賊起以有備不敢犯擢御史劾兵部尚書王瓊廷論韙之吴大本字性夫宣城人正徳進士知進賢縣有儀賔李貴怙勢殺人論治之擢河南道御史疏論閣臣張璁不職出為廣東僉事决疑獄活趙集等二十三人劉贊字誠夫宣城人正徳鄉薦知肥城蝗不入境移判成都行之日民悲啼勒石道傍云劉侯與赤子泣别處趙象字惟賢太平人正徳問以貢知慶雲縣擢桂陽州清節甚著嘗曰秩俸外錙銖皆是賕私人服為格言張本宣城人正徳時為開封推官正直方嚴動必循法歸家無餘貲鄉人重之汪堅字子固旌徳人正徳進士為刑部郎中按郭勛恃勢恣横諸不法狀輦轂肅然歴任河南叅政致仕歸田産不加益焉姚本旌徳人嘉靖舉人知汾州與總制曾銑計復河套忤執政改知獨山州土賊蹂躪本畫䇿守禦咸中機宜徐元氣字汝和宣城人嘉靖進士由刑部員外出守成都出枉獄四十八人築灌縣石堰歴遷雲南右布政會土官岳鳯亂條上𠞰撫䇿躬督芻餉事平遷山東左布政東省巨室優免溢額民苦賠累元氣悉清覈之仕終通政使徐元太元氣弟嘉靖進士為吏部主事分校禮闈時張居正怙勢其子弟就試主司相戒勿遺元太摘其紕繆置之弗録左遷山東叅政居正疾巡撫藩臬禱於岱元太獨不徃幾中危法會居正沒遷順天府尹時蜀中賊黨擁衆入平裔堡西南大震命元太巡撫四川太至指授方畧破砦三十五斬首二千餘級賊惶怖乞降遂築城黄沙壩以控扼諸羌明年建越馬湖等復大逞元太悉討平之以功進兵部右侍郎陞南刑部尚書乞歸沈寵字思畏宣城人嘉靖鄉薦授行唐知縣民不諳織絍寵為造機杼教之御史按部至寵厨傳省約澣已所用帷帳以進御史賢之擢御史遷湖廣兵備平九隆灣劇賊鄭翦等遷廣西叅議歸里嘗主講席稱古林先生梅守徳字純甫宣城人嘉靖進士授台州推官台臨海強族多闌出中國貨姦民互市鈎致倭寇守徳按治之乃安擢吏科給事中時輔臣嚴嵩威虐朝士周怡楊爵劉魁以忤繫詔獄守徳作三君詠寄之府尹胡奎因嵩戚驟遷力疏其貪狀方士徐可成與嵩比以禱祀為太常卿又屢疏駁之嵩銜之時兩浙倭熾命出知紹興府守徳繕城蒐卒均田核税民稱便尋督山東學政世宗令陶仲文祈年㤗山陶怙寵千請斥之弗為禮遷雲南叅政以母老不赴歸建書院講學世稱宛溪先生徐楠字任之宣城人嘉靖舉人知耒陽縣振興文學同知撫州躬負畚鍤築千金坡撫人為建祠坡上繼攝郡事有御史居家不法楠按治之為其所嗾免歸子鴻起領萬厯鄉薦歴遷衡州知府耒故衡屬也郡人祠祀之題曰父子濟美孫濬字宗禹宣城人嘉靖進士由永豐令入為給事奏論趙文華希相臣嚴嵩意上怒調孝感丞歴知平陽府唐汝迪字吉甫宣城人嘉靖進士任司勲郎以忤嚴世蕃出知雷州雷濵海倭一夕突至急登陴授兵城賴以保擢河南治河副使河决崔家口有議開復舊河者上書言不便状議乃寢殷登瀛字子登宣城人嘉靖進士知海寧縣期月宿逋盡清案無停牘擢户曹𣙜闗作浴心亭以自況仕終金華府所至有清譽趙睿字若思涇縣人嘉靖進士擢御史屬巡視十庫適庫璫報車駕幸西土門觀獅子請暫避睿正色曰臣備員執法職在補過拾遺主上来正宜班侍何避為璫惶恐馳奏上即歛轡徐還其見憚如此屠羲英字淳卿寧國人嘉靖進士授户部主事歴陞南祭酒訓飭有條張居正禁講學英曰官可一日便棄學不可一日不講㑹講不輟居正奪情卿貳連牘保留英曰朝廷可無居正居正不可無母擲筆不署秩滿當遷上曰屠羲英不愧士楷當令久掌成均御書春風化雨蔚為人宗八字賜之汪泓旌徳人嘉靖舉人知阜城縣郡募軍派阜城買馬二百匹泓力争得免尋守薊州薊鎮冒虚餉十餘萬泓按册稽實士馬飽騰陞屯田都水員外郎築中州齧堤漕艘以濟晉南安守乞歸周希旦字汝魯旌徳人嘉靖進士由推官擢御史首疏崇正學養聖躬時新鄭恃宫僚舊恩當國專恣希旦論之轉應天府丞時苦旱疫希旦兩疏請賑得發金二萬賑之周怡字順之太平人嘉靖進士授順徳推官肅宗南狩道出順徳徴發萬計並賴怡指畫減費十之三擢吏科給事中時相臣嚴嵩翟鑾冢宰許讚積有隙怡謂大臣各持意見非國之福言甚剴切詔廷杖下錦衣獄尋因箕仙言釋之閲月復被逮二殿災又釋之怡方介峻潔累躓彌堅海内薦紳望之如祥麟威鳯後遷太常少卿卒諡恭節崔涯字若濟太平人學術純正嘉靖中進士擢御史糾劾不避權貴上目為真御史視鹺河東嵗大祲疏發鹽課數十萬以賑之繼按福建糾一墨吏聞風去者七人陳山海十二䇿悉中利弊亢旱親禱霖雨周渥時謡為御史雨尋以劾冢宰汪鋐忤㫖被斥許汝驥字徳卿寧國人嘉靖進士仕户部郎中值畿輔大饑請發太倉出賑轉職方相臣嚴嵩私仇鸞欲越次敘功堅執不可奉勅監視薊鎮軍實單車詣薊按區核實無所隠冒鎮帥張承勛恃援作勢驥卻其重餽尋極言其貪黷不法狀並劾督撫諸臣不任節制上為動容仕終河南副使生平檢身窒欲常若不及書座右曰居處常嚴帝鑒行藏可對人言子成器仕至辰沅兵備周懌字信之太平人少師鄒守益究心理學以嘉靖嵗薦授易州同知視事勤敏設釡甑於㕔事外訟者晨炊竟即剖决發歸嘗出一寃獄其人徳之刲豕以饋中實以金懌叱遣之焦煜字伯升太平人嘉靖進士歴遷浙江按察僉事所部多白役肆虐煜盡加裁抑一日偕僚佐出有瞽婦赴愬大呼孰為焦青天者同官有愧色海寧鹽池瀕海患潮檄守令築石堤七百餘丈立陡門四以時瀦洩至今賴之徐大任字重夫宣城人隆慶進士授工部主事嵗汰水衡冗費數十萬緡𣙜税真州力免宣船囘空遞役之苦歴官中外皆以廉稱神宗謂其清節為天下第一詹沂字浴之宣城人隆慶進士授新建知縣擢給事中宰臣張居正奪情議起南省臣具疏乞留沂獨不署名歴陞左副都御史會勘妖書獄力止株連咸寧令滿朝薦以事忤璫被收沂固請得釋楚藩之變陳善後事宜凡親王違制撫按皆得以白簡從事乞増入勅内從之嘗值除夕上謂左右曰此時廷臣受外覲官書帕開宴打閙惟副都詹沂清寂可念累疏乞歸不可遂解組出國門候命上優許之明大臣挂冠自沂始郭忠信字希曾與兄忠貞並寧國諸生從羅汝芳講學耿恭簡督學南畿求實學篤行之士合十四郡得十一人忠信兄弟與焉隆慶三年用恩貢判辰州忤時相謫婺源教諭以八條造士人稱梅井先生蕭彦字思學涇縣人隆慶進士擢禮科給事中歴户垣疏凡數十上無不闗切時政又言察吏不宜以催科為殿最有司憚考成必重以敲扑民力不勝流亡隨之寛一分民受一分之賜上納其言轉都御史撫貴州鄖陽總督兩廣晉户部侍郎卒諡定肅歴官二十餘年立朝多讜言其在黔則破擒巨逆平其砦在滇則靖亂兵折驕帥杜暹羅之請四任開府恩威並著弟雍仕廣東按察司宦績亞於彦而學過之時稱二蕭許夢熊南陵人隆慶進士知福清縣縣經倭亂夢熊恤民恵商築堡興學士民尸祝焉時葉向髙以童子被試一見許為宰相器又識林茂槐李多見後皆登顯仕時號人倫氷鑒終南兵部主事貢靖國宣城人萬厯進士授刑部主事時張居正相欲周内其所憾者令其子以通家刺投謁且以銓地餌之靖國還其刺曰誤耳原無世誼也力争之事得白有大猾當坐賄御史匿不為理靖國復力争之尚書前卒抵法秩滿陞福建泉州府拊循有法七邑大治再陞浙江鹽運使會塲官作姦為鹺院所庇遂投劾歸囊槖蕭然嘯咏不輟趙健字行吾涇縣人萬厯進士由刑曹知辰州教民紡績政清刑措歴貴州布政時苖播相繼竊發撫御有方羣醜賔服終南太僕卿張守道字岸先宣城人萬厯進士授户部主事視南徐倉會中使採木過徐役民助輓甚困守道為捐倉羡以代徭任武選員外朔望必禮楊忠愍祠魏閹方熾守道毅然乞南得南太常後轉工部侍郎卒守道性孝友嘗破産以急兄難母卒廬墓三年虎繞其墓不去蔡逢時字應期宣城人萬厯進士知海鹽縣履畝均徭築海塘禦潮患遷祠部郎議藩封禄制著為令為温處兵備斬倭七十餘級轉河南叅政築沁堤戢禹州巨盜仕終四川布政卒後有海鹽人十餘輩来哭墓下去麻溶字明之宣城人萬厯進士歴吏部郎時私謁干政溶抗疏言政府侵銓臣之權臺省伺政府之意銓法日壊坐是出為冀南叅政稍遷河南右布政卒梅守相字台甫宣城人萬厯進士授工部主事𣙜夏鎮陳泇河利運状遷郎中董其役身歴塗潦冒艱險閲九載績成以二百六十里之泇避黄河險三百三十里仕終按察使弟守極萬厯鄉薦知安吉州疏濬水道因名梅溪終南户部員外守峻進士為吏部郎徧諸司疏壅滯清流品仕至陜西叅政守和進士由禮部督學河南嚴抑奔競歴陞廣西叅政葉煒字文光宣城人萬厯進士為餘姚令歴河間守餘姚有汝氿牟山諸湖及海壖地為豪家所侵煒清復之並作堤堰民得免旱澇憂任丘有殺人者倚叔中貴冀緩死竟論抵罪遷紹寧兵備致仕徐夢麟字惟仁宣城人萬厯進士知河南府改登州屬吏有忤璫者懼不免力為直之仕至南太僕少卿嘗自咏曰平生宦况猶江水日對青山夜讀書徐汝正宣城人萬厯舉人除西鄉知縣時瑞藩封漢中道西鄉驅民夫牽挽不勝驛騷汝正操小艇懐牋謁王為民請命風作舟溺求屍三日始得之邑民環哭立祠祀焉徐騰芳字雲卿宣城人萬厯進士厯遷九江同知桑落洲崩潰蘆課無出議請崩者蠲荒者減州民徳之遷知真定陞易州兵備擒賊黨于𢎞志等破其衆六千人終陜西叅政髙維岳字君翰宣城人文學優長領萬厯鄉薦仕雷州推官尋署瓊州會礦徒竊發鈎倭入寇維岳伏兵擊破之轉鞏昌郡丞督餉臨洮招番人置近甸邉賴以安遷興國知州興國故苦柯潭二賊維岳至郡立擒其魁當事忌其功投劾歸梅鵾祚字仲舉宣城人萬厯進士由庶常改御史會鄭貴妃有寵受封時王恭妃生皇太子三年而封不與鵾祚請進王妃以定國本朝論韙之都御史海瑞謂臣工貪墨當用國初重刑鵾祚力諫得寢又疏言錦衣衛多中官私人語少侵上上怒曰鵾祚少不諳事姑罰俸尋出按西粤卒於道戴新字浴日南陵人萬厯進士由工曹知寧波府櫛剔諸弊吏皆憚其嚴正郡瀕海數苦倭寇新造船治械防禦甚周終湖廣武漢道仙克謹字仲恒寧國人萬厯進士知隆平縣時苦旱捐俸給民穿井七百有二十民立石識之曰仙井尋調建安會水患多漂溺築隄建橋民困以濟轉山西兵備邉事孔棘克謹指揮防禦敵五載不犯境特陞山西巡撫梅綿祚字公衍宣城人萬厯鄉薦歴遷户曹密雲兵乏餉力言於主計者通他儲以濟軍得無譁知栁州撫猺獞多惠績顔文選字巽之宣城人萬厯進士知江夏縣擢給事中在諫垣十一月疏十三上其請建國儲疏尤激切以敢言外謫後追贈光禄少卿劉有源南陵人萬厯進士将之官出已分田給伯仲曰我幸沾薄禄此産可共也為御史有用人措餉二疏言甚切至嘗收治東城大猾中貴為解不聴時稱其執法仕至江西按察使葉永盛字子木涇縣人萬厯進士擢御史巡鹽浙直中使劉成来𣙜税商竈震懾盛奏之疏詞剴切上悟不直奄巡按江西奄寺黨連武弁有獻店設𣙜之議盛抗疏請斬宵人議遂罷居御史九載疏數十上直聲震中外累陞太僕寺卿永盛少孤里人侵其地既貴而歸之永盛曰孤而見奪貴而歸之吾不為也若自今無侮孤寡可矣鄉人有坐仇陷大辟者奉數百金乞援盛麾之去而陰為營救得脱趙士登字應庸涇縣人萬厯進士知黄岡縣時行清丈法登經界畫一豪強憚之吏舍夜火延及囹圄諸囚蒲伏庭下曰吾屬罪應死不敢逋逃為明府憂擢御史廷議以河決請加賦登力持不可仕終南吏部侍郎吴尚黙字元垣涇縣人萬厯進士知義烏縣擢御史出按蜀奢崇明作亂會督撫合謀翦滅之尋按粤東控扼海寇得以無事崇禎時以疏救錢龍錫謫守承天時流寇大擾檄練鄉兵三千以備守禦築堤數十里溉屯田勤勞九載量移武昌陞本省右布政卒趙士際字維行涇縣人少強學嘗以磚為警枕領萬厯鄉薦知洛容縣尋調宣化創建城池擢知羅定州州初歸版規畫拊循民皆悦服子不盈行誼敦睦喜讀周邵書蕭良幹字以寧涇縣人弱冠慕王文成良知之學成進士授户部主事𣙜税崇文河西斥羨金不取遷紹興知府修三江牐築海塘復稽山書院厯陞陜西左布政裁抑礦税二璫歸里復割腴田二百餘畝為義田以贍族黄一騰字仲昇寧國人萬厯進士知完縣多盜騰舉行保甲講律令兩月俗大革調知南昌有虚丁虚米為民累騰力為清覈時税璫潘相勢甚驕横至縶辱宗室騰數其過使引謝潘怒撼以危言騰蔑如也省親歸讀書瞿硎故址自號問瞿以見志張星字文宿宣城人以貢知館陶置倉備賑擢河間同知調天津減衛軍丁錢定為例以不肯伏謁中使免歸汪若極字子無旌徳人泓之子萬厯進士知浙江仁和縣仁省㑹之地催科甚煩若極設易知單法悉汰羨餘民輸将恐後其平反疑獄雖成案多得開釋屢觸直指怒弗顧也陞福建道御史甫入臺即疏上六事其止内操一條觸璫忌出按粤西㑹有旨責成撫按措銀一十五萬部檄如雨若極䟽入得免餉十萬民力以紓仕終太僕少卿崔師訓字惟承太平人萬厯進士任户部主事監税易州清介自持仕至福建叅政郭建邦字爾立旌徳人天啟進士仕行人值魏璫煽虐告歸璫敗乃起擢兵科給事厯遷通政適户部以兵餉孔亟檄加山税建邦力言得免遷太僕卿捐俸買馬佐軍陞順天府尹又捐俸助修城河仕至工部侍郎鍾震陽字百里宣城人崇禎癸未進士知山陰縣築塘捍海部民為之立碑徐律時字乾若宣城人崇禎庚辰進士知膠州清介自勵時土寇訌發親率州人防禦民得安堵劉維仁字孔安宣城人崇禎甲戌進士厯知錢塘鉛山魏縣潔已愛民遇亂歸絶意仕進日午不炊晏然髙臥項如皋字孟凱太平人崇禎丙子舉人特授刑部主事時黄道周忤㫖皋撰疏救人皆為咋舌皋曰聖怒不測自當之疏上得釋卒於官國朝孫襄字惠可宣城縣人明季進士順治元年授刑科給事中時諸司決獄以意輕重襄請議定律令使内外曉然於畫一之制明年遷吏垣請定計典勵官守前後疏多嘉納嘗請免寧郡貢黄連郡人賴之胡尚衡字階平涇縣人幼穎異順治壬辰進士以工曹司𣙜務尋擢兩浙提學識㧞多名士仕終荆南道張鳯徵字威鳯宣城人以抜貢授陵水知縣始至裁里甲集流移三十九峒悉聴約束復構學宫於兵燹之餘以卓異徵會卒秦才管字尾仙南陵人與兄仁管同登順治壬辰進士官户部郎中司𣙜蕪湖力省苛稅便賈舶陞陜西提學慎簡寒畯㑹聞父母喪號慟而卒諸僚斂金歸其匶洪啟槐字庭植寧國人順治間進士授南江知縣南江荒殘槐招流亡平徭役民間以軍需故鬻子女啓槐捐俸贖之厯仕至貴州提學汪觀字顒若宣城人順治乙未進士知湘鄉縣下車即申復廢站蘇驛困興絃誦賑饑民未幾以母艱哀毁卒施閏章字尚白號愚山宣城人博綜書籍善詩古文詞順治己丑進士為刑部員外讞決明敏督學山左有氷鍳之譽轉湖西道叅議湖西故荒瘠多盜閏章撫綏有方袁臨間稱之為施佛子康熙己未以愽學宏詞薦改授翰林侍講纂修明史以勞瘁卒閏章性仁孝事季父譽如父廣置義田以贍宗戚篤窮交勵後學人咸奉為楷模鍾無瑕字缺如宣城人順治間以抜貢知汜水縣縣里賦不均無瑕以熟地六分荒地四分為一里併强弱而均之賦乃平補富川縣縣多盜無瑕誘致其豪斃於獄境始寧力除賦羨並完前令積逋邑稱治陞知光州卒阮士鵬號巖山宣城人順治中舉人知海豐縣時海寇嵗逼瀕海者皆内徙士鵬晝夜勞瘁葺屋居給牛種民甚賴之碣石衛蘇利之變士鵬詗得其狀宻白幕府得豫為備及大師進討芻粟供億一以整暇應之賊平量移許州治績甚著梅欽宣城人順治間知崖州時用兵後井邑蕭條欽勞来拊循流民襁負来歸康熙元年請豁荒米及軍屯米二千石有奇在任七年多惠政沒於官洪啟權字玉衡寧國人順治間進士授安福令清宿逋絶賄賂時山民為亂殺前令上官發卒𠞰之啟權單騎往縛其首餘黨悉安以清直不容於大吏歸家後薪米不給日持一卷書吟咏大櫟間自號櫟園子阮爾詢字于岳康熈壬戍進士由翰林為御史屢有建白仕終工部右侍郎先是寧郡輸賦者率為吏胥中飽民苦無所據以自直爾詢白當事行三連串法至今便之梅鋗字爾熾宣城人康熙丁未進士知太平縣多惠政歴仕御史中丞巡撫福建聖祖親書攄誠信三字賜之鋗入關從行不過十人嘗疏請積穀備賑未久遇嵗饑便宜平糶以濟之仕至左都御史致仕歸劉楷字子端南陵人少孤鞠於母趙登康熙乙未進士授中書舎人典福建試得人稱盛丙午考選御試擢置第一歴刑户二科給事中疏論督撫保舉學臣及河工保題官員之弊又請杜師巫邪術禁小說淫詞指陳深切聖祖嘉納施行又密具相臣柄政冒死糾叅一疏疏上如奏罷斥輦下肅然累官光祿卿致仕歸杜門著述捐置義田以贍族人陵邑人文日盛白諸當道闕學為大學邑人士徳之子應熙仕為夀陽知縣亦以孝友知名方仲字佐平南陵人康熙己未進士由翰林為户部郎出知登州潔已率屬嘗以旱蝗禱於蜡社蝗盡赴東海死後徙汀州知府箐峒皆服其徳化郡地蛟發山水髙十餘丈民哭聲震逺邇伸齧指血疏告城隍神水立退會移疾歸送者至二百里猶不忍别子士珣有文名雍正癸夘舉人孫斌字淑獻南陵人以武進士為福寧州遊擊康熙甲寅耿逆反以書招之斌斬其使密報督撫耿逆怒拘之興化賊平奉㫖優叙遷䕫闗副將繼母歿求解任許之武臣丁憂自斌始池州府宋樊若水字叔清貴池人舉南唐進士不第謀歸宋獻平江南䇿請造浮梁濟師太祖從之歩兵渡江如履平地既克池州即以若水領州事擊敗三砦之據險未服者歴遷右諫議大夫太宗命改名知古採其議廢江南鐵錢為農器給流民之歸版籍者仍鑄銅錢以便民用出為成都轉運使改河北卒夏中正貴池人嘗仕南唐及入宋知貴池縣以鄉黨非威刑所宜施每聴訟輒隨其曲直諭之人咸悦服自相戒飭無有犯者擢職方員外郎告歸卒孫噩舉才識兼茂科知長洲縣以直罷文彥博奏復其官胡舜元字叔才銅陵人舉嘉祐四年進士歴徳興鄭二縣令遷著作郎少與王安石友善及安石執政行新法舜元以書規之有懐利事君貪利害民語遂乞致仕孫棣舉進士官兵部郎中李植字公立建徳人登進士第歴官湖北轉運判官入為尚書度支郎孤忠自信不屑依阿取容坐元祐黨擯不用檀固字以忠建徳人登熙寧三年進士第紹聖間官尚書時悉改元祐之政固上書極言朝廷罷吕大防蘇軾范純仁用章惇曽布蔡卞去三賢而進三凶此天下治亂之由也書奏免官及蔡京為相遂不復進用張漣字伯器貴池人以能理繁劇稱初令數大邑歴守鳯翔以事忤蔡京徵至京卒鍾鏜字徳振銅陵人登元祐六年進士第授旌徳主簿厯知汀州入仕五十餘年所在以廉惠著稱檀宗益建徳人哲宗時詔諸州行三舍法取士宗益備陳考校升選之制從之授國子學録子倬登大觀三年進士第歴官徽猷閣待制湯允恭貴池人登宣和六年進士第通判常州常素難治允恭以訓誡先之俗漸以化適鄰州有叛兵及境親往其營諭以禍福寇即解去州城獲全遷刑部員外郎能平政寛獄擢殿中侍御史紹興間官至侍郎湯巖起貴池人登乾道六年進士第知營道縣以廉稱嘗自朂曰清而死豈不愈於濁而生耶秩滿歸以薦起判徽州尋又奉祠歸里葉楠字元質貴池人登乾道中進士第為鄱陽尉值嵗潦楠力請蠲租賑之後令績溪多惠政邑人歌之曰前有蘇黄門後有葉令君蘇黄門蘇轍也因重楠故以轍比之所著有知非集程九萬字鵬飛青陽人登淳熙二年進士第初知武康縣以政績卓越内擢歴司農簿太府丞奉使兩淮改鑄鐵錢具有規畫出知和州擢華文閣待制襄陽安撫使封青陽縣開國公著有九華詩百篇子松舉進士歴官同知樞密院事鄭舜臣建徳人紹定中江西寇猖獗趙范知池州聞舜臣賢牒充民兵副将防守江淮又嘗董軍饋輸財助用為朝命所褒阮麟翁字祥翁銅陵人登景定三年進士第初授京山尉歴建徳路總管任封疆修耕戰以功名終明徐謙青陽人洪武中以貢授臨江府推官遷户部郎中督漕運於濟淮甚著勞績特擢太僕寺少卿潘伯庸銅陵人洪武中由貢選授御史言事侃直不避權要厯河南廣東山西按察使並著清節陳敬宗貴池人洪武乙丑進士授刑部給事中永樂初論時政謫鄞縣丞後以直諫死佘可才字國器銅陵人永樂癸未舉人官襄陽訓導詣闕請試繁劇留試事工部復奏官不必備得人為本成祖嘉納之以薦擢吏部主事扈從北征至興河奏事稱㫖凱旋預褒賞歴郎中署堂事清選法革吏弊遷南通政司左通政鄭景曜字拱南建徳人永樂甲申進士授御史蹇諤盡職出按山東再按遼東有元時故吏儲欽巫愷等為奸利有司不敢問景曜捕治之擢貴州叅政命偕巡撫廉察官吏吏治肅清湖廣筸子坪苗亂奉勅監軍進𠞰苗平俾久任後以年老乞休致柯進字啟暉建徳人父彦斌洪武中以薦歴臨安令有善政暹領永樂乙酉鄉薦預修永樂大典擢户科給事中以直言謫官仁宗即位署永新吉水二縣皆大治楊士奇等交薦之特擢浙江按察使暹初以建言著聲浙人多憚其威名及至持法平允不尚苛察所部皆畏懐之丁艱歸復起滇皋佐靖逺伯王驥平土酋思機發之亂致仕歸里子薰由貢令霑化安鄉二縣亦有廉平之稱江得東流人永樂中由貢選授御史以剛直稱遷按察司僉事檀凱字伯和建徳人永樂壬辰進士時新定貴州選有才能者往官其地凱預選為思州府通判至官為孚恩信陳禮義適諸苗寨互相攻擾凱加意撫輯得不擾境滿九載當遷思民詣闕請留宣宗初即位方鋭意綏逺特加凱正五品俸命還任後擢應天府治中思民涕泣攀送遷府丞致仕吳賜貴池人永樂壬辰進士歴河南按察司僉事以敢言改御史抗疏忤㫖下獄卒江通建徳人永樂中以貢授鞏縣令招集流民俾復故業河南旱飛蝗遍他縣不入鞏境郡守異之調通捕蝗孟津通往齋沐禱於神蝗悉去事聞於朝加俸一級命久任滿九載以老乞歸邑民立祠祀之胡本惠字益之銅陵人永樂庚子舉人授户部主事歴員外郎出知南昌府有善政遷陜西叅政累擢右副都御史巡撫遼東莅軍持重邉境以寧俄召入為左副都御史致仕歸本恵有徳量時稱長者舒仲誠貴池人以貢授東光訓導遷萬載令政尚嚴明招徕逋竄擢御史成祖北征仁宗以皇太子監國仲誠言事嘗忤睿㫖出為湖廣副使卒檀觀東流人宣徳中以貢授永州令以廉静治三載當遷民歌曰食惟檀衣惟檀檀公去我飢寒詣闕請留又三載當遷民復乞留滿九載以治行最擢雲南按察司僉事不赴歸囊止一石人號之曰清白石云孫仁字世榮貴池人景㤗辛未進士授户部主事督畿内糧儲監通倉盡釐夙弊出知西安府大兵討固原叛羌仁有轉餉功遷陜西叅政鑿涇陽洪口堰引水溉田永為民利累擢右副都御史巡撫四川平松潘黒虎砦賊及茂州巴豬等砦蠻相地險要設立州縣以控制之入為户部侍郎乞致仕歸陳孟晟青陽人景泰甲戌進士授評事累遷雲南按察司僉事居官廉慎自勵理獄多平章廷珪銅陵人天順己夘舉人授興國令清恵得民心秩滿輒請留任至九載遷武昌同知邑民追思立祠祀之張廷瑞貴池人天順壬午舉人授龍泉令治邑如理家政纎悉畢舉生民樂業擢御史清理屯田盡革中璫侵占之弊軍屯感徳屢條奏時政有聲憲臺陳輊青陽人天順甲申進士授南刑部主事折獄平允歴福建按察司僉事備兵漳州有宿寇據山谷時出刼掠輊以兵深入殱其根株而身犯瘴毒卒於軍事聞給𫝊歸其櫬遺槖惟圖書數卷吳必顯字徳純石埭人成化丁未進士授泰和令以勤莅官案無留牘邑有權貴數輩素恣横憚必顯悉歛跡屢遷岳州守張輝字藴之石埭人𢎞治庚戌進士授南禮部主事以言事謫光州同知累擢福建僉事復以介直忤劉瑾勒令休致瑾敗廷臣交薦以老不出為晉一階予誥命周冕字尚文貴池人𢎞治庚戌進士授南户部主事遷員外郎監税鳯陽一清積弊又奉命至江西督理糧儲得實糧四十萬石以濟邉餉詔旌之李嘉祥字時鳯貴池人𢎞治丙辰進士授北直開州知州剔奸祛弊動中機宜吏民畏服州城北舊有淫祠拜謁最盛嘉祥至立毀之巫風遂絶擢南户部員外郎督賦蘇州卒性慷慨喜論事嘗具疏語侵權宦人尤壮之桂鏊字用之貴池人𢎞治戊午舉人正徳中授廣信府同知時宸濠蓄逆謀陰結山中三巨寇鏊廣設方畧以次𠞰平之嘉靖初補栁州府同知從總督王守仁平思州斷藤峽以功擢知思恩府興文講武民猺帖服後致仕歸郡人祠祀守仁奉鏊配焉許潛貴池人𢎞治己未進士授行人選御史剛直不阿嘗監内庫中貴憚之汪珊字徳聲貴池人正徳辛未進士授御史嘉靖初論新政十事及請開言路疏時皆服其敢言出為河南副使累擢右副都御史巡撫湖廣復以言事落職會貴州都匀苖亂廷推起珊往平之召為南大理卿終户部侍郎珊清介自持卒之日囊無遺貲李崧祥貴池人正徳甲戌進士授户部主事歴山西按察司副使備兵潞安遷河南布政司叅政将行適上黨青羊山賊作亂撫按以崧祥有辦賊才特留總四道兵入山𠞰賊賊平議析壺關等縣地置平順縣以扼山之要害得㫖允行累遷四川布政使時世廟多營建蜀民困採木之役崧祥入覲抗疏止之因忤用事者致仕歸值嵗饑即解束帶鎔金購穀徧賑鄉人柯相字元卿貴池人正徳丁丑進士授永新令宸濠反巡撫王守仁與吉安知府伍文定從上流舉兵討賊相亦集其邑兵從而身自居守濠平守仁欲敘相功辭不受歴吏科給事中劾去官邪數十人累擢右副都御史巡撫陜西築皋蘭邉牆三百里墩臺相望邉警以絶改撫河南又遷督兩廣不赴歸孫之来以理學著柯燾字光庭建徳人正徳己夘舉人歴臨江南昌二府推官折獄俱稱平擢南户部員外郎𣙜揚州闗税闗截城外漕河舟過無一漏者燾至割河三分之一作便民橋俾小舟徑渡貸其征其巨艦之税符額而止不取餘秩滿歸載麥數舟而已又值嵗饑蠲賑鄉人全活甚衆孫鑑由舉人授沂州知州革規例除耗羡亦以廉名章允賢青陽人嘉靖己丑進士知貴溪成安二縣歴禮科都給事中疏論武定侯郭勛及都御史胡守中不法皆寘重典在廷憚之著有諫議集柯喬字遷之青陽人嘉靖己丑進士官御史出為湖廣僉事時駐節沔陽築江隄數百里立㕓市造浮橋興學校雪寃獄以艱歸補福建僉事備兵海上與浙撫朱紈協力𠞰倭嚴販海之禁因為忌者所中罷歸章時鸞青陽人嘉靖甲午舉人授鄒縣令鄒固劇邑又土荒民逃時鸞勤勞撫字招集流亡勸之耕織而邑為樂土遷兖州同知治河有功舉卓異擢保定知府歴河南按察司副使督築黄河南隄舟居經年中濕乞休歸卒徐紳建徳人嘉靖辛丑進士授蘭谿令以最擢御史巡視畿内屯馬以昌平州地衝民困請永停寄養馬匹疏劾大璫論銓曹積弊語多剴切遷尚寳司卿累官順天巡撫初容城楊繼盛以直諫繫刑部獄紳巡按保定特置産䘏其家人尤多其義畢鏘字廷嗚石埭人嘉靖甲辰進士授刑部主事敭歴中外四十餘年政績炳著累官南户部尚書陳時政忤近倖乃引年乞歸加太子少保九十三卒諡恭介李一元字調卿建徳人嘉靖丁未進士授開州知州遷南部郎累官兵部侍郎江西巡撫所歴皆著勞績而廉潔自持一介不茍時海内有四君子之號推一元為清君子弟一中舉進士歴延平開封推官亦有清名終河南副使施堯臣青陽人嘉靖庚戌進士授蕭山令時浙有倭警蕭山故無城堯臣為創築之城甫完而寇大至邑賴以不陷廉能為一時最擢吏部主事累官順天府尹曹汝良字惟遂貴池人嘉靖壬子舉人授漢川令均徭役定科條興利革弊期年邑大治尋乞歸又同邑柯一鳯由舉人令通山亦以寛惠得民心施篤臣青陽人嘉靖丙辰進士授工部主事歴員外郎出為湖廣僉事累官順天府尹卒於官生平建白奏記萬言立就而根本經術練達時宜朝士咸服其才敏佘敬中銅陵人嘉靖己未進士授武昌府推官屢决疑獄景藩初就封奄䜿恣横於道每以法裁抑擢吏部稽勲主事歴文選郎中所推用皆一時正士髙拱當國嗛敬中素為徐階所重出為廣西叅政遷廣東按察使罷歸陳應期青陽人嘉靖中以貢授永寧知州為政廉恕民信服之鄰州猺有相賊殺者奉檄馳諭皆即解散凱口賊作亂督運六衛軍餉尤著勞績委清各衛屯田盡却例金薦章屢上後乞終養歸湯希閔字孝之銅陵人嘉靖乙丑進士授開州知州繕城隍清徭役葺學校勤耕息訟時民困印馬之累力請除之有權貴居鄉武斷為害按法治之不少貸人稱其毅擢南户部郎柯一鵬字汝程都御史相子嘉靖中以貢知蘆山縣蘆山苗多民少叛服不常前令鮮終任者一鵬撫綏備至苗民畏懐以勞卒官孫楠字木所青陽人嘉靖中以貢授廣昌縣丞有風力嘗驅猛虎擒巨憝禱雨立應邑人為著三異録頌之遷興安令縣新設諸政未舉楠修武備興學校勸民耕墾盜賊屏迹境内大治金天民東流人嘉靖中以貢授蒲臺令居官清介均田平役訓士課農以忤上官罷歸後邑人追思特至其家繪其像以去羅賜祥字應敬青陽人隆慶庚午舉人授掖縣教諭歴遷兵部武庫郎中力清耗蠧出為湖廣按察司副使分守湖北湖北苗民雜處俗悍而用侈賜祥以簡重馭之衆皆讋服王應乾字懐惺東流人隆慶辛未進士授中書舍人擢御史以忤輔臣外轉湖廣僉事平洞蠻有功累遷湖廣布政所莅皆著清惠佘毅中字子執銅陵人萬厯甲戌進士授工部主事治泉南旺為通月河治汶築洸濟以裨運道會黄淮失故道漕河中阻勢逼泗陵毅中署郎中駐中河理徐邳一路塞崔鎮決口築堤一萬二千丈有奇總河尚書潘季馴奏其功實授郎中以瘁卒官贈太僕寺卿吳文梓青陽人萬厯丁丑進士授太常寺博士歴兵科都給事中時倭寇方張在廷議封貢以欵之文梓獨持不可未幾奏捷獻俘特䝉褒賞後以言事忤㫖謫從善典史天啟初褒録先朝建言被斥者贈文梓太常寺少卿著有諫垣草李可芳貴池人萬厯戊子舉人授鄖陽推官以敏練稱遷簡州知州襄陽同知俱有善政其在鄖陽嘗擕池州稬種自給至今人傳為李公黏云王一貞字柱明青陽人萬厯乙未進士授鄒縣令勸課農桑設官荘百餘所以處民之無恒業者嵗大祲賑䘏備至又廣置學田建孟子廟擢兵部主事請停礦税累遷湖廣布政禦苗靖盜選侍衛制藩璫清皇木餘價及裁紙額五十餘萬兩並貯庫充餉劉光復字建初青陽人父織以理學名光復舉萬厯戊戌進士授諸暨令置備賑倉築湖隄七十二所墾田二十餘萬畝擢御史巡按山西大著風采以挺擊事入對慈寧宫忤㫖繫獄光宗立起光禄丞卒贈太常寺少卿鄭三俊字用章建徳人萬厯戊戌進士授元氏令厯遷南禮部郎中出為歸徳知府河決嵗饑興積貯導水利使民墾淤田復故業累擢浙江叅政以忤税監乞終養歸起光禄少卿糾中人之濫攴寺帑者天啟初擢副都御史争紅九移宫二案轉户部侍郎抗疏極論魏忠賢罪被斥崇禎初為刑部尚書以讞獄忤㫖歸復起吏部尚書弟三復官光禄丞亦有清望丁旦字惟寅貴池人以貢授衡州通判却例金祛宿弊復佐守修義學社倉少師事李呈祥私淑王守仁在衡與士人講學不輟督餉至會城以勞卒子紹軾萬厯丁未進士天啟中歴官武英殿大學士羅尚忠字孝可青陽人萬厯癸丑進士歴知平湖建昌二縣置義田築圩岸多著循績擢户科給事中有請復建文年號䘏遜國諸臣疏遷太常寺少卿卒王建和字乾純貴池人萬厯癸丑進士知龍泉桐栢二縣擢南刑部主事歴汝寧知府崇藩䕶衛多驕恣以恩威馭之皆畏服累遷湖廣叅政建和居官清惠剛毅不阿所至有聲未老乞致仕歸徐廷宗字季曾建徳人萬厯己未進士歴荆州廣平推官以明允稱累擢工部郎中監修九陵督臨清磚厰尋遷山東副使備兵臨清以伉直忤上官罷歸劉光謨貴池人以貢授處州通判署篆青田多惠政民無逋賦監造漕艘於杭州計材程功徧恤軍匠擢知養利州致仕吳一元青陽人萬厯中以貢授星子令果敢任事有不便於民者必力争之税監李道所過騷擾一元力與之抗道誣以阻撓國税被逮邑民詣闕申辨得釋卒於家天啟初詔贈尚寳少卿陳久可青陽人以貢授武昌通判理商税不取盈餘時税監陳奉以肆虐激變久可力為調解楚人徳之陳以運字時可貴池人桂孫萬厯戊午舉人令新淦有廉静稱獻賊寇江右諸郡邑多殘破淦獨以堅守得全江大任字是人建徳人天啟辛酉舉人令恩平招集流亡給牛種墾荒田千餘頃革里役屏陋規民咸樂業會寧諸邑山賊勢張甚将犯恩平大任誘降其渠魁衆悉解散新學宫興文教邑士始有登科者遷南寧州牧施承緒青陽人崇禎戊辰進士授應天教授擢南户部主事監倉税以清介聞遷郎中出守漳州稱廉平調南康平彭蠡湖劇盜袁國棟字貞幹青陽人官中府經歴樞輔孫承宗知其才題署永平知府值大兵之後撫戢有方軍民交便巡撫薦監軍河南𠞰流寇八戰皆捷督師洪承疇以國棟久經行陣奏補遼東前屯分練監紀同知守禦松山中流矢卒贈山東按察司副使國朝羅雲逵字逺伯青陽人順治丁亥進士授太谷令多惠政百姓徳之戊子分校鄉闈稱得士汪自潤東流人順治中以貢授綘縣令為政寛平居官九載訟息民安擢行人未赴卒陳鍹字孟起石埭人順治乙酉舉人江陰教諭兵燹後自大成殿明倫堂外不遺寸椽鍹偕諸生經營相度復還舊觀有豪猾欲中傷某生餽兼金三百鍹正色拒之秩滿遷興縣知縣柯仲實字在中貴池人順治中以貢授浙江新城令為政廉静革羡耗以勸輸将無催科之役修文廟創義學擢開封同知嚴設保甲以弭盜賊又濵河設舟以救溺置義塜瘞亡者新城民立祠祀之蘇汝霖字潤生石埭人順治壬辰進士授寧波府推官長於聴斷時大兵征舟山有轉餉功駐防兵與郡民構隙訐訟汝霖以片語折之皆感服擢刑部主事歴遷廣西提學僉事康熙十三年叛帥孫延齡據桂林脅汝霖索印汝霖峻拒之懐印走赴廣督軍前委兼蒼梧道隨軍進𠞰尋又署廣西布政使籌畫軍需以瘁卒官張國柱字斯石石埭人順治中以貢厯唐縣令悉除規例嵗饑盜起賑緝有方民賴以寧遷雲南趙州知州輕刑薄税益勵清節擢户部員外郎徐文烜字龍山青陽人順治戊戌進士授太原令大著循績卒於官章世徳字天彝貴池人康熙壬戌進士授南平令南平素苦里排當役世徳至即除僱役之累後二年值編審凡虚丁悉豁免又地當衝要往来輻輳皆躬親攴應不以擾民又造城外浮橋大葺縣治未幾卒官喪車還日百姓哀號逺送曹文蔚字仙霞貴池人官汝寧通判康熙二十一年楚北兵餘黨煽汝寧文蔚計擒其魁乃悉解散署真陽蘭陽二縣有賑飢修志代民賠河帑諸政以艱歸補徳安通判督修河隄具有經畫江南通志卷一百四十八欽定四庫全書江南通志卷一百四十八人物志宦績十寜池二府寧國府唐羅立言宣城人貞元進士令河陰始築城郭當築處率為豪富所據立言下令畫地使民自築民憚其嚴數旬而畢因設鎖絶汴流姦盜屏息宋李含章宣城人太平興國進士廷試春雨如膏賦太宗稱善敭歴内外循公潔已雅號稱職凌䇿字子奇涇人雍熙乙酉年進士淳化間歴廣南西路轉運使入為户部判官先是嶺南輸香藥用郵卒萬人肩負抵京䇿請陸運至南安汎舟而北止役卒八百大省轉輸之費知廣州廣英路自吉河趨板歩二百里每夏瘴行旅輒死䇿請由英州大源洞伐山開路至曲江為便徙知洪州饒産金販者有禁逮繫滿獄䇿請縱民販市官責其算公私利焉改知益州兩川錢弊多盜䇿請鑄大錢以一當十從之䇿前後仕蜀凡六任真宗嘗謂其治蜀敏而有斷云後以工部侍郎卒梅詢字昌言宣城人端拱進士召試中書直集賢院時李繼遷攻靈州詢請以朔方授潘羅支使自攻取問誰可使者詢請行上壯之為三司户部判官屢陳西邉事論曹瑋馬知節才可用傅潛楊瓊敗績當誅田紹彬王榮等責令自效以贖過後遷給事中知審官院仁宗覽歴代户口登耗之數顧謂侍臣今天下民籍幾何詢對曰帝王恭儉有節則户口充羨賦歛無藝則版圖衰減五季生齒彫耗賴祖宗休養户口葢倍於前矣尋出知許州卒子鼎臣舉進士歴翰林學士上飛白書墨荘二字賜之曰美卿世居文翰之地也楊佐字公儀宣城人舉進士累遷發運判官汴水淺溢不常漕舟不能屬佐度地鑿瀆以通河流京城地勢南下夏苦霖潦佐開永通河以洩溝澮於野外而水患息又議治孟陽河從之後使契丹卒於途趙稹字表微宣城人擢進士第歴遷益州路轉運使真宗令條上蜀中利害一日章數上蒲江縣捕盜不得逮平民楚掠誣服稹行部得寃狀悉縱之仕終禮部尚書卒諡僖質楊璵字器之宣城人天聖進士知袁州衢信二州民争水利委璵決之璵曰衢上流水所自出然衢民頻泄水外河溉不及信争繇之起其著令先衢而後信訟遂平王知微字幾之宣城人慶厯登第僉判賀州鼔鑄嵗増課百萬遷祕書丞知當塗縣時築萬春圩調夫甚急知微請俟農隙部使者不悦既而重之與王安石同年安石嘗問以法度沿革知㣲惟言士去就有命名器非假人物坐是不進用仕終龍川倅劉琦字公玉宣城人博學強覽立志峻潔以都官員外郎通判歙州召為侍御史建言自城綏州數致羌寇宜棄之浙西開漕渠役甚小使者張大其事以功遷官言者論其非詔琦就劾官吏人人惴恐琦但案首謀二人而己汪齊字子思涇人慶厯進士累遷尚書都官員外郎時行青苗免役法齊詣朝堂力言不便王安石曰此法便天下獨公不便爾遂出判池州王平字裔中熙寧進士寧國以制科舉者自平始補韜畧尉邑民與寺僧争水利平曰寺所利者磑碾耳民所資者畝澮竟子民嘗驗毆死者曰尚可生捄之果甦其莅事精敏多類此徐勣字元功南陵人舉進士除桂州教授王師討交趾檄勣從軍大将郭逵逗留不進勣疏於朝逵坐貶後判通州率民築瀕海廢堤民賴其利徽宗立擢寳文閣待制兼侍講帝謂勣臣僚進對惟卿鯁直朕所倚賴大觀二年知太平州入覲極論茶鹽法為民病帝曰不見卿久今日乃聞嘉言加龍圖閣直學士留守南京初蔡京以勣舊事藩邸曲意事之勣不少降節京入輔勣亦終不復用方懋徳字元相南陵人宣和中為武康尉有丐者死或以誣富人沈氏獄已具懋徳辨釋之改令錢塘時郡科磚五十萬懋徳持不可立庭下屹不去卒罷汪汝則字方叔涇人建炎間助平方臘有功帝嘉其能録姓名於屛授紹興府通判歴知信衢二州有惠政時臣僚登對論郡守人才上曰使人人如汪汝則何患不治陳天麟字季陵宣城人紹興進士調廣徳簿嵗饑代郡将為書請部使者得粟數千斛以賑改知襄陽募忠義軍浚古眢河尋知贛州時茶商寇贛吉間麟預為守備民恃以安江西憲臣辛棄疾討賊天麟給餉補軍事平棄疾奏今成功實天麟方畧也孫楙字徳操太平人紹興進士厯判池真郢三州所至以興學節財為務入覲髙宗嘗論公生明上問何以生公曰廉生公又問何以生廉曰儉生廉累遷知温州朱熹稱其愛立而教明古良吏也梅成和字徳修涇人紹興登第調江夏簿徒歩之官時岳飛討楊么於洞庭安撫使劉湜守鄂渚令督軍儲掌箋表多所裨助賊平授太湖令文㮤涇人淳熙進士累官至御史抗疏三上災異事直指權相忤㫖罷歸林宗放字問禮宣城人淳熙進士教授通州學有舊刋三諫集載章惇姦狀時惇孫為守欲去其版宗放不予改知蘭溪邑號大治授廣州通判番禺海舶例有私獻却不受致仕後自號拙軒老人奚士達寧國人淳熙進士教授復州改知績溪簽書淮南判官初達與同舍郎沈渙講習禮經相勉曰曲禮母不敬大學母自欺當終身行之後能不渝其言弟士遜累官至大理卿會韓侂胄死史彌逺議起大獄士遜曰廷尉天下之平侂胄誠姦若加以大逆非所敢知遂忤㫖罷汪晦之旌徳人淳熙進士倅江陵郡郡有三海八櫃恃為險固豪右據以為田晦之力復之時劵法初變晦之乃流通泉幣又築寸金堤以捍江政績甚偉吳淵字道父柔勝子嘉定七年進士丞相史彌逺許為國器欲授官辭以親在當禀命彌逺為之改容尋辟令江東九郡有訟於使者輒請屬淵改差浙東制置司幹辦公事居外艱累詔起復力辭曰事親莫大於送死茍冒哀求榮他日何以事君服闋累進右文殿脩撰適政府欲用兵中原據闗守河淵謂國家力决不能取即取之不能守丞相鄭清之不悅未幾一如淵言差知鎮江厯江東轉運使兩淮流民入境者四十餘萬淵撫而濟之加華文閣直學士歴沿江制置屯田使湖南峒寇蔓入江右袁洪大震淵命将討平之朝廷付淵以光豐蘄黄之事創司空山等三大砦嵯峨山等二十二小砦分立隊伍星聨棊布擢資政殿大學士封金陵侯進爵為公寳祐五年拜叅知政事卒諡敏荘贈少師吳潛字毅夫柔勝子淵弟嘉定十年進士第一歴遷尚書右郎官都城火潛疏言陛下齋戒修省必使國人孚信毋徒減膳撤樂又言與元為鄰當以和為形以守為實以戰為應不宜輕啟兵端其後淮師敗亡皆如潛言端平初求直言潛陳九事忤時相罷後歴官簽書樞密院事封金陵郡侯叅知政事判慶元府條具軍民久逺計積錢百餘萬代民輸帛前後捐逋税五百四十餘萬進封國公後上章劾丁大全沈炎為炎所論劾責授化州團練使循州安置卒徳祐初追復原官贈少師韓元龍宣城人為天台令以徳化民邑遂大治性純孝與弟尚書元吉相友愛俱以文學顯時人比之坡頴焦炳炎字濟甫太平人淳祐進士知袁州奏竄新喻尉楊大明以雪嫠婦之寃後除右正言以言事忤當軸作詩貽知舊云事至諫官言不得身為宰相有何榮遂解職歸方處和字徳修旌徳人調玉山丞罏户黄姓者夜以白金密遺其子處和麾去比歸復以斑竹杖為贐怪其重不受刳杖果納金其中其廉介類此章燾宣城人知蘄州寛平不擾擢提㸃湖南刑獄全州将兵刼守臣為亂燾誅其首惡餘皆諭遣後拜刑部侍郎每議獄傅以經術時推為平允虞儔字夀老寧國人舉進士歴知績溪以廉静著擢監察御史排擊貴近綱紀肅然累官兵部侍郎元貢師㤗字泰甫宣城人奎之子幼師吴澄在太學時路拾遺囊亟追還之泰定四年擢第歴紹興路推官數剖疑獄入翰林預修后妃功臣列傳除吏部侍郎江淮兵起京師乏食詔師㤗和糴浙右得糧百萬歴户部尚書轉漕閩海以鹽引易糧給京師凡數十萬石陳良弼字公輔宣城人少辟憲史有聲除嘉興路教授以廉吏稱調上元簿坐伉直自免後以旌徳尹致仕吴師道稱其才足以濟事辨足以服人知足以自衛衆謂其知言明秦逵字文用宣城人洪武乙丑進士仕至工部尚書議定輪班匠法三年為班更番輸作量地逺近為班次候撥免其徭役工匠便之上以學校為國儲才而士子巾服如吏胥宜更制命逵製式頒行天下戚遜字彦志宣城人洪武中以貢授兵部主事永樂間歴山東叅政嵗饑流移載道請於朝未報輒發粟賑之詔奨賚遷交趾布政芮麟字志文宣城人洪武間為建寧知府嵗饑民困發粟以濟郡有上下闗衛分兵戌守小人倚為姦利商旅苦之麟疏其弊得罷為政寛簡有古循吏風劉希賢宣城人以掾為餘姚主簿性狷介卒於官同僚檢其篋止俸銀五錢帕二方縣為殮其喪歸之丁鎡字永時南陵人永樂中以書法徴入國子監除户部主事出使徐州嘗便宜發倉賑饑土木之變募義勇勤王仕終刑部右侍郎范懋字士勉南陵人永樂間由舉人授河西令遷隰州同知廉明不可犯百姓以包孝肅稱之為立思廉亭貢珊字廷甫宣城人性孝友母疾嘗糞兄病疽吮之正統辛未進士知唐山縣覈清河官地以還民時以佛稱入覲卒於京無以為殮唐山民奔走哭奠争出車錢䕶其喪歸王著字有輝涇縣人由貢士除浙江按察司經歴嘗奉檄巡温州久旱禱雨輒應慈谿多虎為害竭誠禱神比浹旬斃十三虎民遂安吳詔相字廷臣宣城人由鄉薦知汝州不畏彊禦州境肅清左仲輝以字行涇縣人天順進士歴户部郎出知永州時新建藩府王欲闢地仲輝阻之改知彰徳藩府之擾十倍於永咸御以禮法置泉陂二所溉田五千餘畝張綸字大經宣城人成化進士擢御史按真定平鄉令欲増淤田税檄報淤决不常不可遺民患遷大理卿興襄二府争灘地連逮七十二家綸為奏定事遂息改刑部左侍郎推治博野慶成二王獄稱㫖時武宗政柄旁落中官用事綸奏奸黨秦用等當誅連及巨璫疏留中不下因致仕孫昊字曰明南陵人少以文學名督學御史戴珊稱十才子以昊為首成化丁酉鄉舉知海寧縣築堤捍海民賴以安王達字徳孚涇縣人成化進士嘗决鳯陽河南争田之獄又發十三年之盜銀於倉地吏民驚服遷知武昌府斬妖僧繼曉擒妖術道士李孜省立三等九則之法以均田役時守備太監假進貢漁獵細民奏革之湖湘水旱相仍疏罷襄府營建以寛民力年未五十致仕江漢字紀南旌徳人成化進士任户部郎中西蜀旱饑奉詔賫内帑賑之條畫周悉遷寳慶知府首制豪猾不得借勢宗藩區别兵民禁戢流散蠧弊盡革徐説字以中宣城人成化進士歴南右通政嘗册封靖江王資贐甚厚一無所取致仕歸務以忠信先鄉里王葢字舜功宣城人𢎞治進士在諫垣多所彈劾時禁軍横甚至侵掠官物葢請治如法上命榜刻東安門自是少戢陳孜南陵人𢎞治鄉薦任霸州同知清覈宣遼二鎮屯田有能聲陞寧羌知州時川蜀流賊起郡邑殘毀惟寧羌獲全邵道宗字師魯太平人𢎞治舉人任樂陵知縣立保甲保馬法縣境以寧世宗南巡供億糗糧民不病擾調郯城修築沂河馬耳灣諸堤先是馬耳灣下有神蛟據之屢築屢圯乃備牲祭告忽風霧中有物飛騰而去功遂成沂州鑛廢盜賊繼起率土兵平之蕭瑞涇縣人正徳進士授靖安知縣時奉新華林賊起以有備不敢犯擢御史劾兵部尚書王瓊廷論韙之吴大本字性夫宣城人正徳進士知進賢縣有儀賔李貴怙勢殺人論治之擢河南道御史疏論閣臣張璁不職出為廣東僉事决疑獄活趙集等二十三人劉贊字誠夫宣城人正徳鄉薦知肥城蝗不入境移判成都行之日民悲啼勒石道傍云劉侯與赤子泣别處趙象字惟賢太平人正徳問以貢知慶雲縣擢桂陽州清節甚著嘗曰秩俸外錙銖皆是賕私人服為格言張本宣城人正徳時為開封推官正直方嚴動必循法歸家無餘貲鄉人重之汪堅字子固旌徳人正徳進士為刑部郎中按郭勛恃勢恣横諸不法狀輦轂肅然歴任河南叅政致仕歸田産不加益焉姚本旌徳人嘉靖舉人知汾州與總制曾銑計復河套忤執政改知獨山州土賊蹂躪本畫䇿守禦咸中機宜徐元氣字汝和宣城人嘉靖進士由刑部員外出守成都出枉獄四十八人築灌縣石堰歴遷雲南右布政會土官岳鳯亂條上𠞰撫䇿躬督芻餉事平遷山東左布政東省巨室優免溢額民苦賠累元氣悉清覈之仕終通政使徐元太元氣弟嘉靖進士為吏部主事分校禮闈時張居正怙勢其子弟就試主司相戒勿遺元太摘其紕繆置之弗録左遷山東叅政居正疾巡撫藩臬禱於岱元太獨不徃幾中危法會居正沒遷順天府尹時蜀中賊黨擁衆入平裔堡西南大震命元太巡撫四川太至指授方畧破砦三十五斬首二千餘級賊惶怖乞降遂築城黄沙壩以控扼諸羌明年建越馬湖等復大逞元太悉討平之以功進兵部右侍郎陞南刑部尚書乞歸沈寵字思畏宣城人嘉靖鄉薦授行唐知縣民不諳織絍寵為造機杼教之御史按部至寵厨傳省約澣已所用帷帳以進御史賢之擢御史遷湖廣兵備平九隆灣劇賊鄭翦等遷廣西叅議歸里嘗主講席稱古林先生梅守徳字純甫宣城人嘉靖進士授台州推官台臨海強族多闌出中國貨姦民互市鈎致倭寇守徳按治之乃安擢吏科給事中時輔臣嚴嵩威虐朝士周怡楊爵劉魁以忤繫詔獄守徳作三君詠寄之府尹胡奎因嵩戚驟遷力疏其貪狀方士徐可成與嵩比以禱祀為太常卿又屢疏駁之嵩銜之時兩浙倭熾命出知紹興府守徳繕城蒐卒均田核税民稱便尋督山東學政世宗令陶仲文祈年㤗山陶怙寵千請斥之弗為禮遷雲南叅政以母老不赴歸建書院講學世稱宛溪先生徐楠字任之宣城人嘉靖舉人知耒陽縣振興文學同知撫州躬負畚鍤築千金坡撫人為建祠坡上繼攝郡事有御史居家不法楠按治之為其所嗾免歸子鴻起領萬厯鄉薦歴遷衡州知府耒故衡屬也郡人祠祀之題曰父子濟美孫濬字宗禹宣城人嘉靖進士由永豐令入為給事奏論趙文華希相臣嚴嵩意上怒調孝感丞歴知平陽府唐汝迪字吉甫宣城人嘉靖進士任司勲郎以忤嚴世蕃出知雷州雷濵海倭一夕突至急登陴授兵城賴以保擢河南治河副使河决崔家口有議開復舊河者上書言不便状議乃寢殷登瀛字子登宣城人嘉靖進士知海寧縣期月宿逋盡清案無停牘擢户曹𣙜闗作浴心亭以自況仕終金華府所至有清譽趙睿字若思涇縣人嘉靖進士擢御史屬巡視十庫適庫璫報車駕幸西土門觀獅子請暫避睿正色曰臣備員執法職在補過拾遺主上来正宜班侍何避為璫惶恐馳奏上即歛轡徐還其見憚如此屠羲英字淳卿寧國人嘉靖進士授户部主事歴陞南祭酒訓飭有條張居正禁講學英曰官可一日便棄學不可一日不講㑹講不輟居正奪情卿貳連牘保留英曰朝廷可無居正居正不可無母擲筆不署秩滿當遷上曰屠羲英不愧士楷當令久掌成均御書春風化雨蔚為人宗八字賜之汪泓旌徳人嘉靖舉人知阜城縣郡募軍派阜城買馬二百匹泓力争得免尋守薊州薊鎮冒虚餉十餘萬泓按册稽實士馬飽騰陞屯田都水員外郎築中州齧堤漕艘以濟晉南安守乞歸周希旦字汝魯旌徳人嘉靖進士由推官擢御史首疏崇正學養聖躬時新鄭恃宫僚舊恩當國專恣希旦論之轉應天府丞時苦旱疫希旦兩疏請賑得發金二萬賑之周怡字順之太平人嘉靖進士授順徳推官肅宗南狩道出順徳徴發萬計並賴怡指畫減費十之三擢吏科給事中時相臣嚴嵩翟鑾冢宰許讚積有隙怡謂大臣各持意見非國之福言甚剴切詔廷杖下錦衣獄尋因箕仙言釋之閲月復被逮二殿災又釋之怡方介峻潔累躓彌堅海内薦紳望之如祥麟威鳯後遷太常少卿卒諡恭節崔涯字若濟太平人學術純正嘉靖中進士擢御史糾劾不避權貴上目為真御史視鹺河東嵗大祲疏發鹽課數十萬以賑之繼按福建糾一墨吏聞風去者七人陳山海十二䇿悉中利弊亢旱親禱霖雨周渥時謡為御史雨尋以劾冢宰汪鋐忤㫖被斥許汝驥字徳卿寧國人嘉靖進士仕户部郎中值畿輔大饑請發太倉出賑轉職方相臣嚴嵩私仇鸞欲越次敘功堅執不可奉勅監視薊鎮軍實單車詣薊按區核實無所隠冒鎮帥張承勛恃援作勢驥卻其重餽尋極言其貪黷不法狀並劾督撫諸臣不任節制上為動容仕終河南副使生平檢身窒欲常若不及書座右曰居處常嚴帝鑒行藏可對人言子成器仕至辰沅兵備周懌字信之太平人少師鄒守益究心理學以嘉靖嵗薦授易州同知視事勤敏設釡甑於㕔事外訟者晨炊竟即剖决發歸嘗出一寃獄其人徳之刲豕以饋中實以金懌叱遣之焦煜字伯升太平人嘉靖進士歴遷浙江按察僉事所部多白役肆虐煜盡加裁抑一日偕僚佐出有瞽婦赴愬大呼孰為焦青天者同官有愧色海寧鹽池瀕海患潮檄守令築石堤七百餘丈立陡門四以時瀦洩至今賴之徐大任字重夫宣城人隆慶進士授工部主事嵗汰水衡冗費數十萬緡𣙜税真州力免宣船囘空遞役之苦歴官中外皆以廉稱神宗謂其清節為天下第一詹沂字浴之宣城人隆慶進士授新建知縣擢給事中宰臣張居正奪情議起南省臣具疏乞留沂獨不署名歴陞左副都御史會勘妖書獄力止株連咸寧令滿朝薦以事忤璫被收沂固請得釋楚藩之變陳善後事宜凡親王違制撫按皆得以白簡從事乞増入勅内從之嘗值除夕上謂左右曰此時廷臣受外覲官書帕開宴打閙惟副都詹沂清寂可念累疏乞歸不可遂解組出國門候命上優許之明大臣挂冠自沂始郭忠信字希曾與兄忠貞並寧國諸生從羅汝芳講學耿恭簡督學南畿求實學篤行之士合十四郡得十一人忠信兄弟與焉隆慶三年用恩貢判辰州忤時相謫婺源教諭以八條造士人稱梅井先生蕭彦字思學涇縣人隆慶進士擢禮科給事中歴户垣疏凡數十上無不闗切時政又言察吏不宜以催科為殿最有司憚考成必重以敲扑民力不勝流亡隨之寛一分民受一分之賜上納其言轉都御史撫貴州鄖陽總督兩廣晉户部侍郎卒諡定肅歴官二十餘年立朝多讜言其在黔則破擒巨逆平其砦在滇則靖亂兵折驕帥杜暹羅之請四任開府恩威並著弟雍仕廣東按察司宦績亞於彦而學過之時稱二蕭許夢熊南陵人隆慶進士知福清縣縣經倭亂夢熊恤民恵商築堡興學士民尸祝焉時葉向髙以童子被試一見許為宰相器又識林茂槐李多見後皆登顯仕時號人倫氷鑒終南兵部主事貢靖國宣城人萬厯進士授刑部主事時張居正相欲周内其所憾者令其子以通家刺投謁且以銓地餌之靖國還其刺曰誤耳原無世誼也力争之事得白有大猾當坐賄御史匿不為理靖國復力争之尚書前卒抵法秩滿陞福建泉州府拊循有法七邑大治再陞浙江鹽運使會塲官作姦為鹺院所庇遂投劾歸囊槖蕭然嘯咏不輟趙健字行吾涇縣人萬厯進士由刑曹知辰州教民紡績政清刑措歴貴州布政時苖播相繼竊發撫御有方羣醜賔服終南太僕卿張守道字岸先宣城人萬厯進士授户部主事視南徐倉會中使採木過徐役民助輓甚困守道為捐倉羡以代徭任武選員外朔望必禮楊忠愍祠魏閹方熾守道毅然乞南得南太常後轉工部侍郎卒守道性孝友嘗破産以急兄難母卒廬墓三年虎繞其墓不去蔡逢時字應期宣城人萬厯進士知海鹽縣履畝均徭築海塘禦潮患遷祠部郎議藩封禄制著為令為温處兵備斬倭七十餘級轉河南叅政築沁堤戢禹州巨盜仕終四川布政卒後有海鹽人十餘輩来哭墓下去麻溶字明之宣城人萬厯進士歴吏部郎時私謁干政溶抗疏言政府侵銓臣之權臺省伺政府之意銓法日壊坐是出為冀南叅政稍遷河南右布政卒梅守相字台甫宣城人萬厯進士授工部主事𣙜夏鎮陳泇河利運状遷郎中董其役身歴塗潦冒艱險閲九載績成以二百六十里之泇避黄河險三百三十里仕終按察使弟守極萬厯鄉薦知安吉州疏濬水道因名梅溪終南户部員外守峻進士為吏部郎徧諸司疏壅滯清流品仕至陜西叅政守和進士由禮部督學河南嚴抑奔競歴陞廣西叅政葉煒字文光宣城人萬厯進士為餘姚令歴河間守餘姚有汝氿牟山諸湖及海壖地為豪家所侵煒清復之並作堤堰民得免旱澇憂任丘有殺人者倚叔中貴冀緩死竟論抵罪遷紹寧兵備致仕徐夢麟字惟仁宣城人萬厯進士知河南府改登州屬吏有忤璫者懼不免力為直之仕至南太僕少卿嘗自咏曰平生宦况猶江水日對青山夜讀書徐汝正宣城人萬厯舉人除西鄉知縣時瑞藩封漢中道西鄉驅民夫牽挽不勝驛騷汝正操小艇懐牋謁王為民請命風作舟溺求屍三日始得之邑民環哭立祠祀焉徐騰芳字雲卿宣城人萬厯進士厯遷九江同知桑落洲崩潰蘆課無出議請崩者蠲荒者減州民徳之遷知真定陞易州兵備擒賊黨于𢎞志等破其衆六千人終陜西叅政髙維岳字君翰宣城人文學優長領萬厯鄉薦仕雷州推官尋署瓊州會礦徒竊發鈎倭入寇維岳伏兵擊破之轉鞏昌郡丞督餉臨洮招番人置近甸邉賴以安遷興國知州興國故苦柯潭二賊維岳至郡立擒其魁當事忌其功投劾歸梅鵾祚字仲舉宣城人萬厯進士由庶常改御史會鄭貴妃有寵受封時王恭妃生皇太子三年而封不與鵾祚請進王妃以定國本朝論韙之都御史海瑞謂臣工貪墨當用國初重刑鵾祚力諫得寢又疏言錦衣衛多中官私人語少侵上上怒曰鵾祚少不諳事姑罰俸尋出按西粤卒於道戴新字浴日南陵人萬厯進士由工曹知寧波府櫛剔諸弊吏皆憚其嚴正郡瀕海數苦倭寇新造船治械防禦甚周終湖廣武漢道仙克謹字仲恒寧國人萬厯進士知隆平縣時苦旱捐俸給民穿井七百有二十民立石識之曰仙井尋調建安會水患多漂溺築隄建橋民困以濟轉山西兵備邉事孔棘克謹指揮防禦敵五載不犯境特陞山西巡撫梅綿祚字公衍宣城人萬厯鄉薦歴遷户曹密雲兵乏餉力言於主計者通他儲以濟軍得無譁知栁州撫猺獞多惠績顔文選字巽之宣城人萬厯進士知江夏縣擢給事中在諫垣十一月疏十三上其請建國儲疏尤激切以敢言外謫後追贈光禄少卿劉有源南陵人萬厯進士将之官出已分田給伯仲曰我幸沾薄禄此産可共也為御史有用人措餉二疏言甚切至嘗收治東城大猾中貴為解不聴時稱其執法仕至江西按察使葉永盛字子木涇縣人萬厯進士擢御史巡鹽浙直中使劉成来𣙜税商竈震懾盛奏之疏詞剴切上悟不直奄巡按江西奄寺黨連武弁有獻店設𣙜之議盛抗疏請斬宵人議遂罷居御史九載疏數十上直聲震中外累陞太僕寺卿永盛少孤里人侵其地既貴而歸之永盛曰孤而見奪貴而歸之吾不為也若自今無侮孤寡可矣鄉人有坐仇陷大辟者奉數百金乞援盛麾之去而陰為營救得脱趙士登字應庸涇縣人萬厯進士知黄岡縣時行清丈法登經界畫一豪強憚之吏舍夜火延及囹圄諸囚蒲伏庭下曰吾屬罪應死不敢逋逃為明府憂擢御史廷議以河決請加賦登力持不可仕終南吏部侍郎吴尚黙字元垣涇縣人萬厯進士知義烏縣擢御史出按蜀奢崇明作亂會督撫合謀翦滅之尋按粤東控扼海寇得以無事崇禎時以疏救錢龍錫謫守承天時流寇大擾檄練鄉兵三千以備守禦築堤數十里溉屯田勤勞九載量移武昌陞本省右布政卒趙士際字維行涇縣人少強學嘗以磚為警枕領萬厯鄉薦知洛容縣尋調宣化創建城池擢知羅定州州初歸版規畫拊循民皆悦服子不盈行誼敦睦喜讀周邵書蕭良幹字以寧涇縣人弱冠慕王文成良知之學成進士授户部主事𣙜税崇文河西斥羨金不取遷紹興知府修三江牐築海塘復稽山書院厯陞陜西左布政裁抑礦税二璫歸里復割腴田二百餘畝為義田以贍族黄一騰字仲昇寧國人萬厯進士知完縣多盜騰舉行保甲講律令兩月俗大革調知南昌有虚丁虚米為民累騰力為清覈時税璫潘相勢甚驕横至縶辱宗室騰數其過使引謝潘怒撼以危言騰蔑如也省親歸讀書瞿硎故址自號問瞿以見志張星字文宿宣城人以貢知館陶置倉備賑擢河間同知調天津減衛軍丁錢定為例以不肯伏謁中使免歸汪若極字子無旌徳人泓之子萬厯進士知浙江仁和縣仁省㑹之地催科甚煩若極設易知單法悉汰羨餘民輸将恐後其平反疑獄雖成案多得開釋屢觸直指怒弗顧也陞福建道御史甫入臺即疏上六事其止内操一條觸璫忌出按粤西㑹有旨責成撫按措銀一十五萬部檄如雨若極䟽入得免餉十萬民力以紓仕終太僕少卿崔師訓字惟承太平人萬厯進士任户部主事監税易州清介自持仕至福建叅政郭建邦字爾立旌徳人天啟進士仕行人值魏璫煽虐告歸璫敗乃起擢兵科給事厯遷通政適户部以兵餉孔亟檄加山税建邦力言得免遷太僕卿捐俸買馬佐軍陞順天府尹又捐俸助修城河仕至工部侍郎鍾震陽字百里宣城人崇禎癸未進士知山陰縣築塘捍海部民為之立碑徐律時字乾若宣城人崇禎庚辰進士知膠州清介自勵時土寇訌發親率州人防禦民得安堵劉維仁字孔安宣城人崇禎甲戌進士厯知錢塘鉛山魏縣潔已愛民遇亂歸絶意仕進日午不炊晏然髙臥項如皋字孟凱太平人崇禎丙子舉人特授刑部主事時黄道周忤㫖皋撰疏救人皆為咋舌皋曰聖怒不測自當之疏上得釋卒於官國朝孫襄字惠可宣城縣人明季進士順治元年授刑科給事中時諸司決獄以意輕重襄請議定律令使内外曉然於畫一之制明年遷吏垣請定計典勵官守前後疏多嘉納嘗請免寧郡貢黄連郡人賴之胡尚衡字階平涇縣人幼穎異順治壬辰進士以工曹司𣙜務尋擢兩浙提學識㧞多名士仕終荆南道張鳯徵字威鳯宣城人以抜貢授陵水知縣始至裁里甲集流移三十九峒悉聴約束復構學宫於兵燹之餘以卓異徵會卒秦才管字尾仙南陵人與兄仁管同登順治壬辰進士官户部郎中司𣙜蕪湖力省苛稅便賈舶陞陜西提學慎簡寒畯㑹聞父母喪號慟而卒諸僚斂金歸其匶洪啟槐字庭植寧國人順治間進士授南江知縣南江荒殘槐招流亡平徭役民間以軍需故鬻子女啓槐捐俸贖之厯仕至貴州提學汪觀字顒若宣城人順治乙未進士知湘鄉縣下車即申復廢站蘇驛困興絃誦賑饑民未幾以母艱哀毁卒施閏章字尚白號愚山宣城人博綜書籍善詩古文詞順治己丑進士為刑部員外讞決明敏督學山左有氷鍳之譽轉湖西道叅議湖西故荒瘠多盜閏章撫綏有方袁臨間稱之為施佛子康熙己未以愽學宏詞薦改授翰林侍講纂修明史以勞瘁卒閏章性仁孝事季父譽如父廣置義田以贍宗戚篤窮交勵後學人咸奉為楷模鍾無瑕字缺如宣城人順治間以抜貢知汜水縣縣里賦不均無瑕以熟地六分荒地四分為一里併强弱而均之賦乃平補富川縣縣多盜無瑕誘致其豪斃於獄境始寧力除賦羨並完前令積逋邑稱治陞知光州卒阮士鵬號巖山宣城人順治中舉人知海豐縣時海寇嵗逼瀕海者皆内徙士鵬晝夜勞瘁葺屋居給牛種民甚賴之碣石衛蘇利之變士鵬詗得其狀宻白幕府得豫為備及大師進討芻粟供億一以整暇應之賊平量移許州治績甚著梅欽宣城人順治間知崖州時用兵後井邑蕭條欽勞来拊循流民襁負来歸康熙元年請豁荒米及軍屯米二千石有奇在任七年多惠政沒於官洪啟權字玉衡寧國人順治間進士授安福令清宿逋絶賄賂時山民為亂殺前令上官發卒𠞰之啟權單騎往縛其首餘黨悉安以清直不容於大吏歸家後薪米不給日持一卷書吟咏大櫟間自號櫟園子阮爾詢字于岳康熈壬戍進士由翰林為御史屢有建白仕終工部右侍郎先是寧郡輸賦者率為吏胥中飽民苦無所據以自直爾詢白當事行三連串法至今便之梅鋗字爾熾宣城人康熙丁未進士知太平縣多惠政歴仕御史中丞巡撫福建聖祖親書攄誠信三字賜之鋗入關從行不過十人嘗疏請積穀備賑未久遇嵗饑便宜平糶以濟之仕至左都御史致仕歸劉楷字子端南陵人少孤鞠於母趙登康熙乙未進士授中書舎人典福建試得人稱盛丙午考選御試擢置第一歴刑户二科給事中疏論督撫保舉學臣及河工保題官員之弊又請杜師巫邪術禁小說淫詞指陳深切聖祖嘉納施行又密具相臣柄政冒死糾叅一疏疏上如奏罷斥輦下肅然累官光祿卿致仕歸杜門著述捐置義田以贍族人陵邑人文日盛白諸當道闕學為大學邑人士徳之子應熙仕為夀陽知縣亦以孝友知名方仲字佐平南陵人康熙己未進士由翰林為户部郎出知登州潔已率屬嘗以旱蝗禱於蜡社蝗盡赴東海死後徙汀州知府箐峒皆服其徳化郡地蛟發山水髙十餘丈民哭聲震逺邇伸齧指血疏告城隍神水立退會移疾歸送者至二百里猶不忍别子士珣有文名雍正癸夘舉人孫斌字淑獻南陵人以武進士為福寧州遊擊康熙甲寅耿逆反以書招之斌斬其使密報督撫耿逆怒拘之興化賊平奉㫖優叙遷䕫闗副將繼母歿求解任許之武臣丁憂自斌始池州府宋樊若水字叔清貴池人舉南唐進士不第謀歸宋獻平江南䇿請造浮梁濟師太祖從之歩兵渡江如履平地既克池州即以若水領州事擊敗三砦之據險未服者歴遷右諫議大夫太宗命改名知古採其議廢江南鐵錢為農器給流民之歸版籍者仍鑄銅錢以便民用出為成都轉運使改河北卒夏中正貴池人嘗仕南唐及入宋知貴池縣以鄉黨非威刑所宜施每聴訟輒隨其曲直諭之人咸悦服自相戒飭無有犯者擢職方員外郎告歸卒孫噩舉才識兼茂科知長洲縣以直罷文彥博奏復其官胡舜元字叔才銅陵人舉嘉祐四年進士歴徳興鄭二縣令遷著作郎少與王安石友善及安石執政行新法舜元以書規之有懐利事君貪利害民語遂乞致仕孫棣舉進士官兵部郎中李植字公立建徳人登進士第歴官湖北轉運判官入為尚書度支郎孤忠自信不屑依阿取容坐元祐黨擯不用檀固字以忠建徳人登熙寧三年進士第紹聖間官尚書時悉改元祐之政固上書極言朝廷罷吕大防蘇軾范純仁用章惇曽布蔡卞去三賢而進三凶此天下治亂之由也書奏免官及蔡京為相遂不復進用張漣字伯器貴池人以能理繁劇稱初令數大邑歴守鳯翔以事忤蔡京徵至京卒鍾鏜字徳振銅陵人登元祐六年進士第授旌徳主簿厯知汀州入仕五十餘年所在以廉惠著稱檀宗益建徳人哲宗時詔諸州行三舍法取士宗益備陳考校升選之制從之授國子學録子倬登大觀三年進士第歴官徽猷閣待制湯允恭貴池人登宣和六年進士第通判常州常素難治允恭以訓誡先之俗漸以化適鄰州有叛兵及境親往其營諭以禍福寇即解去州城獲全遷刑部員外郎能平政寛獄擢殿中侍御史紹興間官至侍郎湯巖起貴池人登乾道六年進士第知營道縣以廉稱嘗自朂曰清而死豈不愈於濁而生耶秩滿歸以薦起判徽州尋又奉祠歸里葉楠字元質貴池人登乾道中進士第為鄱陽尉值嵗潦楠力請蠲租賑之後令績溪多惠政邑人歌之曰前有蘇黄門後有葉令君蘇黄門蘇轍也因重楠故以轍比之所著有知非集程九萬字鵬飛青陽人登淳熙二年進士第初知武康縣以政績卓越内擢歴司農簿太府丞奉使兩淮改鑄鐵錢具有規畫出知和州擢華文閣待制襄陽安撫使封青陽縣開國公著有九華詩百篇子松舉進士歴官同知樞密院事鄭舜臣建徳人紹定中江西寇猖獗趙范知池州聞舜臣賢牒充民兵副将防守江淮又嘗董軍饋輸財助用為朝命所褒阮麟翁字祥翁銅陵人登景定三年進士第初授京山尉歴建徳路總管任封疆修耕戰以功名終明徐謙青陽人洪武中以貢授臨江府推官遷户部郎中督漕運於濟淮甚著勞績特擢太僕寺少卿潘伯庸銅陵人洪武中由貢選授御史言事侃直不避權要厯河南廣東山西按察使並著清節陳敬宗貴池人洪武乙丑進士授刑部給事中永樂初論時政謫鄞縣丞後以直諫死佘可才字國器銅陵人永樂癸未舉人官襄陽訓導詣闕請試繁劇留試事工部復奏官不必備得人為本成祖嘉納之以薦擢吏部主事扈從北征至興河奏事稱㫖凱旋預褒賞歴郎中署堂事清選法革吏弊遷南通政司左通政鄭景曜字拱南建徳人永樂甲申進士授御史蹇諤盡職出按山東再按遼東有元時故吏儲欽巫愷等為奸利有司不敢問景曜捕治之擢貴州叅政命偕巡撫廉察官吏吏治肅清湖廣筸子坪苗亂奉勅監軍進𠞰苗平俾久任後以年老乞休致柯進字啟暉建徳人父彦斌洪武中以薦歴臨安令有善政暹領永樂乙酉鄉薦預修永樂大典擢户科給事中以直言謫官仁宗即位署永新吉水二縣皆大治楊士奇等交薦之特擢浙江按察使暹初以建言著聲浙人多憚其威名及至持法平允不尚苛察所部皆畏懐之丁艱歸復起滇皋佐靖逺伯王驥平土酋思機發之亂致仕歸里子薰由貢令霑化安鄉二縣亦有廉平之稱江得東流人永樂中由貢選授御史以剛直稱遷按察司僉事檀凱字伯和建徳人永樂壬辰進士時新定貴州選有才能者往官其地凱預選為思州府通判至官為孚恩信陳禮義適諸苗寨互相攻擾凱加意撫輯得不擾境滿九載當遷思民詣闕請留宣宗初即位方鋭意綏逺特加凱正五品俸命還任後擢應天府治中思民涕泣攀送遷府丞致仕吳賜貴池人永樂壬辰進士歴河南按察司僉事以敢言改御史抗疏忤㫖下獄卒江通建徳人永樂中以貢授鞏縣令招集流民俾復故業河南旱飛蝗遍他縣不入鞏境郡守異之調通捕蝗孟津通往齋沐禱於神蝗悉去事聞於朝加俸一級命久任滿九載以老乞歸邑民立祠祀之胡本惠字益之銅陵人永樂庚子舉人授户部主事歴員外郎出知南昌府有善政遷陜西叅政累擢右副都御史巡撫遼東莅軍持重邉境以寧俄召入為左副都御史致仕歸本恵有徳量時稱長者舒仲誠貴池人以貢授東光訓導遷萬載令政尚嚴明招徕逋竄擢御史成祖北征仁宗以皇太子監國仲誠言事嘗忤睿㫖出為湖廣副使卒檀觀東流人宣徳中以貢授永州令以廉静治三載當遷民歌曰食惟檀衣惟檀檀公去我飢寒詣闕請留又三載當遷民復乞留滿九載以治行最擢雲南按察司僉事不赴歸囊止一石人號之曰清白石云孫仁字世榮貴池人景㤗辛未進士授户部主事督畿内糧儲監通倉盡釐夙弊出知西安府大兵討固原叛羌仁有轉餉功遷陜西叅政鑿涇陽洪口堰引水溉田永為民利累擢右副都御史巡撫四川平松潘黒虎砦賊及茂州巴豬等砦蠻相地險要設立州縣以控制之入為户部侍郎乞致仕歸陳孟晟青陽人景泰甲戌進士授評事累遷雲南按察司僉事居官廉慎自勵理獄多平章廷珪銅陵人天順己夘舉人授興國令清恵得民心秩滿輒請留任至九載遷武昌同知邑民追思立祠祀之張廷瑞貴池人天順壬午舉人授龍泉令治邑如理家政纎悉畢舉生民樂業擢御史清理屯田盡革中璫侵占之弊軍屯感徳屢條奏時政有聲憲臺陳輊青陽人天順甲申進士授南刑部主事折獄平允歴福建按察司僉事備兵漳州有宿寇據山谷時出刼掠輊以兵深入殱其根株而身犯瘴毒卒於軍事聞給𫝊歸其櫬遺槖惟圖書數卷吳必顯字徳純石埭人成化丁未進士授泰和令以勤莅官案無留牘邑有權貴數輩素恣横憚必顯悉歛跡屢遷岳州守張輝字藴之石埭人𢎞治庚戌進士授南禮部主事以言事謫光州同知累擢福建僉事復以介直忤劉瑾勒令休致瑾敗廷臣交薦以老不出為晉一階予誥命周冕字尚文貴池人𢎞治庚戌進士授南户部主事遷員外郎監税鳯陽一清積弊又奉命至江西督理糧儲得實糧四十萬石以濟邉餉詔旌之李嘉祥字時鳯貴池人𢎞治丙辰進士授北直開州知州剔奸祛弊動中機宜吏民畏服州城北舊有淫祠拜謁最盛嘉祥至立毀之巫風遂絶擢南户部員外郎督賦蘇州卒性慷慨喜論事嘗具疏語侵權宦人尤壮之桂鏊字用之貴池人𢎞治戊午舉人正徳中授廣信府同知時宸濠蓄逆謀陰結山中三巨寇鏊廣設方畧以次𠞰平之嘉靖初補栁州府同知從總督王守仁平思州斷藤峽以功擢知思恩府興文講武民猺帖服後致仕歸郡人祠祀守仁奉鏊配焉許潛貴池人𢎞治己未進士授行人選御史剛直不阿嘗監内庫中貴憚之汪珊字徳聲貴池人正徳辛未進士授御史嘉靖初論新政十事及請開言路疏時皆服其敢言出為河南副使累擢右副都御史巡撫湖廣復以言事落職會貴州都匀苖亂廷推起珊往平之召為南大理卿終户部侍郎珊清介自持卒之日囊無遺貲李崧祥貴池人正徳甲戌進士授户部主事歴山西按察司副使備兵潞安遷河南布政司叅政将行適上黨青羊山賊作亂撫按以崧祥有辦賊才特留總四道兵入山𠞰賊賊平議析壺關等縣地置平順縣以扼山之要害得㫖允行累遷四川布政使時世廟多營建蜀民困採木之役崧祥入覲抗疏止之因忤用事者致仕歸值嵗饑即解束帶鎔金購穀徧賑鄉人柯相字元卿貴池人正徳丁丑進士授永新令宸濠反巡撫王守仁與吉安知府伍文定從上流舉兵討賊相亦集其邑兵從而身自居守濠平守仁欲敘相功辭不受歴吏科給事中劾去官邪數十人累擢右副都御史巡撫陜西築皋蘭邉牆三百里墩臺相望邉警以絶改撫河南又遷督兩廣不赴歸孫之来以理學著柯燾字光庭建徳人正徳己夘舉人歴臨江南昌二府推官折獄俱稱平擢南户部員外郎𣙜揚州闗税闗截城外漕河舟過無一漏者燾至割河三分之一作便民橋俾小舟徑渡貸其征其巨艦之税符額而止不取餘秩滿歸載麥數舟而已又值嵗饑蠲賑鄉人全活甚衆孫鑑由舉人授沂州知州革規例除耗羡亦以廉名章允賢青陽人嘉靖己丑進士知貴溪成安二縣歴禮科都給事中疏論武定侯郭勛及都御史胡守中不法皆寘重典在廷憚之著有諫議集柯喬字遷之青陽人嘉靖己丑進士官御史出為湖廣僉事時駐節沔陽築江隄數百里立㕓市造浮橋興學校雪寃獄以艱歸補福建僉事備兵海上與浙撫朱紈協力𠞰倭嚴販海之禁因為忌者所中罷歸章時鸞青陽人嘉靖甲午舉人授鄒縣令鄒固劇邑又土荒民逃時鸞勤勞撫字招集流亡勸之耕織而邑為樂土遷兖州同知治河有功舉卓異擢保定知府歴河南按察司副使督築黄河南隄舟居經年中濕乞休歸卒徐紳建徳人嘉靖辛丑進士授蘭谿令以最擢御史巡視畿内屯馬以昌平州地衝民困請永停寄養馬匹疏劾大璫論銓曹積弊語多剴切遷尚寳司卿累官順天巡撫初容城楊繼盛以直諫繫刑部獄紳巡按保定特置産䘏其家人尤多其義畢鏘字廷嗚石埭人嘉靖甲辰進士授刑部主事敭歴中外四十餘年政績炳著累官南户部尚書陳時政忤近倖乃引年乞歸加太子少保九十三卒諡恭介李一元字調卿建徳人嘉靖丁未進士授開州知州遷南部郎累官兵部侍郎江西巡撫所歴皆著勞績而廉潔自持一介不茍時海内有四君子之號推一元為清君子弟一中舉進士歴延平開封推官亦有清名終河南副使施堯臣青陽人嘉靖庚戌進士授蕭山令時浙有倭警蕭山故無城堯臣為創築之城甫完而寇大至邑賴以不陷廉能為一時最擢吏部主事累官順天府尹曹汝良字惟遂貴池人嘉靖壬子舉人授漢川令均徭役定科條興利革弊期年邑大治尋乞歸又同邑柯一鳯由舉人令通山亦以寛惠得民心施篤臣青陽人嘉靖丙辰進士授工部主事歴員外郎出為湖廣僉事累官順天府尹卒於官生平建白奏記萬言立就而根本經術練達時宜朝士咸服其才敏佘敬中銅陵人嘉靖己未進士授武昌府推官屢决疑獄景藩初就封奄䜿恣横於道每以法裁抑擢吏部稽勲主事歴文選郎中所推用皆一時正士髙拱當國嗛敬中素為徐階所重出為廣西叅政遷廣東按察使罷歸陳應期青陽人嘉靖中以貢授永寧知州為政廉恕民信服之鄰州猺有相賊殺者奉檄馳諭皆即解散凱口賊作亂督運六衛軍餉尤著勞績委清各衛屯田盡却例金薦章屢上後乞終養歸湯希閔字孝之銅陵人嘉靖乙丑進士授開州知州繕城隍清徭役葺學校勤耕息訟時民困印馬之累力請除之有權貴居鄉武斷為害按法治之不少貸人稱其毅擢南户部郎柯一鵬字汝程都御史相子嘉靖中以貢知蘆山縣蘆山苗多民少叛服不常前令鮮終任者一鵬撫綏備至苗民畏懐以勞卒官孫楠字木所青陽人嘉靖中以貢授廣昌縣丞有風力嘗驅猛虎擒巨憝禱雨立應邑人為著三異録頌之遷興安令縣新設諸政未舉楠修武備興學校勸民耕墾盜賊屏迹境内大治金天民東流人嘉靖中以貢授蒲臺令居官清介均田平役訓士課農以忤上官罷歸後邑人追思特至其家繪其像以去羅賜祥字應敬青陽人隆慶庚午舉人授掖縣教諭歴遷兵部武庫郎中力清耗蠧出為湖廣按察司副使分守湖北湖北苗民雜處俗悍而用侈賜祥以簡重馭之衆皆讋服王應乾字懐惺東流人隆慶辛未進士授中書舍人擢御史以忤輔臣外轉湖廣僉事平洞蠻有功累遷湖廣布政所莅皆著清惠佘毅中字子執銅陵人萬厯甲戌進士授工部主事治泉南旺為通月河治汶築洸濟以裨運道會黄淮失故道漕河中阻勢逼泗陵毅中署郎中駐中河理徐邳一路塞崔鎮決口築堤一萬二千丈有奇總河尚書潘季馴奏其功實授郎中以瘁卒官贈太僕寺卿吳文梓青陽人萬厯丁丑進士授太常寺博士歴兵科都給事中時倭寇方張在廷議封貢以欵之文梓獨持不可未幾奏捷獻俘特䝉褒賞後以言事忤㫖謫從善典史天啟初褒録先朝建言被斥者贈文梓太常寺少卿著有諫垣草李可芳貴池人萬厯戊子舉人授鄖陽推官以敏練稱遷簡州知州襄陽同知俱有善政其在鄖陽嘗擕池州稬種自給至今人傳為李公黏云王一貞字柱明青陽人萬厯乙未進士授鄒縣令勸課農桑設官荘百餘所以處民之無恒業者嵗大祲賑䘏備至又廣置學田建孟子廟擢兵部主事請停礦税累遷湖廣布政禦苗靖盜選侍衛制藩璫清皇木餘價及裁紙額五十餘萬兩並貯庫充餉劉光復字建初青陽人父織以理學名光復舉萬厯戊戌進士授諸暨令置備賑倉築湖隄七十二所墾田二十餘萬畝擢御史巡按山西大著風采以挺擊事入對慈寧宫忤㫖繫獄光宗立起光禄丞卒贈太常寺少卿鄭三俊字用章建徳人萬厯戊戌進士授元氏令厯遷南禮部郎中出為歸徳知府河決嵗饑興積貯導水利使民墾淤田復故業累擢浙江叅政以忤税監乞終養歸起光禄少卿糾中人之濫攴寺帑者天啟初擢副都御史争紅九移宫二案轉户部侍郎抗疏極論魏忠賢罪被斥崇禎初為刑部尚書以讞獄忤㫖歸復起吏部尚書弟三復官光禄丞亦有清望丁旦字惟寅貴池人以貢授衡州通判却例金祛宿弊復佐守修義學社倉少師事李呈祥私淑王守仁在衡與士人講學不輟督餉至會城以勞卒子紹軾萬厯丁未進士天啟中歴官武英殿大學士羅尚忠字孝可青陽人萬厯癸丑進士歴知平湖建昌二縣置義田築圩岸多著循績擢户科給事中有請復建文年號䘏遜國諸臣疏遷太常寺少卿卒王建和字乾純貴池人萬厯癸丑進士知龍泉桐栢二縣擢南刑部主事歴汝寧知府崇藩䕶衛多驕恣以恩威馭之皆畏服累遷湖廣叅政建和居官清惠剛毅不阿所至有聲未老乞致仕歸徐廷宗字季曾建徳人萬厯己未進士歴荆州廣平推官以明允稱累擢工部郎中監修九陵督臨清磚厰尋遷山東副使備兵臨清以伉直忤上官罷歸劉光謨貴池人以貢授處州通判署篆青田多惠政民無逋賦監造漕艘於杭州計材程功徧恤軍匠擢知養利州致仕吳一元青陽人萬厯中以貢授星子令果敢任事有不便於民者必力争之税監李道所過騷擾一元力與之抗道誣以阻撓國税被逮邑民詣闕申辨得釋卒於家天啟初詔贈尚寳少卿陳久可青陽人以貢授武昌通判理商税不取盈餘時税監陳奉以肆虐激變久可力為調解楚人徳之陳以運字時可貴池人桂孫萬厯戊午舉人令新淦有廉静稱獻賊寇江右諸郡邑多殘破淦獨以堅守得全江大任字是人建徳人天啟辛酉舉人令恩平招集流亡給牛種墾荒田千餘頃革里役屏陋規民咸樂業會寧諸邑山賊勢張甚将犯恩平大任誘降其渠魁衆悉解散新學宫興文教邑士始有登科者遷南寧州牧施承緒青陽人崇禎戊辰進士授應天教授擢南户部主事監倉税以清介聞遷郎中出守漳州稱廉平調南康平彭蠡湖劇盜袁國棟字貞幹青陽人官中府經歴樞輔孫承宗知其才題署永平知府值大兵之後撫戢有方軍民交便巡撫薦監軍河南𠞰流寇八戰皆捷督師洪承疇以國棟久經行陣奏補遼東前屯分練監紀同知守禦松山中流矢卒贈山東按察司副使國朝羅雲逵字逺伯青陽人順治丁亥進士授太谷令多惠政百姓徳之戊子分校鄉闈稱得士汪自潤東流人順治中以貢授綘縣令為政寛平居官九載訟息民安擢行人未赴卒陳鍹字孟起石埭人順治乙酉舉人江陰教諭兵燹後自大成殿明倫堂外不遺寸椽鍹偕諸生經營相度復還舊觀有豪猾欲中傷某生餽兼金三百鍹正色拒之秩滿遷興縣知縣柯仲實字在中貴池人順治中以貢授浙江新城令為政廉静革羡耗以勸輸将無催科之役修文廟創義學擢開封同知嚴設保甲以弭盜賊又濵河設舟以救溺置義塜瘞亡者新城民立祠祀之蘇汝霖字潤生石埭人順治壬辰進士授寧波府推官長於聴斷時大兵征舟山有轉餉功駐防兵與郡民構隙訐訟汝霖以片語折之皆感服擢刑部主事歴遷廣西提學僉事康熙十三年叛帥孫延齡據桂林脅汝霖索印汝霖峻拒之懐印走赴廣督軍前委兼蒼梧道隨軍進𠞰尋又署廣西布政使籌畫軍需以瘁卒官張國柱字斯石石埭人順治中以貢厯唐縣令悉除規例嵗饑盜起賑緝有方民賴以寧遷雲南趙州知州輕刑薄税益勵清節擢户部員外郎徐文烜字龍山青陽人順治戊戌進士授太原令大著循績卒於官章世徳字天彝貴池人康熙壬戌進士授南平令南平素苦里排當役世徳至即除僱役之累後二年值編審凡虚丁悉豁免又地當衝要往来輻輳皆躬親攴應不以擾民又造城外浮橋大葺縣治未幾卒官喪車還日百姓哀號逺送曹文蔚字仙霞貴池人官汝寧通判康熙二十一年楚北兵餘黨煽汝寧文蔚計擒其魁乃悉解散署真陽蘭陽二縣有賑飢修志代民賠河帑諸政以艱歸補徳安通判督修河隄具有經畫江南通志卷一百四十八
