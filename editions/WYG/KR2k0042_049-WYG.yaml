body:
  text: 江南通志卷五十河渠志黄河二明萬厯元年河決房村築沛縣窪子頭至秦溝口隄七十里接古北隄徐邳新隄外别築遥隄河流稍安運道亦利二年工部覆河臣萬恭議河漕事宜詔如議行附工部覆議一議疏治茶城淤淺茶城當漕黄之會培築小隄預作小河寛止數丈以為東水之計其夫役取之徐州洪夏鎮督發不必更煩經費一議修浚境山牐座境山舊牐錐探至二丈五尺杳不可尋合相度地形從新剙建復自兩邉各築一隄東抵山岡髙阜西接黄河縷水長隄水發可閉牐以遏洪流於兩隄之外水落可放水以衝積沙於方淤之初一議保䕶房村一帯隄岸徐邳南北兩岸新隄束水中流以防潰決但河形曲直不同急溜埽灣之處伏秋水發不無衝決而房村以上為甚合應將正隄一帶大加幫築急溜去處剏建遥隄及責田淺以下舊有遥隄者一並加倍髙厚但諸臣集議欲於黄鐘集之上分水由符離集出小河口竊恐有並行之河決無兩盛之理萬一全河棄舊奔新徑趨符離集則境山上下四百三十里將為陸地嘉靖甲子之患可也前議急宜停止一議接窪子頭古隄先年黄河北徙溢入運河為患接築前隄䕶一時也近自接連總隄頭通築長隄黄水再無定隙可以北徙前項似可省築惟境山至留城一帶東隄内束河水外障湖波涉來牽挽勢必由之見今衝坍數多相應加築其碭山縣陳孟口新衝決口永禁築塞使黄河水發嵗嵗分洩以圖永利萬恭治河筌蹄治黄河淺者舊制列方舟數百如牆而以五齒爬杏葉杓疏底淤乘急流衝去之效莫覩也上疏則下積此深則彼淤奈何以人力勝黄河战虞城生員獻䇿為余言以人治不若以河治河也夫河性急借其性而役其力則可淺可深治法在吾掌耳如欲深北則南其隄而北自深如欲深南則北其隄而南自深如欲深中則南北隄兩東之衝中堅焉而中自深此借其性而役其力也功當萬之於人又其始也假隄以使河之深其終也河深而任隄之毁余日此深河之法也欲淺河以為洲法若何日反用之耳其法為之固隄令漲可得而踰也漲衝之不去而又踰其頂漲落則隄復障急流使之别出而隄外水皆緩固隄之外悉淤為洲矣余試之為茶城之洲為徐邳之河無弗效者四年二月從漕臣吳桂芳請開濬草灣入海之道七月工成五年河復南趨小浮橋故道河臣傅希摯以聞奏下所司明神宗實錄先是嘉靖三十二年以前黄河由小浮橋後徙由沛縣飛雲橋繼由徐州大小溜溝以入牐河四十四年河大決改由秦溝出口以致茶城歳患淤淺至是復故道六年總理河漕都御史潘季馴條陳治河六事部覆如議詔依擬凖行悉心着實興建永利附潘季馴上六議疏略水性就下以海為壑向因海河髙以致決隄四溢運道民生胥受其病故今談河患者皆以濬海為上䇿苐海有潮汐茫無著足不得已而議他闢豈知海口視昔雖壅然自雲梯關四套以下關七八里至十餘里深皆三四丈不等縱使欲另開鑿必須深闊相類方便注放則工力艱鉅必不能成矧未至海口乾地猶可施工及將入海之處則潮汐徃來亦與舊口等耳且舊口積沙人力雖不可濬水力自能衝刷乃若新闢之地則土壊堅實不特人力難措而水力亦不能衝故海無可濬之理惟當導河以歸之海則以水治水即濬海之䇿也然河又非可以人力導也欲順其性先懼其溢惟當繕治隄防俾無旁決則水由地中沙隨水去即導河之䇿也顧頻年來無日不以繕隄為事亦無日不以決隄為患何哉卑薄而不能支廹近而不能容雜以浮沙而不能久隄之制未備耳是以黄決崔鎮等口而水多北潰為無隄也淮決髙家堰黄浦等口而水多東潰隄弗固也乃議者不咎制之未備而咎築隄為下䇿豈得為通論哉又有所未盡者上流既潰隄旁決至於下流復或岐而分之其趨於雲梯關正海口者譬猶強弩之末耳葢徒知分流以殺其怒而不知水勢益分則其力益弱水力既弱又安望其能導積沙以注海乎故今日濬海之急務必先塞決以導河尤當固隄以杜決而欲隄之不決者必真土而勿雜浮沙髙厚而勿惜鉅費讓逺而勿與争地斯隄可固也如徐邳桃清沿河各隄固矣崔鎮等口塞矣則黄不旁決而衝漕力専髙家堰築矣朱家口塞矣則淮不旁決而㑹黄力専淮黄既合自有控海之勢又懼其分之則力弱也則必暫塞清江浦河而嚴司啟閉以防其内奔姑置草灣河而専復雲梯以還其故道仍接築淮安新城長隄以防其末流盡合黄淮全河之力涓滴悉趨於海則力強且専下流之積沙自去下流既順上流之淤墊自通海不濬而闢河不挑而深此所謂固隄即所以導河導河即所以濬海也治河者必先求河水自然之性而後可施其疏築之功必先求古人已試之效而後可倣其平成之業黄水來自崑崙入徐濟運歴邳宿桃清至清口㑹淮而東入於海淮水自豫及鳯厯旴泗至清口㑹河而東入於海此兩河之故道即河水自然之性也昔元嵗漕江南之粟由揚州直北出廟灣入海至永樂年間平江伯陳瑄始隄管家諸湖通淮河為運道然慮淮水漲溢東侵淮郡也故築髙家堰隄以捍之起武家墩經小大澗至阜寜湖而淮水無東侵之患矣又慮黄河漲溢南侵淮郡也故隄新城之北以捍之起清江浦沿鉢池山栁浦灣迤東而黄水無南侵之患矣尤慮河水自牐衝入不免泥淤故嚴啟閉之禁止許漕艘鮮船由牐出入匙鑰掌之都漕五日發籌一放而官民船隻悉由五壩車盤是以淮郡晏然漕渠永頼而陳平江之功至今未泯也後因剝蝕既久隄岸漸傾水從髙家堰決入一郡遂為魚鼈而當事者未攷其故乃謂海口壅塞遂穿支渠以洩之盖欲亟拯淮民之溺多方為疏導之計詎知旁攴暫開水勢陡趨西橋以上正河遂至淤阻而新開支河闊僅二十餘丈深僅丈許較之故道不及三十分之一耳豈能容受全河之水下流既壅上流自潰此崔鎮諸口所由決也今新河尋復淤塞故河漸已通流雖深闊未及原河十分之一而兩河全下沙隨水刷欲其全復河身不難也河身既復面濶者七八里狹者亦不下三四百丈滔滔東下何水不容若猶以為不足而欲另尋他所别開一渠恐人力不至於此也以臣等度之非惟不必另鑿一口即草灣亦須置之勿濬矣故為今之計惟有修復平江伯之故業髙築南北兩隄以斷兩河之内灌而淮掦昏墊之苦可免堅塞桃源以下崔鎮口諸決而全河之水可歸故道淮黄二河並歸入海則沙隨水刷海口自復而桃清淺阻又不足言矣此以水治水之法也若夫扒撈桃濬之說僅可施之於牐河耳黄河河身廣濶撈濬何期悍激湍流器具難下前人屢試無功徒費工料徐州以南之工如此而已或有難臣者曰淮水欲東而乃挽之使北黄水欲北而乃挽之使東無乃水性之未適乎臣曰水以海為性決水乃過顙在山之水非其性也或者又曰昔禹治河播九河同為逆河入於海今乃欲塞諸決併二瀆耶臣曰黄河經行之地河南之土最鬆禹導河入海止經郟縣孟津鞏縣三處皆𨽻今河南一府其水未必如今之濁今自閺鄉至虞城凡五府河已全經其地而去禹導河之時復三千餘年流日久土日鬆土愈鬆水愈濁故平時之水以斗計之沙居其六一入伏秋則居其八矣以二升之水載八升之沙非極湍急即至停滯故水分則流緩流緩則沙停勢所必至即以近事觀之草灣一開而西橋故道遂淤崔鎮一決而桃清以下遂溢去嵗水從崔家口出則秦溝遂為平陸此眼前事又何疑哉所據司道諸臣欵議臣等復加叅酌似應允從一議塞決以挽正河之水河水旁決則正流自㣲水勢既㣲則沙淤自積淮以東有髙家堰朱家口黄浦口三決此淮水旁決處也桃源上下則有崔鎮口等大小二十九決此黄水旁決處也俱當築塞一議築隄防以杜潰決之虞隄以防決隄弗築則決不已故隄欲堅堅則可守而水不能攻隄欲逺逺則有容而水不能溢凡隄必尋老土凡基必從髙厚又必繹賈讓不與争地之青倣河南逺隄之制徐邳一帶舊隄查有迫近去處量行展築月隄仍於兩岸相度地形最窪易以奪河者另築遥隄桃凊一帶南岸古隄已壊相應修復下抵馬厰坡地形頗窪相應接築北岸自古城至清河亦應剏築遥隄一道不必再議縷隄徒糜力又查清江浦外河一帯至栁浦灣止為淮城北隄原基短促防䕶未周仍自栁浦灣至髙嶺剙行接築四十餘里以遏兩河之水盡趨於海分一議剏建滚水壩以固隄岸黄河水濁固不可然伏秋水發暴漲傷隄查得古城鎮下之崔鎮口桃源之􅈝城清河之安城土性堅寔合無各建浹水石壩一座比隄稍卑二三尺濶三十餘丈萬一水與隄平任其從壩滚出則歸漕者常盈而無淤塞之患出漕者得洩而無他潰之處全河不分而隄自固矣一議止濬海工程以免糜費相傳海口横沙並東西二失據土民季真等口稱並未望見潮上之時海舟通行無滯潮退沙而之水尚深二尺况横沙並東西二尖各去海口三十餘里豈能阻碍河流故臣等以為不必治亦不能治惟有塞決挽河沙隨水去治河即所以治海也别鑿一渠與復濬草灣徒費錢糧無濟於事一暫寢老黄河之議以仍利渉黄強淮弱每每逼淮東注故議者欲復老黄河故道翼使黄水稍避髙堰民墊可舉但勘得原河七十餘里中間故道久棄無論有水無水之地詢之居民俱失其真無從下手且已棄故道欲行開復必須深廣與止河等乃可奪流今見存大河口窄狹不及桃清三分之一而三義鎮入口之處背灣徑直猶恐水未必趨况今桃清遥隄議築則黄水自有容受崔鎮等決議塞則正河自日深廣髙家堰議築則淮水自能㑹黄清江浦等牐議嚴啟閉新城北隄議行接築則淮安髙實興鹽等處自無水患此河雖不復可也按議内復牐壩防外河之衝一條别見運河是年塞崔鎮口築自徐州起抵淮南北兩隄按明㑹典是年議塞崔鎮口因築遥隄束水衝沙其南岸自三山頭至李家舖長二萬八千五百五十八丈又自歸仁集築横隄至孫家灣長七千六百八十餘丈又於桃源縣馬厰城築隄長七百四十丈以遏南奔入淮之勢其北㟁自谷山至直河長九千四百八十四丈又自古城至清河長一萬八千四百十丈建崔鎮等滾水壩四座以緩泛漲之水使不能潰隄而出河流乃安南河全考季馴築髙堰起武家墩經大小澗至阜寜湖以捍淮東侵築隄起清江浦沿鉢池山栁浦灣迤東以制河南溢慮河内衝牐而蝕漕也嚴五牐啟閉獨以待漕艘六月運盡築壩官民船隻由壩車盤沙無内灌自徐抵淮亘六百餘里築南北兩隄蜿蜒相望於是淮畢趨清口㑹大河入於海海口不濬而通七年河工告成附潘季馴河工告成疏略數年以來黄淮胥失故道至以地方州縣為壑葢黄河惟恃縷隄而縷隄逼近河濱束水太急每遇伏秋輒被衝決北岸則決崔鎮季太等處南岸則決龍窩周營等處共百餘口而又從小河口白洋河灌入挾永堌諸湖之水越歸仁集直射泗州以至正河流緩泥沙停滯河身墊髙淮水乂因髙家堰年久圯壞潰決東奔破黄浦決入淺而山陽髙寶興鹽悉成沮洳清口將為平陸黄淮分流淤沙罔滌雲梯關入海之路坐此淺狹而運道生民俱困矣自去秋興工之後諸決盡塞水悉歸漕衝刷力専日就深廣今遥隄告竣自徐抵淮六百餘里兩隄相望基址既髙且皆真土膠泥夯杵堅實絶無往歲雜沙虚鬆之弊蜿蜒綿亘殆如長山夾峙而河流於其中即使異常泛濫縷隄不支而溢至遥隄勢力淺緩容蓄寛舒必復歸漕不能潰出譬之重門待暴則暴必難侵增纊禦寒則寒必難入兼以歸仁一隄横接宿桃南岸要害之區使黄水不得南決泗州至於挑清北岸又有減水四壩以節宣盈溢之水不令傷隄故在遥隄之内則運渠可無淺阻在遥隄之外則民田可免淹没雖不能保河水之不溢而能保其必不奪河固不能保縷隄之無虞而能保其至遥即止葢嘗考𢎞治以前張秋數塞數決自先任都御史劉大夏於黄陵岡一帯増築太行隄一道而張秋之患遂息此其已試之明騐也况今所築遥隄係真正淤土較之太行雜沙又有不侔者故今歳伏初驟漲桃清一帶水為遥隄所束稍落即歸正漕沙隨水刷河身愈深河岸愈峻上流呂梁兩崖俱露巉山波流湍急漸復舊洪徐邳一帶年來篙探及底者今測之皆深七八丈此黄水復故道之效也髙堰屹然如城堅固足恃淮水盡趨清口㑹黄入海清口日深上流日涸不特堰内之地可耕而堰外湖波漸成赤地葢堰外原係民田田之外為湖湖之外為淮向皆混為一壑而今始復其本體矣其高寳一帶因上流俱已築塞湖水不至漲滿且寳應石隄新砌堅緻故雖秋間霖潦浹旬隄俱如故黄浦八淺築塞之後俱各無虞栁浦灣一帶新隄環抱淮城並無齧損不特髙寳田地得以耕藝而上自虹泗盱眙下及山陽興鹽等處皆成沃壤此淮水復故道之效也現今淮城以西清河以東二瀆交流海口之深測之已十餘丈葢以水攻水以河治河黄淮並注水滌沙行無復壅滯非特不相扼而且交相為用故當秋漲之日而其景象如此昔年河墊水淺水行地上祗見其多今則沙刷水深水由地中祗見其少也數年以來議論紛起有謂故道當棄者有謂諸決當留者有謂當開支河以殺下流者有謂海口當另行開濬者臣等反覆計議棄故道則必欲乗新衝新衝皆住址陸地漫不成渠淺澀難以浮舟不可也留諸決則正河必奪桃清之間僅存溝水淮陽兩郡一望成湖不可也開支河則黄河必不兩行自古紀之淮河泛溢隨地沮洳水中鑿渠則不能别尋他道則不得况殺者無幾而來者滔滔昏墊之患何時而止不可也海口故道則廣自二三里以至十餘里詢之土人皆云徃時深不可測近因淮黄分流止餘涓滴入海水少而緩故沙停而積海口淺而溢耳若兩河之水全歸故道則海口仍舊深廣不必别尋開鑿徒費無益也臣等乃思欲疏下流先防上源欲遏旁支先防正道遂決意塞決以挽其趨築遥隄以防其決建減水壩以殺其勢而保其隄一嵗之間兩河歸正沙刷水深海口大闢田廬盡復流移歸業葢築室似為阻水而不知力不専則沙不刷阻之者乃所以疏之也合流似為益水而不知力不𢎞則沙不滌益之者乃所以殺之也旁溢則水散而淺返正則水束而深水行沙面則見其髙水行河底則見其卑此既治之後與未治之先光景大相懸絶也每嵗修防不失即此便為永圖借水攻沙以水治水臣等䝉昧之見如此而已至於復牐壩嚴啟閉疏濬掦河之淺亦皆尋繹先臣陳瑄故業原無竒䇿偶倖成功寔皆絲綸屢飭並河漕以一事權假便宜以任展布故臣得効芻蕘何敢貪天功以為己力哉給事中尹瑾善後事宜疏略切黄河之性合則力専而流急故沙隨水刷而日深近日諸决盡塞河水頓深則塞決之功誠不可緩葢河決久則旁流深旁流深則正河奪故塞之速則費省而功易塞之遅則費鉅而工難其間經理區畫固司道職掌而夫役物料則有司存焉有司職掌守土比閭之民皆其撫馭一號召即役夫也帑藏之財皆其典守一階置即物料也呼吸之間事可立辦惟有司視河隄之坍齧漫不經心又或執拘孿之見即有水勢危廹必待白之河道白之河漕文移徃返動經旬月江河一失淜湃難支始而蟻穴終而濫觴以至於滔天而莫可收拾崔鎮黄浦之覆􅂺可鑑也崔鎮黄浦當初決之時特數十人捧土之力耳乃崔鎮士民赴愬而縣官付之罔聞黄浦舖老呈報而縣佐加之笞責迄今地方官民言之無不痛恨近凡河道失事掌印及管河官一體叅治誠宜永為令甲但下無専制事輒闗白須假以便宜今後萬一水漲暴發事在危廹非司道駐劄地方該掌印官徑自派募人夫動支物料若夫料不足聴其借支貯庫别項銀兩措辦或一面通詳司道一面便宜處辦夫料築塞不必拘泥闗白而後行事八年開復邳州直河及宿遷小河河防一覽開復邳州直河一道而䝉沂諸水徑出大河開復宿遷南㟁小河一道而靈睢積水漸已消減十一年正月辛未浚韓家口引渠出徐州十三年河決范家口水灌淮城全河幾奪又決天妃壩福興漸淤遣科臣常居敬督塞之續又加築范口石隄全河復故十五年河決茶城尋淤十六年三月禮科給事中王士性請開復黄河故道下行河者議行之附王士性疏略河至清河向南衝者凡四折而後入海淮安髙寳鹽興葢不啻數百萬生靈之命託之一丸泥而紛紛之議如蟻穴漏巵補救迄無寜嵗不如復河故道為一勞永逸之圖也河故道由桃源三義鎮逹葉家衝與淮合在清河縣北别有濟運一河在縣南葢支河耳河強奪支河直趨縣南而自棄北流之道久且斷流然河形固在也自桃源至瓦子灘凡九十里地下不耕無室廬墓之碍雖開河經費視諸説稍倍而河道一復為利無窮六月督理河工給事中常居敬奏黄河故道開復甚難宜罷役而訾家營支河之議起按河防一覽開訾家營支河一道為淮安知府張允濟原議欲使大河分流一殺泗州水勢一減清江浦外伏秋之漲而潘季馴疏陳以為河不兩行自古記之徃年河臣劉大夏劉天和王以旗俱開濬支渠不久即淤恐妨奪正河虚費工力請行停寢十二月訾家營支河工罷明神宗實錄從總河潘季馴之議也是年鮑家口開河防一覽清江浦外隄對㟁鮑家營忽衝開一口幾二百丈其水從木口入荒坡徃東北浪石舊河身至娘子莊澗橋古寨俱係湖蕩又十五里至桑墩入見成連河分支一百餘里下新壩入海此口離清河縣三十里與運河經行之處眇不相渉而清江隄修築既髙水從西激鮑口一開清江隄乃完運道可免齧潰改徙十七年十月黄河決口塞是年增築豐縣清水河月隄長二千五百丈又築塔山隄長九百餘丈草灣河通淮安府志先是草灣河通塞不常至是大通奪正河十分之七至赤晏廟仍歸大河清江浦外居民恃以為安而河面較正河僅三分之一上流未免逗遛十八年又築塔山隄長七百餘丈十九年河道都御史潘季馴開魁山支河以消徐州積潦復條上事宜詔如擬行附工部題覆河道都御史潘季馴條議一放水淤平内地以圖堅久謂縷遥二隄俱為防河善法但宿遷以南有遥無縷獨直河以西地勢卑窪嵗嵗患水宜將遥隄查閲堅固却將縷隄相度地勢開缺放水沙隨水入地隨沙髙庶消患而費省一接築遥隄以防奪河謂黄河之勢分則河遂奪緩則沙遂停宜自永頼亭以下接築遥隄計五百四十丈至黄家溝止庶河無分流而事可永頼一増支渠大隄以杜淤淺謂徐城積潦悉由新開支河洩出惟魁山迤北王家林一段約長十餘丈迤南倪家林一段約長三十餘丈宜倣支河新隄之法築大隄一道自無塌損之患積水勢若建瓴矣二十年兩河隄防告成附潘季馴隄防告成疏略臣於萬厯六年奉命治河即請築遥隄以防其潰築縷隄以東其流八九年間河流順軌故道晏然業有成效矣而嵗久官更弊滋法弛以河防為末務視隄工為贅疣一簣莫加萬夫閒曠而車馬之蹂躙風雨之剝蝕河流之汕刷髙者日卑厚者日薄何怪其東潰西決荷䝉皇上授臣以總理之榷責臣以修復之事臣固不能别為新竒之䇿尤不敢為僥倖之圖惓惓以隄防陳乞謬承俞命畢力仰承將濱河一帶地方躬親荒度周爰諮諏舊有而今記者則議加修舊無而宜有者則議剙築遥隄約攔水勢取其易守也而遥隄之内復築格隄葢慮決水順遥而下亦可成河故欲其遇格即止也縷隄拘束河流取其衝刷也而縷隄之内復築月隄葢恐縷逼河流難免衝決故欲其遇月而即止也防禦之法較之己夘告成之功更為詳宻倘能嵗守不失則河流自無衝決之患河不衝決則故道晏然翕由順軌而運艘自無阻滯之虞矣但􅽬土成隄原非鐵石積不修葺便至傾頺嵗嵗修之嵗嵗此河也世世守之世世此河也故嵗修錢糧之設徭編雇募額夫凡以為河也而可置之虗糜閒曠之地哉臣是以諄諄為申明修守之請也伏望天語叮嚀嚴諭地方司道等官每嵗務將各隄頂加髙五寸兩旁汕刷及卑薄處所一體幫厚五寸年終管河官呈報各該司近司道官躬親騐覈開報總河衙門覆覈年終造冊奏繳不如式者指名叅䆒庶河防永固而國計民生俱有賴矣又併勘河情疏略臣自嘉靖四十四年至今以河事君父者四任矣壯於斯老於斯朝於斯暮於斯或采之輿情或得之目撃或稽之已徃或騐之將來水有性拂之不可河有防弛之不可地有定形強之不可治有正理鑿之不可故厭常者每欲棄舊以更新而臣則以為祖宗二百餘年之故道必不可失也泥成說者每欲支分以殺勢而臣則以為黄河之濁流必不可分也臣執此以治河者前後一十二年矣而不意去秋霪霖連月河水滔天物議遂騰牢不可破夫當伏秋暴漲之時兩河並髙人言無足怪也而寜知漲之必有消乎以方漲之河而律之旋消之後不可也人見其水盈及隄輒謂隄可棄也而寜知防潰則水泛外洩則中乾不數日而水落岸出河安如故固隄所以存河乎行者止見其漲而不見其消談者不聞其消而惟聞其漲一人言之百人從而和之議論多者成功或毀興作侈者工費自煩故敢備述人言之最易惑衆最能病河者逐一詳解於後一議者謂水勢宜殺黄水暴漲何不多濬支渠以殺之乎臣曰此分合之説正所當辨也分流誠能殺勢然可行於清水之河非所行於黄河也黄河斗水沙居其六以四升之水載六升之沙非極迅溜湍急則必淤阻分則勢緩勢緩則沙停沙停則河飽飽則奪河河不兩行自古記之藉勢行沙合之者乃所以殺之也又謂水漲之時暫開決口以分其流水落復塞此言誠似有見但塞決如升天之難費亦不貲臣於萬厯八年築有崔鎮徐昇季太三義四減水石壩於桃源縣遥隄中壩與地平水浮則洩此與開決之説無異而水遇石止難以深刷可無奪河之虞水落歸漕壩復如故可免塞決之費此外不須另聞決矣一議者謂舊河沙墊底髙不若另覓新河之為得也臣曰沙固易停亦易刷即一河之中溜處則深緩處則淺水合沙刷必無俱墊之理此淺彼深亦無妨運之事人見伏秋水髙輒歸罪於沙墊殊不知此水髙於而非沙髙於底也如使河底果為沙墊則冬春水落岸出之時舟膠不能行矣藉令因此而欲棄故道别鑿新河無諭其無所也即得便宜之地而鑿之人力能使闊百丈以至二百丈深二丈以至三四丈如故河乎即使能之將置黄河於何地乎如不可置則行之數年新者舊矣河何擇於新舊舊則淤新則不淤非臣之所能解也且禹之治水九河曰疏濟漯曰瀹汝漢曰決淮泗曰排傳者曰疏通也瀹亦疏通之意排決皆去其壅塞也葢天地開闢之初即有百川四瀆原自朝宗於海禹但去其壅塞以復天地之故道耳凡民知識不進神禹達甚乃欲棄故從新乎議者又謂徐邳非黄河之故道也然獨非泗沂之故道乎禹貢所謂導淮自桐栢東會於泗沂即此河也志稱宋神宗十年河犬決於澶州合南清河而會於准南清河者即泗沂也行之六七百年是亦黄河之故道也一議者謂賈讓有云上之有川猶人之有口也治土而防其川猶之兒啼而塞其口故禹之治水以導而今之治水以障何也臣曰昔白圭迎水之性以隣為壑是謂之障若順水之性以隄防溢則謂之防河水盛漲之以海時無隄則必旁溢旁溢則必汎濫而不循軌豈能為壑耶故隄之者欲其不溢而循軌以入於海正所以導之也考之禹貢云九澤既陂四海㑹同傳曰九州之澤已有陂障而無潰決四海之水無不㑹同而各有所歸則禹之導水何嘗不以隄哉議者又謂水愈髙則隄愈増不將隆隄於天乎臣則曰若謂河水有長無消耶亦豈以隄外即水耶隄外為灘灘外為河平時水不及灘隄若贅疣伏秋異常之水亦至丈許始逾灘而及隄然或三日或五日或七日或旬日即復歸落於漕隄之髙者不過踰丈何能隆之於天也一議者謂昔年徐洪呂洪怪石嶙峋上浮水面湍激之聲如雷如霆舟觸之必敗今皆無聲得非沙掩其上而然乎臣曰二洪本體甚髙沙能掩之是無徐州矣徐州洪為主事郭昇戴鼇陳穆先後剷鑿志所謂翻舟等石悉去無餘又云盤距横突隠見於波濤之間激飛湍而鳴雷霆者剗削殆盡是也呂梁洪為主事陳洪範所鑿先臣大學士徐階記中所稱獰利如剣㦸之相向虎豹獅象之相攫犬牙交而蛇蚓蟠者怪石盡去舟行如出坦途是也自諸臣鑿平之後徃來更無覆溺之患厥功甚大葢此時偶因黄河他決二洪為涸天假之便以成諸臣之功而不知者遂謂洪為沙掩耳又有病其剷鑿之後水不潄石故不能刷沙則誤矣夫水之激石北在水面豈能刷及河底之沙且自河南至雲梯關海口幾二千里惟徐呂五十里内有此二洪縱能刷沙豈能刷及二千里耶一議者謂雲梯闗海口沙塞以致兩河停蓄不流有之乎臣曰黄河自星宿海萬里而來從雲梯闗出海並無他處分流海口果塞兩河豈有不停之理但自春徂冬自朝及暮滔滔東下迅溜湍激何嘗有一息停蓄如其停也則水當有長無消矣乃朝而長暮而消或今日長明日消消有多寡有遲速然必無長至旬日而不消者而大分則伏秋長多消少冬春長少消多上源雨多則長雨霽則消此一定而不可易者海口既塞則所消之水何徃耶臣嘗親至雲梯關閱視海口深濶並無淤梗一議者謂黄髙於徐淮髙於泗可不為之處乎臣曰不能也非不為也自河南歸以至淮安之安東其地皆卑於河不獨徐泗為然也如黄而可卑則湯遷於亳仲丁遷囂河亶甲遷相祖乙遷耿盤庚遷殷凡以避河也而何其不憚煩如此也淮而可卑則宋景祐三年泗州張守不必築䕶城隄三丈三尺以捍之矣此載在志傳中可考也又修守事宜一築隄凡黄河隄必逺築大約離㟁須三二里庶容蓄寛廣可免決齧切勿逼水以致易決務取真正老土每髙五寸即夯杵三二遍若有淤泥與老土同苐須取起曬晾候稍乾方加夯杵其取土宜逺切忌傍隄穵取以致成河積水刷損隄根騐隄之法用鐵錐筒探之或間一掘試一塞決凡隄初決時急將兩頭下埽包裹官夫晝夜㸔守稍待水勢平緩即從兩頭接築如水勢洶湧頭裹不住即於本隄退後數丈穵槽下埽如裹頭之法刷至彼必住矣如又不住即於上首築逼水大壩一道分水勢射對㟁使回溜衝刷正河則塞工可施矣塞將完時水口漸窄水勢益湧又有合口之難須用頭細尾粗之埽名曰鼠頭埽俾上水口濶下水口收庶不致滚失而塞工易就也埽以土勝為主埽臺須要臥羊坡以便推挽揪頭繩須要𦂳扯以防下淌又須時時打鬆令其深下仍覓慣㑹泅水之人入水探驗底埽著地方下簽樁簽樁須要酌中埽埽釘著方為堅固如寒天或水急不能泅水即㸔揪頭寛鬆便是著地之騐繋繩留橛令人專守略有走動便須另下一橛橛頭上填記第幾埽揪頭滚肚明白以便㸃查收放埽面出水未髙寜加一小埽不可多用土牛推埽時易動故也須要勇徃直前俗諺謂之搶築如用大埽長五丈髙六七尺者用草六百束毎束重十斤栁梢一百二十束每束重三十斤如無栁梢以葦代之草繩六十套每套四十二條每條長二丈四尺樁木五根揪頭滚肚繩四條共用檾二百五十斤挑土夫工逺近不等難以預計中埽并土牛工料以次遞減一下䕶根乾埽凡隄係埽灣湏預下乾埽以衛隄根此埽須土多料少簽樁必用長壯入地稍深庶不坍蟄如下長三丈髙三尺埽一箇用草一百六十束栁梢四十束草繩十二套樁木三根量用檾作行繩用隄夫二十工二十一年河決單縣之黄堌口一由徐州出小浮橋一由舊河逹鎮口牐二十三年三月勘河科臣張企程總河楊一魁等進分黄導淮疏浚海口之議三十四年分黄導淮工成南河全考總河楊一魁㑹給事中張企程行委郎中詹在泮等開挑桃源黄壩新河自黄家觜起至五港灌口止分洩黄水入海以抑黄強導淮開清口沙七里建武家墩涇河牐洩淮水由永濟河逹涇河下射陽湖入海又建髙良澗減水石牐子嬰溝周家橋減水石牐洩淮水一由岔河下涇河一由草子河寳應湖下子嬰溝俱通廣洋湖入海仍恐淮水宣洩不及南注各湖為患又挑髙郵茆塘港通邵伯湖開金家灣下芒稻河入江以疏淮漲附部覆總河楊一魁分黄導淮善後事宜疏略一議展河岸以固隄防葢舊河身濶二百餘丈尚有縷隄遥隄以束之而新河面窄土鬆伏秋之防不可不慮宜於新渠中堅處所再闢二十丈以廣容納兩岸倣遥隄之制另築厚隄一道以固衝撃其王家口周莊為運道經由之地令加浚鑿並築堅隄以便牽輓一議設長夫以時修守葢黄壩至五港口約三百餘里河隄始剏勢易潰決議設夫一千七百名以待修救之用又嵗募五百名遇有淺阻亟為挑浚一議設専官以便責成葢修浚雖以夫役而督率要在専官其娘子莊以下應以府同知張兆元専為督察是年黄堌口決漫延蕭碭宿睢靈宿數州縣境二十五年總河楊一魁奏濬小浮橋沂河口工竣明神宗實錄自河決南徙徐邳復見清泗議者謂全河水㣲不利運道決口不塞貽害地方且恐下齧歸仁為盱泗患獨總河尚書楊一魁謂堌口深濶難塞議濬小浮橋沂河口至是工程報竣運道通利奏言萬厯七年河臣潘季馴慮黄河倒灌小河白洋等口挾諸河水衝射盱泗作歸仁隄為保障計自黄堌一決下流易洩必無上灌之虞且小河不日工完引河歸復故道去歸仁益遠部覆報可又楊一魁議開小浮橋築義安壩濬小河日引武沂泉以濟運及是以久旱不雨上源水枯乂復衝開義安束水壩二十餘丈小浮橋來水㣲細運河淺澀於是一魁議挑堌口迤上埽灣淤觜二處仰受黄流救小浮橋以上數十里之涸部覆報可又楊一魁疏言今黄河南徙至韓家道盤坌河丁家莊俱兩㟁濶百丈深踰二丈名曰銅幫鐵底故道也劉家窪始強半南流得山西坡永堌湖以為壑出溪口入符離河亦故道也惟徐邳運道淺涸誠為可虞所以首議疏小浮橋實因其勢而圖資其利乃小試頗有效驗若將小浮橋再加挑闢未必不為運道之利計不出此而欲自黄堌挽回全河必須挑四百里淤髙之河身築三百里南㟁之長隄不惟所費不貲還恐後患無已御史楊光訓周盤馬從聘議與總河合工科給事中徐觀瀾言堌口之勘三臣既同善均從衆請専任河臣以責成功上是其言令河臣悉心經畫南河全考按黄堌口乃賈魯舊開處也楊一魁以河雖南出符離淹没民田無幾而河水一半由舊河下徐州足以濟運議不治又二年代之者為大司空劉東星亦守舊議附張兆元黄堌口歸仁隄考按黄堌口屬山東單縣接河南虞城界其水由夏邑永城及南直𨽻蕭碭宿睢地方至小河口白洋河復入運河此口南射歸仁集石隄最稱要害内有沙渚二水中分經虞城孔家樓接碭山縣劉家集至王家橋九十餘里俱有河形自王家橋至狐父橋十里係黄河故道自狐父橋至蕭縣界三十里有大河形自蕭縣界起入盤坌河至兩河口七十三里亦有河形自兩河口由山西坡瓦子口入永堌湖至宿州地方徐溪口七十餘里俱坡水散漫自徐溪口至符離橋時村一百一十里自時村分流由靈壁縣地方孟山睢寕縣地方廟灣口宿遷縣地方耿車至小河口俱三十里小河口迤南有白鹿湖邸家湖二湖雖係瀦水湖面闊逺一遇北風則怒濤奔逸勢必南侵舊自歸仁集起至孫家灣特築遥隄一道捍禦之名曰歸仁隄計長七千六百八十二丈八尺今黄堌決口之水復經其下則其防範於先事也宜周當事者須急堵黄堌口俾黄水盡八徐邳正河以濟運道仍堅守歸仁隄使横流不致衝究盱泗此正今日第一要務二十六年總河劉東星議浚黄河故道二十七年浚三仙臺至趙家圈河工成明神宗實錄二十七年三月工部覆劉東星議大約謂黄河自商虞而下至小浮橋下二洪乃賈魯老黄河故道自元及嘉靖年間行之甚利至三十七年北徙濁河而此河遂淤萬厯七年總河潘季馴議復開之以工費浩繁中罷今河決黄堌而南徙由韓家道口至趙家圈百餘里衝刷成河即先年議復之故道由趙家圏尋老黄河故道開挑由東鎮曲里舖石將軍廟至兩河口直接三仙臺新渠計長僅四十里據運同趙坰等估挑濶十丈深一丈募夫五萬人費可八萬餘兩不過一月有半可以竣工此河一開則目前大挑運河及小挑濁河工程俱可節省誠所謂事半功倍者也報可又是年八月東星開趙囤至彭城賈魯所濬故道起曲里舖至三仙臺四十里又起三仙臺至小浮橋開支流若干凡五月成二十九年䝉墻等口決河勢盡南趨邳宿三十年工部尚書楊一魁覆河南巡撫曾如春疏請上源下流兼治詔嘉納之附楊一魁疏略近因䝉墻等口衝決黄河勢趨邳宿亟圖修築汴隄以障南徙誠目前保䕶至計苐汴隄上自歸徳下至靈虹接連歸仁隄數百餘里若今河南地方已修完固而靈虹一帶尚為殘缺則狂瀾盡復奔南前工虚費應一並修築髙厚始保萬全宿遷小河口乃睢水出洩故道河渠尚未深廣兼以耿車児灘横隄年久殘廢莫能障禦為今之計速應疏浚小河口仍倍築耿車等隄使黄流盡歸小河口則瀰漫自消苐前隄槩築決口既塞倘下流不浚上源必復淤塞恐衝決之患又必不免應通行各該撫臣同心興舉母分爾我三十一年總河曾如春挑北河引河入淮是年河決蘓莊衝入沛縣太行隄三十二年四月從工部尚書姚繼可請開泇分黄並舉明神宗實錄工部尚書姚繼可題泇河業有成績泇成而漕可藉矣至於黄河衝徙魚鼈豐沛若非因勢利導何以拯救元元總河議於堅城集以上開渠引河而下流多通復分六座樓苑家樓二路而水勢多殺既可以移豐沛之患又不至沿碭山之城行所無事莫善於此請開泇分黄兩工並舉上允之八月河決朱旺口及太行隄數處三十三年正月總河尚書李化龍奉命查勘兩年河工建議嚴守隄賞罰從之附李化龍疏略年來緩於隄防急於挑浚及至隄壊水溢尚不引咎於守隄之不力而且委罪於浚河之不深則何不取河勢觀之也河北岸自曹縣以下無入張秋之路南岸自虞城以下無入淮之路惟是向來運道由徐邳以逹鎮口故河北決曹單豐沛間則由昭陽湖出李家口而運道涸今泇河一成自直𨽻以至夏鎮三百六十里之淤途易而為二百六十里之㨗徑此後黄河在山東直𨽻間能係運道之命脉者寡矣獨朱旺口以上決單則單為沼決曹則曹為魚與夫豐沛徐邳蕭碭數十萬生靈總懸命於遥遥之一線則隄防亦何可緩也隄防固則上無泛溢下必順流不固而下雖通行上必旁奪此一恒人能辨之而何持議者之紛紛也前年水行隄北則曰昭陽湖不能行水水且倒灌矣昨嵗水分隄南則曰新河不能容水水且倒灌矣倒灌之説興築塞之事緩卒之隄潰河淤水之取道昭陽湖而南者自如安見其倒灌則又何不敢地勢觀之也自朱旺口由苑家樓杜家樓以至小浮橋上下相較可低三四尺北髙南下居可知矣若水入新河兩兩分行縱伏秋暴漲不過溢岸而止豈能自卑趨髙自下趨上哉故上隄誠守則河必在朱旺口上下亦其自然之勢也又何倒灌之足患倒灌之説原為失隄者逃罪之地乃其弊也請西自開歸東至徐邳必無不守之地上自司道下至府縣必無不守之人掌印官與管河佐貳同其賞罰守廵與管河司道同其功罪庶人人任事不得分籓籬人人著肩不暇騰口説是年總河侍郎曹時聘題准大挑朱旺口由堅城集出徐州小浮橋長六萬丈南河全考是年冬十月興工自蘇莊至徐州幾二百餘里悉州縣正官受役分地而浚之河􅂷成惟徐州之上有八九里許未及浚而蘇莊逼近黄河隄工單薄忽從地下穿入新渠震撼東下不待放水也流至未開處稍梗塞遂汎濫新河之外然大勢已定可以隄約束之而魚沛單濟金鄉之水悉歸大河民免魚鼈矣三十四年四月新河成明神宗實錄四月癸亥大挑河工成自朱旺口逹小浮橋延袤一百七十里渠勢深廣築隄髙厚潰流復故道自十一月至今五閱月而功成河道總督曹時聘上疏報聞六月郭煖樓人字口河決北股至茶城鎮口按臣漕臣等疏聞下部議明神宗實錄署工部侍郎沈應文言朱旺而上徐州而下舊河甚濶悉百丈以至二百丈今所挑新渠寛者不過三四十丈耳廣狹相懸吞吐不及勢必盈漫龎家屯乃河臣原題量挑以分殺水勢者雖有郭煖樓之潰暴漲所乘原非決裂而不可收拾也目今行南股者十之七行北股者十之三滔滔大勢仍趨新渠且壩工止留六丈官夫雲集畚鍤立竢待衝刷稍廣水勢必殺數丈決口直一鼓舞之力但兩股並駛勢不兩強河性變遷滄桑互易轉昐伏秋寜無横決則長河南北增築新隄修補行縷不可不豫在河臣嚴飭各屬䖍始厚終以收一簣奉㫖河工垂成尤宜萬分加謹著河臣於應塞決口相機堵築朝廷不為中制不責近功務保萬全方稱竟局三十九年六月河決狼矢溝總河劉士忠檄中河郎中吳大山淮徐道袁應泰築塞之四十年九月河決徐州三山口正河悉為平陸邳睢河水陡耗總河劉士忠檄吳大山等開挑引水河復故道四十一年塞三山決口四十二年六月河決靈璧縣陳鋪入冬淤平河流復故四十三年河決狼矢溝工部郎中王命禹督塞之四十四年五月河復決狼矢溝南河全考決水由蛤蟃周栁等湖入泇河出直口復與黄㑹運船入口迎溜稱艱河道陳薦檄中河郎中黄景章開武河等口洩水平溜後二年決口沙淤河復故道總河侍郎王佐加築月壩以為保障天啟元年河決靈璧雙溝黄鋪由永姬湖出白洋小河口仍與黄㑹故道堙涸總河侍郎陳道亨役夫築塞二年工竣七月河決睢寜縣諸口三年七月山陽外河決乾溝新河西河決馬湖牐月壩等處南河郎中朱國盛淮海道宋統殷等築塞之更於清口分水處建立磯觜以遏上流之勢四年六月河決徐州魁山隄東北灌州城一自南門至雲龍山西北天安橋入石狗湖一由舊支河南流至鄧二莊厯租溝東南以逹小河出白洋仍與黄㑹總河房壯麗題准大挑故道復加埽築塞之崇禎二年四月河決睢寜總河李若星請開邳州壩洩水入故道且塞曹家口匙頭灣逼水北注以減睢寜之患從之四年六月河決建義諸口灌興化鹽城六年三月御史吳振纓陳河隄修築𦂳要下部議行之附吳振纓疏略鳯泗之水淮近而河逺故歸仁一帯之隄防淮而不防河以睢寜上下舊築西北長隄數百里障河之横而束其流以歸於海此歸仁之外捍也向者漕運走徐邳則為漕䕶隄嵗勤修築以直河改運而急漕者視此隄為緩且邳州築其攔防羊山塞其分流水盡逼於睢寜有不容不決之勢矣故如餘堡雲堡露堡湯家園諸口先後俱決是向之准與黄至清河始合而今之黄水潰漫睢寜最下與淮合併浩渺無涯歸仁隄失其捍蔽而兼之黄強淮弱狂怒奔衝非一隄之力所能支故修歸仁而堅塞睢寕外隄之決口為治河之要著七年二月建義決口塞六月河決沛縣之滿壩及陳㟁水口又決長山隄口參議徐標率河防同知張俊英塞之徐州志先是懼河決㑹通也北築太行隄西起虞城界東抵沛縣復築縷隄用䕶太行西起虞城界東抵張村站又上自茶城下厯三山抵雙溝兩㟁長隄之上每三里設鋪一所每鋪設夫十名外更設遊夫巡邏協力防守江南通志卷五十
