  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2k0042_WYG_004-1a, image: WYG0507/WYG0507-0122a.png}
body:
  text: 江南通志卷五輿地志沿革表江蘇松常四府江寧府禹貢揚州之域春秋時吳地戰國屬越後屬楚秦屬鄣郡漢初屬荆國後屬吳又屬江都國元封初屬丹陽郡後漢因之孫吳自京口徙都建業號曰吳都晉平吳移置丹陽郡兼置揚州治焉元帝渡江因吳之舊建都於此改丹楊太守為尹宋齊梁陳因之隋平陳置蔣州大業初復曰丹陽郡唐武德三年置揚州七年改為蔣州八年復為揚州置大都督府九年揚州移治江都以金陵諸邑分屬宣潤二州至德二載置江寧郡乾元元年改為昇州又置浙西節度使治焉上元初州省大順元年復置光啟四年復置江寧郡唐季楊氏於昇州建大都督府五代梁朱温徙鎮海軍治昇州改為金陵府石晉天福三年南唐李氏改為江寧府謂之西都而以江都為東都宋復為昇州天禧二年升為江寧府建康軍節度建炎三年改為建康府置行都元為建康路至元二十三年自杭州移江南諸道行御史臺治此天厯二年改曰集慶路明初定都府治曰應天府後改南京府如故領縣八國朝為江南省城置江寧府𨽻江南布政使司康熈六年𨽻江南江蘇布政使司雍正八年以𨽻府之溧陽縣移屬鎮江府領縣七蘇州府禹貢揚州之域周泰伯仲雍始居之地武王封仲雍曾孫周章於此為吳國戰國屬越後屬楚秦為會稽郡治漢初荆國都此後屬吳江都國武帝時復為會稽郡後漢永建中始分浙江以西置吳郡三國屬孫吳晉宋齊因之梁分置信義郡陳置吳州隋開皇中廢郡改吳州曰蘇州因境内姑蘇山為名也大業初復曰吳州尋為吳郡唐武德四年復為蘇州置都督府屬江南東道天寶初又為吳郡乾元初復為蘇州尋分置長洲軍大厯中軍廢後唐同光二年吳越表建中吳軍宋仍曰蘇州吳郡太平興國三年改中吳軍為平江軍屬浙西路政和中升為平江府元至元中改平江路𨽻江南浙西道明改蘇州府直𨽻南京領州一縣七國朝因之𨽻江南布政使司康熈六年𨽻江南江蘇布政使司仍為治所雍正二年升府屬之太倉州直𨽻以嘉定崇明二縣屬之復析長洲吳江常熟崑山四縣為八共領縣九蘇州府長洲縣元和縣吳縣吳江縣震澤縣常熟縣昭文縣崑山縣新陽縣松江府禹貢揚州之域春秋時吳地戰國屬越後屬楚秦漢為㑹稽郡婁縣地後漢至隋屬吳郡唐屬蘇州天寶十載始置華亭縣屬吳郡乾元初復屬蘇州五代吳越錢氏改屬秀州宋因之慶元初屬嘉興府元至元十四年升華亭縣為華亭府十五年改松江府仍置華亭縣為屬至元二十七年分置上海縣𨽻江南浙西道領縣二明直𨽻南京嘉靖二十一年析華亭上海二縣地置青浦縣領縣三國朝因之𨽻江南布政使司順治十三年又分華亭縣地置婁縣領縣四康熈六年𨽻江南江蘇布政使司雍正二年增置金山縣分華亭上海青浦三縣各為二共領縣八松江府華亭縣奉賢縣婁縣金山縣上海縣南匯縣青浦縣福泉縣常州府禹貢揚州之域春秋時為吳公子札采邑後屬越戰國屬楚秦屬㑹稽郡漢初屬荆吳江都國尋屬㑹稽郡後漢屬吳郡三國吳分無錫以西置毘陵屯田典農校尉晉太康二年省校尉置毘陵郡永嘉五年改晉陵郡徙治丹徒永興元年析置義興郡東晉太興初又徙治京口義熈九年還治晉陵宋南齊因之梁又析江陰郡陳因之隋開皇中廢郡置常州大業初改毘陵郡唐武德四年復為常州天寶初又改晉陵郡乾元初又曰常州五代時屬吳南唐宋仍曰常州晉陵郡屬浙西路元為常州路𨽻江南浙西道明為常州府直𨽻南京領縣四成化七年以江陰之馬䭾沙置靖江縣領縣五國朝因之𨽻江南布政使司康熈六年𨽻江南江蘇布政使司雍正二年武進無錫宜興三縣各分為二領縣八江南通志卷五
