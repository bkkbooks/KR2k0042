字伯魯崑山人㓜有經世之志凡天文地理山經海籍靡不周覽嘉靖中島寇擾東南總制胡宗憲大帥戚繼光皆重若曾才事多諮決後以倭平議功論授錦衣職辭弗受所著有籌海等書陸一鳯字子韶常熟人嘉靖壬子舉人授泉州府同知奉臺檄討海寇林鳯大破之孫問禮字衷虚萬厯甲辰進士歴都御史巡撫南贛平九連山銅鼓嶂諸寇蔣夢龍字子徵長洲人嘉靖乙丑進士累官湖廣參議討大圍山賊擒其渠魁餘黨讋服復請置戍山麓以絶禍本同時吴江皇甫渙由進士歴廣東參議平苗亂及惠潮劇賊支可大字有功崑山人萬厯甲戌進士歴湖廣巡撫嘗降九服白泥諸寨又連破黄岑髙岩乾溪寶兒囤闢開京觀遂長驅入播七戰唐堡破板角關又三戰煉砰克苦菜關一時功績特偉尋致政歸同縣朱國輔字左車萬厯乙卯舉人明季以保寧府檢校署知瀘川州事力拒流寇有保境功移福州府檢校攝福清篆擒斬劇盜終開封府推官黄時雨字化之常熟人萬厯甲戍進士知惠州府平岑崗酋江月照之亂遷廣東副使再平海盜同縣趙隆美字文度以父用賢䕃歴叙州知府天啟初擊退叛酋奢崇明兵蕭應宫字觀復常熟人萬厯甲戍進士知東昌府擒劇賊散其黨備兵臨洮邊境不靖應宫盛暑擐甲張疑設伏敵不敢犯㑹倭躪朝鮮應宫以遼海道監東征軍兼程趨王京止退守鴨綠之議既而掲制府冒功奏㨗為所搆遂得罪陳禹謨字錫元常熟人刑部侍郎瓚子萬厯辛卯舉人歴官貴州參議黔師有事于匀哈禹謨奉命監軍先誘斬其謀主遂分兵㧞賊寨凡二十有一其一曰馬蹄有洞阻險賊所窟穴用火攻殱焉鑱石紀功而還陳必謙字益吾常熟人興寧知縣交曽孫交有㢘名必謙舉萬厯癸丑進士天啓中官南御史以疏論梃擊移宫二案及劾戚臣鄭養性削籍崇禎初起原官累擢都御史撫河南時流冦大熾必謙率兵援靈寶大破賊于朱陽山繼復有九臯山屹料鎮諸㨗頻挫賊勢歴工部尚書國朝何棅字與偕長洲人由崇明籍舉順治丁亥進士除邵武府推官攝福州府篆時閩師悉赴泉州經略厦門㑹城空虚海冦鄭成功率衆自海道襲福州巡撫宜永貴瘍發於首不能視事因素重棅才盡以城守諸務委之棅力請釋原任布政使周亮工於獄共扼險禦賊賊攻城十三晝夜棅竭力固守危城獲全入為户部主事歴江西提學僉事告歸卒子炯字倬雲煜字章漢並舉進士有名炯累官雲南僉事煜終南陽知府松江府明衛青字明德華亭人起軍伍積功官都指揮僉事備倭海上永樂中妖婦唐賽兒作亂攻安丘甚急青從海上率千騎晝夜兼行城下擊破之降勅褒美陞都指揮使進都督僉事以旱禱得疾卒登莱人立廟海上祀之子潁字源正以勇幹聞正統己巳之變從山東入勤王以功多擢都督同知出守宣府還領京營兵預奪門功天順元年陞左都督封宣城伯充總兵官守甘肅𦍑謀入寇連十二戰大破之又敗西番於凉州卒謚壯勇張祚字永錫華亭人景泰甲戍進士授御史遷廣東按察僉事㢘慎精密嶺表信服之㑹韓雍討蠻寇以祚有才識檄使從征大破靈山縣及髙㢘二州諸賊祚雖用兵不樂以武節見新興新㑹民多通盜東莞土豪倡亂皆解散之誅首惡而已擢河南副使致仕歸常州府晉孫無終晉陵人太元初苻堅方盛謝𤣥鎮海陵多募勁勇無終為前鋒每戰必勝號北府兵敵人畏之南北朝宋蒯恩字道恩南蘭陵人從討孫恩先登膽勇過人帝漸寵任之平京口定建業封都鄉侯從伐盧循斬徐道覆與王鎮惡襲江陵隨朱齡石伐蜀前後百餘戰錄功封新寧伯蕭思話南蘭陵人宋元嘉中為青州刺史時司馬朗之兄弟聚黨為亂討平之又為梁南秦二州刺史平氐帥楊難當悉收所侵地其後起兵應孝武用為中書令丹陽尹卒贈征西將軍開府儀同三司諡穆侯梁陳慶之字子雲義興人大通初除宣猛將軍渦陽之役與魏軍相持凡數十戰斬獲略盡奉詔送魏北海王顥還魏凡取三十二城顥乃得入洛還除右衛將軍出為北兖州刺史有妖僧攻䧟北徐州慶之討平之歴南北司二州刺史加都督破魏兵於淮上大同五年卒諡曰武慶之性謹慎善撫軍士得其死力魚天愍義興人𨽻陳慶之麾下攻魏滎陽天愍踰堞先登將士蟻附而上遂執其都督楊昱陳周文育字景德義興人𨽻陳慶之麾下與白水蠻戰身被九創慶之偉其節後從陳武帝戰白城抽槊䧟陣殺傷數百人以功封夀昌縣公終司空蕭摩訶字元印南蘭陵人驍勇有名大建中從都督吳明徹北伐深入敵陣斬將搴旗屢敗齊軍以功授譙州刺史歴官車騎大將軍周寶安字安民陽羨人父文育南征敗没起寶安為猛烈將軍領父舊兵仍令南討世祖深器重之及平王琳𠞰熊曇朗征留異並有功歴左衛將軍領衛尉卿卒諡曰成隋陳杲仁字世威晉陵人仕陳未久即乞歸養事繼母以孝聞隋大業中奉詔平長白山諸寇又剪東陽賊二十萬拜大司徒尋為沈法興所害屢見神于郡郡立廟祀之南唐封武烈大帝命徐鉉撰碑文唐衛逖陽羨人隋末游幷汾間唐初建義旗逖以武勇從軍虎牢之戰擒竇建德逖持挾槊劍前突後擁太宗見而竒之歴禁衛將軍以母老乞歸錢九隴晉陵人善騎射髙祖愛之嘗置左右義兵起以功授金紫光祿大夫及克京城拜左監門郎將累立戰功封郇國公歴官右監門大將軍卒諡曰勇陪葬獻陵薛士通義興人初仕隋為鷹揚郎將江都亂與州民嬰城拒賊武德初輔公祏反士通與其騎西門君儀戰敗之祏平封臨汾侯宋杜杞字偉長無錫人以祖鎬䕃補將作監主簿性豪邁遇事敢為歴廣西路安撫使白崖山叛酋䝉趕破環州攻桂管杞擊破其砦及五洞趕出降戮之擢天章閣待制錢之望字表臣晉陵人海陵督三十二總管南伐臨采石之望以策千虞允文允文行其策果大㨗乾道五年登進士第授江西帥屬賴文政猖獗俘之除知楚州募力士五百躬自訓閱大奚山盜起除秘閣修撰知廣州擊其舟師一時摧滅陞華文閣待制向士璧字君玉常州人紹定五年進士累官湖北安撫使知峽州合州告急赴援立功捐家貲百萬以助軍費開慶初涪州危以計斷浮橋奏㨗尋知潭州元兵圍潭急率兵解圍進兵部侍郎兼轉運使賈似道嫉其功為所害明胡忠字企周宜興人正德戊辰進士歴廣西參政劇賊王鏐土官岑猛戕守臣忠奉總制檄討之七日平鏐猛遂遁匿以功擢撫延綏致仕歸時無錫喻義由進士知南寧府土司爭立舉兵相攻義諭以利害即解散談愷字守敎無錫人父一鳯𢎞治壬子舉人應山知縣斷數年不決之獄擒劇賊愷舉嘉靖丙戍進士歴遷副都御史巡撫南贛汀漳招降贛賊李文彪殱海寇徐碧溪拜兵部右侍郎移鎮兩廣捕斬峒蠻五千餘人平之卒贈右都御史湯建衡字平仲宜興人嘉靖辛卯舉人授江西新城令流寇三掠境内兩薄邑城建衡預遷附郭居民入為堅壁清野計賊至躬親臨陣督兵拒敵屢戰皆㨗建衡生平以氣節自負尤長于議論馬濂字濬卿無錫人嘉靖庚戌進士令僊居倭寇黄巖將犯縣境濂擊走之歴守桂林從討洞猺以勞卒官時江隂陳臯謨以進士官南工部郎倭躙海上震畿輔謨督理南京城守亦以勤卒官趙大河字道源江隂人嘉靖丙辰進士授義烏令時倭冦兩浙特簡民壯督習騎射總制胡宗憲檄監大將戚繼光兵上功幕府累擢浙江僉事監軍如故練兵講武所拔部曲後皆為名將張夢時字伯可無錫人領萬厯癸卯鄉薦天啟中知安吉州擒劇盜葉朗生餘黨遷常德同知監偏沅征蠻軍歴山東運同禦登州叛卒之亂累著功績薛敷政字以心武進人萬厯丁未進士官御史按蜀土司奢崇明戕撫臣攻䧟䕫慶諸郡全蜀震動敷政便宜調兵固守成都三月中大小百餘戰危城得完又檄石砫兵赴援遂恢復諸郡再造兩川陳睿謨字常采武進人萬厯庚戌進士官御史忤執政外轉歴禹州兵備計擒巨冦擢撫偏沅討平峒蠻徐洪祚字式圍宜興人萬厯壬子舉人授程鄉令劇賊鍾陵秀等據銅鼓嶂勢張甚洪祚出竒計平之遷荆州府同知攝府篆流寇犯境洪祚擐甲乗城暑月不解帶者二十四晝夜賊始退陸卿正字廷表武進人天啓乙丑進士官福建參政海寇劉香老横甚卿正往謁廣督力言主撫之非并條上方畧督采用之香老焚死餘寇悉平同邑鄒忠允官福建參議與平海冦任允淳字還生宜興人天啓丁卯舉人授望江敎諭署邑篆流賊躙皖隣邑皆潰知望江有備引去後賊率衆數十萬力攻者再誓衆死守危城獲全歴遷兵部主事時無錫黄廣由貢歴安逺令亦有禦賊守城功堵允錫字仲緘無錫人崇禎丁丑進士由部曹為長沙知府山賊縱掠數敗官軍允錫督鄉兵破滅之又討殺醴陵賊魁以知兵名後死潯州徐調元字爾贊無錫人崇禎丁丑進士授黄岡知縣流寇至黄岡攻圍一月不克遁去官捕得盜三百餘人鞫之皆良民被刼者乃請上官誅其姦淫殺人者而釋其餘父憂歸起補金華許都為亂以宣大故帥房大成為謀主調元探其潛至城下設供張邀與計事遂縛斬以徇賊至一鼓破之搗其巢擒斬許都撫按交薦有旨召用時南都馬阮當國遁歸不仕趙德榮字臺侯武進人以嵗貢授仙遊令斗栳冦為亂德榮同張守備擒其魁李玉箴等繼殱其頭目四十六人斗栳冦以平章晉錫字用康武進人崇禎癸酉舉人特授户部主事出守延平有王銳頭者能驅草豆作人馬聚萬餘人入延界為亂晉錫設方畧擒滅之尋陞本省參政卒鎮江府明譚廣字仲𢎞丹徒人從成祖起兵積功為左都督鎮宣府正統時以守邊功封永寧伯卒諡襄毅廣奮跡行伍至大將大小百餘戰未嘗挫衂在宣府二十年邊徼帖然時稱名將張紹良字元貞丹陽人天啟壬戍武進士守備江口晉遊擊分鎮淮揚定髙寶湖中饑民之亂督兵徐州遏流寇後調廣東參將陞副總兵官移疾歸淮安府唐楊士林淮安人隋末朱粲擁衆二十萬掠淮漢間士林起兵攻之諸州皆應粲大敗士林率漢東四郡降唐髙祖以為顯州道行臺張雄漣水人僖宗時與里人馮𢎞鐸合兵渡江壁白下取蘇州遣别將趙暉據上元暉數剽江道雄擊殺之自屯上元詔授昇州刺史未幾卒雄善馭衆人思之為立廟宋扈再興字叔起淮人有膂力善機變每戰被髪肉袒徒跣揮雙刀奮呼入陣人馬辟易北兵屢攻棗陽再興數拒却之授神勁統制頻立戰功尋病卒子世達官都統制亦以名將稱明周于德世襲大河衛指揮歴靖州參將精勤明肅進右軍都督總兵江淮等處有功嘉靖乙卯倭犯浙統兵䕶糧運却寇金漕遷廣西鎮守撫𠞰猺獞功著嶺海揚州府南北朝宋陳憲廣陵人魏太武侵宋攻懸瓠甚急憲以參軍行汝南郡事戰士不滿千人嬰城固守書夜苦戰積屍與城平魏主乃還以憲為龍驤將軍吕安國廣陵人以建威將軍副劉勔征殷琰於夀春降之安國勲第一封鍾武縣男梁吕僧珍字元瑜廣陵人事梁文帝為門下書佐武帝臨雍州為中兵參軍委以心膂大軍次江寧使僧珍率精兵先登東昬將李居士来戰僧珍大破之武帝受禪為冠軍將軍封平固縣侯帝欲榮以本州乃拜南兖州刺史僧珍在任禮見士大夫平心率下不私親戚陳杜僧明字𢎞照廣陵人形貌眇小有膽氣善騎射陳武帝引為長史隨討侯景歴有戰功除南兖州刺史進爵臨江縣侯隋来䕶兒字崇善江都人好立竒節嘗嘆曰大丈夫當為國滅賊以取功名安能久事隴畝後以平陳功進位上開府從楊素李寛擊賊皆破之進位柱國兩將兵渡海擊髙麗封榮國公江都之難為宇文化及所害唐王式起子大中間為晉州刺史徙南安都䕶時忠武戍卒與交阯通夜圍城合譟式盡捕斬之除浙東觀察使平賊裘甫又定徐州銀刀軍亂晉尚書徙武寧節度使終左金吾大將軍明李義其先沛人家揚州父榮洪武初以彭城歸附義嗣千户累官指揮僉事從黔國公征安南至大安梅口與賊大戰力竭而死子敬永樂中統戎赴交阯戰功最多陳珪泰州人洪武初為燕山中䕶衛從燕王出塞為前鋒進副千户後從靖難積功封泰寧侯卒贈靖國公諡忠襄顧成字景韶江都人初侍太祖充帳前親兵累功佩征南將軍印平定貴州即命鎮守永樂初封鎮逺侯威震百蠻卒諡武毅曾孫溥嗣爵𢎞治時拜平蠻將軍鎮湖廣詔討都匀叛蠻富架誅之八掌前軍都督府事卒之日囊無餘貲曹義字敬方儀徵人宣德初平江西梅花洞賊正統間擢左都督僉事充總兵官鎮遼東㢘介有守遼人安之與兀良哈大小數百戰天順初封豐潤伯蔣貴字大富江都人從燕王起兵積功陞都指揮僉事宣德中討平松潘諸番佩平蠻將軍印鎮守其地正統初移師討阿台大破之封定西伯進侯孫琬嗣爵成化中帥京軍防秋大同宣府陳機宜十餘事皆報可琬子驥嗣侯歴鎮薊遼湖廣二十年家無餘貲許貴字用和江都人永新伯成之子正統時守備大同英宗北狩貴激戰士以忠義屢擊敗敵天順初以副總兵鎮守松潘詔便道先翦山都掌叛蠻連破四十餘砦賊逺遁貴亦感嵐氣卒子寧字宗道成化時充大同遊擊以功歴進都督同知大小百餘戰身被七十二創威名聞於異域仇鉞字廷威江都人世襲指揮同知以功陞指揮使充寧夏遊擊將軍驍勇敢戰正德間安化王寘鐇反鉞稱病不出隂約諸兵至河上從中發為内應而誘寘鐇黨周昻来視疾捶殺之即披甲上馬出門大呼諸兵皆集遂擒寘鐇械送京師論功封威寧伯以平流賊劉六等功進侯爵卒謚武襄彭天翔字鵬甫江都人萬厯癸丑武進士歴官副總兵討山東白蓮賊大㨗會魏璫建祠天翔不往拜被斥璫敗詔復其官王繩堯字又元江都人天啟壬戌武進士累官四川南路總兵土司奢酋犯順設計殄之大著威望徐州府漢夏侯嬰沛人數從髙帝戰有功賜爵至列侯封汝隂帝初起沛嬰常為太僕從竟髙帝崩以太僕事孝惠帝歴事髙后文帝皆為太僕卒諡文謝安下邳人順帝建康元年隂陵人徐鳯寇掠郡縣自稱無上將軍安應募率其宗親設伏斬之封平鄉侯度尚字博平沛人為上虞長莅政嚴明尚書朱穆舉為荆州刺史擊零陵桂陽諸賊悉平之封右鄉侯後為遼東太守破鮮卑逺人憚服三國魏劉岱字公山沛人以司空長史從魏祖征伐有功封列侯史渙字公劉少任俠有豪氣魏太祖初起以行中軍校尉從征伐常監諸將見親信轉拜中領軍吳張奮昭弟子年二十造攻城大車為步隲所薦昭以其年尚少奮曰昔童汪死難子竒治阿奮實不才耳於年不為少也領兵為將軍連有功封樂鄉亭侯晉劉牢之字道堅彭城人面赤紫色鬚目驚人沉毅多計畫太元初謝𤣥鎮廣陵以牢之領前鋒百戰百勝號北府兵北破苻堅南走孫恩累進都督征西將軍領江州事子敬宣智略不及父而技藝過之隨父征討所向有功歴遷征虜將軍青州刺史劉毅字希樂沛人少有大志不事生産桓𤣥反毅與劉裕何無忌起義兵討𤣥以匡復功封南平郡開國公兼都督宣城軍事尋轉衛將軍開府儀同三司江州都督後以貳於裕被攻衆散而縊南北朝宋劉懐肅彭城人武帝從母兄征孫恩有戰功為費令後為司馬斬桓振平江陵封東興縣侯弟懐敬懐慎懐黙俱顯懐敬子真道錢唐令有美政為刺史討破楊難當加建威將軍懐慎以平廣固及盧循功封南城縣男懐慎子榮祖以戰功參太尉從擊司馬休之與北伐俱以寡尅衆攻無堅城賜爵都鄉侯劉鍾字世之彭城人從伐孫恩從征廣固直入敵陣奪孟龍符之屍而還拒盧循追斬徐道覆封永新縣男朱齡石沛人家世將帥宋武帝以為鎮軍參軍伐蜀有功封豐城侯弟超石亦果銳累官中書侍郎到彦之字道豫彭城人宋武帝時屢立戰功進爵為侯佐守荆楚垂二十年後與檀道濟同討謝晦平之遷南豫州刺史鎮歴陽卒諡忠垣䕶之字彦宗下邳人父苗屯騎校尉䕶之氣幹强固宋文帝末領濟北太守戍淮隂孝武入討劭率所領馳赴帝以為冀州刺史及南郡王義宣反䕶之率軍擊魯爽累遷青冀二州刺史鎮歴城徵為右衛將軍於道聞竟陵王誕反廣陵即率部曲受沈慶之節度事平轉臨淮太守徙豫州刺史卒諡壯齊垣崇祖字敬逺䕶之弟子年十四有幹畧䕶之謂門宗曰此兒必大吾門後隨徐州刺史薛安都入魏尋又率門宗據胊山歸宋除北琅邪蘭陵二郡太守封下邳子及齊髙帝鎮淮隂以崇祖武勇善待之踐阼之初徙為豫州刺史敗魏兵于夀春又大破于下蔡唐路審中徐人崔彦知其能任用之彦遇害審中賂守卒斂藏其尸張元稔攻徐州審中率死士應官軍遂破之官至嵐州刺史擢右羽林將軍劉沔字子汪彭城人父廷珍以戰功封東陽郡王太和中沔為神䇿將遷大將軍擢涇原節度使突厥刼營田沔擊之無一轡還者㑹昌初拜河東節度回鶻冦雲州沔大敗之功加檢校司徒徙忠武節度使石雄徐州人少為牙校敢毅善戰從王智興討李同㨗先驅鼓行無前會昌初回鶻入寇詔雄為天德防禦副使兼朔方刺史佐劉沔屯雲州迎還公主進豐州防禦使討劉稹越烏嶺破賊斬獲多雄臨財㢘每朝廷賜與輙置軍門自取一疋縑餘悉分士伍衆咸感奮武宗曰今將帥義而勇罕雄比者後拜神武統軍卒劉巨容徐州人為州將龎勛反巨容自㧞歸授埇橋鎮遏使浙西王郢反攻明州巨容以筒箭射郢死擢明州刺史徙楚州黄巢亂江淮授招討副使累破巢進南面行營招討使封彭城縣侯為田令孜所殺時溥彭城人為州牙將黄巢亂僖宗命溥為武寧節度悉師討之連戰輒克逐尚讓於太康以破賊功第一加檢校司徒累遷太子太師與朱温搆怨戰不勝登燕子樓自焚死五代梁朱珍蕭人從太祖創立軍制選將練兵甚有法度嘗敗黄巢破秦宗權東并兖鄆勇出諸將右拜淄州刺史後擅殺李唐賔縊死金曹珪徐州人大定初州人江忠作亂珪子弼成在城中珪謀誅忠並弼殺之金主云赤心為國大義滅親特進三官於正班用之元匡才睢寧人仕金為武略將軍歸元授沂邳東河監軍袁萬作亂大破之加兵馬使徐守張名叛復敗之進元帥後宋兵大入境戰不利死之子國政明倪寛邳州人精武藝元末糾集民兵歸附太祖累立戰功官至後府都督僉事薛顯蕭人少通韜畧膂力絶人元末大亂顯斂兵自衛至明初率所部来歸附擢親軍都指揮分鎮江西從征荆楚遷右丞從大軍北定齊魯燕冀論功封永城侯卒贈永國公諡桓襄陳政邳州人洪武初集兵從征驍勇過人所向有功累遷中府都督傅友德其先宿州人徙居碭山為太祖將擊陳友諒破張士誠伐蜀累建功封潁川侯明昇既降太祖稱友德功第一又討雲南定蠻地進封潁國公每戰必先士卒身被創流矢中頰洞脅戰愈力馬榮徐州人由永清衛所鎮撫從燕王征伐轉戰積功至右都督永樂中卒追封景城伯諡壯武張欽睢寧人以騎士從燕王起兵累功為都督僉事卒追封新泰伯陳敬碭山人閑韜畧永樂中以戰功官至中軍都督僉事出鎮山海永平法令嚴明軍民懐服山雲徐州人父青以靖難功累官都督僉事雲襲金吾左衛指揮使宣德初佩征蠻將軍印鎮廣西時溪峒猺獞數為患雲至先後大戰十餘蠻悉平築九堡四城威惠並著遷右都督雲勇鷙有謀端潔不茍取土人愛之正統時卒於鎮贈懐逺伯諡忠毅劉榮宿遷人初冒父名江𨽻燕邸驍勇多智略永樂初積功為總兵官鎮遼東倭冦大至榮依山設伏潛燒賊船舉旗鳴礟伏兵起賊大敗餘衆奔船已燬亦就縛自是倭大創不敢復入遼東封廣寧伯始更名榮卒贈侯爵諡忠武子安嗣楊銳字進之蕭人嗣世職為南京羽林衛指揮累遷都指揮僉事守備安慶宸濠叛圍安慶銳悉力守禦久而圍解世宗立論功進左軍都督僉事充總兵官鎮遼東朱賢政蕭人㓜讀書好騎射崇禎癸未應將材選授守備領後勁營兮防徐邳有安撫兩河各寨功晉遊擊國朝順治二年四月大兵南下城破死國朝吴汝球字来伯徐州人弱冠為諸生值流冦侵掠練民兵保䕶鄉里嘗以計擒偽官順治初從大軍定淮安授廟灣同知有招降功尋改通判寧波監造戰艦平大嵐諸山寇未幾移疾歸居鄉三十餘年凡郡中有徭役興建及旱潦災祲之事輒首出金錢為倡年九十卒汪廷對字迪宸碭山貢生有禦侮才順治初碭邑寇亂制府命領鄉營防禦有狂徒猝起據邑叛廷對不待大兵至先撲滅之制府嘉其績欲薦授官廷對以養親辭廷對又嘗修聖廟及城角樓敵臺有功於鄉韓元朗字熙子徐州人康熙九年武進士從征逆藩靖海冦克復處州江山諸邑夜襲仙霞關降其將平福州署遊擊守泉州被圍衣甲不解者數月卒保其城累陞浙江金華副將乞歸卒袁鈐徐州人康熙辛未武科榜眼以侍衛從征噶爾旦立功世襲拖沙喇哈番累遷總兵都督同知誥授榮祿大夫推恩其母董氏聖祖御書萱庭晝暖四字賜之太倉州明張洪字宗海太倉人本侯姓㓜撫于張嘗以鄰家事連坐戍雲南黔寧王一見器重用其策平木邦之亂永樂初為行人出使日本再使吐蕃㑹緬甸宣慰􅄼羅塔殺孟卷宣慰刁木旦而據其地洪奉詔詰責凡六往返始復命後以修撰致仕杜門著書者數年乃卒徐瑄字子敬嘉定人正統間進士以御史巡京畿按川廣所至有聲巡撫延綏四戰俱㨗璽書奬勞後以疾致仕王倬字用簡太倉人成化戊戌進士歴知餘干縣值贛盜殺永豐令檄倬往𠞰賊據山險人莫敢進倬夜縱羊千頭於山下鼓譟從之賊發矢石殆盡比曉進兵平之擢南臺御史屢劾朝貴無所避改瓊州兵備時生黎為梗倬聲言出兵而數移師期以怠賊忽乗問進搗盡平其巢黎以永戢旋進右副都御史巡撫順天屬縣大饑倬奏請通州米十萬以賑又恐轉輸遲費許在邊官軍預支兩月糧俸益以僦直移官軍所在糧俸散饑民全活萬計仕至南京兵部右侍郎凌雲翼字洋山太倉人嘉靖丁未進士萬厯初以兵部左侍郎提督兩廣軍務討平諸賊進征羅旁羅旁界東西兩山問延袤七百里每阻險剽掠雲翼大集兵四月克之鄰境猺獞皆慴伏奏設官戍之積患頓息又捕斬大廟諸山賊嶺表悉平遷尚書總督河道加太子少保以病歸海州晉劉遵字慧明海西人為荆州都督劉道規諮議追斬盧循黨荀林於巴陵徐道覆寇荆州道規使遵為遊軍拒之及道規前鋒失利遵自外横擊大破之歴淮南太守追封監利縣侯明厲達海州人永樂間將兵征西涼取三十餘城西涼平遷都指揮鎮守其地卒張瀛海州世襲千户有謀畧正德間流賊連嵗攻刦屢擒斬之賊畏懼稱曰海張及守邳州賊數萬攻城瀛率五十餘騎直當其衝連發三矢三中渠首賊衆驚曰海張至矣遂遁去州民獲全通州明陳大壯字思立通州人嘉靖壬戍進士以刑部郎出知敘州府督餉𠞰九絲蠻時積雨山險不能進㑹九日大壯偵知蠻俗重賽㑹乗夜進兵懸絙而上殺獲無筭拓地五百餘里晉山東參政乞歸養郭師古字時用如臯人性英敏通知武事萬厯丁丑進士由郎中出知廣州平土酋半天雲之亂擢甘肅兵備晉陜西左參政罷歸著百將傳籌邊紀畧八陣圖說諸書國朝馮用表字春華通州人性機敏有膂力明季積功至總兵官順治二年大兵南下隨貝勒東征駐守衢州改鎮台州次第削平金華紹興山寇皆有功江南通志卷一百五十一
