  text: 江南通志卷一百八十七人物志列女完節六鳳潁二府滁和廣六泗五州鳳陽府元倪文昌妻聶氏臨淮人程寛妻孫氏臨淮人范道和妻丁氏臨淮人明繆堂卿妻杜氏鳳陽人倪文妻聶氏鳳陽人龍瑾妻吳氏鳳陽人范通妻丁氏鳳陽人陳萬言妻錢氏鳯陽人吳淳妻盛氏鳯陽人以上洪武年旌李景釗妻王氏臨淮人夫亡撫孤避兵淮安備歴艱辛苦節三十八載事聞旌表詹奎妻周氏臨淮人永樂間旌章􅁮妻王氏媳俞氏臨淮人共帷苦節奏聞旌表劉錫妻張氏靈璧人正統年旌庠生周鑑妻張氏虹縣人舉人顧升妻吕氏夫卒無嗣守節終身臨淮人楊懷妻閻氏臨淮人金鉞妻錢氏臨淮人秦七妻王氏定逺人陳貴妻馬氏定逺人孫成妻楊氏本錢塘人流寓定逺成卒遺孤凱甫兩月氏奉孀姑撫孤備嘗艱苦方亮妻陳氏宿州人年十八亮卒紡績自給撫遺孤既娶而又夭氏守益堅事聞詔旌其門張漢賓妻趙氏靈璧人以上弘治年旌常夀妻趙氏夀州人史瓚妻劉氏宿州人庠生包信妻王氏定逺人生員田華妻黄氏鳯陽人生員李冠妻朱氏鳳陽人以上正徳年旌薛英妻段氏鳳陽人褚文蔚妻岳氏鳳陽人黄枱繼妻宋氏鳳陽人趙泰妻鄭氏夀州人衛指揮吕夾鐘繼妻李氏宿州人生員張玿妻左氏宿州人夫亡氏自縊救蘇撫嗣子成立苦節歴五十餘年蔣宗妻陳氏宿州人生員司文昌妻蔡氏宿州人生員彭雲程妻吕氏宿州人王繼盛妻楊氏宿州人王宗顯妻莫氏臨淮人年二十五宗顯卒子鈺甫二嵗氏撫鈺成立娶陸氏生誥三嵗鈺又卒氏偕媳苦節育孫成立沈謙妻周氏臨淮人夫死無嗣氏苦志奉姑姑病癱氏寢食俱廢歴七年如一日衛千户陸卿妻楊氏臨淮人黄永泰妻潘氏臨淮人俱嘉靖年旌潘麟妻楊氏臨淮人鎮撫趙昇妻謝氏臨淮人趙憲妻吳氏臨淮人廩生吳璋妻周氏臨淮人庠生張永爵妻王氏定逺人蔡蕣妻湯氏定逺人俱嘉靖年旌庠生陸璋妻鄒氏定逺人適璋未期璋病篤氏年十六齧指與夫訣誓不再適璋卒兄憐少寡無嗣欲奪其志氏即號泣拒之苦節以終袁珵妻賈氏定逺人宋經妻施氏定逺人馮時泰妻劉氏靈璧人李邦文妻王氏靈璧人解麟妻賽氏靈璧人解語妻張氏靈璧人語亡氏經以殉亟救得免苦節七十年戴貢妻注氏靈璧人王鳴鳳妻俞氏靈璧人朱應高妻王氏弟應尚妻吕氏俱靈璧人共帷守節蔣勁妻田氏靈璧人王義妻隂氏靈璧人許昻妻顧氏懷逺人薛環妻徐氏懷逺人閔相妻高氏懷逺人薛桐妻吳氏懐逺人學訓富珍繼妻楊氏懐逺人曹鳳妻陳氏懐逺人吳瑶妻何氏懐逺人瑶死氏年二十五家貧女紅度日撫孤孤殤復撫孫成立年八十餘卒庠生許泮妻某氏懐逺人劉相妻許氏懐逺人周棟妻黄氏懐逺人何志妻華氏懐逺人夫死舅姑憐其少欲嫁之斷髪求死乃止知縣申聞賜扁旌之薛侃妻朱氏懐逺人袁鑰妻楊氏懐逺人年二十適鑰生子和方一嵗而鑰卒氏乃毁容苦守和方又早卒撫孤孫成立孀居四十餘載李璋妻張氏懐逺人周黨妻陳氏懐逺人劉喬妻許氏懐逺人何橘妻許氏懐逺人高鳴鳳妻王氏夀州人夫亡撫稚子攀蟾亦早卒與其媳顧氏共守苦節庠生萬邦傑妻孫氏虹縣人隆慶年旌趙寵妻徐氏懐逺人丁思臯妻任氏懐逺人百户戴彬妻李氏鳳陽人彬亡遺腹生紹印氏苦志撫育成立後紹印征倭死于王事萬歴年詔旌其門州守禦沈光先妻梅氏宿州人諸生李呈秀妻丁氏宿州人夫亡撫孤孤又早亡撫稚孫成立年登八十卒衛指揮吕兆渭妻張氏宿州人監生李玠妻張氏宿州人例監申順妻秦氏宿州人楊淳妻郭氏宿州人指揮同知吕應鐘妻淩氏宿州人陳子昻妻楊氏子瑞妻陳氏宿州人楊年二十六夫死撫子瑞長娶媳陳氏年二十四瑞又亡姑媳相依一門雙節程百母孫氏宿州人夫殁遺腹生百食貧茹苦撫百成立百孝事孀母母年九十卒百竭力營𦵏廬墓三年感巨蛇潛來蜿蝘相依人咸異之布政司經歴李百裕妻武氏宿州人徐梁妻楊氏宿州人梁殁楊苦志撫孤先是梁弟芳及婦相繼而卒遺子應時楊為撫育婚娶析産如己子應時又卒遺孤甫匝月楊仍收同舍育之司城趙登雲妻張氏宿州人崔信妻鄭氏夀州人王思徳妻郝氏夀州人劉瓚妻郭氏夀州人黄毅妻雷氏夀州人中書李高妻鄭氏夀州人百户張瀚妻戈氏夀州人庠生黄元吉妻宋氏夀州人于歸一載元吉死氏未有出號泣入井得家人救免越數年貧不能自存擕木主歸母家苦節以終楊自嚴妻王氏夀州人湯克勤妻朱氏夀州人貢生貝為琦母劉氏夀州人謝翀妻潘氏與媳王氏俱夀州人撫孤孫成名毛鏜妻柳氏夀州人李珍妻張氏夀州人張錦妻謝氏夀州人吳琇妻周氏夀州人御史呉介妻鄭氏妾趙氏俱夀州人介亡鄭年二十五趙更少同矢志撫孤白首相依苦志終身王鋐妻宋氏夀州人胡鍾妻江氏夀州人吳僑妻錢氏夀州人吳寅妻周氏夀州人周輔妻許氏夀州人百户槐䕃妻張氏夀州人庠生謝先祐妻林氏夀州人劉臨生妻方氏夀州人陸自成妻高氏夀州人柳子振妻趙氏夀州人朱永泰妻柏氏夀州人張振翼母吳氏夀州人何光宙妻袁氏懐逺人梅合妻房氏懐逺人生員許武妻金氏懐逺人何冠妻袁氏懐逺人潘渭妻黄氏懐逺人王聘高妻范氏懐逺人年二十夫殁遺孤甫週嵗氏守節撫育艱苦萬状子又夭復撫孤孫成立許髦期妻蔣氏懐逺人生子襄明甫四月夫殁氏年十九苦節撫幼孤成立子死同媳何氏撫孫娶石氏孫又卒三世苦節得邑令申請旌之省祭官劉嵩妻梅氏懐逺人年二十寡撫孤成立王鈿妻楊氏懐逺人年二十四夫死家貧或勸他適氏自嚼磁盞碎口血淋漓昏暈仆地後撫孤成立卒年七十三陸朴妻宫氏懐逺人王成妻蔡氏懐逺人劉孜妻江氏懐逺人髙昇妻岳氏懐逺人劉梓妻盧氏懐逺人