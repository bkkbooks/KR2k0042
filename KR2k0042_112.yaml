body:
  text: 江南通志卷一百十三職官志名宦二江蘇二府分轄江寧府周伍尚楚人伍奢子為棠邑大夫杜預左傳注漢蔣子文廣陵人漢末為秣陵尉逐盜至鍾山下被傷而死後有見子文於道者侍從如平生以為神而祀之代著靈異金陵志晉溫嶠字太真祁縣人王敦忌嶠請為左司馬嶠繆為綜其府事㑹丹陽尹缺嶠薦錢鳳鳳亦推嶠嶠僞辭之敦不從表嶠丹陽尹得還都具奏敦逆謀請預為之備及敦構逆加嶠中壘將軍持節都督東安北部諸軍事王含錢鳳奄至都下嶠燒朱雀桁以挫其鋒賊不得渡率兵擊王含敗之復督劉遐追錢鳳於江寧事平進號前將軍晉書本傳褚翜字謀遠陽翟人成帝時遷丹陽尹時京邑焚蕩人物雕殘翜收集散亡甚有惠政晉書本傳劉惔字真長相人永和中丹陽尹為政清整門無雜賓晉書本傳羊曼字祖延南城人代阮孚為丹陽尹蘇峻作亂加前將軍守雲龍門王師不振或勸曼走避曼曰朝廷破敗吾安所求生勒衆不動為峻所害晉書本傳庾和字道季鄢陵人升平中尹丹陽表除重役六十餘事晉書本傳王雅字茂達郯人孝武時左衛將軍丹陽令性好接下敬慎奉公孝武深加禮遇晉書本傳劉超字世瑜臨沂人元帝時句容令推誠於物為百姓所懷常年賦稅主者四出詰評百姓家資超但作大函使各自書家産投函中依實投課所入有踰常年晉書本傳范廣字仲將順陽人元帝時令棠邑邑丞劉榮繫獄當死家有老母至節廣輒聽暫還榮亦如期而返歲旱米貴廣散私穀賑饑遠近歸之南畿志南北朝宋劉穆之字道和莒人劉裕委以心腹之任義熙八年丹陽尹纍遷尚書右僕射轉左僕射尹如故穆之內總朝政外供軍旅決斷如流事無壅滯宋書本傳謝方眀陽夏人永初中尹丹陽有能名所至承代前人不易其政宜改者則以漸移變使無跡可尋宋書本傳沈璞字道真武康人秣陵令京邑號為難治璞以清嚴制下端平待物奸猾斂手宋書自序蕭摹之南蘭陵人宋元嘉中尹丹陽上言佛入中國已歷四代形像塔寺糜損無極請自今欲鑄銅像及造塔寺皆列言須報乃可文帝從其請南史何尚之字彥德灊縣人元嘉中為丹陽尹於南郭外立學聚生徒遠近慕道來遊謂之南學宋書本傳劉秀之字道寶莒人元嘉十六年除建康令善糾擲微隱政甚有聲大明二年遷丹陽尹時宫禁市物不時給值秀之以為非宜陳之甚切宋書本傳齊劉懷慰字彥泰平原人齊高帝時為齊郡太守修治城郭安集居民墾廢田二百頃決湖灌溉不受禮謁民有餉新米一斛者懷慰出所食麥飯示之曰且食有餘不煩此後卒明帝謂徐孝嗣曰懷慰若在朝廷不憂無清吏也齊書本傳梁樂法才字元備淯陽人梁天監中令建康不受俸秩比去官縣曹啓輸臺庫武帝嘉其清節曰居職若此可以為百城表矣梁書樂藹傳孔休源山隂人為建康獄正辨訟折獄時無寃人後有選人為獄司者高帝尚引休源以勵之梁書本傳江革字休映考城人天監中建康令為治明肅豪强憚之梁書本傳孫謙為句容令清慎强記縣人號為神明梁書本傳陳司馬申字季和溫縣人陳大建九年除秣陵令以清能見紀有白雀巢縣庭陳書本傳蕭引字升休南蘭陵人後主時令建康宦官李善度蔡脫兒等多所請屬引一切不許曰吾立身自有本末安能為李蔡改行後竟坐免陳書本傳唐盧祖尚字季良樂安人武德中為蔣州刺史有能名唐書本傳岑仲林鄧州人中書令文本孫為溧水令以政績著聞時兄羲令金壇仲翔令長洲皆有聲而仲林尤見表樹宰相宗楚客屬監察御史曰勿遺江東三岑唐書岑文本傳竇叔向金城人以左拾遺為溧水令政績為諸邑冠南畿志白季康太原人令溧水溫恭誠信貞白威嚴邑人祀之南畿志宋賈黃中字媧民南皮人太平興國二年知升州為政簡易部內稱治一日潛行府署見一室扃鑰甚固啓視得黃金數十櫝乃南唐李氏宫閣中遺物也即表上之宋史本傳元絳字厚之錢塘人明道初調江南推官攝上元縣捕置豪民王豹子於法有婦告夫為人所殺絳廉得婦與僧奸狀皆伏法安撫使范仲淹表其才宋史本傳張詠字復之鄄城人真宗朝知升州秩滿州民願借留即授工部尚書仍留升州賜詔褒奬宋史本傳薛映字景陽蜀人真宗時知升州建言州以牛賦民出租牛死租不得蠲帝覽章矍然因令諸州條奏悉蠲之宋史本傳薛顔字彥回萬泉人知江寧府事邏者晝劫人反執平人以告顔視其色動曰若真盜也械之果引伏宋史本傳張奎字仲野臨濮人時江寧府廨諫官言宜擇才臣繕治之以奎知江寧府奎簡材鳩工不踰時復完宋史本傳沈遘字文通錢塘人通判江寧府奏本治論仁宗嘉之宋史本傳蘇頌字子容丹徒人仁宗時知江寧縣時建康承李氏後賦稅圖籍散失每發斂高下多出吏手頌剗剔夙蠧成賦一邑簡而易行諸令視以為法至領其民拜庭下以謝民有忿爭頌諭以鄉黨宜親善民往往謝去或半途思其言而止宋史本傳馮京字當世江夏人嘉祐五年知江寧府事至即據案推究不以付獄一無壅滯人服其敏宋史本傳程皓字伯淳河南人嘉祐八年上元主簿為令畫法均田稅攝邑盛夏塘堤大決法當言之府府禀於漕然後計功調役非月餘不能興作皓曰如此苗槁矣民將何食救民獲罪所不辭也遂發民塞之歲則大熟運卒病者舊為營以處歲數百人至者輒死皓察其由蓋既留然後請於府給券乃得食比有司文移具則困於饑已數日矣皓白漕司給米貯營中至者與之食自是生全者大半茅山有龍池其龍如蜴蜥而五色自昔嚴奉以為神物皓捕而脯之使人不惑其始至見人持竿黏飛鳥取其竿折之自是鄉民子弟不敢畜禽鳥不嚴而令行大率如此宋道學名臣言行録朱定國廬江人神宗時令六合王安石方行水利有建議開馬昌河通滁州者提舉官從之定國言壞民廬舍勞民筋骨費大利微固持不可使者不悅屢困之卒不變南畿志曽肇字子開南豐人元祐間知江寧府肇儒者有吏才文學法理咸精能在郡多美政時遍稱之宋史曽鞏傳沈錫字子昭真州人徽宗時歷知江寧府朝廷疑張懷素之黨有脫者江淮間多誣告錫具疏於朝繫者皆得釋宋史沈銖傳楊邦乂吉水人建康府教授改知溧陽㑹叛卒周德據府城邦乂設計擒之以勞授通判建康建炎三年死節事聞贈直祕閣即死所立廟賜額褒忠宋史忠義傳趙鼎字元鎮聞喜人紹興二年知建康府事時孟庾韓世忠皆駐軍府中多招安强冦鼎素剛正庾世忠咸加禮敬兩軍肅然民得安堵宋史本傳李朝正紹興間知溧水有異政秩滿民號泣遮留高宗乃召遷一官賜五品服遣還金陵志吳琪紹興間令句容時軍事方殷供給絡繹琪上不違令下克撫綏閭井晏然弦歌滿耳南畿志劉珙字共父崇安人淳熙二年知建康歲祲奏蠲夏秋額稅禁止上流遏糴得商米三百萬斛又貸錢出糴得米四萬九千斛籍户高下給米有差兼運米村落置場平糶闔境無捐瘠流徙者卒於官百姓罷市巷哭立祠祀之南畿志趙時侃金壇人慶元四年為句容令初縣有增科和買之弊民甚困侃狀其事豁之又修學舍取沒官田以養士邑人祀之學宫金陵志黃度字文叔新昌人嘉定初知建康罷科糴輸送之擾活饑民無算除見稅二十餘萬招歸業者九萬家宋史本傳馬光祖字華父金華人寶祐三年知建康府始至官即以常例公用器皿錢二十萬緡支犒軍民減租稅興學校既去而民思之開寶元年再知建康士女相慶光祖益思休養民力知無不為移書賈似道言公田法非便乞不以及江東召赴行在又以沿江制置江東安撫使知建康民為建祠六所三至建康終始一紀威惠並行百廢具舉宋史本傳程洙休寧人淳祐時上元主簿元兵入建康自經死南畿志元嶽天貞冠氏人大德十年為建康路總管歲饑發粟賑給民賴以全郡中立碑紀德江寧府志王䝉保定人大德間知江寧修築墟堤以政績聞江寧府志程恭泰定間尹句容以撫字為政除民所不便者治後有廢址恭植桑萬株民趨效之有古循吏風句容縣志趙靖至大中為句容令首建學校縣額歲辦紅花民苦之靖以非土産請於上獲免句容縣志明吳裕洪武間為溧水令有聲上作褒賢頌送之溧水縣志高謙甫平陽人洪武初知溧水以廉能稱舊通志郭雲隨州人洪武初令溧水兵燹之後邑頗凋敝雲至百廢具興而持以廉潔士民胥悅江寧府志陸梅中江人洪武五年為六合令首新學宫次及壇墠亭塔百廢具舉民不告勞六合縣志顧佐太康人永樂十八年為應天尹公廉有威重一時勳貴豪猾皆為斂手時方之包拯云鄭曉名臣記薛均蘄水人永樂中授應天府尹廉明持正買地種蔬旦暮荷鋤往耘文皇密使人廉之得其狀笑曰人皆行樂惟朕與均苦耳江寧府志陳奐慈溪人知扶溝擢督府都事以赤縣煩劇須幹理改上元有婦殺其夫者奐夢中有所見輒於喪次捕婦鞫得其情人以為神江寧府志鄺野字孟質宜章人宣德十年為應天尹一以養民為務凡市征田稅皆酌其平豪黠不得為輕重公私便之鄭曉名臣記嚴迪餘姚人宣德中令江浦氷雪自矢歷九年終始一節考滿歸裝惟圖書數卷家仍茅茨人皆高之江浦縣志李文煥廣靈人宣德中授江浦縣丞起庠序徙壇壝修舉廢墜𢎞治中知縣胡昉祀之於尊賢祠江浦縣志黃淵洧水人正統中令六合歲蝗淵䖍禱蝗不為災蒞事執法不通關節時人以板黃稱之六合縣志彭烈字肇烈廬陵人景泰時令江浦廉介端詳政通民和南畿志劉義字循道諸城人天順初句容丞進知縣除奸息訟設社養老治民婚喪以禁奢靡民皆化之南畿志林春字孟陽萬全衛人天順中為應天府馬政通判攻駒考牧恪盡乃心每行縣較閲止食公廩一毫不以優民於公廨蒔蔬自給其清操如此江寧府志于冕字景瞻錢塘人忠肅謙之子成化時為應天府尹興利鋤弊一以仁愛為心雖罹家難而聲聞不隕人皆稱之江寧府志魯崇志字懋功天台人成化十年為應天尹先是七邑阻饑逋賦數萬石崇志勸貸以輸而賑其貧者中貴王敬怙勢以鹽二萬引懇鬻規利崇志厲色拒之江寧府志徐廣曹州人成化間知句容扶植貧弱興起士風南畿志李澄字天映西華人成化間為句容令心存仁恕政尚清勤句容縣志唐詔字廷宣陽信人成化間知六合縣甫下車謁城隍廟誓於神以貪汚為戒蒞任九年食不重簋時稱廉吏第一六合縣志吳雄仁和人𢎞治十四年為應天尹風局嚴整以肅清為任時大璫怙勢裁之以法嘗曰任怨吾不辭但勿至瘠吾百姓耳江寧府志王震字威遠邢臺人宏治十六年擢應天府尹奏罷上元江寧花園夫千餘人省諸官寺獄具銀千餘兩核江灘蘆葦千餘頃以佐赤縣里甲費江寧府志冦天敘字凃水榆次人正德間擢應天府丞時武廟南幸供億浩煩天敘處之有方江彬寵冠一時百司賀生辰四拜天敘獨長揖彬銜之偵其私無所得每日小帽一繖坐堂上自供應朝廷外毫不妄費彬有所需天敘曰倉庫久虗百姓窮苦無可措辦府丞所以微服待罪專候拿問耳彬亦曰冦公真君子也於是他嬖幸皆斂迹中外皆服其才力治務民事興學均賦休息地方嘉靖初查舉七事如神帛堂匠十庫花園進解船隻等項冗役冗費一旦裁革歲苦饑竭力賑給疫作親行巡視給藥以救江寧府志萬廷珵字欽之安福人正德間知六合流亡之後立九等法以均財役至今稱便六合縣志王爌字存約黃巖人嘉靖初應天尹時賦徭繁重富人多投內監神帛堂以避而積纍貧者爌奏革織匠銅竹匠守庫薪夫等八百餘人裁齊庶人供億他如議罷京邑種馬發內帑絲織神帛內府局監不當索用紅站船隻輕荒稅蘇流亡等疏數十上皆切時病暇更拔諸生異等者課之有京兆遺愛録傳世江寧府志楊璨字仲玉華亭人嘉靖中應天府丞數署尹篆節財賦平物價都人稱便故事仇家多假手獄卒甘心繫囚璨時巡獄中令凡囚有病非纍藥不效勿狀全活甚衆江寧府志劉自强嘉靖中為應天尹操持嚴峻歲旱撤蓋步禱甘雨如注試士日置火爐於堂有私札即引而焚之江寧府志龎嵩字振卿南海人嘉靖間為治中屢攝府事歲凶督賑誠意懇惻全活六萬有竒部民苦役重嵩議寬之江寧葛仙永豐二鄉數有水患居民裁餘七户嵩築堤闢萊流移盡還江寧府志程㸅字文純南城人嘉靖間知上元廉幹有治才善政為諸邑最考滿日囊止俸金七兩自騎一驢二蒼頭隨之糧長許翺等持八十金候於大栁驛進之㸅笑曰好良民恐父母饑死耶持歸訓子孫讀書可也取其馬鞭鞭驢而去上元縣志房韞玉字以輝靈石人嘉靖中令上元時坊廂積弊年久韞玉力申諸司節之民得蘇息為建惠澤祠祀焉上元縣志劉啓東字伯陽羅山人嘉靖中授高淳縣令時淳民苦於養馬啓東善為經畫後得均之宣城至建學宫起各署設壇社築七門百廢具舉高淳縣志甘惠崇陽人嘉靖中令高淳有善政治西有渡惠易為梁民稱之曰甘棠橋高淳縣志徐九經一名九思貴溪人嘉靖中知句容清介愛民嘗圖一菜於壁上曰吾民不可有此色士大夫不可不知此味廣輿記何宏字道充廣東人嘉靖中令六合廉潔自矢蒞事詳明貴戚與豪民訟久不決當道屬之處斷皆懾服嘗決戍囚御史三駁而三執不改京尹稱其清慎勤一字不少江寧府志鄧德昌字順之廣東人陳獻章弟子為京學司訓以實行誘進諸生無敢操贄及門者嘗歎曰士始入黌舍如處女然而我輩首以利導之欲成人材正風俗得乎江寧府志鄭汝舟字宜濟莆田人嘉靖中應天教授誨迪多士必約之矩矱寮友有講學者汝舟曰六經語孟聖賢心印熟讀而躬行之即學也何以唇吻標異哉江寧府志汪宗尹字子衡崇陽人隆慶初為應天府尹條畫上元江寧徭賦歲省萬餘金著為額諸濫差為民害者皆奏罷之江寧府志劉應雷萬安人隆慶三年知溧水時傍邑有以糧數千石規移溧水者應雷力爭當路盛氣臨之執益堅事竟得直又丈量田畝因高下制賦被召去卒於塗民立祠祀之溧水縣志徐申字維嶽吳縣人萬歷中擢應天尹時御府傳造龍旗帘屏諸供具費巨萬無所措手申乃增置錢局鼓鑄以贏金充之裁減各科派妄費民力得紓帑藏錢糧出入故稱難核申立指掌册綱目井井數延見鄉先達問民疾苦及利害興革所宜故周知而善應云江寧府志黃承元字與參秀水人萬歷二十年授應天尹下車首咨民瘼亟議興革時届賓興供億悉出帑金市廛不擾為尹僅踰年而德遍風行士民思之江寧府志姚思仁字羅浮秀水人萬歷中授應天府尹風裁凜然所治有罡黨害民御史不能治思仁悉行訪捕置於法遠邇快之朔望謁廟後必與諸生立詢時務次及德行文藝膏火不繼者捐俸給之江寧府志衛一鳳字伯瑞璐州人萬歷中應天府丞單車蒞任自奉寒儉錢穀出入一覽洞然江寧府志李棠字英拔平和人萬歷間擢判京兆轉治中嘗攝理刑及兩縣事於訟獄多所平反民稱神明溧水漕卒糧户交鬨幾成變亂棠奉檄往按之片言立解江寧府志余若楠河南人萬歷間應天推官為政剛柔互濟清正不私直指按臨詞訟浩煩若楠奉委勘鞫十行俱下批决如流江寧府志劉大川易州人應天推官好士愛民請托盡謝同官敬而畏之江寧府志林大黼字朝介莆田人萬歷間授上元縣令性明敏簿書積案一覽無餘聽斷如神黠吏莫能窺其意㫖革坊廂長改編丁銀省浮費十之七八民立祠祀之上元縣志賈應龍祥符人知上元縣鄉民多溺女應龍責里胥呈報始多存活請於上官推丁銀入田畝民困以蘇上元縣志徐良彥字季良新建人萬歷間知溧水縣應天八邑舊有解京皇磚之役重為民纍良彥請於田糧少增分毫悉付蘇州匠作彚解以免駁換議行而民便焉溧水縣志張錫命潼川人萬歷間知溧水申請田糧改折如高淳例合邑便之溧水縣志董岐鳳石屏州人萬歷十四年令高淳時大水諸墟盡沒岐鳳懇訴於京兆許孚遠得疏請內帑銀三千兩修築買當塗湖灘作遮浪埂以捍南蕩墟田一萬七千餘畝至今賴之高淳縣志宗祖騰字爾英莆田人萬歷三十四年任高淳明年大水民居盡沒祖騰督丞尉吏役操舟往救多所全活又力請於上緩征發粟民得再生各鄉專祠祀焉高淳縣志米萬鍾字仲詔北京衛籍為六合令有水鏡慈母之稱六合縣志甄偉璧字連城許州人令六合清操自勵聽斷如神邑有士人妻殉夫死偉璧率屬往奠歲給粟布於遺孤聞者感泣六合縣志劉餘佑字玉孺順天人崇禎時為應天尹勸課耕穫積穀救荒全活數萬人江寧府志徐石麒字寶摩嘉善人崇禎初官應天府丞時南都有絲商馬户兩差民被僉役家業立破石麒仿古雇役法令歲納銀若干衆皆稱便郭外通江支河久淤商販陸運所費加倍經營疏濬行人利之江寧府志錢士貴字元冲松江人崇禎時為應天府丞勸民積穀歲凶悉心賑給郡獄有罰贖久繫者捐金代納俸入不繼至變家産足之江寧府志金蘭字楚畹紹興人崇禎時應天府丞時旱疫並作蘭與魏國公徐宏基及部寺諸臣設厰開賑更捐資糴米江楚相續諸如慈幼局冬生房給藥施槥善政皆舉行焉江寧府志彭期生浙江人崇禎時謫授應天推官遇事明了略無停滯初之官不攜家室屬邑例供薪米悉却不受江寧府志趙其昌永平人崇禎十六年為應天治中案無留牘修城隍詰奸宄民皆德之江寧府志周光霽字淡菴武康人崇禎時令高淳歲比旱民屑榆掘土以食而臺司督漕甚急時負墟諸鄉尚有薄收光霽自立印券貸之輸將如期明歲秋登悉償無逋人稱其才高淳縣志楊以任字維節江西人崇禎中應天教授誨迪不倦諸生感悅卒於官服心喪者數百人江寧府志國朝李正茂字生周順天人順治二年為江寧知府時百務草創正茂設立各署建修利涉上方石城等橋瘡痍初定一意撫循保全善類革減重刑居官數年境內安堵士民思之趙廷臣字君鄰奉天人順治初授江寧江防同知轄運務時欲以黃快船丁僉充運甲廷臣乞循舊册運丁歸運黃快丁歸黃快船軍衛無擾又優恤士子凡列名庠序者復其家槩不僉運操院陳錦委廷臣練水師於直江口訓練有方江澨帖然㑹編審署篆江寧精心釐核照糧輸丁積弊一清崔掄竒字正誼夏邑人順治四年由進士授高淳縣縣故有虛糧為民纍掄竒力懇上官疏請永折著為令又加意課士所拔識者多得雋秀後遷工部主事王鼎應字六符淄川人順治四年由進士知溧水縣時值丈量奸民藉端興訟訴牒紛然鼎應槩置不理民獲以安胥吏積年侵蠧財賦莫可稽核鼎應嚴為釐晰纎毫不得欺匿郭士賢奉天人順治六年知上元縣八年歲大祲糧額莫辦士賢申請各院將罰贖銀兩糴米入倉不足則以已俸益之二年之中一水一旱皆賴以濟民力不困而國儲亦不虧最為良法閔派魯字伯崇祥符人順治十年知溧水縣敦儒禮士多善政先是里糧多寡不齊每遇徭役照里分派民苦不均派魯編審力為劑平勒成一書曰均里平徭册縣西南濱湖田齧於水者十萬餘畝民苦虗賦派魯申請具題邀恩永折著有復折全書饒應元字善仙蘄水人順治十六年知溧水縣天資長厚而事有執持有妖婦曹氏以邪教惑民應元摘其奸申請殱之初民間户役不均應元編審定三十八石為一排兩石為一丁自此無偏重偏輕之弊以上舊通志張大垣字紫臣三原人順治己亥進士知高淳縣時檄下將易改折徵本色闔邑驚恐大垣力請於上官得寢其事又除本邑雜徵之纍及詳減漕費千金民力大紓許力達通山人順治十六年知江浦為政慈惠均里甲興學校蒞官未久海寇猖獗與縣尉蔣上達俱殉難事聞贈按察司副使廕一子與蔣尉同祀忠烈祠劉澤嗣字蘧修吳橋人康熙十三年知高淳縣臨政嚴肅萑苻屏跡修黌宫飭郵傳創育嬰堂民不勞而事舉十九年行取户部主事于成龍字振甲奉天人康熙二十一年知江寧府時總督于成龍剛正於屬吏少許可獨奬成龍才由通州牧題守江寧興利除弊知無不為是時徐州有奸民某走京師以左道惑衆上告事下制府檄江寧鎮江兩府㑹鞫成龍力白寃狀制府疑故縱詰責甚厲成龍持之愈力奸民卒坐誣瀕江蘆洲多為豪强隱占成龍以有課而無洲者為坍江立豫豁除有洲而無課者為欺隱升課而薄其罰人皆服其平擢安徽按察使蘇州府周孫武齊人以兵法見吳王闔閭王以為將破楚入郢威齊晉武與有力焉史記本傳伍員字子胥為吳行人吳以子胥之謀西破彊楚北威齊晉南服越人後數諫賜死史記本傳漢陸烈字伯元漢高帝時為吳令遷豫章都尉卒吳人思之迎葬於胥屏亭朱長文吳郡圗經續記任延字長孫南陽人建武初拜㑹稽都尉時年十九靜泊無為祠延陵季子聘董子儀嚴子陵等待以師友之禮掾吏貧者分祿賑給之耕公田以周窮急行縣輒慰勉孝子吳有龍邱萇者志不降辱延修書記致醫藥吏使相望於道一歲萇乃詣府門遂署議曹祭酒後漢書循吏傳鍾離意字子阿山隂人少為郡督郵太守賢之任以縣事建武十四年㑹稽大疫死者萬數意獨身自隱親經給醫藥所部多䝉全濟後漢書本傳第五倫字伯魚長陵人拜㑹稽太守躬自斬芻養馬妻執炊㸑受俸裁留一月糧餘皆賤貿與貧民俗多淫祀常以牛祭神財産以之困匱倫曉告百姓妄屠牛者輒行罰百姓以安後坐法徵老小攀車號呼後漢書本傳王充字仲任上虞人明帝時仕郡為功曹以數見爭不合去刺史董勤辟為從事轉治中自免還家後漢書本傳張霸字伯饒成都人永元中㑹稽太守表用處士顧奉公孫松等郡中爭勵志節習經者以千數道路但聞誦聲後漢書本傳馬稜字伯威茂陵人永元中為丹陽太守禽江湖賊轉㑹稽太守治亦有聲後漢書馬援傳許貢吳郡太守時孫策方起貢表聞漢帝云策驍勇與項籍相似宜召還京邑若置於外必為患策候吏得表以示策策遂殺貢江表傳三國吳滕允字承嗣劇人大帝時由丹陽太守徙吳郡每聽詞訟察言觀色務盡情理吳志本傳賀邵字興伯山隂人吳景帝時吳郡太守諸强族輕之題府門曰㑹稽雞不能啼邵索筆足之云不可啼殺吳兒因檢校顧陸役使官兵及藏逋亡諸罪狀一部股栗世說晉傅咸字長虞北地人吳國內史顧榮與親故書曰長虞徑直忠果雖非周才亦足貴也姑蘇志鄧攸字伯道襄陵人元帝時吳郡太守載米之郡惟飲吳水歲饑奏請賑貸未報輒開倉救之後引疾去郡有送迎錢數百萬攸去郡不受一錢百姓數千人牽攸船不得進攸乃小停夜中發去晉書良吏傳顔含字宏都琅琊人吳郡太守簡而有恩明而能斷王導嘆曰顔公在事吳人斂手矣晉書孝友傳虞潭字思奧餘姚人清貞有檢操為吳國內史時軍荒歲饑潭表出倉米賑救又修滬瀆壘以防海沙百姓賴之晉書本傳王薈字敬文琅琊人為吳國內史年饑粟貴人多死亡薈出私米作饘粥以飼饑者所濟甚衆晉書王導傳南北朝宋羊元保太山人歷宣城東海㑹稽太守徙吳郡太守廉素寡欲頻典名郡為政雖無幹績而去後常令人思宋書本傳齊王延之字希季臨沂人宋明帝時為吳郡太守罷郡歸家産無所增益齊書本傳陳珉潁川人宋吳令發摘奸隱境內以為神明南畿志周洽汝南人為吳令廉約無私姑蘇志傅翽靈州人齊吳令孫廉問曰丈人發奸摘伏惠化如神何以至此答曰無他也惟勤而清清則吏不能欺勤則事無不理姑蘇志蕭􅒺字景業南蘭陵人建元初為吳郡太守有能名竟陵王子良與之書曰竊承下風數十年來姑蘇未有此政齊書本傳梁王規字威明琅琊人梁大通中為吳郡太守有惠政時主書芮珍宗家在吳前守宰皆傾意奉之規遇之薄珍宗密奏規不理郡事召還郡境千餘人詣闕請留不許求於郡樹碑許之梁書本傳何敬容字國禮廬江人普通間出守吳郡治為天下第一梁書本傳江革梁武帝時監吳郡時境內荒歉盜劫公行革至郡惟有公給仗身二十人復省去游軍尉廣施恩撫明行制令盜賊靖息吏民安之梁書本傳何遠字義方郯人梁初嘗監吳郡性耿介疾强富如仇讐視貧細如子弟特為豪右所憚尤厲清節妻子饑寒不以動心所至立祠祀之梁書本傳謝舉字言揚陽夏人梁大同中為吳郡守先是何敬容有美績世稱何吳郡及舉為政聲跡略相比梁書本傳陳沈君理字仲倫吳興人陳高祖時為吳郡太守時兵革未寧百姓荒敝君理招集士卒修治器械士民悅附以幹理見稱陳書本傳隋皇甫績字功明安定人隋平陳以績為蘇州刺史開皇十年高智惠作亂州民顧子元發兵應之因以攻績相持八旬子元於冬至日遣人奉牛酒於績績乃遺子元書諭以順逆禍福子元得書頓首陳謝㑹楊素援兵至合擊破之隋書本傳唐劉太真宣城人行義修潔蘇州刺史李栖筠表為常熟令到官未期一邑自化唐書本傳韋夏卿字雲客萬年人大歷中常州刺史以最績轉蘇州始至謀以息民布令曰矜老疾活艱困於是鄉計之而白於縣縣上之郡夏卿乃條其歲差並與蠲放唐書本傳王綱為崑山令始作學舍置博士弟子員民興於學有不被儒服者莫不恥焉南畿志盧東美范陽人大歷中為吳令梁肅稱其外寬內明敬事而信姑蘇志韋應物長安人貞元初為蘇州刺史性高潔所在焚香掃地而坐惟顧況劉長卿秦系邱丹皎然之儔與之倡酬姑蘇志于頔字允元為蘇州刺史罷淫祠濬溝澮端路衢為政有績唐書本傳李素隴西人元和初刺蘇州到官旬日李錡反素戰不勝賊入素端立責以義皆斂兵不敢逼送械軍中未及京口而錡敗素脫械還走州民抱扶迎之天子使貴人持紫衣金魚以賜居三年州稱治韓愈河南少尹李公墓志王仲舒字宏中祁人元和中蘇州刺史堤松江為路變屋瓦絶火災賦調與民為期不擾自辦唐書本傳狄兼謨字汝諧太原人文宗時為蘇州刺史以治最擢給事中唐書狄仁傑傳劉禹錫字夢得中山人蘇州刺史以政最賜金紫唐書本傳盧商字為臣以大理卿為蘇州刺史吏以鹽法困民商令計口售鹽無常額人皆便之唐書鄭肅傳滕遂長洲令攝吳縣吏才警敏百姓歌曰朝判長洲暮判吳道不拾遺人不孤姑蘇志成及字宏濟錢塘人乾寧初為吳越王錢鏐將以功授蘇州刺史楊行密圍蘇州及被執行密閲及家所蓄惟圖書藥物賢之與歸淮南將署為行軍司馬及泣曰及百口在錢公所城陷不能死敢求富貴耶引佩刀欲自剄行密遽起持之館於府舍光化元年具禮遣歸姑蘇志宋閻象巨野人太平興國間吳越新附以禁兵五千人屬象安撫遂知蘇州象以齊魯之人悉能知越風俗而揉以善政恩涵澤濡民以蘇息歐陽修金部郎中閻公神道碑王禹稱字元之巨野人知長洲縣歲凶民饑賦斂乖期不忍菜色之民日事鞭朴因出吏部考課歷納質於巨商得錢一萬七千市白粲代輸之自序宋璫字寶臣渭南人賦性清簡淳化中三吳饑疫因命璫知蘇州璫素病足州地卑濕疾益甚或勸璫引疾歸璫曰天子以民病俾我撫綏又以疾辭非臣子之義也後卒於官宋史本傳陳省華字善則閬中人至道初知蘇州時遇水災省華復流民數千户莩者悉瘞之詔書褒美宋史陳堯佐傳裴莊字端已閬中人真宗時知蘇州莊素有吏幹慷慨敢言宋史本傳孫冕字伯純新淦人天禧中知蘇州治獄不濫斷訟如神吏畏而民愛之嘗病癰州人爭詣佛寺為冕祈福姑蘇志徐奭字武卿建安人天聖初通判蘇州時東南大水奭周視盡得水利舊跡乃築石塘九十里建橋十八所復良田數十萬畝疏隱田者二萬六千户塘成遷兩浙轉運使姑蘇志章岵字伯望浦城人知蘇州始下車㑹暴風湖海之濱民多漂溺岵請蠲租賑恤人不失所性剛介鉏治姦吏豪右畏懾政最詔褒之南畿志王質字子野莘人通判蘇州州守黃宗旦得盜鑄者百餘人告質曰吾以術鈎致得之質曰以術鈎人置之死而又喜仁者之政固如是乎宗旦慚沮為薄其罪宋史本傳劉立言字禹昌臨江人知長洲縣過客求發民挽船立言不許郡守移書亦不聽所至利興害革去後人皆思之南畿志王幾字彥成江都人宰長洲為政平允弛張以時境內豪强懾服貧細得以安堵南畿志張方平字道安宋城人景祐中知崑山時吳越歸國未久豪民占田積訟不決方平按其所輸租大約百才一二乃悉收其羡田以賦貧民自是訟獄衰息宋名臣言行録司馬光字君實洓水人寶元中父池仕於杭因求僉書蘇州判官事以便省親許之姑蘇志張伯玉字公達江西人慶歷初為郡剛介有守范仲淹愛重之姑蘇志王庭堅字世美慶歷三年為吳江尉政稱平允建長橋三百餘丈民甚便之南畿志邱與權建州人至和中為崑山主簿時縣西民田漂汲奸人邀劫行旅吏莫能禁與權上五利於太守一曰便舟楫二曰闢田疇三曰復租賦四曰止盜賊五曰禁奸商築至和塘七十里達於郡姑蘇志韓正彥字德師安陽人嘉祐中知崑山縣創石堤疏斗門作塘七十里以達於郡得腴田數百萬頃比去為立生祠作思韓記南畿志胡瑗字翼之泰州人為蘇州教授嚴條約以身先之雖大暑必公服終日以見諸生解經至有要義懇懇為言其所以治已而後治乎人者學徒千數日月刮劘為文章皆傳經義必以理勝信其師說敦尚行實蔡謨胡安定先生墓志銘薄宗孟字傳正新井人治平中為蘇州推官英宗以水災求直言既又地震宗孟兩上疏指斥大臣宫禁及宦官除館閣校勘東都事略沈兼字子達通判蘇州能名籍甚性剛果與守爭可否不少屈免官去怡然無戚容蘇州府志李禹卿字君益通判蘇州堤太湖八十里為渠以益漕運蓄水溉田千餘頃歲饑出羡粟三萬全活萬餘人南畿志常安民字稀古卭州人元豐六年知長洲縣以主信為治人不忍欺縣故多盜籍常犯者書其衣榜其門約能得他盜乃除盜為之息追科不下吏使民自輸先他邑以辦民皆稱為古良吏宋史本傳李䕫字斯和邵武人元豐時為平江節度推官常攝郡事承前守因循之後獄繫甚衆䕫命數吏分條所犯不日皆决遣之南畿志王覿字明叟如皋人元祐中知蘇州有狡吏善刺守將意以撓其權前守用是得譏議覿窮其奸狀置於法一郡肅然民歌詠其政有吏行水上人在鏡心之語徙江淮發運使宋史本傳郭三益字慎求義興人元祐間為常熟丞常平使者調蘇湖常秀之人濬青龍江分地程役三益所部前期告辦使者留其人使助他邑三益徑引衆歸姑蘇志洪彥升樂平縣人調常熟尉奉母之官既至前尉欲缷期三月以規薦而中分俸入彥升處僧舍卻俸不納如約始交印宋史本傳石公轍字道叟新昌人紹聖中為吳江令初學宫在縣治西南厄於兵火公轍為規建於東門外又置田給士今吳江儒學即其處姑蘇志虞賓字舜臣山隂人知長洲縣大姓黠吏亂法賓廉得其狀悉治以法歲祲民無蓋藏部使者猶檄徵宿負賓閣文書不問竟得免南畿志程俱字致道開化人元符中為吳江簿政平訟理有循良之風後簿高文虎以曽懋及俱為此官作曽程堂以寓景仰范成大為之記姑蘇志李光字泰發上虞人崇寧間知常熟時朱勔父冲倚勢暴橫光械治其家僮後知平江府㑹朝廷以乏軍儲措置和糴數以萬計光曰主上屢有約束戒科斂今米或可得未知本錢安所取辦因論奏其事有㫖降本錢和糴不踰月而畢宋史本傳張克戩字德祥開封人大觀二年知吳縣俗好訟克戩一切繩以法奸猾屏氣宋史忠義傳趙訓之字誨道知吳縣時朱勔怙勢凌州縣訓之不為屈勔嘗執數人詣縣請治悉縱不問宋史忠義趙士嶐傳江衮字聖濳衢州人授平江府司兵曹事方臘之亂有商旅數十人皇遽入境郡將疑為諜將殺之衮力爭得免蘇州府志趙彥倓字安卿為平江節度推官攝宜興縣時以牧馬券科為負嘗預用二年後稅民以此病彥倓請諸司奏釋宿逋禁預借積弊遂絶宋史宗室傳胡松年字茂老懷仁人高宗時知平江府未入境貪吏解印綬去以興利除害十七事揭都市百姓便之宋史本傳章誼字宜叟浦城人紹興六年守平江時帝將臨幸供億繁夥誼處之皆當理召對賜帶笏宋史本傳李衡字彥平江都人紹興中授吳江主簿有部使者怙勢侵削下民衡不忍以敲撲迎合投劾府中拂衣歸宋史本傳周葵字立義宜興人紹興中知平江府時兩浙運使李椿年行經界法郡故田租不滿四十萬椿年披榛莽按倉碣欲以七十萬為率葵力辨之椿年遂以圖經三十萬為準姑蘇志洪遵字景嚴鄱陽人紹興末知平江府蘇保衡由海道窺兩浙浙西副總管李寶禦之以舟師搗膠西凡資糧器械舟楫皆遵供億寶成功而歸遵之助為多宋史洪皓傳沈介字德和德清人知平江上曰平江輔郡極難其人知卿政事特加遴選介三典郡所蒞繁劇綽有餘暇豪猾斂避焉姑蘇志曽慎字叔重清源人紹興中宰常熟知足以知勇足以行御吏若西門之治鄴愛民如子産之治鄭王伯廣宣風樓記鄭穆字應和長汀人常熟丞攝縣事有潰兵絶江由福山闖關邑人大恐穆單車撫諭遂定宋史本傳程沂字詠之河南人頤從子紹興間知崑山為政中和有古循吏風姑蘇志陳璧字君玉為崑山主簿注情教養講勸甚勞邑士造請無虛日姑蘇志沈度乾道二年以考功郎中除知平江後召赴行在上曰甲寅之歲委卿守吳未幾治行昭著果如所料可謂得人矣姑蘇志趙公廣字德儉淳熙初知吳江為政知本末先後既建廟學復取羡租以餼生徒凡郵亭使館橋梁祠宇理葺殆遍吳江縣志袁韶字彥淳鄞人嘉泰中為吳江丞蘇師旦挾韓托胄威福撓役法韶受提舉常平黃犖檄核田定役師旦密諭吳江多姻黨倘相容當薦為京朝官韶不聽承徭役者皆師旦黨師旦怒諷言者將論之未幾師旦敗改知桐廬縣宋史本傳葉延年字公是處州人嘉泰中知吳縣有豪民居光福山澤間四出侵暴既三十餘年延年擒置於法士民德之南畿志孫應時字季和餘姚人從學於陸九淵為黃巖尉有惠政朱熹重之改常熟縣秩滿郡將以私憾捃托倉粟積逋三千斛詰之士民相率擔負詣郡代償姑蘇志孫沂字彥溫丹徒人紹定四年為常熟丞民獄訟不决者皆請於臺府願以屬沂旁邑亦然臺府既以為常沂亦不復計彼此南畿志項公澤字德潤永嘉人淳祐間宰崑山以文學飾吏事買田養士為政廉敏百廢具舉南畿志王文雍寶祐中尹常熟修城闉及譙樓置刻漏創兩務官廨濬河築堤葺亭甃衢整飭版籍南畿志黃震字東發慈溪人寶祐四年調吳縣尉縣多豪家凡告私債則以屬尉民多饑凍窘苦死尉卒手震至不受告府檄攝其縣及攝長洲華亭皆有聲宋史儒林傳韓彥古字子師延安人世忠子兩知平江時酒禁甚嚴門卒捕一婦人肩輿載斗酒入門彥古問何從而獲卒曰舁轎之夫預以告彥古曰人奴而訐其主乎杖僕而遣之有士人持吏短長州將下車必先投狀以占能否彥古至其人亦來彥古曰此狀汝不能為必有吏人教汝其人錯愕以實告追吏杖之一郡以為神明姑蘇志謝師稷字務本邵武人知平江府撙節浮費未滿歲積四十萬緡奏請修城雉堞一新姑蘇志沈作賓字賓主歸安人知平江招海盜餘黨錫以衣物又得强勇者幾千人置將統之號曰義士復募境內惡少亦幾千人號曰壯士衣糧器械皆視官軍而輕捷善鬭過之於是海道息警市井無譁宋史本傳李寶河北人浙西路副總管駐平江與守臣督海舟捍禦北軍將行西北風徑寶下令敢沮者斬遂入大洋慷慨自誓風即止明日破敵捷聞上喜曰朕用李寶果立功為天下倡矣宋史本傳陳晞㸃字子與青田人淳熙中平江觀察推官樞密邱崇為守屢以職事爭辨崇或陽怒折之晞㸃立退屏息俟其少霽執論如初後提舉羅㸃兼府事兩司事無大小咸以相屬行荒政修水利決積訟晞㸃悉左右之姑蘇志陳造字唐卿平江教授士被教養咸恨師承不早錫山尤袤讀其騷雅雜著曰吾自是得師矣蘇州府志趙㦛夫字惟恭嘉定中權知平江府有婦人告其姑私酒㦛夫問曰汝事姑孝乎曰極孝㦛夫曰既能盡孝可代姑受杖郡人快之姑蘇志李芾字叔章衡人浙東提刑以前官移浙西盜羣穴太湖中芾跡其出沒按捕之作虎邱書院以祠尹焞置學官親為學規以教之學者甚盛宋史忠義傳趙彥橚字文長知平江郡海盜出沒莫可蹤跡彥橚奏分崑山之半置嘉定縣屯兵以守宋史宗室傳王遂字去非金壇人理宗時知平江府崇學校寬民力抑豪强禁盂蘭盆㑹洞庭村民徐汝賢以詐惑衆自號水仙太保掠人財賄妻妾為害數十年遂收捕黥面鞭背投之盤門水中汚俗一變南畿志吳潛字毅夫寧國人理宗時知平江府條具財計雕敝本末以寬郡民與轉運使王野爭論利害尋改知鎮江宋史本傳吳樵淳祐中平江節度推官賢而有才敏於吏事憲司請入僉幕多所裨贊諸司交薦之姑蘇志包恢字宏父建昌人景定中知平江豪有奪民田寄公租誣上者恢上疏指為以小民祈天永命之一事上覽奏惻然罪任事者即歸民田宋史本傳趙順孫字和仲縉雲人咸祐四年知平江郡庾空乏例以夏初徵民租順孫謂古者十月納禾稼先期半載民何以堪為經營助糴得免預徵姑蘇志常懋字長孺淳祐七年調常熟尉公廉自持不畏强禦部使者交薦之後辟差平江府百萬倉檢察不受和糴事例戢吏卒苛取發運使趙與􅊸兼提㸃刑獄屬懋檢覆雪無錫翟氏寃獄監江淮茶鹽所蕪湖局不受商稅贏改知嘉定縣歲大水勸分和糴按籍均敷以薦簽書臨安府判官宋史本傳文天祥字宋瑞廬陵人德祐元年知平江㑹獨松關告急趣天祥入衛去數日平江城守王邦傑開門降二年天祥以資政殿學士詣巴延軍前講解索多問曰何以去平江天祥曰有詔趣入衛問兵若干曰五萬索多嘆曰天也使丞相在平江必不降但纍城內百姓耳宋史本傳許應元字長卿臨安人授平江司户參軍知府文天祥辟置幕下國亡不仕教授以終姑蘇志元孔文貞字從善東平人至元丁亥尹常熟歲大潦文貞發廩拯溺全活甚衆明年躬督郊民疏港浦泄積水以注之江秋乃大獲又核實匿賦勢家感其誠亦樂輸納姑蘇志王安貞字吉卿至元中遷常熟知州州治初遷安貞規畫創建費巨而民不擾姑蘇志哈喇哈遜大德元年同知吳江州嘗語人曰守土之官不忠勤何以盡職分不公正何以聽獄訟不慈仁何以得民心歲荒且疫為之流涕白州長留粟救之元史本傳盧克治字仲敬濮陽人大德間為常熟令獄無寃濫教育言氏子孫核實學田姑蘇志劉允字嗣宗良鄉人為平江總管延祐初詔經理田糧允威信素孚人不敢欺江浙十八郡守臣欲槩定田賦允爭曰地有肥磽厥賦宜不齊一旦更改民病何時瘳乎衆議始息蘇州府志高仁字壽之濟南人延祐初知吳江州時行省賑杭饑命吳江增糶三萬石仁抗言州小數已溢不可增鹽運使虧課省委仁取諸民補之仁言民貧不可妄動動且有外虞事並寢南畿志師圖烈圖字敬之寧夏人延祐末為平江路總管府縣未結之案積至二千餘編攝吏曹期以日決未幾而畢里正之役賠償往往破産或本都堪役調之他都吏夤緣為奸圖烈圖如詔㫖先田多上户從上推排不役他都民乃便之姑蘇志張顯祖泰定初為吳江判官重建長橋以石易木為竇六十有二每竇用鐵八條仍布桫枋於水底築址以防傾圮遂為永利姑蘇志汪澤明婺源人為平江推官任法允恕獄多平反淮寇闖境倡鄉人保里閈城陷遇害元史本傳道通高昌人後至元二年轉平江總管持身嚴燭理明决事敏待人直然家益貧其去郡一物無取汪澤民撰去思碑鄭元祐遂昌人至正間以學行薦為平江路儒學副提舉訓迪一本經術吳人士甚重之蘇州府志盧鎮淮南人至正間以領兵副元帥兼知常熟州戢兵禮士愛民姑蘇志明何質吳元年知蘇州府郡久苦張士誠虐政質勞來安集民慶更生時詔徙蘇民甚急質雍容部署朝㫖以為怠事逮至闕將置極典質曰殺一郡牧以活百萬生靈質含笑入地矣尋得釋復增秩旌之姑蘇志魏觀字把山蒲圻人洪武五年出知蘇州府鋤暴樹良敬老恤民大建學舍舉鄉飲酒禮未及三載風化興洽課績為天下最召還賜宴奉天門命宋濂等賦詩紀之南畿志李亨吉安人洪武十年知蘇州府性樂易事不茍為為之輒有惠利上賜敕奬勵曰恪慎廉謹古稱良吏不是過也南畿志王觀祥符人洪武十九年除知蘇州府奸吏錢英纍構陷長官觀至立捶殺之時洊菑民逋不能償乃延諸富家集郡衙風使出儲積以補之逋乃給姑蘇志姚善字克一安陸人知蘇州府吳民侈僭洪武中重法以整齊之嚚者更藉持短長賊譎蜂起善洞達政體張弛協宜民俗一變治行為列郡最靖難兵起不屈死南畿志金絅嘉興人為蘇州守時官民田則不齊上疏請減重額田得罪賜死南畿志徐垕字崇實黃巖人洪武中通判蘇州奏發粟二十萬以活饑民春漲壞堤垕相度原隰大興版築之役部使者以為勞民垕力爭卒就其役南畿志成天竒河南人洪武中知常熟縣時大吏所遣胥役多橫暴不敢詰天竒擒一人立撲殺之民大悅事聞璽書褒美廣輿記李彰洪武間出知常熟縣邑人朱蝦蟆為亂已斃翌日蘇州太倉二衛兵至彰出牛酒勞軍從容謂其將曰民盜民捕之已盡吾已聞於朝矣㑹詔遣王御史來視彰逆境上陳其故乃令兵還姑蘇志孔克中字庸夫宣聖裔洪武間知吳江重建縣治及垂虹亭三高三忠二祠姑蘇志芮翀字子翔郾城人洪武中知崑山首革庫子祗侯諸蠧後坐事發遵化炒鐵耆老伏闕訟寃詔馳傳還職復奏除包荒田糧十八萬有竒開吳淞江淤塞二十餘里以母憂去服闋吏部奏崑為劇邑翀素得民俾再還舊治姑蘇志栁敬中慈溪人洪武中令常熟修學校濬河渠以嚴馭吏以公均賦南畿志林鐘字仲鏞杭州人洪武中授崑山學接引後進惟恐不及士翕然宗之每相語曰見林先生覺意表言外别有針規廣輿記劉幹字孟楨修武人永樂初為長洲丞兼理農事幹周行塍隴呼農人問所疾苦慈孺之色溢於眉靣歲饑民輸後期上官譴責幹曰此丞之怠職也請代其罰卒於官邑民殮之留衣冠葬半塘名劉公墩南畿志况鐘字伯律靖安人宣德五年擇郡守九人鐘知蘇州府賜敕乘傳之任初佯不解事吏喜越三日縛諸吏拷掠投庭下輒死者數人吏又大懼乃盡核屬吏斥貪墨者五人庸懦者十餘人八年夏旱既發預備糧賑農復與周忱究收糧法由永樂間轉輸北京餉道遼遠糧長以一徵三府二百七十萬石加徵至八百一十萬除正供及僦車船費盡為糧長乾沒議别立糧頭同收受互覺察除免舊徵三之一以其二之一為轉輸費餘皆入濟農倉為來年經費本是年馬草米數十萬石及九年夏稅折布絲數十萬斤絹數十萬匹小麥數十萬石及雜出供費並代以餘米上無逋事下無橫科民大悅每旱又輒發此餘米賑活輒數萬人二十餘年積弊不戮一人而盡除民接遞終歲在官不得負販鐘敘丁差歲不過三日盡罷其在官者置綱運簿防運夫侵盜又置館夫簿防非禮需索綜理周密簡約易行專厲豪狡拊善良勢家犯法立死杖下吏民大驚奉約束寒門下士有行藝者時時賑贍正統初秩滿去民叩闕乞留者八萬餘人升正三品仍知蘇州府七年卒市巷哭送其喪競立祠祀之鄭曉名臣記李從智宜賓人正統十年知蘇州府郡多淫祀家署小廟於門從智出行見之一日毁去姑蘇志朱勝字仲高金華人正統間知蘇州府政尚中和而吏治精練物無遁情案無滯牘嘗曰吏貪吾詞不付房𨽻卒貪吾不行杖獄卒貪吾不繫囚人嘆服之姑蘇志李謨字居定黃巖人正統間蘇州訓導自守過嚴諸生執贄槩拒不納有吳江生莫鉉取古畫題咏以贈謨曰茍如此使我為市名矣録其詩而返之姑蘇志黎擴字大量臨川人正統成化間蘇州教授惟擴與林智俱號知人擴嘗云英俊雖多惟吳寬當魁天下卒如其言智字居濬得王鏊卷評為鄧林一校後果擢鄉㑹第一蘇州府志張憲字廷式餘干人母喪廬墓瑞竹叢生司訓蘇州日集諸生講大學蘇州府志朱冕字士章嘉興人正統間崑山教諭性方正諸生見者衣冠步趨必整每夜闌學舍中尚咿唔相屬冕時秉燭叩門與語以察勤惰巡撫周忱行縣至崑方抵岸怒撻一𨽻冕進曰恐損觀望請至行臺行法忱改容謝已而設太倉鎮海衛學忱薦為教授謂兩衛官曰我為爾子弟得一良師宜隆重之崑山縣志金華蕭山人正統間為崑山丞奉委勘災見百姓貧苦流涕不食曰田禾雖間有可望才十之一二何以辦秋征竟以荒白曰有罪華自任之後得准災民不告饑崑山縣志姚堂字仲升寧波人天順四年守蘇州敬士愛民雍然長者時林鶚知鎮江有聲巡撫劉孜請對易之民惜其去攀送盈路姑蘇志鄭逵襄陽人景泰五年知崑山縣歲饑分穀以賑疫作延醫救治民廬舍沒於水逵市竹木撤官府敗屋給之全活無算崑山縣志林鶚字一鶚浙太平人天順時知蘇州一切簡靖即有建革必審核再三吳人重其名旦夕責效頗笑守迂緩已而見其深思曲算圖久遠利即又稱林太守康濟才也鄭曉名臣記楊子器慈溪人知崑山改常熟下車即置巨猾數人於法復興修學校宏奬人材南畿志邢宥字克寬瓊州人成化初知蘇州有通變才乙酉郡大饑宥賙貸甚勤即流人在境者亦不失所而公帑不空富室無擾論者謂為荒政最善云姑蘇志雍泰字世隆咸寧人成化六年知吳縣西華鄉田濱湖歲罹災傷泰躬履審視採旁近山石甃堤兩月告竣又鑿穹窿渠置三閘蓄水鄉民獲其利吳縣志余金字貢之內江人成化初知長洲民多爭訐金不設鈎距一以公義裁決人不敢犯有終訟者轉詣上司上司曰汝自有賢令無庸至我姑蘇志紀智成化中崑山主簿質實有守官舍寂然如僧舍舉家食糜時或不繼崑山縣志王鑑字克明吳橋人𢎞治三年主吳江簿常祿之外一介不取每公宴同僚衣錦鑑獨布袍吳江縣志賀府字中甫渭南人正德間知長洲郡守王儀丈畝均賦府搜隱斥蠧平其輕重田賦由此畫一長洲縣志方豪字思道開化人正德中知崑山㑹吳中連遭巨浸豪以民皆逃死不能催科脫冠帶自詣郡獄獄中具奏請減租停糧俟豐年次第帶徵朝廷特從其請廣輿記王儀字暘谷霸州人嘉靖間守蘇州釐剔錢糧諸弊以原額稽其始以事故除其虛以分項别其異以歸總正其實以坐派起其運以運餘撥其存以存餘考其積以徵一定其則及商稅酒醋房地魚課一切清理蘇州府志任環潞安人嘉靖中蘇州同知倭寇東南環率兵出𠞰遍身書姓名曰死綏職也為二親記此髮膚俸入悉犒戰士士樂為死既晉兵備太倉疽發背聞賊至即裹創擊賊賊望環旌旗輒遁去甲寅賊犯蘇百姓爭避入城門扃不得入環曰苐啓之有我在遂活數十萬人時𠞰倭之功環為最蘇州府志彭藎臣嘉靖中倭變藎臣以宣慰司奉調來援與倭遇轉戰至盛墩斬首三千餘級力竭被創死倭亦敗退人改名其地為勝墩蘇州府志蘇祐字允吉濮州人嘉靖五年知吳縣懲奸戢暴縣向無志祐嗟典故漸湮聘楊循吉創纂之吳縣志王鈇順天人嘉靖中知常熟縣倭至率官軍追擊於湖上遇害事聞贈太僕少卿常熟縣志安謙字子光成安人嘉靖中知吳縣當倭難之後繕城垣修橋路吳縣志曹自守字伯化荏平人素精醫嘉靖中知吳縣值倭亂後繼以大水自守散糜施藥以濟衆三年不製一衣不宴一客署內惟蒼頭一人門笥不扃鑰有為慮家計者自守笑曰吾他日居鄉賣藥足自給尋以憂去後吳民過荏平遇醫以驢負藥籠者則自守也驚拜道左吳縣志宋儀望字望之吉安人嘉靖中知吳縣民輸白糧京師輒破家儀望令諸區各出公田計役授田贍之吳縣志祝乾壽字健卿應城人嘉靖間知崑山性開敏通曉土俗時倭寇攻城乾壽率衆殱其魁餘悉潰散崑山縣志王用章字汝平祥符人嘉靖中知崑山定雇役清改兌免儲總絶飛詭㑹巡撫海瑞濬吳淞工費浩繁用章應機立辦訟無留滯公庭闃然嘗從士夫遊或以私請則毅然去有某父子懷嫌適飲其家酒半用章忽正色曰今日當鞫一公事衆皆驚乃呼其子出開諭之一家感泣因復命酒極歡為題其堂曰遂初崑山縣志王重賢字子尚以户部主事清理江南宿逋上疏極言吳民雕敝未當重困尋左調去蘇州府志錢德洪名寬以字行浙江人從王守仁逰嘉靖中教授蘇州定祀典申學規日坐道山亭講學諸生翕然興起有舞雩沂水之風蘇州府志朱燮元字懋和浙江人萬歷間守蘇州不事深刻人莫敢欺時郡丞及司李皆朱姓有政聲人稱三朱而燮元為最云蘇州府志韓原善萬歷中知長洲執法不撓而和氣藹如力請均役詭寄悉清長洲縣志胡士容知長洲有經濟才嘗以沙湖之險為行旅患築至和塘五十里以達崑山人稱為胡公塘長洲縣志江盈科字進之湖廣人萬歷間知長洲常戴星出入不辭勞瘁長洲縣志鄧雲霄字元度東莞人萬歷中蒞長洲諸事科條畫一可垂永久長洲縣志蕭景腆晉江人萬歷中授長洲縣丞太監張志聰過郡橫索不遂縛知縣郭波於車後景腆率所部弓手直前奪波手披志聰市民皆梯屋飛瓦助之事聞逮詔獄得免死吳人立碑紀其事長洲縣志祁承㸁字爾光浙江人萬歷中知長洲縣歲大荒承㸁議賑議蠲民免於災又憫邑田半入官户細民所餘無幾條議更張不果行而去民思之廣輿記葉成章字慕同同安人萬歷間長洲令甫至漫不省事人呼之為葉木頭既而判決如流錢穀利弊洞若觀火吏胥屏息以最擢御史長洲縣志傅光宅字伯俊聊城人萬歷八年知吳縣精心吏治案無積牘時有丈量之令里胥互為奸詭光宅摘發如神徵拜御史吳縣志袁宏道字中郎公安人萬歷二十三年知吳縣輕刑省訟然一干法立懲艾不少貸嘗自閉門六曹吏任其别營生業有所命則呼之定懲賦法命里長分儹五甲以恤經催之勞民便之永遵為制吳縣志江桂馥字爾馨泰寧人任吳縣丞不攜家纍性剛守潔雖强禦莫能撓人呼為江鐵頭吳縣志劉時俊字勿所隆昌人萬歷中知吳江下車即令民具沿門册就册摘大憝歷舉其隱罪人以為神徵輸先分緩急賦辦而民不困公餘每微服輕輿講道學舍雅好琴瑟聲徹公廨吳江縣志耿橘瀋陽人萬歷中知常熟首復子游書院濬福山鹽鐵梅李諸塘工畢而民不擾著有常熟水利興革實政二書常熟縣志聶雲翰字摶羽曲周人萬歷間知崑山以抑豪强祛蠧弊為主而才術足以相副將編賦役以為非户清則田不出非田出則役不均乃總户履畝而校之造為虎頭鼠尾册按上中下三等以定之修城陴所度丈尺工費屈指可得人以為神崑山縣志樊玉衡字元之黃岡人萬歷中為崑山令甫至即取前令聶君政牘視之喜曰我願為曹參㑹當編審隱覆萬狀玉衡以三日畢毫髮無爽時方責逋賦惻然曰民逋賦時吾數齡耳今其人少者壯壯者老老者死吾何愛吾官而窮此不可詰之逋哉其緩之然民願輸負恐後體素羸自奉至薄嘗乘小艇視水災與饑民相對噉菜粥甘之後以父疾告歸祠於馬鞍山巔至今有禱輒應崑山縣志陳祖苞字令威海寧人萬歷中知崑山賦役弊蠧力加釐剔嘗一署太倉再署常熟兩邑交頌崑山縣志楊漣字大洪應山人萬歷三十六年知常熟初至與城隍神約所不秉公而狥紳豪者有如日請囑遂絶久之政聲籍甚舉天下清官第一內擢給事中毁所束帶以辦行裝常熟縣志李三省字思曽鄖陽人萬歷中崑山縣丞邑頻潦丞職水利三省乘小艇自攜米粟循行阡陌便宜修救未嘗受民一鮭一菜已而病卒邑令劉應龍視含殮見其牀無幃為出涕崑山縣志楊姜天啓間蘇州同知督造漕艘及軍器有能聲攝滸墅鈔關商民便之時織造內監李實驕橫姜不為屈實怒誣劾去官蘇州府志陳文瑞字應萃同安人天啓間知吳縣按獄必持法推情豪貴莫敢撓於㷀獨尤加惠焉吳縣志陳洪謐字龍甫晉江人崇禎時除蘇州知府郡多逋賦考成嚴切或勸其亟催科洪謐笑曰吾寧以民命博一官哉歲饑穀湧貴羣不逞聚黨入豪家劫粟密捕渠魁三人杖殺之於是發積穀勸富家出粟不三日價平亂遂息流寇犯安慶督撫檄蘇撤閶門傍城民居萬家為防禦計洪謐曰撤恐擾民即有變願以百口保之卒不奉檄人服其鎮定蘇州府志倪長玗字伯屏平湖人崇禎時授蘇州府推官抑豪强鋤奸猾一郡皆憚其威時郡守陳洪謐性慈和然遇事輒相諏度無齟齬郡人為立雙清書院蘇州府志牛若麟字鶴沙黃州人崇禎時知吳縣饑民蜂起若麟先賑而後治其首難變遂息吳縣志熊開元字元年嘉魚人崇禎時知吳江縣性機警決獄多平反以南北糧運役法不均乃以南配北定為例民困得蘇吳江縣志李實字如石遂寧人崇禎末知長洲縣每遇徵輸但以至誠勸諭不加敲撲而國課無缺長洲縣志國朝丁允元字右海日照人順治二年知蘇州府時庶務草創允元練習典故因事釐正綱紀秩然山澤間餘寇未靖大兵駐郡者盈萬一切軍資器械皆區處合宜民不知擾尤加意人材所識拔多知名士郭文雄字鳴上文水人順治十六年以拔貢授崑山令簿書皆自鈎校不假手胥吏催科盡革耗羡摘缺之尤者揭之縣門不遣一役而民皆趨令崑俗多借假命恐喝取財文雄著令凡毆殺者必里鄰公舉得實而坐毋許一人首告時軍旗肆橫文雄奉行官兌之令力禁約之以疾卒官貧不能歸葬士民醵金葬於馬鞍山之南立祠墓前吳道煌字瑤如宛平人順治已丑進士康熙二年知蘇州郡故煩劇前守治事日不暇給道煌性寬厚以清靜為理上官多疑其廢弛及察其政無不舉有投牒者輒緩其勾稽或悔而不願終訟輒聽之後以事報罷積案有未結者令吏抱牘至悉焚之曰吾不留此為虐民地也去後民思之立祠於虎邱山麓師佐字靖公河南永寧人順治壬辰進士由福寧知州遷蘇郡督糧同知貧不能就道士民醵金助之及蒞蘇不擅受一詞董理漕兌釐弊端却規例每諭糧户爾等省一分旁費則完一分正務民咸感悅三督漕白解餉江廣復疏濬吳淞水利勘荒履畝皆盡厥職督撫交薦之㑹卒沈恩舉字謙能汀州人順治丁酉舉人康熙初年知長洲縣吳中大水恩舉加意撫綏催輸不事鞭撲課亦及額邑𨽻素橫惡乃立需索單於里甲每月填報有無輿皂斂跡又旱蝗為災齊沐步禱蝗不害稼雨亦隨降民祀之前令葉成章祠題為雙清書院于宗堯字二巍廣寧人年十九以父廕除常熟知縣勇於為治興利剔弊雖老吏弗及邑素有漕蠧為民害視事三月即痛除之性孤介屏絶饋遺搏擊豪强而待良民慈恕三年如一日卒於官邑中罷市巷哭醵金治其喪將北歸百姓遮道留之遂葬虞山南麓題其阡曰萬民留葬以上舊通志劉定國字奠萬奉天人康熙三年為吳江令邑當南北孔道師行所過繹騷定國具舟車待境上至則犒勞將士即導之出境民以無擾聽訟明敏兩造至庭立時決遣嘗閲視獄囚止三人當遣戍者明日即令就道囹圄一空霍勳字立􅒾清苑人康熙十四年知吳江縣潔已愛民隨宜撫輯催科不遣胥𨽻聽訟不尚擊鷙以事繫獄者月給米冬給衣絮置草韉以藉之未期月丁內艱去官各項賠墊缺額三千餘兩邑民爭先輸助一月而完郭琇字華野即墨人康熙庚戌進士知吳江縣材力强幹屢斷疑獄民驚為神徵輸行版串法分為十限俾民依限完納又置戥縣門使民自稱投匱胥吏無所假手總督于成龍嘗贈之以詩巡撫湯斌稱其清而能以卓異特薦江南通志卷一百十三
