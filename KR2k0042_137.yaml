body:
  text: 江南通志卷一百三十八人物志選舉詳而後人物顯江南自春秋時季札子遊産於吳老聃管仲出潁亳之間風氣肇開矣漢後千八百年道德政事文章之徒麟麟郁郁著於華夏至我朝而彌盛雖天地所旋斡山川所育孕亦乘乎其時也國家教養垂百年所培長而搜擇之者有加靡已賢士大夫以勳德忠孝儒雅文學稱者皆克踐其聲以揚於世婦女亦厲其名節無愧於旌典録古及今詳且慎焉為類十有二為卷五十有二作人物志第八名賢商巫咸太戊時相周書君奭篇巫咸乂王家傳有咸乂四篇咸子賢書曰在祖乙時則有若巫賢有墓宅在虞山周蹇叔銍人秦繆公與百里傒語大悅授之國政傒讓曰臣不及臣友蹇叔公使人厚幣迎叔以為上大夫季札吳子壽夢季子有三兄諸樊餘祭餘昧壽夢賢季札欲立之札辭乃立諸樊及諸樊既除喪復讓札札棄其室而耕乃舍之諸樊卒命授弟餘祭欲傳以次必致國於札札卒不受封於延陵號延陵季子李耳苦縣人字伯陽諡曰聃周柱下史孔子往問禮老聃曰良賈深藏若虛君子盛德容貌若愚孔子退曰老子其猶龍乎所著有道德經五千餘言言偃字子遊吳人孔門高弟嘗為武城宰唐開元中定十哲從祀贈吳侯宋祥符中封丹陽公改封吳國國朝康熙五十一年賜裔孫德堅五經博士世襲漢文翁名黨字仲翁廬江舒人為蜀郡守見蜀地僻陋欲誘進之乃選郡縣小吏開敏有材者張叔等十餘人遣詣京師受業博士歸以為右職察舉有至郡守刺史者又修起學官招下縣子弟為學弟子為除更繇高者以補郡縣吏次為孝弟力田每出行縣選諸生明經飭行者與俱使傳教令吏民見而榮之爭欲為學官弟子由是蜀地文學比齊魯焉至武帝時令天下郡國皆立學自文翁為之始劉向字子政彭城人楚元王四世孫宣帝講論五經於石渠拜郎中元帝時官宗正給事中外戚許史宦官恭顯譖之謫廢十餘年成帝時復進用會王鳯兄弟秉政向集洪範五行傳論奏之帝雖心知向忠為王氏所持終不得大用嘗序次列女傳著説苑新序數上封事帝每嘉歎之范滂字孟博汝南細陽人少勵清節舉孝亷冀州盜起以滂為清詔使登車攬轡慨然有澄清天下之志至州境守令贓汙者望風解印綬去其所舉奏莫不厭塞衆議既而署郡功曹嚴整疾惡顯薦異節抽拔幽陋後坐鉤黨繫獄獄吏謂當祭臯陶滂曰臯陶古之直臣知滂無罪將理之於帝如其有罪祭之何益尋得釋建寧二年大捕黨人詔書至即自詣獄三國張昭字子布彭城人為孫策長史文武事悉委之後以弟權託昭昭率群臣立而輔之拜輔吳將軍封婁侯性剛好直諫權嘗不能堪案刀而怒昭更流涕出語權亦泣下嘗曰孤與張公言不敢妄也舉邦憚之卒諡文顧雍字元歎吳人孫權為會稽太守不之郡以雍為丞行太守事吏民歸服權為吳王領尚書令封陽遂鄉侯拜侯還寺而家人不知迎母於吳及至權臨賀之親拜其母於庭雍為人寡言語舉動時當權嘗歎曰顧君不言言必有中代孫卲為丞相選用文武各隨其能心無適莫赤烏中卒諡肅侯宋范仲淹字希文吳縣人二歲而孤少有志操既長依戚同文學晝夜不息舉進士第為廣德軍司理參軍遷大理寺丞監楚州糧料院母喪去官晏殊知應天府召置府學薦為祕閣校理仲淹泛通六經長於易學者多從質問為執經講解無所倦嘗推其奉以食四方遊士諸子易衣而出晏如也每敢激論天下事奮不顧身一時士大夫矯勵尚風節自仲淹倡之天聖七年上疏請太后還政不報通判陳州召為右司諫歲大旱蝗命仲淹安撫江淮所至開倉振乏且條上救敝十事知蘇州州大水民田不得耕仲淹疏五河導太湖注之海拜天章閣待制元昊反知永興軍會夏竦為陜西經略安撫招討使進仲淹龍圖閣直學士以副之兼知延州大閲州兵分部教之量賊衆寡使更出禦賊城青澗以據賊衝大興營田為持久計修承平永平等寨定堡障通斥候遷環慶路經略安撫緣邉招討使以詔書犒賞諸羌閲其人馬為立條約諸羌受命始為漢用築大順城而白豹金湯皆不敢犯環慶自此寇益少帝復置陜西路安撫經略招討使以仲淹韓琦龎籍分領之仲淹為將號令明白愛撫士卒諸羌來者推心接之不疑故賊亦不敢輒犯其境元昊請和召拜樞密副使除參知政事帝再賜手詔又為之開天章閣召二府條對仲淹上十事一曰明黜陟二曰抑僥幸三曰精貢舉四曰擇長官五曰均公田六曰厚農桑七曰修武備八曰推恩信九曰重命令十曰減徭役天子悉采用之初仲淹以忤吕夷簡放逐者數年及夷簡罷召還倚以為治中外想望其功業而仲淹以天下為己任日夜謀慮興致太平會邊陲有警因與樞密副使富弼請行邊於是以仲淹為河東陜西宣撫使賜黃金百兩悉分遺邊將又以為資政大學士陜西四路宣撫使知邠州卒年六十四贈兵部尚書諡文正既葬帝親書其碑曰褒賢之碑仲淹內剛外和性至孝以母在時方貧其後雖貴非賓客不重肉妻子衣食僅能自充而好施與置義莊里中以贍族人泛愛樂義士多出其門下雖里巷之人皆能道其名字為政尚忠厚所至有恩邠慶二州之民與屬羌皆畫像立生祠事之及其卒也羌酋數百人哭之如父齋三日而去國朝康熙五十二年配享文廟四子純祐純仁純禮純粹包拯字希仁合肥人舉進士以親老不就州縣職後二親繼沒廬墓終喪始入仕知端州端産硯拯歲滿不持一硯歸尋拜監察御史後知諫院數論斥權幸大臣請罷一切內降曲恩除龍圖閣直學士歷知開封府拯立朝剛毅貴戚宦官斂手人以拯笑比黃河清語曰關節不到有閻羅包老訟訴者徑造庭下前陳曲直吏不敢欺自三司使拜樞密副使卒諡孝肅胡瑗字翼之泰州人以經術教授吳中范仲淹薦瑗更定雅樂試挍書郎教授湖州誨人有法立經義治事二齋倡明體達用之學慶厯中詔太學取其法著為令後為國子監直講其徒益衆庠舍不能容明嘉靖中從祀文廟吕公著字晦叔壽州人宰相夷簡子夷簡早器異之曰他日必為公輔登進士第通判潁州歐陽修與為講學友歷天章閣待制英宗初論御史吕誨等不當以爭濮議斥神宗時除御史中丞力論王安石新法之非語極深切進同知樞密院事哲宗即位屢遷右僕射與司馬光同心輔政革弊便民天下歡呼鼓舞光薨獨當國除吏皆一時之選卒於位宣仁太后深悼惜之諡正獻范純仁字堯夫皇祐元年進士治平中為侍御史力爭濮王典禮當如從官議語斥大臣尤切出通判安州直聲震天下熙寧中知諫院論王安石變法度失人心前後論奏反復激切無所諱避復出補外元豐末召為給事中素與司馬光同志而臨事多矯正人益服其平直歷尚書右僕射務以博大開上意忠篤革士風章惇用事纍貶永州徽宗立力辭召命請還潁昌里第卒諡忠宣純仁性夷易寬簡及義所在挺然不少屈自言平生好學得之忠恕二字自為布衣至宰相亷儉如一李綱字伯紀祖賡自卲武徙居無錫登政和二年進士以敢言著聲金將攻汴宰執議請暫避敵鋒綱力陳不可去曰六軍父母妻子皆在都城願以死守萬一中道散歸陛下孰與衛上感悟命輟行綱治守戰之具不數日而畢敵兵攻城綱身督戰斬酋長十餘人衆數千人金將引退求遣大臣至軍中議綱請行不聽姚平仲勇而寡謀率步騎夜斫敵營不克金使來詰遂罷綱太學生陳東等詣闕上書明綱無罪軍民不期而集者數十萬命綱復充京城四壁守禦使下命能殺敵者賞衆無不奮躍金人懼稍稍引却及退師除綱知樞密院事會耿南仲忌綱以綱為河東北宣撫使高宗即位拜尚書右僕射綱疏陳十事因薦張所為河北招撫使傅亮為河東經制副使有詔欲幸東南綱極論其不可不報乞身歸田自綱罷張所以罪去傅亮以母病辭歸招撫經制二司皆廢車駕遂東幸兩河郡縣相繼淪陷凡綱所規畫軍民之政一切廢罷金進攻京東西入毀關輔而中原盜賊蜂起矣紹興十年薨贈少師綱負天下之望以一身用舍為社稷生民安危雖身或不用用有不久而其忠誠義氣凜然動乎遐邇每宋使至燕山必問李綱趙鼎安否其為逺人所畏服如此自號梁溪漫叟有梁溪集易傳內外篇等書朱子字元晦婺源人父松生熹於尤溪官舍幼與群兒遊獨以沙列八卦舉紹興十八年進士寧宗初歷煥章閣待制侍讀熹初從劉子羽居崇安後從延平李侗學得聖道之傳學者宗師之自絶學以來集諸儒之大成發先聖之祕藴熹一人而已殁諡曰文追封徽國公從祀文廟國朝康熙五十年聖祖特旨升祔十哲之次明李時勉名懋以字行上元人永樂中進士官侍讀洪熙時上疏觸忌諱上震怒縛至便殿命力士捶之幾死下獄宣宗即位恨時勉觸仁考怒將殺之已面鞫得其故立脫桎梏復其官正統中遷國子祭酒王振惡其守正搆陷之荷校國學門諸生石大用等上章乞以身代事得解致仕去卒諡忠文所著有古亷文集吳訥字敏德常熟人洪熙初侍臣以經明行修薦授御史出按浙江以維風紀植綱常為務繼按貴州恩威著遐夷宣德中歷官左副都御史正統六年請老歸卒諡文恪訥博覽群籍議論有根柢於性理之奧多所發明所著書皆可傳於後莊昶字孔暘江浦人成化丙戌進士授檢討與同官章懋黃仲昭抗疏諫張燈忤旨廷杖謫桂陽州判官改南行人司副丁艱歸居定山聚徒講學垂三十年𢎞治中召至京遷南驗封郎中逾年乞歸昶之學與陳獻章同趣超然自得於經書傳注之外學者稱定山先生諡文節吳寬字原博長洲人成化壬辰舉禮部廷試皆第一授修撰侍孝宗於東宫每進講間雅詳明𢎞治中歷遷禮部尚書議孝肅皇后並祔非禮宜祀别廟上悅而從之未及柄用而卒諡文定寬行履高潔不為矯激而自守以正以文章德行負天下重望王鏊字濟之吳縣人成化甲午鄉試明年會試俱第一廷試第三授編修𢎞治初遷侍講學士充講官時中貴李廣導帝逰西苑鏊講文王不敢盤于遊田反覆規戒帝為動容屢遷禮部左侍郎正德初與韓文諸大臣請誅劉瑾等八奄上怒傳諭甚厲鏊奏對不撓歷拜文淵閣大學士瑾屢欲害文及劉健等鏊力救得免已而瑾益橫鏊遂三疏乞歸卒諡文恪鏊博學有識鑒文章爾雅論議明暢嘗著性善論一篇王守仁深推之卲寶字國賢無錫人成化甲辰進士知許州有惠政月朔會諸生講明義利之辨歷江西提學副使教學者以致知力行為本宸濠索題詠峻却之後以副都御史總督漕運忤劉瑾致仕瑾誅起撫貴州纍擢南京禮部尚書乞終飬歸卒諡文莊寶學以洛閩為宗詩文典重和雅原本經術粹然一出於正有容春堂集定性書簡端録漕政舉要學者稱二泉先生魏校字子才崑山人𢎞治乙丑進士歷官國子祭酒改太常少卿遷本寺卿致仕卒諡恭簡校幼有異質私淑胡居仁主敬之學而貫通諸儒之説折衷於六經醇如也貌朴訥簡重言動以禮學者稱莊渠先生顧憲成字叔時無錫人萬歷庚辰進士歷驗封主事疏論計典語侵執政謫官纍擢考功主事力爭三王並封并貽書首輔王錫爵事遂寢尋為選郎以推起舊輔王家屏忤旨削籍歸邑有東林書院為宋儒楊時講學所憲成及弟允成偕同郡高攀龍安希范劉元珍錢一本薛敷教葉茂才輩講學其中時號東林八君子憲成既廢名益高學者稱涇陽先生一時清議倚以為重起南光祿少卿不就卒天啓中璫禍作追奪封誥懷宗初贈吏部侍郎諡端文有涇陽藏稿小心齋劄記大學通考還經録高攀龍字存之無錫人萬厯己丑進士授行人趙用賢等去位攀龍上疏論救語侵輔臣摘揭陽典史歸家居三十年天啓初起光祿丞纍擢左都御史糾御史崔呈秀罷之時魏忠賢用事以崔呈秀為腹心以前憾矯詔削籍歸繼為織監李實誣劾逮問官旗未至曰大臣不可辱遂自沈於池懷宗初贈太子少保兵部尚書諡忠憲攀龍學本濓洛以靜為主涵飬邃密學者稱景逸先生著有周易孔義春秋正蒙注天完録就正録家訓諸書國朝張英字敦復桐城縣人康熙丁未進士館選侍講幄敷陳經義民生吏治悉心獻納知無不言聖祖初設南書房俾每日侍直以資講論詞臣賜第內城自此始及佐樞部掌邦禮恪慎清粹一時典章儀制廟廷制誥之文多其手定洎登相位忠藎純誠佐佑啓沃歷任三十餘年未嘗一日離內直聖祖稱其老成敬慎終始不渝有古大臣風嘗命工寫像以賜生平多隱德外和內剛一私不染薦拔賢俊如不及從不使人知廣義田以贍宗族肅家範以率子弟一門感勵名節溫恭謙謹稱江左第一家風學問醇博所著有易書衷論及存誠堂篤素堂詩文集各若干卷年七十二卒於家御祭恤葬逾恆制諡曰文端世宗御極之初有甘盤舊學之思贈太子太傅崇祀京城賢良祠復賜祭於本籍祭文有曰靖共爾位忠純克篤夫小心垂裕後昆善慶彌彰夫厚德又御書祠宇匾聨有忠純詒範師模如在之褒恩禮之渥罕有倫比趙申喬字慎旃武進人父繼鼎明季庚辰進士兵部主事申喬康熙庚戌進士由商邱知縣擢刑部主事遷員外歷官至浙江巡撫改偏沅入為左都御史遷户部尚書為人清介拔俗不可干以私令中州時錢穀獄訟不假手於幕客部民一見問姓名久而不忘撫浙時易海塘土以石祭江神海潮至竟工不逼岸在湖南禁私派重耗貪墨屏息為總憲不避嫌怨亦不務搏擊户部勾稽出內惟慎九卿會議意有不可者輒别奏聞每蒙報可卒諡恭毅奉旨欽賜入賢良祠雍正十二年又於本地專祠賜祭一次祭文一道江南通志卷一百三十八
