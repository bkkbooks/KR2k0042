body:
  text: 江南通志卷一百四十六人物志宦績八安慶一府安慶府漢朱邑字仲卿廬江舒人少為桐鄉嗇夫亷平不苛以愛利為行未嘗笞辱人存問耆老孤寡吏民愛敬焉遷太守卒史舉賢良為大司農丞遷北海太守以治行第一入為大司農多薦賢士大夫居處儉節祿賜以共九族鄉黨病屬其子曰我故為桐鄉吏其民愛我必葬我桐鄉民果為邑起冡立祠歲時祭祀不絶三國吳陳修廬江松滋人陳武子有父風年十九孫權召見拜别部司馬授兵五百人時請新兵多有逃叛修撫循得其意不失一人拜校尉建安末追録功臣後封都亭侯為解煩督陳表字文奧武庶子少知名侍東宫徙太子中庶子拜翼正都尉修亡後表母不肯事修母表勸以大義二母感悟雍穆表以父死敵場求用為將領兵五百人傾意接待士樂為用無難士施明盜官物廷尉收考極毒無辭表誘之乃首服遷無難右部督封都亭侯以繼舊爵表皆陳讓乞以傳修子延不許嘉禾三年領新安都尉料取所受賜復人户以充部伍廣開納降得兵萬餘人鄱陽民吳遽等為亂表越界討破之拜偏將軍進封都鄉侯家財盡於養士及卒妻子露立太子登為起屋宅子敖年十七拜别部司馬敖卒修子延復為司馬代敖晉何充字次道廬江灊人成帝時為東陽太守會稽內史甚有德政除丹陽尹王導庾亮並薦充器局方槩有萬夫之望必能總録朝端願引充內侍由是加吏部尚書歷中書令建元初都督徐州揚州入輔幼主臨朝正色以社稷為己任卒贈司空諡文穆何澄字季懸起家祕書郎清正有器望卒贈金紫光祿大夫南北朝齊何昌宇字儼望廬江灊人少清靖為建平王景素府主簿以夙素見重出為湘東太守景素被誅昌宇啓太祖直其冤太祖嘉其義復為南郡太守行荆州事臨海王昭秀將被害以昌宇得還京師歷官吏部尚書復為侍中卒贈太常諡簡子昌宇不雜交遊通和泛愛歷郡皆清白士君子多稱之梁何敬容字國禮昌宇子初為建安內史清公有美績普通中守吏部尚書銓序明審號為稱職出為吳郡太守勤恤民隱辨訟如神治為天下第一遷尚書右僕射參掌選事久處臺閣詳悉舊事聰明識治勤於簿領嘗奏侯景終當亂國其言卒驗子瑴祕書丞唐張鎮周舒人武德八年為本州都督就故宅多市酒肴召親戚酣飲如布衣時凡十日既而分贈金帛泣别曰今日鎮周猶得與故人聚明日則舒州都督治百姓耳自是親故犯法一無所縱境內肅然宋王罕字師言圭之季父自成都徙舒州以蔭知宜興縣縣多湖田歲訴水輕重失其平罕躬至田間圖其高下衆莫能欺范仲淹在潤奏下其式於諸道遷户部判官出為廣東轉運使儂智高入冦罕行部在潮廣州守仲簡自圍中遣書邀罕罕遂還惠州簡卒三千順流而下至廣營於南門智高見其嚴備遂解去以功為西路轉運使徙知潭州為政務適人情不加威罰伸狂婦之寃郡人傳為神明監司上治狀敕書褒諭賜絹三百王琪字君玉圭之從兄兒童時已能為歌詩起進士調江都主簿上時務十二事仁宗嘉之通判舒州歲飢奏發廩救民未報先賑以公租守以下皆不聽琪挺身任之徙知江寧先是府多火災或託以鬼神人不敢救琪捕得姦人誅之火患遂息以禮部侍郎致仕琪性孤介不與時合數臨東南名鎮政尚簡靖及葬真州詔真揚二州發卒護其窆蓋異數也潘琛宿松人嗜學寒暑無間由進士為祁門丞教崇禮讓士民化之元虞執中字伯權望江人至元間鄉貢第一成進士授將仕郎居官恪謹公事無滯山南憲府多奬進之明黃敏字宗學桐城人洪武初以歲薦歷官兵部員外郎奏罷糧運不便者數事以忤旨左遷上林監丞升長蘆鹽運副使鹽弊肅清有姦奄以私販事誣敏謫戍興州以朝臣薦復遷工部主事擢廣西按察司副使威惠並茂有古憲臣風劉燾字尚載太湖人洪武間以明經知柳州府歷嘉興寧波西安長沙彰德汀州咸有政績為治寬厚慈祥不施鞭撲有不法者但勸諭之人皆感化官至雲南參政柳州長沙咸立祠祀之呂衡字仕平太湖人洪武間歲薦授監察御史遇事敢言巡按廣東風裁甚著貪墨皆望風解印綬去劉瑩字仲璚桐城人永樂癸未進士官御史歷永平廣平二郡守為政平易人歌曰太守政平二郡皆寧饒政字文質望江人永樂乙未進士運糧江西既竣役同事十三人分别授御史僉事政上章願授教職上可其請先後四任學博凡二十年造就諸士皆一時名臣年八十歸里程旻字太和桐城人宣德丙午舉人任磁州同知時蝗大發旻虔禱於神忽秃鶖飛集啄蝗殆盡因以有聲改滄州值旱旻禱於五龍井有白魚五出見雨大注歲遂稔民共立五龍廟肖像祀之吳升字亨晦懷寧人宣德癸丑進士擢工科給事中遇事敢諌封駁糾正有聲於時正統時廷議郡縣守令用大臣薦升謂受官公朝拜恩私室不可又議大臣舉御史升謂御史既被大臣舉則大臣有不法恐御史瞻顧私恩咸奏止之閩浙礦徒為亂擢升浙江布政司參議往輯之升捕斬渠魁撲滅黨與且亷其失機都指揮以下數人置之法衆皆股栗賊遂屏息姚旭字景陽桐城人景泰辛未進士官刑科給事中敷奏詳明直聲大著謫判鄭州清慎自勵擢南安守盡心民事尤以學校為先終雲南參政方佑字建輔桐城人天順丁丑進士擢監察御史風裁凝峻初按河間錦衣官校素怙寵為姦聞佑風皆惴惴聽命有盜殺縣簿捕弗獲設計襲誅之移按蘇浙鹽政再按廣西有平苗賊功後忤中使廷杖謫知攸縣補桂林知府王道字懿德潛山人天順己卯舉人任杭州通判威惠並行以梗介忤直指使者即挂冠歸直指追檢其舟中惟敝簏盛書數卷乃慚謝道更以野服拜辭直指知意不可奪嗟嘆久之成化間有盜經其家借炊焉曰知亷吏無他求也王瑞字良璧望江人成化己丑進士授吏科給事中在文華殿抗言內寵滋甚上震怒不懾晉都給事中劾幸進者多攀緣超越濫竊名器上嘉納詔吏部貶四人奪九人官凡居言路十五年疏諌皆朝廷大事遷湖廣參議告歸方向字與義桐城人成化辛丑進士授南户科給事中巨璫守備南京甚跋扈乃疏劾其罪狀并文武大臣十數人璫銜之因事誣逮下獄貶雲南驛丞歷官瓊州知府地産珠僕私市其一索而投之於海蕭世賢字若愚桐城人𢎞治乙丑進士任刑部郎中執法不撓獄多平反出守嘉興歲革羡金千餘不染一塵立三館以造士文風蔚起擢湖廣副使去道卒囊無餘資以故服殮李楫字濟之懷寧人𢎞治乙丑進士為監察御史按山西搜剔宿弊忤當道謫判沔陽移泰和令從王守仁平逆濠歷遷貴州參議時芒部弗緝楫贊臺臣往征之賊平録功尋乞歸錢如京字公溥桐城人𢎞治壬戌進士選監察御史所至有真御史名正德時纍擢至都御史巡撫保定等府歲大飢請發內帑數萬緡賑濟民賴以生轉兵部侍郎提督兩廣軍務所轄土官多相仇殺獄未決疏請禠土官職許立功自贖兵不血刃地方以寧晉刑部尚書告歸卒之夕有大星隕於城中事聞加太子少保諭祭葬李淳字元朴太湖人𢎞治壬戌進士任行人擢刑科給事以忤劉瑾轉浙江僉事浙東盜起淳督兵𠞰捕之會有星變出揚州分淳曰杭必有災令民間儲水以備已而杭城果火得無患調廣西按察值撫江土猺及苗民讐殺淳討平之余珊字德輝桐城人正德戊辰進士由行人擢御史忠直敢言不避權幸以發中貴人姦賕譖之下獄杖幾斃謫判安陸州嘉靖初起江西僉事討平梅花洞賊應詔陳十漸疏共萬四千言最為剴切珊律已清嚴居官有威惠纍遷四川按察使卒齊之鸞字瑞卿桐城人正德辛未進士官給事中疏禦邊弭盜深切時務武宗自稱威武大將軍朱壽之鸞切諌又欲南巡之鸞首唱留駕率同僚伏闕號泣上意始沮王守仁平宸濠許泰忌其功誣毁百端之鸞力白之世宗時遷寧夏僉事值歲飢民採蓬子為食乃封蓬子進於帝乞發帑賑之還朝夏人遮道號聲不絶歷遷河南按察使卒於官著有蓉川集入夏録吳檄字用宣桐城人正德辛巳進士少有氣節初授襄陽推官決疑獄賑飢民綽有能聲遷兵部武選郎中有都督僉事薑奭奏邊功議升職方議可乃下武選擬官檄曰法斬首二百上者升一級奭未滿八十當賞不當升有劉民譽者其父從世宗起興藩賜錦衣衛指揮民譽欲襲職檄曰法非汗馬不世安得襲大司馬張讚固欲與之檄固不肯讚自為劄請詔不許檄亦以是外補耿介之操始終如一子自洞歷官太常卿有清望盛汝謙字亨甫桐城人嘉靖辛丑進士授行人擢御史按關中歲飢民嘯聚為冦汝謙設糜賑之計擒倡亂者數人餘黨遂解遷光祿卿嚴嵩柄國獨守正乞歸嵩敗纍擢操江僉都御史南京貢院號舍故用蘆葦汝謙捐俸修拓甃以磚轉户部侍郎歸與吳一介倡議築桐城城後流賊之亂桐得保全徐桂字子芳潛山人嘉靖乙未進士知鄖陽府治有寺妖僧緣為姦婦女佞佛者多墮其術桂得其情親詣寺縛主僧勘鞫立除之焚其寺鄖陽數十年巫風一旦盡革戴完字仲修桐城人嘉靖甲辰進士官户部主事分司德州改刑部郎嚴嵩用事重其名欲致私謁竟不往會同部郎張翀上疏劾嵩杖戌夜郎嵩偵其疏與完合草遂出補貴州僉事時盜賊屢發土官跋扈完杖之而以恩撫其子乃畏服在任三月威德大著謝病歸趙釴字鼎卿桐城人嘉靖庚子鄉試第一甲辰登進士纍官至僉都御史巡撫貴州值土舍韓甸攫司印逐正官糾黨稱兵三省騷動釴督總兵等官會𠞰之又為黔奏便宜六事皆議行焉於惟一字德夫懷寧人嘉靖癸丑進士任南工部主事守關嚴慎適上所寵方士陶仲文欲轉關夜出惟一繫其行舟時陶焰方熾大為沮喪御史吳時來參嚴嵩被謫出都惟一獨祖餞嵩銜之出守太原值歲荒民相食捐俸賑飢民得全活衆相呼為於家兒擢陜西副使金燕字尚賓潛山人嘉靖癸丑進士謁選桐鄉令時海冦猖獗桐鄉濱海無城燕下車即為營築城成而寇至環攻四十餘日冦遁復設竒追殱之擢禮科給事中力詆嚴嵩姦謫彝陵判後仕至尚寶丞阮自嵩字思竹桐城人嘉靖丙辰進士官刑部執法不徇屢觸權要嚴嵩父子銜之謫判沔陽以官銀抵逋負脫二百餘人於獄又清景藩閹豎所奪民田致干參奏世宗原其無罪再判濮州均治河苦役民戴之後復忤當軸以滄州守歸吳自洞字石蘭檄子嘉靖壬戌進士授行人以清望選翰林待詔充裕王講官正色開陳穆廟即位以青宫舊屬擢尚寶卿尋選太常寺卿自洞素與張居正善及居正柄政訖無一字相通旋以外補遂歸李彥字龍陽望江人嘉靖辛酉舉人任台州别駕歲飢典賑事活數萬人窮民鬻妻輸稅彥為贖完之有以孝聞者三式其廬擢漢中守屬鳳邑履畝圭度除荒糧五百石有竒吳肇東字敬堂懷寧人隆慶戊辰進士知桂林府愛民如子猺獞頑梗者咸稽顙庭下擢福建按察使將晉浙撫會張居正奪情凡官閩者皆弔唁肇東獨不遣因謫長沙遂歸張淳字希古桐城人隆慶戊辰進士知永康縣吏民狡黠前告罷七令淳至案牘委積剖決如流吏大駭服舉治行第一授禮部主事歷郎中張居正母死諷淳往祭乃謝病歸後起知建寧府歷陜西布政尋致仕優遊林下草餘年邑有重務力為民請澤遍鄉里焉劉尚志字士行懷寧人隆慶辛未進士授歸善令尋擢諌垣張居正柄國繩下嚴尚志上緩刑一疏歷任江西少參浙江海道選將練兵為防倭計甚悉按察福建轉山東左布政致仕歸睦姻任恤葬父躬壘負石哀聲徹林谷墓木生連理枝咸稱孝感盛世承字以烈桐城人萬厯丁丑進士以部郎出備兵大同時邊事旁午世承馭以鎮靜威信著聞轉陜西右布政蘭州機户疲於貢絨世承力蘇之擢四川左布政會有事於播播平又為善後䇿蜀人賴之病免再起以原官備兵陜西按行部中墾河灘荒地至千餘頃為秦中世世之利晉光祿卿璫禍削職任可容字子賢懷寧人萬厯丁丑進士官處州守屬邑有以香菌進者中匿金可容懲解役遣之遷惠潮道嚴飭武備壁壘改觀一創倭於碣石再創倭於南澳有出海船三十餘隻詐稱總督家丁可容盡逮置法又於南澳擒洋商五十四人總督誤作賊可容力白其寃釋之葉隆光懷寧人萬厯庚辰進士官吏部郎疏諌早定國本削籍歸卒光宗立詔求當日言事獲罪諸臣贈太僕寺少卿徐堯莘潛山人萬歷丙戌進士歷荆州守中官陳奉開礦沙市掘塜瀦室道路以目堯莘約其騶從不得逞劉大將軍綎征播調兵數省途出自荆民爭避之堯莘為經紀民獲安堵上嘉其勞晉廣東按察擢撫延綏不果赴與無錫顧憲成交密袁宗道以不言而躬行稱之方大美字黃中桐城人萬歷丙戌進士授常德推官多所平反擢御史巡按江西整飭吏治尤好士培植甚多轉按河南捐俸賑荒全活萬人終太僕寺卿楊材字遁生懷寧人萬歷己丑進士為户部主事給散京城各衛軍餉前官多侵牟材秉公散給歡聲動地遷吏部考功以執法忤當軸遂歸光宗立起太常卿轉左通政吳用先字體中桐城人萬歷壬辰進士由臨川令纍官都御史巡撫四川時播州亂大將劉綎以議餉不進用先躬率師先之督綎合戰戮力𠞰撫數月蕩平尋謝病上憫其勞特賜考績豫告家居八年起少司空改樞二總督薊州建防禦十䇿殫力籌畫會璫禍起致政歸金忠士宿松人萬歷壬辰進士為御史劾姦辨袁守時中貴邢隆立疏寢稅銀十五萬江南民獲更生巡按貴州浙江河南三省定水西討路苗降思南賑恤無告招撫流移後因建言忤旨左遷福寧道升按察司備兵榆林擢右藩撫延綏尋卒於邊諭祭葬贈恤胡瓚字伯玉桐城人萬歷乙未進士授都水主事分司南旺兼督泉閘泉司駐濟寧泗水所注瓚修金口壩遏之時議徴稅濟寧力言不便而止纍擢江西右參政告歸何如寵字康侯桐城人萬歷乙未進士由翰林歷祭酒宗伯以言事受知晉東閣大學士寬博坦白為正人所歸體素弱遂稱疾乞休後復以元輔召固辭所陳奏獨以培元氣逹大體為務卒贈太保諡文端何如申字仲嘉桐城人萬歷乙未進士授户部主事時尚書趙南渚加意率屬諸曹郎出署往往偵其所為獨如申鍵户咨討本曹故實趙公嘗語人曰吾安得郎盡如何者督糧遼東措置有方擢處州守諸衛士號泣攀轅大中丞疏留之竟得請又三年以參政分守嘉湖纍轉浙江右布政以病歸圖書外無長物馬孟貞字泰符桐城人萬歷戊戌進士由分宜知縣擢御史孤立不避強禦如摘制科之弊剪左道之惑陳僉商之害辨代藩之立爭福府之田疏凡百七八十上直聲振一時出為廣東副使不赴天啓初起太僕少卿姚之蘭字汝芳桐城人萬歷辛丑進士為海澄令開九都水利化斥鹵為膏腴居人德之遂名其地曰姚港纍官杭汀兩郡守汀地僻民瘠適朝議加餉乃搜府庫藏所餘者佐以贖義新餉五千金完如額不以纍民督餉使者以聞將超擢乃念母老請終養詔許之上嘉其急公愛民晉秩副使以榮其歸焉吳應琦字景韓桐城人萬歷甲辰進士擢監察御史巡按雲南威惠遠播補浙江道按順永保河諸璫相戒勿犯纍官南京大理卿馬人龍字霖雨太湖人萬歷甲辰進士授户部主事以犒邊奏績𣙜潯江稅賈人德之為立生祠遷粵西桂林道苗猺大訌人龍修戰艘繕城郭禦之轉楚右藩有楚才録蕉園草行世倪應春字申之桐城人萬歷丁未進士纍擢御史敷陳皆軍國重計光宗賓天引春秋世子不嘗藥正紅丸之罪李選侍移宫羣議鼎沸乃上仁義兼盡疏及楊漣去國復抗疏保留一時歎其正直晉太僕卿璫禍起削奪回籍姚之騏號渥源桐城人萬歷丁未進士方正尚氣節力學篤行仕湘潭令潔已愛民治績顯著以勞瘁卒於官何早字白夫懷寧人萬歷癸丑進士巡視下江適璫李明道督淮漕建議民運早力陳其不便疏爭之削籍去懷宗初銓部交薦有鯁直端方之旨賜歸里黃文星字辰北潛山人萬歷癸丑進士知同安縣甫一月颶風發民居幾盡文星輟訟一載復其廬舍調清豐治績益著擢駕部郎勤瘁卒於官櫬歸空槖而已方大任字玉成桐城人萬歷丙辰進士由元城縣令擢監察御史會魏忠賢墳塋越制特疏糾之削籍懷宗時召還升都御史方孔照字潛夫桐城人萬歷丙辰進士知嘉定州發姦如神忤上官調福寧所至有聲入為職方郎會魏忠賢欲封其兄子良卿為伯固執不覆遂削籍懷宗初起尚寶卿巡撫湖廣時張獻忠冦掠總理熊文璨主撫議孔照上八䇿極言招撫之誤與賊遇凡九戰八捷後以香油坪之敗為楊嗣昌所陷天下寃之旋得白以河北屯田御史解職歸姚孫矩桐城人天啓壬戌進士初令龍遊請停商稅商民祠祀焉再補泉之晉江地瀕海為鹹潦所淤飢民流離孫矩捐募糴榖以賑全活數萬擢西臺章奏悉中時弊左光先桐城人光斗弟天啓甲子鄉薦知建寧縣以異績入西臺按部兩浙勤恤民隱周核官方疏凡百餘上悉報可生平不避艱險偉烈直聲與兄齊名汪遊龍字六御懷寧人崇禎辛未進士知廣東靈山縣接壤交趾蛋户黎人時煽為亂遊龍至練兵設險民賴以寧調番禺值海冦劉香老入犯親決戰不避矢石香老卒成擒擢御史按閩時黃道周以劾楊嗣昌被謫力疏救之卒於官僚屬往殮惟敝衣數襲咸為泣下顔渾字伯通懷寧人崇禎庚辰進士為吏部主事憤要津持銓司短長乃倣范仲淹百官圖分注小册遇有囑託者即發册示之見者慚沮豫告歸囊槖蕭然雷縯祚字介公太湖人崇禎庚午鄉薦為刑部主事每臨鞫悽慘形於色多所平反皖荒人相食疏請蠲恤里中賴以全活王之慶字修祐望江人崇禎時貢生除福建尤溪令政成卓異因親老致仕當流冦狓猖之慶糾集鄉人立社保聚屢著戰功殁與左光斗雷縯祚並祀曰三賢祠宋儒字文卿望江人初為弟子員及長仕錦衣衛千户典告密錦衣在明為近侍可立取富貴儒獨亷惠凡死獄必求其生囚故無藉卧輒僵死儒奏以牧象草藉之囚繫者缺食又奏以無主盜贓食之遂定為例歲甲子鄰弗戒於火焚燬略盡儒樓獨存戊寅鄰又火亦如之蓋隱德之報云姚孫棐字戊生桐城人崇禎庚辰進士令蘭溪民漕苦南米一項孫棐力請兩臺具疏改本為折勒石永利調繁東陽臨城被圍馳走深山招集義勇乘懈擊敵東陽得保尋解組歸左國柱字碩人光斗長子光斗死璫禍國柱以藐孤重繭數千里具血疏伏闕號寃得昭雪復官賜祭葬襲蔭以副榜令浙之武康邑白糧久為屯丁侵攬勒索無休國柱力請官兌民困得蘇如出湯火惠政多端至今頌之子正務雲鳳篤學力行名流引重孫亷文韓俱有文名國朝姚文然字弱侯桐城人明癸未進士授翰林順治初擢禮科給事中康熙中掌印工户二垣諸條奏皆關國計民生而請寬大臣提解一疏尤為得體纍晉大司冦理寃清滯校閲爰書常至夜午年衰成疾諸子諌之則曰刃殺人於一時例殺人於萬世其可忽乎卒諡端恪張秉貞桐城人明辛未進士順治中歷官刑部尚書解枉釋滯多所平反改兵部運籌軍國以勤勞卒於官諡僖和江臯字在湄桐城人順治辛丑進士由瑞昌令遷守鞏昌大軍入蜀民困於兵臯與帥約軍卒無符信者不得入境忽有數騎將入村漁奪詰問其照身不得悉囚送軍門斬以徇由是肅然不犯改補柳州資遣被掠婦女遷平慶道運給軍需歷隴塞賀蘭諸險作籌邊九䇿擢大參罷歸官轉七階家無半畝年八十一卒盧璣字爾琛潛山人順治戊子恩薦授樂昌令均徭役緩催科纍遷永寧同知永寧故南詔地羌蠻雜處璣德化漸摩俗為一變署蒙化數月振興文學晉溫州郡守蒞任三月興利除害以勤勞成疾卒於官黃之麟字瑞白宿松人順治間由明經任江西興國令興界楚閩百粵久為賊窟之麟招降賊渠王大勇又滅賊渠孫可貴𠞰梅窖洞賊曽拱宸等冦亂始平寬免賦額墾田糧二千八百石有竒士民德之金繼望字又吕望江人順治六年拔貢除河南宜陽縣令兵燹之後招集勸墾民遂樂業擢兖州府黃河同知到任即周歷河干修築石香爐梁家樓新月諸堤水患又捐俸賑飢修曹縣學終九江太守高可極字爾建潛山人以歲薦知永豐縣下車即詳食鹽免充廣餉捐買馬不起民夫以老病去任士民焚香泣送數十里姚文熊字望侯桐城人康熙丁未進士令蕭山地值衝繁又閩亂未定芻糧取給於邑調度有方民得不困遷階州州與蕃地鄰亂後益凋敝到任悉除無名之征上官按舊例發吏督催文熊縛其驕橫者撻而遣之大計遂以不及例降調蕭人祀之姚文焱字彥昭桐城人八歲能詩年十四補博士弟子員康熙已酉登賢書司鐸長洲教士有方升峽江令革陋規輕徭役興學校戢姦宄峽人德之以母喪歸張芑字武仕桐城人以明經通判武昌署府篆值標辨夏逢龍叛被執不屈賊怒令禠衣冠縛置烈日中肌膚盡裂芑抗言益厲拘繫將戮之乘間夜逸録狀報部請師𠞰平復原官遷嘉定州懇荒修學士民德之孫元衡字湘南桐城人以明經知新城縣縣苦水患元衡濬孝婦小清兩河以殺其勢築堤十八里以捍其衝舉卓異擢蜀之漢州牧招集流亡給種教耕皆得安土爐蠻亂身歷行間設法轉運不匱又舉卓異遷東昌守張夔字次臯桐城人以明經歷知平山固安清苑皆畿輔近邑夔所至仁惠有聲有酆氏疑獄久未決夔至立辨又章氏為強暴所逼亷得其狀一時稱為神明舉荒政建義學毁淫祠臺臣交章薦之擢大名廣平兩郡司馬督理河務漳水決身親畚插捍禦堤防數月河患乃息被災之民捐俸賑給所活數千人吳昉字五玉桐城人康熙乙卯副榜學古通經自守以正推産諸弟友愛篤摰善誘後學江南北薰其教能文者甚衆司鐸豐邑士習文風為之丕變再攝縣篆豪民殺人輦金求釋卒抵之法年八十卒於官王字其人桐城人由稟貢教習為欒城令歲革羡餘千金浚井數百助民灌田欒人德之擢紹興别駕濬三江閘及杭城內通商河俱百年堙廢之迹以卓異纍遷彰德太守張廷瓚字卣臣相國英長子康熙己未進士荐登宫尹趨承講幄屢膺纂修之任分校禮闈典試山左皆稱得人聖祖北征沙漠三臨絶塞廷瓚以儒臣與扈從之列屢被殊恩務益恪慎厥職尤熟於掌故翰苑著作多出其手生平孝友任恤長子若霖字巖舉天性孝友好義樂施文行兼茂稱令子焉夏瓆字景文桐城人博學工文以貢授雲南呈貢縣令振興文學革除陋規給牛種以勸墾歲飢賑救全活甚衆張若霈字雲舉桐城人廷瓚次子康熙戊子舉於鄉初任嚴州同知攝義烏篆捐金造東門巨橋邑人名張公永濟橋建祠橋側祀之遷梧州守輯盜寧民平糶給種多著善迹擢蒼梧鹽驛副使病卒特贈按察使銜雍正九年祀廣西名宦祠江南通志卷一百四十六欽定四庫全書
