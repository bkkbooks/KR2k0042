body:
  text: 江南通志卷一百四十四人物志宦績六揚徐二府揚州府後漢劉熊字孟陽廣陵海西人仕為酸棗令按金石古文稱熊光武皇帝曽孫廣陵王之孫俞鄉平侯之季子守約履勤睿敦五經既練州郡賞善礪頑勤恤民隱貪宄革情清修勤慕吏民愛之若慈母畏之如神明相與採托謠言刋之碑石焉三國吳吕岱字定公廣陵海陵人孫權召署録事補餘姚長拜昭信中郎將厯交州刺史遷安南將軍假節拜鎮南將軍屯長沙渦口代潘濬領荆州文書與陸遜並在武昌故督蒲圻前後討平冦賊功甚多封都鄉侯進番禺侯岱潔身奉公妻子飢乏權聞加賜錢米嘗薦吳郡徐原官至侍御史岱時有得失原輒諫諍又公論之及原死岱哭之甚哀曰德淵岱之益友今不幸岱復於何聞過談者美之太平元年年九十六卒子凱嗣張紘字子綱廣陵人策表為正議校尉奉章至許留為侍御史孔融等皆與親善操聞䇿薨欲伐吳紘諫止之操即表權為討虜將軍領㑹稽太守出紘為㑹稽東部都尉後權以紘為長史從征合肥權率輕騎將突陳紘諫曰此偏禆之任非主將所宜乃止紘建計宜都秣陵權從之臨卒遺箋勸求賢受諫抑情損欲權省書流涕子𤣥清介有高行官至南郡太守尚書范慎字孝敬廣陵人初與謝景刁𤣥羊衜等為太子登賓客竭忠知己之君纒綿三益之友時人榮之後為侍中出補武昌左部督治軍整頓孫皓移都甚憚之以為太尉慎自恨久為將遂託老耄軍士戀之舉營為之流涕卒子耀嗣晉劉頌字子雅廣陵人文帝辟為相府掾奉使於蜀時蜀新平人飢土荒頌表求賑貸不待報而行由是除名武帝踐阼拜尚書三公郎纍遷議郎守廷尉執奏尚書令史扈寅冤在職六年號為詳平左遷河內太守表罷公主水碓流水不壅民獲其利除淮南相在官嚴整甚有政績數上疏論事為時論所美後為三公吏部尚書論罷加趙王倫九錫為光祿大夫門施行馬卒諡曰貞戴淵字若思廣陵人舉孝亷纍功授征西將軍鎮夀陽王敦舉兵詔淵還鎮京都石頭失守淵與諸軍攻石頭敗績受詔見敦敦問曰前日之戰有餘力乎淵不謝而答曰豈敢有餘但力不足耳俄收淵害之賊平贈右光祿大夫諡曰簡弟邈字望之好學精漢史上疏請興禮樂元帝嘉納焉仕至尚書僕射卒諡曰穆高嵩字茂琰廣陵人少好學善史書除太學博士簡文帝輔政引為撫軍司馬時桓溫率衆北伐嵩為簡文作書諭以禍福溫即還鎮哀帝雅好服食嵩切諫之南北朝齊荀伯玉字弄璋廣陵人齊高帝鎮淮隂為冠軍刑獄參軍霸業建伯玊忠勤盡力大見委信唐李鄘字建侯江都人雍從孫第進士李懷光辟幕府懷光反鄘刺賊虛實白之朝德宗手詔褒答懷光聞囚之及河中平馬燧破械致禮召為吏部員外郎持節諭徐州時張建封卒子愔上表自稱兵馬留後鄘以非詔命削去之乃受拜淮南節度使王師討蔡鄘以兵二萬分壁鄆境召拜門下侍郎同中書門下平章事引疾固辭後以太子少傅致仕王起字舉之太原人父官揚州遂家焉由進士為校書郎纍遷中書舍人數上疏諫穆宗畋遊厯户部尚書判度支靈武邠寧多曠土奏為營田以省餽挽遷山南東道節度使修復濵漢塘堰遂無凶年後為相封魏郡公凡四典貢舉所取皆知名士王鐸字昭範起從子㑹昌中進士纍官拜同平章事黃巢陷長安鐸請討賊乃以為諸道行營都統移檄天下時諸將環賊莫敢先發鐸檄至將士皆奮巢勢日蹙宦者田令孜料賊必破欲功出北司乃搆鐸於帝罷為檢校司徒義成節度使五代髙郁廣陵人楚王馬殷引為謀主初殷兵力寡弱畏楊行密成汭之彊郁勸之修貢京師以圖霸業又教其鑄鉛鐵錢命輸稅者用帛代錢未幾國以富饒鄰國皆疾郁殷子希聲聽反間矯殷命殺之南唐李建勳字致堯廣陵人德誠子少好學能屬文家世將相杜門不預世事後為南唐相𤣥宗立建勳謂宜得方正之士朝夕獻替出為撫州節度使召拜司空及出師平湖南人皆賀建勳曰禍始此矣稱疾致仕賜號鍾山公營别墅於山中放意泉石卒贈太保諡曰靖喬匡舜字亞元高郵人弱冠能屬文仕南唐周侵淮南諸將屢敗𤣥宗議親率六軍拒之匡舜上疏極諫見忤流撫州何敬洙廣陵人仕南唐為楚州團練使察民疾苦有科條輒先為經畫民不知勞遷武昌軍節度使周師至敬洙除地為戰場曰敵來吾與兵民俱死於此後以太師致仕宋崔希甫高郵人有才略江南平潘美言於太宗召見拜太子中允賜金紫轉監察御史凡朝廷更置諸道事務及指揮沿邊將帥多命希甫乘傳處分輒稱上意賜金帶仍命懸魚時號重金御史陳知微字希顔高郵人咸平五年進士纍轉京東轉運副使奏還東平監所侵民田六百八十家又決古廣濟河通運路罷夾黃河嵗減夫役數萬厯官判司農寺糾察在京刑獄知微沉厚有才幹不務徼察有集三十卷孫長卿字次公揚州人以任為校書郎倅河南府天雨軍營壞或言衆將叛洛中歡然長卿馳往撫諭衆遂定厯江浙荆淮發運使嵗漕米至八百萬石知慶州州高亢旱苦無水為鑿百井皆及泉羅川馬嶺棧道危險為訪唐故制闢成通途知定州當得園利八十萬悉歸之公終兵部侍郎孫錫字昌齡真州人進士以文學稱居官仁恕提㸃淮南刑獄考課為天下第一知宣州召五縣令約以州所下書有不便封還故縣得自為政而州無事尋知舒州發常平廣惠倉以活流人官至度支郎中呂溱字濟叔揚州人進士第一厯官翰林學士疏論宰相陳執中奸邪仁宗還其奏溱曰以口舌論人是隂中大臣也願出以示執中使自辨未幾執中罷溱知徐州以與轉運使李參不相能為所誣劾貶秩後起知開封府辨訟立斷豪惡斂跡以病改樞密直學士卒溱自貴重接賓客不過數語人稱七字舍人云周孟陽字春卿泰州人寶元中進士諸王府記室英宗在藩邸極禮重之其辭宗正表几十八上皆孟陽為之即位擢集賢殿修撰神宗時上疏言祖制不宜輕改拜天章閣待制卒孫覺字莘老高郵人從胡瑗學登進士第調合肥簿嵗旱州課民捕蝗覺言民方艱食難督以威若以米易之必盡力守悅推其說下之他縣熙寧初知諫院青苗法行託於周官行國服為息覺奏其妄出知廣德軍哲宗即位遷諫議大夫論罷宰相蔡確韓縝擢御史中丞以疾罷歸遣使存勞賜金有文集奏議及春秋傳若干卷孫覽字傳師覺之弟由進士厯右司員外郎荆湖開疆命往相其便覽言沅州所招溪洞百三十宜從本郡隨事約束勿遣官置戍以為民困自誠州至融江口可通西廣鹽以省北道餉餽悉從之拜户部侍郎與蔡京論役法不合出知太原西夏據橫山並河為寨秦晉之路皆塞覽擊敗之復取葭蘆戍城之而還䇿勳加樞密直學士孫升字君孚高郵人第進士哲宗立為監察御史多所建明進侍御史論翰林承㫖鄧伯溫草蔡確制稱其定䇿功比漢周勃欺天負國不報紹聖初被劾奪職同邑孫谼字若谷隆興進士為繁昌尉亦以惠政聞喬執中字希聖高郵人治平進士提舉湖南㑹章惇討五溪檄執中取大田離子二峒峒路險絶執中但走一校諭其長即相率歸命召為司農丞提㸃開封縣時牧地民耕嵗久議者將取之將夷邱墓伐桑柘執中請復豫民厯官刑部侍郎後知鄆州卒執中寬厚屢典刑獄雪活以百數嘗疏論讞獄失出入者不宜同坐恐法吏不復肯與生比非好生洽民之德栁植字子春真州人少貧自奮為學舉進士甲科為大理評事遷著作郎厯知蘇杭夀亳潁揚等州分司西京致仕植平居畏慎寡言笑所至官舍蔬果不採家無長物時稱其亷孫鼛字叔靜江都人趙抃薦其才知偃師縣徽宗初召為屯田員外郎素與蔡京善京欲引為助以正言拒之京既相出鼛提㸃江東刑獄厯知曹鄆單三州卒諡通靖張汝賢字祖禹真州人第進士除監察御史元豐間以論尚書左丞王安禮與俱罷元祐初使閩粵奏弛茶鹽增價得減十之八又以赦令蠲民所負官錢米五十餘萬以左司郎中召還道卒張汝明字舜文汝賢弟元祐進士仕州縣二十年未嘗干進大觀中為監察御史劾蔡京市恩招權帝奬其直京憚之徙漢陽判官晚知嶽州汝明事親孝貫穿經史所著書不襲前人語沈錫字子昭真州人崇寧初為講議司檢討蔡京方銓次元符上書人欲定罪錫曰逺方之士未知朝廷好惡若槩罪之非敦世厲俗之道京不從厯知江寧府江淮間往往以誣告興獄錫按知其妄具疏於朝由是他郡繫者皆得釋以通議大夫致仕卒兄銖字子平厯官中書舍人兼侍講每進講哲宗首肯之時丹立興化人元祐間任高郵司理蒞政仁恕民德之鄉人稱其所居曰時堡莊徽字彥猷江都人政和初知平江郡豪朱勔被寵官吏無不傾身事之徽獨不假借朝廷命官造乘輿服御於浙西特令徽與勔協理尋詔罷徽曰此天子盛德事大臣亟當承奉即日罷之在官六年乞閒提舉洞霄宮卒劉大中字立道真州人經明行飭鄉黨稱醇儒厯官州縣擢監察御史宣諭江南東西路以和議不協請外在朝言事首議建儲高宗感悟賜以御書文賦李正民揚州人政和二年進士中詞學兼茂科建炎初除中書舍人出為兩浙江西湖南撫諭使以奉使稱職除給事中吏部侍郎請復宣和以前通令佐並帶主管學事銜以示偃武修文之意仕至徽猷閣待制孫直養字無害知平湖置冢瘞沿海溺死五百餘人知海鹽擇朱沆為小學師民興於學李易字順之揚州人好學多聞以清素見稱高宗䇿試進士第一纍官至敷文閣待制初授江隂軍判官金兵至守臣謂易曰吾當死城郭君有母宜避之易告其母母曰我去汝必無意堅守死生當與汝同之由是易與守臣固守金兵遂引去周麟之字茂振泰州人登紹興進士中博學宏詞第一授著作郎以極諍和議謫祕監分司南京居瑞州孝宗立復原官充哀謝使使於金言詞詳雅敵為加禮後拜同知樞密院事李衡字彥平江都人登進士第知溧陽縣以誠化民鄉無吏迹而輸稅先他邑任四年獄户無一重囚隆興二年北師至淮官㳂江者多遣孥歸衡獨移家至邑民心大安入為監察御史廷爭外戚張說不當使掌兵柄改除起居郎致仕退居崑山聚書講學號曰樂庵史正志字志道江都人紹興進士薦除樞密院編修乞築和州城壘及舒揚防守荆襄事宜孝宗即位除員外郎後忤時相謫永州尋復原官賜文安縣開國男著有建康志十卷牛大年字隆叟江都人慶元進士官將作監主簿入對言人主當致念於天命人心之所繫士氣久靡當扶持作興以為風俗之本纍遷至寶章閣待制亷潔自將以餘俸置義莊給諸貧族所撰有支山集明汪廣洋字朝宗高郵人舉元進士明太祖渡江召見為元帥府令史厯官左承封忠勤伯洪武四年為右丞相禮遇特隆已而御史中丞凃節言劉基死毒廣洋宜知狀謫海南行至太平再賜敕切責遂自經死著有鳯池吟藁八卷蔣宮字伯雍真州人博極羣書於制度沿革隂陽厯數之義無不通元至正初登第洪武元年授蘭陽縣丞兵燹之餘招流亡通商販開學校邑以大治徐司馬字從政揚州人太祖養子厯官都指揮使鎮河南甚倚重之司馬好文學拊循士卒極得衆心公退蕭然若寒素陳琰字公信江都人洪武丙子嵗薦授御史巡按雲南遇事明斷出廨見東家烟突出人手若招訴狀心知有冤猝召其家督錮之而搜檢其家物得江西估客路引一紙乃呼訊曰爾前者沒估客財而殺之匿其尸竈下今露矣其人即伏罪人詫其神官至陜西布政使成璡興化人洪武中授代州學正升蔚州知州為政清肅與守將協修邊備民賴以寧永樂初為北平布政司參議卒洪熙初贈兵部尚書陳晟字克昭寶應人洪武中以能書薦入中書預誥敕尋擢五軍斷事一日當奏獄上收其奏牘令晟背誦晟條對如流上曰汝年少特試汝於獄用心否耳仕終吏部主事陸顒字伯瞻興化人以明經薦為禮部主事兩使朝鮮不辱朝命奉敕建湘獻王碑纂修實録屢獻詩文字畫太宗以三絶稱之轉户部郎中分治水利董運江淮聲望赫然高穀字世用興化人永樂乙未進士選庶吉士改春坊司直正統十年入內閣英宗北狩穀居守預立景帝進工部尚書少保東閣大學士順天鄉試陳循以子失舉奏誣考官劉儼穀曰大臣子與寒士並進已不可况又不安於命乎儼乃得免裕陵復辟內閣諸臣皆獲罪上曰穀在內閣議迎駕及南內事皆左右朕無他腸可致仕穀性儉素位台司敝廬瘠田而已成化初贈太保諡文義龔謙字廷益揚州人正統戊辰進士授監察御史英宗北狩首疏迎復建儲二事時論韙之巡鹽兩浙清軍湖廣卒於官張冤字汝端江都人天順乙卯舉人任台州府同知遷澄江知府居官清介罷任歸舟家人誤擕官署二釡冕見命返之其操如此張文字存簡泰州人天順已卯鄉試第一成化丙戍登進士任刑部郎録囚畿內有馬平兒者報父仇抵罪文奏請得免死丁酉賑兗州飢民全活甚衆升浙江副使高銓字宗選江都人成化己丑進士纍官保定巡撫有奸人獻民地為皇莊銓勘實以聞歸其地於民厯南户部尚書歸德有黃河退地千餘頃為親藩所據銓按實奏還民黃瓚字公獻儀真人成化甲辰進士纍遷江西右布政宸濠不法諸司多為所制瓚獨不屈轉湖廣左布政吏部疏天下外官治行五人瓚第一巡撫山東賜一品服帶入為南京兵部侍郎江彬扈從南巡值生日部寺俱賀瓚獨不往嘉靖初致仕冒政字有恆泰州人成化乙未進士官山東參政弛南旺湖禁以恤貧民巡撫寧夏守官亷劉瑾求賄不得遂坐事罷歸後復職致仕儲巏字靜夫泰州人成化癸卯甲辰鄉㑹試皆第一授南吏部主事轉考功郎持正不撓嘗核一官尚書耿裕欲改評巏不從曰公所執何異王介甫裕大慙曰我固知君然非我不能容正德初塞上有警陳禦邊五事又陳馬政多議行劉瑾擅權引疾致仕瑾誅起南吏部侍郎卒諡文懿巏淳行清修介然自守工詩文所著有柴墟集胡獻字時臣興化人𢎞治丙辰進士廷對策譏切時弊尚書馬文升讀卷歎服選庶吉士踰年授監察御史清寧宮災應詔直陳言五事逮錦衣獄謫宜陽知縣尋改福建提學副使未任卒徐蕃字宣之泰州人𢎞治癸丑進士授吏科給事中以劾中官高鳯廷杖幾死放為民後起為江西參議討平東鄉冦纍升工部侍郎趙鶴字叔鳴江都人𢎞治丙辰進士以户部郎中督永平山海薊州糧草兼視屯田條上十六事升建昌知府以不賂閹瑾左遷南安同知擢金華知府進山東提學副使致仕嘗編維揚郡乘著具區文集王軏字戴卿江都人𢎞治乙未進士授户部主事奉命視直𨽻閩浙倉庫所至嚴核欺隱改工部員外郎監遵化鐵冶劉瑾黨致書請託且恐以危言軏不顧巡撫四川征芒部土官擒其魁改其地為鎮雄府進户部右侍郎查畿內勳戚莊田及牧馬場租銀盡發諸侵沒者總督倉場請罷京通二倉太監及重開㑹通河升南兵部尚書致仕楊果字實夫興化人𢎞治壬戌進士官至户部侍郎天性孝友居官時以母老不挈妻子自處恬退嘗謂人曰吾平生無所長唯不識劉瑾錢寧江彬三人差自慰耳葉相字良臣江都人𢎞治壬戌進士官給事中首劾劉瑾又上建儲漕運庫藏等十餘疏皆愷切識治體出參貴州轉江西布政已復遷貴州巡撫㑹芒部構亂相討平之擢户部侍郎轉刑部乞休盛儀字德章江都人𢎞治乙丑進士觀吏部政時劉瑾以事干尚書託儀為致書儀拒不許官至太僕寺卿以清峻著名著維揚志二十卷顧仕隆江都人鎮逺侯溥子嗣爵正德初為漕運總兵請恤軍卒開通惠河以清白聞嘉靖中掌中軍都督府事論救楊廷和功在社稷不當用小人王邦奇語傷國體詔切責移病解營務卒諡榮靖子寰嗣爵亦為漕運總兵官請江南北被災地停漕運一年改折色軍民交便移鎮兩廣定安南莫宏瀷之位討平平樂猺還鎮淮有禦倭功入總京營萬厯初致仕卒諡榮僖俞敦字崇禮江都人正德辛未進士授庶吉士改刑科給事中疏陳江彬逆狀不報錢寧求納交峻拒之遷禮科使安南進都給事出知梧州徐晉字文明江都人正德辛未進士厯任南兵部郎中宦官劉琅怙勢肆橫晉以法繩之不少貸宸濠叛南都震恐尚書喬宇知晉才悉以軍事委之及駐蹕南都供億旁午晉從容取辦尋升青州知府王紀字理卿泰州人正德辛未進士授進賢知縣討平洞蠻進南兵科都給事中武廟南巡紀屢疏請還被謫復起知武城縣㑹滹沱河決捍治有功擢知高唐州以賑飢積勞卒於官儲洵字平甫泰州人正德辛未進士官沔陽守修隄捍水升漳南僉事設方略除盜所著有革除録蔣山卿字子雲儀真人以詩名於時正德甲戌進士諫南巡被杖謫前府都事嘉靖初復官知南寧府時討思田土官岑猛以調度軍餉功進廣西參政在南寧入覲上言安邊備猺方略時稱碩畫所著有南冷休園等集張綖字世文髙郵人正德癸酉舉人厯光州知州嵗饑請賑全活甚衆歸居南湖著南湖集若干卷樓觀字國光江都人正德丁丑進士由郎中為興化知府仙遊苦海冦觀令鑿石築城民賴以安升湖廣副使致仕高字升之江都人正德辛巳進士授寧波推官攝郡事㑹日本貢使搆亂討平之遷知順德府甫抵任武宗幸承天道經順德區畫供帳立辦㑹城沙河工峻升河南副使河決睢州野雞岡鑿孫繼口塞河以疏橫流漕運賴之詔增俸一級所著有南兗州集方岑字伯高江都人嘉靖丙戌進士出知杭州府先是海寧令某引用巨猾數人恣營奸利己乃逮諸巨猾下獄夜使人殺之以滅口事發岑按驗有狀庭笞逐之而令為按臣私人遂為所中傷免官著有竹素齊集蔣應奎字文煥江都人嘉靖丙戌進