人使榮藩却餽贈甚見敬禮疾假家居二載起為吏部主事厯四司尋復告歸著有㑹心言初日齊集解學龍字石帆興化人萬厯癸丑進士天啓初由推官擢給事中學龍多所建白魏璫惡其抗直使御史智鋌劾之奪職歸崇禎初起補户科纍官至右僉都御史巡撫江西屢𠞰巨冦進南兵部右侍郎初黃道周以劾楊嗣昌奪情貶江西藩幕學龍至是力薦道周上以為黨庇廷杖戍貴州後召還定從賊案忤阮大鋮削籍吳甡字鹿友興化人萬厯癸丑進士知邵武縣擢御史以忤璫罷歸崇禎初起巡按河南擒誅大盜李思慎建伊洛書院修于謙祠請立邵雍後為五經博士時延綏饑民為變命甡往賑撫單騎宣諭衆皆羅拜擢僉都御史巡撫山西治兵守河無一賊潛渡者殱大盜賀宗漢等在晉四年民戴若慈母入為兵部侍郎拜東閣大學士譴歸子元萊官保定副使姜士望字宗林儀真人以孝友聞萬厯丙辰進士授中書舍人奉使冊德藩尋引疾歸張伯鯨字繩海江都人萬厯丙辰進士崇禎初遷户部主事出督延寧二鎮軍儲通商惠工軍民便之擢兵備僉事敗套兵於長樂堡厯遷巡撫户部侍郎轉兵部攝尚書事引疾家居俞都美字士仲江都人以廩例入太學除安州通判州瘠而多水都美為治隄梁嵗饑捐俸以賑攝定興篆熹宗保母客氏子弟橫里中以幣交都美毁刺笞其使遂告歸徐耀字蓼莪泰州人崇禎戊辰進士授龍溪知縣收海冦劉香老泰州舊有江南飛派鳯米民甚苦之耀特疏奏請嵗省萬餘石終右僉都御史卒賜祭葬韓如愈字唐山興化人崇禎辛未進士授安化知縣土司安某與總兵殷朝陽有隙誘至家矐其目復行賄大吏圖脫罪如愈獨弗受力請抵法竟削其職擢工科給事中督漕江西奏真人張應京不宜賜第京師轉兵科右給事巡視京營稽核隱冒無所徇山東總兵劉澤清數失律隂使人刺取兵垣章奏如愈疏發其奸下其人於理澤清恐走書幣求解詈而麾之甲申督餉出都澤清遣麾下要於道遂遇害李思誠字次卿興化人春芳孫萬厯戊戌進士纍升江西按察使劉忠節綎以死封疆功世襲子吉幼其從兄賄直指謀奪之思誠力持不可卒以豫吉召為太僕卿厯官禮部尚書㑹都城多火災樞臣王永光請歸票擬於內閣以弭天變魏璫銜之而思誠疏稱永光有大臣敢言氣遂以贓罪誣思誠下鎮撫司許顯純治顯純故駙馬子初欲以女為信王妃思誠奏舊制無戚里重姻者事遂寢至是坐思誠贓三千兩奪職後楊維垣吳默等交章奏雪起用尋卒王相說字懋弼泰州人天啓壬戌進士授袁州推官擢御史請復召對之制疏論溫體仁用黨字塞言官口出巡山西時叛卒潰兵戕賊官吏變且坌起相說單騎撫綏㑹兵𠞰撲遷湖廣參議俄告歸喬可聘字君徴寶應人天啓二年進士授中書舍人是時魏忠賢勢方張即請告終養崇禎改元補前官吏部侍郎張捷力薦逆案吕純如為本部尚書有㫖不許給事中呂黃鍾遂薦捷為之可聘上疏謂捷罪浮於逆案中人黃鍾罪又浮於捷彼倡此和相倚為奸禍自此始矣考授監察御史巡按浙江可聘雖與東林諸人還往及臨事是非可否直道而行不肯雷同附麗於是東林亦有不悅者坐事左降後起御史數言事不報遂歸國朝王永吉字修之高郵州人天啓乙丑進士官至薊遼總督歸本朝起為大理寺卿厯工户二部侍郎由兵部尚書入相復由內院大學士出領吏部尚書永吉洞曉世務條奏民生吏治剴切無支辭風度峻飭不受私謁卒諡文通戎政興化人選貢生順治初曽參征廣軍幕初任福建歸化縣禦賊守城再任莆田開誠撫諭俱著勞績張幼學字詞臣泰州人順治丙戌進士授鄞縣知縣後遷大興以亷能稱有詩集陳卓字懋修江都人順治丁亥進士由刑部郎提學四川時蜀新定文學荒廢卓出經籍令傳寫相教授文風日振升陜西臨鞏道副使復官商分茶之法辨部民受逆􅉰僞劄者再擢荆南道參政歸徐炟字符禺興化人順治己丑進士特授廣東督糧道時粵東餘孽未靖軍事旁午炟駐大營備糧糗供芻茭經畫周詳三年始奏擴清轉陜西參政厯升廣東布政季開生字天中順治已丑進士選庶吉士授兵科給事中以言事謫尚陽堡後奉恩詔復原官以喪歸里廕一子入監郭礎字公石江都人順治壬辰進士授户部主事知順德府府東北有古大陸嵗漲為田廬害礎令挑牛尾河三百餘丈濬大郝黃梅諸口自是夏無橫溢諸邑賴之俞鐸字天木泰州人順治壬辰進士選庶吉士授監察御史巡按宣大疏罷監司之不職者遷分守口北道參議營築獨石邊牆冒寒疾卒鄭為旭字方旦江都人順治辛卯拔貢授中書纍遷監察御史請選官加驗看視學遣詞臣分進士舉貢援例班次以疏銓政次第舉行從弟為光字晦中順治己亥進士選庶吉士改授監察御史請剔揚州關鈔積弊清江都加派稅糧節鳯米浮費皆報可卒於官金懷玉字式如江都人順治戊戌進士授泉州推官時海氛未靖沿海州邑數十里外築牆為界有踰牆出者以通海論懷玊至録釋繫獄千餘人白上官曰此不過小民資漁利為活者也遷瑞州府同知卒張瑾字去瑕江都人康熙癸卯舉於鄉除昆明知縣吳逆初平民未復業瑾為給牛種招墾荒地請開白沙清水馬裊三河以資灌溉案無留牘凡他郡有疑獄不决者上官輒下瑾理之卒於官喬萊字子靜寶應人可聘子康熙丁未進士除中書舍人舉博學宏詞改授編修主廣西鄉試厯升翰林侍讀時御史奏濬海口㵼積水總河御史上言疏海口則引潮內侵大不便請於邵伯高郵間置閘泄水復築長隄抵海口以束所泄之水使水勢高於海口則趨海自迅下廷臣議適萊入直上召問力陳不可議遂寢未幾中蜚語罷歸復召卒於官宮夢仁字宗衮太史偉鏐子康熙庚戌㑹試第一選庶吉士授御史奏止開礦請治河先疏海口出為河南湖廣參議纍遷副都御史巡撫福建罷歸旋以修河勞績復原官夢仁行已居官剛直不阿服御無改寒素所著有自訂文集草一史名臣言行録讀書紀數略五十卷李柟字木菴興化人康熙癸丑進士選庶吉士厯坊允纍遷左都御史疏論督撫覆奏不當詆言官藩司停升本省巡撫以杜虧空請急撥江南近海州縣糧儲由海運賑山東六郡饑請遇水旱預蠲新租毋貸舊缺使胥吏不得以已徴飽私槖又奏刑曹檢核具稿全倚司屬必甄拔明通律例不畏强禦者大理職司平反當寬以濟嚴無取附和掌憲五年持大體務平恕所著有律令箋注大逺堂集許承宣字力臣江都人康熙丙辰進士改庶吉士授工科給事中首陳揚州水利賦役二疏辛酉典陜西鄉試還條上秦晉間利弊六事悉見嘉納弟承家字師六康熙乙丑進士官編修請假歸兄弟里居皆以循謹惠愛見稱劉國黻字禹美寶應人康熙壬戌進士選庶吉士遷户科都給事建言民田有大地小地上中下地之殊起科輸稅或以數畝當一畝故有田少而賦多田多而賦少賦役全書不明言其故恐吏緣為奸異日借言清丈欲以一畝作數畝民何以堪請敕核折數具載書中以埀永久時有請丈量淮揚田畝以羡地入官鬻之者國黻疏出乃寢纍官至鴻臚卿徐州府漢蕭何豐人初為沛主吏掾高祖為亭長何嘗左右之及從入關何獨收律令圖書藏之具知天下厄塞户口民所疾苦沛公為漢王以何為丞相守關中轉漕給軍食無乏天下既定論功為第一封酇侯卒諡文終行封時詔定功臣位次皆曰曹參功最多宜第一鄂千秋曰曹參雖有野戰略地之功特一時之事蕭何常全關中以待陛下此萬世之功也何功當第一帝曰進賢受上賞何功雖高得鄂君乃益明亦封鄂平安侯曹參字敬伯沛人秦時治獄掾以中涓從高祖定天下攻城略地功最多封平陽侯惠帝時為齊相師蓋公用黃老術齊國大治後代蕭何為丞相一遵何約束民樂其清靜卒諡懿王陵沛人始為縣豪高祖微時兄事之及定三秦陵以兵屬焉天下既定封安國侯為右丞相高后欲王諸呂陵力爭之遂謝疾免樊噲沛人從高祖為舍人多戰功鴻門之㑹噲居營外聞事急持盾撞入營誚讓項羽從高祖走霸上軍天下既定封舞陽侯高帝嘗病惡見人詔户者無得入羣臣噲乃排闥直入見上獨枕一宦者卧流涕諫以趙高之事周昌沛人從高祖破項籍封汾隂侯拜御史大夫高祖欲易太子昌力爭不奉詔是嵗封如意為趙王年十嵗擇貴彊相為呂后所敬憚者護之乃徙昌相趙既而太后鴆趙王昌謝病不朝見尋卒周勃沛人以中涓從高祖戰功多封綘侯後與陳平謀誅諸呂迎立孝文帝為右丞相卒諡武周亞夫勃次子為河內守文帝封為條侯六年為將軍軍細柳文帝自勞軍先驅不得入以詔諭之乃徐行入營天子為改容式車既出曰此真將軍也景帝時吳楚反以亞夫為太尉討平之遷丞相任敖沛人高祖初起敖以客從為御史守豐遷上黨守陳豨反時敖堅守封廣阿侯陸賈楚人有口辨使南越諭趙陀稱臣擢大中大夫著書論古今成敗每奏一篇高帝輒稱善名之曰新語後諸呂擅權危劉氏賈說陳平交歡絳侯迎立文帝賈有力焉以夀終季布楚人任俠有名初為項籍將數窘漢王籍滅高祖購布急因滕公為言乃赦布召拜郎中文帝時為河東守布弟心亦任俠心以勇布以諾並聞關中申屠嘉梁人以材官從擊項籍為都尉至孝文時以御史大夫拜丞相封故安侯亷直不受私謁鄧通以弄臣戲殿上嘉召至欲斬之赦至乃免後漢朱浮字叔元蕭人從光武破邯鄲為幽州牧定北邊封武陽侯後入為執金吾帝以長吏多不勝任微過輒斥罷浮因日食上疏諫自是牧守易代頗簡又言國學既興宜廣博士之選帝然之遷大司空徙封新息侯劉般字伯興宣帝後封於楚般父紆王莽廢為庶人因家彭城建武中詔封般為菑丘侯太守薦般束修至行為諸侯師帝嘉之賜錢幣顯宗時徴行執金吾事遷宗正般在位數言事收恤九族行義尤著子愷當襲般爵而逃讓與弟憲久之侍中賈逵陳其事徴拜為郎纍遷三公舊制公卿二千石不得行三年喪愷議以為非崇化厲俗之道從之趙興下邳人肅宗時為司隸校尉性剛正官至潁川太守子峻官至太傅以才器稱孫安官至魯相三葉皆為校尉時稱其盛吳樹下邳人為宛令辭梁冀冀賔客布縣界以託樹樹曰小人奸蠧比屋可誅將軍宜崇賢善以補朝闕侍坐以來多託非人非敢聞命冀默然到縣遂誅冀賔客為民害者數十人冀深怨之後為荆州刺史臨去辭冀冀為設酒因鴆殺之劉矩字叔方蕭人少有高節舉孝亷為雍丘令以禮讓化民路不拾遺纍遷尚書令性亮直失大將軍梁冀意出為常山相冀敗代黃瓊為太尉瓊為司空同心輔政號為賢相陳球字伯真下邳人陽嘉中舉孝亷遷繁陽令太守諷令納賄不與為零陵太守賊冦消散州兵朱蓋等反與桂陽賊數萬轉攻零陵掾請遣家避難怒斥之卒破賊斬蓋等為廷尉時竇太后崩宦官曹節等以積怨欲别葬太后以馮貴人配祔球首發正議公卿以下皆從之後拜司空太尉謀誅宦官事泄下獄死二子瑀吳郡太守琮汝隂太守弟子圭舉茂才濟北相並知名刁韙字子榮彭城人建和時為侍御史坐朋黨禁錮後陳蕃被徵復拜議郎遷尚書在朝有鯁直節出為魯東海二郡相性慷厲有明略所在稱神常以法度自整家人莫見惰容焉審忠梁人靈帝時郎中上書言宦官朱瑀等罪惡極切直後辟公府陳登字元龍圭子年二十五舉孝亷學兼文武有雄姿異略守廣陵有威名破孫策兵遷東城太守廣陵民拔郡送之以功加伏波將軍卒年三十九三國魏張茂字彥林沛人青龍三年為魏太子舍人時明帝盛興宫室留意玩飾又録奪士女前已嫁為吏民妻者還以配士茂上書極諫甚切直吳張承字仲嗣昭長子少以才學名為長沙西部都尉平山冦遷濡須都督奮威將軍封都鄉侯承為人壯毅忠讜能甄識人物拔蔡欵謝景於孤微童幼後並為國士弟休字叔嗣襲昭爵弱冠為太子登僚友以漢書授登徙中庶子轉右弼都尉權游獵暮歸休上疏諫戒權大善之後以孫𢎞譛賜死蔡欵字文德彭城人厯位內外以清真顯於當時後以衛尉領中書令封留侯吳展字士季下邳人仕吳為廣州刺史忠足矯非清則厲俗信可結神才可幹世吳平還下邳閉門自守不交賔客晉劉隗字大連彭城人元帝時為從事中郎遷丞相司直彈奏不畏彊禦賜爵都鄉侯為丹陽尹雖在外而萬機祕密皆預聞拜鎮北將軍鎮泗口王敦作亂以討隗為名詔徴隗還京師請誅敦不從及攻敦於石頭不克遂别帝去奔石勒南北朝宋劉簡之彭城呂人為宋武帝所知赴義京口位太尉咨議參軍弟謙之好學撰晉紀二十卷位至廣州刺史子道産為雍州刺史領寧蠻校尉蠻夷順服百姓樂業有襄陽樂歌自道産始也道産子延孫以尚書右僕射為南徐州刺史防竟陵王誕斬誕使劉公泰首送建業卒贈司徒劉粹字道冲沛郡蕭人初辟州從事從宋武帝平建業征廣固以功封西安侯族兄毅二於武帝粹不與毅同心而盡心武帝改封建安侯元嘉三年討謝晦晦故與粹善以粹子曠之為參軍帝甚疑之王𢎞曰粹無私不必憂及受命南討一無所顧晦亦不害曠之遣還宗人劉損字子騫元嘉中為吳郡太守嘗修葺太伯廟以善政聞劉亮懷默子少工刀盾仕宋以功封順陽縣侯厯梁益二州刺史在位亷儉所得公祿悉以還官明帝下詔褒美卒諡剛侯齊曹虎字士威下邳人齊高帝鎮東府使領白直三百人虎形幹偉毅善於誘納有知人鑒隆昌中拜雍州刺史子世宗性嚴明頗識兵勢厯太子左衛率梁徐文盛字道茂彭城人也為寧州刺史州在僻逺羣蠻劫竊相尋前後刺史莫能制文盛推心撫慰夷獠感之風俗遂改隋劉行本沛人璠從子起家梁武陵王國常侍遇蕭修以梁州北附遂與叔父璠歸周以諷讀為河內太守隋文帝擢為諫議大夫帝嘗笞一郎行本諫止弗聽行本前曰陛下置臣左右臣言是安得不聽若非當致之理安得輕臣而不顧置笏於地而退帝斂容謝之原所笞者擢左庶子輔導太子動繩以正唐令則以弦歌教內人夏侯福與太子戲閣內行本皆切責之一時權貴憚其方正請託路絶吏人懷之劉權字世略豐人少喜俠後折節好學動循法度開皇中從平陳封宋國公拜蘇州刺史甚得民和大業初從征吐谷渾多戰功尋為南海太守行至鄱陽遇盜起權乘單舸詣賊營說以利害羣賊感悅降附至南海數嵗盜起豪帥多願推權為首權固拒之子世徹又密書諷令舉兵權集僚佐對斬其使矢無異圖唐劉德威彭城人有幹略始從高祖討伐有功貞觀初厯綿州刺史政號亷平民立石頌德尋為大理卿太宗問曰比刑網密咎安在德威曰在君不在臣下之寬猛視主之好惡今坐入者無辜坐出者有罪所以吏務深文為自營計帝然其言卒諡襄劉延嗣彭城人德威從子為潤州司馬徐敬業攻潤州延嗣與刺史固守俄而城陷敬業邀之降延嗣不屈敬業怒將斬之其黨魏思溫救止繫獄敬業平録功遷梓州長史轉汾州刺史劉延祐彭城人擢進士補渭南尉治第一後檢校司賔少卿徐敬業敗吏議敬業所署官多殊死延祐謂誣脅當察以情全宥甚衆後為安南都護遇害劉藏器延祐從弟髙祖時為侍御史衛尉卿尉遲寶琳脅人女為妾藏器劾還之寶琳私請帝止其還凡再劾再止藏器終執奏還之子知柔性儉靜居親喪廬墓側詔築闕表之厯官工部尚書河南大水詔知柔馳驛察民疾苦及吏善惡表薦有治行者二十七人皆協輿望卒贈太子少保諡曰文知幾别有傳司馬鍠徐州人天授初左補闕薛謙光上疏論選舉之弊長安中選臺閣賢望分典大郡十九人鍠與焉政績可稱獨謙光與鍠二人而已劉海濵彭城人以義俠聞為涇原兵馬將與段秀實友善纍立戰功兼御史中丞劉文喜據涇州叛海濵與其子光國紿以奏請及入對言奸慝可誅狀既還光國手斬文喜獻闕下擢左驍騎大將軍封五原郡王海濵樂平郡王為朱泚所害劉仁師彭城人長慶中為高陵令有惠政遷屯田郎中兼侍御史劉禹錫稱其理人為循吏理財為能臣一出於清白南唐馬仁裕徐州人數嵗學兵法通解若素習事南唐為升州牙將以定朱瑾功遷左領軍將軍厯楚州刺史節度潤州改廬州為政寬簡亷平甚得民心馬文義仁裕子以䕃授千牛備身𨽻祖全恩為判官從下建州將吏皆入府庫爭取金寶文義獨收民籍故建雖經亂而民安舊業文義有力焉遷讚善大夫卒妻朱氏賻贈一無所受人以為其亷能刑家徐玠字藴圭彭城人事吳為江西糧料使遷吉州刺史烈祖以佐命功拜右丞相出為宣州節度使復召為司徒年七十六卒贈高平郡王宋劉濤彭城人後唐舉進士纍官右詹事宋太祖即位素知濤履行召至以老疾求退授祕書監濤有知人鑒嘗力薦薛居正於主司以為文章器業必至台輔後果為相郭廷謂字信臣徐州人幼好學善騎射性恭謹事母以孝聞南唐屢立功後歸於周宋初為靜江軍節度觀察使留後知梓州悉除弊政子延濬厯官成都都巡檢使李順亂擒斬甚多改知漢州屢被嘉奬兄子延澤好學藏書纍官國子博士王漢忠徐州人少豪蕩有膂力太宗時從征太原先登流矢中眸戰益急上壯之纍遷洮州觀察使契丹南侵合諸軍擊敗之終左屯衛上將軍漢忠有識略軍政甚肅每行師詰旦必行香祝曰願軍民無犯吾令違者一毫不貸故所部無盜性剛果不務小節輕財樂施好讀書待賔佐有禮名稱甚茂牛冕字君儀彭城人太平興國三年進士知滁州以勤政聞厯福建轉運使建議廢邵武軍歸化金坑土人便之卒官祠部員外郎子昭儉殿中丞劉福下邳人魁岸有膂力宋初官橫海指揮使討蜀叛將全師雄有功纍遷雄州防禦使至部按行城壘調鎮兵出私錢宴犒冦至恃以無恐福御下有方為政簡易人甚德之劉湜字子正徐州人舉進士厯遷殿中侍御史上言轉運使掎托郡縣苛束官吏人不得騁其材宜稍寬假不改者繩之後領河渠事汴水絶鑿河隂新渠通漕運如故知廣州儂智高初平湜練土兵葺械器作鐵鎖以斷江路有盜據山招之不降湜知並山民資之食徙民絶其餉盜饑因悉降厯知徐鄆慶密州李若谷字子淵豐人舉進士纍官至參知政事以太子少傅致仕卒諡康靖若谷知陜州時招諭青灰山盜殺其黨自歸知潭州洞庭賊劫殺商人為常若谷擒磔於市自是盜息知延州秋夏水溢為害制石版為岸後雖暴水無恙知夀州摘豪右之占芍陂者知并州助貧民嫁娶在政府論議寬厚治民多智慮愷悌愛人去後人思之朝宗慤字世良逈子以父廕為祕書省校書郎纍遷殿中丞天聖中奏對請減上供墾閒田擇獄官令監司舉縣令以龍圖閣學士權發遣開封府辨雪疑獄有能名拜右諫議大夫參知政事卒諡文莊宗慤性敦厚事父母孝篤於故舊凡任子恩皆先其族人在翰林一夕草將相五制褒揚訓戒人得其宜嘗密詔訪邊策陳七事頗施用之李夀朋字延老若谷孫淑子慶厯初進士判吏部南曹使行諸陵奏正昭憲皇后時祭禮厯户部判官知鳯翔府括蕪田三萬頃縱民耕擇其壯者使習兵司馬光薦其能加直史館進鹽鐵副使弟復圭與夀朋同賜進士厯六路轉運使在浙西奏蠲蛤稅以豫民在涇州奏免二稅邵堯夫稱其臨事敏决有健吏才後以集賢殿修撰知荆南卒劉庠字希道徐州人由進士除監察御史裏行仁宗外家李珣犯法庠奏法行自貴近始帝不豫儲嗣未正庠疏請立太子皆從之神宗時厯官都轉運使知開封府王安石欲見之戒典謁者曰客至勿納惟劉庠來即告我或勸之見庠曰自彼執政未嘗一事合人情竟不往見又與蔡確爭廷參禮出知太原府厯知永興軍時西征無功關內騷動庠力言虛內事外恐搖根本帝嘉其忠元祐初加樞密直學士卒鄭僅彭城人第進士為冠氏令時河朔饑多盜相戒不入其境纍遷知寧州諸軍多殺老弱持首要賞僅下令非强壯而能生致者賞半之時諸路爭進討奏捷僅獨保境不生事冦亦不犯官至顯謨閣直學士子望之字顧道有文名登進士靖康初再使金厯官直學士姚孝錫字仲純豐人政和四年登科為代州兵曹金兵入雁門州將議以城降官屬畏怯投死無所孝錫偃卧大鼾略不為意後家五臺善治生出家粟萬石賑饑多所全活所著有雞肋集成野賢豐人為全鄉令每政暇匹馬一僕循行郊陌勸課農桑刑清事簡民安樂之元曹伯啓字士開碭山人至元間薦授西臺御史遷刑部侍郎持法平允權貴不得奪後為御史臺侍御史奉命同刋定大元通制上言五刑者刑異五等黥杖徒役於千里之外百無一生還者是一人身被五刑非五刑各底於一人也法當改易丞相是之而不果行性莊肅奉身清約所奬借名士最多所著有漢泉漫藁續集行世六子十孫皆顯仕徹爾䝉古竒􅚕氏居徐州三世矣徹爾幼孤母蒲氏教以讀書至元十八年世祖召見悅之常侍左右從征東北邊勸帝賑給軍過地方使江南言學田弗宜賣皆從之嘗直陳丞相僧格罪狀觸帝怒命批其頰徹爾辨愈力卒悟升福建行省平章政事平汀漳盜歐狗梟以徇盡赦脅從者改浙江行省疏吳淞江以利民田召入為中書平章事薨之日家資不滿二百人服其亷贈太師追封武寧王諡正憲許義夫碭山人為夏邑縣尹每親詣鄉社教民稼穡賞勤罰惰境內豐足後為封丘尹至正四年大饑羣盜劫掠州縣義夫聞賊至近境乃單騎出郊力言邑中小民貧皆已驚竄幸無入吾境言辭願欵賊遂他往民免於難錢光弼字仲明彭城人以薦授將仕郎同知晉寧州事厯遷汴梁路總管兼府尹未二年省憲交薦遷平江路總管兼管內勸農事卒贈兵部尚書追封彭城郡侯明朱守仁字元夫徐州人明初知袁州洪武二年徴為工部侍郎尋拜尚書改北平行省參政謫知縣進知州厯四川布政使致仕復起知楚雄府所至有善政居楚雄九年境內大治入拜太僕卿馬大蕃息馬政之修自守仁始永樂初卒任肅字伯雍徐州人領洪武鄉薦為工部主事升刑部郎中出知南昌府多惠政秩滿父老乞留命增秩還任尋升雲南左參政致仕孟驥字尚德蕭人洪武初以薦授驛丞厯遷貴州布政使有惠政秩滿乞留詔增秩還任黃正碭山人氣質剛方言語必信居家以孝聞洪武中為邑吏以直言徴奏對擢右僉都御史卓有風裁後黜為英山縣吏㑹金山叛冦復以為僉都御史即日渡江募勇敢士得十萬遂討平之又討平雲南叛冦還至普安為賊創傷卒蔡楫字汝濟沛人洪武十五年舉孝亷拜福建道御史聲績甚著以言事謫戍甘州尋授嘉興知縣縣多無賴子楫於㕔事創置善惡二牌邑民有善惡皆志之多感愧趨善復任御史按交州有聲稱朱芾字大芾徐州人洪武中為户科給事中改御史性剛直以言事謫戍雲南張宏碭山人孝友勤學永樂中由國子生仕為開封府同知遷户部郎中出知荆州府政平守潔門絶私謁人稱為閉户張云王弼徐州人永樂中知良鄉縣有惠政當代去民懇留之值嵗旱躬禱即得雨有蝗入境拜祈之為羣鳥食盡民皆以為至誠所感遷户部主事馬蕙字彥芳徐州人宣德壬子鄉薦厯官汝寧府教授所至敦重行誼教有成效藩省屢聘典文皆辭不赴所著有蘭齊集子暾字廷震領成化辛卯鄉薦知潞州居官平恕宗藩信服無撓法者均徭賦興學校以治最遷南户部郎中李鉞字延器蕭人正統中以嵗貢為溫州同知海冦鈔掠鉞獲其渠魁置之法脅從者招撫復業以功增秩厯知開封鞏昌二府民尸祝焉潘洪字裕夫宿遷縣人父敏景泰中以人才舉為涇縣主簿有善政洪舉成化乙未進士厯吏科給事中遇天變詔內外言得失洪已注籍休沐疏弊政數十條上之出守邵武疏楊譁呂炯之罪改守青州藩邸中人驕橫以法繩之奪還所侵民地劉經字引之徐州人領成化丙午鄉薦為武義令治最遷濟寧州守時逆瑾擅權遣人索金不豫遂免官瑾敗或勸自白竟安退以終張佶字習之徐州人𢎞治己丑進士為鄞令政有鋒鍔善良賴之遷南刑部主事立决疑獄多所平反遷浙江按察僉事勢豪相戒勿犯其令李穩字邦泰碭山人正德戊辰進士知仁和縣遷御史以觸權貴罷歸嘉靖初應詔起遷浙江按察僉事吏事精確聲望赫然乞終養歸居鄉恂恂稱長者高瑁睢寧人正德戊辰進士以户部主事督徐州倉亷恪稱最厯官山東僉事以忤劉瑾歸張鶴鳴字孚宇徐州人正德丁丑進士授山隂令值張居正行度田令父老有以苦浮稅告者鶴鳴履畝清釐邑人德之擢御史周冕沛人正德間由孝亷仕至布政司參政潔已愛民不阿權貴著政體備要書行世楊守謙字允亨徐州人父志學字遜夫𢎞治六年進士巡撫大同宣夏邊人愛之卒諡康惠守謙嘉靖八年進士授主事厯郎中督學陜西所在有聲擢巡撫山西又巡撫保定督紫荆諸關去鎮之日士民號泣追送數百里外俺答冦京城守謙倍道入援進兵部侍郎時仇鸞觀望丁汝䕫亦戒勿輕戰遂坐失誤軍機死聞者無不流涕守謙馭下有恩居官亷蕭然若寒士隆慶初贈尚書諡恪愍張貞觀字惟誠沛人嘉靖十一年進士官禮科都給事中屢建言後以皇長子出閣不具禮疏諫忤㫖家居所著有掖垣諫草野心堂集王業蕭人嘉靖庚子舉人知永清縣政尚平恕然有風裁能遏抑豪右尋擢御史權貴憚之江南通志卷一百四十四欽定四庫全書
