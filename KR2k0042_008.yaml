  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2k0042_WYG_008-1a, image: WYG0507/WYG0507-0222c.png}
body:
  text: 江南通志卷九輿地志星野周禮保章氏掌以星土辨九州之地所封封域皆有分星鄭康成謂大界則曰九州州中諸國之封域於星亦有分焉今其存可言者十二次之分也布度定紀分州繫象定二十有八星之位因以察十有二嵗五雲之物十有二風以修政序事可勿考歟今江南得古揚徐豫三州在春秋時什九皆吳地爾雅云星紀斗牽牛吳分野劉逵以為斗者日月五星之所經始故謂之星紀意者星紀之分域能為綱維則今江南獨冠藩服蓋有自歟婺女房心奎婁胃為魯宋諸國之分星又江南之寓精寄曜者也然自星野之説有嵗差里差古今宫度同異較然我朝時憲書法定天周為三百六十度而嵗周則為三百六十五日天度既整以整馭零嵗差里差之法亦準諸此書法既定而分星無不定又準以地圓之理地心地面之説治書者因地以測諸差言地理者即可因諸差以定宫度如今江南之地或宿屬斗末改為牛初而後分野宫度高卑合準故詳列諸家同異系之以表存其大概以備稽考主十二次之説周禮保章氏注星紀吳越也降婁魯也大火宋也晉書天文志自氐五度至尾九度為大火於辰在卯宋之分野屬豫州自南斗十二度至須女七度為星紀於辰在丑吳越之分野屬揚州自奎五度至胃六度為降婁於辰在戌魯之分野屬徐州隋書地理志同晉書唐書天文志奎婁降婁也初奎一度中奎二度終胃三度自蛇丘肥成南界巨野東達梁父循岱嶽衆山之陽以負東海又濱泗水經方與沛留彭城東至於吕梁乃東南抵淮並淮水而東盡徐夷之地氐房心大火也初氐二度中房二度終尾六度自雍丘襄邑小黃而東循濟陰界於齊魯右泗水達於吕梁乃東南接太昊之墟盡漢濟陰山陽楚國豐沛之地斗牽牛星紀也初南斗九度中南斗二十四度終女四度自廬江九江負淮水南盡臨淮廣陵至東海又逾南河得漢丹陽會稽豫章明清類天文分野書斗牛在丑屬吳越分揚州奎婁在戌屬魯分兖州氐房心在卯屬宋分徐州按星野分配郡國諸史亦多異同晉志以沛國譙郡屬豫州以彭城屬徐州隋志以譙郡屬豫州以彭城豐沛屬徐州唐志以楚國豐沛皆為大火之次與漢志合又史漢俱以房心為豫州奎婁為徐州清類天文分野書謂宋得徐州之地為多遂改大火為徐州今考宋地實在徐豫二州之境也主二十八舍之説史記天官書二十八舍主十二州又曰角亢氐兖州房心豫州斗江湖牽牛婺女揚州奎婁胃徐州漢書天文志同史記漢書地理志魯地奎婁之分野也東至東海南有泗水至淮得臨淮之下相睢陵僮取慮皆魯分也宋地房心之分野也今之沛梁楚山陽濟陰東平及東郡之須昌夀張皆宋分也吳地斗分野也今之會稽九江丹陽豫章廬江廣陵六安臨淮郡盡吳分也晉書天文志房心宋豫州潁川入房一度汝南入房二度沛郡入房四度梁國入房五度楚國入房四度斗牽牛須女吳越揚州九江入斗一度廬江入斗六度丹陽入斗十六度臨淮入牛四度廣陵入牛八度泗水入女一度六安入女六度奎婁胃魯徐州東海入奎一度唐書天文志奎為大澤在陬訾下流當巨野之東陽至於淮泗婁胃之墟東北負山蓋中國膏腴地百穀之所阜也商亳負北河陽氣之所升也為心分豐沛負河南陽氣之所布也為房分南斗在雲漢下流當淮海間為吳分宋史天文志南斗六星南星者魁星也石申曰魁第一主吳二會稽三丹陽四豫章五廬江六九江明清類天文分野書斗牛吳越分野奎婁魯分野氐房心宋分野各次距度之不同漢劉歆三統厯自斗十二度至婺女七度為星紀自奎五度至胃六度為降婁自氐五度至尾九度為大火費直説周易自斗十度至女五度為星紀自氐十一度至尾八度為大火自奎二度至婁九度為降婁蔡雍月今章句自壁八度至胃一度為降婁自亢八度至尾四度為大火自斗六度至女二度為星紀皇甫謐帝王世紀自斗十一度至婺女七度為星紀其降婁大火距度俱同三絶北魏李業興正光厯自斗一度至牛五度為星紀自壁三度至婁八度為降婁自亢三度至心四度為大火唐一行大衍厯自奎二度餘千二百一十七杪十七少至胃三度為降婁自氐二度餘千四百一十九杪五太至尾六度為大火自斗九度餘千四十二杪十三太至女四度為星紀宋皇居卿元祐觀天厯自奎三度半至胃五度半為降婁自氐三度少至尾八度為大火自斗九度至女六度為星紀南宋楊忠輔紹熙統天厯自奎一度三十七分二十五杪至胃四度十九分十五杪為降婁自氐一度七十四分五十一杪至尾三度八十六分六十四杪為大火自斗四度三十五分九十二杪至女二度九十五分七杪為星紀元耶律楚材西征庚午元厯自奎二度三十五分八十五杪外至胃四度二十四分三十三杪為降婁自氐一度七十七分七十七杪外至尾三度九十七分七十二杪為大火自斗四度三十六分六十六杪至女二度九十一分九十一杪為星紀許衡郭守敬授時厯自奎一度七十三分六十三杪至胃三度七十四分五十六杪為降婁自氐一度一十四分五十二杪至尾三度一分一十五杪為大火自斗二度七十六分八十五杪至女二度六分三十八抄為星紀明清類天文分野書自斗三度至女一度為星紀自奎二度至胃三度為降婁自氐二度至尾二度為大火各舍赤道距度之不同漢洛下閎所測氐十二度房五度心五度斗二十六度及分牛八度女十二度奎十六度婁十二度胃十四度唐一行所測斗二十六度無分餘同漢宋皇祐所測氐十六度心六度斗二十五度牛七度女十一度胃十五度餘同漢元豐所測房六度餘同皇祐崇寧所測房五度太心六度少牛七度少女十一度少奎十六度半餘同皇祐元至元所測氐十六度三十分房五度六十分心六度五十分斗二十五度二十分牛七度二十分女十一度三十五分奎十六度六十分婁十一度八十分胃十五度六十分各舍黃道距度之不同後漢永元銅儀氐十六度房五度心五度斗二十四度四分度之一牛七度女十一度奎十七度婁十二度胃十五度隋劉焯皇極書斗二十四度女十一度半婁十三度餘同永元唐一行大衍書斗二十三度半牛七度半女十一度少奎十七度半婁十二度太胃十四度太氐十五度太心四度太房度同永元宋紀元書斗二十三度奎十八度胃十五度半氐十六度少房五度太心六度牛女度同永元婁度同大衍金趙知微書斗二十二度奎十七度太牛女度同永元婁度同大衍餘同紀元元授時書氐十六度四十分房五度四十八分心六度二十七分斗二十三度四十七分牛六度九十分女十一度一十二分奎十七度八十七分婁十二度三十六分胃十五度八十一分史傳雜占分野之法史記天官書吳楚之疆候在熒惑宋鄭之疆候在嵗星星經嵗星主徐州熒惑主揚州鎮星主豫州晉書天文志嵗星主齊吳熒惑主楚吳越以南宋史天文志嵗星主徐青兖熒惑主揚荆交州填星主豫州按此上以五星言分野也史記天官書二十八舍主十二州斗秉兼之周禮疏辨九州之地者據北斗而言屬春秋文耀鉤北斗七星兖州屬機星除揚二州權星豫州屬搖星星經玉衡第一星主徐州以五子日候之甲子為東海丙子為琅琊戊子為彭城庚子為下邳壬子為廣陵第六星主揚州以五巳日候之乙巳為豫章辛巳為丹陽己巳為廬江丁巳為吳郡會稽癸巳為九江第七星為豫州以五午日候之甲午為潁川壬午為梁國丙午為汝南戊午為沛國庚午為魯國晉書天文志北斗七星一主秦二主楚三主梁四主吳五主燕六主趙七主齊宋史天文志北斗第一星曰樞其分秦漢志主徐州第四星曰權其分為吳漢志主荆州第六星曰闓陽其分為趙漢志主揚州第七星曰搖光其分為齊漢志主豫州按此上以北斗言分野也史記天官書吳楚之疆占於鳥衡烏者南宫七宿衡者太微三光之庭鳥與衡同在南宫故占南國按此以四七宿言分野也宋史天文志三台六星上台上星主兖豫下星主荆揚中台上星主梁雍下星主冀下台上星主青下星主徐晉書天文志五車者五帝車舍也五帝坐也西北大星曰天庫主太白主秦次東北星曰獄主辰星主燕趙次東星曰天倉主嵗星主魯衛次東南星曰司空主填星主楚次西南星曰卿星主熒惑主魏五星有變皆以其所主占之隋志宋志皆同言楚則吳越在其中隋書天文志九坎東列星北一星曰齊齊北二星曰趙趙北一星曰鄭鄭北一星曰越越東二星曰周周東南北列二星曰秦秦南二星曰代代西一星曰晉晉北一星曰韓韓北一星曰魏魏西一星曰楚楚南一星曰燕其星有變各以其國占之宋志同又引陶隱居云越一星在婺女南并舉楚越則吳在其中宋史天文志天市垣二十二星在氐房心尾箕斗內宫之內象天王在上諸侯朝王王出臯門大朝會西方諸侯在應門左東方諸侯在應門右其東藩十一星一曰宋四曰東海五曰徐六曰吳越按此上以中外宫星言分野也史記天官書丙丁江淮海岱也漢書天文志丙楚酉魯戍吳越按此又以時日攴干言分野也今江南分星表星紀吳分禹貢揚州之域府𨽻州直州縣江南通志卷九
