body:
  text: 江南通志卷十五輿地志山川五安徽安慶府大龍山在府東北三十里北障郡城如列屏扆皖封鎮山也上有龍井一名雷澤井四時不竭旱則禱焉其東出者曰小龍山由大龍中出兩山相夾如門者曰龍門山其北四十里有白麟峰又府北六十里有磨山柏子山一名百子山在府西北二十五里羣峯疊出盤鬱聳秀最髙者為雲峯山口曰獅巖竒石稜峭下臨溪水諸峯飛泉皆從此出山人種梅於此曰梅溪土性宜桃春日爛開如霞有嶺曰金坑為出山路口又西北五里曰甑山象山馬鞍山鏡山在府西北四十里石色瑩澈如鏡北有豹嶺多喬松又北有山並峙笏立者曰雙峯三峯叠秀者曰寨基山獨秀山在府西北六十里舊志云形勢突兀為郡城衆山之宗其近者為桑山中多巖洞如層樓黄山在府西四十里形如卧象當冶湖之口亦名象鼻山大雄山在府西百里地名釋迦坂崒嵂峭㧞俯視羣山皆兒孫拱立登絶頂望皖水如帶山之東四十里曰愚公峯山之西曰俚子峯左右夾峙其相近有太平山騰雲山在府西百三十里其上常有雲氣雩禱時應盛唐山在府城中漢武帝南巡江漢至於盛唐登禮灊嶽出樅陽作盛唐樅陽之歌晉時郭璞登盛唐山謂此地宜城唐因置盛唐郡宋嘉定十年以黄幹知安慶請建城於盛唐灣宜城渡之隂即此舊志以為山在桐城縣南正其地也云五里者誤環山有二西環山在桐城縣西十里石門懸瀑最竒明參政胡瓚三世居此一名官荘山東環山在縣東三十里一名魯䜫林壑窅深與官荘相望舊𫝊魯肅遺蹟有試劒石又十五里有麻山龍井山在桐城縣西十二里有龍潭深不可測溪山明秀如畫西有烏石山栲栳山又西有五聚山王屋山皆邑名勝碧峰山在桐城縣西北七里沿澗入南崖壁立千仞下有四洞可容數千人其側有披雪洞尤勝瀑水懸崖如練龍眠山在桐城縣西北十里岩壑幽邃擅名江北與華崖山並峙宋李公麟歸老於此自繪龍眠山荘圖縣有東西兩龍眠與舒城縣連界投子山在桐城縣北二里相𫝊吴魯肅有子投此為僧因名後為唐大同禪師道塲有三鴉伺曉二虎巡廊之異上有趙州泉趙州和尚飛錫得泉處石門山一名石門冲有石如門瀑布尤為竒絶北峽山在桐城縣北四十里即古峽石山以在縣北故曰北峽兩崖相夾如闗又名北峽闗又西峽山在縣北四十七里魏張遼救皖至此築壘峽石名南峽戍洪濤山在桐城縣東北四十里山高廣每天雨則水下沛若濤桐梓山在桐城縣東三十里峯巒明秀雨霽尤佳大凹山在桐城縣東四十里平地突起突兀嶙峋多怪石為東鄉羣山之祖浮山在桐城縣東九十里一名浮渡山寰宇記其峯七十有二有石龍如來抱龍諸名而妙髙最髙其巖三十有六有㑹聖金谷九曲首楞晩翠五雲翠華海島諸名而大通飛瀑最竒鍾惺記云以為無巗不樹無徑不竹無石不苔無澗不花也西南有獨峯直上千仞附明方學漸浮山賦皖襟三江以山為國桐據其曲四塞皆山龍嶽襟其南麟嶺峙其北華崖障其西􅖘山表其東崇峻瓌瑋出霧蒸雲壮觀具矣元覽畧焉惟浮山盤鬱於中勢不甚髙而嵓洞天開石溪地湧若神鰲失戴瀛閬靡依海潮乍驚浮空洸蕩竒踪異状不可殫述名曰浮渡所從来矣仙侣釋徒棲神代有梵宫蹲址道院負嶼信巨靈之巧構江滸之竒觀也方生性癖雲山結巢依麓秋飈春煦躡蹻孤登曠矚怡懐囅然賦焉繄鴻䝉之来泮兮肆澒洞而沆漭施渾沌之肇開兮峙者結而流者瀁氾蓬瀛於瀚海兮賴贔屭於巨鰲曷吞釣於任公兮致元閬乎漂滛来吾桐而凝上兮奠洪基于江曲爰錫名乎浮渡兮儼方舟而崛􅔍表天柱以為栓兮索地維以為纜石峥嶸而夾桅兮繫九嶷於㶑灔乍鯨濤之震撼兮飛鼉浪之澎湃走鮫鯪于白晝兮嵐岌岌而駭潰卧蟺蜒之磄磅兮試虬龍于碧波裊雲逕以上達兮扶羊角而斜過徐洞口之劈劃兮柱嵳峩其竭石𦍑龍虎以鍵闗兮若斾懸而骨立湛玉蓮之爛漫兮浴紫芝於元渚鳴金雞于嵺廊兮開繡闥於璚圃乃有危巖三十六兮堪徙倚而遊之别洞七十有二兮各獻媚而争竒越陸子而㑹勝兮列崝㟰而凌漢砑崔嵬而㠎嶫兮刻嶙峋而澶漫窺杳閴之奥窔兮踞淋漓之石牀啟氷壺之洌井兮濞沆瀣之瓊漿麗層空而軒豁兮挺複樓於巖表結磊砢以為廊兮敞玉虚而浩渺更石梯乎遶雲兮干星象而躡虹鳥道疑其莫度兮逺逕畏其難通轉側升而附兮乃旋近于桑日誰杵藥而飛翰兮留荒臺于崒嵂緬野夫之芳韻兮巇丹穴以俟来度仙橋於蚴蟉兮布棊石于莓苔盼龍池之孤潁兮指㧞茅之雄峯睇華封于天外兮控皖嶽于雲中塹崇巔而汩汩兮礔天池以成壑似清淺而沉沉兮泌靈湫而罔涸偃兔宫以肖月兮翥鸑鷟而朝陽拂紫霞以度闗兮踞元豹而蹌踉瀉明河之倒液兮滴晴空之飛潏誰濬源而長流兮洩尾閭而焦沃載髙巖之逼斗兮巋岑樓以奠居煥琳宫於金谷兮宅深昧而於於妙元會于總巖兮盈方丈而備巧閟日月于蓬壺兮約勝槩于渺小何大冶之型埴兮置馮夷於天台激崇陵以瀇洋兮奓蜃氣於層臺爰縦觀乎寳藏兮奚珍錯之不具紛縱縦而萃萃兮極霄壌以加富馴擾乎青麟迴翔乎朱雀麌麌乎元麋嘹嘹乎白鶴龍隠乎石池虎伏乎林薄嘯月乎狙猱吟風乎鴒鵲蔽日乎松杉參天乎梓栢脩竹乎緑漪茂篠乎翠崿馥郁乎桂叢芳芬乎蘭若垣合乎千葩薜盈乎百藥每青陽之啟運兮流景輝而彌光也㳺士女而絡繹兮道撃轂而聫裳也即秋氣之摇落兮擷羣英而履霜也飛鳥戢而崆峒兮清風肅而琳琅也逝朱陽于昧谷兮若海曙之初陽也返烟光而生色兮何夕巘之多祥也是以仙命侣而乗勝俯雲閣而下棲釋緘經于宻室坐碧玉而忘機騷人發其匉訇宣金石而振響哲士慕乎臯蘭輕千里而嚮往遡太古而罔徴幻左慈于漢末紆宏景之相猶潤曹松之詩槖巖屢託于前哲墓猶指乎逺公暨歐蘇與僧瑞尤倡和以同風若乃藉阨塞以屯戍砦崎嶇而禦暴翼威武於貔䝗匪祗靈之攸好白沙嶺之卜築陽明亦欲選竒則有道之振鐸樹兹土之鴻儀覩華巖之廢址憐梵宇之荒唐欽賢館之壮麗将正學之寖昌禀二儀以握珍對千仞而仰止期不負於斯山暢幽懷而莫已亂曰龎姿厚質乃中虛兮廓然有容君子居兮龍潛蠖伏越羣儔兮勿謂嶮岨君子求兮清源冽冽石其爛兮君子飲之渥若丹兮巍峩屹屹天柱尊兮峻極穹窿我則欽兮先登者誰陟其顛兮潄泉枕石洞其天兮青山在桐城縣東百一十里有金雞洞石鼓又有石屋寺相𫝊晉裴仙修煉之所草木秋冬亦青􅖘山在桐城縣東百二十里瀕江又名蓮花峯上有煉丹池風洞西有周家山竒峰參天元郡丞陳公寧墓在焉合明山在桐城縣東百三十里兩石相向天欲雨則瑩然有光西有栁峯山勢如雲奔浪叠竒秀特異黄公山在桐城縣東南九十里明建文時黄觀靖難後顯靈此山土人立祠祀之黄連山在桐城縣東南百里峙湖畔與樅陽山相望懐潛舒桐四邑之水俱會於此為桐邑闗鎻焉摴蒲山在桐城縣東南百十里有二石各髙六丈如兩人相向摴蒲狀因名舊志在縣東北十里誤磨旗山在桐城縣東南百二十里世傳闗公曽於此駐兵有寨有鎮相近為靈山上有靈湫俗名琵琶山灊山在灊山縣西北二十里一曰皖山又曰天柱山漢武帝南巡登禮灊之天柱山以代南嶽故一稱霍嶽又謂之副南嶽名山記明李元陽以為其麓有漢祀壇是也山髙千仭廣二百三十里周五百里六安霍邑在其北安慶灊邑在其南二邑皆以此山名縣一灊一霍實無二山也周大夫皖伯封國亦以此山名上有左慈煉丹房東有激水冬夏懸流瀑布萬丈瑩然如雪故又名雪山下有九井深不可測旁有石牀可容百人計峯二十有二嶺八巖十有二源四洞十池三臺四叠嶂層巒空青積翠瑰竒秀麗不可名状實為淮南江北諸山之冠其支山曰三祖山有璨師塔一名山谷宋黄庭堅寓此取以自號或有疑天柱山有二漢所稱南嶽乃霍山之天柱與灊山之天柱無涉而指霍之武陟指封諸山為証云霍有登封遺跡灊則無之也按漢書武帝紀云元封五年行南巡狩至於盛唐登禮灊之天柱山自潯陽浮江親射蛟江中獲之舳艫千里薄樅陽而出作盛唐樅陽之歌史記綱目亦云盛唐在今安慶府治内潯陽樅陽乃灊山之上下境向使武帝登禮天柱在霍而不在灊則胡為必云灊之天柱而上下所歴之地皆在灊山且胡不作武陟指封之歌而獨歌盛唐樅陽乎豈史漢綱目諸書反不足信於雜說小記乎山之北流曰沘水亦名渒水由霍入淮山之南流曰皖水曰灊水由灊入江今但云泛江而不云泛淮則燔柴昭事必在今灊山境内可知矣彼又云六安霍山於漢魏晉宋俱稱灊所稱灊之天柱即以霍山言也然厯考諸史六安本屬六國皖灊乃安慶境地東漢時安慶屬廬江郡𨽻揚州唐元和二年改為六安國續文獻通考云唐以霍山縣置霍州後州廢仍為縣梁改灊山縣宋改六安軍據此則六安名霍山又名灊山灊山為六安又為霍山互皇輿圖表所云安六接壌山川連跨故諸書多見之文是也此灊彼霍縣雖分屬而天柱實無二山又可知矣據邑人金燕記云爾雅云霍即天柱山灊水所出水經云霍山為南嶽在廬江灊縣西北閱衡山志别無霍山則灊山亦名霍山矣又按舊志謂皖灊天柱為三山燕曾親陟山椒見峭㧞如柱屹然獨尊者一峯耳曰灊曰皖曰天柱即此山也其飛来三台等峯具有名稱且與此山絶不類従古說山者曰舒州灊山最竒絶曰青㝠皖公山巉絶稱人意曰天柱一峯擎日月此一山三峯之左券也脫以中一峯為天柱而以旁連者為灊為皖乃縣以灊得名郡以皖得名洞天以灊山名周大夫稱皖伯舍其大者名其次者必不然矣玉鏡山在灊山縣北寰宇記唐貞元二年從皖山東忽然暴裂皎瑩如玉行人逺見如懸鏡然刺史吕渭奏聞因改萬嵗鄉為玉鏡鄉故一名玉照山黄庭堅詩仙人持玉照留在潛峰西是也山東有主簿山相傳唐畢諴讀書於此鳯凰山在潛山縣北十里宋王珪故宅在焉又有黄山以黄魯直得名牛眠山在潛山縣北七十里以形似名麓有金鍾潭甚深又北三里曰水吼嶺控天堂之勝天堂山在潛山縣北百四十里四壁髙峻中敞如堂内有温泉龍湫又有黄沙碎石青風飛旗諸嶺及主簿原雙乳峯其相連者曰羅源後霍公盖金龜鯉魚及東山後山嬴山左右環合稱為絶險閔山在潛山縣西八十里有果老嶺産茶甚佳駕霧山在潛山縣南三十里山髙峻雲霧常出其下白雲山在潛山縣南八十里絶險壁立上有平坡懸橋以升龍山在太湖縣西北三里蜿蜒如龍磅礴多石下有龍湫王安石詩吾欲鞭龍起為霖遍九州此山是也石船山在太湖縣西北六十里有石如船多題咏司空山在太湖縣西北六十里髙聳獨出如在雲表其上平坦可數畝謂之司空原淳于司空曽居此有洗馬池冬夏不涸有太白書堂又有巨石相𫝊為釋慧可𫝊衣處新寨山在太湖縣西十里壁立險阻元末立寨其上龍門山在太湖縣西十五里兩山對峙若門上有龍泉聲如雷激又西五里有夾羅山又五里有松山又五里有九重山香茗山在太湖縣南四十里左曰小茗右曰大茗大茗尤髙峻産硃砂險不可取上有煉丹處為梅福遺跡南與望江界去大茗十里曰嵯峨山勢極嶙峋故名亦界望江四面山在太湖縣東北十里形方而銳四面如一又縣東北三十里有白雲山獨阜山在太湖縣北四十八里逈出羣峰之上有石刻隴西二字舊傳李白曽避地於此百藥山在太湖縣北七十里相傳唐白居易曽居此後以白樂名山絶巘有洞時聞異香懸溜可愈熱疾又傳髙真人修煉之所石牀丹竈尚存珠子山在太湖縣北百八十里孤峭干雲上有闗與英六為限孚玉山在宿松縣東二里邑十景所謂孚玉青峰也又縣東三十里有安峰山月山鑿山在宿松縣東十五里有石洞玲瓏口隘而中敞稱名勝烽火山在宿松縣東六十里北齊及陳割以為界有警則舉烽火於此響石山在宿松縣東南七里履之輒響如擊鼓然又縣東南十七里有天韭山韭不蒔而生七十里有金唐山八十餘里有芙蓉山小孤山在宿松縣南百四十里初山在江北岸與南岸澎浪磯相對江流至此湍激如沸海潮不得上元天歴中立鐵柱于山曰海門第一闗上有石級百十有一紆迴而登明成化間北岸衝決為廣流遂獨峙江中勢分險殺而山愈峻㧞得勝山在宿松縣西四十里元余闕敗陳友諒于此翠眉山在宿松縣西北五里小巒獨立河水環照山影若修蛾見于鏡中又五里曰靈隠山相傳馬祖禪師于此卓錫銅鈴山在宿松縣西北三十里山界大路為八省通衢外陡中平若城郭明末撫臣史可法嘗駐此防禦流冦名曰同人堡西源山在宿松縣西北五十里上有九井不竭井側有龍祠禱雨輒應又縣西北七十里有摩旗山其峯如捲旗陳漢山在宿松縣西北八十里與蘄黄界昔有陳漢者結砦于此因名嚴恭山在宿松縣北三十里上有石長數十尋儼如人立號石道人相傳以為修真者所化也又縣北四十五里有石門山五十里有白崖山與太湖英霍界六十里有張公山孝感山在望江縣北十五里南畿志云唐貞元中孝子徐仲源所居旌其鄉曰孝感亦以此名山磨义山在望江縣北三十里有巨石如駝象形又有磨义痕及馬蹄人跡亦有穴如泉空洞莫測寳珠山在望江縣北五十里巋然衆山中圓浄如珠石灰山在望江縣西北六十里亦名石輝相近有鷓鴣山值雪山在望江縣西十八里上有平岡相傳李白遊此值雪因名大茗山在望江縣西北六十里嶺有巨石廣數丈屹立雲表上平如底烟嵐常翳其半其旁出者曰小茗有蓮花峯峭峻秀麗南畿志云唐羅隠曽居此脊現嶺在府北十五里大龍山之脈伏而復見聳起如脊故名後訛為集賢長安嶺在府西三十里路通潛山宋王安石有曉發長安嶺詩即此相近又有龍見嶺子貢嶺在府西四十里相傳端木氏往楚道經此又西有山離立衆山中如筍㧞地曰虞公峰峽石嶺在府西五十里山髙數里澗水潺湲古木環澗層鎖如入武陵源挂車嶺在桐城縣西三十里三國吴朱桓謂峽石挂車兩道險隘即此黄栢嶺在桐城縣東百二十里有南北二嶺路通無為州界又近城二十五里亦有黄栢嶺通舒城小隘嶺在宿松縣西八十里阻山臨河路接荆舒為防守要地分茅嶺在望江縣北六十里與太湖縣界本作分畝嶺白雲巗在桐城縣東百三十里有東西兩巖相峙又有四峯三洞五小巗名勝與浮山競勝相連有雙尖山牛角尖俱極秀聳雷公崖在太湖縣西北六十五里削立萬仞相傳其上曾有獸如猨色赤而小喙尖翼短状類雷神故名豎筆尖在桐城縣東一百里卓立如筆竒秀峭㧞為一方諸山之冠縣南百里外雞籠山側亦有豎筆尖竒秀相等大江上游自蘄黄東滙潯陽彭蠡之水至小孤山入宿松界過望江繞郡三面至池口經桐城之樅陽東北至灰河入無為州界長河在府西有二源一北自皖山一西自司空山俱會于石牌行七十五里至皖口又十五里入于江瀼河在府西七十里合潛水達長河入江青山河在府西七十五里出西源山合潛水達瀼河入江積石河在府西北三十里俗名馬嘴石河又東南流十里匯為石門湖髙河在府北八十里合黄馬河諸水達桐城之練潭合樅陽河入于江雙河在桐城縣東三十里一曰東河源出洪濤山一曰西河源出魯谼麻山至此合流下經孔城由樅陽入于江樅陽河在桐城縣東南百二十里西引石塘北受練潭連孔城河東入于江沙河在潛山縣東六十里下合桐城之練潭入于江九井河在潛山縣西北二十九里源出九井合于潛水羅溪河在太湖縣西北二十里出司空山流經縣西匯於馬路河東流至黄泥港㑹于潛水後部河在太湖縣西北百二十里納羊角銀河之水而東南流合龍灣河達于馬路河又縣中洪渚思常棠梨南陽白沙馬路諸河與後部河俱匯黄泥港合潛水流入于江三溪河在宿松縣西北六十里源出蘄黄流分為三匯于隘口又南三十里曰二郎河上接三溪下接清灣為郵𫝊要路每遇山漲急流深不可涉又至縣西一里曰鈎餌河楊溪河在望江縣南五里其水東泊湖之口亦曰潵水口有三十六斷従縣南十五里之華陽鎮入於江埭溝河在望江縣北六十里受潭湖諸流至皖口入江蓮湖在府東十二里亦曰段塘湖多蓮菱故名上割江中水出長楓下趨梅林達樅陽入于江冶塘湖在府西三十里湖口有石庫渡下流出皖口入江竹子湖在桐城縣東百二十里合白蕩破堽二湖達源入于江洋洞湖在桐城縣東北百八十里汪洋萬頃故名湖饒魚蝦之利每遇大旱自生蓮藕環湖民賴之以濟又有楓林河沙河山西河皆巨浸水出灰河入江獨山湖在桐城縣南六十里又有松山喜團亭鴨子石石塘諸湖與此水俱出樅陽南湖在潛山縣南一名靈湖三面倚城多古木渟泓涵浸宜于植蓮鮎魚湖在宿松縣西南三十里又十里曰泥河又五里曰牌湖又十里曰麻湖皆通大江鰔湖在宿松縣西南八十里周圍廣濶産鰔魚故名西南入于江龍南蓮若湖在宿松縣南四十里中有小洲曰浮笠洲湧若螺黛隨水上下其水連白荆棠梨小黄諸湖至望江縣入于江泊湖在望江縣西四十里自宿松縣界龍南諸湖及縣西境之水俱滙于此經縣南楊溪河而東入于江泊湖西五里有鱭湖亦自泊湖分流達于楊溪河武昌湖在望江縣東北三十里受諸山水及縣北諸川之水匯為湖廣袤數十里又東北十里為青草湖接白土湖漳湖在望江縣東北六十里受武昌青草白土諸湖之水北經埭溝河至山口入于江桐溪在桐城縣東其源出龍眠華崖繞城西而南達樅陽入于江明永樂間邑令胡儼所鑿至今賴之長風港在府東北四十里引蓮湖槐湖之水下入于江亦名長風沙今有長風渡自此渡江達池州源子港在桐城縣東百四十里出老洲入于江黄泥港在潛山縣西南三十里太湖縣境之水匯流于此合潛水入于江皖水在潛山縣西北二十里源出皖山龍潭下流為崩河合于潛水南經府城東至皖口入于江潛水在潛山縣西北二十里源出潛山合皖水達郡之石牌入于江白水源在潛山縣潛山西南衆山環之飛瀑千丈景物絶佳桃花潭在宿松縣西二里上河口相傳汪倫送李白處清官潭在宿松縣三里水清澈則官清否則汙濁甚驗桑落洲在宿松縣西南百二十里九江口晉劉毅與盧循戰于此孟洲在宿松縣南四十里環洲皆湖地廣饒宜畜牧其相近者曰黄陂洲多黄壤又南四十里曰楊栁洲盡忠池在府西舊名清水塘元余闕殉難于此因名南畿志童翼詩遺老能言當日事寒泉猶照死時心即此洿池在宿松縣東南六十里衆水所匯池環于山中列市㕓居民饒魚鹽之利張富池在宿松縣東南八十里其水趨泊湖達雷港入江大雷池在望江縣東三十里源出宿松界東行二百餘里經縣東南積而為池又東十五里入于江一名雷港又名大雷江新溝在宿松縣東南七十里明初俞通海開溝三十餘里引大河達涇江口入江徽州府靈山在府西北三十里寰宇記云山有香草名曰靈草上有靈壇不燒香自然芬馥文獻通考云歙縣漢有靈山有石如車盖天欲雨先聞鼓聲又有紫霞浮丘雲林仙姑豐山葛山小武夷長春諸山俱相近黄山在府西北百三十里舊名黟山唐改今名山盤踞宣池江浙諸郡而為鎮于徽髙一千一百八十仞世傳黄帝與容成子浮丘公煉藥于此故有浮丘容成諸峰漢末㑹稽太守陳業遁跡此山有有三十六峯水源如之又有二十四溪十二洞八巖詳具山志郡國志稱天目髙二萬仞而低于黄山者以徽郡已與天目齊而此山又特髙鄰郡諸山皆此山之支壠也山上諸峰有如削成烟嵐無際雷雨在下其霞城洞室巖竇瀑泉則無峰不有信為靈仙之窟宅也山中多黄連紫术有湯泉出香溪中常湧丹砂浴之愈疾西北類太華故前世亦名小華山附元汪澤民逰黄山記黄山在宣歙境雄鎮東南山之陽踰百里為歙郡治其北三十里為太平縣又北集抵宣治所二百四十里不當通都大邑舟車之走而逰者罕至今年四月九日余始得遊焉山西之麓田土廣衍曰焦村蓮峯丹碧峭㧞攅蹙若植圭若側弁若列戈矛若芙蓉菡萏之初開雲烟晴雨晨夕萬状由焦村南道二十五里至湯嶺仰視羣峯猶在霄漢間岡阜蟠結鑿石開逕嵁嵓欹危瀑有聲訇隠如雷怪石林立半壁飛泉灑巾袂當新暑凄然而秋又十里憩祥符寺寺前淙流走萬石間山皆真松名材藤絡莎被蓊蔓蘢茸下有靈泉自硃砂峯来依巖連二小池上池瑩澈廣可七尺深半之毫髪可鑒泉出石底纍纍如貫珠不絶氣馝馞若湯酌之甘芳盖非他硫黄泉比也明日試浴垢旋流出纎塵不留令人心境清廓氣爽體舒相傳沉疴者澡雪立瘥理或然也寺有南唐碑初名靈泉院宋祥符中改今額又龍池距寺左三里許奔薄瀉石潭中亭午炤燭五色璀璨誠靈物所居夜聞啼禽聲甚異若歌若答節奏疾徐名山樂鳥下山咸無有行寺旁近見數峯凌空僧指云芙蓉硃砂其尤髙者天都峯也上多名藥採者裹糧以上三日達峯頂余心甚欲逰之而鳥道如線不可乃止凡再宿寺中還至焦村之二日行十里逰翠㣲寺古松修篁石澗横道僧橋焉覆之屋以息逰者清冷静邃已隔塵襍余為榜曰翼然至寺庭有井泉僧言此麻衣師卓錫處泉亦清美不涸不溢一峯卓然獨秀直峙東南隅曰翠㣲峯其條支迴互寺居盤中故諸峯俱隠不見明發行十五里過百沙嶺往往攀崖壁牽蘿蔓或小木貼巖若棧而度幾不容武旁臨絶壑惴惴焉不敢俯而窺又七里至絶頂頂平廣倍尋方據石少休時晴雨旭霽氣象澂潔環視數百里岡巒虚落歴歴可數九華緑翠若蓮開陸焦村向所見峯皆平挹座間俄頃白雲滃起遥山近嶺如出沒海濤僅餘絶頂槎泝天漢中倐又歛蔵如掃如是者三可謂竒觀矣日暮抵寺亦信宿焉又二日従村北十里登仙源觀至元中新安吴萬竹習静兹壤嘗衍易宛陵誇詡其勝余贈詩還山今竹存而吴逝已久林阜周宻南列翠峯鍊形引年者固其所哉既還憩吾宗公仲雲松樓越十日踰興嶺而南所謂三十六峯者駢列舒張横絶天表衆岫疊嶺效竒獻秀盡在一覽行田疇竟迺登横嶺陟小丘道在竹杉隂森中小徑縈紆屋纔數間一僧竒龎近八十煑茗進果自言結構力田間則持經翫空厯二十閏矣門外營草亭往来休焉庳陋將壊余将改築亭之右丈餘南峯翔舞迎乎前北隴奔躍駐乎後左右翼如景益清名之芙蓉亭而未暇也循巖曲抵白龍潭巨石谽谺洶湧衝激深不可測嵗旱禱雨立至谷又度板橋有小庵食澹苦修數輩居焉嘗有逃空者出竒方療人疾頗衆既亡瘞浮圖中余特徴夫山水轇繞自奥可屏塵事遂宿焉聴泉而去道途為里若干皆樵牧負販者隠度云然非有堠以步而計也昔大徳戊戍嵗得兹山圖經神思飛越而因循皓首甫幸一至至又弗克久留而去每登山時宿雲收雨紫翠如沐山下之人皆以為山川靈英有相之者余亦竊自喜因思向在南安之日造南源山禱雨龍湫跣掲亂石急流中腰絙梯籐登懸崖上而後下至潭所其巖險視兹行為甚是故樂清賞以酬宿昔忘躋攀之勤而不知髙深之為懼也余當謝事與二三友結宇讀書以畢餘生較之充詘于聲利而不知止足者不猶愈乎時至元再元之六年庚辰嵗也聖僧山在府治西舊志云唐武徳間僧慧明居此故名下有泉曰靈塘左為洗眼池巔下有石曰仙人幢南渡時有道人居此明汪道昆為僧自明創般若臺馮夢貞謂之蓮花國土又府西十里曰師山曰太守山龍山在府西二十里宋處士鮑宗巖子壽孫所居父子遇賊争死于此掲傒斯以慈孝名其堂上有慈孝松見古蹟志黄羅山在府西三十里府志云豐趾而銳首俗稱南極壽山相近者為黄牢山所謂西有黄牢之塞也古蹟志云山麓有黄隠樓距黄羅五里曰天馬山又有魚袋山文几山南山西四十里曰金竺山幔亭山在臯嶺之巔有黟石突雲表古松䕃盖俯瞰羣峯攅簇如屏垣汪道昆呼為幔亭詩云烏石古松團翠盖黄羅絶巘入青雲指此城陽山在府西南寰宇記城陽迴環甚髙為城郭襟帶唐景雲中許宣平隠山之南塢一名南山又號翠㣲峯取宣平穿雲入翠㣲之句也山椒有穿雲亭上有仙姥峯分桃石豐隆嶺丹地浴仙池諸勝紫陽山在府南三里髙百九十仞府志云宋婺源朱松逰而樂之後寓閩中常以紫陽書堂刻其印章其子熹亦以紫陽名其堂示不忘也山南有許真人丹池池有翼魚四足而色蒼状類蝘蜓舊志謂即陽城山誤萬紫山在府南府志一曰鍾洪山髙數千尋上有池曰天塘旁有故址𫝊為寳誌修道處北有觀音巖懸岩可蔽數百人近岩有金鷄石矗立雲表有赤文緑字俗𫝊能讀此金雞飛鳴羅隠過之果驗龍井山在府南亦名鶴頂山府志云横截練江雄挾魚梁其澎湃之音驚川聒谷古𫝊宣州刺史訪仙待渡于此俗所謂訪仙橋也上建禹廟岑山在府南十五里大溪之中其頂平夷府志云元鄭玉嘗結屋其上讀書更名曰小焦山下為鄭公釣臺詳見古蹟志又南曰李田山二十五里曰孔靈山晉孔瑜讀書處三十里曰石岣山石耳山在府南四十里府志云峯石皆倒垂如蓮瓣多藥草烏聊山在府城内東南一名富山漢末邑人毛甘以萬户屯此元和志云上有毛甘故城隋末郡人汪華據郡亦屯兵于此今有汪華廟亦稱廟山下有仙姑井宋鄭仙姑所居其北曰萬山又東北曰斗山一名七里山又有東山問政山在府東五里一名華屏山唐有于方外者自荆南掌書記棄家學道于此其従弟徳晦刺歙州来訪之徳晦為築室山上號問政山房山椒有髙眉峯有萬仞花屏亭興道觀又有鐘樓峯峰後有寳相寺有泉甚甘冽相近為石壁山紫芝山飛来山在問政山西相傳昔日有鳯飛来于此生八子上有鳯岡精舍處士畢元所棲商輅題額即秀野荘也入山小徑旁有朱子外祖祝氏舊居祝遷崇安朱子閩歸過之題舊時山月四字即兵馬使畢力忠長春園紫金山在府東三十五里府志云舊名金紫山相傳暮夜每有光見宋紹興十八年尚書章侯覩而異之因取佛語改名紫金徙白蓮院于其上旁有瀑布曰琲泉九派飛流鳴球發籟如挹百斛珠又五里曰大金山十里曰萬羅山玉屏山在府治東北端峙若屏風泉𫝊響常吐飛溜下廣寛可屯軍明太祖定徽駐蹕山椒前代謂之玉帳遺蹤京兆畢懋康構西清館池産紅白并蒂蓮又顔云華苹山又東南曰馬鞍山又西曰白龜山雲嵐山在府北七里唐越國公汪華𦵏此俗名雲郎又府北十五里有鳯凰山舊産茶名甘白香飛布山在府北二十里舊名主簿山昔有主簿葛顯率邑人保聚于此唐天寳中改今名上有甘露洞鳳凰山在休寧縣西二里一名靈鳥山地理志云孫吴時休陽縣治在此白嶽山在休寧縣西三十里竒峰四起絶壁斷崖有飛動之勢逰齊雲者必先登焉髙湖山在休寧縣西百二十里南接婺源山椒有湖四時不涸人稱聖湖又西北五十里有鹿髀山率山在休寧縣西百六十里一名張公山古云昔有張公隠此故名山由五嶺西北鬱積而來髙千數百仞盤踞休婺之間鄱陽浙江之水皆源于此古為三天子都亦稱三天子鄣相近有黄竹嶺岡隴盤鬱連饒州浮梁界常置巡司附明吴度三天子都考吾郡三天子都亦稱三天子鄣其說肇自山海經諸家解釋惟汪氏之記為允經曰三天子鄣在閩西海北又曰浙江出三天子都在率東又曰廬江出三天子都入江彭澤西張氏土地記云東陽永康縣東四里有石城山上有小石城云黄帝曽逰此即三天子都也其說不足取郭璞注云今在新安歙縣東謂之三王山浙江出其邊也又云浙江出新安黟縣南巒中東入海今錢塘浙江是黟即歙也其說操兩端一謂在黟一謂在歙且謂黟即為歙尤為背謬盖漢時吾郡止黟歙二縣其後析置諸縣今休寧祁門婺源皆析自黟績溪析自歙疆理各别豈容混稱一統志引經云三天子都在率山今在休寧縣俗名張公山何喬逺輿地記云休寧縣山曰率山水曰率水山海經浙江出三天子都山在率東其說漸為近之惟汪循率山記更為詳確記曰或以績溪大鄣山為山海經所稱三天子都非也水經漸江水出三天子都在率東廬江出三天子都入彭蠡今惟率山之水山隂山陽一東一西而流入于江者與古脗合嘗逰率山見巨石上鐫三天子都字即三天子都也其説詳確不可易矣大抵言山必徴諸水言水必徴諸山若禹貢導河積石嶓冢導漾之類徵諸水者也南至華隂東至砥柱之類徴諸山者也故禹貢為千古記山水之要典汪氏以浙江廬江二水為證始知三天子都所在得禹貢遺意矣近日吾邑有老生强謂解事云三天子都分在三處而黄山擅其一其說亹亹可聴而漫無根本適吴下有顯者来逰黄山遂取而載于逰記不知吾邑溪水十餘支皆編竹為泭而行惟休寧率山之水足通舟楫黄山雖竒秀其趾有水名豐樂溪亦與衆溪相類即水經注所謂小溪之一支耳既非浙江所自出與經不合安得指為三天子都乎故言三天子都者惟汪氏之記為允余故詳為辨之俾後人無滋惑焉戴公山在休寧縣西南五十五里河村戴彦明開為三省通衢顔公山在休寧縣西南六十里古有顔公隠此因名中多異蹟山之髙自麓至巔可三十里錦堂山在休寧縣南十里孤峯特立趾圓而頂平宋江慶受業胡瑗歸結廬此山以淑其徒白際山在休寧縣南八十里其山由五嶺而来連峯不斷下有元萬户吴納與胡大海戰地又縣南九十里曰雞籠山方原山在休寧縣南百一十八里本名黄土山唐天寳六載改今名又名馬金嶺其隂則水北流入率江其陽東流者入于睦之遂安西流者入于衢之常山界而皆趨于浙江又南曰烏龍山陽昕山遊仙山在休寧縣東南三十五里平地特起南有石壁削成數百尺呼之輒應又名響山又東南七十里有仰山路徑險絶號十八盤萬安山在休寧縣東十里府志云即萬嵗山一名古城巖隋末汪華築郡城自黟徙治于此宋宣和間改今名明洪武時復名萬壽山山麓兩石夾立如門萬厯間縣令祝世禄建還古書院梢雲山在休寧縣東北二十三里武洪之水出焉舊名郎山唐天寳六年改此今名榔原山松蘿山在休寧縣北十三里俗名金佛山蜿蜒數里如列屏障于縣治後山巔片壌産茶為天下最相連者曰天葆山三十里曰萬松山東山在休寧縣西北十五里元趙汸從江西黄澤受春秋歸精舍于上虞集記之白鶴山在休寧縣西北城中有李花塢春月如瑤林下有泉名東山泉軍營山在婺源縣城内西北隅古志云有五代屯兵營址山形類蚺蛇蟠結昔稱蚺城縣治立焉天堂山在婺源縣西北四十里為邑治龍脉山甚竒秀又十里曰船槽嶺峽為龍脉過峽處明嘉靖後居民鑿石燒灰傷脉厯任邑令皆刻石嚴禁查公山在婺源縣西城外府志云南唐宣歙觀察使查文徽及宋御史查陶二墓在焉文徽與邑令廖平講學于此後人刻其山之石曰查公山廖公泉石老山在婺源縣西六十里三峯聳秀頂上廣數百畝有吴王墓有龍潭其東為古城山外峻中平出口處僅丈許宋岳飛嘗屯軍其中濬源山在婺源縣西百一十里西南連浮梁樂平界又名鳯遊山濬源之水出焉山畔有大安洞梅源山在婺源縣西百二十里一名翀山山産楊梅充貢梁任昉為郡守奏罷之相近有梅嶺為徽饒通衢又有吴源山􅰔崌山俱界樂平福山在婺源縣西南四十五里又名太極山府志云外翕内闢若城郭厥土左剛右柔明粤東湛若水講學于此有總靈洞天窻洞其與福山對峙而隔溪相望者為善惡二山祥符經謂善山神為王惡山為夫人俗稱夫婦山桃源大衝山在婺源縣東南六十里府志云懸崖飛瀑數百尺西十餘里為龍行石石皆龍跡又七里有龍洞宋延祐中判官許松賦詩禱雨有民命望懸三尺水神功願乞一年秋之句投洞中雨隨至東有鷹嘴山又有小歛山接衢州界方山在婺源縣東二里五代士人朱寛讀書于此墨池猶存寛仕南唐又三十里曰黄連山石耳山在婺源縣東九十里界接衢州其髙不可仞計山之南北各有八景其支脉曰大鱅嶺相傳洪水時有大鱅上此而名按府治亦有石耳山龍尾山在婺源縣東百里芙蓉嶺之支也西連武溪山石有羅紋可為硯又名羅紋山亦曰芙蓉溪蓮花山在婺源縣東百里接衢州界羣峰嵂崒状着蓮花中有龍湫禱雨時應五珠山在婺源縣東北四十里山形横峙凡五起伏如貫珠然有龍湫旱禱輒應舊名五株山相近汪口村東有烟樓峯逺望可百里宋岳飛軍于上流中平鎮以此峰頂望敵人往来旌旗舉烟火因名圓鏡山在婺源縣北七十里山頂連峰插天山半頓起華盖其圓如鏡南有石筍突兀如圭璧相近有髙貴山大廣山在婺源縣北九十里婺水出焉一名大尖山又十里有金剛山有黼峯有九陽凹山浙源山在婺源縣北九十里一名浙嶺邑中諸水多西入鄱陽惟此山之水東會休祁黟縣諸水至歙浦又㑹績溪歙諸水赴浙江因名浙源之大灣有平鼻嶺大連山在婺源縣北百二十里髙四百仭周九十里接休婺界昔鄉人避難于此祁山在祁門縣東北一里三面皆石壁上有二巖曰棲真曰青羅旁有泉甘而冽鳳凰山在祁門縣南又十里曰白石峯又十五里曰王公峯髙出萬仞不與諸峰接主簿山在祁門縣西六十里方輿記云昔黟縣有主簿愛此山幽竒遂解印来隠故名歴山在祁門縣西八十里西界石埭山極髙峻巔有巨池池中有石馬新安山在祁門縣西百一十里竒秀異衆山郡名新安取此與此山南北相望者曰九峯山又縣西百二十里有西峯山上有銅鼎鐵笛錫杖唐五臺僧所遺百四十里有五龍池山道人山在祁門縣北二十里山半有巖巖前有池又北十里有不老山出方竹石新婦山在祁門縣北三十里有三石峯類人形每霽色暉映雲霞明媚則若彩服靚粧者故名相近有石鐘石筍二山相對大共山在祁門縣北五十里界接石埭大共之水出焉其地又有禾戍嶺界接太平栢溪之水出焉林歴山在黟縣西南十里四面壁立徑路危險吴志云漢末土冦陳僕祖山等屯此賀齊平之今山上寨洞遺壁尚存鋤者或得箭鏃山之東有石洞可容數十人内刻石為佛像西瀑布自千丈崖瀉下又有仙人棋盤石臼常見金燈如千百流星飛墜人多異之武亭山在黟縣西南十八里横江水出焉危巔削壁宋時邑人黄元暉甃路行者便之碧山在黟縣西北八里北接石盂南面靄峰為邑之鎮又西北二十里曰章山章水出焉戢兵山在黟縣北十五里本名石鼓山唐改今名上有石鼓石人石驢相傳石鼓能自鳴則驢鳴人哭後鑿破遂已牛泉山在黟縣北五十七里東界太平輿地志云其山自麓至頂每九里一頓凡九頓並山為路隘處纔七八寸臨不測之溪上常多風故木雖合抱而長不及丈惟南向有之頂上有水冬夏不減名曰牛泉又北三里曰五溪山三姑山在黟縣東北十五里一名吉陽山上有三峯其中峯有瀑布泉新安記云天将雨此山先有鼓角之聲東山在黟縣東十五里峭絶人跡罕到又十里曰石燕洞幽邃容百人石門山在黟縣東南二十里鑿石為門下瞰深潭壁立千仞緑崖鑿路僅通人步絶處以木為棧古號小劍門有建中靖國年號鐫刻尚存魚亭山在黟縣南三十五里方輿記云每嵗江西魚船至祁門以次泊山之東故名復山在黟縣南三十六里一名阜巖山方輿記云山極孤峻石壁四絶僅通綫路其絶頂有泉常流不竭昔鄉民常避亂其上賊意山髙無水欲持久困之鄉民投示以生魚賊遂引去其南為天潛山以多隠君子得名石照山在績溪縣東五里有石壁立方廣二丈光可鑑物故名山後有石屋山如屋下如臺前出為流雲洞龍鬚山在績溪縣東二十里髙五百仞山頂一池雖晴明亦有雲氣旱禱輒應大鄣山在績溪縣東六十里一名玉山是為邑鎮髙五百五十仞周百五十里秦立鄣郡取此相連有雙峯山湖田山距縣百餘里有龍塘山麓従小徑入縈紆嶮巇懸絶處則倚水架梁而進唐金山在績溪縣東南九里三面臨水有泉出石穴極清泠飲之可除煩熱翠眉山在績溪縣西一里兩山低平横立左右如眉故名舊有翠眉亭宋縣令蘇轍常吟咏其上大㑹山在績溪縣西四十里髙聳特出衆山環峙莫能並其巔晴霽時可望太平宣池又西曰漂山曰石鶴山聖泉洞又西曰古山徽嶺山在績溪縣西北十五里一名大尖山徽水出焉王安石有度麾嶺詩作麾字又詩曉渡藤溪霜落後夜過翬嶺月明中又作翬字太平廣輿記載績溪大徽村改州為徽取此從徽字為是西北連凛山佛論新嶺東抵叢山闗南接大鄣水源有二隂入旌徳陽流歙浦蘆山在績溪縣西北四十里山左之水東流過旌徳入揚子江右則南流經縣界通錢塘江蒼龍山在績溪縣北十里一名蒼龍塢深邃窈㝠常有雲霧下有潭甚深俗傳龍蔵于中因名洞中舊有十景大獒山在績溪縣北六十里其山周迴百里前踞潭水蹲形矯首有獒象焉山半有仙人崖巃嵸山在績溪縣東北二十九里其山四合中一徑通寧國縣界舊有寨呼為叢山闗下有巧溪披雲峯在城陽山右古志云髙接天宇上簉雲簇有披雲亭唐宣歙副使魏𢎞簡為張友正建古蹟志山麓有吕渭讀書堂登仙峯府志傳為仙曼都飛昇𦵏衣冠處峰頂有飛龍坑澗水宛曲為都浴處名曰浴石相近有春夏秋冬四山又有謝公墩謝安曽訪曼都過此昱嶺在府東南百二十里山谷間無跬步夷曠者宋岳飛開道由三嶺出遂為康荘境接杭之昌化篛嶺在府北八十里上多箬竹唐汪華所開通旌徳太平為郡要衝又有雙嶺烏泥嶺嚴嶺俱相近塔嶺在休寧縣南八十里接婺源界明正徳中邑令唐勲破桃源洞冦于此更名得勝嶺芙蓉嶺在婺源縣東八十五里髙幾千仞周三十餘里與對鏡羊鬬塔嶺及休之新嶺名曰五嶺其山之冢為芙蓉峯又名靈山中有碧雲菴旁有祖師石亭亭上有石筍髙二丈其陽有五祖巖為南唐何令通棲真之所對鏡嶺在縣東九十五里羊闘嶺在縣東一百五里明萬歴中邑令譚昌言以芙蓉往郡道險更闢徑于江灣之左近可十里遂名譚公嶺赤嶺在祁門縣西百里嶺下有溪祥符經云昔人為梁取魚魚不得下遂夜飛越嶺而去人復張網嶺上飛不過者化為石其色赤吴都賦云文鰩夜飛而觸綸盖此類也榔木嶺在祁門縣東五十里嶺下水分東西東入錢塘江三百六十灘西入彭蠡湖亦三百六十灘嶺雖平坦以水勢觀之髙可知矣武陵嶺在祁門縣西四十里始極峻險唐縣令路旻鑿為盤道至今便之墨嶺在黟縣南十六里上産石墨土人採之久而成井古巖在府西二十五里寒山里巖有石洞其上丹崖層峙鸞飛鵠立稜稜露石骨有巗横亘形如覆屋可容十許席唐會昌中建古巗院名僧相繼出焉藺将軍巗在府南十五里舊志云隋藺亮屯兵處其地阻險齊雲巗在白嶽西北路迴如線遊者縁梯以升所經勝處極多乃至于巗黟祁歙婺之山一目可盡也宋程珌書雲巖二字刻于石前一峰特起為香爐峯又謂之凌虛巖明嘉靖中勅改曰齊雲山山有五老峯南一石卓立曰天柱又獨聳巗北一石洞屏榻整然殆異人隠處府志云殿創自宋寳慶其像為百鳥銜花所塑後兩經火一髪不燬其異如此石橋巖在休寧縣西六十里一名岐山石壁千尺横亘如梁府志云唐刺史韋綬立精舍名石門寺明湛若水講學于此建天泉書院有逼霄峯有金紫太極諸巖東宻巖在休寧縣南三十五里周迴絶壁如城其頂平衍府志云唐末黄巢兵冦徽郡程澐率衆立寨拒之今水池塹壘猶存黄墩在府西三十里晉新安太守黄積卒于官子孫家此故名至今有墓存明程敏政易為篁墩以地多修篁其說無據梁程靈洗唐朱師古皆居此程為河南二程子之祖朱為婺源朱子之祖明歙令劉伸邑人趙滂修墓而建三夫子祠曰程朱闕里靈巖三洞在婺源縣西北百二十里東北曰慶雲洞巖竇皆五色兩巗瀑流上有鸞鶴雲霞之象西曰蓮花洞有大石室刻石像傍有羽盖旛節皆乳石所成南曰含虛洞洞有二重中有仙雲帳雪崖香嶺又北曰瓊芝洞以石堅白得名實有四洞詳戴銑遊記又有六洞合為九産硯石色紫如肝瑩者可擬端溪青苓洞在婺源縣西八十里南北門相通中有物象如靈巖三洞練江環繞郡城揚之布射富資豐樂四水分派合流直瀉如練而抵于城南是名西溪一名徽溪其水注于漁梁抵歙浦而合于新安江新安江在府南凡郡六邑之水俱自歙浦流入為新安江下流至嚴州合金華水入浙江其水淺深見底為灘三百六十水經注云浙江又北經歙縣東水甚清深潭不揜鱗沈約詩洞徹隨深淺皎鏡無冬春是也洋湖一名陽湖在休寧縣東南屯溪衆水所會也黄墩湖又名相公湖在休寧縣西南四十五里即梁程靈洗射蜃處也昉溪在歙縣北四十里因梁太守任昉得名唐大中時刺史盧潘改為任公溪上有石為任公釣臺屯溪在休寧縣東南㑹東南二港之水而東注歙浦白鶴溪在休寧縣西二里發源黟縣吉陽山由白岳山下過藍渡至縣界與夾源水合東流于屯溪與南港㑹是為東港績溪在績溪縣東翬水與揚之水交流于此有如績焉南港在休寧縣南率水所㑹及諸山嶺之水俱入于此東港在休寧縣東白鶴夾源二水所㑹及諸山嶺之水俱入于此接于南港大小北港在祁門縣櫸根九峯西峯五龍池諸山之水名曰小北港王九嶺赤嶺良禾嶺厯山諸水名大北港俱㑹于大共水豐樂水在府西三里源于黄山湯溪南㑹曹阮二溪過仙人臺溢于昌堨匯于状元潭流經巖鎮潁水㑹之又東南與富資水㑹流入于練江富資水在府北一里出歙縣篛嶺㑹布射水入于練溪下歙浦布射水出歙縣黄蘖山元和志謂出飛布山南流至縣治㑹揚之水注于歙浦率水發源休寧縣率山其陽水南下而西流者過饒州㑹于彭蠡其北水源有二皆自山巔瀑瀉而下一従望仙巖流出梅溪口入祁門界合孚溪水一從髙湖尖流出彭沍坑口東與梅溪孚溪水㑹又東至江潭溪浙源之水赴焉流經南港東港又㑹于率口而入于歙浦亦名漸溪即古之漸江也汊水在休寧縣南自璜源出汊口與佩琅水合滙入南港一名紫雲溪五城水在休寧縣南四十五里源出婺源五嶺流入縣境達于龍灣溪口夾源水發源休寧縣西北四十一里石坼山南流環繞縣城如帶與白鶴溪水㑹流至屯溪入于歙浦浙源水出婺源縣浙源山東東流至休寧縣㑹休黟諸水東入屯溪又南入歙浦武溪水出婺源縣浙源山西為浙源西水㑹于武溪流經樂平入鄱陽湖又廬源水出廬嶺益陽水出浙源山小歛水出小歛山濬源水出濬源山杭溪水出石龍山俱入武溪婺水出婺源縣大廣山過石門灘南繞于縣治又南㑹于斜水入武溪水大鱅水出婺源縣大鱅嶺有二東流者至衢州入浙江西流者合斜水入于武溪梅源水出婺源縣梅源山東㑹于浙源西合武溪沱水在婺源縣其源有三一出金剛山為黄村水一出平鼻嶺為燕山水一出九陽黼峯為理源水合于三溪口南流㑹浙源水繡水在婺源縣城北㑹諸山港之水繞城三面其紋如繡下流入于武溪大共水源出祁門縣大共山流至秀溪霄溪下閶門灘㑹北港水直注倒湖入鄱陽又新安水出新安山盧溪水出梅南山俱匯于大共水赤溪水在祁門縣魚亭山有二東流者入于屯溪西流者㑹大共水又有榔木嶺水亦東入屯溪西㑹大共章水出黟縣章山東南㑹横江水入屯溪注于歙浦横江水出黟縣武亭山東㑹于章水吉陽水出黟縣吉陽山東過噎潭又東至白茅渡㑹横江水又牛泉水合于此魚亭水出黟縣魚亭山東至魚亭口㑹横江吉陽二水合于章水揚之水出績溪縣巃嵸山其一北流逕叢山闗入寧國界其一南流至大屏山乳水注之又南至靈山翬水注之又南至象山又東㑹登源西㑹上溪二水合流入于練溪又大小母堨水出靈山綿溪水出佛論嶺昌溪水出栁亭山及休寧之武洪水俱匯於此徽水出績溪縣徽嶺東南流為徽溪過来蘓渡入揚之水乳溪水在績溪縣北東流為浣沙溪入揚之水九龍潭在府境丞相原道中九泉濆射破山而出雷砰電擊有若龍戰石印潭在績溪縣南五里潭中有方石如印玉龍潭在績溪縣西北二十五里潭中有巨石文成白龍二長丈餘歙浦在府南十五里今名浦口練江漸江合流奔駛任昉赴郡有滄江路窮此湍險方自兹之句吕公灘在歙縣東南十二里一名車輪灘湍悍善覆舟唐刺史吕季重疏為安流遂名閶門灘在祁門縣南寰宇記云衆水所注有兩巨石對峙如門其灘流常覆舟唐縣令路旻開斗門以平其險人呼路公灘後相繼疏導今為安流深渡在府南四十五里新安江經此寰宇記云與睦州分界處峯巒掩映状若雲屏實百城之襟帶宋元俱設巡司于此明廢龍泉在婺源縣北七十里旱禱有應唐吕洞賓大書飛龍巖三字刻石尚存洗心泉在婺源縣西四十五里福山寺右有異僧卓錫湧泉甃之則渾舊志云明湛若水講學于此湯泉在北黟山東峯下香溪中泉口大如碗可燖雞一名硃砂泉江南通志卷十五
