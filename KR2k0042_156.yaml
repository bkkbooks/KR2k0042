body:
  text: 江南通志卷一百五十七人物志孝義一江蘇二府江寧府南北朝梁陶子鏘字海育秣陵人兄尚為幸臣所怨被繫子鏘公私緣訴流血稽顙兄乃得釋居母喪時與范雲鄰雲每聞其哭聲必動容改色欲為申薦母嗜蓴沒後常以供葬後忽營蓴不得悲慟幾絶遂長斷蓴味陶季直秣陵人早慧祖愍祖宋廣州刺史嘗以四函銀置前令諸孫各取其一季直時年四嵗獨不取曰若有賜當先父伯不應度及諸孫五嵗喪母哀若成人聞者酸感及長好學淡於榮利徴召不起時人號曰聘君仕齊為尚書比部郎纍遷給事黃門侍郎素清苦家徒四壁殁無以具殯斂著京都記朱年秣陵人母死廬墓終身有白兔紫芝之異鄉人名其里曰孝感至今有朱年隴江紑字含潔考城人居金陵父病目紑侍疾經年夜夢一僧告以飲慧眼水乃可差及覺訪智者法師啓捨牛屯里舍為寺以慧眼為名心已異之及就創造泄故井井水清冽取以洗眼因此遂差後父殁竟以毁卒張松建康人弟悌坐罪當死松訴稱後母惟生悌松長不能教誨乞代悌死次弟景亦請死悌亦引分讞上梁武帝以為孝義特宥之徐雄秣陵人位奉朝請母終毁瘠俄而兄亡扶杖臨喪一慟而絶唐張常洧句容人父卒廬墓墓側生芝草十二莖從孫公挺亦以孝聞宋包級父為人殺級年十七與弟繡抉讐雙目瀝血祭父讐家訟之官義而直焉嚴晃溧水人舉進士授教諭時元兵渡江晃負母避之道遇兵欲刃其母晃以身蔽為兵所傷幾斃草廬吳澄嘗哀以詩王景雲字仲慶溧水人學問閎博咸淳間以薦辟授清流簿與弟景華嘗捐資周恤貧乏兄弟至老不忍析居錢浩翁句容人幼孤事母盡孝有妹虜於北軍母痛念不置浩翁遍訪得諸萊州携妹省母時母年八十有三喜甚鄰里皆賀又十年母殁浩翁年七十終喪不御酒肉不脫巾絰張孝友句容人讀書不仕親殁廬墓六年嘗有五色烏來集墓樹平居以德化人鄉俗一變伊小一與劉興祖俱溧水人割股被旌元樊淵字德翁句容人至元中奉母避兵茅山兵至欲殺其母淵抱哭求代兵兩釋之母亡終身不離墳墓王榮句容人五世同居庭無間言嵗飢賑貧轊死為德鄉里延祐間詔旌其門王進德字仁甫家金陵富而好施出七萬餘緡構郡學講堂置一切禮器又買宅一區割田九百畝創建江東書院朝錫以額設官掌其教置義莊以贍族修城隍以捍井里顧童子建康人割股愈母而已死明周琬江寧人父為滁州知州洪武時坐事論死琬年十六叩闕請代上疑為人所教命斬之琬顔色自若乃宥其父戍邊琬復請曰戍與斬均死耳父死子安用生為願早就戮上怒命縛至市琬色喜上察其誠赦之親署屏曰孝子周琬尋授兵科給事中徐鎮童上元人洪武時旌其孝魏澤字彥恩溧水人洪武時為尚書建文時謫海寧尉文皇逮方孝孺族黨澤隂脫其幼子宗甫密致于台州秀才余學夔孝孺得有後又有陳義者隂庇鐡尚書鉉二女脫教坊籍亦義士也浦阿住沈得安嚴分保三人俱江寧人又邵佛定上元人皆永樂時以孝旌李疑江寧人家貧好周人急金華范景滈為部吏隻身得疾無肯僦舍者杖而詣疑疑延入汛室居之躬為煉藥煮糜滈有黃白金四十餘兩願以酬疑疑不受籍藏之滈死出己財殯之聚寶山招其子至按籍還金平陽耿子亷械逮京師其妻孕將育衆拒不納卧草中以號疑謂婦曰人孰無緩急倘為風露所侵則母子俱隕令婦邀歸産一男踰月辭去宋學士濓為之傳陳逵六合人舉將才李時勉薦之厯都督同知天順復辟于謙棄市故人僚友皆畏避不敢出逵感謙忠義獨收遺骸殯之得歸葬王指揮失其名世襲虎賁衛妻死不娶獨與母居同官黃某逺謫久無耗妻貧不能存成國朱公儀素愛指揮憫其喪耦令納黃婦指揮唯唯而已成國擇日歸之居數月聞其寢處各異召訊其故指揮曰曩以主命不敢違但與婦同寢其夫歸何以處之况彼失節是某失節也成國曰然則奈何曰不若遣送謫所某家有老奴夫婦二人可伴之往成國嘆賞從之顧暘江寧人正統時旌孝胡深六合人天順時旌孝戴睿句容人七世同居成化時旌鄭濓字師周江寧人嘉靖癸未進士為行人兩使藩封餽遺一無所受授山東道御史按兩浙有能名為湖廣按察使以父憂歸乞致仕養母盡孝母卒濓已老哀毁踰禮里人著純孝傳以稱之沈九思字天啓上元人副使琮子父病九思籲天請以身代嘉靖癸酉舉鄉試罹母憂哀毁骨立里中勳貴為黃門所持槖千金求九思為解九思拒其金而隂解之未仕卒伯子鳳翔進士為蕭山令以亷能課最遷給事中徐昱字彥昭江寧人父病革醫告技殫昱旦夕籲天求以身代刲臂肉和糜以進父疾瘳鄉人將以聞部使者昱曰此一時遑迫之計無復之耳奈何從邑長令干名乎後舉宣德七年鄉試為國子助教徐逺字文穆上元人友人寄一篋內藏白金奇玩夜失火友人已甘灰燼逺往探之尚在於己物不及携獨完此篋以歸友蕭春字秉常居金陵父病痢春祈求備至及疾革臭穢狼籍春泣曰吾父不復生矣兩手據床一吸殆盡悲苦氣絶良久乃蘇父殁廬墓徐震字廷威家金陵不侵然諾有兩人皆密以金託震授其子兩人遽死其子皆不知父有金也震如數還之一無私焉龍景華字宇春上元人少孤奉母教母病危刲股以療嘗至江滸捐金拯溺活十六人鄰火爇所居叩禱風返火息有司奏旌其門為孝行姚浙上元人割股療母疾嘗拾遺金候其主不至盡出以周貧乏史世揆江寧人人貸其父千金貧不能償析産時世揆遽焚其劵嘗納妾入門悲痛不已詰其故曰父寃繫獄鬻妾贖罪念母無依耳揆立遣還更厚贈之何嶽字畏齋夜行拾遺金二百鐶不與家人言凌晨携至故處有尋金者詢其數目封識皆合遂還之其人欲分數金為謝嶽曰拾金而不隱豈利數金者乎趙時振字少東江寧人舉鄉試以哭母成疾死葬康家山有碣曰趙少東先生廬墓處張諫字孟弼句容人孝事二親由進士筮仕行人司丁母憂哀毁骨立廬墓三年芝産墓旁遷河南副使召為順天府尹以忤時貴出守萊州政聲大著召為太僕少卿王馮字杲清父芝瑞任四川學道沒王事藁葬瑞州之梅庵馮家赤貧重繭迎柩時六合潘士奇與芝瑞同官同患難同葬梅庵又有故廣東御史顧之俊與芝瑞交厚瑞殁時之俊為經紀其喪而身死柩亦停於庵側馮并舁歸葬之王之藩字南衡江寧人兄某領官鏹采銅耗其資藩毅然鬻産得千八百金以輸官當事義之任陜西籓幕𣙜稅潼關攝華州篆皆有惠政黃居中字明立萬厯乙酉舉人教諭上海不受生徒私贄升南國子監丞轉黃平知州投檄不赴持身介特族人為南大司馬有營辨以千金請托者居中曰奈何以此失吾生平麾之去王潢字元倬江寧人孝友能文章舉崇禎丙子鄉試親老不仕賦南陔詩以見志一時名人屬而和之人稱南陔先生陳敦化秣陵人母老卧病土冦為亂化獨守母不去冦劈門入執化索賄繫於樹連射之備受楚毒惟以身蔽母未幾所傷竟痊咸謂孝誠所致周禧句容人拯溺人還遺金梅洪溧水人少孤事母以甘旨自奉甚約其婦有後言遣之母瞽洪負以行一旦復明人以為異母卒廬墓三年縣令聞而賢之為娶妻生子矣婦厭其貧去之數嵗子卒洪亦卒邑人收葬城北十里許有監司題曰孝子梅洪墓花奔孝子髙淳人不知姓名日負薪以市嘗雪中至學宫教諭于鳳見其衣敝肘露謂曰何不以薪價易衣對曰小人有母不暇自謀也鳳曰汝有妻乎曰有何以衣妻曰新者奉母而易其舊者聊蔽體耳鳳喜其孝贈以千錢不受固與之乃曰當為公供薪鳳堅辭之至夜則載而投學舍園中楊師祿髙淳人遇亂兵父被執師祿號泣請代兵異之欲留置軍中不從被害妻卞氏年二十守遺腹子以終吳翥南髙淳人崇禎末隨父避亂土賊入門劈父胸翥南樓上望見急下求代被害妻孫氏守節割股療姑劉銓江浦人父觀為御史坐事當辟銓具本擊登聞鼓願以身代蒙特宥復觀原職陳標江浦人年五嵗生母李氏為父所遣改適於浙長欲尋求以父老不果父殁詣浙迎母亡已十餘年遍訪遺塜啓棺滴血負柩歸葬吳可箕上元人監生甲申闖賊陷京師可箕具酒食召親友言别衆莫測其意已乃製白衣題詩於襟入英靈坊關廟闔殿扉自經死同時有孝陵衛董啓明武舉黃士彩聞變皆自經曹臺望江寧諸生冦亂捐千金倡修城垣嘗夜宿淳化鎮聞鄰人以債迫棄其妻即傾囊贖還之魏孝楞髙淳人親殁廬墓楞殁子亦然敕旌父子雙孝王之卿應天人崇禎時旌孝胡陽生字復之上元人輕財好義嵗暮日袖金數十封伺途中奔走憂惶者與之問姓名不答崇禎十三四年間嵗荐飢疫倡捐賑施醫藥收棄嬰給棺轊所費不資寧陽侯陳光裕勢奪陽生祖墓地擊登聞鼓訟諸朝卒復之孫任輿姚金玉張繼宗馮天孫陸元龍陳礦俱上元人倪夀江元孫張福緣俱江寧人史負八葛至學俱髙淳人黃阿回水軍衛人徐佛保江隂衛人俱割股療親疾以孝旌表楊佐上元人甫成童母病劇剖腹取肝和粥以進母獲愈後三日佐卒所居鄰辟雍祭酒程松溪聞而異之殯之日令太學生數百人送其喪千户劉潮子文縉割股愈潮縉疾子天命亦刲股療之戎憲句容人幼喪母事父哲孝每食必問所欲哲患痢憲刲股以進遂愈叔嬸無嗣憲奉養如己親張一鵬句容人年十二父病劇鵬焚香籲天割股以進吳方明句容人每旦刺舌血書法華經至千餘卷為母祈壽從弟方魁亦孝母母病刲股愈之袁文化溧水人父死廬墓九載三十喪偶終身不娶鄉人贈以詩有三十鰥居敦大義九年廬墓重天彛之句丁瀠溧水諸生事母孝母殁廬墓哀毁踰禮邑令王弼聞狀三過慰之撰丁孝子廬墓記陳宗堯髙淳嵗貢新城令與同邑周庖劉一俊施龍庠生魏􅋯溧水傅褎庠生楊振六合毛程江浦王海皆親殁廬墓三年顧夢上元人同邑沈升王萬䙫吳泉王頊李仕傑張繼宗六人句容徐延雄馬獻圗李長標三人溧水虞欽黃棖任超庠生虞周四人髙淳鄉貢邢振羽陳希任湯之尹九嵗童子孔允紀四人六合方顯黃誾王嶽毛至潔陳應登庠生許忠汪國淐沈希孟八人江浦周思臯一人俱割股療親疾以孝旌表汪應乾右衛指揮陳名謨名世俱上元人楊鳳江浦人李夢周六合人皆割股療親疾劉鳯池溧水人庠生馬純仁六合人俱以流賊入都赴水死蔣凡順德府别駕張惁僕也惁居官勤慎偶墜馬不能言凡泣走告太守曰吾主飲順德一口水積貸未償今若此行囊請封貯使人知吾主為清白吏語畢引刀割股以進籲天願代少間惁稍蘇太守義之為作傳增華瀨水劉道開之僕道開補崖州幕偕其弟及二客三僕往海邦瘴癘二客二僕相繼死乃遣其弟還而道開又死獨增華瀕死復生間關萬里扶五柩歸出百金奉主母封識宛然曰此主積俸也襆被蕭然衣不掩骭國朝劉玉佩江寧人割股療父以孝旌表朱獻醇原名朝幹句容人順治甲午鄉試第一授射洪知縣在官潔清居家孝友嘗請於當事除邑中龍潭運糧及區頭之困邑人德之乾隆元年崇祀鄉賢駱維持句容監生施德鄉里康熙丙子秋暴水漂漲維持殮死賑生其事尤著子如驥邑諸生性篤孝嵗飢賑粥捐資修建奎文閣明倫堂事載廟碑羅必顯字揚庭江寧人事親孝家貧不受人憐嘗夜歸過螺南巷口遇以索債投繯懸而未絶者救蘇代償其債孫秉偀有孝行母喪廬墓三年董志聰江寧人明季籲憲重建預備倉九十三間于賽洪橋寇氛時捐金賑濟贖人子女又有築墟堤造義舟諸事鄧良材字干霄江寧諸生讀書過目不忘潛心理學動循規矩嚴於辭受非義之干介然弗屑也明亡後絶意進取杜門謝客親故罕覿其面子士傑順治辛丑進士張光字朴生江寧諸生敦信義友人謝願小計偕道卒光撫其孤如己子陳君昱死光為其女擇配贍其妻終身子景栻庠生景載康熙辛酉乙榜令興安多惠政擢刑曹黃老人江寧庠生黃清家𨽻也清卒家貧子弱不能具棺衾老人拮據殯葬之遂傭於他氏所得直悉以供主母饘粥春秋伏臘必市豚蹄絮酒走清墓哭奠盡哀髙官蔭上元人性篤孝四嵗父病痢不食蔭亦不食母病危藥不下咽蔭以口度藥夜則籲天請代刲股進之母愈蔭遂絶粒死時年十六其後十八年母年七十七乃卒雍正十年旌表裴師度字述先上元人竭力養親雖一錢入必均之同産養寡妹撫孤甥有陜客遺金於其室度鑰守數年俟其來還之康熙己未嵗祲斥産買榖以賑里人程煒字暗章上元人性誠朴早喪偶不再娶侍父寢三十年親滌溺器裏衣垢必親浣父年九十殁煒老矣猶孺子泣云錢士揚江寧人七嵗母病臥樓下火起士揚聞之自孰奔歸抱母號泣火遂息母殁廬墓三年有白烏結巢之異談禮字慎修江寧人父如玉早卒母張苦節孝養備至孤姪十人撫以恩代弟償逋千餘金立義田以贍族完人之婚脫人於難嵗終袖銀于途遇老貧者贈之同里李之曉字君明嘗刲股療親散衣糧施藥餌給槥瘞枯鄉里稱其好義何澍字友筠江寧監生幼孤孝母讓産於兄施德鄉里年九十八雍正三年恩給八品冠帶三子皆孝友唐仲熊字虞臣江寧諸生父早喪事母孝母殁啜粥三年不入私室及葬每朔望必詣墓田展拜卒無子士友哀之孫芳江寧人少孤事母盡孝居方山有虎患與弟必立捐資募力士捕之殆盡又出穀以賑飢全活甚衆時上元謝之湘亦勉力為善孫大倫上元人幼失怙恃哭泣如成人父遺資數千金悉歸伯兄口不言貧生平尤多善事馮起龍字雲生句容監生康熙辛亥邑大歉出米千六百斛銀九十六兩作粥賑飢邑令刋名木榜以示風勵蘇州府漢顧翺吳人少失父事母至孝母好食雕菰飯常率子女躬自採擷家近太湖湖中乃生雕菰無復雜草遂得日以為養郡縣奏表其閭顧訓之吳郡人東漢時仕太原太守五世同居聚族至百口嵗時子孫依次行酒三嵗以下並自知坐次所居旁有橋吳人以百口名之又名試飲橋臯伯通字奉卿官議郎吳中大姓梁鴻至吳依居廡下伯通見其夫婦相莊心異之乃舍之於家鴻卒伯通葬之要離墓旁三國顧悌字子通吳人雍族子以孝友聞為偏將軍孫權末年嫡庶不分悌與朱據共陳禍福言辭切直待妻有禮不數見其面其父向厯四縣令每得父書灑掃設几筵展書其上拜跪而讀之父終水漿不入口者五日以不見父喪畫壁作棺像設神座於下對之哭泣服未闋而卒南北朝宋陳遺吳人少為郡吏母好食鐺底飯遺在役恆帶囊剝焦遺母方聚得數斗適遇孫恩亂帶以自隨時逃者多餓死而遺獨藉以活母晝夜啼哭致瞽遺還入户再拜號咽母目豁然即明陸絳字魏卿吳人間子間坐始安王遙光之亂為徐世標所害臨刑絳抱頸求代不獲乃以身蔽刀行刑者并害之兄厥字韓卿少有風概善屬文父被刑厥坐繫尚方尋有赦恨父不及感慟而卒張敷字景印吳人邵子生而母殁年數嵗問母所在便有思慕之色求母遺物散施已盡惟有一畫扇緘録之每感思輒開笥流涕宋武帝召見奇之曰千里駒也官祕書郎纍遷司徒長史父在吳興亡報以疾篤敷往奔省至吳興成服凡十餘日始進水漿葬畢不進鹽菜毁瘠成疾世父湛每止譬之更感慟絶而復續未期而卒孝武時追贈侍中名所居曰孝張里梁陸襄字師卿吳人厥第四弟弱冠遭家禍終身疏食布衣不聽音樂昭明太子聞其業行引與遊處出為揚州從事以父終此官固辭不許聽與府司馬換廨居之母猝患心痛醫方須二升粟漿時冬月日暮求索無所忽有老人詣門貨漿量如方劑將酬直忽失之時以襄孝感所致尋以母憂去職年已五十毁頓過禮太子憂之遣人戒諭大通七年為鄱陽內史時鮮于琮作亂襄率人吏破之生獲琮案其黨枉直無濫時有人無橫死之歌侯景圍臺城憂憤卒景平追封餘干縣侯陳張種字士苖吳人仁恕寡欲識量𢎞博時人為之語曰宋稱敷衍梁則卷充清虛學尚種有其風居母喪年五十哀毁過甚迫以凶荒未獲時葬服制雖畢恆若在喪時稱其孝張昭昭弟乾吳人昭字德明乾字元明並有至性父病消渴嗜鮮魚昭結網捕魚以供膳父卒兄弟並不衣綿不食鹽酢日食一升麥屑粥每感慟必嘔血父服未終母陸又卒兄弟毁瘠骨立家貧未得大葬布衣疏食十有餘年陳衡陽王伯信臨郡舉乾孝亷固辭兄弟因毁成疾昭失明乾中冷苦癖年未五十並終嗣息俱絶隋徐孝穎吳人仕隋為校書郎嘗在園中晝卧見人盜菜徐轉身向內恐盜見之丁母憂三年不內宿終冬不御綿纊形骸骨立每哭哀聲徹於邑里聞者皆隕涕唐陸南金字季孫吳人操履謹飭厯官太子洗馬嘗匿盧崇道按捕當誅弟趙璧出認抵罪兄弟交爭趙璧曰母未葬妹未歸兄能辦之我生無益願請死御史義之上聞並免初南金為鄞令築隄為湖千頃宋治平中立祠湖上之青山張承休吳郡人以南郊齋郎補兖州兵曹丁母憂廬墓三年又舉賢良方正遷揚州司録參軍丁公著字平子吳人三嵗喪母七嵗見鄰媪抱子哀感不食請於父願絶粒歸道父勉飭就學舉明經髙第授祕書郎即辭侍養父亡負土作冢貌力癯惙見者憂其死孝上聞詔賜粟帛旌閭官至太常卿清約守道每遷一官輒憂見顏色四十喪妻終身不畜妾龔景才字敷禮常熟人五世同居麟德初旌表宋李鼇吳人幼孤事母孝天聖中母殁倚杖寢苫廬於墓側早夜悲慟甘露再降於松柏又以母嘗誦金剛經刺血為書刻於墓下郎中楊備表之范純祐字天成參政仲淹子十嵗為文章有聲仲淹守蘇州聘胡瑗為學宫師瑗學規良密生徒多不率教仲淹令純祐入學齒諸生之末盡行其規諸生皆化之仲淹屢將兵關陜純祐與將卒雜處得其才否仲淹任人賴以無失仲淹城馬鋪寨虜侵撓其役純祐率兵直據其地且戰且築數日而成性至孝未嘗違左右不應科第及仲淹以讒罷乃就將作監主簿又為司行監尋解去從仲淹之鄧得疾廢卧十九年而卒曽孫之柔第進士厯禮刑二部尚書封崑山縣開國子奉親事君一以仲淹為法純祐從兄純誠仲淹義田皆純誠辦理因奏為長洲縣尉俾創規條以貽永久陸十七吳江人父病刳心作糜進啖隨愈郡守趙汝厯為建旌孝坊龔明之字熙仲吳人少逮事祖母李李自言嘗夢神告曰與汝七十七及期果病且革明之夜禱於天乞減已五齡以益李夀灼香於頂者七聞腦中有爆烈聲不為動詰旦李病良愈又五年乃卒宣和時貢京師迎父母往已而母與弟相繼亡去鄉數千里貧無以葬明之自一錢之直皆折賣之又乞貸於人竟獲歸二喪晚授髙州文學年逾八十參政錢良臣奏其孝行節誼於朝超授宣教郎賜緋衣銀魚致仕生平不摘人短不作貌言每自謂平日受用惟一誠字撰中吳紀聞三卷子昱字立道有學行安貧樂義鄉人師之張柟字材仲吳人宣和初登第厯官朝散大夫性至孝母卒年九十九柟亦七十矣執喪甚至初得郊恩捨子豫姪族人有喪不能舉者裒而葬之范正平字子夷吳人僕射純仁子學行甚髙紹聖中為開封尉以執法忤蔡京後京當國遂搆遺表之獄正平當就逮弟正思請代曰是時兄方營窀穸參預筆削者正思也正平曰時相意屬我且我居長我不往兄弟將俱不免不若身任之遂就獄捶楚甚至及事白猶羈管象州遇赦得歸初純仁卒特添恩澤官及中外諸孫久之追奪例外官正平遽納其子官全其姪與甥焉正思字子默學行亦為士林所推陳振字震亨崑山人父殁貧無以葬得地圓明村卜者云不利長子振曰使親藏得寧或不利於振二弟尚可主祭遂葬焉後振為紹興進士以祿不逮養刻木為親像一飯必祭弟拱亦登端平科周津崑山人治詞賦端平嘉熙中兩舉待補進士父有疾刲股以療或以義諭之津曰父母遺體豈宜毁傷然因所豫者還以奉之詎為過耶又有曹椿年者母病刲股療之事聞詔補承信郎立孝感坊又淳熙八年有榮孝子亦以刲股救母建旌孝坊其後有張孝子皆同縣人也元陳訓訓弟謙訓字思敬謙字師平吳人訓仕江浙行省照磨為吏廉嘗以乘馬書畫器物鬻錢屬所知營什一自給所知死其妻操錢還訓訓曰生享其利死餒其孤吾不忍也悉以錢與之及歸貧甚謙力苦周旋以奉其兄謙初師林寬龔璛就場屋試兵卒搜簡無狀歎曰待士如此尚何徼幸得失為哉即棄舉子業折節讀書尤善詩賦虞集黃溍張翥皆論薦力辭張士誠兵至吳訓謂謙曰汝無官守宜自為計謙曰兄在吾何所之俄而兵入室脅訓使拜不屈遂刃其胸謙以身蔽翼之並遇害門人范文炯求尸得之水中猶兄弟相挽結趙良字順卿常熟人父必礦為海州節推殁宋季道路多梗良侍母行備經患難卒以柩歸元大德間東土大飢以粟二千石助賑延祐間又助賑四百石都省旌之曹善誠常熟人至順間獻糧萬石助國用建文學書院祀子遊割田二千六百畝給師生廩費黃溍楊剛中有記吳淳字伯善長洲人兄疾伏枕二十年元季吳中被兵人悉奔潰淳獨侍兄不去有操刃入室者乃負兄走避復遇亂兵交刺淳以身蔽兄被三十餘創昏仆於地兄竟兵死淳稍蘇遂入秦餘杭山以終金𢎞業字修可吳縣人居濱太湖羣盜出沒𢎞業結民兵保障鄉社方國珍亂其黨剽掠吳中𢎞業遣孫榮一榮三拒之皆力戰死越月冦又至𢎞業逐之於黃洋灣殺獲無算一境無恙江浙行省上其功授義兵千户陳晉字次翁吳江人元末偽吳竊據父作詩坐謗訕論死晉請以身代之父子爭死有司曰代父者孝存子者慈慈孝之人安肯訕上兩釋之父病死既葬猶朝夕哭一目喪明朱良吉常熟人母病且死良吉沐浴禱天剖胸取心肉一臠煮粥食母母病愈良吉心痛不可起邑人俞某聞而過之觀良吉胸間創裂五寸氣騰出不能言俞為納其心以桑白皮線縫合月餘而愈明瞿嗣興字華卿常熟人母嘗夏月患癰穢不可近嗣興燖湯洗滌跪牀下執扇驅蚊磨穢剔腐晝夜不少休母又嘗患積氣不食刲股作羮進之疾遂愈母思食芰時芰始花求諸市不得嗣興解衣入水忽得三芰人稱孝感所致宋通字文傑長洲人為元萬户侯嘗施家資保障一方洪武初舉賢良方正不赴嘗曰吾家世有隱德不敢望富貴吾子孫得為善人永保詩書之澤足矣吳寬為之贊妻沈氏富民萬三女也預知家難妝奩概辭之時稱奇女子虞宗濟字思訓常熟人洪武時父與兄坐法當死乃詣吏自任曰父兄不知也獄具斬東市顏色不變年二十二宋濓有論贊徐植字原芳常熟諸生父掌鄉賦後期將伏法植引為己罪臨刑賦詩曰父母恩同日月髙試將一死報劬勞邑人王廷圭作孝子傳又同邑張巽洪武間弟當逺戍以弟幼恐貽親憂代弟戌貴州錢迪常熟人洪武初其父沂坐法論死迪年十八詣闕請代詔刑迪赦沂沂出乃易名蘇字更生後徴詣京師應詔撰祭元幼主文上喜欲官之以老辭賜杖歸從子完感嘆迪孝立祠祀之莫轅字巽仲吳江人洪武初父繫詔獄將刑轅年十一願代父死理官誘脅無異詞遂奏釋其父而繫之後獲赦季父侍郎禮有寵於上轅憂之每指同姓一人𨽻洱海衛者曰是吾族也後黨禍一家無免者獨轅嘗以附尺籍免兄嫂以家禍病死有遺孤二皆在襁褓轅為保護甚至家被火逼母寢躍入火中抱持以出鬚眉盡焚年七十七卒私諡貞孝先生戴君用長洲人洪武初父福之因監稅失火法當死君用身代父刑其妻吳氏泣曰吾夫得子道而死吾忍失婦道而生子文禮方襁褓紡績以養守節五十年宣德三年旌表蔣安字仁伯常熟人弟懋洪武中犯法謫戍開平時安為諸生去巾幘詣御史泣曰懋幼弱不任戍且老母所鍾愛請以安往御史許之范廷珍字惟中崑山人洪武中父以事連坐廷珍率其弟廷圭詣官陳請願代父死情詞懇切官為感動得末減兄弟俱戍河間廷珍故善醫遂以醫濟河間之人晚年學益該博喜吟咏字法歐陽年九十餘猶日作數十紙葉盛為紀其事顏琇字季瑮吳縣人洪武初父戍鳳翔母從行留琇守邱壟越六年聞母訃即日奔赴函母骨以歸自陜抵吳踰數千里骨函未嘗著地行則負之寢則懸於屋梁渡則著之心胸父既老免歸奉養愈謹必躬滌圊牏家人止之躬滌如故父故不知也父卒日夜號泣水飲不下咽者五日竟哭死子昌亦有孝行都文信字士誠吳縣人其父思賢與徐右之交善思賢死妻唐有娠日夜悲泣右之日使人存問且慰之曰若生子吾當妻以女已而果生文信右之遂館為壻洪武初右之坐事文信請代行右之曰汝未有子豈可為人死不許既而右之事白得還後復以事被逮文信曰今已有子可行矣右之仍不許文信潛冒右之名以往竟死於獄右之感其義即屏妾侍遂以無子都氏世奉其祀沈伯剛長洲人本孟姓自幼為沈勝五後勝五坐事當誅年且老伯剛願代死勝五不許伯剛固欲代之時年方十七臨刑太祖怪其少問故特赦之又朱昱亦長洲人父當逺戍老不能行而兄先逃去昱年十六請代往有司少之欲追逮其父兄備受笞楚固請代部使者憐之改留蘇衛盛逮字景華吳江人弟以鹽法被捕父憐其少不忍遣逮曰弟未有子願就捕因謫戌寧夏衛吳璋字廷用吳江人幼孤依母陸以居永樂二十一年詔選天下節婦充內役陸以年例當行宣德元年親王出封廣東徙饒州陸皆從行璋棄家奔走二藩間屢求見母不允正統十二年復懇於王憐而許之命入宫見母母病已革璋倣徨刲股作糜以進病少間遂負母出至寓三日而卒扶柩歸葬梅里璋年至八十一以子洪貴受封時同邑梅衡求得父尸於沔陽錢抱璠吮父疽而獲愈俱以孝稱王賓字仲光長洲人博學洽聞於書無所不讀尤精於醫然未嘗與富貴人醫里巷貧人及方外士即往診視與之藥絶不望報貌甚寢藥點其面及肘腋為創髽髮短衣人咸笑之生平不娶未冠父殁終身不冠奉母飯必親煮羮必親調年七十疾革抱母不捨息半晌復蘇呼母連聲始絶葬後魂歸於家曳履拄杖行呼曰娘娘舉室皆驚良久乃滅初郡守姚善賢而造之賓掩門語曰勿驚吾母踰牆逸出善他日却儀從獨候門下始接焉所著有光菴文集梁棟崑山人父為館陶主簿將歸留少子鎬贅於邑人其母嚙臂而别父母卒棟思鎬徒步至館陶已失主家所在後隨處求之垂三十年一日在華亭東禪寺會大雨有僧袒而決渠臂有嚙痕棟見心動就與語即鎬也抱持大哭携歸友愛終身徐季昭吳江人永樂中兄昌伯坐事戍遼東乃請兄留養而以身代行昌伯曰爾年少不更事豈堪逺戍二人互爭久之母竟遣季昭行後十餘年季昭還母尚無恙鄉人扁其堂曰孝義徐真字宗正吳江人靖難兵起避亂與母相失去家訪之立誓曰不得母不生還後數年渡淮得之奉以歸杜瓊字用嘉吳縣人生一月而孤母顧育而教之長從陳繼學為文必本於理詩古雅有風致間寫山水秀潤可觀性至孝痛父早亡從母問其容儀往往形諸夢寐母疾刲股以療有司將上其孝瓊曰此豈得已耶惟念母節未白耳正統四年知府况鍾疏聞被旌宣正間有司薦瓊孝廉辭不就年七十九卒逺近會葬者千餘人私諡曰淵孝五世孫詩字與言嘉靖己酉舉人厯官貴寧道參議定烏撤烏蒙爭地界事王鑑字與修崑山人舉天順壬午鄉試其學邃於尚書謂二帝三王之道在此大書忠孝二字於壁間成化辛未上春官卒遺子漳書曰而祖以千金付我汝仲父二孤尚幼我緘而藏之某柱下書到即付孤去無他囑勉思壁上二大字而已漳得書發柱不開緘而與之時稱其父子雙孝張曉初吳縣人以無子娶良家女見其舉止端凝詢知父為廣文喪不能歸售女以備行李曉初即返之已發矣乃令妻撫之擇壻嫁焉後曉初生子習舉成化進士顧寬字惟仁吳江人性孝友母喪三年不入私室與弟宏俱八十餘嵗不分爨族之貧無依者不能葬者皆必有賑給嘗買地掘得故冡復掩而他擇之曽孫名曽唯嘉靖癸丑進士為名御史朱皓字景南長洲人父殁廬墓三年每哭烏鳥聞聲皆下事聞旌為孝行之門又有陸鍷十嵗喪父哀毁如成人兩遇盜負母出哀呼曰毋令吾母受驚也盜舍之去鄭熙母孀居四十年熙曲順母意至老如孩稚時母愛季弟子婚娶俱先己子吳中英長洲人父客燕死僕竊金逃中英遺腹生未識父長尋父櫬三往不得最後號慟欲絶誓不得父棺不還有德州僧指示之題識宛然奉歸葬焉同邑杜遵家貧傭力養親父母相繼殁手自穿竁負土以葬鄉人繪圖傳之顧淳長洲人年弱冠父患痛風不可忍呼淳與訣欲自裁淳禱於天剪髮際肉投藥以進痛立愈同里顧愛石幼值母病夜半赴神廟哀籲剜右臂肉母愈父病剜左臂肉亦如之鄧汝南長洲人力貧養母妻以語言觸母遣之終身不娶母病刲臂肉既殁肖像事之如生存金孝子失名長洲人居甫里父末疾不能行有所詣即負之家火災倉皇中婦已負翁出孝子不知冒烈焰入焚死孫雲字從龍崑山人父客死雲徒步萬里得父骨於昭平堡函以歸將渡江旋風忽起恍有物奪其所函骨擲之江雲躍入江中行里許攫得之卒抱函歸後登嘉靖己丑進士官員外郎談照字儒溪常熟人增例太學生與弟太學生曉字鏡川三世同居嘉靖三十一年島倭入寇時邑皆土垣知縣王鈇議築城費無所出照慨然倡義捐資四萬餘金親身督率晝夜併力不五月而城工告竣甫三日倭猝至民慿堅城保守邑以無虞邑又連遭水旱照散米賑飢全活無算又自東門至崑山界偹築岸塍十萬餘丈建石橋十八座以便往來撫按題請表揚時曉已卒照念祖父以來三世未分所捐之金與弟共之因推功於弟曉得建專祠隆慶元年照卒撫按又核其事行具題備主入曉祠一體致祭時人為撰祠記任環家卒名氏不傳嘉靖時倭寇薄蘇環以同知奉檄督鄉兵禦之兵市人子遇寇先遁環獨身射寇寇持長刀突至家卒見勢急扶環上馬寇刃及馬尾家卒直前手搏寇連中數刃死環得脫後竟成勦寇功又有鄉農二人方鋤田為寇所獲使導往富家二人故引之官軍處大呼殺倭倭殺之陸懋字邦美崑山人有姊父鍾愛也為倭所獲將被害懋突城而下跪請代姊死以全父志賊感動釋之令懋擔懋睨其姊去逺提擔撲賊賊追之田間被害既死尸不可辨兄愚哭之哀瞑目閃閃動與頸領合得藁葬城西歸鉞字汝威崑山人早喪母父更娶後妻輒杖鉞每炊將熟逐之出户終日不得食比歸又復杖之父死母獨與其子居鉞擯不得見因販鹽市中時私其弟問母起居致甘鮮焉嵗大祲母不能自活鉞往涕泣奉迎母慚終感其誠懇從之鉞既老且死終不言後母事也鉞族子繡字華伯販鹽養母與弟綿緯友愛無間繡妻朱每製衣必三曰二叔無室豈可獨使君被完潔耶後叔妻亡有遺孤撫之如己子歸有光作歸氏二孝子傳林德常熟人父為倭所殺詗知讎所在委身從之屈意善事既親昵乃具酒食誘倭醉卧取其佩刀斷首以歸周伯字懷堂常熟人質直好義嘉靖間倭犯海上令大户築城伯獨任鎮海門一帶寇至伯率家屬拒之獲三甲首辛酉大水輸粟千鍾粥餓者槥溝胔御史旌其門曰忠義沈楠崑山人七嵗喪父力耕奉母母感痰疾楠割左乳火煆為末點沸湯進之數進稍息屬盡乳而蘇知縣劉某旌之以文鄰里贈之以粟楠曰楠須母乳以生今母病刲以還母豈異事哉敢以一乳為名髙也力耕如故每盛暑必以半臂掩之不令人見越十年母病復劇又割右乳進之又愈御史周如斗疏聞被旌錢之選字舜臣常熟人父坐事擊獄選與父更代繫尋隨父戍遼東籍鐵嶺衛為諸生中嘉靖庚戌進士纍官兵部郎中故事官兵部乃得脫軍籍於是上書訟父寃得昭雪封父如其官遂告終養奉父歸里歸有貞字養素崑山人父年六十一而生口授以經輒成誦年十八為人師二十父殁居喪哀毁四舉德行處師席者五十餘年素不禮於長兄長兄死次兄復盡得其腴産有貞知而不言率其庶弟居於宅之西偏族人皆嘆美有光尤亟稱之既而兄姪輩産蕩盡有貞每賑恤之殁為棺殮年九十餘無病而終秦霑字光甫崑山人父為仇陷成大獄霑年十七囚服投牒御史杖而逐之哭詣太守太守憐之為緩其獄後得從末減領嘉靖壬子鄉薦選德化知縣再補寧陵遇疑獄必重持之曰向者父獄起吾仰視堂上人猶虎狼也安知今堂下人不虎狼吾耶張尚友字益之吳縣人精春秋之學吳中治春秋者皆宗之事父純孝父病革刲左臂肉和糜以進人有欲上其事者怒曰是欲我以死父取名乎狀茍上我必死之闕表其墓吳士志字伯髙常熟人年八嵗父母出避倭中道相失士志歸守其廬曰家人終當於此索我父殁痛欲從死其大母及其母強之食乃日進粥一盂淚漬枕席重裀俱爛二母不知其夜哭也踰小祥目失明耳失聰口失音血枯骨立見者悲之冬日曝簷下手其父事狀攬筆欲有所更定舌卷口噤索飲不能咽而卒又有徐明俊者亦以孝死鄉人並稱孝子云沈柱臣字公爾吳縣人受業於王敬臣參究理學事繼母極孝嵗飢貿粟奉母而已與婦食粳粃不令母知授徒入糈悉歸母弟嗜酒善費所需稍緩即橫加意氣亦笑承之惟恐傷母心為縣學生六舉行優以貢授滁州訓導張沖字應和長洲人母疾焚香籲天割左臂一臠置湯藥以進因以愈嘗服賈燕京途聞父病乃倍道行遇盜傷肱盡劫其所賈金然故人所附全未失也故人子來視創甚不敢問金沖曰盜去吾金君家金固在也遂悉還千金人以為難又仗氣負奇有俠客豪士風皇甫汸李攀龍黃姬水徐中行王世貞俱為其志傳張世偉字異度吳江人中萬厯壬子鄉試服習其祖基之家訓七嵗喪母上食號慟孰中兒皆為流涕父殁事其兄如其父急朋友之難甚於己鄉邦有大利病縉紳囁嚅相顧必自世偉發之人有不善相戒曰無使張孝廉知死無以為殮倪推官長墟賻之乃發喪屠嘉賓吳江人少孤祖鞠之及祖病危嘉賓割股和藥以進病遂瘳母以哭夫喪明嘉賓餂其翳久之豁然人謂孝感萬厯中按臣徐旌奬顧順升字與登吳縣人為太學生有文譽父死甫一月母又死家又失火順升負母尸出旋復舁父柩遍體焦爛絶而復蘇強起營葬事服闋仍處丙舍萬厯中仕為兵馬司副屢剖寃獄纍擢楚府長史不赴抵里即廬墓以終其年陳星樞字拱薇常熟人廣州知府國華子萬厯丁酉舉人知湯隂縣思親告歸終養動息不離左右以純孝聞子煌圗崇禎壬子副榜授翰林典籍以親老辭徴不赴人亦稱孝朱陛宣字德升吳縣人舉萬厯壬子鄉試會試寓京師忽心動馳歸母尋卒以父老遂絶意進取少與周順昌同學順昌被逮時陛宣衰絰往送之周旋甚至父終以哀毁卒巡按祁彪佳舉真孝廉請贈諡敕贈翰林院待詔姚希孟私諡曰孝介楊大濚字子澄吳縣人南兵部尚書成子少從王敬臣遊性廉靜見非義色艴然不可犯事親誠孝兄弟四人析産獨取其薄丁巳戊午間嵗飢民死無算收瘞枯骼凡兩年可萬計年逾艾危坐一室誦讀不輟吳人稱端孝先生沙舜臣字子升吳縣諸生事母惟謹與弟舜年舜民稱一門三孝當魏璫矯旨逮周順昌時士民坌集舜臣偕諸生王節劉羽儀王景臯殷獻世楊廷樞文震亨等直前謂巡撫毛一鷺曰人情如此明公獨不為青史計乎曷據實上聞一鷺斥勿譁官旗遽呵叱激衆怒致有羣擊之事後獄具舜臣與王節諸人等並黜繆天秩字原常吳縣人父疾隂刲股以進父竟不起居喪哀毁以創巨遂成瘵疾年僅二十四歲卒後以子國維貴贈參政席允信字順懷常熟人萬厯間築福山城十之一雲和塘十之二解磚解銅挽運漕糧每代鄉民償補缺額明季荒旱載粟數千斛分貯城中半價糶以為賑在其鄉施粥成梁建閘諸便民事無不為舉鄉飲賓朱祖文字完夫吳縣人幼孤母劉勵節撫之弱冠補諸生痛母節未揚終日戚戚周順昌初未識祖文聞而憐之白當道得題旌部牒下祖文始知乃感泣無何順昌忤璫被逮祖文舍家相隨往來津渡出入禁門時遭邏卒幾蹈不測順昌誣賕數千祖文思貸金完之以緩其死都門不足走定興定興不足走吳橋冒暑單騎間關千餘里捃托稍就而順昌已斃獄中祖文以未得收尸有違初心若不可自比於人遂鬱鬱以死彌留之際猶以順昌後人為念李文詠崑山諸生性孝父好飲會天寒盡醉而寢火發文詠驚覺倉皇入父寢僕李安奔出額已爛牽文詠告不可入文詠直入不顧以身護父同死火中明旦視之文詠僅存一股其父以覆故猶具體事聞表其閭曰孝子坊張雲龍崑山人能文章有至性母病割臂和藥以進居母喪哀慟感里閈邑遇災祲能任其役調度周悉惠澤均平有司旌其門曰孝義同里朱應芳割股療父疾又有尤大中以父母病先後割胸股者再有司並旌其門黃守道長洲車塘農人也母病目不治守道舐之匝月而明母又疽發於背毒潰守道跪而吮之呬呵聲暗與補㵼法合疽遂平由是名傳遠邇萬厯間被旌周室琳字韞美崑山人祖御史元暐為里仇所訐逮詔獄室琳連疏伏籲青衫草履日拜長安門而哭行道傷心由是臺省交章論救事得白嘗拾遺金五百雪中停車返諸其人周廷祚字長生吳江人崇禎初入都請其父宗建恤典時郭鞏以宗建之禍實自己發極力彌縫託所知囑廷祚無言當以一第萬金相報廷祚曰父仇即死不避富貴可餌我耶遂疏劾鞏得擬辟時法司以許顯純田爾耕崔應元先世軍功止擬絞廷祚赴法司堂大呌曰此輩慘斃諸忠尚不擬辟豈爾輩猶貪重賄耶法司悚然皆正典刑一時稱快袁扉字雪封長洲人幼孤居祖喪廬墓三年母殁亦如之哭泣兩目幾眚或勸之扉曰與其不及情母寧過情豫惡夫託先王之禮以文涼薄也遺産悉讓諸弟已與婦晨夕不給至摘馬蘭杞菊為食婦亦無怨言婦死不再娶族有五喪未舉者為營葬焉朱夀陽吳縣人祖文子少補諸生曽祖以禦倭功應世襲蘇州衛指揮夀陽讓弟夀增曽祖專祠在京口逆奄變易天下祠院乃毁之夀陽泣訴於縣祠復存郡縣重其義贈官産五十畝不受贈金亦弗受崇禎壬午有司應詔將以五經博士薦夀陽不就卒於家劉曙字公旦長洲人崇禎癸未進士授南昌知縣未任而金陵失守尋死之先是曙以父病割左股痕三寸許至是其僕覔尸視股痕為驗云諸永明字合甫崑山人講性命之學一以劉宗周黃道周為法遊成均時會道周下獄永明身入獄中周旋左右同卧起幾閲月道周貫械對簿皆明扶掖獄解出圜扉名重一時盧士達字德孚長洲人先代於嘉靖倭亂時捐資助軍需旌為義門士達有至性父病癰割股肉療之母失明偕其妻晨夕互舐遂復故居喪慟哭聲徹户外閭巷咸知為盧孝子哭聲好施與家日以落卒如故有橫逆不校子應琦諸生傭書養親孝行如其父有司上其行題表為父子孝行之門吳正一字素風常熟人明季旱蝗催科愈急正一孑身冒死叩閽陳四載奇荒得旨許豆麥搭兑蘇松常鎮湖五府帶兑餘米捐十之四申傳芳字維習吳縣人時行孫內行純潔少遊吳庠承祖蔭補尚寶司丞遭父喪躃踊長號竟以毁卒御史以孝聞奉旨旌門金秋字有秋吳縣人年十四父殁哀毁過禮事母孝養備至友愛兩弟析産取瘠遜肥建宗祠賙里黨行善如不及陳繼儒文震孟為立傳雍正十一年旌表國朝周茂蘭字子佩長洲人順昌子順昌被逮茂蘭日夜徒行至京口始及順昌麾之返曰汝往俱死茂蘭泣别絶而復蘇崇禎初誅逆奄茂蘭刺血上疏請誅倪文煥以報父仇當事者難之茂蘭復刺舌血再書以進又揭逆黨呂純如頌璫原疏文煥純如俱服辜故事贈官不及祖父懷宗嘉蘭孝義特錫三代誥命蓋異數也茂蘭邃於易湯斌撫吳式廬就見請應賓筵為國人矜式固辭年八十二嵗而終劉龍光字夢蕭吳縣人與父母因亂相失道梗不得問光日夜啼泣成疾少間徒行至盱江禱於張令公祠宿廡下夢神有寄居石漈之語驚而寤不知石漈何所也旁皇路隅忽遇一尼謂曰石漈在閩廣之交今方阻兵由徑路往七日可達亟如其言所過皆險絶無人迹最後至白石嶺斗絶萬仞捫嶺而下其地果名石漈竟得母管於村中相持大慟問父所在已殁嵗餘矣匍匐扶母及櫬而歸龍光好古學精爾雅蟲魚之義音切箋釋皆極其旨瞿昌文字夀名常熟人式耜孫年十七念其祖逺阻廣西欲往省恐父母不聽襆被潛行冒矢石陷重圍瀕死乃得達式耜誦退之知汝逺來之句且喜且悲後竟裹骨而返其叔元錥繼往不得達殁於永安顧廷錡字佩堅長洲人父繩詒知蜀之仁夀縣張獻忠破成都不屈死廷錡孑身入蜀陵谷變易無有知瘞骸處者呼號路側閲四寒暑輾轉尋訪始得之扶櫬萬里外陟險履危中間瀕死者數次抵里門鬚髮盡白黃向堅字端木長洲人父孔昭崇禎癸酉舉人為大姚知縣兵阻不得歸向堅憂泣徒步往尋繭足黧面遍厯滇中至白鹽井得遇二親迎還故里人稱完孝顔中和吳縣人義士佩韋從孫也順治初父宏仁為怨家周昌所殺連控於官不得直中和年甫十三痛其父被害日取析薪斧礪之束草為人形書昌姓名其上以試斧逾三年中和懷斧告母曰兒將往復父仇母大駭止之中和竟往值昌市中隂尾之行昌不知也行稍前遽自後揮斧中昌首昌方左右顧又斧之會母趣其兄孟和走視比至昌已死兄弟乃號於衆曰願偕我詣官至縣庭兄弟爭自承衆從旁分别言之始下中和於獄其明年御史録囚釋之顧鼇吳縣人父為仇家金瑞甫刺脅死鼇時僅二嵗稍長詢母得父死狀即淬一刃挾以出入金亦避之至年十八遇金於胥口金見鼇拔刃來刺驚躍入水鼇亦投水連刺傷額不死金挾資誣以盜有司訊得實金伏辜韓馚字誦先長洲人砥行慕義強學不厭嘗以家財推與其兄自甘清苦卒時有詩云一莖苦菜生平志數卷殘書汗漫遊以子菼貴受封熊賜履志其墓稱為篤行君子云菼見文苑傳馮朂字方寅長洲人父館閩中朂與祖及母居嵗荒乏食朂為村孰師得升斗奉養與妻采荇以食後父客死阻兵亂弗獲歸櫬朂徒步入京為諸侯客時徴博學𢎞詞膺薦得第授檢討即請假歸入閩尋父櫬未得伏地慟哭有老人哀之指視其處遂扶以歸蔣德埈字公遜長洲人順治辛丑進士性至孝父病刲股療之康熙乙卯嵗大飢德埈傾家賑濟全活者數千人月給育嬰堂緡錢為乳哺費施絮施棺埋胔掩骼每嵗無算臨卒以腴田百三十畝為義莊以膽族以百二十畝助於育嬰堂里人感其義請之有司建祠春秋祀享兄維城字公表為人醇朴孝友與德埈撫育孤姪不遺餘力兄子感之字叔助以志弗忘厥德德埈置義田諸善事維城與有力焉席啓圗字文輿吳縣人父本貞好施豫啓圖能繼父志廣父所置義冡義田賑凍餒收棄骸助嫁娶施醫藥學宫嵗久傾圯為修葺復舊觀編格言為蓄德録二十卷張文魁長洲人家貧性孝傭工以養遇有肉食則携歸奉親甲申之變奉母避杭遇兵相失追尋二年見母於嚴州王姓家迎歸終養文魁年八十一嵗卒陳鵬年守蘇題額曰至性全真黃農字古處長洲人省曽六世孫居母喪盡哀恐傷父心每夜卧蒙被泣日以尫弱父授經里中離家數里每晨往省風雨無間父憐其疾止之農乃伺門外館僮出問起居乃去日者謂父年五十二適先一年病甚農患其驗也元旦遍禱神廟願減算以益父年忽一夕驚喜曰神許我矣父果愈後農病篤恐貽父纍以膳田易金置枕畔謂妻曰汝善事吾父吾得侍吾母矣父歸含淚執手殁得枕畔金始克殯妻金以苦節聞顧天朗字開一長洲人為官學教習考授知縣以母老不就選積學好義母病侍湯藥成疾及殁一慟而絶時謂孝死有司上聞立祠聖祖南巡賜御書孝靖二字顔之長子汧康熙癸丑進士巡撫河南多善政三子溥為如臯教諭二十餘年士多思之許德璠字荆生常熟人父國賢力行善明末江隂無錫避兵來常邑者國賢計口與之居食時僉大户解白糧往往破産國賢為公正請於當事得題準官運德璠繼其志康熙初叩閽請減蘇松賦額每遭旱潦傾囷賑濟貧不舉子者出資收養邑有育嬰堂自德璠始金拱辰字修來吳縣人以諸生貢入太學奉母盡色養居喪哀毁三年舍外寢杖桐見客泣涕漣洏析産皆取其下者又厚撫兄之子若孫推之五服親懿婚喪靡不周恤疾革檢簏中債劵盡焚之王松齡字御凡常熟人父病卧牀居鄰火起甚迫松齡呌天搏顙須臾風返火滅親終廬墓哀毁盡禮督學張泰交題旌殷鉉常熟人父為仇陷瘐死鉉訴寃於上官數仇人皆就獄且合謀殺鉉以滅口於是鉉亦被囚一日雷起獄中首犯震死咸謂孝感動天督學魏學誠題旌王三錫字承寵吳縣人母病籲天求代母卒事父養志昆弟早亡撫從子三從孫二如己出雇婢及時遣嫁不索直捐腴田百畝倡建普濟堂巡撫藩守給匾旌奬顧啓賢吳縣人父病醫藥弗效啓賢不令家人知露禱於天割臂肉和藥以進父飲之遂愈姊已嫁而夫不事生産家蕩盡啓賢迎養之終身又為嫁其女二人有從姪幼孤貧不能自存啓賢撫育之及長為之授室且豫之資本以逐什一曰吾使之可以畜家口延宗祀也王迪惠崑山人童年喪父便盡哀毁事母竭力雍正元年旌表王浦珍崑山人孺慕性生鄉里咸欽其孝雍正元年祀鄉賢歸聖脈長洲人三嵗遭父喪號泣如成人七嵗就外傅常泣師問故答以不見父為痛事母曲盡孝敬積修脯葬祖父母及父慈烏繞墓著有莪菴集皆白雲思親之意雍正三年旌表沈自顯吳江人九嵗遭寇作隨親避難中途遇寇砍仆地自顯抱父首泣求寇感動捨去父殁廬墓三年雍正三年旌表汪宗灝崑山人父病癰跪吮不倦事母盡孝生事葬祭悉備禮法雍正三年旌表邱存禮長洲人四嵗喪父七嵗讀論語至事父母能竭其力問師得解歸即以不得事父向母大慟母愛鮮菌存禮日行數里外買歸及母殁刻木肖像朝夕奉祀舉喪柩舟由胥江值風作將覆存禮躍入波中扶救風頓息雍正四年旌表金懋皓吳縣人五嵗母殁每念及輒淚下然恐傷父心拂繼母意惟飲泣吞聲明末避土寇山間晝伏夜行遇險峻必負繼母不辭勞父喪聞訃徒步奔歸聞者咸嘆息性慷慨好施親黨待以舉火者不下數百家顧存儒崑山人七嵗喪父劈踴如成人每祭見母哭則亦長號母憐而止之答曰母弗哭乃已既長貧不能葬父適鄰居失火存儒負母出隨偕一傭作舁父棺力不能勝則以身蔽棺向火而哭俄而火滅一日見村婦抱幼子而泣甚哀叩之以夫繫獄將棄子傭身以贖夫罪存儒為傾囊濟之母子得全雍正四年旌表沈萬育字和卿常熟人天性至孝鼎革時負母避兵遇盜捨身衛母盜憐而俱全之母病篤夢神示某醫可愈傾囊延治果愈建橋梁施棺槥以成母志年九十四臨終惟呼父母雍正四年旌孫淑官編修通三禮著周禮翼疏年甫三十三而卒朱之勱長洲人童年事親即知愈色婉容有訓則跪而聽年十一父客秦勱忽寒顫因疑父在外衣單亟製衣寄之後知父果於是日失冬衣家被盜執母以身衛之母得不傷雍正五年旌表朱鳳崑山人以孝友聞睦姻周恤發於至性雍正六年旌表戴兆箕字傳生常熟人與顧鈇顧鎧吳格相友善三人皆貧困兆箕亦止薄田數十畝鈇無子依壻以老格與鎧先殁鎧一子不能娶格惟一女流落為豪家婢兆箕贖歸配鎧子且分以田屋鈇聞其事扶病往謝兆箕視其病將不起謂曰子無憂身後也吾妻死製兩棺者為子地耳未幾鈇殁殮而葬之里黨咸髙其義楊兆隆字凝厚吳縣人秉性剛正然諾不茍服賈京師往來齊魯燕趙間遇人有患難窘急者必加周恤施惠既久道路之人皆呼為楊佛子父殁舉遺産盡讓之弟弟病疽經年醫者曰必服參斤許乃可起時參價騰貴兆隆在京聞之即買一斤寄歸果服之而起自奉儉薄而宗族親黨間皆嵗有常給待以舉火者數十家年老家居晨起必肅衣冠誦金剛經以資父母冥福嚴寒酷暑無間錢聫珍字公玉吳縣人本姓顧幼繼於從母故從錢姓家服賈既稍能自立即迎本生父與繼父母同居兩家尊老優遊聚首垂三十年既而相繼殁附身附棺盡哀盡制各竭其力營葬地使兩塜相望而廬於其間朝夕哀號聞者悽感有子五人治命使長子三子承錢姓而其餘復顧姓以各守宗祀焉雍正七年旌表曹天祿吳江人母雙目瞽日以舌舐之目復明父殁痛絶復蘇廬墓盡禮雍正八年旌表蔡來信吳縣人世居洞庭山幼孤事母孝定省溫凊甘旨滫瀡必曲體親心母年七十餘卒哀毁如不欲生喪葬盡禮祭祀必泣上有三兄長與叔俱早世撫其孤至於成立事次兄極恭順事事欲得其兄之歡心雍正八年旌表徐杲吳江人年十六被盜劫父去泣請身代不獲負父尸歸哭控當事捕得盜伏誅雍正八年旌表張惟馨吳江人年十二父被盜劫冒刃蔽其父盜憐而捨之一日父墜於河惟馨躍入急湍抱之俱出父病侍湯藥終年不解帶及殁哭廬墓側哀動行路雍正八年旌表李漢長洲人十嵗父亡母自經力弱不能解跪捧母足哭聲震户外鄰人排闥解之一日奉母過太湖風作舟覆漢抱母浮沉中流忽一漁船出救母子俱得無恙以母苦節未旌終身抱憾將終猶執子手連呼請旌云程允元字最先常熟人六嵗見母病目呼號不食跪母膝上舐之稱為孝童及長鄰火延及父寢父方疾篤冒死從烈焰中負父出焦爛而卒葛光熹常熟人襁褓中即喪父母鄰媪抱而育於葛長而傭工得一壺一臠必以奉葛氏父母妻失親歡遂棄之葛父殁光熹將賣身買棺鄰里義而助其終事又積傭賃之直葬其先世數棺焉張友誠常熟人早失父母為人刺舟遍求父母棺骸遇一老尼其族姑也為言兩棺朽壞久為墳丁棄骨河干矣友誠哭赴其處躍身入水鄉人援救之得不死乃刻木為兩親像朝夕祭告如生存馬維仁常熟人父患背疽危甚醫曰欲知可治與否必嘗惡以驗維仁嘗之味苦醫曰可療但毒已內蝕必吮之而後出維仁吮出膿數升遂痊明年維仁病瘵臨死戒其妻勿哭恐傷親心也張爾翔字集之常熟人嵗遇荒歉輒行糜施槥嘗遇人鬻妻者周之以金俾得完聚倡建支川長橋以便行人蔣文瀾字葭友吳縣人康熙丁巳舉人厯兵部職方司主事候補按察副使雍正五年偕弟姪文源文涵文滂腹松應鼇等捐資三萬兩助修水利被詔褒嘉即家加光祿寺少卿孫鼎鍾字采章長洲人天性純孝年十五母患脾疾鼎鍾衣不解帶者八閲月危急中禱於天請減己算以益親夀又刲左臂肉和藥進明年母果愈又三年母殁奉父孝養備至父年八十餘疾作氣血俱枯鼎鍾鬻其衣飾房産易參以供又數月卒鼎鍾廬於墓三年雍正十年旌表顧㵢字方水吳縣諸生幼孤家貧力自節縮以供母甘旨居母喪哀毁幾不欲生三年未嘗見齒亦不離几筵撫其弟幼則勸之學長則授之室老而貧也割産以資其養凡親族之嫁娶婚喪有不克集事者隨其疏戚而佽助之卒後張雲章為之傳李針字含奇吳江人康熙辛丑進士入翰林少孤事叔父甚謹周旋羣從篤友誼吳孝廉苑客死都門針酷貧勉力殯之鳩十金謀歸其喪會患瘵而卒病中參苓之費皆自借貸而所鳩十金猶封識牀頭從弟成其志長於詩有鄧尉山房集盛建極長洲人十二而孤居喪哀毁骨立每時祭必流涕母病痢親為嘗藥滌穢曲體母志篤愛二弟周恤姊家至老不衰雍正十一年旌表劉振時昭文人家貧父母無帷帳振時方數嵗為持扇驅蚊終夜不倦父殁哀毁盡禮後以貨殖家隆遂好施豫欲為母祈延年母殁合父喪葬於城東北麓廬墓三年鄉里皆感泣焉雍正十一年旌表徐國搢長洲人呂槤常熟人張士仁新陽人雍正十二年俱以孝行旌表孫豐穀長洲人父仲謙卒慟絶復蘇哀思不已冬月母病思食梅實泣林下三晝夜得之人以為孝感云蘇宗芑常熟諸生課徒養親母張氏疽潰不治籲天求代夢一老人指往興福寺求醫次日果遇老僧畀藥二丸而愈及再往問寺中並無此僧也趙嗣孝常熟人繼伯父世鐸後鐸殁母陳氏欲殉嗣孝哀懇母乃緩死後出帶示之曰我欲以此終為汝孝故得以天年終矣母殁負土築墳廬墓五年李象埰昭文人家貧父病埰甫八齡日鬻菜果得錢以供甘旨冬無完衣族兄象翼勸其就學埰以謀養辭值鄰家火埰負病父出母亦尋出埰不知也復入烈焰中哀號求母者再被火傷卒以上雍正十三年旌表江南通志卷一百五十七欽定四庫全書
