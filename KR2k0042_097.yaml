body:
  text: 江南通志卷九十八武備志驛傳二船政附安慶府同安水驛原設紅槳船十二隻水手三十九名水夫頭六十名後於題明請將等事案內裁減水夫頭三十名雍正十年扣留水夫頭六名今現設紅槳船十二隻水手三十九名工食銀二百八十兩八錢水夫頭二十四名工食銀一百七十二兩八錢扣留雇夫銀四十三兩二錢修船銀一百一十兩廩糧并雇縴夫等銀二百兩帶閏銀一十六兩五錢六分嵗共支銀八百二十三兩三錢六分懷寧縣原設馬六十一匹馬夫六十一名差夫四十名後於題明請將等事案內裁減馬一十六匹馬夫一十六名差夫二十名雍正十年裁減馬夫九名扣留差夫四名今現設馬四十五匹草料銀一千二百九十六兩馬夫三十六名除另給捐置馬田租稻外工食銀三百八十八兩八錢差夫十六名工食銀一百七十二兩八錢扣留雇夫銀四十三兩二錢買馬銀六百七十五兩廩糧銀一百三十五兩帶閏銀六十三兩三錢六分鞍轡等銀一百三十五兩嵗共支銀二千九百九兩一錢六分雍正十二年核減草料等銀嵗共四百四十一兩四錢五分練潭驛原設馬六十一匹馬夫六十一名差夫四十名後於題明請將等事案內裁減馬十六匹馬夫十六名差夫二十名雍正十年裁減馬夫十八名扣留差夫四名今現設馬四十五匹草料銀一千二百九十六兩馬夫二十七名除另給捐置馬田租稻外工食銀二百九十一兩六錢差夫十六名除另給捐置馬田租稻外工食銀一百一十五兩二錢扣留雇夫銀二十八兩八錢買馬銀六百七十五兩廩糧銀一百三十五兩帶閏銀五十七兩七錢二分鞍轡等銀一百三十五兩嵗共支銀二千七百三十四兩三錢二分雍正十二年核減草料等銀嵗共四百四十一兩四錢五分桐城縣呂亭驛原設馬九十六匹馬夫九十六名差夫六十名後於題明請將等事案內裁減馬二十六匹馬夫二十六名差夫三十名雍正十年裁減馬夫二十七名扣留差夫六名今現設馬七十匹草料銀二千一十六兩馬夫四十三名工食銀六百一十九兩二錢差夫二十四名工食銀二百五十九兩二錢扣留雇夫銀六十四兩八錢買馬銀一千五十兩廩糧銀二百一十兩帶閏銀九十八兩六錢四分鞍轡等銀二百一十兩嵗共支銀四千五百二十七兩八錢四分雍正十二年核減草料等銀嵗共六百八十六兩七錢陶沖驛原設馬八十二匹馬夫八十二名差夫六十名後於題明請將等事案內裁减馬二十二匹馬夫二十二名差夫三十名雍正十年裁減馬夫二十三名扣留差夫六名今現設馬六十匹草料銀一千七百二十八兩馬夫三十七名工食銀五百三十二兩八錢差夫二十四名工食銀二百五十九兩二錢扣留雇夫銀六十四兩八錢買馬銀九百兩廪糧銀一百八十兩帶閏銀八十六兩一錢六分鞍轡等銀一百八十兩嵗共支銀三千九百三十兩九錢六分雍正十二年核減草料等銀嵗共五百八十八兩六錢潛山縣青口驛原設馬八十二匹馬夫八十二名差夫七十名後於題明請將等事案內裁減馬二十二匹馬夫二十二名差夫四十名雍正十年裁減馬夫二十三名扣留差夫六名今現設馬六十匹草料銀一千七百二十八兩馬夫三十七名工食銀五百三十二兩八錢差夫二十四名工食銀二百五十九兩二錢扣留雇夫銀六十四兩八錢買馬銀九百兩廩糧銀一百八十兩帶閏銀八十六兩一錢六分鞍轡等銀一百八十兩嵗共支銀三千九百三十兩九錢六分雍正十二年核減草料等銀嵗共五百八十八兩六錢太湖縣小池驛原設馬八十二匹馬夫八十二名差夫七十名後於題明請將等事案內裁減馬二十二匹馬夫二十二名差夫四十名雍正十年裁減馬夫二十三名扣留差夫六名今現設馬六十匹草料銀一千七百二十八兩馬夫二十七名工食銀五百三十二兩八錢差夫二十四名工食銀二百五十九兩二錢扣留雇夫銀六十四兩八錢買馬銀九百兩廩糧銀一百八十兩帶閏銀八十六兩一錢六分鞍轡等銀一百八十兩嵗共支銀三千九百三十兩九錢六分雍正十二年核減草料等銀嵗共五百八十八兩六錢宿松縣楓香驛原設馬八十二匹馬夫八十二名差夫七十名後於題明請將等事案內裁減馬二十二匹馬夫二十二名差夫四十名雍正十年裁減馬夫二十三名扣留差夫六名今現設馬六十匹草料銀一千七百二十八兩馬夫三十七名工食銀五百三十二兩八錢差夫二十四名工食銀二百五十九兩二錢扣留雇夫銀六十四兩八錢買馬銀九百兩廪糧銀一百八十兩帶閏銀八十六兩一錢六分鞍轡等銀一百八十兩嵗共支銀三千九百三十兩九錢六分雍正十二年核減草料等銀嵗共五百八十八兩六錢安撫徐國相請蘇郵困疏為衝驛繁苦已極緩差似宜變通敬請敕部酌議以稍蘇郵困事竊惟臣屬安廬鳳三府之拮据難支實有數倍於往年者臣查自前撫臣靳輔條議減差節費之後驛站錢糧已裁十分之四雖各督撫提鎮等尋常章奏已歸驛遞傳進但安廬鳳三府為江北要衝向止江西廣東差使經由今廣東開復進勦廣西一切章奏俱併江西而來又安親王暨偏沅巡撫出師長沙湖南之差亦併江西袁州而來向之由西路馳驛者今俱併於中路矣其安塘員役之飛遞軍情各處兵主之差官報捷與夫部發兵餉弓箭炮馬等項大差上年至今絡繹如織不可勝數前者原議減差而始裁錢糧今錢糧已裁十分之四而大差繁多反數倍於上年其應付之苦與捉襟露肘之狀有莫可名言者矣今者荷䝉皇上如天之仁洞悉差使繁多驛遞困苦奉差員役橫索騷擾馳斃驛馬屢奉嚴㫖飭禁則凡過往差員如遇有不遵惟是節次押送御功令節外生事者臣自當查明指參馬前往江西長沙廣東等處差員并撥什庫及跟隨人役等應付驛馬動輒數十餘匹查內部發馬每起即有八旗雖間日發一旗勢必擁擠以致前差甫過後差復又踵至絡繹不絶萬分難支臣節據各府縣呈訴困苦情形不禁憂心如焚寢食俱廢臣叨沐皇上殊思簡任巡撫當此軍興孔亟大兵分途進勦需餉甚凡地方有可生財節費者正當竭力籌畫仰㫖差委佐萬一即本年四月間因各省驛站廢弛奉驛時太僕寺正卿今升學士臣溫代挨查臣屬各目覩差繁馬少不足騎乘㑹臣定議不添給錢糧每驛添馬二十匹今各屬紛紛呈報照數買補而驛遞差繁支應不敷臣又何敢復有他議乎惟思各處勦賊係關軍機自當不時飛馳其送餉送炮等項原屬急需差員必須馳驛至於送馬一節則係緩差每日行走不過一站而止即當住歇誠與緊差有間若不稍為變通恐各驛支應不繼將來必至有倒廢之虞矣仰祈皇上俯念驛站困苦已極一應送馬員役非係緊差途草敕部酌議停給勘牌令其自帶長行騾馬止給沿料則驛困稍蘇不致倒站有悮緊差矣臣身在地方深知驛遞萬分艱苦焉敢緘默不言是以特疏皇上睿鑒上請貼黃難盡伏乞全覽敕部酌議施行徽州府歙縣原設馬七匹馬夫四名差夫十名後於題明請將等事案內裁減馬二匹馬夫一名差夫二名今現設馬五匹草料銀一百四十四兩馬夫三名除另給捐置馬田租稻外工食銀二十一兩六錢差夫八名除另給捐置馬田租稻外工食銀五十七兩六錢買馬銀三十七兩五錢帶閏銀七兩四錢四分鞍轡等銀一十五兩嵗共支銀二百八十三兩一錢四分雍正十二年核減草料等銀嵗共四十三兩九錢休寧縣原設馬七匹馬夫四名差夫十名後於題明靖將等事案內裁減馬二匹馬夫一名差夫二名雍正六年裁減馬二匹馬夫一名今現設馬三匹草料銀八十六兩四錢馬夫二名除另給捐置馬田租稻外工食銀一十四兩四錢差夫八名除另給捐置馬田租稻外工食銀五十七兩六錢買馬銀二十二兩五錢帶閏銀五兩二錢八分鞍轡等銀九兩嵗共支銀一百九十五兩一錢八分雍正十二年核減草料等銀嵗共二十六兩三錢四分婺源縣原設馬七匹馬夫四名差夫十名後於題明請將等事案內裁減馬二匹馬夫一名差夫二名雍正六年裁減馬二匹馬夫一名今現設馬三匹草料銀八十六兩四錢馬夫二名除另給捐置馬田租稻外工食銀一十四兩四錢差夫八名除另給捐置馬田租稻外工食銀五十七兩六錢買馬銀二十二兩五錢帶閏銀五兩二錢八分鞍轡等銀九兩嵗共支銀一百九十五兩一錢八分雍正十二年核減草料等銀歲共二十六兩三錢四分祁門縣原設馬七匹馬夫四名差夫十名後於題明請將等事案內裁減馬二匹馬夫一名差夫二名雍正六年裁減馬二匹馬夫一名今現設馬二匹草料銀八十六兩四錢馬夫二名除另給捐置馬田租稻外工食銀一十四兩四錢差夫八名除另給捐置馬田租稻外工食銀五十七兩六錢買馬銀二十二兩五錢帶閏銀五兩二錢八分鞍轡等銀九兩嵗共支銀一百九十五兩一錢八分雍正十二年核減草料等銀嵗共二十六兩三錢四分黟縣原設馬七匹馬夫四名差夫十名後於題明請將等事案內裁減馬二匹馬夫一名差夫二名雍正六年裁減馬二匹馬夫一名今現設馬三匹草料銀八十六兩四錢馬夫二名除另給捐置馬田租稻外工食銀一十四兩四錢差夫八名除另給捐置馬田租稻外工食銀五十七兩六錢買馬銀二十二兩五錢帶閏銀五兩二錢八分鞍轡等銀九兩嵗共支銀一百九十五兩一錢八分雍正十二年核減草料等銀嵗共二十六兩三錢四分績溪縣原設馬七匹馬夫四名差夫十名後於題明請將等事案內裁減馬二匹馬夫一名差夫二名雍正六年裁減馬二匹馬夫一名今現設馬三匹草料銀八十六兩四錢馬夫二名除另給捐置馬田租稻外工食銀一十四兩四錢差夫八名除另給捐置馬田租稻外工食銀五十七兩六錢買馬銀二十二兩五錢帶閏銀五兩二錢八分鞍轡等銀九兩嵗共支銀一百九十五兩一錢八分雍正十二年核減草料等銀嵗共二十六兩三錢四分寧國府宣城縣原設馬三匹馬夫二名後於題明請將等事案內裁減馬一匹馬夫一名今現設馬二匹草料銀五十七兩六錢馬夫一名除另給捐置馬田租稻外工食銀七兩二錢買馬銀一十兩帶閏銀二兩一錢六分鞍轡等銀六兩嵗共支銀八十二兩九錢六分雍正十二年核減草料等銀嵗共一十七兩五錢六分南陵縣原設馬四十匹馬夫三十二名差夫三十名後於題明請將等事案內裁減馬十匹馬夫八名差夫十五名雍正十年裁減馬夫六名扣留差夫三名今現設馬三十匹草料銀八百六十四兩馬夫十八名除另給捐置馬田租稻外工食銀一百二十九兩六錢差夫十二名除另給捐置馬田租稻外工食銀八十六兩四錢扣留雇夫銀二十一兩六錢廪糧銀四十五兩買馬銀四百五十兩帶閏銀三十六兩七錢二分鞍轡等銀九十兩嵗共支銀一千七百二十三兩三錢二分雍正十二年核減草料等銀嵗共二百九十四兩三錢南陵腰站原設馬四十匹馬夫三十二名差夫三十名後於題明請將等事案內裁減馬十匹馬夫八名差夫十五名雍正十年裁減馬夫六名扣留差夫三名今現設馬三十匹草料銀八百六十四兩馬夫十八名除另給捐置馬田租稻外工食銀一百二十九兩六錢差夫十二名除另給捐置馬田租稻外工食銀八十六兩四錢扣留雇夫銀二十一兩六錢廪糧銀四十五兩買馬銀四百五十兩帶閏銀三十六兩七錢二分鞍轡等銀九十兩嵗共支銀一千七百二十三兩三錢二分雍正八年添設驛丞管理雍正十二年核減草料等銀嵗共二百九十四兩三錢涇縣原設馬七匹馬夫四名差夫十名後於題明請將等事案內裁減馬二匹馬夫一名差