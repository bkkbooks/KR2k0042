body:
  text: 江南通志卷一百九十七襍類志禨祥古之聖人不誇神龜鳴鳯而洚水其咨桑林自責其保極錫福之意深矣夫春秋不言事應而時地必有所徵至漢五行家則舉天人相與之際明著於篇尤為深切然考之書王省惟歲卿士惟月師尹惟日則休徵咎徵亦感召各有分際也我聖朝太和在宇宙間民物阜安嘉祥重疊而一方之志乗亦必録舊事而類増之俾司土者得詳覽焉修德修政修救修禳轉移甚微當不使虎渡河蝗出境專美於前矣列庶徵周孝王十三年大雹江凍秦始皇時長水縣有童謡曰城門當有血城陷沒為湖一老媪旦旦往窺門門侍問知其故因塗犬血以紿媪媪見疾走忽水大至淪䧟為谷曰谷水漢惠帝五年大旱江水少谿谷絶太湖涸呂后三年夏江水溢流民千餘家八年江水溢流萬餘家文帝十二年呉都有馬生角角在耳前上嚮右角長三寸左角長二寸景帝三年楚國呂縣有白頸烏與黑烏羣鬬白頸不勝墮泗水死者數千五年江都暴風從西方来壞城十二丈元光三年河徙自頓丘經瓠子通於淮泗元封五年帝往南嶽祭潛霍山上無水廟有四鑊可容四十斛祭時水輙自滿事畢即空每嵗四祭後但一祭一鑊自敗始元三年鳯凰集於東海元康元年鳯凰下彭城山河平二年楚國雨雹大如斧沛郡鐵官冶鐵鐵不下隆隆如雷聲工者驚走聲止地陷數尺鑪中銷鐵散如流星後漢建武二十四年睢水逆流一晝夜永平二年王雒山獲寳鼎元和三年白虎見彭城永元元年淮水變赤成血延光二年丹陽山崩四十七所三年沛國言甘露降豐縣建和元年黄龍見譙永興二年彭城泗水増長逆流朐山崩建安元年江淮饑人相食三國呉黄武二年京口鎮甘露降江東地震江東野蠶成繭大如卵嘉禾六年江東地震白麟見建業有赤烏羣集前殿遂改明年元赤烏元年白虎見二年江東地再震十一年黄龍見於雲陽十三年丹陽句容及故鄣寧國諸山崩太元元年八月大風江海湧溢平地水深八尺吳髙陵松柏皆拔郡城兩門飛落建興元年九月桃李花五鳯二年陽羨離墨山大石自立永安六年石頭城火燒西南百八十丈寳鼎二年丹陽民宣騫母年八十偶浴化為黿諸子閉戸守之掘堂上作大坎實水其中黿入坎遊戲一二日延頸外望伺戸小開躍入逺潭不還建衡三年西苑言鳯凰集遂改明年元天册元年建業城中掘得銀尺長一尺廣三分上刻有年月字晉咸寧元年白雉見安豐太康二年淮南丹陽地震白見彭城元康元年尉氏雨血四年壽春山崩地陷三十丈六年安豐有女化為男呉郡民間聞地有犬聲掘視得犬雌雄各一永寧元年繁昌縣小兒八嵗髮白能卜太安元年丹陽當塗縣夏架湖有大石浮二百步而登岸民驚譟相告曰石来尋石氷入建業永興元年丹陽内史朱達家犬生三子皆無頭永嘉元年呉縣萬祥婢生子鳥頭兩足馬蹄一手無毛黄色大如枕三年江水竭可涉壽春有豕生兩頭六年無錫倐生茱萸四株交枝若連理建興二年毘陵田中得銅鐸五枚四年江寧民墾田得白麒麟璽一紐文曰長壽萬年東晉建武元年晉陵牛生犢兩頭有豕生八足大興元年日夜出於南斗中髙三丈二年吳郡米廩無故自壊丹陽馬生駒兩頭三年白鹿見丹徒永昌元年晝夜電雷震五十餘日咸和元年宣城春穀縣山岸崩獲石鼎重二斤受斛餘四年吳郡㑹稽十一月震電咸康元年揚州諸郡饑地生毛八年甘露降襄安縣廬江民畱珪夜見門内火光掘之得玉鼎圍四寸永和七年七月甲辰夜江濤入石頭死者數百人九年十二月桃李花升平二年晉陵等五郡大水五年天裂有聲興寧元年揚州地震湖溢寧康三年神獸門災太元六年謝安出鎮廣陵始發石頭金鼓無故自破九年陽穀獻白十三年大風揚州晝晦冬濤水入扵石頭毁大桁殺人十四年彭城民家雞三足十五年江表地震十七年地復震六月甲寅江濤水入石頭城大桁漂船舫有死者京口西浦亦濤入殺人元興二年丹徒甘露降義熈四年丹陽淮南地生毛十一年霍山崩獲銅鐘六枚元熙元年亭林地裂數尺中有波濤聲探之火起南北朝宋永初二年白烏見呉郡婁縣元嘉三年三呉大水八年繁昌獻白十八年五月江水溢沒居民害田稼廣陵澗中出石鐘九口甘露降於廣陵白燕産於丹徒二十年歙縣獻白熊二十三年當塗木生連理二十七年甘露降於東海丹徒白燕産於京口二十八年嘉禾生於廣陵孝建元年鳯凰見丹徒憩賢亭二年白見淮南三年流星大如斗尾長十餘丈墮廣陵城西大明二年白鹿見丹陽白雉雌雄各一見海陵三年白鹿見廣陵新市宣城甘露降白龜見宛陵石亭山野蠶生三百餘里四年龍見於彭山五年松木連理泰始二年赭圻獲石柏長三尺二寸廣三尺五寸嘉瓜生南豫州赭圻城南得紫玊一段圍三尺二寸長一尺厚七寸攻為二爵三年白獐見東海丹徒異獸見於彭山羊頭一角龍異四足昇明二年甘露降建康豫州萬嵗澗兩樹隔澗騰枝跨水為一三年白虎見歴陽建元元年朱雀桁華表生枝葉秣陵獲白雀甘露降淮南永明元年丹陽大水四年丹陽獲白免六年石子岡柏木化為石九年南徐民黄慶有園園東廣袤四丈許菜茹採抜隨後更生夜常有白光皎質燭天掘之得王印一文曰長承萬福十年蘭陵氏齊伯生於六合山獲金紐璽一文曰年子主中興二年甘露降茅山瀰漫數里江東旱永元元年建康大風十圍樹及宫舎民居皆偃抜江水入石頭漂殺沿江居民淮水變赤成血天監元年鳯凰集南蘭陵吳郡陽山生白龍四年建康生嘉禾六年吳縣獲四目龜八月建康大水濤上御道七尺七年廬江灊縣獲銅鐘二枚普通元年七月江海並溢六年龍鬬於曲阿大同三年朱雀門災几年地震生毛中大同元年竟天有聲如風雷相擊十年龍墮延陵井中大如驢以戈刺之俄見庭室中有大蛇如數百解船太清元年丹陽民婦生男眼在頂上自是旱疫三年承聖元年淮南有野象數百壞人廬舎太平元年甘露降京口永定元年甘露降鐘山大建十二年丹陽等處大旱十四年江水赤如血貞明二年有羣鼠自蔡州岸入石頭渡淮至青塘兩岸數日死東冶鑄鐵有物赤色大如甕自天墮鎔所有聲如雷鐵飛出墻外燒民居蔣山有衆鳥鼓翼而鳴曰奈何帝開皇十二年繁昌見雲中有物如羝羊黄色鬬墮獲其一數日失所在二十年廣陵地震煬帝十三年大旱自淮及江東絶水無魚江都宮城諸殿臺鴟尾上鐵索為鳥烏啣拔有石自江浮入於揚子津大星墜於江都未及地而南磨拂竹木皆有光飛至吳郡遂墜地江都五日並見唐武德四年濠州老子祠枯樹復生枝葉貞觀二年當塗崔姓有駢竹之異觀察使以聞改宅為寺賜名瑞竹三年譙泗徐濠蘇等處大水八年江淮大水十二年滁濠二州野蠶成繭十三年雲陽石燃方丈晝則如灰夜則有光投草木則焚歴年乃止滁州野蠶成繭十五年冇黑白二龍鬬於虞山東北十九年徐州言騶虞見永徽元年宣歙等處大雨水顯慶元年宣州涇縣山水暴出平地深四丈乾封二年宜興木連理總章元年江淮大旱饑垂拱元年淮南地生毛或白或蒼長者尺餘焚之臭如燎毛廬州産嘉禾巢縣産嘉禾一本五六穗延載二年常州地震大足元年揚楚常潤蘇五州地震開元三年有熊晝入揚州城七年揚州奏一角獸見九年揚州潤州暴風雨發屋拔木十四年潤州大風自東北海濤沒瓜步十九年揚州穭稻生二百一十五頃再熟稻一千八百頃舒州白鹿見二十二年泰州地震西北隱隱有聲拆而復合經時不止壞廬舎殆盡壓死四千餘人二十九年亳州老子祠九井渇復湧天寳七年歙州牛與蛟鬬數日牛出潭水色赤上元二年楚州獻寳玉十三置之日中白氣連天江淮大饑人相食有鼉出於揚州城門上大厯二年甘露降於常州前後二十七度淮南水災建中二年霍山崩貞元三年魚鼈蔽江而下皆無首五月揚州江溢四年淮南地生毛宣州大雨震電有物墜地如豬手足各兩指執紅斑蛇食之頃雲合不見八年淮水溢平地七尺沒泗州城十三年淮水溢於亳州十四年潤州有黒氣如堤自海門山横亘江中與北固山相峙又有白氣如虹自金山出與黒氣交將旦而沒十八年徐州獻嘉瓜白元和元年常州鵲巢於平地三年江南旱七年揚潤等州旱九年淮南宣州等處大水長慶元年海州海水氷南北二百里東望無際二年江淮饑三年宣歙等處旱四年秋太湖決大水太和二年淮南李樹生橘揚州海陵火江水溢沒舒州太湖宿松望江三縣田數百頃六年蘇州地震生白毛徐州大雨壞民居九百餘家七年揚楚舒廬壽滁和宣等州大水害稼八年春榖獻白開成元年揚州民家馬生角二年有大魚長六丈自海入淮至濠州揚州旱運河竭六年淮南饑㑹昌元年江南大水大中六年淮南饑海陵髙郵民於官河中漉得異米號曰聖米十年舒州呉塘堰衆鳥成巢髙一丈濶七尺中有大烏人面綠身紺爪喙呼聲曰甘咸通六年徐州民家雞生角七年江淮大水蕭縣民家豕出圂舞又牡豕多將鄰里羣豕而行復自相噬齧八年吳越有異鳥極大四目三足鳴山林其聲曰羅平泗州下邳雨湯殺鳥雀水沸於火可以傷物乾符四年廬江縣鵲巢平地六年泰州管内四縣生聖米大如芡實中和二年蘇州馬生角三年蘇州空中有聲如轉磨無雲而雨汴水入於淮水鬬壊民船數十艘四年江南大饑人相食臨淮鷹化為鵝光啟元年潤州江水赤數日二年淮南蝗自西来行而不飛浮水縁城入揚州府署竹樹幢節一夕如剪幡幟畫象皆齧去其首撲不能止旬日自相食盡揚州雨魚有大星隕於揚州府署聲如雷光燭地天復二年蘇州大雪平地三尺其氣如煙其味苦三年宣州有鳥如雉而大尾有火光如散星集於㦸門明日大火曹局皆燼惟兵械存南唐昇元六年溧水縣桑樹生木人保大十一年大旱宋建隆初澱湖三姑廟後一山湧出波浪中初與水平久之寖大乾德二年四月廣陵揚子縣潮水害民田五年五星聚奎開寳元年六月大雨水江河汎溢壊民田廬舎六年淮水溢七年淮水暴漲入泗州城壊民居五百餘家太平興國二年舒州麥秀兩岐三年甘露降於壽州官舎五年徐州白溝河溢入州域壊闕隄塘皆壊潁州貢白獐白雉八年徐州清河漲丈七尺溢出隄塞州三面門以禦之雍熙元年鎮星犯斗宿建星二年江水氷淳化三年舒州甘露降至道元年濠州獻瑞穀圖泗州獻瑞麥二年甘露降於平江瑞光禪院咸平二年常州地震徐州禾一莖五穗宣池歙州竹生米如稻甘露降於太平府亳州貢白亳州太清宮鐘自鳴景德四年廬宿泗等州麥自生大中祥符元年泰州海陵等處草中生聖米可濟民饑四年知亳州徐泌獻芝草五年常州芝草生七年泗州水害民田甘露降亳州太清宮太清宮枯樹復生枝天禧元年江淮大風多吹蝗入江海或抱草木僵死和州蝗生卵甘露降廬州通判㕔及后土祠三年潁州石隕出泉飲之愈疾乾興元年蘇秀二州湖田生聖米天聖四年江淮南大水六年七月壬子江寧揚真潤州江水溢壊官民廬舎慶厯八年江寧府火宮室焚毁殆盡惟南唐玉燭殿僅存廬州合肥縣稻再實皇祐三年無為軍土岡産芝三百五十本賜名紫芝山泰州獲白嘉祐元年江溢二年淮水溢七年徐州彭城濠州鍾離地生麪十餘頃民皆取食熙寧四年徐州麥一本百七十二穗六年大旱震澤涸見其下有丘墓街井元豐元年平江大風雨水髙二丈漂沒塘岸吳長洲呉江常熟同崑山漂沒六百餘戸梁縣嘉禾生元祐七年滁州産芝二百餘本紹聖元年淮南軍禾一本九穗三年平江府地震江東大旱溪河竭建中靖國元年江淮旱崇寧五年泰州禾生穭大觀元年甘