如鳯羣鳥千百從之十九年旴眙産瑞麥二十年蒙城麥秀五岐並三岐者數十本二十一年當塗麥秀雙岐二十二年崇明縣正二三月連雨鹽價每斤六分武進縣迎春鄉雌雞化為雄冬太湖氷清河縣人甲夜見有白氣數道如虹而銳從月射出睢寧縣疊雨黄黑丹霜徐州天鼓鳴貴池縣笴竹實如麥二十三年吳縣隂雨腐禾崇明縣一日三潮是日提督劉兆麒戰獲海賊周雲龍鎮江府正月震電雷雨雪夏田䑕結巢於麻黍之上揚州府大水含山縣正月大雷電雨雹宣城縣硤石山蛟發二十餘處汪家圩蛟自平疇起破圩而出池州府水當塗縣大水壊圩岸田禾渰沒儀徵四月隕霜巢縣天鼓鳴二十四年武進縣有妖僧每尾孤行人呼其姓氏應之則魂為所攝而仆於是途人雖至親相喚亦莫敢應人心皇皇後捕得僧抵法睢寧縣霪澇嵗饑民插草鬻子女髙郵州自七月十八日至二十一日大風雨水日長六七寸迤南二十里鋪三十里鋪河隄盡決北門外水深數尺二十七日復大風雨東門外溺死人無算上下河田盡渰寳應縣大水田廬渰沒豐縣七月大風苦雨三日夜不休秫實盡摇落伐屋拔木平地水深尺許晚田漂沒泰州水二十五年吳縣雨黄沙麥枯死秋禾少收安東縣蝗蝻沛縣饑泗州旱蝗秋大水二十六年吳縣大水傷禾吳江縣大水武進縣烈風拔禾發屋北湖水涸安東縣地震當塗縣螟安慶府大雷電風雨拔木飛瓦公廨民舎傾頽無數望江縣大風破樹轉石數雨黑豆二十七年吳縣禾稻生蟲武進縣三冬無雨河井俱涸大饑中河決渰沒清河縣糧田數千頃漂沒人畜不可數計安東縣蝗蝻徐州秋雨無禾二十八年吳縣日生兩環一紅一白日居紅中白在紅之北兩環相連貫吳縣彗星見豐縣雨傷禾睢寧縣夏秋霪雨平地水深二三尺嵗饑二十九年江浦縣大雪積隂五十日吳縣嚴冬大雪河道氷斷人畜樹木凍死無錫縣有妖火或變為人形及猢猻傷人所在秉炬鳴金持梃而譁安東縣黄河氷凍四十日騾馬通行如大道寳應縣旱蝗不為災婺源縣祁寒大木盡槁舒城縣旱災冬嚴寒河氷數尺六安州五月夜風暴起屋瓦皆飛雲際大石坊倒地大樹多拔宿州秋蝗大饑三十年江浦縣大風屋瓦皆墮黄埃四塞武進縣正月朔至人日樹木皆作氷花或云即木介也是嵗飛蝗蔽江而来旋繞江岸不入境㑹大雨斃蝗若丘積嵗有秋婺源縣霪雨漂沒田廬徽州府旱當塗縣民或見如燐者或黒物如犬附地去者四鄉置兵守望數月乃息三十一年儀徵縣元日木氷休寧縣富瑯塔無火自焚其頂錫匣藏血書金剛經自頂墮現宿州蝗三十二年吳江縣大旱泰州水豐縣正月朔氛氣霾日晝為之晦合肥縣麒麟産於三河鎮民家三十三年江浦縣大雨雹傷禾清河縣淮水溢中河黄河亦溢渰田無算髙郵州大水三十四年吳江縣大水一望如平湖武進縣延政鄉四月雨雹大如卵豐縣地震十二月徽州府六邑大雨四十日三十五年七月二十三日吳江縣狂風陡發雨如懸瀑平地水湧驟至數尺夜半反風而南勢更狂猛篝燈宻室無不盡滅屋瓦交飛頽垣覆屋者十家而九所在喬木倒折崇明縣張網港獲海魚頭戴一角遍身鐵色有鱗如穿山甲狀約長四五尺越月海潮泛溢淹死人民漂沒房舎無算上海縣南匯所颶風至排牆飛瓦寳山海嘯渰沒田廬髙郵州七月颶風霪雨水暴至三日内長二丈餘全城在巨浪中南水關報決居民從城頭貫絙而出北城外街市衝斷上下河相連舟子操舟於市渡一人率千錢以巨纜牽舟稍不戒則覆溺徽州府六邑大水浸城不沒者數版三十七年崇明縣蝗宿州麥秀二岐三十八年江都縣邵伯隄決石埭縣學宮古檜結毬大逾斗三十九年武進縣有黒鵰立於北壇如人形展翅廣丈餘睢寧縣有五龍汲水於河四十一年江浦縣有星隕如箕赤光燭天天鼓鳴四十二年豐縣雨雹如卵如棗大者如杵麥禾傷損石埭縣民章丹桂妻沈氏一産三男宿州民徐文江妻王氏一産三男郭梅妻孫氏一産三男四十四年六合縣元正觀靈巖山二處古松結毬大如斗團圞玲瓏經數年不壊髙郵州二月十七日湖内現山巒樹木屋宇如畫二十五日天霽巳刻忽聲響如雷牆壁俱震有白光如圎毬下墜東北方望江縣十二月晦夜茗山鳴如雷四十五年寧國縣大旱豐縣五月雨雹建德縣民陳霈妻一産三男當塗縣産瑞麥一莖雙岐四十六年吳江縣湖蕩池沼之水無故自相衝激波浪洶湧忽髙三四尺踰時復故崇明縣天鳴如鼓異光照地上海縣大旱安東縣元旦人見三日如連環池州府城雨豆五色當塗縣連年麥秀雙岐四十七年江浦縣有虎患寧國縣大疫徐州大稔髙郵州黄霧四塞池州府大水出蛟建德縣民汪璧生妻何氏一産三男四十八年江浦縣大雨雹安東縣星隕如雹百里俱震動墜於西南隣界羅家荒化為石深入地二尺重十三斤儀徵縣羣鼠銜尾横江南渡宿州大饑潁州水四十九年安東縣西北鄉六月雪盖地石埭縣民舒作臣妻胡氏一産三男舒城縣蛟水泛漲平地深數丈五十年安東縣旱蝗寧國縣文脊山鳴聽之如大風又如洪水奔壑六日方止是年麥大熟兩岐八穗六安州大旱飛蝗蔽天霍山縣蛟水暴發五十一年秋江浦縣地冬大震越宿又震儀徵縣地震二十餘次宿州大旱樹頭生火風霾障天白晝如晦五十二年丹陽縣柳茹村産雙岐瑞麥五十三年江浦縣十二月大雷電龍見於江崇明縣十二月雷電大雨儀徵縣大氷徐州麥秀雙岐有四五岐者自是連嵗皆稔五十四年江浦縣大雨雹雷電交作電大如升五十五年蝗發邳州竹林社睢寧縣黄山社與竹林社犬牙相錯而蝗不入境徐州隣縣蝗入州界不食禾皆抱草而死五十六年江浦縣有星如斗自斗東南至西北而隕光黄而赤天鼓鳴踰刻儀徵縣火災甚烈髙郵州正月初四日湖中現城郭樓臺人民廛市厯厯如畫四月十六日昏有火毬如斗下墜懐逺縣彩雲見於中天瀰漫經時未散五十七年江浦縣蝗不為災髙郵州十一月初一日昏紅光如電有聲旋大雷雨安慶府冬雷電舒城縣大雪深丈餘塞戸填門鳯陽府民徐步蟾妻邱氏一産三男五十八年涇縣竹生實民爭採食五十九年安東縣立春二十餘日後黄河復凍比臘月尤甚五月地震泰州生員王晉原家産紫芝一本晉原於雍正元年本省領解六十年沛縣春暮大寒井氷結不可汲六十一年七月崇明縣人見白光迸裂自東至西轟然作聲逾時而滅雍正元年武進縣人於上元夜見天門開有聲如濤後如雷震碧練光明廣如百斛船安東縣麥秀雙岐泰州大稔涇縣民章天安妻衛氏一産三男舒城縣八月飛蝗蔽天落地厚數尺忽一夕出境二年崇明縣髙橋洪漁船獲一介物身似黿人眼鴨足約重二百餘斤放入海噴水數尺作回頭狀嗣有海嘯竒災上海縣南匯所海潮溢沒田廬鹽塲人畜南陵縣民毛起美妻鄧氏一産三男舒城縣蝗蝻遍野溝壑皆平壓樹墜如毬忽一日自去三年崇明縣麥秀雙岐者甚多武進縣産嘉禾安東縣界黄河清是年日月合璧五星聨珠四年桃源邳睢寧清河黄河清八日総河齊蘇勒奉㫖在清邑張家莊堤頭建立碑亭以紀之御製黄河澄清碑文恭紀首卷五年淮安府桃源縣邳州宿遷睢寧徐州黄河清二千餘里二十餘日安東縣九月桃李花開崇明縣楊家河南近海居民遥望海中舸艦迷離倐忽城市樓臺若隱若現六安州西南諸山蛟發水髙數丈六年江隂縣申港鎮蔡元臣妻於氏一産三男冬松江府降甘露七年常州府有紅鴉二隻鳴於府學明倫堂銀杏樹上是科南北闈中式者倍於往時丹陽縣謝家村産雙岐瑞麥江都縣草龍港忽集蝗蝻無數旋皆自投於江含山縣近運鎮有棠栗樹為祟以羊豕祈者無虚日居人至列茶酒肆以沽報賽者邑宰命伐之掘地見蟻數斗妖遂息八年冬蘇州松江地震常州府西郊石佛庵十二月牡丹花開經旬不落九年蘇州府古清真觀呂祖師座下枯木生枝枝至今滋長舒城縣孝子賈右彪墓田出稻較常粒四倍盈尺田内約計升餘收付先農壇種以供粢盛十年七月颶風海嘯崇明屋瓦飛揚崇明上海南匯江隂通州沿海等處潮水衝沒人畜田廬無筭十二年績溪縣民張廷應妻周氏一産三男潛山縣民汪祝三妻孟氏一産三男十三年南陵縣民徐坤妻汪氏一産三男虹縣民尹宗廣妻衡氏一産三男江南通志卷一百九十七欽定四庫全書
