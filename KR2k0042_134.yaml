body:
  text: 欽定四庫全書江南通志卷一百三十五選舉志薦辟取士之法周禮三年獻賢能之書其論出於鄉閭而司徒大樂正司馬參定之漢文帝二年詔執政舉賢良方正能直言極諫者武帝元光元年令郡國舉孝廉自是至隋以前皆以察舉孝秀為常制唐世進士明經最盛而孝廉秀才之科不廢大率周舉於鄉漢至隋舉於郡國唐舉於藩方士悉起家薦辟始為王官至宋放進士及第即豫釋褐從政而薦辟寖少矣科舉之外間行制舉元皇慶二年明洪武六年詔令並一時所行我朝鄉㑹試外聖祖特開博學宏詞科世宗特命府州縣學舉諸生優行又命內外大小臣工各舉所知修潔通敏之士置於周行立政立事復再舉宏博有虞之闢四門成周之宅三宅也漢文黨舒人郡縣薦舉朱邑舒人舉孝廉官北海太守張磐秣陵人舉孝廉嚴助吳人舉賢良官㑹稽太守顧綜吳人舉有道官尚書令陸康吳人舉孝廉再舉茂才官廬江太守媯覽吳人舉孝廉戴員吳人舉孝亷孫權吳人舉孝亷顧廞吳人舉明經髙彪無錫人舉孝廉髙岱無錫人舉孝廉許武陽羡人舉孝廉許晏武弟許普武弟許荆武孫舉孝廉彭修毗陵人州辟從事包咸曲阿人舉孝廉官至大鴻臚劉瑜廣陵人舉賢良方正吳奉廣陵人舉孝廉徐璆廣陵人辟公府徐淑廣陵人舉茂才臧洪廣陵人舉孝廉申章昌楚人以薦為博士陳宣蕭人官諫議大夫劉遼蕭人拜議郎劉矩蕭人舉賢良方正施讐沛人以薦為博士蔡千秋沛人擢諫議大夫給事中陶謙丹陽郡人察孝廉周榮廬江人舉明經官山陽太守周興廬江人舉孝行官尚書令周景興子官大司空周崇廬江人甘陵相周忠廬江人官至太尉周暉廬江人洛陽令方儲歙人洛陽令嚴詡石城人潁川太守周尚舒人丹陽太守陳裒舒人官司空徐憲臨淮人舉孝廉陳萬年符離人官御史大夫陳咸萬年子官冀州刺史薛廣德符離人官御史大夫范遷符離人漁陽太守桓談符離人官議郎張酺細陽人官司徒范滂細陽人舉孝廉徐防銍人舉孝廉封龍鄉侯郭憲汝陰人三國魏陳琳廣陵人軍咨祭酒陳矯廣陵人仕至尚書徐宣廣陵人辟掾屬何楨廬江人光祿大夫吳周瑜廬江人封都鄉侯魯肅舒人周瑜薦陸績吳郡人奏曹掾陳褘吳郡人宿衛郎中陸瑁吳郡人拜議郎韋昭雲陽人官僕射侍中華核武進人周魴陽羡人舉孝廉華融廣陵人太子庶子張紘廣陵人舉茂才吕岱海陵人署録事吕範細陽人吕衡細陽人前將軍晉張闓秣陵人舉茂才薛兼秣陵人舉明經紀瞻秣陵人舉孝廉蔡洪吳人松滋令陸曄吳人開府儀同三司辟為祭酒陸納吳人僕射尚書令陸機吳郡人楊駿辟為祭酒陸雲機弟年十六舉孝廉周玘陽羡人舉秀才封烏程縣侯周札玘弟舉孝廉封漳浦亭侯祖逖毗陵人豫州刺史徐邈毗陵人驍騎將軍徐廣毗陵郡人封樂成侯檀憑之毗陵郡人何無忌丹徒人舉太學博士劉穆之丹徒人舉為左僕射臧燾丹徒人尚書郎陳邵襄賁人以儒學為內史劉頌江都人辟府掾華談江都人舉秀才戴淵江都人舉孝廉戴邈江都人淵弟舉秀才韓績江都人辟司徒掾髙悝江都人辟書佐髙嵩江都人辟秀才劉粹蕭人辟從事劉毅沛人封南平郡公何龕廬江人官後將軍何阜廬江人淮南內史何惲廬江人豫州刺史何睿廬江人安豐太守何充廬江人中書兼録尚書事何惔廬江人南康太守何澄廬江人左僕射録尚書事何叔度廬江人尚書何融廬江人大司空杜潛廬江人右衛將軍杜晏廬江人蒼梧太守韓文舒縣人舉賢良官廣武將軍杜夷舒縣人舉孝亷官國子祭酒何琦舒縣人察孝廉楊奮舒縣人侍中劉惔符離人雲陽尹杜援皖人髙平相南北朝宋劉璡建康人舉茂才張緒吳人國子祭酒顧憲之吳人舉秀才豫章太守邱巨源曲阿人舉孝廉官太守劉簡之彭城人官參軍劉延孫彭城人官侍中何卲之晉熙人員外散騎常侍何楷晉熙人侍中何友晉熙人驃騎咨議參軍何子先晉熙人建安太守何子平晉熙人海虞令何尚之晉熙人左僕射録尚書事何愈之晉熙人新安太守何偃晉熙人吏部尚書劉瓛符離人祕書郎齊陸厥吳人舉秀才張率吳人舉秀才陸倕吳郡人舉秀才周捨丹陽郡人舉秀才伏挺丹陽郡人舉秀才蕭景先東海人永寧令臧嚴東海人録事參軍髙爽廣陵人舉孝廉何歆晉熙人何鑠晉熙人宜都太守何佟之晉熙人尚書左丞何戢晉熙人吏部尚書何昌寓晉熙人吏部尚書梁劉協蘭陵人官通事舍人蕭琛蘭陵人光祿大夫蕭視素蘭陵人丹陽尹蕭介蘭陵人官尚書蕭洽蘭陵人臨海太守江革蘭陵人㑹稽郡丞徐勉蘭陵人吏部尚書臧盾蘭陵人吳郡太守張松丹陽郡人舉茂才王規丹陽郡人舉茂才陸雲公吳人舉秀才黃門侍郎顧協吳人舉秀才散騎常侍何敬容晉熙人左僕射録尚書事何尊晉熙人大中大夫何炯嶽安人侍御史陳蕭允東海人太子洗馬蕭乾東海人舉明經官黃門侍郎陸琰吳人舉秀才散騎常侍陸玠吳人舉秀才官中書舍人陸琛吳人舉秀才官中書舍人陸瑜吳人舉秀才官太子洗馬杜僧明髙郵人封侯爵何之元晉熙人咨議參軍唐歸登吳人舉賢良纍官至尚書丁公著吳人舉明經官太常卿朱佐日吳人舉制科陸璪吳人舉明經封平恩縣男朱承慶吳人舉秀才陸元朗吳人舉明經封吳縣男陸元芳吳人舉八科侍郎同平章事陸象先元芳子舉制科官吏部尚書陸質吳人舉明經陸贄吳人舉拔萃張從師吳人舉秀才官法曹參軍歸崇敬吳人舉明經陸餘慶吳人舉制科封廣平郡公陳潤吳人舉明經張澤吳人舉制科陸亘吳人舉制科顧師閔吳人舉拔萃同州參軍楊發吳人舉拔萃孫發吳人舉百篇張承休崑山人舉賢良顧謙華亭人舉明經庾準武進人舉孝廉蔣儼義興人刺史蕭德言潤州人封武陽侯戴叔倫潤州人經略使孫處元潤州人