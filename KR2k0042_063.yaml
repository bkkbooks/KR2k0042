body:
  text: 江南通志卷六十四河渠志水利治績二松常鎮三府松江府周敬王二十五年吳行人伍員鑿河自長泖接界涇而東盡納惠髙彭巷處士􅅹瀆諸水後人名曰胥浦唐開元元年築捍海塘起杭州鹽官抵吳淞江長一百三十里宋寳元元年兩浙轉運副使葉清臣開松江盤龍匯按續吳郡圖經盤龍匯介華亭崑山之間步其徑纔十里而迴泬迂緩乃四十里江流為之阻遏盛夏大雨則汎溢淪稼穡壊室廬殆無寧嵗乾興間屢經疏決未得其要范仲淹守平江嘗經度之未遑興作至是清臣轉漕本路以太湖民田為豪右據上游而水不得洩建議釃為新渠從滬瀆入海道直流速其患遂弭慶厯元年知華亭縣錢貽範開顧㑹浦附章峴記畧浦直縣西北六十里趨青龍鎮南通漕渠下達松江舟艎去來實為衝要自簳山之陽地形中阜積淤漸與岸等埀三十年至是乃籍新江海隅北亭集賢四郷之民得役夫三千五百五十人府教以尉孫君專督其役興三月辛酉訖四月己丑始於邑郛終於江澨增深四尺槩廣八丈無慮役工十萬二千九百五十畚土平道者不與焉嘉祐三年轉運使沈立開顧浦六年轉運使李復圭知崑山縣韓正彦開松江之白鶴匯如盤龍之法崇寧中郟亶又浚治之皆為民利紹聖中開大盈顧㑹二浦浚柘湖新涇下金山小官浦悉入於海崇寧二年提舉浙西常平徐確考禹貢三江之説以為太湖東注於海松江正在下流向來潮泥湮塞水溢為患請自封家渡古江開淘至大通浦直徹海口七十四里以常平錢米十八萬三千餘充調夫之費因令饑民就食確躬操畚鍤以先之水道遂通大觀元年九月從中書舍人許光凝請命本路監司檢按松江故道同發運使屬官疏導積水入海三年開吳淞江置牐宣和元年兩浙提舉常平趙霖濬白鶴匯圍裹華亭泖為田紹興四年鹽官丞王玨開華亭近海河二百餘里通漕溉田民享其利十五年通判曹泳重開顧㑹浦附楊炬記畧紹興甲子夏大水吳門以東沃壤之區悉為巨浸部使者飭郡邑詢求故道導源決壅以洩水勢於是監州曹公厯覽川原考視髙下訪於父老得顧㑹浦自縣之北門至青龍鎮浦凡六十里南接漕渠而下屬於松江按上流得故牐基僅存敗木是為旱澇潮水蓄洩之限復得慶厯二年修河記於縣圃而知兹河廢興之嵗月與夫淺深廣狹之制役徒錢榖之數判然察其惠利之實有在於此矣蓋厯百有六年河久不濬而淪塞淤澱行為平陸遂以狀請於朝籍縣之新江海隅北亭集賢四郷食利之民以疏治之官給錢糧而董以縣令簿尉興工自十月二十有六日役三月而河成起青龍浦及於北門分為十部因形勢上下為級十等北門之外増深三尺而下至鎮浦極於一丈而横廣五丈有奇底通三尺據上流築兩狹隄因舊基為牐而新之復於河之東闢治行道建石梁四十六通諸小涇以分東郷之渟浸不浹旬水落土墳由是簳山東西民田數千頃皆為膏腴役工二十萬用糧以石計七千二百為錢以緡計二萬五千三十年知華亭縣劉俁修秦山鹽鐵蚌港三堰乾道二年轉運副使姜詵開通波大港港即顧㑹浦置張涇堰牐附許克昌浚河置牐碑甲申秋八月淫雨害稼明年大饑上臨朝咨嗟分遣使者結轍於道發廩賦粟以活餓者㑹有言蘇秀勢最下華亭尤近海十八港皆有堰捍潮可一切決之四湖所瀦水宜為斗門以便節減上覽而異之亟命兩浙轉運副使姜詵與令丞行視其宜姜侯既受旨諏訪故老周覽川野盡得其便利以聞曰東南瀕海之地視諸港反髙雖有神禹不能導水使上也今宜浚通波大港以為建瓴之勢又即張涇堰傍增庳為髙築月河置牐其上謹視水旱以時啓閉則西北積水順流以達於江東南鹹潮自無從入也上稱善即丐以常平之帑贍其役且與守臣鄭聞㑹其事制許焉則相與庀徒揆日賦材計功既具以授之縣令侍其銓銓威以柅姦説以使人檢程視作勿容茍簡乃浚河自簳山達青龍江口二十有七里其深可以負千斛之舟因其土治髙岸護青墩傍今有青墩港故水所敗田數萬畝還為膏腴為牐於邑東西四十有八里増故土七尺甃巨石兩趾相距常有四尺深十有八板板尺有一寸月河之長三千三百五十有五廣常有六尺凡浚河之工萬有一千二百金工石工木工畚鍤之工伐取運致之工總其數槩七倍於浚河糜錢緡九千三百五十四粟石二千三百有九十凡五十有五日而畢蓋斂未嘗及民而民亦若不知有是役也七年知秀州丘崈修華亭瀕海十八堰遂移新涇堰於運港九年置監堰官於亭林松江府志華亭東南並海自柘湖湮塞置堰一十八所以禦鹹潮宋政和中提舉常平官興修水利欲涸亭林湖為田盡決隄堰以洩湖水華亭地勢東南益髙西北益卑大抵自三泖五浦下注於江以入海雖決諸堰湖水不可泄鹹水竟入為害於是東南四郷為斥鹵之地民流徙他郡中間州縣官懼其害復故隄堰獨留新涇塘以通鹽運海潮晨夕衝突塘口至闊三十餘丈鹹水延入蘇湖境上是嵗八月邑人右正言許克昌力言於朝時崈以太博除知秀州奉命行視與令堵觀議以新涇塘湖勢湍急運港距新涇二十里水勢稍緩於是募四縣夫移堰於運港倂築堰外諸港及運港之兩岸東岸自堰至徐浦塘二十四里十七丈西岸自堰至柘湖二十三里上闊六尺下闊一丈五尺髙六尺明年正月遣御史蕭之敏按視還奏詔增崈秩復租九年招復流民又明年正月遣中使宣諭守臣張元成増築二月特設監堰官一員土軍五十人置司顧亭林以防鹽運私發諸堰後堰外隨潮沙漲牢不可壊二州之田得免鹹潮浸灌之患十三年修華亭縣新涇塘牐増置招賢港徐浦塘二牐十五年命浙西提舉常平司開濬華亭縣三十六浦淳熙二年立庸田司於平江撩漉吳淞江沙泥浚各牐舊河渠瀆及松江之張涇通波南北俞塘鹽鐵官紹盤龍蒲匯六磊石浦等塘十三年羅㸃提舉浙西常平以澱山湖洩諸水道戚里豪强占以為田故水壅不洩民田病之奏乞開濬有旨命㸃躬親相視開掘農民聞命懽躍不待告諭各裹糧合夫先行掘鑿於是並湖巨浸復為良田元至元初中書省准浙江行省咨任仁發言吳淞江淤塞奏立都水監仍於中江中書以聞特命行省平章徹爾提舉修浚一切便宜經畫以松江故道湮塞西自上海縣界東抵嘉定石橋洪迤邐入海袤三十有八里附任仁發水利議答議者曰吳淞江前時深通今日何為而塞豈非如海變桑田之説非人力所可為者歟答曰東坡有言若要吳淞江不塞吳江一縣之民可盡徙他處庶上源寛闊清水力盛泥沙自不能積何至有湮塞之患哉歸附後將太湖東岸出水去處或釘柵或作堰或築狹處為橋又有湖泖港汊又慮私鹽船往來多行塞斷所以清水日弱渾潮日盛泥沙日積而吳淞江日就淤塞正與東坡所見合若云如海變桑田一付之天則聖人手足胼胝盡力溝洫皆虚言也聖人豈欺我哉所當盡人力而可為也議者曰錢氏有國百餘年止長興間一次水災宋南渡百五十餘年止景定間一二次水災今或一二年三四年水災頻仍其故何也答曰錢氏有國宋南渡全籍蘇湖常秀四郡所産以為國計常時盡心經理高田低田各有制水之法其間水利當興水害當除合役軍民不問繁難合用錢糧不吝浩大必然為之又使名卿重臣專董其事豪户勢家簧言不能亂其耳珍貨不能動其心又復七里為一縱浦十里為一横塘田連阡陌位址相接悉為膏腴之産以故二三百年之間水災罕見國朝四海一綂又居位者未知風土所宜視浙西水利與諸處無異任地之髙下時之水旱所以一二年間水患頻仍也議者曰蘇州地勢低下與江水平故曰平江故稱澤國其地不可作田今欲築圍亦逆土之性耳答曰晉宋以降倉廩所積悉仰給於浙西之水田故曰蘇湖熟天下足若謂地勢低下不可作田此誠無稽之論何以言也浙西之地低於天下而蘇湖又低於浙西澱山湖又低於蘇湖彼中富户數千家每嵗種植菱蘆編釘樁篠圍築硬岸豈非逆土之性何為今日盡成膏壤此明效大騐不可掩也既是澱山最低之處尚可經理為田豈已成之田反不可作田耶議者曰水旱天時非人力所可勝自來討究浙西治水之法終無寸成答曰浙西水利明白易曉何謂無成大抵治之之法有三浚河港必深闊築圍岸必髙厚置閘竇必多廣設遇水旱亦不能為害昔范文正公請開水浦議者沮之公力排浮議疏浚積潦數年大稔民受其賜載之方䇿昭然可考謂之無成可乎議者曰河渠圍岸閘竇三者俱備則水早可無民食可足誠為久逺之計朝廷胡為而廢之答曰國家收附江南三十餘年浙西河港圍岸牐竇無官整治漸致廢壊今若募夫供役必取辦於富户部夫督役必責成於有司二者皆非其所樂是以猾吏豪民構扇必沮之而後已朝廷未見日後之利但厭目前之擾所以成事則難壊事則易東坡亦云官吏憚其經營百姓畏其出力所以累行而中輟不能成久逺之利也議者曰行都水監既是有益衙門何衆口一詞皆謂無益而朝議罷之答曰民可使由之不可使知之事之利害久而始明彼小民無知但見工役之繁豪民肆奸又吝供輸之費所以百般阻撓但謂無益以敗乃事殊不知浙西有數等之水拯治方畧皆不相同非立專司豈能成功使水監衙門真為無益古之有國者亦廢而不置久矣何為周漢唐宋之世經營水利列之史傳代有其人且若浙西低下之地不須水監即今中原髙阜之處安用水監河道司為哉髙阜之處水監既不可缺而低下之處乃謂不必置何不智之甚也數年之後河港淺塞水害滋甚有憂民忠國者出必復興修水利之事彼横議者豈得終沮之哉議者曰水利固不可不修然今隴西漢唐二渠止責於有司修浚民更不擾浙西水利何不亦責之有司答曰隴西二渠長流水也濬成深渠水自下流治之無難浙西水性不一整治方法亦殊豈可以漢唐二渠例視之哉又平江等路水利狀太湖納湖州宣州諸溪之水而南北東江海之岸皆髙水積其中勢若盤孟設遇雨澇則環湖低田悉皆湮没若欲導洩積水在乎時時㸃檢太湖東北兩岸通江河之道不致淤塞可也蓋環湖低田利在洩潦兼沿江傍海髙田亦仗湖流奔注衝散潮沙使江河通利乃可引潮灌溉諸小湖在太湖迤東及北者甚多皆能接洩太湖注江達海數内澱山湖自大盈趙屯等浦以出吳淞江與渾潮相接最近若上源所注不急則潮沙注湖漸成淤澱富家因淤澱圍裹成田由是湖水與諸浦漸逺而所洩益微若非就湖内圍田多開河渠及時修濬諸浦則此湖之塞恐不止於是也又接吳江石塘障遏東流之勢致潮沙日漲半為平地此乃太湖洩水下吳淞江第一要處古來於隄間多置木橋與鑿水洞上則通行下則洩水蓋欲仗其急流衝滌潮泥免致水患人不知此或便於行路則塞壩湖口或惰於巡防則密置樁橛矧以茭蘆魚籪等物障遏必得官司於此處榜示告戒使之咸知利害可也二十八年詔開澱山湖命江淮行省燕仲南同左司郎中都哩黙色督浚治附潘應武決放湖水議浙西地勢極低米糧豐厚自福山而下有二百八十餘里沙岡身以限滄溟岡身之間有港浦一百五十餘處太湖三萬六千頃受納三江之水溢流而下一路徑下吳淞江二百六十餘里抵海又一路自急流港五十里下澱山湖由港浦而入海古人開江浦漊涇􅅹之𩔖無非為去水計使民居無昏墊而土可耕種居民常常修築圍塍官府常常修浚水路澇則車水出田旱則車水入田公私之利豈不溥哉若公私之力少有不及則民居蕩析而厚利以失錢王時置撩淺軍四部七八千人專事導河築隄宋初廢弛故常有水患至仁宗朝范文正公親厯海濱開浚五浦費米錢一十八萬餘貫石自後置豐田水利使者專管湖塘河渠趙運使任内用錢米四十餘萬至理宗朝創立魏江江灣福山水軍數千人專修江河湖塘僅免水患歸附後軍散營廢湖港堙塞其澱山湖中有山寺宋時在水中心東有出水港曰斜􅅹口曰汊港口曰小漕港曰大􅅹口曰小􅅹口各闊十餘丈通潮水往來潮退即引湖水下大漕大盈等浦入青龍盤龍江而出海古人謂之尾閭門宋法禁人占湖為田為洩水路故也今山寺在田中雖有港漊悉皆淺狹潮水湖水不相往來攔住去水東南風水囘太湖則長興宜興歸安烏程徳清等處汎濫西北風水下澱山湖泖則崑山常熟吳江松江等處汎濫皆因下流不決積水往來為害去夏大水澱山湖太湖四畔良田至今不可耕種昨隨營田司官親曽相視水勢與髙年老農知識地理人講究得澱山湖東大小漕港斜􅅹等處故是洩水尾閭今為權勢占據卒難復舊澱山湖北有道褐浦石浦千墩浦小􅅹口四處取江頗近水勢順便今若先於此四處開浚決放水路以救百姓以保公私實為居安慮危經理根本之計候水減退然後次第開浚諸處河港此古人所謂下流既通上流可導也大徳二年春二月中書省奏立浙西都水庸田使三品衙門於平江路設置耑一修築圍岸疏濬河道務要田農得濟水道流通圍岸堅固為一事浙西澱山等湖已有定立官湖界諸人不得似前侵占復為民害違者庸田司就便追斷又浙西海水晝夜兩潮隨帶沙泥入港漸成壅遏宋時另設撩清軍人耑一撩洗今仰庸田司於二八月内依時督責如法疏濬無致壅遏與民為害據濬治河道修理隄岸閘壩合用人工如何措置可以常久通行行省便為從長議擬又浙西官田數多俱係貧難佃户春首缺食又自行修理官司不為存恤深為未便今後管民官不得將此等佃户差充里正主首一切等役又澱山練湖諸人占湖為田嵗納租糧官司另行收貯若有合行修濬人工物料從庸田司募工支用八年浙省平章政事揚珠吉達徹爾濬決吳淞江至治三年詔開吳淞江澱山湖及諸河渠泰定元年行省左丞多爾濟巴勒知水利前都水少監任仁發濬治澱山湖二年多爾濟巴勒任仁發濬吳淞舊江大盈浦烏泥涇三年任仁發置趙浦潘家浜烏泥涇三牐至順二年江浙行省濬烏泥涇至正元年修濬吳淞江治渠堰三年四月都水庸田使司修華亭捍海塘明永樂二年浚黄浦由范家浜入海十年濬上海盤龍江正綂八年修浚金山衛獨樹營至劉家港口邊海諸河景泰二年知府葉冕修澱山湖隄湖北界崑山各較彼此工莫克就冕一視之督府民修築萬餘丈二邑賴之天順二年巡撫崔恭督工挑浚上海縣自白鶴江至卞家渡四千六十七丈濬蒲匯塘及新涇四千丈鑿曹家溝南抵新塲二萬丈廣皆十四丈深皆二丈浚六磊塘鶯脰湖烏泥涇沙竹岡諸水通流入浦民感其惠因呼曹家溝為都臺浦成化八年濬吳淞江𢎞治元年帶理水利僉事伍性濬吳淞江中段四十餘里及顧會趙屯都臺諸浦蒲匯楊林新涇諸塘七年水利侍郎徐貫開吳淞江并大石趙屯等浦洩澱山湖水以達於海十二年提督水利工部郎中傅潮濬崧子浦檄通判原應宿董役嘉靖元年工部郎中顏如環濬吳淞江二年工部郎中林文沛督率華亭縣開南橋塘金匯塘官路港站船浜北蟠龍塘南嵩塘官莊涇青村港黄泥漕尹山涇米市塘共長一萬九千四百九十五丈上海縣開舊江走馬塘周浦塘站船浜鹽海塘六磊塘共長一萬六千五百五十丈以瀉當湖三泖澱山湖諸水使各通黄浦吳淞江以入海附林文沛請修水利疏畧浙西天目諸山西來之水皆歸太湖再流入於陽城昆承澱山三泖等湖其性本皆欲東故神禹相地分流疏其東北入海者為婁江東南流者為東江并淞江為三江以分洩之自是不聞有水患後世近江淤泥之地悉成土田而東江之故道塞矣由是欲使東江之水迤邐北旋㑹入淞江而趨下之性遲矣故後人於常熟縣北開二十四浦疏而導之揚子江又於崑山縣東開一十二浦分而納之海所以補東江不通之力也又慮潮沙易淤各於浦口置立板牐潮來則扄之以禦泥沙嵗旱亦扄之以備灌溉又於牐外或設開江之卒或設撩淺之夫皆所以決壅塞而防汎溢也永樂間尚書夏原吉區畫經度如開劉家白茆二港甚合古人之法𢎞治七年工部侍郎徐貫奉命斷理其事有通判姚文灝輔之一時疏浚之法亦有次第舊制扳牐夫卒之設圍岸之築皆未全備是以諸浦之壅塞如故近年雖有帶管僉事官既不專名亦虚設以至水利日廢乞命廷臣計議勑命專理及今秋收之後訪前代疏浚之規為來年水患之備或計各府錢糧空乏容其借取課鈔支用開諸浦以洩諸湖之水復板牐以嚴啓閉之規立夫卒以繼疏濬之功築圍岸以防横流之勢雖曰費用浩大然計被災免徴之費孰為多寡從可知矣四年冬命水利僉事蔡乾浚松江上海張家浜陳村塘馬家浜舊江青龍江二十四年巡按御史呂光洵濬艾祈通波以溉青浦隆慶三年巡撫海瑞開吳淞江附海瑞疏禹貢稱三江既入震澤底定三吳水利當濬之使入於海從古而然也婁江東江係入海小道惟吳淞江盡洩太湖之水由黄浦入海年來水道臣曠職不修以致潮泥日積通道填淤雖曰水勢就下而無下可就矣時久潦震蕩太湖因之奔湧四溢渰浥禾畝如嘉靖四十年今隆慶三年是也而小為渰没漂浥之患亦時有之是吳淞江一水國計所需民生攸賴修之舉之不可一日緩也臣於舊嵗十二月巡厯上海縣親行相視按行故道量得淤塞當濬地長該一萬四千三百三十七丈二尺原江面闊三十丈今議開十五丈計該用工銀七萬六千一百二兩二錢九分今以水荒缺收飢民動以千百告求賑濟臣已計將節年導河夫銀臣本衙門贓罰銀兩各倉儲米穀幷溧陽縣郷官太僕寺少卿史際義出賑濟榖二萬石率此告濟飢民按工給與銀穀於今正月初三日興工挑濬委松江府同知黄成樂督率上海縣知縣張嵿嘉定縣知縣邵一本分理興工之中兼行賑濟千萬飢民稍安戢矣但工程浩大銀兩不敷饑饉頻仍變故叵測官儲民積計至二月間盡矣江南四面皆荒湖廣江西有收成府縣又執行閉糴無從取米伏望皇上軫念民飢當恤吳淞江水道國計所關勑下該部酌議量留蘇松常三府漕糧二十萬石准照前旨銀數改折凡應天等十四府州縣庫貯不拘各院道諸臣項下無礙贓罰銀兩聽臣調用浙江杭嘉湖三府與蘇松常三府共此太湖之水吳淞江開則六府均䝉其利塞則六府同受其害其庫藏銀亦如應天等處一例取用彼處居民亦聴上工就食吳淞借飢民之力而故道可通民借銀米之需而荒歉有濟一舉兩利地方幸甚萬厯六年御史林應訓督知府閻邦寧浚大川六支流四十七港浜之小者九十有一求圩岸之故迹盡修築之踰年乃成作水利圩圖十年松江通判劉師召開濬奉賢黄泥白龍百曲新港白蓮三林走馬虬江等河修築澱泖黄浦等處隄岸十六年水利副使許應逵濬吳淞江二十八年知府許維新開浚府城市河松江府志松郡近海潮汐往來泥沙易淤而城市尤甚兼以居民侵占河道日隘間有疏治旋即壅塞維新鋭意興復特委上海縣典史龎尚鴻經理其役凡勢家占造水橋河房悉皆撤去東西兩關直河南北岸拓復故迹一丈有奇初衆議難之尚鴻不畏强禦三月而竣河道既通貨艦鱗集衆沾其利至於編工計程不役塘長造船運土棄之廢地隨濬而畢尤為良法四十五年上海知縣呂濬開繇府城抵縣内外水道天啓元年華亭知縣章允儒同呂濬濬莘村塘華亭長二千三百丈上海長一千丈二年華亭知縣郭如闇濬官紹塘横􅅹河長二千丈有竒上海知縣鮑竒謨濬張家塘東自黄浦口起至華亭界長三千二百丈三年郭如闇復濬府東北城濠二百四十丈四年郭如闇復濬蒲匯塘徐家浜及城内市河長三千五百餘丈五年華亭知縣徐尚勲濬海螺港長一千七百八十丈鮑竒謨復濬張家塘長一千一百六十丈尚勲復濬城濠河涇及集賢涇等河松江府志自萬厯間頻遭水患專設導河夫役有司加意修濬每嵗舉行江河通利六年青浦縣知縣鄭友元修築田圩松江府志青浦自水災後低郷田畝日窪友元令業主出米佃户輸力分大圩為小圩界長圩為短圩便於戽救旁邑傳以為式崇禎元年蘇松水利道張孝濬華亭莘村蒲匯官紹等塘長六千四百餘丈濬上海陸道浜莘村塘小閘港長四千七百餘丈二年巡撫曹文衡檄同知錢永澄濬華亭金匯塘横涇河呂河涇徐家浜上海俞塘等河長萬餘丈修築黄浦塘岸長二千餘丈是年知府方岳貢濬府城内諸河發帑募夫隨運河土增築官塘自西馬頭至五里橋長隄高固行旅耕作胥利焉三年巡撫曹文衡濬上海肇家浜長二千五百餘丈四年知府方岳貢濬華亭盤龍塘亭林鶴頸匯河運港後港鹽鐵塘南横港長六千餘丈上海新涇長一千八百餘丈五年巡撫莊祖誨督通判朱啓元濬華亭祝家港浙河長三千六百餘丈上海新塲河沈莊河青浦蒲匯塘長四千八百餘丈築泖塘澱河岸長二千八百餘丈七年巡撫祁彪佳督濬華亭蒲匯官紹等塘上青蒲匯莘村等塘長萬餘丈八年巡撫都御史張國維督松江知府方岳貢修漴闕石塘是時漴闕坍塘長二百八十九丈内患口一百十九丈東西兩塘接連患口一百十七丈有竒東盡塘五十三丈官給料價工食銀二萬餘両岳貢率屬經始舉人吳嘉印綜覈冒濫石塘以成十三年方岳貢復建捍海石塘舉人何剛董其役國朝順治九年巡按御史秦世貞檄華亭知縣劉成龍濬春申六磊紫岡沙岡竹岡蟠龍蒲匯諸塘及邱涇横􅅹張涇俞塘沈漕涇千步涇并支河二百餘條仍令塘長每嵗修治十年知府李正華大濬府城諸河康熙十年巡撫馬祜奏准開濬吳淞江雍正五年挑吳淞白茆孟瀆徳勝九曲河倂各河次第開濬九年開濬蘇松常鎮四府河道工竣已上三滌俱詳見太湖常州府周泰伯開瀆後人名曰泰伯瀆漢陽羨令袁玘築長橋鑿便民河在吳江界南北朝宋元嘉二十二年修陽湖成良疇數百頃二十四年治臨津梁大同元年遶惠山濬溪今名梁溪唐景龍二年置將軍堰牐元和間常州刺史孟簡開泰伯瀆人遂稱為孟瀆按孟瀆袤四十一里溉田無數附郭思極疏浚孟瀆疏孟瀆在武進之北延袤六十餘里外通長江内資灌溉商民舟楫罔不便之嘉靖間築堡中流日就淤塞嘗有建議開濬旋議旋寢將成平陸臣愚以為孟瀆一開則既有間道以通舟楫而運牐得啓閉之宜又引江潮以達奔牛而運河資接濟之力縱遇亢旱不至坐以待困此緩急可賴之一策也五代南唐保大元年修孟瀆水門宋淳化三年知常州王詵開珥瀆天禧四年知江隂軍崔立濬利港開横河慶厯二年知晉陵縣許恢濬申港凡六十八里濬澡子港自江口起凡四十里濬戚墅港自湖口起凡九十里許工費三十六萬凡灌田萬頃工役三月告竣三年知武進縣楊璵濬孟瀆是年知常州李餘慶濬顧塘河嘉祐五年轉運使王純臣督蘇湖常秀四州築田塍以禦風濤六年宜興縣尉阮洪疏四十九瀆洪以吳中水患屢上書監司乞開百瀆得請遂疏四十九瀆田禾大稔是年知常州陳襄濬運河襄以太湖積水横遏運河不得入江為民患立法濬之其患遂息八年知宜興縣司馬旦鑿新溪是年知江隂軍楊士彦濬横河治平四年知宜興縣樓閌濬四十二瀆熙寧元年樓閌復開一瀆民頌之名樓公瀆是年嵗旱河竭知無錫縣焦千之自小渲車湖入運河復車梁溪水由將軍堰以灌之農田獲利九年知江隂縣楊孝孺督治農田興水利元祐三年詔浙西常平使者調蘇湖常秀四州民夫濬青龍江六年治芙蓉湖開堰紹聖二年詔武進丹陽丹徒三縣修沿河隄岸溝䃮是年詔開濬蘇常二州等處湖浦元符二年知無錫縣趙伾興濬水利崇寧元年知常州朱彦濬後河大觀四年江隂縣丞于溥興水利置黄田蔡涇等牐導申港利港政和元年知常州徐申重建黄田牐三年江隂縣丞楚執柔濬治横河市墩新河代洪港幷創馬師唐市牐東門堰宣和二年兩浙提舉趙霖修平江常州一江四浦五十八瀆建炎元年知武進縣梁汝嘉濬城濠乾道二年漕臣姜詵知江隂軍徐蕆濬申利二港造蔡涇牐六年監進奏院李結獻治田三議詔令胡堅常相度以聞諭有田之家各依鄉例出錢米與租佃之人更相修築從之附李結治田三議蘇湖常秀所産為兩浙之最自紹興十三年以來屢被水害議者皆歸積水不決之故以為積水既去低田自熟苐以工役浩大事皆中輟臣有管見治田便利三議一曰敦本二曰協力三曰因時司農丞郟亶議云古人治塘浦闊深者蓋欲取土以為隄岸非專為決積水若隄岸髙厚借令大水之年江湖之水髙於民田五七尺而隄岸尚出於塘浦三五尺則雖大水不能入於民田民田既不容水則塘浦之水自髙於江而江之水亦髙於海不須決洩而水自湍流矣此古人治低田之法也若知決水而不知治田則所開浚之地不過積土於兩岸之側霖雨滌蕩復入塘浦不五七年填淤如舊前功盡棄為今之務莫若專務治田乞詔監司守令相視蘇湖常秀諸州水田塘浦𦂳切去處發常平義倉錢米多寡量行借貸與田主之家令就此農隙作堰車水開浚塘浦取土修築兩邊田岸立定丈尺衆户併力官司督以必成且民間築岸所患無土今既開浚塘浦積土自多而又塘浦闊深易以流洩田岸既成水害自去此臣所謂敦本之議也結又以為百姓非不知築隄固田之利然而不能者或因貧富同段而出力不齊或因公私相吝而因循不治非協力不可百姓所鳩工力有限必賴官中補助官中非因饑歉難以募民興役非因時不可是年常州府築五瀉堰牐兼修牐裏隄岸淳熙元年知常州府趙善防修奔牛牐十三年知常州林寔重濬後河十六年常州府濬東蠡河紹熙五年知宜興縣髙商老穿故瀆疏積水是年知常州李嘉言濬烈塘河置牐慶元元年知武進縣丁大聲濬後溪嘉泰十二年知江隂軍邢燾濬九里河及城内外渠咸淳元年知常州史能之濬後河元泰定元年濬常州路江隂州各通江河港至順二年江隂州同知濬河自蔡涇北出江口長十里一百五步下牐以西長一千八百五十餘丈明洪武三年常州府知府孫用重建烈塘牐七年孫用濬澡子港置牐二十年江隂縣濬申港二十四年武進縣濬烈塘二十五年武進縣疏剰銀河置牐無錫縣濬新河二十七年常州府濬孟瀆二十八年武進縣鑿太平河江隂縣濬横河二十九年武進縣建孟河牐三十年武進縣築蠡瀆河堰永樂四年詔濬孟瀆九年濬江隂青陽河道宣徳九年巡撫侍郎周忱建孟河牐正綂元年常州知府莫愚重建黄田牐附王直記水之有牐所以時啓閉謹蓄洩通舟楫之去來資田疇之灌溉其為利大矣然惟仁民愛物之君子斯能因其利而利之不然則怠惰縱弛茍目前之安忽經久之利其為民病豈小哉予於黄田牐之重建而知其用心之厚也常州江隂城北黄田港引江潮貫城中而出於南門凡二十里㑹夏港之蔡涇以達於運河實舟楫走集之地附郭良田數千頃皆賴其灌溉港因潮之消長為淺深長則溢消則涸溢則舟通而足以溉田涸則田不得受利而舟膠且敗者有矣唐長慶中李徳裕觀察浙西始建牐於城北潮長即啓以行舟消即閉以蓄水人賴其利厯嵗滋久繕治不繼日就頽毁自洪武丙子以來人失利也久矣前之為郡縣者數十人莫有少槩於心者宣徳中工部郎中桂林莫侯愚被簡拔來為郡上賜璽書俾興利除害侯詢知其事歎曰此亦利害之大者也今田利漕舟皆賴此其可後乎然以始至不暇為久之政通民和即具忠奏其事上命巡撫侍郎周忱經度之周公廬陵人以奉國仁以惠民而侯與之協議重建於舊址南五丈許以避水之衝念役重費殷不忍賦於下公常廣儲蓄以備災度可支數十年欲稍發所備米市材僦工一切不以煩民計其費以聞詔可之乃命通判邵武張侯齡董其役然諸調度皆出周公買石洞庭山磨琢而後致之几用石工五十人木工十人金工五人土工十人役夫二千五百人石四萬五千尺木二萬一千一百根磚三十萬一千箇石灰四千石鐵一萬一千觔食米二千九百石經始於正統元年八月而以其年十月成自是嵗獲大穰舟行無害耕夫楫徒商人估客鼓舞而贊頌焉郡中父老皆大喜曰兹牐之建吾郡襟抱嚴固風氣完復吾民其永有利哉六年武進縣重修孟河牐天順元年江隂縣知縣周斌興水利開通河港四年濬江隂縣城濠成化四年都御史邢克寛重建犇牛牐附王璵記距毘陵城西三十里為犇牛堰泝堰水西行百八十里厯雲陽達京口為運河其地勢東傾堰不足以時蓄洩也嘗於京口呂城犇牛為三牐皆莫詳其剏始按史記載丹徒水道自六朝千百年通吳㑹隋初有詔浚治則是此牐在齊梁前已有之矣自大業之後此閘當與河相為廢興而並不一書至元符嘉泰始兩書修復我國初洪武己酉間牐廢後更導其支流東北出於堰為壩自是而運河不復通重載漕舟多出孟瀆河濟江而江行險逺嵗不能無覆溺之患天順己夘冢宰崔公克讓為都御史巡撫江南為言於朝請復建牐營度適宜委畀得人曾無幾何而五牐告成其在常境者犇牛下牐是也成化戊子都御史邢公克寛來繼謂犇牛猶有上牐其遺址尚存盍亦修建俾互為啓閉遂以其事付之常守卓君天錫而以武進邑丞宋瑛董役事給費於公帑役民於農隙其經畫之良成功之速與下牐等夫自堰廢為牐牐廢為壩言水利者時有訾病今牐與壩兩存之春夏水溢則由牐秋冬水涸則由壩壩可瀦而牐無壅也根遺跡筴成算以開永圖夫豈樂因循而好自用者所能彷彿哉八年知武進縣熊翀濬後河知無錫縣佟珍濬走馬塘十九年知宜興縣知縣袁道濬便民河并觀鶴漊𢎞治四年伍性濬宜興縣湯溪等瀆六年水利侍郎徐貫濬江隂縣申利桃花三港濬宜興縣葛溪等瀆八年巡撫朱瑄濬宜興縣五賢等瀆復濬孟瀆等河九年水利工部主事姚文灝濬宜興縣仕瀆等四瀆十年姚文灝濬宜興縣白龍河十一年濬宜興縣黄瀆等五瀆十四年提督水利郎中臧林濬宜興縣港瀆十五年江隂縣知縣徐貞修黄田牐十七年臧林濬宜興縣後河并三瀆正徳六年提督浙直水利僉都御史俞諫濬江隂縣河港七年俞諫濬宜興縣河瀆浜港江隂知縣黄霆濬九曲河嘉靖二年開常州府河瀆四年濬常州府河港開牐十五年江隂縣知縣徐貞濬利港桃花港二十年宜興縣知縣馮訥鑿通澤河二十三年濬江隂縣桃花港二十四年巡按御史呂光洵督濬蘇松常鎮四府塘浦是年江隂縣知縣趙錦建三關水牐二十五年武進縣修烈塘牐是年宜興縣知縣方逢時穿張公壩河萬厯元年宜興縣知縣韓容濬荆溪五年巡視下江水利御史林應訓疏孟瀆濬練湖六年重修武進縣烈塘牐是年濬宜興縣閃溪八年常州府知府穆煒濬後河武進縣縣丞郭之藩築芙蓉湖隄詳見太湖十六年濬蘇松常鎮四府河港塘瀆三十七年無錫縣知縣許令典浚冉涇河四十年巡撫應天都御史徐民式濬江隂縣九里河四十三年江隂縣知縣金廷璧濬山塘河四十六年常鎮兵備兼水利參政蕭丁泰濬江隂縣九里河天啓二年武進縣知縣李維喬濬城濠無錫縣知縣劉五緯修築石塘崇禎四年常鎮兵備兼水利參議吳麟瑞濬江隂縣九里河六年常州府通判劉麟長濬無錫縣城内河是年常州府知府洪周祿濬江隂縣九里河提督學政甘學潤常鎮兵備兼水利副使徐世䕃濬江隂縣城内河國朝康熙二十年巡撫慕天顔奏請濬常熟縣白茅港武進孟河奉旨准行四十六年冬奉聖祖仁皇帝發帑銀三萬餘兩修建孟河北牐魏村牐及奔牛之天井牐雍正五年奉旨發帑銀二萬餘兩疏濬孟瀆河得勝新河猶恐江潮汹湧泥沙淀積又發帑銀三百二兩零建造犂船四隻并領混江龍四具召募水手每嵗春秋二季於江口拖刷淤墊泥沙鎮江府晉太興四年晉陵内史張闓立曲阿新豐塘灌田八百頃陳敏鑿練湖南北朝齊建武中曲阿令丘仲孚鑿長岡埭梁天監九年造謝塘唐永泰中轉運使劉晏刺史韋損重開丹陽之練湖作斗門以通灌溉附李華練湖頌序大蜡之祭辭曰土反其宅水歸其壑先王因下流而導之故曰九川滌源因迤匯而瀦之故曰九澤既陂以疏天地之氣以利元元之用崇伯汩五行而殛羽山臺駘障大澤而封汾川洪範首之春秋載之地有廣狹事無古今大江鉅區惟潤州其藪曰練湖幅員四十里菰蒲菱芡之多龜魚螺鱉之產饜飫江淮膏潤數州其旁大族强家泄流為田專利致富自丹陽延陵金壇環地三百里數合五萬室旱則懸耜水則具舟人罹其害九十餘祀凡經上司紛紜與奪八十一斷嗚呼曲能掩直强可吞弱老幼怨痛沈聲無告永泰元年詔公卿選賢良先除二千石以江南經用所資首任能者是嵗十月二十三日拜前常州刺史京兆韋公損為潤州聲如飇馳先詔而至吏人畏服男女相賀即日上無貪刻下無寃憤公素知截湖為壤災甚螟蟊臨事風生指期以復羣謗雷動公恬然獨裁乃白本道觀察使兼御史中丞韋公元甫中丞撫掌愜心如公之謀且曰興利除害得其人而後行非常之政敢歸叔父公乃申戒縣吏率徒闢之人不俟召呼忭從役畚鍤蓋野濬臯成蹊增理故塘繚而合之廣湖為八十里像月之規鑄金之固水復其所如鯨噀射洶洶隠地雷聞泉中先程三日若海之彌望灝灝如吞吐日月沉沉如韞畜風雨所潤者逺原隰皆春耕者飽憂者泰於是疏為斗門既殺其溢又支其澤沃瘠均品河渠通流商悦奠價人勇輸賦遐邇受利豈惟此州每嵗萌隂乗陽二氣相薄大雨時行羣潦奔流水勢所入盈而無傷龍見方雲稼蒙其渥時前相國彭城劉公晏綂東方諸侯平其貢税聞而悦之白三事以聞詔書褒異焉彭城公宣命至江南捧詔授公公率元僚掾史令丞己下至於耆艾西向拜手忻戴皇朝人心上感天降膏澤如有神祗昭協厥志公正直而和專静而斷嫉惡宥過惠良察姦純鈞精堅百鍊不耗伐冰之貴降從士禮詩云靖共爾位好是正直宜其享福也吏人入賀公拱而謝之曰尚書劉公觀察韋公奉行王澤也鄙何力之有焉丹陽令杜孟寅秉公之清白延陵令李令從如公之愛人金壇令胡圮秉公之成規及丹陽耆壽周孝環百姓湯源等拜首而請曰兑為澤兑説也水歸於澤而澤説於人百年浸塞而公啓之臣哉鄰哉克諧帝休永代是式三縣無災若不碣而刻之王命不揚於厥後後之人無以倚負也華嘗學古見訪為頌頌曰望沄沄兮視冥冥鳥閒魚樂葭菼生膏腴利倍起訟争斯人怨抑痛無聲韋公正直動神靈百年游淀為漻清飢者食兮病者寧詔書光寵恩霈榮劃然眊矒復皎明追琢刻頌揚芬馨武徳二年刺史謝元超復置南北謝塘以溉田五代南唐昇元元年知丹陽縣呂延正濬練湖附呂延正浚治練湖狀當縣有練湖源出潤州髙麗長山下注官河一百二十里臣考之碑志訪諸郷老當為湖日湖水放一寸河水漲一尺旱可引灌溉潦不致奔衝其利田幾逾萬頃昔環湖而居衣食於漁者凡數百家有斗門四所由前唐季湖廢近湖人户耕湖為田後農家失恃漁樵失業民復思湖以禦災而無所寘力臣頻承條制修葺陂塘竊度其湖為利甚溥遂聚財役工於斗門基上以土堰堰捺及填補破缺處初謗議震動謂臣不良圖且廢湖豐已者不十餘家有湖無災者四縣之地臣明知利害獨如弗聞自今秋後不雨河道乾枯累放湖水灌注使商旅舟楫往來免役牛牽當縣及鄰縣人户請水救田臣並掘去湖岸給水如將久逺須置斗門方得通濟其斗門木植須用楠木乞給省塲板木起建下所司處分宋紹聖二年詔武進丹陽丹徒三縣修沿河隄岸溝䃮互見常州府知丹陽縣蘇京重濬練湖元符元年正月知潤州王悆建言呂城牐常宜車水入澳灌注牐身以濟舟若舟沓至而力不給許量差牽駕兵卒併力為之監官任滿水無走泄者賞水未應而輒開牐者罰守貳令伍常覺察之詔可崇寧四年臣僚言有司以練湖賜茅山道觀縁潤州田多髙仰及運渠夾岡小淺易涸賴湖以濟請别以沙田賜之仍令常平官考求前人規畫修築從之宣和五年詔漕臣補葺練湖隄岸宋史河渠志臣僚言鎮江府練湖與新豐塘地理相接八百餘頃灌漑四縣民田今堤岸損缺不能貯水乞候農隙次第補葺詔本路漕臣并本州縣官詳度利害檢工料以聞紹興七年兩浙轉運使向子諲增置練湖斗門石䃮宋史河渠志向子諲言鎮江府呂城夾岡形勢髙仰因春夏不雨官漕艱勤尋遣官屬李澗詢究練湖本末始知此湖在唐永泰間已廢而復興今隄岸弛禁致有侵佃冒決故湖水不能瀦蓄舟楫不通公私告病若夏秋霖潦則丹陽金壇延陵一帶良田亦被淹没臣已令丹陽知縣朱穆等増置二斗門一石䃮及修隄防盡復舊跡庶為永久之利知丹陽縣郭京濬練湖乾道六年知鎮江府蔡洸濬河七年詔漕臣沈度修築練湖隄岸宋史河渠志臣僚言丹陽練湖幅員四十里納長山諸水漕渠資之故古語云湖水寸渠水尺在唐之禁甚嚴盜決者罪比殺人本朝寖緩其禁以惠民然修築嚴甚春夏多雨之際瀦蓄盈滿雖秋無雨漕渠或淺但泄湖水一寸則為河一尺矣後堤岸圮闕不能貯水彊家因而專利耕以為田遂致淤澱嵗月既久其害滋廣望責長吏濬治堙塞立為盜決侵耕之法著於令庶幾練湖漸復其舊民田獲灌溉之利漕渠無淺涸之患詔兩浙漕臣沈度專一措置脩築八年知鎮江府宋貺濬河淳熙二年知鎮江府陳居仁置黄水䃮十六年總領錢良臣修丹陽練湖横壩及諸斗門䃮函紹熙間丹陽縣開丁義瀆慶元四年知鎮江府萬鍾濬導市河嘉定元年丹徒縣主簿馬榮祖修築練湖隄岸淳祐二年知鎮江府柯元壽修練湖牐景定三年知丹陽縣趙必棣修築練湖岸埂咸淳六年知鎮江府趙溍改築程公上下二壩元至元十三年金壇縣作南壩三十一年詔丹陽縣濬練湖大徳九年行都水監濬練湖泰定三年疏漕渠修濬練湖元史河渠志練湖在鎮江元有江南之後豪勢之家於湖中築堤圍田耕種侵占既廣不足受水遂致泛溢世祖季年參政安達拉奏請依宋例委人提調疏治其侵占者騐畝加賦至治三年十二月省臣奏請役夫三千餘人濬滌練湖九十日可完人日支糧三升中統鈔一兩行省行臺分官監督所用船物今嵗預備來春興工合行事宜依江浙行省所擬既得旨都省移文江浙行省委參政董中奉率合屬正官親臨督役於是董中奉言所委前都水少監崇明州知州任奉政鎮江路總管毛中議等議先開運河工畢就濬練湖省準所言各監工官言已分運河作三壩依元料深闊丈尺開濬至三月四日畢工又監修練湖官言任奉議指畫元料增築隄堰及舊有土基共增闊一丈二尺平面至髙低灘脚增築共量斜髙二丈五尺依中堰西石䃮東舊堤臥羊灘修築如舊堤髙闊已及所料之上者遇有頽缺修築令完中堰西石䃮五百婆隄西上增髙土一尺有缺亦補之五百婆隄至馬林橋隄水勢稍緩不須修治其隄底間有滲漏者窒塞之三月六日破土九日入役至十一日工畢實役三日又鎮江路言練湖今已開濬若不設法關防徒勞民力應關本路達嚕噶齊烏魯斯哈雅總治其事同知哈克繖知事程郇專管啓閉斗門行省從之明建文元年鎮江府知府劉辰丹陽縣知縣董復重濬練湖宣徳六年巡撫侍郎周忱修五堰正統六年丹陽縣知縣陳誼築練湖隄及修斗門景泰二年修練湖六年巡撫應天都御史鄒來學濬簡瀆成化二年丹陽縣知縣蔡實築練湖隄置斗門函管𢎞治十二年濬丹徒縣甘露港十三年丹陽縣知縣髙謙修築練湖隄岸正徳三年鎮江府作博望新牐嘉靖二十四年呂光洵督濬蘇松常鎮四府塘浦三十四年丹陽縣知縣陳奎置水關石牐隆慶二年鎮江府同知馬豸濬馬嘶港三年修練湖隄岸六年修濬蘇松常鎮四府堰壩田圍互見蘇松常三府金壇縣知縣劉美鑿長新垾渠建義成廣澤二牐十六年濬蘇松常鎮四府河港塘瀆互見蘇松常三府十八年丹陽縣知縣周應鰲開境内支河三十六年濬丹陽縣鄭涇河康熙四十七年巡撫于準修復練湖江南通志卷六十四
