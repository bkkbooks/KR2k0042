body:
  text: 欽定四庫全書江南通志卷十一輿地志山川一江寧一府自崑崙南幹以江為限其分而趨北之攴自浙之仙霞嶺北為黃山為九華並江而東為鍾山中幹以河為限其岐分中支自河南之桐柏山東南為大蜀小蜀為天柱而諸山在江南北者又從分支縷析翔伏蜿蟺大抵復嶂抱流雙渠環阜而人文物産之興此其脉絡也歸有光論區宇混一修書宜倣禹貢周官序山川必先其原委此又以山川之原委明然後備禦疏浚可得而詳也若夫海湧地肺之峰笠澤通波之水我朝德教光華倍增靈秀聖祖仁皇帝翠華臨幸天章神翰藻采輝賁山川奠寧萬世長新矣江寧府鍾山在府東北十五里朝陽門外本名金陵山据庾闡揚都賦云山時有紫氣故又名紫金山髙一百五十八丈周回六十里東連青龍北接雉亭諸葛亮云秣陵地形鍾阜龍蟠是也漢秣陵尉蔣子文吳為立廟此山因改為蔣山又曰聖遊山又曰北山即南齊周顒隱處明嘉靖中詔改為神烈山兩峰秀起北一峰最髙其上為太子巖即昭明讀書臺八功德水在其下一清二泠三香四柔五甘六淨七不饐八蠲疴梁以後取供御案南有岡曰獨龍峰曰玩珠山半有井曰應潮或云其水與江潮為盈縮麓有霹靂溝有曲水晉海西公疏以宴百僚宋時三月三日祓除於此通鑑胡三省注自山趾築道坡陀以登山名曰龍尾一名龍廣山北五里為蒼山挺秀殊衆唐地理志云江南道其名山衡廬茅蔣朱子亦云天下山皆發源於岷山蔣山實其脉之盡者自六朝以來最稱佳麗琳宫梵宇計七十餘所功德水南曰半山墩半山者王安石舊宅所謂報寧禪院也自城中上鍾山此為半途故曰半山夾道皆長松髯甲夭矯如蛟龍往往數百年物太子巖西曰栽松峴輿地志云蔣山本少林木東晉令刺史罷還栽松百株宋時令刺史栽松三千株郡守以下各有差至今為盛山後有洞曰朝陽上有商飇館九日臺附元胡炳文鍾山遊記江以南形勝無如升鍾山又升最勝處豫至升首過上元謁明道先生祠禮畢即度關遊山夾路松陰亘八九里清風時來寒濤吼空斯須寂然如故路左入半山先是謝太傅園池荆公宅之捐為寺至今祠公與傳法沙門等出行三四里又入一寺𢎞麗視半山百倍龕鏤壁繪光彩奪日詭狀萬千兩廡級石而升四五十丈始至寶公塔塔邊有軒名木末履舄之下天籟徐鳴浮嵐暖翠可俯而挹下有羲之墨池投以小石逺聞聲出叢葦間其徑荒蕪遊客罕至獨拜塔者纍纍不絶長老云寶公巢生里人朱氏取而子之後成佛凡禱水旱疾疫如響語多不經由塔後循山而左過安石讀書所山石崛壘忽敞平原修篁老檜萬緑相扶風鳴交加猶作當時晤咿聲又行數里休於觀音亭其旁八功德泉有聲鏘然汩汩至亭下則囦然以涵或謂病者飲此立瘳衆相飲豫以無疾不飲遂回塔後攀松升磴六七里至山椒巨石人立豫登石以坐鳯臺鷺洲渺不知在何許但覺繚白縈青隱見烟霧間城中數萬家樓閣如畫其間曠無人處六朝故宫也北視揚子江頭一舟如葉行移時不翅浪楫風帆想數十里遙蟠龍踞虎亘以長江其險也如此黃旗紫蓋有時而終令人淒然久之下山至七佛庵白雲淒潤囂壒不來一僧噓石爐灰㸃茶鬚眉如雪一僧蓬跣岸邊拾松子以歸語客質木絶不與前寺僧類聞其下有猛公庵子文廟山水稍奇麗率為事神若佛者家焉欲訪猿鶴山堂莫得其處遂朗吟小山招隱循故道御天風而下兩袂如飛亟入關復至明道精舍少憩而歸因唶唶曰升自紫髯翁以來幾興衰矣眼前花草無復當時光景伯子春風干年猶將見之至若熙寧相業非不焯焯然炫人耳目迄不如主上元簿者復祠於學何哉國朝李蘭鍾山賦粵稽望秋之典載考職方之書維名山之峻極乃作鎮於雄都越江表而遐觀覽鍾阜兮盤紆映斗宿之靈曜跨金陵之奧區擬崇隆於嵩霍齊名勝於匡廬洵瑰奇之所宅實神異之攸居爾乃觀其形勢偉麗雄秀萬壑奔騰千巖輻輳牛首峙其前雞籠居其右溫泉湧其左元武帶其後水淙淙以赴澗雲容容而出岫湍流可枕礪石堪潄俯臨城郭近接田廬朝烟倐變暮景全殊晴雲掩映陰靄濃敷或見或隱或卷或舒騰幻質於俄頃極異態於須臾至若􅏜石星羅奇峰陳列凌跨霄漢蔽虧日月鳥道逶迤羊腸曲折路欹側而可通徑盤旋而忽絶﨑嶇百叠宛轉千回既嵯峨而嶻嶪復巃嵸而崔嵬履險途而趦趄陟磴道而徘徊循嶽之麓傍山之隈近矚心怡逺眺懷間意眇八紘志狹九垓慿髙峰而極日對天際之長江觀波濤之澎湃覩洲渚之蒼茫泛估舟與官舫盡楚舶與吳檣當其乘風而破浪儼若夫飛隼之翺翔逮夫風恬而浪靜又似乎游鳬之頡頏閲層波之渺渺嘆逝水之湯湯亘終古其如斯緬水德之靈長此乃川瀆之壯觀而與茲山並著於巖疆者也乃有茂林陰翳灌木成叢丸丸翠柏落落青松春深緑樹秋盡丹楓曲水流觴遡晉朝之盛事遊山射雉仰齊代之遺蹤沈僕射之郊園但餘渌水蕭德施之書邸祇對秋風靈谷之寺建於山側梁帝之所遊豫志公之所駐錫梵宇輝煌琳宫崒嵂街號琵琶泉名功德入門而松徑十里仰瞻而塔光五色洵淨域之偉觀實香城之絶特若夫春日載陽風融景和遊人雜遝士女駢羅逍遙乎林之藪放蕩乎山之阿以偃以息載嘯載歌又有髙士携笻幽人命駕或踞乎山之巔或立乎雲之下悵景物之遞新感時序之代謝聊登山而臨水庶寫心而銷暇於是移髙就下越陌度阡離離坂隰每每原田農夫荷臿於隴畔稚子饁餉而往旋咸含哺而煦煦盡鼓腹以便便歌詠太平之福優游豐稔之年耕食鑿飲以安於熙皞之化出作入息而忘於知識之天蓋盛世之德周而仁溥斯山川之祥集而瑞全故記有之天不愛其道而降甘露地不愛其寶而出醴泉也伊斯山之奇特匪筆墨之能究惟仁者之是樂實廣大而博厚體既立靜效亦宜壽保不虧而永固表綱紀於宇宙維登髙之作賦羡古昔之名賢兹搦管以敷陳希追踪而比肩彼夫玉樹青葱子雲貽譏於往論盧橘夏熟長卿見笑於前編要體宏而用大原無事於侈言撰斯文以志勝任評隲之媸妍覆舟山在府東北太平門內形如覆舟故名方與勝覽云覆舟山東連鍾山北臨𤣥武湖一名龍山宋元嘉中嘗改名𤣥武山陳大建中又改為龍舟山舊有甘露亭瑶臺閬風亭藏冰井雞鳴山在府東北覆舟山之西其北臨𤣥武湖寰宇記云西接落星澗北臨培元塘本名雞籠山宋元嘉十六年徵廬山隱士雷次宗至建康開館於雞籠山使聚徒教授南齊竟陵王子良於雞籠山西邸集學士抄五經百家依皇覽例為四部要略千卷即此府志云明初於山巔建觀星臺賜名欽天山左右列十廟繚以朱垣其東麓為雞鳴寺有普濟塔國朝康熙二十三年聖祖南巡幸雞鳴山登北極閣御書曠觀二字雉亭山在府東北二十五里石邁古跡編云齊武帝東遊鍾山射雉因名舊志云吳大帝時蔣山神執白扇乘馬見於此義呼為騎亭山祗闍山在府東北舊有祗闍寺白山在府東北三十里鍾山北攝山南輿地志云山産白石可為碑礎南史云梁散騎常侍韋載有田十餘頃在江乘縣之白山築室屏居即此臨沂山在府東北四十里與雉亭山相接西臨大江其西南有臨沂舊縣因名衡陽山在府東北四十五里清風鄉府志云昔朗法師居此有衡陽神女來聽講後為此山之神因名攝山在府東北四十五里山多藥草可以攝生因名輿地志云攝山形方四面重嶺似繖亦名繖山西北有水注江乘浦入攝湖即秦始皇所從渡江者南史云齊明僧紹居此山後捨宅為棲霞寺齊時隨石大小鑿佛像千餘名千佛嶺右為天開巖有白乳泉白鹿泉又有般若堂明月臺宴坐石髙下相望勝處極多東巖下有畫石山中有石穴曰花洞相傳與句容華陽洞通落星山在府東北舊圖經云昔有大星落此因名西臨大江吳時建樓吳都賦曰數軍實於桂林之苑享戎旅乎落星之樓劉逵注云樓在建業東北十里宫苑記云桂林苑在落星之陽吳苑也觀音山在府北觀音門外北濱大江連亘幕府諸山皆峭削壁立形如錯繡有觀音閣嵌懸巖上昔時江流閣下今隔洲渚移去里許矣大壯觀山在府北十八里東接鍾山南臨𤣥武湖陳立大壯觀於此南史云陳太建十年帝幸大壯觀閲武是也直瀆山在府北二十五里旁有直瀆吳主孫皓所開因以名山其流北注於江四望山在府西北十里定淮門外南接石頭北連獅子吳大帝嘗與葛元共登晉書溫嶠討蘇峻築壘於四望磯以逼石頭按府志云山下有磯也幕府山在府西北二十里得勝門外通鑑注即晉王導迎琅邪王東渡建幕之處故名北濱大江與直瀆諸山接為建業門户梁書齊師至鍾山龍尾陳霸先自率麾下出幕府山齊人大潰即此東南麓有武帳岡古宣武場地宋文帝曽於此閲武仙人臺虎跑泉皆在其上又有夾蘿峰達摩洞相傳達摩折葦葉由此渡江山多石居人煆以為灰又名石灰山盧龍山在府西北二十五里一名獅子山山嶺綿延逺接石頭晉元帝謂似北地盧龍故名明太祖嘗伏兵大破陳友諒於山下按宋濓閲江樓記云京城西北有獅子山自盧龍蜿蜒而來則盧龍獅子似為兩山所謂本同末異者也馬鞍山在府西北與盧龍相接府志云山以形名土山在府東南二十里一名東山無巖石建康實録云吳景帝自㑹稽還曲阿即日進至布塞亭孫綝迎於土山之野晉書云謝安於此山營立樓館往來遊集以擬㑹稽東山與姪𤣥圍棋賭墅在此有謝公墩即安與王右軍所登悠然遐想處附明顧起元金陵東山考㑹稽臨安金陵三郡皆有東山俱𫝊以為謝安携妓之所按謝安本傳初安寓居會稽與王義之許詢支遁遊處被召不至道棲遲東山唐裴冕與吕謂等鑒湖聨句有興發還尋戴東山更問東此會稽之東山也本傳又云安石嘗住臨安山中坐石室臨濬谷悠然嘆曰此與伯夷何逺今餘抗縣有東山東坡有遊餘杭東西岩詩注云即謝安東山所謂獨携縹眇人來上東西山者是也此臨安之東山也本𫝊又謂及登台輔於土山營墅樓館林竹甚盛每擕中外子姓游集今土山在建康上元縣崇禮鄉載建康事迹云安石於此擬會稽之東山亦號東山此金陵之東山也然南史載宋劉勔經始鍾嶺以為棲息亦號東山金陵遂有兩東山矣張山在府東南三十里淳化鎮北南史云齊明敬皇后葬江乘縣張山即此旁有虎洞下有玉泉石硊山在府東南三十里山壟皆石祥符圖經云硊一作匱此山橫據秦淮之上以扼水勢若匱然故名孫盛云自方山至此是秦所鑿斷處府志云一名竹山青龍山在府東南三十五里山趾石堅而色青郡人多取為碑礎唐李白詩白鷺映春洲青龍見朝暾指此又南唐書後主獵青山戚光音釋引郡志曰青龍山是青龍亦名青山也祈澤山在府東南三十五里東連彭城北連青龍舊經云山有祈澤寺初法師嘗結茅於此有神女來聽講神泉湧出講座下後遂為水旱祈禱之所方山在府東南四十五里山周二十七里髙一百一十六丈四面方如城吳葛仙翁所居上有石龍池下有葛公井一名洗藥池秦鑿淮水經其下山頂方正丹陽記云形如方印故名天印彭城山在府東南四十五里祈澤山東有水下注成渠上有橋舊有彭城館湯山在府東南六十里湯泉出其下大小凡六穴張渤吳録云丹陽江乘縣有湯山出泉即此地也四時常熱草木灌之愈鮮茂宋劉義恭有湯泉銘雁門山在府東南六十里西連彭城山金陵新志云山勢連亘類北地雁門因名輿地志云山東北有溫泉可浴飲之能治冷疾一名陽山按唐李白金陵江上詩云緑水向雁門黃雲蔽龍山雁門即此雁門山金陵龍山有二覆舟巖山舊皆有龍山之名注者失之耳竹堂山在府東南七十五里輿地志云白山雁門竹堂并連帶建康縣北綿延三四十里武岡山在府東南二十五里石邁古迹編上有石佛十餘軀舊傳唐武后造按晉書武岡王導所封山以導得名如幕府之類疑近是苻堅山在府東六十里府志云謝𤣥破秦歸謝安問其方略𤣥指此山曰此若苻堅駐軍之山因以為名大城山在府東七十里西接雁門北連竹堂雲穴山在府東八十五里南有水流入石驢溪有洞穴甚幽邃天欲雨則穴中雲出因名以上俱上元縣石頭山在府西二里石城門內丹陽記云石頭因山為城因江為池謂之石首城又名石城山後漢建安十七年城石頭劉逵吳都賦注云石城石頭塢也在建業西臨江其中有庫藏軍儲輿地志云即楚金陵邑地吳晉時江流山下最為險要其上築城以守之下有龍洞又名桃源洞山後有駐馬坡諸葛亮嘗駐此以觀形勢謂之石頭虎踞是也東麓有虎踞關江乘記云石頭城山嶺嶂相重游歷者以為猶楚之九嶷云清涼山在府西六里清涼門內上舊有清涼臺俯瞰大江南唐翠微亭遺址在焉冶城山在府西石城門內本吳冶鑄處六朝時有東西二冶元和郡國志云王導移冶於石頭東髑螻山以故地多園亭太元十五年建治城寺於此謂之冶亭陸游入蜀記云天慶觀在冶城山之麓觀西有忠烈廟卞壼廟也東北有忠孝亭并以壼二子死父難也天慶觀即今朝天宫義有東冶亭在半山寺後王安石詩云遙望鍾山岑應知冶城路謂東冶亭也陰山在府西南十二里臨大江府志云晉王導至此山神見夢於導以其事聞為立廟故名陰山舊時江水自三山東入㳂陰山石子岡北流以達於石頭故元時有陰山運道湖山在府西南三十里上有湖久旱不涸龍口山在府西南三十五里戚氏志云山有季琮墓前有三城湖車府山在府西南四十里府志云六朝嘗於此山藏車乘器甲因名三山在府西南五十七里吳志晉王濬伐吳順流而下直指三山是也大江從西來勢如建瓴此山突出當其衝有三峰吳時津戍處輿地志云其山積石森鬱濱於大江三峰行列南北相連唐李白詩三山半落青天外即此雲臺山在府西南六十里府志云山南有古松夭矯百尺儼若圖畫下有泉澄泓可愛西迤十里曰虎肱洞有巨石若囷蓋復有石丈人春社報賽為勝蹟云白蕩山在府西南七十里北接髙墟山烈山在府西南七十里乾道志云山近烈洲居大江中四面峭絶風濤洶湧商旅嘗泊舟依山以避之山頂舊有侯將軍廟祀陳將侯瑱金陵志云瑱嘗破王琳於此功烈甚大故名烈山宋寶祐初有僧建庵其上自名為江心護國寺朝無咎以比潤州之金山白都山在府西南八十里西臨大江輿地志云昔有白仲都於此學道升仙故名下有白都湖上有仲都祠慈姥山在府西南一百十里與當塗縣界輿地志云山臨大江巖壁峭絶山南有慈姥神廟陸游入蜀記云慈姥磯磯之尤巉絶峭立者徐師門有慈姥磯詩序云磯與望夫石相望正可為的對天竺山在府西南一百二十里東有水下注慈姥浦府志云本名多墅山唐上元間有天竺福興寺僧道融駐此因名鳯臺山在府西南聚寶門內宋元嘉中王顗見異鳥集於山時謂鳯凰遂起臺焉陸游入蜀記云保寧寺有鳯凰臺攬輝亭有李太白詩聚寶山在府南聚寶門外山産細石如瑪瑙因名其東巔為雨花臺輿地紀勝云梁武帝時雲光法師講經其上天為雨花山麓為梅岡晉豫章內史梅頤家於此上或謂之梅陵相傳為梅鋗屯兵處舊多亭榭自六朝迄今為郡人遊覽勝地戚家山在府南聚寶門外景定志云在天禧寺東南唐遺事云韓熙載居此按天禧即今報恩寺梓桐山在府南十五里山下有謝氏詩樓及翻經臺基尚存府志云本名梓樹山山北為石子岡紫巖山在府南與梓桐山相近陳軒金陵集南唐李建勳有春日紫巖山期客不至詩翠屏山在府南十五里山色碧如翠羽因名古新亭在焉相近有韓府山韓憲王葬此舊名鳯凰山夏侯山在府南二十里府志云梁儀同夏侯亶嘗愛其風景卜居山下因名牛首山在府南三十里舊名牛頭山兩峰峙如雙角即佛書所稱江表牛頭者也晉王導以其逺對宣陽門指為天闕故又名天闕山梁武帝建寺於石窟下更名仙窟山有兜率巖芙蓉嶺文殊辟支二洞白龜池虎跑泉昭明太子飲馬池由山麓石磴數百級杉檜森夾而上有𢎞覺寺寺有浮圖二殿宇依山而構望之如畫屏又有含虛閣前對三山大江旁繞尤為勝處通鑑晉人築南郊壇於已位宋大明二年詔徙於牛頭山直宫城之午位宋建炎中嶽飛設伏兵於此以拒烏珠明武宗南幸嘗駐蹕山中附明都穆遊牛首山記金陵多佳山牛首為最山據城之南初名牛頭以雙峰並峙若牛角然佛書所謂江表牛頭是也晉王丞相導嘗指曰此天闕也後又名天闕山云丁卯七月二十有三日吏部主事顧華玉與豫約客戶部員外郎王子和朱升之國學士陳魯南而豫兒元翁侍焉遂共出鳯臺門南行十五里至塘灣又南行十里度嶺又三里抵山舍西上二里達𢎞覺寺門內二井其左曰白龜池右曰虎跑泉後僧以其險更甃為井而虎泉尤清冽寺衆汲於此躋石級庭中銀杏一株圍可二丈午食畢登浮圖至其巔有聨句詩經修廊東行緑石魚貫上登觀音閣憑欄俯視第見浮圖之尖再上聞有捨身臺及辟支佛足跡以峻險不及觀下至兜率巖空洞上突出如屋久之至文殊洞前有屋一楹衆復聨詩書壁上既而登山之脊觀蕭昭明飲馬池徑可丈餘冬夏不涸下而西至辟支洞廣差勝文殊石浮圖立其前辟支舍利所藏處也老僧言少嘗見舍利放光今數十年矣浮圖有石刻二其一宋皇祐二年記不著撰人中載志公答宋明帝語云昔辟支佛冬居於此其一乃如愚居士詞字絶類黃太史居士殆隱逸之儔其西下經禪堂旁室關其門有竅如錢日光射浮圖影倒掛佛案紙上不可曉也夜燕方丈豫以倦睡去衆作詩韻險至雞號乃罷二十四日早出寺而南山路極峻馬屢前却時雲霧四興遙視山足則日光在田禾黍映之繚黃縈碧如僧伽黎豫笑語三君不知身之在人間世也五里至獻華巖石益奇麗中虛深可十步儼若堂宇相傳唐髙僧法融嘗居其中有白鳥獻華之異巖因以名山故有幽棲寺今廢成化間山東僧道興至堅坐不動有財者樂為之施寺由是復興今名華巖巖之南曰屯雲亭又南曰芙蓉閣閣嵌巖石登其上羣峰攢簇在目睫山之最佳處也衆共飲焉北下僧廬其扁曰無邊風月可坐眺逺又下有軒曰無塵仍飲賦詩又二里出山是為記花巖山在牛首山南五里即祖堂山金陵志云牛首之南為祖堂周四十里髙百二十七丈本名幽棲唐貞觀中改名沿山一石橋入山徑至花巖寺右有石窟甚深廣佛書云唐貞觀中法融師居之大雪時忽有奇花二莖生於巖側又有白鳥獻花之異因名獻花巖府志云山有芙蓉峰拱北峰天盤嶺西風嶺中峰伏虎洞神蛇洞象鼻洞息泉太白泉長庚池諸勝明成化中葺興幽棲寺賜額華巖因法融得道於此為南宗第一改為祖堂山舊志分為二山非是巖山在牛首山東北建康實録云吳天璽初嘗立石刻於巖山紀功德丹陽記巖山東有石碣長二丈折為三段乃吳大帝天發神䜟碑或云皇象所書段石岡名以此宋孝武改曰龍山景寧陵在焉青山在牛首山南十里建康實録云梁置幽巖寺大毗曇師𫝊云承聖二年法師入秣陵青山始創舍名曰幽巖與佛窟寺相近南唐書後主嘗獵於此山還如大理寺親録繫囚多所原釋郡志云山在城東三十五里然城南四十里亦有青山觀山在府南三十里東有水下注新林浦一名觀子山吉山在府南四十五里西臨大江宋將軍建城侯吉翰葬此因名朱門山在府南七十里又有男山女山姑山與此山並相聨絡森秀聳拔銅山在府南七十里府志云昔人採銅於此因名慶元志云山南名金牛坑鼓吹山在府南八十里縣志云宋孝武大明七年自江寧南登此山奏鼓吹因名橫山在府南一百二十里西接太平南連溧水四方望之皆橫又名橫望山有十五峰正峰頂有陶𢎞景丹井春秋傳楚子重伐吳之所至也以上俱江寧縣附明陳沂金陵諸山圖考唐志稱東南名山衡廬茅蔣金陵有二焉蔣山故名鍾山實都邑之鎮武侯所謂鍾山龍蟠是也宋周應合山川序云鍾山之左自攝山臨沂雉亭衡陽以達於東又東為白山大城雲穴武岡以達於東南又南為上山張山青龍石硊天印彭城雁門竹堂以達於南又南為聚寶戚家梓桐紫崖夏侯天闕以達於西南綿亘至三山而止於大江所謂龍蟠之勢也鍾山之右近之為覆舟雞籠在宫城之後又北為直瀆大壯觀四望以達於西北又西北為幕府盧龍焉鞍以達於西是為石頭城亦止於江所謂虎踞之形也然考其山之逺近城之連脤亦少有不合者蓋東南之山關城重抱山勢連屬不可一一次序言之且古之江水自三山東入沿陰山石子岡北流以至於石頭又自石頭沿馬鞍四望盧龍幕府東折至於觀音又由臨沂攝山直扺京口二百餘里山勢不絶浮江而觀之三山據於西南石頭據於西北秦淮中出乃天限之門户也今江水西流沙洲曠邈馬鞍鳯臺為民居日削而陰山則陶冶為澤漸不可尋矣此則圖其形勢之大者焉茅山在句容縣東南髙三十里周百五十里真誥稽神樞云句曲山古人謂為金壇之虛臺天后之便闕山形似已故以句曲為名又名已山相傳漢時茅氏兄弟三人得道於此因名唐明皇敕稱為嶽吳越春秋云禹巡天下登茅山以朝羣臣曰會稽其山逶迤磅礴同出而異名者良常秦望海江仙韭之屬凡二十有六實一山也其最髙者曰大茅峰又中茅小茅其他為洞為巖為泉為澗為岡為峪不可勝紀道書所謂第八洞天第一福地金陵地肺是也漢光武建武元年遣使以黃金五十斤獻三茅君山頂有埋金處又有丹砂鎮此山山泉皆赤色飲之延年幽奇瑰偉絶異羣山許邁以為潛通五嶽允為江南之鎮梁陶𢎞景隱居於此國朝康熙四十四年聖祖南巡御書第八洞天四字中峰之北有桃花崦春時華卉紛敷不減武陵源彭山在句容縣南七里峰巒秀聳泉水環流上有白巖寺秦山在句容縣南三十里有明月灣通秦淮張鉉新志云謝安月夜乘舟釣於此石屋山在句容縣南六十里乾道志云吳王使歐冶鑄劍於此西有鑄劍坑青龍山在句容縣南七十里一名洞山上有石窟真誥云與華陽洞通其中堂臺簾竈及仙人掌俱因石狀以名傍有峴曰牧門洞前怪石森列而流泉貫其中歷旱不竭絳巖山唐書地理志在句容西南三十里有絳巖湖絳巖故赤山天寶中更今名按舊志謂山一名赭山漢丹陽郡有赭山漢丹陽郡縣取名本此今考漢丹陽縣治在今府西南五十里俗謂之小丹陽非今句容縣境晉書志丹楊縣丹楊山有赤柳在西也項安世家說云丹楊以多赤柳在丹楊山晉書南史並用楊字與句容之絳巖懸隔矣甲山在句容縣西南五十里宋景定間僧行昱愛其山奇勝甲於左右諸山因名姜石山在句容縣西北二十五里有梁南康簡王墓射烏山在句容縣西北五十里湯水二泉其源皆出此又有巖山近琅琊城胄山在句容縣北三十五里其山髙聳如介胄因名俗訛紂山華山在句容縣北六十里與上元縣界亦名花山戚氏志云秦淮之水源於此方輿記云梁武帝登此山問何如蔣山髙薛對曰華山髙九里似與蔣山等泉水倍多府志云明萬厯中李太后夢登一山皆蓮遍訪得此山建銅殿一與武當金殿同賜額聖化隆昌寺今藏經尚存竹里山在句容縣北六十里元和郡國志云山間有長澗髙下深阻方輿記云山途欹險號曰翻車峴晉劉牢之至竹里擒王恭帳下督顔延宋武帝軍於竹里破桓元將吳甫之是也六朝時京口至建康皆取道於此戍山在句容縣北六十里北臨大江府志云相傳劉宋沈慶之曾此防戍崙山在句容縣東北五十里府志云東連駒驪山四十二福地也金陵志云唐肅宗時謁者伍達靈在此山得道去後記於絶頂石壁今尚存髣佛可辨下有伍達靈壇又十里為駒驪山虎耳山在句容縣東三十里一名苦耳山中山在溧水縣東十里元和郡國志云山出兔毫為筆精妙唐宋皆充貢宋周邦彥插竹亭記謂中山為溧水之勝圖經云一名獨山謂孤聳不與羣山接也或轉訛為濁山東廬山在溧水縣東二十五里山形似廬唐十道志寰宇記皆云嚴光曽結廬於此因以為名有水源三一入秦淮一入馬沉港一入丹陽湖丹陽記云縣東有廬山故謂之東廬山非以東廬欲别匡廬也鸞山在溧水縣東南二十五里縣志云巔有育德泉渟渟一窟味甚甘冽中有蜥蜴嵗旱取水禱雨輒應相近有石城山舊有石城院冷水亭遺址回峰山在溧水縣東南四十里金陵新志云上有龍池下有龍泉有水注平陸仙杏山在溧水縣東南四十里舊志云絶頂有杏林及仙人足跡因名又有三仙壇三所及丹井清泉流入丹陽湖一名仙壇山觀山在溧水縣東南五十里山形陡峻有石屋可容多人上有泉注池四時不竭芝山在溧水縣東南七十里並界髙淳溧陽景定志云山産芝草故名有洞數十梅仙洞者漢梅福居之又有李洞泉出沸湧有燕洞産石燕金陵志云宣州田頵舉兵邑人避難於此國朝蕭秉晉有芝山記芝山在邑治東南七十里跨溧陽境逺視之嶐然數阜也山多􅏜石皆黝色鱗次疊疊成波紋大者如獅象如馬牛小者如猿狖如禽鳥嶔崎變態起伏橫側疑神工鬼斧刓刻以成每巨石聚處即隱洞穴舊謂有三十六洞云今可尋者僅六七耳非土人導之不克入入必令一人執松火而前初入之如墮深井暗若長夜先後踵頂相接而下暗中有石級可尋忽至坦處可容數十百人石色紺赤光絢駭目即震澤石不過也所稱古燕洞亦名堆霞入穴數十武忽排空矗起丈餘轉數武又變一狀每一折旁引一門下坦可數十武中有石臺平起如席如兒云是仙子棋枰遊者至此得以憩焉仰視之螺旋而上火光漸弱憾不能窺其頂也石燕見人輒驚飛鳴聲殷雷久之潛入竇穴昔黃山人所謂仍落為石者妄也旁列三門亦漸狹委蛇陡峻其盡處一水如帶闊可五六尺深淺莫測遙望若有岸相對人莫敢踰所謂仙凡隔處端在此矣黃龍洞僅如竇數折而下有巨石懸覆如板廣三四丈其色白作龍蟠形皆石液所凝宛如刻畫者又一竇直上有大士像懸石壁間名觀音洞梅仙洞初入險陡如鋸鋒客橫行其上作蟹狀手攀東則足抵西下視深暗如無底而坦處又堪坐卧天井洞景獨外露不類他洞峰石叠甃如崩如墮忽一坦處方幾畝仰視髙三四丈如天井故名旁有穴兩折而下不甚深平如屋風雨不及可陳几榻凡此數洞皆在邑界跨溧陽境者不悉志大約此山洞皆通連或為榛莽所封或為亂石壅塞安得遊人如謝康樂之好事柳子厚之於馬退諸山則靈跡異境必標而出之不致隱晦為幽壤耳又洞中最異者山泉洳濕泥水滴瀝欵汚人衣履然入者茍不言則不稍染乂絶無蚊豸虺蜴之屬誠一邑之奇觀惜地界僻左名流罕至莫紀其勝晉故從所覩而率記之㔶船山在溧水縣南十二里一名感泉山建康志云山陰有青絲洞泉脈澄泓四時不竭南有張沈二士書堂井臼遺址不知何時人杜城山在溧水縣南十二里縣志云隋大業末杜伏威嘗屯兵於此因名明末有僧結廬其巔曰巢雲庵泉木幽勝無想山在溧水縣南十五里上有唐建禪寂寺南唐韓熙載讀書臺址古檜銀杏皆唐宋間植有招雲亭元謝瑛為記山頂有泉下注巖石間成瀑布清洪山在溧水縣南三十里上有石龍潭土人嘗采石於此方山在溧水縣南六十里與芒山青龍洞相接石羊山在溧水縣西南三十七里府志云舊名金華山即黃初平叱石成羊處有牧羊仙洞臘山在溧水縣西南六十里府志云跨石臼湖東接鳯棲西迎雀壘山翠湖光極雲水烟嵐之勝鳯棲山近石臼湖雀壘在湖中乳山在溧水縣西三十里巖石巉削山下有玉乳泉渟注澄徹味極佳明末閩人林茂之隱此烏山在溧水縣西北二十五里赤虎山在溧水縣北三十三里金陵志作赤龍大人山在溧水縣北三十五里瀨渚筆乘云一峰崛起聳拔特立淮水繞其前遙望蔚然深秀鎮山在髙淳縣東北一里縣志云髙淳古鎮也山因以名自石臼湖迤邐而來濱於固城縣治在焉學山在髙淳縣東一里先為朝元觀後建儒學因名大遊山在髙淳縣東三十五里欲雨上出雲氣頂建北極廟南有石牛古蹟遊子山在髙淳縣東四十里金陵志云山周十里上有石壇舊傳孔子適楚經此遮軍山金陵志云髙五十五丈周二十二里在髙淳縣東五十里山北有水入固城湖湖濱有畫睂山與此山並峙城門山在髙淳縣東五十里又荆山在縣東六十里木城山在髙淳縣東六十里縣志云突起平地甚奇峻昔紅巾之亂民樹柵其上守之因名相近有饒山有泉水旱不涸秀山在髙淳縣東南三十里金陵新志云西南有水下注平陸舊傳有仙過此以鞭畫路形如之字四面皆應今四之字見存山上松柏旋伐旋生亦異驗云花山在髙淳縣東南四十里上産白牡丹名曰仙花舊傳有看花臺大山在高淳縣南六十里其水北流入固城湖鳯凰山在江浦縣治後相傳有鳯凰集此因名又名曠口山岡嶺回環與定山西華龍洞諸峰綿亘數十里為一邑屏障南望長江右有泉名清惠平山在江浦縣浦子口東門外二里大江奔注此山適當其衝壁立千尺其上有平山閣陰陵山在江浦縣南五十里舊志云相傳項羽迷失道處四潰山在江浦縣西南七十里舊志云項羽從二十八騎走東城至此為漢兵所圍羽依山為陳潰圍奔烏江因名石上有馬迹一名四馬山以上二山亦見和州馬鞍山在江浦縣西十里列嶂若屏其巔有飲馬池冬夏不竭山後有觀音洞西華山在江浦縣西十五里縣志云峰巒巍峙特冠羣山有蓮華峰丈人石藏雲塢北澗南澗玉井泉諸勝為邑之最龍洞山在江浦縣西二十五里西接天井東連西華馬鞍定山綿亘甚逺怪石巉巖中有石洞相連洞中産龍禱雨多應天井山在江浦縣西三十里龍洞山之西上有石罅深不可測東龍山在江浦縣西四十五里縣志云上有祈澤壇清泉白石林壑幽美唐張籍讀書處尚有遺址對峙者有西龍山又縣西六十里有翠雲山福龍山在江浦縣東北十二里一峰陡聳俯瞷大江南北如出牖下怪石巉巖中饒巖洞上有龍池冬夏不竭陳廷策記云上徑仄陡忽轉平衍為玉虛觀納光激景神居福地於斯為勝定山在江浦縣東北二十五里以北屬六合有獅子峰達摩宴坐石珠泉諸勝明莊文節昶居此其右有玉屏山平衍可坐千人眺矚甚逺六合山在六合縣南六十里即江浦定山也有寒山獅子石人雙雞芙蓉妙髙六峰對峙環合縣以此名按江浦縣明洪武九年析六合縣滁和二州置今五峰在縣境唯獅子峰入江浦境中山多泉石巖壑之勝宣化山在六合縣南六十里有宣化鎮按六合縣志載嘉定志云晉安帝置秦令於六合宣化鎮舊志據之而改秦令為秦郡以六合故棠邑安帝改為秦郡也然宋書志有秦令元嘉六年以臨涂併秦即六合之地況鎮名宣化冠以六合則六合何名若是縣名則名從隋始詳考通鑑隋紀晉王廣帥大軍屯六合鎮桃葉山張舜民曰桃葉山即今瓜步鎮之境唐季又有六合鎮將張約則是瓜步鎮又名六合鎮宋史云張浚議築宣化城即宣化鎮地理通釋吳氏曰大江之南十郡之間其要不過此渡下流最緊者建康之宣化本六朝鎮戍之要地當是嘉定志云六合宣化二鎮傳寫脫二字也桃葉山在六合縣南六十里舊志云隋伐陳詣冶山祗垣寺問解脫禪師何以克陳對云乘桃必克乃造桃葉舟渡江息此山傍故名晉王山在六合縣南六十里府志云舊有晉王城相傳即隋伐陳時晉王廣所築山之西為宣化山瓜步山在六合縣東南二十里陸游入蜀記云瓜步山蜿蜒蟠伏臨江起小峰頗巉峻絶頂有元魏太武廟廟前大木可三百年一井已眢傳以為太武所鑿不可知也太武以宋文帝元嘉二十七年南侵至瓜步鑿瓜步山為蟠道於其上設氊廬大會羣臣疑即此地周世宗伐南唐齊王景達自瓜步渡江距六合二十里設柵亦此地也小帆山在六合縣東南四十里寰宇記云即小石山也大江中流矗起石峰參天若張帆然又以白石如礬俗呼礬山上有落帆將軍廟又名石帆舊志云山北有出佛洞山之東即黃天蕩江流至此甚險今則洲生江狹稍為安瀾矣赤岸山在六合縣東南四十里寰宇記云山髙十二丈土色皆赤臨大江故名晉郭璞江賦鼓洪濤於赤岸羅含詩赤岸若朝霞杜甫山水圖歌赤岸水與銀河通王維詩帆映丹陽郭楓攢赤岸村皆指此靈巖山在六合縣東十五里嘉定志云山無鋭峰巖巒層聳四面如一郟滂以為巖峻常有靈瑞故名有偃月巖蔡老人洞龍王泉鹿跑泉瑪瑙澗方山在六合縣東四十里四面平正故曰方山宇文周置方州梁建寺其上曰興雲古樂府云聞歡逺行去相送方山亭即此地也橫山在六合縣東北三十里山形平望若橫與江寧縣南橫山頗相類故亦名橫山府志云元魏於此置橫山縣山陽有禪證寺即梁昭明讀書堂也馬頭山在六合縣東北三十五里山峰雄秀絶頂一石髙丈餘中一穴水清而不竭莫測深淺世傳有龍居焉苻融山在六合縣東北三十五里嘉定志云苻融嘗城此因名俗作芙蓉城距五里有塔山冶山在六合縣東北五十里府志云巑岏九十九峰跨六合天長二縣相傳吳王濞冶鑄處今上有漢爐韝將軍廟蜀岡自此始白土岡在上元縣東北十五里北連鍾山南接秦淮其土色白故名隋書云賀若弼於此擒蕭摩訶國朝順治十六年總督郎廷佐大破海冦於岡下金陵岡在上元縣西北龍灣路上金陵新志云秦厭東南王氣鑄金人埋於此後莫知所在落星岡在江寧縣西南三十里一名落星墩南齊書云陳顯達平旦以數千人登落星岡新亭諸軍遁還又唐李白金陵江上遇蓬池隱者詩自注云時於落星石以紫綺裘換酒為歡按落星石在此岡之下明焦竑落星岡懷古詩樓堞新亭戍山川自昔多曾聞沽酒客一著綺裘過可兩證也土門岡在江寧縣聚寶門外長千里即宋楊邦乂殉節處今有褒忠祠及剖心處三字石碣墓在岡上石子岡一名石子墩在江寧縣南十五里吳志云建業南有長陵在石子岡孫峻害諸葛恪投於此輿地志云宋大明中起觀風亭於上云即新亭岡古送行處按石子岡有三西岡在安德門外與白楊路近東岡雨花臺下梅岡是也中岡乃諸葛恪所投處即城南之鳯臺岡大鳯岡在溧水縣西五里舊志云春秋時有鳯凰飛至此岡故名或傳大為待桃花岡在髙淳縣東南十五里上有九十九墩蜀岡在六合縣東北三十里南接儀徵東連江都綿亘數十里一名崑崙岡鮑照蕪城賦云軸以崑岡即此蓋六合為蜀岡之首而蕪城其尾也黃悅嶺在江浦縣北十五里縣志云兩峯髙聳石脊連亘地號險阻明初始鑿山開路遂成南北孔道駱駝嶺在江浦縣東北二十五里定山之北重山復道石磴崎嶇東葛城達浦子口必經此地為大江以北門戶燕子磯在上元界觀音門外磴道盤曲而上丹崖翠壁淩江欲飛絶頂有亭能攬江天之勝聖祖仁皇帝南巡屢幸此附明吕柟遊燕子磯記己丑二月王子崇邀陸伯載及豫同遊燕子磯登𢎞濟寺寺西則觀音巖也怪石礌埀蒼黛參差上接雲霄而大江自龍江關西來直過其下觀音閣亦傍巖下就江漘築基上又竪九柱皆丹柱上棚棧構閣閣三面皆欄杆憑之瞰江若在樓船頂立也是時晴見萬里日映碧流江豚吹浪上下西望定山如蛾睂東指瓜步如丘垤他山皆閃閃冥冥如落鴈蹲鴻不可辨矣昔豫在解州嘗遊龍門眺砥柱登流丹亭汲河烹茶以弔禹墳至此乃勃然興懷將天下奇觀尚有過斯二者乎閣東崖有白巖喬公篆書刻石上而子崇伯載至乃復同升閣上流覽歎賞列席懸巖上對江而酌酒肴既行卒爵欲往遊燕子磯乃招二篙師泛舟行至觀音港登漢壽亭侯廟先至水雲亭其扁為豫友景前溪書精采如神乃面江小坐遂上謁漢壽亭侯祠左有大觀亭亦前溪書至此看江日隱斷雲烟霞霏微蒼茫無際矣遂攀松捫蘿以上燕子磯磯皆巉石壘起水圍三面其石罅猶見江轉磯底可以髙覽八極也乃坐中磯道士曰五七年前江衝磯前深不可測自立關廟後水頗逺磯而去今南徙磯東數百家矣二君皆補和前詩子崇又命行酌興酣北望泰山東瞰滄海灝氣縈回靈光掩映不知此身之在天地間也赤石磯在江寧縣東南城外長河東來有赤石枕中流居人競種石榴花每盛夏時緣堤岸燦若霞錦為畫舫歡遊之所華陽洞在句容縣茅山泉洞記云洞內東西四十五里南北三十五里四郭上下皆石空懸百七十丈陰路所適七塗九原四方交通五門闔闢小徑阡陌不計也飛鳥交橫風雲蓊鬱原阜壠堰草木水澤與外無異所謂第八洞天以此青龍洞在句容縣茅山洞前多怪石奇秀森列流泉厯旱不竭乾道志云洞口才二尺餘僅可容人傴僂而入其中平廣深不可測與諸洞暗通洞外大石有窪處狀如人跡俗呼仙人跡大江金陵志云府城在大江東南自府西南一百十里之慈姥山至府東北之下蜀岡凡二百餘里一名揚子江江乘記云大江自縣西一百二十里承當塗分觜浦上田為界紆回二百九十三里與和州烏江及揚州六合並分中流為界西引蜀流南下交廣東㑹滄溟北達淮泗自大禹所鑿之迹無不通焉吳録云魏文帝至廣陵臨江觀兵權嚴設固守帝見波濤洶湧嘆曰固天所以限南北也遂歸胡三省通鑑注云江水東流自武昌漸漸向北蓋南紀諸山所迫陂池之勢漸使之然也至於江寧江流愈北建康當其下望歷陽壽陽皆直西故建康謂歷陽皖城以西皆曰江西而江西亦謂建康為江東建康謂采石為西州京口為北府皆地勢然也府志云今府境之江南岸上自慈姥浦下至下蜀港二百里而遙北岸上自浮沙口下至采溝不及二百里江之支流旁出者大曰河小曰港曰溝曰渡石激水曰磯水中可居者曰洲兩山間曰夾縈回曰套水所注曰浦江流南北遷徙今昔逈殊異時江泊石頭後徙而北今又漸南然尚去石頭十餘里兹志其可知者自慈姥浦而東下為鐮刀灣為烈山港有磯突出湍間名亂石磯又東北即白鷺洲其南岸曰犢兒磯上接江寧浦口下為大勝河自大勝河以東有水數曲曰響水溝燈盞溝上新河中新河下新河皆瀕江要地其北岸則芝麻河穴子河王家套八字溝皆列墩瞭望處也又有洲曰長洲白沙梅子句容秀才火藥等洲皆在江浦境南岸自下新河而東為草鞋夾其外為道士洲上有屯駐處曰江心營近南曰護國洲中口洲自道士洲直抵北岸為浦子口又東以達於瓜步其濱江諸洲曰攔江曰工部官洲老洲柳洲趙家洲曰匾擔洲洲東為匾擔河其北即滁口河也江流至此亦曰宣化漾有洲亦名新河其下為􅈨山山屹立中流石色白類􅈨故名又數里為西溝近黃天蕩為東溝二水自江出皆折而西與儀徵縣接六合江盡此矣南岸中洲口而下有山踞江而出者曰焦家觜又東曰觀音山水曰觀音港港口聳石下瞰江水曰燕子磯歷濤山唐家渡袁家河東陽港遂接黃天蕩中有洲屬上元縣其上為草場自龍潭而東洲渚限隔有斜臘洲太子洲洲外為老鴉夾又東為天寧洲皆句容界其支水分流曰白家溝楊家港雙溝港羅泗港而邪溝尤為津要自此而東遂與鎮江接此近時江道之可紀者也珍珠河在府北宋行宫後金陵志云陳後主泛舟遇雨水生浮漚宫人指為珍珠因名通護龍河南唐築城後惟西北僅存護龍河在府東北宋鑿即舊子城外三面濠也府志云在上元縣治東北引而南合於青溪今堙廢逾半靖安河在府東北靖安鎮宋吳聿記自金陵抵白沙江流曠數百里波濤洶湧其尤者為樂官山李家漾宣和六年發運使盧公得古漕河於靖安鎮之下缺口取徑道於青沙夾取北岸穿丹月港由港尾越北小江入儀徵新河以易大江百有五十里之險以上俱上元縣新開河在府治西南韓世忠碑記云宋建炎四年開自三山橋厯石城定淮諸門由草鞋夾以達於江即下新河也新河在府西江東門外五里通大江曰中新河又名直江口設關防禦稍南出大江曰上新河以通市舶以上俱江寧縣胭脂河在溧水縣西十里府志云其地有胭脂岡因名明初命崇山侯李新鑿石穿流通蘇浙糧運於此胥河在髙淳縣東南四十里縣志云春秋時伍員伐楚鑿河由鄧埠抵廣通鎮因名澄溝河在髙淳縣西三十五里宣水由此入蕪湖太平近宣岸水濁此水獨清浦子口河在江浦縣東二十里源出定山由浦子口西入江沙河在江浦縣東三十里府志云宋天禧中范仲淹領漕事以大江風濤之險開此河引江水支流下至瓜步入江即六合縣之長蘆河也按宋會要天聖三年發運使張綸請開真州長蘆口河屬之江與志異後河在江浦縣西北三十五里源出廬州舊梁縣至縣境茅塘橋出瓜步府志云即滁河之下流也冶浦河在六合縣東三里自冶山流入與滁水合滁河在六合縣西南源出廬州舊梁縣經滁和界流入東南三十餘里至瓜步入江滁古作涂通鑑辨誤吳作堂邑涂中堨令涂中之水以為塘也今滁州之全椒六合古堂邑地三國時謂之涂中又北齊太建五年於秦郡置秦州州前江浦通涂中唐滁州六合縣即其地後湖在府北二里即𤣥武湖南史元嘉二十三年築北堤立𤣥武湖於樂遊苑北宋史河渠志云知升州丁謂言城北有後湖往時給為民田凡七十六頃出租錢數百萬蔭溉之利遂廢今欲迹舊制復治岸畔疏為塘陂以蓄水使負郭無旱嵗詔從之六朝事蹟吳寶鼎元年開城北渠引後湖水流入新宫今城北十三里有古池俗呼為後湖是也丹陽記云後湖一名練湖晉元帝時為北湖肄舟師於此宋元嘉中有黑龍見改為𤣥武湖又名蔣陵湖秣陵湖習武湖及昆明池飲馬塘放生池諸名吳宋皆嘗引其水以入宫牆苑囿南唐近事云周回四十里山川掩映如畫六朝舊迹多出其間明初貯天下圖籍於湖中洲上附明計宗道過後湖記天下版籍盡載貯後湖南京户部官率嵗一往磨勘正德壬申秋豫叨職寄斯役自八月至十月始訖事凡過湖必出太平門命舟行可七八里許一望渺漫光映上下微風播揚文漪聿興蕩漾烟波之上莫不情暢神爽若遊仙焉豫間立顧其嵯峨霄漢之表王氣鬱蔥而峙乎東南者鍾山也疊連如屏如幃在西北者幕府山也巒嶺偃蹇盤伏於地而松森其上者覆舟山也挺拔而凸出城頭殿角參差浮圖聳空者雞鳴山也山東西一帶列如懸榜者世傳臺城也崚嶒冒水而出者島嶼也傍視三法司隱隱錯落雲水之􅏰重岡疊阜遙連於其外巋然而鸞鳯峙騰然而蛟龍走矣其中逺近芳洲相聚如五星紅紫烟花畢絢如匹錦鷗鷺鳬鴻載飛載鳴鰷鱨鰋鯉以潛以泳則已目飫而心怡矣忽驚風暴作洪濤舂撞篙人惶懼拿舟艤岸而行經敗荷聞香氣猶襲人浮藻亂荇牽舟綴楫乃引入曲渚兩岸薈蔚須臾抵小陂遂捨舟以陟焉命𨽻翦荆分莽排霧穿雲逡巡而進見數處頺垣廢址意前朝遺跡令人慨歎而叢林䝉翳追探前路尚空衆共憊焉或藉草坐茵箕踞少憩復乃望一髙丘隸指曰此相傳郭仙墩也衆狙猱以上四圍樹林蔽日復下故道向新建册庫過石橋延佇其上騁望雲水茫茫清颷颯颯遂相與擕手入舊庫之洲攝齊而升𤣥武㕔則黃門趙君惟賢已先渡見豫輩殊訝既而聞述所遇則又曰是何奇也豫往反數矣而未有若諸君所遇者衆亦相與慰喜以為非因風之故則誰使之一探此奇哉凡以事晨至及暮而歸則見日光射水晚霞相蕩回視湖上諸宇在蒼烟杳靄間不啻蓬萊閬苑然豈不信為勝地哉昔歐文忠公以金陵錢塘山川人物之盛各為一都㑹錢塘莫美於西湖金陵莫美於後湖固遊冶之所趨也我皇祖奮出江表收天下版籍建庫而儲之於此特設科部官司之禁非公遣不得至則凡好遊者雖慕幽遐瑰瑋之觀無因可及而吾儕今獲因公而至而又探奇於無心之㑹豈非至幸哉國朝余賓碩𤣥武湖詩序建康實録云吳寶鼎二年開城北渠引後湖水流入新宫丹陽記云後湖一名練湖一名蔣陵湖徐爰釋問云本桑泊晉太興三年始築長堤以壅北山之水又名北湖宋元嘉中黑龍見立三神山於湖上更名𤣥武湖孝武大明中肄舟師於此亦謂之昆明池復於河側作竇通水入華林園天淵池南唐邇事云金陵城北有湖周回數十里一日馮謐舉𤣥宗賜賀監三百里鑑湖曰余非敢望此但得賜後湖亦暢平生也徐鉉曰主上尊賢下士常若不逮豈惜一後湖所乏者知章耳熙寧八年王安石奏廢為田開十字河立四斗門以泄湖水跨湖為橋以通往來嵗久湮塞今所存者十分之二耳明初置庫於湖中以貯宇內版籍今廢洲傍有小丘名郭公墩或云郭璞葬此太子湖一名西池又名樂遊池在府北六里吳宣明太子所創晉明帝為太子修西池養武士於內張陳湖在府治西北石頭城後府志云相傳晉軍與蘇峻戰處穩船湖在府治西北金川門外府志云明初引江水瀦以泊舟半陽湖在府東北四十里一名半湯泉南徐州記云水同一壑而泠熱相半民引熱水溉稻一嵗再熟以上俱上元縣莫愁湖在府西三山門外相傳盧莫愁居此因名附明顧起元莫愁湖考江左今有莫愁湖在西城南按古樂府有莫愁樂石城樂唐書樂志曰石城有女子名莫愁善歌謡石城樂第二歌云陽春百花生摘插環髻前捥指踏忘愁相與及盛年莫愁樂云莫愁在何處莫愁石城西艇子打兩漿催送莫愁來尚未詳也莫愁盧家女子善歌唱嘗入楚宫李商隱詩如何四紀為天子不及盧家有莫愁是也莫愁村今在承天府漢江西石城在州西北晉羊祜所建鄭谷詩石城昔為莫愁鄉莫愁魂散石城荒江人依舊棹舴艋江岸還飛雙鴛鴦王橫詩村近莫愁連竹塢人歌楚些下蘋洲又沈佺期詩盧家少婦鬱金堂即此也按通考載梁武帝詩洛陽女兒名莫愁云莫愁盧家女洛陽人則莫愁又有兩人矣三城湖在府西南七十三里龍口山下湖中舊有三小城因名婁湖在府東南十五里輿地志云吳張昭所鑿昭封婁侯因名宋時築為苑南史云沈慶之有園舍在婁湖一夜攜子孫徙居之以宅還官陳書紀云太建十年立方明壇於婁湖以上俱江寧縣絳巖湖在句容縣西南三十里一名赤山湖府志云吳赤烏中築赤山塘引水為湖厯代修築唐天寶時改為絳巖唐書地理志云麟德中令楊延嘉因梁故隄置後廢大厯十二年令王昕復置周百里為塘立二門以節旱潦江城湖在句容縣西北六十里丹陽湖在溧水縣西七十里髙淳縣西南三十里府志云湖周一百九十五里東連石臼固城二湖其源有三出徽州府黟縣者為舒泉出廣德州白石山者為桐水出溧水東廬山者為吳漕水俱匯合於丹陽湖分二流一西出蕪湖一北出當塗姑孰溪俱入江石臼湖在溧水縣西南四十里髙淳縣西二十里西連丹陽湖府志云一望渟泓中有軍山塔子山馬頭山雀壘山固城湖在髙淳縣西南五里西通石臼丹陽二湖與當塗宣城分界湖水舊由宜興入太湖後築五壩遂與太湖隔秦淮在府治東南相傳秦時所鑿丹陽記云秦鑿金陵方山斷處為瀆即今淮水經城中入大江是曰秦淮建康實録云秦淮水舊名龍藏浦有二源一出句容華山南流一出溧水東廬山北流合流於方山埭貫城中西注大江其水經流三百里地勢髙下屈曲自然不類人功疑非始皇所鑿也孫吳至六朝都城皆去秦淮五里吳時夾淮立栅十餘里史所稱栅塘是也梁天監九年新作緣淮塘以防漲溢又作兩重栅皆施行馬自石頭至方山運瀆總二十四渡皆浮航往來亦曰二十四航楊吳時改築金陵城乃貫秦淮於城中橫塘在府治東南金陵覽古云吳大帝自江口緣淮築堤謂之橫塘左思吳都賦所云橫塘查下樓臺之勝天下莫比者也自橫塘而北接於栅塘即今秦淮徑口矣以上俱江寧縣青溪在府治東七里南史作清溪建康志云青溪水發源於鍾山接於秦淮逶迤九曲有七橋跨其上建業實録云吳赤烏四年鑿東渠通北塹以泄𤣥武湖水逶迤十五里名曰青溪自楊吳城金陵青溪遂分為二今自竹橋西入舊城城濠者乃從潮溝西南流之故道自舊內旁南流經淮清橋入秦淮者城中所存之一曲也長溪在府東南六十里丹陽記云湖熟前有長溪受句容赤山湖水入秦淮梅花水在府治北觀音門內興善寺源自石罅中出烏龍潭在府治西北石城門側潭畔園林環列亭榭參差為遊覽勝處府志云相傳有烏龍見故名下蜀港在府東北百里一名官港以上俱上元縣大城港在府治西南府志云合板橋新林等浦水由大勝關入江為江流險厄處旁有隴阜亦曰大城關蔡洲在府西南十二里府志云蔡洲周回五十三里一名蔡家涇其别渚為張公洲通鑑晉咸和五年陶侃舟行直抵石頭至蔡洲胡三省注云蔡洲在石頭西岸又梁承聖元年王僧辨督諸軍至張公洲注云張公洲即蔡洲白鷺洲在府西三里與新林浦相對宋曹彬破南唐兵駐於此建康志云秦淮源出句容溧水兩山間合流至建康之左分為二支一支入城一支繞城外共夾一洲曰白鷺太白所謂二水中分白鷺洲者也府志近以三山門外西關中街水環繞處當為白鷺洲蓋沿襲舊名非其地矣烈洲在府西南七十里以在烈山下名內有小河避風泊舟以上俱江寧縣蟹浦在府西北十六里輿地志云白下城西南有蟹浦源出鍾山北流九里入江齊崔慧景軍敗單騎走蟹浦是也江乘浦在府西北十七里史記云秦始皇東遊還過吳從江乘渡即此其浦發源石城山東入江舊因為縣名白社浦在府東北二十五里金陵故事云發源鍾山西注秦淮一名鍾浦以上俱上元縣新林浦在府西南二十里宋開寶中曹彬破南唐兵於新林浦即此水經注云江水經三山又湘浦出焉水上南北結浮橋渡水故曰版橋浦江又北經新林浦輿地志云梁武帝從新亭鑿渠通新林浦胡三省通鑑注建康府城西南江寧鎮北有版橋市其地與新林相近謝眺所云新林向版橋張舜民曰出秦淮西南行循東岸行小夾中十里至版橋店建康實録云新林南上十里至孫林又南上十里至版橋查浦在府西石頭城南十里大江南岸建康實録云晉陶侃屯查浦李陽與蘇逸戰於查浦盧循犯建業宋武帝栅石頭斷查浦以拒之皆此浦南上十里即新亭秣陵浦在府南五十里輿地志云浦以縣名源出竹堂山北流八里入葛家湖又十里入長溪合於秦淮江寧浦在府南七十五里府志云源出當塗縣界長三十里經故江寧縣入大江南史云侯安都襲破齊兵於江寧浦口是也蘼蕪澗在府治東南青龍山南唐故事云齊處士劉瓛居此為儒林之宗年四十未婚其友為娶王氏乃就澗折蘼蕪而去躍馬澗在府南五里一名南澗宋有南澗樓以上俱江寧縣芳草澗在六合縣東水入冶浦河瑪瑙澗在六合縣靈巖山下石有五色瑩秀可愛桐樹灣在府東秦淮上鎮淮橋東舊植桐樹甚繁因名宋人稱為桐林汝南灣在府東八里當秦淮曲折處晉汝南王渡江家於此運瀆在府治西運瀆志云吳赤烏三年使左臺御史郤儉引秦淮抵倉城以通運道今斗門橋南乃秦淮入運瀆處經太平橋與青溪合湖溝在府治西客座贅語云吳赤烏中鑿湖溝以引江水連青溪南抵秦淮西通運瀆北接後湖今舊內城下流入竹橋者其故迹也以上俱江寧縣河子溝在六合縣東南二十五里舊名急流江宋淳熙初所開新河之下流入於江珍珠泉在江浦縣東北二十里定山西南山麓其地有泉噴出若散珠遂以為名東流入於江湯溝泉在江浦縣北三十里駱駝峯北流入三叉河達於江附明陳沂金陵諸水圖考金陵在大江東南自慈姥山下至蜀渡古稱天塹臣浸之境也秦鑿淮吳鑿青溪運瀆楊吳鑿城濠宋鑿獲龍河宋元開新河國朝開御河城濠今諸水交錯互流文脈靡辨據經考之自方山之岡壟兩涯北流西入通濟水門南經武定鎮淮飲虹三橋又西出三山水門沿石城以達於江者秦淮之故道也自太平城下由湖溝南流入大內又西出竹橋入濠而絶又自舊內旁繞出清橋與秦淮合者青溪所存之一曲也自陡門橋西北經乾道大平諸橋東連內橋西連武衛通濟城內旁納秦淮又自通濟城外與秦淮分流繞南經長干橋至於三山水門外與秦淮復合者楊吳之城濠也自升平橋達於上元縣後至虹橋南接大市橋者護龍河之遺跡也自三山門外達於草鞋夾經江東橋出大城港與隂山運道合者皆新開河也東出青龍橋西出白虎橋至柏川橋入濠者今大內之御河也若城外落馬澗諸水不能悉載焉江南通志卷十一
