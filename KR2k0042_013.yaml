body:
  text: 江南通志卷十四輿地志山川四揚徐工府太海通三州揚州府金匱山在府城西北七里郡邑舊志云明秀水吳秀守揚州濬河積土而成樹以梅花名曰梅花嶺嶺前有史可法墓蓋藏衣冠處也北洋山在府西三十里一作白洋山席帽山府西北十二里得勝山在府西北三十里宋紹興初韓世忠軍捷於此因名小金山在府城北門外名勝志云其地有雲山閣環碧亭平野堂諸勝為郡人遊觀之所今廢浮山在府城內西隅石色如鐵不生草木康山在新城內東南隅相傳濬河時積土所成明正德中武功康海罷官來此與客宴飲彈琵琶處有康山草堂以上江都縣甘泉山在府西門外三十里嘉靖維揚志云山有七峰聨絡如斗平地錯落諸圓岡凡二十八如列宿拱斗然北上有井泉甚甘故名分縣得名亦以此盤古山在府南門外三十里劉家集烏山在府城西九十里以上甘泉縣天目山在泰州東四十里相傳有王仙翁嘗居此山上有雙井相對如目水甚清冽泰山在泰州西南壘土而成其髙數仞以州名也亦稱太山墩羅浮山在泰州西北五里南畿志云在藪澤中不為水沒遙望如羅浮然因名茅山在泰州東北六十里嘗生香茅因名中洲山在泰州東北百二十里西溪鎮北范文正公監稅日壘土為山東觀滄海西望沃壤為一鎮之勝地神居山在髙郵州西南六十里舊志云南齊亘公嘗結庵於此有煉丹井又有排牙石人計其數輒忘山不甚廣而股趾盤礴甚大傍占數墟遂為州境之望東山在髙郵州治東北隅上有文遊臺城子山在儀徵縣北六里其形似城南畿志云魏文帝於此築東巡臺臘山在儀徵縣北三十里上有天井池冬夏不竭又有白龍廟宋郡守王大昌禱雨有應小山在儀徵縣西北十五里宋大中祥符間奉詔建天慶儀真觀地大銅山小銅山在儀徵縣西北二十五里二山相接南畿志云相傳為吳王濞鑄錢之所冶山在儀徵縣西北四十里林疏而秀其上多石北有牛頭山聳峭屬雲其峰九十有九二山皆接六合縣界雞留山在儀徵縣西三十五里舊志云伍子胥欲報浣紗女而不知其家乃留雞於此山祀之因名橫山在儀徵縣西三十五里元魏於此置橫山縣與方丫二山鼎峙俱接六合縣界方山在儀徵縣西四十里有王子石鳳凰橋黃龍池舊志云隋六宫駐此遂置方山府了山在儀徵縣西四十里以兩峰形似而名一名鴉山俗謂之奶山舊志云唐末黃巢屯兵其間寨基猶存靈巖山在儀徵縣西七十里舊志云唐僧神建立道場於此曰靈巖寺山有偃月巖鳳凰臺鹿跑泉白龍池瑪瑙澗瓜步山在儀徵縣西七十里臨江峭絶互見六合縣青山在儀徵縣西南二十五里南臨大江神山在儀徵縣西南二十五里山産細石五色皆具上有九江王廟焦家山在儀徵縣東北五里舊志云林壑蔥秀亦可登眺上有三將軍廟昭陽山在興化縣西四里有昭陽廟相傳楚令尹昭陽食邑於此雲山在寶應縣西南百二十里接盱眙界山能興雲雨故名上有白龍潭水常不竭又有白龍廟仙人洞駱駝嶺在府北一里今建縣學蜀岡在府西北四里綿亘四十餘里西接儀徵縣界東北抵茱萸灣隔江與金陵諸山相對上有平山堂一名崑岡鮑昭蕪城賦軸以崑岡是也洪武舊志云揚州山以蜀岡為首上有蜀井相傳地脈通蜀寰宇記云蜀岡有茶園其味甘香如蒙頂蒙頂在蜀故以名岡郡人藝花者亦多居此國朝潘耒平山堂賦伊兹堂之締構洵宏敞而寡儔超埃溘而特起踞名都之上遊崇臺瑰其天造兮華榱鬱乎雲浮窮地勢於南條兮見江山之相繆苞牽牛而絡婺女兮納埃風乎不周怊惝恍於虛無兮渺仙靈之所留爾其託體則平岡陂陀西走滁濠支阜屹立削成增髙其面勢則宅岡之陽居乾之位觀宇回環林薄周被爾乃斬懸巖以纍砌規廣阿以築堂旁羅桂楣仰承杏梁飛宇周閣鱗鱗將將觚稜詣若騰若翔塗丹錯碧反景流光逺而望之巃嵸參差若神山之出海見銀闕也仰而窺之碅磳巍峨若射的之在空植箭栝也容兮如幄崒兮如冠霧翕雲舒不可乎得原若乃踐平皋經長坂步廣除臨絶巘瀏覽有無獨察近逺前曕揚土之博大兮原隰紛其錯重綴麗譙於連星兮壯干雉之金墉天塹劃夫神皋兮屬赴海之白虹層山回顧於秣陵兮矗三茅之仙峰左眺海陵原田每每熬波漉鹽利盡東海右瞰揚子銅陵嶕嶢即山鑄冶吳濞以饒後巨浸之湯湯兮沐日月於中央泄斗門於𨝍溝兮轉舳艫於帝鄉泛厯覽其無垠兮蹇躊躇以相羊至如朝光絢野暝色騰陸晴景澄鮮微陰霡霂變合一瞬態窮萬族長楊垂絲大隄水平芙蕖含華的皪芬馨怒濤瀺灂於曲江兮風雪颯灑於蕪城物無隱之能遁狀無奇而不呈耳目為之滌蕩天日為之開明斯誠臺觀之巨麗海表莫之與京者也於是邦尊伯郡牧來遊來豫弭節停騶怡情遣慮賓從詳雅爼有序突觀夫風土之清嘉與民物之阜庶山川之形便謡俗之遷注調燥濕於徽絃齊六轡之柔馭遙興逺思超乎獨喻其或大夫君子善辭能文比才曹劉方藻卿雲期春秋之佳日聊整駕而索羣參萬象於靈府吐元黃之繽紛亦有都人士女嬉春競往稅青驪泊蘭漿采薕蕪搴宿莾睇關河結遐想極泛濫沛自廣至如遷人放客經奇瑰材鬱風雲乎未感臨岐路而徘徊塊獨遣此羇愁兮憑髙望逺穆乎登臺悵民生之多故羡天地之無涯嵗月忽其如流羌長吟而逺懷原夫揚之為土也襟背江淮綰轂水陸百貨所輳土膏衍沃故漢代疏以為國隋帝巡而作宫唐藩宋閫承侈席豐經營窮乎地軸雕斫極夫天工璿臺瓊館穆若神居者蓋不知其幾而今皆影滅光沈山移壑徙際天驚沙覆地白葦螢飛秀麥之園穴枯桑之壘惟斯堂也創自隆宋著於歐陽遺澤在人勿翦樹棠五百年乃有賢牧實景德而齊光考圖索乎故址新厦屋於崇岡華不侈心儉不陋目髙不絶陵深不藏谷不勞民而就不糜財而足形勢盡東南之美風聲表士庶之愛續前薪於無窮宜可久而可大嗟夫宇宙之悠遐兮惟令名為不刋德業若大車之載兮文采輪轂而使前或鐫功於銅柱兮或沉碑於深淵金石弊而名存兮孰轇轕之使然披竹素之寥廓兮得兩媺其猶比肩承休風而結撰兮尚有述於後賢夾岡在府城東北七里東接灣頭鎮淮子河口與蜀岡相屬桃花岡在府南十五里寰宇記云上有吳王墓龍岡在髙郵州西南九十里新開湖西界天長泗州虎墩在泰州海場范文正築捍海堤起虎墩即此蒙谷在府東北五里竹西亭北皂角林在府南三十里輿地紀勝云宋劉錡伏兵却敵於此馬鞍山在府西北三十五里大海在府東北泰州興化俱瀕於海大江在府南四十里西南由六合縣小帆山入儀徵境過江都東至泰興西界江寧東界鎮江即揚子江也儀徵西南當江濤壯闊之處為黃天蕩江心水名南澪水伊婁河在府南十五里輿地紀勝云即揚子鎮以南至江之運河也隋以前揚子鎮臨江至唐江濱積沙與瓜洲連開元間遂開此河三汊河在府西南十五里江都儀徵瓜洲至此水分三支故名亦名茱萸灣淮子河在府東北十二里一名懷子河自儀徵陳公塘來西北分𣲖接雷塘下達淮子河入運河槐家河在府東北十五里本槐姓所開者自陳公塘引雷塘水東滙淮子河入於運河運鹽河在府東北二十里始於漢茱萸灣遺迹茱萸灣者吳王濞開此通海陵倉隋仁壽中復開以通漕今曰灣頭自灣頭起東入泰州又東至海安入如皋縣界又東南至通州又東至海門又東達吕四場其支派通各鹽場者皆是自運鹽河而東聨絡貫注於通泰興鹽各場者統名之曰串場河山洋河在府東北六十里瀕宜陵鎮一曰山陽河相傳即隋之山陽瀆也北經髙郵入射陽湖白塔河在府東北六十里南通揚子江北入髙郵州界明平江伯陳瑄所穿以行漕舟芒稻河在府城東三十里納諸湖之水以泄於江沙河在府城東十里宋轉運使喬維嶽所開自運河達揚子江今遺迹尚存運河在府治東南即古𨝍溝也吳越春秋云吳將伐齊掘江通淮運糧之河也故為漕河一名官河其南水道有二一自儀徵東行一自瓜洲鎮北行二河合流於揚子橋北經府城凡六十里而入邵伯髙郵寶應又北至黃浦入山陽縣界由清江浦達於淮晏溪河一稱西溪在泰州東北百二十里東通梁垜場西入運河有西溪鎮宋相晏殊嘗監西溪鹽倉民思之因名濟川河在泰州治南入如皋縣境通揚子江康濟河在髙郵州城北亘四十餘里明𢎞治初侍郎白昻開復河於髙郵堤東通運舟以避甓社湖之險孝宗賜名蓋即官河之别名也閘河在髙郵州治北舊名運鹽河東抵興化西通新開湖即今之東河也宋郡守毛澤民於此置斗門蓄泄堤之南北皆為良田秦蘭河在髙郵州西六十里發源天長之冶山東入武安新開等湖橫京河在髙郵州東北七十里亦名海陵溪東通興化西入於射陽湖靖安河在儀徵縣西南即沙河也宋史云宣和中發運使盧儔請開此河以避大江樂官山黃天蕩之險今湮入於江長蘆河在儀徵縣西四十里其上流為沙河宋天聖中發運使張綸開以入江梓新河在興化縣東南十五里自塘港西入得勝湖達於運河蚌沿河在興化縣南三十五里與泰州分界山子河在興化縣西四里通海陵溪轉入射陽湖王瓊河在興化縣北三十五里與既濟盧家陳圖鳳凰等河俱入大蹤湖成子河在寶應縣東南十八里西北接望直港南入章師蕩𢎞濟河在寶應縣西即寶應越河明萬厯中築堤建閘賜今名陰隲河在寶應縣汜光湖西明萬厯中邑令耿隨龍開既避湖險且資灌溉民德之因名新城湖在府西北四十五里東通官河邵伯湖在府北四十五里與艾陵白茆新城甓社諸湖相接旁有邵伯埭黃子湖在府北六十里東通官河西至末口艾陵湖在府東北四十五里邵伯鎮東北通緑洋湖西接官河又府東北五十里有朱家湖亦通官河白茆湖在府東北四十五里官河水涸則引湖水以濟漕運緑洋湖在府東北六十五里西南接艾陵湖東北入髙郵州界水經注作陸陽又西有甕子湖於祈湖在泰州東北三十里亦曰淤溪阮勝之記云湖以村名其下流入雞雀湖包老湖在泰州東北四十里雞雀湖東南畿志云水清無滓雖與他水會而不雜挈壺氏嘗以此水供滴漏小西湖在泰州起雲樓下宋紹興初重濬堤植芙蓉桃李倣佛如杭西湖張良湖在髙郵州北二十里通鵝兒白湖新開湖在髙郵州西北三里即髙郵湖天長以東諸水盡滙此湖而達於淮常有風濤覆溺之患康濟河所以避此險也湖中有洲可百餘畝水漲不能沒樊梁湖在髙郵州西北五十里自天長石梁河流入州界瀦而為湖與新開甓社合稱三湖石臼湖在髙郵州西北五十里通甓社湖甓社湖在髙郵州西三十里宋崔伯陽有賦敘云宋孫覺家於湖陰夜讀書覺窗明如晝循湖求之見大珠其光燭天是年莘老登第後此屢見州人連掇大魁舊志云珠見則有休咎之應五湖在髙郵州西六十里通天長縣銅城河黃魯直詩云九陌黃塵烏帽底五湖春水白鷗前蔣之竒詩云三十六湖水所瀦其尤大者為五湖是也珠湖在髙郵州西七十里通五湖平阿湖在髙郵州西八十里其東南為五湖或又合新開甓社樊梁珠平阿為五湖云武安湖在髙郵州西南三十里通露筋河鼉潭湖在髙郵州東北九十里通海陵溪又仲村湖通於此平望湖在興化縣北二十里湖中有平岡可四望故名按古志云湖中髙阜有古墓人每得陶器製甚古又得一劍屈之首尾相就識者曰此即繞指柔也吳公湖在興化縣北三十五里西入海陵溪舊志云昔有吳公隱此因以名湖大蹤湖在興化縣北四十五里與鹽城縣分界西北入射陽湖得勝湖在興化縣東十里舊名率頭湖宋建炎中張榮以舟師敗金將於此因改今