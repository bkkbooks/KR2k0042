矣又況唯洛食而周鼎定咸陽峙而漢闕依形相之方孰可違廢然而不藉賢宰疇匡聖圖故龍門砥石禹成舜功南交銅柱援標漢業厥今沙海漸暨揚波不聞所謂龜筮協從神鬼受職因民而利職競繇人然非深不足以經逺非明勿庸以輔幽有如兹州俶構斯山罔興化機物情未云周審今則地理順謐水土平康物性克而形勢暢陰陽和而陵犯解易曰后以財成天地之道輔相天地之宜以左右民臣也者承君之義以致之民者也則鎮洋之創我后知始羣公作成乾坤交宜人物攸賴豈不謂財成輔相者歟非天下之至深至明其孰能與於此惟李公抱英荷傑直氣凜凜殆乎海其知而山其仁者也公名端字表正棗陽人應奎山在嘉定縣學南初學與留光寺逼處明天順間築土山以障之嘉靖時又增築焉引橫瀝涇環其下寶山在寶山縣明永樂十年平江伯陳瑄督海運築此以達烽堠附明成祖寶山碑記嘉定瀕海之墟當海流之會外即滄溟浩渺無際凡海舶往來最為衝要然無大山髙嶼以為之表識遇晝晴風靜舟徐而入則安坐無虞其或晝夜煙雲晦冥長風巨浪帆檣迅疾倐忽千里舟師弗戒瞬息差失觸堅膠淺遄取顛躓朕恆慮之今年春乃命將士相地之宜築土山焉以為往來之望其趾東西各廣百丈南北如之髙三十餘丈上建烽堠晝則舉煙夜則明火海洋空闊遙見千里於是咸樂其便不旬日而成周圍樹以嘉木間以花竹蔚然奇觀先是未築之前居民恆見其地有山影及是築成適在其處如民之所見者衆曰是蓋有神明以相之故其兆先見皆稱之曰寶山因民之言仍其名而不易遂刻石以志之詩曰滄溟巨浸渺無垠混含天地相吐吞洪濤架山􅏭嵲奔巨靈贔屭相噓噴揮霍變化朝為昏駭神禠魄目黯眢蒼黃拊髀就為援及起兹山當海門孤髙靚秀猶崑崙千里示表鬱㶿燉永令泛濟無憂煩寶山之名萬右存勒石悠久同乾坤蛇山在崇明縣東北海中一名長山一名茶山舊志云有二峰東峰不可上其西峰頂有石大數畝五十七松環之南有吕純陽碑洋山在崇明縣蘇州洋與蛇山相近其别有十八嶴可泊海舟避颶風鶯遊山在崇明縣淮河口為崇明江淮會師汛地金鳳山在崇明縣三沙舊名金鰲取宋髙宗航海所至之山為名後廢國朝康熙三年總兵張大治重築岡身在州東曰上岡身曰下岡身曰歸吳岡身在新安鄉曰青岡在惠安鄉曰王家岡續岡經云瀕海之地岡阜相屬謂之岡身天所以限滄溟而全吳人也拋沙墩逃鹿墩在州城北門外皆童阜也東岡在嘉定縣東南二里縣無山而有岡海水積沙之所成也土人名為岡身四境皆有之大海在州東北及嘉定之境俱東際於海而內地水道無不通潮汐者崇明東沙之東所謂蘇州洋也其東北有淡水洋即揚子江尾味甘如惠泉東南為鹹水洋大江在州境東北入海婁江在鎮洋縣南自崑山縣流入州境環城南而東為劉河口入海凡一百八十里受震澤西來諸水一名下江元時海運道此或曰婁劉音訛也吳淞江在寶山縣自崑山東抵縣界又東過黃渡江灣又東北入海大通河在崇明縣東三十里又縣東四十里有惠民富民二河八十里有天仙河此內地之支河也施翹河在崇明縣北西自長沙逶迤達於袁孫吳三沙此沿海之幹河也鐺腳港在州東北受諸涇之水東流入於海七鴉浦在州北三十六里一名七了又名七浦太倉之水七鴉浦為大通常熟崑山二邑諸水西承巴城湖東入於海顧浦在州西南五里引吳淞江水入吉涇又東折而北為戚虞涇與南鹽鐵張涇橫瀝諸水俱入婁江三槎浦在嘉定縣南三十里有上中下三槎半涇在州東三里南入婁江北經湖川楊林至於七浦自張士誠開九曲河而半涇漸淺涸橫瀝在州東南南經婁江入吉涇塘北經七浦入常熟海州朐山在州城南四里秦置朐縣以此二峰如削俗呼馬耳山按史記云始皇立石東海上朐縣以為秦東門或謂秦立石朐山之上誤旁有五龍潭青龍澗石棚山即朐山之東北嶺也舊志云有巨石覆岩成室可容十數人山嶺甚峻初無花木宋石曼卿判海州讀書於此乃以泥裹桃核為彈擲之數年間花發滿山大伊山小伊山在州南百里南北相向距二十里許虎山在州西南五十里山東南有龍山皆以形名也辨霧山在虎山東北雲霧在上望之常如冠辨華蓋山在辨霧山東以形如蓋而名沃壤山在華蓋山北近石城村西北連海山下潮水往來滋溉民田牛山在州西南七十里産水晶石北望山在州西南百六十里上有石臼二俗謂始皇洗頭盆也名勝志云山上馬迹猶存白玉山在州西百里羽山之南其石潔白如玉馬嶺山在州西百五十里與郯城界羽山在州西北百餘里相傳舜殛鯀處禹貢云羽畎夏翟鄭注云羽山之谷也下有羽潭左傳所謂羽淵也巨平山在州北三十里州志云一名由吾峰南接東海北抵墟溝上有白龍潭又棲雲山即巨平之北嶺昔有僧結棲雲精舍於此朱紫山在州北四十里丹崖赤壁自相輝映望之若朱紫然鬱洲山州志云在州東北海中有大洲謂之鬱洲一名郁州一名蒼梧山俗以為自蒼梧來也雲臺山在州東北四十里幽深秀特常冠雲氣一名青峰頂山北有望日峰昧爽時可見初日國朝帥顔保開復雲臺疏略為籲復雲臺上助漕運下存孑遺事據淮揚道副使黃桂呈詳到臣該臣看得淮安府海州生員江之􅉅等呈稱雲臺一山上建三官祀廟砥柱江河默翊運道緣順治十八年槩入遷撤海邊各口嚴釘樁木浮葦浪草遇樁存滯沙淤河淺尾閭不泄以致桃源諸堤屢潰民遭水厄淮揚九載水災為治河計莫善於復雲臺而清海口等情臣隨批行各官酌議復經移咨督撫河提諸臣會商前來查此山實與州城甚近比别島逺在海中者不同其山周圍共計三百餘里物産民聚向稱豐腴稠密且係屏障海口為黃淮之尾閭自從廢為禁地以來壅沙日積黃淮漫決以致淮揚水患頻仍而運道民生俱有堪虞今應否開復雲臺山為內地統候部議小鬲山在州東北六十里孤峰特秀三面壁立俯臨深溪惟東隅可通人行上有田橫岡又有平山在州東北百里鷹遊山在州東北海中去平山十五里一作嚶遊山元時海運之所經也孔望山在州東輿地要覽云孔子問官於郯子嘗登此山以望東海又名古城山地理新書謂即古海州故城社林山在州東六里以上有土榖神祠故名其東北有浦山銀山在州之石湫鎮九洪橋北其山近海多白石日出照耀如銀罘山在州東五十里按山東登州府有之罘山乃始皇射巨魚處舊志誤引於此盧石山在州東南六十里山多黑石漢書云韓信為楚王鎮於三盧即此宋張耒云三盧者此與伊盧句盧二山也大星山小星山在州東南七十里二山相對舊傳為星所墜伊盧山在州東南八十里上有龍祠多石罅清水漾於罅中禱雨多應史記云鍾離昧家在伊盧東陬山西陬山在州東南百里二山對峙東陬居海中西陬居海隅蠣山在州東南百里海中潮至則沒其半山多蠣故名夾谷山在贛榆縣西四十里舊以為齊魯會處本寰宇記之訛也山東濟南府淄川縣有夾谷山一名祝其乃齊魯會處紀鄣山在贛榆縣西七十里春秋云齊師伐莒莒子奔紀鄣即此吳山在贛榆縣西北三十里巒壑奇秀舊傳有吳姓者居此殁而靈異遂以名山大金山在贛榆縣治縣北面跨山而城號為雄麗又縣北二十里有小金山河在其北懷仁山在贛榆縣北四十里東魏置懷仁縣以此青山在贛榆縣北四十餘里舊贛城在其北阿夜山在贛榆縣東北七十里有水簾洞對峙者為欄頭山其山有石欄可障海濤了髻山在贛榆縣東北七十里兩峰相對秦山在贛榆縣海中去岸四十里舊傳始皇登此求仙勒石而去水底有神迹三十餘里闊數尺自岸抵山俗謂秦人所築洪波浸激迄今不圮潮落可褰裳而涉也武強山在贛榆縣南三十五里昔有海寇登岸鄉民黃雄率衆禦之既歿而民祀之嘉其保障之功因以名山建陵山在沭陽縣西北百里其山東西狹南北長上多陵阜漢立建陵縣於此其南有神山塔山在沭陽縣西北百里界宿遷韓山在沭陽縣東北六十里世傳韓信追項羽於此故名南有楚王廟又縣東北七十里有孤山分水嶺在贛榆縣北七十里有水一線自石間射出分為東西二流一名分泉獅子巖在州北二十里有濯纓泉下有鬱林觀相傳有徐生學道於此一夕仙去大小二島在州北五十里兩山對峙潮生則沒竹島去州城八十里在海中上多小竹大海在州東境南接朐山北連贛榆往來渡處名黑風渡廣二十餘里必擇日致祭乃敢渡焉景濟河在州東南二十餘里運鹽河也又穿心河在板浦鎮南通此河北接雲臺官河在州東南四十里自新壩南入安東支家河板浦河在州東南四十里與白蜆芹支二河俱自官河東流入海界首河在州南其源西自太湖東入官河莞瀆河在界首河北其源西自官河東流入海通運鹽舟楫石湫河在州南二十里舊時州境之水皆滙此以達於海漣河在州西南上引沂沭及桑墟湖之水經石湫及黑土灣入海房上河在州西南六十里與魯蘭河俱源自馬嶺山東入官河薔薇河在州治西一里其源自羽山來內接州城市河北通贛榆東入於海一帆河在官河東北南至安東入於淮小沙河在贛榆縣南六里源出山東莒州上接沭河下流為青口河入海大沙河在贛榆縣南五十里舊名廟灣子沙河源自山東郯城縣從大沙河鎮東入海沿河有堤臨洪河在贛榆縣南六十里通薔薇河明景泰間疏導通海舟楫甚利今復塞朱汪河在贛榆縣北二十里下流為龍王河荻水河在贛榆縣北七十里源自山東莒州東流入海孫家河在贛榆縣東南四十五里武強山諸湖之水由此入海碩項湖一名大湖在州西南西達桑墟湖南界沭陽安東亦見淮安府桑墟湖在州西南九十里與沭陽界金湖在沭陽縣東南五十里宿城浦在州北七十里四面俱山舟楫遇風宿此沃壤浦在州北七十里又有白溝大義山陰當路溪雲社林諸浦俱通海潮便魚鹽徐瀆浦在州東北四十里納巨平諸山之水入海堯水在贛榆縣西南八十五里又有劍水二水皆源自山東沂州流入縣界合而東注於海沭水在沭陽縣東南自郯城流至縣境又東入於桑墟湖周官所謂青州之浸是也張家溝在沭陽縣西五里即沭河分流處品泉在州南門外三井鼎連其味甘冽或謂近於惠泉溫泉在州之博望鎮西五里冬夏如湯通州狼山在州南圖經云與劍軍等五山相屬又名狼五山相傳有白狼居此或云山形似狼也形勝甲淮南蓋一方之鎮也其嶺有支雲塔塔前有明初敕建江海神祠其左右皆軒亭覽勝之所山之陽有獅子石松岡千人洞紫石海月觀音諸巖又有神人鞭石處世傳秦皇時事也附宋劉弇狼山記白狼五山距通州城南十里率不百步則嶄然迭起若踞若躩若前拱後負若期而赴有待而不相躐而五山者通人能道其名仙蛻其上者曰仙女山闔廬曩軍其旁者曰軍山形鋭且中罅者曰劍脊曰馬鞍至臨以佛宇則號寶塔山秀絶可喜而好事者往往取以矜遊客謂狼嘗擾而居也元豐四年冬弇按田山旁至則求觀所謂五山者入寺東廡得乳泉號幻公井幽光浚發若上噴狀茗飲者利其甘爭至赴汲井自開山僧知幻所鑿故名方丈東阿有石僅十尺許長倍廣三之二昔從山椒墮號飛來石自堂折而少北貫以澀道躡之纚纚如絙縻上縈道左閣曰棲雲庵曰海桐亭曰半山曰望江皆森爽谽豁可蔭以休而閣加於庵之廣亭加於閣之峻者倍且半又郤轉得楣埓更澀屣小覺酸軟度非三休不至絶頂因力躋焉方是時朝日初上曈曨如曜金發莾蒼中洞視上下不隔褷褵佛螺姝眉附地别出則南峙之福山也排天決雲吞嚼淮吳則東浮之三􅍽也稻畦葭澤潮汐上下沮洳斥鹵之所淫溢與夫疏篁茂木頽垣廢丘皆得於轉瞬之頃於是惝然忽疑從樊籠中出也絶頂之北有石若圯而中留踐之令人善畏而得瞀則定心石也山後有石卵港觀音洞朝天巖去思亭皆利下觀而醒石尤以名著石廣厚略等可坐十輩其上醒石之西有紫石巖石紫赤色相錯雜而紫為多以遊至者悉攦名其上今亦頗可别識劍脊馬鞍二山遊者罕至獨峭壁隆隆發數十仞疑造物者於此喜為斫刻以驚世也軍山宜山茶花號多蕨薇仙女山最外峙有穴通中頃嵗嫗有自龍舒來者年七十餘獨食息其中似得道者山有拇迹鞭痕皆著石或云秦始皇履是山且鞭以投海中俗之好怪乃如此而僧語余曰今之山跗雖皆平陸然前五十載海也其深蓋碇絲千尋莫能測而自軍山左轉皆閩艘吳艦與渡而漁且漕者之所出入山前後石齧若鐘釡然者皆水所湔漱而巖有鑱天祚者五代姚存艤舟時題識也余聞而異焉且淮海方數千里自江都走海陵絶吳會其間以佳山川著稱無幾矣至是而僅得五山焉則又皆盤礴吐吞於窮海僻陋之濱若遁而肥與畏名而逃焉者獨何耶然五山當潮波撼一方如唇齒傳脰咽使通民恃以不怵而間則蒸油雲泄膏雨以利生物其作鎮此土殆天意非可私智測也余也服吏役一投足而五山之美盡得於人迹之所不到竊自比於醢雞别舞甕外之一天則亦不得而默矣劍迹山在狼山東一名刀刃山世謂秦始皇淬劍於此有磨劍石今墜於江東南有雙人峰其下有燕子洞軍山一名象山在劍迹山東南隔江數里一統志云越王嘗軍於此新志云秦始皇二十二年巡行至此屯軍中有卧雲窟山茶灣諸勝其東北麓有椒嘴石長數十丈以潮長落為出沒相傳月明時聞笙簫之聲附明嚴爾圭五山拱北碑銘登五嶽而小天下登五山而小崇川五山其通之五嶽乎大江洸蕩自恣五峰盤峙如列掌余每過之幾片青芙蓉奇秀萬狀白狠居然長之若劍迹若黃泥若馬鞍皆其伯仲而鱗次者矣軍山在水中央宛一旁伍波臣淜湃走五山之趾狂欲吞山山堅壁當之如諸葛壘如嶽家軍森布嶙峋撼之而不動通以此俯瞰江流差堪夜郎自雄稱小五嶽也州人士所疑者謂山陽盤旋南向其陰多巉嵒絶壁怪石聱牙夫其情不屬我乎余解之曰非然哉兹山為江而設奇為通而岸江者也故悉其峭雄勃窣之力南走迎江而故張其逶迤整暇之勢分合奇正與江水相持要其所擁護而藩屏神情未嘗不北拱也譬猛將軍捍禦邊陲逢徑敵旗鼓軍容無不向敵者然則內地安瀾數峰容與山之輕裘而緩帶者也而兹山獨處其勞疊嶂層巒跨江隘海山之居重而擁強者也而兹山孤奮其勇山之拱通也亦至矣州人士猶重疑之乎余將酬山靈加勞焉因題之曰五山拱北即山靈快然當以余言為已知也爰進銘之曰維通有山巋兮森峙固我邦圉疇離厥祉江濤怒攻介人在此忠而被謗僉謂南指圭來眺臨雪其非是五靈競呼曰惟所使為通篤祐有加於始塔山在狼山西俗名黃泥山舊傳有女子得道於此下有仙女洞其西下有石刻通濟閘字蓋元時海運故道也馬鞍山在塔山西一統志謂以形似名舊志云隋煬帝征髙麗曾放馬於此東土山在州東十五里築土所成樹蔭水繞亦為勝遊之地東山在州海門鄉吕四場相傳宋淳熙中孫道人所築以術運米建廟於山會聖山在州海門鄉東三十里運河之北摩訶山在如皋縣南百二十里大江中水勢湍激俗名蝦蟆山初山在縣南界今江漲山逺去岸逾五十里矣碧霞山在如皋縣西北上有碧霞元君祠又縣有三土山一在安定鄉一在豐利場一在馬塘與此皆築土所成孤山在泰興縣東南七十里石壁臨江上多大竹縣之鎮山也今沙漲江逺山與靖江連界矣髙阜在如皋縣北五十里東西亘五十里相傳古海岸也平阜在如皋縣南江寧鄉東西亘六十里相傳古江岸也上多竹樹亦宜五榖大海在州東北北連泰州東盡海門諸鹽場循岸而棋布焉大江在州南二十里西自江都入泰興縣界過如皋抵於州治東至料角嘴入海南與太倉州海口相望西亭河在州東北二十里西亭場運鹽河在州西北自泰州東行百六十里至海安鎮入如皋界又東南行百一十里至白蒲入州界又東行百五十里過海門鄉達於吕四場金沙河在州東三十里金沙場與西亭河俱宋兩淮制置使李庭芝鑿石港河在州西北七十里石港場又為新河新河東為仇家河以上諸河皆與海通浸灌甚廣自明隆慶中於海濱鑿串場河而諸河皆謂之故河云山河自州治南直達狼山舊志云海運故道由此以入漕河葛堰河在如皋縣東南二十里東通十竈西按運鹽河龍遊河在如皋縣東南六十里亦名九十九灣河舊傳龍過而成河其形環曲北接運河南通大江故又名通江河立發河在如皋縣北三十里北接運鹽河東至於海汊河在如皋縣東北豐利場南通運鹽河北至於海薑溪河在泰興縣東南直達靖江界河新河在泰興縣西南三十里通大江得勝河在泰興縣西南四十五里通江即盛大港芹湖在如皋縣西安定鄉北達溪河西通泰興今已湮塞祥符湖在如皋縣東南六十里亦名髙陽蕩西接運鹽河東達於海瀛溪在如皋縣北安定鄉水繞洲如瀛洲然故名西通泰興縣東接黃蒲溪蟠溪在如皋縣北亦古𨝍溝也以洲渚灣環而名西接運鹽河東入於海瞿竈港在州東金沙場又有唐竈港又西亭場餘西場諸港皆與海通進鮮港在州之海門鄉諸港皆通江海今多湮沒石莊港即天生港在如皋縣南六十里宋吳濛詩煙含樹色連沙嶼風帶潮聲怒石矼暇思港在如皋縣西南七十里國朝康熙六年開濬掘港在如皋縣東百三十里西通運鹽河東抵海其地為廣陵東南門户石碇港在泰興縣東南又有蔡家廟樹柏家三港俱於康熙六年開濬王家港在泰興縣西南三十里舊志云與孟瀆河相對商賈舟舶之所必由其北有洋思港亦通於江廟港在泰興縣西三十里流經江都縣境入江又西十五里有過船港又縣東南有印莊港西南有小麥港皆通大江白水蕩在州東百二十里吕四場其地廣闊魚鳥鹿鶴所萃鄭公灘在如皋縣東北百二十里豐利場宋治平間富鄭公弼判揚州鑿以習水戰相見灣在泰興縣東北俗謂之龍開河河形委曲舟行雖有先後至灣則帆檣相見可呼而應因名又馬橋河在縣南與龍開河接度軍井在如皋縣西十里一名聖井不甚深汲將盡擊其欄則溢出宋嶽飛經略通泰駐兵於此資給無匱江南通志卷十四
