body:
  text: 江南通志卷一百六十二人物志孝義六鳯穎二府滁和廣六泗五州鳯陽府漢桓鸞字始春龍亢人焉弟子也少立操行縕袍糟食不求盈餘時太守向苗有名迹乃舉鸞孝廉遷為膠東令始到官而苗卒鸞去職奔喪終三年然後歸淮汝之間髙其義後為己吾汲二縣令甚有名迹子曄趙孝字長平沛國蘄人父普王莽時為田禾將軍任孝為郎及天下亂人相食弟禮為餓賊所得孝聞之即自縛詣賊曰禮久餓羸瘦不如孝肥賊大驚並放之謂曰可且歸持米糒來孝求不能得復往報賊願就烹衆異之遂不害鄉黨服其義顯宗聞其行詔拜諌議大夫遷長樂衛尉復徴弟禮為御史中丞趙禮行已恭謙類於孝帝嘉其兄弟篤行欲寵異之詔禮十日一就衛尉府大官送供具令共相對盡歡數年禮卒帝令孝從官屬送喪歸葬孝無子拜禮兩子為郎范遷字子廬相人有清行仕為漁陽太守後居公輔有宅數畝田不過一頃復推以與兄子其妻曰君有數子而無立錐之地盍餘俸祿以為後世業遷曰吾備位大臣而畜財求利何以示後世也唐董邵南壽州安豐人苦學讀書隱居行義事親備極色養其孝慈及物有雞犬相哺之異韓愈作董生行頌之李興安豐人父死哀毁口鼻流血猶捧土就墳廬於墓側廬上産紫白芝二本醴泉湧出柳宗元作孝門銘宋步游張張姓少失母徒步尋訪因稱步游張久不得忽至宿州見病嫗究問乃其母也相持大哭遂就養因家於宿元許崇政下蔡人廬墓以孝旌孫克忠宿州人以孝聞王珍宿州人纍世同居馬希先懷逺人舉鄉貢授陳留教諭養親不就職竭誠奉事廬祖母墓及父母墓凡九年姜起宗懷逺人五世同居髙中懷逺人祖仕宋為安撫使父文龍先卒事祖盡孝養事叔文豹如事父服闋以嫡孫當襲請讓文豹至元間事聞詔旌其門明郭子興定逺人元末起兵自稱元帥一見太祖竒之授以兵妻以所撫馬公女即馬后也後封子興滁陽王妻張為夫人立廟滁州劉繼祖字大秀鳯陽人仕元為總管家饒於財與明太祖父淳皇帝為比鄰後崩太祖年十七家貧無葬地繼祖以地給之既貴官其子英追封繼祖為義惠侯妻婁氏夫人張倫鳯陽人河南衛百户洪武四年以親老乞解職歸養上嘉之命為濠州衛副千户王阿孫懷逺人父疾刲股以進立愈母病又割肝以進亦愈洪武年旌羅子明鳳陽人父病刲股殁後廬墓三年沈律陳汝聨連思恭三人俱鳯陽人刲股療親王絅定逺人事母孝母歿茹蔬廬墓宣德年旌張簡懷逺人正統五年輸麥一千三百石賑濟景泰四年復輸粟三百五十石奉敕旌表賜冠帶廖冠平懷逺人正統五年輸小麥一千一百石弟冠正冠玉各輸粟五百石助賑俱奉敕旌表李忠鳳陽人事親孝親殁廬墓斷葷酒每慟羣鵲悲鳴若為助哀景泰時旌李寬宿州人母殁負土成墳結廬墓側常見二馴擾其旁暇則合藥濟世景泰年旌郭興宿州人父喪廬墓側手植樹千株灌培鬱葱有馴兔之異景泰年旌黃金字良貴定逺人成化甲辰進士歷官廣西參政歸里值歲饑民疫指畫賑濟自為煮粥活數千人所著有東澗集泉山稿許本忠懷逺人事父母孝母愛少子因愛其弟益篤父母亡先後廬墓六年𢎞治中旌子璉事本忠孝亦如之劉澄懷逺人孝行𢎞治年旌張全臨淮人幼喪父事母至孝母年八十一卒既葬猶泣血哀毁鄉士大夫舉孝行哭辭不敢當叔祖伯叔祖母貧無嗣請同居生養死葬焉𢎞治年旌王澄臨淮人三歲喪父事母純孝母死結廬墓側衰絰不去身塜前産芝𢎞治年旌張欽鳯陽人孝行𢎞治年旌王裕宿州人父喪哀毁廬墓兩産靈芝𢎞治年旌胡淳壽州人正德間出穀賑饑還遺金嘗買婢其父因失馬價銀賣女以償淳如數與之歸其女人重其義張潼靈璧人正德中流冦入邑祖被害潼號慟大罵願與俱死賊憐其孝不忍殺之後奉母備極色養連楫鳯陽人事父先意承順稱純孝事聞旌之蒯昻字廷舉壽州諸生母喪廬墓劉鳯字鳴岐壽州人母喪廬墓馬體乾臨淮人父喪廬墓金為聲臨淮人刲股療父顧琛壽州人母失明琛竭誠禱求目遂復故曹格靈璧人性孝謹有蘇商陸某僑於格舍病故囊蓄五百金格為之殯促其子至與之趙銘宿州人刲股愈父詹臺錦臨淮人刲股療繼母病韋儒懷逺人母病衣不解帶親嘗湯藥籲天願以身代母死儒過慟嘔血亦死嘉靖十年旌陸欽懷逺人母殁廬墓張賢懷逺鄉民父母殁先後廬墓凡九年郭落定逺人嘉靖中父壽卒於京藩徒步數千里扶櫬歸葬結廬墓旁日夜環冡哭有剽掠者過其廬戒曰此孝子也勿驚墓常出金色蛇人以為孝感耿約懷逺人事繼母孝父殁廬墓弟蘭早亡撫其孤與己子同周貧乏人咸德之許士俊懷逺人年十七隨父渡淮父墮水士俊號慟入水中求之三日抱父尸出萬厯間旌袁鏜懷逺人奉孀母孝司訓張天祐卒於任貧甚鏜為殮之賻其襯歸歲饑嘗輸粟以賑徐彥良懷逺人與弟彥聰捐粟賑饑掩胔埋骼施棺椁無虛日潘儀定逺人母卒廬墓蔡斌徐榮俱定逺縣人割股愈親劉時暢虹縣人母病劇暢取母糞嘗之味苦曰我母生矣果愈鄧讓字汝謙壽州人父卒有異母兄疑讓少子有厚蓄讓即盡出囊槖畀之母卒哀毁過禮歲饑出米賑給全活甚衆陳自修鳳陽人母亡殯於中庭崇禎八年獻賊犯鳳陽自修繞柩哀鳴竟被害國朝馬魁臨淮縣人母死自具畚鍤負土壘墳三年廬於墓側王繼善臨淮人刲股療繼母病邵光先懷逺人順治六年獲遺金三百餘兩其人尋至欵以酒食還之其孫蘭蕙二人年尚幼亦還醉客銀百二十兩張明棐宿州人順治中賊五十騎入其鄉家人俱登樓母劉年七旬不及避為賊所劫明棐急下救母賊執之支解而死母遂得免十七年旌表孫守信宿州人好施豫待以舉火者數十家有戚託孤授金三百守信俟其成立還之封緘如故兩舉鄉飲賔王永康宿州諸生葬母廬墓側三年曹培靈璧諸生執親喪躬自壘土為臺寢處其中朝夕每聞其泣聲未及歸而卒人稱孝子臺尹國泰靈璧人年四十餘無子妻為置妾詢其自知為名家人從夫宦遊為冦掠至此國泰惻然即日遣置别室訪其原配贈資還之陳懷禮靈璧人有饑民王姓者指妻為妹賣懷禮作妾問得狀即日還之不問原資周建古懷逺人父希賜卒於官建古匍匐數千里扶櫬歸事繼母嚴氏盡孝既葬二十餘年未離墓側徐遇字天衢壽州人事節母李氏極孝弟析居後産中落仍與同居不分爾我樂施不倦鄉里稱為仁孝先生徐自鑑壽州人父早卒母馮氏為姑遣嫁南昌自鑑既長徒步尋得之迎養焉戚雲鵠壽州人以木工為業有徽人謝君英避火以箱授之火息密訪其人還之箱內白金如故黃應麟壽州人性孝友母病失明曲盡奉養母殁哀毁骨立産讓二弟遇自經者以藥救起之知為鬻子失金者應麟贈如數遣歸邢崶字溥公壽州人事母孝奉養備至嘗還人遺金子雨甘亦以孝稱同邑馬化亦以還金稱鄉里陳姓失其名居壽州貧為傭竭力奉養父母死葬門外日哭於墓久而無間潁州府後漢韓伯俞城父縣人嘗有過母笞之泣母曰他日笞汝未嘗泣今泣何也曰他日笞常痛今母之力不能使痛是以泣也郡人稱其孝立祠祀之在義門集西唐朱仁軌字德容亳州永城人隱居養親嘗誨子弟曰終身遜路不枉百步終身遜畔不失一段有赤烏白鵲棲所居樹詔表其異及卒郭山惲員半千魏知古共諡為孝友先生朱敬則字少連亳州永城人仁軌弟以孝義世被旌顯一門六闕相望敬則志尚恢博好學重節義髙宗聞其名召見異之除右補闕武后時開告密羅織之路興大獄張易之因搆魏元忠張說欲誅之無敢言者敬則獨奏曰元忠說皆秉心忠一而所坐無名殺之失天下望乃得不死為冉祖雍誣奏貶涪州刺史既明其非罪改廬州代還無淮南一物所乘止一馬子曹步從以還睿宗朝劉幽求奏曰敬則忠敬義烈天下所推追贈祕書監諡曰元五代常彥能潁州人朱溫攻淮南過潁潁人畏避溫怒曰軍回當屠城至淮久雨乏糧彥能自以家資餉軍溫喜賞以官不受溫曰汝何欲曰潁人畏王威逃遁不敢迎幸察之貸一城生命溫從之潁人得免於難麴溫潁州汝陰人居家孝友乾祐三年旌表門閭張仁願譙郡人存敬子有孝行存敬殁事其兄仁穎出必告反必面如事父之禮曉法令事梁唐晉常為大理卿宋張可象潁州人七世同居宋延平中詔加旌表仍蠲其課調元張紹祖字子讓潁州人讀書力學以孝行聞授河南路學教授至正中奉父避兵山間賊至將殺其父紹祖泣曰吾父耆德善人請殺我以代父且若輩獨非父母所生乎何忍害人父賊怒以戈擊之戈應手挫鋭因感而相謂曰此真孝子不可害乃釋之張旺舅霍邱人幼失父母陳氐居貧守志旺舅九歲賣餳以養其母母病貧不能求醫惟日夜痛哭籲天求代未幾遂愈又自以生業微不能多給竟不娶以終母年有司言於朝旌之劉通亳州人家貧業農母失明通斷酒肉日夜禱於神歷三十年不懈母年八十五目復眀明徐汝楫霍邱人父沒負土培墳廬於墓成化六年旌李崇德字養淳潁州衛人生平孝友仁愛賑貧乏修橋梁凡益人者孜孜不倦鄰人以地售曰吾世鄰忍售爾地乎助之以粟而去子文煌文輝俱登賢書有弟早世教其孤三人皆為博士弟子員李琦之字公韓潁州人年二十流賊陷潁執其父文炱索金無以應欲殺之琦之求代父死詞甚哀賊不聽因罵賊賊怒立斃刃下賊衆中有憐而相勸者終釋其父琦之妻年十六亦自縊以殉杜煥字永顯潁上人母病危刲右股肉和藥療之遂愈父晚年兩目失明又割左股肉為羮以進父目漸開人以為由孝感所致由監生例得選乞歸養親服闋授福建按察檢校琉球入貢憲長委煥賔接使者以金為贄煥正色曰逺人慕化而來吾奉命賔接而先受金可乎使者敬服官至延平通判王翊潁上人𢎞治間以孝行旌張價字大之䝉城人母病目盲價䑛之而愈𢎞治四年舉鄉薦後訓鄆城有教澤母亡廬墓三年楊升武平衛人葬父結廬墓側蔬食三年黃河水屢溢至廬輒回𢎞治間詔旌其門時尚祥潁州人祖父病目每晨祝天餂之目復明又刲股以療祖疾杜憲周之士俱潁上人皆割股療父病魏安民王敷政俱潁上人皆廬墓成綱武平衛人母亡結廬墓側冬不衣絮夏不揮扇墓木生連理枝詔旌其門林鵬太和人正德辛未流賊之變鵬負母而逃遇賊將殺之感其孝不忍加害母年八十有三鵬未嘗一日離左右及歿送終之具不分委於弟兄張一鳳霍邱人嘉靖壬午舉人母孀居孝養惟謹嘗有盜入室鳳不顧妻子獨負母而逃得免於難寧中立字爾强潁州人萬厯癸未進士選庶吉士尋改禮部主事晉郎中疏請養母閲十八年孝敬備至母終補原官擢尚寶丞卒於官中立讓産於兄好周人之急而自甘粗糲鄉里稱之李文明亳州人以鄉貢授武英殿中書萬厯四十三年亳大饑文明捐米一千五百石以助賑敕賜蒼生寄命四字以旌之吳自勵字健甫天啓間選貢例得任别駕以養親不就父沒撫育幼弟俾之成立凡田舍之美者悉讓之友人劉某以千金密托之曰吾子未至蕩盡家園此金斷不可與已而其家果日落有饑寒之憂乃召其子戒其妄費以金還之白精衷字輔乾潁州人五歲而孤母袁氏甘貧守節每自齧糠粃以飯飼兒精衷泣曰兒無能供饘炊乃忍食細而母食粗乎每食即先啖粗糲以示甘天啓丁卯舉於鄉崇禎乙亥流賊破潁州家人勸逃匿曰母守我四十年我何忍舍之去賊刃之至死猶手護一袴曰吾母手裁也張燦垣霍邱人賊屠城父被執冒刃入賊營救父不克伏尸痛哭瞋目大罵奪賊刀相併賊怒殺之汪時譽霍邱人九歲喪父事母孝謹三遇母病刲股者三皆獲愈萬鍾徐興祖姚得山李璵李珉五人俱霍邱人輸粟千石賑饑奉㫖旌表陳鏞李義王崇禮胡義朱理王暘胡敬七人俱霍邱人皆嘗輸粟五百石以賑饑民事聞奉詔旌表立碑紀其事檀之櫆字量垣潁州人事親孝教授里中以束脯佐甘㫖崇禎八年城陷時母柩在殯不忍去賊掠其家櫆持石杵連斃二賊又傷數賊後賊來益衆被創而仆縳屋柱間磔之移時兩目猶閃閃動也張芳亳州人母亡廬於墓側次年秋病篤妻子往視之不令入廬而卒汪泉字及之䝉城人父殁廬墓有白鳩巢其廬張忠卿䝉城人親沒廬墓三年陸九一䝉城人三歲父亡母年二十六甘貧守志歿後九一廬墓三年不茹葷血張顯思䝉城人年十三喪父廬塜上日夜號泣有盜經其廬曰無驚孝子相率而去遺産盡推豫其兄授徒自給韓文升䝉城人母劉氏苦節撫升母病篤升與妻柳氏同割股救之牛光斗䝉城人年十七父疾割股父殁廬墓事母尤盡力一味之甘母未嘗不敢食殁後廬墓如父喪時張依誠䝉城人户部侍郎思恭七世孫父早卒家貧母好施依誠夏則汲水冬則刈薪竭力以承母志母病割股療之及卒自負土成墳廬墓三年劉文試太和人因母病習醫時調湯藥母卒廬墓三年木生連理陳倫太和人弟早卒遺孤六歲倫撫之成立分産與己子無異族黨有喪未舉者助之貧不給者濟之時服其義張四重太和人嘗宿旅邸有女私奔重楗户不納有客寄以千金數年後來取封識宛然子名立領鄉薦庚戌中乙榜黃經太和人家貧妻子嘗凍餒傭工以養母每具膳必誘幼子出外恐分母食及死無以為殮遂鬻子以辦葬事孫應傑太和人母殁甫斂有寇警家人勸之逃傑曰柩在何忍去寇至疑柩中有金欲舉火焚之傑以身衛賊怒揮刃戕其手足開視乃知非詐仍完其棺而去常有榮太和人流賊壓境繼母戴氏病不能行榮與子從教載母而逃遇寇將刃其母榮抱母求免欲殺榮從教又抱父求代賊感其孝俱釋之陳澤九太和人闖賊入境執其父有成將加以刃澤九求代弗許同被害澤九妻王氏與其媳李氏以瓦器投賊泣罵不已賊又刃之父子同難姑媳雙烈時稱節孝兩全周永祚亳州人母早亡祚侍父二十餘年同臥起昏暮每負以行父沒廬於墓旁二載而卒李心惟亳州人崇禎八年寇入亳心惟泣守母喪不肯離賊至被害子果見父死罵賊賊又殺之父子皆諸生李如龍亳州人闖賊執其母如龍奮刀擊賊賊怒並妻劉氏俱剖腹死從兄猶龍守親柩不忍離亦遇害王德新亳州人明季諸生割股愈父疾張才廣亳州人吳裕武平衛人懷成亦武平衛人三人皆嘗割股愈母疾張維黃字坤儀潁州人鶴騰孫崇禎乙亥流賊陷城與其母匿巷舍賊牽其母索金將刃之維黃急呼曰毋殺我母請殺我賊殺之有老嫗伏積薪下見其引頸無怖色惟顧母而已事聞贈應天府儒學教授張大賡字揚甫潁州人鶴鳴子官廕生喜讀書工詩兼長繪事寇破潁城父兄伯叔同日殉難家口死者三十餘人大賡救父罵賊受傷昏仆賊去復蘇殯殮畢即裹創走京師與兄大壯哭請於朝鶴鳴得賜祭葬而鶴騰大同咸䝉旌表國朝沈允逹潁上人康熙元年有盜入其室執父九德拷掠允逹越垣告急鄰里不應奮曰有親如此安用生為赴鬬遇害解于信䝉城人割股救父廬墓三年曹元聲䝉城人父爾嘉遇流寇不屈被害聲時在城即縋城奔赴獲父尸而還徐文明䝉城人李恭亦䝉城人黃麟生亦䝉城人又談籍太和人王廷瑝亦太和人五人俱親病刲股滁州宋茍與齡字壽隆來安人志尚髙潔事親力竭而禮盡母殁廬墓側旦暮上食哭有芝十九莖生墓門宣和中州守唐恪以事聞詔旌其門趙察字叔晦來安人紹聖初有聲太學察事親孝養孤姪如己子以行義為鄉里所推人有爭得察一言即解去晚歲以特恩調永福丞王鈞滁州人性孝友貧不能自給而奉親必竭其力父卒哀毁盡禮事無巨細必咨於兄而後行鄉里義之明陳通全椒人正統七年輸粟千石賑饑事聞旌表黃正字景齊滁州人性至孝母華氏年八十餘殁正哀毁不能起及葬負土築墳廬於墓側蔬食三年成化中旌表徐升字仲髙來安人資性敦厚讀書守禮族屬百餘口同居共爨庭無間言盧守益滁州人六世同居詔旌其門曰尚義孫庸字乂良滁州人父景和市馬廣西道死南寧官為藁葬景和殁三月庸始生及壯鋭意訪父遺骸徒步之南寧遍歷山谷有二嫗指示葬所因而掘之遂得枯骨刺血以驗乃負歸營葬廬墓三年哀毁骨立時人稱孝邵煒字維張全椒人天性孝友父沒終身不飲酒竭力奉事孀母待兄及從弟俱極孝愛濮矩滁州人母卒侍父寢三年不入私室事繼母盡孝有異母弟五人矩皆篤愛之人亦不知為兩母出也楊于庭字道行全椒人少聘陳氏女及笄而瞽或勸别娶于庭不聽人髙其義後舉萬厯庚辰進士歷官兵部郎中金光璧字文宿全椒人太學生父九陛從湖南兵備致仕歸光璧侍行至中途夜遇盜光璧冒白刃負父突圍出獲免於難人稱其孝吳國鼎字玊鉉全椒人給事中國龍長兄崇禎癸未進士授中書舍人旋遭母喪廬墓不出吳國瑞全椒人父疾篤刳肝以進而愈金新鼎字仍之全椒庠生居母喪哀毁疾卒遺令以縞素殮國朝吳一龍字德中全椒庠生性純孝尤篤友愛撫姪如子吳國器字玉質吳國縉字玉林俱國鼎弟國器刲股以愈父疾母歿茹素終身國縉順治壬辰進士授江寧教授慷慨好施頻濟困厄人髙其義魯子琳全椒庠生侍奉父母竭力盡孝父母殁前後廬墓六年康熙四十九年旌表和州南北朝宋劉瑜歷陽人七歲喪父事母至孝年五十二喪母三年不進鹽酪號泣晝夜不絶聲勤身力以營葬事服除二十餘年布衣蔬食言輒流涕恆居墓下未嘗暫違元嘉初卒唐何蕃和州人入太學以學行為諸生推服朱泚之變正色叱諸生之欲從亂者由是六館之士不受汚蕃性純孝以親老歸養諸生言於司業陽城請諭留之㑹城出刺道州不果留韓愈為作傳明黃有常含山人元末兵興奉母逺避屢經艱險竭力扶護卒脫於難洪武初舉孝行授平陽主簿王鎬字子京和州人永樂甲午舉人歷官户部員外以廉能著奔父喪哀毁踰禮負土築墳手植松柏有芝二本生墓側人皆言孝感所致元孫元吉由舉人歷教授篤於孝友嘗侍父疾籲天嘗糞疾即平復張全和州人正統六年輸米麥千石賑荒奉詔旌奬于纓和州人正統中父殁又三十年母亡纓哀毁廬墓終制而歸先後如一有司欲舉旌典力辭而止薛良和州人正統戊午舉人知獲嘉縣有孝行天順時旌唐慶字以章含山人少喪父家貧事節母盡孝奉嫠嫂甚謹兄弟遺孤撫育如子二十餘年不私尺帛雖半畝之宫悉以均授張𢎞道字志夫含山人嘉靖己酉舉人母喪廬墓因母存日畏雷𢎞道每聞雷聲中夜必起伏哭塜旁曰兒在此當事薦其至行特擢南京國子監學録趙為光和州庠生親沒廬墓三年詹雨潤和州庠生年十一刲股愈父病閔應榜和州人刳肝愈母病王𢎞中和州人刲股療母汪竒敏含山人刲股療母後竒敏病其子迅亦如之蔣崇仁含山人父母病刲股以進者三皆即愈國朝周文光字武明和州人值歲大祲文光輸粟助賑全活甚衆順治十四年旌表曹超和州庠生順治十六年海寇入犯江寧掠及州境超奉親出避猝遇寇兵欲戕其父母號泣請代寇憫而釋之家甚貧困而甘㫖之奉必竭力辦具又辭聘不出侍養終身居喪毁瘠負土作墳家有父植紫薇一株已久枯超每對之哀慟忽復發花咸稱孝感康熙四十二年旌表戴晏晏弟杲俱和州人兄弟事親皆篤孝父喪過哀絶而復蘇既葬並廬墓側三年服闋始歸康熙四十四年旌表徐繼稚含山庠生連遭親喪哀毁盡禮結廬墓側前後六年嘗中夜聞母在廬外呼之稚驚起出視廬垣忽倒得免於厄又時有白燕飛鳴之異人皆言純孝所感康熙五十三年旌表趙珮和州人年十一母病篤哀籲神前祈以身代伏地未起恍若聞神語許之母遂平復既長孝敬二親歷五十年後連遭大喪哀毁骨立墓在深山素多虎患珮廬於旁皆馴伏無犯人多嗟異雍正六年旌表張弧和州人母病禱神乞以身代夢神允其請弧旋卒母果愈晏璧生含山人貢生歷任繁昌䝉城潛山訓導事親撫弟以孝友稱又周給貧困全濟甚多廣德州唐潘晃廣德人事父至孝嘗以役事至京一夕夢神告曰汝父病篤晃覺驚惶不已日夜奔走以歸一夕復夢神語曰汝父病愈歸問其故果如夢中言父卒廬墓芝草生墓側事聞詔旌其門授廣德令宋王安兒桐汭鄉居民鄉舊有廟安兒父病篤禱於神割股肉和粥以進父即愈鄉人名其廟為割股廟范日進宋咸淳時人家衆三百口不分産鑿雙井共汲惇睦無間李貴居原通鄉事親至孝處宗族賙貧恤孤樂善好施故鄉人名其居傍之橋曰孝義李彭年紹興間進士割股肉以療父病事聞詔表其鄉曰旌孝明姚觀壽割股療父病洪武中旌表其門潘事心字若泰廣德人新婚而親沒柴毁骨立廬墓六年不入寢室岑熙廣德人少以孝行聞客都下得遺金五百兩於旅次求其人還之御史馮明玠記其事庚辰辛巳連歲大祲破産以賑親旌之無告者姚啓宗字午明篤學好義見人寃抑不惜破産申雪之有誣陷大辟者其仇也啓宗力為解釋或負啓宗五十金欲鬻妻以償啓宗亟焚其劵王應篤家貧好義里人有貸金娶妻生子十歲矣不能償欲鬻子償之應篤焚劵不復索歲饑出穀二百石以賑鄉人國朝程應桂建平人也為邑掾乙酉兵亂知縣杜鶴年以家口委應桂應桂多方匿之獲全後鶴年被殺復護其孤孫與主婦還關中邑令張正中顔其居曰義髙千古陳乾字亨之竭力事親弟夭撫姪如子族有賣子典身者出銀代贖貧人負債焚劵不取地方染疫為貧者延醫死則施棺人誦其義宗維漢建平人宋留守諡忠簡澤之裔孫也父患背疽維漢吮䑛得愈母殁哀毁骨立旬餘不進水漿嘗廬墓悲號暈仆經日始蘇母性好施舍維漢承順不倦出母所積金六百兩設厰賑粥更捐資以瘞貧不能殮葬者時建邑長墟水潰里黨艱於補築維漢復出母遺金募工修築十里完固倍昔贍恤老羸歲以為常雍正十一年旌表六安州宋郭淵字濟川六安人羣盜起淵聚族保障一村六人往依焉大德末淮西大饑淵作饘粥食之時多鬻子淵視其尤困者假子養之長為娶婦至歲大穰縱之去六人初習兵少文淵與父諗以詩書俎豆為業人慕之多化者孫言與宋景濂游宋稱為竒男子明黃用賢六安人父母殁廬墓側清泉自湧有虎不為害火不燬廬之異成化間旌張時厚六安人段𢎞仁與張翀皆英山人俱以廬墓旌武紹元六安人父疾針灸必以身先居喪哀毁四載不入寢室有司以孝聞獲旌李九疇字敘卿六安人父鰲以疾廢祖老且貧疇事病父衰祖曲盡孝養父先卒祖年九十餘卒喪葬如禮嘉靖間旌其門曰順孫馬應乾英山人刲股廬墓縣令屢旌之而同邑段孟塤亦以廬墓稱又有傅得年事繼母如所生鄉里稱之何金六安人母遺腹生金母疾篤金為嘗糞卒廬墓三年萬厯間旌表黃嶽吳繼宗朱德溥陳嗣禹李世芳謝叔因李植程尚德俱六安人以刲股稱孝單植與周傑六安人俱廬墓三年姜宣鄭顯忠俱英山人萬厯九年共捐穀四千石備賑有司旌之劉國翰六安人崇禎十三年捐穀一千石賑饑都院史可法旌之汪禮六安人嘗商於淮南有浙人劉姓者將入京聞其好義以五百金求寄逾三十年劉以罪戍遼左歸禮舉以與之封識宛然何克仁字樂山六安諸生嘗赴省試宿逆旅拾遺金故留不去頃主人倉皇呼索詢實還之不受其謝項倫霍山庠生親殁廬墓年四十喪妻遂不娶鄉人稱為孝子義夫段一定六安人明季族子女有流離失所者捐資贖歸居家孝友絶跡城市國朝馬之光字實甫六安人明季舉人官修武令卒生平慷慨好義公車偕友入都過西河沿見倚門一婦友愕然與語大哭乃其子婦為亂兵掠賣者之光罄所擕并告貸贖還之邂逅一江西士人饑困欲死問其所須若干慨然解槖濟之子晉鍚以孝聞舉康熙癸卯南榜第一黃九錫字公位六安人乙未武進士父鉉明季守備昌平殁於王事九鍚犯重圍尋骸骨歸葬季父鼎奉檄勦山賊九鍚參謀議平之居鄉修州學建橋梁邱從先字寧野六安人少苦志問學父民逵明季壬午以守城罵賊死賊退從先於積尸中刺血得骸骨歸葬奉母避難雖流離不缺甘㫖撫兩弟俱成人舉鄉飲賔駱士憤字子發六安人順治中領鄉薦教諭虞山擢鄖陽司李平反多隱德鄖人尸祝之性至孝於郭西先塋搆祠三楹呼號上食如生前問視狀其孺慕誠信蓋得於天性然也金天爵字理源六安人少嗜學事親盡色養親殁逄忌辰哀泣如初喪撫姪如己子初因艱嗣妻為置妾詢知宦裔具奩嫁之鄰被火幾百餘家天爵貸粟以贍悉賴以安程之光六安人性至孝雍正九年旌表泗州漢徐憲臨淮人居喪至孝白鳩巢於户側太守鄭宏舉為孝廉朝廷稱為白鳩郎南北朝宋王彭盱𣅿直瀆人元嘉初父喪家貧不能葬弟兄二人晝則傭力夜則號泣鄉里哀之為助力作甎時天旱井泉枯涸彭號天自訴泉忽湧出葬畢而竭太守表其事名其里曰通靈蠲租布二世宋朱壽昌天長人字康叔以父巽蔭補官歷知嶽閬二州有善政巽守京兆時壽昌母劉氏有娠而出生壽昌數歲乃還父家母子不相聞者五十年壽昌行四方求之不得熙寧初棄官入秦誓不見母不還乃相遇於同州母時年七十餘有數子悉迎以歸事聞詔壽昌還官壽昌以養母故求通判河中府數歲母卒哀毁幾喪明孝聞天下明陳逵五河人幼喪父為邑吏例得候選不忍違其母願乞冠帶終身母病割股及卒廬墓三年蔡興盱眙人父歿負土築墳廬墓三年景泰間旌楊藝泗州人母病割股得愈妻侯氏并以孝聞湯三聘泗州人父病篤三聘寢食俱廢刲股肉復以口吮便處父少安而三聘病歎曰父無恙豫敢更求生哉竟不起楊見復泗州人母陸氏病篤見復刲左股進母少安弟見和復割左膞遂全愈周夢兆泗州人父病夢兆咬左膞以進病得愈善事繼母無間言王之給泗州人年十四孀母病篤割股進之母遂愈蔣學顔盱眙人年十六割股救母旌表沈一元盱眙人母病劇醫藥弗效與弟一中俱禱天割股以進張桂泗州人善事繼母割股療病王大像天長人父葬廬墓三年時歸省母不入私室其妻共母臥起母病痢大像嘗之王枝天長人父卒母以年饑鬻枝於徽商枝念母時時哀泣商遣之歸而母已亡結廬墓傍悲號不輟有司聞而旌之唐堯智天長人年十二母病刲股作羮進之即愈後以貢授教職升湖廣上津縣知縣時按臣囑鄖道察鄖陽七邑奸宄道以舊怨株連百餘人堯智曰吾何忍以百命博一官焚其稿遂忤上官意調王府長史不就歸惟以勤學著書為事孫士俊亦割股療母疾許純忠天長人年十四割股愈母病馬應台天長人年十二母病刲肝作羮其兄應星亦刲股進母石梯天長人年十四割股愈父病繆悅道天長人田間兒也母病悅道刲肉熟之以啖母有教之者曰子誤矣須煮羮悅道再割作羮以進母病遂愈王應舉天長人櫛工也割股愈母病王和天長人割股愈母病許三選天長人割股療父病不使人知人有詢其事者曰此不能已之至情可以是聞於人耶張嘉彥天長人刲肝愈母病蘇旺仲弟智季弟旻與朱文玘俱泗州人正德間山東盜犯境旺等糾合鄉勇朱文玘等挺身迎戰各手刃數賊尋以賊衆力窮遇害州守義而祀之孫仁天長人家饒於資值歲荒百姓負官租千餘金仁慨為代償上官旌其義戚杰字世秀泗州人年十七中嘉靖乙丑進士授知縣擢吏部考功郎中杰少聘花氏女未婚而瞽及登進士婦家請易婚杰不可曰夫婦倫也疾廢命也吾不娶將安歸蔣臚盱眙人萬厯間以孝行旌張威天長人僉事張昊之僕昊征姚元洞蠻為賊所執昊曰我死國宜爾汝急歸家威曰主不歸我何之賊刃昊威力拒之曰寧殺我賊怒支解張氏世祀之胡世富天長人崇應第之僕應第少時嘗出遇盜被執索金世富紿之曰金在我槖執彼何為應第因得脫盜從世富求金不得被害王秋天長人王應芬之僕應芬遊粵嶠得疾秋籲天刲股進芬遂愈國朝董官治天長諸生工時文三刲股愈父母病潘其蓁蓁弟其茂天長人母病兄弟同日割股李鸞瑞天長人母病嘗糞割股母遂愈後十年母又病瑞再割右股療之孫中裕盱眙人割股愈母疾俞士瑄天長人歲貢生父母及生母殁皆勺水不入口哭不絶聲居喪三年不御酒肉冬不爐夏不扇後因修墓往反病暑而卒康熙四十三年旌表劉芳名泗州人兩割股以療母疾戚怡泗州人年十歲割股愈母病潘士吉天長人輕財尚義揚州破人掠子女至邑士吉遇則買而歸之有二幼女無歸撫之如己女長而擇配年七十二預知死期言笑而卒劉鼎盛顧僴張士巨繆自守四人俱天長人皆割股救父李行恭張𢎞業葉英陳養廉陳其弼王自明張儀胡時逹王禪八人俱天長人皆割股救母江南通志卷一百六十二欽定四庫全書
