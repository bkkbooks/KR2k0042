  text: 江南通志卷一百二十七選舉志舉人三𢎞治二年己酉科靳貴等共一百三十五人秪列一百二十四人靳貴丹徒人楊文無錫人馬性魯溧陽人汪循休寧人章鑾清河人淩雲翰上元人余溢溧陽人李鐄高郵人方罃休寧人王文翰高郵人黃孟珩常州人顏栐蘇州人張昊天長人徐紘常州人丁佶安慶人陳斌婺源人周明蕪湖人冀業寶應人胡大全徽州人陸筌常州人蔣訓常州人畢隆和州人王哲吳江人王階應天人朱輔廬江人王材望江人王悌崑山人宋愷華亭人馬繼祖如臯人錢仁夫常熟人於鄣太平人馮夔無錫人唐貴常州人程琯歙縣人魯鉞句容人陸舉興化人王彪應天人陳策無錫人周炯常熟人周鉞宿州人王翰江寧人張斯昺旌德人徐南上海人潘濓山陽人周滌常熟人羅鳳應天人朱光臨淮人曹䄎徽州人王俸蘇州人潘相蒙城人余瑄婺源人石城徐州人馮經金壇人李梁揚州人張天爵松江人陳珍祁門人陳英應天人王顏應天人顧潛崑山人李貞祥池州人陸鈞高郵人楊紳長洲人吕盛建平人方謙祁門人武臯和州人奚純長洲人楊珙無錫人張興績溪人王安滁州人李希顏松江人吳景南陵人汪浙全椒人白輔徐州人王矩旌德人盧瀚揚州人嚴謨江隂人褚圻常熟人陸徵溧陽人趙宗彝武進人王度徐州人夏輯溧水人邵績嘉定人秦慶常熟人楊鉞句容人周溥泰州人徐憲合肥人周冕池州人陳偉興化人丁倫懷寧人陳雲上海人陶金天長人劉嵩桐城人汪鋐婺源人朱天民六安人儲珊潁州人夏槐廣德人儲秀宜興人周淵邳州人梁魁武進人章瑞績溪人馬慶太倉衛人胡恩常熟人楊溢武進人廖縉金山衛人薛經武進人王儼江都人汝泰吳江人陳玠上元人魏文傑合肥人孫瑜淮安人周冕應天人施懋應天人李貞京衛人封澄嘉定人陶延威江隂人楊溱常州人湯暉蕪湖人曹鏷吳江人曹泰太倉人楊炯鎮江人段敏金壇人趙文蘇州人卞文明武進人王琦淮安人藍郁鹽城人馬萱無錫人陸冒吳縣人陶禬江隂人鄭賢徽州人𢎞治五年壬子科顧凊等共一百三十五人秪列一百三十四人顧清華亭人吳璲揚州人吳大有崑山人應天籍何忱松江人張𢎞至華亭人華昶無錫人顧伯謙臨淮籍吳縣人龍霓應天人李嘉祥池州人于鏊滁州人戴銑婺源人張復禮蘇州人胡宗海通州人胡爟蕪湖人趙經松江人王格靖江人安金江都人華夫無錫人莫驥無錫人王濟鎮江人張芝徽州人蘇霑清河人黃祥合肥人錢榮無錫人周在崑山人夏從壽常州人鄒琥廬州人宋臣松江人盛應期蘇州人鄒韶常熟人許陳謨鹽城人陳符宜興人趙鶴江都人陳彝崑山人李仁歙縣人程杲祁門人陳孜南陵人白金常州人曹閔松江人郭長洲人徐蕃泰州人吳龍蘇州人辛銘無錫人吳宗周寧國人夏璪常州人劉桐蘇州人陸伸崑山人王德無錫人薛金常州人程材徽州人曹時信松江人王賢海州人顧綸嘉定人張拱寶應人潘衡婺源人張霆上海人程忠顯徽州人顧楩常熟人李熙應天籍崑山人李儀應天人范岡南陵人錢季玉無錫人王軏揚州人邢珣當塗人陳秬廣德人陳濟儀真人趙遐齡武進人徐冠涇縣人錢祚華亭人顧達常熟人唐誥徽州人李偉潛山人丁容應天人劉麟京衛人張宏京衛人夏寅廬江人周倫崑山人朱昶江隂人李重金吾衛人王翊潁上人邵清應天人顧守元常熟人耿𢎞廣德人李杲宜興人王相句容人朱堂吳縣人江文奎旌德人張憲揚州人談一鳳無錫人齊貴營繕匠王頡寶應人連憲常熟人趙松上海人徐賢涇縣人王瓚丹徒人陳謐上元人鄭諫應天人孫繹來安人夏歷高郵人張菜丹徒人陳清蕪湖人蔡哲宜興人王纘祖宜興人宗悌太倉衛人程轍歙縣人周璽廬州人黃明華亭人張朝儀長洲人方欽巢縣人程隆徽州人徐環望江人胡獻興化人祝允明蘇州人夏梁高郵人秦鎰無錫人王緒應天人宗璽建平人江瑄徽州人吕元夫無錫人嚴桂無錫人皇甫録蘇州人陳林鎮海衛人樊光世合肥人陸隆恩常熟人李問應天人張湖巢縣人汪天民婺源人張翀泰興人章洗常熟人杭濟宜興人汪允厚婺源人胡蒙祁門人殷鏊應天人吳金吳江人𢎞治八年乙卯科王昶等共一百三十五人秪列一百三十四人王昶華亭人黃昭冮隂人徐鸞沭陽人葉天爵婺源人葉藟祁門人徐圭江隂人薛球江隂人曹廷直望江人徐昻泰興人沈信崑山人唐錦上海人蔣欽常熟人姚湘華亭人顧璘上元籍吳縣人張羽泰興人吳璽通州人楊瑋松江人左唐江都人陸節常州人汪標祁門人莊襗常州人陳霽吳縣人章嵩涇縣人邵經江隂人陳言常熟人陳鉞鳳陽人卞思敏江隂人左輔涇縣人張鳴鸞松江人鄭瓛應天人高夔金山衛人趙宬吳江人吳堂常熟人沈壽嘉定人鄭信武進人繆覲無錫人趙昶歙縣人劉貢徐州人王蓋宣城人康佑祁門人徐經江隂人張鳴鳳松江人虞夔金壇人陳播常熟人張瓚六合人吳寅常熟人陳瞻靖江人杭淮宜興人淩相通州人惲巍武進人吳完宜興人王鎬揚州人張承仁泰州人沈冕長洲人楊文升無錫人汪謙祁門人沈恩上海人王良佐松江人汪澗歙縣人吳蒙崑山人嚴經吳縣人楊修無錫人張邦瑞宜興人吳山武進人龔淵華亭人吳漳歙縣人王佑建平人高賔江隂人貢安甫江隂人龔震崑山人高節應天人何宗伊應天人吳閲泰興人吕律常州人周臣通州人梁材應天人洪通徽州人錢朝鳳廬江人吳鸞崑山人郁勳常熟人戴敏婺源人王槐常熟人張宗道休寧人林鶚江隂人葉相揚州人顧棠吳縣人吕璁廬江人丁楷安慶人范邦彥應天人張斯昌旌德人朱希周崑山人王輔涇縣人胡寧道江隂人桑翹常熟人顧克毅常州人徐瓚涇縣人都穆吳縣人貢斌江隂人林元吉龍江左衛人田璁江都人徐方江隂人蔣