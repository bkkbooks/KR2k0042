body:
  text: 江南通志卷八十五食貨志積貯文帝時賈誼上言積貯者天下之大命也茍粟多而財有餘何為而不成漢書食貨志鼂錯言務民於農桑薄賦斂廣畜積以實倉廩備水旱故民可得而食也又言粟者王者大用政之本務使天下人人入粟於邊以受爵免罪不過三嵗塞下之粟必多於是帝從其言令民入粟邊漢書食貨志武帝時都鄙倉庾盡滿太倉之粟陳陳相因充溢露積於外漢書食貨志宣帝五鳳中耿壽昌白令邊郡皆築倉以穀賤時增其價而糴以利農穀貴時減價而糶名曰常平倉民便之漢書食貨志南北朝齊武帝永明中立常平倉市積為儲詔於揚州治建業出錢千九百一十萬南徐州治京口二百萬各於郡所市糴南荆河州治壽春二百萬市絲綿紋錦布米大麥諸州不等均使臺傅並於所在市易文獻通考後魏明帝時徐揚內附收內兵資與人和糴積為邊備文獻通考唐制凶荒有社倉賑給唐書食貨志太宗時准戴胄議自王公以下計墾田秋熟所在為義倉其後洛相幽徐齊並秦蒲州又置常平倉粟藏九年米藏五年下濕之地粟藏五年米藏三年著為令唐書食貨志明皇開元七年荆揚等州並置常平倉唐書天寶八年義倉糧淮南道四百八十四萬八百七十五石江南道六百七十三萬九千二百七十石常平倉糧淮南道八萬一千一百五十二石江南道無考唐書德宗時趙贊請於兩都江陵成都揚汴蘇洪置常平倉輕重本錢上至百萬緡下至十萬積米粟布帛絲麻貴則下價而出之賤則加倍而收之唐書食貨志宋太祖乾德初詔諸州於各縣置義倉宋史食貨志真宗景德三年詔江南淮南皆立常平倉每嵗夏秋視市價量增以糴糶減價亦如之三年以上不糶即回充糧廩易以新粟宋史食貨志仁宗景祐中淮南轉運副使吳遵路言本路丁口百五十萬而常平錢粟才四十餘萬嵗饑不足以救恤願自經畫為二百萬他無得移用許之宋史食貨志神宗熙寧間詔淮南常平司於麥熟州郡及時兑糧宋史孝宗乾道間江南民艱食朱熹請於府得常平米六百石賑貸夏受之於倉冬則計米加息以償自後隨年斂散嵗歉則捐其息之半大饑盡蠲之凡十有四年得息米若干除以原數償府外見米三千一百石造倉貯之名社倉焉自此不復收息每石止收耗米三升鄉閭間雖遇凶年民不乏食淳熙八年奏於朝請行於倉司文獻通考附朱熹社倉記始豫居建之崇安嘗以民饑請於郡守徐公嚞得米六百斛以貸而因以為社倉今幾三十年矣共積至五千斛而嵗歉散之里中遂無凶年中間䝉恩召對輒以上聞詔施行之而諸道莫有應者獨閩帥趙公如愚使者宋公若水為能廣其法於數縣然亦不能逺也紹興五年春常州宜興大夫髙君商老實始為之於其縣善卷聞寶諸鄉凡為倉者十一合之為米二千五百餘斛擇邑之賢者承議郎趙君善石周君林承直郎周君世德以下二十餘人以典司之而以書來屬豫記豫心許之而未及為也㑹是嵗浙西水旱常州民饑尤極流殍滿路顧宜興獨得下熟而貸之所及者尤有賴焉然豫獨慮夫貸者之不能償而髙君之惠將有所窮也明年春高君將受代以去乃復與趙周諸君皆以書來趣豫文且言去嵗之冬民負米以輸者繦屬爭先視貸籍無籥合之不入豫於是益喜高君之惠將得久於其民又喜其民之信愛其上而不忍欺也則為記其所以然者抑又慮其久而不能無弊於其間也則又因而告之曰有治人無治法此雖老生之常談然其實不可易之至論也夫先王之世使民三年耕者必有一年之蓄故積三十年則有十年之蓄而民不病於凶饑此可謂萬世之良法也其次則漢之所謂常平者今固行之其法亦未嘗不善也然考之於古則三登太平之世不常有而驗之於今則常平者獨其法令簿書管鑰之僅存耳何也蓋無人以守之則法為徒法而不能以自行而况於所謂社倉者聚可食之物於鄉井荒闃之處而主之不以任職之吏馭之不以流徙之刑茍非常得聰明仁愛之令如高君又得忠信明察之士如今日之數公者相與并心一力以謹其出納而杜其姦欺則其法之難守不待他日而見之矣此又豫之所身試者故並書之以告後之君子云明洪武三年詔在京軍儲倉增設京畿漕運司官專督其事明典彚洪熙元年諭户部豫備倉儲比之前代常平最為良法宜遍行天下申明舊典勿事虛文明典彚宣德八年南直巡撫周忱奏定濟農倉法飭諸郡力行於是蘇州儲米六十餘萬石松常各郡次之令諸縣各廣濟衆倉擇縣官之廉公有威與民之賢者掌其籍司其出納遇災賑貸民不知饑明典彚附周忱折收本色疏略應天鎮江太平寧國諸府舊有石臼等湖其中港溝嵗辦魚課其外平墟淺灘聽民牧收孳畜採掘菱藕不得耕種是以每遇山溪泛漲水有所泄不為民患近者富豪之家築成墟田排遏湖水每遇水漲患即及民宜悉平之又各處被災恐預備倉儲賑濟不敷請以折銀糧稅悉徵本色於各倉收貯俟青黃不接之際出糶於民以所得銀物上納京庫則官稅不損民亦得濟正統七年南京户部侍郎張鳳言南京根本地不可不素蓄下部議每嵗分米二萬石命著為令明典彚嘉靖四年廬州知府龍誥修蓋義倉置買義田行賑糶賑貸賑濟之法又條積蓄便民八事覆准通行各府州縣隨宜酌處以備賑濟有成效者具奏加升如例明典彚九年題准嘉靖八年取到兩淮餘鹽銀十萬兩候秋成米價頗平分投委官召買運赴徐淮二倉交收明㑹典國朝順治十一年詔各府州縣俱有預備常平倉及義倉社倉積貯備荒責成該道員稽查舊積料理新儲每年二次造冊報部察積穀多寡分别議奏以定功罪十二年題准各衙門自理贖鍰春夏積銀秋冬積穀悉入常平倉備賑置簿登報布政司彚報督撫嵗底造報户部如有假公濟私隱匿漏報者督撫查參其鄉紳富民樂輸者地方官多方鼓勵勿勒定數勿使胥吏侵剋及加耗滋弊十三年議准積穀賑濟務令修葺倉厫印烙倉斛選擇倉書糴糶平價不許别項動支十七年議准常平倉穀春夏出糶秋冬糴還平價生息務期便民如遇凶荒即按數給散災户貧民飭有司實力奉行康熙十八年題准地方官整理常平倉每嵗秋收勸諭官紳士民捐輸米穀照例議叙鄉村立社倉鎮店立義倉捐輸積貯公舉本鄉敦重善良之人管理出陳入新春月借貸秋冬償還每石取息一斗嵗底州縣將數目呈詳上司報部管倉人儲穀多者題明給頂帶榮身有官吏掊剋者照侵欺錢糧例處分有强派抑勒借端擾民者該督撫題參治罪十九年覆准直省常平倉穀留本城備賑義社倉穀留本村備賑永停協解外郡附徐國相積穀救荒疏為積穀為救荒之要務官民有懼纍之隱情仰祈勑部永免撥解以鼓勵捐輸事竊惟水旱災傷乃盛世所不免惟在救濟有方預備有素則小民雖遇荒歉不致顛沛流離邇年以來江南等省災沴􅥐臻民生困苦屢厪睿懷發帑賑恤近經廷臣㑹議通行各省整理常平倉每嵗秋收之時勸諭官紳士民捐輸米穀其在鄉村鎮店內令百姓自立社倉義倉勸諭收貯等因奉有皇㫖欽遵移咨到臣仰見至計臣隨經轉行司道並有司上軫恤民生預籌備荒各官實力舉行勸諭官紳士民捐輸收貯統俟年終將捐積數目照例造冊彚報外惟是臣屬常平倉穀石自康熙七年撥解淮揚充賑之後舊積既虛新捐無幾又緣鳳廬等府連年荒旱支用無存㫖於臣奉過地方面問官紳士庶積穀乃救荒要著何所經以平日不思預備以致凶年飢饉無以自濟咸稱積穀原備本地凶荒前奉撥協外郡不惟本地未獲實濟而搬運繁難腳費不資反受賠纍之苦所以人皆畏縮捐貯寥寥等語臣隨諭前因淮揚異災不過一時權宜將來不復撥解勸令量力捐輸以備本地支用然在地方有此懼纍隱情非天語申奉永遵恐蚩蚩之民猶有疑懼不前仰祈飭皇上敕部嗣後常平積穀准留本地州縣備賑義倉社倉捐穀各留本村鎮備賑永免撥解外屬恭候命下之日臣大書榜示遍行曉諭將見鼓舞樂輸嵗增月集於以備凶荒而濟民艱利賴永永無既矣臣謹睿鑒施具行題伏乞二十九年諭常平倉不必撥給兵米又諭直省督撫嚴飭地方官吏家諭户曉務使及時積貯度終嵗所食常有餘儲又諭江寧京口等處大兵駐防之地著將漕米各截留十萬石建置倉厫以備積貯又議准各省常平倉俱照直𨽻分貯各州縣州縣官有升遷事故離任者照交代收受正項錢糧例取具印結有短少者該督撫題參照虧空正項錢糧處分三十一年諭積貯米榖最為要務今正值麥石收穫之時應行各該地方官勸諭百姓令各户量力捐輸積貯該州縣官將輸納之人姓名數目詳記冊籍其秋禾收穫以後亦依此例舉行如春月轉貸於乏穀之民俟秋月即照此數償還備用每嵗當收穫時遵行三十四年題准江南捐積穀石以七分存倉備賑以三分發糶秋收買穀還倉三十五年覆准江南出糶舊榖於本年為始輪年挨次出易又覆准江南於各屬糶三銀內酌提四萬石價銀解省俟秋成時收買新榖貯省以為下年存七糶三之用四十年題准截留楚省漕糧二十萬九千餘石存於江寧省倉此項米內動六萬四千石充給兵食將買兵米價值扣留動四萬五千石分發淮安等處照時價糶賣俟秋成將糶賣米價竝兵米扣留價值照數買補還倉四十一年諭直𨽻各省州縣雖設有常平倉收貯米石遇饑荒之年不敷賑濟亦未可定應於各村莊設立社倉收貯米石直𨽻有滿洲莊頭可合數村立一社倉其管理社倉事宜令莊頭內有情願經管者交與收貯百姓村莊公設社倉百姓有情願經管者交與收貯以備饑荒傳諭直𨽻巡撫如設立社倉果有益於民生著各省亦照例於各村莊設立社倉收貯穀石大學士㑹同九卿詳議遵㫖議定設立社倉於本鄉捐出即貯本鄉令本鄉誠實之人經管上嵗加謹收貯中嵗糶借易新下嵗量口發賑四十三年議准各省府州縣積貯米穀大州縣存一萬石中州縣八千石小州縣六千石其餘按時價易銀解存藩庫其存倉米穀每年以三分之一出陳易新又覆准江南江寧所屬大州縣存貯米五千石中州縣四千石小州縣三千石其江寧省倉捐米八百七十餘石久貯必致浥爛照常平倉每年糶三秋成買補四十八年覆准江浙二省蓋藏維艱各該有司勸諭紳士人民於秋收時遵行捐輸之法積貯備荒四十九年議准黴爛倉糧官員已經升任應革職留於新任限一年賠完之日開復五十三年諭江南暵旱將漕糧撥三十萬石江寧府十萬石蘇州府八萬石淮安揚州五萬石杭州府五萬石河南開封府二萬石著漕運總督親身閲兑速行運至令其加謹照數收貯六十年議准各省州縣現在存倉米麥穀石令該督撫嚴查如有虧空者勒限補足務期實貯以備賑濟倘有賑濟之時其存倉米穀虧空事發將有司官員即行革職治罪暨不行稽查之上司一併嚴加議處雍正元年議准常平倉積貯米穀定例嵗底各省督撫造冊奏銷如有虧空即行題參今各省存倉米穀雖有知府司道盤查管理不能保其一無狥私當責之督撫核實嚴查造冊具奏督撫離任將冊籍交代新任限三個月查核具奏如有虧空即行題參新任督撫不據實參出後經發覺一併議處仍令分賠又議准安徽壽州等州縣收成歉薄於安慶府留貯漕米十萬石內動米四萬石減價平糶俟秋收買補還項分貯鳳陽二萬石廬州府一萬石其餘一萬石仍運安慶收貯又覆准社倉之法原以勸善興仁該地方官務須開誠勸諭不得苛派以滋煩擾至收貯米石先於公所寺院收存俟息米已多成造倉厫收貯設立簿冊逐一登明其所捐之數不拘升斗積少成多若有奉公樂善捐至十石以上給以花紅三十石以上奬以扁額五十石以上遞加奬勵其有好善不倦年久數多捐至三四百石者該督撫奏聞給以八品頂帶其每社設正副社長擇端方立品家道殷實者二人果能出納有法鄉里推服令按年給奬如果十年無過該督撫題請給以八品頂帶狥縱者即行革懲侵蝕者按律治罪其收息之多寡每石收息二斗小歉減息一半大歉全免其息祇收本穀至十年後息已二倍於本祇以加一行息其出入之斗斛照部頒斗斛公行酌量社長預於四月上旬申報地方官依例給貸定日支散十月上旬申報依例收納兩平較量不得抑勒多收臨放時願借者先報社長州縣計口給發交納時社長先行示期依限完納其冊籍之登記一社設立用印官簿一樣二本一本社長收執一本繳州縣存查登記數目母得互異其存縣一本夏則五月申繳至秋頒出冬則十月申繳至來春領出不許遲延以滋弊竇每次事畢後社長本縣各將總數申報上司如有地方官抑勒那借强行糶賣侵蝕等事許社長呈告上司據實題參三年諭積貯倉糧特為備荒賑濟之用但南省地方甚屬潮濕米在倉一二年便致黴爛實難收貯改貯稻穀似可長久應否改貯稻穀收貯之處著詳議具奏遵㫖議定江安等省除安徽但有稻穀原無存貯米石無容改易江淮截漕米八萬餘石分作二年改換稻穀令地方官添造倉厫以備收貯又覆准江安等省所存米石俟改穀既完之後每年額徴應給兵糧仍收米石餘悉改徵稻穀各省均照此例其有虧空倉米者亦令悉以稻穀追補還項凡有需用挨年先碾舊穀支給倘需用米多一時礱碾不及應給米一石者給穀二石四年題淮安屬各府州縣雍正三年所存捐穀十萬石有竒內除太泗盱三州縣上年被災賑濟穀六萬九千餘石僅存三萬餘石將春撥冊內酌留雍正三年地丁銀十萬兩於秋收分發各屬採買貯倉又兩淮衆商公捐銀二十四萬兩又備鹽院公務銀八萬兩奉㫖以二萬兩給賞兩淮御史以三十萬兩為江南買貯米穀蓋造倉厫之用所蓋倉厫賜名鹽義倉即著兩淮御史交與商人經理遵㫖議定於揚州府治建倉積貯每年於青黃不接之時照存七糶三之例出陳易新或於米貴之時開倉平糶總至秋成糴補倘地方有賑濟之用各該撫一面具題一面動支管理之商人將出易糴補動支之數呈報巡鹽御史該御史核實奏報其出陳易新平糶平糴之內或有嬴餘即以增買米穀又諭今嵗江南地方秋雨稍多其江安所屬被水之州縣已令該督撫轉飭有司確查賑恤務使小民得所但聞入冬以後時有隂雨積水未消秋麥未能及時耕種恐交春米價漸昂而青黃不接之時更須為籌及况蘇松户口繁多民間食米多取給於外販尤當早為留意查江安糧道有存貯還漕一項約計二萬八千餘石安慶廬州淮安鳳陽四府各有分貯存留之項共計九萬餘石此米原為地方備用而設但恐年月已久未必實貯在倉應差京官一員前往確查竝㑹同江南督撫作何分别留運平糶之法以濟民食但江南地廣人稠恐需米之處此數未必敷用必設法多貯方覺寬裕其應作何採買運送備用之處著九卿速議具奏遵㫖議定江南地廣人稠需用米穀倍於他省動帑買運以濟民食恐稽時日暫照河工議叙貢監之例將銀兩改為本色米穀每銀一兩收米一石或穀二石鄰省之人亦准捐輸不論稄秈紅白兼收行文江南總督蘇州安慶巡撫一面動支正項錢糧委員於出産米石地方照依時價採買運送其採買若干運貯何地之處該督撫公同商酌妥議具奏一面行文鄰省並出示曉諭本省才俊令其急公赴輸且分别府州縣之大小酌量應輸米穀之多寡俟各該處應貯米穀捐足之日即行停止其所收米穀加謹存貯按季造冊報部如有私自收取折銀並勒索包攬情弊即行指名題參從重治罪此所貯米穀有應用平糶賑散出借之處該督撫一面具題一面即行動支將動用數目報部查核又覆准蘇松常三府買穀八萬石收貯九年六月准安慶巡撫程元章酌議平糶還倉新舊交代例附程元章疏略存貯倉穀厯年久逺必有浥爛每嵗當春月青黃不接之時存七糶三銀貯府庫秋收買補還倉三年之間將存貯穀石徹底換新既有濟於民生且有益於倉儲洵為經久無弊之道且春月價必少昻秋收買補有多餘之穀另倉存貯聽撥公用查上江數年以來各州縣並未平糶直至新舊代交之際盤量折耗民不受平糶之益官徒受賠纍之苦穀不能出陳易新一旦撥賑亦無好穀官民俱為未便揆厥所由皆以糶賣之後交代推諉每致掣肘所以寧使其浥爛參賠而必不敢以言平糶也臣思倉穀交代原應實貯在倉春糶必須秋糴請以十月開倉收漕為期如十月十五日以前接印交代所存穀價責令新官買補還倉十月十五日以後接印交代所存穀價仍令舊官買補還倉按時定議舊官必及時買補不敢延挨新官必按時接買無敢勒掯如此則新舊官俱無掣肘而民受平糶之益矣江南通志卷八十五
