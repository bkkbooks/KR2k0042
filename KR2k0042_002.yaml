body:
  text: 江南通志卷二輿地志圖説二安慶府圖有説徽州府圖有説寧國府圖有説池州府圖有説太平府圖有説廬州府圖有説鳳陽府圖有説潁州府圖有説滁州圖有説和州圖有説廣德州圖有説六安州圖有説泗州圖有説安慶府圖説安慶府天文斗分野星紀之次其地東連無為北距舒城南及西界於江楚所屬六邑瀕江者四焉大江自蘄黃東滙潯陽彭蠡之水入宿松界小孤山屹立中流江濤迅急元人立鐵柱於此曰海門第一關實為郡之門户又東經望江縣抵郡城繞其三面又東過桐城之樅陽鎮入無為州江行府境凡四百餘里其形勢上控全楚下蔽金陵故六朝俱以皖城為重鎮迄今撫臣開府其地以鞏固疆宇焉境內諸山則有府治之大龍百子桐城之龍眠浮渡潛山之天柱太湖之司空皆嶔﨑磅礴作鎮一方水則滙為川澮瀦為陂澤莫不灌輸於江而以潛水樅陽河為之經昔人稱其山深秀而穎厚水迤邐而蕩潏鍾美藴靈巍然為上遊都會良有以也若乃其地扼江之衝巨浸環之一遇淫霖易致暴漲其逺於江者又攴流易涸則溝洫之務視築防為尤要矣徽州府圖説徽州府天文斗分野星紀之次其地北距寧郡之太平西界江西東及南俱連於浙郡在山嶺川谷﨑嶇之中地勢斗絶山水雄深巍峩以俯吳會盤踞亘乎楚尾據兩浙之上遊為百城之襟帶其山以黃山白嶽為最而齊雲之髙則郡內諸峯一覽可盡若休寧之白際馬金婺源之張公浙嶺石耳桃源祁門之厯山大共黟縣之魚亭牛泉績溪之大鄣巃嵸徽嶺大熬或髙峯峭壁上矗雲霄或復嶺重岡旁跨州邑能令遊觀者賞其幽遐安土者樂其奧窔焉巃嵸山與府北之篛嶺通寧國者也昱嶺大鱅嶺界浙之衢嚴者也黃竹嶺梅嶺連江西之饒郡者也五嶺在休婺之間尤稱險塞其水則郡城之練溪納黃山巃嵸山之水而注於歙浦又會休婺祁黟四水同為新安江入於錢唐婺源之武溪祁門之大共二水西流入於彭蠡入浙江者為灘三百六十入彭蠡者為灘亦三百六十觀於水而地勢之髙可知矣府屬六邑咸有溪山之勝然嶺谷險狹壤地磽瘠水湍悍少瀦畜不雨易枯驟雨則山漲暴至故農事必豫為之備焉寧國府圖説寧國府天文斗分野星紀之次東距建平西接青陽南抵績溪北連姑孰自昔推為名勝之郡其山之脈有三南由黃山者厯太平旌德之東寧國之西而抵於郡治東南由天目者一厯廣德西南至郡治之東一自溧水南界建平西界而出於南湖之北西南由九華者厯涇縣之西而北至於南陵若府治之陵陽敬亭柏梘華陽麻姑行廊寧國之文脊紫山涇之水西承流太平之黃山陵陽南陵之工山朗陵皆名山也水之源亦有三南由績溪叢山及天目北麓者厯寧國至郡治為句溪與宛溪合西由太平涇川者至郡治為青弋江東由建平者瀦於南湖西合宛句二溪及青弋江而西會於黃池又北流至蕪湖入於江他若寧國之東西二溪涇縣之賞溪藤溪太平之麻川旌德之徽水南陵之小淮水皆巨川也其險厄形勢被山帶江襟池負歙為東南要郡焉池州府圖説池州府天文斗分野星紀之次其地東距南陵西連彭澤南屆祁門北抵桐城大江自西流入境馬當山橫枕其中為彭澤東流分界之所昔以為兼太行吕梁之險者由此而東徑郡城北又東徑銅陵縣鵲頭山六朝置戌於此以為重鎮江北岸則安慶桐城及無為州之境也郡襟帶江山控扼肥皖居金陵之上遊當江濱之孔道稱要會焉山之著者曰九華水之美者曰秋浦所謂九華之秀秋浦之清也郡之西南二百餘里崇山峻嶺壤界徽饒青陽東通山越建德南接鄱陽俱為嶺隘崇峻之地其濱江要害則上自東流之紫磯下抵銅陵之燕支夾凡四百八十里磯嘴森列焉郡地山多而泉寒田畝既少近江之區稍稱沃衍而蒹葭萬頃且浮於通郡之田矣太平府圖説太平府天文斗分野星紀之次其地東界溧水西接厯陽南連寧國北距金陵轄三縣枕大江江水西南自池州府入繁昌縣界有赭圻戰鳥山三山磯及鵲尾虎檻二洲皆舟師屯營之所江水又東北經蕪湖西過蟂磯其北岸即無為州又北徑府治西博望山在其西南與和州梁山對峙相去不過數里遙望如門故謂之天門山其西北則牛渚山在焉北對和州橫江江面甚狹易於津涉江水又北入江寧縣故自上遊來者則天門當其要害自橫江渡者則牛渚扼其咽喉所謂天限巖峻江津之襟要矣郡境之水則江徽寧池廣德諸溪流滙為石臼固城丹陽三湖而丹陽為最大郡之巨浸也其山則繁昌之山皆自南而北盡於丹陽之陰當塗之山皆自北而南盡於丹陽之陽蕪湖則濱丹陽而縣故縣南山接繁昌而縣北山接當塗回環奧區皆稱磐固之邑廬州府圖説廬州府天文斗分野星紀之次其地東距含山西阻灊邑南界桐城北接定逺為淮右之襟喉長江之唇齒江南要郡也江自桐城東行百八十里抵無為州江中有蟂磯與太平之蕪湖分界又東三十里至裕溪口入和州境裕溪者即濡須水之分流也巢湖周四百餘里占合肥舒城廬江巢四邑之境為淮南巨浸濡須水出焉東南流經濡須七寶二山之間中有石梁通流即東關口也其水出關口東注大江江流至此闊而多夾闊則浪平夾多則無風威最利津渡故自昔號為三吳之要害焉又有大小二峴在府治東自和州西趨夀陽自夀陽東抵金陵此為要路而小峴與含山連脈尤稱險塞又三公山在無為州西南界廬桐通英霍連亘數百里亦稱深險至若府境南阻大江北帶淮肥內擁巢湖夏秋暴漲動成澤國而平原曠野又以旱乾為病是在守土者鳯陽府圖説鳯陽府天文斗分野星紀之次懷逺虹縣奎婁分野降婁之次宿州房心分野大火之次其地東距滁城西接汝陰南界居巢北連蕭邑淮水西自潁上縣流至夀州有峽石山控其兩岸又東北厯懷逺則荆塗二山對峙而渦水自西北來流入於此所謂淮有渦口之險是也又經鳯陽臨淮而東入泗州之境其東南則澮潼漴沱所滙而入也郡上連汝潁下通楚泗為金陵之肩背南北之腰膂而其形勝則繫乎長淮一水焉臨淮居兩淮之中夀州稱淮南都會輻輳水陸襟帶淮淝故夀春鍾離號為重鎮云其淮以北之靈璧虹縣則汴睢諸水所經宿州為徐泗衝要古所謂符離之塞者也蓋郡山川龎厚有中原之風土而壤地膏腴前代耕屯厯有成效其後斥鹵彌望民或呰窳偷生有廣土而無良田遭遇隆平重農積穀講求水利則芍陂之遺利有不可勝用者矣潁州府圖説潁州府天文房心分野大火之次霍丘斗分野星紀之次其地東距鳯陽北抵徐州南接巢廬西南界跨中州淮水自河南固始縣流入霍丘又東北經潁上而至夀州潁汝二川俱於此入淮地勢平曠襟帶長淮津梁汴宋舟車四達南北衝要也昔人稱其土厚水甘又稱其水直而清曲而漪風土之美秉中和之氣多焉霍丘之南岡巒鬱積南接英六西連楚豫亦險塞之地矣亳州平衍無山其水皆東流入渦以達於淮太和之沙河下流為潁水其境多湖蕩水利治則成沃壤蒙城前襟黃河後繞渦水蓋鍾離之藩翼云滁州圖説滁州天文牛女分野星紀之次其地南接厯陽東通六合西距潁夀北達盱眙介於江淮之間倚大江以俯金陵四達之地兩淮之樞要也其山自中州蜿蜒而來琅琊馬鞍蔽其東南石臺清流障其西北所謂環滁皆山者也滁水為淮南大川自合肥縣流入全椒界又東北經州城南又東入六合縣達於瓜步注於江州境之水俱會於此清流關距其西北崇山峻嶺聨絡如柵自昔號為巖險若乃土厚而泉甘民朴而事簡山髙水清洵為勝地和州圖説和州天文牛女分野星紀之次其地西控合肥北接滁濠東南臨大江江自無為州流入南與當塗分界博望梁山之所對峙也乂東北入江浦縣境而烏江當利二浦為州境之津要裕溪自巢縣東流入含山經州城南注於大江即濡須水之分流也濡須山三國時為戌守要地稱重險云若夫橫江之渡直對采石浦口之濟斜睨金陵昭關之西走夀陽滁中之北通濠泗水陸皆當衝要洵淮南之重地建康姑孰之襟喉也其浸之大者曰厯陽湖明初涸其水以為田則畎澮溝洫之制守茲土者所當隨地酌宜者矣廣德州圖説廣德州天文斗牛分野星紀之次其地西接宣城北抵溧陽東與南皆界於浙川谷盤紆襟帶吳越桐水出於州南之桐源山北流經建平縣入於丹陽湖州治西北有橫山即楚子重伐吳所至之衡山也建平東北有伍牙山相傳子胥伐楚道經於此州當往來之衝自昔然矣山髙而溪峻水無停瀦田犖確無魚鹽之利林澤之饒賦不登於上錯産不逮於中人守土者興陂塘以時蓄泄蓋要務也建平西北有南崎湖實滙州與建平之水以入丹陽湖者六安州圖説六安州天文斗分野星紀之次其地東界廬州北連濠夀南望皖桐西通楚豫山川環繞號為險隘自州之西南以迄東北皆崇山峻嶺蔽虧日月東有龍穴西有武陟霍嶽鎮其南沙河縈其北巖險控引於荆湖平塗直逹乎梁宋實廬州之喉舌淮西之要地也霍山因山名縣即漢武巡狩禮之以為南嶽者英山縣西逹河南之固始西南接湖廣之羅田萬山磅礴三省交會若因繁劇而用之饒裕所謂淮右名州沃野千里者在所經畫而已泗州圖説泗州及五河天文奎婁分野降婁之次盱眙天長斗分野星紀之次其地東接淮安南連六合西通靈璧北抵下邳為水陸都會與淮郡以洪澤湖為界而黃河北滙於清口長淮西引於桐柏上通宿夀下達維揚所謂梁宋吳楚之衝齊魯汴洛之道也地平曠無髙山茂林而岡壟盤結風氣凝萃稱形勝之區焉盱眙阻山帶水為淮南衝要於古稱重鎮天長南近大江北通淮泗左揚潤而右濠夀其地四達五河縣有五河口為澮沱漴潼四水入淮之處並通舟楫南北往來之會也蓋州以淮流為襟帶其形勢與鳯陽略同而盱眙天長表裏江淮云江南通志卷二
