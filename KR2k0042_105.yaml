body:
  text: 江南通志卷一百六職官志文職八國朝統部承宣布政使司國初分左右二使並駐省城順治十八年分右布政駐蘇州轄江寧蘇松常鎮五府康熙五年並轄淮揚徐三府州左駐省城轄安徽寧池太廬鳳滁和廣等七府三州康熙六年並停左右之名分為上江下江兩藩司不相統領雍正二年上江分出六泗潁亳四州下江分出太海邳通四州俱為直隸十一年下江升徐州為府併入邳州十三年上江升潁州為府併入亳州兩藩司仍照舊統轄安藩屬有長盈庫大使一員經歷一員蘇藩屬有永盈庫大使一員理問一員左布政張士第掖縣人進士順治二年任朱國柱瀋陽人戶部啓心郎順治二年任趙福星奉天人生員順治四年任劉漢祚奉天人監生順治五年任陳培徵奉天人監生順治十三年任徐為卿奉天人監生順治十六年任崔澄奉天人康熙元年任王鍈諸城人進士康熙三年任金鋐浙江人進士康熙五年任右布政申朝紀奉天人生員順治二年任孫肇興莘縣人進士順治三年任鄭廷櫆澄海人舉人順治九年任馮如京振武衛人恩貢順冶十一年任王無咎孟津人進士順治十四年任毛一麟奉天人貢生順治十六年任孫岱奉天人康熙元年任江蘇布政使司佟彭年正藍旗人舉人康熙二年任慕天顔靜寧人進士康熙九年任丁思孔鑲黃旗人進士康熙十五年任章欽文宛平人貢監康熙二十二年任劉鼎正白旗人䕃生康熙二十五年任宋犖商邱人隂生康熙二十六年任胡獻徵武陵人䕃生康熙二十七年任李國亮奉天人舉人康熙二十八年任張志棟昌邑人進士康熙三十年任劉殿衡鑲白旗人康熙三十八年任宜思恭正白旗人康熙四十三年任金世揚正黃旗人康熙四十九年任牟欽元正白旗人康熙五十二年任李世仁大興人康熙五十三年任楊朝麟正白旗人康熙五十六年任李世仁康熙五十八年再任鄂爾泰鑲藍旗人舉人雍正元年任漆紹文新昌人進士雍正三年任張坦麟漢陽人舉人雍正五年任趙向奎聞喜人雍正六年任高斌鑲黃旗人雍正七年任白鍾山正藍旗人雍正九年任王之錡湘隂人雍正十二年署任劉藩長洪洞人監生雍正十二年任郭朝鼎鑲紅旗人監生雍正十三年署任張渠武強人副榜雍正十三年任安徽布政使司法若真膠州人進士康熙七年任徐國相奉天人康熙九年任龔佳育仁和人吏員康熙十六年任柯永升鑲紅旗人䕃生康熙二十二年任鄭端棗強人進士康熙二十七年任佟國佐正藍旗人官生康熙二十八年任李偉武清人舉人康熙三十三年任張四教奉天人䕃生康熙三十六年任常名揚正白旗人廕生康熙四十年任趙世顯奉天人廕生康熙四十一年任施世綸鑲黃旗人廕生康熙四十三年任鄭昱黃岡人進士康熙四十四年任李法祖鐵嶺衛人廕生康熙四十四年任馬逸姿武功人難廕康熙四十八年任張聖佐奉天人貢生康熙五十二年任年希堯鑲白旗人監生康熙五十六年任李馥福清人舉人康熙五十九年任董永芠正黃旗人廕生雍正元年任博爾多鑲白旗人舉人雍正二年任覺羅石麟正紅旗人雍正四年任噶爾泰滿洲人雍正五年署任張元懷宣化人進士雍正八年任劉柟髙陽人歲貢雍正八年署任陳𢎞謀全州人進士雍正九年署任馮景夏桐鄉人舉人雍正十年任李蘭樂亭人進士雍正十一年任孔傳煥曲阜人貢生雍正十三年署任晏斯盛新喻人進士乾隆元年任提刑按察使司舊制通省止設按察使一員駐省城康熙三年又添設一司南駐省城轄江蘇九府一州北駐安慶府轄安徽五府三州江北一員係添設康熙三年駐泗州五年駐安慶康熙五年南改為江蘇按察使管七府一州北改為安徽按察使管七府三州不相統領雍正八年江蘇臬司移駐蘇州雍正二年上江分出六泗潁亳四州下江分出太海邳通四州俱為直隸十一年下江升徐州為府併入邳州十三年上江升潁州為府併入亳州兩臬司仍照舊統轄江蘇屬有經歷一員司獄一員安徽屬有照磨一員司獄一員通省按察使司于重華青城人進士順治二年任張文衡開平衛人廩生順治四年任土國寶大同人順治四年任夏一鶚正藍旗人生員順治五年任謝道正藍旗人生員順治八年任史記功正白旗人生員順治十一年任余應魁奉天人監生順治十二年任許宸內鄉人進士順治十三年任盧慎言晉州人官生順治十四年任姚延著烏程人進士順治十六年任藍潤即墨人進士順治十七年任劉興漢鑲黃旗人監生順治十八年任柳天擎奉天人佐領康熙元年任李芝蘭鐵嶺人貢生康熙元年任石琳奉天人康熙三年任江蘇按察使司陳秉直鑲黃旗人貢生康熙二年任劉景榮鑲白旗人進士康熙四年任崔維雅直隸人舉人康熙十三年任金鎮宛平人舉人康熙十八年任卞永譽正白旗人廕生康熙二十三年任李元亮鑲紅旗人舉人康熙二十五年任高承爵鑲白旗人廕生康熙二十八年任王燕宛平人廕生康熙三十一年任趙世顯奉天人佟育秀正藍旗人王繻睢州人髙必𢎞缺張伯行儀封人進士康熙四十五年任馬逸姿武功人䕃生康熙四十六年任焦映漢武功人康熙四十九年任盧詢鑲紅旗人康熙五十一年任甘國璧正藍旗人康熙五十二年任祖業𢎞正黃旗人康熙五十三年任李馥福清人舉人康熙五十七年任葛繼孔浙江人康熙五十九年任張楷正藍旗人雍正二年任徐琳鑲黃旗人雍正二年任白清鑲紅旗人雍正五年任董永芠正黃旗人雍正六年任馬世珩正黃旗人雍正七年任徐本錢塘人進士雍正八年任喬世臣滋陽人進士雍正八年任刁承祖祁州人進士雍正九年任徐士林文登人進士雍正十一年任姚孔鈵桐城人廩生保舉雍正十二年署任郭朝鼎鑲紅旗人例監雍正十二年任安徽按