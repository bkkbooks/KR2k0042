body:
  text: 江南通志卷八十六食貨志物産通省所同者列於前其專産之物與雖同有而其産尤佳者於各郡縣下條注之穀之品曰麥曰稻曰菽麥之類曰小麥曰麰麥即大麥也曰荍麥稻之類曰秈曰穤曰晚秈之屬有早白秈觀音秈銀條秈六月秈蘆桿秈等類穤之屬有羊脂穤麻觔穤雀不知虎皮穤猪鬃穤光頭穤等類晚之屬有紅芒白芒之不同菽之類曰大豆青黄黑其色三曰菉豆曰赤豆曰豌豆曰蠶豆曰稨豆又有長而架生者曰刀豆曰豇豆洲渚野生者曰穭豆黍之屬二有黑黍有赤黍稷之屬曰小米麻之屬曰胡麻有黑白二種以色黑者為佳即芝麻蔬之品曰菘曰筍曰芥曰芹芹有二曰青芹曰白芹曰韮以春初為勝曰葱曰蒜曰薑曰莧曰茄曰薺曰菌有五色或微毒食宜慎曰萵苣曰蘿葡野生者曰漚藍瓜之屬曰王瓜曰絲瓜曰西瓜曰甜瓜曰苦瓜曰冬瓜曰北瓜其生於水者曰茭瓜曰茭菜曰蒲菜味甜而膩粉者曰薯蕷一名山藥曰芋大者為芋頭即蹲鴟也果之品曰桃曰李曰杏曰梅曰棗曰柿曰榴曰橙曰橘曰梨曰香櫞曰木瓜曰樝子曰林檎曰櫻桃曰胡桃曰栗曰蓮曰藕曰菱曰芰曰芡曰鳬茨曰落花生曰甘蔗服用之屬有紗有紬有緞絲皆外省出織工江寧稱善有棉布有絹有麻有葛布有土布有絲綿有土紬有攢紬合絲為縷尤堅而可久有羽扇有折紙扇有竹絲器有螺蜔漆器木之屬曰柏曰松曰檜曰桑曰柘曰楮曰榆曰槿曰槐曰檀曰椿曰樗曰楸曰棟曰梧桐曰楊曰栁曰冬青曰石楠曰烏桕曰皂莢曰合歡曰楓香曰杉曰梓曰椶曰黄楊竹之屬曰筀竹曰淡竹曰燕竹曰水竹曰牙竹曰斑竹曰紫竹曰木竹其質厚味辣又名剛竹曰鳳尾竹曰慈孝竹二者尤細宻可愛草之屬曰芭蕉曰雁來紅曰映山紅曰藍曰莎曰苔曰鳳尾曰翠雲曰吉祥曰萬年青曰虎耳曰蓼曰蘋曰荇花之品曰梅梅有三曰玉蝶曰綠蕚曰硃砂以緑蕚者為勝曰桃曰李曰杏曰梨曰夾竹桃曰玉芙蓉曰木筆即辛夷曰玉蘭海棠有四曰西府曰垂絲曰貼梗曰毛葉外此草本則秋海棠也曰紫薇曰薔薇曰桂曰丹桂曰芍藥曰牡丹曰蘭曰蕙曰菊曰水仙曰罌粟曰鷄冠曰千葉蓮曰錦邊蓮曰虞美人曰杜鵑曰碧桃曰山茶曰海桐曰蠟梅曰繡毬曰荼􅐘曰梔子曰榴曰茉莉曰鳳仙曰玉簪曰剪春羅曰剪秋紗曰棣棠曰萱藥之品曰桔梗曰蒼术曰白术曰茯苓曰枸杞曰逺志曰白頭翁曰何首烏曰升麻曰防風曰細辛曰烏頭曰山慈菇一名金燈花冬月生葉如水仙而狹曰龍膽草曰杜蘅一名馬蹄香曰鬼督郵一名獨摇無風自動曰芎藭即川芎也葉似芹曰孩兒菊一名澤蘭曰香薷曰薄荷曰蘇曰艾曰青蒿曰夏枯草曰􅭀薟曰木賊曰麥門冬曰天門冬曰決明曰澤瀉曰藍澱澱即靛也曰蓼曰萞麻曰半夏曰兎絲曰栝蔞其根為天花粉曰葛根曰茜草曰絡石曰木蓮曰旱蓮草曰忍冬曰菖蒲曰苦參曰香附曰茵陳曰車前曰百部曰商陸曰芫花曰南燭曰蒼耳曰蒲公英曰鴨蹠草曰旋覆花曰天名精曰益母草曰土貝母曰土牛膝曰尋骨風曰棋盤草曰紫花地丁曰禹餘糧曰石腦曰金櫻子曰元胡索曰葳㽔曰黄柏曰土大黄禽之屬曰鵝曰鴨曰鷄曰烏曰鵲曰鴉曰雀曰䳺鶉曰鳩曰鷹曰鶻曰魚虎曰鳬曰雉曰鴿曰鸕鷀獸之屬曰牛曰羊曰猪曰犬曰驢曰騾曰貓曰兎曰獾鱗介之屬曰魴曰鯉曰鯽曰鱸曰鱅曰鱮即鰱也曰鰣出揚子江初夏郭公鳥鳴時有之曰刀鱭曰河豚曰鰻曰比目曰鱖曰鱘曰鱓其介屬曰螺曰蚌曰蠏曰龜曰鼈曰蛤蜊曰蜆虫之屬曰蟬曰蜂曰蝶曰蟻曰蛇曰螢曰蟋蟀即促織曰蜻蜓曰螳螂曰絡緯曰蜘蛛曰蠅曰蛙曰蛟曰蝎虎即守宮曰蚓曰蝸牛曰蜈蚣曰蚱蜢江寧府觀音秈出江寧縣之金牛洞姚棗出上元姚坊門長大而甘脆木瓜出上元攝山𤣥武湖藕甘嫩無渣滓𤣥武湖菱入口如冰雪自化皆出上元縣太平門外櫻桃江寧靈谷寺者佳銀杏出江寧之天闕山鰣魚出揚子江心上江二邑同折紙扇出江寧城中者四方稱最茶江寧天闕山茶香色俱絶城内清凉山茶上元東郷攝山茶味皆香甘雨花臺石出江寧聚寳山茅山石出句容茅山蒼术出句容茅山黄連香出句容茅山赭石出六合冶山供繪事黄精出句容茅山浮石出六合冶山通體虚靈入水不沒靈巖石文理精竒天然異彩出六合靈巖山貽陸君弼夏日答朱憲昌山人以錦石見詩有云開門或枉故人書貽我錦石五色舒貯之磁盤白盈尺旋汲清泉助生魄翠比結緑紅靺鞨紋如指螺瑩無跡嫋嫋含姿鬬水晶粼粼照案吹寒碧慈石出六合冶山取鐵如慈母招子故名石墨出句容茅山芝草芝有八品曰龍芝燕胎芝洞草芝萪玉芝㕘成芝夜光芝琅葛芝熒火芝前志皆云出句容茅山然土人云芝靈物可遇而不可求苧絲文絹羅紗貢緞皆出江寧城中雉兎俱出句容氆氌出溧水羽扇野鳬鴛鴦章雞俱出高淳浦酒出江浦瓢兒菜出冬月者味甘美冠於他蔬郡城特産也或取其種植於他邑則味變而質粗矣白芹味清爽冬底春初尤為香嫩亦郡城之特産也士夫春讌皆以剪芹為名大頭菜芥之屬也其根大如蘿蔔以炒鹽茴香製之香脆異常惟上元江寧二邑有之四方用相餽遺雪裡紅亦芥屬也莖圓葉微小於芥醃為冬菜味辛香爽人心脾惟郡城多出焉箭桿白菜菘之屬也取其中心嫩芽以為羮味甘美絶倫其外大莖葉以鹽醃之可以禦冬正月食之尤香脆吳下謂之蔵菜然不若江寧郡城者之佳也竹竹類不一郡邑皆有蘿蔔有紅白二種各郡皆産惟江寧郡城出者肥碩嫩脆味爽蘇州府紅蓮稻芒紅粒大有早晚二種唐陸龜䝉詩近炊香稻識紅蓮檀邱米出吳江粒圓而大矮糯一名矮兒糯粒白而大雲南豆似稨豆大而長紅色可愛金釵糯粒長唐劉夢得句酒法得傳吳米好蓴菜味滑出吳江亦稱蒓線即張翰所思者吳中佳品臺菜冬種春生臺韮冬末春初卷茁者名韮芽産崑山者為勝百葉緗梅花葉至二十餘瓣差小而蕊極繁密江梅花疎瘦而早開官城梅花敷腴而遲光福鄧尉山香雪萬重幾三十里洞庭長坂亦最盛焉海棠常熟文村有樹髙二丈餘榦盈抱花最艷云種出海東甘菊花出蘇郡學圃者尤良丁香有紫白二種矮桃出長洲最髙者一二尺結實約重六七兩深秋方成熟其味甘美異常桃消梅其實鬆脆為梅中之最上品出吳縣水蜜桃近出吳縣南園漿液香甘不讓綏寧櫻桃即含桃出常熟者更佳白居易詩云含桃最説出東吳香色鮮濃氣味殊枇杷出洞庭東山者名白沙味大甘初接則核小再接則無核楊梅吳中名品味配閩之茘枝出光福銅坑者第一出聚塢者次之綠橘出洞庭兩山大而深緑色未霜臍間一㸃先黄者佳真柑出洞庭而品特髙其木畏霜雪金柑常熟沙頭稱最金竹色如蒸栗蔣堂詩云百鎰先寒一徑深潛移造化鑄成金荸薺即鳬茨出元和華林村者色紅味美不耐久出吳江陳灣村者色黑帶泥可致逺蘭花筍吳林云岳園泥黑色産筍肥大香似幽蘭方竹吳中佳植可以為杖木瓜産洞庭山者清香可玩香櫞蘇郡産比他郡為多薄荷府學前南園者名龍腦薄荷紫蘇出府學前其葉背面皆紫鱸魚巨口細鱗出吳江長橋南者佳鮆魚出太湖多子銀魚出鶯脰湖者眼圍金色土人多鱐以致逺鱠殘魚出太湖鱖魚狀似鱸燈草出郭巷者佳太湖石出洞庭西山水底者佳㠛村石出靈巖山可為硯堯峯石天然蒼翠錦蘇錦各種五色炫燿紵絲出郡城羅紗綾絹線紬綿紬紋紬春紬捺紬飛花布縑絲布斜紋布麻布草布以上皆出蘇郡吳中以蠶桑紡績為工故布帛之屬衣被四方堆紗繡絨刻絲三種皆吳中名品蓆出虎邱者佳次出滸墅蓆草出吳江平望震澤花箋出郡城香爐銅器出郡城竹筯藤枕木梳斑竹器俱出虎邱崑刀出崑山芡實俗名雞豆出吳江者殻薄而糯出元和車坊者次之有粳糯之分腐乳蘇郡名品茶出虎邱金粟房其色白香如幽蘭採於穀雨前為雨前茶天池伏龍俱佳此為最又洞庭兩山亦出佳茗松江府香粳七月熟米粒小而性柔類糯有紅芒白芒二種箭子稻粒長而細色白味甘香稻之上品九月熟金釵穤米粒長最宜釀得酒倍多三月種七月熟寒豆宋楊萬里詩云翠莢中排淺碧珠甘欺崖蜜輭欺酥即蠶豆蓴菜出華亭谷及松江甘滑宜芼羮葉似露葵四月生名雉尾蓴最肥美宋楊萬里詩鮫人直下白龍潭割得龍公滑碧髯曉起相傳蕋珠殿夜來失却水晶簾一杯淡煑宜醒酒千里何須更下鹽可是士衡殺風景却將羶膩比清纎蘭笋山笋本出佘山特因其笋味如蘭賜佳名蘭笋山茶色淡而味清芬亦絶品也水密桃出上海顧氏露香園在金桃李光桃雷震紅諸種之上梅皮出青浦削青梅皮以蜜製之味殊甘脆黄金間碧玉竹上海所産五茄皮出郡中每嵗春時郷人採其嫩芽焙乾以餽京洛顧繡上海顧氏露香園所製烏絲絹出郡城光細滑澤望之如水絹箋出郡城光澤精美四方書畫家多寳貴之談箋有數種惟玉版玉蘭鏡面宮箋甲於天下金魚出上海者佳好事者畜之為玩鶴華亭鶴窠村所出為得地其實自海東來馴養久乃生雛以足有龜紋者貴今無黄雀每嵗秋時山蕩北郷有之吳地記謂小魚長五寸秋社化為黄雀味腴美鱸魚生松江出長橋南者四鰓在諸魚之上橋北者止三鰓味亦不及蟹出三泖者大謂之泖蟹出上横涇者小謂之金錢蟹今惟出潘蕩者美大銀魚出泖西者最細而肥美鯧魚身廣頭鋭細鱗脆骨鰣魚出海中郷俗以夏至後半月為三時魚盛於四月取迎時之義銀鱗丕燦厥味鍾焉黄魚即石首魚每初夏海濱網取以冰載之謂之冰鮮梅魚似石首魚不盈五寸青鰕大如掌俗稱對鰕淡菜生海濱吐鐵生海濱沙上蝤蛑生海邊泥穴中剪絨花毯花様異巧有廣至數丈者沙裡鈎生海堧沙中鈎取乃得故名漬以甘釀殻軟而味腴吳中珍品木棉古名吉貝宋時始傳其種於烏泥涇今沿海髙郷皆種之布松郡邑皆能織出沙岡車墩者幅闊三尺餘𦂳細若紬東門外雙廟橋有丁氏者彈棉純熟花皆飛起收以織布尤為精輭號丁娘子布一名飛花布又有斜紋布綾一名紵絲綾惟松江有之鹽出下沙青村等塲所謂吳鹽也色白如雪酒顧志云雪香酒味香冽而色白松酒之最佳者俗以九月初製新酒名開清其品短水為上九峯酒次之清酒又次之夏月則用白酒其佳者曰靠壁清上海有清酒曰燒酒十月造至夏始開泖濱近有劉氏者汲泖水倣三白法釀酒味亦甘冽號劉酒常州府香珠稻紅蓮稻俱出武進秈米出武進嵗以二十石充貢白果豆武進所産異於常豆燕笋出江隂毛笋出宜興岕茶出宜興山谷者佳竹菇産宜興之南山者佳西瓜武進之奔牛無錫之五牧江隂之青暘皆佳梨武進之迎春郷者為一郡之冠桃産武進之孟河靖江之諸沙者稱最楊梅出武進馬山者佳菱産武進之蘆墅櫻桃産江隂之青暘何首烏出宜興銅官者佳斑竹多産江隂牡丹出虎涇口沙山者佳棉花各色皆産江隂尤多黄麻蓆草俱産無錫鶩鳬産武進之太湖滆湖者為多黄雀出武進之横林無錫之五牧者佳山牛出宜興諸山野豬出宜興諸山蟹産武進之芙蓉湖名玉爪者佳河豚魚出江隂食之有毒東門闊布出武進子鱭出靖江料絲燈武進獨擅其長惠山泉酒以水出惠山故名砂壺宜興之澄泥造作為最工蒲扇蒲蓆江隂者為佳蒲凉鞋宜興之陳橋尤著苧帨武進驛前無錫之蕩口與靖江三處皆極佳鎮江府黄粟唐地理志潤州貢黄粟今無惟觀音秈銀條秈為佳杜鵑在鶴林寺高丈餘相傳唐貞元中有外國僧自天台鉢盂中以藥養根來種之玉蘂在昭隠山唐人甚重玉蘂故唐昌觀集賢院翰林院皆有之非凡品也今無玉蘭出馬跡山紫府觀其花表裏瑩白其香如蘭不根而植不蓓而花開時多於春暮遇者以為瑞宋淳祐間忽開郡守李迪有詩見咸淳志陳輔之有玉蘭詩二首見京口集八仙花狀如瓊花八蝶簇一心有簇聚如碧玉者曰玉蝴蝶金沙花蕚有大小二種大者開遲而色鮮明小者開早而色殷重文官花鎮江范氏所植唐時惟學士院有之胡翰有贊山木瓜劉言史有王侍御莊看山木瓜詩黄精出茅山九蒸九曝服之可以延年駐顔前已載江寧以山與金壇接界也南燭其樹如木而葉似草其子如茱萸冬夏長青八九月熟酸美可食偷蒼鳥似雀而差小籠畜易馴雌雄遞放不失零陵香出丹陽郡古之蘭蕙也鱘鰉鰣魚俱出大江琴魚背上有徽似琴出吕城鵜鶘即淘河出丹陽鹿兎獐金壇丹陽諸山谷中皆有之黄金間碧玉竹出金壇酒出金壇以米麯五茄皮酒為上近以于氏自釀酒為金壇第一珍珠麯出金壇醋金壇粳米釀者極佳葛布出金壇名馳天下乳餅金壇為佳戈扇出溧陽岳刀出溧陽大紅緯出郡城色鮮艷奪目淮安府鹽産於廟灣白駒劉莊伍祐新興板浦莞瀆臨洪興莊屯徐瀆浦十塲兩淮鹽賦所出黄芽菜安東有之北種也黄薔薇五色薔薇皆出安東酒苦蒿金盤露珍珠五香藥酒惟苦蒿最美菱藕芡實淮上為多雉兎白羊野馬舊出盧石山中以其性劣今不復取也烏賊魚其背骨即海螵蛸也紫菜靛俱出鹽城安東山陽蠟有黄白二種出山陽蔴有苧白檾三種淮屬所出為多木棉曰紫曰吉貝産於淮南鹽精石淮上所産鼓淮鼓大小鞔法皆精鏤金銅器淮安鎏工藝為精芸香出淮安蘆席簟色工緻性柔鑄鏡淮鏡開明勝於湖鏡鶴出安東鸛天鵞倉鷄鵠鴻鴈鸂鶒鵁鶄凡七種以淮地多湖蕩時有至者名可載而非常産蠶淮地亦多畜之汗衫出鹽城骨碎補五茄皮俱出山陽海蜇麯俱出淮上對鰕出桃源銀魚鰕米鹽淮上諸邑所出為多揚州府黄稑米烏節米唐地理志揚州貢黄稑烏節海陵紅漢書揚州有桃花米即此觀音白近日揚州惟此種稱最菰米即菰蔣草也髙寳興諸湖多有之秋生米名雕胡杜甫有詩云波漂菰米沉雲黑是也西瓜産興化餘東者佳櫻桃林檎梨銀杏四種以江都為佳沙桃出江都東沙諸處大如鵞卵味極美内與核離明朱曰藩詩云沙桃風味動江郷每近中元輒寄將供奉似君才不忝漢庭早晚識東方芍藥揚州號天下第一江都凡三十二種惟金帶圍不易得宋有圃在禪智寺前又有芍藥㕔其種最多玉蘭一名迎春花驚明歐大任王氏園觀玉蘭詩有云翠羽忽梅蕚夢瓊花猶聴竹西歌芙蓉荷花在處有之不若高郵邵伯諸湖最多瑞香葵有荆葵戎葵秋葵兔黄今人誤為葵菜五茄皮一名文章草今高郵以之造酒象蘆竹戴凱之竹譜有竹象蘆湘妃竹斑紋細秀可愛海艾本草出揚州花鷄似雀而小味極脆美黄雀出揚州者差大鹽出沿海諸塲鹻泰興如臯出硝出泰興鰕蟹揚號水郷二者為多酒江都曰雪酒高郵曰皮酒鰣魚出大江鯧魚江都各邑皆出蛇床子通典揚州貢土紬出楊州高郵亦多槐角子出高郵三皇廟者佳草布亦名草葛出江都絲綿鹽魚鹽蛋鰕米藕粉俱出寳應高郵徐州府稻稻乃他郡之常産惟徐地舊止種黍稷麥菽近間有種稻者止水旱二種故稻遂為特産蕭縣白米山泉灌溉者尤佳可見人工足以興地利正不必使有曠土也芝蔴即胡麻也仙傳有胡麻飯芹有水旱二種徐地多旱芹俗名藥芹或云即藭芎芋一名土芝史記曰蹲鴟有水旱二種旱芋微辛不若水芋甘芋生應月數每魁有十二子遇閏則益一子民間收儲可以代糧凶嵗尤宜多種蝗所經苗稼草根無遺獨不及芋故知芋足禦荒每芋一畝其入視五穀加倍近水者尤良蘑菇州邑通産山藥一名薯蕷徐土所出味尤甘膩百合郡邑皆出黄芽菜與黄芽韮並碭山者佳桃豐縣桃實大而味甘杏以接梅者曰梅杏味尤佳梨蕭縣梨曰兎頭燕頂者甘脆尤異棗蕭縣天門寺出天棗形小色紅味美沙果郡邑通産蘋婆果俗名蘋果徐地産者極佳茵陳蒿類經冬不死因舊苗而生故名茵陳枸杞郡邑通産子苗根皆大補益鬼箭草入藥可治疫郡邑通産牡丹徐地近豫省種類極繁花時無美不備非他郡所及也素心蠟梅内外一色香倍他種名素心金蓮芍藥徐郡多植此花極為竒盛紫草出碭山鶴宋雲龍山人有放鶴亭鷹出蕭縣者良倭鸞一名角鴿善鳴能效百物聲獐兎狐鹿獾徐地土曠山多故多山獸野鴨羣飛蔽天聲如風雨雉郡邑多出魚黄河中生綿紬出豐縣者為佳花石出東山五色成文竹木如繪石炭郡邑遍産榕木蒲菜俱邳州出羊棗南瓜出睢寧觀音草虎鬚草宿遷為多釜甑瓦器邳州宿遷睢寧皆有雁鰕蟹猴邳州宿遷睢寧皆出灰鶴天鵞間有至者太倉州紅山藥種自普陀來西洋菜二者俱出崇明落花生出嘉定子黄色者佳金柑出太倉乾柑出嘉定高橋鎮紋細味香如蘭金桃出嘉定之婁塘藥斑布州邑皆出大布闊一尺七八寸出寒山寺者佳棉花州邑栽之以資紡織又有一種名紫棉結實大如桃雕竹器出嘉定雕玉器出州内絃子提琴出州與嘉定弓劍出崇明酒有珍珠紅竹葉青十月白等名海州紫菜州出鮝魚海蜇州邑皆出鹽出板浦海門薏苡仁出贛榆冬青出秦山五色蜀葵木香洋菊五色薔薇皆出贛榆大小薊亦出贛榆紅鶴贛榆時有至者野鳬州邑皆出鯊魚蟶俱州出南瓜出沐陽蘋果州與沐陽皆出白蒺藜菊香扁竹皆出沐陽對鰕銀魚鰕米三者州邑皆出鹿獐兎三者州邑亦時有之通州靈芝出州軍山雪酒州出車𧑃亦州出玉鈎鰕即小白鰕也出州内鮮美異常蟶出州内桃乾出泰興櫻桃蜜套出泰興芙蓉汗衫出州内九葉芸香形似小笋剥之如蕉俗稱囊荷用作蔬食可以解瘴相傳諸葛征五溪得之苧布出餘東剪刀出州内箆出如臯鹻出泰興如臯硝出泰興麂皮出如臯安慶府山葖葉翠如雲正二月間浥露抽苗香甘異常土人美其名曰珊瑚菜懐桐太三縣俱出木耳一名䓴出太湖潛山石耳出天柱山中黄精太陽之草久服可仙出潛山茯苓出潛山丹砂出太湖司空石壁望若赤霞險峻取之甚難長春藤出太湖服之延年青木香一株五根一莖五枝一枝五葉葉間五節故又名五木香栗米一名小栗各邑皆産冬笋出潛山太湖蘭一榦一花香極幽逺蕙一榦十餘花出龍眠天柱者更佳芽茶出潛山苦茶可消暑疾出皖山錦鷄出潛山似雉而小文彩煥然竹鷄出潛望二邑石猴出望江鵜鶘出太湖鷫鸘出潛山鵁鶄懐寧望江時有至者而非常産虎豺狼鹿麂獐貍雉狐貉安屬多山以上各種皆出魚鮓出懐寧蜜六邑皆有白蠟潛山出龍鬚蓆龍鬚草出龍山竹簟出潛山木棉郡邑皆出桕油郡邑皆出漆出潛山笋出潛太紫草穿山甲俱出宿松土紬出桐城布出懐寧石排鎮家機者細厚而幅闊漆碗漆盃其裏金黄外以黒漆酒器各種俱有出宿松城中葛布出桐城秋丹一名秋石補血生精出桐城魚米柴炭安屬魚米之郷郡邑所産稱最皂角郡邑為多徽州府穀新安宜秈而不宜秔且多山少田米時取足於外方茶出松蘿山者最佳有雀舌蓮心金芽數種紫霞茶出歙縣紫霞山色香清幽如蘭新安家家製茶以此品為最山藥歙休二邑皆佳笋六邑皆産出問政山者尤佳石耳出黄山黄精亦以産黄山者為佳白石英新安所出細長白澈黄連産黄山菖蒲石生而細者良本草載所出之州七歙其一焉大葉者為昌羊白术歙産勝於浙以其白勝也杉出婺源祁門三友柏一樹而扁側翠兼焉娑羅樹在潛虬山黄山松堅細秀古根出石上異於他松春桂似桂而五出三月開金縷梅似蠟梅而瓣如縷春日開時翩躚欲舞撚蠟亦似蠟梅一苞四五朶其開也以春杪海罽花生雲海春日遍崖谷紅色深淺相錯至鋪海時爛然雲錦矣彷彿瑞香而差大旌節花老藤上作花行行垂如旌節色淺碧黎州漢源縣亦有之瓔珞花色黄碧幽倩澹冶清香雋永有垂栁之態蕡桃與桃無異但花趺先實耳山櫻木本竹葉初夏作花實如含桃紫雲花花深紫日光下燭晶然凝望石蘭一莖一葉一花色紫生峭壁上木蓮花在慈光寺前高柯成圍蜜葉蔽日冬不彫花肖白芙蕖惟房菂不類四五月間開香聞數里山中無二本疊雪花花似剪雪中含一葫蘆九月開玉鈴花樹高大蘢蔥夏月碧隂中白花串串有類雕刻香色俱佳香杜鵑杜鵑處處有之此則高榦濃香逈異凡種查蔔花木有芒刺四月開小黄花如丁香其結實也如丹砂覆杯花攢生葉底空中下垂似鏤竹髹朱而成仙都花生仙都峯下古榦屈曲花一苞七八朶望之如芙蓉而特香緑心如拳三年一放放則葉下披如相讓然紫綺玉環草花也頗肖二物傲雲花形色似木蓮自夏徂秋香不斷葉亦微馨悟公雲舫四圍皆此樹鵝羣花藤屬葉似菰蔣秋日著花宛然鵝也上諸花多産黄山以銀絲麫出祁門其細如銀縷絲故佳羅漢松在吳山寺方竹堅實可為杖佛面竹亦可為杖硯出龍尾山青色綠暈多金星者為上五穀樹在顔公山嵗以所實占豐歉綠螺歙縣名品墨五代李超及子廷珪造墨至宋嵗以大龍鳳墨千斤充貢仁宗宴廷臣於羣玉殿以李超墨賜之曰新安香墨其後賜翰林皆李廷珪雙脊龍様品尤佳墨譜稱之上者拈來輕嗅來馨磨來清今失其傳近代製墨者以程君房方于魯為上吳去塵次之今亦不可多得惟曹素功紫玉光稱最焉蜜棗出休歙棗乾出休歙金豆出婺源銅鎖出嚴正街漆器休歙皆工羅盤歙邑稱最程宏宇汪永年二家造者尤精定時羅一名日晷紋理工緻本質端好惟程宏宇汪永年二家製者四方未有倫比竹器出休婺歙縣螺蜔器出休歙虎猴鹿兎獐山羊徽郡多山故多出焉寧國府茶宣涇寧太諸山皆産松蘿又太平龍門山産翠雲茶香味清芬又雅山茶宋梅詢有茶煮雅山雪滿甌之句今不可多得紙郡邑皆出宣寧二邑尤擅名棗有四種圓棗長棗甜棗羊棗栗郡邑山谷多栗栗熟比於穀熟公私賴之雪梨種類亦多而宣邑雪梨為最花紅産寧國實大味甘櫻桃一名含桃六邑皆産芋即蹲鴟也可備荒桃有六種五月桃六月桃離核桃囘囘桃扁桃矮桃薑寧邑山郷港口二十里内出薑熟如穀熟財貨所資也白术産寧太山谷者佳鬼箭羽能除疫氣寧國山中為多棉花六邑皆出李商隠詩木棉花發鷓鴣飛蓋紀其時也絲棉苧麻二者郡邑皆出芝麻周禮三農生九穀一曰麻蓋胡麻也飯瓜嘉靖中仙養心宦嚴州移種給郷人每本結百枚入冬方萎味甘可代飯今産寧邑蕨粉苗可食根可為粉本草云根如紫草作菜食之味甘寧國多山蕨徧生焉竹鷄宣寧涇太諸山郷皆有其鳴音似泥滑滑木中蛀聞之化為水翡翠大者曰山翠小者曰水翠俱巢水際虎黑熊山羊鹿麂兎狐雉猴􅸉猪香貍玉面貍自虎而下以寧郡邑多山與徽郡山接壤故多出焉杉涇寧太三邑多竹有十數種郡邑資之為利竹簟出旌徳木瓜出宣城能固氣調榮衛止霍亂轉筋繡宋楊萬里詩天下宣城花木瓜日華霑露成花何須堠子强呈界句有瓊琚先報衙蘭郡邑巖壑皆産香最清逺鳳尾蕉木本有合圍髙數丈者玉荷花似千瓣梔子入夏始開花香過於茉莉可作食亦嚴州移種四季桂四季開花結子狀如蓮實琴魚長不盈寸龍鬐果腹三月三日出餘日無幙魚其小似琴魚而無龍鬐味亦佳桐魚桐花開時出故名紬寧邑土紬最佳扇宣城出筆宣州諸葛氏善製筆相傳有晉王羲之索筆帖宣州石出宣州其石質瑩白秀削可供几盆園亭佳玩四方珍之蠟炭漆石灰以上四者郡邑皆出池州府黄粒稻出九華山舊傳金地蔵自新羅攜種至此種之粒肥色殷味尤香軟與凡稻異珍珠菜産石埭杉山暑月入饌蠅不集元修菜産貴池見東坡集茶有片茶仙芝嫩蕋等名六邑皆出金地茶出九華山亦金地蔵自西域攜來者仙人掌茶李白有贈玉泉仙人掌茶詩出九華山中茗地源茶出九華山之閔園隂谷中春夏之間萌芽始發故旗槍不大展亦不可多得薑本草乾薑以池州者為良貴池銅陵皆出笋池州産竹故笋稱最菉荳粉出東流粉異於他邑者以菊江之水為勝耳竹蕈出九華山生竹根者味甘棉花六邑皆種之紙唐宋池州貴紙石林燕語曰宋學士制用白麻紙白麻者池州楮紙也漆出建徳者良桐油桕油郡邑皆産雨傘池郡造者輕而適用扇出青陽削竹為骨以柿汁塗紙糊之以泥金畫山水人物於上售之四方千秋松出九華山長二三寸葉類柏生絶巘取供盆玩可與黄山松匹五釵松出九華山每枝五花五股其實可食文理如一仙人燭木名産九華山榦似梧桐長尺許其液可燃羅漢柜出九華山榦髙一二尺葉似側柏仙掌扇木名出九華山葉大如羽翣色青翠木蓮花出九華榦類梔子苞先於葉其花與蓮無異自春開至八九月始已玉女幢木名出九華山隂巖絶壁之上其木髙一二丈自成行列如幢節焉羅漢絛産九華山木本如檜高數丈翠葉間垂心白色作結成絛菩薩線産九華山如檜但枝葉長垂如線色翠香清鉢囊花木本髙丈餘葉細而長色翠而澤花生葉上蕚如黄葵出九華南臺莎羅花木本出九華其枝每生七葉九葉苞如人面花似牡丹色類拒霜香如菡萏蘭郡邑皆産蕙四月間始花珍珠蘭出貴池淵明菊出東流晉陶淵明遺種九節菖蒲出九華山中龍鬚草出九華山為蓆甚佳紫貝天葵貴池之西厓所産尤多七葉一枝花出九華山黄精産九華絶壁者為上品何首烏産九華山者良於他處錦駝鳥出貴池見李白秋浦歌惜春鳥出九華山念佛鳥出九華山狀如鳩黄褐翠羽作念佛聲碧鷄出九華山雲韶部即音聲鳥出九華山其鳴響互答如簫韶蒼鹿九華山中天柱峯下時有見者羚羊池郡山中皆有之麥魚出東流麥熟時臥虎潭一帶俱出其形似麥去上至石人山瀨則形漸大過此則化青蜓飛香鯽君魚皆産貴池嘉魚銅魚皆出九華綠魚出石埭暮春則見巨口細鱗猿貴池青陽石埭建徳山谷中皆有之木炭郡邑皆産太平府黑小豆出當塗可入藥有補益大豆則否赤小豆俗謂紅豆蓴菜生水中即鳬葵花黄白子紫色莖細如釵股味甜體軟和鯽魚作羮佳荇絲菜田家美味郡邑最多菱芰兩角為菱四角為芰生熟皆可食珊瑚菜亦名山花菜春月生采石山水邉清香有别味藕黄池稠塘出者甘嫩無渣滓槵子樹髙葉大似栗結實剥核可為念珠芡實一名水中丹入藥與金櫻子稱水陸二仙膏金櫻子一名山石榴叢生多刺花白類小薔薇子似榲桲而小色黄有刺收子熬膏治虚損最良五茄皮叢生山谷田野莖黄赤春生苗葉俱青高三四尺一苗五葉者佳每葉下生一刺開白花結實如豆根若荆根皮黄輕脆芬香五月七月採莖十月採根隂乾用味辛温微苦寒無毒入藥功為多菖蒲根有一寸九節或十二三節生石澗中名石菖蒲尤佳烏昧草宋范仲淹奉詔安撫江淮還以太平州貧民所食烏昧草進呈今無松白紵山有六朝松十餘株横望山亦多怪松倒懸石壁隠静山有十里松徑乃杯渡禪者手種駢竹唐姑孰崔氏有駢竹之瑞觀察使崔準奏建寺名瑞竹今報恩光孝寺是也穿山甲出繁昌鰣魚出采石江中鱘鰉出大江碧霄魚出繁昌隠静山碧霄泉中竹鷄出繁昌一名泥滑滑諺云家有竹鷄啼白蟻化為泥子規即杜鵑一名杜宇鳬䳺鶉麞兎郡邑皆出寒水石出蕪湖荆山膏風出繁昌可以炊熖山煤之别種也紙繁昌紅花山出又土名高墈二處紙户造紙竹器其類不一繁昌尤多鋼窰出荻港凍綠布出繁昌迎薰門外有泉曰烏泥井以此水凍綠色倍鮮明他水不及也銀硃百益酒屐俱出蕪湖廬州府萬壽紬出合肥機房在萬壽寺左右故名絹出舒城絲布出廬江何首烏出合肥深山中者佳紅白二種笋郡邑皆出而舒城産者尤佳竹簟出舒城栗郡邑多産梨棗杏花紅出合肥舒城無為薏苡出舒城五加皮無為州産者良石斛産合肥地理志唐時充貢薑出舒城白蠟郡邑皆産鮓舒城無為巢縣皆出蜜出舒城漆出合肥舒城無為諸邑礬出廬江炭柴郡邑皆出鰣魚出廬江無為州鳬即野鴨也出巢縣雉郡邑為多天鵝鵁鶄淘河皆出巢湖黄鴨巢縣為多虎鹿兎獐郡邑多山故山獸為多玉面貍出合肥者佳青鶴出廬江畫眉出廬江鴛鴦出巢縣鶴郡邑時有至者竹鷄一名山菌子郡邑皆産猴野猪出郡邑深山中獾獺狐郡邑皆出鳳陽府雲母石出鳳陽雲母山方輿勝覽云彭祖取服之輕身延年貌澤不老磬石出靈璧磬石山可取編磬以供郊廟朝廷之用黄芽菜出鳳陽春初生味極甘滑黄雀菜出鳳陽樹而花生者山藥出鳳陽者甘膩蘑菇亦以産鳳陽者為佳百合郡邑皆産絲棉木出懐逺木棉花中如鵝毳抽其緒可織為布郡邑皆出芹菜虹縣者長而無節羊脂菜羊城湖出棗郡邑皆出圏棗出定逺軟棗出臨淮者佳櫻桃出鳳陽沙果出懐逺者味勝林檎白玉瓜出定逺文官果出虹縣者佳苜蓿郡邑皆産相傳種出大宛張騫帶入中國蘋果出宿州味清香梨郡邑皆佳以鳳屬近北地也木瓜出臨淮者佳霜後取之香幽而耐久黄金嵌碧玉竹碧玉嵌黄金竹皆以産臨淮者為佳天竹郡邑皆産叢生朱實相傳榦踰百者可禦火災箬竹出定逺虞美人草出虹縣虞姬墓無風自舞石斛出壽州艾郡邑皆産壽州者佳千葉榴牡丹乳餅白蠟俱出臨淮葛根出鳳陽桔梗逺志俱出定逺花椒杏仁郡邑皆産老鸛草郡邑皆出熬膏酒服大補天元出宿州者更良石菖蒲出定逺者佳鶴地僻山多時有見者雉鳬獐鹿兎郡邑皆産芝麻郡邑皆出高梁郡邑皆種與稻麥等麻油郡邑皆産硝出虹縣絲絹出臨淮潁州府稬稻出阜陽南逺郷芝麻郡邑通産倒鈎台味甘滑阜陽蔬佳品沙果出阜陽棗栗阜陽近北二者所出為多亳亦多産胡桃郡邑皆出亳産為佳柿阜陽出肥大而味甘亳出亦然葡萄有二種白者號水晶葡萄味愈佳軟棗郡邑通産蘋婆果郡邑皆産香清味爽梨郡邑皆出亳産者實大味爽蘑菇亳産者最美好山藥亳土所産堅膩味腴芋土人多種之熟與穀等亳地宜蹲鴟種者尤多文官果亳州太和䝉城俱産瓜子亳産者子大玉蘭木高丈餘花白色春時芬芳異常芍藥重臺茂密芳香不散以亳出者甲於四方牡丹紅白各種重臺爛熳如錦亳地所出尤天下馳名然亦有來自豫省者桂有黄紅二種黄色者香愈熾芡實毫太䝉皆有白扁豆郡邑通産服之補益地黄阜陽産者與懷慶相埒枸杞苗根果皆可服郡邑通産酸棗仁郡邑通産服之養心寧神石斛亳産為良百合亳産者佳花椒亳州太和䝉城皆産虎皮鵲阜陽出鶴錦鷄郡邑多山谷故二者時有野鴨阜陽為多野雉郡邑通出鴛鴦潁上霍邱出翡翠阜陽常有之獐鹿亳州太和䝉城多産驢亳産者良蠏蝦阜陽多出麥麯潁上者良香油郡邑皆産白蠟黄蠟二者亳太䝉多出靛亳太蒙通産木棉枲麻二者亳産為多四方取給焉紅花郡邑皆産絲郡邑皆出土人用織為絹滁州芝麻有黑白二種黑者即胡麻也久服可以延年貢麫匀細筋潤全椒出菱滁水産者佳芡實州邑通産可以備饑藕以州出者為佳琵琶菜芥之屬也出來安甜瓜州邑通産有綠有黄有花斑香而小者佳黄如金大如鵝子者名金瓜山藥堅實味美州邑通産梨滁全者佳櫻桃州邑通産花紅滁地者佳牡丹芍藥二者州邑皆出黄精州邑山多故多出蒼术州邑通産紫蘇州出木瓜全椒出者色香耐久九節菖蒲􅭀薟二者州邑皆産山查來全皆産缺鯽舊出城濠河今不多見野鴨州邑皆出獐鹿狼兎以上四者州邑多山故常有之苧麻州邑皆出油州邑皆出炭州邑皆出山地多木故也酒滁來特産以釀法佳也絲州邑皆出不如蘇杭之多和州芝麻州邑皆出有黑白二種黑者為勝五茄皮州産為佳黄精一枝單長形似竹葉相對而生太陽之草也服之可以延年葉後有刺者名鈎不可服棉州邑皆産半夏州通産以畝下者為上紅花含山多産梨出含山栗州邑皆産木芙蓉出含山百合州邑皆産花有紅白二種根如胡蒜小瓣多層蒸熟補中益氣牡丹含山産有水紅千葉重臺蘭州邑山谷中多有之氣清逺怡人蓼花糖州邑多以芋和糖為之用相餽遺燭州出堅㸃細心酒出含山名含酒苧麻州邑通産茶早取曰茶晚取曰茗惟蒼山宜之鰣出大江州濱江故夏初多出焉鹿州産麂州邑通産天鵝州渚間時有至者煤炭州邑通産廣徳州芽茶出建平鴉山者色味香美白苧州多苧布栗州邑通産可以代糧梨州邑皆出然終不如北土者之味爽木耳州邑通産銀魚出建平者細白鮮美桐油州産桐有週嵗結子者故多出焉漆舊出建平今不多産絲舊出建平今亦不産玉面貍此小獸也州邑多出四方以為珍味六安州茶州及英霍二邑並産名茶而霍邑為多蕨粉州邑通産可以備荒療饑椶櫚葉大如蕉青舊可愛椵州邑通産可供材用槲其皮可以造紙其材可為器用實竹外强中堅與常竹異桂即山木犀也種類亦多惟黄者金粟燦爛香氣襲人衣裾蘭春季滿山花發幽香被體柿實大味甘土人用以為餅棗栗州邑所産二者尤多胡桃六地土厚多山岡故山果為宜櫻桃州邑皆出林檎州地産天鵞淘河鵁鶄錦鷄青鶴賀鷄竹鷄黄鴨翡翠畫眉雉以上山禽十一種皆有文彩為羽屬之特異者州邑皆産熊州邑多山間有見者虎州邑多出獐鹿兎玉面貍以上四者州邑山獸之常見者也山牛不常見者六安山中時有之􅸉猪身有􅸉矢可以射人其肉香異野豕麝鹿之别種香在臍下狐六安山中出猿猴州邑山中常有之獾州邑皆有山紬州邑通産蠶絲之所出州邑皆有竹簟州邑通産白蠟州邑通産黄蠟六安英霍皆産苧麻土人多種之紙州邑造者多桐油紅花二者州邑皆出酒六安出木蜜六安山中為多山藥六安出者細膩味美九節菖蒲六安山中出黄精太陽之草也六安山中多産之然葉下有刺者非黄精五茄皮六安山出者其味為厚木瓜芳香兼有順氣之功枸杞生六安山中者久能變化為仙杞薏苡仁能補中州邑人多種之黄芪産六安山中者佳何首烏有紅白二種亦曰雌雄二種生六安山中年久而大者佳藥之屬州邑所出者不下百餘種兹特錄數種以其有補益功人多珍重故也泗州都梁香即澤蘭草出盱眙都梁山故名古詩博山爐中百合香鬱金蘇合與都梁銀精石亦産盱眙梨五河者佳魚其類甚多與他處同然惟泗稱蕃庶五方商賈藁之以貿利咸以為淮魚味美人争嗜之秋冬之間諸客畢集於州中銀魚鰕米二者盱眙五河多出鶴州邑多山澤時有至者雉州邑皆出野鳬泗州天長為多獐兎五河為多䳺鶉出天長何首烏出五河逺志他處皆有方書以泗州産者為勝􅭀薟草泗遍地皆出以療疾功多人争重之半邊蓮盱眙出者良青木香産五河者佳芍藥牡丹俱産五河青芹出天長他處所産皆中虚長邑出者中堅實而有味乳餅乳酥俱出天長盱眙甘露餅出天長之龍岡鎮江南通志卷八十六
