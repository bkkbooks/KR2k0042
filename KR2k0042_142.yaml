body:
  text: 江南通志卷一百四十三人物志宦績五鎮淮二府鎮江府漢左恢曲阿人官至尚書左丞京師稱其清高後遷會稽太守子忠為邑令有異政三國吳殷禮字德嗣雲陽人少起微賤顧邵拔而友之為立聲譽孫權召除郎中同張溫使蜀諸葛亮歎之曰東吳菰蘆中乃有此人遷零陵太守卒於官子基才學知名著通語數十篇唐馬懷素字惟白丹徒人擢進士篤學謙慎時推長者纍官左臺監察御史魏元忠為張易之所構謫嶺表崔貞慎餞之武后令懷素按崔反狀使者迫促懷素執不從崔獲免又劾罷李迥秀權貴謁請不能阿撓開元初進𢎞文館學士與褚無量分日侍讀待以師禮卒諡曰文史務滋宣州溧陽人纍吏勞遷司賔卿進拜納言武后詔務滋等十人分行天下雅州刺史劉行實為來子詢誣其反詔與來俊臣雜治俊臣言務滋與囚善掩其反狀后命俊臣并治遂自殺孫處懸潤州人以學行著名李濬刺潤州薦之徴為左拾遺神龍初功臣桓彥範等用事處懸遺書論時事得失彥範不能用乃去官還鄉戴叔倫字幼公潤州金壇人為撫州刺史作均水法灌溉者不得爭民便利之耕餉嵗廣獄無繫囚封譙郡男齊映劉滋執政叔倫勸以金穀之司不可輕易人其尤切者縣令録事參軍事無計資序限逺近高卑一以殿最升黜則人知勸映等重其言遷雍管經略使綏懷夷落威名流聞其治清明仁恕多方略故所至稱最丁袗字德祥金壇人為楊行密都知兵馬使後謝病歸平生不殖貨不掩人善生亂世而得明哲保身之義厯五代至宋乾德初年九十一卒宋吳遵路字安道丹陽人父淑見文苑傳第進士纍官至祕閣校理條奏十餘事皆切直出知常州嘗預市米以備嵗儉已而果大乏民賴以濟自他州流至者亦十全八九纍遷淮南轉運副使兼發運使嘗於真楚泰州高郵軍置斗門十九以蓄泄水利又廣屬縣常平倉儲蓄至二百萬以待凶嵗知開封府馭吏嚴肅屬縣無追逮出知宣州上禦戎要略邊防雜事二十篇遷龍圖閣直學士知永興軍卒遵路為政簡易立朝敢言平居亷儉既歿室無長物其友范仲淹分俸賙其家邵必字不疑丹陽人舉進士選為唐書編修官必以史出衆手非古人撰述之體辭不就同知太常禮院言天子親祠而執事者就祠所習禮為不敬乃徙於尚書省出知常州提點淮南刑獄為京西轉運使居官震厲風采入知制誥雄州種木道上契丹遣人夜伐去又數漁界河中命必往使以理折契丹屈之還加龍圖閣直學士知成都卒邵亢字興宗必從子舉茂才除建康節度推官趙元昊叛獻兵説十篇召試祕閣遷集賢校理仁宗繼嗣未立亢集兩漢以來帝系承襲著論上之英宗立擢修起居注建言欲治國者先齊家潁王且授室願采用古昏禮公主下降不宜厭舅姑之尊帝深納之進樞密直學士知開封府遇事敏密籍里閭惡少年與吏之廢停者遷處之畿下獄訟衰止拜樞密副使引疾辭卒諡安簡王存字正仲丹陽人慶厯六年進士除密州推官修潔自重厯三館故與王安石厚安石執政引與論事不合即謝不往纍上書陳時政因及大臣無所附麗神宗察其忠實以為國史編修官乞復唐貞觀左右史執筆隨宰相入殿故事神宗韙其言以右正言知制誥遷龍圖閣學士知開封府京師並河居人鑿汴堤以自廣中人請令培築按民廬侵官道者使撤之存入言即日弛其役元祐中召為吏部尚書時黨論興存言朋黨誠不可長然或不察則濫及善人存性寬厚不為詭激之行至其所守確不可易司馬光嘗云並馳萬馬中能駐足者其王存乎蘇頌字子容其先同安人父紳仁宗朝為翰林學士贈魏國公葬潤州頌遂家焉由進士知江寧縣有能名調南京留守推官留守歐陽修委以政召試館閣校勘遷集賢校理在館下九年養祖母及母姑姊妹及外族數十人妻子衣食常不給而處之晏如富弼嘗稱為古君子出知潁州擢知制誥元祐初拜刑部尚書擢尚書左丞七年拜左僕射頌為相務在奉行故事使百官守法遵職量能授任杜絶僥幸之原戒疆場之臣毋邀功生事議論有未之安者毅然力爭之紹聖四年拜太子少師致仕顧方丹陽人登進士為象山令民悅其政方病祈禱於神者千人至有臠股以進者及卒百里內號泣思慕為之立祠陳廓字彥明金壇人第進士厯廣東轉運判官同列多以獻羡財進用廓曰財民力也有羡當還之民可剝民以為己利乎奏罷所興錢監移廣東提刑鄒浩稱其文高學博趨操堅正云蔣猷字仲逺金壇人舉進士政和四年拜御史中丞有直聲嘗論士風浮薄廷臣伺人主意承宰執風旨輔臣奏事殿上雷同倡和略無可否非論道獻替之禮內侍省不𨽻臺察紊元豐官制楊戩不當除節度使趙良嗣不宜出入禁中皆嘉納之又疏孟昌齡徐鑄等姦狀纍遷吏部尚書靖康初奏童貫得罪天下宜黜逺之授徽猷閣直學士卒贈特進洪擬字成季丹陽人登進士甲科宣和中為侍御史時王黼蔡京更用事擬中立無所附會坐罷知海州時山東盜起屢攻城擬率兵民堅守建炎間為中書舍人上言兵興餽餉民苦無名之斂執政議移蹕饒信間擬上疏力爭謂偏方下邑不足以示形勢固守禦遷給事中出知溫州宣撫使孟庾討閩寇過郡擬趣使赴援賊平加秩一等召為吏部尚書詔問攻守之策擬言國勢可言守未可言戰紹興中罷為徽猷閣直學士卒諡文憲張綱字彥正丹陽人以上舍及第除校書郎論事與蔡京不相合擠之去久之還故官厯遷中書舍人進徽猷閣待制引年致仕後秦檜用事家居二十年絶不與通問檜死召為吏部侍郎兼侍讀除參知政事高宗懲秦檜苛政頻諭輔臣寬恤民力乃摘其利於民者八十事標以大指乞鏤板宣布中外尋致仕綱嘗書座右曰以直行已以正立朝以靜退高天下其篤守如此卒諡章簡吳交如字亨會金壇人紹興中進士厯官至大理卿獄無繫囚璽書嘉奬居鄉人稱長者翟汝文字公巽丹陽人登進士第擢議禮局編修官除著作郎皇太子就傅命汝文勸講言者謂汝文從蘇軾黃庭堅遊不可當贊書之任出知襄州召拜中書舍人外制典雅一時稱之遷給事中內侍梁師成強市百姓墓田廣其園囿汝文言於上師成諷宰相黜汝文出為宣州改知越州建炎改元上言上供常數後所增者當議裁損紹興元年召為翰林學士除參知政事時秦檜相汝文性剛不為屈對案相詬至目檜為濁氣司諫方孟卿因奏汝文立異罷去以卒洪興祖字慶善丹陽人登政和上舍第高宗在揚州為太常博士上疏論國家再造一宜以藝祖為法又應詔上疏言朝廷紀綱之失為時宰所忌出知廣德軍治陂塘六百餘所新學舍定崇祀自十哲曽子而下七十有一人列先儒左丘明而下二十有六人擢知真州州當兵衝請復民一年租從之明年再請又從之自是流民復業墾闢荒田至七萬餘畝徙知饒州卒所著有春秋本旨周易通義等書弟造見忠節湯鵬舉字致逺金壇人登第為當塗令聽訟敏決姓名狀貌一見不忘纍遷本路轉運副使奏罷自潤至杭往來征稅升淮東漕使秦檜死召為殿中侍御史奏黜檜姻黨極論董德元附檜為非罷之請釋趙鼎子汾及王之竒等官至參知政事卒諡敏肅禇籍字彥文金壇人知青陽縣縣賦稅特重兩倍鄰邑籍奏免四之一後有申其説者遂再蠲之邑人德焉湯東野字德廣丹陽人知建康府時戍兵剽掠人莫能禦東野峻法繩之民恃以安遷知平江府苗傅劉正彥作亂偽赦書至平江東野與督府張浚知其有變密告韓世忠等統諸道兵勤王帝復位苗傅劉正彥伏誅論功超拜工部侍郎升尚書何公務字子忠纍官至康州防禦使精醫學髙宗疾徴入侍藥疾愈授德夀宫太醫院使時秦檜執政遂謝官隱居京口卒胡銓志其墓王彥融字炎弼金壇人父寀以林靈素譖死靖康初彥融年十九走京師上書訟寃召對命官紹興初連平湖湘武岡羣盜厯官轉運判官終知雅州袁孚字仲誠金壇人登進士為詞賦首選纍官右正言坐論德夀宮私酤事出知溫州張處厚字進道丹陽人登進士官至吏部侍郎知建康寧國贛廬諸州屢上奏疏多中事機奉祠家居藏書至數萬卷湯邦彥字德美鵬舉孫中博學宏詞科纍官左司諫兼侍講建言請分揚廬等州為七路每路文臣一人充安撫使治民武臣一人充都總管治兵以規恢復報可孝宗嘗賜手書稱其以身許國志若金石協濟大計終始不移慨然請使金以變受書禮為己任金不從坐貶有頤堂文集趙善擇字守道宋宗室金壇人乾道二年登第任湖州録事參軍三嵗晝夜寢處獄庭未嘗歸私室非休沐不出謁執親喪足不出一室妻疾立户外使人問狀而已王遂字潁叔金壇人嘉泰二年進士知邵武軍撫摩創痍於冦擾之後擢監察御史疏劾史嵩之欺君誤國及李知孝梁成大莫澤三凶之罪又條上朝廷邊閫急務帝皆善之纍官至權工部尚書卒諡正肅丁宗魏字景舒金壇人嘉定進士楊子縣令金師進攻儀徴人情洶洶欲渡江以避宗魏獨不肻曰守禦之臣職死封疆敵至而遁孰為之守纍官知廣德軍陳景周字仲思丹徒人登進士授溧陽尉邑多重辟滯囚景周謂察獄在初情惟尉能得之務察微隱邑無寃民王已字君文丹徒人淳祐中登第除京官丁大全忌之棄官居家十年為招撫討平衢州洞賊就領州事言足兵裕民數事皆當時要務遷右司郎中元羅璧字仲玊鎮江人至元五年為明威將軍管軍總管鎮金山海盜屏絶徙鎮上海督造海舟六十艘兩月而畢至元十九年初通海道漕運立運糧萬户以璧為之首部漕舟由海洋抵楊村不數十日入京師升昭毅大將軍同知淮西道宣慰司事請兩淮荒間之田給貧民耕墾三年而後量收其入從之嵗得粟數十萬斛纍遷廣東宣慰使都元帥誘致諸洞蠻夷酋長假以官位曉以禍福咸率衆以歸除都水監通州多水患鑿二渠以分水勢又浚阜通河而廣之嵗增漕六十餘萬石奉命括兩淮屯田得疾歸卒俞庸字時中德璘子初為明道書院山長大德中以地震陳格天心召和氣九策丞相嘉之補試户部令史纍官至尚服院都事性倜儻善議論達時務有復辨集若干卷顧巖夀字子靜金壇人纍官建康路總管府推官器識宏逺博通時務厯職三十年所至有聲明滕毅字仲𢎞丹徒人吳元年以儒士見授起居注命輯往昔人君善惡以為龜鑑洪武元年初設六部首擢吏部尚書尋參政江西史遷字良臣金壇人篤學慎行洪武初纍徴起知欣州嚴州所至以治稱詩文有青金集徐文英溧陽人由明經授龍虎衛經厯擢浙江道御史一日入朝後期高帝詰之對曰送臣父歸里耳問何所贈曰錢五百草屨二輛驗之良然見其衣肩縷裂命繡窮御史三字於袍以旌之副使河南從征交趾病卒偰斯溧陽人以元臣歸附授兵部員外郎改尚寶司丞使封高麗稱旨纍官吏部尚書虞謙字伯益金壇人由國子生任刑部郎中知杭州永樂初召為大理少卿天津倉火御史按視言主者侵盜多縱火以自蓋坐死流配者無算謙白其濫得減論遷副都御史巡視淮揚水災請發粟三十餘萬石賑之又請出官錢贖還民所賣男女皆從之仁宗立改大理卿詔求直言謙奏七事多見施行卒賜祭葬髙遷字景升金壇人永樂辛卯舉人為國學録改行人使日本還擢翰林院編修遷前在東安門教諸奄王振出門下振為司禮監以門生禮見願為奧援遷謝絶弗與通尋致仕盛祥字天瑞丹徒人永樂戊戌進士知道州以儒雅飾吏事有惠政境多虎齋宿為文禱於鼻亭翼日二虎渡河去一虎自斃祠下及卒百姓祀之冦萊公祠胡清字士澄丹徒人永樂庚子舉人任清平訓導擢禮科都給事中彈劾不避權貴出為浙江右參政禦溫州海冦有功賜綺帛旌之徐銘字懋功丹徒人太學生擢監察御史有聲永樂間授揚州知府以鄰封辭成祖優諭之未幾拜兵部侍郎出為山西左布政殷時字宜中丹陽人永樂甲辰進士厯官考功郎以清謹稱卒無以殮魏冢宰驥以漆棺遺之沈固字仲威丹陽人永樂初領鄉薦同知沂州奏止沂西開礦再遷山東參政鎮守大同凡二十七年屢白邊防要務正統己巳以城守勞進都御史終户部尚書王振字起宗金壇人永樂中監察御史巡按交趾涉險阻理繁劇凡十三年境內帖服清介之節終始如一知溫州府致仕蕭然如寒士焉謝珤丹徒人宣德壬子鄉舉第一任南城教諭青州教授學術醇正師範端嚴勤於啓迪歿諸生祀之學宮畢升字孟輝丹徒人正統丁卯舉於鄉任金華仁和教諭遷廣信教授嚴師範以清介自持揚善奬能時推學職第一靳瑜字廷璧丹徒人以太學生任溫州府經厯為政勤敏嘗築海堤民獲其利名曰靳公堤楊一清字應寧其先雲南人自湖廣徙居丹徒成化壬辰進士纍遷副都御史巡撫陜西總制三邊興築邊牆規復河套逆瑾忌其成罷免復召起同太監張永討置鐇一清謂永曰寧夏不足平內事非公無能為者遂與永密計班師入見奏瑾流毒海內激變寧夏心不自安將謀不軌永如其言竟除大憝一清功也正德九年入內閣嘉靖四年晉首輔與張桂不相能罷歸繆樗字全之溧陽人成化乙未進士知東陽縣邑有隱糧詭寄立法丈量以均徭役擢南御史抗論中官蔣琮語侵汪直帝察其忠逮琮而謫樗莒州判官辨王氏疑獄有神君稱孫旵字愛暉金壇人成化辛丑進士監收通州倉糧革吏胥積弊授南户部主事江西諸省旱旵力請得減稅升郎中卒靳貴字充道瑜子𢎞治己酉鄉試第一庚戌會試第二廷試第三授編修選東宮講官厯禮部侍郎掌翰林院事逆瑾專政嘗因事諷貴密書京官殿最以進貴不從銜之左遷光祿卿復升禮部尚書晉武英殿大學士時儲嗣未定勸擇宗藩之近且賢者置之京師以係海內人心俟皇子誕育仍歸藩邸卒諡文僖所著有誦抑齋稿殷敏字惟勤金壇人事母以孝聞能詩文登𢎞治庚戌進士厯官浙江參議時洞賊猖獗敏竭力保障設疑兵以撓之賊敗退飢疫大作區畫賑恤全活甚衆敏為人拱手屏氣外若退懦而內有不可奪居官三十年家無中人之産湯禮敬字仁甫丹徒人少貧傭書雲陽驛𢎞治丙辰成進士授行人賫詔使寧藩王厚遺之不受擢刑科給事中逆瑾用事禮敬首劾之謫冀州判官瑾榜言已者四十人於朝堂禁錮之禮敬名第一瑾敗屢召不起有諫垣遺稿殷鏊字文濟丹陽人𢎞治丙辰進士有詩名與李夢陽相唱和正德中任僉事疏請建儲語侵逆瑾論戍于湛字瑩中金壇人正德辛未進士廷對切直讀卷者詫曰今劉蕡也厯官副都御史巡撫陜西與總制劉天和擊吉囊多俘馘會黃河徙運道艱阻遷總督河道鑿野雞河九十餘里以達運河乞終養歸服除起户部侍郎撫鄖陽平礦徒之亂唐侃字廷直丹徒人正德癸酉鄉舉平生砥礪名節父被囚繫請代不得乃藉草寢地夜不解衣至父免乃止出遊得遺金不啓囊還之為永豐令遷知武定州以古教化為治吏民不忍欺立木牌二於庭左曰從刑右曰從化令曰願理者左願和者右久之民多就右嘉靖中章聖梓宫往承天道出山東中官橫索百端侃以死當之皆引去遷南刑部郎卒於官舍貧甚尚書及諸僚賻之乃克具殮王臬字汝陳金壇人正德丁丑進士初任兵部主事武宗欲南狩臬以職掌車駕獨具疏諫廷杖幾死嘉靖初厯南吏部郎出知東昌府纍遷山東副使平生剛正權門要路不一濡迹居常如對大賔尤留心文獻所著有遲菴集金玥字起川丹徒人正德中以貢任端州訓導嵗飢議賑有司以未得請難之玥爭曰請而後賑民無遺矣且以此獲罪不愈立視民死乎監司義而從之改太和請於部使者嚴立停棺溺女之禁風俗為變有薦其可大用者即乞休歸為人醇厚狷介敦孝友鄉評無間言塢紳字佩之丹徒人嘉靖癸未進士知烏程縣嵗飢不俟監司報可輒發倉賑貸擢户部郎中厯知青州平陽福州所至多善政擢四川副使平馬羅賊降其衆五千諸將請殺之毋遺後憂紳曰殺降非義也赦而撫之無何謝病歸諸降者輿金為夀紳不納歸以詩文自娛眭子藴以字稱丹陽人嘉靖己丑進士授行人屢使親藩皆却其贈擢户科給事中旋掌刑科嘗巡視十庫得貴人姦弊夜舁金求免不受而劾之奉敕募兵關陜上籌邊十策多見採行嚴寬字栗夫丹徒人嘉靖壬辰進士知海寧縣俗故健訟亷得其魁痛治之風稍變再知杭州嵗大旱禁毋閉糶括庫金開海昌河因工寓賑人賴以濟杭多火患為之法以相隔别援救使不延燒桑田利重稅輕墟田利輕稅重兩均之人皆帖服居鄉以清厚稱王韜孟以字稱金壇人嘉靖乙未進士授吉安推官擢南吏科給事中劾嚴嵩姦貪及嵩子世蕃語極剴切嵩恨甚會韜孟以山東僉事任滿赴部踰限奪官舊格所無出嵩指也既歸蕭然如寒素病卧一榻布衣蔽體邑令問疾見而嗟嘆之著樗庵集夏儒字汝醇丹徒人嘉靖癸丑進士朴茂孝友知鄞縣築堤黃潭決塹張村為鄞永利部使者下議築城禦倭儒以為擾民但稍增葺之而練卒積餉為守備倭三至不敢犯升户部員外郎俸入悉以贍宗族薑寶字廷善丹陽人嘉靖癸丑進士選庶吉士除編修提學四川福建再遷國子祭酒請復積分法期不失國初養士意纍官南禮部尚書致仕清修淳行置義田立義學申宗法以統理族人曹棟字隆卿丹徒人嘉靖己未進士知鄱陽縣以亷幹擢兵科給事七閲月疏凡八上直聲大著厯官浙江副使賀邦泰字道卿丹陽人嘉靖己未進士知莆田縣升户部主事連守南康濓瓊遷湖廣參政討平五開叛賊擢江西按察使告歸邦泰在瓊降海冦李茂及回茂已立功為大帥齎重貨餽之却不受茂固請取沉香一片而已張祥鳶字道卿金壇人嘉靖己未進士為户曹郎十餘年老於曹事者皆服其詳練至文學藴藉為一時名流所推張居正當國願識之嘗一造門不遽見即毁刺而返居正憾之出為鹽運司運判升雲南知府凡夷情邊備及事之難決者部使者一以屬之引疾歸有華陽洞稿陳文字美中丹徒人嘉靖甲子鄉舉知同安縣立徴收法著為令民不苦耗羡備倭有功纍升寧波府同知復學田以嵗租給諸生貧乏者阮時行字坤儀丹徒人隆慶丁卯舉人以同輔臣名改名時升任上猶知縣居母喪三年哀毁未嘗入內升濬州知州值採木使者橫恣時行冒死力爭為所中傷羈瀘五年瀘老稚奔叩闕下事得白歸杜門著述為里黨所矜式薑士昌字仲文丹陽人寶子萬厯庚辰進士授户部主事疏請早建儲位晉員外郎升陜西提學僉事立五學彚經史古文理學典故以造士每月六日博士集諸生以次質疑問難士風一變還朝上疏觸時宰被謫以卒天啓中贈太常少卿于仕亷字元貞金壇人萬厯丙戌進士為户部郎管通州糧儲開河建閘省車運勞費任登萊副使建議改築萊城扼倭入犯之路厯官户部侍郎所著有職掌録修城通河救荒等書薑志禮字立之丹陽人萬厯己丑進士厯官山東參政轄登萊道時福王封藩賜田二千頃登萊派二萬七百餘畝遣內豎至郡丈田勢張甚志禮抗疏陳利害謫官後稍遷至尚寶卿天啓中河南進玉璽魏忠賢欲志禮表獻之執不可遂以年老劾罷志禮性淳朴多政績以行誼稱於鄉史弼字伯直金壇人萬厯壬辰進士知崇安縣督民種桑興蠶織年飢增價招商米價頓平擢監察御史疏請福王之國言極明辨即定行期出按江西湖廣多所釐剔弼自居言路每折閹宦時魏璫方羅織正人弼以資望升光祿寺卿旋削籍後復官起用不就天性孝友絶聲色之好建宗祠置義田里中稱為典型華鈺字德夫丹徒人萬厯乙未進士授荆州推官誅大猾治稅閹陳奉豪僕荆人大悅奉奏阻撓國稅者以鈺為首逮詣闕再受杖繫詔獄五年始遇赦後贈尚寶司少卿凡士大夫負氣節者多為峭絶孤特之行而鈺獨和平渾厚云劉覲文字叔熙丹徒人萬厯乙未進士知開州改汝州汝故無城覲文築之後盜起秦入豫汝當其衝賴以守衛升禮部主事告歸卒賀納賢字冶原丹陽人萬厯庚子舉人為攸縣令擢巴州知州奢酋叛圍成都納賢統義勇赴援事平升夔州同知入為南户部員外出守慶逺時土官相賊殺納賢以計縳其渠魁晉按察副使談自省字季曽丹徒人萬厯甲辰進士厯官江西左布政使升應天府尹時魏閹所在建祠人有以諷自省者自省拒之遂削奪歸崇禎初復官起用不就荆之琦字鳴玉丹陽人萬厯甲辰進士授南户部主事為人謹願而遇事踔厲風發厯任山東副使時山左數被兵琦申警備聞警輒身先將吏屬郡賴之以安馮曾櫿字良選金壇人萬厯甲辰進士授開封府推官升禮部主事持節封江夏王知王實民間子重賄之不受歸朝三疏劾假子冒封言人所不敢言者後謫瀘州知州會各道兵勦賊奢寅恢復川南四城升户部員外郎于玉立字中甫金壇人萬厯丁未進士授刑部主事雪巡撫魏學曽之寃擢本部郎疏陳時政闕失劾輔臣申時行與戚畹相表裏帝怒幾不測會皇子生免歸玉立與沈鯉郭正域善以妖書案牽連奪職光宗立贈太僕寺少卿賀世夀字函伯丹陽人萬厯庚戌進士授户部主事升郎中時方排擠髙顧之學世夀兩疏爭之語侵冢宰趙煥京察落職光宗即位用鄒元標薦起户部主事復為逆璫所逐崇禎初起厯兵部侍郎天津巡撫王政新字暗生丹徒人萬厯丙辰進士任福清知縣考選御史天啓中兩疏糾魏忠賢罷歸後起原官巡按山東轉江西參政湯道衡字參豫丹陽人萬厯丙辰進士由户部主事知南昌東昌擢山東武德道纍升僉都御史巡撫甘肅衡有吏才能治繁劇在南昌廳事前為屋數楹令訟者居之一宿而決賀懋敬字止叔丹陽人舉萬厯己酉鄉試知寧陵縣務以德教化民臺使者有所怒屬懋敬殺之不從曰吾安能殺人媚人也流賊薄城下敗退之尋罷歸鄧字元帡金壇人天啓壬戌進士授中書舍人時魏閹三冒鐵券例應中書赴銀作局關寫憤不往閹敗署科篆擢監察御史疏言搜括加派告密之弊巡按浙江罷橫征鋤大猾金壇大飢疏請改折秋糧從之史纘烈字武璵金壇人天啓壬戌進士知山隂縣具棺衾以葬溺尸築塘壩以捍漂沒厯升黃州知府流冦欲下黃取道渡江纘烈出私帑置火器及守具分兵據要津日為牛酒饗士賊不得渡升曲靖副使所至有惠政髙鳯翔字沖虛金壇人天啓乙丑進士授公安知縣縣被火將逼獄鳯翔慮諸囚束手斃悉與期而縱之曰吾寧失一官以活諸人之命諸囚感泣皆來歸獄升户部主事厯大名知府有惠政葛樞字居所丹陽人崇禎辛未進士授行人擢户科給事疏言朝熱二審非止覆奏其死正欲婉求其生請自今每遇朝熱審罪不至死者務期逐一讞決有淹滯者法無赦上是之命著為令己卯因星變上書語侵執政貶謫以卒史元調字鼎如金壇人性亢爽尚氣節崇禎辛未進士授江陵知縣修堤捍江伸雪寃滯楚宗盛支裔多為盜元調擒其魁諸宗人奪而沉之江惠王疏其壇殺宗室革職歸後事白復職陳德諭字心言丹陽人由恩貢廷試第一授德平令清亷平恕訟獄幾息升雲南麗江府判捕治蒙化黠獠李青吾以除民害賔州近山多水泉德諭以吳田法教之多獲其利土司蓄異志德諭曉以順逆利害土司感德甕中貯金以饋德諭揮却之乃範金鑄陳太守像祀焉潘曽瑋溧陽人崇禎辛未進士為杭州府教授以實學勵諸生著虎林講議升國子博士上北雍條議時多遵行參政廣東平海賊李朝天劉鐵臂等萬餘人內升大理寺卿以歸國朝吳贊元字次修丹陽人也明季庚午舉人順治二年授中書擢監察御史巡按江西時豫章初定反側未安贊元撫輯有方遂收建饒廣贛諸郡奏免袁瑞二郡浮糧人尸祝之張九徴字公選丹徒人順治乙酉鄉試第一丁亥成進士兩為文選司郎中以按察司僉事視學河南正文體釐祀典命士子誦習小學家禮二書為天下學政第一以博學鴻詞薦引疾未赴九徴研精三傳於明代人物能縷舉其世系與其門生姻戚次子玊書總裁明史多稟承家學焉長子玊裁字禮存博學有文名康熙丁未進士廷對一甲第二名在史館方軌自持未幾卒四子仕可康熙丙辰進士厯官衡永郴道五子恕可康熙戊辰進士杭州知府荆其惇字敕五丹陽人順治己丑進士為郾城知縣時師行絡繹不時需辦夫役惇坐卧大將軍幕府外素知其亷為結歡而去築堤龍塘河口郾人德之植荆堤上號曰荆堤何應仕字鳴瑞丹徒人以明經授推官改知永嘉縣修築長埭為民田利縣駐兵𠞰盜俘獲多應仕白於帥分别縱舍之鄰邑避冦者爭投永嘉帥不納力請納之為授廛給食去官民圖像祀焉史燧字曉瞻溧陽人順治己丑進士六任監司居官亷辦為廣東參議署官營辨多貪縱燧痛繩以法備兵南贛請于虔撫展墾荒起科之期緩至六年議將南瑞等府南米代贛州兑軍而以贛屬漕米代各府給兵餉省解運勞費且免風波之患民皆便之狄敬字文止溧陽人順治己丑進士纍遷屯田員外郎提學湖廣沙汰假冒學政一清補潼關參議嘗云為政在躬行不在塗民耳目也故厯任有能聲笪重光字在莘丹徒人順治壬辰進士由刑部郎擢監察御史巡按江西時稱敏幹居鄉值海冦犯鎮江與張九徴設計守禦有功桑梓性好施與賑恤窮困鄉民德之賀寬字瞻度丹陽人順治壬辰進士授潮州推官潮俗健訟當冦亂甫定告訐連坐者不絶寬懲刁頑辨誣罔民賴以安遷大理評事俄告歸潛心經學著五禮輯要讀易模象等書費達字古心溧陽人傳經學於其父良佐中順治壬辰進士授户部主事轉員外𣙜九江滸墅兩關興利除弊俱著聲績升郎中告歸居鄉有行義史逸裘字雲次金壇人順治乙未進士厯兵部職方掌軍政昭雪叛案無辜者幾千人督學河南時初復八股之舊益以起衰為己任升少參分巡東兗嵗飢首建停徴之議以艱歸卒所著有五經集論二十一史約黃如瑾字崑瞻溧陽人順治戊戌進士授福州府推官時海氛未靖汛辨邀功所解逆黨多沿海窮民及被掠脫歸者瑾訊得其實白於制府免死者無算兵士獲冦孥皆被掠少婦亟檄其夫家領歸厯升刑部郎中出為金華知府乞休子夢麟康熙乙丑進士一甲第三名官中允張玊書字素存僉事九徴子順治辛丑進士選庶吉士厯官禮部尚書康熙庚午晉大學士秉鈞二十年卒諡文貞其在講幄每據經義納忠讜官司冦總裁律例更定輕重之比居禮部時有請舉禘祭及封禪者玉書謂成周禘祭與今時異宜前代封禪不應經義皆奏罷之從聖祖幸南河又從平定厄魯特在政府從容啓沃一德一心蔑由得其獻替之迹公退則正容莊坐清齋讀書盥匜無妾媵而房闥惟子弟宰相家風論者以為古人猶難之于朋舉字襄于金壇人順治辛丑進士入翰林外升分巡睢陳道盜劫郾城庫戕其令朋舉言盜起有迹罪不在郾城民未幾獲盜他所邑民免株連參政福建甫蒞任興化兵譁朋舉應時弭定纍升湖南布政使罷歸徐誥武字孟樞金壇人順治辛丑進士由庶吉士改御史厯遷户部右侍郎在大理凡有疑案常與都御史魏象樞持議平反全活甚衆尹京兆猾吏知名無敢鬻獄任少司農家無宿貯口不言貧曽舉陸隴其可任江蘇巡撫大學士張玉書稱其具此膽識方能以人事君每請假歸省出入酬酢必稟父命待諸少弟極友愛財産悉以讓之弟德武仕至吉安知府有循聲彭會淇字四如溧陽人康熙丙辰進士選庶吉士授編修擢國子監司業疏請官學教習者皆授知縣職為少詹事會審陳汝弼案僉議置之重典惟會淇不可卒從之官終工部侍郎淮安府漢韓信淮隂人初事項羽不能用乃歸漢拜大將軍定三秦下魏代斬陳餘擒趙王歇脅燕定齊立為齊王將兵會垓下滅項羽徙為楚王都下邳後有以變告者高祖至楚執之赦為淮隂侯後高祖自將征陳豨信為呂后所夷後漢臧旻射陽人有幹事才熹平間為揚州刺史平妖賊許昭遷使胸奴中郎將使還太尉袁逢問西域諸國土地風俗人物種數旻口陳其狀手畫其形逢奇其才言班固作西域傳無以加之厯中山太原太守所在有名陳耽東海人以忠正稱桓靈時厯位三司光和五年詔公卿採謠言舉刺史二千石為民害者時太尉許􅖢司空張濟阿附宦官其子弟賔客雖貪穢不敢問而虛糾邊逺小郡有清修惠化者耽上言公卿率黨其私所謂放鴟梟而囚鸞鳯由是諸坐謠言徴者悉拜議郎宦官怨之遂誣陷耽三國吳步隲字子山淮隂人避難江東種瓜自給書勤四體夜誦經傳仕吳為持節征南中郎將誘斬劉表所置蒼梧太守吳巨威聲大振南土賔服自隲始又討平武陵蠻都督西陵在鎮二十年鄰敵敬其威信條列賢士之在荆州者後代陸遜為丞相猶誨門生手不釋卷其被服居處有如儒生唐王義方漣水人事母謹甚淹究經術性蹇特舉明經補晉王府參軍直𢎞文館坐張亮事貶吉安丞徙洹水亮兄子皎將死託妻子願以尸歸之使奴負柩輟馬載皎妻身步從之既葬皎歸妻其家告亮墓乃去顯慶初擢侍御史劾李義府罪具法冠對仗叱義府下跪讀彈文貶萊州司户參軍母喪遂隱居不出宋王資深字取道山陽人第進士為御史首論大臣草將上蔡京遣所親謂曰謹勿言當以此位相處資深不答明日出知揚州尋改明州所著周書及方言二十卷王洋字元渤資深子中宣和六年甲科厯典三郡俱有政績晚守鄱陽洪皓北使歸以忤秦檜人無敢過其居洋獨為修舍坐免有文集周必大為序元韓渙字叔宇山陽人登延祐中進士厯刑部尚書經國濟邊時稱名臣孫覽明王德芳清河人洪武初以賢良方正徴授武昌知府愛民守法政聲聞於朝入覲時特賜召對以旌異之羅拱安東人洪武甲子舉人厯兵科給事中擢河南參議揚厯中外皆以亷能稱楊靖字仲寧山陽人洪武乙丑進士厯刑部尚書理刑平恕久之坐事免會征龍州命靖抵安南借糧既至宣諭威德輸粟二萬石於龍州帝悅召為左都御史寵遇最厚李澄山陽人洪武中由國子生任考功監令有幹濟才厯官工部尚書張士彬山陽人洪武中以才行卓異薦授江寧令尋遷御史正直不阿擢河南按察使能持憲體湯子厚清河人洪武間以懷才抱德徴授陽朔令因修公廨掘地得金數十斤人獻之叱去監司歎其清節成均鹽城人性至孝永樂乙酉舉人授御史彈劾無所避纍官户部侍郎出總浙江糧稅政多利民民建祠祀之王衍字伯蕃清河人以楷書入監擢御史永樂間交趾不服帝命征之選御史才可寄節鉞者加衍交趾道御史衍至諭以威德交趾感化賈進字勤道安東人永樂甲午舉人選教諭遷御史巡按雲南平蠻冦刁甕之亂又按南畿陜西多所彈劾及辨雪者招洮番六十族厯貴州湖廣按察使致仕所著有樂道子詩集金濓字宗瀚山陽人永樂戊戌進士授御史宣德初巡按廣東江西浙江俱以亷能稱用薦授陜西副使正統中擢僉都御史鎮寧夏拜刑部尚書閩中盜起命濓參贊軍務尋召還調户部尚書時四方用兵綜核得宜國用無乏景泰中卒官以前軍功追封沭陽伯諡榮襄羅銓山陽人永樂辛丑進士宣德間拜御史以才能遷湖廣按察使大振風紀高安字志康山陽人本姓劉從祖母家姓宣德中貢入太學授南宫令時白蓮賊騷動河北安捕其黨得簿録姓名輒燒之以安反側仕至浙江參政以治績稱沈翼字克敏山陽人宣德庚戌進士厯户部郎中擢本部侍郎奉敕撫北邊奏減額外稅五萬餘石時邊警欲據通州積粟敕往燒之乃偽焚腐草遙見煙焰蔽天知有備遁去景泰中進南户部尚書致仕卒子瑶字廷實天順丁丑進士厯官都給事中時除四品以上官從內降瑤慮中官專權上疏極言權貴忌之出為南太僕少卿卒史敏字德敏山陽人正統己未進士厯刑部員外出為河南參政時南陽嵗飢流賊蜂起敏賑恤撫字遂以寧謐工四體書著有松泉集李讚山陽人正統戊辰進士由庶吉士改吏科給事中封駁彈劾不避權要厯官浙江布政使葉淇字本清山陽人舉進士厯官廣西僉事南丹土官莫必勝為冦淇城栁城洛容以扼賊衝蓄水通漕以賑飢民轉陜西副使斬賊首領平洮州擢山西巡撫罷土兵戍邊之不便者哈密為吐蕃所陷守臣請暫處之內地弗聽後拜户部尚書卒從子贄字崇禮天順庚辰進士厯守三郡咸有政聲擢江西布政使平瑞州盜有功纍官刑部侍郎史瓘字德輝山陽人景泰甲戌進士授御史屢陳時政得失多見採納遷浙江副使持憲有體皇甫貴安東人景泰間以貢任天台令豪邁挺徑不避權勢政平訟簡有亷介名齊昭字雲漢山陽人由監生授長清訓導以學行聞擢御史升山東提學僉事敷教有方士習丕變陳讓字德光大河衛人天順丁丑進士令寶坻擒首惡置之法嵗凶勸民出粟嵗豐如約給還遷宛平權貴請託不行擢杭州守時海勢內徙逼海寧城讓開支河築內堤海不為患楊理字貫之山陽人孝子旻之子成化丙戌進士厯刑科都給事中纍遷大理少卿讞獄平恕勘陽曲王府事解釋寃濫巡撫河南值嵗飢河決理增築汴堤遍賑飢民擢户部侍郎卒石渠字翰卿清河人成化丙戌進士官按察使仁恕明敏居家以友愛聞張和字宗禮山陽人成化己丑進士試工部主政差保定抽分時守臣世據關隘嘗厚啖分司墮其計者輒為脅持和以禮自防盡釐其弊擢御史卒趙沄字汝達山陽人成化辛卯舉人為長山令積年疑獄斷決如神擢刑部員外郎在部九年獄無寃濫厯雲南參議卒尹珍大河衛人成化乙未進士授工部主事監徐州盤詰漕舟不徇親故重建官厰五百餘間植栁鑿井以便行人擢員外郎出守太原卒子京字兆之正德辛未進士為工部主事監稅以清謹稱改刑部員外郎執法不撓擢山西僉事妖賊煽亂擒其首惡餘黨解散賊平遷浙江副使卒韋斌字彥質大河衛人成化戊戌進士授户科給事中以建言廷杖有直聲同考禮闈斥當軸子孫出為廣東提學僉事厯福建提學副使取士皆稱得人顧達字存道大河衛人成化戊戌進士纍遷陜西行太僕少卿濟飢民寢開礦理寃獄風勵學宮每痛祿養不逮其親嘗獨坐泫然舉宗人不能葬者四喪夏升鹽城人以人才舉任衢州知府祛姦弊清丁糧定等則均賦役民咸戴之又同邑陳玘龍任崇明州同知建學築倉除冦雪枉嵇綱安東人成化丙午舉人授海鹽令遷河州守剛正明敏案無留牘徐聨字成章淮安衛人𢎞治丙辰進士授南大理評事明習法比纍遷河南僉事備兵信陽地當四省交會多山谷姦盜藏聚聨以亷靜治之政簡民和厯陜西副使治兵肅州謹斥堠精簡閲禁諸將侵漁內外帖然藍郁鹽城人𢎞治壬戌進士初令祁陽以有治劇才調嘉善所在有聲民尸祝之居鄉樂易近人人多愛敬楊谷字遷喬山陽人正德戊辰進士令松陽有政聲江西大盜流劫浙省谷身先士卒旬日討平之擢御史所條奏多切時弊以母老乞歸潘塤字伯和山陽人祖亨由舉人官至順慶府同知有政績塤舉正德戊辰進士授吏科給事中劾權姦江彬朱寧等纍擢河南巡撫擊平青羊山賊以忤當路意罷歸所著有平海冦錢法及河防諸議本郡文獻志萬雲鵬鹽城人正德甲戌進士為湖州守有清節後厯浙臬閩藩能持風憲不避權要為時推重佟應龍山陽人正德辛巳進士授新昌令有異政擢工部郎中出理河道河決張秋規度詳密不日就塞運道賴之厯守鳯翔政績如新昌盧蕙山陽人嘉靖癸未進士由主事厯郎中大同兵變奉命撫諭一軍帖服纍擢僉都御史巡撫遼東練兵儲餉軍威大振因出塞燒荒衝冒風雪中寒而卒馬煥山陽人嘉靖戊戌進士授刑部主事有勳戚犯法嚴嵩受賕囑免之煥執法不阿因忤嵩被逮幾不免嵩敗起官後以病歸著有淮南近集沈坤大河衛人嘉靖辛丑廷試第一厯南祭酒以母喪歸時倭冦數千犯淮坤散財募士親當矢石力戰敗之淮人呼為狀元兵起北祭酒為忌者所中下獄卒弟坊郡諸生有文行倪潤字伯雨大河衛人嘉靖甲辰進士授南城令亷靜有聲覲考為天下第一擢工部主事督龍江及蕪湖抽稅俱著清節力遏中使恣暴斥監守貪墨轉都水員外以憂歸潤好理學所輯有雲門録宋敬鹽城人嘉靖丙午舉人授蒙隂令以亷惠為治邑人作歌美之以忤朝貴乞歸朱笈字茂學桃源人嘉靖丁未進士授南户部主事奏彈齊庶人時楊繼盛劾嚴嵩下獄故識不敢通問笈與繼盛為同年生時餽慰之因出為口北僉事仇鸞巡邊多不戢笈以法繩之擢巡撫大同與總督楊順不協因忤嚴嵩被譴戍邊隆慶初起撫寧夏及山西大同萬厯初入為户部侍郎未上謝歸著有龍江文集丁士美字邦彥清河人嘉靖己未廷試第一五司文衡咸稱得人厯官吏部侍郎謝絶請囑每進見必正言開導御書責難陳善四字賜之卒諡文恪祝尚義淮安衛人嘉靖壬戌進士授南陽推官遷刑部主事雪理寃獄都人誦之厯守潞安鄖陽二郡以亷潔著卒之日同年賻之始克殮邱度字志中山陽人萬厯丁丑進士授南康推官宦奴殺人私占民田度抵奴法御史劉臺之獄獨持正論守汝寧清慎推天下第一歷太僕少卿有諷其見當軸即可得巡撫者笑曰有呈身都御史耶卒不往終户部侍郎朱維藩字介卿淮安衛世襲千户讓職於弟萬厯丁丑成進士令鄞及上虞以清操舉卓異擢南給事中請御朝建儲疏凡七上又條議浚秦淮水引長江入留都後居鄉十餘年淮人稱為三絶謂絶足公門絶面士大夫絶口宦途舊事云劉世光字晦卿山陽人萬厯己卯舉人令趙城有折獄才再補沈邱嵗久祲潁州飢民倡亂突至沈邱世光單騎詣賊壘曉諭之遍給以粟誅其首惡衆遂散後致仕歸著有二金草青藜館集楊伯柯字直甫大河衛人萬厯丙戌進士擢南計曹神宗久不視朝上疏言御大廷至樂居深宫至勞言極剴切不報後倅汾州攝郡事以法繩宗人之悍者劉一臨世光子萬厯己丑進士授常山令調長興再調信豐所至勸農桑興學校為人簡亢執法不避權貴故仕多齟齬未竟其用張世才字德夫山陽人萬厯己丑進士授户部主事東封關白力排時論以為不可校閲北闈黜戚畹子由是補外孫奕潁以舉人官户部主事有幹才梁兆明字子晉山陽人以明經令安義俗嚚訟輕生山産斷腸草每啖草自殞借以陷人下令凡訟者先納草一石未幾根荄盡絶邑有水利厄於坳區阻於豪右正其疆界而治之遂灌山田數十百頃擢南陽府判有政聲國朝劉自竑字任先世光孫前明甲戌進士厯真定知府舊例太守有折麥銀二千自竑首革其弊順治初擢浙江按察使時姦民互以變告有一案株連百人者自竑力白其寃釋之遷湖廣右布政未任歸邱俊孫字籲之山陽人明季癸未進士順治初以薦起厯刑部郎中出知漢陽府擢山西冀寧道所至皆著惠愛尤長於聽訟屬邑以獄上立斷遣之讞語悉口占手判不假羣吏罷官歸里杜門讀書長吏罕識其靣胡之駿字伯驤山陽人順治丙戌進士選庶吉士改給事中言論丰采一時推重子可及舉進士為亷吏陸騰駿字馭之清河人順治初由貢授懷柔令攝密雲清豪強侵占民田代完密邑逋穀千餘石豁重編四百餘丁擢户部河南司主事先是豫省有以墾田進秩者加糧二萬民多賠纍力請豁免劉芳聲字何實自竑子順治己丑進士任刑部主事審決畿北執法平允全活甚多疏請清理刑獄於是特遣恤刑諸臣分讞天下遷户部𣙜關九江釐剔宿弊商旅雲集擢山東提學僉事卒官黃宣泰山陽人順治己丑進士任大理寺評事多所平反厯户部郎中辛亥以才能佐本部侍郎賑濟淮揚乙卯備兵寧夏值定邊城花馬池之變城堡皆陷宣泰堅壘以守調度有方糧芻無缺分兵扼河賊不得渡猝聞母訃以過哀卒張新標字鞠存世才孫順治己丑進士授吏部考功以文學吏才稱於時周龍甲字霖公山陽人順治壬辰進士由推官入為部曹厯山東提學僉事任滿部考以公明特著推天下學臣第一內擢京卿未任卒徐越字山琢山陽人順治壬辰進士授行人擢御史讜直敢言已內升仍留任在臺十有三年所條奏皆有關時政之大者言漕河事先後凡十六疏厯陳淮黃分合變遷及兩河衝決州縣被災狀尤悉遷兵部督捕左理事官引疾歸薛鼎臣字式九鹽城人以薦授中書舍人復登甲午北闈賢書轉户部主事擢兵科給事中條奏彈劾大著直聲厯工科疏五大險工俱中要害庚子典試湖廣有知人名乞假終養居鄉二十年恬靜自守陸求可字咸一山陽人少孤力學舉順治乙未進士守裕州恤郵丁減鹽引闢荒田清寃獄入為刑部員外郎厯遷福建提學僉事釐正文體杜絶請託轉參議未任卒邱象升字曙戒俊孫子順治乙未進士選庶吉士纍遷侍講以才堪外任調瓊州府通判赴任道經徐聞弭兵譁索餉之變既抵瓊黎酋恃險梗化選兵進𠞰戮其渠帥尋以裁缺補武昌府通判丁艱歸起補大理寺副部議有與律未合者必力爭駁正之楊名耀山陽人順治乙未進士擢吏部厯考功文選雅有清望充會試同考所甄拔多名士遷太常寺少卿卒張樹屏鹽城人順治戊戌進士授臨縣令捐免羡餘并修城加派共萬餘金民懷其惠劉昌言字禹度自靖子順治己亥進士授岑溪令縣接五嶺獞猺雜處撫馭有方會鄰冦彭奇犯境以忠義激發士卒協力固守設方略誘之冦黨縛奇以降并獻花名册昌言誅其魁焚其册全活數千人岑俗輕生睚䀝小忿輒茹毒隕命為嚴禁之又攝蒼梧篆卒許國璠山陽人康熙丁未進士授平江令吏才明敏聽訟無寃催科有術士民悅服劉始恢字價人昌言季子康熙庚戌進士授大理評事時有兩議例有成獄讞法司而於情罪未協者輒奮筆駁正大理卿採其議列疏後附請得報可厯吏部考功郎冢宰以亷慎薦轉文選郎中銓敘得宜時無滯才會河臣建束河注海之議始恢力持不可與詞臣喬萊議合事得寢張睿字涵白山陽人康熙己未進士授司經局正字遷禮部主事擢工科給事中轉户科掌印再奏河工事宜仲莊閘之開從睿請也又以漕艘至冬守凍可虞疏請截留接運後遂為例纍遷左副都御史厯刑部右侍郎以疾卒官江南通志卷一百四十三欽定四庫全書
