應訓妻宋氏和州人張鵬翼妻王氏和州人葉敬中母髙氏婦宋氏和州人趙文選妻夏氏和州人耿自明妻郝氏和州人王彦母魯氏和州人張汝寛妻譚氏和州人馬文卿妻徐氏和州人尹郊祖母李氏和州人魯國俊妻張氏和州人耿憲昌妻葉氏和州人朱之翰妻馬氏和州人以上俱崇禎時遇流冦陷城或自經或蹈火或赴水或被殺貞烈卓然慶永竒妻王氏含山人流冦破含山夫婦陷賊營氏紿以家有藏金可縦夫往取賊信之閉氏空室潛解所繋腰袜自經賊怒磔其屍唐運昌妻洪氏含山人隨夫避冦和州楊宅賊攻城亟囑夫攜二子育葵育蕃逺遁氏攜幼子與楊諸婦積薪焚死蒋曙妻胡氏含山人奉姑避冦為所執紿之賊釋姑氏不屈死張秉純妻劉氏和州人城陷秉純絶粒死氏亦勺水不入口閲十有六日肌肉銷鑠命子扶至柩前祭拜一慟而死張侣顔妻王氏和州人年十九生子甫周嵗值叛兵肆掠氏同母避於朝陽洞兵攻洞急氏以子付母挺身躍洞外洞髙數十仞亂石觸撞頭顱粉碎血肉淋漓收殮之日衆不忍視國朝陶爾盛妻倪氏和州人里黠欲强汚之不従遇害雍正十年旌表楊氏女含山人為汪丁明養女許字王章丁明尋悔欲更為豪右妾女不従逼之因檢王氏聘物繫肘後自經死余維藩妻許氏先世新安人父客運漕遂家焉年十八歸藩藩有癲疾氏謹修婦職越八年夫亡勺水不入口衰絰自經陳氏女和州人許字黄彞鉉未婚夫亡女數欲引决父母防之密遂歸黄拜舅姑若将終身至夜以髪雜繯辮攣結自經死有遺書辭家人字字血痕張鼎奎妻佘氏含山人居運漕鎮夫死氏絶粒十九日将革逺近觀者如堵鎮人為斂金建祠張萬策妻唐氏含山人國初潰兵攻掠氏與弟廷對俱為所執氏泣曰父死母孀弟不可死我不可生因紿兵願以身従乞釋弟及弟行逺遂躍入水死兵怒鉤其屍磔之陳世禾妻鄭氏含山人十九歸禾禾親早喪毎號泣氏亦泣禾兩兄失偶無子氏舉子世清伯氏欲以為嗣禾許之禾病死氏遵命以子嗣伯氏絶粒死将死時子索乳乳則血也兒大懼而啼氏亦顧柩而啼死時年二十五廣徳州明雲氏女廣徳人適魯姓為亂兵所拉欲汚之義不辱兵怒磔之吳良珙妻陳氏建平人值亂氏攜幼子被執紿以簪珥所藏處遂投井死七日後顔貌如生王命錫妻田氏建平人姑兩目皆瞽一日聞亂鄰婦迫之出田曰我何忍舍姑往遂被獲逼氏上馬不従以刃揮之而殞某氏逸其姓年二十夫亡甚貧為姑求虀於越溪無賴少年戲之婦投溪而死名其塜曰節婦墩趙鶴六女廣徳人許字歩溉溉客死錢塘父母欲更嫁之氏遂經死嚴以作妻傅氏建平人嚴死氏托孤女於夫妹閉户自縊以救復甦乃碎一碗吞之死潘之城妻韋氏建平人夫歿殉夫死姚善富妻王氏建平人善富入太學燕師起叔父恕以陳迪壻故死節善富又以恕故自經詔陳屍御史廊下七十五日氏凡三伏闕上疏乃得允歸殯國朝濮宗元妻胡氏廣徳人歸濮未幾鄰有金木匠頻挑之氏嚴拒一日越嶺詣伯姆家金瞰知持斧候於山僻脅不従遂被害康熙年旌表王氏女名小姑建平人許字宗茂松未婚夫殞女聞訃即絶粒夜則閉幃篝燈密製衰絰如是三日伺母弟皆寝乃更衣将元聘禮帖釵鈿納懐袖投繯死宗氏迎櫬與茂松合葬焉雍正九年旌表岑達觀妻潘氏建平人達觀祖母朱母烏俱早寡守節潘又寡無子時烏氏病朱氏年老矣曰吾不忍再見少年寡婦侍側也宻諭其父迎歸任擇所之父托鄰媪自以其意微動女女志斬然久之私怪其姑杳不通問而數聞人言再醮利益悲憤欲歸姑家鄰媪因明告姑意乃大慟自縊救甦者再朱聞之亟迎歸與兩世孀姑相守以歿六安州明趙軏妻周氏六安人正徳壬申流賊掠周氏去周紿之曰家有金珠請歸取之至家攜子女投水死庠生丘民法妻張氏六安人賊掠欲汚之死不可奪及覓得其屍刀痕徧體兩手堅握中衣至殮力撥其手不能開謝天爵妻陳氏六安人遇賊賊欲掠之去氏奮罵不従遇害失名女六安人賊猝至避不及為賊所執大罵不辱被殺貢生鄧我榮妻馬氏英山人年十九避流冦於羊角山被執不辱而死鄧君衡妻王氏六安人夫亡紉衣密縫従容自盡投繯之後顔色如生張九敘妻鄧氏六安人夫亡身殉黄文議妻潘氏霍山人夫亡自經於棺側國朝邵型妻劉氏六安人夫死殮畢遂閉户自經死雍正八年旌表趙碩孝妻胡氏六安人殉夫死泗州宋王宣妻曹氏建炎中盜馬進焚掠臨淮宣要曹氏避之曹曰婦人不出閨門君請自往賊至宣避之曹卧牀不起賊劫持之大罵不屈被害張同朱妻陳氏泗州人嵗饑就食青陽夫鬻之於虹縣李簡氏通身宻縫至簡家以剪刀自刺死陳旺妻劉氏泗州人旺歿劉不食十餘日死明青陽民妻失其姓夫以官逋繫獄久不得出妻曰鬻我於逺商庶可不偕亡也夫従之既成券痛哭分袂夫得生氏赴水死副使王養正妻張氏泗州人養正官副使死於任氏聞訃絶粒七日死張箕妻李氏五河人夫亡自縊何氏女泗州人年十一父貧鬻女悮入於娼家嵗餘女始悟歎曰生而不良不如死之為愈遂引刀自刎太守楊遜表之俞潭女泗州人年十七正徳間流賊犯境女被執抗顔峻詞義不受辱賊以兵懼之罵曰吾良家女豈汝狗盜偶邪賊怒叢刺之至死罵不絶口州人為立祠劉大文女泗州人有强暴毆其母闌入閨房女見勢急以身蔽之不能止且横罵焉女曰吾處子也焉有受人毆辱尚靦顔求活哉不食死何雄二養女盱眙人長名春景少名進喜雄逼為娼二女聨臂投淮數日逆流雙浮水面顔貌如生本縣申請建祠致祭周六韜妻陳氏盱眙人年二十三韜死子幼守節事姑姑亡有迫之他適者遂縊於寝室事聞建坊胡貞啓妻侯氏盱眙人夫死自縊建烈婦碑於津泥集周夢熊女盱眙人壻有廢疾欲易婚女聞自經袁領女盱眙人遇賊至不辱死樊九錫女盱眙人賊至不辱罵賊死劉植妻朱氏盱眙人歲飢家貧夫令改嫁不従自縊趙靠妻顔氏盱眙人歳旱飢甚夫逼氏嫁不従經死吕氏盱眙人姑老家貧夫逼改嫁赴水死蔡氏女天長人許字潭長長病迎之歸曰吾鬼籙中人不忍復㸃若身若以兄事我待吾死得至易簀吾瞑目矣蔡侍湯藥六閲月長死遂自經王蔡子婦胡氏天長人蔡灌園城北子亡胡年二十餘其姑欲嫁之乃自沈於河得救歸母家異日姑為季娶婦召還氏謂姑曰婦有夫服不祥應暫避闔户自經袁婦楊氏天長人年十六袁貧甚欲驅為娼氏不従捶楚備加自縊死王漢妻徐氏天長人漢貧他出徐於野田採蘋而食豪强葛爽欲私之强裂其裾徐泣曰吾婦人也何辱至此遂縊死爽亦暴卒張徳妻周氏天長人夫亡養姑撫女姑有疾刲股救愈有豪鄰欲逼娶之氏斷髪自刎胡錦妻林氏天長人錦亡撫孤守節鄰人欲强娶氏剪髪投井知縣楊州鶴表之萬崐妻陳氏天長人夫死家貧遺孤四歳氏常枵腹以育之後子溺死遂自縊李文茂女五河人女幼孤母沈守節贅壻相依壻亡有欲逼改嫁者遂自經死沈一經妻曹氏五河人流冦壓境為賊執氏不従露刃脅之復引弓作欲射狀氏怒罵曰刃且甘受何畏射賊怒解其體聶鼎妻姚氏五河人嘉靖癸丑被賊執登舟氏度不免紿賊曰業已相隨但乳兒在岸棄之不忍賊信之氏登岸躍入急流中死孫鑾女五河人母朱氏卒鑾繼娶李攜前夫之子鄭州兒同居州兒欲私之女訴於姊曰彼敢辱我必刃之而後死一日州兒紿母他出調女女佯諾使閉門遂殺之女亦自刎事聞建祠立坊旌表張五教妻沈氏五河人適張二十五日夫歿扃户自經歐伯鎮妻戴氏五河人年十八夫歿哀泣視殮畢自經邑令表之宋雲鴈妻盛氏五河人年十七夫亡自經萬厯間旌表王序禮妻丁氏禮弟序爵妻郭氏五河人序爵為賊殺郭方懐孕及生子閲月投繯死嫂丁氏適生女丁不忍姪之無養遂棄女乳之後序禮死丁守節撫姪成立都尚禮女五河人幼許字桑氏子桑家貧有惡疾尚禮議改適女聞之投繯死瞿氏女天長人許字董君兆未嫁崇禎十年流賊猝至女自度不免遂刎頸死李準妻胡氏天長人準不才以氏償逋氏曰我豈事二夫哉自經死苗百夀妻張氏天長人張僉憲孫女值流冦至見氏欲執之母稽首乞哀賊殺之旋牽氏臂氏罵曰賊奴辱我手速斷去冦怒臠磔其軀時溽暑家犬為守其屍不去他犬入則嘷吠逐之後家人收葬膚體猶香鍾淳女天長人年十六許聘繆一元夫亡女哭泣不已父母解之曰當擇良子配汝女垂首不應母强問之曰雞乎犬乎吾人也許一而已一日取繆氏聘物焚之自縊死歸其屍於繆合葬焉胡氏女天長人許字未婚夫死自縊以殉周氏女天長人許字潘明未適夫夭女願奔喪不果伺母炊自經死歐纘修妻鄒氏五河人纘修赤貧氏勤儉相夫崇禎十年流賊破城擄氏逼辱不從賊刃之至死猶罵賊李應元妻陸氏五河人流賊犯五河應元被擄氏聞奔賊營泣告願留已而遣夫賊欣然従之應元猶不忍去氏謂曰夫死妾亦必為所擄俱死無益也頃之夫遁已逺遂奪刀自殺鄒述孔妻張氏五河人流賊破城遇氏以手拽之大罵被殺石守仁女五河人年十七質美而性莊流賊突至父母逃死女被執逼辱之女抱槐樹厲聲罵賊賊怒使數人牽之不解斷其兩手罵如初又斷其足愈罵不絶痛仆地賊褫其衣女囓賊指斷其三賊衆擁薪焚之後所焚地血痕㸃㸃遇雨則燥暘則濕張大漢妻郭氏五河人歸張月餘流賊入境俱被執将刃大漢氏抱泣賊捨大漢而拽氏欲逼之氏趨投河水淺不能溺賊撈救氏大罵兩手持淤泥沙石向賊憤擊賊怒并其夫支解焉孫天禄女五河人崇禎十七年遇兵觸刃死臧某妻石氏泗州人流冦至被擄厲罵不辱賊怒支解之國朝王臣賡妻齊氏盱眙人年十九賡暴病而亡氏遂自縊順治間旌表楊三魁妻馮氏盱眙人强暴逼奸不従投水死姚心妻李氏盱眙人夫死自縊烈婦蔡氏天長人王天祥妻趙氏泗州人夫溺洪澤河氏聞密紉内外衣投淮死石氏盱眙人為强暴逼辱殺傷夜沈淮水中三日後尸浮水面方大成女五河人許字丁象觀子未適壻亡女求死殉父母固防之女遂不復言久之見媒嫗往来相繼女窺知其意至晚閉閣投繯死倪景妻王氏泗州人夫客死氏聞絶粒母迎歸勸慰之數日泣辭歸自經死以上康熙間旌表白三妻謝氏五河人夫雇工於沈簡升簡升累次强奸氏不従自刃以死雍正三年旌表周森女盱眙人許字来安業覲光未婚覲光死女聞投繯以死雍正九年旌表宋尚義妻俞氏泗州人夫亡赴水死胡尚徳女泗州人年十四割股救母許聘楊三極極為人傭工死於梅城父母欲更卜婚女曰願歸壻骸葬之乃相從父母取壻柩歸及葬往拜奠歸自經死王氏女泗州人年十九夫宋弼貧不能娶聞弼病卒氏服喪百日自縊死江南通志卷一百八十一欽定四庫全書
