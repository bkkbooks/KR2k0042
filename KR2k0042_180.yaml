body:
  text: 江南通志卷一百八十一人物志列女義烈五潁州一府滁和廣六泗五州潁州府三國曹令女夏侯文寜之女適曹爽從弟文叔蚤死服闋後父母欲嫁之令女乃以刀截兩耳依爽及爽誅曹氏盡死文寜强迎令女歸微使人諷之令女佯許諾竊入寝室自斷其鼻曰仁者不以盛衰改節義者不以存亡易心曹氏全盛之時尚欲保終今衰亡而棄之禽獸之行吾不為也司馬宣王聞而嘉之聴乞一子養為曹氏後隋魏氏木蘭亳城東魏村人隋恭帝時募兵戍北方木蘭父當往而老羸弟妹俱稚木蘭乃請於父代行厯十二年身接十有八陣樹殊勲人不知其女子也後奏凱還天子嘉其功除尚書不受懇奏省親及還釋戎服衣舊裳同行者駭之聞於朝召赴闕欲納之宫中曰臣無嫓君之禮以死拒之帝驚憫贈将軍諡孝烈鄉人嵗以四月八日致祭蓋孝烈生辰云宋盧兒潁州人歐陽修妾修卒盧兒哭之慟淚血以死殉葬焉吕祉妻吳氏霍丘人紹興間酈瓊叛降於劉豫祉死氏遂自縊明魏隆甫妻張氏潁上人張恭女正徳間流賊亂氏被擄逼辱氏詈罵以手批賊頰被殺生員嚴禄妻許氏潁上人正徳間為流冦執不屈投水死韓欽妻王氏潁上人為冦所脅投水死吳濟女潁上人流冦屠其家執女去不肯行哭且罵躍入水中死石球妻呈氏潁上人流冦至夫被傷氏匿草中得免賊過荷夫以歸夫死氏七日不食扼吭死王乾妻楊氏王坤妻楊氏俱潁州人嘉靖間為賊所逼走匿髙樓竝焚死王加㑹妻楊氏潁州人加㑹病革曰汝當何如氏泣曰死耳加㑹揮淚歿氏語姑曰婦已許死者矣遂自縊死雙烈張氏吕氏俱潁州人張清女許字劉中焞未嫁夫亡女年十九哀號詣弔比葬前一日縊死柩傍焞弟中燿娶吕氏燿亡氏年二十刎頸死孫錡妻馮氏潁州人錡歿氏自縊姚模妻樊氏潁州人樊倫女模歿氏不食死劉梅女潁州人幼通文翰許字李之本李亡女飲泣不食誓以死從語父曰兒為李服三年且需吾弟稍長寄語公姑勿為李郎置槨遂盡去鉛華教弟讀書親為正句讀越一年梅潛許田姓擇期納采女聞自縊死郡守臨其葬男女往觀如市時田家亦来致奠舉酒一酹而柩前酒具劃然碎裂起髙丈餘遶簷紛墜事聞詔旌其門張其猷妻盧氏潁州人年十九其猷墮水死氏以頭觸楣絶復甦徐曰終夫喪相従於地下耳越嵗姑憐其無子囑媒氏微諷之氏遂自縊王永繼妻時氏潁州人夫死五日自縊張雲鵬妻臺氏潁州人鵬病危氏許殉以三日為期鵬死氏如期就縊侍婢救之不死恨曰奴敗我事令我負約遂絶粒至七日頓足曰遲矣郎得無疑我仍縊死有司題旌潁水烈婦不知姓氏住潁河北夫為人傭工病篤婦泣曰事急矣殮葬無所出請鬻妾遂自售於賈船得資為夫置衣棺揮淚别去投潁水死韓有學妻孫氏潁州人有學死自縊鄰里鬻棺埋之黄鵠妻温氏潁州人鵠病危氏許以身殉鵠泣解所繋縧付之鵠亡遂縊死唐汶妻郭氏潁州人夫早世翁姑俱八十餘氏拮据奉養翁姑歿殮葬如禮遂不食死范希文女潁州人許聘朱廷諫未嫁夫死女自縊馬似龍妻史氏潁州人夫死自縊柩傍鄧任妻丁氏潁州人任病久罄奩救之不效惟存聘時簮二枝一綰於任髪一自綰曰妾安敢負此簮任死三日自縊李枝茂妻王氏潁州人夫病剜肉療之不起自縊死張大壯妾曹氏潁州人夫亡自經儲濬妻吕氏潁州人夫亡自縊董瑁妻王氏潁州人夫亡族無屬姓王殮而葬之依母氏居服除後自縊死王家僕婦潁州人劉子安妻失其氏劉姓無賴好博病死於外婦聞之即自縊死蒋應節女潁州人年十六許聘李啓芳李死女聞自縊王瀚妻盧氏潁州人瀚死氏自經李驥妻胡氏太和人正徳六年流賊陷城有卒逼之氏不辱死賊感其義戮其卒以禮葬之王昭妻陳氏太和人正徳六年流賊擄氏上馬氏詈罵不從投於河賊斷其屍李欽女名玉蓮太和人為賊所擄憤罵不受辱被殺時年十六與陳氏竝勒石旌善亭劉一貴妻張氏太和人賊夜劫之氏詈罵不辱賊怒燎之於火中羅進女太和人年十六許字王仲英子夫死女聞訃自縊有司旌其門徐珏妻劉氏太和人夫歿自經以殉事聞建貞烈坊于新豐妻趙氏太和人年十八夫死即自經與夫同殮韓禮女蒙城人年十五正徳六年賊破城禮藏女窖中賊執禮欲殺之女従窖中大呼勿殺我父賊起窖得女劫之上馬女曰釋我父即從汝賊釋禮女罵賊被殺戴九姐蒙城人戴淵女幼聘張海海歿女方十五聞訃自經死時志學女蒙城人許字田儒年十六田死欲往守制父母阻之伺父母出自縊於寝室姜氏女蒙城人許聘何其恭恭歿哀痛成疾終不食死父母憐之與何合壙馮氏女蒙城人賊至逼之不受汚罵賊被殺張琦妻盧氏蒙城人流賊入境執氏驅之行氏抱女投水死李氏佚夫姓蒙城人夫為賊驅不知所往氏與女潔兒俱投井死魏瑶妻謝氏蒙城人孀居年七十流賊至媳王氏負而逃至河濱暫息賊逼近謝曰勿以老身累爾等遂投水死王氏與其女二姐及賀銘妻丁氏與其子女俱相挽入水死後凡得七屍邑令建七節祠祀之張思謙妻劉氏蒙城人夫亡自經以殉家人救免防之七日不食而死何仲清妻荘氏蒙城人夫死自縊柩側縣令奠而表之程稔妻韓氏蒙城人夫歿自經潘養晦妻牛氏蒙城人夫歿欲以死殉姑苦諭撫孤氏勉従守節後子以痘殤氏投井死有司為請建坊戴韞珽妻田氏蒙城人夫歿自經死郡邑為建貞烈坊張萃黄妻王氏蒙城人本江寜籍幼好讀書通繪事張亦工丹青夫卒氏盡以夫婦合作諸繪納棺中對鏡自縊有司上其事建異烈坊張顯思妻周氏蒙城人夫疾革氏曰㑹須同歸夫囑之曰俟吾友某来一見乃葢棺然後聴子為計越五日友果至殮訖氏即自經海秀妻李氏亳州人嘉靖二年嵗大饑秀死李不能葬負土為墳抱女沈河而死越三日屍浮如生女猶在抱御史張惟恕表其閭祔祀夏侯令女祠孫鈞妻龎氏亳州人鈞販豕為業夜行為盜所殺氏年二十四誓志守節家人逼嫁氏遂自經蔡銑妻杜氏亳州人年十八夫死自經王敷紀妻汪氏潁上人夫死自縊石佐妻楊氏潁上人夫亡自死以殉王越妻張氏潁上人夫死氏殉生員髙翼麗妻封氏潁上人麗病氏割股不能療立嗣成服遂自經天啓間旌遲義敏妻陳氏潁上人夫死自縊官三㨗妻陳氏潁上人㨗兄三仕以罪死丹徒㨗千里覓骸骨歸勞瘁而卒氏絶飲食號泣七日死饒文地妻王氏潁上人饒傭於富家氏織絍奉姑夫亡守節姑逼令改嫁不從自縊死滑鯤妻孫氏潁州人夫亡矢節流冦逼之氏罵賊死白鷗妻袁氏潁州人鷗死袁食貧守節自教其子精衷舉於鄉㑹流冦陷潁精衷被執其媳李氏奉袁越城避之袁足損不能行賊至害袁竝刃李賊退李得蘇拮据棺殮苦節撫子相繼以孝著韓光祖妻武氏潁州人賊至潁氏同子婦李氏罵賊不屈投火自焚而死又氏一妹一女與孫媳王氏偕殉鹿獻陽妻王氏潁州人獻陽為推官氏封孺人賊至氏命服端坐罵賊死其子妾董氏與俱死張大同妻章氏潁州人流冦陷潁大同出殉父難章遂同三側室宋氏蒋氏郭氏閉門自焚死李栩妻劉氏潁州人賊入城劉勸姑避他所自扄户投繯死盧敏妻劉氏潁州人守節二十七年冦陷潁遂見害其第五兒及孫女二姐同遇害甯儉妻楊氏潁州人儉罵賊不屈死氏與子婦唐氏劉氏幼孫俱死之甯偉妻谷氏潁州人潁城陷氏閉門不出賊脅辱不從見殺武宗尹妻甯氏潁州人夫為叅戎久宦逺塞甯孝事孀姑姑病刲股療之冦陷潁執甯索金帛甯詈罵投井死其女為王於岐妻其子婦劉氏攜二幼女竝殉焉直指旌其閭曰一門三烈王猷妻時氏潁上人冦陷潁氏墮井中賊散子復出之未幾賊又至執其子去氏憤罵死之其婦杜氏被數刀猶匍匐姑傍見姑氣絶號呼投井死孫十二嵗亦同死劉佐臨妻胡氏劉國佐妻張氏潁州人胡與張妯娌也聞流賊至相約同死胡曰火烈張曰水潔及城陷胡曰吾不使賊見吾面遂投火死張赴池中亓中雅妻武氏亓中元妻儲氏亓中程妻李氏潁州人遇流賊妯娌三人投井死張大章妻李氏媳劉氏潁州人遇賊怒罵不屈被害劉氏刳腹死郝慎修妻劉氏潁州人氏夫與子守圍城餉皆劉炊城陷投火死李虚白妻韓氏潁州人夫部郎封孺人遇賊不屈投水死石橋婦潁州人不知誰氏婦為賊劫至北闗石橋上抵死不従賊怒磔氏死有司誌其地以表之緑衣婦潁州人不知姓名賊逼辱之不従為賊磔死李琦之妻梁氏潁州人流冦破潁琦之死於難氏抱屍而泣縊死夫側梁作棟之女王立妾陳氏潁州人氏與嫡同匿尼庵中為賊所執以鐵瓜遞擊之陳曰我嫡也擊彼無益賊嚴訊幾斃投水死劉黽慤妻李氏潁州人與女永姐竝死於賊王祉妻田氏潁州人遇賊與一女同死李逢辰妻邢氏潁州人遇賊抱子投水死經旬屍浮水上其子猶在抱張調理母劉氏潁州人其妻張氏暨弟婦李氏城陷俱投水死張肅範妻張氏潁州人一家俱被害賊逼氏相従氏拜屍而往至河邊投水死盧和鼎妻吳氏潁州人賊至投水死吳道行妻曹氏與二幼女及劉楷妻鍾氏俱潁州人遇難投水死李向榮妻殷氏潁州人一門死節干同麟妻甯氏潁州人遇難投繯死王鼎隆妻張氏潁州人遇難縊死陳奎章妻王氏潁州人夫死方殮賊至疑有藏金欲開棺婦以身䕶柩賊怒劈死劉黽愿妻王氏潁州人側室龔氏俱遇賊投水死王啓昌妻劉氏潁州人夫被殺罵賊遇害王有聲妻郭氏潁州人城陷遇賊索銀錢氏大罵觸刃而死王應元妻郭氏潁州人賊欲犯之氏大罵賊怒殺之陳格心妻金氏潁州人遇賊獲其女金往救與女三姐同死程懸楷妻張氏潁州人長子必遂妻何氏次必遘妻張氏俱遇賊投水而死張鶴騰側室徐氏周氏潁州人遇賊焚掠徐周同投火死李福徴妻陶氏潁州人遇賊焚掠甚迫陶端坐一室遂焚死鹿萬春妻張氏潁州人撫孤守節年且七十賊索金帛不應以刃加其項氏引頸受之其子婦劉氏慟罵扃户引火自焚賊歎曰真義婦也併舍之李維紀妻趙氏潁州人城陷一家十八口俱投井死張嗣房妻郭氏潁州人子媳王氏冦至計無所逃俱赴水死申大志妻周氏潁州人罵賊被殺劉大潤妻李氏潁州人罵賊被殺子婦某氏往救遂同遇難楊克振妻王氏潁州人與孀姑李氏竝罵賊不辱賊忿恨以刃刺死張大賡母王氏潁州人流冦逼潁甚廹計無所逃氏與妾周氏皆不受屈遂於樓下積薪同登樓罵賊自焚而死徐繕妻張氏潁州人遇賊大罵挺身不屈引頸就刃賊怒刃之生員張嗣軫妻李氏潁州人城陷遇賊氏不受屈罵賊被殺甯田姐甯偉姐俱潁州人遇賊被刼奮罵不辱爭前就刃而死生員盧鎔妻劉氏潁州人冦逼城氏初不驚惟攜一子一女閉戸聴之及城陷家人逃避氏引其子若女至池上先推女次舉子繼自投於水後三日賊去家人覓屍於水為審視自項迄足襟裾貼服及鬢髮間皆有所繫始悟閉户時為之云推官亓豫側室李氏潁州人流冦破城氏遇之罵賊不屈而死東關外女子潁州人避兵渡橋遇賊抱持之女亟碎其面賊怒磔而擲於河甯佺妻劉氏潁州人李生白妻韓氏潁州人亓文杰妻劉氏潁州人劉廷桂妾楊氏潁州人盧尊妻田氏潁州人張南俊妻杜氏潁州人張奎生妻甯氏潁州人郭邦藩妻李氏潁州人張瑋妻章氏潁州人李學㸃妻楊氏潁州人張調燮妻李氏潁州人嚴克謹母崔氏潁州人嚴克謙妻杜氏潁州人田斾生妻王氏潁州人楊季麟妻張氏潁州人王用乾妻李氏潁州人徐履方妻王氏潁州人徐通方妻甯氏潁州人方時申妻廖氏潁州人王應妾焦氏潁州人郭雄楚妻史氏潁州人張俊業妻王氏潁州人張美珍妻雲氏潁州人張美珩妻杜氏潁州人楊三桂妻張氏潁州人