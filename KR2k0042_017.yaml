俗傳仙人以藥投井水變為醴者即此六安州番山在州南十里山非髙聳而蜿蜒磅礴為州之鎮小霍山在州南五十里一名青山以逺連霍嶽之脈故名大同山小同山皆在州南五十里山勢峻削僅通樵徑兩山相似故云有蝙蝠巖內深不測昔人避兵於此團山在州南七十里下臨渒河蒼翠孤特董靖原山在州南百二十里從石徑轉入原勢平敞宋里民董靖避兵處九公山在州西南六十里山有九石狀如人隋志云開化縣有九公山元末鄉人避兵於此寨址尚存其西有松林巖亦名嵩寮巖最深秀産蘭齊頭山在州西南七十里髙千八百丈層巒疉翠頂正方平山麓有水晶菴石泉井雷公洞魁星崖諸勝蹟巔有寶志公道場相傳為寶志說法之所障山在州西南二百四十里形如屏幛故名其相近有帽頂山界河南商城縣武陟山在州西三十里相傳漢武帝南巡登陟於此故名宋州人焦炳焦煥讀書其上響山在州西九十里其中空洞鏜􅝅有聲相傳四時皆響有一老僧趺坐其門山忽無聲僧去後山響如故寨基山在州西百三十里山極髙峻産茶香味異常品有泉出石竇甚甘向東巉石相距如門一夫可守昔人結寨避亂今為寺蓮花山在州西百五十里有二山東西對峙産石蓮花獨山在州西七十里地平曠一峰獨峙舊有武皇祠祀楊行密今為寺梁淮南招討使王景仁攻廬壽曾戰此祖家山在州西南百二十里世傳宋紹興間有祖興氏禮義傳家世居於此又西南二十里有山髙九百丈林木茂密宋文風氏居之上有寨名文家山龍穴山在州東四十里上有龍穴其水張又新品為天下第十泉即歐陽集古録所謂張路斯鄭祥逺二龍君戰處宋汪立信讀書於此其地今建廣福寺九龍山在英山縣東八里舊志云山半有雨淋崖禱雨立注又縣東二十里有廣福山英山在英山縣東五十里舊志云山髙峰秀為羣山冠縣以此名上有井出雲則其年必豐下有漢英布墓雞鳴山在英山縣北二里亦名鷹山宋淳祐中制置使吳淵於此立寨得勝山在英山縣西門外舊志云明洪武中邑令禦寇於此有功故名向有寨天人山在英山縣西七十里險峻有天人寨多雲山在英山縣西百里接羅田界舊志云上有九井上三井人不能到中三井祈雨每驗下三井有風井誤祈此井則狂風震地井中嘗出雲氣蔽虧日月為縣境諸山之最險者其西有岐嶺通湖廣之蘄水羊角山在英山縣北四十里絶頂有石嵯峨如羊角舊傳老子降神於此石人山在英山縣東北七十里第一峰有石如人立崖下有洞又縣東北九十里有紫臺山一百里有大陂山霍山在霍山縣西北五里縣以此名一名衡山亦名南嶽又名天柱山漢武帝南巡以衡山逺阻移祭於此以代衡嶽其峰聳秀儼若飛鸞頂有龍湫天池風洞嶽井試心崖凌霄樹又有渌水池旱潦如一餘詳見安慶府附唐皮日休霍山賦臣日休以文為命士所至州縣山川未嘗不求風謠以頌其文幸上發輶軒使得採以聞六年至夀之駢邑曰霍山山故嶽也邑贅於址至之二日離邑一舍望乎嶽將頌之文也及見之則目乎贛手乎嚲心乎竦神乎瞀始欲狂其文寫其狀如丹青之不差也頌其風文其謠如金石之永播也既而其精怯然搏敵躁然戒囚紛然棼絲恍然墮空浩然涉溟幽然久疢則知才智之劣如耄而加疾將杖而奔者於戲霍山之靈哉霍山之靈哉將閼於神而愚之耶抑有所逹而託之耶其辰既浹其精忽渝怯然而勝躁然而適紛然而靜恍然而安浩然而濟幽然而愈如壯而能决將陳而能敵者於是狂其文寫其狀辭曰山太始之氣有清有濁結濁為山峻清為嶽其厥臣其嶽為君惟南之鎮曰霍為尊嶽之大與地角壯與天勍勢荆豫華嵩青沂兗岱如垤而秀如塊而鋭嶽之髙千仭萬仭蒼蒼茫茫日月相避其光望之數百里外為天棟梁嶽之尊端然御極竦然正位靜然而聽凝然而視其體當中如君之毅其屬者如駢其拇如枝其指若卑其儀若肅其位嶽之氣其秀為春其清為秋其翠如雲雲不能麗其色如烟烟不能鮮若雨收氣爽丹青滿天嶽之靈其神不昧其報如響若雨用淫嶽能朗之若歲用旱嶽能澤之嶽之德生之育之煦之和之開花染草凄凄迷迷藻繢數百里嶽之形有雲騖騖其勃如怒有泉烈烈其來如决叱豐隆奔列缺轟然霹靂天地俱裂嶽之異狀其勢如危或不可支若不可維或仰而谺有如吮空或俯而拔有如攫地其曉而東有如貫日其暮而西有如孕月有水如脈有石如骨有洞如腹有崿如節或鋭而勵或斷而截或回而馳或低而折其經之怪之詳之詭之千種萬類繄不可得而詳記因神狂不能自主怠而寐夢一人絳衣朱冕怪貌魁形曰余祝融之相也夫霍山君之故治也爾賦之誠形矣勝矣怪矣典矣然義有不備帝俾余蒞夫古有五嶽霍居其一所以五嶽相通者唐虞之世五載一巡狩一載而遍上以覲侯下以存民侯有治者陟不治者黜民有寃者平窮者濟洎唐虞以降皆燔柴於霍我帝用饗其禮至周且册而命我與諸嶽星列中國自漢之後乃異我號而歸於衡故祝融遷都余守霍今聖天子越唐邁虞而廢巡罷狩余之封內有可黜可陟可平可濟者是聖天子無由知之爾能以文請執事之逹者易衡之號以歸於我請天子復唐虞黜陟之義故爾之將賦余閉遏爾懷而不爾文帝曰有衡既逺有狩必勞惟霍之邇斯號可復賦者有能言胡不俾帝命余錫爾文爾無忘也臣曰請惟神命既覺而書嗚呼異哉烏梅尖山在霍山縣西北二十里兩峰多産梅北峰下有雷公洞作霧即雨有雷公斧蹟産茗絶佳馬鞍山在霍山縣西四十里峰巒竒秀為諸山最三廽山在霍山縣西南二十里又名三曲山中有小港縈廽三折山勢隨之東北通梅子嶺多産梅四十八盤山在霍山縣西南百二十里山徑曲折行旅負荷者必以杖支擔息肩然後進凡四十有八盤白石山在霍山縣南五十里山皆白石上有摩旗尖又南十里有四望山宜於逺眺東石門山在霍山縣東十里與西石門相對中有狹徑如門復覽山在霍山縣東二十里相傳漢武帝南巡還復登此顧瞻天柱因名指封山在霍山縣東三十里相傳漢武帝南巡見其峰巒峻拔乃指而封之為霍嶽副通光山在霍山縣東北十里山有石竅通光如月聖人山在霍山縣東北十里石壁竒峭勢如欲壓壁間有巨人掌蹟隋志云廬江縣有聖山即此灊臺山在霍山縣治威逺門外五里其山純石旁鐫小赤壁三字陳霆灊臺詩云秋風黃葉灊臺寺匹馬來遊正夕陽即此雪峰嶺在州南七十里石上鑿佛像以千計中峰禪師之舊迹也古路嶺在州西百五十里盤回三十七折始至其上遮日嶺在州西百八十里山髙徑深亭午方見日影韓婆嶺在州西二百里界商城又西二十里有清風嶺界霍邱楮皮嶺在霍山縣東南四十里居人於此造紙香爐崖在英山縣西五里舊志云有仙蹟亦有龍井祈雨輒應雕翎崖在霍山縣西南百五十里臨河壁立八仙巖在州南六十里石壁相向其洞有八元龜峽在霍山縣西三十里世傳大禹所鑿雷鳴洞在州南百二十里中虛能應雷鳴居人以此候雨龍潭洞在英山縣東二十里舊志云其洞深邃懸泉下滴竅石如盂嶮石在英山縣南六十里三縣水口有巨石橫截於河以故邑中不通舟楫龍爪石在州城西臨水上鐫龍爪二字其大如斗渒河一名白沙河在州西漢書謂之沘水源出霍山經州界北流經霍邱壽州入淮唐書云朱全忠伐楊行密戰於渒水為行密將朱瑾所敗即此溶水河在州西七十里源出齊頭山西北流入河南固始縣界合於史河青龍河在州西百三十里與三元幢河同入渒水以達於淮青石河在州西南七十里出紅石崖㑹於渒水馬栅河在州東南八十里流經舒城縣之桃城入巢湖雞兒河在英山縣南五十里發源瓦寺前通嶮流至蘄水入江英山河在英山縣西源有二東曰東矼西曰西矼皆南流至縣西南二里合流三灣河在霍山縣南三十里源出灊山入於化龍河漫水河在霍山縣西南百一十里源出英山縣界東北流至縣西南三十里為梅家渡又東北入於渒河距漫水十五里為陡山河源出分水嶺亦東北流入渒水化龍河在霍山縣北門外合流於黑石渡入渒河烏龍潭在州西百三十里歲旱取水禱雨輒應泗州甓山在州西四十里下有甓山湖南通淮一作碧山州志云以土色碧故名巉石山在州西百二十里淮水北岸與南岸浮山相對即梁天監中築堰處也又西有車門有路通車九山在州西北八十里以有九岡而名北接懷逺之塗山第一山在盱眙縣治東宋自京師至汴口并無山惟隔淮有此故名有米芾書第一山三大字勒於石又縣治南有清風山皆名勝處臺子山在盱眙縣東一里劉宋臧質守盱眙以拒魏師魏造弩臺射城中即此盱眙山在盱眙縣東四十里舊以形似名馬鞍山唐天寶中改今名東山在盱眙縣東南三里上有石洞左曰靈關右曰劍壁洞中曲折相通敻非凡境都梁山在盱眙縣東南五十里山多蘭草俗謂蘭為都梁故名方輿勝覽云隋於此建都梁宮有磬泉釣魚臺雲山在盱眙縣東南七十里一名東陽山山有龍潭仙人洞其麓有寺蓋舊東陽縣之佳勝也九頭山在盱眙縣南三十里又名塘山岡阜重疉溪澗縈紆亘四十里上龜山在盱眙縣西南一里舊志云舊有八仙觀及招隱洞洞口有招隱亭又二里曰寶積山山麓有石刻道德二大字又有羅漢泉清平山在盱眙縣西南八十五里郡邑志謂之青山方輿勝覽云清作青宋紹興間劉澤保聚於此嘉定末武統制亦據此山城門街道池井猶存紫陽山在盱眙縣西南百里縣志云上有古浮圖山麓有古淨明寺相傳唐人常於此鑄劍有試劍石磨劍池一名九山嘉山在盱眙縣西南百五十里相傳宋將孟良於此立寨遺蹟尚存上有龍王廟禱雨輒應三臺山在盱眙縣西南百五十里上有三峯鼎立如品字其上平衍可屯十萬衆宋建炎間劉綱保聚於此綱劉位之子也玉環山在盱眙縣西八十里狀如玉環一名女山上有二女廟西廟山在盱眙縣西七十里有九江王英布廟縣東南又有東廟山浮山在盱眙縣西百四十里北臨淮水故名亦名臨淮山寰宇記云在濠州東九十五里俯臨長淮山下有穴淮水泛溢其穴即髙水減即低濠梁志云浮山洞夏潦不能沒而冬不加髙故人疑其浮也舊傳洞有仙人寓焉南史云梁天監中曾築堰於此以灌壽陽功成旋决上有靈巖寺名人題詠甚多五河志云是山雖在盱眙去五河尤近關鎖風氣捍塞水門實五河之屏障盱眙不得而專也天長亦有浮山陡山在盱眙縣東北五里俯瞰淮河其勢陡峻一名斗山軍山在盱眙縣東北六里三國志云魏鄧艾嘗屯軍於此築堰溉田亦名君山又東北一里曰長圍山舊志云魏太武圍盱眙自都梁築長圍圍城造浮橋於君山截水路即此下龜山在盱眙縣東北三十里上有絶壁下有重淵嶽瀆經云禹治水獲淮渦水神巫支祁形猶獮猴力踰九象鎖於龜山之足淮水乃安焦山說枯亦云唐永泰中李湯以牛五十引鎖出之鎖末有一青猿髙丈許復拽牛沒水蘇軾詩云清淮濁汴爭强健龜山下瞰支祁宮古寺後有井俗傳鎖支祁於井中冶山在天長縣南四十五里産紅石舊志云吳王濞即山鑄兵因名上有天井白龍池鐵牛洞真珠泉諸勝又南十里曰道人山覆釜山在天長縣西五十里産石黑而礪舊志云周世宗征淮南嘗駐蹕焉橫山在天長縣東南五十里望之若橫故名上有泉不竭山南有踟蹰山相傳陳荀朗破郭元建地胭脂山在天長縣舊城西北隅厥有髙阜日光掩映赤色殷然宋包拯改名紅山今呼為胭脂云金岡山在五河縣南二里土色純黃故名九岡在五河縣南三里崇岡綿亘起伏凡九臥龍岡在五河縣西南七里下有龍潭瑞巖在盱眙縣西北下有泉源巖上鐫瑞巖泉篆書秀巖在盱眙縣玻璃泉上有石刻字并唐宋人題詠繡谷在盱眙縣普濟院南石林蓊蔚繁花縟卉春如錦繡杏花巖在盱眙縣崇福寺後有蔣頴叔陳述古題名溧河在州北七十里源自虹縣下流通塔影湖直河在州東北二十里宋崇寧三年開此由汴河逹於淮又州東門外有一字河隋時所開通直河口入淮者以河形直如一字故名紅藍河在州東十里南流入淮隋宮人種紅藍於此池河在盱眙縣西自定逺縣界流入此注於淮運河在盱眙縣東北三十里龜山鎮一名新河宋史云熙寧四年發運副使史公弼所開以避淮流之險其後蔣之竒復濬治之秦蘭河在天長縣東四十里源出橫山流入於毗沙湖汊澗河在天長縣西四十五里受覆釜山西南諸水三汊合流入丁溪湖又縣東北有龍岡河西北有銅城河俱入於丁溪石梁河在天長縣西北三十里自縣以西之水皆入焉南有石梁見通典今廢得勝河在天長縣北七里相傳漢髙祖自將擊英布得勝於此因名潼河在五河縣治東三十里源自虹縣通沱河經天井湖南至鐵鎖嶺入淮漴河在五河縣南二里源出南湖東流入淮澮河在靈璧縣流至五河縣南入於淮沱河在靈璧縣流至五河縣西北合澮水東入於淮五河口在五河縣東二里乃澮沱潼漴四水入淮處峰山湖在州西百一十里通淮塔影湖在州西北四十里湖東有龜山寺塔日照塔影入湖故名廣袤數十里通洪澤湖永泰湖在州北湖周三百餘里出朱衣鮒洪澤湖在州東北闊百二十里㑹諸湖水而通於淮即今州城之所陷也縣志云舊名破釜澗隋煬帝幸江都時嘗遊此又見淮安府龜山湖在州東北三十里與盱眙下龜山對岸安湖在州東北六十里下流入淮西有崘墩湖萬歲湖在盱眙縣西二里周世宗伐南唐曾駐蹕焉一名西湖三城湖在盱眙縣西通池河入淮丁溪湖在天長縣東下流為五湖入髙郵州又有萬壽湖感塘湖沂湖上白湖俱與此通五湖在天長縣東北四十五里五水相合為一東接髙郵州之毗沙湖南湖在五河縣南七里流為漴河天井湖在五河縣東北二十里與州治界淮水在州南一里西自臨淮入五河縣流經盱眙抵州城之南㑹諸湖水東北入山陽桃源界汴水在州北西北自虹縣流至州界入淮宋蘇軾云自唐以前汴泗㑹於彭城之北然後東南入淮近歲汴水直逹於淮不復入泗矣蓋自隋開通濟渠始也唐宋之世汴水皆為漕渠云龍潭在五河縣西南七里相傳有龍潛於中長沙洲在盱眙縣北淮水泛漲賴以捍禦蘇軾詩云十里清淮口長堤轉雪龍是也今廢玻璃泉在盱眙縣瑞巖之下泉水清冽瑩徹如玻璃米芾詩鑿破玻璃引碧泉大沱溝小沱溝俱在州北十三里流入於汴江南通志卷十八
