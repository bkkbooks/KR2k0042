body:
  text: 江南通志卷十八輿地志山川八潁州一府滁和廣六泗五州潁州府藥山在霍邱縣南八十里山産半夏蒼术諸藥九仙山在霍邱縣南百里上有石臼凡九梅山在霍邱縣南二百里望到山在霍邱縣南二百二十里可望而難到言其峻也大别山在霍邱縣西南八十里一名安陽山界河南固始縣亦名檀公峴相連有芙蓉山長山在霍邱縣西八十里三山相連曰南長山北長山中長山其相近者曰髙祖山接固始縣相傳漢髙祖追項羽屯兵於此萬壽山在太和縣北九十里宋名縣曰萬壽以此駝山在䝉城縣西二十里山首尾髙而中陷故名靈山在䝉城縣西北二十里下有洞及泉皆以黃伯名又五里有齊山與此相連狼山在䝉城縣西北二十八里有南北二峰對峙山陽有當陽寺巔有天池泉檀城山在䝉城縣北四十里山桑城內峰極聳秀檀道濟築城於此七旗嶺在府治南七十里北臨谷河元王保保曾屯兵於此金牛嶺在府治南百二十里淮水北岸鐵牛嶺在䝉城縣西北八十里安舟岡在府治南九十里淮水北岸仁勝岡在府治西南百四十里近艾亭又五里曰熬鼎岡在汝水北岸黃岡在潁上縣西南二十里淮水南岸又垂岡在潁上縣東南四十里淮水北岸虎頭岡在亳州北二里回伏數里為城北之屏障又州南一里曰南虎頭岡管谷在潁上縣北二十五里相傳管仲家於此青邱在府治東五十五里瀕潁古有青邱縣今名青邱村金邱在府治南八十里舊志云楚王埋金於此以鎮水災中村岡在府治南七十里南臨谷河環岡皆村落故名大潤河在府治南五十里源於土陂地泉受小潤河之水東南入淮清河在府治南相傳楚靈王所鑿五代時刺史王祚為疏其故道名曰清河流入於潁谷河在府治南九十里源自潤河經一虎橋至水臺西入淮䝉河在府治南百里自紅林東陂積水成河西流入淮西茨河在府治西自太和縣南流入於沙河又北茨河在府治北即古細水也流鞍河在府治西源自項城縣經沈邱入於潁水柳河在府治西五十里源自白楊湖經廢柳河驛至石羊鋪入舊黃河又有舒陽河合於此延河在府治西沈邱鄉自新蔡東流入境又東北過楊橋入潁水舊黃河在府治西北金之季年决於太康西北自陳州界入府境流經城北元末又自南頓合潁水東流明正統二年復徙鹿邑黃流遂絶成化末一支復通於潁今亦絶肥河在府治北百一十里自太和縣流經府境東南至壽州下蔡西入淮所謂西肥河也史河在潁上縣東十里源於河南固始縣流經霍邱縣北入淮潁水之支流也濟河在潁上縣北五十里源出亳州東北流合肥水入淮􅚉河在霍邱縣東南二十五里源自六安州香和嶺分流入於東河東河亦源於六安入淮新河在霍邱縣北二十五里其水在宋宣和前不通舟楫建炎以後湍流衝激水勢漸大東北合於淮雉河在亳州東百二十里南流入渦與䝉城界漳河在亳州南三十里東北流入渦俗謂之缺水相近有十字河又有百尺河三里河明河油河三丈口河清水河俱入於渦肥河在亳州南八十里東過太和縣入本府界黃河在亳州西北三十里元末嘗自通許分派流入渦河包河在亳州西北二十五里東流入馬尚河馬尚河在亳州北由歸德府來至州境入於渦河沙河在太和縣南二里自沈邱縣流經界溝入縣之西南逹亳州境入潁俗呼為惠民河柳河在太和縣南三十里舊黃河支流也上通項城下逹頴州入於沙河宋塘河在太和縣北六十里亦茨河分流經宋王城茅岡至縣雙泉溝入榖河銘河在太和縣北九十里西通陳州蔡河東接肥河流至斤溝入茨河榖河在太和縣東北三十里茨河之南自卧龍分流至七里澗而入茨河茨河在太和縣東北六十里自鹿邑縣流入縣境又東南逹潁州入沙河芡河在䝉城縣南五十里源自潁上諸湖回繞邑境東注於淮陶中湖在府治西百一十五里界太和縣一作陶種潤溉土田居民利之白楊湖在府治西百二十里界太和縣一作白洋西湖在府治西北二里潁河合諸水滙流處宋晏殊歐陽修蘇軾為守皆嘗宴賞於此詩酒山水之樂論者與杭之西湖并稱云國朝計東重復西湖碑記理學文章二者未分之時其人莫盛於鄒魯之間其既分之後而復並盛於一時則理學莫盛於伊洛文章莫盛於汝潁何以明其然也理學之久晦而得周程文章之久晦而得歐蘇其時同也周程同時有張有邵繼起有游楊有謝尹而歐蘇同時有曾有老蘇小蘇繼起有黃有邵張有陳秦李其人同也且二者倡𨗳之功二程與歐蘇最著程則歸老於伊而授徒於洛歐蘇則先後官潁陳張繼之小蘇與秦亦至焉其既也歐陽老於潁二蘇家於汝且潁水入洛而近汝水合潁而長故潁尾又稱汝陰地又相同也今人讀伊洛淵源録者皆知理學之盛昔稱其地為西鄒魯矣及深歷汝潁間考歐蘇張陳諸先生之遺事故跡然後知文章莫盛於汝潁西湖者潁之北郊歐蘇兩先生與子由無已太虛文潛諸君子先後遊宴賦詩之地也州志載㑹老堂聚星堂雙柳亭皆在湖旁又其時為畿輔名郡水陸要地湖中蓮芡之實可佐公私水利足灌膏壤兩先生開復經畫具見集中宋紹興後湖漸湮亭堂尤漫滅不可考志稱有四賢祠祀晏呂歐蘇重其為大官也張陳輩自不得祀今其祠亦圮矣康熙七年鐵嶺喻公來守潁思復歐蘇兩先生遺跡再浚西湖廣袤若干丈築隄以固其防置閘以蓄其泄於是菰蒲之所蓄殖鷗鷺之所飛止長林高桞之所映帶擬之歐蘇張陳之所詠歌駸駸乎欲還舊觀矣復建數楹於㑹老堂之址髙其榱桷美其綽楔既以為登臨憩息之地且以祀前賢而彰遺愛豈不美哉東之至潁也值公經營垂竣新秋佳日友人劉子登招豫與諸友置酒湖之湄諸公多稱修復之功而豫獨穆然深思歐蘇兩先生暨張陳秦諸公當日觴詠留連之樂諸先生即數百歲後魂魄猶樂此也又追念東年八九歲時先人日督誦歐蘇文章稍長又知讀陳無已張文潛之文愛慕之不敢忘忽忽二十餘年今乃得置身於諸先生仕宦遊宴之地俯仰太息不能自已遂縱思髙論著為伊洛理學汝潁文章之說所以誇大乎潁者至矣而西湖與有榮焉雖然亦喻公修復之功不可無記賽闊湖在潁上縣東南六十里正陽鄉其水與淮河通白馬湖在潁上縣正陽鄉湖中有洲上建白馬寺陽臺湖在潁上縣北十三里有東西二水物産甚多民享其利白洋湖在太和縣西十五里與府治接一作白楊聶家湖在太和縣西北有上中下三湖其中湖即蔡家廟湖下湖即柳林湖周回五十餘里菱芡蒲荷水天一色邑之勝覽駝澗在䝉城縣西四十五里梁大通元年曹仲宗伐渦魏遣王元昭等援之前軍至駝澗即此乾溪在亳州東南七十里城父南左傳云楚子次於乾溪即此白魚港在府治北九十里溝洫之水積流為大渠通肥河汝水在府治南百里舊志云源發汝州天息山流至桃花店入府境又東過永安廢縣至朱臯鎮入淮又沈邱廢縣北有小汝水附汝水考汝河在府城南一百里自汝寧東北流至桃花店入府界按淮南地形訓云汝出猛山博物志云出燕泉山水經注云出魯陽縣大盂山通志略云汝水出汝州魯山縣其地與𢎞農盧氏接界故許慎謂出盧氏也其水南過上蔡至褒信縣汝口南入於淮班云行千三百四十里舊傳謂出汝州天息山者誤也淮水在府治南百一十里自河南固始縣流入府境又東入霍邱潁上縣界潁水在府治北源於河南登封縣東流至趙家渡入府境又東過沈邱繞北城門外過潁上之留陵至正陽鎮入淮謂之潁口一稱沙河附潁水考潁州沙河在城東門外東南流入淮即潁水也按唐要㑹云元和十一年置淮潁水運楊子等諸縣米自淮陰泝流至夀州西四十里入潁口又泝流至潁州沈邱界五百里至於項城又泝流五百里入於激河三百里輸於郾城得米五十萬石考之臨潁志云楮河在縣十五里即潁潁水源出登封縣潁谷經流本縣東南至清水鎮入沙河逹於淮郾城志云激江渡在縣西一里一百步即沙河也是則沙河即潁水明矣山海經云潁水出少室山黃氏云出河南登封縣陽乾山東南流至潁州潁上縣入淮翰墨全書云淮水東流潁水西北來注之謂之潁口下蔡淮潁之謂也詩地理考云潁水出河南府陽城縣乾山自汝州襄城縣流入潁昌府長社縣自長社縣流入臨潁縣自順昌府汝陰縣流入潁上縣至夀春府入下蔡縣入淮通志略云潁水出潁川陽城縣少室山今陽城省入登封矣東南至揚州洧水入焉又東南過南頓㶏水入焉又東南至下蔡入淮班云行千五百里河南志云潁水在登封縣西四十里水自石道保神水里入於瀦水按郡圖水出登封西南百妮山有故潁陽縣遺址按河南志有少陽河李莊河俱出少室山入潁故山海經通志略謂出少室也新志謂潁水上通古汴相去逺矣蓋黃河决而入潁非汴水也豐水在霍邱縣西南十里源出窮谷舊名窮水後改今名決水在霍邱縣西八十里俗訛呼為史水渦水在亳州北發源豫之葛河口由鹿邑西來至州境與馬尚河合東流經䝉城縣入懷逺界髙陂水在亳州南周四十三里魚蚌菱芡之藪也肥水在䝉城縣北三十里源自宿州東流入懷逺縣界金溝在府治北百二十里積畎澮之水通於茨河湖溝在䝉城縣東南七十里源自潁州泉流淵瀦冬夏不涸畢卓池在府治西鮦陽城內池廣十里聖泉井在䝉城縣西北四十里歲取水禱雨時應滁州琅琊山在州南十里唐元和十道志云晉伐吳命琅琊王胄出滁中駐此王禹稱云元帝以琅琊王渡江嘗駐此山故溪山皆有琅琊之號山谷深七八里下有琅琊溪謂之釀泉唐大厯中刺史李幼卿始鑿石引泉作禪室琴臺賦詩刻石及宋王歐二守相繼賞詠而名益著有琅琊洞歸雲洞明月溪紫微白龍六一庶子諸泉其南阜曰雞頭山附唐獨孤及琅琊溪述隴西李幼卿字長夫以右庶子領滁州而滁人之飢者粒流者召乃至無訟以聽故居多暇日常寄傲此山之下因鑿石引泉釃其流以為溪溪左右建上下坊作禪堂琴臺以環之探異好古故也按圖經晉元帝之居琅琊邸而為鎮東也嘗遊息是山厥跡猶存故長夫溪名曰琅琊日賦八題於岸石乃為狀而述之是歲大厯六年歲次辛亥春三月丙午日述曰自有此山便有此泉不濬不刋幾萬斯年造物遺功若俟後賢天種靈竒公潤色之疏為回溪削成崇臺山不過十仭意擬衡靈溪不袤數丈趣侔江海知足遂適境不在大怪石皚皚湧湍潺潺洞壑無底雲興其間仲春氣至萬木華發亘陵被坂吐火噴雪公登山樂樂者畢同無小無大乘興從公時公薦觴酒酣氣振溪水為主而身為賓舍琴詠歌同風舞雩時時醉歸與夕鳥俱明月滿山朱幡徐驅石門松風聲類笙竽嗚呼人實𢎞道物不自美向微羊公遊漢之涘峴山寂寞千祀誰紀彼美斯溪維公嗣之念茲疲繄公其記之後之聆清風而嘆息者挹我於泉間而已矣龍蟠山在州南十三里山皆峭壁立石為門上有虎跑泉桃花澗偃月洞側多刻名賢題詠豐山在州西南五里梅贄廟記云山在滁治之西南盤亘雄偉出琅琊諸峰上天欲雨則雲氣覆山巔歲倚以豐故名有漢髙祖廟世傳豐沛人嘗居之祠禮甚謹十道志云滁州有豐亭山疑即此山山北有幽谷地窪下四圍皆山昏旭異態歐陽修建豐樂亭於上記所謂其上豐山下則幽谷是也牛頭山在州西四十五里兩峰峻起形如牛頭與障子山相連下為梁村澗石屋山在州西四十八里牛頭山北上有石屋後有龍竇深十餘丈曲亭山在州西六十里一名皇甫山按隋志云清流縣南有曲亭山世傳唐皇甫暉禦周師屯兵於此山西北為大山山巔有田七區曰仙人田有洞曰仙人洞清流山在州西北二十二里舊志云南