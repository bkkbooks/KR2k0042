body:
  text: 江南通志卷七十三食貨志田賦七潁州一府滁和廣六泗五州上江屯田附潁州府雍正二年自鳯陽府分直隸州十三年併亳州於潁州升為府其原額坍荒升增田畝數詳見鳯陽府總國朝雍正十三年實在民衛所成熟折實田地共三萬九千九百一十二頃六十三畝八分九釐有竒實徵折色銀一十二萬九千二百二兩八錢四分五釐一毫有竒攤徵人丁銀二萬一千七百八十四兩五錢六分六釐七毫有奇匠班銀四十七兩九錢七釐遇閏加銀三錢三分七釐五毫共實徵銀一十五萬一千三十五兩三錢一分九釐有竒閏銀例派在內遇閏支給實徵本色米一萬一千九百五十三石五升二合有竒麥九百九十七石九斗五升七合有奇外不在丁田徵解雜辦銀二千二百七十四兩五錢一分四釐四毫有竒內除亳州商稅銀一百一十四兩六錢一分六釐歸併鳯關徵收外實徵銀二千一百五十九兩八錢九分八釐四毫有竒米一百七十七石九斗四升九合有奇歸併外衛實在屯田五千六百七頃三十五畝三分八釐有竒實徵銀一萬四千四百六十七兩三錢八分三釐三毫有竒攤徵屯丁銀八十七兩共實徵銀一萬四千五百五十四兩三錢八分三釐三毫有奇實徵米二百七十二石七斗二升七合有竒麥二百七十二石七斗二升七合有奇外不在丁田徵解軍三小料銀二十九兩七錢七釐三毫阜陽縣實在民衛田共一萬八千四百一十一頃八十四畝三分有奇民內則例每畝計算八毫有竒田科銀二分一釐漕贈銀九絲八忽有竒合四勺有竒米二漕贈米九抄八撮有竒攤徵人丁銀六釐七絲有奇匠班銀八忽八微有竒歸併潁州衛田依民田則例共折大畝每畝科銀二分四釐五毫有奇攤徵屯丁銀九毫四絲有奇實徵折色銀三萬九千九百三十兩四錢二分七毫有奇攤徵人丁銀八千五百二十九兩七錢九分匠班銀一十一兩七錢共實徵銀四萬八千四百七十一兩九錢一分八毫有竒實徵本色米三千四百五十二石二斗四升三合有奇外不在丁田徵解雜辦銀五百九十三兩五錢八分九釐二毫有竒內商麯稅銀四百五十一兩六錢草場租正腳銀二十七兩三錢五分七釐八毫有竒三北照寺田地銀一百一十四兩六錢三分一釐毫有奇北照寺田地米一十六石一斗二升七合有竒潁上縣實在民所田共四千三百五十二頃八十四畝五分二釐有竒民內則例每畝計算四毫有竒田科銀二分二釐漕贈銀四絲六忽有竒二勺有竒米一合漕贈米四抄六撮有竒攤徵人丁銀三釐六毫有竒匠班銀一絲三忽有竒歸併潁上所田依民田則例共折大畝每畝科銀四分四釐六毫有竒攤徵屯丁銀三釐三毫有竒實徵折色銀九千九百四兩六錢二分六釐一毫有奇攤徵人丁銀一千五百五十三兩六錢八分四釐三毫有竒匠班銀四兩一錢三分一釐遇閏加銀三錢三分七釐五毫除閏共實徵銀一萬一千四百六十二兩四錢四分一釐四毫有竒實徵本色米四百一石二斗有奇外不在丁田徵解雜辦銀一百四十八兩六錢一分三釐一毫有竒內夏稅軍餉銀三十九兩二錢二分秋糧軍餉銀六十七兩五錢一分緣草場租銀五兩一錢八分一釐三毫有竒宿寺火爐田銀並米折價銀三十六兩七錢一釐八毫有竒霍丘縣實在民田一千二百八十四頃四十三畝三分四釐有竒民內則例每畝計算八釐一毫有竒田科銀一錢四分漕贈銀六毫七絲有竒有奇米一升八合漕贈米六勺七抄有竒攤徵人丁銀九釐九毫有竒匠班銀一毫三絲有竒實徵折色銀一萬八千六百六十三兩一錢一分二釐有竒攤徵人丁銀一千一百八十六兩八錢五分匠班銀一十六兩三錢二分六釐共實徵銀一萬九千八百六十六兩二錢八分八釐有竒實徵本色米二千四百七十五石七斗五升二合有竒外不在丁田徵解雜辦銀八十一兩八錢七釐八毫有竒內漕院供應銀二十五兩五錢竒草場租銀五十六兩三錢七釐八毫有歸併外衛實在屯田三百頃七分九釐有奇內鳯陽前衛肥田每畝科糧二升八合有奇糧折銀三分三釐五毫有奇軍器牛角銀一分四釐一毫有奇瘠田科糧一升八合糧折銀二分一釐軍器牛角銀八釐八毫有竒壽州衛田每畝科折色銀三分軍器牛角軍餉等銀四釐五毫有竒丁銀一釐四毫有奇攤徵屯實徵銀九百四十七兩一錢九分二釐三毫有竒攤徵屯丁銀三十七兩六錢共實徵銀九百八十四兩七錢九分二釐三毫有奇實徵米二百四十五石六斗二升二合有竒麥二百四十五石六斗二升二合有竒外不在丁田徵解軍三小料銀二十六兩三錢四分七釐三毫亳州實在成熟田地五千六百一十九頃一十六畝六分六釐有奇熟內則例每畝計算三毫有竒田科銀四分二釐漕贈銀一毫九絲有奇九勺有竒米四合漕贈米一勺九抄有奇攤麥四勺二抄有奇絲有竒徵人丁銀八釐八匠班銀一絲四微有竒實徵折色銀二萬三千二百九十八兩三錢六分有奇攤徵人丁銀四千五百四十四兩五錢三釐七毫有奇匠班銀五兩八錢五分共實徵銀二萬七千八百四十八兩七錢一分三釐七毫有竒實徵本色米二千九百五石五斗九升有竒麥二百三十六石四斗三升五合有奇外不在丁田徵解雜辦銀一千三百二十七兩二錢五分五毫有竒內商稅銀一百一十四兩六錢一分六釐已經歸併鳳關徵收奇麯稅地契銀五十七兩六錢三分二釐九毫有草場租正腳銀一十三兩七錢八釐七毫有竒釐更名厰地銀一千一百四十一兩一錢九分二八毫有竒更名厰地米一百六十一石八斗二升二合有竒麥一十三石九斗七合有奇歸併武平衛實在成熟屯田五千二百九十一頃五十七畝六分一釐有奇內每畝科糧折銀一分八釐軍器牛角銀七釐三毫有奇攤徵屯丁銀八絲九忽