body:
  text: 江南通志卷一百六十人物志孝義四安徽二府安慶府晉何叔度廬江灊人恭謹有行業母早卒奉劉氏姨若所生官至太常卿子尚之何琦字萬倫司空充之從子父卒琦年十四哀毁過禮事母純孝孜孜色養及母喪方殯在堂適鄰家火琦撫棺號哭俄而風止火息南北朝宋何子平廬江灊人令海虞得禄惟以供母不及妻孥母喪去官哀毁踰禮大明末東土饑荒繼以師旅八年不得營𦵏晝夜號哭常如袒括之日冬不衣絮夏不就清凉一日以數合米為粥不進鹽菜所居敗屋不蔽風日兄子伯興欲為葺理子平不肯曰我情事未申天地一罪人耳屋何宜覆其敦厲名行如此梁何炯字士光廬江灊人炯年十五從兄乆受業一期並通五經章句為永康令以和理稱遷治書侍御史以父疾經句衣不解帶頭不櫛沐信宿之間形貌頓改及父卒號慟不絶聲竟以毁卒唐徐仲源望江人事母至孝母疾割股為糜母食而愈貞元中邑宰以其孝上聞勅號所居鄉曰孝感母夙畏雷仲源必躬為掩耳既卒𦵏於宅之東南隅每遇雷震輒伏墓曰仲源在斯郡邑又以聞再命築孝義墩賜曰華軒以彰之元周樞密潛山人逸其名至正間武進士紅巾賊寇境聚鄉勇屯馬園寨保障生靈十餘萬先後十五年屢破天完兵以功授樞密同知明髙帝出師鄱陽借糧於周周助米千二百斛洪武時令守舊土有徳於民民祀之杜萬户桐城人元將也偽漢兵陷安慶余闕既死其妾甫生一子棄水濵杜見呼之曰此余㕘政子義種也悉捐所攜物懐其子去今桐城洪濤山王氏即其裔家廟猶祀余㕘政云方徳益元末自池口徙桐以好義稱所居隣學宫衢隘割宅地之半以廣之桐溪水出龍眠暴漲則激石漂木不可渡議橋者難焉徳益捐金造橋甃石堅緻迄嘉靖末猶賴之明葛宣潛山人明太祖討陳友諒輸粟千餘石至鄱陽餉軍太祖義之黄榮六桐城人時掛車河有吴貴自稱元帥性兇暴貪財好殺榮六奮義為保障築六兒城於蔣家山逺近不能自存者皆来歸適明太祖下安慶榮六請降不受爵賞遂歸山曹鏞懐寜人母龍氏病聞人肉能療疾割體肉以進疾愈復作又刲胸肉以進未幾疾又作鏞妻王氏割臂肉以食母既而病大作鏞又刲股母疾竟瘳洪武時以孝旌楊貴安慶人母蔣氏病刲左股及脅肉以進母疾遂愈詔旌其門汪思義潛山人喜施予正綂戊午間江北旱潦頻仍思義輸榖賑之勅建旌義坊表其門謝佑桐城人字廷佐正綂間進士少孤貧事母至孝歴官山西右布政致仕歸臨卒母喪未終遺言衰絰為殮死不忘親也檀郁字子復桐城人家貧少孤母汪守節奉事至孝母卒無以為𦵏或贈石山不可穴泣禱於神有鄉人夢神云檀孝子有穴曰湧泉可丈許耳或解之曰人湧泉穴屬足其山麓有穴乎求之果得窆遂廬墓側無水苦逺汲忽石罅出泉色瑩味甘三年郁歸泉遂涸正綂時旌魯希曾號兩山懐寜人與弟希周菽水侍母必歌詩以侑之母疾三年衣不解帶學使欲旌之希曾泣辭曰此自生人恒事何忍以父母博名髙哉學使降階而揖愈敬禮焉阮以臨字象源懐寜人少有豪氣總督葉夢熊竒之征寜夏疏薦偕往以臨澘然流涕曰温太真以一代人豪特急功名絶裾而出千古薄之吾奉菽水他不問也力辭不起母殁每除夕必墓宿韓祥印字維熊再刲股療祖母及母疾石檜字耕榮宿松人讀書明大義成化丙戌歲饑與弟棠各輸粟五百石出賑事聞賜七品冠服吴本清懐寜人親疾籲天求代及殁哀毁骨立廬於墓側有湧泉産芝之異成化時旌曹規字循理望江人成化間以明經為邠州判重義樂施嘗捐資礱石作櫺星門及兩圩牐歲凶設粥以活流殍具棺以掩胔骼鄉里深徳之殷溥字直菴宿松人父早世母以哭夫喪明溥事之極孝成化癸夘領鄉薦亟營禄養就教嘉興遷國子監助教覃恩錫封勅中有母節子孝之褒母亡後遂不復出許本忠與劉澄俱懐寜人𢎞治年旌吴鯉字躍如懐寜人正徳庚午鄉薦知蔚州時總兵官劉定之以罣誤論死人多稱寃鯉未謀面即入見督撫備陳輿論之公力為解救得末減踰年歸里劉遺以金拒不受胡效才字用甫桐城人嘉靖乙丑進士少貧授徒以養父事繼母盡孝儲贄築室東郭授仲弟築室南郭授季弟皆體父母意也江隂令以故交餽金帛不受僅受布二端歸以奉母晚登第卒於京邸猶致書兩弟以不及終母養為憾國朝雍正五年特旌方鵬字其大懐寜人家貧繼母馬氏遇之恩薄鵬百計承順有女弟馬出也馬意欲鬻其居以嫁之母既卒鵬如其意治奩以遣父殁刻木像飲食必祭㑹他出夢父有怒色立馳歸有家僮簮其像號泣治之蓋誠孝所感登嘉靖間進士痛禄不逮親終身不敢自奉吕腆太湖人嘉靖時以孝旌吴堂字徳升桐城諸生父患脾痛堂手自抑搔數月不使人代至丙夜父命之退猶泣不忍離父病革屬堂曰汝母非汝不能盡菽水懽也將析産伯兄為政堂僅得瓦廬半間以奉母有圃在伯兄舍後偵兄意欲之遂作券因族長遺之不受值歲祲有歸粟數十斛者堂縮口節食以其羨給諸從兄弟及比鄰之乏者後以子一介貴贈副使龍涌字本一望江人家被火祖母方鼾睡奔入烈燄中扶祖母起負之出父病危刲股以療尋愈嘉靖時詔旌其門曰慈順方岱字明鎮望江人孝友端慤嘉靖中歲薦當選以母年九十七終養不仕詔授官以旌之方可字子時桐城人力學養志其伯仲皆異母父又獨愛可伯仲俱恚之可怡聲柔色不敢仰視父殁伯仲争其貲訟之官可曰兄弟無訟詞不訴鞫不辨有司察而直之嘗置義倉輸榖以濟貧者張祝桐城人年十歲刲股療母彭寳字惟善性孝友伯母𦵏鬻書助之居父喪哀思廢寢食竟以是卒陳所聞字辛華桐城諸生少孤奉孀母獨任勞苦得其歡心手一編督耕隴上就土性而權衡之所獲常倍次第為弟妹營婚嫁又各畀田一頃邑令陳贊化式其廬舉鄉飲賔周聘字廷聘桐城諸生父母繼亡家貧十年不能𦵏坐卧苫塊終日哀號如袒括時知縣李尚默捐俸命諸生往營𦵏聘曰為人子而以親喪煩長吏其何能安守塜凡十二年遂能知来言休咎頗騐或問不習占候術何由知曰静久不覺乃爾陳邦符潛山人襁褓失怙母萬氏年二十守節至邦符數歲誡之曰兒能勉讀父書庶不負母忍死意也符聞感泣就塾師出入必禀母命父遺産二十畝推讓於叔父教授生徒支月俸為母養母卒廬墓哀毁以恩選歴三縣學博遷潞府審理致仕汪昌應字爾麟潛山人邑有鬻妻償逋者為贖還濱河大水漂蕩男婦棲木杪適昌應舟載稻百石過忽聞哀號傾稻載之以歸方之綱字振宇桐城人少與弟之紀以篤學見稱萬厯丙子舉於鄉授雲南曲靖府推官之紀因兄入仕慨然曰兄出則弟當處課農桑以成兄為㢘吏耳之綱在任亦念弟不置投簮徑歸兄弟聚處終身時論髙之李之讓字太初太湖人父早逝母劉苦節敎誨後得禄而母死終身不衣帛甘食以母在時貧故也司敎桃源值歲旱士多饑死有司猶嚴督逋賦乃號泣請免不聽遂棄職歸張思誼桐城人八歲父卒事母極孝夏驅蟲冬炙爐必親為之值令節必坐母堂上衣冠拜堂下起獻酒拱立將撤拜如初五十年如一日弟思諶孱而愚思誼衣食之終身年未三十鰥居不更娶曰恐有室則於吾弟疎也周登字大舉桐城人撫亡弟孤子成立弟亡時有貲千金托登姪不知比長悉以與之周自字明徳桐城諸生弟覽侵賦有司督之急令覽售産於自以償自代輸八百金不受産惟取一雕鞍曰弟所以逋賦者太侈故爾欲碎之以示誡宗人或以請即與之居數年賦仍不杜又納二百金覽願以産償自終不忍覽感泣後竟稍克自振云張廷中桐城人兄弟五人既析箸弟業日落廷中滋殖曰吾不忍弟之壁立也集諸弟合㸑而居久之諸婦有後言廷中曰吾知厚弟耳安問其他悉以所殖之産五分之仍為輸税終身怡怡如也方初字子復桐城人成童即至孝父遘疾溽暑嚴寒不離卧側妻盛氏亦孝人謂初刑于之化焉黄敦字效仁桐城人有同祖二弟家落鬻産敦曰不可委祖澤於異姓厚直取之弟後日困乏敦曰吾何忍取弟産欲弟知艱苦自立耳今能治生矣遂以産還不取其直郜冠字徳纓桐城人以孝聞𦵏親桐梓山每過必泣拜而後行朱文林字士先桐城人六歲喪父家貧櫛髮為藝竭力奉母母病思魚市無魚文林禱水投竿即得復病篤刲乳下一臠以進母遂愈母卒廬墓豺虎往来不為害竟以哀毁卒胡琴太湖人母鄔氏早亡繼母徐氏嫉琴琴惟盡孝母疾禱以身代母愈聞之感動母嘗晝卧雖盛暑以衣冠揮蚊蠅不輟及母九十琴年七十矣定省益勤事聞旌其門曰七十而慕馬繼周太湖人父早世母陳氏撫孤成立及母卒傷其以苦志終廬墓三年哀號之聲聞者增痛萬厯間母子並旌夏孝子字以忠桐城人本名思八歲時刲股療父疾郡守為更今名父卒廬墓三年歸子女不識也子民懐萬厯中舉鄉薦内行純至歴任安陸宜黄二縣令有能聲程昇懐寜人節婦聶氏子兩次刲股愈母疾盛應魁與葉正奕俱懐寜人以刲股稱孝段正洪懐寜人母葉氏卒㑹鄰家火將延及正洪以身蔽棺號天甚哀忽雷雨大作火隨止葉日初字寅初望江人萬厯中舉鄉薦時方具慶介眉侍夀猶執少儀友愛諸弟館榖悉分給以資舉火人稱真孝亷方祉字子受桐城人兄禄患疫近者輒染癘有死者祉扶抱服勞不離左右禄謂之曰爾乃不畏疫耶曰智者不信幽而棄禮仁者不違道以求生卒無恙兄亦尋愈朱應麟字仁吾宿松人居陳漢山積倉萬石萬厯戊子虞劉二賊踞長溪兩臺調兵進剿將為清野計應麟奉檄一夕燬盡賊平詔縣給銀五百兩堅辭不受請充客兵之餉顧槐太湖人事父至孝凡父意所在無不委婉承順父死廬墓三年萬厯間建坊旌表殷效字子學桐城人繼母夏有二子美衣豐食就傅授書而裁效衣食使之耕效胼胝作苦甘淡泊無難色夕歸濯足更衣侍側色常愉父喜勞之曰惟爾克家食指漸繁爾其尸餐效益奮力乃致千金分給諸弟不以錙銖自私夏亦感悅遇效有加王鰲桐城人父卒廬墓日夕哀號思慕不已忽夢父曰兒何不肖我以像鰲曰兒不解畫奈何父誨之既覺舉筆而就酷似其父見者以為神授徐即署桐城人割股愈父盛唐桐城人年十二刲股療祖母唐父病母張亦刲股以救之得愈朱蓬桐城人兄弟六人淳樸孝友善視母氏宜於兄弟和氣淪浹合力構一堂以居三年又構一室與仲氏次第相及各安其居歲饑有鄰翁貧且病田盡蕪蓬使其弟服牛為之墾翁不知為誰也異之蓬曰吾力有餘翁力不足故代耕耳趙之葵桐城諸生性至孝少與方君簡友善以其子逢月受業崇禎丁丑賊至君簡守䕶母柩死於賊時逢月館白門之葵聞信往哭之發其笥得絹殯殮未終賊復至殺之逢月至今並祀於家吴忱周字尚文桐城人貢成均父命分産讓之伯季悉無所受嘗夜讀邸舍主婦暱就焉曰若夫吾友也爾不愧夫吾寜不愧友乎婦慚而退金韡由新安遷桐城母病值寇亂無從得醫韡刲股以進弗愈又穴其左腹得肝寸許母枕上便聞異香行道者見其屋角炊烟俱如瓔珞雲母啖少許立愈方夢暘字子旦桐城人嘗焚千金負券渡江適舟人失金相争夢暘謬曰適吾僮得如其數以償之已而舟人得金所在人稱為長者金騰髙字上達桐城人任俠好義邑大饑出所積榖二千石悉賑鄉里曰所貴夫好義者補天地之不足也豈乗歲祲而自為利乎詔旌其門曰義民李璽字廷玊桐城人籍順天其友汪冕赴廷試病於邸囊有百金付璽人無知者即卒璽為治棺殮主其喪召冕子至京迎喪因以父金還之方學尹字起莘桐城人𦵏父奉遺命與繼母同窆學尹不敢違掘穴有石號泣籲天鑿石以厝後徙墓皆成土矣人以為純孝之感錢元道桐城人有商主其家既去糞除見遺金約二百餘度商已逺乃置倉中壓以積榖次年商復至言别後失金元道曰此非途中失也發倉示之囊括宛然遂還之朱東字漢卿桐城貢生晨詣學見道旁遺金弗顧僕曰後人寜不攫之乎乃收之約二百餘金以聞於校官出示招之則糧役王姓所遺也王請分東笑曰天欲損爾豈令我見速挈去陳希學字子斆桐城人嘗赴試過香爐寺如厠見遺金百餘兩收之居不去僧曰文宗且至何乃逗留曰吾與友約姑待之三日失金者哭而至曰以吾父之嚴而失稅金也進不勝官刑退不勝父刑死矣希學出而還之張清雅字玊楚潛山人力學養親明季獻賊至父卧病侍湯藥不去既卒甫殮賊又至疑棺藏金銀欲剖視之清雅以兩手據棺賊斫手仆地幼子超藝從牀底躍出求代俱死焉而棺得不剖其僕雲滿殯其父子亦不食死陳廷選潛山人流賊至母老病不能行竊負避草間為賊所獲叩頭流血求殺己捨母賊殺之氣絶猶抱母不釋手母幸得全其妻收廷選尸殯如禮囑其子文露曰姑老矣汝善事之撫棺大慟墜岩而死文露援之不及胡朝烈潛山人割股療母腕痕無血袁學知字非生潛山人母陳氏病刲股食之立愈金道㑹字仲貞潛山人父客死金陵每一追思血淚迸出明季流賊盤踞道㑹避虎頭寨時荒疫流行道㑹運米得三十石同寨中索貸踵至同室者言吾食指浩繁米將盡奈何道㑹流涕曰誠然然不忍人饑而我飽也米盡饑兩日長子承蜩夜冒鋒刃審視賊營間道得脫道㑹歸遇死傷露骨買棺𦵏五十餘塜吕之徵字愈疏太湖人父殁廬墓三年馬之龍太湖人篤友誼好施予兄人龍官楚藩明季寇亂楚人有為賊掠流於湖者之龍曰此阿兄子民也具貲糧遣之壬午城陷之龍子亦被執至楚彼地亦為優禮送還以報之汪文煒字純符宿松人母早世隨父避地江左父亡事伯兄如父奉繼母以孝母始苦之後亦為所感萬厯癸夘舉於鄉歴知靈丘令致政歸産薄不及中人令其子與兄子均之毫無私厚嫁孤姪女一如己女晚歲貧窘處之淡如石汝修字止所宿松人父殁廬墓三年田荆字義軒宿松人官省祭幼而喪母繼母駱氏撫養之及長事母孝母喪明每食必親奉母病親嘗湯藥不解衣數月母喪號慟幾絶二弟蕙蘭幼荆撫育之田舍分給無私財焉方友信宿松人母病刲股友信子際明際奎孫孔成孔祐俱刲股和粥救親時稱方氏五孝張洪猷字伯卿宿松人喪父廬墓三年母疾刲股療之朱守益宿松人母疾刲股劉之瑄字朗生宿松諸生流賊至適父病風家人呼出避拒曰父卧牀惟有死守耳賊斫其父瑄以身蔽之連受數刃而死父得免袁師臯字理衡宿松諸生母老齒脫不能食師臯年已六十必口哺之賊至執其母殺之師臯奮與賊鬬亦死焉事聞旌表萬民望字兩虚宿松諸生母年八十流賊至負而逃遇賊泣告願以身代賊殺之而貰其母兩臺旌其死孝楊士竒字伯英宿松人辛巳城陷父介八旬被賊執士竒匍匐出救賊已舉刃抱父同死張瓚宿松人乙酉城潰父庠生映光為兵所執瓚紿以多金求全父許身為質父得逸去遂遇害葉應龍宿松人母疾刲股蔣珉望江人父病刲股王維翰字思重望江人父疾究心岐黄家言調藥進多竒中後以明經訓廬江移辰州敎授以母老不赴鰥居數十年起卧不離母側母年九十五卒維翰哭母遂終李徳賓望江人母病吮癰寢食不離母側二十年章繼魯字思樸親病籲神求醫必長跪涕泣親殁除喪祭祀必哭王準字明衡望江人父忱生準兄弟獨準食餼即自任甘㫖忱易簀遺數十金獨與準準泣拜請公分昆弟弟惟乏嗣準憐之同起居飲食二十年惟先死有私囊百金舉以報徳亦公分諸猶子阮之釬字韜甫懐寜人乙酉城潰母老病不能行兵至釬為母請命不許請以身代不許遂挺身障母格鬬而死子湛九齡得脫於難順治初補諸生痛父死孝之烈哭求直指以事聞詔建坊旌表方都韓字大方懐寜人居母喪盡禮後父遇兵以身代父死父得免吴汝鼎懐寜人早孤傷痛嘔血兄病拮据致參藥以餌之嘗忍饑啜粥不顧也蒋奕芝字鍾韓懐寜人乙酉城潰兵刃其母以身覆之遂死母背上兵為色動母幸得全黄淡字元味懐寜人城潰母被刃淡與兄中通中徳俱以孝死陳道賓潛山人割産撫孤姪又設義塜𦵏露骨劉應甲懐寜人叔父母無嗣病篤遂不應秋試侍湯藥營𦵏如子鄉里稱之宣瑬字眀瞻懐寜人無子妻為置妾見女有戚容詢之知係名家子召其父母還焉張自孔字石門宿松人廪生性孝資敏年十二隨父避賊見執賊問此處有馬否父未及答自孔紿曰吾家有駒藏在山洞願釋父去取賊從之私與父曰父得生還兒死無恨矣賊久待不至遂引去數月亦脫歸張應宸字若葵桐城人性至孝親喪哀毁友愛尤篤捐費修城率其兄弟悉力守禦卒無恙歲饑賑粥全活千人舉明經不仕卒聞者皆為流涕張久中懐寜諸生授徒自給性孝友好義族黨有逋課者每捐館榖代償盜入室久中覺之謂曰汝良家子也何至此以所存脩金為贈誡令自新卒感化復成家業終不言其姓名座右書隨處體認天理凡事求近人情二語以自警省後以子清議貴追贈朝議大夫崇祀鄉賢國朝張秉彛字孩之桐城人也生而頴慧為文一本經術以廪例入南雍授别駕念兄秉文官四方而父母春秋髙不忍離左右遂謝去里居侍養極意承懽秉文為布政殉難山東泣走數千里扶三櫬攜藐孤以歸弟秉貞以大司馬卒京邸諭賜祭𦵏悉贊襄成禮弟秉哲孝㢘早亡親視含殮身遇大喪哀禮兼盡廬墓塜樹交花人謂孝感有祖置義田經營墾闢助婚勸學贈給有差修譜牒以收族設糜粥以賑饑生平隠徳未嘗告人而恭儉謙約始終一節晚益邃性命之學以子英貴特諭賜祭贈文華殿大學士孟命世字淑子懐寜人順治初征南譚將軍辟參軍務以功授知九江府焚刁民誣逆狀保全數千家移守端州申免浮糧數萬石初左良玊兵破安慶父振邦罵賊死兩弟俱被掠命世徒步數百里﨑嶇萬狀冒險贖歸卒皆成立田徳産太湖諸生母被亂兵執徳産與妻出救求代得並釋城陷復負母得脫母殁守墓三年督學李嵩陽疏請建坊旌表劉日曜字弢伯桐城人隠居敎授母殁年七十猶孺子泣廬墓三年任塾字克家懐寜人幼為名諸生乙酉城潰兵執其父將見殺塾請以身代兵異之父得脱順治丁酉舉於鄉康熈丁未進士歴任儀部郎督學山左㢘聲最著陳彛字以常潛山諸生事繼母以孝著同學有忤當事者禍且不測彛挺身直之卒賴以平年三十卒妻宣氏謹事孀姑稱一門雙孝葉士怡字怡如潛山人明季寇亂奉母避山堡賊獲母脅贖士怡鬻産贖囘又遇賊母倉卒墜岩傷足負行百里餘未幾卒哀毁盡禮汪世奕字貽逺潛山人幼至性過人八歲喪父哀毁骨立若成人事繼母婉容愉色委曲承歡張杰字如三桐城人性孝友世父秉文以山東布政殉城死杰總其家政成立其孤諸子徳之割腴田以酬固却不受司鐸吴門會郡饑當道委賑太倉崑山諸境部署周詳民沾實恵巡撫湯斌欲薦之拂衣而退舉鄉飲賓章于國太湖人性至孝母溺水死于國哀毁絶粒倚廬哭泣逾於常制姚士堅字廷若桐城歲貢篤行好義邑西挂車河當孔道多暴漲行者時溺死士堅募造石梁自捐七百金歲饑賑粥活數千人他所施濟門無虚日以故家業中落猶典鬻為之不懈卒之日人皆流涕張瑱字公瑋桐城諸生持身嚴毅厚宗族置義田焚負券鄉里徳之左之琮字宗玊桐城人性至孝讀書山中母偶疾之琮忽心動急歸人咸異之樂善好施多所全活老而嗜學著作尤夥金蓁字尚美潛山人祖業素封俱捐以賑饑嘗典衣飾易米三十斛鄰里告急輒㪚之僅存三斛晏如也周天鳳字羽長桐城諸生少失怙事母以孝稱從兄死兩子俱幼捐己屋産以與之族子藻無依收育如己子經紀其衣食婚娶俾至成立子四人俱孝謹有文行徵出尤積善好義不媿父風孫大璋中雍正二年進士姚士塈字注若桐城人由明經歴官刑部郎中論決多平反謝病歸居鄉婣睦設粥賑饑遇貧乏者力為周恤甲寅征滇黔兵絡繹經桐吏欲徵費里民塈念民力不堪鬻産給芻糧合邑賴以安堵周斌字允二桐城人性純孝居父喪盡哀節母章失明斌朝夕調䕶七年復明人為孝感撫育亡姊遺孤四人俾成立授産與己子均皆世俗所難方中發字有懐桐城諸生篤學力行嘗捐宇建先人理學祠刋兩世遺書百卷讓産推財鄉黨皆稱孝友舉鄉飲賓著白鹿山房詩集行世方来賓桐城人刲股療父楊昭雍字南有懐寜諸生性篤孝父病刲股療之樂為義舉有鬻妻以償逋者為斂財以保全之生平力學以程朱為宗著猛省格言克復圗説張永錫字来逺桐城人性孝既鰥不再娶同父寢處父病需蘆根徒步往返百餘里採而進之父殁隠居不出户毎剃髮則曰身體髪膚受之父母命子純謹藏之卒後柩為蛟水所漂失純取所藏髮瘞于母墓謂之髮冢丁藻字以偉潛山人食貧力學敦篤孝義年十八路拾楊某遺金忍饑坐雪俟楊至還之楊分金以酬拂然而去歲祲欲賑無力徧募粟以濟之劉士義潛山人有孝行雍正九年旌表姚孔釴字升初康熙己卯舉人以母老不上公車朝夕孝養不離左右仲弟牧滄州積逋數千破産代償好讀書尤潛心易理雍正十一年旌表張恭桐城人天性誠篤出嗣季父曲盡孝道父殁水漿不入口者三日族有貧不能婚𦵏者割己田為義田以歲入租贍之嘗過金斗見販牛客以賊攫金投水救甦恭傾囊償之客賴以歸雍正十一年旌表姚士黌字東膠峽江令文焱長子性至孝母方疾篤刲股和藥以進血迸流衣袖不知其痛楚也庚午舉於鄉父殁京邸徒步扶櫬歸里哀動行路里中孤幼無依與失學者撫養敎誨賴以成立者甚多嘗客吴中有鬻婦以完宿逋者出囊金代還買山數處掩瘞枯骨無算其急難好義類如此雍正十三年旌表都先覺字依衡桐城諸生潛心理學實踐躬行父母有疾衣不解帶對人言必泣下家貧授經於外父母所欲必力致之色偶不懌長跪終日俟其顔霽而後起里中共推為純孝云江萬里字逺公桐城諸生性孝友析産以腴者奉三兄自受其瘠者後三兄家落仍以己産與兄子共之歲饑捐米數百石賑濟里稱篤行君子張若霖字巖舉大學士英冢孫少詹事廷瓚長子年十一母卒哀毁骨立如成人事父曲盡色養尤善承繼母歡母亦忘為前母子也與弟霈相友愛霈歴仕浙東粤西霖每寄書必戒以官箴朂以祖訓生平寡言笑性恬淡家世貴顯霖處之如寒素杜門却掃不輕交接然邑有公事不憚指陳利弊遇水旱力為募賑所全活甚衆殁後鄉人思之多流涕者王曰貞字徳水桐城人孝事繼母弟被盜挺身出救盜感而去屢償姪逋明末歲祲設粥厰於家存活甚衆嘗逰姑蘇值閭門大火罄舟米二千餘石給之蘇人為之勒碑毎歲施棺藥無算順治丁亥出粟賑饑至於鬻産迄今稱之徽州府唐黄芮歙人刲股為羹以愈繼母病父卒廬墓終身墓側産芝及連理木貞元十九年旌表吴九郎休寜人黄巢寇至舉義兵保鄉井與賊戰不利衆潰馬上自刎奔逐半里許身方墜地馬亦死鄉人即其處立祠祀之名其地曰倒馬墩宋王六歙人母凌目瞽草屋半問風雨不蔽去依親金氏久而厭之時六甫九歲掖母歸故址刈薪易米以養事聞旌表祝確字永叔歙人親喪廬墓兄弟先後死熙河確往返萬里以歸其喪吏部朱松為諸生時確歸以女生熹郡城遭方臘之亂朝議徙治溪北潦漲為患確倡衆訴於朝復如其舊程四歙人幼孤鞠於姑家姑病革四省問退曰吾幼失怙恃姑猶母也誓當報徳乃焚香取髓粥而進之姑之疾遂愈夏俅休寜人早孤孝養其母母卒廬墓墓生瑞竹又生芍藥並蒂者二鄉人號其室曰雙應曹矩字晦之休寜人景祐進士官屯田郎中貤贈父汝弼燎黄之夕芝産塋上事聞詔賜所居為孝芝里從父文死方臘之難世稱忠孝陳克己與鮑乙俱休寜人陳割肝鮑鑿腦以愈母病汪廷美婺源人百口聚居食必同席親喪盡哀祥符中減賦美亦減其佃租有鬻香者去後發其裹得金追還之里人竊其鵞問之曰將以祭先美更助以魚酒有從質麥種者過期言種敗無收美還其質更遺以麥時號為汪長者王徳聰婺源人少孤孝友信義為里所稱一家幾千指同居七十餘年矣天聖初奏旌張珏字公予婺源人弟滋坐罣誤當死珏曰吾力單㣲養母不如弟自拘於吏遇恩徙邉以是見知後以軍功得官朱子稱其天資孝友有古篤行君子所難能者詹惠明婺源人父坐法當死惠明詣縣求代不許獄上惠明復詣郡請嚙指出血詞甚哀不見省方盛夏伏府門外以艾自灼其頂明日至庭下復割右耳擲㕔事上血淋漓守大驚竟為奏報詔減其父死而釋惠明許規祁門人常客宣歙間旁舍某郡人病且死出囊中金以骸骨屬之及死規舁棺從千里外畀其家人并還其金汪槱婺源人父復通判揚州徳祐末兵至復正坐不去兵欲執之槱以刀拒斃一兵左右負復走衆遂殺槱丞相馬廷鸞以書唁曰能執干戈以衛父母世不乏童區寄矣槱年十四云元鄭安字子寜歙人宋亡明年李世達叛富珠哩敬將屠城安叩軍門曰亂僅世逹一人耳民何罪而欲屠之敬乃止既没鄉人祠之鮑元鳳歙人元季寇亂鳳與妻子訣曰吾有母不能爾恤遂躬負母深避巖穴亂定歸薄暮恍若神導與妻子遇俱獲全黄一清字清夫休寜人母病革一清籲天願減已算以益母夀夜夢人曰明日老嫗来當得藥旦果有嫗授以啖蜜法乞蜜隣鄉夜還遇虎號泣曰我死不足惜如母蜜何虎熟視而去戴焴字晉翁婺源人父卒與二弟煟炯廬墓三年朝夕奉盥上食如生客至兄坐弟立老而不懈朱震雷休寜人累世同居明葉仁休寜人父宗茂饒州知府坐事罰輸築城仁上書請贖罪太祖嘉其誠宥之汪葵黟人生元末每晨多造飯攜斧入山至暮乃歸妻怪而問之笑而不答又嘗煮芋菽搗粉築牆人莫之覺及土寇為亂葵隠入山柴舍宛然村落中有積糧葵部分居之時以芋牆充食存活甚衆洪宏祖字深逺歙人為郡守陳彦回所重靖難兵起宏祖白守勤王成祖即位收彦回宏亦投水死汪存字廷堅歙人隨父商歸宿邑之汝灘天未明父捨舟先歸人言前路有虎存冒雨追四十里始及父果遇虎山陬存泣告天曰願虎傷已勿傷吾父虎竞去畢文璟洪祖鮑文行與李士㫤四人俱歙人刲股以愈母疾畢陽幼以孝聞父卒泣血喪明母疾露禱求以身代割股和藥進之疾愈何澄字應清歙人割股愈母疾出繼族父後有争繼者澄推讓田産無所取惟歲時祀事不怠吴鼐歙人與兄鼎弟珊客黄州衆夜鬬殺人誣鼎吏捕之急鼎不知所出鼐曰兄年髙未有子弱弟老母所憐皆不可死獨鼐子已長願代兄以塞禍遂詣吏就繫鼎寃之求直不已鼐謂曰空自苦必無生望不若保餘貲善事老母撫弟姪立門户母以弟為念也其夜具衣冠自經死州人傷之白府禮殯焉黄鑑字徳昭歙人父久商不歸鑑兒時問父安在輒號泣不食家貧拾薪養母年十四告母行訪其父至黄州境得之許象先字汝賢歙庠生父殁於淮奔喪盡禮繼喪母越十五日以毁卒王靖字寜之祁門人嘗慕張公藝行誼百口同㸑尺布不私成化丁酉鄉薦授交河知縣人稱其節操方尚用歙人父患痢疾刲股煎湯以進隨愈後尚用病將絶以不能終養為恨迨母病夢尚用跪告曰惟荸薺可治如言果痊宗鄰咸詫其生死盡孝程邦仁歙人弟邦儀死於仇誓死以報體肥不耐步履每日負襆被身挂二尺竹筒盛水漿於中庭疾趨百囘約三十里乃止日以為常人疑其顛久之遂健行聞沈東山為郡司理乃徒步走燕邸訴弟寃沈哀之抵徽遂閲故牘出邦儀屍驗之邦仁撫之慟竟絶是日觀者千人哀聲動山谷沈雪其寃卒論抵許立徳字伯上榖長子母汪氏病噎不下食立徳亦不食母没哀毁死三日復甦彷彿見母送之歸母𦵏廬墓側日夜悲號父佯稱病召之返侍父時念母慟哭父亦慟後恐傷父心每欲哭輒掩面走他所盡哀乃還例當受廕屢讓其諸弟胡之憲歙人母病篤憲年十歲其姊玊娥年十三相向痛哭憲謂姊曰聞危病惟割股可救遂同拈香告天剜肉和粥以進母遂愈事聞旌表雙孝之門程周字希旦歙庠生父病周割股和糜以進明年族人利其産誣周殺父幽狴犴者三年遇朝審周至庭下忽風雨大作及開釋天日清朗周父死三年貌如生邑令乃以鼓樂導送歸家吴榮讓字子隠歙人父殁於楚榮讓十四歲即往尋舟覆鄱陽湖縁木獲免得父骨於襄陽槀𦵏誌之越十年再往舁歸後遞𦵏髙曾以下及親戚之無主者九十九喪建宗祠置義田義塾天啟間旌表江應全歙人父没兩月而生遇父忌輒悲號事孀母色養盡歡母疾與妻割股以進居喪哀毁負土成墳廬於墓側事聞旌奬吴公逸歙人少失父母伯兄病劇仲兄困於訟咸竭力救之年終計族人老幼授衣粟歲凶力行賑恤後病篤屬子允復輸萬金佐公家之急奉㫖旌義贈官汪徽夀歙人好施予濟貧窮建橋梁焚券約義聞鄉曲吴修休寜人事母孝火起鄰家修抱母號泣籲天獨免延燒母卒廬墓羣烏来巢程琦字廷珪休寜庠生父病疽琦躬吮之父嗜薯琦終身不忍食嘗授徒逺鄉趨母病夜行峻嶺顛蹶中若兩燈前導及入境始知其為虎也人共竒之詹侃字時選休寜人選閔縣尉迎養母母病咳夜需湯侃寢榻下聞咳即起嘗割股沸湯以進母卒哀毁股創迸裂而没金彦文幼孤舅奪母志撫育於祖祖老採薪以養母復寡迎歸病祈代没廬墓一夜虎過不害人驚異之汪讓年八十一夢神告賊發其塜奔視賊覺而逸因廬墓側病革始輿歸嘗夜行有猛獸當户探之甚温詰朝跡其處已嚙犬去矣里中五谷神為厲讓檄而滅之汪循為讓作鐵漢傳吴應麟字伯端休寜人幼孤依祖祖没哀毁骨立毎念父不逮養終身屏絲竹弟已析産後喪其貲又分已貲以與之黄侃休寜人生平卓犖嘗條陳淮南北鹽筴利弊使者稱善居家收族建祠置義社義塜義田他如黌宫白岳倉庾道路諸役侃悉與焉入粟佐國詔樹坊褒義洪什字承章歙人母黄氏二十而寡什事母盡孝服賈家日起力為善事賑乏困救災患不計恩怨一以厚道施之汪道昆傳其行汪徳夀休寜人居親喪淚盡繼血廬墓三年足不踰户汪尚質字賓塘休寜人少孤事兄撫姪盡恩誼四世同㸑無問言吴繼良字君遂休寜人母亡事遺像如生兄弟相禮讓構義屋置義田以居食貧者輸郡邑學田又輸還古書院膏火𦵏戚屬贖人子女乳活遺嬰表揚貞烈施粥救饑所行善事甚多金九苞休寜人割股廬墓方瓘歙人厭科舉業絶意仕進從廣東湛若水學歸時同行友死舟中例不載屍瓘祕不告人與同寢累日至昭州始發之吴仲成休寜人成化間以孝旌許欽績溪人𢎞治時以孝旌李仕昌婺源人兄仕選為仇家誣構殺人逃匿逮仕昌擬抵罪弟仕昭訴曰縱兄逃者我也願以身代仕昌曰兄逃我長我當其罪二人争求坐竟為疑案後令至明其誣釋而旌之祝孟謙字志讓婺源人嘗輸粟千石賑饑先是兄孟資亦輸粟六百石以賑有司上其事建坊旌表余鎬字宗京婺源人父廷璨寃繫縣獄獄大疫鎬自縛詣郡求代父死許之父得出後鎬亦免曹永䕶字義干婺源人性寛廣犯而不校遇荒歲月杪必密察隣家之急隂餽之不以語人汪汝和字守介婺源人故人逋皇木帑八百緡繫獄和竭資代納不責償有鬻妻以納糧者不忍離其子哭之哀和代輸而止其鬻前後焚券累數千金郡守榜其名於旌善亭汪思智婺源人隨父解軍南京歸舟父卒智恐舟人棄其屍以身掩䕶日兼人食又時作呻吟聲七晝夜抵饒州城始發喪曹玒婺源人義烏方時成幼喪母出亡資盡將赴水死玒活之助錢令習業期年父尋得之泣拜去族人有宿負玒一日醉遇諸塗疑玒將責逋捽玒泥中逸去玒不與校明年大饑復贈之米還其舊券曹孜學婺源人三歲喪父甫九齡兄弟欲析箸孜學泣曰奈何忍分手足耶伯仲感之復同居十餘載後伯仲縁事繫京師孜學傾産往救坐是貧落無怨言謝用祁門人其母馬氏妾也生用五月嫡乗夫客外嫁之東都而委鄰家鞠用用長知故扼腕飲泣托㳺學徧訪數年東都人且死馬氏流落攜幼子自江右来相遇於逆旅哀感行路迎歸奉養事嫡母尤謹有司奏旌其門馬祿祁門人客旅舍友人以四百金寄祿同舍者盜金亡去祿祕不言罄已資償之已而盜敗友人始知具酒謝之還其銀祿竟不受捐為修學之費汪宗淮祁門人父客亳州娶妾宋氏生宗淮三歲父亡隨嫡扶櫬歸母宋氏改適陕西比長念母出潼闗抵鳳翔徧覓一日風雨偶憩道旁見一老嫗荷鋤而来問答相符即母也抱持痛哭奉以歸洪應培陳邦賢謝廷薦皆祁門人割股療親疾謝世麟祁門人父久客無音耗世麟千里尋歸父母相繼病篤割股救療嘗捐資修明倫堂建聚奎堂余枝華黟人父九旬華亦七十侍疾卧榻逾年罔懈庭間忽湧泉以供汲人詫孝感汪文保黟人嘗拾遺金二百金於路止客舍訪得祁人謝氏悉付還分金酬之不受事聞太守召使受叩頭辭守謂謝曰報徳途寛汝何以金强人謝俛首曰小民有兩女願結姻守曰善問文保子幾人曰子八人有孫乎曰三十三守起立舉手加額曰有是徳宜有是福取果酒鼓樂送歸葛泰績溪人母病篤思食生梅時已八月泰但遇梅樹輒泣竟得生梅二顆食母病遂愈程伯祈績溪人事親孝謹父卒廬墓插竹編籬有枯竹生笋之異朱廣績溪人割股廬墓方正績溪人母孀居正兄弟孝養卒建蓼莪館於墓左朝夕哭奠狀聞荷節孝之旌胡仲俊績溪人刲股療親修橋賑饑卒年九十有四汪文言休寜人少孤貧補縣吏智巧任術負侠氣入長安為監生㳺公卿間葉向髙用為中書舍人受知於楊漣左光斗諸君子魏忠賢嗾科臣傅櫆疏劾光斗詞引文言逮下獄鍜鍊兩月弗承廷杖之百革為民其甥悲失聲文言叱曰孺子真不才死豈負我哉後忠賢將殺楊左復借口於文言復逮下獄嚴鞫者四欲誣楊左諸人以贜文言蹶起曰天乎寃哉以吾口衊君子有死不承卒斃於獄江天一字文石歙諸生深沈多智為同郡金聲所知佐聲用軍法訓練鄉人子弟後被執聲曰子有老母不可死對曰天一同公起兵可不同公殉義乎遂偕死楊泗祥字瑞呈休寜人父卒未𦵏土宼猝至家人逺避獨守柩不去寇戒勿犯復還古書院田創紫陽六邑文㑹好義不倦國朝張正茂字如松歙縣人父篤老病卧十餘載正茂躬滌矢溲親調饘餌曾無倦色嘗買婢詢知其父無他息即還之不責值善詩古文有集項繼成歙縣人年十四刲股療繼母疾宗族欲為請旌繼成泣謝曰此非為名且不欲令吾母知之也金應忠休寜人偕弟出㳺遇寇弟曰兄能事母寜殺我兄曰弟未有子寜殺我賊義而釋之程大任字元勝休寜人任俠好義有張姓貧鬻其妻濟以金得不鬻有豪擠其讐於獄為力雪之唐祁歙縣人少即出㳺治生以養親親沒遂不出父嘗貸某金後某偽以失券告祁曰券雖無事則有也償之既而他人復以前券来曰事雖偽券則真也又償之人傳為笑曰吾感其初能急吾親耳疾革語其子曰力能濟人自親族始毋見徳毋市名汪思孝婺源人甃石梁以防溺置義田以贍族設義塾以訓貧子弟逺近稱之程六徳字侯倩休寜人幼穎異聞塾師説孟宗王裒諸故事輒流涕長力於學母卒水漿不入口旬日以毁卒唐道林績溪人國初土寇竊發拘兄道俊索金贖命道林入賊窩代死道俊子𦵏以父禮服喪三年胡名儒休寜人尚義任侠其世父流離湘漢間名儒訪歸奉養親友婚喪有不給者拮据助之程世鐸歙人父賈於滇遭吴逆變絶音耗鐸告廟尋訪五年遇父於烏䝉奉歸盡養雍正三年旌表汪龍字時六歙人祖客死於蘇父往迎柩復溺於采石時龍方六歲及冠出覓祖父棺晝夜號泣感神告得之雍正三年旌表楊嗣勃字鶴臯休寜人事親孝老彌篤從兄為山賊所掠嗣勃㣲服造其壘獻資求釋雍正五年旌表孫鳳翮力耕負販供祖父母及母甘㫖母以哭夫目盲翮清晨長跪舌䑛逾年復明雍正七年旌表趙字公泳八歲侍父疾人稱孝童母病禱北辰有燭光交焰之異兄弟同居無私財雍正八年旌表金慶治休寜人母喪哀毁尋亦病殁有建宗祠養孀姑撫諸甥䘏母族諸義舉雍正八年旌表朱元儼休寜人十歲父病籲天求代母患疽儼以舌䑛得痊親没廬墓歸未一月而卒雍正十三年旌表汪鼎和字公調休寜人父嬰疾禱天求代歲饑捐賑戴為轂字季環休寜人少孤貧先墓在和村卑濕地欲改𦵏力不逮乃痛自刻責不飲酒茹葷隆冬却絮曰先人魂魄不安吾敢戀輕煖乎後客吴興卜吉羅山歸啓墓則水溢棺腐號慟欲絶易槨赴𦵏遂廬墓側金肇基字印初休寜人幼有至性三歲母為捉蝨白母曰兒喫母乳無異蝨喫兒血遂自斷乳親沒廬墓三年山故多虎不懼虎亦遁跡程浚字葛人歙人歲貢生事嗣父母及本生父母俱盡孝合𦵏四棺於一塋嘗陳亭户疾苦客吉安值茶陵兵變代守土官區畫拒守計城以得全王朝玬婺源人歲貢任繁昌敎諭居家孝友置田贍族發囷賑饑著培桂堂集汪光翰字文卿婺源人明季客川南道胡恒幕恒闔門死獻賊惟媳朱氏與幼子得脱光翰間闗保䕶歲大祲斗米十金光翰或服賈或課䝉稍獲贏餘給其母子經二十餘年不倦蜀平道通送還景陵時稱義士汪晉字庶蕃歙人寄籍江寜諸生嘗構宗祠置義田以成先志篤於友愛白首無間言自給甚約而周急拯危不少前却江南通志卷一百六十欽定四庫全書
