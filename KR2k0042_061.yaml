body:
  text: 江南通志卷六十二河渠志水利江寧府秦淮河在府治南發源黃堰壩抵句容溧水來繞府城經流甚長城內外交資其利婁湖在府東南吳張昭所鑿以溉田江寧浦在府南溉田百二十頃班瀆在府北義溝瀆在上元縣治東二十里下流入秦淮溉田百餘頃絳巖湖在句容縣西南原出絳巖山縣南境諸山溪之水悉流入焉下通秦淮上元之田賴以灌溉吳赤烏中築赤山塘後廢唐大厯中修復之周一百二十里立二斗門以節旱潦溉田萬頃又有百堽堰在縣西南三十五里與斗門同置湖水由此入秦淮南唐修築不廢宋時湖禁尤嚴湖心有盤石以為湖水疏閉之節慶厯中又立石柱刻水則於其上石臼湖在溧水縣西南四十里高淳縣西二十里西連丹陽湖出蕪湖入江沙湖在溧水縣南周五十餘畝為堰以溉田固城湖在高淳縣西南五里北通石臼丹陽二湖與當塗宣城界舊由宜興入太湖後築五壩遂與太湖隔藕絲堰在髙淳縣北三十里自尋真觀北至石臼社鳯凰橋折入橫溝與溧水分界溝匯戴家城江夏橋諸水並出堰口內有墟垾十餘座共計田萬餘畝洪漕壩在高淳縣西三里自襟湖門外西新橋及正義橋過永豐倉橋至壩北隨花奔岡出薛城大葑橋珍珠泉在江浦縣東北溉田甚廣湯泉在江浦縣西北水流數里灌溉甚廣琥珀泉在江浦縣東北溉田甚廣湯溝泉在江浦縣東北溉田數十頃墨泉在江浦縣滄波門外界六合其色黑又名黑水泉可溉田韋游溝在江浦縣西南烏江鎮引江水灌田五百頃東龍塘在江浦縣南四十里西龍塘比東塘差小並藉以溉田孤塘在江浦縣西三十里溉田甚廣蘇松常三府水利已詳見太湖鎮江府凡丹徒丹陽金壇溧陽之水利不與太湖通者丁鼻塘在丹徒縣西十八里北入大江明時為民隱占萬歷中縣令龎時雍濬之以備旱潦民稱其便今復半為田矣甘露港在丹徒縣北固山下通大江宋轉般倉在此史彌堅嘗濬之今淤又有新港在京口甘露二港間明𢎞治中濬簡瀆在丹陽縣南五里一名香草河南接延陵鎮諸水東北逹漕河珥瀆河在丹陽縣南七里自漕渠經珥村鎮逹於金壇俗稱七里河丁義瀆在丹陽縣南三十里自白鶴溪分流溉田大溪在金壇縣西二里一名清蒲河通崑崙河東南流入長蕩湖又高湖在縣西北十里周百餘頃北受五十瀆之水南流入大溪又直溪在縣西三十五里受茅山丁角諸水東南通大溪思湖在金壇縣南六里一名白龍蕩舊寬衍蓄水近居民築堤擅菱藕之利稍失其用矣梁城湖在溧陽縣西六十里俗名三塔淹周四十里荆山塘在溧陽縣西南四十五里一名官塘有司濬之而民利焉百丈溝在溧陽縣南五里一名百步溝源出燕山東流入白雲溪設壩儲水以資灌溉淮安府澗河在府城外運河東岸興文閘下分泄運河暴漲灌溉山陽鹽城二縣石䃮口閘在鹽城縣東串場河北岸蓄泄串場河水以受上游諸水草堰口閘蓄泄鹽城縣東塘等河下注之水歸廟灣等場下海廖家港閘泄鹽城縣東西塘河下注之水歸新興等場下海老鸛河在府西七十里或謂之灌口隋大業中築汴堤自大梁至灌口即此永濟河在府南明萬厯中開以通漕今惟灌田故城河在府東南五十里本名壽河東入射陽湖西南連黃浦射陽湖在府東南溉山陽鹽城寶應三邑田甚廣洪澤屯在府東又有洪澤閘以節水廣惠䃮在府東三里舊名波湫運河水漲則自此决泄入海以殺水勢以上互見運河揚州府雷塘在府西北有二上雷塘長廣六里下雷塘長廣七里句城塘在府西南與儀徵縣接界長廣十八里有竒唐李襲譽引雷塘水築此塘溉田八百餘頃後廢為田陳公塘在府西與儀徵縣接界周回九十餘里灌田千餘頃亦名愛敬陂陂水散而為三十六㲼為利甚溥小新塘在府西北十里長廣二里餘西南接上雷塘者陳公塘上下二雷塘句城塘小新塘舊為揚州五塘厯代用以灌溉白塔河在府東北其水冬涸春泛民得灌溉之利新城湖在府西北民田資以灌溉閘河在高郵州治北宋郡守毛澤民於此置斗門蓄泄隄之南北皆為良田串場河在淮揚二府泰興鹽三州縣境乃淮鹽引運通渠西受高寶諸水下歸於此灌溉甚廣自我世宗憲皇帝特命督撫河臣勘驗故道大加開濬鹽艘農田均享萬世之利界河界淮揚二府鹽城興化二縣境在青龍閘之西納高寶下注之水以濟旱潦大石湖在江都縣東四十五里漢太守張綱引此湖水溉東陵村農田民呼為張公渠邵伯埭在城北二十里晉謝安築堰以灌民田民比之邵公故名烏塔溝在江都儀徴運河北岸乃句城塘之門户自儀徵縣烏塔溝起至江都縣句城塘口槐家河在江都運河西岸小新塘上雷塘下雷塘之門户張綱溝在府東漢太守張綱開此溝引大石湖水灌田以此得名何家港儀徵運河以南何家港為最大釃為渠者數十溉田千餘頃東接瓜洲富人塘在高郵州境又有固本塘共溉田可萬頃芒稻河泄湖水入江乃高郵之尾閭也車路河在興化縣丁溪場之西承興化西注之水流入串場河以灌田南白駒閘北白駒閘二閘在興化海口俱通牛灣河以節啓閉平望湖在興化縣北平衍周方二十里南通新溝湖受邑中之水逹鹽城界由射陽湖入海所溉田無算得勝湖即率頭湖在興化縣東通梓新車路兩河車路乃逹丁溪場河道自湖入車路河迤東漸髙梓新則注東南諸場河民田利賴牛灣河即鬬龍港丁溪草堰小海諸流皆會於此河名牛灣者多為曲折以防潮患溉田畝也白水蕩寶應縣西八十五里濶三十里周二百五十里北接山陽縣西南接泗州盱眙縣界亦曰白水陂三國鄧艾所作與盱眙縣破釡塘相連門八水門立屯溉田萬二千頃陰隲河在寶應縣汜光湖西先是邑西南由衡陽至雲山相去百餘里經泛光湖之險無支河可避風濤又西北自髙家堰至閘頭橋相去十餘里田皆髙阜莫供灌溉萬厯中邑令耿隨龍開此河既引湖水通舟而溝洫之利尤溥民德之因名苑家山塘在儀徵縣境與北山相對舊有石壩瀦水可溉田五百頃丁溪下海閘在泰州串場河宣泄要津也逺自運河各閘下注之水近係興化縣漫入車路河之水並歸串場河東逹萬盈墩合小海河流匯出王家港以入海民田無旱潦之患海陵溪在興化縣西十三里髙郵邵伯水所經也溉田甚溥徐州府白米堰在蕭縣東南三十里有白米泉源出縣南之白米山西北流過廟橋入雙橋湖居人堰之以溉稻田得米極白故名新匯澤在碭山縣南郭外以河徙成澤廣數十里經冬不竭溉良田無算汳水新渠在蕭縣宋紹興中疏鑿以泄汴水睢水在宿遷縣之東南睢寧縣之北今曰小河口有歸仁隄以束水併入於黃河睢利則臨睢二縣無沮洳之患太倉州水利已詳見太湖海州石闥堰在州西南宋勸農使王貫之導其水以灌田沭水在沭陽縣東南水經注水出琅琊東管縣西北大并山是也水至縣分為五道一入漣水一入桑墟湖三入太湖太湖即碩項湖蕭梁時土人張高等於縣北鑿河引水溉田二百餘頃俗呼紅花水又宋沈括為沭陽簿疏沭水為百渠九堰得上田七千頃通州岸河在石港溉田數千畝因判官包柳芳修治呼為包公隄過船港在泰興縣西四十五里明成化中自印莊港至廟港築江堰嘉靖中又自廟港至過船港增築江堰以衛田大為民利范公隄在州東北隄外皆煎鹽之地淡水出則鹽課消故隄以護之隄內皆耕種之地鹹水入則田租損故隄以防之附明沈明臣通州水利議藝稻之鄉恆視水盈涸為豐歉故水利在所必講正德間倡言建閘至嘉靖十九年同知李應雲造三閘在鹽倉者外無受水之地旁無捍水之隄每啓則水漫平田大傷禾稼在蘆團者亦為不固一啓則兩岸沙崩如山田幾坍沒蓋土輕沙浮不堪為閘而經生游談無用所謂利不償害也白蒲亦不宜便修復宣家雖曰可閘又恐不勝其費惟唐家稍堪修理以泄西成之水然不濬運河深則西成之水亦不能越河而下故曰深濬運河使各鄉支河溝汊與之相平非惟潦年之水可泄而旱年之潮亦可引矣前人有見於此惟以開濬為言故不閘而壩今觀城西之壩五鹽倉壩灰港壩龍潭壩司家壩宣家壩城南之壩三灰堆壩湯家壩陸洪壩城東之壩十二潘竈港壩水塔口壩倉壩韓家壩季竈港壩大厯港壩蔡竈壩破河塘四莊口西瞿竈港壩爛泥壩李竈港壩中幹壩沙港口壩大抵通地憂旱不憂潦雖壩無傷况壩各有涵洞以通水之出入乎若海水雖不堪灌溉而魚鹽之利咸藉焉所若善溢時為民害所賴范公任公二隄以捍之惜歲久圯隳近年吕四餘東石港被潮溺者以萬計嘉靖壬子增修隄岸多創墩臺誠得主者以時修治庶工省而利大也安慶府吳塘陂在潛山縣西二十里灊水所注也亦曰吳陂堰三國魏揚州刺史劉馥開吳陂以溉稻田又吳吕䝉鑿石通水灌稻田三百頃亦即此陂樅陽河在桐城縣東南百二十里其源自懷寧縣流入縣南百三十里又東流繞樅陽故縣諸川流入溉田甚廣桐溪在桐城縣東繞城而南引流入城曰桐渠溉民田百餘頃國朝順治康熙間兩次重濬以溪為民利也翟公隄在太湖縣西南元末縣尹翟居仁所築民至今賴其利漳湖在望江縣東北六十里四面受水最為田患近有洲生湖中曰漳腹洲蘆課歲增亦不妨魚課徽州府豐樂水在府西三里源出黃山溢於昌堨吕堨二堨各溉田二百頃又大小毋堨之水亦溉田百餘頃又綿溪水在府東南五十里下流入新安江亦有灌溉之利又布射水溉田六十頃白鶴溪在休寧縣西二里出黟縣橫江吉陽之水東流入縣境至鳳山下有夾溪水東南流合焉曰雙溪口夾溪亦曰夾源其水溉田十餘頃五城水在休寧縣南四十五里與顔公山水合匯于龍灣溪口溉田四十餘頃又原坑水出縣西溉田三十餘頃又南當水出縣西南當山亦溉田三十餘頃餘皆東流會於浙溪益陽水在婺源縣北出浙源山溉田三十五頃武溪水亦出浙源山東南流經龍尾山溉田十三頃有竒大鱅水在婺源縣東出大鱅山溉田六十餘頃小斂水在婺源縣出小斂山溉田十八頃梅源水在婺源縣西出梅源山溉田八十頃有竒杭溪水在婺源縣出縣西北七里石龍山溉田三十八頃赤溪水在祁門縣東溉田四十二頃又縣西小北港溉田五十頃大北港溉田十七頃又縣東南盧溪水溉田八十餘頃吉陽水在黟縣東北溉田四十四頃羅公泉績溪縣南二十五里水自地湧出騰上數尺源甚深長大旱不竭溉田數百頃又泉塘縣西二十里塘中有泉蓄溢深廣可引以溉田縣西五十里有龍井泉從石中出亦溉田百餘頃寧國府青弋江在府西六十里西南境之水咸匯入焉江西岸為南陵境有渡昔人多引流為陂堰以資灌溉玊粒塘在府東可溉田數百畝德政陂在府東十里溉田二百餘頃又薛公堰在府北一百十里永豐陂在南陵縣東南六十里引青弋江為陂以溉田大農陂在南陵縣南唐時范君朝置石堰開荒埂數萬畝東溪石堰今之壩上也在南陵縣因河流易涸衆議建堰蓄水雙龍井泉在南陵自濟頭山流入深無底灌田數十里方家冲在南陵縣有小溪過大路童家橋入新港又娘塘冲有泉溉田二百餘畝徽水在旌德縣北源出績溪徽嶺之北西北流有清潭水出縣南境清潭山溉田十餘頃流數里入徽水泉水蕩在涇縣附郭其竅以數千計溉田十有餘頃承流壩在涇縣即新豐壩溉田二千畝池州府查村堰在池州府西南百五十餘里受諸山溪之水引流溉田百餘頃黃荆堰在貴池縣西南八十里受諸泉澗水以溉田華湖堰在青陽縣治南通臨城河水灌西郭田民被其利天井湖在銅陵縣東門湖心有井不竭遠近諸川多匯於此又縣東葉山有靈寶泉溉田百頃水旱