body:
  text: 江南通志卷三十四輿地志古迹五安徽寧池四府安慶府宜城即今懷寧縣治宋景定元年始築宜城建康志云宜城者雁汊對岸一要害處吳魏相拒時嘗築城於此其後方言訛疑為宜一云晉郭璞謂此處宜城故呼為宜城今有宜城渡在府西康濟門外為南北渡江要津又東門外有宜城鎮呂蒙城在府東二里臨江相傳呂蒙所築今為故倉地樅陽城在桐城縣東南一百二十里左傳文公十二年楚子孔執舒子及宗子遂圍巢杜注宗國名羣舒之屬即樅陽也漢置縣晉陶侃傳云初領樅陽令而志無此縣蓋嘗復此而尋廢也梁復置樅陽郡今有樅陽上下鎮魯鎮城在桐城縣七十里吳魯肅屯兵於此呂蒙城在桐城縣東南相傳呂蒙所築按此非府城東之呂蒙城也同安城在桐城縣東門外隋大業九年築山城一名山焦城在桐城縣東南即唐移置同安縣處地多猛虎毒蛇元和中縣令韓震焚剃草木其害遂除連城在桐城縣東南一百二十里唐書張儉傳儉祖威封皖郡父植封連城即此六兒城在桐城縣南十五里明初黃榮六所築孔城在桐城縣東三十里宋史李顯忠傳顯忠破敵於孔城即此懷寧故城今潛山縣治古皖國晉置懷寧縣安樂故城在潛山縣南二十里唐置於古武功城內武功城梁天監時大將武會所築也梅城故城在潛山縣北唐置於龍鳴城內龍鳴城齊天統三年行臺右丞盧潛屯兵所築時龍鳴城中移軍在外因號龍鳴城皖陽故城在潛山縣北二十二里其城居皖水之北故名連塘城在望江縣茗山下委土為塹周二里四門相傳劉裕與盧循戰處遺壘尚存古桐國在桐城縣北左傳云定公二年桐叛楚杜注曰桐小國世屬於楚舒縣西南有桐鄉是隂安廢縣在桐城縣東南八十里本漢魏郡屬縣劉宋時僑置於此呂亭廢縣在桐城縣東北劉宋時以豫部蠻民與太湖縣同置今置驛皖城故縣在潛山縣北唐武德五年析懷寧縣置皖城安樂梅城皖陽四縣按縣皖陽故縣府志云今之皖口鎮即舊皖陽也太湖廢縣在太湖縣東北二里即今東嶽廟劉宋初置在龍山太湖水之側元嘉末移就平原去舊縣三十八里東陳廢縣在太湖縣東四十里北齊置青城廢縣在太湖縣東四十里魏曹仁所築唐武德四年置縣於此今名上格城荆陽廢縣在太湖縣東四十五里唐武德間置松滋廢縣在宿松縣北五十里漢始元五年封六安共王子霸為松滋侯國於此雨社在宿松縣西十里漢縣令張何丹禱雨處同安監在潛山縣東八十里熙寧八年置鑄錢正氣樓在府正觀門外余忠宣闕廟左山阜四望樓在府治東登眺四望江山風景舉在目中中江樓在府鎮海門外江滸天柱閣在舊郡圃久廢明郡守胡纘宗創建於正觀門外江滸登閣西望天柱巋然太子閣在潛山縣天柱寺相傳昭明讀書處潛峯閣在潛山縣境內王安石通判時讀書處擢秀閣在潛山縣北五里宋陳瑩中嘗於此讀書後擢第黃庭堅因以擢秀名閣天開圖畫亭在府學後枕山面江為郡佳勝元余闕有詩紫玻璃亭在府城雙蓮寺後明劉若宰讀書處夢神以紫玻璃授之因以名亭惜隂亭在桐城縣樅陽鎮陶侃為樅陽令曰大禹惜寸隂我輩當惜分隂故名達觀亭在桐城縣樅陽鎮宋黃庭堅讀書於此石亭在潛山縣東北三國志云魏揚州牧曹休侵皖吳將陸遜等敗休於石亭是也涪翁亭在潛山縣山谷寺中以黃庭堅得名又有涪翁書臺止泓亭在太湖縣白雲山海會寺宋嘉定趙容之創明嘉靖二年寺僧得石刻曰止泓復建此亭對酌亭在宿松縣南臺山李白與閭丘舉杯邀月處又清風亭在縣東郭外三里李白贈閭丘詩有一朝風化清之句因以名之廉泉亭在望江縣西四十里亷泉之上超然臺在府治東北雙蓮寺右元虞集有詩射蛟臺在桐城縣樅陽鎮漢書紀云武帝南巡登天柱山自潯陽浮江射蛟江中獲之薄樅陽而出作盛唐樅陽之歌祭臺在潛山縣皖山麓漢武帝祭嶽處仙人臺在潛山縣白鹿巖東北廣五丈上有仙人足迹又有一臺在金鍾潭上舒王臺在潛山縣治南宋王安石讀書處安石後封舒王因以名臺天樂臺在潛山縣明劉若實渡石梁踞天池鼓琴聞空中奏天樂有異禽千數從天柱飛來音同笙磬煉丹臺在太湖縣香茗山晉梅福煉丹於此焚身臺在太湖縣登明山僧法寶禱雨不應遂焚身即得雨嘗有燈光見其處分經臺在宿松縣北五十里有石高百餘丈梁昭明太子分金剛經於此宋嘉泰間建法華亭讀書臺在宿松縣南三里唐李白至宿松依邑宰閭丘築臺讀書於此釣魚臺在宿松縣陳漢山溪傍相傳張果老垂釣於此三至堂在府治東宋元豐間楊希元建其祖淳化中守皖父天聖中為通判至希元凡三至郡故名大節堂即今府堂元郡守韓建拒盜保城余闕作大節堂記九帶堂在桐城縣浮山會勝巖上宋僧法遠垂帶示衆處靜山堂在潛山治內舊郡堂也宋王安石詩皖城終歲靜於山因名雲會堂在潛山縣真源宮宋寧宗慶元五年建左真人仙堂在潛山縣真源宮唐寶歷二年建開成五年張虛白撰記二祖禪堂在太湖縣與司空山近太白讀書堂在望江縣西十八里值雪山李白避地于匡廬司空間往來雷池值雪因築室讀書今遺址尚存三孝堂在望江縣治北元至正中建為孟宗王祥徐仲源也後改為祠二良書院在府治東為文翁朱邑建禹江書院在宿松縣治西明郡守李遜講學處慈湖書院在望江縣慈湖坂元王幼學讀書講道於此著有綱目集覽别號慈湖蓮花書院在望江縣小茗山漢梅福曾避地於此至唐羅隱復來居之洞竈遺址尚存喬家故井在潛山縣彰法山麓漢末喬公居此二女皆國色孫策克皖娶大喬周瑜娶小喬二女以殘脂粉投井中至今井水有脂粉色孟宗宅在望江縣西北即泣竹生笋處又有泣竹臺在城內三孝祠後西溪館在潛山縣城西唐刺史呂渭喜舒州山水於城西設館覽一州之勝英輔齋在潛山縣太平寺東宋王圭讀書處萬松山房在府西門外宋馮京讀書處青山石屋在桐城縣城中晉裴仙人修煉處龍眠山莊在桐城縣龍眠山宋李公麟居此嘗自繪山莊圖蘇轍有龍眠山二十詠山側為國朝大學士張英賜金園松壑别墅在潛山縣撥蒿坂宋處士金良貴棲隱之所白雲舊里在府城正觀門外宋白雲守端禪師於此悟道昭賢里在望江縣北八里唐徐仲源事母以孝聞母卒遇雷雨輒伏墓側呼號德宗敕號所居里曰昭賢鄉曰孝感於墓傍築孝義墩白華軒今墩尚存順孫里在望江縣涼泉明嘉靖間龍涌事祖母以孝聞詔樹慈順坊於其里故名子貢嶺在府西五十里子貢遊楚停驂於此逢龍山在府西北余闕宴董僉憲詩所云雁沒逢龍山是也三國志臧霸傳云吳將韓當逆霸霸與戰於逢龍山還屯舒即此晉陵坂在府大豐鄉獨山之下有大阜隱隆若釜即陵也不知何代嘗有人開田見石門遂止旁壘壘者皆疑冢長風沙在府東六十里即李白長干行內所指也亦名長風城齊吳子陽與豫州刺史戰於此宋周湛充江淮制置使謂長風沙最險者石牌灣鑿河十里避之皖口在府西唐李涉遇盜投詩處將軍沖在府北門外元余闕引江水通五濠三塹屯兵於此以拒偽漢藤墩在府東城內舊有大樹覆墩垂藤如繖石牛洞在潛山縣山谷寺西大石如牛眠旁有蹄迹黃庭堅嘗讀書石上李公麟為之繪圖又有石牛精舍在山谷寺中酒島在潛山縣山谷寺前有石島色殷紅如赤玉清流映徹光彩絢爛如霞潛山十景之最也鱸溪在潛山縣吳塘魏武帝行軍至潛忽思鱸膾左慈取銅盤釣之得數十尾武帝釋其半於溪時正暮春今惟柳絮飛時有之謂之楊花鱖大雷戊即今望江縣治晉時置陳為大雷郡隋改今名盡忠池在府西門外即清水塘元余闕死此雲池在潛山縣真源宫東池中嘗起五色雲卧冰池在望江縣埠南岸相傳晉王祥避地時卧冰於此後雖寒沍不冰木鵝洲去桐城縣百二十里南唐與周世宗割江為界以木鵝浮江中隨所之以定南北鵝乃循洲入小峽而下六百丈在桐城縣東二百里樊若水乘小舟載絲繩以度江之廣狹此處闊六百丈云令公潭在潛山縣東門漢末邴令公與妻陸氏同死難於此桃花潭在宿松縣城西上河口龍潭在望江縣南二里即唐鞠信陵沉石禱雨處釣魚磯在太湖縣龍山崖下水中有石刻磨滅不可盡辨中有云波光照影肝膽寒嵐氣逼人毛髮立府志云邑人以沙水洗苔蘚知為倪德元作仙田在宿松縣北即西漢松滋縣治匡阜真人修煉於此後張何丹為令時有嘉禾無種自生故名風節井在府城按察使署後余闕妻盡節於此天泉井在桐城縣南城內明末流寇圍城城中渴甚有小兒戲掘一井泉忽大湧因連掘十餘穴穴皆湧泉全城賴以存活夢井在潛山縣真源宮前唐明皇嘗夢遊此因賜名中使王越賔題詩有馮誰借問嵓前叟曾托吾皇一夢來之句西源九井在宿松縣西源山自麓至巔九井如貫惟第七井在山半峭壁旱時捫蘿而上得水急返雨輒至讓泉在府西門外泉極清洌汲者爭則竭讓則涌錫泉在潛山縣梁寶志公卓錫得泉處鶴泉在潛山縣白鶴道人止處鶴起泉流山谷流泉在潛山縣山谷寺佛殿後有黃庭堅題額始為流泉後以石甃周圍澄泓不流名曰摩圍泉庭堅最愛飲之遂自號摩圍老人雙蜍泉在潛山縣西北皖山頂明慈禪師所住庵掘地見雙蜍躍出泉輒湧望湖石在桐城縣西門外黃庭堅讀書處詩崖石在潛山縣吳塘水南水激石如潄玉十景之一也碁盤石在太湖縣良埠灣梅福與仙奕此石上傳衣石在太湖縣司空山二祖慧可傳衣與三祖處又有葫蘆石相傳二祖祕記存焉憩錫石在宿松縣西南五里佛坐嶺五祖偶坐此欲卓錫於此聞龍湖水腥吟曰生平不愛魚池水風動波聲也帶腥遂飛錫去又且記石在嚴恭山五祖愛其幽勝欲建道場於此良久曰此處有千年山而無千年水乃抱一巨石置之曰且記此石鏡在府城西北懸石丈餘光明如鑑鐵牛在府城江濵多水怪初建城時冶鐵鎮五處集賢門內一盛唐門內一山川壇東一天柱閣右一萬億倉一時有聞喘聲者驚其異稱為鐵牛大將軍飛來鐘在府雙蓮寺有大鐘浮江而下寺僧迎之遂止六鐘宋文帝元嘉七年帝將征關洛潛山有鐘十二聲發地中山崩六鐘自出制合古式聲中律呂上有古文一百六十字鶴駕在潛山縣城外宋元豐間每歲仲春有鶴數千羣蔽天而來回翔飛舞於空張春遊潛見之作鶴駕詞徽州府毛甘故城在歙縣烏聊山後漢末毛甘萬户屯於此吳將賀齊平之徽州新城在今府城溪北三里宋宣和三年築新城於此因民不便仍還舊城即今府治南畿志云今故址盡為民居故城門在休寧縣有六府志云東迎春在淳化巷首西忠孝在惠政橋南班政在古樓巷北松蘿在鶴山巷北東南敉寧西南美俗遺址尚存婺源故城在婺源縣北二十五里唐開元中分休寧縣置中和二年楊行密將陶雅守歙暴橫縣人汪武據弦高鎮以拒之後縣治因而不改即今治也其故城改為清化鎮梅鋗城在祁門縣西十五里鋗吳芮將項羽封鋗十萬户侯邑於此廣德故城在黟縣東漢置寰宇記云有舊城在今縣東五里越國公城在績溪縣登源唐初汪華起義時築此歸德廢縣在歙縣西南五十里唐永泰五年析置按唐志在休寧而寰宇記在歙境相接也海陽廢縣舊治休寧縣西二里靈鳥山尋移治縣東十三里萬安山上本歙縣地孫吳析置休陽縣後改海陽府志云萬安山下有兩村曰上舊市下舊市國朝改市為墅知府陳玉題上舊墅曰海陽故址黎陽廢縣在休寧縣西北晉置今為黎陽鄉祁門故址在今祁門縣西元和志云縣東至歙州一百七十九里本古昌門地漢黟縣之南境唐永泰元年方清於此偽置昌門縣刺史長孫全緒討平之恥其舊號以縣東北二里有祁山因改祁門梁安縣即今績溪縣梁大同初析歙縣置今縣南有良安鄉蓋梁安之訛也貢院在府城府志云宋乾道四年於大成殿東因餘地而益拓之設貢院選士明年登第者十人內有為禮部第一廷試第三者越國公府在休寧縣萬安山舊稱汪王故宮汪華所居宋為廣惠王廟紫翠樓在府治宋宣和間建御書樓在府槐塘宋丞相程元鳯建梅花初月樓在府石門明學士朱升建太祖御書梅花初月四字顏之羅潁樓在府西新安山水志云樓跨黃羅天馬間樓前小山外見黃羅如錐潁露秀刺天際天馬蜿蟺右翼倣佛百雉翠光冉冉撲樓中兩山如在几席前也溪山第一樓在婺源縣城中羣山環其前大溪走其下元馬肅建程文記望烏樓在祁門縣二都唐郎中廖嵩自閩避亂來祁攜二烏卜居至此烏棲不去遂家焉其裔孫德湊為建望烏樓擁青樓在祁門縣治宋景定中建以杜甫高山擁縣青句為名虛直樓在祁門縣桃峯下宋謝升建其子璡講學其中種竹十竿故名雪峯樓在績溪縣西石壁山上宋崔鷗建景蘇樓在績溪縣署舊為秋風堂宋紹興間邑宰曹訓摹前令蘇轍遺像及所為詩鐫於石建樓貯之曰景蘇宸奎閣在府城紫陽書院內因宋理宗御書建閣春草閣在府松明山明汪道昆讀書處侯賢亭在府問政山唐刺史于德晦為兄方外建披雲亭在府南山唐宣歙副使魏𢎞簡建見柳子文集及文苑英華歲寒亭在歙縣治舊名松風亭宋令王薦建府志云元紫陽書院山長張炳購於趙評事家得其地以歸學明正統間立亭浮丘亭在郡治西北雉堞上有兩古木宋郡守洪適倚木建亭范成大有詩又浮丘園在浮丘山下古梅十里許秋水亭在休寧縣治宋令葛勝仲濬深池築亭其中府志云國朝縣令廖騰煃重建加廣焉又縣治西有真意亭亦葛所建還金亭在休寧縣霞阜河畔為商山吳清還金建有碑記環緑亭在婺源縣儒學山右宋汪子英建元胡炳文記流芳亭在婺源縣西二十里宋江大正建時雨亭在婺源縣石龜潭上元達嚕噶齊諾海禱雨輒應因建此亭自為記翠睂亭在績溪縣西亭前小山相對如睂宋蘇轍嘗遊焉謂似其鄉之睂山故名後即亭為蘇轍祠豁然亭在績溪縣治宋汪琛建蘇轍有詩世德亭在績溪縣南邑人為明尚書胡松建孝感亭在績溪縣治北明縣令高梁為孝子許欽建鼓吹臺在府篁墩湖側程篁墩記云忠壯公靈洗習戰時所築數傳後風雨之夕猶聞鼓吹聲百花臺在府西三里宋司農汪叔詹築富登釣臺在府富登渡一石出江上勢欲飛入江中元鄭玉嘗釣於此平章余闕篆書鄭公釣臺四字於石玉自為記李白釣臺在黟縣東南十六里西連墨嶺一名尋陽臺黃山堂在府治後唐大中初建舊有黃山樓北望天都蓮花諸峯森秀天表後為堂于德晦有詩舍蓋堂在府治後宋洪適建以延四方往來之士范成大記相儒堂在府城南門內宋程元鳳讀書處寶祐中州守趙汝嶧建府志云後廢碑刻移砌大成殿牆左中山書堂在祁門縣南明汪克寬與弟時中肄業之所程忠壯宅在府西三十里仁愛鄉宅有大樹號千年木立祠其下篁墩湖濵磉石尚存為一方勝迹黃孝子宅在府西九里黃屯園唐孝子黃苪故居貞元中詔旌其門今稱孝仁里汪莘故宅在休寧縣西門內柳塘坊凌唐佐宅在休寧縣敉寧門南凌家巷共學齋在休寧縣東山元儒趙汸講學所尊德性齋在婺源縣環溪宋程洵建初名道問學朱子易之復為銘屏山書屋在婺源縣翠屏山朱子歸省祖墓時所建十世孫穩復結屋讀書於此環佩重來軒在府之槐里宋丞相程元鳳有琴曰環佩亡去已久其六世孫文貫復購得之為軒以藏焉風泉雲壑軒在府南門紫陽書院宋郡守韓補建元方回記新安道院在休寧縣治東宋令祝禹圭建附朱熹記休寧大夫信安祝侯汝玉以書來曰休寧之為邑雖有難冶之名而吾之為之已再歲矣始也不能不以人言為慮中乃意其不然而今則遂有以信其不然也蓋其封域實鄣山之左麓而浙江出焉山峭厲而水清激故稟其氣食其土以有生者其性情習尚不能不過剛而喜鬬然而君子則務以其剛為高行奇節而尢以不義為羞故其俗難以力服而易以理勝茍吾之所為者出於公論之所是則雖或拂於其私而卒不敢以為非也以是吾之始至蓋不能無不説者而今則歡然無與為異吾常困於事之不勝其繁而今則廓然無事之可為也吾將更葺廳事之東參采賔佐屬詠之什而榜之以新安道院子能為我記之則後之君子益知所以為治而無吾始者之慮矣豫惟汝玉之為此可以見其政之成民之服而官曹之無事矣然道之得名正以人所共由之路而非無事之謂也夫以汝玉之始至坐於堂皇之上則左簿書右法律日夜苦心勞力而不得休其或少暇則又不免衝寒風冒烈日以出入乎阡陌之中而不敢怠凡所以勸民之善而懲其惡興民之利而除其害者非有道以行之則何以致今日之無事哉顧其名此乃若專取乎今日之無事而返病前日之勤事為非道耶抑常計之天下之事雖有動靜勞逸之殊而所謂道者則無彼此精粗之間汝玉之學固有以知此矣彼其所以喜於政成之無事而不避異學之淫名豈非朝夕之間猶欲從容於此以深思前日之已行而益求其所未至卒以究夫無彼此精粗之間者而大發於功名事業之間乎豫故邦人且汝玉豫舊也樂其意為書本末以示來者使於此邦之俗賢宰之志尚有考云新城園唐咸通六年於歙州城西北為堤以禦水光化中增築為新城其後堤漸圮每為溪水泛溢因棄為桑野名曰新城園朱家巷在府西南黃墩朱子自敘茶院譜後云先世居歙之黃墩附朱熹婺源茶院朱氏世譜序熹聞之先君子太史吏部府君曰吾家先世居歙州歙縣之黃墩相傳望出吳郡秋祭率用魚鱉唐天祐中陶雅為歙州刺史初克婺源乃命吾祖領兵三千戍之是為制置茶院府君卒葬連同子孫因家焉生三子事南唐補常侍丞其後亦有散居他郡者熹按今連同别有朱氏舊不通譜近年乃有自言為茶院昆弟之後者猶有南唐補牒亦當時鎮戍將校也蓋其是非不可考矣先吏部於茶院為八世孫宣和中始官建之政和而葬承事府君於其邑遂為建人於今六十年而熹抱孫焉則居閩四世矣淳熙丙申熹還故里將展連同之墓則與方夫人十五公馮夫人之墓皆已失之因亟詢訪得連同兆域所在乃率族人言於有司而後得之其文據藏於家副在族弟然而三墓者則遂不可復見癸卯五月辛卯因閲舊譜感世次之易遠骨肉之易疏而墳墓之不易保也乃更為序次定為婺源茶院朱氏世譜而并書其後如此仍録一通以示族人十一世以下來者未艾徽建二族自今每歲當以新收名數更相告語而附益之庶千里之外兩書如一傳之永遠有以不忘宗族之誼至於蘆村府君其墓益遠居故里者尤當以時相率展省更力求訪三墓所在而表識之以塞子孫之責而熹之曾大父王橋府君無他子其墓在故里者恃有薄田於其下得以奉守不廢當質諸有司以為祭田使後之子孫雖貧無得鬻云五城務在休寧縣南五城水上舊為大鎮有五城斜隅相對旁有大墳有人發之其墳上鐵厚二尺鐵才破雷雨晦𡨕人懼而止元置五城務明初廢吳山里在婺源縣東七十五里勾踐滅吳流夫差二子其長子鴻死此因葬焉遂名吳山里又名婺女里朱文公闕里在婺源縣南朱子先世故居元時知州于文傳建朱子家廟中有韋齋井相傳文公生時井中紫氣現亦曰虹井明宣德中建亭其上附明汪敬虹井亭記虹井亭者記闕里虹井亭也記井甃自開邑而有虹則自朱晦菴父子始自井有虹而婺之文明闢豈惟婺之文明闢宇宙之文明實闢今之宇宙揭聖經於中天而雲漢為昭者誰之功與語有之天降時雨山川出雲夫雨也而雲先則文明也而虹兆理又奚疑載考之古尼父制孝經既成而告備於北斗有赤虹自天而下化為黃玉尼父拜而受之夫孝經何與於北斗而天之降精若是其與春秋成而麟出同一徵應乃或者謂麟出為非時故仲尼春秋因之以作又謂尼父以為吾道不行之兆因之絶二百四十二年之筆獨胡氏以河出圖洛出書及簫韶作而鳳凰儀當之謂其先後天弗違其説始章明而有據正大而非誇彼欲逃之乎徵應之説者蓋皆求其故而不得者也若然則一聖一賢其生關乎天地其立言也關乎禨祥毋惑乎集大成者先後若同堂也井在故宅之右氣潛與龍井相通可供千家之汲寒冽冰齒人多啜不噎又能已疾龍井之間龍嘗噓氣盤結如雲其深不可測此則垂綆不踰二仞往來井井其坎常盈自虹出而泉日減蓋精騰於天而氣竭於地理無足怪然人不敢以為舊為泥棄之必曰此瑞井也宣德九年錢塘陳侯以太學高等選為婺源縣令晉謁闕里拜瞻遺像以為仲尼之後一人因用其學為政政成而百廢具舉修學宫葺書閣文公之祠因以次及圮者修之欹者搘之朽者新之徘徊於虹井之上懼其久而汚也為亭以覆護以甃垣平以丈石垣為四户限其流之旁入者俾汚泄屏而寒泉注顔其楣曰虹井亭人之過而瞻者於以知晦翁之上應天精下稟地靈而侯且命敬曰子盍為記之使後人葺俾勿壞敬因復曰睢渙之水錯繡若麗壺頭之泉淑蘭成氣潄英噴華呈祥表異聖道汪洋如水行地前有河洛後有洙泗淵淵虹泉同源共清我侯濬之澤存萬世侯曰其然庶無甕敝乃礱貞石而刻之僕城里在黟縣西十八里林歷山下漢末陳僕等屯此故名孔靈村在府南三十里晉永嘉之世孔愈避地居此信著鄉里後忽捨去人皆以為神人任公村在府北四十里梁太守任昉行春至富資溪上樂之徘徊纍日人號其溪曰昉溪溪傍村曰昉村唐大中初刺史盧潘易曰任公村舒村在府西四十里中鵠鄉村旁有讀書墩南唐進士舒雅所居府志云隔溪山石望之峩然若纓其冠者曰幞頭石斷石村在休寧縣西南三里懸崖絶壁巨石墜下如臺狀宋治平中知縣事呂大防書斷石二字於上今稱落星臺祥符經云昔有兩舟泊嵓下一祭一否石隕不祭者舟張村在祁門縣西十里唐左金吾大將軍金華張志和隱此自號煙波釣徒因名大徽村在績溪縣改州為徽取此漢洞在府仁愛鄉外狹中寬有㸑臼遺迹相傳漢末郡人避兵於此仙巖在婺源縣壁月門外相傳宋時有人挂竹連環於杖頭至巖倐不見始悟竹環為呂字且其貌與洞賔類遂塑像建觀祀之譙貴谷在黟縣輿地紀勝云在縣南方輿勝覽謂在縣北昔土人入山行七日至一穴豁然周三十里中有十餘家又云按縣圖有潛村至今數十家同一村或謂之小桃源三説不同放生池在府城西宋紹興十三年詔天下郡各為池放生於是鑿城西壖地以應詔後郡守童僅增廣之作恩波堂及好生魚樂之亭萬貫洲在婺源縣鵲溪宋嶽飛征楊么屯兵於此朱塘在婺源縣東朱子還婺源與門人滕璘遊見其山水幽靜俱如疇昔夢中所見問其地對曰朱緋塘璘世業也朱子曰故與子有神交者在因命作亭為書草堂二字貽之五畬驛在休寧縣南二十五里又縣南二十九里有皇華驛原名憩賢驛俱元置明初廢魚亭驛在黟縣東三十五里宋置呂本中詩云竹密如雲不見天好山無數簇溪田只應黟縣溪山勝盡在魚亭驛舍前衝山營在婺源縣治西北五代時吳將劉津所置今有壁壘餘址胡僕射營在祁門縣義城都福洲及歸仁都等處皆唐末胡瞳屯軍之所管界寨在府西百八十里又深渡寨在府南四十五里俱宋置明初嘗置巡司程澐寨在休寧縣南東密嶺唐乾符五年黃巢寇郡郡人程澐率義兵立寨於此以拒之今塹壘猶在相傳上有元帥府基下有落箭丘皆以澐得名舉嶺寨在休寧縣東北十五里天寶岩又縣東南方山有白際嶺寨縣西婺源界有塔嶺寨又縣西吳田嶺上有馬金寨縣西南溪口有松陽寨皆宋置元廢中平寨在婺源縣東九十里宋置明初廢今為往來孔道西坑寨在績溪縣東六十里元置又置鎮守軍營於此明初改置巡司戍守正統初廢蝦蟆坑在府鎮安門外俗訛為麻坑階坑在府東北二十里方輿志云吳廢太子和所居階迹猶存浣沙埠在府龍井山北相傳李白訪許宣平至埠上一翁對曰門前一竿竹便是許公家白悵望翁已失所在蓋翁即宣平也石羊阡在休寧縣東鄉吳王楊行密疑冢也南畿志云世傳吳太子葬東山今不知所在惟兩石羊夾道有翁仲石趺存獨母柴在黟縣南十五里俗傳昔有寡婦死無以葬行人覆之以薪至今人經行其處皆以一枝草投之殷公井在府南羅城內井底有斜穴一通銅井潭一通釜井潭每井有遺物多於二潭得之少保井在府城內唐少保薛稷所鑿明一通志云一名九井唐均勝井在黟縣東二十五里天井山麓歲旱禱雨俄而滿井霖雨隨注聖泉在休寧縣蓀田葉巖下相傳明高帝訪汪巽元馬蹄所觸遂成泉兌卦石在休寧縣古城山麓宋淳熙間縣令鄒補之摩崖𨽻書兌卦於其上産龍石在黟縣東山石燕洞之下其石劃然兩開各有首尾鱗爪相傳龍孕石中石破而龍出白玉大士在黟縣石門山洞石如玉肖觀音大士像慈孝松在府龍山元至元丙子鮑宗巖遇盜縛大松下其子壽孫願身代不聽倐烈風震變盜恐軼去得免明永樂中旌其村為慈孝里松曰慈孝松楠樹在休寧縣西白嶽山大數十圍諸石如伏犀馴象山志云江左楠木惟此一株今枯雕為神像寧國府楚王城府志云在城北百里黃池鎮南相傳吳楚相距時築又有故楚城在南湖北岸逡遒城府志云在城北四十里南畿志云在府東北六十里本漢縣屬九江郡晉末僑立於蕪湖縣界屬淮南郡溫城在府東二十里唐刺史溫章築宣城故城在南陵縣東四十里青弋江上漢縣屬丹陽郡建安二十年孫權使蔣欽屯宣城即故城也甘公城在南陵縣北七里或曰吳將甘寧嘗屯此或曰晉內史甘卓治郡時築俗訛為甘羅城南陵故城在南陵縣西北梁置南陵縣治赭圻城赭圻城互見太平府吳故城在涇縣西南五十里落星潭東俗稱沙城宋志云三國吳置水經注云晉太康元年分宛陵置今有安吳市及安吳渡桓公城舊通志云在涇縣東四十里烏溪嶺南畿志云在桓公嶺下晉桓彝討蘇峻築此走馬城在涇縣南四十里晉桓彝將俞縱屯兵處又有蘭石在縣東六十里桓公嶺西桓彝使俞縱守蘭石即此白龜城在涇縣東北柏山下隋末左難當欲築城拒輔公祏會溽暑大雪有白龜印雪周行隨迹築城故名又有幕山軍壘在縣東北三里亦難當拒公祏所築猷州城在涇縣西三十里大寧山前唐武德間置明一統志載入石埭以晉時兩縣俱𨽻宣城郡也寧國故城在今寧國縣南十三里三國吳置懷安城在寧國縣東南百里明一統志謂縣南四十里誤吳大帝分宛陵置烏石城在寧國縣南九十里盤山北相傳南唐時置以備吳越丹陽郡治漢宛陵縣即今宣城縣其城晉內史桓彝所築今府治東北有鐵牛門即彝所築子城故址也南陽廢縣在旌德縣西北梁置屬宣城郡仙壇在宣城縣麻姑山最高峯舊有丹竈劍池石棊枰釣魚磯天遊亭諸勝迹世傳麻姑煉丹處雙鯉塔在太平縣西九十里弦歌鄉高可丈許搖之輒動終不仆下臨大溪溪有二石狀如鯉與水浮沉雖漲不沒故名北樓在府治北南齊宣城守謝朓建唐李白詩誰念北樓上臨風懷謝公亦名謝公樓明郡守方逢時記云自唐獨孤霖改建疊嶂樓而北樓之名廢矣附宋田錫疊嶂樓賦宛陵之丘玄暉舊遊城連延兮百雉世綿歷兮千秋流水白雲慨依然而在覽遺風往事信赫若兮長留余以丹陛策名皇華奉使適蒞於此乘春以至驛梅江柳動遊宦之芳懷風觀露臺起高明之逸意疊嶂居先登之悅焉憑落絮之危檻向飛花之晚天復嶺連岡峙昭亭兮作鎮平蕪遠樹引句水兮為川因而覽古興懷臨高凝睇自春秋戰國之後至吳魏鼎分之際干戈僭王乘輿擬帝斯為形勝之地恃以控臨之勢襟帶三江咽喉五湖歸勾踐兮稱越𨽻夫差兮曰吳比奕棋之靡定惟霸略兮能圖方今禹迹重新堯封復古銜王命於北闕詠皇風於南浦升高而賦憐宋玉之才多覽景自怡非仲宣之思苦江渺渺兮涵春草萋萋兮感人指吳越之遠道介池歙兮為鄰兩槳何歸引回眸於天際微雲似畫帶斜陽於水濵既而閲謝守之詩蒼苔滿石覽獨孤之文芳塵在壁杏花含露念昔我之來時菊蕊迎霜乃今余之暇日歲云豐稔民之悅逸思命儔兮嘯侶聊登樓兮自適忠勤樓在府南門宕吳氏村口宋景定間吳淵置樓於丞相第中御書忠勤樓三字額賜之今祀吳柔勝吳淵吳潛三公於其上府志云明萬厯初改建雲齊閣在府敬亭山翠雲庵前取唐李白詩合沓與雲齊為名府志云國朝郡守龔鯤重建雙溪閣在府治後與疊嶂樓並宋治平中刁約建即唐初北望迎春閣故址文天祥有登雙溪閣詩讖松閣在府城東舊府學中初相地者云百年後松梢過閣當有魁天下者至嘉定間吳潛果大魁因以名閣風光閣在涇縣西賞溪上舊有亭宋紹興中縣令魏把改建閣取風光水西之句名之後為水嚙移縣治左敬亭在府北十里敬亭山謝公亭在府北郭外即謝朓送范雲之零陵處唐李白謝公亭詩謝公離别處風景每生愁擁翠亭在府城北敬亭山即李白獨坐題詩處遺碣尚存西候亭府志云未詳何地南畿志謂在府西郭外宣城事函云唐天寶中宣州刺史趙悅建附唐李白西候亭序惟十有四載皇帝以歲之驕陽秋五不稔乃愼擇明牧恤南方凋枯伊四月孟夏自淮隂遷我天水趙公作藩於宛陵祗明命也惟公代秉天憲作程南臺洪柯大本聿生懿碩宜乎哉橫風霜之秀氣鬱王霸之奇略初以鐵冠白筆佐我燕京威雄振肅敵不敢視而後鳴琴二邦天下取則起草三省朝端有聲天子識而宰衡動聽殷南山之雷剖赤縣之劇強項不屈三州所居大化咸列碑頌至於是邦也酌古以訓俗宣風以布和平心理人兵鎮惟靜畫一千里時無莠言退公之暇清眺原隰以此郡東塹巨海西襟長江咽三吳扼五嶺輶軒錯出無旬時而息焉出自西郭蒼然古道道寬列樹行無清隂至有疾雷破山狂飈震壑炎則爍野秋霖灌途馬虺隤於谷口人周章於山頂亭候靡設逢迎闕如自唐有天下作牧百數因循齷齪罔恢永圖及公來思大革前弊實相此土陟降觀之壯其回岡龍盤沓嶺波起聲勢交至可以有作方農之隙廓如是營遂鏟崖堙卑驅石剪棘削汚壤階高隅以門以墉乃棟乃宇儉則不陋麗而不奢森沉閈閎燥濕有庇若鼇之湧如鵬斯鶱縈流鏡轉涵映池底納遠海之餘清瀉蓮峯之積翠信一方雄勝之郊五馬踟蹰之地也長史齊公光乂人倫之師表司馬武公幼成衣冠之髦彥録事參軍吳鎮宣城令崔欽令德之後良材間生縱風教之樂地出人倫之高格卓絶映古清明在躬僉謀僝功不日而就然是役也伊二公之力歟遇客沈吟以稱嘆邦人聚舞以相賀僉曰我趙公之亭也羣寮獻議請因謡頌以名之則必與謝公北亭同不朽矣白以為謝公德不及後世亭不留要衝無勿拜之言鮮登高之賦方之今日我則過矣敢詢耆老而作頌曰耽耽高亭趙公所營如鼇背宇兀於太清如鵬翼開張而欲行趙公來翔有禮有章煌煌鏘鏘如文翁之堂清風洋洋永世不忘響山亭在府城東南二里唐刺史路應跨潭為梁建兩亭於東西崖權德輿為記鐫崖石附權德輿記元和二年冬十月宣城長帥中執法襄陽郡王潞公作新亭新營凡周月而厥功成先是郡城之南扼狹磽確山木不剪樵門不開公因暇日觀視原野直南一里所得響山焉兩崖聳峙蒼翠對起其南得響潭焉清泚可鑒瀠回澄淡又其南則博敞平夷澶漫逶迤從古之隙地是邦之休利目與心會暗然自得述以條陳實蒙報可乃量日力計徒庸闢於弇中成是夷道揭東西二亭於雙峯之上相距百步華軒峻宇皆據勝勢廣厦疏寮可棲灝氣碧山亘目清流在下跨以虹梁抵兹近郊因其爽塏乃列營署度野以步度堂以筵上棟下宇各有區處規地之廣袤分左右營部焉牙門新軍而下左至八右至七既而左次莽平采石之師與宴設堂又在廣場開館􅌄窱縈帶可以閲軍實可以容晏豆度羡材則不費因悅使則不勞巽之申命師之畜衆楚莊之匏居衛文之楚邱得其時制而不煩也官業盡在於是爰初師所處在郡之北偏地泐墊下水泉沮洳積弊不遷介大病焉至是則修武備建長利興寢得安其室處坐起以觀其習變而公又饗士於斯娛賔於斯公之心大則神王神王則中和旁達士體寧則氣全氣全則餘勇可賈夫然則不出楹階俎豆之間而威儀交修上下浹洽在此物也以公之平粹淑均天資吏師昔嘗四部符一司武皆有利澤施於州壤及是則貴為元侯疏以大封推心術而行千里所繇屬城而流於支郡程功底績觀發知智亭與營之制宜乎哉前賢之以循政聞者有矣而遺於是豈徯公之為而裕斯人也凡由此塗出者東南扺於歙西北抵於涇肩摩轂擊往復自便絶東溪有浮橋過西亭得蓮池觸類滋長皆為絶境公以鄙夫春秋之徒也繪而傳焉使實録於石沃洲亭在府城東十里玉山寺後宋時建取唐李白五松何清幽勝景美沃洲之句環波亭在府城北濠上宋郡守邵飭命名梅堯臣有詩景梅亭在府城南宋梅堯臣祠墓之左府志云知府范吉建東峯亭在涇縣西劉遺民釣臺之側唐永泰中季廣琛討洞寇方清宴客於亭上適告捷御史中丞袁修賦詩刻石紀其事後裴丹於荆棘中得斷碑有袁修二字因名其石為袁石煙雨亭在涇縣西寶勝寺前枕山面溪煙雲如畫六勸亭在太平縣南五里宋令周景賢以六事勸民嚴公臺在府西南四里相傳漢嚴光嘗垂釣於此宋梅堯臣詩有卜經嚴子臺句劉遺民釣臺在涇縣水西寺左白雲潭上遺民嘗為柴桑令後棄官釣魚於此有石巋然下臨潭水琴高臺在涇縣北二十里琴溪高山之巔按列仙傳琴高在涿水此蘇耽也以其好鼓琴故以琴高名之望霞臺在寧國縣西溪唐貞觀初建歃血臺在旌德縣石柱山梁時程靈洗起兵討侯景築壇誓師於其上海榴堂在府治唐時建許渾有陪崔尚書宴海榴堂詩萬卷堂在寧國縣南屏山琴山間宋乾道中楊秉讀書處秉故人湯鵬舉入參大政為印國子監書籍藏其中府志云又有玉書案石硯閣今廢洪永章宅在涇縣舉山下相傳父老嘗得誥敕碑石上有銀青大夫兵部尚書兼上柱國賜紫金魚袋洪永章勒虞璠宅在寧國縣南五里璠宋侍郎虞儔父也隱居於此滕慶和宅即旌德縣會勝寺梁丞相滕慶和居此後捨宅為寺黃顏石室在寧國縣黃顏山頂可容數百人相傳晉永嘉中黃顏修煉於此瞿硎石室在寧國縣文脊山中晉瞿硎先生隱居於此府志云山有門一名山門洞宛溪館在府城東宛溪上後為宛陵公署唐李白詩吾憐宛溪好百尺照心明高齋在府治內齊謝朓守宣城時建因麗陵陽山麓故名明郡守方逢時有重葺高齋記萬歷志謂以廉惠亭改建誤韓昌黎别業舊址不可考朱子韓文考異云愈有别業在宣城集內示姪爽自京師之宣城詩有宣城去京國閭里故依然之句南湖書墅在府城西四十里南崎湖上貢士萃美集云元廣陵侯濬置張養浩諸人題詠羅隱墅在涇縣小溪唐羅隱居此旁有羅公祠勇里在涇縣西北後漢建安中太史慈據涇縣孫策擊擒之勇里即此薔薇塢在旌德縣東宋狀元劉暉讀書於此曲池在府城北三里唐裴休為宣州刺史時種蓮於此甄塘在涇縣南二里世傳魏甄后所生處裴公井在府敬亭山南唐裴休鑿色白味甘獨異他井金雞井在府城北廣教寺右唐黃蘖禪師建寺時有二金雞相鬭入井輒泉湧莫測其源其材皆從井湧出孔子井在寧國縣南一百一十里即今孔夫關之地相傳孔子入吳時鑿又有孔子堂堂下有馬跑泉宋吳晦之詩試向荒祠尋舊迹一泓堂下馬跑泉磨崖碑在涇縣石豅洪頭山有石碑字多磨滅其可見者曰巍巍法宇聖德靈奇天仙作樂神人護持猗與居士博大能洽迹晦岩泉情存佛法挾黃鶴仙帶白龍水清淨妙義靈寶至理唐天寶十四載癸巳四月壬申朔二十八日己亥刻石巨人迹在旌德縣東鳬山又有馬蹄石搗藥臼龍潭石相傳竇子明女化青鳬飛去在此靈根石在府一峯山之巔唐李白題雲根二字至今塌摹者多紫陽題石在太平縣長壽鄉獅山有平石丈餘朱子過訪孫覿題秀隂二字勒其上奇石仙桃在旌德縣境去資福寺二十步許石澗有桃樹不花而實兵備使郝壁設亭於此池州府石城在府西七十里地名鐵店亦曰倉埠潭以東西兩石山夾河如城故名漢置縣虎林城在府西六十五里孫吳時為戍守處大帝封其子休為琅琊王鎮虎林即此胡城在銅陵縣東四十里凡八所相去二里許不相連屬相傳古胡王神所築其地澗港皆以胡王為名一曰宋泰始中晉安王子勛舉兵江州其將劉胡引軍東下築此屯兵因名石埭故城在石埭縣西一百四十里吳置石埭場梁大同中置縣以貴池源有兩小石埭堰溪水為名今名七里街堯城舜城堯城在建德縣南四里舜城在建德縣北二十里舊傳兩帝南巡至此故名臨城發縣在青陽縣南五里吳赤烏中析陵陽石城二縣地置今為臨城鎮定陵廢縣在青陽縣東北即今定陵鄉晉南渡後僑置義安廢縣在銅陵縣東三十里唐高祖時分南陵縣置今為順安鎮陵陽廢縣在石埭縣東北二里即猷州城漢置今為陵陽鎮晉陽廢縣在東流縣東北即今晉陽鄉隋置桑柘門在府城秀山門外虎山之東北通口唐時城門名也又有雙江門未詳何所仙壇在石埭縣陵陽山中峯之半竇子明仙所唐天寶末建仙壇宮至今祀之醮壇在石埭縣碧玉泉上其石方平陛級如壇竇子明嘗醮其上俗呼為仙人石梅根監在府東五十里亦曰梅根冶六朝皆鼓鑄於此劉宋泰始中陳慶攻張興世於錢溪不敢越乃於梅根立寨唐志云南陵縣有梅根鎮蓋其地舊屬南陵也宋至道三年以池州錢監為永豐監或曰即故梅根監利國監在銅陵縣銅官山唐置銅官場宋置利國監後以銅乏廢九華樓在府治九華門上唐刺史李元方建明一統志云即九峯樓也蕭相樓在府城東南隅唐大歷中刺史蕭復建後杜牧重建名之曰蕭相樓宋蘇轍有詩秋浦樓在府城東宋紹定戊子郡守趙葵因舊址增築有石刻蘇軾詞黃魯直字於壁南畿志云明正德戊寅知府何紹正重建景蕭樓在府城內萬歷中柳林巷居人李春達掘得斷碑有景蕭樓上梁文宋狀元陳舜俞撰順安樓在銅陵縣東三十里臨津舊驛中賣花樓在建德縣南里許自唐至五代時有花樓二十四間土人善剪繡作花以市四方置酒會多至此市花諺云江南茶飯建德先知近樓名胭脂港亦舊管絃地今悉荒廢文選閣在府西貯梁昭明文選處今僅存其址芙蓉閣在李白書堂前翠微亭在齊山之巔九華清溪秋浦皆隱隱屬望中唐時建宋嶽飛詩經年塵土滿征衣得得尋芳上翠微好水好山觀未足馬蹄催送月明歸又有三奇亭亭以石鼓洞仙人橋妙空嵓為三奇故名又有青霄亭舊為觀郡樓宋王哲易今名神交亭在府城小丘山明李呈祥講學地以遇湛若水構亭曰神交附明湛若水神交亭記池陽有高士古源李子者謝太學隱居小丘山十餘年不出志聖賢之道聞甘泉子而慕焉然而未嘗識面甘泉亦未嘗識其面而知之賢而敬之曰神交矣或曰面不相識何謂神交甘泉子曰夫人皆識面淺者也而謂上下萬年識堯舜禹湯文武周孔是何面目而若相知之深焉神交也故孔子夢周公高宗夢傳説舜夢拜平丞黃帝夢遊華胥見堯羮牆皆心也神也神也者心之所為也故心之神也交通也通天而天通地而地通萬物而萬物通堯舜禹湯文武周孔而堯舜禹湯文武周孔感而通之一氣也氣也者通宇宙而一者也是故一體也一體故氤氲相通痛癢相關不交而交矣嘉靖丙午八月甘泉子過池陽登九華之山古源子出迓焉或曰子十年不為彼鄉士夫出矣不為郡大夫出矣而為甘泉子出何耶曰吾為道出也非為甘泉公也相見而歡若平生交焉若魚水不足也執弟子禮而學焉虔心以相孚神以相授不待口之相語也深矣何則神交至焉傾蓋次焉故知神之所為者可以盡心矣知心之所為者可以知性矣知心神之所為者可以語道矣盡心知性而存養之可與語學矣盡之矣古源子退而作神交亭甘泉子為次第其語作亭記甘泉子喟然嘆曰於平時知子而知神交之道則斯亭斯記可兩忘矣弄水亭在府治通遠門外舊橋之西杜牧建取李白欲弄水中月句為名貴池亭在府城北五里磯上俗呼為望江亭唐杜牧詩勢比凌敲宋武臺翠光亭在池口瀕江宋嶽飛詩愛此倚欄干誰同寓目間輕隂弄晴日秀色隱空山島嶼蕭騷外征帆杳靄間豫雖江上老心羡白雲關清溪亭在府清溪鎮又有清溪館望華亭在九華山西圮橋之右舊名玩華亭馮叔吉重建易今名領九華衆峯之妙梅公亭在建德縣治後宋梅堯臣為令有惠政民思之作此亭附元吳師道記士君子宦遊之方去之數百年人猶想其風烈而不忘至於崇表而章顯之是雖好德之心然其所以使人至此而為末俗之勸者豈小哉池之建德故宋尚書都官員外郎國子監直講梅公聖俞景祐間為知縣事集中詩幾百篇皆在是邑作而當時風物宦况之大略可考見也後人嘗規於官舍西偏為梅公堂以祀之既廢而令柴夢重建於縣圃之北世易事更復改縣後之半山亭為梅公亭以識其舊未幾亦化為荒墟師道之來也按行遺址見大礎在茅草中蕘兒牧豎躑躅其上老木三數株錯立蒼然為之躊蹰太息自是營構之念往來於懷越明年始克就緒為屋三間限以周垣鍵以外扄飛簷虛檻高亢疏明既與邑人慰其景仰之思而溪山屋室環繞映帶又得登臨之美以相樂也當宋之初文體卑陋公倡古淡之作一變其習歐陽子以一世巨人而盛推尊之若已弗及又以仁厚樂易溫恭謹質稱其人一時諸公交口論薦雖仕不大顯而文學行義足以儀當時而表後世矧建德肇邑自唐令長凡幾何人而公之名獨稱之至今是豈可以勢力致哉使凡吏於此者登公之亭誦公之詩思公之所樹立以自勵則斯邑之民將被其賜於無窮也師道於公無能為役然不可謂無志於自勵者斯亭之作既自為之經營而衆來致助乃命邑人陶起東董其事不以煩民庶幾可久尚告來者嗣有葺焉其或迂吾之為漫不顧省任其圮壞泯滅亦獨何心哉亭成當至元三年丁丑之歲十二月乙亥明年某月日記菊江亭在東流縣西菊江門外舊有菊臺瀕大江後建樓其上名望江樓再易今名向於此祀陶潛故江曰菊江亭之名亦因此繡春臺在齊山東岩之巔危簷傑棟巋然屹立宋魏了翁書繡春臺三字又有紫薇臺在竇雲岩後因杜牧得名今存石刻數字昭明釣臺有二一在鎮山下一在和龍山下有玉龍潭白鶴臺在青陽縣東南保寧觀相傳白鶴真人煉丹處釣魚臺在青陽縣九華山嘉魚池上相傳竇子明李昭象垂釣處李白書堂有五一在府南四十里桃陂一在府南苦行嶺一在銅陵縣五松山一在石埭縣杉山又一在青陽縣九華山中宋吳夢祈記云翰林訪道江漢會故友韋仲堪宰是邑乃卜居焉其居介乎龍女泉之側嘉熙初蔡元龍訪其遺迹於化城寺東偏復構斯堂李昭象書堂在九華山翠羽池杜荀鶴書堂在九華山東去小龍山三里許舊為臨城地范仲淹書堂在青陽縣東二十里讀山之陽華嶽宅在府南山川壇後嶽為殿前司謀誅史彌遠遇害有手植松十餘株宅前石狻猊尚存費冠鄉宅在九華山少微峯吳用之宅在九華山西坂吳氏自唐以前居之號松陽宅新城宅在蓮花峯西亦吳氏宅也唐刺史吳器高築新城精舍楊梅館在府西九十里石嶺多楊梅唐白居易有楊梅館詩宋改為驛今呼為楊梅坦龍堂精舍在銅陵縣五松山李白與南陵常贊府遊五松山詩有龍堂若可憩吾欲歸精修之句注云銅井西五里有古精舍陳公園在銅陵縣東鼇首山園內有二池宋蘇軾黃庭堅曾遊此葉公園在銅陵縣東五十里葉山下宋王安石遊其園戲葉云周回莫有千秋葉葉隨答云裨補能堪百節蠶鐵船在銅陵縣五松山前湖田之下首尾船形如積鐵舊傳晉潯陽太守張寬殁為神於此一夕乘船至為人所見其船遂溺而露首尾焉杏花村在府秀山門外里許因唐杜牧詩有牧童遙指杏花村得名南畿志云有古石井圈刻黃公廣潤玉泉六字國朝郎遂有杏花村志杜塢在府城西四里因杜牧得名其下有杜湖閔源在九華山東巖由神光嶺南繞東巖外上中下凡三處皆産茗此閔茶所由名桃源在建德縣南四十里步頭村水源深邃人迹罕至唐乾符中黃巢之亂邑人多避於此石印池在建德縣石印山下宋周必大録云縣北六里斷崖石壁之上有印文圓如馬蹄兩兩相對舊傳許旌陽逐蛟至此所留也流觴瀨在九華山百丈潭上有石渠唐李昭象與客泛觴於此黃花驛在東流縣北以陶潛種菊之地故名又有菊所鵲頭戌在銅陵縣鵲頭山六朝皆置戍黃屯在府東南六十里唐乾符中黃巢常屯此因名有黃屯堰南畿志云東二百里有石岡名鐵劵相傳唐賜巢鐵劵處三墩九曲在石埭縣後南畿志云墩有三以應三台水九曲以應九曜郭璞以厭火災峽山寨在府西宋開寶七年曹彬伐江南拔峽山寨進克泗州是也劉公寨在青陽縣南宋建炎中劉光世因險立寨禦張遇於此丹井在青陽縣九華山北葛洪煉丹井也金叉井在石埭縣西峨山之麓唐桂盛女盡節處白龜泉在青陽縣化城寺西龜山下蔣之奇題名石上龍女泉在青陽縣東巖相傳金地藏卜居方苦遠汲俄有少女云石下有泉因以手撥石泉果湧出又有甘泉在東巖中峯下明嘉靖初湛若水講學於此後建書院旁有一泉公自署曰甘泉舒姑泉在石埭縣南三十里蓋山下百步梁劉峻書蓋山之泉聞弦歌而赴節相傳昔有舒氏女與其父析薪至此牽挽不動俄化為泉其母曰吾女性好音樂乃作弦歌泉涌回流有朱鯉一雙云金雞石在府城西五十里埤雅云江南富姓者莊前一石月下忽作雞聲遂名金雞石天柱石在石埭縣陵陽山唐李白所築定城石在石埭縣前街中長一丈二尺廣五之一相傳郭璞遷縣立此石石鏡在石埭縣櫟山其石縱橫二丈光明可鑑人物鹿迹石在東流縣東六十里相傳葛洪跨白鹿仙去處江南通志卷三十四
