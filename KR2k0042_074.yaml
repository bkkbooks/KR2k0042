  text: 江南通志卷七十五食貨志户口二屯丁附安徽布政使司國朝順治初年原額人丁一百四十八萬六千八百五十二丁内除編審開除逃故無徵人丁三十八萬三千六百七十六丁七分四釐十四年審増四萬六千五百四十五丁五分康熙元年審増三萬九千一百八十八丁七分五釐六年審増三萬一千六百二十五丁七分五釐十一年審増二萬二千六百三十五丁七分五釐十六年審増二萬七千五十三丁二十一年審増一萬九千七百三十三丁三分二十五年審増二萬七千五百六十丁三分三十年審増二萬五千四百七十一丁九分又鳳陽府屬靈璧縣審除二千三百八十四丁三十五年審増一萬七十六丁五分四十年審増一萬九百六十三丁八分四十五年審増一萬六百七十一丁一分五十年審増六千六百八十七丁一分五十五年起審増滋生一萬二百丁六十年審増六千四百八十五丁雍正四年審増四千四百七十一丁九年審増七千一百二十五丁雍正十三年實在人丁一百四十萬七千二百八十五丁一釐又徽州府婺源縣内江西樂平徳興二縣寄庄人丁八十七丁内大小鄉紳舉貢生員優免人丁二萬一千四百三十一丁辦糧當差人丁一百三十五萬七千六百六十丁一釐滋生人丁二萬八千二百八十一丁額外歸併省外衞所原額黄快竄丁并三則閒丁七萬六千一百八丁内除駕運漕船領佃納糧例不納銀屯丁併豁免逃故無徵各丁三萬七千一百五十七丁五分又於康熙四十三年欽奉上諭事案内豁免黄快屯丁七千三百四十一丁五分節年審増各丁一千三百一丁雍正十三年實在黄快竄丁並三則閒丁三萬二千九百一十丁又池州府建徳縣歸併江西撫饒二所屯丁一百六十九丁内當差屯丁三萬二千四百二十八丁滋生屯丁六百五十一丁安慶府國朝順治初年原額人丁四萬九千六百一十七丁五分内除逃故無徵二萬二千五百五十六丁七分四釐十四年審増六千三百一十三丁五分康熙元年審増六千七百八十八丁七分五釐六年審増一千二百四十一丁七分五釐十一年審増七百三十丁七分五釐十六年審増七百四十九丁二十一年審増六百六十一丁八分二十五年審増一千三十四丁三分三十年審増七百七十四丁九分三十五年審増三百六十二丁五分四十年審増九百六十八丁三分四十五年審増四百九十丁一分五十年審増二百三十八丁一分五十五年起審増滋生二百九丁六十年審増三百一十七丁雍正四年審増三百七十七丁九年審増四百二十四丁雍正十三年實在人丁四萬八千七百四十一丁五分一釐内優免人丁二千一百三十三丁當差人丁四萬五千二百八十一丁五分一釐滋生人丁一千三百二十七丁懷寧縣原額人丁一萬一千二百六十一丁内除審減四千四百四十五丁二分七釐節年審増八千一百六十七丁二分七釐實在人丁一萬四千九百八十三丁内優免人丁四百八十四丁當差人丁一萬四千三百三十八丁每丁科銀一錢六分八釐三毫有竒滋生人丁一百六十一丁桐城縣原額人丁八千七百一十九丁内除審減一千七百八十四丁節年審増二千二百七十七丁實在人丁九千二百一十二丁内優免人丁七百八十九丁當差人丁八千二百三十一丁每丁科銀三錢五分八釐七毫有竒滋生人丁一百九十二丁潛山縣原額人丁一萬一百四十一丁内除審減八千一百八十七丁五分節年審増五千二百二十四丁實在人丁七千一百七十七丁五分内優免人丁二百三十二丁當差人丁六千九百四丁五分每丁科銀三錢一分一毫有竒滋生人丁四十一丁太湖縣原額人丁九千九百二十三丁内除審減五千八百五十六丁節年審増三千六百八十七丁實在人丁七千七百五十四丁内優免人丁二百四十四丁當差人丁六千七百七十四丁每丁科銀二錢九分五釐有竒滋生人丁七百三十六丁宿松縣原額人丁六千七十四丁内除審減一千八百九十九丁九分七釐節年審増九百二十九丁九分八釐實在人丁五千一百四丁一釐内優免人丁二百三丁當差人丁四千八百四十九丁一釐每丁科銀二錢二分六釐三毫有竒滋生人丁五十二丁望江縣原額人丁三千四百九十九丁五分内除審減三百八十四丁節年審増一千三百九十五丁五分實在人丁四千五百一十一丁内優免人丁一百八十一丁當差人丁四千一百八十五丁每丁科銀二錢七分四釐一毫有竒滋生人丁一百四十五丁徽州府國朝順治初年原額人丁二十萬五千七百八十六丁十四年審増七千五百六十丁康熙元年審増一千五百四十八丁十一年審増一千二百四十二丁二十一年審増三百一十四丁二十五年審増一百六十二丁三十年審増五百九十二丁三十五年審増一百一十三丁四十年審増一百九丁四十五年審増三十三丁五十年審増三十丁五十五年起審増滋生一百六十四丁六十年審増一百三十八丁雍正四年審増二百六丁九年審増三百一十六丁雍正十三年實在人丁二十一萬八千三百一十三丁又江西樂平徳興二縣寄庄婺源縣人丁八十七丁内優免人丁三千三百七十四丁當差人丁二十一萬四千二百二丁滋生人丁八百二十四丁歙縣原額人丁七萬二千六百四十七丁節年審増二千五百二十丁實在人丁七萬五千一百六十七丁内優免人丁七百六十七丁當差人丁七萬四千三百七十九丁每丁科銀一錢五釐四毫有竒滋生人丁二十一丁休寧縣原額人丁六萬三千七百九十五丁節年審増二千一百七十三丁實在人丁六萬五千九百六十八丁内優免人丁六百九十三丁當差人丁六萬三千二百三十八丁每丁科銀一錢一分八釐一毫有竒滋生人