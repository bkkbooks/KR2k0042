body:
  text: 江南通志卷九十九職官志文武之制備矣蒞之者官也唐虞肇州置牧以任其外周禮州長縣正之屬益詳江南自吳楚設官稍變古制秦改郡縣置守令自是為國為郡為州為道為軍為路為行省為南直隸因事號官增省因革規制各殊要其上下僚吏相統相屬若使臂使指之效則同也既列其官而繫以人又擇其人之賢有治行者紀之以風有位故曰不惟其官惟其人為類三為卷二十作職官志第六文職一蘇轍謂古者即官取人出以為守令入以為卿相出入相受內外相貫蓋言文職之簡要如此然自唐虞三代置州牧秦置監察御史漢初更遣丞相史督御史其後置刺史當時目為外臺猶御史之職也至隋以州統縣自是刺史為太守之互名非其舊職唐始置巡察復改採訪處置使至宋元諸使遞有增置一如古御史之職而守令隸屬焉明置巡撫復置總督並帶都御史為持節使官其下有二司諸道以逮守令國朝因之而裁省改設江南為多誠以財賦要區川陸所會事理劇於他省吏民尤務均安也録前代之有可考者而我朝自守令以上並備著之周秦建官之制莫詳於周上大夫受縣下大夫受郡其在六鄉則有州長黨正閭胥族師六遂則有縣正鄼長里宰之屬大小相維纖悉畢具是時江左之地僻在東南屏居要服前隸勾吳後屬楚越六典未修加以事遠代湮簡編闕略稽其名氏無文可徵其存什一於千百者若伍尚為棠邑大夫見左傳昭公二十年公子繁為巢大夫見杜預經傳集解還無社為蕭大夫見左傳宣公十二年華豹為吕封人見左傳昭公二十一年髙哀為蕭封人見左傳文公十四年公孫聖為東掖門亭長見吳越春秋莊周為漆園吏見史記老子列傳之類外此罕聞焉至秦混一區夏罷侯置守改封建為郡縣始以郡統縣郡置守丞尉各一人守治民丞佐之尉典兵復置監察御史以察諸郡牧民守土各有攸司官制為之一變然當時江左郡邑之吏自會稽守殷通吳令鄭昌而外若泗川守壯則佚其姓楚尹薛公又失其名蓋不可考者多矣故敘職官斷自兩漢始漢仍秦制諸州置監察御史文帝十三年以御史不奉法乃遣丞相史分刺諸州以督之不常設元封元年御史止不復監五年置部刺史掌詔六條察州江南為揚徐豫三州之地有三刺史成帝綏和元年以刺史位下大夫而臨二千石輕重不相準乃更為州牧秩真二千石哀帝建平二年罷牧復置刺史元夀二年復設州牧光武中興仍置刺史自西漢以來刺史周行郡國無治所後漢始建所治之地時揚州刺史治歷陽後徙夀春建安中又治合肥徐州刺史治郯漢末又治下邳豫州刺史治譙靈帝中平五年又改置牧其州之官屬有别駕治中兵曹部郡國從事是為從事史有主簿門亭長功曹書佐書經師月令師律令師簿曹書佐典郡國書佐是為假佐皆州自辟除凡一州統數郡郡之附州者為都置一尹一丞其不附州者為郡置一守一丞一尉守之佐有功曹史五官掾部縣督郵門亭長主記室史閣下及諸曹各有書佐幹凡一郡統數縣縣萬户以上者置令萬户以下者置長皆有丞尉凡縣中十里一亭亭有長十亭一鄉鄉有三老有嗇夫有遊徼三老主教化嗇夫收賦稅遊徼巡盜賊謂之鄉官其郡為諸侯王國者置內史以掌其治成帝綏和元年省內史以相治民皆不置守每郡國各置文學一人統部漢魏相黃霸何武以上揚州刺史田况青徐二州牧王尊徐州刺史刁子都徐州牧後漢陳翔張禹觀恂嚴遵巴祗尹耀劉祜臧旻袁遺鄭泰敬紹陳溫陳瑀劉繇溫恢劉馥陳禕陳儒周乾以上揚州刺史樊曄傅俊歐陽歙鮑永以上揚州牧陸續揚州别駕吳範揚州從事車胄臧霸浩周百里嵩王景劉福楊秉應志蓋豫巴祗以上徐州刺史陶謙吕布以上徐州牧關羽行徐州事滕撫督徐揚二州事牽招桓範以上都督青徐諸軍事趙昱糜竺以上徐州别駕王朗徐州治中陳宫徐州從事黃琬豫州牧分轄漢張諫王子鳳以上丹陽太守嚴助朱買臣周君秋君許持以上會稽太守汲黯尹翁歸韋𢎞以上東海太守吳穰陳咸陳萬年以上廣陵太守楊季趙增夀郭稚以上廬江太守戴聖王嘉房鳳申屠庾馬宫以上九江太守石慶何武石詡段會宗以上沛郡太守薛宣路溫舒孔武孔安國以上臨淮太守後漢李忠陳夤臧旻周昕吳景朱翔張馴髙瑞唐翔蔣休周歆方儼馬稜童恢韓演江漢方熙叔袁印徐琨劉舒吕範孫翊孫瑜周尚以上丹陽太守李君黃讜第五倫尹興黃競慶𢎞張霸馬稜蔡君以上會稽太守宰鼂會稽都尉行太守事趙牧苦均成公浮劉府君王衡韓整朱梁蕭冰郭君薛固糜豹范君東門奐李肅徐參許貢陳瑀成憲僮和芮祉以上吳郡太守朱治吳郡都尉行太守事鄭𢎞堅淮隂太守滕撫歐陽參范邈趙苞趙昱王喜張綱荀曇陸稠張微橋基陳登張超王建以上廣陵太守王景第五頡應融盧植朱宇羊續范式張磐陸康朱光李術孫河劉勳以上廬江太守梁統宋均鄧晨元賀陳威邱騰鄧顯楊岑陽球服虔邊讓陳紀芮祉以上九江太守孫萌袁安宋湛以上楚郡太守文穆彭城太守王良鄭渾以上沛郡太守鄭𢎞朱暉以上臨淮太守何敞汝南太守三國魏吳各設官屬於揚州有郡守有國相有內史魏黃初三年始置都督諸州軍事每兼領刺史凡刺史任重者為使持節都督輕者為持節其庶姓為州而無將軍者謂之單車刺史單車刺史加督進一品都督進二品其刺史帶將軍開府者則州與府各置僚屬自别駕治中以下曰州官職主理民自長史司馬以下曰府官職主理戎其四征將軍與刺史並設者率以其州刺史為儲帥若揚州刺史與征東將軍同治夀春是也其廬江淮南廣陵尤為吳魏狎爭之地遣官設戍罷置不常於是吳有皖口將軍濡須督魏則蕩寇將軍屯軍合肥兖州刺史典兵淮南吳徙治建業建業故屬丹陽吳始設建業守又立新都郡置新都太守立東安郡置東安太守其他郡守縣令多從漢制又魏黃初元年州郡皆置中正吳亦置其職謂之公平統部魏曹休王基王凌滿寵母邱儉諸葛誕以上揚州都督曹仁督荆揚益諸軍屯合肥孫禮稽喜文欽樂綝以上揚州刺史蔣濟揚州别駕胡遵督青徐諸軍鍾育衛瓘以上都督徐州軍事吕虔鄒岐王昶石苞胡質胡威以上徐州刺史王祥徐州别駕吳諸葛恪吕範以上揚州牧分轄魏劉靖李膺張休以上廬江太守陳琮汝隂太守盧育江蕤邵相徐邈以上譙郡太守夏侯莊丁尊以上淮南太守向韶彭城太守司馬芝沛郡太守吳諸葛恪滕印太史慈李衡聶友孫印沈瑩以上丹陽太守丁固諸葛靚以上建業太守吳展賀邵謝勗太史亨以上吳郡太守吳讓廣陵太守吕蒙徐盛孫邵全琮以上廬江太守賀齊諸葛融沈矯以上新都太守晉初以刺史治民别設都督治軍位刺史上惠帝末年始併都督於刺史復漢州牧之舊非要州則單為刺史渡江後尤以都督中外為重必大臣位望最隆者居之其制都督諸軍為上監諸軍次之督諸軍為下使持節為上持節次之假節為下其都督揚州諸軍事多以宗籓近屬為之間遣重臣出鎮蓋異數也舊河南部設司隸校尉及徙都建業即以揚州刺史代司𨽻之職其丹陽亦改為丹陽尹蓋郡置太守王國置內史而京師所在則謂之尹凡刺史每州一人三年一入奏其刺史帶將軍開府者則各置僚屬分典軍民大抵多沿魏制惟於别駕治中諸曹從事而外增置武猛從事員又改功曹書佐為西曹書佐其郡守僚佐惟不設都尉晉郡守皆加將軍之號無者恆以為恥縣大者置令小者置長縣置方略吏四人先是洛陽設六部尉及建康為王畿亦置六部尉縣佐有主簿功曹廷掾法曹金倉賊曹掾兵曹賊捕掾等員獨不置丞其鄉官五百户以上置一鄉三千户以上置二鄉五千户以上置三鄉萬户以下置四鄉鄉置嗇夫一人縣率百户置里吏一人户千以上置校官一人宣帝時加置大中正故中正有大小之異郡國皆置文學掾一人自晉室中興以後沿革多端或太守而改為內史如建武以前為吳郡太守建武以後為吳國內史之類或一郡而分為三郡若毗陵一郡改為晉陵義興蘭陵三郡之類或一人而兼領二州若徐兖二州同置京口二州刺史一人兼領之類或一人而分為二守若京口僑置南徐州義熙七年恢復中原復置北徐州於彭城南北遂有兩徐州刺史之類或隨地而建官若徐州獨置淮海從事之類或假名而建郡若於棠邑置秦郡太守春穀置襄城太守之類他若分廣陵為山陽析廬江為晉熙改新都為新安割丹陽為宣城易九江為淮南郡邑既更官職隨異殆不可以屈指計劉子澄圖經曰晉平江左郡縣仍漢之舊永嘉南渡官稱地制始紊蓋僑郡之建守之中有守焉若更僑置州則督牧刺史紛不可詰矣故今於僑置諸官其不可考究者皆不復著録焉統部西晉石苞陳騫周浚王渾王浚褚契司馬駿以上揚州都督陳徵曹武以上揚州刺史王渾胡奮嵇紹嵇喜周馥髙誕王琛以上徐州刺史東晉王敦王導郤鑒王述殷浩桓豁桓沖王坦之何充司馬道子司馬元顯以上揚州都督謝安都督揚江等十五州軍事桓溫揚州牧應綽劉陶郤隆劉機王浹王顯王舒殷浩蔡謨陶瞻庾冰袁𢎞褚裒毛武生謝安謝元王謐劉義真以上揚州刺史司馬胄司馬越石崇司馬懋司馬恬以上徐州都督裴盾祖逖蔡豹卞敦王邃劉遐褚裒荀羡謝元劉道憐羊陶羊緯劉咸羊忱庾亮王舒蔡謨王藴王含以上徐州刺史郤曇范汪庾希郤愔刁彞桓溫謝琰劉懷慎以上徐兗二州刺史周顗郤鑒荀羡以上兗州刺史王恭兗青二州刺史鎮京口朱序青兗二州刺史鎮淮隂劉牢之兗青都督鎮京口司馬裒青徐兗都督鎮廣陵司馬晃司馬肜阮垣以上都督青徐二州軍事劉隗都督青徐幽并桓修撫軍將軍鎮丹徒紀瞻都督京口以南軍事劉毅劉道規以上都督宣城諸軍事庾懌謝萬劉毅何無忌諸葛長民以上豫州刺史劉道憐督淮南諸郡戴淵都督六州軍事鎮合肥分轄西晉朱建王曠王導薛兼孔沖以上丹陽太守張澄胡沖殷祐顔含以上吳郡太守傅咸吳國內史張夔華談以上廬江太守程元談黃積以上新安太守何攀宣城太守鄧殷裴碩以上淮南太守劉隗孫惠以上彭城內史東晉劉隗戴邈諸葛恢溫嶠阮孚羊曼褚翜顧衆高悝何充殷融桓景周謨劉惔王胡之孔嚴庾和王劭韓伯王坦之王藴沈嘉王恭王琨王雅王國寶車印王愷司馬恢之袁豹孟脈郤僧施劉穆之徐羡之以上丹陽尹鄧攸張茂賀循應詹樂謨趙穆庾冰蔡謨虞潭王恬荀羡庾羲王洽庾希荀蕤刁彞岑闕司馬恬虞嘯父王愷桓謙袁山松王誕司馬允之王侃王邵王薈朱騰謝裒王默虞谷魏詠之王𢎞袁湛劉柳張敞以上吳國內史張闓周懋周謨羊曼顧和劉耽郤邁汪灌殷師殷仲堪吳隱之王藴卞耽滕恬之王茂之劉牢之劉敬宣諸葛長民殷道叔謝景仁以上晉陵太守季閎南蘭陵太守孔侃蔡謨劉超顧衆荀羡褚爽桓元謝昶以上義興太守陸慧孔衍以上廣陵太守袁瓌李恆王廙梁龕張法順陶瞻袁真曲安遠毛寶劉惔殷遵胡孟康髙素張天錫王誕王含以上廬江太守李英周嵩郤愔胡育鮑𢎞殷仲文以上新安太守陶猷宣城太守孔道民鍾雅庾亮桓彞陶汪司馬允之胡彬謝尚桓祕桓序邱準毛穆之朱序郤僧施司馬文仲諸葛長民劉敬宣毛修之謝允庾元之檀祗以上宣城內史桓石民桓嗣司馬休之以上襄城太守任台路永陳逹毛穆之桓伊毛璩謝萬楊廣劉敬宣檀韶諸葛長民桓振以上淮南太守范寧臨淮太守戴􅋟沛郡太守嵇紹顔默向靖鄧殷以上汝隂太守陳頵譙郡太守王𢎞彭城太守劉遐周撫劉續何謙以上彭城內史甘卓袁耽謝尚以上厯陽內史南北朝宋有監州之任止稱監某