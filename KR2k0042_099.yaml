body:
  text: 江南通志卷一百職官志文職二隋置四州大總管揚州居其一餘州總管並加使持節至煬帝時始罷之刺史之制沿習北齊分為九等其帶總管者加使持節開皇三年罷郡以州統縣雖有刺史皆太守之互名但職理一郡無復軍府於是州府之職參為郡官有長史司馬録事參軍功户兵法七曹後改諸曹為司又改為參贊而别置都尉領兵兵與郡不相知大業三年復罷州置郡郡置太守廢長史司馬而設贊務一人以二之外置刺史十四人巡察畿外從事四十以為副復增置通守一人位次太守而改贊務曰丞在通守下其東西曹掾主簿司功倉户兵法士曹等書佐各因其郡之大小而為增減改行參軍為行書佐焉其州縣先分為九等者至開皇十四年定為上中下三等凡縣或為令或為長令長之下為丞簿尉煬帝時嘗改縣尉為縣正其鄉官之制開皇初皆經吏部除授至十五年罷州縣鄉官鄉官之廢自隋始統部韓洪郭衍以上蔣州刺史皇甫績劉權陳子邁以上吳州刺史聞人遂安蘇州總管房恭懿海州刺史高勱楚州刺史賀若弼吳州總管鎮廣陵燕榮揚州總管上官𢎞李叔仁以上揚州刺史汪華歙州刺史陳稜王選周超以上宣州刺史韓擒虎薛胄以上廬州總管梁士彥元景山伊婁謙元胄以上譙州總管爾朱敞吐萬緒乞伏慧和𢎞房兆以上徐州總管董純彭城留守孫萬安梁洋以上徐州刺史元矩夀州總管分轄李顯蘇州太守趙他淮揚太守錢讓馮慈明王世充陳稜以上江都太守徐俱羅向道力以上海陵太守樊子蓋樅陽太守席大雅楊榮以上宣城太守唐初有五大總管府武德七年改為大都督太極初以并益荆揚為四大都督府凡都督兼刺史者不檢校州事以長史領之景雲二年始有節度使之名開元中天下凡八節度後諸道皆置節度而江左始有節鉞至德元年設淮西節度使領楚滁和夀廬舒諸州治揚州建中二年增領泗州長慶元年增領宿州咸通四年增領濠州乾元二年設浙江西道節度使後改為鎮海軍領升潤宣歙蘇常諸州治升州徙治蘇州又治潤州貞元四年設徐泗濠節度使後改名武寧軍又名感化軍領徐泗濠三州治徐州元和四年增領宿州他若譙汝𨽻河南至德元載徐泗屬淮西上元二年海泗入淄青寶應元年潁泗𨽻永平大厯十一年海州歸汴滑乾元二年雖統轄有歸而使節所臨要非江南之域故不復載凡節度之職總軍旅專誅戮建牙樹纛為國重臣其屬有副使一人行軍司馬一人判官二人掌書記一人隨軍四人參謀則無定員若朝覲則置留後其不置節度者則設防禦使初防禦與採訪各置一人防禦理軍事採訪理州縣天寶中始以一人兼領之淮南採訪使治揚州其屬為揚州廣陵郡望楚州淮隂郡緊滁州永陽郡上夀州夀春郡中廬州廬江郡上舒州同安郡上名至德二載改盛唐郡和州歷陽郡凡州郡七江東採訪使治蘇州其屬為升州江寧郡望潤州丹陽郡望常州晉陵郡望蘇州吳郡雄凡州郡四江西採訪使治洪州係今江西南昌府地其屬為宣州宣城郡望歙州新安郡上池州上凡江南州郡三河南採訪使治汴州係今河南開封府地其屬為潁州汝隂郡上亳州譙郡望徐州彭城郡緊泗州臨淮郡上濠州鍾離郡上海州東海郡上宿州上凡江南州郡七採訪之置昉於開元二十二年自至德以後始改採訪為觀察觀察之職察所部善惡以舉政綱或節度使兼領之或廢節度則設觀察觀察嘗并領都團練使蓋防禦之改為團練猶採訪之改為觀察觀察并領團練即採訪兼領防禦之制也觀察之屬有判官二人支使二人推官一人皆自辟召其餘諸使如貞觀二年有經略使八年有十八道黜陟使有觀風俗使天授二年有十道存撫使聖厯中有安撫使神龍二年有十道巡察使景雲二年有十道按察使乾元中有都統使貞元八年有諸道宣撫使大中五年有制置使又有度支營田使守捉使轉運使租庸使兩稅使鹽鐵使之屬廢置不常不可枚舉內如巡察安撫存撫等使無定員亦不時設而轉運之職其後率以宰相充之諸道自揚州至鄭滑分置巡院皆統於此此皆統臨諸郡之大吏也至於州郡之職自武德元年改郡為州改太守為刺史天寶元年改州為郡改刺史為太守由是刺史止守一郡雖有使持節之名實一太守之職其州府之佐多沿舊制惟改治中從事史為司馬又永徽二年改别駕為長史其後復置别駕遂與長史並設凡郡府各置經學博士一人其縣令有赤緊望上中下六等之差自令以下有丞有簿有尉武德間嘗改尉曰正有助教會昌中嘗裁減州縣官二千餘員又元和間李吉甫議併省州縣凡減冗官八百員每縣中百户為一里里置正一人五里為一鄉鄉置耆老一人三十里置一驛驛各有將多以州里富強者主之統部杜伏威淮南安撫使狄仁傑江南巡撫李光弼八道行營都統李元素韋黃裳以上浙西節度使周寶李從誨李鋋錢鏐以上鎮海軍節度使李世嘉蘇州都督曹圭蘇州制置使吳從衆劉微張願畢炕李希言鄭炅之張有德楊志梁知微隂崇李顓許韶伯劉日正蕭誼徐矯裴澄崔斌以上江東採訪使李栖筠李涵韋元甫白志貞丁公著王璠路隋曹確盧商崔郾敬晦崔慎由盧簡辭李丹鄭朗李景遜崔瑶崔琢蕭置楊收裴璩錢鏐以上浙西觀察使韓滉浙東西觀察使李垣李神符李績李恭孝崔義元李孝逸蘇瓌韋溫以上揚州大都督張鎬田祁功崔圓以上江淮都統柳沖江淮安撫使鄧景山王鍔杜亞裴度李夷簡張延賞李鄘李景讓段文昌杜佑韋元甫李玨李紳李吉甫李蔚王播王紹李逢吉衛次公李鍔齊撫牛僧孺李承式李德裕杜悰崔鉉令狐綯馬士舉戴可師髙駢楊行密楊渥以上淮南節度使阮結潤州制置使班景倩江淮採訪使裴耀卿楊慎矜第五琦韓滉包佶元琇竇參張滂李巽劉晏潘孟陽裴休以上江淮轉運使元載江淮發運使鄭敬德江淮宣慰使陶雅江淮招討使韓泂江淮黜陟使李承淮南西道黜陟使范傳正崔衍洪經綸王質薛雍盧坦韋溫楊收穆贊王沔許季同竇易直范傳式陸亘髙元裕房式王遂崔璵鄭薰裴休劉贊崔鉉杜宣猷李璋梓潼竇潏秦彥趙鍠裴樞田頵臺濛以上宣歙觀察使張鎮周舒州都督劉存舒州團練使張建封滁廬夀觀察使張萬福舒廬夀都團練使李貞徐州都督裴通任瓌以上徐州總管張建封徐泗濠節度使張愔王紹李願李訴崔羣王智興高瑀崔珙薛元賞郭銓李廓盧𢎞正康季榮田牟溫璋王式張慎思以上武寧軍節度使支祥時溥以上感化軍節度使崔彥曾徐州觀察使李鄘徐州宣慰使李洧徐海沂觀察使分轄盧尚祖蔣州刺史韋黃裳顔真卿侯令儀張雄馮𢎞鐸李祈福秦裴以上升州刺史張有德李靈夔李元祥李元嬰郎餘慶李孝廉李明袁誼李上金胡元禮張廷圭李無言莊肅任昭慶張均李栖筠張義方韋之晉韋元甫蕭定李丹李復韋應物張丹元齊抗于頔李事舉韋夏卿崔衍李素王仲舒范傳正張正甫韋覬元錫李應田敦崔倰李涵李乂李諒白居易陸亘胡德言狄兼謨李紳崔蔇劉禹錫盧周仁李昌李道樞李嶷楊漢公曹瓊楊發裴夷直崔鈞盧簡求崔璞李繪趙傑張元逸張摶楊茂實趙載王藴王摶張雄徐約沈粲杜儒林李友成及臺濛李岵韋建中宗瑗韓邠宋儼王遘王選姚𢎞慶林詳馮衮李鼎段同泰李昭王成以上蘇州刺史岑軻武遷趙居貞崔巽以上吳郡太守李延道李元道劉德敏李孝逸李行穆長孫濬薛登姚崇靈幼孫房挺禇琇崔巽盧瑗崔瑨孫會孫徽韋晉韋昭理齊浣李栖筠獨孤及蕭復韋夏卿李巽盧元輔裴肅賈全穆贊辛祕孟簡薛戎李遜李翦鄭丹賈餗楊虞卿李從誨楊恂盧鈞韋縜馬植朱實王枳以上常州刺史盧奐杜庭誡李子智竇德明以上晉陵太守謝元超薛寶積李元義李厚德盧承慶喬師望盧朗盧明來敬業李思文張公休竇孝諶盧徽逺王美暢畢構韋銑李濬陸象先李元乂唐若山王琚韋昭理齊浣王景肅嚴損之林洋閻敬之劉彚季廣琛韋儇韋損韓賁樊晃蕭定馬炫韓滉王緯李若初李錡韓皋閻濟美薛蘋李翛竇易直李德裕賈餗杜審權髙駢安仁義以上潤州刺史宋璟崔侁李藏用薛玨李聽韋瓘李鎖以上楚州刺史韋嶽李雍杜令昭李行言以上海州刺史李憲李尚義王衆仲柳學誠王從易以上揚州刺史竇從道揚州太守張買臣吳州太守張知謇吳兢韋曾崔厦韋佶薑翊陸倜韋悅然鄭甫王侁裴靖劉秋子吕渭李義先獨孤及張萬福胡珦張次宗李德修豆盧瓉李素節張彥遠孔威楊漢公鄭咸倪章鄭榖李翶裴瞿曇李玨髙澞李祁福元豆崔昭以上舒州刺史王雄誕龎濬蘇瓌盧渙季廙李揆公孫綽蕭復陸傪崔淙韋綬崔元亮馮宿邢羣李敬芳盧潘于德晦任宇盧肇張裕李擢吳圓陸希聲于濤吕季重權若訥盧廷昌盧瓊孫緯薛抃韋瑜裴樞魯邰以上歙州刺史李元曉鄭義之陶大舉張知謇楊元琰裴耀卿班景倩竹承構裴敦復李志和趙悅陳少遊裴胄盧復令狐楚崔羣沈傅師崔惇崔龜從崔鄲于敖裴諗溫璋陶世長盧肇獨孤霖王凝李義本唐伯裕范冬芬姚昌閏楊元禕長孫元翼豆盧靈昭李行穆魏正見以上宣州刺史李芃鄭羡李遜裴度張嚴李冉蕭復孫願齊映齊照韓贄霍總封敖李倨賈恆柳子華吳都官盧肇李方元杜牧鐔銖崔行儉李混竇潏趙鍠吕師造裴樞韓守威朱灣以上池州刺史畢璟薛縉竇彧朱敬則韋嶽子武重規李迥秀敬湘薛升李萼裴諝賈深羅珦李翺溫璋劉佑路應求羅立言盧潘董璟張博鄭綮郎幼復以上廬州刺史顔元孫張萬福張鎰員半千史備許孟容劉茂復侯固以上濠州刺史李顯逹陸子才論惟正柳寶積王勗李岵鄭誠李廓以上潁州刺史張思莊張文宗姚崇裴諝李繁裴清李彚陳璠楊凝張克以上譙州刺史李洧李元軌李元曉李元慶李璩王瑩崔敏慤盧齊卿薛瑜姚元之張九臯蘇詵陸易曹升梁乘路齊暉髙承宗獨孤華髙明應盧士玫以上徐州刺史李憕彭城太守韓思復李幼卿韋應物李紳李德裕宇文守節李景元裴儔關播盧邁李濆髙錫望郭廷以上滁州刺史張無擇張知謇穆寧張萬福劉禹錫凌凖張惟儉以上和州刺史趙環張公度李文通髙智周以上夀州刺史蘇晉常知人杜慆以上泗州刺史五代迭興百務草創故官制不講凡齷齪無能者始注為縣令故天下之邑率皆不治甚者誅求刻剝猥瑣萬狀又縣尉之職久廢盜賊鬬競皆屬鎮將而江南之地自徐宿潁亳四州置諸使外楊吳及南唐於金陵江都二郡置尹南唐改金陵尹為江寧尹餘郡皆置刺史吳刺史以下有副使司馬參軍諸職南唐不設副使而增别駕録事其節度制置觀察團練防遏等使楊吳多循唐制南唐改防遏為指揮若諸幕僚吳有副大使行軍司馬行軍副使判官掌書記推官巡官衙推之屬南唐增置留後及支使餘皆踵吳之舊統部梁王敬堯蔣殷朱友璋以上武寧節度使唐李承約髙行周以上潁州團練使韓倫劉熙以上亳州團練使李紹真李紹榮房知溫李周李從溫以上武寧節度使晉何福進潁州防禦使馮玉潁州團練使萇從簡侯益趙在禮符彥卿以上武寧節度使漢王周劉贇以上武寧節度使周王凱楚州防禦使向拱李重進以上淮南節度使荆罕儒揚州團練使王祚宿州團練使王彥超王晏向訓以上武寧節度使趙匡贊廬州節度使吳徐知諫潤州團練使盧文進徐知詢鎮海節度使臺濛漣水制置使王綰漣水防遏使南唐趙仁澤姚鳳以上常州團練使馮謐常州觀察使張彥卿楚州防禦使趙宣輔宣歙常潤安撫使宋齊邱張居詠以上鎮海節度使嚴續殷崇義以上潤州節度使盧絳李𢎞冀以上宣潤大都督留從惠揚州觀察使朱元司超以上舒州團練使馬希崇舒州節度使徐價周宗徐知證盧絳以上寧國節度使楊璉王彥儔以上康化軍節度使馬仁裕昭順軍節度使李章王崇文以上永安節度使鎮廬州郭全義濠州觀察使劉仁贍清淮節度使鎮夀州吳越孫承祐平江節度使分轄梁錢元璙蘇州刺史康懷英宿州刺史王重師李彥威以上潁州刺史周韓令坤知揚州邊翊知通州楊昭揮郭令圖吕濟叔舒州刺史李榖劉重遠髙懷德以上行廬州府事元矩王繼儔以上雄州刺史張永德和州刺史吳徐溫徐知詢徐知諤徐知誥以上金陵府尹唐彥隨張訓李遇張伯悰徐景邁以上常州刺史李德誠徐知誥林仁肇以上潤州刺史陳宣海州刺史陶雅骨言歐逵以上歙州刺史南唐李景遂金陵府尹睦昭符禹萬誠以上常州刺史李金全尚全恭以上潤州刺史吳廷紹褚仁規郭載方訥皇甫暉以上泰州刺史施仁望周祚周廷構以上舒州刺史龔慎儀歙州刺史朱匡業林仁肇李從鎰韓權張琄宗文珍以上宣州刺史何敬洙楚州刺史皇甫繼勳嚴續周宗陳德誠以上池州刺史鍾美李翰以上知雄逺軍江南通志卷一百
