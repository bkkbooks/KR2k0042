body:
  text: 江南通志卷二十二輿地志公署一常江蘇松四府周禮冢宰以八法治官府鄭氏云百官所居曰府葢與宰夫之職掌官契以治蔵者異焉委蛇委蛇退食自公召南所由賦羔羊也今江南地廣事繁文武大小之吏較旁省為多凡改設増置則廨宇隨之陟其堂皇履其燕寢仰惟清慎勤之訓㫖而鈴閣琴堂皆實心實政之所自行矣江寧府總督部院署在府城東北江寧將軍署在滿兵城内左翼副都統署右翼副都統署俱在將軍署東南江寧織造署在府城東北安徽布政司署在府城南大功坊庫在司署内經歴署在府城淮清橋東長盈庫大使署在道署後東首倉大使署在復成橋江安糧道署在府城南布政司署東道庫在道署内庫大使署在利涉橋西北通省驛鹽道兼巡江寧道署舊在府治西雍正十年移按察司舊署附巡道陳宏謀公署記雍正簡命九年春余自維揚郡守奉𫝊鹽法適以前一年江擢江寧臬副整飭通省驛臬移駐蘇州其江寧郡屬向所𨽻於常鎮道者改𨽻驛鹽道就近兼巡葢聖天子設官分職所以為吏治民生計者量地制宜深且悉矣道治舊以肅郵覈引飭文移司勾㑹不與境内民事余受斯職旣兼巡省㑹合屬吏民以公事來治所駢肩錯轂顧近市湫隘堂廡卑庳無以肅風紀嚴聽斷請之臺丞移咨所部遂以臬署改建焉而臬署虚已逾年日就傾圮余為捐俸庀材時被檄攝安藩藉池州蘇郡丞士俊鳩工相度得壁聞碑記則向故為巡道署改建臬司者也考其今上壬年以康熙壬子修葺落成而余適復以日十二子子之年重修告竣葢匝六十年矣夫十相配數終六十爰復其始兹署由道而司司復於道迺適㑹焉其事殆非偶然者而余因重有惕也從古國家建官制治道與時宜政由俗易葢法以相參而備化以積久而成稽之史册周美成康漢皇上纘稱文景其所由來者漸矣欽惟我維新凡所張弛承世徳訓飭官方憲章由舊率作動闗治要金陵省㑹要區繁難重地向之改道而司所以重屏藩之寄而崇廉鎮之規今之易司以道復協逺近之宜而分詳要之職要以省方觀民無負聖朝勤恤元元至意其秩雖殊其任則一宏謀粤西一介歴職翰銓備員蘭省親承帝訓寵眷頻􅈾簡授兹職是用兢兢重以制府擁節㑹城懋徳勤施文武是憲宏謀自顧菲材典型密邇報稱滋難況又統領驛郵詰姦達節典司鹽筴裕國通商其與今此分路楊鑣繩糾吏治舊職新銜相倚為重曷敢茍簡因循以報政為具文視居官如傳舍故因重修是署於其落成伐石以紀非紀署天子也紀其所以居是署者庶幾夙夜䖍共無忘若者之命也若夫聽斷有所退思有次若者葺舊更新辨方正位不失宜稱覽者自得之無俟余言覼縷矣督理龍江西新闗署在府治上新河龍江闗宣課司署龍江闗大使署俱在儀鳳門外江寧知府署在城中内橋西南明洪武初建廣積庫在府署堂左册庫在府署後堂右獄在府署大門外理事同知署在府治東中正街江防同知署在府署西管糧同知署在府東淮清橋南捕通判署在府署西北捕通判署在府土街口即蘆政公署經歴署照磨署檢校署俱在儀門西江東司巡檢署在直江口江淮司巡檢署在江浦縣浦口久裁今復設𨽻府秣陵鎮巡檢署在城南六十里秣陵闗都稅司署茶引所署俱在淮清橋東遞運所署在三山門内聚寳宣課司署在聚寳門外江東驛丞署在江東門内舊有金陵驛丞署今歸併江東驛俸給倉在府治後復成倉在復成橋常平倉在上浮橋西岸虎賁倉在府西朝天宫後普濟堂舊在三山門外明時建育嬰堂舊在三山門外國朝康熙年建雍正十二年奉㫖改建二堂於聚寳門外之佟園總督趙宏恩倡捐銀九千六百兩有竒置田撥洲又歸併舊育嬰堂田房租以給衣糧等費附鄧旭育嬰堂記康熙二十二年六月己卯日江寧省育嬰堂成其房廬田土之詳當有記書之石以垂永久諸同事者僉曰育嬰縁起旭當序之旭不敢辭因颺言曰天下事不有始之者曷啟其緒不有中之者曷恢其畧不有終之者曷底其成故余得並書所以啟其序而恢其畧以底於成者用告於來兹先是太皇太后有頒睗育嬰之典子之㫖而我世祖章皇帝有嚴飭濫棄赤皇上有故殺子女之禁於是大司冦桐城姚公文然仰體聖心因命僧慧心持書詣余囑為堂以育江寧諸嬰之不收者僧徒乾沒其金僅建庵於天壇之東十餘里湫隘荒逺人望而裹足㑹午未兩年江南大旱民不聊生棄子女者盈路不忍見間於是趙公采岳昆弟與余謀卜地於三山門外為堂以居諸嬰旣惟墨食而鳩部王公子玠復同余請方伯今太常正卿龔公捐輸並代募推移凡七百三十金公悉欣然許之此始事之經營也方公之始事也命江寧三學生員白夢鼎姚若觀季鐸等同諸父老具呈府縣遵部例上地價詳撫軍慕公又謂地茀宜屋朝廷無賣地養民理其基雖定而工費浩繁乃往請於上下江兩撫軍織造方伯臬憲糧儲驛𫝊鹽法閫司龍江蕪湖兩𣙜使及江寧太守府㕔上江兩縣督標城守諸公約共捐銀一千餘兩而安㣲臬長王公捐輸代募復得銀二百九十餘兩合計前後諸當事曁諸紳衿所輸助共一千九百餘兩而本堂之像設樓殿廊廡庖湢迄乳媪之房舍百餘間越三月告成於是龔公延諸紳謂堂之郛郭具而善後事宜奈何余與太守陳公計莫若倣蘇州條例以人計月每月人助銀三錢以辛酉季春朔日集諸人於堂中適得募金七十兩而龔公許募三十兩以足百兩之數若謂暫時補苴則可以為久遠猶未也於是前督府阿公首輸銀三百兩創佃房於虹橋龔公復合諸公佽助之計九百餘兩為新房六十五間舊房五十三間約每月可得賃金二十兩有竒猶以為未足於堂中舊置太常寺田地七十五畝外别購新田賴方伯龔公臬長金公太守于公糧㕔朱公上元于公多方曲成得上元神泉鄉田四百四十八畝合夏秋所入盡納堂中視昔之饑者漸以充寒者漸以煖尫者漸以彊稺者漸以長且多矣此巾事之經營也然由前置房言之其一月之所獲尚未足供匝月之用由後置田言之其一嵗之所入尚未足供卒嵗之需能無望繼起之大君子哉今督府于公下車之始摘奸察吏百務備舉於壬戍初冬聞江寧育嬰堂初構公戒徒𨽻節旌纛親臨西郊至止於堂乳媪負諸兒侍命于公公慰勞有加先下檄曰製衣無後時賜以繒布又捐本衙門租米九十餘石為之食猶恐不給復令所司方伯龔公太守于公撥來安縣無礙田四百二十一坵計九百二十九畝有竒用供常餼公之下車堂之婦女告饑告寒公之旋斾堂之婦女以宴以衎葢得公之莅止而克成厥終焉豈偶然哉堂旣成其地趾量畝若干堂宇間架若干堂巾像設器用若干經費銀數目若干自經始至落成為月日若干及實在嬰兒乳母簿籍若干堂去三山門半里而遥左夾鍾陵右瞰莫愁背負石城面浮雨花木末兌方而挾震勢秋位而擅春生是役也旭與子玠王公采岳趙公昆玉不過傾筐篚效倡始之謀其竭力助共襄盛舉者則自某某以下皆得書至於立法之詳捐輸之數盡列於碑隂以垂永久焉今幸際江蘇撫軍余公於子恵元元内尢加意育嬰屢頒圓妙觀禁約逺邇誦之則江寧育嬰堂中自荷慈眎較前有加矣然旭猶有慮者旭冉冉以老子玠王公采岳趙公昆弟宦遊京師行蹤無定此後事宜深有望於當事與紳衿諸先生擇有徳望者使身任其事令以無負之意與各當事暨諸公始事之勞可也謹甲恤孤記儒學教授署訓導署俱在府學内雍正十三年增建中營副將署中軍守備署俱在蘆政牌樓左左營遊擊署中軍守備署在城東城守協鎮副將署在西華門大街左營遊擊署左營守備署在城東北右營都司署右營守備署在城東北江淮衞守備署在北門橋興武衞守備署在城北上元縣知縣署在府治東北昇平橋西宋建炎間建縣丞署在縣㕔左掖即宋主簿衙正㕔明道先生均簡堂故址也康熙乙巳縣丞戴正宸即㕔後為宅典史署在縣㕔右庫在縣二堂旁獄在縣儀門内西淳化鎮巡檢署在縣東三十五里預備倉在馴象門賽工橋北俗名上倉明初建知縣陳三省修國朝康熙間知縣唐開陶増修水次倉在觀音門近大江俗名下倉監穀倉在縣署内儒學教諭署訓導署俱在學明徳堂東江寧縣知縣署在府治南明洪武初建縣丞署在聚寳門外兵馬司岡典史署在縣㕔西庫在縣二堂旁獄在縣儀門内東江寧驛丞署在城南六十里江寧鎮存留倉在城南安徳門外俗名老人倉預備倉在賽工橋南明天啟四年義民董志聰捐建常平倉在縣署儀門外右首雍正五年知縣孔毓珠倡建儒學教諭署訓導署俱在學明徳堂西句容縣知縣署在城中四牌樓北唐天祐六年建縣丞署在縣㕔東典史署在㕔西庫在縣堂後左右各一所獄在縣儀門外龍潭驛丞署在盤龍山北預備倉在縣治西明知縣韓鼎建縣丞劉義知縣李澄王僖増修官鹽倉在縣北河口鎮東西南北四倉在茅山琅琊上容移風四鄉明初知縣朱彤建知縣茅一桂增修社倉共一十七處常平倉在縣西城内嵗積倉舊在下蜀明巡撫周忱移建龍潭鎮知縣洪浦縣丞劉義知縣張蕙徐廣王僖主簿薛仁典史梁澤徐九思相繼增修添建常平倉東倉俱在縣署東雍正九年建養濟院在縣西南青元觀前明建知縣張蕙王僖修育嬰堂在城隍廟左康熙四十七年知縣胡為籀捐建儒學教諭署訓導署俱在學宫内明府丞陳宜建溧水縣知縣署在城内順治十一年知縣閔派魯建縣丞署在縣㕔左典史署在縣㕔右庫在署川堂右獄在縣儀門内俸給倉在縣㕔右先斯倉在典史署右糧倉在潢藍埠即恵民倉址國朝順治間知縣安應晬建知縣閔派魯重修預立三倉舊在縣文明門後移建縣署内一在儀門東一在儀門西一在署前便民新倉舊名永豐在高淳水陽鎮明知縣賀一桂移建縣西南三十里梅家渡國朝順治間知縣閔派魯重修儒學教諭署訓導署俱在學宫内高淳縣知縣署在鎮山城内典史署在縣㕔西北庫在縣署後堂右獄在縣署儀門外右廣通鎮巡檢署在縣東南四十里預備倉在縣治東南明初建石臼里社倉在縣北二十五里邑人韓叔陽建常豐倉舊名永豐在水陽鎮去縣三十里明知縣夏天勳移建縣治西留輝門外養濟院在縣治左明知縣劉啟東增建國朝康熙間知縣李斯佺修育嬰堂在縣治後通賢街康熙十七年知縣劉澤嗣捐建後李斯佺捐修儒學教諭署在文廟東明知縣莊鐸建訓導署在還淳齋西江浦縣知縣署在曠口山城明洪武二十四年知縣仇存仁建景泰中知縣羅信修典史署在縣㕔西阜財庫在縣川堂右架閣庫在川堂左獄在儀門西東葛驛丞署在東葛城常平倉在預備倉左明巡按駱駸曾檄建預備倉在縣儀門左常平新倉在縣二堂側雍正九年建起運存留二倉俱在縣治東社倉六一在縣儀門左一在東葛城一在湯泉鎮一在石磧橋一在新殿廟一在浦子口知縣余樞建育嬰堂在城内大營國朝雍正九年知縣趙作霖捐建并置田若干畝儒學教諭署訓導署俱在學宫内明知縣張文韜建後遷於東獄廟址國朝順治間教諭趙淶修康熙間訓導王聞晉重修浦口營都司僉書署在浦口城六合縣知縣署在滁和北岸城内明洪武元年知縣吳有源建典史署在縣㕔西銀庫在縣㕔東册庫在縣㕔西架閣庫在縣儀門外獄在縣儀門外西稅課局大使署在縣治前街西瓜埠巡檢署在縣東南二十五里瓜埠山下倉在税課局西明萬廷珵建後移建旌善亭後預備倉有東南西北四倉明初建後併縣倉常平倉在縣署西康熙間知縣魏世泰建寶成倉在元正觀東雍正八年知縣蘇作睿建普濟堂在東門内新安坊雍正二年建育嬰堂在澄清巷