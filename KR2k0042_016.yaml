body:
  text: 江南通志卷十七輿地志山川七太廬鳳三府太平府青山在府東南三十里綿亘甚逺府志云晉桓溫與袁宏遊青山共載而歸即此齊謝朓築室山南故又名謝公山峰巒層疉有林壑泉石之勝宋米芾書第一山碑在山麓尼山在府東南四里一名尼坡山麓舊有古梅數十本寒香沁人倣佛羅浮鄧尉又名梅山宋鄭羽建百花頭上亭盧鉞為之記九井山在府南十里山有九井今竭其五世傳桓溫所鑿元和志云殷仲文九日從桓元登九井賦詩即此龍山在府南十里怪石磊砢蜿蜒如龍因名孟嘉九日登髙落帽即其處縣志云輿圖考謂屬江陵龍山非是按溫鎮武昌非江陵也武昌無龍山溫時為鎮將豈得適千里遊山乎又考陶靖節集孟嘉傳云嘉令巴丘入官從事中郎遷長史在朝隤然正順而已每會神情獨得超然命駕徑之龍山顧影酣宴造夕乃還若江陵龍山距朝三千餘里何能趣命駕而竟夕返乎其為當塗龍山灼然矣郡志云桓溫嘗以重九日與僚佐登此疑必溫移鎮姑孰時事也博望山在府西南三十里亦曰東梁山與江西岸和州之梁山對峙如門故亦名天門山卧江中逺望如積黛故又名峨睂山春秋時楚獲吳艅艎於此宋孝武閲水軍有雙爵集繖蓋因立雙闕於博望褐山在府西南三十五里臨大江五代用兵處宋史云紹興二年命沿江置烽火臺於當塗之褐山即此也金柱山在府西三里宣歙諸水由姑孰入江奔㵼於此明萬厯間民掘地得金邑令章嘉貞請於郡守割千金建塔其上以鎮之初名鐵淋壁以西方屬金故名金柱黃山在府西北五里山形如初月傳有浮丘舊迹又名浮丘山上有宋孝武離宮今存凌歊臺遺址許渾詩云三千歌舞宿層臺是其處也采石山在府西北二十五里昔人采五色石於此因名一名翠螺山後漢丹陽疆域志云西臨大江為吳楚險要晉王渾駐師取吳隋韓擒虎宵濟破陳宋曹彬渡江取南唐明常遇春先登獲捷皆在此山南有磯峭拔險峻亦曰牛渚舊傳金牛出此故名輿地志云溫嶠平蘇峻亂至牛渚磯以下多怪物燃犀照之竒形異狀畢見南趾有燃犀亭在其上李白騎鯨亦在此故謫仙樓捉月亭皆在焉附梁元帝玄圃牛渚磯碑竊以增城九重仙林八樹未有船如駕鶴時度宓妃橋似牽牛能分織女丹鳳為羣紫柱成列清風韻響即代仙歌桂影浮池仍為月浦璧月朝暉金樓啓扉畫船向浦錦纜牽磯花飛拂袖荷香入衣山林朝市併覺忘歸磨盤山去郡二十里晉書云鎮西將軍謝尚守采石駐兵於此其地即將臺葛陽山在郡治北四十里上有羊耳洞藤蘿隱蔽洞前方石相傳為葛仙翁棋局東上有八仙臺潘母床相傳潘母亦仙去山勢環抱最為幽勝鸚鵡山在郡城北與葛陽山相連山有鸚鵡石雌雄各一每遇雷雨鸚鵡子從石中迸出圓潤如卵土人得之用以治疾有石嵌空側出如半帆長丈餘俗呼為船尖峰東壁諸巒環顧拱揖如欲來船者亦一竒也望夫山在府西北四十里山髙百丈正對和州城樓九域志云昔人適楚不還妻登此山望之乃化為石寶積山在府北二十里舊傳山産青緑因名宋孫仙姑跨鶴飛升於此今丹池及石刻猶存白壁山在府北二十五里濱江三峰拔起如堊一名石壁俗名龜山李白與崔宗之乘舟月夜自金陵溯流過此玩月白衣宮錦袍坐舟中旁若無人有秋月照白璧皓若陰山雪之句慈姥山在府北四十里昔楚僧真定見磯頭浪湧以杖錫開河於磯後水分舟便故又名和尚港山南峭壁臨江産圓竹聲中音律可為簫管相傳馬融所賦洞簫即此山竹也上有丁蘭祠赤金山在府東北十五里舊出銅類金淮南子食貨志所謂丹陽銅也今不産藏雲山一名神武山在府東北二十五里山髙且深可藏雲遂名中峰峭立百丈左為致雨峰雲起即雨禱輒應翰璧山在府東北四十里梁武帝起居注云大同九年鴻臚表往姑孰翰璧山采石墨即此橫望山在府東北六十里連亘三邑丹陽湖在其南左傳云楚子重伐吳至衡山即此按衡與橫通杜預注謂四望皆橫因名橫望陶𢎞景嘗隱此構讀書堂下為澄心寺關公廟廟前峭壁參天老松倒垂長百尺最髙處有王磐題壁立萬仞四字亦竒觀也凌家山在府東三里有石洞傳是陳羅二仙隱處上有凌雲塔又名凌雲山山南麓瀕姑溪去岸十餘丈為釣魚臺傳為李之儀釣魚處月盤山在府東四里一名景山有洞一亭六湖山煙雨亭其最也登其巔溪山秀列如在几筵遊者謂不讓吳下虎邱白門雨花云白紵山在府東郡志云本名楚山晉桓溫遊此歌白紵因改今名宋孝武曾遊幸至此山巔有大夫松舊稱白紵松風為一郡名勝晉山在府東十五里一名甑山壁立百仞有龍窟嵗旱人焚此窟以起龍多得雨石城山在府東二十里有石環繞如城唐羅泰記云有八角井飲馬池駕鼓臺在焉舊傳楚熊繹受封於此白土山在府東二十五里土可陶可堊東與青山連靈墟山在府東三十五里舊傳丁令威化鶴於此壇址猶存有丹洞丹井龍泉山在府東三十五里勢如飛龍有福源寺在其脊有泉傳羅浮異僧卓錫所開汲以竹則清以綆則苴濁不可食傳寺初建材木自井中出赭山在蕪湖縣西北五里江南地理志云赭山丹赤故郡名丹陽山有塔塔後滴翠軒是黃庭堅讀書處范蘿山在蕪湖縣西北五里下臨大江煙波一望無際七磯山在蕪湖縣西北十五里南史云周文育襲彭城徐嗣徽引齊人渡江據蕪湖列艦於青墩至七磯以斷文育歸路即此一名磧磯靈山一名戰馬山在蕪湖縣西南五里大江中隋唐建靈山寺於此磯山在蕪湖縣西南七里大江中蟂老蛟也磯有石穴廣一丈深不可測圖經云寧淵廟舊在其上明建靈澤夫人祠世傳蜀先主妃即孫權妹歸吳聞先主崩哀殞葬此磯在北岸原𨽻濡須登磯止見蕪湖故明髙啓有蟂磯煙鎖在蕪湖之句白馬山在蕪湖縣西南二十五里有紫燕洞冬時紫燕來蟄春則去山脊峰回石聳有洞深廣莫測夙多仙迹世稱為福地洞天焉荆山在蕪湖縣東十六里荆沼之水出焉西接小荆山有鶴迹龜文之石九域志謂即卞和得玉處非是赤鑄山在蕪湖縣東北八里圖經云楚干將造劍之所今山有干將臺相連有神山是其淬劍處上有磨劍石并池浮丘山一名隱玉山在繁昌縣東十里府志云有浮丘洞及龍池鎖虎石丹井相傳浮丘公王郭二仙隱此産茶甚佳隱靜山在繁昌縣東南三十里五峰環會泉石甚勝有寺前雙松傳為杯渡禪師手植金峨山在繁昌縣南一里迤南有金峨洞一竅通人行石枰在焉山下即峨溪匹練處磕山在繁昌縣南十里上有龍池長流不竭有龍堂禱雨輒應一名蜃居山馬仁山在繁昌縣南三十里以上類人馬狀舊名馬人唐德宗時石馬鳴厭之易今名上有五峰王沖霄隱此獅子山在繁昌縣南三十里石雄踞如獅因名有峰六眠牛一峰尤竒山椒石壁數十仞松杉竹樹與碧澗紅泉相間吞吐雲霧亦竒觀也龍華山在繁昌縣十五里有乳泉通石竇資民灌溉石上産丹桂一株近千年香襲里許邑稱龍華丹桂相近為紅花山一名荷花尖諸峰如蓮蕚下有紅花澗為邑人造紙處又西五里為杏山覆釜山在繁昌縣西北二十五里山頂如平掌上有古廟址及井泉公孫山在繁昌縣西北四十里世傳公孫捷所居有公孫橋鳳凰山在繁昌縣西北五十里山頂有鳳池鳳穴下臨荻港珠金沙大陽山在鳳凰山之北接小陽山有龍池雖旱不竭山之西麓盡於江曰板子磯寰宇記云一名返秦磯三山在繁昌縣東北三十五里三峰秀起曰老子曰方丈曰秦望上有九蓮洞東即三山磯也赭圻嶺在繁昌縣西三十里與覆釜脈接晉時出紫玉攻為器以獻太廟故名赭圻晉哀帝召桓溫入朝至赭圻詔止之遂築城於此浮鳩磯在繁昌縣東北三十里老山址出江中下有湫江月映水波不能混俗名龍王磯夏舍人山在郡治東北有夏舍人廟大江在府西自銅陵縣界流入歷繁昌蕪湖當塗三縣東北流入江寧縣界中江在蕪湖縣西南漢書地理志云中江出縣西南東至陽羡入海今縣河東逹黃池入丹陽石臼等湖至銀林堰乃中江故道也蘇常承中江下流五堰築而中江不復東皆由縣西行以逹於江鵲江在繁昌縣北境流入蕪湖界輿地志云銅陵鵲頭山為鵲頭至三山為鵲尾因名鵲江繁昌諸水注之大信河在府西三十五里亦曰南浦自蕪湖白岸湖西北流至大信鎮會龍山港入於江黃池河在府南七十里河中流以北屬當塗以南屬宣城今設浮航采石新河在府西北二十五里牛渚磯東宋慶厯中以磯立江流之衝水勢湍激大為舟害乃開新河於磯後以逹大江舟獲安濟長河在蕪湖縣南半里源出廣德宣州經縣前西北流入江青墩河在蕪湖縣南有洲曰青墩沙即周文育克徐嗣徽處丹陽湖在府東南七十九里周三百餘里按徽州寧國池州江寧廣德諸水滙為石臼固城丹陽三湖而丹陽為最大與溧水髙淳皆以中流分界實太平巨浸也蕪湖在蕪湖縣西南源出丹陽湖過黃池合五丈湖路西湖諸水至縣入江蓄水不深而生蕪藻故名天成湖一名天聖湖在蕪湖縣東南十四里亦丹陽湖下流所滙也廣百八十頃流入荆沼港逹於長河姑孰溪在府南二里一名姑浦合丹陽東來諸水經寶積山入於江思賢港在府北三十五里謝朓李白崔宗之皆過此賦詩後人思之因名魯港在蕪湖縣南十五里源出宣城西注大江一名魯明江舊志云昔有魯明仲者居此鳩兹港在蕪湖縣東四十里入於長河或以為古鳩兹也左傳云楚伐吳至鳩兹杜預以為臯夷今作勾慈音近而字訛也荻港在繁昌縣西南四十里水出南陵由馬仁山西入繁昌縣界至鳳凰山下為荻港入於江與赭圻城接慈湖水在府北六十里元和郡國志云吳將笇融屯兵於此鼉浦在府東五里相傳昔有鼉為祟遇道者截草擲浦中害遂除廬州府大蜀山在府西二十里爾雅云蜀者獨也山屹然孤特逺見二百餘里為一郡之鎮其西二十里有小蜀山大灊山在府西百里上有泉不涸其西為龍鳳山口東南通舒城北走壽州雞鳴山在府西北四十里舊志云肥水所經上有闕紫蓬山在府西南七十里有李陵廟又名李陵山肥水出焉有徑逹府西五十里之石佛山兩旁皆石中路通人行元末設竹林關以守隘其近者為馬鞍山又西三十里有蓮花山皆以形名姥山在府東南百里巢湖中宋書云晉安王子勛兵攻廬江沈攸之等大破之追至姥山又孤山亦在巢湖中魏邢巒破梁將桓和於此一名聖女山上有大姥廟龍泉山在府東五十里絶頂有泉回繞僧寺青陽山在府東六十里府志云元余闕讀書其上其南為方山四頂山在府東七十里俯瞰巢湖上有四峰特起相傳魏伯陽鍊丹之所隋地理志云襄安縣四鼎山即此相近為梅子山小峴山在府東七十里南史云齊蕭懿屯小峴禦王肅梁韋睿侵魏拔小峴俱此又山側通全椒者為餘峴口浮槎山在府東八十里一名浮巢山一名浮闍山方輿勝覽云俗傳自海上浮來山頂有甘泉舊建道林寺相傳梁武帝女為尼於此有海榴一株所手植也歐陽修云山在慎縣南三十五里隋書地理志云有浮闍山在慎縣王禕云慎縣在廬州界中附宋歐陽修浮槎山水記浮槎山在慎縣南三十五里或曰浮闍或曰浮槎二山其事出於浮圖老子之徒荒怪誕幻之説其上有泉自前世論水者皆弗道余嘗讀茶經愛陸羽善言水後得張又新水記載劉伯芻李季卿所列水次第以為得之羽然以茶經考之皆不合又新妄狂險譎之士其言難信頗疑非羽之説及得浮槎山水然後益以羽為知水者浮槎與龍池山皆在廬州界中較其水味不及浮槎逺甚而又新所記以龍池為第一浮槎之水棄而不録以此知其所説多失羽則不然其論曰山水上江次之井為下山水乳泉石池漫流者上其言雖簡而於論水盡矣浮槎之水發自李侯嘉祐二年李侯以鎮東軍留後出守廬州因遊金陵登蔣山飲其水既又登浮槎至其山上有石池涓涓可愛蓋羽所謂浮泉漫流者也飲之而甘乃考圖記問於故老得其事迹因以其水遺於京師余報之曰李侯可謂賢矣夫窮天下之物無不得其欲者富貴之樂也至於蔭長松藉豐草聼山溜之潺湲飲泉石之滴瀝此山林者之樂也而山林之士視天下之樂不一動其心或有欲於心顧力不可得而止者乃能退而獲樂於斯彼富貴之能致物矣而其丕可兼者惟山林之樂爾為富貴者而不得兼然後貧賤之士有以自足而髙世其不能兩得亦其理與勢之然歟今李侯生長富貴厭於耳目又知山林之為樂至於攀援上下幽隱窮絶人所不及者皆能得之其兼取於物者可謂多矣李侯折節好學喜交賢士敏於為政所至有能名凡物不能自見而待人以彰者有矣其物未必可貴而因人以重者亦有矣故余為志其事俾世知斯泉發自李侯始也黃山在府東百二十里接巢縣含山界其峰三百有六十有泉不涸故亦呼龍泉山亦曰金庭山又曰紫微山道書所謂第十八福地者也山有金庭洞可容三百人又有紫微洞出泉居民引以溉田唐時又改名王喬山相傳王喬居此冶父山在廬江縣東北二十里唐更名曰冶山宋碑曰鐵冶蓋冶鑄之所林巒峭密盤亘數十里自麓五里而至於巔上有龍湫亦曰鑄劍池濡須志云歐冶鑄劍處山比衆山特尊故稱父有子山三百六十四羅列其下蓋縣境之名山魏地理志云廬江郡潛縣有野父山即此蜃山在廬江縣東北三十里下瞰白湖縣志云昔曾有蜃出焉吐氣成樓臺殿閣之形毛公山在廬江縣東七十里縣志云毛義隱此有毛公讀書洞石凳石窗猶存洞旁産白牡丹每嵗所生不一其地相傳義父母甚愛此種義望天哀籲少頃遍山雪墜皆花後遂種延不絶蓋天生異卉也又北半里為蓮花洞中有石蓮下垂巧侔追琢山之東屬無為州馬頭山在廬江縣東北七十里按晉書云毛寶援桓宣於此上有桃花仙人二洞其山口曰石龍山西有渡曰馬頭渡金牛山在廬江縣西北四十五里嶺有塔縣志云吳赤烏二年造下有金牛關山在廬江縣西三十五里曹魏守隘之所石門尚存龍池山在廬江縣西二十五里舊志作栭山上有龍池下有甘泉寺按唐書云廬江縣有檽山檽栭相近或即此也縣北三十里亦有龍池一洞深不可測馬槽山在廬江縣西四十里有大小二槽形勢連屬各山半有石槽大者長二丈小者長丈五六尺形成自天不假椎鑿槽旁有人馬足迹世傳魏武嘗立寨其上大凹山在廬江縣西四十里以形凹得名上有龍王祠下有仙女石山勢參差難狀其第三峰有風洞巖深不可測投以草莖即隨氣飛起百藥山在廬江縣南十里山多藥草相傳李百藥遊此故名宋碑作白若蓋音之訛也頂上棋盤石有仙人足迹踏之聲如鼓聞數里又名石鼓隋地理志云開化縣有踏鼓山即此乃邑鎮山也福泉山在廬江縣南十里山下有泉清徹飲之可以愈疾南十里有菖蒲山産九節菖蒲秀山在廬江縣南六十里山上有香爐峰世傳有仙飛升於此黃泥瓦洋二河於此發源縣志云石上鐫刻有秀拔東南水外屏障十數字鳳臺山在廬江縣東南十里五峰排列中髙如臺昔傳鳳集其上故名􅈨山在廬江縣東南四十五里産􅈨宋時割置無為州今山在南鄉下有􅈨蓬硃砂澗鐘鼎山在廬江縣東南五十里一名鐘子山盤礴甚逺上有龍池縣志云山東西有泉四時不竭灌溉田畝兩泉嵗迭為盈縮妙不可測暖塘山在廬江縣東十里下有溫泉四時可浴山多竒石嶺有二石屏玲瓏可愛鹿起山在舒城縣東南三十里昔有僧過鹿出之事因名上有南嶽行祠祠前有試心臺洗劍池縣之鎮山也春秋山在舒城縣南二十五里其上為李公麟讀書堂有洗墨池又有望湖尖鳳凰臺仙人峰諸勝絶頂有洞可容數千人磨劍山在舒城縣西南三十五里上有大石為仙人磨劍處七門山在舒城縣西南三十五里山瀕大溪下有石洞如門者七即七門堰之上源也雲霧山在舒城縣西南四十里其山出雲必雨上有洞名水簾龍眠山在舒城縣西南八十里括地志云龍舒以狀若龍之舒展也山之陰為龍眠寨與桐城界三角山在舒城縣西南百二十里峰有三角故名又名多智山相傳上有清泉飲之令人聰慧其近者為陽山土人曾避兵於此梅山在舒城縣西七十里縣志云舊傳梅福棄官隱此上有梅仙洞又十里曰竹山王姥山在舒城縣西九十里縣志云相傳王姥修煉居此有白鹿銜花之異其近者為栲栳山響山在舒城縣東二十五里人過其下輒有聲紫芝山在無為州城內西南隅州志云宋皇祐間産紫芝三百五十本州守茹孝標獻於朝賜今名眉山在無為州西南百里兩山連曲如眉三公山在無為州西南百二十里見隋志上有三峰因名峰頭皆東顧唐天寶中改名東顧山山勢連亘數百里西界廬江南跨桐城上有洞寨明季流寇縱橫江北居民倚以避亂相近有九卿山山有九峰桐山在無為州西九十里有水道通白湖漁人用箔取魚故又名上箔蓋即隋志云廬江縣上薄山也又有下箔山天井山在無為州西九十里有泉二左曰青龍右曰白虎故亦名雙泉山其下有楚雲洞朝喜山在無為州西北四十里旱時朝有雲氣是日必雨故名白石山在無為州西北四十里山多白石頂有龍池仙人洞隋地理志云襄安縣有白石山即此州故襄安縣地其右為黑石嶺為桃花嶺為楚歌嶺呂泉山在無為州西北五十里州志云又名龍泉山其形似龍上有水泉世傳呂洞賓過此插劍而泉湧纍纍如貫珠故名其近者為銀瓶山一峰特起如銀瓶州之主山也青檀山在無為州北五十里産青檀北魏拔僕蘭設伏檀山破宋將魯爽即此水經注云檀山在廬江雩婁縣南大别之異名也決水出焉或曰即禹貢之大别山殊誤五畝尖山在無為州北五十里州志云頂平五畝許可種植靣臨巢湖羣山背峙登巖望之萬頃皆碧回顧則崇峰疉嶂隱見爭奇乃州中極髙處也卧牛山在巢縣治後以形似名為邑之鎮世傳巢許隱此其故址今紫微觀是也輿地志云山背有桀王城東山在巢縣東三里相傳即許由之箕山七寶山在巢縣東南三十里三國時濡須山為東關此山為西關上有煙霞亭今廢其南有龜山大秀山在巢縣南三十里山峰聳秀訾家河出焉宋楊傑詩所云水入平湖千里逺山橫大秀一峰髙是也其側有黃谷嶺邑人薪槱於此蔣家河出焉踟蹰山在巢縣南三十七里左傳楚子觀兵於坻箕之山又陳荀朗破郭元建於踟蹰山蓋坻箕踟蹰音相近今散兵灣即其處也又縣南六十里有髙林山七十里有九峰山居巢山在巢縣西南八十里溪谷間有石研之如墨舊名墨山唐改今名萬家山在巢縣西北二十里為四會之衝上有止渴泉舊時亂石纍錯明景泰中邑令閻徽修治始有路可行八公山在巢縣西北七十里一名紫金山水經注云上有淮南王劉安廟綱目集覽云王與八公憩石處在壽春此則王遇八公處也半湯山在巢縣東北十五里有二泉一冷一熱合流其初冷熱仍異數里之外始相混魚自冷泉觸熱急回羅隱詩云飲水魚心知冷熱濯纓人足識炎涼按隋志云襄安縣有半陽山今或以湯池故訛為半湯附明聶芳半湯池記聞之西北之山有寒火焉東南之區有湯泉焉豫竒之亦甚疑之後應試榕城友人為言五里外有池可浴拉豫往爾時塵冗何暇探幽選勝一證胸中之所疑蓋豫之耿耿猶未釋也辛丑治巢取邑乘閲之離城二十里許地名半湯有溫泉於是掩卷嘆曰豫之疑其從兹釋乎及過其處諦視溫泉之源沸沸從下坌湧若烹茗之松濤蟹眼狀從此掬水入池池不甚廣周圍結砌池之上覆以數椽又從內引出分二小池內清而外稍濁每嵗夏秋之間車騎絡繹解衣盤薄致足樂也至若樵者牧者耕而饁者負擔者靡不就而蕩滌稱快事焉吾夫子曰清斯濯纓濁斯濯足如斯之內外迥分貴賤俱適有道君子流連其間當必有喟然而嘉嘆者矣獨是既有勝地而敗壁頺垣荒榛密莽非唯不足以遊目騁懷竊恐欹傾之餘終成瓦礫不大為缺陷事耶豫捐資庀材搆一庭以覆內池中堂軒敞可供宴飲又為廊廡以蔭外池行路往來聊用駐足豫差慰矣豈徒以釋前此之疑哉夫湯泉亦既驗之矣寒火猶未之見則猶不能無疑也雖然無疑也海鹹而魚沫鐵堅而蟲囓天地間理之所無間為事之所有事之所有終不為理之所無類如斯也夫亞父山在巢縣東北二十里范增所居隋志云襄安縣有亞父山形似旗故亦名旗山白茅嶺在廬江縣西四十里即唐志所謂白茅山也路逹舒城天台嶺在舒城縣西南百里最幽勝土人擬於天台故名芙蓉嶺在無為州北五十里亦名浮濃嶺山石險峻明正統間知州王仕錫開鑿以便行旅接巢縣界鷂石崖在舒城縣西南十五里兩石並峙俗名小赤壁呂仙洞在無為州西北七十里有石床藥臼世傳呂仙於此搗藥主簿原在舒城縣西南百六十里縣志云崇山環之其中平衍相傳唐畢諴讀書於此馬蹄岡在舒城縣西南石上有馬迹世傳天馬過此大江在無為州南自桐城縣抵無為州界東北入於含山凡無為州之水皆納於江其他諸縣之水多由巢湖以逹於江金斗河源出雞鳴山東流入於郡城復自東門出至金斗驛又府南三十五里有派河東四十里有店埠河與此并入巢胡茅埠河在府北百一十里東流由含山河入江三河在府南九十里合廬江舒城二河水而入巢湖亦曰三汊河新河在廬江縣東半里流入東水關繞學宮出南關會繡溪水而注於湖相傳楊吳時鑿沙溪河在廬江縣東南十五里出大凹山東北流入沙湖石槽河在廬江縣東南四十里出􅈨山與瓦洋黃泥二河俱入于黃陂湖羅昌河在廬江縣南五十里源出大凹諸山南流從袁子港入江又縣西南四十五里有髙子河上接曹王河下至孔城白兔諸河入於江會市河在廬江縣北四十里源出馬槽山又縣北二十五里有桐關河東北三十里有清野河七十里有谷勝河與此俱入巢湖順江河在廬江縣東北三十五里棲鳳諸山之水合流於此與縣東北五十里之盛家河七十里之關河俱入白湖七里河在舒城縣西七里為西山衆流之會經南溪入巢湖永安河在無為州西四十里又州西十里為裏河與此俱入於江黃落河在無為州北四十里源自焦湖流入於江裕溪河在無為州東北百二十里又州東北百里有朴樹河東北四十里有運河合於馬腸河俱入大江花林河在無為州城東源自大江上接三溪河下接黃金岡大河復經裕溪河出江奧龍河在無為州東百二十里東接大江下通朴樹河復出於江又州東三十里有一箭河五十里有柵港河三溪河在無為州東南二十里與直皂河俱入大江髙林河在巢縣南六十里以山得名柘臯河在巢縣西二十里源出合肥浮槎山入於巢湖宋史云劉錡敗兀术於此又縣西五十里有銅煬河六十里有白露河七十里有巧溪河花塘河八十里有金塘河清溪河在巢縣東南十五里發源於含山之清溪鎮流入濡須水巢湖在府東五十里一名焦湖周四百餘里占合肥舒城廬江巢四邑之境港汊大小三百六十為淮西巨浸舊傳巢陷為湖滄桑之變世嘗有之但郡國志與青瑣髙議所載巫與老姥龜目出血城當陷云云一事兩傳且與厯陽湖同語頗涉誕恐未可據也沙湖在廬江縣東南十里合於黃陂湖及諸山之水東出缺口白湖在廬江縣東北三十里周七十餘里跨六鄉之地與黃陂後湖相連為邑巨浸黃陂湖在廬江縣東十五里湖水常渾賓興之歲每一澄清邑必奪解合白湖諸水自泥汊入江繡溪在廬江縣西五十里出馬槽山經縣南升仙橋滙為黃陂湖桃溪在舒城縣東北三十里一名桃城水源出六安渒河入於巢湖南溪在舒城縣南門外水源出孤井經七門環縣治而東入於巢湖錦繡溪在無為州西南十里宋時分而為二故名雙溪亦名錦繡池肥水在府城西南源出紫蓬山北流二十里分為二其一東南流經合肥縣入巢湖梁韋睿堰水以灌合肥在此其一西北流入壽春出淮晉謝玄破苻堅處也爾雅云水歸異出同曰肥南畿志云肥水東北經雞鳴山入金斗河一支西北流復東轉南下至東門外余公廟前二水相合故曰合肥今上源已堙塞縣治之得名蓋以此濡須水在巢縣南一名天河俗呼馬尾溝源出巢湖東流經亞父山又東北注裕溪入於大江龍潭在府東北每山水乍溢羣魚猝至漁者所獲必倍焉又舒城縣西亦有龍潭邑令劉顯作壩以灌諸堰處鵲尾渚在舒城縣東北舊有鵲亭左傳楚人伐吳吳人敗諸鵲岸杜預注云舒城鵲尾渚是也按鵲尾渚與銅陵縣鵲頭山對面當在無為州界無為舊屬舒城故名孤井源在舒城縣西百五十里志云俗稱孤靜源其水經七門三堰旋繞通於南溪入巢湖鐵索澗在府西北八十里澗東窮處一潭甚深渟泓洄演四時不竭晉謝玄破苻堅處也舊傳嘗有鐵索見於水際笑泉廬江縣有二一在魯班塘內聞人笑聲水輒湧沸髙尺許一在發洪山兒童笑則泉亦湧也故名笑兒泉左慈泉在升仙橋外世傳魏左慈常遺丹粒其中宋政和間清夜氣肅紅光燭天鄉人呼曰丹井舊志作左慈井鳳陽府鳳凰山在府北勢如鳳翔郡治據焉故以名郡連萬歲山明築皇城於此東有二峰對峙一名日精一名月華又東三里有獨山舊建觀星臺處曹山在府西三十里舊傳魏武曾駐兵於此畫山在府西五十里山有木枝如楊桞可用畫故名廟山在府南十五里其上有伍子胥廟又府西南四十里有靈山六十里有尹家山雲母山在府西南三十里産雲母石西南二十里有石膏山産石膏長安山在府南四十里西平衍東曰東堡缷甲店西曰打虎店峰巒殊勝杏山在府南六十里吳時董奉種杏於此後服杏丹仙去鏌鋣山在府南八十里相傳昔莫邪於此鑄劍故名蔣山在府東二十里梁時鍾離之捷梁主夢金陵蔣山之神許以助兵遂立祠祀於此而因以名山梅城山在臨淮縣東四十里下有梅城村又東十里曰石門山山下有石如門化明山在臨淮縣東六十里隋置化明縣因以名山烏雲山在臨淮縣東南六十里亦名烏霧山以山多濛霧也與定逺縣接境鹿塘山在臨淮縣南二十八里山下有白鹿塘又縣南三十五里有留甫山其下有留甫村五十里有小橫山濠塘山在臨淮縣南六十里濠水出焉山有石穴出鍾乳又名鍾乳山升髙山在臨淮縣西南五十里俗以九日登此山故名東西二濠水合流於此闌干山在臨淮縣西二十里山相連如闌干狀礦山在臨淮縣東北六十五里山有石洞世傳仙流所居塗山在懷逺縣東南八里與荆山兩岸對峙而淮流經其中古塗山氏國於此春秋傳云禹會諸侯於塗山杜預謂在壽春東北者是也山下有禹墟及禹會村又山半有聚仙臺卧仙石又有靈泉澄瑩不竭其南麓曰九岡岡形夾澗起伏有九俗名九岡十八窪適府之通衢附唐柳宗元塗山銘并序惟夏后氏建大功定大位立大政勤勞萬邦和寧四極威懷之道儀型後王當乎洪荒方割災被下土自壺口而𨗳百川大功建焉虞帝耄期順承天厯自河南而受四海大位定焉萬國既同宣省風教自塗山而會諸侯大政立焉功莫崇乎禦大災乃賜元圭以承帝命位莫尊乎執大象乃輯五瑞以建皇極政莫先乎齊大統乃朝玉帛以混經制是所以承唐虞之後垂子孫之丕業立商周之前樹帝王之洪範者也嗚呼天地之道尚德而右功帝王之政崇德而賞功故堯舜至德而位不及嗣湯武大功而祚延於世有夏德配於二聖而唐虞讓功焉功冠於三代而商周讓德焉宜乎立極垂統貽於後裔當位作聖著為世凖則塗山者功之所由定德之所由濟政之所由立有天下者宜取於此追維大號既發華蓋既狩方嶽列位奔走來同山川守神莫敢遑寧羽毛四合衣裳咸會虔恭就列俯僂聽命然後示之以禮樂和氣周洽申之以德刑天威震耀制立謨訓宜在長久厥後啓征有扈而夏德始衰羿拒太康而帝業不守皇祖之訓不由人亡政墜卒就陵替向使繼代守成之君乂能紹其功德修其政統卑宮室惡衣服拜昌言平均賦一制度定期會則諸侯常至而天命不去矣兹山之會安得獨光於前歟是以周穆遐追遺法復會於是聲垂天下亦照前軌用此道也故余為之銘庶後代朝諸侯制天下者仰則於此其辭曰惟禹體道功厚德茂會諸侯衛統一憲度省方宣教化制殊類咸會壇位承奉儀矩禮具樂備德容既孚乃舉明刑以弼聖謨則戮防風遺骨專車克威克明疇敢以渝宣昭黎獻耆定混區傳祚後昆丕承帝圖塗山巖巖界彼東國惟禹之德配天無極即山刋碑貽後作則洛河山在懷遠縣南六十里以近洛而名其西峰曰洪山東峰曰神山出煤炭平阿山在懷逺縣南六十里與壽州接境漢置平阿縣以此俗誤為平峩荆山在懷逺縣西南舊志云山西北有玉坑相傳卞和得玉處其中白石晶瑩不受鑱刻東有卞和洞一名抱璞巖可容數十人上有瀑布又有三仙避雨石仙人睡迹白龜泉北有濯玉澗南麓有梅澗蕭梁時於山下立堰以遏淮流曰荆山堰山之餘支為龜山為橫山附明宋濂遊塗荆二山記濓既遊琅琊山起行至池河驛適郵卒遞內使監公牒至及開緘中藏濠梁古迹一卷宸翰親題其外令濂搜訪與青宮言之濓因啓曰臨濠古迹惟塗荆二山最著按圖經塗山在昔鍾離縣西九十五里荆山亦在縣西八十三里二山本相聨屬而淮水繞荆山之背神禹鑿開使水流二山間其疏鑿之迹故在人思其功迄今弗能忘青宮曰至中都當共往遊焉余將渡淮狩於王莊先生宜泝流而上屆今懷逺縣治以俟濂奉敕行以洪武乙卯冬十一月己巳發舟庚午日曛始泊縣西門而青宮已駐蹕於東門五里矣辛未濂上謁青宮喜甚下令以壬申遊二山濂至期約懷逺文學掾王景彰宿舟中黎明棹舟至塗山足曳杖入山山旁廢址舊皆民廬前渡石梁復斗折而北纍石為塘多藝椒之園行可三里餘視大磐石青緑間錯頺然欹足坐諦視之乾蘚交封之耳聞有草生石上高一尺其花可愛不假土力人取懸簷間呼為石蓮花復行四里所巖石犖確插起道左危傾欲飛墜復二里所從微徑入灌莽抵崖罅貯泉一泓味甚甘覆以生茨曰聖水亭取水以禜雨多驗復一里餘至山巔禹廟在焉廟已毀惟頺垣破礎存遊目四顧長淮西來渦河北滙而壽春臨濠宿州之境皆在冥茫昏杳中緬想南北戰爭屯戌處為感慨者久之山之下聚落甚盛廟史云名禹會村乃禹會諸侯之地廬舍之比如櫛移踵入廟廟前杏樹一章大可蔽牛二柏參差左右樹東置小甕杏柯之水時津津滴其中廟史云當辰霧四集水愈多其來如泉可代井汲石碣二一大書有夏皇祖之廟六字下方刻宋慶元初州守劉仲光自造禱雨記一亦記禱雨事皇甫斌紹興庚戌來為郡命鍾離尉丁大榮作石未剝泐文尚可讀復從廟西循石坡而下巨石危立如人形遙望之一嫗儼然也相傳為啓母石廟史云居人每刲羊豕祭之至有以粉黛飾其貌者聞之不覺大笑山坳舊有僧房今廢久俟鶴駕不來忽使者至云扈從士馬多無橋可以渡河青宮不復至矣言未既但見旌旗如錦繡搖曳上荆山矣濂亦下山麓入鯀廟見所題神號鄙俚棄而不睨出讀祖無擇所賦歌京口孫臨為書碑蓋無擇謫守壽春過此而作也復北經縣治折而東行三里所至荆山梁魏交鬬時就山築堰以灌壽春其遺迹猶班班可見復行三十步崖廣如屋側身而入石屏如床座可坐人號為卞和洞自西上復一里所過避雨石石斜倚可避雨故名復六十步至産玉坡竒石駢列西有玉池榛荆迷路不可尋時青宮已獵逺郊濂因登舟先還中都云惟二山見諸戴記者多殊以塗山言之春秋左氏傳云禹會諸侯於塗山杜預注云在壽春縣東北説者云今濠州是也國語史記則又云禹會諸侯於會稽故會稽亦有塗山吳越春秋亦有塗山在會稽應劭云塗山在永興北説者云今會稽蕭山縣是也是二説己不能歸於一致矣至於蘇鶚演義又云塗山有四一會稽二渝州三濠州四當塗然其處皆有禹迹或者遂謂禹之治水固嘗遍歷宇內而會諸侯實在會稽之塗山柳子厚塗山銘蘇子瞻子由塗山詩指在濠州者皆非是濓之存疑而未決者一也以荆山言之荆山楚山也楚之先王熊繹僻在荆山七傳至昭王始遷都郢郢即今之江陵其地有荆山一名景山荆故楚號也有之誠宜世則指為濠州濠州古鍾離子國與壽春密邇楚自昭王之後歷十一傳始徙都壽春韓非子所載卞和獻玉事乃在厲武文三王之際昭王上接武王已越十世當三王時鍾離何嘗屬楚而強謂卞和至此山耶新序又謂抱玉而泣在共王之時雜記又謂在懷王及其子平王之時平王乃昭王之父下拒懷王九世共王上至武王亦六世何顛倒如是耶濂之存疑而未決者二也大抵山川遺迹非本諸經史者多不可信必欲可信塗山當稽之左氏以壽春為正荆山當正諸史傳以江陵為正有謂塗山氏乃古國名禹曾娶其女者别是一説與此殊不相涉也濂耄矣諸書遺忘欲盡所記憶者未必無舛訛輒緣紀遊因挂漏書之相公山在定逺縣東六十里有楚相令狐子伯廟因名稍西有豁鼻山東樂山大橫山在定逺縣東七十里其山橫界邑之東南故名山頂有石壘舊址西南有石佛髙丈餘相近有皇甫山相傳昔有皇甫將軍屯兵於此華蓋山在定逺縣東南二十五里頂圓覆如蓋又縣東南六十五里有喜龍山朗峰山槎丫山在定逺縣西七十里山形槎丫古有槎丫寺明洪武間改建圓通禪寺中有芝巖洞三峰山在定逺縣西北三十里山有三峰秀麗特異有禪窟洞石窟泉多修篁古木韭山在定逺縣西北四十五里地暖多韭故名山上石城兵火時常保聚焉山下有洞其中澗水常流石形如器物者甚衆左右多唐人題刻後為峻巖遊者莫能至相近有青山有銅骨山青翠相接橫澗山在定逺縣西北七十四里上有石壘及澗泉白石山在定逺縣北三十五里多白石相近有大紅山多紅石秦橋山在虹縣東北二十里有秦氏所造橋下有泉兩派分流左清右濁朱山在虹縣東北三十五里上有靈祐祠祀梁之朱買臣俗誤以為漢之買臣上有聖水泉甘而冽南有峰山界泗州赤山在虹縣東北七十里四靣皆水石龍山在虹縣北二十里上有石蟠伏如龍鱗甲儼然屏山在虹縣北二十里列翠環抱若屏一作平以山勢平衍而名下有平山湖鹿鳴山在虹縣西三十五里相傳明成祖嘗駐蹕其上夜聞鹿鳴因名紫金山在壽州東北十里五代史云周顯德四年征淮南南唐援兵營於紫金山與壽州城中烽火相應宋太祖率殿前諸軍擊紫金山連珠寨拔之遂下壽州即此上有淮南王宴客處間拾小金牌可療疾疑丹砂所化也黃閭山在壽州東北五十里州志云世傳楚春申君黃歇嘗遊於此寰宇記云州東北八十里有舜哥山相傳舜耕此上有大人足迹峽石山在壽州西北二十五里夾淮為險郡志云在下蔡西南寰宇記云兩峰相對水經其中對岸山上築二城以防津要魏諸葛誕舉兵王水據峽石以逼誕晉胡彬據壽春城陷退保峽石即此處也兩岸石上有大禹疏鑿舊迹山口有茅仙洞八公山在鳳臺縣東北五里肥水之北淮水之南漢淮南王安與其賓客八人學仙於此因名晉史云苻堅兵敗望見八公山草木皆晉兵即此一名肥陵山州西北有青岡晉謝玄乘勝追擊苻堅至青岡附梁吳均八公山賦峻極之山蓄聖表仙南參差而望越北邐迤而懷燕爾其盤桓基固含陽藏霧絶壁嶮巇層巖回互桂皎月而常圓雲望空而自布袖以華閬帶以潛淮文星亂石藻日流階若夫神基巨鎮而卓犖荆河箕風畢雨育嶺生峩高岑直兮蔽景修坂出兮架天以迎風而就日若從漢而回山露泫葉而原淨花照磯而岫鮮促嶂萬尋平崖億絶上披紫而生煙傍帶花而來雪維英王兮好仙會八公兮小山駕飛龍兮翩翩髙馳翔兮翀天四頂山在鳳臺縣北七里東與八公山相對打鼓山在宿州北三十里上有三峰東北有二泉可溉田揭徯斯望光樓記云山中有聲如鼓鳴歲則大熟離山在宿州北五十里産符離草爾雅所謂莞也秦以此名縣史記陳涉傳初起兵有葛嬰朱雞石符離人騫山在宿州北七十里以山有閔子騫墓而名墓左有龍涴潭睢陽山在宿州西北三十里山在睢水之陽故名舊作諸陽芳巖山在宿州西北六十里旁有石巖四時芳馥相近為邱疃山相山在宿州西北九十里相城鄉周二十里甚危峻舊有相山碑記云巍巍相山盤紆穹崇上應房心與天靈沖其西南為天馬山西控汴河嵇山在宿州西南百有十里嵇康家於其下因氏焉龍車山在靈璧縣北二里縣之主山也山之陽有石泉又北三里為栲栳山回環如椅故名磬石山在靈璧縣北七十里山出磬石故名禹貢云泗濱浮磬即此揮麈録云宋政和間起艮嶽靈璧貢一巨石髙二十餘尺周圍稱是舟載至京師千夫舁之不動裕陵以為神物表異之親書慶雲萬態竒峰六字加金帶其上頃刻移至苑中附明王守謙靈璧石考石之堪作玩者吾靈璧石稱最謂其峰巒洞穴渾然天成骨古色黝扣之有聲按譜有形如蟠螭如菡萏如臥牛者又有臥沙不起峰者甚有盡天劃神鏤之巧者總之萬石萬局於深山中掘之乃得不知的係何時發坑苐考之載籍宋以前未聞有靈璧石按檇李項氏有靈璧石一座長二尺許色青潤聲亦泛然皆有黃沙文一帶峰巒皆雋下金填刻字云宣和元年三月朔日御製御書其下押一字又大衍庫冇靈璧小峰長僅五六寸玲瓏秀潤所謂胡桃玉色徽宗御書八小字刻於峰旁云山髙月小水落石出略無刻琢之形觀此則靈璧石始見於宋曾為至尊之寶愛其品可知已自米顛酷嗜而聲價益重其為楊次公攫去者乃所謂盡天劃神鏤之巧者也後得李後主所寶靈璧研山徑長才踰尺前聳三十六峰髙者為華蓋峰其參差錯落者為月岩為玉筍為方壇為上洞為翠巒又有下洞三折而通上洞中有龍池遇天欲雨則津潤滴水少許在池內則經旬不燥米老甚珍之及其歸丹陽也愛甘露寺下並江一古基多羣木唐晉人所居則薛氏之宅也時米欲得宅而薛覬得研於是竟相易米後號海嶽菴者是己公終惋惜乃云此石一入渠手不得再見每同交友往觀亦不出示紹彭公真忍人也蘇東坡畫醜石風竹易得張氏靈璧石一株具有四靣如麋鹿宛頸狀後載歸陽羡趙松雪有靈璧石香山一座下刻雲根二字又一石其大如拳峰巒皆五列公名之五老峰手􅎲之拂之亦有聲此皆得之本子上者也余在南中曾見一靈璧石長僅數寸十二峰參差突起亳無雕琢又一石天生雙螭蟠結中有小水池如錢許大其黑如漆間有細白紋如玉扣之聲泠然此天下所無而靈璧獨有偶一有之而絶不復出良不可解然余猶及一見耳又見如卧牛者想亦宋元舊物流傳人間者矣國朝垂二百六十餘年寥寥無聞即問之土著者亦竟不知靈璧石為何物逮萬厯己酉南臺侍御眉山鴻岏張公訪此石甚殷乃好事於磬石山澗壑中乘雨後覔之稍稍見一二於是習兹山者凡牧豎樵子莫不求石有力者遂發坑取之而石漸出矣歲庚申庠師吳興長組先生天中濬源先生親往采石而郡侯竟陵别鳳藻先生單騎往視之僉稱南宮之後再睹此舉亦稍稍獲有佳者其人情好尚之極即山靈亦終難祕其珍遂為此石之復興與此後掘石者日益夥蘇人不愛善價買舟載去一入靈境莫不侈口談石突然風尚良可駭異走南中販石者踵相接而格價頓減惟睹有峰巒洞穴而清潤有聲者亦取狂狷之意求所謂研山蟠螭與盡天劃神鏤之巧者則絶不可復得矣蓋物之尤者多見於始出而其後漸銷落也端溪下岩發於宋而竭於宋安知今日之石不將為廣陵散乎海內王元美之祗園董元宰之戲鴻堂朱蘭嵎之柳浪居米友石之勺園王百榖之南有堂曾蓮生之香醉居劉際明之悟石齋劉人龍之夢覺軒彭政之之嗇室清玩充斥而皆以靈璧石作供果得未曾有乎而諸公之韻固均足以敵之矣獨喜吾邑劉節齋先生其别業觀音閣前一石徑數尺嵌空玲瓏色極清潤先生鍾愛之令此石旦暮聞鐘磬聲且與蒼松碧梧相依傍則其情怡其神往片石堪共語其在斯乎或云此係張氏園亭物然竟非新坑石也潼山在靈璧縣北七十里潼水出焉世傳莊子嘗修道於此有南華觀陳疃山在靈璧縣北八十里陳疃堡亦名陳摶山相傳希夷常寓於此有希夷洞張山在靈璧縣西北九十里其西五十里有貢山屬蕭縣相傳子張子貢遊學之地齊眉山在靈璧縣西南三十里山開八字如列眉建文三年徐輝祖敗成祖於此孟山在靈璧縣東北七十里相傳孟子嘗遊此山下有娑羅樹歲以枝葉先發所向之方為豐兆分水嶺在臨淮縣東九十里其水東入盱眙西入臨淮斷梅谷在懷逺縣荆塗二山間或曰二山本為一脈禹以桐柏之流泛濫為害乃鑿山為二以通之今兩山間有斷梅谷濱淮為勝云或曰周世宗以荆塗有王氣斷之時谷有梅氏聚族居焉因名劍山在定逺縣西北相傳山有寶劍雨過或倚路傍龍子河在府西三十里源發南山北滙為湖經長淮關入淮天河在懷逺縣南五里源出府治之利山西北流經塗山南入淮又縣西有洱河西南有芡河俱發源蒙城至縣入淮淝河在懷逺縣北二十里出宿州之龍山湖流經蒙城縣界東南至縣之雙墩入於淮有魚鳬菱芡之利按此乃淮北之淝水也清溝河在懷逺縣北二十里自宿之龍山湖東南流合十湖天堰諸水至縣北會淝河而水始大舊自靈璧南境至府治沫口河入淮今下流淤塞時有泛溢之患池河在定逺縣東南六十里自廬州巢縣界流入境內又東北經盱眙入於淮潼河在虹縣西南二十里南潼河源出羊城湖經縣治西南入泗州北潼河出縣西北東流入睢水沱河在虹縣西南源於宿州紫蘆湖經縣東九都為南沱河西九都為北沱河二水合流入五河縣東肥河在壽州東北十里源出合肥之紫蓬山北流二十里分為二其一東南入於巢湖見廬州府其一西北流二百餘里至州境入於淮按此乃謝玄破苻堅處淮南之肥水也又西肥河在壽州下蔡西南十里亦入於淮大香河在壽州東南三里自芍陂大香門分流九曲至州三里橋北入於淮乃唐宋運河元始淤解河在宿州東南又曰蟹河源出州西之仁義鄉東流經靈璧縣西南入淮泡河在宿州南九十里源出亳州舒安湖經州之舊臨渙城合澮水澮河在靈璧縣南七十里源出河南永城縣馬長河東流歷宿州至縣境東南入五河縣界小河在靈璧縣北六十里即睢水項羽追破漢軍多殺士卒睢水為之不流是也月明湖在臨淮縣東一里北流入淮萬安湖在虹縣西北即潼陂也宋朱辨詩云離汶未逾千里道渡淮先泛萬安湖舊志云疑即今之天井湖又縣西南四十里有老營湖羊城湖在虹縣西北四十里古虹州城沒於此四山湖在虹縣東北四山下又有峯山湖在峯山下與泗州接境西湖在壽州西門外一名尉湖又名尉升湖水經注云羊頭溪水受芍陂西北流經尉湖是也焦岡湖在壽州西三十里相近為董奉湖紫蘆湖在宿州西産蘆色紫石湖在靈璧縣東北十五里中有巨石水消長不過舊痕人以為異淮水在府北十里自潁上縣抵壽州經懷逺之荆塗二山至府治北東過臨淮入於泗州渦水在府西北自蒙城縣界流至懷逺東入於淮謂之渦口唐李吉甫云濠有渦口之險謂此漢建安中曹操引軍自渦入淮南北朝為控扼地濠水在府南十里有二源東出濠塘山西出鏌鋣山至升髙橋合流又東北入於淮其水經府治及臨淮縣境臨淮西南有石絶水謂之濠梁即莊惠觀魚處也洛水在懷逺縣南七十里自定逺之清洛澗流經壽州至縣境入淮亦曰洛澗注淮處曰洛口汴水在虹縣南自開封東來經宿州抵縣境東南至泗州入淮渒水在壽州西七十里源出霍山東經霍邱縣至州境北流入淮方輿勝覽云渒有蛟害楚芊乙射之遂絶睢水在宿州北二十里自河南夏邑縣白河經州之符離會泗入淮其上流之支為瞿溝亦曰曲溝又州之蘄縣鄉有蘄水渙陽鄉有渙水即濊水洨水在靈璧縣東南入於淮響水潭在虹縣西門外潼汴合流至橋下波濤相擊聲如雷吼白馬潭在虹縣南二十里水中有石廟曰龍王廟有見白馬出沒其中者禱雨時應龍涴潭在宿州閔子鄉武城里之左歲旱禱雨即應響水澗在臨淮縣城東又有蕉子澗紅娘子澗澗沙澗青山澗俱入於淮碧溪澗在懷逺縣南一里自荆山下曲流經城中入淮又有泠水澗茅澗柴澗俱入於淮清洛澗在定逺縣西八十里晉謝玄率諸軍涉洛澗敗秦兵於夀陽即此粉團洲在府西北三十里睢水之南洲上多白沙故名明初於此築城設衛即今之長淮衛也芍陂在夀州南安豐廢縣亦曰安豐塘又曰期思陂楚相孫叔敖決期思之水即此詳見水利漢泉楚泉俱在定逺縣西五十里二泉俱紆廽自南而西合流入洛咄泉在夀州北五里泉與地平每聞人聲水輒湧出如珠又名珍珠泉江南通志卷十七
