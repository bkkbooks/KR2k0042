body:
  text: 江南通志卷一輿地志有土地後有人民有人民後有政事土地者三寳之首故志者先焉今直隸外為省者十有五而江南為大自周秦迄元錯壤犬牙名號互異明畫其界國朝因之葢沿革者屢矣不改者山川也城郭宫室闗市之屬輒與時遷移焉其郡邑或沿唐宋或從近代今或陞州為郡析縣為縣無華離之地矣一督兩撫之所治雄視鄰藩遥拱京國封疆誠重且大哉就圖為説而表其沿革若疆域以下次第及之遺蹟皆入焉為類十有二為卷四十有八作輿地志第一圖說江南全省形勢總圖有說江南十六府八州分界圖江寧省城圖説見前江寧府圖有説蘇州府圖有説松江府圖有説常州府圖有説鎮江府圖有説淮安府圖有説揚州府圖有説徐州府圖有説太倉州圖有説海州圖有説通州圖有説江南總圖説江南於天文占斗牛女奎婁房心分野在星紀降婁大火之次其地廣輪數千里左臨大海旁界五省其名山則有蔣茅八公天柱九華黄山塗梁采石其大川則有黄河江淮泗運河三江汝潁睢滁肥其藪則有震澤巢湖洮湖其重險則有東闗二峴清流闗名都雄鎮以江淮為統紀淮之北由潁亳徐邳盡於海贛所以障淮也淮之南由廬夀滁和訖於揚通所以蔽江也江之南首重金陵而安池太平峙其上游鎮常蘇松廣其輔翼西北則平原曠邈以羣山為几案東南則百川滙流以滄海為池沼漕河自南訖北蜿蜒其中轉輸飛輓檣颿相望東南形勝於兹為最矣其田賦當天下十之三漕粟當天下十之五又益以淮浙之鹽筴闗津之征𣙜其風氣則淮水以西席用武之餘烈多亢爽剛勁大江以東承浮靡之遺習多優柔文弱雖水土之性固殊至於沐浴膏澤被服禮義則富教之效也江寧府圖説江寧府天文斗牛女分野星紀之次其地東控京口西接厯陽南距宛陵北界天長武侯謂龍蟠虎踞朱子亦言岷山之脈東盡於建康山之所至水亦㑹焉鍾山之左挾層巒而綿亘迄於西南大江之右經石頭而朝宗出於東北山水相環中開宏衍依北山以作鎮憑牛首而為闕秦淮繞其陽後湖蕩其陰磅礴扶輿藴藏靈懿葢東南之壯麗無過於此者矣若乃襟帶淮海控甌閩而引荆楚北通梁宋齊魯之郊洵水陸之總㑹也設制府以轄列郡宿重兵以資彈壓經緯之方得地利焉句容有華陽地肺號為名山當郡東鄙扼丹陽京口之路而下蜀龍潭俱大江津濟之所溧水髙淳環山據澤其間有丹陽石臼固城三湖古中江流經於此下達荆溪江浦有浦子口自此濟江至府城十餘里而近六合東有𤓰步山臨迥為髙南有六合山即魏太武所嘗登也宣化鎮在宣化山之陽隋晉王廣嘗於此渡江故二邑於古皆屬江北州郡明代割隸江寧稱控禦長䇿至憑江設險所在俱有而自昔以潤州姑孰為尤要焉蘓州府圖説蘓州府天文斗牛分野星紀之次其地東距太倉西通陽羨南界嘉興北距大江三縣附郭而居六邑環其外山川鉅麗風土清嘉江南之奥壤也山之大者陽山天平穹窿岝㠋以拱郡治蜿蜒而北出者萃於海虞而為虞山水則長江自江陰流入經常熟縣境而東注於海鉅而名者太湖也中有七十二山吞吐波際常潤宣歙之水皆納於此而下注三江運河則自嘉興而北經郡城㑹胥江而西北入無錫縣界擅江湖之利兼海陸之饒繁華盛麗之名甲天下至若萬流所輳分津導渠組繡交錯田賦所出常書上上而吳江以西濱於太湖其患在潦崑山以東髙接岡身其患在旱一則宜開吳淞白茆以為洩注一則宜為陂塘蓄水以時灌溉此水利所以為要務也郡為浙西要㑹轉輸供億天下資其財力且其地形四達水陸交通浮江達淮倚湖控海開府於兹兼轄八郡三州豈不以形勢所闗匪但財賦之淵藪哉松江府圖説松江府天文斗牛分野星紀之次其地西連吳㑹北距疁城東南皆濱大海郡建置稍後然谷水崑山自昔𫝊為名勝以故鍾靈毓秀雄望埒于蘓常不獨榖帛所資推為財賦要區矣山峙郡之西北元人凌巖題以九峯名勝遂著於天下吳淞江流經青浦上海之界上承太湖澱􅍩諸水而㑹黄浦以入於海府之所由名也黄浦亦上承澱􅍩而下流視淞江尤大澱山湖古來鍾水之地三泖或云即谷水二水相通皆巨浸云所屬八邑半瀕於海魚鹽蜃蛤之饒民賴其利然鹹水或乗風潮溢入此捍海塘所以厚其防也大海環其東南而錢唐灌輸於南長淮揚子灌輸於北與松江之口皆輻列海濱互為形援今南滙青村金山三城已改縣治而郡城駐劄督帥宿重兵以資控扼焉常州府圖説常州府天文斗牛分野星紀之次其地東臨吳㑹西拱潤州南抵建平北距泰興唐李華所謂當楚越之襟束居三吳之爽塏望髙地劇江外名邦者也山迴水匝環為都㑹外奥而内曠舟車四達物産阜繁擅沃衍之宜兼水陸之利若夫九龍蜿蜒二洞㟏岈境内名山難以悉數水則洮滆二湖與具區埒東九西九納鎮江廣徳及諸山澗之水潏為長流荆溪舊受中江而百瀆為之尾閭運河自東南遶於西北行府境者幾二百里若其形勢之大者北州長江自丹陽東南以注於海虞以江陰為保障以靖江為犄角而東西各㟁皆其津要南則太湖三萬六千頃包括衆流而武進無錫宜興環其三面百瀆梁溪又其津要也至若武進江陰地髙而患旱無錫宜興地卑而患潦求其蓄洩之宜而疏支渠以待時灌溉浚百瀆以定震澤則地利興而豐穰因之矣鎮江府圖説鎮江府天文斗牛分野星紀之次其地東接晉陵西通句曲南界廣徳北距江都大江自句容界流逕郡城北又東厯丹陽入常州府其山曰北固曰金曰焦世稱京口三山為江海鎖鑰云由府境西抵石頭髙岡逼岸宛如長城凡二百餘里由府境東至孟瀆七十餘里或髙峯横亘或洲渚錯列或沙港淺狹難以通行故江岸之防惟在京口而圌山當江流屈曲之處其防為尤要葢地當四達之衝上則翼衛建康下則襟束毘陵北道淮楚通泗豫南走錢唐甌越商軺賈舶水陸相望於城下自孫吳以來號為重鎮誠所謂三吳襟帶之邦百越舟車之㑹矣至郡治諸山來自浙西之天目分支為二其左逆江而上者萃於金陵其右沿江而下者入於蘇常盡於大海又所謂三吳之山川林泉肇發於此者也運河自武進流入丹陽又西北經丹徒縣而達於江即隋渠之遺迹也金壇之三茅山西連句容丹陽之練湖金壇之長蕩謹脩築禁侵占可以溉田而濟運溧陽五堰分江水以入蕪湖者也溧水一名永陽江即古所謂中江者下流為丹陽之白鶴溪宜興之荆溪者也淮安府圖説淮安府天文斗分野星紀之次清河安東二縣奎婁分野降婁之次其地東至海濱西連宿豫南接寳應北距朐山運河南自髙寳抵郡城西北又西達於淮迢迢一水上則方舟通於清泗下則風帆達於江津地形都要水陸交通自古號為重鎮嵗漕數百萬咸取道於此誠南北之襟喉也黄河西北自邳州流入淮水西南自泗州流入而㑹於清河縣之清口東北以入於海其發源中州挾諸山溪之水而東流滙為巨湖者曰洪澤郡既有淮加以黄河之全注而清口不能驟洩則益停瀦於洪澤故淮之為郡惟恃髙堰一堤嵗修所以衛生民而護運道也西有清江浦居民夾岸為水陸孔道有廟灣鎮横扼海口商舶往來號稱險要明代建有城垣今阜寧分邑於此清河當淮泗之口桃源在其西南二邑中限河淮連諸湖蕩時衍溢為害鹽城東阻巨海為郡屏障場竈相望鹽筴之所自出也西則射陽湖與山陽界納諸邑及髙寳之水而注於海安東當河淮入海之處有漣河焉揚州府圖説揚州府天文斗牛分野星紀之次其地東薄海壖西距天長南連京口北届淮陰大江自六合縣界流入儀徵過江都而東𤓰洲屹然與鐵甕城相望運河繞郡城東南逶迤北流達於淮泗從上江來者自儀徴入從京口濟者自𤓰洲入皆㑹於揚子橋以入運河帆檣櫛比車轂鱗次昔人稱為四㑹五達之莊是也若乃煮海之利名擅東南富商巨賈輦載以至因之用度侈溢浸以成風所謂㕓閈撲地歌吹沸天者由來舊矣至其唇齒淮左肘腋金陵自昔重其形勢而漕運之所經財賦之所輸動闗國計謂之雄邦非徒然也府境平曠少山惟西北蜀岡綿亘四十餘里西屬儀徴六合儀徴濱大江水陸衝要髙郵州介居揚楚藪澤迴環有三十六湖樊艮甓社之類相連如貫珠土沃水深富有魚稻然當天長諸山水之下流恃堤岸以為固焉寳應東有射陽湖東北界於淮安之山鹽二邑其西南諸湖亦與髙郵諸湖相通運道之襟喉也泰州川原沃衍魚鹽繁殖號為奥區興化積水之場塗泥苦潦於府屬諸邑稱僻壤焉徐州府圖説徐州府天文房心分野大火之次邳州奎婁之次其地東抵沭陽西連夏邑南界靈璧北通嶧縣黄河自河南虞城縣流入碭山界東經蕭縣又東至郡城又東經睢寧與邳州分界又東經宿遷又東南抵淮安之清河合於淮泗水自山東魚臺縣流入沛縣又東南至郡北汴水西北自碭山縣來注之是所謂汴泗交流者自大河南徙占二水為經流今自碭山以下汴之故道也郡城以下泗之故道也運河自清河縣西北流至宿遷而濟汶沂泗諸水實交㑹於此以利轉漕者也又北至邳州西又西北流入汴縣界郡境東西相距數百里而黄河貫其中運道出其左州一縣六星羅棋布舟車四出南達江淮西北走齊魯梁宋之郊為南北之襟要故彭城下邳自古稱重鎮焉郡治四山合沓如環汴泗為池城隍峻整風氣勁悍多用武遺蹟東有二洪之險懸水百仭南有戲馬臺髙廣可以屯戌與城相表裏蕭處衆山之中號為深阻豐沛碭山野曠原平並宜耕稼至宿遷睢寧當黄運下流自河工告成隄堰鞏固而洩瀉有歸邳宿之城庶可慶寧居矣太倉州圖説太倉州天文斗牛分野星紀之次其地南接松江西界崑山東濱大海北控江口大江自鐺脚浦入海婁江自崑山西來至劉河口亦入於海州承太湖東下之委為水國門户諸塘之水縱横灌注並與海通故昔人論三吳水利者半在州境焉至若瀕海之地岡阜相屬土人謂之岡身葢天之所以限滄溟也嘉定之練祁塘亦通潮汐縣東南為吳淞江入海之口舊設寳山吳淞二所以司防汛今寳山為縣矣崇明孤懸海中衆沙環之然地直江海之㑹為吳郡外屏故重鎮設焉海州圖説海州天文奎婁分野降婁之次其地西連徐邳南接淮甸北達山東東距大海海中有鬱洲鶯遊諸山鬱洲為島嶼勝境鶯遊則元時海運之所經也州南有碩項湖為安東縣界贛榆與沂莒二州相錯沭陽亦界於郯城沭水自西北流經縣境入於碩項湖周禮所謂青州之浸是也州境平衍無闗隘東望滄波既極浩渺之觀而三方所届水陸交通故自昔稱為南北襟要秦人立為東門六朝倚為重鎮云通州圖説通州天文斗牛分野星紀之次其地南控江口西望靖江東北瀕海自後周取之以通吳越而其名遂著南有狼山大江西來經其下而東至料角嘴入海南對昭文之福山鎮一葦可杭順流而東則抵崇明於海道無所不達江北之海防莫要於此故狼山設重鎮焉州所屬二邑其境皆抵大江如臯縣東亦距海自掘港東南諸鹽場棋布其間運鹽河自泰州東行經如臯入州界而東逹於吕四場其聨絡貫注者為串場河匪惟鹽艘所闗亦設險之地也泰興縣與靖江錯壤斜連孟瀆舟艇往來雖屬通州實揚郡之屏蔽矣江南通志卷一
