body:
  text: 江南通志卷二十九輿地志古蹟古都邑夫前言往行是為畜德之資至如古人託寓陳蹟或有傳聞荒渺而摩挲俯仰之餘曠百代而相感覽海巫梅里之故墟如挹芬芳撫吳宫晉代之繁華獨尋蔓草抑亦可興可觀之一助焉别有城壘舊基足以參觀地勢琳珉遺製足以採補史宬又非特供文人學士之吟眺者也名園勝地志乗不遺兹亦附載古都邑建業今江寧府三國吳志孫權字仲謀建安十四年劉備表權行車騎將軍領徐州牧十六年權徙治秣陵明年城石頭改秣陵為建業建康今江寧府晉書本紀元帝諱睿字景文宣帝曽孫瑯邪恭王覲之子建武元年三月立宗廟社稷於建康宋書本紀武帝諱裕字德輿漢高帝弟楚元王交之後南齊書本紀髙帝諱道成字紹伯漢相國蕭何二十四世孫梁書本紀武帝諱衍字叔達漢相國何之後陳書本紀武帝諱霸先字興國太丘長陳寔之後俱建都於此西都今江寧府南唐書先主姓李唐宗室裔也楊行宻以乞徐温乃姓徐名知誥吳天祚三年改元昇元以建康為西都應天府今江寧府明南畿志洪武元年太祖改元集慶路為應天府建都湖熟今𨽻江寧府之上元縣漢書王子侯表胡孰頃侯胥行江都易王子元朔元年正月丁夘封秣陵今𨽻江寧府之江寧縣漢書王子侯表秣陵終侯緾江都易王子元朔元年正月丁夘封句容今𨽻江寧府之句容縣漢書王子侯表句容哀侯黨長沙定王子元光六年七月乙巳封棠邑今𨽻江寧府之六合縣漢書髙祖功臣表棠邑安侯陳嬰六月丙午封吳今蘇州府史記吳世家吳太伯奔荆蠻自號勾吳武王求太伯仲雍之後得周章已君吳國因而封之三國吳志漢興平元年曹公表孫䇿為吳侯婁今𨽻蘇州府之崑山縣三國志張昭傳魏黄初二年封昭由拳侯後孫權改封為婁侯陸遜傳建安二十四年遜進封婁侯華亭今𨽻松江府之華亭縣三國志陸遜傳建安二十四年封華亭侯延陵今常州府史記吳世家季札封於延陵故號曰延陵季子淹城今𨽻常州府之武進縣越絶書吳有淹君城毘陵今𨽻常州府之武進縣三國志朱治傳黄武元年封毘陵侯春申今𨽻常州府之無錫縣後漢書郡國志註春申君城在無錫無錫今𨽻常州府之無錫縣漢書武帝功臣表無錫侯多軍元封元年封陽羡今𨽻常州府之宜興縣漢書髙祖功臣表陽羨立侯靈常十二年十月壬寅封溧陽今𨽻鎮江府之溧陽縣漢書王子侯表溧陽侯欽梁敬王子建昭元年正月封文獻通考溧陽侯陶謙為徐州刺史以擊破黄巾功封淮陵今淮安府後漢書王霸傳建武三十年定封淮陵侯東海今淮安府後漢書東海恭王彊𫝊建武十九年封臨淮今淮安府後漢書臨淮懷公傳建武十五年立射陽今𨽻淮安府之山陽縣漢書髙祖功臣表射陽侯劉纒六年正月丙午封荆今揚州府漢書諸侯王表荆王賈髙祖從父弟六年正月丙午立吳今揚州府漢書諸侯王表髙祖十二年十月辛丑王濞以故代王子沛侯立為吳王唐書楊行宻傳天復二年封為吳王江都今揚州府漢書諸侯王表江都易王非景帝子二年三月甲寅立為汝南王徙江都廣陵今揚州府漢書諸侯王表廣陵厲王胥武帝子元狩六年四月乙巳立後漢書廣陵思王荆傳建武十七年進爵為廣陵王東陽今𨽻揚州府之㤗州漢書髙祖功臣表東陽武侯張相如十一年十二月癸巳封漢書王子侯表東陽節侯𢎞清河綱王子本始四年四月己丑封大彭今徐州府史記索隱彭祖即陸終氏第三子籛鏗之後後為大彭亦稱彭祖通志商之伯國今徐州彭城是也彭城今徐州府後漢書彭城靖王恭𫝊建初三年徙封彭城王食楚國三國魏志王公傳彭城王㨿黄初三年徙封彭城楚今徐州府史記項羽本紀項王自立為西楚霸王王九郡都彭城漢書諸侯王表楚元王交髙祖弟六年正月丙午立後漢書楚王英傳建武十五年封楚公十七年進爵為王彭今徐州府漢書王子侯表彭侯彊城陽頃王子元鼎元年四月戊寅封蕭今𨽻徐州府之蕭縣左傳杜預注蕭宋附庸國後漢書光武帝紀更始二年立光武為蕭王扶陽今𨽻徐州府之蕭縣漢書外戚恩澤侯表扶陽節侯韋賢本始三年六月甲辰封杼秋今𨽻徐州府之蕭縣後漢書劉般傳建武九年封為菑丘侯後徙封杼秋侯偪陽今𨽻徐州府之沛縣左傳杜預注偪陽妘姓國今彭城𫝊陽縣也沛今𨽻徐州府之沛縣史記髙祖本紀二世元年沛父老共立帝為沛公三國魏志王公傳沛穆王林太和六年改封沛留今𨽻徐州府之沛縣漢書髙祖功臣表留文成侯張良六年正月丙午封建成今𨽻徐州府之沛縣漢書外戚恩澤侯表建成康侯吕釋之六年四月丙戌封建成定侯黄霸五鳳三年二月壬申封廣戚今𨽻徐州府之沛縣漢書王子侯表廣戚節侯將魯恭王子元朔元年十月丁酉封廣戚煬侯勲楚孝王子河平二年二月封扶德今𨽻徐州府之沛縣漢書外戚恩澤侯表扶德侯馬宫元始元年二月丙辰封邳今𨽻徐州府之邳州通志商時國南畿志夏邳國薛今𨽻徐州府之邳州通志薛仲虺之都本在魯地奚仲遷於邳注魯莊公築臺於薛即薛舊都以遷於邳又以邳為薛今徐州滕縣東南五十里薛城南畿志春秋為郯子之國後屬薛為齊所併田文封於此號薛公楚今𨽻徐州府之邳州漢書異姓諸侯王表五年徙韓信王楚上邳今𨽻徐州府之邳州漢書王子侯表上邳侯郢客楚元王子髙后二年五月丙申封下邳今𨽻徐州府之邳州後漢書下邳惠王衍傳永平十五年封鍾吾今𨽻徐州府之宿遷縣廣輿記宿遷古鍾吾子國下相今𨽻徐州府之宿遷縣史記髙祖功臣表下相嚴侯冷耳十二年十月己酉封淮陵今𨽻徐州府之睢寧縣漢書王子侯表淮陵侯定國江都易王子元朔元年正月丁夘封紀今𨽻海州之贛榆縣通志紀都紀遷於劇注紀本在東海故贛榆縣紀城是劇在青丘臨朐縣東壽光縣西亦名紀音譌為劇皖今安慶府史記皖夏姓皋陶之後文獻通考舒州春秋時為皖國桐今𨽻安慶府之桐城縣左傳杜預注桐小國廬江舒縣西南有桐鄉松滋今𨽻安慶府之宿松縣漢書王子侯表松滋戴侯霸六安共王子元始五年六月辛丑封越國今徽州府唐書髙祖本紀武德四年九月汪華降封越國公廣德今𨽻徽州府之黟縣後漢書中山靖王勝傳成帝鴻嘉二年立憲王弟孫利鄉侯子雲客為廣德王平帝元始二年復立廣川惠王曽孫倫為廣德王奉靖王後石城今𨽻池州府之貴池縣後漢書王常傳建武二年封山桑侯子廣嗣三十年徙為石城侯三國吳志韓當傳黄武二年封石城侯虎林城今𨽻池州府之貴池縣三國吳志三嗣主傳孫休權第二子太元二年正月封琅邪王居虎林丹陽今𨽻太平府之蕪湖縣漢書王子侯表丹陽哀侯敢江都易王子元朔元年十二月甲辰封蕪湖今𨽻太平府之蕪湖縣後漢書齊武王縯傳永平十四年晃嗣章和元年貶為蕪湖侯傅俊傳建武二年封昆陽侯子昌嗣徙封蕪湖侯廬子國今廬州府漢書地理志廬江郡注應劭曰故廬子國合肥今𨽻廬州府之合肥縣後漢書堅鐔傳建武六年封為合肥侯舒今𨽻廬州府之舒城縣南畿志春秋時舒國頡羮城今𨽻廬州府之舒城縣漢書王子侯表頡羮侯髙祖兄子七年中封龍舒今𨽻廬州府之廬江縣通志羣舒都龍舒注今廬江縣西有龍舒廬江今𨽻廬州府之廬江縣漢書諸侯王表文帝十六年四月丙寅王賜以淮南厲王子陽周侯立為廬江王三國魏志王公傳東平靈王徽黄初三年為廬江王巢今𨽻廬州府之巢縣南畿志古巢伯國居巢今𨽻廬州府之巢縣後漢書劉般傳永平元年封居巢侯塗山今鳳陽府史記夏本紀孔安國注塗山國名鍾離今鳳陽府南畿志春秋鍾離子國當塗今𨽻鳳陽府之懷遠縣漢書武帝功臣表當塗康侯魏不害延和二年十一月封東城今𨽻鳳陽府之定遠縣漢書王子侯表東城哀侯良淮南厲王子孝文八年五月丙午封東城侯遺趙敬肅王子元朔元年六月甲午封夏丘今𨽻鳳陽府之虹縣廣輿記堯封禹為夏伯紅今𨽻鳳陽府之虹縣漢書王子侯表休侯富楚元王子孝景元年四月乙巳封三年更封紅侯僮今𨽻鳳陽府之虹縣文獻通考東漢明帝中元二年封沛獻王輔子寶為沛侯永平元年封寶弟嘉為僮侯樂安今𨽻鳳陽府之虹縣漢書外戚恩澤侯表樂安侯匡衡建昭三年七月癸亥封英今𨽻六安州之英山縣六今𨽻鳳陽府之壽州史記夏本紀封皋陶之後於英六當塗今𨽻鳳陽府之壽州左傳注塗山在壽春縣東北太康城記塗山古當塗國應劭曰禹所聚㑹塗山侯國是也舊有當塗縣州來今𨽻鳳陽府之壽州左傳襄二十九年吳子使公子札聘於上國杜注季子本封延陵後復封州來下蔡今𨽻鳳陽府之壽州史記蔡世家昭侯二十六年吳人遷蔡於州來索隱曰在淮南下蔡縣通志遷州來則以州來為下蔡汝南為上蔡九江今𨽻鳳陽府之壽州史記黥布傳項王封諸將立布為九江王都六淮南今𨽻鳳陽府之壽州漢書諸侯王表淮南厲王長髙帝子十一年十月庚午立三國魏志王公𫝊邯鄲懷王邕黄初二年封淮南公三年進為王後改封邯鄲六安今𨽻鳳陽府之壽州漢書諸侯王表元狩二年七月壬子恭王慶以膠東康王少子立為六安王後漢書章帝紀元和二年改廬江為六安國徙江陵王恭為六安王安豐今𨽻鳳陽府之壽州後漢書竇融傳建武八年封為安豐侯壽春今𨽻鳳陽府之壽州三國魏志王公傳楚王彪建安二十一年封壽春侯宿今𨽻鳳陽府之宿州南畿志古宿國地風姓伏羲後符離今𨽻鳳陽府之宿州漢書武帝功臣表符離侯路博德元狩四年六月丁夘封胡今潁州府左傳昭四年楚子㑹諸侯于申在㑹有胡子杜註胡國汝隂縣西北有胡城汝隂今潁州府漢書髙祖功臣表汝隂文侯夏侯嬰六年十二月甲申封文獻通考劉信更始封為汝隂王光武即位封為侯潁陽今潁州府文獻通考潁陽侯祭遵建武二年封潁陽侯馬防建初四年封新郪今潁州府後漢書郭皇后紀建武十七年后從兄竟以騎都尉征伐有功封為新郪侯地理志注應劭曰章帝封殷後更名宋師古曰封於新郪號為宋國慎今𨽻潁州府潁上縣後漢書劉賜傳建武二年封慎侯霍今𨽻潁州府霍邱縣史記管蔡世家武王封弟叔處於霍祝兹今𨽻潁州府霍邱縣漢書髙后功臣表祝兹夷侯徐厲四年四月丙申封王子侯表祝兹侯延年膠東康王子元封元年五月丙午封陽泉今𨽻潁州府霍邱縣後漢書黄瓊𫝊瓊孫琬光和末更封陽泉鄉侯蓼今𨽻潁州府霍邱縣南畿志春秋為蓼國漢書髙祖功臣表蓼夷侯孔藂六年正月丙午封譙今𨽻潁州府之亳州史記周本紀武王封神農之後於譙譙都今𨽻潁州府之亳州魏畧黄初二年改長安譙許昌鄴洛陽為五都建成今𨽻潁州府之亳州史記曹相國世家楚懷王封參為執帛號曰建成君漢書王子侯表建成侯拾長沙定王子元朔四年三月乙丑封細陽今𨽻潁州府太和縣後漢書岑彭𫝊建武三年封彭舞隂侯子遵嗣徙封細陽侯山桑今𨽻潁州府䝉城縣後漢書王常𫝊建武二年封山桑侯全椒今𨽻滁州之全椒縣後漢書馬成傳建武二十七年定封全椒侯阜陵今𨽻滁州之全椒縣後漢書阜陵質王延傳永平中徙為阜陵王歴陽今𨽻和州之含山縣史記項羽本紀歴陽侯范増廣平今廣德州漢書中山靖王勝傳哀帝立廣德王雲客弟廣漢為廣平王建平今廣德州後漢書銚期𫝊光武即位封安成侯子丹嗣復封丹弟統為建平侯博鄉今六安州漢書王子侯表博鄉侯交六安繆王子竟寧元年封徐今泗州春秋僖三年徐人伐舒杜注徐國在下邳僮縣東南通志注今泗州臨淮有徐城又有偃王廟徐君墓盱眙今𨽻泗州之盱眙縣史記項羽本紀項梁立楚懷王孫心為義帝都盱眙贅其今𨽻泗州之盱眙縣漢書外戚恩澤侯表贅其侯吕勝髙后四年四月丙申封江南通志卷二十九
