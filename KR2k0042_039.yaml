祠在泰州祀宋富弼范仲淹胡瑗王楊英陳瓘趙抃孔道輔曾肇胡令儀嶽飛文天祥胡安定祠在泰州泰山之北祀宋胡瑗又一在安豐場附明湛若水胡安定祠堂記諭人者以其異域善孰與以其鄉族善曰善鄉鄉為近示人者以其言善孰與以像善曰善像像為切近則人習服切則人易知人習服故易從人易知故有親有親則感易從則化是故異域使人敬鄉族使人信言則入人耳像則入人心故先王之法鄉大夫令術司徒之教行魏像立而治法昭今夫號於人曰必若而鄉某君子乎必若而鄉某義士乎則聞者莫不悅相語曰彼周非逺引乃云吾鄉某也某也誠義士君子也斯不亦以鄉而近習服而易從乎今夫斫木而像之葺椽而屋之肅乎若有著乎風神儼乎若有見乎其容聲則過者莫不敬畏相語曰彼乃吾鄉之義士也君子也吾等可自棄為不義歟為小人歟斯不亦以像而切易知而親乎南昌王君公弼以進士來守泰州召士氓咸造於庭曰吾守兹土實兼教養凡爾士庶盍同於豫善爾弗我徴盍稽於爾鄉之先哲式追於前文人若爾安定胡先生者爾豈不知而慕之乎哉與孫明復石守道藏修泰山其義行篤於躬化於家孚於而鄉教授於蘇湖振歷代詞華之沉迷復往古敦朴之實行師教升於國學聲實逹於朝廷式法播於天下一時多士靡然從之為之一變不問可知其為安定門人若是者爾之士庶其亦有意乎有則吾為爾祠而新之以為爾仰止之地不亦可乎皆欣然曰諾乃白於撫按卜城東南之隙地以州之贖金撤官之閒屋而顧鉞之義助半焉凡三月而落成為堂者三楹外為大門內為寢室視堂之數弗有殺焉前臨大池後館諸生旁亭顔學亭周之池水使士講聖賢之學於其間選胡氏子弟二人寄學習禮捐官田五十畝共其祀事而復徭焉是故東南法長養也前周池昭澄心也後學館示步武也亭顔學示的也是故巍焉肅焉示像也於是士皆歡悅過其祠者皆相語曰吾等兵防水利農算之學有若安定治事齊之教乎五經異論文藝理勝之學有若安定馴馴雅飭之化乎於是王君聞之曰安定之學豈但若是已乎乃遣其門弟林春王棟之京問甘泉子甘泉子曰噫善如王子之問也善如王子之問也安定之學之教人失其真傳也而二於孔子久矣豈直今也哉夫孔門之教同於求仁仁人心也天理也四科之列惟顔閔雍耕諸人得其宗餘則因材成就者耳而謂有四焉豈聖人無類之教哉若安定先生當聲律浮華之弊已極毅然而起以變化士習為己任以開濓洛之傳必其精神心術之徴有不言而信者行乎其間觀其顔學之試道德仁義之教有足徵者至於經義治事之科條乃其因材而成者耳以為先生之道盡在是矣豈不惑哉夫聖人之學心學也故經所以明其心也治事所以明其心之用以達諸事者也體用一原也而可以二乎哉此或先生立教之本意而人失其傳矣乎若非人失其傳則先生之學之教荒矣豫幸得於百世之下故為其鄉人士推言之庶幾不終二於先生之教焉王君曰命之矣幸為記諸石三忠祠在泰州城內祀宋李庭芝孫虎臣姜才六太守祠在泰州祀宋守荆罕儒周述田錫張綸孔道輔曾致堯四賢堂在髙郵州祀宋孫覺秦觀喬執中朱壽昌附宋陳造四賢堂記郡庠三賢堂繪中丞孫公給事喬公龍圖秦公像尚矣兼繪少卿朱公則始於今太守陳公公按圖有間知彰孝名坊孝子朱公常居焉曰是可以表俗乃求得其像繪於堂扁曰四賢而命客記之髙郵至元祐人材林立是三巨賢又傑然其間入而著論思之益出而茂惠利之績文章術業國史記之遺書粲然足以師表天下範模後世况其里之人瞻敬而取法焉宜也而朱公幼失其母棄官求之備極艱楚晚得之同州若神物誘致之一時名士播之於聲詩以美其事東坡至有今無古或聞之語三公信偉矣而孝尤德之本行之所宜先朱公則優之夫有生孰無父母有知孰不可為孝人有性孰不可誨而從感而動則四三公而像之俾得之聞見誦說其不興起者幾希昔吾夫子設為德行言語政事文學四科曾子得聖傳不後顔冉孝經一篇特為曾子設則以其能盡孝於親而得夫所謂德之本行之先者昔聖昔賢其立教豈茍云乎昔王綸之為豫章圖陳蕃華歆謝鯤於郡堂其政寬簡有由焉此前人像三賢意梁彥光在鄴焦通悖戾諭以伯俞念親泣杖之事卒為孝子則儕朱公於三賢誰其間然郡士民見諗曰使君惠我無窮而能道其德心也則惟子矣願記之遂為之記思賢堂在泰州學內祀宋韓琦歐陽修劉敞吕公著蘇軾宋彭方重建增祀陳瓘任伯雨為七賢堂附宋范成大思賢堂記吳郡治故有思賢亭以祠韋白劉三太守中更兵燼久之遂作新堂名曰三賢其四年當紹興辛巳鄱陽洪公始益以唐王常侍本朝范文正之像復其舊之名亭者傍焉先是公以歲五月來臨吾州繇州南鄙望洞庭略其區觀三江五湖之吐吞波聒天旁無邊垠而石堤截然浮於巨浸之上若有鬼神之扶頧鯨鰲背負而涌以出也暮夜人語馬嘶丐丐不絶公固已語其人思常侍之功矣周覽原田而相其溝防東南之播於江東北之委於海者脉絡釃通堙蕪滌涂夏旱易以陂潦水時至不能齧渚涯以決汙邪荒寒化為麥禾起景祐迄兹歲無大浸於是公又曰非文正范公之勤其民者乎退而參石記竹書之傳詳兩賢行事尚什伯於此韓退之名知言碑王之墓隧謂治蘇最天下蓋遺册僅存於一隄其變滅無考者不知幾也文正自郡召還遂參永昭陵大政德業光明為宋宗臣通國之誦曰文正公而不以姓氏行焉韋白劉之餘愛邦人既已爼豆之語在舊碑尚矣王范風烈如此且有德於吳宜俱三賢不沒以為無窮之思此堂之所為得名者嘗謂士才高必自賢位髙或不屑其官世通患也洪公忠宣公之子擢博學宏詞第一名字滿四海餘二十年既入翰林為