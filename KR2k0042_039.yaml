body:
  text: 欽定四庫全書江南通志卷四十輿地志壇廟四祠墓附淮揚徐三府大海通三州淮安府社稷壇在府治西門外風雲雷雨山川壇在府治南門外農壇在府治東郊置有藉田歲以仲春亥日耕藉於此郡厲壇在府治北門外在縣曰邑厲里社鄉厲二壇在各鄉保關帝廟在府城外雍正五年奉㫖追封三代公爵春秋同日祭於後殿蠟神廟劉猛將軍廟俱在府城以上壇廟所屬縣皆如制龍王廟在府治新城旗纛廟在各營淮瀆廟在府治新城北門外禹王廟在府治西南八十里髙堰湖堤漢髙祖廟在府治西四十五里惠帝元年令諸侯王立髙廟至今存焉英烈王廟在府治朝宗門外祀吳伍員東海恭王廟祀東漢東海恭王彊以始封於此也楚元王廟在府治西南漢劉交封於此宋建炎中賊李成以萬衆攻城民禱於神大敗之由是廟祀益䖍舊以宋趙立魏勝應純之元許維貞為木主附廟中成化初知府楊昶又以漢張敞鄭𢎞汲黯尹翁歸黃浮三國關漢壽亭侯張飛晉王祥王渾唐宋璟宋米芾明范中施禮彭遠丘陵皆有功於淮人者並附祀焉淮隂侯廟在府城南市祀漢韓信附宋蘇軾淮隂侯廟碑銘應龍之所以為神者以其善變化而能屈伸也夏則天飛效其靈也冬則泥蟠避其害也當嬴氏刑慘網密毒流海內銷鋒鏑誅豪俊將軍乃辱身汚節避世用晦志在鵲起豹變食全楚之租故受饋於漂母抱王霸之大略蓄英雄之壯圖志輕六合氣蓋萬夫故忍耻胯下洎乎山鬼反壁天亡秦族遇知己之英主陳不世之竒䇿崛起蜀漢席捲關輔戰必勝功必克掃强楚滅暴秦平齊七十城破趙二十萬乞食受辱惡足纍大丈夫之功名哉然使水行未殞火流猶潛將軍則與草木同朽麋鹿俱死安能持太阿之柄雲飛龍驤起徒步而取侯王噫自古英偉之士不逢機㑹委身草澤名湮滅而無稱者可勝道哉乃碑而銘之曰書軌新邦英雄舊里海霧朝翻山烟暮起宅臨舊楚廟枕清淮枯松折柏廢井荒臺我停單車思人望古淮隂少年有目無覩不知將軍用之如虎漂母廟在府治望雲門外趙康川廟在府治東祀宋趙師旦顯忠廟在府城北市之西祀宋開府趙立風神廟在清河縣口康熙五十四年建雍正十年重建奉㫖欽定封號清河宣惠風伯之神太王廟在清河縣東運河口聖祖仁皇帝南巡時御題安瀾效祉四字扁額又勇南王殿御賜長源永義四字扁額淮神廟在清河縣東二里明武宗南狩至徐州神著靈異顯節侯廟在安東縣東祀唐御史王義方附明揚谷顯節侯廟記唐侍御史王公義方舊有廟在漣水之震隅郡乘莫詳所始谷每讀唐書至公傳未嘗不三復興歎而重公之學髙公之誼壯公之直且惜公不大用於時而幸吾准得斯人之為重也初公起家道逢困餒輒解所乘馬以遺之聲名聳動當寧太宗使宰相聽其議論於其時尚書郎獨孤哲以儒顯許敬宗推與之談公引物連類出入百家每挫哲直出其上輒至㑹罷夫二子一時名儒也而講究異同屈下於公此其學宜何如比是蓋劉向之倫而有西漢之風者也宰相魏徴竒異其才欲妻以夫人之姪公不可既而徴卒乃娶焉人問其故則曰始則不附當路而今則感知己者也初公自雲陽丞擢侍御史㑹李義府縱婦迫殺大理丞公欲劾之意必得罪問䇿於母母曰吾聞王母伏劍將以成陵之義汝果盡忠吾死且不恨矣夫貴姻勢縮母子相喣人之常態也公於宰相既歿者而婚其家權幸動一時者則直前擊之視死如歸母亦贊助其成此其誼何如比是蓋滂母之流而有東都之節者也公之廷劾義府其言有曰天子置公卿大夫欲水火相濟鹽梅相成不欲獨是獨非也今陛下撫有萬邦蠻區夷落罪無逃罰而日月之下姦臣肆虐此生殺之柄不自主出而下移佞臣矣即具法冠對仗叱義府跪聽彈劾夫義府人猫笑刀髙宗親幸之臣也一時雌雄誰敢明白而公奮然叱之是其直言徑節逺配朱雲而攀檻請劍之氣蓋異世而同符者也公生平友善張亮亮死而厚遇其妻子南行道逢濤霧酌水誓祝天為開霽貶官之後遂不復仕進聚徒而教授焉既歿門人員半千輩築室廬墓三年乃去夫人以忠烈一節稱公知公淺矣學如是誼如是直如是生有盛名歿而感物友道善終誠信動天可謂完德是蓋有唐一代諸臣中之傑然者非獨所謂鄉先生殁而可祀於社者也忠義祠在學宫內節孝祠在山陽縣治西二祠屬縣俱如制許談二祠在府西南八十里洪澤湖堤鍾離相公祠在府治七十里祀楚將鍾離昧范張祠在府治市橋祀范巨卿張元伯節孝祠在府治東祀宋徐積安定先生祠在府治西北祀宋胡瑗威濟祠在府城宋紹興間李寶自海道禦敵至石臼山禱之因風縱火焚敵敵大敗詔封祐順侯廟祀之恭襄祠在清江浦祀明平江伯陳瑄督撫名臣祠在郡治東南祀總督巡撫都御史江夏王竑汝陽滕昭等二十四人貞烈祠在郡西北窑溝正德四年為烈女何氏立王太保祠在鹽城縣西沙溝口祀晉王祥陸丞相祠在鹽城縣治南祀宋陸秀夫附明楊瑞雲重修鹽城縣陸丞相祠記夫宋亡死節之臣多矣乃余則以陸丞相為稱首云蓋戎臣武將率貔虎之士鼓勇血戰敗北而死死於一時封疆之臣嬰城自守食盡力殫城未破而死死於旬月亦有舉家同死者然髙樓止水猶在疆土中乃陸丞相則自德祐元年至祥興二年歷時久矣一念忠赤直與宋室相為存亡心逾金石氣貫日虹諸臣相繼亡去丞相獨不去又召致陳宜中張世傑同赴國難周旋不舍今年走溫州明年走福州更歷三主間關播越至於海上逮崖山破慮帝為元人所得貽宗廟社稷之辱乃驅妻子先入海於是負帝入海死嗟乎難莫難於從容就義終始不渝烈莫烈於舉家沉海盡葬魚腹故余談品宋亡死節之臣以陸丞相為稱首云余家崖山下最悉丞相死事每登崖山俯海濤倚風悲弔之顧當其時七日浮尸出海上人得收葬之故潮州有侍郎嶼即丞相墓也歲久墓就平後遂莫考覽丞相葬處傷哉萬厯己卯余受命宰鹽城則首謁陸丞相祠又獲拜於所葬衣冠之墓有厚幸焉蓋丞相死所乃余之鄉也余所宰邑則又丞相之鄉也有異代之誼矣其時祠宇荒圯余亟修飾之既落成釃酒以告而誦九歌九章以為迎神送神之曲肅乎見其儼然正笏之容而英英乎若其神之颯然而來也則竊嗚唈太息曰史稱丞相仗劍驅妻子時夫人有難色豈謂夫人難一死哉夫人從丞相蕩析者數年習聞忠義之言也自分一死所云難色者蓋欲與丞相同死耳以故丞相諭之曰爾先去怕我不來遂與三子偕入海死嗚呼丞相忠魂烈氣千載如生載之汗青日星並耀著之祀典爼豆生馨並妻子亦烺烺炳炳施聲來䙫丞相不死哉潘公祠在鹽城縣祀明潘季馴惠濟祠在清河縣舊新莊閘口明正德三年建嘉靖間賜額國朝雍正三年重修漢楚王韓信母墓在府西四十里與漂母墓對漂母墓在府西四十里枚臯墓在舊淮隂縣今失其處唐盧國公程知節墓在府治東南紫霄宫前宋紹興十年韓世忠築城掘地得碑銘按知節陪葬昭陵事見唐史掘地得碑始自宋王象之輿地記勝後人皆仍其誤耳宋少卿張耒墓在府城北七里或云在城西舊淮隂縣教授徐積墓在府東三里塘有節孝祠髙陽郡公韓渙墓在府舊城西門外刺史趙師旦墓在府城東三里塘觀察使趙立墓在山陽縣北辰鎮丞相陸秀夫墓在鹽城縣西南史欽墓在清河縣北金城鄉明沭陽伯金濓墓在府東門外十五里石塘尚書沈翼墓在府南平河橋東岸侍郎楊理墓在府西鉢池山太子太保葉淇墓在府移風閘西岸侍郎葉贄墓在府治西十里更字鋪侍郎蔡昂墓在府治南包家圍侍郎胡璉墓在府治西石塘都御史潘塤墓在府平河橋都御史盧蕙墓在府城西安樂鄉都御史楊靖墓在府栁淮鄉國朝提學僉事劉芳聲墓在府城南楊家莊知縣劉昌言墓在山陽縣城東三里塘揚州府社稷壇在府城西門外風雲雷雨山川壇在府城南門外三里橋敕建先農壇在府治東郊壇旁有藉田歲以仲春亥日耕藉於此郡厲壇在北門外壽寧街在縣曰邑厲里社鄉厲二壇在各鄉保關帝廟在府治北門街國朝雍正五年奉㫖追封三代公爵春秋同日祭於後殿城隍廟在府城西北蠟神廟劉猛將軍廟在府城以上壇廟所屬州縣皆如制旗纛廟衛所俱建怡賢親王祠在府治三汊河雍正十年奉㫖敕建夏禹王廟在府治浮山後又一在髙郵州臨澤鎮邗溝神廟在府治邗溝傍旌忠廟在府城東門內祀宋死節臣魏全王方明顯勇廟在府治舊城內祀宋死節臣吳從龍三將軍廟在府城西祀宋將軍元怡梁宏張昭又一在儀徴縣焦家山英烈王廟在儀徴縣胥浦橋即伍員祠也并祀漁丈人浣沙女廟在縣治祀女馮氏子胥亡楚囑其勿言女遂投江以絶口恭愛廟在縣陳公塘側祀漢廣陵太守陳登宋熙寧間建東嶽廟在髙郵州北新城小東門外宋太平興國間建禹廟在髙郵州東北九十里臨澤鎮漢髙帝廟在髙郵州沛城村康澤廟在髙郵湖中洲上俗名耿七公廟祀宋耿遇德遇德昭宗時人天性忠實死而為神禱之者舟行無沒溺旱暵有甘澍屢封至靈應侯清水潭龍神廟在髙郵州城北二十里宋嘉定間建英烈夫人廟在高郵州即毛惜惜死節處詳見烈女昭陽廟在興化縣昭陽山祀楚令尹昭陽亦名山子廟三閭大夫廟在興化縣滄浪里祀屈原文孝廟在泰州治西宋紹興十三年建祀梁昭明太子忠義祠在學宫內節孝祠在學傍二祠各州縣俱如制董子祠在府治新興坊祀漢董仲舒舊在府城兩淮運司後堂內有井曰董井即董子宅也明正德間改建於此康熙四十四年御賜正誼明道額附明喬宇重遷董子祠記兩淮運司在揚州府治東其地乃漢江都王相董仲舒故宅宣德間運司金華何君士英建祠祀董子正統間四明嚴君貞遷祠於㕔事之後𢎞治間新城畢君亨復於運司西建正誼書院正德辛未夏髙平畢君璽為運使蒞任之日見祠居㕔後惕然靡寧以淮揚當衝要之地鹺司實㑹計之所士大夫欲進謁者恆以出入為艱惟書院𢎞厰向明盍改圖焉乃請於巡鹽監察御史朱君冠以為然於是聿新其規制塑董子像於中為堂者四楹東曰祭器庫宰牲堂西曰圖書房致齊所楹之數各如之儀門左右有石碑亭巷之南北建棹楔二又買田若干畝以供春秋祭祀羡餘則以食守祠者祠之後作書院堂曰資仕東西齊曰博聞曰起道以收商竈子弟之俊秀者擇明經士為之師以訓迪焉丹堊咸備教條具舉誠一時之偉也既落成畢君走書於余求為文以志其顚末宇惟聖人之道自戰國以來不明於天下久矣董子獨能抱遺經於坑焚之後潛心正學所以秦漢諸儒鮮有及者觀其論道之大原與義利王霸天人三䇿之對皆有合孔門之大㫖先儒稱其淵源純粹自學問涵養中來不信然與惜乎武帝好大喜功所任用而親昵者不過曲儒方士詼俳辭賦之流至若仲舒乃弗能用斥之以相藩國然董子雖不得顯於當時其遺言善行有功於後學者蔚乎其未泯也逮至聖朝文運天啓髙廟以仲舒從事闕庭憲廟又追爵廣川伯儒者之效歷千餘年而益顯如此夫今江都又董子宦履之地御史朱君運司畢君乃克崇重而作新之凡章縫之士𨽻業於斯者務相勉焉以進修其實一洗夫薄俗功利矯詐之陋以副我列聖崇儒重道之盛心庶兹祠之遷有補於風化大矣豈直潔豆籩美輪奐而已哉畢君所至有政績前知廣川時亦嘗葺新董子書院兹修舉國課之餘又能稽古考德以儀來學皆不可不書也是為記蔣忠烈祠在府治南門外祀漢秣陵尉蔣子文謝太傅祠在府治子城上祀晉謝安又甘棠廟在邵伯鎮亦祀安卞忠貞祠在府治南門內祀晉卞壼廣陵五先生祠在府治西門外祀宋胡