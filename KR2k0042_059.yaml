body:
  text: 江南通志卷六十河渠志運河三國朝順治八年大浚髙郵漕河十六年總河朱之錫題準河防事宜附朱之錫疏略淮揚之治河較他處不同揚屬運道與湖水相連淮屬運道係黃淮交流淮河自西而來至泗州入諸湖出清口達於黃河以淮黃之勢言之黃強淮溺黃濁淮清二瀆同至於清口滙合東由安東雲梯關以入海此從來不易之勢也但黃流濁河易致沙淤必藉準流蕩滌方不至梗運病民先年嘗有分黃導淮之議分黃者於桃源縣迤南黃家觜闢一攴河使其從旁分泄以殺強黃之勢導淮者導引淮流歸於海以通運道故淮水偶有暴漲於南設有髙良澗周家橋二閘以偹宣泄溢入寶應髙郵諸湖相連澎湃各建閘座挑穵河渠纍築堤岸捍禦衝決由邵伯金家灣入芒稻河或從瓜儀注江或通廟灣歸海此蓄泄湖水之法外此再無庸於旁泄矣至於雲梯關之灌口固為黃淮會流一路寬廣歸海之處每遇河流泛漲無處分殺必從清河上四十五里仍挑黃家觜經清河至安東五港口東流入海分殺暴漲之勢不致南下而清口得免黃強抵淮阻運之患至新溝等五險工亦可稍免全河洶湧衝漫之虞誠為保運安民長䇿奈長二百四十里淤殿年久工繁費巨難以輕舉應俟年豐物阜另議舉行其太行老隄山陽境內延袤三百里原係民修民守自秦按院處題免鄉夫後數年未修又值去歲洪流衝漫處坍塌不堪捍禦宜照舊例按籍責成鄉民分修又此隄之內五險工下流關切淮揚髙寶等七州縣鹽課亦攸係之歲歲修防勢難緩怠若得有引水一支流旁瀉以減正河之勢以免射陽之衝誠五險之要著第查蘇建比岸宮家營地方舊有引水一河久經淤塞每有興濬議皆未果蓋緣引河必使深廣同於正河方能借勢而下况黃河諺稱神河濶數百丈底深水溜不惟挑濬匪易借使如式寧能保其不旋桃而旋淤乎亦惟有廣積夫料加意修防以收補偏救弊之功舍此無他竒也爰自前明挽河資運閲數百載變故即費數百載經營今其遺迹具在然舊貫固可仍而時宜又不得不審臣請備陳之準水自西南來趨東北黃水自西米橫截於清口外淮之攴流會黃並驅東下入海者所謂黃河也伏秋之間淮黃交漲淮被黃遏周旋而不得出清口以上滙而為洪澤等湖則髙堰危故堰南有髙良澗周家橋兩閘泄水東入髙寶白馬等湖髙寶湖東通運河南從瓜儀入江而地勢微昻宣泄不及則運隄危故運河東岸有涇河子嬰金灣等閘泄水東下射陽廣洋等湖入海有灣頭閘有芒稻河泄水南入於江此運河及諸湖之形勢也隄閘舊制現存間有歲久圮壞者應酌量估計以時修葺者也淮黃交會由清口而東濁流湍悍衝潰易告查前明萬歷年間曾於桃源縣黃河北岸挑黃壩新河二百四十里分黃一攴由五港口歸海以導淮保運即以殺南岸河患但淤澱已久工役繁巨興復實難又崇禎年間塞蘇觜建義兩決口曾挑宫家營引河十里暫殺水勢未幾仍淤蓋河不兩行既恐徒費况今歲淮工坌集亦有未易並舉者至於現今河身濶者數里狹者亦不下數百丈兩隄去河尚有陸地水長則及隄址水落則復河渠洪流衝蕩不啻奔馬豈俟人力開鑿收流之議似無庸贅此黃河之形勢也總之太行老隄實淮揚七州邑一大保障自前朝來原係莊民自修而中間頂衝掃灣諸險工亦有鹽城各縣出夫協濟之例順治九年間黃河北決淮屬工民控按臣遂為題免沮格廢弛去歲冬漲幾成大害此臺臣何可化特以力役為言蓋實有見於往例之不可廢耳康熙五年運河自儀徵至淮多淤淺冬春之交盤撥甚艱總河按地親勘儀徵界內朴樹灣西方寺五里鋪三處急需挑濬檄知縣何崇倫浚之六年決江都運河之露筋廟隄次年堵塞七年遣大臣明珠等相視海口開天妃石䃮白駒等閘九年決清河縣運河之窯灣文華寺髙郵州運河之茶菴清水潭江都縣運河之東隄四淺十年清口為黃水灌入裴家場悉起油沙天妃閘底淤墊回空糧船不能進口乃於清河縣南腰鋪支河之連張福口者疏浚通舟由周家閘行十一年總河王光裕修寶應縣子嬰黃浦永安等七閘四月清水潭復決十二年總河王光裕於江都芒稻河改造閘門迎金灣河建滚水壩於邵伯南十三年清水潭決口塞十五年揚屬漕隄潰高郵之清水潭陸漫溝江都之大潭灣等處共決三百餘丈遣工部尚書冀如錫戶部侍郎伊桑阿等親行相視移安徽巡撫靳輔為總河都御史十六年總河都御史蘄輔濬運河附靳輔疏略運河自黃流內灌之後日墊日髙今年八月內河底竟至乾涸隨閉隄挑浚因回空不能久待止量挑一二尺不等擬於明年立春後十日土凍方解時即行閉壩大挑總限百日完工以濟十七年回空十八年春運十七年靳輔築江都漕隄以髙郵清水潭決口深不可築更於湖中繞迥開河一道改築東西隄與舊隄相屬河成名曰永安河又大浚山清髙寶五州縣運河增築兩岸其決口三十二處並塞之十月總河靳輔疏另開南運口十八年四月築清水潭東西隄決口工竣六月改置南運口於三汊河靳輔治河書大江以南各省漕運自瓜儀而北凡四百五十餘里至清江浦天妃閘以入黃河此明臣平江伯陳瑄之所開也萬歷間河臣潘季馴以天妃閘直黃河故不免內灌因移運口於新莊閘以納清而避黃後亦以天妃名之非其故矣然其口距黃淮交會處不過二百丈黃水仍復內灌運河墊髙年年挑浚無已兼以兩河匯合瀠洄激蕩重運出口牽挽者每艘常七八百人或至千人鳴金合噪窮日之力出口不過二三十艘而濁流奔走直至髙寶城下河水俱黃居民至澄汲以飲於是建閘置壩申啓閉之條嚴旨刻石除重運回空及貢鮮船隻放行外即閉壩攔黃凡官民商艇俱令盤壩往來夫閉壩之制不獨不便於民且空重往來之時仍不能禁黃流之不入乃不得已之圖非不易之策也蓋因當時太山墩一帶及七里墩外皆渺然巨浸舍新莊閘之外别無彼善於此之地地形水勢實限之以不得不然耳自黃河倒灌以來西北自白洋河于家岡一帶直接泗州東北自吳城張福口一帶直至武家墩卑窪者悉變為髙原清口以內裴家場帥家莊爛泥淺周圍五十里凡墊成平陸之處挑引河四道淮水仍出清口是則黃流之灌在當時誠大為運河之害而在今則頗受其利矣何也清口兩岸墊髙天然成隄黃淮不得交漫一利也太山墩上下洪濤盡涸而運河之地形愈加完固建閘置壩可以惟我之所擇二利也清口之內橫亘灘洲淮盛則泗水滔滔北注淮弱則湖水常有所蓄以濟運而不至於盡泄即黃漲內乘亦限於灘洲而不得縱不久而淮水盛長即便抵回三利也邇年以來重運過淮揚帆直上如歷坦途運水永無淤墊之虞淮民省嵗挑浚之苦矣雖然旱潦不常湖水設有時而淺涸諸引河勢不能暢注而俱出則寧使裴家場之水斷流而爛泥淺一道務須挑浚深寬毋或緩此而顧彼此則意外之虞不得不預為之籌者也是年增挑南運河起土加築兩岸隄開滚水壩於江都之鰍魚觜塞清水潭大決口十九年再置滚水壩於髙郵城南八里又置於寶應子嬰溝創建山陽運河之鳯陽厰減水壩一座創挑皂河四十里以通北運創建碭山毛城鋪大谷山宿遷攔馬河歸仁隄邳州運河東岸馬莊集減水壩十一座開皂河上接泇河通運又開張家莊通運口靳輔治河書明萬厯三十一年總河李化龍開泇河行運自夏鎮達於直河口不由徐吕二洪避黃河之險者三百里漕運利之後直河塞改行董口及董口復淤遂取道於駱馬湖由汪洋湖面西北行四十里始得溝河又二十餘里至窯灣口而接泇苐駱馬湖本窯田也因明季黃河漫溢停積而成湖夏秋水發不礙行舟至冬春水涸其淺處不流束楚且水面遼濶縴纜無所施每重運入口即役兵夫數萬於湖中撈浚浮送北上而所潦之渠不旋踵而汩沒於風浪之中年年畚鍤宿邑騷然苦之况黃河復故雨潦各有所歸湖水必致日涸且撈浚無所施實漕運咽喉之大虞矣查宿邑西北四十里皂河集其地溝渠斷續有舊淤河形一道若挑新浚舊因而通之可以上接泇河之委而下達於黃但啓土於沮洳之地為力甚艱又南患黃河之逼北虞山左羣山之水不有隄防不可以行運乃揆測規畫即取水中之土以築水中之隄南起皂河口北達溫家溝水深之處挑水旱工共二千四百丈兩岸築隄四千八百丈凡邳宿兩州縣舊河內一切漫流旁泄決口三十餘處盡行築塞又起自溫溝歷窯灣至邳境貓兒窩計四十里從無隄岸每山泉暴漲即一望滔天復兩岸築隄二萬七千丈然貓兒窩一帶為徐兖諸水之所注納水大盛則隄必傷故建減水大壩三座以泄之至如貓兒窩以土地亢土堅則空之而弗隄又貓兒窩以至唐宋山三千餘丈乃霪霖暴漲之所從出者則隄之蓋自皂河而上者無不治矣惟是下口直截黃河遇伏秋暴漲不無內灌之虞於是復加斟酌相得皂河迤東二十餘里張家莊其地形卑於皂河口二尺餘而黃河上下水勢大抵每里髙低一寸自皂河至張家莊二十餘里黃水便低二尺餘內外水面髙低相準乃復挑支河一道自皂河厯龍岡坌路口逹之張家莊出口蓋前此皂河出口如丁字形黃水自西而東皂河水自北而南兩溜相抵而不相比且黃強清弱故易灌今張家莊之出口如人字形黃水與張家莊口之水俱自西而東與溜相比而不相抵况又以皂河地髙之水下注於二十餘里地卑之出口其迅流更足以抵黃也由是上則東省河流滔滔奔注常束本等之水於漕中而泄暴漲之水於壩外下則運口常通永無淤塞之慮矣二十年增置髙郵南北滚水壩前後凡八座壩口二三十丈不等對壩皆開越河以防舟行之險凡舊隄險要處皆更以石創建寶應子嬰溝髙郵永平港南關八里鋪柏家墩江都鰍魚口減水壩共六座改建髙郵五里鋪車邏港減水壩二座二十二年大修兩河各隄工告竣二十三年建惠濟閘在馬頭東南七里溝清河縣志舊名通濟閘明嘉靖年建引淮水以達漕運後以河水南侵閘底淤墊至是新鑿漕河於迤南三里更建閘座為新運口閘名惠濟是年冬十一月聖祖仁皇帝南巡親閲河工靳輔治河書上駐蹕紅花埠問總河靳輔髙寶興泰一帶下河為何積水不去靳輔回奏髙寶興泰是窪下之區如同釡底向來河道淤塞是以下雨積水并減壩泄下之水一時難去上命動支國帑速興工挑濬下河又奉上諭吏部尚書伊桑阿朕車駕南巡省民疾苦路經髙郵寶應等處見民廬舍田疇被水淹沒朕心深為軫念詢問其故具悉梗概髙寶等處湖水下流原有海口以年久沙淤遂致壅塞今將入海故道濬治疏通可免水患自是往還每念及此不忍於懷此一方生靈必圖拯濟安全咸使得所始稱朕意爾同工部尚書薩木哈往被水災州縣逐一詳勘期於旬日內覆奏務期濟民除患縱有經費在所不惜爾等體朕至意速行上回鑾至淮安又諭靳輔云河道情形我俱詳細曉得只是下河之水因無去路民田尚然淹著應速開浚駕至天妃閘問天妃閘險何不再造一閘分殺水勢靳輔奏已建有七里閘一座上見運口新閘問此閘為何而造靳輔奏臣恐黃水大漲天妃閘不能承當所以又造此清水閘束水專為天妃閘而設上諭靳輔云今年黃水倒灌運河不可為訓爾須酌一治安之策令永不內灌十一月上面諭吏部尚書伊桑阿等勘明泰州興化鹽城等處應挑浚海口伊桑阿等回奏奉旨九卿詹事科道會同確議具奏附伊桑阿等疏略臣等祇遵前所奉到上諭將興化鹽城等州縣海口詳勘得山陽寶應髙郵江都泰州興化鹽城等川縣之水原從車路河白塗河等處流入運鹽串場河出白駒場丁溪場草堰場劉莊場等十餘口由苦水洋鬬龍港信陽港廟灣入海今因年久車路等河串場河及各場出口俱被沙土淤淺比髙郵興化等處河身反髙以故水雖仍流而蓄水不能出口令將減水壩一帶運河水口決濬導流將會流串場河之車路等河及串場河白駒丁溪草堰場等口俱挑浚深闊引髙郵等川縣蓄水入海始永免水患生民得以樂業矣十二月命安徽按察使于成龍浚髙寶等州縣下河二十四年二月初四日上諭按察使于成龍茲以海口關係運河下流特命爾督理髙寶等處下河事務管轄所屬附近海口州縣等處地方車路等河並串場河白駒丁溪草堰場等口逐一確勘挑濬深闊使髙郵等州縣減水壩一帶運河水口引流入海仍撫綏黎民勤宣德意約束衙門官吏胥役恪遵法紀勿致作弊生事嚴飭所屬海口有司等官各循職掌勿使糜費錢糧怠弛曠廢一應海口俱宜善加挑濬毋令沙土淤淺以致水勢漲漫淹沒民間廬舍田疇其挑河一切事宜並應設官分任之處均申詳總河具題定奪敕中開載未盡應行事務爾悉申詳總河題請遵行歲終將所修工程及支用錢糧細數一並造册轉報總河題銷仍聽總河節制爾膺茲委任須持亷秉公精心殫力俾水患永除民復舊業惟爾之功如或執拗乖張因循冒破殃民誤國責有所歸爾其愼之故敕二十五年總河靳輔奏開中河附靳輔疏略本年黃河槽內之水較前異常急溜以致一切物料轉運萬難即如本年重運糧船自清河縣運口以至宿遷縣張莊運口計程不過二百餘里而牽挽兩月有竒此皆急溜阻滯之故臣於河工善後事宜案內請於清河縣西仲家莊地方創建雙金門石閘一座以泄黃河異漲今將泄水雙金門閘改為三丈深之單金門大閘一座又於攔馬河之西加挑運河二千餘丈築成兩岸隄工直接張家運口並於遙縷二隄之中開挑中河一道上接張莊運口並駱馬湖之清水下歷桃源清河山陽安東以逹於海將來重運糧船既出清口之後於黃河內止行數里即便由仲家莊閘內進入中河自中河歷攔馬河直達張莊運口北上則此閘既泄黃漲又能使各船避黃河之險溜行有縴之穩程庶大有益於轉漕而各工運料亦可不致稽誤矣二十六年正月工部等衙門會覆監修下河侍郎孫在豐等疏稱先將近海口之石䃮白駒丁溪等處估計興修靳輔先前請修疏內稱髙郵以北車邏以南邵伯鎮以北所有閘壩於去歲堵塞髙郵以北閘壩亦有可以閉塞等語奉旨修理下河成功不在髙郵州所有閘壩而在乎堵塞髙家堰之壩并黃河南岸毛城鋪等處所有減水閘壩皆堵塞則黃河之水不流入洪澤湖如洪澤湖既無黃河流入之水唯止有淮水將髙家堰之壩暫行堵塞一年後挑濬下河方得有益又奉旨下河工程今年著止將髙郵州大小壩及髙家堰閘壩照靳輔等所奏定限堵塞令孫在豐等挑濬海口其黃河南岸閘壩著於來年堵塞一年併髙郵髙堰等閘壩俱仍照見議限期堵塞令其豫先備齊工料人夫自今年十二月興工挑濬下河勿致違誤二十七年正月中河工竣靳輔治河書百川莫險於黃河然自南北通運以來浮黃河而達者凡五百餘里議者莫不以為治河即所以治漕一似乎舍河别無所謂漕也雖然水性避髙而就下地為之不可逆也運道避險而就安人為之所慮者為之或不當耳有明一代治河莫善於泇河之績然其議倡始於隆慶年間都御史翁大立而傅希摯繼之再歷舒應龍劉東星兩河臣屢興屢阻逮至萬歷三十一年河臣李化龍實始通運卒避黃河三百里之險至今賴之嗣後直口塞董口淤駱馬湖又淺澀不行臣因有開皂河之請而泇河之尾閭復通然自清口以達張莊運口河道尚長二百里重運泝黃而上雇覓縴夫艘不下二三十輩蟻行蚊負日不過數里每艘至費四五十金遲者或至兩月有竒方能進口而漂失沉溺往往不免蓋風濤激駛固非人力所能勝也康熙二十五年題覆詞臣張鴻烈聖心愛民已極案內加築北岸遙隄後復加籌酌若於遙縷二隄之內再挑中河一道上接張莊運口並駱馬湖之清水下歷桃清山安入平旺河以達於海而於清口對岸清河縣西仲家莊建大石閘一座既可以泄山左諸山之水而運道從此通行避黃河之險溜行有縴之穩途大利也乃決計題請奉旨興工至二十七年正月而工竣連年重運一出清口即截黃而北由仲莊閘進中河以入皂河風濤無阻牽拽有路又避黃河之險二百里抵通之期較歷年先一月不止回空船隻永無守凍之憂在國家歲免漂失漕米之患在各運大則無沉溺之厄小則省雇夫之費蓋自吳開𨝍溝隋開御河歷唐宋元明漕東南以濟西北者無不仰藉黃河以為灌輸既欲去其害又欲收其利故治河愈難至我朝康熙二十七年而運道之利黃河者僅七里矣或有議於中河北岸宿遷境內建減水壩數座以泄漲者臣曰不可蓋中河之水但患其弱而不患其強若北岸遙隄減壩一建則清水弱而黃必有內灌之憂河身立淤矣今當大工屢興之後錢糧未敷未敢輕議若工帑稍充再將遙隄加修髙厚更於中河之北挑重河一道即以挑河之土築成重隄於西寧錫成兩橋之間建閘一座既以分泄東省之異漲又以灌溉宿桃清等七州縣之田畝即遇黃淮並漲亦可分泄入中河以並出平旺歸海真永賴之策而臣初議挑中河之舉原擬如是故有中河之名也又運艘自清口入仲家莊閘雖曰截流而北然逆流而西者居多若於清河治東陶家莊再建一閘重運則由陶莊而入回空則由仲莊而出則俱順流矣且兩閘並建用備不虞尤為萬全統志之以俟來者四月上諭滿洲大臣學士九卿詹事府科道等及往看中河等官前于成龍奏云靳輔開中河無所裨益甚為纍民河道已為靳輔大壞令凱音布往看中河云現有商賈船行不絶若塞支河之口則駱馬湖支河之水匯流中河水勢現大漕艘可通于成龍又奏王新命曾向伊云靳輔從上河放水今若以此問王新命王新命其肯任受乎前召九卿至乾清門會議皆畏懼于成龍無一人敢與辨難悉順于成龍之説以河務盡為靳輔所壞惟朕獨與衆人異謂靳輔不為不盡心於河務若云靳輔治河不善全無裨益即靳輔亦不心服朕未親至下河不甚深知若上河自宿遷至清河之兩岸河底及髙家堰以至廟灣并運河諸處朕皆洞悉數年來河道未嘗衝決漕艘亦未至有誤若謂靳輔治河全無禆益朕亦不愜於心矣于成龍在直𨽻愛民緝盜居官頗優但懷挾私仇阻撓河務殊為不合朕非欲起用靳輔祗以河工所關甚大耳今九卿已將靳輔議罪皆言其治河無益若王新命聞之亦必順從于成龍之説以靳輔所治不善因將原修之處盡行更改是伊等各懷私忿遂致貽誤河工可乎且使黃河自宿遷以下衝決猶可修治若宿遷而上或至泛溢則為害甚大所關非小今應遣明悉大臣看閲將作何修河之處詳確定議此看閲河道著圖訥馬竒張玉書前去須將毛城鋪髙家堰等地方遍閲就靳輔所築之處甚善而斷不可改者有幾不善而應更治者有幾詳悉商酌定議以聞靳輔以丈出民間餘田作為屯田及阻抑開浚下河其罪誠不可逭至有言黃河底漸髙此斷不可信譬之盆內貯水遇風且溢出使黃河底果髙一有風濤其有不漫漲橫流決隄潰岸者乎爾等明晨速往同九卿會議具奏二十八年正月聖祖南巡駐蹕瓜州陳家灣地方命修理髙郵州南北一帶殘缺甎石工程三月上諭朕前閲中河初疑其狹隘今行經丹陽閲視河道亦復狹隘又聞衆官民俱言中河挑濬有益所關甚大爾等會同總河總漕確議具奏附總河總漕等會議從前挑濬中河原避黃河一百八十里之險且收束散漫之水使不致淹沒民田看河諸臣亦疏稱若行中河則一百八十里之險可避今水勢業已收束且避險就易於民生漕運甚有禆益應將中河無容另議其駱馬湖口先經尚書張玉書等看河時有題修減水壩二座今王新命稱丈量水深二丈餘難以建壩且需錢糧甚多應停其建築編竹簍以盛石塊髙出水面二尺成造堵塞若水大可以浮面泄出等語又攴河口先經張玉書等疏稱建造板閘一座應令隨時啓閉今王新命稱若建閘水大之時必致衝決應停其建閘留出水之口於南隄下掃堵塞等語此二處建閘修壩用竹簍下掃減泄溢水與看河諸臣所奏其理無異應照總河王新命議建造修理又駱馬湖減水三壩先張玉書等疏稱將二壩之水令流入中河其一壩之水留在遙隄之外令流入海今據王新命亦復稱善應照張玉書所河題又張玉書稱裏運河駱馬湖之水俱入中河窄難以容納應於北隄建修減水壩三座今王新命稱若欲建壩所費錢糧必多應停其建壩亦用竹簍以盛石塊堵水若有大水可以減泄等語先張玉書等欲建壩減水今王新命用竹簍盛石減水俱係泄水之意亦照王新命所議修造可也八月奉旨儀徵河閘關係運道著河道總督會同江南江西總督漕運總督詳閲定議具奏附總河王新命會兩江總督傅臘塔總漕董訥疏略儀徵閘外江口北新洲一帶俱係乾涸而北新洲之外又有沙漫洲過水不過二捺餘橫亘二三百丈難以築壩若自沙漫洲尾從北新洲腹內東北斜開引河以通四閘不能保無坍淤似應仍挑北新洲舊河身直通四閘一切糧艘令循沙漫洲尾轉入新河口可以通行其日久或有淤阻之處聽河臣酌量挑浚所有應挑土方並修閘工銀兩聽河臣確估從之二十九年上諭河道關係最為重要已前一二年雨水鮮少河道官員必將河務視以為常事今年景象雨水似多應行文總河嚴行曉示所屬官員無分晝夜防守務使河道不致有危三十一年十月奉旨中河張莊運口築隄建閘等情著河臣將工費估計三十三年築中河兩岸束水隄修清河縣廣濟閘在治西仲家莊舊名仲家閘至是修之改今名閏五月初十日上諭內閣保護中河隄岸之子隄總河于成龍前奏稱最為緊要請急行修築今又奏言水勢盛長難以興工俟水涸之時始行修治朕思河務所係甚重必待水涸始修儻夏秋水澤泛漲保無有沖決隄岸之事乎可速敕于成龍再加詳悉酌定具奏三十四年清河縣建永濟閘在甘露城南太山墩北與惠濟相望又建康濟閘在治東陶家莊右又建雙金門閘在廣濟閘北又建小閘在雙金門閘北三十五年總河董安國題改建髙郵湖西隄易土為石三十八年三月聖駕南巡閲河奉上諭河道總督于成龍朕自淮安起行沿途細閲河隄除河底已髙東邊甚窪毋庸置議外朕所駐蹕界首鎮前湖邊用水平測算河水比湖水髙五尺八寸揆此湖水似不能越此隄而入運河前往髙郵未知若何但當湖之石隄雖被水汕壞朕細閲被人搬去損壞之處亦復不少此固屬要工修築亦不甚難爾差賢員作速查驗儹工修築又傳旨于成龍朕自淮安一路詳閲河道測算髙郵以上河水比湖水髙五尺八寸自髙郵至邵伯河水湖水始見平等應將髙郵以上當湖隄岸修築堅固髙郵以下河之東隄亦應修築堅固至於邵伯地方因無當湖隄岸而河湖合而為一矣不必修築隄岸聽其流行髙郵東岸之滚水壩涵洞俱不必留用將湖水河水俱由芒稻河人字河引出歸江入江之河口如有淺處責令挑深如此條治則湖水河水俱歸大江各河之水既不歸下河下河不必挑修又諭于成龍等著將運河東岸隄工凡有石工殘缺者仍補修石工其土工隄內有水之處下掃幫築減水壩俱堵塞堅固用心防護越壩更屬緊要亦著加幫防護淮安府涇澗兩河必須挑浚深通毋任淤墊如有漫頂隄內積水之處即釘排樁幫築減水各壩俱著堵塞堅固隄防要緊又諭人字河若有窄狹處可以相機挑穵凡有需水舊口修砌涵洞令民灌田隄岸單薄處亦酌量加幫又諭于成龍等運河東岸再加髙寬不必開減水壩其涵洞與金灣滚壩舊有河身民間用水灌田仍照例開放減水壩著河官堵塞堅固用心防守至新加隄岸亦著爾選擇官員或五十丈或六十丈責令加意防守西隄土石各工亦上緊儹修髙家堰亦速修完下河田地不過一二年可以見出又諭于成龍爾回去即看歸仁隄髙家堰清口甚屬緊要徐廷璽著往揚州去往回查勘永安各石土并東西岸各工與堵塞減水壩將京中帶來各官每員或五十丈六十丈各責令用心防守無得疏虞八月總河于成龍等題準清江大閘加髙四層又將大閘北岸下雁翅倒卸十丈並越河閘東雁翅酥碎磚工十二丈一併改砌石工又將板閘關口掃工一百二十丈改建石工又將盤糧廳前掃工五十五丈淮城西門外護城樁掃隄工三百六十丈改建石工又估挑澗河自興文閘起至劉均溝止長一萬四千零三十二丈八尺並涇河自閘下起至射陽湖邊止長八千二百五十丈頭石工頭磚工長三十丈中石工長一百五十七丈尾石工尾磚工長一百三十一丈二尺石工磚工長一百五十八丈磚工仍修砌磚工石工加髙二層九月建南運河滚水石壩附總河于成龍疏略竊照南運河乃糧船經由要津又居下河七邑上遊更兼髙堰六壩減出之水盡由草字河歷寶應髙郵諸河而入於此水勢浩大河窄難容是以前河臣明靳輔在於髙郵南北建設大小減水灞五座題開放定例頻年來依期開放雖隄岸固保無虞而下河諸邑均受其患今春恭遇聖駕南巡軫念下河災黎諭令臣等大修隄岸堅閉減壩下河麥禾幸得收獲一遇伏泛水發盈隄溢岸以致髙郵九里郡伯更樓閻家涵洞皆被漫缺臣等於特疏題明事案內酌開壩兩座上下隄岸方得保全總緣髙郵河身耎山陽寶應河身相等驟受髙寶諸湖滔天之水開壩則有害於民田閉壩則有傷於隄岸欲其隄岸民田兩相保固難矣臣等往來查勘再四思維唯將泄水減壩俱改為滚水石壩水長聽其自漫而保隄工水小聽具涵蓄以濟運道較之閘壩水盡東流閉壩徒費錢糧者相去不啻什伯也加幫髙堰隄工自武家墩起至小黃莊止自小黃莊起至周橋止自周橋起至棠梨樹止分三段修築舊有唐梗南北中三壩及茅家墟南北二壩夏家橋減水壩凡六座皆堵塞挑穵王家營陶家莊引河二道建陳家莊挑水壩一座挑溜入陶莊引河使黃水不致倒灌又改建惠濟祠後石隄一百六十二丈以資防護三十九年三月十五日奉旨邵伯更樓決口自去歲奏報屢據奏稱儹工修築乃迄今尚未報完以致漕艘十有餘隻漂沒擊碎其阻滯江干及瓜揚一帶地方不能前進者甚多著該督設法倍料兼工堵築刻期報完勿致再誤十七日河道總督張鵬翮面奉聖訓引河水使之由人字河芒稻河入河朕所見最真爾必須力行不可忽也四月九卿詹事科道議準張鵬翮請挑浚下河奉旨依議速行附張鵬翮疏略我皇上明見萬里洞晰河勢指示周詳仁愛之心無所不用其極臣將所閲形勢縷晰陳之一人字河宜挑濬深闊也自金灣閘至孔家渡為河之脈胳見今狹窄宜開廣闊自此至芒稻山河分兩派又名芒稻河此處水口兩岸亦狹又有土嶺二處前河臣尚未穵完目今河水方盛宣泄宜急應多募人夫尅期盡行穵去使其暢流水口下有芒稻閘年久塌壞磯心頗髙宜穵深另修因時啓閉以防江潮一鳯凰橋引河之宜再挑也此河經前河臣新挑因未挑深從橋口至胡家樓河水絶流竟成平比宜加挑深通引水從王家莊入運鹽河匯入芒稻河一雙橋灣頭二河之宜挑深也此二河見今水流同入芒稻河但河底亦有淺處應俟冬時挑濬深通其灣頭閘座雁翅塌陷宜及時修砌此三處之水俱相繼會入芒稻河流十八里入江臣觀江口寬濶河底深通兩岸居民二麥成熟不慮水患此江都金灣以下至仙女廟之形勢也唯髙郵自擋軍樓起至東西灣止因髙堰洪湖之水滔滔東下西隄湮沒漫入運河東隄一望汪洋水由城南大壩而出洶湧泛溢當伏秋水漲恐東隄單薄難以捍禦致有不虞宜將見閉三壩相機酌開以保城隄岸俟秋盡水落修築隄岸堅固之後再行閉塞五月上諭員外郎拖克拖和中書張古禮著馳驛前往河道總督張鵬翮處將修過河工情形閲看伊等無有專責將工程令張鵬翮繕寫摺子交與伊等帶來啓奏附張鵬翮摺奏一運河宜挑深也自凊河縣運口至髙郵州界首一帶裏河頻年黃水入運淤墊從未挑浚前河臣每以加髙為事以致河身日髙一遇水漲往往潰決堪虞訪之輿論宜加挑濬深通即取河底之泥以加隄身庶為有益俟今冬糧船過盡即煞壩挑浚一切進貢差使暫由陸行一髙寶江都一帶西岸土石隄宜修也今洪澤湖水東下水勢方大西隄盡淹河湖一片俟冬時水落估計興修一髙郵城南之石壩宜修也今髙郵湖水洶湧經由城南壩上而出以勢漸逺不能盡入人字河而泄宜於秋盡水落照前河臣所估將五壩改為四滚水壩辦料興修於壩下相度形勢開引河使水有去路一新改中河隄岸宜也兩岸隄工單薄水漲可虞臣查新築隄岸長一萬三百五十八丈候選州同馬勳等三百五十員領帑承修內頂衝刷灣處占釘排樁二千八百三十四丈桃源縣知縣三玥等十八員領帑承修迄今並未完工除敕令各官上緊照估修築勒限完固如再違抗另疏查參追帑仍治以誤工之罪臣看新桃中河窄狹不如舊中河寬深足以容水俟糧船過完於深秋水涸之時臣再索河官復加查勘若舊中河可以修築仍由舊中河行運如果不能築隄再將新中河審度形勢另疏奏聞又摺奏一運口修築攔黃壩準有部又動帑興工今先築兩岸土壩俟糧船過完再堵運口使黃水歸海引清水入運河一邵伯更樓決口已經修壩堵塞完工糧船通行無阻居民亦鮮水患其舊缺口雖不堵塞亦屬無礙且河工需用錢糧浩繁之際似可暫緩一髙郵護城隄工關係緊要今正在修築尅期告竣以資捍禦一嵇家閘缺口今正在堵築未完但湖水方盛邵伯兩壩已堵若將此口堵塞無處泄水東岸隄工可虞應暫留此口泄水以保隄工一人字河芒稻河引湖水入江關係要緊經臣以題明挑濬在案今正在上緊挑穵務寬深速完資宣泄其芒稻閘俟秋盡水落方可修建一鳯凰橋引河引湖水由芒稻河入江前因挑穵不深河心又係髙岡以致水不能流臣期題明挑穵深通在案今正在工緊挑穵使深務速竣引水暢流一劉老澗遙隄造石減水壩內建磯心八座係會勘案內候選知縣佟世燕等領帑承修之工壩墻磯心俱完尚有底石正在鋪砌未完飭其作速砌完壩下挑引河一道宣泄中河異漲之水自鮑家莊至殷家口入漣河下海馮佑領帑挑濬總未完工飭其作速挑浚竣工如不竣工另疏題參一九里決口在髙郵州九里地方已經堵塞完工一清河北岸子隄決口坐落清河縣中河北岸已經堵塞完工謹將見修工程繕摺具奏七月總河張鵬翮請中河出口仍舊奉俞旨行附張鵬翮疏略臣看得科臣張睿條陳將清河縣以下所有陶莊閘開放出口建瓴之勢逼溜使南等語部議將清河以下所有陶莊閘開放挑浚出水或將董安國所挑引河以下酌量挑穵建閘處親身詳看具若題等因臣率淮揚道王謙等及衆河官詳看得將中河改由陶莊閘而行至董安國所挑引河尾入黃河但清河縣地處窪下面臨黃河背坐清水二水並張恐有漂沒之虞必遷移縣治又多繁費且引河尾地亦窪下恐黃河倒灌雖建閘可禦而糧船進口行下水數里水溜風猛難以進口且陶莊閘外黃河北岸皆係陂灘糧船至此難以停泊不若仍舊入運河治隄溯流而上至陳家莊渡河直進仲莊閘小壩從無阻滯應無庸更張者也九月總河張鵬翮題改中河奉旨前于成龍奏稱將中河改移朕屢經諭其恐有未便今張鵬翮所奏中河事宜甚當著照所奏行附張鵬翮疏略臣先經具奏舊中河可以修隄仍由舊中河行運如不能築隄將新河審度形勢另疏奏聞臣謹率淮揚道王謙等查勘得新中河必須全身挑穵兩岸子隄全行加幫工費頗巨而河頭灣曲糧船行走不順且三義壩以上三十一里河身淺狹遇湖水大漲恐不能容舊中河自河頭起三十二里至三義壩河甚寬深但壩以下至仲莊閘二十五里甚淺南岸河水散漫難築子隄且距河岸甚近今議在三義壩將舊中河築攔河隄一道改入新中河則舊中河之上段與新中河之下段合為一河糧船可以通行無滯至中河應挑應築之處關係運道緊要工程一面發帑委官作速興修一面確估造册另疏具題十二月總河張鵬翮奏復天妃閘建置中河石閘二座部議覆準奉旨依議速行附張鵬翮奏臣看得科臣陳詵疏稱自天妃閘至淮安共有五閘必復天妃閘以塞其罅然後淮水可出臣按南河志平江伯陳瑄建通濟新莊福興清江板閘等五閘遞相啓閉以防黃河之淤又慮水發湍急難以啓閉築壩以遏水衝每嵗至六月初旬糧艘過盡伏水將發即於通濟閘外暫築土壩以遏橫流一應官民船隻俱暫行盤壩出入至九月初旬開壩今天妃福興板閘久廢新莊閘亦以無用棄之惟存龍江閘一座金門參差不能下版但古今異宜不能盡復五壩臣相度地勢博訪輿論公議酌復天妃閘一座以防黃水內灌將見存之龍汪閘寶應閘拆修金門下板設遇水涸遞相啓閉蓄水濟運但目前運河淤墊正在挑穵俟清水衝刷淤沙使盡河底之尺寸既定方可安建閘基將修閘事宜另疏運題請科臣陳詵疏稱新舊兩中河多建閘座重來時節級啓閉重運過後勿令常開等語查中河頭每年糧船過後即行煞壩引湖水由石閘出黃新運到時又行啓壩需費錢糧不若於中河頭及中河尾各建石閘一座以時啓閉節宣水勢於新中河孫家集以上修石閘一座如遇水大泄入鹽河以殺水勢其修閘需用錢糧另疏估計具題四十年正月從總河張鵬翮請修髙寶江都運河隄岸附張鵬翮疏略髙寶江都一帶隄岸關係運道最為要緊去夏水盛西隄盡淹河湖一片經臣奏明俟冬時水落估計興修九卿議覆準修奉旨依議速行在案今唐埂等六壩堵閉髙寶江都西岸隄根漸次涸出除寶應縣北城灣南唐隄五淺龍王廟江都西隄排樁等工尚屬可緩不計外查髙郵陸漫閘西岸原屬土隄每遇伏秋水長危險堪虞應建石工與永安界首二處石工上下相接以資捍禦計工長一千六百二十五丈五尺江都西隄殘缺石工二百四十四假共長一千二百二十七丈五尺亟應補修以資捍禦髙郵州東隄朱家田頭單薄危險亟應下掃壓土工長四十八丈清水潭草大王廟東隄裏口險工舊掃年來朽爛堪虞應下掃加工以禦風浪計工長一百五十丈又金灣三閘裹頭磯心倒缺不堪亟應修理以上各工不在從前估修之內又永安東隄裏口龍門北灣險工計工長一百丈又永安東隄龍門南北灣裏口坍卸險工計工長一百二十六丈此二工查係前河臣于成龍等委主事孫叔貽筆帖式秦保等幫築完工復被風浪撞擊坍卸難資捍禦例應賠修二十二日張鵬翮題河南節宣豫防事宜奉旨這所奏已得河工祕要著九卿詹事科道會同速議具奏九卿等議覆奉旨依議速行附張鵬翮疏略臣按南河志清口至淮安建有五閘遞相啓閉以防黃水之淤又慮水發湍急難於啓閉築壩以遏水衝每船嵗糧船過盡即於閘外築壩以遏橫流一應官民隻俱暫行盤壩由此而觀則是伏秋水發黃河倒灌自古而已然矣故建閘築壩以防淤墊之患今運河初經挑穵俟清水衝刷使深河底尺寸既定方可建閘臣於覆科臣陳詵復閘疏內曾題明在案茲清水雖已出黃轉盼桃伏秋泛繼至節宣之道豫防之法不可不急籌也今於張福口裴家場中間開引河一道會張福裴場等引河之水並力敵黃但黃水會合衆流來自萬里頻年河身墊髙勢大而力強淮水止發源桐柏迄今方出清口一半敵黃又一半濟運終虞力分而勢弱故蓄髙堰之水以助其勢幸而黃水不大亦足以敵之若遇黃水大發在糧船過完之後仍遵旨堵閉攔黃壩使不得倒灌且可以刷深黃河在糧船正行之際遇黃水大發將裴家場引河口門暫閉引清水由三汊河至文華寺入運河以濟運行倘運河水大山陽一帶由涇澗二河泄水入射陽湖下海寶應一帶由子嬰溝泄水入射陽湖下海髙郵一帶仍由城南柏家墩二大壩泄水江都一帶由人字河鳳凰橋等河泄水入江若遇黃淮並漲清水由瞿家壩天然滚壩泄出黃水由王家營減水壩泄入鹽河至平旺河下海若糧船過完黃水不大發將運河頭壩煞壩令清水全入黃河以資衝刷一切官民船隻照往例盤壩俟回空糧船到日方可啓壩止留三汊河清水仍由文華寺入運河即古人設天妃閘於糧船過後閉閘築壩之意也十一月張鵬翮請將髙郵州陸漫閘西岸改築土隄奉旨陸漫閘西岸改築土隄內外鑲柴見今錢糧雖省但蘆柴易致朽爛二三年後又致重修張鵬翮在任時雖無可虞若張鵬翮或離任或淮黃水漲有危險之處鑲柴工程朽爛豈不更難著將這情由備寫差員前往張鵬翮處令其確議具奏張鵬翮遵旨確議奏聞奉旨著修石工改建清江泛北岸版石工加髙龍汪閘四層見今鞏固行漕修清江汛北岸越河閘一座建中河口門南岸石閘一座金門口寬二丈二尺髙三丈一尺二寸四十一年二月建濟運閘一座金門口寬八尺河水小即行啓版開放運河水大即行下版堵閉以濟漕運又加幫武家墩後橫隄又築攔湖創隄十一月從張鵬翮請浚運河附張鵬翮疏略運口為糧艘轉輸要道初春運行之際在桃泛未發之前水尚未長漕運需水甚亟去歲於石磡築草壩開渠引三汊河之水以濟運糧艘得以通行至桃泛水發即行堵閉今臣率道廳等官再加相度與其每歲開閉需用錢糧不若建造石閘相時啓閉不獨於漕運有益且省每歲修築之資四十二年正月界首以下河道工竣附張鵬翮摺奏界首以下河道康熙三十九年因湖水相連水大未能挑穵今六壩堅閉髙郵湖水消落運河流緩沙停冮西湖廣糧船身重入水更深不無淺澀盤剝仍應遵旨挑穵深通以利糧船遄行嚴催承挑人員晝夜疾儹已于十二月二十六日完工二十八日開壩放水二月聖祖南巡諭總河張鵬翮駱馬湖竹絡壩口門宜留初四日又奉上諭仲莊閘清水出口逼溜使南恐運口有礙應于陶家莊以下楊家莊挑引河令中河之水從此出口於運口有益雖楊家莊地勢低窪即使倒灌不過一二里清水仍然頂出著即相度形勢估計具奏仲莊石閘暫停初五日又奉上諭王公隄關係運河生民最為緊要隄岸單薄樁工漸朽應再加幫以資捍禦不可因淤灘可恃而忽之築駱馬湖竹絡石閘東絡長二十二丈西絡長十丈各寬三丈口門二十三丈四十四年聖駕南巡三月十一日奉上諭運河東隄保守最為緊要隄岸應行加幫髙郵迤南河水髙於湖水東西兩隄卑薄應加幫修砌量建石工三月十八日上諭河道總督張鵬翮及河工官員今河工雖已告成不可不預為修理防護以圖善後之策朕見淮揚一帶隄岸卑薄未為甚妥儻不加保護以致衝決則淮揚地方百姓何以能安爾等宜急籌之閏四月上閲惠濟祠石工諭總河張鵬翮等朕三十八年閲河爾等所跪之處俱屬黃水今清水暢流逼黃竟抵北岸僅成一線朕心甚為快然覩此形勢朕之河工大成矣四十五年總河張鵬翮題建文華寺閘一座閘下挑河一萬四千八百九十三丈兩岸築隄裏河廳册是年因運河水勢大長兩岸隄土難以容受有關運道民生奉上諭造石閘一座金門寬一丈五尺六寸南岸閘墻共長十六丈北岸閘墻共長十四丈砌髙二丈四尺閘下挑引河一道由楊家廟單楊口至白馬湖一遇桃伏秋汛運河水漲隨即開放宣泄水下白馬湖水涸堵閉並將澗河挑浚深通又挑穵清溝河使澗河水勢歸海四十六年總河張鵬翮以前建南關車邏二壩不敷宣泄更造五里中壩一座壩下開挑引河自中壩下起由臨澤至寶應三王河射陽鎮共長一萬七百三十六丈八尺是年修築大墩分水處西岸草壩裏河廳册總河張鵬翮奉諭指授將大墩分水處西岸草壩再加寬大挑清水多出黃水一分少入運河一分不致運河東壩受險張鵬翮即行題估於四十七年修築加寬二丈周圍長二十九丈分挑水勢敵黃濟運六月初六日上諭工部頃朕閲視河工見黃淮俱已安流運河亦較前深通重運無阻但湖水大漲則運河東隄尤屬緊要應速興工加修這工程交與總河詳勘動用各省督撫捐輸河工銀兩盡心堅築工完報部察核其天然壩建閘開河等工亦著將此項錢糧動用四十七年總河張鵬翮疏題揚州府屬內江都東隄腰鋪中腰鋪南越潭三處及邵伯蕭家涵起至萬緣菴止萬緣菴起至壩口止并黑魚塘諸處石工及金灣三閘間隄東關對河沙壩石閘並皆坍卸宜修築以資運道奉旨準行四十九年總河趙世顯改建天妃閘外越河添置石閘一座五十一年添建九里岡談家莊水壩一座拆建涇河閘浚崇家灣等處運河五十二年建築中河口門頭閘南北兩壩連雁翅共長七十五丈五十三年修瓜州廣惠通惠二閘五十四年宿遷中河口門頭壩下及崔家宅桞園頭二處建挑水壩四座又桃源之九里岡七里溝二處建壩二座是年修建邵伯鎮石工自奶奶廟起至蕭家石涵止又修築壩巷口石工丈尺一如前制五十五年總漕施世綸將瓜州繞城河開壩行漕江防廳册向來漕運俱由瓜州閘行其閘下運河南岸花園港一帶乃糧艘之所停泊者至五十四年江溜北趨將花園港地方衝塌一百二丈以至屯聚無多總漕施世綸移咨河院恐糧艘遲滯權將繞城河開壩行至雍正六年築塞建運口草壩以濟運行五十六年加修山陽運口臨湖掃工二百九十丈又於吳家莊建挑水壩一座胡家莊顏家莊九里岡諸處各建壩一座五十七年宿遷龔家莊建魚鱗壩三座五十八年堵築髙郵攩軍樓迤南缺口建築談家道挑水壩一座建築九里岡魚鱗壩二座建築葉家莊迤下魚鱗壩一座五十九年修築髙寶江三邑西隄石工於寶應西隄桞園頭迎湖險工二段加幫下掃以禦風浪修築平橋汛北岸洞口隄建築竇家林挑水壩一座六十年濬邳州運河徐塘口加修清江汛北岸小壩碑亭北角樓西門並三城壩等處隄工以保運道是年總河趙世顯以寶應張家直對河等處并髙郵護城隄工為風浪所掣漸次坍卸議於張家直對河起至白田鋪止長二百二十八丈又稱鈎灣長四十丈下掃幫築其髙郵護城東西隄補砌磚石奉旨依議行築山陽南岸韓家莊挑水壩一座建桃源北岸九里岡挑水壩三座又建宿遷吳家溝濟運草閘一座長五丈內通湖挑穵引河一道長一千二百六十三丈六十一年署總河陳鵬年題準徐塘口迤上挑穵越河一道接入彭家河行運又濬宿遷王家溝西湖口正引河及東西攴河各數百丈又濬九里岡對岸及王家營二處引河添修駱馬湖竹絡閘東裹頭二十五丈西裹頭十五丈口門只留十五丈以遏黃水內注而運河始免沙淤雍正元年挑王家營正引河及東西支河築清口東西束水壩二年總河齊蘇勒題準宿遷西寧橋迤西建攔水三合土壩兩頭築攔水隄六百丈建邳州運河河清河定河成三閘閘旁並開月河以便漕河清閘一座兩墻各長二十二丈四尺髙二丈八尺八寸金門寬二丈二尺閘旁月河一百二十丈河定閘一座兩墻各長二十二丈四尺髙二丈八尺八寸金門寬二丈二尺閘旁月河一百二十丈河成閘一座兩墻各長十六丈四尺髙二丈七尺六寸金門寬二丈二尺閘旁月河一百三十八丈十一月總河齊蘇勒題準瓜洲胡家觜運口東岸建護口掃工長一百十八丈又於唐家莊建築束水草壩一座兩岸各長二十丈三年濬江口至奔牛閘一百六十里運河附馮詠浚河免役記略雍正二年六月上念京口為杭嘉湖蘇松常六郡運河而每年挑浚偏役丹徒丹陽兩命河漕爰撫諸臣會勘情形奏覆於藩庫動帑興修永除督其害諸臣集京口相度各處應修之閘有三曰江口西閘曰利涉橋小閘曰丹徒鎮橫閘重建閘四曰張官渡曰陵口曰呂城曰越河開浚自京口至丹徒鎮黃泥壩張官渡七里廟尹公橋七里橋陵口吕城計七十三里皆舊淺阻處也江口之西為觀音樓東為水府廟並建草壩以拒江流浚越河以通江潮修築丹陽四壩以蓄練湖之水又浚七里橋支河四百丈以通金壇之糧艘嵗修仍責徒國陽二邑而以六郡協濟之明年三月報可費民莫帑六萬九千八百五十一兩有竒於是兩邑皇仁昭不歡呌喜悅詠謹指敘事實宣布示無極四年七月總河齊蘇勒疏奏髙堰山旴一帶臨湖石隄髙卑不等請通行修理以髙出水面一丈為度背後土隄一律加髙并將大隄單薄處擇段幫寬接築湖心石隄與石工髙厚如一十月齊蘇勒議稱洪澤湖滚水石壩三座安砌門檻太髙每遇湖水大漲不能暢出分泄請將三壩門檻各落一尺五寸所需物料即於沿河兩岸先年廢棄之閘壩石塊內㨂選添用奉旨依議行五年加幫江都寶應東西二隄補修平橋汛東岸磚工三百十九丈修宿遷中河南岸上自支河口起下至九龍廟止并添築子隄一道建王家溝五孔石閘一座駱馬湖經邦閘旁舊中門築攔河閘一座長十六丈竹絡壩迤北創築攔水撑隄一道長一百一十丈六年五月署江南總督范時繹條議京口一帶運河請檄杭嘉湖蘇松常鎮太八府州屬按漕額協解以充工費九月郎中鄂禮疏請將蘇松境內凡糧艘經由之處低薄隄岸悉開溝種樹是年仍開瓜洲舊閘河漕浚吳江震澤兩縣運河共五千五百七十九丈河面闊十丈河底五丈連水面浚深一丈又修築傾圮隄岸改建如臯唐家閘并南北石涵洞及挑穵引河等共計夫料銀四千三百五十五兩一錢有竒縣丞劉永鑰承修修築皂河石裹頭閘一座金門寬十丈髙一丈八尺挑月河一道長二百丈現今行漕加修運口平橋清江三汛土掃磚石等工七年七月上諭江南運河隄岸歷年殘缺之處應照黃河隄岸分别緩急加髙濬通州如臯運河自泰興交界三里墩起至丁堰鎮止長一萬二千四百四十八丈三尺八年加幫髙郵寶應清江諸處運河隄坼修築山陽沈家圍隄岸三月浚淮安澗河自興文閘迤下至葫蘆套止共一萬五千十六丈面寬五丈底寬二丈深七尺又自葫蘆套起至馬家蕩湖邊止一帶河形紆折易至停沙改從迤東越灣取直創開新河長三百六十八丈浚掦州通州鹽運河共二萬五千七百八十丈有竒江都運河南岸董家溝地方建單門石壩一座白塔河建石涵一座董家油坊築土壩一道中設木涵洞二座江都運河北岸髙家老壩築土壩一道中設木涵洞二座徐家涵築土壩一道中設木涵洞三座楊家渡口築土壩一道中設木涵洞一座加幫羅鼓墩起洪家墟兩岸隄工運道攸賴加髙運口清江平橋三汛土工共三十七段九年二月總河嵇曽筠題準發帑轉飭印河各官修築江都汛東西二隄土工長三千二百五十丈八尺寶應東西隄土工長二千九百五十四丈三尺髙郵東西隄土工長六千九百五十四丈三尺浚湖河自宿遷起歷桃源清河安東沭陽下入海州龍溝出義澤河入孟家渡出五丈入海加髙清河縣甘羅城卞家汪天妃壩及山陽縣老壩口朱家溝大車路口等隄又加幫韓家莊縷隄增築宿遷中河汛內隄北岸上自支河口起下至桃源古城坡墩一萬一千五百五十三丈又自攔馬河接越河起下至桃源古城坡墩八千五百八十七丈零濬清河縣楊家莊鹽河閘迤下鹽河長二萬九千六百七十五丈又創築兩岸子堰長一萬一千二百餘丈又築鮑家營引河頭壩一座又修築舊遙堤十年九月大學士總河嵇曽筠題準建運河西隄石閘一座金門寬一丈兩墻由身各直長二丈上迎水雁翅長一丈五尺下分水雁翅長二丈五尺每邊長六丈兩墻共長十二丈髙一丈二尺宿遷運河廳册設版啓閉以通黃墩湖水濟運又於中河汛內重建竹絡東壩長二十九丈壩後建築撑隄一道長三十五丈五尺竹絡西壩長十二丈壩後建築撑隄一道長十八丈以束水勢又補修劉老澗減水閘底并下口三合土關石梅花等樁以資鞏固移建清河縣運口天妃閘於二草壩下北岸堤內又挑引河并修築兩岸束水堤十二年九月大學士總河嵇曽筠題準重建芒稻河西石閘一座十三年修築山陽縣清江浦龍王閘一座又挑穵鳳陽厰引河修建儀徵縣響水攔潮二閘江南通志卷六十
