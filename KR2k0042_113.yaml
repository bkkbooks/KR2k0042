body:
  text: 江南通志卷一百十四職官志名宦三松常鎮三府松江府唐蘇籥宰華亭簡惠公正南畿志張聿瑯琊人宰華亭政治凜然民吏有犯書之於籍許以自新再犯則勘籍杖之府吏有所需則榜邑門曰府以某事下縣索某物若干期某日齊足民感其誠供輸無敢後嘗有以干乞爲業者入其界曰此政不可撓遂抵他境南畿志宋錢貽範彭城人慶歴間知華亭縣時歳旱頻仍貽範講求利病開顧㑹浦盤龍塘諸水以時蓄泄萬民賴之南畿志吳及字幾道靜海人皇祐間知華亭縣時旱蝗及禱於橫山之神得雨蝗亦避境至秋大稔乃敎民預修水利以待淫潦明年大水阡陌堅完溝洫通利復稔如初比三年家給人足宋史本傳劉鵬彭城人元祐四年爲華亭令下車即修庠序立敎誡簿書期㑹各有條理不數月一境大治南畿志劉穎字公碩衢州人提舉浙西常平疏澱山湖洩吳淞江水民田賴之宋史本傳王玨字德全臨川人提舉浙西茶鹽開華亭瀕海支河二百餘里自是鹽得流通田資灌溉南畿志黃瑀字徳操閩縣人紹興中權華亭縣歳凶瑀請常平使者發廩以賑使者謂須俟奏報瑀曰民命在旦夕茍可生之雖重得罪不悔退即發粟賑給全活者萬計華亭縣志劉俁字碩翁紹興間知華亭縣㑹催輸急俁謁臺府願寛假三月乃治酒政損關征不三月課入自倍逋賦以償濱海有秦山鹽鐵蚌港三堰不治俁作堤成灌田六萬畝華亭縣志李字叔周監華亭稅被檄視潦舟行民田中有監司圭田吏不敢以潦聞曰水潦爲患上供且應復况圭田乎盡復其租常平使者聞而竒之宋史本傳楊樗年字茂良丹徒人知華亭縣歳饑乃悉蠲賦之無藝者以私帑代輸提㸃刑獄司檄繋平民十餘爲盜樗年廉得其情即釋之吏請須報曰民以盜繫少稽則生理蕩然矣寧以故縱獲戾不忍見民之殆也華亭縣志邱崈江隂人乾道中知秀州時華亭捍海堰廢潮壞並海田蘇湖被其害崈剙築三月而成尋知平江宋史本傳楊瑾字廷潤餘姚人紹定間攝華亭蠲胥吏白納錢寛民户積逋弛酒稅無藝之征吏民大悦守以聞於朝遂使即真於是修經界立義役遷廟學凡前令所不能辦者處之沛然有餘華亭縣志孫子秀字元實餘姚人開慶初爲浙西提舉奏省華亭茶鹽分司蠲其非法多取者於是流散復業宋史本傳施退翁山隂人淳祐間知華亭縣以風化爲已任興學校建講堂創齋廬以敎學者南畿志孟文龍字震翁亞聖公裔監華亭船場時賈似道柄國百僚悉隳法守文龍盡職不少怠華亭縣志元吕謙字和之亳人從丞相巴延南征拜將軍鎮守上海當春勸農召父老謂曰善牧羊者先去敗羣善治民者先除民病由是里胥畏憚境内肅然南畿志趙知章字伯常睢陽人松江運鹽使分司至元間兩浙鹽稅計引四萬後松江一郡至十萬有竒民大困知章以廉律已諭富者出財貧者傭力財力相資課以大集松江府志布薩翰文字行之至元末知松江府奏析華亭為上海在任愛民如子秩滿歸郡民擁道嗟涕南畿志張之翰字周卿邯鄲人至元末以侍講學士知松江府民苦荒租額以十萬計翰力陳其弊悉奏除之南畿志石從愿大德間以翰林知松江府明㫁郡無寃民及代去兒童連袂歌好知府云松江府志吉嚕爾至大間知松江府性廉貞豪民有懷金贄見者悉送為官物松江府志張國英字世禄延祐間尹華亭時郡將陵轢有司其蒼頭廬兒日游街曲謔浪民婦國英一制之以法民藉以安華亭縣志張如砥字周道歴城人延祐初知上海縣潔已愛民有民負寺僧租適嬰兒病死遂訟僧索租毆死如砥曰不毆爾而毆嬰兒詐也叱使去丙辰秋浙西大水壞禾稼行省詰縣徵賦如常如砥力爭得減上海縣志鄧巨川字百川真定人至治初為上海丞嘗建言以苖糧改科為豆麥民被其利上海縣志何䝉字叔正泰定間知上海縣家累十餘口屑蔆作粥了無愠歎南畿志劉輝字文大汴人至正間知上海縣縣以宋季公田虚徵加税額數倍往往破産輝設法勸富民出粟為常平本賦役乃均瀕海民相挺為暴亂有司莫敢詰輝取痛懲之撫其孱弱諭以禮義衆皆帖服創置社學百六十餘所舉鄉約日課民種桑棗上海縣志張德昭字彦明邢臺人至正七年尹華亭歳澇都水使者勒取有秋狀德昭固爭至投所授勅求去使者悟乃止錢衮為八字頌刻之郭門曰公平廉明勤儉慈讓時謂實錄南畿志鄭銖字彦平浦江人至正中授松江等處稻田提領所大使先是徵民無藝歳有羨糧萬餘斛銖至即命還民吏以無主名爲解乃計家口數分之稻田所素號米穀府銖日糴於市猶窶人然松江府志王艮字止善諸暨人爲江浙行省檢校官有詣中書訴松江富民包隱田土爲糧沙蕩為鈔宜糾察追收之艮至松江條陳曲折以破其誑妄言不過欲竦朝廷之聽以報宿怨萬一民心動摇患生不測豈國家培養根本之策哉艮言上事遂寢元史良吏傳王至和樂安人至正間爲松江知府興學校訂釋奠禮刻栽桑圖以敎民歳饑發常平粟同僚以爲疑歎曰民少需則死矣有罪吾當之遂盡發所積活飢民八萬有竒松江府志魯淵字道源建德人元季為華亭縣丞佐治公廉以道學自重郡之學春秋者多出其門南畿志胡存道字師善諸暨人至正末仕松江府學訓導苗寇至將焚學宫存道曰吾為學守當與俱亡叱賊曰若寧殺吾學不可毁也兵怒殺之南畿志明祝挺字正夫鄱陽人洪武初知上海縣時錢鶴臯倡亂挺懷印走府謀討逆爲賊所得廹使見僞帥挺毅然不屈賊釋之乃密遣人諭巨室聚義兵斬偽帥於西溝時右相國徐達遣偏帥破錢鶴臯將移兵縣境挺星馳詣帥曰民已定矣無煩大軍帥捕餘黨甚急挺潛使報狀於達達為上聞按問得釋南畿志馮榮和州人洪武三年授華亭知縣錢鶴臯爲亂榮被執不屈縛置獄中及亂定總兵葛俊怒從亂者欲盡殺之榮固爭得止全活者數萬口南畿志王文貞洪武六年以府同知署華亭縣事時兵後敎弛文貞復學故址築射圃建觀德堂舉行鄉射禮又時臨講堂以訓諸生議者方之文翁華亭縣志蔣惠鄱陽人洪武十一年知華亭縣先是縣繋平民三十人指為大盜惠察其無辜立貰之乃密授方略得真盜十八人正其罪南畿志蕭九萬南昌人洪武間華亭知縣嘗書容忍思慮四字疏其義揭門屏間以誨訟者疏陳民弊五事忤㫖被逮臨刑齧指血録詩報母云微臣斬首丹心在尚有英魂返故鄉舊通志周繼瑜松江同知建文時勤王詔下即榜募義勇入援極言大義指斥靖難兵成祖立死尤烈松江府志黃子威名輅以字行進賢人永樂二年知松江府時郡罹水患子威跋履鄉邑撫綏賑賚民頼存活以母憂去其後郡更三守而民猶謳思不置朝廷知之俾令復任南畿志魏驥字仲房蕭山人永樂初授松江府學訓導汲汲成就人材諸生讀書學宫或夜攜茶粥勞問諸生益感激自奮滿九載楊珙等詣闕乞留鄭曉名臣記侯端字敬莊盱眙人永樂間授金山衞指揮同知倭寇逼城端與同知衞事郤某分兵出戰郤出南門全軍皆覆賊遂入據城斷橋端孤軍在東門自分必死躍馬入西門與賊巷戰身被箭如蝟復馳出東門鳴鼓招散軍得百人令曰今潮退舟膠人持草一束與砲俱進至海灘焚賊船十餘艘賊不得歸遂殱之南畿志王源字啓津龍巖人洪熙間爲松江同知奏罷重額糧二十四萬餘石逋負糧三十九萬餘石而蘇州亦得例減七十餘萬有奸民褚路等誣陷平民二百餘家源悉平反其獄南畿志趙豫字定素安肅人宣德中知松江府輕徭役節冗費減吏員什伍尤重儒術待學官必以賓禮至要途顯宦不能逢迎焉南畿志葉冕字拱辰浮梁人景泰二年知松江府時連歳饑饉悉力賑救澱山湖半屬崑山界堤壞相推諉冕獨爲修築蘇人愧之南畿志楊昕瑞安人景泰三年知上海縣興學勸農平徭簡訟以母憂去賻贈皆不受起知華亭清操益勵南畿志甯祥章邱人景泰中松江同知嘗浚蒲匯塘建盤龍塘諸橋歳旱奏免兩邑稅糧十九萬石南畿志吳則宣平人天順間華亭主簿明察善斷巡撫滕昭遣署上海清負租一萬八千石設䇿賑饑全活甚衆海溢爲災復請蠲租六千餘石士民為作借賢育民詩華亭縣志郭綸字理之長壽人成化中知華亭縣明察嚴整未明即出視事逮暮始休盛暑不去衣冠諸吏行文書外無敢出一語時中貴人至縣僕從多橫索綸按驛券無名者叱左右收縛之中貴人皇恐謝過自是豪强屏跡南畿志王衡字宗銓稷山人成化中由御史知松江府方正清嚴人不敢干以私止息嚚訟非重犯未嘗繋獄囹圄數空民運至𤓰洲淮安交兌者苦官軍摧剝衡具奏其弊得免南畿志樊瑩字廷璧常山人成化中知府事時運夫折閲逋欠積累瑩晝夜講畫乃革夫役之擾定長稅之人於是運糧者關係切身無敢輕費掌計者出入有限無可蔽藏而積弊十去八九矣南畿志汪宣字德卿江陵人成化間知華亭縣通練明察庭無留事興學校禮師儒奬勵人材多所造就南畿志徐潭字惟靜定海人𢎞治間知上海縣故事區里之長歳有例輸官潭斥不取先是訟者苦遣役潭造木人付訟者令持置所訴之家人抱木人自詣無敢後者上海縣志路迎字賓暘汶上人正德間知松江府俗尚師巫而困於盜賊迎嚴督巡司申保甲有擒賊至者贓證具即與衆共棄之令民五家爲伍十家爲鄰有以左道惑衆及祈賽淫祀者各自首發不舉者坐以其罪由是悉得盜魁邪術亦息舊通志王卿字良佐太原人正德十二年知上海縣敦重質實不為赫赫名或干以私即面赬直視不答武宗南巡諸邀索一不應第曰車駕至日供不供有令在何先事自擾為上海縣志聶豹字文蔚永豐人正德間知華亭縣縣大水飢民流徙豹勞來安集發諸奸侵盜銀萬六千兩用代逋賦濬塘港三萬丈復塘之廢者萬二千丈民不苦水逃亡復業者三千餘户華亭縣志鄭洛書字啓範莆田人正德中知上海縣慈惠明敏凡訟聽其自息不息者始召而折之以理建社學凡十六區準常平法建倉積穀以備賑以賦法久弊議均田爲三則後巡撫林潤定爲三鄉本洛書議也上海縣志方鈍字子銛巴陵人嘉靖初知華亭縣始至值歳饑大書榜縣門敎民省費忍事其有訟者輒諄諭止之自奉儉約菜羮脫粟清節矯然華亭縣志熊宇字元性長沙人嘉靖八年以御史出知松江府去苛剔蠧與民休息工詩有郡齋賞牡丹詩曰正憶桑麻沾細雨更添珠玉對名花人爭誦之松江府志黃潤晉江人嘉靖十五年知松江府以八事定賦役九事攷里甲二事正均徭至今守其法松江府志許拱字宏莊南安人嘉靖中授華亭訓導端軌正儀不嚴而肅與知府黃潤鄉里同學拱從諸寮旅見公庭外未嘗私謁即潤召之弗往也華亭縣志黃㠏遂寧人嘉靖十九年知松江府時同知李蓁通判張叔宣推官黃洪毗皆稱良吏㠏每晨必與蓁等同升公座畫卯畢俾各還署視事即封東西兩夾道及未申間復聚郡堂問所施行共議可否聽訟則邀僚佐縣官共鞫之黠猾無敢以游詞進士大夫亦無從干請也臨去惟來時敝篋不置鎖鍵令吏民簡視始發松江府志何繼之字善甫順德人嘉靖二十年知松江府時當災饉發賑平糶安集流亡不遺餘力自奉儉約臥敝榻服澣衣五年如一日松江府志劉存德字志仁同安人嘉靖中知松江府時苦旱六載逋賦至二百餘萬特設叅政督之存德拊循安䘏請於使者寛期以俟秋成是歳大穰使者欲盡徵及額存德又請分三載其後浹歳大熟遂補積逋什之五六松江府志方廉字以清新城人嘉靖三十二年知松江府時倭寇入犯廉増陴浚濠爲守禦計冦至弗能克條上便宜使民間得自募鄉勇保聚殺賊立賞格爲勸減客兵十七故被寇五年民猶得休息云松江府志俞大猷字志輔泉州人嘉靖三十三年以副總兵駐金山嘗擊倭於平望又戰於六金垻皆大㨗斬首三千級松江府志劉東陽四川人嘉靖中任上海丞蕭顯入冦東陽擊之衆皆潰走東陽挺身獨戰遂遇害先是上海未城鎮海衛指揮武尚文同建平縣丞宋鰲統所部駐焉賊至尚文擊敗之追賊遇伏死鰲亦力戰死之與東陽並祀羣忠祠上海縣志郜光先字子孝長冶人嘉靖中知上海縣深沈有才幹聽訟明簡時運官多橫索一日率數十人持梃露刃入縣門光先手執衛弁叱輿𨽻盡縛其從卒趣吏具狀申制府弁請罪數四乃釋之下令驅漕艘出浦外魚貫而兌官軍唯唯無敢譁不三日事竣上海縣志臧繼芳字元實長興人嘉靖四十年知松江府每日以規條揭屏上循㳄而行盜丁彪聚衆數百販鹽湖海間巡撫將議𠞰繼芳請諭令自歸諸脅從竟縛彪馳獻松江府志韓崇福字君祉密雲人嘉靖間松江教授以師道自居與郡邑禮貎微不合浩然竟去諸生馳過江追還之倭寇薄城崇福登陴分守發二矢皆殪其魁賊乃引却尋奉檄出浦守禦所統不滿數百人寇矢集如雨崇福弗動徐還射之無不命中斬馘而旋松江府志陳邦顏字獻祉晉江人嘉靖間華亭知縣縣方大水邦顔盡心撫字每過丙夜不寢或勸之少逸曰吾身逸矣如吾民何歳兌漕米故多叢奸邦顔廉得主名盡寘之法催科不遣胥卒第出片紙署數字傳告里長緩急如期至華亭縣志黃文煒字德華南城人嘉靖間知上海縣撫弱鋤强置學田百餘畝建羣忠祠以祀死事者政教翕然以勞瘁卒於任廉無以歛諸丞簿爲貸金治木上海縣志朱茹字以彚瀘州人嘉靖末知松江府沉毅有大節時徐階方當國蒼頭有犯必以法繩之董傳䇿言朱守錚錚鐵骨也松江府志聶廷璧字祖雍金谿人知華亭縣執法不畏彊禦或諷以少貶曰榮進有數吾不能爲繞指柔也華亭縣志衷貞吉字孔安南昌人隆慶初為松江知府廉靜端慤時高拱修郄於徐階監司承風㫖多所株引貞吉獨中立持平即有所指授不爲動人皆服其定力松江府志石繼芳字克肖益都人萬歴初知清浦縣時縣治新建於唐行鎮凡築城濬池學校壇壝皆悉心區畫尤加意人才擇秀民親敎之學邑民化焉青浦縣志屠隆字長卿鄞縣人萬歴間令青浦邑故庳下值大水徒行泥淖中督吏民治堤躬禱於神水不爲災時有履畝之令長吏率増餘畝以阿上隆以丈出餘田仍繋原號知府閻邦寧呵之隆正色曰原田譬之衣領挈之始明餘田譬之衣帶非衣不附豈可使衣自爲衣帶自爲帶乎邦寧語塞又平反寃獄七十餘事青浦縣志顏洪範字仲起上虞人萬歴中知上海縣縣徵錢穀數十萬簿書填委獄訟紛沓洪範耳受目攝口訊手判裕如也其徭役均平前後罕及上海縣志陳秉浩字養自湖口人萬歴間知華亭初至即進父老問民疾苦悉釐革之恤重役却羨餘繩舞文吏煩苛一洗置學田贍士葬貞女廩節婦以示風尚華亭縣志喻均字邦相南昌人萬歴十六年知松江府以屬邑役重賦繁為稽考無藝之征及貢稅所由溢權其緩急撙節十餘事條上廵撫請奏蠲之或尼之不果行均以儒雅飭吏治有客投詩干謁答之曰於今梁國移民日不是夷門結客時其風致如此松江府志許汝魁字元甫湖口人萬歴中知上海縣以簡靜鎮俗不好更張嘗輕舟出行郊野與細民相接周知土田高下人户登耗故所定踐更最善減省斗級櫃首諸役遠近尤德之上海縣志聶紹昌字繩之四川人萬歴三十六年知華亭縣㑹踐更之期覈上户詭匿田六十餘萬於是中産以下得免重役而力征亦不及縉紳時論稱平華亭縣志項應祥字元芝遂昌人萬歴中知華亭單舸赴任寂無知者比視事取錢穀籍定其緩急條示諸鄉為期㑹公私不擾聴訟盈庭訊決立盡無不情法相麗舉卓異第一華亭縣志卓鈿字邦華沙縣人萬歴中知青浦縣胥吏作奸鈿繩束無所假貸而治民平恕尤以清苦自甘卒後囊無餘錢監司賻而歸其䘮青浦縣志畢自嚴字景曽淄川人萬歴二十年除松江推官用法平允庭無留獄性狷潔常菜羮糲食一日其叔父布衣草屩至郵亭呼自嚴出訓之曰我有事姑蘇汝父使我迂道過汝寄語汝慎自愛爲良吏語畢遂去松江府志許維新字周翰堂邑人萬歴間知松江府下車首嚴游惰之罰别衣服分貴賤奴隸無履絲曳縞者風俗一變與士大夫往還必訪政事得失閭閻疾苦深察民隱虛懷聽受去之日惟攜郡人文集數十卷松江府志熊劍化字神阿豐城人萬歴中知華亭縣才識優贍審民俗所宜然後下令約束終無紛變痛懲游手及武斷者嚴而不擾初到官大書澹簡於屏牆以自勗卒踐其言華亭縣志章允儒字珍甫南昌人萬歴末知華亭時加徵邊餉允儒殫心籌畫民不益賦而軍需弗匱部檄下松江供王府禄米允儒奏記力爭以爲瀕海之地米不堪供識者韙之華亭縣志張宗衡字梁山臨清人天啟間知松江府强毅有幹畧常微服夜出遇偷兒輒自擒縛飲博亡賴者或破壁求之道路為之屏息松江府志鄭友元字其山京山人天啓末知青浦崇禎初調知華亭兩邑故稱繁劇友元口酬手批剸決如流催輸有法刑罰不加而課畢登踐更之期里胥多詭匿友元勾得其實任役者輕重若懸衡徵入爲御史兩邑皆祠祀之青浦縣志方岳貢字四長穀城人崇禎初知松江府明敏强記案牘過目不忘謝絶饋問罷諸徵索廉能之譽騰於遠邇郡東南瀕海颶潮衝撃漂沒田舍岳貢相度經營築石塘二十餘里以捍之松江府志彭長宜字申伯海鹽人崇禎時知上海縣科條寛簡而擿發若神先是縣巨室蒼頭乘變聚黨劫主人索券撫院以兵擒斬之而修怨者告逋日益衆長宜謂首惡既誅宜停追攝全活數百家邑善逋賦長宜徵收悉省其羨入其不如額者亦弗予杖第勸令再輸民聞感悦賦登逾他縣家去治所二百里月載酒米自給雖汲水於河猶與荷擔人傭直上海縣志國朝楊之易應山人明都御史楊漣子順治二年任松江同知四年提督吳勝兆謀逆之易不從被殺康熙間奉㫖贈䘏推官方重朗亦同時遇害李正華字茂先獻縣人順治十年知松江府精明彊幹姦弊一清郡東南蔣莊有劇盜爲民患正華偕同知崔宗泰私往偵之不半月渠魁就縛窮治其黨悉寘之法去之日兒童婦女競以束蔬尺布投其舟中叩首而去舊通志閻紹慶字康侯魯山人順治十年知上海縣胥徒糧里數千人一過目即記其姓名時有大蠧孫年里魁顧酉暴橫紹慶廉得其實立置之法奸宄屏息徵輸有法每大寒暑不笞一人而賦自辦十二年海寇犯境鎮弁王璟誣縣民通寇紹慶詣臺使力保之全活甚衆有海邦讞畧一百六十條李復興字瑩斗濱州人康熙三年知婁縣松郡舊苦里役婁縣尤甚復興至詢其困苦乃與邑孝廉吳欽章等反覆區畫立爲均田均役之法悉罷年首甲首諸名知府張羽明請於巡撫韓世琦以其法推行鄰邑一郡盡獲甦息而賦亦以最松人建祠於白龍潭祀之舊通志尚元調揚州人康熙壬子舉人授華亭縣教諭性嚴正教諸生以砥節勵行提署營卒牧馬宫牆多所蹂躙元調赴轅欲愬營卒噪逐之歸乃縊於明倫堂士林痛之爲裒其教士事實請祀司起龍山西人授黃浦營守備康熙二十一年海寇乘夜潮駕四舟突入境剽掠而去起龍已就寢亟披衣率千總陳聖䇿等登漁舟追之賊舟揚帆行甚迅抽矢射其篷索帆落追及射賊應弦而斃者四人以中礟死奉㫖贈卹常州府漢袁玘㑹稽人爲陽羨長始創長橋以利涉至今賴之南畿志晉賀循字彥先山隂人除陽羨令爲政以寛惠爲本不求課最晉書本傳張闓字欽緒丹陽人元帝時晉陵内史立曲阿新豐塘溉田八百餘頃每歳豐稔晉書本傳季閎咸和初南蘭陵太守擊蘇峻將張健追斬之降男女萬餘口晉紀王藴字叔仁太原人簡文帝時爲晉陵太守有惠化百姓歌之晉書外戚傳殷仲堪陳郡人爲晉陵太守禁産子不舉久喪不葬者所布教條甚有義理晉書本傳吳隱之字處黙鄄城人由尚書郎遷晉陵太守在郡清儉妻自負薪晉書良吏傳南北朝宋王儉字仲寳臨沂人大明中義興太守風化之美奏課爲最任昉序儉文集梁褚翔字世舉陽翟人義興太守以廉潔著稱除苛政去浮費百姓安之梁書本傳王瞻字思範瑯邪人晉陵太守潔已爲政妻子不免飢寒梁書本傳蕭昱字子真普通中爲晉陵守勵名節省煩苛明法戢奸不旬日郡境肅然俄而暴卒百姓行號巷哭有田舍婦夏氏年百餘歳扶曽孫至郡悲不自勝梁書蕭景傳蕭曄字通明爲晉陵守初至郡歳旱䖍禱果雨舊多猛獸爲害曄在政六年此害遂息南史劉孺字孝稚彭城人晉陵太守在郡和理爲吏民所稱梁書本傳范岫字懋賓考城人居官廉介仕梁爲晉陵守惟作牙管筆一雙猶以爲費梁書本傳任昉字彥升博昌人義興太守歳饑以私俸米豆爲粥活三千餘人民間産子不舉昉爲厲禁孕者助其資費所得月俸畧盡及被代登舟裁有絹七疋米五石而已梁書本傳陳王勱字公濟瑯琊人梁季守晉陵當兵荒之後爲政清簡吏民懷之陳太建中東境大水命再領郡甚有威惠陳書本傳孔奐字休文㑹稽人陳永定二年除晉陵太守清白自守妻子並不之官單舸造郡得俸即分贍鰥寡時號神君陳書本傳王猛本名勇字世雄太建中守晉陵威惠並行姦盜屏息人以比趙廣漢北史唐李栖筠字貞一趙人肅宗時爲常州刺史歳旱編氓死徙乃浚渠厮江流灌田歳大稔大起學校堂上畫孝友傳示諸生爲鄉飲酒禮登歌降飲人人知勸唐書本傳獨孤及字至之雒陽人大厯中刺常州甘露降其庭唐書本傳孟簡字幾道平昌人元和中刺常州浚導孟瀆溉田四千頃賜金紫召拜給事中唐書本傳李嘉祐字從一趙州人爲江隂令淳雅不苛民庶親服南畿志趙和咸通中江隂令聽訟明敏楚州淮隂有農負屈不能直越江來訴和為判決遠邇胥服南畿志徐延休㑹稽人攝義興令勤恤民事初郡守多遣小吏巡縣爲民患延休箠而遣之刺史王彦章服其剛正貽書謝過舊史五代趙仁澤保大中爲常州團練使吳越攻常州戰敗被執歸之錢塘見王不拜責之王怒抉其口至耳丞相元德昭嘉其忠以藥傅瘡愈後不知所終南唐書本傳柴克宏巴州人保大十三年吳越遣兵襲常州破外郭克宏請效死行間唐主以爲右武衞將軍使救常州克宏所將數千人皆羸老樞密李徵古復以鎧仗之朽蠧者給之衆皆憤恚克宏恬然引兵趣常州徵古復遣使召之克宏曰吾計日破賊汝來召必奸人也命斬之使者曰受李樞密命而來克宏曰李樞密來吾亦斬之竟斬使大破吳越兵斬首萬餘級圍遂解南唐書本傳宋栁開字仲塗大名人太平興國中知常州招撫羣盜以俸金給之解衣與賊酋置諸左右或謂不可開曰民失所則爲盜推以赤心夫豈不懷未半歳境内輯寧南畿志馬亮字叔明合肥人至道中通判常州民有因緣亡失官錢者籍其貲不足償連逮至數百人亮縱去緩與之期不踰月盡輸所負宋史本傳李若谷字子淵豐人景德間知宜興縣時官市湖㳇茶歳約户稅爲多少率取足貧下若谷始置籍備勾撿茶惡者舊法沒官若谷使歸之民許轉貿以償民便之宋史本傳崔立字本之鄢陵人天禧中知江隂軍屬縣有利港久廢立敎民濬治溉田數千頃又開橫河六十里通運漕宋史本傳張其字公長清河人知江隂軍吏盜錢三萬既久其發其奸捕繋數十人轉運使趙光謂此應賞典願以聞其曰殺人以求賞可乎悉召吏諭以償錢則貸死吏親屬爭出錢以十日具乃推死者二人爲首餘悉貸不問趙愧謝曰公長者殆非予所及江隂縣志郭申錫字延之魏人爲晉陵尉民訴弟爲人所殺申錫察其懼而不哀曰吾得賊矣非汝乎執而訊之果然宋史本傳王罕字師言寳元初令宜興縣多湖田歳訴米輕重失平罕躬至田處列高下爲圖明年訴牒至按圖示之某户可免某户不可免衆皆服西方用兵歳科箭羽其價踴貴富室預儲以待售罕白郡守倍其直市之而令民輸錢旁州聞之皆請如罕法宋史王珪傳許恢慶歴中知晉陵縣勤卹民隱申港竈子戚墅三港皆久湮不治恢圖以喻衆役不加擾而三港俱濬民至今頼其利南畿志阮洪嘉祐間宜興尉深明水利屢上書監司乞開百瀆得請遂疏四十九瀆是年大稔又請於長橋東市中創一橋使運河南通荆溪既鑿得泥中舊柱乃知昔人已設橋於此常州府志司馬旦字伯康涑水人嘉祐中知宜興俗多嚚訟旦痛繩之民稍以詆冐爲恥長橋圮勸民修治不勞而成時王安石守常州大開運河調夫諸縣旦言役大而亟民有不堪請緩之不聽㑹大霖雨民苦其役多自經死役竟罷宋史司馬池傳陳襄字述古侯官人嘉祐中知常州郡庠隘襄鼎新之晨入坐授諸生經義旁決郡事震澤積水以運渠横遏不得入江久爲民田害襄立法浚之其患遂除常州府志趙伾字義夫洛陽人元符三年知無錫縣性英毅不畏彊禦號趙鐵頭重農務興水利民甚德之南畿志于溥大觀四年江隂丞悉心水利於黃田蔡涇等處置上下牐又導申利二港旁邑皆頼之江隂縣志楚執柔政和三年江隂丞嘗治橫河市墩新河諸港使水有蓄洩賴其利者白鹿化成十鄉計畝凡六千五百七十三頃有竒江隂縣志方允武衢州人宜興巡檢建炎三年北兵逼縣允武率土兵逆戰於邑之金泉鄉至海嶺力竭而死常州府志王棠紹興中知江隂軍軍故有學廢爲營屯棠請於朝復之復請以軍閒田爲士廩上嘉與焉南畿志葉顒字子昂仙遊人紹興中知常州初至郡無旬日儲未一年餘緡錢二十萬或勸獻羨餘顒曰羨餘非重征則橫斂是民之膏血也以利易賞心實恥之宋史本傳趙彥橚紹興中知晉陵縣歳饑賑恤有方所活二十餘萬人又以羨錢爲五等户代輸宋史宗室傳葉衡字夢錫金華人乾道初知常州時水潦爲災衡發倉爲糜以食飢者疫大作單騎命醫藥自隨徧問疾苦活者甚衆宋史本傳貝欽世字聖美上虞人乾道中知江隂縣時運河久塞欽世濬治之大家爭輸金助役踰月而成南畿志徐蕆字子禮歴陽人乾道初知江隂軍以郡田汙下溝瀆久淤請盡蠲秋夏之當輸者報可又江隂認辦臨安府和買紬絹四千餘疋民甚苦之蕆極言地狹民貧懇切祈免卒如所請命下之日歡聲動阡陌江隂縣志樓鍔字巨山四明人淳熙七年知江隂軍以儒雅飾治以仁愛治民初下車見貢院傾圮欲新之㑹歳饑不果及稔鍔已秩滿仍殫力經營工訖始去江隂縣志林祖洽四明人淳熙間知常州尊禮耆儒激勸學校後河湮沒重浚治之南畿志高商老㑹稽人紹熙中知宜興縣建社倉十一區是歳浙西饑流殍載路宜興民獨頼以安南畿志王聞禮溫州人慶元中知常州江東運使判官聞禮十朋子爲治能守家法人亦思慕之宋史王十朋傳張貴謨慶元中知常州時疫癘大作常俗貴巫賤醫乃毁像杖巫多施善藥民病漸瘳常州府志邱壽雋嘉泰初知武進縣時犇牛牐久壞壽雋修復之舊用木者皆易以石又爲屋覆其上開禧中通判常州南畿志范炎邢臺人嘉定中知晉陵縣賦多弊叢炎剔奸除蠧期㑹不爽科斂不擾而民瘼以蘇南畿志袁燮字和叔鄞縣人爲江隂尉浙西大饑常平使屬令賑恤燮命每保畫一圖山水道路悉載之而以居民分布其間名數治業悉書之合保爲都合都爲鄉合鄉爲縣徵發追胥披圖立決以此爲荒政首宋史本傳唐璘字伯玉古田人紹定間知晉陵縣鄰州田訟至有泣愬諸使願送晉陵可否者宋史本傳史能之字子善四明人咸淳初知常州撙節浮費以浚後河三百餘里民頼其利重修郡志義例精審爲世所稱常州府志姚訔宜興人德祐初知常州元巴延兵圍城訔堅守數月不下巴延攻陷屠之訔及通判陳炤兵馬副都監王安節猶率死士巷戰皆遇害宋史忠義傳元吕師聖安豐人元貞間爲常州路總管時郡學久毁師聖經營改建規模一新南畿志史塤真定人延祐中爲常州路總管興敎勸學即郡庠建尊經閣以儲書籍俾學者得所觀覽南畿志曹晉常州路總管為政不擾尤重學校禮義之俗由兹日盛常州府志袁德麟益都人常州路判官歳饑賑濟有方創城東倉徙吕城舊倉於無錫以便民浚南城外渠九里常州府志劉溶中原人知武進縣至正壬辰寇陷常州官軍潰散溶率民兵力戰於葛橋南死之南畿志明湯和濠人明初鎮守常州先是常州城廣袤四十里大而難守和斂其東西南三面築之控制形勢屹然重鎮南畿志呉良定遠人明初以指揮使鎮守江隂時張士誠據姑蘇跨有淮東浙西江隂一隅襟喉要地良受命繕城池遠斥堠礪器械嚴部伍敵畏不敢犯上親帥師下江西底定荆襄而無東顧憂以良爲扞蔽也後移鎮蘇州分省人物考髙復臨邑人洪武元年知常州府外寛内明歳旱禱於城隍祠得雨歳以有秋南畿志孫用字尚本鄒平人洪武三年莅郡以廉介稱先是郡學廢於兵用首爲剙建秩滿以治最俾再任南畿志李德善吉水人洪武中知常州廉慎公恕歳終閲獄有江隂民坐私鬻鹽械繋纍纍以爲首二人逸故久未決德善謂曰爾輩皆良民無知觸法獨不念父母妻子乎吾縱爾還家期十日併諭爲首者來歸衆感泣及期果引逸者至遂決遣之南畿志方文字用中汾水人洪武中知武進縣設再思亭於縣門左民有爭訟常引之至前諭以情理使歸更尋思訟者感之輒叩頭求罷去南畿志張宗璉字仲器吉水人宣德間以大理丞同知常州時清軍御史以法外括民爲軍宗璉固爭之爲御史所訶發憤卒民立祠君山常州府志莫愚臨桂人宣德五年大臣奏蘇常等郡繁劇難治上親簡況鍾及愚等授以璽書假便宜行事愚莅常郡興革咸中事宜聲與鍾埓常州府志周彬昌黎人天順初由御史謫知江隂縣勸善懲惡尤重彝倫浚河港數十處以廣溉灌民尸祝之江隂縣志劉鈺字世美沔陽人成化十一年守常州治尚敏慎吏民敬憚尤持廉潔母喪幾無以殮常州府志謝廷桂字時芳蒲州人成化中同知常郡力興文敎刻朱子同安四齋銘於郡學之壁善政最多民至今頌之舊通志熊翀字騰霄光州人成化中令武進立均田法以抑兼并又因田定賦奸吏無所容私武進縣志袁道字德純吉水人成化間令宜興民苦西氿風波道循氿南鑿夾河延衺三十餘里舟行便之名曰後袁河謂與漢令袁玘同功也宜興縣志王鍭字子鋒晉江人成化間知宜興縣時太湖盜發鍭聚衆備禦訪宋元水寨遺址立堡二十建警樓十二募丁壯守之寇至合𠞰去則勸農兵不知勞盜不入境宜興縣志張汝華懷安人成化中知靖江縣時縣新立尚未有城郭宫室汝華悉心經始四年營建畢成靖江縣志金洪鄞縣人𢎞治初令靖江事無鉅細一覽無遁情時沙田有圮於江水而賦猶如額者洪立法豁之民患以甦靖江縣志孫顯字微之華州人𢎞治間知靖江均徭賦懇荒蕪開七十二港葺百餘橋旱潦有備民不病涉靖江縣志吕鏜字廷韶真定人𢎞治間令武進政尚簡易凡有裁畫務取其宜民者故令不苛而治不勞武進縣志劉鋐字景瞻安福人正德間知江隂癯不勝衣訥不出口而決事如流勾稽里書飛詭之弊毫髪無隱羣吏憚之江隂縣志李嵩字維嶽濱州人正德六年守常州時流寇出沒淮北常州在千里外而嵩亟修城濬池咸謂過計不數月寇浮江犯江隂嵩擐甲禦之斬獲甚多又令死士泅水沉其舟賊乃退後賊復來勢益張嵩偃旗鼓示弱而隂督戰賊諜知遂奔狼山爲邊兵所殱㨗聞進三品俸常州府志王敎字誕敷宜賓人正德中守常州仁廉豈弟值兵荒洊至賑貸城守皆精慮給之常州府志劉秉仁字思孝大邑人正德間知宜興縣廉靜去之日行李蕭然時郡倅臨縣見而歎曰趙清獻尚有琴鶴劉併無之宜興縣志陳實字秀卿瓊州人嘉靖間守常州歳大祲白監司賑以公帑又悉出羨餘錢市穀以佐建道南書院祀楊時鄒浩諸賢沒於常橐無餘資士民哀之留衣冠葬東郭外舊通志張大綸東陽人嘉靖六年守常州革白糧餘費萬緡武進宜興二邑坐加賦民久困大綸請以雜稅抵充額數損三之一宿患頓除常州府志應檟字子材遂昌人知常州府性廉峭才亦明敏御史行部郡牧例皆跪謁檟獨長揖初縣賦無定額吏縁爲奸檟定爲本折二徵官民五則一稅糧二義役三里甲四均徭五驛傳名曰與民周知册富者不得隱漏貧者不敢飛灑巡撫歐陽鐸上其事於朝遂爲永利常州府志符騐黃巖人由御史出守常州之官不攜家累但持二敝簏從一蒼頭常供以蔬人目之爲符青菜銳意鋤强抑橫歳大旱蝗日出循行不勞供億以筐盛米數升菜數束而已明一統志何全字侯琮温江人嘉靖間常州司理有治劇才興革大故多就決焉舊通志彭簪安城人通判常州嘗視篆宜興里胥供歳例金簪革去之或謂恐病來者簪曰吾知自盡耳來者賢必不我咎其或非賢我又安能爲之地乎常州府志王慎中字思道晉江人嘉靖中由驗封郎中謫判常州善治劇暇與唐順之力興古學學者稱遵巖先生常州府志黃潤字以誠福建人嘉靖間令武進廉介絶俗巨璫涉境輒稱疾弗出馭吏尤嚴積蠧爲之一洗武進縣志馬汝彰河南人嘉靖十一年知武進縣少宰劇邑政務填委決之若神賦役多所更定民甚便之武進縣志王嘉元四川人嘉靖十五年令武進性簡樸不伺候人意始至當路知之甚鮮久之廉能益著唐順之贈以詩曰無言似桃李有志笑鷹鸇得暇即開卷長貧不受錢武進縣志徐良傅字子弼臨川人嘉靖間令武進務躬行敎化不屑屑簿書期㑹嘗疏二程要語刻以敎士學者尊之曰少初先生武進縣志李畫字元素林縣人嘉靖中令武進才高氣銳勇於任事縣當孔道冗費不貲咸取諸里長庫役畫獨以鹽課贖鍰充之部使督征江南畫檢故牘得支運折兌故事奏記撫按請諸朝報可武進得免米若干萬及東南諸邑皆然著六曹職掌書名曰武進掌故常州府志楊巍海豐人嘉靖中知武進性廉潔一介不茍時毘陵民俗甚淳巍以寛厚治之民至縣庭如入其家徭賦均平敲扑幾廢武進縣志岳相壽光人嘉靖中知武進强毅不避豪右生而茹素律身清苦氷心鐵骨邑人稱之武進縣志謝師嚴上虞人嘉靖中知武進時兵燹後法度廢弛奸蠧交據師嚴廉得其故財賦刑獄釐剔積弊殆盡武進縣志丁謹字惟安澤州人嘉靖中知宜興明初以討張士誠缺餉權借㳄年秋糧併徵一斗七合後遂爲定額謹因入覲具本末奏請均派乃以本府轄下餘米補豁田賦民困得甦宜興縣志馮惟納字汝言臨朐人嘉靖中爲宜興令開通澤河十餘里避東氿風波之險至今便之宜興縣志萬虞愷字懋卿南昌人嘉靖中知無錫縣時徭役不均虞愷於里老庭謁時猝令書大户差等皆不敢隱乃按籍役之又作丁糧十段册人以爲便主簿某實廉而直指受讒將以墨論虞愷力爭之至解印綬置中庭簿始得全無錫縣志王其勤字時敏松滋人嘉靖中知無錫時屢有倭患城久圮其勤之官甫三日即召父老謀築城令宦家與民分任版鍤親督視之三月工竣倭寇至邑人得登陴為守又履畝丈量釐正其稅民祠於惠山無錫縣志錢錞字鳴叔顯陵衞人嘉靖中知江隂縣倭寇入犯鄉民避寇來者望城櫓而泣錞啓門盡納之圍城急援兵不至錞憤甚推案厲聲曰張睢陽是何人吾願以死報國耳於是集千人突圍出戰兵潰錞馬陷泥淖遂遇害贈光禄少卿祠名愍忠江隂縣志趙錦餘姚人嘉靖中知江隂縣歳祲力請賑給全活萬計境内包港斜橋等處茂林深箐積為盜藪乃單騎往悉焚其巢患遂息瀕江土城悉甃以磚歴官光禄卿奏免江隂貢鮮民德之江隂縣志易幹字伯貞巴陵人嘉靖間知靖江懲奸勸農荒蕪盡闢靖江縣志施觀民字于我福清人隆慶中守常州浚玉帶河曰後此當人文日盛建龍城書院選諸生之秀者課之與其選者人以為榮常州府志茹宗舜字子孝遵化人隆慶末知武進縣吏民一見問姓名里居輒不忘然未嘗以聰察自喜政尚寛和不嚴而肅武進縣志穆煒新建人萬歴初知常州郡有虣為民患煒下車即擒治之然性本和平不專事搏擊為觀稼亭于城東時邀賓從談讌雖領劇郡有餘閒焉常州府志錢守成洛陽人萬歴間知常州廉明有守意所可者雖寒素曲加優禮不可即名勢赫奕不為動釐察吏弊奸胥歛手政以肅然常州府志邊有猷封邱人萬歴間為常州同知治尚嚴肅民不敢欺後復知府事全用寛和民不忍欺夙興坐堂上案牘旁午咄嗟而辦常州府志歐陽東鳯字千仞潛江人萬歴間常州知府清勁拔俗下車即葺龍城書院以祀郡之先賢建傳是經正兩堂集士大夫之賢者講學其中寒暑無間一時人才蔚起常州府志閔廷甲蘄水人萬歴中常州推官才具敏練而鞫訟必慎嘗自言始至誤決一獄至今悔之自兹以往或可無大失矣常州府志白比珩綏德州人為常州同知飲麤茹淡不攜家累常出防江僮奴扃閉署中糧盡乃號鄰署貸米食之行部江隂即蔬餉亦不受夜嘗飢渴飲水而已後擢員外郎角巾葛衣策蹇而行常州府志羅華衮河南人天啓間知武進勤敏精練催科不事鞭扑民皆樂輸與太守曽櫻推官吳麟瑞同時稱一郡三賢武進縣志曽櫻峽江人天啓三年守常州魏璫張甚有請建生祠者櫻袖其詞火之璫祠遍天下毘陵獨無武進孫慎行遣戍寧夏櫻故緩其期竟得免行無錫高攀龍聞逮自沈爲保全其家時東塘岸圮民田悉成巨浸櫻捐俸築堤十五里至今號爲曾公隄常州府志馬嘉植字培原平湖人崇禎時爲武進令邑賦繁重糧長之害尤劇嘉植議變為圖收任輕而役均漕兌旗丁耗外邀索無已嘉植痛抑之至露刃鼓噪不為動武進縣志陳函輝字木叔崇禎時知靖江濬團河築堰牐民頼之肖像立祠靖江縣志國朝蕭起元奉天人順治二年守常州承前守貪虐之後鎮以寛大戢兵禁暴民始有更生之樂未半載擢浙江巡撫孫振先字光裕泗州人順治初署武進縣時署守宗灝貪暴多籍富民家且將請兵屠城振先誓以死爭之乃止夏一鶚奉天人順治三年知常州府時山湖藪澤尚多伏莽一鶚悉心勞來威惠並著盜賊皆為良民舊通志崔宗泰奉天人順治十二年知常州府惠貧弱抑强豪發摘奸伏吏民驚若神明十三年征閩大兵十餘萬駐郡宗泰供帳儲偫纎悉預備有遊騎十餘逐婦女二人溺河死宗泰夜叩營門白將軍請兵部官偕往收縛將軍悉按軍法治之麾下肅然時單騎按行城内外使一皂傳呼崔太守來兵即錯愕引避民乃得安堵舊通志朱士達潛江人順治中授常州推官時有旗丁林顯瑞以逼姦戕烈婦海氏匿其屍漕艘中士達監兌至其船疑焉發米得屍林論如律河干立海烈婦祠遠近皆神其事鄭重字山公建安人康熙初知靖江縣邑舊為江隂之馬䭾沙三面瀕江壤接泰興如臯二縣地皆平坦窪下每遇霖澇田皆淹沒重濬柏城石淀等五港以資蓄洩復疏七十二支港匯灌團河自此三邑無水患吳興祚字伯成正紅旗人康熙三年知無錫縣均甲役丈田畝清漕兌時前令積逋甚多興祚為捐資代償一日而畢在官數年修學校建縣治濬河築塘規模為之一變王迎山西人康熙七年同知常州行部江隂卻暮夜金日供惟青菜一筐人比之符青菜舊通志駱鍾麟臨安人康熙八年知常州府為政簡易近民有訟者輒懇惻誨諭九年大水遍歴窮鄉勸賑十年大旱葛衣草屨步禱數日不應乃躬詣郡獄日食糲飯一盂菜一匕引咎自責言與淚俱聞者感動興延陵書院率士大夫㑹講其中尋以艱去郡人思之祖進朝奉天人康熙二十三年知常州府以詿誤降調巡撫湯斌疏請留任加意振作自郡學宫及南北兩壇並水旱門關城樓雉堞俱建造一新後引年乞休既去人多思之鎮江府漢潘乾字元卓長平人光和中為溧陽長有惠政崇禮興敎郡人為立校官碑千餘年尚存南畿志三國吳孫韶字公禮吳人伯父河為將軍屯京城孫翊遇害河馳赴宛陵亦被殺韶年十七收河餘衆繕治京城樓櫓修器備以禦敵孫權定丹陽引軍歸吳至京城見韶甚器之即授承烈校尉統河部曲吳志宗室傳吾粲烏程人孫河為縣長粲爲小吏河甚竒之河為將軍表粲為曲阿丞遷長史治有名迹吳志本傳南北朝宋沈巑之丹徒令以廉自守不事左右浸潤日至逮繋尚方上召問之瓚之曰臣坐清所以獲罪上曰清何以獲罪曰無以奉要人上廉其無罪復除丹徒令南史梁范雲字彥龍舞隂人竟陵王子良為南徐州兖州雲為主簿每陳朝政得失梁書本傳邱仲孚字公信吳興人曲阿令王敬則反前鋒屆曲阿仲孚鑿長岡埭㵼瀆水以阻其路敬則兵不得進梁書本傳蕭洽字宏稱蘭陵人天監初為南徐州治中從事清身率職餽遺一無所受妻子不免飢寒梁書本傳蕭藻字靖藝太清二年為南徐州刺史侯景亂藻遣長子彧率兵入援景遣將據京口或勸奔江北藻曰吾國之股肱既不能誅賊當死朝廷安能投身異類以保餘生因不食累日梁書本傳江子一字元貞考城人梁曲阿令著美績後為南津校尉帥師禦侯景與弟子四子五皆遇害梁書本傳隋逹奚明大業初為溧陽令盡心民事嘗疏涇瀆以備旱潦北史唐謝元超武德二年潤州刺史重開南北二塘以溉民田舊唐書本傳齊澣字洗心義豐人潤州刺史州北距瓜步沙尾紆匯六十里舟多敗溺澣徙漕路由京口埭治伊婁渠以達揚子舟得無虞歳減運錢數十萬唐書本傳尹元貞文明中爲曲阿令徐敬業兵起陷潤州元貞率兵赴援戰敗死之畢搆字隆擇偃師人神龍初忤武三思出為潤州刺史政有惠愛唐書本傳裴寛聞喜人景雲中為潤州叅軍刺史韋詵休日登樓見寛於後圃有所瘞藏問之答曰適有人以鹿為餉致而去寛義不以苞苴汚家故瘞之詵嗟異焉唐書裴漼傳李元紘字大綱萬年人由好畤令遷潤州司馬以辦治得名唐書本傳閻敬之丹陽郡太守永王璘反敬之拒戰於伊婁埭死之唐書永王璘傳韋損永泰元年領潤州刺史留意民事丹陽縣練塘被豪民築堤横截損以利害白本道觀察使闢之民刻石頌德南畿志蕭定字梅臣守潤州與常州蕭復濠州張鎰俱治最第一其勤桑稼均賦稅勞來游口更在鎰復右唐書本傳陸偘嘉興人陸贄父大歴中為溧陽令有政聲舊唐書宋劉師道字損之開封人咸平初范正辭薦其才堪長民知潤州師道敏於吏事治有能聲吏民畏愛宋史本傳許元字子春宣城人知丹陽縣縣有練湖決水一寸為漕渠一尺故盜決者罪比殺人㑹歳旱元請借湖水溉田不待報決之州遣吏按問元曰便民罪令可也由是溉田萬頃歳得大豐歐陽修工部郎中許公墓誌沈周字望之錢塘人守潤州為治簡易凡訟有可已者輒諭以義使歸思之以故獄訟衰息南畿志孫立節字介夫為條例司屬官以議不合引去出為鎮江軍書記新法之初監司不以禮遇士大夫獨敬憚立節曰是抗丞相不為條例司者南畿志程珦字伯温河南人潤州觀察支使侍禁曹元哲怙勢爭田州守囑珦右之珦不為撓州事繁劇多賴以濟朱子文集蘇京字世美紹聖中令丹陽募民重浚練湖易置斗門十數甚有規畫宋史蘇頌傳鄭驤玉山人元符中知溧陽歳饑民流漕司按籍征稅驤曰民亡稅何從出今不捐逋賦民亡愈甚使者不能屈宋史本傳劉寧止字無虞歸安人建炎初為兩浙轉運判官苗劉之變自毘陵馳詣京口見吕頤浩劉光世勉以忠義退而具軍需以佐勤王宋史劉一止傳汪藻字彥章婺源人紹興中知鎮江建炎之亂鎮江歳輸米率不如數轉運使按視倉粟扃鑰而去軍食不繼官吏憂窘藻至曰官軍張頤待哺米在廩中而不與之食羣黥飢餓無聊雖錮南山猶有隙也啓鑰給之後知徽州徙宣州宋史本傳劉公彥字彥輔密州人紹興中通判鎮江時倉廩空虗軍無見糧公彥進足食足兵之計大帥劉光世即檄公彥權府事調度有方軍民安輯南畿志蔡洸字子平仙游人知鎮江府時久旱郡民築陂瀦水灌溉漕司檄郡決之父老泣訴洸曰吾不忍獲罪百姓卻之已而大雨漕運通歳亦大稔宋史本傳陳居仁字安行興化軍人紹興中鎮江大旱移居仁守之請以緡錢十四萬給兵食間遣糴於荆楚商人商人曰是陳待制耶爭以粟就糴居仁區畫有方所存活數萬計因飢民治石海鮮界港為石墶丹徒境上蓄泄以時以通漕運宋史本傳李衡字彥平江都人知溧陽專以誠意化民民莫不敬夏秋二稅以期日榜縣門鄉無吏迹而輸送先他邑辦沿江官多送其孥以避敵衡獨移家入縣民心大安盜蝟起旁境而溧陽靖宴自如治狀上詔進一秩後知婺州宋史本傳耿秉字直之淳熙十年知鎮江軍府時三縣合催畸零稅總為錢三千餘貫被擾者數萬家秉悉蠲之代以公帑之贏去後民猶思之鎮江府志傅伯成字景初嘉定三年知鎮江府全活飢民瘞藏野莩圖山砦兵素與海盜為地伯成廉知姓名捕而鞫之獄具請貸其死黥隸諸軍宋史本傳趙善湘字清臣嘉定中知鎮江敎浮水軍五百人能潛行水底制多槳船五百艘無問風勢逆順疾㨗如飛又造赤馬白鷂二大舟每舟可載二千人每一蒐閲舳艫參錯角技奏樂如履康莊宋史本傳陳景周嘉定時授溧陽尉民負氣喜鬬獄多滯囚景周謂察獄在初而初情惟尉能得故職所當親雖猥不憚言有可察雖微必證邑自是無寃民溧陽縣志孫子秀字元實餘姚人淳祐四年知金壇縣嚴保伍釐經界一切與民休息訟者使自齎牒詣里正不實者往往自匿其牒諸豪黠有犯輒痛懲之宋史本傳王孝忠鎮江前軍統制兼淮東路分戍淮隂楊貴反孝忠率衆逆戰勝氣百倍俄水軍統制朱信降賊孝忠孤軍不敵死之宋史本傳李成大字實夫建昌人德祐二年知金壇北兵至與寓居官潘大同大本率民兵巷戰不勝大同兄弟死之吏民挾成大降乃潛與胡用存謀復金壇事泄繋獄搒掠不屈殺其二子以懼之笑曰子為父死臣為君死卒殺之宋史忠義傳元艾去病字安叟金壇人為西津巡檢掩骼埋胔以千計病餓者給以醫藥全活甚衆遷金壇尉金壇縣志黃中大德八年為金壇尹邑有公田無藝之稅萬三百石中抱檄申省叩頭祈免以死自誓卒如所請又興水利民賴之南畿志太平葉爾羌人皇慶初鎮江路總管府達嚕噶齊革海漕吏弊復豪貴所占學田明一統志段廷珪字君璋濟寧人皇慶二年鎮江總管首戢强猾禁誣訐奏免新増夏稅鈔二百八十七定秋糧米三萬七千有竒鎮江府志阿爾斯蘭輝和爾人皇慶二年授金壇縣達嚕噶齊縣有抛荒田糧四十餘石民無從辦為奏除之金壇縣志沈德華松江人泰定初鎮江府路知事大旱民飢德華陳救荒之策擬將所撥松江赤秈米四萬石擇其甚貧者驗口給賑省府從其請民賴以生鎮江府志薩都拉字天錫燕山人天歴元年授錄事司達嚕噶齊始至設闤闠制權衡俾市物者各得其平歳大祲白太守發廩以賑全活數十萬人俗尚巫以禍福惑愚民都刺捕治之素工詩於京口山水多留題咏鎮江府志昂吉河西人天歴元年金壇縣達嚕噶齊嘗賣馬助米以食貧民金壇縣志檀讓至正中金壇尹有惠政重建學校金壇縣志明楊遵字宗道洪武初守鎮江廉明有為善於撫御流離復業百廢具舉性好學文章政事一時翕然稱之南畿志安民善洪武元年知金壇縣重建祠宇壇壝修葺學校金壇縣志孔克忠曲阜人洪武元年金壇主簿擒戮宜興溧陽界劇盜百餘人以殄民患明一統志蔡原臣洪武三年知金壇縣重建祠宇壇壝修葺學校金壇縣志徐誼洪武中守鎮江賄賂不行治績甚著入覲推循良第一南畿志盧何生字允迪南豐人洪武中知溧陽以雪寃澤物自任治事朞月刑政為清溧陽縣志楊勉平陽人洪武中知丹陽縣隆師儒勸農桑平徭賦南畿志胡孟通知丹徒縣洪武十八年以事就逮民數千人詣闕訴其撫民有方特命釋之仍遣使勞以酒時金壇丞李思進被逮得邀奬勞放還與孟通同丹徒縣志王秉彞河南人洪武中知丹徒縣科差獄訟各當其平南畿志薛巖字孔瞻閿鄉人守鎮江豪强為之屏跡郡當要衝民多困於轉運巖為置牌約甲乙更代由是民不勞而事集南畿志劉辰字伯循金華人建文中由監察御史守鎮江嚴辨有聲境内牐堰廢壞者悉修復之宗澤墓蕪穢不治祭田為守僧所侵皆復其故南畿志董復昌鄱陽人知丹陽縣修築練湖丹陽縣志羅觀字彥賓南昌人初為丹徒令稱最永樂初擢守本郡新學宫及城隍廟郡志散佚纂輯梓行南畿志袁庸字宗常滿城人知丹徒縣督民懇田汙萊盡闢有蝗入境庸自引咎蝗悉飛去時征閩軍餉夫役一呼而集民不知擾丹徒縣志鄔璚新昌人宣德中溧陽丞鋤抑强梗良懦以安溧陽縣志楊榮永昌人以御史謫知溧陽濬百丈溝八百餘丈中設九垻又建義倉溧陽縣志劉訓字忠言麻城人正統間知金壇縣建預備倉數十楹修舉廢墜勸課農桑性儉素琴書外無長物暇即躬治蔬圃巡撫周忱為僉魚菜户各一輪供以助其廉治行為天下第一金壇縣志熊達字成章南昌人知溧陽縣始建鄉賢祠於學置義塜禁勿水葬開濬澡車涇以通水利溧陽縣志張巖字廷瞻上虞人景泰中由御史出守鎮江時閩浙有警郡當衝要軍需旁午巖與丹徒令蔣忠協力籌應措置有方民賴安堵郡學在城南隅隘陋不稱奏請遷之南畿志林鶚字一鶚浙太平人裕陵復位簡前言官守正持大體者為大郡知府鶚知鎮江至郡汲汲興利除害不出一言暴前人短郡漕河孔道往經孟瀆險議鑿河自七里港引金山上流通丹陽避孟瀆鶚言迂遠多石又壞民廬墓請按京口牐甘露垻故迹稍深浚通舟春夏起牐秋冬度垻道里近功力省又不損民壞地利甚便竟停役從鶚言鄭曉名臣記黎福字天與樂平人成化中由御史出守鎮江嘗農月天旱夜分雨注喜甚起出㕔事鳴鼓集吏士出諸坐事輕繋者若干人悉散歸農衆懽呼而出在郡日久訟獄清簡恒執書燕坐門庭寂然鎮江府志熊佑字良佐博興人成化十六年守鎮江歳大祲奏蠲逋稅平糴煮糜全活甚衆修練湖石堰以便蓄洩鑿鮑村陳瀆等港以殺丁角延陵諸水開爛泥洪以溉呉家沙田若干頃鎮江府志孫紘字文冕鄞縣人成化中任鎮江推官案牘繁劇悉親書之吏無所容其奸鎮江府志楊璡字用璋祥符人成化中知丹徒縣慎密温厚歳大水田禾溧沒璡竭力蠲賑憂形於色丹徒縣志劉觀平度州人成化中知金壇縣朝夕惟虀粥妻歎曰此清官飯耶觀笑而諭之遇旱禱雨輒應嘗題壁曰私意半毫無地入公心一片有天知金壇縣志張賓字廷賓單縣人成化中知金壇歳大水以全災報雖觸大吏怒不為懾句容有疑獄歴十五年每上爰書囚輒不服自請於直指願下金壇知縣死不恨直指曰汝何以知其賢對曰清耳吾聞清者鬼神憚之何情不得直指為下其事果得直金壇縣志胡怡字允序山隂人𢎞治中鎮江府推官讞獄詳審有兄弟競財積年不決怡曉以義訟遂息句容令被誣怡直其寃令密懷金以謝正色拒之卒於官貧無以殮鎮江府志李咨字汝弼故城人𢎞治五年令丹徒性寛雅不事苛察有母訴其子不孝請寘諸死咨委曲諭遣母子感化而去民犯細故輒貰之至豪橫蔑法及奸吏舞文者痛治之弗貸丹徒縣志陳用明福清人𢎞治中任金壇湖溪巡檢率民築堤使旱澇有備旁植榆栁以防衝決秩滿器物悉封貯以待來者金壇縣志符觀新喻人𢎞治間知溧陽課農桑輕徭役溧陽縣志羅循字遵善吉水人正德六年知鎮江府饑饉之後百務俱弛循釐奸節費甃垣壁備弓弩明年巨寇入境守禦有方寇不敢逼己而四將軍將北軍來總督諸大臣且至凡軍行芻糧器仗舟艦䭾馬犒賞諸費盡取之府循日初出伏謁諸司日昃措辦不就寢者四十餘日尋以才堪保障調淮安鎮江府志林魁字廷元龍溪人正德七年守鎮江不可干以私桂蕚令丹徒才氣横溢魁稍裁抑之迹若相忤而事實相成三年考績擢山西督學副使鎮江府志周霖正德七年以御史左遷丹陽知縣賞罰明允令行禁止流賊過江保障之力為多丹陽縣志劉天和字養和麻城人正德中以御史謫丞金壇安於吏事忘為遷謫治行稱最擢知本縣築邑城六門兩關建昌都圩二牐設釐弊册置義塜金壇縣志申理鎮原人正德十年知丹陽縣鋤强扶弱歳歉多方賑恤丹陽縣志于旺正德中金壇典史以清謹著考滿紳士贈以詞有三載宦囊如鐵冷誰信起家刀筆之語金壇縣志林華字廷彬莆田人嘉靖中知鎮江府守道愛民嘗召諸生質疑問難瀕江有洲田民間相爭至持刃鬬殺華請於大吏立為公莊收其租抵府縣坊廂之費㑹姦民造謗詔逮問士民送者頃刻萬人至京驗問無實釋之歸以壽終訃聞京口士民縞衣為位哭奠之鎮江府志張尭年字紹中慈谿人嘉靖十五年繼前令張棐為金壇令棐渾厚尭年精明人稱二張金壇縣志茅坤字順甫歸安人嘉靖中知丹徒縣㑹歳祲多方賑恤丹徒縣志黃朏字文輝豐城人嘉靖中知丹陽縣嚴出納懲侵剋省夫役裁支應去之日行李蕭然丹陽縣志梁瑾臨汾人嘉靖間金壇主簿治園蔬自給鹽寇騰江上奉檄進𠞰手殪數人幾獲其魁忽暴風壞舟遇害金壇縣志吕光洵字信卿新昌人嘉靖中溧陽令縣中逋賦甚多率有糧無田光洵立法丈量分官民二則賦役以清溧陽縣志沈鍊字子剛㑹稽人嘉靖間知溧陽疾惡如讐奸猾畏罪造蜚語中傷之尋調去溧陽縣志鮑良規象山人嘉靖間金壇敎諭恒面折人過舊有學租盡推與諸生之貧者金壇縣志王事聖南康人萬歴八年知鎮江府擒治妖僧汪源洪等詞連數百人當路欲張其事以為功事聖力持之但論誅首惡餘不問鎮江府志范世美字敬之高安人萬歴中知鎮江府一物無所取不屑屑以理訟為事而曲直分明鎮江府志徐一檟字汝材西安人萬歴中知丹徒縣決斷如流莅官數年百利具興丹徒縣志許宏綱字張之東陽人萬歴十年由績溪調金壇太守張祥鳶稱其弊政如洗惠澤如流掾守空舍如貧家里絶追呼如畏壘金壇縣志梁銓字叔衡仁和人萬歴十九年知金壇邑中經費出納多淆雜虧缺銓取他所竒贏補其最急可緩者俟之弗以煩民每歳漕羨悉除著為令濬城西濠令深廣城守有備金壇縣志曠鳴鸞字和聲江西人知丹陽縣以地方利病為念嘗據堪輿家言丹陽運河至毘陵水直㵼弗利遂建議開築運河丹陽縣志龎時雍字景和汶上人萬歴間知丹徒縣果於有為丹徒縣志康邦濟太康人鎮江知府遇旱禱雨輒應時有虎患邦濟檄於神虎自投河鎮江府志陸夢祖字啓述山隂人萬歴間知丹徒縣以平易為治事上官獨不諂一時稱為强項丹徒縣志賀仲軾字景瞻獲嘉人天啟間守鎮江時丹陽姜志禮忤璫有部劄下府提勘仲軾不奉檄鎮江府志周廷鑨字芮公晉江人天啓七年任鎮江府推官年甫逾冠至郡即誓於神曰異日持地方一錢歸者有如日署丹陽縣事盡除耗羨宿弊一清鎮江府志印司竒字雪浪桃源人崇禎時知鎮江府嚴繩奸吏折獄明敏嘗以暮夜鞫訟庭燃雙燭胥吏立廊廡下寂無人聲民望之如神一見輒吐其隱鄰郡有疑獄往往來質成焉鎮江府志柯友桂字仙若彭澤人崇禎時知金壇縣性警敏嘗以事入郡城留數日歸而詞訟壅滯友桂立召數百人面決之耳聽手揮目覽口酬片刻而畢復號於衆曰若有負屈者更自申辨衆無言乃退金壇縣志杜繩甲字皖實富順人崇禎時鎮江府同知濱江宿盜多通邏卒為耳目繩甲出不意操小舟擒盜於臥内江洋以清鎮江府志國朝蔣文運字懸扈直隸人以都察院經歴改鎮江府同知清潔自持愛民禮士調伏駐防大帥上下帖然張承恩字洪宇昌平州人順治二年以副將佐守鎮江時疆宇初平奸宄未靖承恩單騎往長蕩湖招撫宿賊康三錫等又先後提師出𠞰羣賊誅其渠魁株連者盡釋境内宴然塗廓字容宇奉天人順治二年知鎮江府時江南用兵兼浙閩兩粤數有大師絡繹取道京口城中兵民雜居廓振紀綱撫凋敝招流徙輯營弁凡犒軍之費挽舟秣馬之役措給有方民咸安堵又新學宫延紳士問民疾苦有宜興革者次第行之居一載以廉幹擢磁州叅政許宸字菊谿内鄉人順治二年知丹陽縣大軍征閩徵發不時宸多方應變民不知擾居官清謹公餘宴坐讀書苞苴之饋不至其門以上舊通志胡延年字蒼恒光州人順治二年知金壇縣湖寇薄城肆焚掠延年星馳赴郡以大帥劉良佐兵至身自臨陣殺賊城以全其餘孽有逸去者不數日復集延年復擊敗之遂修城闉葺縣治興文敎以督課諸生撫按交薦擢工部主事高來鳳字梧陽西安人順治十二年守鎮江為治清介寧謐不尚嚴刻而人皆憚之聽訟委曲開諭雖婦孺皆得吐所欲言歳乙未京口初設重兵民未與兵相習來鳳竭力調劑上下帖然舊通志賀應旌字懷菴肥鄉人順治十五年知丹陽縣適海寇犯鎮應旌嚴飭守備力請巡撫蔣國柱駐兵城下身臥起軍前者數閲月悉力防禦城賴以完羅明昇南陽人鎮江巡江營都司以勇著順治十六年海寇犯鎮江明昇分守談家洲隔江與瓜洲相望寇陷瓜洲官軍勢孤時暑甚裹甲不解者十餘日寇衆登洲明昇奮身陷陣遂遇害家丁趙九兒亦賈勇戰死舊通志程康莊字坦如武鄉人以貢授鎮江通判新設軍鎮通判職當贊理將軍幕府謂之理事㕔每遇軍民獄訟委曲平直不少偏倚民甚賴之舊通志鄒儀周南平人康熙初知丹徒請建營房令兵民不擾徵輸悉除耗羨士民勒石焦山紀之歸後死耿逆之難江南通志卷一百十四
