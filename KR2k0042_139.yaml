軍前贊畫遣竒士馮仲纓金相往說倭將約盟解甲事垂成為閫帥所忌遂落職天啓改元追叙東征功贈尚寶司少卿黃博學尚竒尤精律吕歷法王臨亨字止之崑山人萬歷己丑進士授西安知縣調海鹽守潔才敏讞獄如神擢刑部主事恤刑廣東故事減大辟不得過百人臨亨平反二百餘人吏執案請曰應活人耳寧計駁耶遷郎中大著明允之譽子志堅志長志慶皆知名時有一鳯三雛之目翁憲祥字兆隆常熟人萬歷壬辰進士除鄞縣知縣以課最徵入歷吏科都給事中疏請東宫講學福王之國糾中官黃勳等不法事知縣滿朝薦等以忤稅使繫獄力請釋之遷太常少卿卒弟愈祥應祥并居官有清名憲祥子漢麟尚氣節終南安推官金士衡字秉中長洲人父應徵雲南參政以廉能稱士衡萬歷壬辰進士南工科給事中兼掌六科事極陳礦稅之害請撤還中使語極剴切又爭輔臣沈一貫庇被察給事御史擢南通政參議歷太僕少卿士衡清介敢言士論推重陸化淳字君復常熟人萬歷壬辰進士授工部主事歷知金華府義東二邑困於開採遂定全浙補價議革守礦兵省費以千數復守贛州亷敏如在浙時以勤卒官弟化熙字羽明萬歷癸丑進士官工部出蒞夏陽漕渠山東蓮妖驟發突犯東關化熙有禦寇護漕功終湖廣參政沈珫字季玉吳江人漢曾孫與兄琦弟珣號沈氏三鳯珫舉萬歷乙未進士以母老不謁選母殁服闋始仕歷東昌知府持守清介福藩就封中人過臨清暴橫以珫約束嚴皆不敢肆遷副使歲旱蝗珫賑饑殲盜東土獲安少子自南以文學有盛名由進士除蓬萊知縣清操肖父繆國維字四備吳縣人萬歷辛丑進士纍官貴州副使聞安酋難作叱馭兼程抵任枕戈坐甲者三閲月圍解叙功遷參政尋告歸子慧逺順治丁亥進士有文譽孫錦宣康熙癸丑進士授編修品行端雅繼讓戊辰進士彤丁未狀元有傳汪起鳯字無朋長洲人萬歷辛丑進士歷江西參政分守南瑞弭孽宗之變遷按察使分巡嶺北贛州兵譁辱帥圍署皆正其罪境內獲安纍擢廣東布政徐待聘字廷珍常熟人栻從孫萬歷辛丑進士歷湖廣僉事分守荆南奢酋繹騷繕兵庀餉楚地晏然遷陜西按察使撫臣喬應甲希魏忠賢意急追故侍郎王之寀贓巨萬待聘故緩之與應甲抗不少屈尋引疾歸從弟待任字廷葵以鄉薦歷沔陽知州楚藩中涓殺人捕置之法民田為相國子所奪斷還之亦以強直名葛錫璠字中恬崑山人萬歷辛丑進士歷刑部員外有大司馬私人受戎帥賂事露屬刑部庇之錫璠不可卒按以法屢擢河南分守道殲靈寶盜魁散其餘黨中州以安終河南按察使子冪字端調崇禎庚午舉人篤學嗜古家多藏書悉鋟板行世王心一字繩甫吳縣人萬歷癸丑進士由行人選御史天啓初疏論客魏寵盛及救言官之攻客氏得罪者忤㫖斥歸尋復官歷遷應天府尹又以糾閹黨削籍直言徑節推重一時崇禎初起用終刑部侍郎陸康稷字宇粒吳縣人萬歷丙辰進士知貴溪廬陵二縣有亷能聲擢兵部主事忤魏忠賢落職崇禎初復官歷文選郎中長洲管玉音天啓乙丑進士授工部主事以督工節費忤璫被陷廷杖斥歸孫朝肅字恭甫常熟人萬歷丙辰進士授刑部主事光宗時紅丸一案朝肅首發正論又上書規切輔臣方從哲人多悚服出知兖州府預平蓮妖屢遷廣東布政弟朝讓由進士歷江西布政所至有循良聲瞿式耜字起田常熟人禮部侍郎景淳孫湖廣參議汝說子舉萬歷丙辰進士授永豐知縣有惠政調江寧永豐民乞留命再任崇禎初擢户科給事中矯矯立風節所建白多當帝意搏擊權豪人皆憚之尋以枚卜事牽連謫官復起應天府丞歷廣西巡撫姚希孟字孟長吳縣人舉萬歷己未進士選入翰林希孟力持清議以剛直稱天啓中希孟以母喪歸旋被論削籍崇禎初起左贊善時輔臣定逆案多所咨决歷遷詹事在講筵四年頻有獻納為溫體仁所忌出掌南院尋移疾歸卒諡文毅子宗典字文初崇禎壬午舉人名行甚著孫田修字德中康熙辛酉舉人通州學正顧宗孟字巖叟長洲人萬歷己未進士知定海縣㑹有調援之役定兵怒其帥婪侵鼓噪宗孟至武場諭以大義得解散擢御史遇事敢言權要側目乞飬歸與文震孟姚希孟稱吳中三孟顧錫疇字九疇崑山人萬歷己未進士改庶吉士授檢討天啓中魏忠賢勢大熾以錫疇典試福建程策中有譏刺語遂削籍崇禎初召復原官歷禮部左侍郎條列用人五失五善及耗財諸弊帝善之因與楊嗣昌忤為所搆落職歸復起南京禮部左侍郎進尚書文震孟字文起吳縣人待詔徵明曾孫弱冠舉於鄉以學行負盛名十赴㑹試至天啓壬戌始舉進士第一授修撰時魏忠賢漸竊柄纍逐大臣震孟上疏規切時政鐫秩調外旋斥為民崇禎初召為侍讀歷少詹事頻有建白讜直益著特拜禮部左侍郎兼東閣大學士甫兩月為溫體仁所搆而罷震孟剛方貞介有古大臣風節卒諡文肅子諸生秉字孫符有高行顧其國字在一吳縣人天啓壬戌進士授永豐知縣靖萑苻革耗羡值歲災祲曲措糧賦民不知困以政最擢御史出巡按陜西茶馬解京馬匹獨踰常額許士柔字仲嘉常熟人天啓壬戌進士選庶吉士歷左庶子侃直負氣節時羣小所輯三朝要典雖燬而改削光宗實録未正士柔抗疏力爭遂與當國者忤出為南國子祭酒尋降尚寶司丞遷少卿卒族子重熙字子洽博雅有史才李模字子木吳縣人天啓乙丑進士授東莞知縣以政最擢御史慷慨論時事有慎獄詳刑諸疏巡按正定劾奏鎮守中官謫南京國子監典籍其後濳居著書以壽終朱天麟字遊初崑山人崇禎戊辰進士授饒州推官凡攝六篆皆以廉惠得人心並建祠祀之戊寅考選以條對兵食稱㫖擢編修甲午正月奉差出都中塗聞京師陷一慟幾絶蔣燦字韜仲長洲人父育馨由鄉榜知清流縣有惠政燦舉崇禎戊辰進士除餘姚知縣捍禦蔡城獲全歷官樞曹出備兵天津作三臺為捍蔽保全南浙糧運長蘆鹽課歸里後遭母喪哭泣過哀兩目喪明人稱其孝趙士春字景之常熟人吏部待郎用賢孫叙州知府隆美子崇禎丁丑第三人及第授編修樞輔楊嗣昌奪情士春抗疏劾之末言臣祖用賢當神宗初輔臣張居正蔑倫起復臣祖慷慨建言幾斃杖下臘其敗肉以示子孫臣不敢背家學而忘先訓疏入謫福建布政司檢校後復原官終左中允蔣棻字畹仙常熟人崇禎丁丑進士除南海知縣弭盜鋤奸豪猾屛跡調建安時多盜警棻濬城隍募鄉勇得勝兵數百屹若雄鎮撫臣舉通省亷幹第一以禮部主事歸里盛王贊字子裁長洲人崇禎丁丑進士授蘭溪知縣以清惠稱舉卓異第一以忤巡按被糾崇禎素知王贊名嘗對輔臣稱其強項後補東陽甫七日以內艱歸遂隱居陽城為村孰師屋旁有田二畝卒之日囑其子曰此吾祖宗所遺也國朝金之俊字彥章吳縣人萬歷己未進士授中書舍人屢擢兵部添注右侍郎皇朝順治元年仍授以兵部右侍郎歷祕書院大學士加太傅康熙元年豫告歸里卒諡文通之俊受知世祖恩禮優渥有清勤端慎之褒疏陳江浙白糧民運之纍得改官運民至今賴之顧豫咸字小阮長洲人順治丁亥進士授寧晉知縣畿南多盜廉其魁數人捕弗誅厚衣食之為耳目盜悉驚散縣地多不耕上官徵賦如故力爭乃免又平賦役而豪家不得匿田以纍貧弱調知浙之山隂兩舉卓異擢刑部主事歷吏部考功員外郎時當掌計遽移疾歸適郡有大獄株纍逮繫昭雪後居鄉風格峻整為後進所憚孫魯字孝若常熟人明廣東布政朝肅子順治壬辰進士授衢州推官西安有重獄久未决魯廉察得實論如法其餘多所平反逺近翕然稱神明歷大同知府地近邉而俗朴魯興禮教設義學弦誦相聞宿習丕變王師征吳逆調發旁午魯挽粟飛芻士獲宿飽以母老乞終養歸宋德宜字右之長洲人明御史學朱子順治乙未進士選庶吉士授編修屢遷左都御史請弛海禁以資濱海居民生計嚴糾大帥之馭軍無法者歷吏部尚書杜絶請托清釐銓法進文華殿大學士德宜風度端凝贊理機政尤稱慎密卒於官諡文恪子駿業字聲求康熙乙卯副榜歷官兵部右侍郎大業字彥功康熙乙丑進士仕至內閣學士徐元文字公肅崑山人順治己亥殿試第一人授修撰屢遷國子祭酒訓士嚴肅歷左都御史整飭紀綱澄肅吏治屢陳時政多見採納以事鐫秩解任復原官洊陟刑户二部尚書進文華殿大學士兼掌翰林院事輔臣綰院篆異數也罷歸舟過臨清𣙜使檢視囊槖衣裝之外唯圖書千卷人服其清子樹本字道積康熙丁丑進士官編修許定升字升年長洲人順治甲午副榜授禹城知縣决斷明敏俗多投繯赴井以中怨家定升覽牒立察其虛實受事三年止定真命兩案又捕治豪蠧不少貸治聲大著引疾歸里力行善事與同志積粟賑饑復倡設育嬰堂鄉里稱之陸在新字蔚文長洲人康熙丙午舉人除松江教授舉卓異擢廬陵知縣清操特著每晨拜誦戒石四針乃視事建二亭縣門榜曰問苦息事每置投牒者於中令諦思之多自悔求息者不息乃詳訊之曲直立判嘗裹糧詣鄉朂民孝悌力田藹如家人暇則與諸生講德論文士習益醇邑大治卒於官民罷市巷哭吳一蜚字翼生長洲人康熙丁未進士授山西山隂知縣歲屢不登一蜚頻請緩征蠲賦賑粟平糶又連决疑獄人頌為神補洪雅縣蜀中自遭明季寇亂後征稅不及原額十一時撫臣以承平日久民稠土闢欲復賦額之舊一蜚力爭得減入為工部主事擢御史纍官刑部尚書轉吏部在職皆以廉慎稱卒於位貧無以殮藉朝士賻始克庀喪事蔣伊字謂公常熟人明禮部主事棻子康熙癸丑進士選庶吉士改御史有陳六部積習及請減白糧之價諸奏彈劾大吏無所撓避又集民間疾苦繪十二圖以獻聖祖披覽嘉納出為參議督糧廣東多所興除遷河南提學副使以實行移士習公明稱第一卒於官先是閩逆之變禁兵駐蘇城以供調遣人皆惴恐伊疏言內地不必防禦以身家力保無他虞得撤回郡人德之歸允肅字孝儀常熟人明刑部主事起先子康熙己未殿試第一人授修撰辛酉典試京闈所拔皆寒畯刑部尚書魏象樞昌言於朝慶其得人歷官少詹事與議政事持正不阿以疾告歸居鄉有清望陶元淳字子師常熟人康熙戊辰進士授廣東昌化知縣作浮糧考魚鱗册㑹稽經費録區分縣事如家事為民請命與上官往復千言動以至誠海外武辨驕橫盡發其奸狀將吏斂戢時行村落問民疾苦行不坐乘暑不張蓋以勞卒官邑人尸祝張孝時字嘉錫吳縣人康熙辛未進士選庶吉士改欒城知縣濬洨沙諸河故道延袤四十餘里列植榆栁以固隄防邑之水患遂息在官二載政績特著以巡撫薦及九卿保舉擢寧州知州撫綏疲瘠民日休息又疏濬州西天池資民灌溉連歲大稔以疾乞休未就道而卒嚴虞惇字寶成常熟人明信陽知州栻孫康熙丁丑殿試第二人授編修左遷大理寺副時通倉盜米案有欲以私怨鍛入人罪者因虞惇力持不可而止又有內務府殺人移獄事虞惇先上書本寺少卿邵觀歷指疑狀又出不意執其人訊之遂吐實獄始定纍遷太僕少卿典試楚蜀皆稱得人平日淹貫經史著述俱行世蔣廷錫字揚孫康熙己卯舉北闈癸未欽賜進士選庶吉士明年即授編修才名冠史館屢擢內閣學士雍正元年遷禮部侍郎歷户部尚書勾稽周密諸曹宿弊釐剔無遺六年進文華殿大華士仍兼理户部事廷錫品粹才優蒞事精敏仰贊機務悉協宸衷特加太子太傅給一等阿達哈哈畨世職九年七月卒於位諡文肅蔣杲字子遵長洲人明副使燦四世孫康熙癸巳進士歷户部郎中廉敏勤慎為諸曹最出知廉州府寬厚持大體而剖决明鋭廷無滯訟上官皆重其才守輒檄攝鄰郡事所蒞俱有聲以罣誤罷用薦監修海寧海神廟工埀竣而卒杲文學博贍兼長吏事未竟其用人多惜之江南通志卷一百四十欽定四庫全書
