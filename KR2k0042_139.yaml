body:
  text: 江南通志卷一百四十人物志宦績二蘇州一府蘇州府漢朱買臣字翁子吳人家貧好讀書嘗刈薪樵賣以給食隨上計吏至長安邑子嚴助方貴幸薦之召見說春秋楚辭武帝甚悅之拜中大夫時東越數反覆拜買臣㑹稽太守到郡治樓船備糧食水戰具與橫海將軍韓說等俱擊破東越有功徵入為主爵都尉子山拊官至右扶風三國顧卲字孝則吳人丞相雍子少與舅陸績齊名孫權妻以兄女為豫章太守舉善以教風化大行平日留心下士世稱知人子談字子默赤烏中為左節度每省簿書未嘗下籌屈指心計盡發疑謬代薛綜為選曹尚書及祖父雍卒數月代雍平尚書事張溫字慧恕吳人父允以輕財重士名顯州郡為孫權東曹掾卒溫少修節操權問公卿曰溫當今誰比顧雍曰溫今無輩徵拜議郎選曹尚書以輔義中郎將使蜀蜀甚貴其才權嫌溫聲名太盛以引暨艷事斥還本郡卒溫二弟祗白亦有才名晉吾彥字士則吳人出自寒微有文武才初以小將事陸抗抗竒其勇略擢用之遷建平太守時王濬將伐吳造船於蜀彥覺之輒為鐵鎖橫斷江路晉師攻之不能克乃退舍禮之吳亡始歸晉為交州刺史二十餘年威恩宣著南州寧靖顧榮字彥先吳人雍孫宜都太守裕子榮弱冠仕吳吳平與陸機兄弟同入洛時號三俊歷官成都王潁從事中郎避亂還吳值陳敏反假榮右將軍丹陽內史榮起兵攻敏敏率萬餘人出榮以羽扇揮之皆潰元帝鎮江東以榮為軍司加散騎常侍禮遇甚重謀畫皆咨焉卒諡曰元顧和字君孝榮族子幼有清操王導嘗謂和曰卿不獨東南之美實為海內之俊導為揚州請為别駕纍遷中丞僕射居任多所獻納雖權臣不茍阿撓拜尚書令卒諡曰穆南北朝宋顧覬之字偉仁吳人令山隂理繁以約縣用無事歷湘州刺史善於涖民治甚有績纍官吏部尚書出為吳郡太守時戴法興權傾人主覬之未嘗降意心迹清全嘗以其意命弟子願著定命論泰始三年加左將軍散騎常侍復為湘州刺史卒諡曰簡子陸徽字休猷吳人為建康令清平無私除廣州刺史士庶愛詠歷都督寧益二州諸軍事益州刺史威惠兼著卒於官家無餘財文帝惜之諡曰簡子張裕字茂度吳人初為何無忌參軍纍遷揚州别駕武帝伐劉毅關洛皆居守留任州事出為廣州刺史綏靖百越嶺外安之元嘉中除㑹稽太守職事甚理尋卒官諡恭子子演鏡永辨岱俱知名時謂之張氏五龍張邵字茂宗裕弟歷太尉參軍武帝以卲勤練憂公補揚州主簿邵悉心政事精力絶人以佐命功封臨沮伯除湘州刺史轉雍州至襄陽築圍立堰創田數千頃公私充給後為吳興太守卒諡曰簡張暢字少微邵兄郎中令禕子孝武鎮彭城暢為長史元嘉中魏太武南侵江夏王義恭統諸軍出鎮彭城魏師已逼義恭欲棄鎮南歸僚佐或議欲直趨歷城或欲席卷奔鬱洲自海道還都惟暢力持不可輕動孝武曰張長史言不可易也義恭乃止暢登城與魏尚書李孝伯往復千言吐屬如流音韻詳雅風儀華潤魏人相視歎息魏師攻彭城南門暢躬自前戰身先士卒魏太武遂北還歷侍中㑹稽太守卒諡曰宣顧琛字𢎞瑋和曾孫謹確不尚浮華孝建初為吳郡太守以起義功封永新侯竟陵王誕據廣陵遣陸延稔齎書授琛及二子寶素寶先官琛執延稔斬之遣二子送其首世祖嘉之終員外常侍中散大夫齊張岱字景山裕少子州辟從事歷三府咨議與典籖主帥其事事舉而情得嘗言我為政端平待物以禮悔吝之事無由而及元徽中為益州刺史數年益土安其政遷侍中吏部尚書齊武帝時為吳興太守更以寬恕著名卒諡貞子顧憲之字士思覬之孫性清直宋元徽中為建康令甚得人和都下飲㫖酒輒稱為顧建康謂其清且醇也仕齊為衡陽內史刺史王奐嘆曰顧衡陽之化至矣若九郡率然吾將何事永元初為豫章太守憲之雖纍經宰郡資無儋石及歸環堵不免飢寒陸慧曉字叔明吳人清介正立齊武帝為子廬陵王擇天下第一人為行事乃使慧曉為長史行南豫州事帝問何以輔持廬陵慧曉以靜儉對凡歷輔五政治身清肅遇僚佐必以禮終南兖州刺史三子任僚倕並有美名時謂之三陸梁陸杲字明霞徽孫少好學與舅張融齊名梁天監中位御史中丞婞直無所顧望嘗以公事彈領軍將軍張稷杲從舅也出為義興太守以寬惠稱卒諡簡子張充字延符吳人國子祭酒緒子仕齊歷義興太守為政清靜入梁為吏部尚書居選以平允稱終吳郡太守諡穆子唐陸元方字希仲吳人陳黃門侍郎琛曾孫舉八科皆中武后時纍官鸞臺侍郎同平章事嘗以薦引親黨免官令白衣領職元方薦人如初曰舉臣所知不暇問仇黨尋復相元方素清慎后每進退羣臣必先訪問外祕莫知臨終悉焚其奏稿陸象先元方子舉制科高第景雲中歷遷中書侍郎同中書門下性恬靜寡欲議論高簡為時所推不附太平公主𤣥宗曰歲寒然後知松柏之後凋罷為劒南按察使為政尚仁恕卒諡文貞始象先名景初睿宗曰子能紹先德是謂象賢者乃賜名弟景倩景融景倩為扶溝丞按察使覆州縣殿最以景倩為真清終監察御史景融亦知名歸崇敬字正禮吳人擢明經遭父喪以孝聞天寶中舉博通墳典科第一歷主客員外郎代宗幸陜召問得失極陳生民疲敝當以儉化天下大歷中奉使新羅及還囊槖惟衾衣海外傳其清德後以兵部尚書致仕卒諡曰宣歸登字冲之崇敬子事繼母篤孝舉孝亷又策賢良貞元初為右拾遺裴延齡得幸右補闕熊執易疏論之以示登登曰願竄吾名雷霆之下君難獨處同列有所諫正輒聯署無所回諱憲宗問政所先登知帝睿而果於斷勸順納諫諍內外傳為讜言纍遷工部尚書卒諡曰憲子融字章之開成初拜御史中丞湖南觀察使盧周仁違詔進羡錢巨萬融劾之請以所進代貧民租終兵部尚書陸璪字仲采吳人太子詹事餘慶子舉明經仕以清幹稱歷洛陽令摧勒姦豪人不敢犯纍遷西河太守從子長源字泳之有清譽頁元中由汝州刺史徙宣武行軍司馬去汝日送車二乘曰吾祖罷魏州有車一乘而圖書半之吾愧不及先人云顧少連字夷仲吳人父望有隱德少連擢第後又舉書判拔萃德宗朝纍遷翰林學士中書舍人以謹密稱歷吏部侍郎嫉裴延齡之姦嘗與㑹飲挺笏欲擊之㑹解而止改京兆尹政尚寬簡遷吏部尚書徙兵部東都留守表禁苑及汝州間田募耕以便民卒諡曰敬沈傳師字子言吳人禮部員外郎既濟子貞元末舉進士纍拜尚書右丞湖南江西觀察使徙宣州傳師吏治嚴明人不敢罔所蒞以亷靜聞入為吏部侍郎太和初卒性冲粹無競更二鎮無書賄入權家及殁鬻宅以葬子詢字誠之咸通中歷昭義節度使政尚簡易人皆便安陸亘字景山吳人元和初策制科中第補萬年丞纍遷太常少卿歷兖蔡虢蘇四州刺史浙東觀察使徙宣歙亘文明嚴重所至以善政稱宋謝濤字濟之其先富陽人父崇禮為中吳軍節度推官始家於蘇濤祥符八年登第為梓州判官李順反成都有守禦功纍遷著作郎通判壽州知興國軍以治行選擢太常博士歷侍御史知雜事清靜端介終太子賓客鄭戩字天休吳人天聖三年進士以右正言知制誥訓詞深雅知開封府政有能迹歷拜樞密副使出知杭州浚治西湖民賴其利代范仲淹為陜西四路都總管兼經略安撫招討使夏人懾服纍遷奉國軍節度使卒諡文肅孫時舉進士改秩知當塗縣以寬厚稱葉清臣字道卿長洲人天聖二年舉進士甲科景祐中直史館京師地震疏請詳延忠直敢言之士由是以言獲譴范仲淹余靖等皆得遷徙出為兩浙運使疏水利民歷知永興軍浚三白渠溉田踰六千頃以侍讀學士知河陽卒清臣為人爽邁遇事敢言數陳世務皆可施行范師道字貫之吳人參知政事仲淹從子父琪字希世以進士仕至郎官師道舉天聖甲科擢侍御史纍遷三司副史直龍圖閣知福州明州居官厲風操有聞即言請罷內降恩澤又言諸閣多遷擢恐內寵因緣以害政又請士大夫終葬始得從仕擇知典故近臣以任禮樂之官凡奏議二十卷皆經國大務嘗為唐詩史著君臣治忽之迹藏之祕閣子世京世亮皆進士世京居父喪以孝聞以著作郎知海鹽縣終祕書丞程師孟字公闢吳人景祐初舉進士甲科纍遷提㸃䕫路刑獄歲凶以常平粟賑民不足即矯發他儲不俟報全活四十餘萬歷知楚遂洪福廣越青州為政簡而嚴發隱摘伏如神所部肅然徐師閔字聖徒其先建安人父奭官蘇遂為郡人熙寧末自司農少卿出知袁州修武備嚴號令劇賊詹遇不敢犯境為治鎮靜有惠愛吏民生為立祠子鑄字元鈞年少入官有能名所至課嘗居最政和初提舉兩浙常平修松江石堤闢常熟水田歷知杭廣揚三州范純禮字彞叟仲淹第三子以父䕃為祕書省正字元祐中纍遷給事中凡所封駁正名分紀綱皆國體之大者徽宗立知開封府丞前尹深刻之後一切以寬濟之歷拜尚書右丞疏言今朝廷議論之臣皆是元豐而非元祐豈恤國事直以快私憤而售其奸不可不察純禮沉毅剛正以左朝議大夫奉祠卒紹興初追諡忠獻范純粹字德孺純禮弟以䕃歷京東轉運使盡革前使吳居厚苛政時蘇軾自登州召還純粹與同建募役之議軾服其精詳復代兄純仁知慶州修明戰守救援舊制及夏人侵涇原純粹遣將疾馳赴援擊退其軍入為户部侍郎以徽猷閣待制致仕卒純粹沉毅有幹略為帥恩威兼用邉人畏服鄭景平字希尹郡人熙寧三年與父伸同登第為人剛正不詭隨蒞官有亷聲請老後復起知饒州未久即歸時朱勔用事士大夫多俯節從之獨景平終始不見李彌遜字似之吳人父撰字子約以進士仕至朝議大夫介特有守彌遜登第纍遷起居郎以封事剴切謫官靖康二年以江東運判平建康牙校周德之亂紹興中復為起居郎論事如初試户部侍郎秦檜主和議彌遜切諫檜以政府虛員動之爭愈力乞歸卒朝廷思其忠節詔復敷文閣待制李彌大字似矩彌遜弟崇寧中登第靖康初自刑部尚書詔除河東宣撫副使俄罷知陜州河東偏將李彥仙來謁彌大壯之留戌殽澠間以遏敵後彥仙果奏捷於陜彌大尋帥衆赴大元帥府紹興中歷官工部尚書葉夢得字少藴吳人少嗜學登進士第纍官翰林學士知潁昌府李彥括公田以黠吏告訐籍舞陽民田數千頃夢得上其事捕吏治之民大悅紹興八年除江東安撫制置大使金兵至拓臯夢得據守江津使不得渡而去兼總四路漕計給諸大將餉軍用既足皆力戰退敵移福建安撫使殄平海寇拜崇信軍節度使致仕卒徐林字稚山蘇人少有特操中進士第與王黼有連不肻附麗紹興中以趙鼎薦歷太府少卿忤秦檜出為江西轉運副使又以劾檜親黨謫居興化隆興初為吏部侍郎以論事不合奉祠歸湯思退薦為給事中纍辭不赴終龍圖閣學士子蕆字子禮舉進士乾道初知江隂軍興水利有治績歷官提舉浙東常平王葆字彥光崑山人弱冠通諸經舉宣和六年進士紹興中纍遷考功御史秦檜專政百司莫敢可否事葆獨伸滯直枉當官不避出知廣德軍移守漢瀘二州皆著政績歷浙東提刑丐祠歸葆學行深醇尤精鑒裁每賞識士於未遇時後多為名臣范成大字致能吳人登紹興進士第乾道中官禮部員外郎兼崇政殿說書以文學材氣為上所知及奉使金國力正受書之禮詞氣慷慨不辱命上知其忠徑益有意大用除中書舍人奏繳張說除簽書之命纍遷參知政事卒諡文穆成大歷鎮靜江成都建康興利除害去思遺愛所在歌舞為文贍麗清逸尤工於詩胡元質字長文長洲人父珣以行義著元質舉進士光宗時歷遷給事中嘗論人主言動不可不謹至纍百言帝書之座右恩眷特厚紹熙中除四川制置使知成都奏減蜀鹽虛額錢五萬餘貫又奏沿邉諸州軍事皆切中要害卒諡獻惠黃由字子由長洲人淳熙八年廷對論內侍甘升與曾覿王抃相結招權納賄擢第一吳自設科來由始冠多士纍遷將作監嘉王府贊讀紹熙五年孝宗疾光宗不能問安人情疑懼由請嘉王過重華宫問安孝宗為之感動慶元初有請斥僞學之黨者由執奏不可終刑部尚書衛涇字清叔崑山人淳熙十一年舉進士第一纍遷著作郎紹熙二年正月震雷電大雪繼作涇言皆隂勝陽之證意指李后及諸佞幸慶元間論壽皇孝飬禮曠宜積誠意以得太上歡心嘗請誅韓托胄論罷陳自強歷拜參知政事卒諡文節涇歷事三朝出入內外憂國忘家始終如一冷世光字賓王常熟人與弟世修世南同入太學時稱三冷舉紹興進士淳熙中歷遷殿中侍御史條奏忠切彈劾無所避人謂之冷面御史世修字良器與兄同登第仕至朝奉大夫王介字元石郡人由進士授昭慶軍簽判光宗時入為學官疏請駕覲重華宫寧宗即位韓托胄用御筆罷諫官介力攻之開禧中為尚書度支郎首陳用兵之禍後纍遷中書舍人㑹不雨請冊免宰相史彌逺歷知慶元府卒諡忠簡介初學於吕祖謙故文學有原委子野字子文工詩書效歐陽詢以父䕃補官復登第歷僉書樞密院事以不阿丁大全罷歸麋溧字子長蘇人左司郎中師旦子以父郊恩授如臯尉復舉慶元進士嘉定末纍遷監察御史理宗即位除右正言立朝剛正先後封事彈章數十上人稱其有仁者之勇大臣之節以祕閣修撰致仕子􅠐字伯升由進士歷知安慶府弇字仲昭以䕃官提舉江西常平並有治績李韶字元善彌遜曾孫父文饒台州司理參軍多隂德韶嘉定中與兄寧同舉進士纍遷右正言疏請起魏了翁以台輔再疏劾內侍陳洵益女冠吳知古帝怒韶還笏乞歸不獲復乞外由起居舍人出知漳州號稱亷平嘉熙間召赴闕論事復數十上擢翰林學士奉祠歸卒韶平粹簡淡門無雜賓元干文傳字壽道吳人登延祐進士乙科授同知昌國州事州居海島民多頑獷文傳柔以恩信俗為大變歷遷烏程長洲縣尹婺源吳江知州皆有善政擢集賢待制與修宋史供職勤恪三史成以禮部尚書致仕明滕德懋字思勉吳縣人元季辟帥府參謀討方國珍及國珍降留撫台州台人德之太祖徵授中書行省掾歷官户部尚書德懋才辨豪爽器量𢎞偉長於奏疏盧熙字公暨崑山人兖州知府熊弟博學工書洪武初以薦授睢州同知尋行知府事御史奉詔清軍欲按舊籍勾民充伍熙止以常𨽻尺籍數人畀之御史怒熙曰州軍籍止此迫之民且散竟不能奪後卒官吏民挽哭者千餘子充􅜶有學行嘗以能書薦云俞貞木字有立長洲人名儒琰孫洪武初以薦知樂昌縣改都昌以禮化民清節尤著門人吳縣袁政字文理永樂中由薦授湘隂典史有政績夏原吉薦其才遷知遂安縣吕昭字克明崑山人洪武中以薦授徐州訓導改浦城縣丞永樂中以治行遷知沁州赴任過徐天寒尚未挾纊故所授經弟子共買裘衣之子旦既舉進士昭遺書勵以清節後旦仕終建昌推官亦稱亷吏時同縣有三亷宦之目謂昭及漢陽知府章亷中府都事朱顯也王英字俊伯崑山人洪武初由太學選授御史以身許國上特命署都御史事大書敦厚王英四字揭諸殿柱永樂初歷陜西按察使以簡靜稱又吳縣張朂字勉夫永樂丁酉舉人官御史言事激切終廣西僉事陳祚字永錫吳縣人永樂己丑進士官河南參議以言事謫佃太和宣德初擢御史疏請頻御經筵講說大學衍義或摘其語激上怒逮繫詔獄正統初復官出按湖廣歷福建僉事致仕𤣥孫鏐字子兼嘉靖戊戌進士歷河南副使峻却屬吏餽鍰轉雲南釋武定亂民之脅從者陳鎰字有戒吳縣人永樂壬辰進士宣德末纍遷右副都御史鎮守陜西正統六年代還尋仍出鎮進右都御史十年入理院事進左都御史景泰二年陜西旱饑朝廷從陜人請復遣鎰蒞鎮軍民大悅鎰寬厚清慎先後在陜十餘年陜人愛戴呼為黑髯慈父家繪其像事之如神還朝踰年致仕卒諡僖敏裔孫太學生震有學行諸生世治工文翰並知名於時劉璉字廷璉崑山人永樂壬辰進士洪熙初歷官參贊宣府軍務宣德中兼督邊儲尋以户部侍郎兼巡撫纍降敕褒奬景泰初卒官璉公勤亷慎久鎮邊陲聲績甚偉俞士悅字士朝長洲人永樂甲辰進士自湖廣副使遷浙江參政所蒞著丰采又城泎澉二浦以備倭正統己巳都城戒嚴士悅以右都御史督軍分守晝夜籌畫不釋甲胄事平進刑部尚書後謫戌赦還復官魚侃字希直常熟人永樂甲辰進士以刑部郎督漕清河置卒撩淺運道無滯知開封府斷决明允日進嵩菜脫粟人比之包孝肅同縣錢昕正統己丑進士歷湖廣布政清節與侃齊名虞祥字仲貞崑山人永樂中舉人授金華府學訓導歷兵部侍郎卒為人謹飭達大體自教官入諫垣及以大臣巡視畿甸所在著聲孫臣纍官四川參議清慎有家風范希正字以貞吳縣人宣德三年舉賢良方正授曹縣知縣為奸吏所誣坐逮曹民八百餘人詣京白希正亷能被誣帝釋之使還縣正統十年山東饑惟曹以希正先積粟得無患大理寺丞張驥賑山東聞之因請升曹縣為州而以希正為知州從之希正治曹二十二年得民最久徐有貞字元武初名珵字元玊吳縣人宣德癸丑進士選庶吉士歷諭德始奏改名景泰四年河决張秋擢僉都御史往治之建置水門開支河濬運河三策功成人稱其才遷左副都御史天順改元以迎復功進華蓋殿大學士封武功伯尋謫戍金齒後放歸卒有貞博學多能詩文皆偉麗練綱字從道長洲人祖則成為御史有聲綱領宣德乙卯鄉薦正統己巳之變上中興八策以薦擢御史按淮陽鹽政駙馬都尉趙輝侵利劾奏之又糾吏部尚書何文淵侍郎項文曜典選不公人多其侃直有練綱口之號後按福建與監司互訐謫判邠州卒仰瞻字宗泰長洲人正統間由貢纍官大理丞時王振用事百官多奔走其門獨瞻與大理卿薛瑄不往尋以辨寃獄事忤振謫戍大同振敗復起執法愈堅終大理少卿龔理字彥文崑山人正統丙辰進士官工部郎以亷幹聞㑹河决張秋廷議推理佐徐有貞治之景帝曰是不要錢龔郎中乎遂擢山東左布政督河工理置八閘作九堰築大洪口甚著勞績後以疾歸行李蕭然清節益著顧字明德吳縣人進士㢲子正統丙辰進士以御史理長蘆鹺政盡革宿弊復按山東自監司以下諸吏有不職者皆劾退之不少狥都御史王文以得巡方體移文諸御史當以為法後平贛州長河洞巨盜張和字節之崑山人正統己未進士授南京刑部主事歷浙江提學副使儀範肅然待諸生有恩義殁後浙士數百人賻哭哀之如父張穆字敬之崑山人宣德乙卯舉人以兄和未預鄉薦不赴公車及正統戊午和亦舉於鄉己未同登進士授工部主事歷擢山東副使表伯夷閔損孔融狄仁傑墓訪孫復石介之後給以衣廪東土服其風化後自浙江參政歸無以自給門人故吏為買田松江以老焉祝皓字維清長洲人正統己未進士授給事中建白務持大體景泰間歷遷山西參政時邊警屢告公私困竭皓規畫周密倉儲充足汾州有妖人作亂皓已馳獲十六人而妄扳及千人皓欲簡釋三司難之皓竟具實奏聞後罷歸皓吏材精敏兼工詩文朱驥字漢房常熟人正統壬戌進士天順中官御史有風裁時閣臣李賢柄政尚書金濓依附之驥劾濓語并侵賢時人語曰朱驥手練綱口終廣西參議吳淳字厚伯常熟人都御史訥子正統戊辰進士擢御史以清謹聞子堂字子升𢎞治壬戌進士亦官御史抗論宸濠不法監陸完毛鋭軍有殲流寇功孫瓊字藴章崑山人正統戊辰進士天順中歷刑部郎中時錦衣門達羅織人罪法司承望風㫖刑多枉濫惟瓊多所平反太監牛玉假子犯法屬瓊寬之瓊執法不少狥積為權貴所忌謫戍遼東成化初復官致仕葉文莊盛嘗云鄉里作官前輩當法吳丈後輩當法藴章吳丈謂吳凱也字相虞宣德中官部曹有治劇才家居四十年以禮自律風儀嚴峻葉盛字與中崑山人正統乙丑進士授兵科給事中土木之變盛疏請先正扈從失律諸將罪及寇迫都城三日間章奏七上皆中機宜寇退進都給事中出安集陳州流民還奏畿輔旱蝗請加寬恤以才擢山西右參政協贊大帥軍務復獨石等四城大興屯田擲戍卒之不任戰者給牛種耕之軍用以給天順二年巡撫兩廣屢破賊寨移鎮宣府修復屯堡七百餘所邉塞益寧入為吏部左侍郎卒諡文莊章格字韶鳯常熟人父圭字孟瑞正統中官御史有直聲格舉景泰辛未進士歷廣東按察副使巡視海道時琉球使臣以貨轉販他境遭風漂至香山守臣欲盡戮之以為功格為奏辨還其資而遣之遷雲南按察使撫綏得宜邉徼畏服終大理寺卿弟律字鳴鳯由進士歷廣西布政平荔浦獞賊終南副都御史陸昶字孟昭常熟人工詩文景泰辛未進士歷福建參政先通畨商舶肆掠海上莫能捕治昶練兵發艦迹其所在悉擒戮之海濱獲安其他築隄防實倉庾除宿蠧具有方略閩人德之盛昶字允高吳江人景泰辛未進士授御史清山東馬政奏蠲被災逋賦復按廣東單騎諭降瀧水諸賊後以言事謫古田典史遷知羅江縣教民鑿池一千二百餘所自是旱不為害終叙州知府程宗字文伊常熟人景泰辛未進士知吉安府吉安素多舞文奸胥宗手自裁牒書之奸無所容纍擢副都御史巡撫陜西率兵擊退洮州西畨潘松諸寇又奉璽書宣諭木邦孟密爭地仇殺二酋皆俯聽約束而西南無事詔褒其績以南工部尚書致仕尤淳字公厚長洲人參議安禮孫景泰癸酉舉人知鉛山縣調永年雪寃獄以亷慎稱淨慧寺僧戕人惑衆捕置之法燔其寺後以抗直去官子樾字宗陽正德戊辰進士歷太僕寺卿人稱其才守族人錫類字孝徵萬歷庚辰進士知真定府著亷直聲後預平播功終雲南布政劉瀚字約之長洲人天順丁丑進士歷大理知府鋤強綏弱民安其政即遷按察使精法比持憲體尋致仕歸同縣張翥字汝振與瀚同登第知南昌府理寃獄捕大猾折服中貴之乘傳橫索者仕亦終滇臬陳易字一元常熟人天順壬午舉人除建昌推官雪平民為盜誣引者五十餘人遷黃州府同知冢宰王恕知缺以母老乞歸李傑字世賢常熟人成化丙戌進士入翰林纍官禮部尚書高簡自重為正論所歸上邉務六條時稱碩畫以忤劉瑾致仕為文清醇有法卒諡文安胡琮字文德長洲人成化丙戌進士知江陵遼王不檢束其下多剽掠為民患琮一繩以法始皆斂戢以最擢御史坐言事謫常德同知有大璫自滇還過郡恣索金錢琮引伍伯出聲言欲檢視其槖璫懼即行後乞致仕歸顧福字天錫吳縣人成化丙戌進士歷刑部員外郎勘獄浙江摘發巨贓尋以忤勢要出通判永州請罷牙茶香草之徵纍遷河南參政分司南陽宗藩軍校多不戢福以禮裁斷皆帖然無怨福友於兄弟恤其鄉黨人無間言徐恪字公肅常熟人成化丙戌進士授工科給事中彈劾無所避歷遷右副都御史巡撫河南恪素剛正所至抑豪猾祛奸弊及為巡撫以所部多王府持法尤嚴調撫湖廣吏民罷市泣送數十里不絶屬吏以羡金贐峻却之終南工部右侍郎瞿俊字世用常熟人成化己丑進士除崇仁知縣以最擢御史出按江西刺舉不避權要尤嚴懲墨吏遷廣西按察副使正已率下人多悚服王鼎字元勳常熟人成化己丑進士授南刑部主事有京衛指揮抵重法賂尚書求移獄鼎執不從歷湖廣參議杖殺大猾裁藩府預借祿米遷廣東參政尤著清徑聲褚祚字昌印常熟人成化壬辰進士授臨海知縣約已裕民政為屬邑最以薦擢御史理畿內馬政釐革宿弊殁不能殮同年吳寬為殮之張汝舟字濟民崑山人成化甲午舉人官南昌同知殲巨寇徐九齡時寧藩驕橫汝舟一無所狥藩妃兄為盜捕論如法遷思南府知府治以簡靜聞吳洪字禹疇吳江人孝子璋子成化乙未進士官刑曹能斷疑獄出巡視廣東海道以清節著歷工部左侍郎時劉瑾用事誣劉大夏罪欲殺之洪力辨得解遷南刑部尚書以執法忤瑾勒令致仕子山巖崑吳瑞字德徵崑山人成化乙未進士歷工部郎中督理河道鑿甓社湖左腹河四十餘里得免風濤之險以疾乞歸瑞素邃易學尤長古文詞子蘭𢎞治己未進士官御史徐源字仲山長洲人成化乙未進士歷兵部郎絶權貴請託核正濫冒武功爵𢎞治中巡撫山東歲饑奏行賑濟割臨清倉米八萬餘石抵漕額明年將徵償源奏民賴賑稍蘇而又遽徵與不賑何異詔悉蠲之後致仕歸卒源詩文博雅兼工書法有米氏風吳愈字惟謙崑山人成化乙未進士知叙州府平馬湖土司亂歷河南參政清藩府侵占屯田陳璚字玊汝長洲人成化戊戌進士由庶吉士改兵科給事中論奸僧繼曉罪置之法又封事屢上人咸謂得諫垣體歷大理少卿獄多平反屢遷南左副都御史兼管操江致仕歸卒劉纓字與清吳縣人成化戊戌進士歷知武陵滕縣擢御史出按廣東正豪猾誣陷罪及誅武辨之以捕盜肆虐者尋以劾外戚忤㫖武宗杖而釋之纍擢右僉都御史再撫四川遍巡邊境調度精明威震諸番後以刑部尚書致仕沈林字材美長洲人成化辛丑進士知晉州有異績遷守順慶治行為諸郡甲以雲南參政入賀忤劉瑾落職尋復起歷副都御史巡撫貴州平鎮筸銅仁烏羅諸叛苖改撫山東以疾致仕馮玘字良玊常熟人成化辛丑進士除泌陽知縣捕豪猾撫流民以政最擢御史出按貴州疏請𠞰平都勻叛獠又按浙江治鎮守中貴不法事終福建副使盛洪字思禹崑山人成化甲辰進士歷海道副使捕斬海賊嚴禁通番堅却市舶中官之餽擢山東按察使卒沈杰長洲人成化甲辰進士知歸德州州當黃河衝杰築長堤開白栁等河河水由之入淮民免墊溺歷知衢州府大興水利修復堤閘民得灌溉而城中絶水患終河南布政蔡昻字惟中長洲人通經學尤精法律成化甲辰以諸生貢入南雍尋歷南大理寺有盜發牛首山麓秦檜墓捕得法司議置大辟昻獨建議檜罪通於天今墓被盜發殆天降之罰耳請從末減寺卿韙之昻由是知名以明法除九江府推官多雪寃獄馮琨字君夫崑山人成化丙午舉人𢎞治中官薊州知州以清核牧地草場事忤勳貴誣奏下獄孝宗閲其辨疏特詔復官正德初劉瑾復以前事逮繫琨久乃得釋終登州知府毛埕字貞伯吳縣人成化丁未進士授南工科給事中劾巨璫薄琮罪論死鎮廣安逺侯栁景誣搆廣撫秦紘埕又劾之紘釋而景罷歷南太僕卿宸濠反大司馬喬宇採埕議委督泗潁和陽諸軍為江表聲援進右副都御史致仕𤣥孫堪字公輿萬歷戊戌進士官御史出按雲南疏爭貢金加額事又劾鎮臣驕橫仕至通政使張瑋字嘉玊蘇州衛人成化丁未進士授工部主事分𣙜杭州嚴察奸蠧課贏而不以羡進進郎中督漕河徐州興革必盡民利不為勢撓中貴過其地皆斂戢為劉瑾所陷謫戍遼陽瑾敗釋歸瑋居官素亷晚歲益貧至晨夕不能自給及卒郡邑為賻襚鄉人斂資葬之葉紳字廷縉吳江人成化丁未進士歷禮科給事中𢎞治十年紳請太子早出閣擇講官諭教尋以修省陳八事復專劾中官李廣八大罪未久廣竟得罪紳擢尚寶少卿卒王哲字思德吳江人𢎞治庚戌進士授御史歷按福建廣東江西所至清軍伍理鹽務平劇賊恤民隱作士氣又劾江西鎮守董讓不法事上切責讓自是中官少戢後以僉都御史巡撫江西宸濠憚之旋為所毒乞歸卒從孫有功字可大萬歷癸未進士由遂昌知縣擢御史有清節贈光祿少卿張琮字廷獻吳縣人𢎞治庚戌進士自禮部郎中出為陜西參議劉瑾銜之謫濟寧州知州甫一月擢御史出撫甘肅時置鐇初平人情未定琮廣布恩威邉陲以寧遷湖廣副使白蓮僞教嘯聚千餘琮俘戮渠魁而貸其餘襄地安堵纍擢右副都御史巡撫湖廣平德安襄陽芒部諸妖逆終南京右副都御史盧翊字鳯翀常熟人𢎞治庚戌進士歷御史出按四川兼視水利鑿都江堰連歲大熟撫降天全六畨招討司遷副使守禦松潘更定戍法禁戍長苛斂修鐵索橋及葺治棧閣以通道行者便之土人名盧崖閣進雲南參政建策築堡於姚安界中擇將屯守以絶生熟彞之入寇又洱海地素苦旱為開陂儲水築壩障泉而田得灌溉人食其利以薦擢廣西布政卒毛澄字憲清崑山人𢎞治癸丑廷對第一授修撰正德中歷遷禮部尚書屢進讜言世宗由興邸即位以澄迎立功加官䕃堅辭不受大禮議起澄力持尊無二統之議帝不從澄苦爭不得遂引疾歸卒諡文簡澄歷事三朝論事侃直不少媕阿有古大臣風節同縣張羽由進士官刑部郎以議大禮忤㫖廷杖削籍吳一鵬字南夫長洲人𢎞治癸丑進士選庶吉士歷侍講忤劉瑾出為南京部曹瑾誅復故官嘉靖初纍拜禮部左侍郎力爭大禮疏論興獻帝不當建廟京師又力糾給事中陳洸附㑹議禮之罪俱不從後以南吏部尚書致仕卒諡文端盛應期字斯徵吳江人𢎞治癸丑進士授工部主事忤太監李廣遂搆以罪謫安寧驛丞纍遷雲南僉事以裁抑鎮守太監梁裕為所劾逮繫詔獄尋得釋歷右副都御史巡撫四川江西進督兩廣所蒞皆著威惠屢奏平賊功既引疾歸里以河决徐沛特起右都御史往治之應期建議開昭陽湖東百四十餘里為永久計興役垂成為言者所阻而罷楊升字起同吳縣人𢎞治癸丑進士選庶吉士改户科給事中有大臣以罪斥復夤緣再進升疏劾之人憚其徑補禮科核視遼陽邉儲斥不法數人邉塞肅清子伊志嘉靖丙辰進士纍官右副都御史巡撫南贛亦著聲績朱希周字懋忠崑山人父文官御史有直聲希周舉𢎞治丙辰廷試第一人授修撰遷侍讀以忤劉瑾左遷歷禮部侍郎嘉靖初大禮議起希周力持讜論風節挺特纍官南京吏部尚書以考察忤權貴乞致仕家居益廉靜自持卒諡恭靖顧潛字孔昭崑山人𢎞治丙辰進士選庶吉士改御史屢論時政皆見採納又劾光祿少卿祝祥阿附外戚太常卿崔志端左道惑人皆斥去武宗即位疏言嗣服之始當崇敬畏戒佚欲任耆碩逺佞幸時論偉之出督京畿學政為劉瑾黨所搆罷歸周倫字伯明崑山人𢎞治己未進士自新安知縣擢御史正德中勘太監李興伐禁林山木事上嘉其直以忤劉瑾斥歸瑾誅復起出按山西奏築太原南關新城寧武關上堡垜口濠塹邉境永賴嘉靖中纍遷南京刑部尚書卒諡康僖子鳯鳴字于岐正德戊辰進士歷刑兵二部郎中以吏幹稱終大理寺丞周用字行之吳江人𢎞治壬戌進士正德初官南兵科給事中極諫以中㫖斥廷臣且請治鎮守江西中官罪時多其直出為廣東參議預平畨禺盜有功嘉靖中歷南刑部尚書致仕用端亮有節槩人惜其去以薦起工部尚書督河道尋改漕運未上召拜左都御史遷吏部尚書卒諡恭肅陳察字原習常熟人𢎞治壬戌進士正德初由南昌推官擢南御史尋改北劉瑾既誅武宗猶日狎羣小察偕同官極諫出按雲南嘉靖初復按四川先後請罷鎮守中貴又伸救諫臣楊言直聲震朝野歷僉都御史撫南贛旋以忤㫖斥歸弟寰舉進士仕至祭酒正德中以直諫奪俸陸鰲字鎮卿吳江人𢎞治壬戌進士授荆州府推官廉勤明允諸郡多疑獄上官檄鰲往决之擢御史巡山海關疏籌邉三事悉見採納復按河南奪宣武等衛田為勢家所占者六千餘頃給諸貧軍歲增糧四萬石終浙江參政顧鼎臣字九和崑山人𢎞治乙丑廷試第一授修撰嘉靖初以直講受眷歷吏部左侍郎請授曾子後五經博士比三氏子孫從之進禮部尚書京師淫雨四方多水災鼎臣請賑饑弭盜報可尋以本官兼文淵閣大學士卒諡文康鼎臣官侍從時屢陳東南賦役不均之弊世宗特敕撫臣釐定之倡築崑山城後有倭警邑賴以全鄉人立祠祀之孫謙服天啓中田貢除昌化知縣治以嚴辦聞吳山字靜之吳江人尚書洪子正德戊辰進士官刑部郎中抗直不撓權勢力諫武廟南巡忤㫖廷跪五日屢遷河南巡撫劾伊王府宦豎及臨漳王府將軍之為民害者左遷浙江參議後歷撫四川南贛並著聲績終刑部尚書弟巖同榜進士授給事中乾清宫災疏陳數十事語皆切直仕至四川參政子邦貞嘉靖癸丑進士官湖廣按察有撫討土司功終太僕卿曾孫易字日生明季癸未進士以名節著方鳯字時鳴崑山人正德戊辰與兄鵬同舉進士鳯官御史武宗時屢諫巡幸江西副使胡世寧以忤宸濠被逮力救之薦王守仁當不次用世宗初大禮議起鳯力持正論以兄附張桂之議因并劾之旋自劾以謝兄遂免歸初鳯鵬素友愛及鳯罷鵬亦以太常卿告歸兄弟雍穆無間陳逅字良會常熟人正德丁丑進士嘉靖初官御史同官以直諫逮訊逅抗疏申救下獄廷杖謫合浦主簿纍官河南副使帝幸承天坐供具不辦落職後頻薦不起孫國華字珍凡萬歷甲戌進士知東平州擒劇盜决疑獄終廣州知府沈漢字宗海吳江人父奎有孝行漢舉正德辛巳進士授刑科給事中論中官馬俊王堂罪嘉靖改元詔蠲逋稅漢以民間己納者多飽吏槖請已徵未解者作來年正課又興獻帝議加皇號疏陳不可霍韜欲改官制力陳其謬及張寅獄起執法大臣多得罪漢抗章申救廷杖削籍隆慶初贈太常少卿王同祖字繩武崑山人正德辛巳進士選庶吉士授編修嘉靖中以議興獻廟制被斥用薦起歷司業九廟災上言宗廟宜藏主石室引公羊傳及漢儀為證人服其博識子逢年字舜華高才嗜古能世其學朱觀字顒伯崑山人嘉靖癸未進士官御史言事忤㫖廷杖巡按陜西奏築花馬池至橫城堡邉墻百六十餘里永為西陲利終河南布政顧夢圭字武祥崑山人御史濳子嘉靖癸未進士官南吏部郎應詔陳言論六事尤論中官鎮守之害得㫖撤還擢廣東參議乞止海北採珠之役參政福建平連江壽寧松溪諸寇終江西布政子允默有文名同縣陸冕字子端夢圭同榜進士授禮部主事以劾方士陶仲文廷杖謫浮梁驛丞後歷陜西副使陸粲字子餘長洲人嘉靖丙戌進士選庶吉士改工科給事中徑挺敢言時張璁桂蕚擅政粲劾其罪帝悟立斥之尋復用霍韜言召還璁蕚下粲獄謫都鎮驛丞遷永新知縣前後獲盜數百姦猾屏迹以念母乞歸母殁毀甚未終喪而卒粲嗜學博通古今有著述行世秦鰲字子元崑山人嘉靖丙戌進士歷兵科給事中劾魏國公徐鵬舉中官賴義不法狀彗星見劾張孚敬妬賢病國帝遂罷孚敬及孚敬再相汪鋐承風㫖以考察謫鰲東陽縣丞屢遷福建參議卒曹逵字履中常熟人嘉靖己丑進士官御史以糾冢宰汪鋐罪忤㫖廷杖謫蘄水知縣中人從章聖梓宫過境恣索供帳逵令吏民牽板水次己公服前引中人素聞其剛直遽引去周大禮字子和崑山人嘉靖壬辰進士知興化府興木蘭障水之役以備旱潦歷山東登萊道除海壖漁稅嚴訥字敏卿常熟人嘉靖辛丑進士選庶吉士歷侍讀三吳困倭患後歲復大祲有司徵斂益急訥疏請蠲貸帝從之纍遷禮部尚書改吏部慎選曹郎務抑奔競振淹滯又仿先朝三途並用法州縣吏政績異者破格超擢銓政一新尋拜武英殿大學士仍掌銓政以疾告歸卒諡文靖孫栻字子張明季甲戌進士除信陽知州設守嚴密寇不敢犯為督師盧象升所重徐申字周翰崑山人嘉靖中由鄉舉歷刑部主事張延齡繫獄申奏記尚書宜援議貴議親例請於帝以慰昭聖太后心帝震怒盡收繫前後提牢主事申廷杖謫外任不赴官而歸與同里魏校輩嘯咏為樂久之卒王賚汝字以善常熟人嘉靖中由鄉舉授增城知縣地接五嶺素多盜設方略獲斬