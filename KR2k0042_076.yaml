body:
  text: 江南通志卷七十七食貨志漕運一唐都長安而關中號稱沃野然其土地狹所出不足以給京師備水旱故常轉漕東南之粟唐書初江淮漕租米至東都輸含嘉倉以車或䭾陸運至陜而水行來遠多風波覆溺之患其失常十七八故其率一斛得八斗為成勞而陸運至陜才三百里率兩斛計庸錢千民送租者皆有水陸之直而河有三門底柱之險唐書開元十八年宣州刺史裴耀卿朝集京師𤣥宗訪以漕事耀卿條上便宜曰江南戶口多而無征防之役然送租庸調物以嵗二月至揚州入斗門四月以後始渡淮入汴常苦水淺六七月乃至河口而河水方漲須八九月水落始得上河入洛而漕路多梗船檣阻隘江南之人不習河事轉顧河師水手重為勞費其得行日少阻滯日多今漢隋漕路瀕河倉廩遺跡可尋可於河口置武牢倉鞏縣置洛口倉使江南之舟不入黃河黃河之舟不入洛口而河陽柏崖太原永豐渭南諸倉節級轉運水通則舟行水淺則寓於倉以待則舟無停留而物不耗失此甚利也𤣥宗初不省二十一年耀卿為京兆尹京師雨水穀踊貴𤣥宗將幸東都復問耀卿漕事耀卿因請罷陜陸運而置倉河口使江南漕舟至河口者輸粟於倉而去縣官雇舟以分入河洛置倉三門東西漕舟輸其東倉而陸運以輸西倉復以舟漕以避三門之水險𤣥宗以為然乃於河隂置河隂倉河西置柏崖倉三門東置集津倉西置鹽倉鑿山十八里以陸運自江淮漕者皆輸河隂倉自河隂西至太原倉謂之北運自太原倉浮渭以實關中𤣥宗大悅唐書廣德二年廢句當度支使以劉晏顓領東都河南淮西江南東西轉運租庸鑄錢鹽鐡轉輸至上都度支所領諸道租庸觀察使凡漕事亦皆決於晏晏即鹽利顧傭分吏督之隨江汴河渭所宜故時轉運船繇潤州陸運至揚子斗米費錢十九晏命囊米而載以舟減錢十五繇揚州距河隂斗米費錢百二十晏為歇艎支江船二千艘每船受千斛十船為綱每綱三百人篙工五十人自揚州遣將部送至河隂上三門號上門填闕船米斗減錢九十調巴蜀襄漢麻枲竹篠為綯挽舟以朽索腐材代薪物無棄者未十年人人習河險江船不入汴汴船不入河河船不入渭江南之運積揚州汴河之運積河隂河船之運積渭口渭船之運入太倉嵗轉粟百一十萬石無升斗溺者輕貨自揚子至汴州每䭾費錢二千二百減九百嵗省十餘萬緡又分官吏主丹陽湖禁引溉自是河漕不涸唐書宋都大梁有四河以通漕運曰汴河曰黃河曰惠民河曰廣濟河而汴河所漕為多宋史開寶五年率汴蔡兩河公私船運江淮米數十萬石以給兵食宋史先是四河所運未有定制太平興國六年汴河嵗運江淮米三百萬石菽一百萬石黃河粟五十萬石菽三十萬石惠民河粟四十萬石菽二十萬石廣濟河粟十二萬石凡五百五十萬石非水旱蠲放民租未嘗不及其數至道初汴河運米五百八十萬石大中祥符初至七百萬石江南淮南兩浙荆湖路租糴於真揚楚泗州置倉受納分調舟船泝流入汴以達京師置發運使領之宋史江湖上供米舊轉運使以本路綱輸真楚泗州轉般倉載鹽以歸舟還其郡卒還其家汴州詣轉般倉運米輸京師摺運者四河冬涸舟卒亦還營至春復集名曰放凍卒得番休逃亡者少汴船不涉江路無風波沈溺之患後發運使權益重六路上供米團綱發船不復委本路獨專其任文移坌並事目繁夥不能檢察操舟者賕諸吏得詣富饒郡市賤貿貴以趨京師自是江汴之舟混轉無辨挽舟卒有終身不還其家老死河路者籍多空名漕事大弊宋史江淮等路發運副使蔣之竒都水監丞陳祐甫開龜山運河漕運往來免風濤百年沈溺之患詔各遷兩官宋史張根為江南西路轉運副使嵗漕米百二十萬石給中都江南州郡僻遠官吏艱於督趣根嘗存三十萬石為轉運之本以寬諸郡時甚稱之宋史自熙寧以來其法始變嵗運六百萬石給京師外諸倉常有餘蓄州郡告歉則折收上價謂之額斛計本州嵗額以倉儲代輸京師謂之代發復於豐熟以中價收糴穀賤則官糴不至傷農饑歉則納錢民以為便本錢嵗增兵食有餘崇寧初蔡京為相始求羡財以供侈用費所親胡師文為發運使以糴本數百萬緡充貢入為戶部侍郎來者效尤時有進獻而本錢竭矣本錢既竭不能增糴而儲積空矣儲積既空無可代發而輸船之法壞矣宋史天聖中發運使方仲荀奏請度真楚州堰於水閘自是東南雜運直至京師惟六路上供斛斗猶循用轉般法吏卒糜費與在路折閲動以萬數欲將六路上供斛斗並依東南雜運直至京師或南京府界缷納庶免侵盜乞貸之弊自是六路郡縣各認嵗額雖湖南北至遠處亦直抵京師號直達綱豐不加糴歉不代發宋史談稹上言祖宗建立真楚泗州轉般倉一以備中都緩急二以防漕渠阻節三則綱船裝發資次運行更無虛日自其法廢河道日益淺澀遂致中都糧儲不繼淮南三轉般倉不可不復乞自泗州為始次及真楚既有瓦木順流而下不甚勞費俟嵗豐計置儲蓄立法轉般淮南路轉運判官向子談奏轉般之法寓平糴之意江湖有米可糴於真兩浙有米可糴於揚宿亳有麥可糴於泗坐視六路豐歉有不登處則以錢折斛發運司得以斡旋之不獨無嵗額不足之憂因可以寬民力運渠旱乾則有汴口倉今所患者向來糴本嵗五百萬緡支移殆盡宣和五年乃降度牒及香鹽鈔各一百萬貫令呂淙盧宗原均糴斛斗專備轉般宋史靖康元年令東南六路上供額斛除淮南兩浙依舊直達外江湖四路並措置轉般宋史髙宗建炎二年詔二廣湖南北江東西綱運輸送平江府京畿淮南京東西河北陕西及川綱輸送行在又詔二廣湖南北綱運如過兩浙許輸送平江府福建綱運過江東西亦許輸送江寧府三年又詔諸路綱運見錢並糧輸送建康府户部其金銀絹帛並輸送行在宋史紹興初因地之宜以兩浙之粟供行在以江東之粟餉淮東以江西之粟餉淮西荆湖之粟餉鄂嶽荆南宋史元都於燕去江南極遠而百司庶府之繁衛士編民之衆無不仰給於江南自丞相巴延獻海運之言而江南之糧分為春夏二運蓋至於京師者一嵗多至三百萬餘石民無挽輸之勞國有儲蓄之富豈非一代之良法歟元史至元十九年巴延追憶海道載宋圖籍之事以為海運可行於是請於朝廷命上海總管羅璧朱清張瑄等造平底海船六十艘運糧四萬六千餘石從海道至京師然創行海洋沿山求㠗風信失時明年始至直沽時朝廷未知其利元史二十二年增濟州漕三千艘役夫萬二千人初江淮嵗漕米百萬石於京師海運十萬膠萊六十萬石而濟之所運三十萬石水淺舟不能達更以百石之舟運用四人故夫數增多續文獻通考二十四年始立行泉府司專掌海運增置萬戶府二總為四府元史二十八年又用朱清張瑄之請併四府為都漕運萬戶府二止令清瑄二人掌之其屬有千戶百戶等官分為各翼以督嵗運至大間議海運事時江東等處運糧海船從大江逆流而上江水湍急又多石磯走沙漲淺糧船俱壞嵗嵗有之又湖廣江西之糧運至真州泊入海船船大底小亦非江中所宜於是以嘉興松江秋糧並江淮江浙財賦府嵗辦糧充運海漕之利蓋至是溥矣元史初海運之道自平江劉家港入海經揚州路通州海門縣黃連沙頭萬里長灘開洋沿山㠗而行抵淮安路鹽城縣歷西海州海寧府東海縣密州膠州界放靈山洋投東北路多淺沙行月餘始抵成山計其水程自上海至揚村馬頭凡一萬三千三百五十里至元二十九年朱清等言其路險惡復開生道自劉家港開洋至撑腳沙轉沙觜至三沙揚子江過匾擔沙大洪又過萬里長灘放大洋至青水洋又經黑水洋至成山過劉島至芝罘沙門二島放萊州大洋抵界河口其道差為徑直明年千戶殷明略又開新道從劉家港入海至崇明州三沙放洋向東行入黑水大洋取成山轉西至劉家島又至登州沙門島於萊州大洋入界河當舟行風信有時至浙西至京師不過旬日而已視前二道為最便云然風濤不測糧船漂溺者無嵗無之間亦有船壞而棄其米者至元二十三年始責償於運官人船俱溺者乃免然視河漕之費則其所得益多矣元史二十九年開通惠河以郭守敬領都水監初言水利有十一事其一欲道昌平縣白浮村神仙泉過雙塔榆河引一畝玉泉諸水入城匯於積水潭從東折而南入舊河每十里置一閘以時蓄泄帝稱善復置都水監命守敬領之丞相以下皆親操畚鍤為之倡置閘之處往往於地中得舊時磚木人服其識逾年畢工自是免都民陸挽之勞上悅賜名曰通惠續文獻通考至治三年江浙行省言鎮江運河全藉練河之水為上源漕運商販舟楫無不由此以供億前朝嘗濬此湖瀦畜潦水若運河水淺開放練河一寸可添河水一尺近年淤淺以致遞運不通乞加修治制可工畢又置湖兵百人專任修理續文獻通考至正十五年江浙省臣乞減海運以蘇民困戶部定擬本年稅糧除免征外其寺觀並撥賜田糧十月開倉盡行拘收其不敷糧撥至元折中統鈔一百五十萬錠於産米處糴一百五十萬石貯瀕河之地以聽撥運從之續文獻通考明初海運因元之故海運不給於是陸運以濟之及㑹通河既浚於是有儹運而海運乃罷遮洋海運猶不廢焉然儧運之初皆支運也既而議者以為軍民不便於是有兌運法凡五變一曰海運二曰海陸兼運三曰支運四曰兌運五曰改兌續文獻通考洪武二年令戶部於蘇州太倉儲糧二千萬石以備海運供給遼東是時海船有一千料有四百料名鑽風海船後永樂中改海運遂改四百料為淺船續文獻通考永樂元年令於淮安用船運糧入淮河沙河至陳州潁岐口跌坡下用淺船運至跌坡上别以大船載入黃河至八栁樹等處令河南車夫赴衛河轉輸北京此變海運之始續文獻通考十二年海運糧四十八萬四千八百一十石於通州又衛河儧運糧四十五萬二千七百七十六石於北京所謂海陸兼運者是也一由江入海出直沽口由白河運至通州謂之海運一由江入淮黃河至陽武縣陸運至衛輝府由衛河運至薊州謂之河運續文獻通考十三年時㑹通河成遂令浙江嘉湖杭與直𨽻蘇松常鎮等府秋糧除存留並起運南京及供給內府等項外其餘原坐海運之數盡撥運赴淮安倉揚州鳯陽淮安三府秋糧內每嵗定撥六十萬石運至徐州倉徐州並山東兖州府秋糧內每嵗定撥二十萬石俱令民運赴濟寧倉以淺河船三千隻於㑹通河支淮安糧運至濟寧倉二千隻支濟寧糧運赴通州倉每嵗通運四次所謂支運者是也其天津並通州等衛官軍於通州接運至京自是海運不復行矣續文獻通考又令浙江都司並直𨽻衛分官軍於淮安運糧至徐州置倉收囤京衛官軍於徐州運糧至德州置倉收囤山東河南都司官軍於德州運糧至通州交收明㑹典陳瑄計議令民運糧俱於淮安瓜洲補給腳價兌與軍船領運瑄又奏請於淮安瓜洲水次令軍民於此對船交兌令軍船出給通關付還與民令民補腳價在淮安水次者每正糧一石外加五斗在瓜洲水次者每正糧一石加五斗五升續文獻通考十六年又令浙江湖廣江西布政司並直𨽻蘇松常鎮等府兌糧坐派二百五十萬石令糧里自備船隻運赴通州河西務等處上倉明㑹典二十一年奏准每嵗漕運以兩運赴京倉一運赴通州倉交收明㑹典宣德二年令浙江江西湖廣並直𨽻蘇松等府起運淮安徐州倉糧撥民自運赴通州倉其運糧軍士於淮安南京倉支運明㑹典四年仍令江西湖廣浙江民運糧一百五十萬石貯淮安倉蘇松寧國廬州池州安慶廣德民運糧二百七十四萬石貯徐州倉應天鎮江常州太平淮安揚州鳯陽及滁和二州民運糧二百二十萬石貯臨清倉令官軍支運山東河南北直𨽻府州縣糧徑赴北京其儧運軍船量地逺近與糧多寡如淮安上糧民船十抽其一徐州十三抽一臨清十五抽一給與官軍兼舊船運載赴京此兌運之始明㑹典六年奏准浙江江西湖廣蘇松常鎮太平等府簽撥民丁及軍多衛所添撥軍士與見運軍士通二十四萬分兩班更替儧運明㑹典七年議准民運多失農月及官軍空船往還艱苦著例民糧加耗腳各於附近水次兌與軍運明㑹典南京江北府州縣糧於瓜洲淮安支兌續文獻通考應天蘇州松江常州鎮江太平寧國池州廬州安慶每石加耗米五斗六升又兩尖米一斗共六斗六升內除四斗隨船作耗餘米二斗六升折銀一錢三分名二六輕齎今減去二升止徵二斗四升改為二四輕齎於內仍扣留銀一分鳯陽淮安揚州徐州每石加耗米四斗六升尖米一斗共五斗六升內三斗隨船作耗餘米二斗六升折銀一錢三分名二六輕齎後改為二四腳米每石六升折銀給運官同有司為買辦物料修船之費通㑹河成省腳價始立減扣法扣留者以備修惠通河閘量減者以寬民力明㑹典按此為兌運法九年令官軍運糧五百萬石以三分為率通州倉收二分京倉收一分明㑹典成化七年都御史滕昭議罷瓜淮兌運裏河官軍雇江船於江南水次交兌民加過江之費明㑹典按此為改兌法令瓜淮官軍過江兌運除加耗外每石添給腳米六升改兌耗米應天蘇州松江鎮江廣德每石俱三斗二升鳯陽淮安揚州每石俱二斗七升徐州每石二斗二升以上各加耗內各折米二升易銀一分名折易輕齎凡改兌俱無尖米盤剝之費明㑹典二十年奏准河道淺阻糧運遲滯運到京者悉免晒揚每石加耗米四升每石兌運該收耗米並免晒揚米四升俱作正數支放明㑹典萬歷二年題准各處隨糧輕齎銀通解漕司內將三分給運官其七分選定解官裝入標船星夜越幫前進送通倉坐糧郎中稱過寄庫候該幫船到驗給運官完糧七年又令完掣通關之日查無掛缺亦便與運官領回分給附漕運總兵萬表云糧運輕齎者即耗糧也先是耗糧俱本色隨船候到灣雇車起糧則易銀為用後以灣中米價低昻不一而易賣又滯交納𢎞治十三年都御史張敷華都督郭宏方議折銀每石定價五錢可以輕齎就於交兌之時支領隨船此一六二六三六輕齎之名由始也然只令完納兌運三百三十萬石而已餘耗本折皆歸旗卒官固無利之者是故旗卒富饒糧運於斯為盛至正德六七年來京師權要始有官債虛立文約逼奪輕齎而弊又從此生矣時各總運官多出其門牽引為害蓋借公物以為私賂希寵庇耳於是始有鞘封過淮赴漕運衙門呈驗重封仍委官至張家灣過發之蓋以革逼奪之弊而把總聶欽遂引夤緣驗封查算使用以羡餘獻之於官故又有扣除之例矣欽雖即以贓敗而後之相繼者則用意算扣嵗增其數咸務多獻以為功太倉庫所積羡餘至盈數十萬而官旗揭借賠費貽害不可勝言欽之倡始為可罪也夫一六二六三六輕齎乃耗糧也惟因地有遠近故耗有多寡非腳價也若腳價則一例矣灣中起糧使用則各總皆同又何必分一六二六三六之殊哉今以輕齎扣除於官是則正糧四百萬之外復收其耗糧也豈制法之意乎後又添設參將一員駐劄通州專一驗封參將王佐乃定腳價搜括倉中使用如太監則有茶果錢如經歷倉攢每石一釐則謂之釐兒錢及至吏書門官斗級之類莫不定之以數每年造報花銷遂以為例先年倉中使用初無定數每因人之狡懦而髙下增減之司使用之人又有虛數以欺衆者纍至爭訐故此法一立一時人亦便之但使用公行太監茶果又添火耗催茶果者又有班兒錢其經歷倉攢往年各衛得以所帶本地貨物高價與之而今皆紋銀且以此為應得又於數外求之為厚薄低昻矣蓋作法於涼其弊猶貪作法於貪弊將焉止故為法不可不慎也明典彚是年題准每船許帶土宜六十石多者盡數入官如遇淺起剝自備腳價初內官監收白熟粳米科索無厭大率正糧一石加費二石始獲批單至是以應天巡撫吳廷舉言始令今後內官監收糧悉如故事每石加耗一斗不許分外多收軍餘人等有仍前巧立名色科索民財者如法究治明典彚九年議准漕司及各巡撫將江南五府應運白糧令各糧長仍雇五百料中船勿令夾帶私貨應得水腳當官議定先給一半其餘印封船過徐州總部官驗給又題准每嵗解京白糧務㸃殷實糧戶正身解納不許棍徒包攬應用米數先儘本名如有官戶銀米責令運送倉庫轉給領解以杜短少賠纍船隻許令糧長自雇五百料中船每百石定給銀三十三兩埠頭等役悉行查革經過鈔關如果止於土宜四十石免其納稅明㑹典附陳睿謨白糧解役疏略竊惟國家財賦大半取給江南江南力役重大莫如糧解漕糧白糧兩解皆公儲也皆公役也然漕糧係軍運軍係伍丁白糧係民運民運則照地畝簽差名曰大戶夫惟以大戶充糧解其賠纍有莫可言者矣東南諸省如湖廣江西等府俱止有漕糧無白糧即南直浙江惟蘇松常嘉湖五府獨有白糧臣每見里中糧役收領正米外更有各項名色官有管轄遂因其管轄而遞索之事有款項隨照其款項而各科之運船未出江口而使費已耗其大半矣用是不避怨嫌臚列四款一曰糧官陋規當裁官常肅而糧解之節省無量矣一曰胥役冗費當革需索少而糧解之輸納易辦矣一曰沿塗阻壅當恤此又疏通糧務之一關鍵也一曰包攬積蠧宜懲此又區處解役之一權宜也黃希憲改運白糧疏切白糧為上供急需遞年簽㸃糧解舂辦兌納相沿久矣邇因半為包棍侵漁半為胥役掯索以及剝淺守凍赴京交納等費動以千計遂至靡嵗不遲無邑不缺公家正額究無完納之期近奉聖諭渙頒凡可寬恤吾民者無不周悉臣撫此財賦重地目擊苦役敢復隱忍膠柱不求長䇿乎近行蘇松道㑹同常鎮道徹底講求思蘇民裕國之䇿莫善於均徵米而官運之官運則民無雇倩之費一便也官無簽役之難二便也錢糧既自官支吏胥無從抽扣三便也在船皆官役船戶無敢凌虐四便也催儧皆官事沿途無敢拋撇五便也况米屬均徵則苦樂之形不立巧拙之情自化糧不必詭寄飛灑差不必就易避難民心以厚民風以淳六便也然其中有當議者五焉凡白糧正耗舂辦夫船等米一概算入平米之內派之此派糧之公可行也原編耗米之外另編加二以補沿途之消損以平米一石計之不過合勺而已此加耗之輕可行也民間辦糧盡數交倉無此漕彼白之分縣官就完米中擇其乾潔者交協部官動支舂辦交割總部完辦蚤則起行先可免漕艘阻壓之患此徵辦之速可行也運船向係民雇官運則必用官船計每船管船頭柁水手各安家衣資等項以及買辦包索遇淺起剝遇溜添䉡等項計每船用米五十石用銀三百二十五兩以原編夫船貼役米計之除支外米尚有餘以原編夫船貼役銀計之除儘支外銀尚不足以有餘之米當不足之銀臨時調劑是經費不煩增設矣至於管押起交侵盜漂失每船各有責成遇有虧缺立勒賠補懸大法以繩其後蓋既不可以復問糧里則人未有不愛惜性命者是責成不患無人矣兹據蘇常兩道臚列具詳臣亦無容更益而臣緯恤杞憂尚有不能已於言者語曰一法立一弊生外而衙蠧包棍內而部胥積歇引戶每視糧解為竒貨今改為官解未免拂其狼心必至多方阻撓或包棍潛入京師串通積役仍肆把持或引戶交構外奸僞造訛言動搖耳目有一於此皆足害成乞敕五城御史及緝事衙門凡遇此等即置重典庶蟊賊一清而美利可久伏願軫此孑遺毅然乾斷敕部立覆舉行異日書之史冊將見九重如天好生之德與穹壤俱無極矣國朝順治九年准總漕馬國柱疏請查黃屯丁審定運軍附馬國柱疏為運丁舊冊堪稽簽勾積弊宜剔伸祈聖明俯賜採擇事臣聞凡事更張即起借端之弊前人有例何難按籍而求如明朝用黃快船以裝貢物設運船以挽漕糧事雖並重然黃快船丁係編審小甲糧船運戶係食糧祖軍人實分途先是兩丁皆以正身應役備受監局厰衛之騙害有寃無告嗣據南北兵部堂屬群議叠疏奏請定為免役編銀之法快丁每嵗納銀一萬五千兩黃丁每嵗納銀二千二百兩徵解南兵部以為繕船募役之資此萬歷十四十六等年兵部題准刻有船政新書可據兩丁遵此而行非一日矣至於運軍承祖戶運差凡有事故止於運差軍餘內撥補不得將黃快船編丁掣出領運此萬厯二十一年兵部題准至崇禎四年南兵部尚書傳振商與漕運總督李待問又將萬厯八年及四十六年老冊與運軍祖冊運餘底冊逐月支糧冊徹底清查審定運軍一萬八千六百六十名有見運旗甲有食糧運餘有清出竄丁有空間備補其間祖宗姓名子孫人數刻有運冊新考可據運軍遵此而行亦非一日矣乃朝創值我新舊弊叢生奸甲既思竄戶而息肩貪辨反造方借勾查而居竒臣前閲總督漕臣沈文奎題疏及部臣覆議慎重精詳深恐殷實運軍竄戶逃差致國誤漕務雖然臣謂此輩有敢竄之心無能竄之法家何也兩書在案運自運丁自丁固截然不容混也臣思我皇上念念為民事事除害一切直省錢糧盡照萬厯年間編派以絶額外濫加之弊則船政運冊亦萬歷年間臺省兵部幾經參駁而後成書使清查照此清查則載冊祖軍誰敢指鹿為馬簽運照此簽運則納銀船丁自難以羊代牛斬斷無數葛藤省盡許多騙詐矣臣謹繕疏奏聞伏乞部詳議仍將原書發臣捐俸重刋頒布使軍丁世皇上敕皇仁可守成規永戴也仰祈聖明俯賜採擇十一年六月奉恩詔內開白糧民解仍以纍民今後於該省漕糧船分帶以蘇官民之纍應行事宜該督撫作速議奏經該督撫以江南之官運民解久己相安漕船帶運不便仍照舊例按明季白糧簽派里民解運深為賠纍自本朝定鼎後改民解為官解選府二為總部縣佐二為協部雇募民船裝運十二年准倉場王永吉疏將䉡夫葦把小封紙劄羡餘五項並防缺水腳行月三項全給官旗其買銷賣銷一槩禁革以杜葛藤十四年戶部覆准江南白糧照浙省例抽選漕船裝運又准巡按御史秦世貞疏定漕糧官收官兌令各府州縣印官照派定區圖貯收在倉驗依准單交兌每正糧百石除正耗外加米五石銀五兩交與旗辨十六年准巡按御史馬騰升疏自今民戶各照應納糧米並耗贈及五兩五石儘數交納收糧官官隨收給串即發歸農俟旗船到次衛官竟與印官糧官交兌軍民兩不相見則五兩五石之外無苛求官收官兌之法為至便附馬騰升疏略臣於去年題准良法虛懸一疏業經嚴飭各屬晝一遵守矣恐將來不肖有司陽奉隂違仍復審簽糧役如蘇之公正糧長松之圖記典耆常之里甲圖收一經簽定收漕責成漸復在民請自今秋早定收漕各官開倉之日糧戶輸納即挨次交收無致臨兌雜沓縣官照條銀例先期印發糧串斛過糧米糧官即照數填給勿使糧戶伺候至如兌竣之通關每多勒指五兩五石之外曰順風曰花紅曰犒賞巧立名色恣意索取今議各州縣漕船聽候漕臣頒發全單給糧道開明某衛各船若干隻兌某縣米若干石該道頒發號單每單兌米一百石連加贈銀米交清即將一單著令衛官填注收數一船兌足即出給水程勒令開幫是為節節割絶使無勒掯通關之弊再令糧道查照各屬額設幾倉每倉頒發號簿幾本將前各丁船開列在簿兌足即注明兌足如過期不兌監兌推官周歷所至按簿責比旗軍以杜愆期之弊更有驍軍沿途停泊竊取墳樹種種等情許地方官嚴拿解送糧道或兵巡守道重懲其運官約束不嚴申報漕撫俟過淮之日創治以禁在途生事倘水程限日遲延一並查處糧艘可速進而延誤之弊亦除矣又准科臣朱紹鳯以蘇松常鎮四府糧多路遠領運旗丁不無常例雜費於五兩之外再加五兩其江安等十一府州俱仍係五米五銀漕糧正兌進京倉每正米一石加原帶耗米二斗五升共一石二斗五升過壩進倉內收正米一石又收耗米七升尖米四升二合又尖上加耗米二合九勺四抄共一石一斗一升四合九勺入厫其餘一斗三升五合六抄舊例聽作盤閘折耗及倉中晒揚虧折此外有剩作該衛所餘米給還運軍如正兌之米改進通倉加收五閘耗米五升康熙十四年題以運進京倉漕糧餘耗米內盤閘耗米五升將三升收厫入正支銷以二升聽作各閘折耗漕米進通倉江寧府正兌米一石原帶耗米四斗內交倉二斗五升餘一斗五升為旗丁盤耗改兌米一石原耗米三斗內交倉一斗七升餘一斗三升為旗丁盤耗淮揚海通並邳宿睢正兌米一石原耗米三斗內交倉二斗五升餘五升為旗丁盤耗改兌米一石原耗米二斗五升內交倉一斗七升餘米八升為旗丁盤耗徐州正兌米一石原耗米二斗五升全交倉改兌米一石原耗米二斗五升內交倉一斗七升餘八升為旗丁盤耗安慶寧國池州太平廬州六安正兌米一石原耗米四斗內交倉二斗五升餘一斗五升為旗丁盤耗鳯陽泗州潁州正兌米一石原耗米三斗內交倉二斗五升餘五升為旗丁盤耗改兌米一石原耗米二斗五升內交倉一斗七升餘八升為旗丁盤耗廬州廣德改兌米一石原耗米三斗內交倉一斗七升餘一斗三升為旗丁盤耗康熙十七年將蘇松常鎮贈銀裁減五兩二十年將蘇松常鎮四府所裁贈銀五兩內復給三兩五錢本年九月奉上諭積貯為國家大計嵗運漕米充實京倉最為緊要旗丁人等挽運勤勞宜加存恤朕頃巡行近畿至通惠河一帶見南來漕船旗甲人丁資用艱難生計窘迫深為可憫若不預為籌畫恐其苦纍難支以致沿途遲滯貽誤倉儲所關非細前以軍需浩繁漕運額設錢糧節行裁減今行作何酌復款項爾部詳議具奏戶部議覆此項銀米原係額設應給之款自今年起運十九年起各省所裁減耗贈銀米俱行復給二十五年糧船概定每船十丁又定三分本色席片止徵解二分五釐減去五釐一並折銀與前七分折色銀均解通濟庫二十六年總督慕天顔題定漕船料價銀二百八兩七錢七分按漕船料價舊例各省多寡不一康熙二十一年監造副都御史色克德議令各省一例定價四十三年令江省白糧照依漕糧幫船一例支給行月錢糧其漕贈銀米經費銀兩概行裁減四十六年七月奉㫖旗丁領運照數全完者總漕奬賞額糧之外有多交者計算米數並領運次數議叙五十一年二月從總漕赫夀之請定漕政八款一令糧道親歷水次稽查如正耗等米有折乾清弊發覺該管官各照例處分仍將所折之米如數追賠一江南省糧船三千一百餘隻浙江省一千三百餘隻前後開行相隔千有餘里每省內派通判一員首尾不能稽查嗣後江南省派七員浙江省派三員每員押船四五百隻抵通以無缺與掛缺之次數為升降一監兌官務令坐守水次將正耗行月搭運等米逐船兌足親身督催到淮盤驗一每幫設立千總二員輪流押運倘一辨留通一辨事故則領運無人勢難兼顧請將候選千總揀選三四十人發總漕衙門委派一次領運全完者遇缺即行補授一江浙每年積缺之幫押運千總如二運全完其次掛缺之幫三運全完别幫五運全完皆准其即升一定例一船十丁嗣後每船於本丁兄弟子姪內再派一丁注入冊內隨船駕運如抵通掛缺留一丁追比一丁駕空回南設措完缺如到淮短少令一丁駕運北上一丁買米趕幫每幫十船連環保結一簽丁令千總保結報衛備府㕔等官再行看驗加具印結如有掛缺千總守備仍照例處分外府㕔糧道亦照掛缺多寡遞加罰俸一過淮違限一二月者仍照例處分外違限二月以上或七十日八九十日計日不計月分别議處五十二年准蘇撫張伯行疏江南漕船仍照原限勒令正月以裡過淮雍正元年十二月初九日奉上諭漕船關係緊要除本船正副旗丁外其頭舵水手皆應擇用本軍庶知守法不敢誤漕生事二年五月初二日奉上諭漕運關係甚大經費本無不敷而運丁恣行不法者皆由官辨剝削所致嗣後各省糧道給發錢糧不許扣尅分釐沿途武辨不許藉端需索運丁除包攬抗違外所帶些須貨物亦無容苛刻盤查三年六月二十日奉上諭禁止漕船夾帶私鹽並火炮鳥鎗火藥等物四年戶部議江安蘇松二糧道輪流一員押運過臨五年三月准部議將道庫實存錢糧照藩庫一例每年春秋二季將實在所貯分别應存應解各款盡數登明造冊報部聽候撥解京餉又糧道職司漕運每嵗例應押運過淮到通方得回任而經管各項錢糧亦應比藩庫例添設庫大使一員凡倉庫收放銀米責成稽查十八日准漕臣張大有議自雍正五年為始漕運船隻無論土著協運皆就向年原兌府屬止調本府各邑水次運過三年另行調換白糧丁船於通漕船內抽選堅固船隻無缺殷丁掣運五年更替令其少有贏餘以示奬勵六年五月准部議浙江布政司髙斌奏空重漕船北上南下非橫截河心即對停兩岸商民壅塞莫行偶或擦掽輒行索詐稍不遂意即肆咆哮應行文該管督撫轉飭沿河儹運文武官辨按入境出境日期時刻親身逐程挨查如仍蹈前弊即行嚴拿究治如該管少有疏縱纍商或經查出或被首告將沿途文武官員照例題參議處九月准滸墅關監督李秉忠請近有帶土宜六十石免稅之例但恐不肖運丁借端藏隱侵欺將貨分散各船或沿途包攬轉誤回空之期今回空糧船帶有梨棗及應行上稅之物仍令輸稅十月上諭自雍正己酉年為始江浙徵收漕米但擇乾圓潔淨不必較論米色准令紅白兼收秈粳並納著為定例七年正月奉上諭嗣後糧船過淮之時著派御史二員前往淮安專司稽查不許官吏人等向旗丁額外需索以致擾纍其糧艘攜帶物件除照例許帶土宜外該旗丁如有夾帶私鹽及違禁等物者亦著該御史稽查但不得過於嚴刻吹求以致糧運遲滯三月准江南狼山總兵官王安國請通州應徵漕糧自雍正己酉年為始照額徵收貯倉改兌狼營兵米就近支給將附近水次州縣應徵南米改抵通州起運漕糧五月奉上諭土宜著於舊例六十石之外加增四十石准每船攜帶一百石永著為例十月准蘇撫尹繼善之請禁革徵收積弊酌定每石收費六分折收制錢五十四文其行用小錢地方即照大錢數扣算交收以一半給發旗丁一半留給州縣再每漕一石止許收水腳錢五文其州縣倉厫如離糧艘上兌之處十里以外者每十里准加二文又災漕米石一體照新漕每石交費五十四文惟水腳一項災漕陸續派兌挽運艱難准比新漕加錢十文此外不許多勒粒米毫銀十一月從總漕張大有之請部頒每省糧道鐵斛各一俾得畫一遵守八年正月奉上諭浙江蘇松等屬應解三分本色松板著俱改徵折色令各該糧道彚解通濟庫以備採辦之用其湖廣江西安徽等處全解十分本色者著倉場侍郎嚴行稽查不許收板官吏勒索使費三月十三日准御史竇啓瑛條奏及倉場侍郎嶽爾岱涂天相等議嗣後州縣徵糧米預將各里各甲花戶額數的名填定聮三版串一給納戶執照一給經承銷冊一存州縣查對按戶徵收對冊完納即行截給歸農其未經截給者即係缺戶該印官查摘追比若遇有糧無票有票無糧等情即係胥吏侵蝕立即嚴追行知各直省督撫轉飭所屬有漕州縣一體遵行十一月奉㫖浙省白糧係民間舂辦江南百姓輸納糙米官為舂白一應捆包搬運皆屬官辦其所有耗米束包等項俱著照該撫尹繼善所請准其開銷九年三月奉上諭江南江淮興武二衛旗丁名下有應追鑽夫底料銀十萬八千一百餘兩悉行豁免以示朕恩恤運丁之至意附性桂疏略查江興二衛應追鑽夫底料一項荷䝉特恩豁免該衛軍丁官辨感激誠切歡呼載道臣隨據情叩謝天恩繕疏在案至查從前給發此項銀兩原由糧道給發題達衛備轉給各丁經管書役人等紙筆飯食之資各丁不免亦有所費如浮冒虛銷扣尅分肥等弊臣皇上隆詳細密查定無確據嗣後倘蒙恩仍准給發臣自當仰體皇上加恩施惠務在受者得其實濟之至意嚴飭道衛凡從前旗丁所費陋規概行革除勒石永禁臣仍不時密訪嚴查如有違犯或被旗丁告發官參吏處治罪則旗丁均沾實濟而於成造大有裨益再查旗丁成造漕船所領料價不敷又無贍田幫貼故加鑽夫底料除鑽夫銀五十兩原無增減其底料一項係以十年計算每分銀五兩一錢若無底料者則全給銀五十兩有零或有底料不足則照不足分數補給是以合之鑽夫一項或有共給一百兩有零者或有共給五十餘兩以及六七十兩八九十兩不等者惟俟臨時查核底料乃有確數如蒙特恩嗣後仍照定例賞給自當臨時飭令道衛查明酌定給發江南通志卷七十七
