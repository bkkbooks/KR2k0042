body:
  text: 江南通志卷五十四河渠志淮一禹貢導淮自桐柏東會於泗沂東入于海孔氏以為淮水先入泗泗入淮水經注云淮泗之會兩川翼夾二水決入之所所謂泗口也水經又謂淮水東至廣陵淮浦縣入於海禹貢錐指云泗口亦名清口今安東縣治或云即淮浦故城淮浦舊屬臨淮郡晉改屬廣陵然則淮水入海之道自禹迄今不改其不同者大河南徙淮水受泗而東其故道悉為河所奪也以今輿地言之淮水自河南桐柏縣南東歴羅山息縣光州東北逕江南潁州府南淮水去潁治一百十里又東十餘里合汝水南岸即霍丘縣界又東逕霍丘縣北淮水去縣治四十五里又東逕潁上縣南淮水去縣治二十五里潁水在縣南門外亦曰沙河東南流至正陽鎮入淮謂之潁口即春秋之潁尾也鎮在縣東南七十里淮水之西又東逕壽州鳯臺縣西北淮水去縣治二十五里又東逕懷遠縣南淮水流逕縣城東稍折而北渦水来注之謂之渦口又東逕鳳陽縣北淮水去縣治十里又東逕臨淮縣北淮水去縣治一里又東北逕五河縣南淮水在縣治東南一里有澮沱漴潼四水與淮㑹謂之五河口又東逕泗州南旴眙縣北淮水去州治一里去縣治二里又東北逕清河縣南與泗水合謂之清口淮水去縣治五里又東北逕山陽縣北淮水去縣治四十里又東北逕安東縣南又東北入於海淮水去縣治二里蓋自清口以下淮雖併合為河河實假道於淮導淮者必東北而注於海所謂求其故者行所無事必不東南而注於江所謂惡於智者為其鑿矣然淮所納山泉之水凡七十有二泗沂汝潁又最為大淮既不支而全河又悉注於淮黄濁淮清黄强淮弱黄嘗逼淮使之南面高寳諸湖不能容則淮溢而為患黄又躡淮與之俱南而清口淤沙不能滌則淮又與黄並溢而為患此高堰之設所以束淮敵黄即助黄刷沙使水由地中以海為壑東南漕輓通行無梗實兩河之闗鍵天下之至計不獨淮揚之屏蔽已也明潘季馴論清口之沙鳯泗之水以為堰決而塞築則必通堰決而蓄築則必達蓋得其要矣然其後議行水者開周橋撤高堰欲使全淮入江不但聽其支流南注抑獨何歟我朝經理河淮逴躒前代以陂障為決排以捍禦為利導奠寜赤子通利漕渠周詳盡善聖祖仁皇帝高堰第一要𦂳之訓㫖修治更有何善策之咨詢河臣恪遵區畫底績安瀾世宗憲皇帝特發帑金百萬大修高堰石工期於鞏固久長利賴無極隄防既完復濬引河使黄既勢趨北岸而淮得宣洩於東下不旁溢上常交匯悉復故道朝宗于海神禹平成之遠謨亦萬世不易之法守也兹所撰録兼博引論説徵治法之畫一焉漢建安五年廣陵太守陳登築堰障淮按淮安府志高家堰者漢建安五年廣陵太守陳登所築禹貢錐指云考三國志注登嘗為典農校尉巡土田之宜盡鑿溉之利蓋精於水利者當時廣陵太守江表傳以為治射陽則此堰尤為密邇其為登築無疑又按明潘季馴兩河議云高家堰今府志稱高加堰注云高加者為䕶運道邑井宜加高而名之蓋益加而益高耳高堰去寶應高一丈八尺去高郵高二丈二尺高寶隄去興化泰州田又高丈許或八九尺其去堰不啻高三丈有竒宋景祐三年泗州作外隄以備淮水禹貢錐指泗州南去淮一里屢遭水患宋開寶七年淮水溢入泗城歴咸平至祥符無嵗不溢至景祐三年作外隄以備淮水高三十三尺自是水患少弭熙寜四年十一月開洪澤湖達於淮宋史神宗紀元豐四年命發運副使皮公弼修泗州洪澤湖玉海六年正月從江淮荆浙發運副使蔣之竒請開龜山運河二月告成長五十七里闊十五丈深一丈五尺宋史河渠志初發運使許元自淮隂開新河屬之洪澤避長淮之險凡四十九里久而淺澀熙寜四年皮公弼請復濬治人便之至是發運使羅拯復欲自洪澤而上鑿龜山裏河以達於淮帝深以為然㑹發運副使蔣之竒入對建言上有清汴下有洪澤而風浪之險止百里淮邇嵗溺公私之載不可計宜自龜山蛇浦下屬洪澤鑿在肋為複河取淮為源不置堰牐可免風濤覆溺之患帝遣都水監丞陳祐甫經度祐甫言往年淮隂至洪澤開新河獨洪澤以上未克興役今不用牐蓄水惟隨淮面高下開深河底引淮通流形勢為便但工費浩大帝曰費雖大利亦溥矣祐甫曰異時淮終嵗失百七十艘若捐數年所損之費足濟此役帝曰損費尚小如人命何乃調夫十萬開治既成命之竒撰記刻石龜山後建中靖國初之竒請下發運使修築嵗以為常川瀆異同泗州與盱眙兩城相距凡七里自昔為淮流襟束之處汴水自河南界流經州城東而合於淮謂之汴口宋時以此為漕運要衝今惟涓流可辨耳由州城而東三十里龜山峙焉淮流至此乃益折而北又二十餘里而洪澤富陵泥墩萬家等湖環匯於淮之東岸淮水泛溢恒在於此州逼淮而地下故也禹貢錐指古汴水東流經彭城縣北而東入於泗唐貞元中韓愈佐徐州幕有詩云汴水交流郡城角是其時汴水猶於州城東北隅合泗入淮也不知何年改流從夏邑永城宿州靈璧虹縣至泗州兩城間而入於淮宋時東南之漕率由此以達京師南渡後漸堙元泰定初河行故汴渠仍於徐州合泗水至清口入淮而泗州之汴口遂廢明洪武二十七年九月濬淮安山陽縣攴家河水南入淮北通安東海州永樂七年六月壽州言淮水決州城命以時修築中都留守司言夏雨不止淮河水溢壩口見發軍夫晝夜築塞命工部亟遣人督視八年三月工部言淮安府淮河南岸圮宜令有司修築從之五月工部請修淮安府淮河隄岸以固大河衞城從之平江伯陳瑄大葺高家堰按河防一覽云漢陳登築堰禦淮至我朝平江伯陳瑄復大葺之淮揚恃以為安者二百餘年又按潛丘劄記云高家堰自建安五年至明永樂時平江伯陳瑄修治中間凡一千二百十五六年並無人言及高堰者豈堰止受洪澤諸湖黄淮尚未合不聞其有潰決之患與宋史李孟傳為楚州司户參軍修復陳公塘有灌溉之利陳公塘即高堰也堰固不乏修治第史文不備耳又按通鑑紀事本末陳瑄於永樂十三年鑿清江浦引管家湖水入淮通漕其修復高堰並應在此時而諸書失其年姑闕之宣徳七年壽州衞奏近城西有湖與淮相通比雨潦暴漲壞城二百四十餘丈乞發附近軍民修理從之正統元年壽州衞奏淮水泛漲壞西北城垣請修治從之天順七年閏七月修鳳陽衞土城及䕶城隄明英宗實録以久雨淮水衝決故也隆慶三年九月淮水漲溢自清河縣至通濟牐及淮安府城西淤者三十餘里決方信二壩出海四年淮水東趨決高家堰六年漕撫王宗沐築高家堰及淮安府四長隄附王宗沐淮郡二隄記隆慶辛未河大溢壞漕舟以千數天子不以沐為不肖使董漕計踰年淮父老詣余而泣曰郡地專受淮故稱淮安勢自西南歴清河而東與湖南僅隔拳上故高家堰有隄不治而淮輒入海幾受其半淮揚兩郡皆困終不治則且妨漕佘惕焉按之信然乃檄守陳文燭以軍餉六千餘金築焉又明年癸酉五月淮水溢平地高三丈餘而以隄故不溢入湖郡之南鄉與揚皆無恙然勢掠郡西合黄河折而經北城下安東則洶湧幾齧西橋奪漕河而出佘為之不寢者三夕幸而勢少殺則又以其泛濫四溢數道出禮信壩及鉢池山民在巨浸中至八月而始涸余以災請幸天子仁聖捐米八萬石賑之而又允折漕糧是時幸淮獨漲使稍遲半月與黄河並發則事不可支矣是年冬余再檄于同知時保以賑之餘米一萬石募夫築郡西長隄焉高家堰隄北自武家墩起至石家莊止計三十里而遙為丈五千四百隄面廣五丈底廣三之而其高則沿地形高下大都俱不下一丈許而又於大澗小澗具溝舊漕河六安溝諸處築龍尾埽以遏奔衝隄内自澗口以達張家莊濬舊河以洩湖水使不侵齧工凡五十日而畢郡西長隄自清江浦藥王廟起東歴大花巷由西橋相家灣直抵新城過金神廟至栁鋪灣六十里而遥為丈八千七百九十八隄面廣四丈底廣三之高可七尺餘蜿蜒如長虹以障郡城之北工凡三月而畢余按淮安郡三城在淮與漕河夾中自嘉靖中年以來無嵗不被水而其最甚則己巳癸酉極矣鞠為大澤不見水端民之棲樹巢冢以救旦夕即余疏中所道葢其十之三四也而今二隄並峙高家堰獨抗淮於西南而西長隄又障淮於西北蓋至是而居者田者皆有寜處可望生全無苦昏墊矣顧淮水高於郡勢若建瓴而下使其發時與河並則為慮尤巨且西長隄能障溢水而其從下齧而潰者不能却河故去城數十里而今乃在城下是其大勢漸侵而南可覩也開草灣以分河勢通澗河以防溢流予心耿耿焉文燭楚之沔陽人時保浙之嘉興人而是時同相二役者郭同知大綸王通判𢎞化諸推官大綸山陽縣縣丞談嘉謨也丁士美高家堰記山陽舊有高家堰違郡城西南四十里許而圮廢久矣其最闗水利害者則大澗口也先是堰屢決屢築工皆不鉅邇者决益甚工益鉅當事者始難之矣按堰迤西當淮泗二水合流之衝二水東北與黄河會胥入於海比嵗河流衝決則淮泗汎溢勢必由澗口建瓴下注匯於津湖甚者穿漕隄入射陽湖而山陽鹽瀆之間以及海陵諸地通為巨浸茫無際涯已間者黄河亦為牽引而漕渠日就湮淤是其害不直在民生而且移之國計也爰考郡乗獨不之載故欲拯民之溺者無徵焉先後議築者凡逾二紀而喙喙紛如大都唯者十一否者十九其唯者率如前指曰築之便否者輒稱財詘至有執道旁之見上不便狀者故屢䛫屢罷不果行兹郡守陳公治淮之明年諸具修時因士民之請親至其地用中而荒度之已而慨然曰淮之休戚將是焉在可弗圖乎是余之責也夫是余之責也夫顧民力竭矣難重勞也夙夜籌之不置將有待而舉者會督撫王公至灌輸之暇廉堰狀為愕然曰淮之休戚將是焉在可緩圖乎彼稱不便者職時詘爾余能以官帑成之遂發帑金萬二千有竒令募民築之以其事屬諸陳公然公計此已甚稔矣公因肩其事乃以其役屬諸致政周君予徳等曰惟兹堰事盍為余往董之惟桑梓是念勿我辭也周君等唯唯承指惟謹相與環堰而寢處焉是時飢者載道聞募而至者七千有竒其扶攜老稚而就食者又倍蓰不啻也工始於隆慶六年九月訖於萬歴元年春正凡五閲月而堰成云堰隨地之高下其高者約一丈許面濶五丈底濶十五丈澗口水深一丈實土與之等闊三十七丈堰築於其上外為偃月隄長三百丈高六尺水小至或能禦之大至雖勢能襄隄比至堰力已殺矣其具溝六安溝舊漕河等口皆為月隄以䕶之其崇如墉又導堰内湖澗諸水由畢溝入西湖數十里皆為膏腴可樹可藝云堰延袤五千四百丈用帑金六千有竒民不勞而事就緒皆督撫之碩畫郡守之經理也淮人請刻石以垂永久屬佘記之聞之語云非常之原黎民懼焉民之難與慮始也自昔然矣其堰之謂與余嘗觀宋天聖中海朝漫為鹹鹵范文正公時監泰州西溪倉議築捍海堰於通泰海三州之境長數百里以衞田逾年而後堰成民享其利三州之民生祠之又元祐中杭之西湖多葑田六井幾廢蘇文忠公時守杭遂浚茅山鹽橋二河復完六井又取葑田積湖中南北經三十里為長隄以通行者杭人名蘇公隄家有畫像飲食必禱於公今兹堰之舉視文正文忠又奚異也淮民之尸祝二公也無疑矣世嘗謂古今人不相及非然哉非然哉萬歴四年河從崔鎮口北決淮水從高家堰東決五年閏八月河淮復合明神宗實録五年六月漕運侍郎呉桂芳奏淮水向經清河會合黄河趨海自去秋河決崔鎮清江一帶正河淤墊淮口梗塞於是淮弱河强不能奪草灣入海之途而全淮南徙灌山陽高寶之間向来湖水不逾五尺隄僅七尺今隄加至一丈二尺而水更過之此從来所未有也議䕶湖隄以殺水勢部言隄雖可䕶而不能必水之不漲欲水之不漲必俾淮有所歸而後可宜令漕運衙門嚴督司道熟計其便報可閏八月呉桂芳稱黄水向老黄河故道而去下奔如駛淮遂乗虛而湧入清口故道淮揚水勢漸消附管理河道工部郎中施天麟疏淮泗之水原從濬口㑹黄河入海今不下清口而下山陽從黄浦口入海浦口不能盡洩浸淫漸及於高寶邵伯諸湖而湖隄盡沒則以淮泗本不入湖而今入湖故也淮泗之入湖者又縁清口向未淤塞而今淤塞故也清口之淤塞者又縁黄河淤澱日高淮水不得不讓河而南徙也蓋淮水併力敵黄勝負或亦相半自高家堰廢壞而清口之内傍通濟牐又開朱家等口引淮水内灌於是淮泗之力分而黄河得以全力制其敝此清口所以獨淤於今嵗也下流既淤則上流不得不決每嵗糧艘以四五月盡運隄以六七月壞水發之時不能為力水落之後方圖堵塞甫及春初運事忽至僅完隄工於河身無與河身不挑則来年益高上流之決必及於徐吕而不止於邳遷下流之涸將盡乎邳遷而不止於清桃須不惜一年糧運不惜百萬帑蔵開挑正河寛限責成乃為一勞永逸至高家堰朱家等口宜乗時築塞使淮泗併力足以敵黄則淮水之故道可復高寶之大患可減若於興化鹽城地方海口湮塞之處大加疏浚而湖隄多建減水大牐隄下多開支河以行各牐之水庶乎不致汗漫總之未有不先黄河而可以治淮亦未有不疏通淮水而可以固隄者也是年漕撫王宗沐修高家堰南河全考都御史王宗沐知府邵元哲修高家堰并開菊水潭以洩三城之水東方米芻舟楫皆通六年從總河侍郎潘季馴請命郎中張譽海防道龔大器揚州府同知韓相等築高家堰隄長六十里内砌大澗口等處石隄三千一百一十丈栁浦灣隄東三十餘里西四十餘里南河全考先是萬歴三年淮決高堰而山陽高寶興鹽等處匯為巨浸運道梗阻總河侍郎潘季馴相視築堰起武家墩經大小澗至阜寜湖以捍淮東侵築隄起清江浦沿鉢池山栁浦灣迤東以制河南溢於是淮畢趨清口會大河入海海口不濬而通八年工科給事中尹瑾陳請高家堰包砌石隄工部覆准下河督潘季馴行之附尹瑾河工善後疏畧高家堰近已築塞成隄體制高厚既有樁版以䕶其外復設官府以嚴其防然終不若石隄更為永恃宜於中間二十里低窪處用石包砌令徐潁海防三道均分道里各派所屬而董其成十一年高堰工成十六年總河尚書潘季馴條上河工事宜命如擬行附潘季馴條奏畧一添設隄官高堰栁浦灣二隄綿亘二百餘里一大使往来防守未免疎虞宜另増栁浦灣大使一員夫役即於高堰南河數内裒出五百餘名屬之以密隄防經一加幫真土淮水發源桐柏挾七十二溪之水鳯泗入海而基運山横截河中湧漲時作僅恃石隄一帶為捍禦而石内之土多係浮沙一遇霖雨輒至坍損上既圮矣石將安附宜覓取真土幫築完固以捍洶湧敵一接築舊隄清口乃淮黄交會而淮黄原自不然清口不致壅淤者以王家口之隄築全淮皆從此出其勢足與黄敵也自商販盜決前隄穵渠利涉淮勢漸分將來清口必致淤阻宜接築長隄就近責清河令監守十九年秋九月泗州大水十一月從河道都御史潘季馴請增砌高堰石隄河防一覽或有問於馴曰淮不敵黄故決高堰避而東也今復合之無乃非策乎馴應之曰自宋神宗十年黄河南徙合泗沂而與淮會迄今六百餘年淮黄合流無恙乃今遂有避黄之説耶夫淮避黄而東矣而黄亦尋決崔鎮亦豈避淮而北乎蓋高堰決而後淮水東崔鎮決而後黄水北隄決而水分非水合而隄決也問者曰兹固然矣數年以来兩河分流小潦即溢今復合之溢蔣奈何馴曰水分則勢緩勢緩則沙停沙停則河飽尺寸之水皆由沙面止見其高水合則勢猛勢猛則沙刷沙刷則河深尋丈之水皆由河底止見其卑築隄束水以水攻沙水不奔溢於兩旁則必直刷乎河底一定之理必然之勢此合之所以愈於分也或有問於馴曰高家堰之築淮揚甚以為便而泗州人苦其停蓄淮水何也馴應之曰此非知水者之言也高堰居淮安之西南隅去郡城四十里而近堰東為山陽縣之西北鄉地稱膏腴堰西為阜陵泥墩范家諸湖西南為洪澤湖淮水自鳳泗来合諸湖之水出清口會黄河經安東縣出雲梯闗以達於海此自禹迄今故道然也堰距湖尚存陸地里許而淮水盛發輒及堰私販者利其直達以免闗津盤詰往往盜決之至隆慶四年大潰淮湖之水洚洞東注合白馬氾光諸湖決黄浦八淺而山陽泰州高寶興鹽諸邑匯為巨浸淮既東黄水亦躡其後濁流西泝清口遂堙而決水行地面宣洩不及清口之半不免停注上源而鳯陽壽泗間亦成巨浸矣故此堰為兩河闗鍵不止為淮河隄防也馴戊寅萬歴六年之夏詢之泗人曰鳯泗之水蓄於高堰未決之前乎抑既決之後也僉曰高堰決而後蓄也清口塞於高堰未決之前乎抑既決之後也僉曰高堰決而後塞也馴曰堰決而塞築則必通堰決而蓄築則必達堰成而清口自利清口利而鳯泗水下鋭意董諸臣築之二月決工告竣而清口遂闢七月隄工告成清口深闢如故禹貢云導淮自桐柏東㑹于泗沂東入于海按泗水出今山東泗水縣東五十里陪尾山西南流至兗州府城東金口壩從壩上西南流為泗河歴沛縣至徐州又東南流過邳州會沂水東至清河縣入於淮沂水出今山東沂水縣雕崖山南流至江南宿遷北匯為駱馬湖而入於泗宋神宗後黄決而南遂併泗沂而與淮會矣故昔之東會於泗沂即今之東會於黄也淮由清口入海自禹迄今故道今至清口版沙若門限然欲舍故道而出高堰似不可也查萬歴三年工部郭子章勘得水勢洶湧崖岸漸坍包砌石工長二百二十六丈及查巡按邵亦於此時行州砌䕶城隄至今賴之稱邵公隄按前開工程皆馴未任時事比時淮水竟從高堰決衝淮揚黄水從崔鎮決出五港入海兩河已不會於清口無堰可阻無黄可遏其勢如此今之水漲未可歸咎黄與堰也泗州舊志載元知州韓居仁撰淮水泛漲記稱大徳丁未夏五月淮水泛漲南門水深七尺止有二尺二寸未抵圏甎頂城中居民驚懼因考宋辛丑之水大此二尺丙寅小此二尺今取高低尺寸刋之於石以後水漲官民視此勿驚懼云按韓居仁記此以慰泗州官民良工之心可謂獨苦且以州守載州事必無不真者宋元泗州水患景象如此此時已有高堰官民何不請毀如其無堰則水漲與堰無預矣今乃歸罪於堰不亦過乎或有問於馴曰高堰之築是矣而南有越城并周家橋淮水暴漲從此溢入白馬湖寶應縣河水遂溢此與高堰之決何異馴應之曰馴與司道勘議已確籌之熟矣其不同者有三而其必不可築者一夫高堰地勢甚卑至越城稍亢越城迤南則又亢故高堰決則全淮之水内灌冬春不止若越城周家橋則大漲乃溢水消仍為陸地每嵗漲不過兩次每溢不滿再旬其不同一也高堰逼近淮城淮水東注不免盈溢漕渠圍繞郡郭若周家橋之水即入白馬諸湖容受有地而淮城宴然其不同二也淮水從高堰出則黄河濁流必溯流而上而清口遂淤今周家橋止通漫溢之水而淮流之出清口者如故其不同三也當淮河暴漲之時正欲藉此以殺其勢即黄河之減水壩也若并築之則非惟高堰之水增溢難守即鳯泗亦不免加漲矣然則即於周家橋疏鑿成河以殺淮河之勢何如馴曰漫溢之水不多為時不久故諸湖尚可容受若疏鑿成河則必能奪淮河之大勢而淤塞清口泛溢淮揚之患又不免矣高堰為淮揚門户隄防不可不嚴修守不可不預内除石隄三千丈外兩頭土隄每嵗伏秋畫地分守隨汕隨葺似可無虞矣但幫䕶之法須於冬春門樁内貼蓆二層𦂳綑草牛挨蓆密䕶毋使些須漏縫然後實土堅夯則是以樁蓆䕶草牛以草牛䕶土浪窩何從得来至於密植橛栁茭葦以為外䕶須於水落即種庶免淹浸是在當事者加之意耳清口乃黄淮交㑹之所運道必經之處欲其通利須全淮之水盡由此出則力能敵黄不為沙墊往嵗高堰潰決淮從東行黄亦隨之而東清口遂為平陸今高堰築矣獨慮清河縣對岸王家口等處淮水過盛從此決出則清口之力微矣故於清河縣南岸築隄一千一百八十丈今又接築張福口隄四百四十餘丈以防其決蓋為此也工若甚緩而闗係甚大附潘季馴條議畧高家堰當湖之處中段原鑲石隄足當風浪其石隄南北俱係上隄嵗修無已議照中段一㮣砌石令徐州道與河南分司各管砌工以二十一年為始八年之内准可通完云中都志與居士集載宋歐陽修先春亭記其畧景祐三年泗守張侯問民之所素病而治其尤暴者日暴莫大於淮明年春作城之外隄因其舊而廣之高三十三尺土實石堅捍暴傋災可久而不壞乂曰泗天下之水會也先是嵗大水州幾溺張侯夏守是州築隄以禦之今所謂因其舊者是也按修曰尤暴者莫大於淮則知淮之為暴於泗舊矣曰隄高三十三尺則知水之高矣大水幾溺州而先後州守惟以築隄為事則知禦淮之䇿舍隄之外無策矣今查泗州䕶州隄高不及宋三之一是今之水較宋為甚小矣再查黄河自宋神宗十年南徙合南清河而入於淮而先臣丘濬大學衍義補曰此黄河入淮之始則仁宗景祐三年黄河尚未會淮業已為泗州暴矣今乃歸罪於淮或未可也二十年正月癸酉漕撫陳于陛巡按御史張舉議開施家溝周家橋以疏洩淮水河督潘季馴持不可辛巳遣工科右給事中張貞觀勘泗州水患開浚工程按前明自萬歴二十年至二十二年以淮為泗患中外諸臣議論紛錯勘河科臣張貞觀進闢海口治鮑王二口之議科臣黄運泰主事樊兆程陳浚五港口之策或謂腰鋪可開或謂老黄河可復而臺臣高舉請築周家橋滾水石壩夏之臣遂請決高家堰其大指歸於疏淮以安泗疏黄以導淮必盡芟築隄防運之成説效鑿空訪尋之心計至楊一魁張企程條議出所謂分黄導淮者仍導淮出清口合黄入海實因潘季馴舊蹟而稍分河淮之勢云附潘季馴疏畧水性不可拂河防不可弛地形不可强治理不可鑿人欲棄舊以為新而臣謂故道必不可失人欲攴分以殺勢而臣謂濁流必不可分霖䨙水漲久當自消巡鹽兩淮御史王明疏畧淮為泗患漕撫陳于陸欲開周家橋以疏之使遂開則六州縣生靈為魚四百萬漕糧俱便而三十六萬鹽場其沼矣宜令河臣上尋舊攴而殺其勢下瀹舊口而廣其途勿茍且目前貽後日患户科給事中耿隨龍疏畧泗州苦水議疏周家橋施家溝以高寳二湖為壑將運道民業立盡臣曾令寶應聞見頗真夫黄河自徐邳直下東折入海淮亦東北趨會之無所壅遏故不病泗也自黄奪通濟牐横於南淮遂不得東因瀦泗州為患又黄之奪牐南也寶湖受淤淮無所洩運道遂不可守欲弭河患非復通濟牐不可分司郎中黄曰謹疏畧高家堰與周家橋相接一隄也堰以内與橋以内之水相連一淮也使周橋可開則高堰何所事守高堰必守則周橋斷不可開故開周橋者乃開堰之别名也水之就下性也周橋地形與高寶諸湖高下勢甚相越誠開之是導以建瓴之勢矣彼得其勢則流必急流急則一瀉千里孰得而禁之故謂周橋開而淮不盡東淮盡東而黄不復躡必無之理也高寶諸湖四時彌望連天所恃一線漕隄為之保障若引淮入湖則淮水之浩蕩無涯湖面之容受有限不至決裂湖隄而奔潰四出不正也又淮之入湖也易湖之入江也難何也湖隄以外地形窪下與江面不甚昂故今通江之路晝夜宣洩而湖水不見大消使復益之以淮源源不竭則七州縣不胥而為沼乎王乾清周橋牐説萬厯二十五年淮水大漲總河楊公建牐以洩一時暴流稍年即閉從来常開前賢亦云東去最宜開海口西来切莫放周橋蓋周橋開而海口塞黄遏淮也周橋閉而海口通淮刷黄也淮出清口刷黄濟運則涓滴皆為利益淮入湖内潰隄病民則涓滴皆為害源若内湖増一分潰隄病民之准則凊口便減一分刷黄濟運之淮故周橋啓閉利害不可不察顧雲鳯開施家溝周家橋議畧淮由清口以至安東雲梯闗入海即禹貢所謂導淮自桐柏東會于泗沂東入于海故道也自神禹以来未有改者孟氏誤以為排淮泗而注之江則朱子已辯之矣夫淮之趨高寶似便其東流入海似稍迂迴神禹之智豈其不出此與而漢陳登又築高堰以防之迄今治河能臣守其舊而不變抑又何説也蓋水以海為歸者也高寶信下也其東南濱江濱海之處則曰廣陵曰海陵曰蜀岡又曰阜曰嶺不可殫述皆以高亢得名水無所出即有所出而江潮海嘯互為吞吐故瓜儀之有四牐者非徒節其出抑亦制其入以此思之則江湖之水勢可知宣洩之難易又可知淮非由清河安東以入於海别無可為歸宿之地矣而後之人又虞其泛溢而四出也故又遏之以堰語曰障百川而東之高家堰者障之之説也譬之人焉狥一時之便而養之癰不若審血脈之宜而周其適不待智者而後辯也武墩諸牐之水夏秋則流冬春則涸高寶湖隄猶得乗其稍涸之時而施其補葺之計今施家溝當水涸之時已與武墩諸牐同其用矣若更從而闢之是使淮泗無餘蓄而高寶無餘地矣水無時不滿湖無時不漲隄之坍卸即欲修築無所措手況高寶諸湖不過盈溢而止耳平時先已盈溢又何以容暴發之水乎蓋嘗譬之淮泗百石之甕也高寶諸湖升斗之罌也芒稻河杯勺之斟也以罌之腹而欲受甕腹之所受其數不勝也以罌之口而欲出甕口之所出其數又不勝也滿則溢溢則傾傾則散漫旁流不可收拾即欲復歸之甕而宣洩由我不可得已好事者倡為濬闢武家墩高良澗周家橋諸牐之議先實諸湖之腹水無所受故一雨而即盈耳向使施家溝之議早定則此時湖已出於隄上即錮之鐵豈能無潰潰則運道安在無問民矣猶未也此一淮水耳入湖之分數多則入海之分數少而淮弱矣淮弱則黄躡其後而清口淤矣異日者入湖而湖不能容入海而海不能入將瀠迴泛濫合盱泗高寶而為一此其滔天之勢為害不更烈乎涓涓不塞將成江河而況滔滔不止何難陸沉哉昔白馬氾光甓社邵伯諸湖始何嘗不分而今安辨其為某某湖也則泛濫之明驗也古今治水莫如禹禹所治莫大於江淮河漢其萬古不變者則萬古無患惟齊桓公塞九河為一河淤八流以自廣遂為萬世無窮之害所幸江淮尚仍禹舊奈之何輕變古而更生一患哉王介甫欲洩梁山泊之水以為田而憂水無所貯劉貢父曰别穿一梁山泊則足貯此水矣介甫大笑而止今者必欲使洪澤阜陵化為桑田高寶興泰化為魚鼈而其究且復病運是齊桓之過計而貢父之所姍笑也議者不察輒文其名曰導淮夫導人者當導之於正而不當導之於邪導淮者當導之入海而不可導之入湖湖非民田乎又嘗譬之淮為泗患淮即泗之宼也為泗計者宜逐之出境而誘之四出使抄掠内地可乎黄為淮患黄即淮之冦也為淮計者宜堅壁以待而預自退縮使黄得乗勝長驅可乎況今淮黄且合從而至也上不圖守之於要害下不圖洩之於尾閭而今日曰撤堰明日日開溝是不知割地之難於自完而滅虢之終於取虞也二十三年淮水決高堰高良澗郎中詹在泮等嚴督官夫築塞仍加石甃砌河督楊一魁勘河禮科給事中張企程等條議分黄導淮事宜十事從之附楊一魁等條議畧一議裁新隄以免壅潰蓋築隄所以障淮而恐以泗為壑新隄可以議裁而恐裁去太多或貽後悔且應量裁數段以洩准張仍開瓜儀二牐以分高寶之害庶上有洩而下冇歸也為一議闢清口以導淮流清口為准出之門而苦黄壅今雖挑浚猶恐水分勢緩泥沙復入合議嵗修以圖永利為一議浚海口以免内漲蓋黄水倒灌正以海口阻即分黄工就而伏秋水漲勢恐復淤則石䃮口廖家港白駒場諸處海口金灣芒稻河宜乗時開刷以為預圖酌量工程修舉者也按此條議十事内今但載導淮三事備考二十四年分黄導淮工竣南河全考總河楊一魁行委郎中詹在泮等開桃源黄壩新河自黄家觜起至五港灌口止分洩黄水入海闢清口沙七里建武家墩涇河牐洩淮水由永濟河達涇河下射陽湖入海又建高良澗減水石牐子嬰溝周家橋減水石牐洩淮水一由坌河下涇河一由草子湖寶應湖下子嬰溝俱通廣洋湖入海仍恐淮水宣洩不及南注各湖為患又挑高郵茆塘港通邵伯湖開金家灣下芒稻河入江以疏淮漲按金家灣在邵伯南五里許迺通芒稻河入江之㨗徑也是年既開一十四里以至芒稻河復建減水石牐三座由芒稻河通江一十八里亦建石牐一座於是河淮有所宣洩云揚州府志萬厯二十三年上發帑金五十萬役山東河南江北丁夫二十萬明年秋工告成淮果出清口而水患以寜是役也當潘公季馴導治未久淮黄尚由故道特黄以暴漲侵淮稍分之足以殺其勢功不在導淮也而周橋之開為厲階焉二十五年臨淮知縣陳民性建議同指揮趙允昌申請築濱淮石隄以捍淮水鳯陽府志此隄至萬歴二十七年知縣蕭如蕙告成東西三百一十餘丈亘如長虹全城賴以無恙天啓元年淮安雨積旬淮黄驟漲數尺築高堰武家墩等處總河陳道亨躬親課工照段拆修浪窩盡塞至明年工竣崇禎四年淮黄交漲河臣朱光祚議開高堰三牐大理寺丞呉甡編修夏曰瑚等合疏爭之事遂寢附呉甡等疏畧高家堰北當淮泗之衝南扼漕湖之吭地形最為高峻而淮揚兩郡及高寶興泰山鹽各州縣地居下流所謂縣水數仞建瓴之勢也東北保障全藉此堰是豈可輕議開洩者近日建義諸口踰期未塞民田盡沉水底三牐一開勢必以淮揚為壑行見淮泗諸水滔滔東注將高寶漕隄蕩為湖海運船縴挽無路則數百萬糧何由而逹京師各鹽場盡被渰没則百餘萬鹽課其問諸水濱乎數百萬生靈悉為魚鼈則數百萬糧税誰為供輸乎高胲建牐自萬歴二十三年始未幾堙塞今高堰口就圮壞有地方之責者方急議修築而可輕言開濬乎臣等生長淮泗之郷習知地方利害之原乞廣集衆論熟計利害國計民生胥賴之矣江南通志卷五十四
