body:
  text: 江南通志卷七十一食貨志田賦五附徐州一府太海通三州下江屯田徐州府夲直𨽻州於雍正十一年陞府以邳州一州睢寧宿遷二縣并𨽻入國朝原額田地一十萬九千三百七十六頃七十二畝三釐有竒節年挖傷坍荒田地三萬三千二百七頃六十四畝九分四釐有竒節年開墾陞科田地二萬二千二百二十二頃五十五畝六分有竒雍正十一年陞府并入邳州屬田地二萬七千七百二十六頃六十八畝六分四釐有竒雍正十三年實在成熟田地一十二萬六千一百一十八頃三十一畝三分三釐有竒實徵折色銀一十九萬四千六百四十三兩三錢八分八釐六毫有竒遇閏加銀三百三十七兩五錢四分三釐五毫有竒各欵編徵并攤徵人丁銀四萬二百八十八兩二錢二分二釐三毫有竒遇閏加銀一百三十一兩四錢三分六釐有竒匠班銀四百六兩八錢除閏共實徵銀二十三萬五千三百三十八兩四錢一分九毫有竒實徵夲色米六萬六千七百一十五石五斗五升五合有竒麥一萬九千九百二十一石一斗八升五合有竒外不在丁田徵解雜辦銀七百六十七兩七錢六分六釐一毫有竒歸併外衞實在田地一千二百七十七頃六十畝實徵折色銀二千四百一十六兩三錢六分一釐九毫有竒攤徵屯丁銀九十九兩四錢共實徵銀二千五百一十五兩七錢六分一釐九毫有竒實徵夲色米二十七石六斗三升一合有竒麥三百四十二石四斗三升九合有竒銅山縣夲徐州雍正十一年陞州為府以州所屬田地改為縣屬實在田地三萬四百二十一頃九十一畝四分八釐有竒每内則例一分二釐二毫有竒畝科銀五銀三毫二絲有竒六改折嵗夫銀三毫五絲有竒有竒粟米合九勺有竒麥一合二勺攤徵人丁銀四釐六絲有竒匠班銀四絲有竒實徵折色銀三萬九千三百一十兩二分六釐八毫有竒遇閏加銀一百五十一兩三錢一分八釐八毫有竒攤徵人丁銀一萬二千三百三十七兩一錢三分匠班銀一百四十八兩五分除閏共實徵銀五萬一千七百九十五兩二錢六釐八毫有竒實徵夲色米二萬一千二十六石八斗三合有竒麥三千六百六十九石二斗七升九合有竒外不在丁田徵解馬塲租銀一十一兩七錢五分蕭縣實在田地二萬一千九百七十八頃九十九畝二分三釐有竒每内則例一分二釐五毫有竒畝科銀五銀三毫三絲有竒七合六抄有竒粟米麥八勺有竒攤徵人丁匠班銀九毫四絲有竒實徵折色銀二萬八千九百四十二兩八錢五分二釐七毫有竒遇閏加銀四十三兩八錢六分七釐二毫有竒攤徵人丁銀二千九兩八錢匠班銀六十七兩五錢除閏共徵銀三萬一千二十兩一錢五分二釐七毫有竒實徵夲色米一萬五千五百三十四石六斗二升七合有竒麥一千七百六十六石八斗九升二合有竒外不在丁田徵解雜辦銀一百二十九兩九錢七分五釐内積穀軍餉銀一百二十兩九兩九錢七分五釐馬塲租銀碭山縣實在田地一萬三千四十四頃五十八畝五分三釐有竒每内則例九釐六毫有竒畝科銀五銀二毫五絲有竒攤粟米五合三勺有竒七麥三勺八抄有竒徵人丁匠班銀二釐毫有竒實徵折色銀一萬三千三百九十兩八錢六分八釐三毫有竒遇閏加銀五十一兩八錢八分八釐八毫有竒攤徵人丁銀三千四百九十四兩七錢匠班銀六十二兩一錢除閏共實徵銀一萬六千九百四十七兩六錢六分八釐三毫有竒實徵夲色米六千九百七十一石一斗八升三合有竒麥五百四石三斗六升七合有竒外不在丁田徵解雜辦銀二百二十七兩四錢四分二釐内積穀軍餉銀二百一十兩釐草塲租銀一十七兩四錢四分二豐縣實在田地一萬五千一百八十一頃三十一畝八分四釐有竒每内則例一分六釐有竒畝科銀五銀一毫三絲有竒攤粟米二合八勺有竒七麥三勺三抄有竒徵人丁銀一釐八毫絲匠班銀四絲有竒實徵折色銀一萬五千九百六十六兩七錢一分七釐有竒遇閏加銀四十三兩六錢八分五釐有竒攤徵人丁銀二千八百四十兩四錢匠班銀六十一兩六錢五分除閏共實徵銀一萬八千八百六十八兩七錢六分七釐有竒實徵夲色米四千三百二十七石九斗三升一合有竒麥五百四石九斗一升一合有竒外不在丁田徵解雜辦銀二百一十六兩一錢五分内積穀軍餉銀二百一十兩塲租銀六兩一錢五分馬沛縣實在田地一萬四千五百三十四頃二十五畝八釐有竒每内則例一分四釐四毫有竒畝科銀五銀二毫六絲有竒五合六勺有竒粟米麥一合五抄有竒攤徵人丁銀二釐七毫有竒匠班銀四絲有竒實徵折色銀二萬一千九百五兩三錢五分四釐一毫有竒遇閏加銀四十六兩七錢八分三釐七毫有竒攤徵人丁銀三千九百三十兩八錢匠班銀六十七兩五錢除閏共實徵銀二萬五千九百三兩六錢五分四釐一毫有竒實徵夲色米八千一百六十六石九斗四升九合有竒麥一千五百四十石四斗三升七合有竒外不在丁田徵解雜辦銀一百三十三兩八錢六分内積榖軍餉銀一百二十兩塲租銀一十三兩八錢六分馬邳州實在田地九千八百九十九頃八十五畝五分五釐有竒原内則例每畝計算隱地墾荒地每畝俱科銀一額地額外隱漏田分九釐八毫有竒四釐五毫有竒五銀七絲有竒嵗夫銀屯夲色米一合六勺有竒毫麥五合二勺有竒有墾地科銀一分九釐七有竒五銀七絲竒色嵗夫銀四釐五毫有竒五合六勺有竒夲米一合六勺有竒麥暫墾浮地科銀一分八釐二毫有竒釐一毫有竒嵗夫銀四首墾地科銀一分九釐八毫有竒五毫有竒嵗夫銀四釐攤夲色米一合六勺有竒竒麥五合四勺有竒徵人丁銀五釐五毫有實徵折色銀二萬四千二百九兩三錢七分五釐五毫有竒水面浮田抵補丁銀一千三百六