body:
  text: 江南通志卷九十一學校志試院貢院在江寧府城縣學之東明景泰間建中有樓曰明逺堂曰至公左右為監臨提調院列以騰録對讀供給諸所堂前為東西文場號房堂後有池架橋於上曰飛虹橋之北有門後有堂七間中三間為衡鑒堂左右各二間為主考官燕室左右掖皆有屋為五經同考官所居前有寫榜刻刷內㕑諸所隆慶間都御史盛汝謙購隙地繚以土垣四圍巡警外設公館及羣舍以備供饌附吳節重修碑記貢舉有院內外通制也南京應天府為天下貢院首其制度亦為四方所取法自設科以來其地凡四易洪武初以北城演武場為之永樂中移於郡學文墀正統間復徙武學之講堂後士多地隘非闢廡毀垣不足容景泰初府尹馬諒將修述職之典於朝乃進耆宿而咨之咸曰秦淮之陽有地廓如前武臣沒入廢宅也鞠為氓𨽻之圃久矣若葺而理之可辦也公曰諾即具疏以聞詔禮部勘覆如其言遂與府丞陳宜首任經費而寮寀之良亦各捐俸為助鳩工市材募力啓土盡撤其舊而新之中為至公堂監臨侍御與知貢舉官居之左右夾室則封檢對謄之所也後為內簾寢室翰林正考主之東西有廂則同考師儒校讐之處也堂之前地平而勢整甲乙相向可為席三千有竒所以待士也由南而入則重門縈紆護之以棘所以防搜檢而嚴更僕也與凡庖湢之房餼廩之庫亦有位次而仆物之需几案之用又皆因時而為之者也工畢適嵗癸酉大比届期合成均與畿甸之士奉試如式比轍棘而得人加多乃相與列宴於新堂之上時鹿鳴興歌籩豆有踐流觀煥彩文物交並京闈科貢之盛於斯為備矣天順改元恭逢聖君蒞祚首降恩詔切於求賢於是京府長寮以為文運方隆乎昔而是院更新宜有所記乃具始末來徴文將刻諸石竊惟進士之科始於成周盛於漢唐宋而最盛於明蓋士君子入仕之顯階至公之通道也然儀必當物禮不虛隆故敷納之訓式燕之雅具於經而賓興之典計偕之令又於禮制有足徵焉然此皆上之所以待士也若夫功業相尚以致君澤民為心掀揭天地而宣昭古今則又在乎士耳不然則賢能之書奚以表見於當世耶節忝斯文嘗執筆於此不敢以菲薄辭謹述具造之由以彰昭代人文之盛美尹丞締構之功兼以諗夫豪傑之士各勉魁擢於後日云國朝雍正二年總督查弼納捐資增設號舍十年署總督尹繼善又捐修堂簾廣增號舍規制甚備江寧府試院一在府城大功坊南明嘉靖間御史盧煥建萬厯間圮御史陳貞復建國朝順治間為民居所侵康熙五十二年巡撫張伯行重建都司章秉法董其事規模閎整附張伯行記省會舊有學使者試士之所在都使司廨東順治庚子後始廢康熙甲戍乙亥間有議復者乃中止焉越十餘年太學生左史輩倡復之輒又止豫以監臨癸巳科試事諸生張元等請復於豫四月工興明年五月竣士皆以試於會城為宜乃記之曰事難成而易毀也茍非其人之賢且才能力持之不可動搖烏能轉毀而為成哉當是時制軍長白赫公韙之則其德於十四郡之士也甚大豫因檄㑹稽章公秉法太守平陽衛君洪相與力行毋惑其檄章君從人望也章君於是集其鄉先生及三庠弟子員之任事者與夫富商大賈之由成均而來系籍者注名有簿捐金有條而閩海之降將子弟久於其地弗能遷也資而遣之闢地鳩工材甓具而斧斤施始則巍然而堂成再則邃然而室成其樓宇則翬而俯其左右個則翼而承主有息而賓以寧輿儓胥書之所憩㕑井之所炊汲廄厠無缺堂之前則試士東場也坐人以八百計西亦如之其高下之坐具亦如其人之數他瓊屑者又皆與焉繚以周垣表以棹楔中則冠以大扉二加闌楯而護之所謂鎖㕔而試者也夫古者士習於學宫自詩書六藝至於論治論獄出兵授捷之材皆取於此故人才真而弦歌弗輟後世為士者又徒雕琢於文辭以自見勢不得不廣其地以試其材然國家大體必於㑹城為宜者誠有見於地之不可易而君子亟亟儲材之意斯為至也若其往試句曲疲於舟車徒步以漂溺寒餓為憂其小者也一在句容縣治東南舊書院址始督學駐省城諸生就試明萬厯二十三年督學陳某即其地建試院四十年督學熊廷弼復因舊基重建後學使嵗試每駐節焉雍正十二年總督趙𢎞恩議令嵗科兩試俱駐江寧多士便之蘇州府試院在崑山縣治東南薦嚴寺左故范石湖書院明宣德間知縣羅永年建為巡撫行臺後為督學校士之署國朝順治初廢十五年提學僉事張能麟重建太倉州舊屬蘇州府科嵗試皆赴崑山今仍其舊附張能鱗記江南學使者年來更易不常自繡衣持衡則東西院並既而差復未幾又以金馬代花驄近侍史臣文雅權衡並隆一時宜其安且久也乃諫臣以各省例議歸憲司上可其奏選於六曹余謬膺㝢內人文最端本澄源移風簡命承乏兹役竊念六郡為易俗余責也而考經訂藝多士其環聽焉何可無設棘地淮揚則署海陵常鎮則署澄江蘇松則署鹿城由來舊矣鹿城之址在東南隅㢲位興文育才文筆峯實鍾其靈慨自兵燹而後一望荒烟茂草每當嵗科校士或逺調江上或權宜郡學十餘載來無復知有崑之試署者豫下車亷得其詳力以建復為已任躬履其所經畫規模左右為僧俗所侵者悉闢之石坊轅門班房鼓亭俱如制大門儀門各五楹儀門外土地祠三間並祀范公示不忘本也府縣㕔三間執簿呼名以恤勞也大堂五楹前後軒敞高亮川堂聨絡後堂亦以五楹建東側小屋八間為胥吏書寫地向後則自公門所以别內外也門內則公衙明三暗五明者為衡鑒堂暗者為息偃地也兩側小構數椽亦可以休從者最後為旭升樓九楹正五旁四環抱桶然樓東尚有餘地為小齊五間種植竹木可以節勞小憩也樓後圍牆舊有荷花亭尚可擴充以俟後之君子經盡甫畢適徐君邦俊來視邑事亟屬之暨命邑廣文王君鯤化張君希哲乃陶乃甓乃匠乃石拮据綜理自丁酉初夏經始孟秋告成士民來觀者曽不意其神速至此也嗟乎天下事莫不難於慮始茲幸始而終矣校士有地諸士可無逺涉之艱郡宫牆亦永無蹂躪之跡惜寒士而妥聖靈此非不亟之經營也徐侯輩請記於余遂授之簡松江府試院在府治東大街舊察院署始松士嵗試赴崑山科試赴江陰跋涉多費國朝康熙三十八年郡人莫之攻捐資倡買察院後顧氏宅拓而大之諸生捐助創建試院提學張泰交始按臨校士於此常州府試院在江陰縣大街虹橋東宋元間為澄江驛明初吳良鎮江陰居此萬厯四十三年學使按部校士拓為督學察院國朝因之其規制閎敞為江南學使駐劄衙門向嵗試常鎮二府科試蘇松常鎮四府皆在此後各府俱建造試院科嵗試惟本府生童今下江學使仍駐劄於此鎮江府試院在金壇縣治南鎮江向無試院府屬生童每科嵗俱就試江陰國朝雍正八年金壇丹陽二邑諸生倡捐建立試院於壇邑提學張廷璐始按臨考試淮安府試院在府治南府學之西即中察院署國朝順治中改為試院其考場向沿席棚雍正二年知府祖秉圭山陽知縣羅珮教授蔣文元等易以瓦厰海邳二州向皆附考升直𨽻州後亦然十一年以邳州屬徐州府科嵗試改赴徐州揚州府試院在泰州治東明時本鳳撫軍使院萬厯間巡撫李三才拓大之國朝康熙中改為試院以其地當十屬之中故學使按揚必駐於此四十五年知府左必蕃重修附宫夢仁記今之試院昔鳯撫軍使院也撫使者移撤不常後遂為校士之所每學使者按揚必蒞茲焉蓋以地當十邑之中道里均而往來便也然傳舍視之有司不暇顧問而典守者因緣作奸風雨之城社之狐鼠日甚一日及此不修無論行部校士時處非適中則文移期會動需時日而呼應不前在應校之士舟車跋涉館舍飲食之所費亦大不資舍逸就勞既為吾州之士之憂辭近即逺更為吾郡九屬之士之憂記曰有其舉之不可廢也嵗丙戌㑹學使者檄至紳士倉皇無所出不得已創捐修議請於州不得請於府乃得之當是時東粵左公以清卿之二特㫖留刺揚州愛士憐才於文章尤篤嗜往時童子應府試咸詣郡彚十屬分場如學使者故事於是公止泰童子勿西九屬既試卜日減從扁舟野次於州之南津屏去一切供帳黎明城扉啓而入集童子於學宫試之畢試而返才兩日耳諸童子以府試資斧踴躍捐修闔邑紳士佽助之得若干金汪學博姜僉判董其事不五旬而既圮之試院煥然改觀矣使其時公亦如州牧不問則紳士之議寢勢必涉江而南後因為例暑雨祁寒往返闕津道路間其茶苦伊於胡底公蓋不時為今日士計且為士之子若孫計並為九屬士之子若孫計而更為吾州億萬户計何則吾州疊罹水患凋敝已久公謂三年兩試僦居有邸閣之資列肆有竒贏之獲泰之人利可百千焉以三十年之通計則百萬可致也落成之日碑而榜之曰勿毀牆宇勿肆芻牧勿作吏局雜場即往來憲使至止亦必禀命於州於學隨啓隨閉著為令甲而屬余記之雍正元年知州魏錫祚復修徐州府試院在府城東門內國朝康熙五十四年知州卞之鈞姜焯相繼創建為督學試士之所始徐士赴淮與試逺者往返千餘里又有黃河之險至是稱便通州試院在州署東通士舊赴泰州與試國朝雍正二年州改直𨽻建立試院學使始按臨考試安慶府試院在府治東舊察院遺址國朝順治七年操撫李日芃檄建東西文場大堂捲㕔規制畢備附李嵩陽記皖城自昔稱重鎮其山秀鬱其水潏蕩其人磊落英多俗饒魚蛤菰蒲之利習儒術敦詩書然以地介吳楚襟江流而蔽淮服曩昔多事輒先受兵亦形勢然也二紀以來干戈未戢順治六年大中丞培原李公自冮上督師兼撫治所屬建閫是邦歷覽四封喟然曰此三分後所云上遊要地也今海內一家治化旁達乃獨為匪民耶於是勤詢民隱得其利病無不為而去之勞來安集流離日還户口日息既富且教翕然從風郡故有察院嵗久陊壞公念諸生就試無地赴調為艱乃親營度鳩工葺治支柱邪傾垣墉塗茨孔曼且碩煥然改觀復闢餘址為堂為軒廊廡周通房闥相次殖殖噲噲從前所無創建瓦厰傑然對時爽塏高朗列凡八百如櫛如鱗多士以寧因感生奮先是皖為用武之區學使者不至草有餘載矣豫自滁陽實始來此所歷淝舒諸境荒逺闃寂俄見車馬絡繹輿衛甚衆則公所遣迓也及就館舍供具帷帳部署井井豫因竊嘆公之經營四方調燮五緯洪巨纎悉畢舉不遺類皆若是是可師法也已自是厥後皖之習俗丕變人文稱盛當且度越疇曩吾知百世而下猶拜公之賜寧特一時多士式歌且舞哉以庚寅孟夏告成始居之者為黃池李嵩陽因書以示來者俾知所自康熙十二年知府姚琅重建大堂四十八年諸生江岱等倡捐拓地徙儀門於南十數武增置號舍雍正十年東西文場為大風所傾頽知府徐士林捐俸並募七學諸生增建文場東西四十二間又增監視㕔三間於東偏工未竣同知李國相署府篆委懷寧縣教諭謝有輝監生江巒監工於十一年告成徽州府試院在府治東元䝉古字學遺址明時建為察院國朝康熙二十八年休寧監生黃鳳翼捐資建造棚厰為試院學使始按臨嵗試而科試仍在旌德雍正三年上下江分兩學使科嵗試遂俱在本府試院嵗久朽敝十二年歙人汪濤捐資重建大堂內署頭門儀門及四圍垣牆并增造樓房為寢息地規制煥然寧國府試院在府治西舊為宛陵書院明宣德中推官尹崇高因故址建正統間知府增修為巡撫行臺後相沿為憲使往來公館國朝康熙二十五年宣城知縣袁朝選捐資修建瓦厰為學使者校士之所先是生童俱赴旌德縣考棚應試至是便之廣德州無試院其嵗科兩試向俱赴寧國府附考今仍其舊池州府試院在城西街即舊西察院明時建為憲使往來駐節之地學使按臨亦校士其中今尚如故太平府試院在府城東本東察院明巡按御史駐節處國朝康熙七年督學按臨遂為試院十年當塗知縣寇明允修葺久漸圮壞三十四年知縣祝元敏重修四十四年知縣成文運捐俸重建移儀門前數十步武場遂寬雍正三年上江學使孫嘉淦大加修葺增建棚厰駐劄於此後皆因之廬州府試院在合肥縣學前鳳陽府試院在府治東即舊西察院明成化間知府南鵬建國朝康熙五十三年學使胡潤建東西文場瓦棚潁州府試院在府城東門內國朝雍正三年知州李月槎建今升州為府遂合潁上霍邱亳州太和蒙城五州縣士子為公試之所其亳州試院雍正九年建於州治學宫之右而嵗科兩試不復按臨矣滁州試院在州城內康熙五十年燬於火五十一年知州溫而遜重建和州試院在州治振肅坊城隍廟西即察院行臺舊址國朝雍正九年署知州曹元夢學正唐德咸募建六安州試院在州治東大街在宋時為六安軍凡軍皆立試院故址無考國朝雍正五年知州李懋仁捐俸倡建𢎞厰邃密督學李鳳翥始按臨考試泗州試院在旴眙縣上龜山國朝雍正四年建江南通志卷九十一
