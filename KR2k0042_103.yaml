body:
  text: 江南通志卷一百四職官志文職六明分轄洪武王子謙楊元杲夏仲信以上應天府知府藺以權鄭沂張遇林尚寶劉仁李拳徐鐸曹廷訓班用吉曽朝佐冦徴髙守禮孫鳳尹寶李德林衡宋翊建文向珤永樂姚恕夏思忠汪翔于潛陳福李秀顧佐薛均洪熙紀正宣德黃茂張璘史怡鄺野正統陳俊李敏景泰馬諒王弼郭士道成化畢亨彭信魯崇志于冕𢎞治楊守隨秦崇樊瑩冀綺髙敞韓重吳雄正德陸珩沈鋭黃寶常麟周宏丁鳳孫春張淳歐陽旦白圻黃瓚王宸龔𢎞胡宗道王震嘉靖聞淵王爌陳錫陳良器陳鼎江曉邊寭柴竒孫懋戴金陳卿袁擯戴儒吳瀚洪珠歐陽孰蔣應奎吕顓鄭漳扈永通李珊汪宗元葉鏜鮑道明吕光洵吕時中孟淮魏尚純唐寬劉自強劉望之王鶴李一瀚隆慶談大初畢鏘周俶塢璉杜拯陶承學萬歷楊成汪宗伊吳文華程嗣功陳于陛隂武卿方良曙劉志伊劉庠遊季勳吳善顧章志袁三接孫丕揚石應嶽張檟陳文燭邵仲祿楊廷相程拱辰張孫繩熊惟學趙欽陽徐申王一乾陸長庚汪道亨黃承元姚思仁王三才泰昌徐必達天啓鄭璧畢懋良魏説談日省李逢節祝以豳周維京崇禎黃景華詹士龍劉之鳳王心一劉餘佑戈允禮祁逢吉劉士貞王廷梅以上應天府府尹洪武何質王暄陳寧趙棠金絅丁士梅吳懋魏觀王虎王興宗李亨湯德石海王繹李幹陳彥昌祝茂張亨祝宗善張冠黃彥端黃文王觀楊幼文樂倫吳賢矯順姚善永樂薛瓘湯宗王恭鄭真李鼐李綜董翥劉麟李從泰宣德余士賢况鐘正統汪滸劉華甫李從智朱勝天順楊貢姚堂林鶚邢宥成化賈奭邱霽劉瑀李廷美𢎞治賀霖孟俊史簡曹鳳林世逺正德鮑輦林庭昻劉恱徐讚嘉靖戴冠胡纘宗陳文沛李顯聶豹李珣王儀崔允王鴻漸張元孝馬敡王廷范慶金城林懋舉溫景葵王道行徐節劉溱蔡國熙隆慶李鍵吳善言萬歷李充實朱文科俞嘉言石崑玉盧大順孫成泰朱燮元周一梧李右諫趙世祿林紹明陳訏謨沈萃徴天啓寇慎崇禎王時和史應選陳鍾盛陳洪謐陳師泰以上蘇州府知府洪武王立中荀玉徵陳定盛升林慶劉鑑鄧處善何賜甄庸永樂黃子威夏忠宣德趙豫正統黃平景泰葉冕天順李惠田臻成化白行中申剛王衡樊瑩劉璟𢎞治陳讓劉琬正德金洪翁理陳威喻時吳鉞孔輔嘉靖張文明路迎何鰲熊宇黃潤朱潤黃㠏何繼之馮彬劉存德方廉黎道訓史直臣臧繼芳袁汝是朱茹隆慶袁正吉李向陽萬歷查志隆王以修賈待問曾如春閻邦寧胡峻德喻均詹思虞李多見柳希點李再命許維新蔡增譽張九德劉可法張文炫莊育慶張光縉陶鴻儒天啓張宗衡仇時古崇禎方嶽貢陳亨姚序之以上松江府知府洪武髙復孫用張度商準董子琦王伯啓李德善安盛王士良黃𢎞永樂萬子雅陳貴芳洪熙熊觀宣德余文莫愚正統葉蓁景泰周源天順蔣忠王慥卓天錫成化龍晉劉鈺孫仁華仲賢𢎞治曾望宏連盛楊二和正德史俊馬騤李嵩王教嘉靖陳實申綸張大綸趙兌應檟陳大用張志選符驗郭廷冕余勉學陳宗夔金豪邵惟中朱袗湯賓李幼滋隆慶許嶽郭文輔施觀民萬歷陳應薦穆煒王三錫談桂馬化龍錢守成田一麟邊有猷周一梧歐陽東鳳王述古黃德貴杜承式陳幼學劉廣生泰昌何應瑞天啓曾櫻崇禎石萬程洪周祿王觀光陳琯吳兆壆張𢎞志傅天錫閔自寅郭佳以上常州府知府洪武楊遵管景清強立趙有慶蔡景初張子茂徐誼劉思道同允恭俞能淨薛岩劉辰劉景文徐邈羅觀永樂鄭桓楊紳遊端正統郭濟吳崖張巖景泰白仲賢林鶚姚堂成化翟敬史素黎福熊佑𢎞治鄭傑王存忠劉績邱經羅循林魁周霖正德謝表滕謐劉儲秀嘉靖李珣劉可鄭琬陳文譽張珤林華陳天然申價郭鑰都文奎錢嶧吳一瀾秦淦潘一桂隆慶胡維新王惟善林應雷萬歷張純鍾庚陽王事聖吳撝謙曹一鵬范世美王繼明王應麟許國誠蘇兆民霍鎮方康應乾賈熙績李中行康邦濟翁為樞賀仲軾崇禎陸懷玉王秉鑑印司奇程峋李原立錢良翰傅廷獻以上鎮江府知府洪武范中姚斌任光祖潘傑施禮永樂林士敏姬圭宣德彭逺楊理正統程宗邱陵景泰田臻天順楊昶成化袁潔范洙韓邦問𢎞治徐鏞才寬方榮邊憲楊遜正德趙俊華璉劉祥羅循薛贇張錦嘉靖于桂田賦朱實昌路迎葛木王鳳靈袁淮孫繼魯周洪範張守約姚虞劉良卿趙大綱張敦仁蔡楊金劉崇文范檟李幼滋劉祐傅希摰隆慶黃國華陳文燭萬歷邵元哲宋伯華樊克宅張允濟倪凍李元齡馬化龍張國璽劉大文劉如寵張經世杜縻姚鋐詹士龍髙捷蔡侃宋統殷天啓沈振龍宋祖舜許令典田所賦董允升崇禎汪心淵衛印文康萬民周光夏石磐以上淮安府知府洪武周福原盧幼學談有得戰慎何子華陳寶龎清鍾旭關敬祿張本永樂王思髙敏田慶陳真宣德李真正統韓𢎞景泰陸疇汪庭訓王恕天順王勤何謹成化鄭岑周源髙岡楊成吳嵩𢎞治馮忠房明唐愷王恆許節王恩正德王鐸鄧文質何顯孫祿李師儒蔣瑤彭大治易瓚嘉靖陶儼侯秩王松韓楷劉宗仁朱懷幹馮良知衛尚綸韓一石吳桂芳石茂華任希祖毛术張正位衛東楚隆慶陳學伊徐尚賈應元萬歷嶽維華潘頥龍趙慎修虞德周標蔣希孔傅來鵬王雲鷺徐應聘吳秀郭光復楊洵張廷相朱錦趙良相朱一鶚郭之琮吳嘉謨林銘鼎天啓劉鐸楊嘉祚李拭顔庸暄周頌崇禎謝宸徐伯徵張䱋化韓文鏡馮文偉吳震交馬鳴騄任民育以上揚州府知府洪武談啓宗楊希元趙好德邵彧周濟錢性王和符濟王璜葉瓊周翔沈和徐傑鍾藩張冕史簡楊茂元陳雲鶚王璠周洪趙鑑郭絍陶煦正德馬文張文錦胡纘宗陸鈳羅英姚正嘉靖石簡林鐘吳麟陳暹王崇古底藴李遜朱瑞登潘仲驂曽汝檀方攸績黃錝周希哲王宗徐查志隆吳孔性胡心得唐守欽葉夢熊楊道會許評李守約趙夀祖韓棹徐民式林非珂鄭國俊趙世徵喬進璠連繼芳楊堯華沈中英陳鑣李士榮遊雲鴻田大本皮應舉楊肇泰邊壆杜繩甲崇禎傅夢弼以上安慶俯知府洪武魏君祥李納胡善權緯張孟善何敏中陳彥回永樂黃觀張從道任勉宣德楊鈍崔彥俊正統孫隆孫遇景泰華能天順龍晉成化周正王勤王哲張鼎𢎞治似鍾李延夀龍夀祁司員王問張楨彭澤何歆正德柯英熊桂張芹留志淑鄭玉嘉靖南夀王繼禮馮世雍鄧繼曽林山佘勉學來聘李天寵朱有孚陶承學周滋胡孝何東序隆慶段朝宗崔孔昕萬歷蕭敏道徐成位王京髙時古之賢董石沈文陳所學沈茂榮梁應澤楊松年塢元會楊楷洪有助劉可法周士昌天啓陳士章劉尚信洪應衡崇禎陸錫朋戴自成任政頡鵬唐良懿秦祖襄以上徽州府知府洪武黃榮祖楊觀陳灌鞠騰霄胡乾佑塗節林彥常王煜俞尚宇邵仁吳昭吳元肅永樂禢明德宋獻李仲真榮貴武彥宣德鄧本道王澍正統袁旭張裴葉錫天順沈性成化俞鐸王勤楊禮劉槃鄭勤塗觀黎福葉亨𢎞治范吉劉廷瓚華璉正德惠隆劉寅楊鳳余志鄭文炳胡東臯嘉靖及宦區越屠應坤邵曄黎晨曹邁胡湘紀資尹字趙應祥劉起宗朱大器方逢時羅汝芳沈志言隆慶朱茹鍾一元戴鳳翔王嘉賓萬歷陳俊鄭繼之王之仕李國觀廖恆吉蕭良譽林民止張德明史起欽金勵馬從龍余士奇杜文煥關驥天啓董懋中王公弼黃夢松崇禎周光夏徐大儀周維新錢敬忠以上寧國府知府洪武劉行任孫炎王祖慎王希顔趙安晏毅盧耀正統楊俊葉恩王應清天順鄧儀成化李宏常顯金溥郭哻𢎞治陳良器包鼎祁司員正德白翺萬英何紹正嘉靖田賦胡汭韓楷侯緘陸岡曾仲魁柯實卿王崇陳子文杜秉彛周鎬黃顯陳應和吕孔良鍾一元尹士龍隆慶馮叔吉鍾榖萬歷王頥郭四維劉孟雷姚士觀王嶽錫何思登張堯文錢檟方遂章堯相黃流芳李思恭胡芳桂天啓姚來寅潘應龍王家相崇禎顧元鏡孫如石公印惠戶實莊尹辰潘汝嘉謝禧昌以上池州府知府洪武李習邱以敬許瑗范常潘有慶江河王原真王謙盧彥中劉有年永樂髙仕耕徐敬宣德楊銘正統姚政楊仕敏景泰李郁天順揭稽俞端李巽成化施奇周鳳焦恕髙輔劉忠器𢎞治徐節項經周進隆正德龍夔周統趙維籓傅鑰嘉靖底藴熊蘭陶儼林鉞張珤祝詠王廷梅路珠周祖堯馬森宋淳姚汝舟任有齡包應麟吳一儒張大化費增黃泮隆慶王璽丁懋儒萬歷錢立林烴王貽德林一材楊守仁沈大忠陳璧顧汝學劉應鈳王繼明鄧思啓何士林胡爾慥李若訥天啓劉士鰲閻暖崇禎王蒞顔容暄孫如蘭劉正衡馬呈德杜時髦鄭瑜易第昌以上太平府知府洪武吕文燧潘傑梁詵蘇敏永樂曾由正宣德揭稽正統衛宗孟甘瑛史濡天順孟玘朱鏞成化楊昶邢珫余鐘葉盛李崙𢎞治宋鑑馬金正德楊璲徐鈺向文璽龍誥嘉靖陳桓周琅王鴻漸髙汝行王松項喬吳縉王浙黃虛中吳嶽張瀚髙節雷逵張萬紀汪克用屠仲律喻南嶽吕鳴珂隆慶陳懋觀張大忠吳道明萬歷曾如春葉如春王俸徐應聘王之士張道明喬學詩范以淑龔廷賓卜汝梁潘榛李克敏張光縉邱雲肇馮聖世賈克忠天啓張正學劉應召任大治崇禎史啓英嚴爾圭吳大朴劉彥朱廷煥王虛白鄭履祥周有翼邵起談元方以上廬州府知府洪武嚴達張遇林蔣子杰永樂楊浩宣德熊觀正統楊祖楊瓚景泰仲閔天順何源成化張鄜戴耀李巽閻琮王誓南鵬𢎞治章鋭張貞孟俊邊憲正德范希淹汪金恩羅玹李師儒故文璧張麒曹蘭嘉靖底蘊曹嘉及宦李瑜劉佐劉安邵元吉賈準葛廷章李愈饒天民杜汝貞熊勉學靳學曾盧鎰王應璧劉臻宿應麟潘一桂隆慶周汝德王一鶚趙體敬萬歷張登雲張寧李枝秀王繼祀張大孝天啓吕封齊晏日啓歐陽充材崇禎徐世隆許國士顔容暄李應節李可植張以謙以上鳳陽府知府洪武文景宗髙玉琳張景徐恆田瀆楊節仲宣德楊祕正統湯惟堅章贊知賢蘚璟任泰景泰羅正宋誠天順王敘成化陳廷璉張琳和鸞朱鼎劉憲𢎞治何宗理王寅正德上官崇栗銘張行甫武雷樊準張淮嘉靖盧永春郭天錫李邦孫光魏頌陸時望陳克昌熊林王重賢陳淑美何莘李桐胡麟王霄鄭維邦鄒臣隆慶王鈗章世徵劉順之萬歷孫養魁劉正寬唐民敏張士美許知新徐鄰劉萃曾士毅張執關香夏崇謙劉民愛張崇烈張正綱程宇鹿傅維翼汪心淵天啓張國用辛聨魁霍震宇崇禎米良翰韓雲孫振基楊錫璜楊思乾李宗奇劉中衍冉孺能朱統􅣏紀天祐瞿鳴岐何復朱藴𨫼以上徐州知州洪武戴玉朱從善陳祥周鼎魏鑑杜敬永樂王理陳璉正統唐振景泰彭光天順周正汪昱成化周信𢎞治曾顯陸琛正德張元春陳璧嘉靖陳則清王邦瑞鄭慶田汝成林元倫趙大綱畢竟容沈志言葉露新隆慶李文簡萬歷丁士奇王永寧陳允升盧洪夏孫森天啓謝于教吕新周崇禎劉大鞏李繩勳以上滁州知州洪武張純誠陳善曹文李相孫時舉陳琦永樂戴泰一康慶劉亨黃恕宣德蕭雲舉正統朱沅侯潤天順劉隆成化程獻張晟𢎞治林長繁王卺正德顧珀徐子熙孔公才沈圻楊天茂嘉靖易鸞賈應春孟雷張淑宣李渭宋繼先張思忠晉朝臣隆慶康誥萬歷趙如崑尤光被曾克唯郭繼芳謝嵩陸廷誥天啓陶榮齡孫克明崇禎薛坤黎𢎞業萬民戴左瑛以上和州知州洪武陳寧魯參周遜永樂羅坤泰楊翰宣德仲端正統劉銑景泰鄭賢天順陸鳳藍洪成化周瑛𢎞治辛禮正德趙崇賢喬岱江暉嘉靖王邦瑞歐陽乾元李得春隆慶周聚星萬歷吳同春何鳯起陸長庚屠謙任春元段猷顯李得中張嗣誠史躬盛天啓許國器崇禎李時翁日襄程良符趙景和以上廣德州知州江南通志卷一百四
