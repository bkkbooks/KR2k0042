body:
  text: 江南通志卷一百八十五人物志列女完節四安徽寧三府安慶府元范遇時妻顧氏懐寧人少寡苦節四十年延祐年旌明羅仲𢎞妻方氏望江人夫歿方秉節不二洪武年旌謝咸妻林氏望江人咸歿矢志守節洪武年旌錢時妻孫氏桐城人洪武中時同部郎白李善長之寃上怒連坐賜死孫年二十七負時骨歸塟養姑守節年七十終方法妻鄭氏桐城人靖難師起法被逮至皖江遂自沉氏年二十九守節四十年祀列女祠陶鏞妻鍾氏桐城人鏞被遣卒於外子繼㓜鍾年二十五乃負鏞骨四千里歸塟守節至八十二終繼又早亡其妻方氏生子亮裁二嵗誓以死守亮舉景泰癸酉鄉試卒其妻王氏妾吳氏皆少寡無子紡績自給終身成化間詔旌其三代人稱曰四節里盛徳妻倪氏桐城人少寡父母令改適倪以死拒苦節歴四十年嘉靖年旌王寛妻張氏望江人早寡姑欲嫁之張嚙指剪髪乃免歴年八十七終事聞旌表畢琛妻鍾氏太湖人李益妻陳氏宿松人俱正統年旌張旻妻李氏宿松人姜標妻徐氏宿松人俱𢎞治年旌尹衡妻葉氏桐城人嘉靖年旌王相妻蔣氏望江人年二十五而相逝矢志貞堅不事膏沐周心吾妻吳氏桐城人年二十三夫亡矢志撫孤事舅姑極盡孝守節五十六年吳一介繼妻程氏桐城人夫亡氏年二十七撫前室子如己子歴年九十二終葛晟妻金氏潛山人早寡守節朱得妻王氏潛山人早寡矢志守貞諸生陳尚俊妻孫氏潛山人夫亡守節陳思器妻萬氏潛山人早寡守節以上俱受旌表蔡魁妻王氏懷寧人年十九夫亡無子剪髪矢志紡績自給以終方吾妻吳氏桐城人年十八夫亡子甫三月欲以身殉姑乃諭之曰成一時烈易撫三月孤難婦為其易難者貽誰氏從之苦節撫孤萬厯間旌表金一榜妻陳氏金一柱妻倪氏潛山人俱少寡撫孤成立人咸稱為一門雙節孫詔先妻吉氏太湖人年十八夫亡守志壽九十一終萬厯中旌吕鳴鳳妻顧氏太湖人少寡有遺腹子守志不奪萬厯中旌太學生匡有光妻艾氏太湖人年十六夫亡截髪毁容乃撫遺腹子成立至八十終事聞旌表姚孫棨妻方氏桐城人年十六夫亡自營繭室移夫柩而藏之以俟同穴至八十四終胡卓妻周氏望江人少寡無子抱夫木主歸母家坐卧一小室數十年如一日以上萬厯中旌章蟠妻吕氏太湖人吳逢愷妻李氏太湖人范甲妻張氏太湖人以上俱少寡勵節受旌盛可美妻尹氏桐城人少寡守節四十年天啟年旌章崇雅妻洪氏懷寧人夫亡守志刲乳肉救姑年九十而終夫兄崇古亦早亡姒朱氏並以節著俱天啟年旌張蓁妻余氏宿松人吳仕泮妻黄氏宿松人唐良明妻李氏宿松人以上俱守節旌表余象儀妻王氏桐城人吳應燦妻王氏桐城人胡仲禮妻張氏桐城人龍䕫妻汪氏桐城人胡惟徳妻黄氏桐城人周聨妻陸氏桐城人劉賔妻笪氏桐城人李達徳妻張氏桐城人盛應舉妻王氏桐城人並以上俱少寡守節享大年李舟妻徐氏桐城人少寡撫孤五十餘年事聞旌表汪之東妻阮氏懐寧人方福一妻王氏懐寧人邵英妻左氏懐寧人陳通妻汪氏懐寧人陳信妻趙氏懐寧人昝保兒妻杜氏懐寧人嚴文昌妻張氏懐寧人汪混泉妻丁氏懐寧人俱守節旌楊大善妻劉氏懐寧人夫亡生子方七日子長復亡苦節歴五十年楊之顯妻吳氏懐寧人刲股救姑早孀矢志守節撫孤成立事聞旌表胡效才繼妻周氏桐城人年十六歸胡事姑孝撫前妻之子不異己出效才卒於京邸周悲號輟飲食者五日乃矢志苦節教子皆成立事聞旌表胡效政妻龍氏桐城人少寡守節年逾九十徐桓妻章氏桐城人少寡勵志撫孤成立年逾九十終方柏繼妻余氏桐城人年十七歸柏六月夫亡撫前妻子不異己子壽逾八十終彭法聖母汪氏太湖人年十九夫亡撫孤有成以守節旌嚴世遨妻劉氏太湖人年十八夫亡撫遺腹子成立時有茗山菴鐘三鑄不成僧夢神告之曰須用節婦金環僧遂往募之鐘成環現於外觀者驚異饒歳梧妻劉氏懐寧人少寡苦節年八十四終程士朝妻聶氏懐寧人剪髪誓守年七十餘終吳汝淳妻張氏桐城人少寡撫嗣子守節四十年楊楫妻張氏桐城人周檟妻方氏桐城人吳豫妻方氏桐城人吳希朝妻伍氏桐城人胡效賔妻陳氏桐城人周則成妻劉氏桐城人孫郎妻吳氏桐城人以上俱少寡無子守節汪觀妻王氏桐城人觀得心疾禮成之夕暴死王遂誓不再適父母兄嫂相繼逝獨守五十載績枲自給人稱為王節女劉鍾致妻胡氏太湖人少寡守節被旌劉銀妻胡氏望江人年十七于歸五月夫亡苦節四十餘年邑令嘗以狀聞兩臺歳給粟帛庠生方九錫妻蔣氏太湖人方一正妻仇氏太湖人胡永恭妻何氏宿松人何大升妻沈氏宿松人章鏜妻范氏望江人六以上俱少寡歴年十餘終龍子宗妻胡氏望江人少寡守節歴六十年終洪佛妻安氏桐城人夫亡依兄嫂守節六十年盛汝恩妻何氏桐城人早寡誓守撫孤年八十七終吳應道妻方氏桐城人夫亡苦節養姑訓遺孤成進士事聞被旌黄之宣妻包氏桐城人宣病篤刲股救之踰年宣死包乃誓死以守女適徐亦早寡不再適母女相依稱為雙節張士絅妻范氏桐城人姑病刲股以進早寡撫孤守節歴三十年林念祖妻袁氏桐城人歸林裁七月夫沒於江㓜姪相依歴年七十終方大美妾張氏桐城人夫沒張坐卧一小室厲節六十年吳仲濂妻唐氏吳仲沔妻葉氏吳仲潾妻何氏桐城人濂沔潾俱早卒唐守節四十餘年娣葉氏守貞五十年娣何氏適嵗饑疫忍死支憊歴年八十四終一門三節鄉里重之贈禮部郎中張木側室周氏桐城人夫亡守志撫嫡孤淳成立中隆慶戊辰進士官至陜西叅政孟言善妻王氏太湖人少寡撫孤有成彭字亨妻吕氏太湖人亨疾亟割股入藥得痊越四月而亨卒斷髪長齋以終楊汝聰妻張氏宿松人郭孔隆妻何氏宿