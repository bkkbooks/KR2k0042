body:
  text: 欽定四庫全書江南通志卷五十二河渠志黃河四康熙三十五年十月河臣題奏兩河情形奉㫖著江南總督漕運總督江寧安徽巡撫公同速行㑹勘確議具奏附督臣等會議疏略海口乃全黃去路見今河臣於雲梯關下馬家港地方挑穵引河一千二百餘丈導黃河之水由南潮河東注入海急應儧挑放又清河縣之甘羅城卞家汪隄工單薄應一律加幫又天妃壩石工今秋異漲水上石工築堰防禦應行加砌又山陽之老壩口大小車路口險工當全黃之頂衝今秋異漲竭力搶救方保無虞急應修築創隄一道以為內障又山陽之王公隄石工卑矮本年漫隄過水應行加高并應加幫月隄以為外護又自清河厯桃源宿遷邳州㫿寧靈璧以抵徐州除兩岸縷隄見在高寬未至損傷者毋庸加幫外查黃河兩岸清河縣之南河觜為黃淮門户河身寬濶黃水每多倒灌應築攔黃大壩一道直接縷隄并於甘羅城西創建草壩使口門小一分則黃水少灌一分再清河縣內縷隄陡坡塌卸桃源靈璧縣界內縷隄地勢低窪以及宿遷界內彭家堡險工一千二十二丈掃臺卑矮蔡家樓磯觜壩一百三十二丈舊壩單薄均應加幫睢寧縣界內戴家樓險工三百三十五丈全黃頂衝勢甚危險應建挑水磯觜大壩并於對岸漲出沙灘酌挑引河一道導水中行以防衝激其武官營子隄七百零四丈亦屬單薄並應加幫徐州界內小店月隄三百九十五大單薄不堪急應加幫并接月隄一道楊家窪楊橫莊兩險工水勢南遷全黃頂衝應於楊家窪加幫掃臺添築月隄并於楊橫莊北岸沙灘酌挑引河以避危險其徐州護城石岸為州城保障本年異漲水與岸平急應酌量加高查黃河北岸縷隄自清河縣界石人溝起由桃源至宿遷縣卓家莊迤上止共長一萬八千九百九十二丈內係中河外係黃河一線長隄兩面受敵兼之地勢低下隄工汕缷圴應酌量分别加幫上而宿遷縣界內河北鎮照舊修理其南北兩岸束水子隄卑矮單薄逼水太窄一遇泛漲即有漫溢汕刷之虞應於北岸仍循舊址加幫南岸臨河逺者亦照舊址加幫臨河近者酌量改寬興築并建小閘減壩置版啓閉水大則藉以分泄水小則收束濟運再於頂衝掃灣之工照運河例簽釘排樁鑲填丁頭第中河水由仲莊閘直注黃河逼溜南趨黃水勢强每易倒灌運口議於黃河之下糧艘由陶莊閘進口入中河北山使清水由陶莊閘出黃庶不助黃水倒灌其雙金門石閘格隄應移建於陶莊閘之下束水行運又清河宿遷之護城隄并清河萬家營之遙隄俱屬低矮均應加幫又宿遷劉老澗減壩均應照河臣前澀題建造減水石壩磯心置版啓閉迤下引河淺之處應行挑濬導引入海再查皂河兩岸隄工宿遷縣東隄五千二百七十六丈七尺邳宿二州縣西隄九千零八十四丈七尺漫溢殘缺而閻王廟一帶尤汕刷殆盡圴應酌量一律修築按此疏如馬家港挑穵引河已於三十九年堵塞今具載之以備河工始末云是年挑穵安東縣黃河北岸窑灣引河長一千二十丈山安河㕔冊以分泄童家營水勢三十六年正月奉㫖河工關係重大這會勘應修應築工程俱著照該督等所題作速興工該部即將錢糧撥給其海口為黃水入海之道所關甚屬緊要河道總督每年委賢能河官專管修理勿致壅滯六月河決時家馬頭是年加高黃河南岸徐州舊護城石岸三尺六寸又創砌攩軍牆南渡口石岸長一十二丈九尺又加幫楊家窪掃臺長三百五丈又小店月隄二道一修築長三百九十丈一因河勢下徙創築長三百六丈河自小店迤東起至靈璧縣界有民築臨子隄長四千五十三丈創築邳州黃河北岸塘池月隄長四百一丈又創築青墩營姚家莊三官廟三工月隄共長四百六十丈修築宿遷縣黃河北岸自邳州界起至張莊運口縷隄長五千九百一十六丈三十八年再修築又修築朱家莊月隄長五百二十三丈一尺又修築皂河攔黃壩臨河隄長三十六丈五尺修築攔黃壩東隄長二百二十九丈三尺五寸創築攔黃壩迤裏攔運河隄長三十九丈又幫築蕭家渡舊決口創隄長八十五丈又幫築楊家莊舊決口創隄長七十八丈河防雜說自宿遷至清河縣黃淮交會之處計一百八十里舊隄未嘗不高因河底屢墊河灘亦隨之墊高則隄工每被淤沒是以覺其低耳然從隄外河灘而觀則覺其低由隄內民地而觀則巍然高峻外高內窪故凡有漫決即成建瓴之勢此一百八十里隄工迤北之地在宿遷縣不過十分之三在桃源縣約有十分之五在清河縣約有十分之七若沭陽縣海州則全在其中此各州縣地畝卑窪非地畝之卑窪也河高也故每遇隄工潰決一次則民地亦漸淤高楊家莊未決之前止有桃源北岸之地被新莊口七里溝黃家觜等各決口之水淤高其自徐升壩迤西十里許起歷崔鎮古城楊家莊朱家堂蕭家渡以至宿遷計程一百里近隄一帶全係水田不可以耕而遠隄去處亦莫不低窪停水自楊家莊潰決之後大溜經行四載有餘朱家堂以下俱已墊高朱家堂以上十餘里尚屬卑窪逮蕭家渡一決而宿遷附近亦俱墊高總之前此水田今皆成高亢之區其減水壩分泄之水自有河形流歸大海再經數年之後凡有未墊之窪處亦可逐漸淤高故楊家莊掃工一百六十餘丈蕭家渡掃工九十餘丈不可不堵築堅固也又朱家堂舊減水壩基拆基創築長一百一十三丈四尺又幫築河北鎮險工創隄長二百三十六丈八尺建築挑水壩第一第二道又修築自卓家莊起至大古城桃源縣界縷隄長一千六百二十六丈修築桃源縣黃河北岸自宿遷縣交界起經河北鎮又經七里溝至清河縣交界縷隄長一萬四千八百四十九丈五尺又加幫黃河南岸烟墩汛內縷隄長四千四百二十六丈六尺創築山陽縣黃河南岸上河小茭陵格隄自縷隄起至汰黃隄長一百八丈修築下河葉家營起至陳家社迤下安東縣界縷隄長一萬三千十二丈又修築黃河北岸自清河縣界泗鋪溝起歷顔家河至安東縣東門縷隄長九千一百四十一丈八尺三十九年加修修築黃河北岸安東縣東門起至彭家灘縷隄長八千九百三十三丈加隄內險要處三十九年幫又修築自彭家灘起至雲梯關山陽縣界縷隄長八千七百一十一丈五尺三十九年重修又修築自雲梯關起至六套縷隄長八千一百四十二丈五尺內卑薄處三十九年加幫又修築黃河南岸陳家社下山清外河交界起至陸家社竈工尾縷隄長一萬二百六十一丈五尺內卑薄處三十九年加幫三十七年幫築徐州黃河南岸下洪奎山店創隄又加幫自七里溝接奎山店遙隄長二百二丈又築宿遷縣黃河北岸臨黃外口石閘迤東攔河大壩長十六丈河防雜說康熙十六年以前黃河大溜緊貼宿遷南岸白洋河鎮市而行是年楊家莊潰決以致河水北瀉勢不可遏從此每多水患若一面改挑引河又一面堅築大磯觜壩掃臺一座逼束黃水全歸引河而白洋河鎮自可無復水患但此壩濱臨大河欲長保無虞又須築格隄一道約長七八十丈此亦工之不可緩者建清河縣清口東西兩壩又創築黃河南岸張福口自縷隄起至清口西壩橫隄長四百九十二丈創築山陽縣黃河南岸兩車路口月隄長三百三十丈搶修安東縣上河窑灣險工長一百四十二丈三十八年正月二十一日奉上諭諭吏户兵工四部朕撫馭寰區乂安中外孜孜圖治宵旰勤民期於天下咸遂生成物無不得其所今邊烽永靖四方無事獨是黃淮為患衝決時聞下河地方田廬漂沒朕軫念民艱曩曾屢遣大臣往令督理不惜數百萬帑金務期早綏黎庶乃歷年已久迄無成功今水勢仍復橫溢浸漫城閭沉沒隴畝以致民多失業董其役者未有上策可以宜民時厪朕懷未嘗少釋在內諸臣咸請朕親臨指示以為一勞永逸之圖方今春時雨水減少正宜講求疏濬以遂安瀾爰諏吉南巡親加勘閲三月初一日聖祖仁皇帝南巡閲河諭大學士伊桑阿阿蘭泰尚書馬竒侍郎常綬喻成龍李柟總漕桑格總河于成龍協理河務府尹徐廷璽江寧巡撫宋犖員外郎赫韶瑟登德費揚古等朕念河道國儲民生攸關親行巡幸由運河一帶以至徐州迤南黃河細加看閲黃河底高灣多以至各處受險又至歸仁隄高家堰運口等處留心細閲見各隄岸愈高而水愈大此非水大之故皆因黃河淤墊甚高以致節年漫溢黃河若淤高二尺則水高二尺淤高一丈水即高一丈若治河專以築隄終屬無益如不將黃河刷深徒費錢糧且運口太直黃水倒灌兼之湖水淤墊以致清水不能暢流各河與洪湖之水如何得能敵黃若將清河至惠濟祠掃灣由北岸桃引入惠濟祠後入河而運河再向東斜流入惠濟祠交匯黃水如何得能倒灌朕欲將黃河各險工頂溜灣處開直使水直行刷沙若黃河刷深一尺則各河水少一尺深一丈則各水淺一丈如此刷去則水由地中而行各壩亦可不用不但運河無漫溢之虞而下河淹沒之患似可永除矣朕意如此是否爾等直奏不得以朕必是朕亦是一時意見亦不保其必然且攔黃壩灣曲馬家港窄狹雖將時家馬頭之口堵築而黃水不能暢流山陽南岸韓家莊等處險工甚屬可虞至於下河不必挑濬如將上河修築堅固則下河不治而自治矣今朕念民生運道親行巡幸如不遡本窮源分晰條治於民生何益將來每嵗加幫高家堰等隄堵築時家馬頭等口徒費錢糧淹害百姓今應將清口之西壩臺加添挑水壩修築堅固加長過於東壩臺將清口安置裏邊洪澤湖擇其水深之處開直成河使湖水流黃河灣曲之處直挑引河使各險處不得受衝董安國馮佑將河道廢壞已極此各工程責令賠修贖罪其下河見有積水不得不引出歸海將串場河射陽湖蝦鬚沙溝一帶挑通引積水流出歸海其攔黃壩應行挑拆時家馬頭暫緩堵築使黃水流定汰黃隄築成之日再將時家馬頭決口堵塞至於歸仁隄人皆稱係保護明季皇陵此俱係妄誕三四十里路之隄如何護得明季皇陵此隄之修專因水漲之時毛城鋪等處發來之水至歸仁隄攔回仍歸黃河之意此隄亦應酌量修築至於運河之水少有不濟治之甚易爾等係河臣係爾等專責若此治法一成則河道可保無虞如不然另想别策務必將被淹州縣之水災盡除方不負朕南巡救民之意爾等若挑穵引河其原有工程仍照舊令各官修防不可怠忽俟挑穵引河黃河歸入故道再將下河串場河與射陽湖涇河蝦鬚沙溝挑數處通流使水歸海至於邳州清河桃源安東山陽寶應高郵江都泰州興化鹽城等州縣百姓困苦已極如欲拯濟而窮民不沾實惠殷實之人反得行其冒瀆每州縣或截留漕糧一萬石或截留數千石比時值減價糶賣則窮民實有裨益邳州差部官一員糶賣其餘别處米石責成總漕桑格總河于成龍同地方大臣委令地方官糶賣如此救治諒百姓似不致流離河道永無衝決朕意如此是否允當爾等直奏不得以朕㫖為必是爾等速會議具奏是日總河于成龍協理河務徐廷璽等奉上諭將攔黃壩拆開新河口亦不必堵塞其時家馬頭亦不必合龍門俟汰黃隄築成之日再行定奪初三日奉上諭王公隄甚屬險要務須加幫修築堅固初四日奉上諭朕未到之前將王家營陶家莊引河挑完放水即寫摺子具奏四月二十二日于成龍徐廷璽奉㫖問引河挑水壩河身創隄可曽建築又奉㫖此隄朕業已指示不用高寬止用高五尺底寬二丈頂寬七八尺以遏水頭二十三日奉㫖隄內有水之處必下掃方好幫築時家馬頭舊河從前淤墊之處挑穵引河決口趂此時亦應堵塞至修河之圖朕至京斟酌妥當發來二十七日奉㫖這黃河灣曲之處俱應挑穵引河于成龍奏徐州楊橫莊一帶現遵㫖挑穵其各險灣曲之處容臣陸續施工奉㫖是凡有灣曲之處俱各挑直又清口南岸奉上諭這南岸若不修挑水壩新挑引河必不能暢流又奉上諭從朕所釘樁處修挑水壩二三十丈挑出水頭大溜向北以至引河流暢尾隄在陳家莊旱地面築高五尺水長之時若從陳家莊南任其流去無礙七月初十日上諭看圖內將歸仁隄便民閘等口俱已堵塞其毛城鋪以下各口尚未堵塞即將此處堵閉則毛城鋪等口所出之水由何處泄去必致於散漫各處民受大害所關甚屬緊要此處宜速籌一䇿是年總河于成龍奉上諭勘工未奏是年創築碭山縣黃河南岸定國寺月隄長一千九十丈創築徐州黃河南岸自苗家山起至冰雹山縷隄長一千五十丈又加幫自韓家山起至段家莊西頭舊有民修隄工長四百九十三丈又幫韓家山南山溝中舊有民築土堰長七十三丈又修築自雲龍山黃茅岡起至徐州西關街柵攔門止蘇隄長六百三十八丈又改挑下洪奎山店支河二百丈張鵬翮河防志下洪奎山店隄外臨黃河內傍支河最為險要改挑支河二百丈以保隄工又築七里溝接奎山店創隄長二十九丈又自奎山店起至三山頭遙隄卑薄處俱加幫又創築曹家莊月隄長四百六丈楊家窪月隄長七百二十丈修築韓壩舊險工月隄長三百五十六丈又加幫黃河北岸自單縣界起經吳家寨至李道華家樓縷隄長一萬三千二百九十三丈二尺民自單縣界至吳家寨一千丈舊係修李道華家樓徐州志作止水菴又修築自大谷山起至蘇家山縷隄長四百四十七丈自陡山起至子房山縷隄長一千三百十五丈又加幫華家樓起至長山頭民修隄工長一千九百六十丈又修築自九山起至出頭山遙隄長一千六百八十九丈張鵬翮河防志為徐州大壩險工重門之障加幫睢寧縣戴家樓月隄北段長二百五十五丈另築南段長八百四十丈又修築青墩營姚家莊三官廟三險工掃臺長三百八十八丈張鵬翮河防志三十八年雖經修築頂僅寬三丈三四尺四十年撥河兵重修新舊頂共寬六丈有餘足資捍禦修築宿遷縣黃河南岸自睢寧縣界古隄頭起經徐家灣西張王廟至桃源縣界白洋河鈔關口縷隄長一萬一千四百六十七丈九尺又創築蔡家樓墩郎廟及老隄頭彭家堡三工總大月隄長二千一百九十六丈五尺陳家道口月隄長九百五十丈又修築徐家灣龍門搶修險工臨河隄長二千二十一丈又修築溫州廟舊減水壩長三百二十七丈五尺又修築黃河北岸自邳州界起至皂河石磡迤西縷隄長二千四百八十五丈皂河攔黃壩西隄長二百四十九丈六尺自攔黃壩東隄起至張莊運口縷隄長三千四百三十一丈又創築河北鎮月隄長九百七十八丈八尺又修築臨黃縷隄自張莊運口起至駱馬湖口西裹頭長一千九十一丈五尺自駱馬湖東裹頭起至攔馬湖砂礓觜迤上矮隄頭長九百八十三丈二尺河防雜說自宿遷縣城西北起一帶連山約行九百里至山東歷城縣始見平地再西北二百里至德州城南名黃河涯宋以前老黃河故道也黃河北行必過厯城西北南行必出宿遷東南然後有歸海之路自宋神宗十四年黃河南徙由汴河東南奪淮入海厯今六百餘載北道壅塞久已不可復問今日求黃河之故道即會淮入海之道也但黃水源大益以山陜河南萬山之水合流而來每至不可測量從前百計隄防而隄高水亦高常被漫潰一經漫潰則水盡旁泄正河淤墊運道不通是以為今之計不得不建減水壩以泄其非常之勢俾保隄工以全運道而衛民生也然上流碭山之毛城鋪徐州之大谷山邳州運河之萬家莊馬莊集以及猫兒窩之各減水壩不過暫分其怒漲之勢其水仍歸黃河若徑泄入海之壩則自攔馬湖始康熙二十二年伏秋異漲皆賴此壩宣泄得保各處隄工其所泄之水俱入宿遷侍丘湖歸楊家莊決口迤下舊河形內東北入海至此壩先則清黃並泄自黃水消落河邊挂口斷流止泄駱馬湖清水壩係五座兩旁高低減水之地計寬一百八十餘丈中央深河泄水之地計寬十八丈蓋為蕭家渡初合龍門求其分泄故用此中央之深河也今蕭家渡合龍已經一載下流黃河俱漸寬深不必更留深河相度籌維將中流挑土實填另於兩旁添造高低橋壩一百丈以待他日異漲可也又修築歸仁集西烏鴉嶺土隄自鳳陽府虹縣界起下至歸仁集石工頭長五百九丈又修砌歸仁隄舊石工上自歸仁集起下至五堡格隄頭長三千八十八丈重其內土隄四十一年修修築五堡格隄至便民閘長二千七百二十五丈建按便民閘康熙十九年河防雜說宿虹二縣歸仁隄一工共長六千三百二十五丈六尺內創工二千七百二十八丈幫工三千四百八十八丈六尺民工一百九丈皆所以禦上流睢水并毛城鋪減下之水以及碭蕭徐宿靈睢宿遷等各州縣雨水又因黃河底高尚未得驟然刷深誠恐清水積高有傷隄岸建五堡減水壩一座暫泄異漲又建便民閘一座以通行旅康熙二十二年伏秋時雨最大之時五堡減水壩底之上過水二尺五寸有竒三教堂便民閘底之上過水五尺七寸及用水平將此清水與黃河較之其黃水面尚高於清水六尺有竒逮至隆冬黃水已消七尺有竒清水僅有尺許而清黃始平然不能外泄也惟將便民閘底改深三尺閘牆亦加高三尺一經改深則上流清水由閘者多而由五堡減壩者少再於黃河南岸大隄之內挑小河一萬八千餘丈引此水直至清河縣出口仍歸黃河則不特分其注高堰之勢而且可為沿隄運料之資河邉多栽栁樹將來采伐亦易於轉運不誠大有益於河防耶張鵬翮河防志歸仁隄在宿遷縣黃河南十六里始於明嘉靖間所以捍睢水湖水及黃水使不得南會於淮而又遏睢水湖水使之并入黃河助其衝刷也歷年隄工不修致祠堂湖一帶連決七口盡諸水而注之淮河以為高堰害幸我皇上審悉形勢知其緊要詔令興修隄工既完又開引河引諸水至桃源老隄頭出以達於黃又慮黃水消長靡常於歸仁隄建閘三座於老隄頭建閘二座黃水大則閉老隄頭閘開歸仁隄閘以放水入淮黃水小即閉歸仁隄閘開老隄頭閘以引水刷黃節宣有制可以垂久遠矣史奭歸仁隄考歸仁隄控黃淮界桃宿與高堰相表衷蓋高堰為淮揚之長城而歸仁隄又高堰之屏障也其上流來源自徐溪口厯蕭縣靈璧等處二百餘里合永堌姬村湖水由宿遷之符離溝經邳之睢河而滙於埠子白鹿等湖從白洋河東西兩溝入黃河黃之泥沙得此而汰故俗亦名汰黃隄然其槖籥則又在小河口之通塞蓋小河通則睢湖諸水徑入黃河而歸仁之水减半其籓籬則又在耿車時兒灘一帶之隄蓋此隄高厚堅固則睢水不得漫入埠子等湖而河常通矣故上至高原下至時灘皆當接築長隄嵗加修守蓋修守此隄即所以守歸仁也况小河常通則靈睢宿遷積水得泄而沮洳漸成沃壤又舟行徑直免犯湖險而小民便於販易為地方利又非淺鮮也又按貽麥嘗記云隄受白鹿等湖水由白洋河與黃水㑹其越小河口者又上流之支分也二水既合直趨高堰淮揚之民不為魚鱉者幾希隄成諸水悉由小河故道復入於淮高堰得殺水勢而保無衝決水不旁流而永無奪河之患泗州志歸仁隄去州治幾二百里去州境亦近三十里許自歸仁集迤東至桃源之于家岡約長五十七里此雖虹睢桃源等處地界而實居泗之脊背也徐邳而下河身卑窪以故湖水隨漲隨涸間漫及泗境猶為害不甚自黃水徙蕭縣義安山合永堌湖水流入宿州之符離溝歷邳州之睢河與宿虹白鹿埠子藕湖等水匯為巨浸由拖犂溝南流入泗境安河會淮水為患一遇伏秋倒灌小河口白洋河由歸仁集東橫濶四十里奔泓而下嗣後逐年衝決經蕭碭宿睢靈虹濱河州縣田廬淹沒彌甚萬厯二十年隄東轉北新接小土隄衝漫自嶽家莊入大橋口由黃家堰過六師院接安河凡七八十里俱被淹蕩巡按舒公題改石隄三千餘丈後相繼增修自是泗境無患隄久傾頺水勢衝突直逼泗境與高堰平夫泗受淮患三閘閉既無所疏歸仁摧復有所入彈丸尺土水上浮漚三版孤城中流一葉幾何不胥而為魚也康熙十年奉㫖修砌河歸故道泗可無憂黃而憂蓋專在淮矣附御史徐越修復歸仁隄疏黃强淮弱前人借水濟運必欲助淮力北與黃爭先防阻淮水趨南而與湖㑹何也近黃河者有睢水埠子湖水其勢甚大且遇黃河一漲則能與此水相連倘無隄以攩之直下而東則中阻淮水北行之道淮水半趨而南其北趨者無全力則為黃所阻而不能入河以濟運其南趨者且匯諸湖之水漫溢於周橋閘一帶為高寶各邑淪胥之患今議者從事於周橋啓閉及堅築翟壩傾圮於水勢不可謂不審但淮水有源有委臣謂當先施力於上流之歸仁隄然後議及於下流之周橋閘一帶乃獲有利無害耳夫歸仁隄上遏睢水埠子湖水使併白洋河出口以刷董口一帶之沙淤而為益於運道下則兜睢湖諸水使不得衝入淮流以阻其勢復南借周橋翟壩遏淮水下湖之便安得不怒激以取路清口耶淮水全出清口而兩河治運道通矣按徐越奏疏在康熙九年今附載於此加幫桃源縣黃河南岸自烟墩舊險八處修起至高家灣縷隄卑薄處又加幫黃河北岸馬家莊縷隄長四百四十丈又加修上渡口嵗修險工長六十丈壩臺長二十八丈四尺又加修三坌險工壩臺長二十四丈修築清河縣黃河北岸自桃源縣界駱家營起至中河口西岸縷隄長二千三百四十丈五尺自中河口東岸起至四鋪溝山陽縣界縷隄長六千四百六十三丈一尺俱三十九年再加幫又修築黃河南岸自桃源縣界吳城起至張福口橫隄頭縷隄長三千五百十丈重是年修築未竟四十年修又陳家莊東挑水新壩一座聖祖仁皇帝駐蹕相度河勢指定方所親釘樁木命築壩挑黃水北入陶莊引河不致逼向運口是年欽遵建築工竣今土人俱稱御壩又建有御樁亭又修築清口東甘羅城隄自甘羅城西南角迤西裏河交界至卞家汪工頭舊樁掃工長一百三十一丈內接卞家汪五十五丈係搶修又卞家汪隄自甘羅城北起至天妃壩石工頭舊搶修樁掃工今改建石工長八十四丈又修築自龎家灣起至季家淺山陽縣界縷隄長四百六丈五尺修築山陽縣黃河南岸外河季家淺起至三坌上河交界縷隄長一萬一百九十五丈八內自上張莊至三坌長一千四百丈四十年又加高二尺又加幫王公隄石工長八百八十三丈五尺按王公隄者前明萬厯三年漕督王宗沐捐俸創築以禦河患民為廟祀立碑號曰王公隄舊自海神廟至老壩口長五百九十五丈因嵗久淤墊又築外越隄長六百二十丈至是年加幫護以樁掃又修築車路口起至上河大茭陵汰黃隄長一萬二千二百五十九丈又修築上河三坌起至葉家營縷隄長八千八百九十七丈三尺四是年修築未竟十年加幫又自土壩頭起至童家營下河交界長三千二百九十三丈自馬家社至時家塢流泉溝長一千八百四十一丈俱簽釘排樁三十九年三月十四日總河張鵬翮面奉聖訓古人之法與今河勢不同其最緊要者黃河何以使之深清水何以使之出爾宜詳加籌畫十七日又奉聖訓黃河曲處挑穵使直則水流通暢泥沙不淤爾宜留心四月拆安東攔黃壩賜名大通口附張鵬翮疏略導河入海順水之性古人治河之道也自築攔黃壩拂水之性以致黃水倒灌清口淤塞下流不通上流潰決淮揚常受水患勞費罔效以迄於今臣親勘河工看得攔黃壩巍然如山中間一線涓涓細流相度上流正黃河水而寬八十三丈餘前河臣拆壩一十七丈又拆二十八丈七尺尚有攔黃壩並積上三十七丈三尺未拆壩基高昻終屬壅滯盡行拆去挑穵深通與正黃河八十三丈之水而相符又亟堵馬家港於月內合龍使水勢不致旁泄盡由正河而行俟黃水大長時將新挑之河開放資其暢流之勢衝刷淤墊則黃水入海自是暢達命廣闢清口張鵬翮河防志淮水由清口經安東出雲梯關以達於海此自夏禹至今數千年之故道黃河自宋神宗時南徙而與淮合今亦六百餘年其出海之口廣至數百丈深至數丈非人力所能為者或因上流不治水緩沙停以致梗塞而遂欲别尋一道以達於海此必無是理明潘季馴辨之甚詳皇上宸謨獨運命盡毁攔黃壩賜名大通口又命廣闢清口淮水悉出會黃二瀆合流奔騰東注積沙盡滌今河面寬至二百餘丈即水落亦一百八九十丈深至四丈五六尺即水落亦三丈五六尺自大通口至惠家港八灘入海之處俱深三四丈不等自此兩河皆復其故而淮海之間永慶安瀾矣六月初四日諭大學士伊桑阿馬齊前張鵬翮赴任時朕即指示以必毁攔黃壩挑濬芒稻河人字河大抵河工事務非身履其地詳察形勢無由悉知初張鵬翮奏請欲按書上之言試行修築朕諭云爾身至其地親加詳閲則應修之處便可知矣今毁去攔黃壩而清水遂出濬通海口而河勢亦稍減觀此則河工大可望也當于成龍赴任時朕亦曾諭以宜毁攔黃壩誠於彼時毁去早有效矣七月初四日諭大學士伊桑阿馬齊張鵬翮所奏黃河曲處挑穵使直則對岸險工可平此說良是所謂曲處挑穵使直非謂取直於隄外乃兩隄之間自四五里至十里廣狹不一於此內曲者直之耳朕亦曾以此面諭于成龍于成龍之意甚忽視之朕不過暫往巡視于成龍乃久居河上之人毋論朕不能盡知即所深知者亦不可强令所司曲從朕意脫有不虞關係非小今張鵬翮此奏與朕向時所見甚合朕凡事知者言之不知者不輕言即今邳州吕梁諸處情形如何並未親見若强以為知必致辭窮伊桑阿馬齊爾等俱曾親到河工若所未知者概以為知可乎張鵬翮遇事精勤從此久任河務必能有益九月二十四日諭工部歸仁隄修築事宜屢經面諭于成龍最為緊要乃于成龍性偏未行詳看遷延時日以至於今觀張鵬翮所奏甚為合理此事所關至要著九卿詹事科道可作速會同詳議具奏及今年黃河水小之時興工毋誤圖併發廷議應如所奏奉㫖依議速行附張鵬翮摺奏略前河臣于成龍查勘於四堡穵引河由胡家溝出黃水尚未估計臣相度形勢胡家溝迤東地勢頗高恐引水不暢且沙土難以建閘復查勘挑穵引河之處在於涵洞口起至老隄頭迤東出黃河地勢低窪打量水平黃河崖地平比黃河水而高五尺五寸縷隄外地平比隄裏地平高三尺舊河崖地平比舊河水而高一尺七寸四分通平牽算湖水比黃水高七寸六分自涵洞口起至黃河邉共長四千八百五十丈四尺內自涵洞起至九龍廟見有舊河一道計長一千二十七丈九尺河身深窪不必挑浚唯有舊河起至黃河邊應挑引河長三千八百二十二丈五尺估挑而寬十丈底寬四丈深八九尺一丈不等應於黃河縷隄出水之處建造石閘又於臨河之處建築草壩隨時啓閉以防黃河倒灌再加歸仁隄五堡建磯心石閘若遇黃水異漲則閉黃河縷隄之閘將此五堡之閘開放以泄湖水不致漲裂隄身於引河南北兩岸築束水隄並補築九龍廟舊隄缺口上處加砌石工使水不致旁溢如此引河開成則泄歸仁隄之水出黃河可以衝刷河身可以保護民間田廬不致淹沒又使此水不盡歸洪澤湖可以減高堰水勢又欽奉上諭疏略一海口之運料河宜開也修工應用蘆葦柴草等項多産海賓舊有運料小河道自清江浦起至海口止年久淤塞今應加挑浚深通黃一運口至濱海一帶兩岸隄工亟應加幫也攔壩已經拆去海口已經疏通馬家港已經堵塞時家馬頭飭令速堵完竣轉盼糧船過完運口築隄堵截使黃水盡下注入海涓滴不令旁溢正值伏汛屆期水勢必較往年甚大山清安東黃河兩岸隄工必須加幫高厚以資捍禦穵一王家營引河宜挑也此河今已淤墊應速挑深通一王家營減水壩宜開也前河臣靳輔於此修減水大壩以泄黃河漫溢之水後經築隄堵塞遇黃河大漲漫溢之水無處宣泄淹沒王家營今臣親往查勘居民咸請開壩泄水應酌開十餘丈兩頭下掃裹住泄黃漲漫溢之水由鹽河而出長一桃源縣黃河南岸隄工宜加幫也臣親看近湖一帶上隄長四千二百餘丈單薄不堪兩面受水在在堪虞應動帑加幫高厚以資捍禦一駱馬湖口竹絡壩宜築也此口坐落宿遷縣黃河北岸與駱馬湖口正對原築有竹絡壩一座長五十五丈節宣黃湖大漲之水今看得黃河身高自去嵗水漲漫缺二段共七丈黃水反流入駱馬湖口匯入中河亟宜堵築以禦黃水使不得內灌中河以致淤墊此口堵後酌量將中河頭煞壩堵塞引駱馬湖水由舊中河進石閘入黃河助黃刷沙如遇黃水大漲恐其倒灌則閉閘禦之一王家堂缺口宜加築也此工坐落睢寧縣黃河南岸地方臣親往驗看大溜頂衝最屬險要所修月隄浮沙堆築單薄不堪而舊缺口又與月隄逼近無庸另修應將月隄培修高厚作為正隄一徐州郭家觜之險工宜修也此工在黃河南岸逼近徐城對岸沙觜挺入河心二里許以致大溜直射郭家觜甚屬危險城池民生關係不小應將沙觜挑穵引河直出俟水勢大漲資其衝刷河觜以殺大溜水勢郭家觜舊有石工至北門迤西而上每年釘樁下掃補救一時不能經久嵗修搶修糜費錢糧臣親往查看據耆民咸稱對岸石山采石甚易如砌石工庶可經久臣率河官量度自北門石工頭起至段家莊長六百五十餘丈加砌石工與舊石工一律平整不惟可保城池且可省嵗修之費又蘇家山石觜挑出河心以致南岸韓家山一帶頂衝塌潰逼近徐城應自楊家樓起至段家莊築月隄長四百餘丈以作重門之障庶徐州城池得以保固無虞又謹陳治河條例疏略一隄工宜堅築也舊例每堆土六寸謂之一皮夯杵三遍以期堅實行硪一遍以期平整虛土一尺夯硪成隄僅有六七寸不等層層夯硪故堅固而經久雖雨淋衝刷不致有水溝浪窩油損坍塌之虞今見各隄俱無夯杵止有石硪又自底至頂俱用虛土堆成惟將頂皮陡坦微硪一遍以飾外觀是以隄頂一經雨淋則水溝浪窩在在不堪隄底一經汕刷則坍塌潰壞故年來糜費錢糧迄無成效今後再幫之隄俱將原隄重用夯杵密打數遍極其堅實而後於上再加新上創築之隄先將平地夯深數寸而後於上加上建築層層如式夯杵行硪務期堅固照依估定逺近土方取土加幫不許近隄取土一樁工宜用整木也運河中河頂衝刷灣之處水勢湍激恐其汕刷隄工是以估用整木簽釘排樁估用整柴丁頭鑲壓以資捍禦今見兩河排樁俱係一木二截浮簽淺土所鑲柴束俱係一柴二截粉飾外觀及將舊隄老工穵鬆一遇雨淋水漲樁木欹斜脹折柴草隨水漂淌嗣後排樁工程購木到工該道㕔先赴工圍驗是否與原估尺寸相符勒令承築人員樁用整木簽釘入地甚深掃用整柴鑲壓極其堅固首一龍尾掃宜停也臣遍查河工見工程堅固者在石工次則密釘馬牙樁足資捍禦其頂衝大溜之處用丁頭掃密釘大木排樁深埋入土亦屬有益至於平常工程槩用龍尾掃稀釘排樁淺埋浮土一遇風浪即行塌卸徒飾外觀虛糜帑金應行停止一石工修砌宜得法也臣遍閲湖河修砌石工之處鏨鑿草率參差不平零星之甎不足原估尺寸三甎不能抵二甎之用釘樁短小不足以檠數層巨石石塊碎小不足以符原估大尺石灰米汁短少何以合甎石而聨成一片鐵錠鐵鋦全無何以扣石縫而使之合筍自必旋砌旋壞安能經久嗣後一切石工無論而裏丁頭等石皆照原估置辦鏨鑿極其平整石灰須重篩篩過多用米汁調和搗杵極其膠黏滿灌而入使之無縫不到又用鐵釘鐵鋦聨絡上下合為一片一挑河之積弊宜除也分工人員領帑到手任意花銷河身挑穵不及原估十之三四隄用虛上堆成並不肯如式夯硪且將挑出之土堆於臨河隄上使隄岸高聳以作假河之尺寸是以年來挑濬甚多成河甚少侵帑誤工莫此為甚嗣後挑河工程挑出之土盡堆於原估隄上層層夯硪成隄使之高寬以資捍禦不許估計散上以滋堆高假河之弊奉一黃河淤墊之曲處宜取直也恭上諭將黃河曲處挑穵使直仰見我頂衝大溜之處對岸皇上洞悉治河良法臣查閲河工見必有沙觜挺出此河曲之故也從此曲處挑穵引河以殺水勢則對岸險工可平誠如聖諭指示極其精當因詢河官何以不即遵行據稱挑穵引河需費錢糧甚多穵後引水大溜始能成河若逢緩水必至沙淤例應追賠是以人心懼縮不敢挑穵臣思河工虛應故事挑穵不如式者理應賠修若實心任事挑穵深寬偶致淤墊者此非人力之罪應請免其賠修庶幾人無畏縮我皇上挑直之見之奉行而河工有底績之期矣上諭可以實一夫役宜優恤也挑河築隄雇夫動至數千烈日風雨手操畚鍤夜則捲席為棚僅以庇身雖有雇值止可糊口嗣後工成之日給與印栗該地方官查驗免其雜項差徭以酬其勞又挑穵引河疏略黃河下流最窄之處無如安東便益門以及對岸韓家莊臣率同道㕔等官探量兩岸相距僅六十餘丈又兼時家馬頭至尹家莊河身太曲對岸沙洲逼溜直衝南岸韓家莊而韓家莊以下又突出沙觜逼溜直射北岸便益門且隄高於城勢甚危險應將兩處沙洲於中開穿挑穵引河二道臣查時家馬頤已經合龍淮黃已經交㑹二水合流來春自必增長急應乘時儹挑引河完竣俟桃泛水長開放使黃水直下得以暢流則尹韓二莊便益門三處險工可平安東城社民生可保右張鵬翮三疏俱奉俞㫖速行是年創築徐州黃河南岸自楊家樓起至段家莊月隄長四百五丈又段家莊舊險工對岸沙觜挑穵引河大溜下徙又建修郭家觜奶奶廟一帶險工石岸長五百三十九丈三尺張鵬翮河防志黃水自西南直射北岸蘇家山觸激山根折奔南岸郭家觜正當大溜頂衝又形勢逼近徐城最為緊要爰請改建石岸四十年復置鐵犀一座鎮水又加幫黃河北岸吳家莊谷家莊相連險工掃臺長二百四十八丈又築月隄長九百四十三丈又築吳家莊上壩頭迎水壩一座張鵬翮河防志迎挑水勢使大溜向南又於對岸穵去灘觜以順其流險工漸平加修睢寧縣黃河南岸王家堂險工漫口新隄長七十四丈又建漫口西頭挑水壩一座東頭建迎水壩一座又幫築兩壩掃臺共長五十五丈加寬二丈又修築王家堂月隄長一千六百丈又加幫戴家樓舊月隄北段長二百五十五丈另築南段長八百四十丈挑穵引河自宿遷縣九龍廟起至桃源縣老隄頭黃河邊長三千七百丈四尺五寸修建宿遷縣黃河北岸臨黃外口迤東石閘一座又修築歸仁石工東舊隄上自五堡起下至桃源縣界長三千七百五十七丈千內自五堡迤下起至九龍廟止石工長一一百丈係三十九年創砌其下自九龍廟起至桃源縣界即作新開引河之南岸束水隄又創築引河北岸自格隄三堡起至桃源縣界東水隄長六百八十三丈又建五堡迤上雙金門閘三座西曰利仁東曰歸仁中曰安仁創築桃源縣引河南岸接宿遷縣界起至老隄頭黃河邊束水隄長一千四百六十二丈重修引河北岸舊束水隄長五百九十五丈另築新束水隄長二千四百九十八丈七尺又築引河口門束水橫隄長四十丈內草壩一座又建老隄頭出水閘一座曰祥符閘月河小閘一座曰五瑞閘開穵月河長九十六丈九尺清河縣黃河南岸惠濟祠後舊掃工自天妃壩起至龎家灣改建石工長一百六十二丈又創築安東縣汪莊二塘月隄長五百九十丈又搶修上河窑灣險工長一百五十五丈四十年三月准總河張鵬翮請留馬家港泄水口門以備宣泄黃河異漲之水九月初一日上諭大學士伊桑阿等頃張鵬翮奏開陶莊引河黃河水已向北岸流去若黃流趨北岸則離清口甚遠乘此時從范承勳所築挑水壩起寬長加築隄岸過清口將黃河及清口之水儘向下流再匯合為一處則黃河之水可永無倒灌之虞朕先曾面敕于成龍今在河官員亦有知者著張鵬翮問在前曽知此事官員詳明定議奏聞其修隄所需錢糧即為估計所修之處速繪圖呈覽此事甚為緊要不得輕忽下所司知之是年開穵徐州黃河南岸潘家馬路楊橫莊曹家莊三險工對岸引河長一千八十丈張鵬翮河防志三險工相連北岸沙觜逼溜頂衝遵㫖取直開穵引河引水東下以殺其勢加幫靈璧縣黃河南岸墨家口舊係民築撐隄長一百一十六丈開穵邳州黃河北岸戚字堡對岸引河長五百七十丈張鵬翮河防志戚字堡險工因對河沙灘日長逼溜頂衝遵㫖取直於南岸開穵引河分殺水勢今已成河建築宿遷縣黃河北岸河北鎮挑水壩第三道又修建駱馬湖口竹絡石壩一座修築桃源縣黃河南岸自半邊店起至熊家莊縷隄長八百三十丈店半邊店一名野飯又加幫自高家灣起至駱家營縷隄卑薄處又開穵張家莊對岸顧家灣引河長九百二十丈又創築談家莊險工月隄長六百一十六丈加幫掃工尾縷隄長一百二十丈清河縣黃河北岸王家營迤西縷隄上舊有減水壩厯久圮廢重建土壩口寬三十丈壩內挑引河以泄黃水異漲由鹽河入海又建設黃河南岸陳家莊東挑水新壩雁翅一道清口西壩雁翅一道又築自挑水新壩至西壩順隄長四百八十丈五尺張鵬翮河防志今河溜全趨北岸淮流暢出四十一年異漲之水清黃俱順軌而東無壅抑之憂開穵山陽縣黃河南岸尹韓莊二險工對岸引河長六百四十丈韓莊東引河長五百二十丈張鵬翮河防志一以分尹韓二工之水勢一以分安東便益門之水勢又築童家營險工月隄長六百七十丈又於對岸開引河一道長六百二十丈又陳家社迤下縷隄其下有泉水迸出屢築屢陷因築兩小月隄於縷隄之外以護陷處又築大月隄長四百八十丈護小月隄之外修安東縣黃河北岸邢家河險工長六百五十丈於掃牛之上加鑲丁柴高四尺又壓土二尺以資捍禦又建時家馬頭汪家莊老隄頭佃湖磯觜壩共四座又加修龍潭口險工長五百五十丈張鵬翮河防志此工內外積水汪洋風浪蕩擊最為險要隄外創建排樁鑲柴隄裏下掃填土共資捍禦又加幫黃河南岸歪枝套隄長二千三十五丈九尺又開西磡險工對面河灘張鵬翮河防志此工即在陳家莊下水勢頂衝兼以河面窄狹河中突出沙觜洶湧愈甚加幫外坦隄八十丈內創隄三百一十五丈又挑穵沙觜及對面河灘舊水面僅寬六十丈今衝刷至一百餘丈矣又掌家港險工在西磡之下西磡河面漸寬大溜直趨掌家港防護更須加謹江南通志卷五十二
