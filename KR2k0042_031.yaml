body:
  text: 江南通志卷三十二輿地志古蹟三常鎮淮三府常州府武進舊城在武進縣西北七十里千秋鄉吳大帝改丹徒為武進南蘭陵故城在武進縣西北晉太興元年蕭整自蘭陵過江居武進之東城里時寓居江左者皆僑置本土加以南名始置南蘭陵郡及蘭陵縣南畿志云府北八十里萬嵗鎮西南姑幕城在武進縣西南六十里東晉僑置於晉陵南境今有大姑小姑二城鼓城在武進縣東北二里德澤鄉有方圎二城東西相對或作虎城南畿志云作古城又縣北有韓城南畿志云五季時有韓王築此縣北三十里有酬城又北十五里有祿城皆五代時戍守處傅洛城在武進縣西北九十里今通江鄉傅莊即其地祥符圗經作博洛城胥城在陽湖縣永勝西鄉上店西東晉時僑置莒縣於此南畿志云舊傳子胥所築淹城在陽湖縣延政鄉越絶書云毗陵縣南城故淹君城也其城三重周廣十五里今外城多圮內濠亦堙而內城中城屹然中濠外濠廣可十五丈又留城在淹城東五里相傳吳王囚越質子淹留於此故名青城在陽湖縣阜通鎮南有圎壇西有方壇蓋蕭齊以蘭陵為湯沐邑置此為郊祀所稍西即蘭陵城也闔閭城在無錫縣西南四十五里富安鄉近太湖越絶書云伍貟取利浦及黃瀆土築闔閭城范蠡城在無錫縣西十里輿地志云越伐吳時范蠡所築吳地志云在古歷山西今謂斗城猶存故址黃城在無錫縣西十二里俗謂之黃斗城史記云楚徙封黃歇於江東因城故吳墟以自為都邑即此新安城在無錫縣東南三十里元初置新安巡司於此至正中張士誠築城為屯兵之所泰伯城在金匱縣東南三十里梅里鄉吳越春秋云城周三里二百步鴨城在金匱縣東南四十五里輿地志云吳王牧鳬鴨之地今有鴨城橋又䴢城在縣東十七里吳王豢䴢鹿處江隂舊城在今縣治東北梁太平三年分蘭陵置又置江隂郡治今縣治東北有古城巷夏浦城在江隂縣西十八里寰宇記云名艦浦城陳至德初徙江隂郡縣治夏浦因築此城陶城在江隂縣東三十里亦名盜城相近又有閭城郭城皆南唐屯戍處東舜城西舜城在江隂縣東七十里今曰東順鄉西順鄉順訛舜也今二鄉有舜井陽羡城在宜興縣南五里屬荆溪漢縣明一統志云一名蝦虎城吳城在宜興縣西南二十里一名太伯城臨津城在宜興縣西北五十里五賢鄉晉永興初分陽羡縣地置屬義興郡今荆溪北故址猶存國山城在荆溪縣西南五十里永豐鄉西臨章溪寰宇記云晉元帝始置國山縣於白石山成帝移於平地去舊城七里綏安城在荆溪縣西南八十里劉宋永初三年分廣德長城故彰義鄉陽羡五縣地置縣屬義興郡義鄉城在荆溪縣東南八十里義山下晉永興初分長城縣地置屬義興郡南東莞故郡在府南境東晉僑置於晉陵南南彭城故郡在府境晉元帝時分武進置晉陵故縣即今武進縣治吳延陵邑季札所封漢為毗陵縣晉懷帝時改為晉陵明一統志云即今公館暨陽故縣在江隂縣東四十里寰宇記云漢莫寵所築以捍海冦因名莫城晉太康初析毗陵縣地置暨陽縣於此今有莫城鄉利城故縣在江隂縣西五十里晉元帝即海虞縣北境立利城縣宋元嘉中遷於武進之利浦今良信鄉有利城鎮按隋志江隂舊有利城梁豐二縣寰宇記云利城戰國時所築一名若溪毗陵宫在府東南十五里夏城鎮隋大業間勑十郡兵匠於郡東南創宫苑周十二里內為離宫十六環以清流䕃以嘉木擬於洛陽西苑而竒巧過之今自城而東南岡阜環列地形髙卬即其遺址避暑宫在陽湖縣馬跡山之內閭灣世傳吳王闔閭避暑處明一統志云有井名閭闔井紫薇宫在靖江縣吳赤烏元年建九斗壇在荆溪縣善權洞山下髙三尺周廣十三步山有九峯狀如覆斗梁天監中武帝禱雨夢神告曰陽羡九斗山有神張水曹帝遣使築壇致祭果得雨陳氏書樓在武進縣奔牛鎮梁武帝素與陳文表善帝即位授以官不就願歸教子敕建是樓居之溪山勝槩樓在無錫縣元華鍈建鄭元祐書額熙春樓在江隂縣古城巷東四山拱揖占登臨之勝宋知軍顔耆仲建警樓在宜興縣太湖濱明𢎞治中設以禦冦萬卷書樓在靖江縣元陳傑建趙孟俯虞集讀書處八角樓在靖江縣孤山之顛紅梅閣在武進縣古薦福寺相傳薛道光與張叔修煉於此望湖閣在無錫縣西北唐李紳建以望芙蓉湖後改為半山亭清閟閣在金匱縣東南梅里鄉元髙士倪瓚故居又有雲林草堂外國使臣皆知其名東山亭在武進縣荆溪館前唐大厯中郡守獨孤及建韋夏卿記多稼亭在郡治內子城西北隅宋乾道間郡守朝子健建張栻為之記明一統志宣德中重修榮賜亭在武進縣狀元橋西南宋大觀三年合試天下貢士獨毗陵五十有三人詔褒之賜州守徐申爵一級申遂立坊於橋南曰進賢建亭曰榮賜繡嶺亭在無錫縣惠山西宋光祿滕中允建以花木繁盛若錦繡故名今聽松菴即其遺址萬竹亭在無錫縣湖埭中宋蔣重珍築堂於此有亭曰萬竹自為記又有東朱亭為朱子也二友齊為楊萬里陳亮也雲海亭在無錫縣華藏寺前赤石亭在江隂縣三十里郭璞云赤石山下有朱砂上有周穆王廟或云穆王曽遊此翠光亭在江隂縣城北一里君山章浦亭在宜興縣西二十五里章浦側晉書云周處封章浦亭侯即此又東浦亭在縣東三十五里泳飛亭在宜興縣迎華驛前南畿志云舊名弄舟宋為放生之所故名浮翠亭在宜興縣南法藏寺前宋治平間建亭面東山蛟川在其北慶源亭在宜興縣北門外宋元豐七年蘇軾艤舟於此今迎恩亭其故址􅖘鄉亭在荆溪縣西六十五里􅖘姥山後漢封蔣澄為􅖘鄉亭侯即此宋蔣堂有詩射虎亭在荆溪縣南五里晉周處射南山白額虎於此後人為之立亭南唐徐鉉詩云斬蛟橋下溪烟碧射虎亭邉路草青西石亭在荆溪縣東南十五里地産蘚梅枝幹竒古蘇軾詩云幽香收艾蘜陳克詩云石亭梅花落如雪皆指此琴臺在武進縣伯牙瀆一室空洞虛應有聲若琴相傳伯牙於此鼓琴棄琴瀆中瀆産琴魚絃徽悉備金牛臺在武進縣奔牛鎮西五里輿地志云漢時有金牛出山東石池到曲阿人栅斷其道牛驟奔故名齊髙帝嘗與蕭順之登此讀書臺在無錫縣惠山寺左唐李紳讀書於此任公釣臺在宜興縣北一里臨荆溪梁任昉為守時垂釣於此讀書臺在荆溪縣善權山巖前有巨石文曰祝英臺讀書處俗呼為祝陵仙人臺在靖江縣孤山上舊傳仙人講道於此宣嘉堂在武進縣舊晉陵縣治東宋大觀間縣令李景得古甓有篆文曰位至公卿功冠天下令名宣揚萬姓嘉昌字畫竒古遂以名堂凝露堂在府治後唐獨孤及守郡時有甘露降宋紹興間郡守鄭作肅因建堂名之厯山草堂在無錫縣西七里歷山即惠山也宋長史湛茂之讀書處其故址今為惠山寺錫麓書堂在無錫縣秦皇塢下宋尤袤讀書處結廬數椽不事雕飾歷四傳無所更易又有遂初堂孝宗手書遂初二字賜焉後袤十四世孫質重構明歸有光為記畫溪西堂在宜興縣西貯謝康樂纍世詩并畫像保義堂在宜興縣城東一里明大學士徐溥置義莊并建堂曰保義庾氷宅今江隂縣祥符寺氷子希為徐兖二州刺史桓溫風有司劾之以罪免家於暨陽郭璞宅在江隂縣黃山北長岸村璞為司農太守移家於此許青𤾉宅在江隂縣青暘市舊有許真君廟相傳即青𤾉宅又有道成墩其修道處也杜康宅在江隂縣東四里即舊承天寺址寺西有杜橋使星館在江隂縣驛橋側宋知軍邢燾重修易名皇華館陽羡館在宜興縣遵義坊舊名迎華驛北臨荆溪小心齊在金匱縣涇里顧憲成讀書處雙楠軒在荆溪縣城南宋慕容暉所居有雙楠如蓋蘇軾取以命名寄暢園在無錫縣惠山寺左舊名鳯谷行窩屢加增葺易今名聖祖南巡臨幸是園賜額二一曰松風水月一曰山色溪光諭德秦松齡恭摹勒石詳見山川碧山吟社在無錫縣惠山南明秦旭建結十老賦詩沈周繪圗徐有貞作記水居在無錫縣五里湖之濱明髙攀龍歸里讀書靜坐之地右曰可樓前曰月坡又城南有止水即攀龍自沉處附明髙攀龍記漆湖之干有洲焉可二十步三分贏一以為廣其外池周之其外堤周之又其外山周之所謂軍將漆塘諸山也主人即洲作居以水為垣豁然四達主人偃息其中以水為娛泊然自得或憑軒而眺或隱几而瞑或曳杖而游目之所赴意之所遇魂魄之所安無非水也居久之於是主人閲日月升沉雲霞起滅草木榮瘁禽魚去來與四時百物相代謝於一水之間而忘乎其為我也居又久之於是主人且宅天宇之寥廓餐元和之膏潤乘浩氣而翩上下於無窮之門而忘乎其為水也或曰子之樂微矣獨矣主人謝不敏曰夫造化者固逸余於是夫吾請問之及命之泰筮得節之兊其卦曰水澤其辭曰安節亨主人爾而笑乃歌曰可以樂饑泌之洋洋兮所謂伊人在水中央兮寶界山房在無錫縣五里湖之濱明王問所居歸有光為記淡寧居在無錫縣西溪馬世竒故宅杜牧之水榭在宜興縣荆溪北牧之有陽羡溪頭買釣舟之句自注云義興近有水榭南畿志云邑人王公輔治地得巨木亘其中云是故址東坡别業在宜興縣北四十里隔湖塘頭嘉祐初坡與蔣之竒有卜鄰之約元豐中自黃移汝乞居常州表云臣有薄田在陽羡可供饘粥陸相山房在荆溪縣頤山唐陸希聲解相印號君陽遁叟著頤山録茶舍在荆溪縣罨畫溪唐李栖筠守常州時有僧獻陽羡茗陸羽以為芬香可供尚方遂置舍嵗貢盧同詩云天子未嘗陽羡茶百草不敢先開花萬嵗街在武進縣阜通鎮梁武帝故里天子路在武進縣萬嵗鎮西舊傳秦始皇遊此或云齊髙帝出鎮東城及為天子後人呼為天子路龍尾道在無錫縣西龍山北越絶書云春申君徙封故吳墟開此專諸塔在金匱縣婁巷狀如浮圗髙丈餘龕其中置主以祀專諸不詳所始孝義里在武進縣通吳門外孝仁鄉梁孝子佘齊民所居宋避熙陵諱改曰孝義即以名鄉鍾村在武進縣西北三十五里相傳鍾子期所居芳硯村在宜興縣西溪之陽義興太守謝泉始遷之地村外隆中窪村南一水如硯王右軍莊在無錫縣西北洛社市即今開利寺菰川莊在無錫縣菰瀆之上户部華雲建沈周有圗今為福城菴蕭莊在金匱縣東四十里梁蕭侍郎别墅今之膠山寺嘯莊在宜興縣西十五里義興太守謝泉居此南莊在宜興縣北五十二里宋蔣之竒嘗置義田於此邊莊在荆溪縣南四十五里南唐疆域止此營屯戍守與吳越為交境之備舊名石門愚公谷在無錫縣惠山寺右中有龍縫泉鄒迪光園華坡在無錫縣惠山寺之東晉孝子華寶所居今有孝子祠附元髙明華孝子故址記惠山寺之東偏當泉水之上有三賢祠按志書今祠址華孝子所居宅也初祠久廢吳人王彬始復倡建既成則以三賢事刻諸石且曰初址實孝子故居孝子之事不可以沒而不著復礱其碑因以記其事章善也孝子名寶晉義熙末始八嵗父豪戍長安且行謂曰我還為汝冠後長安陷父沒寶奉命至七十不婚冠或問之不忍答輒號慟彌日建元三年詔表其門閭凡史載孝子事若此蓋自西晉以來尚淵虛賤名檢教弛法斁波流風靡而孝子獨能篤至行終始不渝其誠意惻怛可以貫金石于雲霓若與宇宙日月同其久於此見天之降衷人之秉彞不以衰世末俗而有異也孝子晉人而謂齊孝子者蓋孝子生於晉長於宋沒於齊當其一身而天下三易姓當時居朝廷有爵位者朝事司馬氏夕事劉朝事劉夕事蕭恬不以為怪而孝子奉父一言七十年餘未嘗斯須忘以至歿身不替使當時朝廷有爵位者其奉君命恪官守亦咸若華氏子則晉不當為宋宋不當為齊而孝子宜不曰齊孝子也凡游於兹者憩幽林酌清泉臨風覽古懷三賢之髙風慕孝子之至行有志者宜加奮勵其未能者則澄思革心勉追遐躅是則某所以樹碑之意云耳夫人性一耳有為者亦若是吾徒宜無自怠郭坡在江隂縣北三十里晉郭璞葬母於暨陽去水百步羣訝之璞曰即為陸矣其後沙壅環墓數十里成桑田謝公墩在宜興縣齊謝朓為宣城太守嘗棲止義興溧陽間墩近畫溪西堂蘭臺聚在荆溪縣東南二十里梁到溉兄弟居此時太守任昉與游號曰蘭臺聚孝感瀆在武進縣滆湖西舊傳晉王祥孫俊封永世侯嘗居毗陵追慕祖德故以名瀆金蓮池在無錫縣惠山寺其水自第二泉流瀦其中金蓮蔓生葉如荇花色黃似蓮而香放生池在江隂縣東二十里即繖湖紹興中詔為放生池中有土阜名繖墩梁武堰在江隂縣七里村相傳為梁武帝所築馬䭾沙今靖江縣境故大江中一洲也廣陵志云吳赤烏間有白馬負土入江而成此洲明嘉靖三年知縣易幹循行至西沙焦山港得斷碣云吳大帝牧馬大沙隔江一洲為牧馬小沙蓋俗訛合牧馬為一聲又訛大為䭾也古毗陵驛在武進縣天禧橋東枕漕渠以通荆溪一名荆溪館宋髙宗車駕幸金陵常經此六射垜寨在江隂縣北四里相傳為秦皇演射處宋置寨於此以控扼江濱又有小石山寨在小石山下亦宋置石橋寨在江隂縣東四十里今有石橋鎮又石橋東有故寧逺寨安邉寨在江隂縣東南四十里南唐置今廢明教寺即其故址劒井在陽湖縣永豐東鄉風土記云葛仙翁駐鶴地有劒躍入水白虹亘天梁鴻井在金匱縣鴻山東嶺相傳鴻適吳嘗居此井猶存義井在江隂縣古城巷內一名廣濟泉宋嘉祐五年乾明院僧宗壽所鑿甓甃甚堅其狀如甕下復有小井約丈餘嵗旱不竭聖井在靖江縣長安寺舊址之北一名長安井其泉清冽與他井異國山碑在荆溪縣西南五十里吳五鳯二年山石自立天璽初有石裂十餘丈成室孫皓遣司徒董朝等行封禪禮樹碑形如鼓其文多漫漶不可辨俗名囤碑附吳孫氏封禪碑文民用不犯於是臣丞相沇曰徘徊於此遂基大宮庶民子來不日頑嚚乃止率土來獻柔服百神經緯庶務日昃不食六經藏㫖百家思道數頻十陵道大啓朱光闓立東觀紀實言建設墳典聞實感神化出幽祗闡舉乃遣使者大宥刑惡道尚善格幽𤣥貺與五福惟神明上天罔應箕宿降祉利丰特發神夢靈璽鎮國玉璽啓自神匱神人指授金册有玉簡者四日月明朗老人星見者一十有一五天瑞氣黃旗紫蓋覆􅗙宫闕顯著牛斗者一十有九麟鳯龜龍銜圖負書卅有九青霓白兕丹角黑草有二白兔白麢白麀白鹿卅有二白雉白烏白鵲白鳩一十有九赤烏赤雀草有四白雀白燕草有七神虎吐書白鯉騰船者二靈絮神絮彌被原野者三嘉禾秀穎甘露凝液六十有五殊幹連理六百八十有三明月火珠璧流離卅有六大貝餘幹泉黍十有五大寶神璧水青㲄璧卅有八玉兕玉羊玉螭三寶鼎神鐘神夔祝神􅦧卅有六石室山石闓石印封啓九洲吉發顯天讖韶石鏡光者一十有一神頌歌廟靈示者三畿民推紀湖澤闓通應讖合謡者五神翁神僮靈母靈女告徴表祥有漆靈夢啓䜟神人授書著驗者十祕略文玉板紀德者三玉人玉印文彩明發者八玉玉綰玉瑻玉玦玉鈎玉稱殊輝異色者卅有三玉尊玉玉盤玉罌清潔光眼者九則子河伯子胥王靈圗言天平墜成天子出東門鄂者四大賢司馬微虞翻推步圗緯甄匱啓緘發若與運㑹者二其餘飛行之類植生之倫希古所覿命世殊竒不在瑞命之篇者不可稱而數也于是旃䝉協洽之嵗月次陬訾之口日惟重光大淵獻行年所值實惟兹嵗帝出呼著周易實著遂受上天玉璽文曰吳真皇帝玉質青黃䚡理洞徹拜受祗悚夙夜惟寅而大德宜報大命宜欽乃以柔兆涒灘之嵗欽若上天月正革元郊天祭地紀號天璽用彰明命于是丞相沇大尉璆大司徒燮大司空翰執金吾修城門校尉歆屯騎校尉悌尚書令忠尚書昏直晃昌圗史瑩核等亦以為天道𤣥曠以瑞表真今衆瑞畢至亖表納貢幽荒百蠻浮海川九垓八埏罔不被澤率按典繇宜先行禪禮紀勤天命遂於吳興國山之隂告祭刋石以對揚乾命廣報坤德副慰天下喁喁之望中書東觀令史立信中郎將臣蘇建所書刻工毁正何鼓漢司農劉夫人墓碑在荆溪縣漢許劭撰靈石在陽湖縣惠化鄉占石村古祠前石形如柱舊傳有取之者風霆大震遂止石牀在無錫縣惠山寺內長數尺厚半之旁刻聽松二字李陽氷篆皮日休詩云殿前日暮髙風起松子聲聲打石牀金鵝石在江隂縣沙山頂列阜三十有二中有一巨石相傳嘗有金鵝立其上孤山碇在靖江縣孤山俗名石碇其石頗潤澤周刻法華經三卷今存其半於土中天慶觀畫龍在陽湖縣東門直街寥陽殿壁題姑蘇道士李懷仁筆世傳懷仁酒豪嘗呼龍松江上狎而觀之以此畫入神品一日大醉睨殿壁索墨汁數斗立就雙龍觀者辟易太平寺畫水在陽湖縣東門直街彌陀殿壁郡人徐友畫清濟貫河一筆起西北隅縈繞數十丈疑若飛濤騰湧鎮江府京城即今府治文獻通考云吳主孫權初鎮丹徒謂之京城通典云南面西面各開一門因京峴號為京鎮因門為京口又曰徐陵鎮南徐州記云京口先為徐陵城邑考云郡有子城周六百三十步即吳所築內外皆甃以甓號鐵甕城晉郤鑒王恭鎮此皆更為營繕南唐林仁肇復修之東西夾城在丹徒縣唐太和中觀察使王播所築長十二里鑿隍繞其外乾符中周寶為潤帥更築土城周二十六里為門十明初耿再成復修築焉曲阿城即今丹陽縣治古曰雲陽秦始皇以其地有王氣鑿北岡以泄之截直道使曲改曰曲阿縣荆城在丹陽縣南五十五里白鶴溪口舊傳漢荆王賈所築劉繇城在丹陽縣西南漢興平元年劉繇為揚州刺史至曲阿築城以禦袁術雲陽城在丹陽縣延陵鎮南有東西二城相距七里與句容縣