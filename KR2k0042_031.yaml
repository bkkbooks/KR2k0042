云長四尺一版廣八尺許陸探微畫獅子在丹徒縣宋蘇軾有贊周鼎在丹徒縣焦山大逾斗古色陸離傳是魏氏所藏明嚴嵩當國索之不得將罪之嵩敗得免魏氏遂以鼎送焦山鼎內有銘篆古莫能識國朝王士禎遊此屬新安程邃譯出勒諸石其銘曰惟九月既望甲戌王還於周於圗室司徒南仲右惠立中庭王呼史受冊命惠曰官司王側作錫汝元衣束帶戈雕㦸縞韠彤矢鋚鑾旗芒惠敢對揚天子丕顯敷休用作尊鼎用享於烈考用周簋壽萬年子孫永寶用凡蝕二字疑不能知者八字何洯周鼎記是鼎也已歷二千餘年矣髙一尺三寸二分耳髙三寸足六寸有一分一尺五寸八分為腹之徑之徑一尺四寸五分其深也八寸有二分篆銘凡十行其六行行九字有四行者行十字字共九十有四焉司勳王西樵邑宰鄒西齊相繼譯之知為周宣王以錫南仲者何其厯年之久也凡物以退藏為可久而以適用為可貴鼎用以薦宗廟享鬼神誠可貴也是鼎獨退藏於深山之佛寺不以適用於世為可貴故能常保其可貴者而厯年之久遂至二千餘年計此二千餘年中鼎之所厯運會升沉陵谷變遷及凡物之成敗得失不知有幾而是鼎以深自退藏故無恙使嘗用於世為世之所可貴則其毁於盜賊水火也久矣余記之所以為不能退藏者戒也延陵古鐘宋孝建三年四月甲辰得古鐘六南徐州刺史竟陵王誕以獻東坡佛印二銅像在丹徒縣金山明萬厯間金山僧重築妙髙臺得銅比邱像於土中入城見市中有髙冠長髯銅像與比邱等尺寸合併知為東坡佛印也又於揚州得銅像二一童子一小沙彌又覺與東坡佛印贈答事有合建留玉閣奉之狠石在丹徒縣甘露寺石似羊諸葛亮曽坐其上與吳大帝謀拒魏或云漢昭烈嘗坐此石石亡已久寺僧輒取一石充數附明龎時雍記漢諸葛孔明與孫仲謀共議破曺瞞計曽據此石後人因名狠石唐羅隱宋蘇文忠俱有詩迄今時異世殊物改而石隨湮沒尋幽弔古者止按空籍而興遐想余令此覔古蹟得石於北固西隅蔬圃積土中其狀如羊者固宛然在也覩其石猶足動忠臣義士誅奸屏邪之思也於是因白之郡守龍溪王公併滕公碑記移之演武場側建亭置扁曰武侯遺石用以鼓三軍之氣云梁郤尊師石臼在金壇縣茅山八卦臺南纍甓為垣鑿石為臼方丈餘遺竇尚在久為荆榛所蔽宋紹興間築菴方見之淮安府射陽故城在山陽縣東南漢髙六年封劉纒為射陽侯後為縣柘塘城在山陽縣西南四十里南畿志云其城三座約圍一里許隋煬帝游江都聚糧於此劉王城在山陽縣東南十里運河西世傳漢吳王濞所築西遼城在山陽縣東二里唐太宗征遼時駐兵於此故名新城在山陽縣西三十五里宋咸淳間置山陽故城在今山陽縣南晉義熙間置山陽縣兼置山陽郡治焉巢城在鹽城縣治北百二十里黃巢屯兵於此淮隂故城在清河縣東南五里秦置漢封韓信為淮隂侯後仍為縣晉永和間荀羡鎮淮隂以地形都要屯兵無地乃營立城池歷代為重鎮水經注云淮水東北經淮隂故城即此甘羅城在清河縣舊淮隂縣治北相傳秦甘羅所築南畿志云雨後常於土中得小錢篆文不可識或云即甘羅葬處韓信城在清河縣故淮隂城東接山陽縣寰宇記云信本淮隂人宅冢處所並存後受封為侯因築此城清河故城在清河縣東北五里宋置吳城在清河縣西二十里小清河南岸東西有二城相隔五里宋南渡後嘗置縣紹興二年罷縣為鎮襄賁故城在安東縣北劉宋泰始中僑置應劭曰賁音肥淮浦故城在安東縣西漢置或曰即今縣治漣水三城在安東縣南畿志云有大城東城二所相連止隔一濠謂之市河又有西城少逺百餘步各有城濠俱宋嘉熙四年知州蕭均所築沙將軍城在安東縣東北五十里一帆河東又有營城在縣北十五里元末董摶霄所築抱月城在安東縣西二十里支家河西城抱淮泗之水形勢似月學城在桃源縣北二十里俗傳孔子適楚駐轍於此邦人從學焉靈城在桃源縣西北十七里相傳楚靈王所築桃園故城今桃源縣治金史云泗州有淮濱縣興定二年以桃園鎮置元光二年廢元至元十四年復置曰桃園縣其後乃訛曰桃源泗陽故城在桃源縣東漢置水經注云泗水經魏陽城北城枕泗川疑即泗陽故城魏文帝臨廣陵所經因以改名也陸城在桃源縣西五里相傳吳陸遜所築古城在桃源縣西北六十里晉石崇出鎮下邳時所築金城故縣在安東縣北唐置九域志云漣水縣有金城鎮即故縣也或曰即襄賁故城淮陽故縣在桃源縣西北隋志云梁置淮陽郡東魏置綏化縣後周改縣為淮陽水經注云泗水東南經淮陽城城北臨泗水即此按晉末有淮陽郡魏髙閭曰去角城十八里當在今清河縣界而水經注泗水所經之淮陽乃在泗陽之上蓋非晉魏之淮陽也杏壇在府學大成殿後宋嘉定間郡守應純之植杏為壇轉搬倉在山陽縣運河之西岸唐江淮漕運於此轉送關陜北有運河堰周世宗始置滿浦關以通水路文峯塔在阜寧縣城南宴花樓在山陽縣南即舊城南門樓其西門樓曰望雲南唐建月波樓在府治舊通判㕔鎮淮樓在山陽縣舊城橋西北宋鎮口都統司酒樓劉伶臺在山陽縣東北七里臨淮水唐許渾詩云劉伶臺下稻花晚韓信廟前楓葉秋水教亭在山陽縣望雲門外宋太守應純之開管家湖以教舟師因建此亭望淮亭在山陽縣西門外舊仁濟橋側南昌亭在山陽縣西三十五里地道記注云韓信從亭長寄食處千金亭在清河縣淮隂舊縣西漂母飯韓信信貴賜千金後人因築亭其上又有漂母岸在淮隂故縣南三亭俱在清河縣韓亭在淮隂故縣南枚亭在淮隂故縣北步亭在淮隂故縣西橋南以韓信枚臯步隲得名宋朝端彥詩云韓枚步隲建三亭故顯當時將相名鹽城監在鹽城縣南新唐志云鹽城縣有鹽亭一百二十三所寰宇記云鹽城監古之鹽亭也歷代海岸煎鹽之所南唐以為鹽城監其後因而不改管鹽場九所在縣南北俱臨海岸曰五祐曰紫莊曰南八遊曰北八遊曰丁溪曰竹子曰新興曰七惠曰四安豹隱堂在安東縣文廟前宋時建趙槩初館於漣水守幕尋以學士知漣水人名其堂曰豹隱韓王莊在清河縣舊淮隂縣西北與廟驛鋪相連舊傳韓信生於此枚臯宅趙嘏宅在府淮隂舊縣南趙嘏詩云家住枚臯舊宅邊鐵柱岡在鹽城縣東城門外明一統志云相傳秦王繫馬柱或云瀕海多蛟龍以此鎮之石人頭出土髙四尺五寸在鹽城縣治北六十里近海岸一里佛陀磯在安東縣北五十里世傳婁道者未出家時取魚置船隨魚去住人以為異因名佛陀磯九陽洞在安東縣治東一里上真觀世傳徐稀築室修煉於此赤岸在安東縣治東十里西三十里亦有赤岸金剛嘴在安東縣治西南三里當淮水之衝築以殺水勢為西城之護南畿志云或曰殘磚上有尉遲恭字老鸛河在山陽縣西七十里周世宗顯德五年伐唐至北辰堰齊雲艦大不能過遂開此河洗墨池在安東縣治右宋郡守米芾去官時滌硯處瓜井在鹽城縣內孫鍾種瓜處南畿志云去治東北半里旱不竭紫極宫畫在山陽縣城西南隅宋楊傑記云嘗有仙來遊題詩於壁刮之不滅又有李公麟畫猿戲馬馬驚而圉人鞭之時稱竒筆娑羅樹碑在山陽縣初在舊淮隂縣南今移府治賓館內唐刺史李雍撰文并書江南通志卷三十二
