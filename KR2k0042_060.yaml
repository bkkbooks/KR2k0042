body:
  text: 江南通志卷六十一河渠志水利夫漳水知用則潟鹵生稻粱雙江繞城則平疇為陸海水利與農田相表裏由來尚矣引源釃渠時其蓄泄導其尾閭疏之束之治水所以治田也禹貢揚州之田下下今吳中賦入幾半九州良由三江五湖之利經厯代脉分鏤刻使通灌溉遂號上腴然通塞因時則利害相乘議者謂淮北之水治其決江南之水治其閼蓋是也而歙宣金陵諸河勢悉趨海而吐納於太湖太湖之需治尤急故首列之凡治水於江蘇松常鎮五府及太倉一州而合以治之者皆以治太湖也故並系之各府州以次分叙無水利者闕之太湖即江蘇松常鎮五府太倉一州水利謹按太湖禹貢東南巨浸曰震澤周禮職方氏揚州藪曰具區即太湖是也廣三萬六千頃周五百餘里中包七十二山四圍濵湖常蘇三郡之地明王鏊五湖記云襟帶三州東南諸水皆歸焉一自寧國建業等處入溧陽迤邐至長塘湖并潤州金壇延陵丹陽諸水以入一自宣歙天目諸山下杭之臨安餘杭湖之安吉武康長興以入而皆由吳江分流以入海則禹貢所謂三江既入而後震澤底定者昭然可見又漢虞仲翔云太湖東通長洲松江南通烏程霅溪西通義興荆溪北通晉陵隔湖東連嘉興水凡五道故謂之五湖觀此則翕受既多泛濫亦甚惟泄其下流之三江白茅港深疏暢達使歸墟無所阻而後上流沿厯之郡邑浸潤灌溉咸收其利也爰舉太湖灌注之堰瀆溪港湖河分上流下流開列于左其不與太湖接壤而自為水利者如江寧之秦淮湖諸水别見於後太湖上流之堰瀆溪港其最著者凡三十有五五堰在溧陽縣西八十里髙淳縣東五十里一曰銀林堰長二十里少東曰分水堰長十五里又東五里曰苦李堰長八里又五里曰何家堰長九里又五里曰余家堰長十里所謂魯陽五堰也西有固城石臼丹陽南湖受宣歙金陵姑孰廣德及大江水東連三塔湖長蕩湖荆溪震澤中有三五里頗髙阜春秋時闔閭伐楚用伍員計開渠運糧今尚名胥溪鎮西有固城邑遺址則吳所築以拒楚者也自是湖流相通東南連兩浙西入大江唐景福二年楊行密將臺濛作五堰拖輕舸饋糧其後東壩既成遂不復通惟永陽江水入荆溪明太祖都金陵以蘇浙糧道自東壩入可避長江之險洪武二十五年浚胥溪治石閘司啓閉命曰廣通鎮永樂元年始改築土壩自是宣歙諸水希入震澤而壩猶低薄水間漏泄舟行猶能越之正德七年增築壩三丈水勢相懸遠甚嘉靖三十五年復自壩東十里許更築一壩名東壩兩壩相隔湖水絶不復東矣傅同叔云自宜興航太湖經溧陽至鄧步凡兩日水路自鄧步登岸上小市名東壩自東壩陸行十八里至銀林復行水路百餘里乃至蕪湖入大江銀林之港鄧步之湖止隔陸路十有八里此十八里中有三五里髙阜而苦不甚髙遇暴漲則宣歙金陵之水皆由荆溪入太湖此髙阜不足以遏之五堰之所以作也單鍔著吳中水利書謂五堰廢則宣歙諸水盡入震澤三州水患無已王鏊震澤編云以此一源最巨為蘇常患伍餘福三吳水利書亦諄切言之蓋蘇常湖水利之一大鎖鑰也安港在鎮江府東北八十里通大江自安港而東北百里為丹陽之包港新豐湖在鎮江府東南三十五里亦曰新豐塘潤浦在鎮江府城東一里北通大江練湖在丹陽縣城北一名練塘俗謂之開家湖納丹徒長山髙驪諸山之水凡七十一流唐時近湖民築堤橫截十四里遂分上下二湖開瀆泄水取下湖地作田國朝康熙中復下湖民賴其利九曲河在丹陽縣北南接漕渠北達大江委蛇七十餘里亦謂之新河河口舊有博望堰閘土人謂可以通潮利漕白鶴溪在金壇縣北上承金陵句曲之水東流入常州界漕渠考縣北有金壇河溧陽髙淳之水由此河出至丹陽城東七里橋其水可以濟運烈塘河在常州西十八里南枕運河北流四十三里入大江一名得勝新河西蠡河在常州府城東南北枕運河接滆湖宜興有東蠡河故此名西歲久淤塞明正德間疏濬亦曰西運河支流入揚子江綱頭河在常州府城北延袤六十五里入無錫江隂界支流入大江丁堰河在常州府東十五里南枕運河北流二十里接綱頭河黃汀河在常州府東北十五里西接綱頭河東入江隂界單鍔云常州運河北偏右有泄水入江一十四瀆即孟瀆黃汀瀆之類也今所存蓋無幾云陳墅河在常州府東二十五里南枕運河北接三山港三山港在常州府東三十里西接戚墅堰芙蓉湖在常州府東五十五里昔時湖岸南北相距凡八十里南入無錫北入江隂又北注於大江明周文襄公圍作墟田千餘頃東南流曰五瀉水滆湖在常州府西南三十五里南北百里東西三十餘里今北通漕河導流東注於湖孟瀆在常州府西三十里奔牛鎮東南枕運河北流一十里入揚子江澡港在常州府北五十里稍西即魏村鎮與烈塘河口相接港南接綱頭河北入揚子江袤四十里歲久澱淤一名竈子港戚墅港在常州府東三十里南接運河東入於三山港東南與江隂接界西北入申利二港入揚子江廟堂港在常州府北今湮蠡湖在無錫縣東南五十里與長洲縣分界東西長三十里南北六里唐刺史孟簡開泰伯瀆東連蠡湖即此陽湖在武進縣東五十里東西八里南北三十二里與無錫分界今多淤為田五瀉河在無錫縣北南枕運河北至江隂武進兩縣界又北至申港入揚子江濠湖在無錫縣東南六十五里北為常熟縣界東為長洲縣界梁溪在無錫縣西源出慧山北合運河南入太湖溉田數十頃洮湖一名長蕩湖在宜興縣西北與溧陽金壇分界周處酈道元皆以洮湖為五湖之一湖周一百二十里西通石臼丹陽等湖東通太湖自東壩築而丹陽石臼湖諸水俱西流入大江與長蕩湖相隔荆溪在宜興縣城南其在城西者亦曰西溪在城東者亦曰東溪凡廣德溧陽金壇并縣西諸山澗水俱流匯於西溪乃貫城繞郭為東溪以下太湖舊志荆溪上承百瀆兼受數郡之水是也今謂之東九里河西九里河河流甚長土人以九計里因名今自縣東分二流其一北達常州為漕河溧陽運船俱由此出其一東達太湖謂之東瀉溪本名東舍訛為瀉一名䝉溪又名五雲溪百瀆在宜興縣西南七十五里者為上瀆北六十里者為下瀆昔以荆溪居數郡下流於太湖口疏百派以分其勢又開橫塘袤四十里以貫之瀕湖畎澮皆通焉後漸廢夾苧干瀆在宜興縣西北昔時瀉長蕩湖之水東入滆湖由滆湖入大吳瀆塘口瀆白魚灣髙梅瀆及白鶴溪而北入常州運河又由運河分流入一十四瀆注於大江今湮申港在江隂縣西三十里相傳春申君所開導江南流置田為上下屯又南經武進縣界分為二東入無鍚五瀉河西入武進三山港俱達於運河利港在江隂縣西五十里導江水南行入武進縣界下流亦達於運河黃田港在江隂縣北二里相傳春申君所開導江水溉田因名邑人於江口置閘號上閘於縣西南十里蔡涇口置閘曰下閘舊有支港數十處今多為潮汐所湮其南接於運河橫河在江隂縣城東引黃田港水貫城而東達縣東六十四里之谷瀆港蔡涇在江隂縣西南十里西接夏港東通黃田有蔡涇閘又東穿運河而接於橫河明天順間運道淺淤議改從孟瀆蔡涇出漕舟石頭港在江隂縣東三十里北通大江南入橫河此上皆江常鎮三郡之水或疏其經流以入太湖或導其支流以入於大江而治於上流者也太湖下流東南入海之大川有三吳淞江即古松江一名松陵江自太湖分流出吳江縣城東南之長橋北流至龎山湖合尹山湖入長洲界折而東入獨墅湖過大姚鋪抵夏駕浦入崑山縣分為二南為吳淞江北為勦娘江復合為一東流入嘉定界經上海又東南流與黃浦合迤邐至吳淞口入於海附明沈幾水利議國家財賦仰給東南東南民命懸於水利水利要害制於三江禹貢所稱三江既入震澤底定者是也自海塘障而東江湮止二江受全湖之水宋元以來多水患也然猶有二江也至嘉靖之季而松江塞矣嘉靖壬戍諸年之所以多水患也海忠介公受符治之功未及半而松江之士夫齮齕焉謝事去萬厯己卯諸年之愈多水患也然猶有半松江全婁江也自庚辰來五十年間松江以半開而易塞婁江以全身而半塞是以半江受全湖之水十年九湮夫奚疑哉請先言婁江夫水勢必趨東南婁在太湖東北而水全趨之者其故有二一者地近北為唯亭南為甪直皆去湖不五十里而潮汐通焉呼吸相接地近則趨從其便也二者勢迫兩江既塞無從分𣲖全身趨婁其勢重其流愈急從其迫也若然則婁之所係大矣而水利之議空設開濬之䇿不講者士夫為之礙也婁江自蘇之婁門出下雉瀆經唯亭至崑山由奣子河抵太倉而入劉河者人以為婁江故道而非也此婁江之最平穩處故治以為官道而險不在焉在北為陽城湖連亘百餘里而走白苑塘南遮松江之半身連亘四十餘里其廣者可百餘丈狹者可十四丈而走安亭漳浦其大凡也而至廣至狹不與焉潮勢洶湧挾泥沙而上泥停水去日漸一日泥壅沙浮河身髙淺小民射利傍岸俱種茭蘆茭蘆既生泥沙藉之可以安立不二三年可種菱藕菱藕衍蔓泥沙愈凝不三四年可種苗稻築為外墟照前漸擴於是河之百餘丈者漸為數丈數丈者漸為二三丈平時不覺逮至夏雨時行水勢一漲急不得瀉膏腴之壤盡為巨浸直須臾耳以所升之毫末易所湮之巨萬以千百家之受利易萬姓之災荒其利害易知而士夫為子孫計狃目前之利必不肯棄此以謀軍國之大計也故曰白苑開利歸蘇而阻撓者必蘇之士夫也其次言松江夫水勢趨東南其正胍也而入海之道稍逺既合東江之水河浦最多最大汪洋浩渺不可復治官道所以驛傳借路嘉興其中水勢既盛蓄泄甚難而松江泥沙同於嘉興其味鹵其質重易於凝滯結為原壤向之河身已架髙屋樓房起為墳墓嘉定以南華上以北一望平蕪百里之中不聞舟楫此豈尾閭之地所宜也哉就耳目所及舉一以例餘如吳江長橋浙直孔道凡有軒車無不駐節試觀長橋之下為門七十有二以殺水勢古人苦心極慮觸目可思而間有貪利者東西占為茭蘆數百頃漸填為平壤架為市房坐視吳江之民頻遭水厄湖水一漲灌城而入全縣之田蕩然為患士民屢屢具呈貪者執不肯行寧兩府全荒不恤也又近之而一縣全荒不恤也又近之而本户所荒百千餘畝子粒不存又不恤也而止顧此尺寸之村罔念滔天之害何愚一至此哉觀此一處例知萬情故曰松江之開利歸松江而開之有阻撓者必松江士夫也然則棄小利以弭大害捐情面以專責成是在今日當事矣婁江亦名下江自太湖分流出吳江縣西北鮎魚口北流入運河經城東為婁門洪注流為上下雉瀆東南為陳湖東北為陽城湖巴城湖之水入焉厯崑山至和塘東合新洋江至太倉州城南又東為劉河口入海吳淞江一帶流至新洋江口及夏駕浦二處交會於婁黃浦在華亭上海境巨川自黃潦涇受黃橋斜塘水斜塘水自三泖來其上為澱湖為急水港為白蜆江自松江分派而來又受嘉興塘水東流至詹家匯為瓜涇塘演迤而東凡南北兩涯之水皆入焉至鄒家寺折而北流趨上海縣東西兩涯之水皆入焉又東北會吳淞江以入海浦約長二百五十餘里比吳淞婁江更濶大故論者指為東江焉附明歸有光寄王太守書某昨承明府論及水利匆遽辭别不及盡言某非能知水學者然少嘗有意考求見盧公武郡志止抄録事蹟略無綱要今新志因之而近來言水利者不過祖述此耳嘗訪求故家野老得書數種獨取郟氏二三家斷以為專門之學遂彚録成書非能特有所見也惟以三吳之水瀦於太湖太湖之水泄於松江古今之論無易此者故著論以暢前人之㫖嘗又讀禹貢注三江者迄無定論惟郭景純及後來邉實之論為是故定以為三江之圖明府見諭謂吳淞江與常熟縣無預某所論三吳之水非為常熟一縣之水也江水自吳江經由長洲崑山華亭嘉定上海之境旁近之田固藉其灌溉要之吳淞江之所以為利者蓋不止此獨以其直承太湖之水以出之海耳今常熟東北江海之邉固皆髙仰中間與無錫長洲崑山接壤之田皆低窪多積水此皆太湖東流不決之故若吳淞江開濬則常熟自無積水然則吳淞江豈當與許浦白茅並論耶明府又謂揚子江錢塘江何與於吳中水利某意特欲推明三江之說蓋自來論吳中之水必本禹貢三江既入之文自孔安國以下以中江北江為據既失之泥班固韋昭桑欽近似而不詳固當從郭景純惟三江之說明然後吳中之水可得而治也經曰三江既入震澤底定先儒亦言三江自入震澤自定文不相䝉然吳淞一江之入震澤底定實係於此經文簡略不詳耳某誠恐論者不知此江之大漫與諸浦無别不辨原委或泥張守節顧夷之論止求太湖下之三江用力雖勞反有攴流湮汩之患也但欲復禹之跡誠駭物聽即如宋郟亶時之丈尺時力亦恐未及而水勢積壅為害欲求明府先令所在略據今日河影開桃茭蘆使自崑山夏駕口至嘉定栅橋尋入海之口則江水有通流之漸矣今春量撥賑饑之穀召募饑民或可即工又旁江之民積占茭蘆指以告佃為名所納升斗之稅所占即百頃之江兼之漲灘之稅亦多吏胥𨼆沒官司少獲其利昔宋時圍田皆有禁約今姦民豪石占江以遏水道更經二三年無吳淞江矣若責所占之人免追花利止令隨在開挑以復舊跡則官不費而姦有所懲矣某二十年屏居江上未嘗敢獻書當事者異日吕公有意水利然以平日非相知不敢有所陳前以分司舊識因開瓦浦問及之而明府親屈二千石之重敦行古誼虛懷下接且惓惓以吾民魚鱉為憂故特有言耳然區區所望於明府有大於此者昔魏王召史起問漳水可以灌鄴田子何不為寡人為之史起曰臣恐王之不能為也王曰子誠能為寡人為之寡人盡聽子矣史起敬譗曰臣為之民必大怨臣大者死其次乃籍臣臣雖死籍願王之使他人遂之也王曰諾使為鄴令史起因往為之鄴民大怨欲籍史起史起不敢出而避之王乃使他人遂為之水已行民大得其利由此言之興一世之功不當恤流俗之議也區區之見要以吳淞冮必不可不開即日渡江逺離節下豈勝瞻戀因還船附此不宣水利後論單鍔以吳江堤橫截江流而岸東江尾茭蘆叢生泥沙漲塞欲開茭蘆之地遷沙村之民運去漲土鑿堤岸為橋走水而於下流開白蜆安亭江使湖水由華亭青龍入海雖知松江之要而不識禹貢之三江其所建白猶未卓然所以欲截西水壅太湖之上流也蘇軾有言欲松江不塞必盡徙吳江一縣之民此論殆非鍔之所及今不鐫去堤岸而置為千橋亦守常之論耳崇寧二年宗正丞徐確提舉常平考禹貢三江之說以為太湖東注松江正在下流請自封家渡古江開淘至大通浦直徹海口當時惟確欲復古道然確為三江之說今亦不可得而考元泰定二年都水監任仁發開江自黃浦口至新洋江江面才濶十五丈仁發稱古者江狹處猶廣二里然二里即江之湮已久矣自宋元嘉中滬瀆已壅噎至此何啻千年郟氏云吳淞古道可敵千浦又江旁縱浦郟氏自言小時猶見其濶二十五丈則江之廣可知故古江蟠屈如龍形蓋江自大湖來源不逺而勢既廣若徑直則又易泄而湖水不能蓄聚所以迂回其途使如今江之淺狹何用蟠屈如此余家安亭在松江上求所謂安亭江者了不可見而江南有大盈浦北有顧浦土人亦有三江口之稱江口有渡聞之百嵗老人云往時南北渡一日往東僅一二回可知古江之廣也本朝都御史崔恭鑿新道自大盈浦東至吳淞江巡檢司又自新涇西南蒲匯塘入江自曹家河直鑿平地至新場江面廣十四丈夫以郟氏所見之浦尚有二十五丈而都水所開江面才及當時之浦至本朝之開江乃十四丈則興工造事以今方古日就卑微安能復見禹當時之江哉漢賈讓論治河欲北徙冀州之民當水衝者決黎陽遮害亭放河北入海當開壞城郭田廬冡墓以萬數以為大禹治水山陵當路者毁之隳斷天地之性此乃人功所造何足言也若惜區區漲沙茭蘆之地雖嵗嵗開浦而支本不正水終橫行今自嘉靖以來嵗多旱而少水愚民以為自今不復見白水之患余嘗聞正德五年秋雨七日夜吳中遂成巨浸設使如漢建始間霖雨三十日將如之何天災流行國家代有一遇水潦吾民必有魚鱉之憂矣或曰今獨開一江則其餘溪港當盡廢耶曰禹决九州距四海濬畎澮距川江流正則隨所在可引以溉田且江流浩大其勢不能不漫溢如今小江尚有勦娘江分四五里而合者則奇分而旁出古婁江東江之跡或當自見且如劉家港元時海運千艘所聚至今為入海大道而上海黃浦勢尤洶湧豈能廢之但本支尊大則支庶俱得所矣此上皆承太湖之下流而納諸港之水以入海者也東北入江之大浦有八白茅港在昭文縣東七十里橫廣三十餘丈長亘九十餘里為蘇常諸水東北出江第一要道蓋震澤之水北注於陽城巴城等湖而江隂無錫諸邑接受宜興溧陽諸山之水又回環聚於華蕩尚湖等巨瀦東江既失故道婁淞淺澀震澤洪流東指之勢獨白茅為尾閭宋人言水利者每言導太湖分流東北由諸浦注之江而諸浦中白茅最大今屢議疏浚福山港在常熟縣北四十里自城北水門二十里經斜橋又二十里經福山入大江亦曰福山塘許浦在常熟縣東北七十里自縣城東北三十五里經梅李塘又三十五里為許浦入大江宋時以百涇七鴉白茅許浦下張為崑常間五大浦又以梅李塘白茅浦崔浦福山浦黃泗浦為常