body:
  text: 江南通志卷九十四武備志兵制三江南全省提督軍門駐劄松江府順治二年蘇州總鎮統兵駐守後提督移鎮管理蘇松常鎮四府各營軍務康熙元年統理全省十四年添設提督一員駐劄安徽管理上江七府營務全省提督改為江寜提督管理下江七府營務仍駐松江十七年安徽提督奉裁復管全省軍務標下中左右前後五營兼轄松江城守金山柘林青村川沙南匯黄浦劉河吳淞福山太湖常州江隂靖江楊舍孟河鎮江潛山徽州寜國池州蕪采廣徳二十三營中營順治四年設舊額叅将一員守備一員千總二員把總四員馬戰兵二百四十六名步戰兵八十名守兵五百二十三名官坐馬二十四匹戰馬二百四十六匹唬快船一隻廵船二十一隻康熙二十三年改馬戰兵八十名為步戰守兵裁馬八十匹二十五年撥馬步戰守兵二十名馬五匹入京口右路營三十五年裁步戰兵三十名雍正二年撥步戰守兵十名入太湖營五年撥馬步戰守兵十一名入蘇州營七年添設外委千把總六員仍食馬戰兵糧八年撥守兵三名入泰州營九年撥守兵十五名入蘇州營叅将一員駐劄松江府城中軍守備一員駐劄松江府貼防黄浦汛千總二員駐防松江存營操練把總四員一輪防黄浦汛一輪防金澤汛一輪防鍾賈山汛一輪防朱涇汛俱駐松江府外委千總二員把總四員協同經制千把總防守馬戰兵一百六十名步戰兵九十七名守兵五百三名官坐馬二十四匹戰馬一百六十匹唬快船一隻廵船二十一隻嵗需俸薪餉乾連閏銀一萬三千一百四十三兩九錢一分二釐米二千九百六十四石是營防守婁縣上海縣金山縣青浦縣地方左營順治四年設舊額逰擊一員守備一員千總二員把總四員馬戰兵二百四十六名步戰兵八十六名守兵五百二十二名官坐馬二十二匹戰馬二百四十六匹廵船十一隻康熙二十三年改馬戰兵八十名為步戰守兵裁馬八十匹二十五年收京口右路馬步戰守兵十九名歸營三十五年裁步戰兵三十二名五十四年撥守兵四名入川沙營五十七年收右營廵船五隻歸營雍正二年撥步戰守兵九名入太湖營五年撥馬步戰守兵十一名馬二匹入蘇州營七年添設外委千把總六員仍食馬戰兵糧八年撥守兵二名入泰州營九年撥守兵十四名入蘇州營遊擊一員駐劄華亭縣城中軍守備一員駐防華亭縣城千總二員俱駐防華亭縣把總四員一駐防華亭縣一駐防小涇汛一駐防章練塘汛一駐防盛澤汛外委千總二員把總四員協同經制千把總防守馬戰兵一百六十名步戰兵一百名守兵五百三名官坐馬二十二匹戰馬一百六十匹廵船十六隻嵗需俸薪餉乾連閏銀一萬五千四百七兩一錢七分二釐米二千九百七十五石七斗是營防守元和縣吳江縣婁縣青浦縣金山縣地方元和縣汛地墩堡三處吳江縣汛地墩堡六處婁縣汛地墩堡七處青浦縣汛地墩堡六處金山縣汛地墩堡二處右營順治四年設駐劄松江府城舊額逰撃一員守備一員千總二員把總四員馬戰兵二百五十名步戰兵一百名守兵五百五十名官坐馬二十二匹戰馬二百五十匹廵船二十二隻康熙二十四年改馬戰兵六十六名為步戰守兵又裁去十四名馬八十匹二十六年裁馬步戰守兵三十名馬五匹三十五年裁步戰兵三十一名五十四年撥守兵四名入川沙營五十七年移駐上海縣五十八年收黄浦營廵船六隻歸營撥廵船五隻入左營又撥廵船七隻入後營雍正二年撥戰守兵七名入太湖營五年撥馬步戰守兵十一名馬一匹入蘇州營七年添設外委千把總六員仍食馬戰兵糧八年撥守兵二名入泰州營九年撥守兵九名入蘇州營遊擊一員駐劄上海縣城中軍守備一員駐防上海縣城千總二員一駐防上海縣城一駐防閔行汛把總四員一駐防北簳山一駐防引翔港一駐防塘橋汛一駐防泗涇汛外委千總二員把總四員協同經制千把總防守馬戰兵一百六十名步戰兵一百一名守兵五百九名官坐馬二十二匹戰馬一百六十匹廵船十六隻嵗需俸薪餉乾連閏銀一萬二千三百七兩四錢一分二釐本折米二千七百七十二石是營防守華亭縣婁縣上海縣南匯縣青浦縣福泉縣地方華亭縣汛地墩堡四處婁縣汛地墩堡三處上海縣汛地墩堡九處南匯縣汛地墩堡一處青浦縣汛地墩堡四處福泉縣汛地墩堡七處前營順治四年設舊額逰擊一員守備一員千總二員把總四員馬戰兵二百四十七名步戰兵八十四名守兵五百二十二名官坐馬二十二匹戰馬二百四十七匹廵船十一隻康熙二十三年改馬戰兵八十名為步戰守兵裁馬八十匹二十五年裁撥京口右路營馬步戰守兵十九名馬五匹三十五年裁步戰兵三十二名五十四年撥守兵四名入川沙營雍正二年撥步戰守兵九名入太湖營五年揆馬步戰守兵十一名馬一匹入蘇州營七年添設外委千把總六員仍食馬戰兵糧八年撥守兵二名入㤗州營九年撥守兵十六名入蘇州營遊擊一員駐劄華亭縣城中軍守備一員駐防華亭縣城千總二員俱駐防華亭縣把總四員一駐防華亭縣城一駐防清浦縣一駐防震澤汛一駐防斜塘汛外委千總二員把總四員協同經制千把總防守馬戰兵一百六十一名步戰兵九十八名守兵五百一名官坐馬二十二匹戰馬一百六十一匹廵船十一隻嵗需俸薪餉乾連閏銀一萬五千三百八十九兩四分米二千九百六十四石是營防守震澤縣青浦縣福泉縣婁縣金山縣地方震澤縣汛地墩堡九處青浦縣汛地墩堡五處福泉縣汛地墩堡二處婁縣汛地墩堡一處金山縣汛地墩堡一處後營順治四年設舊額逰擊一員守備一員千總二員把總四員馬戰兵二百四十七名步戰兵八十三名守兵五百二十三名官坐馬二十二匹戰馬二百四十七