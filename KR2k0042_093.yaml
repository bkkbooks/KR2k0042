者甚多雖提鎮向有外委把總之例不過就於本部馬兵中挑選給以委牌從未達部亦未有以㧞補把總者而此項外委把總既不能實心辦事兵丁未必聴約束嗣後請照㧞補把總之例揀選人材壮健弓馬純熟者給以外差把總委牌悉行報部賞以頂帶令其差操効力遇有把總缺出秉么㧞補倘懶惰庸愚即令斥革等語除俞㫖照外委把總遵奉之例給以八品頂帶載入例册通京城副驍騎校行遵照外伏查各省外委不止把總一項雍正五年五月内臣部議覆福建總督髙其倬議奏外委千把總各官自行㧞委數無一定嗣後凡額兵二百名許外委把總一員每兵四百名許外委千總一員協同經制千把總管辦汛守俱於馬步兵内揀選㧞補報明該督撫提鎮騐㸔給劄年終造册㫖允行報部飭令各該管官約束稽查奉總一例賞給八在案則外委千總亦應與外委把品頂帶以示鼔勵令各省督撫提鎮凡有原設外委千把並尚有應行添設者一併酌添悉行報部如有經制馬兵㧞補如無經制馬兵地方照例以步兵㧞補再外委千把既入經制給以頂帶協管汛守均有責任亦應叅處如地方失事定例原不許以外委題叅塞責仍将經制耑汛官照例題叅疎防外委千把無俸可住無級可降初叅失事停其㧞補二叅不獲重責二十棍三叅革去頂帶仍令協緝四叅革去外委全獲一體免議准其開復如此則經制外委自必各顧考成互相廵緝如果汛防勤謹地方寜謐該督撫等遇有經制千把總缺出即行秉公㧞補奉㫖依議雍正八年奉上諭從前朕以武弁一年所得俸薪不敷所用令自提督以至千把總俱量給與親丁名糧以資養贍今各省添設外委千把尚未議及念此外委人員所辦者千把總之事而所食者仍止本身一分馬糧一應公差紙筆衣馬之費實有不敷著将各省添設外委千把總每員給與步糧一分即令伊之子弟家人頂食以資養亷但有仍借辦公名色扣尅兵餉滋擾地方者著該管官即行揭報該轄大員指叅毋得姑狥寛縱特諭十三年十二月二十日奉上諭朕御極恩詔内将出征兵丁所借銀兩俱已免其繳還又念出征之䕶軍校驍騎校雖係官員品級仍在兵丁内支食錢糧特降諭㫖将伊等借支銀兩一併豁免今復思緑旗内有千百把總及外委㣲員既與兵丁一同効力疆場當與八旗䕶軍校驍騎校一同霑被恩澤著将伊等所借錢糧亦免繳還以示朕加恩未弁之至意特諭江南通志卷九十四
