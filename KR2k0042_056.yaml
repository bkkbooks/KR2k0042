body:
  text: 江南通志卷五十七河渠志海禹貢淮海惟揚州其地東南際海今江南於古揚州之地得三之一而東北入古徐州之界其東境皆瀕海也起海州海去州治二十里厯安東縣東為淮水會黃入海之口海去縣治二百五十里其南岸則阜寧縣海去縣治九十里自阜寧縣東北折而東南至鹽城縣東海口去縣治一百二十里又東南至興化縣東海去縣治一百二十里又東南至泰州東海去州治東二百四十里劉莊場海口去州治東北一百九十三里為興化鹽城二縣界又南至如臯縣東海岸掘港場去縣治一百三十里又東南至通州東為江水入海之口海去州治一百八十里其南岸則太倉州海去州治九十里又東南至寶山縣東海去縣治三里又東南至上海縣東海去縣治五十四里又南至南匯縣東海去縣治三里又南至奉賢縣東海去縣治三里又南至金山縣東海去縣治二里凡靈潮駭水之所回薄千有餘里無崇岡峻嶺為之限隔有颶風鼓浪衝冒民田之患不有隄防曷資扞禦我世宗憲皇帝軫念東南赤子以捍海塘工為奠寧至計特遣大臣相視籌畫發帑修築既易土甃石復增土外護以障蕩雲之波永有農田之利功德邁前古矣溯自晉代欲有考信焉晉永和中吳國內史虞潭修滬瀆壘吳郡志松江東㵼海為滬海亦曰滬瀆唐開元元年築捍海塘起杭州鹽官抵吳淞江一百三十里大厯初淮南節度判官黜陟使李承式築捍海塘自楚州鹽城南抵海陵綿亘百里障蔽潮汐以衛民田宋開寶中增修揚州捍海堰天聖五年范仲淹監西溪鹽倉建議更築捍海塘發運副使張綸上其事且自請知泰州以仲淹令興化董修築之役六年功成因名范公隄長一百四十三里有奇基闊三丈面一丈高一丈五尺宋史張綸傳綸除江淮制置發運副使泰州有捍海堰延袤百五十里久廢不治歲患海濤冒民田綸方議修復論者難之以為濤患息而蓄潦之患興矣綸曰濤之患十九而潦之患十一獲多而亡少豈不可耶表三請願身自臨役命兼權知泰州卒成堰復逋户二千六百州民為立祠附范仲淹張公祠堂頌序惟兹海陵古有潮堰舊功弗葺驚濤薦至鹽其稼穡偃其桑梓此邦之人極乎其否公堅請修復厥功橫議囂然慬使中廢公又與轉運使胡公令儀再列其狀朝廷可之仍許兼領是郡以觀厥成起基於天聖五載之秋畢工於六載之春至和中海門知縣沈興宗築捍海隄袤七十里紹興三十年知華亭縣劉俁繕海塘乾道七年知秀州丘崈修華亭瀕海十八堰附宋丘崈奏築捍海堰狀華亭縣東南大海古有十八堰捍禦鹹潮其十七久皆捺斷不通裏河獨有新涇塘一所不曾築捺海水往來遂害一縣民田緣新涇舊堰迫近大海潮勢湍急其港面闊難以施工設或築捺決不經久運港在涇塘向裏二十里比之新涇水勢稍緩若就此築堰決可永久堰外凡官民田皆無鹹潮之患其運港止可捺堰不可置閘不惟瀕海土性虛燥難以建置兼一日兩潮通放鹽運不下數十百艘先後不齊比至通放盡絶勢必畫夜啓而不閉則鹹潮無緣斷絶運港堰外别有港汊大小十六亦合興修若捍海塘堰既已畢工地里闊遠全藉人力固護乞令本縣知佐兼帶主管塘堰職事繫銜秩滿視有無損壞以為殿最仍令巡尉據地分巡察淳熙三年築泰州月堰宋史河渠志詔築泰州月堰以遏潮水從守臣張子正請也八年提舉淮南東路常平茶鹽趙伯昌言通州楚州沿海舊有捍海堰東距大海北接鹽城袤一百四十二里始自唐黜陟使李承實所建遮護民田屏蔽鹽竈其功甚大厯時既久頽圮不存至本朝天聖改元范仲淹為泰州西溪鹽官日風潮泛溢淹沒田産毁壞亭竈有請於朝調四萬餘夫修築三旬畢工遂使海瀕沮洳潟鹵之地化為良田民得奠居至今賴之自後寖失修治才遇風潮怒盛即有衝決之患自宣和紹興以來屢被其害阡陌洗蕩廬舍漂流每一修築必請朝廷大興工役然後可辦望令淮東常平茶鹽司今後捍海堰如有塌損隨時修葺務要堅固可以經久從之是年待制張子正加修范公隄四年泰州修桑子河堰附吕祖謙記淳熙元年夏六月泰州本部潮大上敗捍海堰詔州與兩使者恭治維堰初作於文正范公首起海陵尾屬鹽城兩縣間百餘里及是半圮於水有司繕築未幾以訖工聞獨桑子河以南徑如臯境繚許氏莊後皆范公規略所未及春夏霖雨海汐暴興田廬冒沒版藉日耗詔以委今魏侯不以造端立始前無規橅而有所憚悉搜悉講發命以四年十月乙酉甫半月而堰成其袤三十有五里其縱尋有三尺趾廣二丈四尺積工一十有五萬郡人擁府門歡賀又走書蘄記侯不能禁昔吳起引漳水以溉鄴追修西門豹之遺利杜預將橋大河或者以商所都厯聖賢而不作殆必難立二者胥失也斯民之生理無極而陵陸川浸之勢屢遷顓守陳迹者既不足與合變至於因時建置雖由已出然前人仁心仁聞亦有以起之侯於是役習於羣公先正之源委一旦身履其迹而手賦其功用能先事不惑已事不矜以興泰人之長利終文正公之遺緒助成聖天子實邊之大計後之為政者將於此乎考侯名欽緒厯陽人涖役者海陵尉朱棣督護者知如臯縣耿漢知海陵縣穆沂元大德五年築華亭縣捍海塘塘高一丈靣闊一丈底二丈興化令詹士龍大修捍海堰凡十六月成延袤亘三百餘里至正二年四月都水庸田使司增築華亭縣捍海塘一千五百三丈八尺明洪武九年敕工部遣官修築海岸南抵嘉定縣界北跨劉家河三十二年嘉定縣老人朱六安奏海患敕工部遣官修築海塘南抵嘉定縣界北跨劉家河長一千八百七十丈基廣三丈面廣一丈永樂二年冬命水官何傅督修海塘高倍於前十年命平江伯陳瑄修築海門縣捍潮隄岸成化八年松江府知府白行中督華亭縣知縣戴冕築海塘自海鹽抵上海縣界築三萬四千七百六十九丈又為外隄起戚漴至平湖縣界五十三里上海縣知縣王崇之自華亭抵嘉定界築一萬七千七百四十八丈又檄嘉定縣知縣白思明自寶山北至劉家河築一千八百一十丈三縣所築隄並面闊二丈址倍之高一丈七尺成化中御史雍泰修范公隄巡撫畢亨增築海塘及裏護隄曹印儒海塘考海塘之制本為捍禦鹹潮以便耕稼唐開元初名曰捍塘起杭之鹽官迄吳淞江長一百五十里宋乾道中元至正初皆修焉起嘉定之老鸛觜以南抵海寧之澉浦以西高於城垣內外皆有塘溝相夾國初信國公湯和經略海防倚以為固至成化中頽廢巡撫畢亨益增其舊及裏護塘兵農兩濟嘉靖四年水利僉事蔡乾修海岸二十二年巡撫蔡克濓修捍海塘檄太學生喬鏜董其役捐資首倡兩月訖工凡九十里是年太倉州知州馮汝弼修築海塘自劉家河北至常熟縣界九千二百八十七丈劉家河南至嘉定縣界一千八百五十六丈增高五六尺二十三年嘉定縣知縣張重增築捍海塘自吳淞所南抵上海草蕩萬厯三年巡撫御史宋儀望巡按御史邵陛巡鹽御史王藻水利副史王叔杲檄松江知府王以修華亭知縣楊瑞雲修築捍海塘附徐階記略華亭縣故有捍海塘按志塘築於開元元年縣創於天寶十年則塘固先縣而築矣豈塘成之後海水既不闌入而江湖之水又藉以停蓄故耕者獲其利日富日蕃而縣因以建歟萬厯三年夏五月晦海大風鼓浪山立怒號而西注敗塘於漴闕於白沙漂沒廬舍百十區潮乘其缺日再入流溢四境潮味鹹所過禾麥豆蔬立稿適歲旱民不得灌溉太守西蜀王侯以修檄知縣事南海楊君瑞雲往視楊君冒盛暑循海行二百里具得其狀以白侯侯首議修築費巨無所給或謂民可役也巡按御史姚江邵公陛曰華亭人疲矣吾奚忍益之亟出贖金五百兩俾侯經始巡撫中丞永豐宋公儀望聞之出贖金三百督鹽侍御真定王公藻出贖金百侯亦出贖金二百及河夫之直二百六十召徒役其器用囊糗船粟率楊君齋禱而從事於是整飭兵備東甌王公叔杲為設禁令陳賞罰擇典史林國惠千户李國美百戶濮文卿使董厥功畚築日奮塘亟告成長八百五十丈有奇高厚各一丈五尺趾加厚二丈川原底寧行其上者若坦途耕於其內者若倚平岡不復虞鹹潮之入也八年巡鹽御史薑璧請塞石䃮口築捍海故隄命鹽城縣知縣楊瑞雲董其役從之附胡希舜記出鹽城東門一里許有石䃮口故有木橋以便往來久之海溢橋壞萬厯丙子鹽城令杜君善教以興化巨公主議浚河建閘河通潮大至壞閘水澎湃震蕩盡沒民田一時居民淪溺者無算於是鹽城父老子弟鼓喙而爭言塞石䃮口矣庚辰歲楊令瑞雲言之巡鹽御史薑公璧是年題請塞石䃮口修宋丞相范文正捍海故隄而命楊令董其役自是海潮不得奪隄而上鹽人永無海患矣乃鄰縣興化歲被水籍籍咎石䃮口塞之非便請於當事者固欲開石䃮口當事者屢遣諸縣令率丁夫至石䃮口名為相視實令遂開之楊令以死拒之曰鹽城萬民之命皆懸石䃮口今懸諸君諸君如遂開變隨手至矣諸君何以謝鹽城則又借箸畫地形曰夫地形若釜興化則釜腹也鹽地高如釜邊釜邊即張其口安能泄釜腹中水哉諸令皆負空手而去於是石䃮口卒不開楊令居恆語人曰雲令鹽城數年去矣顧如鹽城百年何蓋不敢賈鹽城以徇當事者意欲鹽城士民徵余記述石䃮口之始末且以諗諸來者示無改也論日隆萬以來河淮南徙淮揚諸郡縣歲蒙水患自頃築高堰障水不來然非大開海口莫能泄也孰知諸海口可開石䃮口則不可開何者石䃮口薄城所憂不獨在田也昔范隄之築本以捍海潮今者塞石䃮口築長隄最符范公始謀然范公隄外多民居每受海患楊公則遷其隄包民居於隄內功德巨矣嗣來者幸無令鹽人興汝南之歌哉十年總漕都御史凌雲翼題準修築范公隄建泄水涵洞水渠一十七處石閘一座十二年松江築外捍海塘松江府志上海知縣鄧炳起工越明年松江府通判鄒志學知縣顏洪範成之長九千二百五十丈五尺十六年鹽城令曹大咸修范公隄附張試記略鹽城為淮郡屬邑其治距海一舍而近其土沃可耕苐潮悍敗田禦之在人代有建畫志不盡志惟宋范丈正公監鹽稅時嘗請諸朝築隄於通泰海州境以衛民田鹽邑實居其間故隄今尚蒙公姓隆慶乙巳黃淮兩河水溢潰上隄奔匯於鹽鄰邑實與同患有柄議開海口於鹽治東泄水良便者鹽人習見水道懸阻徒捐力費無益拒之不得遂鑿隄抵於洋涯時萬厯乙亥也既而鄰患水如故鹽自是兼受潮貽患始益深矣及庚辰春前令南海楊公瑞雲力控當路修復之其有造於鹽甚大胡侍御為之碑厥後丙戌夏淮水復溢齧范家口而下鹽害愈劇前修復隄湍潰如潭者二郭之東直廣惠䃮北直大通䃮河海激蕩勢幾及郭民情洶洶明年夏江陵曹公至議築之會歲旱不果今年春哺飢稍暇乃列興廢利病狀上之院道若郡皆報可於是飭材庀工乃湮乃築再旬而兩潰隄告竣復沿故隄迤亘十里所為之補斷增卑培薄崇隄屹然鹹淡有截廣斥敷腴自今以始歲恆登矣崇禎七年十一月松江知府方嶽貢華亭知縣張調鼎始於漴闕建捍海石塘二百八十九丈內患口一百十九丈疊石十二層高一丈四尺東西兩塘接連患口一百十七丈疊石十一層高一丈二尺八寸東盡塘五十三丈疊石十層高一丈一尺六寸八年十二月工成附錢龍錫石塘記略漴闕者吳郡漁舟入海採捕處也其外漁船鱗次並無護沙漁人緣隄上下如蟻附然春夏百賈蝟集蹂躙無虛刻宜此隄善潰矣考志萬厯初年曾潰潰而築猶土隄也費逾千金崇禎六年季夏望大潰至中秋望季冬朔再潰七年元旦與六月幾望又連潰海潮洶湧與內河合沿河數百千頃禾多淹沒邦人大恐適郡侯禹修方公自覲歸偕邑侯張公博謀於衆僉謂今隄必以石如鹽官設仍以土是歲以千金抵海也或又謂海勢不可與爭宜徙而之內侯熟計海趨沙挾河益橫即內徙何能攴且腴壤淪而賦不辦非守臣所敢任也定議塘必以石必仍外貫顧石費十倍土乃請上臺贖鍰及風商民好義者得六千餘緡又度宦册業戶膏腴者一體勸輸所得二萬有奇金具矣復請孝廉純如吳君董其役浹歲而石塘成十三年知府方嶽貢復建石塘二百六十三丈有奇舉人何剛董其役國朝順治三年修築漴闕捍海石塘七年松江捍海塘圮知府廖文元繕完之康熙七年提督梁化鳯修築松江捍海塘圮缺者共二千二百丈有奇九年修築范公隄建劉河大閘附黃與堅記太湖諸水從蘇松以入海松之吳淞江蘇之劉家河入海要道也其患在潮與汐逆而上淀積渾沙日以淤塞幾十年間必其濬之而興大工役大衆不可以數舉於是當事者與其士大夫思諸口受噎之處如何而可以引凊水捍濁水蓄泄之宜如何而旱可以瀦水潦可以㵼水使歲歲無大恐則惟閘是問古之治水者浚河置閘嘗先後行之然有行之無甚效因其不效而寖廢者以置乎內不置乎外也閘以拒濁水之至若置於內而水道紆且折其來急其去緩一日之間潮將下而汐又至是清水無出口蕩滌之時而沙土之停留於內者日有其再此致塞之由也宋三十六浦閘至政和中慶安福山僅存其二范仲淹葉清臣開茜涇等浦皆置閘不久頽壞至明時多設堰閘皆屬內地為虛設自古以來數數然不能盡其道卒無功以致廢康熙庚戌大浚劉河隨度天妃宫地址距海十一里議建閘有三慮庳薄不可久乃一之始辛亥六月迄壬子三月工以竣於是州之父老過而歎曰嘻善矣哉劉河有三大灣曰相見曰半涇曰公塘水勢皆洄漩紆折瀕海而遙至天妃宫迫於海其勢弩矢直矣於兹置閘也有五利焉潮上則閉潮下則啓楊涇以南得以乘水勢滌浮沙一利也濁泥不淀於閘內使瀂漕至鹽鐵永無壅塞患二利也旱潦有所恃三利也閘與海近即有淤澱易淘浚四利也海㳌無民船往來不煩啓放並築月河於其旁五利也從此以往嚴職守時啓閉歲功以成民獲寧息非蘇同知師公佐暨州蕭公應聘無以董若成非布政使慕公天顔無以創兹議貽利於數十世非巡撫馬公祜無以咨諏入告朝廷邀蕩恩至於一閘之細並加區畫後之人其尚念浩創始之艱飭而舉之共為永利矣哉閘長一十有六丈闊五丈水門三中闊二丈有四尺旁殺之堍闊二丈有八尺墩殺之四隅築石實土以護閘凡二十丈其吳淞江大閘設於江口宋家橋者率相倣云雍正二年三月松江知府楊紹修內外捍海塘松江府志康熙六十一年海濱士民顧智倪泰交等以護塘東開墾升科近患鹹潮淹沒列上府縣願自挑築護塘知府楊紹申布政司鄂爾泰定議於鹽蘆界挑築至是年三月府檄吳淞司巡檢青浦縣主簿督視起工至閏四月一二三圑工已半七月十八日海水挾颶風駕外塘溢內塘新築客土未堅勢不復可支矣九月上諭江南浙江督撫等今歲七月中颶風海潮泛溢江南浙江省沿海州縣衛所隄岸多被衝塌居民田廬漂沒朕軫念深切已令江浙地方官亟行賑濟撫綏毋使災黎失所今被衝海塘若不及時修築恐鹹水久灌內河有礙耕種爾督撫等著即查明各處損壞塘工料估價值動正項錢糧作速興工至沿海失業居民度日艱難藉此傭役俾自得工價以資糊口是拯救窮民之法即寓其中矣務期實心遵旨速行以副朕愛恤元元至意十二月命吏部尚書朱軾馳驛前往浙江查議作何修築之處交與法海佟吉圖修築即至蘇州會同何天培鄂爾泰查看江南海塘將蘇松塘工作何修築之處定議具奏三年二月尚書朱軾欽奉上諭疏覆奉旨依議速行附朱軾疏略江南松江府之華婁上海等縣沿海二百五十餘里地勢窪下土脈鬆泛捍海塘工較他郡尤為緊要自金山衛城北十里起至華家角止四十餘里土塘六千二百餘丈內最險工一段自漴闕墩至東灣九百六十九丈六尺緣大小金山聳峙洋靣山北壅積圓沙潮由圓沙金山之間直衝漴闕明時修造石塘三百餘丈日久侵齧石塘孤露水中康熙四十七年另築土塘經去歲風潮亦塌卸入海此段工程實為通塘要害又次險工四段自金山墩至西新墩七百六十八丈兵厰至張家舍二百八十八丈倪家路至三岔墩三百六十丈周公墩至花家角一千四百六十八丈八尺此四處老岸久坍新塘屢易見在搶築抄塘潮水猶注塘下以上最險次險工共三千八百五十四丈四尺所當易土為石以資保障其二千四百餘丈塘腳尚有淤沙水勢稍緩堅築土塘高一丈五尺闊三丈用條石鋪底砌邊外釘排樁亦足捍禦自華家角至上海汛頭墩十餘里塘外淤沙一二里不等自頭墩至嘉定交界一百二十里舊有土塘二道內為老塘外為新塘應將兩塘俱堅築高厚外塘仍密釘排樁以防衝潰其餘間有潰口業經補築但塘身單薄應令地方官於農隙時覔雇民夫加高加厚沿塘栽種雜樹不但樹根蟠結可固塘身亦於民間大有利益臣等看畢各塘隨傳同松江府知府楊紹等酌議修築石塘之法應於地面開深二三尺務見實土乃用一丈長木樁四十根釘沒土內樁間杵築使底土堅實上鋪條石縱橫相間每石一塊長五尺闊一尺厚一尺五寸下三層每層用石二十塊三層以上每層收進五寸第四層用石十九塊第五層十八塊第六層至九層三面鋪砌條石中間填塞碎石自基至頂砌石十層蓋頂一層平鋪條石十塊貼附土塘寬二丈三四尺高出石頂五尺照時價確估每塘一丈用石一百二十三塊共用銀三十三兩八錢二分五釐樁木價銀四兩碎石價銀二兩土方石灰並雜費用銀五兩二錢五分每塘一丈共用銀四十五兩零七分五釐三千八百五十四丈四尺共用銀一十七萬三千七百三十七兩八分又二千四百丈每丈用條石鋪底十塊砌邊十塊每一丈用石價銀一兩夫工銀一兩排樁二十根用銀二兩二千四百丈共用銀一萬九千二百兩二共用銀一十九萬二千九百三十七兩八分再據該府等稟稱修築石塘必須辦齊石料始不耽誤工夫計算一年之內方可辦完興工等語應將現修土塘照前估計速築完固一靣採買石料俟辦齊動土修築至支發錢糧及督修大小官員慮聼撫臣何天培等另疏題報謹奏三年三月初四日上諭朕想這海塘工程所需錢糧必多據看不過十萬上下即可足用發往海塘效力人員若干誰往浙江海塘工程效力若干員足用誰往松江工程效力若干員足用之處大學士等查明面奏大學士等將浙江海塘工程交與何順髙泓建修松江等處海塘工程交與李馥黃叔琳金啓復李陳常之子建修繕摺面奏奉旨照議發往是年五月上諭江南浙江海塘已差尚書朱軾會同江浙巡撫法海等查勘估議具奏但沿海黎庶全賴堅築海塘捍禦潮汐得以保全生聚朕時刻在念若塘工遲誤則海濱之人未能安居樂業所派效力人員雖經赴工惟恐遷延時日驟難告竣亦未可定著巡撫張楷法海等星速遴委幹員攴動司庫錢糧立限堅築刻期報完務使永保安瀾毋得因循延緩亦不得草率塞責貽誤民生所動錢糧何順等各照所認工程如數補庫五年九月奉上諭海塘工程關係緊要聞得新修隄工不甚堅固未知此語確否著范時繹陳時夏陳世倌鄂禮悉心詳察籌畫妥協勿得絲毫隱飾務為一勞永逸之計十二月奉上諭吳淞石塘當日勘估之時於海潮紆緩之處酌量修築土塘蓋因工程浩大諸臣勘估為節省錢糧起見故如此定議但東南財賦之區灌溉田畝保聚室廬全賴海塘捍衛朕思海勢衝激風濤旋轉難定土塘經厯年久未免可慮不若一例盡修石塘為百姓萬年之利似為一勞永逸朕詢問齊蘇勒亦云甚當著陳時夏陳世倌鄂禮等將現在土塘改築石塘之處確行勘估詳悉定議具奏不得惜費省工茍且塞責務須堅固永垂久遠以副朕經理海疆愛養民命之至意六年五月奉旨松江新築海塘工程關係甚要著交與浙江總督李衛查議具奏李衛查議奏覆奉旨依議附李衛疏略江南松江海瑭初議建石三千八百五十四丈今已築完二千四百九十丈零若盡議改拆則人工盡棄但令將來石塘悉照海鹽舊塘式樣選取物料建築堅固將已成之工鱗次櫛比夾在中間新築三千七百餘丈左右接續即偶有一二段損傷不難相機改補至於加高加厚即可保固之説查出新築塘身已不為矮母庸再為加高若欲加厚則必向外幫貼新舊不相膠粘徒致糜費無益再查石塘之外有貼築土塘附於石塘之背蓋因石塘初築外當風潮內則孤立必築土塘以護之原宜一例高厚無分彼此至如土塘在石塘之外目前潮水全賴此塘捍禦延袤數十里其間高低厚薄不同應俟農隙之時擇其低薄斷續處量給飯食之資令沿海居民漸次培築以上一切工程必得總理分任之員督臣范時繹已經請委蘇松太道魏觀兼督但魏觀生皇上命長北方於海塘非所素習仰請兆嶽總司其事以以前經手塘工之升任京卿俞敕下江魏觀往來會同稽查再請判及水利效力各員內南督撫另於通省同知通選擇委任管理分築仍令督撫藩司諸臣計議確估稽察則塘工可以永固矣七年二月江蘇巡撫尹繼善題請於府佐二及府首領縣佐二官內選二十員以四員採辦物料以十六員分督塘工四千二百六十餘丈總聼通政司參議俞兆嶽調度經理奉旨允行八年七月浙江總督李衛江南署總督史貽直江蘇巡撫尹繼善履勘條奏海塘事宜奉旨允行附李衛疏略竊照松江海塘荷蒙皇仁不惜數萬帑金悉令易土為石自上年開工已及一載臣等於七月十六日親至工所遂加履勘東灣起至花家角接續舊工先築塘工一千八百七十五丈分為十號勘其石料工程堅固結實如法砌築較從前逈不相同皆由總理通政司額外參議俞兆嶽身任勤勞竭心盡力先築樣塘六十丈以為程式是以在工各員俱不敢茍簡草率至通塘所需石料甚多現在專委同知等員於江浙兩省各宕分頭開採源源濟運撫臣尹繼善就近儹督約計三年之內大工悉可告成目前則漴闕迄西至倪家路一帶即當先委各員按段興工接續舊塘以為保固又花家角以東添築石塘二百丈加樁土塘一百丈金山觜之西先行添築石塘二百丈加樁土塘三百丈兩頭俱直與厯來老土塘相接則磐石之安萬年永奠不敢盡行請動正項查松郡華奉婁金四縣向有民間每年隨漕公輸歲修海塘錢每畝五文約計一年共有七千兩之數雖不能全行完納但外護土塘業已築竣今復以之修補石土各工缺陷滲漏尚有所餘臣等酌議此項添築石塘四百丈計價銀三萬二千餘兩土塘五百丈計價銀一千五百餘兩兩頭各添開運石小河一道約價銀六百餘兩并前條所請增給鑿石工價銀兩除將候選運判朱榮樁前後二次願捐銀一萬五千兩抵用外其餘工費請於藩庫動支逐年將所收歲修之錢除搶護苫補各塘之外悉以陸續歸補數年之間即可足額則以公完公地方民生實有裨益尹繼善疏略松江石塘工程其先築之一千八百七十餘丈已經完工臣等赴塘查勘逐工細驗俱能修築如式內總理塘工太僕寺卿俞兆嶽所築樣塘較别工尤為堅穩非僅由於灰漿充足蓋因工內俱用鐵筍鐵銷臣等細心講究海水吞吐為力甚大倘一石移動欹斜則全身動搖惟於兩石層纍之處鑿一孔用鐵筍穿合則上下連結於橫石排結之處各於頭尾鑿孔用鐵銷關住則左右貫穿通身之石聯絡一片雖有風浪衝激不能撼搖較之用鐵錠搭釘浮面易於脫落者相去懸殊今除已築塘一千八百七十餘丈外尚有未築塘工二千七百五十餘丈請將此未築塘工外層縱橫鋪砌之石俱添用鐵銷鐵筍每丈需用鐵銷鐵筍五十三箇半每箇重二斤每斤價銀一分五釐每箇鑿孔工銀一分共需筍銷十五萬七千六百二十六箇約需筍銷連工銀五千九百餘兩所費無多塘工大為得力但石有長短則筍銷或有增減工竣核實報銷又土塘為石塘外護關係最要內有漴闕等處離水甚近為最險之工常年於土塘外身密釘排樁保護而潮水衝刷難以抵禦不時坍卸臣等查土塘之外有廢石塘數百丈久經坍入水中原題請將坍卸水中之石撈取配為新塘之用今查看石料短小不能配新工請將此廢石移為幫護土塘縱橫砌築所有撈築等項工費即在歲修土塘捐錢內動用實費省而工倍也十年允布政使白鍾山請令沿海沙洲居民築墩防水並資守望附白鍾山摺奏略竊見鹽城縣志內前知縣楊瑞雲在大盤灣令民築巨墩可容數千人遇風潮時令民上墩咸保無恙臣思沿海愚民生長沙洲罔知自衛似宜倣照此法令沿海各沙洲建築土墩每歲地方官於農隙之時督令鄉保不分民竈按户分築其墩高至二丈為度闊以居民之多寡為定四面皆如梯形不必陡削計一年之內不過數日舉手之勞而日積日高二三年間已成大墩不但潮至可以趨避兼可瞭望海洋實於海隅民生大有裨益其沿海省分凡有沙洲民居處所宜一體舉行十一月大學士鄂爾泰張廷玉朱軾總督尹繼善議準巡撫喬世臣疏請於松江府之金山華亭奉賢上海南匯五縣修築捍海土塘奉旨依議附喬世臣疏略竊查松江府之金山華亭奉賢上海南匯五縣沿海地方西與浙省平湖交界東至寶山縣接壤之黃家灣綿亘二百五十餘里俱舊有土塘以捍潮汐日久漸圮雍正皇上念二年冬荷蒙浙海塘均關緊要切民瘼以江特命大臣會勘自金山衛城北十里起至華家角止四十餘里工為最險已另擇塘基易土為石興築石工陸續告竣工程堅固億萬生靈從此永獲保護安全其自華家角以東至黃家彎議令地方官於農隙時雇覓民夫將舊土塘加高幫厚惟是數年以來石工緊要不及兼顧而地方官又以無專項可動雖偶為修補終無實濟本年七月十六七等日颶風為患海潮洶湧其在金山華亭界內者緣石塘之外舊存土塘先經動帑修築完固是以潮水掩至即堪捍衛不致衝漫而華家角以東之舊土塘則從前既屬單薄又被風激浪撼頓行坍潰海潮因得直漫內地禾棉廬舍人民多遭傷損塘內係南匯地方較多故被災較重次則上海奉賢自潮災後即據各縣紛紛以請築海塘具詳臣於九月之杪親赴松郡沿海查勘備悉金山觜至華家角一帶不特石塘為萬世之利即外護上塘亦甚屬堅固此番華金二邑之得免潮災者見賴土塘捍禦之力是土塘但能如式加高幫厚自可永久保護且查華家角以東塘身因於七月內全被衝坍至八月十八日海潮又經湧入內地水侵二三四尺不等明歲秋汛何能保其無虞則此塘工之修築勢不可緩臣隨委員用營造尺逐段丈量每二十丈分為一號按算土方多寡其在奉賢者由華家角石塘盡處起至南匯縣東界止共丈見九千三百二十七丈六尺其在南匯者自奉賢縣西界起至上海縣東界止其丈見一萬五千四百六十四丈其在上海者自南匯縣西界起至寶山界黃家灣止共丈見一千二百二十二丈八尺議以各塘俱底寬五丈靣寬二丈五尺高一丈二尺每丈應用小上方四十五方內有舊留底土者俱行扣減有河窪缺陷者俱行添補其中存廢不等逐一核實牽算計三縣為塘共二萬六千一十五丈四尺共用土一百三十六萬五千一百三十一方零查現在修築土塘每方給銀六分六釐但向係挑至三尺始行一硪土性未能膠固今定以一尺一硪每方加夯築銀六釐給銀七分二釐共需土方銀九萬八千三百五十四兩零又南匯之餘角窪老洪窪上海之二十二保地方三處俱衝連海口各應築壩堵截共需工料銀三百八十八兩零其自頭墩至黃家灣向有土塘二道內為老塘外為新塘今經閲勘外塘離海尚遠是以止議修築外塘而內塘之工即可從緩惟近黃家灣東北一角凸出頂衝逼近海面舊塘坍毁尤甚今將此七百四十三丈移進半里勢並紆坦至所築塘根皆有淤沙在外均非陡險可比無庸另施樁石致滋多費再黃家灣以北至寶山城周家基宅後止向有土塘一道逼近海濱久已坍廢前經原任山東撫臣陳世倌奏請修築仰邀俞允尚未興工而今秋風潮從此湧入是以寶邑被災亦重並宜增築今丈見四千二百二十八丈一尺有奇其塘底亦寬五丈面亦寬二丈五尺惟地勢較低而又近海須加高至一丈五尺每丈計該小土方五十六方二分五釐共用土二十三萬七千七百三十二方零共需土方銀一萬七千一百一十六兩零再此處沙土鬆浮須用乾枯茅草栽護則久而根株盤結草土糾縵日就堅實應每土高三尺栽茅一帶自下至上栽茅三帶計每塘一丈應需買運工價銀三錢共用加栽茅草銀一千二百六十八兩零又築壩車水等項共需銀三百三十八兩零至取土穵廢民田錢糧統俟完工日查明請豁至此等土塘歲修並關緊要應照華婁奉金之例令各該縣於田畝內每畝捐錢五文以為歲修之費仍令解貯府庫每於冬春之間督撫臣委員勘估督修遞年增培堅固釐毫均歸實用工程自可經久庶免地方官吏草率侵蝕貽誤其或間有潮汐衝缺該縣隨時一面鳩工補築一面詳明俞允於核實捐錢如蒙存公銀兩漸次興工則沿海被災正月春和先動貧民並可藉營工資生自必踴躍趨赴來年秋汛得以有備無患長為澤國保障永戴皇仁浩蕩矣十一年正月十一日奉上諭江南范公堤為沿海之藩籬鹽場之保障原係商人捐修工程聞現在殘缺甚多急應修築堅固現據署兩江總督魏廷珍委員確勘料估著即一面具題一面乘二三月間作速興工使沿海窮民得以傭工糊口但工程綿遠需大員董理著交與協理河務西柱即行督率料估悉心查辦修築范公堤又於堤內建築越堤一道十二年兩江總督趙宏恩疏奏查辦海塘事宜請於緊貼石塘之外再築土塘一層上寬五尺下寬二丈高十丈餘庶內外包裹幫扶愈可經久附趙宏恩疏竊臣親勘松江一帶海塘綿亘數十餘里巍然屹立保衛數府田舍仰見聖主愛養黎元萬世永賴之利臣逐細巡視查外護土塘俱屬完固又金山觜一段土工地基原低前估一丈二尺與各土塘面高低不一已飭加築平齊新建石塘內有東新墩一帶七段現在趕修八九月可竣戚家墩一帶七段現在催運石料明夏方能修完其餘已修石塘如式堅固總理塘工寺臣俞兆嶽及承修各員俱實心經理至添築貼石內土塘現在夯硪務期堅穩臣於工員匠役逐一勸勉皇仁踴奬賞無不仰體塘長至七千餘丈面寬五尺底寬躍出力再查石一丈以臣愚見尚覺單薄其外護土塘相離石塘有十餘丈及數十丈之遠新築貼石內土塘係緊貼石塘裏面而石塘外面看去慮少幫扶誠恐日久潮浸雨淋剝落擦損似應倣照貼石內土塘之法緊貼石塘之外再築土塘一層上寬五尺下寬二丈高一丈餘庶內外俱有包裹幫扶愈可經久其漴闕為第一險工石塘係首先建築不及續修之工程堅穩則外築貼石土瑭更需加倍寬厚方為周密又查石塘以外原築之外護土塘以內隙地原廣雨水頗多積注寺臣俞兆嶽欲於石塘開洞三四箇以消積水前督臣范時繹尹繼善俱以恐傷塘根阻止但現據百姓羣籲疏泄臣愚以為積水不消浸泡塘根亦有干係若開挖數洞實恐有傷塘身商之俞兆嶽并細詢工員匠民欲於隙地中間酌開小河一道圍繞石塘之外仍不致逼近塘根於石塘尾與土塘交接之處開砌石洞一箇引水以入石塘之內新河塘工民田均有裨益而開河之土即可以築貼石之外土塘約計共費二萬之內暫動司庫耗羡料理俟塘工捐錢充足之時動補是否有當理合一併陳奏恭候聖訓遵行又外護土塘以內隙地開河之外猶多空間宜酌種蘆葦栁株日久根深盤結既可以固塘基而枝葉暢發又可以資民用合並陳明六月十二日奉旨趙宏恩查勘海塘工程既經親身閲厯詳細商酌所奏緊貼石塘外築土塘并酌開小河之處俱著照所請行欽此江南通志卷五十七
