body:
  text: 江南通志卷一百三十九人物志宦績一江寧一府江寧府晉紀瞻字思逺其先秣陵人吳平後徙歷陽瞻少以方直知名元帝為安東將軍引為軍咨祭酒帝即位拜侍中轉尚書上疏諫諍多所匡正明帝時徙領軍將軍瞻才兼文武忠亮雅正卒諡曰穆薛兼字令長丹陽人祖綜吳尚書僕射父瑩仕晉為散騎常侍兼清素有器宇初入洛司空張華見而竒之元帝為安東將軍引為軍咨祭酒稍遷丞相長史甚勤其事帝踐阼歷尚書領太子少傅自綜至兼三世傅東宫談者美之張闓字敬緒丹陽人吳輔吳將軍昭曾孫同郡薛兼薦闓才幹於元帝引為安東參軍甚加禮遇帝為晉王纍遷侍中帝踐阼出補晉陵內史在郡甚有威惠時所部四縣並以旱告闓立曲阿新豐塘溉田八百餘頃每歲豐稔歷大司農遷尚書蘇峻反闓入宫侍衛峻使闓持節權督東軍闓密宣太后詔令於三吳令速起義軍又運穀集兵以討峻峻平加散騎常侍後拜光祿大夫卒陶回丹陽人抗子有器幹王導引為從事中郎蘇峻反回收合義旅與陶侃溫嶠共攻斬峻以功遷征虜將軍吳興太守時歲飢穀貴回不待報開倉賑濟一境獲全既而下詔并敕會稽吳郡依回賑恤二郡賴之卒諡威甘卓字季思丹陽人元帝初渡江授卓揚威將軍歷陽內史討周馥及杜韜屢立戰功歷安南將軍梁州刺史假節督沔北諸軍鎮襄陽為政簡惠善於撫綏估稅悉除市無二價西土稱之王劭字敬倫導第五子美姿容有風操雖家人近習未常見其惰替之容官至吏部尚書尚書僕射出為吳國內史弟薈字敬文亦為吳國內史值年飢粟貴薈以私米作饘粥以飼餓者所濟活甚衆王珣字元琳導次子中書令洽之子為桓溫掾軍中機務悉委珣文武數萬人悉識其面從討袁真封東亭侯歷吳國內史士庶悅服徵為僕射領吏部後進衛將軍都督琅邪水陸軍事以疾解職弟珉字季琰少有才藝名出珣右代王獻之為中書令世謂獻之大令琰小令卒年二十八王允之字深猷導族子父舒為荆州刺史王敦敗王含父子俱奔舒舒逆而沈之於江蘇峻反舒遣允之率義軍纍破之以功封舒彭澤縣侯卒諡穆允之咸康中刺江州蒞政甚有威惠繼為衛將軍會稽內史未到卒諡曰忠王彪之字叔武尚書僕射廙之子除著作佐郎厯遷侍中廷尉言郊祀必赦恐凶愚生心僥幸從之轉吏部尚書郎遷轉不阿出為會稽內史居郡八年豪右斂迹流亡盡復海西廢時彪之神彩毅然文武儀凖莫不取定朝廷服之遷尚書令與謝安並掌朝政大事必從彪之咨議而定卒諡簡王述字懷祖父承從元帝渡江司徒王導以門第辟述中兵屬嘗見導每發言一座莫不贊美述正色曰人非堯舜何能每事盡善導改容謝之歷庾氷征虜長史氷欲移鎮樂鄉述止之尋遷衛將軍尚書令桓溫平洛陽議欲遷都朝廷憂懼述曰溫以虛聲威朝廷耳但從之自無所應果不行又議欲遷鐘簴述曰方當蕩平區宇旋軫舊京若其不爾宜改遷園陵不宜先事鐘簴溫無以奪以老乞歸卒諡簡王坦之字文度述子也襲父爵領左衛將軍非時俗放蕩著廢莊論以敦儒術尋領本州大中正簡文帝詔桓溫依周公居攝故事坦之持詔入帝前毀之乃使坦之改詔俄領丹陽尹徐兖二州刺史鎮廣陵上表言人君以孝敬為本以委任為貴又諫謝安好聲律期功不廢絲竹之非卒年四十六臨終與謝安桓沖書惟憂國家之計諡曰獻南北朝齊劉係宗丹陽人官右軍將軍兼中書通事舍人再為少府久在朝省嫺於職事齊武帝盛稱其有經濟才梁周捨建康人梁初拜尚書祠部郎禮儀損益多自捨出纍遷吏部郎預機密後與徐勉同參國政稱賢相南唐周宗字君太秣陵人常給使烈祖左右用贊禪功遷樞密使將相奉法循理以司徒致仕周兵初起而宗卒二女皆為國后陸昭符南唐金陵人為常州刺史當吳越之衝城邑荒殘治以寬簡招納流亡遂致富實顯德五年元宗稱藩於周命昭符為進奏使及宋太祖受禪後後主嗣位如天子禮太祖怒召昭符詰之色甚厲昭符徐以鄙語對太祖笑解卒於邸宋陳承昭升州人建隆初入朝以承昭知水利督治惠民五丈二河通漕運又督諸軍鑿池朱明門內外以習水戰從征太原歸遷龍武軍統制刁衎字元賓升州人從李煜歸宋知桐廬縣會詔羣臣言事衎上諫刑書通判湖州疏陳五事歷知廬潁湖州授兵部郎中卒以純淡夷雅稱士大夫多推重之子湛湜渭湛子繹約皆第進士約直史館嘗使契丹知揚州秦羲字致堯江寧人太祖召見補殿直督廣濟漕太宗時提點淮南茶鹽討捕荆湖羣盜歷典州郡羲好為詩喜賓客歷貨財之任十五年精勤練習所在稱職盧鑑字正臣金陵人纍舉進士不第仕邉職在鄜延路敗走李繼遷又焚其積聚多斬首級又善於料敵為利州都監奏李繼遷聲言石隕之詐宜益為僃遷知儀州州有封勝關最險要繼遷揚言欲襲取之詔徙老弱芻粟於內地鑑曰此姦謀也且示虜弱搖民心竟不徙賊亦不至知利州歲飢便宜發粟賑飢知環州平磨媚族纍遷至西上閣門使知秦州李琮字獻甫江寧人登進士第調寧國軍推官州積穀腐敗轉運使移州散於民俾至秋償新者守將行之琮曰穀不可食強與民責而償之將何以堪持不下乃止知陽武縣役法初行琮區畫盡理旁近民願視以為則徽宗時歷知潞州潞有謀亂者為書期日揭道上部使者檄索姦甚亟琮置不問以是日置酒高會訖無他終寶文閣待制王綸字德言建康人登紹興五年進士第歷諸王宫大小學正言孔門弟子及後世諸儒有功斯文者皆得從祀先聖宜以其式頒諸郡縣以薦為監察御史與秦檜論事忤其意罷去檜死召為起居舍人兼權禮部侍郎試中書舍人高宗親政詔命填委多綸所草嘗使金充稱謝使金主發數問綸條對金主不能屈明年知建康府兼行宫留守每以守禦利害驛聞上多從之卒贈左光祿大夫諡章敏俞栗字祗若江寧人崇寧四年以上舍賜進士第擢中書舍人進給事中上言學校必使士有成才人無異論然後為得言頗見行拜御史中丞陳士風六弊發户部尚書劉炳隂事時蔡京方倚炳為腹心戾其意改栗翰林學士竟以毀紹聖法貶常州團練副使復改官知江寧府卒李可六合人咸淳間為監察御史與御史陳過論賈似道黨俱貶斥朝論快之魏良臣字道弼溧水人初第進士即訟陳東寃除壽昌令遷吏部員外郎高宗召對稱旨稱其可屬大事後拜參知政事請出衣冠之囚歸蠻瘴之竄整頓軍政觀聽一新劉應炎溧水人介直剛方居臺諫不避權貴因忤賈似道棄官歸明周貞字文典江寧人吳元年為大理寺卿詔同李善長劉基陶安定律令貞上疏曰立法貴簡易使人易曉若條緒繁多或一事而兩端可輕可重吏得夤緣為姦則所以禁殘暴者反以賊良善非良法也上嘉納之洪武元年升刑部尚書出為廣東行省參知政事能吏悉上其績聘名儒以待考試二年復召為尚書致仕孔克仁句容人由行省都事進郎中侍帷幄最久太祖論天下形勢及前代興亡事必以克仁備顧問洪武二年命授諸王經功臣子弟亦令入學終參議端木復初字以善溧水人太祖召為徽州府經歷核田均稅一除欺弊除磨勘司丞凡錢粟刑法貨物無所不讞勾稽隱伏人不能欺官至刑部尚書子孝文翰林待詔孝思翰林侍書兄弟先後使朝鮮以清節為逺人所服立雙清館以旌之趙本字居仁溧水人洪武中以薦辟歷官左通政其孫往省之給錢二貫令徒步歸永樂間治水浙江築堤捍海患潮汐沖擊本為文請於海神潮果三日弗至功乃成丁璿上元人永樂甲申進士選庶吉士改御史巡按徐州擒賊首衛輝盜起承命往治稱旨升右僉都御史時麓川蠻叛乘傳往視上用兵便宜十餘事敕巡撫雲南以征麓川功升左副都御史兼巡貴州所至有政聲徐承宗中山王曾孫襲爵魏國公英宗時守僃南京號令嚴肅宗族家衆罔敢撓法居十六年人未嘗見其坐立傾倚喜怒橫發時以為有大臣體張瑄字廷璽江浦人正統壬戌進士授刑部主事知吉安府俗健訟日不下數十百人決斷如流丙子大飢發廪賑濟不俟奏報成化初擢廣東布政平廣西流賊莫文章等建倉六十二修陂塘墟岸四千六百增築城十二任滿軍民相率乞留詔可其奏壬辰升福建巡撫山海寇攻劫鎮城久不獲瑄至皆成擒奏革鎮守太監移鎮河南改運倉於彰德水次以便軍民入覲奏時務一十八事皆施行晉南刑部尚書致仕卒顧儼字廷望家金陵正統中以經明行修薦任嘉興訓導登甲科授陜西道御史清理福建軍政沙汀民叛領兵抵其境擒首惡餘黨悉平升廣東僉事新會陽江有賊數萬提兵直搗其巢斬獲無算總戎上其功賜銀幣以勞疾乞歸沈琮字廷器江寧人正統戊辰進士以御史出為四川僉事時松潘地近蜀數嘯聚為肘腋憂朝議以琮在蜀久威望素著擢副使往鎮之期月遂下黑虎諸寨松潘平璽書褒美里居人稱長者子九思嘉靖癸酉鄉舉孝而有義行孫鳯翔進士官給事中鄭禮字中夫江寧人景泰中鄉薦任襄陽通判有平寇功擢守南安郡苦水患以便宜發倉賑之事聞朝廷亦不之罪朱貞字惟正旗手衛籍天順丁丑進士知鄧州釐革驛弊襄盜起貞用諸生有幹局者分主供餉民以不擾進四川參議督松潘儲地故險逺輸者多侵牟頁勤以率之弊盡革長於撫馭境內桴鼓不鳴王徽字尚文應天人天順庚戌進士授南給事中憲宗即位率同列上五事最後禁近之臣宜遵舊制使無他與其言尤僃時閹宦牛玊謫至南京疏其大罪四乞置諸法因斥指執政謫普安州判官興學諭俗其習稍變始有舉於鄉者𢎞治初薦起陜西左參議致仕盧雍字廷佐江寧人天順丁丑進士為武庫司主事都御史王竑北討奉敕調兵河南簡閲精鋭申明軍約悍帥皆奉命王竑為大司馬戎務必與之商𣙜諸營事為之綜理出參議福建諭政和浦城盜皆散去復捕賊酋二十餘人誅之一方以寧官終湖廣布政居父喪結廬墓側左右忽産五色芝二十本詔旌其門翟瑄字廷瑞南太醫院籍與弟瑛並有才名瑄舉天順甲申進士知奉化有善政擢御史巡撫山西有平賊功晉左都御史尋升刑部尚書瑛成化丙戌進士選庶吉士改禮科給事中封事數十規切時政上嘉納之歷太常卿以病乞歸瑛事兄甚恭時稱二翟倪嶽字舜咨尚書謙子天順甲申進士授編修成𢎞間歷遷禮部侍郎定徽號冠婚祧祫及奉慈殿禮文制度晉尚書疏請開言路寬賦役慎刑罰革淫祠禁齋醮止胡僧却貢獅經術醇正議論詳明轉吏部尚書奬恬抑躁銓敘惟允卒諡文敏黃肅字敬夫六合人成化戊戌進士纍官至廣西按察僉事部內土官妻謀立其假子肅倡義立其姪土官黃紹反討平之思恩知府岑濬謀作亂肅墮其所築丹良城岑不得逞晉湖廣兵備副使正德初以軍功升三品壽八十六卒王敞字漢英錦衣衛籍成化辛丑進士授刑科給事中出閲四川諸鎮邉儲還上便宜六事其一言建昌礦夫事革尚為權家所占請罷之孝宗時使朝鮮國王出女樂燕之不聽其君臣相顧愧嘆歷轉通政使升兵部尚書以平寧夏功加太子太保山東及四川盜起請增設兵備所用諸將及總制大臣皆一時之選寇平乞休歸吳彥華字汝和江寧人成化辛丑進士歷户部郎出守荆州州多水患築堤二十餘里户口歲增百畝加闢擢四川參政開瞿塘三峽古道人得陸行無風波患事聞劉瑾以功不由已黜歸瑾誅復官浙江布政魯昻字廷瞻江寧人成化丁未進士授兵科給事中時判院劉文泰誣奏太宰王恕出執政意舉朝莫敢訟言昻獨摘發其姦天下快之太監李廣駙馬都尉齊世恩奪民田下昻勘問悉還之民轉户科都給事疏文武大臣不法事忌者益衆為太僕少卿楊瑛所誣下獄鞫訊無驗謫蒲圻令投檄歸尋復職致仕倪阜字東岡嶽之弟成化丁未進士選庶吉士授都水司主事升郎中轉山東分守參政時郡邑多盜阜計擒首惡餘黨悉降改守東兖檄遣勘地竭力區畫民賴以安升四川布政卒徐完字用美江寧人成化丙戌進士授監察御史親老乞就飬南都時都御史不法完抗疏劾免之百僚憚焉會湖廣讞大辟囚數十人完覆訊止坐五人餘悉駁免仕至江西按察僉事陳鋼字堅逺應天人成化乙酉舉人授黔陽知縣鋼性豈弟通大體均定徭役招復流移興孝弟禮義之教沅湘二江合流城下數決壞民居鋼募民採石甃堤亘千丈水乃不溢縣南三里崖路甚狹諸軍戍苦之鋼焚山淬石拓路丈餘外繚以索行者不害民立祠祀之嚴綋字仲周江浦人𢎞治壬戌進士知歸安縣擢陜西道御史疏劾逆瑾出守南昌升九江兵僃偕王守仁討宸濠有功歷江西左布政歸是時縣民困於欽騎馬坍江稅衛人困於月銀綋白當事悉祛其弊卲清字士亷江寧人端潔好學𢎞治壬子舉於鄉授江西德化教諭聘典山東試薦授監察御史教職擢臺臣自清始正德初戚畹張延齡恃恩奏人負券若干緡有旨與追清曰御史朝廷耳目之官可為人索私債耶奉敕理鹽法兼管河道有勞績逆瑾索清賄不入矯旨捕搒之瑾誅復御史遷廣西兵僃乞休王𢎞字叔毅廣洋衛人𢎞治癸丑進士授行人擢南道御史論列逆瑾罪狀廷杖為民瑾誅起廣東副使嘉靖初議大禮𢎞不附名時論韙之劉麟字元瑞南京廣洋衛人有文名𢎞治丙辰進士臺諫龎津等以劾外戚張氏驕橫下詔獄麟上疏申救清議重之授刑部主事正德初出守紹興劉瑾以麟除官不謁謝黜為民瑾敗起知西安參政時遣貴臣督兵餉擬加賦麟獨不可曰靖邉本以衛民可先困乎議遂阻軍興亦不乏纍遷工部尚書奏裁工部上供十四事罷遣中官督造於蘇松璫憾之勒令致仕家居三十餘年卒諡清惠羅鳯字子文上元人𢎞治丙辰進士官南道御史出守兖州正德中屬車屢動傳言將有事泰山東撫欲額外征取以僃巡幸鳯不應被劾改守鎮逺復忤巡方再移石阡致仕姚隆字原學上元人𢎞治壬戌進士由新昌令歷升荆州守州大水人附高阜大樹日夜嗷嗷隆命駕千艘濟之以米活者數千人逺來趂食者於近境為粥啖之活者不可勝計時取佛中官過郡從者殺人隆捕治抵罪中官恐以竒禍不為動罷歸民肖像祀之李熙字師文上元人𢎞治丙辰進士授將樂知縣擢御史論駕帖之害上納之正德時逆瑾擅政熙偕同官疏列其姦廷杖落職歸嘉靖初起饒州知府轉浙江副使以清操著梁材字大用上元人𢎞治己未進士授德清令進刑部主事改山東道御史出知杭州府值歲飢發粟以賑五日皆遍尋進按察使會宸濠變起浙鎮守中人畢真為內應材草檄調官又自往説真撤兵衛姦謀遂沮嘉靖初升廣東布政使不二載至户部尚書材感恩益盡職值帝勤政力祛宿弊每言必從後以忤權幸致仕帝念材亷勤召復故官命兼掌刑部讞疑獄俱得其情上喜曰得尚書十二人如材者朕可無憂矣卒諡端肅王暐字克明句容人正德丁丑進士授吉安推官從王守仁征宸濠請禁兵毋妄殺活數萬人晉大理寺副嘉靖初以爭大禮下獄廷杖後歷江西巡撫入為户部侍郎總督漕運盡除夙弊綱運如期免海州馬課裁揚州二閘人尤以為便晉尚書倉場穀率雜泥沙甃以磚石為永利有戚畹以賂請莊田峻却之豫告歸王以旗字士招江寧人正德辛未進士由知縣擢御史巡按河南會宸濠叛鎮守閹劉璟傳上親征道出汴取藏銀四萬僃供應以旗執不豫巡按福建漳泉盜起率兵𠞰之月餘平以終飬歸復起督北畿學歷兵部侍郎督治徐吕洪以通漕運復汶上寧陽間水匱之沒於勢豪者以資蓄泄晉尚書總督三邊敗山丹莊浪寇破番賊出沒境上者修綏慶城堡四千五百餘所築蘭州邊墻二百餘里在鎮六年卒諡襄敏李重字元任上元人正德辛未進士授户部主事督賦兩浙鎮守太監劉璟侵官銀二十萬欲厚遺重以緘口重曰與其遺我孰若為民償所負以足國憬憚其嚴盡以所侵輸官由是兩浙宿負完百三十餘萬轉員外郎擢守德安宗藩羣校不法者悉置如法不少貸為所搆鐫職歸尋起工部郎中守九江進江西副使顧􅛁字英玊上元人璘弟正德甲戌進士歷官河南副使與部使者論事有不可輒封還移文同官駭愕􅛁曰朝廷置外臺為耳目枉法媚人吾不為也竟以是罷兄璘通賓客多雅逰􅛁獨匾其樓曰寒松教授自給劉璽字廷守南京龍驤衛人正德間世襲指揮同知掌諸衛漕糧江彬以勢索運船之利力却之以薦擢參將協同督運持亷甚苦時以青菜劉稱之世宗時督漕總兵官缺所司以璽名上帝曰是窮劉也即任之奏疏濬江南河道折兑山縣糧米凡上三十餘疏為漕政良規何鉞字勳伯江寧人正德辛未進士授行人奉使楚藩固辭餽贈以亷介著擢浙江道御史武廟欲毀城中二坊為演武所鉞諫止之力救建言下獄御史張仕隆等得末減出按兩浙終常德知府韓邦憲字子成高淳人嘉靖乙未進士授屯田主事晉員外郎丁艱歸里居佐有司立文田法題蠲賦外浮稅米八百餘石邦人歌之遷守衢州有惠政民建常懷祠祀之沈越字中甫江寧人嘉靖壬辰進士知羅田縣令民墾汙萊地千餘畝流庸附籍者數百户移平江羅田立祠祀之擢御史巡按江西執法峻整以風力稱查核武員冗濫旗役冒替者數千人疏請落職罷役嚴嵩意有所不悅授越指使劾之越不從左遷開州判稍遷德安同知告歸杜門撰述意致簡逺子朝陽為池州教授著通鑑紀事前編嘉隆聞見記廖文光字士龍上元人嘉靖丁酉舉人授清江令政尚亷明時嚴嵩執政光擒其橫僕置之法轉廣信同知有商被盜幾死若有神呼之曰告廖某商隨投告果獲盜抵罪民益信服晉户部員外升都水郎罷歸張鐸留守衛籍嘉靖辛丑進士改庶吉士授監察御史按遼規度要害建諸臺堡積粟六萬餘斛貯預備倉以防兵荒後十年遭大水疫癘繼作賴以賑濟人謳思之余光江寧人嘉靖壬辰進士擢御史巡按廣東時世宗以安南莫登庸久不貢將致討光上疏極諫言黎氏抗中國為亂魁今失國或天假手登庸以報之也臣已遣官責其修貢兵部咎光輕率奪俸又以忤嚴嵩削籍伊敏生字子蒙上元人嘉靖中為御史嚴嵩與郭勛相結為姦敏生劾嵩所居宅乃勛私人孫澐所居澐籍沒嵩宅應在籍中帝怒奪敏生俸後官至山東參政張祥字元吉錦衣衛籍嘉靖辛丑進士初令鄢陵豪右戢迹桴鼓不鳴入為工部虞衡却暮夜金商人大户不得營私升萊州守亡命匿諸島者時出剽掠祥設法禁咸帖然受約束移楚雄郡饒礦井之利秋毫無染土官二姓爭印以理決之無敢譁遷苑馬寺卿朱潤身字海峯江寧人嘉靖壬戌進士授户部考功遷雲南僉事土寇鳯繼祖執張僉事以叛潤身與巡按御史用間諜募死士指示方略繼祖授首以被謗左遷告歸朱衣字正伯錦衣衛籍嘉靖甲子舉於鄉授臨淄令調房縣有官堰為豪強所據衣理之鑿石築堤灌田千餘頃邑人改名曰朱公堤遷守沅州治礦徒之亂下令執鐵者賊空拳者民不得妄誅乃戮其首惡餘悉貰之守兵以缺餉鼓譟衣曰迫於飢耳先與定期給餉而衆皆定梁楹字汝直江寧人嘉靖丙午舉人仕至荆府長史初令鹿邑遷守眉州玻璃江勢暴悍善徙侵嚙城址楹用宋魏文靖蟇頤堰記之説截江築堤百八十丈導使中流城乃不危至今賴之王可大字元簡上元人嘉靖癸丑進士初授刑曹時相欲陷人重辟可大執不可出補瓊州海剛峯稱其止飲一杯水轉台州知府與總兵戚繼光禦倭俘獲甚衆世稱亷能吏曾孫萬祀少刲股愈親疾博學能詩善書焦瑞字伯賢旗守衛籍以貢授靈山令時一條編法已行邑以僻逺里甲之供如故瑞首罷之地多叢箐羣盜嘯聚其中推官劉某往𠞰被執瑞亟率兵往援賊驚拜呼父母遂救推官還訓練丁壯用銀為射的中輒賞之諸兵競勸賊不敢近邑有牛稅沿為縣用瑞一無所取姚汝循字敘卿江寧人嘉靖丙辰進士知杞縣擢南刑部主事出守大名郡故土城當河流之衝汝循始甃以磚石抵勢家子於法以謗左遷歸起桂陽同知遷嘉定州又以忤張居正罷留心鄉里利弊著有丁糧議黃尚質字宗商水軍左衛人嘉靖戊午舉人授劍州學正典試陜西攝巴縣妖寇蔡百貫作亂竭力捍禦郡賴以安改峽江令驛有羡金歲暮輸縣尚質令存以減明年額派訪練子寧遺嗣於厮養為立祠買田俾主其祀仕至饒州别駕子應登字徵甫以明經授教諭端亷愛士歸賣文飬親有孝行司馬泰字魯瞻江寧人嘉靖癸未進士授湖南御史按湖廣嘗疏論給事中陳洸太監崔文置於理憲度肅然又陳留都軍民利害七事稱切要出知懷慶嘉興濟南皆有惠政勘魯府訐奏事十日而決特詔奬之鄭宣化字行義嘉靖乙丑進士授袁州推官升南工部主事𣙜關蕪湖力除姦蠧再遷武選司郎中一清軍官襲替夤緣詐冒之弊時相出片紙以錦衣某辨掌衛事宣化執不可遂出為邵武守吳自新字伯恆江寧人隆慶戊辰進士授都水主事擢守杭州杭俗汰侈以亷約鎮之勾檢織府金歲省數千遷兵備副使歷左右布政皆在浙勞心疆事歷年既久凡民間風尚吏治臧否毫不可欺屬邑晏然擢河南巡撫宗藩驕橫自新選其俊彥為宗學長皆斤斤奉法升南刑部侍郎卒顧國輔字維德上元人萬歷甲戌進士為刑部郎讞囚有所矜釋張居正當國不允抱牘爭之居正無以奪出守襄陽會久旱便宜賑濟中州流民就食者數萬多方活之且資給遣歸晉浙江副使繩諸將之耄而貪者調守寶慶卒張後甲字丁也江寧人萬歷丁丑進士授辰州推官有諸生以事忤豪右文致傅獄亟釋之姦民有手斃其女而誣人大辟者為白其寃升户部郎中督御馬草場監𣙜清源司餉雲中餉政修舉邊計賴焉晉四川按察使時川東有征播之役客兵所過驛騷後甲以檄諭之人人銜枚而過民不知有兵何棟如字子極江寧人萬歷戊戌進士授襄陽推官值苗亂遣將立縛之遂以知兵名中官檄開青山礦棟如以顯陵發脈地繪圖疏奏事得寢璫橫襄陽收其爪牙投諸江璫復開穀城宜城礦與官民爭閧棟如治其黨惡上怒逮下獄放還光宗初起南職方加太僕卿行邊贊畫又以失貴人意遣戌後赦歸常信字國寶興武衛籍嘉靖末以書學校士信為舉首以印局使晉撫州府照磨時花園港有巨盜嘯聚撫按委信覘之信詭為日者服罙入其阻圖上地形并所為芟除建置策甚具於是擒盜魁十有三人以幹局稱臨汝間卜履吉字訥齋江寧人萬歷戊戌進士授泉州司理稅監開礦壞民廬墓履吉具疏以聞先禁黨惡璫焰稍衰因與衆約以千金助其礦稅使亟出境纍官至福建兵備副使閩人立祠祀之姚履素字允初上元人萬歷辛丑進士歷升廣東副使兼督學政為海瑞請蔭平抱繇羅洞黎賊乞休歸時鄉民治門總甲名坊廂籍差纍甚苦商之巡撫丁汝夔分三則𣙜房號以寬民力桑梓德之程國祥字我旋上元人起家寒素受知於焦太史竑第萬歷甲辰進士知確山縣調光山聽斷明決歷升考功郎中掌計典公慎不阿為羣小所嫉上為黜言者有清望素著之褒纍遷南總督倉場侍郎勤於其職倉務皆親蒞焉晉禮部尚書拜東閣大學士尋致仕國祥歷任卿相布蔬不異諸生時步行里巷間一蒼頭自隨而已身沒之後妻子冬日猶葛帔也賈必選字徙南上元人萬歷已酉舉人户部主事管西新倉時巨璫總部務其黨分伺六倉必選清正盡黜陋規璫不得逞疏辨倪嘉慶之寃謫外升南工部虞衡司以外艱歸即不出孔貞時字中甫句容人萬歷癸丑進士選庶吉士授檢討起居注與弟頁運編纂六曹章奏有足兵足餉諸議時皆服其精當光宗熹宗相繼即位一時詔令表册諡議之文政府多委之頁時以積勞成疾卒子尚豫能文章熟當世之務著有詒書堂類稿蔡屏周號二白萬歷乙卯舉人授浮梁令時江省為魏璫建生祠撫軍檄使至浮梁屏周毀裂其移文幾及禍升開封府通判練鄉兵𠞰寇有功後以兵部職方行邊出守雲中沈向字德一萬歷乙卯舉人任巫山令時流賊圍城月餘向率衆堅守賊引去擢御史巡漕向本衛籍夙知漕弊列十八欵揭通衢衛辨懾服孫拱辰字子極六合人萬歷乙卯舉人授撫州推官丈量樂安田地清釐隱占不阿權要移守臨清時稅璫煽惡惑方士言臠嬰兒為藥餌辰揭治其罪歲大祲設法賑濟全活甚衆為山東循良第一子國敉以貢授中書孔頁運字開仲貞時弟萬歷己未廷試第二人授編修與兄並列詞館崇禎初歷國子監祭酒幸太學賜坐彝倫堂進講尚書詳明剴切條上監規六事遷南禮部右侍郎釐舊典毀淫祠疏請清刑簡政轉左侍郎召為北吏部左侍郎九年進禮部尚書兼文淵閣大學士首疏請清言路峻亷耻破方隅止搜括優旨褒納加太子太保致仕韓一光字季孚高淳人由進士授行人奉詔册封謝絶餽遺擢河南道御史伉直有聲御書其名於屏巡按四川力禁投獻嚴革鋪役按邛州之獄開釋諸生數十人歷升山東副使告歸常延齡字喬若開平王十四世孫襲侯封遇事敢言前後陳利害凡十餘疏皆切中時弊科臣薑埰行人熊應霖以劾首輔下獄延齡疏請釋二臣而以文彥博救唐介為輔臣勸朝論韙之倪嘉慶字雋之江寧人天啓壬戌進士官户曹時議減驛站嘉慶執奏謂逰手強悍之徒不為兵不為盜者皆賴此以存活裁之適足為患樞部楊嗣昌以增兵請加餉嘉慶曰今日之患不在兵少而在餉多餉多則農病農病則民貧民貧則鋌而走險者益衆不若簡練士卒減餉裕民以消盜源嗣昌銜之被誣繫獄七年既釋臺省交薦起户科給事中王芝瑞字鍾淑京衛人明季由進士授行人轉禮部郎有郡藩當降授將軍行賄請襲王封芝瑞却之政府為之言終不可真人張某留京恩給居第因求魏璫故宅芝瑞曰宅故賜額以待有功張某何功哉格不與時相將補芝瑞銓部力辭出為四川提學僉事歸吳嘉貞字源長江浦人明季以進士授户部郎管通州倉議捐舊逋一千一百三十萬有竒開復降革守令千餘人大農疏上皆得請升泉州參議釋誣繫革私稅境多盜撫𠞰並用遷粵西以病歸國朝李敬字聖一六合人祖雲鵠有隱德嘗還遺金有以逋糧鬻女者代完逋以全其女父在公丙辰武進士有材略敬中順治丁亥進士授行人考選廣西道御史多所建白出按湖廣請免租稅改折黃絹犒師必身至行間征賊有功歷升刑部侍郎胥庭清字永公上元人順治丁亥進士知餘姚縣時餘寇未靖庭清單騎入山撫之四境以寧擢工部主事𣙜龍江關盡却羡餘家居兄弟子姓百口共㸑時稱其孝友蔡祖庚字小白上元人順治己丑進士授甘泉令以政最升户部郎歷守太原真定二府遷河南副使補任廣西居官以息事寧人為務尤留意人才徐必逺字致公江寧人順治己丑進士授祕書院檢討疏陳聖學淵源又請譯大學衍義進講奉旨俞允出為河南副使管河道性敏決持策多出人上每秋冬開濬修築某所衆初不喻既而卒賴以無敗事守職公亷嚴於估計調發歲費省而工力完固遷分守桂平道以奏銷案被株纍左遷遂歸子缺舉人時盛選貢湯聘江寧人順治辛丑進士知平山縣招撫流庸清丈板荒田請於上官蠲其賦判決疑獄民驚為神大旱步禱林山中以暍致疾卒江南通志卷一百三十九欽定四庫全書
