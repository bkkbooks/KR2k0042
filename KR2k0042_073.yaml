body:
  text: 江南通志卷七十四食貨志户口一漢自髙祖訖於孝平民户千二百二十三萬二千六十二口五千九百五十九萬四千九百七十八漢極盛矣文獻通考光武中元二年户四百二十七萬九千六百三十四口二千一百萬七千八百二十明帝以後歷代蕃滋訖桓帝永夀二年戶千六百七萬九百六口五千六萬六千八百五十六文獻通考三國吳赤烏三年户五十二萬男女口二百三十萬杜佑通典晉武帝太康元年平吳之後九州攸同編户二百四十五萬九千八百四口千六百一十六萬三千八百六十三此晉之極盛也杜佑通典南北朝宋孝武大明間户九十萬六千八百七十口四百六十八萬五千五百一文獻通考陳宣帝時户六十萬文獻通考隋文帝平陳收户五十萬口二百萬杜佑通典唐貞觀初户不滿三百萬至天寶十四載管户總八百九十一萬九千三百九應不課户三百五十六萬五千五百應課户五百三十四萬九千二百八不課口四千四百七十萬九百八十八課口八百二十萬八千二百二十一唐之極盛也杜佑通典憲宗元和時李吉甫撰元和國計簿總計天下方鎮四十八每歲賦入倚辦止於浙西浙東宣歙淮南江西鄂嶽福建湖南八道四十九州一百四十四萬户比天寶稅户四分減三天下兵戎仰給縣官八十三萬餘人比天寶三分加一率以兩户資一兵其他水旱所損徵科妄斂又在常役之外資治通鑑宋太祖開寶八年江南平得户六十五萬五千六十五宋史地理志神宗元豐六年淮南路户主七十二萬三千七百八十四客三十五萬五千二百七十口主一百三十九萬三千五百五十五客六十三萬七千三百二十六文獻通考江南東路户主九十萬二千二百六十一客一十七萬一千四百九十九口主一百六十萬九千六百一十二客二十八萬九千八百四十三丁主一百一萬九千一百三十四客一十八萬六千二十七續文獻通考寧宗嘉定十六年江南東路户一百四萬六千二百七十二口二百四十萬二千三十八淮南東路户一十二萬七千三百六十九口四十萬四千二百六十一淮南西路户二十一萬八千二百五十口七十七萬九千六百一十二續文獻通考元世祖至元十三年平宋通得江淮浙東西湖南北等路户三十七萬四百七十二口一千九百七十二萬二千一十五續文獻通考二十七年户部上天下户口數江淮四川一千一百四十三萬八百七十八口五千九百八十四萬八千九百六十四續文獻通考明太祖洪武初江南府州户一百九十萬九千九百口一千七十五萬五千九百三十續文獻通考𢎞治間江南府州户一百二十四萬六千一百三十五口八百八十一萬九千八百七十續文獻通考萬厯六年江南府州户二百九十九萬七千七百一十一口一千九十萬三千六百五十一續文獻通考國朝順治初年原額人丁四百一十五萬一千六百六丁八分五釐內除逃故無徵人丁六十萬三千四百六十二丁七分四釐十一十二十四等年審增并招徠一十一萬七千五百三十八丁又邳州集鎮異户四百四十七丁十五年審增八千三百二十二丁十八年審增并常州府不免供丁一萬四千五百二十四丁康熙元年審增七萬七千二百二十丁八分六釐五絲三年審增二千一百二十丁五年審增四千七百二十八丁六年審增三萬二千六百九十三丁七分五釐揚州府屬審減逃故并原優免五千二百四十九丁九年上元中衛改歸上元縣當差五十一丁審減安東縣徙故無徵及海州淹溺一萬九千九百一十四丁十一年長洲縣審減一千一百二十六丁十一十五十六等年審增一十四萬四千六百六十九丁五分二十年審增一萬六千四百一十八丁三分長洲縣審減二千七百三十七丁二十一年審增二萬一千八百三十二丁三分八釐二十二年審增三千五百六十四丁二十五年審增四萬六千八十丁八分七釐淮安府屬審減一萬四千九百八十一丁二十九年沭陽縣逃溺三千九百四十九丁三十年審增五萬四千一百五十六丁九分鳳陽徐州二府州屬審減一萬六千四百五十四丁三十五年審增一萬九千二百一丁五分四十年審增三萬四千九百五十五丁八分淮安徐州二府州屬審減一萬六千六百六丁四十五年審增一萬八千八百七十七丁一分五十年審增二萬五千七百六丁一分清河縣審減二十六丁五十五年起審增滋生二萬七千八百七十七丁六十年審增二萬三百三十七丁徐州屬審減六千六百二十丁雍正四年審增一萬六千七百三丁九年審增五萬九千九百二十五丁雍正十三年實在人丁四百二十二萬八千四百三十一丁一分七釐五絲又徽州府屬婺源縣內江西樂平德興二縣寄莊人丁八十七丁內大小鄉紳舉貢生員優免人丁七萬四千五百五十七丁一分辦糧當差人丁四百二萬九千一百一十九丁七釐五絲額徵丁銀俱自雍正六年為始攤入田畝併徵滋生人丁一十二萬四千八百四十二丁額外歸併省外衛所原額黃快竄閒屯丁一十五萬四千五百二丁內除駕運漕船領佃納糧例不納銀屯丁併豁免逃故無徵各丁八萬六千一百二十九丁六分節年審增各丁三千四十八丁雍正十三年實在黃快竄閒屯丁七萬一千四百二十丁四分又池州府屬建德縣歸併江西撫饒二所屯丁一百六十九丁內領駕漕船并裁汰城操備倭樓鋪門軍各丁五千一百一十一丁當差屯丁六萬四千一百二十一丁四分額徵丁銀俱自雍正六年為始攤入田畝併徵滋生屯丁二千三百五十七丁江蘇布政使司國朝順治初年原額人丁二百六十六萬四千七百五十四丁八分五釐內除逃故無徵人丁二十一萬九千七百八十六丁十一十二十四等年審增并招徠七萬九百九十二丁五分又邳州集鎮異户四百四十七丁十五年審增八千三百二十二丁十八年審增一萬一千七百七十八丁又常州府不免供丁二千七百四十六丁康熙元年審增三萬八千三十二丁一分一釐五絲三年審增二千一百二十丁五年審增四千七百二十八丁六年審增一千六十八丁揚州府審除海門縣逃故五千一丁又原優免二百四十八丁九年上元中衛改歸上元縣當差五十一丁審除安東縣徙故無徵及海州淹溺共一萬九千九百一十四丁十一年長洲縣審減一千一百二十六丁十一十五十六等年審增并海門縣裁改海門鄉歸併通州共九萬四千九百八十丁七分五釐二十年審增一萬六千四百一十八丁三分長洲縣審減二千七百三十七丁二十一年審增二千九十九丁八釐二十二年審增三千五百六十四丁二十五年審增一萬八千五百二十丁五分七釐淮安府屬審減一萬四千九百八十一丁二十九年沭陽縣逃溺三千九百四十九丁三十年審增二萬八千六百八十五丁徐州屬審減一萬四千七十丁三十五年審增九千一百二十五丁四十年審增二萬三千九百九十二丁淮安徐州二府州屬審減一萬六千六百六丁四十五年審增八千二百六丁五十年審增一萬九千一十九丁清河縣審減二十六丁五十五年起審增滋生一萬七千六百七十七丁六十年審增一萬三千八百五十二丁徐州屬審減六千六百二十丁雍正四年審增一萬二千二百三十二丁九年審增五萬二千八百丁雍正十三年實在人丁二百八十二萬一千一百四十六丁一分六釐五絲內大小鄉紳舉貢生員優免人丁五萬三千一百二十六丁一分辦糧當差人丁二百六十七萬一千四百五十九丁六釐五絲滋生人丁九萬六千五百六十一丁額外歸併省外衛所原額黃快竄閒屯丁七萬八千三百九十四丁內除領田納糧不納丁銀屯丁二萬三千七百三十五丁又改歸縣額當差并豁免逃故無徵包賠等丁一萬七千八百九十五丁六分節年審增各丁一千七百四十七丁雍正十三年實在黃快竄閒屯丁三萬八千五百一十丁四分內領駕漕船并裁汰城操備倭樓鋪門軍各丁五千一百一十一丁當差屯丁三萬一千六百九十三丁四分滋生屯丁一千七百六丁江寧府國朝順治初年原額人丁一十九萬八千五百九十二丁三分五釐十四年審增一萬四百九十二丁五分康熙元年審增六千一百四十八丁五分六年審增一千六十八丁九年改歸上元中衛人丁五十一丁十一年審增一千一百四十八丁七分五釐十六年審增一千六百八十四丁二十一年審增一千六百八丁八釐二十五年審增一千四百六十六丁五分七釐三十年審增五百六十七丁三十五年審增六百一十六丁四十年審增五百二十七丁四十五年審增三百九十一丁五十年審增二百三十丁五十五年起審增滋生二十九丁六十年審增二十一丁雍正四年審增三十八丁八年分出溧陽縣歸鎮江府管轄開除人丁五萬五千一百二十二丁五分九年審增四百二十三丁雍正十三年實在人丁一十六萬九千九百七十九丁二分五釐內優免人丁二千二百一十六丁六分當差人丁一十六萬七千二百七十三丁六分五釐滋生人丁四百八十九丁歸併省衛原額屯丁六萬九千七百二十三丁五分內除領田納糧不納丁銀屯丁二萬三千六百五十六丁又上元縣改發為民當差閒丁五十一丁又豁免原孝陵三則閒丁并機匠丁共一千二百四十一丁又豁免上元江寧江浦六合四縣逃故三則閒丁四千五百七十三丁又江寧縣於康熙三十年編審缺額三則閒竄各丁三十四丁五分又於欽奉上諭事案內豁免逃故無徵并現當民丁又包賠屯丁共一萬一千六百九十五丁一分雍正九年審增滋生六十七丁有竒雍正十三年實在屯丁二萬八千五百三十九丁九分內當差屯丁二萬八千四百七十二丁九分滋生屯丁六十七丁上元縣原額人丁二萬九千二十五丁節年審增七千三百四十一丁五分實在人丁三萬六千三百六十六丁五分內優免人丁二百八十七丁六分當差人丁三萬六千二十七丁九分每丁科銀八分六釐中衛改歸三則閒丁五十一丁每丁科銀二錢四分三釐一毫有竒歸併省衛原額屯丁一萬五千二百二十一丁內除領田納糧不納丁銀屯丁一千四百二十九丁又改發為民當差閒丁五十一丁又豁免孝陵三則閒丁并機匠丁一千二百四十一丁又豁免無徵三則閒丁二千三百三十二丁又豁免逃故無徵并現當民丁又包賠屯丁三千九百四十丁雍正九年審增滋生二十丁實在各屯丁六千二百四十八丁內黃丁每丁科銀三錢五分快丁同竄丁一則科銀三錢五分一則科銀三錢上則官舍閒丁科銀五錢中則官舍閒丁科銀三錢下則官舍閒丁科銀二錢滋生屯丁二十丁江寧縣原額人丁二萬一千六百五十七丁節年審增六千四百三十四丁實在人丁二萬八千九十一丁內優免人丁二百七十一丁當差人丁二萬七千六百八十三丁每丁科銀七分四釐滋生人丁一百三十七丁歸併省衛原額屯丁一萬三百九十丁五分內除領田納糧不納丁銀屯丁一千六百九十一丁又豁免逃故三則閒丁一千二百五十三丁又於康熙三十年審缺三則閒竄各丁三十四丁五分又豁免逃故無徵并現當民丁又包賠屯丁一千九百三十七丁五分實在各屯丁五千四百七十四丁五分各則丁科銀俱與上元縣同又竄丁一則科銀二錢句容縣原額人丁四萬六千一百四十八丁節年審增三千七百二十二丁實在人丁四萬九千八百七十丁內優免人丁五百二十一丁當差人丁四萬九千二百五十丁每丁科銀一分三釐八毫滋生人丁九十九丁歸併省衛原額屯丁三百七十二丁內除領田納糧不納丁銀屯丁一百五十六丁實在各屯丁二百一十六丁