body:
  text: 江南通志卷一百五十二人物志武功二五安徽寧池太廬鳯潁八府滁和廣六泗州安慶府南唐周本宿松人漢南郡太守瑜之後少嘗獨格猛虎唐末𨽻楊行密帳下勇冠三軍攻堅摧鋒䝉犯矢石身無完膚及歸營自燒鐵烙其創飲啖言笑自若出為夀州節度使改鎮廬州加太尉中書令封西平王本不知書而愛重儒士賔禮僚屬不撓其權吏民愛之性純朴無他才惟軍旅之事則如夙習子鄴少驍勇每從本征討本略地至建州被圍垂困鄴躍馬救之手殺數十人翼本而出官至廬州節度使明楊文勝潛山人膽智過人當紅巾之亂於陽城山立寨逺近居民爭依之保障數萬人明太祖命徐達征陳友諒文勝出義師追𠞰擒友諒參政郭泰於沙河帝嘉其功授惠州衛承信校尉世襲千户畢銀太湖人元末集衆數萬保障一方後歸太祖鄱陽之戰嘗資軍糧洪武改元授英武衛指揮使十年改授大河鎮守遼東石良宿松人謀略沉斷元末集義勇築城設寨捍禦鄉里明太祖起兵良籍其土與户獻之纍以功擢武德將軍英武衛正千户陳漢宿松人性沈勇元末盜起漢奮義聚衆明初歸附授大都督汪澤懷寧人仕至後軍都督府都督原籍鳯陽其祖盛從太祖立竒功官都閫奉敕鎮兩廣經安慶卒遂葬於安慶因家焉澤在宣德間屢著戰功世襲都指揮使黃永桐城人靖難兵起以伍卒隨征纍立戰功比定京師拜明威將軍調南羽林衛指揮世襲其職柳升懷寧人以千户從太宗靖難歷升都督僉事永樂五年俘獲交趾賊黎季氂封安逺伯進侯後從北征以神機火器大破敵師加太子太傅宣德初復征交趾連破關隘數十乘勝深入中伏死追封融國公諡襄敏子溥字廣達襲侯爵正統三年掛征蠻將軍印充總兵帥湖廣等都司官軍守廣西征大藤峽殺賊楊容拾等五年討柳州等處六年破石門等寨十年征思恩賊獲常萬王等斬之寇遂平十四年還進太子太師總神機營兼掌右軍都督府事復守廣西天順改元召進太𫝊仍掌營府事又掛平虜將軍印程翰字鵬舉望江人正統間貢生任湖廣㑹同縣令率民兵討平苗洞民立像祀之黃應甲字汝第懷寧人少習韜略善騎射嘉靖乙卯夏倭突至蕪關應甲以一旅禦之於姑孰倭不得入中武甲科屢遷粵西都事海賊曾一本犯省城力拒之而遁討古田賊出竒搗虛恢復土宇又平廣西哈喇洞賊喜金抱廣東洞賊鮑時秀晉大都督驃騎將軍吳一介字元石桐城人嘉靖丙辰進士備兵江西㑹廣東峒賊卞豹等屠電白詔舉邊才京兆尹畢鏘薦一介遂移監南越軍以平賊功晉河南布政致仕容若玉懷寧人萬厯甲戌進士歷官江西嶺北道岑賊嘯聚廣中和平諸境若玉攝藩篆假節鉞兼程而進先於大龍據要害即調嶺北兵截其歸路遣諜者火其巢穴一戰擒之以勞卒官國朝張清議字君荷懷寧人明季癸未進士任户部主事順治初備兵廣東值獞猺跳梁議雨夜進兵一戰擒其魁移川北𠞰滅西山賊尋致仕子超方孫遇隆皆成進士邵嘉賔字子雋懷寧人康熙癸卯武舉任福建海澄守備海冦猖獗隨大將軍進𠞰有功後海澄陷嘉賔被執不屈乘間逸歸知賊形勢虛實復隨進𠞰一鼓平之恢復海澄以功進秩左都督林鸞字采五桐城人康熙甲戌武進士任肇慶守備時粵地多盜鸞奉檄偵緝韶陽單騎入營諭以恩威寇皆服擢濟南都司以病歸有圖書數卷而已徽州府南北朝齊程靈洗字元滌新安人祖茂為郢州刺史梁武帝舉兵茂移書責合天正及城陷義不受梁官靈洗少有勇略嘗手殪妖蜃以安鄉井侯景亂集鄉兵保黟籍奉表元帝授本郡太守後歸陳纍以戰功封重安縣公卒諡忠壯唐汪華字國輔新安人少以勇俠聞隋末以土豪應郡募保據境土并有宣杭睦婺饒五州之地四方雲擾而境內無事者十餘年至唐武德四年籍土納欵封越國公吳仁歡祁門人永泰元年方清作亂仁歡率鄉兵數千破之刺史上其事授朝散大夫明年賊平因其壘置縣拜仁歡為令宋錢嶨歙人與弟觷尚氣節宣和中方臘餘寇未燼嶨兄弟起鄉兵討平之建炎三年北兵將溯浙而西嶨兄弟逆戰桐廬據牛山之險功聞並授承信郎胡閎休字良弼婺源人嘗著兵書靖康元年試中知兵科帝幸金營閎休結義士欲劫寨迎駕宰相何㮚禁止之後從辛道宗軍勤王嶽飛辟為荆襄制機有功官至成忠郎元汪同字仲玉婺源人好武技蹀躞不羈元末寇亂同起義兵保障鄉里收復饒黟祁婺等已陷州縣上嘉其勞拜淮南等處行中書省左丞張士誠心不純同與史左丞謀約金陵兵取姑蘇為所覺出兵髙郵張士信招與言事遂為士誠所拘同曰吾以汝為元太尉忠於國家今汝既叛我豈得從汝反耶遂遇害明李錫字君寵世襲新安衛千户征倭有功纍升總兵官與俞大猷夾擊海冦曾一本擒之以征蠻將軍代大猷鎮廣信巡撫御史上其功言錫一年內破賊二百一十四巢獲首功一萬二千餘級宜久其任許之進秩二等卒於官國朝江起龍歙人順治中任廣東水師參將駐劄白鴿寨通明港白鴿當郡城入海之口為雷州左臂營署傾圮武備廢弛起龍大修飭之壁壘一新久之遷副將移營海安口出洋捕盜風發舟覆殞焉屢著感異雍正九年封為英佑驍騎將軍之神寧國府唐左難當一名匡政涇縣人隋末盜起難當率衆保障武德中入朝授猷州刺史輔公祏反圍猷州固守逾年李大亮至授以兵遂擊公祏敗之後太宗伐髙麗以李大亮為水道兵總管難當副焉與李績李道宗節勇並冠一時梅知巖寧國人隋季兵亂知巖部伍鄉里帥衆保障與左難當相犄角盜不能犯武德初與難當同歸附封南魯王宋李材字達才太平人宣和末金圍太原材以太學生上書言三關四鎮國家根本宜速遣偏師倍道趨雁門入定襄復欣代截石頭關絶其歸路俾腹背受敵朝議以為然命陳淬武漢英等將兵徑收欣代材參幕謀畫居多仕終蘄州通判元徐用和南陵人有武略至正間海賊熾行中書左丞特哩特穆爾以用和參贊軍務𠞰撫有功升都鎮撫上命繪圖傳逺卒賜祭葬胡有慶涇縣人父武孫任宣城尉以擒賊功升湖州路同知有慶輕財任俠仕終武昌録判嘗尉婺源有三虎白晝入城衆莫能禦有慶連發三矢斃之明袁洪宣城人少勇敢習韜略洪武初從軍歷戰有功特進左都督子容尚燕王郡主以靖難功封廣平侯何應龍字子驤南陵人元末里中諸俠少嘯聚應龍誘其首亂者斬之餘悉蒲伏請命乃散粟結士部署捍禦鄉井獲安有司上其功授民兵萬户明興歸附詔世襲李遇文字克顯世襲宣州衛指揮升劉河遊擊時小琉球三十六人風潮飄至把總陳嘉謨欲指為倭斬首報功遇文召通事訊實遂遣歸歷升湖廣副總兵㑹皮林苗叛糾聚八洞據險要遇文攻破其寨分兵進𠞰恢復永從縣焚苗巢窟追擒渠魁王陀於廣西境以功轉左軍都督鎮貴州沈有容字士𢎞宣城人萬厯中以武舉為昌平千總調薊鎮以二十餘卒退朵顔長昻三千騎數出塞有功遷都司守浯嶼銅山石湖時倭寇剽掠閩浙有容夜過澎河與倭遇縱火焚其六舟斬十五級還所俘民三百七十餘人倭不至者十年紅毛番韋麻郎艘次澎湖求市有容大聲讋之即引去擢山東總兵駐登州廣寧失守遼民望海求渡登撫下令禁之有容固爭具舟以濟活萬餘人以年老乞歸孫鎬字西涯太平人以鄉薦知臨頴縣師賊擒良民黥師字於面州縣遇黥者即指為師鎬獨下令曰歸農者民抗鬭者賊黥否勿問衆感泣遂潰尋知簡州土司有嫡庶爭立者擁兵相持命使往即殺之鎬從數騎賫詔往從容詢所宜立若未嘗有詔者久之益習樽酒招延嫡庶咸與席一日鎬指北山曰今九日也此宜登髙嫡庶欣然從之方命酌忽一吏曰詔至即持庶下斬之事平仕至瑞州同知致仕國朝唐邦杰字輔宸宣城縣人順治間以總兵官駐防仙遊移守寶慶復遷鎮河州平西山巨寇定陜西保安堡亂兵巡積石枹罕二十四關修邊城八百五十丈火兒藏野番皆畏威賔服池州府明顧成字景昭貴池人太祖起滁陽充帳前親軍以功歷指揮僉事從平蜀破貴州蠻克普定大兵入雲南以成斷後扼普定遷都督僉事尋充征南將軍鎮貴州征五開六硐破一百三十七寨後與靖難師戰真定兵敗被執成祖釋而用之永樂初封鎮逺侯又命出鎮貴州搗羅臺斬叛酋普亮羣蠻震懾尋致仕歸卒諡武毅紀元憲字藎我貴池人萬厯甲辰武進士由偏裨歷廣西總兵官右軍都督僉事掛征蠻將軍印威名震獞猺又建德檀武臣隆慶二年由武進士歷神樞營參將為名將戚繼光所重何自謙字益之銅陵人萬厯中以貢授瓊州府通判時朝廷遣中使至瓊與羣黎市珍異屢有激變相劫殺者自謙每從中調護之得無事後代守入覲回而黎變大作自謙道聞之疾馳渡海合雷陽三路兵搗黎穴冒暑深入用火攻之擒其渠魁十餘人黎始帖服因條撫黎數事上之詔如議以秩滿遷審理又敘平黎功進階長史致仕金文光字朴只石埭人萬厯三十一年武進士官福建游擊合𠞰紅毛倭寇有功歷南贑參將會屬境土寇踞九連洞為害流毒及閩廣文光以兵深入𠞰平之贑人為立生祠方儀鳯貴池人萬厯丙辰武狀元授廣東屯田都司僉書大興屯政以給軍食歷廣東參將紅毛劫掠海上督兵却之擢南路副總兵著韜略全書行世子懋昌由武進士歷貴州安順副總兵撫馭羣蠻著方略施臺臣青陽人天啓壬戌進士授龍巖令縣傍海值紅毛入寇臺臣躬督民兵奮勇逐之寇遁邑賴以全又建德馮時來明季由舉人授江安知縣土番冦掠時來集兵固守賊攻城數月不能下始解圍去金孔器字璉如建德人明季由貢授蒲臺令有奸民據海島掠海旁諸邑孔器嚴守備以待之寇不能犯調崇義督兵平土寇擢南康同知南康接楚界多流寇山賊往往為之應孔器隨宜撫𠞰奪還所掠婦女郡境得安汪思誠字純一貴池人史可法備兵池州竒思誠才招致幕下每參軍謀及可法開府江上題授軍職歷擢副總兵臨陳力戰每脫可法于險後與可法同死揚州國朝曹曰瑋字繼武貴池人康熙癸未武狀元授二等侍衛從征漠北特著勞績出為山西養民路參將纍擢陜西興漢總兵官漢江暴漲州城被水齧盡圮督軍士晝夜巡防感疾卒曰瑋精騎射通經史大義居官勤慎馭卒伍嚴而有恩所拔多材勇之士太平府明端宏字仲仁當塗人天順丁丑進士授御史歷按雲南河南廣西溪谷蠻獠久為邊害宏選將練兵儲餉設險為攻守計諸洞望風懾服邢珣字子用當塗人𢎞治癸丑進士歷南刑部郎忤劉瑾削籍瑾誅復官知贑州南安龍川盜起珣引軍逼賊先招降劇盜滿總等後討他盜多藉其力王守仁征橫水桶岡珣為軍鋒功最宸濠反珣率兵㑹守仁進討值南風猛珣建策火攻遂大破之宸濠就擒以功遷左布政致仕贑人思之立報功祠祀守仁以珣配二子埴址居官並以清操聞裴希度建陽衛人世襲指揮僉事屢立戰功歷福建總兵官海盜鄭芝龍剽劫州郡恃巨艦為長城風帆飄忽瞬息千里希度偵其將至預伏死士舟中人挾長鈎鋭斧俟賊近百鈎齊舉固挽之不得脫因舉斧登艦殺賊無算芝龍駕哨船逺遁尋乞降祝可仕字孟型當塗人鑾孫萬厯庚戌進士授工部主事改户部督通倉著績歷福建參議紅毛入犯佐巡撫南居仁籌畫擊敗之遷廣西副使未任卒廬州府隋陳稜字長威廬江人大業中拜虎賁郎將擊琉球大破之虜男女數千而歸煬帝幸江都命統宿衛兵擊賊淮上往往克捷遷右禦衛將軍唐任瓌字子瑋合肥人髙祖義師起瓌至龍門請謁願為一介使先入關宣布威靈乃授招慰大使說下韓城以功封管國公與諸將擊破王世充後平徐圓朗及輔公祏拜邢州都督遷陜州卒五代王景仁廬州合肥人初名茂章為楊行密將驍勇剛悍臨敵務以身先士卒梁友寧攻王師範于青州行密遣景仁以步騎七千救師範大破之遂斬友寧梁太祖聞之以二十萬兵倍道而至景仁閉壘示怯伺梁兵怠毀栅而出驅馳疾戰戰酣退坐召諸將飲酒已而復戰太祖登髙望見之歎曰使吾得此人為將天下不足平也梁兵又敗景仁全師而歸官潤州團練使後歸梁纍官寧國軍節度使同平章事宋劉虎廬州梁縣人起農家𨽻軍籍力戰纍功擢副都統總轄淮隂水陸軍馬拒元師于五河率勇士乘風縱火中流矢洞腹達背悶絶復蘇揮兵更戰意氣彌厲援夀春自三月至五月戰百餘合卒解其圍奏凱進利州觀察使拜合肥郡侯明張德勝字仁輔合肥人與廖永安俞通海等泊巢湖結水寨自固太祖駐師和陽來通欵從下太平取集慶克鎮江常州宣州復池州後追陳友諒於采石戰死贈蔡國公諡忠毅楊璟合肥人本儒家子沈毅好武歸太祖從征陳友諒克九江諸郡縣下廣西征山西平唐鄧南陽佐鎮北平練兵遼東積功封營陽侯贈芮國公諡武信吳復字伯起合肥人率衆歸太祖於濠嶺前驅積功封安陸侯追封黔國公諡威毅復平居恂恂至臨陳奮發無堅不破衝突矢石身無完膚俞通海字碧泉巢人隨父廷玉來附太祖渡江取太平金陵略定常潤蘄黃等處殱陳友諒於康郎山功最多從征張士誠中流矢卒追封豫國公諡忠烈馬雲合肥人洪武四年為都指揮使與葉旺同鎮遼東設竒出伏破納哈追擊三百餘里殱其衆殆盡上嘉其忠遣使勞之進都督僉事兼總制遼東軍馬十二年征大寧克捷巡邊還卒俞通源字百川通海弟少隨父兄立功通海卒領其衆攻蘇州擒士誠嗣通海官從大將軍定中原下山東河南北山西關陜征王保保皆先登洪武三年封南安侯從廖永忠伐蜀又從魏國公出塞有功後鎮雲南征廣南諸蠻俘獲萬數弟通淵建文時豹韜衛指揮戰白溝河死袁義廬江人本姓張太祖賜姓名數從征伐積功為楚雄衛指揮使嘗入朝以其老命染鬚鬢還任以威逺人廖永忠永安弟永安殁永忠總其兵為水將蹙陳友諒于龍江取江西從下蘇湖平方國珍取福建廣東略定廣西征蜀論功當封公以鄱陽之役有邀賞意抑封德慶侯金朝興巢人沉勇有智略元季結鄉里立寨㑹俞廖以舟師納欵遂率所部來附從渡江征陳友諒張士誠北略中原西平蜀夏封宣德侯征雲南至㑹川卒贈沂國公諡武毅花茂巢人從太祖征伐授副千户平西蜀兩廣有功世襲廣州左衛指揮使請設沿海依山二十四衛所築城浚池收集海島諸軍仍于要害之地立堡屯軍以備不虞皆報可進都指揮使卒賜葬子英武毅有文略自以功升都督僉事汪興祖巢人初為張德勝養子纍功封東勝侯人有言其過者上弗問亦弗與誥劵從傅將軍入蜀克階文中飛石死詔興祖沒王事授原封侯與世劵趙庸合肥人元末率舟師來附從征陳友諒張士誠走張良弼降李思齊多戰功封雄侯葉升合肥人自拔采石定金陵平友諒士誠還征中原三平叛蠻積戰功封靖寧侯鎮遼東六年邊備修舉髙顯合肥人以功封汝隂侯諡武肅鄭亨合肥人從成祖積戰功封武安侯充總兵官備宣府規畫周詳帝凡五出塞亨皆從行率破敵仁宗即位移鎮大同無寇患宣德初招降酋長歸附者相屬卒諡忠毅徐用元合肥人以功封永康侯陳文合肥人早喪父奉母至孝屢立戰功官都督僉事卒贈東海侯諡孝勇武臣以孝諡者止文一人孫世巢人以功封富春侯陳清巢人以功封合浦侯諡崇武左君弼合肥人元末據州太祖再攻之走汴守陳州遣使持書招諭君弼猶豫不能決乃歸其母於陳州始感泣納欵以副總兵率師討捕底定兩江徐忠字仲達合肥人父用開國功升副千户忠嗣職進衛指揮僉事鎮開平從靖難兵將前軍敗李景隆于鄭村壩白溝之戰兩指被創未殊忠自斷之裹創進戰大捷歷都督僉事封永康侯卒贈蔡國公諡忠烈胡通王圭寧仲英王雄王玉玉弟瑛周顯鄭祥翟通皆合肥人明開國時各樹戰功國朝王承業廬江人任福建中路參將移鎮潮州康熙甲寅逆藩煽亂以中營副將征賊有功升總鎮往𠞰雲南被重傷殁於營贈右都督鳯陽府三國吳周泰字幼平九江下蔡人隨孫策署别部司馬策討六縣山賊權住宣城不治圍落而山賊數千卒至權始得上馬而賊鋒創已交於左右泰投身衛權膽氣過人身被十二創良久乃蘇是時無泰權幾危殆策深德之後從攻皖及討江夏黃祖有功又與周瑜拒曹操于赤壁攻曹仁于南郡留督濡須後權欲圖蜀拜泰漢中太守奮威將軍封陵陽侯子邵以騎都尉領兵數戰有功進位禆將軍弟承領兵襲侯丁奉字承淵廬江安豐人少以驍勇為小將數隨征伐戰鬭常冠軍孫亮即位為冠軍將軍封都亭侯魏遣諸葛誕胡遵等攻東興奉據徐塘縱兵著胄持短兵斫之大破敵前屯遷滅寇將軍又與敵追軍戰於髙亭突入其陳中斬首數百進封安豐侯纍遷大將軍加左右都護領徐州牧晉桓石䖍龍亢人彞之孫有才幹趫捷絶倫桓冲為苻堅所圍垂沒石䖍躍馬赴之拔冲於數萬衆之中而還以寧逺將軍攻袁真於夀陽尅其南城尋進冠軍將軍復領河東太守逐堅兖州刺史張崇冲卒監豫州揚州五郡軍事卒贈右將軍進爵作塘侯子誕嗣桓石民石䖍弟弱冠知名謝安引為參軍以振武將軍領襄城太守戌夏口冲薨監荆州軍事屢破苻堅兵以前後功進左將軍南北朝宋王廣之字林之沛郡相人有勇力大明中以功補本縣令殿中龍驤强弩將軍屢立戰功封寧都縣子齊髙帝即位歷官鎮南將軍江州刺史進封應城縣公卒贈散騎常侍車騎將軍諡曰壯公梁裴之髙字如山邃兄中散大夫髦之子起家州從事新都令遷參軍頗讀書少負意氣嘗隨叔父邃征討所在立功甚為邃所器重戎政咸以委焉夀陽之役邃卒於軍之髙𨽻夏侯夔平夀陽除梁郡太守封都城縣男時魏汝隂來附敕之髙接應士民夜反踰城而入之髙率家僮與麾下奮擊賊乃散走侯景之亂髙率衆入援除特進光祿大夫卒諡恭子畿纍官太子右衛率西魏攻陷江陵畿力戰死之五代梁馬嗣勳濠州鍾離人也少事州為客將材武有辨歸梁官宣武軍元從押牙太祖西攻鳯翔至華州遣嗣勳說韓建出降後以計為魏攻牙軍中重創卒贈太保丁㑹字道隱夀春人也為梁將救張全義于河陽大敗李罕之軍纍立戰功為昭義軍節度使昭宗崩㑹與三軍縞素發哀歸後唐卒贈太師宋周虎字叔子臨淮人開禧二年知和州金兵圍和州急虎部兮將士乘城拒守母何氏年九十期與虎偕亡虎益奮勵屢戰斬其驍將金兵引去虎推功歸母封永國太夫人後轉和州防禦使卒諡忠惠元杜昌濠人身長多力至正間以義兵應募有功擢汝州同知安豐等處萬户阮者都世居荆山襲父職守禦浙東值海盜起奮力擒捕悉平之以功擢浙東道都元帥明常遇春字伯仁懷逺人猿臂善射從太祖奪采石為渡江第一功漢吳既平封鄂國公率兵北伐所至披靡名與徐達相埒暴疾卒於軍追封開平王諡忠惠遇春為人守謙不矜有功無過運籌決勝不學而能其從大將軍東征西伐能遵守節制及其自將所至克捷在上前時有直諫無不嘉納子茂䕃封鄭國公并開國公湯和字鼎臣濠人剛毅有智略從太祖征伐所至皆捷纍封信國公後倭寇海上和度地于近海設衛築城五十有九浙閩賴之功臣中獨以夀終追封東甌王諡襄武胡大海字通甫虹縣人長身鐵面智力過人常夜出目煜煜有光從太祖纍建竒功常言吾武人不知書惟知三事不殺人不虜婦女不燬廬舍後為叛將所害人無不流涕者追封越國公諡武莊唐勝宗濠人以從征積功封延安侯鎮守遼東七年威信大著丁德興定逺人太祖呼為黑丁屢戰立功征張士誠卒於軍追封濟國公王弼定逺人功封定逺侯沐英字文英定逺人父母早亡太祖子之既長屢立戰功從傅友德取雲南英生擒達爾瑪長驅而入梁王走死遂留鎮滇中凡十年卒英善撫士卒在滇百務俱舉卒之日軍民巷哭逺夷皆為流涕始封西平侯追封黔寧王諡昭靖子春材武有父風嗣爵鎮雲南七年數立功卒諡惠襄無子弟晟嗣以討交址功封黔國公卒諡忠敬弟昻代鎮雲南卒諡武襄馮勝定逺人與兄國用俱喜讀書通兵法元末結寨自保後同歸太祖國用論天下大計以拔金陵為根本太祖命典親兵數立功早卒追封郢國公勝先已積功為元帥至是襲兄職破陳友諒下山東平陜西封宋國公後為大將軍出關降納克楚二十萬之衆加太子太師吳良定逺人從太祖為帳前先鋒屢立功克江隂命守之張士誠不敢北出兵在境十年訓將練兵新學宫開屯田均徭省賦封疆晏然平吳後移鎮蘇州又平廣西叛蠻封江隂侯卒追封江國公諡襄烈弟貞戰功亦多敗張士誠討方國珍擒陳友定後練軍海上封靖海侯總舟師數萬由登州轉運盡收遼海未附之地卒追封海國公諡襄毅耿炳文濠人父君用從太祖為管軍總管戰死炳文襲職攻張士誠取長興即令守之長興為士誠必爭地數遣大將來爭炳文拒守凡十年既取中原鎮陜西浚涇陽洪渠十萬餘丈民賴其利封長興侯建文時燕兵起炳文年六十五矣命為大將軍北伐燕兵退帝以李景隆代炳文歸遂敗永樂初被劾自殺郭英濠人從太祖數立戰功鎮河南境內大治移鎮北平從征雲南封武定侯鎮遼東召還典禁軍卒諡威襄英孝友通書史行師有紀律兄興從征張士誠有功既取中原鎮潼關移鞏昌邊境帖然封鞏昌侯卒諡宣武華雲龍定逺人元末聚衆居韭山歸太祖克元都留守北平封淮安侯凡塞上諸關隘衝要之所俱設兵建燕邸增築北平城在鎮七年威名大著潘毅臨淮人洪武初從征纍有戰功拜虎賁衛指揮使再從西征道卒追贈滎陽伯諡曰武陸仲亨濠人功封吉安侯周德興濠人積戰功封江夏侯又以伐蜀克泗城功出諸將上賞賚恆倍㑹五溪蠻亂德興年已老力請行太祖壯之在楚久威震諸蠻楚人德之陳德字至善濠人從太祖與陳友諒戰鄱陽湖舟膠淺力戰身被九矢不退後積功封臨江侯卒追封杞國公諡定襄鄭遇春濠人功封滎陽侯王志臨淮人以鄉兵歸太祖每戰冒矢石先登後凡用兵皆以偏將軍從持重未嘗敗衄封六安侯卒追封許國公諡襄簡張赫臨淮人以義兵應太祖屢立功洪武初倭寇掠沿海赫捕斬甚多擢都督僉事令督海運往來遼東十二年封航海侯卒追封恩國公諡莊簡顧時字時舉濠人由百夫長授元帥積功封濟寧侯鎮北平卒追封勝國公諡襄靖胡海字海洋定逺人攻城略地屢戰屢被矢石鋒刃傷而鬭益力太祖壯之既平廣西雲南論功封東川侯張銓定逺人纍有戰功平雲南功尤多封永寧侯張龍濠人積戰功封鳯翔侯李新濠人從渡江數立戰功官都督僉事以營孝陵封崇山侯開胭脂河于溧水以濟漕運民便之李彬字質文定逺人襲父信職從燕師為前鋒纍立功封豐城侯鎮廣東捕山寇討長沙賊鎮甘肅獲叛酋老的罕移鎮交址時中官馬騏激變交人反者四起彬遣諸將分討而賊勢最劇者親自討之潘僚范玉等悉平卒贈茂國公諡剛毅孫恪濠人興祖子襲父職歷後軍都督僉事積功封全寧侯謹敏有儒將風進位太子太保寧正字正卿夀州人沈鷙有膽略積功擢河州衛指揮使勤于勞來不數年河州遂為樂土兼領寧夏衛事修築漢唐舊渠開屯田數萬頃歷四川雲南都指揮使從沐英討平叛酋卒為左都督代英鎮雲南朱能字士𢎞懷逺人以副千户事成祖于藩邸與張玉首倡靖難兵奪九門拔薊州敗耿炳文于真定敗李景隆於壩上敗平安于白溝河藳城敗陳暉于潼山敗盛庸于淮直入金川門論功封成國公永樂四年佩征夷將軍印討安南次龍州卒年三十七將校皆流涕追封東平王諡武烈孫巖鳯陽人明初為燕山中護衛百户燕師起既得通州以巖宿將命守之南軍圍州城巖多方捍禦力戰帝即位封應城伯卒贈翼城侯諡威武同時封伯者陳賢夀州人初從太祖立功為燕山右護衛指揮僉事從燕師出戰常突陳陷堅封榮昌伯張興亦夀州人起卒伍為燕山左護衛指揮僉事以功封興安鄉伯陳懋夀州人父亨建文時以都督僉事守大寧降成祖與平安戰中創卒追贈涇國公懋將父兵纍功進右都督封寧夏伯永樂中鎮寧夏善撫降卒得其歡心擒叛寇進為侯屢從北征有破敵功宣德初仍鎮寧夏威名震漠北後佩征南將軍印討福建賊鄧茂七平之加太保卒年八十五贈濬國公諡武靖何福鳯陽人洪武初中衛指揮同知歷將軍討平都勻越州畢節水西等蠻成祖即位以福宿將俾鎮寧夏節制山陜河南諸軍塞外諸部降者接踵移鎮甘肅降迤北王子以下所部皆內附論功封寧逺侯韓觀字彥賔虹人髙陽侯成子太祖時以父功授桂林衛指揮僉事討平柳州富川上林宜山全州灌陽諸猺蠻觀生長兵間綜練武略人莫敢犯成祖即位鎮廣西節制兩廣復平定羣蠻移鎮交址威名震南中費巘定逺人襲祖父職從成祖起兵纍進都督僉事鎮甘肅墾閒田以足邊餉善撫士在鎮十五年境內寧謐封崇信伯謝成濠人功封永平侯宋晟字景陽定逺人父朝用以天寧翼元帥請老晟襲父官歷鎮江西大同陜西討哈梅里克之收其部落以歸又討廣西帡幪諸寨苗平五開龍里十三洞招降巴圖特穆爾等部落封西寧侯凡四鎮凉州前後二十餘年威信著絶域卒追封鄆國公諡忠順郭登字元登武定侯英孫正統中從車駕北征以指揮僉事超拜都督僉事鎮守大同帝既陷也先數擁帝至城下索金幣登閉門不納而謀遣壯士劫敵迎帝入城不果敵欲大同為巢穴屢來攻登屢擊敗之邊軍增氣嘗以意造偏箱車飛天網等戰守賴之封定襄伯英宗復辟召還憲宗時提督十二團營卒贈侯諡忠武趙輔字良佐鳯陽人成化初拜征夷將軍與韓雍平大藤峽賊封武靖伯又統兵征迤東與李秉從撫順關深入破之進侯卒諡恭肅戴紹印鳯陽人自萬户侯擢三江總戎致仕萬厯丁酉日本關白犯朝鮮命大司馬邢玠總督征之紹印杖策往從畫平倭十策卒覆倭以過勞驟卒大中丞褚鐵檄郡建祠潁州府三國魏曹洪字子廉譙人太祖從弟太祖起兵討董卓至滎陽為卓將所敗太祖失馬賊追甚急洪下馬授太祖曰天下可無洪不可無君與太祖還奔譙封明亭侯曹仁字子孝譙人武帝從弟從破袁術攻陶謙征吕布平黃巾迎天子都許仁數有功又從圍壺關武帝令曰城破皆坑之連月不下仁曰圍城必示之活門所以開其生路今公告之必死將人自為守非良策也從之城遂降封都亭侯曹彰字子文譙人文帝同母弟負絶力手格猛獸太祖每抑之嘗問諸子所好彰曰好為將太祖曰為將奈何對曰披堅執鋭為士卒先賞必行罰必信太祖大笑北討烏桓身自搏戰乘勝逐北一日夜追及桑乾大破之後歸報太祖持彰鬚曰黃鬚兒竟大竒文帝即位立為任城王曹休字文烈譙人武帝族子年十餘嵗攜母渡江至吳武帝舉義兵乃易姓名間行北歸帝謂左右曰此吾家千里駒也文帝時以休為征東大將軍擊吳將吕範于洞浦破之拜揚州牧明帝時封長平侯曹真字子丹譙人武帝族子武帝哀其少孤收養與諸子同嘗從獵為虎所逐射之應聲而倒太祖壯其鷙勇封靈夀亭侯纍遷大司馬子爽字昭伯明帝時與司馬宣王並受遺詔輔少主後為宣王所誅夏侯淵字妙才譙人惇族弟從武帝征伐有功封博昌亭侯守漢中戰死諡曰愍許褚字仲康譙國人勇力過人嘗一手逆曳牛尾行百餘步漢末聚少年及宗族保鄉里魏太祖狥淮汝褚以衆歸太祖壯之曰此吾樊噲也引入宿衛從討馬超韓遂有功遷武平衛中郎將人以其有力而癡目為虎癡文帝踐阼封牟涇縣公唐江子建信州人隋末兵起所在殘破子建設柵禦賊鄉井獲寧髙祖武德初以其保護功即命為本州刺史五代梁楊師厚潁州斤溝人事梁太祖自太祖與晉戰河北嘗為招討使悉領梁之徑兵末帝謀討朱友圭師厚遣其將朱漢賔以兵屯滑州為應末帝即位封師厚鄴王王敬蕘潁州汝隂人事州為牙將唐末王仙芝等攻劫汝潁間刺史不能拒敬蕘逐代之即拜刺史為人沈勇有力善用鐵槍潁亳諸州民皆依敬蕘避賊時所在殘破惟潁州二萬户獨全梁太祖表為沿淮指揮使歷武寧軍節度使左衛上將軍致仕張存敬譙郡人剛直有膽勇事梁太祖為行營都指揮使攻滄州敗劉仁恭于老鴉隄還攻王鎔于鎮州入其城取牛馬萬計復攻幽州取其瀛莫祁景四州攻王珂于河中下晉絳二州珂降于梁遷宋州刺史卒贈太傅徐懷玉亳州焦夷人事梁太祖為將勇于戰陳秦宗權攻梁壁懷玉擊破之從太祖攻兖鄆破徐宿金創被體戰必克捷所得賞賚輒分士卒為梁名將本名琮太祖賜名懷玉從太祖敗魏兵黎陽東攻兖破朱瑾於金鄉遷齊州防禦使天復四年以州兵西迎昭宗都洛陽遷華州觀察留後纍官保大軍節度使南唐張崇慎縣人仕楊吳為廬州觀察使時光州將王言殺刺史崇在廬州不俟命引兵趣光言棄城走宋髙瓊䝉城人太宗知其材勇召置帳下積戰功纍官保大軍節度使真宗時為并代都部署中檢校太尉瓊曉達軍政澶州之役真宗北征中道猶豫瓊贊決渡河督戰契丹氣沮而退堅守和議數十年尤善教諸子真宗嘗問卿幾子對曰臣子十有四人臣誠愚然未嘗不教以知書于是賜諸經史于其家後曾孫女為宣仁后追封衛國武烈王髙繼勳瓊之子真宗時為建雄節度使善撫御士卒在蜀有威名繼勳子遵甫官北作坊副使其女為宣仁皇后神宗時追封繼勳為康王遵甫為楚王繼勳從子遵惠熙寧中試經義中選纍官龍圖閣學士方宣仁后臨朝繩檢族人一以法度乃舉家事付遵惠遵惠躬表率之人無間言張整字成伯亳州酇陽人初為利文州都巡檢使邊夷嵗鈔省地整募死士待其來掩擊幾盡調荆湖將領狤狑萬衆迫黔江城整設伏擊之殺獲不可勝計後為涇原真定京東環慶鈐轄整蒞軍嚴明哲宗嘗召對擢都指揮使官至威州刺史丁罕潁州人應募補衛士纍遷指揮使淳化間出為澤潞團練使知霸州㑹河溢壞城壘罕以私錢募築民咸德之以容州觀察使與李繼遷戰斬獲數萬拜密州觀察使知威虜軍子守德能世其家王鑑霍丘人為淮西兵馬鈐轄李全犯揚州鑑往救敗之全走死乘勝復泰楚二州除鎮江都統制下邳徐二州招納降附措置廬州守禦俱有功封廬江郡開國侯明劉才字子才霍丘人元末為元帥明初歸附歷衛指揮僉事從戰山東每先登有功封廣恩伯永樂中築山海關復從征至懷來以疾還才不為茍合亦不輕訾毀人甚為仁宗所重曹隆程寬俱潁上人從成祖起兵隆以靖難功纍官至都督同知卒追封安陽伯諡忠毅寬積功至都指揮同知從張輔平交址進都督僉事卒追封保昌伯諡忠威鹿鸚潁州衛舍餘兄弟五人鳯鸞鸚鵡鵬皆勇敢善射而鸚更軼羣正德七年劉六等破太和圍潁上鸚昆弟應募守城賊將李龍者號萬人敵鸚與大戰生擒以歸未幾復擒劇賊李魁寇為喪氣解圍去都御史彭澤上其功授錦衣百户而鸚已卒年僅二十七土人思其捍患功立廟祀之至今呼鹿將軍廟云滁州南北朝隋張奫字文懿全椒人以軍功歷開府儀同三司封文安縣子從楊素征江表有功授行軍總管南唐張訓滁州人楊行密據合肥訓往謁授以親兵取歷陽及滁孫儒焚棄廣陵訓入城得穀數十萬斛悉以發賑又襲常州克之即授刺史徙屯漣水大破汴將龎師古於清河口明趙奎字思義全椒人體貌魁岸有才略從太祖渡江取采石屢立功授總管守宜興洪武四年從征甘肅猝遇敵衆畏怖奎獨力戰敗之與同縣王才俱纍官都指揮使才亦以材武著何文輝字德明滁州人元帥世隆孫幼岐嶷太祖鞠養之賜以姓既長嚴毅沈果有逺略授天寧翼元帥守禦宣州及從征鄱陽皆有功後復姓遷江西行省左丞大都督府同知洪武五年督兵巡居庸關遇疾召還卒平安全椒人父定濟寧指揮僉事戰殁安襲職擢右都督僉事進副總兵力舉數百斤驍勇善戰靖難兵起安敗燕將房寬陳亨擒薛祿斬王真陳文數窘燕王于陳後為燕所得惜其材釋而用之方瑛全椒人都督政子政死麓川之役瑛時為金吾衛指揮使發憤報父仇乞兵效死先登破賊遂平其地進都指揮使後以征貴州及香爐山功歷進左都督封南和伯鎮貴州湖廣天順初進爵為侯瑛臨陳勇善撫士以故數有功所至鎮以安靜卒諡忠襄陳友全椒人初以騎卒從征授千户頻建功歷進右都督鎮湖廣天順初隨瑛征天堂諸蠻破䝉能餘黨封武平伯進侯卒諡武禧吳亮來安人初為衛指揮僉事屢從征討宣德中遷副總兵督漕運兼鎮守淮安正統間以平江西新淦賊功佩征南副將軍印鎮貴州尋調雲南纍擢右都督亮饒智略屢統軍征討常以不殺為意蠻夷懷附喜文學至老手不釋卷有儒將風歐磐滁州人成化中為廣東都指揮僉事𠞰蠻寇守柳州平融縣八寨猺破鬱林陸川賊𢎞治中府江永安諸獞亂磐所向摧破進都督僉事佩平蠻將軍印鎮湖廣請老卒常道字文載來安人𢎞治乙丑進士由昌邑令遷户部主事歷山東參政平萊蕪劇賊有功擢山西巡撫𠞰撫青羊冦陳卿等旋即奠定孫克振字養翀滁州人萬厯癸卯舉人歷知東鄉湯溪二縣有聲明季流冦犯滁州克振與同鄉陳國計等協力守禦危城獲全國計亦由明經仕至平樂令金九陛字允納全椒人萬厯乙卯舉人令棗陽擊賊鹿頭店敗之鄖撫盧象升奏其功擢南光祿寺署正歷户部郎中冦犯廬鳯大司馬范景文委督浦口倉儲整飭守具冦不敢逼擢蒼梧兵備副使協平叛猺調湖廣兵備復常寧城定祁陽之變𠞰八排峝猺㑹推南贛巡撫引年歸國朝晉國璧全椒人順治初以貢任袁州推官土賊起守城有功周球字季珍來安人順治乙未武進士授廣東左衛守備遷南贛遊擊屢破閩寇前後俘斬以萬計援𠞰湖南賊于永興頻戰皆捷歷叙功加左都督充太原總兵官移真定卒於官子蔚濂皆從軍有功蔚歷山東運判濂終大理寺寺副孫賡南康熙己丑武進士選侍衛和州南北朝梁昌義之烏江人少有武幹事梁武帝于雍州義師起收為輔國將軍軍主每戰必捷天監初纍遷徐州刺史鎮鍾離魏中山王元英率衆數十萬圍城城中兵才三千義之隨方抗禦殺傷萬計積尸與城平及救軍至大破魏衆義之率輕兵追至洛水而還以功進號軍師將軍歷衛將軍再授北徐州刺史義之性寬厚為將能得人死力及居藩任吏民安之卒諡曰烈唐勒思齊歷陽人有神力武后召見竒之授遊擊將軍李白有勒將軍歌明華髙含山人元季糾義旅屯巢湖以舟師歸太祖從渡江取采石金陵授秦淮翼元帥平僞漢及吳皆有功纍遷湖廣行省平章政事洪武三年封廣德侯給世劵後奉使廣東繕邊海城堡卒於瓊州無子納誥劵墓中贈巢國公諡武壯祀功臣廟仇成含山人太祖駐師河陽成詣軍門上謁即留侍宿衛扈從渡江為領軍先鋒每戰奮勇奪陳以功纍遷都督僉事鎮遼東洪武十二年封安慶侯充征南副將軍𠞰四川容美諸洞又從征雲南克普定諸郡卒贈皖國公諡莊襄賜葬鍾山王銘字子敬和州人從俞通海下采石嘗與僞吳戰流矢中臂引刀出鏃復前力鬭一軍壯之凡大小戰數十數有功洪武初授指揮使統溫州衛有威名多惠政加築外垣起海神山屬郭公山首尾二千餘丈屹然東浙巨鎮云又州人胡淵亦以材勇從太祖立功纍官都指揮使楊文含山人父興以驍勇事太祖為總管歿于鄱陽之戰文襲領父兵屢有功纍官右軍都督洪武三十年掛征南前將軍印征五開諸蠻平之立銅鼓等衛尋又充總兵官備禦開平召還卒徐義和州人少有大志好讀孫吳書從太祖渡江每臨敵陳輒躍馬揮刀作虎吼衝突衆皆披靡以前後軍功纍擢建寧右衛指揮僉事又州人沈興亦從太祖定江南受爵賞紀清含山人洪武中以從征功歷濟陽衛指揮後又從成祖靖難有功遷右軍都督僉事李濬和州人父旺事太祖立功授燕山左護衛千户濬襲職從成祖靖難纍遷都指揮同知封襄城伯出鎮江西平永新盜尋召還卒子隆嗣爵李隆字彥平年十五襲封襄城伯氣概英偉成祖異之八年扈駕北征有功十四年留守南京仁宗時出鎮山海威望逺著尋復守南京先後凡十八年正統五年入總禁兵十一年巡邊明年卒隆雖總軍政謙已下賢務循大體臨邊申飭守備內外整肅訖還不戮一人子珍嗣封死土木之難無子弟瑾嗣成化三年充總兵官平川貴諸蠻卒諡莊武國朝張翰字萬屏含山人由贛州城守千總援寧都石城皆有功自守備攝福清營遊擊康熙十九年從征臺灣大敗逆賊林升等進厦門取金門掃平逆穴特授左都督補廣東右翼鎮遊擊歷遷永固城副將廣德州武功無六安州漢英布禹封臯陶後于英六子孫以英為氏布其裔也有相布曰當刑而王坐法黥因稱黥布始從項羽封九江王後歸漢封淮南王明朱亮祖六安州人元末義兵元帥明祖克寧國擒之喜其勇悍俾仍舊官居數月復叛去遣徐達討之常遇春被創而還上自往督戰亮祖敗縛以見上曰爾將何如對曰生則盡力死則死耳上壯其言留置麾下從軍四征所向克捷從征陳友諒下江西諸郡討陳友定取浦城克崇安建陽等處張士誠寇諸新城擊降其平章潘元明討方國珍克其城狥下諸縣方氏父子降洪武元年與廖永忠征南取廣東進取廣西封永嘉侯四年助傅友德平蜀還鎮北平移鎮廣東葉旺六安州人從徐達等北征積功為指揮僉事洪武四年與馬雲同鎮遼東大破納克楚于連雲島論功進都督僉事在遼十七年修城隍立官府墾田萬餘頃嘉靖初命有司立祠遼東祀之國朝黃鼎字玉耳六安人明季李自成據南陽鼎糾合義勇擒殺僞署州縣擢總兵官駐光固大兵南下鼎歸誠鎮安慶平定池陽水賊各營流散婦女以千計悉遣令還家總督馬國柱題留參決機務𠞰張福寰鼎功居多泗州漢陳嬰本東陽令史居縣中東陽少年殺其令欲立嬰為王嬰母謂曰我為汝家婦未聞先世有貴者今暴得大名不祥不如有所屬嬰乃止後歸漢封棠邑侯唐劉行舉盱眙人天后時徐敬業起兵揚州行舉與楚州刺史李從福連和城守敬業平拜遊擊將軍宋劉綱招信縣人位之子靖康時常保聚橫山今山上有墩人呼摩旗墩相傳為綱建旗之處移鎮淮揚遷洪州總管明李文忠字思本盱眙人太祖姊子年十二母薨太祖擇師教之初以舍人領軍南北征討驍勇為諸軍冠所至有功後封曹國公文忠器量沈閎臨戰必身先士卒戰勝必以功推下及釋兵家居恂恂若儒者卒封岐陽王諡武靖耿天璧五河人再成子隨軍安慶湖廣下南昌聞處州軍亂父死疾馳至集舊部曲討賊帥李祐之等誅之襲父職仍命守處州纍立戰功歷杭州衛指揮同知世襲費聚字子英五河人同耿炳文守長興屢敗張士誠又㑹湯和討方谷珍降之又進取福州破延平從徐達定中原取關中鎮守平凉封平凉侯後征雲南有功遂鎮之召還坐黨死周長天長人善騎射為燕山中護衛從軍靖難戰白溝東昌藁城皆有功永樂九年與尚書宋禮侍郎金純治漕渠修復㑹通河置十五閘濬黃河故道以殺水勢卒贈萊陽伯張廉天長人起行伍從靖難兵南下有功又隨成祖北征塞外纍官都督僉事卒追封榆次伯江南通志卷一百五十二欽定四庫全書
