body:
  text: 江南通志卷一百五十八人物志孝義二松常鎮淮四府松江府後漢陸續字智初吳人幼孤為郡守尹興門下掾興坐楚王英事徵詣廷尉獄續就拷肌肉消爛終無異辭續母至京餽食付門卒以進續對食悲泣人問其故續曰母來不得相見故泣又問何以知母所作羮續曰母截肉未嘗不方斷蔥以寸為度是以知之帝間即赦興等事續孫康卞崇婁人桓帝時郡守薛固為法吏所誣下廷尉崇詣闕稱寃廷尉囚崇楚毒備至崇確然不撓聲枉彌厲天子聞而竒之乃赦固罪宋衛公佐字輔之華亭人事繼母盡孝族有貧不嫁女者雖疏逺必為擇壻歸之聚書數千卷禮賢訓子時縣未有學捐地為址熙寧末飢疫施粥給藥瘞殍給棺無慮數萬有司嘉其義將奏聞力辭而止元豐中復飢租稅無出纍繫盈庭又為出粟代輸繫者得盡釋弟公亮公望並敦行義衛謙字有山華亭人登進士授龍溪尹不就立義莊贍宗族及鄉之貧者建義孰以來學者買婢知其某參政孫女治奩具擇士人嫁之子德嘉字立禮元至正間盜起里人爭竄獨不動曰吾守死先祠耳人稱其孝殷澄字公源華亭人性介特好施宋末避地邑之南錢元兵入華亭其帥忿南錢久不下欲屠之澄奮詣軍門極言帥怒手劍叱之澄曰殺我一人活數千萬人死猶生也帥乃止丞相巴延聞而義之授華亭軍民都總管不受野服隱居以終元湯文英字孟寬華亭人世篤孝友至文英八世同居至元問表閭復其家夏椿字夀之華亭人少孤事兄如父至元丁亥嵗祲出粟賤糶庚寅又祲賤糶如前復設粥以待飢者大德丁未旱鄰境飢民皆攜持老幼歸夏氏椿闢廬舍具饘藥以濟之歸者給其資死者買棺以瘞事聞於朝旌其門為義士任仲孚上海人好義樂善大德間嵗飢出米二千斛闕八百斛以濟貧乏部使者上其事詔旌其門二子良佐良輔皆被擢用章夢賢字思齊上海人性孝友好施與至順初浙西大水朝廷命能賑五百石以上者爵有差夢賢出粟二千餘石而不受爵詔旌為義士之門時同邑管仲德亦以散財周急被旌杜英發字俊卿上海人官建寧學正初季父無後養莫氏子為子後復以英發為後及季父殁悉以産歸莫氏子待之不異同氣復置田儲粟以資族之困於徭役者徐初字本道華亭人父信後母讒初事之益恭父暑月病疽穢流袵席初身自浣滌不解帶者經月父乃悟曰汝吾孝子也後母有子初友愛甚篤至正丙申浙右警初糾鄉人備寇大帥欲薦官之不受徐誠字信之上海人父疾醫禱勿應乃刲股和藥以進尋愈好施豫嵗祲為粥以食飢者活萬餘人沈雍華亭人與弟穆以孝友稱於鄉至正丁未夏淞島兵變父騰避兵於外二子守家廟不去悍卒排闥入引刃刺雍背穆以身捍蔽乞代兄死雍亦祈釋弟殺已卒感其義遂兩釋之趙恭字思恭上海人母久病恭嚙臂肉作羮啖之尋愈父患蠱其弟敬刲股肉為羮以進亦愈人稱二孝姚玭字比玉青浦人至正末苖兵之亂玭奉母出避阻河不得渡母曰兵至吾誓不受辱遂自沈玭倉皇投水負母而出一日母病思魚羹暮夜莫能得有所蓄烏圎甚馴忽出致白魚盈尺以歸供母人以為孝感戴光逺字君實上海人父暘谷規創義孰以訓里人未竟而卒光逺經畫成之作堂室四十五間貯經史延師儒招學者割上田五十畝贍之葉以清字子澄華亭人尚氣節德清尉劉昶告以三喪未舉即貸五十緡監黟縣巴延調兵昱嶺呼以清姓字而囑妻子曰我死母老當往依之及顔死以清夢顔來曰以八口纍君越二日其妻子果奉母至時避地諸名流皆依之以居明何潤字子潤華亭人吳元年海氓錢鶴臯作亂據府治殺知府荀玊真囚知縣馮榮等潤收瘞玊真復詣錢力請曰馮良吏無苛政願以十口保之榮等得免並擁護避難良民甚衆及亂定又出私財募購府司所失八印納於官官將表其事固辭時稱何義士顧敏字文敏上海人洪武初父仲睦坐纍死子孫應戍邉敏年十三刺血上書白父寃太祖憫之得末減放歸詔旌其門沈德四華亭人刲股肉愈祖母疾及祖父病復刲肝作湯進之隨飲而瘳事聞洪武中詔旌其孝張榮一華亭人洪武時刲肝愈母病奉詔旌其門里人繪其像城隍廟其後以刲股愈親疾者華亭有張桓陳泰居宗晟青浦有張可成上海有張同文王節蔣時英陸文旺字德林上海人篤于孝友士望歸之有就之質成者誨以大義咸感悟去元季避兵苕溪人指其故閭曰此陸先生居也相戒勿毁洪武初舉賢良歷官郡守錢惟慶字汝明華亭人七嵗喪父哀毁如成人事母篤孝兄存善以輸銅後期違部限勾攝甚急惟慶詣使者曰老母所藉終養惟兄不如期者我也存善曰弟為母愛子不能離膝下我為家長不如期罪當坐兄弟爭赴逮使者驗户籍竟以其兄行會赦免子溥博楊周字起東華亭人以髙義聞雖布衣里中敬服得其一言為重有賈寄貯金三千十年賈至倍其子母錢還之客堅却子錢周不得已散之貧民療疾賑飢全活萬數薑大順華亭人父廉洪武初以人材受武靖判官大順性孝母卒廬墓三載有司以孝義薦力辭不仕周禋字維敬華亭人為府掾太守劉璟器之璟以剛直忤巡撫黃憲欲坐以墨拘諸掾拷掠皆誣服禋獨鳴其寃楚苦備至無撓辭及覆鞫復大呼枉事始得解後選授縣佐乞歸邑中顧清曹時中諸名流皆重其人與之酬唱孫思兼馮海字存朴華亭人事親孝雖近出入必長揖以告母年八十有鄰媪年與母同嘗與之敘姊妹行海日具甘旨必邀鄰媪同食以娛親意母疾篤日嘗其糞夕叩北斗求代半載始痊海竟以勞瘁遘疾垂沒呼母三日不絶口里中稱為苦孝曹閔字崇孝上海人𢎞治丙辰進士令沙縣擢南御史疏論劉璟被扙後當起官以母老不出母終枕塊得寒疾卒馮行可字道卿海曾孫御史恩長子恩應詔直言下獄論斬行可年十三伏闕訟寃日匍匐長安街號呼乞救於朝士終無敢言者乃刺臂血書疏願代之死世宗覽疏色動曰忠孝乃萃一門耶因減恩罪戍雷陽後領庚子鄉薦歷官應天通判有政聲弟時可隆慶進士歷官按察使以文名包節字元達華亭人嘉靖壬辰進士由推官擢御史出按湖廣劾守陵巨璫不法反為所搆逮詔獄搒掠永戍莊浪衛節在極邉處之甚安獨傷母不克終養日飲泣聞母訃晝夜哭竟不起遺言以衰絰殮聞者悲之弟孝字元愛嘉靖乙未進士官南京御史與兄節並著風采尋請終養歸母沒哀毁卒時稱其兄弟皆死孝王子竒金山衛人母疾吐痰子竒輒以口吞之母尋愈總戎閩中海錯皆不敢嘗曰吾親未食也嘗置一妾詢知其為金千户女立遣還不責其直又同郡解元莊允中字執卿買妾至門聞女父為司倉逋課被繫鬻女以償即惻然歸之韓宏謨青浦庠生嘉靖甲寅倭冦犯境獲宏謨母將刃之宏謨號泣請代皆被害宏謨子奔救并遇害人皆哀之時上海陳時熙華亭髙承順皆奉父避倭亂猝遇寇鋒時熙請代戮承順以身捍刃寇義之俱得釋徐億字子裁華亭人倭躙境上億駕舟奉親避匿寇兵突至奮梃擊之親得脫而億墮水有浮草隱蔽乃免於厄母疾籲天請代乂吮父疽及二親繼殁哀毁骨立既葬結廬墓側喪畢不食鹽酪不括髮者十年垂老入城市人皆聚觀更有強邀至家令子孫識之曰此徐孝子御史溫如璋疏請建坊表之徐夀字永齡青浦人嘉靖二十三年嵗大飢穀翔貴夀減直糶五百石以濟貧餒事聞於朝特賜冠帶子沛嘉靖末又值嵗祲沛糶米亦隨時直而升斗則廣踰其半曰吾不居賤糶名而使人實受其惠可矣鄉里尤感頌之子三重曹誠字守愚上海人嘉靖甲寅避倭亂五里橋有人以巾懸樹就水浴浴畢即去誠趨視樹上巾內貯白金因露坐水際待其人至而還之又嘗於道旁厠上見遺金及夜出有墜金户外者皆久候亡金者返覔還之如前鄉里皆多其義子國裕官太醫院吏目亦有善行張隱字時顯華亭諸生九嵗喪父事母孝居大母及母喪三年不飲酒入室少贅婦家舅卒無子遺産頗豐隱為之置嗣悉以所遺歸之鄉里美其讓兼工醫有名楊應祈字懋延給事允繩子允繩以非罪逮繫獄論辟應祈日納槖饘刺血書疏求代父死母泣止之不忍見父就刑先入獄與訣絶粒而死萬厯中旌表吳炯字晉明華亭人萬厯庚辰進士授杭州推官擢南京兵部主事進光祿丞時徐兆魁騰疏攻顧憲成炯力辨其訛歷遷南太僕少卿居鄉時置義田贍族輸萬金助邊被詔旌奬從父丕顯由乙榜除承天府通判亦以好施著朱一德字士隆上海人領萬厯戊子鄉薦生平多善行拒奔婦還遺金哀里人謝某無辜陷重辟為辨於官而出之不受一錢又同郡奚欽字聖功亦以還遺金却奔女得長者名顧正心字仲修華亭人太學生萬厯十六年嵗飢出粟二萬以賑詔旌其門因悉郡民徭役之苦買田四萬畝以助諸役擘畫周詳公私賴之又置濟荒贍族義學諸田人尤多其義子懿德亦善士錢良輔字德卿華亭人舉萬厯壬午鄉薦祖母九十餘卧蓐不能起良輔口哺之祖母沒哀毁備至後居母喪以毁卒又上海進士沈泓字鄰秋母亡每遇嵗除必至殯所寢處元正三日後乃歸每一念母中宵哽咽人為感動瞿光位字明巖華亭人父以運糧事坐誣繫金陵獄光位年十六奔赴繫所遍訟寃於當事者十年獄猶未解後衝冒風雪巡按御史舟後號呼徹晝夜至力竭嘔血再仆雪中御史憫之鞫得其實父寃始白奉父歸侍養盡孝歷三十餘年及居喪哀毁感動鄰里孫然恭字欽我善草隸闕孫天潢字爰楫工辭翰天淏字蒸紫邃經學髙承順華亭人萬厯時旌孝張秉介上海人天啓時旌孝沈文亮字星白華亭人父鎬病瘵將不起文亮髮才覆額哀號禱天願以身代刺臂血投糜中以進病遂瘥陸志孝華亭人哭親喪明遇異人療之一目復開廬墓三年崇禎時旌唐姚端上海人事父孝嵗飢煮粥以食餓者設義船於永濟渡往來便之子華博雅敦倫亦以孝義著國朝陸從龍字五雲華亭人為諸生有聲性孝家貧授徒以給甘旨侍父疾衣不解帶者三載父殁事祖母盡孝道撫幼弟極友愛又育弟遺孤俾成立從妹少寡迎養終身張淇字爾瞻上海人父尚文有行義好施淇尤以孝友稱效范文正義莊規畫置義田千畝以贍族人子彚孫照承先志奏明朝廷以田載入邑乘上嘉奬追授淇吏部左侍郎雍正十年事也蔡之筆字聖持上海人性謹實勇於為善里黨重之臨沒猶遺金助興義孰以教鄉之子弟張之普字𢎞祖婁縣人居母喪哀毁骨立廬墓三年康熙辛酉父貢生宫在中州幕抱病之普星馳省視及至父已殁拊棺哀慟絶而復蘇扶櫬返氣息日微哭不成聲甫抵家設祭即瞑目苫次間者哀之黃令荀字竹咸華亭貢生少孤家貧嘗雪夜負米奉母以學行著鄉里弟諸生士英早殁婦潘氏守志令荀自減口食給之以完其節馮敦忠字方山婁縣人明御史恩七世孫為諸生敦孝友好義念蘇松浮糧之困著浮糧考憂海患著海塘條議石土利害説俱上之當事凡遇有關名教事必倡為之孫琮字爾繩青浦人侍奉祖及母竭力盡孝葬後廬墓三年慈烏環集人謂孝感所致雍正四年旌表汪思遵字建士婁縣人嵗貢生天性孝友父殁六載哀痛如初喪康熙乙未六月冒暑入山經營窀穸勞瘁暴亡子顯曾抱尸痛哭三日不絶聲殮父畢一慟而絶時稱雙孝雍正九年旌表常州府後漢彭修字子陽毗陵人年十五與父俱歸父為盜所劫拔刀前曰父辱子死卿等不畏死耶羣賊曰此義童不宜逼遂解去仕郡為功曹時西部都尉宰鼂行太守事以微過收吳縣獄吏將殺之主簿鍾離意固諫鼂怒并使收意掾吏莫敢發語修排閣直入爭之皆得原貰後州辟從事賊張子林等作亂與太守俱出討賊賊望見車馬競馳射之修障扞太守中流矢死賊素聞修恩信即殺中修者餘悉降散謂太守曰我等自為彭君降不為太守服也許武字季長陽羡人郡舉孝亷武欲二弟晏普成名析資自取膏腴鄉人鄙武貪而稱弟克遜晏普並得選舉武謂宗姻曰向以二弟未預榮祿故分財取譏今殖産數倍悉推二弟郡中稱譽翕然仕至長樂少府許荆字少張武之孫為郡功曹兄子報讐殺人怨者操兵攻之荆出跪曰兄一子為嗣願殺身代之怨者曰許掾郡中稱賢吾何敢犯遂委去舉孝亷和帝時遷桂陽太守有兄弟爭財上書自劾後皆感悔召拜諫議大夫髙岱字孔文無錫人太守盛憲舉為孝廉許貢領郡將殺憲岱求救于陶謙憔悴泣血水漿不入口謙感其忠勇許為出軍岱還而貢已囚憲母岱往見貢好自陳謝貢即出之孫䇿聞其善左傳虛己候焉為嫉者所中遇害晉顧悅之字君叔晉陵人初為殷浩揚州别駕浩為桓溫所廢卒悅之上疏理浩或止之悅之固爭浩果得伸物論稱之終尚書左丞南北朝宋蔣恭義興人元嘉中晉陵蔣崇平為劫見擒云與恭妻弟吳晞張同行時録晞張弗獲收恭及兄協付獄兄弟爭受刑郡上其事于州悉原之後恭除義成令協義招令徐耕晉陵人自令史除平原令元嘉中大旱耕詣縣自陳請以米千斛助官賑貸時以耕比漢卜式詔書褒美余齊民晉陵人少有孝行傭書以養一日忽語人曰近肉痛心煩如割必有異尋得父病信四百餘里一日而至則父已死齊民號踊慟絶良久蘇問父遺言母曰恨不見汝齊民曰相見何難號呌殯所須臾便絶郡以事聞詔更所居里曰孝義賜其母粟百斛許昭先義興人事親盡孝叔肇之繫獄七年料理餉饋了無倦色資産既盡賣宅繼之尚書沈演之嘉其操行肇之遂得釋齊吳欣之晉陵利城人弟慰之為武進縣戍元嘉末隨王誕起義會華欽軍至衆駭散慰之獨留被執將死欣之詣欽請代兄弟皆見原齊建元中有詔蠲表華寶無錫人父豪義熙末戍長安寶年八嵗臨行謂曰我還為汝上頭後長安陷寶年至八十不婚冠或問之不忍答輒號慟彌日齊建元三年詔表門閭薛天生晉陵人其母遭艱嘗菜食天生亦菜食母未免喪而逝天生終身不食魚肉建元中詔表門閭蕭睿明字景濟南蘭陵人母病風積年晝夜祈禱祁寒不輟下淚成冰叩頭出血血亦冰忽有人以小石函授之曰此療夫人疾跪而啓函有絹三寸丹書日月字母服即愈劉懷允晉陵人與弟懷則十餘嵗喪父衣不絮食不鹽豉建元三年詔表門閭吳達之義興人嫂亡傭直給喪具從弟欽伯夫婦嵗飢被掠達之有田數畝售以贖郡命為主簿固以遜兄又讓先世舊田與族弟弟不受棄為間田建元三年詔表門閭陳元子義興人四世一百七十口同居建元三年詔表門閭仍蠲租賦蕭修字世和南蘭陵人咨弟封宜豐侯性至孝年十一丁所生母艱自荆州反葬中江遇風修抱柩長號血淚俱下隨波搖蕩終得無他葬訖廬墓猛獸絶迹野鳥馴狎武帝嘉之班告宗室唐劉子翼字小心晉陵人初仕隋為著作郎峭直有行面折僚友退無餘訾貞觀初被召以母老辭江南巡察使李襲譽表所居曰孝慈里子禕之王遇晉陵人肅宗時與弟遐同行道中為賊所執將釋其一兄弟爭死賊感其義俱縱之蔣渙晉陵人與兄洌並擢進士第父卒兄弟廬墓側植松柏千餘渙以鴻臚卿使日本却金帛之餽惟取箋一幅為書以貽其副歷官禮部尚書洌終尚書右丞宋丁寶臣字元珍晉陵人與兄宗臣並以文行稱號二丁舉進士歷司封員外郎卒少孤篤于友愛兄亡服喪三年陳思道江隂人喪父事母兄以孝弟聞鬻醯以給晨夕母喪水漿不入口七日既葬廬墓妻子詣之拒不與見有白免馴虎之異咸平初賜束帛旌其門邵靈甫宜興人倜儻好施豫嘗嵗飢盡發儲粟五千斛浚河除道邑人爭受役因賴以活子梁孫綱皆登第人以為積善之報陳敏字伯修無錫人年十一廬親墓有芝産于塜熙寧三年進士大觀中守天台蔡京諸人用事斥司馬光諸賢為姦黨令郡國立黨人碑敏曰誣司馬公是誣天也倅立石敏碎之謝事歸葛書思字進叔江隂人第進士調建德主簿父密年老迎養不就遂投劾歸養十年廷臣薦弗起密許以偕行始乞監新市鎮居喪盛暑不釋麻苴終禫不去塜舍纍年乃出仕主簿連水時兄書元為望江令同隸淮南監司有捨兄而薦思者乞改薦兄不許則封檄還之官朝奉郎卒諡清孝孫逵晉陵人母周氏刲股起父疾母卒逵哀毁盡禮崇寧間郡守為請旌表淳祐中裔孫鎬年七十餘病疽其子裂肝以療尋愈郡守刻石表之名所居里曰申孝以昭其世德施坰字林宗武進人登崇寧進士第仕至敷文閣待制生平篤意孝養所至得親書必冠帶跪讀遇恩奏補先及弟姪鄉人稱之元王彬字文父武進人早孤事母孝母沒哭泣幾喪明天歷中嵗旱鄉鄰絶食彬遍假之粟卒後送葬者千人皆哭之慟李辰字吉父江隂人家貧力學近臣交薦之試迪功郎史館編校改參制置司幕府以母老乞歸母喪蔬食廬墓側六年虞薦發字君瑞郡人性孝友家貧好施未冠舉于鄉嵗飢出粟賑貸聚徒講學當路欲薦之謝不就張孝子小字阿蟠自無錫徙家晉陵少孤家貧傭力染肆以養母時得一美味必歸遺母色養備至積二十年母終痛哭幾絶鄉人以張孝子稱之章齊字敬叔江隂人元季父文避寇雷溝死于亂兵齊求父尸不得哀慟絶粒者七日書蓼莪首章擲筆而逝以避亂松江窆于盧涇子庠洪武間為袁州守始奉祖衣冠及父柩歸葬華幼武字彥清父鉉早夭母陳詔旌貞節幼武幼與羣兒戲于庭聞母語生平事輟戲而慟母益具言所聞母子相持慟哭哀動閭里事其祖父及叔父極恭順羣從未嘗析産異居母老喪明日召諸姑姊與歡宴又構貞節堂春草軒以居母黃溍宋濂記傳之明張翼字飛卿無錫人徐達破姑蘇俘士誠其偽將莫天祐猶固守無錫達使諭之降復為所殺達怒檄曰不下屠其城翼與儒士徐績徐吉往説天祐宜為生民計天祐沈思良久從之翼先縋城下見領兵胡廷瑞約三日出降歸報天祐如期自縛詣軍門廷瑞入城不戮一人洪武三年翼績吉並舉明經行修翼以老辭吉逃去唯績應命歷遷順德知府歸老顧士傑字文英武進人洪武初父坐督賦詿誤論死適父病兄當就逮士傑年十七曰父老矣兄家督何可死竟自詣詔獄死父兄為建祠祀之王忠武進人洪武中父諒以輸稅後期法當死忠時年十七自詣京請代父死上並赦之宣德初以薦除兵部主事方將大用以母老致仕歸楊浦字宗廣武進人自浦而下五世同居食指千百計時稱為義門孫慶字思敬武進人母暑月病瘍吮數日得愈又得寒疾刲股以進病亦良已母喪廬墓側産靈芝備五色雲氣人以為孝感沈明字惟逺常州人母病勤侍湯藥得疾幾殆兄殁以遺産屬明明以己産與婦家産合為一嫂曰內産叔所當私固請却之明終與均分徐佛保江隂衛人永樂間旌孝行趙鉉江隂人洪熙間旌胡長寧武進人正統間旌陳安常江隂人輸財助官景泰間旌陳玊宜興人景泰五年嵗大飢玊出榖二千石賑之全活甚衆事聞詔旌馬官武進人九嵗喪母事父及繼母極孝父患頭風醫弗能療禱于神願刲股救親夜夢神曰樓前榴樹汝以鐵線懸繫則割可弗害如言果無恙為羹進即愈又同郡錢獻卿李魁屠上宿左守身前後俱以割股愈父母疾上宿守身俱被旌李庭芝字瑞卿宜興人亷直簡慤嘗同業師許恆應南試恆暴仆闈中庭芝即投卷負其尸出景泰中鄉舉任平樂知府致仕家徒壁立有故人李應貞過訪時方踞爐煨芋相對話舊俟芋熟啖之而去李貞字維暗郡人幼孤其母資織絍育之及長母久病家益貧母卒鬻妻以殮里人許還淳義之為贖其妻又為醵金助葬貞感其德終身父事之董琮字禮坤武進人祖母徐年八十餘為盜所獲琮挺身謂盜曰祖母老幸釋之我有私藏當以相奉盜釋祖母令掘所藏琮曰我欲脫祖母耳安得有藏盜以孝孫釋之父病刲股以進終不能愈哀毁成病卒李步行無錫賣菜傭早喪母事父孝父嗜酒每朝鬻菜于市得錢沽酒歸飲其父體無全衣而父便身之物無不給里中父老訓子必曰何不學李步行又靖江劉權力傭供母母卒廬墓終身褚鳳無錫人宣德中諸生事父最孝父老病在褥侍奉不離鳳因出郭上冢適鄰火延及父焚死痛不欲生不忍火食惟飲水食草根木皮傭書得工價營葬事畢囑弟早娶延祀身負薪往墓所自焚死秦永孚仲孚無錫人侍養二親歷四十餘年曲盡孝敬父患心痛醫謂胸血可療二人競砍胸出血和酒以進父疾遂痊母傷膝創潰競以舌舐而愈成化間詔旌雙孝秦鏜永孚子母張病痿又瘖不能言鏜以意揣其欲而調護之坐卧躬自抱持積十九年不懈以母病不赴會試與仲孚子鉉亦稱雙孝蔡元鋭無錫人弟元鐸嘉靖中倭寇至突入其舍兄弟負父升屋賊執元鋭殺之元鐸以父免尚未知兄死持重資至賊營贖兄併遇害事聞詔旌其門曰孝友全純字原赤無錫人家貧事母孝母卒飲泣嵗餘而瞽鄉里舉其孝巡撫周忱餉以米布純固辭曰某能稍盡子情則目不盲矣忱瞿然躬為祈禱曰若全孝子果孝宜還其目三月目復明忱為捐俸買田以贍之華雲字從龍無錫人嘉靖辛丑進士授户部主事榷稅九江以亷潔稱擢刑部郎乞休歸倣范仲淹義莊買田千畝以贍族人吳馭字惟允宜興人嘉靖中官詹事府主簿邑大飢輸粟出錢賑飢瘞死乂建義祠割腴田二百畝為義莊時郡諸生湯應麟亦以孝友好義聞黃巒字世鳴江隂人由邑諸生入太學嘉靖戊申倭警巒捐六千金甓城東南三百餘丈丙辰又捐二千金增子城三座倭環攻三十三日不破民賴以全又圍困時輸粟七千石給土兵三千石安客兵給貧民七十金助輸尚書趙文華軍餉殁而邑人専祠報其德秦柱字汝立金孫以薦授中書舍人髙拱當國柱有通家之舊未嘗輕詣其門及拱得罪去門生皆走匿柱獨追送百里外吳中行以論張居正奪情廷杖柱挾醫視湯藥得不死居正銜之斥歸折足老人之子嘉靖初無鍚人父折足其子負之以行乞于道得少物輒進父父棄其餘子始食歷十餘年父卒子慟曰父在冥途孰負之行遂死父旁任卿字世臣宜興人嘉靖間由例貢仕至大理寺寺副嘗割田千畝為義田贍族之貧者千畝為學田贍士之貧者八百畝為役田佐里人之輪充里役者其宗人友恭為太醫院吏目事孀嬸如母每日必衣冠寢門外問安婢辭乃退後有億年者事母盡孝年六十不衰撫異母弟不啻同懷鄉黨稱曰孝友世家鄭振先字明初武進人萬厯庚戌進士令頴昌舉卓異第一丁內艱歸以哀毁卒遺命以衰絰殮時稱死孝沈應時字伯起無錫人母早亡父從龍不再娶而雙瞽應時日為舐膜俟父安寢然後篝燈讀書舉萬厯癸丑進士崇禎初歷官通政參議又郡諸生褚城父喪明每五更以舌餂之父目復明以孝友聞賜冠帶旌表浦邵無錫人父虞被賊縳將殺之邵以首迎刃父得免萬厯間旌徐時進字元修江隂人以諸生久次將貢而母馮以疾卒自傷欲沾微祿養親而不得也號呼不輟聲越七日而絶逺近哀之陳一經字懷古宜興人性純孝生不識父詢母得貌繪而事之諦視輒嗚咽欷歔為人方正有器識殁後里人私諡孝潔先生子于廷秦爾載字彥熙無錫人師事髙攀龍葉茂才事母盡孝居鄉設粥製衣以濟凍餒置槥以殮死者嵗以為常三子鏞釴鍈皆知名史元鎮宜興人年十六家失火元鎮入火救母萬氏鄰人止之號慟不顧母子俱死火熄尸猶負母兩手相握不忍釋事聞詔旌萬厯四十一年立像附祀周孝侯廟陳可達靖江人與父佾渡江舟覆可達善水先登遂操櫓溯流求父得之中流父已凍痿不支可達因竭力援父竟同溺死三日後抱其父尸出面色如生黃卷字文萃靖江人以貢歷雲夢令罷歸天啓六年邑大飢死亡相繼家貧以所置桫木周身具質銀首倡助賑邑令及監司繼之全活無算又同邑朱維炯有族人逋糧千石繫獄擬罪為出息稱貸還官復以金贖其罪時人義之堵印錫字仲緘宜興人六嵗喪母十一嵗喪父哀毁如成人舉崇禎丁丑進士自陳幼失二親未嘗一日奉養懇乞假歸廬墓三百日然後就職詔許之墓有枯桐再華蛛絲結成孝字漳浦黃道周作禮問唁之謂可埒曾閔楊廷鑑字冰如武進人崇禎癸未廷試第一授翰林院修撰工詩文書法師張瑋瑋卒于京廷鑑經紀其喪謝絶賻贈曰不敢傷吾師身後廉倡修郡邑學宫賑飢施乏宗黨多被其澤孫源文字南宫侍郎繼臯子經書子史無不淹貫性慷慨喜論天下事甲申聞崇禎崩行坐悲泣未幾咯血聲瘖淚盡而絶同邑諸生嚴紹賢一鵬兄子亦自經寢室一婢從死國朝路邁字子就宜興人崇禎甲戍進士令暨陽卓異擢禮部郎改吏部念二親春秋髙告歸終養入國朝纍徵不出與弟遴友愛遴卒官北平訃聞哀慟數日不食惠疇字庶康江隂人順治乙未進士不仕宦而能為德桑梓濬濲港河建文星樓請當事永免楊舍徭役疇力為多吳珂鳴字蕊淵武進人順治丁酉舉人是年科埸弊發覆試所舉士於廷珂鳴三試皆第一特命一體殿試授翰林異數也未幾以逋糧案降調旋復原官督學京畿有公明稱性好施與周恤宗黨親疏有差葬其先壟之淹柩百餘王襄武進人父道洽從族叔于粵東戎幕久無耗襄覓父經百艱比至則父與叔俱前卒遇父友指葬處扶柩歸母猶疑似命異日勿合葬未幾棺蓋裂窺見道洽鬚眉如生襄授徒養母在館忽心動疾馳六十里省母適鄰延燒襄舍母悸不能起襄負母出烈焰順治庚子舉于鄉何肇嘉武進農家子父有昌應役逺方肇嘉號泣尋父感神告遇父迎歸家貧自食糟粳奉親甘旨父疾侍側三年不入妻室父殁廬墓三年雍正七年旌表吳箕字弓武宜興人父永齡樂邑令致仕家居母死箕侍父居書室寢食不離者十年兄雲垂客死箕事寡嫂以禮雖盛暑不衣冠不敢見嫂卒遺兩子四女皆為婚嫁以父所遺産悉歸其姪黃暉烈字敉公武進人康熙壬戌進士居家事親孝事兄嫂敬傾婦奩嫁妹撫甥女為擇良配鄉黨稱行義者必以暉烈為首令竹溪牧鬱林皆振興庠序以孝弟廉讓教其民調養利道卒同邑鄒謫仙字子竒亦以孝友稱謝旭字羲占宜興人康熙乙丑嵗貢以母吳年邁晨夕侍側不離嘗遘疾衣不解帶隆冬聞有客舟冰膠西溪不得距岸者募人多方救之不食三日矣全活五人嵗儉捐賑率先為衆倡朱旗字大占無錫人康熙間順天舉人少孤事母詬嫗至壯不改與逰皆名士宴詠無問惟堂上傳片語踉蹌急赴家于鄉偶入城市必令僮輩數數伺候母顔色母殁號踊氣絶良久蘇血坌涌遂病三月卒杜芳字韡仙無錫人事父與繼母盡孝周恤鄉黨惟恐不及嵗除袖碎金十百函伺窘乏者贈之不告以氏名康熙庚寅巡撫張伯行檄縣賑飢芳竭囷粟襄事因以耆年樂善四字表其閭年八十九卒同邑潘志道字嗣安嘗割肱肉療親疾行義與芳相埒時稱兩善人卒年八十華汝修字履祺無錫諸生父國球郡諸生敦行孝弟教授鄉里汝修事父能養志建祖祠率宗人遵朱子家禮恤貧乏贍孤寡先親後疏收育棄孩槥死瘞骸見有逋糧械繫者代納其逋而釋之道拾遺金粘書召失者返之蟲魚微物臨刀俎必脫之而後安臨歾訓子惟曰為善最樂夏敦仁字調元江隂人父霈字若時有孝行遇親忌辰必素服齋居泣涕竟日敦仁為名諸生間月朔必詣聖廟肅拜元旦萬夀冠帶叩祝語子弟曰尊君親師無貴賤一也邑城南斜涇河引江水溉田可千頃敦仁一再濬之嵗飢司粥厰斂散有方又糾同志集資作同善會義學義冢殮死瘞骸夜燈草屨棉衣薑湯藥餌之施于貧乏者皆取給焉弟敦禮雍正元年賑飢輸粟百石四年邑令祁文瀚修學首捐二百餘金鄉黨咸多之薛有年武進人父目疾成翳有年中夜吮舐焚香籲天父目忽明陸士奎無錫人八嵗喪母倣丁蘭刻木像母朝夕上食長授徒養父父嘗病劇醫百不效士奎哀號籲天願以身代得異兆遂瘥同邑劉耿字覲文父早卒事母孝母殁廬墓三年幼未嘗讀書由靜坐得力於書無不通曉能大書里中有欲舉其孝行者輒號哭以母節未舉故也史君奭字則召宜興人七嵗喪父哀毁如成人事母孝析産以良者與弟為人嚴取與必信果自幼擅文譽久困諸生及次當充貢謝不就廬親墓旁終其身任沂字曾儒宜興人父令樂善好施沂承其志嵗飢米貴沂買米楚中半價糶之旱嵗溪流竭築隄注水以溉一方之田又嘗出粟捕蝗使不為災善排難解紛比殁族黨咸哭之許翎肇篪猶子宜興學諸生少工文篤孝友肇篪遺孤翿家貧不能讀書翎令與子泉同學自督課之所課未竟則撻泉以愧翿翿跪號不敢仰視長遂力學有名潘稷字稼先金匱人父果任永順同知會溪蠻鼓譟坐不善拊循下獄稷年十七馳侍父父遣歸省母娶婦且就試稷泣曰兒非不念母尚有兄在父在禁而子歸娶於心安乎至一名遲速何足計仍留侍焉久之咯血慮傷父心不言遂不起檢篋得自銘二章志在立身揚名小盒封固者父所落齒也父平日手諭片紙不遺趙珩華亭人雍正十三年以孝旌表鎮江府南北朝梁韋鼎字起盛其先杜陵人世居京口侯景之亂鼎兄昻力戰死鼎負尸奔走求棺無所得哀號不輟忽江中流新棺至因取以殮元帝聞之以為精誠所感大加褒奬唐周國寶以字行金壇人永徽間四境盜起國寶糾合鄉人拒之手刃數十人力竭自刎事聞封爵立廟祀之宋蔡淵字子雍丹陽人登進士乙科纍官至大宗正丞初淵家饒於財兄弟以豪奢相尚淵獨擔簦以遊寒苦如窶人或勸稍分兄弟之財以自給曰兄弟治産吾治書兄弟不以家事纍吾吾可以身計纍兄弟乎聞者愧之虞申字行父丹徒人從姚開受春秋遊京師謁安定胡瑗瑗竒之生平孝友勇於赴義同産負大司農錢既析資矣悉為償之仲弟死嫁五女撫其孤如己出章瑢丹徒人事親盡孝母亡思慕切至墓上枯竹復生子孫相繼以經學顯張恪字季忱金壇人幼孤居母喪三年不入私室兄以疾不能供役恪往號泣請代兄子有緣役破家者有坐事沒産者俱授以室廬擇良田數頃為義莊宗族諸事取給焉嵗飢設糜粥收棄嬰贖鄉人女流落他郡者買妾得士族女即治裝嫁之工人竊金事覺願償以女弗取而並釋所竊政和間鄉里疏其義行上之官以聞於朝陳亢字退叔金壇人家饒而勇於為義嘗開古速渡河民便利之嵗飢疫傾家儲以給藥食置義塜死者給衣槥收葬之後以子孫官顯纍贈朝散郎湯宋彥字時美邦彥弟以祖鵬舉澤纍授官至湖北安撫司參議念兄以使金坐貶卒既已析居輒推良田益之得任子恩即以官其孫幼女未行輟其子裝授之次得任子恩以與長弟之子又次與季弟之子湯喬年丹徒人為人慷慨自負博學工文秦檜欲館致之使學官諭意辭曰是主和議者吾方為天下讐之又安能出其門乎後以特恩授韶州推官不赴李華溧陽人父殁毁瘠盡禮母疾衣不解帶有田十餘頃榖貴平價糶之以濟一方大觀政和間蝗數害稼獨不食華苗子朝正纍官知平江府潘祺溧陽人性孝好學尚氣節遊太學與陳東為友東欲陳時政祺曰奈親老不能與子俱耳子不可不勉陳意遂決後登第調宣州司户錢戩溧陽人居父憂有少年數人來曰而父逋我數萬錢戩與之不吝夜有賊入戩知之呼與金使速去終不語人後其子至顯官諸葛填丹陽人執親喪哀毁絶酒肉手治墓劬瘁骨立嵗飢民共伐墓木填不能拒泣痛而卒人稱諸葛孝子湯克昭字晦叔初以淮閫辟授修武郎纍官至武翼大夫知肇慶府鄉人負錢萬緡貧不能償以産歸之克昭曰昔以義假豈望報耶乃焚其劵又買千畝為義田凡同祖所出給豫有差竇寶周伸俱丹徒人以刲股療親受旌束崇芳字德馨丹陽人德祐乙亥北兵來父被俘崇芳詣軍門號呼請代大帥義之縱其父去留崇芳軍中掌文檄久之憫其孝言於巴延豫以二矢縱歸元孫瑾字無咎丹徒人父殁當嚴冬徒跣食粥盡哀事繼母唐甚謹吮癰癰愈舐目目明唐卧病十二年不以久病而怠逮葬時有久雨忽晴掩壙復雨之異縣上狀被旌徐鈺丹徒人泰定元年侍父鎮往婺源經小溪口流水暴漲鎮墮水鈺急投溪擁父出父得挽筏以升而鈺力憊湍急不能自奮遂溺死尸浮四十五里始得有司以間旌其閭張夀字仁輔丹陽人五世同居孝友彌篤至元三年旌門王元伯金壇人四世不異爨家人百餘口無間言日使諸女婦聚一室為女工畢斂貯一庫室無私藏幼稚啼泣諸母見者即抱哺不問孰為己兒兒亦不知孰為己母也兄宣伯卒即以家事付兄子軌軌辭元伯曰若宗子也宜主之相讓既久卒以付軌至元間旌表其門明王荂字子輝金壇人洪武間兄榮以杭州府同知坐事當剜膝荂擊登聞鼓請以身代義而許之旨下兄已刑矣正統初出粟三千石助官賑飢敕表義門復其家子政孫鎮咸好義急公捐資助賑給七品冠帶髙禮保丹徒人性篤孝割脅脂以愈曾祖母徐疾詔旌其門史以仁溧陽人唐川丹徒人俱洪武時以孝旌陸旺溧陽人正統時以輸財助賑旌楊椿年丹徒人割股荷旌貢原懋字世德丹陽人正統間嵗飢出榖二千石賑貧者有司以聞賜敕奬諭又建學舍延明師以處四方之士賀愷字伯元丹陽人值嵗飢詔民出粟及格者豫旌愷獨輸粟辭旌天順中嵗又飢愷輸粟益多辭旌益堅有司髙其義虛賓席以待終不赴時蝗災獨不犯愷田人以為厚施之報孫玭亦以輸粟及格授承事郎一人輸負畢有戚容詢知其鬻女也傷之還所輸令贖女而代之賦錢賓國字寅劬溧陽人伯兄以逋賦繫將質己産代償之令聞而問曰汝寒士曾與而兄析箸否曰析久矣然逋賦者賓國之兄負逋賦名者賓國之父也賓國敢令父負此名哉令義之令償其半而捐俸輸足後由貢司訓宣城繆希亮字思忠溧陽人事母至孝嘉靖己丑既登第不廷對而歸遂終養焉母殁不復出史際字恭甫溧陽人少從王守仁湛若水遊嘉靖壬辰舉進士以文選主事改春坊清紀郎旋乞歸置義莊義孰修明倫堂濬躍龍關捐田二百畝資貧士誦讀嘉靖甲午乙未洊飢發廪以濟更捐粟墾治沙漲田成名曰救荒淹募死士擊倭太湖撫按上其功晉秩蔭子殷士望字德逺丹徒人嘉靖末倭猝犯京口士望父被執士望請以身代倭兩釋之其女弟亦以孝聞詔旌其廬曰麟鳳馬一龍字應圗溧陽人父性魯自給諫出知尋甸府以苗變誣繫獄一龍時為諸生走長安上執政書情辭哀迫執政憫之父獄得解嘉靖丁未成進士由詞林仕至南國子監司業陳守愚字子直丹徒人性至孝好施家被盜其戚梅某孔某先以帑寄守愚至是倉皇來省守愚悉償之賑飢給槥焚劵贖人子女義事靡不為有司薦之朝將授官以親老不就史濟字啓賢金壇人貧民有鬻妻者助之金得不鬻嘗糴菽淮上他賈誤授百斛牙籌亟還之謝以十籌不受湯宗元字養初金壇人念大父年髙同卧起者十餘年大父殁始娶季弟未婚倍給以常稔田自取磽瘠嘗渡淮獲遺金一篋訪而還之人有所貸逾嵗輒焚其券曹孰字啓倫金壇人祖遺田僅百畝後殖至二千餘畝悉與同居兄子均分嵗飢輸粟千餘石以勸賑遙授鴻臚寺序班狄仕明溧陽人弟獻明萬歷壬午舉人有妾自縊忌者賄直指搆以殺人之罪方逮訊仕明謂弟曰此行無生理弟未有嗣不可以死乃使弟出亡挺身代往直指方盛怒仕明曰直指欲以三尺法為所私殺人乎直指語塞怒益甚榜笞交下俄殞於獄直指尋自悔弟獄得解張柏字汝憲丹徒人萬歷己丑郡大荒柏出粟千石設糜以賑病者給藥無衣者給絮凡五閲月至麥熟方止全活無算有司上其事遙授之職子覲辰亦好施豫有父風鄒量金壇人割股廬墓被旌表孫尚魁丹徒人節婦孫氏子也孕三月父卒尚魁自慟為遺孤不識父面每登髙及風雨夜則大哭母病刲股以進母殁設主淨室旦晚侍食凡數十年忽一日詣親族作别曰三日後别諸君去尚魁遺孤喜將識吾父於地下也踰三日果卒李元炳金壇人父瞽以舌餂復明割股飼母母疾愈明季膺奬謝深金壇人傭賃為生割臂肉愈母病陳光美金壇人刲股愈母疾伯兄無嗣次兄烈以子嗣之烈願兩析其資以一與光美不受子英略亦刲股療母疾莊仲祥字瑞之金壇人父以苦學失明仲祥日侍側口誦古史數十則雖沍寒深夜無間曰老人畏夜長吾欲為大人減漏刻也書則博束脯以佐甘旨繼母僅長祥二嵗終時仲祥年七十有三居喪盡禮所生弟素驕蹇仲祥愛之無間甲申三月聞變大慟疽發於背而卒陳觀陽字賓之丹徒人父肖授徒維揚逆徒宗孫達憾師嚴投毒飲食中肖中毒死觀陽甫十六嵗誓報父讐宗宦族多藏百計展脫賴江都知縣姚持之甚堅迄十九年觀陽成進士血疏陳情孫達始伏法觀陽仕至吏部主事朱祚元字仁卿丹徒人母病兩刲股以進父為亂兵所執請以身代並及於難史遷六溧陽人里中有貧而棄婦者鬻己田以全之子廷揚順治乙未進士國朝楊日進字吾往丹陽人性和易好施延名醫善樂以恤貧病甃治道路賑濟鄉里時稱長者賀雲舉字紫翔丹陽人順治辛卯恩貢授絳縣知縣謫兩浙鹽幕父以張獻忠之亂死於資陽雲舉棄官入蜀求遺骸不得慟哭空山中聞者莫不流涕戴舜年金壇人生五嵗父與族人構難族人擊殺諸途訟於官會令罷賂居間者事遂解舜年雖幼見其祖母時時切齒飲泣默識之至年二十途遇其仇頓發忿舉手中鉏鋤之破腦陷胸而死即持鉏詣縣自陳狀令義而頌繫之上臺亦義之僅擬杖懲事與丹陽黃洪元同張炳祖字虎文丹陽人從父仲馨北逰抵濟上父病熱不汗地無醫者炳祖夜告天刲股肉為羹才盡兩甌則大汗熱解後糜肉雜粉糕以進不十日愈父先病痢四十日卧起抱持漸不能興以牀為厠皆親裹滌復負重創積勞成瘵歸二年卒周瑞張繼昌俱金壇人以割股療親旌表王宗積金壇人廬墓旌表何金鋐字元用丹徒人父沒用妻嫁資治殮以父所積修脯金為弟妹婚嫁生計二弟繼沒撫二孀三孤歷凶嵗更亂離而卒共保全母沒終身茹素葬族之不能葬者十數喪晚入山學釋示微疾端坐逝賀上林丹陽人父天敘以事忤毗陵令繫獄將殺之上林年十八謀脫父不得聞巡撫將至涉江溯淮迎舟大呼騶從呵之不得前遂投河髮沒數寸復躍起大呼撫軍令急救之已死撿其衣得一紙則白父寃狀也撫軍按部具得令不法狀釋天敘獄毗陵人立賀孝子祠毛鯤字漸逵丹徒人節婦唐氏子竭力養母兄弟友愛以母節子孝旌表黃洪元丹陽人父國相為同里虞庠所殺時洪元與弟竒元尚幼長欲報仇母懼禍固止之久之母死既葬兄弟各挾利斧斫庠於春社會飲坐上詣縣自歸有司繫洪元釋其弟事奏詔皆釋之髙拱斗丹徒人樂善好施兩設粥賑飢凡橋梁道路公宇圯壞靡不捐金修築弟拱奎亦敦孝友法治朝字公亮丹徒人明末父為江隂縣土賊所害治朝求得遺骸歸控於官戮賊首十一人母病刲股以療弟治鼎染疫頭項腫潰欲人面作枕治朝即以面承之漸得愈弟治齊亦孝義每言及父事輒咬破其舌喋血而哭生子不令赴試江隂以父殺其地也初出繼叔後叔有子盡以家産畀之雍正四年旌表朱化麟丹徒人刲股肉愈母疾狄樞南字曼容溧陽人善屬文年十五母遘疾刲臂肉和藥以進卒不起葬後廬墓三年待庶弟三人衣食皆厚於己子曰吾子不敢與父之子等年四十一卒淮安府元湯福新山陽人遷桃源赤鯉湖居積甚富好行義代邑令償米五千石淮水泛清河以東被害築堤四十里水不為害復助米二千石開濬山陽運道嵗飢設粥以賑又浚漣沭二水因名湯家澗三子通遵暹皆以仕顯翟諟淮安人居喪廬墓明張住兒桃源人母孟氏病篤住兒割肉為羹以進母病獲愈洪武中旌表吳輔山陽人刲肝愈母疾楊旻字克彰山陽人父早卒居母喪哀毁踰禮廬墓三年母素畏寒遇大雪則繞墓慟哭墳遂無雪有白鳩雉兔之瑞宫安山陽人少孤其母以貧改適北商棄之去宣德間貢入京師避雨店舍母子相遇抱持慟哭其母已生三子安往來定省不缺授溫州府推官擢廣東僉事持憲嚴明致仕歸貧無生産養豬以自給巡撫王竑深重之王仲英清河人正統中以輸麥賑飢旌表梁辟李成俞勝徐成以上並淮安人正統時以輸財助賑旌朱仁安東人景泰間嵗貢任於潛縣教諭天性純孝方娶父賓病即不入私室侍奉湯藥及卒結廬墓側單衣跣足隆冬不易芝草産墓王鋐山陽人成化中以順孫旌表樊琦字克用山陽人成化戊子舉人授利津教諭復補任平原居家孝友凡祿養餘資悉推濟族屬蘇勤安東人自髙祖至勤六世同居成化中奉詔旌門朱勇安東人以五世同居旌髙隆鹽城人𢎞治癸亥嵗大歉死者枕藉隆瘞埋數千人陳錙山陽人好義樂施遇貧鬻妻者捐粟贖之李升字雲超山陽人幼喪父聞家人稱父名輒哭失聲家貧教授以養母母卒執喪哀毁遂喪明終身不食肉丁震山陽人自祖文義迄震五世同居少長雍睦正德中詔旌為義門蔣彬大河衛人母得疾汗閉幾死彬灼臂籲天母忽汗出獲瘥父殁廬墓終喪晨昏哀哭常有二鳥飛鳴廬中夜有數犬繞廬往來一時文士多歌詠之相棟山陽人嘉靖戊子舉人性篤孝友好周人急不計已豐約遇事役妨民者即代為論訴雖觸犯不自危陳斗南鹽城人嘉靖庚戌進士事繼母以孝聞母病疽呼號七日吮其穢而愈陳寶鹽城人親殁廬墓三年不與妻相見惟令子餉米於墳所楊錦郡諸生母病不解衣者三月父鸞鰥居侍寢處不入私室十餘年冬月父足凍裂夜以舌舐之父病嘗糞驗其差劇嘉靖中嵗貢當赴京師以父老不仕後學使耿定向初就官夢神語曰楊朴菴孝子也醒而識之及試淮詢知朴菴即貢生楊錦驚異之奉書幣表其宅里時以為至孝所感周熊淮安衛世襲指揮父母早世事繼母以孝聞及殁建思親樓刻像奉事吳從衆清河庠生性篤孝中夜火起母老病熟寢從衆冒火以入負母出烈焰中次日火毒發母子繼亡萬厯中詔旌髙鹿鳴字子賓山陽庠生孝友端慤嘗刲股愈母疾兄家計中落割産贍之撫兩孱姪不異己子又同邑王久章由乙榜授通判盡以家財析諸弟姪孔金山陽人父椿死遺腹生金事母盡孝母被大賈杜言逼娶沈河死金屢訟不勝言以賄謀斃之金丐食走闕下擊登聞不得達復歸墓所號哭不絶聲里人上其事知府張守約異之質實擬言斬未幾張卒言夤緣得脫金被箠楚幾死後監司理舊牘仍擬言斬死獄中金旌表孔良金子金病刲股肉為羹以進得愈金喪廬墓萬厯中與金同旌成瑶鹽城人吳松山陽人並親殁廬墓三年朱繼輅安東庠生三月喪父稍長問父貌於母母哀號輅亦哭不休家貧見母有不悅必長跪求解母以哭姑卒繼輅哭母喪明鮑越山陽人隄顔家河路三十里為橋梁五所建亭鑿井以息行人凡三圯三復萬厯中旌表梁秀鹽城人早喪母父憐之不再娶秀朝夕色養父殁廬墓離家數十里嘗中夜有鬼試之不為動終喪族人羣往迎歸揭卧薦起有赤蛇數十盤旋其下衆驚異有司上其事詔旌之劉自靖山陽庠生世光孫性慷慨有幹略明季丙子丁丑間淮水漲居民驚懼自靖募衆築堰障禦城賴以安張致中山陽人天啓時以孝旌王啓運字馭六安東人崇禎己卯舉人事親至孝里人疫有貧不能備棺者施具以葬之又同郡沈維中趙有年亦以孝著國朝虞三省鹽城人父好施豫竭力承父志有貧民賣女求脫誣獄三省賣耕牛以贖之嵗飢前後賑濟千餘石吳世昌安東人年二嵗祖父繼殁稍長事祖母及母竭力盡孝順治十二年旌表王忱淮安庠生母死日夜哀號遂以毁卒未匝月柩傍燕巢産白雛繞柩飛鳴人稱為孝感多為白燕詩挽之吕惟鹽城人幼聘淮浦髙氏次女女既長得廢疾瘖且瘓髙欲厚飾粧資更妻以長女惟固辭人皆義之劉源長字介祉山陽諸生父宗逺任廣西懷集所吏目阻兵亂不得歸源長跋涉萬里訪父粵中水陸所由屢經危險有風息虎馴之異咸稱孝感又祖母病篤刲股以進而愈劉愈山陽人昌言長子康熙壬戌進士仕終工部主事性篤孝友少師事耆儒嶽薦邃理學通經濟昌言令岑溪愈隨侍在署鄰縣賊彭竒圍城彀毒矢仰射城上中者輒死愈佐父登陴竭力守禦有飛矢從項傍過著神祠竿上賊平後邑人識其箭為孝子箭陳嘉寵山陽人年十二割股療母疾里人嗟異趙夢龍張拱台張星弼並山陽人孟之德曾士傑並鹽城人俱以割股稱孝成世雄鹽城人養親盡孝居親喪枕磚卧草三年不食鹽酪盛著不浴時同邑宋桓貽山陽胡之驥並有孝行楊長葿山陽人父病七載扶持飲食不委婢僕母死廬墓蔬食三年江南通志卷一百五十八欽定四庫全書
